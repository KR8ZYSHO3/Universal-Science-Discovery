site_name: Universal Science Discovery Repository
site_description: Discovery-first open scientific knowledge — unknowns, hypotheses, reproducibility.
site_author: USDR contributors
site_url: https://kr8zysho3.github.io/Universal-Science-Discovery/


repo_url: https://github.com/KR8ZYSHO3/Universal-Science-Discovery
repo_name: GitHub
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Start here:
      - Onboarding: ONBOARDING.md
      - Doc map: DOC_MAP.md
      - Vision & scope: VISION_AND_SCOPE.md
      - Methodology: METHODOLOGY.md
  - Community & integrity:
      - Collaboration: COLLABORATION_AND_REVIEWS.md
      - Ethics & reproducibility: ETHICS_REPRODUCIBILITY_AND_DATA.md
      - Licensing notes: LICENSING_NOTES.md
      - Labels & milestones: LABELS_AND_MILESTONES.md
  - Operations:
      - Operating rhythm: OPERATING_RHYTHM.md
      - Repository manifest: REPOSITORY_MANIFEST.md
  - Prompts:
      - Literature synthesis: prompts/literature_synthesis.md
      - Hypothesis comparison: prompts/hypothesis_comparison.md
      - Falsification pass: prompts/falsification_pass.md

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.magiclink
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: warn
  links:
    not_found: ignore
    unrecognized_links: ignore
    absolute_links: ignore

strict: true

site_name: Universal Science Discovery
site_description: Discovery-first open scientific knowledge infrastructure.

repo_name: Universal-Science-Discovery
repo_url: https://github.com/KR8ZYSHO3/Universal-Science-Discovery
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Start here:
      - Onboarding: ONBOARDING.md
      - Doc map: DOC_MAP.md
      - Repository manifest: REPOSITORY_MANIFEST.md
  - Policy:
      - Vision & scope: VISION_AND_SCOPE.md
      - Methodology: METHODOLOGY.md
      - Ethics & reproducibility: ETHICS_REPRODUCIBILITY_AND_DATA.md
      - Collaboration & reviews: COLLABORATION_AND_REVIEWS.md
      - Operating rhythm: OPERATING_RHYTHM.md
      - Licensing notes: LICENSING_NOTES.md
      - Labels & milestones: LABELS_AND_MILESTONES.md
  - Prompts:
      - Literature synthesis: prompts/literature_synthesis.md
      - Hypothesis comparison: prompts/hypothesis_comparison.md
      - Falsification pass: prompts/falsification_pass.md

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

# Repo links in `docs/*.md` often point outside `docs/` (e.g. `../CONTRIBUTING.md`). Those resolve on GitHub; ignore here so builds stay strict for real errors.
validation:
  links:
    not_found: ignore
    unrecognized_links: ignore

site_name: Universal Science Discovery Repository
site_description: Discovery-first open scientific knowledge — unknowns, hypotheses, reproducibility.
site_author: USDR contributors
site_url: https://kr8zysho3.github.io/Universal-Science-Discovery/

repo_url: https://github.com/KR8ZYSHO3/Universal-Science-Discovery
repo_name: GitHub
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Start here:
      - Onboarding: ONBOARDING.md
      - Happy path (Stream A): HAPPY_PATH_FIRST_RECORDS.md
      - Doc map: DOC_MAP.md
      - Vision & scope: VISION_AND_SCOPE.md
      - Methodology: METHODOLOGY.md
  - Community & integrity:
      - Collaboration: COLLABORATION_AND_REVIEWS.md
      - Solving unknowns: SOLVING_UNKNOWNS.md
      - Quality bar (anti-sloppiness): QUALITY_BAR.md
      - Ethics & reproducibility: ETHICS_REPRODUCIBILITY_AND_DATA.md
      - Licensing notes: LICENSING_NOTES.md
      - Labels & milestones: LABELS_AND_MILESTONES.md
  - Operations:
      - Operating rhythm: OPERATING_RHYTHM.md
      - Repository manifest: REPOSITORY_MANIFEST.md
      - Data plan (Phase A pilot): DATA_PLAN.md
      - Documentation examples (ingest): examples/README.md
      - Ingest UAT (manual): UAT_INGEST.md
      - Dev dashboard: DEV_DASHBOARD.md
      - Optional GSD tooling: GSD_INTEGRATION.md
  - Cross-domain bridges:
      - Overview: CROSS_DOMAIN_BRIDGES.md
  - Crosscheck:
      - Prove the bridge: CROSSCHECK.md
  - Prompts:
      - Literature synthesis: prompts/literature_synthesis.md
      - Hypothesis comparison: prompts/hypothesis_comparison.md
      - Falsification pass: prompts/falsification_pass.md
      - Bridge discovery: prompts/bridge_discovery.md
      - Intuition to unknown: prompts/intuition_to_unknown.md
  - Strategy & data:
      - Breakthrough gaps (stewardship): BREAKTHROUGH_GAPS.md
      - Path to success: PATH_TO_SUCCESS.md
      - Data sources: DATA_SOURCES.md
      - Wave Factory: WAVE_FACTORY.md
      - Hypothesis generation: HYPOTHESIS_GENERATION.md
      - Quick start contributing: QUICK_START_CONTRIBUTING.md
      - Energy Harvesting Provocation: energy-harvesting-provocation.md
      - Quick start launch sprint: QUICK_START_LAUNCH_SPRINT.md
      - Code audit: CODE_AUDIT.md
      - Custom domain setup: CUSTOM_DOMAIN_SETUP.md
  - Generated reports:
      - Citation index: citation_index.md
      - Orphan unknowns: orphan_unknowns.md
      - Quality report: quality_report.md
  - Events:
      - Hackathon 2026-06: events/hackathon-2026-06.md
  - Explainers:
      - Bridges:
          - Renormalization group × ML: explainers/bridges/renormalization-group-machine-learning.md
          - Black–Scholes × heat equation: explainers/bridges/black-scholes-heat-equation.md
          - Statistical physics × social science: explainers/bridges/statistical-physics-social-science.md
          - Information theory × evolutionary biology: explainers/bridges/information-theory-evolutionary-biology.md
      - Pioneers:
          - Shannon information bridges: explainers/pioneers/shannon-information-bridges.md
          - Turing beyond computing: explainers/pioneers/turing-beyond-computing.md
          - Darwin game theory: explainers/pioneers/darwin-game-theory.md
  - Outreach:
      - Overview: outreach/README.md
      - Launch package: outreach/USDR_LAUNCH_OUTREACH_PACKAGE.md
      - Early Stewards call: outreach/early_stewards_call.md
      - Launch posting calendar: outreach/launch_posting_calendar.md
      - Researcher pitch: outreach/researcher_pitch.md
      - arXiv abstract: outreach/arxiv_abstract.md
      - Twitter threads: outreach/twitter_threads.md
      - LinkedIn post: outreach/linkedin_post.md
      - Reddit OpenScience: outreach/reddit_openscience_post.md
  - Preprint:
      - USDR preprint: preprint/usdr_preprint.md
      - arXiv submission guide: preprint/ARXIV_SUBMISSION_GUIDE.md
      - Submission checklist: preprint/SUBMISSION_CHECKLIST.md
      - Cover letter: preprint/cover_letter.md

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.magiclink
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: warn
  links:
    not_found: ignore
    unrecognized_links: ignore
    absolute_links: ignore

strict: true

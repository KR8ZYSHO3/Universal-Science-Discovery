cross_pollination_opportunities:
  - >
    Cosmogenic isotope stratigraphy (^10Be in deep-sea sediments, ^26Al in ice cores)
    can reconstruct galactic cosmic ray flux over 10 Myr timescales. Cross-correlating
    these records with the marine fossil record extinction intensity would directly
    test whether elevated cosmic ray flux correlates with elevated extinction rate
    and speciation rate.
  - >
    Radiation biology experiments exposing model organisms (C. elegans, Drosophila,
    bacterial cultures) to elevated cosmic-ray-like muon or proton fluxes can measure
    effective mutation rate enhancement, giving a quantitative prediction for
    how much evolutionary rate acceleration a spiral arm crossing or GRB could produce.
  - >
    Exoplanet habitability modeling: stars in different galactic environments experience
    different GRB and cosmic ray exposure. Stars in the galactic bulge experience ~100x
    higher GRB fluence than solar neighborhood stars, constraining where in the galaxy
    complex life can survive over Gyr timescales ("Galactic Habitable Zone" of Lineweaver).
communication_gap: >
  Astrophysicists studying cosmic ray acceleration and GRB populations rarely
  engage with the paleontological literature on mass extinction mechanisms.
  Evolutionary biologists and paleontologists rarely cite galactic dynamics papers.
  The few interdisciplinary papers (Melott, Lineweaver) exist but have not produced
  a sustained research program connecting galactic astrophysics observatories to
  fossil record analysis. Geophysicists measure cosmogenic isotopes as a flux proxy
  but rarely connect these to biological radiation dose rates.

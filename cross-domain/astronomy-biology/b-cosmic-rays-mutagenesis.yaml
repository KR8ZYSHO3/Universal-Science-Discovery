id: b-cosmic-rays-mutagenesis
title: >
  Galactic cosmic ray flux and gamma-ray burst irradiation of Earth's biosphere
  have varied systematically with the solar system's galactic position, correlating
  with mass extinction timing and potentially modulating the long-term pace of
  biological evolution through elevated mutagenesis and DNA double-strand break rates.
status: proposed
fields:
  - astronomy
  - astrobiology
  - evolutionary-biology
  - geophysics
  - radiation-biology
bridge_claim: >
  The galactic environment of the solar system is not static. As the Sun oscillates
  through the galactic plane (~33 Myr period) and spirals through spiral arms
  (~140 Myr period), Earth's exposure to cosmic rays, gamma-ray bursts, and
  supernova irradiation varies by factors of several.

  Cosmic rays are primarily high-energy protons and heavier nuclei (GeV-PeV range)
  accelerated by supernova remnants. At Earth's surface, secondary cosmic ray
  muons penetrate to ~1 km depth and cause DNA double-strand breaks (DSBs) at a
  rate of ~0.1 DSBs/cell/day at current flux levels. A factor-of-2 increase in
  cosmic ray flux (plausible during spiral arm crossings or nearby supernova events)
  doubles DSB rates across all surface and shallow-water organisms simultaneously.

  Gamma-ray bursts (GRBs) are more extreme: a GRB at ~1 kpc with fluence
  ~100 kJ/m^2 would destroy ~50% of Earth's ozone column within seconds,
  exposing the surface to lethal UV for years. Melott & Thomas (2011) proposed
  that the Late Ordovician mass extinction (443 Mya, ~85% species loss) was
  triggered by a galactic GRB based on the extinction pattern (preferential
  survival of deep-water vs. surface species, consistent with UV kill mechanism).

  The astrophysical bridge: Galactic cosmic ray flux is modulated by the
  heliosphere (solar modulation), Earth's magnetic field, and the local interstellar
  environment. Spiral arm crossings increase both supernova rate and nearby GRB
  probability. The timing of Raup-Sepkoski extinction periodicity (~26 Myr,
  now contested) and the ~140 Myr spiral arm crossing period invite comparison.

  Biologically, the bridge connects astrophysical flux variations to mutation
  rate heterogeneity across geological time — the same cosmic ray showers that
  set geological isotope ratios (cosmogenic ^10Be, ^26Al) also set background
  mutation rates in all organisms simultaneously, creating a global mutagenic
  "clock" driven by galactic dynamics rather than internal biological processes.
translation_table:
  - field_a_term: galactic cosmic ray flux (GeV protons, cm^-2 s^-1)
    field_b_term: DNA double-strand break rate (DSBs/cell/day)
    note: Linear dose-response; DSBs scale with secondary muon flux at surface
  - field_a_term: spiral arm crossing period (~140 Myr)
    field_b_term: elevated supernova rate and nearby GRB probability
    note: Arms concentrate OB associations; increased ionizing radiation environment
  - field_a_term: gamma-ray burst fluence at 1 kpc
    field_b_term: ozone column depletion fraction
    note: ~100 kJ/m^2 causes ~50% ozone loss; Melott-Thomas criterion for mass extinction
  - field_a_term: solar modulation potential (Phi, MeV)
    field_b_term: suppression of low-energy cosmic ray flux reaching Earth
    note: Active sun reduces surface cosmic ray flux; solar grand minima increase it
  - field_a_term: cosmogenic isotope record (^10Be in ice cores, ^14C in tree rings)
    field_b_term: past cosmic ray flux proxy
    note: Ice core and sediment records provide flux history over Myr timescales
  - field_a_term: Ordovician gamma-ray burst hypothesis
    field_b_term: preferential extinction of surface/shallow vs. deep-water taxa
    note: UV kill mechanism predicts depth-stratified extinction pattern

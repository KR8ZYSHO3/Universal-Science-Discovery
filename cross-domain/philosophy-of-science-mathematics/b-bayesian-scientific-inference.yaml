cross_pollination_opportunities:
  - >
    Train scientists to compute Bayes factors rather than p-values:
    a direct translation of statistics into the language philosophers
    of science use for theory confirmation. Would resolve the
    "replication crisis" framing — failed replications are informative
    Bayes factors, not binary failures.
  - >
    Apply Bayesian model comparison to the history of science: compute
    the sequential Bayes factors that would have been generated by
    historical experiments (e.g., Eddington 1919 eclipse, Michelson-Morley,
    Bell inequality tests) to reconstruct the rational posterior update
    for each landmark result.
  - >
    Use the Bayesian framework to formalise auxiliary-hypothesis blame
    allocation in contested scientific controversies (e.g., cold fusion,
    OPERA superluminal neutrinos) — making the Duhem-Quine problem a
    solvable inference problem rather than a philosophical impasse.
  - >
    Build a Bayesian meta-analysis engine for USDR: compute posterior
    probability of each hypothesis in hypotheses/active/ given all
    published evidence links, updating as new evidence_links are added.

communication_gap: >
  Philosophers of science study confirmation theory in journals like
  British Journal for the Philosophy of Science and Philosophy of Science.
  Statisticians develop Bayesian methods in JASA, Biometrika, and Bayesian
  Analysis. The explicit identification of Bayesian confirmation theory
  with the epistemology of science was made by Howson & Urbach (1989) and
  MacKay (2003), but is still not standard in either field's training.
  Most working scientists are taught null-hypothesis significance testing
  (NHST), not Bayesian inference, creating a systematic disconnect between
  the normative theory of scientific inference and scientific practice.


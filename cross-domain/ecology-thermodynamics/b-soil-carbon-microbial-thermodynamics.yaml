id: b-soil-carbon-microbial-thermodynamics
title: >
  Soil carbon sequestration efficiency is governed by microbial thermodynamics:
  the carbon use efficiency (CUE) of soil microbes follows thermodynamic constraints
  on ATP yield per mole of carbon oxidized, bridging ecosystem ecology and
  bioenergetics.
status: established
fields:
  - ecology
  - thermodynamics
  - microbiology
bridge_claim: >
  Microbial carbon use efficiency CUE = C_biomass / C_substrate_consumed is thermodynamically
  constrained by the Gibbs energy yield of the oxidation reaction (DeltaG_rxn per mole C);
  substrates with high energy yield per carbon (sugars) support higher CUE than
  recalcitrant compounds (lignin), and the MEND (Microbial-ENzyme Decomposition) model
  explicitly links soil carbon turnover rates to microbial CUE and thermodynamic
  decomposition potentials, making global soil carbon stock projections dependent on
  microbial thermodynamics.
translation_table:
  - field_a_term: carbon use efficiency CUE (ecology)
    field_b_term: thermodynamic efficiency of anabolic vs catabolic reactions (thermodynamics)
    note: CUE is bounded by the fraction of Gibbs energy available for biosynthesis after maintenance
  - field_a_term: substrate quality (soil ecology)
    field_b_term: Gibbs energy of oxidation DeltaG_rxn per mole carbon (thermodynamics)
    note: High DeltaG substrates (sugars, acetate) have higher CUE than low DeltaG compounds (lignin)
  - field_a_term: soil organic matter decomposition rate (ecology)
    field_b_term: enzyme kinetics coupled to thermodynamic feasibility (thermodynamics)
    note: Decomposition ceases when DeltaG_rxn < threshold for ATP synthesis (~-20 kJ/mol)
  - field_a_term: microbial biomass turnover (ecology)
    field_b_term: maintenance energy requirement (thermodynamics)
    note: A minimum power flux is required to maintain cellular structure against entropy production
related_unknowns:
  - u-soil-carbon-cue-temperature-response
related_hypotheses:
  - h-microbial-cue-warming-feedback-carbon-cycle
cross_pollination_opportunities:
  - Incorporating thermodynamic constraints on CUE into Earth System Models to reduce uncertainty in soil carbon projections
  - Using calorimetry and respirometry to measure microbial thermodynamic efficiency across soil types as a predictor of carbon sequestration potential
communication_gap: >
  Soil ecologists measure carbon fluxes and microbial biomass while thermodynamicists
  analyze energy yields of chemical reactions; the MEND framework explicitly links
  these but most Earth System Models use empirical temperature-sensitivity parameters
  (Q10) rather than mechanistic thermodynamic constraints, limiting projection accuracy.
last_reviewed: "2026-05-07"
references:
  - doi: "10.1038/s41558-018-0271-9"
    note: Wieder et al. (2018) - explicitly representing microbial carbon use efficiency in Earth system models
  - doi: "10.1111/j.1461-0248.2010.01538.x"
    note: Manzoni et al. (2012) - stoichiometric controls on carbon, nitrogen, and phosphorus dynamics in soil
  - doi: "10.1016/j.soilbio.2013.08.013"
    note: "Wang et al. (2013) - MEND model: Michaelis-Menten kinetics coupled to microbial thermodynamics"

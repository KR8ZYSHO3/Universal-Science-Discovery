id: b-wetland-carbon-storage-anaerobic-decomposition
title: >
  Wetlands store disproportionate amounts of carbon because anaerobic conditions
  thermodynamically inhibit organic matter decomposition: without oxygen as the
  terminal electron acceptor, microbes must use energetically inferior redox
  couples, slowing carbon turnover and enabling peat accumulation over millennia.
status: established
fields:
  - ecology
  - biogeochemistry
  - thermodynamics
bridge_claim: >
  Microbial decomposition thermodynamics are governed by the Gibbs free energy
  yield of terminal electron acceptor (TEA) reactions: О”GВ°'(Oв‚‚) = -2870 kJ/mol
  glucose >> О”GВ°'(NOв‚ѓвЃ») = -2670 >> О”GВ°'(FeВівЃє) = -1410 >> О”GВ°'(SOв‚„ВІвЃ») = -380 >>
  О”GВ°'(COв‚‚в†’CHв‚„) = -390 kJ/mol. In waterlogged soils, Oв‚‚ is rapidly depleted
  and redox potential Eh drops below -200 mV, forcing sequential use of less
  favorable TEAs. The Monod-type rate equation r = r_maxВ·[S]/(K_s+[S])В·[TEA]/(K_TEA+[TEA])
  shows that CHв‚„-producing methanogenesis has the lowest r_max and highest K_TEA,
  explaining why carbon turnover rates decrease ~10-100x under anaerobic conditions.
  Peat accumulation rate = NPP - decomposition rate; thermodynamic inhibition of
  decomposition is the mechanistic link between anoxic hydrology and long-term C storage.

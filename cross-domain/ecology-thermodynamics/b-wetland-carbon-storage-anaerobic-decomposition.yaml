communication_gap: >
  Wetland ecologists measuring carbon stocks and biogeochemists modeling
  decomposition thermodynamics have partially overlapping communities, but
  quantitative application of thermodynamic free energy yields to predict peat
  accumulation under different climate scenarios remains a frontier; the microbial
  ecology, soil physics, and thermodynamics communities rarely model these processes jointly.

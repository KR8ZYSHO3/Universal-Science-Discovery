id: b-tidal-forcing-ocean-mixing
title: >
  Tidal forcing generates internal waves at ocean ridges and seamounts that break
  and drive deep-ocean mixing, bridging physical oceanography and geophysics through
  the internal wave energy cascade that maintains the oceanic thermohaline circulation.
status: established
fields:
  - oceanography
  - geophysics
  - fluid-mechanics
bridge_claim: >
  Barotropic tides generated by gravitational forcing (moon and sun) interact with
  bottom topography to radiate baroclinic internal tides that propagate along density
  surfaces; these waves break via parametric subharmonic instability and shear
  instability, depositing approximately 1 TW of mechanical energy into turbulent
  mixing that maintains the abyssal stratification and drives the global overturning
  circulation, connecting geodesy (tidal dissipation) to ocean dynamics via the
  internal wave energy cascade.
translation_table:
  - field_a_term: barotropic tidal forcing (geophysics)
    field_b_term: energy source for baroclinic internal tides (oceanography)
    note: Bottom topography converts barotropic to baroclinic tidal energy at rate proportional to tidal velocity squared
  - field_a_term: internal wave dispersion relation omega^2 = N^2 sin^2(theta) + f^2 cos^2(theta)
    field_b_term: stratification parameter N (Brunt-Vaisala frequency) in oceanography
    note: The angle of internal wave propagation is set by the ratio of forcing frequency to N and f
  - field_a_term: tidal dissipation Q factor (geophysics)
    field_b_term: abyssal mixing diffusivity kappa (oceanography)
    note: The 2.1 TW tidal dissipation budget constrains available mixing energy for the overturning circulation
  - field_a_term: parametric subharmonic instability (fluid mechanics)
    field_b_term: energy transfer from internal tides to inertial waves (oceanography)
    note: PSI transfers energy from tidal frequency to near-inertial waves that more efficiently break and mix
related_unknowns:
  - u-internal-tide-mixing-efficiency-spatial
related_hypotheses:
  - h-tidal-mixing-overturning-circulation-control
cross_pollination_opportunities:
  - Combining satellite altimetry of tidal sea surface height with moored turbulence measurements to map global mixing hotspots
  - Using geodetic measurements of tidal energy dissipation to constrain abyssal mixing parameterizations in climate models
communication_gap: >
  Physical oceanographers measure mixing turbulence and circulation while geophysicists
  measure tidal dissipation and Earth deformation; the internal tide pathway connecting
  tidal forcing to ocean mixing was only clarified in the 1990s-2000s by Munk & Wunsch,
  and climate models still struggle to parameterize the spatially heterogeneous tidal
  mixing correctly.
last_reviewed: "2026-05-07"
references:

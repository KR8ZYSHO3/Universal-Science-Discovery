cross_pollination_opportunities:
  - >
    Urban metabolism accounting (energy, water, material flows through cities as
    organisms, analogous to metabolic scaling) combined with Ostrom's SES framework
    would allow empirical testing of whether polycentric governance reduces urban
    resource throughput (improved metabolic efficiency) compared to centralised
    or fragmented governance — a direct test of governance theory with biophysical
    metrics.
  - >
    Real-time urban biodiversity monitoring using bioacoustic sensors, camera traps,
    and eDNA (environmental DNA from water samples) combined with social media
    citizen science (iNaturalist observations) could generate longitudinal datasets
    on urban wildlife population dynamics at city scale — enabling analysis of how
    policy decisions (urban greening investments, zoning changes) affect biodiversity
    outcomes with sufficient temporal resolution to test Ostrom's SES predictions.
communication_gap: >
  Ecology developed in natural systems (forests, grasslands, oceans) and urban ecology
  was not recognised as a legitimate sub-discipline until the late 1990s (McDonnell
  & Pickett 1990 first influential urban ecology synthesis). Social scientists
  (urban planners, sociologists, economists) built their urban models without
  ecological inputs. Ostrom's SES framework was developed from studies of fisheries
  and irrigation systems — its application to urban green infrastructure was not
  systematic until Elmqvist et al. (2013). Green infrastructure valuation remains
  contested because ecologists and economists use different units, time horizons,
  and uncertainty frameworks. The concept of "nature-based solutions" (EU policy
  language) has helped bridge planning and ecology but lacks rigorous ecological
  theory.

id: b-control-lyapunov-ecological-harvest-management
title: >
  Control-Lyapunov framing of ecological harvest policy links biomass resilience objectives to explicit
  stabilizing feedback constraints under environmental shocks.
status: proposed
fields:
  - ecology
  - control-engineering
  - dynamical-systems
  - resource-management
bridge_claim: >
  Biomass dynamics with harvesting can be treated as controlled nonlinear systems where safe operating
  regions are encoded by Lyapunov-like functions over population state. This bridge converts ecological
  resilience targets (avoid collapse, maintain recovery margin) into verifiable feedback policy
  conditions and constraint-aware controller synthesis.
translation_table:
  - field_a_term: resilience basin and recovery rate
    field_b_term: Lyapunov decrease conditions and region of attraction
    note: Ecological "distance to collapse" maps to a stability certificate margin.
  - field_a_term: harvest quota and effort limits
    field_b_term: constrained input bounds and saturation nonlinearities
    note: Feasible policy sets are naturally represented as control constraints.
  - field_a_term: environmental stochastic forcing
    field_b_term: disturbance-robust stability margin
    note: Robust control tools quantify tolerated shock envelopes.
related_unknowns:
  - u-control-lyapunov-safe-harvest-policy-ecology
related_hypotheses:
  - h-clf-constrained-harvest-stabilizes-biomass-under-shocks
cross_pollination_opportunities:
  - Apply control barrier function techniques to fishery closure and reopening triggers.
  - Use reachability-style stress tests for policy portfolios before field deployment.
communication_gap: >
  Ecological management plans often describe resilience qualitatively, while control formulations demand
  explicit stability functions; a shared operational vocabulary is still uncommon.
references:
  - doi: "10.1038/261459a0"
    note: "May (1976), simple mathematical models with very complicated dynamics."
last_reviewed: "2026-05-08"

cross_pollination_opportunities:
  - >
    Line-by-line radiative transfer codes (HITRAN database) used in spectroscopy
    research are the foundation of climate forcing calculations. Spectroscopists
    rarely publish in climate journals, creating gaps: e.g., CH₄ absorption in the
    4 μm band is less well characterized than CO₂ and is critical for methane
    forcing calculations with growing relevance to climate policy.
  - >
    Stellar atmosphere physicists studying radiative transfer in stellar interiors
    use the same Eddington approximation and two-stream method as atmospheric
    radiative transfer models. Cross-fertilization has led to improvements in
    both fields, but the communities rarely interact despite sharing mathematical
    foundations.
communication_gap: >
  Climate scientists use forcing and feedback language developed for policy
  communication, while physicists use spectroscopic language (transition
  moments, line strengths, pressure broadening). The mathematical connection
  — that ΔF = 5.35 ln(C/C₀) is a Taylor expansion of the Beer-Lambert law
  integrated over the HITRAN spectrum — is not taught in either physics or
  climate courses. Journal siloing between Journal of Geophysical Research
  (Atmospheres) and Journal of Quantitative Spectroscopy & Radiative Transfer
  has maintained the gap despite the two fields sharing fundamental physics.

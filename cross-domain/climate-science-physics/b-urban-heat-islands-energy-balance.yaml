cross_pollination_opportunities:
  - "Radiative cooling materials: sub-ambient radiative cooling (emitting at 8-13 μm atmospheric window) directly reduces the longwave component of Q* and can contribute negative QH — connecting atmospheric radiation physics to urban cooling materials design."
  - "Cool city parametrization in regional climate models: SEB parameters for urban canopy are required inputs to WRF and CESM for urban climate projections; urban materials databases (NUDAPT, LCZ) translate energy balance physics into model-ready parameters."
communication_gap: >
  Urban planners and city governments who address UHI through green infrastructure
  and cool pavements rarely connect to the SEB physics that explains why these
  interventions work quantitatively. Atmospheric physicists who model urban energy
  balance publish in boundary-layer meteorology journals with limited reach to
  urban planning and public health communities who need the results.
last_reviewed: "2026-05-07"

cross_pollination_opportunities:
  - >
    Dance therapy and music therapy use movement and sound to modulate emotional states
    in clinical populations (Parkinson's disease, depression, autism). The mirror neuron
    framework predicts that these therapies work by engaging motor resonance circuits
    that are intact even when explicit motor or social cognition is impaired. An RCT
    comparing dance therapy efficacy with/without mirror-system-activating features
    (mirroring the therapist vs. independent movement) would test whether mirror-system
    engagement is the active mechanism.
  - >
    Generative AI image and video models produce "uncanny" outputs when body proportions,
    hand geometry, or action physics are subtly wrong. Predicting which AI-generated
    images trigger the uncanny valley effect from measurable deviations in biological
    motion parameters (joint angles, velocity profiles) would test the predictive
    coding / mirror mismatch theory and provide practical guidance for AI-generated
    content quality control.
  - >
    Cross-cultural aesthetics research could test whether mirror neuron activation
    during art viewing is universal or culturally modulated. If motor resonance is
    the substrate of aesthetic pleasure, then cultures with different motor repertoires
    (different dance traditions, tool use patterns) should show different mirror
    system activation patterns for the same artwork. This would connect embodied
    simulation theory to cross-cultural psychology and the anthropology of art.
communication_gap: >
  Mirror neurons were discovered in basic primate neuroscience (Rizzolatti et al.
  1996) and their aesthetic implications were proposed by Gallese & Freedberg (2007)
  in a Trends in Cognitive Sciences paper. The art history and aesthetics literature
  has engaged with mirror neuron theory (Freedberg & Gallese started a "neuroaesthetics"
  movement) but with controversy about the translation from animal to human neuroscience
  and from neuroscience to art criticism. The strong claims about autism ("broken
  mirror" theory) have damaged the field's reputation by overgeneralising from limited
  evidence. The legitimate core insight (that aesthetic experience involves motor
  simulation) needs more rigorous experimental separation from speculative extensions.

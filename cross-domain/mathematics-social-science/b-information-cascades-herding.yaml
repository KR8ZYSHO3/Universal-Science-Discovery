cross_pollination_opportunities:
  - "Design social media feed algorithms that prioritise information revelation over engagement — breaking cascade dynamics by exposing users to high-quality dissenting information"
  - "Apply cascade theory to clinical trial recruitment: patients who see peers enrolling rationally herd onto trials, enabling faster recruitment via visible participation counts"
  - "Use cascade fragility to design policy interventions — credible public commitments (carbon pledges, vaccine uptake targets) can reverse negative cascades in climate and public health"

communication_gap: >
  The information cascade literature sits primarily in economics and game theory
  journals (Journal of Political Economy, Quarterly Journal of Economics) and is
  largely unknown to sociologists studying collective behaviour, political scientists
  studying opinion formation, and computer scientists studying social network
  dynamics — despite modelling the same phenomena. The distinction between
  observational learning (cascade-prone) and communicative social learning is
  crucial for platform design but rarely makes it into technology policy discussions.


id: b-information-cascades-herding
title: "Information Cascades and Herding — Bikhchandani's rational cascade model explains bank runs, market crashes, fashion, and social media virality as informationally inefficient equilibria"
status: established
fields:
  - economics
  - mathematics
  - social-science
  - behavioural-economics
  - network-science

bridge_claim: >
  An information cascade (Bikhchandani, Hirshleifer & Welch 1992) arises when
  individuals, making decisions sequentially, rationally choose to ignore their
  own private information and copy the observed actions of predecessors. The
  canonical model: N agents choose between actions A and B; each receives a
  private binary signal correlated with the true state; each observes all prior
  choices. After the first two agents choose action A, a Bayesian agent who
  receives a private signal favouring B will still rationally choose A — because
  the public history (two A's) outweighs one private signal. From agent 3 onward,
  all subsequent agents rationally herd on A regardless of their private signals,
  even if the majority of private signals favour B. The cascade is an informationally
  inefficient equilibrium: the public action history aggregates only the first two
  private signals; subsequent private information is permanently suppressed.
  Fragility: cascades break easily — a credible public announcement, a visible
  deviant, or a small shock can precipitate a reverse cascade. This explains bank
  runs (rational individual flight when others flee, regardless of bank solvency),
  stock market momentum crashes (rational herding followed by rapid reversal),
  fashion cycles, and social media virality (content goes viral not necessarily
  because it is good but because it appears to be going viral). Banerjee (1992)
  provided a simultaneous independent formulation. Welch (1992) applied the model
  to IPO underpricing. Observational learning (copying actions) generates cascades;
  social learning (sharing private information) does not — a distinction with
  profound implications for platform and institutional design.

translation_table:
  - field_a_term: "Bayesian updating on public action history"
    field_b_term: "rational inference from observed crowd behaviour"
    note: "The cascade agent is NOT irrational — they are Bayesian; irrationality is not required to explain herding"
  - field_a_term: "private signal suppression after cascade onset"
    field_b_term: "dispersed information not aggregated into prices or collective decisions"
    note: "Hayek's knowledge problem in reverse: decentralised information systems can fail to aggregate information"
  - field_a_term: "cascade fragility (small shock reverses direction)"
    field_b_term: "sudden reversal of market momentum, fashion, or political consensus"
    note: "A single high-credibility actor (central banker, celebrity endorser) can reverse a cascade instantly"
  - field_a_term: "observational vs. social learning"
    field_b_term: "copying actions vs. sharing private information"
    note: "Social media 'likes' are action signals (cascade-prone); product reviews sharing information reduce herding"
  - field_a_term: "long cascade (all agents herd)"
    field_b_term: "winner-takes-all market outcome independent of product quality"
    note: "First-mover advantage and network effects can lock in an inferior product via cascades"
  - field_a_term: "cascade-breaking mechanism (visible dissenter)"
    field_b_term: "importance of minority voices and independent analysis in deliberative institutions"
    note: "Devil's advocate roles in committees and deliberate disclosure of dissent help prevent cascade lock-in"


cross_pollination_opportunities:
  - >
    Sliced Wasserstein distance and entropy-regularized optimal transport (Sinkhorn
    algorithm) make large-scale spatial optimization computationally tractable ΓÇö
    enabling optimal redistribution policy design (housing vouchers, commuter rail
    placement) as explicit Monge transport problems.
  - >
    Climate change and economic geography: the spatial reshuffling of comparative
    advantage (agricultural zones shift, coastal flooding, new Arctic shipping routes)
    can be modeled as a change in the transport cost matrix ╧ä_{ij} ΓÇö triggering
    bifurcations in economic geography as ╧ä_c thresholds are crossed.
communication_gap: >
  Mathematical optimal transport theorists (Villani, Brenier, McCann) rarely interact
  with empirical trade economists or economic geographers. The gravity model and
  core-periphery model were developed in economics without awareness of the optimal
  transport literature; the mathematical connections were made later (Galichon 2016).
  Urban economists who use discrete choice methods rarely engage with continuous
  optimal transport geometry.

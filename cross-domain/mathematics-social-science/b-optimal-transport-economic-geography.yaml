id: b-optimal-transport-economic-geography
title: >
  Optimal transport theory (Kantorovich) and economic geography (Krugman core-periphery
  model) share the same mathematical structure ΓÇö spatial allocation of economic
  activity follows transport cost minimization, with bifurcations determining
  whether manufacturing concentrates or disperses.
status: established
fields:
  - mathematics
  - economics
  - social-science
  - economic-geography
  - optimal-transport
bridge_claim: >
  Kantorovich's optimal transport problem (minimize transport cost to move goods
  from producers to consumers) and Krugman's (1991) new economic geography share
  deep mathematical structure. Krugman's core-periphery model: two regions, two
  sectors (agriculture, manufacturing). Centripetal forces ΓÇö forward linkages
  (larger market attracts more firms ΓåÆ lower prices) and backward linkages (more
  firms attract workers ΓåÆ larger market) ΓÇö compete with centrifugal forces (land
  rents, congestion, agricultural immobility). The iceberg transport cost ╧ä:
  a fraction (1-╧ä) of goods "melts" in transit. Bifurcation at critical ╧ä_c:
  below ╧ä_c, manufacturing concentrates in one region (core-periphery); above,
  it disperses symmetrically. The Monge-Kantorovich transport problem in urban
  economics: redistribution of population across neighborhoods minimizes expected
  transport cost. Gravity model of trade: T_{ij} Γê¥ GDP_i^╬▒ ┬╖ GDP_j^╬▓ / d_{ij}^╬│ ΓÇö
  derivable from CES preferences (Dixit-Stiglitz) + iceberg costs (Anderson &
  van Wincoop 2003). Wasserstein barycenters (Fr├⌐chet means in optimal transport
  geometry): represent average spatial distribution of economic activity across
  cities ΓÇö emerging tool in urban economics and real estate analysis. The spatial
  equilibrium condition in urban economics (Rosen-Roback) is a special case of
  optimal transport: workers sort to maximize utility subject to location-specific
  wages and prices.
translation_table:
  - field_a_term: Monge-Kantorovich transport map
    field_b_term: optimal spatial sorting of workers and firms across locations
    note: the equilibrium spatial assignment maximizes welfare subject to transport costs
  - field_a_term: iceberg transport cost ╧ä (fraction surviving transit)
    field_b_term: transport cost parameterization in Dixit-Stiglitz-Krugman model
    note: iceberg formulation makes transport costs proportional to value ΓÇö tractable
  - field_a_term: Wasserstein distance W_p(╬╝, ╬╜)
    field_b_term: spatial discrepancy between two city's economic distributions
    note: WΓéé distance between housing price distributions summarizes spatial inequality differences
  - field_a_term: bifurcation at critical ╧ä_c (Krugman catastrophe)
    field_b_term: phase transition in spatial economic equilibrium
    note: below ╧ä_c, full agglomeration is only stable equilibrium; history determines which region wins
  - field_a_term: Wasserstein barycenter of multiple distributions
    field_b_term: average spatial economic distribution; regional policy counterfactuals
    note: barycenter minimizes total Wasserstein distance; useful for interpolating between city types

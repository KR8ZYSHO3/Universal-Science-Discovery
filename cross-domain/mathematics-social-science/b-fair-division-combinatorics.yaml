cross_pollination_opportunities:
  - >
    Truthful mechanism design for fair division (Procaccia & Wang 2014 approximation
    algorithms for envy-free cake cutting) uses LP relaxation and rounding — connecting
    to algorithmic game theory and convex optimization. The approximation ratio achievable
    by truthful algorithms is an open problem combining mechanism design, combinatorics,
    and algorithm theory.
  - >
    Chores division (dividing uniformly undesirable goods — housework, debt, environmental
    risk) reverses the envy constraint. The mathematics is dual to cake cutting but social
    applications (household bargaining, Superfund cleanup cost allocation) require different
    cultural and legal norm analysis.
communication_gap: >
  Fair division mathematics developed in economics and mathematics departments with minimal
  cross-citation. The combinatorics community (Sperner, Brouwer) developed fixed-point
  theorems without awareness of fair division applications. Procaccia's work on computational
  fair division began bridging computer science and economics starting ~2008 but fair
  division textbooks rarely present the Sperner's lemma connection.

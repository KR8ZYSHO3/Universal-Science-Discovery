cross_pollination_opportunities:
  - >
    Combining Kriging interpolation with causal inference (synthetic control method)
    could provide optimal counterfactual construction for regional policy evaluation
    — using the spatial correlation structure of outcomes to construct the best
    synthetic control region. This has not been systematically applied in
    spatial econometrics.
  - >
    Machine learning spatial prediction models (graph neural networks on spatial
    graphs) can be reinterpreted as learnable spatial weight matrices — connecting
    deep learning to spatial econometrics. Testing whether learned weight matrices
    converge to economic-theoretically motivated decay functions (gravity model)
    would validate both.
communication_gap: >
  Geostatistics developed in the mining and petroleum industry (Krige 1951,
  Matheron 1963) independently of spatial econometrics (Anselin 1988) and economic
  geography (Krugman 1991). The identity between Kriging and Gaussian process
  regression was not widely recognised in statistics until the 2000s (Rasmussen
  & Williams 2006). Economists rarely cite Moran (1950) or Tobler (1970).
  Regional scientists use spatial econometrics but rarely engage with geostatistical
  variogram theory. The Krugman bifurcation is rarely framed as a phase transition
  in statistical physics language, despite the identical mathematics.

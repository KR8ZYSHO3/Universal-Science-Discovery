cross_pollination_opportunities:
  - Apply spectral graph theory (Laplacian eigenvalues) to measure network efficiency — eigenvalue gap predicts epidemic spreading rate
  - Network formation game theory applied to co-authorship and citation networks to understand scientific community structure
  - Random graph models borrowed from physics (configuration model) applied to strategic network formation for tractable equilibrium analysis
communication_gap: >
  Graph theorists (mathematics, CS) and social network analysts (sociology,
  economics) developed largely separate literatures. Jackson's economic
  network formation theory explicitly bridges these but requires fluency in
  both game theory and graph theory. The Barabási-Albert model from physics
  is widely used in social science without connecting to the strategic
  formation literature.

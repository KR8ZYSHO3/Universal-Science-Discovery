related_hypotheses:
  - h-braess-paradox-social-network-cascades
cross_pollination_opportunities:
  - >
    Empirical peer-effects studies in education (value of high-ability classmates) require
    the Bramoulle exogeneity condition — a purely mathematical requirement about network
    structure. Sociologists collecting network data could specifically design studies to
    satisfy this condition, improving causal identification of policy-relevant spillovers.
  - >
    Dynamic network formation games (where link costs evolve with time) are well-studied
    in mathematics but rarely applied to real social networks. Longitudinal social network
    data (e.g., Add Health) could test whether real friendship networks converge to
    theoretical equilibria.
communication_gap: >
  Mathematical economists publish network formation theory in journals like Econometrica and
  Journal of Economic Theory; sociologists study social networks in Social Networks and
  American Sociological Review. The mathematical results on stability and efficiency are
  rarely transferred to empirical sociology, and empirical network data rarely inform
  theoretical refinements. Game theory training is uncommon in sociology PhD programs.
last_reviewed: "2026-05-06"

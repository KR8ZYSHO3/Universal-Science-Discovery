cross_pollination_opportunities:
  - >
    Multi-level selection theory (group selection vs. individual selection) is modelled
    by the multilevel Price equation. Applied to social institutions: when do groups
    (firms, nations) constitute a unit of selection analogous to biological groups?
    This has immediate implications for institutional design (corporations vs. markets vs.
    states as evolutionary units competing under replicator dynamics).
  - >
    Evolutionary dynamics on networks (Nowak & May 1992): spatial structure changes
    which strategies are ESS compared to well-mixed populations. For social networks,
    the network topology determines which norms are evolutionarily stable — explaining
    why the same behaviour can be stable in one culture but unstable in another with
    different network structure.
communication_gap: >
  Taylor & Jonker published in Mathematical Biosciences (applied mathematics); Maynard
  Smith published in Nature and in game theory monographs (biology). The connection
  to economics (Nash equilibria) was recognised slowly: Nash (1950) did not know about
  evolution, and biologists did not read economics. The Lotka-Volterra equivalence
  (Hofbauer 1981, in Journal of Mathematical Biology) was proven in a specialised
  mathematical biology journal that economists and physicists rarely read. The Price
  equation connecting to statistics (covariance) was published in Nature (1970) but
  rarely cited outside evolutionary biology for 20 years. Social scientists applying
  replicator dynamics to cultural evolution (Cavalli-Sforza, Boyd & Richerson) developed
  largely independently of the mathematical biology literature.

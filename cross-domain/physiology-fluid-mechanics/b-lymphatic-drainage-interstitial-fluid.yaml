id: b-lymphatic-drainage-interstitial-fluid
title: >
  Lymphatic capillary drainage of interstitial fluid is governed by Starling's revised principle: the balance of oncotic and hydrostatic pressures across the capillary wall drives net filtration that lymphatics must absorb, with lymphatic pumping modeled as a pressure-flow relationship analogous to fluid mechanics in compliant vessel networks
status: established
fields:
  - physiology
  - fluid-mechanics
bridge_claim: >
  Interstitial fluid homeostasis obeys the revised Starling equation J_v/A = L_p[(P_c - P_i) - σ(π_c - π_i)] where L_p is hydraulic conductivity, P_c and P_i are capillary and interstitial hydrostatic pressures, and π_c and π_i are colloid oncotic pressures; lymphatics drain this filtrate by generating a pressure gradient via intrinsic smooth muscle contractions (lymphangion pumping) that follows a Frank-Starling-like pressure-flow relationship — directly mapping fluid balance physiology onto Hagen-Poiseuille flow, compliant vessel mechanics, and oscillatory pump theory.
translation_table:
  - field_a_term: "Starling equilibrium at capillary wall (physiology)"
    field_b_term: "boundary condition for interstitial fluid pressure from Darcy flow through tissue (fluid mechanics)"
    note: "Tissue interstitium is modeled as a porous medium; Darcy's law with Starling source term describes interstitial flow"
  - field_a_term: "lymphangion contraction cycle (physiology)"
    field_b_term: "peristaltic pump driven by stretch-activated smooth muscle oscillations (fluid mechanics)"
    note: "Lymphangions exhibit Frank-Starling behavior: contraction frequency and stroke volume increase with filling pressure"
  - field_a_term: "interstitial fluid pressure P_i (physiology)"
    field_b_term: "pressure field in a porous medium coupled to lymphatic outlet boundary (fluid mechanics)"
    note: "P_i is ~-3 to -1 mmHg subatmospheric in normal tissue; edema occurs when P_i rises above ~0 mmHg"
  - field_a_term: "lymphedema (physiology)"
    field_b_term: "fluid accumulation due to lymphatic pump failure in a compliant porous medium (fluid mechanics)"
    note: "Lymphedema is modeled as failure of the lymphatic pressure-flow relationship to keep pace with Starling filtration"
communication_gap: >
  Physiologists study lymphatic function through clinical observations of lymphedema and animal lymph flow measurements while fluid mechanicists model flow in vessels and porous media; quantitative models of lymphatic pumping using fluid mechanics tools (FSI, peristaltic pump theory) are largely confined to biofluid mechanics journals not read by physiologists.

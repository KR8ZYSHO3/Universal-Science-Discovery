id: b-stellar-nucleosynthesis-periodic-table
title: >
  All chemical elements heavier than hydrogen and helium were forged in stars — the
  periodic table is a record of stellar evolution history, quantitatively explained
  by nuclear physics reactions in successive stellar environments.
status: established
fields:
  - astrophysics
  - chemistry
  - nuclear-physics
bridge_claim: >
  The Burbidge, Burbidge, Fowler & Hoyle (B²FH, 1957) paper established that stellar
  nucleosynthesis accounts for the cosmic abundance of all elements: pp-chain and CNO
  cycle produce helium in main-sequence stars; triple-alpha process fuses three helium
  nuclei into carbon at 10^8 K in red giants; alpha-process builds oxygen through calcium;
  r-process (rapid neutron capture in neutron star mergers, confirmed by GW170817 kilonova)
  produces gold, platinum, uranium; s-process (slow neutron capture in AGB stars) produces
  elements up to bismuth; p-process (proton capture) produces rare proton-rich isotopes.
  The cosmic abundance pattern — reproduced from the solar spectrum — is the integral of
  all these processes over stellar evolution history. Chemistry's periodic table is
  literally a record of astrophysical processes.
translation_table:
  - field_a_term: stellar interior temperature / density
    field_b_term: nuclear reaction rates (Gamow window)
    note: Tunneling through Coulomb barrier at stellar temperature selects which reactions occur
  - field_a_term: neutron capture cross-section
    field_b_term: elemental abundance ratio
    note: Large σ(n,γ) → low abundance at that mass number; abundance pattern directly encodes nuclear physics
  - field_a_term: r-process vs s-process path
    field_b_term: neutron-rich vs stable nuclide synthesis
    note: r-process produces elements far from stability; s-process follows the valley of stability
  - field_a_term: neutron star merger ejecta (kilonova)
    field_b_term: r-process chemical yield per event
    note: GW170817 confirmed ~0.05 solar masses of lanthanide-rich r-process ejecta
related_unknowns:
  - u-cgm-enrichment
related_hypotheses:
  - h-r-process-cgm-metal-enrichment
cross_pollination_opportunities:
  - >
    Meteoritics and isotope geochemistry: pre-solar grains in carbonaceous chondrites
    preserve isotopic signatures of individual stellar nucleosynthesis events. The
    chemistry of these grains provides direct observational tests of stellar evolution
    models — a cross-domain experiment impossible without the astrophysics-chemistry bridge.
  - >
    Neutron star merger rates from chemical evolution: comparing the [Eu/Fe] vs [Fe/H]
    trend in old stars to nucleosynthesis yield calculations constrains the merger delay
    time and rate independently of gravitational wave observations, providing a chemical
    fossil record of the merger history.
communication_gap: >
  Nuclear physicists, astrophysicists, and chemists measure abundances and model reactions
  but publish in separate communities. The quantitative connection between nuclear cross-
  sections measured at particle accelerators (FRIB, GSI) and observed stellar abundances
  requires both communities to engage — this is improving but cross-disciplinary papers
  remain rare.
last_reviewed: "2026-05-06"

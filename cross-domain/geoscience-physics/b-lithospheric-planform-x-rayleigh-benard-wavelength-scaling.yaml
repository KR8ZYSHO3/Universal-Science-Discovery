id: b-lithospheric-planform-x-rayleigh-benard-wavelength-scaling
title: >
  Horizontal wavelengths of convection rolls and cellular patterns in Rayleigh-Bénard experiments scale with layer thickness and fluid parameters via Busse–Clever–Kelly stability diagrams — motivating cautious comparison to characteristic lateral scales of plate-boundary networks and mantle flow heterogeneity inferred from seismic tomography, distinct from merely stating “mantle convection exists.”
status: proposed
fields:
  - geoscience
  - fluid-mechanics
  - geophysics
bridge_claim: >
  Laboratory RB convection selects planforms whose dominant horizontal wavenumber depends on Ra, Prandtl number, and boundary conditions — mantle convection lives at enormous Ra with complex rheology and internal heating, so literal roll-spacing equality fails — yet dimensional scaling literacy helps interpret why numerical mantle simulations exhibit finite spectral peaks in lateral velocity fields resembling wavelength selection in fluids experiments.
translation_table:
  - field_a_term: dominant horizontal wavevector k_* (RB stability theory / Busse balloon)
    field_b_term: spectral peaks in mantle velocity spherical harmonic degrees (tomography / models)
    note: Qualitative spectral-selection analogy — Earth-like viscosity contrasts reshape modes relative to lab water experiments.
  - field_a_term: aspect ratio Γ = diameter / layer thickness in RB tanks
    field_b_term: spherical harmonic degree ℓ mapping to lateral wavelength λ ≈ 2πR/ℓ for global modes
    note: Curvature and compressibility absent in planar RB — scaling comparisons require spherical harmonic filters.
  - field_a_term: Busse balloon marginal stability curves
    field_b_term: transitions between stagnant lid, episodic subduction, or mobile lid regimes in exoplanet convection surveys
    note: Both classify solution branches though mantle rheology introduces extra bifurcation parameters.
communication_gap: >
  Geodynamics seminars emphasize Nu(Ra) heat-flow scaling while fluid labs showcase spectacular RB planform movies — spectral-planform vocabulary crosses fields less often than integral heat-flow budgets do.
cross_pollination_opportunities:
  - Publish side-by-side spectra from laboratory RB at matched Ra bands (scaled) next to tomographic spherical harmonic spectra with transparent caveat panels.
  - Use RB wavelength-selection exercises in planetary science curricula before jumping to spherical shell codes.

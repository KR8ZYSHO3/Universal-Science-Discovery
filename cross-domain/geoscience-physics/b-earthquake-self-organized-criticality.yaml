cross_pollination_opportunities:
  - >
    Apply SOC early-warning indicators (variance increase, autocorrelation
    increase, b-value decrease) as real-time earthquake hazard metrics on
    dense seismic networks — a direct translation of criticality-approach
    indicators from statistical physics to operational seismology.
  - >
    Use the seismological depletion of the b-value before large earthquakes
    (Scholz 1968) to test whether the fault network departs from SOC as
    stress accumulates — a quantitative test of the sandpile analogy.
  - >
    Export Omori-law fitting methods to neuronal avalanche analysis:
    aftershock temporal clustering may predict recovery time in post-seizure
    cortical suppression using the same t^{-p} form.
  - >
    The Båth law (largest aftershock ≈ main shock − 1.2 magnitude units)
    can be derived from SOC mean-field theory — test whether BTW model
    predicts this offset to constrain universality class.

communication_gap: >
  Bak et al. published SOC in Physical Review Letters (1987) for physicists.
  Seismologists had Gutenberg-Richter since 1944 and Omori since 1894.
  Bak & Tang (1989) explicitly connected the two in Journal of Geophysical
  Research, but the connection remained peripheral to mainstream seismology,
  which uses empirical scaling laws without invoking criticality theory.
  The barrier is disciplinary: SOC language (universality classes, order
  parameters, renormalization group) is foreign to most geophysicists, who
  prefer phenomenological regression models. Cross-department training and
  joint publications are rare.


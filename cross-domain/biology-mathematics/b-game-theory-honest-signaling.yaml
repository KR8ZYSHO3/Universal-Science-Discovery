cross_pollination_opportunities:
  - Use agent-based evolutionary simulations to test whether Zahavian vs. Fisher
    dynamics produce empirically distinguishable ornament distributions (tail length
    distributions, repertoire size distributions) — enabling formal model selection
  - Apply Spence's job-market signaling model with Zahavian costs to human
    conspicuous consumption (luxury goods) — testing whether single-crossing
    conditions hold empirically across economic status gradients
  - Design multi-modal signaling experiments (combining visual and acoustic signals)
    in birds to test whether multi-modal signals follow the Zahavian composite
    cost prediction or the Fisher composite attractiveness prediction
  - Use phylogenetic comparative methods to test whether signal evolution rate
    correlates with parasite pressure across bird clades — as predicted by
    honest immune-condition signaling
communication_gap: >
  Zahavi's 1975 paper was published in Journal of Theoretical Biology and initially
  received skeptically by evolutionary biologists, while Spence's independent 1973
  formalization appeared in Quarterly Journal of Economics. The mathematical
  equivalence between labor market signaling and animal honest signaling was not
  widely recognized until Grafen (1990) in Journal of Theoretical Biology and
  Maynard Smith (1991) in Animal Behaviour. Spence shared the 2001 Nobel in
  Economics for the signaling work; Zahavi's biological version remains under-
  appreciated outside behavioral ecology. Economists and evolutionary biologists
  still rarely cite each other's literatures on signaling.

cross_pollination_opportunities:
  - >
    Phylogenetic neural networks (PhyloNet, PASTA, graph neural networks on tree
    structures) use the tree topology as a prior for representation learning of
    biological sequences — combining the Felsenstein likelihood with deep learning
    embeddings. This may break the independence-across-sites assumption of standard
    models by learning coevolving site patterns.
  - >
    Phylogenetics of cultural evolution: applying maximum likelihood tree inference
    to vocabulary cognate matrices (language families), manuscript traditions (stemma
    codicum), and musical traditions tests whether cultural change obeys Markov
    substitution dynamics analogous to molecular evolution. Bayesian phylolinguistics
    (Gray & Atkinson 2003, Indo-European root dating) has already made this bridge.
communication_gap: >
  Felsenstein (1981) published in J Mol Evol, a specialist journal inaccessible to
  most mathematicians and statisticians. The equivalence between phylogenetic pruning
  and the forward algorithm for HMMs was not noted until the late 1990s, causing
  independent development of computational methods in both fields. Bayesian
  phylogenetics (MrBayes 2001) was initially resisted by some systematists sceptical
  of Bayesian methods — a philosophical dispute from statistics that delayed adoption.
  The BEAST software (Drummond & Rambaut 2007) democratised Bayesian molecular-clock
  analysis but is still regarded as a specialised bioinformatics tool rather than
  a Bayesian graphical model by the statistics community.

related_hypotheses:
  - h-rlde-satellite-colony-invasion-acceleration-branching-process
cross_pollination_opportunities:
  - >
    Mathematical theory of pushed vs. pulled waves (Stokes 1976, van Saarloos 2003)
    predicts that Allee effects convert pulled invasions to pushed ones — changing
    not just the speed but the genetic composition of the spreading wave. Population
    geneticists could test this prediction (lower genetic diversity at invasion
    front in pushed vs. pulled waves) using whole-genome sequencing of invasion
    fronts in well-documented invasions (cane toads in Australia, kudzu in the
    southeastern US).
  - >
    Climate change is shifting the geographic range of invasive species. IDE models
    with time-varying r(t) and D(t) (from climate projections) could predict
    future invasion rates — requiring collaboration between mathematical ecologists
    and climate modelers. The key unknown is whether dispersal kernels are fat-
    tailed enough to produce accelerating invasions in novel climate conditions.
communication_gap: >
  Mathematical PDE theory of traveling waves (published in Ann Math, J Diff Eq,
  SIAM J Math Anal) uses functional analysis and existence proofs inaccessible
  to most ecologists. Invasion biologists publish in Ecology, Biological Invasions,
  and Global Change Biology, where mathematical rigor is less central. The KPP
  theorem (1937, in Russian in Bulletin of Moscow State University) took decades
  to enter Western ecology literature. Fat-tailed dispersal and IDE theory were
  not widely known to ecologists until Kot et al. (1996) — despite the mathematics
  being known to probabilists for decades. Empiricists measuring invasion fronts
  rarely have access to the statistical tools needed to distinguish constant-speed
  from accelerating invasions.

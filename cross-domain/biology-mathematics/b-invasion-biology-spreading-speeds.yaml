id: b-invasion-biology-spreading-speeds
title: >
  Fisher's reaction-diffusion equation and the Kolmogorov-Petrovsky-Piskunov theorem
  set the asymptotic spreading speed c* = 2√(rD) for invasive species, while
  integrodifference equations with fat-tailed dispersal kernels predict accelerating
  invasions — unifying mathematical wave propagation theory with invasion biology.
status: established
fields:
  - biology
  - mathematics
  - ecology
  - applied-mathematics
bridge_claim: >
  The spread of invasive species is governed by the same mathematics as reaction-
  diffusion traveling waves. Fisher (1937) and Kolmogorov-Petrovsky-Piskunov (KPP,
  1937) independently showed that the equation ∂N/∂t = rN(1-N/K) + D∇²N —
  combining logistic population growth with Fickian diffusion — admits traveling
  wave solutions N(x,t) = N(x - ct) for all speeds c ≥ c* = 2√(rD). The minimum
  speed c* is selected by initial conditions with compact support (localized invasion
  front), making it the observable spreading speed for biological invasions.

  Integrodifference equations (IDEs) generalize this to organisms with discrete
  generations: N_{t+1}(x) = ∫ k(x-y) f(N_t(y)) dy, where k is the dispersal
  kernel and f is the growth function. Kot et al. (1996) showed that for thin-tailed
  kernels (finite moment generating function), the spreading speed is given by
  c* = min_s [ln(r·M_k(s))/s] where M_k(s) = ∫ e^{sx} k(x)dx is the moment
  generating function. For fat-tailed kernels (e.g., power-law or Cauchy), M_k(s)
  diverges for all s > 0, and there is no constant spreading speed — instead,
  invasions accelerate through time. This explains observed power-law spread of
  chestnut blight, Dutch elm disease, and zebra mussels.

  Stratified dispersal (rare long-distance events — RLDE) superimposes a jump
  process on local diffusion: occasional long-range propagules (birds carrying seeds,
  ballast water transport) create satellite colonies ahead of the main front. The
  effective spreading speed of stratified dispersal is determined by the establishment
  probability of satellite colonies times the RLDE rate — a quantity tractable
  through branching process theory in mathematics.
translation_table:
  - field_a_term: reaction rate r (per capita growth rate at low density)
    field_b_term: population growth parameter in logistic equation
  - field_a_term: diffusion constant D (mean squared displacement per unit time / 2d)
    field_b_term: local dispersal intensity of organism per generation
  - field_a_term: minimum wave speed c* = 2√(rD)
    field_b_term: asymptotic invasion front velocity observable in field surveys
  - field_a_term: dispersal kernel k(x) (probability distribution of displacement)
    field_b_term: wave packet shape in dispersive wave equation
  - field_a_term: fat-tailed kernel (power-law, Cauchy) → divergent M_k(s)
    field_b_term: superdiffusive process → accelerating spread (no constant speed)
  - field_a_term: pulled wave (speed set by leading edge dynamics)
    field_b_term: invasive spread controlled by low-density growth at front
  - field_a_term: pushed wave (speed set by interior dynamics)
    field_b_term: Allee effect — invasion stalls unless population exceeds threshold

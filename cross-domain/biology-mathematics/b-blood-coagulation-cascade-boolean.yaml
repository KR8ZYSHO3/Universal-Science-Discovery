cross_pollination_opportunities:
  - "Personalized anticoagulation: ODE models of coagulation with patient-specific factor levels (from clotting assays) can predict optimal warfarin dosing to achieve target PT/INR, connecting systems biology bistability theory to precision medicine."
  - "Disseminated intravascular coagulation (DIC): pathological cascade activation is modeled as the system being trapped in the ON state by sustained stimulus — bistability theory predicts the stimulus intensity needed to escape DIC using thrombomodulin or anticoagulant infusion."
communication_gap: >
  Hematologists and intensivists who manage coagulation clinically have detailed
  knowledge of the cascade components but do not typically use bistability or
  Boolean network theory to understand threshold behavior and treatment logic.
  Mathematical biologists who publish coagulation ODE models are largely
  uncited in clinical hematology despite providing mechanistic predictions
  for factor replacement therapy thresholds.

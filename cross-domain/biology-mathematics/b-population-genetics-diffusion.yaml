cross_pollination_opportunities:
  - >
    Stochastic gene expression: the same Fokker-Planck formalism applies to
    protein concentration fluctuations in single cells (chemical Langevin equation),
    connecting population genetics mathematics to single-cell biology.
  - >
    Cancer evolution: applying Wright-Fisher diffusion to somatic cell populations
    in tumors (N = tumor size, s = driver mutation advantage) — predicting
    fixation times for oncogenic mutations in cancer progression models.
  - >
    Ancestral inference (coalescent theory): time-reversal of the diffusion
    equation gives the Kingman coalescent backward-in-time genealogy — the
    mathematical foundation for MCMC-based phylogenetics and ancient DNA analysis.
communication_gap: >
  Kimura's diffusion approximation was developed by a geneticist (with formal
  physics training) writing primarily for mathematical geneticists. Population
  geneticists routinely apply the diffusion framework but do not always connect
  it to the broader Fokker-Planck literature in physics and stochastic processes.
  Conversely, physicists studying stochastic dynamics rarely know that Kimura's
  fixation formula is an exact solution to their standard equation. The connection
  to Dirichlet processes (Bayesian nonparametrics) via the Ewens sampling formula
  is known in mathematical statistics but not well-known in evolutionary biology.

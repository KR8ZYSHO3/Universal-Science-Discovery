id: b-game-theory-immune-evasion
title: "Evolutionary game theory and immune evasion — host-pathogen arms races are co-evolutionary games whose dynamics follow replicator equations and ESS theory"
status: proposed
fields:
  - biology
  - mathematics
  - immunology
  - evolutionary-biology
  - game-theory

bridge_claim: >
  Pathogens and immune systems are engaged in a co-evolutionary arms race formally
  describable as a repeated evolutionary game. Pathogen antigenic variation = mixed
  strategy in the immune evasion game: randomizing surface antigens prevents adaptive
  immune recognition. Immune memory = commitment device that shifts the game's payoff
  matrix. The Red Queen hypothesis (Van Valen 1973): hosts and parasites co-evolve in
  a zero-sum game where fitness improvements by one player are immediately cancelled
  by the other's counter-adaptations — constant running to stay in place. The
  co-evolutionary dynamics are governed by replicator equations: ẋ_i = x_i[f_i(x) - f̄(x)]
  where x_i is the frequency of strain i and f_i is its fitness given the current host
  immune landscape. This produces limit cycles (frequency-dependent selection oscillations)
  identical to rock-paper-scissors games in evolutionary game theory. Immune escape
  mutations = strategy deviations; immunodominance = coordination equilibrium.
  ESS (evolutionarily stable strategy) predicts the diversity of immune escape mutations
  maintained at equilibrium. This bridge connects immunology to mathematical game theory
  and provides a unified framework for understanding vaccine escape, HIV diversity,
  and influenza antigenic drift.


communication_gap: >
  Evolutionary game theory was developed by Maynard Smith with biological applications
  in mind, but immunology adopted it slowly. Nowak & May (1994) applied replicator
  dynamics to viral diversity but the framework remained niche. Immunologists primarily
  use empirical approaches rather than game-theoretic models. The mathematics of
  frequency-dependent selection and ESS is standard in population genetics but
  infrequently taught in immunology graduate programs.


cross_pollination_opportunities:
  - >
    The connection between policy gradient reinforcement learning and replicator
    dynamics suggests that ML algorithms could be improved by importing evolutionary
    biology concepts. Natural selection maintains diversity through mechanisms absent
    from standard RL (sexual recombination ↔ crossover in genetic algorithms, mutation
    load ↔ exploration noise, frequency-dependent selection ↔ opponent shaping in
    multi-agent RL). Multi-agent RL systems might benefit from explicit frequency-
    dependent payoffs (ESS targeting) to avoid the Nash equilibria that lead to
    non-cooperative outcomes in social dilemmas.
  - >
    The Price equation has been applied to cultural evolution (Henrich), machine
    learning (gradient descent as selection), and economics (market selection for
    efficient firms). A unified Price-equation framework for all adaptive systems
    (biological, cultural, economic, and computational) would provide a common language
    for comparing evolutionary dynamics across substrates. Specific prediction:
    any system described by the Price equation will exhibit "Simpson's paradox" in
    which group-level and individual-level selection conflict — predicting conditions
    for cooperation failures in firms, societies, and multi-agent AI systems.
  - >
    The error threshold in quasispecies theory (Eigen 1971) sets the maximum mutation
    rate at which heritable information is preserved. The same threshold exists in the
    replicator-mutator equation for cultural evolution: if cultural copying errors
    exceed the threshold, cultural information decays faster than selection can maintain
    it. This has direct implications for digital information transmission (social media
    noise may exceed the cultural error threshold for specific information types) and
    for AI model distillation (student model error rate must remain below the threshold
    for teacher-knowledge to be preserved).
communication_gap: >
  Taylor & Jonker (1978) published the replicator dynamics in Mathematical Biosciences;
  the connection to Nash equilibria was noted by game theorists later. Population
  geneticists and evolutionary game theorists develop parallel mathematical frameworks
  (Wright-Fisher vs. replicator dynamics) without realising they are the same equations.
  The connection to reinforcement learning (Sutton & Barto, Williams 1992) was made
  in the ML community without reference to evolutionary biology. Hofbauer & Sigmund
  (1998) is the definitive reference synthesising the connections, but it is not
  widely read outside mathematical biology. The Price equation is taught in evolutionary
  biology but rarely connected to RL theory in machine learning courses.

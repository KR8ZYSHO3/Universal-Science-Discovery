cross_pollination_opportunities:
  - >
    High-frequency trading: empirical testing of whether HFT arrival has pushed
    real markets closer to or further from α_c — measuring the minority game
    phase of real order books using intraday data.
  - >
    Mechanism design for market microstructure: knowing the minority game
    phase diagram allows designing trading rules (tick sizes, latency floors)
    that push markets into the efficient phase while minimizing volatility.
  - >
    Grand unified theory of speculation: combining minority game (competition)
    with herding models (imitation) and noise trader models (irrational agents)
    to produce a complete statistical physics of financial markets.
communication_gap: >
  Statistical physicists (Challet, Zhang, Coolen) published minority game results
  in physics journals (Physica A, PRL) with replica method notation unfamiliar to
  economists. Economists familiar with game theory and market microstructure rarely
  read Physica A. The finance literature on market efficiency remained largely
  unaware of the exact phase transition result for two decades, despite its direct
  relevance to the EMH debate.

id: b-minority-game-market-microstructure
title: >
  The minority game (Challet–Zhang) is an exactly solvable model of financial
  market competition whose phase transition at critical ratio α_c = P/N reproduces
  the efficient market boundary — spin glass theory via the replica method provides
  the analytic solution.
status: established
fields:
  - physics
  - statistical-mechanics
  - economics
  - market-microstructure
  - complex-systems
bridge_claim: >
  The minority game (Challet & Zhang 1997): N agents repeatedly choose between two
  options (buy/sell); agents in the minority win — capturing the essence of financial
  competition: if everyone does the same thing, nobody profits. The key parameter is
  α = P/N where P = 2^m is the number of distinct market histories of length m and N
  is the number of agents. At a critical α_c, the game exhibits a continuous phase
  transition: below α_c (few strategies relative to agents) the market is inefficient
  — predictable patterns persist and can be exploited; above α_c (many strategies),
  the market is efficient — fluctuations are random and no systematic profit is
  possible. This phase boundary corresponds exactly to the Efficient Market Hypothesis
  boundary. The minority game is formally equivalent to a disordered spin system
  (quenched disorder = strategy assignments); the replica method from spin glass theory
  solves it exactly, yielding the volatility σ²(α), the fraction of agents using each
  strategy, and the nature of the phase transition. The market's "informationally
  efficient" phase corresponds to the paramagnetic phase; the "herding" phase
  corresponds to a spin glass phase where agents coordinate suboptimally.
translation_table:
  - field_a_term: spin glass (disordered magnetic system with quenched disorder)
    field_b_term: financial market with heterogeneous strategy-holding agents
    note: quenched disorder = irreversible strategy assignments at game start
  - field_a_term: replica method (spin glass analytic solution)
    field_b_term: exact solution of minority game equilibrium statistics
    note: replica trick averages over strategy disorder to compute global market statistics
  - field_a_term: paramagnetic phase (disordered spins, T > T_c)
    field_b_term: efficient market phase (random fluctuations, no exploitable patterns)
  - field_a_term: spin glass phase (frozen disorder, T < T_c)
    field_b_term: herding/trend phase (persistent patterns, exploitable inefficiency)
  - field_a_term: critical temperature T_c
    field_b_term: α_c = P/N (strategies per agent) — EMH boundary
  - field_a_term: volatility in spin glass phase
    field_b_term: excess volatility in financial markets (volatility puzzle)
  - field_a_term: frustration (competing interactions in spin glass)
    field_b_term: conflicting strategies among agents — no stable equilibrium

id: b-entropy-maximization-x-income-distribution
title: >
  Maximum entropy x Income distribution - Boltzmann-Gibbs distribution of wealth
status: proposed
fields:
  - physics
  - economics
  - statistical_mechanics
  - econophysics
bridge_claim: >
  The equilibrium income distribution in a closed economy with random pairwise wealth
  exchanges follows the Boltzmann-Gibbs exponential distribution — the same maximum
  entropy distribution as particle energies in an ideal gas at thermal equilibrium;
  deviations (Pareto power-law tails for the wealthy) correspond to 'condensation' of
  wealth analogous to Bose-Einstein condensation, where a finite fraction of total wealth
  concentrates in a vanishing fraction of agents above a critical saving propensity.
translation_table:
  - field_a_term: income distribution P(m) in market economy (economics)
    field_b_term: Maxwell-Boltzmann energy distribution P(E) in ideal gas (statistical mechanics)
    note: For random exchange models, P(m) = (1/T) exp(-m/T) where T is mean income; identical to ideal gas energy distribution
  - field_a_term: pairwise wealth transfer in market transaction (economics)
    field_b_term: binary elastic collision conserving total energy (statistical mechanics)
    note: Random money exchange (Dragulescu-Yakovenko) maps to elastic collisions; money-conservation maps to energy-conservation
  - field_a_term: Gini coefficient measuring income inequality (economics)
    field_b_term: entropy deficit from maximum entropy Boltzmann distribution (stat mech)
    note: The Gini coefficient for Boltzmann distribution = 0.5; deviations above 0.5 indicate wealth condensation analogous to BEC
  - field_a_term: Pareto power-law tail (top 1% wealth) (economics)
    field_b_term: Bose-Einstein condensation in wealth distribution models (statistical mechanics)
    note: Saving propensity lambda above critical value causes power-law tail; condensate fraction = (lambda - lambda_c)/lambda
communication_gap: >
  Economists studying income distribution (Pareto 1897, Gibrat 1931) and statistical
  physicists studying maximum entropy distributions worked independently; Dragulescu and
  Yakovenko (2001) demonstrated the ideal gas analogy for income distributions, launching
  econophysics as a field — but mainstream economics resists the approach, arguing that
  agents have preferences and strategic behavior rather than random collision dynamics,
  leaving the validity boundary unresolved.
cross_pollination_opportunities:
  - Apply non-equilibrium statistical mechanics (entropy production, fluctuation theorems) to model wealth dynamics in economies with external driving (technological shocks, globalization)
  - Use phase transition theory from statistical mechanics to predict critical saving propensity thresholds above which Pareto tails emerge, informing tax policy for inequality reduction

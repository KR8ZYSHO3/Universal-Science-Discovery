id: b-lyapunov-divergence-x-bank-run-amplification
title: >
  Positive Lyapunov exponents and finite-time divergence in dynamical systems ↔ feedback amplification and
  panic acceleration in bank-run models (dynamical systems ↔ economics; heavy caveats)
status: proposed
fields:
  - dynamical-systems
  - economics
  - finance
  - mathematical-modeling
bridge_claim: >
  Classical bank-run models (Diamond–Dybvig style) and their modern network extensions can exhibit multiple
  equilibria and sharp transitions when beliefs or liquidity shocks cross thresholds. Nearby trajectories in
  stylized belief–withdrawal dynamics can separate rapidly, echoing finite-time sensitivity familiar from
  chaotic systems with positive Lyapunov exponents. **Caveats:** socioeconomic systems are not flows of a
  known smooth vector field; “Lyapunov time” here is at best a metaphor for how quickly small differences in
  early withdrawals or news credibility propagate to large divergence in outcomes. Institutional backstops
  (deposit insurance, lender-of-last-resort) change the phase portrait qualitatively. The bridge should be
  used to import caution about sensitivity and early warning, not to claim literal chaos proofs for markets.
translation_table:
  - field_a_term: Lyapunov exponent lambda > 0
    field_b_term: rapid amplification of withdrawal rates after a credibility shock
    note: Metaphorical unless a validated low-dimensional reduction exists.
  - field_a_term: basin of attraction
    field_b_term: self-fulfilling run equilibrium region
    note: Multiple equilibria complicate direct dynamical-systems language.
  - field_a_term: bifurcation parameter crossing
    field_b_term: policy threshold where insurance credibility flips
    note: Structural breaks dominate smooth chaos pictures.
related_unknowns:
  - u-financial-lyapunov-time-versus-policy-interventions
related_hypotheses:
  - h-bank-run-lyapunov-time-shrinks-with-public-information-leaks
cross_pollination_opportunities:
  - Apply early-warning indicators from dynamical systems (variance growth, flickering) to high-frequency payment-system stress dashboards with explicit false-positive budgets.
  - Use run-game experiments to test whether small-seed withdrawal shocks show superlinear divergence absent backstops.
communication_gap: >
  Heavy caveats. Economists emphasize beliefs, institutions, and game theory; physicists emphasize attractors
  and ergodicity assumptions that rarely hold in social data. Cross-talk risks sounding glib without
  institutional detail.
references:

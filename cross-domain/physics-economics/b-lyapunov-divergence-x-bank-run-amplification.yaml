    note: "Diamond & Dybvig (1983) — bank runs, deposit insurance, and liquidity (JPE)."
  - doi: "10.1038/35102715"
    note: "Mantegna & Stanley (1995) — scaling behaviour in economic dynamics (Nature)."
last_reviewed: "2026-05-07"

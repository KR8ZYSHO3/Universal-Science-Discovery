cross_pollination_opportunities:
  - "Measure D_KL(forward||reverse) for historical price series across market regimes to test whether irreversibility predicts future volatility"
  - "Apply Jarzynski equality to options pricing under transaction costs to derive a non-equilibrium correction to Black-Scholes"
  - "Use entropy production as a market stress indicator — elevated irreversibility may predict liquidity crises"

communication_gap: >
  Non-equilibrium statistical mechanics (Jarzynski, Crooks, Seifert) is a rapidly
  developing physics field largely unknown to financial economists. Econophysics
  researchers (Mantegna, Stanley, Sornette) have made the equilibrium statistical
  mechanics analogy (partition function ↔ option price) well-known, but the
  non-equilibrium extension — where irreversibility is the central concept — remains
  a frontier. The Malkiel efficient market hypothesis is a verbal equilibrium claim;
  the non-equilibrium framework provides a quantitative test of departures from it.


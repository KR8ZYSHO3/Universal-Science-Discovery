id: b-entropy-production-market-irreversibility
title: "Non-equilibrium statistical mechanics ↔ financial market irreversibility — entropy production in price dynamics"
status: proposed
fields:
  - statistical-physics
  - thermodynamics
  - financial-economics
  - econophysics
  - market-microstructure

bridge_claim: >
  Financial markets are fundamentally irreversible dynamical systems: transaction
  costs, bid-ask spreads, market impact, and information asymmetry make price
  dynamics time-asymmetric — the statistical distribution of forward price paths
  differs from that of time-reversed paths. This irreversibility is precisely
  characterised by entropy production from non-equilibrium statistical mechanics:
  the rate of entropy production dS/dt > 0 quantifies the arrow of time. The
  Kullback-Leibler divergence D_KL(P_forward || P_reverse) between the forward
  and time-reversed price path distributions measures the irreversibility of
  the market process — and equals the mean entropy production per unit time.
  The Crooks fluctuation theorem (1999) relates the probability of entropy-reducing
  (arbitrage-like) fluctuations to their magnitude: P(−ΔS)/P(+ΔS) = e^{−ΔS/k_B}.
  Applied to markets: apparent arbitrage opportunities are transient entropy-decreasing
  fluctuations that dissipate exponentially with a rate set by market efficiency.
  Jarzynski's equality (1997) connects equilibrium free-energy differences to
  non-equilibrium work, with a direct analogue to no-arbitrage pricing of derivatives.
  The framework is a genuinely proposed bridge — the mathematical analogies are
  precise but empirical validation of the full thermodynamic programme for markets
  remains incomplete.

translation_table:
  - field_a_term: "entropy production rate dS/dt > 0"
    field_b_term: "market irreversibility / time-asymmetry of returns"
    note: "Measured via KL divergence between forward and time-reversed return distributions"
  - field_a_term: "Kullback-Leibler divergence D_KL(P_fwd||P_rev)"
    field_b_term: "statistical arrow of time in price dynamics"
    note: "Patzelt & Pawelzik (2013) measured this in forex markets; found significant irreversibility"
  - field_a_term: "Crooks fluctuation theorem P(-ΔS)/P(+ΔS) = e^{-ΔS}"
    field_b_term: "arbitrage probability decays exponentially with profit size"
    note: "Large apparent arbitrage opportunities are exponentially rare — efficient market as thermodynamic law"
  - field_a_term: "Jarzynski equality ⟨e^{-W/kT}⟩ = e^{-ΔF/kT}"
    field_b_term: "risk-neutral pricing of derivatives (no-arbitrage condition)"
    note: "Both are exact equalities relating non-equilibrium averages to equilibrium quantities"
  - field_a_term: "free energy F = U − TS (Helmholtz)"
    field_b_term: "risk-adjusted price (price minus risk premium)"
    note: "Proposed analogy: free energy as fair price; entropy as risk; internal energy as expected payoff"
  - field_a_term: "equilibrium thermal fluctuations (kT scale)"
    field_b_term: "market microstructure noise (tick size scale)"
    note: "Both set the floor for irreducible fluctuations in their respective systems"


id: b-chemical-potential-utility-maximization
title: >
  Chemical potential equalization at thermodynamic equilibrium is formally identical to
  marginal utility equalization in consumer utility maximization: both are gradient-descent
  conditions on the same class of strictly convex potential function, uniting thermodynamics
  and neoclassical economics through the mathematics of convex optimization
status: established
fields:
  - thermodynamics
  - economics
  - statistical-mechanics
  - mathematical-economics
bridge_claim: >
  At thermodynamic equilibrium, the chemical potential μᵢ = (∂G/∂nᵢ)_{T,P} equalizes across
  all coexisting phases (μᵢᵅ = μᵢᵝ), minimizing the Gibbs free energy G(T,P,{nᵢ}); in consumer
  theory, utility maximization subject to a budget constraint requires equalizing marginal
  utilities per dollar MUᵢ/pᵢ = λ (the Lagrange multiplier) across all goods, maximizing
  U({xᵢ}); both conditions arise from the Karush-Kuhn-Tucker optimality conditions on a
  strictly convex objective function and are equivalent mathematical structures, revealing
  that Walrasian general equilibrium is a thermodynamic equilibrium condition in disguise.
translation_table:
  - field_a_term: "chemical potential μᵢ = ∂G/∂nᵢ (thermodynamics)"
    field_b_term: "marginal utility per dollar MUᵢ/pᵢ (economics)"
    note: "Both measure the incremental gain in the objective (G or -U) from adding one unit of component i; equalization across phases/goods is the equilibrium condition in both frameworks"
  - field_a_term: "Gibbs free energy G(T,P,{nᵢ}) minimization (thermodynamics)"
    field_b_term: "utility U({xᵢ}) maximization subject to budget constraint (economics)"
    note: "Both are convex optimization problems on the same mathematical class; the Legendre transform relates thermodynamic potentials just as expenditure and indirect utility functions are Legendre duals"
  - field_a_term: "phase coexistence — phases α and β at equilibrium (thermodynamics)"
    field_b_term: "market equilibrium — supply equals demand at price vector p* (economics)"
    note: "Phase coexistence requires μᵢᵅ = μᵢᵝ for all species i; Walrasian equilibrium requires MUᵢ/pᵢ = λ for all goods i; both enforce the same equimarginal principle"
  - field_a_term: "activity coefficient γᵢ correcting for non-ideal mixing (thermodynamics)"
    field_b_term: "price distortion or externality shifting marginal cost from price (economics)"
    note: "Activity coefficients modify ideal chemical potential just as taxes/subsidies modify the effective price signal in utility maximization"
  - field_a_term: "Le Chatelier's principle — system resists perturbation by shifting equilibrium (thermodynamics)"
    field_b_term: "substitution effect — consumers substitute away from price-increased goods (economics)"
    note: "Both are second-order stability conditions on the convex potential; Slutsky matrix negative semi-definiteness is the economic analog of thermodynamic stability inequalities"
communication_gap: >
  The formal mathematical equivalence between thermodynamic and economic equilibrium was
  recognized by Samuelson (1947) and explored by Georgescu-Roegen (1971), but remains
  outside standard training in both thermodynamics and economics curricula. Thermodynamicists
  rarely study microeconomic theory; economists rarely encounter the Gibbs-Duhem equation.
  The connection is treated as analogy in interdisciplinary texts rather than as a structural
  identity with predictive implications.
cross_pollination_opportunities:
  - "Importing phase diagram methodology (lever rule, miscibility gaps, spinodal decomposition)
    into economic modeling to predict market segregation, portfolio clustering, and demand
    discontinuities at critical prices"
  - "Using thermodynamic stability analysis (Hessian positive semi-definiteness of G) to
    derive new testable restrictions on consumer demand systems beyond Slutsky symmetry"
  - "Applying statistical mechanical foundations of chemical potential (partition functions,
    ensemble averages) to derive economic equilibria from agent-level heterogeneity distributions,
    bridging microeconomics and econophysics"

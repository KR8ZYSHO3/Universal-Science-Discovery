    note: "Kubo (1957) — fluctuation–dissipation theorem (statistical mechanics anchor)."
  - doi: "10.1038/35102715"
    note: "Mantegna & Stanley (1995) — scaling behaviour of economic dynamics (Nature)."
last_reviewed: "2026-05-07"

id: b-green-kubo-correlations-x-return-volatility-memory
title: >
  Green–Kubo fluctuation–dissipation links between equilibrium time correlations and transport coefficients ↔
  autocorrelation structure of returns and volatility clustering in market microstructure (statistical physics ↔ finance; partly speculative)
status: proposed
fields:
  - statistical-physics
  - finance
  - econophysics
bridge_claim: >
  Green–Kubo relations express transport coefficients as integrals of equilibrium current–current correlators.
  Empirical finance documents long-memory and clustering in absolute returns, motivating loose parallels to
  correlation integrals and effective “response” functions. **Speculative layer:** markets are not equilibrium
  ensembles of a known Hamiltonian; stationarity fails around crises. The bridge is therefore methodological:
  import care about fluctuation spectra, windowing, and sum rules when interpreting volatility as a
  generalized susceptibility, without claiming a literal Kubo formula for prices.
translation_table:
  - field_a_term: equilibrium time-correlation function <J(t)J(0)>
    field_b_term: return autocovariance function (possibly absolute returns)
    note: Analogy of correlation integral structure, not equality of observables.
  - field_a_term: transport coefficient from integrated correlator
    field_b_term: realized variance integrated over horizons (rough analogy)
    note: Risk horizons echo correlation time integrals only heuristically.
  - field_a_term: fluctuation–dissipation temperature
    field_b_term: effective noise intensity in stochastic volatility models
    note: Parameter identification is not a physical temperature.
related_unknowns:
  - u-fluctuation-dissipation-stationary-market-assumption-breakdown
related_hypotheses:
  - h-volatility-autocorrelation-satisfies-effective-fd-response
cross_pollination_opportunities:
  - Apply spectral sum-rule diagnostics from statistical mechanics to test for spurious long memory induced by microstructure noise.
  - Export Hawkes-process volatility models to physics communities studying self-exciting point processes.
communication_gap: >
  Physicists assume detailed balance regimes; markets exhibit strategic feedback and regime shifts. Joint
  papers exist in econophysics but mainstream finance and mathematical physics still talk past each other on
  identifiability.
references:

id: b-minority-game-x-market-microstructure
title: Minority game ↔ Market microstructure — agent heterogeneity as market efficiency
status: proposed
fields:
- economics
- physics
bridge_claim: The minority game (Challet & Zhang 1997) — where agents must independently choose the minority side to win —
  produces a phase transition between efficient (random) and inefficient (exploitable) markets as a function of agent memory;
  this maps directly to market microstructure theory of informed vs noise traders.
translation_table:
- field_a_term: minority game memory m (number of past outcomes agents remember)
  field_b_term: market information ratio α = P/N (prediction resources per agent)
  note: 'Phase transition at α_c ≈ 0.34; below α_c: inefficient (exploitable); above: efficient (random)'
- field_a_term: minority game phase transition (from exploitable to random phase)
  field_b_term: EMH strong-to-weak efficiency transition in market microstructure
  note: 'Below threshold: price predictability exists (technical analysis profitable); above: random walk'
- field_a_term: minority game strategy (mapping from history to binary action)
  field_b_term: trading rule / technical analysis indicator in market microstructure
  note: Agents with more strategies correspond to informed traders with better prediction capacity
- field_a_term: attendance fluctuation σ² in minority game (volatility proxy)
  field_b_term: market price volatility (bid-ask spread, trading volume fluctuation)
  note: Volatility minimum at phase transition point α_c — maximum market efficiency corresponds to minimum exploitability
cross_pollination_opportunities:
- Apply minority game phase diagram to cryptocurrency market microstructure — predict when altcoin markets cross the α_c threshold
  as number of active algorithmic traders increases, transitioning from exploitable to efficient.
- Use replica method from minority game statistical physics to analytically compute the information capacity of financial
  markets as a function of trader heterogeneity — providing a first-principles derivation of market efficiency from agent
  theory.
communication_gap: The minority game was invented by physicists (Challet & Zhang 1997, Physica A) and analysed using spin
  glass theory and replica methods — methods entirely foreign to financial economists. Market microstructure theory (Kyle
  1985, Glosten-Milgrom 1985) uses game theory and information economics. The two communities independently developed nearly
  identical models of informed-vs-noise-trader markets without cross-citation, despite the minority game being an exact mathematical
  model of the Kyle framework.

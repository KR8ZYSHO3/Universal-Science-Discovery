id: b-preference-elicitation-x-vickrey-auction
title: Dominant-strategy truthful mechanisms such as the Vickrey auction and VCG payments
  connect preference elicitation in economics to algorithmic mechanism design in computer
  science.
status: established
fields:
- mechanism-design
- microeconomics
- computer-science
- game-theory
bridge_claim: 'In a second-price sealed-bid auction, truthful bidding is a weakly dominant
  strategy: bidders should bid their values. Vickrey–Clarke–Groves mechanisms generalize this
  idea to allocate discrete goods and charge externality-based payments so truth-telling remains
  dominant under quasi-linear utility. Computer science studies computational complexity,
  approximation, and online variants. The bridge links experimental preference elicitation,
  survey design, and marketplace rules: when payments can be engineered, truthful reporting
  becomes incentive compatible without belief assumptions about others — unlike first-price
  auctions.'
translation_table:
- field_a_term: second-price payment rule

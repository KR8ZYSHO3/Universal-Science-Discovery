cross_pollination_opportunities:
  - >
    Mechanism design for AI alignment: designing reward functions and
    training protocols as mechanisms where the "agent" reports its true
    capabilities and values truthfully — the revelation principle suggests
    that aligned direct training mechanisms can replace complex indirect
    approaches without loss of generality.
  - >
    Spectrum auctions (FCC), Google AdWords (generalized second-price auctions),
    and matching markets (hospital residency match, school choice) are direct
    applications of mechanism design theory with hundreds of billions of dollars
    in economic value — showing pure mathematical mechanism theory translating
    to engineering of market institutions.
communication_gap: >
  Mechanism design is primarily an economics subdiscipline (mathematical
  economics, auction theory) with its own journals. Computer scientists
  independently developed algorithmic mechanism design (Nisan-Ronen 1999)
  with computational efficiency constraints. AI researchers are now applying
  mechanism design to multi-agent systems and alignment without always
  being aware of the 50-year-old economics literature. Social choice
  theory (Arrow, Gibbard-Satterthwaite) and mechanism design overlap
  substantially but are often taught separately.

id: b-information-economics-mechanism
title: >
  Myerson's revelation principle (1979) shows incentive-compatible direct
  revelation mechanisms are without loss of generality; VCG achieves dominant-
  strategy incentive compatibility with efficiency; the Mirrlees optimal income
  tax model (Nobel 1996) shows the top marginal rate should be zero; the
  Crémer-McLean theorem enables full surplus extraction — mechanism design
  is reverse game theory unifying information economics, public finance, and
  social choice theory.
status: established
fields:
  - mathematics
  - economics
  - mechanism-design
  - game-theory
  - information-economics
  - social-choice-theory
bridge_claim: >
  Mechanism design (Hurwicz 1973, Myerson, Maskin, Nobel 2007) is the
  engineering of game rules to achieve desired social outcomes in the presence
  of private information. The revelation principle (Myerson 1979): for any
  Bayesian equilibrium of any mechanism, there exists a direct revelation
  mechanism (players report their types truthfully) that implements the same
  outcome and where truth-telling is an equilibrium. This means without loss
  of generality, we can restrict attention to incentive-compatible direct
  mechanisms — a massive simplification. Vickrey-Clarke-Groves (VCG): the
  unique family achieving dominant-strategy incentive compatibility (IC) and
  efficiency simultaneously. VCG payment tᵢ = Σⱼ≠ᵢ vⱼ(a*) - hᵢ(v₋ᵢ) makes
  each agent the residual claimant of social value, aligning private and social
  incentives. Mirrlees model (1971, Nobel 1996): optimal income tax under
  unobservable ability — minimize deadweight loss from information asymmetry.
  Mirrlees-Diamond result: the optimal marginal tax rate on the highest earner
  is zero (no distortion at the top, as there is no one above to provide
  incentives for). This is a purely mathematical result, independent of
  distributive preferences. Bayesian mechanism design: Crémer & McLean (1988)
  show that when agent types are correlated, a mechanism can extract the full
  expected surplus from all agents simultaneously — a striking impossibility
  result for independent types becomes possible with correlation.
translation_table:
  - field_a_term: direct revelation mechanism (players report types)
    field_b_term: incentive-compatible tax-transfer system (agents reveal income)
    note: both reduce the mechanism design problem to a simpler canonical form via the revelation principle
  - field_a_term: dominant-strategy incentive compatibility (DSIC)
    field_b_term: second-price auction (Vickrey) dominant strategy to bid truthfully
    note: VCG generalizes Vickrey auction to multi-good, multi-agent settings
  - field_a_term: Bayesian incentive compatibility (BIC)
    field_b_term: Nash equilibrium of a Bayesian game (interim expected payoffs)
    note: BIC is weaker than DSIC; used in Mirrlees model and Myerson optimal auctions
  - field_a_term: VCG payment (residual social value externality)
    field_b_term: Pigouvian tax correcting an externality
    note: VCG is the decentralized analog of the Pigouvian internalization for information externalities
  - field_a_term: Mirrlees top marginal rate = 0 (no distortion at top)
    field_b_term: no-distortion-at-the-top result in screening models
    note: arises in all principal-agent screening models; top type receives no rent reduction

id: b-optimal-stopping-secretary-problem
title: >
  The optimal stopping secretary problem — stop searching when you have seen the
  best so far after sampling 1/e of candidates — is a universal decision rule for
  search under uncertainty that bridges pure mathematics (measure theory, Wald's
  equation) with cognitive science (how humans search for mates, jobs, and apartments)
  and provides a normative benchmark for bounded rational decision making.
status: proposed
fields:
  - mathematics
  - cognitive-science
  - economics
  - statistics
bridge_claim: >
  The secretary problem asks: given N applicants arriving sequentially, each must
  be accepted or rejected immediately; how do you maximise the probability of
  selecting the best? The optimal strategy — observe the first N/e candidates
  without accepting, then accept the first who exceeds all previous — achieves
  success probability 1/e ≈ 37% as N → ∞. This 37% rule emerges from the
  theory of optimal stopping (Wald 1947; Lindley 1961), which solves the dynamic
  programming problem of when to stop a sequential process. The bridge to cognitive
  science is bidirectional: evolutionary psychology predicts that humans should
  approximate the 37% rule in mate search (search ~37% of potential mates before
  committing); laboratory experiments on search tasks reveal systematic deviations
  from the 1/e threshold (humans stop too early) that can be explained by loss
  aversion and finite horizon discounting. The connection to economics is through
  job search theory (Mortensen-Pissarides): reservation wage models are optimal
  stopping problems where workers accept jobs exceeding a threshold — the same
  structure. The bridge makes precise cross-disciplinary predictions: threshold
  strategies in mate choice, job search, and house purchase should all follow
  the same optimal stopping framework with different parameterisations.
translation_table:
  - field_a_term: optimal stopping threshold (N/e)
    field_b_term: 37% rule in human search behavior
    note: Observe 37% of options before selecting the first one better than all observed
  - field_a_term: dynamic programming (Bellman equation)
    field_b_term: optimal reservation wage in job search theory
    note: The value function recursion gives the optimal stopping rule for any sequential choice
  - field_a_term: Wald's identity (expected sample size)
    field_b_term: optimal search length in mate choice or housing search
    note: Predicts how long an optimal searcher should sample before committing
  - field_a_term: loss aversion (prospect theory deviation)
    field_b_term: early stopping bias (humans stop before 37%)
    note: The gap between 1/e and human stopping points is well-described by loss aversion
cross_pollination_opportunities:
  - Test 37% rule predictions in natural mate search datasets (e.g., online dating, speed dating) to measure the gap between optimal and actual stopping
  - Apply optimal stopping analysis to venture capital portfolio selection and test whether the best-performing investors approximate the threshold strategy
  - Use the Wald-Bellman framework to design clinical trial stopping rules that maximise information gain per patient
last_reviewed: "2026-05-07"

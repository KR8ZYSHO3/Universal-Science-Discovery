cross_pollination_opportunities:
  - Apply interior point methods to compute large-scale general equilibrium models
  - Use duality theory to design optimal tax systems (dual of social planner's problem)
  - Connect algorithmic game theory (equilibrium computation complexity) to economic design
communication_gap: >
  Economists rarely use algorithmic optimisation language; computer scientists working on
  equilibrium computation rarely connect to Arrow-Debreu theory. The mathematical equivalence
  between competitive equilibrium and convex programming was established by Samuelson and Dorfman
  et al. but the bridge to modern convex optimisation algorithms (Boyd & Vandenberghe) is
  underexploited in economic computation.

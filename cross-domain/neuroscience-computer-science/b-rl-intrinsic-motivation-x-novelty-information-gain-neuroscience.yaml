id: b-rl-intrinsic-motivation-x-novelty-information-gain-neuroscience
title: >
  Reinforcement-learning intrinsic-motivation bonuses (count-based novelty, prediction-error curiosity, information-gain proxies) parallel neuroscience hypotheses that dopamine signals relate to expected future reward **and** reducible uncertainty — careful wording avoids claiming circuit-level isomorphism between TD-learning δ errors and midbrain dopamine in every paradigm.
status: proposed
fields:
  - reinforcement-learning
  - neuroscience
  - computational-neuroscience
bridge_claim: >
  Algorithmic intrinsic rewards encourage exploration by rewarding visits to rarely experienced states or large forward-model prediction errors; neuroscience proposes exploratory behaviors arise when agents seek stimuli that reduce uncertainty or improve internal models. Formal overlaps appear at the **information-theoretic** level (expected information gain, Bayesian surprise) — **speculation** when mapping specific RL architectures onto dopamine/non-dopamine pathways without population-level causal perturbations across tasks.
translation_table:
  - field_a_term: pseudocount / novelty bonus shaping reward R'(s,a)
    field_b_term: novelty-driven exploratory modulation of choice probability
    note: Phenomenological similarity — neural substrate mapping contested across labs.
  - field_a_term: forward-model prediction error ‖φ(s') − f(s,a)‖
    field_b_term: sensory prediction errors in hierarchical predictive coding theories
    note: Useful modeling metaphor — scale and stationarity assumptions differ.
  - field_a_term: empowerment / mutual-information maximization objectives
    field_b_term: active inference “epistemic value” terms (expected precision-weighted information gain)
    note: Shared Bayesian vocabulary with distinct algorithmic commitments.
communication_gap: >
  Deep RL papers optimize benchmarks while neuroscience emphasizes lesion studies and species differences — shared mathematics appears in reviews but rarely with aligned datasets across algorithm classes and neural recordings.
cross_pollination_opportunities:
  - Fit jointly-recorded behavior + dopamine measurements to comparative families (pure reward prediction error vs novelty-augmented TD models) with pre-registered model comparison.
  - Export neuro-inspired uncertainty bonuses into safe RL pipelines requiring exploration without catastrophic constraint violations.

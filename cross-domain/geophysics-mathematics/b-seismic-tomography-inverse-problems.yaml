cross_pollination_opportunities:
  - >
    Medical CT scanning (computed tomography) and seismic tomography are the same
    mathematical problem: Radon transform inversion from projection data. Algorithms
    developed for CT (filtered back-projection, iterative SART, total variation
    regularization) have been directly applied to seismic tomography. Conversely,
    the adjoint-state method from geophysics is related to backpropagation in deep
    learning — all are instances of reverse-mode automatic differentiation.
  - >
    Compressed sensing (Candes & Tao 2006): if the model m is sparse in some basis,
    fewer measurements than Nyquist sampling can exactly recover m via L1 minimization
    (LASSO). Applying compressed sensing to seismic tomography could reduce the
    number of earthquakes/stations needed for high-resolution imaging — a direct
    import from mathematics to geophysics.
communication_gap: >
  Inverse problem theory was developed in applied mathematics (Tikhonov 1977,
  Tarantola 1987) and has parallel developments in geophysics, medical imaging,
  and remote sensing. Seismologists developed their own regularization methods
  often unaware of the mathematical literature. The adjoint-state method was
  well-known in optimal control theory (Pontryagin, 1962) decades before Tromp
  et al. (2005) derived it for seismology. Journal boundaries between SIAM Journal
  on Applied Mathematics and Geophysical Journal International maintain the gap.

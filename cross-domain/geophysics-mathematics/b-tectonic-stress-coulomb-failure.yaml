cross_pollination_opportunities:
  - "Dynamic stress triggering: seismic waves from distant earthquakes cause transient stress changes (ΔCFF oscillating at seismic wave frequencies) that trigger swarms — quantified by rate-and-state friction models bridging elasticity to statistical seismology."
  - "Induced seismicity from wastewater injection: ΔP (pore pressure) dominates ΔCFF in injection scenarios; fluid flow simulations coupled to Coulomb failure can forecast induced seismicity risk from SWD wells in real time."
communication_gap: >
  Seismologists routinely compute Coulomb stress maps but the connection to
  continuum mechanics (Eshelby inclusion theory, fracture mechanics stress intensity
  factors) is underexploited. Engineering mechanics literature on crack interactions
  uses the same elasticity theory but different notation and rarely cites
  geophysical aftershock literature, creating parallel developments in fault
  interaction models vs. crack shielding theory.

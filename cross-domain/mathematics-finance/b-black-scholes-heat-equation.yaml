cross_pollination_opportunities:
  - "Numerical PDE methods from physics (finite difference, Crank-Nicolson, ADI schemes) are directly applicable to option pricing on American options with early exercise boundaries, and physics-trained researchers have contributed important algorithms to computational finance."
  - "Fractional diffusion equations with Lévy stable drivers generalize Black-Scholes to heavy-tailed return distributions, using the same PDE formalism but replacing the Laplacian with a fractional Laplacian (-Δ)^(α/2), directly connecting mathematical finance to anomalous diffusion physics."
communication_gap: >
  The mathematical equivalence between Black-Scholes and the heat equation is
  presented in advanced mathematical finance textbooks but is rarely taught in
  physics curricula, even though physicists invented stochastic calculus (Bachelier
  preceded Einstein in applying Brownian motion to markets in 1900). Finance
  practitioners who derive the Black-Scholes formula algebraically often do not
  exploit the full PDE machinery available from mathematical physics.

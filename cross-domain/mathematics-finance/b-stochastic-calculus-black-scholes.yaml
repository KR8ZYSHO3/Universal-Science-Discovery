cross_pollination_opportunities:
  - "Apply heat-equation Green's function techniques to compute exotic option prices with complex payoff geometries"
  - "Use physics intuition about diffusion in inhomogeneous media to model local volatility surfaces (Dupire 1994)"
  - "Import renormalisation group methods from statistical physics to derive market microstructure corrections to Black-Scholes"

communication_gap: >
  The Black-Scholes paper (1973) was initially rejected by multiple journals because
  economists were unfamiliar with stochastic calculus. The heat equation connection
  was known to mathematical physicists but finance departments rarely included
  physicists. The field of quantitative finance emerged largely through practitioners
  (Fischer Black had a physics background) rather than academic cross-pollination.
  Today the connection is taught in mathematical finance programs but rarely in
  physics curricula — the bridge is one-directional.


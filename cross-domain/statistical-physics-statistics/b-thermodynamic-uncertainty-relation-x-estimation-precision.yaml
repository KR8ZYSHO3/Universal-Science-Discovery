id: b-thermodynamic-uncertainty-relation-x-estimation-precision
title: >
  Thermodynamic uncertainty relations connect entropy production budgets to lower bounds on estimator
  variance in nonequilibrium biochemical sensing.
status: proposed
fields:
  - statistical-physics
  - statistics
  - biophysics
  - information-thermodynamics
bridge_claim: >
  Thermodynamic uncertainty relations (TURs) bound current fluctuations by dissipation, implying that
  high-precision nonequilibrium sensing requires energetic cost. This maps directly to statistical
  efficiency language: variance reduction has a minimum entropy-production price in driven systems.
translation_table:
  - field_a_term: entropy production rate
    field_b_term: precision-cost tradeoff in estimator design
    note: Lower relative variance requires larger dissipation budget.
  - field_a_term: integrated current fluctuation bounds
    field_b_term: confidence interval floor under finite-time sampling
    note: TUR imposes irreducible uncertainty at fixed energetic throughput.
  - field_a_term: nonequilibrium steady-state currents
    field_b_term: biased but low-variance biochemical readout channels
    note: Energetic drive can improve speed/precision but never for free.
related_unknowns:
  - u-thermodynamic-uncertainty-bound-biochemical-estimators
related_hypotheses:
  - h-tur-constrained-estimators-predict-atp-cost-precision-frontier
cross_pollination_opportunities:
  - Add thermodynamic-budget reporting to biosensor benchmarking protocols.
  - Use TUR-derived priors when fitting stochastic biochemical models from sparse trajectories.
communication_gap: >
  Statistical inference workflows optimize variance and bias, while biophysical studies report ATP or
  entropy costs separately; TUR gives a shared quantitative bridge.
references:
  - doi: "10.1103/PhysRevLett.114.158101"
    note: "Barato and Seifert (2015), thermodynamic uncertainty relation for biomolecular processes."
last_reviewed: "2026-05-08"

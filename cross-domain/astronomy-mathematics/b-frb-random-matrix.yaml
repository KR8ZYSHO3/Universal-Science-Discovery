cross_pollination_opportunities:
  - >
    The CHIME/FRB collaboration has published catalogs with thousands of bursts from
    individual repeaters. Applying standard RMT analysis tools (nearest-neighbor
    spacing distributions, spectral rigidity, Dyson-Mehta Delta_3 statistic) to
    FRB timing data requires only statistical software already developed for nuclear
    and quantum chaos physics — a direct cross-field collaboration with no new
    instrumentation needed.
  - >
    If FRB waiting times are classified into a specific RMT universality class, this
    constrains the dimensionality and coupling structure of the underlying physical
    system (magnetar crust, vortex lattice, or other). Condensed matter physicists
    have extensive experience inferring physical parameters from RMT classification.
  - >
    The same RMT analysis applied to soft gamma repeater (SGR) burst catalogs from
    magnetars in our galaxy (SGR 1935+2154, which also produced an FRB-like burst)
    would test whether galactic magnetars and extragalactic FRB repeaters belong to
    the same universality class — directly probing whether magnetars are the dominant
    FRB progenitor.
communication_gap: >
  Radio astronomers working on FRB statistics publish in ApJ, MNRAS, and Nature
  Astronomy and are unfamiliar with the RMT literature (primarily in Annals of
  Physics, Physical Review Letters, and nuclear physics journals). Mathematicians
  working on random matrix universality rarely engage with astrophysical time series.
  The few papers applying RMT-adjacent methods (Weibull fits, self-organized
  criticality) to FRBs do not invoke RMT universality class language, missing
  the predictive power that comes with the full mathematical framework.

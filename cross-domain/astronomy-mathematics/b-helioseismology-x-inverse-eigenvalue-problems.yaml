id: b-helioseismology-x-inverse-eigenvalue-problems
title: >
  Global helioseismology infers solar interior structure by matching observed eigenfrequencies ω_nl of acoustic modes to stellar oscillation equations — structurally parallel to classical inverse Sturm–Liouville / vibrating-string eigenvalue problems asking which potentials reproduce measured spectra — placing asteroseismology inside inverse spectral geometry narratives taught in applied mathematics departments.
status: established
fields:
  - astrophysics
  - applied-mathematics
bridge_claim: >
  Linear adiabatic oscillation equations yield eigenvalue problems for pressure modes (p-modes) whose eigenfrequencies densely sample interior sound-speed profiles c(r) — analogous to recovering q(x) in −y'' + q(x) y = λ y from spectral data under appropriate transforms (inverse scattering intuition).
  Practical helio / asteroseismic pipelines invert frequency splittings for differential rotation via rotational kernels — linear inverse problems linking localized kernels K(r) to frequency observables — mathematically akin to Fredholm first-kind equations ill-posed without regularization.

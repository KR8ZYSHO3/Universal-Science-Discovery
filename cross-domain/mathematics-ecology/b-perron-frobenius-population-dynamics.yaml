cross_pollination_opportunities:
  - Apply non-negative tensor decomposition (generalisation of Perron-Frobenius) to multi-stage, multi-patch metapopulation models
  - Use matrix perturbation theory (beyond sensitivity) to quantify transient dynamics before stable age distribution is reached
  - Bridge Perron-Frobenius to Markov chain analysis — Leslie matrix is a substochastic matrix and extinction probability is a first-passage time problem
  - Apply the Leslie matrix framework to cancer cell population dynamics, where age classes are cell cycle stages
communication_gap: >
  The Perron-Frobenius theorem is taught in linear algebra and functional analysis
  courses without any mention of ecology; Leslie matrix models are taught in ecology
  without presenting the underlying linear algebra theorem that guarantees their
  properties. Caswell's (2001) monograph is the canonical bridge, but it is rarely
  read by pure mathematicians. The generalisations of Perron-Frobenius (to Hilbert
  spaces, to multi-type branching processes) have only partially been applied to
  age-structured population models.
last_reviewed: "2026-05-06"

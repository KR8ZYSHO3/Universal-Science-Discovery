cross_pollination_opportunities:
  - Apply dynamic programming (HJB equation) to foraging under uncertainty — stochastic travel times produce the same structure as real options pricing
  - Translate pharmacokinetic optimal dosing intervals to MVT to use foraging literature's predator-prey extensions
  - Use MVT framework to optimise sampling protocols in fieldwork (when to move sensor arrays)
  - Apply to machine learning hyperparameter search — exploration-exploitation as foraging patch choice
communication_gap: >
  Ecologists learn MVT as a graphical theorem in behavioural ecology without
  deriving it from calculus of variations. Applied mathematicians working on
  optimal stopping do not know that MVT is an instance of their problem. The
  formalisation in McNamara & Houston (1986) bridges this but remains in
  specialist literature.

cross_pollination_opportunities:
  - >
    Finite-size scaling from condensed-matter physics gives a precise formula for
    how the effective epidemic threshold shifts in a population of N individuals:
    R_0^eff(N) = R_0^infinity + c * N^(-1/nu), where nu is the percolation correlation
    length exponent (nu=1 for random networks, nu=4/3 for 2D spatial). Epidemiologists
    could use this formula to report R_0 estimates with explicit finite-population
    uncertainty bands — a capability that does not currently exist.
  - >
    The percolation cluster size distribution below threshold predicts the outbreak
    size distribution. Condensed-matter physicists know this distribution analytically
    (it is a power law with exponent tau=5/2 for mean-field percolation). This means
    the probability of an outbreak reaching any given size is derivable from the same
    framework, not just simulatable — giving public health a closed-form risk formula.
  - >
    Vaccination strategies map directly to percolation bond removal. Targeted removal
    of high-degree nodes (hubs) in a network pushes p_c up nonlinearly — this is the
    mathematical basis of ring vaccination and contact tracing. Importing the full
    toolkit of percolation on heterogeneous networks (configuration model, degree
    sequence methods) would let epidemiologists design vaccination campaigns using
    rigorous phase-transition analysis rather than simulation.
  - >
    The b-percolation-oncology bridge uses percolation to model tumour vascular networks.
    The same finite-size scaling methods apply — connecting the mathematical toolkits
    of oncology, epidemiology, and statistical physics through a single framework.
communication_gap: >
  The mathematical equivalence of SIR thresholds and percolation thresholds is
  established in the network science literature (Newman 2002, Kenah-Robins 2007,
  Miller 2010). However, the epidemiology literature overwhelmingly uses deterministic
  ODE models (SIR/SEIR) that are mean-field and infinite-population. The finite-size
  scaling tools are developed in condensed-matter physics and statistical mechanics
  journals that epidemiologists do not read. During COVID-19, finite-size effects in
  small institutional outbreaks (hospitals, nursing homes, schools) were handled with
  ad hoc simulation rather than systematic FSS — a direct consequence of this
  communication gap.
last_reviewed: "2026-05-04"

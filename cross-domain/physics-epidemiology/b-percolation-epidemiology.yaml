id: b-percolation-epidemiology
title: >
  Network percolation theory and epidemic threshold theory are the same
  mathematical object — the epidemic threshold R_0=1 is a percolation phase
  transition, and importing finite-size scaling from condensed-matter physics
  would transform how outbreak risk is estimated in finite populations.
status: proposed
fields:
  - statistical-physics
  - epidemiology
  - network-science
  - public-health
bridge_claim: >
  In bond percolation on a network, a giant connected component emerges at a
  critical bond probability p_c — below p_c the outbreak is finite; above it
  a macroscopic fraction of nodes is infected. The epidemic threshold R_0=1
  (basic reproduction number equals 1) is *exactly* this percolation threshold
  applied to a contact network where each edge is "bonded" with probability
  proportional to transmission probability.

  This mathematical identity has been known since Newman (2002) and Kenah-Robins
  (2007), but almost no working epidemiologists use percolation theory in practice.
  The result is that standard SIR/SEIR models treat populations as effectively
  infinite (mean-field), while condensed-matter physicists have 50 years of
  finite-size scaling (FSS) methods that correctly estimate critical behaviour in
  finite systems.

  The practical consequence: current outbreak risk models routinely over- or
  under-estimate the probability of a major epidemic in populations of 10,000-
  100,000 people (the regime of healthcare facility outbreaks, island communities,
  schools) because they use mean-field R_0 estimates without finite-size corrections.
  Percolation FSS would give systematic, quantitative corrections to these estimates.
translation_table:
  - field_a_term: bond percolation threshold p_c
    field_b_term: epidemic threshold R_0 = 1 (herd immunity boundary)
  - field_a_term: giant connected component
    field_b_term: epidemic — macroscopic fraction of population infected
  - field_a_term: finite cluster below p_c
    field_b_term: self-limiting outbreak (index case dies out without major spread)
  - field_a_term: finite-size scaling (FSS) correction to p_c in N-node network
    field_b_term: correction to R_0 threshold in finite population of size N
  - field_a_term: percolation correlation length xi
    field_b_term: spatial/network scale over which infections correlate (cluster size distribution)
  - field_a_term: order parameter (giant component fraction P_inf)
    field_b_term: final attack rate (fraction of population ultimately infected)
  - field_a_term: scaling function near p_c (P_inf ~ |p-p_c|^beta)
    field_b_term: epidemic size as function of R_0 near threshold
  - field_a_term: universality class (mean-field percolation for random graphs, 2D percolation for spatial grids)
    field_b_term: contact network topology class (random mixing vs spatially structured population)

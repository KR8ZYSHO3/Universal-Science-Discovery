id: b-epigenetic-clocks-aging-biomarkers
title: >
  DNA methylation epigenetic clocks are quantitative aging biomarkers that predict
  chronological and biological age with sub-decade accuracy, bridging epigenetics
  and geroscience by operationalizing the rate of biological aging.
status: established
fields:
  - epigenetics
  - geroscience
  - genomics
bridge_claim: >
  Epigenetic clocks (Horvath, Hannum, PhenoAge, GrimAge) use penalized regression
  on CpG methylation levels across hundreds of genomic loci to construct a quantitative
  biomarker of biological age that predicts chronological age (r > 0.96), all-cause
  mortality, age-related disease incidence, and response to anti-aging interventions;
  the clock methylation sites cluster in developmental gene regulatory regions,
  connecting the epigenetic programming of development to the mechanisms of aging.
translation_table:
  - field_a_term: CpG methylation beta values (epigenetics)
    field_b_term: biological age biomarker features (geroscience)
    note: Specific CpG sites change monotonically with age and are combined in a linear predictor
  - field_a_term: epigenetic age acceleration (epigenetics)
    field_b_term: biological age - chronological age difference (geroscience)
    note: Positive acceleration predicts increased mortality risk; linked to lifestyle and disease
  - field_a_term: methylation drift at enhancers (epigenetics)
    field_b_term: erosion of youthful gene expression programs (geroscience)
    note: Loss of methylation at repressed repeats and gain at developmental enhancers with age
  - field_a_term: partial reprogramming (Yamanaka factors) (epigenetics)
    field_b_term: epigenetic age reversal / rejuvenation (geroscience)
    note: OSKM expression resets epigenetic clocks; provides causal link between epigenome and aging
related_unknowns:
  - u-epigenetic-clock-causal-mechanism
related_hypotheses:
  - h-epigenetic-reprogramming-lifespan-extension
cross_pollination_opportunities:
  - Using epigenetic clocks as primary endpoints in clinical trials of geroprotective interventions (rapamycin, senolytics)
  - Applying geroscience aging theory to interpret the developmental origins of clock CpG sites via chromatin biology
communication_gap: >
  Epigeneticists study methylation mechanistically while geriatricians and geroscientists
  focus on functional aging outcomes; epigenetic clocks bridge these but the causal
  mechanism linking methylation patterns to physiological aging remains debated,
  limiting their use as intervention targets rather than just biomarkers.
last_reviewed: "2026-05-07"
references:
  - doi: "10.18632/aging.100433"
    note: Horvath (2013) - DNA methylation age of human tissues and cell types (pan-tissue clock)
  - doi: "10.1038/s43587-021-00134-3"
    note: Lu et al. (2023) - GrimAge2 clock predicting mortality and morbidity
  - doi: "10.1038/s41586-023-05892-5"
    note: Partial reprogramming in vivo reverses epigenetic age in mice (Sinclair lab 2023)

cross_pollination_opportunities:
  - >
    Normalised compression distance (NCD, Cilibrasi & Vitányi 2005) uses real
    compression algorithms (gzip, bzip2) as approximations to K(x). NCD has been
    used to cluster biological sequences, languages, music, and images without
    domain-specific features. In the philosophy of science context, NCD could
    measure the "explanatory relatedness" of scientific theories: two theories are
    closely related if they share a short common description. This could reveal
    the hidden algorithmic structure of scientific knowledge — which theories are
    "about the same thing" in a domain-independent sense.
  - >
    The connection between MDL and Bayesian information criterion (BIC) is exact
    in the exponential family: BIC = -2 log L + k log n where k is the number of
    parameters. MDL imposes a stronger penalty than AIC (which uses 2k). In fields
    that routinely use AIC for model selection (ecology, psychology, neuroscience),
    switching to MDL/BIC would reduce false discovery rates. The justification is
    philosophical: MDL selects the theory that compresses data, not the theory
    that maximises predictive accuracy on training data.
  - >
    Gödel's incompleteness theorem states that no consistent formal system can
    prove all true statements about arithmetic. Chaitin's incompleteness theorem
    (Chaitin 1974) states the same in information-theoretic terms: for most natural
    numbers n, it is unprovable whether K(x) ≤ n. This connection between Kolmogorov
    complexity and Gödel's theorem suggests a deep link between undecidability in
    mathematics and unpredictability in science — explored by Chaitin's "Omega number"
    (an uncomputable random real) but not fully incorporated into philosophy of science.
communication_gap: >
  Kolmogorov (1965) published in a Russian mathematics journal. Solomonoff (1964)
  published in an obscure information theory journal. Rissanen (1978) published in
  Automatica (control theory). The three approaches were unified by Li & Vitányi
  (1997) in a book that remains specialised computer science literature. Philosophers
  of science are largely unaware of the formal MDL framework; statisticians who use
  AIC/BIC daily are unaware of the Kolmogorov complexity foundation; machine learning
  researchers who use regularisation and Bayesian methods are unaware that they
  are implementing approximations to Solomonoff induction.

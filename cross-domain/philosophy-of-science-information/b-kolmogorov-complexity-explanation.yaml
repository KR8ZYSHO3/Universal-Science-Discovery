id: b-kolmogorov-complexity-explanation
title: >
  The best scientific theory is the shortest program that computes the observed data —
  Kolmogorov complexity K(x) formalises Occam's razor as data compression, making
  scientific explanation equivalent to finding the minimum description length (MDL)
  model, and overfitting identical to using a description that is longer than necessary.
status: established
fields:
  - philosophy-of-science
  - information-theory
  - mathematics
  - statistics
  - machine-learning
bridge_claim: >
  Kolmogorov (1965) defined the complexity K(x) of a string x as the length (in bits)
  of the shortest program on a universal Turing machine U that outputs x and halts.
  Solomonoff (1964) independently defined algorithmic probability m(x) = Σ_{p:U(p)=x} 2^{-|p|}
  as the probability that a random program outputs x. These definitions provide
  a formal foundation for scientific inference:

  THE MAIN CORRESPONDENCES:

  1. OCCAM'S RAZOR = MINIMUM KOLMOGOROV COMPLEXITY: Occam's principle (choose the
     simplest theory consistent with observations) is exactly: choose the theory T
     with smallest K(T). A theory T "explains" data D if K(D|T) << K(D) — the theory
     compresses the data. The amount of explanation is I(T:D) = K(D) - K(D|T), the
     algorithmic information provided by T about D.

  2. SOLOMONOFF INDUCTION = UNIVERSAL SCIENTIFIC INFERENCE: Solomonoff's prior
     m(x) assigns higher probability to shorter programs. Bayesian inference with
     the Solomonoff prior is the optimal (in a formal sense) prediction procedure:
     it converges to the truth at the fastest possible rate (Solomonoff's completeness
     theorem). All other consistent Bayesian priors are dominated by Solomonoff induction.
     The Solomonoff prior is the unique prior consistent with Occam's razor.

  3. MINIMUM DESCRIPTION LENGTH (MDL): Rissanen's (1978) MDL principle states that
     the best model M for data D minimises the sum K(M) + K(D|M) — the code length
     needed to describe the model plus the code length needed to describe the data
     given the model. This is the algorithmic formalisation of the bias-variance tradeoff:
     - Short model (high bias, low variance) = K(M) small but K(D|M) large
     - Complex model (low bias, high variance) = K(M) large but K(D|M) small
     - Overfitting = K(M) + K(D|M) > K(D) — the model is adding noise, not signal

  4. PHYSICAL LAW = MAXIMALLY COMPRESSED DESCRIPTION: Physical laws (Newton's laws,
     Maxwell's equations, the Standard Model Lagrangian) are extraordinarily short
     programs that generate enormously complex observations. The entire trajectory of
     the solar system for 1000 years (vast data) can be generated by Newton's laws
     (short program). This is why physics is possible: nature is compressible. A
     random universe would have K(observations) ≈ |observations| — maximally
     incompressible, with no short laws.

  5. UNDECIDABILITY OF KOLMOGOROV COMPLEXITY: K(x) is not computable — there is
     no algorithm that, given x, outputs K(x). This is why scientific inference is
     hard: the shortest theory consistent with the data cannot be found algorithmically.
     Science is a heuristic search for short programs in an incomputable space.
     The undecidability of K(x) is an information-theoretic counterpart to the
     undecidability of mathematical theorems (Gödel's theorem).

  6. MDL AND STATISTICAL CONSISTENCY: MDL model selection (Bayesian information
     criterion BIC ≈ MDL in the parametric setting) is statistically consistent:
     it selects the true model almost surely as data size grows. AIC selects the
     model with best predictive performance regardless of true model complexity.
     The BIC/MDL vs. AIC choice in statistics is the implementation of two different
     computational philosophy positions about the goal of scientific inference.
translation_table:
  - field_a_term: "Kolmogorov complexity K(x)"
    field_b_term: "Length of shortest scientific theory that generates data x"
    note: "Not computable, but approximable by compression algorithms (Lempel-Ziv, gzip, etc.)"
  - field_a_term: "Solomonoff prior m(x)"
    field_b_term: "Universal Bayesian prior — assigns higher probability to simpler data"
    note: "Dominating prior: any computable prior is bounded above by m(x) up to a constant"
  - field_a_term: "MDL model selection"
    field_b_term: "Optimal scientific theory selection — minimise total description length"
    note: "Equivalent to Bayesian model selection with a uniform prior over program lengths"
  - field_a_term: "Overfitting"
    field_b_term: "Using a description longer than necessary — the model encodes noise"
    note: "Overfitting ↔ K(model) + K(data|model) > K(data); regularisation ↔ MDL penalty on K(model)"
  - field_a_term: "Physical law (short program)"
    field_b_term: "Scientific explanation — massive data compression"
    note: "Newton's laws: ~100 bytes of code generate centuries of planetary motion; compression ratio ~10^{15}"
  - field_a_term: "Undecidability of K(x)"
    field_b_term: "Science is an incomputable optimisation — no algorithm finds the best theory"
    note: "NML (normalised maximum likelihood) and Bayesian compression are tractable approximations"
  - field_a_term: "Algorithmic mutual information I(T:D) = K(D) - K(D|T)"
    field_b_term: "Amount of scientific explanation provided by theory T for data D"
    note: "A theory that doesn't compress the data explains nothing; I(T:D) = 0 for random noise"

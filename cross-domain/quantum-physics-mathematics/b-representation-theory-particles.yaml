cross_pollination_opportunities:
  - >
    The classification of all irreducible representations of the Poincaré group
    (Wigner 1939) was a purely mathematical result. Its physical interpretation
    (particles = representations) was recognised immediately. The same approach
    applied to the conformal group (which includes the Poincaré group plus scale
    transformations) classifies the spectrum of a conformal field theory (CFT).
    The AdS/CFT correspondence uses this: the bulk spectrum of string theory in
    Anti-de Sitter space is in one-to-one correspondence with the representations
    of the boundary CFT, connecting quantum gravity to representation theory.
  - >
    The exceptional Lie groups E_6, E_7, E_8 are candidates for the symmetry group
    of a future unified theory (E_8 × E_8 appears in heterotic string theory). The
    representation theory of E_8 is extraordinarily rich and partially classified.
    The problem of classifying all E_8 representations and their branching rules
    to subgroups (including the Standard Model) is a pure mathematics problem (solved
    partially by the Atlas of Lie groups project) with direct particle physics applications.
  - >
    Quantum computing uses SU(2) and SU(2^n) representations for qubit operations.
    The representation theory of quantum groups (Hopf algebras, q-deformations of
    Lie groups) is relevant to topological quantum computation (Kitaev, Freedman)
    where non-Abelian anyons (excitations transforming in non-trivial braid group
    representations) are the computational substrate. Connecting particle physics
    representation theory to quantum computation representation theory would unify
    these two applications.
communication_gap: >
  Wigner (1939) published his classification in Annals of Mathematics — pure
  mathematics, not physics. The physical interpretation was understood by quantum
  field theorists immediately but is not taught at the undergraduate level in physics
  programs. Most physics students encounter particles phenomenologically (the particle
  zoo) without learning that their properties are algebraically derived from group
  theory. Conversely, mathematics students learning representation theory of Lie
  groups are not told that their results classify all possible elementary particles.
  The Standard Model Lagrangian, which packs the entire representation structure
  into one equation, is rarely decoded into its group-theoretic components in either
  physics or mathematics courses.

id: b-representation-theory-particles
title: >
  The classification of all elementary particles follows from the representation
  theory of the Poincaré group (Wigner 1939) — particle spin is the label of the
  irreducible representation of SU(2), the Standard Model gauge group SU(3)×SU(2)×U(1)
  determines all allowed interactions via group representations, and every conserved
  quantum number corresponds to a generator of a symmetry Lie group.
status: established
fields:
  - quantum-physics
  - mathematics
  - group-theory
  - particle-physics
  - representation-theory
bridge_claim: >
  Wigner (1939) proved that every quantum mechanical particle corresponds to an
  irreducible unitary representation of the Poincaré group (the symmetry group of
  special relativity: translations + Lorentz transformations). This is one of the
  deepest results in mathematical physics: the classification of particles is
  identical to the classification of group representations.

  WIGNER'S CLASSIFICATION:

  The Poincaré group has two Casimir invariants (operators that commute with all
  group elements):
  - Mass squared -- P²_μ = m²c² (eigenvalue)
  - Spin -- W²_μ = -m²c²s(s+1)ℏ² (where W_μ is the Pauli-Lubanski vector)

  Every irreducible unitary representation of the Poincaré group is uniquely
  labelled by (m, s):
  - Massive particles (m > 0) -- spin s = 0, 1/2, 1, 3/2, 2, ... (Higgs, electron, W boson, gravitino, graviton)
  - Massless particles (m = 0) -- labelled by helicity λ = ±s (photon: λ = ±1; graviton: λ = ±2)
  - Tachyons (m² < 0) -- no stable particles correspond to these (virtual Higgs field)

  This is a purely group-theoretic classification — no physical input about what
  particles exist, just what representations are possible.

  THE STANDARD MODEL AS REPRESENTATION THEORY:

  1. GAUGE FIELDS AS CONNECTIONS: The gauge group G = SU(3)_c × SU(2)_L × U(1)_Y
     determines the field content of the Standard Model. Each gauge boson corresponds
     to an adjoint representation of the gauge group:
     - 8 gluons: adjoint of SU(3) (dimension 8)
     - 3 W bosons + 1 B boson: adjoint of SU(2) × U(1) (dimension 4)
     The matter fields (quarks, leptons) are defined by their representations of G.

  2. QUANTUM NUMBERS FROM GROUP GENERATORS: Every conserved quantum number is the
     eigenvalue of a generator T_a of the symmetry group:
     - Electric charge Q = T_3 + Y/2 (Gell-Mann-Nishijima formula): generator of U(1)_em
     - Isospin T_3: generator of SU(2)_L
     - Hypercharge Y: generator of U(1)_Y
     - Colour charge: generators of SU(3)_c (8 generators, Gell-Mann matrices)
     - Baryon number B, lepton number L: approximate global U(1) symmetries

  3. NOETHER'S THEOREM IN GROUP THEORY LANGUAGE: The conservation laws of physics
     (energy-momentum, angular momentum, charge) all correspond to generators of
     continuous symmetry groups via Noether's theorem. The group-theoretic statement
     is: if the action S is invariant under a Lie group G, then the conserved current
     j_μ^a = ∂L/∂(∂_μφ) · T^a φ is conserved: ∂_μ j^{μa} = 0.

  4. REPRESENTATIONS DETERMINE INTERACTIONS: In gauge theory, the coupling of a
     matter field to a gauge boson is determined entirely by the representation of
     the matter field. A quark in the fundamental 3 representation of SU(3) couples
     to all 8 gluons; a lepton in the trivial 1 representation of SU(3) does not
     couple to gluons (leptons are colour-neutral). This is the group-theoretic
     explanation for why leptons feel no strong force.

  5. GRAND UNIFICATION AS EMBEDDING: Grand Unified Theories (GUTs) propose that
     G = SU(3)×SU(2)×U(1) is embedded in a larger simple group (SU(5), SO(10), E_6).
     Under this embedding, quarks and leptons unify into a single irreducible
     representation, predicting proton decay and magnetic monopoles. The group theory
     constrains what GUTs are possible.

  6. SUPERSYMMETRY AS EXTENDED GROUP REPRESENTATION: Supersymmetry (SUSY) extends
     the Poincaré group to a super-Poincaré group including fermionic generators Q_α.
     Each SUSY multiplet pairs bosons and fermions with equal mass — the Higgs and
     Higgsino are in the same representation. The mathematics is representation theory
     of superalgebras (graded Lie algebras).

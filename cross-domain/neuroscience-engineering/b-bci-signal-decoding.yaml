cross_pollination_opportunities:
  - >
    Closed-loop adaptive BCIs: using online Fisher information estimation to
    quantify neural code stability and trigger decoder recalibration — translating
    information-theoretic diagnostics into engineering system monitoring.
  - >
    Spike sorting vs. multi-unit activity: Fisher information analysis shows
    whether precise spike sorting adds information over threshold-crossing multi-unit
    signals — directly comparing decoding quality to guide electrode design.
  - >
    Speech BCI high-bit-rate decoding: applying channel capacity bounds to
    determine whether current electrode arrays are sampling enough neurons to
    support fluent naturalistic speech decoding, guiding next-generation array design.
communication_gap: >
  Neural prosthetics engineering developed at the intersection of neuroscience and
  biomedical engineering. The fundamental information-theoretic formulation
  (Fisher information bound on decoding) is standard in statistics and signal
  processing but was applied to BCIs primarily by Shenoy's group at Stanford.
  Clinical neuroscientists developing BCI devices often implement Kalman filtering
  as a "black box" without connecting it to the Cramér-Rao information theory that
  explains why it is optimal. The channel capacity bound for BCIs remains
  underexplored relative to the rapidly advancing empirical decoding results.

cross_pollination_opportunities:
  - "Neuromorphic robotics: the Drosophila ring attractor circuit has been implemented in silicon (Intel Loihi) as an efficient spiking neural network heading estimator, consuming ~100x less power than conventional MEMS IMU-based dead reckoning."
  - "Landmark-based error correction: when insects reach a familiar landmark, they reset the path integrator (equivalent to the update step of a full SLAM system). The neural circuit for this reset involves mushroom body-to-central-complex connections that could inspire SLAM algorithm design."
communication_gap: >
  Neuroethologists who study insect navigation analyze home vector errors and
  ring attractor dynamics without connecting to the robotics/control literature
  on dead reckoning and Kalman filtering. Roboticists who design dead-reckoning
  systems are unaware that evolution has solved the same problem in a few hundred
  neurons (Drosophila CX: ~500 cells), potentially offering algorithmic insights
  for ultra-efficient autonomous navigation.

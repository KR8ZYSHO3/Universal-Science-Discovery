cross_pollination_opportunities:
- Use neural decoding to estimate empirical Kalman gains across attention and cue reliability
  manipulations.
- Co-design brain–machine interfaces with Kalman-family decoders matched to observed neural
  tuning drift.
communication_gap: Control and robotics textbooks present Kalman filters as standard; systems
  neuroscience often uses related but differently named linear dynamical models without linking
  gains to Q/R ratios.

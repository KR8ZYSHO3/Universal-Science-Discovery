cross_pollination_opportunities:
  - >
    Neural prosthetics design: OFC-derived decoders for brain-computer
    interfaces (BCIs) that account for signal-dependent noise outperform
    linear decoders. The Todorov OFC model predicts the structure of
    motor cortex population activity (rotational dynamics, Churchland et al.
    2012) which constrains BCI decoding architectures.
  - >
    Surgical robot control: minimum-jerk trajectory generation (Hogan's model)
    is already used in haptic rendering; full OFC implementation could allow
    surgical robots to adapt trajectory to task-irrelevant variability,
    mimicking the "uncontrolled manifold" strategy of human surgeons.
  - >
    Learning in model-free vs. model-based control: the cerebellum-basal
    ganglia division of labour (model-based cerebellar vs. model-free basal
    ganglia) maps exactly onto the model-based / model-free RL dichotomy in
    reinforcement learning. Computational neuroscience and RL theory can
    exchange architectural insights about when to learn a forward model vs.
    use direct policy gradients.
communication_gap: >
  Control engineers publishing in IEEE Transactions on Automatic Control and
  computational neuroscientists publishing in Neuron and J Neurosci operate in
  largely separate communities. The Wolpert group (Cambridge, now Columbia) and
  Todorov (now at Google DeepMind) bridge these communities, but most motor
  neuroscience papers do not cite the control theory literature, and most
  control engineers are unaware of the cerebellar Kalman filter evidence.
  Robotics is increasingly aware of biological motor control, but the flow is
  primarily from neuroscience to robotics, not bidirectional.

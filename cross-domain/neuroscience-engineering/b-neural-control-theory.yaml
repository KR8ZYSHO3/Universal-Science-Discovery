id: b-neural-control-theory
title: >
  Biological motor control implements the same optimal stochastic control theory
  principles used in engineered controllers — minimising jerk or endpoint
  variance, Kalman filtering in the cerebellum, and efference-copy forward
  models — demonstrating that the nervous system is an optimal controller
  operating under signal-dependent noise.
status: established
fields:
  - neuroscience
  - control-engineering
  - computational-neuroscience
  - robotics
bridge_claim: >
  Flash & Hogan (1985, J Neurosci 5:1688) showed that human arm trajectories
  minimise the third derivative of position (jerk), generating smooth
  bell-shaped velocity profiles characteristic of minimum-jerk control. This
  was the first rigorous demonstration that biological motor control obeys an
  engineering optimality criterion.

  The bridge deepens through four formal identifications:

  1. Kalman filter = cerebellar forward model. Wolpert, Ghahramani & Jordan
     (1995) proposed that the cerebellum implements a Kalman filter: it
     maintains an internal state estimate x̂ by combining a forward model
     prediction (F x̂_{t-1} + G u) with sensory corrections weighted by
     the Kalman gain K = P_pred H^T (H P_pred H^T + R)^{-1}. The climbing
     fibre input to Purkinje cells carries the prediction error signal
     (innovation) exactly as the Kalman innovation update requires.
     Engineering validation: Kalman (1960, J Basic Eng 82:35) derived the
     optimal linear state estimator — the cerebellar architecture implements
     this without explicit design.

  2. Minimum-variance / signal-dependent noise. Todorov & Jordan (2002,
     Nat Neurosci 5:1226) proposed the optimal feedback control (OFC) model:
     motor commands are corrupted by signal-dependent (multiplicative) noise
     σ_i = k_i u_i. Under this noise model, minimising endpoint variance (not
     jerk) generates the same smooth bell-shaped trajectories as minimum-jerk,
     but additionally predicts task-specific variability — the system tolerates
     variability in task-irrelevant dimensions (the "uncontrolled manifold").
     This matches empirical motor variability data from Scholz & Schöner (1999).

  3. Multiple paired forward-inverse models (MOSAIC). Wolpert & Kawato (1998,
     Neural Networks 11:1317) showed that the cerebellum likely contains a
     bank of paired forward models (F_i: state → next state) and inverse
     models (I_i: desired trajectory → motor command), gated by responsibility
     signals. This is formally identical to the mixture-of-experts architecture
     in control engineering (Jacobs et al. 1991) and modular adaptive control.

  4. Efference copy = internal forward model. The efference copy (von Holst &
     Mittelstaedt 1950) — a copy of the motor command sent to sensory areas to
     cancel reafference — is mathematically the forward model prediction used
     in the Kalman filter update. The mismatch between efference copy prediction
     and actual sensory input is the prediction error that drives both
     cerebellar LTD learning and sensory suppression during self-motion.
translation_table:
  - field_a_term: Kalman filter state estimate x̂ (control engineering)
    field_b_term: cerebellar internal model of limb state
  - field_a_term: Kalman gain K (optimal weighting of prediction vs measurement)
    field_b_term: sensorimotor integration weights (proprioception vs forward model)
  - field_a_term: process noise covariance Q
    field_b_term: signal-dependent motor noise (σ ∝ u)
  - field_a_term: innovation / prediction error (control theory)
    field_b_term: climbing fibre error signal to Purkinje cells
  - field_a_term: efference copy (neuroscience)
    field_b_term: forward model prediction u → x̂ (control engineering)
  - field_a_term: mixture-of-experts controller (engineering)
    field_b_term: MOSAIC architecture of paired cerebellar modules
  - field_a_term: minimum jerk / minimum variance cost function
    field_b_term: smooth bell-shaped velocity profiles of human arm movements

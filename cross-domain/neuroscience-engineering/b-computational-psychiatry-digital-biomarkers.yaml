cross_pollination_opportunities:
  - >
    Personalised dosing from computational phenotype: use individual α⁺/α⁻ learning
    rate estimates (from computerised reversal learning tasks) to predict antidepressant
    treatment response before administering drugs; trial a precision psychiatry
    protocol where computational phenotype guides first-line medication selection.
  - >
    Digital twin for bipolar disorder: build a patient-specific Bayesian dynamical
    model trained on longitudinal smartphone data; use the model to predict when
    a mood episode will occur and trigger an adaptive intervention (medication
    adjustment, crisis hotline contact) before clinical symptoms emerge.
  - >
    Cross-disorder computational nosology: fit the same hierarchical Bayesian model
    to behavioural data from patients with schizophrenia, bipolar disorder, OCD,
    and depression; cluster patients by computational phenotype rather than DSM
    diagnosis; test whether computational clusters predict treatment response better
    than categorical diagnosis.
communication_gap: >
  Psychiatry is taught as a clinical discipline; computational neuroscience is a
  research speciality with little clinical integration. Engineers who build smartphone
  sensing systems and machine learning classifiers rarely collaborate with psychiatrists.
  The Bayesian brain framework is known to cognitive neuroscientists but has not entered
  psychiatric training or clinical practice. Regulatory agencies have not yet approved
  any digital biomarker for psychiatric use, limiting translation despite strong research evidence.

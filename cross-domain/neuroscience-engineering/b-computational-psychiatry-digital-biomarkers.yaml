id: b-computational-psychiatry-digital-biomarkers
title: >
  Computational psychiatry uses Bayesian brain models to explain psychosis (aberrant
  salience — excess dopamine random salience attribution), depression (reduced positive
  learning rate), and OCD (stuck prior updating), while smartphone digital biomarkers
  provide continuous ecological monitoring that replaces episodic clinical assessment.
status: established
fields:
  - neuroscience
  - engineering
  - psychiatry
  - computer-science
bridge_claim: >
  Computational psychiatry applies mathematical models of brain computation to explain
  the mechanisms of psychiatric symptoms and guide treatment. The aberrant salience
  hypothesis (Kapur 2003): excess synaptic dopamine causes random salience attribution
  to irrelevant stimuli — delusions are the cognitive explanatory framework the brain
  constructs to explain unexpected saliency. The Bayesian formulation (Adams et al. 2016):
  psychosis involves abnormal precision weighting — the prior is given too much precision
  (high prior:likelihood ratio), causing delusions to be maintained despite disconfirming
  evidence. Formally, if the posterior is P(hypothesis|data) ∝ P(data|hypothesis)·P(hypothesis)^w,
  delusions correspond to w >> 1 (pathologically high prior weighting). Depression is
  modelled as reduced positive learning rate α⁺ (for rewarding outcomes) with intact or
  increased negative learning rate α⁻ (for aversive outcomes) — computational anhedonia
  (Huys et al. 2016). OCD: compulsive behaviour follows from underestimated state
  transition uncertainty (Bayesian agent that overbelieves the world is deterministic).
  Digital biomarkers close the measurement gap: smartphone accelerometer, GPS traces,
  keystroke dynamics, and voice features passively sample behaviour at ecological timescale,
  predicting mood episodes in bipolar disorder days before clinical relapse (Torous 2018).
translation_table:
  - field_a_term: Bayesian precision (inverse variance of prior)
    field_b_term: dopaminergic gain (D2 receptor occupancy modulates prediction error weighting)
    note: Antipsychotics block D2 receptors — reducing aberrant salience by lowering the dopaminergic precision signal
  - field_a_term: learning rate α (temporal difference learning)
    field_b_term: differential positive/negative reinforcement learning in depression
    note: α⁺ < α⁻ in depression; ketamine restores α⁺ to normal within hours, predicting rapid antidepressant effect
  - field_a_term: ecological momentary assessment (EMA)
    field_b_term: passive smartphone sensing (GPS, accelerometer, screen time, keystroke)
    note: EMA captures real-world behaviour continuously vs. retrospective weekly clinic assessment
  - field_a_term: anomaly detection (signal processing)
    field_b_term: digital biomarker early warning system for bipolar relapse
    note: GPS radius of gyration drops days before manic episodes; accelerometer activity rises before mania, falls before depression
  - field_a_term: hierarchical Bayesian model
    field_b_term: computational phenotyping — inferring latent psychiatric state from behavioural time series
    note: Individual learning rate parameters estimated from behavioural tasks form the computational phenotype
related_unknowns:

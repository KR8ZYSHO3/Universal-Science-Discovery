cross_pollination_opportunities:
  - >
    Dimensionality reduction methods from machine learning (GPFA, LFADS, pi-VAE)
    applied to M1 population activity reveal low-dimensional "neural manifolds" —
    subspaces where movement-related activity lies. Decoders operating in the
    manifold space rather than the full neural space are more robust to neuron
    loss (electrode dropout) and noise. This connects manifold learning theory
    to clinical BMI robustness.
  - >
    Bi-directional neural interfaces (simultaneous recording and stimulation)
    create the opportunity for closed-loop neuromodulation of pathological brain
    states (epilepsy, Parkinson's, depression) using the same adaptive decoder
    framework as motor neuroprosthetics. The adaptive estimation methods developed
    for motor BMIs could be directly applied to closed-loop deep brain stimulation
    parameter optimisation.
communication_gap: >
  Neuroprosthetics research spans neuroscience (neural coding, plasticity),
  engineering (signal processing, control theory, device design), and clinical
  medicine (neurosurgery, rehabilitation). The academic literature is split across
  Nature Neuroscience, IEEE Transactions on Neural Systems, and Lancet.
  Neural coding theory (Fisher information, population vector decoding) was
  developed in computational neuroscience largely independently of the control
  engineering tradition (Kalman filtering, adaptive estimation). BrainGate
  collaborations are unusual in combining these communities. Adaptive decoding
  methods that are standard in control engineering (recursive least squares,
  online EM) have only recently been applied to neural decoders, despite being
  optimal. The Cramér-Rao bound analysis of the neural code (Seung & Sompolinsky
  1993) is well-known in computational neuroscience but rarely cited in BCI
  engineering papers.

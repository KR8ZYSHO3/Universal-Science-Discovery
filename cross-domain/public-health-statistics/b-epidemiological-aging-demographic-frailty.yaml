cross_pollination_opportunities:
  - "Using frailty model residuals from population mortality data to estimate the latent frailty distribution and calibrate biomarker-based biological age indices"
  - "Applying shared-frailty survival models to sibling or twin cohorts to partition genetic vs. environmental components of longevity heterogeneity"
communication_gap: "Demographers and epidemiologists use Gompertz mortality models and actuarial tables while biostatisticians develop frailty survival models; the Vaupel frailty model bridges them but is still not routinely applied in clinical aging cohort analysis where the simpler Cox model without random effects is preferred."

cross_pollination_opportunities:
  - "Use free energy calculations from statistical mechanics to predict the exact satisfiability threshold for k-SAT beyond k=3"
  - "Design combinatorial optimization algorithms based on finite-temperature statistical mechanics (simulated annealing is the prototype)"
  - "Apply quantum annealing to the NP-hard phase transition region to test whether quantum tunneling escapes RSB trapping"

communication_gap: >
  Theoretical computer scientists and statistical physicists have largely separate
  literature cultures despite deep mathematical connections. The Mézard et al.
  (2002) Science paper was a landmark bridge publication. Theoretical CS tends
  to focus on worst-case complexity; statistical physics on typical-case behavior.
  The cavity method has yet to be fully absorbed into the CS algorithms curriculum.
  The P vs NP problem is framed as a question about worst-case complexity, while
  physics approaches address typical-case hardness — different but related questions.


cross_pollination_opportunities:
  - >
    Shannon's rate-distortion theory gives a quantitative trade-off between the
    fidelity of information transmission and the rate. Applied to cultural transmission,
    it predicts that memes transmitted at rates above the channel capacity (when
    someone encounters too many new ideas simultaneously) will be systematically
    distorted toward attractors consistent with the prior (existing beliefs). This
    gives a mechanistic prediction for confirmation bias and motivated reasoning as
    consequences of operating above channel capacity — testable with information
    overload experiments.
  - >
    The mutual information I(X;Y) between transmitted and received cultural variants
    could in principle be measured from longitudinal survey data on idea transmission:
    measure someone's expressed belief, measure their social contacts' beliefs,
    compute I. This would give empirical estimates of cultural channel capacity
    for different domains (political beliefs, technical knowledge, health behaviors)
    and across different transmission media.
  - >
    Sperber's cognitive attractors (meme types that humans faithfully transmit) could
    be defined information-theoretically as meme types with high channel capacity on
    the human cognitive channel. Prediction: attractors should correspond to low-
    Kolmogorov-complexity ideas (simple, memorable), highly emotional content (salient
    = high SNR), and content that exploits existing cognitive schemata (the channel
    amplifies content matching existing codebooks).
communication_gap: >
  Shannon's (1948) information theory was developed for electrical engineering; the
  application to cultural evolution was made informally by Dawkins (1976) with the
  meme concept but without formal information-theoretic tools. Henrich (2004) and
  Boyd & Richerson's cultural evolution models use population genetics mathematics
  (Wright-Fisher) rather than information theory. The information cascade literature
  (Bikhchandani, Welch) is in economics and does not reference Shannon. Social media
  researchers measure engagement and virality without connecting to channel capacity
  theory. The formal unification requires fluency in both information theory and
  cultural evolution — a rare combination.

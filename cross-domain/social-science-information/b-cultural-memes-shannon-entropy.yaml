id: b-cultural-memes-shannon-entropy
title: >
  Cultural transmission of memes across social networks obeys Shannon's noisy
  channel theorem — meme fidelity, cultural drift, and the homogenising effects
  of mass media are quantitatively described by channel capacity, noise models,
  and the source-channel coding theorem from information theory.
status: proposed
fields:
  - social-science
  - information-theory
  - cultural-evolution
  - sociology
  - communication-theory
bridge_claim: >
  Shannon (1948) proved that any communication channel with noise can reliably
  transmit information at rates up to its channel capacity C = max_{p(x)} I(X;Y),
  and that error rates rise exponentially above this rate. Cultural transmission is
  a noisy communication channel: a cultural idea (meme) is encoded by an individual,
  transmitted via social interaction (speech, writing, demonstration), and decoded
  (potentially with errors) by the recipient.

  KEY CORRESPONDENCES:

  1. CULTURAL DRIFT = CHANNEL NOISE: In Henrich's (2004) model of cultural evolution,
     copying errors (misimitation, misremembering) act as random noise applied to the
     transmitted cultural variant. This is exactly the discrete memoryless channel model
     in Shannon's framework. Cultural drift (random change in meme frequency) is
     equivalent to genetic drift when the channel noise is unbiased (symmetric error
     probability).

  2. MEME FITNESS = CHANNEL CAPACITY MODULATION: A culturally "fit" meme (one that
     spreads well) has high channel capacity on the human transmission channel — it
     is easy to transmit and receive faithfully. Sperber's (1996) "epidemiology of
     representations" argues that cultural attractors are not arbitrary: humans are
     cognitive special-purpose hardware that faithfully transmits certain types of
     ideas (intuitive, emotional, morally relevant) and systematically distorts others.
     This is the concept of a channel with variable capacity across different message
     types.

  3. SOCIAL MEDIA AS BIASED CHANNEL: Traditional cultural transmission is approximately
     white noise (random copying errors). Social media recommendation algorithms
     introduce systematic, non-white noise — they amplify emotionally charged,
     surprising, and identity-affirming content (Brady et al. 2017). This is a channel
     with a systematic, content-dependent noise matrix, not random error. The
     information-theoretic consequence: the algorithm biases the stationary distribution
     of memes toward a restricted attractor set (outrage, in-group content) — a
     reduction in the effective dimensionality of transmitted culture.

  4. INFORMATION CASCADE = BURST ERRORS: An information cascade (Bikhchandani et al.
     1992) occurs when individuals sequentially abandon private information and copy
     their predecessor. This is a correlated burst error in the channel — a long run
     of identical outputs independent of the inputs. Shannon's treatment of burst error
     channels shows that burst errors dramatically reduce effective channel capacity;
     information cascades similarly destroy the information content of social signals.

  5. DUNBAR'S NUMBER ≈ CHANNEL CAPACITY FOR SOCIAL MAINTENANCE: Dunbar (1992) found
     that humans maintain stable social relationships with approximately 150 others
     (Dunbar's number), determined by neocortex size. This is a capacity limit: the
     human social "channel" (grooming, conversation, memory) has a maximum bit rate for
     maintaining relationship state. Dunbar's number is the network degree at which
     the channel is saturated. The social media "friend" count (often thousands) vastly
     exceeds this, implying most connections operate in a low-quality, high-noise regime.

  6. MEME LIFESPAN AND CHANNEL MEMORY: Shannon's channel with memory (Markov channels)
     models channels where past inputs affect future outputs. Cultural transmission has
     long memory: oral traditions persist for centuries (Vansina 1985), transmitted
     with low but nonzero per-generation error. The effective memory depth of cultural
     transmission (how many generations a meme survives) is determined by the
     signal-to-noise ratio of the transmission channel and the error-correcting code
     used (writing, ritual, institutional embedding).

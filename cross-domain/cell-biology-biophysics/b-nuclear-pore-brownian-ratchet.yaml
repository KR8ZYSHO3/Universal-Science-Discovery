id: b-nuclear-pore-brownian-ratchet
title: >
  Nuclear pore complex selective transport implements a Brownian ratchet mechanism
  where intrinsically disordered FG-nucleoporins create a fluctuating free-energy
  barrier that is directionally biased by RanGTP hydrolysis — the same physical
  principle that underlies kinesin stepping and other cytoskeletal molecular motors.
status: proposed
fields:
  - cell-biology
  - biophysics
  - statistical-mechanics
bridge_claim: >
  The nuclear pore complex (NPC) must transport hundreds of macromolecules per second
  while maintaining selectivity against non-specific cargo. Biophysics provides the
  mechanism: the ~50 nm channel is filled with intrinsically disordered FG-repeat
  nucleoporins that undergo rapid conformational fluctuations. Import receptors
  (importins) carrying nuclear localisation signal cargo bind FG repeats via hydrophobic
  interactions, transiently lowering the free-energy barrier for passage — a Brownian
  ratchet. The ratchet is made directional by the RanGTP gradient (high GTP in nucleus,
  low in cytoplasm): RanGTP displaces importin-cargo complexes, releasing cargo in the
  nucleus. The same Fokker-Planck equation describing kinesin stepping on microtubules
  describes importin hopping between FG repeat binding sites. This bridge connects
  cell biology (organelle biology, nuclear transport) with the biophysics of
  non-equilibrium fluctuation-driven transport, making quantitative predictions about
  selectivity thresholds, transport rates, and the effect of nucleoporin mutations.
translation_table:
  - field_a_term: Brownian ratchet potential
    field_b_term: FG-nucleoporin interaction energy landscape for importin-cargo
    note: The asymmetric free-energy potential that converts thermal fluctuations into directed transport
  - field_a_term: power stroke / rectification
    field_b_term: RanGTP hydrolysis releasing importin-cargo in nucleus
    note: The energy input that prevents backward flux and sets the directionality
  - field_a_term: diffusion coefficient D
    field_b_term: importin diffusion rate through FG meshwork
    note: Sets the speed of transport and scales with cargo size as D ~ 1/r (Stokes-Einstein)
  - field_a_term: selectivity filter
    field_b_term: FG-repeat hydrophobic interaction threshold
    note: Cargo without NLS cannot make sufficient FG contacts to transiently lower the barrier
cross_pollination_opportunities:
  - Apply Fokker-Planck / Kramers rate theory to predict NPC throughput as a function of FG-nucleoporin density and binding energy
  - Use single-molecule FRET to measure the free-energy landscape of importin translocation and compare with Brownian ratchet model predictions
  - Design synthetic selective channels by engineering FG-repeat mimics with tunable binding energetics
last_reviewed: "2026-05-07"
references:

    note: Buenrostro et al. (2015) — ATAC-seq; the open chromatin landscape
  - doi: 10.1126/science.1229223
    note: Klemm et al. (2019) — chromatin accessibility and the regulatory epigenome
  - doi: 10.1016/j.cell.2009.09.010

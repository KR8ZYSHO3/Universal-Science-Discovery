id: b-protein-ubiquitination-proteostasis-network
title: >
  Protein ubiquitination cascades (E1-E2-E3 hierarchies) constitute a post-translational regulatory network whose topology determines proteostasis capacity: the systems-level flux balance between ubiquitin ligase activity and proteasome degradation controls whether misfolded proteins accumulate or are cleared, with implications for aging and neurodegeneration
status: established
fields:
  - cell-biology
  - systems-biology
bridge_claim: >
  Ubiquitination operates as a hierarchical enzymatic cascade (E1 ubiquitin-activating → E2 conjugating → E3 ligase substrate-specific) that attaches polyubiquitin chains to target proteins for 26S proteasome degradation; systems biology modeling of this network reveals proteostasis collapse as a bistable switch: at low misfolded protein load, proteasome clears substrates (high-proteostasis state); above a threshold, misfolded proteins outcompete native substrates for E3 ligases and proteasome capacity, causing irreversible accumulation (low-proteostasis state) — analogous to positive feedback bistability in biochemical systems.
translation_table:
  - field_a_term: "E3 ubiquitin ligase substrate specificity (cell biology)"
    field_b_term: "molecular recognition node in the ubiquitination network topology (systems biology)"
    note: "Each E3 ligase defines a node in the protein degradation network; network topology determines substrate competition dynamics"
  - field_a_term: "polyubiquitin chain linkage type K48 vs K63 (cell biology)"
    field_b_term: "signal encoding in degradation network — degradation signal vs. DNA damage pathway signal (systems biology)"
    note: "K48-linked chains route proteins to proteasome; K63-linked chains signal DNA damage response or autophagy"
  - field_a_term: "proteasome substrate competition (cell biology)"
    field_b_term: "resource competition in a degradation network with limited processing capacity (systems biology)"
    note: "Multiple ubiquitinated substrates compete for finite 26S proteasome channel capacity; high competition causes selective degradation failure"
  - field_a_term: "proteostasis collapse in neurodegeneration (cell biology)"
    field_b_term: "bistable switch in ubiquitin-proteasome system flux balance (systems biology)"
    note: "α-synuclein / tau aggregates sequester E3 ligases and clog proteasome, creating positive feedback loop toward proteostasis failure"
communication_gap: >
  Cell biologists characterize ubiquitination substrates and E3 ligase specificities while systems biologists build network models of signal transduction; quantitative models of ubiquitin flux and proteostasis capacity as an emergent network property are rare, partly because E3 ligase kinetic parameters are poorly measured.
cross_pollination_opportunities:

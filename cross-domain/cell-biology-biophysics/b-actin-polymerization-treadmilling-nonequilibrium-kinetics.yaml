cross_pollination_opportunities:
  - Applying non-equilibrium fluctuation theorems (Jarzynski, Crooks) to measure free energy dissipation in living actin networks in single cells
  - Engineering synthetic actin-like treadmilling polymers using design principles from non-equilibrium thermodynamics for active matter applications
communication_gap: >
  Cell biologists studying actin dynamics and biophysicists studying non-equilibrium
  statistical mechanics share the treadmilling framework, but quantitative application
  of fluctuation theorems and entropy production calculations to intracellular actin
  networks remains limited; most cell biology textbooks present treadmilling
  phenomenologically without connecting it to the non-equilibrium thermodynamic theory.

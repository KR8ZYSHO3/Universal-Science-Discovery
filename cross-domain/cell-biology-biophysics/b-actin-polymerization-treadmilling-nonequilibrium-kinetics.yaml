id: b-actin-polymerization-treadmilling-nonequilibrium-kinetics
title: >
  Actin filament treadmilling — simultaneous polymerization at the barbed end and
  depolymerization at the pointed end — is a non-equilibrium steady state maintained
  by ATP hydrolysis that bridges cell biology and non-equilibrium thermodynamics:
  the persistent directional flux requires constant energy input and violates
  detailed balance, making it a paradigmatic example of a biological Brownian ratchet.
status: established
fields:
  - cell-biology
  - biophysics
  - non-equilibrium-physics
bridge_claim: >
  At steady-state treadmilling, the barbed end grows (k+_b·[G-actin] > k-_b) while
  the pointed end shrinks (k-_p > k+_p·[G-actin]). The critical concentration
  c_c = (k-_b·k+_p - k-_p·k+_b) / (k+_b·k+_p - k-_b·k-_p) sets the unique
  [G-actin] where net filament length is zero but ends are active. Treadmilling
  rate v = k+_b·[G-actin] - k-_b gives a directed flux that dissipates free energy
  at rate ΔẊ = kT·ln([ATP]·k_hyd/(k-_hyd·[ADP][Pi])) per monomer added.
  Without ATP hydrolysis, the critical concentrations at both ends would be equal
  (thermodynamic equilibrium), and treadmilling would cease. This is a textbook
  non-equilibrium system where entropy production σ = J·∆μ/T (J = treadmilling
  flux, ∆μ = ATP hydrolysis free energy) sustains the biological function.
translation_table:
  - field_a_term: actin treadmilling (cell biology)
    field_b_term: non-equilibrium steady-state flux violating detailed balance (biophysics)
    note: Treadmilling is sustained by ATP free energy; without hydrolysis it equilibrates
  - field_a_term: barbed vs pointed end critical concentrations (cell biology)
    field_b_term: asymmetric boundary conditions of a driven diffusion system (biophysics)
    note: The different c_c values at each end are the thermodynamic signature of the non-equilibrium drive
  - field_a_term: ATP hydrolysis by actin (cell biology)
    field_b_term: free energy input maintaining non-equilibrium flux (biophysics)
    note: Delta-mu_ATP = ~50 kJ/mol drives the directional polymerization cycle
  - field_a_term: protrusive force of polymerizing actin (cell biology)
    field_b_term: Brownian ratchet rectifying thermal fluctuations (biophysics)
    note: Growing actin filament pushes a membrane by preventing backwards Brownian steps

id: b-commons-game-theory-ostrom
title: >
  Hardin's tragedy of the commons is a prisoner's dilemma, and Ostrom's
  polycentric governance of common-pool resources is formally equivalent
  to the folk theorem of repeated game theory: communities that interact
  repeatedly sustain cooperation via conditional punishment strategies,
  provided the discount factor δ exceeds a critical cooperation threshold.
status: established
fields:
  - ecology
  - economics
  - game-theory
  - evolutionary-biology
  - political-science
bridge_claim: >
  Hardin (1968) argued that rational individuals sharing a common
  resource (fishery, pasture, aquifer) will inevitably overexploit it —
  each user captures the full benefit of increased extraction but shares
  the cost of depletion. This is a prisoner's dilemma (PD) with the
  payoff structure:
    Cooperate (C): restrain use → T > R > P > S
    Defect (D): overextract → dominant strategy for both players

  where T = temptation, R = reward, P = punishment, S = sucker's payoff.
  In a one-shot PD, defection is the unique Nash equilibrium, leading
  to the "tragedy."

  Ostrom's Nobel-winning work (1990) documented that in practice, many
  communities successfully manage common-pool resources (CPRs) for
  centuries without privatisation (Hardin's market solution) or state
  regulation. The key insight is that resource users interact repeatedly,
  and game theory predicts this changes everything:

  1. THE FOLK THEOREM (Fudenberg & Maskin 1986, Aumann & Shapley 1994):
     In an infinitely repeated prisoner's dilemma with discount factor
     δ (the probability the game continues / present value of future
     payoffs), any payoff vector in the individually rational feasible
     set can be sustained as a Nash equilibrium if δ is sufficiently
     large:
       δ_c = (T - R) / (T - P)  [critical cooperation threshold]
     For δ > δ_c, the grim-trigger strategy (cooperate until one defection,
     then defect forever) sustains cooperation as a subgame-perfect
     Nash equilibrium (SPNE).

  2. OSTROM'S DESIGN PRINCIPLES AS MECHANISM DESIGN: Ostrom's eight
     design principles for sustainable CPR governance (clearly defined
     boundaries, proportional rules, collective choice arrangements,
     monitoring, graduated sanctions, conflict resolution, recognition
     by external authority, polycentric governance) are precisely the
     institutional conditions that shift δ above δ_c and reduce
     defection temptation T:
     - Monitoring: increases detection probability → makes future
       punishment credible → increases effective δ
     - Graduated sanctions: implements the threat schedule of the
       folk theorem (proportional punishment)
     - Clear boundaries: defines who is in the repeated game
     - Collective choice: coordinates on which equilibrium to play

  3. AXELROD'S TOURNAMENTS: Axelrod (1984) demonstrated computationally
     that Tit-for-Tat (TFT) — cooperate on the first move, then copy
     your partner's last move — wins iterated prisoner's dilemma
     tournaments. TFT is a memory-1 implementation of the folk theorem
     cooperation strategy. Biological populations evolving TFT strategies
     are implementing repeated game equilibria through natural selection —
     the same mechanism Ostrom found in human CPR governance.

  4. EVOLUTIONARY GAME THEORY CONNECTION: The replicator dynamics for
     a population playing Cooperators vs. Defectors give:
       dΔx/dt = x(1-x)[f_C(x) - f_D(x)]
     where x is the cooperator frequency. In the one-shot PD, f_C < f_D
     for all x (defection always spreads). In the repeated PD with
     δ > δ_c, f_C > f_D near x = 1 — cooperation is an evolutionarily
     stable strategy (ESS). Ostrom communities have found the biological
     equivalent of the cooperator ESS basin.

  5. POLYCENTRICITY = NETWORK GAME: Ostrom's "polycentric governance"
     (multiple overlapping governance units at different scales) maps to
     a network game where the adjacency matrix determines which pairs
     play repeated games with each other. Local tight-knit communities
     have high δ (frequent interaction, low discount); interactions
     between distant strangers have low δ. Polycentric governance
     creates the overlapping high-δ patches that sustain cooperation at
     each scale.

  EMPIRICAL VALIDATION: Ostrom's team documented CPR governance in Swiss
  and Japanese mountain commons (operating sustainably for >500 years),
  Spanish irrigation systems (>centuries), Maine lobster fisheries, and
  Nepali farmer-managed irrigation systems. All exhibit the mechanism-
  design features that correspond to folk-theorem cooperation conditions.

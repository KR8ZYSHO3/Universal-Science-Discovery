cross_pollination_opportunities:
  - >
    The critical discount factor δ_c can be estimated empirically from
    CPR governance data: communities that collapse (fishery depletion,
    aquifer exhaustion) should have measurably lower interaction frequency
    and weaker monitoring than those that sustain cooperation. Testing
    this prediction across Ostrom's global dataset of CPR systems would
    provide the first quantitative validation of the folk theorem as the
    mechanism underlying Ostrom's design principles.
  - >
    Climate change mitigation is a global commons problem (tragedy of the
    atmosphere). The folk theorem framework predicts the conditions under
    which international cooperation on emissions can be sustained: the
    effective discount factor δ must exceed δ_c across all major emitter
    pairs. Computing δ_c from the payoff structure of the climate PD
    (using damage cost estimates) and comparing to observed international
    interaction frequencies would quantify how far current governance is
    from the cooperation threshold.
  - >
    Evolutionary simulations of CPR games in structured populations
    (network games) show that cooperation spreads faster on clustered
    networks — consistent with Ostrom's observation that tight-knit
    communities govern commons better than dispersed users. A systematic
    mapping of CPR governance outcomes to network topology metrics
    (clustering coefficient, average path length) would test whether
    Ostrom's polycentric governance principle is a special case of the
    network-game cooperation condition.
communication_gap: >
  Hardin (1968) wrote for biologists and ecologists without awareness
  of the formal game theory literature that already described the PD
  structure he was articulating. Ostrom (1990) developed her framework
  in political science and institutional economics, citing game theory
  informally but not deriving the folk theorem connection explicitly.
  Fudenberg & Maskin (1986) proved the folk theorem in the economics
  theory literature without reference to CPR governance. Axelrod (1984)
  connected TFT to cooperation in biology and political science but not
  explicitly to Ostrom's institutional framework. The complete formal
  equivalence — Ostrom's design principles = folk theorem conditions —
  is recognised in mechanism design theory but has not been translated
  back into ecology and conservation policy.

id: b-bet-hedging-x-portfolio-diversification
title: >
  Evolutionary bet hedging spreads reproductive risk across correlated environmental states — analogous to diversification lowering variance of portfolio returns when asset shocks are imperfectly correlated — making correlation structure (between-year environments vs between-lineage phenotypes) the shared mathematical object linking ecology and finance.
status: proposed
fields:
  - evolutionary-ecology
  - economics
  - stochastic-processes
bridge_claim: >
  Bet hedging trades arithmetic mean fitness for geometric mean fitness across stochastic environments by maintaining phenotypic variance or stochastic switching (Lottery vs conservative strategies).
  Portfolio diversification trades mean return for variance reduction by combining imperfectly correlated assets (Markowitz framework).
  Both frameworks hinge on covariance structure: hedging helps when environmental shocks are asynchronous across offspring lines or years; diversification helps when asset movements decouple.
  Kelly-optimal growth connections already link microbial noise to information theory; this bridge foregrounds correlation matrices explicitly — ecology tracks environmental autocorrelation and spatial correlation; finance tracks asset correlation and tail dependence.
translation_table:
  - field_a_term: Phenotypic variance / stochastic switching rate in bet hedging
    field_b_term: Portfolio weights across risky assets
    note: Both tune allocation across substates to reshape variance of growth rates.
  - field_a_term: Environmental covariance across time or patches
    field_b_term: Asset return covariance matrix Σ
    note: Color noise vs independent shocks maps to correlated vs idiosyncratic asset risks.
  - field_a_term: Geometric mean fitness / long-run growth rate
    field_b_term: Expected log wealth growth under reinvestment (Kelly-like objectives)
    note: Same multiplicative growth mathematics motivates optimizing logs rather than arithmetic means.
communication_gap: >
  Evolutionary ecology emphasizes bet hedging verbal definitions while mathematical finance emphasizes covariance estimation and tail risk; cross citations remain sparse outside theoretical ecology journals importing Kelly portfolio ideas.
cross_pollination_opportunities:
  - >
    Export factor models from finance (latent macro shocks) to structured environments with hidden climate modes affecting correlated species cohorts.
  - >
    Apply empirical correlation estimation methods from ecology time series (wavelets, spectrum coloring) to construct diversification analogies for conservation reserve networks under correlated disturbance risks.

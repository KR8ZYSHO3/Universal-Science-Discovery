cross_pollination_opportunities:
  - >
    Physical realization survey: which condensed-matter systems are in the toric-code
    topological phase? Candidates include Z2 quantum spin liquids (e.g. alpha-RuCl3,
    H3LiIr2O6), Majorana-based platforms (InAs/Al nanowires), and fractional quantum
    Hall states at nu=5/2. Each is simultaneously a quantum error-correcting code.
    Measuring topological entanglement entropy confirms the code structure.
  - >
    Error threshold as phase transition: the toric code threshold error rate (~11%
    for depolarizing noise) corresponds exactly to the paramagnetic-to-ordered phase
    transition in the random-bond Ising model. This statistical mechanics mapping
    allows Monte Carlo computation of thresholds for arbitrary noise models.
  - >
    Fracton topological order (Haah code, X-cube model): these 3D generalizations
    have no string operators — excitations are immobile except in groups. They
    represent a new class of matter beyond the topological phase classification,
    with potential for even higher code distances. No physical realization is known.
  - >
    Holographic error correction (Almheiri-Dong-Harlow, 2015): the AdS/CFT bulk-boundary
    correspondence is a quantum error-correcting code where bulk operators are encoded
    in boundary CFT degrees of freedom. This connects topological QEC to quantum gravity.
communication_gap: >
  Quantum error correction research lives primarily in quantum information/computing
  conferences (QIP, IEEE QW). Topological condensed matter research lives in
  physical review journals (PRB, PRL, Nature Physics). Gauge theory lives in
  high-energy theory (JHEP, PRD). Despite the mathematical identity of these
  three perspectives, cross-citation is limited. Experimentalists building
  topological qubits (Google, Microsoft, IBM) rarely cite the condensed-matter
  topological order literature from the same year, and vice versa.

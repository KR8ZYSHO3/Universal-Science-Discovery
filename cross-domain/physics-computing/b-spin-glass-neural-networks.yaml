communication_gap: >
  Hopfield acknowledged the connection to spin glasses in his 1982 paper, but the
  exact capacity calculation required the full machinery of replica symmetry breaking
  developed by Parisi for spin glasses — a result not published until 1979, and not
  fully understood until the mid-1980s.  The ML community largely rediscovered this
  independently through the deep learning loss-landscape literature of 2014-2016,
  without initially connecting it to the Parisi replica solution.


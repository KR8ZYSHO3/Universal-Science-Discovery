id: b-nutrient-cycling-stoichiometry
title: >
  Ecological stoichiometry bridges ecology and chemistry: the Redfield ratio (C:N:P =
  106:16:1) reveals that ocean chemistry and phytoplankton biochemistry have co-evolved
  toward elemental homeostasis, and Liebig's law of the minimum connects nutrient
  limitation to growth rates via the physics of diffusion-limited resource acquisition.
status: established
fields:
  - ecology
  - biogeochemistry
  - physics
  - chemistry
  - marine-biology
  - limnology
bridge_claim: >
  Ecological stoichiometry (Sterner & Elser 2002) is the study of the balance of
  chemical elements in ecological interactions. It unifies ecological dynamics with
  the conservation of matter: organisms require multiple elements in specific ratios,
  and imbalances between supply and demand drive competition, predator-prey dynamics,
  and ecosystem processes.

  The Redfield ratio: Alfred Redfield (1934, 1958) observed that the atomic ratio
  C:N:P = 106:16:1 in marine phytoplankton is remarkably constant across species and
  ocean basins, and closely matches the N:P ratio of deep ocean water. This convergence
  is not coincidental: phytoplankton growth depletes N and P in a 16:1 ratio, and ocean
  circulation replenishes them at the same ratio — a co-evolutionary feedback between
  life and ocean chemistry operating over geological timescales.

  Liebig's law of the minimum (1840): plant growth is controlled not by total available
  nutrients but by the nutrient in shortest supply relative to the organism's requirement.
  This is a resource allocation principle from physics: the growth rate is the minimum
  of all individual resource uptake rates. Mathematically, μ = μ_max · min(N/K_N, P/K_P, ...)
  — the Droop model for nutrient-limited growth.

  The growth rate hypothesis (Elser et al. 1996): organisms with high growth rates
  require more ribosomal RNA (rRNA constitutes 80% of total RNA), and rRNA is
  phosphorus-rich (~3.5% P by mass). Therefore, fast-growing organisms have high P
  demand and low C:P and N:P ratios. This mechanistic hypothesis links cellular
  biochemistry (ribosome abundance) to ecosystem stoichiometry (P cycling).

  Stoichiometric mismatch and eutrophication: when N:P ratio in algal biomass drops
  below ~10 (Redfield ratio N:P = 16), nitrogen-fixing cyanobacteria are competitively
  favored (they can fix N₂ but not P). Agricultural runoff delivers high-P water,
  driving N:P below 10 and triggering blue-green algae (cyanobacterial) blooms —
  a direct application of stoichiometric theory to environmental management.

  Homeostasis vs. flexibility: animals maintain strict elemental stoichiometry
  (homeostatic regulation — body composition buffered against dietary variation),
  while plants are flexible stoichiometrically. This creates stoichiometric mismatches
  in food webs: when algae grown under P-limitation have very high C:P, Daphnia
  (strict homeostats requiring ~C:P ~ 50) must consume excess carbon or grow slowly.
translation_table:
  - field_a_term: Liebig's law of the minimum (limiting nutrient)
    field_b_term: bottleneck in a multi-step production process (operations research)
    note: both identify the scarcest resource as the rate-limiting factor in a multi-requirement system
  - field_a_term: Redfield ratio C:N:P = 106:16:1 (marine phytoplankton)
    field_b_term: chemical formula / molar ratio of a compound (chemistry)
    note: Redfield ratio is essentially the average molecular formula of marine phytoplankton biomass
  - field_a_term: stoichiometric homeostasis (animal maintains fixed C:N:P)
    field_b_term: regulation / setpoint control (control theory, physiological homeostasis)
    note: homeostatic organisms regulate body composition like a thermostat — feedback prevents drift
  - field_a_term: growth rate hypothesis (high growth → high P:C ratio via rRNA)
    field_b_term: metabolic scaling theory (growth rate scales with cellular machinery allocation)
    note: connects molecular biochemistry (ribosome stoichiometry) to ecosystem element cycling
  - field_a_term: eutrophication (excess N and P → algal blooms)
    field_b_term: "stoichiometric imbalance (N:P < 10 favoring N-fixers over N-limited species)"
    note: "N:P ratio determines community composition via competitive advantage — a stoichiometric selector"

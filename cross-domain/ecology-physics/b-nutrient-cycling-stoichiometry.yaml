cross_pollination_opportunities:
  - >
    Stoichiometric theory of evolution: the growth rate hypothesis predicts that
    the C:P and N:P ratios of organisms should evolve toward the Redfield ratio
    under balanced resource supply and that rapid evolutionary change in ribosome
    abundance (driven by selection for fast growth) should leave a stoichiometric
    signature in the fossil record. Paleoproxy measurements of ancient ocean N:P
    ratios (from shale δ¹⁵N and P concentration) could test whether the Redfield
    ratio has been constant through Earth's history or has co-evolved with
    atmospheric oxygenation.
  - >
    Astrobiology application: if the Redfield ratio reflects a universal property
    of life (fixed by the biochemistry of ribosomes and metabolic pathways), then
    detecting elemental imbalances in planetary atmospheres or ice-covered oceans
    (Enceladus, Europa) that deviate from the Redfield ratio could signal the
    absence of life; detection of convergent Redfield-like ratios could be a
    biosignature in extraterrestrial environments.
communication_gap: >
  Stoichiometry is a concept from chemistry; ecology traditionally studied species
  interactions, population dynamics, and energy flow without systematic accounting
  of elemental mass balances. The Redfield ratio (1958) was a marine chemistry
  observation; its ecological implications were developed by Elser and Sterner
  (1992-2002) three decades later. Limnologists studying freshwater lakes and
  marine oceanographers studying ocean biogeochemistry developed separate bodies
  of stoichiometric theory that were only synthesized by Sterner & Elser (2002).
  Ecological stoichiometry remains underrepresented in ecology textbooks relative
  to its explanatory power for nutrient cycling, eutrophication, and community ecology.

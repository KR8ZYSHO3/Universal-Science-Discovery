cross_pollination_opportunities:
  - >
    Pattern formation theory (Turing instabilities, spiral waves) could explain
    fire spotting (long-range ember transport creating spot fires ahead of the main
    front) as a reaction-diffusion instability — potentially enabling prediction of
    spot fire probability from meteorological and fuel conditions.
  - >
    The physics of fire front propagation (particularly the role of turbulent
    convection in heat transport) is directly analogous to detonation waves and
    flame propagation in combustion engineering — cross-disciplinary tools (DNS of
    turbulent combustion) could improve wildfire spread models.
communication_gap: >
  Fire ecologists who study post-fire vegetation recovery and fire regimes rarely
  engage with the atmospheric physics of pyroconvection. Fire behavior analysts
  who use Rothermel's model operationally often do not engage with the reaction-
  diffusion theory underlying it. Climate scientists modeling fire-atmosphere
  feedbacks often treat fire as a simple carbon flux without the fluid mechanics.

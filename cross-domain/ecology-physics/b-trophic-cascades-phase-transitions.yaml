id: b-trophic-cascades-phase-transitions
title: Trophic cascades triggered by apex predator removal are fold bifurcations (saddle-node) in ecosystem dynamical systems — the same mathematics as all ecological tipping points
status: established
fields:
  - ecology
  - physics
bridge_claim: >
  Trophic cascades — propagation of population changes from apex predators down through herbivore
  and primary producer trophic levels — represent transitions between multiple stable ecosystem
  states. The system possesses two stable fixed points (predator-present and predator-absent
  states) separated by an unstable equilibrium. Mathematically, the transition is a fold
  bifurcation (saddle-node bifurcation) in the prey-vegetation dynamical system: as predator
  abundance decreases below a threshold, the stable predator-present fixed point annihilates
  with the unstable equilibrium, and the system jumps discontinuously to the alternative stable
  state. The reintroduction of wolves to Yellowstone (1995) triggered a cascade that altered
  elk behaviour (trophic cascade), vegetation recovery, and ultimately river morphology
  (geomorphic cascade). This is formally identical to the fold catastrophes in climate systems,
  lake eutrophication, and coral reef transitions — all governed by the same bifurcation theory.
translation_table:
  - field_a_term: apex predator density
    field_b_term: control parameter (bifurcation parameter)
    note: Predator abundance plays the role of the control parameter crossing a tipping point
  - field_a_term: ecosystem with/without top predator
    field_b_term: two stable fixed points / alternative stable states
    note: Both correspond to stable equilibria of the dynamical system
  - field_a_term: trophic cascade threshold
    field_b_term: saddle-node bifurcation point
    note: The critical predator density below which the system transitions
  - field_a_term: behaviour modification by prey (landscape of fear)
    field_b_term: nonlinear feedback loop
    note: Indirect effects arise from nonlinear coupling between trophic levels

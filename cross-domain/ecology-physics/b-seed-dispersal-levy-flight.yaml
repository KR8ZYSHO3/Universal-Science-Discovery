cross_pollination_opportunities:
  - "Lévy flight optimal search theory (Viswanathan et al. 1999) predicts that μ~1 maximizes foraging efficiency on sparse, randomly distributed patches — testing whether plant species that rely on sparse-patch colonizers have dispersal kernels with μ near 1."
  - "Invasive species risk: Lévy flight invasion speed formulas from statistical physics provide analytical predictions for post-introduction range expansion velocity, enabling triage of invasion risk before empirical data accumulate."
communication_gap: >
  Ecologists who measure dispersal kernels typically fit log-normal or 2Dt
  distributions without connecting to stable distribution theory or Lévy flight
  literature from statistical physics. The mathematical equivalence means
  existing Lévy flight results (anomalous diffusion scaling, optimal search
  theory) directly apply to ecology but are rarely cited in plant dispersal papers.

cross_pollination_opportunities:
  - "Test WBE predictions for engineered vascular networks in tissue engineering and organ-on-chip devices"
  - "Apply fractal network scaling to urban infrastructure (water distribution, electrical grids) to derive optimal city design"
  - "Use the WBE framework to predict ontogenetic growth curves from first principles and test against developmental data"

communication_gap: >
  The West-Brown-Enquist paper appeared in Science but was largely developed by
  physicists (West) in collaboration with ecologists (Brown, Enquist). Mainstream
  ecology journals were initially skeptical — many ecologists distrusted the
  level of mathematical abstraction. Subsequent debates about deviations from ¾
  scaling (some taxa show 2/3 exponents) have been productive but are conducted
  largely in separate literatures (ecology vs biophysics) with limited cross-citation.


cross_pollination_opportunities:
  - >
    The Kuramoto model has been extensively studied in neuroscience
    (neural synchrony, gamma oscillations) and in power-grid engineering
    (frequency synchronisation). The mathematical tools developed in
    those fields — mean-field approximations, noise-driven transitions,
    network topology effects on synchronisation — are directly applicable
    to phenological networks and have not been systematically imported.
  - >
    Long-term phenological datasets (European phenology networks, USA-NPN)
    now span 50+ years. Fitting Kuramoto parameters (ω_i, K_{ij}) to
    these time series and validating predictions against independent
    climate projections would provide the first quantitative test of
    whether ecological synchrony follows Kuramoto dynamics. This is
    feasible with existing data.
  - >
    Network effects in the Kuramoto model are known: scale-free networks
    synchronise more easily than random networks (Barabási hub nodes act
    as pacemakers). Food webs are known to have hub species. Predicting
    which food-web hubs are "phenological pacemakers" whose timing shifts
    cascade through the network could identify priority species for
    conservation intervention.
communication_gap: >
  Ecologists studying phenological mismatch and dynamical systems
  physicists studying coupled oscillators work in separate literature
  streams. The cross-correlation and coherence methods used in phenology
  are standard signal-processing tools but are not connected to Kuramoto
  theory in ecology papers. The Kuramoto model is applied extensively
  in neuroscience and engineering but ecologists are largely unaware of
  it. Visser & Both (2005) framed mismatch in terms of linear regression
  on climate sensitivity without the phase-oscillator formalism that
  would make the predictions quantitatively rigorous.

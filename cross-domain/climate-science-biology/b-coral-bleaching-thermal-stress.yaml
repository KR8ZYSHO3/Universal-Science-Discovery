id: b-coral-bleaching-thermal-stress
title: "Coral bleaching is triggered when the degree-heating-week (DHW) threshold exceeds 8°C-weeks: this nonlinear thermal accumulation metric predicts bleaching probability with AUC~0.85 across reef systems"
status: established
fields:
  - ecology
  - climate-science
  - marine-biology
bridge_claim: >
  Coral bleaching (expulsion of symbiotic zooxanthellae from coral tissue) occurs
  when thermal stress accumulates beyond a critical threshold. NOAA's Coral Reef
  Watch defines the Degree Heating Week (DHW) metric: DHW(t) = Σ_{τ=t-12wk}^{t}
  max(SST_τ - MMM - 1°C, 0) / 7, where MMM is the Maximum Monthly Mean
  temperature for that reef. When DHW > 4°C-weeks: watch level (some bleaching);
  DHW > 8°C-weeks: Alert Level 2 (widespread bleaching and mortality). This is
  a nonlinear threshold response: the relationship between thermal stress and
  bleaching probability is sigmoidal with a steep transition at DHW~8.
  The mechanistic basis is photoinhibition: at elevated temperatures, ROS
  production in photosystem II of Symbiodiniaceae exceeds antioxidant capacity,
  triggering the coral immune response that expels the algae.
translation_table:
  - field_a_term: "degree-heating-week (DHW) thermal stress index"
    field_b_term: "cumulative integral of temperature excess above bleaching threshold"
    note: "DHW has units °C·weeks; functionally analogous to dose in dose-response pharmacology"
  - field_a_term: "bleaching threshold temperature MMM + 1°C"
    field_b_term: "critical temperature above which ROS production exceeds repair capacity"
    note: "The +1°C above MMM rather than MMM itself reflects thermal acclimation history"
  - field_a_term: "bleaching probability curve as function of DHW"
    field_b_term: "sigmoidal dose-response function with EC50 ~ 8°C-weeks"
    note: "Logistic regression of bleaching incidence on DHW gives slope and threshold parameters"
  - field_a_term: "thermal tolerance variation across Symbiodiniaceae clades"
    field_b_term: "host-symbiont combination determines the effective EC50 of the dose-response"
    note: "Clade D symbionts increase bleaching threshold by ~1-2°C — raises DHW threshold"
related_unknowns:
  - u-coral-bleaching-thermal-stress
related_hypotheses:
  - h-coral-bleaching-thermal-stress
cross_pollination_opportunities:
  - "Assisted evolution for thermal tolerance: selective breeding or CRISPR-based gene editing of Symbiodiniaceae for higher ROS tolerance requires understanding the molecular threshold mechanism — connecting climate science, marine biology, and molecular genetics."
  - "Probabilistic bleaching forecasts: NOAA CRW satellite SST monitoring combined with ENSO/climate model projections enables 4-month bleaching probability forecasts, directly applying DHW thermodynamics to conservation management and reef restoration planning."
communication_gap: >
  Climate scientists who model ocean temperatures and marine biologists who study
  coral physiology use the DHW metric without always connecting it to the
  threshold-dose-response models from toxicology and pharmacology. The ecological
  threshold literature (tipping points, alternative stable states) provides
  relevant mathematical frameworks for predicting coral collapse under climate
  change that are underutilized in reef ecology.

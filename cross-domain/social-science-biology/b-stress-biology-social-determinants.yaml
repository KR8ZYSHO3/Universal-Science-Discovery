id: b-stress-biology-social-determinants
title: >
  The biology of chronic stress bridges social science and biology: social determinants
  of health (employment, neighborhood, social status) are biologically embedded via
  the HPA axis, cortisol dysregulation, telomere shortening, and epigenetic modification —
  translating social inequality into measurable molecular and cellular damage.
status: established
fields:
  - social-science
  - sociology
  - biology
  - endocrinology
  - epidemiology
  - public-health
  - epigenetics
bridge_claim: >
  Allostatic load (McEwen & Stellar 1993): chronic activation of stress-response systems
  (HPA axis, sympathetic nervous system, immune system) causes cumulative physiological
  wear that manifests as elevated cortisol, dysregulated circadian cortisol rhythms,
  elevated inflammatory markers (IL-6, CRP, TNF-α), and accelerated cellular aging.
  This concept provides the molecular mechanism through which social conditions translate
  into health disparities.

  The social gradient of health (Marmot Whitehall study, 1978): 18,000 British civil
  servants showed a graded, monotonic relationship between employment grade and
  mortality from cardiovascular disease — not explained by access to care, smoking, or
  known cardiovascular risk factors alone. Each step down the hierarchy increased
  mortality risk by ~20-30%. The gradient is explained by psychosocial factors:
  job control (autonomy, ability to use skills), social support, and perceived status
  — all of which modulate HPA axis activation.

  Adverse Childhood Experiences (ACEs, Felitti et al. 1998): 17,000 Kaiser Permanente
  patients with retrospective ACE assessment showed dose-response relationships between
  childhood adversity and adult disease (cardiovascular, cancer, liver disease, depression).
  The biological mechanism: early-life stress programs the HPA axis setpoint, alters
  glucocorticoid receptor expression via DNA methylation (FKBP5, NR3C1 promoter
  methylation — McGowan et al. 2009), and modifies immune function permanently.

  Telomere shortening (Epel et al. 2004): caregivers of chronically ill children had
  shorter telomeres and lower telomerase activity than controls, proportional to years
  of caregiving stress. Telomere length is a direct biomarker of replicative aging;
  stress-induced oxidative damage (8-OHdG) at guanine-rich telomere repeats (TTAGGG)n
  accelerates telomere attrition.

  The neighborhood effect: residing in high-poverty neighborhoods is independently
  associated with elevated cortisol (measured by hair cortisol, integrating 3 months
  of exposure) even after controlling for individual-level SES — demonstrating that
  place itself is biologically active via chronic psychosocial stress.
translation_table:
  - field_a_term: socioeconomic status (SES — income, education, occupation)
    field_b_term: "allostatic load score (composite of 10+ biomarkers: cortisol, BP, waist-hip ratio, CRP)"
    note: SES is measured at population level; allostatic load is the biological fingerprint of SES on the body
  - field_a_term: job control / autonomy (social science construct)
    field_b_term: HPA axis reactivity to controllable vs. uncontrollable stressors
    note: controllability determines whether cortisol response is adaptive (acute) or damaging (chronic)
  - field_a_term: adverse childhood experience (ACE score, 10-item questionnaire)
    field_b_term: NR3C1 and FKBP5 methylation (glucocorticoid receptor gene epigenetic programming)
    note: ACE score predicts methylation status 20-30 years later; biological embedding of social history
  - field_a_term: social isolation (epidemiological risk factor — relative risk ~1.5 for mortality)
    field_b_term: elevated inflammatory cytokines IL-6, TNF-α, CRP (molecular immune activation)
    note: Cacioppo's work shows loneliness up-regulates pro-inflammatory gene expression within hours
  - field_a_term: neighborhood poverty level (census tract)
    field_b_term: hair cortisol concentration (3-month integrated cortisol exposure)
    note: hair cortisol provides biological measurement of chronic psychosocial stressor exposure

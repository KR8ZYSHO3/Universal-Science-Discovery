cross_pollination_opportunities:
  - >
    Intergenerational transmission of stress: epigenetic changes induced by social
    adversity (NR3C1 methylation, FKBP5 methylation) are partially inherited via
    germline epigenetic marks — demonstrated in rodent models (Meaney lab) and
    suggested by human studies of Holocaust survivor offspring. Understanding whether
    social inequality literally programs future generations' stress biology via
    epigenetic inheritance would fundamentally change how we understand health equity
    as a biological phenomenon requiring multi-generational interventions.
  - >
    Social interventions as biological treatments: randomized trials of social
    interventions (neighborhood mobility vouchers, early childhood programs) could
    be combined with biomarker endpoints (telomere length, hair cortisol, methylation)
    to test whether changing social conditions reverses biological aging — providing
    mechanistic evidence for social policy as healthcare.
communication_gap: >
  Social determinants of health research and molecular biology operate in largely separate
  worlds. Epidemiologists (Marmot, Wilkinson, Link) document the social gradient using
  survey data and mortality statistics; molecular biologists (McEwen, Epel, McGowan)
  study stress biochemistry in rodents and cell cultures. Clinical medicine treats
  individuals; public health treats populations. The integration — measuring biological
  markers in population cohorts and connecting them to social exposures — requires
  epidemiological design, molecular biology methods, and social science theory
  simultaneously, a combination rarely found in single research teams or funded by
  single funding agencies.

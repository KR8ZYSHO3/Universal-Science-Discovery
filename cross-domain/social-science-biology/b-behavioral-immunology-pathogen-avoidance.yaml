id: b-behavioral-immunology-pathogen-avoidance
title: >
  Schaller's behavioral immune system (BIS) — evolved disgust-based pathogen avoidance
  using false-positive-biased detection — predicts cross-national correlations between
  historical pathogen prevalence and collectivism, sexual conservatism, and xenophobia,
  mapping to Neyman-Pearson Type I/II error trade-offs in signal detection theory.
status: established
fields:
  - social-science
  - biology
  - psychology
  - evolutionary-biology
  - immunology
bridge_claim: >
  The biological immune system responds to pathogens after infection, with latency of
  days to weeks. The behavioral immune system (Schaller & Park 2011) is a suite of
  cognitive-motivational mechanisms that detect pathogen cues before infection and
  activate prophylactic behavioral avoidance — a faster but cognitively-mediated
  defense layer. Core mechanism: disgust emotion evolved as food rejection (preventing
  ingestion of pathogens/parasites — Rozin 1987) then extended via domain generalisation
  to social disgust (avoidance of individuals displaying cues correlated with pathogen
  transmission: lesions, unusual odors, atypical morphology, outgroup membership).

  Evolutionary logic: the optimal detection threshold is set by the relative costs of
  false positives (avoid a safe contact, forgo cooperation) vs. false negatives (miss a
  pathogen carrier, become infected). In high-pathogen environments, the false-negative
  cost is catastrophically higher than the false-positive cost → the BIS should be
  calibrated toward liberal detection (high sensitivity, low threshold), accepting many
  false positives. This is mathematically equivalent to Neyman-Pearson hypothesis testing
  with an asymmetric loss function: shift detection threshold toward H₁ when C(FN) >> C(FP).

  Cross-national predictions (Fincher et al. 2008): historical pathogen prevalence (Yale
  Historical Pathogen Database) predicts collectivism (tighter ingroup vs. outgroup
  distinctions — more defensive social structures), lower extraversion, more conservative
  sexual attitudes, and reduced acceptance of outgroup members across 68 nations.
  The COVID-19 natural experiment (Murray et al. 2020): individuals higher in trait
  disgust sensitivity showed greater compliance with physical distancing, mask-wearing,
  and other non-pharmaceutical interventions — after controlling for age, risk perception,
  and political ideology.
translation_table:
  - field_a_term: immune system pathogen recognition receptor (PRR, e.g., TLR4)
    field_b_term: disgust elicitor cue detection system (perceptual pathogen detector)
  - field_a_term: innate immune false-positive (mount immune response to non-pathogen)
    field_b_term: BIS false positive (social avoidance of uninfected person with stigma cue)
  - field_a_term: pathogen avoidance (immunological tolerance vs. elimination)
    field_b_term: behavioral avoidance vs. engagement (social exclusion vs. inclusion)
  - field_a_term: Neyman-Pearson detection threshold θ (H₀/H₁ boundary)
    field_b_term: disgust sensitivity trait (individual variation in BIS activation threshold)
  - field_a_term: ROC curve (sensitivity vs. specificity trade-off)
    field_b_term: "BIS calibration trade-off: xenophobia cost vs. infection avoidance benefit"

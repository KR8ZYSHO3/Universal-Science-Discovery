cross_pollination_opportunities:
  - >
    Immunological studies of hygiene hypothesis (reduced pathogen exposure in modern
    environments → increased autoimmunity / allergies) may have a behavioral analog:
    reduced BIS calibration in low-pathogen urban environments may increase tolerance
    of outgroups but also reduce compliance with real infection control measures.
    Testing this would require psychometric BIS measures + immunological markers
    + epidemiological pathogen data in the same population samples.
  - >
    The BIS predicts that anti-immigration attitudes should correlate with local
    disease burden more strongly than with economic competition metrics — a prediction
    testable with multi-country panel data (Eurobarometer + WHO disease burden).
    Distinguishing BIS-driven xenophobia from economic threat requires measuring
    disgust sensitivity as mediator, requiring cross-disciplinary integration of
    social psychology, evolutionary biology, and political science.
communication_gap: >
  Behavioral immune system research is published primarily in social psychology and
  evolutionary psychology journals (Psych Science, Evol Hum Behav, J Pers Soc Psych),
  while immunological research on the same system is in immunology journals (J Immunol,
  Immunity). Epidemiologists who study pathogen prevalence rarely engage with
  cross-national personality research. Political scientists studying anti-immigration
  attitudes are largely unaware of the BIS literature. The signal-detection theory
  framing (False Positive / False Negative optimal threshold) is known to psychologists
  but the explicit connection to Neyman-Pearson statistics requires simultaneous
  expertise in decision theory and evolutionary psychology.

cross_pollination_opportunities:
  - >
    Archaeological record as evolutionary time series: stone tool typologies
    and pottery styles as culturally evolving populations. Bayesian phylogenetic
    methods (used for gene trees) applied to artefact type frequencies can
    distinguish drift from selection and reconstruct cultural phylogenies,
    replacing subjective typological analysis with quantitative evolutionary
    inference.
  - >
    Digital cultural evolution: social media platforms provide unprecedented
    data on meme replication (shares, likes), variation (mutations in content),
    and selection (differential virality). The cultural Price equation can be
    fitted to Twitter/TikTok data to measure cultural selection coefficients
    in real time — testing predictions of dual inheritance theory at scale.
  - >
    Language evolution: the regularisation of irregular verbs in English over
    centuries (Lieberman et al. 2007, Nature) follows a quantitative frequency-
    dependent rule (regularisation rate ∝ 1/√frequency) consistent with neutral
    evolutionary drift. This bridges cultural evolution, computational
    linguistics, and historical linguistics.
communication_gap: >
  Evolutionary biologists and cultural anthropologists have historically been
  suspicious of each other: biologists fear "just-so stories" about culture;
  anthropologists fear biological determinism and reductionism. The formal
  (mathematical) evolutionary approach of Cavalli-Sforza, Boyd & Richerson,
  and Henrich has been productive but remains a minority approach in cultural
  anthropology. Sociologists largely ignore evolutionary formalisms. The Price
  equation is standard in biology but unknown in most social science programmes.

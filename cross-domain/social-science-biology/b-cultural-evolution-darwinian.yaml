id: b-cultural-evolution-darwinian
title: >
  Cultural evolution is formally isomorphic to biological evolution — memes are
  replicators subject to transmission, variation, and selection; the Price
  equation governs both gene frequency change and cultural trait change; and
  replicator dynamics describe both biological fitness and cultural payoff —
  making evolutionary theory a universal framework for any inherited-variation-
  selection system.
status: established
fields:
  - social-science
  - evolutionary-biology
  - cultural-anthropology
  - evolutionary-game-theory
bridge_claim: >
  Cavalli-Sforza & Feldman (1981) and Boyd & Richerson (1985) independently
  formalised cultural evolution as a Darwinian process with explicit analogies
  to population genetics. The formal structure is:

  1. Price equation governs both. Price (1970, Nature 227:520) derived the
     fundamental equation of selection:
       ΔZ̄ = Cov(w, z)/w̄ + E[w·Δz]/w̄
     where Z̄ is the mean value of trait z, w is relative fitness, Cov(w,z)
     is the selection component, and E[w·Δz] is the transmission bias component.
     This equation holds for any replicating system — genes, cultural traits,
     or even scientific ideas — as long as there is heritable variation in
     fitness-affecting traits. Frank (1997) showed its complete generality.

  2. Cultural transmission modes. Cavalli-Sforza & Feldman identified vertical
     (parent → child), horizontal (peer → peer), and oblique (elder → younger
     generation) transmission — directly analogous to vertical inheritance,
     horizontal gene transfer, and epigenetic transmission in biology. The
     transmission matrix determines equilibrium trait frequencies exactly as
     the selection-mutation-drift balance determines allele frequencies.

  3. Dual inheritance theory (Boyd & Richerson 1985). Humans are unique in
     having both genetic and cultural inheritance systems. Cultural learning
     (social learning) has its own selection pressure: the bias towards
     copying successful individuals (prestige bias) or the majority (conformist
     transmission) creates cultural equivalents of frequency-dependent selection.

  4. Memes as replicators (Dawkins 1976). Dawkins coined "meme" as the cultural
     unit of replication analogous to the gene: copied (transmitted), with
     variation (miscopying, creativity), subject to selection (differential
     adoption). The replicator dynamics dx_i/dt = x_i(f_i - f̄) from
     evolutionary game theory apply directly: cultural variants with above-
     average "payoff" (fitness proxy) increase in frequency.

  5. Cultural drift. Neutral cultural evolution (analogous to genetic drift)
     predicts that cultural variants at small population sizes undergo random
     walk dynamics — a key prediction verified in archaeology: pottery styles,
     tool designs, and music genre distributions follow the power-law frequency
     spectra predicted by the neutral model (Bentley et al. 2004, PRSB).

  6. Quantitative prediction: Henrich (2004, J Theor Biol) showed that the
     critical social group size for cumulative cultural evolution (technological
     ratchet) has a threshold analogous to the Eigen error threshold in
     molecular evolution: below a critical number of skilled practitioners N*,
     cultural innovations are lost to drift before being refined. This maps
     the Eigen quasispecies equation to cultural skill transmission.
translation_table:
  - field_a_term: gene (biology)
    field_b_term: meme / cultural trait (social science)
  - field_a_term: DNA replication fidelity
    field_b_term: cultural transmission fidelity (imitation accuracy)
  - field_a_term: natural selection (differential reproduction)
    field_b_term: cultural selection (differential adoption / prestige bias)
  - field_a_term: genetic drift (random allele frequency change in small populations)
    field_b_term: cultural drift (random trait frequency change in small groups)
  - field_a_term: Price equation (Cov(w,z))
    field_b_term: cultural Price equation (Cov(adoption rate, trait value))
  - field_a_term: horizontal gene transfer (bacteria)
    field_b_term: horizontal cultural transmission (peer learning)
  - field_a_term: Eigen error threshold (molecular evolution)
    field_b_term: critical group size for cumulative cultural evolution (Henrich)
  - field_a_term: replicator dynamics (evolutionary game theory)
    field_b_term: cultural variant frequency dynamics (social learning models)

id: b-cultural-evolution-memetics
title: >
  Cultural transmission exhibits the three conditions of Darwinian evolution — variation,
  heredity, and selection — making cultural change mathematically equivalent to population
  genetics and amenable to the same formal tools.
status: established
fields:
  - social-science
  - biology
  - evolutionary-theory
  - psychology
bridge_claim: >
  Dawkins' meme concept (1976) proposed that cultural units (ideas, practices, norms)
  replicate, vary, and are selected — formally parallel to genes. Henrich (2004)
  formalised cultural transmission using the Price equation: the change in mean cultural
  trait frequency equals selection + transmission bias + transmission error, identical in
  form to population genetics. Boyd & Richerson's dual inheritance theory (1985) treats
  genetic and cultural evolution as coupled processes with co-evolutionary dynamics.
  Mathematical models use the same replicator dynamics, Fisher's fundamental theorem,
  and Wright-Fisher drift models as biology. The cross-domain equivalence is not merely
  analogical: the conditions for evolution by natural selection (heritable variation
  + differential fitness) are exactly satisfied by cultural transmission, making the
  mathematical apparatus directly applicable.
translation_table:
  - field_a_term: gene (biological replicator)
    field_b_term: meme / cultural variant (cultural replicator)
    note: Both carry information; both are replicated with fidelity and variation
  - field_a_term: mutation rate
    field_b_term: innovation / copying error rate in cultural transmission
    note: Low fidelity transmission is equivalent to high mutation; degradation of culture
  - field_a_term: natural selection (differential reproduction)
    field_b_term: prestige bias / success bias (differential imitation)
    note: High-status or successful individuals are preferentially copied — cultural selection
  - field_a_term: genetic drift (random sampling)
    field_b_term: unbiased copying error / cultural drift
    note: In small populations, random copying dominates over selection (cf. neutral theory)
  - field_a_term: epistasis (gene interaction)
    field_b_term: cultural co-adaptation (meme complexes)
    note: Memes that fit together replicate more successfully as a package (religion + ethics)
related_unknowns:
  - u-cultural-evolution-rate-prediction
related_hypotheses:
  - h-cultural-replicator-dynamics-rate
cross_pollination_opportunities:
  - >
    Epidemiological models of information spread: SIR models from epidemiology describe
    how memes spread through populations with recovery (forgetting). Applying epidemic
    threshold theory to cultural transmission would predict which cultural variants reach
    fixation and which go extinct as a function of transmission rate and population structure.
  - >
    CRISPR analogy for cultural engineering: just as CRISPR edits genes at specific sites,
    targeted cultural interventions (nudges, education, media) edit specific cultural traits.
    Population genetics theory of selection coefficients could quantify intervention strength
    needed to shift cultural frequency by a given amount.
communication_gap: >
  Cultural evolution is studied in anthropology, archaeology, and psychology — disciplines
  that rarely engage formal population genetics mathematics. Evolutionary biologists who
  know the Price equation rarely apply it to cultural datasets. Dual inheritance theory
  is known in evolutionary anthropology but has not penetrated mainstream social science.
last_reviewed: "2026-05-06"

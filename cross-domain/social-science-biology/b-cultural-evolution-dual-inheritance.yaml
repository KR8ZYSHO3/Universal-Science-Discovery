id: b-cultural-evolution-dual-inheritance
title: >
  Boyd and Richerson's dual inheritance theory (1985) formalizes the coevolution
  of genes and culture using population genetics mathematics — cultural allele
  frequencies evolve under selection, drift, and transmission biases including
  conformity and prestige, with the Price equation applying equally to both
  genetic and cultural change.
status: established
fields:
  - social-science
  - cultural-evolution
  - biology
  - evolutionary-biology
  - population-genetics
  - anthropology
bridge_claim: >
  Dual inheritance theory (Boyd & Richerson 1985) treats culture as an
  inheritance system parallel to genetics. Cultural variants spread via
  selection (differential retention), unbiased transmission (random drift),
  and biased transmission. Prestige bias: copy high-status individuals.
  Conformity bias (frequency-dependent): overweight common variants relative
  to their frequency — stabilizes majority behaviors above the majority
  threshold. The mathematical formalism mirrors population genetics exactly:
  cultural allele frequency p changes as Δp = sp(1-p) + C(p) + drift.
  The Price equation applies to both: Δz̄ = Cov(w,z)/w̄ + E[wΔz]/w̄ where z
  is a cultural trait and w is cultural "fitness" (transmission probability).
  Gene-culture coevolution: lactase persistence (LP) allele frequency rises
  in dairying populations because LP carriers benefit from dairy culture,
  while dairy culture spreads because LP carriers adopt it more; a positive
  feedback loop verified with archaeogenomic timing data. Sickle cell allele
  driven by malaria from agricultural deforestation is a second classic example.
  Modern applications: ultrasociality, cumulative cultural evolution, and the
  evolution of cooperation via cultural group selection.
translation_table:
  - field_a_term: cultural variant (belief, practice, norm)
    field_b_term: allele at a locus in population genetics
    note: both are heritable, variable, and subject to selection and drift
  - field_a_term: imitation/social learning fidelity
    field_b_term: replication fidelity / mutation rate
    note: low imitation fidelity acts like high mutation rate, preventing cumulative adaptation
  - field_a_term: prestige bias (copy high-status individuals)
    field_b_term: positive frequency-independent selection (success-based bias)
    note: prestige bias can produce maladaptive runaway analogous to sexual selection
  - field_a_term: conformity bias (overweight majority)
    field_b_term: positive frequency-dependent selection
    note: conformity stabilizes cultural norms and enables coordinated social behavior
  - field_a_term: cultural group selection
    field_b_term: multilevel selection (Price equation between-group component)
    note: controversial but potentially explains unusual ultrasociality of humans
related_unknowns:
  - u-gene-culture-coevolution-rate-modern
related_hypotheses:

cross_pollination_opportunities:
  - >
    Population genetics software (SLIM, msprime) can model gene-culture
    coevolution with only minor modifications — enabling quantitative simulation
    of LP spread, agricultural transition dynamics, and cultural fixation
    probabilities inaccessible to purely verbal models.
  - >
    Dual inheritance theory predicts that conformity bias should be stronger
    in high-uncertainty environments (where individual learning is costly) —
    testable with cross-cultural datasets on environmental variability and
    cultural conservatism, connecting evolutionary anthropology to behavioral
    economics experiments.
communication_gap: >
  Cultural evolution and genetic evolution are studied by different departments
  (anthropology/social science vs biology/genetics) with different methods,
  journals, and norms. The mathematical equivalence is accepted in evolutionary
  anthropology but rarely reaches sociology, cultural psychology, or mainstream
  economics. Resistance stems partly from the perceived reduction of culture to
  biology, even though dual inheritance theory explicitly treats culture as an
  autonomous inheritance system.

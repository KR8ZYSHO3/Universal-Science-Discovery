id: b-efficient-coding-perception
title: >
  The efficient coding hypothesis (Barlow 1961) unifies sensory neuroscience
  and information theory: retinal whitening, V1 Gabor receptive fields, and
  auditory log-frequency tuning all follow from maximizing Shannon
  information transmission per unit metabolic cost.
status: established
fields:
  - neuroscience
  - cognitive-science
  - information-theory
  - sensory-physiology
  - computational-neuroscience

bridge_claim: >
  Barlow (1961) proposed that the goal of sensory processing is to represent
  the environment using the minimum number of active neurons — equivalently,
  to maximize the Shannon mutual information I(stimulus; neural response)
  subject to a metabolic cost constraint. This efficient coding hypothesis
  makes three quantitative predictions that have been validated:

  1. RETINAL LATERAL INHIBITION (WHITENING): Natural images have highly
  correlated pixels (power spectrum ~ 1/f²). A linear filter that whitens
  this spectrum — removing redundancy by implementing lateral inhibition —
  maximises the information transmitted downstream. The centre-surround
  receptive fields of retinal ganglion cells perform exactly this operation.
  Atick & Redlich (1992) showed that the retina implements a Wiener filter
  optimised for the statistical structure of natural scenes.

  2. V1 GABOR RECEPTIVE FIELDS (SPARSE CODING / ICA): If a neural code
  maximises sparseness (most neurons inactive at any moment), the basis
  functions that achieve this for natural images are Gabor wavelets —
  localized, oriented, bandpass filters. Olshausen & Field (1996) showed
  that sparse coding of natural image patches via gradient descent learns
  basis functions indistinguishable from V1 simple cell receptive fields.
  Bell & Sejnowski (1997) showed that independent component analysis (ICA)
  applied to natural images yields the same Gabor basis. The brain does not
  hard-wire Gabor filters — it discovers them because they are the efficient
  code for natural statistics.

  3. LOGARITHMIC FREQUENCY TUNING IN AUDITION: Natural sounds have 1/f
  power spectra in frequency; logarithmic spacing of cochlear filters
  (equivalent to equal-ratio frequency bands) maximises information about
  natural sounds under a fixed number of hair cells. The cochlea's
  tonotopic map is log-frequency precisely because this is the efficient
  code for the acoustic environment.

  The unifying principle: sensory systems do not passively transduce
  physical signals — they perform information-theoretic compression tuned
  to the statistical structure of natural stimuli. Shannon's channel
  capacity theorem (C = B log₂(1 + SNR)) is the objective function that
  evolution has maximised in sensory design.

  The information bottleneck principle (Tishby et al. 2000) extends this:
  efficient coding requires not just redundancy reduction but also discarding
  irrelevant information. The V1-to-IT hierarchy compresses retinal
  information while preserving task-relevant structure — a deep network
  solving the IB trade-off at each layer.


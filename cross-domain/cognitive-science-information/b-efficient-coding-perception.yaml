cross_pollination_opportunities:
  - >
    Apply efficient coding theory to olfaction: the olfactory receptor
    neuron ensemble should be the ICA basis for the natural odour environment.
    Test by recording from olfactory epithelium while presenting natural
    odour statistics — a direct test of the efficient coding prediction
    outside the visual and auditory modalities.
  - >
    Use the information bottleneck objective as a training loss for deep
    neural network compression — the brain's solution (hierarchical ICA)
    may outperform standard compression methods on natural data distributions.
  - >
    Barlow's hypothesis predicts that sensory adaptation (gain control)
    should track second-order statistics of the current environment to
    maintain channel capacity. Test whether photoreceptor adaptation
    parameters match the Wiener filter for current local luminance
    statistics — quantifying how rapidly the retina re-optimises.
  - >
    Export V1 Gabor-wavelet representation to medical imaging: efficient
    coding predicts that Gabor wavelets are optimal for natural image
    compression; test whether Gabor-wavelet patch descriptors outperform
    CNN features on low-data medical image classification.

communication_gap: >
  Barlow published in Sensory Communication (MIT Press, 1961) — read by
  physiologists but not by information theorists. Shannon's work was read
  by engineers. Olshausen & Field (1996) appeared in Nature and explicitly
  bridged the communities, but their result is still not standard
  curriculum in neuroscience programs, which typically teach Gabor filters
  as a phenomenological description rather than as the output of an
  information-theoretic optimization. The mathematics required (ICA,
  information bottleneck, natural scene statistics) sits across the
  neuroscience/statistics disciplinary boundary.


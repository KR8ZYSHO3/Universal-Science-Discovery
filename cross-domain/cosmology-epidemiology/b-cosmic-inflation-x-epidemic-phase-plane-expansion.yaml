id: b-cosmic-inflation-x-epidemic-phase-plane-expansion
title: >
  Cosmic inflation stretches comoving scales exponentially when the scale factor accelerates — compartmental SIR-like epidemic models display transient phases where infected proportion grows approximately exponentially when R_eff≫1 — **this bridge is deliberately speculative metaphor**, not a physical reduction of cosmology to infectious disease; flag strongly before citing outside pedagogy.
status: proposed
fields:
  - cosmology
  - epidemiology
  - applied-mathematics
bridge_claim: >
  Qualitative similarity: both domains plot autonomous flows on reduced phase planes where certain regimes exhibit rapid separation of trajectories resembling exponential widening — inflation uses slow-roll potentials and Friedmann equations; epidemics use mass-action bilinear incidence producing exponential growth during early epidemic wave — **no shared Hamiltonian or dimensional constants** — analogy restricted to dynamical-systems visualization literacy.
translation_table:
  - field_a_term: Nearly exponential scale-factor growth during inflationary epoch
    field_b_term: Early epidemic exponential rise of infections when susceptible pool abundant
    note: "**Speculative metaphor only** — causal mechanisms unrelated."
  - field_a_term: Slow-roll parameters controlling exit from inflation
    field_b_term: Interventions / depletion reducing effective reproduction number R_eff
    note: Both describe exiting rapid-expansion regimes — analogy pedagogical only.
  - field_a_term: Horizon problem alleviation via superluminal expansion (physics narrative)
    field_b_term: Rapid spatial seeding before immunity builds (informal storytelling parallel)
    note: Risk of misleading analogy — label explicitly for outreach ethics.
communication_gap: >
  Cosmologists fear sensational linkage between cosmology and disease; epidemiologists rarely benefit unless analogy strictly confined to dynamical-systems pedagogy — transparency essential.
cross_pollination_opportunities:
  - Undergraduate nonlinear dynamics courses plotting vector fields side-by-side with ethics disclaimers preventing misinformation crossover.
  - Philosophy-of-modeling seminars discussing when exponential metaphors help versus harm public understanding.

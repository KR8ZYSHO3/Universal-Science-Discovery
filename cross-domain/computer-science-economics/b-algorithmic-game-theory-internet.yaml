id: b-algorithmic-game-theory-internet
title: >
  Algorithmic game theory analyses internet protocols, ad auctions, and
  platform economics as games with strategic self-interested agents —
  computing Nash equilibria for BGP routing, quantifying the price of
  anarchy for selfish routing, and implementing Vickrey-Clarke-Groves
  mechanisms at planetary scale in sponsored search auctions.
status: established
fields:
  - computer-science
  - economics
  - game-theory
  - network-science
  - mechanism-design
bridge_claim: >
  CLASSICAL PROBLEM: Internet protocols (BGP routing, TCP congestion control)
  are designed for cooperative agents, but actual Internet is composed of
  self-interested autonomous systems (ASes) that may deviate for competitive
  advantage.

  PRICE OF ANARCHY (Koutsoupias & Papadimitriou 1999):
    PoA = max_Nash equilibrium { C(σ) } / C(σ*)

  where C(σ) = social cost at Nash equilibrium σ, C(σ*) = social optimum.
  For selfish routing on networks with linear latency functions: PoA ≤ 4/3
  (Roughgarden & Tardos 2002). For polynomial latencies: PoA grows without
  bound.

  VCG MECHANISMS (sponsored search):
  Google/Meta/X ad auctions run Vickrey-Clarke-Groves mechanisms:
  - Each advertiser bids value-per-click v_i
  - Winner i pays the externality they impose: p_i = next highest bid
  - VCG is incentive-compatible (truthful bidding is dominant strategy)
  - Revenue = ΣP_i = value extracted from advertisers

  This implements mechanism design theory (Myerson, Vickrey, Hurwicz)
  at ~10^12 auctions per year. The GSP (Generalised Second Price) auction
  used in practice is not VCG but approximately incentive compatible.

  BGP AS GAME:
  Each AS announces routes to maximise its own traffic routing preferences.
  BGP stability = Nash equilibrium of the routing game. Safety (no routing
  loops) = game-theoretic property. Gao-Rexford conditions for BGP
  convergence are game-theoretic stability conditions.

  COMPUTATIONAL COMPLEXITY:
  Computing Nash equilibria is PPAD-complete (Papadimitriou 1994) —
  almost certainly not in P. This means finding optimal internet protocols
  under strategic behaviour requires approximation algorithms.
translation_table:
  - field_a_term: Nash equilibrium (game theory)
    field_b_term: stable routing state / BGP convergence (networking)
    note: BGP converges iff the routing game has a Nash equilibrium reachable by best-response dynamics
  - field_a_term: Price of Anarchy (game theory)
    field_b_term: efficiency loss from selfish routing vs. traffic engineering
    note: PoA bounds how much worse Internet routing is than centrally optimised routing
  - field_a_term: VCG mechanism (mechanism design)
    field_b_term: second-price sealed-bid ad auction (internet advertising)
    note: GSP auction in sponsored search is VCG-like; theoretical analysis predicts approximately-truthful equilibria
  - field_a_term: dominant strategy equilibrium (game theory)
    field_b_term: incentive-compatible protocol (computer science)
    note: A protocol is incentive-compatible if honest participation is a dominant strategy — the computational counterpart of dominant strategy Nash equilibrium
related_unknowns:
  - u-platform-competition-algorithmic-markets
  - u-mechanism-design-distributed-systems
related_hypotheses:

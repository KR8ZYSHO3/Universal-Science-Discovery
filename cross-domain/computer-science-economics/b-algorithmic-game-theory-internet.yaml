cross_pollination_opportunities:
  - Liquid democracy / Quadratic Voting mechanisms from political economy can be analysed using AGT complexity bounds
  - Algorithmic fairness (ML allocation) shares mechanism design structure with VCG auctions
  - Blockchain smart contracts are self-executing mechanisms — AGT provides the incentive analysis
communication_gap: >
  Computer scientists and economists developed game-theoretic analysis of
  the Internet largely independently in the early 2000s. The two communities
  now interact through venues like ACM EC and WWW, but undergraduate CS
  programs rarely teach mechanism design and economics programs rarely teach
  computational complexity.

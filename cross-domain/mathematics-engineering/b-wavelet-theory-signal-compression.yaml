cross_pollination_opportunities:
  - >
    Neuroscience: the primary visual cortex implements a wavelet-like decomposition
    — simple cells have Gabor-like receptive fields (localized in space and
    frequency, like wavelets). Testing whether V1 neuron basis functions are
    optimal wavelets for natural image statistics would directly connect
    Daubechies wavelet theory to neural computation.
  - >
    Gravitational wave detection (LIGO): wavelet denoising is used to remove
    non-Gaussian noise transients ("glitches") before matched filter templates
    are applied. Donoho-Johnstone theory could provide principled false-alarm
    rate estimates for wavelet-cleaned detector data.
communication_gap: >
  Wavelet theory was developed primarily by applied mathematicians (Daubechies,
  Mallat, Meyer — Mallat bridges signal processing and mathematics, Meyer won
  the 2017 Abel Prize). The electrical engineering signal processing community
  adopted wavelets for image compression (JPEG-2000) but often treats them as
  black-box filter banks without understanding the underlying MRA theory.
  The statistics community (Donoho) developed wavelet denoising theory
  independently. The neuroscience connection (V1 as Gabor wavelet bank) is
  well-known to computational neuroscientists but unfamiliar to both engineers
  and mathematicians.

id: b-wavelet-theory-signal-compression
title: >
  Mallat's multiresolution analysis and Daubechies compactly-supported wavelets
  provide an O(N) fast wavelet transform achieving near-optimal signal compression,
  with JPEG-2000 using 9/7 biorthogonal wavelets for 40:1 compression and
  Donoho-Johnstone wavelet shrinkage achieving minimax-optimal denoising over
  Sobolev function classes.
status: established
fields:
  - mathematics
  - engineering
  - signal-processing
  - harmonic-analysis
  - image-processing
  - statistics
bridge_claim: >
  Wavelets provide a multi-resolution analysis (MRA) of signals: a nested
  sequence of approximation spaces V_j ⊂ V_{j+1} ⊂ L²(ℝ) with scaling
  function φ and wavelet ψ satisfying ⟨ψ(·-k), ψ(·-l)⟩ = δ_{kl},
  ⟨φ(·-k), φ(·-l)⟩ = δ_{kl}. Mallat's fast wavelet transform (1989):
  decompose f ∈ V_{j+1} as f = A_j + D_j where A_j = Σ_k ⟨f,φ_{j,k}⟩φ_{j,k}
  (approximation) and D_j = Σ_k ⟨f,ψ_{j,k}⟩ψ_{j,k} (detail/wavelet coefficients).
  Implemented as iterated filtering: apply low-pass g and high-pass h filters,
  then downsample by 2 — O(N) operations per scale, O(N) total. Daubechies
  wavelets (1988): unique compactly-supported orthogonal wavelets with N
  vanishing moments (∫x^k ψ(x)dx = 0, k<N) giving exact polynomial reproduction
  of degree N-1 — these are the wavelets in JPEG-2000 (9/7 biorthogonal
  variant, Cohen-Daubechies-Feauveau). JPEG-2000 achieves 40:1 compression
  at perceptually transparent quality (vs JPEG's blocking artifacts from DCT
  at high compression). Donoho-Johnstone wavelet shrinkage (1994): given noisy
  signal y = f + σε, apply wavelet transform, soft-threshold detail coefficients
  at λ = σ√(2 log N), inverse transform. This achieves minimax risk:
  R(f̂, f) ≤ C·σ²·(log N)·N^{-2s/(2s+1)} over Sobolev class W^s — within log N
  factor of the unachievable oracle estimator.
translation_table:
  - field_a_term: scaling function φ and wavelet ψ in MRA
    field_b_term: low-frequency (approximation) and high-frequency (edge/detail) image components
    note: "Wavelets are matched to human visual system: HVS most sensitive to contrast edges (ψ captures)"
  - field_a_term: N vanishing moments of Daubechies wavelet
    field_b_term: compression efficiency for smooth image regions
    note: More vanishing moments = smoother wavelet = better compression for polynomial regions
  - field_a_term: soft thresholding at λ = σ√(2 log N)
    field_b_term: denoising by coefficient sparsification (signal is sparse in wavelet domain)
    note: The threshold λ is optimal (Stein's unbiased risk estimate) — a mathematical prediction validated empirically
  - field_a_term: Sobolev smoothness exponent s of function class
    field_b_term: image texture roughness / compression difficulty
    note: s determines optimal compression rate; s=1 is smooth images, s→0 is textures/fractals
  - field_a_term: discrete wavelet packet decomposition (full binary tree)
    field_b_term: adaptive subband coding for audio compression (WMA, ATRAC)
    note: Best basis selection (Coifman-Wickerhauser) chooses the tree decomposition minimising entropy

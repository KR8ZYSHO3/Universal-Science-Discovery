id: b-robust-statistics-outlier-detection
title: >
  Robust statistics bridges mathematics and engineering: Huber's M-estimators,
  the 50% breakdown point of least trimmed squares, and RANSAC (Random Sample
  Consensus) provide principled methods for fitting models to corrupted data ΓÇö
  enabling reliable computer vision, GPS, robotics, and fraud detection.
status: established
fields:
  - mathematics
  - engineering
  - statistics
  - computer-vision
  - data-science
bridge_claim: >
  Classical statistics (OLS, sample mean) is fragile: a single outlier can
  arbitrarily corrupt the estimate. Robust statistics provides estimators with
  bounded influence on any data point. Huber (1964) M-estimator: minimize
  ╬ú╧ü(rß╡ó/╧â) where the loss function ╧ü(x) = x┬▓/2 for |x| < k (quadratic near
  center), k|x| - k┬▓/2 for |x| ΓëÑ k (linear in tails). This Huber loss
  interpolates between LΓéé (kΓåÆΓê₧, OLS) and LΓéü (kΓåÆ0, median absolute deviation).
  Influence function IF(x; T, F) = lim_{╬╡ΓåÆ0} (T(F_╬╡) - T(F))/╬╡ measures the
  sensitivity of an estimator T to a single observation. Bounded IF ΓåÆ robust.
  Breakdown point ╬╡*: the fraction of data that can be corrupted before the
  estimator fails. OLS has ╬╡* = 0 (one outlier suffices to destroy it); sample
  median has ╬╡* = 50%; LTS (Least Trimmed Squares: minimize sum of h smallest
  squared residuals) achieves ╬╡* = (n-h)/n ΓåÆ 50% for h = Γîèn/2Γîï + 1.
  RANSAC (Fischler & Bolles 1981): randomly sample minimal subset of points,
  fit model, count inliers (within threshold ╧ä), repeat. After N iterations,
  probability of finding a clean subset ΓëÑ 1 - (1-p^m)^N where p is inlier
  fraction and m is minimum sample size. RANSAC is the dominant algorithm for
  robust geometric estimation in computer vision (fundamental matrix, homography,
  essential matrix estimation). S-estimators, MM-estimators (combine high
  breakdown point with high efficiency near Gaussian) complete the toolkit.
translation_table:
  - field_a_term: Huber loss ╧ü(x) (quadratic + linear tails)
    field_b_term: robust regression objective; M-estimator with tuning constant k
    note: k = 1.345 gives 95% asymptotic efficiency vs. OLS at Gaussian; adjustable
  - field_a_term: breakdown point ╬╡* = 50%
    field_b_term: half the data can be replaced by arbitrary values without corrupting the estimate
    note: LTS and repeated median achieve 50%; impossible to exceed 50% in symmetric estimation
  - field_a_term: influence function IF(x; T, F)
    field_b_term: first-order sensitivity of estimator T to a point mass at x
    note: bounded IF ΓåÆ robust; IF of sample mean is unbounded (linear in x)
  - field_a_term: RANSAC (Random Sample Consensus)
    field_b_term: model fitting algorithm tolerating up to 50% outliers via random hypothesis testing
    note: RANSAC does not require the model, data distribution, or outlier fraction to be known a priori
  - field_a_term: MM-estimator (S-step + M-step)
    field_b_term: robust regression combining 50% breakdown with 95% Gaussian efficiency
    note: gold standard for robust regression; Yohai (1987); implemented in R's lmrob

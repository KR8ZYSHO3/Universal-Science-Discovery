cross_pollination_opportunities:
  - "Apply queuing models to healthcare patient flow: ED boarding times, ICU admission queues, and surgical scheduling to reduce both cost and patient harm"
  - "Use stochastic network queuing (Jackson networks) to model data centre workload distribution and auto-scaling policies"
  - "Extend to priority queuing (M/G/1 with priority classes) for analysing emergency dispatch systems or internet QoS differentiation"

communication_gap: >
  Queuing theory is mathematically sophisticated but its core insights — especially
  the nonlinearity of wait time near saturation and the pooling principle — are
  widely misapplied in operations management and healthcare. Hospital administrators
  routinely plan for 95%+ bed occupancy without recognising that queuing theory
  predicts catastrophic waiting above ~85% utilisation. The Erlang B/C formulas are
  standard in telecommunications but rarely taught in medical or public administration
  programmes.


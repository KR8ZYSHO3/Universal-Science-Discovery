cross_pollination_opportunities:
  - Export MIMO generalizations of sensitivity integrals to cross-layer networking control where security and performance trade.
  - Use waterbed diagrams to explain why simultaneous strong disturbance rejection and aggressive tracking is impossible without changing plant or sensor architecture.
communication_gap: >
  Classical Bode lectures emphasize graphical Nyquist/Bode plots; modern robust control emphasizes LMIs and
  synthesis software. Students may miss that the integral constraints are the same physical content.

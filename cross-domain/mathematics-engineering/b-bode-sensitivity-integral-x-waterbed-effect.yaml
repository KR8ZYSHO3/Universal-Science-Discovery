id: b-bode-sensitivity-integral-x-waterbed-effect
title: >
  Bode’s sensitivity integral for minimum-phase plants ↔ the “waterbed effect” tradeoff in LQG/H-infinity
  robust control (classical control ↔ robust control theory)
status: established
fields:
  - control-engineering
  - mathematics
  - robust-control
bridge_claim: >
  For stable single-input single-output linear time-invariant systems that are minimum phase, Bode’s
  sensitivity integral forces integral of log|S(jω)| over frequency to equal zero when using standard
  weighting conventions—improving disturbance rejection in one band necessarily worsens it elsewhere, the
  literal waterbed tradeoff. Modern robust control (mixed-sensitivity H-infinity, structured singular values)
  formalizes this as optimization under convex relaxations. The bridge is pedagogical and mathematical: both
  communities teach that conservation-like constraints on sensitivity shapes are unavoidable once stability
  and causality are enforced, even if MIMO extensions and non-minimum-phase zeros complicate the story.
translation_table:
  - field_a_term: sensitivity S = 1/(1+PC)
    field_b_term: closed-loop transfer from disturbance to output in standard feedback diagram
    note: Same object, different notation across textbooks.
  - field_a_term: Bode integral of log|S|
    field_b_term: waterbed constraint on achievable sensitivity templates
    note: Minimum-phase case gives the starkest zero-sum picture.
  - field_a_term: complementary sensitivity T = PC/(1+PC)
    field_b_term: noise amplification / robustness to multiplicative uncertainty
    note: Classic S+T=1 algebraic coupling.
related_unknowns:

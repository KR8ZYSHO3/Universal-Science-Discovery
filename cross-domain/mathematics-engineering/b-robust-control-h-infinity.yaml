id: b-robust-control-h-infinity
title: >
  H∞ optimal control minimises worst-case L²-induced gain ||T_{zw}||∞ ≤ γ via Riccati
  equations or LMI convex optimisation; equals a minimax Nash game between controller
  and adversarial disturbance; achieves 10 nm precision in hard-disk heads and flutter
  suppression in aircraft through structured uncertainty μ-synthesis.
status: established
fields:
  - mathematics
  - engineering
  - control-theory
  - optimization
  - game-theory
bridge_claim: >
  Classical LQR/LQG control minimises expected quadratic cost E[∫(x'Qx + u'Ru)dt] —
  optimal for Gaussian disturbances, but brittle to model uncertainty or adversarial
  inputs. H∞ control (Zames 1981) instead minimises the worst-case disturbance-to-output
  gain: ||T_{zw}||∞ = sup_{ω} σ_max[T_{zw}(jω)], the H∞ norm of the closed-loop
  transfer matrix. This is the maximum RMS amplification over all sinusoidal disturbances
  and all disturbance power spectra — a minimax robustness criterion.

  Game-theoretic duality: the H∞ problem is equivalent to a two-player zero-sum
  differential game (Basar & Bernhard 1995). The controller u is the minimiser;
  the disturbance w is the maximiser. The Nash equilibrium of this game gives the
  optimal H∞ controller — and the optimal adversarial disturbance, which is the
  worst-case input the controller must be robust to. Solution: two coupled Riccati
  equations (DGKF solution, Doyle et al. 1989) or, equivalently, a linear matrix
  inequality (LMI) feasibility problem — convex, solvable by interior-point methods.

  Small-gain theorem: a closed-loop system with plant P and controller C is internally
  stable if ||P||·||C|| < 1 under structured perturbations — giving an analytic
  robustness certificate without simulation. μ-synthesis (structured singular value μ)
  extends this to handle structured block-diagonal uncertainty Δ = diag(Δ₁, …, Δₙ),
  solving min_C max_Δ μ[F_l(M, Δ)] by alternating D-K scaling iterations.

  Applications: (1) Hard disk drive read-write head positioning — track-following at
  10 nm precision with 5400-15000 RPM spindle vibration disturbances; H∞ is the
  standard industrial design method. (2) Aircraft flutter suppression — active control
  of aeroelastic instability at transonic speeds using H∞ controllers that are
  guaranteed robust to 30% variation in aerodynamic parameters. (3) Autonomous vehicle
  lateral stability — H∞ guarantees stability for a ±20% tire parameter uncertainty set.
translation_table:
  - field_a_term: H∞ norm ||T_{zw}||∞ (worst-case gain over all frequencies)
    field_b_term: maximum adversarial disturbance amplification — robustness margin
  - field_a_term: minimax differential game (controller vs. disturbance)
    field_b_term: Nash equilibrium of zero-sum two-player control game
  - field_a_term: Riccati equation solution (DGKF state-space formulas)
    field_b_term: Hamilton-Jacobi-Isaacs PDE solution of the differential game
  - field_a_term: LMI (linear matrix inequality) feasibility
    field_b_term: convex optimisation certificate for robust stability
  - field_a_term: structured singular value μ (μ-synthesis)
    field_b_term: tightest robustness bound for block-structured model uncertainty
  - field_a_term: small-gain theorem ||P||·||C|| < 1
    field_b_term: Banach contraction mapping theorem applied to feedback loop

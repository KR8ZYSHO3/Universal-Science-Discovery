cross_pollination_opportunities:
  - >
    Personalized brain stimulation: using individual connectome eigenmodes to
    predict optimal TMS/tDCS target sites that maximally engage specific
    resting-state networks by exciting their dominant structural harmonic.
  - >
    Psychiatric biomarkers: quantifying eigenspectrum deformation in schizophrenia,
    depression, and autism as a structural connectome signature independent of
    parcellation choice — a mathematically principled biomarker.
  - >
    Neural mass model reduction: truncating the brain's dynamical equations
    to the lowest k eigenmodes (analogous to Fourier truncation) as a principled
    dimensionality reduction for whole-brain modeling.
communication_gap: >
  Spectral graph theory is standard in algebraic combinatorics and network science
  but was not applied to neural connectomes until Atasoy et al. (2016). Neuroscientists
  trained in connectivity analysis (DTI, resting-state fMRI) do not routinely
  compute Laplacian eigendecompositions. The mathematical concept of "graph harmonics"
  (analogous to Fourier modes on a lattice) was not in the neuroscience vocabulary
  until this bridge was explicitly drawn.

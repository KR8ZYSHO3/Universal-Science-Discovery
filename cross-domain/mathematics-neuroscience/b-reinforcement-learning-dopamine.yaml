cross_pollination_opportunities:
  - >
    Model-based vs. model-free RL: model-free RL (TD/Q-learning) uses cached
    values; model-based RL (Dyna) builds internal world models. Neuroscience
    evidence: the hippocampus provides model-based predictions (planning via
    sequential replay) while the striatum implements model-free cached values.
    This is the neuroscience-AI correspondence for model-based/free distinction.
  - >
    Psychiatric disorders as RL dysfunction: addiction as overvaluation of drug
    reward (inflated Q(drug)); depression as persistently negative TD errors
    (anhedonia); schizophrenia as aberrant salience (noise in δ signal).
    This framework makes precise quantitative predictions about dopamine dynamics
    in psychiatric conditions — testable with fMRI + computational modeling.
communication_gap: >
  The TD-dopamine identity was established in 1997, but the two communities
  (RL theory and systems neuroscience) continue to evolve largely independently.
  Computer science RL research rarely cites the neuroscience beyond the Schultz
  1997 paper; neuroscientists rarely read the ICML/NeurIPS literature. The
  distributional RL-dopamine connection (Dabney 2020) required direct collaboration
  between DeepMind and neuroscientists — exceptional rather than routine.

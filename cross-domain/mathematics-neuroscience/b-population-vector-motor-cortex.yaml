cross_pollination_opportunities:
  - >
    High-dimensional BCI decoding: test whether adding more neurons improves
    BCI decoding accuracy as 1/√N predicts (population vector theory) or saturates
    due to shared noise correlations; use simultaneous Neuropixels recordings in
    multiple M1 regions to measure the effective dimensionality of decodable signal.
  - >
    Manifold-constrained neural stimulation: design microstimulation patterns that
    generate neural activity lying within the natural motor manifold; test whether
    manifold-constrained stimulation produces more natural movements than arbitrary
    stimulation patterns in motor cortex.
  - >
    Cross-species population vector comparison: measure M1 population vectors in
    non-human primates, rodents, and songbirds during skilled movements; test whether
    the cosine tuning and rotational dynamics are universal features of motor cortex
    or evolved independently in different taxa.
communication_gap: >
  Motor physiology and mathematical neuroscience use different vocabularies: physiologists
  describe tuning curves and firing rates while mathematicians describe dynamical systems
  and manifolds. The BCI engineering community is aware of the population vector but
  typically does not engage with the dynamical systems theory. Theoretical neuroscientists
  who study manifolds and dynamics rarely work with clinical BCI patients.

cross_pollination_opportunities:
  - >
    Deep learning architectures (deep Boltzmann machines, variational autoencoders)
    are mathematically equivalent to hierarchical predictive coding networks —
    the ELBO (evidence lower bound) in VAEs is exactly −F. Neuroscience predictive
    coding models and machine learning variational inference could co-develop more
    biologically constrained deep generative models for time-series data, where
    the temporal correlations of neural dynamics are currently underexploited.
  - >
    Psychedelic drugs (psilocybin, LSD) disrupt precision weighting by acting on
    serotonin 5-HT2A receptors on apical dendrites of layer V pyramidal cells —
    the same cells thought to carry high-precision top-down predictions. This
    neuropharmacology prediction from the free energy framework could be tested
    with simultaneous drug administration + fMRI predictive coding model inversion.
communication_gap: >
  The predictive coding / free energy principle literature is concentrated in a
  small community around Friston (UCL) and is sometimes criticised as unfalsifiable
  (too many free parameters). Computational neuroscientists (who use Bayesian models
  but not FEP) and experimental neuroscientists (who measure neural activity but
  distrust abstract frameworks) rarely engage deeply with FEP formalism. Statisticians
  familiar with variational inference rarely read neuroscience journals. The clinical
  psychiatry implications require simultaneous knowledge of psychopharmacology,
  computational psychiatry, and Bayesian statistics — crossing five separate fields.

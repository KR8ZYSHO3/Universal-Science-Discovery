id: b-dynamical-systems-neural-oscillations
title: "Nonlinear dynamical systems theory ↔ neural oscillations and brain rhythms — bifurcations at cognitive boundaries"
status: established
fields:
  - mathematics
  - dynamical-systems
  - neuroscience
  - computational-neuroscience
  - nonlinear-physics

bridge_claim: >
  Neural populations exhibit characteristic oscillations (alpha 8-12 Hz, gamma
  30-80 Hz, theta 4-8 Hz, beta 12-30 Hz) whose emergence, frequency, and amplitude
  are governed by the bifurcation structure of the underlying nonlinear dynamical
  system. The Wilson-Cowan equations (1972) describe coupled excitatory (E) and
  inhibitory (I) neural population dynamics as a 2D autonomous dynamical system.
  Phase-plane analysis reveals fixed points (synchronised steady states), limit
  cycles (sustained oscillations), and bifurcations at the boundaries. The Hopf
  bifurcation — where a stable fixed point loses stability to a limit cycle as a
  parameter (e.g. excitation level) crosses a critical value — predicts the onset
  of gamma oscillations in cortex. Seizures correspond to a bifurcation from a
  low-amplitude limit cycle (normal EEG) to a high-amplitude limit cycle (ictal
  activity) or from a stable fixed point to a limit cycle. Slow oscillations in
  anaesthesia correspond to Hopf bifurcations in thalamo-cortical circuits.
  Consciousness theories (Tononi, Dehaene) propose specific dynamical signatures —
  high integrated information Φ or ignition dynamics — as correlates of awareness.
  The mathematics of dynamical systems provides the language for classifying all
  possible neural state transitions without knowing the molecular details.


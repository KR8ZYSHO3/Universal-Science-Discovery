communication_gap: >
  Wilson and Cowan were neuroscientists using mathematics, but the dynamical systems
  language became dominant in computational neuroscience only in the 1990s (Rinzel,
  Ermentrout). Neurologists studying seizures rarely use bifurcation theory despite
  its predictive power. The 'neuro-dynamicists' and clinical neurologists publish
  in separate journals. Mathematicians with expertise in nonlinear dynamics rarely
  have neuroscience collaborators and vice versa.


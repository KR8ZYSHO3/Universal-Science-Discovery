cross_pollination_opportunities:
  - Apply DAG tools to survey design to detect and eliminate confounding by design
  - Use complex survey sampling theory to improve causal inference with administrative data
  - Extend Pearl's do-calculus to account for survey non-response as a selection mechanism
communication_gap: >
  Survey statisticians and causal inference researchers developed parallel frameworks with
  different vocabularies (design-based vs. model-based; potential outcomes vs. DAGs).
  Rubin and Pearl rarely cross-cited despite solving related problems. Applied social scientists
  often use one framework without knowing its connection to the other.

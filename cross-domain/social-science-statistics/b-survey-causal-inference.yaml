id: b-survey-causal-inference
title: The potential outcomes framework (Rubin) and Pearl's do-calculus provide the statistical foundations for causal inference from survey and observational data, connecting survey methodology to formal causal graph theory
status: established
fields:
  - social-science
  - statistics
bridge_claim: >
  The potential outcomes framework (Rubin 1974): each unit has potential outcomes Y(1) under
  treatment and Y(0) under control; the causal effect = Y(1) - Y(0), but only one is observed
  (the fundamental problem of causal inference). Randomised controlled trials (RCTs) solve
  this by making treatment independent of potential outcomes. Observational surveys use
  propensity score matching, instrumental variables, regression discontinuity, and difference-
  in-differences to approximate randomisation. Pearl's do-calculus (2000) provides graphical
  causal inference via directed acyclic graphs (DAGs), formalising when causal effects are
  identifiable from observational data using the back-door and front-door criteria. Survey
  sampling theory (Horvitz-Thompson estimator, design-based inference) maps directly onto
  this potential outcomes framework: the finite population causal effect is a missing data
  problem analogous to the causal inference problem. This unification enables design-based
  causal inference from complex survey data.
translation_table:
  - field_a_term: potential outcome Y(t)
    field_b_term: counterfactual / do-operator do(T=t)
    note: Both formalise what would happen under an intervention not actually observed
  - field_a_term: assignment mechanism (SUTVA, ignorability)
    field_b_term: back-door criterion (no unblocked confounding path)
    note: Both conditions ensure that observed association equals causal effect
  - field_a_term: propensity score e(X) = P(T=1|X)
    field_b_term: inverse probability weighting (IPW)
    note: Propensity scores reweight the sample to approximate a randomised experiment
  - field_a_term: instrumental variable Z (exclusion, relevance, independence)
    field_b_term: front-door criterion in DAG
    note: Both identify causal effect when direct randomisation is impossible

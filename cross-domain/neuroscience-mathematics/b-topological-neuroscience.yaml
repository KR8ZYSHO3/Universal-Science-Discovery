cross_pollination_opportunities:
  - >
    The discovery that grid cell activity lives on a torus (Gardner et al. 2022) was
    made without any prior hypothesis from neuroscience — it emerged from applying
    persistent homology to calcium imaging data. This suggests that other neural
    circuits encode non-trivial topological structures (spheres? Klein bottles? higher
    genus surfaces?) that would be invisible to classical neural data analysis (PCA,
    linear dimensionality reduction). A systematic topological survey of major neural
    circuits (motor cortex, olfactory bulb, prefrontal cortex) could map the topology
    of cognitive representations across the brain.
  - >
    The neural ring (Curto, Itskov, Vellis, Walker 2013) characterises which co-firing
    patterns are realisable by convex place fields. Violations of the convexity
    assumption occur in complex spatial environments (mazes, non-Euclidean rooms). The
    topological constraints on neural codes could be used diagnostically: if a hippocampal
    population code violates convexity constraints, this indicates that the encoded space
    has non-trivial topology (a room with a hole, a graph with loops). This gives a
    mathematical test for "cognitive map distortion."
  - >
    Topological data analysis of neural activity during cognitive tasks (working memory,
    decision-making, learning) could track how the topology of the neural manifold
    changes as a function of task performance. During learning, the manifold should
    simplify (Betti numbers decrease as irrelevant dimensions are pruned). Testing this
    prediction with high-density calcium imaging in rodents performing spatial and
    non-spatial tasks would connect topological neuroscience to learning theory.
communication_gap: >
  Algebraic topology was developed by mathematicians (Poincaré, Brouwer, Eilenberg)
  without application to neuroscience in mind. The application of persistent homology
  to neural data was pioneered by Curto & Itskov (2008) in a computational biology
  paper that is not widely read by experimental neuroscientists. Most neuroscientists
  analyse neural population data using PCA or linear decoding, which cannot detect
  topological structure. The grid cell torus result (Gardner et al. 2022) appeared
  in Science and received wide attention, but the persistent homology methods required
  to reproduce it are not in the standard neuroscience toolkit. Topology courses are
  not taught in neuroscience PhD programs.

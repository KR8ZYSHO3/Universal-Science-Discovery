id: b-neuronal-avalanches-branching-process
title: "Neuronal avalanches in cortex are critical branching processes: the branching parameter σ=1 at criticality produces power-law size and duration distributions with exponents τ=3/2, α=2"
status: established
fields:
  - neuroscience
  - probability
  - statistical-physics
bridge_claim: >
  A branching process is a stochastic model where each event (neuron firing)
  independently spawns k offspring events with expected number σ (branching
  parameter). At criticality σ=1, avalanche size S and duration T distributions
  follow power laws: P(S)~S^(−τ) with τ=3/2 and P(T)~T^(−α) with α=2,
  with an exponential cutoff at the system size. Beggs & Plenz (2003) showed
  that spontaneous neural activity in cortical slice cultures exhibits exactly
  these power-law statistics, with exponents matching the critical branching
  process predictions. The critical point maximizes dynamic range (ability to
  distinguish stimulus intensities), information transmission, and susceptibility.
  The branching parameter σ is estimated from the ratio of successive cascade
  sizes. This links probability theory (Galton-Watson branching processes) to
  systems neuroscience (cortical criticality hypothesis).
translation_table:
  - field_a_term: "branching parameter σ (probability theory)"
    field_b_term: "ratio of active to activating electrodes in local field potential avalanche"
    note: "σ = mean number of electrodes activated per activating electrode in LFP data"
  - field_a_term: "subcritical process σ<1 (dying branching process)"
    field_b_term: "quiescent cortical state, small bounded avalanches"
    note: "Deactivated or anesthetized cortex shows σ<1 and exponential size distributions"
  - field_a_term: "supercritical process σ>1 (explosive growth)"
    field_b_term: "seizure dynamics in epilepsy — sustained runaway activity"
    note: "Epileptiform discharges represent σ>1 dynamics; anticonvulsants reduce σ toward 1"
  - field_a_term: "Galton-Watson extinction probability q"
    field_b_term: "probability that a single-neuron spike triggers a system-wide avalanche"
    note: "At σ=1, q=1 (certain extinction) but mean avalanche size diverges"
related_unknowns:
  - u-neuronal-avalanches-branching-process
related_hypotheses:
  - h-neuronal-avalanches-branching-process
cross_pollination_opportunities:
  - "Homeostatic plasticity mechanisms that maintain σ~1: synaptic scaling and intrinsic excitability regulation could implement a feedback control loop that keeps cortex near the critical branching point, testable by measuring σ during pharmacological perturbations and monitoring plasticity markers."
  - "Branching process theory predicts that avalanche size and duration exponents are related by the scaling relation τ=1+α/(α-1); measuring both in vivo provides a consistency test for the criticality hypothesis that distinguishes it from near-critical or poised network explanations."
communication_gap: >
  Galton-Watson branching process theory is standard in probability and population
  genetics, but the connection to neural avalanche statistics was made only in 2003.
  Probability theorists have detailed results on branching process scaling (Harris 1963)
  that neuroscientists rediscover, including the exact exponents τ=3/2 and α=2.
  The criticality hypothesis remains contested in neuroscience partly because
  the statistical tests for power-law distributions are demanding and the
  branching parameter formulation is rarely used in neurophysiology journals.

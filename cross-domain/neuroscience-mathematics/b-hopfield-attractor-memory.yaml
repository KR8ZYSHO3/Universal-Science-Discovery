id: b-hopfield-attractor-memory
title: >
  Hopfield networks (1982) store M memories as energy-function attractors with
  Hebbian weights; statistical mechanics (Amit-Gutfreund-Sompolinsky) gives
  capacity M_max≈0.14N; modern Hopfield networks (Ramsauer 2020) achieve
  exponential capacity exp(N/2) using log-sum-exp interaction — mathematically
  equivalent to the scaled dot-product attention mechanism in transformers,
  connecting associative memory theory directly to large language models.
status: established
fields:
  - neuroscience
  - mathematics
  - statistical-mechanics
  - machine-learning
  - neural-networks
  - memory-theory
bridge_claim: >
  Hopfield networks (1982): N binary neurons sᵢ ∈ {-1,+1} with symmetric
  weights Wᵢⱼ = (1/N)Σ_μ ξᵐᵢ ξᵐⱼ (Hebb rule) and dynamics sᵢ(t+1) =
  sgn(Σⱼ Wᵢⱼsⱼ(t)). Energy E = -½Σᵢⱼ Wᵢⱼsᵢsⱼ decreases monotonically →
  convergence to attractors. Stored memories ξᵐ are the attractor fixed points.
  Amit-Gutfreund-Sompolinsky (AGS) theorem (1985): statistical mechanics analysis
  via replica method gives the storage capacity M_max ≈ 0.138N memories before
  catastrophic interference — above this, spurious "spin glass" attractors
  proliferate. Modern Hopfield networks (Ramsauer et al. 2020, Krotov-Hopfield
  2016): replace the interaction function with F = log(Σ_μ exp(β ξᵐ·s)) giving
  capacity exponential in N/2 (2^(N/2) memories). The update rule for the
  continuous state becomes: s_new = Ξ·softmax(β Ξᵀs) where Ξ is the memory
  matrix. This is precisely the scaled dot-product attention:
  Attention(Q,K,V) = softmax(QKᵀ/√d)·V with Q=s, K=V=Ξ. Memory retrieval =
  one attention step. This connects Hopfield's 1982 biologically-inspired
  neural memory model directly to the core operation of transformer architectures
  (BERT, GPT), revealing that attention mechanisms implement associative memory.
translation_table:
  - field_a_term: Hopfield network synaptic weight matrix Wᵢⱼ
    field_b_term: outer product of key-value pairs in transformer attention
    note: Hebb rule Wᵢⱼ = ΣΞ_μᵢΞ_μⱼ is identical to key-value memory outer product
  - field_a_term: energy function E = -½ sᵀWs
    field_b_term: negative log-sum-exp interaction function in modern Hopfield
    note: classical energy is quadratic; modern Hopfield energy is -log(Σexp(βξ·s))
  - field_a_term: pattern completion (partial cue → full memory)
    field_b_term: attention query finding the most similar key
    note: both perform nearest-neighbor retrieval in the space of stored patterns
  - field_a_term: storage capacity M_max = 0.14N (classical)
    field_b_term: softmax attention over all N tokens (one-shot perfect retrieval)
    note: classical has capacity limitation; softmax attention retrieves any of exp(N/2) items
  - field_a_term: spurious attractors (spin glass states above capacity)
    field_b_term: hallucination in large language models (blended pattern retrieval)
    note: both arise when memory density exceeds the network's faithful retrieval limit
related_unknowns:

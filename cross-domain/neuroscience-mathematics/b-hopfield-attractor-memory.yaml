cross_pollination_opportunities:
  - >
    Biological associative memory capacity limits (AGS theorem gives 0.14N)
    compared to transformer attention (exponential capacity) suggests that
    biological implementation constraints fundamentally limit cortical memory
    capacity — this framing makes concrete predictions about hippocampal
    capacity measurable via multi-unit recording during memory tasks.
  - >
    Reverse-engineering transformer attention as a Hopfield network suggests
    interpretability methods: attention heads are retrieving "stored memories"
    — the patterns learned during training. This biological framing motivates
    new mechanistic interpretability approaches beyond attention visualization.
communication_gap: >
  The 1982 Hopfield paper was absorbed by the physics community (statistical
  mechanics analysis) and the neural network community but largely separated
  from the 2017 transformer revolution in deep learning. The mathematical
  equivalence between modern Hopfield networks and attention was published in
  2020 (Ramsauer et al.) but has not yet widely penetrated neuroscience
  journals, even though it provides a biologically grounded theoretical
  framework for understanding transformer architectures.

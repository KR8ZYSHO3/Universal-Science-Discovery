cross_pollination_opportunities:
  - >
    TDA of EEG and fMRI data: functional connectivity matrices from EEG/MEG and
    fMRI produce graphs amenable to persistent homology analysis. Topological
    biomarkers (persistent β₁) have been proposed for Alzheimer's disease,
    epilepsy, and schizophrenia — conditions where neural connectivity is
    disrupted. TDA provides model-free signatures that complement graph-theoretic
    measures (clustering coefficient, path length).
  - >
    Mapper algorithm (Singh, Mémoli, Carlsson 2007): a TDA-based dimensionality
    reduction that preserves topological structure, producing a simplicial complex
    summary of high-dimensional neural data. Mapper can reveal the circular
    organisation of head direction cells, the toroidal structure of grid cells,
    and the manifold topology of motor cortex — without prior knowledge of the
    coded variable. This is a general discovery tool for neural population geometry.
  - >
    Sheaf theory (Robinson 2014) extends TDA to incorporate local geometric
    information (not just topology) on the neural manifold. Neural sheaves — where
    each neuron carries a local data vector — can model how information is
    propagated across the population. This is more powerful than persistent
    homology alone and connects to opinion dynamics models in social science
    (Ghrist & Hansen 2021).
communication_gap: >
  Algebraic topology (persistent homology, simplicial complexes, Betti numbers)
  is graduate mathematics taught in algebraic topology courses. Neuroscientists
  analysing population codes typically use PCA, UMAP, or riemannian geometry
  (not algebraic topology). The TDA community publishes in Foundations of
  Computational Mathematics and SIAM Journal on Applied and Computational
  Topology, with limited reach to Neuron, Nature Neuroscience, or Journal of
  Neuroscience. The Giusti et al. (2015) PNAS paper is the canonical bridge
  paper but has been primarily cited within the computational neuroscience
  community, not absorbed into mainstream systems neuroscience.

cross_pollination_opportunities:
  - >
    Lindsay (2020) reviewed the biological plausibility of attention models and found
    that transformers match some but not all neural attention phenomena. Specifically,
    transformer attention is not recurrent and lacks temporal dynamics. Recurrent
    transformer variants (Universal Transformer, Hopfield networks) are more biologically
    plausible. A systematic quantitative comparison between multi-head attention
    weight matrices and neural attention modulation patterns (measured with multi-electrode
    arrays) would test how closely transformer attention mimics its biological counterpart.
  - >
    Predictive coding networks and transformers have been shown to converge on similar
    solutions for natural image modelling (Rao & Ballard 1999, ViT). The transformer
    encoder is formally similar to a single iteration of predictive coding: value vectors
    are predictions, and attention weights are precision-weighted prediction errors.
    A unified model that subsumes both frameworks would clarify whether transformers
    "discovered" a biologically-principled computation.
  - >
    The "attention sink" phenomenon (certain tokens receive disproportionate attention)
    in large language models has an analogue in cortical "spotlight" attention that
    anchors on task-irrelevant salient stimuli. Studying attentional capture in LLMs
    versus capture in human psychophysics could identify shared algorithmic principles
    of competitive attention independent of substrate.
communication_gap: >
  The transformer architecture (Vaswani et al. 2017) was developed by machine learning
  engineers without reference to the neural attention literature (Treisman, Desimone
  & Duncan, Moran & Desimone 1985). The parallel was noted by Lindsay (2020) in a
  review article but has not yet led to productive bidirectional exchange. Neuroscientists
  and ML researchers publish in separate venues (NeurIPS vs. Nature Neuroscience),
  use incompatible terminology, and have different evaluation criteria (benchmark
  performance vs. neural data fit). Joint workshops and comparative modelling
  challenges are needed to translate insights across the divide.

id: b-transformer-attention-neural-attention
title: >
  The transformer's scaled dot-product attention mechanism is a computational
  formalisation of neural attention theories from cognitive neuroscience — scaled
  dot-product Q·Kᵀ/√d_k implements a soft winner-take-all competition analogous to
  cortical inhibitory circuits, while self-attention corresponds to lateral inhibition
  combined with top-down modulatory feedback.
status: proposed
fields:
  - computer-science
  - neuroscience
  - cognitive-science
  - machine-learning
  - computational-neuroscience
bridge_claim: >
  The transformer attention mechanism (Vaswani et al. 2017):

    Attention(Q, K, V) = softmax(QKᵀ / √d_k) V

  operates on queries Q, keys K, and values V. Each output position attends to all
  input positions with a weight proportional to the query-key similarity divided by √d_k.
  This structure maps onto several established theories of neural attention:

  1. FEATURE INTEGRATION THEORY (TREISMAN 1980): Treisman proposed that visual attention
     is a "glue" that binds separately processed features into unified percepts.
     The attention matrix in transformers implements exactly this: different heads attend
     to different feature types (syntax, semantics, position), and multi-head attention
     aggregates them — a soft binding mechanism across feature spaces.

  2. BIASED COMPETITION (DESIMONE & DUNCAN 1995): Neural attention is implemented as
     biased competition — stimulus representations in visual cortex compete with each
     other via mutual inhibition, and top-down signals (from prefrontal cortex) bias
     the competition toward task-relevant stimuli. The softmax operation in attention
     implements this competition: all attention weights must sum to 1 (inhibitory normalisation),
     and larger Q·K values dominate (winner-take-most). Top-down biasing = task-specific
     query vectors Q.

  3. DIVISIVE NORMALISATION AS ATTENTION: The softmax(QKᵀ / √d_k) operation is exactly
     divisive normalisation (Carandini & Heeger 2012) applied to similarity scores.
     Divisive normalisation is the canonical cortical computation, and it implements
     Bayesian normalisation (computing a probability). Transformer attention is thus
     a form of Bayesian inference: the attention weights are posterior probabilities
     over positions given the query.

  4. SELF-ATTENTION = LATERAL INHIBITION + TOP-DOWN: Self-attention (Q = K = V = x,
     the input sequence) computes each token's representation as a weighted sum over
     all positions, where weights depend on pairwise similarity. This is mathematically
     similar to lateral inhibition in cortical circuits (each neuron's activity is
     suppressed in proportion to its similarity to active neighbours) plus top-down
     feedback (the query provides context-dependent gating). The self-attention
     "receptive field" spans the entire context window, whereas cortical lateral
     inhibition is more local — but both implement competitive normalisation.

  5. SPARSE ATTENTION ↔ WINNER-TAKE-ALL: The full softmax attention is a "soft" WTA.
     Sparse attention variants (top-k attention, entmax) are harder WTA circuits.
     Cortical circuits implement near-winner-take-all competition through strong lateral
     inhibition (interneuron circuits). The degree of sparsity (temperature in softmax)
     corresponds to the inhibition gain in the cortical circuit.

  6. MULTI-HEAD ATTENTION = MULTIPLE ATTENTIONAL SPOTLIGHTS: Multiple simultaneous
     attentional spotlights (e.g. auditory streaming, divided attention) correspond to
     multi-head attention. Each head learns to attend to different aspects of the input —
     analogous to separate attentional streams for colour, shape, motion, and spatial
     location in the visual cortex.

  LIMITATIONS OF THE ANALOGY:
  - Transformer attention is feedforward (one pass); neural attention is recurrent
    and operates on timescales of 100-500 ms with oscillatory dynamics.
  - Transformers lack the spatiotemporal structure of cortical attention (saccadic
    eye movements, spatial attention spotlight); they operate on token sequences.
  - The biological substrate of the query, key, value decomposition is not identified.

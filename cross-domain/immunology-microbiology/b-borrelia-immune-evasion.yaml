cross_pollination_opportunities:
  - Structural biology of VlsE gene conversion machinery (RecA-like enzymes, lp36 architecture) as drug target — inhibiting gene conversion would fix the antigenic target for adaptive immunity
  - Vaccine design using invariant VlsE IR6 epitope (the only conserved region among VlsE variants) in combination with OspC, to force an immunologically trackable target
  - Structural characterization of CRASP-FH binding interface to identify small molecules that block complement evasion, restoring serum killing of Borrelia
  - Immunological longitudinal studies tracking VlsE variant composition in patient sera to quantify in vivo gene conversion rates — currently unmeasured in humans
communication_gap: >
  Lyme disease microbiology researchers (Borrelia molecular biology, plasmid
  genetics, gene conversion) publish primarily in Infection and Immunity, Journal
  of Bacteriology, and mBio. Clinical immunologists studying PTLDS and seronegative
  Lyme publish in Clinical Infectious Diseases, Arthritis & Rheumatology, and
  Frontiers in Medicine. The molecular biology of VlsE is rarely discussed in
  clinical immunology papers, and immunological consequences of antigenic variation
  are rarely quantified in microbiology papers. Structural biologists who could
  design CRASP-blocking drugs are largely absent from Lyme disease conferences.

id: b-borrelia-immune-evasion
title: >
  Borrelia burgdorferi's VlsE antigenic variation and complement evasion —
  studied separately in microbiology and immunology — together constitute a
  unified immune-escape architecture with direct therapeutic implications.
status: established
fields:
  - microbiology
  - immunology
  - structural-biology
  - infectious-disease
bridge_claim: >
  Borrelia burgdorferi evades host immunity through two mechanistically distinct
  but synergistic strategies that span the microbiology–immunology boundary.
  (1) Antigenic variation (VlsE): Borrelia encodes 15+ silent vls cassettes on
  a linear plasmid (lp36). During mammalian infection, segmental gene conversion
  continuously shuffles cassette sequences into the vlsE expression locus,
  generating an estimated ~10^40 possible surface-protein variants faster than
  adaptive immunity (B-cell somatic hypermutation and affinity maturation) can
  track. This is the microbiology side — a molecular clock of antigenic identity.
  The immunology side: B-cell clones that achieve affinity maturation to one
  VlsE variant face a moving target, resetting humoral immunity continuously.
  (2) Complement evasion (CRASPs): Borrelia outer-surface proteins (CRASPs 1–5,
  including BbCRASP-1/OspE) recruit host complement regulators Factor H and
  FHL-1 directly to the bacterial surface, blocking C3b deposition and MAC
  formation — the same molecular "self" mimicry that host tissues use. OspC
  (outer surface protein C), expressed during tick-to-host transmission, enables
  initial mammalian infection but is rapidly downregulated to evade developing
  antibody titers.
  The bridge: microbiology characterizes the molecular machinery (plasmid
  structure, gene conversion enzymes, CRASP binding interfaces); immunology
  measures the downstream consequences (antibody failure, seronegative cases,
  inadequate complement killing). Neither field alone can design a durable
  therapeutic strategy — rational drug targets require knowing both the
  molecular machinery and the immunological escape consequences.
translation_table:
  - field_a_term: VlsE gene conversion rate (microbiology)
    field_b_term: rate of antibody escape (immunology)
    note: Each gene conversion event produces a new antigenic variant; the rate sets how quickly humoral immunity is defeated
  - field_a_term: vls silent cassette diversity on lp36 (microbiology)
    field_b_term: breadth of antibody evasion space (immunology)
    note: Greater cassette diversity means more variants can be generated, overwhelming the adaptive immune repertoire
  - field_a_term: CRASP-Factor H binding affinity (microbiology/structural biology)
    field_b_term: complement evasion efficiency (immunology)
    note: Higher CRASP-FH binding Kd directly predicts reduced C3b deposition and serum resistance
  - field_a_term: OspC downregulation timing (microbiology)
    field_b_term: window of antibody vulnerability (immunology)
    note: OspC is expressed only briefly during tick feeding — antibody targeting requires vaccines that act within this narrow window

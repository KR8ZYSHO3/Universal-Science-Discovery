cross_pollination_opportunities:
  - "Apply food web resilience metrics (return time after perturbation) to neural circuits to quantify robustness to cell loss"
  - "Test whether the species-diversity curve in ecology has a neural circuit analog in firing rate heterogeneity"
  - "Use neural circuit tools (optogenetics, patch clamp) to create 'experimental food webs' with controlled connectivity"

communication_gap: >
  Ecologists and neuroscientists rarely read each other's literature despite sharing
  stability mathematics. May (1972) was written for ecologists; Sompolinsky et al.
  (1988) derived the same stability criterion for neural networks without citing May.
  The connection was partly bridged by Allesina & Tang (2012) who updated May's
  analysis with structured random matrices. The neuroscience community has not widely
  adopted ecological stability metrics.


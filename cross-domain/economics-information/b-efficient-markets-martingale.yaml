cross_pollination_opportunities:
  - >
    Information-theoretic measures of market efficiency (mutual information
    between lagged returns, transfer entropy between assets) provide more
    sensitive and assumption-free tests of the EMH than autocorrelation-based
    tests. Applying non-parametric MI estimators (KSG estimator) to high-
    frequency trading data would quantify the residual channel capacity of
    major asset markets.
  - >
    The martingale/EMH framework can be applied to prediction markets and
    collective intelligence platforms (PredictIt, Metaculus): testing whether
    crowd probability estimates are martingales provides a direct measure of
    collective information efficiency in non-financial domains.
  - >
    Ecosystem service markets (carbon credits, water quality trading) are
    structurally inefficient because ecological information is difficult to
    price. The mutual information framework quantifies the information deficit
    between market prices and true ecological state — providing a rigorous
    foundation for corrective pricing mechanisms.

communication_gap: >
  Fama (1970) and Samuelson (1965) wrote for finance journals without using
  information-theoretic language. Shannon's information theory was known to
  them but not operationalised in the EMH context. Cover & Thomas (2006)
  discuss the Kelly criterion and information theory but the explicit
  connection to market efficiency is not a central theme. Lo's Adaptive Market
  Hypothesis (2004) uses the information metaphor but not formal mutual
  information. Finance researchers use statistical tools (autocorrelation,
  variance ratio tests) rather than information-theoretic measures because
  the latter require large samples and non-parametric estimators that were
  computationally expensive until recently.


id: b-efficient-markets-martingale
title: >
  The Efficient Market Hypothesis (Fama 1970) — that asset prices reflect all
  available information — is the statement that price processes are martingales
  (E[P_{t+1}|F_t] = P_t); market anomalies are quantifiable as residual mutual
  information between price history and future returns.
status: established
fields:
  - economics
  - information-theory
  - probability-theory
  - finance
  - stochastic-processes

bridge_claim: >
  Fama (1970) defined the Efficient Market Hypothesis (EMH): asset prices
  fully reflect all available information. Samuelson (1965) showed that this
  is mathematically equivalent to the statement that price processes are
  martingales: E[P_{t+1} | F_t] = P_t, where F_t is the filtration of all
  information available at time t.

  The information-theoretic interpretation (Cover & Thomas 2006) is:
  - An efficient market is a zero-redundancy channel -- no trading strategy
    based on public information (F_t) can extract systematic profit,
    because the channel from price history to future prices carries no
    exploitable mutual information I(P_{t+1}; history | current price) = 0.
  - Insider trading = exploiting a channel with strictly higher capacity than
    the public channel. The insider has access to F_t ∪ {private information},
    giving a strictly richer filtration and positive mutual information with
    future prices.
  - Market anomalies (momentum, mean-reversion, calendar effects) =
    residual mutual information between lagged returns and future returns.
    Their existence quantifies the information deficit: I(P_{t+k}; P_{t}, P_{t-1}, ...)
    for k > 0 should be zero in an efficient market.

  The Kelly criterion (Kelly 1956) provides the operational connection:
  the optimal growth rate of a betting strategy equals the mutual information
  between the bettor's signal and the outcome. In an efficient market (zero
  mutual information), the optimal Kelly growth rate is zero — consistent with
  the EMH.

  Lo's (2004) Adaptive Market Hypothesis extends this: markets become more
  efficient as arbitrageurs eliminate exploitable mutual information, but
  novel information structures (new asset classes, structural breaks) create
  temporary inefficiencies while traders adapt. Market efficiency is a dynamic
  equilibrium of information processing, not a static property.

translation_table:
  - field_a_term: "Efficient market (EMH, Fama 1970)"
    field_b_term: "Zero-redundancy channel (no exploitable mutual information)"
    note: "Efficient market = channel with zero capacity for systematic profit extraction"
  - field_a_term: "Martingale property E[P_{t+1}|F_t] = P_t"
    field_b_term: "Zero mutual information I(P_{t+1}; P_t, P_{t-1}, ...) = 0"
    note: "Mathematical equivalence: martingale ↔ unpredictability ↔ zero MI"
  - field_a_term: "Insider trading (private information advantage)"
    field_b_term: "Side channel (higher-capacity channel available to privileged sender)"
    note: "Insider has access to larger filtration F_t; strictly positive MI with future prices"
  - field_a_term: "Market anomaly (momentum, mean-reversion)"
    field_b_term: "Residual mutual information I(future return; price history)"
    note: "Anomalies quantify inefficiency as exploitable MI; should decay as arbitrageurs act"
  - field_a_term: "Kelly criterion (optimal bet size)"
    field_b_term: "Channel capacity (maximum information extraction rate)"
    note: "Kelly growth rate = MI between signal and outcome; zero in efficient market"
  - field_a_term: "Adaptive Market Hypothesis (Lo 2004)"
    field_b_term: "Adaptive coding (channel capacity changes as agents learn)"
    note: "Markets dynamically approach zero-redundancy as traders eliminate MI"


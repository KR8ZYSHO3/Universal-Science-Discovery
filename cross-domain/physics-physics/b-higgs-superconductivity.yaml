id: b-higgs-superconductivity
title: "Higgs mechanism (particle physics) = Anderson-Higgs mechanism (superconductivity): same spontaneous symmetry breaking"
status: established
fields:
  - particle-physics
  - condensed-matter-physics
  - quantum-field-theory

bridge_claim: >
  The Higgs mechanism — by which the W and Z bosons acquire mass in the Standard
  Model — is mathematically identical to the Meissner effect in superconductors,
  discovered by Anderson (1958) and formalized by the BCS theory (1957). In both
  systems, a U(1) gauge symmetry is spontaneously broken by a complex scalar
  field (the Higgs field / Cooper pair condensate) developing a non-zero vacuum
  expectation value. The consequences are identical: the gauge boson acquires mass
  (photon inside a superconductor / W and Z in vacuum), Goldstone bosons are
  absorbed into the longitudinal polarisation of the massive gauge boson, and
  the order parameter obeys the same Ginzburg-Landau / Mexican hat potential.
  Philip Anderson described the mechanism in 1958 for superconductors; Peter Higgs,
  Brout, Englert and others independently derived the same result for particle
  physics in 1964, six years later. The Higgs boson — discovered at the LHC in
  2012 — is the excitation mode of the condensate; the analogous "Higgs mode" in
  superconductors was measured by Raman spectroscopy. The only physical difference
  is the energy scale: ~meV for superconductors, ~125 GeV for the electroweak Higgs.

translation_table:
  - field_a_term: "Higgs field phi with <phi> != 0"
    field_b_term: "Cooper pair condensate psi = |psi|*e^{i*theta}"
    note: "Both are complex scalar order parameters with spontaneous U(1) breaking"
  - field_a_term: "W, Z bosons (massive)"
    field_b_term: "photon inside superconductor (screened / massive)"
    note: "Meissner effect = photon mass inside SC = expulsion of magnetic field"
  - field_a_term: "Higgs boson (125 GeV)"
    field_b_term: "Higgs mode (amplitude fluctuation of condensate, ~meV)"
    note: "Same excitation — amplitude mode of the order parameter"
  - field_a_term: "Mexican hat (wine bottle) potential V(phi)"
    field_b_term: "Ginzburg-Landau free energy F(psi)"
    note: "Identical quartic polynomial; minimum at |phi| = v/sqrt(2)"
  - field_a_term: "Goldstone boson (eaten by W/Z)"
    field_b_term: "Phase fluctuation (eaten by photon, becomes Meissner screening)"
    note: "Goldstone theorem: broken continuous symmetry -> massless boson -> absorbed"
  - field_a_term: "symmetry breaking scale v = 246 GeV"
    field_b_term: "superconducting gap Delta ~ meV"
    note: "13 orders of magnitude apart; same mathematical structure"


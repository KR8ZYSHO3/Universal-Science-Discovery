cross_pollination_opportunities:
  - "Use high-Tc superconductor experiments as a table-top laboratory for Higgs mechanism phenomenology"
  - "Apply particle physics renormalisation group methods to cuprate phase diagrams"
  - "Search for the Higgs mode in topological superconductors as a test of topological quantum field theory"
  - "Use the analogy to predict new phases of matter in cold atom systems that mimic electroweak symmetry restoration"

communication_gap: >
  Anderson published the superconductor mechanism in Physical Review (1958) in
  the condensed-matter community. Higgs published in Physics Letters (1964) in
  the particle physics community. The mathematical identity was understood by a
  small group of theorists by the late 1960s but remains non-standard in both
  undergraduate condensed-matter and particle physics curricula. Most physics
  students learn BCS and the Standard Model in separate courses with no mention
  of the cross-domain equivalence.


id: b-landau-theory-universality
title: "Landau order parameter theory ↔ all second-order phase transitions: one framework governs superconductors, magnets, liquid crystals, and neural criticality"
status: established
fields:
  - statistical-physics
  - condensed-matter
  - neuroscience
  - materials-science

bridge_claim: >
  Landau (1937) proposed that all continuous (second-order) phase transitions can
  be described by an order parameter phi that vanishes in the disordered phase and
  is non-zero in the ordered phase, with free energy expandable in even powers of phi:
  F = a*phi^2 + b*phi^4 + c*(∇phi)^2. The coefficient a changes sign at T_c,
  driving the transition. This framework — Landau-Ginzburg-Wilson (LGW) field theory —
  predicts critical exponents that depend only on the symmetry of the order parameter
  and spatial dimension, not on microscopic details. This universality means:
  (1) Ferromagnets (phi = magnetization, Z2 symmetry, d=3): beta=0.326, nu=0.630;
  (2) Superconductors (phi = Cooper pair amplitude, U(1) symmetry): London equation,
  penetration depth, Meissner effect all from LGW; (3) Liquid crystals (phi = orientational
  order, SO(3)/SO(2) symmetry): isotropic-nematic transition, Frank elastic constants;
  (4) Neural criticality (phi = population firing rate, mean-field): Hopfield networks,
  neural avalanches near criticality. The renormalization group (Wilson & Kogut 1974)
  explains WHY universality holds: irrelevant operators flow to zero under RG, leaving
  only a few relevant parameters. Systems as different as uniaxial magnets, binary
  fluid mixtures, and 4He near the lambda point share identical critical exponents
  because they share the same symmetry group and dimensionality.

translation_table:
  - field_a_term: "order parameter phi"
    field_b_term: "magnetization / Cooper pair density / nematic tensor / firing rate"
    note: "Different physical quantity, same mathematical role in each system"
  - field_a_term: "coefficient a = a_0*(T-T_c)"
    field_b_term: "temperature distance from critical point / coupling from threshold"
    note: "Sign change at T_c drives transition; maps to distance from neural criticality"
  - field_a_term: "universality class (symmetry + dimension)"
    field_b_term: "Ising class (d=3): magnets, liquid-gas, neural mean-field"
    note: "Ising, XY, Heisenberg, O(n) classes cover most physical transitions"
  - field_a_term: "RG flow to fixed point"
    field_b_term: "long-wavelength physics determined by fixed point, not microscopy"
    note: "Why biological neural criticality resembles magnetic criticality despite different physics"
  - field_a_term: "Ginzburg criterion"
    field_b_term: "when mean-field theory breaks down (fluctuation-dominated regime)"
    note: "Determines whether critical exponents are classical or anomalous"


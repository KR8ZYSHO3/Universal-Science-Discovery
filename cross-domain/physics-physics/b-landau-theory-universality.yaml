  - "Apply liquid crystal elasticity (Frank constants) to model nematic ordering in neural fiber tracts"
  - "Use superconducting vortex phenomenology to model topological defects in neural synchrony networks"
  - "Test whether metabolic phase transitions in cells (glycolysis oscillations) belong to a known Landau universality class"

communication_gap: >
  Landau published in Russian (Zh. Eksp. Teor. Fiz., 1937). Wilson's RG was published
  in Reviews of Modern Physics (1983) for physicists. Neuroscientists studying
  criticality (Beggs, Plenz, Chialvo) rarely cite Landau or Wilson directly, instead
  reinventing the universality concept from scratch. Materials scientists know Landau
  theory deeply but rarely consider its application to biological or social systems.
  The conceptual unification is powerful but pedagogically fragmented across disciplines.


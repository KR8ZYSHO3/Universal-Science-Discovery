id: b-coastal-erosion-x-diffusive-interface
title: Large-scale coastline shapes and shoreline erosion fronts can be modeled using interface
  dynamics and diffusive / reaction–diffusion ideas familiar from mathematical physics.
status: established
fields:
- geoscience
- coastal-geomorphology
- applied-mathematics
- pattern-formation
bridge_claim: Coastal profiles evolve under wave forcing, sediment transport, and sea-level
  rise. Reduced models treat the shoreline as a moving curve whose normal velocity depends
  on local curvature, fluxes, and noise — analogous to interface problems in phase field models
  where an order parameter diffuses and sharp fronts emerge. Diffusive shoreline models and
  stochastic line growth capture meandering and roughness statistics observed in nature. The
  bridge imports stability analysis, scaling exponents, and numerical schemes from PDE theory
  into geomorphology, while acknowledging that geology breaks isotropy via lithology and human
  structures.
translation_table:
- field_a_term: interface normal velocity law
  field_b_term: alongshore sediment flux divergence
- field_a_term: surface tension–like regularization
  field_b_term: smoothing by wave-driven diffusive transport
- field_a_term: noise-driven roughening
  field_b_term: storm variability and discrete slump events

cross_pollination_opportunities:
- Apply phase-field numerics with anisotropic surface energy to cliff–beach systems with layered
  strata.
- Use satellite time series to test scaling predictions for shoreline power spectra vs model
  exponents.
communication_gap: Coastal engineering often uses empirical Bruun-rule style heuristics; PDE
  interface community uses different validation metrics, limiting shared benchmarks.

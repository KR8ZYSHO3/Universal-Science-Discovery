cross_pollination_opportunities:
  - >
    The SO(3) structure of plate tectonics implies that uncertainty in
    Euler pole determination should be quantified using the geometry of
    SO(3) (e.g., the Riemannian metric on SO(3)) rather than Euclidean
    error ellipses. Importing the Lie group statistics developed for
    robotics (SO(3) mean and covariance, Rodrigues parameters) would give
    more rigorous uncertainty quantification for paleogeographic
    reconstructions.
  - >
    The fiber bundle description suggests that mantle flow (a connection
    on the bundle) generates holonomy — when a plate circuit around
    a triple junction closes, the accumulated rotation need not be the
    identity if the connection has curvature. Non-zero holonomy would
    imply that mantle dynamics generate residual rotations not accounted
    for by rigid plate kinematics alone, testable via GPS closure residuals.
  - >
    The topological constraint χ = 2 on the sphere means that changes
    in the number of plates always involve correlated changes in triple
    junctions and boundaries. A topological data analysis (TDA) of
    the plate boundary network over geological time (using persistence
    diagrams on the boundary graph) could quantify how plate topology
    evolves through supercontinent cycles.
communication_gap: >
  The application of Euler's theorem to tectonics was discovered by
  geophysicists (McKenzie & Parker 1967, Morgan 1968) who were aware
  of the theorem but not of the deeper Lie group and fiber bundle
  structure. Differential geometers and topologists who develop the
  theory of SO(3) bundles, Lie group statistics, and holonomy are
  unaware of the tectonic application. Geoscience education introduces
  Euler poles as a practical tool without the full mathematical context,
  while pure mathematics courses on Lie groups never mention tectonics.

id: b-species-distribution-maxent
title: >
  MaxEnt species distribution modelling is the ecological application of Jaynes'
  maximum entropy principle: given presence-only occurrence data and environmental
  features, MaxEnt finds the distribution of maximum entropy subject to empirical
  feature constraints — a result formally identical to a Gibbs distribution and
  to maximum likelihood estimation in a Poisson point process model.
status: established
fields:
  - ecology
  - statistics
  - information-theory
  - conservation-biology
  - Bayesian-inference
bridge_claim: >
  Jaynes (1957) formulated the maximum entropy (MaxEnt) principle for statistical
  inference: among all probability distributions consistent with known constraints
  (expected values of observable features), choose the one of maximum Shannon
  entropy — the least-committal distribution given the data. Phillips et al. (2006)
  independently developed the MaxEnt algorithm for species distribution modelling
  from presence-only occurrence records.

  THE FORMAL IDENTITY:

  Let f_k(x) be environmental features (temperature, rainfall, NDVI, etc.) measured
  at location x, and let f̄_k = (1/n) Σ f_k(x_i) be their mean over n presence
  locations. MaxEnt finds the distribution π(x) that:

    maximises H(π) = -Σ_x π(x) log π(x)
    subject to: Σ_x π(x) f_k(x) = f̄_k for all k, and Σ_x π(x) = 1.

  The solution is the Gibbs/Boltzmann distribution:

    π(x) ∝ exp(Σ_k λ_k f_k(x))

  where λ_k are Lagrange multipliers. This is identical to:

  1. EXPONENTIAL FAMILY MODEL: π(x) is an exponential family distribution with
     natural parameters λ_k. Maximum entropy = maximum likelihood in the exponential
     family, a fundamental duality in statistics (Brown 1986).

  2. LOGISTIC REGRESSION: When presence (1) and background (0) data are combined,
     MaxEnt is equivalent to penalised logistic regression (Renner & Warton 2013).
     The "presence-only" framing is equivalent to Poisson point process regression
     (Fithian & Hastie 2013), connecting ecological SDMs to the standard GLM framework.

  3. MAXIMUM LIKELIHOOD UNDER POISSON POINT PROCESS: Elith et al. (2011) showed
     that MaxEnt is a Poisson point process model: presence locations are a realisation
     of an inhomogeneous Poisson process with intensity λ(x) = π(x). Maximum likelihood
     estimation of the Poisson intensity is identical to MaxEnt with appropriately
     selected background samples.

  4. INFORMATION GEOMETRY: The MaxEnt distribution is the I-projection (information
     projection) of the uniform distribution onto the constraint surface — the unique
     point on the exponential family manifold closest (in KL divergence) to the
     uniform distribution. This is the Pythagorean theorem of information geometry.

  ECOLOGICAL IMPLICATIONS:
  - The species distribution predicted by MaxEnt is not the "true" niche but the
    most parsimonious (highest-entropy) distribution consistent with the observed
    correlations between occurrences and environment.
  - Regularisation in MaxEnt (L1/L2 penalties on λ_k) is equivalent to using an
    informative prior (Laplace or Gaussian prior on regression coefficients) in
    a Bayesian framework.
  - Transfer to novel climates (climate change projections) extrapolates the
    exponential family model beyond the training range, a well-understood statistical
    extrapolation problem (not unique to ecology).
translation_table:
  - field_a_term: "Species occurrence locations (presence-only data)"
    field_b_term: "Observed data points from an inhomogeneous Poisson point process"
    note: "Background samples in MaxEnt approximate the reference distribution of the point process"
  - field_a_term: "Environmental features f_k(x)"
    field_b_term: "Sufficient statistics of the exponential family model"
    note: "Linear, quadratic, and product features in MaxEnt correspond to mean, variance, and covariance constraints"
  - field_a_term: "MaxEnt distribution π(x)"
    field_b_term: "Gibbs/Boltzmann distribution; canonical ensemble in statistical mechanics"
    note: "Same mathematical form as the Boltzmann distribution in physics: π ∝ exp(-β E(x))"
  - field_a_term: "Lagrange multipliers λ_k"
    field_b_term: "Regression coefficients in Poisson log-linear model"
    note: "Estimated by iterative scaling (MaxEnt) or gradient ascent (logistic regression) — equivalent algorithms"
  - field_a_term: "Regularisation (L1/L2 penalties)"
    field_b_term: "Prior distribution on regression coefficients (Laplace/Gaussian prior)"
    note: "MaxEnt regularisation is MAP estimation in the Bayesian Poisson point process model"
  - field_a_term: "Habitat suitability score"
    field_b_term: "Log-intensity of the Poisson point process"
    note: "Proportional to the log-probability ratio relative to background; equivalent to logistic regression output"
  - field_a_term: "Climate change range shift projection"
    field_b_term: "Out-of-sample prediction from a fitted exponential family model"
    note: "Extrapolation risk: environmental values outside training range may violate linearity assumptions"

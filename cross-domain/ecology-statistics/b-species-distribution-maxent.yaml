cross_pollination_opportunities:
  - >
    The equivalence between MaxEnt and Poisson point process regression means that
    all tools for regularisation, cross-validation, and uncertainty quantification
    in GLMs apply directly to species distribution models. In particular, conformal
    prediction intervals for Poisson regression would give exact coverage guarantees
    for species range predictions — a much-needed improvement over AUC-based
    evaluation that tells ecologists nothing about spatial uncertainty.
  - >
    Bayesian hierarchical species distribution models (Kéry & Royle 2016) with
    MaxEnt likelihoods would allow the prior on occurrence rates to reflect
    biogeographic knowledge (dispersal limits, phylogenetic constraints). This
    would solve the well-known "overprediction" problem of MaxEnt in geographically
    restricted species by incorporating a dispersal prior.
  - >
    Climate change SDMs assume stationarity of the habitat-occurrence relationship.
    Transfer learning in machine learning addresses exactly this domain shift problem.
    Adapting domain adaptation methods (covariate shift correction, importance weighting)
    from ML to SDMs would give principled methods for projecting future ranges under
    climatic conditions not represented in training data.
communication_gap: >
  Phillips et al. (2006) designed MaxEnt as a practical ecological tool without
  reference to Jaynes' information-theoretic formulation or exponential family
  statistics. The ecological SDM literature and the statistical exponential family
  literature developed independently for decades. The identity was recognised by
  Elith et al. (2011) and Renner & Warton (2013) but has not fully propagated to
  practitioners who still treat MaxEnt as a black box. Most ecologists using MaxEnt
  are unaware that they are fitting a Poisson point process model and that all
  standard diagnostic tools for Poisson regression apply to their results.

id: b-earthquake-source-dislocation-theory
title: >
  Earthquake source mechanics is formally equivalent to dislocation theory in solid mechanics: seismic moment tensors describe the equivalent force system of a shear crack (dislocation) on a fault plane, and radiated seismic wavefields are computed as the elastic Green's function response to dislocation propagation
status: established
fields:
  - seismology
  - solid-mechanics
bridge_claim: >
  An earthquake rupture is a propagating shear dislocation on a fault surface: the moment tensor M_ij = μ A d (n_i d_j + n_j d_i) (μ = shear modulus, A = rupture area, d = slip, n = fault normal, d = slip direction) is mathematically identical to the elastic dipole tensor of a dislocation loop in solid mechanics; radiated seismic waves are computed from the elastodynamic Green's function G_ij(x,t;x',t') convolved with the dislocation time history, mapping earthquake seismology directly onto dislocation mechanics and enabling fault slip inversion from seismic waveforms.
translation_table:
  - field_a_term: "seismic moment tensor M_ij (seismology)"
    field_b_term: "elastic dipole tensor of dislocation loop in a medium (solid mechanics)"
    note: "M_ij = μ[d_i n_j + d_j n_i] A exactly matches the dipole tensor of a Volterra dislocation with Burgers vector b = d·A"
  - field_a_term: "fault slip distribution u(x,t) (seismology)"
    field_b_term: "dislocation density distribution and propagation velocity on a glide plane (solid mechanics)"
    note: "Heterogeneous fault slip maps to spatially variable Burgers vector density; slip rate = dislocation velocity"
  - field_a_term: "seismic wave radiation (seismology)"
    field_b_term: "elastic wave emission from accelerating dislocation line (solid mechanics)"
    note: "Far-field P and S wave amplitudes from fault rupture are identical to radiation from moving dislocations (Bremsstrahlung analogy)"
  - field_a_term: "stress drop Δσ on fault (seismology)"
    field_b_term: "elastic stress release during dislocation glide (solid mechanics)"
    note: "Stress drop is the reduction in shear stress across the fault plane after rupture, equivalent to unloading stress at a dislocation glide plane"
communication_gap: >
  Seismologists analyze waveforms and infer fault parameters while solid mechanicists study crystal dislocation dynamics in materials; although the mathematical equivalence was established by Burridge and Knopoff (1964) and Aki (1966), the dislocation theory formalism is rarely used outside earthquake source theory and is not part of standard solid mechanics education.
cross_pollination_opportunities:
  - "Using strain gradient elasticity and Peierls-Nabarro dislocation core models from materials science to model fault zone rheology and earthquake nucleation in rate-state friction frameworks"
  - "Applying dynamic rupture simulations based on continuum dislocation mechanics to predict near-field ground motion for engineering seismic hazard assessment"

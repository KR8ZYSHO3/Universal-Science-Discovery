cross_pollination_opportunities:
  - >
    Control theory predicts that integral control produces oscillatory responses
    when loop delay is present. The relapsing-remitting pattern of diseases like
    multiple sclerosis and lupus may reflect a delayed integral controller — the
    time lag between T_eff activation and Treg expansion introduces phase lag
    causing oscillation. PID tuning methods could optimize therapeutic dosing intervals.
  - >
    Adaptive immunity targeting cancer requires calibrating the controller to attack
    non-self (tumor antigens) while maintaining self-tolerance. Checkpoint inhibitors
    (anti-PD1, anti-CTLA4) reduce controller gain — in control terms, they decrease K_p.
    The observed immune-related adverse events (irAEs, autoimmunity) are exactly
    the predicted consequence of reducing negative feedback gain below the stability margin.
  - >
    Robust control theory (H-infinity control) could identify therapeutic interventions
    that maintain immune regulation across a range of uncertain pathogen loads —
    the analog of designing a robust controller for a plant with uncertain parameters.
communication_gap: >
  Immunologists describe regulatory circuits in terms of cell types and cytokines;
  control engineers describe them in transfer functions and Bode plots. The conceptual
  translation is clear but the mathematical formalism rarely crosses disciplinary
  boundaries. Systems biology occupies the middle ground but rarely uses formal
  control-theoretic tools (stability margins, Nyquist criterion, robust control).
  Clinical immunology training does not include feedback control theory.

id: b-scale-free-networks-criticality
title: "Barabási-Albert preferential attachment ↔ criticality ↔ brain connectome ↔ internet topology"
status: established
fields:
  - network-science
  - statistical-physics
  - neuroscience
  - computer-science

bridge_claim: >
  Barabási & Albert (1999) showed that networks grown by preferential attachment —
  where new nodes connect preferentially to high-degree nodes ("rich get richer") —
  produce scale-free degree distributions P(k) ~ k^{-gamma} with gamma ≈ 3.
  Scale-free networks are critical in a precise sense: they sit at the boundary
  between percolation (giant component) and fragmentation, with the second
  moment of the degree distribution diverging (for gamma ≤ 3), implying infinite
  susceptibility to perturbations — the network property analogous to infinite
  compressibility at the critical point of a fluid. This connects to three domains:
  (1) Brain connectome: both structural (DTI tractography) and functional (fMRI)
  brain networks show scale-free degree distributions with gamma ≈ 2.1-2.3, and
  hub nodes correspond to default mode network regions; (2) Internet/WWW: page
  in-degree and router connectivity distributions are power laws with gamma ≈ 2.1,
  arising from the same preferential attachment mechanism; (3) Criticality: the
  divergence of susceptibility in scale-free networks means they simultaneously
  maximize information transfer and vulnerability to targeted attacks — the same
  tradeoff as biological criticality. The unified picture: preferential attachment
  is a self-organizing mechanism that drives networks to a structurally critical state
  without parameter tuning, analogous to SOC in dynamical systems.


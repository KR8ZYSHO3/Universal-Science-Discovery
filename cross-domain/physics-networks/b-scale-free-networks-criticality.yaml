communication_gap: >
  Barabási & Albert published in Science (1999) to a broad audience, but the connection
  to statistical physics criticality (diverging susceptibility, percolation) was made
  explicit only by Dorogovtsev & Mendes (2002) in physics journals. Neuroscientists
  studying connectome topology (Sporns, van den Heuvel) independently discovered hub
  structure but rarely cite the Barabási scale-free network literature. Internet
  engineers designing routing protocols are largely unaware of the critical-state
  implications of scale-free topology.


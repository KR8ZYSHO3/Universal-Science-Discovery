id: b-coral-symbiosis-mutualism-stability-theory
title: >
  Coral-zooxanthellae symbiosis is a model mutualism whose stability is analyzed
  using ecological mutualism theory: partner fidelity feedback, sanctions mechanisms,
  and the optimal foraging trade-off between carbon provision and nitrogen limitation
  determine when the partnership is evolutionarily stable versus prone to cheating
  or bleaching.
status: established
fields:
  - marine-biology
  - ecology
  - evolutionary-biology
bridge_claim: >
  In mutualism stability theory, a partnership is evolutionarily stable if the
  fitness cost c of providing benefits satisfies c < b·r where b is partner benefit
  and r is relatedness (Hamilton's rule extended to mutualists). For coral-algae
  systems, the zooxanthellae (Symbiodiniaceae) translocate 90-95% of photosynthate
  (sugars, glycerol) to the coral host — a fitness cost only stable if the coral
  provides essential nitrogen, phosphorus, and CO₂ in return. The stability matrix
  A = [[a_11, a_12],[a_21, a_22]] with a_12, a_21 > 0 (mutualistic interactions)
  gives stable coexistence only if |a_11·a_22| > |a_12·a_21| (community matrix
  stability criterion). Bleaching (symbiont expulsion) occurs when thermal stress
  increases reactive oxygen species, exceeding the stability threshold and triggering
  host sanctions — a direct application of biological market theory (partner choice
  and sanctioning) to reef ecology.
translation_table:
  - field_a_term: coral bleaching (marine biology)
    field_b_term: collapse of mutualism stability / partner defection (ecology)
    note: Thermal stress breaks the stability condition, causing host to expel the mutualistic symbiont
  - field_a_term: zooxanthellae photosynthate translocation (marine biology)
    field_b_term: partner benefit delivery in biological market (ecology)
    note: 90%+ translocation rate is the "wage" paid by algae; cost to algae must be < fitness benefit
  - field_a_term: coral nutrient provisioning (marine biology)
    field_b_term: reciprocal benefit exchange / tit-for-tat (ecology)
    note: Coral provides DIC, N, P to zooxanthellae, creating the reciprocal benefit that stabilizes mutualism
  - field_a_term: Symbiodiniaceae clade switching (marine biology)
    field_b_term: partner choice / market competition (ecology)
    note: Corals can shuffle to more thermally tolerant symbionts, analogous to market switching to better partners
related_unknowns:
  - u-coral-bleaching-threshold-global-warming-trajectory
related_hypotheses:
  - h-thermotolerant-symbiodinium-rescue-reef-systems-climate-change
cross_pollination_opportunities:
  - Applying biological market theory to design interventions that shift coral-symbiont equilibria toward thermal tolerance
  - Using community matrix stability analysis to predict reef tipping points under multiple stressors (temperature, acidification, nutrient loading)
communication_gap: >
  Marine biologists studying reef coral bleaching and theoretical ecologists studying
  mutualism stability share overlapping models but rarely apply formal stability
  theory to coral systems; the explicit translation between coral physiology and
  mutualism game theory was developed in the 2000s but remains underutilized in
  reef conservation planning and climate impact predictions.

communication_gap: >
  Remote sensing scientists develop satellite analysis methods primarily for global
  change monitoring; precision agriculture practitioners are farmers and agronomists
  who need actionable field-scale decision support. The gap between research-grade
  remote sensing products (global 10 m NDVI) and farm-scale prescription maps (1–3 m
  resolution) involves substantial data processing, agronomic interpretation, and
  economic analysis that crosses disciplinary boundaries rarely bridged. Agricultural
  machine learning is a rapidly growing field but requires domain expertise
  (agronomy, soil science) that most ML practitioners lack.


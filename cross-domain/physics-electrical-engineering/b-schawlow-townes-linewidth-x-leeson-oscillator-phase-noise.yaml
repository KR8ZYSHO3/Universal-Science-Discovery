id: b-schawlow-townes-linewidth-x-leeson-oscillator-phase-noise
title: >
  Laser cavity linewidth obeys Schawlow–Townes quantum-limited scaling tying linewidth to cavity lifetime and photon number — electronic oscillators exhibit phase-noise spectra shaped by device noise floors plus feedback-loop filtering often summarized by Leeson’s heuristic spectrum with corner frequencies — bridges quantum optics linewidth budgets with RF/microwave PLL spectral purity engineering.
status: established
fields:
  - photonics
  - electrical-engineering
  - quantum-optics
bridge_claim: >
  Below saturation, laser linewidth Δν_ST scales as inverse cavity photon number times cavity loss rate — phase-locked loops and crystal oscillators display 1/f³, 1/f², 1/f slope segments where feedback bandwidth sets apparent linewidth corners analogous (operationally) to cavity filtering — distinction remains fundamental versus technical noise; practitioners overlay quantum limits onto Leeson plots when benchmarking ultra-narrow lasers versus microwave oscillators.

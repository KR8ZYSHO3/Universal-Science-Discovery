cross_pollination_opportunities:
  - >
    Coding theorists have developed turbo codes, LDPC codes, and polar
    codes that approach Shannon capacity. Applying the design principles
    of these modern codes to the analysis of the genetic code — treating
    the amino-acid-to-codon mapping as a code design problem — could
    reveal whether the natural code is capacity-approaching or merely
    minimum-distance optimal, and what gap remains.
  - >
    Synthetic biology efforts to recode genomes (e.g., the Cambridge/NYU
    synthetic E. coli with all TAG stop codons reassigned) are, from the
    information-theory perspective, experiments in code design. Designing
    recoded genomes with explicit information-theoretic constraints
    (maximise d_min, minimise correlation between codons and amino acid
    chemistry) could improve robustness and enable novel amino-acid
    incorporation.
  - >
    The evolutionary trajectory from early RNA-world codes to the
    universal genetic code is a real-time code optimisation process on
    a noisy channel. Modelling it as stochastic gradient descent on
    a code design landscape (with fitness = inverse error cost) could
    predict what alternative near-optimal codes exist, and whether life
    elsewhere might use them.
communication_gap: >
  Molecular biologists who study the genetic code are generally not
  trained in Shannon information theory or algebraic coding theory.
  Coding theorists are unaware that the genetic code is a solved real-
  world instance of their design problem, optimised over billions of
  years. Freeland & Hurst (1998) made the connection accessible, but
  the result is treated as a curiosity rather than an entry point for
  rigorous coding-theoretic analysis in the biology literature. The
  quantitative channel-capacity framing (Itzkovitz & Alon 2007) remains
  almost entirely within the bioinformatics community.

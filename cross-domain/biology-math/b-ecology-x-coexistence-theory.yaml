id: b-ecology-x-coexistence-theory
title: Ecological coexistence ↔ Modern coexistence theory — storage effect as temporal niche
status: proposed
fields:
- biology
- mathematics
bridge_claim: Modern coexistence theory (Chesson 2000) partitions species coexistence mechanisms into stabilising (niche differences)
  and equalising (fitness similarity) components; the storage effect (temporal fluctuation buffering via overlapping generations)
  is a stabilising mechanism that allows indefinite coexistence in randomly varying environments.
translation_table:
- field_a_term: stabilising niche difference (Δi) in MCT
  field_b_term: competitive exclusion avoidance via resource partitioning
  note: Δi > 0 prevents competitive exclusion; measured as the covariance of environment and competition
- field_a_term: equalising fitness difference (ηi) in MCT
  field_b_term: intrinsic growth rate difference between competitors at equal density
  note: ηi measures competitive inequality; large ηi requires large Δi for coexistence
- field_a_term: storage effect (covariance of environment and competition, buffered reproduction)
  field_b_term: temporal Jensen's inequality exploitation via life history buffering
  note: Long-lived stages (seeds, dormancy) allow species to 'bank' good years against bad ones
- field_a_term: invasion criterion (can a rare species increase when common species present?)
  field_b_term: Lyapunov stability criterion for multispecies dynamical system
  note: Coexistence iff all species have positive invasion growth rates; equivalent to mutual invasibility
cross_pollination_opportunities:
- Apply MCT's invasion growth rate decomposition to microbial community assembly — partition storage effect, relative nonlinearity,
  and frequency-dependent selection in gut microbiome stability using time-series data from longitudinal metagenomics studies.
- Use the storage effect framework to design more stable mixed-species agricultural systems — identifying crop combinations
  where temporal fluctuation in weather generates positive stabilising covariance, reducing weed competitive pressure.
communication_gap: Modern coexistence theory (Chesson 2000) is a theoretical ecology framework developed in mathematical ecology
  journals (Theoretical Population Biology, American Naturalist). Community ecologists who study species diversity in the
  field rarely read or apply MCT's mathematical decomposition. The storage effect mechanism was proposed in 1982 but is only
  now being tested empirically. Applied ecology and agriculture have been particularly slow to adopt the MCT framework for
  diversity management.

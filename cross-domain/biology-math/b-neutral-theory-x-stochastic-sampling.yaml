id: b-neutral-theory-x-stochastic-sampling
title: Neutral theory ↔ Stochastic sampling — biodiversity as random drift
status: proposed
fields:
- biology
- mathematics
bridge_claim: Hubbell's unified neutral theory of biodiversity (2001) treats all species as ecologically equivalent, with
  diversity maintained by stochastic birth-death-immigration; the species abundance distribution follows a log-series or Poisson-Dirichlet
  distribution derivable from Ewens' sampling formula in population genetics — making ecology a problem in stochastic combinatorics.
translation_table:
- field_a_term: species abundance distribution (SAD) in neutral theory
  field_b_term: allele frequency distribution in neutral population genetics (Ewens formula)
  note: Ewens' sampling formula gives the exact distribution of allele frequencies in neutral Kingman coalescent; maps directly
    to SAD
- field_a_term: fundamental biodiversity number θ = 2Jm ν (Hubbell's neutral parameter)
  field_b_term: population mutation rate 4Nμ in Ewens sampling formula
  note: θ sets the log-series slope; controls diversity analogously to population genetics mutation-drift balance
- field_a_term: local community immigration rate m (from metacommunity)
  field_b_term: migration rate m in island model of population genetics
  note: Immigration determines local SAD deviation from metacommunity log-series; both follow Wright island model
- field_a_term: speciation rate ν (probability of new species per birth event)
  field_b_term: mutation rate μ in neutral allele model
  note: Speciation in neutral theory is the ecological equivalent of mutation in population genetics
cross_pollination_opportunities:
- Apply Poisson-Dirichlet distribution theory (from Ewens' sampling formula) to fit and test neutral theory predictions for
  microbiome diversity data — gut microbiome alpha diversity may follow neutral theory with measurable θ parameter.
- Use coalescent theory (Kingman's coalescent from population genetics) to calculate the expected phylogenetic tree structure
  of a neutral community, enabling phylogenetic tests of neutral theory against niche-based alternatives.
communication_gap: Hubbell's neutral theory (2001) was explicitly inspired by neutral population genetics (Kimura 1968, Ewens
  1972), but the mathematical equivalence (Poisson-Dirichlet distributions) was only fully formalised by Etienne & Olff (2004).
  Mainstream ecologists studying competition and niche theory rejected neutral theory as biologically unrealistic, while statisticians
  and population geneticists who understood the Ewens sampling formula rarely engaged with community ecology.

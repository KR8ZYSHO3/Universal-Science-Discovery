id: b-kriging-geostatistics
title: "Kriging / geostatistics ↔ Gaussian process regression — optimal spatial interpolation as machine learning"
status: established
fields:
  - geophysics
  - geostatistics
  - statistics
  - machine-learning
  - spatial-analysis

bridge_claim: >
  Kriging (Krige 1951, formalised by Matheron 1963) is the minimum-variance linear
  unbiased estimator for spatially correlated data: Ẑ(x₀) = Σᵢ λᵢZ(xᵢ), where the
  optimal weights λᵢ are determined by solving the kriging system derived from the
  variogram γ(h) = ½E[Z(x+h)−Z(x)]². The variogram quantifies spatial autocorrelation
  as a function of lag distance h. Kriging is formally and exactly equivalent to
  Gaussian process (GP) regression in machine learning (Rasmussen & Williams 2006):
  the variogram model corresponds to the GP covariance kernel (semivariogram γ(h)
  = σ² − k(h)); the kriging weights are the GP posterior mean weights; the kriging
  variance is the GP posterior variance; and the kriging system is the GP predictive
  equation. The two fields developed the same statistical framework independently —
  geostatistics from mining engineering in South Africa, Gaussian processes from
  Bayesian machine learning at Cambridge. Modern machine learning practitioners
  routinely use Gaussian process regression for spatial data without knowing
  Matheron's variogram theory; geostatisticians routinely use kriging without knowing
  the GP Bayesian interpretation that enables principled uncertainty quantification.

translation_table:
  - field_a_term: "variogram γ(h) = ½Var[Z(x+h)−Z(x)]"
    field_b_term: "GP covariance kernel k(x,x') = Cov[f(x),f(x')]"
    note: "Stationary kernel: γ(h) = σ² − k(h); Matérn, spherical, exponential kernels all have variogram equivalents"
  - field_a_term: "kriging system (matrix equation for weights λᵢ)"
    field_b_term: "GP posterior mean (kernel matrix inversion)"
    note: "Algebraically identical systems of equations; differ only in notation and derivation route"
  - field_a_term: "kriging variance σ²_K(x₀)"
    field_b_term: "GP posterior variance σ²_GP(x₀)"
    note: "Both quantify prediction uncertainty; equivalent under the stationarity assumption"
  - field_a_term: "nugget effect (variance at zero lag)"
    field_b_term: "observation noise variance σ²_n"
    note: "Both represent measurement error plus micro-scale variability below the sampling scale"
  - field_a_term: "sill (variogram asymptote)"
    field_b_term: "GP prior variance σ²_f"
    note: "The asymptotic variance at large lag — the prior signal variance in GP language"
  - field_a_term: "range (lag at which variogram reaches sill)"
    field_b_term: "lengthscale ℓ (kernel bandwidth)"
    note: "Controls the spatial correlation distance; equivalent to kernel lengthscale"


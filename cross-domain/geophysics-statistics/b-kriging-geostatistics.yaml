communication_gap: >
  Matheron's geostatistics school (Paris) published in French mining engineering
  journals inaccessible to English-speaking statisticians. Gaussian process regression
  entered machine learning through O'Hagan's Bayesian statistics (1970s) and
  Rasmussen's computational work (2006) with no awareness of Krige or Matheron.
  The formal equivalence was established in scattered statistics papers (Cressie 1990,
  Stein 1999) but has not fully propagated to either community. Software ecosystems
  remain separate (GSLIB vs GPy/GPflow).


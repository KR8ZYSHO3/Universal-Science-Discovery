id: b-agent-based-modeling-emergent-institutions
title: >
  Agent-based models with heterogeneous agents following local rules generate
  macro-level emergent institutions — Schelling segregation, Axelrod cooperation,
  and Sugarscape wealth distributions — unifying mathematical complexity theory
  with social science explanation of spontaneous institutional order.
status: established
fields:
  - social-science
  - mathematics
  - complexity-science
  - economics
  - computational-social-science
bridge_claim: >
  Agent-based models (ABMs) are bottom-up simulations where N heterogeneous agents
  follow simple local behavioral rules, and macro-level social patterns emerge from
  their interactions without being programmed at the aggregate level. This bottom-up
  emergence is the mathematical formalization of what social scientists call
  spontaneous order or institution formation.

  Schelling's (1971) segregation ABM is the canonical demonstration: agents on a
  grid with mild preference (move if fewer than 1/3 of neighbors are same type)
  produce near-complete segregation at equilibrium — a macro outcome more extreme
  than any individual's preference. This shows that observed social patterns cannot
  be attributed directly to individual preferences; aggregation dynamics mediate
  between micro and macro.

  Axelrod's (1984) iterated Prisoner's Dilemma tournament: agents with different
  strategies (always cooperate, always defect, tit-for-tat, Pavlov) compete in
  round-robin tournaments. Tit-for-tat wins in all environments — not because it
  defeats others but because it builds cooperative clusters. This demonstrates how
  cooperation can evolve without central coordination — bridging game theory
  (mathematics) and political science (conditions for international cooperation).

  Sugarscape (Epstein & Axtell 1996): agents with heterogeneous vision and
  metabolism forage on a sugar landscape → emergent Pareto wealth distribution
  (Gini coefficient ≈ 0.5), trade networks, cultural transmission, and seasonal
  migration patterns — all from four simple rules. This connects mathematical
  statistical mechanics (wealth distributions as statistical equilibria) with
  social science (inequality, culture, trade).

  El Farol bar problem (Arthur 1994) → minority game: N agents decide to attend
  a bar of capacity N/2; if most attend, all lose. No single strategy wins; the
  Nash equilibrium is a mixed strategy distribution. Markets as ecologies of
  strategies (Arthur's complexity economics) — adapting in response to each other
  rather than optimizing against a fixed environment.
translation_table:
  - field_a_term: agent decision rule (behavioral micro-specification)
    field_b_term: Hamiltonian or energy function in statistical mechanics
  - field_a_term: emergent macro-pattern (segregation, cooperation, inequality)
    field_b_term: thermodynamic phase or collective order parameter
  - field_a_term: agent heterogeneity (different preference parameters)
    field_b_term: quenched disorder in spin glass physics
  - field_a_term: tipping point in ABM (rapid phase transition in social outcome)
    field_b_term: first-order phase transition (discontinuous change)
  - field_a_term: Schelling segregation threshold (1/3 same-type neighbors)
    field_b_term: critical connectivity in percolation theory
  - field_a_term: Nash equilibrium in El Farol / minority game
    field_b_term: maximum entropy distribution in statistical mechanics
  - field_a_term: NetLogo simulation platform (agent rules in patches/turtles)
    field_b_term: cellular automaton or lattice model in computational physics

cross_pollination_opportunities:
  - >
    Network science (Barabasi-Albert scale-free networks, Watts-Strogatz small
    worlds) provides the topological substrate for ABMs — agents on heterogeneous
    networks show qualitatively different emergent behavior than agents on lattices.
    Social network data from Facebook/Twitter could calibrate ABM topology parameters,
    enabling prediction of polarization dynamics or information cascades. This requires
    collaboration between computational social scientists, network scientists, and
    companies providing graph data.
  - >
    Epidemiological ABMs (SIR on contact networks) during COVID-19 showed large
    discrepancies between predictions and outcomes due to poor behavioral calibration.
    Behavioral economists (loss aversion, risk perception biases) should be
    integrated into epidemiological ABM agent rules — a collaboration requiring
    social psychologists, epidemiologists, and mathematicians specializing in stochastic
    processes on networks.
communication_gap: >
  ABM research spans social science (JASSS — J Artificial Societies and Social
  Simulation), computer science (AAMAS), and mathematical physics (complexity
  journals). Social scientists suspicious of simulation vs. empirical work resist
  ABMs as "just coding assumptions." Mathematicians developing rigorous mean-field
  theory for ABMs (interacting particle systems, McKean-Vlasov equations) rarely
  engage with social science ABM literature. The NetLogo platform is widely used
  in education but rarely discussed in physics literature despite implementing
  cellular automaton dynamics. Economists trained in DSGE models (representative
  agents) resist heterogeneous ABM approaches as lacking analytical tractability.

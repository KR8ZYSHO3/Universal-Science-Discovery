cross_pollination_opportunities:
  - "Apply do-calculus to interpret machine learning model explanations causally — feature importance ≠ causal effect"
  - "Use DAG-based confounder selection in genomic epidemiology (Mendelian randomisation as natural do(X) experiment)"
  - "Combine BNs with reinforcement learning (causal RL) to learn policies that generalise across interventional distributions"

communication_gap: >
  Probabilistic graphical models were developed in the AI/computer science community
  (Pearl, Lauritzen) while causal inference methodology developed separately in
  epidemiology (Greenland, Robins) and econometrics (Heckman, Angrist). These
  traditions use different notation and emphasise different identifiability conditions.
  Pearl's (2000) unification in Causality was a landmark but remains incompletely
  adopted across social science disciplines, partly due to resistance to explicit
  causal DAG specification.


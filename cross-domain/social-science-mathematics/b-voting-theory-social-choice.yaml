cross_pollination_opportunities:
  - >
    Computational social choice: finding the winner of various voting rules
    (Kemeny, Slater, Dodgson) is NP-hard. Approximation algorithms and
    parameterised complexity results from computer science can bound the
    computational cost of vote manipulation, informing whether strategic voting
    is practically feasible for real electorates (large n, finite information).
  - >
    Empirical frequency of Condorcet cycles: Arrow's theorem shows cycles are
    possible; empirical political science shows they are rare in practice.
    Survey data on preference orderings can test how close real electorates are
    to single-peaked (how often IIA violations would change electoral outcomes
    in the US, UK, France). This connects mathematical social choice theory
    to empirical electoral science.
  - >
    Mechanism design for digital platforms: social choice theory directly applies
    to recommendation systems, content ranking, and platform governance. Arrow's
    impossibility results constrain what properties a platform can simultaneously
    guarantee in aggregating user preferences. This is an unexploited connection
    between social choice mathematics and platform design.
communication_gap: >
  Arrow's theorem is widely known in economics but poorly taught in political
  science, despite being directly relevant to electoral system design. The
  Gibbard-Satterthwaite theorem is almost unknown outside economic theory,
  despite its direct implication that strategic voting is unavoidable. Voting
  system reformers (advocates of ranked-choice voting, approval voting, etc.)
  often argue for their preferred system without knowing the mathematical
  constraints. Conversely, mathematical social choice theorists rarely engage
  with empirical electoral data or practical reform debates.

id: b-voting-theory-social-choice
title: >
  Arrow's impossibility theorem — no voting system with ≥3 candidates satisfies
  Pareto efficiency, independence of irrelevant alternatives, and non-dictatorship
  simultaneously — and the Gibbard-Satterthwaite theorem that any reasonable
  voting rule is strategically manipulable, transform political science questions
  about democratic design into solved theorems in social choice mathematics.
status: established
fields:
  - political-science
  - mathematics
  - economics
  - social-choice-theory
  - game-theory
bridge_claim: >
  Arrow's impossibility theorem (1951, Nobel Prize in Economics 1972) is one
  of the most striking results in all of social science: it proves, by rigorous
  mathematical argument, that no voting system for ≥3 candidates can
  simultaneously satisfy three apparently minimal conditions:
  (P) Pareto efficiency: if everyone prefers A over B, the social ranking prefers
      A over B;
  (IIA) Independence of irrelevant alternatives: the social ranking of A vs. B
      depends only on individual rankings of A vs. B, not on C;
  (D) Non-dictatorship: no single voter's preferences always determine the
      social ranking.

  The proof constructs a "pivotal voter" — the unique voter whose preference
  between A and B determines the social ranking — and shows this voter must be
  decisive for all pairs, making them a dictator. The logic is combinatorial:
  given the Pareto and IIA conditions, decision power over any pair forces
  decision power over all pairs.

  The Condorcet paradox (Marquis de Condorcet, 1785) is the specific failure
  mode: in majority voting with 3 voters and 3 candidates, individual
  preferences can be transitive (A>B>C, B>C>A, C>A>B) while collective
  preferences are cyclic (A beats B, B beats C, C beats A — a majority
  cycle). No majority winner exists.

  Gibbard (1973) and Satterthwaite (1975) independently proved: any non-
  dictatorial voting rule with ≥3 outcomes is manipulable — there exist
  preference profiles where a voter can obtain a better outcome by submitting
  a preference ranking that does not reflect their true preferences. This makes
  strategic voting (voting for a "lesser evil" rather than one's true first
  choice) unavoidable in any reasonable voting system.

  Escape routes explored mathematically:
  (1) Domain restriction (Black 1948): if all voters have single-peaked
      preferences (unimodal preferences over a left-right political spectrum),
      a Condorcet winner always exists and is the median voter's ideal point
      (Black's median voter theorem). Single-peakedness eliminates cycles.
  (2) Cardinal utility (score voting, approval voting): Arrow's theorem applies
      to ordinal preferences. Score voting (voters assign numerical scores)
      circumvents IIA by using cardinal information, but introduces different
      problems (interpersonal utility comparison).
  (3) Probabilistic voting rules (randomised social choice functions) can
      satisfy Gibbard's conditions, but are rarely used in practice.
  (4) Quantum social choice: Bao & Halpern (2017) showed that quantum
      superposition of preferences can resolve some Arrow impossibilities
      by allowing preferences over quantum superpositions of outcomes.

  The mathematical content is deep: Arrow's conditions encode exactly the
  properties we want in a democracy, and their joint impossibility means
  every voting system is a compromise — a trade-off between which desirable
  property is violated. The mathematical structure of social choice (preference
  aggregation, Condorcet efficiency, strategyproofness) is a branch of
  combinatorics and order theory with direct policy implications.
translation_table:
  - field_a_term: "Pareto efficiency (welfare economics)"
    field_b_term: "Universal dominance criterion for collective preference"
    note: If everyone agrees, society agrees — the least controversial democratic condition
  - field_a_term: "Independence of irrelevant alternatives (Arrow condition)"
    field_b_term: "Pairwise binary consistency of social ranking"
    note: The condition most often sacrificed in practice — violated by Borda count
  - field_a_term: "Condorcet winner (beats all others in pairwise majority)"
    field_b_term: "Median voter outcome under single-peaked preferences (Black's theorem)"
    note: Exists if and only if preferences are single-peaked on a line
  - field_a_term: "Gibbard-Satterthwaite manipulability"
    field_b_term: "Strategic voting (e.g. voting for a lesser evil in plurality voting)"
    note: Every non-dictatorial voting rule has some preference profile where strategic voting helps
  - field_a_term: "Social welfare function (Arrow's framework)"
    field_b_term: "Voting system (aggregating individual rankings to social ranking)"
    note: Arrow formalises all voting systems as social welfare functions
  - field_a_term: "Single-peaked preferences on a line (Black's domain restriction)"
    field_b_term: "Spatial voting model (left-right political spectrum)"
    note: Single-peakedness is empirically plausible for policy issues on one dimension

cross_pollination_opportunities:
  - >
    Burt's structural holes theory predicts that high-betweenness brokers
    earn higher incomes (Burt 2004 showed this for managers). Testing this
    hypothesis using LinkedIn network data mapped to official salary surveys
    would quantify the income premium per unit of betweenness centrality —
    making social capital a numerically measurable economic quantity for
    the first time at large scale.
  - >
    The Erdős-Rényi phase transition predicts that opinion cascades and
    information epidemics require ⟨k⟩ > 1 to spread. Social media
    algorithms that inflate effective degree (recommendation algorithms)
    push networks above this threshold artificially. A quantitative model
    of algorithm-induced ⟨k⟩ inflation and its effect on the giant-
    component size would connect network theory to platform governance
    policy.
  - >
    In scale-free networks, targeted immunisation (vaccinating hubs) is
    dramatically more efficient than random immunisation (Pastor-Satorras
    & Vespignani 2002). The same strategy should apply to social network
    interventions: targeting high-betweenness brokers (structural holes)
    with health or norm-change messages should produce faster cascade
    than random targeting. This is a directly testable public health
    hypothesis from network science.
communication_gap: >
  Granovetter (1973) and Burt (1992) developed social capital theory in
  the sociology literature using graph-theoretic language informally but
  without formal graph theory. Erdős and Rényi worked in pure mathematics
  completely disconnected from social science. Barabási & Albert (1999)
  explicitly noted the social network application of scale-free graphs,
  but the sociological literature absorbed network science tools slowly.
  The precise algebraic equivalences between sociological concepts (closure,
  structural holes, weak ties) and graph-theoretic quantities (clustering
  coefficient, betweenness, bridge edges) are now textbook material in
  computational social science but remain unknown to most empirical
  sociologists who use social capital as a qualitative concept.

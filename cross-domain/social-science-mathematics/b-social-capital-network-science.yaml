id: b-social-capital-network-science
title: >
  Granovetter's "strength of weak ties" and Burt's structural holes in
  social capital theory are precisely identified with bridge edges and
  high-betweenness-centrality nodes in graph theory: social capital
  reduces to computable network topology, and the Erdős-Rényi giant
  component transition predicts the critical network density for
  information to spread society-wide.
status: established
fields:
  - social-science
  - sociology
  - graph-theory
  - network-science
  - economics
bridge_claim: >
  Social capital theory (Granovetter 1973, Burt 1992, Coleman 1988)
  asserts that an individual's social position determines their access to
  information, resources, and opportunities. Network science provides
  exact mathematical translations of these sociological concepts:

  1. WEAK TIES = BRIDGE EDGES: Granovetter's (1973) central claim is that
     weak ties (acquaintances, as opposed to close friends) are more
     valuable for finding jobs and spreading information than strong ties.
     The graph-theoretic translation is precise: an edge (u,v) is a
     "bridge" (or "local bridge") if its removal increases the shortest
     path length between u and v. Bridge edges are almost always weak
     ties because strong ties cluster within dense cliques, while bridges
     span across sparsely connected communities. The "strength of weak
     ties" is exactly the high betweenness centrality of bridge edges.

  2. STRUCTURAL HOLES = BETWEENNESS CENTRALITY: Burt's (1992) structural
     holes are gaps in a network that a "broker" node can span — the
     broker is the unique information conduit between two otherwise
     disconnected groups. This is precisely the definition of a high-
     betweenness-centrality node: B(v) = Σ_{s≠v≠t} σ_{st}(v) / σ_{st},
     where σ_{st} is the number of shortest paths from s to t, and
     σ_{st}(v) the number passing through v. Burt's "constraint" measure
     (C_i = Σ_j (p_{ij} + Σ_q p_{iq}p_{qj})²) is algebraically related
     to the inverse of local betweenness centrality.

  3. EIGENVECTOR CENTRALITY = SOCIAL CAPITAL STOCK: Coleman's (1988)
     social capital is the aggregate value of social connections. The
     eigenvector centrality (PageRank) of a node v — the eigenvector
     of the adjacency matrix corresponding to the largest eigenvalue —
     captures exactly this: a node is influential if it is connected to
     other influential nodes. Google's PageRank is eigenvector centrality
     on the web graph; social capital is PageRank on the social network.

  4. GIANT COMPONENT TRANSITION: Erdős & Rényi (1960) proved that in
     a random graph G(n,p), a giant connected component (containing
     O(n) nodes) emerges when the mean degree ⟨k⟩ = np crosses 1.
     The critical threshold p_c = 1/n (or equivalently ⟨k⟩_c = 1)
     is a second-order phase transition. In social network terms: below
     the threshold, society is fragmented into small isolated groups and
     information cannot spread widely; above the threshold, a single
     connected giant component allows society-wide information diffusion.
     This predicts the minimum social network density for rumours, norms,
     or innovation to reach critical mass.

  5. SCALE-FREE NETWORKS AND PREFERENTIAL ATTACHMENT: Real social networks
     (and the internet) are not Erdős-Rényi random graphs — they have
     power-law degree distributions P(k) ∝ k^{-γ} with γ ≈ 2-3
     (Barabási & Albert 1999). In such scale-free networks, highly
     connected "hubs" (celebrities, influencers) disproportionately
     determine information flow, and the giant component exists even
     at vanishingly small average degree. This explains why a single
     influential node can trigger a "viral" cascade in sparse networks.

  6. CLUSTERING COEFFICIENT = SOCIAL CLOSURE: Coleman's (1988) "closure"
     — the tendency of two friends' mutual friends to be friends with
     each other — is quantified by the clustering coefficient
     C_v = (triangles around v) / (possible triangles around v).
     High clustering = strong social closure = dense cliques. The
     tension between high clustering (strong-tie cliques) and low
     clustering bridge nodes (Granovetter's weak ties) is the small-world
     property (Watts & Strogatz 1998): high clustering + short path
     lengths simultaneously.
translation_table:
  - field_a_term: "Weak tie (acquaintance relationship)"
    field_b_term: "Bridge edge or local bridge in graph theory"
    note: "Edges with high edge betweenness are almost always weak ties; bridges cross community boundaries"
  - field_a_term: "Structural hole (gap spanned by broker)"
    field_b_term: "High vertex betweenness centrality B(v)"
    note: "A node spanning structural holes has many shortest paths passing through it"
  - field_a_term: "Burt's network constraint C_i"
    field_b_term: "Inverse of local betweenness / redundancy of contacts"
    note: "High constraint = contacts are densely interconnected = no structural holes = low social capital"
  - field_a_term: "Social capital stock (Coleman)"
    field_b_term: "Eigenvector centrality / PageRank"
    note: "Influence propagates multiplicatively through the network; eigenvector centrality captures recursive influence"
  - field_a_term: "Critical network density for information spread"
    field_b_term: "Erdős-Rényi giant component threshold p_c = 1/n (⟨k⟩ = 1)"
    note: "Below threshold: fragmented society; above: connected giant component enables global diffusion"
  - field_a_term: "Social closure (Coleman 1988)"
    field_b_term: "Clustering coefficient C_v"
    note: "Dense cliques = high clustering = social closure; facilitates trust and norm enforcement"
  - field_a_term: "Scale-free social network (hubs, influencers)"
    field_b_term: "Power-law degree distribution P(k) ∝ k^{-γ}"
    note: "Preferential attachment (the rich get richer) generates hubs analogous to celebrity influencers"

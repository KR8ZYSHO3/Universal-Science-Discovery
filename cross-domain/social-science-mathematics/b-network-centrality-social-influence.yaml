related_hypotheses:
  - h-eigenvector-centrality-superspreader-epidemic-prediction
cross_pollination_opportunities:
  - >
    Real-time eigenvector centrality computed from mobile phone call records
    (proxy social network) during an epidemic outbreak would directly test whether
    high-centrality individuals are the observed superspreaders — the mathematical
    prediction is clear but the epidemiological validation is technically difficult.
  - >
    In labour economics, computing Bonacich centrality in professional networks
    (from LinkedIn graph data) and regressing on wages would directly test
    Ballester-Calvó-Zenou's theory — a pure network-math prediction testable
    with observational data.
communication_gap: >
  Sociologists invented betweenness centrality (Freeman 1977) and published in
  Sociometry; mathematicians developed spectral graph theory in parallel in
  discrete mathematics journals. Economists (Bonacich, Katz) developed network
  centrality independently in economics journals. The synthesis — that all these
  are eigenvector variants — is well-known to network scientists but rarely
  presented in standard sociology or economics curricula. PageRank's connection
  to sociological influence theory is rarely discussed outside network science.

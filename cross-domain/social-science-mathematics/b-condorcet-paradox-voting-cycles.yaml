cross_pollination_opportunities:
  - >
    Computational social choice: algorithms to detect Condorcet winners (or approximate
    them under noise) have complexity consequences — finding a Condorcet winner is in P,
    but finding a Kemeny consensus (minimum swap distance to a consistent ranking) is
    NP-hard. This connects voting theory to computational complexity, with applications
    to web page ranking (Google's PageRank is a random walk approximation to Condorcet
    winner in a graph) and preference aggregation in recommender systems.
  - >
    Evolutionary biology uses voting models: the Red Queen hypothesis can be formalized
    as a Condorcet-cycle game between host immune genotypes, pathogen escape genotypes,
    and host immune recovery — cycling preferences explain coevolutionary arms races
    without equilibrium convergence.
communication_gap: >
  Condorcet (1785) wrote in French and was largely ignored by English-language political
  scientists until the 20th century. Arrow (1951) rediscovered the impossibility in an
  economics framework. Black (1948) independently discovered the median voter theorem
  and published in the Journal of Political Economy. Social choice theory developed
  primarily in economics departments (Harvard, Rochester) while political scientists
  studied voting behavior empirically with minimal awareness of the mathematical
  impossibility results until the 1970s.

cross_pollination_opportunities:
  - "Superforecasting methods (Good Judgement Project): statistical techniques for identifying and upweighting the most accurate individual forecasters in a crowd use the same optimal weighting theory from Bayesian combining of expert opinions."
  - "Algorithmic management of online rating systems: crowd-rating platforms (Amazon reviews, Yelp) aggregate noisy individual ratings; probability theory predicts the optimal number of ratings needed to achieve a given confidence in the true quality score, informing platform design."
communication_gap: >
  Social scientists who study collective intelligence cite Galton's ox-weighing
  demonstration (1907) and Surowiecki's popular book but rarely connect to
  the formal statistical theory (optimal aggregation, correlated estimators).
  Statisticians who work on combining expert forecasts and prediction intervals
  have the relevant machinery but publish in statistics journals not in
  organizational behavior or social psychology.

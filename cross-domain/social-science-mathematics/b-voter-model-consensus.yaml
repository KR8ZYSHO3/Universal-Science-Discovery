cross_pollination_opportunities:
  - >
    Noisy voter model for financial markets: the voter model with external
    noise (zealots or committed agents who never switch) maps onto a model
    of herding in financial markets with fat-tailed return distributions.
    Applying the exact solution on heterogeneous networks could improve
    understanding of market microstructure.
  - >
    Network interventions for depolarization: the voter model quantifies
    how community structure drives metastable polarization. This gives
    explicit intervention strategies — adding random links between communities
    exponentially reduces polarization time — with potential application to
    algorithmic social media feed design.
communication_gap: >
  Sociologists studying opinion dynamics and statistical physicists studying
  the voter model are largely disconnected. The model is well-known in
  mathematical ecology (it originated as a species competition model), in
  statistical physics (as a non-equilibrium stochastic model), and increasingly
  in computational social science, but the exact equivalence between the voter
  model, the Moran process, and random walks is rarely appreciated in all three
  communities simultaneously.

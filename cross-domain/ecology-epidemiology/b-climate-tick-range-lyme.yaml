cross_pollination_opportunities:
  - >
    Integrated ecological-epidemiological surveillance — real-time tick drag-sampling data
    linked to human case reporting in the same counties (currently done separately by
    different agencies)
  - Mathematical R₀ modeling incorporating IPCC AR6 climate projections to forecast 2040 and 2060 Lyme disease burden in Ohio and Great Lakes states under different deer management scenarios
  - Deer density management experiments (regulated hunting, contraception, fencing) in well-defined geographic units with pre/post measurement of both tick nymph density and human Lyme incidence
  - Environmental DNA (eDNA) surveillance for Borrelia in tick populations as a leading indicator of incidence increases, 2–3 years before human cases rise (ecological early-warning system)
  - Agent-based model integrating tick phenology, deer movement (GPS collar data), and human land-use patterns to identify hotspot areas for targeted acaricide treatment
communication_gap: >
  Tick ecologists and field biologists publish primarily in Parasitology,
  Journal of Medical Entomology, and Ecological Applications. Epidemiologists
  studying Lyme disease publish in Emerging Infectious Diseases, MMWR, and
  American Journal of Epidemiology. The mathematical epidemiologists who
  develop R₀ models rarely have field ecology training. State health departments
  (who collect human incidence data) do not coordinate surveillance efforts with
  state wildlife agencies (who manage deer populations), even though deer density
  is the primary lever for reducing tick burden. Climate scientists whose
  models generate habitat projections are largely disconnected from both
  communities. This fragmentation is a direct barrier to evidence-based Lyme
  prevention policy.

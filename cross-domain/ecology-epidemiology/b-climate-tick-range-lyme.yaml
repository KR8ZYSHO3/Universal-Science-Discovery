id: b-climate-tick-range-lyme
title: >
  Climate warming, Ixodes tick range expansion, and Lyme disease incidence —
  an ecology–epidemiology bridge linking tick population dynamics and deer
  management to human disease burden.
status: established
fields:
  - ecology
  - epidemiology
  - climate-science
  - public-health
  - vector-biology
bridge_claim: >
  Lyme disease is simultaneously an ecological and epidemiological problem,
  but the two communities use different models, metrics, and interventions.
  Ecology side: Ixodes scapularis (black-legged tick) requires a 3-host
  life cycle across 2 years, ≥50% relative humidity for survival and
  development, white-footed mice (Peromyscus leucopus) as the primary
  larval/nymphal reservoir for Borrelia, and deer (Odocoileus virginianus)
  as the primary adult reproductive host. Climate warming (IPCC AR6: +1.5–4°C
  by 2100) is expanding suitable tick habitat northward ~46 km/decade and to
  higher elevations, validated by field surveillance (Ogden et al. 2008;
  Bouchard et al. 2019). A nonlinear ecological threshold (an inverted Allee
  effect) exists at ~15 deer/km²: below this density tick abundance is low
  and self-limiting; above it tick populations grow exponentially.
  Epidemiology side: Lyme disease incidence in the US has tripled since 1993,
  reaching an estimated 476,000 cases/year (Kugeler et al. 2021). The Basic
  Reproduction Number R₀ for Borrelia transmission integrates tick density,
  deer density, mouse reservoir competence, and human exposure rates — a
  mathematical framework from mathematical epidemiology that the tick ecology
  community has adopted imperfectly.
  The bridge: ecology provides the mechanistic model for tick population dynamics
  and the intervention points (deer density management, habitat modification,
  rodent reservoir management); epidemiology provides the R₀ framework, the
  human incidence surveillance data, and the outcome metrics needed to evaluate
  whether ecological interventions actually reduce human disease burden. Neither
  community alone can design evidence-based Lyme prevention policy.
translation_table:
  - field_a_term: deer density (ecology)
    field_b_term: tick abundance per unit area (epidemiology-relevant exposure metric)
    note: Deer density is the primary driver of adult tick reproductive success; epidemiology needs per-area tick nymph density as the proximal exposure metric
  - field_a_term: Peromyscus leucopus reservoir competence (ecology)
    field_b_term: Borrelia force of infection from reservoir to tick (epidemiology)
    note: Reservoir competence (% nymphs infected after feeding on reservoir host) translates ecological data to epidemiological transmission parameters
  - field_a_term: habitat suitability index for Ixodes scapularis (ecology/climate)
    field_b_term: geographic risk surface for human Lyme exposure (epidemiology)
    note: Ecological niche models can be converted to human exposure risk maps if calibrated with surveillance incidence data
  - field_a_term: tick questing behavior / host-finding rate (ecology)
    field_b_term: contact rate between infectious vector and susceptible human (R₀ component)
    note: The core bridge between field ecology (tick behavior studies) and mathematical epidemiology (R₀ formulation)
  - field_a_term: deer exclusion fence experiment (ecology)
    field_b_term: Lyme incidence reduction in treated area (epidemiology outcome)
    note: Daniels et al. (1993) showed deer exclusion reduces tick density; the epidemiological translation to human cases has not been rigorously quantified

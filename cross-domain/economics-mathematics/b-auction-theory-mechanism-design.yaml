cross_pollination_opportunities:
  - >
    Machine learning for mechanism design (RegretNet, automated mechanism design):
    gradient descent on mechanism parameters with regret as the loss function can
    discover near-optimal mechanisms for complex settings where Myerson's theory
    does not give closed forms — directly applying numerical optimisation to the
    differential-inequality characterisation.
  - >
    Carbon permit auctions and cap-and-trade mechanisms could be analysed with VCG
    theory to determine optimal allocation rules that minimise abatement cost while
    raising revenue — an application of mechanism design to climate policy that
    academic economists and climate policymakers rarely pursue jointly.
communication_gap: >
  Auction theory emerged in mathematical economics (Vickrey 1961 in Journal of Finance,
  Clarke 1971 in Public Choice), while the generalisation to mechanism design was
  done at the intersection of economics and operations research. Computer science
  discovered algorithmic game theory in the late 1990s (Nisan, Roughgarden) and
  independently rediscovered many mechanism design results, creating a parallel
  literature with different terminology. Practitioners in finance, procurement,
  and advertising who run multi-billion dollar auctions daily rarely read the
  original VCG papers, and academic mechanism designers rarely engage with the
  engineering challenges of running auctions at scale.

id: b-supply-chain-network-x-bond-percolation-disruption
title: >
  Supply-chain risk analysts model firm–supplier edges failing under correlated shocks — resembling bond percolation on industrial networks where operational continuity requires giant connected components — enabling import of percolation thresholds, reliability polynomials, and network resilience metrics from discrete mathematics into operations research practice when modeling multi-tier disruptions.
status: proposed
fields:
  - economics
  - operations-research
  - network-science
bridge_claim: >
  Bond percolation retains edges with probability p — giant component emergence near p_c parallels systemic failure cascades when supplier edges drop below sustaining densities — stylized fact models trade realism for analytic thresholds akin to engineering reliability block diagrams.
  Multi-tier supply graphs resemble correlated percolation when industries cluster geographically — requiring extensions beyond IID bond deletion — identical mathematical challenge as correlated site/bond percolation studied in statistical physics but reinterpreted with procurement contract semantics.
translation_table:
  - field_a_term: Edge survival probability p after disruption draw
    field_b_term: Bond occupation probability in percolation ensembles
    note: Failure ensembles sampled empirically replace analytic IID assumptions when stress-tested historically.
  - field_a_term: Giant connected component existence (functional supply network)
    field_b_term: Percolating cluster spanning macroscopic lattice fraction
    note: Operational KPI thresholds mimic finite-size scaling crossover widths near p_c.
  - field_a_term: Redundant multisourcing (parallel suppliers)
    field_b_term: Effective dimensionality / clustering coefficient boosting resilience vs tree-like risks
    note: Loop-rich graphs shift thresholds analogous to correlated small-world modifications studied in network robustness literature.
communication_gap: >
  MBA supply-chain syllabi emphasize Just-In-Time narratives over random-graph phase transitions; physics-trained network scientists publish percolation thresholds rarely calibrated on proprietary procurement graphs — leaving practitioner uptake uneven despite growing post-COVID interest.
cross_pollination_opportunities:
  - >
    Publish anonymized industrial tiered-edge datasets enabling community replication of correlated percolation fits akin to OpenAlex-scale benchmarks for academic graphs.
  - >
    Stress-test insurance-like contingent sourcing contracts using dynamical percolation updating rules informed by macroeconomic nowcasts feeding correlated edge failures.

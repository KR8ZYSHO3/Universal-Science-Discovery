id: b-entropy-arrow-of-time
title: >
  Thermodynamic entropy increase, Landauer's information-erasure bound, and the
  cosmological arrow of time are three faces of the same asymmetry — a unified
  account requires identifying which low-entropy boundary condition (past hypothesis,
  Penrose's Weyl curvature, quantum decoherence) breaks time-reversal invariance
  at each scale.
status: proposed
fields:
  - thermodynamics
  - information-theory
  - cosmology
  - statistical-mechanics
bridge_claim: >
  Three apparently separate arrows of time — thermodynamic (entropy increases),
  computational (Landauer: erasing one bit dissipates at least k_B T ln 2 of heat),
  and cosmological (the universe began in an extraordinarily low-entropy state) —
  are governed by the same underlying asymmetry.

  Landauer's principle (1961) establishes a hard link between information and
  thermodynamics: logical irreversibility (erasing a bit) requires physical
  irreversibility (entropy increase). Bennett (1982) showed that logically
  reversible computation can approach zero dissipation, making the connection
  exact, not just analogical.

  Penrose's "Weyl curvature hypothesis" locates the origin of the thermodynamic
  arrow in the vanishing Weyl curvature at the Big Bang — the gravitational field
  was highly ordered even when matter was in thermal equilibrium. This is the
  cosmological boundary condition that explains why entropy was low at t=0.

  The information-theoretic bridge: the arrow of time is a consequence of a
  low-entropy initial condition plus the second law. Landauer's principle makes
  the information → entropy direction precise. Together, they imply that any
  physical computation embedded in a universe with a thermodynamic arrow must
  also have an information-processing arrow — and that Maxwell's demon (which
  appears to violate the second law by sorting molecules) is defeated by the
  thermodynamic cost of erasing its memory.

  The bridge is contested because: (1) the initial low-entropy condition is
  unexplained (it is assumed, not derived), (2) Boltzmann's H-theorem arrow
  emerges from time-symmetric dynamics via coarse-graining, raising the question
  of whether the arrow is fundamental or epistemic, and (3) quantum decoherence
  provides an alternative (or complementary) account of irreversibility.
translation_table:
  - field_a_term: entropy S = k_B ln W (Boltzmann)
    field_b_term: information H = -sum p_i log p_i (Shannon)
    note: S = k_B ln 2 * H; the two quantities differ only by units
  - field_a_term: thermodynamic irreversibility (dS >= 0)
    field_b_term: logical irreversibility (bit erasure)
    note: Landauer's principle makes this equivalence exact and experimentally testable
  - field_a_term: low-entropy Big Bang initial condition
    field_b_term: low-Kolmogorov-complexity initial state of the universe
    note: The past hypothesis in thermodynamics corresponds to high algorithmic compressibility
  - field_a_term: Weyl curvature = 0 at t=0 (Penrose)
    field_b_term: gravitational degrees of freedom not yet entangled with matter
    note: Penrose's CCC links this to quantum gravity
  - field_a_term: Maxwell's demon defeated by Szilard-Landauer argument
    field_b_term: measurement + memory erasure fully accounts for demon's thermodynamic budget
related_unknowns:
  - u-arrow-of-time-low-entropy-origin
related_hypotheses:

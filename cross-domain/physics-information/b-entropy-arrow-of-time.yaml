cross_pollination_opportunities:
  - >
    Experimental tests of Landauer's principle (Berut et al. 2012, Nature) at room
    temperature and near quantum limits. Extending these to quantum erasure experiments
    probes whether quantum decoherence and thermodynamic irreversibility are unified
    or merely correlated.
  - >
    Penrose's conformal cyclic cosmology (CCC) predicts specific imprints in the
    CMB power spectrum from previous aeons. Comparing these predictions against
    Planck satellite data tests whether the cosmological arrow has a geometric origin.
  - >
    Algorithmic information theory (Kolmogorov complexity) applied to the initial
    state of the universe: if the past hypothesis is simply the requirement that
    K(initial state) << S_max, then cosmology, information theory, and thermodynamics
    converge on a single quantity that explains the arrow.
communication_gap: >
  Thermodynamics, cosmology, and information theory each have their own arrow-of-time
  literature with almost no cross-citation. Cosmologists rarely engage with Landauer's
  principle; information theorists rarely engage with Penrose's Weyl curvature hypothesis;
  thermodynamicists often treat the arrow as a solved problem (second law). Bridging
  these requires comfort in all three fields simultaneously.

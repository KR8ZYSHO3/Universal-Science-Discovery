communication_gap: >
  Landauer's 1961 paper appeared in IBM Journal of Research and Development — an
  engineering journal — and was largely ignored by both physicists and computer
  scientists for two decades.  Shannon's information theory community knew about
  entropy but not the physical cost of erasure.  Thermodynamicists knew about the
  second law but not that information erasure was the key mechanism.  The bridge
  was not fully established until Bennett's 1982 paper, 21 years after Landauer.


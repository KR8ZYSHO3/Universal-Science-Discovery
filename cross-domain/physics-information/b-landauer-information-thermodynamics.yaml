id: b-landauer-information-thermodynamics
title: "Landauer's principle ↔ thermodynamic cost of information erasure (Maxwell's demon resolution)"
status: established
fields:
  - thermodynamics
  - information-theory
  - statistical-physics
  - computer-science

bridge_claim: >
  Landauer (1961) proved that erasing one bit of information in a thermal
  environment at temperature T requires dissipating at least k_B * T * ln(2)
  of free energy as heat — approximately 3 zJ at room temperature.  This resolves
  Maxwell's demon paradox (1867): the demon cannot violate the second law because
  the erasure of its memory at the end of each cycle costs exactly the entropy
  the demon gained by sorting molecules.  Bennett (1982) completed the argument
  by showing that logically reversible computation can in principle be done
  without dissipation, but erasure (resetting a bit) is irreversible and always
  costs k_B * T * ln(2).  Experimentally verified by Berut et al. (2012) in a
  colloidal particle bistable trap to within 1% of the Landauer limit.
  Consequence for computing: a 1 GHz processor erasing 10^18 bits/s is bounded
  by P >= 10^18 * k_B * T * ln(2) ~ 3 nW minimum — 9 orders of magnitude below
  current CMOS dissipation, so we are far from the Landauer limit in practice,
  but neuromorphic and reversible computing architectures approach it.


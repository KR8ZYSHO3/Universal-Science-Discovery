id: b-human-factors-system-safety
title: >
  James Reason's Swiss Cheese model and Perrow's Normal Accident Theory connect
  social-science analysis of human error and organizational factors to engineering
  system safety design, explaining why accidents occur in tightly coupled complex
  systems and how High Reliability Organizations prevent them through mindful
  organizing and Crew Resource Management.
status: established
fields:
  - social-science
  - engineering
  - organizational-psychology
  - systems-engineering
  - safety-science
bridge_claim: >
  James Reason's Swiss Cheese model (1990) formalizes how accidents occur when
  holes in multiple defensive layers (technical barriers, procedures, supervision,
  organization) align — combining active failures (human errors: slips, lapses,
  mistakes, violations) with latent conditions (organizational factors that create
  error-producing conditions). This is fundamentally a social-science model of
  causation applied to engineering system design. Perrow's Normal Accident Theory
  (1984) argued that tightly coupled, interactive complex systems (nuclear plants,
  chemical facilities, aircraft carriers) have accidents not because of human
  error but because of systemic properties: non-linear interactions between
  components make failure cascades incomprehensible in real time. High Reliability
  Organizations (HROs: Weick & Sutcliffe 2001) — aviation, nuclear power plants
  — avoid accidents through mindful organizing: sensitivity to operations, reluctance
  to simplify interpretations, preoccupation with failure, deference to expertise,
  commitment to resilience. CRM (Crew Resource Management) operationalized HRO
  principles as structured interpersonal training — aviation fatality rate decreased
  ~10× between 1970 and 2000, with CRM training credited as a major contributor.
  The bridge: social-science understanding of human cognition, group dynamics,
  and organizational culture is necessary and sufficient to explain patterns of
  system failure that engineering fault trees cannot predict.
translation_table:
  - field_a_term: latent organizational conditions (Reason)
    field_b_term: design flaws and systemic weaknesses in engineered systems
    note: Latent conditions are the organizational equivalent of hidden engineering defects
  - field_a_term: tight coupling (Perrow)
    field_b_term: systems where failures propagate faster than human response time
    note: Tightly coupled systems have no slack to interrupt cascades — a sociotechnical property
  - field_a_term: interactive complexity (Perrow)
    field_b_term: non-linear component interactions not visible in design documentation
    note: Unexpected interactions between subsystems create failure modes not anticipated in FMEAs
  - field_a_term: mindful organizing (Weick)
    field_b_term: safety management system (SMS) design in aviation/nuclear
    note: HRO principles translate into engineering-grade safety management protocols
  - field_a_term: CRM error taxonomy (slips, lapses, mistakes, violations)
    field_b_term: human factors integration in system design (MIL-STD-1472)
    note: Human error taxonomy drives HFE (Human Factors Engineering) interface design
  - field_a_term: normalization of deviance (Vaughan — Challenger)
    field_b_term: risk assessment creep under production pressure
    note: Organizational sociology explains why engineers tolerate known risks under schedule pressure

cross_pollination_opportunities:
  - Apply network failure analysis (percolation theory) to Reason's Swiss Cheese
    model — model defensive layers as network nodes and ask what layer dependency
    structure minimizes the probability of simultaneous hole alignment
  - Use organizational network analysis (ONA) to identify latent conditions in
    engineering organizations — measuring communication gaps that predict safety
    incidents before they occur
  - Test whether CRM training effects generalize to other safety-critical domains
    (surgical teams, nuclear control rooms) using meta-analytic methods with
    incident rate and near-miss rate as outcomes
  - Apply Bayesian network models to Perrow's interaction-complexity-coupling taxonomy
    to compute quantitative accident probability as a function of organizational
    and technical parameters
communication_gap: >
  Engineering safety literature (fault trees, FMEA, reliability analysis) and
  organizational psychology literature (HRO, organizational learning, error taxonomy)
  publish in entirely separate journals (Reliability Engineering & System Safety
  vs. Organization Science, Academy of Management Review). The quantitative
  probabilistic risk assessment (PRA) community in nuclear engineering rarely reads
  Weick or Perrow; organizational sociologists rarely read NUREG safety reports.
  Helmreich's CRM research (BMJ 2000) bridging aviation to surgery is an exception
  that proves the rule.

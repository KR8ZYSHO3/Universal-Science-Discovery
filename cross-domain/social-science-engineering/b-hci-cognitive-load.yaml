cross_pollination_opportunities:
  - >
    Neuroimaging of cognitive load (fMRI, fNIRS): prefrontal cortex (PFC) activation
    scales with working memory load — measurable with portable fNIRS headsets during
    interface use. Real-time adaptive interfaces that monitor user cognitive load
    (via pupil dilation as a proxy for mental effort) and adjust information density,
    interaction complexity, or automation level accordingly could dynamically minimize
    extraneous load — closing the engineering-psychology feedback loop.
  - >
    Accessibility and universal design: Fitts' law makes precise predictions for
    motor-impaired users (larger pointing error → smaller effective W → higher ID
    → much longer pointing time). Quantitative HCI models allow designing interfaces
    that scale to diverse motor abilities, connecting disability science to engineering
    through a shared mathematical framework (throughput in bits/second as a
    disability-agnostic performance metric).
communication_gap: >
  Cognitive psychology (working memory research, dual-process theory) and engineering
  (UI design, software engineering) operate in largely separate academic communities.
  Academic HCI research (CHI conference) bridges these domains but is underfamiliar
  in both psychology departments (which rarely teach Fitts' law) and software engineering
  programs (which rarely teach cognitive psychology). Industry UX practice uses Fitts'
  law and cognitive load theory empirically but rarely engages with their information-
  theoretic foundations. Dark patterns research (a social science phenomenon of interface
  manipulation) is studied by behavioral economists and consumer protection researchers
  who rarely engage with the computational HCI literature on task modeling.

cross_pollination_opportunities:
  - >
    Topological interaction (k nearest neighbors) vs. metric interaction (fixed radius)
    has different consequences for collective robustness. Empirical tracking of 3D fish
    schools during predator attacks combined with agent-based simulation could determine
    whether fish switch interaction rules dynamically — a prediction of adaptive active
    matter models. This could explain why some species school and others don't.
  - >
    Active matter theory predicts a phase diagram in the noise-density plane with
    distinct phases (disordered, banded/inhomogeneous, ordered). Controlled laboratory
    experiments with fish in tanks of tunable density and turbulence (noise analogue)
    could map this phase diagram empirically, providing the first quantitative test
    of Vicsek-model predictions in a vertebrate system.
  - >
    The Kármán vortex street hydrodynamic benefit for trailing fish (Liao et al. 2003)
    has a CFD/fluid dynamics counterpart: optimal positioning behind a leading swimmer.
    Importing flow optimization theory (optimal formation, distributed sensing) into
    fish schooling biology could explain the characteristic diamond lattice structure
    observed in dense fish schools.
communication_gap: >
  Marine biologists study fish schooling as an anti-predator behavior and hydrodynamic
  efficiency problem; statistical physicists study it as an active matter phase
  transition; fluid dynamicists study it as a CFD problem in collective swimming.
  The three communities use different formalisms and rarely cite each other. Empirical
  data on 3D fish tracking at sufficient density to extract interaction rules became
  available only recently (stereophotogrammetry, computer vision) — enabling comparison
  with theoretical predictions that have existed since 1995.

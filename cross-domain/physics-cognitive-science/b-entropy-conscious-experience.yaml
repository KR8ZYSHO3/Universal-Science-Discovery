id: b-entropy-conscious-experience
title: >
  Integrated information theory (Tononi 2004) quantifies consciousness as Φ —
  the information generated by a system above and beyond its parts — while Friston's
  free energy principle connects conscious inference to entropy minimization,
  together posing the deepest open question about the relationship between physical
  entropy and phenomenal experience.
status: proposed
fields:
  - physics
  - thermodynamics
  - information-theory
  - cognitive-science
  - consciousness-studies
  - neuroscience
bridge_claim: >
  Integrated information theory (IIT; Tononi 2004) defines consciousness as Φ,
  the amount of irreducible integrated information: the effective information
  generated by the whole system above and beyond the sum of its parts. Φ is
  computed from the cause-effect structure of a system and represents how much
  the system's current state constrains past and future states in an irreducible
  way. High Φ = high consciousness; Φ = 0 for systems with independent parts.
  This maps onto concepts from thermodynamics: (1) Shannon entropy H = -Σ p_i log p_i
  characterizes the information content of a distribution; (2) mutual information
  I(A;B) quantifies correlations between system parts; (3) Φ is a generalized
  mutual information that accounts for the geometry of cause-effect structure.
  Friston's free energy principle (2010) takes a different approach: the brain
  minimizes variational free energy F = -log P(observations) + KL(q||p), where
  F bounds surprisal. Consciousness, on this view, is the system's model of itself
  minimizing prediction error. Both approaches connect physical entropy/information
  to subjective experience, but through distinct mathematical formalisms that
  have not been reconciled. Whether high Φ corresponds to low free energy,
  and whether either quantity can be measured in actual neural systems, remain
  deeply open questions.
translation_table:
  - field_a_term: thermodynamic entropy S = k_B ln Ω
    field_b_term: phenomenal richness (number of distinguishable conscious states)
    note: IIT posits that high Φ systems can have many distinguishable experiences — analogous to high entropy
  - field_a_term: integrated information Φ
    field_b_term: degree of consciousness (scalar measure of experience)
    note: Φ > 0 is claimed necessary and sufficient for any degree of consciousness
  - field_a_term: variational free energy F = KL(q||p) - log P(y)
    field_b_term: the brain's prediction error (surprisal) about sensory inputs
    note: Friston — brains minimize F; this is equivalent to approximate Bayesian inference
  - field_a_term: partition function Z (sum over states)
    field_b_term: Bayesian model evidence (marginal likelihood) in brain inference
  - field_a_term: irreversibility (entropy production)
    field_b_term: the directionality and temporal binding of conscious experience
  - field_a_term: Maxwell's demon (information and thermodynamic work)
    field_b_term: selective attention as thermodynamic work done on sensory information

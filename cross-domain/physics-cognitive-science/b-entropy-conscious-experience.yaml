cross_pollination_opportunities:
  - >
    Perturbational complexity index (PCI; Casali et al. 2013) measures brain
    complexity by TMS-EEG perturbation response — currently the most clinically
    validated proxy for consciousness level (distinguishes vegetative state from
    locked-in syndrome). PCI is an empirical information-theoretic measure but
    was not derived from IIT or free energy principle. Connecting PCI to Φ
    computationally could ground IIT in clinical measurement.
  - >
    The Ising model of statistical mechanics on a graph has an exact Φ solution
    (Tegmark 2016). Studying which network topologies maximize Φ in the Ising model
    would give a physics-derived prediction for what neural circuit geometries
    should support high consciousness — testable against cortical connectome data.
communication_gap: >
  IIT is debated primarily among neuroscientists, philosophers of mind, and
  computational neuroscientists in specialist journals and workshops. Thermodynamicists
  and statistical physicists rarely engage with the consciousness literature.
  Friston's free energy principle is mathematically sophisticated (variational
  Bayes, Laplace approximations) and primarily read by theoretical neuroscientists
  who rarely connect it to thermodynamics. The hard problem of consciousness
  (why any physical process gives rise to subjective experience) means the empirical
  stakes of these formalisms are philosophically contested.

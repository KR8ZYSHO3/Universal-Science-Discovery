cross_pollination_opportunities:
  - "Magnon spintronics: magnons carry spin angular momentum without charge transport, enabling spin-wave based logic and communication in magnetic insulators (YIG) — exploiting the quantum field theory description to engineer magnon-polariton hybrid modes for microwave quantum computing."
  - "Magnon Bose-Einstein condensation: when magnons are excited by microwave pumping to densities exceeding the critical BEC density, they condense into the k=0 mode — a direct test of BEC theory in a solid-state system where the chemical potential and temperature are both tunable."
communication_gap: >
  Condensed matter physicists who work on magnons use spin-wave theory and
  Holstein-Primakoff bosons but the connection to Goldstone's theorem and
  quantum field theory of spontaneous symmetry breaking is often presented
  separately in high-energy physics curricula. The mathematical unity of phonons,
  magnons, and pions as Goldstone bosons is powerful but not standard in either
  condensed matter or particle physics textbooks.

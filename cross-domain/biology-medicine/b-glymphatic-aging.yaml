id: b-glymphatic-aging
title: >
  The glymphatic system — studied separately in sleep medicine, neurology, and
  geroscience — is a single cross-cutting mechanism linking sleep quality,
  amyloid clearance, and brain aging rate.
status: proposed
fields:
  - sleep-medicine
  - neurology
  - geroscience
  - fluid-dynamics
bridge_claim: >
  The glymphatic system (peri-arterial CSF influx driving interstitial waste
  efflux along paravascular spaces) is studied in three largely separate
  literatures: sleep medicine (it is most active during slow-wave sleep),
  neurology (its dysfunction correlates with amyloid-beta accumulation in
  Alzheimer's disease), and geroscience (glymphatic flow declines with age
  as AQP4 polarisation is lost on astrocyte endfeet). These communities share
  a single causal chain — poor sleep → impaired glymphatic flow → amyloid
  accumulation → neurotoxicity — but rarely cite each other. Fluid-dynamics
  modelling (hydraulic resistance, peristaltic pumping) offers quantitative
  bridges between the compartments that none of the three fields has yet
  incorporated as a routine tool.
translation_table:
  - field_a_term: slow-wave sleep duration (sleep medicine)
    field_b_term: glymphatic pulse amplitude (neurology)
    note: SWS drives the arterial pulsatility that pumps glymphatic flow
  - field_a_term: AQP4 polarisation (neurology)
    field_b_term: hydraulic conductivity of endfeet (fluid dynamics)
    note: AQP4 density on endfeet sets the water permeability driving clearance
  - field_a_term: amyloid-beta clearance rate (neurology)
    field_b_term: solute efflux velocity in perivascular space (fluid dynamics)
    note: Measurable output of glymphatic transport efficiency
  - field_a_term: biological age of brain (geroscience)
    field_b_term: cumulative amyloid burden index (neurology)
    note: Aging accelerates amyloid deposition partly through glymphatic decline
related_unknowns:
  - u-amyloid-progression-trajectory
related_hypotheses:
  - h-glymphatic-amyloid-clearance-rate
cross_pollination_opportunities:
  - Collaborative studies measuring sleep EEG alongside CSF flow MRI (PCMRI) in the same subjects across age decades
  - Fluid-dynamics models of perivascular hydraulics validated against MRI clearance rates, to predict optimal sleep architecture for AD prevention
  - Pharmacological targets (AQP4 modulators) discovered by fluid-dynamics simulation, trialled in sleep-intervention RCTs
  - Geroscience longevity interventions (caloric restriction, rapamycin) assessed for glymphatic preservation as mechanism
communication_gap: >
  Sleep medicine clinicians work in polysomnography labs; neurologists focus on
  amyloid PET and CSF biomarkers; geroscientists study hallmarks of aging in
  model organisms. Each community has its own conferences (SLEEP, Alzheimer's
  Association, Geroscience Summits) and rarely shares data formats, let alone
  quantitative models. Fluid-dynamics researchers are almost entirely absent
  from all three conference circuits.

id: b-acoustic-metamaterials-x-negative-refraction
title: >
  Acoustic Metamaterials x Negative Refraction — locally resonant structures as effective medium
status: proposed
fields:
  - physics
  - mathematics
  - materials-science
bridge_claim: >
  Acoustic metamaterials with locally resonant inclusions (rubber-coated lead spheres)
  exhibit simultaneously negative effective mass density and bulk modulus near resonance,
  producing negative refraction and sound focusing below the diffraction limit; the
  effective medium is described by Z-transform analogues of Maxwell's equations for
  acoustics.
translation_table:
  - field_a_term: Local resonance frequency ω₀ of inclusion
    field_b_term: Frequency at which effective mass density ρ_eff < 0
    note: >
      Below resonance, the inclusion moves in phase with the host; above resonance,
      it moves out of phase, producing negative effective inertia (ρ_eff < 0) —
      analogous to negative permittivity in electromagnetic metamaterials near
      plasma resonance.
  - field_a_term: Negative effective bulk modulus κ_eff < 0
    field_b_term: Monopole resonance of air-filled bubble inclusion
    note: >
      Air bubbles in water have monopole resonance (breathing mode) that produces
      negative effective compressibility in a frequency band — the acoustic analogue
      of negative magnetic permeability in electromagnetic split-ring resonators.
  - field_a_term: Double-negative band (ρ_eff < 0, κ_eff < 0)
    field_b_term: Negative acoustic refractive index
    note: >
      When both effective parameters are negative, the acoustic refractive index
      n = -√(ρ_eff κ_eff / ρ₀κ₀) is negative, causing Snell's law refraction with
      reversed sign — enabling flat acoustic lenses and cloaking.
  - field_a_term: Effective medium theory (long-wavelength limit)
    field_b_term: Homogenization of periodic inclusion composite
    note: >
      When the inclusion size a << wavelength λ, the composite is described by
      effective medium parameters ρ_eff(ω) and κ_eff(ω); this homogenization
      is the acoustic analogue of Clausius-Mossotti polarizability theory.
communication_gap: >
  Electromagnetic metamaterials (Veselago 1968, Pendry 2000) were developed 30 years
  before acoustic metamaterials (Liu 2000); physicists working on EM metamaterials
  and acoustic metamaterials used the same mathematical framework but in separate
  communities; the cross-community transfer of negative-index design principles
  accelerated acoustic metamaterial development by ~10 years when recognized.
cross_pollination_opportunities:
  - >
    Apply acoustic transformation acoustics (analogous to transformation optics)
    to design acoustic cloaks from space group symmetry-derived coordinate transformations
    — making submerged objects acoustically invisible.
  - >
    Use double-negative acoustic metamaterials for acoustic superlensing in medical
    ultrasound imaging — achieving resolution below the diffraction limit (λ/10)
    to image sub-millimeter biological structures.
  - >
    Import EM metamaterial design tools (transfer matrix method, FDTD simulation)
    directly into acoustic metamaterial design, since the governing equations have
    the same mathematical structure.

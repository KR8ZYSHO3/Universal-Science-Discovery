id: b-neutron-star-x-nuclear-matter
title: >
  Neutron Star x Nuclear Matter — dense stellar interiors as cold Fermi liquid
status: proposed
fields:
  - physics
  - chemistry
  - astrophysics
bridge_claim: >
  Neutron star interiors contain nuclear matter at densities exceeding nuclear
  saturation density (2×10^17 kg/m³); the equation of state is described by
  Landau Fermi liquid theory with strong nuclear interactions, and neutron star
  mass-radius measurements directly constrain nuclear symmetry energy — making
  neutron stars the largest nuclei in the universe.
translation_table:
  - field_a_term: Neutron star radius R (10-14 km)
    field_b_term: Equation of state (pressure vs. density) of dense nuclear matter
    note: >
      The TOV (Tolman-Oppenheimer-Volkoff) equation relates the mass-radius curve
      to the nuclear equation of state; stiffer EOS (higher pressure) → larger radius
      for a given mass.
  - field_a_term: Nuclear symmetry energy E_sym
    field_b_term: Difference in energy between pure neutron and symmetric nuclear matter
    note: >
      The symmetry energy slope parameter L determines neutron star radius and
      the neutron skin thickness of heavy nuclei; PREX-II (Pb skin) and NICER
      (neutron star radius) measurements provide complementary nuclear constraints.
  - field_a_term: Fermi liquid quasiparticle effective mass m*
    field_b_term: Neutron effective mass in dense neutron star matter
    note: >
      Landau Fermi liquid theory parametrizes nuclear matter via effective mass and
      Landau parameters; these determine neutron star specific heat, cooling rate,
      and superfluid gap.
  - field_a_term: Neutron superfluidity (paired neutrons, triplet p-wave)
    field_b_term: BCS Cooper pairing in dense fermionic matter
    note: >
      Neutrons in the neutron star inner crust pair in the ¹S₀ channel; in the
      core they form ³P₂ pairs; BCS theory applies at densities ρ ~ 2-5 ρ₀,
      producing neutron superfluidity that governs pulsar glitches.
communication_gap: >
  Nuclear physicists study finite nuclei in terrestrial experiments (PREX, CREX);
  astrophysicists study neutron stars as bulk matter; gravitational wave astronomy
  (LIGO GW170817 tidal deformability) and X-ray timing (NICER) now connect these
  communities by providing bulk EOS constraints from neutron star observations.
cross_pollination_opportunities:
  - >
    Use gravitational wave tidal deformability measurements (GW170817: Λ < 800) to
    constrain nuclear symmetry energy, connecting neutron star observations to
    heavy-ion collision physics at RHIC and LHC.
  - >
    Apply nuclear density functional theory (Skyrme/Gogny functionals) to predict
    neutron star mass-radius curves and compare to NICER measurements — testing
    nuclear models in the ultra-dense regime inaccessible in terrestrial experiments.
  - >
    Import dense matter phase diagram theory (quark-hadron transition) into neutron
    star interior structure — predicting whether quark matter cores exist in massive
    (2 solar mass) neutron stars.

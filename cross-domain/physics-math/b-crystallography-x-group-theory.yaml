id: b-crystallography-x-group-theory
title: >
  Crystallography x Group Theory — space groups as symmetry classification
status: proposed
fields:
  - physics
  - mathematics
  - condensed-matter-physics
bridge_claim: >
  All possible crystal structures are classified by the 230 space groups — subgroups
  of the Euclidean group in 3D; group representation theory predicts allowed phonon modes,
  electronic band degeneracies, and optical selection rules from symmetry alone, making
  group theory the complete predictive language of crystallography.
translation_table:
  - field_a_term: Crystal space group
    field_b_term: Subgroup of the Euclidean group E(3)
    note: >
      The 230 space groups are all distinct subgroups of E(3) (rotations, reflections,
      translations, screw axes, glide planes); Schoenflies and Hermann-Mauguin notation
      encodes the group generators.
  - field_a_term: Phonon modes at high-symmetry k-points
    field_b_term: Irreducible representations of the little group
    note: >
      The symmetry of phonon modes is determined by the irreducible representations
      of the little group (stabilizer of k-point under the space group); mode
      degeneracy equals representation dimension.
  - field_a_term: Optical selection rules
    field_b_term: Wigner-Eckart theorem for photon interaction
    note: >
      Raman-active and infrared-active modes are determined by whether the phonon
      representation appears in the decomposition of the photon-lattice interaction;
      group theory predicts this without calculating matrix elements.
  - field_a_term: Band degeneracy at high-symmetry points
    field_b_term: Dimension of electronic band representation
    note: >
      Multi-dimensional irreducible representations force band degeneracies; accidental
      degeneracies (band crossings) require fine-tuning unless protected by symmetry.
communication_gap: >
  Crystallographers enumerated the 230 space groups by exhaustive geometric arguments
  (Fedorov, Schoenflies, Barlow 1891) before abstract group theory was systematized;
  physicists applied representation theory to crystals (Bethe 1929, Wigner 1930) as
  a separate development; unified group-theoretic crystallography texts appeared only
  in the 1950s-60s.
cross_pollination_opportunities:
  - >
    Apply topological quantum chemistry (band representation theory) to all 230 space
    groups to systematically predict which materials are topological insulators or
    semimetals from symmetry alone.
  - >
    Use magnetic space groups (1651 Shubnikov groups including time-reversal) to
    classify magnetic topological materials — an active frontier with thousands of
    candidate materials.
  - >
    Import crystallographic group theory into metamaterial design: periodic acoustic,
    electromagnetic, or mechanical structures inherit the same 230 symmetry classes,
    predicting topologically protected modes.

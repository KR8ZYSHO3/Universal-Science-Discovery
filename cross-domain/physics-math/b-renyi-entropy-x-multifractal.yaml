id: b-renyi-entropy-x-multifractal
title: >
  Renyi entropy x Multifractal spectra - generalized entropy as scaling exponent
status: proposed
fields:
  - mathematics
  - physics
  - information_theory
  - dynamical_systems
bridge_claim: >
  The Renyi entropy of order q, H_q = (1/(1-q)) log sum_i p_i^q, generates the full
  multifractal spectrum f(alpha) via Legendre transform tau(q) -> f(alpha); turbulent
  velocity fields, strange attractors, and financial return distributions are all
  multifractals whose scaling spectrum is computed from q-order Renyi entropies — unifying
  information theory, fractal geometry, and statistical physics through a single parametric
  family of generalized entropies.
translation_table:
  - field_a_term: Renyi entropy H_q of order q (information theory)
    field_b_term: mass exponent tau(q) in multifractal formalism (physics/mathematics)
    note: The Renyi entropy generates the mass exponent tau(q) = (q-1) H_q; the full spectrum f(alpha) follows by Legendre transform
  - field_a_term: Shannon entropy H_1 = -sum p_i log p_i (q=1 limit) (information theory)
    field_b_term: information dimension D_1 of a fractal set (fractal geometry)
    note: The q=1 Renyi entropy equals the information dimension; q=0 gives box-counting dimension D_0, q=2 gives correlation dimension D_2
  - field_a_term: q-deformed statistics / Tsallis entropy (nonextensive stat mech)
    field_b_term: multifractal measure with Holder exponent alpha (mathematics)
    note: Tsallis entropy is Renyi entropy with different normalization; both parametrize the multifractal spectrum at fixed q
  - field_a_term: turbulent energy cascade intermittency (fluid mechanics)
    field_b_term: non-uniform measure on strange attractor / multifractal measure (dynamical systems)
    note: Turbulent velocity increments are multifractal; the spectrum f(alpha) measured via Renyi entropy quantifies intermittency
communication_gap: >
  Information theorists developing generalized entropies (Renyi 1961) and physicists
  studying fractal geometry and chaotic attractors (Mandelbrot, Grassberger, Procaccia —
  1980s) developed parallel mathematical frameworks; the synthesis in the multifractal
  formalism (Halsey et al. 1986) revealed the Legendre transform connection, but finance
  (multifractal models of asset returns) and genomics (fractal analysis of DNA sequences)
  rarely cite the Renyi entropy literature.
cross_pollination_opportunities:
  - Apply Renyi entropy multifractal analysis to neural spike train data to distinguish healthy from pathological brain states based on the width of the singularity spectrum f(alpha)
  - Use multifractal formalism from turbulence physics to characterize financial market microstructure, predicting crash risk from narrowing of the f(alpha) spectrum

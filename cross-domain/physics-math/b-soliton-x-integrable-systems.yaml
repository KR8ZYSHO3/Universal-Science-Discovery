id: b-soliton-x-integrable-systems
title: Solitons ↔ Integrable systems — exact N-soliton solutions via inverse scattering
status: proposed
fields:
- physics
- mathematics
bridge_claim: The Korteweg-de Vries equation supports N-soliton solutions that pass through each other unchanged, arising
  because KdV is a completely integrable Hamiltonian system with infinitely many conserved quantities; the inverse scattering
  transform (IST) is the nonlinear analogue of Fourier transform for these equations.
translation_table:
- field_a_term: soliton (stable localised wave that preserves shape after collision)
  field_b_term: eigenvalue of Lax pair Schrödinger operator (integrable systems)
  note: Each soliton corresponds to a discrete eigenvalue of the associated linear scattering problem
- field_a_term: inverse scattering transform (IST) for KdV
  field_b_term: nonlinear Fourier transform decomposing initial data into solitons + radiation
  note: IST exactly solves KdV initial value problem; solitons = discrete spectrum, radiation = continuous spectrum
- field_a_term: infinitely many conservation laws of KdV (I_n = ∫ P_n(u, u_x, ...) dx)
  field_b_term: action variables in completely integrable Hamiltonian system
  note: Conservation laws are in involution under Poisson bracket — complete integrability by Arnold-Liouville theorem
- field_a_term: soliton elastic collision (phase shift only, no energy exchange)
  field_b_term: commuting Hamiltonian flows preserving action variables
  note: Elastic collision is the physical manifestation of mathematical integrability
cross_pollination_opportunities:
- Apply inverse scattering transform to analyse optical solitons in nonlinear fibre optics — the nonlinear Schrödinger equation
  (NLS) is integrable and supports optical solitons used in long-distance telecommunications.
- Use soliton theory to model protein folding dynamics — intrinsic localised modes (ILMs) in one-dimensional protein chains
  may be described by discrete nonlinear Schrödinger equations with soliton solutions.
communication_gap: Solitons were discovered numerically by Zabusky & Kruskal (1965) in a plasma physics context; the inverse
  scattering transform was developed by Gardner, Greene, Kruskal & Miura (1967) in applied mathematics. Pure mathematicians
  studying completely integrable systems (Lax, Zakharov, Shabat) developed the algebraic theory in the 1970s. These three
  communities (plasma physics, applied mathematics, pure mathematics) rarely cited each other's work despite studying identical
  mathematical structures.

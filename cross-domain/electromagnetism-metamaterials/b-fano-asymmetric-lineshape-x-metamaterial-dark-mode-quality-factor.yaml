cross_pollination_opportunities:
  - Apply Fano fitting libraries from plasmonics to GHz metamaterial resonators used as WPT repeaters.
  - Transfer quasi-normal mode expansions from gravitational-wave ringdown lore to electromagnetic quasi-bound states (pedagogical analogy only).
communication_gap: >
  Atomic physics curricula emphasize Fano in photoionization; antenna engineers speak S-parameter poles and zeros —
  vocabulary differs though rational-function shapes coincide.

  - Compare Floquet band engineering with phononic time crystals for shared modulation mathematics (pedagogical caution).
communication_gap: >
  Photonics papers emphasize isolation ratios at λ; microwave commutated lines emphasize switch Ron/Coff — unified benchmarking
  vocabulary sparse across bands.

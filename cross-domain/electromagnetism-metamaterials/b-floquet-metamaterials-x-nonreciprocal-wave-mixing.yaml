id: b-floquet-metamaterials-x-nonreciprocal-wave-mixing
title: >
  Space-time modulated metamaterials use Floquet sideband coupling to implement effective nonreciprocal
  wave transport without static magnetic bias.
status: proposed
fields:
  - electromagnetism
  - metamaterials
  - microwave-engineering
  - wave-physics
bridge_claim: >
  Periodic temporal modulation in metasurfaces couples harmonics asymmetrically in momentum-frequency
  space, enabling direction-dependent conversion and isolation-like behavior. This bridges Floquet
  operator theory and RF nonreciprocal component design under practical passivity and loss constraints.
translation_table:
  - field_a_term: Floquet harmonic coupling matrix
    field_b_term: sideband conversion network for isolator-like response
    note: Nonreciprocal transfer appears through asymmetric mode conversion pathways.
  - field_a_term: modulation phase velocity and momentum bias
    field_b_term: synthetic traveling-wave bias replacing ferrite magnets
    note: Bias is programmable through modulation waveform parameters.
  - field_a_term: quasienergy band engineering
    field_b_term: frequency conversion selectivity and insertion-loss tradeoff
    note: Practical isolation depends on balancing conversion efficiency with dissipative loss.
related_unknowns:
  - u-floquet-metamaterial-nonreciprocity-passivity-limit
related_hypotheses:
  - h-floquet-metasurface-achieves-isolation-without-magnets-under-passive-bias
cross_pollination_opportunities:
  - Apply control-oriented robust design to modulation waveform synthesis under fabrication tolerances.
  - Transfer microwave network synthesis metrics into Floquet metamaterial reporting.
communication_gap: >
  Floquet analyses often report idealized mode coupling, whereas engineering reports emphasize insertion
  loss and linearity; unified passivity-aware benchmarks remain immature.
references:
  - doi: "10.1126/science.1210713"
    note: "Yu et al. (2011), phase-discontinuity metasurface control; foundational for engineered wavefront biasing."
last_reviewed: "2026-05-08"

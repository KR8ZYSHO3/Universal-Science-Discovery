id: b-bound-states-continuum-x-dielectric-metasurface-q
title: >
  Bound states in the continuum (BIC) theory explains ultra-high-Q dielectric metasurface resonances
  and their sensitivity to fabrication disorder.
status: proposed
fields:
  - photonics
  - metamaterials
  - electromagnetism
  - materials-science
bridge_claim: >
  Symmetry-protected and accidental BIC concepts predict when radiative channels decouple, creating
  quasi-BIC resonances with very high quality factors in dielectric metasurfaces. This bridges
  scattering-matrix singularity theory to practical sensor and filter design limits under disorder.
translation_table:
  - field_a_term: BIC symmetry protection
    field_b_term: suppressed radiation loss and enhanced Q
    note: Small symmetry breaking turns ideal BIC into tunable quasi-BIC resonances.
  - field_a_term: coupling coefficient to continuum channels
    field_b_term: linewidth control in metasurface resonators
    note: Fabrication asymmetry sets residual radiative leakage floor.
  - field_a_term: modal overlap and perturbation theory
    field_b_term: sensitivity-yield tradeoff in nanofabricated devices
    note: Higher Q increases sensitivity but tightens tolerance requirements.
related_unknowns:
  - u-bic-metasurface-q-factor-radiative-disorder-limit
related_hypotheses:
  - h-bic-protected-metasurfaces-maintain-high-q-under-fabrication-noise
cross_pollination_opportunities:
  - Use uncertainty quantification from manufacturing science to predict Q-yield distributions pre-fabrication.
  - Import robust design margins from RF filter synthesis into nanophotonic BIC device workflows.
communication_gap: >
  BIC theory papers often emphasize idealized infinite periodic structures, while engineering teams face
  finite-size, roughness, and process-variation constraints.
references:
  - doi: "10.1038/s41566-018-0314-4"
    note: "Review and perspective on BIC-enabled nanophotonic and metasurface resonances."
last_reviewed: "2026-05-08"

    note: "Liberal & Engheta (2016) — epsilon-near-zero optoelectronics (Nat. Photon.)."
  - doi: "10.1103/PhysRevLett.102.113901"
    note: "Edwards, Silveirinha & Engheta (2009) — tunneling with epsilon-near-zero materials (Phys. Rev. Lett.)."

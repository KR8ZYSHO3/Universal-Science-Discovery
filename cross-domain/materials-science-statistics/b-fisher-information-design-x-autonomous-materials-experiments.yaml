id: b-fisher-information-design-x-autonomous-materials-experiments
title: Fisher-information design connects statistical efficiency bounds to autonomous
  materials-experiment scheduling.
status: proposed
fields:
- materials-science
- statistics
- experimental-design
- automation
bridge_claim: Autonomous labs choose the next experiment under budget constraints;
  Fisher-information criteria convert that choice into a measurable precision objective
  and make exploration policies auditable.
translation_table:
- field_a_term: Design matrix sensitivity
  field_b_term: Instrument setting perturbation response
  note: Determines expected parameter precision gain.
- field_a_term: Cramer-Rao bound
  field_b_term: Best-case composition estimate variance
  note: Lower bound for feasible uncertainty.
- field_a_term: D-optimal objective
  field_b_term: Batch experiment utility score
  note: Supports compute-constrained ranking.
related_unknowns:
- u-fisher-optimal-experiment-policy-shift-drift
related_hypotheses:
- h-information-optimal-batching-accelerates-material-discovery
cross_pollination_opportunities:
- Build shared benchmark datasets with identical uncertainty-reporting protocols across
  both domains.
- Compare baseline domain-specific workflows against explicitly transferred methods
  under matched compute budgets.
communication_gap: Adjacent communities use different software stacks and validation
  norms, so mathematically equivalent tools are often rediscovered in parallel.
references:
- doi: 10.1098/rsta.1922.0009
  note: Fisher (1922) estimation and information.
- doi: 10.1017/S0962492910000061

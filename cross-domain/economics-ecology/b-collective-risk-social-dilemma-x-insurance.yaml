id: b-collective-risk-social-dilemma-x-insurance
title: Collective-risk dilemmas in evolutionary game theory — groups stochastically lose resources
  unless enough members contribute — mirror insurance and risk-pooling institutions in economics.
status: established
fields:
- economics
- evolutionary-biology
- game-theory
- social-science
bridge_claim: 'Evolutionary models of collective risk study cooperation under stochastic group
  loss: if total contributions fall below a threshold, everyone suffers with some probability.
  This resembles insurance contracts where premiums fund a pool that pays out after correlated
  shocks. Both settings feature nonlinear incentives: marginal contributions have discontinuous
  value near the threshold. The bridge connects mechanism design (premiums, mandates) with
  evolutionary stability of strategies under demographic noise. It clarifies when voluntary
  cooperation collapses and when institutions mimic artificial selection for prosocial norms.'
translation_table:
- field_a_term: group loss probability
  field_b_term: insured catastrophic event probability
- field_a_term: cooperator contribution
  field_b_term: premium payment / effort to maintain pool
- field_a_term: evolutionarily stable strategy
  field_b_term: Nash equilibrium under institutional rules

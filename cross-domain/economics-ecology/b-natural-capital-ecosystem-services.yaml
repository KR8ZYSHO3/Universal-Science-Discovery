id: b-natural-capital-ecosystem-services
title: >
  Ecosystem services (pollination, water purification, carbon sequestration,
  flood control) are natural capital whose economic value ($33–125 trillion/year)
  is systematically excluded from market prices — a Pigouvian externality that
  requires carbon/biodiversity credits or national natural capital accounting
  (UN SEEA) to internalize into welfare-maximizing decisions.
status: established
fields:
  - economics
  - ecology
  - environmental-science
  - policy
  - natural-capital-accounting
bridge_claim: >
  Ecology produces "services" — quantifiable flows of benefit to human welfare —
  that are economically analogous to any other factor of production (labor,
  physical capital). Costanza et al. (1997) estimated the global value of 17
  ecosystem service categories at $33 trillion/year (revised to $125 trillion/year
  in 2014 using updated biomes). This exceeds global GDP (~$80T), establishing
  nature as the dominant capital stock in the global economy.

  The total economic value (TEV) framework decomposes ecosystem value:
  TEV = Direct use value (fisheries, timber, recreation) + Indirect use value
  (water filtration, flood protection, pollination) + Option value (future use)
  + Existence value (biodiversity intrinsically valued even without use).
  Estimating these requires revealed preference methods (hedonic pricing, travel
  cost) and stated preference methods (contingent valuation, choice experiments).

  Hedonic pricing example: Costanza et al. (1997) estimated that wetlands
  adjacent to urban areas provide flood protection worth $1,574–14,785/ha/year
  by comparing real estate prices in flood-prone vs. protected areas (Bockstael
  et al. 1989). This is a revealed-preference estimate of the willingness-to-pay
  for flood protection — a Pigouvian externality valuation.

  The market failure is a textbook Pigouvian externality: land conversion destroys
  ecosystem services whose value accrues to society (non-rival, non-excludable)
  rather than the landowner. The optimal Pigouvian subsidy for conservation equals
  the marginal ecosystem service value destroyed by conversion — equating private
  and social costs. Payment for ecosystem services (PES) schemes (Costa Rica's
  FONAFIFO, UN-REDD+) implement this directly.

  Dasgupta (2021) — The Economics of Biodiversity (UK HM Treasury review) —
  extends this to biodiversity as a stock of natural capital subject to depletion.
  Just as running down a financial capital stock is unsustainable, running down
  biodiversity capital destroys the productive capacity of natural systems.
  The UN System of Environmental-Economic Accounting (SEEA) integrates ecosystem
  extent and condition accounts with national GDP accounts.
translation_table:
  - field_a_term: ecosystem services (pollination, water filtration)
    field_b_term: factor inputs in production function Y = f(K, L, N)
    note: Natural capital N is a third factor of production alongside physical (K) and human (L) capital
  - field_a_term: ecosystem service value (willingness-to-pay)
    field_b_term: shadow price of non-market goods
    note: Estimated via hedonic pricing, travel cost, or contingent valuation methods
  - field_a_term: habitat destruction externality
    field_b_term: Pigouvian externality — private benefit exceeds social benefit
    note: "Optimal policy: Pigouvian tax on conversion = marginal ecosystem service value"
  - field_a_term: biodiversity as natural capital stock
    field_b_term: capital stock K in neoclassical growth model
    note: Depletion below minimum viable population is analogous to running down capital to zero
  - field_a_term: Payment for Ecosystem Services (PES)
    field_b_term: Pigouvian subsidy to align private and social returns
    note: PES pays landowners the externality value they forgo by not converting habitat
  - field_a_term: UN SEEA ecosystem accounts
    field_b_term: balance sheet entry for natural capital (alongside financial and physical capital)
    note: Extends SNA (System of National Accounts) to include ecosystem assets

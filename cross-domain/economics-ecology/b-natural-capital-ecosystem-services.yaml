cross_pollination_opportunities:
  - >
    Machine learning for ecosystem service mapping: satellite remote sensing
    (NDVI, land cover classification) combined with species distribution models
    can spatially map ecosystem service values at global scale — enabling
    spatially explicit Pigouvian tax design. InVEST (Natural Capital Project)
    implements this; connecting ML, ecology, and environmental economics.
  - >
    Carbon markets as ecosystem service markets: voluntary carbon credits for
    forest conservation (REDD+) are essentially PES for carbon sequestration.
    The design of these markets (verification, additionality, permanence) imports
    mechanism design theory (Roth, Weitzman) into conservation biology.
communication_gap: >
  Costanza et al. (1997) in Nature sparked controversy partly because economists
  objected to valuing non-market goods and ecologists objected to reducing
  biodiversity to dollar values. This disciplinary discomfort has slowed adoption
  of natural capital accounting despite the mathematical consistency of the approach
  with standard welfare economics. Environmental economics journals (Journal of
  Environmental Economics and Management) and ecology journals (Ecological
  Applications) rarely cite each other despite working on the same empirical problems.
last_reviewed: "2026-05-06"

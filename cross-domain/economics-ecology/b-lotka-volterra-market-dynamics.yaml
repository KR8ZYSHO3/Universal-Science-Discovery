cross_pollination_opportunities:
  - >
    Estimate LV parameters (α, β, γ, δ) from real market-share and revenue
    time series (e.g. smartphone OS market 2007-2020: iOS as disruptor,
    BlackBerry/Nokia as prey). Test whether the oscillation period and
    amplitude match LV predictions without parameter fitting beyond initial
    conditions.
  - >
    Use the May (1972) complexity-stability result (random GLV systems become
    unstable above a critical diversity × interaction-strength product) to
    predict when industry ecosystems are fragile to contagion — a systemic
    risk indicator analogous to ecological collapse thresholds.
  - >
    Agent-based financial models (Farmer & Foley style) calibrated with
    ecological stability criteria could provide early-warning indicators of
    market crashes, complementing existing VaR and systemic-risk metrics.
communication_gap: >
  Economics textbooks treat competition with static equilibrium models
  (Cournot, Nash equilibrium); ecology uses dynamic differential-equation
  models. Econophysics (Farmer, Bouchaud, Mantegna) has imported LV dynamics
  into finance, but mainstream industrial economics and strategy research
  (Porter's tradition) rarely cites ecological dynamics literature. Biologists
  and economists do not typically co-author; the bridge runs almost entirely
  through the interdisciplinary complexity-economics community at SFI.

id: b-philosophy-underdetermination-quantum
title: >
  The quantum measurement problem and the philosophical underdetermination of theory
  by evidence share the same mathematical structure: in both cases, a superposition
  of possibilities collapses to a definite outcome only through an observer-dependent
  selection process whose physical basis is unspecified.
status: proposed
fields:
  - philosophy-of-science
  - quantum-mechanics
  - epistemology
  - foundations-of-physics
bridge_claim: >
  The underdetermination problem in philosophy of science (Quine-Duhem): any
  observation O is consistent with infinitely many theories T1, T2, ..., because
  any Ti can be protected by adjusting auxiliary hypotheses. The selection of a
  unique theory from the space of empirically equivalent theories requires non-
  evidential criteria (simplicity, parsimony, coherence).

  The quantum measurement problem: before measurement, a quantum system exists in
  superposition |ψ⟩ = Σ αi|i⟩—a sum over all possible outcomes. Measurement
  collapses this to a unique outcome |j⟩ with probability |αj|². The collapse
  process is not described by Schrödinger's equation and requires a physical account
  of what constitutes "measurement" and "observer."

  The structural identity:
  Pre-measurement quantum state = theoretical underdetermination:
    multiple simultaneously valid descriptions exist
  Collapse/measurement = theory selection:
    a unique description is imposed by the observation process
  Observer in quantum mechanics = theorist in epistemology:
    both select among equivalent possibilities using criteria not reducible to
    the object of study (wave function / observation set)
  Copenhagen interpretation = strong underdetermination:
    "there is no fact of the matter" about the unmeasured value
  Many-Worlds interpretation = anti-underdetermination:
    all branches are real; no collapse required; observer is part of the wavefunction

  Non-trivial consequence: the debates within quantum foundations (Copenhagen vs.
  Many-Worlds vs. Pilot Wave vs. QBism) map precisely onto the debates in philosophy
  of science (anti-realism vs. scientific realism vs. structural realism). The
  philosophical literature on underdetermination provides formal tools—empirical
  equivalence classes, individuation of theories, degrees of confirmation—that
  quantum foundations debates have not fully exploited, and conversely, quantum
  no-go theorems (Bell, Kochen-Specker, PBR) provide empirical constraints on
  the space of observer-independent interpretations that the philosophical
  literature has not fully absorbed.
translation_table:
  - field_a_term: Underdetermination of theory by evidence
    field_b_term: Quantum superposition (multiple simultaneous descriptions)
  - field_a_term: Theory selection (non-evidential criteria)
    field_b_term: Measurement/collapse (outcome selection)
  - field_a_term: Anti-realism (no fact beyond empirical adequacy)
    field_b_term: Copenhagen interpretation (no value before measurement)
  - field_a_term: Scientific realism (theories true beyond phenomena)
    field_b_term: Pilot wave / hidden variable interpretations (definite state always)
  - field_a_term: Many theories equally empirically adequate
    field_b_term: Many-Worlds (all branches equally real)
  - field_a_term: Theoretical virtues (simplicity, parsimony)
    field_b_term: Interpretive criteria (ontological parsimony in Many-Worlds; non-locality cost in Pilot Wave)
related_unknowns:
  - u-demarcation-problem
  - u-underdetermination-theory
  - u-scientific-realism-debate
cross_pollination_opportunities:
  - >
    Bell's theorem and its experimental tests constrain the space of local hidden-variable
    theories (Pilot Wave requires non-locality). This is the most powerful empirical
    constraint on interpretations of quantum mechanics and provides a template for
    how philosophical underdetermination disputes can sometimes be empirically narrowed
    even when they cannot be eliminated.
  - >
    QBism (quantum Bayesianism) explicitly treats the wavefunction as an agent's
    degree-of-belief representation, not an objective physical entity. This is the
    strongest quantum-physical instantiation of Bayesian epistemology in philosophy
    of science. The QBism program has not been fully evaluated against the Bayesian
    epistemology literature that it implicitly adopts.
  - >
    The Pusey-Barrett-Rudolph (PBR) theorem (2012) shows that the quantum state
    cannot be merely epistemic (a representation of knowledge) under minimal
    assumptions about preparation independence. This is an empirical constraint
    directly relevant to the underdetermination debate: it narrows which philosophical
    positions are consistent with quantum mechanics.
communication_gap: >
  Quantum physicists and philosophers of science attend different conferences, publish
  in different journals, and use different formalisms. The quantum foundations community
  is aware of philosophical parallels but often dismisses them as "mere interpretation"
  without practical consequence. Philosophy of science rarely engages with the technical
  quantum no-go theorems (PBR, Bell, Kochen-Specker) as evidence in the underdetermination
  debate. The bridge requires both technical quantum formalism literacy from philosophers
  and engagement with formal epistemology from physicists.

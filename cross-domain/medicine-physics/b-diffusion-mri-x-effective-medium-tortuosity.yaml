id: b-diffusion-mri-x-effective-medium-tortuosity
title: >
  Diffusion MRI and effective-medium physics meet in tortuosity models: water diffusion in tissue is treated as transport through a heterogeneous, restricted medium whose apparent diffusion encodes geometry, barriers, and compartment exchange.
status: established
fields:
  - medicine
  - physics
  - biophysics
bridge_claim: >
  The bridge maps MRI-derived apparent diffusion to effective transport parameters, but it is not a direct microscope of tissue microstructure. Identifiability depends on acquisition protocol, model assumptions, and validation against phantoms or histology.
translation_table:
  - field_a_term: apparent diffusion coefficient or diffusion tensor
    field_b_term: effective diffusivity in heterogeneous media
    note: Both summarize transport.
  - field_a_term: restricted diffusion in axons or pores
    field_b_term: tortuosity and obstacle geometry
    note: Geometry is inferred indirectly.
  - field_a_term: multi-shell acquisition
    field_b_term: length-scale-dependent transport probe
    note: Protocol choice affects identifiability.
communication_gap: >
  Clinicians read diffusion metrics as imaging biomarkers, while physicists emphasize inverse-problem nonuniqueness and effective-medium assumptions.
cross_pollination_opportunities:
  - Use porous-media phantoms with known tortuosity to benchmark diffusion-MRI model identifiability.
  - Import effective-medium uncertainty bounds into clinical diffusion biomarker reports.
related_unknowns:
  - u-dmri-tortuosity-effective-medium-identifiability
related_hypotheses:
  - h-multi-shell-dmri-estimates-track-phantom-tortuosity
references:
  - doi: "10.1016/S0006-3495(94)80775-1"
    note: Basser, Mattiello and LeBihan (1994) diffusion tensor MRI framework.
last_reviewed: "2026-05-07"

cross_pollination_opportunities:
  - >
    Monte Carlo track structure codes (Geant4-DNA, TOPAS-nBio) simulate
    particle tracks at the nanometre scale and predict DNA strand break
    spectra from first principles via Bethe-Bloch + molecular interaction
    cross-sections. Validating these codes against measured DNA damage
    spectra from heavy-ion irradiation would create a fully ab initio
    chain from particle physics to radiobiology, eliminating the need for
    empirical RBE fitting in treatment planning.
  - >
    Microdosimetry (measurement of stochastic energy deposition in
    small target volumes, typically cell nuclei) provides experimental
    data that bridge Bethe-Bloch macroscopic LET and the microscopic
    DNA damage statistics. Importing the formalism of shot noise and
    Poisson statistics from signal processing would give a rigorous
    statistical treatment of the hit-probability distributions that
    underlie TCP models.
  - >
    The oxygen enhancement ratio (OER) — hypoxic tumours are ~3× more
    radiation resistant — has a track-structure explanation: high-LET
    radiation induces unrepairable clustered lesions independent of oxygen.
    An ab initio model linking oxygen partial pressure, free radical
    chemistry, and DNA repair kinetics to LET-dependent OER would resolve
    a long-standing clinical problem and is achievable with existing
    computational tools.
communication_gap: >
  The Bethe-Bloch formula is a standard result of quantum electrodynamics
  and nuclear physics, taught in particle physics courses. Radiation
  biologists who study DNA damage and cell survival typically have little
  training in particle physics and use LET as an empirical parameter
  rather than deriving it from Bethe-Bloch. Radiation oncologists use
  clinical models (LQ, TCP, NTCP) with no exposure to the underlying
  track-structure physics. Conversely, physicists developing next-
  generation particle therapy accelerators rarely engage with the
  molecular radiobiology literature. The chain from QED to clinical
  outcome exists but is rarely traversed as a whole.

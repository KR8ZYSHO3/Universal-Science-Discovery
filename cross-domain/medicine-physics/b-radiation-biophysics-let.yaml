id: b-radiation-biophysics-let
title: >
  The biological effectiveness of ionising radiation — from DNA strand
  break probability to tumour control — is quantitatively predicted by
  the Bethe-Bloch stopping power formula: the linear energy transfer (LET)
  framework bridges quantum electrodynamics track structure to radiobiological
  effectiveness (RBE) and clinical tumour control probability (TCP) in
  proton and heavy-ion cancer therapy.
status: established
fields:
  - medical-physics
  - radiation-biology
  - oncology
  - nuclear-physics
  - quantum-electrodynamics
bridge_claim: >
  The Bethe-Bloch formula (Bethe 1930, Bloch 1933) gives the mean energy
  loss per unit path length for a charged particle traversing matter:
    -dE/dx = (4πe⁴z²N_A Z)/(m_e v² A) × [ln(2m_e v²/I) - ln(1-β²) - β²]
  where z is the projectile charge, v its velocity, Z/A the atomic
  number/mass ratio of the absorber, I the mean excitation energy, and
  β = v/c. This quantity — linear energy transfer (LET = -dE/dx in
  keV/μm) — directly predicts biological outcome:

  1. BRAGG PEAK AND DOSE LOCALISATION: For protons and heavy ions,
     the LET increases dramatically near the end of the particle range
     (the Bragg peak), reaching a maximum just before the particle stops.
     This is a direct consequence of the 1/v² term in Bethe-Bloch: slower
     particles deposit more energy per unit length. The Bragg peak allows
     proton therapy to deliver maximum dose to the tumour while sparing
     surrounding healthy tissue — a physics-derived advantage over
     conventional X-ray therapy.

  2. LET VS. RBE CURVE: Relative biological effectiveness (RBE) is the
     ratio of X-ray dose to test-radiation dose required to produce the
     same biological effect. RBE peaks at LET ≈ 100-200 keV/μm (heavy
     ions, alpha particles) and decreases at higher LET. This non-monotonic
     curve arises from track structure: at high LET, ionisations become
     so dense that "wasted" energy accumulates (overkill effect). The
     Kellerer-Rossi dual radiation action (TDRA) model (1972) predicts
     the RBE-LET relationship from the spatial distribution of energy
     deposition events — a direct link between Bethe-Bloch track structure
     and cell survival.

  3. DNA STRAND BREAKS: Ionising radiation causes single-strand breaks
     (SSBs) and double-strand breaks (DSBs) in DNA. DSBs are the primary
     lethal lesions. High-LET radiation produces clustered lesions (multiple
     DSBs within a few nanometres), which are much harder for DNA repair
     machinery to fix than isolated SSBs. The cluster density is predicted
     from the radial dose distribution around the particle track (delta rays),
     which follows from Bethe-Bloch extended to secondary electron production.

  4. LINEAR-QUADRATIC MODEL AND TCP: The linear-quadratic (LQ) model of
     cell survival is: S = exp(-αD - βD²), where D is dose and α, β are
     tissue-specific parameters. The α/β ratio determines the sensitivity
     to dose fractionation. For high-LET radiation, β → 0 (purely linear
     killing) — the non-repairable DSBs dominate. The tumour control
     probability TCP = (1 - S)^N (for N tumour clonogens) connects the
     LQ cell-level model to the clinical outcome. Bethe-Bloch → LET →
     RBE → LQ parameters → TCP is a complete quantitative chain from
     particle physics to clinical oncology.

  5. NTCP AND NORMAL TISSUE SPARING: The normal tissue complication
     probability NTCP is modelled by the Lyman-Kutcher-Burman model or
     its successors, parametrised by the dose-volume histogram (DVH).
     The DVH advantage of proton therapy (sharper dose falloff = lower
     integral dose to healthy tissue) is a direct consequence of the
     Bragg peak in the Bethe-Bloch formula. Optimising proton treatment
     plans is a physics-constrained optimisation problem on the Bethe-
     Bloch solution space.

  CLINICAL IMPACT: Proton therapy (≥100 clinical centres worldwide) and
  carbon-ion therapy exploit this physics. The "proton advantage" for
  paediatric tumours (reduced risk of secondary cancers) is quantitatively
  predicted by integrating the Bethe-Bloch energy-deposition profile over
  the treated volume.

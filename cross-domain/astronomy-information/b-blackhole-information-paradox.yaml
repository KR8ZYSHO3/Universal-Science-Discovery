cross_pollination_opportunities:
  - >
    Quantum computing researchers studying approximate quantum error-correcting codes
    can directly constrain the decoding complexity of Hawking radiation; bounds on
    decoding time translate to bounds on the scrambling time and the Page time.
  - >
    Out-of-time-order correlator (OTOC) measurements in quantum many-body systems
    probe quantum chaos and scrambling — the same quantities that characterize black
    hole information processing. Table-top quantum simulators (trapped ions, superconducting
    qubits) can test Hayden-Preskill decoding protocols.
  - >
    The island formula predicts a specific Page curve shape that could in principle
    be tested in analog black hole systems (sonic black holes in Bose-Einstein
    condensates, optical analogs) where entanglement entropy of "Hawking" phonons
    is measurable.
communication_gap: >
  The astrophysics literature treats black hole thermodynamics as a property of
  spacetime geometry. The quantum information literature treats the information
  paradox as a problem in quantum channel theory. Despite Susskind's "black hole
  wars" bridging efforts and the 2019 island formula breakthrough, most astrophysicists
  remain unaware of quantum error correction results that directly constrain black
  hole microphysics, and most quantum information theorists are unaware that the
  black hole geometry imposes specific constraints on decoding complexity.

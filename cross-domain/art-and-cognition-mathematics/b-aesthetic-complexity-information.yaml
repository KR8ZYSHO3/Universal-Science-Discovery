cross_pollination_opportunities:
  - >
    Apply lossless compression algorithms (DEFLATE, bzip2) as objective
    aesthetic complexity meters: compute K(x) ≈ compressed size for artworks
    and test whether compression ratio predicts aesthetic preference ratings
    across genres, subjects, and cultures. This would make Schmidhuber's
    theory empirically operational.
  - >
    Use fractal dimension measurement (box-counting D) as an objective
    authentication tool for abstract expressionist art: Taylor et al. (1999)
    showed Pollock's D trajectory is unique. Extend to other artists to build
    a complexity-based art authentication database.
  - >
    Apply the musical Shannon entropy analysis to algorithmic composition:
    generate music by targeting specific entropy profiles and test whether
    human listeners rate entropy-optimised compositions comparably to human-
    composed music in the same H range.
  - >
    Use the predictive coding framework to explain cultural differences in
    aesthetic preference: populations with different natural environment
    statistics (tropical vs. arctic, urban vs. rural) should have shifted
    aesthetic sweet spots — a testable prediction from the calibration
    hypothesis.

communication_gap: >
  Birkhoff published in aesthetics (Harvard University Press, 1933);
  Kolmogorov published in information theory (Problems of Information
  Transmission, 1965); Taylor et al. published in Nature (1999);
  Schmidhuber published in IEEE Transactions (2010); Huron published in
  music cognition (MIT Press, 2006). Each community developed the same
  core idea — intermediate complexity maximises aesthetic response —
  independently and without systematic cross-citation. Aesthetics and
  information theory have not been bridged because aesthetics has lacked
  quantitative methods and information theory has lacked access to
  aesthetic response data. The fractal work (Taylor et al.) is the most
  widely cited bridge but is still absent from standard art theory curricula.


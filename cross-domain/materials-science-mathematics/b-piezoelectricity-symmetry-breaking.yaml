cross_pollination_opportunities:
  - "Machine learning for piezoelectric discovery: crystal structure prediction combined with group-theory filtering (select only non-centrosymmetric structures) creates a narrowed search space for high-d_ijk materials in the ICSD database."
  - "2D piezoelectrics: monolayer MoS₂ and hBN lack both inversion and mirror symmetry in certain stacking configurations, making them piezoelectric — group theory prediction of which 2D space groups support piezoelectricity guides the search for ultrathin MEMS actuators."
communication_gap: >
  Materials scientists and device engineers work with piezoelectric crystals using
  empirical d_ijk tables without connecting the non-zero entries to their group-
  theoretic origin. Mathematicians who study representation theory of finite groups
  have the tools to systematically enumerate all allowed tensor structures for all
  point groups but rarely publish in materials science journals.

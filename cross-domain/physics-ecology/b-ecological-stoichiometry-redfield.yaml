communication_gap: >
  Redfield published in the American Scientist (1958), a general audience journal.
  Sterner & Elser's synthesis (2002 book "Ecological Stoichiometry") is well known in
  ecology but has minimal penetration into biochemistry or evolutionary biology.
  The connection to the physics of optimal resource allocation and renormalization-group
  fixed points has not been made in any major review paper, despite the conceptual
  equivalence being straightforward.


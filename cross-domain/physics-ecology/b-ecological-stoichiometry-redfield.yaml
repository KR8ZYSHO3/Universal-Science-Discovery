id: b-ecological-stoichiometry-redfield
title: "Redfield ratio C:N:P=106:16:1 ↔ optimality of molecular machines: ocean chemistry as evolved biochemical constraint"
status: established
fields:
  - oceanography
  - biochemistry
  - ecology
  - evolutionary-biology
  - statistical-physics

bridge_claim: >
  Redfield (1934, 1958) discovered that dissolved inorganic nutrients in the deep
  ocean maintain a remarkably constant ratio of C:N:P = 106:16:1 (atomic), and that
  marine phytoplankton cellular composition matches this ratio. This could not be
  a coincidence: Redfield argued that ocean chemistry is shaped by the organisms
  that live in it — a feedback between biological demand and geochemical supply.
  The deeper explanation, revealed by Sterner & Elser (2002) and later Vrede et al.,
  is that the Redfield ratio reflects the stoichiometry of the major molecular
  machines in cells: ribosomes (P-rich RNA), proteins (N-rich), and carbohydrates
  (C-rich). The optimal allocation among these machines — determined by growth-rate
  theory (the "Growth Rate Hypothesis") — predicts approximately the observed
  C:N:P ratios. Faster-growing organisms need more ribosomes (more P), producing
  lower C:P and N:P ratios. This means the Redfield ratio is not a fixed constant
  but reflects the average growth-rate optimization of the global phytoplankton
  community. The bridge to physics: this is an extremal principle (the phytoplankton
  maximize growth rate subject to stoichiometric constraints), producing a fixed-point
  ratio analogous to an RG fixed point in that it is an attractor of evolutionary
  dynamics rather than a coincidence of chemistry.


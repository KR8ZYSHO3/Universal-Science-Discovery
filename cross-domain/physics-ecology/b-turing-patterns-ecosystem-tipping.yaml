  - "Use Fourier peak-sharpening as an early-warning indicator in global ecosystem monitoring, alongside the standard variance/autocorrelation indicators"

communication_gap: >
  Turing (1952) was a mathematician writing in Phil Trans Royal Society.
  Klausmeier (1999) was an ecologist writing in Science.
  Rietkerk et al. (2004) was published in Science. But the explicit connection
  between the Turing mechanism, percolation, and SOC was not made in a single
  accessible paper until around 2010s. Remote sensing ecologists who monitor
  vegetation patterns do not routinely use Fourier-spectrum Turing diagnostics;
  they use NDVI thresholds. The mathematical toolkit from pattern formation
  physics has not been standardised in ecological monitoring practice.


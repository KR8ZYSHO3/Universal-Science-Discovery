cross_pollination_opportunities:
  - >
    Deep learning for TCR-antigen binding prediction: sequence-based models
    (DeepTCR, ERGO, NetTCR) learn the affinity landscape from immunopeptidomics
    data. Connecting these to the information-theoretic framework of Mora & Bialek
    could reveal whether trained neural networks recover the maximum entropy
    distribution — testing the statistical physics model empirically.
  - >
    Percolation theory and network immunology: the T-cell repertoire as a network
    where edges connect cross-reactive TCR-antigen pairs. The giant connected
    component of this network (covering all pathogens) is a percolation phase
    transition. Manipulating the percolation threshold via vaccination is a
    mathematically precise design problem.
communication_gap: >
  Theoretical immunology (Perelson, Nowak) uses statistical physics and information
  theory, but clinical immunologists rarely read physics journals. The maximum
  entropy / statistical mechanics framework for immune diversity (Mora & Bialek)
  is published in J Stat Phys but rarely cited in immunology literature. Conversely,
  the rich experimental data on thymic selection and clonal dynamics in clinical
  immunology papers is underused by the theoretical physics community. NIH study
  sections fund immunology and physics separately.

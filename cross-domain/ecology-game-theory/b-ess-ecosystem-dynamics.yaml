cross_pollination_opportunities:
  - >
    Network game theory for realistic ecosystems: beyond pairwise games, apply
    multiplayer game theory (public goods games, coevolutionary dynamics on
    food webs) to understand how network topology shapes biodiversity and
    ecosystem stability.
  - >
    Evolutionary game theory for antibiotic resistance management: bacterial
    resistance strategies (antibiotic production, sensitization, resistance)
    form a rock-paper-scissors system in the gut microbiome. Applying ESS
    analysis could predict evolutionarily stable antibiotic cycling protocols.
communication_gap: >
  Game theorists (economics, mathematics) and ecologists publish in separate
  journals (Games and Economic Behavior vs. Ecology, American Naturalist).
  Evolutionary game theory was largely developed by biologists (Maynard Smith,
  Hamilton, Parker) and theoretical ecologists (May, Hofbauer) rather than
  economists — creating a parallel literature that economists are often unaware
  of. The replicator dynamics / Lotka-Volterra equivalence is well-known to
  theoretical ecologists but rarely taught in game theory courses.

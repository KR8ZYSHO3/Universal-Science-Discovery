cross_pollination_opportunities:
  - >
    Compressed sensing and information-theoretic sampling theory give optimal
    designs for species surveys that maximize the information gained per sample.
    Current biodiversity monitoring designs (transects, point counts) are largely
    heuristic. Applying optimal experiment design from information theory to
    biodiversity surveys could reduce monitoring costs for equivalent statistical
    power — directly relevant to IUCN Red List assessments and conservation planning.
  - >
    Phylogenetic diversity (Faith 1992) — summing branch lengths of the phylogenetic
    tree spanning observed species — is a richer diversity measure than species
    richness. Connecting phylogenetic diversity to information theory (the tree as
    a code for evolutionary information) could give an information-theoretic
    justification for phylogenetic diversity conservation priorities.
communication_gap: >
  Shannon's 1948 paper was written for electrical engineers and communication
  theorists. Hill (1973) published in the ecology journal Ecology; the paper is
  well-known among ecologists but the Rényi entropy connection is rarely
  acknowledged. Information theorists working on entropy measures rarely read
  ecology journals. Harte's MaxEnt ecology textbook (2011) is technically demanding
  and has been critiqued (Haegeman & Etienne 2010) but has not generated the
  cross-disciplinary engagement with statistical physicists that it deserves.

cross_pollination_opportunities:
  - >
    The predicted pattern wavelength λ ∝ √(D/k) provides a quantitative test:
    measuring morphogen diffusivities (fluorescence recovery after photobleaching,
    FCS) and degradation rates (pulse-chase experiments) in intact embryos should
    predict the observed pattern spacing. Müller et al. (2012) demonstrated this
    for Nodal/Lefty in zebrafish — this quantitative test has not been done for
    most other putative Turing systems.
  - >
    Embryo scaling: how does the Shh gradient scale proportionally as the vertebrate
    limb grows from millimeters to centimeters? In pure diffusion, the gradient
    length scale is √(D/k) and does not scale with tissue size. Dilution of source
    strength, inhibitor feedback, or advection must be involved. Importing
    transport theory (advection-diffusion, active transport) into developmental biology
    is an open frontier.
  - >
    In vitro reconstruction of Turing patterns with purified proteins (BMP4/Noggin
    on lipid bilayers) could provide ground-truth measurement of the diffusion
    and kinetic constants, enabling quantitative prediction of in vivo patterning
    — a rare case where a theoretical model could be calibrated from first principles.
communication_gap: >
  Turing's 1952 paper was not read by developmental biologists for two decades;
  the field was dominated by Wolpert's French Flag model (1969) which requires
  pre-specified gradient sources. The Turing mechanism was treated as an interesting
  alternative without experimental evidence until the 1990s-2000s when fluorescent
  protein tools made it possible to measure morphogen dynamics in living embryos.
  Even now, many developmental biologists are skeptical of RD mechanisms because
  the measurement of both diffusion constants and kinetic rates in the same system
  is technically demanding.

id: b-topological-defects-tissue-morphogenesis
title: >
  Topological defects in active nematic liquid crystals drive cell extrusion and tissue
  morphogenesis: +1/2 charge defects in cellular monolayers generate extensile flows that
  accumulate cells and trigger apoptotic extrusion, while -1/2 defects create contractile
  flows that deplete cells, providing a physics-first explanation of tissue patterning and
  organ shape emergence
status: established
fields:
  - physics
  - developmental-biology
  - biophysics
  - soft-matter
bridge_claim: >
  Confluent epithelial cell monolayers behave as active nematic liquid crystals in which cell
  elongation axes constitute the nematic director field; topological defects with winding
  number +1/2 generate self-propelling extensile active flows that concentrate mechanical
  stress, trigger local cell accumulation, and initiate three-dimensional extrusion events
  observed in Madin-Darby canine kidney (MDCK) cell cultures (Saw et al. 2017, DOI:
  10.1038/nature14295), directly linking the mathematics of liquid crystal topology to the
  developmental biology of epithelia morphogenesis, lumen formation, and organoid self-organization.
translation_table:
  - field_a_term: "topological defect with charge +1/2 in nematic liquid crystal (physics)"
    field_b_term: "cell accumulation site and extrusion hotspot in epithelial monolayer (developmental biology)"
    note: "+1/2 defects self-propel due to active stress asymmetry; in living tissues they concentrate cells until compressive stress triggers apoptotic or live-cell extrusion, controlling cell number homeostasis"
  - field_a_term: "topological defect with charge -1/2 in nematic liquid crystal (physics)"
    field_b_term: "cell depletion zone and local thinning region in epithelial sheet (developmental biology)"
    note: "-1/2 defects are passive in extensile nematics; they act as sinks that draw cells away from the defect core, creating holes or thin regions in developing epithelia"
  - field_a_term: "nematic director field n(x) (physics)"
    field_b_term: "cell elongation axis orientation field across tissue (developmental biology)"
    note: "The coarse-grained orientation of cell long axes defines a two-dimensional nematic director field measurable by fluorescence microscopy"
  - field_a_term: "active extensile stress αQ (physics)"
    field_b_term: "actomyosin contractility anisotropy in cell cortex (developmental biology)"
    note: "Active nematic parameter α > 0 for extensile systems corresponds to stress fiber-driven elongation along the director; α < 0 (contractile) gives different defect dynamics"
  - field_a_term: "topological charge conservation and defect annihilation (physics)"
    field_b_term: "coordinated tissue remodeling and wound closure (developmental biology)"
    note: "Defect pair annihilation (+1/2 and -1/2) corresponds to healing events in tissue where locally disrupted cell orientations relax back to uniform alignment"
communication_gap: >
  Liquid crystal physicists and developmental biologists rarely attend the same conferences;
  the active nematic framework was developed by soft matter physicists studying synthetic
  liquid crystals and was only translated to living tissues after 2010. Most cell biologists
  are unfamiliar with the mathematical formalism of topological defects (homotopy groups,
  winding numbers), while physicists rarely have access to live-cell monolayer imaging equipment
  and biological expertise needed to validate the predictions.
cross_pollination_opportunities:
  - "Using active nematic topological defect density as a quantitative predictor of extrusion
    rate and tissue homeostasis in organoid culture models, enabling physics-based quality metrics"
  - "Designing synthetic tissue geometries (confinement, patterned substrates) to engineer
    defect placement and control morphogenetic outcomes such as lumen formation and fold initiation"
  - "Applying Q-tensor liquid crystal simulations calibrated by single-cell imaging data to
    predict large-scale morphogenetic flows in developing embryos (gastrulation, neural tube closure)"

  - h-quantum-compass-precision
cross_pollination_opportunities:
  - >
    Natural gradient descent (Amari 1998) is now state-of-the-art in deep learning
    (TRPO, PPO, KFAC). It works by preconditioning the gradient with the inverse
    Fisher information matrix — this removes the dependence on parameterisation and
    finds the steepest ascent direction on the statistical manifold. Evolution does
    this automatically. Studying evolutionary dynamics with natural gradient theory
    would give population geneticists a language to describe evolutionary speed and
    efficiency that they currently lack.
  - >
    The Cramér-Rao bound gives a lower bound on estimation variance. Translated to
    evolution, it gives an upper bound on how fast a population can increase mean
    fitness per generation — a rigorous evolutionary speed limit. Current quantitative
    genetics has only approximations (Robertson's secondary theorem of selection).
    The exact Fisher-information speed limit is derivable but has not been used to
    analyse empirical selection data.
  - >
    The quantum Fisher information (QFI) connects this bridge to b-quantum-biology-
    navigation and h-quantum-compass-precision. The cryptochrome Cramér-Rao bound
    measured in that context is the quantum generalization of the same Fisher
    information that governs evolutionary speed. An information-geometric framework
    spanning quantum sensing, statistical estimation, and evolutionary dynamics would
    be a unification with no precedent in any of the three fields.
  - >
    In machine learning, the natural gradient has been applied to policy optimisation
    (Natural Policy Gradient) and to neural network training (KFAC, Kronecker-factored
    Fisher). These are direct applications of evolution-equivalent optimisation on
    statistical manifolds. Importing the evolutionary biology literature on genetic
    drift, mutation-selection balance, and adaptive landscapes into ML theory could
    give new regularisation principles and convergence guarantees.
communication_gap: >
  Fisher (1930) proved the fundamental theorem in the language of biometry, without
  reference to his own 1925 information matrix. Ewens, Frank, and Kimura connected
  the two in the genetics literature, but these papers are technical and not widely
  read by working evolutionary biologists. Machine learning researchers who daily use
  the natural gradient are completely unaware that they are implementing an operation
  mathematically equivalent to natural selection on a fitness landscape. The bridge
  requires only notation translation — no new mathematics — but the translation has
  never been made accessible to practitioners in all three fields simultaneously.

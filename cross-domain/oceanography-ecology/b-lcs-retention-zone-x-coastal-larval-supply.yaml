id: b-lcs-retention-zone-x-coastal-larval-supply
title: >
  Finite-time Lyapunov exponent ridges (Lagrangian coherent structures) identify transient transport barriers and retention pockets near fronts and capes — quantities coastal ecology links to larval retention and settlement hotspots when biological mortality is weak relative to advection time scales.
status: established
fields:
  - physical-oceanography
  - marine-ecology
  - dynamical-systems
bridge_claim: >
  Physical oceanography computes FTLE/LCS fields from velocity products to visualize where parcels remain coherent or escape along ridges; marine larval ecology hypothesizes that prolonged residence near coastlines raises local recruitment when larvae match habitat cues before offshore export. The bridge is **quantitative where circulation dominates**: retention proxies derived from backward-time FTLE maxima correlate with observed settlement variability in some regions — **speculation** where behavior, ontogenetic vertical migration, or temperature-dependent mortality breaks passive tracer assumptions.
translation_table:
  - field_a_term: backward-time FTLE ridge (transport organizer)
    field_b_term: larval retention probability envelope near coastline
    note: Requires validating passive-float realism vs larval behavior.
  - field_a_term: hyperbolic segments / stable/unstable manifold analogies (finite-time)
    field_b_term: connectivity corridors vs recruitment sinks/sources
    note: Shared language from dynamical systems maps onto ecological connectivity matrices only after calibration.
  - field_a_term: tidal vs mesoscale forcing bandwidth in ψ(x,y,t)
    field_b_term: spawning synchrony windows vs settlement-sensitive ontogeny
    note: Multi-scale coupling often omitted in passive LCS-only narratives.
communication_gap: >
  Operational coastal forecasts emphasize Eulerian metrics (temperature, salinity fronts) while recruitment studies increasingly ingest circulation models — FTLE-based retention indices remain niche outside interdisciplinary larval-transport groups.
cross_pollination_opportunities:
  - Fuse species-specific pelagic duration priors with ensemble backward floats constrained by LCS ridges to produce spatial recruitment risk maps with explicit uncertainty bands.
  - Export ecological validation transects (settlers, genetics) as ground truth for benchmarking LCS retention metrics across regions.

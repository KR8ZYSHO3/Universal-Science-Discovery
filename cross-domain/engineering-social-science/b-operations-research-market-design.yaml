cross_pollination_opportunities:
  - >
    AI-assisted market design: using machine learning to learn preference structures
    and predict market outcomes without explicit preference elicitation.
    Automated mechanism design (Conitzer & Sandholm 2002) — compute the optimal
    mechanism for a given environment using LP or neural networks. This bridges
    ML, game theory, and mechanism design into a computational social science.
  - >
    Dynamic matching markets: labor markets, gig economy platforms (Uber, TaskRabbit)
    do matching in real time with uncertain arrivals. OR algorithms (online bipartite
    matching, secretary problem) provide provably near-optimal policies. This bridges
    online algorithms theory to platform economics.
communication_gap: >
  OR was developed as an engineering discipline (Dantzig, RAND Corporation, 1940s-60s)
  with applications to logistics and military operations. Market design emerged in
  economics (Roth, Wilson) in the 1980s-90s largely independently. The explicit
  connection — that market design is applied OR — was made by practitioners (Roth
  brought in OR specialists for kidney exchange algorithms) but is not standard
  in economics PhD curricula. Operations Research journals (Management Science,
  Operations Research) and economics journals (American Economic Review) have low
  cross-citation rates despite shared mathematical foundations.

related_hypotheses:
  - h-stackelberg-equilibrium-predicts-security-market-underinvestment
cross_pollination_opportunities:
  - >
    Mechanism design from social choice theory could be applied to design
    vulnerability disclosure incentive structures (bug bounties) that maximize
    social welfare — current CVD (coordinated vulnerability disclosure) programs
    are ad hoc. A formal mechanism design approach could optimize disclosure timing,
    bounty schedules, and liability rules.
  - >
    Behavioral security: cognitive biases (hyperbolic discounting, availability
    heuristic) predict specific patterns of security neglect. Behavioral economics
    interventions (nudges, commitment devices) could complement technical controls
    in reducing human-factor security failures.
communication_gap: >
  Security engineers focus on technical controls and are trained in cryptography and
  systems; economists and game theorists focus on incentive structures and behavioral
  models. The security economics literature (Anderson, Moore, Böhme) bridges both
  but is not standard in either CS security curricula or economics graduate programs.
  Practitioners in each field often rediscover insights well-established in the other.

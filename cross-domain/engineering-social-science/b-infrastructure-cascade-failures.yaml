cross_pollination_opportunities:
  - >
    Network epidemiology and infrastructure resilience share the same percolation
    formalism — contact tracing (epidemiology) and critical node removal (infrastructure)
    both seek to identify nodes whose removal changes the phase transition threshold.
    Joint modelling could identify infrastructure failures that trigger social cascades
    (e.g., hospital power failure during epidemic) using the same theoretical framework.
  - >
    Real-time satellite imagery and IoT sensor networks now provide data to build
    empirical interdependency maps of urban infrastructure — enabling the first
    direct test of whether real cities have interdependency structures that predict
    the discontinuous Buldyrev transition, versus smoother degradation patterns.
communication_gap: >
  Network science (physics) and infrastructure engineering have separate literatures
  (Phys Rev Lett vs. IEEE Trans Power Systems), separate conferences, and separate
  funding agencies (NSF Physics vs. DOE/DHS). After the 2003 blackout, the NERC
  investigation was conducted by power engineers who did not cite percolation theory;
  the Buldyrev paper appeared in Nature (2010) but was not immediately incorporated
  into NERC reliability standards or FEMA resilience frameworks. The social science
  dimension (who bears the cost of failures) is studied by sociologists and public
  policy researchers who rarely engage with the network topology literature.

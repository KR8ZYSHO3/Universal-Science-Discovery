cross_pollination_opportunities:
- Use treewidth-based graph algorithms to systematically handle restricted pseudoknot classes.
- Apply RNA planar graph statistics as generative constraints for RNA design by inverse folding.
communication_gap: Biologists discuss dot-bracket notation; algorithms researchers discuss
  parse forests. Tooling hides the graph structure, so errors in pseudoknot handling propagate
  silently in design pipelines.

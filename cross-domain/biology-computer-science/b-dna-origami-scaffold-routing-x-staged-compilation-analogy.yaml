id: b-dna-origami-scaffold-routing-x-staged-compilation-analogy
title: >
  DNA origami scaffold routing and staged compilation share a constrained-assembly logic: a global design is decomposed into local binding or dependency steps whose ordering controls yield, error propagation, and debuggability, though the compiler analogy is explicitly speculative.
status: proposed
fields:
  - biology
  - nanotechnology
  - computer-science
bridge_claim: >
  The bridge is a labeled metaphor for design practice, not a mechanistic equivalence. Scaffold path constraints, staple crossovers, and annealing schedules can be described like dependency graphs and staged compilation passes, suggesting measurable software-style complexity metrics for origami yield prediction.
translation_table:
  - field_a_term: scaffold path and staple constraints
    field_b_term: dependency graph and intermediate representation
    note: Both expose local constraints in a global assembly.
  - field_a_term: annealing schedule
    field_b_term: staged compilation or pass ordering
    note: Ordering controls failure modes.
  - field_a_term: misfolded intermediate
    field_b_term: failed build artifact or unresolved dependency
    note: The analogy is pedagogical and must be tested.
communication_gap: >
  DNA nanotechnology uses wet-lab yield and microscopy language, while compiler engineers reason about dependency graphs, static checks, and staged lowering.
cross_pollination_opportunities:
  - Test whether graph metrics from compilers predict experimentally observed origami yield.
  - Build educational tools that label DNA origami routing constraints as dependency-resolution problems while marking analogy limits.
related_unknowns:

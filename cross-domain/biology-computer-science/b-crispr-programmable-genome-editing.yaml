cross_pollination_opportunities:
  - "Apply automata theory (finite-state machines) to model Cas9 conformational changes during target search"
  - "Use information-theoretic bounds (channel capacity) to calculate the maximum specificity achievable with a 20 nt gRNA given the genome size"
  - "Import compiler design concepts (lexing, parsing) to design orthogonal gRNA libraries that avoid cross-reactivity"

communication_gap: >
  Molecular biologists and computer scientists both have deep relevant expertise
  but collaborate rarely on CRISPR design. Bioinformatics bridges the gap computationally
  (off-target prediction tools like Cas-OFFinder, CRISPOR use string-matching
  algorithms), but the formal computer science framing — complexity analysis,
  information-theoretic limits on specificity — is rarely applied. Most CRISPR
  engineering is empirical rather than theory-driven.


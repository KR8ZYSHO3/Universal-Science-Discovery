cross_pollination_opportunities:
  - >
    SAT solvers developed for VLSI Boolean circuit analysis could be repurposed to
    compute the complete attractor landscape of inferred gene regulatory networks from
    single-cell RNA-seq data — testing Kauffman's quantitative predictions with genome-
    scale data for the first time.
  - >
    Boolean circuit complexity theory predicts minimum circuit depth for computing
    specified Boolean functions. Applied to GRNs: what is the minimum regulatory
    depth (transcription factor cascade length) for a given developmental programme?
    This predicts bottleneck regulatory genes (high complexity nodes) that are
    essential for differentiation.
communication_gap: >
  Kauffman published in Journal of Theoretical Biology (biology journal); the formal
  theory of Boolean satisfiability and phase transitions was developed in computer science
  (STOC, FOCS conferences) and statistical physics simultaneously but without citation
  exchange. Boolean network theory in biology was largely descriptive; computer scientists
  who could have provided rigorous attractor analysis tools rarely engaged with biological
  applications. The ENCODE project reframed the regulatory genome but did not connect
  to Boolean network theory. Biologists trained in molecular biology rarely learn about
  Boolean satisfiability, and computer scientists rarely encounter Kauffman's model.

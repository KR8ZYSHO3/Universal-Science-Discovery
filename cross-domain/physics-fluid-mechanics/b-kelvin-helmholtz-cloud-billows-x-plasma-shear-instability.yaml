id: b-kelvin-helmholtz-cloud-billows-x-plasma-shear-instability
title: >
  Kelvin-Helmholtz billows in atmospheric cloud layers and shear-driven modes in magnetized plasmas share the same linear-instability logic: velocity shear converts interface perturbations into growing vortical or wave-like structures, with magnetic tension and compressibility adding plasma-specific stabilizing terms.
status: proposed
fields:
  - fluid-mechanics
  - atmospheric-science
  - plasma-physics
bridge_claim: >
  The bridge is speculative across observational settings but grounded in shared stability analysis: compare nondimensional growth rates after accounting for density contrast, shear thickness, compressibility, and magnetic-field alignment rather than treating cloud billows and fusion-edge shear modes as unrelated phenomena.
translation_table:
  - field_a_term: velocity shear across cloud layers
    field_b_term: ExB or parallel-flow shear in plasma
    note: Both feed perturbation growth; plasma adds electromagnetic restoring forces.
  - field_a_term: Richardson-number suppression
    field_b_term: magnetic-tension or finite-Larmor-radius suppression
    note: Stabilizers are not identical but play analogous threshold roles.
  - field_a_term: billow wavelength and roll-up time
    field_b_term: mode number and linear growth rate
    note: Both become measurable outputs for stability comparison.
communication_gap: >
  Atmospheric scientists emphasize remote-sensed morphology and stratification, while plasma physicists use dispersion relations and diagnostics from fusion devices.
cross_pollination_opportunities:
  - Compare normalized growth-rate charts from cloud-resolving simulations and magnetohydrodynamic shear-layer simulations.
  - Use atmospheric billow image analysis as a teaching dataset for plasma instability onset diagnostics.

cross_pollination_opportunities:
  - >
    Non-equilibrium thermodynamics via convex geometry: extend the Legendre-transform
    framework to non-equilibrium steady states using Masuda-Sasa theory and contact
    geometry; predict whether the convex duality structure persists for driven systems
    such as active matter and metabolic networks.
  - >
    Machine learning as statistical mechanics: the training of neural networks minimises
    a loss function (free energy analogue); apply convex analysis to characterise the
    loss landscape geometry, predict phase transitions (double descent, grokking),
    and design learning rate schedules using thermodynamic intuition.
  - >
    Chemical process optimisation: formulate multi-component distillation column design
    as convex programming using Gibbs free energy minimisation; use duality theorems
    to identify the thermodynamic limits on separation efficiency before engineering
    detailed designs.
communication_gap: >
  Thermodynamics is taught to chemists, chemical engineers, and physicists using
  19th-century notation (exact differentials, Maxwell relations) that obscures the
  underlying convex geometry. Convex analysis is a pure mathematics and operations
  research topic; the isomorphism with thermodynamics is known to mathematical
  physicists (e.g. Wightman 1979) but not taught in chemistry or engineering curricula.
  Jaynes's Bayesian re-foundation of statistical mechanics is known to information
  theorists but not routinely to physical chemists.

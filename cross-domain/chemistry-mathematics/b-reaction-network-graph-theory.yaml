id: b-reaction-network-graph-theory
title: >
  Chemical reaction networks are directed hypergraphs whose steady-state multiplicity
  and oscillatory behavior are entirely determined by the network topology via the
  Feinberg-Horn-Jackson deficiency theory — making graph-theoretic invariants (deficiency
  number, linkage classes, strong linkage) the decisive predictors of chemical dynamics.
status: established
fields:
  - chemistry
  - mathematics
  - graph-theory
  - dynamical-systems
  - biochemistry
bridge_claim: >
  A chemical reaction network (CRN) is a directed graph whose nodes are "complexes"
  (multisets of species, e.g. A + 2B) and edges are reactions. The Feinberg-Horn-Jackson
  (FHJ) deficiency theory (1972) provides a complete classification of which network
  topologies can admit multiple steady states, oscillations, or complex dynamics.

  THE DEFICIENCY NUMBER δ:

    δ = n - l - s

  where n = number of distinct complexes, l = number of linkage classes (connected
  components of the underlying undirected graph), and s = dimension of the stoichiometric
  subspace (rank of the stoichiometric matrix). The deficiency is a topological
  invariant of the network, not of the rate constants.

  DEFICIENCY ZERO THEOREM (Horn & Jackson 1972): Any CRN with δ = 0 and a weakly
  reversible topology admits a unique positive steady state that is thermodynamically
  stable (complex-balanced equilibrium) regardless of rate constant values. The
  network topology alone, not the kinetics, guarantees uniqueness and stability.

  DEFICIENCY ONE THEOREM (Feinberg 1987): A CRN with δ = 1, in which each linkage
  class has its own deficiency (δ_l ≤ 1), can admit at most one positive steady
  state per stoichiometric compatibility class — regardless of kinetic rates.

  MULTISTABILITY REQUIREMENTS: Multiple steady states require δ ≥ 2, or a non-weakly-
  reversible topology, or a stoichiometric structure that allows the system to exit
  the "complex-balanced" regime. The lac operon (genetic switch), bistable signalling
  cascades (e.g. MAPK), and the mitotic oscillator all have deficiency ≥ 1 and
  non-weakly-reversible subnetworks — their multistability is topologically inevitable.

  GRAPH-THEORETIC TOOLS FROM NETWORK SCIENCE:
  - Strongly connected components of the CRN graph = persistent reaction cycles
  - Spanning forests of the complex graph = steady-state flux distributions
  - Matrix-tree theorem applied to the Kirchhoff matrix of the complex graph = algebraic
    formula for steady-state concentrations (the "CRNT" tree formula)
  - Spectral graph theory of the Laplacian of the CRN = stability eigenvalues

  The SAME graph-theoretic tools used to analyse web graphs, social networks, and
  electrical circuits apply without modification to predict chemical dynamics.
translation_table:
  - field_a_term: "Complex (multiset of species, e.g. A + 2B)"
    field_b_term: "Node in the reaction graph"
    note: "Distinct complexes = distinct nodes; same species appearing in different reactions create different nodes"
  - field_a_term: "Reaction A + B → C + D"
    field_b_term: "Directed edge from node (A+B) to node (C+D)"
    note: "Edge weight = rate constant; reversible reaction = pair of antiparallel edges"
  - field_a_term: "Linkage class"
    field_b_term: "Connected component of the undirected complex graph"
    note: "Represents a self-contained reaction subsystem with its own conservation laws"
  - field_a_term: "Deficiency δ = n - l - s"
    field_b_term: "Topological complexity measure of the reaction network"
    note: "δ = 0 guarantees unique stable equilibrium (thermodynamic); δ ≥ 1 allows multistability or oscillation"
  - field_a_term: "Weakly reversible network"
    field_b_term: "Strongly connected directed graph (every node on a cycle)"
    note: "Weakly reversible + δ = 0 = complex-balanced equilibrium exists"
  - field_a_term: "Stoichiometric subspace"
    field_b_term: "Image of the incidence matrix of the directed complex graph"
    note: "Constrains which steady states are reachable from given initial conditions"
  - field_a_term: "Oscillatory CRN (e.g. Brusselator, Oregonator)"
    field_b_term: "CRN graph with a Hopf bifurcation structure: non-weakly-reversible, δ ≥ 1"
    note: "Stability of steady states determined by eigenvalues of Jacobian; Hopf criterion is algebraic in rate constants"

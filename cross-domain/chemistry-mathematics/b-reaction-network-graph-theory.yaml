cross_pollination_opportunities:
  - >
    The FHJ deficiency theory gives a purely topological guarantee of uniqueness
    or multistability without computing rate constants. This could be used as a
    pre-filter in synthetic biology: before engineering a genetic circuit, check
    whether the reaction graph topology permits or forbids bistability. Most current
    synthetic biology design tools do not exploit deficiency theory — integrating
    it would reduce failed designs dramatically.
  - >
    Network science has developed efficient algorithms for identifying strongly
    connected components (Tarjan's algorithm, O(V+E)), community detection, and
    motif enumeration. Applying these tools to large metabolic networks (KEGG, BiGG)
    would classify each metabolic subnetwork by its deficiency and predict which
    subsystems are capable of multistability — a systematic map of which metabolic
    pathways can bistably switch, directly relevant to understanding metabolic
    diseases and cancer metabolism.
  - >
    The algebraic combinatorics of spanning trees of the CRN graph give an exact
    formula for steady-state concentrations under mass-action kinetics. This is a
    direct application of the Matrix-Tree Theorem (Kirchhoff's theorem) from
    graph theory. The formula connects the magnitudes of steady-state concentrations
    to ratios of reaction rate constants in a way that could be exploited for
    parameter estimation from metabolomics data.
communication_gap: >
  Feinberg (1972) and Horn & Jackson (1972) published their deficiency theory in
  applied mathematics journals (Arch Rational Mech Anal) not read by chemists or
  biologists. The theory requires graph theory and linear algebra notation unfamiliar
  to most chemists. Chemical reaction network theory (CRNT) remained a speciality
  of mathematical chemistry for 30 years until the systems biology era (2000-present)
  began connecting it to biological networks. Most synthetic biologists who design
  genetic circuits remain unaware that the circuit topology alone determines whether
  bistability is achievable.

cross_pollination_opportunities:
  - >
    Distributed waste heat recovery: industrial processes (steel mills, cement kilns,
    data centres) reject heat at 100-400°C. Thermoacoustic Stirling engines could
    convert this to electricity with no moving parts, enabling waste heat recovery in
    harsh environments where mechanical reliability is paramount. The acoustic network
    design problem (optimising tube geometry, regenerator material, operating frequency)
    is an engineering application of acoustic wave theory.
  - >
    Cryogenic thermoacoustic refrigeration using helium-4 working fluid can achieve
    4K cooling (liquid helium temperature) — potentially replacing liquid helium in
    MRI machines and superconducting magnet systems. The no-moving-parts design avoids
    the maintenance of Gifford-McMahon coolers currently used.
communication_gap: >
  Thermoacoustics straddles acoustics (ASA journals), heat transfer (ASME journals),
  and thermodynamics (physics journals) — communities that rarely read each other's
  work. Rott (1969-1980) developed the linear thermoacoustic theory in a series of
  Advances in Applied Mechanics papers that were technically demanding and rarely
  cited in engineering practice. Swift's work at LANL from 1988 onward translated
  this into accessible engineering design equations, but thermoacoustics remains outside
  standard engineering curricula. Combustion engineers studying thermoacoustic
  instabilities and cryogenic engineers building thermoacoustic refrigerators are
  literally in the same physical phenomenon from opposite engineering perspectives and
  rarely attend the same conferences.

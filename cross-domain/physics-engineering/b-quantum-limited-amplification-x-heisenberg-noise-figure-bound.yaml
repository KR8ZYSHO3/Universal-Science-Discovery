cross_pollination_opportunities:
  - Benchmark cryogenic CMOS LNAs against Josephson parametric amplifiers using identical quantum noise accounting conventions.
  - Export squeezed-state illumination concepts from quantum optics to radar when coherence budgets permit.
communication_gap: >
  Microwave datasheets quote NF without mentioning quantum limits; quantum optics literature seldom converts squeezing
  metrics into IEEE NF unless targeting radio astronomy instrumentation collaborations.

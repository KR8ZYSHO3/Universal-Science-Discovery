cross_pollination_opportunities:
  - >
    Plasma turbulence is the dominant transport mechanism limiting τ_E. The
    gyrokinetic equations describing turbulence are formally identical to
    certain fluid equations in atmospheric science. Numerical methods developed
    for weather prediction (spectral methods, adaptive mesh refinement) could
    improve fusion plasma simulation codes, reducing the uncertainty in τ_E
    predictions for DEMO (the demonstration power plant following ITER).
  - >
    Plasma-facing materials under neutron bombardment accumulate helium bubbles
    and transmutation products — a materials science problem with no current
    solution for 14 MeV fusion neutrons. Collaboration between plasma physics
    and radiation damage materials science is needed: the irradiation environment
    is defined by plasma physics, but the solution requires materials innovation.
  - >
    Machine learning for plasma control: the high-dimensional plasma state must
    be controlled in real time to avoid disruptions (rapid quench events). This
    is a reinforcement learning problem where the reward function is derived from
    plasma physics (avoid MHD instabilities, maintain confinement). DeepMind's
    2022 tokamak control paper demonstrated the viability of this approach.
communication_gap: >
  Plasma physics is taught as a physics discipline (MHD, kinetic theory) while
  fusion engineering is taught as nuclear engineering. The communities publish
  in Nuclear Fusion and Physics of Plasmas (physics) vs. Fusion Engineering and
  Design (engineering), with limited cross-citation. The Lawson criterion is
  widely known in both communities, but deeper connections — the derivation of
  engineering tolerances from instability growth rates, the mapping of
  confinement scaling onto reactor design — are less systematically taught
  across the divide.

id: b-plasma-physics-fusion-energy
title: >
  Plasma confinement physics — MHD equilibrium, instability theory, and the
  Lawson criterion — directly determines engineering requirements for fusion
  reactors: the safety factor q, energy confinement time τ_E, and plasma-facing
  material constraints are all derivable from first-principles plasma physics
  and now validated by ITER design and NIF ignition.
status: established
fields:
  - plasma-physics
  - nuclear-engineering
  - magnetohydrodynamics
  - materials-science
bridge_claim: >
  Plasma confinement for fusion energy requires solving the magnetohydrodynamic
  (MHD) equilibrium equation ∇p = J × B, where pressure gradient is balanced
  by the magnetic force. In a tokamak, this demands nested toroidal magnetic
  flux surfaces. The safety factor q = rB_φ/(RB_θ), the ratio of toroidal to
  poloidal field contributions, must be irrational at all radii to avoid
  resonant surfaces where field lines close on themselves after a finite number
  of toroidal transits — closure allows magnetic islands to grow, terminating
  confinement via tearing modes (m=1 kink instability, m/n rational resonances).

  Lawson (1957) derived the engineering criterion for net energy gain from
  plasma physics first principles: the product nτ_E T (plasma density times
  energy confinement time times temperature) must exceed 3×10²¹ m⁻³·s·keV for
  D-T fusion. This single dimensionless product encodes the competition between
  fusion power density (∝ n²⟨σv⟩T) and energy loss rate (∝ n·T/τ_E).

  ITER (under construction, Cadarache): engineered to achieve Q=10 (500 MW
  fusion from 50 MW heating) at n=10²⁰ m⁻³, T=15 keV, τ_E=3.7 s. The
  engineering challenge maps exactly onto plasma physics constraints:
  (1) First wall materials must withstand 10 MW/m² heat flux — derived from
  energy confinement and geometric dilution;
  (2) Tritium breeding ratio > 1 from Li-6 blankets — derived from fusion
  neutron flux calculation;
  (3) Superconducting magnets at 13.5 T — derived from MHD stability limits
  requiring B > threshold for β = 2μ₀p/B² < β_max (Troyon limit).

  NIF (National Ignition Facility) achieved fusion ignition in August 2022
  (Abu-Shawareb et al. 2022): Q > 1 for inertial confinement fusion, the first
  time in history. The target physics — laser ablation drives shock
  compression, central hot spot ignition, alpha-particle self-heating, burn
  wave propagation — is all derived from plasma physics. Engineering translated
  this into 192 laser beams delivering 2.05 MJ to a 2.2 mm gold hohlraum.

  Key instabilities that engineering must suppress:
  - Kink mode (m=1): requires q > 1 (Kruskal-Shafranov condition)
  - Ballooning modes: requires pressure gradient below critical β threshold
  - Tearing modes: require resistivity < threshold → drives need for ECCD
  - Edge-localized modes (ELMs): periodic bursts that erode the first wall →
    drives need for resonant magnetic perturbations (RMPs) in ITER

  The bridge is complete: plasma physics provides the theory, engineering
  provides the implementation. Every engineering specification in ITER or NIF
  has a direct plasma physics derivation.
translation_table:
  - field_a_term: "MHD equilibrium ∇p = J × B (plasma physics)"
    field_b_term: "Pressure balance design specification for coil and blanket geometry"
    note: Determines aspect ratio, plasma shape, and plasma-facing component loads
  - field_a_term: "Safety factor q = rB_φ/RB_θ must be irrational (MHD theory)"
    field_b_term: "Toroidal field coil current profile programming in tokamak operation"
    note: q-profile is actively controlled to avoid rational surfaces
  - field_a_term: "Lawson criterion nτ_E T > 3×10²¹ m⁻³·s·keV"
    field_b_term: "Target plasma parameters: n, T, confinement time for reactor design"
    note: The fundamental engineering target derived from D-T cross-section physics
  - field_a_term: "Energy confinement time τ_E (plasma physics scaling)"
    field_b_term: "Thermal insulation performance metric for the reactor vessel"
    note: τ_E ∝ B^0.15 n^0.41 P^{-0.69} R^{1.97} (IPB98y2 H-mode scaling)
  - field_a_term: "Beta limit β_max (Troyon limit β_N = β/(I/aB))"
    field_b_term: "Maximum achievable plasma pressure → sets magnetic field requirement"
    note: Higher B allows higher absolute pressure for same β_N
  - field_a_term: "Alpha particle self-heating (born at 3.5 MeV in D-T)"
    field_b_term: "Ignition condition — plasma heating exceeds all losses without external power"
    note: NIF achieved ignition via alpha-heating cascade in 2022

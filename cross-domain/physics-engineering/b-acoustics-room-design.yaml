cross_pollination_opportunities:
  - Apply finite-element wave simulation at all frequencies (replacing the Sabine
    approximation which fails for non-diffuse fields) to non-rectangular hall geometries —
    requires HPC resources but would validate or correct Beranek-era empirical rules
  - Use psychoacoustic metrics (IACC, clarity C80, definition D50) as objective functions
    in topology optimization of concert hall geometry — computational acoustic design
  - Translate anechoic chamber design principles to MRI bore acoustic isolation —
    connecting room acoustics engineering to medical device design
communication_gap: >
  Architectural acoustics sits in engineering schools; wave physics of room resonances
  is taught in physics departments; perceptual psychoacoustics is in psychology or
  music departments. Practicing architects rarely have acoustics training; acoustic
  consultants are hired late in the design process when major geometry is fixed.
  The academic literature on psychoacoustics (JASA) and the professional literature
  on concert hall design rarely cite each other.

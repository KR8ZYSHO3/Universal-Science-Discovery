cross_pollination_opportunities:
  - Teach statistical mechanics labs that NF meters literally compare excess noise to kTB using calibrated noise sources.
  - Import quantum optics noise-correlation notation into mm-wave beamforming IC documentation when ports are coupled.
communication_gap: >
  Thermodynamics texts derive Nyquist–Johnson from detailed balance; microwave courses quote NF without always
  tracing the matched-source convention back to its equilibrium noise identity — confusing when designers mix
  physical temperature with noise temperature T_e.

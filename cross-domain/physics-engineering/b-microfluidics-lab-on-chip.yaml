cross_pollination_opportunities:
  - >
    Acoustic microfluidics: ultrasonic standing waves create acoustic radiation force
    that sorts particles by size and density (acoustophoresis) О“Г‡Г¶ complements DEP
    and provides label-free, contact-free cell manipulation. Physics of acoustic
    radiation pressure (Gorkov potential) maps onto microfluidic engineering.
  - >
    Microfluidic neuroscience: compartmentalized chambers (axon-soma chambers via
    Taylor et al. 2005) allow studying axon biology and axon-glia interactions in
    isolation О“Г‡Г¶ a direct engineering application of fluid physics to cell biology
    questions about neurodegeneration and circuit assembly.
communication_gap: >
  Physicists who study Stokes flow, electroosmosis, and dielectrophoresis rarely
  work in biology or medicine. Biologists who use 10в”њГ№ Genomics for single-cell
  RNA-seq rarely engage with the fluid physics that makes droplet generation work.
  Clinicians who want point-of-care diagnostics rarely interact with the microfluidics
  engineers who design the assay formats. The deviceО“ГҐГ†clinical translation gap
  is compounded by regulatory challenges that neither group is trained to navigate.

id: b-microfluidics-lab-on-chip
title: >
  Microfluidics bridges physics and engineering: low Reynolds number flow, Peclet-
  dominated diffusion, electroosmosis, dielectrophoresis, and droplet generation
  enable lab-on-chip systems for single-cell RNA-seq (10x Genomics), CRISPR
  screening, and point-of-care diagnostics.
status: established
fields:
  - physics
  - engineering
  - fluid-dynamics
  - biotechnology
  - medical-devices
bridge_claim: >
  At the microscale (channel dimensions L ~ 1-100 в•¬в•ќm), fluid physics is dominated
  by viscosity: Reynolds number Re = в•§ГјvL/в•¬в•– << 1 О“Г‡Г¶ flow is laminar, deterministic,
  and fully predictable by Stokes equations. The Pв”њвЊђclet number Pe = vL/D >> 1 for
  macromolecules: advection dominates diffusion along the channel, so mixing is
  slow (diffusion only across streamlines) О“Г‡Г¶ enabling extremely reproducible flow
  patterns. Electroosmotic flow (EOF): when channel walls bear surface charge
  (PDMS, glass О“Г‡Г¶ negatively charged at pH > 3), an electric double layer forms.
  Applied electric field E О“ГҐГ† Helmholtz-Smoluchowski flow v_eo = -в•¬в•Ўв•¬в•ўE/в•¬в•– (в•¬в•ў = zeta
  potential, в•¬в•Ў = permittivity, в•¬в•– = viscosity) О“Г‡Г¶ pumping without moving parts.
  Dielectrophoresis (DEP): non-uniform electric field О“ГЄГ§Eв”¬в–“ exerts force on
  polarizable particles F_DEP = 2в•§Г‡rв”¬в”‚в•¬в•Ў_m Re[f_CM]О“ГЄГ§Eв”¬в–“ (Clausius-Mossotti factor
  f_CM = (в•¬в•Ў_p - в•¬в•Ў_m)/(в•¬в•Ў_p + 2в•¬в•Ў_m)) О“Г‡Г¶ frequency-dependent sorting of live/dead
  cells, cancer vs. normal cells. Droplet microfluidics (digital microfluidics):
  immiscible fluid droplets (water-in-oil) generated at T-junction or co-flow
  nozzle О“Г‡Г¶ picoliter reactors at 10,000/s rate. Application: Drop-seq (Macosko
  2015) / 10в”њГ№ Genomics droplet-seq О“Г‡Г¶ each droplet contains one cell + one
  barcoded bead О“ГҐГ† mRNA captured О“ГҐГ† single-cell RNA-seq at scale. Organ-on-chip:
  PDMS microchannels with human cells recapitulating tissue-level physiology О“Г‡Г¶
  lung chip, gut chip, kidney chip for drug testing without animal models.
translation_table:
  - field_a_term: Re << 1 (Stokes flow regime)
    field_b_term: viscous force dominates inertia О“ГҐГ† laminar, fully predictable flow
    note: no turbulence; no mixing by chaotic advection; flow is time-reversible (Stokes paradox)
  - field_a_term: Pв”њвЊђclet number Pe = vL/D
    field_b_term: ratio of advective to diffusive transport; Pe >> 1 О“ГҐГ† diffusion-limited mixing
    note: small molecules (D ~ 10О“Гјв•—О“Гјв•Ј mв”¬в–“/s) diffuse across 10 в•¬в•ќm channel in 0.1 s; proteins slower
  - field_a_term: electroosmotic flow (EOF)
    field_b_term: electrostatic pump driven by electric double layer (EDL) interaction with applied field
    note: plug-like velocity profile (unlike Poiseuille parabolic) О“Г‡Г¶ advantageous for electrophoresis
  - field_a_term: dielectrophoresis (DEP) force F_DEP О“ГЄВҐ О“ГЄГ§Eв”¬в–“
    field_b_term: label-free cell sorting by dielectric properties (Re[f_CM])
    note: frequency-tunable О“Г‡Г¶ cancer cells have different membrane capacitance than normal cells
  - field_a_term: droplet microfluidics (W/O emulsions)
    field_b_term: picoliter reaction vessels; Poisson statistics determine cell encapsulation rate
    note: droplet size controlled by flow rates and channel geometry; barcoded beads enable cell identification

id: b-microfluidics-lab-on-chip
title: >
  Microfluidics bridges physics and engineering: low Reynolds number flow, Peclet-
  dominated diffusion, electroosmosis, dielectrophoresis, and droplet generation
  enable lab-on-chip systems for single-cell RNA-seq (10x Genomics), CRISPR
  screening, and point-of-care diagnostics.
status: established
fields:
  - physics
  - engineering
  - fluid-dynamics
  - biotechnology
  - medical-devices
bridge_claim: >
  At the microscale (channel dimensions L ~ 1-100 μm), fluid physics is dominated
  by viscosity: Reynolds number Re = ρvL/η << 1 — flow is laminar, deterministic,
  and fully predictable by Stokes equations. The Péclet number Pe = vL/D >> 1 for
  macromolecules: advection dominates diffusion along the channel, so mixing is
  slow (diffusion only across streamlines) — enabling extremely reproducible flow
  patterns. Electroosmotic flow (EOF): when channel walls bear surface charge
  (PDMS, glass — negatively charged at pH > 3), an electric double layer forms.
  Applied electric field E → Helmholtz-Smoluchowski flow v_eo = -εζE/η (ζ = zeta
  potential, ε = permittivity, η = viscosity) — pumping without moving parts.
  Dielectrophoresis (DEP): non-uniform electric field ∇E² exerts force on
  polarizable particles F_DEP = 2πr³ε_m Re[f_CM]∇E² (Clausius-Mossotti factor
  f_CM = (ε_p - ε_m)/(ε_p + 2ε_m)) — frequency-dependent sorting of live/dead
  cells, cancer vs. normal cells. Droplet microfluidics (digital microfluidics):
  immiscible fluid droplets (water-in-oil) generated at T-junction or co-flow
  nozzle — picoliter reactors at 10,000/s rate. Application: Drop-seq (Macosko
  2015) / 10× Genomics droplet-seq — each droplet contains one cell + one
  barcoded bead → mRNA captured → single-cell RNA-seq at scale. Organ-on-chip:
  PDMS microchannels with human cells recapitulating tissue-level physiology —
  lung chip, gut chip, kidney chip for drug testing without animal models.
translation_table:
  - field_a_term: Re << 1 (Stokes flow regime)
    field_b_term: viscous force dominates inertia → laminar, fully predictable flow
    note: no turbulence; no mixing by chaotic advection; flow is time-reversible (Stokes paradox)
  - field_a_term: Péclet number Pe = vL/D
    field_b_term: ratio of advective to diffusive transport; Pe >> 1 → diffusion-limited mixing
    note: small molecules (D ~ 10⁻⁹ m²/s) diffuse across 10 μm channel in 0.1 s; proteins slower
  - field_a_term: electroosmotic flow (EOF)
    field_b_term: electrostatic pump driven by electric double layer (EDL) interaction with applied field
    note: plug-like velocity profile (unlike Poiseuille parabolic) — advantageous for electrophoresis
  - field_a_term: dielectrophoresis (DEP) force F_DEP ∝ ∇E²
    field_b_term: label-free cell sorting by dielectric properties (Re[f_CM])
    note: frequency-tunable — cancer cells have different membrane capacitance than normal cells
  - field_a_term: droplet microfluidics (W/O emulsions)
    field_b_term: picoliter reaction vessels; Poisson statistics determine cell encapsulation rate
    note: droplet size controlled by flow rates and channel geometry; barcoded beads enable cell identification
related_unknowns:
  - u-droplet-microfluidics-cell-viability-encapsulation-efficiency
related_hypotheses:

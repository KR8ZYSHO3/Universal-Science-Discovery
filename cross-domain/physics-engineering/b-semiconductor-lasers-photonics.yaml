id: b-semiconductor-lasers-photonics
title: >
  Einstein's stimulated emission (1917) and the semiconductor p-n junction
  (double heterostructure, Kroemer Nobel 2000) bridge quantum optics physics
  to photonics engineering — enabling laser diodes, VCSELs, and DFB lasers
  for fiber optic communications and photonic integrated circuits on silicon.
status: established
fields:
  - physics
  - engineering
  - photonics
  - quantum-optics
  - electrical-engineering
bridge_claim: >
  Einstein's 1917 derivation of stimulated emission established that population
  inversion (N₂ > N₁) produces optical gain g(ν) = σ(ν)(N₂−N₁), where σ is
  the stimulated emission cross-section. The Fabry-Pérot cavity condition
  2nL = mλ selects longitudinal modes with spacing Δν = c/(2nL). The semiconductor
  laser diode translates this quantum physics into a solid-state device: a p-n
  junction forward-biased to inject minority carriers into an active layer where
  they recombine radiatively. Kroemer's double heterostructure (1963, Nobel 2000)
  simultaneously confines carriers (by bandgap engineering) and photons (by
  refractive index step) — reducing threshold current by 3 orders of magnitude
  and making room-temperature CW operation possible. Threshold condition:
  g·Γ = αᵢ + (1/2L)ln(1/R₁R₂) balances modal gain (g times confinement factor Γ)
  against internal loss αᵢ and mirror loss. VCSEL (vertical cavity, ~1 μm,
  single-mode, ~1 mA threshold) and DFB laser (Bragg grating selects single
  frequency, required for dense-WDM fiber optic systems) are direct engineering
  derivatives of Fabry-Pérot resonator physics. Silicon photonics integrates
  km-scale waveguides on CMOS wafers — photonic integrated circuits (PICs).
translation_table:
  - field_a_term: population inversion (quantum optics)
    field_b_term: carrier injection above threshold in laser diode
    note: Electrical pumping of the p-n junction creates population inversion in the active layer
  - field_a_term: stimulated emission cross-section σ(ν)
    field_b_term: modal gain g(ν) in semiconductor active layer
    note: Gain spectrum in semiconductors reflects the joint density of states and occupation
  - field_a_term: Fabry-Pérot resonator (2nL = mλ)
    field_b_term: laser cavity (cleaved facets or distributed Bragg reflectors)
    note: Cleaved semiconductor facets act as partial mirrors (R ≈ 30%) to form the cavity
  - field_a_term: confinement factor Γ
    field_b_term: double heterostructure waveguiding (Kroemer design)
    note: Γ is the fraction of modal power overlapping the gain region — maximized by heterostructure design
  - field_a_term: Bragg grating (distributed feedback)
    field_b_term: DFB laser single-mode selection
    note: DFB grating selects the Bragg wavelength, suppressing all side modes for WDM applications
  - field_a_term: photonic bandgap (periodic dielectric structure)
    field_b_term: photonic crystal fiber and on-chip photonic crystal laser
    note: Photonic crystals translate semiconductor bandgap physics to photon confinement

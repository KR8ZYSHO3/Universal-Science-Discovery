cross_pollination_opportunities:
  - Use atmospheric general circulation model (GCM) solver on mantle convection problem — same equations, different parameters
  - "Apply dynamo theory (fluid magnetic field generation) to mantle: analogous to Earth's magnetic field generated by outer core convection"
  - Thermochemical mantle convection models can use same numerical methods as reactive flow in porous media (oil reservoir simulation)
communication_gap: >
  Plate tectonics is taught as a geological observation in geology courses without
  deriving the fluid dynamics that drives it. Fluid dynamicists rarely see geophysics
  as an application domain. The connection was made by McKenzie, Parker, Morgan and
  Davies but remains siloed in geophysics literature.

id: b-plate-tectonics-mantle-convection
title: >
  Plate tectonics is driven by mantle convection — thermal convection in the
  viscous mantle (η ~ 10²¹ Pa·s) governed by the same Navier-Stokes equations
  as atmospheric and oceanic fluid dynamics, with subduction as a Rayleigh-Taylor
  instability and ridge spreading as upwelling convection cells.
status: established
fields:
  - geology
  - geophysics
  - fluid-dynamics
  - physics
  - planetary-science
bridge_claim: >
  RAYLEIGH NUMBER CRITERION:
  Mantle convection occurs when the Rayleigh number exceeds the critical value:

    Ra = ρgαΔTd³ / (ηκ) >> Ra_c ≈ 10³

  For Earth's mantle: ρ = 3300 kg/m³, g = 9.8 m/s², α = 3×10⁻⁵ K⁻¹,
  ΔT = 1500 K, d = 2900 km, η = 10²¹ Pa·s, κ = 10⁻⁶ m²/s → Ra ~ 10⁷.
  This is far above Ra_c, confirming vigorous convection.

  NAVIER-STOKES AT HIGH VISCOSITY:
  At η = 10²¹ Pa·s, Re = ρvL/η ~ 10⁻²⁰ — Stokes flow regime.
  The governing equations reduce to:

    ∇p = η∇²v + ρg (Stokes equation)
    ∇·v = 0 (incompressibility)
    DT/Dt = κ∇²T + Q/ρCp (heat equation)

  These are the SAME equations (in form) as ocean circulation at large scale —
  just with viscosity 10²⁵ times larger and timescales of 10⁸ years.

  SUBDUCTION AS RAYLEIGH-TAYLOR INSTABILITY:
  Old oceanic lithosphere (cold, dense: ρ > ρ_mantle) overlies hot mantle.
  This is a Rayleigh-Taylor instability — dense layer atop light layer.
  Growth rate: σ = γ(ρ₁-ρ₂)gλ/(4π·η) where λ = wavelength.
  For ocean-continent density contrast and appropriate viscosity: σ⁻¹ ≈ 100-500 Ma,
  consistent with observed subduction initiation timescales.

  RIDGE SPREADING:
  Mid-ocean ridges are the upwelling limbs of convection cells. Seafloor
  age distribution confirms passive upwelling: oceanic crust age = distance
  from ridge / plate velocity. Heat flow over ridges follows conductive
  cooling: Q ∝ (age)^(-1/2).
translation_table:
  - field_a_term: Rayleigh number Ra (fluid dynamics)
    field_b_term: convective vigour of mantle (geophysics)
    note: Ra >> Ra_c means vigorous convection; Ra_c depends on boundary conditions (rigid vs. free-slip plates)
  - field_a_term: Rayleigh-Taylor instability (fluid dynamics)
    field_b_term: subduction initiation (plate tectonics)
    note: Sinking of cold dense lithosphere is the gravitational instability that drives plate motion
  - field_a_term: Stokes flow / creeping flow (fluid mechanics)
    field_b_term: mantle viscous deformation (geophysics)
    note: Reynolds number near zero; inertial terms negligible; pressure-driven Stokes equations govern
  - field_a_term: thermal boundary layer (convection theory)
    field_b_term: oceanic lithosphere (geology)
    note: Oceanic lithosphere IS the thermal boundary layer of mantle convection; thickness grows as sqrt(age)

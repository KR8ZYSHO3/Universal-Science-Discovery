cross_pollination_opportunities:
  - "Hybrid quantum-classical algorithms: quantum annealing can be combined with classical post-processing (tabu search, local search) in a hybrid workflow that uses the quantum processor as a subroutine, connecting quantum computing to classical operations research heuristics."
  - "Coherent Ising machines (optical parametric oscillators): laser-based systems implement the same transverse-field Ising model by coupling laser pulse amplitudes, achieving all-to-all connectivity unavailable in D-Wave — connecting quantum optics to combinatorial optimization."
communication_gap: >
  Operations researchers who use simulated annealing for scheduling and logistics
  optimization are largely unaware of the mathematical connection to quantum
  annealing and the Ising model. Quantum computing researchers working on QA
  often present it as a hardware problem without connection to the classical
  combinatorics literature where problem hardness (phase transitions, typical-case
  complexity) is well-characterized.

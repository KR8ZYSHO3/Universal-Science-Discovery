cross_pollination_opportunities:
  - >
    The maximum entropy approach (Jaynes, Econophysics) applied to the distribution
    of trade sizes and inter-trade times would derive the fat-tail and clustering
    properties from minimal information constraints — analogous to deriving the
    Boltzmann distribution from maximum entropy. This would provide a statistical
    mechanics foundation for market microstructure without assuming agent rationality.
  - >
    Non-equilibrium work theorems (Jarzynski equality, Crooks fluctuation theorem)
    from statistical physics could be applied to financial markets: the "work"
    done by price impact during large trades, and the "dissipation" into market
    maker losses, may satisfy analogous fluctuation relations. This would connect
    market efficiency to thermodynamic irreversibility.
communication_gap: >
  Econophysics emerged in the mid-1990s (Mantegna & Stanley 1995, Nature)
  when physicists trained in statistical mechanics began applying their methods
  to financial data. The reception from economists was mixed to hostile —
  economists have their own well-developed theory of financial markets
  (efficient market hypothesis, stochastic calculus, option pricing theory)
  and viewed physicists as naive about market mechanisms. Economists do not
  read Physical Review E; physicists do not read the Journal of Finance. The
  main bridge journals (Quantitative Finance, founded 2001) partially bridge
  this gap. Risk practitioners (quants) have absorbed much of the econophysics
  toolkit (random matrix theory, heavy-tail distributions, market impact modelling)
  without formal academic recognition of the cross-disciplinary transfer.

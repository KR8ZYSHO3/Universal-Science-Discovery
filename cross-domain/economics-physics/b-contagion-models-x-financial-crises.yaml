cross_pollination_opportunities:
- Import percolation finite-size scaling estimators from physics to stress-test payment networks.
- Use epidemic intervention timing results to design early liquidity facility triggers.
communication_gap: Epidemiology and finance use different jargon and institutional detail;
  cross-citations exist but parameter identifiability from partial regulatory data is seldom
  shared methodology.

id: b-contagion-models-x-financial-crises
title: Epidemic models on networks — thresholds for global spread driven by connectivity and
  transmissibility — reappear in models of financial contagion where defaults propagate via
  exposures and liquidity shocks.
status: established
fields:
- economics
- epidemiology
- network-science
- physics
bridge_claim: 'Compartmental and network SIR-style models emphasize a reproduction number–like
  threshold: below critical connectivity or shock transmission probability, disturbances die
  out locally; above it, cascades can percolate. Financial stability models represent institutions
  as nodes with asset and liability links; defaults or markdowns propagate similarly to infections
  with threshold behavior. The bridge is mathematical: both fields study monotone activation
  dynamics on graphs with general equilibrium or budget constraints substituting for mass
  conservation. Differences include strategic behavior and endogenous liquidity, which lack
  direct epidemic analogs but can be layered as heterogeneous transmission.'
translation_table:
- field_a_term: basic reproduction number R0
  field_b_term: amplification factor in exposure cascades
- field_a_term: recovery rate
  field_b_term: recapitalization / resolution speed
- field_a_term: network degree distribution
  field_b_term: interbank exposure concentration

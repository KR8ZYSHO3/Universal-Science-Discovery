id: b-dissipative-structures-economic-cycles
title: >
  Economic systems are dissipative structures maintained far from thermodynamic
  equilibrium by continuous money and energy flows — Prigogine's theory of
  non-equilibrium self-organisation predicts that economic order (price patterns,
  business cycles, Kondratiev waves) emerges spontaneously from the thermodynamic
  irreversibility of economic transactions.
status: proposed
fields:
  - economics
  - physics
  - thermodynamics
  - complex-systems
  - economic-dynamics
bridge_claim: >
  Prigogine & Stengers (1984) showed that non-equilibrium thermodynamic systems
  maintained far from equilibrium by continuous energy flux can spontaneously
  develop ordered spatial and temporal patterns ("dissipative structures") — the
  Belousov-Zhabotinsky reaction (chemical oscillations), Bénard convection cells,
  and biological morphogenesis are all dissipative structures.

  Economic systems are maintained far from thermodynamic equilibrium by:
  - Continuous energy (fossil fuels) and material inputs from outside the economic
    system
  - Human labor (endosomatic energy) converting free energy into economic value
  - Money circulation creating non-equilibrium flows that maintain price differentials

  KEY CORRESPONDENCES:

  1. BUSINESS CYCLES AS LIMIT CYCLES: The Kaldor (1940) business cycle model
     describes output Y and capital K as a dynamical system with nonlinear investment
     function I(Y, K). This system exhibits Hopf bifurcations into persistent limit
     cycle oscillations — mathematical business cycles. The same Hopf bifurcation
     mechanism that creates the Lotka-Volterra oscillation in ecology and the
     Belousov-Zhabotinsky oscillation in chemistry generates the 4-7 year business
     cycle in macroeconomics.

  2. KONDRATIEV WAVES AS SLOW DISSIPATIVE OSCILLATIONS: Kondratiev (1925) identified
     long-wave economic cycles of approximately 50 years associated with technological
     surges (steam engine, railways, electricity, ICT). These correspond to slow
     dissipative oscillations in the innovation-diffusion system: technological capital
     K_tech accumulates (charging the spring), is deployed (rapid diffusion), exhausts
     the profit gradient, and recharges via the next major innovation. The timescale
     (50 years) is set by the depreciation rate of technological capital and the
     diffusion time of new general-purpose technologies.

  3. ENTROPY PRODUCTION AND IRREVERSIBLE TRANSACTIONS: Georgescu-Roegen (1971)
     proposed that the economy is irreversible because it degrades low-entropy
     materials into high-entropy waste, consistent with the second law. Each economic
     transaction dissipates free energy; the economy's entropy production rate is
     a measure of its "throughput" (as opposed to the circular flow of neoclassical
     economics, which imagines reversible exchange).

  4. PRICES AS DISSIPATIVE SIGNALS: In a market, prices play the role of chemical
     potentials — the gradient driving material and labor flows from low-price
     (high supply) to high-price (high demand) regions. The tendency toward price
     equalisation is the economic analogue of entropy production (dissipation of
     price gradients). Market disequilibria = non-equilibrium thermodynamic gradients;
     profit opportunities = free energy differences.

  5. SPONTANEOUS ORDER AND MARKET COORDINATION: Hayek's price system as
     decentralised information processing corresponds to the spontaneous pattern
     formation in dissipative structures. The economy "discovers" Pareto-efficient
     allocations without central computation, analogous to how the Bénard cells
     discover the optimal heat-transfer pattern without a central controller.

  LIMITATIONS: The analogy is formal, not identical. Economic value is not a physical
  energy quantity. Economic "entropy" is not Shannon entropy or thermodynamic entropy
  in a precise sense. The analogy is most productive as a source of mathematical
  models (limit cycles, bifurcations) rather than as a literal physical identity.
translation_table:
  - field_a_term: "Dissipative structure (Prigogine)"
    field_b_term: "Economic market order — emergent price patterns, cycles, and institutions"
    note: "Both maintained by continuous throughput (energy in physics; money, labor, resources in economics)"
  - field_a_term: "Free energy gradient (thermodynamic driving force)"
    field_b_term: "Profit opportunity / price differential (economic driving force)"
    note: "Flows of goods and labor move to equalise price differentials, as matter flows to equalise chemical potentials"
  - field_a_term: "Entropy production rate dS/dt"
    field_b_term: "Economic throughput rate — physical resource degradation per unit time"
    note: "Georgescu-Roegen's bioeconomics: GDP growth requires proportional entropy production (resource degradation)"
  - field_a_term: "Limit cycle (Hopf bifurcation)"
    field_b_term: "Business cycle — periodic fluctuations in output, employment, investment"
    note: "Kaldor (1940), Goodwin (1967) predator-prey business cycle; both exhibit Hopf bifurcations"
  - field_a_term: "Slow dissipative oscillation"
    field_b_term: "Kondratiev wave — 45-60 year economic long wave"
    note: "Driven by innovation-diffusion dynamics; timescale set by technological capital depreciation"
  - field_a_term: "Spontaneous symmetry breaking (pattern formation)"
    field_b_term: "Market emergence — spontaneous price coordination in unplanned economies"
    note: "Hayek's 'spontaneous order'; price system as decentralised computation discovering Pareto optima"
  - field_a_term: "Bifurcation parameter (control parameter)"
    field_b_term: "Policy variable (interest rate, tax rate, aggregate demand)"
    note: "Central bank interest rate modulates where the economy sits relative to the Hopf bifurcation"

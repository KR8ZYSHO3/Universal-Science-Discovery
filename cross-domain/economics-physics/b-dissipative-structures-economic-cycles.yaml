cross_pollination_opportunities:
  - >
    Non-equilibrium statistical mechanics (NESM) has developed rigorous results
    (Fluctuation Theorem, Jarzynski equality, Crooks fluctuation theorem) that quantify
    entropy production in non-equilibrium processes. Applying these results to
    economic time series — modelling price formation as a stochastic work process —
    could give the first rigorous measure of "economic entropy production" that
    satisfies thermodynamic consistency conditions. This would operationalise
    Georgescu-Roegen's qualitative framework.
  - >
    The Goodwin (1967) predator-prey business cycle model (workers = prey, capitalists
    = predators) is a Lotka-Volterra system with a Hopf bifurcation near the equilibrium.
    Recent data (Piketty 2014) on capital-labour shares over centuries shows long-period
    oscillations consistent with Goodwin dynamics. Calibrating the Goodwin model
    to Piketty's dataset and testing whether the observed oscillation period matches
    the Hopf bifurcation prediction would provide a rigorous test of the dissipative
    business cycle hypothesis.
  - >
    Agent-based models of economies (ACE) generate emergent macroeconomic fluctuations
    from microeconomic agent rules. The relationship between ACE entropy production
    (number of agent states explored) and macroeconomic volatility is an open question.
    Measuring entropy production in ACE models as a function of market friction and
    information asymmetry could test whether irreversibility quantitatively predicts
    economic volatility.
communication_gap: >
  Prigogine and Stengers (1984) explicitly proposed the economic application of
  dissipative structure theory, but mainstream economics dismissed it as imprecise
  metaphor. Georgescu-Roegen's entropic economics was influential in ecological
  economics but marginalised in mainstream economics departments. Nonlinear dynamics
  (Kaldor, Goodwin, Goodwin cycle) has a small home in heterodox economics but is
  absent from graduate macroeconomics curricula. The Kondratiev wave is documented
  empirically but has no accepted mechanistic explanation in mainstream economic
  theory. The mutual exclusion of mathematical physics and economics journals ensures
  these connections are rarely made explicitly.

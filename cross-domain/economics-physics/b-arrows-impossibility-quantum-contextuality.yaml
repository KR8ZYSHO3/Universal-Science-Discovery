id: b-arrows-impossibility-quantum-contextuality
title: >
  Arrow's impossibility theorem in social choice theory and the
  Kochen-Specker theorem in quantum mechanics are structurally identical
  no-go results: both prove the impossibility of a globally consistent
  classical assignment — social preference orderings and quantum
  observable values — when subjected to the same type of coherence
  constraints.
status: proposed
fields:
  - quantum-physics
  - social-science
  - economics
  - voting-theory
  - foundations-of-mathematics
bridge_claim: >
  Arrow's impossibility theorem (1951) states that no social welfare
  function can simultaneously satisfy Pareto efficiency, independence of
  irrelevant alternatives (IIA), and non-dictatorship for three or more
  candidates. Formally: there is no map f: L(A)^n → L(A) (where L(A) is
  the set of preference orderings over alternatives A) satisfying all
  three axioms when |A| ≥ 3.

  The Kochen-Specker theorem (1967) states that there is no non-contextual
  hidden variable theory compatible with quantum mechanics for a Hilbert
  space of dimension ≥ 3. Formally: there is no valuation function
  v: O → ℝ (assigning definite values to observables O) that is
  simultaneously (i) consistent with QM predictions and (ii) context-
  independent (the value of observable A does not depend on which
  compatible set of observables it is measured with).

  The structural parallel is not merely metaphorical. Abramsky & Duncan
  (2012) and Abramsky & Brandenburger (2011) proved this correspondence
  rigorously using sheaf theory. The "no-global-section" obstruction is
  the same mathematical object in both cases:

  1. ARROW'S IIA = CONTEXTUALITY CONDITION: IIA says the social ranking
     of alternatives {A, B} depends only on individual preferences over
     {A, B}, not on rankings of irrelevant alternative C. This is exactly
     the non-contextuality condition: the value assigned to an observable
     should not depend on the measurement context (which other compatible
     observables are measured simultaneously).

  2. GLOBAL SECTION = CONSISTENT ASSIGNMENT: Arrow requires a globally
     consistent social preference order. KS requires a globally consistent
     value assignment to all observables. Both are impossible beyond
     trivial cases.

  3. SHEAF-THEORETIC FORMULATION: Both theorems can be stated as the
     non-existence of a global section of a certain presheaf. Local
     sections always exist (for any fixed context / agenda, preferences
     or measurement values can be assigned consistently), but they cannot
     be glued into a global section. This is the sheaf cohomology
     obstruction identified by Abramsky & Brandenburger.

  4. DIMENSION / CANDIDATE THRESHOLD: Both results require n ≥ 3 (three
     or more candidates in Arrow; Hilbert space dimension ≥ 3 in KS).
     In two-option / qubit cases, both results fail — local consistency
     patches together globally.

  CONSEQUENCES FOR MECHANISM DESIGN: The quantum-social parallel suggests
  that any mechanism design problem that shares the IIA-type structure
  will be subject to Arrow-like impossibility. Conversely, quantum
  measurement theory, which already has a rich theory of contextuality
  resources (Bell inequalities, magic-state distillation), may provide
  new algebraic tools for classifying social choice functions by their
  "contextuality degree."

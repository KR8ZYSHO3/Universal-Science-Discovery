cross_pollination_opportunities:
  - >
    Abramsky & Brandenburger's sheaf-theoretic framework can classify
    social choice functions by their contextuality degree — the minimum
    number of local-to-global consistency violations. This would give
    mechanism designers a quantitative "impossibility measure" rather than
    a binary possible/impossible.
  - >
    Quantum game theory has studied contextuality as a resource (e.g.,
    quantum strategies in the magic square game achieve super-classical
    payoffs). This suggests that quantum voting protocols — where voters'
    preferences are represented as quantum states — might escape Arrow's
    constraints in the same way quantum strategies escape classical game
    theory bounds. A rigorous exploration would require defining what
    "quantum preferences" means.
  - >
    The threshold structure (n ≥ 3 candidates; dim ≥ 3) in both results
    begs the question: is there a continuous interpolation? For social
    choice with fuzzy preferences (probabilistic rankings), does a
    "quantitative Arrow theorem" hold with a contextuality measure that
    grows continuously? This would connect to the resource theory of
    coherence in quantum information.
communication_gap: >
  Arrow's theorem is a foundational result in welfare economics and
  political science, studied in every graduate economics curriculum, but
  almost entirely without mathematical contact with quantum foundations.
  The Kochen-Specker theorem is a cornerstone of quantum logic and
  quantum information, but not taught in social science departments.
  The sheaf-theoretic unification by Abramsky et al. (2011-2012) exists
  in the computer science / quantum foundations literature but has had
  essentially zero uptake in economics or political science. The common
  obstacle is the unfamiliarity of sheaf cohomology in both communities.

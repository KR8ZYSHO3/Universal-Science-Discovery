cross_pollination_opportunities:
  - >
    The Bouchaud-Mezard prediction α = 1 + r/(g - r) (where r is redistribution
    rate and g is multiplicative growth rate) can be tested empirically by
    correlating cross-country Pareto exponents with measured redistribution rates
    (tax-and-transfer as fraction of GDP) and growth rates — a falsifiable
    quantitative prediction that economic models have not systematically tested.
  - >
    Quantum statistics (Fermi-Dirac and Bose-Einstein distributions) provide
    untested but tractable predictions for wealth distributions under minimum
    income guarantees and wealth caps. Policy simulations with agent-based
    models can test whether these distributions emerge from realistic exchange
    rules, informing optimal redistribution policy design.
  - >
    Statistical mechanics tools for non-equilibrium systems (master equations,
    fluctuation theorems, Jarzynski equality) can model economic dynamics far
    from equilibrium (crises, rapid growth periods) in ways that equilibrium
    economics cannot, providing physicists and economists with a common
    quantitative language for transient dynamics.
communication_gap: >
  Classical economics derives income distributions from optimization behavior
  (utility maximization, general equilibrium) and does not use entropy or
  statistical mechanics formalisms. The econophysics literature (mostly in
  European Physical Journal B, Physica A) has established the Boltzmann-Gibbs
  income distribution empirically and theoretically, but this work is largely
  unknown to mainstream economists who dismiss the lack of agent rationality
  assumptions as a theoretical weakness. The result is that a robust empirical
  regularity (exponential income distribution for the bottom 97%) and its
  predictive framework are not integrated into policy-relevant economic modeling.

cross_pollination_opportunities:
  - "Use spin-glass free energy methods to predict at what dataset size a transformer will 'grok' modular arithmetic"
  - "Design a 'grokking diagnostic' that measures the hidden-layer dimension (order parameter) in real time during training"
  - "Apply RG flow analysis to neural architecture search — irrelevant architectural choices should flow away under training"
  - "Use the RS/RSB transition to predict catastrophic forgetting: RSB = many metastable states = forgetting risk"

communication_gap: >
  Phase transitions in machine learning were mathematically framed by the
  statistical physics community (Sompolinsky, Gardner, Amit, Mezard — JSTAT and
  PRL papers, 1980s-90s) but were essentially ignored by the ML engineering
  community until Kaplan et al. (2020) scaling laws made the empirical power
  laws impossible to ignore. The grokking phenomenon (Power et al. 2022,
  OpenAI) was reported by ML engineers without reference to phase transition
  language; the connection was made independently in several 2023-2026 papers.
  No textbook in deep learning connects grokking to the Ising model.


cross_pollination_opportunities:
  - >
    Floer homology — a symplectic topology invariant — counts pseudoholomorphic curves
    in the symplectic manifold. These curves encode quantum corrections to classical
    trajectories. Importing Floer-theoretic methods into quantum field theory could
    provide new non-perturbative results in gauge theories, connecting string topology
    to path integrals.
  - >
    Symplectic integrators (Störmer-Verlet, leapfrog) exactly preserve the discrete
    symplectic form and therefore have much better long-term energy conservation than
    standard Runge-Kutta methods. Engineering and astrophysical N-body simulations
    have widely adopted symplectic integration, but molecular dynamics in chemistry
    and biophysics has been slower to adopt it. Systematic benchmarking of symplectic
    vs non-symplectic integrators in protein folding simulations is an under-explored
    application.
  - >
    The Arnol'd conjecture (every Hamiltonian diffeomorphism has at least as many
    fixed points as the sum of Betti numbers of M) was the key motivation for Floer's
    invention of Floer homology. It remains open whether the full Arnol'd conjecture
    holds for all symplectic manifolds; its resolution would have direct implications
    for the topology of classical periodic orbits in Hamiltonian systems.
communication_gap: >
  Arnold (1978) demonstrated that classical mechanics can be entirely reformulated
  in symplectic language, but physics textbooks still teach Hamilton's equations as
  differential equations without the geometric context. The symplectic geometry
  literature (Guillemin, Sternberg, McDuff, Salamon) is written for mathematicians.
  The deformation quantization connection (Kontsevich 1997 formality theorem, Fields
  Medal 1998) is essentially unknown to most physicists outside mathematical physics.
  The result is that physicists reinvent symplectic results in coordinate language
  while mathematicians prove theorems unconnected to physical intuition.

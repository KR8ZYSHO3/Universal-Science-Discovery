id: b-symplectic-geometry-mechanics
title: >
  Hamilton's equations are flows on a symplectic manifold (M, ω), Noether's theorem
  is the statement that Hamiltonian symmetries preserve the symplectic form, and
  quantum mechanics is the deformation quantization of the classical symplectic
  structure — making symplectic geometry the exact mathematical language of mechanics
  at every scale from classical to quantum.
status: established
fields:
  - mathematics
  - differential-geometry
  - classical-mechanics
  - quantum-mechanics
  - mathematical-physics
bridge_claim: >
  Classical mechanics is entirely captured by symplectic geometry: the phase space
  (q, p) of a mechanical system is a symplectic manifold (M, ω) where ω = dq ∧ dp
  is the symplectic 2-form. Hamilton's equations

    ṗ = -∂H/∂q,  q̇ = ∂H/∂q

  are precisely the flow of the Hamiltonian vector field X_H defined by ω(X_H, ·) = dH.
  The symplectic form is the central geometric object; every classical result in
  mechanics translates to a statement about (M, ω).

  KEY IDENTITIES:

  1. NOETHER'S THEOREM AS SYMPLECTIC GEOMETRY: A continuous symmetry of H generates
     a conserved quantity via the moment map μ: M → g* (where g is the Lie algebra
     of the symmetry group). The conservation law is exactly ω(X_H, X_G) = 0, which
     says the Hamiltonian flow preserves the symplectic form. This reformulation
     makes Noether's theorem a statement about the geometry of the phase space, not
     about differential equations.

  2. LAGRANGIAN SUBMANIFOLDS = CLASSICAL TRAJECTORIES: A submanifold L ⊂ M is
     Lagrangian if dim(L) = n and ω|_L = 0. Classical trajectories of a conservative
     system are Lagrangian submanifolds of the extended phase space. This gives a
     global (coordinate-free) characterisation of what a classical solution is.

  3. SYMPLECTIC REDUCTION = CONSTRAINT ELIMINATION: When a Lie group G acts
     on M with moment map μ, the reduced phase space is μ^{-1}(0)/G. This is the
     mathematically precise version of "eliminating constraints" in constrained
     mechanical systems (Dirac constraint quantisation). Reduction preserves the
     symplectic structure.

  4. QUANTISATION = DEFORMATION: Quantum mechanics is the deformation quantization
     of (M, ω): the algebra of classical observables C^∞(M) is deformed to the
     non-commutative algebra of quantum operators where [q̂, p̂] = iℏ. The Weyl
     quantisation map W: C^∞(M) → B(L²(ℝ^n)) is an ℏ-deformation of the Poisson
     bracket {f, g} = ω^{-1}(df, dg). In the ℏ → 0 limit, the commutator [Â, B̂]/(iℏ)
     converges to the Poisson bracket {A, B}, recovering classical mechanics exactly.

  5. LIOUVILLE'S THEOREM AS SYMPLECTIC VOLUME PRESERVATION: The phase space volume
     form ω^n / n! (the Liouville measure) is preserved by Hamiltonian flows —
     Liouville's theorem from statistical mechanics is exactly the statement that
     Hamiltonian vector fields are divergence-free in the symplectic volume form.
     This is the geometric foundation of statistical mechanics.

  6. KAM THEORY: The Kolmogorov-Arnold-Moser theorem — that most invariant tori of
     an integrable system survive small perturbations — is a theorem about the
     persistence of Lagrangian tori in the symplectic manifold under perturbation.
     The Arnol'd conjecture (proved by Floer) is a symplectic topology result that
     gives a lower bound on the number of fixed points of a Hamiltonian diffeomorphism.

id: b-gauge-theory-x-connection-forms
title: Gauge fields in physics are properly understood as connection 1-forms on principal
  bundles, unifying Yang–Mills intuition with differential-geometry language.
status: established
fields:
- theoretical-physics
- mathematics
- differential-geometry
- gauge-theory
bridge_claim: 'Physicists introduce gauge potentials A_μ to encode forces and charge parallel
  transport; mathematicians define connections on principal G-bundles that assign horizontal
  lifts to paths. Curvature corresponds to field strength F = dA + A∧A in non-abelian cases.
  The bridge makes covariant derivative, Wilson loops, and gauge transformations precise:
  gauge redundancy is fiber-coordinate freedom, not an ad hoc symmetry of equations alone.
  This translation clarifies topological sectors, Chern–Simons terms, and anomalies as geometric
  obstructions rather than algebraic tricks.'
translation_table:
- field_a_term: gauge potential A
  field_b_term: local connection 1-form on a principal bundle
- field_a_term: field strength F
  field_b_term: curvature 2-form
- field_a_term: gauge transformation
  field_b_term: fiber automorphism / change of local trivialization
related_unknowns:
- u-gauge-fields-as-bundle-connections-pedagogy
related_hypotheses:

cross_pollination_opportunities:
- Teach Yang–Mills using parallel transport on toy lattice gauge theory graphs before continuum
  limits.
- Import bundle visualization methods from mathematical physics into ML geometry on manifolds.
communication_gap: Physics introductions often delay bundles until advanced courses; mathematics
  presentations may omit physical units and measurement protocols. Students duplicate effort
  learning the same object twice.

cross_pollination_opportunities:
  - "Observe Kibble-Zurek defect formation in ultracold atom BECs as analog cosmology — test quantum Kibble-Zurek scaling experimentally"
  - "Engineer topological defect networks in liquid crystal elastomers as programmable shape-morphing materials — defect geometry determines actuation pattern"
  - "Apply homotopy classification to classify defects in active matter (topological defects in epithelial cell monolayers, bacterial nematics) where +½ and −½ defects have different activity-driven dynamics"

communication_gap: >
  Algebraic topology is a branch of pure mathematics studied by mathematicians;
  its application to defect classification in condensed matter physics is known
  to specialists in soft matter and liquid crystal physics (Mermin's 1979 Rev Mod
  Phys review is the bridge document) but not to most biophysicists, cosmologists,
  or materials scientists who encounter topological defects in their work. The
  Kibble–Zurek connection between cosmology and laboratory condensed matter is
  conceptually beautiful but remains confined to the specialist literature despite
  being accessible to any graduate-level physicist.


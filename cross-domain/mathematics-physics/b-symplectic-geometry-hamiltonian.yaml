cross_pollination_opportunities:
  - >
    Symplectic integrators (Störmer-Verlet, Ruth-Forest, RATTLE) are numerical
    integration schemes that exactly preserve the symplectic structure of the
    flow (ω is conserved to machine precision), unlike standard Runge-Kutta methods.
    This makes them qualitatively superior for long-time integration of Hamiltonian
    systems (no artificial energy drift) — relevant for N-body simulations in
    astrophysics and molecular dynamics. The mathematics → computational physics
    transfer is underappreciated in applied numerics curricula.
  - >
    Floer homology (Floer 1988) assigns a homology group to a symplectic manifold
    from its periodic orbits (solutions of Hamilton's equations). This connects
    symplectic topology to algebraic topology and provides invariants of
    Hamiltonian systems that are topological rather than dynamical. Applications
    in string theory and mirror symmetry have driven enormous mathematical
    development, but the physics motivation and the mathematical structure remain
    in separate communities.
communication_gap: >
  Symplectic geometry was developed as pure mathematics (Elie Cartan, 1920s;
  Darboux 1880s) without explicit awareness of its relevance to mechanics.
  Arnold's "Mathematical Methods of Classical Mechanics" (1974, English 1978)
  made the connection explicit and accessible, but required graduate mathematics
  expertise that most physicists lacked. Most physics graduate programmes teach
  Hamiltonian mechanics in Lagrangian/Newtonian notation without mentioning
  differential forms. Gromov's non-squeezing theorem (1985) appeared in Inventiones
  Mathematicae (pure mathematics) and its physical interpretation took years to
  become standard. The uncertainty-principle connection is sometimes noted in
  textbooks but rarely developed rigorously. Classical mechanics and differential
  geometry remain institutionally separated in most universities.

cross_pollination_opportunities:
  - >
    Multilayer network percolation: infrastructure systems (power grid, internet,
    water) are interdependent — failure of one layer triggers failures in others.
    Buldyrev et al. (2010) showed that interdependent percolation produces
    a first-order (abrupt) transition even for ER graphs, far more dangerous
    than the second-order single-network transition. Engineering interdependent
    resilience requires the mathematics of multilayer percolation, which is
    largely unexploited in infrastructure planning.
  - >
    Biological network robustness: metabolic networks, protein-protein interaction
    networks, and gene regulatory networks are all scale-free or near-scale-free.
    Percolation analysis of these networks predicts essential genes (whose removal
    destroys metabolic connectivity) and drug targets. Systematic comparison of
    predicted vs. measured essential genes across organisms tests the percolation
    prediction.
  - >
    Network medicine: disease-gene networks and drug-target networks have
    scale-free topologies. Percolation theory predicts that diseases localised
    in network neighborhoods (disease modules) are robust drug targets —
    therapeutic strategies targeting hub proteins within the disease module
    dismantle the disease subgraph without destroying global network function.
communication_gap: >
  Percolation theory was developed by mathematical physicists and published in
  Physical Review Letters and Journal of Statistical Physics. Network science
  applied this to social and technological networks (Barabási, Watts) in Science
  and Nature. The epidemiology community independently developed the concept of
  targeted vaccination without full awareness of the percolation framework.
  Infrastructure engineers design resilience criteria from engineering standards
  (N-1 reliability) without awareness of percolation theory's predictions about
  scale-free fragility. The three communities rarely cite each other.

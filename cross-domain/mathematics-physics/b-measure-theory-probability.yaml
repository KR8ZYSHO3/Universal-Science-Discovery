cross_pollination_opportunities:
  - >
    Non-commutative probability (free probability theory, Voiculescu 1992): the classical
    σ-algebra becomes a non-commutative C*-algebra, and classical independence is
    replaced by free independence. This framework unifies random matrix theory with
    quantum probability — free cumulants compute the distribution of sums of random
    matrices, explaining why eigenvalue distributions of large random matrices
    (Wigner semicircle law) are the free-probability analogues of Gaussian distributions.
  - >
    Quantum measure theory (Sorkin 1994) proposes replacing the Kolmogorov axioms with
    a grade-2 measure (allowing quantum interference) to give a measure-theoretic
    foundation for the Feynman path integral without a Hilbert space. This approach
    could reconcile general relativity's causal set discrete spacetime with quantum mechanics.
communication_gap: >
  Probability theory and physics developed through largely separate communities
  through most of the 20th century. Physicists learned probability through statistical
  mechanics (Boltzmann, Gibbs) using phase space densities, while mathematicians
  developed measure-theoretic probability following Kolmogorov. The unification was
  gradual: Kac (1949) showed the connection between Feynman path integrals and Wiener
  measure; Gleason (1957) proved the uniqueness of the Born rule using measure theory.
  Most physics curricula still teach probability informally, without σ-algebras, while
  pure mathematics probability courses rarely connect to physical applications.

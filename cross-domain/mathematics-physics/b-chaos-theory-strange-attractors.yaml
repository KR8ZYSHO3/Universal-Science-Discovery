cross_pollination_opportunities:
  - >
    Quantum chaos (quantum manifestations of classical chaos): Gutzwiller trace formula
    expresses quantum energy level density as a sum over classical periodic orbits —
    connecting quantum eigenvalue statistics (GUE/GOE random matrix theory) to the
    classical chaotic dynamics. The Bohigas-Giannoni-Schmit conjecture (1984) states
    that quantum systems whose classical limits are chaotic have GUE/GOE level spacing
    statistics. This connects dynamical systems theory, random matrix theory, and quantum
    mechanics in an unexpected unification.
  - >
    Machine learning for chaos: reservoir computing (echo state networks) can predict
    chaotic time series far beyond the Lyapunov time scale using learned representations
    of the attractor structure (Pathak et al. 2018 — Lorenz prediction using echo state
    networks). Hybrid physics-ML models (known dynamics + learned corrections) can
    extend weather forecast skill, bridging chaos theory and deep learning.
communication_gap: >
  Lorenz (1963) published in the Journal of Atmospheric Sciences — a meteorology
  journal — where his paper was largely ignored by mathematicians until Ruelle and
  Takens (1971) independently formalized strange attractors in a pure mathematics
  paper. Feigenbaum (1978) published in the Journal of Statistical Physics, where
  the RG connection was made by physicists. Experimental chaos (Libchaber's Rayleigh-
  Bénard experiments confirming Feigenbaum universality) was done by a physicist.
  The OGY chaos control paper was in Physical Review Letters. Despite the mathematical
  foundation being rigorous (Anosov, Smale, Bowen), chaos theory is primarily
  published in physics and applied mathematics venues, with limited integration into
  standard pure mathematics curricula.

cross_pollination_opportunities:
  - "Apply CFT techniques from condensed matter to calculate anomalous dimensions in QCD"
  - "Use RG flow concepts to understand why deep neural networks at initialization sit near critical points"
  - "Test universality predictions in biological systems at critical points (neural avalanches, gene expression noise)"

communication_gap: >
  Despite Wilson's Nobel Prize (1982), RG is taught differently across physics
  sub-disciplines: condensed matter physicists learn block spins, particle physicists
  learn the Callan-Symanzik equation, and string theorists learn AdS/CFT. The
  underlying mathematical unity is rarely taught as a coherent framework across these
  communities. Applied mathematics has largely ignored RG despite its potential for
  multiscale analysis of PDEs.


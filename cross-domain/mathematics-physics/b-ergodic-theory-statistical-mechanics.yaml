cross_pollination_opportunities:
  - >
    The MBL transition in disordered quantum circuits can be probed using digital
    quantum simulators (trapped ions, superconducting qubits), testing whether the
    quantum KAM-to-ergodic transition has the same universality class as the classical
    KAM threshold — a direct experimental test of the analogy.
  - >
    Statistical mechanics of black holes: Hawking radiation ergodically samples the
    Hilbert space of a black hole (Page curve); the KAM/MBL connection suggests that
    near-extremal black holes (near-integrable) may exhibit slow thermalisation,
    testable through SYK model simulations at small coupling.
communication_gap: >
  Ergodic theory developed as pure mathematics in measure theory (Birkhoff, von Neumann,
  Halmos), while statistical mechanics developed as physics (Boltzmann, Gibbs, Maxwell).
  The formal connection via Birkhoff's theorem was understood by mathematicians but
  rarely taught in physics graduate programs. KAM theory was equally siloed in
  mathematical dynamics and solar system mechanics. The connection to quantum thermalisation
  and MBL was not appreciated until the 2010s — even though physicists had known about
  FPUT (1955) and the classical integrability barrier for decades. The fields of
  ergodic theory, Hamiltonian mechanics, and condensed matter quantum physics rarely
  cite each other's foundational literature.

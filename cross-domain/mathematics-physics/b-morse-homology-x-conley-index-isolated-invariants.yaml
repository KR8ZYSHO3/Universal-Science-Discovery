communication_gap: >
  Graduate topology sequences emphasize Morse homology proofs while applied dynamics conferences cite Conley indices rarely unless attendees trained in algebraic topology seminars — physics departments encounter both primarily through specialized geometric analysis electives.
cross_pollination_opportunities:

cross_pollination_opportunities:
  - "Apply wavelet transforms (localized Fourier analysis) to non-stationary signals such as EEG and gravitational wave transients"
  - "Use the FFT structure to design quantum algorithms — the quantum Fourier transform is central to Shor's factoring algorithm"
  - "Explore compressive sensing (Candès & Tao 2006): sparse signals recoverable with far fewer measurements than Nyquist requires, exploiting sparsity in the Fourier basis"

communication_gap: >
  Mathematicians emphasise the abstract L² Hilbert space framework and functional
  analysis; physicists use Fourier decomposition as a practical computational tool;
  engineers focus on DFT/FFT implementation. Students often learn these three
  perspectives in isolation, missing the unifying conceptual thread from Fourier
  (1822) through Shannon sampling theory to quantum field theory mode expansions.


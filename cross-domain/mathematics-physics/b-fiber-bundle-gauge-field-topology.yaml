    note: "Wu & Yang (1975) - concept of nonintegrable phase factors and global formulation of gauge fields"
  - doi: "10.1098/rspa.1984.0059"
    note: "Atiyah & Bott (1983) - the Yang-Mills equations over Riemann surfaces"

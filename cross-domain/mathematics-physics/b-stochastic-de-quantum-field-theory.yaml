cross_pollination_opportunities:
  - >
    Numerical lattice QCD currently uses Hybrid Monte Carlo (HMC) for gauge field
    configurations. Stochastic quantization (Langevin dynamics on the lattice) offers
    an alternative that avoids sign problems in finite-density QCD — mathematicians
    developing SPDE regularity theory (Hairer's regularity structures) may provide
    convergence proofs needed for rigorous lattice QFT.
  - >
    Non-equilibrium stochastic thermodynamics (Jarzynski, Crooks) has direct
    analogs in non-equilibrium QFT via the Schwinger-Keldysh formalism — the
    fluctuation theorems of statistical mechanics may correspond to Ward identities
    in the Keldysh QFT, offering a new route to quantum fluctuation inequalities.
communication_gap: >
  Stochastic differential equations are studied in mathematics departments (probability
  theory, Itô calculus, SPDE theory — journals: Stochastic Processes and their
  Applications, Ann Probab) essentially independently of quantum field theory
  (theoretical physics — journals: Phys Rev D, Nucl Phys B). The Parisi-Wu paper
  appeared in Scientia Sinica (Chinese science journal) in 1981 and took years to
  propagate. The mathematical community developing regularity structures for SPDEs
  (Hairer, 2014 Fields Medal) rarely engages with QFT applications. Physicists using
  the Fokker-Planck formalism rarely cite Itô calculus literature.

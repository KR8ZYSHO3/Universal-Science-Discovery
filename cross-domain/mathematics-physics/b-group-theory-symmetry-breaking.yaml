id: b-group-theory-symmetry-breaking
title: >
  Spontaneous symmetry breaking — from ferromagnetism to the Higgs mechanism to
  crystal formation — is described by the mathematical framework of Lie group
  representations: when the ground state has symmetry H ⊂ G, the quotient G/H
  parametrises degenerate vacua and Goldstone's theorem counts the massless modes.
status: established
fields:
  - mathematics
  - group-theory
  - particle-physics
  - condensed-matter-physics
  - mathematical-physics
bridge_claim: >
  Spontaneous symmetry breaking (SSB) occurs when the ground state of a physical
  system has lower symmetry than its Hamiltonian. The mathematical structure is
  encoded in Lie group theory:

  - The system has symmetry group G (the full symmetry of the Hamiltonian).
  - The ground state breaks G down to a residual subgroup H ⊂ G.
  - The space of degenerate ground states = the coset space G/H (the orbit of one
    ground state under G).
  - Goldstone's theorem -- the number of massless bosons = dim(G) - dim(H)
    = dim(G/H), one for each broken generator.

  EXAMPLES ACROSS PHYSICS:
  - Ferromagnetism -- G = SO(3) (rotational symmetry), H = U(1) (rotation about
    magnetisation axis). Broken generators = 2 → 2 magnon branches (spin waves).
  - Crystal formation -- G = R³ (continuous translations), H = lattice Λ (discrete).
    The broken phonon modes are the acoustic phonons (Goldstone bosons of SSB).
  - Superconductivity (BCS) -- G = U(1) electromagnetic gauge, H = {1}. The Goldstone
    boson is "eaten" by the photon → Anderson-Higgs mechanism → photon mass.
  - Higgs mechanism -- SU(2)×U(1) → U(1)_EM. 3 broken generators → 3 massive weak
    bosons (W±, Z); 1 unbroken → massless photon. The Higgs field provides the
    scalar that generates the gauge boson masses.

  The mathematical language is representation theory of Lie algebras: the broken
  generators span the tangent space of G/H and correspond to the Goldstone modes.
  The Coleman-Mermin-Wagner theorem restricts SSB in 2D (no long-range order for
  continuous symmetries), derived purely from representation theory.
translation_table:
  - field_a_term: symmetry group G of the Hamiltonian
    field_b_term: symmetry of physical system above transition
    note: G describes all transformations that leave the energy functional invariant
  - field_a_term: coset space G/H
    field_b_term: manifold of degenerate ground states (order parameter space)
    note: Each point in G/H is a distinct but energetically equivalent ground state
  - field_a_term: broken generators T_a ∈ Lie(G) \ Lie(H)
    field_b_term: Goldstone boson fields (magnons, phonons, pions)
    note: One Goldstone mode per broken generator; massless in the absence of explicit breaking
  - field_a_term: representation of H (unbroken subgroup)
    field_b_term: spectrum of the ground state (particle content)
    note: Particles in the ground state transform in representations of the unbroken H
  - field_a_term: gauge symmetry + SSB (Higgs mechanism)
    field_b_term: massive gauge bosons (W±, Z); Meissner effect in superconductors
    note: Goldstone bosons become longitudinal polarisations of massive gauge fields
related_unknowns:
  - u-goldstone-boson-higher-dimensional-systems
related_hypotheses:
  - h-symmetry-breaking-universal-phase-transition-classifier
cross_pollination_opportunities:
  - Apply Lie group SSB classification to classify exotic phases of matter (topological order, fracton phases)
  - Use representation theory of the unbroken subgroup H to predict allowed quasi-particle excitations in new materials
  - Map lattice symmetry breaking in 2D materials (graphene moiré superlattices) to the G→H framework
  - Apply Coleman-Mermin-Wagner theorem to non-equilibrium statistical systems (active matter, driven lattices)
communication_gap: >
  Condensed matter physicists learn SSB through the Landau order parameter and
  Ginzburg-Landau theory; particle physicists learn it through Lie algebra
  representations and gauge theories. Both communities use the same mathematics
  but with entirely different notations, physical intuitions, and application domains.
  Cross-pollination — e.g., applying the Higgs mechanism formalism to topological
  superconductors — is rare but extremely productive when it occurs.

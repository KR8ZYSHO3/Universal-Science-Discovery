cross_pollination_opportunities:
  - >
    Topological quantum computing: non-Abelian anyons in ν=5/2 FQH states or
    Kitaev's Majorana chain can store quantum information non-locally; use K-theory
    classification to identify which physical systems can host non-Abelian anyons
    and design braiding protocols for fault-tolerant logic gates.
  - >
    Topological photonics: design photonic crystals with broken time-reversal symmetry
    (via magneto-optical effects) or sublattice symmetry breaking to realise topological
    edge states for light — unidirectional waveguides immune to backscattering defects.
  - >
    Topological classification of biological networks: apply the tenfold-way framework
    to gene regulatory networks treated as Hamiltonians; test whether biological
    networks exhibit topologically non-trivial phases that are robust to perturbations
    analogous to disorder in solid-state systems.
communication_gap: >
  Algebraic topology (fibre bundles, Chern classes, K-theory) is graduate mathematics
  taught in pure mathematics departments with no connection to condensed matter physics.
  Experimental condensed matter physicists measure quantum Hall conductance without
  necessarily understanding the Chern number proof. Topological field theory (Chern-Simons)
  bridges the two but requires both high-energy physics and differential geometry,
  creating a high entry barrier that limits cross-fertilisation.

cross_pollination_opportunities:
  - >
    Numerical lattice QCD: stochastic quantization provides the theoretical basis for
    hybrid Monte Carlo (HMC) algorithms used in lattice gauge theory simulations — the
    most computationally intensive scientific calculations (billions of CPU-hours annually).
    The HMC algorithm is literally a discretized Langevin equation; understanding its
    mathematical properties (ergodicity, mixing time, reversibility) is an SDE problem
    that directly affects the precision of quark mass and hadron spectrum calculations.
  - >
    Machine learning and diffusion models: score-based generative models (Song & Ermon 2019,
    Ho et al. 2020) learn to reverse a diffusion process (forward SDE: data → noise;
    reverse SDE: noise → data). The forward diffusion is a Langevin process; the reverse
    is a score-matched SDE. This is formally identical to stochastic quantization:
    the score function ∇log P[x] corresponds to -δS/δφ. Diffusion models for images
    are a practical instantiation of stochastic quantization of the image distribution,
    connecting deep learning to quantum field theory via SDEs.
  - >
    Stochastic quantization provides a framework for understanding quantum mechanics
    without canonical quantization — Nelson's stochastic mechanics program. This may
    offer alternative paths to quantum gravity: if spacetime geometry is the equilibrium
    of a Langevin process in super-space, the fluctuation-dissipation theorem constrains
    the allowed quantum gravity theories.
communication_gap: >
  Parisi & Wu (1981) published in Chinese (Scientia Sinica) and the result was initially
  unknown in the West; Damgaard & Hüffel (1987) wrote the comprehensive review that
  brought stochastic quantization to the Western physics community. The connection to
  modern machine learning (diffusion models) was not recognized until Song & Ermon (2019);
  the score function = -δS/δφ equivalence to stochastic quantization is mentioned
  occasionally in machine learning theory papers but has not been systematically developed.
  The SDE mathematics (Itô calculus, Fokker-Planck operators) is taught in mathematics
  departments but rarely connected to quantum field theory in physics curricula.

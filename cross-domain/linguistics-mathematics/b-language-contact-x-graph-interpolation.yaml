id: b-language-contact-x-graph-interpolation
title: Language contact spreads features across speaker networks and geography, naturally
  modeled as diffusion, interpolation, and graph dynamics on spatial social graphs.
status: established
fields:
- linguistics
- dialectology
- graph-theory
- spatial-statistics
bridge_claim: Dialect geography represents distributions of variants across locations; contact
  zones show mixing and gradual transitions (isogloss bundles). Mathematically, if villages
  or speakers are nodes and interaction strengths are edges, lexical or phonetic adoption
  can resemble graph diffusion or opinion dynamics with heterogeneous edge weights (trade
  routes, terrain barriers). Continuous limits yield PDEs on surfaces; discrete models capture
  community structure. The bridge imports network diffusion theory and Gaussian process interpolation
  on graphs into historical linguistics, while respecting that social identity can create
  discontinuous jumps not captured by pure diffusion.
translation_table:
- field_a_term: graph Laplacian diffusion
  field_b_term: spatial spreading of lexical variants
- field_a_term: interpolation kernel on a graph
  field_b_term: imputation between sampled dialect survey points
- field_a_term: bottleneck edges
  field_b_term: terrain or political barriers shaping isoglosses

cross_pollination_opportunities:
- Use graph optimal transport to align dialect distance matrices with mobility networks from
  phone data.
- Test language competition models borrowed from ecology on empirical small-language contact
  graphs.
communication_gap: Linguistic atlases are published as maps; network scientists publish diffusion
  on abstract graphs. Shared benchmarks with georeferenced corpora are emerging but not standard.

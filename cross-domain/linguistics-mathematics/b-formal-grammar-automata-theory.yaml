cross_pollination_opportunities:
  - >
    Probabilistic context-free grammars (PCFGs) developed in NLP are formally
    identical to stochastic grammars used in computational biology for RNA secondary
    structure prediction — the CYK algorithm parses both. The two communities
    developed these methods independently and cross-fertilization has improved both
    RNA structure prediction (covariance models, Eddy 1994) and statistical parsing.
  - >
    Quantum formal language theory: quantum finite automata (QFA) can recognize
    certain non-regular languages with constant memory, potentially giving a new
    complexity-theoretic characterization of natural language. Connection between
    quantum computing and linguistics remains largely unexplored.
communication_gap: >
  Chomsky's original hierarchy was developed in linguistics for theoretical syntax,
  but the computational automaton equivalences were worked out by computer scientists
  (Rabin & Scott 1959, Hopcroft & Ullman 1979). Linguists largely abandoned formal
  language theory after the "cognitive revolution" in favor of minimalist syntax;
  computer scientists use it for compiler theory. The empirical question of where
  natural language sits in the hierarchy — requiring careful corpus analysis and
  psycholinguistic experiments — falls between the two fields with no natural
  disciplinary home.

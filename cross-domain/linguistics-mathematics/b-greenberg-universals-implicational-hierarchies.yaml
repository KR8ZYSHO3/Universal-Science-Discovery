id: b-greenberg-universals-implicational-hierarchies
title: >
  Greenberg's linguistic universals — cross-linguistic statistical regularities in
  word order, morphology, and phonology — are formalized mathematically as
  implicational hierarchies and lattice structures: if a language has property X
  it tends to have property Y, forming partial orders whose structure predicts
  typological distributions and constrains theories of grammar.
status: established
fields:
  - linguistics
  - mathematics
  - cognitive-science
bridge_claim: >
  An implicational universal has the form X → Y (not converse): e.g., if a language
  has VSO order then it has prepositions (but not vice versa). Over n binary
  typological features, the set of attested language types forms a strict subset
  of the 2^n logically possible combinations. The typological space can be modeled
  as a partial order (poset) on feature bundles, where the Hasse diagram
  represents the implicational structure. Greenberg's 45 universals define a
  Boolean lattice with extensive upper/lower set structure. Statistically,
  P(feature Y | feature X) > P(Y) constitutes a "soft universal" quantified by
  Bayesian inference over language phylogenies via typological databases (WALS).
  Formal OT (Optimality Theory) grammars represent universals as universal
  constraint rankings, providing a generative algebraic framework for the
  implicational patterns.
translation_table:
  - field_a_term: linguistic universal (linguistics)
    field_b_term: implication X → Y in a logical / partial-order system (mathematics)
    note: Universal is a conditional statement; its mathematical form is Boolean implication
  - field_a_term: typological distribution across languages (linguistics)
    field_b_term: probability distribution on a lattice of type combinations (mathematics)
    note: The attested language types cluster in non-random corners of the Boolean lattice
  - field_a_term: word-order harmonic typology (linguistics)
    field_b_term: consistent linear extension of a partial order (mathematics)
    note: Harmonic typologies are languages whose features form a consistent chain in the poset
  - field_a_term: Optimality Theory constraint ranking (linguistics)
    field_b_term: total ordering on a constraint algebra (mathematics)
    note: OT grammar is mathematically a ranked constraint lattice; typological universals constrain rankings
related_unknowns:
  - u-linguistic-universals-genetic-vs-cultural-transmission-bias
related_hypotheses:
  - h-processing-efficiency-explains-word-order-universals
cross_pollination_opportunities:
  - Applying formal concept analysis (FCA / Galois lattices) to WALS data to discover new typological implicational hierarchies automatically
  - Using Bayesian phylogenetic methods to distinguish universal laws from areally/genealogically diffused features in typological databases
communication_gap: >
  Greenberg's empirical universals (1963) preceded formal mathematical treatment
  by decades; typologists, formal linguists (Optimality Theory), and statistical
  linguists use different mathematical frameworks for the same patterns;
  the explicit lattice-theoretic and Boolean algebra treatments of typological
  universals are known in formal semantics but rarely applied to Greenberg-style
  cross-linguistic statistics.
last_reviewed: "2026-05-07"

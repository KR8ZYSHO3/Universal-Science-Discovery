id: b-minority-game-economics
title: "Minority game (El Farol bar problem) ↔ market microstructure ↔ quasispecies evolution"
status: established
fields:
  - complex-systems
  - economics
  - evolutionary-biology
  - statistical-physics
  - game-theory

bridge_claim: >
  Arthur (1994) posed the El Farol Bar problem: 100 agents decide weekly whether
  to attend a bar; those in the minority (fewer than 60 attend) have fun, those in
  the majority do not. No single strategy is self-consistent if all use it.
  Challet & Zhang (1997) formalized this as the Minority Game (MG): agents submit
  binary decisions using strategies from a shared pool; the minority group wins.
  The MG exhibits a phase transition at a critical ratio alpha = P/N (strategies
  per agent): for alpha > alpha_c, the market is informationally efficient (agents
  cannot predict the outcome); for alpha < alpha_c, the market is
  informationally inefficient, with predictable patterns exploitable by clever agents.
  This maps precisely to: (1) financial market microstructure — the MG phase
  transition corresponds to the onset of market efficiency, and the critical
  exponents match empirical bid-ask spread statistics; (2) quasispecies evolution
  — strategies in the MG evolve like quasispecies on a fitness landscape, with
  the error threshold separating the viable population from the error catastrophe.
  The unifying structure is that in all three systems, competing agents/species
  using limited information produce phase transitions between ordered (predictable)
  and disordered (efficient/chaotic) states, with universal scaling at the critical
  point.

translation_table:
  - field_a_term: "minority group wins (MG)"
    field_b_term: "price-setting by the minority in financial markets"
    note: "Sellers in minority set price up; buyers in minority set price down"
  - field_a_term: "alpha = P/N phase transition"
    field_b_term: "onset of market efficiency / alpha_c = information capacity per agent"
    note: "alpha_c ~ 0.34 in canonical MG; matches empirical estimates"
  - field_a_term: "strategy pool crowding"
    field_b_term: "correlated investor strategies (momentum vs contrarian)"
    note: "Too many investors using identical strategies destroy their edge"
  - field_a_term: "MG disordered phase"
    field_b_term: "quasispecies above error threshold (viable evolving population)"
    note: "Both: disordered but functioning; information is present but noisy"
  - field_a_term: "MG ordered phase"
    field_b_term: "error catastrophe / market microstructure breakdown"
    note: "Convergence on a single strategy; predictable but self-defeating"


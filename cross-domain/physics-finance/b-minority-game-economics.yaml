cross_pollination_opportunities:
  - "Use MG phase transition to predict market regime changes: measure alpha empirically from order book data to forecast efficiency breakdown"
  - "Design mechanism markets (prediction markets, combinatorial auctions) that operate near the MG critical point for maximum information aggregation"
  - "Apply quasispecies error threshold mathematics to strategy mutation rates in algorithmic trading: predict when strategy innovation exceeds the error catastrophe threshold"
  - "Test whether ecological coexistence (competitive exclusion principle) maps to the MG ordered/disordered transition"

communication_gap: >
  Arthur published in the American Economic Review (1994). Challet & Zhang published
  in Physica A (1997). The financial market connection was made by Farmer (1999) and
  Li et al. (2000). The quasispecies connection was made by Manrubia & Zanette (2002)
  in Europhysics Letters. None of these papers cross-cite the others systematically,
  and the unified framework (phase transitions in competitive information systems)
  has no single review paper accessible to economists.


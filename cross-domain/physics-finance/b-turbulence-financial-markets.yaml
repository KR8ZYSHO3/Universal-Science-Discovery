cross_pollination_opportunities:
  - "Use turbulence intermittency models (She-Leveque 1994) to predict tail-risk statistics in financial returns"
  - "Test whether the market cascade timescale T shifts before financial crises as a leading indicator"
  - "Apply renormalisation group methods from turbulence to derive the market analogue of the Kolmogorov -5/3 law from first principles"

communication_gap: >
  Mandelbrot noticed the turbulence-finance analogy in the 1960s but it was
  treated as a metaphor by mainstream finance (which adopted Gaussian Brownian
  motion instead). Econophysics developed the quantitative multifractal models
  in the 1990s-2000s in physics journals (Physica A, Physical Review E) largely
  unread by financial economists. The 2008 crisis renewed interest but the
  communities still publish in separate journals with minimal cross-citation.


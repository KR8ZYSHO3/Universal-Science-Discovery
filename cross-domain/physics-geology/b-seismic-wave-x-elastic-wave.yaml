id: b-seismic-wave-x-elastic-wave
title: Seismic waves ↔ Elastic wave theory — P and S waves as Navier equation solutions
status: proposed
fields:
- geoscience
- physics
bridge_claim: Seismic body waves (P-waves and S-waves) are solutions of the Navier elastodynamic equation in a heterogeneous
  elastic solid; wave speed ratios (Vp/Vs) reveal rock type and fluid content via Biot-Gassmann relations, making seismology
  an application of elastic wave physics to planetary-scale media.
translation_table:
- field_a_term: P-wave (compressional seismic wave, particle motion parallel to propagation)
  field_b_term: longitudinal elastic wave (dilatational, irrotational) in Navier equation
  note: Vp = √((λ+2μ)/ρ); λ,μ = Lamé parameters; P-waves transmit through liquids
- field_a_term: S-wave (shear seismic wave, particle motion transverse to propagation)
  field_b_term: transverse elastic wave (equivoluminal, rotational) in Navier equation
  note: Vs = √(μ/ρ); Vs = 0 in fluids (μ = 0) — explains S-wave shadow zone at Earth's core
- field_a_term: Vp/Vs ratio (seismic wave speed ratio) in rock physics
  field_b_term: Poisson ratio ν = (Vp/Vs)² - 2) / (2(Vp/Vs)² - 2) in elastic theory
  note: ν = 0.5 for water-saturated rock (incompressible); ν < 0.3 for dry rock
- field_a_term: Biot-Gassmann fluid substitution (changing pore fluid changes Vp)
  field_b_term: Biot effective medium theory for porous elastic solids with fluid
  note: Gassmann equations predict Vp change when oil is replaced by water or gas — seismic 4D monitoring
cross_pollination_opportunities:
- Apply elastic wave Navier equation finite-difference simulation to design seismic metamaterials (phononic crystals) for
  earthquake isolation — periodic arrays of boreholes or inclusions that create seismic band gaps at destructive frequencies.
- Use Biot-Gassmann relations to invert seismic Vp/Vs ratios for carbon sequestration monitoring — CO₂ injection changes Vp
  but not Vs, providing a quantitative elastic wave signature for subsurface CO₂ plume tracking.
communication_gap: Seismology developed as an observational science from earthquake recordings (Richter, Gutenberg, early
  20th century) and independently developed wave propagation theory. Continuum mechanics and elastic wave theory were developed
  in mathematical physics (Cauchy, Navier, 19th century). These communities merged gradually through applied geophysics (oil
  exploration seismics), but seismologists and mechanical engineers rarely collaborate on earthquake-resistant structure design
  despite using identical governing equations.

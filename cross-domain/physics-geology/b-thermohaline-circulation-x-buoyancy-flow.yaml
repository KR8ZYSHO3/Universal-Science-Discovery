id: b-thermohaline-circulation-x-buoyancy-flow
title: >
  Ocean Thermohaline Circulation x Density-Driven Flow — AMOC as buoyancy-forced conveyor
status: proposed
fields:
  - geoscience
  - physics
  - oceanography
bridge_claim: >
  The Atlantic meridional overturning circulation (AMOC) is driven by density differences
  (temperature and salinity gradients) that create a pressure-gradient force; the Stommel
  two-box model shows AMOC has two stable equilibria (strong/weak) separated by a
  saddle-node bifurcation — a tipping point in Earth's climate system.
translation_table:
  - field_a_term: Thermohaline density difference (Δρ)
    field_b_term: Buoyancy forcing in geophysical fluid dynamics
    note: >
      Ocean density ρ(T,S) depends on temperature and salinity; poleward surface cooling
      increases density, driving sinking and deep water formation — the engine of AMOC.
  - field_a_term: AMOC transport strength (Sv = 10⁶ m³/s)
    field_b_term: Flow rate in driven buoyancy convection
    note: >
      AMOC transports ~18 Sv of water northward in the upper Atlantic; this is
      equivalent to 100 Amazon rivers and represents a dominant mechanism of
      poleward heat transport in the climate system.
  - field_a_term: Stommel two-box bifurcation
    field_b_term: Saddle-node bifurcation in ODE system
    note: >
      The Stommel model (1961) has two stable solutions: strong AMOC (temperature-
      dominated) and weak AMOC (salinity-dominated); these are separated by a
      saddle-node bifurcation at a critical freshwater flux threshold.
  - field_a_term: Freshwater forcing (melting ice sheets)
    field_b_term: Bifurcation parameter controlling equilibrium branch
    note: >
      Increased freshwater input (e.g., Greenland melt) reduces North Atlantic salinity,
      potentially pushing the system past the saddle-node bifurcation to the weak AMOC
      state — a climate tipping point with global consequences.
communication_gap: >
  Physical oceanographers studying AMOC developed box models and GCMs; dynamical systems
  theorists studied bifurcations in fluid systems; the tipping point framing (Lenton et al.
  2008) brought these communities together, but quantitative saddle-node analysis of AMOC
  with observational constraints remains an active frontier.
cross_pollination_opportunities:
  - >
    Apply early warning signal theory (critical slowing down near saddle-node bifurcation)
    to AMOC monitoring data (Caesar et al. 2021 fingerprint) to estimate proximity
    to tipping point in real time.
  - >
    Use geophysical fluid dynamics (thermal wind balance, Ekman pumping) to constrain
    Stommel box model parameters from satellite altimetry and Argo float data.
  - >
    Import bifurcation theory from dynamical systems to assess AMOC hysteresis:
    can the strong circulation be recovered once lost, or does it exhibit irreversible
    tipping?
related_unknowns:

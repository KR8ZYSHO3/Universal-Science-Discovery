id: b-plate-tectonics-x-convection
title: >
  Plate tectonics x Mantle convection - lithospheric plates as convective cells
status: proposed
fields:
  - geoscience
  - physics
  - fluid_mechanics
  - geophysics
bridge_claim: >
  Plate tectonics is the surface expression of thermally driven mantle convection;
  subducting slabs are the cold, dense downwellings and mid-ocean ridges are upwellings
  in a Rayleigh-Benard convection cell with Rayleigh number Ra ~ 10^7 — far exceeding
  the critical Ra ~ 10^3 for convection onset, making Earth's mantle a high-Ra turbulent
  convecting fluid whose surface pattern (plates) is the high-viscosity lid of the
  convection cell.
translation_table:
  - field_a_term: tectonic plate motion (geoscience)
    field_b_term: convective flow in Rayleigh-Benard convection (fluid mechanics)
    note: Plates are the surface manifestation of convective cells; plate velocity is the surface flow velocity of the convecting mantle
  - field_a_term: subducting oceanic slab (geoscience)
    field_b_term: cold, dense downwelling plume in convection (fluid mechanics)
    note: Subducting slabs are the cold downwellings; their negative buoyancy provides the main driving force for plate motion (slab pull)
  - field_a_term: mid-ocean ridge spreading (geoscience)
    field_b_term: hot upwelling in Rayleigh-Benard convection (fluid mechanics)
    note: Ridge spreading centers are upwellings; however, ridges are largely passive — driven by slab pull, not active upwelling
  - field_a_term: mantle viscosity eta ~ 10^21 Pa·s (geophysics)
    field_b_term: high-viscosity fluid in Stokes flow regime (fluid mechanics)
    note: Mantle flow is at Re ~ 10^-20 (Stokes regime); viscosity controls the Ra and thus convection style (sluggish vs. vigorous)
communication_gap: >
  Geologists studying continental drift (Wegener 1912) and fluid dynamicists studying
  Rayleigh-Benard convection (Benard 1900) developed parallel frameworks; the connection
  was made by Holmes (1931) proposing convection as the driver of drift, and quantified
  by mantle convection models (McKenzie 1968) — but the question of whether plates drive
  mantle flow or vice versa remains debated, reflecting the difficulty of coupling surface
  observations to interior dynamics.
cross_pollination_opportunities:
  - Apply Rayleigh-Benard convection theory and scaling laws to predict mantle convection style on exoplanets from mass and internal heat flux measurements
  - Use high-Ra convection transition theory to understand the Earth's tectonic mode — why plate tectonics (mobile lid) rather than stagnant lid (Venus/Mars) or episodic lid (early Earth)

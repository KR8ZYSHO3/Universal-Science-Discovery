cross_pollination_opportunities:
  - >
    Network diffusion models (NDM) seeded with a single tau-positive region and
    propagated via the structural connectome predict Braak-stage tau PET patterns
    across subjects. This model requires no free parameters beyond the connectome
    itself — validating it prospectively in longitudinal cohorts would establish
    connectome topology as a predictive biomarker superior to amyloid PET alone.
  - >
    Graph-theoretic ictogenicity scoring of pre-surgical EEG networks could replace
    the current trial-and-error approach to epilepsy surgery targeting. Seizure
    onset zones identified by eigenvector centrality anomalies in interictal networks
    show better post-surgical outcome prediction than MRI lesion identification alone.
  - >
    Parkinson's alpha-synuclein spreads from the gut/olfactory bulb along anatomical
    connections in a pattern consistent with graph distance from the origin node —
    the Braak hypothesis for PD can be quantitatively tested using connectome
    diffusion models, providing staging biomarkers from prodromal constipation/
    hyposmia through motor onset.
  - >
    "Connectome-informed brain stimulation": delivering TMS or DBS to nodes that
    maximize network-theoretic impact (high betweenness, bridges between modules)
    rather than lesion sites would use the same optimal-control-on-graphs framework
    used in infrastructure resilience engineering.
communication_gap: >
  Clinical neurology and network neuroscience publish in largely non-overlapping
  journals (Lancet Neurology, JAMA Neurology vs. Nature Neuroscience, Network
  Neuroscience). Graph-theoretic terminology (spectral gap, Laplacian eigenvectors,
  rich-club) is unfamiliar to clinicians trained on anatomy and pharmacology.
  MRI tractography data required for structural connectomics is available in most
  academic medical centers but is rarely analyzed with graph tools outside
  specialized computational labs. Clinical trial endpoints (cognitive tests, PET
  staging) do not yet include connectome metrics, preventing validation in
  large powered cohorts.

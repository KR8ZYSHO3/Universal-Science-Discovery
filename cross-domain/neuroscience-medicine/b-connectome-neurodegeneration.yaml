id: b-connectome-neurodegeneration
title: >
  Graph-theoretic measures of brain connectome topology (clustering coefficient,
  path length, hub vulnerability) that characterize healthy neural networks predict
  neurodegenerative disease progression and clinical treatment targets in Alzheimer's,
  Parkinson's, and epilepsy.
status: proposed
fields:
  - network-neuroscience
  - computational-neurology
  - graph-theory
  - clinical-medicine
bridge_claim: >
  Network neuroscience applies graph theory to the brain's connectome — the
  wiring diagram of structural and functional connections between regions. The
  same measures used to characterize small-world networks in physics (clustering
  coefficient C, characteristic path length L, hub centrality) directly predict
  which brain regions accumulate pathological protein (amyloid, tau, alpha-synuclein)
  first, how fast neurodegeneration spreads, and which therapeutic targets will
  have the greatest leverage.

  Alzheimer's disease preferentially attacks high-centrality "hub" regions
  (default mode network: posterior cingulate, precuneus, angular gyrus) — exactly
  the nodes predicted by network hub vulnerability theory to accumulate the most
  pathological load from neuronal activity-driven amyloid secretion. Tau spreads
  along axonal connections following a network-diffusion process that matches
  Braak staging when seeded from the entorhinal cortex.

  Epilepsy seizure onset zones are structurally distinguishable from surrounding
  tissue by their anomalous clustering: they are locally over-connected (high
  clustering) relative to their path length, creating resonance pockets where
  excitation recurs. Surgical resection guided by graph-theoretic ictogenicity
  measures outperforms lesion-based targeting.

  The mathematics is not metaphorical — the same eigenvector centrality, spectral
  gap, and random-walk diffusion models used in network science apply directly
  to neural graphs where nodes are brain regions and edges are tractography
  streamlines or functional correlation.
translation_table:
  - field_a_term: clustering coefficient C
    field_b_term: local recurrent connectivity density in cortical circuits; elevated in seizure onset zones
    note: High C with low L defines small-world topology; disease disrupts this balance
  - field_a_term: characteristic path length L
    field_b_term: mean axonal communication distance; increases in Alzheimer's white matter degeneration
  - field_a_term: hub node (high betweenness or eigenvector centrality)
    field_b_term: default-mode network regions (precuneus, posterior cingulate) — earliest amyloid accumulation sites
  - field_a_term: network diffusion / graph Laplacian propagation
    field_b_term: trans-synaptic spread of tau and alpha-synuclein along connectome edges
  - field_a_term: spectral gap (lambda_2 of graph Laplacian)
    field_b_term: connectome resilience to lesioning; predicts cognitive reserve capacity
  - field_a_term: rich-club coefficient
    field_b_term: high-cost, high-capacity cortical backbone attacked preferentially in neurodegeneration

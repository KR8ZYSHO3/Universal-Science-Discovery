id: b-tsunami-shallow-water-x-dispersive-soliton-bore
title: >
  Long-wavelength tsunami propagation over varying depth is commonly modeled with shallow-water equations whose nonlinear and dispersive corrections predict bore formation, shock-like steepening, and — in idealized integrable limits — solitary-wave solutions resembling solitons, though real ocean tsunamis span rupture complexity, bathymetry focusing, and dissipation beyond textbook KdV universality.
status: established
fields:
  - geophysics
  - fluid-mechanics
  - oceanography
bridge_claim: >
  Linear shallow-water theory explains propagation speeds c = √(g h) and teleseismic arrival ordering; nonlinearity steepens wave fronts into bores when dispersion is weak. Weakly nonlinear dispersive models (Boussinesq / KdV limits) connect to soliton mathematics for idealized initial disturbances — **speculative transfer** when claiming a particular tsunami event behaved like an integrable soliton rather than a turbulent bore on a shelf. Field-scale validation requires comparing nondimensional Ursell numbers, depth variation, and bottom friction to model regimes.
translation_table:
  - field_a_term: shallow-water phase speed √(g h)
    field_b_term: leading-edge arrival time constraints for long waves
    note: Cornerstone shared prediction across tsunami engineering and theory.
  - field_a_term: bore / hydraulic jump structure in NS shallow-water limits
    field_b_term: steep arriving wave fronts with embedded turbulence and breaking
    note: Breaks clean soliton picture — labeled caution for metaphor-heavy explanations.
  - field_a_term: KdV soliton solution under balance of nonlinearity and dispersion
    field_b_term: rare idealized laboratory tsunami analogs and stylized initial-value problems
    note: Pedagogical bridge — not a blanket claim for megathrust-generated tsunamis.
communication_gap: >
  Tsunami warnings emphasize seismic sources and inundation mapping while mathematical physics courses emphasize integrable models — public-facing soliton metaphors often omit bore formation and bathymetry scattering that dominate coastal observations.
cross_pollination_opportunities:
  - Couple high-resolution DART buoy time series with bore versus dispersive regime classifiers using nondimensional scaling groups from fluid mechanics.
  - Use inverse tsunami elevation reconstruction benchmarks from geophysical inverse problems classes alongside classical shallow-water numerics labs.

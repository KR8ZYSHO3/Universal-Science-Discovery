    note: "Allen et al. (2009) — earthquake early warning systems (Annu. Rev. Earth Planet. Sci.)."
  - doi: "10.1115/1.3662552"
    note: "Kalman (1960) — linear filtering update algebra baseline (ASME J. Basic Eng.)."

cross_pollination_opportunities:
  - >
    DNA-coated colloidal particles (DNA nanotechnology + colloid science) enable
    programmable specific interactions between colloidal particles — selective
    complementary DNA hybridisation plays the role of a specific chemical bond.
    This allows design of colloidal crystals with arbitrary crystal symmetries
    beyond FCC/BCC — accessing non-equilibrium crystal structures not found
    in atomic systems.
  - >
    Active colloidal particles (Janus particles with asymmetric catalytic surfaces)
    generate their own propulsion via chemical gradients, creating far-from-equilibrium
    colloidal suspensions. These are model systems for active matter physics
    (bacterial suspensions, cytoskeletal dynamics) accessible to direct single-particle
    tracking by microscopy.
communication_gap: >
  Colloidal chemistry developed as an applied field (pigments, foods, pharmaceuticals,
  coatings) largely independently of the condensed-matter statistical mechanics
  that provides its theoretical foundation. The entropy-driven crystallisation result
  (Pusey & van Megen 1986) appeared in Nature but took years to percolate into
  chemistry textbooks. The glass transition work by van Blaaderen and Wiltzius (1995)
  using confocal microscopy appeared in Nature but is not yet standard in
  physical chemistry curricula. The DLVO framework is well-known in colloid
  chemistry but its connection to Debye-Hückel theory (electrolyte physics)
  is rarely made explicit in either field's pedagogy.

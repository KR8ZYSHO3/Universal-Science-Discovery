id: b-percolation-threshold-x-polymer-gelation
title: >
  Random bond percolation maps gelation of branched polymers near the sol–gel transition — connectivity emerges above a critical fraction p_c of bonded sites/links — mirroring Flory–Stockmayer gel theory where number-average divergences signal infinite molecular weight clusters at the same topological connectivity threshold language used in polymer chemistry pedagogy.
status: established
fields:
  - statistical-physics
  - polymer-science
  - physical-chemistry
bridge_claim: >
  Percolation theory quantifies emergence of a spanning cluster on lattices or random graphs as bond probability crosses p_c.
  Gelation treats pairwise bonds between monomer units; near the transition the gel fraction rises sharply while viscosity diverges — physicists often describe this as percolation on a connectivity graph defined by reacted bonds.
  Mean-field gelation exponents align with Bethe lattice percolation where loops are neglected; real polymers introduce loop corrections but retain percolation imagery for connectivity thresholds.
translation_table:
  - field_a_term: Percolation probability p vs occupied bonds
    field_b_term: Extent of reaction / fraction of functional groups reacted in polymerization
    note: Gel point corresponds to connectivity threshold analogous to p → p_c from below.
  - field_a_term: Spanning cluster mass scaling near p_c
    field_b_term: Gel fraction and weight-average molecular weight divergence
    note: Divergent connectivity drives rheological gelation signatures.
  - field_a_term: Correlation length ξ ~ |p − p_c|^{-ν}
    field_b_term: Mesh correlation length / blob size growth approaching gel point
    note: Analogous diverging length scales govern diverging viscosity near gelation.
  - field_a_term: Bethe lattice percolation exponents
    field_b_term: Classical Flory–Stockmayer tree statistics (loop-free approximation)
    note: Exact agreement on trees; deviations quantify loop effects in real polymers.
communication_gap: >
  Polymer textbooks emphasize functional-group chemistry and classical gel equations while statistical mechanics curricula teach percolation on abstract graphs with less molecular chemistry vocabulary.
cross_pollination_opportunities:
  - >
    Apply finite-size scaling from percolation numerics to microrheology datasets taken across polymerization time to extract ν and test universality class hypotheses for specific chemistries.
  - >
    Build hybrid simulations coupling reaction kinetics with bond-percolation updates each timestep for UV-curing resins used in additive manufacturing.

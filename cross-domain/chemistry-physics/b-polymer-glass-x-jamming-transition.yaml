id: b-polymer-glass-x-jamming-transition
title: >
  Polymer glass transition x Jamming - structural arrest as point J
status: proposed
fields:
  - chemistry
  - physics
  - soft_matter
  - materials_science
bridge_claim: >
  The glass transition in polymers and the jamming transition in dense granular media are
  unified by the jamming phase diagram (Liu and Nagel 1998); both are examples of kinetic
  arrest where the system becomes mechanically rigid without long-range order, both share
  diverging relaxation timescales and dynamically heterogeneous dynamics, and both occur
  at a critical density (point J) where the system transitions from fluid-like to
  solid-like response — making polymer physics and granular mechanics two faces of the
  same non-equilibrium phenomenon.
translation_table:
  - field_a_term: glass transition temperature T_g (polymer chemistry)
    field_b_term: jamming temperature axis in Liu-Nagel phase diagram (physics)
    note: T_g is the polymer manifestation of the temperature-driven jamming transition; both represent kinetic arrest of structural rearrangement
  - field_a_term: alpha-relaxation time tau_alpha diverging at T_g (polymer dynamics)
    field_b_term: diverging relaxation time at jamming point J (granular physics)
    note: Both systems show super-Arrhenius divergence of relaxation time; Vogel-Fulcher-Tammann in polymers maps to power-law divergence near J
  - field_a_term: dynamic heterogeneity (mobile and immobile regions in glass) (polymer physics)
    field_b_term: force chain heterogeneity in jammed granular media (granular physics)
    note: Both systems show spatially heterogeneous dynamics with growing correlation length on approach to arrest
  - field_a_term: free volume theory of glass transition (polymer chemistry)
    field_b_term: random close packing volume fraction phi_J ~ 0.64 (granular physics)
    note: Polymer glass transition at T_g corresponds to free volume approaching zero, analogous to granular jamming at phi_J
communication_gap: >
  Polymer chemists characterizing T_g and granular physicists studying dense flow
  developed separate frameworks for structural arrest; the unifying jamming phase diagram
  (Liu and Nagel 1998) connected these communities but the quantitative mapping between
  polymer fragility (Angell plot) and granular jamming criticality is still actively
  debated, with colloidal suspensions serving as the experimental bridge system.
cross_pollination_opportunities:
  - Apply mode-coupling theory (MCT) from glass physics to predict jamming transitions in active matter systems (swimming bacteria, self-propelled colloids) where activity plays the role of temperature
  - Design new polymer processing methods by exploiting the jamming phase diagram — controlling T_g through applied stress (mechanochemistry) analogous to stress-driven unjamming in granular media

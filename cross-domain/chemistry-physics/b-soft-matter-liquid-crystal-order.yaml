id: b-soft-matter-liquid-crystal-order
title: >
  Liquid crystals bridge chemistry and physics: the nematic Frank elastic energy
  (splay/twist/bend constants KΓéü, KΓéé, KΓéâ), the Freedericksz transition enabling
  LCD displays, and cholesteric structural color in beetle exoskeletons all emerge
  from broken orientational symmetry in anisotropic molecules.
status: established
fields:
  - chemistry
  - physics
  - soft-matter
  - materials-science
  - photonics
bridge_claim: >
  Liquid crystals (LCs) are intermediate phases between isotropic liquids and
  crystalline solids, bridging soft matter chemistry (molecular anisotropy, synthesis)
  and condensed matter physics (symmetry breaking, order parameters, defects).
  The nematic phase: long-range orientational order described by director field n╠é
  without positional order. The order parameter S = Γƒ¿PΓéé(cos ╬╕)Γƒ⌐ = Γƒ¿(3cos┬▓╬╕-1)/2Γƒ⌐
  measures alignment (S=0 isotropic, S=1 perfect). Frank elastic free energy:
  F = ┬╜KΓéü(Γêç┬╖n╠é)┬▓ + ┬╜KΓéé(n╠é┬╖Γêç├ùn╠é)┬▓ + ┬╜KΓéâ(n╠é├ùΓêç├ùn╠é)┬▓ ΓÇö the three elastic modes
  are splay (KΓéü), twist (KΓéé), and bend (KΓéâ). Freedericksz transition: at electric
  field E > E_c = ╧ÇΓêÜ(KΓéü/(╬╡ΓéÇ╬ö╬╡))/d (for splay geometry), the nematic director
  realigns from parallel to the field ΓåÆ the basis of LCD pixel switching. Cholesteric
  LCs: chiral nematic with helical pitch p ΓåÆ selective reflection at ╬╗ = n┬╖p ΓÇö
  structural color (iridescent colors in beetle exoskeletons, butterfly wings,
  cephalopod skin). Active liquid crystals (ΓåÆ Bridge 265): bacterial suspensions
  and cytoskeletal filaments with motor proteins ΓÇö non-equilibrium, self-propelled
  LCs with spontaneous flow. Topological defects (disclinations): integer-strength
  defects in 3D nematics (escaped radial defect); half-integer defects in 2D
  nematics. Defect coarsening after quench from isotropic phase: defect density
  decays as ╧ü(t) ~ t^{-1/2} (universal for 2D nematics), t^{-1} for 3D.
translation_table:
  - field_a_term: nematic director field n╠é (unit vector)
    field_b_term: order parameter field (broken O(2) rotational symmetry)
    note: n╠é and -n╠é are equivalent (head-tail symmetry); the manifold of degenerate ground states is RP┬▓
  - field_a_term: Frank elastic constants KΓéü, KΓéé, KΓéâ (pN scale)
    field_b_term: stiffness of orientational distortions (splay, twist, bend)
    note: derived from molecular anisotropy; K_i ~ k_B T / molecular length scale
  - field_a_term: Freedericksz transition (critical field E_c)
    field_b_term: second-order phase transition in director orientation
    note: switching voltage for LCD pixels derived from this; KΓéü and ╬ö╬╡ determine pixel response time
  - field_a_term: cholesteric pitch p (nm to ╬╝m range)
    field_b_term: wavelength of selective reflection ╬╗ = n┬╖p
    note: chiral dopant concentration sets pitch; p tunable over visible spectrum ΓåÆ structural color
  - field_a_term: topological defects (disclination lines)
    field_b_term: topological charges classified by fundamental group ╧ÇΓéü(RP┬▓) = ZΓéé
    note: half-integer defects cannot be removed by continuous deformation; annihilate in pairs

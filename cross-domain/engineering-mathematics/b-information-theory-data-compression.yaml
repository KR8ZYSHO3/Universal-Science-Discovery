cross_pollination_opportunities:
  - Test whether the human visual system operates near the rate-distortion curve for
    natural images — comparing neural compression efficiency (measured via fMRI
    encoding models) to JPEG-2000 performance on matched image sets
  - Apply arithmetic coding ideas to DNA storage systems where the source
    distribution is known — enabling provably optimal encoding of genomic data
  - Use LZ complexity (Lempel-Ziv complexity measure) as an empirical entropy
    estimator for neural spike trains and EEG signals
  - Design compression algorithms for scientific data (HEP collider output,
    genomics BAM files) using domain-specific source models that approach H
    more closely than general-purpose compressors
communication_gap: >
  Shannon's original papers are mathematically dense and rarely read by working
  software engineers. The connection between the mathematical rate-distortion theorem
  and the engineering design of codecs like HEVC or Opus is mediated by decades
  of lossy compression research that is not taught in either pure mathematics or
  standard computer science curricula. Information theorists who prove new bounds
  rarely implement codecs; codec engineers rarely read Shannon's original 1959
  rate-distortion paper. This gap has slowed the adoption of theoretically optimal
  approaches (e.g., asymmetric numeral systems replacing Huffman in modern codecs).

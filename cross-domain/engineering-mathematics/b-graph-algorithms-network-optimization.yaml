cross_pollination_opportunities:
  - >
    Quantum graph algorithms: Grover's algorithm provides O(√N) speedup for unstructured
    search, enabling O(√VE) quantum Dijkstra on certain graph representations. Quantum
    minimum spanning tree algorithms (Durr et al. 2004) run in O(√(VE)) quantum time
    vs. O(E log V) classically. Whether quantum speedups are achievable for TSP remains
    a major open question — the best quantum TSP algorithm still requires exponential
    space.
  - >
    Graph neural networks (GNNs) for combinatorial optimization: message-passing GNNs
    can learn heuristics for TSP and vehicle routing that outperform Christofides on
    specific instance distributions in polynomial time. The mathematical connection
    between GNN expressivity (Weisfeiler-Leman graph isomorphism hierarchy) and
    approximation algorithm guarantees is an active research frontier.
communication_gap: >
  Graph algorithms developed in both mathematics (combinatorics, graph theory) and
  computer science (algorithms and complexity). Operations research adopted these
  results but maintains separate journals (Management Science, Operations Research)
  from theoretical computer science (STOC, FOCS). Engineering practice often uses
  proprietary solver implementations (CPLEX, Gurobi) without direct engagement
  with the underlying algorithmic literature. The 2021 Karlin-Klein-Gharan improvement
  on Christofides was a 47-year-delayed breakthrough that received little engineering
  press coverage despite its foundational implications.

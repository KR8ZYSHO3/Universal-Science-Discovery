cross_pollination_opportunities:
  - "Apply neural operator learning (Fourier Neural Operator, FNO) to replace expensive PDE solvers in climate and fluid dynamics with neural network surrogates trained on simulation data"
  - "Use randomised numerical linear algebra (sketching, random projections) to solve large-scale inverse problems in geophysics and medical imaging at reduced cost"
  - "Develop mixed-precision training methods (FP8 forward, FP32 accumulation) that approach Landauer energy limits for AI training while maintaining numerical stability"

communication_gap: >
  Numerical analysts (mathematics departments), computational scientists (physics,
  engineering), and ML engineers (CS departments) have largely parallel literatures
  on iterative methods, time integration, and matrix factorisation. GPU programming
  (CUDA) is primarily a CS/engineering skill but determines the practical performance
  of all scientific simulation codes. Climate scientists who use numerical models
  rarely engage with the theoretical numerical analysis literature; numerical analysts
  rarely validate methods on real PDE applications. High-performance computing
  education remains scattered across disciplines.


cross_pollination_opportunities:
  - >
    Mirror descent / entropic descent: replacing Euclidean distance in the proximal
    step with Bregman divergence D_φ(x,y) = φ(x) - φ(y) - ∇φ(y)·(x-y) generalizes
    gradient descent to non-Euclidean geometries. Online mirror descent achieves optimal
    regret O(√T) in online learning (Shalev-Shwartz 2012) — connecting optimization
    theory to information geometry (Amari's natural gradient uses Fisher metric Bregman
    divergence, connecting to statistical manifolds).
  - >
    Second-order methods (Newton, quasi-Newton BFGS): using curvature information
    ∇²f (or its approximation) achieves superlinear convergence near optima but at
    O(d²) cost per iteration. The tradeoff between first-order (cheap, slow) and
    second-order (expensive, fast) methods is a mathematical problem about the
    spectral properties of ∇²f, connecting to random matrix theory for large neural networks.
communication_gap: >
  Nesterov (1983) published the accelerated gradient method in a Russian-language
  journal (Doklady Akademii Nauk) and the result was unknown in Western machine
  learning until the late 2000s. Boyd et al. (2011) ADMM monograph in Foundations
  and Trends made convex optimization accessible to engineers and machine learning
  practitioners without background in convex analysis. Rockafellar (1970) remains
  the definitive mathematical reference but is rarely cited by machine learning engineers.

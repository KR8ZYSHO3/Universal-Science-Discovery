id: b-control-theory-lie-groups
title: >
  The geometric structure of nonlinear control systems on Lie groups — characterised
  by the Chow-Rashevski theorem via the Lie algebra rank condition — provides the
  correct framework for robotic motion planning and spacecraft attitude control,
  replacing Euclidean linearisation methods that fail for large-angle maneuvers.
status: established
fields:
  - engineering
  - mathematics
  - robotics
  - differential-geometry
bridge_claim: >
  Classical linear control theory (PID, LQR, Kalman filter) works in Euclidean spaces
  (ℝⁿ) where linear approximations remain valid near an operating point. For robotic
  systems and spacecraft, the configuration space is not Euclidean but a Lie group:
  the group SE(3) = SO(3) ⋉ ℝ³ of rigid body motions (rotations × translations).
  Attempting to represent SO(3) in Euclidean coordinates (Euler angles) introduces
  singularities (gimbal lock) and produces coordinate charts that fail to cover the
  full manifold. Quaternion representations double-cover SO(3), causing unwinding
  in feedback control (controller drives the system the long way around the sphere).

  Controllability on Lie groups — Chow-Rashevski theorem: a control system ẋ = Σ uᵢgᵢ(x)
  (where gᵢ are vector fields on a manifold M) is controllable if the Lie algebra
  generated by {g₁, g₂, ...} (including all iterated Lie brackets [gᵢ, [gⱼ, gₖ]]) 
  spans the tangent space at every point. This is purely an algebraic condition on
  the vector fields, not a linear systems condition.

  Example: the front-wheel-drive car. The two controls are: (1) forward velocity,
  (2) steering angle. In ℝ³ (x, y, θ), these two vector fields do NOT span the
  3D tangent space (the car cannot move sideways directly). But the Lie bracket
  [f₁, f₂] (the commutator) generates a third independent direction — the car can
  achieve any position by the parallel parking sequence (a Lie bracket maneuver).
  The system is controllable despite its 2D input space.

  SE(3) for robotics: a rigid body in 3D has configuration space SE(3). The Lie algebra
  se(3) has 6 generators: 3 rotational (ωx, ωy, ωz) and 3 translational (vx, vy, vz).
  Pontryagin's maximum principle (PMP) applied to Lie groups gives the optimal control
  equations as Hamilton-Jacobi equations on the dual Lie algebra g* (coadjoint equations):
  dμ/dt = -ad*_{H_μ}μ (where ad* is the coadjoint representation).

  Applications in aerospace: spacecraft attitude control using reaction wheels requires
  optimal maneuvers on SO(3). The geometric phase (Berry's phase analogy for classical
  mechanics) means that a sequence of attitude maneuvers with zero net solid angle can
  accumulate a net rotation — relevant for attitude control and the falling cat problem.
  Optimal paths on SO(3) (geodesics under the Killing metric) give minimum-energy
  attitude maneuvers.

  Applications in robotics: snake robots, manipulation with contacts, and multi-fingered
  grasping all involve nonholonomic constraints that create systems controllable only
  via Lie bracket maneuvers. Geometric control algorithms (from Bullo & Lewis 2005)
  provide coordinate-free motion planners that work globally on the configuration
  manifold without local chart limitations.
translation_table:
  - field_a_term: Lie group G (configuration space of mechanical system)
    field_b_term: state space X of control system
  - field_a_term: Lie algebra g (tangent space at identity)
    field_b_term: linearised control inputs at operating point
  - field_a_term: Lie bracket [f, g] (commutator of vector fields)
    field_b_term: second-order maneuver achievable by combining first-order inputs
  - field_a_term: Chow-Rashevski theorem (Lie algebra rank condition)
    field_b_term: controllability condition for nonlinear systems
  - field_a_term: "exponential map exp: g → G"
    field_b_term: finite rotation from infinitesimal generator (ωt)
  - field_a_term: "adjoint action Ad_g: g → g"
    field_b_term: coordinate transformation of velocity under configuration change
  - field_a_term: geodesic on Lie group (optimal path under left-invariant metric)
    field_b_term: time-optimal or energy-optimal control trajectory
  - field_a_term: nonholonomic constraint (rolling without slipping)
    field_b_term: system with fewer control inputs than state dimensions

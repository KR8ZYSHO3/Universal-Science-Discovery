cross_pollination_opportunities:
  - >
    Robotic surgical systems (e.g. da Vinci) require SE(3) control for instruments
    operating in confined 3D cavities — geometric controllers on SE(3) could improve
    accuracy and reduce computation vs. Jacobian linearisation methods. Real-time
    implementation of Lie group optimal control on embedded hardware (Raspberry Pi
    class) could enable this transition.
  - >
    Lie group machine learning (Geometric Deep Learning): equivariant neural networks
    that respect the SE(3) symmetry of 3D space have revolutionised protein structure
    prediction (AlphaFold2). The same mathematical structure (group equivariance)
    applies to control policy learning — SO(3)-equivariant policies for manipulation
    should generalise better across orientations than unconstrained networks.
communication_gap: >
  Control theory and Lie group mathematics developed in separate communities. Lie groups
  were studied by mathematicians (Sophus Lie, Cartan, Weyl) and theoretical physicists
  (gauge theory, particle physics). Engineering control theorists (Kalman, Zames, Åström)
  worked predominantly in linear systems and Euclidean state spaces. Brockett (1972)
  first explicitly connected Lie brackets to controllability for engineers, but the
  resulting literature (geometric mechanics, Bullo & Lewis 2005) remained in academic
  robotics. Practising control engineers in aerospace and robotics industry primarily
  still use quaternion-based or Euler angle methods, despite their theoretical limitations.

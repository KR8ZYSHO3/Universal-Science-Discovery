cross_pollination_opportunities:
- Use DEC-based integrators for plasma and MHD problems where preserving div–curl structure
  matters.
- Port FEEC-based error estimators into structural engineering adaptive meshing pipelines.
communication_gap: Engineering FEM courses emphasize patch tests; mathematics FEEC courses
  emphasize complexes. Practitioners may not recognize they already implement DEC-adjacent
  schemes.

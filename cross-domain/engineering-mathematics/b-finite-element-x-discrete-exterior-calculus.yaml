id: b-finite-element-x-discrete-exterior-calculus
title: Finite element exterior calculus and discrete exterior calculus provide structure-preserving
  discretizations of Hodge theory, unifying mixed FEM stability with geometric discretization.
status: established
fields:
- finite-element-methods
- numerical-analysis
- differential-geometry
- engineering
bridge_claim: Partial differential equations on manifolds involving div, grad, and curl fit
  into de Rham complexes; stable mixed finite elements (Raviart–Thomas, Nedelec) construct
  discrete complexes that commute with projections. Discrete exterior calculus assigns discrete
  forms to mesh elements and defines discrete exterior derivative and Hodge star, preserving
  topological structure. The bridge shows many engineering FEM formulations — mixed Poisson,
  Maxwell, elasticity in stress–displacement forms — are instances of this geometric program.
  Stability (inf-sup) parallels exact sequence properties; explicit DEC schemes on simplicial
  meshes offer alternative routes to the same structure preservation.
translation_table:
- field_a_term: mixed variational form
  field_b_term: pairing of k-forms and (k−1)-forms on a mesh
- field_a_term: inf-sup stability
  field_b_term: closed range of discrete exterior derivative
- field_a_term: Nedelec elements
  field_b_term: discrete 1-forms for curl-curl problems
related_unknowns:

id: b-control-theory-differential-geometry
title: >
  Modern nonlinear control theory is formulated on differential manifolds —
  controllability is determined by the Lie bracket structure of vector fields
  (Chow-Rashevsky theorem), optimal trajectories are geodesics on sub-Riemannian
  manifolds, and robotics kinematics is fibre bundle theory — making differential
  geometry the natural language of nonlinear systems engineering.
status: established
fields:
  - control-engineering
  - mathematics
  - robotics
  - differential-geometry
bridge_claim: >
  Classical linear control theory (state-space, Kalman, LQR) operates on ℝⁿ
  with no geometric structure. From the 1960s onward, Pontryagin, Brockett,
  Sussmann, Jurdjevic, and others reformulated nonlinear control on smooth
  manifolds, revealing deep connections to differential geometry:

  1. Chow-Rashevsky controllability theorem. A control system ẋ = f(x) + Σ g_i(x) u_i
     on a manifold M is controllable (can reach any state from any other) if
     and only if the distribution Δ = span{g_i, [g_i, g_j], [[g_i,g_j], g_k], ...}
     (the Lie algebra generated by the control vector fields under the Lie bracket
     [f,g] = ∂g/∂x·f - ∂f/∂x·g) equals TM everywhere. This is the geometric
     controllability condition. Example: a car is non-holonomic (cannot move
     sideways) but the Lie bracket of "drive forward" and "steer" generates a
     sideways motion — the car is controllable despite the constraint.

  2. Sub-Riemannian geometry and optimal control. Pontryagin maximum principle
     (PMP, 1962) states that the optimal control u*(t) maximises the Hamiltonian
     H(x, p, u) = <p, f(x,u)> pointwise (p is the costate/adjoint variable).
     When the control enters linearly, optimal trajectories are geodesics in a
     sub-Riemannian metric on the state manifold — the metric defined by the
     accessible directions (the distribution Δ). Montgomery (2002) provides the
     comprehensive treatment: normal geodesics satisfy Hamilton's equations on
     T*M, and abnormal geodesics (also optimal in some cases) are a uniquely
     sub-Riemannian phenomenon with no Riemannian analog.

  3. Robotics as fibre bundle theory. The configuration space of a robot arm
     with n joints is the Lie group SO(3)^n × ℝ^n (rotation and translation
     groups). The workspace (end-effector position and orientation) is the base
     space; joint angles form the fibre. The Jacobian matrix J is the connection
     on this fibre bundle; singularities of J are connection singularities.
     The holonomy of the connection determines how the end-effector orientation
     changes when the joints return to their starting configuration after a loop
     (relevant for dexterous manipulation and satellite attitude control).

  4. Geometric phases (Berry's phase). When a robot arm undergoes a closed loop
     in joint space, the end-effector may acquire a net rotation (geometric phase
     or holonomy). This is identical to Berry's phase in quantum mechanics and
     the Hannay angle in classical mechanics — all are instances of connection
     holonomy on fibre bundles.

  5. Nonholonomic mechanics. The Lagrange-d'Alembert equations for non-holonomic
     systems (rolling without slipping: wheels, coins, ice skaters) are not
     derivable from a variational principle on the configuration space but require
     the full fibre-bundle machinery of constrained mechanics (Bloch 2003).
     This connects to sub-Riemannian geometry: the no-slip constraint defines
     a distribution that is not integrable, and the Chow theorem ensures
     controllability.
translation_table:
  - field_a_term: state space ℝⁿ (linear control)
    field_b_term: smooth manifold M (nonlinear control / differential geometry)
  - field_a_term: controllability matrix rank condition (linear systems)
    field_b_term: Lie algebra rank condition (Chow-Rashevsky theorem)
  - field_a_term: Lie bracket [f, g] (vector fields)
    field_b_term: commutator of robot joint motions (robotics)
  - field_a_term: optimal trajectory (PMP)
    field_b_term: geodesic on sub-Riemannian manifold
  - field_a_term: Jacobian matrix J (robotics kinematics)
    field_b_term: connection on fibre bundle (differential geometry)
  - field_a_term: singular configuration (robot kinematics)
    field_b_term: connection singularity / curvature singularity
  - field_a_term: geometric phase / holonomy (Berry phase, quantum mechanics)
    field_b_term: end-effector rotation from closed joint-space loop (robotics)

cross_pollination_opportunities:
  - >
    Motion planning for nonholonomic robots using sub-Riemannian geodesics:
    rather than sampling-based planners (RRT, PRM), compute sub-Riemannian
    geodesics analytically (available for car-like systems, snake robots) to
    obtain globally optimal paths. Differential geometry tools are computationally
    cheaper than sampling when the geometry is known.
  - >
    Quantum control: the Schrödinger equation ψ̇ = -i/ℏ H(t) ψ is a linear
    control system on the Lie group SU(n). Controllability is determined by
    the Lie algebra generated by the available Hamiltonians — the same Chow
    condition. The bridge between quantum control and sub-Riemannian geometry
    is now an active research area for quantum gate synthesis.
  - >
    Soft robotics and continuum mechanics: the configuration space of a
    continuum robot arm is infinite-dimensional (a Fréchet manifold), and the
    geometric control framework must be extended to infinite dimensions.
    Differential geometry provides the toolkit; robotics provides the
    motivation and experimental validation.
communication_gap: >
  Differential geometers and control engineers publish in Mathematics journals
  (J Differential Geometry, Annals of Mathematics) and IEEE/SIAM control
  journals (IEEE TAC, SIAM J Control Optim) respectively with limited
  cross-reading. Brockett (Harvard) and Jurdjevic (Toronto) bridged these
  communities from the 1970s onward, but geometric control remains a
  specialised subfield. Most robotics engineers use numerical Jacobian methods
  without awareness of the underlying fibre bundle structure; most differential
  geometers are unaware that their sub-Riemannian geodesics are robot paths.

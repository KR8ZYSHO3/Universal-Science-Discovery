related_hypotheses:
- h-sparsity-priors-stabilize-lidar-surface-recovery
cross_pollination_opportunities:
- Apply computational microlocal analysis ideas to predict edge artifacts in urban LiDAR meshes.
- Co-design sensor waveforms using optimal experimental design for foliage penetration.
communication_gap: Geomatics workflows emphasize heuristics and SLAM; inverse-problems theory
  is often black-boxed in software stacks, limiting uncertainty certificates.

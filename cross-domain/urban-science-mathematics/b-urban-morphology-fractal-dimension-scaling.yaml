id: b-urban-morphology-fractal-dimension-scaling
title: >
  Urban morphology — the spatial structure of cities — exhibits fractal scaling:
  street networks, building footprints, and population density follow power-law
  distributions with fractal dimensions D ≈ 1.7-1.9, and Zipf's law governs
  city size distributions; these are explained by growth processes analogous to
  diffusion-limited aggregation and preferential attachment in complex network theory.
status: established
fields:
  - urban-science
  - mathematics
  - complex-systems
bridge_claim: >
  The fractal dimension of an urban boundary is measured by box-counting:
  N(ε) ∝ ε^{-D} where N = number of boxes of size ε needed to cover the boundary.
  For cities, D ≈ 1.7 (London), 1.8 (Tokyo), compared to D = 2 for a completely
  filled plane. Urban scaling laws (Bettencourt 2013): Y ∝ N^β where Y is urban
  output (GDP, patents, crime), N = population, and β > 1 for socioeconomic metrics
  (superlinear scaling), β < 1 for infrastructure (sublinear, economies of scale).
  Zipf's law for city sizes: P(rank) ∝ rank^{-1} (Pareto distribution with exponent
  -1). These emerge from DLA-like growth (streets grow to minimize entropy) and
  preferential attachment (population attracts population). The Hurst exponent H
  of urban density profiles ≈ 0.6-0.8 indicates long-range spatial correlations
  in urban morphology.
translation_table:
  - field_a_term: urban sprawl vs compact city (urban science)
    field_b_term: fractal dimension D (close to 2 = compact, close to 1 = sparse) (mathematics)
    note: Fractal dimension D quantifies urban compactness; D → 2 approaches solid filled geometry
  - field_a_term: city size distribution / rank-size rule (urban science)
    field_b_term: Zipf's law / Pareto distribution with exponent 1 (mathematics)
    note: The top 1000 cities follow P(r) ∝ r^{-1} with remarkable empirical regularity
  - field_a_term: urban scaling exponent β > 1 for innovation (urban science)
    field_b_term: superlinear power-law scaling in complex networks (mathematics)
    note: Cities superlinearly amplify ideas/patents because social networks scale as N^β with β > 1
  - field_a_term: self-similar street network (urban science)
    field_b_term: fractal network with scale-free properties (mathematics)
    note: Street networks in organically grown cities show fractal self-similarity across scales

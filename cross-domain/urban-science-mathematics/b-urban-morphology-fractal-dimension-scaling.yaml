cross_pollination_opportunities:
  - Applying renormalization group methods from physics to derive urban scaling laws from microscopic agent-based models of city growth
  - "Using fractal analysis to compare urban resilience: cities with higher D (more compact) may show different disaster recovery dynamics than low-D sprawling cities"
communication_gap: >
  Urban planners and geographers studying city morphology have used fractal analysis
  since the 1990s (Batty, Longley), while physicists and mathematicians studying
  scaling laws independently developed city scaling theory (Bettencourt, West);
  the communities now overlap but the mechanistic derivation of urban scaling from
  first principles of social interaction remains an active challenge spanning both groups.

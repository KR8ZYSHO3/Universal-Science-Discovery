communication_gap: >
  Valiant (computer scientist) and Vapnik-Chervonenkis (statisticians) worked
  completely independently — Valiant's 1984 paper appeared in Comm ACM (computer
  science) while VC theory was in Soviet statistics journals. The formal equivalence
  between VC theory and classical statistics (AIC, BIC) is rarely taught in either
  machine learning or statistics courses. Statistical physics approaches to learning
  theory (Gardner, Derrida, Zdeborová) are published in physics journals mostly
  unknown to machine learning researchers despite solving problems the ML community
  still treats as open.


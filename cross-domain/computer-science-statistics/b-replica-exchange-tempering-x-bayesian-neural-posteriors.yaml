id: b-replica-exchange-tempering-x-bayesian-neural-posteriors
title: Replica-exchange tempering bridges molecular-simulation sampling and multimodal
  Bayesian neural posterior exploration.
status: proposed
fields:
- computer-science
- statistics
- machine-learning
- computational-physics
bridge_claim: Parallel tempering mitigates trapping in rugged posterior landscapes
  by swapping chains across temperature levels. The method is established in molecular
  simulation and increasingly relevant for Bayesian deep models with multimodal uncertainty.
translation_table:
- field_a_term: Temperature ladder
  field_b_term: Posterior smoothing schedule
  note: High temperatures flatten local barriers.
- field_a_term: Replica swap acceptance
  field_b_term: Cross-chain state exchange
  note: Improves exploration without discarding detailed balance.
- field_a_term: Autocorrelation time
  field_b_term: Posterior mixing efficiency
  note: Primary diagnostic for usable effective sample size.

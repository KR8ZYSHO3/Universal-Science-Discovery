id: b-auxetic-materials-negative-poisson-ratio
title: >
  Auxetic materials exhibit a negative Poisson's ratio (ν < 0) because their re-entrant or chiral microgeometries cause lateral expansion under axial tension, a counterintuitive behavior predicted by continuum elasticity theory and enabling programmable mechanical metamaterial design
status: established
fields:
  - materials-science
  - mechanics
bridge_claim: >
  In conventional materials ν > 0 (lateral contraction under axial tension), but auxetic materials with re-entrant honeycomb, rotating rigid unit, or chiral lattice microstructures exhibit ν as low as -1, because the geometric kinematics of their unit cells force lateral expansion under extension; linear elasticity theory (generalized Hooke's law) allows ν in the range [-1, 0.5] for isotropic materials and has no sign restriction for anisotropic ones, providing the continuum mechanics framework that predicts, constrains, and optimizes auxetic behavior.
translation_table:
  - field_a_term: "re-entrant honeycomb microgeometry (materials science)"
    field_b_term: "unit cell kinematics producing negative lateral strain under axial loading (mechanics)"
    note: "Re-entrant angle geometry forces cell walls to unfold laterally when stretched axially"
  - field_a_term: "negative Poisson's ratio ν < 0 (materials science)"
    field_b_term: "coupling coefficient between axial and transverse strain components in compliance tensor (mechanics)"
    note: "ν = -ε_transverse / ε_axial; negative value is allowed by thermodynamic stability conditions: -1 ≤ ν ≤ 0.5"
  - field_a_term: "auxetic foam / fiber composite (materials science)"
    field_b_term: "engineered compliance tensor with off-diagonal coupling (mechanics)"
    note: "Auxetic composites are designed by tailoring fiber orientation and matrix properties to achieve target ν"
  - field_a_term: "energy absorption enhancement in auxetic materials (materials science)"
    field_b_term: "increased indentation resistance due to material densification under load (mechanics)"
    note: "Negative ν causes material to flow toward indenter under impact, increasing resistance"
communication_gap: >
  Materials scientists characterize auxetic behavior experimentally while continuum mechanicists develop elasticity theory; the design of auxetic metamaterials from first principles (prescribing a target ν then computing the required microgeometry) is not yet systematized in either community.

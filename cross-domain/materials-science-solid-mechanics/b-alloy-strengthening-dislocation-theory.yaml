id: b-alloy-strengthening-dislocation-theory
title: >
  Alloy mechanical strength is governed by dislocation theory: the Taylor relation
  sigma_y = M*alpha*G*b*sqrt(rho) bridges materials science and solid mechanics
  by quantifying how dislocation density rho controls yield stress through line
  tension and Peierls barrier physics.
status: established
fields:
  - materials-science
  - solid-mechanics
  - condensed-matter-physics
bridge_claim: >
  The yield strength of metallic alloys is determined by the density and mobility
  of dislocations (line defects in the crystal lattice): the Taylor hardening relation
  sigma_y = M*alpha*G*b*sqrt(rho) relates yield stress to dislocation density rho,
  shear modulus G, Burgers vector magnitude b, and orientation factor M; alloy
  strengthening mechanisms (solid solution, precipitation, grain boundary, work
  hardening) all act by increasing rho or the Peierls barrier to dislocation
  motion, unifying alloy design under a common solid mechanics framework.
translation_table:
  - field_a_term: yield strength sigma_y (materials science)
    field_b_term: critical resolved shear stress tau_c (solid mechanics)
    note: Taylor factor M converts between single-crystal CRSS and polycrystal yield stress
  - field_a_term: dislocation density rho (materials science)
    field_b_term: internal stress field from forest dislocations (solid mechanics)
    note: Forest dislocations create a long-range stress field that obstructs glide dislocations
  - field_a_term: precipitate shearing vs. Orowan looping (materials science)
    field_b_term: obstacle bypass mechanisms for dislocation glide (solid mechanics)
    note: The transition from shearing to looping determines maximum precipitation hardening
  - field_a_term: Hall-Petch grain boundary strengthening (materials science)
    field_b_term: dislocation pile-up stress concentration at grain boundaries (solid mechanics)
    note: sigma_y ~ k/sqrt(d) arises from stress needed to propagate slip across a pile-up
related_unknowns:
  - u-dislocation-dynamics-alloy-high-entropy
related_hypotheses:
  - h-high-entropy-alloy-dislocation-cocktail-hardening
cross_pollination_opportunities:
  - Using molecular dynamics simulations of dislocation core structures to parameterize continuum solid mechanics models of alloy strengthening
  - Applying dislocation density evolution equations to design work-hardening schedules for high-strength forming processes
communication_gap: >
  Materials scientists characterize alloy microstructure experimentally while solid
  mechanics researchers develop continuum plasticity models; the dislocation theory
  bridge is mature at the research level but routine alloy design still uses empirical
  composition-property relations rather than physics-based dislocation models, limiting
  the pace of new alloy development.
last_reviewed: "2026-05-07"
references:
  - doi: "10.1098/rspa.1934.0106"
    note: Taylor (1934) - mechanism of plastic deformation of crystals; original dislocation concept
  - doi: "10.1016/0001-6160(959)90171-9"
    note: Orowan (1959) - causes and effects of internal stresses in metals
  - doi: "10.1038/s41524-020-0289-z"
    note: Varvenne et al. (2020) - theory of strengthening in high-entropy alloys

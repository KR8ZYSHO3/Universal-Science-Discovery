cross_pollination_opportunities:
  - >
    Quantum coherence lifetimes measured in FMO can calibrate HEOM solvers
    used in quantum chemistry / quantum device simulation. Biological systems
    offer naturally assembled quantum networks at physiological temperatures
    that synthetic quantum hardware struggles to achieve.
  - >
    Artificial light-harvesting antennas designed using FMO topology (7-8
    coupled chromophore network) with optimised ENAQT bath coupling could
    outperform conventional organic photovoltaics. The quantum device physics
    community has the decoherence engineering toolkit; the biophysics community
    has the network blueprints.
  - >
    If vibronic coherence (not electronic) is the key mechanism, this
    bridges molecular vibration spectroscopy with quantum transport theory —
    opening design rules for vibronic systems in quantum sensing and chemistry.
communication_gap: >
  Quantum information theorists and quantum chemists use overlapping but
  distinct formalism (Lindblad vs Redfield vs HEOM) with different default
  approximations. Photosynthesis biophysicists and quantum computing physicists
  rarely co-author; the 2007 Engel et al. paper was written by a physical
  chemistry group (Fleming, UC Berkeley) that bridges both worlds, but most
  photosynthesis researchers and most quantum computing researchers remain
  unaware of each other's literature on coherence engineering.

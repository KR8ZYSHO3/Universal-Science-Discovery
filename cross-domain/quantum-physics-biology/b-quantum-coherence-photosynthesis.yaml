id: b-quantum-coherence-photosynthesis
title: >
  Femtosecond spectroscopy reveals long-lived quantum coherence in the
  Fenna-Matthews-Olson (FMO) light-harvesting complex — energy transfer occurs
  via quantum superposition across chromophores rather than classical Förster hopping,
  and the same Lindblad master equation formalism that governs qubit decoherence
  in quantum computing describes coherence loss in biological light-harvesting
  at physiological temperatures.
status: contested
fields:
  - quantum-physics
  - biophysics
  - photosynthesis-biology
  - quantum-information
bridge_claim: >
  In 2007, Engel et al. (Nature 446:782) used two-dimensional electronic
  spectroscopy (2DES) at 77 K and 277 K to observe oscillatory cross-peaks in
  the FMO complex of green sulfur bacteria (Chlorobaculum tepidum) with
  coherence lifetimes ~ 660 fs at 77 K and visible even at physiological
  temperatures. They interpreted these oscillations as quantum beating — coherent
  superpositions of excitonic states across multiple bacteriochlorophyll (BChl)
  chromophores — rather than classical sequential Förster energy transfer.

  The quantum physics connection:
  1. Lindblad master equation. Open quantum system dynamics for a system S
     coupled to a Markovian bath E is governed by dρ/dt = -i[H,ρ]/ℏ + L[ρ],
     where L[ρ] = Σ_k (L_k ρ L_k† - ½{L_k†L_k, ρ}) is the Lindblad
     dissipator. This is precisely the same equation used to model T₂ dephasing
     in superconducting qubits and NV centres. The FMO complex is a 7-site
     (8-site in the full complex) quantum network, and measured coherence
     lifetimes can be extracted by fitting the Lindblad model.

  2. Environment-assisted quantum transport (ENAQT). Counterintuitively,
     moderate dephasing (phonon noise from the protein scaffold) can enhance
     energy transfer efficiency relative to the purely coherent or purely
     incoherent limits — a quantum Goldilocks effect demonstrated by Rebentrost
     et al. (2009). This is analogous to stochastic resonance in classical
     signal processing but in the quantum regime.

  3. Förster vs Redfield vs modified Redfield. Classical Förster theory treats
     each chromophore as localised; quantum Redfield theory includes coherence
     between sites. The FMO system operates in a regime where neither limit is
     strictly valid — the system-bath coupling is comparable to the inter-site
     coupling — requiring polaron or hierarchical equations of motion (HEOM)
     approaches identical to those used in quantum device physics.

  Controversy (why status = contested):
  Scholes et al. (2017, Nature) argued that the 2DES oscillations are dominated
  by vibrational (vibronic) coherence rather than purely electronic coherence.
  If so, the quantum-biology claim is weaker: vibrations in proteins are not
  special to biology. The debate reduces to whether the coherence that enhances
  transport is electronic (quantum computing analog) or vibronic (classical
  analogue with quantum corrections). As of 2026 this remains unresolved.
translation_table:
  - field_a_term: qubit (two-level quantum system)

id: b-quantum-tunneling-enzyme-catalysis
title: >
  Quantum tunneling of protons and electrons contributes to enzyme catalysis
  beyond classical transition state theory — measured by anomalously large
  H/D kinetic isotope effects in alcohol dehydrogenase and aromatic amine
  dehydrogenase — establishing quantum mechanics as a functional component
  of room-temperature biochemistry.
status: established
fields:
  - quantum-physics
  - biochemistry
  - enzymology
  - biophysics
bridge_claim: >
  Quantum tunneling — transmission through a potential energy barrier
  classically forbidden to a particle — is not merely a curiosity at
  cryogenic temperatures but a quantitatively significant contributor to
  enzyme catalysis at physiological temperatures.

  1. Tunneling rate formula. The WKB (Wentzel-Kramers-Brillouin) approximation
     gives the tunneling rate: k_tunnel ∝ exp(-2κd), where κ = √(2mU₀)/ℏ is the
     inverse decay length, m is particle mass, U₀ is the barrier height, and d
     is the barrier width. For proton transfer: m_H = 1.67×10⁻²⁷ kg, U₀ ≈ 10-20
     kJ/mol, d ≈ 0.2-0.5 Å. Comparison: m_D = 2×m_H, so κ_D/κ_H = √2, giving
     a tunneling contribution that differs by factor √2 in the exponent — which
     can produce KIE > 7 (the classical upper limit from zero-point energy differences
     alone is ~7; values of 20-50 clearly indicate tunneling).

  2. Kinetic isotope effects as experimental signature. The kinetic isotope effect
     (KIE) is the ratio of rates with light vs. heavy isotope: KIE = k_H/k_D.
     Classical transition state theory (TST) predicts maximum KIE ≈ 7 from
     zero-point energy differences alone. Alcohol dehydrogenase (ADH) from
     Bacillus stearothermophilus shows KIE ≈ 9-17 at 25°C; aromatic amine
     dehydrogenase (AADH) shows KIE ≈ 55 for primary amines — far exceeding
     the classical limit. Scrutton et al. (1999) and Sutcliffe & Scrutton (2002)
     established these as unambiguous evidence of quantum tunneling.

  3. Temperature dependence reveals tunneling. Classical TST predicts the rate
     follows the Arrhenius equation k ∝ exp(-Ea/kT). If tunneling dominates,
     the rate becomes less temperature-dependent (tunneling through the barrier
     is independent of kT). Measurements of the isotope effect AH/AD (pre-
     exponential factor ratio) and ΔEa = Ea_D - Ea_H distinguish tunneling from
     classical transfer. Hammes-Schiffer (2006) developed the vibronically
     non-adiabatic proton-coupled electron transfer (PCET) theory that quantitatively
     predicts these observations.

  4. Biological context. These measurements are from real enzymes at room
     temperature (25-37°C), not cryogenic laboratory setups. The protein scaffold
     compresses the proton transfer distance through conformational dynamics,
     optimizing the tunneling distance d. This is "promoting vibration" — protein
     dynamics that actively compress donor-acceptor distance to maximize tunneling.
     Klinman & Kohen (2013) established that this is a general principle in
     oxidoreductases, not an isolated curiosity.
translation_table:
  - field_a_term: quantum tunneling rate k_tunnel ∝ exp(-2κd) (quantum mechanics)
    field_b_term: hydrogen transfer rate in enzyme catalysis (biochemistry)
    note: WKB tunneling formula describes the quantum component of proton transfer
  - field_a_term: de Broglie wavelength λ = h/√(2mE) (quantum mechanics)
    field_b_term: particle mass dependence of KIE (H vs D vs T) (enzymology)
    note: Heavier isotopes have shorter de Broglie wavelength — less tunneling
  - field_a_term: potential energy barrier U(x) in quantum mechanics
    field_b_term: activation barrier in enzyme active site (biochemistry)
    note: The enzyme active site geometry shapes the quantum tunneling barrier
  - field_a_term: barrier width d in WKB formula (quantum mechanics)
    field_b_term: proton donor-acceptor distance in enzyme (biochemistry)
    note: Protein conformational dynamics compresses d to optimize tunneling
  - field_a_term: transmission coefficient κ(E) in quantum mechanics
    field_b_term: KIE = k_H/k_D ratio (kinetic isotope effect) (enzymology)
    note: KIE > 7 is the experimental hallmark of quantum tunneling in enzymes
  - field_a_term: proton-coupled electron transfer (PCET) theory (quantum chemistry)
    field_b_term: oxidoreductase mechanism (hydride/proton transfer enzymes)
    note: PCET theory quantitatively models tunneling in alcohol dehydrogenase

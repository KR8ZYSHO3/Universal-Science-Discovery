cross_pollination_opportunities:
  - >
    Quantum enzymology for drug design: if enzyme catalytic efficiency depends
    on optimized tunneling distances, then drugs that perturb donor-acceptor
    compression (allosteric inhibitors targeting promoting vibrations) represent
    a new class of inhibitor targeting quantum mechanical features of the
    active site rather than substrate binding.
  - >
    Quantum effects in DNA replication: proton tunneling in DNA base pair
    hydrogen bonds may contribute to spontaneous mutation rates (Löwdin 1963
    hypothesis). Modern quantum chemical calculations and isotope effect
    measurements could settle whether tunneling contributes to replication
    fidelity — connecting quantum mechanics directly to evolutionary mutation rates.
communication_gap: >
  Quantum physicists and biochemists rarely collaborate directly. Quantum
  biology is an emerging interdisciplinary field (Al-Khalili & McFadden book
  2014) but remains contested. The enzyme tunneling evidence is in well-reviewed
  experimental biochemistry journals (Annual Review of Biochemistry, Accounts of
  Chemical Research), not in physics journals, so it is underappreciated in
  the physics community. Conversely, biologists unfamiliar with quantum mechanics
  miss the mechanistic explanations provided by WKB theory and PCET formalism.

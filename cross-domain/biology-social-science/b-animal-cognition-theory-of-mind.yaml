id: b-animal-cognition-theory-of-mind
title: >
  Theory of Mind — the ability to attribute mental states (beliefs, desires,
  intentions) to others — bridges comparative animal cognition and social-cognitive
  neuroscience, with the false-belief task as the canonical behavioral assay and
  mPFC-TPJ-STS as the neural substrate, while Dunbar's social brain hypothesis
  links neocortex size to social group size across primates.
status: established
fields:
  - biology
  - social-science
  - cognitive-science
  - neuroscience
  - comparative-psychology
bridge_claim: >
  Theory of Mind (ToM) was formalized by Premack & Woodruff (1978) with the
  question "do chimpanzees have a theory of mind?" — a bridge between animal
  cognition (biology) and mental-state attribution (social cognition). The
  false-belief task (Wimmer & Perner 1983) became the standard measure: understanding
  that another agent holds a belief discordant with reality, which human children
  pass at ~4 years and infants show violation-of-expectation signals for at 15
  months (Onishi & Baillargeon 2005). Great apes pass some implicit ToM tasks
  (anticipatory gaze paradigms) but fail explicit verbal false-belief tests,
  suggesting a dissociation between implicit and explicit mentalizing. Ravens
  pass gaze-following and competitive food-hiding tasks suggesting ToM-like reasoning
  in a non-primate lineage. The neural substrate (mPFC + TPJ + STS) is conserved
  in non-human primates. Dunbar's social brain hypothesis (1992) makes ToM
  evolutionarily tractable: neocortex ratio correlates with social group size
  across 36 primate species (Pearson r ≈ 0.76), suggesting that the cognitive
  demand of tracking others' mental states was the evolutionary driver of primate
  brain expansion — a biological explanation for a social-cognitive capacity.
translation_table:
  - field_a_term: theory of mind (social science / developmental psychology)
    field_b_term: mentalizing network (mPFC, TPJ, STS) function in neuroscience
    note: ToM as cognitive capacity maps onto a specific neural circuit with known lesion effects
  - field_a_term: false-belief task performance
    field_b_term: TPJ BOLD activation during belief attribution
    note: TPJ activity specifically tracks false (vs. true) belief attribution
  - field_a_term: social group size (primatology)
    field_b_term: neocortex ratio (comparative neuroanatomy)
    note: "Dunbar's number: neocortex ratio predicts maximum stable social group size (r = 0.76)"
  - field_a_term: implicit vs. explicit ToM
    field_b_term: subcortical (amygdala, STS) vs. prefrontal mentalizing routes
    note: Implicit ToM may use a faster subcortical route; explicit ToM requires PFC
  - field_a_term: competitive food-hiding (raven experiments)
    field_b_term: agent-based modeling of social strategy evolution
    note: Ravens' ToM-like behavior can be modeled as best-response in a Stackelberg game
  - field_a_term: evolutionary pressure (social complexity)
    field_b_term: encephalization quotient across species
    note: Social brain hypothesis predicts EQ from group size; testable across 200+ primate species

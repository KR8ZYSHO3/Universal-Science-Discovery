cross_pollination_opportunities:
  - Test Dunbar's social brain hypothesis causally using comparative lesion studies
    in non-human primates — does TPJ lesion reduce effective social group size?
  - Apply game-theoretic models (Stackelberg games, iterated best-response) to
    raven competitive food-hiding to derive quantitative predictions about the
    required depth of recursive mentalizing
  - Use violation-of-expectation paradigms adapted for fMRI to image infant ToM
    development, bridging developmental psychology with developmental neuroscience
  - Model false-belief task failure in autism spectrum disorder using computational
    mentalizing models (Bayesian theory of mind) and test whether lesion simulations
    in the TPJ node reproduce behavioral deficits
communication_gap: >
  Developmental psychologists who study ToM in children rarely interact with
  comparative primatologists who study it in great apes, or with social neuroscientists
  who image the mentalizing network. The three communities use different paradigms
  (verbal false-belief, non-verbal implicit tasks, fMRI) and publish in different
  journals (Developmental Psychology, Animal Cognition, Social Cognitive and
  Affective Neuroscience). Dunbar's social brain hypothesis, which provides the
  evolutionary bridge, is known across all three communities but rarely used
  to generate cross-disciplinary predictions.

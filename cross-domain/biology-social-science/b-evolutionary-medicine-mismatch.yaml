cross_pollination_opportunities:
  - "Design evolutionary-informed public health interventions: outdoor recess policies for myopia prevention; deliberate microbial exposure protocols to reduce atopic disease"
  - "Use GWAS to identify thrifty genotype candidates and target them for precision medicine interventions in high-risk populations"
  - "Apply mismatch theory to mental health: ancestral social group size (~150, Dunbar), status hierarchy, and activity patterns as reference points for designing therapeutic environments"

communication_gap: >
  Evolutionary medicine has been developing as a field since Nesse & Williams (1994)
  but remains marginal in medical education and clinical practice — most medical
  curricula do not include evolutionary biology. Clinicians trained in proximate
  mechanisms (how disease works) rarely engage with evolutionary (why) explanations.
  Public health practitioners who design interventions rarely consult evolutionary
  biologists. The field also faces scepticism about adaptationist storytelling —
  the challenge of distinguishing genuine evolutionary mismatch hypotheses from
  just-so stories requires rigorous cross-cultural and experimental tests.


id: b-evolutionary-medicine-mismatch
title: "Evolutionary Medicine and Mismatch Theory — thrifty genotype, hygiene hypothesis, myopia epidemic, and circadian disruption as mismatches between Pleistocene adaptations and modern environments"
status: established
fields:
  - evolutionary-biology
  - medicine
  - social-science
  - public-health
  - epidemiology

bridge_claim: >
  Evolutionary medicine (Nesse & Williams 1994) analyses disease through the lens
  of evolutionary history: many chronic diseases are mismatches between evolved
  adaptations and modern environments that differ radically from the Pleistocene.
  The thrifty genotype hypothesis (Neel 1962): alleles promoting efficient energy
  storage and fat deposition were advantageous in feast-famine ancestral environments;
  in calorie-constant industrialised environments these alleles predispose to type 2
  diabetes, obesity, and metabolic syndrome. Evidence: Pima Indians (historically
  feast-famine nomads) show >50% diabetes prevalence when transitioning to sedentary
  Western diet. The hygiene hypothesis (Strachan 1989) — later refined as the old
  friends hypothesis (Rook 2003): reduced early microbial exposure (helminths,
  commensal bacteria, saprophytic mycobacteria) in industrialised settings leads to
  inappropriate immune calibration, inadequate regulatory T cell development, and
  increased susceptibility to allergy, asthma, inflammatory bowel disease, and
  multiple sclerosis. The epidemiological evidence: IBD and multiple sclerosis
  prevalence increases monotonically with industrialisation and latitude (reduced
  pathogen exposure). Myopia epidemic: humans evolved for outdoor environments
  (~10,000 lux); indoor lighting (~100–500 lux) provides insufficient retinal
  dopamine release to inhibit axial elongation → worldwide myopia now affects >50%
  of East Asian young adults. Circadian mismatch: artificial light at night suppresses
  nocturnal melatonin secretion; social schedules desynchronise from the biological
  clock (social jetlag, Wittmann et al. 2006) → chronic sleep deprivation, metabolic
  disruption, and increased cancer risk (rotating shift workers have elevated breast
  cancer risk, IARC Group 2A). These mismatches are evolutionary lags — adaptive
  traits expressed in novel environments they were not selected for.

translation_table:
  - field_a_term: "thrifty genotype (efficient fat storage alleles)"
    field_b_term: "metabolic syndrome risk alleles in calorie-abundant environments"
    note: "FTO gene variant is the largest common variant for obesity; likely evolved in energy-scarce ancestral context"
  - field_a_term: "old friends hypothesis (evolved immune regulators)"
    field_b_term: "immunological mismatch from loss of helminth and microbial exposures"
    note: "Helminth-derived molecules (LNFPIII) restore Treg function in mouse models; helminth therapy trials in humans ongoing"
  - field_a_term: "dopamine-dependent retinal stop signal (light-driven)"
    field_b_term: "outdoor light requirement for normal emmetropisation (eye growth regulation)"
    note: "Time outdoors (>2 h/day, not specific activities) reduces myopia onset risk by ~40%; light intensity, not UV, is the key factor"
  - field_a_term: "social jetlag (chronotype vs. social schedule misalignment)"
    field_b_term: "chronic circadian disruption from artificial light and work schedules"
    note: "1 hour of social jetlag increases obesity risk ~33%; shift workers have elevated all-cause mortality"
  - field_a_term: "discordance hypothesis (excess energy density + sedentary lifestyle)"
    field_b_term: "cardiovascular disease as evolutionary mismatch"
    note: "Cordain et al.: Paleolithic diet (low glycemic load, high fibre, lean meat) had CV risk profile very different from modern Western diet"
  - field_a_term: "mismatch disease (adaptation in wrong environment)"
    field_b_term: "chronic non-communicable disease as evolutionary lag"
    note: "Key prediction: prevalence should correlate with degree of departure from ancestral environment; natural experiments (migration studies) test this"


cross_pollination_opportunities:
  - >
    Epidemiological cohort studies (Dutch Hunger Winter, Irish Famine, Leningrad
    Siege) have measured health outcomes in descendants but not epigenomes.
    Combining historical population records with whole-epigenome sequencing of
    living descendants would test whether famine-associated methylation
    signatures persist at loci that escape reprogramming.
  - >
    Reparations policy debates increasingly invoke epigenetic inheritance of
    historical trauma. The social science and policy communities need quantitative
    estimates of the persistence (number of generations) and penetrance
    (fraction of descendants affected) of epigenetic transmission — quantities
    that molecular biologists can now estimate from animal models.
  - >
    Therapeutic reversal: if methylation marks encoding trauma are inherited,
    epigenetic drugs (DNMT inhibitors, HDAC inhibitors) could potentially
    reverse them in descendants. This creates a novel precision medicine
    question — targeting molecular marks of ancestral, not individual, trauma —
    that requires social science to identify the at-risk population.
communication_gap: >
  Molecular biologists studying epigenetic reprogramming publish in Nature,
  Cell, and Molecular Cell; social scientists studying intergenerational trauma
  publish in sociology, psychology, and public health journals. The Yehuda
  group (psychiatry/endocrinology) bridges both but lacks the molecular
  mechanistic depth of pure epigenetics labs. The contested nature of the
  field — small samples, confounders, contested replication — makes social
  scientists cautious about adopting molecular claims, while molecular
  biologists view the human observational data as underpowered.

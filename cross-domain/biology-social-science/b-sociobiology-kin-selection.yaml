id: b-sociobiology-kin-selection
title: >
  Hamilton's rule (rb > c) derives the evolutionary conditions for altruism from
  population genetics, creating a quantitative bridge between biology and social science
  through inclusive fitness, the Price equation, and the gene-centered view of selection.
status: established
fields:
  - evolutionary-biology
  - population-genetics
  - social-science
  - behavioral-ecology
  - philosophy-of-biology
bridge_claim: >
  Hamilton's (1964) rule rb > c — altruistic behavior spreads when the benefit b to
  a recipient weighted by genetic relatedness r exceeds the cost c to the actor —
  gives social science a quantitative evolutionary foundation for cooperation.
  Inclusive fitness = personal fitness + Σ rᵢ·bᵢ generalises Darwinian fitness to
  account for effects on relatives. The rule explains worker sterility in Hymenoptera
  (r = 0.75 to sisters due to haplodiploidy), alarm calls in Belding's ground squirrels
  (Mateo 1996), and cooperative breeding across birds and mammals. Dawkins's (1976)
  "selfish gene" repackaged this as gene-level selection: bodies are vehicles; genes are
  replicators. The multilevel selection controversy — Wilson & Wilson (2007) argue group
  selection is underrated; Dawkins and West et al. (2011) counter that kin selection and
  group selection are mathematically equivalent via the Price equation — is one of the
  most productive debates in modern evolutionary social science. Nowak et al. (2010)
  challenged inclusive fitness for eusociality, generating enormous controversy. The
  bridge to social science is direct: human cooperative institutions (reciprocal altruism,
  punishment, prosocial norms) require understanding both the genetic substrate and the
  cultural overlay on top of rb > c.
translation_table:
  - field_a_term: genetic relatedness r
    field_b_term: social network tie strength / kinship coefficient
    note: Social scientists use network centrality; Hamilton used Wright's coefficient — both predict cooperation intensity
  - field_a_term: inclusive fitness
    field_b_term: total welfare including effects on "close" others
    note: Economists' externalities; sociologists' social capital both partially capture this
  - field_a_term: eusociality (queen-worker division of labor)
    field_b_term: division of labor in human institutions
    note: Nowak-Tarnita-Wilson analogy between superorganism and corporation is suggestive but contested
  - field_a_term: Price equation G = Cov(w,z)/w̄ + E(wΔz)/w̄
    field_b_term: partitioning of social change into selection vs. transmission components
    note: Price equation used in cultural evolution (Henrich & McElreath) — applies to memes as well as genes
  - field_a_term: cheater detection / reciprocal altruism (Trivers 1971)
    field_b_term: social contract enforcement / legal punishment
    note: Cosmides & Tooby use the Wason selection task to argue cheater-detection is cognitively specialized
related_unknowns:
  - u-multilevel-selection-kin-equivalence
related_hypotheses:
  - h-cultural-multilevel-selection-dominates-genetic
cross_pollination_opportunities:
  - Apply Price equation partitioning to cultural evolution datasets (WEIRD vs. non-WEIRD
    cooperation) to test whether group-level cultural selection is stronger than individual
    selection in highly institutionalized societies
  - Use genomic kinship coefficients from large biobanks to test whether Hamilton's r
    predicts self-reported prosocial behavior toward relatives in modern urban populations
  - Model the evolutionary dynamics of human punishment norms using agent-based inclusive
    fitness maximization on realistic social network topologies
communication_gap: >
  Sociobiological claims were received with ideological hostility in social science
  after Wilson's (1975) Sociobiology and the subsequent controversy; many social
  scientists explicitly rejected biological explanation of social behavior as reductionist.
  This created a decades-long communication gap that only partially healed through
  evolutionary psychology (Buss, Pinker) and cultural evolution (Henrich). Biologists
  and social scientists rarely co-author, attend the same conferences, or read each
  other's top journals.

id: b-behavioral-economics-evolutionary-psychology
title: >
  Loss aversion, present bias, status quo bias, and the endowment effect — the
  core anomalies of behavioral economics — have evolutionary adaptations as
  their mechanistic origin: asymmetric fitness consequences of gains and losses
  in ancestral environments, encoded in prospect theory's value function
  V(x) = x^α for gains, -λ(-x)^β for losses (λ ≈ 2.25), and hyperbolic
  discounting U = u₀ + β Σ δ^t u_t (β < 1).
status: established
fields:
  - biology
  - social-science
  - evolutionary-psychology
  - behavioral-economics
  - neuroscience
  - decision-theory
bridge_claim: >
  Kahneman-Tversky prospect theory (1979) documents systematic violations of
  expected utility theory: V(x) = x^α for gains (α≈0.88), V(x) = -λ(-x)^β
  for losses (λ≈2.25, β≈0.88). Loss aversion coefficient λ≈2.25 means losses
  hurt twice as much as equivalent gains feel good. Quasi-hyperbolic discounting
  (Laibson 1997): U = u₀ + β Σ_{t≥1} δ^t u_t with β < 1 — the present is
  over-weighted relative to all future periods equally, generating time-
  inconsistent preferences and self-control failures. Evolutionary explanation
  (Tooby-Cosmides adaptationist program): in ancestral environments, losses
  of food, mates, or status were fitness-threatening in ways that equivalent
  gains were not (risk of starvation is not symmetric with opportunity to eat
  more). Present bias evolved because ancestral uncertain futures made
  future discounting adaptive — only recent environments make this a bias.
  The endowment effect (Thaler 1980): owning an object makes it more valuable —
  explained by loss aversion (giving it up is a loss). Neuroeconomics confirms:
  gain prediction errors activate ventral striatum (dopamine); loss prediction
  errors activate anterior insula and amygdala — neural correlates track
  prospect theory value function asymmetry.
translation_table:
  - field_a_term: loss aversion coefficient λ ≈ 2.25 (prospect theory)
    field_b_term: asymmetric fitness cost of resource loss vs. equivalent gain in ancestral ecology
    note: λ predicts over-weighting of loss; evolution predicts this from variance in fitness consequences
  - field_a_term: quasi-hyperbolic discount factor β < 1
    field_b_term: adaptive preference for immediate resource acquisition in uncertain environment
    note: β → 0 = pure present bias; exponential δ-discounting is normative but not adaptive ancestrally
  - field_a_term: reference-dependent utility (gains/losses framed vs. neutral level)
    field_b_term: adaptation-level theory in evolutionary psychology — fitness is change, not absolute
    note: Organisms track environmental change not absolute state; neurons encode prediction errors
  - field_a_term: ventral striatum activation (fMRI) for gains
    field_b_term: dopamine reward circuit (nucleus accumbens) for resource acquisition
    note: "Same circuit: prospect theory gain encoding = dopaminergic reward prediction error"
  - field_a_term: anterior insula activation for losses and risk
    field_b_term: aversive motivational system for predator/injury/starvation avoidance
    note: Insula encodes interoceptive state; high-stakes losses trigger visceral aversion response
related_unknowns:
  - u-loss-aversion-cross-cultural-evolutionary-universality
related_hypotheses:

cross_pollination_opportunities:
  - >
    Cross-species experiments: testing whether non-human primates (capuchins,
    bonobos) and birds (corvids) show loss aversion with λ ≈ 2 would establish
    phylogenetic conservation of prospect theory parameters and test the
    evolutionary universality hypothesis.
  - >
    fMRI + TMS of anterior insula during economic loss tasks, combined with
    evolutionary ecological data on ancestral subsistence risk, could test
    whether insula response magnitude predicts loss aversion λ across individuals
    with different ancestral ecological backgrounds.
communication_gap: >
  Behavioral economics (Kahneman, Tversky, Thaler) developed largely independently
  of evolutionary psychology (Tooby, Cosmides, Buss), with separate journals
  (Econometrica vs. Evolution and Human Behavior) and distinct epistemological
  traditions (economic rationality violations vs. adaptive fitness). Neuroeconomics
  (Glimcher, Rangel) bridges these but is itself a recent hybrid field. Economic
  theorists are uncomfortable with adaptationist reasoning; evolutionary
  psychologists often lack formal economic utility theory training.

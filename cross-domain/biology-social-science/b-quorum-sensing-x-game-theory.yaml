id: b-quorum-sensing-x-game-theory
title: Bacterial quorum sensing — collective switching via diffusible signals — is naturally
  modeled as a multiplayer game with nonlinear payoffs and thresholds, linking microbiology
  to economics-style strategic interaction.
status: established
fields:
- microbiology
- game-theory
- evolutionary-biology
- social-science
bridge_claim: 'Cells produce and respond to autoinducers; when signal concentration crosses
  a threshold, regulons activate (virulence, biofilm formation, competence). Producers pay
  metabolic costs; cheaters may exploit public goods without producing signal. The interaction
  resembles threshold public goods games and multiplayer stag hunts: successful collective
  action requires enough contributors. Spatial structure and diffusion create local neighborhoods,
  changing equilibrium structure relative to well-mixed models. Evolutionary game theory predicts
  frequency-dependent selection on signal production and response sensitivity; molecular biology
  supplies implementable mechanisms.'
translation_table:
- field_a_term: autoinducer concentration
  field_b_term: public signal observable by players
- field_a_term: threshold-regulated genes
  field_b_term: discontinuous strategy switch at critical participation
- field_a_term: cheater mutants
  field_b_term: defectors in public goods games

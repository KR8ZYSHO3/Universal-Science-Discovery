cross_pollination_opportunities:
- Design synthetic quorum circuits with mechanism-design objectives (stable cooperation at
  minimal cost).
- Use spatial evolutionary graph theory to predict efficacy of quorum-sensing inhibitors in
  structured biofilms.
communication_gap: Microbiology papers emphasize pathways; game theory papers emphasize payoffs.
  Empirical payoff matrices in clinical isolates remain sparse.

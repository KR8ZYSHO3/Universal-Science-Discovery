id: b-hawkes-self-excitation-x-seizure-aftershock-clustering
title: Hawkes self-exciting point processes unify earthquake aftershock clustering
  and seizure-burst event cascades.
status: proposed
fields:
- seismology
- neuroscience
- statistics
- dynamical-systems
bridge_claim: Aftershocks and seizure bursts both show event-triggered increases in
  short-term event intensity. Hawkes branching structure provides a common language
  for estimating endogenous cascade risk versus exogenous driving.
translation_table:
- field_a_term: Omori-Utsu aftershock decay
  field_b_term: Post-ictal event tail
  note: Both can be represented via decaying triggering kernels.
- field_a_term: Branching ratio eta
  field_b_term: Seizure cascade gain
  note: eta near 1 marks fragile near-critical dynamics.
- field_a_term: Background rate mu
  field_b_term: Baseline excitability
  note: Separates spontaneous from triggered events.
related_unknowns:
- u-hawkes-branching-ratio-seizure-cascade-threshold
related_hypotheses:
- h-hawkes-branching-threshold-predicts-seizure-clusters
cross_pollination_opportunities:
- Build shared benchmark datasets with identical uncertainty-reporting protocols across
  both domains.
- Compare baseline domain-specific workflows against explicitly transferred methods
  under matched compute budgets.
communication_gap: Adjacent communities use different software stacks and validation
  norms, so mathematically equivalent tools are often rediscovered in parallel.
references:
- doi: 10.1088/1742-5468/2011/12/P12028
  note: Bacry et al. Hawkes-process estimation and applications.
- doi: 10.1007/s00780-015-0282-y
  note: Hardiman et al. critical reflexivity / branching-ratio analysis.
last_reviewed: '2026-05-08'

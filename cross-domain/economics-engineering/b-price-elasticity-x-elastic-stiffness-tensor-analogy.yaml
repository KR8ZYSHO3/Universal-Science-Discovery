id: b-price-elasticity-x-elastic-stiffness-tensor-analogy
title: >
  Economic price elasticities quantify fractional demand/supply response ratios to relative price perturbations — mechanical stiffness tensors relate stress to strain as an anisotropic linear operator — formal Jacobian symmetry differs from elastic reciprocal relations except under restrictive coupled modeling assumptions; **the bridge is a cautious analogy between comparative statics slopes and moduli**, not identity of consumer theory with continuum mechanics.
status: proposed
fields:
  - economics
  - mechanics
  - applied-mathematics
bridge_claim: >
  Own-price Marshallian elasticity behaves locally like a normalized slope linking percentage quantity change to percentage price change — linear elastic materials expose proportionality constants mapping strain vectors to stress tensors — thinking of markets as local responses to perturbations borrows geometric intuition from stiffness while respecting that Slutsky symmetry / adding-up constraints are economic constructs absent from Cauchy stress formalisms unless explicitly engineered coupled models.
translation_table:
  - field_a_term: Own-price elasticity η = (p/q)(dq/dp)
    field_b_term: Directional Young-type modulus along a fixed strain probe direction
    note: Both describe incremental linearized response magnitudes — domains differ.
  - field_a_term: Cross-price elasticities forming Jacobian blocks between goods
    field_b_term: Coupled off-diagonal stiffness coefficients / shear coupling terms
    note: Cross effects resemble coupling — Slutsky symmetry ≠ elastic reciprocal symmetry.
  - field_a_term: Cobb–Douglas unitary income-share constraints (example systems)
    field_b_term: Incompressible elasticity constraint Tr(ε)=0 analogies (informal only)
    note: Useful metaphor risk; treat only as heuristic spark for differential geometry pedagogy.
communication_gap: >
  Economics emphasizes rational comparative statics under budget constraints; mechanics emphasizes tensor positivity and frame indifference — interdisciplinary texts rarely warn readers where metaphors must stop.
cross_pollination_opportunities:
  - Numerical IO workshops illustrating Jacobian conditioning next to anisotropic elasticity ellipsoid plots with explicit caveat slides.
  - Pedagogical exercises deriving symmetric substitutes/complements matrices alongside orthotropic stiffness eigenproblem visuals — labeled parallel math, not economic law.

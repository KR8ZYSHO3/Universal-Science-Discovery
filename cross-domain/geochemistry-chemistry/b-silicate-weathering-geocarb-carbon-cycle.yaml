id: b-silicate-weathering-geocarb-carbon-cycle
title: >
  Silicate weathering is the dominant long-term regulator of atmospheric CO2 over geological time: the GEOCARB model formalizes this as a negative feedback where elevated CO2 warms climate, accelerating chemical weathering of Ca-Mg silicates that consumes CO2 and precipitates carbonate, controlled by reaction kinetics and thermodynamics
status: established
fields:
  - geology
  - chemistry
bridge_claim: >
  Silicate weathering (e.g., CaSiO3 + CO2 → CaCO3 + SiO2) consumes atmospheric CO2 at a rate that increases with temperature and CO2 partial pressure, creating a negative feedback that stabilizes climate on 10^5 - 10^6 year timescales: higher CO2 → warming → faster weathering → more CO2 drawdown; the GEOCARB model quantifies this as W = W_0 × f_T × f_CO2 × f_geog (temperature, CO2, and paleogeographic factors), embedding geochemical reaction kinetics into a long-term carbon cycle model that connects geology with chemical thermodynamics and kinetics.
translation_table:
  - field_a_term: "silicate weathering rate W (geology)"
    field_b_term: "heterogeneous reaction rate of CO2 with silicate minerals at mineral-water interface (chemistry)"
    note: "W follows modified Arrhenius kinetics with E_a ~ 40-60 kJ/mol; rate increases ~2× per 10°C of warming"
  - field_a_term: "atmospheric CO2 partial pressure pCO2 (geology)"
    field_b_term: "reactant concentration in the carbonate equilibrium system and carbonic acid weathering agent (chemistry)"
    note: "CO2(aq) = H2CO3 (carbonic acid) is the primary weathering agent; pCO2 controls equilibrium pH and weathering aggressiveness"
  - field_a_term: "carbonate-silicate cycle (geology)"
    field_b_term: "coupled redox-neutral carbon cycle: geochemical buffer system on Myr timescales (chemistry)"
    note: "CO2 consumed in silicate weathering is returned to atmosphere by metamorphic decarbonation of subducted carbonates"
  - field_a_term: "GEOCARB pCO2 reconstruction (geology)"
    field_b_term: "forward model of atmospheric CO2 from carbon cycle mass balance equations (chemistry)"
    note: "GEOCARB integrates weathering kinetics, volcanic outgassing, and organic carbon burial to predict Phanerozoic pCO2"
communication_gap: >
  Geologists infer past CO2 levels from proxy data (boron isotopes, paleosols) while geochemists study weathering kinetics in laboratory flow-through reactors; quantitative calibration of field weathering rates from laboratory kinetic experiments remains problematic due to physical erosion, biological effects, and mineral surface area changes.

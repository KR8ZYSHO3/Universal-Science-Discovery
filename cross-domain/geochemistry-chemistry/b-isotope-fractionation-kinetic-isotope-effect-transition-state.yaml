id: b-isotope-fractionation-kinetic-isotope-effect-transition-state
title: >
  Isotope fractionation in geochemical systems is governed by the kinetic isotope
  effect (KIE) from physical chemistry: heavier isotopes have lower zero-point
  energies relative to the transition state, leading to slower reaction rates and
  measurable fractionation (δ¹³C, δ¹⁸O, δD) that geochemists use as proxy records
  of temperature, biological activity, and reaction mechanisms.
status: established
fields:
  - geochemistry
  - chemistry
  - isotope-geology
bridge_claim: >
  Transition state theory (TST) gives the rate ratio for two isotopic species:
  k_H/k_D = (ν_H/ν_D)·exp[-(E‡_H - E‡_D)/kT] where ν is the imaginary frequency
  at the TS and E‡ is the zero-point energy difference. For ¹²C vs ¹³C at the
  TS of carboxylation, k₁₂/k₁₃ ≈ 1.044 (fractionation factor α). The δ¹³C
  notation: δ = (R_sample/R_standard - 1) × 1000‰ where R = ¹³C/¹²C.
  Temperature dependence: 1000·lnα ≈ A/T² + B/T + C (Bigeleisen equation),
  enabling paleothermometry. Equilibrium fractionation (partitioning between
  minerals and fluids) gives carbonate paleotemperature: δ¹⁸O(calcite-water)
  ≈ 2.78 × (10⁶/T²) - 2.89‰. Biologic KIEs (Rubisco discriminates ¹³CO₂)
  distinguish biogenic from abiogenic carbon in the geologic record.
translation_table:
  - field_a_term: isotope fractionation factor α (geochemistry)
    field_b_term: rate ratio k_light/k_heavy from kinetic isotope effect (chemistry)
    note: α is the geochemical observable; KIE is the physical chemistry mechanism that sets α
  - field_a_term: δ¹³C value of organic matter (geochemistry)
    field_b_term: integrated kinetic isotope effect over a reaction pathway (chemistry)
    note: δ¹³C of -25‰ in C3 plants reflects cumulative enzymatic KIE from CO₂ fixation
  - field_a_term: paleotemperature from δ¹⁸O (geochemistry)
    field_b_term: temperature-dependent equilibrium isotope fractionation (chemistry)
    note: Calcite-water oxygen fractionation follows TST-derived T² dependence
  - field_a_term: mass-independent fractionation MIF (geochemistry)
    field_b_term: nuclear volume effect or symmetry-dependent photochemistry (chemistry)
    note: MIF (Δ¹⁷O anomalies) requires quantum tunneling or photochemical mechanisms beyond classical KIE

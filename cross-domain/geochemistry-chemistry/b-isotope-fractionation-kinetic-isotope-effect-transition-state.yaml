cross_pollination_opportunities:
  - Applying clumped isotope theory (co-occurrence of ¹³C-¹⁸O in carbonate) to reconstruct both temperature and fluid composition simultaneously
  - Using density functional theory (DFT) calculations of transition state geometries to predict isotope fractionation factors for novel geochemical reactions
communication_gap: >
  Isotope geochemists measuring δ¹³C, δ¹⁸O in sediments and organic chemists
  calculating kinetic isotope effects share the same Bigeleisen-Mayer equations
  but publish in separate journals (Geochimica et Cosmochimica Acta vs JACS);
  the quantitative bridge from ab initio KIE calculations to geologic proxy
  calibration is an active frontier with growing use of DFT in isotope geochemistry.

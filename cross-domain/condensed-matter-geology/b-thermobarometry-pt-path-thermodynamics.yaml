id: b-thermobarometry-pt-path-thermodynamics
title: >
  Metamorphic thermobarometry reconstructs the pressure-temperature history of rocks
  using equilibrium thermodynamics of mineral assemblages — the same chemical
  potential and Gibbs free energy minimisation that governs phase diagrams in
  materials science and physical chemistry, making metamorphic petrology an
  in-situ geological record of crustal thermodynamic state evolution.
status: proposed
fields:
  - geology
  - thermodynamics
  - physical-chemistry
  - materials-science
bridge_claim: >
  When rocks are buried in subduction zones or mountain belts, they record their
  pressure-temperature (P-T) history through the stable mineral assemblages that
  crystallise at each condition. Thermobarometry reads this record by inverting
  equilibrium thermodynamics: the compositions of coexisting phases (e.g., garnet-
  biotite geothermometer, Al-in-hornblende geobarometer) constrain T and P through
  the equilibrium condition dG = 0 for mineral reactions. Pseudosection analysis
  (Perple_X, THERMOCALC) solves the full Gibbs free energy minimisation across the
  P-T space to predict stable assemblages — exactly the same computation used for
  alloy phase diagrams and ceramic processing in materials science. The P-T path
  (a trajectory through thermodynamic state space) encodes the tectonic history:
  subduction creates clockwise P-T paths; extensional collapse creates counterclockwise
  paths. This bridge connects crustal dynamics to materials thermodynamics, enabling
  transfer of CALPHAD database methods, ab initio energy calculations, and
  experimental high-pressure calibrations from materials science to petrology.
translation_table:
  - field_a_term: Gibbs free energy minimisation
    field_b_term: thermodynamic modelling of mineral assemblages (Perple_X)
    note: Identical mathematical operation — find the phase assemblage that minimises total G
  - field_a_term: phase diagram
    field_b_term: pseudosection (P-T diagram with predicted mineral assemblages)
    note: A pseudosection is simply a phase diagram in P-T space for a fixed bulk composition
  - field_a_term: activity-composition model
    field_b_term: mineral solid solution model (e.g., garnet a-x relations)
    note: Describes how chemical potential varies with composition within a phase
  - field_a_term: CALPHAD database
    field_b_term: internally consistent thermodynamic database (Holland & Powell)
    note: Both are curated free energy databases for multicomponent systems
cross_pollination_opportunities:
  - Transfer machine learning surrogate models for phase diagram computation (trained on CALPHAD databases) to accelerate pseudosection calculation for complex rock compositions
  - Apply ab initio DFT calculations (used for materials design) to refine high-pressure mineral equation of state parameters at subduction zone conditions
  - Use kinetic rate theory from materials science (nucleation and growth) to model the preservation of metastable mineral assemblages as kinetic traps in cooling rocks
last_reviewed: "2026-05-07"
references:

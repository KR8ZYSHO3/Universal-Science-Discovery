cross_pollination_opportunities:
  - >
    Genetics: Mendelian randomization treats genetic variants as instruments for
    environmental exposures (gene → exposure → outcome), enabling causal inference
    about nutrition, lifestyle, and drug targets from observational biobank data
    — a direct import of IV econometrics into molecular epidemiology.
  - >
    Machine learning + causal inference (double machine learning, DML):
    using high-dimensional ML for nuisance function estimation in DiD/IV
    while preserving Gaussian limiting distributions — allows causal identification
    in settings with thousands of covariates previously intractable for parametric methods.
communication_gap: >
  Statisticians developed potential outcomes (Rubin, Neyman) largely independently
  of econometricians developing IV and DiD methods; Pearl's graphical framework
  developed independently in computer science and AI. Despite formal equivalence,
  the communities use different notation, assumptions, and terminology, creating
  significant communication barriers. Epidemiology, economics, and statistics all
  teach causal inference differently. The Nobel Prize to Angrist-Imbens-Card (2021)
  has improved cross-field awareness of IV/DiD, but Pearl's do-calculus remains
  largely unfamiliar to most econometricians.

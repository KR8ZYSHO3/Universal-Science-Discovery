id: b-causal-inference-instrumental-variables
title: >
  Causal inference in economics and epidemiology reduces to the potential
  outcomes framework (Rubin 1974), where instrumental variables (IV), regression
  discontinuity (RD), and difference-in-differences (DiD) estimators are all
  special cases of local average treatment effects (LATE) identified by
  exploiting quasi-random variation — formally equivalent to randomized
  controlled trials in specific subpopulations.
status: established
fields:
  - economics
  - statistics
  - epidemiology
  - social-science
  - causal-inference
  - probability-theory
bridge_claim: >
  The fundamental problem of causal inference (Holland 1986): for any unit i,
  we observe only Y_i(1) or Y_i(0) (potential outcomes under treatment/control),
  never both. The average treatment effect ATE = E[Y(1) - Y(0)] requires
  strong assumptions for identification from observational data. The potential
  outcomes (Rubin causal model, 1974) and graphical causal models (Pearl, 2000)
  are two formally equivalent frameworks for expressing these assumptions.
  Instrumental variables (IV): an instrument Z affects Y only through treatment
  D (exclusion restriction), Z is exogenous (independence), and Z affects D
  (relevance). Two-stage least squares (2SLS) identifies LATE = E[Y(1)-Y(0)|
  compliers] — the effect among units whose treatment status is changed by Z.
  Angrist-Imbens-Rubin (1996, Nobel 2021) showed IV = LATE under monotonicity.
  Regression discontinuity (RD): observations near a threshold c for forcing
  variable X form a natural experiment; RD identifies ATE at the threshold by
  local linear regression. Difference-in-differences (DiD): parallel trends
  assumption + a policy change identifies ATT (average treatment on treated).
  All these designs are unified by the conditional independence assumption
  (CIA) or local forms thereof, connecting Bayesian/frequentist statistics,
  probability theory, and policy evaluation into a coherent causal framework.
translation_table:
  - field_a_term: potential outcomes Y_i(1), Y_i(0) (Rubin)
    field_b_term: counterfactual states of the world in causal graphical models (Pearl)
    note: Formally equivalent for causal identification; Rubin favors design-based, Pearl favors structural
  - field_a_term: instrument Z (exogenous + exclusion restriction + relevance)
    field_b_term: exogenous variation in a directed acyclic graph (DAG) — node with no incoming causal paths
    note: Exclusion restriction = Z → Y path only through D; DAG formalizes this as no direct Z → Y edge
  - field_a_term: local average treatment effect (LATE)
    field_b_term: treatment effect identified in the subpopulation of compliers
    note: LATE is not ATE; IV estimates for compliers only — external validity requires complier analysis
  - field_a_term: parallel trends assumption (DiD)
    field_b_term: counterfactual untreated outcome for treated group equals control group trend
    note: Testable in pre-period; violated when treatment is selected on anticipatory trends
  - field_a_term: regression discontinuity bandwidth h → 0
    field_b_term: local randomization assumption — units near threshold are as-if randomly assigned
    note: Optimal bandwidth trades bias and variance; MSE-optimal bandwidth from Imbens-Kalyanaraman formula

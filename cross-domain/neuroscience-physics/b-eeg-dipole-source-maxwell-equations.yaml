id: b-eeg-dipole-source-maxwell-equations
title: >
  EEG source localization inverts the quasi-static electromagnetic forward problem: cortical current dipoles (synchronized postsynaptic potentials) generate scalp surface potentials governed by the quasi-static Maxwell equations in a heterogeneous conducting medium, making EEG source imaging a regularized inverse problem in applied electromagnetics
status: established
fields:
  - neuroscience
  - physics
bridge_claim: >
  Scalp EEG potentials are generated by primary current dipoles J^p (synchronized apical dendrite postsynaptic currents) embedded in brain tissue; the forward problem is governed by quasi-static Maxwell equations ∇·(σ∇φ) = ∇·J^p in conductivity σ(r), with boundary conditions on skull/scalp interfaces; since the inverse problem (recovering J^p from measured φ at scalp electrodes) is severely under-determined (infinite possible source configurations produce identical surface potentials), regularization methods (L2 minimum norm, LORETA, Bayesian priors) are required — mapping neuroscience EEG to physics inverse problem theory.
translation_table:
  - field_a_term: "cortical current dipole J^p (neuroscience)"
    field_b_term: "primary current density source in quasi-static electromagnetic forward model (physics)"
    note: "J^p represents synchronized postsynaptic currents in cortical macrocolumns; each dipole has location, orientation, and moment"
  - field_a_term: "scalp surface potential φ(r_electrode) (neuroscience)"
    field_b_term: "solution to Poisson equation ∇·(σ∇φ) = ∇·J^p with Neumann BC at scalp (physics)"
    note: "EEG measurement at N electrodes samples the solution to the forward electromagnetic problem"
  - field_a_term: "EEG inverse problem (neuroscience)"
    field_b_term: "under-determined linear system L j = v where L is lead field matrix (physics)"
    note: "Lead field matrix L maps each possible dipole source to predicted surface potential; N_electrodes << N_sources"
  - field_a_term: "LORETA / sLORETA source reconstruction (neuroscience)"
    field_b_term: "L2 regularization of the electromagnetic inverse problem with Laplacian smoothness prior (physics)"
    note: "LORETA solves min||Lj - v||² + λ||Wj||² with W = spatial Laplacian; equivalent to Tikhonov regularization"
communication_gap: >
  Clinical EEG specialists interpret scalp waveforms without solving source localization while applied mathematicians develop inverse problem algorithms; the electromagnetic physics underlying EEG is not taught in most neuroscience programs, limiting uptake of quantitative source imaging methods in clinical practice.
cross_pollination_opportunities:

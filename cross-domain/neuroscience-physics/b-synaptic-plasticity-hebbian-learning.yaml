cross_pollination_opportunities:
  - >
    Statistical mechanics of neural networks (Amit-Gutfreund-Sompolinsky 1987,
    Hopfield 1982) shows that Hebbian learning creates associative memories as
    energy minima with storage capacity α_c ≈ 0.138·N patterns. Modern
    transformer attention heads implement a form of Hopfield-like retrieval.
    Connecting biological STDP rules to the energy landscapes of large language
    models could clarify what biological constraints on learning are relevant
    for AI architectures.
  - >
    BCM theory predicts that visual deprivation (monocular deprivation) shifts
    θ_M down → lower threshold → increased LTP → enables amblyopia recovery
    in adults. Pharmacological manipulation of CaMKII and mGluR5 to artificially
    shift θ_M could enable adult plasticity windows, requiring collaboration
    between computational neuroscientists formulating BCM predictions and
    molecular biologists engineering the molecular implementation.
communication_gap: >
  The BCM rule and statistical physics of neural networks are published in
  journals like Physical Review Letters and Neural Computation, while the
  molecular neuroscience of NMDA receptors and CaMKII is in J Neuroscience,
  Neuron, and Nature Neuroscience. Computational neuroscientists rarely attend
  the same conferences as molecular neurobiologists. The Hopfield network
  (1982) and its connection to spin glasses (Amit et al. 1987) is known in
  physics but not widely understood by molecular neuroscientists. The STDP
  literature (mostly in experimental neuroscience) is rarely connected to
  the statistical learning theory community despite having deep formal links.

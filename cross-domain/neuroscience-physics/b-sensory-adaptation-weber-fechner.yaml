cross_pollination_opportunities:
  - >
    Predictive coding theory (Rao & Ballard 1999, Clark 2013): the brain sends top-down
    predictions to sensory areas, with bottom-up signals carrying only prediction errors.
    This is an efficient coding scheme that achieves maximum compression — only the
    unexpected information is transmitted. Under predictive coding, sensory adaptation
    is explained as updating the prediction (prior) to match the current context,
    reducing prediction error automatically. This framework connects Bayesian inference,
    information theory, and sensory adaptation into a unified computational theory.
  - >
    Sensory substitution devices (Bach-y-Rita): information from one sensory modality
    can be recoded for delivery via another (vision through tactile display). The
    fact that the brain remaps to use the recoded information efficiently — within weeks
    of training — suggests that efficient coding is a learned optimization, not a fixed
    hardware property. This has direct engineering implications for brain-machine
    interfaces and sensory prosthetics.
communication_gap: >
  Weber and Fechner were 19th-century physiologists; Stevens was a 20th-century
  psychologist. The information-theoretic interpretation (Barlow 1961) came from
  a biologist writing at the intersection of cybernetics and neuroscience — a community
  that largely dissolved after the 1960s. Modern computational neuroscience (efficient
  coding, predictive coding) developed in the 1990s-2000s without strong connection
  to the classical psychophysics literature. Engineering (automatic gain control,
  logarithmic amplifiers) developed the same principles independently for radio and
  audio engineering. These three communities rarely cross-cite.

id: b-sensory-adaptation-weber-fechner
title: >
  Sensory perception bridges neuroscience and physics through Weber-Fechner psychophysics:
  the nervous system compresses physical stimulus intensity logarithmically (Fechner) or
  as a power law (Stevens), with the neural implementation explained by efficient
  coding theory — sensory neurons maximize mutual information between stimuli and
  responses given metabolic constraints, naturally producing logarithmic compression.
status: established
fields:
  - neuroscience
  - psychophysics
  - physics
  - information-theory
  - sensory-biology
  - cognitive-science
bridge_claim: >
  Weber's law (1834): the just noticeable difference ΔS for a stimulus of intensity S
  is proportional to S: ΔS/S = k (Weber fraction, constant per modality). For brightness,
  k ≈ 0.02; for weight, k ≈ 0.02; for sound frequency, k ≈ 0.003. Weber's law is a
  consequence of the signal-to-noise ratio of sensory channels scaling with baseline intensity.

  Fechner's law (1860): integrating Weber's law, the perceived sensation magnitude
  Ψ = k·log(S/S₀) — a logarithmic relationship between physical stimulus intensity
  and perceptual magnitude. This implies that equal ratios of physical intensity produce
  equal differences in perceived magnitude (decibel scale for sound is a Fechner scale).

  Stevens' power law (1957): Ψ = k·Sⁿ (power law, not logarithmic). Exponent n varies
  by modality: electric shock n = 3.5 (supralinear — pain amplified), brightness n = 0.33
  (compressive — prevents overload), weight n = 1.45, temperature n = 1.6. Power law is
  a better empirical fit for most modalities and is scale-invariant (ratio of sensations
  is independent of unit choice).

  Neural implementation — shunting adaptation: firing rate r(S) = r_max·S^n/(S^n + σ^n)
  (Naka-Rushton equation) produces divisive normalization — response is normalized by
  the overall activity level, creating gain control that compresses the dynamic range.
  Logarithmic compression emerges when σ ≫ S₀ (in the linear range) or from
  adaptation: r(t) ∝ r₀/(1 + S·τ_adapt) — firing rate decreases as adaptation grows.

  Efficient coding hypothesis (Barlow 1961): sensory neurons should maximize mutual
  information I(stimulus; response) subject to metabolic (spike rate) constraints.
  If the stimulus distribution is log-normal (natural images, sound levels), the
  optimal encoder is logarithmic — exactly Fechner's law. Simoncelli & Olshausen (2001)
  showed that V1 simple cells implement efficient coding of natural image statistics.
  Lateral inhibition (Hartline, Nobel 1967): retinal ganglion cells inhibit neighbors,
  creating center-surround receptive fields that amplify contrast at edges (Mach bands)
  and decorrelate the neural code — another efficient coding mechanism.
translation_table:
  - field_a_term: Weber fraction ΔS/S = k (psychophysics)
    field_b_term: signal-to-noise ratio SNR = signal/(noise ∝ signal) = constant (physics)
    note: Weber's law is the perceptual manifestation of multiplicative (Poisson-like) neural noise
  - field_a_term: Fechner's law Ψ = k·log(S/S₀)
    field_b_term: decibel scale dB = 10·log₁₀(P/P₀) for sound/power (engineering acoustics)
    note: decibel scale is exactly a Fechner scale — engineering independently discovered Fechner's law
  - field_a_term: Stevens' power law Ψ = k·Sⁿ (n ≠ 1)
    field_b_term: power-law scaling in physics (fractal dimension, scaling relations near critical points)
    note: power laws are scale-invariant; Stevens' law implies perception has no preferred reference point
  - field_a_term: shunting inhibition / divisive normalization (neural gain control)
    field_b_term: automatic gain control (AGC) in radio receivers and amplifiers (engineering)
    note: both dynamically adjust sensitivity to match dynamic range to current signal level
  - field_a_term: efficient coding / mutual information maximization (Barlow 1961)
    field_b_term: channel capacity theorem (Shannon 1948) — optimal encoder maximizes I(X;Y)
    note: efficient coding applies Shannon's channel capacity theory to biological neural codes
  - field_a_term: center-surround receptive field (lateral inhibition — retinal ganglion)
    field_b_term: high-pass spatial filter / edge detection (image processing, signal processing)
    note: lateral inhibition is the biological implementation of a spatial high-pass filter

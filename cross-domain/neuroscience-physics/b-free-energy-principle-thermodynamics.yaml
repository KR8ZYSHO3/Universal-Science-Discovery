cross_pollination_opportunities:
  - >
    The FEP implies that neural computation has thermodynamic costs
    directly related to the KL divergence being minimised. Connecting
    the variational free energy to Landauer's principle (erasing one bit
    costs kT ln 2 in energy) would give a physical lower bound on the
    metabolic cost of Bayesian updating — testable against measurements
    of neural energy consumption during perceptual inference tasks.
  - >
    Non-equilibrium thermodynamics (Jarzynski 1997, Crooks 1999) gives
    exact relations between work, free energy, and irreversibility. The
    active inference framework has so far ignored these: there should be
    a "neural Jarzynski equality" relating the variational free energy
    of perceptual cycles to the thermodynamic work performed on sensory
    organs. Deriving this would ground the FEP more firmly in physics.
  - >
    Predictive coding networks (Rao & Ballard 1999) implement the FEP
    in a neural circuit. The energy landscape of a predictive coding
    network is a Lyapunov function for the variational free energy.
    Treating the network as a physical spin glass and applying
    equilibrium and non-equilibrium statistical mechanics could predict
    the dynamics of hallucinations, perceptual switching, and attention
    from first thermodynamic principles.
communication_gap: >
  Friston's FEP was developed in the theoretical neuroscience literature
  from 2005 onwards. Despite the explicit use of thermodynamic language
  (free energy, entropy, surprise), the connection to Jaynes' maximum-
  entropy statistical mechanics and non-equilibrium thermodynamics is not
  quantitative in most neuroscience applications. Thermodynamicists and
  statistical physicists are largely unaware of the FEP. The barrier is
  partly sociological (neuroscience versus physics journals) and partly
  mathematical (the variational Bayesian language is unfamiliar to
  physicists, while non-equilibrium thermo is unfamiliar to most
  neuroscientists).

id: b-neural-avalanches-criticality
title: >
  Neural networks in vitro and in vivo exhibit avalanche size and duration
  distributions following power laws P(s) ∝ s^(-3/2) and P(t) ∝ t^(-2) —
  the signatures of a second-order phase transition critical point — supporting
  the critical brain hypothesis that neural computation is optimized near
  the boundary between order and disorder.
status: established
fields:
  - neuroscience
  - statistical-physics
  - condensed-matter-physics
  - computational-neuroscience
bridge_claim: >
  The concept of criticality — a system poised at a second-order phase transition
  — from condensed matter physics maps onto the dynamics of neural networks with
  precise quantitative predictions that have been experimentally verified.

  1. Neural avalanches and power laws. Beggs & Plenz (2003) measured cascades
     of neural activity in cortical slices and found that the probability
     distribution of avalanche sizes follows P(s) ∝ s^(-3/2) and avalanche
     durations P(t) ∝ t^(-2) — identical to the mean-field critical exponents
     for a branching process at the critical point σ = 1. A branching parameter
     σ < 1 (subcritical) → activity dies exponentially. σ > 1 (supercritical)
     → activity explodes. σ = 1 (critical) → scale-free avalanches.

  2. Phase transition analogy. In statistical physics, a second-order phase
     transition (e.g., ferromagnet at Curie temperature, percolation at
     threshold, Ising model at T_c) is characterized by: (a) power-law
     distributions of cluster sizes, (b) diverging correlation length,
     (c) maximal susceptibility to external perturbations, (d) scale-free
     fluctuations. All four signatures have been measured in cortical activity.
     This places the brain's operating point at or near a critical point in the
     space of neural dynamics models.

  3. Functional advantages of criticality. Shew & Plenz (2013) showed
     experimentally that dynamic range — the range of input intensities
     distinguishable by the network — is maximized at the critical branching
     parameter σ = 1. Information transmission (mutual information between
     input and output) and computational capacity (number of metastable
     states) are also maximized at criticality. These are predicted by
     statistical physics: near a critical point, the order parameter is most
     sensitive to external fields (diverging susceptibility χ = ∂M/∂H).

  4. Subcritical and supercritical pathologies. Departures from criticality
     map onto pathological states: subcritical dynamics (σ < 1) resemble
     the suppressed, synchrony-free activity of anesthesia or coma; supercritical
     (σ > 1) resembles the hypersynchronous bursting of epilepsy. This gives a
     quantitative physics-based framework for understanding and potentially
     treating these neurological disorders.
translation_table:
  - field_a_term: second-order phase transition / critical point (statistical physics)
    field_b_term: optimal brain operating point / edge of chaos (neuroscience)
    note: Brain criticality hypothesis maps neural dynamics onto phase transitions
  - field_a_term: branching ratio σ = 1 (branching process theory)
    field_b_term: critical neural network (neuroscience)
    note: σ < 1 = subcritical (coma-like); σ > 1 = supercritical (epileptic)
  - field_a_term: power-law cluster size distribution (statistical physics)
    field_b_term: neural avalanche size distribution P(s) ∝ s^(-3/2) (neuroscience)
    note: Mean-field critical exponent -3/2 observed experimentally in cortex
  - field_a_term: diverging susceptibility χ near T_c (statistical physics)
    field_b_term: maximal dynamic range at σ = 1 (neuroscience)
    note: Maximum sensitivity to input is the experimental signature of criticality
  - field_a_term: correlation length ξ diverging at criticality
    field_b_term: long-range spatial correlations in neural activity (neuroscience)
    note: Critical neural networks show correlations across cortical distances
  - field_a_term: universality class (statistical physics)
    field_b_term: neural network class (size-dependent critical exponents)
    note: Whether cortical avalanches are mean-field or non-mean-field universality is debated
related_unknowns:
  - u-brain-criticality-universality-class
related_hypotheses:
  - h-criticality-maximizes-neural-dynamic-range
cross_pollination_opportunities:
  - >
    Renormalization group (RG) analysis of neural networks: apply real-space
    RG coarse-graining to cortical activity maps to identify the relevant
    universality class of neural criticality and test whether it matches the
    directed percolation or mean-field branching process predictions.
  - >
    Critical neuromorphic computing: engineer neuromorphic chips (Intel Loihi,
    IBM TrueNorth) to operate at the critical branching ratio to maximize
    computational capacity and energy efficiency simultaneously.
communication_gap: >
  Statistical physicists and neuroscientists overlap significantly in
  computational neuroscience, but the critical brain hypothesis is more
  widely known in physics-of-biology communities than in clinical neuroscience.
  The direct connection between epilepsy/coma (supercritical/subcritical) and
  the phase transition framework is underutilized in clinical settings. Muñoz
  (2018) Review of Modern Physics provides the comprehensive review.

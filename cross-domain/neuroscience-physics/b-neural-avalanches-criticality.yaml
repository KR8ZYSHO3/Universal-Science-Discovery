cross_pollination_opportunities:
  - >
    The renormalisation group (RG) approach from physics can classify the universality
    class of the neural critical point — whether it belongs to directed percolation,
    branching process, or a new universality class. Experimentally measuring all four
    critical exponents (τ, α, γ, ν) and verifying the scaling relations would
    definitively place neural criticality in its universality class.
  - >
    Deep learning networks trained near the 'edge of chaos' (critical weight
    initialization) show superior gradient propagation and learning capacity.
    Whether artificial neural networks share the same critical branching statistics
    as biological networks is an untested bridge between computational neuroscience
    and deep learning theory.
communication_gap: >
  Statistical physics of phase transitions and SOC was developed in physics
  departments by condensed matter physicists (Bak, Kadanoff, Wilson). Neuroscientists
  studying cortical dynamics had no exposure to these concepts until Beggs & Plenz
  (2003) explicitly applied them. Even then, the neuroscience community was
  sceptical because: (1) power laws can arise from many mechanisms beyond SOC,
  (2) the specific exponents were not universally reproduced, and (3) the physiological
  mechanism maintaining σ ≈ 1 (synaptic homeostasis) was identified much later.
  The connection remains contested because verifying SOC universality class requires
  multiple scaling exponents — a standard requirement in physics but unfamiliar to
  most neuroscientists.

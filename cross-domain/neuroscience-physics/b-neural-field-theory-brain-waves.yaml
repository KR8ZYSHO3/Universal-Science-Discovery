id: b-neural-field-theory-brain-waves
title: Wilson-Cowan neural field equations are a biological reaction-diffusion system — dispersion relations predict EEG frequency bands as spatial-temporal resonances of excitatory-inhibitory cortical sheets
status: established
fields:
  - neuroscience
  - physics
bridge_claim: >
  Neural field theory (Wilson-Cowan 1972, Amari 1977) treats the cortex as a continuous
  excitable medium: population firing rates E(r,t) and I(r,t) obey integro-differential
  equations τ_E ∂E/∂t = -E + F[w_{EE}*E - w_{IE}*I + I_ext]. Linearization around the
  fixed point yields wave solutions with a dispersion relation ω(k) that is exactly the
  physics of a damped oscillator with spatial coupling — alpha waves (~10 Hz), theta (~6 Hz),
  and gamma (~40 Hz) emerge from specific E-I weight ratios and axonal conduction delays.
  Robinson et al. (2016) showed that fMRI resting-state networks are the spatial eigenmodes
  of the structural Laplacian (connectome topology) — the same eigenmodes as vibrating
  plates (Chladni figures). Traveling cortical waves (Muller et al. 2018) observed during
  NREM sleep and working memory tasks are the biological realization of wave solutions
  predicted by the field equations.
translation_table:
  - field_a_term: neural firing rate field E(r,t) (neuroscience)
    field_b_term: reaction-diffusion activator field (physics)
    note: The Wilson-Cowan excitatory field plays the role of the activator in Turing-type systems
  - field_a_term: EEG frequency bands (alpha, theta, gamma)
    field_b_term: normal modes of a driven oscillator (physics)
    note: Each EEG band corresponds to a resonant mode of the cortical sheet with specific spatial wavenumber
  - field_a_term: connectome structural Laplacian (neuroscience)
    field_b_term: graph Laplacian eigenmodes (mathematics/physics)
    note: Resting-state fMRI networks are eigenmodes of the brain graph — analogous to vibration modes of a structure
  - field_a_term: conduction velocity of myelinated axons
    field_b_term: wave propagation speed in dispersive medium
    note: Finite conduction velocity introduces temporal delay — the source of propagating traveling waves in cortex
  - field_a_term: E-I balance (excitatory-inhibitory ratio)
    field_b_term: damping ratio of oscillator (physics)
    note: E-I ratio determines whether the cortical system is underdamped (oscillatory) or overdamped (non-oscillatory)
related_unknowns:
  - u-neural-field-theory-empirical-connectome-validation
related_hypotheses:
  - h-cortical-eigenmodes-universal-resting-state-basis
cross_pollination_opportunities:
  - >
    Physics-based neural field models can predict how TMS (transcranial magnetic stimulation)
    pulses propagate through the connectome — guiding clinical TMS targeting for depression,
    OCD, and stroke rehabilitation without requiring patient-specific computational models
    trained from scratch.
  - >
    Condensed matter physics of topological insulators predicts edge states protected from
    disorder — analogous protected modes might exist at cortical boundaries (e.g., sulci).
    Cross-disciplinary search for topologically protected neural oscillation modes is an
    unexplored frontier.
communication_gap: >
  Theoretical neuroscientists working on neural field theory publish in Physical Review E,
  PLOS Computational Biology, and NeuroImage; cognitive and systems neuroscientists measure
  EEG/fMRI in Journal of Neuroscience, Neuron, and Nature Neuroscience. The mathematical
  physics framework is rarely cited in empirical neuroscience papers. Neural field theory
  training is absent from most neuroscience PhD programs, limiting adoption of the framework
  for interpreting resting-state imaging data.

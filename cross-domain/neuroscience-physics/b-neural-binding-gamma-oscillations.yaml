id: b-neural-binding-gamma-oscillations
title: >
  The neural binding problem is proposed to be solved by gamma-band (30-100 Hz)
  oscillatory synchrony, linking the perceptual unification of distributed cortical
  representations to the physics of coupled oscillator synchronization.
status: contested
fields:
  - neuroscience
  - physics
  - cognitive-science
bridge_claim: >
  The binding problem (how the brain integrates distributed neural representations
  into unified percepts) maps onto the physics of synchronization in coupled oscillator
  networks: cortical gamma oscillations act as a carrier wave enabling phase-locking
  between distant neuronal assemblies, with synchrony measured by phase-locking value
  (PLV) playing the role of an order parameter in a Kuramoto-type model of neural
  coupling across cortical areas.
translation_table:
  - field_a_term: gamma oscillation coherence (neuroscience)
    field_b_term: order parameter r in Kuramoto model (physics)
    note: PLV between cortical regions is the neural analog of the Kuramoto synchronization order parameter
  - field_a_term: neural assembly synchrony (neuroscience)
    field_b_term: phase locking in coupled oscillators (nonlinear dynamics)
    note: Synchronized firing corresponds to phase-locked states; desynchronization to incoherent phase drift
  - field_a_term: cross-frequency coupling theta-gamma (neuroscience)
    field_b_term: nonlinear mode coupling / Arnold tongue (physics)
    note: Nested oscillations arise from nonlinear coupling analogous to driven oscillator resonance
  - field_a_term: binding by synchrony (cognitive neuroscience)
    field_b_term: entrainment and mutual coupling in oscillator networks (physics)
    note: Perceptual binding requires stable entrainment of spatially distributed oscillators
related_unknowns:
  - u-neural-binding-mechanism-synchrony
related_hypotheses:
  - h-gamma-oscillations-binding-causal-test
cross_pollination_opportunities:
  - Applying Kuramoto model analysis to empirical EEG/MEG data to test whether synchrony is sufficient for binding
  - Using transcranial alternating current stimulation (tACS) at gamma frequencies to causally test the binding-by-synchrony hypothesis
communication_gap: >
  Neurophysiologists record gamma oscillations experimentally while physicists develop
  coupled oscillator theory; the binding-by-synchrony hypothesis has existed since
  Singer & Gray (1989) but remains contested partly because the quantitative mapping
  between neural data and oscillator theory models has not been rigorously tested.
last_reviewed: "2026-05-07"

id: b-neuronal-synchrony-ping-model
title: >
  Gamma oscillations in cortical circuits emerge from the PING mechanism —
  Pyramidal-Interneuron Network Gamma — where excitatory cells drive fast-spiking
  interneurons that provide delayed inhibition, creating limit cycle oscillations
  that synchronise population activity; the same coupled oscillator physics
  describes Josephson junction arrays, laser synchronisation, and circadian pacemaker networks.
status: proposed
fields:
  - neuroscience
  - physics
  - biophysics
  - dynamical-systems
bridge_claim: >
  Cortical gamma oscillations (30-80 Hz) are thought to coordinate information
  processing across neural circuits. The PING model (Whittington et al. 1995;
  Traub et al. 1997) explains their generation: excitatory (E) pyramidal cells fire
  and recruit fast-spiking inhibitory (I) interneurons; the interneurons then
  silence the E cells; when inhibition fades, E cells fire again — creating a
  periodic E-I cycle. This is a Hopf bifurcation in the E-I dynamical system where
  the fixed point (no oscillation) loses stability and a limit cycle (oscillation)
  emerges. The bifurcation parameter is the ratio of E drive to I coupling strength.
  Physics provides the toolkit: Kuramoto model for synchronisation, phase reduction
  for weakly coupled oscillators, and Floquet theory for stability of the limit cycle.
  The interneuron-excitatory balance is the neural substrate of the same physics
  that determines synchronisation in Josephson junction arrays, laser ensembles,
  and power grid frequency locking. The PING bridge enables import of coupled
  oscillator theory into systems neuroscience and export of neural circuit
  parameters as case studies for dynamical systems.
translation_table:
  - field_a_term: Hopf bifurcation
    field_b_term: transition from asynchronous firing to gamma oscillation
    note: Gamma oscillations emerge at a Hopf bifurcation as E drive or I coupling crosses a threshold
  - field_a_term: Kuramoto synchronisation order parameter
    field_b_term: population synchrony (coherence of gamma oscillation across neurons)
    note: r = 0 (asynchronous) to r = 1 (fully synchronous population gamma)
  - field_a_term: phase response curve (PRC)
    field_b_term: sensitivity of a neuron's firing to inputs at different phases
    note: The PRC determines whether E-I coupling produces synchronising or desynchronising interactions
  - field_a_term: Floquet exponents (limit cycle stability)
    field_b_term: robustness of the gamma oscillation to perturbations
    note: Negative Floquet exponents indicate stable gamma; positive indicates burst oscillation instability
cross_pollination_opportunities:
  - Apply mean-field Kuramoto analysis to large E-I networks to predict gamma frequency as a function of E-I ratio and compare with multielectrode array recordings
  - Use optogenetic stimulation at specific phases of the gamma cycle to measure the neural PRC and compare with model predictions
  - Transfer power grid synchronisation theory (Lozano et al.) to model how cortical areas with different natural frequencies achieve inter-area gamma coherence
last_reviewed: "2026-05-07"

cross_pollination_opportunities:
  - >
    If the crust is maintained at SOC criticality, early-warning indicators from
    critical-phenomena theory (rising variance, rising autocorrelation, critical
    slowing down) should precede major earthquakes. Systematic search for these
    signatures in high-resolution seismic catalogs could test whether large
    earthquakes are preceded by detectable critical-state precursors.
  - >
    The OFC model predicts that non-conservation of stress during redistribution
    controls whether true SOC (scale-free GR statistics) is achieved. Laboratory
    spring-block experiments with tunable friction and elasticity could map the
    phase diagram of the seismic SOC transition, calibrating which fault properties
    control the b-value.
  - >
    The same SOC framework describes neuronal avalanches in cortical networks
    (b-neuronal-avalanches bridge). Importing seismological analysis tools
    (catalog completeness, Omori fitting) into neuroscience, and importing
    SOC theory from neuroscience back into seismology, could cross-validate both fields.
communication_gap: >
  Geologists and seismologists are primarily empirical scientists working with
  catalog data; statistical physicists work with models. The SOC connection is
  well-established in the physics literature but treated skeptically in seismology,
  where predictive failure of simple SOC models has generated backlash. The debate
  about whether earthquakes are truly predictable (deterministic chaos near criticality)
  vs. intrinsically unpredictable (true SOC) is not fully resolved. Journals
  (Geophysical Research Letters vs. Physical Review Letters) rarely overlap.
last_reviewed: "2026-05-06"

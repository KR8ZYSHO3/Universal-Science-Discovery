cross_pollination_opportunities:
  - "Apply photonic crystal design methods to phononic crystals for ultra-low thermal conductivity materials"
  - "Use inelastic neutron scattering to measure phonon dispersion and validate first-principles MD predictions"
  - "Engineer phonon mean free path distributions in thermoelectric materials using superlattice interfaces"

communication_gap: >
  Phonon physics is taught in solid state physics courses but rarely connected
  explicitly to thermal engineering education, which often uses empirical κ values
  without the underlying physical model. The thermoelectric materials community
  (materials science / chemistry) and the phonon physics community (condensed matter
  physics) overlap but use different language. The CPU cooling community largely
  treats thermal conductivity as a bulk material property without engineering the
  phonon spectrum.


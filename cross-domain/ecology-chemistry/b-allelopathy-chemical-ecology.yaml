id: b-allelopathy-chemical-ecology
title: >
  Allelopathy — plant chemical warfare via secondary metabolites — is the ecological
  instantiation of the same coevolutionary arms race chemistry that drives herbivore
  detoxification enzyme diversification, and plant VOC emissions create regional
  aerosol-climate feedbacks connecting chemical ecology to atmospheric physics.
status: established
fields:
  - ecology
  - chemistry
  - biology
bridge_claim: >
  Allelopathy is the release of phytochemicals (allelochemicals) by plants that
  inhibit the germination, growth, or survival of neighbouring plants. Juglone
  (5-hydroxy-1,4-naphthoquinone) from black walnut (Juglans nigra) inhibits
  respiratory chain complex I and plant mitochondrial electron transport with
  IC₅₀ ≈ 10⁻⁵ M. Invasive plants exploit allelopathy: garlic mustard (Alliaria
  petiolata) releases benzyl isothiocyanate that disrupts arbuscular mycorrhizal
  fungal networks of native forest species, effectively weaponising the fungal
  communication infrastructure. The Ehrlich-Raven (1964) coevolution thesis explains
  the diversity of plant secondary metabolites (> 200,000 known structures) as an
  arms race: Brassicaceae glucosinolates evolved as herbivore deterrents; Pieridae
  butterflies evolved myrosinase-inactivating sequestration; plants counter-evolved
  novel glucosinolates — a ratchet driving diversification. Terpenoid volatile organic
  compounds (isoprene C₅H₈, monoterpenes) emitted by trees at rates of 10⁸–10⁹ kg/yr
  globally form secondary organic aerosols (SOA) that act as cloud condensation nuclei —
  a direct feedback from forest chemical ecology to regional cloud cover and precipitation.
translation_table:
  - field_a_term: complex I inhibitor (respiratory chain)
    field_b_term: juglone (allelopathic quinone from Juglans nigra)
    note: Juglone's mechanism as respiratory inhibitor explains its broad phytotoxicity
  - field_a_term: coevolutionary arms race (Red Queen)
    field_b_term: Ehrlich-Raven diversification — plant glucosinolates ↔ butterfly detoxification enzymes
    note: Both produce runaway diversification; the biochemical ratchet generates > 100 glucosinolate structures in Brassicaceae
  - field_a_term: mycorrhizal network disruption
    field_b_term: garlic mustard isothiocyanate attacking native forest AMF networks
    note: Invasive success partly explained by undermining native plant mutualistic infrastructure
  - field_a_term: secondary organic aerosol (SOA) formation
    field_b_term: biogenic isoprene and monoterpene oxidation → cloud condensation nuclei
    note: Boreal forest monoterpene emissions create a negative climate feedback (more SOA → more clouds → less solar heating)
  - field_a_term: metabolomics fingerprint
    field_b_term: allelochemical profile of soil and plant tissue
    note: LC-MS metabolomics can map allelopathic compounds in rhizosphere soil and identify active fractions

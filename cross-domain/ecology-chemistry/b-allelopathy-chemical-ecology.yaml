cross_pollination_opportunities:
  - >
    Allelopathy-based sustainable agriculture: screen crop rhizobacteria for
    allelopathy-suppressing biofilms that protect mycorrhizal networks in fields
    invaded by weedy Alliaria or Brassica species; use metabolomics to identify
    the specific isothiocyanate species and concentrations that cross ecotoxicological
    thresholds in different soil types.
  - >
    Biogenic SOA climate forcing quantification: combine forest-floor isoprene and
    monoterpene emission measurements with satellite-derived aerosol optical depth
    data to disentangle biological vs. anthropogenic SOA contributions to regional
    cloud radiative forcing; test predictions of the BVOC-climate feedback loop.
  - >
    Natural product prospecting from allelopathic plants: use bioactivity-guided
    fractionation of allelopathic extracts to identify novel herbicidal scaffolds;
    compare with soil microbiome metabolomics to identify plants that deploy
    novel allelochemical strategies not yet represented in herbicide libraries.
communication_gap: >
  Allelopathy research sits at the boundary of plant physiology, soil science, and
  natural products chemistry — three communities that rarely attend the same conferences.
  The atmospheric chemistry connection (VOC → SOA → cloud formation) is studied by
  atmospheric scientists who have no contact with plant ecologists. The Ehrlich-Raven
  coevolution framework is known to evolutionary biologists but not to agrochemists
  who study the same compounds as herbicide leads.

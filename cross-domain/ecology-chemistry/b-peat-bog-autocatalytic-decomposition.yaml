id: b-peat-bog-autocatalytic-decomposition
title: >
  Peat bog carbon dynamics exhibit autocatalytic decomposition feedbacks where
  warming-induced microbial activity accelerates decomposition, releasing CO₂
  that further warms the atmosphere — a positive feedback loop modeled by
  autocatalytic chemical kinetics, with pH buffering by Sphagnum moss acting
  as the key negative feedback that maintains peat stability under current conditions.
status: established
fields:
  - ecology
  - chemistry
  - biogeochemistry
bridge_claim: >
  Autocatalytic decomposition follows d[P]/dt = -k·[P]·[E] where [P] = peat
  substrate and [E] = enzyme/microbial biomass, with [E] itself growing as
  d[E]/dt = r·[P] - δ·[E] (growth from substrate, decay at rate δ). The system
  has a saddle-point instability: below a threshold peat substrate concentration,
  microbial activity self-quenches; above it, decomposition autocatalytically
  accelerates. Sphagnum moss acidifies peat water to pH 3.5-4.5, suppressing
  microbial decomposition enzymes whose activity peaks at pH 6-7 (Michaelis-Menten
  kinetics shift K_m with pH). The climate feedback parameter λ = d(CO₂ flux)/dT
  ≈ 15-30 Tg C yr⁻¹ K⁻¹ for boreal peatlands quantifies the autocatalytic
  positive feedback strength; thermal runaway (irreversible peat loss) corresponds
  to autocatalytic ignition crossing the stability boundary.
translation_table:
  - field_a_term: peat decomposition positive feedback (ecology)
    field_b_term: autocatalytic reaction / substrate-catalyst co-amplification (chemistry)
    note: Microbial biomass produced by decomposition catalyzes further decomposition — autocatalysis
  - field_a_term: Sphagnum moss acidification (ecology)
    field_b_term: pH-dependent enzyme inhibition / negative feedback (chemistry)
    note: Sphagnum lowers pH to suppress decomposer enzyme activity, providing chemical stabilization
  - field_a_term: peat tipping point / irreversible loss (ecology)
    field_b_term: autocatalytic ignition / explosive reaction threshold (chemistry)
    note: Both represent the critical point where positive feedback overwhelms negative controls
  - field_a_term: methane emission rate from bogs (ecology)
    field_b_term: product yield of anaerobic autocatalytic pathway (chemistry)
    note: CH₄ is the end product of anaerobic peat decomposition; its rate scales with autocatalytic feedback
related_unknowns:
  - u-peat-bog-tipping-point-temperature-threshold-permafrost
related_hypotheses:
  - h-sphagnum-restoration-stabilizes-degraded-peatland-carbon
cross_pollination_opportunities:
  - Applying autocatalytic reaction kinetics and bifurcation theory to forecast irreversible peat loss thresholds under climate change scenarios
  - Using isotopic tracers (δ¹³C, Δ¹⁴C) to measure decomposition pathways and calibrate autocatalytic bog models
communication_gap: >
  Peat ecologists studying bog carbon balance and chemists studying autocatalytic
  decomposition kinetics have overlapping frameworks, but quantitative kinetic
  modeling of bog autocatalytic feedbacks is dominated by ecologists using
  empirical temperature sensitivities (Q₁₀ factors) rather than mechanistic
  enzyme-substrate kinetic models from biochemistry; bridging the two would
  improve climate feedback projections.

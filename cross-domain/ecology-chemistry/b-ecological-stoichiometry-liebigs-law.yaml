communication_gap: >
  Agricultural chemists applying Liebig's law to soil fertility and ecologists
  studying stoichiometric constraints on food webs developed their frameworks
  largely independently; the explicit mathematical unification via threshold
  elemental ratios emerged in the 1990s with Sterner and Elser's work.

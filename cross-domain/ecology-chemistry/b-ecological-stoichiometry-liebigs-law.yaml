id: b-ecological-stoichiometry-liebigs-law
title: >
  Ecological stoichiometry quantifies how the ratios of chemical elements (C:N:P)
  constrain organism growth and ecosystem processes, with Liebig's law of the minimum
  from agricultural chemistry providing the foundational principle that growth is
  limited by the scarcest required nutrient relative to demand.
status: established
fields:
  - ecology
  - chemistry
  - biogeochemistry
bridge_claim: >
  Liebig's law (1840) states that plant yield is determined by the most limiting
  nutrient: growth rate μ = μ_max · min(S_N/K_N, S_P/K_P, S_C/K_C) where S_i are
  nutrient concentrations and K_i are half-saturation constants. Ecological
  stoichiometry extends this: the elemental ratio of biomass (e.g. Redfield ratio
  C:N:P = 106:16:1 for marine phytoplankton) defines the demand side, while the
  supply ratio determines which nutrient limits. The threshold elemental ratio (TER)
  predicts the consumer-resource elemental ratio above which growth shifts from
  C-limited to nutrient-limited, unifying Liebig's chemistry with ecological
  energy-nutrient co-limitation theory.
translation_table:
  - field_a_term: limiting nutrient (ecology)
    field_b_term: Liebig minimum factor (chemistry)
    note: Same concept; ecology applies it to consumers and multiple trophic levels
  - field_a_term: Redfield ratio C:N:P = 106:16:1 (ecology)
    field_b_term: stoichiometric demand ratio (chemistry)
    note: Empirical elemental ratio defining "balanced" phytoplankton nutrition
  - field_a_term: threshold elemental ratio TER (ecology)
    field_b_term: stoichiometric break-even point (chemistry)
    note: TER predicts the supply ratio where limitation switches between C and mineral nutrients
  - field_a_term: nutrient recycling efficiency (ecology)
    field_b_term: mass balance in biogeochemical cycles (chemistry)
    note: Stoichiometric constraints determine how efficiently nutrients are cycled through trophic levels

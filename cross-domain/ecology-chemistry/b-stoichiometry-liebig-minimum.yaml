id: b-stoichiometry-liebig-minimum
title: >
  Ecological stoichiometry treats organisms as chemical reactors with fixed
  elemental ratios (the Redfield ratio in marine phytoplankton), and Liebig's
  law of the minimum — growth is limited by the scarcest nutrient relative to
  stoichiometric demand — is the biological application of chemical equilibrium
  constraints.
status: established
fields:
  - ecology
  - ecological-stoichiometry
  - chemistry
  - chemical-thermodynamics
  - oceanography
bridge_claim: >
  Organisms maintain remarkably fixed elemental compositions despite variable
  environmental nutrient ratios. Marine phytoplankton converge on the Redfield
  ratio C:N:P ≈ 106:16:1 (by atoms), first documented by Alfred Redfield (1958)
  and later explained as an optimum under evolutionary selection (Klausmeier et al.
  2004). This fixed stoichiometry is a chemical constraint: the organism is a
  reactor whose reaction stoichiometry (the biochemical pathways) requires elements
  in specific ratios, exactly as a chemical reaction requires reactants in
  stoichiometric proportions. Liebig's law of the minimum (von Liebig 1840) — the
  nutrient most deficient relative to demand limits growth — is thermodynamically
  equivalent to Le Chatelier's principle: the reaction proceeds until the limiting
  reagent is exhausted. The mathematical formulation is Droop's cell quota model:
  μ = μ_max(1 - Q_min/Q), where Q is the internal nutrient quota and Q_min is
  the minimum subsistence quota. This maps onto Monod kinetics (μ = μ_max·S/(K_s+S))
  but is derived from stoichiometric first principles. Ecological stoichiometry
  (Sterner & Elser 2002) is thus chemistry applied at the ecosystem scale.
translation_table:
  - field_a_term: limiting nutrient (element in shortest supply relative to demand)
    field_b_term: limiting reagent in a chemical reaction
    note: the reaction (growth) stops when the limiting reagent (nutrient) is exhausted
  - field_a_term: Redfield ratio C:N:P = 106:16:1
    field_b_term: stoichiometric coefficients of the overall biochemical reaction
    note: deviations from Redfield indicate resource imbalance or evolutionary adaptation
  - field_a_term: internal cell quota Q (element per cell)
    field_b_term: intracellular concentration of a chemical reactant
  - field_a_term: Liebig's law of the minimum
    field_b_term: Le Chatelier's principle (system responds to remove stress on limiting reactant)
  - field_a_term: stoichiometric mismatch (consumer vs. food elemental ratio)
    field_b_term: off-stoichiometry reaction — requires excess of non-limiting reactants
  - field_a_term: nutrient recycling efficiency
    field_b_term: reaction yield / atom economy in green chemistry
related_unknowns:
  - u-redfield-ratio-evolutionary-constraint
cross_pollination_opportunities:
  - >
    Green chemistry's principle of atom economy (Trost 1991) minimizes waste by
    maximizing the fraction of reactant atoms incorporated in the product. Ecological
    stoichiometry's concept of nutrient use efficiency is the biological equivalent.
    Comparing optimal stoichiometry across chemical synthesis and ecological networks
    could identify universal principles of resource efficiency.
  - >
    Stoichiometric constraints propagate up food webs: a herbivore eating
    P-deficient plants must excrete excess C and N. These imbalance-driven fluxes
    drive biogeochemical cycling (the biological pump in the ocean). Chemical
    oceanographers model these as mass-balance equations — ecological stoichiometry
    and marine chemistry share the same governing equations.
communication_gap: >
  Von Liebig (1840) and Redfield (1958) wrote before modern ecological stoichiometry
  as a field existed, so their chemical insights were not formalised in the language
  of chemical thermodynamics. Sterner and Elser (2002) built the field but their
  textbook is read by ecologists, not chemists. The Le Chatelier connection is
  conceptually immediate but has not, to our knowledge, been formally demonstrated
  in any cross-disciplinary publication.

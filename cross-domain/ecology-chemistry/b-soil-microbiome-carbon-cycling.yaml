id: b-soil-microbiome-carbon-cycling
title: >
  Soil microbial carbon use efficiency (CUE = 0.3–0.6) and the MEMS framework
  (high-CUE microbes → necromass → organo-mineral stabilisation) determine whether
  soil's 2,500 Gt C reservoir accumulates or mineralises, with +3-4°C warming
  predicted to release ~55 Gt C by 2100 via microbial priming.
status: established
fields:
  - ecology
  - chemistry
  - microbiology
  - climate-science
  - biochemistry
bridge_claim: >
  Soil holds ~2,500 Gt C — more than three times the combined carbon in the atmosphere
  (~870 Gt C) and all living biomass (~600 Gt C). The fate of this carbon depends
  critically on soil microbial community composition and metabolism, connecting
  ecological community ecology to biogeochemistry and global climate.

  Microbial carbon use efficiency (CUE) quantifies the fraction of assimilated carbon
  allocated to biomass growth vs. respiration (CO₂ efflux): CUE = ΔC_biomass /
  (ΔC_biomass + C_respired). CUE ranges 0.3–0.6 across soil microbial communities,
  varying with substrate quality, temperature, and stoichiometry. At CUE = 0.5, half
  of consumed organic carbon is respired to the atmosphere immediately; the remainder
  enters microbial biomass, which eventually becomes microbial necromass.

  Priming effect: addition of fresh labile C (e.g., root exudates) stimulates microbial
  activity and can either increase decomposition of old recalcitrant organic matter
  (positive priming — net C loss) or promote mineral-associated organic matter formation
  (negative priming — net C stabilisation). The sign of priming depends on stoichiometric
  imbalance (microbial N-mining of old C to access N) and community composition.

  Microbial Efficiency-Matrix Stabilization (MEMS, Cotrufo et al. 2013): high-CUE
  microbes produce more biomass per unit substrate consumed → more necromass production
  → organo-mineral associations with clay minerals (Fe/Al oxides, phyllosilicates) →
  physically protected soil organic carbon (SOC) with centennial-to-millennial residence
  time. Kallenbach et al. (2016) demonstrated that fungal-dominated soils (higher CUE)
  accumulate more mineral-associated OM than bacterially-dominated soils at matched
  inputs. Climate feedback: warming experiments (+3–4°C) consistently show ~20%
  increase in soil respiration (Q₁₀ ≈ 2), with meta-analyses projecting release of
  ~55 Gt C by 2100 — a positive climate feedback that Earth system models underestimate.
translation_table:
  - field_a_term: carbon use efficiency CUE = ΔC_biomass / ΔC_total
    field_b_term: "microbial thermodynamic growth yield (biochemistry: ATP per C-mol)"
  - field_a_term: priming effect (labile C input → change in recalcitrant C decomposition)
    field_b_term: "co-metabolic enzyme induction (microbiology: substrate switching)"
  - field_a_term: organo-mineral association (Fe/Al-oxide sorption of necromass)
    field_b_term: surface chemistry adsorption isotherm (Langmuir/Freundlich)
  - field_a_term: Q₁₀ temperature sensitivity of soil respiration
    field_b_term: Arrhenius activation energy E_a of microbial enzyme complexes
  - field_a_term: SOC residence time (radiocarbon ¹⁴C mean age)
    field_b_term: half-life of mineral-protected organic carbon pool

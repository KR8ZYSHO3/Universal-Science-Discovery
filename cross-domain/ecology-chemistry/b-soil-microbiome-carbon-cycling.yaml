cross_pollination_opportunities:
  - >
    Solid-state ¹³C NMR and nano-SIMS isotopic imaging can now map carbon chemistry
    and microbial identity at the sub-micron scale of organo-mineral aggregates —
    bridging analytical chemistry, mineralogy, and microbial ecology in the same
    measurement volume. Coupling this with metatranscriptomics could directly test
    MEMS predictions about CUE and necromass production at the scale of individual
    microbial cells.
  - >
    Earth system models (CESM, GFDL) currently represent soil carbon with a simple
    RothC-style 3-pool model (fast/slow/passive) that does not explicitly include
    microbial CUE or organo-mineral dynamics. Incorporating MEMS into ESM soil modules
    requires collaboration between soil microbial ecologists, geochemists, and climate
    modellers — three communities rarely in the same working group.
communication_gap: >
  Soil microbial ecology (ecology journals: ISME J, Soil Biol Biochem), biogeochemistry
  (Global Biogeochem Cycles, Nat Clim Chang), and Earth system modelling (J Clim, J Adv
  Model Earth Syst) have different temporal scales (years vs. decades vs. centuries),
  different spatial scales (pedon vs. landscape vs. global), and different data types
  (16S rRNA amplicon vs. isotope ratio vs. atmospheric CO₂). The MEMS framework
  (2013) took nearly a decade to influence global carbon model development. Climate
  scientists rarely attend soil ecology meetings and vice versa.

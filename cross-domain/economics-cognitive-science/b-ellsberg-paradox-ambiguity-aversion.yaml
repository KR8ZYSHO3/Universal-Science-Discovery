id: b-ellsberg-paradox-ambiguity-aversion
title: >
  The Ellsberg paradox demonstrates that decision-makers prefer known-probability risks over unknown-probability ambiguity (ambiguity aversion), violating Savage's subjective expected utility axioms and requiring Choquet expected utility or maxmin expected utility theories that assign non-additive capacities to ambiguous events
status: established
fields:
  - economics
  - cognitive-science
bridge_claim: >
  In the Ellsberg urn experiment (30 red balls + 60 unknown black/yellow balls), most subjects prefer betting on red (known p=1/3) over black (unknown probability) in both direct and reversed conditions, violating the sure-thing principle; this ambiguity aversion is modeled by Choquet expected utility with a non-additive capacity ν (where ν(B) + ν(B^c) < 1) or Gilboa-Schmeidler maxmin expected utility V(f) = min_{P∈C} E_P[u(f(·))], connecting behavioral economics (ambiguity aversion) to cognitive science (uncertainty representations) and to formal decision theory (non-additive probability measures).
translation_table:
  - field_a_term: "Ellsberg urn paradox preference reversal (economics)"
    field_b_term: "violation of Savage's P2 sure-thing principle / additive probability axiom (cognitive science)"
    note: "Ellsberg preferences cannot be represented by any additive subjective probability measure over outcomes"
  - field_a_term: "ambiguity aversion / Ellsberg paradox (economics)"
    field_b_term: "compound uncertainty aversion — preference for first-order over second-order uncertainty (cognitive science)"
    note: "Ambiguity = unknown probability = compound lottery over possible probability distributions; aversion is stronger for compound uncertainty"
  - field_a_term: "Choquet capacity ν (non-additive) (economics)"
    field_b_term: "subjective belief function encoding ambiguity where ν(A) + ν(A^c) ≤ 1 (cognitive science)"
    note: "Subadditivity ν(A) + ν(A^c) < 1 captures ambiguity: the agent assigns less total probability than 1 to complement pairs"
  - field_a_term: "maxmin expected utility set C of priors (economics)"
    field_b_term: "mental model of a set of possible probability distributions over outcomes (cognitive science)"
    note: "Agent acts as if optimizing worst-case expected utility over a convex set C of possible probability models"
communication_gap: >
  Behavioral economists study Ellsberg-type violations in laboratory choice tasks while cognitive scientists study uncertainty representation in neural circuits; the neurobiological basis of ambiguity aversion (how the brain represents and evaluates sets of possible probability distributions) is only beginning to be explored with neuroimaging.
cross_pollination_opportunities:
  - "Using fMRI to identify brain regions (amygdala, prefrontal cortex) showing differential activation during risky (known probability) versus ambiguous (unknown probability) decisions and testing whether activation correlates with Choquet capacity parameters"
  - "Applying maxmin expected utility models to policy decisions under deep uncertainty (climate change, pandemic preparedness) as a normative alternative to expected utility maximization"

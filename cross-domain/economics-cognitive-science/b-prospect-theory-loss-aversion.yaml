id: b-prospect-theory-loss-aversion
title: >
  Prospect theory formalizes cognitive loss aversion as an asymmetric S-shaped value
  function with probability weighting, bridging behavioral economics and the psychophysics
  of decision under uncertainty.
status: established
fields:
  - behavioral-economics
  - cognitive-science
  - psychology
bridge_claim: >
  Kahneman and Tversky's prospect theory maps the cognitive phenomenon of loss aversion
  (losses loom approximately twice as large as equivalent gains) onto an asymmetric
  value function v(x) with v'(x) diminishing in both gains and losses, combined with
  a probability weighting function that overweights small probabilities and underweights
  large ones, providing a psychophysically grounded quantitative model of economic choice.
translation_table:
  - field_a_term: utility function U(x) (expected utility theory)
    field_b_term: value function v(x) relative to reference point (prospect theory)
    note: Prospect theory replaces absolute wealth utility with gain/loss relative to a reference point
  - field_a_term: loss aversion coefficient lambda ~ 2 (behavioral economics)
    field_b_term: asymmetric response to negative vs positive stimuli (psychophysics)
    note: Weber-Fechner law applied asymmetrically predicts steeper loss sensitivity
  - field_a_term: probability weighting function w(p)
    field_b_term: subjective probability / cognitive probability distortion
    note: Overweighting of rare events corresponds to availability heuristic in cognitive science
  - field_a_term: reference point dependence (economics)
    field_b_term: perceptual adaptation / sensory baseline (cognitive neuroscience)
    note: Neural adaptation sets a local reference; gains/losses are computed relative to it
related_unknowns:
  - u-loss-aversion-neural-substrate
related_hypotheses:
  - h-prospect-theory-neural-value-coding
cross_pollination_opportunities:
  - Neuroimaging of gain/loss asymmetry to identify the neural circuits implementing the value function
  - Applying prospect theory probability weighting to risk communication in public health messaging
communication_gap: >
  Economists model choice behavior mathematically while cognitive scientists study
  the underlying neural and computational mechanisms; the prospect theory framework
  is widely used in economics but rarely linked to its neurobiological implementation,
  which would allow predictions about when and why the model breaks down.
last_reviewed: "2026-05-07"
references:
  - doi: "10.2307/1914185"
    note: Kahneman & Tversky (1979) Econometrica - original prospect theory paper
  - doi: "10.1006/jets.1992.1042"
    note: Tversky & Kahneman (1992) - cumulative prospect theory
  - doi: "10.1016/j.neuron.2009.09.016"
    note: Sokol-Hessner et al. (2009) - neural correlates of loss aversion in vmPFC

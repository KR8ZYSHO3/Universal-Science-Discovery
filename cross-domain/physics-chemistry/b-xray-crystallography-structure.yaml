id: b-xray-crystallography-structure
title: >
  Bragg's law nλ = 2d sinθ bridges X-ray physics (diffraction from crystal planes)
  to chemical structure determination (electron density maps via Fourier inversion),
  with the phase problem as the central mathematical obstacle whose solutions
  (isomorphous replacement, anomalous diffraction, molecular replacement) enabled
  the determination of insulin, vitamin B12, and DNA double helix structures.
status: established
fields:
  - physics
  - chemistry
  - structural-biology
  - crystallography
bridge_claim: >
  Bragg's law nλ = 2d sinθ (1913) established that X-rays constructively interfere
  when the path length difference 2d sinθ equals an integer multiple of the
  wavelength — a purely physical result about wave diffraction from periodic
  planes with spacing d. The structure factor F_{hkl} = Σⱼ fⱼ exp(2πi(hxⱼ+kyⱼ+lzⱼ))
  is the Fourier transform of the electron density at reciprocal lattice point (hkl),
  where fⱼ is the atomic scattering factor (proportional to atomic number Z).
  X-ray detectors measure intensities I_{hkl} = |F_{hkl}|² but lose the phase φ —
  the phase problem. Its solution required chemistry-driven innovations: isomorphous
  replacement (introduce heavy atoms as phase references), anomalous diffraction
  (SAD/MAD using wavelength-dependent anomalous scattering near absorption edges),
  and molecular replacement (use known structures as phase templates). The electron
  density map ρ(x,y,z) = (1/V)ΣF_{hkl}exp(-2πi(hx+ky+lz)) is then a chemical
  readout of 3D atomic positions. Nobel Prizes across 60 years (Laue 1914, Bragg
  1915, Hodgkin 1964, Watson-Crick via Franklin's data 1962) mark the progressive
  fusion of physics and chemistry. Cryo-EM now challenges X-ray crystallography
  for membrane proteins by avoiding the crystallization requirement.
translation_table:
  - field_a_term: Bragg diffraction condition nλ = 2d sinθ
    field_b_term: reciprocal lattice vector (hkl) indexing crystal planes
    note: Physics gives the condition; crystallography converts angles to (hkl) Miller indices
  - field_a_term: structure factor F_{hkl} (Fourier coefficient)
    field_b_term: electron density Fourier component at reciprocal lattice point
    note: F is measured (amplitude) but phase is lost — the central challenge of crystallography
  - field_a_term: Fourier transform (continuous)
    field_b_term: crystallographic Fourier synthesis (electron density map)
    note: The discrete Fourier sum over Miller indices gives the continuous electron density
  - field_a_term: anomalous dispersion (near absorption edge)
    field_b_term: SAD/MAD phasing method
    note: Wavelength-dependent f'' component provides phase information without isomorphous replacement
  - field_a_term: Patterson function P(u,v,w) = |F|² transform
    field_b_term: vector map of interatomic distances (heavy atom location)
    note: Patterson map locates heavy atom positions without phases — first step of MIR/SIR
  - field_a_term: R-factor = Σ|F_obs - F_calc|/ΣF_obs
    field_b_term: crystallographic refinement convergence metric
    note: R_free (cross-validated) distinguishes model improvement from overfitting

cross_pollination_opportunities:
  - Apply machine learning phase prediction (deep learning on Patterson maps) to
    solve the phase problem ab initio for novel crystal classes without experimental
    phasing — purely mathematical prediction of crystallographic phases
  - Use cryo-EM as a ground truth to validate and improve X-ray crystallographic
    models of membrane proteins in detergent micelles vs. native lipid bilayers
  - Develop serial femtosecond crystallography (SFX) at X-ray free electron lasers
    (XFELs) to capture enzyme reaction intermediates at picosecond resolution —
    bridging static structure determination to dynamic chemical mechanism
  - Port crystallographic real-space refinement algorithms to cryo-ET subtomogram
    averaging to improve resolution of macromolecular complexes in situ
communication_gap: >
  Physicists who study X-ray diffraction from the wave optics perspective rarely
  interact with structural biologists who use it to determine protein structures.
  The mathematical infrastructure (reciprocal space, Fourier methods, Bayesian
  refinement) is shared but has developed independently in each community, with
  parallel but disconnected literatures in Acta Crystallographica (chemistry/biology)
  and Physical Review (physics). The Nobel history spans Physics (Laue, Bragg)
  and Chemistry (Hodgkin) committees — reflecting the genuine disciplinary boundary.

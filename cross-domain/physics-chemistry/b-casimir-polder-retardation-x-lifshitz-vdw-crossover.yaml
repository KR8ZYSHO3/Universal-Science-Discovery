id: b-casimir-polder-retardation-x-lifshitz-vdw-crossover
title: >
  Casimir–Polder forces between polarizable atoms interpolate between nonretarded van der Waals (∝ R⁻⁶) and retarded (∝ R⁻⁷) power laws as electromagnetic retardation grows with separation — unified macroscopically by Lifshitz theory where frequency-dependent ε(ω) bridges short-range van der Waals and macroscopic Casimir pressures across material interfaces.
status: established
fields:
  - physics
  - chemistry
  - quantum-electrodynamics
bridge_claim: >
  Microscopic London dispersion merges into continuum Lifshitz/Casimir descriptions when multipolar fluctuations are integrated with proper causal Green functions — distance regimes distinguish **Casimir** as macroscopic QED boundary phenomenon versus **vdW** as molecular terminology — physically one continuum with scale-dependent asymptotics rather than unrelated forces.
translation_table:
  - field_a_term: Casimir–Polder pair potential between neutral atoms (retardation crossover)
    field_b_term: distance regimes of London dispersion curves in molecular simulations
    note: Same fluctuation origin; simulations often splice empirical potentials rather than full frequency integrals.
  - field_a_term: Lifshitz integral over imaginary Matsubara frequencies ξ_n
    field_b_term: Hamaker-style coarse-graining of pairwise dispersion between mesoscale bodies
    note: Lifshitz reduces to Hamaker constants in dilute limits with modeling caveats.
  - field_a_term: Casimir pressure between conducting plates in vacuum
    field_b_term: solvation/London interactions screened by electrolytes in chemistry contexts
    note: Screening and aqueous environments dramatically alter spectral ε(ω) paths — bridge highlights vacuum/clarified-limit pedagogy first.
communication_gap: >
  Chemistry curricula emphasize pairwise Lennard-Jones tails while condensed-matter physics emphasizes Lifshitz/Casimir plates — graduate students may not realize retardation and screening unify within one spectral formalism.
cross_pollination_opportunities:
  - Couple polarizable force fields with optional Lifshitz subroutine modules for mesoscale colloid simulations crossing nm–µm separations.
  - Demonstration labs measuring Casimir torsion balances alongside surface-force apparatus spanning vdW to retarded regimes on identical substrates.

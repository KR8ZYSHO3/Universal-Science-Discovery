id: b-maxwell-boltzmann-chemical-kinetics
title: >
  The Maxwell-Boltzmann speed distribution determines the fraction of molecules
  energetic enough to overcome activation barriers, directly deriving the Arrhenius
  equation and establishing statistical mechanics as the microscopic foundation of
  chemical kinetics.
status: established
fields:
  - statistical-mechanics
  - physical-chemistry
  - chemical-kinetics
  - thermodynamics
bridge_claim: >
  The Maxwell-Boltzmann distribution f(v) = 4π(m/2πkT)^(3/2) v² exp(-mv²/2kT)
  gives the probability that a molecule has speed v at temperature T. For a reaction
  to occur, the collision must supply at least the activation energy E_a. The fraction
  of molecules exceeding E_a is ∝ exp(-E_a/kT), which is exactly the Boltzmann factor
  in the Arrhenius equation:

    k(T) = A · exp(-E_a / RT)

  Eyring's transition state theory (1935) deepens this connection by computing the
  rate from partition functions of the transition state:

    k = (kBT/h) · exp(-ΔG‡ / RT)

  where ΔG‡ = ΔH‡ - TΔS‡ is the Gibbs free energy of activation. The activation
  enthalpy ΔH‡ is the energy barrier; the entropy term exp(ΔS‡/R) becomes the
  pre-exponential factor A. Chemical reaction kinetics is thus a direct application
  of statistical mechanics to molecular speed distributions: every temperature
  dependence of a rate constant encodes the shape of the Maxwell-Boltzmann tail.

  KEY CONNECTIONS:

  1. ARRHENIUS FROM MAXWELL-BOLTZMANN: integrating f(v) over the high-velocity
     tail (kinetic energy > E_a) yields the Boltzmann factor exp(-E_a/kT), directly
     producing the Arrhenius form without additional assumptions.

  2. EYRING'S REFINEMENT: transition state theory adds the transmission coefficient
     κ (quantum tunnelling, recrossing) and replaces E_a with the full ΔG‡, connecting
     free-energy landscapes (chemistry) to partition functions (statistical mechanics).

  3. COLLISION THEORY: the pre-exponential A = Z_AB · σ · √(8kT/πμ), where σ is the
     steric factor and Z_AB the collision frequency — again derived from kinetic theory.

  4. CATALYSIS: a catalyst lowers ΔG‡ (not ΔG of reaction), increasing the fraction of
     molecules in the reactive tail and accelerating k without changing thermodynamics.
translation_table:
  - field_a_term: Maxwell-Boltzmann distribution f(v)
    field_b_term: collision energy distribution
    note: The speed distribution maps to a collision energy distribution via E = ½mv²
  - field_a_term: Boltzmann factor exp(-E/kT)
    field_b_term: Arrhenius exponential exp(-E_a/RT)
    note: R = N_A · k; the Boltzmann factor is the single-molecule form of the Arrhenius factor
  - field_a_term: thermal equilibrium temperature T
    field_b_term: reaction rate constant k(T)
    note: Temperature controls both the width of f(v) and the rate constant via the same exp(-E/kT)
  - field_a_term: partition function Z
    field_b_term: pre-exponential factor A
    note: In TST, A comes from the ratio of partition functions of transition state to reactants
  - field_a_term: phase-space density
    field_b_term: transition state ensemble
    note: The transition state is the saddle point of the free-energy landscape — a phase-space dividing surface

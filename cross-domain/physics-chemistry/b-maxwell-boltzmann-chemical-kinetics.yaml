cross_pollination_opportunities:
  - Apply kinetic Monte Carlo (statistical mechanics) to model heterogeneous catalysis on surfaces
  - Use the Eyring equation to extract ΔH‡ and ΔS‡ from Arrhenius plots and compare to DFT transition-state calculations
  - Design temperature-responsive polymers exploiting the same exp(-E_a/kT) dependence that governs enzyme catalysis
  - Apply extreme-value statistics (statistics of the Maxwell-Boltzmann tail) to predict rare reactive events in stochastic chemistry
communication_gap: >
  Physical chemistry curricula cover both the Maxwell-Boltzmann distribution and
  Arrhenius kinetics, but the derivation of one from the other is often omitted.
  Statistical mechanics courses treat f(v) as a physics result; kinetics courses
  treat the Arrhenius equation as an empirical law. The explicit derivation — that
  every Arrhenius rate constant is an integral over the Maxwell-Boltzmann tail —
  belongs in both curricula but appears in neither as a highlighted bridge.

cross_pollination_opportunities:
  - Apply Kramers theory to protein folding rate predictions from PES landscapes
  - Use ion channel gating data to validate Kramers rate theory in biological systems
  - Machine learning of PES landscapes to predict reaction rates without quantum chemistry
communication_gap: >
  Physical chemists computing PES and biochemists studying enzyme kinetics rarely share
  mathematical frameworks. Transition state theory is taught in physical chemistry but
  Kramers theory is taught in statistical physics; the equivalence is rarely emphasised.
  Biophysicists studying protein folding often reinvent Kramers theory terminology.

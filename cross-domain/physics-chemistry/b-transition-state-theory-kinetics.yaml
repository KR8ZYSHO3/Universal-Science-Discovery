id: b-transition-state-theory-kinetics
title: Transition state theory (Eyring 1935) and Kramers' escape rate (1940) unify chemical reaction kinetics, protein conformational dynamics, and ion channel gating as thermally activated first-passage over energy barriers
status: established
fields:
  - physics
  - chemistry
bridge_claim: >
  Transition state theory (Eyring, Evans & Polanyi 1935) describes chemical reactions as
  passage over a saddle point on the potential energy surface (PES): the rate constant
  k = (k_B T/h) exp(-ΔG‡/RT), where ΔG‡ is the free energy of the transition state
  (activated complex) relative to reactants. This is a first-passage time problem: the
  reaction rate is the rate at which thermal fluctuations drive the system over the energy
  barrier separating reactants from products. Kramers (1940) solved this problem exactly for
  Brownian motion in a double-well potential, yielding the same Arrhenius-like rate with
  corrections for barrier shape and solvent friction. The mathematical framework is universal:
  protein folding (escape from misfolded local minima), ion channel gating (closed↔open
  transition), nucleation events, and magnetic reversal all obey the same Kramers escape rate
  formula. The connection between PES saddle points and macroscopic kinetics is a universal
  bridge between quantum chemistry and statistical physics.
translation_table:
  - field_a_term: transition state (saddle point on PES)
    field_b_term: free energy barrier ΔG‡
    note: Same object — the highest-free-energy point on the minimum energy path
  - field_a_term: Eyring rate k = (kT/h)exp(-ΔG‡/RT)
    field_b_term: Kramers rate k = (ω_min ω_b / 2πγ)exp(-ΔE/kT)
    note: Both are Arrhenius forms; Kramers adds friction and barrier curvature corrections
  - field_a_term: reaction coordinate
    field_b_term: order parameter / progress variable
    note: The collective coordinate along which the system moves from reactant to product basin
  - field_a_term: PES landscape (quantum chemistry, DFT)
    field_b_term: free energy landscape (statistical mechanics, umbrella sampling)
    note: Quantum PES averaged over thermal fluctuations gives the free energy surface

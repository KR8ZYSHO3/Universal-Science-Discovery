cross_pollination_opportunities:
  - >
    Materials informatics for electrocatalyst discovery: the Sabatier principle (volcano
    plot) predicts that the optimal catalyst has intermediate adsorbate binding energy —
    neither too weak (poor activation) nor too strong (surface poisoning). DFT-computed
    binding energies of O*, OH*, and OOH* intermediates screen thousands of alloy
    compositions computationally; machine learning potentials (NequIP, MACE) reduce
    DFT cost by 100-1000× — enabling high-throughput screening for Pt-free ORR catalysts.
  - >
    Proton-coupled electron transfer (PCET) theory bridges quantum chemistry and
    electrochemistry: the Marcus-Levich-Dogonadze theory of electron transfer in
    solution (Marcus Nobel 1992) extended to coupled proton-electron transfer predicts
    kinetic isotope effects and pH dependence of electrocatalytic rates — connecting
    quantum tunneling of protons to macroscopic electrode kinetics.
communication_gap: >
  Thermodynamics (19th century, Carnot-Kelvin-Gibbs tradition) and electrochemistry
  (Faraday-Nernst tradition) developed largely independently. Physical chemistry
  courses teach Nernst equation without connecting it to Butler-Volmer kinetics, which
  appears in electrochemical engineering courses. Materials scientists developing
  catalysts rarely engage with the thermodynamic efficiency framework; energy economists
  modeling hydrogen supply chains rarely understand the catalyst kinetics that constrain
  practical efficiency. The hydrogen economy discourse spans physics, chemistry, materials
  science, and economics — rarely synthesized in a single analytical framework.

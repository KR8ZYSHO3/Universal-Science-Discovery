id: b-electrochemical-energy-storage-conversion
title: >
  Electrochemical energy devices — fuel cells, electrolyzers, and redox flow batteries
  — bridge electrochemistry and thermodynamics: the Gibbs free energy change
  ΔG = -nFE determines theoretical efficiency, while Butler-Volmer kinetics and
  Ohmic losses set practical limits, unifying chemical reaction thermodynamics with
  electrical energy conversion.
status: established
fields:
  - physics
  - thermodynamics
  - chemistry
  - electrochemistry
  - materials-science
  - energy-engineering
bridge_claim: >
  Fuel cells convert chemical energy directly to electrical energy via electrochemical
  reactions, bypassing the Carnot efficiency limit that constrains heat engines.
  For the hydrogen fuel cell: H₂ + ½O₂ → H₂O, ΔG° = -237.1 kJ/mol.
  The maximum thermodynamic efficiency is η_max = ΔG/ΔH = 237.1/285.8 = 83%
  (vs. Carnot at ~60% for 800°C SOFC and ~40% for 80°C PEM).

  The Nernst equation gives cell voltage as a function of concentration:
  E = E° - (RT/nF) ln Q, where E° = -ΔG°/nF = 1.23V for hydrogen oxidation.
  Butler-Volmer kinetics: j = j₀[exp(αFη/RT) - exp(-(1-α)Fη/RT)] describes
  overpotential η losses at each electrode — the kinetic penalty for finite current.
  At practical current densities, activation overpotential (electrode kinetics),
  Ohmic losses (membrane resistance), and mass transport losses reduce actual
  efficiency to 50-60%.

  PEM fuel cells: Nafion membrane (sulfonated PTFE) conducts H⁺ at ~0.1 S/cm
  while blocking electrons and gases. Pt nanoparticles (~2-3 nm on carbon black)
  catalyze both hydrogen oxidation reaction (HOR) and oxygen reduction reaction
  (ORR — the kinetically limiting step, 100× slower than HOR). ORR kinetics:
  the 4-electron pathway (O₂ → 2H₂O) is desired; 2-electron pathway (O₂ → H₂O₂)
  wastes energy and degrades the membrane.

  Electrolyzers (reverse fuel cells): apply voltage > 1.23V to split H₂O → H₂ + ½O₂.
  Thermodynamic efficiency η = ΔH/(nFV_applied); practical PEM electrolyzers operate
  at 1.8-2.0V (overpotential of 0.6-0.8V) with 70-80% efficiency for green hydrogen.

  Redox flow batteries (RFBs): separate power (stack) from energy (tank volume),
  enabling independent scaling. Vanadium RFB: V²⁺/V³⁺ anolyte and VO²⁺/VO₂⁺ catholyte,
  E° = 1.26V. Energy density ~25 Wh/L, vs. ~200 Wh/L for Li-ion, but unlimited
  cycle life (electrolyte is never consumed).
translation_table:
  - field_a_term: Gibbs free energy change ΔG (chemical thermodynamics)
    field_b_term: maximum electrical work W_max = nFE (electrochemistry)
    note: ΔG = -nFE is the fundamental equation linking thermodynamics and electrochemistry
  - field_a_term: enthalpy of reaction ΔH (total heat content)
    field_b_term: higher heating value (HHV) of fuel (total chemical energy content)
    note: efficiency η = ΔG/ΔH; fuel cell is more efficient than combustion because ΔG < ΔH
  - field_a_term: electrode overpotential η (kinetic penalty)
    field_b_term: internal resistance voltage drop (circuit analogy)
    note: Butler-Volmer η reduces E from E° = 1.23V to ~0.7V at practical current densities
  - field_a_term: Nernst equation (equilibrium potential vs. concentration)
    field_b_term: open-circuit voltage (OCV) of battery at given state of charge
    note: both express thermodynamic driving force as function of species activities
  - field_a_term: exchange current density j₀ (Butler-Volmer parameter)
    field_b_term: electrocatalyst activity (Tafel slope, turnover frequency)
    note: j₀ encodes catalyst quality; Pt has high j₀ for HOR, poor for ORR — drives Pt-alloy research

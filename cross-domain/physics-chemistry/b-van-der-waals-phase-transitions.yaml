id: b-van-der-waals-phase-transitions
title: The van der Waals equation is the prototype for all mean-field theories of phase transitions — its mathematical structure recurs across Landau theory
status: established
fields:
  - chemistry
  - physics
bridge_claim: >
  The van der Waals equation (p + a/V²)(V-b) = RT contains the essential mathematical
  structure of all mean-field phase transitions: a cubic equation of state, a double-well
  free energy below T_c, and an unphysical loop resolved by Maxwell construction.
  Near the critical point, it predicts mean-field critical exponents (β=1/2, γ=1, δ=3)
  that are universal across all systems described by the same free energy symmetry
  (Landau theory). The Cahn-Hilliard equation (spinodal decomposition), Ginzburg-Landau
  theory (superconductors), and even the Higgs mechanism in particle physics share
  the same mathematical skeleton — the van der Waals equation is the simplest
  pedagogical instance of a structure that appears throughout physics and chemistry.
translation_table:
  - field_a_term: molecular attraction parameter a
    field_b_term: negative quadratic term in Landau free energy (-a|phi|^2)
    note: Both provide the driving force for phase separation below T_c
  - field_a_term: excluded volume b
    field_b_term: positive quartic term in Landau free energy (+b|phi|^4)
    note: Both stabilize the ordered phase and prevent divergence
  - field_a_term: Maxwell construction (horizontal lever rule)
    field_b_term: double-tangent construction for phase coexistence
    note: Equal-area rule = common tangent = minimization of Gibbs free energy
  - field_a_term: critical exponent beta = 1/2 (mean field)
    field_b_term: mean-field critical exponent for any scalar order parameter
    note: Universal for mean-field theory; corrected by fluctuations (Wilson RG)
related_unknowns:
  - u-posterior-landscape-multimodality
related_hypotheses:
  - h-van-der-waals-free-energy-double-well
cross_pollination_opportunities:
  - >
    Equation-of-state engineering for CO2 capture and storage requires precise van der
    Waals corrections near the critical point. Statistical mechanics of the critical
    region (renormalization group corrections to mean-field theory) provides the
    non-classical exponents needed for accurate engineering calculations in
    supercritical CO2 processes.
  - >
    The same Landau free energy structure appears in neural field theories (Wilson-Cowan
    model near bifurcation) and in models of opinion dynamics. Cross-disciplinary
    recognition that these are the same mathematical system would accelerate parameter
    estimation and stability analysis across domains.
communication_gap: >
  Chemistry students learn the van der Waals equation as a practical equation of state
  correction; physics students learn Landau theory as abstract symmetry breaking. The
  explicit connection is made in graduate statistical mechanics courses but not in
  standard physical chemistry or introductory physics curricula.

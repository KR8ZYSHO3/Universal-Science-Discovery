cross_pollination_opportunities:
  - >
    Biological electron transfer in photosynthetic reaction centers operates in
    the Marcus activationless regime (ΔG° ≈ -λ) for primary charge separation
    steps, explaining the near-unit quantum efficiency. Designing artificial
    photovoltaics using the same Marcus-region optimization is a direct
    chemistry-to-engineering transfer.
  - >
    Protein folding kinetics obey a modified TST on rugged energy landscapes
    (Bryngelson-Wolynes funnel model). The recrossing correction (transmission
    coefficient κ < 1) is analogous to solvent friction in Kramers — connecting
    polymer physics, statistical mechanics, and structural biology.
communication_gap: >
  Transition state theory is taught in physical chemistry; Kramers theory
  in chemical physics; Marcus theory in electrochemistry and biophysics.
  These communities use different notation and rarely cross-cite. The
  connection of Marcus theory to the spin-boson model (condensed matter
  physics) is known to theorists but not to experimental chemists.
  Quantum biology connections (tunneling in enzymes) are highly contested.

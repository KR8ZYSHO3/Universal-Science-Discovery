cross_pollination_opportunities:
  - >
    Hyperpolarisation techniques (dynamic nuclear polarisation, DNP; para-hydrogen
    PHIP; optical pumping) temporarily increase nuclear polarisation by factors of
    10⁴ over Boltzmann equilibrium, making ¹³C MRS metabolic imaging feasible
    in clinical settings. This connects quantum coherence engineering (hyperpolarisation
    physics) to in vivo metabolic monitoring (oncology, cardiology).
  - >
    Quantum computing uses NMR as a test bed: Chuang et al. (1998) demonstrated
    Grover's search algorithm on a 2-qubit NMR quantum computer. The liquid-state
    NMR quantum computing approach (DiVincenzo criteria analysis) clarified the
    distinction between quantum coherence and quantum entanglement that matters
    for computational speedup, bridging chemistry and quantum information science.
communication_gap: >
  NMR developed in physics departments (Bloch at Stanford, Purcell at Harvard,
  both Nobel 1952) but migrated entirely to chemistry and medicine within a decade.
  The quantum mechanical density matrix description of NMR (Abragam 1961, Ernst's
  1987 textbook) is standard in NMR spectroscopy but rarely taught in physics
  quantum mechanics courses, creating a gap where physicists approaching NMR
  must re-learn their own quantum mechanics in unfamiliar notation. MRI is
  clinically indispensable (>100 million scans/year globally) but the physics
  and quantum engineering behind it are largely invisible to radiologists and
  clinicians. The 2003 Nobel Prize to Lauterbur and Mansfield specifically
  acknowledged the medical impact of the physics-to-chemistry-to-medicine
  translation that NMR represents.

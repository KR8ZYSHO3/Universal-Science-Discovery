cross_pollination_opportunities:
  - >
    Nowak et al. (2001) showed that human language evolution (the origin of compositional
    syntax) can be modeled as a phase transition in replicator dynamics — once the
    number of meanings exceeds a threshold, syntax becomes selectively advantageous.
    Importing threshold analysis and bifurcation theory from evolutionary dynamics into
    the study of language origins could sharpen predictions about when syntax evolved.
  - >
    Bayesian phylogenetic methods (BEAST, MrBayes) have been applied to language
    families (Gray & Atkinson 2003 for Indo-European; Pagel et al. 2007 for universal
    frequency laws). Systematic application of population-genetic statistics (Tajima's D,
    F_ST, neutrality tests) to dialect corpora could distinguish selective from neutral
    language change, providing empirical tests of the replicator model.
  - >
    The frequency-dependent regularization of English irregular verbs (Michel et al.
    2011, Google Ngrams) follows a power law: half-life ∝ frequency^{1/2}. This is
    consistent with a selective model where the cost of learning irregular forms is
    balanced by the benefit of compressed encoding for high-frequency words — a direct
    Zipf-law / information-theoretic prediction testable with corpus data.
communication_gap: >
  Historical linguistics is one of the oldest scientific disciplines with a rigorous
  methodology (comparative method, 19th century). Population genetics developed in the
  1920s-1930s independently. The formal mathematical homology was recognized in the
  1990s-2000s but is still not standard in linguistics training. Linguists resist
  the "language as organism" metaphor (language does not have fitness in the same
  sense as organisms), sometimes blocking the more limited but valid claim that
  variant-frequency dynamics follow the same equations as allele-frequency dynamics.

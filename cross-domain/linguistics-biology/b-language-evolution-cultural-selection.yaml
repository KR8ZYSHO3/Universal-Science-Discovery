id: b-language-evolution-cultural-selection
title: >
  Language change obeys evolutionary dynamics — linguistic variants compete under
  frequency-dependent selection (prestige bias, conformity), the replicator equation
  governs variant frequencies, and historical linguistics is formally homologous to
  molecular phylogenetics.
status: established
fields:
  - linguistics
  - evolutionary-biology
  - cultural-evolution
  - population-genetics
bridge_claim: >
  Languages change through processes that are mathematically equivalent to biological
  evolution: linguistic forms (words, constructions, pronunciations) are variants
  competing for use in a population of speakers. The analogy is not merely metaphorical —
  the mathematical formalisms are identical.

  Replicator dynamics govern the frequency f_i(t) of competing linguistic variants:
  df_i/dt = f_i(t) · [w_i(f) - w̄(f)]
  where w_i(f) is the selection coefficient (social fitness) of variant i and w̄ is
  the mean fitness. This is the replicator equation from evolutionary game theory,
  applied to cultural transmission.

  Selection mechanisms with direct biological analogs:
  1. Prestige bias (copy high-status speakers) = directional selection
  2. Conformity bias (copy majority) = stabilizing / frequency-dependent selection
  3. Neutral drift (random copying) = genetic drift (Moran model for finite populations)
  4. Innovation (coinage, borrowing) = mutation (but rates are much higher than in genetics)

  Historical linguistics (the comparative method) is formally homologous to molecular
  phylogenetics: both reconstruct ancestral states from descendant variants using
  parsimony, maximum likelihood, or Bayesian inference on phylogenetic trees.
  Language families (Indo-European, Austronesian) are reconstructed by the same
  methods as gene trees (Swadesh word lists → cognate matrices → Bayesian phylogenetics).

  Creolization is the linguistic analog of a population bottleneck followed by rapid
  evolution under strong directional selection: forced simplification of morphology,
  regularization of irregular forms, and rapid grammaticalization — all predicted by
  strong selection on communicative efficiency in a new speaker population.

  The neutral theory of language evolution (Nowak & Krakauer 1999): if no selection
  acts on linguistic variants, frequency changes are purely stochastic (Moran process).
  The neutral prediction fails for systematic directionalities in language change
  (e.g., regularization of irregular verbs follows a power law in frequency,
  consistent with frequency-dependent purifying selection: common irregular verbs
  are preserved by selection for efficient communication).
translation_table:
  - field_a_term: linguistic variant (word, construction, pronunciation)
    field_b_term: allele / biological replicator
  - field_a_term: speaker population
    field_b_term: population of replicating individuals
  - field_a_term: language use frequency f_i
    field_b_term: allele frequency p_i
  - field_a_term: prestige bias (copy high-status speakers)
    field_b_term: directional natural selection
  - field_a_term: conformity bias (copy majority)
    field_b_term: frequency-dependent stabilizing selection
  - field_a_term: neutral variant drift (random copying)
    field_b_term: genetic drift (finite-population stochasticity)
  - field_a_term: language innovation (new word, borrowing)
    field_b_term: mutation
  - field_a_term: language family tree (Indo-European, Austronesian)
    field_b_term: phylogenetic gene tree / species tree
  - field_a_term: comparative method (reconstruct proto-language)
    field_b_term: ancestral sequence reconstruction in phylogenetics
  - field_a_term: creolization (rapid simplification under selection)
    field_b_term: adaptation under strong directional selection after bottleneck
  - field_a_term: Swadesh 100-word list (core vocabulary)
    field_b_term: conserved ortholog genes used for phylogenetic reconstruction

id: b-epithelial-jamming-x-colloidal-glass-rheology
title: >
  Confluent epithelial monolayers exhibit jamming-like solid–fluid transitions in shape, motility, and stress transmission that parallel the disordered jamming and glassy rheology of dense colloids — enabling soft-matter scaling ideas to inform tissue mechanics and disease-related fluidization.
status: established
fields:
  - biology
  - soft-matter
  - statistical-physics
  - biophysics
bridge_claim: >
  Vertex and Voronoi models predict geometric jamming thresholds where cells lose motility as shape index approaches critical values; experiments on cultured epithelia show rigidity transitions reminiscent of yield stress and cage-breaking in particulate glasses — though active cellular forces, division, and adhesion differ from passive Brownian colloids, so the mapping is phenomenological and scale-dependent.
translation_table:
  - field_a_term: cell shape index / perimeter fluctuations at confluence
    field_b_term: vanishing free volume / increased coordination in dense packings
    note: Shared jamming vocabulary; biological activity breaks equilibrium glass assumptions.
  - field_a_term: tissue fluidization under mechanical stress or cytokine stimulation
    field_b_term: yielding of amorphous solids past τ_y (shear jamming)
    note: Analogous stress–strain curves arise but metabolic regulation adds feedback loops.
  - field_a_term: heterogeneity of cell speeds (dynamic heterogeneity)
    field_b_term: dynamic heterogeneity in glass-forming liquids near T_g
    note: Similar statistical descriptors used across communities when interpreted cautiously.
communication_gap: >
  Soft-matter lectures emphasize jamming phase diagrams for granular disks while developmental biology teaches epithelial sheet mechanics without citing Liu–Nagel-style diagrams — collaborative datasets linking traction microscopy to particle-tracking statistics remain uncommon outside specialized labs.
cross_pollination_opportunities:
  - Apply jamming susceptibility metrics from colloid microscopy to traction-force microscopy movies of wound healing.
  - Use rheometer-inspired shear assays on epithelial sheets with simultaneous single-cell tracking for glass-theory exponents.

id: b-dna-replication-fork-x-asymmetric-exclusion-traffic-jam
title: >
  DNA replication advances as polymerases and accessory proteins track the fork while encountering obstacles — totally asymmetric simple exclusion processes (TASEP) on lattices exhibit boundary-induced phase separation and jamming fronts reminiscent of molecular motor queues — existing ribosome–TASEP bridges emphasize translation; this bridge foregrounds replisome traffic constraints on genomic DNA **without claiming literal ASEP universality in vivo**.
status: proposed
fields:
  - biology
  - statistical-physics
  - applied-mathematics
bridge_claim: >
  Leading- versus lagging-strand synthesis asymmetry and polymerase collisions produce heterogeneous occupancy patterns along DNA reminiscent of driven lattice gases — mathematical toy models (ASEP variants with extended particles, defects, slow bonds) supply intuition for jam accumulation ahead of lesions or transcription–replication conflicts — quantitative fits require genome-specific parameters beyond textbook lattice gases.
translation_table:
  - field_a_term: Replication fork progression velocity vs genomic coordinate
    field_b_term: ASEP particle current J versus density ρ phase diagram
    note: Shared jam/facilitation metaphors — biology adds licensing and repair checkpoints.
  - field_a_term: Replication stress checkpoints slowing fork progression
    field_b_term: Reduced hopping rates at lattice defects halting shock fronts
    note: Regulatory slowing parallels modified hopping-rate heterogeneity.
  - field_a_term: Rear-ending collisions / polymerase stalling events
    field_b_term: Multi-species exclusion processes with overtaking frustration
    note: Explicit ASEP extensions closer than pure single-species TASEP.
communication_gap: >
  Replication biochemistry literature emphasizes kinase signaling (ATR/Chk1) while statistical physics emphasizes phase diagrams — integrated stochastic models remain unevenly adopted outside specialist collaborations.
cross_pollination_opportunities:
  - Hybrid simulations coupling mechanistic replicative lesion bypass genes with lattice gas shock diagnostics for predictive fork slowdown maps.
  - Teaching molecular genetics labs using interactive ASEP applets as metaphors for collision-induced pausing with caveats on biological specificity.

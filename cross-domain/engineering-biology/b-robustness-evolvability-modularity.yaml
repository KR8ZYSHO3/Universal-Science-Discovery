cross_pollination_opportunities:
  - >
    Engineering reliability theory (FMEA, fault tree analysis) can be
    applied to gene regulatory networks: enumerate potential failure modes
    and their propagation paths to predict which gene knockouts cause
    lethality vs. viability. Systems biology already does this informally;
    importing FMEA formalism would make the analysis quantitative and
    systematic.
  - >
    Biological canalization (Hsp90 buffering of cryptic variation) inspired
    the engineering concept of "design margins" — build tolerance into
    the system so that component variation does not propagate to system
    failure. Quantify how much of Hsp90's buffering capacity can be
    estimated from the sensitivity analysis ∂phenotype/∂genotype.
  - >
    Simon's near-decomposability metric (ratio of within-module to
    between-module interaction strength) can be computed for gene
    regulatory networks from yeast two-hybrid or co-IP data. Test whether
    the most evolvable lineages (arthropods, vertebrates) have higher
    modularity index than less evolvable lineages (early-diverging metazoa).
  - >
    Export robust-yet-fragile analysis to synthetic biology: highly optimised
    synthetic gene circuits (e.g., bistable switches) may be canalized but
    fragile under novel stressors. Engineering tools (Monte Carlo robustness
    analysis) can predict evolutionary instability of synthetic constructs.

communication_gap: >
  Waddington (1942) worked in developmental biology; Simon (1962) worked in
  cognitive science and organisational theory; Kirschner & Gerhart (1998)
  worked in cell biology; Wagner (2005) in evolutionary theory. Engineering
  robustness literature (FMEA, reliability engineering) is largely
  inaccessible to biologists. The mathematical tools are similar (sensitivity
  analysis, modularity metrics) but the vocabulary differs completely. The
  explicit connection between near-decomposability as an engineering design
  principle and modular developmental organisation as an evolutionary
  solution has been made by Wagner and Kirschner independently but has not
  produced cross-disciplinary tool-sharing.


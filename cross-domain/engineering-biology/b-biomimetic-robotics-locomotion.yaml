related_hypotheses:
  - h-biomimetic-slip-locomotion-minimal-energy-cost-robots
cross_pollination_opportunities:
  - >
    Measuring muscle-tendon energy storage in running animals (via ultrasonography
    + force plates) would give ground-truth spring constants k_leg for validating
    SLIP control in running robots; this experiment is cheap in biology but the
    result is directly importable into robotics.
  - >
    Drosophila neuromechanics: the sensorimotor circuits controlling wing kinematics
    during flight are being mapped (connectome); implementing analogous control
    topology in flapping-wing MAVs could give adaptive gust rejection without
    explicit aerodynamic modeling.
communication_gap: >
  Biomechanics publishes in J Exp Biology, J R Soc Interface, and Biology Letters;
  robotics publishes in ICRA, IROS, and IEEE Transactions. The overlap is present
  but limited: most roboticists re-derive biological principles independently
  (or approximate them crudely) because they do not read biology literature.
  Conversely, biologists rarely frame locomotion principles in control-theoretic
  language accessible to engineers. The "bio-inspired robotics" conferences are
  improving this but remain niche.

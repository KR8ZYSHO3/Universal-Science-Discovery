cross_pollination_opportunities:
  - >
    The volume-scaling of Weibull statistics is well-established in structural
    ceramics: a ceramic component twice the volume has a predictably shorter
    characteristic lifetime. The biological analog is Kleiber's law (metabolic rate
    scales as body mass^0.75) and the lifespan-mass relationship. EVT suggests that
    both should follow from the same statistical physics of organ/tissue failure with
    volume. This bridge could unify metabolic scaling theory with materials reliability
    theory through extreme value statistics.
  - >
    Engineering components are subject to "burn-in" testing — running them under
    stress to eliminate early-failure units before deployment (eliminating the
    β < 1 portion of the Weibull curve). The biological analog is natural selection
    during development — embryonic lethality and infant mortality preferentially
    eliminate individuals with severe defects, leaving survivors with longer remaining
    lifespans. The "burn-in" model from engineering provides a quantitative prediction
    for how juvenile selection should shift the adult mortality Gompertz parameters.
  - >
    Extreme value statistics of maximum flood height, maximum wind speed, and maximum
    earthquake magnitude (all Gumbel-distributed) are used for infrastructure design
    return-period analysis (100-year flood, etc.). The same return-period framework
    can be applied to biological rarity: the probability of achieving a given human
    lifespan in a population of size N is given by Gumbel order statistics. The
    theoretical maximum human lifespan (as a function of population size and Gompertz
    parameters) is directly predictable from EVT but is almost never computed by
    gerontologists.
communication_gap: >
  Structural engineers use Weibull analysis daily but rarely know Gompertz mortality.
  Actuaries use Gompertz tables but do not connect them to materials reliability.
  Biologists studying aging know Gompertz empirically but do not recognize it as
  extreme value theory. The mathematical unification (EVT as the common framework)
  is known to statisticians (Gumbel, 1958; de Haan & Ferreira) but has not been
  made accessible or useful to practitioners in any of the three applied fields
  simultaneously. The bridge requires only the recognition that "weakest-link" is
  a universal failure model, not a field-specific assumption.

id: b-prosthetic-limbs-sensorimotor
title: "Prosthetic Limbs and Sensorimotor Integration — myoelectric control, osseointegration, targeted muscle reinnervation, and bidirectional neural interfaces reconnect the motor system after amputation"
status: established
fields:
  - biomedical-engineering
  - neuroscience
  - rehabilitation
  - biomechanics
  - neural-interfaces

bridge_claim: >
  Modern prosthetic limbs span mechanical, electronic, and neural engineering.
  Myoelectric control uses surface electromyography (sEMG) signals from residual
  limb muscles: electrodes detect motor unit action potentials (20–500 Hz), amplitude-
  modulated signals drive proportional control of prosthetic joints. The i-limb
  (Touch Bionics) was the first commercially successful multi-articulated myoelectric
  hand (2007). Pattern recognition control applies machine learning (linear
  discriminant analysis, SVM, neural networks) to classify multi-channel EMG
  patterns, enabling 10+ distinct grip configurations vs. 2 with conventional
  amplitude control. Osseointegration (Brånemark 1969): titanium implants integrate
  directly with bone via osseoconduction; percutaneous bone-anchored prostheses
  provide direct skeletal attachment, eliminating socket fit problems and improving
  function by ~50% vs. socket suspension. Targeted muscle reinnervation (TMR,
  Kuiken 2004): surgically redirect amputated motor nerves to spare muscles →
  new EMG sources provide more intuitive control signals, proportional to original
  motor intent. Bidirectional neural interfaces: peripheral nerve electrodes (Utah
  Slanted Electrode Array, flat interface nerve electrode FINE) both record sensory
  afferents and deliver electrical stimulation for tactile and proprioceptive feedback.
  Raspopovic et al. (2014) demonstrated that sensorised prosthetic fingertips
  connected via transversal intrafascicular electrodes allowed an amputee to
  discriminate object stiffness in real time. The key remaining gap: no commercial
  prosthesis provides continuous joint proprioception, limiting closed-loop control.

translation_table:
  - field_a_term: "surface EMG (sEMG) pattern recognition"
    field_b_term: "motor intent decoded from residual limb muscle activation patterns"
    note: "EMG is the electrical signature of motor unit recruitment; ML classifies patterns to grip types"
  - field_a_term: "osseointegration (titanium–bone interface)"
    field_b_term: "direct skeletal attachment bypassing socket interface"
    note: "Brånemark implants achieve >95% 5-year survival in amputees; eliminate pistoning and skin breakdown"
  - field_a_term: "targeted muscle reinnervation (TMR)"
    field_b_term: "surgical nerve-to-muscle rerouting to amplify prosthetic control signals"
    note: "Each redirected nerve creates a new EMG site; high-level amputees gain proportional control of multiple joints"
  - field_a_term: "transversal intrafascicular electrode (TIME)"
    field_b_term: "peripheral nerve electrode for bidirectional sensory-motor interface"
    note: "Intraneural electrodes access individual fascicles; enables graded tactile feedback at 0.1–10 mA currents"
  - field_a_term: "proprioceptive feedback (joint angle, force)"
    field_b_term: "closed-loop sensorimotor control of prosthetic joint position"
    note: "The absent afferent signal is the critical gap; vibrotactile substitution and peripheral nerve stimulation are partial solutions"
  - field_a_term: "regenerative peripheral nerve interface (RPNI)"
    field_b_term: "bioamplifier: free muscle graft wrapped around nerve stump"
    note: "RPNI amplifies residual nerve signals ~20× without external electronics; recently shown to reduce phantom limb pain"


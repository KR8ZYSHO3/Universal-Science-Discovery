cross_pollination_opportunities:
  - >
    Engineering finite-element tensegrity models can be parameterised with
    measured cytoskeletal prestress values from live-cell imaging (actin
    tension by FRET sensors, microtubule buckling analysis) to produce
    predictive mechanical models of cell deformation under physiological loads.
    Current cell mechanics models use continuum mechanics; tensegrity
    models make distinct predictions about anisotropy and non-linearity.
  - >
    The engineering design of deployable space structures uses the same
    tensegrity mathematics as the cytoskeleton. Shape-memory cytoskeletal
    remodelling (cells that change shape in response to substrate stiffness)
    could inspire deployable structures with programmable shape changes
    triggered by environmental mechanical signals.
  - >
    Synthetic biology could engineer minimal tensegrity cells: designing actin
    and microtubule networks with specified prestress ratios to produce cells
    with desired mechanical properties (stiffness, adhesion, migration speed)
    for tissue engineering applications.

communication_gap: >
  Fuller worked in architecture and engineering; his tensegrity structures were
  known in the art and architecture communities from the 1960s but not in cell
  biology. Ingber's 1993 Scientific American article made the connection
  accessible but the engineering tensegrity literature remains largely unknown
  to cell biologists. Cell mechanics researchers use continuum mechanics
  frameworks (cortical shell models, soft glassy rheology) and are not
  familiar with the structural engineering of geodesic domes. The vocabulary
  gap ("prestress" vs. "cortical tension", "compliance" vs. "creep") maintains
  the separation despite the mathematical identity.


id: b-tensegrity-cytoskeleton
title: >
  Buckminster Fuller's tensegrity (tensional integrity) structures — where
  compression members float in a continuous tension network — are the
  mechanical principle governing cytoskeletal architecture; actin filaments
  (tension) and microtubules (compression) form a biological tensegrity
  network predicting cell stiffness, shape change, and mechanotransduction.
status: established
fields:
  - engineering
  - cell-biology
  - biophysics
  - materials-science
  - structural-mechanics

bridge_claim: >
  Fuller (1961) defined tensegrity as a structural principle where isolated
  compression members ("struts") are suspended in a continuous network of
  tension members ("cables"). The structure is globally stable without any
  compression member touching another — stability arises from the interplay
  of tension and compression across the whole structure.

  Ingber (1993) proposed that the cell cytoskeleton is a biological tensegrity
  network:
  - TENSION MEMBERS: actin filaments (F-actin) are pre-stressed in tension;
    they pull inward on the cell membrane and nucleus.
  - COMPRESSION MEMBERS: microtubules resist compression; they push outward
    against the actin tension network.
  - ANCHORS: focal adhesion complexes connect the actin network to the
    extracellular matrix (ECM), providing external anchorage like tensegrity
    structures anchored to the ground.

  The mathematical framework of tensegrity predicts:
  1. CELL STIFFNESS: stiffness scales with prestress (not just material
     stiffness). Cells under higher actin prestress are stiffer — confirmed
     by atomic force microscopy (Wang et al. 1993).
  2. SHAPE STABILITY: cells maintain their shape against deformation through
     tensegrity balance, not membrane elasticity alone. Shape changes require
     cytoskeletal remodelling.
  3. MECHANOTRANSDUCTION: forces applied at focal adhesions propagate through
     the tensegrity network to the nucleus and organelles, triggering
     transcriptional responses. The same mechanical force transmission is
     predicted by tensegrity models and confirmed by magnetic twisting
     cytometry experiments.
  4. SCALING: the same tensegrity mathematics governs geodesic domes,
     prestressed concrete structures, deployable space structures, and the
     cell — the governing equations are identical.

  Cancer cells with disrupted cytoskeletal architecture have measurably lower
  stiffness than normal cells (durotaxis), making tensegrity models relevant
  to cancer biophysics and early detection.


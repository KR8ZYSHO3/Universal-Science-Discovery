cross_pollination_opportunities:
  - >
    Biological noise (gene expression stochasticity) introduces fundamental limits
    on circuit fidelity that have no direct analog in electronic circuits where
    thermal noise is negligible at room temperature. Stochastic circuit theory
    (Swain et al. 2002) and information-theoretic channel capacity analysis of
    genetic circuits (Cheong et al. 2011) import communications engineering into
    synthetic biology — quantifying how much information a signaling pathway can
    transmit despite molecular noise.
  - >
    Optogenetic actuators (Boyden et al. 2005) provide light-gated inputs to
    genetic circuits at millisecond timescales — fast enough for real-time feedback
    control. Importing control theory feedback design (PID controllers, model
    predictive control) into synthetic biology with optogenetic actuation enables
    closed-loop control of gene expression, cell fate, and metabolic flux.
communication_gap: >
  Electrical engineering and control theory training is not part of standard biology
  PhD programs. The formalisms of transfer functions and Bode plots appear in the
  synthetic biology literature but are rarely derived from first principles for
  biological audiences. Conversely, most electrical engineers are unaware that their
  circuit formalism has been implemented in DNA. The iGEM (International Genetically
  Engineered Machine) competition has done more than any academic program to bridge
  this gap through engineering-focused biological design education.

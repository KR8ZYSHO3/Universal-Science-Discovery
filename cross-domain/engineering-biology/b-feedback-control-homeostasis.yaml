cross_pollination_opportunities:
  - "Design synthetic gene circuits that implement PID control for precise metabolite regulation in metabolic engineering"
  - "Apply root-locus stability analysis to predict conditions for oscillatory homeostasis (e.g., insulin oscillations in T2D)"
  - "Use control-theoretic robustness metrics to rank the stability of different physiological homeostatic mechanisms"

communication_gap: >
  Control engineers and biologists rarely collaborate despite deep mathematical
  connections. Yi et al. (2000) is a landmark paper cited across both fields,
  but control-theoretic frameworks remain peripheral in most physiology curricula.
  Medical education teaches homeostasis descriptively without feedback control
  formalism. The synthetic biology community is the main bridge (Elowitz, Leibler,
  Khalil & Collins), but pharmacology has largely not adopted control-theoretic drug
  dosing optimization.


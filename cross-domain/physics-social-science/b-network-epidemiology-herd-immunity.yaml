cross_pollination_opportunities:
  - "Use temporal network epidemiology (time-varying contact networks) to model superspreader events in indoor settings more accurately"
  - "Apply network-aware vaccination strategies to real contact data from mobile phone proximity sensors to optimise COVID-like outbreak response"
  - "Extend the percolation framework to multi-pathogen co-infection dynamics on multiplex networks"

communication_gap: >
  Mathematical epidemiology (compartmental SIR models) developed in the public health
  tradition largely independently of the network physics community that developed
  scale-free network theory in the late 1990s. The Pastor-Satorras & Vespignani (2001)
  paper bridged these communities but is still not standard reading in public health
  curricula. During COVID-19, failure to incorporate network heterogeneity and
  superspreading into early models led to systematic underestimation of outbreak
  clustering and overestimation of required vaccine coverage.


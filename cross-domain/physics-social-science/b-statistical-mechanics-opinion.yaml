id: b-statistical-mechanics-opinion
title: >
  The Ising model of opinion dynamics maps social consensus formation onto
  ferromagnetic phase transitions (T < T_c → ordered consensus; T > T_c →
  disordered pluralism), while bounded-confidence models predict opinion clustering
  and polarization — bridging statistical mechanics with quantitative social science.
status: established
fields:
  - physics
  - social-science
  - statistical-mechanics
  - complexity-science
  - political-science
bridge_claim: >
  The voter model and Ising model provide a rigorous statistical mechanics framework
  for opinion dynamics. In the Ising opinion model, agents (spins) hold binary opinion
  σ_i = ±1 (yes/no, left/right, agree/disagree), aligned by social influence J
  (ferromagnetic coupling — conformity pressure) and disturbed by social noise T
  (independent thinking / contrarianism). The Hamiltonian H = -J·Σ_{⟨ij⟩} σ_i·σ_j
  maps to a magnet, and the mean-field phase transition at T_c = zJ/k_B (z = coordination
  number) separates: T < T_c → consensus (spontaneous magnetization, majority opinion)
  and T > T_c → disorder (paramagnetic phase, no majority).

  The Sznajd model (2000) adds social validation: pairs of agreeing neighbors
  convince their neighbors (outflow rule). This produces consensus faster than the
  Ising model and more realistically captures "social proof" dynamics. The critical
  noise level above which consensus cannot be maintained is lower in Sznajd than
  Ising — reflecting stronger social homophily.

  Bounded confidence models (Deffuant-Weisbuch 2000): agents have continuous opinions
  x_i ∈ [0,1] and only interact if |x_i - x_j| < ε (confidence bound). The
  dynamics dx_i/dt = μ·(x_j - x_i)·Θ(ε - |x_i - x_j|) lead to opinion clustering:
  for large ε (open-minded agents), consensus; for small ε (closed-minded), multiple
  clusters (polarization). The number of clusters scales as 1/(2ε) — a quantitative
  prediction of polarization as a function of social open-mindedness.

  Structural balance theory (Heider 1946, formalized by Cartwright-Harary 1956):
  signed social networks (friend/enemy) evolve toward balance — all triangles have
  an even number of negative edges ("enemy of my enemy is my friend"). The balanced
  state corresponds to complete bipartition into two antagonistic groups — the
  statistical mechanics ground state of a frustrated antiferromagnet. Janus graphs
  (Traag et al. 2010) quantify the energy of unbalanced triads.
translation_table:
  - field_a_term: spin σ_i = ±1 (up/down)
    field_b_term: binary opinion of agent i (yes/no, liberal/conservative)
  - field_a_term: ferromagnetic coupling J (tendency to align)
    field_b_term: social influence / conformity pressure between neighbors
  - field_a_term: social noise temperature T
    field_b_term: rate of independent opinion change / contrarianism
  - field_a_term: phase transition at T_c (order-disorder)
    field_b_term: tipping point between consensus and pluralism
  - field_a_term: spontaneous magnetization ⟨σ⟩ ≠ 0 (ordered phase)
    field_b_term: majority consensus emerging from a homogeneous initial distribution
  - field_a_term: confidence bound ε in Deffuant-Weisbuch model
    field_b_term: psychological latitude of acceptance (Sheriff's social judgment theory)
  - field_a_term: structural balance (all triangles positive)
    field_b_term: social network ground state (two opposing camps)

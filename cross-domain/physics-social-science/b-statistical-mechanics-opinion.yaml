cross_pollination_opportunities:
  - >
    Empirical calibration of opinion dynamics models requires social media data
    (Twitter/X political opinion networks, Reddit community structures). Physicists
    developing models need sociologists and political scientists to validate that the
    abstract "opinion" variable corresponds to measurable political positions.
    Collaboration between statistical physicists and computational social scientists
    could produce predictive models of polarization dynamics validated against
    longitudinal survey data.
  - >
    Network topology profoundly affects opinion dynamics: scale-free networks
    (hubs) can freeze opinion dynamics, while small-world networks accelerate
    consensus. The connection between empirical social network structure (measured
    from phone contact graphs, Facebook friend networks) and the effective J and T
    parameters of Ising opinion models requires collaboration between sociologists
    measuring network structure and statistical physicists formalizing the mean-field
    approximation on heterogeneous graphs.
communication_gap: >
  Statistical physics models of social dynamics (sociophysics) are published in
  journals like Physica A, Physical Review E, and Int J Mod Phys C — largely
  invisible to social scientists. Sociologists and political scientists are skeptical
  of physics analogies for human behavior (agency, deliberation, institutional
  context are absent from Ising-type models). The opinion dynamics literature
  (Castellano et al. 2009 Rev Mod Phys review) is extensive but rarely cited in
  political science. Bounded confidence models were developed by engineers (Deffuant,
  Weisbuch) and are known in complex systems but not in mainstream social science.
  Structural balance theory, though originating in social psychology (Heider 1946),
  has been formalized using graph theory that is not standard in sociology.

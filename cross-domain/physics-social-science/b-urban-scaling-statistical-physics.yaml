cross_pollination_opportunities:
  - >
    Testing whether the scaling exponent β changes predictably with transportation
    technology (rail, car, internet) would validate the fractal interaction model
    and enable prediction of how autonomous vehicle adoption will reshape urban
    creativity and crime statistics.
  - >
    Using mobile phone location data to directly measure social interaction rates
    as a function of city population would provide the first direct test of the
    N²/A proportionality assumption underlying the Bettencourt scaling derivation.
communication_gap: >
  Urban economics (Glaeser, Henderson) has studied agglomeration effects for
  decades in economics journals without connecting to the physics scaling framework.
  Statistical physicists (Bettencourt, West, Barthelemy) published urban scaling
  in PNAS and Nature Physics, largely inaccessible to urban planners, economists,
  and city managers. The fractal road network geometry connection requires
  both spatial statistics and physics — a combination absent from standard
  urban planning, economics, or physics curricula.

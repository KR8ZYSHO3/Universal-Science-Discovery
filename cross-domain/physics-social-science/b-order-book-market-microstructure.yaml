cross_pollination_opportunities:
  - >
    Optimal execution as a stochastic control problem: use Almgren-Chriss theory
    (linear temporary impact + permanent impact Kyle's lambda) to derive the optimal
    trading trajectory that minimises expected execution cost for a large institutional
    order; test the prediction against real meta-order data using trading records.
  - >
    LOB phase diagram: map the Cont-Stoikov-Talreja Markov chain phase diagram
    (order arrival vs. cancellation rate) to identify parameter regions where the
    market self-organises near a critical point (diverging susceptibility = flash
    crash risk); propose a real-time criticality indicator from order book data.
  - >
    Regulatory circuit breaker design: use LOB simulation to predict the optimal
    trading halt duration and price-band width that prevents cascading liquidity
    withdrawal without exacerbating price discovery; compare US vs. European
    circuit breaker designs using the model.
communication_gap: >
  Financial economics and market microstructure are published in finance journals
  (Journal of Finance, Review of Financial Studies) that physicists rarely read.
  The statistical physics of disordered systems and queuing theory is published in
  physics journals. Econophysics bridges the gap but is treated as peripheral by
  both finance academics and physics departments. Regulators who design market
  structure rules rarely engage with the physics or queueing theory literature.

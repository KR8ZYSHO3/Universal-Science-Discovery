id: b-order-book-market-microstructure
title: >
  The limit order book is a non-equilibrium stochastic system governed by Poisson
  order flows — Kyle's lambda (price impact linear in signed flow), the Glosten-Milgrom
  adverse selection spread, and the square-root market impact law connect queueing
  theory and statistical physics to market microstructure.
status: established
fields:
  - physics
  - social-science
  - economics
  - mathematics
bridge_claim: >
  The limit order book (LOB) is a queue of standing buy (bid) and sell (ask) orders
  at discrete price levels. Market dynamics are driven by three Poisson processes:
  limit order arrivals (rate λ_b, λ_a at each price level), market order arrivals
  (rate μ), and cancellations (rate δ). Cont-Stoikov-Talreja (2010) modelled the
  LOB as a continuous-time Markov chain and derived analytically the distribution
  of queue lengths, mid-price changes, and bid-ask spread. Kyle's lambda (1985):
  in a Bayesian market-maker model where one informed trader and noise traders submit
  orders, the equilibrium price impact is exactly linear in signed order flow:
  ΔP = λQ, where λ = σ_v/(2σ_u) is the illiquidity measure (σ_v = fundamental
  value volatility, σ_u = noise trade volatility). Empirically, the price impact
  of large trades follows a square root law: ΔP ∝ √(Q/V_daily) — consistent with
  LOB models where the book is locally linear in quantity. The Glosten-Milgrom model
  (1985): the bid-ask spread compensates a competitive market maker for the expected
  adverse selection cost from informed trading; the spread is a sufficient statistic
  for information asymmetry. High-frequency trading (HFT): co-located servers with
  microsecond latency provide liquidity (reduce spread) in normal conditions but
  can amplify instabilities (flash crashes) when correlated order cancellation
  empties the LOB.
translation_table:
  - field_a_term: Poisson queue (arrival rate λ, service rate μ)
    field_b_term: limit order book (order arrival, cancellation, execution rates)
    note: LOB is a multi-server queue with state-dependent rates; analytical solutions exist for the exponential model
  - field_a_term: illiquidity measure λ (Kyle's lambda)
    field_b_term: price impact per unit signed order flow (bid-ask adverse selection)
    note: Kyle's lambda is the econophysics analogue of the friction coefficient; higher λ = less liquid market
  - field_a_term: square root price impact ΔP ∝ √Q
    field_b_term: empirical market impact law for institutional trades
    note: Derived from LOB model with replenishment; consistent with meta-order execution data across global equities
  - field_a_term: information asymmetry (adverse selection)
    field_b_term: Glosten-Milgrom bid-ask spread = 2·λ·P(informed trader)·E[|v-P||trade]
    note: Spread is zero in a world with only noise traders; it reflects the cost of providing liquidity to informed agents
  - field_a_term: correlated failure / phase transition
    field_b_term: flash crash (LOB drains when HFT market makers withdraw simultaneously)
    note: The 2010 Flash Crash saw the Dow Jones fall 9% in minutes as correlated HFT cancellations drained liquidity
related_unknowns:

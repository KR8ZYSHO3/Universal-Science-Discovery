cross_pollination_opportunities:
  - "Using active matter theory (polar order parameter, Toner-Tu equations) to predict the onset density of crowd turbulence and validate against stadium evacuation data"
  - "Applying social force model simulations validated by LiDAR pedestrian tracking to design safer evacuation routes in public venues"
communication_gap: "Urban planners and safety engineers use empirical crowd density guidelines (Level of Service A–F) while physicists model crowd dynamics as active matter; the Helbing social force model bridged these worlds but operational evacuation software rarely uses physics-based parameter calibration from field data."

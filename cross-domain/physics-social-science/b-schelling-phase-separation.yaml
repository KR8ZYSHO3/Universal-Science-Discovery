id: b-schelling-phase-separation
title: Schelling's segregation model maps onto binary-alloy phase separation — social tolerance thresholds are thermodynamic critical points
status: established
fields:
  - physics
  - social-science
bridge_claim: >
  Schelling's (1971) segregation model — agents move when the fraction of unlike neighbors
  exceeds a threshold — produces complete phase separation even for low tolerance thresholds
  (~30%). This maps exactly onto binary alloy phase separation: below T_c, A-B mixtures
  separate into A-rich and B-rich domains described by the Cahn-Hilliard equation. The
  tolerance threshold functions as an effective temperature; urban segregation dynamics
  follow spinodal decomposition kinetics with initially rapid domain coarsening that slows
  as domains grow, identical to the physics of coarsening in phase-separating alloys.
translation_table:
  - field_a_term: tolerance threshold (fraction of unlike neighbors)
    field_b_term: critical temperature T_c in binary alloy
    note: Below threshold / below T_c, phase separation is thermodynamically favored
  - field_a_term: urban neighborhood composition (fraction group A)
    field_b_term: local concentration field phi(x) in Cahn-Hilliard equation
    note: Both fields follow conserved dynamics — total population conserved
  - field_a_term: domain coarsening (segregated neighborhoods growing)
    field_b_term: spinodal decomposition and Ostwald ripening
    note: Domain growth follows same power-law kinetics R(t) ~ t^(1/3)
  - field_a_term: segregation index (fraction of neighbors same-group)
    field_b_term: order parameter phi_A - phi_B
    note: Both measure departure from mixed phase
related_unknowns:
  - u-cascade-threshold-infrastructure
related_hypotheses:
  - h-schelling-spinodal-coarsening
cross_pollination_opportunities:
  - >
    Spatial econometrics has measured segregation dynamics in hundreds of US cities
    post-1970 using census data. Fitting Cahn-Hilliard coarsening exponents to these
    time series would test whether urban segregation quantitatively follows phase
    separation kinetics — a direct empirical test of the physics analogy that neither
    field has performed.
  - >
    Phase-separation physics predicts that intermediate-strength perturbations (economic
    shocks, housing policy changes) can shift a system between single-phase (integrated)
    and two-phase (segregated) regimes if they cross T_c. Economists could test whether
    policy interventions of sufficient magnitude show threshold effects consistent with
    a phase transition rather than linear responses.
communication_gap: >
  Sociologists and urban economists rarely read condensed matter physics; the Cahn-Hilliard
  formalism is not taught in social science programs. Vinkovic & Kirman (2006) made the
  connection but it remains largely uncited in mainstream urban economics.
last_reviewed: "2026-05-06"

id: b-glymphatic-cerebrospinal-fluid
title: >
  The glymphatic system uses perivascular cerebrospinal fluid flow driven by
  arterial pulsatility and aquaporin-4 water channels to clear amyloid-β and tau
  from the brain — a fluid dynamics problem with direct Alzheimer's disease implications.
status: established
fields:
  - neuroscience
  - fluid-dynamics
  - physiology
  - neurology
bridge_claim: >
  The glymphatic system (Iliff et al. 2012) uses cerebrospinal fluid (CSF) flow
  along perivascular spaces (the Virchow-Robin spaces surrounding cerebral arteries)
  to clear metabolic waste products — including amyloid-β and tau, the aggregating
  proteins implicated in Alzheimer's disease — from brain parenchyma during sleep.

  The fluid dynamics of glymphatic flow bridges neuroscience and fluid mechanics:
  the flow is driven by arterial pulsatility (cardiac-cycle pressure waves propagating
  along vessel walls), facilitated by aquaporin-4 (AQP4) water channels densely
  expressed on astrocyte endfeet surrounding blood vessels. CSF enters the periarterial
  space, exchanges with interstitial fluid via AQP4-mediated bulk flow through brain
  tissue, and exits via perivenous spaces into cervical lymphatics.

  The fluid dynamics is described by a modified Darcy's law for flow through porous
  brain parenchyma, with the hydraulic conductivity determined by the extracellular
  matrix and AQP4 density. During sleep, the extracellular space expands by ~60%
  (Xie et al. 2013), dramatically increasing hydraulic conductivity and waste clearance
  rate — explaining why sleep is critical for brain waste clearance. Glymphatic
  dysfunction is increasingly implicated in the accumulation of amyloid-β in
  Alzheimer's disease (breakthrough gap bg-alzheimers-mechanism).
translation_table:
  - field_a_term: perivascular space (Virchow-Robin space)
    field_b_term: porous channel geometry for CSF flow
    note: Annular space between vessel wall and pia mater acts as CSF conduit
  - field_a_term: arterial pulsatility (cardiac cycle pressure waves)
    field_b_term: driving pressure for perivascular CSF flow
    note: Reduced pulsatility (aging, hypertension) impairs glymphatic function
  - field_a_term: aquaporin-4 (AQP4) water channels on astrocyte endfeet
    field_b_term: hydraulic conductivity of brain parenchyma
    note: AQP4 knockout mice show 70% reduction in interstitial solute clearance
  - field_a_term: extracellular space volume fraction (αe)
    field_b_term: Darcy hydraulic conductivity K ∝ αe^3 (Kozeny-Carman)
    note: Sleep-induced αe increase from 14% to 23% enhances K by ~3×
  - field_a_term: amyloid-β clearance rate (neuroscience)
    field_b_term: solute advection rate by bulk interstitial flow (fluid dynamics)
    note: Diffusion alone is too slow; bulk flow required for efficient clearance
related_unknowns:
  - u-glymphatic-flow-impairment-alzheimers
related_hypotheses:
  - h-glymphatic-dysfunction-drives-amyloid-accumulation
cross_pollination_opportunities:
  - >
    Computational fluid dynamics (CFD) models of perivascular flow calibrated to
    two-photon microscopy measurements of CSF tracer dynamics — quantifying the
    contribution of arterial pulsatility vs. AQP4 to total clearance.
  - >
    Non-invasive enhancement of glymphatic clearance during sleep (head-down tilt,
    slow oscillation transcranial stimulation, focused ultrasound to drive CSF
    pulsatility) — fluid dynamics predictions testable against clinical amyloid
    imaging endpoints.
communication_gap: >
  Neuroscientists studying Alzheimer's disease rarely have fluid mechanics training;
  fluid dynamicists rarely study brain physiology. The glymphatic system is a
  rapidly growing field (first described 2012) with an underserved need for
  quantitative fluid mechanics modeling to translate cellular observations to
  tissue-scale clearance rates.

id: b-solar-wind-alfven-wave-turbulence
title: >
  The solar wind is a magnetohydrodynamic turbulent medium dominated by Alfvén wave fluctuations propagating outward from the corona, whose spectral cascade from large injection scales to dissipation at ion inertial lengths follows Kolmogorov-like scaling modified by anisotropy and Alfvénic imbalance
status: established
fields:
  - astrophysics
  - plasma-physics
  - fluid-mechanics
bridge_claim: >
  Solar wind turbulence is described by MHD as counter-propagating Alfvén wave packets interacting to drive a spectral energy cascade: outward-propagating Elsässer variables z+ (dominant) and inward-propagating z- interact nonlinearly with rate proportional to their cross-helicity imbalance, transferring energy from injection at ~0.01 Hz to kinetic dissipation at ion gyrofrequency (~0.3 Hz at 1 AU); this maps solar wind plasma observations directly onto MHD turbulence theory and fluid mechanics cascade phenomenology.
translation_table:
  - field_a_term: "solar wind velocity fluctuations (astrophysics)"
    field_b_term: "Elsässer variable z+ = v + b/sqrt(4πρ) for outward Alfvén wave packets (plasma physics)"
    note: "Elsässer formulation separates counter-propagating Alfvén modes; z+ dominates in fast wind"
  - field_a_term: "solar wind magnetic field fluctuations (astrophysics)"
    field_b_term: "normalized fluctuating magnetic field b = δB/sqrt(4πρ) in Alfvén units (plasma physics)"
    note: "Alfvénic fluctuations have |δv| ≈ |δB|/sqrt(4πρ), observed in fast wind with cross-helicity σ_c ~ 0.9"
  - field_a_term: "power spectral density of solar wind fluctuations (astrophysics)"
    field_b_term: "turbulent energy spectrum E(k) scaling as k^-5/3 (fluid mechanics)"
    note: "Kolmogorov scaling observed at inertial range scales 10^4 - 10^6 km in the solar wind"
  - field_a_term: "solar corona heating problem (astrophysics)"
    field_b_term: "Alfvén wave energy dissipation at ion inertial length / kinetic dissipation scales (plasma physics)"
    note: "Alfvén wave turbulent cascade delivers energy to ion gyroradius scale where kinetic damping occurs"
communication_gap: >
  Heliosphericists analyse solar wind spacecraft data (Parker Solar Probe, Wind) while fluid mechanicists study turbulence in laboratory settings; the MHD Alfvénic turbulence framework is well-established theoretically but the connection to classical Kolmogorov phenomenology is not always made explicit for fluid mechanics audiences.
cross_pollination_opportunities:

cross_pollination_opportunities:
  - >
    Laboratory liquid metal MRI experiments (Princeton MRI facility, DRESDYN-MRI
    at Helmholtz-Zentrum Dresden-Rossendorf) provide ground truth for MHD turbulence
    models used in astrophysical simulations. More systematic parameter sweeps in
    laboratory settings could calibrate numerical MHD codes used to model X-ray
    binary and AGN accretion.
  - >
    The MRI saturation problem (what determines α at nonlinear saturation) remains
    unsolved — numerical simulations give α ~ 0.01-0.1 depending on magnetic Prandtl
    number Pm = ν/η. Importing turbulence theory tools (energy spectrum analysis,
    structure functions) from fluid dynamics could constrain the Pm dependence.
  - >
    Protoplanetary disk dead zones (regions too cold for MRI activity) may regulate
    planet formation timescales. Reconnection-driven turbulence and non-ideal MHD
    (Ohmic, Hall, ambipolar diffusion) replace MRI in these zones — importing
    Hall-MHD fluid dynamics into planet formation theory is an active frontier.
communication_gap: >
  Astrophysicists work with global disk simulations using general relativistic MHD
  (GRMHD), while fluid dynamicists develop turbulence theory for simpler Cartesian
  shear flows. The parameter regimes accessible in laboratory experiments (Pm < 1)
  differ from astrophysical disks (Pm >> 1 in hot plasmas). The communities publish
  in the Astrophysical Journal vs. Journal of Fluid Mechanics, with limited overlap.
  The connection between the Shakura-Sunyaev α model and MRI turbulence is widely
  understood in astrophysics but rarely taught in fluid dynamics courses.

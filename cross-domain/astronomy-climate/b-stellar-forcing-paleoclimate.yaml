id: b-stellar-forcing-paleoclimate
title: >
  Solar variability (Milankovitch orbital cycles, total solar irradiance variations,
  cosmic ray flux modulation) governs Earth's climate history — the same celestial
  mechanics and stellar physics that determines exoplanet habitability zones
  controls Dansgaard-Oeschger events, glacial terminations, and the faint
  young Sun paradox.
status: proposed
fields:
  - astronomy
  - stellar-physics
  - paleoclimatology
  - orbital-mechanics
  - climate-science
bridge_claim: >
  Earth's climate operates on multiple timescales governed by different aspects
  of solar and orbital physics. Milankovitch theory — the coupling of Earth's
  orbital eccentricity (100 kyr), axial obliquity (41 kyr), and precession
  (23 kyr) cycles to insolation distribution — accurately predicts the timing
  of the last eight glacial cycles as recorded in ice cores and deep-sea sediments.
  This is pure celestial mechanics: the same N-body gravitational calculation
  used to predict exoplanet orbits determines the timing of ice ages.

  On shorter timescales, the 11-year solar cycle modulates total solar irradiance
  (TSI) by ~0.1% and ultraviolet output by ~8%. UV drives stratospheric ozone
  chemistry, which couples to tropospheric circulation through the "top-down"
  pathway — the same stellar atmosphere physics that astronomers use to model
  stellar spectra determines the QBO-ENSO teleconnection. Cosmic ray flux
  (modulated by solar wind and galactic environment) may modulate cloud nucleation,
  linking galactic cosmic ray physics directly to Earth's energy balance.

  The faint young Sun paradox — that the early Sun was ~30% dimmer but Earth
  was not permanently frozen — sits at the intersection of stellar evolution
  models (standard solar model, helioseismology) and paleoclimate (Archaean
  sedimentary evidence for liquid water). Solving this paradox requires the same
  stellar interior physics used to model other G-dwarf stars.

  Habitability zone calculations for exoplanets use Earth's climate sensitivity
  to stellar forcing as the calibration point — the bridge is bidirectional:
  astronomy informs paleoclimate, and paleoclimate constrains the habitable zone
  boundaries used to prioritize exoplanet observations.
translation_table:
  - field_a_term: orbital eccentricity (Milankovitch 100 kyr cycle)
    field_b_term: glacial-interglacial cycling; pacemaker of ice ages in delta-O18 record
  - field_a_term: total solar irradiance (TSI) variation
    field_b_term: global mean temperature forcing; ~0.1 W/m2 per 11-year cycle
  - field_a_term: UV flux variation (stellar chromospheric activity)
    field_b_term: stratospheric ozone response; top-down climate pathway via QBO and circulation
  - field_a_term: stellar evolution (main sequence luminosity increase)
    field_b_term: faint young Sun paradox; Archaean climate sensitivity constraints
  - field_a_term: cosmic ray flux (galactic + solar modulation)
    field_b_term: cloud condensation nuclei; Svensmark hypothesis for solar-climate link via ionization
  - field_a_term: habitable zone calculation (stellar luminosity + climate model)
    field_b_term: Earth's climate sensitivity calibrates HZ boundaries used for exoplanet prioritization

cross_pollination_opportunities:
  - >
    Milankovitch cycle pacing of glaciations is established, but the 100 kyr
    problem (why the dominant cycle is 100 kyr eccentricity when eccentricity
    has the smallest insolation effect) remains open. Nonlinear ice-sheet dynamics
    — a climate problem — may be driven by resonance with the orbital forcing
    at a sub-harmonic. The same nonlinear resonance physics studied in celestial
    mechanics (Laplace resonance, mean-motion resonances) applies to the climate
    system's response to orbital forcing.
  - >
    Stellar flare activity on M-dwarf stars (the most common exoplanet hosts)
    represents extreme UV and particle forcing. Earth's response to historical
    solar energetic particle events (Carrington-class) provides empirical data
    to calibrate the atmospheric response models used in exoplanet habitability
    assessments. Connecting solar physics event databases with stratospheric
    chemistry models would directly improve exoplanet atmosphere modeling.
  - >
    Galactic environment and cosmic ray flux change as the solar system moves
    through the Milky Way spiral arms (~135 Myr period). Proposed correlations
    between cosmic ray flux, cloud cover, and long-term climate (Veizer et al.)
    require both astronomical orbital calculations and paleoclimate proxy records.
    Testing this at the galactic-orbit timescale bridges solar system dynamics
    and deep-time climate.
  - >
    The standard solar model predicts solar luminosity evolution — but helioseismology
    constraints on the solar interior from neutrino flux measurements can be
    cross-validated against the paleoclimate record of ocean surface temperature
    (Archaean cherts, oxygen isotopes). This gives an independent constraint on
    solar model parameters from Earth's geologic record.
communication_gap: >
  Astronomy and paleoclimatology share the Milankovitch framework but otherwise
  operate in separate communities. Solar physicists and stellar astronomers rarely
  read paleoclimate journals (Nature Climate Change, Paleoceanography) and
  paleoclimatologists rarely read solar physics journals (Solar Physics, ApJ).
  The faint young Sun paradox sits explicitly at the intersection but has been
  addressed by each community with different tools and assumptions without a
  unified treatment. Exoplanet habitability researchers use Earth climate models
  as external inputs without integrating paleoclimate data into their uncertainty
  quantification. Improved interdisciplinary training and joint workshops would
  enable cross-validation of models across disciplines.

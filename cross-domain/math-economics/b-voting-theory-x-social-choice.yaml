id: b-voting-theory-x-social-choice
title: >
  Voting Theory x Social Choice — Arrow's impossibility as topological obstruction
status: proposed
fields:
  - mathematics
  - economics
  - social-science
bridge_claim: >
  Arrow's impossibility theorem (no voting system satisfies all fairness axioms
  simultaneously) has a topological proof: the space of preference profiles is a
  simplex, and the aggregation map must have a fixed point that violates at least
  one axiom; this connects social choice theory to algebraic topology via
  Baryshnikov's theorem.
translation_table:
  - field_a_term: Social preference ordering (Arrow's axioms)
    field_b_term: Continuous map from preference simplex to itself
    note: >
      Baryshnikov (1993) showed Arrow's theorem follows from the Borsuk-Ulam theorem:
      any continuous aggregation of n individual preferences into a social preference
      must violate Independence of Irrelevant Alternatives or Pareto efficiency —
      a fixed-point/no-retraction result in algebraic topology.
  - field_a_term: Independence of Irrelevant Alternatives (IIA)
    field_b_term: Locality condition on the aggregation map
    note: >
      IIA requires that the social ranking of any two alternatives depends only on
      individual rankings of those two alternatives; topologically, this is a
      local/product structure condition on the aggregation map.
  - field_a_term: Condorcet cycle (no majority winner)
    field_b_term: Non-contractible loop in preference space
    note: >
      A Condorcet cycle (A beats B, B beats C, C beats A) corresponds to a
      non-contractible loop in the space of pairwise preferences, explaining why
      majority rule cannot always produce a consistent winner.
  - field_a_term: Dictatorship (one voter determines outcome)
    field_b_term: Fixed point of aggregation map (Brouwer's theorem)
    note: >
      Arrow's theorem proves dictatorship is the only aggregation satisfying all
      axioms; topologically, Brouwer's fixed point theorem guarantees a fixed
      point that corresponds to dictatorial choice.
communication_gap: >
  Arrow proved his theorem in 1951 using combinatorial axiomatics; algebraic topology
  developed separately; Baryshnikov's topological proof (1993) connecting Arrow to
  Borsuk-Ulam went largely unnoticed in economics for decades, despite providing
  far more geometric insight into which axiom combinations are feasible.
cross_pollination_opportunities:
  - >
    Use topological social choice theory to classify all possible voting paradoxes
    by their topological obstruction type, predicting which combination of axiom
    relaxations allows consistent aggregation.
  - >
    Apply Condorcet cycle topology to multi-agent AI preference aggregation —
    identifying which preference learning architectures are inherently inconsistent
    and require additional constraints.
  - >
    Import sheaf-theoretic social choice (Ghrist 2014) to handle distributed
    preference aggregation over networks where different subgroups have access to
    different alternatives.

id: b-glial-cells-brain-homeostasis
title: >
  Glia bridge neuroscience and biology: astrocytes form the tripartite synapse
  (modulating transmission), microglia prune synapses via complement tagging (C1q/C3),
  oligodendrocytes provide metabolic support ΓÇö glial dysfunction drives neurodegeneration
  across Alzheimer's, MS, and ALS.
status: established
fields:
  - neuroscience
  - biology
  - cell-biology
  - neurodegeneration
bridge_claim: >
  Glial cells (non-neuronal brain cells) are not passive support ΓÇö they are active
  participants in brain function and homeostasis. Three major types: (1) Astrocytes:
  form the tripartite synapse ΓÇö astrocyte processes ensheath ~57% of synapses in
  rodent hippocampus. Functions: glutamate uptake (GLT-1/GLAST/SLC1A2 transporters,
  preventing excitotoxicity); KΓü║ buffering (Kir4.1 inward-rectifier channels, spatial
  buffer current); gliotransmitter release (D-serine ΓÇö NMDA receptor co-agonist;
  ATP ΓåÆ adenosine ΓåÆ inhibition; glutamate ΓåÆ heterosynaptic potentiation). Astrocytes
  also form the blood-brain barrier (BBB) endfoot contacts with tight junction
  endothelium). (2) Microglia (CNS-resident macrophages, 10-15% of brain cells):
  survey synapses via highly motile processes (full brain scan every few hours).
  Synaptic pruning: microglia engulf excess synaptic connections via complement
  cascade ΓÇö C1q and C3 tag weak synapses ΓåÆ microglial CR3 recognizes C3b opsonin
  ΓåÆ phagocytosis. Stevens et al. (2007) showed this is required for normal circuit
  refinement (retinogeniculate system). Overactivation: in Alzheimer's disease,
  TREM2 mutations reduce microglial phagocytic capacity ΓåÆ amyloid accumulation;
  C1q-C3 pathway also drives inappropriate adult synapse loss. (3) Oligodendrocytes:
  myelinate axons (ΓåÆ Bridge 401), and provide metabolic support via lactate shuttle
  (MCT1/MCT2 transporters) ΓÇö essential for axon survival even without myelination.
  Oligodendrocyte loss in MS ΓåÆ demyelination + axon degeneration. Reactive gliosis:
  pathological response to injury ΓÇö astrocytes become hypertrophic and scar-forming.
translation_table:
  - field_a_term: tripartite synapse (pre + post + astrocyte)
    field_b_term: three-cell functional unit replacing the classical two-cell synapse model
    note: astrocyte monitors glutamate spillover and releases modulatory signals; key for plasticity
  - field_a_term: GLT-1/GLAST glutamate transporters
    field_b_term: electrogenic transporters (3 NaΓü║ in, 1 HΓü║ in, 1 KΓü║ out per glutamate)
    note: prevent excitotoxicity; electrogenic transport driven by NaΓü║ gradient; 80% of brain glutamate uptake
  - field_a_term: C1q-C3 complement tagging of synapses
    field_b_term: molecular immune opsonization applied to neural pruning
    note: same molecular pathway used for bacterial clearance; repurposed for synapse elimination in CNS development
  - field_a_term: microglial TREM2 receptor
    field_b_term: Alzheimer's disease risk factor (rare variant TREM2 R47H elevates risk 3-fold)
    note: TREM2 enables microglial response to lipids on damaged neurons and amyloid ΓÇö haploinsufficiency impairs clearance
  - field_a_term: oligodendrocyte lactate shuttle
    field_b_term: metabolic support (MCT1/MCT2 monocarboxylate transporters)
    note: oligodendrocytes provide lactate to axons as metabolic fuel; axon degeneration occurs without MCT1

cross_pollination_opportunities:
  - >
    Microglia as therapeutic target in neurodegeneration: TREM2 agonist antibodies
    (AL002, DNL919) are in Phase II trials for Alzheimer's disease ΓÇö restoring
    microglial function may clear amyloid and prevent synaptic loss. The biology
    of microglial phagocytosis provides the mechanistic basis for these therapeutic
    strategies.
  - >
    The discovery that the glymphatic system (astrocyte AQP4 channels + cerebrospinal
    fluid flow during sleep) clears amyloid and tau during sleep (Xie et al. 2013,
    Science) connects glial biology to sleep function ΓÇö predicting that sleep
    disruption accelerates neurodegeneration via impaired glymphatic clearance.
communication_gap: >
  Neurophysiologists who study synaptic transmission rarely engage with the immunology
  of microglial complement-mediated pruning. Neurologists who manage multiple sclerosis
  (oligodendrocyte pathology) rarely integrate with the tripartite synapse literature.
  The unification of glial cell biology into a coherent functional picture of brain
  homeostasis is still incomplete in most neuroscience training programs.

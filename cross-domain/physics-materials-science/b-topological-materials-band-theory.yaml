cross_pollination_opportunities:
  - >
    Topological data analysis (TDA, Carlsson 2009) uses the same homology groups
    and Betti numbers from algebraic topology to analyze high-dimensional data.
    The mathematical framework (persistent homology, Morse theory) is related to
    the topological classification of band structures. Bridging TDA and topological
    materials science could enable new materials discovery algorithms.
  - >
    Photonic topological insulators: engineering photonic crystals with band
    topology analogous to electronic TIs protects optical edge states from backscattering.
    Direct import of condensed matter physics into photonics engineering, with
    applications to robust optical communication.
communication_gap: >
  Topological materials theory requires algebraic topology (fiber bundles, K-theory,
  cohomology) that is not taught in standard physics programs. The mathematical
  machinery was known to mathematicians (Atiyah-Singer index theorem, 1963) but
  its application to condensed matter required the insight of Thouless et al. (1982)
  that band structure invariants are topological. The physics literature rarely
  cites the mathematical topology literature (K-theory of C*-algebras, Kitaev
  periodic table) despite using equivalent results.

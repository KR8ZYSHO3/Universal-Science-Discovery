cross_pollination_opportunities:
  - Phase field models of dislocation dynamics can borrow variational formulation from continuum fracture mechanics
  - Analogy between dislocation density tensor and curvature tensor in general relativity enables geometric defect theory
  - Peierls-Nabarro model for dislocations maps onto Frenkel-Kontorova model in tribology (sliding interfaces)
communication_gap: >
  Materials scientists and condensed matter physicists know dislocation theory
  well. Continuum mechanicians working on plasticity often treat it as a black
  box without microscopic justification. Crystal plasticity finite element
  methods (CPFEM) bridge both but require expertise in both fields.

id: b-dislocations-crystal-plasticity
title: >
  Dislocations (line defects in crystalline lattices) are the microscopic
  mechanism of plastic deformation in metals — dislocation glide requires
  far less stress than shearing a perfect crystal (Taylor 1934), connecting
  continuum plastic flow mechanics to atomic-scale crystal structure through
  the dislocation density tensor.
status: established
fields:
  - physics
  - condensed-matter-physics
  - materials-science
  - continuum-mechanics
  - crystallography
bridge_claim: >
  PERFECT CRYSTAL PROBLEM: The theoretical shear strength of a perfect crystal
  is τ_theory = G/2π ≈ G/6, where G is the shear modulus. For copper,
  τ_theory ≈ 4 GPa. Observed yield stress: ~1 MPa — a factor of 1000 lower.

  DISLOCATION RESOLUTION (Taylor, Orowan, Polyani 1934):
  A dislocation is a line defect where local atomic registry is offset by one
  Burgers vector b. Dislocation glide moves the defect through the crystal —
  only bonds at the core must break simultaneously, not an entire plane.

  PEIERLS-NABARRO STRESS:
    τ_PN = (2G/1-ν) exp(-2πw/b)

  where w = dislocation core width, b = Burgers vector magnitude. For wide
  cores (w >> b): τ_PN << G — consistent with observed low yield stress.

  PLASTIC STRAIN RATE:
    ε̇ = ρ_m · b · v_d

  where ρ_m = mobile dislocation density, v_d = dislocation velocity.
  This Orowan equation bridges microscale (ρ_m, b) to macroscale plastic
  flow (ε̇).

  WORK HARDENING: As plastic strain increases, dislocation density ρ rises,
  dislocations tangle and obstruct each other. Taylor hardening:
    τ = τ₀ + αGb√ρ

  where α ≈ 0.3-0.5. This predicts the √ε hardening exponent observed
  in stress-strain curves.

  DISLOCATION DENSITY TENSOR (Nye 1953):
  The incompatibility of plastic distortion is carried by the dislocation
  density tensor α_ij — a field theory that bridges discrete dislocations
  to continuum elasto-plasticity. This is the microscopic foundation of
  strain gradient plasticity.
translation_table:
  - field_a_term: Burgers vector b (crystallography)
    field_b_term: plastic strain increment per dislocation glide event
    note: The Burgers vector is both the topological invariant of the defect and the unit of plastic deformation
  - field_a_term: dislocation density rho (density of line defects per m^2)
    field_b_term: internal variable in continuum plasticity theory
    note: rho appears in hardening laws; equivalent to backstress in kinematic hardening models
  - field_a_term: Peierls-Nabarro stress (lattice friction)
    field_b_term: yield stress in continuum plasticity
    note: τ_PN sets the single-crystal yield stress before work hardening; polycrystal yield requires Taylor factor
  - field_a_term: dislocation core structure
    field_b_term: strain energy density at singularity
    note: Core energy must be regularised in continuum field theories — exactly as elastic field theories regularise point sources

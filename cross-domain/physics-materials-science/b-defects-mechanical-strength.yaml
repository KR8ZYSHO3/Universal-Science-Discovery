cross_pollination_opportunities:
  - >
    Statistical physics of dislocation avalanches: acoustic emission from deforming
    crystals shows power-law event size distributions (Weiss et al.) — this is
    the physics of self-organised criticality (Bak-Tang-Wiesenfeld) applied to
    crystal plasticity; the connection has been made but not fully exploited for
    predictive strength models.
  - >
    Machine learning interatomic potentials (MLIPs) trained on DFT data can
    simulate the full dislocation-grain boundary interaction landscape at
    nanosecond/nanometre scales — validating and extending Taylor/Hall-Petch
    to complex alloy compositions.
communication_gap: >
  Dislocation physics was developed by physicists (Taylor, Orowan, Burgers, Nabarro)
  but published primarily in materials science and metallurgy journals. Condensed
  matter physicists trained post-1970 typically do not study dislocation theory
  (it is not in standard graduate curricula), even though it is one of the most
  successful applications of solid-state physics to engineering. Materials
  engineers use Taylor/Hall-Petch empirically without connecting to the
  statistical mechanics derivations that would enable prediction in new alloy
  systems.

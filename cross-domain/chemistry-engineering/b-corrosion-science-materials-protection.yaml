id: b-corrosion-science-materials-protection
title: >
  Electrochemical corrosion science (Evans diagrams, Pourbaix equilibria, passivation
  thermodynamics) provides the quantitative foundation for engineering corrosion
  protection strategies that collectively address ~3.4% of global GDP in losses annually.
status: established
fields:
  - electrochemistry
  - materials-science
  - chemical-engineering
  - civil-engineering
  - surface-science
bridge_claim: >
  Corrosion is electrochemical: a galvanic cell where the anode oxidises (Fe → Fe²⁺ + 2e⁻)
  and the cathode reduces (O₂ + 2H₂O + 4e⁻ → 4OH⁻). The Evans diagram (mixed potential
  theory) superimposes anodic and cathodic polarization curves to find the corrosion
  potential E_corr and corrosion current i_corr — the master diagram of corrosion
  engineering. Passivation is the chemistry bridge: chromium in stainless steel
  spontaneously forms a 2–3 nm Cr₂O₃ film thermodynamically stable over a wide
  pH-potential window, predicted by Pourbaix diagrams (potential-pH equilibrium maps).
  This passive film self-heals on scratching. Cathodic protection (impressed-current or
  sacrificial anode) shifts the structure potential to the immune region of the Pourbaix
  diagram — protecting pipelines, ship hulls, and reinforced concrete bridges at scale.
  Inhibitors (benzotriazole for copper, imidazoline amines for steel) adsorb on active
  sites, increasing the activation energy for the anodic dissolution reaction. Koch et al.
  (2016) estimated global corrosion costs at $2.5 trillion/year (~3.4% of GDP); improved
  application of existing electrochemical science could prevent 15–35% of those losses.
translation_table:
  - field_a_term: standard electrode potential E° (electrochemistry)
    field_b_term: galvanic series rank (engineering)
    note: Engineering galvanic series is an empirical approximation to thermodynamic E° in seawater
  - field_a_term: Pourbaix diagram (E vs. pH stability regions)
    field_b_term: corrosion, passivation, and immunity zones for design decisions
    note: Engineers use Pourbaix to select material + environment combinations avoiding corrosion regions
  - field_a_term: anodic Tafel slope βₐ
    field_b_term: polarization resistance Rₚ = βₐβc/[2.3·i_corr·(βₐ+βc)]
    note: Stern-Geary equation converts laboratory polarization curves to service corrosion rate
  - field_a_term: passivation current density i_pass
    field_b_term: repassivation time after scratch (engineering specification)
    note: Stainless steel specification requires repassivation in <1 s in service environments
  - field_a_term: double-layer capacitance C_dl
    field_b_term: electrochemical impedance spectroscopy (EIS) circuit element
    note: EIS allows in-situ coating degradation monitoring — used in infrastructure health monitoring
related_unknowns:
  - u-corrosion-inhibitor-molecular-mechanism
related_hypotheses:
  - h-ml-accelerated-corrosion-inhibitor-discovery
cross_pollination_opportunities:
  - Apply density functional theory (DFT) calculations of inhibitor adsorption energies
    to predict new inhibitor candidates before synthesis — connecting quantum chemistry
    to corrosion engineering design
  - Use machine learning trained on EIS spectra to predict remaining service life of
    coated infrastructure — translating electrochemical signal processing to asset
    management decisions
  - Design Pourbaix-guided alloy composition for specific service environments
    (subsea, concrete, medical implants) using high-throughput computational screening
communication_gap: >
  Academic electrochemistry is dominated by energy storage and conversion research
  (batteries, fuel cells); corrosion research is often viewed as applied and unglamorous,
  underfunded relative to its economic impact. Civil and mechanical engineers who
  specify materials often have no electrochemistry training. The standards literature
  (ASTM, ISO) that governs engineering practice rarely cites academic corrosion
  electrochemistry, creating a slow knowledge transfer pathway of 10–20 years from
  discovery to standard.

id: b-nuclear-chemistry-reactor-physics
title: >
  Nuclear reactor physics bridges chemistry and engineering: the six-factor formula
  (k = ηfpεP_NL) governs criticality from fission cross-sections, the thorium
  cycle offers proliferation-resistant breeding, and Generation IV reactor designs
  (MSR, GFR) pursue passive safety through thermodynamic and neutronics principles.
status: established
fields:
  - chemistry
  - engineering
  - nuclear-physics
  - nuclear-engineering
  - energy
bridge_claim: >
  Nuclear fission: ²³⁵U + n → fission products + 2-3 prompt neutrons + ~200 MeV
  total energy (~170 MeV kinetic energy of fission fragments + 20 MeV from delayed
  gamma and beta). The criticality condition is governed by the six-factor formula:
  k_eff = η·f·p·ε·P_TNL·P_FNL where η = neutrons produced per absorption in fuel
  (2.42 for ²³⁵U thermal), f = thermal utilization (fraction absorbed in fuel),
  p = resonance escape probability (neutrons avoiding 238U resonance capture),
  ε = fast fission factor (additional fissions by fast neutrons), P_TNL and P_FNL =
  thermal and fast non-leakage probabilities. k_eff = 1 = critical; >1 = supercritical;
  <1 = subcritical. Neutron moderation: thermal neutrons (E ~ 0.025 eV) have
  fission cross-section for ²³⁵U of ~583 barns (vs. ~1 barn at 1 MeV) — moderators
  (H₂O, D₂O, graphite) slow neutrons by elastic scattering. Breeding: ²³⁸U + n →
  ²³⁹U → ²³⁹Np → ²³⁹Pu (fast breeder: k from ²³⁹Pu > 1); thorium cycle:
  ²³²Th + n → ²³³Th → ²³³Pa → ²³³U (fissile, lower transuranic waste, no
  weapons-grade Pu). ²⁴⁰Pu contamination makes reactor-grade Pu weapons-unsuitable.
  Generation IV reactors: MSR (molten salt) — liquid fuel dissolved in fluoride
  salt, online reprocessing, negative temperature coefficient; GFR (gas-cooled fast)
  — breeds ²³⁹Pu in fast spectrum. Rubbia (1995) energy amplifier: sub-critical
  reactor driven by proton spallation source — inherently safe (cannot sustain chain
  reaction without external source).
translation_table:
  - field_a_term: fission cross-section σ_f (barns)
    field_b_term: reaction probability for neutron-nucleus interaction (quantum mechanical)
    note: 1 barn = 10⁻²⁴ cm²; thermal ²³⁵U cross-section 583 b >> fast spectrum 1 b — moderator essential
  - field_a_term: multiplication factor k_eff
    field_b_term: neutron balance per generation; k=1 → steady state; k>1 → exponential growth
    note: k_eff relates the entire nuclear chain reaction; equals product of six factors in thermal reactors
  - field_a_term: neutron moderation (elastic scattering, energy transfer)
    field_b_term: slowing neutrons from MeV to meV scale via billiard-ball collisions
    note: maximum energy transfer when mass equal; H (mass 1) is most efficient; graphite (mass 12) less so
  - field_a_term: thorium-233U cycle (²³²Th → ²³³U)
    field_b_term: breeding cycle using fertile ²³²Th to produce fissile ²³³U
    note: ²³³U has high thermal η (> ²³⁵U), low transuranic production, and no weapons-grade plutonium pathway
  - field_a_term: negative temperature coefficient (α_T < 0)
    field_b_term: self-regulating feedback — as T increases, k_eff decreases → power falls
    note: Doppler broadening of ²³⁸U resonances at higher T increases resonance capture → negative void coefficient

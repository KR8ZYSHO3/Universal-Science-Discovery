cross_pollination_opportunities:
  - >
    Accelerator-driven systems (ADS): proton linac → spallation → sub-critical
    reactor (Rubbia energy amplifier) can transmute long-lived actinides (²⁴⁰Pu,
    Np, Am, Cm) into shorter-lived fission products — potentially reducing nuclear
    waste timescale from 240,000 years to ~300 years. Connects particle physics
    accelerator technology to nuclear waste chemistry.
  - >
    Small modular reactors (SMRs): factory-built, truck-transportable reactors
    (50-300 MWe) with passive safety — the engineering challenge is scaling down
    while maintaining k_eff ≈ 1 with smaller, less efficient moderation geometry.
    Nuclear physics constraints (neutron leakage increase with smaller reactor) are
    the fundamental engineering limit.
communication_gap: >
  Nuclear chemists (who understand isotope production, fuel chemistry, reprocessing)
  and nuclear engineers (who design reactor systems, safety systems, thermodynamics)
  work in overlapping but distinct communities. Policy makers who set nuclear energy
  strategy rarely have deep understanding of nuclear physics or chemistry. The public
  discourse conflates reactor-grade plutonium (weapons-unsuitable) with weapons-grade
  — a chemistry distinction with profound policy implications.

communication_gap: >
  Nuclear chemists (who understand isotope production, fuel chemistry, reprocessing)
  and nuclear engineers (who design reactor systems, safety systems, thermodynamics)
  work in overlapping but distinct communities. Policy makers who set nuclear energy
  strategy rarely have deep understanding of nuclear physics or chemistry. The public
  discourse conflates reactor-grade plutonium (weapons-unsuitable) with weapons-grade
  Î“Ă‡Ă¶ a chemistry distinction with profound policy implications.

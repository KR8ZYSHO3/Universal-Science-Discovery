cross_pollination_opportunities:
  - "Develop electrospun scaffolds with controlled fibre alignment (rotating collector) and biodegradation rate for peripheral nerve regeneration guidance"
  - "Apply WLF theory to optimise FDM printing parameters (nozzle temperature, print speed) for maximum inter-layer bond strength in high-performance structural parts"
  - "Use coaxial electrospinning to produce core-shell nanofibers: drug-loaded core + rate-controlling shell for zero-order release kinetics"

communication_gap: >
  Polymer physics (de Gennes, Doi, Edwards) is a theoretical condensed matter field;
  polymer processing (extrusion, injection moulding) is an industrial chemical
  engineering practice; electrospinning and additive manufacturing are engineering
  application fields. These communities use different models of polymer behaviour —
  reptation theory is well known to polymer physicists but rarely used explicitly in
  industrial processing simulation, where empirical constitutive equations dominate.
  The additive manufacturing community is only beginning to incorporate quantitative
  reptation theory into process models.


related_hypotheses:
  - h-llzo-single-ion-conductor-eliminates-dendrite-nucleation
cross_pollination_opportunities:
  - >
    Cryo-electron microscopy (cryo-EM) used in structural biology to image
    proteins at atomic resolution could characterise SEI atomic structure
    in situ — a direct import of biological imaging tools into battery engineering.
  - >
    The electrochemistry of lithium intercalation is formally equivalent to
    hydrogen storage in metal-organic frameworks: the same Butler-Volmer and
    Fickian diffusion equations apply, enabling cross-domain materials search.
communication_gap: >
  Battery science sits at the intersection of solid-state physics, electrochemistry,
  and materials engineering — no single academic department owns it. Electrochemists
  rarely engage with the solid-state physics community developing LLZO, and
  materials engineers often lack deep electrochemical thermodynamics training.
  Industrial battery research is proprietary, hiding results from academic
  researchers. The field also splits between inorganic chemistry (cathode
  materials) and polymer chemistry (electrolytes), with limited cross-talk.

cross_pollination_opportunities:
  - >
    Machine learning potential energy surfaces: DFT calculations of adsorption
    energies are expensive (hours per calculation). Machine learning interatomic
    potentials (MLIPs) trained on DFT data can screen millions of candidate
    catalysts in minutes, exploring the full composition space of bimetallic
    and high-entropy alloy catalysts. This combines materials informatics with
    the Sabatier/BEP framework for accelerated catalyst discovery.
  - >
    Microkinetic modeling bridges surface science to reactor design quantitatively:
    a full set of elementary steps (adsorption, surface reactions, desorption)
    with DFT-calculated rate constants can be integrated into CSTR/PFR equations.
    This "first-principles reactor design" avoids empirical rate expressions and
    allows prediction of reactor performance for novel catalysts before experimental
    testing.
  - >
    Electrocatalysis (fuel cells, CO₂ reduction, water splitting): the same
    Sabatier/BEP framework applies to electrochemical reactions where the
    effective binding energy is tuned by electrode potential. The Nørskov
    computational hydrogen electrode (CHE) method maps electrochemical free
    energies onto the same volcano plot framework, creating a unified physical
    chemistry for heterogeneous and electrocatalysis.
communication_gap: >
  Surface chemists (studying adsorption, binding energies, elementary steps)
  publish in Journal of Catalysis, ACS Catalysis, and Surface Science; chemical
  engineers designing reactors publish in Chemical Engineering Science, AIChE
  Journal, and Industrial & Engineering Chemistry Research. The curricula diverge:
  surface chemistry is a physical chemistry course, reactor design is a chemical
  engineering course. The quantitative connection — using DFT binding energies
  directly in reactor design equations via microkinetic models — has been
  established only in the last 20 years and is not yet standard in either
  community's textbooks.
last_reviewed: "2026-05-06"

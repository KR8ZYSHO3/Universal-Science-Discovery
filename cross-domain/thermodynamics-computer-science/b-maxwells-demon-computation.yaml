id: b-maxwells-demon-computation
title: >
  Maxwell's demon is resolved by Landauer's principle — erasing one bit of information
  dissipates at least kT ln 2 of energy, exactly linking Shannon information entropy
  to thermodynamic entropy and establishing the physical cost of logical irreversibility.
status: established
fields:
  - thermodynamics
  - computer-science
  - information-theory
  - statistical-mechanics
bridge_claim: >
  Maxwell's demon (1867): a hypothetical being that monitors individual molecules in
  a partitioned gas container, opening a small door to let fast molecules pass to
  one side and slow ones to the other. Net result: the gas unmixes, entropy decreases,
  and work is seemingly extracted from a heat bath — violating the second law.

  Resolution via information theory (Landauer 1961, Bennett 1973):
  The demon must observe and record the velocity of each molecule. Each observation
  stores one bit of information in the demon's memory. Eventually the memory fills
  and must be erased to continue operation. Landauer's principle: erasing one bit of
  information in a heat bath at temperature T requires dissipating at least k_B T ln 2
  of energy as heat. This exactly compensates the entropy decrease in the gas,
  restoring the second law.

  Bennett (1973) showed that computation itself can be made thermodynamically
  reversible — logically reversible operations (such as Fredkin gates, which are
  bijective) generate no heat. Only logically irreversible operations (bit erasure,
  AND gate, OR gate — where input information is lost) must dissipate energy.

  The exact equivalence: Shannon entropy H = -Σ p_i log₂ p_i (bits) corresponds
  to thermodynamic entropy S = k_B ln 2 · H (joules/kelvin). One bit of information
  corresponds to k_B ln 2 ≈ 9.57 × 10⁻²⁴ J/K of thermodynamic entropy.

  This is not metaphorical: in 2012 Bérut et al. demonstrated Landauer's bound
  experimentally using a colloidal particle in a double-well potential, erasing one
  bit and measuring exactly k_B T ln 2 of heat dissipation at the erasure threshold.

  Implications for computing: as transistors approach molecular scales, Landauer's
  bound becomes the fundamental lower limit on energy consumption per logical operation.
  Modern chips dissipate ~10⁶ k_B T per operation — enormous room for efficiency
  improvement — but the Landauer bound is the physical floor that cannot be crossed
  without reversible computation.
translation_table:
  - field_a_term: Maxwell's demon's memory bit
    field_b_term: one bit in a computational register
  - field_a_term: memory erasure (demon resets to accept new measurement)
    field_b_term: logically irreversible operation (bit reset, AND gate)
  - field_a_term: heat dissipated by erasure k_B T ln 2 per bit
    field_b_term: minimum energy cost of irreversible computation (Landauer bound)
  - field_a_term: thermodynamic entropy S = k_B ln Ω
    field_b_term: Shannon information entropy H = -Σ p_i log₂ p_i (S = k_B ln 2 · H)
  - field_a_term: reversible thermodynamic process (quasi-static, no entropy production)
    field_b_term: logically reversible computation (Toffoli gate, Fredkin gate)
  - field_a_term: irreversible mixing of gas
    field_b_term: irreversible logical operation (information loss = entropy production)
  - field_a_term: second law of thermodynamics (ΔS_universe ≥ 0)
    field_b_term: Landauer bound (every irreversible bit operation costs ≥ k_B T ln 2)
  - field_a_term: Szilard engine (1 bit = one Maxwell's demon measurement)
    field_b_term: single-bit memory cell (DRAM bit / flip-flop)

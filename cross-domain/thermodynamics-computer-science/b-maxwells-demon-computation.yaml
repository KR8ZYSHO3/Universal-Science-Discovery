cross_pollination_opportunities:
  - >
    Reversible computing architectures (Fredkin & Toffoli 1982) can in principle
    approach the Landauer bound asymptotically. Current research in adiabatic quantum
    computing and reversible CMOS explores this regime. Thermodynamics predicts that
    reversible logic at 300K could reduce energy consumption by ~6 orders of magnitude
    from today's CPUs — the fundamental motivation for pursuing reversible architectures.
  - >
    Biological computation (DNA, protein folding, neural signal transduction) must also
    obey Landauer's bound. Estimating the irreversible operations performed by a neuron
    during a spike and comparing to the metabolic cost of neural computation could
    determine whether the brain operates near or far from the Landauer limit —
    relevant to understanding neural energy efficiency.
  - >
    Quantum computing complicates Landauer's bound: unitary quantum gates are
    reversible by definition, so quantum computation can in principle be done without
    energy cost (until measurement or decoherence introduces irreversibility).
    The relationship between quantum decoherence (irreversibility from entanglement with
    environment) and Landauer's bound is an active research frontier.
communication_gap: >
  The Maxwell's demon paradox was a 94-year mystery (1867-1961) because physicists
  treated it as a thermodynamics problem, while the information-theoretic resolution
  required importing Shannon's 1948 concepts into physics. Landauer's insight was
  not immediately accepted — the explicit experimental confirmation only came in 2012.
  Computer science curricula rarely teach thermodynamic limits; thermodynamics courses
  rarely discuss logical reversibility. The connection between von Neumann's information-
  theoretic entropy and thermodynamic entropy, first noted by von Neumann and Shannon
  themselves, is still not universally acknowledged as exact rather than analogical.

cross_pollination_opportunities:
  - >
    4D-STEM (four-dimensional STEM): a pixelated detector records the full
    diffraction pattern at every scan position, acquiring a 4D dataset
    (2D scan position × 2D diffraction). This enables simultaneous HAADF,
    ptychographic phase contrast, electric field mapping, and strain mapping.
    The data volumes (TB per session) require materials informatics pipelines
    (ML segmentation, automated structure determination) — connecting electron
    microscopy to data science.
  - >
    In situ TEM: heating holders, liquid flow cells, and gas cells allow
    real-time observation of chemical reactions at atomic resolution —
    catalytic nanoparticle sintering, battery electrode cycling, corrosion.
    This bridges materials engineering (understanding degradation mechanisms)
    to physical chemistry (elementary surface reaction steps) at unprecedented
    resolution.
  - >
    Cryo-ET (cryo-electron tomography) of cells: tilting the sample through
    ±70° and back-projecting gives 3D tomograms of intact frozen cells at 3-5 nm
    resolution. Direct visualisation of ribosomes, membrane protein complexes,
    and cytoskeleton in their cellular context — without extraction or
    crystallisation. Subtomogram averaging of membrane proteins in situ provides
    structural information unobtainable by any other method.
communication_gap: >
  Electron microscopy is taught in materials science departments (HRTEM, STEM
  for materials) and structural biology departments (cryo-EM for proteins)
  with minimal cross-pollination. The quantum mechanical theory of image
  formation (multislice simulation, Bloch wave theory) is known to instrument
  scientists but rarely taught in biology or even materials engineering programs.
  The Nobel Prize for cryo-EM (2017) brought the technique to wide attention
  in biology, but the underlying quantum optics and electron-matter interaction
  physics remains invisible to most users of the technique.

cross_pollination_opportunities:
  - "Codon optimization for synthetic biology: traffic flow theory predicts that placing rare codons early in the CDS (near initiation) reduces ribosome jamming and maximizes protein yield — a design principle from operations research directly applicable to gene synthesis."
  - "mRNA lifetime and decay: ribosome density ρ(x) influences mRNA stability (ribosomes protect from nucleases); TASEP model predictions for ρ(x) can be compared to ribosome profiling data to infer which codons are translation bottlenecks in vivo."
communication_gap: >
  Molecular biologists who study translation efficiency use codon adaptation indices
  and ribosome profiling data without typically knowing TASEP theory or queuing
  network mathematics. Operations researchers who study tandem queues are unaware
  that their models have exact solutions applicable to gene expression. The connection
  was made by physicists (Shaw et al. 2003) but remains siloed in biophysics journals.

id: b-phenotypic-plasticity-reaction-norms
title: >
  Phenotypic plasticity — the capacity of a single genotype to produce different phenotypes in different environments — is formalized by the reaction norm (phenotype-as-function-of-environment), whose shape, slope, and curvature are heritable quantitative traits subject to natural selection
status: established
fields:
  - evolutionary-biology
  - mathematics
bridge_claim: >
  A reaction norm W: E → P maps each environmental value e ∈ E to the expressed phenotype P(e) for a given genotype; the slope dP/de measures plasticity sensitivity, the curvature d²P/de² indicates canalization (resistance to environmental variation), and inter-individual variance in reaction norm shape is the genetic variation available to selection — formalizing phenotypic plasticity as a functional trait in the mathematics of function spaces, enabling analysis of adaptive plasticity evolution using calculus of variations and quantitative genetics on function-valued traits.
translation_table:
  - field_a_term: "reaction norm slope across environments (evolutionary biology)"
    field_b_term: "derivative dP/de of the phenotype-environment function (mathematics)"
    note: "Steep slopes indicate high plasticity; slope is heritable and can evolve by selection"
  - field_a_term: "genotype-by-environment interaction (evolutionary biology)"
    field_b_term: "variation in reaction norm shape across genotypes (function space statistics) (mathematics)"
    note: "G×E interaction is non-zero when different genotypes have different-shaped reaction norm functions"
  - field_a_term: "canalization (evolutionary biology)"
    field_b_term: "low variance in phenotype across environmental range — flat reaction norm (mathematics)"
    note: "Canalized traits have dP/de ≈ 0; canalization evolves when stable environment makes plasticity costly"
  - field_a_term: "genetic assimilation (evolutionary biology)"
    field_b_term: "evolution of reaction norm intercept toward formerly plastic response — loss of slope (mathematics)"
    note: "After environmental change, selection reduces slope and increases intercept; quantified by reaction norm morphology change"
communication_gap: >
  Evolutionary biologists measure reaction norms through common garden and transplant experiments while mathematical biologists study function-valued traits and infinite-dimensional quantitative genetics; the application of functional data analysis and calculus of variations to reaction norm evolution is not standard in empirical biology.

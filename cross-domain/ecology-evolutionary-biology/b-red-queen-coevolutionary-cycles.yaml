id: b-red-queen-coevolutionary-cycles
title: >
  Antagonistic host-parasite coevolution drives persistent allele frequency cycling (Red Queen dynamics) whose period and amplitude are predicted by Lotka-Volterra-type coevolutionary equations analogous to ecological predator-prey cycles
status: established
fields:
  - evolutionary-biology
  - mathematics
bridge_claim: >
  The Red Queen hypothesis — that host populations must continuously evolve resistance to coevolving parasites — generates oscillatory allele frequency dynamics formally equivalent to ecological predator-prey cycles: parasite fitness increases when host is common (mimicking prey abundance driving predator growth), host resistance alleles spread when parasite is prevalent (mimicking predator depletion reducing prey), generating limit cycles whose period scales as the inverse square root of selection coefficient and whose amplitude is controlled by population size and mutation rate, directly mapping evolutionary dynamics onto the mathematics of Lotka-Volterra systems.
translation_table:
  - field_a_term: "host resistance allele frequency p(t) (evolutionary biology)"
    field_b_term: "prey population density N_H(t) in predator-prey ODE (mathematics)"
    note: "Host resistance frequency plays the role of prey density: increases when parasite frequency is low"
  - field_a_term: "parasite virulence allele frequency q(t) (evolutionary biology)"
    field_b_term: "predator population density N_P(t) in predator-prey ODE (mathematics)"
    note: "Parasite frequency plays predator role: increases when host is common and susceptible"
  - field_a_term: "selection coefficient s for resistance/virulence (evolutionary biology)"
    field_b_term: "interaction coefficient α in Lotka-Volterra predator-prey equations (mathematics)"
    note: "Fitness benefit of resistance ~ fitness benefit of prey for predator; both control cycle period"
  - field_a_term: "negative frequency-dependent selection (evolutionary biology)"
    field_b_term: "oscillatory stability in Lotka-Volterra predator-prey system (mathematics)"
    note: "Both systems produce persistent cycles rather than equilibria when interactions are negative-frequency-dependent"
communication_gap: >
  Evolutionary biologists study coevolution through field surveys and experimental evolution while applied mathematicians analyse predator-prey equations; the formal mathematical equivalence between Red Queen allele cycles and Lotka-Volterra population cycles is recognized theoretically but rarely exploited for quantitative prediction.
cross_pollination_opportunities:
  - "Fitting Lotka-Volterra-style coevolutionary ODEs to long-term allele frequency data from Daphnia-parasite and flax-rust experimental coevolution systems to estimate cycle period and amplitude"
  - "Using mathematical theory of predator-prey stability (Kolmogorov conditions) to predict conditions for stable versus unstable Red Queen cycling"

id: b-climate-tipping-health
title: >
  Bifurcation mathematics describing climate tipping points (AMOC collapse,
  permafrost carbon feedback, ice-sheet runaway) predicts epidemiological phase
  transitions under climate stress — the same fold-bifurcation and saddle-node
  dynamics govern both planetary-scale regime shifts and population health
  threshold crossings.
status: proposed
fields:
  - climate-science
  - dynamical-systems
  - epidemiology
  - population-health
  - medicine
bridge_claim: >
  Climate science has developed rigorous mathematical frameworks for tipping
  points: saddle-node bifurcations where a slowly-changing forcing (CO2 concentration,
  temperature anomaly) drives a system to a threshold beyond which it jumps
  discontinuously to a new attractor. The AMOC slowdown, Arctic sea-ice loss,
  and permafrost carbon release all follow this fold-bifurcation structure,
  with universal early-warning signatures (rising variance, autocorrelation,
  flickering) preceding the transition.

  Exactly the same mathematics governs population health tipping points.
  Infectious disease prevalence follows threshold dynamics described by the
  basic reproduction number R0: below R0=1 the epidemic dies out; above it the
  system jumps discontinuously to an endemic attractor. Malnutrition cascades
  in populations under heat stress exhibit poverty-trap bifurcations where
  reduced agricultural yield → increased stunting → reduced labor productivity
  → further yield loss, with a saddle-node structure identical to climate
  bistability. Heat mortality curves are highly nonlinear — mortality rate
  climbs slowly until a wet-bulb temperature threshold (~35°C) is crossed,
  above which it diverges, a fold bifurcation in the mortality-temperature
  relationship.

  The mathematical objects are the same: potential wells, bifurcation diagrams,
  early-warning indicators (AR1, variance, kurtosis), and hysteresis. A climate
  scientist studying AMOC tipping and an epidemiologist studying malaria
  transmission thresholds are studying the same dynamical system class.
translation_table:
  - field_a_term: saddle-node (fold) bifurcation
    field_b_term: R0=1 epidemic threshold / poverty-trap crossing / heat-mortality inflection point
  - field_a_term: slow-variable forcing (CO2 concentration)
    field_b_term: slow climate change forcing driving disease range expansion or food insecurity
  - field_a_term: alternative stable states (ice-covered vs ice-free Arctic)
    field_b_term: endemic vs disease-free equilibrium; acute vs chronic malnutrition basin
  - field_a_term: early-warning indicators (rising AR1, variance)
    field_b_term: pre-epidemic rising case variance, autocorrelation in incidence time series
  - field_a_term: hysteresis (return requires forcing well below bifurcation point)
    field_b_term: disease elimination requires R0 far below 1; stunting reversal lags intervention
  - field_a_term: tipping cascade (AMOC → monsoon → Amazon dieback)
    field_b_term: "climate-health cascade: heat → harvest failure → malnutrition → disease susceptibility"

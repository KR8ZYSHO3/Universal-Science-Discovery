  - h-amoc-saddle-node-bifurcation
cross_pollination_opportunities:
  - >
    Early-warning indicators developed for climate tipping points (rising AR1
    in temperature anomaly time series, spatial variance) can be directly applied
    to epidemiological time series. Rising autocorrelation in weekly malaria
    incidence data before seasonal epidemic onset provides a pre-epidemic warning
    signal analogous to the pre-tipping AR1 rise observed in paleoclimate records.
    WHO surveillance systems could implement this algorithm without model development.
  - >
    The "safe operating space" concept from planetary boundaries can be extended
    to population health: identify the joint climate-health parameter space
    within which all tipping thresholds remain subcritical. Wet-bulb temperature,
    agricultural productivity, and vector habitat expansion define axes of a
    health tipping-point diagram analogous to the planetary boundaries framework.
  - >
    Climate-economy-health integrated assessment models (IAMs) currently treat
    health damage as smooth functions of temperature. Replacing smooth health
    damage functions with bifurcation-aware models (with explicit tipping points
    and hysteresis) would dramatically change optimal carbon price estimates —
    the Stern review analogue for health tipping points has not been computed.
  - >
    Permafrost thaw releases not only CO2/CH4 (climate feedback) but also ancient
    pathogens (anthrax from thawed carcasses, Pleistocene viruses). The same
    bifurcation model that predicts permafrost carbon release can predict
    pathogen emergence risk — a combined climate-epidemiology tipping model.
communication_gap: >
  Climate science and epidemiology are institutionally separated: different funding
  agencies (NSF/NOAA vs NIH/CDC), different journals, and different mathematical
  traditions. Climate dynamical systems use bifurcation theory and potential wells;
  epidemiology uses compartmental ODE models (SIR/SEIR). Both are nonlinear
  dynamical systems, but practitioners are rarely trained across both literatures.
  Integrated climate-health modeling remains a niche subdiscipline; the explicit
  connection to bifurcation theory and tipping cascades is not standard in either
  community's textbooks.

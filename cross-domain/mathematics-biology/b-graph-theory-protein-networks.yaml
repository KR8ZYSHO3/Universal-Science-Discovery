id: b-graph-theory-protein-networks
title: >
  Protein-protein interaction networks are scale-free graphs (P(k) ∝ k^{-γ},
  γ ≈ 2.5) whose hub proteins are essential (lethal when deleted), whose modules
  correspond to functional complexes detectable by the Louvain algorithm, and
  whose bridging proteins (high betweenness centrality) are preferential drug targets
  — directly translating graph-theoretic concepts into biological and pharmacological
  predictions.
status: established
fields:
  - mathematics
  - biology
  - network-science
  - graph-theory
  - systems-biology
bridge_claim: >
  The yeast interactome (~6,000 proteins, ~80,000 interactions, Jeong et al. 2001)
  follows a scale-free degree distribution P(k) ∝ k^{-γ} with γ ≈ 2.5 — identical
  mathematically to the WWW, citation networks, and power grids. Graph theory
  directly predicts biological consequences: hub proteins (high degree k) are
  statistically essential for viability — deleting them is lethal — while deleting
  non-hub proteins is usually tolerated, exactly as removing hubs fragments
  scale-free networks while random node deletion does not. Barabási-Oltvai (2004)
  distinguished "party hubs" (interact simultaneously, form stable complexes)
  from "date hubs" (interact sequentially, regulate information flow between modules).
  Alon et al. (1999, 2002) identified network motifs — feedforward loops (FFL),
  autoregulation, bi-fans — as statistically over-represented subgraphs in
  transcription factor networks, each with a defined regulatory function.
  Community detection (Louvain algorithm, Blondel et al. 2008) applied to PPI
  networks identifies protein complexes and functional modules with precision
  matching biochemical co-immunoprecipitation results. Spectral graph theory:
  the leading eigenvectors of the PPI Laplacian identify functional modules,
  while proteins with high betweenness centrality are bottleneck bridges between
  modules — and these are preferentially enriched among approved drug targets.
translation_table:
  - field_a_term: degree distribution P(k) (graph theory)
    field_b_term: protein interaction degree (interactome topology)
    note: Scale-free degree distribution means hubs dominate connectivity — as in many real networks
  - field_a_term: hub node (high degree)
    field_b_term: essential protein (lethal when deleted)
    note: Jeong et al. showed 60-70% of yeast proteins with k > 15 are essential
  - field_a_term: betweenness centrality (shortest path routing)
    field_b_term: bottleneck protein / drug target enrichment
    note: High betweenness proteins are in the information flow paths between modules — target-rich
  - field_a_term: network motif (over-represented subgraph)
    field_b_term: regulatory circuit (feedforward loop, autoregulation)
    note: Alon's motifs are graph-theoretic patterns that implement specific regulatory functions
  - field_a_term: community detection (modularity Q)
    field_b_term: protein complex / functional module identification
    note: Louvain algorithm recapitulates known complexes (ribosome, proteasome, spliceosome)
  - field_a_term: graph Laplacian spectrum (spectral graph theory)
    field_b_term: functional module boundaries in PPI networks
    note: Spectral clustering of PPI Laplacian matches biochemical complex boundaries

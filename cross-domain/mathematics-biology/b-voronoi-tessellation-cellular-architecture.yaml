id: b-voronoi-tessellation-cellular-architecture
title: >
  Biological tissues self-organise into Voronoi tessellations — the same space-partitioning
  geometry that minimises interface energy in soap foams and maximises packing efficiency
  in engineered materials.
status: established
fields:
  - mathematics
  - biology
  - physics
bridge_claim: >
  Voronoi tessellations (Dirichlet regions) partition space into cells based on nearest-
  neighbour distance, minimising total interface area. Biological tissues independently
  converge on this geometry: epithelial cell sheets, insect compound eye facets, plant
  epidermis, and cortical column arrangements all follow Voronoi statistics. The Lewis
  law (mean cell area ∝ number of sides − 2) and Aboav-Weaire law (average neighbour
  sides = 5 + 8/n for an n-sided cell) are topological constraints that both soap
  foams and biological tissues satisfy. The convergence is not coincidental — both
  systems minimise interface energy under growth constraints, establishing a deep
  mathematical equivalence between cellular biology and geometry.
translation_table:
  - field_a_term: Voronoi region (point set)
    field_b_term: cell territory (biological tissue)
    note: Each Voronoi region is the set of points closer to one generator than any other
  - field_a_term: interface energy minimisation
    field_b_term: cell membrane tension minimisation
    note: Physical basis for convergence to Voronoi geometry in both systems
  - field_a_term: Lewis law (topology)
    field_b_term: cell area-side number relationship
    note: Empirically confirmed in plant, insect, and mammalian epithelia
  - field_a_term: Aboav-Weaire law
    field_b_term: neighbour cell side-number correlation
    note: Statistical law linking adjacent cell topology; holds in biological and physical foams
related_unknowns:
  - u-biomineralisation-control
related_hypotheses:
  - h-biomineralisation-voronoi-control
cross_pollination_opportunities:
  - >
    Voronoi analysis of tumour microstructure: mapping tumour cell territories as
    Voronoi regions could quantify invasiveness by deviation from Voronoi regularity
    (measured by the coefficient of variation of cell side number), providing a
    geometric biomarker for cancer stage.
  - >
    3D bioprinting scaffold design: engineering scaffold architectures as 3D Voronoi
    tessellations could produce biomimetic pore geometries that promote cell attachment
    and nutrient transport better than regular lattice architectures.
communication_gap: >
  Voronoi geometry is taught in computational geometry and operations research; cell
  biology teaches tissue organisation without reference to the underlying geometric
  optimisation principle. The unification is known in biophysics but rarely crosses
  into mainstream cell biology teaching or practice.

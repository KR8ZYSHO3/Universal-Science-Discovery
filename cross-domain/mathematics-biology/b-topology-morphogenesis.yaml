related_hypotheses: []
cross_pollination_opportunities:
  - Apply topological field theory (homotopy groups of order-parameter spaces) to classify which morphogenetic deformations are topologically accessible given an embryo's initial cell arrangement
  - Use liquid-crystal simulation code (LAMMPS, OpenFOAM + nematic modules) to model embryonic tissue mechanics — no new code needed, only new boundary conditions
  - Design experiments that map defect positions in living embryos and test whether defect-charge conservation predicts which morphogenetic movements follow
  - Apply Kibble-Zurek scaling to predict how reproducible a developmental stage is as a function of the rate of symmetry breaking — connects to canalisation theory in evo-devo
  - "Topological defect positions as early-warning biomarkers for congenital malformations: detectable via light-sheet microscopy before gross morphological failure occurs"
communication_gap: >
  Developmental biologists and mathematical physicists have essentially no shared
  conference venues, training overlap, or literature crossover. Developmental biology
  is empirically driven (model organisms: Drosophila, zebrafish, C. elegans) and
  uses molecular genetics terminology; mathematical physics uses differential geometry
  and homotopy theory. The insight that actomyosin can be treated as a vector order
  parameter with nematic symmetry has only recently appeared in biophysics journals
  (Physical Biology, eLife Physics) that neither community's mainstream reads. Grant
  panels for developmental biology do not routinely include mathematical physicists,
  and vice versa.

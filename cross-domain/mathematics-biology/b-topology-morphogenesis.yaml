id: b-topology-morphogenesis
title: >
  Topological defects in condensed-matter physics — liquid crystal disclinations,
  magnetic vortices — are the same mathematical objects that organise physical forces
  during embryonic organ formation.
status: proposed
fields:
  - mathematical-physics
  - developmental-biology
  - soft-matter
  - topology
bridge_claim: >
  In condensed-matter physics, topological defects are points or lines where the
  local order parameter (e.g. the director field of a liquid crystal) cannot be
  defined continuously, characterised by a quantised winding number or charge.
  These defects are topologically protected — they cannot be removed without
  changing the global topology of the field. A 2026 paper (arXiv 2602.09867)
  demonstrates that the same mathematical objects arise in the cell-adhesion and
  actomyosin-tension fields of embryonic epithelia, and that defect positions
  and charges appear to organise the mechanical forces that fold flat sheets into
  tubes, vesicles, and organs. This is a non-trivial bridging insight because
  the mathematics of topological defects was developed entirely within physics —
  in the context of magnets, liquid crystals, and superfluids — yet appears to
  be a universal coordinate system used by living tissue to organise geometry at
  the mesoscale. Developmental biologists studying morphogenesis do not routinely
  use homotopy theory or topological invariants; topological field theorists do
  not study embryos. Neither community is aware that the other has half of a
  complete theory.
translation_table:
  - field_a_term: director field (liquid crystal physics)
    field_b_term: myosin-II polarisation field (developmental biology)
    note: The order parameter whose topological properties determine defect structure
  - field_a_term: disclination charge / winding number
    field_b_term: morphogenetic organiser strength
    note: Quantised invariant characterising each defect's influence on surrounding material
  - field_a_term: topological protection
    field_b_term: robustness of morphogenetic axis specification
    note: Why the same body axes reliably emerge despite molecular noise
  - field_a_term: defect pair creation / annihilation
    field_b_term: tissue layer separation / fusion events
    note: Topological transitions that correspond to major morphogenetic events
  - field_a_term: Frank elastic constants
    field_b_term: tissue mechanical anisotropy parameters
    note: The material-dependent stiffness constants entering the free-energy functional
  - field_a_term: Kibble-Zurek mechanism (defect density after quench)
    field_b_term: defect density after developmental symmetry breaking
    note: Universal scaling law for how many defects form at a phase transition — may predict morphogenetic reproducibility

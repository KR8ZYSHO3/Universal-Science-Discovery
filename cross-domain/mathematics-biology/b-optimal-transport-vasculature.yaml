communication_gap: >
  Murray published his law in 1926 in experimental biology journals. Optimal
  transport theory was developed by Kantorovich (1942) in mathematics/economics.
  The Wasserstein metric became central to ML and probability only in the 2010s.
  The connection between Murray's law and the p-Laplacian was not made explicit
  until Facca et al. (2021). The three communities (vascular biology, optimal
  transport mathematics, and network science) arrived at the same variational
  problem from entirely different directions across a century.


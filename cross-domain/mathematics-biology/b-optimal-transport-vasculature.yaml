id: b-optimal-transport-vasculature
title: "Optimal transport theory ↔ biological vascular and neural network architecture (Murray's law as Wasserstein flow)"
status: established
fields:
  - mathematics
  - fluid-dynamics
  - comparative-physiology
  - developmental-biology
  - neuroscience

bridge_claim: >
  Murray's law (1926) — that the cube of the parent vessel radius equals the sum
  of cubes of daughter radii at every branch point (r_0^3 = r_1^3 + r_2^3) — is
  the exact solution to a variational problem: minimise the total metabolic cost
  of maintaining and pumping blood through a branching network, subject to fixed
  total volume. This is precisely the discrete optimal transport problem on a tree:
  find the branching geometry that minimises the Wasserstein-1 transport cost from
  source (heart) to sinks (capillaries). The same variational principle governs
  leaf vein networks, bronchial trees, lymphatic vessels, river deltas, and
  fungal mycelial networks — all without coordination, purely from local cost
  minimisation at each branch point. Recent work (Santambrogio 2015; Facca et al.
  2021) shows that the biological networks are solutions to the Benamou-Brenier
  formulation of optimal transport, and that the continuous limit of Murray's law
  is the p-Laplacian PDE with p = 3/2. This means the geometry of every vascular
  tree in every animal is implicitly solving a PDE from 20th-century mathematics.


  - "Synthetic Turing systems in organoids to test parameter-space predictions in vitro"
  - "Hox gene dosage experiments to shift Lambda* and verify scaling relation"

communication_gap: >
  Turing's 1952 paper was largely ignored by biologists for two decades — it appeared
  in a mathematics journal (Phil Trans R Soc B) and used PDEs unfamiliar to
  developmental biologists of the era.  The Gierer-Meinhardt (1972) reformulation
  reached a wider biology audience, but quantitative experimental tests were blocked
  by the inability to measure morphogen diffusivities in live embryos until
  fluorescence correlation spectroscopy matured in the 2000s.


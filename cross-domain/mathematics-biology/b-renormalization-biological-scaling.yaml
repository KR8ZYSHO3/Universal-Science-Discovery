id: b-renormalization-biological-scaling
title: >
  The renormalization group explains why biological allometric scaling laws
  are power laws with universal exponents — metabolic scaling, growth rates,
  and lifespan all emerge from the same fixed-point structure that governs
  critical phenomena in statistical physics.
status: proposed
fields:
  - mathematical-physics
  - theoretical-biology
  - statistical-physics
  - comparative-physiology
bridge_claim: >
  The renormalization group (RG) is the standard physics explanation for why
  power laws arise universally near critical points: when you "coarse-grain"
  a system (average out short-scale details), the long-scale behaviour flows
  to a fixed point characterised by a small set of exponents determined only
  by dimension and symmetry, not by microscopic details. This is why water,
  iron, and CO2 all have the same critical exponent β=0.326 near their
  liquid-gas transitions.

  Biological allometric scaling laws — Kleiber's metabolic rate ∝ M^(3/4),
  heart rate ∝ M^(-1/4), lifespan ∝ M^(1/4), aorta radius ∝ M^(3/8) —
  are all power laws with exponents that are simple multiples of 1/4. This
  "quarter-power" universality across all taxa (bacteria to blue whale)
  is precisely the signature of an RG fixed point: the vascular tree
  coarse-grains under a length-rescaling, flowing to a fixed point in the
  space of branching networks.

  The WBE theory (West-Brown-Enquist 1997) derives the 3/4 exponent from
  area-preserving branching, but does not cast it as an RG calculation.
  Casting it as one predicts: (a) the exact correction-to-scaling exponents
  at finite body size, (b) which perturbations to vascular geometry are
  "relevant" (change the exponent) vs "irrelevant" (change only prefactors),
  and (c) why non-pulsatile organisms (plants, echinoderms) should exhibit
  the same 3/4 exponent — they are in the same universality class despite
  having completely different microscopic vascular architectures.
translation_table:
  - field_a_term: renormalization group fixed point
    field_b_term: allometric scaling law (universal quarter-power exponents)
  - field_a_term: universality class
    field_b_term: quarter-power scaling shared by all vascular taxa
  - field_a_term: relevant perturbation (changes critical exponent)
    field_b_term: vascular geometry change that alters the scaling exponent (e.g. non-area-preserving branching)
  - field_a_term: irrelevant perturbation (flows to zero under RG)
    field_b_term: organism-specific vascular geometry detail that changes prefactor but not exponent
  - field_a_term: correction-to-scaling term (finite-size effect)
    field_b_term: deviation from Kleiber's Law in small organisms (below ~1g body mass)
  - field_a_term: coarse-graining (averaging out short-scale modes)
    field_b_term: summing metabolic contributions over a vascular subtree (recursive branching)
  - field_a_term: Wilson-Fisher epsilon expansion
    field_b_term: systematic perturbation theory for allometric exponents around the area-preserving branching limit

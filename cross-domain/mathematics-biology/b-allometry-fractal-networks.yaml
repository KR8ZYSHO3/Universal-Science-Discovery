id: b-allometry-fractal-networks
title: "West-Brown-Enquist fractal network model ↔ metabolic scaling: Kleiber's law from geometry alone"
status: established
fields:
  - theoretical-biology
  - statistical-physics
  - network-theory
  - physiology
  - ecology

bridge_claim: >
  Kleiber (1932) observed that basal metabolic rate B scales with body mass M as
  B ~ M^{3/4} across 20 orders of magnitude of body mass (from bacteria to blue whales).
  This 3/4-power law defied explanation for 60 years. West, Brown & Enquist (1997, Science)
  derived the exponent purely from geometry: they proved that any space-filling,
  fractal-like distribution network (such as the vascular system) that (a) reaches
  all cells in a volume, (b) minimizes hydrodynamic resistance, and (c) has
  terminal units (capillaries, mitochondria) of fixed size, must obey B ~ M^{3/4}.
  The key insight is that the fractal branching network has an effective dimension d=4
  (3 spatial dimensions + 1 for the fractal nature of the network), so metabolic rate
  scales as M^{(d-1)/d} = M^{3/4}. This prediction extends to: allometric scaling of
  heart rate (~ M^{-1/4}), lifespan (~ M^{1/4}), tree growth rates, river basin geometry,
  and cellular metabolic rates - all from the single geometric constraint of optimal
  fractal distribution networks. Quarter-power scaling is thus a universal consequence
  of fractal geometry in biological supply networks, not an evolved biological strategy.

translation_table:
  - field_a_term: "fractal network branching ratio"
    field_b_term: "vascular bifurcation angle / Murray's law"
    note: "Murray's law (r_parent^3 = sum r_child^3) is the optimization condition"
  - field_a_term: "space-filling fractal dimension"
    field_b_term: "effective network dimensionality d=4"
    note: "The extra dimension captures the fractal filling of 3D volume"
  - field_a_term: "terminal unit size invariance"
    field_b_term: "capillary and mitochondrion size fixed across species"
    note: "Sets the absolute normalization; only exponent is universal"
  - field_a_term: "3/4 scaling exponent"
    field_b_term: "Kleiber's law B ~ M^{3/4}"
    note: "Derived, not fitted; zero free parameters after fixing d=4"
  - field_a_term: "-1/4 scaling of rates"
    field_b_term: "heart rate, respiratory rate, cellular division rate ~ M^{-1/4}"
    note: "All time scales set by network transport time"


cross_pollination_opportunities:
  - "Apply WBE model to predict optimal branching in engineered supply networks (chip cooling, building HVAC, chemical reactors)"
  - "Test WBE predictions for metabolic scaling in organisms without hierarchical vascular networks (sponges, fungi)"
  - "Use fractal network optimization as design principle for lab-on-chip microfluidics and synthetic tissue vascularization"
  - "Extend to economic networks: does GDP scale with urban population as M^{7/6} (Bettencourt 2007) from the same geometric principle?"

communication_gap: >
  West, Brown & Enquist published in Science (1997) where the audience was broad, but
  the mathematical derivation (involving fractal geometry and optimal transport theory)
  is opaque to most biologists. The connection to Murray's law (1926, a hydraulics
  result) was known to physiologists but not connected to metabolic scaling. Plant
  ecologists use the WBE model routinely but rarely connect it to the physics of
  optimal transport or the mathematics of fractal dimension theory.


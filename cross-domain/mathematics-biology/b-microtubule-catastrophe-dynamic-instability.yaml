id: b-microtubule-catastrophe-dynamic-instability
title: >
  Microtubule dynamic instability — the abrupt switch between slow growth and rapid
  catastrophic shrinkage — is a mathematical catastrophe in Rene Thom's sense: a
  bifurcation in the dynamics of GTP-cap length where the system switches
  discontinuously between two stable states, with the catastrophe theory unfolding
  predicting the dependence of switch frequency on tubulin concentration and
  hydrolysis rate.
status: proposed
fields:
  - cell-biology
  - mathematics
  - biophysics
  - dynamical-systems
bridge_claim: >
  Microtubules switch stochastically between polymerisation (growth, ~1 um/min) and
  depolymerisation (catastrophe, ~20 um/min) — a dramatic 20-fold speed difference
  that Mitchison & Kirschner (1984) termed dynamic instability. The GTP-cap model
  provides the mechanism: a layer of GTP-tubulin at the growing tip stabilises the
  lattice; hydrolysis converts GTP to GDP-tubulin, and when the cap is lost,
  catastrophe occurs. Catastrophe theory (Rene Thom, 1972) provides the mathematical
  framework: the system has two stable states (growth and shrinkage) separated by
  an unstable manifold in GTP-cap length space. The switch between states is a fold
  catastrophe — the simplest singularity in the cusp catastrophe unfolding. The
  control parameters are tubulin concentration (determines cap formation rate) and
  GTP hydrolysis rate (determines cap loss rate). This predicts a phase diagram with
  two regimes separated by a catastrophe curve — quantitatively confirmed by
  experiments where tubulin concentration and temperature (controlling hydrolysis)
  shift catastrophe frequency. The bridge also connects to stochastic switching in
  gene expression, where similar bimodal state distributions arise from bifurcation
  dynamics.
translation_table:
  - field_a_term: fold catastrophe
    field_b_term: GTP-cap loss triggering catastrophe
    note: The abrupt collapse of the microtubule tip follows the fold catastrophe topology
  - field_a_term: control parameter space (cusp unfolding)
    field_b_term: tubulin concentration vs. GTP hydrolysis rate phase diagram
    note: The two control parameters unfold the catastrophe; their combination sets catastrophe frequency
  - field_a_term: stable manifold (attractor)
    field_b_term: growing state (GTP-cap present) or shrinking state (cap absent)
    note: Two attractors separated by the catastrophe manifold
  - field_a_term: hysteresis
    field_b_term: rescue is slower than catastrophe — asymmetric switching rates
    note: Predicted by catastrophe theory when switching near the fold versus the cusp
cross_pollination_opportunities:
  - Map the full catastrophe/rescue phase diagram as a function of [tubulin] and temperature to test the catastrophe theory unfolding predictions
  - Apply bifurcation theory to design drugs that shift the system to the monostable growing or shrinking regime (anti-mitotic strategy)
  - Transfer stochastic switching theory (Kramers escape) to model catastrophe frequency as a first-passage time problem
last_reviewed: "2026-05-07"

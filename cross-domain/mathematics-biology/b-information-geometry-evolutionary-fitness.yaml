cross_pollination_opportunities:
  - >
    Natural gradient descent algorithms in deep learning use approximations
    (K-FAC, KFRA) to the Fisher information matrix. Evolutionary biology has
    exact formulas for the Fisher metric in specific population models. The two
    fields can exchange exact analytical solutions to benchmark machine learning
    approximations.
  - >
    The information-geometric speed limit on adaptation predicts the maximum
    rate of evolutionary response to rapidly changing environments. This gives
    a quantitative criterion for whether a population can track climate change:
    if the rate of environmental change exceeds the Fisher information bound,
    extinction is unavoidable regardless of genetic variance.
  - >
    Recombination as projection onto the linkage equilibrium submanifold
    (Ay et al. 2017) gives a geometric interpretation of why sexual reproduction
    accelerates adaptation. Machine learning analogs (batch normalization as
    projection, dropout as manifold regularisation) can be tested for equivalent
    convergence speedup.
communication_gap: >
  Amari's information geometry literature (IEEE Transactions on Information
  Theory, Neural Computation) and Shahshahani's work (American Mathematical
  Society Memoirs) are published in completely disjoint communities. Population
  geneticists rarely read the machine learning or differential geometry
  literature. The Frank (2012) synthesis was published in the Journal of
  Evolutionary Biology and has not been widely adopted in either statistics or
  machine learning. The notation difference — statisticians use Fisher
  information I, biologists use additive genetic variance V_A — masks the
  formal identity.

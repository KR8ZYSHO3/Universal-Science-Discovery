cross_pollination_opportunities:
  - >
    The Jones polynomial (1984), discovered in pure knot theory, was initially
    computed algorithmically. DNA knot type determination by gel electrophoresis
    provides a biochemical "computer" for evaluating knot invariants — the electrophoresis
    pattern encodes polynomial information. This connection has been used to infer
    topoisomerase mechanism (whether they pass strands or change twist) from the
    pattern of knot types they produce. Conversely, new knot invariants (Khovanov
    homology, HOMFLYPT polynomial) could potentially distinguish DNA knot types
    not separable by Alexander polynomial or electrophoresis.
  - >
    Chromosome architecture in the nucleus is mediated by topoisomerase II and
    cohesin/CTCF-mediated loop extrusion. The 3D genome organisation (Hi-C contact
    maps) reflects the topological state of chromosomal DNA — TAD boundaries coincide
    with topological domain boundaries. Applying topological data analysis (persistent
    homology) to Hi-C contact maps could detect topological domain structure beyond
    what pairwise contact frequency captures.
  - >
    Topoisomerase inhibitors (camptothecin → topotecan, irinotecan; etoposide) are
    major cancer chemotherapy agents. They work by trapping the topoisomerase-DNA
    complex in the cleavage state, creating permanent strand breaks. Understanding
    the knot topology of cancer cell DNA (which may be more highly knotted due to
    replication stress) could identify new targeting strategies.
communication_gap: >
  Knot theory developed as pure mathematics from the 1920s (Alexander) through the
  1980s (Jones polynomial, Thurston geometrization). The connection to DNA was
  discovered by molecular biologists in the 1970s (Crick 1976, Wang 1971) who
  needed the concept of linking number; algebraic topology tools arrived in
  biology much later. Topologists and molecular biologists publish in completely
  different journals (J Knot Theory vs. PNAS, Mol Cell). The Jones polynomial was
  discovered in 1984; its relationship to DNA electrophoresis patterns was explored
  by biophysicists (Vologodskii) but is not widely known in the mathematical
  topology community.

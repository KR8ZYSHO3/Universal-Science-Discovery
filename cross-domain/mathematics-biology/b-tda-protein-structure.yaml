cross_pollination_opportunities:
  - >
    Protein engineering: designing enzymes with desired cavity topology
    by optimizing Betti number profiles across length scales — TDA as a
    structure-function design tool rather than just an analysis tool.
  - >
    Cryo-EM structure comparison: persistent homology provides a natural
    metric for comparing structures from cryo-EM density maps at different
    resolutions without requiring full atomic model building.
  - >
    Drug discovery: TDA-based screening of protein family members for
    tunnel topology that enables or excludes specific ligand scaffolds,
    identifying cryptic binding sites without molecular dynamics simulations.
communication_gap: >
  Topological data analysis was developed in pure mathematics (Edelsbrunner,
  Carlsson, Zomorodian) in a computational geometry context. Structural biologists
  trained in X-ray crystallography and cryo-EM have limited exposure to algebraic
  topology. The first cross-disciplinary papers (Xia & Wei 2014, Cang & Wei 2017)
  appeared in biomedical engineering journals rather than structural biology
  journals, limiting their uptake by the primary audience.

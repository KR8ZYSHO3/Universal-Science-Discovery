id: b-tda-protein-structure
title: >
  Persistent homology applied to protein atomic coordinates tracks topological features
  (voids, tunnels, loops) across length scales via Betti numbers, providing a
  geometry-independent structural fingerprint that detects allosteric cavities
  and folding intermediates invisible to sequence analysis.
status: established
fields:
  - mathematics
  - topology
  - biology
  - structural-biology
  - computational-biology
bridge_claim: >
  The alpha complex of a protein's atomic coordinates (each atom as a point cloud)
  carries topological information at all length scales simultaneously. Persistent
  homology tracks how topological features — β₀ (connected components), β₁
  (loops/tunnels), β₂ (enclosed voids) — are born and die as the filtration
  parameter ε grows. The resulting persistence diagram is a compact,
  coordinate-free structural fingerprint stable to perturbation (stability theorem:
  bottleneck distance between diagrams ≤ Hausdorff distance between point clouds).
  This allows: (1) classifying protein folding intermediates by their Betti number
  signatures without alignment or sequence homology; (2) identifying allosteric
  tunnels (β₁ features) that control ligand access but are invisible to RMSD or
  sequence analysis; (3) comparing protein families across the tree of life by
  their topological similarity. Cang & Wei (2017) achieved state-of-the-art
  protein–ligand binding affinity prediction using only persistent homology
  features — no force field, no structural alignment. The birth-death persistence
  pairs directly correspond to structurally important cavities confirmed by
  crystallography.
translation_table:
  - field_a_term: simplicial filtration (alpha complex at radius ε)
    field_b_term: protein structure at a given resolution length scale
    note: growing ε reveals progressively coarser structural features
  - field_a_term: β₀ (number of connected components)
    field_b_term: number of disconnected structural domains at scale ε
  - field_a_term: β₁ (number of independent loops/tunnels)
    field_b_term: tunnels and channels through protein structure (allosteric access paths)
  - field_a_term: β₂ (number of enclosed voids)
    field_b_term: internal cavities and hydrophobic cores
  - field_a_term: persistence diagram (birth–death pairs)
    field_b_term: multi-scale structural fingerprint of the protein
  - field_a_term: bottleneck distance between diagrams
    field_b_term: structural dissimilarity metric independent of alignment

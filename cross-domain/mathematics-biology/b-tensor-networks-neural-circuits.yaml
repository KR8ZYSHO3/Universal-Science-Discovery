cross_pollination_opportunities:
  - "Use tensor network methods to compress large language model weight tensors, reducing memory and compute while preserving expressibility"
  - "Apply DMRG-inspired algorithms to identify the minimum-rank synaptic connectivity that reproduces observed neural dynamics in recurrent circuits"
  - "Leverage the equivalence between quantum circuit simulation and tensor contraction to design neuromorphic hardware architectures that efficiently implement attention"

communication_gap: >
  Quantum information scientists developing TN methods (White, Vidal, Cirac) and
  neuroscientists studying neural population dynamics (Cunningham, Yu, Shenoy) have
  developed parallel low-rank decomposition methods without substantial cross-
  citation. The machine learning community independently rediscovered tensor methods
  for neural network compression. The Levine et al. (2019) paper explicitly connecting
  deep networks and TNs has begun bridging quantum physics and ML communities but
  remains largely unknown to systems neuroscientists.


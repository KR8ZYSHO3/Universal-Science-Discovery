cross_pollination_opportunities:
  - >
    Computational chemistry (molecular dynamics of SNARE complex zippering)
    could predict the effects of botulinum toxin (SNARE cleavage) at the
    residue level — enabling rational design of SNARE-mimetic peptides as
    novel analgesics without botulinum toxicity.
  - >
    Cryo-EM structures of GABA-A receptor in complex with benzodiazepines
    (now available at ~2Å resolution) combined with molecular dynamics
    provide a quantitative energy landscape for allosteric modulation —
    enabling structure-based design of novel anxiolytics with fewer side effects.
communication_gap: >
  Neuroscience and chemistry interact at the pharmacology interface but often
  superficially. Neuroscientists typically learn receptor pharmacology phenomenologically
  (dose-response curves, agonist/antagonist), while physical chemists and
  biochemists develop the thermodynamic/kinetic theory without knowing the
  neurobiological context. Drug discovery companies bridge these fields but
  proprietary research withholds mechanistic insights from academia. The
  Südhof Nobel Lecture (2013) is an exception — a neuroscientist presenting
  the full physical chemistry of vesicle fusion.

id: b-neurogenesis-growth-factor-signaling
title: >
  Adult hippocampal neurogenesis (~700 new neurons/day in humans) is regulated by
  BDNF-TrkB, VEGF, and IGF-1 signaling cascades activated by exercise — providing
  the neurochemical mechanism for exercise antidepressant effects and SSRI-dependent
  neurogenesis hypothesis of depression.
status: established
fields:
  - neuroscience
  - chemistry
  - molecular-biology
  - pharmacology
  - psychiatry
bridge_claim: >
  Adult neurogenesis — the production of new neurons from neural stem cells in the
  adult brain — occurs in two primary niches: the subgranular zone (SGZ) of the
  hippocampal dentate gyrus and the subventricular zone (SVZ) feeding the olfactory
  bulb. Spalding et al. (2013) used radiocarbon ¹⁴C dating of genomic DNA (exploiting
  the ¹⁴C pulse from atmospheric nuclear tests) to establish that ~700 new neurons
  are added per day to the adult human hippocampus (hippocampal neuron turnover
  rate ≈ 1.75% per year). This finding remains contested (Sorrells et al. 2018
  found no proliferating cells in adult human hippocampus by immunohistochemistry),
  with methodological differences (tissue fixation, antibody sensitivity) not yet
  fully resolved.

  Growth factor signaling cascade: BDNF (brain-derived neurotrophic factor)
  binds TrkB (tropomyosin receptor kinase B) → receptor dimerization →
  autophosphorylation → activation of PI3K-Akt (pro-survival, inhibits apoptosis)
  and MAPK-ERK (proliferation, differentiation). BDNF signaling is required for
  LTP maintenance and dendritic branching. VEGF (vascular endothelial growth factor)
  drives both angiogenesis and neurogenesis simultaneously — both processes require
  vascular niche support. IGF-1 (insulin-like growth factor 1) crosses the blood-
  brain barrier during exercise and acts through IGF-1R → PI3K-Akt, synergizing
  with BDNF.

  Exercise-neurogenesis-antidepressant cascade: aerobic exercise (running) increases
  hippocampal BDNF expression (Neeper et al. 1995), VEGF (Fabel et al. 2003),
  and IGF-1 (Trejo et al. 2001) — all through lactate-HIF-1α signaling and muscle-
  derived myokines. These growth factors increase SGZ neurogenesis (measured by BrdU
  labeling → NeuN+ mature neurons). Ablating SGZ neurogenesis (X-irradiation or
  inducible transgenic approaches) blocks the antidepressant effects of both
  exercise and SSRIs in mouse models.

  Neurogenesis hypothesis of depression (Castrén 2004): SSRIs (fluoxetine,
  sertraline) require 2-3 weeks for antidepressant effect — the same timescale
  as new neuron maturation and integration into hippocampal circuits. Acute
  serotonin elevation alone does not explain the delay. SSRIs increase BDNF
  expression and SGZ neurogenesis; the behavioral effect requires new neuron
  integration. This explains why neurogenesis inhibition blocks SSRI efficacy
  in mice — though the human evidence remains indirect.
translation_table:
  - field_a_term: BDNF-TrkB kinase signaling (neurotrophin receptor cascade)
    field_b_term: tyrosine kinase receptor → intracellular second messenger cascade
  - field_a_term: PI3K-Akt pathway (pro-survival, anti-apoptotic)
    field_b_term: phosphoinositide kinase cascade controlling cell fate
  - field_a_term: MAPK-ERK pathway (proliferation, differentiation)
    field_b_term: mitogen-activated kinase cascade for cell cycle entry
  - field_a_term: BrdU (bromodeoxyuridine) labeling of dividing cells
    field_b_term: pulse-chase experiment to track newly synthesized DNA
  - field_a_term: ¹⁴C retrospective birth dating (Spalding method)
    field_b_term: radiocarbon isotope pulse-chase at population level
  - field_a_term: SSRI-induced BDNF increase → neurogenesis → antidepressant
    field_b_term: pharmacological target (5-HT transporter) → downstream growth factor cascade
  - field_a_term: exercise lactate → HIF-1α → BDNF/VEGF upregulation
    field_b_term: metabolic signaling (oxygen-sensing pathway) → growth factor gene expression

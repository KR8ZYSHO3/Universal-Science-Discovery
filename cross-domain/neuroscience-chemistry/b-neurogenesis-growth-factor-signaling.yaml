cross_pollination_opportunities:
  - >
    The contested human neurogenesis data (Spalding vs. Sorrells) requires collaboration
    between forensic radiocarbon specialists, neuropathologists with access to fresh
    (not fixed) post-mortem tissue, and immunohistochemists optimizing antigen
    retrieval for DCX (doublecortin) in human tissue. Resolving this controversy
    requires methodological standardization across labs — a challenge requiring
    neuroscientists, chemists (isotope measurement), and pathologists working on a
    shared tissue bank with blinded analysis.
  - >
    BDNF mimetics (small molecules activating TrkB without BDNF itself) are under
    development as antidepressants with potentially faster onset than SSRIs
    (bypassing the neurogenesis requirement if direct TrkB activation is sufficient
    for LTP without new neurons). Organic chemists designing TrkB agonists need
    quantitative behavioral neuroscientists to validate that chemical TrkB activation
    produces the same circuit-level effects as BDNF in depression models.
communication_gap: >
  Adult neurogenesis research spans molecular biology (growth factor signaling,
  published in Cell, J Neurosci), behavioral neuroscience (depression models,
  published in Neuropsychopharmacology, Biol Psychiatry), and psychiatry (clinical
  antidepressant trials, published in NEJM, Lancet Psychiatry). Basic scientists
  identifying BDNF-TrkB signaling pathways rarely engage with clinical trial design.
  Psychiatrists designing SSRI trials are largely unaware of the mechanistic
  neurogenesis literature. The radiocarbon dating method for neurogenesis (Spalding)
  requires expertise in accelerator mass spectrometry (AMS) that no single neuroscience
  lab possesses — creating a bottleneck in the most direct test of human neurogenesis.

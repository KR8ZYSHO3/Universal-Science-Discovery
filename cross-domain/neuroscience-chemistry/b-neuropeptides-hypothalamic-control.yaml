id: b-neuropeptides-hypothalamic-control
title: "Neuropeptides and Hypothalamic Control — leptin, GLP-1, AgRP/POMC circuits, oxytocin, and vasopressin integrate energy homeostasis with social and reproductive behaviour"
status: established
fields:
  - neuroscience
  - endocrinology
  - biochemistry
  - pharmacology
  - behavioural-neuroscience

bridge_claim: >
  The hypothalamus integrates autonomic, endocrine, and behavioural functions through
  neuropeptide signalling circuits. Energy homeostasis centres on the arcuate nucleus
  (ARC): AgRP/NPY neurons (orexigenic — stimulate feeding) and POMC/CART neurons
  (anorexigenic — suppress feeding) form a push-pull circuit regulated by peripheral
  hormonal signals. Leptin (Zhang et al. 1994): encoded by the ob gene, synthesised
  by adipocytes in proportion to fat mass, crosses the blood-brain barrier and
  activates LEPR-b receptors on ARC neurons — activating POMC and inhibiting AgRP/NPY
  to reduce food intake and increase energy expenditure. ob/ob mice lack leptin and
  are massively obese; leptin replacement normalises body weight. Human common obesity
  is largely leptin-resistant (elevated leptin, blunted signalling). Glucagon-like
  peptide-1 (GLP-1): released from intestinal L-cells post-meal, activates
  GLP-1 receptors on pancreatic β-cells (insulin secretion) and hypothalamic/
  brainstem neurons (satiety). GLP-1 receptor agonists (semaglutide/Ozempic,
  liraglutide/Saxenda) achieve 15–20% body weight reduction in clinical trials
  (SELECT trial 2023). Oxytocin (paraventricular nucleus, PVN): a nonapeptide
  (CYIQNCPLG) released into circulation (lactation, parturition) and centrally
  (trust, social bonding, pain modulation) — the social neuropeptide. Vasopressin
  (arginine vasopressin/ADH, supraoptic nucleus): antidiuretic hormone controlling
  water retention; also mediates social memory and pair bonding in prairie voles via
  V1aR receptor distribution (Lim & Young 2006). Neuropeptides operate on slower
  timescales (seconds–hours) than classical neurotransmitters (ms) and act via volume
  transmission rather than synapse-to-synapse, modulating circuit gain globally.

translation_table:
  - field_a_term: "leptin (ob gene product, adipokine)"
    field_b_term: "adiposity signal reporting fat stores to hypothalamic energy circuits"
    note: "Leptin acts as a proportional signal: ob/ob mice (no leptin) eat ad libitum and reach 3× normal body weight"
  - field_a_term: "AgRP/NPY neurons (arcuate nucleus orexigenic)"
    field_b_term: "hunger-promoting circuit activated by fasting and ghrelin"
    note: "Optogenetic activation of AgRP neurons triggers immediate food seeking; ablation causes fatal anorexia"
  - field_a_term: "POMC → α-MSH (melanocortin)"
    field_b_term: "satiety signal acting on MC3R/MC4R in hypothalamus"
    note: "MC4R mutations cause monogenic obesity; α-MSH agonists (setmelanotide) are approved for MC4R-pathway obesity"
  - field_a_term: "GLP-1 receptor agonist (semaglutide)"
    field_b_term: "pharmacological mimicry of post-meal satiety signal"
    note: "Once-weekly semaglutide injection achieves 15–20% weight loss; dual GLP-1/GIP agonist (tirzepatide) achieves ~22%"
  - field_a_term: "oxytocin (PVN nonapeptide)"
    field_b_term: "social bonding, trust, and pain modulation neuromodulator"
    note: "Intranasal oxytocin increases trust in economic games; reduces social anxiety in autism trials (modest effect)"
  - field_a_term: "vasopressin V1aR receptor distribution (species-specific)"
    field_b_term: "molecular basis of monogamous vs. promiscuous mating strategies in voles"
    note: "Lim & Young: V1aR transfer to ventral forebrain of promiscuous meadow vole induces partner preference — receptor distribution, not peptide, determines behaviour"


cross_pollination_opportunities:
  - >
    RMT cross-correlation analysis of financial markets (Laloux et al. 1999) uses
    GOE bulk spectrum to identify genuine correlations versus noise — a direct
    transfer of nuclear physics statistical methods to quantitative finance.
  - >
    The Riemann-zeros/GUE connection suggests that number-theoretic methods
    (L-functions, automorphic forms) could provide new tools for analyzing
    quantum chaotic spectra, and vice versa — a program actively pursued by
    Keating, Snaith, and collaborators.
communication_gap: >
  Random matrix theory originated in nuclear physics (Wigner, Dyson, Mehta),
  developed its own mathematical community (free probability, Wishart matrices
  in statistics), and was independently adopted in quantum chaos without full
  cross-citation. Number theorists studying Riemann zeros are rarely in
  communication with quantum chaos physicists, despite the GUE connection.
  The SYK/black-hole connection is very recent and still being absorbed by
  condensed matter physicists.

id: b-random-matrix-quantum-chaos
title: >
  The Bohigas-Giannoni-Schmit conjecture (1984) states that energy level statistics
  of quantum systems with chaotic classical dynamics follow Gaussian Orthogonal
  Ensemble (GOE) random matrix statistics, proved for specific systems via
  Sieber-Richter pairs of correlated periodic orbits, unifying quantum chaos,
  nuclear physics, and the Riemann zeta function zeros.
status: established
fields:
  - physics
  - quantum-mechanics
  - mathematics
  - random-matrix-theory
  - chaos-theory
  - number-theory
bridge_claim: >
  The Bohigas-Giannoni-Schmit (BGS) conjecture (1984): the nearest-neighbor level
  spacing distribution of quantized chaotic Hamiltonians follows the Gaussian
  Orthogonal Ensemble (GOE). The Wigner surmise P(s) = (πs/2)exp(-πs²/4) shows
  level repulsion — P(0)=0, unlike the Poisson distribution P(s)=exp(-s) of
  integrable systems. The physical mechanism was identified by Sieber & Richter
  (2001): contributions from pairs of almost-identical periodic orbits related by
  a time-reversal crossing. Müller et al. (2004) extended this to a diagrammatic
  expansion reproducing all terms of random matrix theory. Applications span three
  decades: nuclear energy levels (original motivation), quantum dots (universal
  conductance fluctuations via RMT), mesoscopic electron transport, and the
  Sachdev-Ye-Kitaev (SYK) model of holographic black holes. Montgomery's (1973)
  conjecture: the Riemann zeros follow GUE (Gaussian Unitary Ensemble, for
  time-irreversible systems) — suggesting an undiscovered quantum Hamiltonian
  whose spectrum is the Riemann zeros.
translation_table:
  - field_a_term: quantum energy levels of a chaotic Hamiltonian
    field_b_term: eigenvalues of a random matrix from GOE
    note: BGS conjecture — the correspondence holds for all locally chaotic classical limits
  - field_a_term: Wigner surmise level repulsion P(0)=0
    field_b_term: vanishing density of states at zero level spacing in GOE
    note: reflects anti-bunching analogous to fermion statistics in the level gas
  - field_a_term: Sieber-Richter correlated orbit pairs
    field_b_term: leading non-diagonal contribution in the periodic orbit sum
    note: pairs have same action and nearly identical trajectories linked by time-reversal
  - field_a_term: Poisson statistics of integrable system levels
    field_b_term: uncorrelated (GUE eigenvalue level statistics require chaos)
    note: absence of avoided crossings in integrable systems — levels can cross freely
  - field_a_term: SYK model all-to-all random interactions
    field_b_term: random matrix Hamiltonian at large N
    note: SYK saturates the MSS chaos bound and is holographically dual to JT gravity
related_unknowns:

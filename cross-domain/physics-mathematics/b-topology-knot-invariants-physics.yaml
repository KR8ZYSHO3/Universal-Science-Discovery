id: b-topology-knot-invariants-physics
title: >
  Wilson loops in Chern-Simons gauge theory equal Jones polynomial knot invariants
  (Witten 1989) — the expectation value ⟨W(C)⟩ of the Wilson loop along closed curve C
  computes the Jones polynomial of knot C, giving a physical interpretation of purely
  mathematical knot invariants as partition functions of topological quantum field theories.
status: established
fields:
  - physics
  - mathematics
  - topology
  - quantum-field-theory
  - knot-theory
bridge_claim: >
  Witten (1989) showed that the partition function of SU(2) Chern-Simons theory on a
  3-manifold M equals the Jones polynomial V_K(q) of a knot K = C embedded in M, where
  q = exp(2πi/(k+2)) and k is the Chern-Simons coupling. The Wilson loop operator
  W_R(C) = Tr_R P exp(i∮_C A) computes the holonomy of the gauge connection around C
  in representation R; its expectation value ⟨W_R(C)⟩ in the quantum theory gives the
  colored Jones polynomial in representation R. This connects: DNA topology (topoisomerase
  enzymes perform topological surgery equivalent to Reidemeister moves; DNA supercoiling
  is measured by the writhe and twist invariants); polymer physics (ring polymer entanglement
  number computed by the Alexander polynomial); and anyonic quantum computing (non-Abelian
  anyons in ν=5/2 fractional quantum Hall systems braid to perform quantum gates, with
  gate fidelity = Jones polynomial evaluation).
translation_table:
  - field_a_term: Chern-Simons action S = (k/4π)∫Tr(A∧dA + (2/3)A∧A∧A)
    field_b_term: Jones polynomial V_K(t) via skein relation
    note: physical coupling k corresponds to variable t = exp(2πi/(k+2)) in the polynomial
  - field_a_term: Wilson loop W_R(C) = Tr_R P exp(i∮A)
    field_b_term: knot invariant associated to framing of K in representation R
    note: different representations R give different colored Jones polynomials
  - field_a_term: topological quantum field theory (no local degrees of freedom)
    field_b_term: topological invariant (independent of metric, depends only on topology)
    note: both objects are metric-independent — the fundamental reason the connection works
  - field_a_term: anyonic braiding in quantum Hall state
    field_b_term: braid group representation → quantum gate
    note: topological quantum computing encodes gates as knot invariant computations

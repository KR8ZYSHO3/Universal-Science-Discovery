cross_pollination_opportunities:
  - >
    Topological quantum computing: Microsoft's Station Q program designs quantum gates
    as anyonic braid operations whose output is a knot invariant evaluation. Physical
    implementation requires Majorana fermions in topological superconductors — the
    physics-mathematics bridge is the literal computational mechanism.
  - >
    DNA topoisomerases perform topological surgery (strand crossing changes) equivalent
    to computing the change in linking number Lk = Wr + Tw. Knot-theoretic analysis
    of DNA replication intermediates predicts the enzyme action required to untangle
    replicated chromosomes — a direct application of mathematical knot theory to biology.
communication_gap: >
  Knot theory developed in pure mathematics departments (Jones, Thurston, Freedman)
  completely unaware of gauge theory. Witten's 1989 paper bridging the fields required
  understanding two expert literatures. Atiyah (1990) wrote The Geometry and Physics
  of Knots specifically to make this connection accessible to mathematicians.
  Topological quantum computing groups in condensed matter physics cite knot theory
  papers rarely, despite computing Jones polynomials by design.

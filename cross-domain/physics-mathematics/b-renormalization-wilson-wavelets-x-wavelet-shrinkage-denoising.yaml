id: b-renormalization-wilson-wavelets-x-wavelet-shrinkage-denoising
title: >
  Wilson’s renormalization group coarse-grains microscopic fluctuations into fixed-point long-distance physics — Mallat’s multiresolution analysis and orthogonal wavelets implement dyadic scale separation analogous to integrating out shells in momentum space — soft-threshold wavelet denoising discards small coefficients interpreted as “irrelevant” detail at fine scales, mirroring RG irrelevant directions without repeating the established RG×deep-learning bridge elsewhere in the catalog.
status: established
fields:
  - physics
  - mathematics
  - statistics
bridge_claim: >
  Wavelet bases supply a mathematically controlled hierarchical decomposition of L² signals; Wilson/Kadanoff coarse-graining removes degrees of freedom whose statistical influence shrinks under rescaling — thresholding Gaussian noise in an orthogonal wavelet domain (Donoho–Johnstone) realizes an operational discard of fine-scale modes comparable in spirit (not identity) to projecting onto relevant operators — complementing but distinct from neural-network RG mappings already documented under `b-renormalization-group-x-machine-learning`.
translation_table:
  - field_a_term: Integrating out high-k modes in RG transformation
    field_b_term: Orthogonal wavelet decomposition high-frequency subbands
    note: Both organize fluctuation degrees of freedom by spatial scale.
  - field_a_term: Irrelevant operators under RG flow
    field_b_term: Wavelet coefficients shrunk toward zero by universal threshold rules
    note: Information discarded when statistically negligible at macroscopic observables.
  - field_a_term: Wilson fixed point / universality class
    field_b_term: Minimax optimal estimator class under Besov smoothness priors
    note: Optimality statements live on different mathematical foundations but share multiscale vocabulary.
communication_gap: >
  Mathematical statistics treats thresholding as minimax decision theory; Wilsonian RG grew from quantum/statistical field theory — wavelets became the lingua franca linking harmonic analysts and signal processors but rarely appear in RG textbooks alongside diagrammatic formalism.
cross_pollination_opportunities:

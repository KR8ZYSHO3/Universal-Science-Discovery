id: b-statistical-mechanics-information-theory
title: "Statistical Mechanics and Information Theory — Boltzmann entropy and Shannon entropy are formally identical; Jaynes maximum entropy derives equilibrium, Landauer links erasure to thermodynamics"
status: established
fields:
  - physics
  - mathematics
  - information-theory
  - thermodynamics
  - statistical-mechanics

bridge_claim: >
  The Boltzmann entropy S = k_B ln W and Shannon entropy H = −Σpᵢ log pᵢ are
  mathematically identical after substituting k_B and adjusting the logarithm base.
  Boltzmann counts microstates W consistent with a macrostate; Shannon measures
  uncertainty over a probability distribution — both quantify missing information
  about a system's microstate. Jaynes (1957) formalised this by deriving the
  canonical ensemble from the maximum entropy principle: the equilibrium distribution
  P(Eᵢ) ∝ e^{−βEᵢ} uniquely maximises H subject to the constraint ⟨E⟩ = U.
  The partition function Z = Σ e^{−βEᵢ} is the moment-generating function of the
  energy distribution: −∂ln Z/∂β = ⟨E⟩, and higher cumulants give fluctuations.
  Mutual information I(X;Y) = H(X) − H(X|Y) quantifies statistical correlations
  between two systems — formally equivalent to the free energy difference between a
  correlated and an uncorrelated system. The fluctuation-dissipation theorem
  (Callen & Welton 1951) states that equilibrium fluctuations determine linear
  response to perturbation — connecting the same information content measured by
  Shannon entropy to observable transport coefficients. Landauer's principle (1961)
  establishes the thermodynamic cost of information processing: erasing one bit of
  information requires dissipating at least k_BT ln 2 ≈ 3×10⁻²¹ J of heat into the
  environment, directly linking logical irreversibility to the second law. Bennett
  (1973) showed that reversible computation can avoid this cost in principle. Together,
  these results make statistical mechanics a special case of Bayesian inference and
  information theory the language of thermodynamic irreversibility.

translation_table:
  - field_a_term: "Boltzmann entropy S = k_B ln W"
    field_b_term: "Shannon entropy H = −Σpᵢ log pᵢ (with k_B replacing log base)"
    note: "Identical expressions; W = 1/p for uniform distributions gives S = k_B·H·ln2 exactly"
  - field_a_term: "maximum entropy principle (canonical ensemble)"
    field_b_term: "least-biased probability assignment consistent with known constraints"
    note: "Jaynes (1957): thermodynamic equilibrium is the maximum-ignorance distribution given energy conservation"
  - field_a_term: "partition function Z = Σ e^{−βEᵢ}"
    field_b_term: "moment-generating function of the energy distribution"
    note: "All thermodynamic quantities follow from derivatives of ln Z; analogous to the cumulant-generating function in probability theory"
  - field_a_term: "mutual information I(X;Y)"
    field_b_term: "thermodynamic free energy gain from correlations"
    note: "I(X;Y) = F_correlated − F_uncorrelated in units of k_BT; measures usefulness of correlation for prediction"
  - field_a_term: "fluctuation-dissipation theorem"
    field_b_term: "linear response from equilibrium correlations"
    note: "Dissipation (viscosity, conductivity) = equilibrium fluctuations (noise); no additional information needed"
  - field_a_term: "Landauer limit k_BT ln 2 per bit erased"
    field_b_term: "minimum heat dissipated per irreversible logical operation"
    note: "Modern CPUs dissipate ~10⁶ × Landauer limit per operation; near-Landauer operation requires reversible logic gates"


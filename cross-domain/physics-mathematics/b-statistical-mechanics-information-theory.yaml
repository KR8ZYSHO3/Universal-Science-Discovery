cross_pollination_opportunities:
  - "Use maximum entropy methods for Bayesian inference in complex biological systems where the Hamiltonian is unknown (MaxEnt models of neural population activity, protein sequence covariation)"
  - "Explore Maxwell's demon experiments (Toyabe et al. 2010) as direct empirical tests of Landauer's principle — information erasure measured in real colloidal systems"
  - "Apply free-energy principles (Friston) to neuroscience: the brain as an inference engine minimising surprise (free energy), directly connecting statistical mechanics to cognition"

communication_gap: >
  Statistical mechanics and information theory developed in parallel communities
  (Boltzmann/Gibbs in physics; Shannon/Wiener in electrical engineering) using
  similar mathematical structures without substantial cross-citation until Jaynes
  (1957) and later the Maximum Entropy formalism. Many physicists remain unfamiliar
  with the full scope of information-theoretic interpretations of thermodynamics,
  and many information theorists are unaware of how closely their machinery mirrors
  statistical mechanics. The connection to Bayesian inference (thermodynamic free
  energy = Bayesian evidence) remains underappreciated outside specialist communities.


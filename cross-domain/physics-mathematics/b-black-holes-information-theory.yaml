cross_pollination_opportunities:
  - >
    Quantum error correction codes (specifically holographic codes — HaPPY code,
    Bacon-Shor code) are now known to encode quantum information in a manner
    analogous to the holographic duality — the bulk/boundary correspondence of
    AdS/CFT. Quantum computing and quantum gravity researchers developing
    holographic quantum error correcting codes could build fault-tolerant quantum
    computers whose architecture is literally dictated by black hole entropy geometry.
  - >
    The island formula uses quantum extremal surfaces — a concept from the Ryu-Takayanagi
    formula in AdS/CFT (entanglement entropy = minimal area surface in bulk). Applying
    this to de Sitter space (cosmological horizons, more relevant to our universe)
    could resolve the cosmological information paradox and constrain inflationary models.
communication_gap: >
  The information paradox debate spanned quantum gravity (general relativity + QFT),
  quantum information theory, and string theory — three communities with distinct
  mathematical formalisms and publication venues (Phys Rev D, JHEP, Commun Math Phys,
  and arXiv:hep-th). The 2019-2020 resolution via replica wormholes appeared first on
  arXiv in a burst of simultaneous papers by competing groups. Information theorists
  working on quantum error correction (e.g., Preskill's group at Caltech) and
  relativists studying black holes rarely read the same journals, despite the Hayden-
  Preskill (2007) bridge paper showing black holes are fast scramblers.

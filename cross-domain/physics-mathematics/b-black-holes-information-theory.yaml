id: b-black-holes-information-theory
title: >
  Bekenstein-Hawking entropy S_BH = A/4l_P² (area law) and the holographic bound
  connect black hole thermodynamics to information theory; the Page curve and island
  formula (replica wormholes) resolve Hawking's information paradox by showing
  entanglement entropy of radiation follows a unitary Page curve via quantum extremal
  surfaces.
status: established
fields:
  - physics
  - mathematics
  - information-theory
  - quantum-gravity
  - thermodynamics
bridge_claim: >
  Bekenstein (1973) proposed that a black hole of horizon area A carries entropy
  S_BH = kA/4l_P² (in natural units, S_BH = A/4G in Planck units). This is the
  maximum entropy that can be enclosed in a region of space — the holographic bound
  (Bousso 2002): any matter system satisfies S ≤ A/4l_P² where A is the area of the
  enclosing surface. Shannon information theory meets gravity: entropy in bits is
  I = S_BH / (k_B ln 2) = A/(4l_P² ln 2) — a region of space stores one bit of
  information per Planck area (~10^{−70} m²) on its boundary.

  Hawking radiation (1974): quantum field theory in curved spacetime predicts that
  black holes radiate thermally at T_H = ℏc³/(8πGMk_B) via pair production near
  the horizon. As M decreases, T increases — the black hole evaporates. The paradox:
  if Hawking radiation is exactly thermal (mixed quantum state), a pure quantum state
  that formed the black hole evolves to a mixed state → unitarity violation. Information
  apparently destroyed.

  Page curve (1993): if information is preserved (unitarity), the entanglement entropy
  of Hawking radiation S(R) must follow a Page curve — increasing to half-evaporation
  (Page time), then decreasing back to zero as the black hole evaporates completely.
  Hawking's semiclassical calculation gives monotonically increasing S(R) — contradicting
  unitarity for late times.

  Resolution (2019-2020): Penington and Almheiri et al. derived the Page curve using
  the island formula: S(R) = min_{I} {ext[A(∂I)/4G + S_bulk(R ∪ I)]}, where I is an
  "island" region inside or near the black hole included with the radiation in the entropy
  calculation. Islands appear after the Page time and cause the entropy to turn over,
  restoring unitarity. The derivation uses replica wormhole saddle points in the
  gravitational path integral — a connection between information theory, topology change,
  and quantum gravity.
translation_table:
  - field_a_term: Bekenstein-Hawking entropy S_BH = A/4G
    field_b_term: maximum information capacity (bits) stored on a surface of area A
  - field_a_term: Hawking temperature T_H = ℏc³/(8πGMk_B)
    field_b_term: thermal noise temperature of black hole as information channel
  - field_a_term: Page curve (entanglement entropy S(R) vs. evaporation time)
    field_b_term: unitary information recovery curve of any quantum channel
  - field_a_term: island formula quantum extremal surface
    field_b_term: quantum error correction recovery region (entanglement wedge)
  - field_a_term: replica wormhole saddle point in gravitational path integral
    field_b_term: off-diagonal terms in the replica trick for Rényi entropy calculation
  - field_a_term: holographic bound S ≤ A/4l_P²
    field_b_term: "channel capacity bound: information in a region bounded by its surface area"

id: b-topology-condensed-matter-tqft
title: >
  Topological quantum field theory classifies phases of matter by topological invariants
  rather than order parameters, extending Landau's paradigm and explaining the quantised
  conductance of the quantum Hall effect as a Chern number.
status: established
fields:
  - physics
  - mathematics
  - condensed-matter-physics
bridge_claim: >
  Witten's topological quantum field theories (TQFTs, 1988) classify physical systems by
  topological invariants that are robust to any smooth deformation — they cannot change
  without a phase transition. The quantum Hall conductance σ_xy = ne²/h is quantised
  because n is the Chern number: an integer topological invariant of the occupied Bloch
  bands, computable as the integral of the Berry curvature over the Brillouin zone. This
  is the TKNN invariant (Thouless et al. 1982). Topological insulators and superconductors
  are classified by a periodic table of topological phases (K-theory + discrete symmetry
  classes). Anyons in fractional quantum Hall states are described by Chern-Simons gauge
  theory — where knot invariants (Jones polynomial) appear as expectation values of Wilson
  loops. Pure mathematics (topology, K-theory) directly classifies experimental phases of matter.
translation_table:
  - field_a_term: Chern number (first Chern class of Berry bundle)
    field_b_term: Hall conductance quantum n (integer)
    note: n = (1/2π)∮ Ω(k) d²k; topological invariant; robust to disorder
  - field_a_term: topological phase transition
    field_b_term: gap closing in bulk band structure
    note: Topological invariant can only change when the bulk gap closes; protected surface states
  - field_a_term: K-theory classification of vector bundles
    field_b_term: periodic table of topological insulators/superconductors
    note: 10 symmetry classes × 3 spatial dimensions = 30 possible topological phases
  - field_a_term: Chern-Simons TQFT
    field_b_term: fractional quantum Hall state (ν=1/3 Laughlin state)
    note: Effective low-energy theory; quasi-particles are anyons with fractional statistics
related_unknowns:
  - u-topological-insulator-surface-states
related_hypotheses:
  - h-chern-number-tis-robustness
cross_pollination_opportunities:
  - >
    Topological quantum computing: Majorana zero modes at topological superconductor
    defects encode quantum information non-locally, immune to local decoherence.
    Realising fault-tolerant quantum computation by braiding non-Abelian anyons
    requires both the condensed matter physics (finding the right material system)
    and the mathematical TQFT (computing braid group representations for gate operations).
  - >
    Photonic topological insulators: applying band topology to photonic crystal
    waveguides creates topologically protected edge modes for lossless photon
    routing — a direct materials engineering application of TQFT mathematics.
communication_gap: >
  Topology and K-theory are taught in pure mathematics programs; condensed matter
  physics programs rarely teach differential geometry or algebraic topology at the
  depth needed to derive the TKNN invariant. The connection was made by physicists
  (Thouless, Witten) working at the interface, and Nobel recognition (2016) has
  increased awareness but graduate training remains siloed.

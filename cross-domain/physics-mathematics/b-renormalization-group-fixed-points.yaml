cross_pollination_opportunities:
  - >
    Mathematicians developing rigorous renormalization group theory (Gallavotti,
    Bricmont, Kupiainen) using cluster expansion methods could provide convergence
    proofs for the ε-expansion that physicists use as an asymptotic series.
    Connecting constructive QFT methods to the functional RG (Wetterich equation)
    could establish rigorous non-perturbative bounds on critical exponents.
  - >
    Machine learning RG (Mehta-Schwab 2014 correspondence between RG and
    variational autoencoders) could be formalized using the fixed-point language:
    training a deep network is a flow in weight space, and optimal representations
    may correspond to fixed points of a learning-theory RG. This requires
    collaboration between statistical physicists and machine learning theorists.
communication_gap: >
  The RG is published primarily in physics journals (Phys Rev B, Rev Mod Phys,
  Nucl Phys B) using physicists' notation (path integrals, Feynman diagrams) that
  is opaque to most mathematicians. The rigorous mathematical treatment (Balaban,
  Gallavotti, Bricmont) uses constructive field theory methods that are unknown
  to most physicists. The dynamical systems framing of RG fixed points — central
  to the physics community since Wilson — is rarely stated explicitly in mathematics
  textbooks on dynamical systems, despite being a natural application. Funding
  structures separate condensed matter physics from pure mathematics, limiting
  cross-pollination.

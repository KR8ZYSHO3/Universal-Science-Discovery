related_hypotheses:
  - h-adaptive-therapy-percolation-threshold
cross_pollination_opportunities:
  - Oncologists provide longitudinal imaging (DCE-MRI vascular maps); physicists supply percolation models → joint threshold calibration
  - Percolation-derived metrics (giant-component fraction) as a real-time treatment-response biomarker
  - Adaptive dosing protocols derived from optimal percolation-threshold pursuit rather than empirical MTD
communication_gap: >
  Oncology journals rarely cite statistical-physics literature, and vice versa.
  Clinical trials measure tumour volume or survival endpoints, not topological
  graph metrics. The toolchains (MATLAB/Python network libraries vs. medical
  imaging suites) are largely siloed, and grant bodies do not routinely fund
  physics-oncology hybrids.

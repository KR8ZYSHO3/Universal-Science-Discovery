id: b-percolation-oncology
title: >
  Tumor vascular network fragmentation under adaptive therapy maps directly onto
  percolation-threshold transitions studied in statistical physics.
status: proposed
fields:
  - oncology
  - statistical-physics
  - network-science
bridge_claim: >
  When a tumor's blood-supply network is disrupted below its percolation threshold,
  large-scale connectivity collapses and nutrient delivery fails — the same phase
  transition that physicists use to model connectivity in random graphs and porous
  media. Adaptive therapy (cycling drug doses to exploit competitive suppression)
  may be deliberately tuned to keep the network near — but just below — the
  percolation threshold, maximising tumor fragmentation while avoiding full
  drug-resistance selection. Neither oncologists nor physicists have yet jointly
  designed dosing schedules using percolation-threshold mathematics as the
  objective function.
translation_table:
  - field_a_term: bond percolation probability
    field_b_term: vessel patency under treatment pressure
    note: Fraction of edges (vessel segments) still functional
  - field_a_term: giant connected component
    field_b_term: viable tumour vascular core
    note: The dominant connected region supplying nutrients
  - field_a_term: percolation threshold p_c
    field_b_term: minimum viable vascular density
    note: Critical fraction below which nutrient supply collapses
  - field_a_term: cluster size distribution
    field_b_term: isolated tumour micro-regions
    note: Disconnected fragments starved of blood supply
  - field_a_term: renormalisation group
    field_b_term: adaptive dosing schedule optimisation
    note: Multi-scale description of how local drug actions aggregate to global effects
related_unknowns:

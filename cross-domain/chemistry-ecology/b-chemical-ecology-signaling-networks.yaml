id: b-chemical-ecology-signaling-networks
title: Organismal chemical communication (pheromones, allelochemicals, quorum sensing) forms a molecular information network governed by the same channel-capacity mathematics as telecommunications
status: established
fields:
  - chemistry
  - ecology
bridge_claim: >
  Organisms communicate, defend, and cooperate via chemical signals forming a molecular
  information network. Pheromones (insects), allelopathic chemicals (plants inhibiting
  neighbours), and microbial quorum sensing autoinducers constitute a chemical internet with
  definable channel capacity C = B log₂(1 + S/N), where B is the diffusion bandwidth and S/N
  is the signal-to-noise ratio of the chemical gradient in the medium. Optimal chemical signaling
  maximises mutual information between emitter state and receiver response — the same information-
  theoretic objective as Shannon channel coding. The evolutionary optimisation of signal molecule
  properties (volatility, stability, receptor specificity) mirrors engineering optimisation of
  carrier frequency and modulation. The same mathematical framework governs hormone signaling
  in endocrinology and neurotransmitter diffusion in the synaptic cleft.
translation_table:
  - field_a_term: pheromone/autoinducer molecule
    field_b_term: carrier signal / symbol
    note: Chemical identity encodes information; receptor binding is decoding
  - field_a_term: diffusion coefficient D
    field_b_term: channel bandwidth B
    note: Diffusion rate limits the speed of chemical information transmission
  - field_a_term: receptor binding affinity (K_d)
    field_b_term: detector sensitivity / noise floor
    note: Low K_d = high sensitivity; noise floor sets minimum detectable signal
  - field_a_term: quorum-sensing threshold concentration
    field_b_term: decision threshold in hypothesis testing
    note: Binary decision (respond/not respond) based on signal exceeding threshold

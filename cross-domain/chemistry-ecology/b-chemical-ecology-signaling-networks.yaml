cross_pollination_opportunities:
  - Information-theoretic analysis of pheromone communication channel capacity across species
  - Engineer synthetic quorum-sensing circuits with designed channel properties
  - Apply ecological chemical network analysis to endocrine disruptor effects
communication_gap: >
  Chemical ecology and information theory developed independently; ecologists rarely quantify
  communication in bits, and information theorists do not model chemical diffusion channels.
  Shannon's framework was applied to molecular communication only in the 2000s (Akyildiz et al.)
  and rarely extended back to natural chemical ecology.

id: b-neutron-star-nuclear-matter
title: >
  Neutron star interiors at 2-8× nuclear saturation density are the densest
  observable matter in the universe — the equation of state P(ρ) bridges
  nuclear physics (strong force) to astrophysics (compact object structure)
  through the Tolman-Oppenheimer-Volkoff equation, constrained by LIGO/Virgo
  tidal deformability measurements.
status: established
fields:
  - astrophysics
  - nuclear-physics
  - particle-physics
  - gravitational-wave-astronomy
  - condensed-matter-physics
bridge_claim: >
  NEUTRON STAR INTERIOR PHYSICS:
  Nuclear saturation density: ρ₀ = 2.3×10¹⁴ g/cm³. Neutron star core:
  ρ = 2-8ρ₀ — accessible to no terrestrial experiment but observable
  via neutron star structure.

  TOLMAN-OPPENHEIMER-VOLKOFF EQUATION (TOV):
    dP/dr = -G(ρ + P/c²)(M + 4πr³P/c²) / [r²(1 - 2GM/rc²)]

  This GR generalisation of hydrostatic equilibrium connects P(ρ) (nuclear
  physics input) to M(R) (astrophysical observable). Different EOS yield
  different mass-radius relations.

  GRAVITATIONAL WAVE TIDAL CONSTRAINT:
  For a binary neutron star merger (GW170817), LIGO measured tidal
  deformability Λ̃. Tidal deformability:

    Λ = (2/3) k₂ (Rc²/GM)⁵

  where k₂ = tidal Love number (measures how easily the star deforms).
  GW170817 constraint: Λ̃ < 800 at 90% CI → R₁.4 < 13.6 km.

  PHASE TRANSITIONS:
  At high density: quark deconfinement may occur (QCD transition from
  hadronic to quark matter). Strange quark matter hypothesis (Witten 1984):
  strange quark matter more stable than iron — would make neutron stars
  actually strange quark stars.

  MULTIMESSENGER BRIDGE:
  Gravitational waves (LIGO) + X-ray timing (NICER, XMM-Newton) together
  constrain both M and R independently — the most powerful EOS discriminator.
  This bridges nuclear physics predictions to astrophysical observables
  through GR structure equations.
translation_table:
  - field_a_term: equation of state P(rho) (nuclear physics)
    field_b_term: mass-radius relation M(R) (astrophysics)
    note: TOV equation is the mapping — same EOS produces unique M-R curve; different nuclear models produce measurably different R at given M
  - field_a_term: nuclear saturation density rho_0 (nuclear physics)
    field_b_term: neutron star central density reference scale
    note: rho_0 = 2.3×10^14 g/cm^3; neutron star cores reach 2-8 rho_0 — regime inaccessible to Earth labs
  - field_a_term: tidal Love number k2 (GR / astrophysics)
    field_b_term: nuclear compressibility K (nuclear physics)
    note: Stiffer EOS (larger K) → larger R → larger Λ; GW tidal measurement constrains nuclear compressibility
  - field_a_term: quark matter EOS (particle physics / QCD)
    field_b_term: mass gap in M-R curve (astrophysics)
    note: A QCD phase transition at ~3rho_0 would produce a kink in M-R relation detectable with enough neutron star measurements
related_unknowns:
  - u-neutron-star-equation-of-state
  - u-strange-quark-matter-stability
related_hypotheses:
  - h-neutron-star-radius-eos-constraint
cross_pollination_opportunities:
  - Nuclear theory methods (chiral effective field theory) can be directly validated against neutron star radius measurements
  - Lattice QCD calculation of dense matter EOS directly predicts neutron star maximum mass
  - Multimessenger observations constrain both nuclear symmetry energy and neutron star cooling rates simultaneously
communication_gap: >
  Nuclear physicists and astrophysicists work on different aspects of this
  problem. Nuclear theory groups computing EOS do not always have expertise
  in GR structure equations; relativistic astrophysicists computing TOV
  solutions may not deeply know the nuclear physics inputs. The joint analysis
  required for GW inference bridged this gap post-GW170817.

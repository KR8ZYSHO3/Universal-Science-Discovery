cross_pollination_opportunities:
  - "Lithium problem: predicted Li-7/H~5×10⁻¹⁰ exceeds measured values in metal-poor stars by factor ~3 (Spite plateau). Nuclear reaction network solutions show this cannot be resolved by nuclear physics uncertainties alone — new stellar physics or particle physics is required."
  - "Effective number of relativistic species N_eff: additional light particles (sterile neutrinos, dark radiation) alter the expansion rate and BBN timing. The NRN ODE solution is sensitive to N_eff at the 0.1-particle level, constraining extensions to the Standard Model."
communication_gap: >
  Cosmologists who discuss BBN often present it as solved, without engaging
  with the nuclear physics uncertainty propagation through the ODE network.
  Nuclear physicists who measure cross sections at LUNA are not always aware
  of how their uncertainties propagate to primordial abundance predictions.
  The ODE formalism used in BBN codes (PArthENoPE, AlterBBN) is identical to
  that in stellar evolution codes but the communities rarely exchange methods.

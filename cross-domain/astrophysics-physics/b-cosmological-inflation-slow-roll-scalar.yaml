id: b-cosmological-inflation-slow-roll-scalar
title: >
  Cosmological inflation is driven by a slowly rolling scalar field (inflaton) in a de Sitter-like background, generating a nearly scale-invariant power spectrum of primordial density perturbations that directly tests quantum field theory in curved spacetime
status: established
fields:
  - cosmology
  - quantum-field-theory
  - physics
bridge_claim: >
  Inflation occurs when a scalar field φ rolls slowly (φ̈ ≪ 3Hφ̇, V ≫ φ̇²/2) on a nearly flat potential V(φ), maintaining approximate de Sitter expansion (H² ≈ V/3M_pl²); quantum fluctuations of φ during inflation are stretched to superhorizon scales and frozen as classical perturbations, generating a power spectrum P_s(k) ∝ k^(n_s-1) with n_s - 1 = -6ε + 2η (slow-roll parameters ε, η), observable in the CMB temperature anisotropy — bridging the classical ODE dynamics of the inflaton in cosmology with quantum field theory vacuum fluctuations in de Sitter space.
translation_table:
  - field_a_term: "inflaton scalar field φ(t) (cosmology)"
    field_b_term: "scalar quantum field in de Sitter background spacetime (quantum field theory)"
    note: "The inflaton is a quantum field whose vacuum fluctuations seed density perturbations; classically it evolves via the Klein-Gordon equation"
  - field_a_term: "slow-roll condition ε = -Ḣ/H² ≪ 1 (cosmology)"
    field_b_term: "flatness condition on scalar field potential V(φ): (V'/V)² ≪ 16π G (quantum field theory)"
    note: "Slow roll requires the potential to be nearly flat; ε measures deviation from exact de Sitter (ε = 0)"
  - field_a_term: "CMB scalar spectral index n_s ≈ 0.965 (cosmology)"
    field_b_term: "quantum field theory prediction from slow-roll parameters: n_s = 1 - 6ε + 2η (quantum field theory)"
    note: "Planck measurement n_s = 0.965 ± 0.004 constrains the inflaton potential shape via slow-roll parameters"
  - field_a_term: "tensor-to-scalar ratio r (cosmology)"
    field_b_term: "primordial gravitational wave amplitude from quantum gravity fluctuations during inflation (quantum field theory)"
    note: "r = 16ε constrains inflationary energy scale; current bound r < 0.036 rules out many large-field models"
communication_gap: >
  Cosmologists interpret CMB observations as constraints on inflaton models while quantum field theorists study vacuum structure in curved spacetime; the translation between potential V(φ) shape and observable (n_s, r) constraints is well-known in inflationary cosmology but requires QFT in curved spacetime expertise rarely possessed by astronomers.
cross_pollination_opportunities:
  - "Using CMB-S4 measurements of B-mode polarization to detect or rule out primordial gravitational waves from inflation, directly constraining the inflaton energy scale and QFT regime"
  - "Developing swampland conjectures from string theory (V'/V > O(1)/M_pl) as additional constraints on slow-roll inflaton potentials, connecting inflation to quantum gravity"

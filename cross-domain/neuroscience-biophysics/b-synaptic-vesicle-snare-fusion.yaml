id: b-synaptic-vesicle-snare-fusion
title: >
  Synaptic vesicle fusion is mechanically gated by SNARE complex zippering force: the ~20 pN force generated by progressive SNARE assembly drives membrane merger through a series of hemi-fusion intermediates, quantified by single-molecule force spectroscopy and simulated by coarse-grained molecular dynamics
status: established
fields:
  - neuroscience
  - biophysics
bridge_claim: >
  SNARE complex assembly exerts a vectorial mechanical force (~14-20 pN measured by optical tweezers) that overcomes the ~50 kT energy barrier to bilayer fusion; the sequential N-to-C zippering of v-SNARE (synaptobrevin) with t-SNAREs (syntaxin/SNAP-25) is the molecular force transducer converting chemical binding energy into membrane deformation work, directly linking neurotransmitter release kinetics in neuroscience to mechanochemical force generation in biophysics.
translation_table:
  - field_a_term: "synaptic vesicle priming (neuroscience)"
    field_b_term: "SNARE complex partial assembly to force-generating intermediate (biophysics)"
    note: "Primed vesicles have partially assembled SNARE zippers capable of completing fusion on Ca2+ signal"
  - field_a_term: "Ca2+-triggered exocytosis (neuroscience)"
    field_b_term: "synaptotagmin-driven SNARE zippering completion under Ca2+ binding (biophysics)"
    note: "Ca2+ binding to synaptotagmin relieves the clampin effect and completes SNARE zippering"
  - field_a_term: "readily releasable pool size (neuroscience)"
    field_b_term: "number of fully primed SNARE complexes at active zones (biophysics)"
    note: "RRP correlates with SNARE complex number measured by fluorescence correlation spectroscopy"
  - field_a_term: "neurotransmitter release probability (neuroscience)"
    field_b_term: "probability of SNARE-driven membrane fusion per action potential (biophysics)"
    note: "Release probability is determined by SNARE assembly state and Ca2+ sensor affinity"
communication_gap: >
  Neurophysiologists measure release probability electrophysiologically while biophysicists measure SNARE forces with optical tweezers; the quantitative connection between force generation and release probability is rarely made explicit across the two communities.
cross_pollination_opportunities:
  - "Using optical tweezers to measure SNARE zippering force in reconstituted systems and correlating with electrophysiologically measured quantal content"
  - "Applying coarse-grained MD simulations of SNARE zippering to predict how disease mutations (e.g., in syntaxin-1A) alter vesicle fusion rates"

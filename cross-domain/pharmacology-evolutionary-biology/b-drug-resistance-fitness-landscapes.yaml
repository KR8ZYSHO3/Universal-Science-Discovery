id: b-drug-resistance-fitness-landscapes
title: >
  Drug resistance evolution follows paths on fitness landscapes, with the accessibility
  of multi-drug resistance determined by the ruggedness and sign epistasis of the
  landscape, connecting pharmacology to evolutionary biology through the geometry
  of sequence space.
status: established
fields:
  - pharmacology
  - evolutionary-biology
  - biophysics
bridge_claim: >
  The set of all possible resistance mutations forms a fitness landscape in sequence
  space; empirical fitness landscapes for beta-lactamase (TEM-1) and HIV protease
  show rugged landscapes with sign epistasis—where the benefit of a mutation depends
  on background genotype—predicting that multi-drug resistance requires traversal
  of accessible mutational pathways, and that combination therapies designed to close
  all accessible high-fitness paths (collateral sensitivity) can prevent resistance
  evolution, connecting the geometry of fitness landscapes to rational drug combination design.
translation_table:
  - field_a_term: drug resistance mutation (pharmacology)
    field_b_term: fitness-increasing step in sequence space (evolutionary biology)
    note: Each resistance mutation moves the pathogen to a higher-fitness genotype relative to the drug environment
  - field_a_term: minimum inhibitory concentration MIC (pharmacology)
    field_b_term: fitness value at a point in the landscape (evolutionary biology)
    note: Inverse MIC is a proxy for fitness in the drug environment; landscape ruggedness determines resistance accessibility
  - field_a_term: collateral sensitivity (pharmacology)
    field_b_term: sign epistasis creating fitness valleys between resistance genotypes
    note: A mutation conferring resistance to drug A reduces fitness in drug B; exploitable for combination therapy
  - field_a_term: multi-drug resistance (pharmacology)
    field_b_term: accessible path on the fitness landscape through sign-epistatic terrain
    note: Resistance to multiple drugs requires a sequence of accessible (uphill) mutational steps
related_unknowns:
  - u-fitness-landscape-drug-resistance-prediction
related_hypotheses:
  - h-collateral-sensitivity-cycling-drug-resistance
cross_pollination_opportunities:
  - Designing antibiotic cycling regimens based on measured collateral sensitivity networks across clinical resistance mutations
  - Using deep mutational scanning to map fitness landscapes for key drug targets and predict resistance evolution trajectories
communication_gap: >
  Pharmacologists study drug resistance through MIC measurements and clinical outcomes
  while evolutionary biologists develop fitness landscape theory; the quantitative
  mapping between pharmacological parameters (MIC fold-change, cross-resistance
  profiles) and landscape geometry (epistasis, ruggedness) is still not routinely
  used in clinical drug resistance management.
last_reviewed: "2026-05-07"
references:

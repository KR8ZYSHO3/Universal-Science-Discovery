id: b-correlated-electron-systems-hubbard-model
title: >
  The Hubbard model from quantum physics provides the minimal theoretical bridge
  between condensed matter physics and quantum many-body theory: it captures
  the competition between electron kinetic energy (band formation) and on-site
  Coulomb repulsion (Mott localization), explaining the emergence of
  Mott insulators, high-Tc superconductivity, and magnetic ordering.
status: established
fields:
  - condensed-matter-physics
  - quantum-physics
  - strongly-correlated-systems
bridge_claim: >
  The Hubbard Hamiltonian H = -t∑_{<i,j>,σ}(c†_{iσ}c_{jσ} + h.c.) + U∑_i n_{i↑}n_{i↓}
  encodes a competition between kinetic energy (hopping t) and on-site repulsion U.
  The dimensionless ratio U/t determines the phase: U/t << 1 → metallic band behavior
  (Bloch waves, Fermi liquid); U/t >> 1 → Mott insulator (localized electrons,
  Heisenberg antiferromagnet with J = 4t²/U). The half-filled Mott transition at
  U ≈ 2.5W (W = bandwidth) is a quantum phase transition. For cuprate
  superconductors, the slightly doped Mott insulator produces d-wave pairing with
  Tc up to 135 K — an unsolved problem where the Hubbard model is the central
  bridge between many-body quantum theory and observed condensed matter phenomena.
  DMFT (dynamical mean-field theory) provides a non-perturbative solution in d→∞.
translation_table:
  - field_a_term: Mott insulator (condensed matter)
    field_b_term: strongly-localized limit U/t >> 1 of Hubbard model (quantum physics)
    note: Mott insulation arises from on-site Coulomb blockade; band theory incorrectly predicts a metal
  - field_a_term: correlated electron material (condensed matter)
    field_b_term: strongly-correlated quantum many-body system (quantum physics)
    note: Both refer to systems where U/t ≳ 1 and single-particle approximations fail
  - field_a_term: superexchange coupling J = 4t²/U (condensed matter)
    field_b_term: second-order perturbation theory result in U/t >> 1 limit (quantum physics)
    note: The antiferromagnetic Heisenberg model emerges from Hubbard at half-filling and large U
  - field_a_term: spectral weight transfer in Mott transition (condensed matter)
    field_b_term: Hubbard bands and quasiparticle peak in DMFT (quantum physics)
    note: "DMFT captures the three-peak spectral function: lower/upper Hubbard bands + quasiparticle peak"
related_unknowns:
  - u-hubbard-model-high-tc-superconductivity-mechanism
related_hypotheses:
  - h-doped-hubbard-model-sufficient-for-cuprate-superconductivity
cross_pollination_opportunities:
  - Using ultracold fermionic atoms in optical lattices as quantum simulators of the Hubbard model to access regimes inaccessible to classical computation
  - Applying quantum information methods (entanglement entropy, tensor networks) to characterize phases of the Hubbard model
communication_gap: >
  Condensed matter experimentalists studying copper oxides and nickelates and
  quantum many-body theorists solving the Hubbard model share the same Hamiltonian
  but different toolkits (ARPES vs exact diagonalization vs DMFT vs QMC);
  the community is unified around the model but fragmented by method, and the sign
  problem in QMC prevents definitive numerical solutions at low temperature.
last_reviewed: "2026-05-07"

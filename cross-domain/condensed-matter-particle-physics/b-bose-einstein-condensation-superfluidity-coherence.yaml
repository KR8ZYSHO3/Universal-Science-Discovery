cross_pollination_opportunities:
  - Engineering optical lattice systems to simulate high-temperature superconductors using ultracold BEC as quantum simulators
  - Using GP equation physics from ultracold atoms to understand vortex dynamics in neutron star superfluids
communication_gap: >
  Quantum optics / AMO physicists working with ultracold BEC and condensed matter
  physicists studying superfluid helium and superconductors share deep mathematical
  structures (Bogoliubov theory, vortex dynamics) but publish in separate communities;
  the connection was explicit from 1995 when dilute-gas BEC was first achieved.

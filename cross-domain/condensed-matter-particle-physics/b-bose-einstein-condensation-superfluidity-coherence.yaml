id: b-bose-einstein-condensation-superfluidity-coherence
title: >
  Bose-Einstein condensation, predicted by quantum statistics, underlies superfluidity
  in helium-4 and ultracold atomic gases: when bosons macroscopically occupy a single
  quantum state, off-diagonal long-range order and phase coherence produce dissipationless
  flow and quantized vortices.
status: established
fields:
  - quantum-physics
  - condensed-matter-physics
  - low-temperature-physics
bridge_claim: >
  In a BEC, the N-particle wavefunction factorizes: Ψ(r₁,...,rN) ≈ ∏φ₀(rᵢ),
  where φ₀ is the single-particle ground state condensate wavefunction. The
  superfluid order parameter ψ(r) = √(n_s(r))·e^{iθ(r)} (n_s = superfluid density,
  θ = phase) satisfies the Gross-Pitaevskii equation: iℏ∂ψ/∂t = [-ℏ²∇²/2m + V +
  g|ψ|²]ψ. Superfluidity emerges from phase coherence: the superfluid velocity
  v_s = (ℏ/m)∇θ is curl-free except at quantized vortices where ∮v_s·dl = nℏ/m.
  Landau's criterion for superfluidity connects BEC to the quasiparticle dispersion:
  the critical velocity v_c = min[E(p)/p] is nonzero only when the dispersion is
  linear (phononic) at small momenta, bridging statistical quantum mechanics and
  condensed matter transport phenomena.
translation_table:
  - field_a_term: Bose-Einstein condensate (quantum physics)
    field_b_term: superfluid component of helium-4 (condensed matter)
    note: Below Tλ = 2.17 K, the condensate fraction drives the superfluid density
  - field_a_term: macroscopic occupation of ground state (quantum physics)
    field_b_term: off-diagonal long-range order ODLRO (condensed matter)
    note: ODLRO is the rigorous criterion for superfluidity; BEC implies ODLRO in ideal Bose gas
  - field_a_term: condensate wavefunction / order parameter (quantum physics)
    field_b_term: superfluid order parameter ψ(r) (condensed matter)
    note: Same mathematical object; Gross-Pitaevskii equation governs both contexts
  - field_a_term: phase coherence length (quantum physics)
    field_b_term: superfluid coherence length ξ (condensed matter)
    note: ξ sets the size of vortex cores and is inversely related to interaction strength

id: b-general-relativity-differential-geometry
title: General relativity is differential geometry applied to physics — spacetime curvature is the Riemann curvature tensor and gravity emerges from geodesic deviation
status: established
fields:
  - astrophysics
  - mathematics
bridge_claim: >
  Einstein's field equations Gμν + Λgμν = (8πG/c⁴)Tμν express that the curvature
  of spacetime (Einstein tensor Gμν, derived from the Riemann curvature tensor Rμναβ)
  equals the stress-energy content of matter (Tμν). Spacetime is a pseudo-Riemannian
  4-manifold with metric tensor gμν; gravity is not a force but the curvature of this
  manifold. Free-fall trajectories are geodesics (extremal length curves) on the manifold.
  Black holes are regions where geodesics terminate (curvature singularity) enclosed
  by an event horizon (null hypersurface). Gravitational waves are propagating ripples
  in the metric, solutions to linearized Einstein equations. The entire theory is
  Riemann's 1854 differential geometry — developed 61 years before Einstein needed it.
translation_table:
  - field_a_term: metric tensor g_mu_nu
    field_b_term: gravitational potential (generalizes Newtonian phi)
    note: In weak-field limit, g_00 = -(1 + 2phi/c^2), recovering Newtonian gravity
  - field_a_term: geodesic equation (d^2x^mu/dtau^2 + Gamma^mu_alphabeta dx^alpha/dtau dx^beta/dtau = 0)
    field_b_term: equation of motion of a free-falling body
    note: Christoffel symbols Gamma encode the gravitational field; geodesic = free fall
  - field_a_term: Riemann curvature tensor R^alpha_betagammadelta
    field_b_term: tidal gravitational forces (geodesic deviation equation)
    note: Riemann tensor measures how nearby geodesics accelerate toward/away from each other
  - field_a_term: "Bianchi identity (contracted: nabla_mu G^mu_nu = 0)"
    field_b_term: "energy-momentum conservation nabla_mu T^mu_nu = 0"
    note: Mathematical identity in differential geometry encodes physical conservation law
  - field_a_term: Einstein-Hilbert action S = integral (R - 2Lambda) sqrt(-g) d^4x
    field_b_term: variational principle from which Einstein's equations are derived
    note: Riemann scalar curvature R is the Lagrangian density for gravity
related_unknowns:
  - u-phi-measurement-neural-correlates
related_hypotheses:
  - h-gr-gauge-theory-fiber-bundle-unification
cross_pollination_opportunities:
  - >
    Numerical relativity (solving Einstein's equations on supercomputers) requires
    differential geometry discretized on computational grids. The mathematical tools
    of discrete differential geometry (exterior calculus on simplicial complexes,
    Regge calculus) developed for graphics and simulation have direct application to
    numerical GR — a collaboration between computer science and astrophysics.
  - >
    Gauge theory in particle physics (Standard Model) is also differential geometry:
    gauge fields are connections on fiber bundles, and field strength tensors are
    curvature forms. The mathematical unity of gravity and gauge theory (both are
    curvature) points toward quantum gravity unification — a case where the mathematics
    predicts the physics long before experiment.
communication_gap: >
  General relativity requires Riemannian geometry typically taught in graduate mathematics
  programs, while physics curricula often present GR through tensor index notation
  without the underlying differential geometry formalism. Mathematicians who generalize
  Riemannian geometry (sub-Riemannian, Finsler, non-commutative geometry) rarely
  engage with astrophysical applications.
last_reviewed: "2026-05-06"

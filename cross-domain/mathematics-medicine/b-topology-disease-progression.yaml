cross_pollination_opportunities:
  - >
    Persistent homology applied to longitudinal EHR data (sequences of clinical
    events for thousands of patients) can identify topological features of disease
    trajectories — loops (recurrence), branches (disease progression forks),
    and voids — that predict outcomes better than regression on static biomarkers.
  - >
    The Mapper algorithm's success in breast cancer subtype discovery
    (Nicolau et al. 2011) has not been systematically replicated across cancer
    types. A systematic TDA screen across TCGA data for all 33 cancer types
    could identify additional prognostic subgroups with clinical actionability.
  - >
    TDA tools for time-series data (persistent homology of sliding-window
    embeddings) can be applied to patient monitoring data (ICU vitals, continuous
    glucose monitoring) to detect topological changes in physiological dynamics
    that precede adverse events (sepsis onset, hypoglycemia) earlier than
    threshold-based alerts.
communication_gap: >
  Topological data analysis is primarily published in mathematics and computational
  geometry venues (Annals of Mathematics, SIAM Journal on Computing, Foundations
  of Computational Mathematics). Clinical medicine researchers are generally
  unaware of TDA tools beyond PCA and clustering. The Nicolau et al. (2011) PNAS
  paper was widely cited in TDA and bioinformatics but has not led to clinical
  adoption, partly because TDA requires mathematical training not common in medical
  research, and partly because software implementations (Ripser, Gudhi, KeplerMapper)
  have not been packaged with clinical-grade documentation and validation. The
  result is that a powerful set of shape-analysis tools — provably superior to
  clustering for certain data topologies — remains unused in clinical data analysis.

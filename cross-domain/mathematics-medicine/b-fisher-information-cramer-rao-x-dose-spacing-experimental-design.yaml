id: b-fisher-information-cramer-rao-x-dose-spacing-experimental-design
title: >
  Fisher information and the Cramer-Rao bound translate dose-spacing choices in medical experiments into parameter-precision limits: sampling doses where response curves are most informative can reduce uncertainty without increasing participant burden.
status: established
fields:
  - statistics
  - medicine
  - experimental-design
bridge_claim: >
  The bridge connects statistical information geometry to practical dose-ranging design. It supports simulation and design diagnostics, not automatic claims about clinical benefit or ethical acceptability.
translation_table:
  - field_a_term: Fisher information matrix
    field_b_term: expected precision for dose-response parameters
    note: Information is model-dependent.
  - field_a_term: Cramer-Rao lower bound
    field_b_term: minimum achievable estimator variance under assumptions
    note: Violations flag model risk.
  - field_a_term: optimal design criterion
    field_b_term: candidate dose grid and allocation rule
    note: Ethics constraints remain binding.
communication_gap: >
  Biostatisticians use design criteria, while clinicians reason in familiar dose levels and safety margins; the precision bound is rarely visualized.
cross_pollination_opportunities:
  - Add Fisher-information overlays to dose-ranging simulation dashboards.
  - Compare conventional equally spaced dose grids with information-optimal grids under ethical constraints.
related_unknowns:
  - u-dose-spacing-fisher-information-design-trial-calibration
related_hypotheses:
  - h-fisher-optimal-dose-grid-reduces-parameter-variance-simulation
references:
  - doi: "10.1098/rsta.1922.0009"
    note: Fisher (1922) foundational likelihood/statistical estimation paper.
last_reviewed: "2026-05-07"

cross_pollination_opportunities:
  - "Active liquid crystals (bacterial suspensions, cytoskeletal networks): the Frank elastic theory extends to active matter by adding non-equilibrium stress terms, connecting to active matter physics and cell mechanics — topological defects in active nematics act as nucleation sites for cell division."
  - "Liquid crystal displays (LCDs): the Freedericksz transition is the working principle of every LCD pixel; Frank elastic theory predicts the voltage-transmission curve and response time, connecting fundamental soft matter physics to a $100B+ display industry."
communication_gap: >
  Liquid crystal physicists who work with the Frank free energy rarely connect
  to the Landau-Ginzburg field theory literature in condensed matter physics,
  where the same mathematics appears for superconductors (Ginzburg-Landau),
  magnets (Heisenberg model), and other order-parameter systems. The topological
  defect analysis (homotopy groups) is standard in high-energy physics for cosmic
  strings but non-standard in soft matter despite the direct mathematical analogy.

cross_pollination_opportunities:
  - >
    Nonlinear fiber optics as a computational platform: optical soliton propagation
    implements integrable nonlinear dynamics that could be exploited for analog
    computing and reservoir computing. The NLS equation shares mathematical structure
    with the Gross-Pitaevskii equation for Bose-Einstein condensates — connecting
    fiber optics to quantum many-body physics.
  - >
    Space-division multiplexing (SDM) with multi-core and few-mode fibers will
    require coupled-mode theory and MIMO digital signal processing to manage
    inter-modal crosstalk — connecting electromagnetic waveguide physics, nonlinear
    optics, and information theory.
communication_gap: >
  Telecommunications engineers who design WDM systems focus on system margins,
  modulation formats (DP-QPSK, QAM), and DSP; nonlinear fiber optics physicists
  focus on the mathematics of solitons and integrable systems. The engineering
  literature rarely engages with the deep physics of soliton dynamics; the physics
  literature rarely considers the practical constraints of real transmission systems.

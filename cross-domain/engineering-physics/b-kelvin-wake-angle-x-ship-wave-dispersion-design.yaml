id: b-kelvin-wake-angle-x-ship-wave-dispersion-design
title: >
  Kelvin wake patterns behind ships translate water-wave dispersion relations into naval-engineering design constraints: the observed wake angle reflects phase/group-velocity geometry, hull speed, finite-depth effects, and non-asymptotic near-field structure.
status: established
fields:
  - fluid-mechanics
  - naval-engineering
  - physics
bridge_claim: >
  The bridge connects textbook wave dispersion to practical wake interpretation. It should not be reduced to a universal 19.47 degree angle because modern observations show speed, hull geometry, and finite-depth regimes can narrow or distort the apparent wake.
translation_table:
  - field_a_term: gravity-wave dispersion relation
    field_b_term: ship-wave phase and group wake geometry
    note: Dispersion sets the wedge geometry.
  - field_a_term: Froude number
    field_b_term: hull-speed scaling parameter
    note: Speed changes apparent wake angle.
  - field_a_term: finite-depth correction
    field_b_term: shallow-water wake spreading or narrowing
    note: Bathymetry changes the transfer.
communication_gap: >
  Naval engineers often use empirical resistance and wake models, while physics education emphasizes ideal Kelvin wedges.
cross_pollination_opportunities:
  - Use modern aerial wake imagery to teach dispersion geometry and Froude scaling.
  - Benchmark hull-design simulators against analytic Kelvin-wake and finite-depth limits.
related_unknowns:
  - u-finite-depth-kelvin-wake-angle-design-transfer
related_hypotheses:
  - h-dispersion-aware-wake-visualization-improves-hull-wave-interpretation
references:

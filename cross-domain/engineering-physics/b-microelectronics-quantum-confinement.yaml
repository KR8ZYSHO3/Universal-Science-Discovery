id: b-microelectronics-quantum-confinement
title: >
  Sub-10 nm transistor scaling forces quantum confinement effects — tunneling
  leakage, ballistic transport (Landauer formula), and quantum capacitance — into
  the engineering design space, bridging quantum physics with semiconductor device
  engineering at the 3nm node and beyond.
status: established
fields:
  - engineering
  - physics
  - semiconductor-physics
  - quantum-physics
  - materials-science
bridge_claim: >
  Moore's law scaling has brought transistor gate lengths below 10 nm (commercial
  production: TSMC 3nm node, 2022; Intel 20A/18A, 2024), at which quantum
  mechanical effects are no longer negligible perturbations but dominate device
  behavior. Three quantum phenomena define the engineering design challenge:

  (1) Quantum tunneling through gate dielectric: leakage current density
  J ∝ exp(-2d·√(2m*φ_B)/ℏ), where d is dielectric thickness, m* is the
  effective mass, and φ_B is the barrier height. For SiO₂, d is limited to ~1.2 nm
  (3-4 atomic layers) before leakage becomes unacceptable. This drove the transition
  to high-κ dielectrics (HfO₂, κ = 25 vs. SiO₂ κ = 3.9) — a thicker physical
  layer with the same equivalent oxide thickness (EOT), reducing tunneling while
  maintaining gate capacitance.

  (2) Short-channel effects: when gate length L approaches the depletion width,
  the source and drain electrostatics compete with the gate for channel control
  (drain-induced barrier lowering, DIBL). FinFET architecture (Hu et al. 1999)
  uses a 3D silicon fin where the gate wraps three sides — suppressing short-channel
  effects geometrically. Gate-all-around (GAA) nanosheet transistors (Samsung/TSMC
  3nm, 2022) extend this with the gate fully encircling the channel, achieving
  near-ideal electrostatic control.

  (3) Ballistic transport: in short channels (L < mean free path λ_mfp ≈ 10-20 nm
  for Si at 300K), electrons traverse without scattering. The Landauer formula gives
  the maximum conductance: G = (2e²/h)·M·T, where M is the number of conducting
  modes (transverse subbands), T is the transmission probability (T → 1 in ballistic
  limit), and 2e²/h = G₀ ≈ 77.5 µS is the conductance quantum. Ballistic transport
  sets a fundamental upper bound on transistor ON-current independent of material
  mobility — a quantum-mechanical performance ceiling.

  2D materials (MoS₂, WSe₂ FETs with atomic-scale thickness): eliminate the
  short-channel problem by confining the channel to a single monolayer (0.65 nm),
  making the effective oxide thickness comparable to the channel thickness regardless
  of gate geometry. This is currently limited by contact resistance and trap density.
translation_table:
  - field_a_term: quantum tunneling probability T = exp(-2d√(2m*φ)/ℏ)
    field_b_term: gate dielectric leakage current engineering limit
  - field_a_term: Landauer conductance quantum G₀ = 2e²/h = 77.5 µS
    field_b_term: maximum ON-current per conducting channel in nanoscale transistor
  - field_a_term: transmission probability T (Landauer-Büttiker formalism)
    field_b_term: device ON/OFF ratio (transmission near 1 for ON, near 0 for OFF)
  - field_a_term: transverse subband quantization (M modes in nanowire/nanosheet)
    field_b_term: parallel conduction channels in GAA nanosheet transistor
  - field_a_term: quantum capacitance C_Q = e²·DOS (limits gate control at high density)
    field_b_term: intrinsic speed limit of transistor switching at GHz-THz frequencies
  - field_a_term: high-κ dielectric (HfO₂, κ = 25)
    field_b_term: engineering solution to tunnel leakage — thicker physical layer, same EOT
  - field_a_term: 2D material monolayer channel (MoS₂, 0.65 nm thick)
    field_b_term: ultimate short-channel immunity (channel thickness = 1 atomic layer)

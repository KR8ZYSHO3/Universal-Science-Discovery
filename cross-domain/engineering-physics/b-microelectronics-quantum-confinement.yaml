cross_pollination_opportunities:
  - >
    Quantum transport simulations (non-equilibrium Green's function, NEGF method)
    developed by condensed matter physicists for nanoscale devices are not yet
    routinely used in industrial TCAD (technology CAD) tools used by semiconductor
    companies. Bridging the gap between research-level NEGF codes (NEMO5, QTBM)
    and industrial process simulators (Synopsys Sentaurus) requires physicists and
    semiconductor engineers to co-develop computationally efficient quantum transport
    models validated against experimental device characteristics.
  - >
    Topological insulator surface states (TSS) have ballistic conduction protected
    by time-reversal symmetry — T = 1 guaranteed by topology. Using topological
    surface states as transistor channels (topological FETs) could achieve the
    Landauer limit while remaining switch-offable via magnetic gating. This requires
    materials scientists growing topological thin films, device engineers designing
    gate architectures, and condensed matter theorists computing switching mechanisms.
communication_gap: >
  Quantum transport theory (published in Phys Rev B, Nano Lett, using NEGF/Landauer
  formalism) is developed in physics and electrical engineering departments with
  significant overlap at places like MIT, Stanford, and ETH. However, industrial
  semiconductor engineering (published in IEEE Trans Electron Devices, IEDM proceedings)
  focuses on empirical ITRS roadmap metrics and TCAD simulation rather than first-
  principles quantum theory. Academic quantum transport researchers are often unaware
  of the specific constraints (contact resistance, variability, reliability at high
  field) that dominate industrial device design. The Landauer formula is standard
  in mesoscopic physics but not in most electrical engineering curricula.

  - "Elastic metamaterials (seismic cloaking): protect buildings from seismic waves using same transformation mechanics math"
  - "Photonic topological insulators: borrow topological insulator concepts from condensed matter to design unidirectional electromagnetic waveguides"
communication_gap: >
  Veselago's original 1968 paper was ignored for 30 years — published in
  a Soviet physics journal, largely unknown to Western engineers. Pendry's
  2000 perfect lens paper triggered an explosive reconnection between
  electromagnetic theory and materials engineering. Acoustic metamaterials
  researchers and electromagnetic metamaterial researchers still publish
  largely in separate journals.

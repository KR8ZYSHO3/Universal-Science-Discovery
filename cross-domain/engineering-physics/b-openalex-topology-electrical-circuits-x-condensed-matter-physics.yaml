id: b-openalex-topology-electrical-circuits-x-condensed-matter-physics
title: "Topoelectrical circuits realize condensed-matter topological band invariants in controllable RLC networks, where impedance boundary modes map to edge states protected by circuit-symmetry class"
status: proposed
fields:
  - electrical-engineering
  - condensed-matter-physics
  - topology
bridge_claim: >
  Electrical circuit Laplacians can be designed to emulate tight-binding Hamiltonians
  from topological condensed matter. In this mapping, the circuit admittance matrix
  Y(omega) plays the role of an effective Bloch Hamiltonian H(k), and resonant
  impedance peaks at boundaries correspond to topological edge or corner modes.
  This provides a benchtop platform for testing topological phase ideas with
  tunable components, while preserving the core invariants (winding/Chern-like
  structure in the effective band description) used in solid-state systems.
translation_table:
  - field_a_term: "tight-binding Bloch Hamiltonian H(k)"
    field_b_term: "circuit Laplacian / admittance matrix Y(k, omega)"
    note: "Both encode band structure and symmetry-constrained mode spectra under periodic geometry assumptions"
  - field_a_term: "topological edge state"
    field_b_term: "high-impedance boundary resonance mode"
    note: "Protected boundary-localized modes appear as robust impedance signatures at circuit edges/corners"
  - field_a_term: "bulk-boundary correspondence"
    field_b_term: "bulk network topology predicts boundary impedance peaks"
    note: "Nontrivial bulk phase indicators imply measurable localized boundary response"
related_unknowns:
  - u-topoelectrical-circuit-disorder-robustness-limit
related_hypotheses:
  - h-topoelectrical-circuit-edge-mode-disorder-threshold
cross_pollination_opportunities:
  - "Use reconfigurable RLC lattices to rapidly screen candidate topological phases before expensive nanofabrication in quantum materials."
  - "Transfer non-Hermitian and driven-circuit design heuristics back into condensed-matter experiments on dissipation and Floquet control."
communication_gap: >
  Circuit designers often frame results in impedance/network language, while
  condensed-matter groups frame the same structure in Hamiltonian, symmetry class,
  and topological invariant language. The mathematics is close, but publication
  venues and notation conventions keep the communities partially siloed.
last_reviewed: "2026-05-08"
references:
  - arxiv: "1710.03223"
    note: "Lee et al. (2017) Topological correspondence between quantum and electric circuit networks."
  - doi: "10.1103/RevModPhys.82.3045"
    note: "Hasan and Kane (2010) Colloquium on topological insulators."

cross_pollination_opportunities:
  - >
    Reservoir computing (Jaeger & Haas 2004, Maass et al.) harnesses the high-dimensional
    transient dynamics of a recurrent neural network or physical system to perform
    universal computation. Chaotic systems near the edge of chaos (λ₁ ≈ 0) have the
    highest computational power — memory capacity and nonlinear function approximation
    peak at the Hopf bifurcation boundary. Engineering systems could be deliberately
    operated near their Hopf bifurcation threshold to maximise their information
    processing capacity (liquid state machines, neuromorphic computing).
  - >
    Power grid operators use N-1 contingency analysis to ensure that the grid remains
    stable after any single component failure. The Lyapunov-based stability margin
    is a more rigorous safety criterion than N-1: it quantifies how far the grid is
    from the nearest bifurcation boundary in the full nonlinear state space. Computing
    real-time Lyapunov exponents for grid state would give an early warning of
    impending instability minutes before voltage collapse.
  - >
    Chaos synchronisation (Pecora & Carroll 1990) — driving two initially different
    chaotic systems into identical evolution using a unidirectional coupling signal —
    has been demonstrated in Lorenz circuits and laser arrays. Applications to secure
    communications and distributed control (synchronising chaotic clocks) are known
    in principle but not commercially deployed. Rigorous Lyapunov-based stability
    proofs for synchronisation under noisy channels would make the method engineering-
    grade.
communication_gap: >
  Lorenz (1963) published in the Journal of Atmospheric Sciences, not in an
  engineering venue. Control theorists developed stability theory (Lyapunov, Routh-
  Hurwitz) for linear systems; nonlinear control theory integrated chaos theory
  gradually through the 1990s (Strogatz's textbook 1994 was influential). Power grid
  engineers still use linear stability analysis (eigenvalue methods) for most
  applications; the nonlinear bifurcation analysis tools that would give more accurate
  stability boundaries require expertise in dynamical systems theory that most power
  engineers do not have. The gap is maintained by separate publication venues,
  separate training, and the conservatism of safety-critical engineering.

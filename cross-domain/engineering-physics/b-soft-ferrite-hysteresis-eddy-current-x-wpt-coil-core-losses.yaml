cross_pollination_opportunities:
  - Cross-map ferrite datasheets (Steinmetz coefficients) into coupled-mode time-domain co-simulations for Qi interoperability testing.
  - Import magnetic Barkhausen noise diagnostics from NDT to detect microcracking in charger ferrite tiles after thermal cycling.
communication_gap: >
  Ferrite vendors publish core loss curves at sine excitation; WPT systems carry PWM harmonics and spatial bias fields—
  standardized translation to equivalent Q is inconsistent across suppliers.

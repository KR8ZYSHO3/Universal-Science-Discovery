cross_pollination_opportunities:
  - Apply metamaterial resonators (negative permeability) to extend the effective coupling range beyond the 3D dipole scaling
  - Use Tesla's Wardenclyffe Earth-ionosphere resonance concept (Schumann resonances) to explore global power distribution
  - Apply coupled-mode theory formalism from photonics (whispering-gallery resonators) to improve WPT efficiency
  - Investigate biological tissue dielectric properties to design implantable medical device WPT with minimal heating
communication_gap: >
  Electrical engineers designing Qi chargers rarely cite Tesla's 1899 Colorado
  Springs experiments; physicists studying coupled-mode theory rarely discuss
  consumer power electronics. The MIT Witricity 2007 paper bridged the two but
  the historical connection to Tesla's work remains under-acknowledged. Conversely,
  popular accounts of Tesla often describe his wireless power visions without the
  rigorous coupled-mode theory that explains why resonant coupling is efficient.

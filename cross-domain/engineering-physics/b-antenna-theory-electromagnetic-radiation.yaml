id: b-antenna-theory-electromagnetic-radiation
title: >
  All wireless communication reduces to applied Maxwell equations вҖ” the Hertzian
  dipole radiation formula, Friis transmission equation, and phased array beam
  steering follow from Maxwell's equations with the same mathematics as Bragg
  diffraction in crystallography.
status: established
fields:
  - engineering
  - electrical-engineering
  - physics
  - electromagnetism
  - wireless-communications
bridge_claim: >
  The Hertzian dipole (oscillating electric dipole moment p(t) = pвӮҖcos(Пүt)) radiates
  power P = ОјвӮҖПүвҒҙpвӮҖВІ/(12ПҖcВі) вҖ” derived directly from Maxwell's equations via the
  retarded potential formalism. Radiation resistance R_rad = 80ПҖВІ(l/О»)ВІ О© relates
  physical antenna dimensions to radiated power efficiency. The Friis transmission
  equation P_r/P_t = G_t G_r (О»/4ПҖR)ВІ is the exact solution to Maxwell's equations
  for two antennas at distance R, connecting transmitted power P_t to received power
  P_r via gains G. Phased array beam steering: N antennas with phase delays
  ПҶ_n = (2ПҖ/О»)ndВ·sinОё (d = element spacing) produce constructive interference in
  direction Оё вҖ” identically the Bragg diffraction condition for X-ray scattering
  from a crystal lattice (2d sinОё = nО»), both being consequences of the same
  interference of waves from a periodic array. Modern MIMO systems and 5G massive
  MIMO (64вҖ“256 antennas) are phased arrays exploiting spatial multiplexing predicted
  by electromagnetic theory. The effective aperture A_eff = GО»ВІ/4ПҖ relates physical
  aperture to gain вҖ” same as optical aperture-beam divergence relations in wave optics.
  All of wireless engineering вҖ” 5G, Wi-Fi, GPS, radar, satellite communication вҖ”
  is applied Maxwell electrodynamics with antenna theory as the practical interface.

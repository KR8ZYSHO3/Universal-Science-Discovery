cross_pollination_opportunities:
  - >
    Quantum antenna theory: at THz and optical frequencies, quantum electrodynamics
    corrections to classical antenna theory become measurable вҖ” connecting wireless
    engineering to QED at the engineering-physics boundary.
  - >
    Crystallography-inspired array design: directly applying Bragg condition
    analysis tools from X-ray crystallography to optimize antenna array geometries
    for sidelobe suppression вҖ” sharing mathematical toolkits across fields.
  - >
    Metamaterial antennas: using negative-index metamaterial elements (bridge
    u-metamaterial-wave-control) as antenna substrates to achieve electrically
    small antennas beating the Chu-Wheeler limit вҖ” physics enabling new engineering.
communication_gap: >
  Antenna theory developed in electrical engineering departments largely separate
  from physics departments despite being applied electrodynamics. The Bragg
  diffraction connection to phased arrays is known to physicists but rarely
  mentioned in antenna engineering textbooks (Balanis, Mailloux). Similarly,
  condensed matter physicists studying metamaterials and antenna engineers
  designing phased arrays address nearly identical mathematical problems without
  cross-citation.

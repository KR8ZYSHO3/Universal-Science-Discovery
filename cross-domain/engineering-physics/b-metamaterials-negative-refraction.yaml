cross_pollination_opportunities:
  - >
    Acoustic metamaterials (negative effective mass density and negative bulk
    modulus) are the mechanical analogue of electromagnetic metamaterials with
    negative ε and μ. The transformation optics formalism maps directly to
    transformation acoustics — acoustic cloaks, negative-refraction acoustic
    lenses, and acoustic waveguides become accessible. The mathematics is
    identical; the engineering constraints differ (acoustic wavelengths ~ cm
    vs. optical ~ 500 nm).
  - >
    Topological photonics: photonic crystals and metamaterials with non-trivial
    topological invariants (photonic Chern number, Z₂ invariant) support
    topologically protected edge states that cannot be backscattered by defects.
    This connects condensed-matter topology (quantum Hall effect) to
    metamaterial engineering, opening robust waveguiding applications.
communication_gap: >
  Veselago (1968) published in Soviet Physics Uspekhi during the Cold War —
  his paper was largely unknown in the West until Pendry's 2000 PRL cited it
  explicitly. The gap between Veselago's theoretical prediction and experimental
  confirmation was 32 years, partly due to the journal being in Russian and partly
  because the engineering community saw no route to implementation. Pendry (2000)
  published in Physical Review Letters (physics) while the experimental demonstration
  by Smith et al. (2000) appeared simultaneously — an unusual physics-engineering
  synchronisation. The transformation optics framework (Pendry et al. 2006) appeared
  simultaneously with an independent derivation by Leonhardt (2006), both in Science.
  Electrical engineering antenna communities and photonics communities developed
  metamaterial research somewhat separately from the condensed-matter physics community.

cross_pollination_opportunities:
  - >
    The Clay Mathematics Institute Millennium Problem asks whether solutions to the
    Navier-Stokes equations in 3D can develop singularities (infinite velocities) in
    finite time from smooth initial conditions. Weather and ocean modelling assume
    solutions remain smooth (no singularities); in practice, models apply parameterisations
    that smooth out sub-grid scales. If singularities do exist, they would correspond
    to extreme, unpredictable atmospheric events — connecting the pure mathematics
    problem to practical forecasting limits.
  - >
    Machine learning weather prediction (GraphCast, Pangu-Weather, FourCastNet) achieves
    forecast skill comparable to traditional NWP models at much lower computational cost
    by learning to emulate the Navier-Stokes evolution operator. These models do not
    enforce geostrophic balance or Rossby wave dispersion relations explicitly. Testing
    whether ML weather models preserve physical conservation laws (energy, potential
    vorticity) and whether violations correlate with forecast errors would connect
    physics-informed ML to atmospheric dynamics.
  - >
    The climate "tipping points" (Arctic amplification, Atlantic overturning collapse,
    Amazon dieback) involve bifurcations of the coupled Navier-Stokes + thermodynamic
    equations for the climate system. The same bifurcation theory tools developed for
    nonlinear control systems (eigenvalue spectrum, Lyapunov functions) could be applied
    to CMIP climate model output to locate tipping point bifurcations in parameter
    space (CO₂ level, temperature anomaly) and estimate the distance from current
    conditions to the nearest bifurcation.
communication_gap: >
  Charney (1948) published the quasi-geostrophic theory in Geophysics Publications,
  a Norwegian journal inaccessible to the applied mathematics community. The connection
  between the Navier-Stokes equations and weather prediction is discussed in dynamical
  meteorology textbooks (Holton 2004) but not in PDE or fluid mechanics courses.
  The Kolmogorov turbulence cascade is covered in physics and engineering, but the
  distinction between 2D (atmospheric, inverse cascade) and 3D (forward cascade)
  turbulence is rarely taught outside of atmospheric science. The ML weather modelling
  revolution has created a large community of ML researchers who use atmospheric data
  without fluid dynamics background.

cross_pollination_opportunities:
  - >
    Stochastic differential equations (SDEs) in finance: the Black-Scholes model
    dS = μS dt + σS dW is the same Ito SDE as Hasselmann's ocean model (multiplicative
    vs. additive noise). The mathematical methods — Ito calculus, Fokker-Planck,
    path integrals — are shared between quantitative finance, climate modeling,
    and statistical mechanics. Cross-fertilization is documented (El Karoui,
    stochastic control in climate) but remains limited.
  - >
    Stochastic parameterizations in numerical weather prediction (NWP): ECMWF's
    SPPT (Stochastically Perturbed Parameterization Tendencies) and SKEB (Stochastic
    Kinetic Energy Backscatter) schemes directly implement Hasselmann's framework
    in operational forecasting. Connecting theory (Hasselmann 1976) to practice
    (ECMWF 2019) via stochastic process mathematics.
communication_gap: >
  Hasselmann published in Tellus, a meteorology journal, using statistical mechanics
  language; Benzi et al. (1982) published stochastic resonance simultaneously in
  physics and climate journals. The mathematical community working on SDEs and
  statistical mechanics did not engage with climate science until the 1990s-2000s.
  The Nobel Committee (2021) explicitly cited the cross-disciplinary nature of
  Hasselmann's work — climate physics required statistical mechanics.

id: b-optimal-transport-bias-correction-x-climate-downscaling
title: Optimal-transport distribution mapping bridges mathematical transport theory
  and climate downscaling bias correction.
status: proposed
fields:
- climate-science
- mathematics
- statistics
- earth-system-modeling
bridge_claim: Distributional bias correction in climate projections can be framed
  as an optimal transport problem, preserving rank structure while aligning modeled
  and observed distributions. Extreme-tail transfer remains partly speculative and
  requires explicit caveats.
translation_table:
- field_a_term: Cost-minimizing transport plan
  field_b_term: Bias-correction mapping
  note: Minimizes distortion while matching empirical distributions.
- field_a_term: Wasserstein distance
  field_b_term: Distribution shift diagnostic
  note: Quantifies correction magnitude and residual mismatch.
- field_a_term: Monge map regularity
  field_b_term: Temporal consistency of corrected series
  note: Helps prevent artifact discontinuities.
related_unknowns:
- u-optimal-transport-shift-stability-under-extremes
related_hypotheses:
- h-ot-bias-correction-improves-tail-risk-calibration
cross_pollination_opportunities:
- Build shared benchmark datasets with identical uncertainty-reporting protocols across
  both domains.
- Compare baseline domain-specific workflows against explicitly transferred methods
  under matched compute budgets.
communication_gap: Adjacent communities use different software stacks and validation
  norms, so mathematically equivalent tools are often rediscovered in parallel.

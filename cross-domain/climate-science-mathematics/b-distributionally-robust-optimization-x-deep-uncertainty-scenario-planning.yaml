cross_pollination_opportunities:
- Co-develop constrained ambiguity sets using physics-backed dependence structures rather than independent marginals.
- Export optimization duality diagnostics into climate scenario dashboards for transparency.
communication_gap: Optimization theory emphasizes tractable reformulations while climate practice emphasizes storyline scenarios that may not map cleanly to balls in Wasserstein space.

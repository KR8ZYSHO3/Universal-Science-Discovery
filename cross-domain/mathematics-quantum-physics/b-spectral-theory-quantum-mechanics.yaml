id: b-spectral-theory-quantum-mechanics
title: Quantum mechanics is functional analysis applied to physics — observables are self-adjoint operators and measurement outcomes are their eigenvalues
status: established
fields:
  - mathematics
  - quantum-physics
bridge_claim: >
  The mathematical framework of quantum mechanics is exactly the spectral theory of
  self-adjoint operators on a Hilbert space. Observables are self-adjoint operators;
  measurement outcomes are eigenvalues (guaranteed real by self-adjointness); measurement
  probabilities are given by the spectral measure (Born rule). The spectral theorem
  (von Neumann 1932) guarantees every self-adjoint operator has a complete orthonormal
  eigenbasis. Time evolution U(t) = exp(-iHt/ℏ) is a unitary group generated by
  the Hamiltonian H (Stone's theorem). Schrödinger's equation iℏ∂ψ/∂t = Hψ is a
  linear ODE in an infinite-dimensional vector space. The entire physical theory
  is rigorously founded on functional analysis — a mathematical theory developed
  independently of physics.
translation_table:
  - field_a_term: self-adjoint operator A on Hilbert space
    field_b_term: physical observable (position, momentum, energy, spin)
    note: Self-adjointness guarantees real eigenvalues = real measurement outcomes
  - field_a_term: eigenvalue of A
    field_b_term: possible measurement outcome
    note: Spectral theorem guarantees complete set of eigenvalues
  - field_a_term: spectral measure (projection-valued measure)
    field_b_term: Born rule probability distribution
    note: P(A in E) = <psi|P_E|psi> where P_E is the spectral projection onto E
  - field_a_term: unitary group generated by self-adjoint H
    field_b_term: quantum time evolution operator exp(-iHt/hbar)
    note: "Stone's theorem: every strongly continuous unitary group has a self-adjoint generator"
  - field_a_term: tensor product of Hilbert spaces
    field_b_term: composite quantum system / entanglement
    note: Entanglement = non-separable states in tensor product space
related_unknowns:
  - u-phi-measurement-neural-correlates
related_hypotheses:
  - h-quantum-spectral-gap-computational-complexity
cross_pollination_opportunities:
  - >
    Spectral theory of non-self-adjoint operators (PT-symmetric quantum mechanics,
    Bender 2007) extends quantum mechanics to complex Hamiltonians with real spectra.
    This mathematical generalization predicts observable physical consequences in
    optical systems, and a complete physical interpretation remains debated — a
    case where mathematics is ahead of physics.
  - >
    Quantum computing exploits the exponential size of Hilbert space for N qubits
    (2^N dimensions). The mathematical theory of quantum complexity (whether BQP ≠ BPP)
    maps onto the spectral gap problem for local Hamiltonians — a purely functional
    analytic question about whether certain operators have spectral gaps above zero.
communication_gap: >
  Physicists learn quantum mechanics through wave functions and the Schrödinger equation
  before encountering operator theory; mathematicians learn functional analysis abstractly
  without physical motivation. The complete mathematical foundations are taught in
  mathematical physics courses but rarely to either physics or mathematics students alone.
last_reviewed: "2026-05-06"
references:

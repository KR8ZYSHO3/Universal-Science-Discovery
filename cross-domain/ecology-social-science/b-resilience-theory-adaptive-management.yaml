cross_pollination_opportunities:
  - >
    Critical slowing down (CSD) as early warning signal: before a fold bifurcation, variance
    and autocorrelation of fluctuations increase (Scheffer et al. 2009). This mathematical
    prediction has been tested in: ecological time series (coral bleaching precursors),
    climate tipping points (Greenland ice core pre-deglaciation variance spikes), and
    financial crises (stock volatility clustering before 2008). Generic cross-domain early
    warning detection using CSD connects physics (phase transition theory), ecology,
    and social science.
  - >
    Adaptive management (Holling's prescriptive framework) proposes treating management
    interventions as experiments, monitoring resilience indicators, and updating policy
    based on feedback — equivalent to Bayesian adaptive control in engineering. Cross-
    disciplinary collaboration between ecologists and control engineers could operationalize
    adaptive management using formal Bayesian decision theory and Kalman filtering for
    state estimation of social-ecological systems.
communication_gap: >
  Holling (1973) published in Annual Review of Ecology and Systematics without citing
  bifurcation theory or Thom's catastrophe theory (published same year), despite working
  with the identical mathematics. Gunderson & Holling (2002) Panarchy deliberately
  avoided mathematical formalism to reach interdisciplinary audiences, at the cost of
  losing connection to physics and engineering communities who developed the same theory
  under different names (regime shifts, tipping elements, critical transitions).

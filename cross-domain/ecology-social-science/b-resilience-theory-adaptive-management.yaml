id: b-resilience-theory-adaptive-management
title: >
  Holling's ecological resilience theory (1973) — ecosystems have multiple stable states
  with resilience = basin of attraction width, not proximity to equilibrium — provides
  the panarchy framework applicable to social-ecological systems, cities, and institutions,
  connecting the fold bifurcation mathematics of alternative stable states to social
  tipping points and adaptive management.
status: established
fields:
  - ecology
  - social-science
  - complexity-science
  - nonlinear-dynamics
  - systems-ecology
bridge_claim: >
  Holling (1973) distinguished resilience (ability to absorb disturbance without state
  change) from stability (return time to equilibrium). The "ball in cup" metaphor: the
  basin of attraction width determines resilience; a narrowing basin predicts catastrophic
  regime shift even as the system appears stable (near-equilibrium indicators misleading).
  Mathematically: a fold bifurcation creates two stable states separated by an unstable
  saddle; as a control parameter changes, the basin of attraction of the current state
  shrinks until the fold point is reached — catastrophic irreversible transition to
  alternate state. Same mathematics governs: shallow lake eutrophication (phosphorus
  loading × internal recycling), coral reef–macroalgae transitions (fishing pressure ×
  herbivory), savanna–forest bistability (rainfall × fire feedback), and social systems
  (institutional trust collapse, financial contagion). Panarchy (Gunderson & Holling 2002):
  systems cycle through r (exploitation: rapid growth), K (conservation: resource accumulation),
  Ω (release: disturbance), α (reorganization: reconfiguration) phases across multiple
  spatial and temporal scales — a cross-scale adaptive cycle. Social-ecological systems
  (SES): cities show panarchic dynamics in economic cycles; institutional trust collapses
  exhibit early warning signals (variance increase, autocorrelation increase) identical to
  those before ecological regime shifts.
translation_table:
  - field_a_term: ecological resilience (basin of attraction width)
    field_b_term: institutional resilience (capacity to absorb political/economic shocks)
    note: both measured by how large a perturbation is needed to flip the system to an alternate state
  - field_a_term: fold bifurcation / catastrophic regime shift
    field_b_term: tipping point in social-ecological system
    note: same mathematical structure; early warning signals (CSD) applicable to both
  - field_a_term: alternative stable states (e.g., clear lake vs turbid lake)
    field_b_term: institutional bistability (e.g., trust vs distrust equilibria in governance)
    note: both exhibit hysteresis — transition back requires larger effort than transition forward
  - field_a_term: panarchy adaptive cycle (r→K→Ω→α)
    field_b_term: Schumpeterian creative destruction (growth, accumulation, disruption, innovation)
    note: Schumpeter's economic cycle maps onto Holling's ecological cycle; similar 4-phase structure
  - field_a_term: slow variables (phosphorus loading, fishing pressure)
    field_b_term: institutional parameters (inequality, social capital, institutional quality)
    note: slow variables determine the position of the fold bifurcation; hard to change but determine stability

related_hypotheses:
  - h-ostrom-design-principles-digital-commons
cross_pollination_opportunities:
  - >
    Digital commons (open-source software, Wikipedia, scientific preprint
    servers) share the non-excludability and subtractability (attention,
    contributor time) of physical CPRs. Systematically testing whether
    Ostrom's eight principles predict governance success in digital settings
    would extend validated ecological theory to the information economy.
  - >
    Climate change is a global CPR problem. The Paris Agreement mechanism
    design can be evaluated against Ostrom's principles: boundary definition
    (NDCs), monitoring (IPCC reporting), sanctions (reputational only) —
    the absence of graduated binding sanctions predicts instability, a
    testable hypothesis with policy implications.
communication_gap: >
  Ecological economists, political scientists studying institutions, and game
  theorists work in largely separate communities. Hardin's paper (Science,
  biology audience) is famous but Ostrom's Nobel-winning empirical refutation
  (political science journals) is less widely known in natural sciences.
  The formal game-theoretic Folk theorem basis of Ostrom's findings is
  rarely cited in her empirical papers, creating a gap between the
  theoretical explanation and its empirical validation.

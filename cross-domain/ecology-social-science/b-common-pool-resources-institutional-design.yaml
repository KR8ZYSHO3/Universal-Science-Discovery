id: b-common-pool-resources-institutional-design
title: >
  Ostrom's empirical refutation (Nobel 2009) of Hardin's tragedy of the commons
  shows communities self-organize sustainable governance via eight design
  principles; game-theoretically, cooperative equilibria are sustained when the
  discount factor δ > 1-1/N (Folk theorem), connecting ecology, social science,
  and game theory through the mathematics of repeated-game cooperation.
status: established
fields:
  - ecology
  - resource-management
  - social-science
  - economics
  - game-theory
  - political-science
bridge_claim: >
  Hardin (1968): individually rational overexploitation destroys shared
  resources — the "tragedy" occurs because each user's marginal cost is
  shared while marginal benefit is private. The game is a multi-player
  Prisoner's Dilemma: defect (overuse) dominates cooperate (restrain)
  in one-shot play. Ostrom's empirical program (1990, Nobel 2009): surveying
  hundreds of long-lasting common pool resource (CPR) institutions — Swiss
  alpine meadows, Japanese iriai forests, Spanish irrigation communities,
  Maine lobster gangs — she identified eight design principles for sustainable
  governance: (1) clearly defined group and resource boundaries; (2) rules
  adapted to local conditions; (3) collective-choice arrangements allowing
  users to participate in rule modification; (4) effective monitoring; (5)
  graduated sanctions; (6) conflict resolution mechanisms; (7) minimal
  recognition of rights to organize; (8) nested governance for larger systems.
  Game-theoretic basis: the repeated-game Folk theorem explains Ostrom's
  findings formally — if the discount factor δ > 1 - 1/N (where N is the
  number of players), then cooperative equilibria can be sustained by trigger
  strategies. Monitoring (principle 4) enables credible punishment. Graduated
  sanctions (principle 5) prevent defection from being profitable even when
  detection probability is low. The mathematical prediction: cooperation is
  easier in smaller, longer-horizon, more connected groups — verified empirically.
translation_table:
  - field_a_term: common pool resource (CPR) — subtractable, non-excludable
    field_b_term: public good (non-excludable, non-rival) minus subtractability
    note: CPR is the intermediate category between public goods and private goods
  - field_a_term: Hardin tragedy — dominant strategy to defect in one-shot game
    field_b_term: Nash equilibrium of one-shot Prisoner's Dilemma
    note: Hardin implicitly assumed no iteration, no communication, no institutional design
  - field_a_term: Ostrom monitoring principle (principle 4)
    field_b_term: Folk theorem condition — mutual observation enables credible punishment
    note: without monitoring, trigger strategies lose their incentive force
  - field_a_term: graduated sanctions (principle 5)
    field_b_term: grim trigger vs tit-for-tat — partial punishment sustains cooperation
    note: mild first-offense sanction minimizes loss from accidental defection
  - field_a_term: nested governance (principle 8)
    field_b_term: hierarchical mechanism design with multiple principals
    note: federal structure allows local adaptation within global coordination constraints

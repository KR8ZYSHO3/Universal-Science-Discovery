id: b-conservation-psychology-pro-environmental
title: >
  Conservation psychology's value-belief-norm theory bridges ecological science and
  social science, revealing that attitude-behavior gaps in pro-environmental action
  are better closed by behavioral defaults, social norms, and place attachment than
  by providing more ecological information.
status: established
fields:
  - conservation-psychology
  - environmental-sociology
  - behavioral-economics
  - social-psychology
  - ecology
bridge_claim: >
  Conservation psychology studies the psychological factors driving pro-environmental
  behaviour. The value-belief-norm (VBN) theory (Stern 2000) proposes a causal chain:
  altruistic values → ecological worldview (NEP scale) → awareness of environmental
  consequences → felt moral obligation → pro-environmental norms → behaviour. However,
  the empirical gap between expressed attitudes and actual behaviour is large — people
  who score high on environmental concern often do not change behaviour. Behavioural
  interventions bridge this gap more effectively than information provision: (1) defaults
  matter — opt-out green energy enrollment achieves 3× higher uptake than opt-in
  (Sunstein & Thaler's nudge theory); (2) descriptive social norms outperform injunctive
  norms — "90% of your neighbours recycled" reduces energy use more than "you should
  recycle" (Schultz et al. 2007); (3) place attachment (Kals 1999) — direct experience
  of nature predicts conservation behavior through emotional bonding, not information.
  The identifiable victim effect (Kahneman): donations decline as N of victims increases
  (scope insensitivity) — affecting conservation fundraising. Moral licensing: performing
  a small green act can license subsequent non-green behaviour — a psychological rebound
  that partially offsets nudge interventions. The ecological-social bridge is bidirectional:
  social interventions must understand ecological thresholds (percolation from Bridge 417);
  ecological assessments must integrate human behaviour (social-ecological systems).
translation_table:
  - field_a_term: species at risk (ecology)
    field_b_term: identifiable victim (social psychology)
    note: Single species with a face (polar bear, panda) receives more conservation support than biodiversity statistics
  - field_a_term: critical habitat area threshold (percolation p_c)
    field_b_term: conservation policy urgency framing
    note: When habitat is below percolation threshold, urgency framing matters more — social science bridges to ecology
  - field_a_term: ecosystem service valuation
    field_b_term: contingent valuation / willingness-to-pay (economics)
    note: Connecting ecological benefit quantification to behavioral economics payment mechanisms
  - field_a_term: carry capacity / sustainability constraint
    field_b_term: behavioral sufficiency — lifestyle change within planetary boundaries
    note: Physical limits set the constraint; behavioral science designs the achievable pathway
  - field_a_term: trophic cascade (removing wolves changes vegetation)
    field_b_term: social cascade — one visible conservation act triggers community norm shift
    note: Both involve indirect effects propagating through a network — ecological and social dynamics are isomorphic
related_unknowns:
  - u-attitude-behavior-gap-pro-environmental
related_hypotheses:
  - h-place-attachment-mediates-conservation-behavior-more-than-vbn
cross_pollination_opportunities:
  - Design randomised controlled trials of conservation nudges (defaults, social norms,
    place-experience programs) at scale using digital platforms — connecting behavioural
    economics experiment design to conservation biology outcome measurement
  - Apply agent-based social-ecological models that couple VBN dynamics with ecosystem
    population models to predict long-term outcomes of conservation psychology interventions
  - Test whether moral licensing effects offset carbon offset purchases using field
    experiments with real purchase decisions — quantifying the rebound effect size
communication_gap: >
  Ecologists and conservation biologists publish in Biological Conservation and Conservation
  Biology; social psychologists publish in JPSP and Psychological Science; behavioral
  economists publish in AER and QJE. The VBN framework (Stern 2000) emerged from
  environmental sociology and is not widely known in conservation biology. Nudge theory
  (Thaler-Sunstein) is well-known in economics but rarely applied systematically to
  conservation management decisions. Conservation organizations often run information
  campaigns whose effectiveness social science has shown to be limited.

id: b-political-ecology-environmental-justice
title: >
  Political ecology links power relations and resource access to quantifiable
  environmental injustice — PM2.5 exposure 1.54× higher for people of color
  (Tessum et al. 2021) — bridging social science power analysis with ecology,
  epidemiology, and environmental policy.
status: established
fields:
  - ecology
  - social-science
  - environmental-science
  - political-science
  - public-health
  - economics
bridge_claim: >
  Political ecology synthesizes Marxist political economy with ecology to show that
  environmental burdens and benefits are distributed through social structures of
  power, race, and class — not randomly or purely by market efficiency. Environmental
  justice is the empirical and normative research program documenting and addressing
  these distributional inequities.

  Quantitative evidence: Tessum et al. (2021) linked PM2.5 air pollution exposure
  (EPA monitoring networks + satellite-derived estimates) to race/ethnicity and income
  across the US, finding that people of color experience 1.54× higher PM2.5 burdens
  than white populations after controlling for income, and that people of color bear
  6.9 percentage points more pollution than they generate through consumption —
  a clear disparity between production and exposure. Bullard (1990) documented that
  8 of 10 hazardous waste facilities in Houston were located in predominantly Black
  neighborhoods — the first systematic study of environmental racism.

  Ostrom's Social-Ecological Systems (SES) framework (→Bridge 323) intersects with
  political ecology: Ostrom showed that common pool resources can be sustainably
  managed by community governance under eight institutional design principles.
  Political ecology argues that formal property rights regimes (enclosure, privatization)
  often displace these informal community institutions — "tragedy of enclosure"
  (inverse of Hardin's tragedy of the commons). Post-colonial dispossession of
  indigenous land creates ecological degradation by breaking community governance.

  Payments for Ecosystem Services (PES): landowners paid to maintain forests, wetlands,
  or watersheds for the ecosystem services they provide (carbon sequestration,
  water filtration, biodiversity). Political ecology critique (Leach et al. 2012):
  PES schemes risk elite capture (wealthy landowners or corporations receiving
  payments for land that communities already managed), displacement of indigenous
  communities who lose access rights when land is commodified, and measurement of
  "services" through market metrics that erase cultural and relational values.
translation_table:
  - field_a_term: environmental burden (pollution exposure, flood risk, heat island)
    field_b_term: ecosystem disservice allocation in ecological accounting
  - field_a_term: racial/class gradient in PM2.5 exposure (Tessum et al. 2021)
    field_b_term: non-random spatial distribution of environmental stressors
  - field_a_term: common pool resource governance (Ostrom SES framework)
    field_b_term: collective action equilibrium in game theory / institutional economics
  - field_a_term: enclosure (private property displacing community governance)
    field_b_term: regime shift from cooperative to competitive equilibrium
  - field_a_term: Payments for Ecosystem Services (PES)
    field_b_term: Coasian bargaining for environmental externalities
  - field_a_term: elite capture in PES programs
    field_b_term: rent extraction in market failure analysis
  - field_a_term: environmental racism (disproportionate burden on communities of color)
    field_b_term: discriminatory exposure externality — market failure with social structure

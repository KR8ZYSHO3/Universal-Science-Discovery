cross_pollination_opportunities:
  - >
    Remote sensing (satellite-derived NO₂, PM2.5, urban heat island) combined with
    census demographic data could enable near-real-time environmental justice monitoring
    at neighborhood scales globally — not just in the US. Ecologists and remote
    sensing scientists developing atmospheric monitoring could collaborate with
    sociologists and public health researchers to create environmental justice
    dashboards with policy-actionable granularity.
  - >
    Epidemiologists quantifying the health burden of environmental inequity (excess
    mortality, asthma, cardiovascular disease from differential pollution exposure)
    need ecological exposure models (PM2.5 dispersion, heat island mapping) and
    social science methods (propensity score matching to control for confounding
    by income, insurance, healthcare access). A truly interdisciplinary team
    combining atmospheric science, epidemiology, and sociology is needed to
    estimate the health cost of environmental injustice.
communication_gap: >
  Political ecology is primarily a qualitative social science (published in Political
  Geography, Environment and Planning A) with roots in Marxist theory — largely
  invisible to quantitative ecologists and epidemiologists. Environmental justice
  research spans law (environmental law journals), public health (Environmental
  Health Perspectives, Am J Public Health), and social science without a unified
  quantitative framework. Ecosystem ecologists measuring biodiversity and function
  rarely engage with the political economy of who governs the ecosystems they study.
  Economists designing PES schemes rarely engage with the political ecology critique,
  and vice versa. The Ostrom SES framework bridges institutional economics and
  ecology but is still rarely applied with the power-analysis lens of political ecology.

id: b-traditional-knowledge-citizen-science
title: "Traditional Ecological Knowledge and Citizen Science — indigenous fire management, FAIR+CARE data sovereignty, and iNaturalist crowd-sourced biodiversity monitoring bridge ancient and digital knowledge systems"
status: established
fields:
  - ecology
  - social-science
  - indigenous-studies
  - conservation-biology
  - data-science

bridge_claim: >
  Traditional Ecological Knowledge (TEK) encompasses the cumulative body of
  knowledge, practices, and beliefs about relationships between living beings
  (including humans) and their environment, developed by indigenous and local
  communities over millennia through direct contact with the environment. TEK
  often precedes and sometimes surpasses formal scientific discovery: Aboriginal
  Australian controlled burning practices (fire-stick farming), sustained over at
  least 50,000 years, maintained diverse grassland and scrubland mosaics that
  reduced catastrophic wildfire risk; Bowman et al. (2011) demonstrated that
  contemporary reinstatement of these practices in northern Australia reduced
  greenhouse gas emissions by 40% compared to late-dry-season wildfires. Citizen
  science transforms ecological observation capacity: iNaturalist has accumulated
  100M+ observations from 4M+ contributors globally — exceeding the capacity of
  professional ecological surveys. eBird (Cornell Lab) has recorded over 1 billion
  bird sightings, enabling continent-scale migratory phenology tracking. Sullivan
  et al. (2014) validated eBird data against professional surveys: observer effort
  modelling recovers unbiased abundance estimates. The biocultural approach
  integrates TEK with formal ecology: indigenous protocols for pollinator monitoring
  (asking permission of community elders, including cultural indicators of phenology
  such as plant flowering used as traditional calendars) achieve higher accuracy than
  standardised transects alone in some landscapes. Data sovereignty: the CARE
  principles (Collective Benefit, Authority to Control, Responsibility, Ethics)
  complement FAIR (Findable, Accessible, Interoperable, Reusable) by asserting
  that indigenous communities must control data derived from their territories and
  traditional knowledge. Carroll et al. (2020) formalised CARE for indigenous data
  governance — now adopted by several national research councils.


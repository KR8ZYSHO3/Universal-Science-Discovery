cross_pollination_opportunities:
  - "Develop co-designed citizen science apps that integrate TEK phenology calendars with iNaturalist observation protocols for fire management planning"
  - "Apply machine learning species identification (iNaturalist AI) to historical museum specimen images and TEK ethnobotanical records to reconstruct pre-colonial species baselines"
  - "Use CARE-compliant data trusts to aggregate TEK and remote sensing data for conservation planning in indigenous territories without extracting community knowledge"

communication_gap: >
  Academic ecologists and indigenous knowledge holders have historically operated
  within fundamentally different epistemological frameworks — Western science
  demands repeatability and falsifiability, while TEK is embedded in cultural,
  spiritual, and relational ontologies. Power asymmetries (colonialism, extractive
  research practices) have created justified indigenous scepticism of academic
  partnerships. Citizen science platforms have largely been designed by academic
  ecologists without meaningful co-design with indigenous communities. The CARE
  principles represent a genuine attempt to address this but implementation in
  practice remains uneven.


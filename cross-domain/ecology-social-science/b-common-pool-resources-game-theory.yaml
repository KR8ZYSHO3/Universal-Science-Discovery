id: b-common-pool-resources-game-theory
title: >
  Ostrom's empirical study of common pool resource governance overturns Hardin's Tragedy
  of the Commons, showing that communities self-organise cooperative institutions using
  the repeated-game mechanism that game theory predicts but Hardin ignored.
status: established
fields:
  - ecology
  - social-science
  - economics
  - game-theory
bridge_claim: >
  Hardin's "Tragedy of the Commons" (1968) argued that shared resources are inevitably
  depleted by rational self-interest — modelled as a one-shot prisoner's dilemma where
  defection dominates. Ostrom's fieldwork (2009 Nobel) showed this empirically false:
  communities worldwide self-organise governance for fisheries, irrigation systems, and
  forests without privatisation or state control. The game-theoretic resolution: Hardin
  assumed one-shot games, but resource users play repeated games with communication.
  Axelrod's tournaments show Tit-for-Tat (cooperate then copy partner's last move)
  defeats defection strategies in iterated prisoner's dilemma. Ostrom's 8 design
  principles (clear boundaries, proportional rules, collective choice, monitoring,
  graduated sanctions, conflict resolution, recognition of rights to organise) are
  empirically derived Nash equilibrium conditions for sustainable repeated-game cooperation.
translation_table:
  - field_a_term: common pool resource (fishery, forest)
    field_b_term: shared payoff pool in repeated game
    note: Both are rivalrous (use by one reduces availability) but non-excludable without governance
  - field_a_term: sustainable harvest rule
    field_b_term: cooperative strategy in repeated game
    note: The Nash equilibrium of the repeated game is the sustainable rule Ostrom communities discover
  - field_a_term: monitoring of harvests
    field_b_term: observable action in game (enables Tit-for-Tat)
    note: Without monitoring, cooperation collapses; Ostrom's principle 4 directly parallels game theory requirement
  - field_a_term: graduated sanctions for violation
    field_b_term: proportional punishment in folk theorem
    note: "Folk theorem: any feasible payoff above minimax can be sustained with credible punishment"
  - field_a_term: communication and collective choice
    field_b_term: cheap talk game enabling coordination
    note: Pre-play communication enables coordination equilibrium selection; absent in Hardin's model
related_unknowns:
  - u-multilateral-cooperation-failure-modes
related_hypotheses:
  - h-ostrom-commons-multilateral-failure
cross_pollination_opportunities:
  - >
    Climate treaty design: the global atmosphere as a common pool resource faces the
    same game structure as fisheries. Applying Ostrom's design principles to climate
    agreements would identify which principles are absent in existing treaties and predict
    failure modes — particularly the absence of effective monitoring and graduated sanctions.
  - >
    Digital commons governance: open-source software, Wikipedia, and the internet are
    digital common pool resources. Ostrom's principles apply: Wikipedia's editor governance
    and conflict resolution mechanisms are near-optimal by Ostrom's criteria; their absence
    in social media platforms predicts the 'attention commons' degradation observed.
communication_gap: >
  Hardin's metaphor entered popular culture; Ostrom's empirical refutation reached
  political science and environmental studies but has not fully penetrated mainstream
  economics or international relations theory, where the tragedy-of-commons framing
  still dominates. Game theory and institutional economics are rarely taught together
  with ecology in graduate programs.
last_reviewed: "2026-05-06"

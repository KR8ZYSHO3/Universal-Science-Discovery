id: b-holobiont-microbiome-coevolution
title: "Holobiont Theory and Host-Microbiome Coevolution — the hologenome as a unit of selection integrates host genetics with vertically and horizontally transmitted microbial communities"
status: proposed
fields:
  - ecology
  - evolutionary-biology
  - microbiology
  - immunology
  - marine-biology

bridge_claim: >
  The holobiont concept (Margulis 1991; Zilber-Rosenberg & Rosenberg 2008) proposes
  that a host and its associated microbiome function as a single biological unit.
  The hologenome theory extends this to evolutionary timescales: natural selection
  acts on the hologenome — the combined genetic information of the host genome
  and its collective microbiome. Evidence spans multiple systems. Coral bleaching
  exemplifies holobiont breakdown: thermal stress disrupts the coral–Symbiodinium
  (dinoflagellate endosymbiont) partnership, halting photosynthetic nutrient supply;
  corals can acquire thermotolerant Symbiodinium strains, providing rapid (non-
  genetic) adaptation to warming oceans. The Hawaiian bobtail squid (Euprymna
  scolopes) develops its light organ only upon colonisation by Vibrio fischeri,
  which provides bioluminescent counter-illumination camouflage — host development
  is obligately dependent on microbial partner. Vertical transmission of microbiome
  (maternal seeding at birth via vaginal canal, breast milk HMOs that feed
  Bifidobacterium, placental microbiome) educates the neonatal immune system.
  Human gut microbiome composition is ~50% heritable (twin studies, Bonder 2016)
  yet also environmentally plastic — an extended phenotype responsive to diet,
  antibiotics, and geography. Turnbaugh et al. (2006) demonstrated that human
  gut microbiota from obese donors cause greater fat deposition when transplanted
  into germ-free mice, establishing a causal role in metabolic phenotype. The
  holobiont framing resolves the paradox that hosts with near-identical genomes
  can have dramatically different phenotypes via microbiome variation.


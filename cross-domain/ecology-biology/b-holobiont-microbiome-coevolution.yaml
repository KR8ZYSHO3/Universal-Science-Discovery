cross_pollination_opportunities:
  - "Design coral microbiome transplants ('coral probiotics') to enhance thermotolerance of reef ecosystems threatened by climate change"
  - "Develop microbiome-aware personalised nutrition: predict dietary response from pre-intervention gut community composition"
  - "Use holobiont evolution theory to explain antibiotic resistance dynamics — selection on hologenome may slow resistance spread if commensal microbiome is preserved"

communication_gap: >
  Marine ecologists who study coral holobionts and human gut microbiome researchers
  rarely attend the same conferences or read each other's literature, despite studying
  formally equivalent systems. Evolutionary biologists are divided on whether the
  hologenome theory constitutes a genuine unit-of-selection extension of evolutionary
  theory or merely a useful metaphor. This debate has slowed integration with
  ecological and evolutionary microbiology.


id: b-microbiome-ecology-host-health
title: >
  The human gut microbiome is a complex ecological community of ~10¹³ microorganisms
  governed by ecological diversity metrics (Shannon entropy, Bray-Curtis dissimilarity)
  and keystone-species dynamics — and its ecological state directly determines host
  metabolic, immunological, and neurological health via the gut-brain axis.
status: established
fields:
  - ecology
  - biology
  - microbiology
  - medicine
  - neuroscience
bridge_claim: >
  Ecology developed quantitative diversity metrics — Shannon entropy H = -Σpᵢ log pᵢ
  for α-diversity and Bray-Curtis dissimilarity for β-diversity — to characterize
  community composition, and identified keystone species whose disproportionate
  influence on community stability makes their loss catastrophic. The human gut
  harbors ~10¹³ microorganisms encoding ~3.3 million genes (150× the human
  genome, Qin et al. 2010), constituting a genuine ecological community subject
  to succession, competition, and collapse. Dysbiosis — reduced Shannon diversity —
  correlates with IBD, obesity, type 2 diabetes, depression, and Alzheimer's disease,
  making ecological health metrics clinically predictive. Keystone gut taxa (e.g.,
  Akkermansia muciniphila, Faecalibacterium prausnitzii) behave exactly as ecological
  keystone species: their removal causes disproportionate community collapse and
  disease susceptibility. The gut-brain axis (vagus nerve + enteric nervous system
  + short-chain fatty acids: butyrate, propionate, acetate) transmits microbiome-
  generated metabolic signals to the brain — fecal microbiota transplant (FMT)
  can transfer anxiety phenotypes between germ-free mice (Cryan et al. 2019).
  FMT for C. difficile achieves >90% cure rate by reconstituting the ecological
  community in a single ecological succession event (van Nood et al. 2013).
translation_table:
  - field_a_term: Shannon entropy H (α-diversity)
    field_b_term: gut microbiome diversity (clinical biomarker)
    note: Low H predicts disease susceptibility; FMT increases H and restores health
  - field_a_term: Bray-Curtis dissimilarity (β-diversity)
    field_b_term: enterotype clustering (Firmicutes vs. Bacteroidetes dominance)
    note: Human gut microbiomes cluster into enterotypes analogous to ecological biomes
  - field_a_term: keystone species
    field_b_term: keystone gut taxa (Akkermansia, F. prausnitzii)
    note: Removal of keystone gut taxa causes community collapse and metabolic disease
  - field_a_term: ecological succession
    field_b_term: microbiome colonization and FMT engraftment
    note: FMT reconstitutes the gut community via an accelerated succession process
  - field_a_term: trophic cascade
    field_b_term: gut-brain axis (SCFA → enteric NS → vagus → CNS)
    note: SCFAs produced by gut bacteria are the metabolic link transmitting microbiome state to the brain
  - field_a_term: competitive exclusion (Gause's law)
    field_b_term: C. difficile colonization resistance
    note: A diverse resident community provides colonization resistance against pathogens via competitive exclusion

cross_pollination_opportunities:
  - Apply Island Biogeography Theory (MacArthur-Wilson) to predict microbiome
    recovery timescales after antibiotic perturbation as a function of inoculum
    size and immigration rate from diet/environment
  - Use ecological null models (Neutral Theory of Biodiversity, Hubbell 2001) to
    partition gut microbiome variation into neutral drift vs. selection — identifying
    which taxa are functionally important vs. ecological passengers
  - Test whether ecological r/K selection predicts antibiotic resistance evolution
    in gut microbiomes subject to different perturbation regimes
  - Design FMT protocols based on ecological succession theory (priority effects,
    founder species) to maximize engraftment efficiency
communication_gap: >
  Ecologists rarely read gastroenterology journals; gastroenterologists rarely
  apply quantitative ecology metrics beyond 16S rRNA sequencing diversity scores.
  The mathematical toolkit of community ecology (neutral theory, island biogeography,
  species abundance distributions) has only slowly penetrated microbiome research.
  Conversely, microbiome biologists have access to culturomics and metatranscriptomics
  data at scales ecologists have never had — data that could test long-standing
  ecological theories with unprecedented resolution.

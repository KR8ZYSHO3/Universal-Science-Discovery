id: b-stomatal-regulation-game-theory
title: >
  Stomatal aperture regulation solves an optimal control problem: maximise carbon
  assimilation per unit water lost while operating under uncertain atmospheric
  conditions — a dynamic optimisation identical in structure to the Lagrangian
  dual formulation in economics, making plant physiology a natural laboratory
  for testing optimal resource allocation theory.
status: proposed
fields:
  - botany
  - economics
  - mathematics
  - evolutionary-biology
bridge_claim: >
  Stomata regulate CO2 uptake and water vapor efflux through guard cell movements.
  A leaf faces a fundamental trade-off: open stomata maximise photosynthesis but
  lose water; closed stomata conserve water but starve carbon fixation. Cowan &
  Farquhar (1977) showed that the optimal stomatal policy maximises net carbon gain
  subject to a water budget constraint — a Lagrangian optimisation problem with
  the marginal water cost of carbon lambda as the shadow price. This is formally
  identical to the marginal cost pricing problem in economics. The bridge is
  precise and bidirectional: lambda (the lambda of Cowan-Farquhar) is the economic
  shadow price of water at the leaf level; optimal stomatal conductance g_s can be
  derived from first principles of constrained optimisation; and deviations from
  optimality reveal information about risk aversion, imperfect information, and
  coordination failures between guard cells — exactly the game-theoretic questions
  asked in mechanism design. Evolutionary game theory predicts that plants in
  competitive environments should overbid on water use, consistent with observations
  of reduced water-use efficiency in plant communities.
translation_table:
  - field_a_term: constrained optimisation max[A - lambda*E]
    field_b_term: stomatal optimal control (Cowan-Farquhar theory)
    note: Maximise net carbon minus water cost; lambda is shadow price of water
  - field_a_term: shadow price lambda
    field_b_term: marginal water cost of carbon (isohydric vs. anisohydric strategy)
    note: Constant lambda => isohydric (ABA-regulated); variable lambda => anisohydric
  - field_a_term: Nash equilibrium
    field_b_term: evolutionarily stable stomatal strategy in plant community
    note: Each plant's optimal strategy given competitors' water use — drives market for water
  - field_a_term: Lagrangian duality
    field_b_term: trade-off between carbon gain and water loss
    note: Identical mathematical structure — the water budget is the binding constraint
cross_pollination_opportunities:
  - Measure lambda in different plant functional types and test whether it equals the opportunity cost of water in the plant's habitat — testing the ecological economics prediction
  - Apply dynamic programming to find the optimal stomatal strategy under stochastic rainfall, testing against observed stomatal responses in drought experiments
  - Use mechanism design theory to ask what information architecture would allow guard cells to coordinate optimally across a leaf without central control
last_reviewed: "2026-05-07"

cross_pollination_opportunities:
  - >
    Bayesian epistemology in philosophy connects to formal epistemology in
    computer science (belief revision, AGM axioms, Pearl's causal calculus).
    The probabilistic logic of confirmation has been implemented computationally
    in Bayesian networks, providing an experimental platform for testing
    philosophical theories of confirmation — an unusual case of philosophy
    becoming empirically tractable.
  - >
    Scientific meta-analysis as Bayesian hierarchical modeling: rather than
    applying p-value thresholds across studies, hierarchical Bayesian models
    pool evidence across studies and produce posterior distributions over
    effect sizes. This directly implements the philosophical account of
    confirmation across multiple evidential streams.
communication_gap: >
  Philosophy of science and statistics have parallel traditions that rarely
  intersect. Howson & Urbach (2006) made the Bayesian-confirmation connection
  explicit, but philosophy journals (British Journal for the Philosophy of Science,
  Philosophy of Science) and statistics journals (Annals of Statistics, Bayesian
  Analysis) have non-overlapping readerships. Philosophers cite Glymour, Hempel,
  Popper; statisticians cite Jeffreys, Jaynes, Lindley. The mathematical
  equivalence of their accounts of "evidence" is rarely acknowledged across the
  disciplinary boundary.

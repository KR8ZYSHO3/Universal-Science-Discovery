cross_pollination_opportunities:
  - >
    The computational psychiatry programme (Huys et al., Adams et al.) uses Bayesian
    inference models to classify psychiatric disorders by the abnormal prior and
    precision parameters that explain their symptoms. Schizophrenia = reduced
    likelihood precision; autism = overly precise sensory likelihood (reduced prior
    influence); depression = negatively biased prior over outcomes. This framework
    unifies diagnosis with mechanistic computational models, making psychiatric
    diagnosis analogous to parameter estimation in a generative model.
  - >
    Variational Bayes (VB), the dominant approximate inference algorithm in machine
    learning, is mathematically identical to Friston's free energy minimization.
    Both minimise an upper bound on surprise (KL divergence between approximate and
    true posterior). The brain as a variational inference machine would naturally
    use the same algorithmic shortcuts (mean-field factorisation, Laplace approximation)
    as VB in ML — testable by comparing the computational signatures of each
    approximation against psychophysical data.
  - >
    The "prior over causes" in visual perception should be measurable through
    psychophysical reverse-correlation experiments combined with generative model
    fitting. The fitted prior would provide a window into the statistics of the
    visual environment that shaped the prior during development — connecting
    perceptual ecology to neural coding theory.
communication_gap: >
  Helmholtz's insight (1867) predated Bayesian statistics; the formal Bayesian
  brain formulation arrived with Knill & Pouget (2004) and Friston (2005) but remains
  specialised literature in computational neuroscience. Most experimental neuroscientists
  record single neurons rather than measuring population-level probabilistic codes;
  the statistical framework requires population recordings and Bayesian model fitting
  that most labs lack. The free energy principle literature (Friston) is mathematically
  dense and has a reputation for being difficult to interpret, slowing adoption
  by the experimental community.

id: b-spike-sorting-blind-source-separation
title: >
  Spike sorting — decomposing extracellular recordings into contributions from
  individual neurons — is mathematically identical to blind source separation
  (ICA/cocktail party problem), with Bayesian spike sorters implementing
  probabilistic mixture models over waveform shapes and interspike interval
  statistics.
status: established
fields:
  - neuroscience
  - statistics
  - signal-processing
  - machine-learning
  - electrophysiology
bridge_claim: >
  EXTRACELLULAR RECORDING MIXING MODEL:
  A recording electrode at position x measures a weighted sum of spike
  waveforms from N nearby neurons:

    y(t) = Σᵢ Aᵢ · sᵢ(t) + noise

  where Aᵢ = mixing matrix entry (spatial weight), sᵢ(t) = binary spike
  train of neuron i. This is the BSS mixing model.

  ICA SOLUTION (Bell & Sejnowski 1995):
  Assume statistically independent sources sᵢ (neurons fire independently).
  ICA finds unmixing matrix W = A⁻¹ to recover s = Wy by maximising
  mutual information or minimising mutual information between recovered sources.
  The infomax algorithm gradient: ΔW ∝ [I - φ(u)u^T]W where φ is a
  nonlinearity approximating the log-derivative of the source density.

  BAYESIAN SPIKE SORTING (Kilosort, MountainSort):
  Model: observed voltage = Σ_k Wk * n_k(t) + noise
  where Wk = template waveform of cluster k, n_k(t) = spike times.
  Inference: find template set {Wk} and spike assignment that maximises
  posterior P({Wk}, {n_k} | y).

  This is equivalent to probabilistic PCA / mixture of Gaussians on
  the feature space of spike waveforms — a standard statistical model.

  COCKTAIL PARTY PROBLEM:
  Multiple microphones at a party, each recording a mix of voices.
  ICA recovers the individual voices from the mixes. Exactly the same
  mathematical structure as spike sorting — multiple electrodes, multiple
  neurons, mixed signals.
translation_table:
  - field_a_term: spike waveform template (neuroscience)
    field_b_term: source signal basis function (signal processing)
    note: Each neuron's waveform is the source signal; its detection across electrodes provides the unmixing
  - field_a_term: electrode recording (neuroscience)
    field_b_term: mixture observation (blind source separation)
    note: Multiple tetrode or silicon probe channels provide the equivalent of multiple microphones
  - field_a_term: neuron isolation / cluster assignment
    field_b_term: source recovery in BSS
    note: Assigning spikes to neurons = assigning observations to source components
  - field_a_term: interspike interval refractory period
    field_b_term: temporal structure constraint on source
    note: The refractory period (no two spikes <1ms apart) is a statistical constraint that helps BSS algorithms

cross_pollination_opportunities:
  - Apply tensor decomposition (Tucker, CP) to multi-session, multi-electrode spike sorting — generalises ICA to 3D arrays
  - Audio source separation algorithms (deep learning BSS) can be adapted for spike waveform decomposition
  - Causal discovery methods (Granger causality) applied to ICA-separated neural signals provide functional connectivity
communication_gap: >
  Neuroscientists developing spike sorters rarely read the BSS literature.
  Signal processing researchers do not engage with neuroscience spike sorting
  benchmarks. The mathematical isomorphism is noted in Lewicki (1998) but the
  fields remain largely separate. Deep learning spike sorters (Kilosort 2,
  YASS) rediscovered mixture-model approaches from the ML literature.

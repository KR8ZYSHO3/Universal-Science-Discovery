id: b-viral-quasispecies-x-nk-rugged-landscape
title: >
  Viral quasispecies theory treats mutant clouds as error-prone replication distributions shifting across fitness ridges — sharing landscape metaphors with Kauffman NK models where epistatic coupling creates rugged fitness surfaces with many local optima — enabling borrowings between virology escape pathways and combinatorial optimization rhetoric used in evolutionary computation.
status: proposed
fields:
  - virology
  - evolutionary-biology
bridge_claim: >
  Eigen quasispecies equations describe evolution of genotype frequencies under mutation–selection balance — equilibrium structures resemble discrete landscape climbs with mutation allowing valley crossing analogous to noise-assisted transitions on rugged NK surfaces (informal analogy; viral biology adds finite-population and compartmental bottlenecks).
  NK landscapes tune epistatic ruggedness via K coupling parameters — mirroring experimental observations that epistasis shapes influenza hemagglutinin escape pathways — though mapping numeric K to amino-acid interaction graphs remains heuristic not literal identity.
translation_table:
  - field_a_term: Mutation rate μ per replication (virology)
    field_b_term: Neighborhood radius in landscape exploration heuristics (NK / evolutionary algorithms)
    note: Higher μ broadens cloud width akin to larger exploratory neighborhoods only qualitatively.
  - field_a_term: Error catastrophe threshold (Eigen)
    field_b_term: Loss of localization on landscapes under excessive noise in adaptive walks
    note: Conceptual alignment — distinct quantitative thresholds differ by orders of magnitude across domains.
  - field_a_term: Fitness valleys between antibody-selected peaks
    field_b_term: Low fitness NK saddles separating local optima
    note: Shared narrative for escape pathway planning in vaccine design discussions with computational metaphor caution.
communication_gap: >
  Virology papers cite empirical escape mutations without NK formalism; evolutionary computation NK papers seldom cite clinical antibody breadth assays validating ruggedness claims on specific viral proteins.
cross_pollination_opportunities:
  - >
    Fit NK-style ruggedness parameters from deep mutational scanning datasets into quasispecies models forecasting antigenic evolution under vaccine pressures — explicitly labeling epistasis inference uncertainty bands.
  - >
    Export adaptive walk algorithms from NK literature into computational pipelines annotating feasible mutation routes constrained by replication fidelity measured in vitro.

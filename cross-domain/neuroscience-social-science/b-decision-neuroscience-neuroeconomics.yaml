cross_pollination_opportunities:
  - Use pharmacological interventions (dopamine D2 receptor manipulation, oxytocin)
    to causally test whether vmPFC subjective value signals mediate willingness-
    to-pay changes — establishing causal rather than correlational neuroeconomics
  - Apply computational model comparison (maximum likelihood model selection) to
    test single-system vs. dual-system intertemporal discounting using jointly
    fitted behavioral and fMRI data
  - Use TMS to transiently disrupt TPJ during Ultimatum Game to test causality of
    the fairness computation — does TPJ disruption increase acceptance of unfair
    offers by impairing inequity aversion computation?
  - Develop real-time neurofeedback protocols targeting vmPFC activity during
    economic decisions to test whether volitional value signal modulation changes
    willingness-to-pay — closing the loop between decision neuroscience and
    behavioral intervention
communication_gap: >
  Behavioral economists rarely read Journal of Neuroscience; decision neuroscientists
  rarely engage with the full econometric toolkit of behavioral economics. The
  two communities use different methodological standards: economics requires
  incentive-compatible designs and structural models; neuroscience requires
  careful experimental controls and effect size estimation. The controversies
  (McClure dual-system model is contested; vmPFC reference dependence is debated)
  have been difficult to resolve because each community interprets the shared
  data through different theoretical frameworks and methodological lenses.

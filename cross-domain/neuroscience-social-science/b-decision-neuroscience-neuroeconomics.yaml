id: b-decision-neuroscience-neuroeconomics
title: >
  Neuroeconomics bridges behavioral economics and decision neuroscience by mapping
  economic utility functions onto neural substrates: vmPFC encodes subjective value,
  anterior insula encodes aversion, the beta-delta model of intertemporal choice
  maps to differential limbic vs. dlPFC activation, and TPJ computes fairness
  in social decisions — moving economics from axiomatic to mechanistic.
status: established
fields:
  - neuroscience
  - social-science
  - economics
  - cognitive-science
  - behavioral-economics
bridge_claim: >
  Neuroeconomics (Rangel et al. 2008) is the project of finding the neural
  implementation of economic choice processes. Ventromedial PFC (vmPFC) encodes
  subjective value: BOLD signal in vmPFC correlates with willingness-to-pay across
  items, consistent with a common currency for reward value (Plassmann et al. 2007).
  Anterior insula encodes aversion and risk: insula activation predicts rejection
  in Ultimatum Game (unfair offers), risk aversion, and loss aversion — not merely
  the valence of the stimulus but the behavioral response. Amygdala: processes
  ambiguity aversion (Ellsberg paradox) via differential activation for unknown
  vs. known probabilities. Intertemporal choice: the beta-delta hyperbolic
  discounting model (β for immediate, δ for future discounting) maps onto
  differential activation of limbic system (β, immediate gratification) vs.
  dorsolateral PFC (δ, future value) — McClure et al. (2004) Science, now partially
  contested. Social decisions: TPJ tracks belief attribution and fairness computation;
  dACC tracks effort cost; OFC encodes reward value reference-dependently.
  Neuroeconomics vs. behavioral economics: neuroeconomics discovers new phenomena
  (reference-dependent coding in vmPFC replaces the fixed utility function of
  classical economics) rather than merely validating known biases.
translation_table:
  - field_a_term: utility function U(x) (economics)
    field_b_term: subjective value signal in vmPFC (neuroscience)
    note: vmPFC BOLD signal is the neural correlate of the economic utility function — not fixed but reference-dependent
  - field_a_term: risk attitude (risk premium in expected utility)
    field_b_term: anterior insula / amygdala activation under uncertainty
    note: Insula activity predicts behavioral risk aversion independently of the expected value signal
  - field_a_term: hyperbolic discounting (beta-delta model)
    field_b_term: limbic vs. PFC temporal competition (McClure model)
    note: Beta-delta maps onto a dual-system neural architecture — now partially contested by single-system models
  - field_a_term: Ultimatum Game rejection (behavioral economics)
    field_b_term: insula activation predicting rejection of unfair offers
    note: Sanfey et al. (2003) showed insula activity predicts rejection — evidence of inequity aversion
  - field_a_term: reference-dependent preferences (Kahneman-Tversky)
    field_b_term: reference-dependent value coding in vmPFC and striatum
    note: Neural activity encodes gain/loss relative to reference point — consistent with prospect theory
  - field_a_term: Ellsberg paradox (ambiguity aversion)
    field_b_term: amygdala activation for unknown (Knightian) vs. known probabilities
    note: Amygdala activity is specifically elevated for ambiguous (unknown probability) choices
related_unknowns:

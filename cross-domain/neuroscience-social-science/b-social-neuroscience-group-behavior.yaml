id: b-social-neuroscience-group-behavior
title: >
  The mentalizing network (mPFC/TPJ/pSTS), social pain circuitry (dACC), and
  oxytocin-modulated trust form a neurobiological substrate for group-level
  social dynamics — social neuroscience makes the mechanisms of tribal economics,
  in-group cooperation, and social exclusion measurable as brain states.
status: established
fields:
  - neuroscience
  - social-science
  - psychology
  - economics
  - cognitive-neuroscience
bridge_claim: >
  Social neuroscience formalises the neural mechanisms underlying social behaviour
  that economists, sociologists, and political scientists have described at the
  group level, creating a multi-level account of cooperation, conflict, and
  inequality.

  Mentalizing network (Theory of Mind): three core regions — medial prefrontal
  cortex (mPFC), temporoparietal junction (TPJ), and posterior superior temporal
  sulcus (pSTS) — are selectively activated when inferring the mental states
  (beliefs, intentions, desires) of others (Frith & Frith 2006). This network
  is the biological substrate of "putting yourself in another's shoes" —
  a capacity whose breakdown (in autism spectrum conditions) produces profound
  social impairment. The mentalizing network is homologous in great apes,
  suggesting a deep evolutionary origin.

  Mirror neuron system (contested): premotor cortex (area F5 in macaques,
  Broca's area homologue in humans) and inferior parietal lobule contain neurons
  that discharge both when performing and when observing goal-directed actions.
  Originally proposed as the substrate for imitation learning and empathy
  (Rizzolatti & Craighero 2004). The role of mirror neurons in human social
  learning is actively contested — no direct single-neuron recording in humans
  confirms a homologous system.

  Social pain (Eisenberger et al. 2003): social exclusion in the Cyberball paradigm
  (being left out of a ball-tossing game played with computerised avatars) activates
  the dorsal anterior cingulate cortex (dACC) and anterior insula — the same regions
  activated by physical pain. This was the first fMRI evidence that social exclusion
  literally "hurts" in a neurobiologically meaningful sense. Subsequent work showed
  that acetaminophen (paracetamol) reduces both physical and social pain ratings.
  Social pain → dACC activation → physiological stress response → health outcomes.

  Oxytocin (Kosfeld et al. 2005): intranasal oxytocin increases trust in economic
  trust games (investor transfers more money to trustee), a result that triggered
  an enormous literature. Subsequent meta-analyses show oxytocin effects are
  context-dependent: increased in-group cooperation, but decreased out-group trust
  (de Dreu et al. 2010 "parochial altruism"). A neuropeptide directly modulates
  the tribal economic behaviour (in-group/out-group discrimination) studied by
  economists and political scientists as ethnic diversity effects on public goods.

  Social baseline theory (Coan & Sbarra 2015): humans are fundamentally
  load-sharing animals. Social proximity reduces threat-related neural activity
  (right prefrontal cortex) because the brain calculates that a threat can be
  shared across the social network — reducing the metabolic cost of defensive
  preparation. Social isolation is metabolically costly; social connection is
  the biological baseline, not a luxury. This reframes social determinants of
  health in terms of predictive allostatic load regulation.
translation_table:
  - field_a_term: mPFC/TPJ/pSTS mentalizing network activation
    field_b_term: Theory of Mind capacity (social understanding of others' beliefs)
    note: fMRI localisation of a cognitive capacity studied for decades in developmental psychology
  - field_a_term: dACC activation during social exclusion
    field_b_term: social pain (psychological experience of ostracism)
    note: bridges neuroscience measurement to social psychological construct
  - field_a_term: oxytocin receptor density in nucleus accumbens and amygdala
    field_b_term: in-group trust level in public goods games (economics)
    note: neuropeptide system maps onto economic game-theoretic parameter
  - field_a_term: mirror neuron discharge pattern (observation + execution)
    field_b_term: imitation learning and cultural transmission rate
    note: "contested: direct neuroscience-level explanation of anthropological observation"
  - field_a_term: allostatic load reduction with social proximity (right PFC)
    field_b_term: health benefits of social integration (epidemiology)
    note: social baseline theory mechanistically explains Holt-Lunstad meta-analysis results
  - field_a_term: parochial altruism (oxytocin increases in-group, decreases out-group cooperation)
    field_b_term: ethnic homogeneity effects on public goods provision (Putnam 2007)
    note: same behavioural pattern described at different levels of analysis

cross_pollination_opportunities:
  - >
    Economic field experiments combining intranasal oxytocin administration
    with multi-person public goods games in ecologically valid settings (actual
    community cooperation decisions) would test whether parochial altruism
    effects are large enough to matter for policy-relevant cooperation dilemmas
    — bridging the laboratory trust game to real-world ethnic diversity effects.
  - >
    Longitudinal neuroimaging studies linking mentalizing network connectivity
    to social capital measures (Putnam's bonding vs. bridging social capital)
    would test whether individuals with stronger mPFC-TPJ connectivity show
    higher levels of civic participation — a causal test of social neuroscience
    predictions for political behaviour.
communication_gap: >
  Social neuroscience emerged from neuroscience (looking for brain bases of social
  behaviour) while social science developed macro-level theories without neural
  constraint. Economists built formal models of trust and cooperation (game theory)
  without biological grounding. The Kosfeld et al. (2005) oxytocin paper appeared
  in Nature and created enormous media and scientific attention, but social scientists
  were often sceptical of reductionism — behavioural economics and social neuroscience
  have only partially integrated. The mirror neuron controversy has made neuroscientists
  cautious about strong claims, while social scientists interpret this as the entire
  bridging programme being suspect. The social baseline theory has not penetrated
  mainstream sociology or political science.

id: b-collective-intelligence-swarm
title: "Collective Intelligence and Swarm Cognition — wisdom of crowds, bee quorum sensing, ant pheromone optimisation, and murmuration phase transitions link neuroscience to social decision-making"
status: established
fields:
  - neuroscience
  - social-science
  - behavioural-ecology
  - complex-systems
  - cognitive-science

bridge_claim: >
  Groups can exhibit collective intelligence exceeding individual expertise under
  specific conditions. The wisdom of crowds (Galton 1907): 787 estimates of an
  ox's weight at a county fair averaged to 1207 lbs — the true weight was 1198 lbs.
  Surowiecki (2004) identified four necessary conditions: independence of estimates,
  diversity of information, decentralised structure, and an aggregation mechanism.
  When these conditions fail — correlated errors (common information), social
  pressure, or cascades — crowds become irrational (Bikhchandani cascades, Janis
  groupthink). Swarm intelligence: ant colonies solve shortest-path optimisation
  problems via stigmergic pheromone dynamics — ants deposit pheromone proportional
  to path quality; evaporation prevents lock-in on suboptimal paths; positive
  feedback reinforces short routes → ACO (Ant Colony Optimisation) algorithms.
  Honeybee quorum sensing for nest-site selection (Seeley et al. 2012): scout bees
  dance for different sites; positive feedback amplifies the best site; stop signals
  (head-butting competing scouts) provide inhibition; decision is reached when a
  quorum (~15 bees) are simultaneously present at one site — typically in 12–24 hours.
  This is a distributed neural computation: no single bee knows the outcome.
  Collective animal behaviour: murmurations of starlings exhibit dynamic phases
  analogous to ferromagnetism — above a critical density, local alignment rules
  (match orientation with 6–7 nearest neighbours, Ballerini 2008) produce long-
  range ordered flight; below, disordered individual motion. The order–disorder
  transition has a correlation length spanning the entire flock — characteristic
  of a system poised near criticality. Couzin (2009) modelled collective motion
  with three zones: repulsion, alignment, attraction — rich emergent phases from
  three parameters.

translation_table:
  - field_a_term: "independence, diversity, aggregation (wisdom of crowds conditions)"
    field_b_term: "conditions for accurate collective judgment exceeding individual expertise"
    note: "Violation of any condition (correlation, hierarchy, cascade) degrades collective intelligence below individual level"
  - field_a_term: "pheromone evaporation rate (ACO parameter)"
    field_b_term: "exploration-exploitation balance in ant foraging"
    note: "High evaporation rate: more exploration, slow convergence; low rate: fast convergence but risk of local optima"
  - field_a_term: "bee quorum threshold (N scouts at one site)"
    field_b_term: "distributed decision rule without central controller"
    note: "Quorum sensing is robust: increases threshold → slower but more accurate decisions; used for site quality discrimination"
  - field_a_term: "stop signal (head-butting competing dancing scouts)"
    field_b_term: "lateral inhibition mechanism preventing commitment to suboptimal choice"
    note: "Stop signal rate is proportional to dance vigor for competing sites — implements weighted voting with inhibition"
  - field_a_term: "topological interaction (align with 6–7 nearest neighbours)"
    field_b_term: "scale-free correlation in murmuration enabling coherent collective response"
    note: "Topological (not metric) neighbourhood makes flocking robust to density variation — perturbations propagate across entire flock"
  - field_a_term: "order-disorder phase transition in collective motion"
    field_b_term: "ferromagnetic-like alignment transition in animal flocks"
    note: "Vicsek model (1995): above critical density, local alignment rules produce spontaneous symmetry breaking → ordered flock"


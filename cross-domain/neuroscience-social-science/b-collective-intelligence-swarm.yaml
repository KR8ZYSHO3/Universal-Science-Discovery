cross_pollination_opportunities:
  - "Design human collective decision systems (prediction markets, deliberative polling) that replicate the conditions for wisdom-of-crowds accuracy, avoiding cascade and groupthink"
  - "Apply bee quorum sensing principles to distributed robotic swarm coordination for search-and-rescue — minimal communication overhead, robust to individual failure"
  - "Use murmuration criticality as a model for neural criticality: if brain networks operate near phase transitions for maximal information transmission, the same physics governs both systems"

communication_gap: >
  Research on human collective intelligence (social psychology, economics,
  political science), animal swarm intelligence (ethology, evolutionary biology),
  and the physics of collective motion (statistical physics) are largely separate
  literatures. The mathematical connections — particularly the shared framework of
  phase transitions, positive feedback, and inhibition — are rarely made explicit.
  The neuroscience-social science bridge is weak: neuroscientists study individual
  decision-making; social scientists study group-level outcomes; the mechanistic
  level connecting neural circuits to social computation is largely unexplored.


id: b-neurolyme-neuroinflammation
title: >
  Lyme neuroborreliosis links blood-brain barrier biology (neuroscience) to
  TLR-mediated cytokine signaling (immunology) through a BBB-crossing and
  neuroinflammation cascade that can become self-sustaining after bacterial
  clearance.
status: proposed
fields:
  - neuroscience
  - immunology
  - neuroimmunology
  - infectious-disease
bridge_claim: >
  Lyme neuroborreliosis (LNB) requires understanding at two levels that belong
  to different research communities. Neuroscience side: Borrelia crosses the
  blood-brain barrier (BBB) via a Trojan-horse mechanism — infecting perivascular
  macrophages or transcytosing directly through brain endothelial cells —
  disrupting tight-junction proteins (claudin-5, occludin) and increasing BBB
  permeability. Within the CNS, Borrelia activates microglia and astrocytes;
  reactive astrogliosis damages myelin (producing MS-like MRI lesions) and
  suppresses hippocampal neurogenesis (causing memory and cognitive impairment).
  Immunology side: the activation mechanism is TLR2/TLR1 recognition of Borrelia
  lipoproteins (BbBmpA, OspC) → MyD88 → NFκB → IL-6, IL-8, TNF-α, CXCL13
  cytokine storm detectable in CSF. CXCL13, the B-cell chemoattractant, is
  currently the most sensitive CSF biomarker for active LNB.
  The critical bridge claim: post-infectious PTLDS cognitive symptoms may be
  caused by a self-sustaining reactive astrogliosis/microglial activation loop
  that persists after Borrelia clearance — a neuroimmune phenomenon studied
  extensively in MS and TBI but not investigated in PTLDS. If confirmed, the
  correct treatment for PTLDS cognitive symptoms would be anti-neuroinflammatory
  therapy (e.g., IL-6 receptor blockade with tocilizumab) rather than repeated
  antibiotics — a treatment paradigm shift requiring both neuroscience and
  immunology to collaborate.
translation_table:
  - field_a_term: BBB tight-junction permeability increase (neuroscience)
    field_b_term: CNS immune surveillance access (immunology)
    note: Increased BBB permeability enables CNS infiltration by peripheral immune cells, amplifying neuroinflammation
  - field_a_term: Microglial M1 activation state (neuroscience)
    field_b_term: TLR2/NFκB-driven pro-inflammatory cytokine production (immunology)
    note: Microglial activation is the cellular substrate; TLR2/NFκB is the molecular mechanism — rarely described together
  - field_a_term: Reactive astrogliosis (neuroscience)
    field_b_term: IL-6/STAT3-driven glial scar formation (immunology)
    note: Astrogliosis is driven by IL-6 signaling (JAK/STAT3); blocking IL-6R is testable as therapy
  - field_a_term: Hippocampal neurogenesis suppression (neuroscience)
    field_b_term: TNF-α-mediated neural progenitor inhibition (immunology)
    note: TNF-α directly suppresses hippocampal neural progenitor proliferation — links cytokine excess to cognitive symptoms
  - field_a_term: CXCL13 in CSF (clinical neurology biomarker)
    field_b_term: B-cell chemoattractant / intrathecal B-cell response marker (immunology)
    note: CXCL13 bridges the clinical neurology and immunology communities as the most diagnostically useful LNB biomarker
related_unknowns:
  - u-ptlds-neuroinflammation-self-sustaining
related_hypotheses:
  - h-ptlds-neuroinflammation-il6-blockade
cross_pollination_opportunities:
  - Longitudinal CSF biomarker study in PTLDS patients (CXCL13, IL-6, TNF-α, GFAP, neurofilament light chain) to test whether neuroinflammatory markers persist after antibiotic clearance of Borrelia
  - Randomized controlled trial of tocilizumab (IL-6R blocker) in PTLDS patients with documented cognitive impairment (NeuroQoL battery) and elevated CSF CXCL13 at baseline
  - Animal model (C3H/HeN mouse) studies using intracranial cytokine profiling pre/post antibiotic treatment to characterize self-sustaining astrogliosis after Borrelia clearance
  - MRI and PET neuroimaging of PTLDS patients for white-matter lesion burden, microglial activation (TSPO PET), and hippocampal volume loss, correlated with cognitive symptoms
communication_gap: >
  Lyme neuroborreliosis is primarily managed by infectious disease specialists
  and neurologists who focus on antibiotic treatment. Neuroimmunologists who
  study self-sustaining neuroinflammation (from MS, TBI, and neurodegeneration
  research) rarely attend Lyme disease conferences. The concept of post-infectious
  self-sustaining astrogliosis is well-established in the neurodegeneration
  literature (Sofroniew 2015) but has not been formally tested in PTLDS. This
  communication gap may be directly responsible for the lack of anti-inflammatory
  treatment trials in PTLDS over the past 20 years.

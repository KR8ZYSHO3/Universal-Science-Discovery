cross_pollination_opportunities:
  - >
    Homotopy type theory (HoTT) identifies proof isomorphisms with
    homotopy equivalences, making the Curry-Howard correspondence
    three-way: logic ↔ computation ↔ homotopy theory. Applying HoTT
    to program verification would allow reasoning about program
    equivalence using topological tools — homotopy invariants as program
    correctness certificates.
  - >
    Quantum computing and quantum logic (Birkhoff-von Neumann quantum
    logic) suggest a "quantum Curry-Howard" correspondence where quantum
    propositions (projections on Hilbert space) correspond to quantum
    types and quantum proofs correspond to quantum programs (quantum
    circuits). Developing this would give a type-theoretic foundation for
    quantum programming languages (Quipper, QWIRE, Proto-Quipper).
  - >
    Linear logic (Girard 1987) introduces resource sensitivity: a
    proposition/type can be used exactly once. The Curry-Howard
    correspondent is linear type systems, which prevent use-after-free
    memory errors in systems programming. Rust's borrow checker is a
    partial implementation of linear type theory. Completing the
    correspondence between substructural logics and resource-typed
    programming languages could give formal verification tools for
    systems with physical resource constraints (energy, memory bandwidth).
communication_gap: >
  The Curry-Howard isomorphism is well-known in programming language
  theory and type theory, where it has driven decades of research on
  proof assistants. However, it is almost entirely absent from standard
  mathematics education, where logic and computation are taught
  separately. Working mathematicians using proof assistants often do not
  conceptualise what they are doing as programming; conversely, most
  software engineers have never heard of the correspondence that
  underlies the type systems they use daily. The categorical completion
  (Curry-Howard-Lambek) is understood mainly in theoretical computer
  science and category theory communities.

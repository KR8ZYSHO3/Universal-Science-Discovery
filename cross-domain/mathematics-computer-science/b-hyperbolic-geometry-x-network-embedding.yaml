id: b-hyperbolic-geometry-x-network-embedding
title: Hyperbolic geometry provides exponentially more room in a ball of fixed radius than
  Euclidean space, making it a natural host geometry for embeddings of trees and scale-free
  hierarchical networks.
status: established
fields:
- mathematics
- computer-science
- network-science
- geometry
bridge_claim: 'Trees embed with low distortion in hyperbolic space because distances grow
  like logs of branching depth, matching the volume growth of hyperbolic balls. Poincaré and
  Lorentz models therefore yield compact embeddings for hierarchical similarity structure
  that would require high-dimensional Euclidean embeddings. Machine learning uses Riemannian
  optimization to learn embeddings that preserve local graph neighborhoods while respecting
  global ultrametric-like organization. The bridge links classical hyperbolic geometry to
  representation learning: curvature becomes a trainable global parameter controlling how
  aggressively distant leaves are separated.'
translation_table:
- field_a_term: negative curvature κ < 0
  field_b_term: trainable embedding space curvature
- field_a_term: hyperbolic distance
  field_b_term: graph reconstruction loss in embedding space
- field_a_term: exponential volume growth
  field_b_term: capacity for many leaves at similar graph depth

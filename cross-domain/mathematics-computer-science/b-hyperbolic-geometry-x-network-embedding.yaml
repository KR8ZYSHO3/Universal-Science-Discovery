cross_pollination_opportunities:
- Use hyperbolic word embeddings to test whether phylogenetic trees and lexical taxonomies
  share distortion signatures.
- Apply hyperbolic graph neural networks to protein–protein interaction graphs with known
  hierarchical modules.
communication_gap: Differential geometers discuss curvature abstractly, while ML papers often
  treat hyperbolic models as engineering tricks without stating identifiability limits for
  empirical networks.

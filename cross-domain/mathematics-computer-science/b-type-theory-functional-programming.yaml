related_hypotheses:
  - h-dependent-types-industrial-systems-programming-feasibility
cross_pollination_opportunities:
  - >
    Certified compilation (CompCert, CakeML): applying proof-assistant verified
    compiler correctness to production compilers could eliminate entire classes of
    compiler bugs — connecting formal mathematics to systems software reliability.
    Currently a research prototype; scaling to production compilers is an open problem.
  - >
    Program synthesis from types: if types are specifications (propositions) and
    programs are proofs, then proof search algorithms become program synthesis
    algorithms. LLM-guided proof search (Lean + AI) is an emerging approach to
    automated mathematics.
communication_gap: >
  Type theory researchers (in mathematics and PL theory) develop expressive type
  systems and prove their properties; systems programmers who use Rust's borrow
  checker daily are largely unaware that it instantiates affine type theory from
  linear logic (Girard 1987). The HoTT program is known in algebraic topology and
  type theory communities but is rarely discussed in mainstream CS curricula.

cross_pollination_opportunities:
  - >
    Categorical databases (Functorial Query Language): database schemas and
    migrations as functors enables formally verified data integration and
    schema evolution. Spivak's categorical approach has been implemented in
    the FQL query language, representing a direct application of category
    theory to database engineering.
  - >
    Dependent types from homotopy type theory (HoTT): the univalence axiom
    (equivalent types are equal) gives a foundation where equality = homotopy.
    Proof assistants (Agda, Coq, Lean) implementing HoTT could verify
    mathematical theorems as compiled type-checked programs — connecting
    formal mathematics directly to software verification.
communication_gap: >
  Pure mathematicians (category theory) and software engineers (functional
  programming) have largely parallel but disconnected communities. Category
  theory courses rarely mention programming; most programmers learn monads
  from blog posts without understanding the mathematical foundations. The
  Haskell community and the applied category theory community (MIT, Topos
  Institute) are the main bridges. Industry adoption (Scala, Kotlin, Rust)
  is increasing functional programming use, but the categorical foundations
  remain opaque to most practitioners.

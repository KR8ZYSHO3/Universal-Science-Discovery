cross_pollination_opportunities:
  - >
    Proof assistants (Lean 4, Coq, Isabelle) implement Curry-Howard directly,
    enabling formal verification of mathematical proofs (Feit-Thompson theorem,
    four-color theorem) and safety-critical software — a practical payoff of
    the logic-computation correspondence with direct engineering applications.
  - >
    MIP* = RE (Ji et al. 2020) uses quantum entanglement to collapse the
    interactive proof hierarchy — the proof also refutes Connes' embedding
    conjecture (1976) in operator algebra, showing a completely unexpected
    connection between quantum information theory and functional analysis.
communication_gap: >
  Mathematical logicians, complexity theorists, and type theorists each
  developed their own language (proof theory, circuit complexity, type systems)
  to study the same foundational questions. Curry-Howard is widely known in
  programming language theory but not in logic or complexity theory. Most
  computer science curricula separate algorithms from logic; the deep
  connections (diagonalization, Kolmogorov complexity, circuit lower bounds)
  are graduate-level topics rarely encountered by practitioners.

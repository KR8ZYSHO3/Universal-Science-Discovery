id: b-complexity-proof-theory
title: >
  The Cook-Levin theorem (1971) establishes SAT as NP-complete; Gödel's
  incompleteness theorems and Turing's halting problem both derive from
  diagonalization; the Curry-Howard correspondence identifies programs with
  proofs and types with propositions; interactive proof systems (IP=PSPACE)
  reveal that probabilistic verification is exponentially more powerful
  than deterministic checking — mathematics and computer science study the
  same logical limits from different directions.
status: established
fields:
  - mathematics
  - logic
  - computer-science
  - complexity-theory
  - proof-theory
  - type-theory
bridge_claim: >
  The Cook-Levin theorem (Cook 1971, Levin 1973): SAT is NP-complete — every
  problem in NP polynomially reduces to Boolean satisfiability. P vs NP
  (Clay Millennium Problem): does every efficiently verifiable problem have an
  efficient solution? Geometric complexity theory (Mulmuley & Sohoni 2001) attacks
  this using algebraic geometry and representation theory: P≠NP iff the permanent
  polynomial is not in the VP complexity class, which requires proving
  representation-theoretic obstructions. Diagonalization unifies computability
  and logic: Turing's halting problem proof (1936) and Gödel's first
  incompleteness theorem (1931) both construct self-referential objects via
  diagonal argument. Curry-Howard correspondence: for simply-typed lambda calculus,
  propositions = types, proofs = programs, proof normalization = program execution.
  This extends to dependent type theory (Martin-Löf) where the type system is
  strong enough to express all mathematical theorems — implemented in Coq, Agda,
  Lean. Interactive proofs (Goldwasser-Micali-Rackoff 1985): IP = PSPACE
  (Shamir 1992) — a prover with unbounded computation and a probabilistic verifier
  can check any PSPACE statement in polynomial time with exponentially small
  error. MIP* = RE (Ji et al. 2020): multi-prover interactive proofs with quantum
  entanglement can verify recursively enumerable (undecidable!) problems.
translation_table:
  - field_a_term: Boolean satisfiability (SAT) — NP-complete under Cook-Levin
    field_b_term: Hilbert's Entscheidungsproblem — undecidable under Church-Turing
    note: SAT is the computational analog of the decision problem at finite resource bounds
  - field_a_term: Gödel sentence (true but unprovable in PA)
    field_b_term: non-halting Turing machine (runs forever, no output)
    note: both exploit self-reference; Kleene's recursion theorem unifies them formally
  - field_a_term: proposition P in intuitionistic logic
    field_b_term: type T in simply-typed lambda calculus (Curry-Howard)
    note: proof of P = program of type T; inhabited type = provable proposition
  - field_a_term: PSPACE (space-bounded computation)
    field_b_term: "IP interactive proof power (Shamir: IP = PSPACE)"
    note: randomness allows efficient verification of exponentially many possibilities
  - field_a_term: permanent polynomial (VNP-complete)
    field_b_term: determinant polynomial (VP-complete, efficiently computable)
    note: "Valiant: if perm in VP then #P ⊆ poly — implies P≠NP under derandomization"

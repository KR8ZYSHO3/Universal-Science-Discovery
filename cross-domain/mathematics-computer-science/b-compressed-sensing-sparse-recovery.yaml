cross_pollination_opportunities:
  - >
    Compressed sensing applied to neuroscience: neural population activity is
    sparse (typically <5% of neurons fire in any 20 ms window). Calcium imaging
    and multi-electrode arrays can acquire m << n neural measurements if the
    recording matrix satisfies RIP. This would allow whole-brain recording at
    cellular resolution with dramatically fewer electrodes, enabling closed-loop
    brain-machine interfaces.
  - >
    Compressive genomics: the human genome has n=3×10⁹ base pairs but only
    k~10⁴ causal variants for most diseases. GWAS requires n>>k measurements;
    compressed sensing theory suggests m=O(k log n)~10⁵ pooled samples could
    recover all causal variants — orders of magnitude cheaper than individual
    sequencing at population scale.
  - >
    Deep learning and compressed sensing: neural networks learn implicit sparse
    representations. The connection between weight sparsity in neural networks
    and the RIP condition of the weight matrix is unexplored. Compressed sensing
    theory could provide bounds on the minimum number of training examples needed
    to learn a k-sparse function.
communication_gap: >
  Compressed sensing was developed by applied mathematicians and signal
  processing engineers. Statisticians developed LASSO independently for
  regression problems. The formal equivalence (LASSO = basis pursuit under
  different noise models) was recognised within a few years, but the
  communities still publish in separate venues (IEEE Transactions on Information
  Theory / Applied and Computational Harmonic Analysis vs. Annals of Statistics /
  Journal of the Royal Statistical Society). Medical imaging adopted CS
  aggressively (FDA approved compressed sensing MRI in 2017), while clinical
  communities were unaware of the underlying mathematical theory.

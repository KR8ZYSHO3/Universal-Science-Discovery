id: b-compressed-sensing-sparse-recovery
title: >
  Compressed sensing (Candès-Romberg-Tao, Donoho 2006) proves that k-sparse
  signals in ℝⁿ can be exactly recovered from m = O(k log n/k) random linear
  measurements via ℓ₁ minimisation — far fewer than the n measurements required
  by the Shannon-Nyquist theorem — creating a mathematical foundation for
  sub-Nyquist sampling that has revolutionised MRI, radar, and high-dimensional
  statistics.
status: established
fields:
  - mathematics
  - computer-science
  - statistics
  - signal-processing
  - applied-mathematics
bridge_claim: >
  The Shannon-Nyquist sampling theorem states that a band-limited signal must
  be sampled at twice the highest frequency to allow perfect reconstruction.
  For a signal with n degrees of freedom, n measurements are required.
  Compressed sensing (CS) breaks this barrier for sparse signals.

  Candès, Romberg & Tao (2006) and Donoho (2006) independently proved: if a
  signal x ∈ ℝⁿ has at most k nonzero entries (k-sparse), it can be
  reconstructed exactly from m = O(k log(n/k)) linear measurements y = Ax,
  where A ∈ ℝ^{m×n} is a random Gaussian or Bernoulli matrix, with m << n.
  The reconstruction algorithm is ℓ₁ minimisation (LASSO):
    min ||x||₁  subject to  Ax = y
  The ℓ₁ norm promotes sparsity: it is the convex relaxation of the ℓ₀ norm
  (count of nonzero entries), and ℓ₁ minimisation recovers the same solution
  as the NP-hard ℓ₀ problem when A satisfies the Restricted Isometry Property
  (RIP): for all k-sparse vectors x, (1-δ)||x||₂ ≤ ||Ax||₂ ≤ (1+δ)||x||₂.
  Random matrices satisfy RIP with high probability when m = O(k log(n/k)).

  The mathematical connection to statistics: Tibshirani (1996) introduced the
  LASSO (Least Absolute Shrinkage and Selection Operator) for variable selection
  in regression with ℓ₁ penalty on coefficients. Compressed sensing provides
  the theoretical foundation explaining why ℓ₁ minimisation recovers sparse
  solutions: the geometry of the ℓ₁ ball has corners aligned with sparse
  solutions, making the constraint ||Ax=y|| tangent to a sparse vertex.

  The connection to computer science: the RIP condition is related to the
  Johnson-Lindenstrauss lemma (random projections approximately preserve
  pairwise distances). The algorithmic complexity of sparse recovery is
  O(m²n) for basis pursuit (convex optimisation) and O(mn log n) for greedy
  algorithms (matching pursuit, OMP). These are tractable for large problems.

  Applications that the mathematics enabled:
  1. MRI (Lustig et al. 2007): MRI measures k-space (Fourier domain) — if the
     image is sparse in wavelets, 10× fewer k-space samples needed → scan time
     reduced from 30 to 3 minutes for cardiac MRI.
  2. Single-pixel camera (Rice University): one photodetector + random
     optical modulator acquires compressed measurements; reconstruct full image
     via ℓ₁ minimisation. Works in infrared where detector arrays are expensive.
  3. Seismic imaging: seismic data is acquired sparsely (shot spacing >> required
     by Nyquist); CS reconstructs full seismic volumes.
  4. Genomics: compressed sensing applied to pooled genetic testing — test n
     samples with m < n pool tests; recover individual test results if sparsity
     (infection rate) is low (used in COVID-19 pooled testing).
translation_table:
  - field_a_term: "k-sparse signal (at most k nonzeros out of n) (mathematics)"
    field_b_term: "Parsimonious model: few active features in a high-dimensional dataset"
    note: Sparsity is the mathematical formalisation of Occam's razor
  - field_a_term: "Restricted Isometry Property (RIP) of measurement matrix A"
    field_b_term: "Near-orthogonality of regressor columns in statistics (low coherence)"
    note: RIP is the condition guaranteeing LASSO recovers sparse solution exactly
  - field_a_term: "ℓ₁ minimisation (LASSO, basis pursuit)"
    field_b_term: "Sparse variable selection in high-dimensional regression"
    note: Formally identical; compressed sensing provides exact recovery guarantees for LASSO
  - field_a_term: "Random Gaussian measurement matrix A (compressed sensing)"
    field_b_term: "Random projection / dimensionality reduction (Johnson-Lindenstrauss)"
    note: Both rely on random matrices satisfying RIP/JL with high probability
  - field_a_term: "Shannon-Nyquist rate (n measurements for n-dimensional signal)"
    field_b_term: "Classical statistics: need n observations to estimate n parameters"
    note: CS breaks the Nyquist barrier; high-dimensional statistics needs p << n regularisation
  - field_a_term: "Sparsity in wavelet domain (MRI image)"
    field_b_term: "Feature sparsity in biological signals (few active genes, sparse neural codes)"
    note: Natural images are wavelet-sparse; many biological signals are similarly sparse

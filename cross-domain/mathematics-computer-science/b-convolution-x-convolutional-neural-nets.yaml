id: b-convolution-x-convolutional-neural-nets
title: Discrete convolution — diagonalized by the discrete Fourier transform via the convolution
  theorem — is the algebraic backbone of convolutional neural networks’ local translation-equivariant
  layers.
status: established
fields:
- mathematics
- computer-science
- signal-processing
- machine-learning
bridge_claim: 'The convolution theorem states that convolution becomes pointwise multiplication
  in the Fourier domain (with appropriate boundary conditions). CNNs implement spatial convolution
  with learned kernels, enforcing locality and weight sharing that realize a shift-equivariant
  linear operator. In infinite or toroidal settings, convolutions are diagonal in Fourier
  eigenbases; on finite images with zero-padding, exact diagonalization is approximate but
  the spectral picture guides understanding of low-pass and band-pass behavior. The bridge
  connects classical DSP to deep learning inductive bias: depth stacks localized spectral
  filters while nonlinearities create effective multiscale representations analogous to filter
  banks.'
translation_table:
- field_a_term: circular convolution / FFT
  field_b_term: fast correlation filters in some architectures
- field_a_term: transfer function of FIR filter
  field_b_term: effective frequency response of a learned kernel
- field_a_term: windowing / edge effects
  field_b_term: boundary artifacts in padded convolutions

cross_pollination_opportunities:
- Design CNN initialization using classical filter-bank constraints informed by Fourier analysis.
- Use spectral visualization tools from audio DSP to audit spatial frequency biases in medical
  imaging CNNs.
communication_gap: ML courses emphasize backprop; signal-processing courses emphasize FFT
  convolution. Practitioners overlap, but pedagogy rarely states the convolution theorem when
  teaching stride and dilation.

cross_pollination_opportunities:
  - >
    Algebraic geometry codes (Goppa codes, Algebraic Geometry codes from curves):
    the intersection of algebraic geometry and coding theory produced codes achieving
    the Gilbert-Varshamov bound (Tsfasman-Vlăduţ-Zink 1982). These codes are now
    used in post-quantum cryptography (McEliece cryptosystem based on Goppa codes).
    The Weil conjectures (proved by Deligne 1974) on zeta functions of varieties over
    finite fields directly determine the parameters of algebraic geometry codes —
    connecting deep number theory to practical error-correcting codes.
  - >
    Isogeny-based cryptography (SIKE — broken 2022, but follow-on work continues):
    isogenies between elliptic curves provide a mathematical structure that resists
    both classical and quantum attacks (Shor's algorithm doesn't apply). The
    mathematical theory (Tate's theorem, endomorphism rings of supersingular elliptic
    curves) is deep algebraic number theory from the 1960s-70s being applied to
    post-quantum security — a 50-year delayed translation.
communication_gap: >
  Number theory was considered the purest of pure mathematics — G.H. Hardy famously
  celebrated its uselessness. The RSA paper (1978) imported Euler's totient theorem
  (1763) directly into practical communication security 215 years after its statement.
  Elliptic curves were studied by Fermat, Euler, and Abel for intrinsic mathematical
  interest; their application to cryptography (Miller 1985, Koblitz 1987) came 200 years
  later. NIST PQC standardization required number theorists, computer scientists,
  and security engineers to collaborate — communities that rarely share publications,
  conferences, or even mathematical vocabulary.

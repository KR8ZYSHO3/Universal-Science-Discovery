id: b-skin-depth-shielding-x-financial-firewall-layers
title: >
  Electromagnetic skin depth and layered shielding ↔ depth and segmentation of financial “firewalls”
  between institutions (engineering ↔ economics; analogy strength moderate)
status: proposed
fields:
  - electromagnetism
  - engineering
  - economics
  - risk-management
bridge_claim: >
  Good conductors attenuate time-harmonic fields exponentially with depth set by the skin depth
  delta ~ sqrt(2/(omega mu sigma)), so successive metal layers separated by gaps act as cascaded exponential
  attenuators. Financial regulation analogously stacks capital buffers, ring-fencing, and resolution
  entities to attenuate shock propagation between balance sheets. The mapping is heuristic: sigma is not
  literally bank leverage, and human/legal “penetration” includes correlated wrong-way risk and regulatory
  arbitrage absent from Maxwell’s equations. Still, both domains optimize layered attenuation against
  externally driven disturbances with frequency-dependent effectiveness (short-horizon shocks vs slow
  macro stress).
translation_table:
  - field_a_term: skin depth delta(omega)
    field_b_term: effective shock penetration depth into a ring-fenced group
    note: Higher frequency EM ↔ faster market shocks; deeper attenuation requires thicker “stack” or higher effective conductivity analog.
  - field_a_term: surface impedance / boundary conditions at each interface
    field_b_term: contractual triggers, collateral haircuts, and early-warning covenants
    note: Discontinuities in material properties map loosely to step changes in loss-absorption rules.
  - field_a_term: shielded-enclosure leakage through seams and apertures
    field_b_term: residual exposure through off-balance-sheet vehicles and correlated counterparty channels
    note: Dominant failure mode is often the gap, not bulk material—parallel to regulatory perimeter leaks.
related_unknowns:
  - u-em-skin-depth-financial-firewall-mapping-limits
related_hypotheses:
  - h-layered-em-shielding-financial-firewall-depth-ratio-analogy
cross_pollination_opportunities:
  - Stress-test EM enclosures with controlled slot leakage and compare to graph-based stress tests with controlled “slot” edges in exposure networks.
  - Import sensitivity-bandwidth language from robust control to discuss which shock frequencies bypass which firewall layers.
communication_gap: >
  Analogy strength: moderate. RF engineers quantify shielding with S-parameters and seam geometry; risk
  officers quantify loss given default and network contagion with different data. The exponential-decay
  picture is pedagogically useful but easy to overfit to balance-sheet narratives without empirical
  calibration. Specialists rarely share measurement protocols or uncertainty budgets across the boundary.
references:
  - doi: "10.1109/TEMC.2008.2005285"
    note: "Konefal et al. (2009) — shielding effectiveness and practical enclosure leakage themes (methods anchor)."
  - doi: "10.1093/rfs/hhm043"
    note: "Gai & Kapadia (2010) — financial network contagion thresholds (network-side anchor for the analogy)."
last_reviewed: "2026-05-07"

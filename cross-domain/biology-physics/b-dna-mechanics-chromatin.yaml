cross_pollination_opportunities:
  - >
    Polymer physics theory of confinement (DNA in nuclei, bacterial chromosomes
    in 1-2 µm cells) predicts conformational properties that can now be tested
    by super-resolution microscopy (ORCA-FISH, multiplexed imaging). Polymer
    physicists (developing field-theoretic simulations of chromatin) should
    collaborate with cell biologists measuring TAD positions in single cells
    to test whether the equilibrium polymer model or an active loop extrusion
    model better explains observed contact frequencies.
  - >
    Topoisomerase II inhibitors (doxorubicin, etoposide) are front-line chemotherapy
    agents that trap the enzyme-DNA covalent complex. The quantitative relationship
    between supercoiling stress, topoisomerase trapping probability, and cell death
    requires polymer physics input (supercoiling buildup kinetics) — collaboration
    between biophysicists modeling DNA mechanics and oncologists designing dosing
    schedules could optimize therapeutic windows.
communication_gap: >
  DNA polymer physics (published in J Chem Phys, Macromolecules, Biophys J) uses
  Kratky-Porod model and path integral formulations inaccessible to most molecular
  biologists. Molecular biologists doing chromatin biology (Cell, Nature, Science)
  rarely engage with the polymer physics literature. The topological language
  (writhe, linking number, White-Calugareanu) requires training in knot theory that
  most biologists lack. Hi-C data analysis borrows from statistical physics (mean-field
  compartment models) but the connection is rarely made explicit. Loop extrusion
  theory was proposed by polymer physicists (Alipour-Marko 2012) but only adopted
  by cell biologists after direct experimental visualization.

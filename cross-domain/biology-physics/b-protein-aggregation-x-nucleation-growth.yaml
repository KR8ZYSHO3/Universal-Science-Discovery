id: b-protein-aggregation-x-nucleation-growth
title: Protein aggregation ↔ Nucleation-growth kinetics — amyloid as seeded polymerization
status: proposed
fields:
- biology
- chemistry
bridge_claim: 'Amyloid fibril formation (in Alzheimer''s, Parkinson''s, prion diseases) follows secondary nucleation kinetics:
  monomers add to fibril ends (elongation) and fibril surfaces catalyse new nucleus formation (secondary nucleation); the
  Knowles-Michaels equation exactly describes these kinetics, enabling rational design of aggregation inhibitors.'
translation_table:
- field_a_term: primary nucleation in amyloid formation (de novo nucleus formation from monomers)
  field_b_term: primary nucleation rate J₁ = k₁[m]^(n₁) in classical nucleation theory
  note: n₁ = nucleus size (typically 2-6 monomers); k₁ = primary nucleation rate constant
- field_a_term: elongation (monomer addition to fibril ends)
  field_b_term: crystal growth (monomer addition to crystal surface) in crystal growth theory
  note: Elongation rate v = k₊[m] is linear in monomer concentration; same as Wilson-Frenkel growth law
- field_a_term: secondary nucleation (fibril surface catalyses new nucleus formation)
  field_b_term: heterogeneous nucleation on pre-existing surface in nucleation theory
  note: Secondary nucleation rate J₂ = k₂[m]^(n₂)[fibril mass]^γ; dominates at long times
- field_a_term: seeding experiment (pre-formed fibril fragments accelerate aggregation)
  field_b_term: seeded crystal growth (inoculation with seed crystal bypasses primary nucleation)
  note: Seeding bypasses lag phase by providing pre-formed nucleation surfaces
cross_pollination_opportunities:
- Apply Avrami-Johnson-Mehl nucleation-growth theory (from metallurgy) to fit amyloid time course data — Avrami exponents
  n predict whether nucleation or growth dominates, guiding inhibitor design to target the rate-limiting step.
- Use Ostwald ripening theory (from colloid science) to understand amyloid polymorphism — different fibril polymorphs have
  different surface energies and undergo competitive ripening, explaining why amyloid strains evolve over time in prion disease.
communication_gap: Nucleation-growth kinetics was developed for inorganic crystallisation (Volmer & Weber 1926, Becker & Döring
  1935) and applied to polymer crystallisation. Amyloid biology was developed in biochemistry and neuroscience focused on
  protein structure. The Knowles lab (Cambridge) systematically imported nucleation theory into amyloid biology (2009-present),
  but physical chemists studying crystallisation rarely read amyloid literature, missing the opportunity to apply Avrami theory,
  Ostwald ripening, and heterogeneous nucleation insights.

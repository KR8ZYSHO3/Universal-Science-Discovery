cross_pollination_opportunities:
  - "Polymer sequence design for condensate engineering: Flory-Huggins theory and field-theoretic simulations (Fredrickson group) can predict phase boundaries for IDP condensates from sequence alone, enabling rational design of synthetic condensates for drug delivery."
  - "IDP scaling exponents as sequence-to-function predictors: the Flory exponent ν estimated from sequence features correlates with IDP function class (transcription factor linker vs. hub protein vs. signal transducer), providing a polymer-physics-based functional annotation method."
communication_gap: >
  IDP biologists characterize sequences using charge and hydrophobicity plots
  without connecting to the polymer physics literature where Flory scaling,
  polyelectrolyte theory, and coil-to-globule transitions are quantitatively
  developed. Polymer physicists have the theoretical framework but IDP
  experimental data (smFRET, SAXS time series, condensate phase diagrams)
  are largely in biology journals not read by polymer scientists.

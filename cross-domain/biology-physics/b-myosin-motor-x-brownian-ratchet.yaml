id: b-myosin-motor-x-brownian-ratchet
title: >
  Myosin motor protein x Brownian ratchet - ATP hydrolysis as rectified diffusion
status: proposed
fields:
  - biology
  - physics
  - biophysics
  - statistical_mechanics
bridge_claim: >
  Myosin II uses ATP hydrolysis to rectify Brownian thermal fluctuations into directed
  mechanical work via a Brownian ratchet mechanism; the power stroke is not a classical
  lever but an asymmetric diffusion step biased by chemical potential difference, making
  myosin a molecular implementation of Feynman's ratchet operating at the Langevin
  equation scale where thermal fluctuations (~kT) are comparable to the work done per
  step (~50 pN·nm ~ 12 kT per ATP hydrolysis).
translation_table:
  - field_a_term: myosin power stroke during ATP hydrolysis (biochemistry)
    field_b_term: asymmetric Brownian ratchet potential rectifying diffusion (physics)
    note: The power stroke is a thermally-assisted diffusion step in an asymmetric potential, not a deterministic lever action
  - field_a_term: ATP hydrolysis free energy delta_G ~ -50 kJ/mol (biochemistry)
    field_b_term: chemical potential difference driving rectification in ratchet (statistical mechanics)
    note: ATP hydrolysis provides the chemical potential that creates the asymmetric sawtooth potential biasing Brownian motion
  - field_a_term: myosin step size ~5-36 nm (single molecule biophysics)
    field_b_term: spatial period of ratchet potential (physics)
    note: The step size corresponds to the spatial period of the asymmetric ratchet; variance in step size reflects diffusive exploration
  - field_a_term: muscle force-velocity relationship (physiology)
    field_b_term: load-dependent rectification efficiency of Brownian ratchet (statistical mechanics)
    note: The hyperbolic force-velocity curve (Hill equation) corresponds to the load dependence of ratchet stepping rate
communication_gap: >
  Physiologists studying muscle mechanics (Huxley sliding filament model 1954) and
  physicists studying Brownian ratchets (Feynman 1962, Magnasco 1993) developed parallel
  frameworks for directed motion; the connection between ATP-driven molecular motors and
  Smoluchowski-Fokker-Planck ratchet theory was synthesized in the 1990s but motor proteins
  are still often described deterministically in biology textbooks.
cross_pollination_opportunities:
  - Apply stochastic thermodynamics (Jarzynski equality, Crooks fluctuation theorem) to measure myosin free energy transduction efficiency from single-molecule trajectories without prior knowledge of the potential
  - Design synthetic molecular motors using the Brownian ratchet principle by engineering asymmetric potentials in DNA origami or peptide nanotechnology

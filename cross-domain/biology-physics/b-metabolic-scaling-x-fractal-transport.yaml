id: b-metabolic-scaling-x-fractal-transport
title: West–Brown–Enquist style metabolic scaling links whole-organism metabolic rate to fractal-like
  transport network geometry, connecting Kleiber’s 3/4 observation to space-filling resource
  delivery.
status: established
fields:
- biology
- physics
- allometry
- network-biology
bridge_claim: 'Metabolic scaling laws relate resting metabolic rate B to body mass M as a
  power law B ∝ M^α with α often near 3/4 across taxa. The WBE theory explains this exponent
  via hierarchical branching networks that are area-preserving and space-filling, yielding
  a dimensionally consistent scaling of effective transport capacity. Fractal-like vasculature
  and bronchial trees are not perfect mathematical fractals, but their self-similar branching
  provides a mechanistic bridge between geometry and physiology: changing branching asymmetry
  or terminal unit sizes moves the effective exponent. The bridge is explanatory rather than
  exact: real organisms violate ideal assumptions, but the shared language is transport-limited
  supply networks.'

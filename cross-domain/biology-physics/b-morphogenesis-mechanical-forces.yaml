cross_pollination_opportunities:
  - >
    Organoid mechanobiology: cerebral organoids grown in constraining hydrogels develop
    folds reminiscent of cortical gyri (Karzbrun et al. 2018). Hydrogel stiffness
    systematically controls fold wavelength consistent with buckling theory. This
    provides a controllable experimental platform to test morphogenetic physics without
    animal models — directly applicable to modelling lissencephaly and polymicrogyria.
  - >
    Cancer invasion and metastasis: the vertex model rigidity transition predicts that
    tumour cells above the shape index threshold p₀* will flow collectively, enabling
    collective invasion without individual epithelial-mesenchymal transition. This is
    testable by measuring cell shape index in primary tumour biopsies as a predictor
    of metastatic potential — a new biophysical cancer biomarker.
communication_gap: >
  Developmental biology emphasised molecular signals (Wnt, Shh, BMP pathways) for 40
  years after the molecular biology revolution, treating mechanics as secondary.
  Biophysicists (Ingber, Discher, Fletcher) developed cell mechanics in parallel using
  physics instrumentation (AFM, optical traps, micropipettes) but rarely collaborated
  with developmental biologists. Steinberg's DAH (1963) was controversial for 40 years
  because the molecular mechanism (cadherin differential expression) was not identified
  until 1986. The vertex model and active matter frameworks for tissues emerged from
  soft condensed matter physics (Marchetti group, Bi et al.) and are still not taught
  in standard cell biology courses. Developmental biologists and physicists attend
  different meetings and publish in mostly separate journals.

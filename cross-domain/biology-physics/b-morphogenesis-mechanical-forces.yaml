id: b-morphogenesis-mechanical-forces
title: >
  Tissue morphogenesis — the shaping of embryos and organs — is driven by mechanical
  forces (surface tension, actomyosin contractility, elastic buckling) governed by
  the same physical laws as soft condensed matter, bridging cell biology to continuum
  mechanics and explaining how cells collectively sculpture 3D anatomy from a flat sheet.
status: established
fields:
  - biology
  - physics
  - developmental-biology
  - biophysics
bridge_claim: >
  The differential adhesion hypothesis (Steinberg 1963): tissues sort like immiscible
  liquids because cells maximise adhesion energy by segregating into phases.
  Cell surface tension γ_AB = (W_AA + W_BB)/2 - W_AB, where W_ij is the work of adhesion
  between cell types i and j. Tissues with higher cohesion (larger W) sort to the interior —
  exactly as in liquid droplet coalescence. The equilibrium is determined by the Young-Laplace
  equation: ΔP = 2γ/R (pressure difference across a curved surface).

  Actomyosin cortical tension: cells actively generate surface tension via actomyosin
  contractility (cortical tension T_cortex ≈ 1-10 nN/μm). This dominates passive adhesion
  for most cells. Tissue surface tension γ_tissue = T_cortex × cell-cell contact fraction.
  Measurement: tissue deformation under centrifugation or compression gives γ_tissue directly.

  Vertex models of epithelial mechanics (Farhadifar et al. 2007): an epithelial sheet is
  modelled as a 2D polygonal tessellation. Each cell has an energy:
  E_cell = K(A - A₀)² + ΓP² + Σₗ λₗLₗ
  where A is cell area, A₀ is preferred area, Γ is perimeter contractility, P is perimeter,
  and Lₗ is cell-cell junction length with line tension λₗ. The vertex model predicts:
  (1) hexagonal packing as preferred geometry (minimum perimeter), (2) cell rearrangements
  (T1 transitions) under stress, (3) tissue fluidity as a function of shape index p₀ = P₀/√A₀.

  Shape index as a phase transition: Bi et al. (2015) showed that vertex models have a
  rigidity transition at p₀* ≈ 3.81. For p₀ < p₀*, cells are jammed (solid tissue); for
  p₀ > p₀*, tissue is fluid (cells flow past each other). Biological systems straddle
  this transition: healthy epithelia are rigid (p₀ < p₀*), metastatic transitions involve
  fluidisation (p₀ > p₀*).

  Brain folding: the gyral (fold) pattern of the human cortex is produced by differential
  growth between cortical layers. The cortex grows tangentially (under proliferation of
  basal progenitors) while the underlying white matter does not. This differential growth
  strain generates a bilayered buckling instability (Euler buckling for a compressed elastic
  membrane). The buckling wavelength λ* = 2π × h × (E_cortex/3E_subcortex)^(1/3) — where h
  is cortical thickness and E is elastic modulus — predicts gyrus spacing within 15%
  of observed human values (Tallinen et al. 2016).

  Quantitative biophysics: all the above can be measured. Cell shape measurement (aspect
  ratio, area): standard microscopy. Tissue stiffness: atomic force microscopy.
  Cortical tension: micropipette aspiration or laser ablation. Vertex model parameters:
  fit to cell shape statistics. This makes morphogenesis a quantitative physical science,
  not a descriptive biological one.
translation_table:
  - field_a_term: cell-cell adhesion energy W_ij
    field_b_term: surface energy in liquid-liquid interface (interfacial tension)
  - field_a_term: actomyosin cortical tension T_cortex
    field_b_term: active surface tension of a self-propelled interface
  - field_a_term: tissue sorting (Steinberg, cells of type A engulf type B)
    field_b_term: Rayleigh-Taylor instability (denser fluid below lighter → stable)
  - field_a_term: vertex model cell energy E = K(A-A₀)² + ΓP²
    field_b_term: elastic energy of a 2D foam / network (soft matter physics)
  - field_a_term: shape index p₀ = P₀/√A₀ (rigidity transition marker)
    field_b_term: packing fraction in jamming transition (particulate matter)
  - field_a_term: cortical buckling (gyrification)
    field_b_term: Euler buckling of a thin elastic plate under compression
  - field_a_term: T1 transition (cell neighbour exchange)
    field_b_term: plastic rearrangement event in amorphous solid
  - field_a_term: Young-Laplace pressure ΔP = 2γ/R across tissue interface
    field_b_term: capillary pressure across liquid-gas interface

cross_pollination_opportunities:
  - "Combine FRET sensors with optogenetics to simultaneously monitor and control signalling pathways with nanometre precision"
  - "Apply machine learning (deep learning deconvolution) to lattice light-sheet data to further improve spatiotemporal resolution in systems imaging"
  - "Develop CRISPR-tagged endogenous proteins with split-fluorescent protein systems to avoid overexpression artefacts in quantitative imaging"

communication_gap: >
  Optical physicists and photochemists who develop fluorescent probes and microscopy
  methods typically publish in optics journals; cell biologists who use the instruments
  read biology journals. Nobel Prize-level breakthroughs (STED 2014, GFP 2008) have
  started bridging these communities, but many biologists treat super-resolution
  microscopes as black boxes and few physicists appreciate the cell biology questions
  that motivate instrument development.


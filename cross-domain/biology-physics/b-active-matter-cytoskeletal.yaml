cross_pollination_opportunities:
  - "Measure ζ directly from myosin knockout cell lines to test the active nematic model quantitatively"
  - "Use active gel theory to design synthetic cytoskeletal systems (actin-myosin in microfluidic chambers) with prescribed shape changes"
  - "Apply topological defect engineering from liquid crystal physics to guide cell organisation in tissue engineering scaffolds"

communication_gap: >
  Active matter physics emerged from the statistical physics community (Toner, Tu,
  Marchetti, Ramaswamy) with limited connection to cell biologists. The landmark
  Marchetti et al. (2013) Rev Mod Phys review presented the theory largely to
  physicists. Cell biologists studying cytoskeletal dynamics rarely read physical
  review journals. The Saw et al. (2017) Nature paper was transformative precisely
  because it bridged the communities by placing the abstract topological defect
  concept directly in a cell biology context with clear physiological implications.


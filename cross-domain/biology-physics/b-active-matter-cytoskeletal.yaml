id: b-active-matter-cytoskeletal
title: "Active matter physics ↔ cytoskeletal dynamics — living contractile gels and biological pattern formation"
status: established
fields:
  - biophysics
  - soft-condensed-matter
  - cell-biology
  - physics
  - statistical-mechanics

bridge_claim: >
  Active matter describes systems of self-propelled units that consume energy to
  generate mechanical forces and motion at the expense of internal free energy —
  far from thermodynamic equilibrium. The cell cytoskeleton is the canonical active
  matter system: actin filaments (passive polymer) + myosin II molecular motors
  (active force generators) form a contractile active gel that drives cell motility,
  division, and shape changes. The continuum theory describes the actin-myosin
  network as an active nematic liquid crystal with an additional active stress tensor
  σ_active = −ζQ, where Q is the nematic order parameter tensor and ζ is the activity
  coefficient (proportional to ATP hydrolysis rate). This active stress drives
  spontaneous flows and symmetry-breaking pattern formation absent in passive liquid
  crystals. The Toner-Tu equations (1995) provide the hydrodynamic description of
  active polar fluids (bird flocks, bacterial colonies). Active nematic theory
  predicts topological defects: ±½ disclination lines (characteristic of liquid
  crystals) become dynamic objects driven by active flows. Crucially, Saw et al.
  (2017) showed that +½ defects in epithelial cell monolayers act as mechanical
  sources that trigger cell extrusion — linking abstract topological physics to
  concrete cell biology. Active matter theory unifies the physics of cytoskeletal
  dynamics, morphogenesis, wound healing, and tumour invasion.

translation_table:
  - field_a_term: "active stress tensor σ_active = −ζQ"
    field_b_term: "myosin-generated cortical tension in cells"
    note: "ζ > 0 (contractile): cortex contracts toward order; ζ < 0 (extensile): stress fibres push out"
  - field_a_term: "activity coefficient ζ (energy input rate)"
    field_b_term: "ATP hydrolysis rate / myosin motor density"
    note: "Biochemical free energy input parameterised by a single physical coefficient"
  - field_a_term: "nematic order parameter Q (orientation tensor)"
    field_b_term: "actin filament alignment / cell elongation direction"
    note: "Q = 0 (isotropic disordered) → Q = 1 (fully aligned); measured by fluorescence polarisation"
  - field_a_term: "+½ topological defect in active nematic"
    field_b_term: "cellular extrusion site (cell elimination from epithelium)"
    note: "Saw et al. 2017: +½ defects generate compressive stress that squeezes cells out of monolayer"
  - field_a_term: "Toner-Tu equations (polar active fluid hydrodynamics)"
    field_b_term: "collective cell migration / flocking of motile cells"
    note: "The same PDE describes bird flocks, bacterial swarms, and migrating epithelial sheets"
  - field_a_term: "spontaneous flow instability (ζ > ζ_c)"
    field_b_term: "spontaneous actin cortex oscillations in confined cells"
    note: "Above a critical activity, the uniform state becomes unstable — predicts spontaneous cortex dynamics"


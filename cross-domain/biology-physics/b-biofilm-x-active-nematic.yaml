id: b-biofilm-x-active-nematic
title: Bacterial biofilm ↔ Active nematics — collective orientation as liquid crystal order
status: proposed
fields:
- biology
- physics
bridge_claim: Dense bacterial communities in biofilms exhibit active nematic liquid crystal order; cell alignment, topological
  defect dynamics (+1/2 and -1/2 defects), and collective flows are quantitatively described by active nematic hydrodynamics,
  making biofilm architecture a biological realization of active liquid crystal physics.
translation_table:
- field_a_term: bacterial cell orientation field (director field in dense biofilm)
  field_b_term: nematic director n̂(r) in liquid crystal theory
  note: Rod-shaped bacteria (E. coli, B. subtilis) align locally; long-range nematic order develops above critical density
- field_a_term: topological defects in biofilm (+1/2 comet, -1/2 trefoil patterns)
  field_b_term: ±1/2 disclination defects in active nematic liquid crystal
  note: +1/2 defects move, -1/2 defects are stationary; +1/2 defect velocity predicts local biofilm stress
- field_a_term: biofilm mechanical stress at +1/2 defect cores
  field_b_term: extensile stress in active nematic at defect cores (σ_active)
  note: +1/2 defects accumulate mechanical stress, triggering cell extrusion and colony expansion
- field_a_term: biofilm collective flow patterns (vortices, jets, bulk flow)
  field_b_term: active nematic spontaneous flow instability (above activity threshold)
  note: Active nematics above activity threshold a* develop spontaneous flow — matches biofilm flow patterns
cross_pollination_opportunities:
- Use active nematic theory to predict antibiotic penetration patterns in biofilms — topological defects create channels of
  mechanical instability that could allow drug penetration into otherwise dense biofilm interiors.
- Apply active liquid crystal order parameter measurements (defect density, correlation length) as quantitative biofilm virulence
  metrics — more ordered biofilms (fewer defects) may be more resistant to mechanical disruption.
communication_gap: Active nematic liquid crystal physics was developed in soft matter physics (Marchetti, Dogic, Bhattacharya)
  using reconstituted cytoskeletal systems. Biofilm biology was developed in microbiology, focused on quorum sensing and matrix
  composition. The connection between biofilm cell alignment and active nematic theory was made only recently (Doostmohammadi
  et al. 2016, Copenhagen et al. 2021) — two decades after active nematics were first described theoretically.

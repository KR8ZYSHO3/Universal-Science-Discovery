communication_gap: >
  Protein biophysics and statistical physics of spin glasses developed largely
  independently despite sharing energy landscape mathematics. The Bryngelson-Wolynes
  theoretical framework was known to biophysicists but the spin glass connection
  (Wolynes's explicit analogy) took decades to be widely appreciated. The AlphaFold2
  breakthrough was primarily celebrated in structural biology; its connection to
  energy landscape theory and random matrix theory of co-evolution received less
  mainstream attention.


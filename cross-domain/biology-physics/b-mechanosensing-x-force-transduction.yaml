id: b-mechanosensing-x-force-transduction
title: Mechanosensing ↔ Force transduction — cell stiffness as Hookean spring network
status: proposed
fields:
- biology
- physics
bridge_claim: Cells sense substrate stiffness via integrin-mediated focal adhesions that behave as Hookean spring networks;
  the cell's cytoskeletal prestress tunes its resonant frequency to match substrate rigidity, implementing a mechanical impedance-matching
  circuit analogous to transmission line theory in electrical engineering.
translation_table:
- field_a_term: focal adhesion complex (integrin clusters linking ECM to cytoskeleton)
  field_b_term: mechanical spring network node (force transduction junction)
  note: Focal adhesions are the compliance-sensing elements; stiffness is read via force/displacement ratio
- field_a_term: cytoskeletal prestress (actomyosin tension in F-actin network)
  field_b_term: pre-tension in spring network (sets resonant frequency)
  note: Prestress tunes cell stiffness; stiffer substrates recruit more actomyosin
- field_a_term: substrate rigidity (Young's modulus E of extracellular matrix)
  field_b_term: spring constant k of Hookean substrate spring
  note: E ranges from 0.1 kPa (brain) to 40 kPa (bone); cell differentiates accordingly
- field_a_term: durotaxis — cell migration toward stiffer substrate
  field_b_term: mechanical impedance matching — system tunes to match load
  note: Cells preferentially adhere and migrate on substrates matching their own stiffness
cross_pollination_opportunities:
- Design biomimetic hydrogels with programmable stiffness gradients to direct stem cell differentiation — bone marrow mesenchymal
  stem cells differentiate to neurons on soft gels (0.1–1 kPa) and osteoblasts on stiff gels (25–40 kPa) via mechanosensing
  alone.
- Apply continuum mechanics models of Hookean networks to predict tumour mechanobiology — cancer-associated fibrosis stiffens
  ECM from 0.2 to 20 kPa, switching mechanosensing pathways (YAP/TAZ) that drive invasive phenotype.
communication_gap: 'Cell biology and solid mechanics evolved in separate communities: biologists studying integrin signalling
  focused on biochemical cascades (FAK, Src kinases), while physicists and engineers studying elastic networks focused on
  material properties. The synthesis required biophysicists (Discher, Bhanu Bhanu Bhanu Janmey) who spanned both communities
  and performed traction force microscopy experiments to directly measure cell-matrix mechanical coupling.'

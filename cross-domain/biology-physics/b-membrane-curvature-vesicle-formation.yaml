id: b-membrane-curvature-vesicle-formation
title: >
  Lipid membrane shapes — from red blood cell discocytes to endocytic vesicles —
  are governed by the Helfrich bending energy functional, connecting elastic
  continuum mechanics to cell biology and protein-sculpted membrane remodelling.
status: established
fields:
  - biology
  - cell-biology
  - physics
  - soft-matter
  - biophysics
bridge_claim: >
  Lipid bilayer membranes resist bending with bending modulus κ ≈ 10–20 k_BT.
  The Helfrich bending energy is F = ½κ∫(2H − c₀)²dA + κ_G∫K dA, where H is
  the mean curvature, K is the Gaussian curvature, c₀ is the spontaneous
  curvature (set by membrane asymmetry), and κ_G is the Gaussian modulus.
  Minimizing F subject to fixed area and volume constraints produces a phase
  diagram of vesicle shapes: prolate, oblate, stomatocyte, and discocyte (the
  normal red blood cell shape). The pathological RBC shapes in hereditary
  spherocytosis, sickle-cell anemia, and malaria-infected cells are predicted
  as different points in this phase diagram. Membrane-sculpting proteins
  encode curvature information in their shape: BAR domain proteins sense and
  generate membrane curvature proportional to their intrinsic radius of
  curvature, driving endocytosis and exocytosis. Clathrin-coated pit assembly
  during endocytosis follows the Helfrich mechanics — the clathrin coat
  imposes c₀, and the membrane bends accordingly. The connection: physics
  (elastic mechanics, differential geometry) fully determines cell biological
  processes (membrane trafficking, cell shape), with protein biochemistry
  setting the mechanical parameters.
translation_table:
  - field_a_term: mean curvature H = ½(κ₁ + κ₂)
    field_b_term: local membrane shape at each point of the bilayer
  - field_a_term: spontaneous curvature c₀
    field_b_term: membrane compositional asymmetry / BAR domain curvature preference
  - field_a_term: bending modulus κ (J)
    field_b_term: membrane stiffness determining vesicle fluctuation amplitude
  - field_a_term: Gaussian curvature K = κ₁κ₂
    field_b_term: topological curvature — integral over closed surface = 4π (Gauss-Bonnet)
  - field_a_term: area-difference elasticity (ADE) model
    field_b_term: RBC shape diagram parameterized by reduced volume and area difference
  - field_a_term: stomatocyte↔discocyte↔echinocyte transitions
    field_b_term: osmotic stress responses and disease-related RBC morphology changes
  - field_a_term: critical radius for tubulation (R_c = √(κ/2σ))
    field_b_term: minimum neck radius for vesicle budding or membrane tubule formation

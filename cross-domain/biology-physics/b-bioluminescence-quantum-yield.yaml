cross_pollination_opportunities:
  - >
    Quantum chemical calculations (TDDFT, CASPT2) of oxyluciferin excited states
    in different dielectric environments would predict emission wavelengths for
    active-site engineering of luciferases with desired colours — complementing
    directed evolution with quantum chemical design. This would make luciferase
    a designed photonic protein rather than an evolved reporter.
  - >
    Organic photovoltaics research (excited-state dynamics, singlet fission,
    exciton diffusion) uses the same quantum chemistry tools as bioluminescence
    excited-state analysis. Cross-pollination: biological systems achieving
    near-unity quantum yields at room temperature, under aqueous conditions, in
    enzyme active sites may inspire photovoltaic chromophore design for reduced
    non-radiative losses.
communication_gap: >
  Bioluminescence research is distributed across marine biology (deep-sea surveys),
  biochemistry (luciferin-luciferase mechanism), photochemistry (excited-state
  quantum chemistry), and biotechnology (reporter applications) — with each community
  rarely engaging the others. The quantum chemistry of the excited-state mechanism
  (whether enolate or keto tautomer of oxyluciferin emits, which affects the
  predicted emission wavelength) was actively debated for decades partly because
  chemists and biochemists used different experimental systems and terminology.
  Marine bioluminescence ecologists rarely read photochemistry journals.
  Biotechnology applications of luciferase (BLI imaging, BRET biosensors) are
  developed without systematic engagement with the quantum yield physics that
  determines assay sensitivity.

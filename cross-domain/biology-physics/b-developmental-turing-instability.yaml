cross_pollination_opportunities:
  - >
    Single-molecule imaging and optogenetics now allow direct measurement of
    morphogen diffusion coefficients D_A and D_I in live embryos at cellular resolution
    — enabling the first quantitative test of the Turing condition D_I/D_A > threshold
    in a well-defined developmental context (e.g., zebrafish pigment pattern). Combining
    biophysical measurement with mathematical modelling is required, spanning physics
    and developmental biology.
  - >
    Synthetic biology: engineering synthetic Turing patterns using two-component gene
    circuits in bacteria (Liu et al. 2011, E. coli colony patterns) allows full
    experimental control of f_A, f_I, D_A, D_I — testing Turing theory more rigorously
    than natural systems. Quantitative predictions for pattern wavelength as a function
    of engineered diffusion coefficient ratio are directly testable.
communication_gap: >
  Turing's 1952 paper was written by a mathematician in a biology context and largely
  ignored by developmental biologists for 40 years — Wolpert's positional information
  model (1969) dominated developmental biology. The Kondo-Asai paper (1995) finally
  demonstrated biological reality of Turing patterns in zebrafish, but in Nature
  (biological journal). Mathematical analysis of Turing systems is published in J Math
  Biol, SIAM J Appl Math, and J Theor Biol — journals rarely read by experimental
  developmental biologists. Measurement of D_A and D_I in vivo requires biophysics
  expertise (FRAP, FCS) rarely available in developmental biology labs.

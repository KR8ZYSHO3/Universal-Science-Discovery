cross_pollination_opportunities:
  - >
    The MET channel molecular identity remained unknown until 2018 (TMC1/TMC2
    identified as pore-forming subunits; Jia et al. 2020; Pan et al. 2018) —
    cryo-EM structures now allow biophysical modeling of gating. The tip-link
    tension → channel gating mechanism could be reconstructed from molecular
    dynamics simulations.
  - >
    Hearing loss therapies: TMC1 mutations cause deafness; gene therapy with AAV
    delivery of TMC1 partially restores hearing in mouse models. The biophysics of
    gating spring mechanics constrains how much hearing can be restored by gene therapy.
communication_gap: >
  Hair cell biologists who characterize MET currents electrophysiologically rarely
  engage with the nonlinear dynamics literature on Hopf bifurcations. Physicists
  who develop the theory of active amplification and bifurcation physics rarely
  interface with the molecular biology of tip-link proteins. The unification of
  molecular mechanism and dynamical systems theory is incomplete.

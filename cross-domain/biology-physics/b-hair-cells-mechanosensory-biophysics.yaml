id: b-hair-cells-mechanosensory-biophysics
title: >
  Inner ear hair cells bridge biology and physics: tip-link gating springs open
  mechanotransduction channels with Boltzmann-distributed open probability, and
  spontaneous otoacoustic emissions reveal operation near a Hopf bifurcation
  providing active amplification at the thermodynamic limit.
status: established
fields:
  - biology
  - physics
  - biophysics
  - neuroscience
  - sensory-biology
bridge_claim: >
  Inner hair cells (IHCs, ~3,500 per human cochlea) transduce basilar membrane
  vibration into auditory nerve signals. The mechanotransduction (MET) channel
  is gated by tip links (cadherin-23/protocadherin-15 heterodimers) connecting
  adjacent stereocilia. Channel open probability follows a two-state Boltzmann
  distribution: P_o(x) = 1/(1+exp(-z(x-x₀)/k_BT)), where z is the gating spring
  stiffness (pN/nm), x is stereocilia displacement, and k_BT is thermal energy.
  This is the same formula as for voltage-gated channels at thermal equilibrium —
  the physics of mechanical gating is identical to electrical gating. The Hudspeth
  group showed that bullfrog saccular hair cells exhibit spontaneous oscillations
  near a Hopf bifurcation (Martin et al. 2001): near a critical point, the system
  has extreme sensitivity (gain ∝ F^{-2/3} for weak stimuli), sharp frequency
  selectivity, and compression (gain ∝ F^{-2/3} → dB compression) — matching
  psychophysical data (equal-loudness contours, basilar membrane tuning curves).
  Spontaneous otoacoustic emissions (SOAEs): the oscillating hair bundle emits
  sound from the ear canal — physical evidence of active amplification, measurable
  with a sensitive microphone. Fast adaptation: Ca²⁺ entering through MET channels
  binds calmodulin → reduces tip-link tension → partial reclosure (ms timescale).
  Slow adaptation: myosin-1c motors climb the stereocilia to restore resting tension
  (seconds timescale) — a continuous mechanical adjustment to maintain dynamic range.
translation_table:
  - field_a_term: tip link (cadherin-23 / protocadherin-15)
    field_b_term: gating spring with stiffness K_GS (classical spring mechanics)
    note: tip link tension directly opens the MET channel via gating spring model
  - field_a_term: MET channel open probability P_o
    field_b_term: two-state Boltzmann distribution (same as voltage-gated channels)
    note: statistical mechanics describes channel gating; thermal fluctuations set sensitivity limit
  - field_a_term: spontaneous hair bundle oscillation
    field_b_term: nonlinear oscillator near a supercritical Hopf bifurcation
    note: active amplification without resonance; bifurcation physics determines gain and tuning
  - field_a_term: spontaneous otoacoustic emission (SOAE)
    field_b_term: coherent sound emission from a driven nonlinear oscillator
    note: the ear emits sound — measurable physical evidence of active mechanical amplification
  - field_a_term: basilar membrane compressive nonlinearity (40 dB dynamic range)
    field_b_term: "power-law gain compression near Hopf bifurcation: G ∝ F^{-2/3}"
    note: explains why loudness grows as ~30th root of intensity (Stevens power law)

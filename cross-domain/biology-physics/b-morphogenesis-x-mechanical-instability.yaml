id: b-morphogenesis-x-mechanical-instability
title: Morphogenesis ↔ Mechanical instability — tissue folding as Euler buckling
status: proposed
fields:
- biology
- physics
bridge_claim: Brain cortical folding, gut villus formation, and lung branching morphogenesis all arise from compressive mechanical
  instabilities (Euler buckling, Rayleigh-Taylor instability) in elastic sheets; gyrification depth and fold spacing are predicted
  by the bilayer bending modulus ratio and confinement geometry — pure mechanics, no molecular patterning required.
translation_table:
- field_a_term: cortical folding / gyrification (brain surface morphology)
  field_b_term: Euler buckling of a compressed elastic bilayer (mechanics)
  note: Cortex (stiff layer, μ₁) + subcortex (soft layer, μ₂) buckles when μ₁/μ₂ > threshold
- field_a_term: fold spacing λ (distance between adjacent gyri)
  field_b_term: most unstable wavelength λ* of Euler buckling mode
  note: λ* = 2πh(μ₁/3μ₂)^(1/3) where h is cortex thickness — matches observed gyrification
- field_a_term: villus/crypt periodicity in intestinal mucosa
  field_b_term: Rayleigh-Taylor instability wavelength in two-layer elastic system
  note: Gut epithelial layer (stiff) on submucosa (soft) buckles under growth-induced compression
- field_a_term: lissencephaly (smooth brain) — genetic mutation reducing cortex stiffness
  field_b_term: buckling suppression when stiffness ratio μ₁/μ₂ < critical value
  note: LIS1 mutations reduce cortex growth rate, preventing compression needed for buckling
cross_pollination_opportunities:
- Apply buckling theory to brain organoid engineering — controlling substrate stiffness and growth rate to reproduce gyrification
  patterns in vitro, enabling controlled models of lissencephaly and polymicrogyria.
- 'Use thin-shell elasticity mechanics to predict organ size scaling: the number of folds in the intestinal mucosa scales
  with body mass as N ∝ M^0.25 — a prediction testable across mammals using the buckling wavelength formula.'
communication_gap: Developmental biology studied morphogenesis through molecular signalling (Turing patterns, Wnt, BMP gradients)
  while mechanics of elastic buckling was developed in structural engineering. The prediction that pure mechanical instability
  could generate brain folding patterns — without molecular pre-patterning — was resisted by molecular biologists. The mechanical
  morphogenesis paradigm gained traction only after Tallinen et al. (2016) showed a physically realistic gel brain model develops
  human-like gyrification patterns.

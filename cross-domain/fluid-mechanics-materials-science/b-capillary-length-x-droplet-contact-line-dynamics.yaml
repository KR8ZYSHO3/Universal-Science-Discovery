    note: "de Gennes (1985) — wetting: statics and dynamics (Rev. Mod. Phys.)."
  - doi: "10.1103/RevModPhys.81.739"
    note: "Quéré (2009) — wetting and roughness (Rev. Mod. Phys.)."
last_reviewed: "2026-05-07"

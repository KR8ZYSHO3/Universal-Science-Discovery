id: b-game-theoretic-vaccination-x-herd-immunity-threshold
title: >
  Nash equilibria of voluntary vaccination games embed economic incentives (cost of vaccination versus infection risk) whose interior solutions relate to classical herd-immunity thresholds from mass-action SIR models — linking microeconomic strategic complements to macroscopic epidemiological critical vaccination coverage p_c = 1 − 1/R₀ when rational expectations incorporate prevalence feedback.
status: established
fields:
  - economics
  - epidemiology
  - public-health
bridge_claim: >
  When vaccine uptake is modeled as a multiplayer game with imitation dynamics or payoff-dependent adoption, equilibrium vaccine coverage often sits below social optima due to free riding — comparing equilibrium coverage with SIR-derived p_c exposes gaps between privately rational behavior and elimination thresholds — behavioral realism requires heterogeneity, social norms, and dynamic prevalence not captured by static symmetric games alone.
translation_table:
  - field_a_term: Nash equilibrium vaccination probability under voluntary uptake
    field_b_term: herd-immunity threshold derived from next-generation matrix eigenvalues
    note: Equality holds only under restrictive symmetry and perfect information assumptions.
  - field_a_term: externality from herd protection (nonrival infection-risk reduction)
    field_b_term: positive spillovers in public goods provision (Samuelson condition)
    note: Economic framing emphasizes incentives; epidemiology emphasizes threshold algebra.
  - field_a_term: mixed-strategy equilibria with vaccine hesitancy segments
    field_b_term: fractional critical immunity with heterogeneous susceptibility
    note: Heterogeneity breaks crisp thresholds into distributions of critical coverage.
communication_gap: >
  Mathematical epidemiology textbooks present R₀ algebra while microeconomics presents public-goods games — integrated behavioral epidemiology papers exist but policy briefs often cite only one lexicon.
cross_pollination_opportunities:
  - Couple game-theoretic vaccine uptake models with agent-based cities calibrated via mobility data.
  - Export mechanism-design subsidies (tax credits, lotteries) tested by economists into epidemic simulators as dynamic interventions.

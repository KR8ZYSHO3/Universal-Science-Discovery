id: b-mineral-precipitation-ostwald-ripening
title: >
  Mineral precipitation from supersaturated geological fluids follows Ostwald ripening
  dynamics — larger crystals grow at the expense of smaller ones via dissolution-
  reprecipitation — governed by the same Lifshitz-Slyozov-Wagner (LSW) theory used
  to describe coarsening in materials science, with geochemical precipitation
  experiments providing the most accessible natural laboratory for crystal coarsening
  kinetics.
status: proposed
fields:
  - geochemistry
  - materials-science
  - chemistry
  - statistical-mechanics
bridge_claim: >
  When a mineral precipitates from supersaturated fluid, initial nucleation produces
  a polydisperse population of small crystals. Ostwald (1900) observed that this
  unstable size distribution coarsens over time: large crystals grow while small
  crystals dissolve, driven by the Gibbs-Thomson effect (higher solubility of
  small, high-curvature crystals). The Lifshitz-Slyozov-Wagner (LSW) theory
  (1961) solves the coarsening kinetics exactly in the dilute limit: mean crystal
  radius grows as R ~ t^{1/3}, and the crystal size distribution approaches a
  universal self-similar form independent of initial conditions. This same LSW
  theory governs coarsening in metal alloys (spinodal decomposition annealing),
  polymer blends, and emulsions — making geological mineral precipitation a natural
  laboratory for materials coarsening physics at geological timescales. The bridge
  enables transfer of modern coarsening theory (phase-field models, kinetic Monte
  Carlo) to geochemical systems where long timescales make direct observation
  impossible, and conversely makes geological observations (mineral age distributions
  from geochronology, crystal size distributions in igneous rocks) a test of
  materials theory predictions over timescales inaccessible in the laboratory.
translation_table:
  - field_a_term: Gibbs-Thomson effect (excess chemical potential of small particles)
    field_b_term: higher mineral solubility of small crystals in geological fluids
    note: mu = mu_bulk + 2*gamma*V_m/r — smaller crystals dissolve faster, driving coarsening
  - field_a_term: LSW exponent R ~ t^{1/3}
    field_b_term: mean grain size growth law in diagenetic mineral coarsening
    note: The universal t^{1/3} growth law applies to geological calcite, quartz, and feldspar coarsening
  - field_a_term: universal LSW size distribution
    field_b_term: self-similar crystal size distribution in late-stage diagenesis
    note: Geological crystal size distributions should converge to the LSW self-similar form
  - field_a_term: interfacial energy gamma
    field_b_term: mineral-fluid surface energy (controls nucleation and coarsening rate)
    note: The key materials parameter — differs for each mineral-fluid system
cross_pollination_opportunities:
  - Measure crystal size distributions in diagenetically altered carbonate rocks and test for convergence to the LSW self-similar form at different stages of burial
  - Use modern phase-field simulations of mineral coarsening to predict spatial distribution of coarse vs. fine grains in sedimentary basins and test against core data
  - Transfer kinetic Monte Carlo coarsening models from metallurgy to biomineralisation (shell nacre, coral skeletons) to understand biological coarsening control

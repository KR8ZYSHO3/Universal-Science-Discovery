id: b-morse-theory-x-energy-landscape
title: Morse theory ↔ Energy landscapes — critical points as saddles and minima
status: proposed
fields:
- mathematics
- physics
bridge_claim: Morse theory classifies the topology of smooth manifolds through the critical points of a smooth function (minima,
  saddles, maxima); applied to potential energy surfaces in chemistry and physics, Morse theory provides a complete topological
  inventory of reaction pathways, metastable states, and transition states.
translation_table:
- field_a_term: 'Morse function f: M → R (smooth function with nondegenerate critical points)'
  field_b_term: potential energy surface V(x) of molecular or protein system
  note: PES is a Morse function generically; Morse critical points = equilibria and transition states
- field_a_term: Morse index μ of critical point (number of negative Hessian eigenvalues)
  field_b_term: number of imaginary frequencies at transition state (saddle index)
  note: 'μ = 0: minimum (stable state); μ = 1: saddle (transition state); μ = 2: hilltop'
- field_a_term: Morse-Witten complex (gradient flow lines connecting critical points)
  field_b_term: reaction pathway network connecting stable states via transition states
  note: Gradient flow lines on PES correspond to reaction paths; Morse-Witten complex is the kinetic network
- field_a_term: 'Morse inequality: #{critical pts of index k} ≥ βₖ (Betti number)'
  field_b_term: minimum number of transition states required by topology of PES
  note: Morse inequalities give lower bounds on the number of saddles on a PES from topology
cross_pollination_opportunities:
- Apply Morse theory to protein folding energy landscapes — the Morse-Witten complex gives the complete kinetic folding network;
  Morse inequalities provide lower bounds on the number of folding intermediates required by the topology of the folding funnel.
- Use persistent homology (a topological data analysis method based on Morse theory) to automatically identify metastable
  states and transition states in molecular dynamics simulations without prespecified reaction coordinates.
communication_gap: Morse theory was developed in pure differential topology (Morse 1934, Milnor 1963); potential energy surfaces
  were developed independently in physical chemistry (London, Eyring, Evans-Polanyi 1930s). Chemists and physicists studying
  energy landscapes were unaware of the complete topological characterization offered by Morse theory until the work of Wales
  (2003) on 'Energy Landscapes' and the adoption of topological data analysis in computational chemistry.

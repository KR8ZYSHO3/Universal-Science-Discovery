id: b-knot-theory-x-quantum-gravity
title: >
  Knot theory x Quantum gravity - Wilson loops as topological invariants
status: proposed
fields:
  - mathematics
  - physics
  - topology
  - quantum_gravity
bridge_claim: >
  In Chern-Simons topological quantum field theory and loop quantum gravity, Wilson loop
  observables W_gamma[A] = Tr P exp(i oint_gamma A) around closed paths gamma
  correspond exactly to knot invariants (Jones polynomial, HOMFLY polynomial, Kauffman
  bracket); the Chern-Simons path integral with gauge group SU(2) computes the Jones
  polynomial as its partition function — revealing that quantum gravity, knot topology,
  and quantum groups are deeply unified through topological invariants of 3-manifolds.
translation_table:
  - field_a_term: Wilson loop observable W_gamma in Chern-Simons gauge theory (physics)
    field_b_term: Jones polynomial V(K;t) evaluated at t = exp(2*pi*i/(k+2)) (mathematics)
    note: Witten (1989) showed Wilson loops in CS theory with level k compute Jones polynomials; knot topology = quantum observable
  - field_a_term: Chern-Simons action S_CS = k/4pi int Tr(A dA + 2/3 A^3) (quantum field theory)
    field_b_term: topological invariant of 3-manifold with embedded knot (topology)
    note: The CS partition function is a topological invariant; changing the 3-manifold changes the invariant computed by the path integral
  - field_a_term: loop states in loop quantum gravity (LQG) (quantum gravity)
    field_b_term: knot classes of embedded graphs in 3-space (knot theory)
    note: LQG quantum states of geometry are spin networks; their topology is classified by knot invariants of the embedded graphs
  - field_a_term: Reidemeister moves preserving knot type (knot theory)
    field_b_term: gauge invariance of Wilson loop observables (gauge theory)
    note: Reidemeister moves are the physical gauge transformations; knot invariance = gauge invariance of the observable
communication_gap: >
  Topologists developing knot invariants (Jones 1984, HOMFLY 1985) and physicists
  developing quantum gravity and topological field theory worked independently until
  Witten (1989) identified the Jones polynomial as a Chern-Simons path integral —
  winning the Fields Medal; but the full implications for quantum gravity (whether
  LQG spin networks encode complete topological invariants of spacetime) and for
  quantum computing (topological quantum computation using anyons) are still
  being developed.
cross_pollination_opportunities:
  - Apply topological quantum field theory (Chern-Simons) to design topological quantum computers where qubits are encoded in braiding statistics of non-Abelian anyons, protected from decoherence by knot invariance
  - Use loop quantum gravity spin network topology to compute topological invariants of discrete spacetime, testing whether the semiclassical limit recovers smooth Riemannian geometry

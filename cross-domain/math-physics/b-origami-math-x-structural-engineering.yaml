id: b-origami-math-x-structural-engineering
title: >
  Origami Mathematics x Structural Engineering — crease patterns as deployable mechanisms
status: proposed
fields:
  - mathematics
  - physics
  - engineering
bridge_claim: >
  Rigid origami (flat-foldable crease patterns satisfying Kawasaki's theorem and
  Maekawa's theorem) provides deployable mechanical structures with prescribed folding
  kinematics; the stiffness and Poisson's ratio of origami metamaterials are determined
  by the combinatorics of the crease pattern, enabling programmable mechanical
  metamaterial design.
translation_table:
  - field_a_term: Kawasaki's theorem (alternating angle sum = π)
    field_b_term: Kinematic constraint for single-vertex flat foldability
    note: >
      At each interior vertex, the alternating sum of sector angles equals π (flat
      foldability condition); this is a constraint on the mechanism degrees of freedom,
      preventing kinematic locking.
  - field_a_term: Maekawa's theorem (M-V assignment ±2)
    field_b_term: Parity constraint on crease orientation
    note: >
      The number of mountain and valley creases at each vertex must differ by exactly
      2; this is a necessary condition for flat foldability and constrains the
      configuration space of the origami mechanism.
  - field_a_term: Miura-ori crease pattern
    field_b_term: Deployable structure with negative Poisson's ratio
    note: >
      The Miura-ori pattern (parallelogram tessellation) has negative in-plane Poisson's
      ratio (auxetic behavior): it expands in one direction when stretched in the other;
      this arises directly from the geometry of the crease pattern.
  - field_a_term: Origami degree of freedom (DOF)
    field_b_term: Mechanism mobility in structural engineering
    note: >
      The mobility formula (Maxwell criterion) counts DOF as edges - constraints;
      single-DOF origami patterns are deployable mechanisms; zero-DOF patterns
      are rigid structures.
communication_gap: >
  Pure mathematicians studied origami for geometric theorem proving (angle trisection);
  structural engineers studied compliant mechanisms and deployable structures; the
  connection (origami mathematics = mechanism design) was made by Robert Lang's
  TreeMaker algorithm (1994) and accelerated by NASA's need for compact deployable
  space structures.
cross_pollination_opportunities:
  - >
    Apply origami crease pattern combinatorics to design self-folding microstructures
    (4D printing) where encoded crease patterns unfold in response to temperature,
    humidity, or pH.
  - >
    Use structural engineering finite element methods to compute the stiffness-to-weight
    ratio of origami metamaterials, optimizing crease patterns for maximum specific stiffness.
  - >
    Import graph-theoretic origami analysis (crease pattern as planar graph) to
    design programmable acoustic metamaterials where folding state controls sound transmission.

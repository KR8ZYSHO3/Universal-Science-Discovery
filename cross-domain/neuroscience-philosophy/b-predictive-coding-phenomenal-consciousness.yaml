id: b-predictive-coding-phenomenal-consciousness
title: Predictive coding frames perception as hierarchical Bayesian inference, bridging computational neuroscience to the hard problem of consciousness by proposing phenomenal experience as residual unresolved prediction error
status: proposed
fields:
  - neuroscience
  - philosophy
bridge_claim: >
  Predictive coding (Rao & Ballard 1999; Friston 2010; Clark 2013) proposes that the brain
  is a hierarchical Bayesian prediction machine: top-down predictions cancel bottom-up sensory
  signals, with only prediction errors propagating upward for belief updating. This framework
  unifies perception, attention, action, hallucination, and dreaming as different modes of
  prediction and error minimisation (free energy minimisation). The bridge to philosophy of mind
  is that phenomenal consciousness — the "what it is like" of experience (Chalmers 1996, the
  hard problem) — may correspond to prediction errors that resist resolution by the top-down
  model: the residual surprise that cannot be explained away. Perceptual experience is not
  passive reception but active model testing; qualia may be the signal content of unresolved
  prediction errors. This connects the computational mechanics of cortical inference to the
  hardest open problem in philosophy of mind. The hypothesis is testable: manipulating
  predictability should modulate phenomenal intensity.
translation_table:
  - field_a_term: prediction error (PE) signal
    field_b_term: phenomenal experience / qualia
    note: Proposed identification — unresolved PE corresponds to conscious percept
  - field_a_term: prior (top-down prediction)
    field_b_term: concept / expectation
    note: Prior beliefs shape percepts just as concepts shape phenomenology
  - field_a_term: free energy minimisation (active inference)
    field_b_term: minimisation of existential surprise
    note: Friston extends free energy principle to model all purposive behaviour
  - field_a_term: precision weighting of PE
    field_b_term: attentional gain / salience
    note: High-precision PEs enter consciousness; low-precision ones do not
related_unknowns:
  - u-neural-correlates-self
  - u-perceptual-binding-problem
  - u-metacognition-substrate
related_hypotheses:
  - h-predictive-coding-precision-weighting-explains-attention-consciousness
cross_pollination_opportunities:
  - Empirical tests of predictive coding phenomenology (oddball paradigms, perceptual bistability)
  - Develop falsifiable accounts of the hard problem using precision weighting predictions
  - Connect to integrated information theory (IIT) via information geometry of prediction
communication_gap: >
  Philosophers of mind and computational neuroscientists rarely engage with each other's
  technical arguments. Philosophers lack mathematical fluency with Bayesian inference;
  neuroscientists avoid the hard problem as "not scientific." The predictive coding bridge
  offers a scientific framework with genuine philosophical implications that both communities
  resist fully engaging with.

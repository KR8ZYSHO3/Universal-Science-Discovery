id: b-kuramoto-synchronization
title: >
  The Kuramoto model of coupled phase oscillators is a single mathematical
  framework that simultaneously describes neural gamma-band synchronization,
  cardiac pacemaker coupling, power-grid frequency stability, and laser array
  coherence — four fields with almost no cross-disciplinary communication despite
  sharing identical governing equations.
status: proposed
fields:
  - statistical-physics
  - neuroscience
  - cardiology
  - electrical-engineering
  - nonlinear-dynamics
bridge_claim: >
  The Kuramoto model (1975) describes a population of N coupled phase oscillators:
    d(theta_i)/dt = omega_i + (K/N) * sum_j sin(theta_j - theta_i)
  where omega_i are natural frequencies (drawn from a distribution g(omega)) and K
  is coupling strength. At critical coupling K_c = 2 / (pi * g(0)), a phase
  transition occurs: the oscillators spontaneously synchronize, and an order
  parameter r (mean-field coherence) jumps from 0 to a finite value as a
  second-order phase transition.

  This model, or its direct extensions, describes:

  1. **Neural gamma oscillations** (30-100 Hz): cortical interneuron networks
     synchronize via GABA synapses. The onset of gamma is a Kuramoto transition;
     the order parameter r corresponds to the Local Field Potential (LFP) gamma-band
     power. The b-criticality-neuroscience bridge already connects this to
     statistical physics — Kuramoto provides the *mechanism*.

  2. **Cardiac pacemaker cells**: sinoatrial node cells synchronize their calcium
     oscillations via gap junctions. Arrhythmia (atrial fibrillation) onset maps to
     a Kuramoto desynchronization transition below K_c. The hypothesis
     h-cardiac-arrhythmia-phase-transition in this repository explicitly predicts this.

  3. **Power grid frequency stability**: AC generators are phase oscillators coupled
     by transmission lines. Grid collapse (frequency cascades) is a Kuramoto
     desynchronization event. The same K_c formula that predicts neural gamma onset
     also predicts grid stability margins — a result that power engineers derive
     independently using swing equations.

  4. **Laser array coherence**: arrays of coupled semiconductor lasers synchronize
     when injection coupling exceeds a threshold exactly described by Kuramoto K_c.
     Laser array phased locking is an engineering application of the same transition
     that causes neural gamma oscillations.

  All four systems have been studied intensively for decades in separate literatures.
  The shared Kuramoto framework would let each field import analytical results
  (mean-field theory, finite-size corrections, noise effects, network topology
  corrections) derived in any of the others.
translation_table:
  - field_a_term: Kuramoto coupling constant K
    field_b_term: neural — GABAergic synapse conductance; cardiac — gap junction conductance; engineering — transmission line susceptance
  - field_a_term: critical coupling K_c = 2/(pi*g(0))
    field_b_term: neural — gamma oscillation onset threshold; cardiac — arrhythmia vulnerability; engineering — grid stability margin
  - field_a_term: order parameter r (mean-field coherence)
    field_b_term: neural — LFP gamma power; cardiac — atrial synchrony index; engineering — grid frequency coherence
  - field_a_term: natural frequency distribution g(omega)
    field_b_term: neural — intrinsic firing rate distribution of interneurons; cardiac — cell-to-cell calcium oscillation period variance
  - field_a_term: phase transition at K_c (second-order, mean-field)
    field_b_term: all systems — abrupt onset of synchrony; identified independently as "critical transition" in each field
  - field_a_term: finite-size fluctuations of r near K_c
    field_b_term: neural — trial-to-trial variability near gamma onset; cardiac — paroxysmal AF triggered by noise; engineering — grid frequency noise near stability margin

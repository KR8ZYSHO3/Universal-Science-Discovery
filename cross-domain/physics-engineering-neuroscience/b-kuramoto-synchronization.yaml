cross_pollination_opportunities:
  - >
    Power engineers have derived exact finite-size corrections to the Kuramoto K_c
    for heterogeneous network topologies (the "swing equation" literature). These
    corrections predict how a non-uniform coupling network shifts the synchronization
    threshold. Cardiologists studying sinoatrial node heterogeneity have never
    imported these results — yet they are directly applicable to predicting which
    patients' nodal coupling heterogeneity makes them vulnerable to AF.
  - >
    Neuroscientists have measured the scaling of LFP gamma power near the onset
    transition in primate cortex. If this scaling matches the Kuramoto mean-field
    prediction r ~ (K - K_c)^(1/2), it confirms the universality class. The data
    exists; the comparison has not been made systematically.
  - >
    Laser array engineers have developed noise-robust phase-locking protocols using
    delayed feedback. These protocols keep laser arrays synchronized in the presence
    of noise well below the mean-field K_c. Identical protocols, translated to
    biological coupling, would suggest novel pacemaker designs or optogenetic
    stimulation patterns to maintain cardiac synchrony in pre-AF patients.
  - >
    The Kuramoto model on a complex network (scale-free, small-world) has exact
    analytical solutions for the critical coupling as a function of the network's
    spectral gap. The human connectome and the cardiac conduction network have both
    been mapped. Comparing their spectral gaps to measured synchronization thresholds
    would test whether the brain and heart operate at the same Kuramoto universality
    class or at distinct fixed points determined by network architecture.
communication_gap: >
  The Kuramoto model appears in Physics Reviews, Journal of Neuroscience, Circulation,
  and IEEE Transactions on Power Systems — four journals whose editorial boards have
  essentially zero overlap. Cardiologists who study AF triggers use the term "rotor"
  (a spatial pattern of desynchronized spiral waves) without awareness that it maps
  to a Kuramoto defect. Power engineers who study frequency cascades use "swing
  equation" without awareness that it is a Kuramoto model on a network. The shared
  framework would allow each field to read the other's 50-year literature of
  analytical results.

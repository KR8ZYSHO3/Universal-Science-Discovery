id: b-quantum-biology-navigation
title: >
  Migratory birds navigate using quantum entanglement in cryptochrome — the radical-pair
  mechanism is a room-temperature quantum sensor inside a living protein, operating
  at the precision limit set by quantum Fisher information.
status: established
fields:
  - quantum-mechanics
  - molecular-biology
  - sensory-neuroscience
  - quantum-information-theory
bridge_claim: >
  The magnetic compass of migratory songbirds is not a classical ferromagnetic
  sensor (like a compass needle) but a quantum device: photo-excited electron
  transfers in the flavin-adenine dinucleotide (FAD) cofactor of cryptochrome
  create radical pairs whose spin states are entangled and coherent, and the
  singlet/triplet ratio of recombination products is sensitive to the direction
  of the Earth's weak geomagnetic field. Two independent 2026 papers (arXiv
  2206.07355, 2401.02923) confirm that (a) driven spin dynamics in realistic
  inter-radical coupling regimes enhances rather than destroys magnetoreception
  sensitivity, and (b) the radical-pair compass operates at or near the quantum
  Fisher-information precision limit for field-direction sensing. This means a
  living protein at body temperature is performing a quantum measurement that
  approaches the theoretical optimum — a feat that physicists have only recently
  achieved in engineered quantum sensors in cryogenic laboratories. The two
  communities studying this — quantum physicists (who care about the Cramér-Rao
  bound and decoherence timescales) and sensory biologists (who study cryptochrome
  genetics, bird behaviour, and retinal circuitry) — rarely collaborate and speak
  almost entirely different languages.
translation_table:
  - field_a_term: radical pair (quantum chemistry)
    field_b_term: magnetoreceptor state (sensory biology)
    note: The physical substrate of the compass — two unpaired electrons in a protein
  - field_a_term: singlet-triplet ratio
    field_b_term: cryptochrome signalling state
    note: The quantum output that determines which downstream protein is activated
  - field_a_term: quantum Fisher information / Cramér-Rao bound
    field_b_term: minimum detectable field angle
    note: The theoretical precision limit — biology appears to approach it
  - field_a_term: decoherence time T2
    field_b_term: cryptochrome radical lifetime
    note: How long quantum coherence survives — must exceed ~1 microsecond for field sensitivity
  - field_a_term: spin-selective recombination
    field_b_term: light-dependent magnetic field effect on behaviour
    note: The mechanism linking quantum spin physics to measurable bird behaviour
  - field_a_term: Hamiltonian engineering (quantum control)
    field_b_term: cryptochrome protein evolution
    note: Evolution has "engineered" the protein scaffold to maximise quantum sensing performance

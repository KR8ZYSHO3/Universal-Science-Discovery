related_hypotheses: []
cross_pollination_opportunities:
  - Quantum metrologists can calculate the optimal measurement strategy for radical-pair sensors and compare it to what evolution actually implemented in cryptochrome — testing whether biology has found the quantum optimum
  - Sensory biologists can provide behavioural precision data (how accurately can birds detect field direction?) that constrains the quantum Fisher information of the in-vivo sensor
  - Quantum error-correction theory could explain how cryptochrome maintains coherence at physiological temperatures despite thermal noise — potentially revealing bio-inspired decoherence suppression mechanisms relevant to quantum computing
  - Optogenetic manipulation of cryptochrome in bird retinas, combined with quantum-state tomography of isolated cryptochrome, could close the loop between molecular quantum physics and animal behaviour in a single experimental system
  - Quantum sensing theory predicts which chemical modifications to cryptochrome would improve or degrade compass sensitivity — testable mutagenesis targets for sensory biologists
communication_gap: >
  Quantum physicists and sensory biologists occupy completely separate conference
  circuits (APS/quantum-optics meetings vs. behavioural-biology and ornithology
  conferences). The mathematical language of the Cramér-Rao bound, quantum Fisher
  information, and Lindblad dynamics is inaccessible to most biologists; the
  specifics of cryptochrome genetics, radical-lifetime biochemistry, and avian
  retinal anatomy are inaccessible to most physicists. Grant panels for quantum
  biology remain rare; the field sits between BBSRC/NSF-biology and EPSRC/NSF-physics
  without a clear home in either.

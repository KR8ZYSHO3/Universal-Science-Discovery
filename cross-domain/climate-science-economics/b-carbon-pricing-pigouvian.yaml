cross_pollination_opportunities:
  - >
    ECS uncertainty reduction from climate science (constraining the 1.5-4.5°C
    range) has direct economic value: narrowing ECS by one standard deviation
    reduces SCC uncertainty by ~50% and changes the optimal carbon price by
    ~$20-40/tCO₂. This quantifies the economic value of climate science
    investment — a bridge between climate funding policy and economic analysis.
  - >
    Non-stationary Ramsey models with tipping points: include a jump process
    in the climate ODE (e.g. Dietz & Stern 2015 with catastrophic tipping) and
    solve the HJB equation for optimal carbon price under tipping risk. This
    requires stochastic optimal control theory from engineering and finance,
    combined with palaeoclimate tipping point data from climate science.
  - >
    Empirical SCC estimation from revealed preference: hedonic property value
    studies near climate-exposed coastlines and health cost studies from extreme
    heat provide bottom-up SCC components that can validate IAM top-down
    estimates. Bridging micro-econometrics with macro-IAM modelling.
communication_gap: >
  Climate scientists and economists work in largely separate communities and
  publish in separate journals. Climate models are validated on physical
  observables (temperature, sea level, ice extent); economic models are
  validated on GDP growth and consumption data. The IAM community
  (Nordhaus, Stern, Weitzman, Dietz) sits at the intersection but is relatively
  small. Most climate scientists are unfamiliar with Ramsey growth theory;
  most economists are unfamiliar with radiative forcing calculations. Policy
  bodies (IPCC Working Group III) bring them together, but the underlying
  mathematical bridge is rarely made explicit in either field's pedagogy.

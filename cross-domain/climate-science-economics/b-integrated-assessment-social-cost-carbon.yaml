related_hypotheses:
  - h-scc-convex-damages-fat-tails
cross_pollination_opportunities:
  - >
    Machine learning damage functions: replace parametric D(T) = 1/(1+aT+bT²)
    with data-driven non-parametric damage functions trained on historical
    economic-climate correlations across countries, while accounting for
    adaptation. This would reduce the largest uncertainty in IAM outputs.
  - >
    Physical tipping point integration: couple stochastic differential equations
    for tipping points (AMOC collapse, Amazon dieback, permafrost feedback)
    directly into the IAM framework using Markov jump processes. Current IAMs
    largely ignore non-linear tipping cascades.
communication_gap: >
  Atmospheric physicists and welfare economists use incompatible frameworks and
  rarely co-author. IAM modelers (Nordhaus — economics Nobel 2018; Hansen —
  atmospheric physicist) have fundamentally different assumptions about discount
  rates, damage functions, and uncertainty handling. The IPCC Working Group III
  (mitigation economics) and Working Group I (physical science) are often
  written by non-overlapping author groups with limited cross-citation.
last_reviewed: "2026-05-06"

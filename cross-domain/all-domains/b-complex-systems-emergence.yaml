id: b-complex-systems-emergence
title: >
  Emergence — the appearance of macro-level properties not predictable from
  micro-level rules without full simulation — is the unifying concept across
  all scientific domains: consciousness from neurons, wetness from H₂O, markets
  from trades, and ant colonies from individual ant behaviour, formalised by
  renormalization group theory (why coarse-graining yields qualitatively new
  laws) and Tononi's Integrated Information Theory (Φ as a quantitative measure).
status: established
fields:
  - physics
  - biology
  - neuroscience
  - computer-science
  - social-science
  - philosophy-of-science
  - complex-systems
  - mathematics
bridge_claim: >
  Anderson's "More is Different" (1972): each level of organisation obeys its
  own laws not derivable from — though consistent with — lower levels. Formal
  definition of emergence (Bedau 1997): a system S exhibits emergence if S has
  properties P such that (a) individual components lack P, (b) P cannot be
  predicted from the rules of components without simulating the full system
  (weak emergence) or (c) P is in principle unpredictable from lower-level
  laws (strong emergence). Renormalization group (RG) provides the mechanism
  for why emergence yields universal laws: coarse-graining (integrating out
  fast/small-scale degrees of freedom) flows in theory space toward fixed points;
  at fixed points, systems are described by qualitatively new effective field
  theories with their own degrees of freedom (order parameters). Wilson's RG
  explanation of universality in critical phenomena (Nobel 1982): different
  materials near their critical points obey identical laws because all RG
  trajectories flow to the same fixed point, erasing microscopic details.
  This is why: (1) liquid-gas transition is identical to the Ising ferromagnet
  (same universality class); (2) the brain may have emergent information-
  processing laws independent of its specific biochemistry (Anderson's claim);
  (3) economic markets have statistical laws (Pareto, Zipf) independent of
  individual trading decisions. Tononi's Integrated Information Theory (IIT):
  Φ = min over bipartitions of the system [φ(S)] measures the information
  generated by the whole above its parts — proposed as the quantitative measure
  of consciousness (strong emergence). This bridges neuroscience, philosophy,
  and information theory as a single number measuring "more is different."
translation_table:
  - field_a_term: RG fixed point (theory space)
    field_b_term: emergent law valid at macroscopic scale (e.g. fluid dynamics from atomic collisions)
    note: Fixed point = the effective theory that describes the coarse-grained system; Navier-Stokes is a fixed point of molecular dynamics
  - field_a_term: order parameter (e.g. magnetisation M, condensate ψ)
    field_b_term: emergent collective variable (e.g. temperature, pressure, price)
    note: Order parameters do not exist at the microscopic level; they appear only via coarse-graining
  - field_a_term: universality class (same RG fixed point)
    field_b_term: different systems obeying identical macroscopic laws
    note: "Liquid-gas = Ising = polymer chain collapse: same critical exponents, different microscopic physics"
  - field_a_term: Tononi Φ (integrated information)
    field_b_term: quantitative measure of emergence / consciousness
    note: Φ > 0 requires causal integration; Φ = 0 for any feedforward or fully disconnected system
  - field_a_term: Simon's hierarchical architecture (nearly decomposable systems)
    field_b_term: modular emergence — complexity builds in layers (atoms → molecules → cells → organisms)
    note: Near-decomposability enables evolution to modify one level without disrupting others

cross_pollination_opportunities:
  - >
    Testing whether neural systems near criticality have measurably higher Φ
    (IIT) than subcritical or supercritical systems would provide the first
    direct experimental link between RG criticality and emergence theory —
    combining statistical physics (criticality), neuroscience (fMRI/EEG),
    and information theory (Φ computation).
  - >
    Applying RG-style coarse-graining to economic data: constructing the RG
    flow from individual trading decisions to market-level dynamics could
    identify the "universality class" of different market types (commodity,
    equity, crypto) and predict which laws are emergent and stable vs.
    which depend on microscopic regulatory structure.
communication_gap: >
  Emergence is discussed in every field but with incompatible definitions and
  without cross-domain unification. Physicists use RG to make "emergence"
  precise; philosophers debate strong vs. weak emergence; biologists discuss
  emergence qualitatively; computer scientists study emergence in cellular
  automata; social scientists use emergence loosely for anything collective.
  Anderson's 1972 Science paper is cited across all fields but its mathematical
  content (RG as the theory of emergence) is rarely followed through. IIT has
  been adopted by some neuroscientists but rejected by many consciousness
  researchers as untestable; it has not penetrated physics or social science at all.

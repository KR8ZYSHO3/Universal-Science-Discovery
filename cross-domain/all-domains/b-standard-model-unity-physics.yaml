cross_pollination_opportunities:
  - >
    Quantum field theory techniques (functional renormalization group, lattice field theory)
    are increasingly applied to condensed matter and biological systems (protein folding,
    neural networks as field theories). Formal connections between particle physics and
    these domains remain underexplored despite shared mathematical machinery.
  - >
    The Standard Model's failure at cosmological scales (dark matter, dark energy) represents
    an opening for astrophysics, cosmology, and high-energy physics to converge — with
    potential experimental signatures in gravitational waves (LIGO/LISA), CMB polarimetry,
    and direct detection experiments that require combined expertise.
communication_gap: >
  Particle physicists and condensed matter physicists share the same mathematical tools
  (gauge theory, renormalization group) but publish in separate journals (Physical Review
  Letters vs. Physical Review B) and attend separate conferences (APS April Meeting vs.
  APS March Meeting). The cross-domain relevance of the Standard Model to chemistry,
  biology, and cosmology is understood by specialists but not integrated into curricula
  across fields. Most chemists and biologists are unaware that their domain is shaped by
  the symmetry structure of the Standard Model.

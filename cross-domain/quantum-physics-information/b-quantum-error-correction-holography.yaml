cross_pollination_opportunities:
  - >
    Surface codes (the leading architecture for fault-tolerant quantum
    computing) have a 2D spatial structure reminiscent of the AdS bulk.
    The logical qubit in a surface code is encoded in boundary anyons
    in a way that is formally analogous to AdS/CFT. Importing holographic
    renormalization group techniques to analyse the thermodynamic limit
    of surface codes could give new insights into topological quantum
    memory stability at finite temperature.
  - >
    The island formula and replica wormholes (Almheiri et al. 2020)
    that resolve the black hole information paradox use quantum error
    correction implicitly. Making the code structure explicit — identifying
    the stabilizers, logical operators, and code distance of the island
    formula — would provide a fully algebraic formulation of black hole
    information recovery, potentially accessible to quantum information
    theorists without string theory background.
  - >
    Quantum LDPC codes (sparse codes achieving near-optimal parameters)
    have recently been constructed that asymptotically approach the
    quantum Gilbert-Varshamov bound. These codes have a hyperbolic
    geometry structure (Tillich & Zémor 2014). Since AdS space is
    hyperbolic, hyperbolic quantum LDPC codes may be the natural
    discrete models of AdS/CFT, with their parameters (n, k, d) directly
    mapping to AdS radius, number of bulk fields, and minimal surface area.
communication_gap: >
  The quantum error correction community (quantum computing, quantum
  information) and the quantum gravity / string theory community work in
  largely separate journals (Phys Rev A vs JHEP) with different language
  and training. Almheiri, Dong, and Harlow's 2015 paper was a landmark
  bridge, but it is read mainly in the quantum gravity literature. Working
  quantum error correction engineers building surface code chips are
  unaware that their code geometry has a gravitational dual. Conversely,
  string theorists developing the island formula rarely read the quantum
  error correction engineering literature where fault-tolerance threshold
  theorems might offer new tools for the information paradox.

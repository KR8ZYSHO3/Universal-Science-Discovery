id: b-quantum-error-correction-holography
title: >
  Quantum error-correcting codes (stabilizer codes, surface codes) and
  the holographic principle in quantum gravity (AdS/CFT) are the same
  mathematical structure: bulk operators in AdS are encoded in boundary
  CFT degrees of freedom via a quantum error-correcting code, with the
  Ryu-Takayanagi formula (S = A/4G_N) expressing entanglement entropy
  as a quantum error-correction redundancy statement.
status: proposed
fields:
  - quantum-information-theory
  - quantum-gravity
  - string-theory
  - quantum-error-correction
  - condensed-matter-physics
bridge_claim: >
  Quantum error correction encodes k logical qubits in n physical qubits
  with distance d (denoted [[n,k,d]]), such that any error affecting
  fewer than d/2 qubits can be detected and corrected. The key property
  is redundancy: the logical information is non-locally distributed
  across the physical qubits so that no local subsystem reveals the
  logical state.

  The AdS/CFT correspondence (Maldacena 1997) maps a quantum gravity
  theory in (d+1)-dimensional anti-de Sitter space (AdS, the "bulk")
  to a conformal field theory (CFT) on the d-dimensional boundary. The
  holographic principle states that the bulk theory is fully encoded in
  the boundary — the boundary CFT is the "code" and the bulk is the
  "logical" information being protected.

  Almheiri, Dong, and Harlow (2015) proved that this is literally a
  quantum error-correcting code:

  1. HKLL RECONSTRUCTION = ERASURE CORRECTION: The bulk-to-boundary
     map (Hamilton-Kabat-Lifschytz-Lowe reconstruction) allows a bulk
     operator φ(x) at bulk point x to be represented by different
     boundary operators depending on which boundary region one uses.
     This means the bulk information is encoded with redundancy: even
     if a boundary region A is "erased," the bulk can be reconstructed
     from the complement Ā. This is exactly the defining property of
     an erasure-correcting quantum code.

  2. RYU-TAKAYANAGI FORMULA AS CODE PROPERTY: The entanglement entropy
     of boundary region A is S(A) = Area(γ_A) / 4G_N, where γ_A is
     the minimal geodesic surface in the bulk homologous to A (Ryu &
     Takayanagi 2006). In quantum error-correction language, the minimal
     surface is the "quantum error correction radius" — the amount of
     boundary that must be erased to destroy the encoded bulk information.
     This formula is an exact quantum Singleton bound.

  3. PERFECT TENSORS = HOLOGRAPHIC CODES: Pastawski et al. (2015)
     constructed explicit tensor-network models of AdS/CFT using "perfect
     tensors" — tensors that are maximally entangled across any bipartition.
     These toy holographic codes reproduce the RT formula exactly and
     are concrete quantum error-correcting codes (using [[5,1,3]] or
     [[6,0,4]] perfect codes as building blocks). The tensor network
     geometry = the bulk AdS geometry.

  4. RINDLER WEDGE = CODE SUBSPACE: The Rindler wedge (the causal
     diamond accessible to an accelerating observer) corresponds to the
     "code subspace" of an erasure-correcting code. The bulk-to-boundary
     encoding is equivalent to a quantum Reed-Solomon code, and the
     Rindler wedge condition is the condition that the code distance d
     exceeds the size of the erased boundary region.

  5. BLACK HOLE INFORMATION PARADOX AS CODE FAILURE: The information
     paradox (Hawking 1974) — does information escape a black hole? —
     is, in code language, a question about whether the holographic code
     can survive the "erasure" of the interior. The Page curve (Page 1993),
     recently derived from the island formula and replica trick (Almheiri
     et al. 2020), is the statement that the code succeeds: information
     escapes in Hawking radiation, consistent with unitarity.

  STABILIZER CODE STRUCTURE: The RT formula's additivity (S(AB) =
  S(A) + S(B) for disjoint regions in the vacuum) is the condition
  for the boundary theory to decompose as a stabilizer code, where the
  stabilizer generators correspond to boundary symmetry generators and
  the logical operators correspond to bulk field operators.

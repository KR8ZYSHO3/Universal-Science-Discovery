id: b-stellar-structure-thermodynamics
title: >
  Stars are self-gravitating thermodynamic systems with negative heat capacity —
  a feature unique to long-range gravitational interactions (Lynden-Bell & Wood 1968)
  — causing them to heat up when they lose energy, and the Lane-Emden polytrope
  equations describe hydrostatic equilibrium as a competition between gravitational
  potential and thermal pressure whose stability is governed by the virial theorem.
status: established
fields:
  - astronomy
  - statistical-physics
  - thermodynamics
  - astrophysics
bridge_claim: >
  In normal thermodynamic systems, heat capacity C = dE/dT > 0: adding energy
  increases temperature. Lynden-Bell & Wood (1968, MNRAS 138:495) showed that
  self-gravitating systems have C < 0 — a fundamental consequence of the virial
  theorem — with profound observational consequences:

  1. Negative heat capacity from the virial theorem. For a system in virial
     equilibrium with total energy E = K + V (kinetic + potential):
       2K + V = 0  (virial theorem for gravitational systems)
     Therefore E = K + V = K + (-2K) = -K = -3NkT/2 (for ideal gas stars).
     So dE/dT = -3Nk/2 < 0: the heat capacity is negative. When a star
     radiates energy (loses E), E decreases (becomes more negative), which
     means T increases — the star gets hotter while radiating. This is why
     stars shine stably for billions of years without cooling down.

  2. Gravothermal catastrophe (Lynden-Bell & Wood). In a stellar cluster or
     star's core, the negative heat capacity causes an instability: a hotter
     denser core transfers energy to the cooler outer envelope, but this cools
     the core (makes it hotter by the negative heat capacity!) and heats the
     envelope. This runaway process (gravothermal catastrophe) drives core
     collapse in globular clusters and forms stellar remnants (white dwarfs,
     neutron stars, black holes).

  3. Lane-Emden equation and polytropic stellar models. Assuming a polytropic
     equation of state P = K ρ^{(1+1/n)}, the hydrostatic equilibrium
     (dP/dr = -ρ·GM/r²) combined with Poisson's equation (∇²Φ = 4πGρ) gives
     the Lane-Emden equation:
       d/dξ (ξ² dθ/dξ) + ξ² θⁿ = 0
     where θ = (ρ/ρ_c)^{1/n} and ξ = r/α (dimensionless radius). Solutions:
       n=0: uniform density sphere; n=1: Chandrasekhar's degenerate white dwarf;
       n=3: Eddington standard model (radiation pressure dominated);
       n=5: Schuster-Emden critical solution.
     The critical stability boundary for polytropes is n = 3 — above which no
     stable static equilibrium exists (Chandrasekhar 1935), directly connecting
     to the Chandrasekhar mass limit for white dwarfs.

  4. Jeans instability and star formation. The gravitational instability of
     a self-gravitating gas cloud (Jeans 1902) occurs when the Jeans length
     λ_J = (πc_s² / Gρ)^{1/2} exceeds the cloud size, leading to gravitational
     collapse. This is a thermodynamic phase transition between the dispersed
     gas phase and the collapsed stellar phase — directly analogous to spinodal
     decomposition in condensed matter physics (negative effective pressure
     triggers spontaneous phase separation).

  5. Statistical mechanics of long-range interactions. Lynden-Bell (1967)
     showed that violent relaxation in collisionless gravitational systems
     produces a quasi-equilibrium (Lynden-Bell statistics) that differs from
     both Fermi-Dirac and Bose-Einstein statistics — a new universality class
     of statistical mechanics applicable only to long-range interacting systems.
     This connects stellar dynamics to the foundations of statistical physics.

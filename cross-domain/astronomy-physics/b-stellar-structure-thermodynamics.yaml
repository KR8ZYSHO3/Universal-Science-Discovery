cross_pollination_opportunities:
  - >
    Generalised thermodynamics for long-range systems: Tsallis non-extensive
    statistics (q-statistics, with entropy S_q = (1 - Σ p_i^q)/(q-1)) has been
    proposed as a framework for gravitational systems. Testing whether stellar
    velocity distributions in globular clusters fit Tsallis distributions
    (q ≈ 1.3) rather than Maxwell-Boltzmann would constrain long-range
    statistical mechanics — bridging astrophysics and foundations of statistical
    physics.
  - >
    Globular cluster core collapse as a laboratory for negative-heat-capacity
    thermodynamics: the timescale of core collapse (gravothermal catastrophe)
    is observable in globular cluster morphology (concentration parameter c in
    King profiles). Statistical physics predictions for core-collapse rates
    under different initial conditions can be tested against the catalogue of
    Milky Way globular clusters.
  - >
    Nuclear equation of state from neutron stars: neutron stars are Lane-Emden
    polytropes with n determined by the nuclear equation of state at supranuclear
    density. LIGO/Virgo tidal deformability measurements and NICER mass-radius
    measurements constrain n, bridging nuclear physics (CEFT, perturbative QCD)
    and stellar structure thermodynamics.
communication_gap: >
  Astrophysicists and statistical physicists rarely co-author. The negative
  heat capacity result (Lynden-Bell & Wood 1968) is well-known in stellar
  dynamics and globular cluster research, but largely unknown in statistical
  physics pedagogy, where it would be a striking illustration of the
  non-universality of thermodynamic stability. Conversely, the Tsallis
  non-extensive statistics literature (statistical physics) has not been
  widely tested by observational astronomers. The Lane-Emden solutions are
  standard stellar structure pedagogy but their connection to polytropic
  phase transitions in condensed matter physics is rarely discussed.

id: b-tidal-locking-spin-orbit-resonance
title: >
  Tidal locking is a dissipative dynamical systems problem where tidal torques
  drive a satellite toward spin-orbit resonance attractors, with the 1:1 resonance
  (synchronous rotation) being the stable fixed point for low eccentricity orbits —
  explained by the same dissipative mechanics that governs coupled oscillator
  synchronization in physics.
status: proposed
fields:
  - astronomy
  - physics
  - dynamical-systems
bridge_claim: >
  The Moon always shows the same face to Earth because tidal forces from Earth
  dissipate energy in the Moon's interior until its rotation period equals its
  orbital period (1:1 spin-orbit resonance). Dynamical systems theory provides the
  framework: the tidally averaged torque creates a potential-like function of the
  spin rate, with stable fixed points at resonant frequencies omega_spin = p/q *
  omega_orbital. The 1:1 resonance is the primary attractor for nearly circular
  orbits; Mercury's 3:2 resonance arises because its high eccentricity (0.2)
  creates additional potential well at 3:2. The capture probability into each
  resonance depends on the resonance width (orbital eccentricity) and tidal
  dissipation rate (Q factor). The same equations describe coupled pendulums,
  Josephson junction frequency locking, laser injection locking, and circadian
  rhythm entrainment — all are phase-locking in dissipative oscillator systems.
  This bridge connects planetary science observations (tidal locking statistics
  in exoplanet surveys) with fundamental dynamical systems theory.
translation_table:
  - field_a_term: stable fixed point of tidally averaged spin equation
    field_b_term: synchronous rotation (1:1 or other spin-orbit resonance)
    note: The attractor of the dissipative spin dynamics — the resonance the body evolves toward
  - field_a_term: tidal Q factor (dissipation rate)
    field_b_term: rate of approach to synchronous rotation
    note: Low Q (high dissipation) = fast locking; rocky planets lock in ~10^8-10^9 yr
  - field_a_term: resonance width (related to eccentricity)
    field_b_term: capture probability into resonance
    note: High eccentricity opens multiple stable resonance attractors (3:2, 2:1, etc.)
  - field_a_term: Arnold tongue (phase-locking region in parameter space)
    field_b_term: tidal locking parameter space (Q vs. eccentricity diagram)
    note: The region in parameter space where a given resonance is stable
cross_pollination_opportunities:
  - Use tidal locking statistics from Kepler/TESS exoplanet surveys to measure tidal Q factors and test dynamical systems predictions for resonance capture rates
  - Apply Arnold tongue analysis to predict which moons of giant exoplanets are tidally locked from orbital parameters alone
  - Transfer Kuramoto model synchronisation theory to tidal locking networks (multi-moon systems) to predict resonance chains
last_reviewed: "2026-05-07"

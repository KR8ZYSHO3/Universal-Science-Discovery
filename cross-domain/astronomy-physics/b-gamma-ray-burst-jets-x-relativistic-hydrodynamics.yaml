id: b-gamma-ray-burst-jets-x-relativistic-hydrodynamics
title: Gamma-ray burst jets are relativistic outflows whose shocks, deceleration, and afterglow
  breaks are modeled with relativistic hydrodynamics and blast-wave theory bridging astronomy
  and plasma physics.
status: established
fields:
- astrophysics
- high-energy-astrophysics
- fluid-dynamics
- relativity
bridge_claim: GRBs involve collimated flows with Lorentz factors inferred from opacity arguments
  and afterglow onset times. Internal shocks and external forward shocks convert kinetic energy
  into non-thermal particles and radiation. Relativistic hydrodynamics supplies self-similar
  blast-wave solutions (Blandford–McKee-type scalings) that predict light-curve breaks when
  the jet slows and geometry becomes apparent. The bridge ties observations (prompt emission,
  afterglow chromatic breaks) to PDE-based models with microphysical uncertainties (magnetic
  fields, particle acceleration). It is the same mathematical infrastructure used in relativistic
  heavy-ion and AGN jet contexts, with different boundary conditions.
translation_table:
- field_a_term: Lorentz factor Γ
  field_b_term: ultra-relativistic bulk motion of ejecta
- field_a_term: relativistic shock jump conditions
  field_b_term: particle heating and synchrotron emission
- field_a_term: jet break in light curve
  field_b_term: hydrodynamic transition + geometric beaming effects

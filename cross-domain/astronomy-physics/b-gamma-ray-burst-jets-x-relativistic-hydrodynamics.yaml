cross_pollination_opportunities:
- Import RHD codes validated on heavy-ion experiments to test GRB jet stability with realistic
  EOS.
- Use multimessenger neutrino upper limits to constrain shock acceleration efficiency consistently
  with RHD.
communication_gap: GRB reviews target astro audiences; relativistic fluid textbooks target
  plasma physics. Cross-citation of numerical method papers is uneven.

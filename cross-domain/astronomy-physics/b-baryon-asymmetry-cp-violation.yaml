id: b-baryon-asymmetry-cp-violation
title: >
  The cosmological matter-antimatter asymmetry (baryon-to-photon ratio eta ~ 6e-10)
  demands CP-violating physics beyond the Standard Model: the observed CKM CP
  violation is ten orders of magnitude too small, linking baryogenesis directly
  to the open problem of CP violation in leptonic and hadronic sectors.
status: proposed
fields:
  - astronomy
  - cosmology
  - particle-physics
  - nuclear-physics
bridge_claim: >
  The observed universe contains approximately one baryon per 10^9 photons
  (eta_B ~ 6e-10, measured by CMB and Big Bang nucleosynthesis). A universe
  that begins matter-antimatter symmetric cannot arrive at this state without
  satisfying Sakharov's three conditions (1967): baryon number violation (B),
  CP violation (C and CP symmetry broken), and departure from thermal equilibrium.

  The Standard Model satisfies all three conditions in principle: electroweak
  sphalerons violate B+L, the CKM matrix contains a CP-violating phase delta_CP,
  and the electroweak phase transition provides the departure from equilibrium.
  However, the SM CP violation is suppressed by small quark mass ratios and
  mixing angles, producing a baryon asymmetry roughly 10^10 times smaller than
  observed. This is the baryogenesis gap.

  Leptogenesis (Fukugita and Yanagida, 1986) bridges this gap: heavy Majorana
  neutrinos (mass M ~ 10^10 GeV) decay out of equilibrium in the early universe,
  producing a lepton asymmetry via CP violation in the neutrino Yukawa couplings.
  Electroweak sphalerons then partially convert the lepton asymmetry into baryon
  asymmetry. This mechanism ties the cosmological matter excess directly to
  neutrino mass physics — the same sector that produced the Nobel-winning
  discovery of neutrino oscillations.

  The bridge connects cosmological observation (eta_B from Planck CMB) with
  laboratory particle physics (neutrino mixing angles from T2K, NOvA, DUNE;
  neutron electric dipole moment searches; proton decay experiments). The
  magnitude and phase of leptonic CP violation measured in oscillation experiments
  is literally the same CP-violating parameter that determines whether baryogenesis
  succeeded — making neutrino physics experiments direct tests of cosmological
  matter-antimatter asymmetry.
translation_table:
  - field_a_term: baryon-to-photon ratio eta_B ~ 6e-10
    field_b_term: CP-violating phase delta_CP in PMNS neutrino mixing matrix
    note: Leptogenesis connects these; measuring delta_CP tests baryogenesis
  - field_a_term: Sakharov condition 2 (CP violation)
    field_b_term: CKM/PMNS phase and electric dipole moments
    note: SM CKM CP violation is 10^10 too small; beyond-SM CP violation required
  - field_a_term: electroweak sphaleron (B+L violation)
    field_b_term: non-perturbative electroweak topology change
    note: Sphalerons convert lepton to baryon number; freeze out at T_EW ~ 130 GeV
  - field_a_term: electroweak phase transition (first-order vs. crossover)
    field_b_term: departure from thermal equilibrium (Sakharov condition 3)
    note: SM has a crossover, not a first-order transition; requires BSM physics for strong EWPT
  - field_a_term: heavy Majorana neutrino mass (leptogenesis scale)
    field_b_term: seesaw mechanism for light neutrino mass
    note: m_nu ~ v^2 / M_R; measuring light neutrino masses constrains leptogenesis scale
related_unknowns:
  - u-baryon-asymmetry-origin
  - u-leptogenesis-cp-scale
related_hypotheses:
  - h-leptogenesis-sm-cp-insufficient
cross_pollination_opportunities:
  - >
    DUNE and T2K/Hyper-K neutrino oscillation experiments will measure the leptonic
    CP-violating phase delta_CP to ~10 degree precision. If delta_CP is near maximal
    (-pi/2), leptogenesis via the Davidson-Ibarra bound is more viable — a direct
    laboratory test of a cosmological mechanism.
  - >
    Neutron electric dipole moment (nEDM) experiments (n2EDM at PSI, SNS nEDM)
    probe CP violation in the hadronic sector with sensitivity below 10^-28 e·cm.
    Any nonzero nEDM signals CP-violating physics that could contribute to baryogenesis.
  - >
    Gravitational wave observatories (LISA, Einstein Telescope) can detect a
    stochastic GW background from a first-order electroweak phase transition.
    Detection would confirm the departure-from-equilibrium condition for electroweak
    baryogenesis and constrain BSM models.
communication_gap: >
  Cosmologists characterise the baryon asymmetry as a number to be explained.
  Particle physicists study CP violation through precision measurements of meson
  decays, neutrino oscillations, and electric dipole moments. Despite the direct
  connection, few experimental collaborations frame their neutrino oscillation
  results in terms of baryogenesis viability; the communities publish in separate
  journals (JCAP/ApJ vs. PRL/PRD) and the interdisciplinary connection is made
  mainly in theory review articles rather than experimental programs.

id: b-dark-matter-phase-transition-relics
title: >
  Cosmological dark matter candidates are thermal or non-thermal relics of specific
  early-universe phase transitions — WIMPs from electroweak freeze-out, axions from
  the QCD phase transition at 150 MeV, and primordial black holes from density
  fluctuations — connecting galactic-scale astrophysical observations to statistical
  mechanics of symmetry breaking in the early universe.
status: proposed
fields:
  - astronomy
  - cosmology
  - particle-physics
  - statistical-physics
  - nuclear-physics
bridge_claim: >
  The identity of dark matter is inseparable from the statistical physics of
  phase transitions in the early universe. Each major dark matter candidate is
  a relic of a specific transition:

  WIMPs (Weakly Interacting Massive Particles): produced thermally at the
  electroweak phase transition (T_EW ~ 130 GeV, t ~ 10^-12 s). The "WIMP miracle"
  is that a particle with electroweak-scale mass and coupling naturally produces
  the observed Omega_DM ~ 0.27 via thermal freeze-out when its interaction rate
  drops below the Hubble rate. This is Lee-Weinberg (1977) and is a direct
  connection between the phase structure of the electroweak sector and the
  dark matter abundance.

  Axions: the Peccei-Quinn symmetry breaks above the QCD scale, producing a
  pseudo-Nambu-Goldstone boson. When the QCD phase transition occurs at
  T_QCD ~ 150 MeV (t ~ 10^-5 s), the axion acquires a mass via instanton
  effects and begins oscillating in its potential — a coherent field oscillation
  that behaves as cold dark matter. The axion mass is set by the QCD topological
  susceptibility, directly linking QCD phase structure to dark matter density.
  The statistical physics of the QCD phase transition (order parameter: chiral
  condensate <qbar q>; universality class: O(4) in 2+1 flavors) determines
  the axion relic density.

  Primordial black holes (PBHs): density fluctuations that exceed the Jeans
  criterion at horizon re-entry can collapse directly to black holes. Enhanced
  power spectra at specific scales (from inflationary features or a first-order
  QCD phase transition softening the equation of state) produce PBH mass functions
  peaked at the solar mass scale — precisely where LIGO detected unexpected
  merger events. The QCD phase transition at 150 MeV corresponds to a PBH mass
  of ~ 1 solar mass via the horizon mass at that epoch.

  The bridge is statistical physics: all three mechanisms rely on the dynamics
  of phase transitions — freeze-out is a non-equilibrium statistical process,
  axion mass generation is driven by QCD condensation, and PBH formation requires
  understanding density fluctuation statistics near the QCD crossover.
translation_table:
  - field_a_term: dark matter relic density Omega_DM h^2 ~ 0.12
    field_b_term: freeze-out abundance from Boltzmann equation (non-equilibrium stat. mech.)
    note: The WIMP miracle connects DM abundance to electroweak phase structure
  - field_a_term: WIMP mass ~ 100 GeV - 1 TeV
    field_b_term: electroweak phase transition temperature T_EW ~ 130 GeV
    note: Mass scale set by where thermal freeze-out produces correct relic density
  - field_a_term: axion mass m_a ~ 10^-5 eV (for f_a ~ 10^12 GeV)
    field_b_term: QCD topological susceptibility chi_top(T)
    note: Axion mass from instanton effects; directly measurable in lattice QCD
  - field_a_term: axion coherent oscillation (misalignment mechanism)
    field_b_term: symmetry restoration / breaking at QCD crossover (T ~ 150 MeV)
    note: Axion rolls to minimum when m_a(T) ~ H(T); this is a phase transition effect
  - field_a_term: primordial black hole mass ~ 1 solar mass
    field_b_term: QCD phase transition at T ~ 150 MeV (horizon mass at that epoch)
    note: Softening of equation of state at QCD crossover enhances PBH formation
  - field_a_term: LIGO binary black hole merger rates
    field_b_term: PBH mass function from density fluctuations near QCD epoch
    note: Unexpected LIGO events in 30-100 Msun range may be QCD-epoch PBHs

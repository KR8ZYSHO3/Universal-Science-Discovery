cross_pollination_opportunities:
  - >
    Lattice QCD calculations of the topological susceptibility chi_top(T) across
    the QCD crossover directly set the axion mass for a given Peccei-Quinn scale.
    Improved lattice results (from MILC, BMW, HotQCD collaborations) directly
    constrain the axion dark matter window — a rare case where nuclear theory
    predictions can be tested by astrophysical observations (axion haloscopes like
    ADMX, CASPEr).
  - >
    The QCD equation of state near the crossover (computable from lattice QCD)
    determines the PBH mass function from density fluctuations at that epoch.
    Comparing the predicted PBH merger rate with LIGO O4/O5 observations tests
    whether QCD-epoch PBHs contribute to the dark matter abundance.
  - >
    A first-order electroweak phase transition (requiring BSM physics) would
    generate a stochastic gravitational wave background detectable by LISA,
    directly testing whether electroweak baryogenesis and WIMP dark matter
    share the same phase transition.
communication_gap: >
  Astrophysicists measuring dark matter properties (galactic rotation curves,
  CMB power spectrum, gravitational lensing) rarely engage with the QCD phase
  transition literature; nuclear theorists computing lattice QCD thermodynamics
  rarely frame their results in terms of dark matter constraints. The WIMP
  miracle is well-known across communities, but the QCD-axion and QCD-PBH
  connections remain largely siloed in specialist subfields.

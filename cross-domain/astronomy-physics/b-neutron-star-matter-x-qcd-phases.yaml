id: b-neutron-star-matter-x-qcd-phases
title: Neutron star interiors probe cold ultra-dense matter whose equation of state ties nuclear
  theory and QCD-informed models to observable masses, radii, and tidal deformabilities.
status: established
fields:
- nuclear-physics
- astrophysics
- dense-matter
- QCD
bridge_claim: 'Neutron stars support masses up to about two solar masses, constraining pressure
  versus density relations for matter above nuclear saturation. Microscopic models combine
  nucleonic matter, hyperons, or quark phases depending on density; QCD provides constraints
  on high-density limits and symmetry energy trends, while nuclear forces determine detailed
  composition. Multimessenger observations (GW170817 tidal deformability, NICER radius measurements)
  shrink allowed EOS bands, linking particle physics phase diagrams to astronomical measurements.
  The bridge is bidirectional: astrophysics falsifies nuclear models; nuclear models predict
  macroscopic stellar properties.'
translation_table:
- field_a_term: equation of state P(ρ)
  field_b_term: mass–radius relation and maximum mass
- field_a_term: symmetry energy slope L
  field_b_term: crust thickness and tidal Love numbers
- field_a_term: phase transition to quark matter
  field_b_term: softening of EOS and twin stars / glitch phenomenology (speculative)
related_unknowns:
- u-neutron-star-core-qcd-constraints
related_hypotheses:
- h-tidal-deformability-tightens-symmetry-energy-slope
cross_pollination_opportunities:
- Use lattice QCD extrapolations at finite chemical potential to benchmark effective hadronic
  models for astrophysics.
- Combine pulsar glitch statistics with superfluid vortex models tied to crust–core coupling
  parameters.
communication_gap: Nuclear theorists emphasize microscopic interactions; astronomers emphasize
  observational posteriors. EOS parameterizations are not always expressed in QCD-interpretable
  coordinates.

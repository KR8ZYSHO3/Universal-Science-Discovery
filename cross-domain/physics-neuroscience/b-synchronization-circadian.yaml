cross_pollination_opportunities:
  - "Predict optimal jet-lag recovery protocols using Kuramoto re-entrainment dynamics and PRC measurements"
  - "Design chronotherapy schedules for SCN disorders (shift-work syndrome, DSWPD) as Kuramoto phase-resetting problems"
  - "Use electrical coupling as a backup synchronization channel when VIP signaling is disrupted - test via Kuramoto model with two coupling channels"
  - "Apply findings to social jet lag (mismatch between biological and social clocks) using population-level Kuramoto models"

communication_gap: >
  Kuramoto published in the physics literature (Progress of Theoretical Physics, 1975).
  Circadian biology is dominated by genetics and cell biology journals (Cell, Nature,
  PNAS neuroscience section). The mathematical mapping was made explicit by Gonze et al.
  (2005, Biophysical Journal) but remains poorly known among chronobiologists who treat
  SCN coupling as a biological curiosity rather than a phase-transition phenomenon with
  universal scaling laws.


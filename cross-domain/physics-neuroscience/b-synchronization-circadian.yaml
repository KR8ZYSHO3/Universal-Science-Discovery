id: b-synchronization-circadian
title: "Kuramoto phase locking ↔ circadian entrainment: jet lag as desynchronization crisis"
status: established
fields:
  - nonlinear-dynamics
  - chronobiology
  - neuroscience
  - statistical-physics

bridge_claim: >
  Kuramoto (1975) showed that a population of N weakly-coupled oscillators with
  heterogeneous natural frequencies omega_i synchronizes above a critical coupling
  strength K_c = 2/pi*g(0) (where g is the frequency distribution width), producing
  a collective phase-locked state described by the order parameter r = |1/N * sum e^{i*theta_j}|.
  Below K_c, oscillators remain incoherent (r→0); above K_c, r→1 and the
  population entrains to a common frequency. The suprachiasmatic nucleus (SCN) of
  the hypothalamus is a physical instantiation of this model: approximately 20,000
  neurons each running a cell-autonomous circadian oscillator (~24 h period),
  coupled via VIP neuropeptide signaling. Disrupting VIP coupling produces
  desynchrony among SCN cells, fragmented locomotor rhythms, and failure to
  entrain to light-dark cycles — the animal equivalent of permanent jet lag.
  Jet lag itself maps to a transiently subcritical or phase-shifted Kuramoto state:
  the external light-dark cycle (Zeitgeber) acts as a common drive forcing
  re-entrainment at rate proportional to the phase sensitivity function (PRC).
  Recovery from jet lag is thus described by the Kuramoto model with external forcing,
  and its slowness arises from the near-marginal coupling in the SCN.


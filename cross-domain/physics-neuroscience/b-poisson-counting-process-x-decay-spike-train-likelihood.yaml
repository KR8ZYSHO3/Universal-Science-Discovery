id: b-poisson-counting-process-x-decay-spike-train-likelihood
title: >
  Poisson counting-process models connect radioactive decay event counts and neural spike-train likelihoods: independent rare events produce exponential waiting times and count variance equal to the mean, while deviations expose refractory periods, bursting, or nonstationary rates.
status: established
fields:
  - probability
  - physics
  - neuroscience
bridge_claim: >
  The common object is the point process likelihood, not a claim that nuclei and neurons share mechanisms. Radioactive decay offers the memoryless baseline; neural spike trains use the same null model before testing refractory, history-dependent, or stimulus-driven departures.
translation_table:
  - field_a_term: decay rate lambda
    field_b_term: conditional intensity lambda(t | history)
    note: Both set expected event counts per time.
  - field_a_term: exponential waiting-time distribution
    field_b_term: inter-spike interval null model
    note: Memorylessness is the baseline to falsify.
  - field_a_term: overdispersion versus Poisson counts
    field_b_term: burstiness or rate heterogeneity diagnostic
    note: Fano-factor deviations need mechanism-specific follow-up.
communication_gap: >
  Physics teaching treats Poisson processes as decay examples, while computational neuroscience uses point-process GLMs with little reference back to radioactive-decay null models.
cross_pollination_opportunities:
  - Use time-rescaling residual plots from neuroscience to teach decay-detector dead-time corrections.
  - Use radioactive-decay counting experiments as controls for spike-train point-process software.
related_unknowns:
  - u-neural-decay-poisson-deviation-shared-overdispersion-tests
related_hypotheses:
  - h-time-rescaled-residuals-separate-poisson-from-bursty-counting-systems
references:
  - doi: "10.1038/nn0504-456"
    note: Brown et al. review point-process approaches for neural spike trains.
last_reviewed: "2026-05-07"

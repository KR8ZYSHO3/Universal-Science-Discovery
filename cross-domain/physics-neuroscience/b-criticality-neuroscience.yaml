id: b-criticality-neuroscience
title: >
  Brain-state transitions between avalanche-criticality and sub/super-critical
  regimes mirror second-order phase transitions in condensed-matter physics.
status: proposed
fields:
  - neuroscience
  - condensed-matter-physics
  - statistical-mechanics
  - information-theory
bridge_claim: >
  Neural avalanches (cascades of activity that follow a power-law size distribution)
  are the biological signature of a system operating near a second-order phase
  transition — the same mathematical structure that describes, e.g., the Ising model
  at its critical temperature, ferro-to-paramagnetic transitions, and percolation
  on lattices. At criticality, dynamic range, information capacity, and
  sensitivity to inputs are all simultaneously maximised. Condensed-matter physics
  has a century of tools (renormalisation group, scaling laws, universality classes)
  for characterising these transitions that neuroscience has barely started
  to borrow. Conversely, the brain is a biological instantiation of criticality
  achieved through evolution rather than tuned external parameters, offering
  physicists a new substrate for studying self-organised criticality.
translation_table:
  - field_a_term: critical temperature T_c
    field_b_term: balanced excitation/inhibition ratio
    note: Control parameter whose value determines the phase
  - field_a_term: order parameter (magnetisation)
    field_b_term: mean firing rate / synchrony level
    note: Observable that is zero in one phase, non-zero in another
  - field_a_term: correlation length ξ → ∞
    field_b_term: long-range spatial correlations in LFP/fMRI
    note: Diverging correlation length at criticality
  - field_a_term: power-law exponent (universality class)
    field_b_term: neural avalanche exponent τ ≈ 1.5
    note: Universal exponents independent of microscopic details
  - field_a_term: self-organised criticality
    field_b_term: homeostatic synaptic plasticity
    note: Mechanism by which the system tunes itself toward the critical point
related_unknowns:
  - u-brain-criticality-function
related_hypotheses:
  - h-criticality-conscious-integration
cross_pollination_opportunities:
  - Apply renormalisation-group techniques to multi-scale neural recordings (electrode array → mesoscale → whole-brain)
  - Use universality-class analysis to determine whether different brain regions belong to the same criticality class
  - Translate Landau theory of phase transitions into predictive models of psychiatric state transitions (e.g. depression ↔ mania)
  - Design closed-loop neuro-stimulation that tracks the order parameter and maintains the critical point in pathological states
communication_gap: >
  Neuroscience PhD training rarely includes statistical mechanics beyond basic
  probability; condensed-matter programmes rarely include biophysics. High-dimensional
  electrode data and fMRI signals require preprocessing pipelines unfamiliar to
  physicists. Publication venues do not overlap: Physical Review Letters vs Nature
  Neuroscience audiences are almost non-overlapping.

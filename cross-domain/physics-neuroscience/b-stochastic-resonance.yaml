cross_pollination_opportunities:
  - >
    Therapeutic vibrotactile noise devices for peripheral neuropathy (diabetes-related
    sensory loss). Collins et al. (1996) demonstrated proof of concept; SR physics
    predicts the optimal noise spectrum and amplitude for maximum benefit. Clinical
    trials comparing SR-optimized vs. random-noise protocols are lacking.
  - >
    Hearing aids and cochlear implants: if the cochlea uses SR, adding controlled
    noise to hearing aids (dithering) could improve speech detection in noise —
    the opposite of conventional noise-reduction engineering. SR-based dithering
    is an untested alternative to spectral subtraction.
  - >
    Neural recording and brain-computer interfaces: SR theory predicts that adding
    noise to the input of a BCI decoder with a hard threshold should improve
    detection of weak neural signals. Optimal noise amplitude can be estimated from
    the decoder's threshold and background noise statistics.
communication_gap: >
  Stochastic resonance was identified in physics (Benzi et al. 1981, Nicolis 1982)
  in the context of glacial climate oscillations, then moved to electronics and
  bistable ring lasers before reaching sensory biology. However, the physics and
  neuroscience literatures remain largely separate: neuroscientists cite the SR
  papers but rarely engage with the quantitative predictions from nonlinear dynamics
  (Kramers rate, SNR functional form). Therapeutic applications (noise-based
  prosthetics) are largely in rehabilitation engineering, disconnected from the
  theoretical physics foundation.

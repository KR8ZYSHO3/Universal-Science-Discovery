id: b-quantum-biology-neural-computation
title: >
  Three experimentally established quantum biological phenomena — photosynthetic
  exciton coherence, radical-pair magnetoreception in cryptochrome, and enzyme
  quantum tunneling — raise the contested question of whether quantum coherence
  plays a computational role in neural microtubules (Penrose-Hameroff Orch-OR),
  pitting quantum physics against decoherence timescale arguments in neuroscience.
status: contested
fields:
  - quantum-physics
  - biophysics
  - neuroscience
  - molecular-biology
  - consciousness-studies
bridge_claim: >
  Three quantum biological phenomena are now experimentally established at
  physiological temperatures:

  (1) Photosynthetic quantum coherence: Fleming and Engel et al. (2007)
  observed quantum beats in 2D electronic spectroscopy of the Fenna-Matthews-
  Olson (FMO) light-harvesting complex at 277 K. Exciton delocalization
  across multiple bacteriochlorophyll molecules — a quantum superposition state
  — survives for ~700 fs at room temperature. The coherence facilitates
  near-unity quantum efficiency of energy transfer by allowing the exciton to
  sample multiple pathways simultaneously (quantum walk), arriving at the
  reaction center before environmentally induced decoherence destroys the
  superposition. Efficiency would be ~95% classically vs. ~99% with coherence.

  (2) Avian magnetoreception via radical-pair mechanism: Earth's weak magnetic
  field (~50 μT) cannot drive classical chemistry at thermal energies. Ritz,
  Adem & Schulten (2000) proposed that the radical pair mechanism in
  cryptochrome (a flavoprotein in the avian retina) allows quantum spin
  chemistry: a photoinduced electron transfer creates a singlet radical pair;
  the Earth's magnetic field mixes singlet and triplet spin states at different
  rates depending on direction, leading to different chemical products depending
  on field orientation. Behavioural experiments in European robins confirm
  magnetic compass disruption by radio-frequency fields at the Larmor frequency
  — the smoking-gun for radical pair quantum coherence.

  (3) Enzyme hydrogen tunneling: quantum mechanical tunneling of protons and
  hydride ions through reaction barriers is well established in alcohol
  dehydrogenase, aromatic amine dehydrogenase, and other enzymes. Kinetic
  isotope effects (kH/kD > 7, far exceeding semi-classical predictions) and
  temperature dependence inconsistent with Arrhenius kinetics confirm tunneling.

  Penrose-Hameroff Orchestrated Objective Reduction (Orch-OR): Hameroff &
  Penrose (1996, revised 2014) propose that quantum superposition in tubulin
  dimers within neuronal microtubules undergoes "objective reduction" (OR) —
  quantum state collapse driven by quantum gravity (Penrose's objective
  reduction proposal) — constituting a moment of conscious experience. The
  orchestration is achieved by microtubule-associated proteins (MAPs) and
  anesthetics (which bind tubulin and abolish consciousness at clinical doses).

  The decoherence objection (Tegmark 2000): thermal decoherence in neurons
  at 310 K destroys quantum superposition of a tubulin dimer in ~10⁻¹³ s —
  13 orders of magnitude faster than neural timescales (~10⁻³ s). This argues
  quantum coherence in microtubules is irrelevant to computation. Hameroff &
  Penrose respond that microtubule structure (ordered water, topological
  protection) could extend decoherence times, but no direct measurement confirms
  this.

  Lambert et al. (2013) argue the three established quantum biology phenomena
  suggest biology has evolved to exploit quantum effects where useful —
  photosynthesis, magnetoreception, enzyme tunneling — raising the question
  of whether evolution has exploited quantum effects in neural information
  processing as well, even if the Orch-OR mechanism is wrong.

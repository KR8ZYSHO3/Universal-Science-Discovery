cross_pollination_opportunities:
  - >
    Direct measurement of quantum coherence lifetimes in neuronal microtubules
    using 2D electronic spectroscopy (the same technique that revealed FMO
    coherence) would test the Tegmark decoherence objection empirically. Current
    measurements are indirect (spectroscopy in vitro on purified tubulin). In
    situ measurements in living neurons at body temperature would settle the
    factual question about decoherence timescales.
  - >
    Cryptochrome is expressed in the human retina and brain. If radical-pair
    quantum spin chemistry in cryptochrome influences human magnetosensation
    or circadian rhythms, this provides a second pathway (beyond tubulin) by
    which quantum effects could influence neural function. The behavioral
    paradigms established for avian magnetoreception could be adapted for
    human psychophysics.
  - >
    Topological quantum computing requires protecting quantum states from
    decoherence using topological degrees of freedom. The biological question —
    does ordered water in microtubule lumen provide topological protection of
    quantum states? — is formally analogous. Quantum computing insights about
    decoherence protection could guide the search for biological analogs.
communication_gap: >
  Quantum physicists studying decoherence in biological systems (publishing in
  Physical Review Letters, Nature Physics) use terminology and methods
  (Lindblad master equations, two-dimensional electronic spectroscopy) unfamiliar
  to neuroscientists. Neuroscientists studying microtubules focus on cytoskeletal
  dynamics, mitosis, and axonal transport — rarely cite quantum physics. The
  Penrose-Hameroff hypothesis is widely discussed in consciousness studies and
  philosophy but dismissed by most neuroscientists and quantum physicists as
  lacking experimental support. The genuine quantum biology phenomena
  (photosynthesis, magnetoreception) are rarely connected to neuroscience in
  teaching or review articles.

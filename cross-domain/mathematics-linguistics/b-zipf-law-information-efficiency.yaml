cross_pollination_opportunities:
  - >
    Test whether emerging large language models (LLMs) trained on token
    prediction develop Zipf-distributed vocabularies automatically or require
    explicit regularisation. If LLMs converge to Zipf spontaneously, this
    confirms the entropy-maximisation story; deviations would quantify the
    role of training corpus biases vs. communication efficiency pressures.
  - >
    Zipf's law as a health indicator in complex systems: deviation from α ≈ 1
    in neural firing rate distributions (α shifts toward 0 or ∞) could
    indicate pathological states (epilepsy = α → 0; Parkinson's = α → ∞).
    The same diagnostic used for language health could extend to brain health.
  - >
    Cross-linguistic comparison of Zipf exponents: sign languages, constructed
    languages (Esperanto), and pidgins should have α ≈ 1 if the communication
    efficiency argument is correct, regardless of modality. This test would
    distinguish the information-theoretic story from language-specific accounts.
communication_gap: >
  Zipf's law is discussed in linguistics, economics, geography, and physics
  journals with almost no cross-citation. Linguists emphasise cognitive
  explanations (memory, word production); physicists emphasise statistical
  mechanics analogies; economists emphasise power-law firm/city size
  distributions. Mandelbrot's 1953 paper (written in French, published in
  a mathematics communication journal) is rarely cited in linguistics; Zipf's
  original books are rarely cited in physics. Piantadosi (2014) in a
  psychology journal is the clearest synthesis but reaches neither community
  consistently.

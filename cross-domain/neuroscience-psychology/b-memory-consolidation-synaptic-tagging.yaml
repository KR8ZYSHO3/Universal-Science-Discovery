cross_pollination_opportunities:
  - >
    Behavioral tagging (Moncada & Bhattacharya 2011): the STC mechanism explains why
    novelty exposure (activating dopamine-VTA circuit and producing PRPs) around the
    time of weak learning converts it to long-term memory. This has clinical implications:
    administering a brief novel stimulus (a new environment, an emotional cue) at the
    right time could enhance memory consolidation for patients with amnesia or learning
    difficulties — a translational application emerging directly from STC molecular biology.
  - >
    Sleep and STC: REM sleep may globally release PRPs (via acetylcholine-modulated CREB
    activation) while slow-wave sleep fires reactivation sequences that re-tag synapses
    from the previous day's experiences — implementing a global capture event timed to
    sleep cycles. This would explain why sleep within the PRP window (within hours of
    learning) is disproportionately beneficial for long-term memory consolidation.
communication_gap: >
  STC was discovered by Frey & Morris (1997) in rodent hippocampal slices and remained
  primarily within molecular neuroscience. Cognitive psychologists studying memory
  consolidation (McGaugh, Nader) rarely cite STC; STC papers rarely cite the behavioral
  psychology literature on consolidation windows and emotional memory enhancement.
  Martin, Bhattacharya (behavioral tagging) explicitly bridged the in vitro molecular
  and behavioral literatures starting ~2003 but the synthesis has not fully reached
  clinical neuropsychology or educational psychology.

id: b-memory-consolidation-synaptic-tagging
title: >
  Synaptic tagging and capture (Frey & Morris 1997) provides a cellular mechanism for
  associative memory consolidation: E-LTP sets a molecular "tag" at the synapse within
  minutes, while late LTP requires new protein synthesis from the cell body captured
  hours later, connecting the neuroscience of plasticity to the psychology of memory
  encoding and temporal associations.
status: established
fields:
  - neuroscience
  - psychology
  - molecular-neuroscience
  - memory
  - learning
bridge_claim: >
  Long-term potentiation (LTP) has two phases: early LTP (E-LTP, minutes, no new
  protein synthesis, PKA-dependent) and late LTP (L-LTP, hours to days, requires
  CREB-dependent transcription and new protein synthesis including Arc, BDNF, Homer).
  Frey & Morris (1997) demonstrated synaptic tagging and capture (STC): a weak
  stimulation that normally produces only E-LTP can be converted to L-LTP if the
  cell has recently produced plasticity-related proteins (PRPs) from a separate
  strong stimulation — even at a different synapse on the same neuron. The mechanism:
  weak stimulation sets a molecular "tag" at the activated synapse (consisting of
  activated CaMKII and early-phase signaling complexes); PRPs synthesized anywhere
  in the cell can be "captured" by the tag to stabilize L-LTP. This explains the
  synaptic specificity paradox: cell-wide PRP synthesis can selectively strengthen
  only tagged synapses. The temporal window (~1-2 hours) of tag persistence determines
  the associative memory window — events within this window can mutually strengthen
  each other. The psychology-neuroscience bridge: this mechanism implements associative
  memory consolidation (why emotionally salient events help consolidate nearby memories),
  episodic binding (why events in the same temporal context are associated), and
  explains state-dependent memory effects.
translation_table:
  - field_a_term: synaptic tag (activated CaMKII at weakly stimulated synapse)
    field_b_term: memory trace or engram tag (psychology)
    note: the molecular tag is the physical substrate of the psychological memory trace
  - field_a_term: plasticity-related proteins (PRPs — Arc, BDNF, Homer)
    field_b_term: consolidation signal (psychology) — the process that converts short-term to long-term memory
    note: PRP synthesis corresponds to the protein synthesis requirement for long-term memory consolidation
  - field_a_term: capture of PRPs by tagged synapse
    field_b_term: associative memory binding (events consolidated together within temporal window)
    note: STC temporal window (~1-2h) predicts the window for associative memory consolidation
  - field_a_term: L-LTP (synaptic weight change persisting >24h)
    field_b_term: long-term memory formation (days to decades)
    note: L-LTP is the cellular correlate of long-term memory; requires identical molecular machinery

bridge_claim: 'Established modeling correspondence: RBMs define bipartite energy functions whose Gibbs distribution parallels Boltzmann weights on interacting latent-visible spins up to representation choices; speculative analogy for training dynamics—optimization trajectories need not mirror physical equilibration timescales without explicit noise schedules.'

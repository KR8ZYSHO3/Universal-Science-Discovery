cross_pollination_opportunities:
  - >
    Genomics-guided antibiotic discovery: use genome mining tools (antiSMASH, BiG-SCAPE)
    to identify all BGCs in a soil metagenome; prioritise orphan clusters (no homologous
    known product) for heterologous expression; screen against a panel of multidrug-resistant
    ESKAPE pathogens to identify novel antibiotic scaffolds that bypass current resistance mechanisms.
  - >
    PKS combinatorial engineering: use the assembly-line analogy to design computational
    algorithms that predict the product of any module combination; build a library of
    2,000 chimeric PKS variants by domain swapping; test the prediction accuracy and
    use active variants as leads for antiprotozoal or antifungal drugs.
  - >
    Soil microbiome metabolomics survey: apply untargeted LC-MS metabolomics to soil
    samples from underexplored biomes (deep sea sediments, hyperarid desert, permafrost)
    matched with shotgun metagenomics; correlate novel metabolite masses with predicted
    BGC products to identify the most chemically novel microbiomes for mining.
communication_gap: >
  Natural product chemistry and structural biology communities are distinct from
  microbial genomics and bioinformatics. Clinical pharmacology and drug discovery
  industry focuses on synthetic compound libraries for throughput, largely abandoning
  natural products despite their superior drug-likeness (chirality, macrocycle size,
  sp3 fraction). Regulatory agencies have slow approval timelines for complex natural
  product structures, discouraging industry investment even when genome mining identifies
  promising candidates.

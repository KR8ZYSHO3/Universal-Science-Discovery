id: b-secondary-metabolites-drug-discovery
title: >
  Biological secondary metabolites — assembled by modular PKS and NRPS molecular
  assembly lines — account for ~50% of approved drugs; genome mining of silent
  biosynthetic gene clusters in soil bacteria represents the largest untapped
  chemical diversity on Earth and the most promising pipeline for new antibiotic classes.
status: established
fields:
  - biology
  - chemistry
  - pharmacology
bridge_claim: >
  Approximately 50% of all clinically approved drugs are natural products or their
  semi-synthetic derivatives (Newman & Cragg 2020). The biosynthetic logic of complex
  natural products uses modular enzyme assembly lines: polyketide synthases (PKS) build
  the polyketide scaffold by iterative Claisen condensation of acyl-CoA units — each
  module contains ketosynthase (KS), acyltransferase (AT), and acyl carrier protein (ACP)
  domains, plus optional reductase/dehydratase/enoylreductase domains that determine
  the oxidation state at each carbon. Non-ribosomal peptide synthetases (NRPS) follow
  the same modular logic for peptide natural products: each module activates one amino
  acid via adenylation (A) domain, tethers it via peptidyl carrier protein (PCP), and
  forms a peptide bond via condensation (C) domain. This assembly-line logic is identical
  to the ribosome's elongation cycle but uses a set of ~500 non-canonical amino acids
  and produces macrolides (erythromycin, PKS), glycopeptides (vancomycin, NRPS), and
  hybrid PKS-NRPS products (epothilone, rapamycin). Genome mining: sequencing soil
  bacteria reveals that the number of biosynthetic gene clusters (BGCs) per genome
  exceeds known natural products by 10:1 — most are silent under laboratory growth
  conditions. CRISPR-based cluster activation, heterologous expression in Streptomyces
  chassis, and ribosome engineering are now yielding novel compounds (e.g. teixobactin
  from iChip — a new antibiotic class active against MRSA with no resistance development).
translation_table:
  - field_a_term: Claisen condensation (organic chemistry)
    field_b_term: PKS chain elongation (KS-catalysed decarboxylative condensation of malonyl-CoA)
    note: Same mechanism used in fatty acid synthesis; PKS modules reuse β-oxidation enzymes in reverse
  - field_a_term: assembly-line synthesis (combinatorial chemistry)
    field_b_term: modular PKS/NRPS biosynthesis (each module = one building block)
    note: Combinatorial PKS engineering by module swapping has produced novel analogues of erythromycin
  - field_a_term: silent gene cluster (unexpressed secondary metabolism)
    field_b_term: cryptic BGC (biosynthetically competent but not induced under lab conditions)
    note: Genome mining predicts ~90% of microbial chemical diversity is unexpressed in culture
  - field_a_term: CRISPR gene activation (CRISPRa)
    field_b_term: BGC awakening — activating silent clusters to produce novel metabolites
    note: dCas9-VP64 fused to promoter of BGC activator gene induces cluster expression without DNA editing
  - field_a_term: drug scaffold diversification (medicinal chemistry)
    field_b_term: semi-synthetic modification of natural product core (erythromycin → azithromycin)
    note: Most successful natural product drugs are semi-synthetic; total synthesis is too expensive at scale

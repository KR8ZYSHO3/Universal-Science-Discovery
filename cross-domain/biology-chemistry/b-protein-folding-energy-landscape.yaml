cross_pollination_opportunities:
  - >
    De novo protein design (Baker lab, Rosetta; ProteinMPNN + ESMFold): given a
    target structure, inverse fold to find sequences that fold into it. AlphaFold2
    trained on evolution-selected sequences; de novo design explores sequence
    space outside evolutionary history. Connecting energy landscape theory to
    generative AI (RFdiffusion, Chroma) could provide principled design criteria.
  - >
    Intrinsically disordered proteins (IDPs): many regulatory proteins lack a
    stable folded structure (the IDP landscape has many equally deep minima —
    a flat funnel). The energy landscape framework predicts IDP behavior;
    NMR and single-molecule FRET are the primary experimental probes. Bridging
    energy landscape theory and structural biology of disorder.
communication_gap: >
  The energy landscape framework was developed by theoretical biophysicists
  (Wolynes, Onuchic, Bryngelson, Dill) using statistical mechanics language
  not standard in biochemistry. Experimental protein chemists focused on
  Φ-value analysis and kinetics without the landscape framing. AlphaFold2
  emerged from machine learning, disconnected from the biophysics theory.
  The theoretical prediction that AlphaFold2 implicitly computes the energy
  landscape minimum is not in the AlphaFold2 paper — it is a post-hoc
  interpretation that bridges the computational and theoretical communities.

id: b-protein-folding-energy-landscape
title: >
  Protein folding is explained by the funnel-shaped energy landscape theory:
  the native state is a deep, narrow free energy minimum, folding follows a
  downhill path through G(Q) parameterized by fraction of native contacts Q,
  and AlphaFold2 implicitly learns this landscape via evolutionary covariance
  contact predictions with near-experimental accuracy.
status: established
fields:
  - biology
  - chemistry
  - biophysics
  - computational-biology
  - statistical-mechanics
bridge_claim: >
  Levinthal's paradox (1969): a 100-amino-acid protein has ~3^100 ≈ 10^48
  conformations; even sampling at 10^13/s would take 10^27 years — far longer
  than the age of the universe. Yet proteins fold reproducibly in milliseconds
  to microseconds. Resolution: the energy landscape is funneled (Wolynes,
  Onuchic, Dill — "new view" of protein folding).

  The funnel picture: instead of a flat random energy landscape, the native
  state has a deep, narrow free energy minimum. The denatured ensemble occupies
  a broad, shallow basin. Folding is cooperative: as contacts form, stabilization
  from native contacts outweighs the entropic cost of conformation restriction,
  creating a downhill slope toward the native state.

  Quantitative framework: free energy G(Q) as a function of Q = fraction of
  native contacts. For a two-state folder (most small proteins <100 aa):
  G(Q) has two minima (denatured at Q≈0, native at Q≈1) separated by a barrier
  ΔG‡. Folding rate: k_f = k₀ exp(−ΔG‡/RT). Φ-value analysis: mutate residue i
  and measure k_f and K_eq changes to probe the transition state structure —
  Φ = (ΔΔG‡/ΔΔG_eq) ∈ [0,1] indicates whether residue i is structured (Φ≈1)
  or disordered (Φ≈0) in the transition state.

  Chemical physics connection: the folding funnel is formally a rough free energy
  landscape in a high-dimensional configuration space, analogous to spin glass
  energy landscapes (Edwards-Anderson model). The GREM (Generalized Random Energy
  Model) of Derrida predicts that proteins avoid the glass transition through
  evolutionary optimization — the native-state energy is lower than the glass
  transition temperature, so folding is directed, not glassy. This requires
  ΔG_native − ΔG_glass ≥ δ (the "stability gap").

  AlphaFold2 (Jumper et al. 2021): attention-based neural network achieves
  ~0.96 Å RMSD for single-domain proteins. Key insight: evolutionary covariation
  of residue pairs in multiple sequence alignments (MSAs) encodes contact
  information — correlated mutations are proxies for spatial contacts.
  AlphaFold2's evoformer module implicitly learns the energy landscape structure
  from evolutionary data; structure templates allow near-experimental accuracy
  without explicit physics. The network effectively computes an approximate
  minimum of the free energy landscape G(Q) without simulating folding dynamics.
translation_table:
  - field_a_term: protein folding funnel
    field_b_term: funneled free energy landscape in configuration space G(Q)
    note: Native state = deep free energy minimum; denatured = broad entropic basin
  - field_a_term: fraction of native contacts Q
    field_b_term: order parameter for folding phase transition
    note: Q ∈ [0,1]; two-state folding = first-order-like transition at Q*
  - field_a_term: folding rate k_f = k₀ exp(−ΔG‡/RT)
    field_b_term: Arrhenius/Kramers rate for barrier crossing on free energy surface
    note: k₀ ~ 10^7 s⁻¹ for diffusion-limited contact formation
  - field_a_term: Φ-value analysis (mutant effect on k_f and K_eq)
    field_b_term: probe of transition state structure — position of TS on folding funnel
    note: Φ ≈ 1 → residue natively structured in TS; Φ ≈ 0 → disordered
  - field_a_term: stability gap (E_native − E_glass > δ)
    field_b_term: condition for directed folding vs. glass transition (Bryngelson-Wolynes)
    note: Evolution has optimized sequences to satisfy the stability gap
  - field_a_term: AlphaFold2 evoformer attention
    field_b_term: learned approximation to minimum of G(Q) from evolutionary data
    note: Contact predictions from MSA covariation are a compressed representation of the landscape

cross_pollination_opportunities:
  - Ising model renormalisation group analysis applied to cooperative binding predicts cooperative behaviour at different concentration scales
  - Machine learning of allosteric networks from MD simulation trajectories has been borrowed from social network analysis
  - Drug design exploiting allosteric sites (rather than active sites) reduces competition with substrate — emerging pharmaceutical strategy
communication_gap: >
  Biochemists learn the MWC model and Hill equation as empirical tools without
  recognising the Ising model connection. Statistical physicists working on
  two-state systems rarely engage with the allosteric enzyme literature.
  The bridge is noted by Changeux & Edelstein (2005) in Science but remains
  underexploited for drug design.

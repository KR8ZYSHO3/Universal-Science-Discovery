cross_pollination_opportunities:
  - >
    Coarse-grained molecular dynamics (MARTINI force field) of lipid bilayers can predict
    raft composition and size — these physicochemical simulations could guide cell biologists
    designing experiments on receptor clustering and signal transduction in raft microdomains.
  - >
    Industrial membrane separation (reverse osmosis, fuel cells) uses analogous 2D transport
    physics. Ion selectivity engineering in biological channels (structural basis of K⁺ vs
    Na⁺ discrimination in KcsA) could inspire new artificial nanopore designs.
communication_gap: >
  Soft-matter physicists and physical chemists study membrane biophysics in journals like
  Biophysical Journal and Langmuir; cell biologists study membrane biology in Cell, Nature
  Cell Biology, and the Journal of Cell Biology. The mathematical frameworks (Cahn-Hilliard,
  Saffman-Delbrück) are standard in biophysics but absent from most cell biology curricula.
  Lipid raft debates persist partly because biologists and physical chemists have different
  standards of evidence for "phase separation."

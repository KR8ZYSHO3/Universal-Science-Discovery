cross_pollination_opportunities:
  - >
    The chemical reconstitution of autophagosome formation in vitro (Bhaskara et al.
    2019; Fracchiolla et al. 2020) enables quantitative biophysical chemistry of
    lipid bilayer nucleation and closure — connecting autophagy biology to membrane
    biophysics and synthetic chemistry of lipid vesicles.
  - >
    PINK1/Parkin pathway dysfunction in Parkinson's disease creates a pharmacological
    target: small molecules that enhance mitophagy flux (urolithin A, rapamycin
    analogues) are in clinical trials — the chemistry of cargo receptor engagement
    could guide drug design.
communication_gap: >
  Cell biologists who study autophagy by fluorescence microscopy (LC3 puncta, p62
  clearance) and geneticists who map ATG gene function rarely engage with the
  lipid chemistry of membrane formation or the enzymology of lysosomal degradation.
  The chemical reconstitution and quantitative biochemistry are published in chemistry
  and biophysics journals (JACS, eLife biophysics) rarely read by cell biologists.

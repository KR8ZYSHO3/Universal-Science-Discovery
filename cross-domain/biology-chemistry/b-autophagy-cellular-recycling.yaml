id: b-autophagy-cellular-recycling
title: >
  Autophagy couples cell biology and chemistry: a double-membrane vesicle (autophagosome)
  delivers cytoplasmic cargo to the lysosome for enzymatic degradation and molecular
  recycling — a biological waste management and nutrient recovery system with precise
  chemical machinery.
status: established
fields:
  - biology
  - cell-biology
  - chemistry
  - biochemistry
bridge_claim: >
  Autophagy (Ohsumi, Nobel Prize 2016) is the cell's primary bulk degradation
  pathway. mTOR complex 1 (mTORC1) phosphorylates and inhibits ULK1; nutrient
  deprivation releases this inhibition → ULK1 activates the PI3K complex (VPS34/
  Beclin-1) → PI3P nucleates the phagophore membrane. ATG proteins (ATG12-ATG5-ATG16L1
  complex) conjugate LC3-I to phosphatidylethanolamine → LC3-II decorates the growing
  autophagosome membrane (quantitative marker). Selective autophagy uses cargo
  receptors: p62/SQSTM1 bridges polyubiquitinated substrates to LC3 via its UBA
  and LIR domains. Mitophagy (PINK1-Parkin pathway): mitochondrial depolarization
  stabilizes PINK1 kinase on the outer membrane → phosphorylates ubiquitin (pSer65) →
  Parkin E3 ligase recruited → ubiquitinates OMM proteins → NDP52/optineurin/p62
  receptors engage LC3 → selective engulfment and lysosomal degradation. The chemistry:
  lysosomal hydrolases (cathepsins, lipases, glycosidases, DNases) at pH ~4.5 degrade
  the cargo to constituent amino acids, fatty acids, sugars, and nucleotides — returned
  to the cytoplasm via lysosomal efflux transporters for biosynthesis.
translation_table:
  - field_a_term: mTOR inhibition (cellular starvation signal)
    field_b_term: upstream kinase-regulated initiation of membrane remodeling cascade
    note: connects nutrient sensing to lipid chemistry of autophagosome formation
  - field_a_term: LC3-II (autophagosome marker)
    field_b_term: phosphatidylethanolamine-conjugated ubiquitin-like protein
    note: the lipidation reaction (ATG7/ATG3 E1/E2 cascade) is a chemical conjugation
  - field_a_term: p62/SQSTM1 cargo receptor
    field_b_term: polyubiquitin-binding adaptor with LC3-interacting region (LIR)
    note: molecular bridge between ubiquitin code and autophagy machinery
  - field_a_term: PINK1-Parkin mitophagy
    field_b_term: phosphorylated ubiquitin (pSer65) as a chemical damage signal
    note: kinase-generated phosphoubiquitin is the chemical tag triggering selective mitophagy
  - field_a_term: lysosomal degradation
    field_b_term: acid hydrolase chemistry (cathepsins B/D/L, lipases, glycosidases)
    note: biochemical breakdown returning monomers to biosynthetic pools

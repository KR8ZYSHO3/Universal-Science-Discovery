cross_pollination_opportunities:
  - >
    Ribozyme engineering: directed evolution of ribozymes (Arnold Nobel Prize approach
    applied to RNA) has produced ribozymes that catalyze reactions previously thought
    to require protein enzymes — including RNA-catalyzed RNA replication (Tjhung et al.
    2020) and carbon-carbon bond formation. Extending this to a minimal ribozyme capable
    of complete RNA genome replication would confirm the RNA world mechanism.
  - >
    Prebiotic chemistry in hydrothermal vents (alkaline hydrothermal vent hypothesis,
    Lane & Martin 2010): pH gradients across vent mineral membranes could drive
    proton-motive force — the same mechanism used by modern ATP synthase (itself
    containing RNA). This connects RNA world chemistry to energy transduction, suggesting
    the first cells were chemiosmotic before being genetic.
communication_gap: >
  The RNA world hypothesis crosses the disciplinary boundary between molecular biology
  (studying extant life) and prebiotic chemistry (studying conditions 4 billion years ago).
  Biologists study ribozymes in the context of modern gene regulation (CRISPR RNAs,
  snRNPs); chemists study nucleotide synthesis and polymerization kinetics. These
  communities publish in different journals (Nature Chemical Biology vs. Journal of the
  American Chemical Society), attend different conferences, and rarely co-author.
  The prebiotic synthesis challenge — getting from simple molecules to activated
  nucleotides — was considered a chemistry problem; the replication challenge was
  considered a biology problem; the integration requires both simultaneously.

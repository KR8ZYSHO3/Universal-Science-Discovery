id: b-rna-world-origin-of-life
title: >
  The RNA world hypothesis bridges molecular biology and prebiotic chemistry: RNA
  molecules can both store genetic information and catalyze chemical reactions
  (ribozymes), suggesting that RNA preceded both DNA and proteins as the primordial
  self-replicating molecule at the origin of life.
status: established
fields:
  - biology
  - molecular-biology
  - chemistry
  - prebiotic-chemistry
  - biochemistry
  - origin-of-life
bridge_claim: >
  The RNA world hypothesis (Gilbert 1986) proposes a primordial epoch when RNA served
  both as genetic material (information storage, like DNA) and as catalytic molecules
  (ribozymes, like proteins). The discovery that the ribosome's peptidyl transferase
  center — the active site catalyzing peptide bond formation — is entirely RNA
  (Nobel Prize 2009: Yonath, Ramakrishnan, Steitz) constitutes the strongest evidence
  for this hypothesis: all extant life uses an RNA-based machine to synthesize proteins,
  suggesting RNA catalysis predated protein catalysis.

  Non-enzymatic RNA replication: Sutherland et al. (2009) showed that cyanamide,
  cyanoacetylene, glycolaldehyde, glyceraldehyde, and inorganic phosphate — all plausible
  prebiotic molecules — spontaneously assemble into activated pyrimidine ribonucleotides.
  Szostak's laboratory demonstrated non-enzymatic RNA template copying: activated
  imidazolide nucleotides polymerize on an RNA template at rates sufficient for
  information copying without protein enzymes. Montmorillonite clay catalyzes RNA
  oligomer formation up to 50 nucleotides under simulated prebiotic conditions.

  Self-replicating ribozymes (Lincoln & Joyce 2009): two RNA enzymes, each catalyzing
  the synthesis of the other from oligonucleotide substrates — a demonstration of
  autocatalytic RNA replication without protein assistance. This system undergoes
  exponential amplification and, crucially, Darwinian evolution when competing sequence
  variants are introduced.

  The chemical bridge: activated nucleoside phosphates (NTPs) are simultaneously
  monomers for RNA polymerization AND high-energy carriers (ATP is the universal energy
  currency) — a molecular fossil of the RNA world where the same molecules served
  energetic and informational functions.
translation_table:
  - field_a_term: ribozyme (RNA enzyme, e.g., RNase P, Group I introns, ribosome)
    field_b_term: protein enzyme (genetically encoded catalyst in modern biology)
    note: ribozymes prove RNA can catalyze complex reactions — RNA preceded protein catalysis evolutionarily
  - field_a_term: RNA template (genetic information storage, single-stranded)
    field_b_term: DNA double helix (modern genetic storage, chemically more stable)
    note: DNA is biochemically modified RNA — 2'-OH removed (deoxyribose) + uracil → thymine (5-methyl uracil)
  - field_a_term: activated nucleotide (imidazolide-NMP, prebiotic polymerization substrate)
    field_b_term: NTP (ATP, GTP — substrates for modern RNA polymerases)
    note: same fundamental chemistry; modern enzymes evolved to handle NTPs more efficiently
  - field_a_term: non-enzymatic template copying (prebiotic RNA replication)
    field_b_term: PCR amplification / enzymatic replication (modern biotechnology)
    note: both achieve sequence-faithful information copying; enzyme-free version is ~1000× slower
  - field_a_term: autocatalytic RNA network (Lincoln-Joyce ribozyme pair)
    field_b_term: metabolic network (enzyme-catalyzed biochemical cycles in modern cells)
    note: both are self-sustaining catalytic networks; RNA network is evolutionary ancestor

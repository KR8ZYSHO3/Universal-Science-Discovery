cross_pollination_opportunities:
  - >
    Drug discovery through chemical diversity: natural products from soil bacteria
    (Streptomyces) have provided most antibiotic scaffolds. Systematic mining of
    metagenomic DNA from uncultured bacteria (iChip, Lewis 2015) ΓÇö a chemistry-
    microbiology bridge ΓÇö has yielded teixobactin (new lipid II inhibitor) without
    detectable resistance in preliminary studies.
  - >
    Combination therapy design: pharmacodynamic modeling (PK/PD) of antibiotic
    combinations (synergy, additivity, antagonism ΓÇö quantified by Loewe additivity,
    Bliss independence, or Highest Single Agent models) guides rational combination
    therapy to suppress resistance evolution.
communication_gap: >
  Microbiologists who study resistance mechanisms in clinical settings rarely engage
  with the organic chemistry of antibiotic mechanisms or the chemical biology of
  resistance enzyme active sites. Medicinal chemists developing new ╬▓-lactam
  inhibitors rarely engage with the clinical epidemiology of resistance spread
  (plasmid conjugation, clonal expansion, hospital infection control). The WHO
  policy community that sets global AMR targets rarely integrates the chemistry
  of mechanism-based inactivation.

id: b-antibiotic-mechanisms-resistance
title: >
  Antibiotic mechanisms and resistance bridge biology and chemistry: four mechanistic
  target classes (cell wall, ribosome, DNA replication, membrane), matched by four
  resistance mechanisms (enzymatic inactivation, efflux, target modification,
  bypass), drive the ESKAPE pathogen crisis killing 1.27M/year with 10M projected
  by 2050.
status: established
fields:
  - biology
  - chemistry
  - microbiology
  - biochemistry
  - public-health
bridge_claim: >
  Antibiotics target essential bacterial biochemical processes: (1) Cell wall
  synthesis: ╬▓-lactams (penicillin, cephalosporins, carbapenems) inhibit
  penicillin-binding proteins (PBPs) ΓÇö transpeptidases that crosslink peptidoglycan
  strands. Mechanism: ╬▓-lactam acylates the PBP active site Ser ΓåÆ irreversible
  inhibition ΓåÆ lysis. Vancomycin: binds D-Ala-D-Ala terminus of peptidoglycan
  precursor ΓåÆ steric blockade of transpeptidation; active against Gram-positive
  only. (2) Protein synthesis: aminoglycosides (streptomycin, gentamicin) bind
  30S ribosomal subunit ΓåÆ misreading of mRNA codon. Macrolides (erythromycin,
  azithromycin) and lincosamides bind 50S subunit ΓåÆ block translocation.
  Tetracyclines block aminoacyl-tRNA entry to A site. (3) DNA replication:
  fluoroquinolones (ciprofloxacin) inhibit DNA gyrase (GyrA/GyrB) and
  topoisomerase IV ΓåÆ double-strand breaks ΓåÆ SOS response ΓåÆ cell death.
  (4) Membrane integrity: polymyxins (colistin) bind lipid A of Gram-negative
  LPS ΓåÆ membrane disruption. Resistance mechanisms: (a) Enzymatic inactivation:
  ╬▓-lactamases (hydrolysis of ╬▓-lactam ring); aminoglycoside-modifying enzymes.
  ESBL (extended-spectrum ╬▓-lactamases) and carbapenemases (KPC, NDM, OXA-48)
  represent escalating resistance. (b) Efflux pumps: AcrAB-TolC (RND family)
  in E. coli exports multiple antibiotic classes. (c) Target modification:
  MRSA expresses PBP2a (mecA gene) with low ╬▓-lactam affinity. (d) Bypass:
  VRE changes D-Ala-D-Ala to D-Ala-D-Lac (vancomycin no longer binds).
  ESKAPE pathogens (Enterococcus faecium, S. aureus, Klebsiella pneumoniae,
  Acinetobacter baumannii, Pseudomonas aeruginosa, Enterobacter spp.): WHO
  critical priority pathogens. Murray et al. (2022) estimated 1.27M deaths
  directly attributable to AMR in 2019; projected 10M/year by 2050.
translation_table:
  - field_a_term: ╬▓-lactam ring (4-membered cyclic amide)
    field_b_term: electrophilic acylating agent targeting PBP active-site serine
    note: ring strain makes ╬▓-lactam highly reactive; ╬▓-lactamase hydrolysis opens ring ΓåÆ inactivation
  - field_a_term: ╬▓-lactamase (hydrolytic enzyme)
    field_b_term: serine or metallo-hydrolase that opens the ╬▓-lactam ring
    note: ">400 unique ╬▓-lactamase families; class B (metallo) require Zn┬▓Γü║ and resist all ╬▓-lactam inhibitors"
  - field_a_term: AcrAB-TolC efflux pump
    field_b_term: tripartite RND transporter spanning both membranes of Gram-negative cell envelope
    note: proton motive force-driven; exports structurally diverse substrates; overexpression ΓåÆ multidrug resistance
  - field_a_term: PBP2a (MRSA resistance protein)
    field_b_term: low-affinity transpeptidase with penicillin-binding site occluded by allosteric domain
    note: mecA gene acquired horizontally from S. sciuri; structural change reduces ╬▓-lactam acylation rate >1000-fold
  - field_a_term: fluoroquinolone (ciprofloxacin)
    field_b_term: Mg┬▓Γü║-chelating topoisomerase poison; ternary complex drug-DNA-enzyme ΓåÆ strand break
    note: resistance via GyrA mutations (Ser83Leu) that reduce drug binding; chromosomal not plasmid-mediated initially

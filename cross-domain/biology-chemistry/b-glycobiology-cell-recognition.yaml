id: b-glycobiology-cell-recognition
title: "Glycobiology and Cell Recognition — the glycocalyx sugar code, ABO blood groups, selectin-mediated leukocyte rolling, and sialic acid as influenza species barrier"
status: established
fields:
  - biochemistry
  - cell-biology
  - immunology
  - virology
  - glycosciences

bridge_claim: >
  Glycans (complex oligosaccharide chains) coat every eukaryotic cell surface,
  forming the glycocalyx — a dense, highly information-rich extracellular layer.
  The sugar code: the information density of oligosaccharides vastly exceeds that
  of amino acid or nucleotide sequences. A tetrasaccharide has 35,560 possible
  isomers (considering all linkages and anomeric configurations) vs. 160,000 for a
  tetrapeptide but with far more structural diversity from branching — creating an
  enormous molecular recognition space from few building blocks. N-linked
  glycosylation in the ER/Golgi appends complex oligosaccharides to Asn residues
  in the NxS/T sequon; O-linked glycosylation modifies Ser/Thr. Calnexin/calreticulin
  quality control cycle: N-glycan trimming serves as a protein folding quality
  sensor in the ER. ABO blood groups: glycosyltransferases modify the H antigen
  on RBC surfaces — GTA adds GalNAc (type A), GTB adds Gal (type B), both alleles
  (AB) add both, null genotype (O) leaves H antigen unmodified. Lectins are
  carbohydrate-binding proteins: selectins (E-, P-, L-selectin) mediate the first
  step of leukocyte extravasation — tethering and rolling on inflamed endothelium
  via PSGL-1 (sialyl Lewis^x decorated glycoprotein). Sialic acid (N-acetyl-
  neuraminic acid, Neu5Ac) caps most cell surface glycoproteins: influenza
  hemagglutinin (HA) binds sialic acid, but the linkage type determines tropism —
  avian influenza HA prefers α2,3-linked sialic acid (abundant in bird intestinal
  epithelium); human influenza HA prefers α2,6-linked (upper respiratory tract).
  The species barrier to influenza pandemic viruses requires HA mutation to switch
  from α2,3 to α2,6 sialic acid preference.

translation_table:
  - field_a_term: "N-linked glycan (Asn-GlcNAc₂Man₉ core)"
    field_b_term: "co-translational protein folding quality control tag"
    note: "Calnexin binds monoglucosylated glycoproteins; UGGT re-glucosylates misfolded proteins to retain them in ER"
  - field_a_term: "ABO glycosyltransferases (GTA/GTB)"
    field_b_term: "blood group antigens governing transfusion and transplant compatibility"
    note: "O allele has 4-nt deletion creating frameshift → no functional enzyme → H antigen unmodified"
  - field_a_term: "selectin–sialyl Lewis^x interaction"
    field_b_term: "leukocyte rolling on inflamed endothelium (first step of extravasation)"
    note: "Force-dependent bond: selectin bonds are catch bonds — affinity increases with tensile force, enabling rolling not arrest"
  - field_a_term: "sialic acid linkage (alpha-2,3 vs alpha-2,6)"
    field_b_term: "influenza host tropism and pandemic potential barrier"
    note: "A single HA residue change (226 Q→L in H3) switches alpha-2,3 to alpha-2,6 preference and enables human transmission"
  - field_a_term: "polysialic acid (PSA) on NCAM"
    field_b_term: "anti-adhesion modifier reducing synaptic plasticity during development"
    note: "PSA-NCAM expression is inversely correlated with synaptic stabilisation; PSA removal triggers synapse formation"
  - field_a_term: "glycocalyx thickness (50–500 nm)"
    field_b_term: "mechanical exclusion layer controlling ligand access to cell surface receptors"
    note: "Glycocalyx compression is a force that cells must overcome for receptor engagement; relevant in cancer cell invasion"


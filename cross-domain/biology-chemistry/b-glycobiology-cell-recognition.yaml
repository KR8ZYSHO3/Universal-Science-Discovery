cross_pollination_opportunities:
  - "Develop sialyltransferase inhibitors or engineered neuraminidases to modulate cancer cell immune evasion via altered sialic acid display"
  - "Design glycan-based antivirals that competitively inhibit influenza HA binding to host sialic acid — broad-spectrum across subtypes"
  - "Use glycoproteomics mass spectrometry to map site-specific glycosylation changes in neurodegenerative disease (Alzheimer's tau and APP glycosylation)"

communication_gap: >
  Glycobiology has historically been technically challenging — glycans cannot be
  directly genetically encoded and require specialised mass spectrometry and NMR
  for structural characterisation. As a result, glycans were underrepresented in
  the proteomics revolution and the field developed somewhat in isolation. The Human
  Glycome Project and advances in glycan synthesis (Wong, Seeberger) are now
  enabling systematic glycan arrays and functional screens, beginning to integrate
  glycobiology with genomics and cell biology communities.


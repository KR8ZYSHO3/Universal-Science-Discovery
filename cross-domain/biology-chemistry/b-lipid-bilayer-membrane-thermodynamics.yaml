id: b-lipid-bilayer-membrane-thermodynamics
title: >
  Lipid bilayer phase transitions from gel to fluid follow Landau free energy theory
  F = a(T-T_m)phi^2 + b*phi^4, with the transition temperature T_m tunable by lipid
  composition and cholesterol; membrane permeability and compressibility diverge near T_m
  in precise analogy to critical phenomena, connecting thermodynamic phase transition
  physics to membrane biophysics and the Meyer-Overton anesthetic mechanism.
status: established
fields:
  - biology
  - chemistry
  - biophysics
  - thermodynamics
  - membrane-biology
bridge_claim: >
  Lipid bilayers undergo gel (Lbeta) to liquid-crystalline (Lalpha) phase transitions at
  melting temperatures T_m (typically 20-45C for physiological lipids). Below T_m: ordered
  gel phase with all-trans acyl chains (low lateral diffusion D ~ 10^-10 cm^2/s). Above T_m:
  disordered liquid crystalline phase (D ~ 10^-8 cm^2/s). Near T_m: large fluctuations in
  membrane compressibility, thickness, and permeability. The Landau free energy
  F = a(T-T_m)phi^2 + b*phi^4 describes the transition where phi is the acyl chain order
  parameter. Near T_m, compressibility diverges as kappa_T ~ |T-T_m|^{-gamma} — identical
  to a gas-liquid critical point. Cholesterol broadens the transition by creating a liquid
  ordered (Lo) phase — the physical basis of lipid rafts (sphingomyelin + cholesterol
  domains with Lo properties). The Meyer-Overton correlation (1901): anesthetic potency
  correlates with lipid solubility across thousands of compounds — anesthetics may act by
  shifting T_m toward body temperature, perturbing the critical region of membrane
  physical properties.
translation_table:
  - field_a_term: gel phase (ordered acyl chains, low diffusivity)
    field_b_term: ordered/crystalline phase in condensed matter
    note: all-trans acyl chains analogous to crystalline lattice ordering
  - field_a_term: liquid crystalline phase (disordered, high lateral diffusion)
    field_b_term: liquid/disordered phase
    note: gauche conformers create conformational disorder analogous to thermal disorder in liquids
  - field_a_term: melting temperature T_m
    field_b_term: critical temperature T_c (or T_m in solid-liquid transition)
    note: T_m increases with chain length (C14:0 < C16:0 < C18:0) and degree of saturation
  - field_a_term: membrane isothermal area compressibility modulus K_A
    field_b_term: isothermal compressibility diverging near phase transition
    note: both diverge near T_c; fluctuations couple to permeability and cellular signaling
  - field_a_term: lipid rafts (liquid ordered Lo phase from cholesterol + sphingomyelin)
    field_b_term: phase-separated microdomains in a binary mixture
    note: Lo phase has intermediate properties between gel and liquid disordered phases

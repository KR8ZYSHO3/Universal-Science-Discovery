cross_pollination_opportunities:
  - >
    The Meyer-Overton correlation identifies membrane physical chemistry as a potential
    mechanism for anesthetic action. Franks & Lieb (1984) showed the correlation persists
    at molar concentrations predicted by phase transition theory. This has been challenged
    by protein receptor theories, but the phase transition mechanism may operate together
    with GABA receptor potentiation.
  - >
    Fluctuation-enhanced membrane permeability near T_m may explain antibiotic action
    (membrane-active peptides exploit increased permeability near T_m) and thermosensory
    ion channels (TRP channels activated at temperatures corresponding to lipid phase
    boundary temperatures in native membranes).
communication_gap: >
  Physical chemistry of membranes developed largely in biophysics departments while cell
  biology treated membranes primarily as protein scaffolds. The critical phenomena analogy
  was made explicit by Mouritsen's Pink model in the 1980s but has not penetrated cell
  biology or pharmacology textbooks. Anesthesiology journals rarely cite Landau free
  energy or phase transition theory.

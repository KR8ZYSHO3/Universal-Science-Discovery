id: b-doppler-redshift-x-option-adjusted-carry
title: >
  Cosmological redshift and line-of-sight Doppler shifts ↔ option-adjusted carry and curve positioning in
  fixed-income markets (astronomy ↔ finance; speculative analogy)
status: proposed
fields:
  - astronomy
  - cosmology
  - finance
  - fixed-income
bridge_claim: >
  Both settings attach a signed shift to observed “prices” along a line of sight: redshift z maps photon
  energy to recession velocity in the radial direction, while option-adjusted spread and carry metrics
  encode expected return components after subtracting embedded optionality from raw yields. The bridge is
  **speculative**: there is no physical mechanism linking Hubble flow to credit spreads. The value is
  pedagogical and modeling-oriented—both communities fit term structures (distance–redshift relations vs
  yield curves) and worry about selection effects, dust/extinction analogs to liquidity premia, and
  systematics that mimic apparent shifts. Any quantitative mapping must be labeled analogy, not identity.
translation_table:
  - field_a_term: observed redshift z (spectral line ratios)
    field_b_term: raw yield spread before option-adjustment
    note: Both are “headline” shifts that can mislead if confounders are ignored.
  - field_a_term: peculiar velocity correction along LOS
    field_b_term: idiosyncratic issuer risk and technical factors in bond pricing
    note: Residual after removing smooth background trend.
  - field_a_term: luminosity distance–redshift relation
    field_b_term: yield curve as function of tenor
    note: Shape diagnostics differ; only a loose structural analogy.
related_unknowns:
  - u-doppler-redshift-option-carry-speculative-analogy
related_hypotheses:
  - h-doppler-carry-yield-curve-steepness-speculative-parallels
cross_pollination_opportunities:
  - Borrow systematic-error budgeting from cosmology to stress-test curve-fitting pipelines in credit analytics.
  - Use finance “carry roll-down” intuition as a teaching metaphor for interpreting differential redshift across a cluster along one LOS (pedagogy only).
communication_gap: >
  Speculation-heavy. Cosmologists publish error bars tied to physical models; fixed-income desks treat
  proprietary adjustments as competitive advantage. Without shared falsifiable predictions, cross-talk
  stays metaphorical. The repository records the analogy explicitly to avoid accidental reification.
references:
  - doi: "10.1086/159674"
    note: "Hubble (1929) — empirical distance–redshift relation (historical anchor for redshift language)."
  - doi: "10.1086/260062"
    note: "Black & Scholes (1973) — option pricing framework behind OAS-style adjustments (finance anchor)."
last_reviewed: "2026-05-07"

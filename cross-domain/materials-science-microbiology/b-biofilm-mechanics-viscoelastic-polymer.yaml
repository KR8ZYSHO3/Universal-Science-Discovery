cross_pollination_opportunities:
  - "Using polymer scaling laws (de Gennes correlation length) to predict biofilm mesh size from EPS concentration measurements and validate with antibiotic diffusion experiments"
  - "Applying yielding transition theory from soft matter to predict the minimum wall shear stress required to detach biofilm from medical device surfaces for infection control"
communication_gap: "Microbiologists characterize biofilm virulence and EPS composition biochemically while materials scientists measure polymer network rheology; quantitative rheological characterization of biofilms using oscillatory shear was pioneered by Stoodley's group but is not standard in clinical microbiology labs that evaluate biofilm susceptibility to treatment."

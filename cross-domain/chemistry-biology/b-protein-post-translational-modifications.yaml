id: b-protein-post-translational-modifications
title: >
  Protein post-translational modifications bridge chemistry and biology: the PTM
  code — phosphorylation, ubiquitination, acetylation, glycosylation, and SUMOylation —
  acts as a combinatorial language that expands the proteome 100-fold and enables
  the epigenetic histone code.
status: established
fields:
  - chemistry
  - biology
  - biochemistry
  - cell-biology
  - epigenetics
bridge_claim: >
  Post-translational modifications (PTMs) are covalent chemical additions to amino
  acid side chains that expand proteome diversity and regulatory complexity far
  beyond what the genome encodes. The major PTMs: (1) Phosphorylation: kinases
  transfer γ-phosphate from ATP to Ser/Thr/Tyr hydroxyl groups — ~30% of proteins
  are phosphorylated at any time; 518 human kinases (the kinome; Manning et al.
  2002) catalyze a rich regulatory network. (2) Ubiquitination: E1 (activating) →
  E2 (conjugating) → E3 (ligase) cascade attaches ubiquitin to Lys residues.
  Polyubiquitin chain linkage determines fate: K48-linked → proteasomal degradation
  (26S proteasome); K63-linked → DNA damage repair signaling, endosomal sorting.
  (3) Acetylation: histone acetyltransferases (HATs; e.g., p300/CBP) acetylate
  Lys ε-amino groups, neutralizing positive charge → chromatin relaxation → gene
  activation. Sirtuin deacetylases (SIRT1-7) are NAD⁺-dependent — linking
  acetylation to metabolic state (caloric restriction). (4) Glycosylation: N-linked
  (Asn-x-Ser/Thr sequon) and O-linked (Ser/Thr) glycans control protein folding
  quality control (calnexin/calreticulin cycle) and cell surface recognition.
  (5) SUMOylation (SUMO-1/2/3): controls nuclear transport, transcription factor
  activity, and DNA repair. The histone code hypothesis (Strahl & Allis 2000):
  combinatorial PTMs on histone H3/H4 tails (H3K4me3 = active promoter; H3K27me3 =
  Polycomb repression; H3K9me3 = constitutive heterochromatin) constitute an
  epigenetic code read by effector proteins (bromodomains read Ac, chromodomains
  read Me) — the chemical language of epigenetic regulation.
translation_table:
  - field_a_term: kinase (ATP → phosphate transfer)
    field_b_term: enzyme-catalyzed nucleophilic substitution (γ-phosphate → Ser/Thr/Tyr)
    note: phosphorylation changes local charge, creates binding site for SH2/FHA domains
  - field_a_term: ubiquitin E3 ligase (substrate specificity)
    field_b_term: isopeptide bond chemistry (Lys ε-NH₂ + ubiquitin C-terminus)
    note: E3 determines substrate; chemistry is E2-catalyzed thioester → lysine aminolysis
  - field_a_term: K48 vs K63 polyubiquitin chain linkage
    field_b_term: chain topology determines protein conformation → different cellular fate
    note: same chemistry (isopeptide bond) but different linkage position creates distinct signals
  - field_a_term: histone acetylation (H3K9ac, H3K27ac)
    field_b_term: acetyl-CoA-dependent acetylation; charge neutralization on Lys ε-NH₃⁺
    note: HAT reaction: acetyl-CoA + Lys-NH₂ → CoA + Lys-NHCOCH₃; charge effect opens chromatin
  - field_a_term: sirtuin deacetylase (NAD⁺-dependent)
    field_b_term: NAD⁺ + acetyl-Lys → nicotinamide + O-acetyl-ADP-ribose + Lys
    note: unique chemistry (not simple hydrolysis); links PTM to cellular NAD⁺ / metabolic state

id: b-lipid-metabolism-cellular-signaling
title: "Lipid Metabolism and Cellular Signaling — eicosanoids, sphingolipids, and the PI3K-PIP3-Akt axis link lipid chemistry to inflammation, survival, and cancer"
status: established
fields:
  - biochemistry
  - cell-biology
  - pharmacology
  - lipid-biology
  - cancer-biology

bridge_claim: >
  Lipids serve three distinct biological roles: structural (phospholipid bilayers),
  energy storage (triglycerides in adipocytes), and signalling. Eicosanoid signalling
  begins with phospholipase A2 releasing arachidonic acid (C20:4) from membrane
  phospholipids. Cyclooxygenase-1 (COX-1, constitutive) and COX-2 (inducible) convert
  arachidonic acid to prostaglandins, prostacyclin, and thromboxanes; the lipoxygenase
  (LOX) pathway produces leukotrienes. Aspirin irreversibly acetylates COX-1/2 Ser530,
  blocking prostaglandin synthesis — explaining its anti-inflammatory, analgesic,
  and antiplatelet effects; ibuprofen competitively inhibits both isoforms. Sphingolipid
  signalling: ceramide (product of sphingomyelin hydrolysis by sphingomyelinase) is a
  pro-apoptotic second messenger; sphingosine-1-phosphate (S1P, product of
  sphingosine kinase) promotes cell survival, proliferation, and migration — the
  ceramide/S1P rheostat determines cell fate. The PI3K–PIP3–Akt pathway: class I PI3K
  phosphorylates PIP2 (PI(4,5)P₂) to PIP3 (PI(3,4,5)P₃) at the inner leaflet,
  recruiting Akt/PKB via its PH domain; activated Akt phosphorylates >100 substrates
  promoting survival, growth, and proliferation. PTEN (phosphatase and tensin homolog)
  is a tumour suppressor that dephosphorylates PIP3 back to PIP2, directly opposing
  PI3K — PTEN loss or PIK3CA mutation is among the most common events in human cancer.
  Lipid droplets are not inert storage organelles but dynamic signalling hubs.


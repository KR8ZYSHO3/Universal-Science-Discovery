cross_pollination_opportunities:
  - "Exploit PI3K isoform selectivity to design anti-cancer drugs with fewer metabolic side effects (PI3Kα vs PI3Kδ selectivity)"
  - "Use sphingolipid metabolite profiling (lipidomics) as biomarkers of cardiovascular risk and response to statins"
  - "Investigate lipid droplet–mitochondria contacts as targets for obesity and NAFLD therapy"

communication_gap: >
  Lipid biochemistry has historically been fragmented: prostaglandin pharmacology,
  sphingolipid biology, and phosphoinositide signalling developed as largely separate
  sub-fields with distinct journals and conference communities. The PI3K field was
  long dominated by biochemists while eicosanoid research was driven by pharmacologists.
  Systems lipidomics (mass spectrometry of hundreds of lipid species simultaneously)
  is beginning to unify these sub-fields by providing a comprehensive view of the
  lipidome.


cross_pollination_opportunities:
  - >
    Artificial photosynthesis: the Z-scheme principle — two photosystems in series to
    span the water-splitting redox window — directly maps to tandem photoelectrochemical
    cell design. Semiconductor researchers (GaInP/GaAs tandem cells) and plant
    biochemists studying PSII water oxidation rarely collaborate, despite sharing the
    same thermodynamic architecture.
  - >
    The OEC Mn₄CaO₅ cluster achieves room-temperature water oxidation at an overpotential
    of ~0.3V — far below any synthetic catalyst. Inorganic chemists studying molecular
    water oxidation catalysts (Ru, Ir, Mn complexes) could use the OEC crystal structure
    (Umena 2011, 1.9 Å resolution) as a design template, bridging structural biology
    and synthetic coordination chemistry.
communication_gap: >
  Quantum biology (FMO coherence) was primarily developed by physical chemists using
  2D electronic spectroscopy (Fleming group at Berkeley), while plant biochemists
  studying PSII mechanism rarely use ultrafast spectroscopy. The controversy over
  coherence vs. classical transfer required simultaneous expertise in quantum optics,
  protein biochemistry, and molecular dynamics simulation — available in very few groups.
  The Z-scheme is textbook biology but the thermodynamic analysis (Carnot efficiency,
  tandem cell analogy) is taught only in physical chemistry courses.

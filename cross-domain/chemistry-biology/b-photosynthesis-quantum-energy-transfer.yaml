id: b-photosynthesis-quantum-energy-transfer
title: >
  Photosynthetic light harvesting couples near-unity quantum efficiency of primary
  charge separation (P680 in PSII) to Förster resonance energy transfer through
  antenna complexes, with disputed quantum coherence (Fleming 2007 FMO beats at 77K)
  operating within the Z-scheme architecture that achieves sufficient redox span to
  split water and reduce NADP⁺.
status: established
fields:
  - chemistry
  - biology
  - physics
  - quantum-biology
  - biophysics
bridge_claim: >
  Photosystem II (PSII) is the only biological machine that oxidizes water: the Mn₄CaO₅
  cluster (oxygen-evolving complex, OEC) accumulates four oxidizing equivalents via the
  Kok S-state cycle (S0→S1→S2→S3→S4→S0), releasing O₂ and 4H⁺ per water pair oxidized.
  Charge separation at the reaction center P680 (chlorophyll dimer, E₀ = +1.25V) is
  triggered by photon absorption: P680* → P680⁺ + Pheophytin⁻, ΔG = −0.6 eV, with
  ~95% quantum efficiency (probability of productive charge separation per absorbed photon).

  The Z-scheme (Hill & Bendall 1960) places PSII and PSI in series: PSII generates
  P680⁺ (+1.25V, oxidizes water at +0.82V) and plastoquinol; the cytochrome b6f complex
  and plastocyanin connect to PSI, which reduces ferredoxin and ultimately NADP⁺ at
  −0.32V. The full redox span of 1.14V per photon pair is split across two photosystems,
  enabling thermodynamically feasible water splitting with visible light photons.

  Quantum coherence controversy: Fleming et al. (2007) observed oscillatory features
  in 2D electronic spectra of the FMO (Fenna-Matthews-Olson) complex at 77K with
  ~660 fs coherence time — interpreted as quantum wave-like energy transfer more
  efficient than classical Förster hopping. Subsequent experiments at physiological
  temperature (300K) showed much shorter coherence (sub-100 fs), and theoretical
  analysis (Cao et al. 2020) concluded that vibrational coherence (not electronic)
  accounts for most of the signal. The controversy has sharpened the question: does
  quantum coherence functionally enhance energy transfer efficiency, or is ~95% quantum
  efficiency achievable by purely classical Förster/Dexter mechanisms?
translation_table:
  - field_a_term: excitation energy transfer (EET) via Förster resonance
    field_b_term: exciton hopping between chromophores in antenna complex
  - field_a_term: quantum coherence (off-diagonal density matrix elements)
    field_b_term: wave-like energy delocalization across multiple chlorophyll molecules
  - field_a_term: charge separation ΔG (free energy of electron transfer)
    field_b_term: photochemical work stored in redox potential difference
  - field_a_term: Carnot efficiency limit (T_hot=5800K sun, T_cold=300K Earth)
    field_b_term: ~10% thermodynamic efficiency of oxygenic photosynthesis
  - field_a_term: Z-scheme series connection of two photoelectrochemical cells
    field_b_term: two-photosystem tandem solar cell architecture

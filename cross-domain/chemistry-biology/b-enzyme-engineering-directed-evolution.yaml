id: b-enzyme-engineering-directed-evolution
title: >
  Directed evolution bridges chemistry and biology by applying Darwinian selection
  to proteins in the laboratory: iterative cycles of random mutagenesis, screening,
  and selection have produced enzymes with enhanced stability, altered specificity,
  and novel catalytic activities — including reactions no natural enzyme performs —
  with machine learning now compressing the experimental search space 100-fold.
status: established
fields:
  - chemistry
  - biochemistry
  - biology
  - molecular-biology
  - computational-chemistry
  - protein-engineering
bridge_claim: >
  Directed evolution (Frances Arnold, Nobel Prize 2018) applies the logic of Darwinian
  evolution to proteins in vitro: create genetic diversity (mutagenesis), express the
  protein library, screen/select for the desired function, take the best variants,
  and repeat. This iterative process navigates the protein fitness landscape without
  requiring understanding of structure-function relationships.

  Library creation methods: error-prone PCR (3-7 mutations/gene per round, library
  size ~10⁷); DNA shuffling (Stemmer 1994 — recombine beneficial mutations from
  multiple parents via random fragmentation and reassembly); site-saturation mutagenesis
  (all 20 amino acids at target positions). Screening methods: colorimetric assays
  (most direct, ~10⁴/day), fluorescence-activated cell sorting (FACS, ~10⁷/day),
  phage display (10⁹-10¹² selection pressure). Selection vs. screening: selection
  (survival = catalytic activity) scales to enormous libraries; screening requires
  individual measurement.

  Industrial applications: Humira (adalimumab) — phage-displayed antibody optimized
  for affinity to TNF-α (annual sales ~$20B). Sitagliptin (Januvia) synthesis —
  Codexis evolved an ω-transaminase over 11 rounds (mutations at 27 positions) to
  accept the prositagliptin ketone with 25,000-fold improved activity, replacing a
  rhodium-catalyzed asymmetric hydrogenation and eliminating heavy metal waste.
  Subtilisin variants (Novozymes) — cold-active subtilases for laundry detergents:
  evolved for stability at 20°C, replacing hot-water washing.

  Computational enzyme design (Baker lab, Rosetta): de novo design of enzymes
  catalyzing reactions with no natural enzyme. Kemp elimination (2008): theozyme design
  + Rosetta sequence optimization → 8 active designs from 59 tested, initial kcat/Km
  ~1000× below evolved enzymes. Diels-Alder cycloaddition (2010): designed Diels-
  Alderase (DA_20_00 — no homology to natural proteins) catalyzes [4+2] cycloaddition.
  Subsequent directed evolution improved Rosetta designs 10-100×, demonstrating
  hybrid design-evolution workflow.

  Machine learning for directed evolution: large-scale deep mutational scanning (DMS)
  — measuring fitness of all single-point mutants (~20×L variants for protein of
  length L) — trains fitness predictors (ProteinBERT, EVmutation). ProteinMPNN designs
  sequences for a given backbone structure. ESM-IF + DMS data compresses experimental
  search: predict top 1% of variants from a library of 10⁸ using model predictions,
  screening only ~10⁵ — 1000× reduction in experimental cost.
translation_table:
  - field_a_term: random mutagenesis library (10⁷ protein variants)
    field_b_term: chemical library (HTS compound collection, 10⁶ molecules)
    note: both sample diversity for function; protein evolution is more efficient because mutations are correlated via sequence-function landscape
  - field_a_term: FACS screening (protein activity → cell survival)
    field_b_term: high-throughput screening (HTS) in drug discovery (biochemical assay)
    note: directed evolution exploits in vivo coupling of genotype to phenotype — eliminates resynthesis step
  - field_a_term: DNA shuffling (in vitro recombination of beneficial mutations)
    field_b_term: sexual recombination (biological mechanism for combining beneficial mutations)
    note: Stemmer explicitly modeled DNA shuffling on sexual recombination; both escape Muller's ratchet
  - field_a_term: fitness landscape (protein sequence → activity mapping)
    field_b_term: energy landscape (molecular conformation → free energy mapping)
    note: protein fitness landscapes can be rugged (multiple local optima) or smooth (single funnel) — determines evolvability
  - field_a_term: theozyme (transition state analog defining optimal active site geometry)
    field_b_term: pharmacophore (3D arrangement of functional groups for drug binding)
    note: both define the geometric and electronic constraints that the molecular scaffold must satisfy

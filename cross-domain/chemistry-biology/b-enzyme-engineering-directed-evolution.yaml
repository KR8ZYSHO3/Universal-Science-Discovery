cross_pollination_opportunities:
  - >
    Zero-shot enzyme design from structure: AlphaFold2 (2021) predicts protein
    structure with near-experimental accuracy; ProteinMPNN designs sequences for
    target structures. The emerging workflow — design backbone geometry with Rosetta/
    RFdiffusion, predict sequence with ProteinMPNN, predict structure with AlphaFold2,
    screen computationally with ML fitness model, then test only the top 100 designs
    experimentally — could reduce directed evolution from 10+ rounds to 1-2 rounds of
    wet lab work, dramatically accelerating enzyme engineering for pharmaceuticals,
    biofuels, and biosensors.
  - >
    Directed evolution of RNA enzymes (ribozymes): applying the same iterated
    mutagenesis + selection workflow to RNA instead of protein could produce ribozymes
    with novel catalytic activities not found in nature, testing the boundaries of
    RNA world chemistry and potentially discovering RNA enzymes with pharmaceutical
    applications (ribozyme therapeutics for gene silencing without protein off-targets).
communication_gap: >
  Directed evolution developed at the interface of chemistry and biology but was
  initially resisted by both communities. Chemists valued rational mechanism-based
  design; the idea of "directed" Darwinian evolution seemed to abandon chemical
  understanding. Molecular biologists were skeptical that a few hundred mutations
  could produce new function. Arnold's early papers were rejected before acceptance.
  Computational protein design (Baker lab) and directed evolution (Arnold lab) operated
  largely independently until the ML-assisted fusion in the late 2010s. Industrial
  enzyme engineering (Novozymes, Codexis) is published in applied chemistry journals
  while academic directed evolution appears in Science, Nature, and PNAS — creating
  a secondary gap between industrial practice and academic theory.

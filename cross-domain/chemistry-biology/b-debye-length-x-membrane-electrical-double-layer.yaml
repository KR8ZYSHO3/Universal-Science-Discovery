cross_pollination_opportunities:
  - Couple atomistic MD of headgroups with continuum PB in matched asymptotics for channel vestibule electrostatics.
  - Use microfluidic ionic-strength ramps to test gating shifts predicted by Debye scaling laws.
communication_gap: >
  Biologists often quote “salt screens charges” qualitatively; physical chemists carry Stern corrections and
  activity coefficients rarely imported into molecular-cell talks without collaboration.

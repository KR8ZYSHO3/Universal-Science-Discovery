id: b-debye-length-x-membrane-electrical-double-layer
title: >
  Debye screening length in electrolytes ↔ Gouy–Chapman/Stern electrical double layer at biomembranes and
  soft interfaces (physical chemistry ↔ cell biophysics)
status: established
fields:
  - physical-chemistry
  - biophysics
  - cell-biology
  - electrochemistry
bridge_claim: >
  Poisson–Boltzmann theory predicts exponential screening of electrostatic potentials with Debye length
  lambda_D proportional to sqrt(epsilon k T / I) for ionic strength I. Biological membranes adsorb ions and
  carry fixed charges; the interfacial “double layer” combines a diffuse Gouy–Chapman region with a Stern
  layer of partially immobilized counterions. The mapping is classical electrochemistry applied to cells:
  binding affinities, zeta potentials, and channel gating electrostatics all inherit Debye-scale crossover
  between screened and unscreened interactions. Specific ion effects and molecular roughness exceed ideal
  Poisson–Boltzmann near the headgroup plane.
translation_table:
  - field_a_term: Debye length lambda_D
    field_b_term: double-layer thickness scale adjacent to membrane
    note: Sets where potential gradients are appreciable.
  - field_a_term: ionic strength I
    field_b_term: extracellular/intracellular ionic environment modulating protein–membrane interactions
    note: Physiology tunes I across compartments.
  - field_a_term: Stern layer capacitance
    field_b_term: headgroup hydration and discrete charge sites
    note: Corrections beyond mean-field PB.
related_unknowns:

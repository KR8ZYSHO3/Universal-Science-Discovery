id: b-electrochemical-impedance-x-cell-membrane
title: Electrochemical impedance spectroscopy (EIS) represents interfacial dynamics as complex
  impedance spectra — closely analogous to small-signal electrical models of cell membranes
  and ion-channel gating in the Hodgkin–Huxley tradition.
status: established
fields:
- electrochemistry
- biophysics
- cell-biology
- neuroscience
bridge_claim: 'EIS fits equivalent circuits with resistive and capacitive elements to electrode–electrolyte
  interfaces, capturing charge transfer and double-layer capacitance. Cell membranes likewise
  present capacitive behavior with conductive ion channels whose conductances vary with voltage
  and time. Linearized around a holding potential, Hodgkin–Huxley and related models predict
  frequency-dependent admittance: each gating variable contributes relaxational arcs in the
  complex plane. The bridge unifies measurement practice: EIS hardware and transfer-function
  analysis used in analytical electrochemistry translate to membrane impedance measurements
  in electrophysiology labs, enabling cross-disciplinary fitting workflows and noise models.'
translation_table:
- field_a_term: double-layer capacitance C_dl
  field_b_term: membrane capacitance C_m
- field_a_term: charge-transfer resistance R_ct
  field_b_term: inverse of effective membrane conductance
- field_a_term: Warburg diffusion impedance
  field_b_term: electrodiffusion limitations in unstirred layers / long pores

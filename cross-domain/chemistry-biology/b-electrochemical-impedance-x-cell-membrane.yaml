cross_pollination_opportunities:
- Apply EIS regularization methods from corrosion science to high-throughput patch-clamp impedance
  assays.
- Use membrane impedance spectra to constrain hidden Markov models of channel gating with
  multiple closed states.
communication_gap: Electrochemistry textbooks emphasize electrodes; electrophysiology emphasizes
  channels. Shared impedance vocabulary exists but joint methodological papers are sparse
  outside specialized labs.

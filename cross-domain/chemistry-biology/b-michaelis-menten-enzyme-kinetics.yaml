communication_gap: >
  The Michaelis-Menten equation was published in a German biochemistry journal in 1913
  and the Langmuir isotherm in an American chemistry journal in 1918 — the communities
  were completely separate. Monod rediscovered the same form in microbiology in 1949.
  Holling derived it independently for ecology in 1959. Each field considers the
  equation 'theirs', teaches it with different notation, and rarely acknowledges
  the cross-domain equivalence. This perpetuates independent parameter estimation
  methodology and hampers cross-domain model transfer.


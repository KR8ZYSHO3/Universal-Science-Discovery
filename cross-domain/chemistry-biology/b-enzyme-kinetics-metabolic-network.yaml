cross_pollination_opportunities:
  - >
    Flux Balance Analysis (FBA) scales MCA to genome-scale metabolic models (RECON2:
    2500+ metabolites, 7440+ reactions). Combining FBA-predicted flux distributions
    with measured enzyme expression data (proteomics) allows computing in vivo FCCs
    without requiring kinetic parameters — enabling patient-specific metabolic disease
    analysis from biopsy proteomics.
  - >
    Synthetic biology: designing minimal metabolic networks (chassis organisms) requires
    knowing which enzymes in a pathway contribute most to flux. MCA-guided design
    would predict the optimal enzyme expression ratios for maximising product titre
    in industrial fermentation — a direct application of metabolic network theory to
    bio-manufacturing.
communication_gap: >
  Michaelis-Menten kinetics was established in physical chemistry (Biochemische Zeitschrift),
  while MCA was developed in quantitative biology (Symposia of the Society for Experimental
  Biology, 1973 — not a mainstream journal). For 20 years after Kacser & Burns, MCA was
  unknown in the broader biochemistry community, which continued teaching the "rate-limiting
  step" concept. Even today, introductory biochemistry textbooks use the rate-limiting
  step concept without MCA corrections. Metabolic engineers who discovered the same
  control distribution empirically often rediscovered MCA principles without knowing the
  original formulation. The gap between single-enzyme kinetics (chemistry) and network
  control (systems biology) is still incompletely bridged in curricula.

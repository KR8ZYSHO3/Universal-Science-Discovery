id: b-finite-time-lyapunov-exponents-x-intracardiac-flow-mixing
title: Finite-time Lyapunov exponents connect Lagrangian coherent-structure analysis
  to intracardiac flow-mixing risk assessment.
status: proposed
fields:
- fluid-mechanics
- medicine
- dynamical-systems
- medical-imaging
bridge_claim: LCS/FTLE methods developed for geophysical transport quantify transport
  barriers and mixing rates in cardiac chambers. This gives a mechanics-first route
  to stasis and thrombosis-risk indicators.
translation_table:
- field_a_term: FTLE ridge
  field_b_term: Transport barrier in blood flow
  note: Persistent ridges indicate poor mixing zones.
- field_a_term: Lagrangian coherent structure
  field_b_term: Chamber flow partition
  note: Segments recirculating versus exchange regions.
- field_a_term: Finite-time deformation
  field_b_term: Residence-time proxy
  note: Higher deformation usually indicates better washout.
related_unknowns:
- u-ftle-derived-thrombosis-risk-threshold-transferability
related_hypotheses:
- h-ftle-ridge-persistence-predicts-left-atrial-appendage-stasis
cross_pollination_opportunities:
- Build shared benchmark datasets with identical uncertainty-reporting protocols across
  both domains.
- Compare baseline domain-specific workflows against explicitly transferred methods
  under matched compute budgets.
communication_gap: Adjacent communities use different software stacks and validation
  norms, so mathematically equivalent tools are often rediscovered in parallel.
references:
- doi: 10.1098/rsta.1922.0009
  note: Fisher (1922) estimation and information.
- doi: 10.1017/S0962492910000061
  note: Stuart (2010) Bayesian inverse-problem foundations.

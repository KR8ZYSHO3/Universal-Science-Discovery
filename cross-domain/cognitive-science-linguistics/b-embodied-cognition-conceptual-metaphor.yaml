cross_pollination_opportunities:
  - "Robotics: embodied cognition hypothesis predicts that AI language models without physical embodiment cannot fully ground abstract language — testable by grounded vs. disembodied language models"
  - "Cross-linguistic study: differences in spatial metaphors for time (horizontal vs. vertical) predict differences in time-task interference experiments"
  - "Clinical neuroscience: patients with motor cortex damage should show impaired action-language comprehension — tests embodied simulation necessity"
communication_gap: >
  Linguistic semanticists and cognitive neuroscientists work in separate
  communities despite deep connections. The original Lakoff-Johnson theory
  was linguistic-conceptual; the neural grounding was added later by
  Gallese, Rizzolatti, and Bergen. Formal semanticists (Montague grammar,
  model-theoretic semantics) largely reject the embodied approach.

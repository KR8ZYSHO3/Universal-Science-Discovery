id: b-embodied-cognition-conceptual-metaphor
title: >
  Lakoff and Johnson's conceptual metaphor theory (MORE IS UP, ARGUMENT IS WAR)
  is grounded in embodied cognition — abstract concepts recruit sensorimotor
  cortex because they are structured by bodily experience, bridging linguistic
  structure to neural substrate to bodily interaction with the physical world.
status: established
fields:
  - cognitive-science
  - linguistics
  - neuroscience
  - embodied-cognition
  - philosophy-of-mind
bridge_claim: >
  CONCEPTUAL METAPHOR (Lakoff & Johnson 1980):
  Abstract concepts are structured by concrete bodily experience:
  - MORE IS UP: "prices are rising", "spirits lifted", "high hopes"
  - ARGUMENT IS WAR: "attack a position", "demolish an argument", "defend a claim"
  - TIME IS SPACE: "looking forward to the future", "put the past behind us"

  These are not merely linguistic — they structure reasoning and inference.

  NEURAL GROUNDING (Gallese & Lakoff 2005):
  The same neurons that control grasping fire when reading "grasp a concept"
  (mirror neuron system, premotor cortex). fMRI evidence: abstract words
  with sensorimotor associations activate motor/sensory cortex beyond semantic
  areas (Hauk et al. 2004).

  ACTION-SENTENCE COMPATIBILITY EFFECT (Glenberg & Kaschak 2002):
  "Close the drawer" (toward body) is responded to faster with toward-body
  movements. Abstract sentences like "give me a break" activate the same
  away-from-body motor direction. Demonstrates embodied simulation for
  abstract language.

  EMBODIED SIMULATION HYPOTHESIS:
  Language comprehension recruits sensorimotor systems to simulate described
  actions and states. This is not metaphorical — the simulation IS the
  understanding (Bergen 2012). Brain areas activated: motor cortex (action
  verbs), visual cortex (visual descriptions), olfactory cortex (smell words).

  IMPLICATIONS:
  1. Challenges purely symbolic/amodal theories of cognition (Fodor, Pylyshyn)
  2. Linguistic relativity: different conceptual metaphors across languages
     may produce different reasoning patterns
  3. Cognitive linguistics: grammar structures (SOURCE-PATH-GOAL schema)
     derive from physical path experience
translation_table:
  - field_a_term: conceptual metaphor schema (linguistics)
    field_b_term: neural simulation in sensorimotor cortex (neuroscience)
    note: Each conceptual metaphor predicts specific sensorimotor cortex activation during abstract language comprehension
  - field_a_term: image schema (e.g. CONTAINER, FORCE, BALANCE) (linguistics)
    field_b_term: affordance representation (cognitive science / perception)
    note: Gibson's affordances and Lakoff's image schemas both capture body-environment interaction structure
  - field_a_term: SOURCE-PATH-GOAL schema (linguistics)
    field_b_term: "motor planning: initial state, trajectory, goal state (neuroscience)"
    note: Linguistic path structure mirrors motor action sequence structure — same neural system
  - field_a_term: primary metaphor (direct sensorimotor grounding)
    field_b_term: conditioned stimulus-response association (learning theory)
    note: Primary metaphors (AFFECTION IS WARMTH) formed by co-occurrence of physical sensation and abstract concept in development

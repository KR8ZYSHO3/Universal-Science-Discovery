cross_pollination_opportunities:
  - >
    Machine-learning interatomic potentials (MLIPs: GAP, NequIP, MACE) trained on
    DFT calculations can predict G(T,x) for multi-component systems without
    experimental fitting — potentially replacing CALPHAD databases for systems
    lacking experimental data (e.g., refractory HEAs for high-temperature applications).
    Bridging quantum chemistry (DFT), statistical mechanics (free energy calculation),
    and CALPHAD thermodynamics.
  - >
    Pharmaceutical polymorphism is governed by the same Gibbs free energy competition
    as metallic phase diagrams. Drug molecule crystal forms (polymorphs) have
    different G(T) and solubility; CALPHAD-like approaches are being applied to
    pharmaceutical crystal engineering — direct cross-domain transfer from metallurgy
    to pharmaceutical chemistry.
communication_gap: >
  CALPHAD was developed by metallurgists (Kaufman, Hillert, Pelton) and is taught
  primarily in materials science and metallurgical engineering programs. Chemists
  studying solution thermodynamics and physicists studying phase transitions use
  the same Gibbs free energy formalism but different parameterizations. The HEA
  field emerged partly because materials scientists recognized entropy arguments
  from statistical thermodynamics — a cross-fertilization that happened within
  materials science but is still not widely known in physical chemistry departments.

communication_gap: >
  Nash published his equilibrium theorem in 1950 in mathematics journals.
  Maynard Smith independently derived ESS in 1973 in evolutionary biology journals.
  The mathematical equivalence was not widely recognised until Hofbauer & Sigmund
  (1988) unified both in "The Theory of Evolution and Dynamical Systems."
  The ML community rediscovered the same framework independently through GANs (2014)
  and RLHF (2017-2022) without systematically connecting to the 70-year-old
  evolutionary biology literature.


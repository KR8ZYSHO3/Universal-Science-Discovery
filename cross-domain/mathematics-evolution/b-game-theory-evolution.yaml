id: b-game-theory-evolution
title: "Nash equilibrium ↔ evolutionary stable strategy: game theory and natural selection are the same optimisation"
status: established
fields:
  - mathematics
  - game-theory
  - evolutionary-biology
  - machine-learning
  - economics

bridge_claim: >
  Maynard Smith & Price (1973) showed that natural selection on heritable
  strategies converges to evolutionary stable strategies (ESS), which are
  exactly Nash equilibria of the payoff game defined by fitness interactions.
  The replicator equation dx_i/dt = x_i * (f_i(x) - mean_f(x)) — derived from
  population genetics — implements gradient ascent on mean fitness, and its
  fixed points are precisely the Nash equilibria of the underlying game.  This
  makes evolution a decentralised Nash-finding algorithm operating on populations
  rather than individual rational agents.  The same replicator dynamics governs
  reinforcement learning (RLHF uses Nash equilibria for reward model training),
  multi-agent AI training (GAN training is a two-player zero-sum game whose
  fixed point is a Nash equilibrium), and language model fine-tuning via RLAIF.
  The connection runs deeper: the Price equation (1970) — the fundamental theorem
  of natural selection — is a change-of-basis identity that unifies Fisher's
  theorem, Hamilton's kin selection, Maynard Smith's ESS, and gradient-based ML
  optimisation in a single algebraic framework.


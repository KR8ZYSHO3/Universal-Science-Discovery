id: b-openalex-info-theory-intrinsic-motivation
title: >
  Intrinsic motivation and autonomy as defined in self-determination theory are
  operationalisable as information-theoretic quantities — specifically, empowerment
  (the maximum mutual information between an agent's actions and their future states)
  and free-energy minimization — providing a neurocomputational mechanism for
  why autonomy need satisfaction predicts psychological well-being.
status: proposed
fields:
  - neuroscience
  - information-theory
  - cognitive-science
  - psychology
bridge_claim: >
  Ryan and Deci (2000, 27 k citations) established that intrinsic motivation, competence,
  and autonomy are fundamental psychological needs whose satisfaction predicts well-being.
  Information theory and computational neuroscience provide a mechanistic substrate:
  intrinsic motivation corresponds to the drive to maximise empowerment — the Shannon
  channel capacity from actions to future states I(A; S') — which gives an agent
  maximum control over its future regardless of specific goals. Competence satisfaction
  maps to prediction error minimisation (free energy in the active inference framework),
  where the brain minimises surprise H[S | model] by improving its world model.
  Autonomy corresponds to having a high-entropy action distribution p(A) unconstrained
  by external schedules — the information-theoretic condition for maximum agency.
  This mapping is non-trivial: it predicts that controlled motivation (low autonomy)
  produces stereotyped, low-entropy action sequences measurable from neural activity,
  while intrinsic motivation produces exploratory, high-entropy behavior with sustained
  dopaminergic novelty signals. The active inference / free energy principle (Friston)
  and empowerment framework (Klyubin et al.) provide the mathematical bridge between
  SDT phenomenology and neural computation.
translation_table:
  - field_a_term: channel capacity I(A; S')
    field_b_term: empowerment (measure of intrinsic motivation)
    note: Maximum mutual information between actions and reachable future states
  - field_a_term: surprisal H[S | model] (free energy)
    field_b_term: competence need frustration (gap between actual and expected performance)
    note: Minimising surprisal = satisfying competence need by improving the predictive model
  - field_a_term: entropy H[A] of action distribution
    field_b_term: degree of autonomy (self-determination vs. external control)
    note: High action entropy = uninhibited self-direction; low entropy = controlled, scripted behavior
  - field_a_term: mutual information I(A; Reward)
    field_b_term: extrinsic motivation signal
    note: When actions become instrumental for external reward, entropy collapses — the crowding-out effect
  - field_a_term: information bottleneck representation
    field_b_term: competence schema (compressed world model supporting efficient action)
    note: Intrinsically motivated agents compress observations into maximally predictive representations
related_unknowns:
  - u-intrinsic-motivation-information-maximization
related_hypotheses:
  - h-autonomy-need-empowerment-maximization
cross_pollination_opportunities:
  - Measure action entropy and empowerment in fMRI tasks contrasting intrinsic vs. extrinsic motivation conditions to test the information-theoretic prediction
  - Apply the active inference framework to SDT constructs, deriving quantitative predictions for when extrinsic reward crowds out intrinsic motivation
  - Design reinforcement learning agents with explicit empowerment rewards and test whether they exhibit human-like competence-seeking and autonomy-preferring behavior
  - Use information geometry (Fisher information metric) to characterise the neural manifold for intrinsically vs. extrinsically motivated behavior
communication_gap: >
  Psychologists and SDT researchers rarely engage with the information-theoretic
  literature; computational neuroscientists working on free energy and empowerment
  rarely read Journal of Personality and Social Psychology. The SDT constructs are
  phenomenologically rich but lack mechanistic formulation; the information-theoretic
  constructs are precise but lack grounding in human motivational phenomenology.
last_reviewed: "2026-05-07"

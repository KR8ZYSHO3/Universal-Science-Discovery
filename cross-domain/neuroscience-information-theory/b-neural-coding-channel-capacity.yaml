cross_pollination_opportunities:
  - "Use rate-distortion theory to derive the optimal neural code for any natural stimulus distribution with metabolic constraints"
  - "Apply turbo codes / LDPC concepts from telecommunications to understand population coding redundancy in cortex"
  - "Measure channel capacity directly in human neurons (intraoperative recordings) to test efficient coding at the cognitive level"

communication_gap: >
  Barlow's 1961 proposal was in a book chapter (Sensory Communication) largely
  unread outside neuroscience. Information theory was being developed by engineers
  at Bell Labs simultaneously with no awareness of Barlow's parallel work. The
  mathematical connection was made explicit only in the 1990s with direct measurements
  by Strong, Fairhall and colleagues. Today computational neuroscience routinely
  uses information theory but most neuroscientists are not trained in Shannon
  theory, and most information theorists are unaware of the neural coding literature.


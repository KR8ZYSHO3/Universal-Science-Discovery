id: b-island-biogeography-x-percolation
title: Island biogeography ↔ Percolation — species area relationship as connectivity threshold
status: proposed
fields:
- biology
- mathematics
bridge_claim: The MacArthur-Wilson species-area relationship (S = cA^z) is the biological signature of habitat percolation;
  below the percolation threshold, habitat patches become disconnected and species go extinct via area effects, while above
  threshold, the connected habitat cluster supports full diversity — unifying island biogeography with percolation theory.
translation_table:
- field_a_term: species richness S = cA^z (island biogeography)
  field_b_term: cluster size distribution in percolation theory
  note: Power law S-A relationship mirrors the power-law cluster size distribution at percolation threshold
- field_a_term: habitat patch (island or fragmented forest patch)
  field_b_term: occupied site in site percolation model
  note: Patch occupancy probability p maps to site occupation probability in bond percolation
- field_a_term: species extinction below minimum viable area (MVA)
  field_b_term: cluster isolation below percolation threshold p_c
  note: 'Both predict abrupt collapse: species extinctions and cluster disconnection are threshold phenomena'
- field_a_term: immigration-extinction balance (MacArthur-Wilson equilibrium)
  field_b_term: steady-state cluster dynamics in dynamic percolation
  note: Island biogeography equilibrium is the ecological analogue of steady-state percolation
cross_pollination_opportunities:
- Use percolation theory to define minimum habitat corridor widths for landscape connectivity — the percolation threshold
  p_c gives the exact critical corridor density below which metapopulation connectivity collapses, enabling quantitative conservation
  planning.
- Apply finite-size scaling from percolation theory to real habitat fragmentation data to estimate the effective percolation
  exponent z in S = cA^z and predict species loss in fragmentation scenarios before empirical data accumulates.
communication_gap: 'Island biogeography theory (MacArthur & Wilson 1967) is ecology''s most influential quantitative framework,
  while percolation theory (Broadbent & Hammersley 1957) is a cornerstone of statistical physics. The two communities rarely
  interact: percolation appears in physics journals and biogeography in ecology journals. The explicit connection was made
  by With & Crist (1995) and Boswell et al. (1998) but remains largely unknown to mainstream ecologists.'

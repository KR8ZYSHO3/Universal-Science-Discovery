related_hypotheses:
  - h-urban-segregation-ising-phase-transition-test
cross_pollination_opportunities:
  - >
    Policy design: Ising universality class theory predicts that small perturbations
    near τ_c (tolerance just below critical) can shift the system from segregated
    to mixed phase — identifying the critical leverage point for desegregation
    policy with minimal intervention.
  - >
    Empirical calibration: fitting the Ising model parameters (J, T) to Census
    tract data to estimate effective social "temperature" (tolerance) of different
    cities, and predicting how demographic changes or housing policies shift the
    system toward or away from the critical point.
  - >
    Multi-species extension: n-state Potts model (n > 2 ethnic groups) maps to
    multi-group Schelling, with Potts phase diagram predicting the segregation
    threshold as a function of group size distribution.
communication_gap: >
  Schelling (1971) was an economist using spatial thought experiments. The Ising
  equivalence was demonstrated in 2006 by Vinković (physicist) and Kirman (economist)
  in PNAS — a rare economics-physics collaboration. Most sociology and urban planning
  literature on residential segregation still treats Schelling as a game-theoretic
  or social-dynamic model without invoking the Ising framework that provides its
  exact analytical solution and universal predictions.

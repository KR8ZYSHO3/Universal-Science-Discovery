cross_pollination_opportunities:
  - "Apply renormalisation group methods from statistical physics to coarse-grain agent-based social models and identify universality classes of social phase transitions"
  - "Use SOC models to design financial market circuit breakers that interrupt avalanche dynamics before systemic collapse"
  - "Combine Zipf's law analysis of city productivity scaling (Bettencourt et al. 2007) with infrastructure planning to anticipate superlinear growth demands"

communication_gap: >
  The physics of complex systems community (largely connected to the Santa Fe
  Institute and the Journal of Statistical Mechanics) produces rigorous models of
  social phenomena, but mainstream social scientists remain sceptical of
  physics-derived analogies to human behaviour. The key objection — that human agents
  have intentionality, culture, and institutions absent from physical systems — is
  valid but should motivate hybrid models rather than disciplinary insularity. The
  most productive bridges have come from economists willing to engage complexity
  science (Arthur, Farmer, Haldane) and physicists willing to engage social theory.


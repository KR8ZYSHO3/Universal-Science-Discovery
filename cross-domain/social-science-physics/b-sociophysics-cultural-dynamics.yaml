cross_pollination_opportunities:
  - >
    Network topology effects: the Axelrod model on scale-free networks (social
    networks) vs. regular lattices shows qualitatively different phase transition
    behavior. Empirical social network structure could be used to parameterize the
    model and predict cultural fragmentation thresholds in real societies.
  - >
    Language revitalization policy: Abrams-Strogatz model predicts that only a
    sufficiently large and prestigious minority language community can sustain itself.
    This provides a quantitative threshold for language policy interventions (Welsh,
    Māori, Basque revivals) — connecting dynamical systems theory to cultural policy.
communication_gap: >
  Social scientists who study cultural diversity and globalization rarely use
  statistical physics models or engage with the mathematical theory of phase
  transitions. Physicists who develop sociophysics models often do not engage with
  the empirical social science literature on cultural change. The Axelrod model
  is widely cited in complexity science but rarely in anthropology or cultural studies,
  where the empirical data needed to validate it is held.

id: b-sociophysics-cultural-dynamics
title: >
  Axelrod's cultural dissemination model bridges social science and physics: a phase
  transition at critical q/F ratio separates monoculture from frozen multicultural
  states — explaining why global communication has not eliminated cultural diversity,
  and predicting language death rates matching Zipf power-law observations.
status: established
fields:
  - social-science
  - physics
  - complexity-science
  - cultural-dynamics
  - computational-social-science
bridge_claim: >
  Axelrod's (1997) cultural dissemination model shows that local interaction can
  sustain global diversity. Agents have F cultural features, each with q traits.
  Interaction probability between two agents = fraction of shared features (cultural
  overlap). When two agents interact, one randomly chosen feature that differs is
  copied → cultural homogenization. Despite this convergence pressure, the system
  exhibits a phase transition: for small q/F (few possible traits), the system
  always reaches monoculture; for large q/F, the system freezes in a multicultural
  state with many isolated cultural clusters. The critical threshold q_c/F separates
  these phases. The mechanism: agents must share at least one feature to interact;
  at high trait diversity, agents often share nothing → no interaction → cultural
  boundaries freeze. This explains the observation that global communication and
  increased interaction have not eliminated cultural diversity — interaction requires
  initial cultural similarity (homophily as a filter). Language death: ~1 language
  per 2 weeks goes extinct globally. Abrams & Strogatz (2003) model language
  competition as a dynamical system — the more prestigious and more-spoken language
  always wins (model predicts full extinction). Power law in language sizes (Zipf):
  the number of speakers follows a power law over 5 decades. Deffuant-Weisbuch
  opinion dynamics (bounded confidence): agents only interact if opinion difference
  < threshold ε → clusters form; Castellano et al. (2009) reviews this as the
  physics of social dynamics.
translation_table:
  - field_a_term: number of cultural features F
    field_b_term: dimensionality of cultural space; lattice dimension analog
    note: F controls the richness of the cultural representation space
  - field_a_term: number of traits per feature q
    field_b_term: alphabet size; controls cross-cultural similarity probability
    note: q/F ratio is the control parameter for the cultural phase transition
  - field_a_term: interaction probability (cultural overlap)
    field_b_term: Hamming-distance-based interaction kernel (social physics)
    note: only culturally similar agents interact — homophily is built into the dynamics
  - field_a_term: frozen multicultural state (q/F > q_c/F)
    field_b_term: absorbing state with multiple cultural domains
    note: mathematically equivalent to a spin glass ground state with many metastable configurations
  - field_a_term: language extinction rate (~1/2 weeks globally)
    field_b_term: decay of minority in Abrams-Strogatz model (power-law extinction curve)
    note: Zipf distribution of language sizes suggests self-organized criticality in language evolution

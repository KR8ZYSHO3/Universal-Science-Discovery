id: b-social-stratification-statistical-mechanics
title: >
  Social stratification and wealth inequality follow statistical mechanics distributions
  (Boltzmann-Gibbs for the bulk, Pareto for the tail), mapping economic exchange to
  two-body energy exchange and the Gini coefficient to a thermodynamic entropy measure.
status: proposed
fields:
  - sociology
  - statistical-physics
  - economics
bridge_claim: >
  In models where agents exchange fixed amounts of wealth in random pairwise transactions,
  the equilibrium wealth distribution converges to a Boltzmann-Gibbs exponential
  P(w) ~ exp(-w/T) (where T is average wealth per capita, playing the role of
  temperature); adding a savings propensity lambda produces a gamma distribution,
  and adding proportional exchange (multiplicative shocks) produces a Pareto power-law
  tail P(w) ~ w^(-1-alpha) as observed in empirical wealth distributions, connecting
  the Gini coefficient to the statistical physics of energy exchange.
translation_table:
  - field_a_term: wealth distribution P(w) (sociology/economics)
    field_b_term: energy distribution in a statistical ensemble (statistical physics)
    note: Wealth plays the role of energy; GDP per capita corresponds to temperature
  - field_a_term: pairwise economic exchange (economics)
    field_b_term: two-body elastic collision with energy exchange (physics)
    note: Random trade between agents conserves total wealth analogous to elastic collision conserving kinetic energy
  - field_a_term: Gini coefficient G (sociology)
    field_b_term: normalized deviation from maximum entropy distribution (statistical physics)
    note: G = 0 corresponds to maximum entropy (uniform distribution); G = 1 to minimum entropy (all wealth in one agent)
  - field_a_term: Pareto power-law tail in wealth (economics)
    field_b_term: heavy tail from multiplicative noise / Kesten process (statistical physics)
    note: Returns-on-wealth (investment returns proportional to wealth) create multiplicative noise generating Pareto tails
related_unknowns:
  - u-econophysics-wealth-distribution-mechanism
related_hypotheses:
  - h-wealth-distribution-boltzmann-savings-propensity
cross_pollination_opportunities:
  - Calibrating econophysics exchange models to empirical tax data to test whether the Boltzmann-Pareto transition depends on capital gains tax rates
  - Using maximum entropy methods to predict wealth inequality changes under different redistribution policies as thermodynamic interventions
communication_gap: >
  Sociologists and economists study inequality using survey data and distributional
  statistics while statistical physicists develop kinetic exchange models; the
  econophysics approach (Dragulescu-Yakovenko 2000) has been criticized by economists
  for unrealistic micro-assumptions, and the productive exchange of modeling techniques
  between the communities remains limited.
last_reviewed: "2026-05-07"

cross_pollination_opportunities:
  - >
    Use Ising model renormalization group methods to predict how polarisation
    scales with network size — does the polarisation transition sharpen
    (become more abrupt) in larger societies? This is directly testable
    from electoral data across countries with different population sizes.
  - >
    Map measured Twitter/Reddit retweet network topology to Ising coupling
    matrices J_{ij} and infer the effective social temperature T and external
    field h from the empirical opinion distribution. This would make the
    Ising-social mapping quantitative and predictive, not just qualitative.
  - >
    Apply critical slowing-down early-warning indicators (increasing
    autocorrelation, increasing variance of opinion fluctuations) to
    predict upcoming polarisation transitions in social data — export
    from climate tipping-point detection to political science.
  - >
    Test whether Galam's (2002) group-size asymmetry mechanism (minorities
    can stabilise at specific fractions in finite Ising systems) predicts
    stable minority opinions in real political systems — a concrete
    quantitative prediction from the Ising mapping.

communication_gap: >
  Physicists developed the Ising model for magnetism from 1920 onwards.
  Sociologists and political scientists developed opinion dynamics models
  independently in the 1990s-2000s, largely unaware of the exact
  correspondence with statistical mechanics. Castellano et al.'s 2009
  Reviews of Modern Physics article made the connection explicit and
  accessible, but adoption in political science remains limited because
  the language of phase transitions, order parameters, and universality
  classes is not standard in social science training.


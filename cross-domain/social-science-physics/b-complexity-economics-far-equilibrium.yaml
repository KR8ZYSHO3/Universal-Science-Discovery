cross_pollination_opportunities:
  - >
    Agent-based policy simulation: use calibrated minority-game agents to predict
    the effect of carbon tax policy in a path-dependent energy market where fossil
    fuel infrastructure creates lock-in; test whether sufficiently large carbon
    prices can flip the market to a renewable attractor.
  - >
    Innovation S-curve forecasting: fit logistic adoption curves to early adoption
    data for emerging technologies (solid-state batteries, mRNA vaccines) to predict
    time to mainstream adoption; compare with physics-based predictions from
    percolation theory on adoption networks.
  - >
    Schumpeterian wave quantification: use industry-level total factor productivity
    data to identify historical Kondratieff waves; test whether their spacing matches
    the innovation diffusion timescale predicted by S-curve parameters.
communication_gap: >
  Economics departments teach Walrasian equilibrium theory as the foundation; complexity
  economics and agent-based modelling are treated as heterodox and are rarely included
  in mainstream PhD curricula. Physicists who know self-organised criticality and
  far-from-equilibrium thermodynamics do not typically read economic journals; economists
  do not read physics journals. The Santa Fe Institute cross-disciplinary programme
  has partly bridged this gap, but the synthesis has not entered mainstream economics teaching.

id: b-complexity-economics-far-equilibrium
title: >
  Complexity economics treats markets as far-from-equilibrium dissipative systems
  driven by inductive agent strategies — the El Farol minority game, Schumpeterian
  creative destruction, and QWERTY path dependence all emerge from the same positive-
  feedback and self-organised criticality physics that governs phase transitions.
status: established
fields:
  - social-science
  - economics
  - physics
  - complexity-science
bridge_claim: >
  Standard economics assumes markets reach Walrasian general equilibrium via tatonnement
  — a price-adjustment process that requires agents to have rational expectations and
  an auctioneer to coordinate. Complexity economics (Arthur 1994; Santa Fe Institute)
  abandons both: agents form inductive models (pattern-matching hypotheses from
  limited data), niches are created and destroyed by innovation, and technology
  diffuses in S-curves described by the logistic equation dN/dt = rN(1 - N/K) —
  identical to the population ecology model of competitive exclusion. The El Farol
  bar problem (Arthur 1994) demonstrates that rational deductive reasoning fails
  when everyone uses it: no Nash equilibrium exists in pure strategies, so agents
  evolve an ecology of diverse inductive strategies that together produce aggregate
  attendance near the bar capacity. Schumpeterian creative destruction follows the
  same logic as evolutionary punctuated equilibrium: innovation creates temporary
  monopoly rents, imitators erode them, until the next Schumpeterian wave. Path
  dependence (Arthur 1989) arises from positive feedback (network effects) locking
  in inferior standards (QWERTY keyboard, VHS vs. Betamax) — the economic analogue
  of ferromagnetic symmetry breaking below the Curie temperature.
translation_table:
  - field_a_term: logistic equation dN/dt = rN(1-N/K)
    field_b_term: technology S-curve adoption (market penetration over time)
    note: Same equation governs bacterial growth, predator-prey, epidemics, and technology diffusion
  - field_a_term: phase transition with symmetry breaking
    field_b_term: path-dependent technology lock-in (positive feedback → single attractor)
    note: "QWERTY lock-in is analogous to a ferromagnet below Tc: many equivalent states but system freezes in one"
  - field_a_term: self-organised criticality (SOC)
    field_b_term: market ecology of strategies near El Farol equilibrium
    note: Agent strategy space self-organises to a critical state where predictability is maximally exploited
  - field_a_term: dissipative structure (Prigogine) far from thermodynamic equilibrium
    field_b_term: evolving market with continuous Schumpeterian creative destruction
    note: Both require constant energy/resource flux to maintain their far-from-equilibrium organised state
  - field_a_term: minority game (anti-coordination)
    field_b_term: El Farol bar problem (go only if you predict fewer than 60% will attend)
    note: Minority games have been solved analytically; their agent-strategy phase diagram matches market microstructure stylised facts

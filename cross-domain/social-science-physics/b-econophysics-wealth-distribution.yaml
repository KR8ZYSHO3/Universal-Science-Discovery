id: b-econophysics-wealth-distribution
title: >
  Pareto's power-law wealth distribution P(w>x) ∝ x^{-α} (α≈1.5) emerges from
  Bouchaud-Mézard multiplicative noise models analogous to Boltzmann-Gibbs statistics,
  while Piketty's r>g inequality reproduces the physicist's condition for unbounded
  variance growth in a multiplicative stochastic process.
status: established
fields:
  - social-science
  - physics
  - economics
  - statistical-mechanics
  - complexity-science
bridge_claim: >
  Pareto (1897) observed empirically that wealth w follows a power-law complementary
  CDF: P(w>x) ∝ x^{-α}, with α ≈ 1.5–2.0 for most countries (Pareto index). The
  richest 20% hold ~80% of wealth (80/20 rule). Econophysics provides a mechanistic
  derivation: treat agents as molecules exchanging "wealth energy" in random pairwise
  transactions. Under Boltzmann-Gibbs statistics (fixed-sum exchange, no multiplicative
  noise), the equilibrium distribution is exponential — consistent with observed
  middle-class labor income distributions. The power-law tail requires multiplicative
  noise (Bouchaud-Mézard 2000): dw_i = r_i w_i dt + noise − redistribution, where the
  return r_i on capital is stochastic. The steady-state solution is a power law with
  exponent α = 1 + ρ/σ² (ρ = mean capital return, σ² = variance of returns).

  Piketty's r>g (2014): when the average return on capital r exceeds economic growth g,
  capital share grows as K/Y → K/Y + (r−g)τ without bound — exactly the physicist's
  condition for the variance of a multiplicative stochastic process to diverge over time.
  The Gini coefficient G = A/(A+B) (Lorenz curve area ratio) is the integrated inequality
  measure — for a Pareto distribution, G = 1/(2α−1), directly connecting the statistical
  mechanics exponent to the policy-relevant inequality index. The Lotka-Volterra wealth
  model maps wealth redistribution to predator-prey dynamics where taxation is the
  predation term, predicting oscillatory boom-bust cycles under specific parameter regimes.
translation_table:
  - field_a_term: energy in Boltzmann-Gibbs statistics (exponential distribution)
    field_b_term: labor income in random additive exchange models
  - field_a_term: multiplicative noise (geometric Brownian motion) in stochastic dynamics
    field_b_term: capital returns r_i w_i (return proportional to existing wealth)
  - field_a_term: power-law exponent α of Boltzmann energy tail
    field_b_term: Pareto index α of wealth distribution tail
  - field_a_term: variance divergence condition σ² > ρ (multiplicative noise overwhelms drift)
    field_b_term: Piketty r > g (capital return exceeds economic growth)
  - field_a_term: Gini coefficient G = 1/(2α−1) from Pareto distribution
    field_b_term: inequality index measurable in national income surveys
  - field_a_term: predator-prey Lotka-Volterra dynamics
    field_b_term: wealth redistribution through taxation (predation on capital)

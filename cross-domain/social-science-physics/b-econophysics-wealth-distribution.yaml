cross_pollination_opportunities:
  - >
    Phase transition theory predicts a critical redistribution rate below which wealth
    inequality diverges to a power law and above which it converges to an exponential —
    an abrupt transition analogous to a second-order phase transition. Tax policy
    analysis could map observed Gini trajectories onto this phase diagram to identify
    countries near the critical point where small policy changes have outsized effects.
  - >
    Agent-based models of wealth dynamics, calibrated to empirical transaction data
    from digital payment systems (M-Pesa, UPI), could test whether the Boltzmann-Gibbs
    vs. multiplicative noise distinction (additive labor income vs. multiplicative capital
    returns) explains the bimodal income-wealth distribution seen in developing economies.
communication_gap: >
  Econophysics papers appear in physics journals (Physica A, Eur Phys J B) and are
  largely ignored by mainstream economics journals (AER, JPE, QJE), which require
  microfoundation models with rational agents and utility maximization. Economists
  distrust the "gas molecule" analogy as too simplistic; physicists find the equilibrium-
  rationality assumptions of economics equally implausible. Piketty's Capital (2014)
  was an economics bestseller but did not cite the Bouchaud-Mézard multiplicative
  noise model that independently derived the same r>g condition from statistical
  mechanics — a significant missed connection.

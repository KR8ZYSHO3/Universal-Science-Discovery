id: b-cascade-failures-interdependent-networks
title: >
  Interdependent network theory (Buldyrev et al. 2010) shows that mutual
  dependencies between coupled infrastructure networks (power grid ↔ communication
  network) convert continuous second-order percolation transitions into abrupt
  first-order cascades, with direct application to the 2003 Italy blackout and
  financial systemic risk.
status: established
fields:
  - social-science
  - infrastructure-systems
  - physics
  - network-science
  - percolation-theory
bridge_claim: >
  Standard percolation theory predicts that as nodes fail in a random network,
  the giant connected component shrinks continuously (second-order phase transition)
  with a critical threshold p_c = 1/<k> for Erdős-Rényi graphs. Buldyrev et al.
  (2010) showed that when two networks are interdependent — each node in network A
  requires a functioning node in network B to operate, and vice versa — the
  coupled failure dynamics produces a cascade: failure in A disables nodes in B,
  which disables more nodes in A, which disables more nodes in B... The resulting
  phase transition is first-order (discontinuous): the giant component collapses
  abruptly at a critical fraction of initial failures p_c, with no warning in the
  order parameter. This is qualitatively different from and more dangerous than
  single-network percolation. The 2003 Italy blackout followed this exact pattern:
  power grid nodes failed → SCADA communication failed → more power nodes failed.
  Financial networks exhibit analogous cascades: bank failures → interbank
  lending failures → more bank failures. Gao et al. (2012) extended the framework
  to n interdependent networks, finding that fragility increases superlinearly with n.
translation_table:
  - field_a_term: percolation threshold p_c (fraction of nodes that can fail before network collapse)
    field_b_term: systemic risk threshold in infrastructure or financial networks
    note: lower p_c = more fragile; interdependency dramatically lowers p_c
  - field_a_term: second-order percolation transition (continuous collapse)
    field_b_term: gradual degradation of a single isolated network
  - field_a_term: first-order percolation transition (abrupt collapse)
    field_b_term: catastrophic cascade failure in interdependent systems
    note: the key new result — interdependency converts gradual to abrupt failure
  - field_a_term: giant connected component (GCC)
    field_b_term: functional core of an infrastructure or financial system
  - field_a_term: interdependency links (between-network edges)
    field_b_term: operational dependencies between infrastructure sectors
    note: e.g., power grid nodes need communication; communication nodes need power
  - field_a_term: degree of interdependency q (fraction of interdependent nodes)
    field_b_term: coupling strength between infrastructure sectors

cross_pollination_opportunities:
  - >
    The 2008 financial crisis exhibited cascade dynamics: bank failures propagated
    through interbank lending, derivatives, and money market fund networks
    simultaneously — a multi-layer interdependent system. Applying the Buldyrev
    framework to financial networks with empirical coupling data could give
    regulators a quantitative measure of systemic fragility and optimal
    deleveraging strategies.
  - >
    Ecological mutualistic networks (plant-pollinator, host-symbiont) are also
    interdependent in the Buldyrev sense: the collapse of pollinators cascades to
    plants and back. Importing percolation-theoretic fragility analysis into
    community ecology would give conservation biologists quantitative collapse
    thresholds analogous to the infrastructure p_c.
communication_gap: >
  Network physicists publish in Physical Review Letters and Nature Physics;
  infrastructure engineers and policymakers read IEEE Transactions on Power Systems
  and IEEE Systems Man Cybernetics. The mathematical formalism of percolation theory
  is rarely taught in engineering programs. Post-event analyses of major blackouts
  (Italy 2003, Texas 2021) are conducted by engineering commissions that do not
  cite the physics literature.

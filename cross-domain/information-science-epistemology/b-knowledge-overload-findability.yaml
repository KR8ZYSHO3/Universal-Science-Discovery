cross_pollination_opportunities:
  - >
    Apply mutual information estimators (KSG non-parametric estimator) to
    cross-domain citation networks to quantify I(A; B) between discipline pairs
    before and after bridge entries are published — directly testing whether
    bridges increase information flow between fields.
  - >
    Use PageRank on the USDR knowledge graph to identify the highest-connectivity
    mathematical hub nodes (candidate: information entropy, phase transitions,
    percolation, variational principles). Rank bridges by contribution to giant-
    component connectivity — this gives an empirically grounded priority queue
    for the bridge catalog.
  - >
    Build an AI co-pilot that uses embedding similarity across domain vocabularies
    to propose bridge candidates — analogous to a collaborative filter that
    recommends "items" (mathematical structures) a researcher in field A has not
    encountered but which are highly rated by researchers in structurally similar
    domains.
  - >
    Measure the "Merton multiple lag" — time between independent parallel
    discoveries in different fields — using citation network analysis. Test whether
    the lag is shorter for domain pairs with explicit bridge entries versus
    matched pairs without bridges. This operationalizes h-bridge-catalog-reduces-
    rediscovery-lag.
  - >
    Apply Floridi's infosphere model to estimate the epistemic cost of jargon
    barriers: compare the fraction of cross-domain relevant papers retrieved by
    a domain-native keyword search vs. a bridge-augmented semantic search. The
    difference quantifies the channel noise introduced by vocabulary mismatch.

communication_gap: >
  Information theory (Shannon, Weaver), epistemology (Floridi), network science
  (Barabási), cognitive psychology (Sweller), and recommender systems (Maes,
  Resnick, Varian) have each independently described aspects of the knowledge
  overload problem from their own disciplinary perspectives. These communities
  publish in non-overlapping venues (Bell System Technical Journal, Minds &
  Machines, Science, Cognitive Science, Communications of the ACM) and have not
  converged on a unified framework. The information-theoretic treatment of
  scientific knowledge overload as a channel-capacity problem — with domain
  jargon as noise and bridge catalogs as codecs — has not appeared in the
  literature as an explicit cross-domain synthesis. Library science treats this
  as a retrieval problem; science-of-science treats it as a network problem;
  cognitive science treats it as a working-memory problem. None has unified
  these threads using Shannon's channel capacity framework.


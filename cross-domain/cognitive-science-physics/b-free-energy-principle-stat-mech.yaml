cross_pollination_opportunities:
  - >
    The free energy principle provides a formal bridge between thermodynamic
    efficiency and neural computation. Measuring the metabolic cost of
    Bayesian inference in neural tissue (using 2-photon imaging and
    calorimetry) would test whether the brain operates near the Landauer
    limit for prediction-error minimisation.
  - >
    Variational autoencoders (VAEs) in machine learning implement the same
    ELBO objective as the free energy principle. The latent space of a trained
    VAE is formally equivalent to the brain's internal model. Comparing the
    geometry of VAE latent spaces with neural representational geometry
    (via RSA or probing classifiers) tests the mathematical bridge directly.
  - >
    Psychiatric conditions (schizophrenia, depression, anxiety) can be
    modelled as failures of precision-weighted prediction error minimisation.
    The free energy framework makes quantitative predictions about
    which parameters (prior precision, likelihood precision, learning rate)
    are dysregulated — testable with computational psychiatry models.

communication_gap: >
  Friston's work is published primarily in neuroscience journals (Nature
  Reviews Neuroscience, Journal of Neuroscience) and is cited mainly within
  that field. Thermodynamicists and statistical physicists are largely unaware
  of the free energy principle. Machine learning researchers know variational
  inference (ELBO) but the cognitive neuroscience literature uses different
  notation. The philosophical framing ("everything is free energy minimisation")
  alienates physicists who prefer minimal formal claims. Beal's (2003) PhD
  thesis making the variational Bayes / Helmholtz connection explicit is widely
  cited in ML but rarely by neuroscientists.


id: b-free-energy-principle-stat-mech
title: >
  Friston's free energy principle — biological systems minimise variational
  free energy F = E_q[log q(s) − log p(s,o)] — is formally identical to
  variational inference in machine learning and to Helmholtz free energy in
  thermodynamics, unifying perception, action, homeostasis, and learning.
status: proposed
fields:
  - cognitive-science
  - physics
  - neuroscience
  - machine-learning
  - thermodynamics
  - theoretical-biology

bridge_claim: >
  Friston (2010) proposed that all biological self-organisation can be
  understood as the minimisation of variational free energy F, where:

    F = E_q[log q(s)] − E_q[log p(s,o)]
      = KL[q(s) || p(s|o)] − log p(o)

  Here q(s) is the organism's internal model of hidden states s, p(s,o) is a
  generative model of states and observations o. Minimising F simultaneously
  minimises the KL-divergence between the internal model and the true
  posterior (perception = Bayesian inference) and maximises the log-evidence
  for the organism's model (action = active inference).

  This is formally identical to variational Bayesian inference (Beal 2003):
  F is the evidence lower bound (ELBO) in variational autoencoders and the
  loss function of variational inference algorithms. The "free energy" is not
  a metaphor — it is the same mathematical object.

  The thermodynamic connection is equally precise. The Helmholtz free energy
  A = U − TS (internal energy minus temperature times entropy) arises from
  statistical mechanics as the minimum work required to change a system's
  state. Variational free energy has the same structure: F = accuracy − complexity,
  where accuracy = −E_q[log p(o|s)] (like internal energy, measures fit) and
  complexity = KL[q(s) || p(s)] (like −TS, penalises model complexity).

  The bridge implies: biological organisms are thermodynamic engines that
  maintain their non-equilibrium structure by minimising a free energy
  functional. Perception corresponds to gradient descent on F w.r.t. internal
  states; action corresponds to gradient descent on F w.r.t. external states
  (changing the world to match predictions). Learning corresponds to updating
  the generative model parameters.

  Key implication: the brain is not a passive observer but an active inference
  machine that generates predictions and updates them to minimise surprise
  (−log p(o)). This resolves the "binding problem" (unified percepts arise
  because F is minimised jointly) and explains predictive coding (prediction
  errors are the gradients of F propagated up cortical hierarchies).


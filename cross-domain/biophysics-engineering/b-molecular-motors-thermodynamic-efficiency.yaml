cross_pollination_opportunities:
  - >
    Bio-inspired nanomachine design: engineering molecular-scale actuators
    using the geometric and chemical principles of biological motors (power
    stroke, gating, elastic energy storage) could yield artificial nanomotors
    far more efficient than current MEMS/NEMS devices.
  - >
    Free energy measurement via Jarzynski: optical tweezers + Jarzynski equality
    is now a standard technique for measuring binding free energies, protein
    folding energetics, and drug-target interactions — a direct application
    of non-equilibrium statistical mechanics to pharmaceutical engineering.
communication_gap: >
  Mechanical engineers studying thermodynamic efficiency of macroscopic motors
  and biophysicists studying molecular motors are separated by six orders of
  magnitude in length scale and by disciplinary boundaries. The Jarzynski
  equality bridges non-equilibrium statistical physics to single-molecule
  biophysics, but is rarely taught in engineering thermodynamics courses.
  Toyabe et al. (2010) demonstrated an information-to-energy conversion machine
  at the single-molecule scale, realizing Maxwell's demon experimentally.

cross_pollination_opportunities:
  - "Apply WBE fractal network theory to derive the urban scaling exponents from first principles of social network geometry"
  - "Use urban scaling data to test whether innovation (citations, patents) and crime follow the same exponent, predicting a social cost of density"
  - "Design city planning interventions (zoning, transit) that shift the scaling exponent toward innovation while reducing the crime co-scaling"

communication_gap: >
  Urban economics and urban sociology treat city size effects primarily as
  agglomeration externalities without mathematical scaling theory. Physics-trained
  researchers (Bettencourt, West, Lobo) introduced the scaling framework from
  outside the field. Urban economists initially resisted the power-law claims,
  preferring log-linear regression. The biological analogy (cities as organisms)
  is viewed as metaphor by sociologists rather than a testable quantitative model.


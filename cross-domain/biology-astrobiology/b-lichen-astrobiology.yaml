id: b-lichen-astrobiology
title: >
  Synthetic lichen-like microbial consortia engineered for biofabrication on
  Earth are functional analogs of the self-sustaining biosystems required for
  off-world resource utilisation.
status: proposed
fields:
  - synthetic-biology
  - astrobiology
  - materials-science
  - ecology
bridge_claim: >
  Lichen — obligate mutualistic consortia of photosynthetic partners
  (algae or cyanobacteria) and heterotrophic fungi — are among Earth's most
  extreme-environment colonisers because the consortium achieves metabolic
  self-sufficiency: primary production feeds heterotrophic processing, which
  in turn cycles nutrients back to the autotroph. Astrobiology requires exactly
  this architecture for any sustainable in-situ resource utilisation (ISRU) on
  the Moon, Mars, or asteroids: a closed-loop biological system that fixes
  energy from an available source, builds useful materials from local substrate
  (regolith), and regenerates its own feedstock. Synthetic-biology tools now
  allow rational co-design of autotrophic-heterotrophic consortia to perform
  programmable biofabrication, but the two communities (astrobiology / ISRU
  engineers vs. synthetic-biology researchers) rarely co-publish. Ecology
  provides the stability theory (mutualism vs. parasitism equilibria) that
  neither field yet applies quantitatively to consortium engineering.
translation_table:
  - field_a_term: lichen thallus (ecology)

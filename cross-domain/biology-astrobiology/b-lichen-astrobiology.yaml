cross_pollination_opportunities:
  - NASA/ESA ISRU engineers provide target material specs and environmental envelopes (temperature, radiation, regolith composition) to synthetic biologists for design constraints
  - Ecologists supply mathematical models of mutualism stability (adaptive dynamics, eco-evolutionary games) to guide consortium circuit design
  - Materials scientists measure mechanical properties of biofabricated structures on simulant regolith, feeding back quantitative targets to synthetic-biology design cycles
  - Closed-loop life-support and food-production systems (long-duration spaceflight) benefit from the same consortia architectures
communication_gap: >
  Astrobiology / space engineering literature focuses on abiotic chemistry, radiation
  tolerance, and mission engineering rather than synthetic-biology circuit design.
  Synthetic biologists rarely model closed-loop ecosystem stability; they optimise
  individual strains or two-strain interactions in controlled lab media, not
  multi-partner systems on regolith analogs. Ecology journals do not reach either
  community's readership.

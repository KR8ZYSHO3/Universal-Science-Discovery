id: b-hydrothermal-vent-prebiotic-networks
title: >
  Hydrothermal vent geochemistry provides a natural autocatalytic reaction network
  with proton gradients, mineral catalysts, and thermodynamic disequilibria that
  can drive prebiotic chemical evolution — making alkaline vent systems the most
  plausible abiogenesis laboratory and connecting deep-sea geochemistry to origin
  of life chemistry.
status: proposed
fields:
  - geochemistry
  - astrobiology
  - chemistry
  - biology
bridge_claim: >
  Alkaline hydrothermal vents (Lost City type) produce fluids rich in H2 and CH4
  at pH 9-11, in contact with CO2-rich ocean water at pH ~8 — maintaining a
  proton gradient of ~3 pH units across thin Fe-Ni-S mineral membranes. Lane and
  Martin (2010) argued this gradient is homologous to the proton-motive force used
  by all life to drive ATP synthesis, providing a plausible free energy source for
  abiogenesis. The mineral-catalysed reactions in vent chimneys — CO2 fixation via
  the Wood-Ljungdahl pathway, acetyl-CoA synthesis — are autocatalytic: products
  catalyse their own formation, giving network autocatalysis with the mathematical
  structure of a Lotka-Volterra chemical attractor. Autocatalytic set theory
  (Kauffman 1986) predicts that sufficiently connected reaction networks spontaneously
  develop self-sustaining autocatalytic cores — a potential mechanism for the
  origin of metabolism. This bridge connects hydrothermal geochemistry (mineral
  phases, proton gradients, redox chemistry) with the abstract theory of autocatalytic
  networks, chemical evolution, and the thermodynamics of self-organisation far
  from equilibrium.
translation_table:
  - field_a_term: proton gradient across vent mineral membrane
    field_b_term: primordial proton-motive force (proto-ATP synthase driver)
    note: The ~180 mV gradient across Fe-Ni-S membranes is comparable to the 150-200 mV used by modern cells
  - field_a_term: autocatalytic reaction set
    field_b_term: self-sustaining metabolic network (Kauffman autocatalytic set)
    note: A set of reactions where every member is catalysed by some product of the set
  - field_a_term: Fe-Ni-S mineral catalyst
    field_b_term: proto-ferredoxin (iron-sulfur clusters in modern enzymes)
    note: Evolutionary relics of the vent minerals that catalysed the first metabolic reactions
  - field_a_term: geochemical free energy (H2/CO2 disequilibrium)
    field_b_term: metabolic free energy driving biosynthesis
    note: The thermodynamic driver for both prebiotic and biotic carbon fixation
cross_pollination_opportunities:
  - Synthesise Fe-Ni-S microcompartments mimicking vent mineralogy and test for autocatalytic CO2 fixation and product retention
  - Use network autocatalysis theory to design minimal synthetic reaction sets that can replicate vent chemistry in laboratory origin-of-life experiments
  - Apply the autocatalytic set framework to assess whether similar networks could operate in subsurface oceans of Enceladus or Europa
last_reviewed: "2026-05-07"

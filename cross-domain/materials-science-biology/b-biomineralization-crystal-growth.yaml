cross_pollination_opportunities:
  - >
    Bio-inspired mineralisation for bone tissue engineering: scaffold proteins
    with Asp/Glu-rich sequences that nucleate oriented HAp could replace
    autograft bone. Materials scientists designing the protein need nucleation
    theory; biologists need to quantify γ reductions from their peptides.
  - >
    Industrial scale inhibition of unwanted mineralisation (kidney stones,
    pipe scaling) by applying the same Asp/Glu motifs identified in shell
    proteins — rational anti-scalant design from structural biology.
  - >
    Geological diagenesis models improved by incorporating biological
    coarsening-suppression data: carbonate platforms that grew under heavy
    biotic control may show anomalous LSW exponents measurable in rock record.
communication_gap: >
  Materials scientists publish in Acta Materialia, Crystal Growth & Design, and
  J Crystal Growth; structural biologists in J Biol Chem, PNAS, and eLife.
  The Weiner and Addadi group (Weizmann) has bridged these communities, but
  most biomineralisation papers still describe crystal control qualitatively
  ("the protein inhibits calcite growth") without computing γ reductions or
  nucleation barriers quantitatively — the language materials scientists require.

cross_pollination_opportunities:
  - >
    Biomimetic materials synthesis attempts to copy biological nucleation control
    using synthetic peptides and polymer scaffolds. Understanding the quantitative
    relationship between protein sequence, template geometry, and γ reduction would
    allow rational design of nucleating agents for pharmaceutical crystallization,
    cement, and functional ceramics — industries where polymorph control has large
    economic value.
  - >
    Diatom frustules (silica glass with photonic crystal geometry) achieve optical
    properties useful for waveguiding and sensing. The silicification proteins
    (silaffins) that template this nanostructure are incompletely characterized.
    Importing protein engineering tools from synthetic biology into biomineralization
    research could enable engineered photonic biomaterials.
communication_gap: >
  Classical nucleation theory is taught in materials science and chemical engineering
  but rarely in biology. Biomineralization research is published in specialist
  journals (J Struct Biol, Biomaterials) that materials scientists rarely read.
  The quantitative connection between protein matrix chemistry and the CNT parameters
  γ and ΔG_v has been made in a handful of studies but has not become the default
  analytical framework for the biomineralization field.

cross_pollination_opportunities:
- Build modality-missingness benchmarks to compare contrastive pretraining and probabilistic harmonization methods.
- Use single-cell perturbation datasets to test whether aligned latents preserve causal biological response structure.
communication_gap: Contrastive ML benchmarks emphasize generic transfer, while systems biology requires mechanistic interpretability and assay-aware uncertainty estimates.

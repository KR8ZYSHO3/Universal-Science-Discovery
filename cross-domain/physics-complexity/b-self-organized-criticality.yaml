communication_gap: >
  Bak et al. published in Physical Review Letters (1987) for physicists.
  Beggs & Plenz published in Journal of Neuroscience (2003) for neuroscientists.
  Gutenberg & Richter published in Bulletin of the Seismological Society (1944)
  for geophysicists. Each community developed the power-law analysis independently.
  The unification under SOC was proposed by Bak's 1996 book "How Nature Works"
  but is still not standard curriculum in neuroscience or ecology programs.


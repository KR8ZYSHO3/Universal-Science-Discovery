id: b-self-organized-criticality
title: "Self-organized criticality (SOC) ↔ power-law distributions in brains, earthquakes, forest fires, and extinctions"
status: established
fields:
  - statistical-physics
  - neuroscience
  - geophysics
  - ecology
  - economics

bridge_claim: >
  Bak, Tang & Wiesenfeld (1987) showed that a sandpile model — where grains are
  added one at a time and avalanches redistribute them — spontaneously evolves to
  a critical state without any tuning of parameters. At criticality, avalanche
  sizes follow a power law P(s) ~ s^{-3/2} (the BTW exponent). This is
  self-organized criticality (SOC): the system tunes itself to the critical point
  purely by the dynamics of addition and redistribution. The same power-law
  statistics — identical exponents in many cases — appear in: (1) neuronal
  avalanches in cortex in vitro and in vivo (Beggs & Plenz 2003: exponent -3/2);
  (2) earthquake magnitude-frequency distributions (Gutenberg-Richter: exponent
  -1 in energy); (3) forest fire size distributions (exponent -1.2 to -1.4);
  (4) extinction event sizes in the fossil record (Sole & Manrubia 1996:
  exponent -2); (5) solar flare energy distributions (exponent -1.8).
  In each case the system sits near a critical point — not because parameters
  were tuned, but because the dynamics drive it there. The brain connection is
  deepest: at criticality, dynamic range (sensitivity to inputs) and information
  transmission are both maximised, providing a functional explanation for why
  neural circuits self-organise to criticality.


cross_pollination_opportunities:
  - >
    Mathematicians developing categorification of knot invariants (Khovanov
    homology, knot Floer homology — finer invariants than Jones polynomial)
    could provide more powerful tools for distinguishing DNA knot types that
    Jones polynomial cannot separate. Biologists measuring DNA topology in vivo
    (topological domains in chromosomes) could provide new mathematical problems
    about 3D knot configurations in confined volumes.
  - >
    RNA tertiary structure involves pseudoknots — topological entanglements not
    captured by secondary structure diagrams. Knot-theoretic analysis of RNA
    structure (Reidemeister moves on RNA graphs) could reveal topological constraints
    on RNA folding that are invisible to current structure prediction algorithms
    (AlphaFold2 does not model RNA topology). This requires mathematicians skilled
    in virtual knot theory collaborating with structural biologists.
communication_gap: >
  Knot theory is taught in mathematics departments (topology courses) using abstract
  algebraic machinery (skein relations, Seifert surfaces, homology) inaccessible
  to biologists. DNA topology is taught in biochemistry using physical intuition
  (supercoiling, topoisomerases) without formal topological language. The Jones
  polynomial discovery (1985) emerged from von Neumann algebra theory — quantum
  groups — entirely within abstract mathematics, but its DNA applications were
  realized primarily by Sumners and colleagues working at the mathematical
  biology interface. Most biochemists using gel electrophoresis to characterize
  DNA knots are unaware of the Jones polynomial or its potential for distinguishing
  biological knot states.

id: b-knot-theory-dna-topology
title: >
  Knot invariants (Alexander, Jones, HOMFLY polynomials) characterize DNA knot and
  catenane types arising during replication and viral packaging, with topoisomerase
  II inhibitor chemotherapy agents exploiting the essential unknotting reaction —
  bridging abstract knot theory with molecular biology and pharmacology.
status: established
fields:
  - mathematics
  - chemistry
  - molecular-biology
  - biochemistry
  - topology
bridge_claim: >
  DNA is a physical implementation of knot theory. Circular DNA molecules (plasmids,
  viral genomes, mitochondrial DNA) are closed loops that can be knotted or linked
  (catenated). The topological state is biologically critical: knotted DNA cannot
  be replicated or transcribed, and catenated daughter chromosomes cannot segregate
  after replication. Topoisomerases are the biological machines that change DNA
  topology by passing strands through each other.

  Knot invariants distinguish topological states: Alexander polynomial Δ(t) classifies
  prime knots up to 8 crossings but fails for some knot pairs (e.g., granny knot vs.
  square knot — same Alexander polynomial). Jones polynomial V(t) (Jones 1985,
  discovered via von Neumann algebras) distinguishes more knots and detects chirality
  (V(t) ≠ V(1/t) for chiral knots). HOMFLY polynomial P(l,m) subsumes both. These
  invariants are computable from the knot diagram via skein relations — a recursive
  structure that biologists can apply to gel electrophoresis data.

  Gel electrophoresis separates DNA knots by crossing number: knots with more
  crossings are more compact and migrate faster. Dean et al. (1985) showed that
  the electrophoretic bands of bacteriophage P4 DNA correspond to torus knots T(2,n)
  — the knot type created by the packing geometry of DNA inside the capsid.
  Calibrating bands against synthetic knot standards (made by site-specific
  recombination) enables knot identification in biological samples.

  Topoisomerase II inhibitors (doxorubicin/adriamycin, etoposide, novobiocin) trap
  the enzyme in the covalent cleavage complex — a state where the enzyme has cut
  both DNA strands and is covalently attached to the 5' ends. This prevents strand
  religation, causing persistent DSBs (double-strand breaks) proportional to
  transcriptional activity (most active genes = most topo II = most damage), selectively
  killing rapidly dividing tumor cells. The writhe formula Wr = (1/4π)∯(dr₁×dr₂)·
  (r₁-r₂)/|r₁-r₂|³ is the mathematical definition underlying the biological
  measurement of supercoiling.
translation_table:
  - field_a_term: knot K in S³ (mathematical closed curve)
    field_b_term: closed circular DNA molecule with knotted topology
  - field_a_term: Alexander polynomial Δ(t) — knot invariant from Seifert matrix
    field_b_term: electrophoretic mobility pattern of DNA knot (partial fingerprint)
  - field_a_term: Jones polynomial V(t) — from Temperley-Lieb algebra / von Neumann algebras
    field_b_term: complete topological fingerprint of DNA knot chirality
  - field_a_term: skein relation (crossing change relates knot polynomials)
    field_b_term: topoisomerase reaction (strand passage changes topology by ±1 or ±2)
  - field_a_term: catenane (two linked but unknotted circles)
    field_b_term: daughter chromosomes joined after replication (solved by topo II)
  - field_a_term: torus knot T(2,n)
    field_b_term: DNA knot created by phage capsid geometry (P4 phage packaging)
  - field_a_term: writhe Wr (integral formula for supercoiling)
    field_b_term: superhelical density σ (measured by intercalator titration)
  - field_a_term: unknotting number u(K) — minimum strand passages to unknot
    field_b_term: minimum number of topoisomerase II reactions needed for segregation

cross_pollination_opportunities:
  - "Room-temperature single-photon sources from NV centers and 2D material defects: photon statistics tools from quantum optics enable characterization of solid-state emitters for fiber-based quantum networks without cryogenic cooling."
  - "Quantum illumination and sub-shot-noise sensing: entangled photon pairs with sub-Poissonian statistics enable target detection below the classical noise floor — connecting quantum optics formalism to classical detection theory and estimation bounds."
communication_gap: >
  Quantum optics formalism (density matrices, normally-ordered correlation functions,
  Glauber coherence theory) is not standard training for optical engineers or
  photonics researchers who design classical coherent systems. The connection between
  g⁽²⁾(0) and the Mandel Q parameter is well known within quantum optics but the
  statistical physics interpretation (sub-Poissonian as negative Fano factor) is
  rarely taught in statistics or signal processing curricula.

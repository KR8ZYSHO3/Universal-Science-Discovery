id: b-berry-phase-x-polarization-parallel-transport-optics
title: >
  Berry phase in quantum systems and Pancharatnam-Berry phase in polarization optics share a geometric parallel-transport structure: cyclic parameter changes accumulate phase from path geometry rather than local dynamical time alone.
status: established
fields:
  - quantum-physics
  - optics
  - geometry
bridge_claim: >
  The common object is holonomy on a parameter space. Polarization optics offers visible interferometric demonstrations of geometric phase, while quantum mechanics supplies the broader adiabatic-phase language.
translation_table:
  - field_a_term: quantum state transported around parameter loop
    field_b_term: polarization state transported on Poincare sphere
    note: Both trace a loop in state space.
  - field_a_term: Berry phase
    field_b_term: Pancharatnam-Berry geometric phase
    note: Phase is geometric rather than purely dynamical.
  - field_a_term: holonomy
    field_b_term: interferometric phase shift from closed polarization path
    note: The differential-geometric structure is shared.
communication_gap: >
  Quantum curricula emphasize adiabatic Hamiltonians, while optics labs often teach wave plates and polarization spheres without naming the same differential-geometric structure.
cross_pollination_opportunities:
  - Use polarization interferometers as low-cost demonstrations of Berry holonomy.
  - Transfer robust geometric-phase calibration methods from optics to quantum-control teaching labs.
related_unknowns:
  - u-geometric-phase-calibration-across-polarization-optics
related_hypotheses:
  - h-pancharatnam-loop-area-predicts-interferometric-phase-shifts
references:

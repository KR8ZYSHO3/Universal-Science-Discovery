cross_pollination_opportunities:
  - "Particle filters (sequential Monte Carlo) from Bayesian statistics provide an exact alternative to the Gaussian-approximation EnKF for epidemic state estimation, particularly important for low case counts where Poisson noise is non-Gaussian and EnKF approximation breaks down."
  - "Multi-scale data assimilation: combining genomic surveillance (SARS-CoV-2 variant frequencies) with case count data in a coupled EnKF framework could simultaneously track transmission rates and variant fitness advantages."
communication_gap: >
  Epidemiologists use Rt estimators (EpiEstim, EpiNow2) based on the renewal
  equation without connection to the data assimilation literature from numerical
  weather prediction. Data assimilationists in atmospheric science use EnKF
  routinely but rarely apply it to epidemiological compartment models.
  The mathematical identity between weather forecasting and epidemic forecasting
  as filtering problems was only highlighted systematically during COVID-19.

id: b-language-biomarker-diagnosis
title: >
  Computational linguistics measures of syntactic complexity, semantic coherence,
  and speech-rate variability serve as non-invasive biomarkers of neural health —
  detecting Alzheimer's disease, depression, and psychotic-spectrum formal thought
  disorder years before clinical presentation.
status: proposed
fields:
  - computational-linguistics
  - clinical-neurology
  - psychiatry
  - natural-language-processing
  - medicine
bridge_claim: >
  Language production requires the coordinated activity of prefrontal working
  memory, temporal lobe semantic networks, basal ganglia procedural systems,
  and cerebellar timing circuits. Pathology in any of these systems leaves
  quantifiable signatures in the structure of speech and text that are detectable
  with NLP tools before clinical symptoms meet diagnostic threshold.

  Alzheimer's disease: longitudinal analysis of speech samples (picture description
  tasks, spontaneous narratives) shows declining lexical richness (type-token ratio),
  increased repetition, reduced syntactic embedding depth, and semantic incoherence
  (measured by sentence-to-sentence cosine distance in embedding space) years
  before neuropsychological test scores cross diagnostic threshold. Analysis of
  Iris Murdoch's novels shows systematic linguistic decline preceding her 1997
  Alzheimer's diagnosis by over a decade.

  Depression: speech rate slows (reduced syllables/second), pause frequency
  increases, and pitch variability decreases. Semantic content shifts toward
  first-person singular pronouns and negation. These features classify depression
  from audio with AUC >0.80 in held-out data, matching clinical interview accuracy.

  Psychosis/formal thought disorder: semantic coherence between consecutive
  utterances (measured by embedding cosine similarity) is markedly reduced.
  Tangentiality and loose association — cardinal symptoms of formal thought
  disorder — are captured by graph-theoretic analysis of semantic networks in
  speech, where psychotic speech shows reduced clustering and abnormal random-walk
  properties.

  The mathematical bridge: language is a high-dimensional dynamical system whose
  trajectory through semantic space reflects the health of the underlying neural
  dynamical system. NLP gives us a non-invasive window into brain network integrity.
translation_table:
  - field_a_term: type-token ratio (lexical richness)
    field_b_term: semantic memory retrieval efficiency; declines with temporal lobe neurodegeneration
  - field_a_term: syntactic embedding depth (parse tree depth)
    field_b_term: prefrontal working memory capacity; reduced in Alzheimer's and schizophrenia
  - field_a_term: sentence-to-sentence cosine similarity (semantic coherence)
    field_b_term: associative looseness / formal thought disorder severity; low in psychosis
  - field_a_term: speech rate (syllables/second)
    field_b_term: psychomotor speed; reduced in depression, elevated in mania
  - field_a_term: first-person singular pronoun frequency
    field_b_term: depressive self-focus; anhedonic self-referential processing
  - field_a_term: semantic network clustering coefficient in speech graph
    field_b_term: associative coherence; reduced in formal thought disorder, elevated in OCD

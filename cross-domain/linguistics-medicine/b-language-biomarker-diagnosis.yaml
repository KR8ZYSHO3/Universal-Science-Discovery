cross_pollination_opportunities:
  - >
    Passive voice biomarker monitoring: smartphone apps that analyze daily speech
    (with consent) for NLP biomarkers could provide continuous, longitudinal
    monitoring of cognitive and mood trajectory — detecting Alzheimer's prodromal
    decline or depression relapse months before clinical presentation. This requires
    only the NLP pipeline; the biology is already well-established.
  - >
    Clinical trial endpoints: current AD trials use neuropsychological tests (MMSE,
    ADAS-Cog) that have floor/ceiling effects and require in-person visits.
    Automated NLP speech analysis could provide continuous, remote endpoints
    sensitive to subtle early changes — increasing statistical power and enabling
    smaller trials.
  - >
    Universal screening: picture description tasks (Cookie Theft from the Boston
    Aphasia battery) administered and auto-scored by smartphone NLP could screen
    populations for cognitive impairment at the scale of a viral app. The DementiaBank
    corpus already shows NLP achieves clinical-grade accuracy; deployment is the gap.
  - >
    Cross-diagnostic NLP profile: different psychiatric conditions have distinguishable
    NLP signatures (depression: slow speech, sad valence; psychosis: low coherence;
    mania: fast speech, high connectivity; anxiety: hedging, repetition). A single
    NLP assessment battery could aid differential diagnosis in resource-limited
    settings where psychiatric specialists are unavailable.
communication_gap: >
  Computational linguistics and clinical medicine communicate minimally: NLP
  researchers publish in ACL/EMNLP/NAACL; clinicians publish in JAMA, Lancet,
  Brain. The DementiaBank and similar datasets exist but are primarily used by
  NLP researchers with limited clinical collaboration. Clinical adoption requires
  regulatory approval, integration with EHR systems, and evidence from randomized
  trials — none of which NLP researchers are equipped to pursue alone. Psychiatry
  has been slow to adopt quantitative speech measures despite decades of research
  on formal thought disorder, in part because the measures require computational
  tools not standard in clinical practice.

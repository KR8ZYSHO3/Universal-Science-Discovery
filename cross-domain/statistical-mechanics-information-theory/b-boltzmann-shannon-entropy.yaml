related_hypotheses:
  - h-maxent-nonequilibrium-statistical-mechanics
cross_pollination_opportunities:
  - >
    Variational inference in machine learning uses the free energy F = ⟨E⟩ − T·S
    (evidence lower bound / ELBO) — the same quantity as thermodynamic free energy.
    This suggests that training a neural network is a form of thermodynamic inference
    and that statistical mechanics methods (replica theory, cavity method) apply to
    learning theory.
  - >
    Non-equilibrium extensions: the Jarzynski equality and Crooks fluctuation theorem
    connect work distributions to free energy differences — the information-theoretic
    content is that the KL-divergence between forward and reverse process distributions
    equals the dissipated work in units of k_B T.
communication_gap: >
  Physics and information theory developed the entropy concept independently (Boltzmann
  1877 and Shannon 1948 are 71 years apart). Many physicists learn Boltzmann entropy
  as a physical fact, not as an inference framework. Many information theorists do not
  know that H is measured in joules/kelvin when multiplied by k_B. Jaynes's unification
  is underappreciated outside statistical physics.

id: b-boltzmann-shannon-entropy
title: >
  Boltzmann's entropy S = k_B ln W and Shannon's entropy H = −Σ p_i log p_i are
  formally identical — thermodynamic entropy IS the Shannon information entropy of
  the macroscopic probability distribution over microstates.
status: established
fields:
  - statistical-mechanics
  - information-theory
  - thermodynamics
bridge_claim: >
  Boltzmann's entropy S = k_B ln W (W = number of equally probable microstates)
  and Shannon's entropy H = −Σ p_i log p_i (probability distribution over messages)
  are the same mathematical object up to the Boltzmann constant k_B and a factor of
  ln 2 (bit vs nat). The equivalence S = k_B ln 2 · H holds exactly when the
  microstate probability distribution is uniform.

  Jaynes (1957) showed the connection is not coincidental: the correct way to do
  statistical mechanics is to apply the principle of maximum entropy (MaxEnt) — select
  the probability distribution over microstates that maximizes Shannon entropy subject
  to known macroscopic constraints (energy, volume, particle number). This derivation
  recovers all of equilibrium statistical mechanics from information theory alone,
  without invoking ergodicity or time-averaging.

  The bridge implies that statistical mechanics IS Bayesian inference about physical
  systems: the macroscopic thermodynamic state is the least-biased inference given
  available macroscopic information. The second law of thermodynamics becomes the
  statement that our information about a system's microstate decreases over time (or
  equivalently, that the entropy of our probability distribution increases as
  correlations spread beyond our observational resolution).
translation_table:
  - field_a_term: Boltzmann entropy S = k_B ln W
    field_b_term: Shannon entropy H = −Σ p_i log p_i (uniform distribution)
    note: "S = k_B ln 2 · H; differ only by units (joules/kelvin vs bits)"
  - field_a_term: number of microstates W consistent with macrostate
    field_b_term: number of distinguishable messages of a given probability
    note: Same combinatorial object — Boltzmann's W is Shannon's code length exponent
  - field_a_term: thermodynamic equilibrium (maximum entropy state)
    field_b_term: maximum entropy distribution (MaxEnt principle)
    note: Jaynes showed equilibrium statistical mechanics = MaxEnt inference
  - field_a_term: partition function Z = Σ exp(−E_i / k_B T)
    field_b_term: moment generating function of the energy distribution
    note: Z encodes all thermodynamic information as a Laplace transform
  - field_a_term: free energy F = −k_B T ln Z
    field_b_term: log partition function (cumulant generating function)
    note: Variational free energy = KL-divergence in variational Bayes
related_unknowns:

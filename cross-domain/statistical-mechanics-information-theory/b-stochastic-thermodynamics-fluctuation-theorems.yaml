id: b-stochastic-thermodynamics-fluctuation-theorems
title: >
  Fluctuation theorems (Crooks, Jarzynski) connect nonequilibrium work distributions
  to equilibrium free energy differences, bridging stochastic thermodynamics and
  information theory through the mathematical identity between entropy production
  and relative entropy (KL divergence).
status: established
fields:
  - statistical-physics
  - information-theory
  - thermodynamics
bridge_claim: >
  The Crooks fluctuation theorem exp(W/kT) = exp(DeltaF/kT) * P_R(-W)/P_F(W) and
  the Jarzynski equality <exp(-W/kT)> = exp(-DeltaF/kT) establish that entropy
  production in nonequilibrium processes equals the KL divergence between forward
  and time-reversed trajectory probability distributions, making irreversibility
  quantitatively equivalent to information-theoretic distinguishability of time-reversed
  processes and linking Maxwell's demon to Landauer's erasure principle.
translation_table:
  - field_a_term: entropy production sigma (thermodynamics)
    field_b_term: KL divergence D_KL(P_F || P_R) between forward/reverse trajectories
    note: Irreversibility equals the information-theoretic distinguishability of time's arrow
  - field_a_term: free energy difference DeltaF (thermodynamics)
    field_b_term: log ratio of partition functions (statistical mechanics / information theory)
    note: Jarzynski equality recovers DeltaF from nonequilibrium work measurements
  - field_a_term: Landauer erasure cost kT ln 2 per bit (thermodynamics)
    field_b_term: minimum thermodynamic cost of information erasure (information theory)
    note: Information erasure requires entropy production; connects Maxwell's demon to thermodynamics
  - field_a_term: fluctuation theorem ratio P_F(W)/P_R(-W) (thermodynamics)
    field_b_term: likelihood ratio / Bayes factor (information theory)
    note: The Crooks relation is a statistical likelihood ratio for thermodynamic work fluctuations
related_unknowns:
  - u-fluctuation-theorem-biological-motors
related_hypotheses:
  - h-landauer-limit-biological-computation
cross_pollination_opportunities:
  - Using Jarzynski equality in computational biology to compute protein folding free energies from nonequilibrium pulling simulations
  - Applying fluctuation theorem analysis to biological molecular motors (kinesin, ATP synthase) to measure entropy production in living cells
communication_gap: >
  Physicists developing stochastic thermodynamics and information theorists studying
  thermodynamic limits of computation arrived at identical mathematics through
  different routes; the Crooks-Jarzynski-Landauer connection is recognized in
  statistical physics but not widely known in information theory or computer science
  communities where thermodynamic limits of computation are actively debated.
last_reviewed: "2026-05-07"
references:
  - doi: "10.1103/PhysRevE.60.2721"
    note: Crooks (1999) - entropy production fluctuation theorem and Jarzynski equality
  - doi: "10.1103/PhysRevLett.78.2690"
    note: Jarzynski (1997) - nonequilibrium equality for free energy differences
  - doi: "10.1038/nature10872"
    note: Berut et al. (2012) - experimental verification of Landauer's principle

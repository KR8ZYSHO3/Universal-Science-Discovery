id: b-optogenetics-neural-circuit-control
title: >
  Optogenetics bridges biology and engineering: viral delivery of algal channelrhodopsin-2
  and archaeal halorhodopsin to specific neuron types enables millisecond-precision
  optical control of neural circuits, culminating in the first human vision restoration
  trial in 2021.
status: established
fields:
  - biology
  - engineering
  - neuroscience
  - biotechnology
  - gene-therapy
bridge_claim: >
  Optogenetics (Boyden & Deisseroth 2005) uses light-gated ion channels from
  microorganisms to control neural activity with millisecond precision. Engineering
  components: (1) Actuators: channelrhodopsin-2 (ChR2, from Chlamydomonas reinhardtii)
  Î“Ă‡Ă¶ blue light (470 nm) opens non-selective cation channel Î“ĂĄĂ† NaÎ“ĂĽâ•‘/KÎ“ĂĽâ•‘ influx Î“ĂĄĂ†
  depolarization Î“ĂĄĂ† action potential. Halorhodopsin (NpHR) Î“Ă‡Ă¶ yellow light (580 nm)
  pumps ClÎ“ĂĽâ•— inward Î“ĂĄĂ† hyperpolarization Î“ĂĄĂ† silence. (2) Delivery: AAV (adeno-associated
  virus) vectors with cell-type-specific promoters Î“Ă‡Ă¶ CaMKIIâ•¬â–’ for glutamatergic neurons,
  GAD1/2 for GABAergic neurons, Th for dopaminergic. AAV9 crosses the blood-brain
  barrier; AAV-PHP.eB achieves whole-brain transduction after IV injection. (3)
  Control: fiber optic implants (multimode fiber, 200 â•¬â•ťm) deliver light to
  specific brain regions; patterned stimulation via DMD or SLM achieves spatial
  multiplexing. Chemogenetics (DREADDs Î“Ă‡Ă¶ Designer Receptors Exclusively Activated
  by Designer Drugs): hM3Dq (Gq-coupled, activating) and hM4Di (Gi-coupled, inhibiting)
  mutant muscarinic receptors activated by clozapine-N-oxide (CNO) Î“Ă‡Ă¶ non-invasive
  but slow (minutes) vs. optogenetics (ms). Applications: basolateral amygdala
  stimulation drives fear memory; VTA dopamine neuron activation drives reward;
  DBS-like striatal stimulation modulates movement. First human trial (Sahel 2021,
  Nat Med): AAV-ChrimsonR delivery to retinal ganglion cells in retinitis pigmentosa
  Î“Ă‡Ă¶ patient partially restored vision (detected motion and objects).

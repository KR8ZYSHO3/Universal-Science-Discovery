cross_pollination_opportunities:
  - >
    Exoskeleton impedance control: use Hill-equation muscle models to design
    impedance controllers for lower-limb exoskeletons that feel transparent to
    the user — match the mechanical impedance of the exoskeleton to the biological
    limb's Thevenin equivalent impedance as a function of muscle activation state.
  - >
    Muscle fatigue prediction: extend the cross-bridge kinetic model to accumulate
    Pi and ADP as fatigue metabolites, reducing force and v_max; validate against
    force-velocity measurements during sustained exercise; apply to ergonomic
    assessment of repetitive industrial tasks.
  - >
    High-density EMG decomposition for BCI: use blind source separation (ICA, convolutive
    models) to decompose surface EMG into individual motor unit spike trains;
    decode intended force from spike rates using the size principle; implement
    real-time prosthetic hand control with individual finger dexterity.
communication_gap: >
  Muscle physiology is taught in biomedical science with emphasis on biochemistry
  (cross-bridge kinetics, excitation-contraction coupling) and rarely connected to
  engineering control theory. Robotics engineers who design actuators do not typically
  study Hill equations or Henneman's size principle. Rehabilitation engineers who
  build exoskeletons and prosthetics often use simplified muscle models without
  connecting to the full neuromuscular control hierarchy.

cross_pollination_opportunities:
  - >
    Control theory tools (Bode plots, Nyquist stability criterion) can be
    applied to genetic feedback circuits to predict oscillation onset and
    stability margins before constructing them — translating decades of
    control engineering know-how directly to synthetic biology design.
  - >
    Machine learning for genetic circuit design: training models on iGEM
    registry performance data to predict circuit behavior from sequence
    features — a transfer of computational tools from deep learning to
    synthetic biology that could dramatically reduce the design-build-test
    cycle time.
communication_gap: >
  Electrical engineers and molecular biologists study in separate departments
  with different mathematical training — engineers use Laplace transforms and
  Bode plots while biologists use differential equations and gene expression
  assays. Synthetic biology bridged this gap at the level of design metaphors
  (parts, devices, systems) but the quantitative transfer of control theory
  tools (e.g., Bode analysis of genetic circuits) remains limited. Retroactivity
  is known in the field but rarely quantified in published synthetic biology
  papers, limiting composability of published devices.

cross_pollination_opportunities:
  - Design anti-biofilm surfaces using knowledge of colloidal stability (electrostatic/steric repulsion)
  - Engineer synthetic quorum-sensing-inspired self-assembly in colloidal systems
  - Biofilm-based living materials with programmable structure via synthetic biology
communication_gap: >
  Microbiology and materials science operate in separate journals and conferences. The language
  of free-energy landscapes and phase diagrams is native to materials science but rarely applied
  formally to bacterial ecology. Funding structures rarely bridge NIH (biology) and NSF-DMR
  (materials).

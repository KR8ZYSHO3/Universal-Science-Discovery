id: b-biofilm-self-assembly
title: Bacterial biofilm formation via quorum sensing is a chemical-order-parameter phase transition governed by the same self-assembly mathematics as colloidal and block-copolymer nanostructure assembly
status: established
fields:
  - biology
  - engineering
bridge_claim: >
  Bacterial biofilm formation is a phase transition from planktonic (disordered) to biofilm
  (structured) states triggered when autoinducer concentration (N-acyl homoserine lactones)
  crosses a critical threshold — an order parameter analogous to those governing colloidal
  particle self-assembly and block copolymer microphase separation. In all three systems,
  a dilute, disordered phase spontaneously organises into a structured aggregate when an
  intensive variable (chemical concentration, volume fraction, chi parameter) exceeds a
  critical value. The free-energy landscape, nucleation kinetics, and pattern formation
  equations are mathematically identical. Engineering applications span anti-biofilm surfaces,
  biofilm bioreactors, and living materials designed by analogy with synthetic self-assembly.
translation_table:
  - field_a_term: autoinducer concentration
    field_b_term: order parameter (volume fraction, chi·N)
    note: Critical threshold triggers phase transition in both biological and synthetic systems
  - field_a_term: quorum sensing threshold
    field_b_term: spinodal / binodal decomposition point
    note: Both define the boundary between stable disordered and structured phases
  - field_a_term: biofilm matrix (EPS)
    field_b_term: self-assembled nanostructure (micelle, lamella)
    note: Emergent ordered structures that appear above threshold
  - field_a_term: gene expression switch
    field_b_term: nucleation event
    note: Stochastic first passage triggering ordered-phase growth
related_unknowns:

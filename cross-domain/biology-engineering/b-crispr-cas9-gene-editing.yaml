cross_pollination_opportunities:
  - >
    Protein engineering (directed evolution, AlphaFold) applied to Cas9 orthologs
    could map the PAM-recognition loop to engineer compact Cas9 variants (SaCas9,
    CjCas9) with alternative PAM requirements — covering the 30% of disease-relevant
    loci inaccessible to SpCas9 NGG-PAM. This is a protein engineering problem
    requiring structural biology + combinatorial screening methods.
  - >
    Prime editing efficiency is limited by competition between the 3′ flap
    (desired edit) and the 5′ flap (original sequence) — resolved by the endogenous
    flap endonuclease FEN1. Engineering the pegRNA to recruit FEN1 or using
    PE5max + MLH1 dominant negative (PE6) could push HDR-free editing to >50%
    in therapeutic targets, requiring synthetic biology + protein engineering co-design.
communication_gap: >
  CRISPR research spans microbiology (discovery), structural biology (mechanism),
  protein engineering (optimization), clinical medicine (translation), and bioethics
  (governance) — communities with largely separate publication venues (Nature, Science,
  Cell, NEJM, Nature Biotech) and conferences. The 2018 He Jiankui affair (germline
  editing) has further siloed basic researchers from clinical translation due to
  regulatory uncertainty. Engineering principles (off-target scoring, delivery vehicle
  design) are developed by biotech companies and often not published in peer-reviewed
  literature, creating a science-industry knowledge gap.

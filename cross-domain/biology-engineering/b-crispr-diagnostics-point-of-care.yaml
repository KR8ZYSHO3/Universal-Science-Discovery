cross_pollination_opportunities:
  - "Integrate SHERLOCK into wearable microfluidic sensors for continuous environmental pathogen monitoring (water, air)"
  - "Apply CRISPR diagnostics to non-infectious disease: liquid biopsy detection of cancer-associated mutations in circulating cell-free DNA at attomolar concentrations"
  - "Develop CRISPR-based food safety testing (E. coli O157, Salmonella) deployable at the farm or abattoir without laboratory infrastructure"

communication_gap: >
  The CRISPR diagnostics community sits at the intersection of molecular biology,
  bioengineering, and global health — communities that rarely design research together.
  The technology was developed primarily in academic research labs (Doudna/Collins)
  and required pandemic urgency (COVID-19) to accelerate translation into point-of-
  care products. Regulatory approval pathways for nucleic acid diagnostics are
  complex and slow; many CRISPR diagnostic advances remain in research stage while
  inferior PCR-based tests dominate clinical practice.


cross_pollination_opportunities:
  - >
    Single-molecule calorimetry: combining optical tweezers (measuring work W
    per pulling cycle) with fluorescence (measuring ΔG_fold) provides the most
    direct test of the Jarzynski equality in biological macromolecules, and
    enables free energy landscape reconstruction for proteins and RNA without
    equilibrium experiments.
  - >
    Cancer thermodynamics: measuring entropy production rate σ̇ in proliferating
    vs. quiescent cells via microcalorimetry, combined with metabolic flux analysis
    (¹³C-tracing of metabolite flows), would test whether cancer cells operate
    further from equilibrium (higher σ̇) than normal cells — a physical hallmark
    of malignancy complementing the Warburg effect.
communication_gap: >
  Nonequilibrium statistical mechanics developed within physics (Onsager, Prigogine,
  Jarzynski, Crooks) with publications in Physical Review Letters and Journal of
  Chemical Physics. Biochemists and cell biologists studying metabolism rarely
  engage with NESM literature, even though metabolism is paradigmatically the
  phenomenon NESM was designed to describe. The biophysics community (Bustamante,
  Liphardt) has bridged this gap for single molecules, but NESM has not penetrated
  cellular metabolism or systems biology at the quantitative level.

cross_pollination_opportunities:
  - >
    Synthetic ECM hydrogels with tunable stiffness gradients (polyacrylamide,
    GelMA) now allow recapitulation of the tumour mechanical microenvironment
    in vitro. Combining TFM with spatial transcriptomics would map gene expression
    as a function of local mechanical stress within a single tumour organoid —
    a direct test of whether stiffness gradients drive spatial heterogeneity of
    tumour phenotype.
  - >
    Active inference frameworks from theoretical neuroscience (free-energy
    minimisation) may provide a formal description of how cells "decide" to
    migrate based on mechanical cues — connecting mechanobiology to
    predictive-coding theories of cellular behaviour.
communication_gap: >
  Mechanobiology sits at the intersection of soft-matter physics, biophysics, and
  cell biology — three communities with distinct journals (Physical Review Letters,
  Biophysical Journal, Cell) and funding silos (NSF Physics, NIH Cell Biology).
  Physicists model cells as active gels but rarely track specific signalling pathways.
  Cell biologists measure YAP/TAZ but rarely solve the elasticity equations.
  The field only cohered after Engler et al. (2006) and Dupont et al. (2011) made
  the mechanical→biochemical link experimentally clear. Cancer biology has been
  slow to incorporate stiffness as a first-class parameter alongside genetics.

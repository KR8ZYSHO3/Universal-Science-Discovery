id: b-mechanosensing-piezoelectric
title: Biological tissues (bone, collagen, DNA) exhibit piezoelectric properties bridging solid-state physics crystal mechanics to mechanobiology and Wolff's law of bone remodelling
status: proposed
fields:
  - physics
  - biology
bridge_claim: >
  Piezoelectricity — the generation of electrical polarisation by mechanical stress and vice
  versa — appears in many biological tissues including bone, collagen, DNA, and some cell
  membranes. The piezoelectric tensor d_ijk relates stress σ_jk to polarisation P_i:
  P_i = d_ijk σ_jk. Bone exhibits measurable piezoelectric coefficients (Fukada & Yasuda 1957),
  and Bassett & Becker (1962) confirmed that mechanical loading generates streaming potentials
  in bone that may guide cellular responses. Wolff's law (1892) — that bone adapts its
  microarchitecture to mechanical load over time — may involve piezoelectric mechanosensing
  by osteocytes, converting mechanical stress into electrochemical signals that regulate
  osteoblast and osteoclast activity. This bridges solid-state physics (piezoelectric crystal
  theory, symmetry group analysis) to mechanobiology (cellular mechanosensing, bone remodelling).
  The same physics applies to piezoelectric biopolymer engineering for implants and energy
  harvesting.
translation_table:
  - field_a_term: piezoelectric tensor d_ijk
    field_b_term: mechanosensitive coupling coefficient
    note: Same mathematical object; biophysics uses it to relate mechanical input to biological signal output
  - field_a_term: crystal symmetry group (non-centrosymmetric)
    field_b_term: structural anisotropy of collagen fibrils
    note: Piezoelectricity requires broken inversion symmetry — collagen handedness provides this
  - field_a_term: streaming potential / piezoelectric voltage
    field_b_term: mechanosensory signal to osteocytes
    note: The electrical signal generated by mechanical loading is the proposed biological transducer
  - field_a_term: converse piezoelectric effect (E → strain)
    field_b_term: electrically stimulated bone growth (clinical use)
    note: Applied electric fields promote bone healing — converse piezo effect in biological tissue
related_unknowns:
  - u-piezoelectric-biopolymers
  - u-self-healing-polymer-mechanism
related_hypotheses:
  - h-bone-piezoelectric-signal-drives-wolff-law-remodelling
cross_pollination_opportunities:
  - Design piezoelectric biopolymer scaffolds for bone regeneration using crystal physics
  - Use piezoelectric sensors to measure cellular mechanosensing signals in vitro
  - Engineer energy-harvesting implants using biological piezoelectric materials
communication_gap: >
  Solid-state physicists working on piezoelectrics and biologists studying mechanosensing operate
  in separate communities. Clinical bone biology rarely applies piezoelectric tensor formalism.
  The biophysical field of mechanobiology has grown substantially but often lacks the mathematical
  rigour of solid-state physics treatment of piezoelectric phenomena.

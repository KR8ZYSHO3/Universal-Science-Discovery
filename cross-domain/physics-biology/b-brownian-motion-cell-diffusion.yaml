related_hypotheses:
  - h-cytoplasm-glass-transition
cross_pollination_opportunities:
  - >
    Glass-transition physics has developed quantitative theories for how viscosity
    diverges near T_g (Vogel-Fulcher-Tammann equation). Applying these to the
    cytoplasm would give quantitative predictions for how diffusion changes during
    cellular stress responses (hyperosmotic shock, heat shock) that cell biologists
    could test by single-molecule imaging.
  - >
    Reaction-diffusion equations (Turing 1952) assume normal Fickian diffusion.
    Replacing Fickian D with anomalous subdiffusion changes the stability criteria
    for Turing patterns in morphogenesis — a prediction that could be tested in
    developing embryos where cytoplasmic properties are spatially heterogeneous.
communication_gap: >
  Statistical physicists who study glass transitions rarely read cell biology journals,
  and cell biologists who measure diffusion by FRAP or FCS rarely connect their
  η estimates to glass-transition physics. The anomalous diffusion literature is split
  between physics journals (Phys Rev Lett) and biophysics journals (Biophys J) with
  little cross-citation.

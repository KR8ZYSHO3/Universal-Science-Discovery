cross_pollination_opportunities:
  - >
    Active matter phase diagrams (density, noise, activity level) could be mapped to
    cancer invasion: metastatic cells show increased motility (higher self-propulsion)
    and altered adhesion (alignment rule changes). The motility-induced phase separation
    (MIPS) phenomenon in active matter predicts cluster formation at intermediate activity —
    potentially modelling early tumour nodule formation.
  - >
    Programmable active matter using synthetic biology (engineered bacteria with quorum-
    sensing-controlled alignment) could test Vicsek model predictions at controlled
    parameters — bridging theory, simulation, and experiment in one system.
communication_gap: >
  The Vicsek model emerged from statistical physics (Physical Review Letters); collective
  animal behaviour emerged from ethology and ecology (Nature, Behavioral Ecology). For
  a decade after Vicsek (1995), the two literatures developed independently. Biologists
  studying bird flocking (Potts 1984, empirical) and physicists studying flocking models
  rarely cited each other. The connection was bridged partly by Couzin et al. (2002,
  2005) who brought physics methods to biological collective motion data. The active
  nematics connection to cytoskeleton was developed primarily by the Cambridge group
  (Marchetti, Dogic) and required synthesising liquid crystal physics and cell biology
  — communities that almost never interact.

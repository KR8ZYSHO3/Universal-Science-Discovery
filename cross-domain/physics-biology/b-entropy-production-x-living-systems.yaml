id: b-entropy-production-x-living-systems
title: Entropy production ↔ Living systems — life as dissipative structure
status: proposed
fields:
- physics
- biology
bridge_claim: Living organisms are dissipative structures (Prigogine) that maintain low internal entropy by exporting entropy
  to the environment; the minimum entropy production theorem and maximum entropy production principle both apply to biological
  homeostasis, connecting non-equilibrium thermodynamics to metabolism and evolution.
translation_table:
- field_a_term: entropy production rate σ (non-equilibrium thermodynamics)
  field_b_term: metabolic heat dissipation in living cells (biology)
  note: Cells maintain low internal entropy by exporting σ via heat and waste products
- field_a_term: dissipative structure (self-organized, far-from-equilibrium)
  field_b_term: living organism maintaining homeostasis against equilibrium
  note: 'Prigogine''s 1977 Nobel work: life is thermodynamically sustained by throughput'
- field_a_term: minimum entropy production principle (near-equilibrium steady state)
  field_b_term: metabolic rate set-point regulation in basal metabolism
  note: Onsager reciprocal relations predict minimum entropy production at homeostasis
- field_a_term: maximum entropy production principle (far-from-equilibrium selection)
  field_b_term: evolutionary selection for higher metabolic throughput
  note: MEP principle may explain why complex life dissipates more energy per unit mass
cross_pollination_opportunities:
- Apply non-equilibrium thermodynamic entropy production rates as quantitative fitness proxies in evolutionary biology — organisms
  with higher sustainable σ may outcompete in energy-rich environments.
- 'Use dissipative structure theory to model the origin of life: self-replicating RNA networks as entropy-producing autocatalytic
  cycles that emerge at the right thermodynamic gradient.'
communication_gap: Prigogine's Nobel work (1977) was developed in physical chemistry and largely ignored by mainstream biology
  for decades; evolutionary biology and ecology developed metabolic scaling laws (West-Brown-Enquist 1997) independently without
  reference to the dissipative structure framework, leading to parallel literatures that have only recently begun to converge.

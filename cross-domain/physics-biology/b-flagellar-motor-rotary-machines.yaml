cross_pollination_opportunities:
  - >
    Synthetic biology motor design: using flagellar motor components as a scaffold
    for artificial rotary nanomachines. The torque-generating mechanism (MotA/MotB
    proton channel coupled to FliG rotor) could be repurposed for driving synthetic
    cargo or generating electrical current. Structural understanding from cryo-ET
    enables rational design.
  - >
    Perfect adaptation via integral feedback is a general design principle for
    biological and engineered systems. The CheR/CheB methylation circuit is a
    natural implementation of proportional-integral (PI) control; applying this
    insight to synthetic gene circuits could improve robustness of engineered
    cellular systems.
communication_gap: >
  Physicists who study the BFM as a mechanochemical engine (torque-speed, efficiency,
  noise) rarely engage with the systems biology literature on chemotaxis network
  design (integral feedback, robustness). Cell biologists who study chemotaxis
  signaling rarely engage with the biophysics of motor mechanics. The BFM is a
  rare case where molecular biology, biophysics, and systems biology all converge.

id: b-flagellar-motor-rotary-machines
title: >
  The bacterial flagellar motor is a biological rotary machine powered by proton
  motive force — identical in energy source to ATP synthase — that generates 1270 pN·nm
  stall torque, rotates at 1700 Hz, and implements perfect chemotactic adaptation
  via CheY-P switching of CCW/CW rotation.
status: established
fields:
  - physics
  - biology
  - biophysics
  - microbiology
  - systems-biology
bridge_claim: >
  The bacterial flagellar motor (BFM) is a rotary molecular machine that directly
  converts electrochemical energy (proton motive force, PMF = ΔΨ + ΔpH) into
  mechanical rotation — the same energy source as ATP synthase (Bridge 352) but
  used for locomotion rather than ATP synthesis. Structure: the 45 nm rotor
  (MS ring: FliF; C ring: FliG/FliM/FliN — the switch complex) rotates within
  the outer membrane. Stator units (MotA/MotB ion channels) are embedded in the
  peptidoglycan layer and anchored firmly; protons flow through MotB channels,
  driving conformational change in MotA that exerts torque on FliG. Torque T ≈ 1270
  pN·nm at stall (25°C, E. coli); rotation rate up to 1700 Hz (Vibrio alginolyticus).
  The torque-speed relationship: constant torque in the low-load regime (near zero
  torque), declining linearly at high speed — a characteristic of mechanochemical
  coupling. Chemotaxis: the two-component system CheA/CheY — CheA autophosphorylates
  → phosphorylates CheY → CheY-P diffuses and binds FliM in the C-ring → causes
  CW switch → tumble. Without CheY-P: CCW rotation → smooth run. Perfect adaptation:
  CheR methylates and CheB demethylates MCPs (methyl-accepting chemotaxis proteins) —
  the steady-state CheY-P is independent of background ligand concentration (integral
  feedback). The BFM is studied by single-molecule bead assay: a 1 μm bead attached
  to a truncated flagellum (tethered cell) directly visualizes torque-speed curve.
translation_table:
  - field_a_term: proton motive force (PMF = ΔΨ + (RT/F)ΔpH)
    field_b_term: electrochemical free energy driving rotor; thermodynamic "fuel"
    note: same energy currency as ATP synthase; efficiency approaches thermodynamic limit at low speed
  - field_a_term: stall torque T ≈ 1270 pN·nm
    field_b_term: maximum mechanical work per revolution (W = T·2π ≈ 8000 pN·nm)
    note: pN·nm scale is typical of molecular machines; compare to myosin (few pN·nm)
  - field_a_term: CheY-P (phosphorylated response regulator)
    field_b_term: allosteric switch signal binding the C-ring (FliM)
    note: chemical signal → mechanical switching (CCW/CW) — the molecular logic gate of chemotaxis
  - field_a_term: MCP methylation / demethylation (CheR/CheB)
    field_b_term: integral feedback control — steady-state output independent of input level
    note: perfect adaptation is a mathematical property of integral feedback (Alon 2007)
  - field_a_term: bead assay (tethered rotation)
    field_b_term: single-molecule biophysics — directly measures torque-speed curve
    note: optically trapped bead allows viscous load variation; maps full mechanical output

id: b-flagellar-motor-rotary-mechanics
title: >
  The bacterial flagellar motor is a nanoscale rotary machine applying the same
  electrochemical-to-mechanical transduction principles as macroscopic electric motors:
  the proton motive force (PMF = Δψ + 2.3RT/F × ΔpH) drives torque generation at ~1000
  pN·nm via stator-rotor ion channel mechanics, rotating at up to 1700 rpm.
status: established
fields:
  - physics
  - biology
  - biophysics
  - nanotechnology
  - microbiology
bridge_claim: >
  The bacterial flagellar motor (BFM) converts the proton motive force (PMF) — the
  electrochemical gradient across the inner membrane — into mechanical rotation. PMF =
  Δψ - (RT/F)ΔpH where Δψ is the membrane potential (~-100 to -170 mV) and ΔpH is
  the pH gradient. The stator complex (MotA/MotB, or PomA/PomB in sodium-driven motors)
  forms a proton channel; proton translocation drives conformational changes that generate
  a power stroke on the rotor (FliM/FliN/FliG C-ring). Torque T ~ 1000-4600 pN·nm
  (species-dependent); rotation rate up to 1700 rpm (E. coli) to ~100,000 rpm (V. alginolyticus).
  The same physical principle governs macroscopic electric motors: charge carriers
  (protons/electrons) moving through a potential gradient generate mechanical torque.
  F₁-ATPase (ATP synthase motor) rotates at ~100 rpm generating ~40 pN·nm torque — the
  same mechanism in reverse generates ATP from PMF. The switching mechanism (CW↔CCW
  controlled by CheY-P binding to FliM) creates the run-and-tumble chemotaxis pattern
  modeled as biased random walks in chemical gradient fields.
translation_table:
  - field_a_term: proton motive force PMF = Δψ + 2.3RT/F × ΔpH (kJ/mol)
    field_b_term: voltage across electric motor armature × charge carrier flux
    note: PMF is directly analogous to EMF in Faraday's law of induction; units differ but physics identical
  - field_a_term: stator ion channel (MotA/MotB) proton translocation
    field_b_term: electromagnetic stator winding driving rotor torque
    note: ion current through the stator is the biological analog of current in a motor coil
  - field_a_term: C-ring rotor (FliM/FliN/FliG) — 26-34 FliM subunits
    field_b_term: permanent magnet rotor in synchronous motor
    note: the discrete subunit positions create quantal torque steps of ~1 pN·nm per subunit
  - field_a_term: stator unit number (1-11 MotA/MotB complexes, adaptive)
    field_b_term: number of active motor coil pairs (power scaling)
    note: BFM torque scales linearly with stator number — biological gear shifting
  - field_a_term: switching rate (CheY-P controlled CW↔CCW flip)
    field_b_term: direction reversal in a DC motor via commutator
    note: CheY-P allosterically binds FliM to shift C-ring conformation, reversing rotation direction
related_unknowns:
  - u-optimal-stopping-biological-decisions
cross_pollination_opportunities:
  - >
    Synthetic biology: the BFM has been studied as a model for building synthetic rotary
    machines. The stator-rotor coupling mechanism — physical understanding of which ion
    binding sites contact the rotor — has guided design of artificial molecular motors.
    Noji et al. (1997) directly visualized F₁-ATPase rotation using an actin filament as
    a propeller, making the physics of biological motors experimentally measurable.
  - >
    Medical applications: H. pylori and V. cholerae (pathogens) use sodium-driven BFMs;
    inhibiting the BFM stator (MotA/MotB) is a novel antibiotic target. Physical
    understanding of the power stroke mechanism identifies specific binding sites for
    small-molecule inhibitors that would not appear in a purely biological analysis.
communication_gap: >
  Physicists studying molecular motors (Evans, Bustamante, Bustamante) and microbiologists
  studying chemotaxis (Adler, Berg, Brown) developed largely separate literatures.
  Berg & Anderson (1973) proposed the rotary motor mechanism simultaneously with Howard
  Berg's own chemotaxis work; the connection to electromechanical principles was made
  explicit by Berry (2003) but remains underemphasized in microbiology courses. Motor
  protein biophysics textbooks rarely compare BFMs to macroscopic electric motors.

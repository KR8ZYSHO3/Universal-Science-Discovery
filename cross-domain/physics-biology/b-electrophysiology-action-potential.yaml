cross_pollination_opportunities:
  - >
    Axon diameter optimisation: apply cable-equation theory to predict the
    optimal myelination strategy for neuronal arbors with known branching geometry;
    test predictions against electron microscopy measurements of g-ratio
    (myelin thickness / axon diameter) in different brain regions and species.
  - >
    Computational neuroprosthetics: use HH-based models to predict the minimum
    electrical stimulation parameters (pulse width, amplitude) needed for reliable
    AP generation in specific fibre types without damaging current densities;
    apply to cochlear implant, deep brain stimulation, and retinal prosthetic design.
  - >
    Disease mechanism prediction: multiple sclerosis attacks myelin; use the cable
    equation to predict conduction velocity as a function of demyelination extent,
    and compare with clinical evoked potential latencies to create a quantitative
    biomarker of lesion severity.
communication_gap: >
  Electrophysiology is taught primarily in neuroscience and biophysics programmes;
  the mathematical equivalence to cable theory and nonlinear dynamical systems is
  rarely emphasised to biologists, who learn the HH model phenomenologically.
  Electrical engineers who know cable theory and transmission lines rarely connect
  their expertise to axonal conduction. The myelination optimality argument (minimise
  wiring cost for given velocity) is known in theoretical neuroscience but seldom
  taught to neurologists or MS researchers.

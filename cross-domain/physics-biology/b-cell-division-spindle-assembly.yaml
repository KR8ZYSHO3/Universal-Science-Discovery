cross_pollination_opportunities:
  - "Develop small-molecule Aurora B activators as anti-cancer agents — enhancing error correction to increase mitotic fidelity in chromosomally unstable tumours"
  - "Apply polymer physics models of MT dynamics to design synthetic self-organising spindle-like structures from purified components for bottom-up cell biology"
  - "Use single-molecule force spectroscopy to measure kinetochore-MT binding energies and test quantitative models of SAC signal amplification"

communication_gap: >
  The physics of MT dynamics (stochastic modelling, force generation, viscoelastic
  spindle mechanics) is developed by biophysicists while the molecular mechanisms of
  the SAC and Aurora B kinase are studied by cell biologists. These communities
  publish in different journals (Biophys J vs J Cell Biol) and use different
  experimental tools (laser ablation, laser trapping vs. biochemical reconstitution,
  fluorescence imaging). Quantitative physical models of spindle function that
  incorporate molecular detail remain an active frontier requiring genuine cross-
  disciplinary collaboration.


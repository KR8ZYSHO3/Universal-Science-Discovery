cross_pollination_opportunities:
  - Use microfluidic osmotic clamps to measure single-cell AQP2 insertion kinetics
    in response to vasopressin with millisecond precision — physics-grade measurement
    of a biology-grade regulatory event
  - Apply Onsager reciprocal relations to coupled water-ion fluxes in epithelial
    cells to test whether KCC and NKCC operate near the thermodynamic efficiency limit
  - Design synthetic osmotic actuators (polymer vesicles with programmable AQP density)
    to test van't Hoff predictions in an engineered, cell-free system
  - Use cryo-ET to image aquaporin channel gating conformations under physiological
    osmotic stress, connecting atomic structure to macroscopic P_f values
communication_gap: >
  Physical chemists who work on membrane transport rarely read Cell Physiology
  journals; cell biologists who study RVD/RVI rarely consult the thermodynamics
  literature on osmotic pressure. The quantitative connection between the van't Hoff
  equation and cotransporter set-points is not taught in either physics or biology
  curricula. Agre's Nobel lecture explicitly noted that physicists and physiologists
  had been studying "the same thing" for decades without speaking to one another.

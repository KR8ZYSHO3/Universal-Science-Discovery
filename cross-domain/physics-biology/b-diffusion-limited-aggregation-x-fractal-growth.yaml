references:
  - doi: "10.1103/PhysRevLett.47.1400"
    note: "Witten & Sander (1981) - Diffusion-limited aggregation, a kinetic critical phenomenon; Phys Rev Lett 47:1400"
last_reviewed: "2026-05-07"

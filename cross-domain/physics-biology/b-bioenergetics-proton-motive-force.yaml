id: b-bioenergetics-proton-motive-force
title: >
  Mitchell's chemiosmotic hypothesis — proton electrochemical gradient (PMF ≈ 200 mV)
  across the inner mitochondrial membrane drives Boyer's rotary ATP synthase F₀F₁
  molecular motor, unifying thermodynamic free-energy transduction with nanoscale
  mechanical rotation in the universal energy currency of all life.
status: established
fields:
  - physics
  - biology
  - biophysics
  - thermodynamics
  - biochemistry
bridge_claim: >
  Mitchell (1961) proposed that the free energy of electron transport is stored not as
  a chemical intermediate but as a proton electrochemical gradient across the inner
  mitochondrial membrane: Δμ_H⁺ = FΔψ − 2.3RT·ΔpH (proton motive force, PMF ≈ 200 mV).
  The respiratory chain complexes act as proton pumps: Complex I (NADH dehydrogenase)
  pumps 4H⁺, Complex III (bc1 complex) pumps 4H⁺, and Complex IV (cytochrome c oxidase)
  pumps 2H⁺ per 2 electrons transferred to O₂. The resulting PMF drives ATP synthase.

  Boyer's binding-change mechanism (Nobel 1997): the F₁ catalytic domain cycles through
  three conformational states (open O, loose L, tight T) driven by rotation of the central
  γ-subunit. The F₀ domain is a rotary motor — H⁺ flux down the gradient drives c-ring
  rotation at ~100 Hz, which rotates the γ-subunit in F₁ and drives sequential ATP
  synthesis at the three β-subunits. Each 360° rotation synthesises 3 ATP, consuming
  ~10–14 H⁺. Walker's crystal structure (Nobel 1997) confirmed the asymmetric γ-subunit
  arrangement required by Boyer's mechanism.

  Thermodynamic efficiency: the free energy of ATP hydrolysis (ΔGATP ≈ 50–60 kJ/mol under
  physiological conditions) matches the PMF energy per ATP (n_H × F × PMF / N_ATP ≈ 54
  kJ/mol). Efficiency approaches the thermodynamic (Carnot-analog) limit for isothermal
  machines operating near equilibrium. The same PMF principle drives bacterial flagellar
  motors (10–1200 H⁺ per rotation), Na⁺-translocating ATP synthases in alkaliphiles, and
  chloroplast ATP synthase — making PMF the universal energy currency coupling principle
  of all life on Earth.
translation_table:
  - field_a_term: proton motive force Δμ_H⁺ = FΔψ − 2.3RT·ΔpH
    field_b_term: Gibbs free energy stored in the transmembrane electrochemical gradient
    note: the physics potential energy difference directly drives biological work
  - field_a_term: rotary electric motor (F₀ c-ring rotation by H⁺ flux)
    field_b_term: Boyer's F₀F₁ ATP synthase molecular motor
    note: first biological nanomachine directly visualised rotating by Noji et al. (1997)
  - field_a_term: Carnot efficiency limit for isothermal free-energy transducer
    field_b_term: near-unity efficiency of ATP synthase under physiological PMF
  - field_a_term: electromagnetic torque in electric motor
    field_b_term: PMF-driven torque on F₀ c-ring driving γ-subunit rotation
  - field_a_term: mechanical work output per cycle
    field_b_term: ATP molecules synthesised per full rotation (3 ATP / 360°)

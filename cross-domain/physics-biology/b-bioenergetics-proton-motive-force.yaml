cross_pollination_opportunities:
  - >
    Thermodynamic fluctuation theorems (Jarzynski equality, Crooks fluctuation theorem)
    apply to the single-molecule ATP synthase rotating in real time — experiments in
    Noji/Kinosita labs can test whether the molecular motor obeys non-equilibrium
    work theorems, connecting single-molecule biophysics to fluctuation thermodynamics.
  - >
    Biomimetic energy transduction: engineering artificial proton-gradient-driven
    nanomotors using F₀-inspired c-ring assemblies in synthetic lipid bilayers could
    create self-powered microfluidic devices — connecting biophysics design principles
    to MEMS engineering.
communication_gap: >
  Mitchell's 1961 proposal was initially rejected by biochemists who expected a
  chemical intermediate (the "squiggle" ~P). For 15 years, the chemiosmotic hypothesis
  was a minority view, debated primarily in biochemistry journals (Biochem J, BBA) with
  little engagement from physicists. The biophysical formalism (electrophysiology,
  membrane potential measurement) required electrode techniques from physiology. Boyer's
  rotary mechanism was doubted until Walker's structural confirmation and Noji's 1997
  direct visualisation of γ-subunit rotation — each in a different sub-community
  (solution biochemistry, X-ray crystallography, single-molecule fluorescence). The field
  still has a terminology gap: physicists use "electrochemical potential" and "torque";
  biochemists use "proton motive force" and "conformational change" for the same concept.

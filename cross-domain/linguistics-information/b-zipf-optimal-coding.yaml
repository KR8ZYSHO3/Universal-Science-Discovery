cross_pollination_opportunities:
  - >
    Information theory can predict the optimal Zipf exponent for a language
    channel with a given capacity ratio between speaker and listener. Testing
    this prediction across languages with different morphological complexity
    (synthetic vs. analytic) would provide a quantitative test.
  - >
    The Zipf distribution in neural spike trains can be analysed as an optimal
    code for sensory information — importing linguistic Zipf analysis methods
    into computational neuroscience to ask whether spike frequency distributions
    follow the same exponent as word frequencies in the same organism.
  - >
    Non-human animal vocalisation repertoires (birdsong, cetacean calls,
    primate alarm calls) that show Zipfian statistics can be analysed using
    the same information-theoretic framework to estimate the channel capacity
    of the communication system.

communication_gap: >
  Zipf (1949) worked in linguistics and did not use information theory, which
  was formalised by Shannon the year before. Mandelbrot (1953) made the
  connection explicit but his work appeared in a biophysics journal and was
  not widely read by linguists or information theorists. The modern integration
  (Piantadosi et al. 2011) appears in PNAS and is known in cognitive science
  but not universally recognised by information theorists as a direct
  confirmation of optimal coding. The vocabulary mismatch — "power law",
  "Zipf exponent", "rank-frequency plot" in linguistics vs. "source entropy",
  "code length", "mutual information" in information theory — maintains the
  separation.


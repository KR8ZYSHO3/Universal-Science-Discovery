id: b-trophic-cascades-network-motifs
title: >
  Trophic cascades in food webs are structurally predicted by the prevalence of tri-trophic chain and apparent competition network motifs: ecosystems with high frequencies of cascade-amplifying motifs exhibit stronger top-down regulation of primary production
status: proposed
fields:
  - ecology
  - network-science
bridge_claim: >
  Network motif analysis reveals that trophic cascade strength is not merely a function of predator biomass but of the topological prevalence of specific three- and four-node interaction patterns (tri-trophic chains, omnivory triangles, apparent competition modules) that either amplify or dampen top-down effects; this maps trophic cascade theory in ecology onto motif frequency statistics in network science, enabling quantitative prediction of cascade magnitude from food web graph properties.
translation_table:
  - field_a_term: "trophic level (ecology)"
    field_b_term: "topological distance from a basal resource node in a directed interaction graph (network science)"
    note: "Trophic level maps to graph-theoretic depth in the directed food web network"
  - field_a_term: "indirect top-down cascade (ecology)"
    field_b_term: "multi-hop path effect in a signed directed network (network science)"
    note: "Predator → prey → basal resource indirect suppression is a length-2 path in the network"
  - field_a_term: "trophic cascade strength (ecology)"
    field_b_term: "summed product of signed edge weights along tri-trophic chain motifs (network science)"
    note: "Cascade magnitude is proportional to the product of interaction strengths along dominant motif paths"
  - field_a_term: "omnivory / intraguild predation (ecology)"
    field_b_term: "triangle motif with a feed-forward and feedback edge (network science)"
    note: "Omnivory creates network cycles that typically dampen cascade strength"
communication_gap: >
  Ecologists study trophic cascades through field experiments and species removal studies while network scientists analyse motif distributions in abstract graphs; few studies explicitly quantify motif frequencies in real food webs and link them to empirically measured cascade strength.
cross_pollination_opportunities:
  - "Systematically computing motif frequency distributions across the Serengeti, Caribbean reef, and boreal forest food web databases and testing correlation with measured cascade indices"
  - "Using motif-based network null models to generate predictions for cascade recovery timelines after rewilding events (wolf reintroduction in Yellowstone)"

cross_pollination_opportunities:
  - "Applying network robustness metrics (node removal cascades) to predict which soil taxa are keystone species for nutrient cycling under land-use change"
  - "Using flow network maximum-entropy inference to reconstruct unmeasured soil food web links from isotopic data, mirroring methods in econometrics"
communication_gap: "Soil ecologists catalogue species and feeding interactions in labor-intensive mesofauna surveys while network scientists apply graph metrics to published matrices; a shared database of standardized soil food webs (comparable to FoodWeb 1.0) is lacking, impeding cross-system meta-analysis."

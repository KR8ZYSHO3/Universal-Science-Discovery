cross_pollination_opportunities:
  - "Apply network immunisation strategies (targeted vaccination of hub nodes) to invasive species management"
  - "Use financial network contagion models (Eisenberg-Noe, Acemoglu) to predict secondary extinction dynamics after species loss"
  - "Compute food web 'systemic risk' scores (analogous to DebtRank in finance) to identify the most dangerous species to lose"

communication_gap: >
  May (1973) introduced random graph theory to ecology in a landmark book, but
  most ecologists remained unfamiliar with network science until the early 2000s
  when Dunne, Williams and Martinez explicitly mapped food webs onto complex network
  theory. Financial network contagion modelling (Eisenberg-Noe 2001) developed
  independently with no awareness of the food web cascade literature. Both fields
  have since rediscovered each other's concepts but still rarely co-publish.


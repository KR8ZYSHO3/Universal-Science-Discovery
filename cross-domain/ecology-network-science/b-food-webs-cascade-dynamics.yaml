id: b-food-webs-cascade-dynamics
title: "Ecological food webs as directed networks — trophic cascade dynamics as network percolation"
status: established
fields:
  - ecology
  - network-science
  - graph-theory
  - conservation-biology
  - complexity-science

bridge_claim: >
  Ecological food webs are directed weighted networks where nodes are species and
  edges represent trophic interactions (energy flow from prey to predator).
  Network structural properties predict ecosystem stability and cascade dynamics.
  Connectance C = L/S² (number of links L over species² S²) is the network
  density. Trophic level (shortest path length from primary producers) is the
  network depth metric. Keystone species are nodes with high betweenness centrality
  — they lie on many shortest paths between other species, controlling energy flow
  disproportionate to their biomass. Removal of a keystone species triggers trophic
  cascade: secondary extinctions propagate through the network via percolation-like
  dynamics. Dunne et al. (2002) showed that food web robustness to species loss
  follows a percolation threshold: sequential deletion of most-connected species
  (hubs) triggers cascading collapse far earlier than random deletions — exactly
  as in scale-free network percolation (Albert-Barabási 2000). The analogy extends
  to financial contagion networks: systemically important financial institutions
  are keystone species; their removal triggers cascade defaults. The same network
  robustness mathematics governs both ecosystem collapse and financial crisis.


cross_pollination_opportunities:
  - >
    Identify the critical Gini threshold for health phase transitions empirically:
    plot age-adjusted mortality Gini vs income Gini across all US counties
    and OECD nations, test for a discontinuity or inflection point consistent
    with a phase transition. This analysis exists in fragments in the social
    epidemiology literature but has never been performed with bifurcation-detection
    tools (cusp catastrophe fitting, early-warning indicators in cross-sectional data).
  - >
    Apply poverty-trap bifurcation models to predict whether specific interventions
    (cash transfers, universal basic income, targeted healthcare) push a population
    from the high-inequality to the low-inequality stable equilibrium. Saddle-node
    bifurcation theory predicts that small interventions near the unstable equilibrium
    can trigger the full transition — identifying this "leverage point" is a welfare
    economics problem tractable with catastrophe theory tools.
  - >
    The Ising model social physics framework (Castellano et al.) predicts that
    health norms (smoking, diet, exercise) spread through social networks via
    the same contagion dynamics as opinions. Health behavior phase transitions
    (rapid community-wide adoption of a healthy norm above a network coupling
    threshold) can be modeled and targeted using the same tools as social tipping
    points, connecting social physics, behavioral economics, and public health.
communication_gap: >
  Health economics and statistical physics have no overlapping literature or
  conferences. Social epidemiology uses regression analysis and structural equation
  modeling; the idea that inequality-health relationships exhibit bifurcation
  structure has been discussed metaphorically (Wilkinson and Pickett) but never
  formalized with dynamical systems tools. Physicists studying social Ising models
  are unaware of the health-inequality literature; epidemiologists are unfamiliar
  with phase transition mathematics. Neither group routinely tests for discontinuous
  transitions or hysteresis in empirical data.

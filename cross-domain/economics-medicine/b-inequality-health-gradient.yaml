id: b-inequality-health-gradient
title: >
  Economic inequality dynamics (Pareto income distribution, poverty-trap
  bifurcations, Gini coefficient) predict population health phase transitions —
  the Gini coefficient functions as a control parameter for health outcome
  distributions in the same way temperature controls Ising model phase transitions.
status: proposed
fields:
  - health-economics
  - statistical-physics
  - epidemiology
  - social-medicine
  - economics
bridge_claim: >
  The relationship between economic inequality and population health is not
  linear — it exhibits threshold behavior consistent with a phase transition.
  At low Gini coefficients (high equality), mean income and public health spending
  are the dominant predictors of population health. Above a critical Gini threshold
  (~0.35-0.40), social trust collapses, chronic stress physiology is activated
  across the income distribution, and health outcomes decouple from mean wealth —
  mortality gradients steepen discontinuously, a hallmark of a phase transition
  in the health-inequality system.

  Statistical physics provides the framework: the Ising model on a social network
  where "spin" represents health status, and coupling strength is determined by
  social capital (trust, cooperation). As economic inequality increases, effective
  social coupling decreases, and the system undergoes a phase transition from
  a cooperative (high social capital, moderate inequality in health outcomes) to
  a disordered (low social capital, extreme health inequality) phase. The Gini
  coefficient is the control parameter, the health Gini the order parameter.

  Empirically, Wilkinson and Pickett's data across OECD countries shows near-
  discontinuous improvement in health outcomes (life expectancy, infant mortality,
  mental illness prevalence) as inequality falls below a threshold — consistent
  with proximity to a critical point. Poverty trap dynamics (high-inequality
  equilibria from which populations cannot escape by incremental intervention)
  are saddle-node bifurcations in the income-health feedback system.
translation_table:
  - field_a_term: Gini coefficient
    field_b_term: control parameter in health-inequality phase transition; proxy for social coupling strength
  - field_a_term: Pareto income distribution (power-law tail)
    field_b_term: power-law mortality gradient across socioeconomic quintiles; heavy tail of preventable deaths
  - field_a_term: poverty trap (stable low-income equilibrium)
    field_b_term: chronic disease trap — poor health reduces productivity, reducing income, worsening health
  - field_a_term: phase transition (ordered → disordered above T_c)
    field_b_term: health inequality phase transition above critical Gini — social trust collapse, mortality gradient steepening
  - field_a_term: Ising model social coupling J
    field_b_term: social capital (generalized trust, cooperative norms) mediating health through psychosocial pathways
  - field_a_term: order parameter (magnetization)
    field_b_term: population health Gini (distribution of life expectancy across income deciles)

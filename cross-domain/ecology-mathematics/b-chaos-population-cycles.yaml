id: b-chaos-population-cycles
title: >
  The logistic map x_{n+1} = rx_n(1-x_n) exhibits period-doubling bifurcations to
  chaos at the Feigenbaum constant δ = 4.669..., which is universal across all 1D
  unimodal maps; real laboratory populations (Tribolium, Drosophila) undergo the same
  bifurcation cascade, establishing chaos theory as a mathematical framework for
  ecological population dynamics.
status: established
fields:
  - ecology
  - mathematics
  - nonlinear-dynamics
  - population-biology
bridge_claim: >
  May (1976) showed that even simple 1D population models (logistic map
  x_{n+1} = rx_n(1-x_n)) exhibit period-doubling bifurcations to chaos as r
  increases past r_∞ ≈ 3.57. Chaotic population dynamics: sensitive dependence on
  initial conditions, strange attractors, positive Lyapunov exponents. Observed in
  laboratory populations (Drosophila, flour beetle Tribolium) and real predator-prey
  cycles (Canada lynx-snowshoe hare). The Feigenbaum constant δ = 4.669... is
  universal across all 1D maps at the period-doubling cascade — a remarkable
  universality bridging mathematics and population ecology independent of model details.
translation_table:
  - field_a_term: logistic map parameter r (intrinsic growth rate)
    field_b_term: r_max (maximum per-capita population growth rate)
    note: same parameter in mathematical model and ecological interpretation
  - field_a_term: period-doubling bifurcation (at r≈3.0, 3.45, 3.54...)
    field_b_term: transition from stable annual cycle to 2-year, 4-year, 8-year cycles
    note: Canadian lynx may show 10-year cycles; rodent 4-year cycles may be near bifurcation
  - field_a_term: Feigenbaum constant δ = 4.669... (universal across maps)
    field_b_term: ratio of successive bifurcation intervals in any density-regulated population
    note: universality means ecological details don't change the mathematical structure
  - field_a_term: strange attractor (bounded, aperiodic, sensitive)
    field_b_term: irregular population cycles that are deterministic, not stochastic
    note: chaos explains irregular fluctuations without requiring environmental noise
  - field_a_term: Lyapunov exponent λ > 0 (exponential divergence of trajectories)
    field_b_term: long-term unpredictability of population size despite deterministic model
    note: ecological chaos has finite prediction horizon ≈ 1/λ generations
related_unknowns:
  - u-chaotic-population-cycles-detection-noise
related_hypotheses:
  - h-logistic-map-feigenbaum-ecology-universality
cross_pollination_opportunities:
  - >
    Chaos theory's route to chaos (period-doubling) appears in cardiac arrhythmia
    (alternans → ventricular fibrillation), insect pest outbreaks, and fish stock
    collapses — same mathematical structure predicting the onset of irregular dynamics
    across biology.
  - >
    Stochastic resonance: adding noise to a near-chaotic system can stabilize population
    cycles — a counterintuitive result from nonlinear dynamics with implications for
    conservation management of fluctuating populations.
communication_gap: >
  May's 1976 Nature paper reached ecologists but Feigenbaum's 1978 mathematical
  universality result appeared in Journal of Statistical Physics and reached mainly
  physicists. The profound implication — that ecological and physical systems obey
  identical mathematical universality — was articulated by few and reached standard
  ecology curricula only slowly through the 1980s-90s.
last_reviewed: "2026-05-06"

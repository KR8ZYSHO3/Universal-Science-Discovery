cross_pollination_opportunities:
  - "Optimal control of invasion fronts: reaction-diffusion models enable optimal placement of barriers and control resources to minimize front speed, using calculus of variations and Hamilton-Jacobi theory from applied mathematics."
  - "Climate-driven range shifts: adding an advection term ∂u/∂t = D∂²u/∂x² + v·∂u/∂x + f(u) (where v is climate velocity) gives the speed of poleward range shifts, directly connecting Fisher-KPP theory to climate change impact models."
communication_gap: >
  Ecologists who model invasive species range expansion use empirical curve-fitting
  (logistic, exponential growth to area) without typically applying the Fisher-KPP
  framework. The mathematical connection between dispersal kernels (from mark-recapture
  data) and diffusion coefficients requires a formal diffusion approximation step that
  is standard in physics but not in ecology curricula.

id: b-forest-gap-dynamics-x-neutral-theory-sampling
title: >
  Disturbance-driven canopy gaps reset local competitive hierarchies and recruit colonists from a regional pool — paralleling Hubbell-style neutral sampling of equivalent individuals under fixed biodiversity number θ when dispersal limitation and stochastic recruitment dominate niche differentiation across gap-age ensembles.
status: proposed
fields:
  - ecology
  - mathematics
  - tropical-forest-science
bridge_claim: >
  Gap frequency-size distributions control local transient openness; neutral theory predicts abundance spectra via urn-like sampling when fitness differences are small relative to demographic stochasticity — gaps intensify equivalence by repeatedly fragmenting competitive monopolies, yet soil legacies and asymmetric dispersal often violate strict neutrality — bridge strength is regime-dependent.
translation_table:
  - field_a_term: gap formation rate and size distribution (windthrows, fire scars)
    field_b_term: immigration probability m and θ controlling regional species turnover in neutral models
    note: Both shape local lineage arrival processes; gap ecology adds explicit spatial wounds not present in mean-field neutral formulations.
  - field_a_term: successional age since disturbance
    field_b_term: effective generation time before drift-fixation balances immigration
    note: Chronosequences map loosely onto composite migration–drift tradeoffs.
  - field_a_term: dispersal kernels into gaps (distance decay)
    field_b_term: dispersal limitation kernels in spatially explicit neutral models
    note: Formal spatial neutral models exist; empirical gap datasets rarely fit them jointly.
communication_gap: >
  Forest-gap literature emphasizes photophysiology and succession tables while neutral theory papers emphasize allele-like symmetry assumptions — synthesis reviews exist but routine cross-citation in field protocols remains uneven.
cross_pollination_opportunities:
  - Fit spatially explicit neutral models to mapped gap networks using lidar-derived canopy openings as boundary conditions.
  - Couple gap-age censuses with high-throughput DNA barcoding to test neutrality diagnostics alongside trait matrices.

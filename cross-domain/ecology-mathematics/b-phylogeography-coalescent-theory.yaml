cross_pollination_opportunities:
  - >
    Ancient DNA (aDNA) provides direct genetic observations at known time points,
    transforming phylogeography from inference-only to direct observation. The
    coalescent provides the likelihood framework for integrating aDNA with modern
    samples ΓÇö enabling precise estimation of divergence times, migration events,
    and admixture without assuming the coalescent rate is constant through time.
  - >
    Eco-evolutionary dynamics: combining species distribution models (SDMs) with
    coalescent-based demographic inference to predict future phylogeographic
    responses to climate change ΓÇö where will genetic refugia form under 2-4┬░C
    warming? The mathematical coalescent framework makes these predictions quantitative.
communication_gap: >
  Mathematical population geneticists who develop coalescent theory rarely engage
  with empirical ecologists who do species distribution modeling or biogeography.
  Phylogeographers use coalescent methods operationally (BEAST, IMa, msprime)
  without engaging with the mathematical derivations. Conservation biologists
  who identify management units for endangered species rarely use formal coalescent
  inference for defining evolutionarily significant units.

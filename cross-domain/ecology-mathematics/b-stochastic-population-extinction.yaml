id: b-stochastic-population-extinction
title: >
  The stochastic logistic model — adding demographic stochasticity (Brownian
  noise ∝ population size) to the deterministic logistic equation — yields
  a mean extinction time exponential in carrying capacity K, formalising the
  minimum viable population concept and underpinning IUCN Red List extinction
  risk categories through the mathematics of quasi-stationary distributions
  and Fokker-Planck diffusion.
status: established
fields:
  - ecology
  - mathematics
  - population-genetics
  - conservation-biology
  - stochastic-processes
bridge_claim: >
  The deterministic logistic model dN/dt = rN(1-N/K) has a stable equilibrium
  at N=K. In a finite population, demographic stochasticity — random variation
  in individual birth and death events — drives fluctuations around K and
  ultimately causes extinction. The stochastic logistic model is:
    dN = rN(1-N/K)dt + σN dW
  where W is a Wiener process (Brownian motion) and σ² is the demographic
  variance per individual per unit time.

  Lande (1993) derived the mean extinction time for this model:
    T_ext ≈ (1/r) · exp(2rK/σ²)
  This is exponential in K — the carrying capacity acts as a "potential barrier."
  Populations with K above the minimum viable population (MVP) threshold have
  astronomically long expected persistence times; below it, extinction is rapid.

  The diffusion approximation (Kimura 1964, applied to population genetics)
  maps the stochastic logistic to a Fokker-Planck equation:
    ∂f/∂t = -∂/∂N [A(N)f] + (1/2)∂²/∂N² [B(N)f]
  where A(N) = rN(1-N/K) (drift) and B(N) = σ²N² (diffusion). The
  quasi-stationary distribution (QSD) is the stationary solution conditional
  on non-extinction — it represents the long-term population size distribution
  for populations that have not yet gone extinct.

  Melbourne & Hastings (2008) demonstrated that demographic stochasticity
  alone (without environmental stochasticity) causes extinction in Tribolium
  flour beetle populations following exactly the predicted exponential
  dependence on K. This is a rare controlled experimental test of extinction
  mathematics.

  Extinction debt (Tilman et al. 1994; Ovaskainen & Meerson 2010): habitat
  fragmentation reduces K by reducing patch area. The exponential relationship
  between T_ext and K means small reductions in K produce enormous reductions
  in persistence time — populations become "living dead" (committed to
  extinction by past habitat loss, but not yet extinct). This creates the
  phenomenon of time-lagged biodiversity loss after deforestation.

  IUCN Red List criteria (Criteria E) directly use quantitative extinction
  probability thresholds (≥50% in 10 years or 3 generations for Critically
  Endangered) that are computed from population viability analysis (PVA) models
  implementing exactly this mathematical framework.
translation_table:
  - field_a_term: "Carrying capacity K (ecology)"
    field_b_term: "Potential well depth in the extinction barrier — determines T_ext"
    note: T_ext ≈ exp(2rK/σ²)/r — small changes in K cause huge changes in persistence
  - field_a_term: "Intrinsic growth rate r (population ecology)"
    field_b_term: "Inverse of characteristic demographic time — sets timescale of fluctuations"
    note: High-r species recover faster from low abundance but same extinction mathematics applies
  - field_a_term: "Demographic stochasticity σ² (individual birth/death variance)"
    field_b_term: "Diffusion coefficient in Fokker-Planck equation B(N) = σ²N²"
    note: Demographic stochasticity scales as N² in population-level variance
  - field_a_term: "Quasi-stationary distribution (QSD) of population size"
    field_b_term: "Long-run population size distribution conditional on survival"
    note: The QSD characterises populations that persist for long times
  - field_a_term: "Minimum viable population (MVP)"
    field_b_term: "Threshold K below which T_ext < conservation time horizon"
    note: MVP is the inflection point in the exp(K) relationship
  - field_a_term: "Extinction debt (delayed extinction from habitat loss)"
    field_b_term: "Subcritical relaxation: population below new K but T_ext still long"
    note: The time lag between habitat loss and extinction can be centuries for large K

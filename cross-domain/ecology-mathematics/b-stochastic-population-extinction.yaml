cross_pollination_opportunities:
  - >
    The quasi-stationary distribution framework from mathematics has not been
    consistently applied in conservation biology. Computing QSDs for real
    species' population models (conditioned on non-extinction) would give
    more realistic estimates of population viability than the current PVA
    approach, and could be implemented in standard conservation software.
  - >
    Extinction debt quantification: remote sensing now provides time series of
    habitat area at landscape scale. Combining habitat loss time series with
    the mathematical prediction T_ext ≈ exp(2rK/σ²)/r — where K ∝ habitat
    area — gives a spatially explicit map of extinction debt across the tropics.
    This is a direct application of stochastic population mathematics to
    real-time biodiversity monitoring.
  - >
    The Fokker-Planck approach can incorporate spatial structure (metapopulation
    models) by adding migration terms. Mathematical advances in multi-dimensional
    Fokker-Planck equations (developed for statistical physics and finance) can
    be imported to improve spatially explicit extinction risk assessments.
communication_gap: >
  The stochastic diffusion approach to extinction (Lande, Kimura) is published
  in ecology and population genetics journals respectively, with limited
  cross-citation to the stochastic processes literature (Gardiner's Handbook,
  Van Kampen's Stochastic Processes). Conservation biologists using PVA
  software (VORTEX, RAMAS) implement these models without knowledge of the
  underlying mathematical theory. Mathematicians developing new results on
  quasi-stationary distributions rarely cite ecology literature.

cross_pollination_opportunities:
  - >
    Network theory methods (betweenness centrality, bridge nodes) can identify patches
    that are disproportionately important for metapopulation persistence — analogous to
    hubs in social or transport networks. "Stepping stone" patches with high betweenness
    centrality in the dispersal graph merit priority conservation even if small.
  - >
    Urban ecology application: urban green spaces form metapopulations of woodland birds,
    pollinators, and reptiles. The metapopulation capacity of urban green space networks
    can be computed from GIS data; optimising the λ_M of urban park networks gives
    quantitative biodiversity targets for city planning.
communication_gap: >
  Island biogeography (MacArthur & Wilson) was published in Ecology and as a monograph —
  accessible to ecologists. Levins (1969) published in Bulletin of the Entomological
  Society of America — an obscure journal that delayed uptake by a decade. Hanski's
  work (Finnish Academy, published in Nature, American Naturalist, and Oikos) brought
  metapopulation theory to mainstream ecology but required 20+ years of long-term
  empirical data to convince sceptical ecologists. The metapopulation capacity eigenvalue
  formulation is mathematically advanced (linear algebra of large sparse matrices) and
  uncommon in ecological training. Conservation practitioners rarely perform eigenvalue
  calculations and rely on surrogate metrics (area, buffer zones) that MCA shows are
  inferior to λ_M.

  - "Use the Fokker-Planck framework to derive analytic approximations for population viability analysis"
  - "Test whether the moment-closure approximations used in population ecology are consistent with the exact master equation solutions"

communication_gap: >
  Population ecologists and evolutionary biologists largely work with differential
  equation models; the master equation formalism is standard in statistical physics
  but uncommon in ecology courses. Gardiner's Handbook of Stochastic Methods is
  the bridge text but is rarely cited in ecology. The connection between genetic
  drift and Brownian motion was recognized by Kimura (1964) but the broader master
  equation framework is underused in quantitative ecology.


id: b-black-hole-entropy-holographic
title: >
  The Bekenstein-Hawking entropy S = A/4 (area, not volume) of a black hole
  implies the holographic principle — that the maximum information content of
  any 3D region is bounded by its 2D boundary area, making information theory
  and spacetime geometry equivalent at the Planck scale.
status: established
fields:
  - astrophysics
  - information-theory
  - quantum-gravity
  - theoretical-physics
bridge_claim: >
  The discovery that black holes have entropy proportional to their surface
  area — not volume — is the most profound known connection between spacetime
  geometry and information theory.

  1. Bekenstein-Hawking entropy. Bekenstein (1973) argued that the second law
     of thermodynamics requires black holes to carry entropy proportional to
     their event horizon area: S_BH = A/(4l²_P) = kA/(4ℏG/c³), where l_P is
     the Planck length. Hawking (1975) confirmed this by showing black holes
     emit thermal radiation at temperature T_H = ℏc³/(8πGMk_B) — the Hawking
     temperature. Together, these establish black holes as thermodynamic objects
     with S, T, and E obeying the four laws of black hole mechanics (exact
     analogs of the four laws of thermodynamics).

  2. Holographic bound. The Bekenstein bound states that the maximum entropy
     (= maximum information) of any physical system in a volume V with boundary
     area A is S ≤ A/4l²_P bits. This is shocking: information capacity scales
     as AREA, not volume. A cubic meter of space can hold at most ~10^66 bits
     (the area in Planck units), regardless of how dense the matter inside is.
     Packing in more matter just creates a black hole that has exactly that
     entropy.

  3. Holographic principle. 't Hooft (1993) and Susskind (1995) formalized
     this as the holographic principle: a (d+1)-dimensional theory of gravity
     is physically equivalent to a d-dimensional quantum field theory living on
     the boundary — with no gravity. The most concrete realization is the
     AdS/CFT correspondence (Maldacena 1997): string theory in Anti-de Sitter
     space (AdS) in d+1 dimensions is exactly dual to a conformal field theory
     (CFT) in d dimensions on the boundary. This is a proven exact duality in
     string theory, not merely an analogy.

  4. Information theory implications. Shannon entropy H = -Σ pᵢ log pᵢ and
     Bekenstein entropy S_BH = A/4 are both measures of missing information.
     The Bekenstein bound can be written as I ≤ 2πRE/(ℏc ln 2) bits, where
     R is the system radius and E its energy — a fundamental bound on the
     information density of any physical system. This connects information
     theory directly to general relativity.
translation_table:
  - field_a_term: Shannon entropy H (information theory)
    field_b_term: Bekenstein-Hawking entropy S_BH (black hole physics)
    note: Both measure missing information; S_BH = k_B ln(microstates)
  - field_a_term: information capacity of a channel (Shannon)
    field_b_term: maximum information in a spacetime region (holographic bound)
    note: Holographic bound A/4l²_P bits is the physical channel capacity limit
  - field_a_term: data compression limit (Shannon source coding theorem)
    field_b_term: Bekenstein bound — minimum volume to store given information
    note: Both set fundamental limits on information density
  - field_a_term: error-correcting code (information theory)
    field_b_term: quantum error correction in AdS/CFT (bulk reconstruction)
    note: Holographic entanglement is a quantum error-correcting code (Almheiri 2015)
  - field_a_term: mutual information I(A:B) (information theory)
    field_b_term: Ryu-Takayanagi formula: I(A:B) = 2S_γ where γ is minimal surface
    note: Entanglement entropy in CFT = minimal surface area in AdS geometry

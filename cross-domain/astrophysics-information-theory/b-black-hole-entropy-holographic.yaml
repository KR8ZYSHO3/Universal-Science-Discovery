cross_pollination_opportunities:
  - >
    Tensor network models of holography: matrix product states and MERA
    (multi-scale entanglement renormalization ansatz) tensor networks
    reproduce AdS/CFT geometric features. These tools are simultaneously
    used for quantum many-body physics simulations, suggesting a deep
    connection between condensed matter systems and quantum gravity.
  - >
    Quantum error correction from holography: the AdS/CFT duality implements
    a quantum error-correcting code where bulk information is redundantly
    encoded in the boundary. This has direct implications for quantum computing
    — geometric principles may inspire new error correction codes.
communication_gap: >
  Information theorists and astrophysicists/string theorists publish in
  disjoint venues (IEEE Transactions on Information Theory vs. Physical Review
  Letters, Journal of High Energy Physics). The mathematical tools (von Neumann
  entropy, quantum information, tensor networks) are being transferred between
  fields, but practitioners in each field often lack fluency in the other's
  formalism. The AdS/CFT community is increasingly importing quantum information
  concepts; the quantum information community is increasingly aware of holography.

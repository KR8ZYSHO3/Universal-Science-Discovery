cross_pollination_opportunities:
  - >
    Computational linguists building neural language models can ground their
    attention mechanisms in the neuroscience of precision-weighting, deriving
    principled constraints on where and how attention should modulate in
    syntactic processing — testable via eye-tracking and EEG N400/P600 data.
  - >
    Predictive coding theorists can test the grammar-as-generative-model
    hypothesis using naturalistic fMRI: regions associated with high-level
    syntactic prediction (left IFG, temporal pole) should show suppressed
    activity (prediction match) for high-probability continuations and
    elevated activity for low-probability (high surprisal) continuations,
    with the effect scaling with the full surprisal value, not just binary
    violation.
  - >
    The free-energy framework predicts that grammar learning is equivalent to
    learning a generative model that minimizes expected free energy over a
    language corpus — this connects language acquisition to Bayesian model
    selection and could be tested in infant statistical learning paradigms.
communication_gap: >
  Computational neuroscience publications on predictive coding and free energy
  (Friston lab, Trends in Cognitive Sciences, PLOS Computational Biology) and
  formal linguistics / psycholinguistics publications (Language, Cognition,
  Journal of Memory and Language) occupy almost entirely disjoint citation
  networks. The surprisal theory of reading time is widely cited in
  psycholinguistics but rarely connected to free-energy minimization. Clark's
  (2013) "Whatever next?" synthesis reached cognitive science but has had
  limited uptake in formal linguistics. The mathematics is identical, but
  disciplinary vocabulary (precision vs. attention, free energy vs. surprisal,
  generative model vs. grammar) prevents recognition of the equivalence.
last_reviewed: "2026-05-05"

id: b-predictive-coding-grammar
title: >
  Friston's free-energy / predictive coding framework for hierarchical neural
  inference is mathematically equivalent to probabilistic hierarchical phrase
  structure grammar: prediction error in neural processing equals surprisal in
  syntactic processing, and precision-weighting equals attention over syntactic
  dependencies.
status: proposed
fields:
  - neuroscience
  - linguistics
  - cognitive-science
  - computational-neuroscience
bridge_claim: >
  Friston's free-energy principle (2010) proposes that the brain is a
  hierarchical generative model that minimizes variational free energy
  F = KL[q(h)||p(h|s)] ≈ complexity - accuracy. At each level, top-down
  predictions are compared with bottom-up sensory signals; the mismatch
  (prediction error δ = s - μ) is propagated upward and used to update the
  generative model. This architecture is implemented in cortical hierarchies
  via superficial pyramidal cells (error units) and deep pyramidal cells
  (prediction units).

  Hale (2001) and Levy (2008) independently established that the cognitive
  difficulty of processing a word is proportional to its surprisal:
  difficulty ∝ -log P(w_t | w_{1:t-1}). This is precisely the information-
  theoretic measure of prediction error for a probabilistic language model.
  Levy (2008) showed that surprisal accounts for reading time data better than
  memory-based models, and Hale (2001) showed it explains garden-path effects.

  The bridge deepens via Clark's (2013) "Whatever next?" synthesis: syntactic
  prediction is a special case of the general predictive coding architecture.
  The brain's top-down syntactic predictions (from phrase structure knowledge)
  are the linguistic generative model; bottom-up word-form inputs are the
  sensory signal; syntactic surprisal is the linguistic prediction error.
  Precision-weighting — the mechanism by which predictive coding allocates
  computational resources to reliable signals — corresponds to attentional
  modulation of syntactic processing (e.g., increased attention at clause
  boundaries where structural ambiguity is highest).

  The quantitative identity is strongest for the relationship between
  free energy F and minimum description length (MDL): both are measures of
  the trade-off between model complexity and fit to data. MDL grammars
  (Rissanen, Goldsmith) minimize description length for a corpus in exactly
  the sense that predictive coding minimizes variational free energy over the
  sensory stream. This suggests universal grammar constraints may be derivable
  as priors that minimize expected free energy over all possible languages.
translation_table:
  - field_a_term: "Generative model P(s|h) in predictive coding hierarchy"
    field_b_term: "Probabilistic phrase structure grammar P(word | syntactic context)"
    note: Both define the prior that generates expected inputs from latent structure
  - field_a_term: "Prediction error δ = s - μ (sensory signal minus prediction)"
    field_b_term: "Surprisal = -log P(w_t | w_{1:t-1})"
    note: Both quantify the unexpectedness of an input; both drive belief updating
  - field_a_term: "Precision-weighted prediction error π·δ"
    field_b_term: "Attention-weighted processing of syntactic dependencies"
    note: Precision controls the gain on error signals; attention selects dependency arcs
  - field_a_term: "Variational free energy F = complexity - accuracy"
    field_b_term: "MDL grammar cost = description length + encoding cost"
    note: Formally equivalent trade-off between model complexity and empirical fit
  - field_a_term: "Hierarchical latent causes (h₁, h₂, ...) in generative model"
    field_b_term: "Hierarchical phrase structure (morpheme → word → phrase → clause)"
    note: The linguistic hierarchy is the natural decomposition of the neural hierarchy
  - field_a_term: "Active inference — acting to confirm predictions (minimize free energy)"
    field_b_term: "Syntactic priming — prior usage biases subsequent structural choices"
    note: Both represent the motor/production analog of the perceptual/parsing direction
related_unknowns:
  - u-bilingual-cognitive-advantage-replication
  - u-predictive-coding-grammar-neural-substrate
related_hypotheses:

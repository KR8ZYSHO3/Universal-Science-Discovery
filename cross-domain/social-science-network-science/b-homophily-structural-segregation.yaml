cross_pollination_opportunities:
  - "Apply spectral graph theory (Fiedler vector) to identify structural vulnerabilities in filter bubble networks"
  - "Design social platform recommendation algorithms that explicitly reduce assortativity while maintaining engagement"
  - "Test whether Schelling's 1D model predictions for tipping extend to realistic social networks with heterogeneous preferences"

communication_gap: >
  Sociologists developed homophily theory empirically (McPherson et al.) while network
  scientists developed assortativity theory mathematically (Newman 2002) — the explicit
  connection was made only in the mid-2000s. The political science and communication
  studies literature on filter bubbles rarely uses the assortativity formalism despite
  it providing quantitative predictions. Pariser's (2011) popular account lacked the
  mathematical framework, limiting its scientific uptake.


related_hypotheses:
  - h-structural-holes-income-mobility-mediation
cross_pollination_opportunities:
  - Apply network centrality measures to longitudinal social mobility data to test whether betweenness centrality predicts career outcomes
  - Use temporal network analysis (edge appearance/disappearance) to model social capital accumulation and loss over life course
  - Bridge social network analysis to economic mobility models (test whether eigenvector centrality predicts intergenerational income transfer)
  - Apply community detection algorithms (Louvain, spectral clustering) to identify Bourdieu's social "fields" as network modules
communication_gap: >
  Sociologists who use Bourdieu's social capital framework rarely quantify networks
  mathematically; network scientists rarely engage with sociological theory.
  Surveys measuring social capital (e.g., General Social Survey name-generators)
  produce data that could be analysed with full network centrality tools but
  are typically summarised only as degree counts. The full connection between
  sociology's theoretical concepts and network science's mathematical toolkit
  was made explicit by Burt (1992) but remains incompletely integrated in
  either discipline's training.

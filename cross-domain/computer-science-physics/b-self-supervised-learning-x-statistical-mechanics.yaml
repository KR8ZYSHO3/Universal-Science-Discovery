id: b-self-supervised-learning-x-statistical-mechanics
title: Contrastive self-supervised learning — pulling positive pairs together and pushing
  negatives apart — resembles learning energy-based and Boltzmann-machine style scores where
  temperature controls sharpness of discrimination.
status: established
fields:
- machine-learning
- statistical-physics
- computer-science
- information-theory
bridge_claim: 'Energy-based models assign low energy to plausible configurations; training
  shapes the energy landscape so that data lie in wells. Contrastive objectives such as InfoNCE
  reweight logits of positive versus negative pairs using a softmax with temperature parameter
  τ, producing a probabilistic discrimination rule. In statistical mechanics language, τ plays
  the role of a temperature scaling the Boltzmann factors comparing energies of alternative
  pairings. The bridge is not exact isomorphism — deep nets are not equilibrium ensembles
  — but it supplies shared intuition: sharp temperatures (small τ) emphasize hard negatives;
  high τ smooths the landscape. It also connects to noise-contrastive estimation and partition-function
  perspectives.'
translation_table:
- field_a_term: Boltzmann factor exp(-E/kT)
  field_b_term: softmax weights exp(sim/τ) in contrastive logits
- field_a_term: partition function / normalization
  field_b_term: sum over negatives in denominator
- field_a_term: free energy minimization
  field_b_term: contrastive loss minimization

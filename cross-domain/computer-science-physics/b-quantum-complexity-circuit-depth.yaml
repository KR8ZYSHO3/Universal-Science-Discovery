id: b-quantum-complexity-circuit-depth
title: >
  Random quantum circuits of sufficient depth produce probability distributions that
  are computationally hard to classically sample from, establishing a complexity-theoretic
  separation between quantum and classical computation that connects circuit depth theory
  to the physics of quantum chaos, entanglement growth, and decoherence.
status: established
fields:
  - computer-science
  - physics
  - quantum-information
  - computational-complexity
bridge_claim: >
  Classical computational complexity: the class BPP (bounded-error probabilistic
  polynomial time) captures what classical computers can efficiently compute. BQP
  (bounded-error quantum polynomial time) adds quantum superposition and entanglement.
  It is widely believed that BQP ≠ BPP (quantum computers are strictly more powerful)
  but this has not been proven (related to P vs. NP problem hierarchy).

  Random circuit sampling (RCS) provides a near-term approach to demonstrating quantum
  advantage without solving a classically-hard decision problem. An n-qubit circuit of
  depth d applies a sequence of random 2-qubit gates (sampled uniformly from a gate set).
  The output is a probability distribution over 2ⁿ bit strings. At large d, this
  distribution is indistinguishable from the Porter-Thomas distribution (eigenvalue
  spacing statistics of random matrices) — the circuit anti-concentrates.

  Anti-concentration (d > log n): the output probability of each bit string converges
  to p_x ≈ 1/2ⁿ + O(1/2^(n/2)), with fluctuations distributed as Porter-Thomas.
  Anti-concentration is necessary (but not sufficient) for classical simulation hardness.
  For d < log n, the circuit has too little entanglement; classical simulation by
  tensor product states is efficient.

  Classical simulation complexity: the exact simulation of an n-qubit depth-d circuit
  requires O(2ⁿ) memory for d > n using Schrödinger simulation. Tensor network methods
  can reduce this for low entanglement, but for depth d > O(log n) with random gates,
  the entanglement entropy saturates the area law upper bound, making tensor network
  compression exponential in n.

  Quantum Volume: V_Q = 2^min(n,d) quantifies achievable circuit complexity given
  hardware noise. For Google's Sycamore at the supremacy experiment: n=53, d=20,
  XEB fidelity ≈ 0.224%, establishing that the output distribution is non-trivially
  quantum — consistent with simulating a quantum circuit that a classical computer
  cannot replicate in reasonable time.

  The physics connection: random circuit dynamics mimics quantum chaos. The quantum
  Lyapunov exponent (OTOC growth rate) governs how quickly local operators spread
  across the system (information scrambling). At depth d ≈ n/v_butterfly (butterfly
  velocity), the circuit reaches full quantum chaos. The MSS bound λ_L ≤ 2πT/ℏ sets
  the maximum scrambling rate — exactly equivalent to the maximum circuit depth at
  which new classical simulation complexity emerges per layer.

  Boixo et al. (2018) proved: conditional on the unproven conjecture that the
  polynomial hierarchy does not collapse to level 3, efficient classical simulation
  of random circuit sampling is impossible. This connects computational complexity
  (PH, Toda's theorem) to quantum physics (random matrix theory, Berry-Keating conjecture).
translation_table:
  - field_a_term: quantum circuit of depth d on n qubits
    field_b_term: quantum chaotic system evolved for time t = d (discrete time)
  - field_a_term: random 2-qubit gate (Haar-random unitary)
    field_b_term: random time step in quantum chaotic dynamics
  - field_a_term: anti-concentration (Porter-Thomas distribution of output probabilities)
    field_b_term: quantum ergodicity (eigenstate thermalisation hypothesis for circuits)
  - field_a_term: quantum volume V_Q = 2^min(n,d)
    field_b_term: Hilbert space volume accessible to quantum chaotic dynamics
  - field_a_term: cross-entropy benchmarking (XEB) fidelity
    field_b_term: overlap between quantum state and its ideal counterpart (state fidelity)
  - field_a_term: tensor network contraction (classical simulation)
    field_b_term: area law of entanglement entropy (condition for efficient classical description)
  - field_a_term: quantum supremacy threshold (fidelity F*)
    field_b_term: quantum chaos threshold (scrambling time t_scramble)

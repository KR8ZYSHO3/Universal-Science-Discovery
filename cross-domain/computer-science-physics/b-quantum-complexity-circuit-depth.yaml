cross_pollination_opportunities:
  - >
    Quantum error correction threshold theorem: circuits with gate error rate below
    threshold ε* ≈ 10^(-3) can implement fault-tolerant quantum computation. The
    circuit depth threshold for classical simulation hardness (related to F*) and
    the fault-tolerance threshold are both circuit-complexity quantities — clarifying
    the relationship between these two thresholds would determine whether near-term
    (NISQ) devices can demonstrate sustained quantum advantage before achieving
    fault tolerance.
  - >
    Holographic quantum error correction (Almheiri et al. 2015): the tensor network
    structure of the AdS/CFT correspondence is a quantum error correcting code. The
    entanglement structure of random circuits at threshold depth mimics the holographic
    tensor network structure — connecting circuit complexity to quantum gravity.
communication_gap: >
  Computational complexity theory (Arora & Barak, STOC/FOCS) and quantum physics
  (Phys Rev Lett, Nature Physics) developed independently for decades. Quantum computing
  theory (Shor 1994, Grover 1996) was done by computer scientists and physicists jointly
  but focused on algorithms, not circuit complexity. The specific connection between
  random circuit complexity and quantum chaos via OTOCs was made by Hayden & Preskill
  (2007) for black hole information and extended to circuits by Roberts & Yoshida (2017).
  Experimental quantum computing groups (Google, IBM) bridge these literatures in
  practice but the theoretical communities remain somewhat separate. Complexity theorists
  rarely attend quantum chaos conferences and vice versa.

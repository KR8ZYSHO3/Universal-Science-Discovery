name: "New Open Question"
description: "Add an open scientific question to the unknowns catalog"
title: "[UNKNOWN] "
labels: ["unknown-proposal", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        An "unknown" is a well-defined open question at the boundary between domains — something science genuinely doesn't know yet.
  - type: input
    id: domain
    attributes:
      label: Primary Domain
      placeholder: "e.g. Neuroscience, Ecology, Physics"
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Question Title
      placeholder: "Short, specific title for the open question"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What is unknown and why does it matter?"
      placeholder: "What is not known, why it matters, what has been tried..."
    validations:
      required: true
  - type: textarea
    id: why_cross_domain
    attributes:
      label: Why cross-domain?
      description: "What makes this a cross-domain question?"
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      placeholder: "Key papers establishing this is genuinely unknown"
    validations:
      required: true

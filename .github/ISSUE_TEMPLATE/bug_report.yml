name: "Bug Report"
description: "Report an error in the catalog, dashboard, or scripts"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before you submit:** run the local checks in [**CONTRIBUTING.md**](https://github.com/KR8ZYSHO3/Universal-Science-Discovery/blob/main/CONTRIBUTING.md#run-checks-locally) (`python -m pytest tests/repo_smoke`, `python scripts/validate_schemas.py`, and `mkdocs build --strict` if you changed `docs/`).
  - type: dropdown
    id: bug_type
    attributes:
      label: Type of bug
      options:
        - Incorrect citation or reference
        - Schema validation error
        - Dashboard/UI bug
        - Script error
        - Factual error in a bridge entry
        - Other
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: Affected file or entry
      placeholder: "e.g. cross-domain/physics-ecology/b-percolation-ecology.yaml"
  - type: textarea
    id: description
    attributes:
      label: What's wrong?
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Suggested fix (if known)

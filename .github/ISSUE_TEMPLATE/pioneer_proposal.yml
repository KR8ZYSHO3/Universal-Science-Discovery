name: "Pioneer Entry Proposal"
description: "Propose a scientific pioneer for the pioneers catalog"
title: "[PIONEER] "
labels: ["pioneer-proposal"]
body:
  - type: input
    id: name
    attributes:
      label: Pioneer Name
    validations:
      required: true
  - type: textarea
    id: contributions
    attributes:
      label: Core Contributions
      description: "What mathematical/scientific contributions did they make that seed cross-domain bridges?"
    validations:
      required: true
  - type: textarea
    id: underappreciated
    attributes:
      label: Underappreciated Work
      description: "What important work was dismissed, delayed, or misattributed?"
  - type: textarea
    id: bridge_seeds
    attributes:
      label: Bridge Seeds
      description: "Which existing or potential bridges does their work underpin?"
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Key References
    validations:
      required: true

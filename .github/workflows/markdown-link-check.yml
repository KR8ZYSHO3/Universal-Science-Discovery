name: markdown-link-check

on:
  push:
    branches: [main, feat/dev-dashboard]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .markdown-link-check.json

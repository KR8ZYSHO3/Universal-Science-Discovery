name: Rebuild Knowledge Graph

on:
  push:
    branches: [main]
    paths:
      - 'unknowns-catalog/**'
      - 'hypotheses/**'
      - 'cross-domain/**'
      - 'phenomenology/**'
      - 'breakthrough-gaps/**'
      - 'scripts/render_breakthrough_gaps_hub.py'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyyaml jsonschema networkx

      - name: Rebuild knowledge graph
        run: python scripts/build_graph.py

      - name: Find orphan unknowns
        run: python scripts/find_orphan_unknowns.py

      - name: Propose bridges
        run: python scripts/propose_bridges.py --top 15 --output docs/bridge_proposals.json

      - name: Update dashboard stats
        run: python scripts/update_dashboard_stats.py --apply

      - name: Generate domain pages
        run: python scripts/generate_domain_pages.py

      - name: Render breakthrough gaps hub section
        run: python scripts/render_breakthrough_gaps_hub.py --apply

      - name: Stage domain pages
        run: git add dashboard/domains/

      - name: Generate static API
        run: python scripts/generate_api.py

      - name: Build citation index
        run: python scripts/build_citation_index.py

      - name: Stage citation index
        run: git add docs/citation_index.json docs/citation_index.md

      - name: Stage API files
        run: git add api/

      # Push directly to main — auto-merge via `gh` fails under typical branch-protection rules.
      # Paths filter excludes generated artifacts, so this push does not re-trigger this workflow.
      - name: Commit updated artifacts and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/knowledge_graph.json docs/orphan_unknowns.md docs/bridge_proposals.json docs/citation_index.json docs/citation_index.md dashboard/index.html dashboard/domains/ api/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "bot: auto-rebuild knowledge graph and dashboard stats [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

name: Rebuild Knowledge Graph

on:
  push:
    branches: [main]
    paths:
      - 'unknowns-catalog/**'
      - 'hypotheses/**'
      - 'cross-domain/**'
      - 'phenomenology/**'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyyaml jsonschema networkx

      - name: Rebuild knowledge graph
        run: python scripts/build_graph.py

      - name: Find orphan unknowns
        run: python scripts/find_orphan_unknowns.py

      - name: Propose bridges
        run: python scripts/propose_bridges.py --top 15 --output docs/bridge_proposals.json

      - name: Update dashboard stats
        run: python scripts/update_dashboard_stats.py --apply

      - name: Generate domain pages
        run: python scripts/generate_domain_pages.py

      - name: Stage domain pages
        run: git add dashboard/domains/

      - name: Generate static API
        run: python scripts/generate_api.py

      - name: Stage API files
        run: git add api/

      - name: Commit updated artifacts
        run: |
          git config user.name "USDR Bot"
          git config user.email "bot@usdr.science"
          git add docs/knowledge_graph.json docs/orphan_unknowns.md docs/bridge_proposals.json dashboard/index.html dashboard/domains/ api/
          git diff --staged --quiet || git commit -m "bot: auto-rebuild knowledge graph and update dashboard stats [skip ci]"
          git push

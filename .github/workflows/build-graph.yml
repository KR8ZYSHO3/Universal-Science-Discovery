name: Rebuild Knowledge Graph

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'unknowns-catalog/**'
      - 'hypotheses/**'
      - 'cross-domain/**'
      - 'phenomenology/**'
      - 'breakthrough-gaps/**'
      - 'scripts/render_breakthrough_gaps_hub.py'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyyaml jsonschema networkx

      - name: Rebuild knowledge graph
        run: python scripts/build_graph.py

      - name: Export orphan xref panel JSON
        run: python scripts/export_orphan_xref_panel.py

      - name: Find orphan unknowns
        run: python scripts/find_orphan_unknowns.py

      - name: Propose bridges
        run: python scripts/propose_bridges.py --top 15 --output docs/bridge_proposals.json

      - name: Update dashboard stats
        run: python scripts/update_dashboard_stats.py --apply

      - name: Generate domain pages
        run: python scripts/generate_domain_pages.py

      - name: Render breakthrough gaps hub section
        run: python scripts/render_breakthrough_gaps_hub.py --apply

      - name: Generate static API
        run: python scripts/generate_api.py

      - name: Build citation index
        run: python scripts/build_citation_index.py

      # Branch protection on `main` rejects direct `git push` from `GITHUB_TOKEN`
      # ("Commit updated artifacts and push to main" was failing at that step).
      # Open/update a bot PR instead; merging does not re-trigger this workflow (paths filter).
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "bot: auto-rebuild knowledge graph and dashboard stats [skip ci]"
          branch: bot/auto-knowledge-graph-rebuild
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          title: "bot: auto-rebuild knowledge graph and dashboard stats"
          body: |
            Automated update from **Rebuild Knowledge Graph** after catalog YAML changed on `main`.

            Merge when checks pass to refresh:

            - `docs/knowledge_graph.json`, `docs/orphan_unknowns.md`, `docs/bridge_proposals.json`
            - `docs/citation_index.json`, `docs/citation_index.md`
            - `api/v1/orphan_xref_panel.json` (xref hygiene hub panel)
            - `dashboard/index.html`, `dashboard/domains/`
            - `api/v1/`

            Direct push to `main` is blocked for `github-actions[bot]` under repository branch protection; this PR is the delivery path.
          delete-branch: false
          add-paths: |
            docs/knowledge_graph.json
            docs/orphan_unknowns.md
            docs/bridge_proposals.json
            docs/citation_index.json
            docs/citation_index.md
            dashboard/index.html
            dashboard/domains/**
            api/**

name: ingest tests

on:
  push:
    paths:
      - "packages/ingest/**"
      - "requirements-ingest.txt"
      - "pyproject.toml"
      - "schemas/ingestion-envelope-1.0.0.json"
      - ".github/workflows/ingest-ci.yml"
  pull_request:
    paths:
      - "packages/ingest/**"
      - "requirements-ingest.txt"
      - "pyproject.toml"
      - "schemas/ingestion-envelope-1.0.0.json"
      - ".github/workflows/ingest-ci.yml"

jobs:
  pytest-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ingest dependencies
        run: pip install -r requirements-ingest.txt

      - name: Install package (editable) + pytest
        run: pip install -e "./packages/ingest[dev]"

      - name: Unit tests (fixtures only; no live OAI)
        run: python -m pytest packages/ingest/tests

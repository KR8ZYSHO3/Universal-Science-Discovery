name: mkdocs-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build site (strict)
        run: mkdocs build --strict

name: Wave Factory Cadence

on:
  schedule:
    - cron: "0 6 * * 1,4" # Monday + Thursday 06:00 UTC
  workflow_dispatch:

jobs:
  wave-factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Harvest OpenAlex candidates
        run: |
          python scripts/harvesters/harvest_openalex.py \
            --bridge-scan \
            --top 20 \
            --output drafts/openalex_candidates.json

      - name: Harvest PubMed candidates
        run: |
          python scripts/harvesters/harvest_pubmed.py \
            --bridge-scan \
            --top 20 \
            --output drafts/pubmed_candidates.json

      - name: Harvest Semantic Scholar candidates
        run: |
          python scripts/harvesters/harvest_semantic_scholar.py \
            --bridge-scan \
            --top 20 \
            --output drafts/semantic_scholar_candidates.json

      - name: Wave Factory ranking dry-run
        run: |
          python scripts/harvesters/wave_factory.py \
            --top 30 \
            --min-citations 50 \
            --sources openalex,pubmed,semantic_scholar \
            --dry-run

      - name: Stage Wave Factory batch
        run: |
          python scripts/harvesters/wave_factory.py \
            --top 30 \
            --min-citations 50 \
            --sources openalex,pubmed,semantic_scholar \
            --output drafts/wave_factory

      - name: Validate staged batch (dry-run promotion)
        run: |
          python scripts/harvesters/promote_wave_factory_batch.py \
            --stage drafts/wave_factory

      - name: Validate canonical schemas
        run: python scripts/validate_schemas.py

      - name: Create PR for staged outputs
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/wave-factory-${{ github.run_id }}
          commit-message: "bot: stage wave factory batch [skip ci]"
          title: "bot: wave factory staged bridge batch"
          body: |
            Automated Wave Factory run:
            - refreshed candidate harvests
            - ranked and staged bridge/unknown/hypothesis triples in `drafts/wave_factory/`
            - validated staged records and canonical schemas
          labels: |
            automation
            wave-factory
          add-paths: |
            drafts/openalex_candidates.json
            drafts/pubmed_candidates.json
            drafts/semantic_scholar_candidates.json
            drafts/wave_factory/**

name: Crosscheck Repro Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'repro/**'
      - 'protocols-catalog/**'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install networkx

      - name: Habitat percolation FSS
        run: python repro/p-b-habitat-percolation-ecology-fss/simulate_percolation_fss.py

      - name: Cluster size exponent
        run: python repro/p-b-habitat-percolation-ecology-cluster-exponent/cluster_size_exponent.py

      - name: Epidemic percolation FSS
        run: python repro/p-b-percolation-epidemiology-fss/epidemic_percolation_fss.py
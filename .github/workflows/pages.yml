name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'docs/**'
      - 'repro/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Write Pages deploy metadata
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import datetime as _dt
          import json
          import os
          import subprocess

          sha = os.environ["GITHUB_SHA"]
          ref = os.environ.get("GITHUB_REF", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          short = sha[:7]
          try:
              commit_iso = subprocess.check_output(
                  ["git", "log", "-1", "--format=%cI", sha],
                  text=True,
              ).strip()
          except (subprocess.CalledProcessError, FileNotFoundError):
              commit_iso = ""
          generated_at = _dt.datetime.now(_dt.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          payload = {
              "sha": sha,
              "short_sha": short,
              "ref": ref,
              "commit_iso": commit_iso,
              "generated_at": generated_at,
              "repository": repo,
          }
          os.makedirs("dashboard", exist_ok=True)
          deploy_path = os.path.join("dashboard", "deploy-info.json")
          with open(deploy_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
              f.write("\n")
          print("Wrote", deploy_path, flush=True)

          meta_path = os.path.join("api", "v1", "meta.json")
          with open(meta_path, encoding="utf-8") as f:
              meta = json.load(f)
          meta["pages_deploy"] = payload
          with open(meta_path, "w", encoding="utf-8") as f:
              json.dump(meta, f, indent=2)
              f.write("\n")
          print("Patched", meta_path, "with pages_deploy", flush=True)
          PY

      - name: Verify Pages deploy metadata
        run: |
          test -f dashboard/deploy-info.json
          python3 -c "import json; m=json.load(open('api/v1/meta.json')); assert 'pages_deploy' in m and m['pages_deploy'].get('sha'), 'pages_deploy missing or empty in meta.json'"

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v5

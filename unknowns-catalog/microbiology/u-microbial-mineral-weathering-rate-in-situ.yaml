id: u-microbial-mineral-weathering-rate-in-situ
title: >
  What fraction of in situ mineral weathering rates in soils and sediments is directly attributable to microbial activity versus abiotic dissolution, and how does this partition vary with mineralogy and redox conditions?
status: open
priority: high
disciplines:
  - microbiology
  - geochemistry
summary: >
  Laboratory experiments demonstrate that microbes accelerate mineral dissolution by orders of magnitude, but extrapolating these rates to field conditions is complicated by variable cell density, mineral surface area, and geochemical gradients. Isotope fractionation and reactive transport modeling suggest biotic rates dominate iron cycling in anoxic sediments, but the relative biotic/abiotic partition for silicate weathering in aerobic soils is highly uncertain.

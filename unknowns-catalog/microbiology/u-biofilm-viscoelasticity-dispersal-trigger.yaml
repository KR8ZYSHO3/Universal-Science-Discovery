id: u-biofilm-viscoelasticity-dispersal-trigger
title: "What mechanical or chemical signal triggers the switch from biofilm viscoelastic solid (attached persistence) to fluid (active dispersal), and can the yield stress and viscoelastic transition of EPS networks be manipulated pharmacologically to prevent biofilm formation on medical devices?"
status: open
priority: critical
disciplines:
  - microbiology
  - materials-science
  - biophysics
  - medicine
summary: >
  Biofilm dispersal is a regulated phenotypic switch triggered by nutrient, oxygen, or signal molecule
  changes, but the mechanical side of this transition (from viscoelastic solid to fluid) is not quantified.
  Key unknowns: (1) does active dispersal require the biofilm bulk modulus to fall below a threshold (yield
  stress collapse) driven by EPS-degrading enzymes (e.g. dispersin B), and can this threshold be predicted
  from the polymer network theory? (2) What is the minimum concentration of EPS-disrupting agent (enzyme,
  small molecule chelator) needed to shift the biofilm from G' > G'' (solid) to G'' > G' (liquid) across
  clinically relevant species? (3) Can quantitative AFM nanoindentation distinguish biofilm subzones with
  different mechanical properties that correspond to viable but non-culturable dispersal competent cells?
systematic_gaps:
  - Bulk rheology of intact biofilms is technically limited to surface-accessible geometries; measuring subsurface mechanical properties requires AFM or MRI
  - The molecular mechanism linking c-di-GMP signalling to EPS polymer network crosslink density is not fully resolved
  - Anti-biofilm mechanical strategies (ultrasound, flow pulsation) are empirically tested but not designed from viscoelastic yield-stress first principles

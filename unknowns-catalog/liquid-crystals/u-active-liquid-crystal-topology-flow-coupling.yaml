id: u-active-liquid-crystal-topology-flow-coupling
title: >
  How do topological defects in active liquid crystals (bacterial suspensions,
  cytoskeletal networks) couple to spontaneous flow — and can the defect-flow
  dynamics be controlled to direct active matter transport for synthetic biology
  or materials applications?
status: open
priority: medium
disciplines:
  - soft-matter
  - physics
  - biophysics
  - active-matter
summary: >
  Active liquid crystals (ALCs) — composed of cytoskeletal filaments with motor
  proteins or dense bacterial suspensions — spontaneously generate flows driven
  by local active stress (extensile or contractile). Topological defects (+1/2
  and -1/2 disclinations) are self-propelled in extensile ALCs: +1/2 defects
  move "head-first" driven by active stress asymmetry. The coupling between defect
  dynamics and flow is not fully understood quantitatively: (1) Does defect
  annihilation (pairs of ±1/2 defects finding each other) depend on active stress
  magnitude or geometry? (2) Can confinement geometry (boundary conditions) be
  used to direct defect motion and hence active flow? (3) Can active LCs be
  engineered to transport cargo (nanoparticles, cells) along prescribed defect
  pathways? The transition from passive LC defect dynamics (t^{-1/2} coarsening)
  to active LCs with sustained defect density is not fully characterized.
systematic_gaps:
  - Quantitative prediction of defect velocity from Frank elastic constants, active
    stress magnitude, and geometry has not been validated experimentally.
  - Confinement-guided active LC transport has been demonstrated in simple geometries
    but the design rules for arbitrary channel geometries are not established.
  - The role of thermal fluctuations vs. active noise in defect nucleation in
    biological active LCs (actin-myosin networks) has not been separated.
related_bridges:

id: u-liquid-crystals-frank-elasticity
title: "Can Frank elastic constants K₁, K₂, K₃ be predicted from molecular structure alone (molecular dynamics + density functional theory) without fitting to experimental Freedericksz data?"
status: open
priority: medium
disciplines:
  - soft-matter
  - materials-science
  - computational-chemistry
summary: >
  Frank elastic constants (K₁, K₂, K₃) determine LCD switching voltage, response
  time, and viewing angle. They are currently measured experimentally for each
  compound via Freedericksz cell or light scattering — a multi-day experimental
  process. First-principles prediction from molecular structure (QSAR models,
  molecular dynamics, DFT) would enable computational screening of new liquid
  crystal compounds before synthesis. Current MD simulations predict K values
  to ±30–50% accuracy, insufficient for device design. The connection between
  molecular anisotropy (shape, polarizability, chirality) and the three distinct
  elastic constants requires a molecular-scale theory that does not yet exist.
systematic_gaps:
  - "No QSAR model for Frank elastic constants has been validated on more than ~20 compounds; the molecular descriptors that best predict K₁ vs K₂ vs K₃ are unknown."
  - "Coarse-grained MD force fields for liquid crystals reproduce phase sequences but not quantitative elastic constants."
  - "The relative magnitudes of K₁:K₂:K₃ across different mesogen classes (calamitic, discotic, bent-core) have not been explained from first principles."
related_bridges:
  - b-liquid-crystals-frank-elasticity
last_reviewed: "2026-05-07"

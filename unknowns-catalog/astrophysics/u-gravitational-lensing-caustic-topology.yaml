id: u-gravitational-lensing-caustic-topology
title: "What is the complete topological classification of caustic networks produced by realistic large-scale structure lens distributions, and how do higher-order catastrophe singularities (swallowtail, butterfly) affect the statistical properties of extreme-magnification events observable by next-generation lensing surveys?"
status: open
priority: medium
disciplines:
  - astrophysics
  - mathematics
  - optics
summary: >
  Gravitational lensing caustics from galaxy clusters and large-scale structure form complex networks whose
  topological properties determine arc statistics and magnification bias. Key unknowns: (1) what fraction of
  high-magnification events in surveys like Euclid and Roman will sample higher-order catastrophes (swallowtail,
  butterfly) beyond fold and cusp, and how do these affect the luminosity function of lensed sources?
  (2) Can wave-optics diffraction corrections near caustics be computed efficiently enough for large-N population
  statistics in the radio lensing (sub-mm) regime where geometric optics breaks down?
  (3) What new constraints on small-scale dark matter substructure come from caustic micro-disruption statistics?
systematic_gaps:
  - Full 3D lens-reconstruction codes that compute caustic topology in all six catastrophe types are computationally prohibitive for survey-scale datasets
  - Wave-optics corrections require full diffraction integral computation, orders of magnitude more expensive than geometric optics ray tracing
  - Observational identification of butterfly/swallowtail caustics in real arc systems has not been achieved
related_bridges:

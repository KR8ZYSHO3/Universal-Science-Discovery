id: u-accretion-disk-mri-saturation
title: What determines the saturation amplitude of MRI-driven MHD turbulence in accretion disks, and why does the effective α parameter depend on magnetic Prandtl number?
status: open
priority: high
disciplines:
  - astrophysics
  - magnetohydrodynamics
  - plasma-physics
  - fluid-dynamics
summary: >
  The magnetorotational instability (MRI) provides the mechanism for angular momentum
  transport in accretion disks, but the saturation amplitude of the resulting MHD
  turbulence — parametrized by the Shakura-Sunyaev α coefficient — is not predictable
  from linear MRI theory. Numerical shearing-box simulations consistently show
  α ≈ 0.001-0.1, but the value depends strongly on the magnetic Prandtl number
  Pm = ν/η (ratio of viscosity to magnetic diffusivity).

  In hot accretion disks around black holes (AGN, X-ray binaries), Pm >> 1 (high-
  temperature plasma). In protoplanetary disks and accretion flows in CVs, Pm < 1
  (partially ionized, higher resistivity). Simulations suggest α scales roughly as
  Pm^{1/2} for Pm > 1, but the physical mechanism for this scaling is not understood.

  Additionally, the MRI faces a "channel mode" problem: the fastest-growing MRI mode
  is a laminar channel (axisymmetric) flow that disrupts into turbulence through
  parasitic instabilities. The transition from laminar MRI channels to sustained
  turbulence depends on Pm in poorly understood ways.

  Laboratory MRI experiments access Pm << 1 (liquid metals), while astrophysical
  disks have Pm >> 1 — making laboratory calibration of astrophysical simulations
  difficult.
systematic_gaps:
  - The functional dependence of α on magnetic Prandtl number Pm lacks a theoretical derivation from first principles.
  - The parasitic instability mechanism controlling MRI channel mode saturation is not fully characterized.
  - Whether MRI turbulence in the Pm >> 1 regime is in the same universality class as Pm << 1 is unknown.
  - The role of large-scale magnetic field geometry (toroidal vs. poloidal) in setting α is debated.
suggested_hypotheses:
  - α ~ Pm^{1/2} scaling arises from the Alfvén velocity matching the turbulent velocity at the resistive dissipation scale.

id: u-solar-wind-alfven-wave-dissipation-scale
title: >
  At what spatial scale and through what kinetic mechanism does the solar wind Alfvénic turbulence cascade ultimately dissipate, heating the solar wind ions and electrons?
status: open
priority: high
disciplines:
  - astrophysics
  - plasma-physics
summary: >
  Parker Solar Probe has measured turbulent spectra from 0.1 AU inward but the precise scale, mechanism (stochastic heating, Landau damping, reconnection) and partition between ion and electron heating at the dissipation scale remains debated. Whether the break in the turbulent spectrum at ion inertial length corresponds to the true dissipation scale or to a transition to kinetic Alfvén wave turbulence is unresolved.

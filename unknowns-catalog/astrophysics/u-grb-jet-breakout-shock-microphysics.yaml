id: u-grb-jet-breakout-shock-microphysics
title: Which afterglow features uniquely identify jet structure (structured jets, late energy
  injection) versus observer-angle effects within a single RHD model class?
status: open
priority: medium
disciplines:
- astrophysics
- physics
summary: Degeneracies between microphysics and geometry persist; multimessenger data may break
  some but not all.
systematic_gaps:
- Magnetic field dominance in some jets complicates pure hydrodynamic blast-wave fits.
- Early-time prompt emission engine remains uncertain, limiting self-consistent initial conditions.

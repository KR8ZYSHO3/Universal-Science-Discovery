id: u-gravitational-wave-astrophysics-population
title: What is the mass distribution and formation channel of compact binary mergers detected by LIGO-Virgo, and what does it imply for stellar evolution?
status: open
priority: high
disciplines:
  - astrophysics
  - gravitational-wave-astronomy
  - stellar-evolution
summary: >
  LIGO-Virgo has detected ~100 gravitational wave events from compact binary mergers
  (black hole + black hole, neutron star + neutron star, black hole + neutron star).
  The mass distribution of these systems contains features (mass gap at ~3-5 solar masses,
  upper mass gap at ~50-130 solar masses from pair instability supernovae) that probe
  stellar evolution, nuclear physics, and binary stellar dynamics. Whether the observed
  mergers come primarily from isolated binary evolution, dynamical formation in dense
  clusters, or primordial black holes has not been resolved. Each formation channel
  predicts distinctive mass ratio, spin alignment, and redshift distributions.
systematic_gaps:
  - The low-mass gap (3-5 solar masses, between heaviest neutron stars and lightest
    black holes) has only 2 candidate detections; its reality is statistically uncertain.
  - Population synthesis models differ by factors of 10-100 in predicted merger rates
    for different formation channels, making channel inference ambiguous.

id: u-black-hole-information-paradox
title: >
  Is information that falls into a black hole preserved (as implied by quantum
  unitarity and AdS/CFT) or destroyed (as implied by Hawking's original
  calculation) — and what is the precise physical mechanism by which
  information escapes in Hawking radiation?
status: open
priority: critical
disciplines:
  - theoretical-physics
  - quantum-gravity
  - information-theory
  - astrophysics
summary: >
  Hawking's 1975 calculation showed black holes emit thermal radiation and
  evaporate completely. Thermal radiation is maximally mixed — it carries no
  information about what fell in. But quantum mechanics requires unitary evolution:
  information cannot be destroyed. This is Hawking's information paradox.

  AdS/CFT (Maldacena 1997) strongly suggests unitarity is preserved — the CFT
  is manifestly unitary, so the AdS bulk (including black holes) must also
  evolve unitarily. The Page curve (1993) — the entanglement entropy of
  Hawking radiation first grows then decreases, recovering zero at the end of
  evaporation — must hold if information is preserved.

  Recent progress: Penington (2019) and Almheiri et al. (2019) used the
  "island formula" for entanglement entropy (involving quantum extremal surfaces)
  to derive the Page curve from semiclassical gravity calculations. But the
  precise microscopic mechanism — how a specific quantum state falling in
  determines the specific correlations in the radiation — remains unknown.
  The "firewall paradox" (AMPS 2012) suggests that preserving information may
  require violating the equivalence principle at the horizon for infalling observers.
systematic_gaps:
  - Microscopic mechanism for information escape from black hole Hawking radiation
  - Resolution of AMPS firewall paradox (equivalence principle vs. unitarity)
  - Non-perturbative derivation of the island formula from first principles
  - Connection between bulk (gravitational) and boundary (CFT) entanglement structure
suggested_hypotheses:
  - h-spacetime-emerges-from-entanglement

id: u-hott-univalence-axiom-computational-interpretation
title: >
  What is the computational interpretation of the Univalence Axiom in Homotopy
  Type Theory — does it have a constructive proof term, and can HoTT be given
  a complete computational semantics that makes the axiom provable rather than assumed?
status: open
priority: high
disciplines:
  - type-theory
  - mathematics
  - logic
  - computer-science
summary: >
  The Univalence Axiom (UA) of HoTT states that equivalent types are equal:
  (A ≃ B) ≃ (A = B). This is a powerful extensionality principle that subsumes
  function extensionality and allows identification of isomorphic mathematical
  structures. The axiom is consistent with Martin-Löf type theory (Voevodsky's
  simplicial set model) but has no known computational content — it is added as
  an axiom without a proof term. The Cubical Type Theory (Cohen et al. 2016;
  Angiuli et al. 2018) provides a computational interpretation where UA is provable
  (not just consistent), but the relationship between cubical and simplicial
  homotopy type theory is not fully established. Whether a canonical computational
  interpretation of HoTT exists that makes proof assistants (Agda, Coq) fully
  effective for homotopy-theoretic mathematics is open.
systematic_gaps:
  - The computational content of the Univalence Axiom (what does running a program
    of type UA look like?) is not defined in standard HoTT.
  - The relationship between Cubical Type Theory and the simplicial set model
    (canonicity, initiality) is not fully proved.
  - Whether univalence can be added to proof assistants without breaking definitional
    equality (which is required for efficient type checking) is unknown.
related_bridges:

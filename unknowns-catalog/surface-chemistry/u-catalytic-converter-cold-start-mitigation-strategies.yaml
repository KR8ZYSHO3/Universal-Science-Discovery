id: u-catalytic-converter-cold-start-mitigation-strategies
title: >
  What are the most cost-effective strategies to eliminate the cold-start emission
  spike (responsible for ~80% of vehicle emissions per trip) for both conventional
  and hybrid powertrains as electrification penetrates the fleet?
status: open
priority: high
disciplines:
  - surface-chemistry
  - catalysis
  - automotive-engineering
  - environmental-science
summary: >
  The cold-start problem: the TWC is inactive below light-off temperature T₅₀ ≈ 250°C,
  and cold-start emissions account for ~80% of a vehicle's regulated emissions per trip.
  Solutions under investigation: (1) electrically heated catalysts (EHC) — immediate
  light-off, adds 1-2 kW electrical load; (2) thermally insulated close-coupled
  catalysts — retain heat between trips; (3) passive NOₓ adsorbers (PNA) — store
  NOₓ during cold start and release for conversion after light-off; (4) hydrocarbon
  traps — adsorb HC during cold start and desorb for catalytic oxidation after light-off.
  For hybrid vehicles, the intermittent engine operation creates repeated cold starts,
  making the problem worse. The optimal combination of these strategies for
  different drive cycles, ambient temperatures, and electrification levels is unknown.
systematic_gaps:
  - PNA and HC trap performance under real-world driving conditions (variable
    temperature, humidity, aging) has not been fully characterized over 150,000 mile lifetimes.
  - The economic break-even point between EHC electricity cost and avoided emission
    penalties has not been systematically analyzed across markets and regulatory regimes.
  - Cold-start strategies for hybrid vehicles with prolonged engine-off periods
    are not standardized or optimized.
related_bridges:

id: u-fiber-nonlinearity-capacity-limit-shannon
title: >
  What is the true Shannon capacity of the optical fiber channel including Kerr
  nonlinearity, and can nonlinear Fourier transform (NFT) based transmission
  systems approach this capacity limit in practical deployments?
status: open
priority: high
disciplines:
  - information-theory
  - nonlinear-optics
  - telecommunications
  - physics
summary: >
  The Shannon capacity of the linear AWGN channel grows logarithmically with SNR.
  For optical fiber with Kerr nonlinearity, the channel is not linear — increasing
  power reduces noise but also increases nonlinear distortion (SPM, XPM, FWM),
  creating a capacity-maximizing optimal launch power and a finite maximum capacity.
  The "nonlinear Shannon limit" for optical fiber is disputed: Essiambre et al.
  (2010) estimated ~100 Tbps for standard SMF; subsequent work has challenged whether
  a hard limit exists or whether nonlinearity can be treated as a perturbation.
  The nonlinear Fourier transform (Ablowitz-Kaup-Newell-Segur, 1973; Turitsyn 2017)
  transforms the NLS equation into decoupled linear channels (soliton spectrum) —
  potentially enabling transmission that avoids nonlinear crosstalk entirely.
  Whether NFT-based transmission can practically approach the nonlinear channel
  capacity and scale to multi-span, multi-channel systems is unknown.
systematic_gaps:
  - The exact Shannon capacity of the optical fiber nonlinear channel (integrating
    over all launch powers, modulation formats, and DSP algorithms) has not been
    rigorously computed.
  - NFT-based transmission has been demonstrated in short-haul laboratory experiments;
    extension to transoceanic multi-span systems with amplifier noise has not been achieved.
  - Whether the NFT approach degrades gracefully with realistic fiber parameters
    (dispersion maps, amplifier noise, PMD) is not established.

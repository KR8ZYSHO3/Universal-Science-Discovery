id: u-optogenetics-human-therapeutic-scale-delivery
title: >
  What are the barriers to scaling optogenetic therapies from proof-of-concept
  (retinitis pigmentosa) to broader neurological conditions (Parkinson's, epilepsy,
  depression) — specifically the challenges of viral vector delivery, light penetration
  through tissue, and long-term immune tolerance?
status: open
priority: high
disciplines:
  - gene-therapy
  - neuroscience
  - biomedical-engineering
  - optogenetics
summary: >
  The 2021 Sahel et al. trial demonstrated optogenetics in humans (AAV-ChrimsonR
  delivery to retinal ganglion cells → partial vision restoration in retinitis
  pigmentosa). The retina is uniquely accessible (direct injection, thin tissue,
  optical access via glasses). Extending to CNS targets faces four barriers:
  (1) Light delivery: brain tissue scatters light strongly (scattering length ~1 mm
  at 470 nm); two-photon optogenetics can address depth but requires ultra-short
  pulse lasers not yet miniaturized for chronic implants. (2) AAV delivery to large
  brain volumes: current AAV titers and tropisms cover mm³; human brain is 1350 cm³;
  systemic delivery (IV) faces blood-brain barrier and off-target expression.
  (3) Opsin immunogenicity: ChR2 from Chlamydomonas reinhardtii is foreign to humans;
  immune responses to opsin-expressing cells have not been fully characterized.
  (4) Chronic tissue response to fiber optic implants: glial scarring, tissue heating.
systematic_gaps:
  - Long-term (years) immune response to opsin expression in human neurons has not
    been studied; primate data suggests some tolerance but human immune systems differ.
  - Light delivery devices for deep brain stimulation (DBS replacement with optogenetics)
    that meet the size/power/biocompatibility requirements of chronic implants have
    not been demonstrated.
  - Promoter specificity in human brain tissue differs from rodents; cell-type
    specific targeting reliability in humans is unknown.
related_bridges:
  - b-optogenetics-neural-circuit-control
last_reviewed: "2026-05-07"

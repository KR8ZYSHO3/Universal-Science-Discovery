id: u-ptm-crosstalk-code-histone-combinatorial-regulation
title: >
  What is the combinatorial logic of the histone PTM code — which combinations
  of marks are truly synergistic or antagonistic, and can a quantitative model
  predict gene expression from histone modification patterns genome-wide?
status: open
priority: high
disciplines:
  - epigenetics
  - biochemistry
  - genomics
  - systems-biology
summary: >
  The histone code hypothesis (Strahl & Allis 2000) proposes that combinatorial
  PTMs on histones constitute a regulatory code read by effector proteins. Individual
  marks are well-characterized (H3K4me3 = active promoter; H3K27me3 = Polycomb
  repression; H3K9me3 = heterochromatin; H3K27ac = active enhancer). But the
  combinatorial rules — whether H3K4me3 + H3K27me3 bivalency at developmental
  genes means poised-for-activation or something else, whether PTM synergy is
  quantitative or categorical, and whether a predictive model of gene expression
  from histone marks can be built — are not established. The problem is compounded
  by cell-type specificity: the same histone mark combination can have different
  functional consequences in different cell types depending on transcription factor
  context.
systematic_gaps:
  - Systematic double- and triple-PTM domain binding specificity (combinatorial
    binding) has not been measured for most reader domains; data is largely for
    single PTMs.
  - Quantitative models predicting gene expression levels from histone mark patterns
    genome-wide perform modestly (R² ~ 0.5-0.7); the missing variance source is unknown.
  - The causal directionality (does PTM pattern cause gene expression change, or
    does transcription cause the PTM change?) is poorly established for most marks.
related_bridges:

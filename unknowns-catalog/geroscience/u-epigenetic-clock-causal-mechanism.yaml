id: u-epigenetic-clock-causal-mechanism
title: Are DNA methylation epigenetic clocks a causal driver of aging or a downstream biomarker, and which specific CpG sites regulate aging-related gene expression versus merely correlate with it?
status: open
priority: critical
disciplines:
  - epigenetics
  - geroscience
  - genomics
summary: >
  Epigenetic clocks (Horvath, GrimAge) predict biological age and mortality with
  high accuracy, but the causal relationship between CpG methylation and the aging
  process is unclear. Partial reprogramming (Yamanaka factors) resets epigenetic
  clocks in animal models and extends healthspan, suggesting causality. However,
  clock CpG sites may reflect downstream consequences of aging processes (oxidative
  damage, metabolic changes) rather than driving aging. Key unknowns: (1) which
  clock CpGs control aging-relevant gene expression, (2) can site-specific
  methylation editing (dCas9-DNMT) at clock sites slow functional aging, (3)
  what is the upstream driver of methylation drift?
systematic_gaps:
  - No experiment has demonstrated that reversing methylation at a subset of clock CpGs extends lifespan without full reprogramming
  - The chromatin context of clock CpGs (enhancers, promoters, repeats) is catalogued but functional roles are not established
  - Single-cell resolution shows high methylation heterogeneity within tissues; bulk clock measurements may obscure causal cell types
related_bridges:
  - b-epigenetic-clocks-aging-biomarkers
last_reviewed: "2026-05-07"

id: u-quantum-coherence-biological-sensing
title: Does quantum coherence play a functional role in biological sensory systems (olfaction, magnetoreception, photosynthesis) beyond the classical noise floor?
status: open
priority: high
disciplines:
  - quantum-biology
  - biophysics
  - sensory-neuroscience
summary: >
  Quantum coherence effects have been proposed in several biological systems: (1) 
  photosynthetic energy transfer in light-harvesting complexes (long-lived coherence
  observed by 2D spectroscopy), (2) radical pair mechanism in cryptochrome for avian
  magnetoreception, (3) vibrational mode of odorant molecules in olfactory detection.
  The functional significance of observed coherence is contested — whether it improves
  energy transfer efficiency vs. being an epiphenomenon of the molecular structure.
  In magnetoreception, the EPR-based radical pair mechanism is the leading model and
  can explain behavioral data, but quantum coherence times at physiological temperatures
  are shorter than classical models require for sensitivity at geomagnetic field strengths.
systematic_gaps:
  - No in-vivo measurement of coherence lifetimes in cryptochrome under physiological
    conditions at body temperature has been reported.
  - The frequency-dependence of avian compass disorientation (RF sensitivity pattern)
    matches radical pair predictions but has not been falsified against classical alternatives.
related_bridges:

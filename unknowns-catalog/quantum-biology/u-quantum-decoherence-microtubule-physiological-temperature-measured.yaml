id: u-quantum-decoherence-microtubule-physiological-temperature-measured
title: >
  What is the actual quantum decoherence timescale of tubulin dimer conformational
  superpositions in neuronal microtubules at physiological temperature (310 K),
  measured directly in situ, and how does it compare to Tegmark's theoretical
  prediction of ~10⁻¹³ s?
status: open
priority: medium
disciplines:
  - quantum-physics
  - biophysics
  - neuroscience
  - structural-biology
summary: >
  Tegmark (2000) calculated that quantum superpositions of tubulin dimer states
  in neuronal microtubules decohere in ~10⁻¹³ s at body temperature, due to
  thermal interaction with surrounding water and ions. This is 10¹⁰ times
  shorter than neural timescales (~10⁻³ s), leading Tegmark to conclude that
  quantum coherence is irrelevant to neural computation.

  Hameroff & Penrose (2014) argue that: (1) ordered water in the microtubule
  lumen may provide topological protection; (2) dipole-dipole interactions
  among tubulin dimers could create coherent domains; (3) anesthetic effects
  on consciousness (clinical doses of anesthetics bind tubulin and alter
  consciousness) suggest tubulin is relevant to cognition.

  Neither side has direct experimental measurements of quantum coherence in
  microtubules in situ. Indirect evidence comes from: neutron scattering
  (reveals tubulin conformational dynamics but not quantum coherence); optical
  2D spectroscopy (used for photosynthesis — not applied to microtubules);
  single-molecule force spectroscopy (measures tubulin mechanics, not quantum state).

  Direct measurement of quantum decoherence in neuronal microtubules at 310 K
  would either confirm Tegmark (ending the debate) or reveal an unexpectedly
  long decoherence time (requiring explanation and potentially supporting Orch-OR).
systematic_gaps:
  - 2D electronic spectroscopy of purified tubulin in aqueous solution has not
    been performed to measure quantum beat signatures.
  - In situ measurements within intact neurons (where ordered water, MAPs, and
    membrane potential could influence coherence) have not been attempted.
  - The specific tubulin GTP-hydrolysis conformational transition proposed as
    the quantum state by Hameroff has not been characterised by quantum
    chemical calculation to determine if it supports superposition.
  - Anesthetic binding to tubulin in microtubules vs. other cellular targets
    (GABA receptors, ion channels) has not been quantitatively compared for
    dose-response at clinically relevant concentrations.
suggested_hypotheses:

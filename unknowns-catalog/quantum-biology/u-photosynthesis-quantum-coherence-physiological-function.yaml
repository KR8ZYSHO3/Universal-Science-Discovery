id: u-photosynthesis-quantum-coherence-physiological-function
title: >
  Does quantum electronic coherence in photosynthetic light-harvesting complexes
  at physiological temperature (300K) provide any functional enhancement of energy
  transfer efficiency beyond what classical Förster/Redfield theory predicts, or is
  the ~95% quantum efficiency of primary charge separation achievable by purely
  classical mechanisms?
status: open
priority: high
disciplines:
  - quantum-biology
  - physical-chemistry
  - biophysics
  - photosynthesis
summary: >
  Fleming et al. (2007) reported long-lived (~660 fs) quantum beats in the FMO complex
  at 77K interpreted as electronic quantum coherence enhancing energy transfer efficiency.
  The claim was influential but contested. Subsequent experiments at 300K show much
  shorter coherence (sub-100 fs) and theoretical work (Cao et al. 2020 review in Science)
  concluded that vibrational coherence — not electronic — accounts for most observed
  oscillatory signals. The core unresolved question: even if electronic coherence is
  short-lived at 300K, could it provide a functional advantage during the ~50 fs timescale
  of the fastest energy transfer steps? PSII already achieves ~95% quantum efficiency
  of primary charge separation via classical Förster/Redfield mechanisms — is there
  any remaining functional room for quantum enhancement? Two competing narratives:
  (1) quantum coherence is a biological adaptation for efficient energy transfer;
  (2) quantum coherence is an epiphenomenon — thermal noise too large at 300K for
  coherence to persist long enough to be functionally relevant (dephasing time < energy
  transfer time).
systematic_gaps:
  - 2D electronic spectroscopy at 300K in vivo (in living chloroplasts, not isolated
    protein in buffer) has not been achieved with sufficient signal/noise to definitively
    separate vibrational from electronic coherence.
  - Genetic/spectroscopic comparison of organisms with different antenna architectures
    (FMO-containing green sulfur bacteria vs. LHC-containing plants vs. phycobilisomes
    in cyanobacteria) in terms of quantum efficiency vs. coherence lifetime has not been
    done with matched methodology.
  - Isotope substitution (¹²C → ¹³C in chromophores) shifts vibrational frequencies
    without changing electronic energy levels — a tool to distinguish electronic from
    vibrational coherence in 2DES that has not been systematically applied.
suggested_hypotheses:
  - >
    Electronic quantum coherence at 300K in FMO and LHCII is functionally irrelevant:
    energy transfer rates calculated by Redfield theory (secular approximation, Markovian
    bath) match measured energy transfer rates to within 5%, and genetic modification of
    pigment-protein coupling to eliminate coherence does not decrease quantum yield of
    charge separation — demonstrating that classical mechanisms achieve near-unity efficiency.

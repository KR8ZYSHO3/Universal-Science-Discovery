id: u-quantum-coherence-biological-systems-nmr-detectable
title: >
  Is quantum coherence (superposition, entanglement, or tunnelling) functionally
  relevant in biological systems at physiological temperature — in photosynthesis
  energy transfer, avian magnetoreception, or enzyme catalysis — and could
  solid-state NMR or dynamic nuclear polarisation techniques detect coherence
  lifetimes long enough to be biologically functional?
status: open
priority: critical
disciplines:
  - quantum-biology
  - biophysics
  - NMR-spectroscopy
  - photochemistry
summary: >
  Fleming et al. (2007) reported long-lived quantum beats in the Fenna-Matthews-Olson
  (FMO) photosynthetic complex at 77K, suggesting vibronic coherence assists energy
  transfer. The functional relevance of coherence in room-temperature photosynthesis
  is vigorously contested: (1) vibronic (vibrational-electronic) coupling may sustain
  coherence beyond what pure electronic decoherence allows; (2) noise-assisted quantum
  walks may be more efficient than classical hopping even with decoherence.
  Similarly, avian magnetoreception (European robin compass) is proposed to use
  radical-pair quantum spin dynamics in cryptochrome proteins — coherent spin
  dynamics for ~1 μs in a protein at 37°C. Enzyme catalysis (H-transfer in
  alcohol dehydrogenase, aromatic amine dehydrogenase) shows kinetic isotope effects
  > classical prediction — quantum tunnelling contribution. NMR could potentially
  detect functional quantum coherence through T₁ρ (rotating frame relaxation) and
  dynamic nuclear polarisation (DNP) enhanced solid-state NMR, which probes μs
  timescale dynamics in proteins. Whether any of these systems has measurable,
  functionally significant quantum coherence at physiological temperature is
  unresolved.
systematic_gaps:
  - Room-temperature 2D electronic spectroscopy experiments on FMO and other photosynthetic complexes have not definitively resolved whether quantum beats represent excitonic coherence or vibrational contributions (ground state wavepackets).
  - DNP-enhanced solid-state NMR has not been applied to measure spin coherence lifetimes in cryptochrome radical pairs in situ — existing EPR studies use isolated proteins or model radicals.
  - The kinetic isotope effect in enzyme tunnelling has not been connected to measurable NMR observables that would distinguish quantum from classical H-transfer mechanisms.
suggested_hypotheses:
  - >
    Solid-state DNP-NMR of intact avian cryptochrome Cry4 at 37°C will reveal
    radical-pair spin coherence times T₂* > 100 ns — sufficient for geomagnetic
    field-sensitive spin dynamics — distinguishable from diamagnetic protein by
    field-dependent ¹H spin relaxation anisotropy.

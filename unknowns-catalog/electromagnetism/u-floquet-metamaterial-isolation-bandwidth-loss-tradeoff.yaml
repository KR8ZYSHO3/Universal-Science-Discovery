id: u-floquet-metamaterial-isolation-bandwidth-loss-tradeoff
title: >
  For magnet-free isolators built from time-modulated metamaterial cells, what closed-form scaling laws link modulation
  frequency, harmonic leakage, insertion loss, and isolation bandwidth when semiconductor switches are bandwidth-limited?
status: open
priority: medium
disciplines:
  - electromagnetism
  - electrical-engineering
summary: >
  Demonstrator papers achieve impressive isolation peaks but operational bandwidth for cellular/WPT coexistence requires
  understanding Floquet sideband pollution into adjacent channels — under-documented compared to static isolator datasheets.
systematic_gaps:
  - Temperature drift of switch timing versus isolation stability under environmental vibration is rarely quantified.
  - EMC certification pathways for time-modulated structures remain immature relative to ferrite circulators.

suggested_hypotheses:
  - h-staggered-commutation-frequency-threshold-for-target-isolation-db

related_bridges:

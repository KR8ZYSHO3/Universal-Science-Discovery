id: u-epsilon-near-zero-loss-radiation-q-tradeoff
title: >
  For epsilon-near-zero resonances in finite-thickness films, how do material loss tangent, radiation leakage,
  and substrate coupling partition measured Q — and which term dominates at optical versus GHz engineering scales?
status: open
priority: medium
disciplines:
  - electromagnetism
  - materials-science
summary: >
  ENZ peaks promise field compression but realized linewidths reflect Ohmic loss in metals, surface roughness,
  and mode leakage into substrates. Unified scaling laws across wavelength decades remain scattered across optics and RF literature.
systematic_gaps:
  - Few cross-frequency benchmarks using identical dispersion extraction workflows (ellipsometry vs VNA).
  - Thermal and nonlinear saturation near field hotspots alter ε(ω) during operation.

suggested_hypotheses:
  - h-enz-crossover-curvature-predicts-local-q-maximum-thin-film-cavity

related_bridges:

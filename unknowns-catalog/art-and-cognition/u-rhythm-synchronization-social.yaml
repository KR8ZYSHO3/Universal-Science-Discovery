id: u-rhythm-synchronization-social
title: What is the social function of rhythmic synchronization in music and collective movement, and does entrainment causally increase prosocial behavior?
status: open
priority: medium
disciplines:
  - cognitive-science
  - art-and-cognition
  - social-psychology
  - evolutionary-psychology
summary: >
  Rhythmic entrainment—synchronizing movement or vocalization to a shared beat—
  occurs in music, religious ritual, military drill, and infant-caregiver interactions.
  Synchrony reliably increases prosocial behavior (cooperation, trust, helping) in
  laboratory studies. The proposed mechanisms include self-other overlap from shared
  motor states, affiliative signaling from coordinated action, and shared positive
  affect. Whether synchrony causes prosociality or whether prosocial contexts increase
  spontaneous synchrony (causality direction) is not clearly established across study
  designs. The evolutionary function—why humans have uniquely strong beat-synchronization
  tendencies compared to other species—is debated.
systematic_gaps:
  - Many synchrony-prosociality studies used demand characteristics (participants know they are synchronizing); pre-registered blind replication studies are rare.
  - The physiological mechanism linking motor synchrony to prosocial behavior (oxytocin? mirror neuron activation? shared arousal state?) has not been established.
  - Longitudinal studies of rhythmic training effects on social behavior in children are few and have not found consistent effects outside musical contexts.
last_reviewed: "2026-05-05"

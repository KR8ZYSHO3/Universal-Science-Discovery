id: u-music-universals
title: Are there universal features of music across human cultures, and what are the cognitive or evolutionary origins of these universals?
status: open
priority: high
disciplines:
  - ethnomusicology
  - cognitive-science
  - art-and-cognition
  - evolutionary-psychology
summary: >
  A 2019 Science study (Mehr et al.) found cross-cultural agreement in recognizing
  dance, lullaby, healing, and love song functions from brief musical excerpts. Some
  features—tonal organization, beat-based rhythm, melodic contour—appear in most
  musical traditions. However, harmony (consonance preferences), scale systems, and
  rhythmic complexity vary dramatically. Whether music universals reflect shared
  cognitive constraints, universal auditory statistics, or cultural diffusion through
  historical contact is debated. The evolutionary origin of music—sexual selection,
  social bonding, or honest signal of coalition quality—has not been resolved.
systematic_gaps:
  - Cross-cultural music psychology studies are methodologically heterogeneous; direct comparison of findings across populations is difficult.
  - The corpus of analyzed musical traditions is biased toward written, Western, and recorded music; oral traditions of small-scale societies are underrepresented.
  - Whether the universality of musical features reflects universal perceptual constraints or common social functions (that could be met by different musical structures) has not been disentangled.
last_reviewed: "2026-05-05"

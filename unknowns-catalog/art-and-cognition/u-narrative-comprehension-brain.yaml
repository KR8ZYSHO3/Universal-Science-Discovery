id: u-narrative-comprehension-brain
title: What brain regions and computational processes support the construction of narrative mental models during story comprehension?
status: open
priority: medium
disciplines:
  - cognitive-neuroscience
  - art-and-cognition
  - linguistics
  - cognitive-science
summary: >
  Narrative comprehension requires tracking characters, causal chains, spatial settings,
  and temporal ordering simultaneously. Default mode network (DMN) regions—medial
  prefrontal, posterior cingulate, hippocampus, angular gyrus—activate during story
  comprehension and appear to track narrative structure (event boundaries, surprise,
  character goals). The computations performed by these regions—whether they represent
  situation models, simulate future events, or integrate episodic memory—are not
  fully specified. How literary expertise (reading practice, genre knowledge) modifies
  narrative processing, and whether narrative comprehension circuits are uniquely
  human, are open questions.
systematic_gaps:
  - Event segmentation theory predicts DMN activity at narrative event boundaries, but the content of DMN representations (what is being computed) is not established.
  - Cross-linguistic and cross-cultural neuroimaging of narrative comprehension has not been conducted at sufficient scale to identify universal vs. language-specific circuits.
  - The developmental trajectory of narrative comprehension abilities and their neural substrates has not been mapped from early childhood to adulthood with longitudinal imaging.
last_reviewed: "2026-05-05"

id: u-creativity-intelligence-correlation
title: What is the relationship between general intelligence (g) and creative ability, and does the threshold hypothesis hold above IQ 120?
status: open
priority: medium
disciplines:
  - cognitive-science
  - art-and-cognition
  - psychology
  - neuroscience
summary: >
  The threshold hypothesis proposes that intelligence is necessary but not sufficient
  for creativity: correlations between IQ and creativity measures are moderate below
  IQ ~120, but above that threshold, intelligence no longer predicts creative output.
  Evidence for this threshold is mixed; some studies support it, others find linear
  correlation across the IQ range. Definitional problems (which creativity measure?)
  and sampling issues (most subjects fall below the putative threshold) complicate
  the literature. The neural mechanisms that enable creative ideation independently
  of general cognitive ability—transient hypofrontality, default-executive coupling,
  reduced inhibition—are not consistently replicated.
systematic_gaps:
  - Studies testing the threshold hypothesis use heterogeneous creativity measures (divergent thinking tests, real-world achievement, expert ratings) that may tap different constructs.
  - The few samples with sufficient high-IQ subjects are not representative; longitudinal studies of exceptional intellectual talent (SMPY) use self-report creativity.
  - Whether the threshold (if real) applies to domain-specific creativity (mathematical vs. artistic) or only general creativity is untested.
last_reviewed: "2026-05-05"

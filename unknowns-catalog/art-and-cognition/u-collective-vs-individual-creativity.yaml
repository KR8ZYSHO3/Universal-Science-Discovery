id: u-collective-vs-individual-creativity
title: Under what conditions does group collaboration enhance vs. inhibit creative output compared to individuals working alone?
status: open
priority: medium
disciplines:
  - social-psychology
  - art-and-cognition
  - cognitive-science
  - organizational-behavior
summary: >
  Brainstorming groups consistently generate fewer unique ideas than the same number
  of individuals working alone (production blocking, evaluation apprehension). Yet
  some collaborative creative work—jazz ensembles, film crews, scientific collaborations—
  appears to exceed what any individual could achieve alone. The conditions that
  determine whether collaboration enhances or impairs creativity (domain, group size,
  communication structure, diversity, psychological safety) are not fully characterized.
  Whether "group genius" is an emergent property of interaction or simply the sum of
  diverse individual contributions assembled by coordination is theoretically unresolved.
systematic_gaps:
  - Studies comparing individual vs. group creativity almost universally use laboratory tasks (unusual uses, remote associates) that may not generalize to professional creative domains.
  - The role of implicit knowledge sharing in face-to-face creative collaboration (vs. remote) has not been adequately controlled in productivity comparisons.
  - Longitudinal studies of creative team formation and dissolution are rare; whether team creative chemistry develops or declines over time is mostly anecdotal.
last_reviewed: "2026-05-05"

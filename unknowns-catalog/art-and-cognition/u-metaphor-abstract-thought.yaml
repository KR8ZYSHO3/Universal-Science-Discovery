id: u-metaphor-abstract-thought
title: Is abstract thought fundamentally grounded in sensorimotor metaphor (conceptual metaphor theory), or can genuine amodal abstract representation exist?
status: open
priority: high
disciplines:
  - cognitive-linguistics
  - cognitive-science
  - art-and-cognition
  - neuroscience
summary: >
  Conceptual metaphor theory (Lakoff & Johnson) proposes that abstract concepts
  (time, morality, argument) are understood through systematic mappings from
  sensorimotor domains (space, cleanliness, warfare). Neuroimaging finds that processing
  abstract emotional metaphors activates motor and somatosensory cortex. However, the
  embodiment evidence is contested: many studies show small, inconsistently replicated
  activation patterns, and the alternative "language-of-thought" (amodal symbol)
  account has not been ruled out. Whether language itself is the primary vehicle for
  abstract thought (linguistic relativity) or an output channel for amodal reasoning
  is the deepest open question in cognitive linguistics.
systematic_gaps:
  - The sensorimotor activations reported in embodied cognition studies are small and may reflect processing of metaphorical language rather than abstract conceptual structure.
  - The boundary between genuinely embodied and arbitrarily symbolic concepts has not been formally drawn; the theory makes no clear predictions about which concepts should be embodied.
  - Cross-linguistic tests of conceptual metaphor theory using truly distinct metaphor systems (not translations of English metaphors) are rare.
last_reviewed: "2026-05-05"

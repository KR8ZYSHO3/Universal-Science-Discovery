id: u-architectural-emotional-impact
title: What physical properties of built environments causally affect psychological well-being, stress, and cognitive performance?
status: open
priority: medium
disciplines:
  - environmental-psychology
  - art-and-cognition
  - architecture
  - neuroscience
summary: >
  Environmental psychology has identified associations between spatial features—
  ceiling height (high ceilings promote abstract thinking), natural light (reduces
  cortisol, improves mood), biophilic elements (plants, water), room geometry, and
  prospect-refuge balance—and psychological outcomes. However, most evidence is
  correlational, uses small samples, and does not control for occupant expectations,
  culture, or building function. Neuroscience of architecture attempts to identify
  brain responses to architectural spaces using EEG and fMRI, but ecologically valid
  paradigms (actual building navigation) are technically challenging. Whether
  architecture can be scientifically optimized for mental health outcomes is not
  established.
systematic_gaps:
  - Randomized controlled trials of architectural modifications and their effects on wellbeing in real buildings are rare due to cost and logistical constraints.
  - The relative contributions of lighting spectrum, spatial volume, visual complexity, and acoustic characteristics to psychological outcomes have not been independently varied in an adequately powered study.
  - Cultural variation in architectural preference and its interaction with psychological effects has not been systematically mapped.
last_reviewed: "2026-05-05"

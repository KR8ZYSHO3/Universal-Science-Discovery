id: u-humor-cognitive-mechanism
title: What is the computational and neural mechanism of humor comprehension, and why does incongruity resolution trigger positive affect?
status: open
priority: low
disciplines:
  - cognitive-science
  - art-and-cognition
  - neuroscience
  - linguistics
summary: >
  Humor comprehension requires detecting incongruity (violation of expectation),
  resolving it through reinterpretation, and generating positive affect. The
  incongruity-resolution model accounts for many joke types but not all (absurdist
  humor, benign violation). Neuroimaging consistently implicates temporal-parietal
  junction (incongruity detection), inferior frontal gyrus (resolution), and reward
  circuits (positive affect), but the specific computations are not formalized.
  Why resolution of incongruity specifically triggers laughter (rather than just
  surprise) and what the evolutionary function of humor is—social bonding, cognitive
  flexibility signal, honest display of intelligence—are open questions.
systematic_gaps:
  - The boundary between what is funny and what is merely surprising or clever is not computationally characterized beyond informal descriptions of "benign violations."
  - Individual differences in humor comprehension (which correlates with Theory of Mind, language ability, and working memory) have not been fully mapped neurally.
  - Cross-cultural variation in humor content vs. humor structure (mechanism) has not been disentangled in a large pre-registered study.
last_reviewed: "2026-05-05"

id: u-aesthetic-preference-neural-basis
title: What neural circuits and computational principles underlie aesthetic preference, and are these circuits domain-general or art-form specific?
status: open
priority: medium
disciplines:
  - neuroaesthetics
  - cognitive-science
  - art-and-cognition
  - neuroscience
summary: >
  Neuroaesthetics has identified reward circuitry (nucleus accumbens, orbitofrontal
  cortex), default mode network engagement, and early visual cortex activation as
  correlates of aesthetic experience. Whether these circuits are domain-general
  (responding to beauty across visual art, music, literature, and natural scenes)
  or domain-specific is contested. Individual aesthetic preferences show moderate
  heritability (~40%) suggesting genetic contributions, but the pathway from genes
  to neural architecture to preference is unmapped. The relationship between aesthetic
  preference and evolutionary fitness—whether beauty perception is an adaptation or
  a byproduct—remains unresolved.
systematic_gaps:
  - fMRI studies of aesthetic response are largely underpowered and use convenience samples from art-naive Western populations.
  - The computational role of the orbitofrontal cortex in aesthetic vs. other reward evaluation has not been disambiguated.
  - Whether aesthetic preference is a single construct or a family of related but separable processes (formal beauty, emotional resonance, novelty appreciation) has not been tested with confirmatory factor analysis.
last_reviewed: "2026-05-05"

id: u-boolean-network-attractor-landscape-reprogramming
title: >
  Can the Boolean network attractor landscape of a cell type be empirically reconstructed
  from single-cell transcriptomic perturbation data, and does the number of attractors
  scale as sqrt(N) in real gene regulatory networks of measured connectivity K?
status: open
priority: high
disciplines:
  - cell-biology
  - systems-biology
  - theoretical-biology
  - computational-biology
summary: >
  Kauffman's NK Boolean network model predicts that a genome of N genes with K≈2 regulatory
  inputs per gene will have approximately sqrt(N) stable attractor states corresponding to
  distinct cell types. While the sqrt(N) scaling and the attractor-cell-fate correspondence
  have qualitative experimental support (human genome N≈25,000 genes → ~150-200 cell types
  consistent with sqrt(25000)≈158), the precise empirical verification of the scaling law
  in measured gene regulatory networks is lacking. Key unknowns include: (1) whether the
  effective K (in-degree of the real transcription factor network) is indeed ≈2 in human
  cells; (2) whether single-cell RNA-seq perturbation atlases can map the full basin-of-
  attraction landscape for even a small regulatory subnetwork; (3) whether Yamanaka
  reprogramming and direct transdifferentiation correspond to noise-assisted basin crossing
  as predicted by Boolean network basin geometry; and (4) whether attractor enumeration
  algorithms scale to genome-wide Boolean models (N≈25,000 nodes).
systematic_gaps:
  - The effective in-degree K of the human transcriptional regulatory network has not been
    measured at genome-scale with the accuracy needed to test the K=2 criticality hypothesis.
  - No study has reconstructed the full basin-of-attraction landscape of even a 50-gene
    regulatory subnetwork from experimental single-cell perturbation data.
  - The computational complexity of Boolean network attractor enumeration is PSPACE-complete;
    approximate methods for large N are not validated on biological networks.
related_bridges:
  - b-random-boolean-networks-cell-fate
last_reviewed: "2026-05-07"

id: u-stress-granule-phase-separation-pathology
title: "What are the molecular determinants of the liquid-to-solid phase transition in stress granules associated with ALS and FTD, and can quantitative Flory-Huggins models of IDR phase behavior predict which mutations shift condensate viscoelasticity toward pathological hardening before cytotoxicity is observed?"
status: open
priority: critical
disciplines:
  - cell-biology
  - soft-matter
  - biophysics
  - medicine
summary: >
  ALS-linked mutations in TDP-43, FUS, and hnRNPA1 IDRs promote stress granule hardening and amyloid-like
  aggregation. Key unknowns: (1) what changes in the effective Flory-Huggins chi parameter distinguish
  wild-type from ALS-mutant IDR condensates, and can these be measured by quantitative FRAP or
  optical trap microrheology in living cells? (2) Is the liquid-to-solid transition a true thermodynamic
  phase transition (kinetically arrested) or a metastable gel formation dependent on nucleation, and how
  does the distinction affect therapeutic target strategies? (3) Can coarse-grained polymer simulations
  (CALVADOS, Mpipi) predict ALS mutation effects on condensate rheology to guide drug discovery?
systematic_gaps:
  - In-cell quantitative microrheology of stress granules at physiological protein concentrations is technically limited by optical access and throughput
  - The molecular composition of pathological vs. normal stress granules has not been fully mapped by proximity proteomics in patient neurons
  - Coarse-grained simulation force fields for IDR LLPS are not yet validated against condensate viscosity measurements

id: u-ubiquitin-proteasome-proteostasis-collapse-threshold
title: >
  What is the quantitative proteostasis collapse threshold — the misfolded protein flux above which the ubiquitin-proteasome system fails irreversibly — and how does this threshold decline with age?
status: open
priority: high
disciplines:
  - cell-biology
  - systems-biology
summary: >
  Systems biology models predict a proteostasis collapse threshold (bistable switch point) determined by proteasome capacity, E3 ligase abundance, and misfolded protein production rate. The quantitative value of this threshold in neurons and its age-dependent decline have not been measured. Whether the collapse threshold differs between fast-dividing cells (where proteasome capacity is distributed at cell division) and post-mitotic neurons (where proteasomes cannot be diluted) is unknown.

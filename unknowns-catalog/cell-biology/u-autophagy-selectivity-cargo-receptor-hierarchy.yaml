id: u-autophagy-selectivity-cargo-receptor-hierarchy
title: >
  How is cargo selectivity determined in autophagy when multiple cargo receptors
  (p62, NDP52, optineurin, NBR1, TAX1BP1) compete for LC3 binding and ubiquitinated
  substrates simultaneously?
status: open
priority: medium
disciplines:
  - cell-biology
  - biochemistry
  - autophagy
summary: >
  Selective autophagy uses multiple cargo receptors (p62/SQSTM1, NDP52, optineurin,
  NBR1, TAX1BP1) that all bind LC3 family proteins via LIR motifs and ubiquitinated
  cargo via UBA or UBAN domains. These receptors are partially redundant but also
  have distinct specificities (NDP52 and optineurin are primary mitophagy receptors;
  p62 handles misfolded protein aggregates). The rules governing receptor hierarchy —
  which receptor is engaged first, whether they cooperate or compete, how cargo
  size and ubiquitin chain length/linkage (K48 vs K63) influence receptor selection —
  are not fully characterized. The mechanism by which receptor-cargo condensates
  (phase separation) are selectively engulfed by the growing phagophore is also
  unclear.
systematic_gaps:
  - Quantitative competition assays between cargo receptors at physiological
    concentrations have not been performed systematically.
  - The role of receptor oligomerization (p62 bodies, phase separation) in
    creating a threshold for autophagy initiation is not understood mechanistically.
  - How cargo size (single protein vs. mitochondrion vs. bacteria) influences
    autophagosome sizing and LC3-II density has not been systematically measured.
related_bridges:

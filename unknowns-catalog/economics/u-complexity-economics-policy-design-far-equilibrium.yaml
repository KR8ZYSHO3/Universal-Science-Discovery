id: u-complexity-economics-policy-design-far-equilibrium
title: >
  How should economic policy be designed in complexity-economics frameworks where
  markets exhibit multiple attractors, path dependence, and agent-strategy ecology —
  and can minority-game simulations predict when a policy intervention will flip a
  market from an inferior locked-in attractor to a superior one?
status: open
priority: high
disciplines:
  - economics
  - complexity-science
  - social-science
  - physics
summary: >
  Standard economic policy analysis uses representative-agent equilibrium models
  where interventions have predictable equilibrating effects. In complexity economics,
  markets may have multiple stable attractors (technology lock-in, multiple pricing
  equilibria, boom-bust cycles), and policy interventions may either flip the system
  to a different attractor or be absorbed by the existing attractor without effect.
  The El Farol minority game predicts that in coordination games, random or
  uncorrelated policy signals may be more effective than predictable rational-policy
  announcements (because agents adapt their strategies to exploit predictable signals).
  Key open questions: (1) Can agent-based models calibrated to real market data
  predict the critical intervention size needed to escape a lock-in attractor?
  (2) Are there early warning signals (rising variance, critical slowing down) that
  a market is near a tipping point where policy leverage is highest? (3) How should
  carbon pricing be designed to flip the energy market from a fossil-fuel to a
  renewable attractor given positive feedback in both technology cost curves?
systematic_gaps:
  - No validated agent-based model exists that correctly predicts real technology
    lock-in dynamics and can be used for counterfactual policy analysis.
  - Early warning signals for market tipping points have been proposed but not
    validated in real financial or technology adoption data.
  - The relationship between minority-game equilibria and real market microstructure
    is not formally established.

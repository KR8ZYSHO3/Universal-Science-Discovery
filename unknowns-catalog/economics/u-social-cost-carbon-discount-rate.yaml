id: u-social-cost-carbon-discount-rate
title: >
  What is the appropriate social discount rate for computing the social cost
  of carbon (SCC), and how should the Ramsey framework handle ethical
  disagreements about intergenerational equity, uncertainty about long-run
  growth, and fat-tailed climate catastrophe risk?
status: open
priority: critical
disciplines:
  - economics
  - climate-science
  - philosophy
  - decision-theory
summary: >
  The social cost of carbon — the most policy-consequential parameter in climate
  economics — depends critically on the social discount rate, which in the Ramsey
  framework equals r = ρ + η·g (pure time preference + elasticity × growth rate).
  Stern (ρ ≈ 0.1%) and Nordhaus (ρ ≈ 3%) represent opposite ends of an ethically
  contested range. The US Interagency Working Group SCC estimate has ranged from
  $12 (2010) to $190/tCO₂ (2021) largely due to discount rate assumptions.

  Key open questions:
  1. Is the pure rate of time preference ρ an ethical parameter (should future
     lives be discounted?) or an empirical one (calibrated to market interest
     rates)? These give opposite answers.
  2. How should fat-tailed climate damage uncertainty (Weitzman's dismal theorem)
     be handled within expected utility theory vs. alternative risk frameworks
     (robust control, ambiguity aversion, prospect theory)?
  3. Does declining discount rate theory (Weitzman 2001 — using declining
     schedule r(t) to reflect uncertainty about future growth) resolve the
     Stern-Nordhaus controversy, and what empirical data constrains r(t)?
  4. How do tipping points (discontinuous damage functions) change the optimal
     Pigouvian carbon tax relative to smooth-damage IAMs?
systematic_gaps:
  - No consensus method for aggregating heterogeneous national discount rates
    into a global SCC in multi-region IAMs (RICE model)
  - Empirical measurement of η (elasticity of marginal utility) from
    consumption data gives wide range (1.0-3.0) with different methods
  - Palaeoclimate data on tipping points (PETM, Heinrich events) has not been
    systematically incorporated into IAM damage function calibration
  - Behavioural evidence on how people actually discount future climate impacts
    (from experimental economics) is rarely used in normative SCC calculations

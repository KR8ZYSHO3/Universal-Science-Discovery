id: u-ellsberg-ambiguity-aversion-neural-circuit
title: >
  What neural circuits implement ambiguity aversion, and does the brain represent ambiguous uncertainty as a set of possible probability distributions or as a single imprecise probability estimate?
status: open
priority: high
disciplines:
  - economics
  - cognitive-science
summary: >
  Neuroimaging studies show increased amygdala and prefrontal activation during ambiguous versus risky choices, but whether this reflects the computation of maxmin expected utility, Choquet integration, or a simpler heuristic (e.g., worst-case default) is unknown. The representational format of second-order uncertainty in the brain—point estimate of unknown probability versus explicit probability set—cannot be distinguished with current neuroimaging methods.

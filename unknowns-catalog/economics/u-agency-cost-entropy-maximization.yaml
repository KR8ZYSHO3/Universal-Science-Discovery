id: u-agency-cost-entropy-maximization
title: Can agency costs be quantitatively predicted from the effective temperature of information asymmetry in the principal-agent relationship, and does the statistical mechanics free energy formulation improve on standard incentive theory predictions of optimal contract design?
status: open
priority: medium
disciplines:
  - economics
  - finance
  - statistical-mechanics
  - complex-systems
summary: >
  Jensen and Meckling (1976) derived agency costs as the welfare loss from incentive
  misalignment, but their framework lacks a quantitative prediction for the magnitude
  of these costs as a function of information asymmetry. Statistical mechanics
  offers a partition function approach: the equilibrium effort distribution is
  a Boltzmann distribution over effort levels, with temperature set by information
  asymmetry (noise in performance measurement). Key unknowns: (1) Can the effective
  temperature of information asymmetry be estimated from CEO compensation and
  firm performance data? (2) Does the free energy formulation predict observed
  agency costs better than standard utility-maximisation models? (3) Does
  the spin-glass formulation of multi-layered hierarchies predict the onset of
  governance dysfunction (board capture, management entrenchment)? (4) Do
  corporate governance reforms that reduce information asymmetry produce
  the temperature-lowering effects predicted by the statistical mechanics analogy?
systematic_gaps:
  - No empirical test of the Boltzmann distribution model for agent effort choice
  - No estimation of effective information-asymmetry temperature from compensation data
  - Statistical mechanics predictions for optimal equity stakes not derived nor tested
related_bridges:

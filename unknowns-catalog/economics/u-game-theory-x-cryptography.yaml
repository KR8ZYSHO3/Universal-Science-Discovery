id: u-game-theory-x-cryptography
title: >
  Under what conditions does rational cryptography (game-theoretic security) coincide
  with or diverge from standard computational security definitions?
status: open
priority: medium
disciplines:
  - economics
  - computer_science
  - mathematics
  - cryptography
summary: >
  Rational cryptography models parties as rational agents maximizing utility rather
  than adversaries with arbitrary computational power. The conditions under which
  game-theoretic security (Nash equilibrium stability of protocols) coincides with
  standard computational security (indistinguishability, zero-knowledge) are not fully
  characterized. In particular: there exist protocols that are game-theoretically
  secure but computationally insecure (rational parties won't deviate even if they
  could break cryptographic assumptions); conversely, computationally secure protocols
  may not be Nash equilibria for rational parties with specific utility functions
  (e.g., blockchain selfish mining is profitable even when honest behavior is
  computationally secure).
systematic_gaps:
  - A general theorem characterizing when computational security implies game-theoretic security (and vice versa) for arbitrary protocol classes has not been proved
  - The game-theoretic security of real blockchain protocols (Ethereum, Bitcoin) under rational miner models with complete information has not been formally analyzed with modern equilibrium concepts
  - The design space of cryptographic protocols that are simultaneously computationally secure AND Nash equilibria for rational parties has not been systematically characterized
related_bridges:
  - b-game-theory-x-cryptography

id: u-chemical-potential-utility-non-equilibrium-markets
title: >
  Can non-equilibrium thermodynamic extensions of chemical potential (Onsager coefficients,
  entropy production rates) be directly mapped onto dynamic models of market disequilibrium,
  price adjustment kinetics, and out-of-equilibrium utility flows in financial crises?
status: open
priority: medium
disciplines:
  - economics
  - thermodynamics
  - econophysics
  - complexity-economics
summary: >
  The formal equivalence between chemical potential equalization at thermodynamic equilibrium
  and marginal utility equalization in Walrasian market equilibrium is mathematically precise
  at equilibrium, but real markets spend substantial time out of equilibrium: prices over- and
  under-shoot, utility-equalizing conditions are violated during crises, and market clearing is
  not instantaneous. Non-equilibrium thermodynamics (Onsager relations, entropy production
  minimization, dissipation-fluctuation theorems) provides a rich mathematical framework for
  systems near but not at equilibrium, but whether these tools translate to meaningful
  predictions about price dynamics, market instability, and recovery kinetics is unknown.
  Specific open questions: (1) Does Onsager reciprocity for coupled transport processes have
  an economic analog in cross-price effects that goes beyond Slutsky symmetry? (2) Can
  entropy production rate in a market system (rate of utility dissipation due to transaction
  costs, information asymmetry) predict systemic risk? (3) Does the fluctuation theorem (exact
  relations for entropy production in non-equilibrium systems) apply to excess return
  distributions in financial markets?
systematic_gaps:
  - No empirical study has measured economic analogs of Onsager coefficients (cross-effects
    between markets) and tested reciprocity symmetry as a constraint on cross-price elasticities.
  - The definition of entropy production in an economic system has no consensus; multiple
    proposals (Georgescu-Roegen, Foley, Mimkes) are not operationally testable.
  - Financial crisis dynamics have not been modeled using non-equilibrium thermodynamic
    frameworks with quantitative predictions tested against historical data.
related_bridges:

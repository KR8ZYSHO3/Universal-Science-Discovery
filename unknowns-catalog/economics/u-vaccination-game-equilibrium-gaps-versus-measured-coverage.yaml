id: u-vaccination-game-equilibrium-gaps-versus-measured-coverage
title: >
  In middle-income countries with partial vaccine financing, how large is the gap between Nash-equilibrium voluntary uptake predicted by calibrated payoff matrices and realized childhood vaccine coverage after accounting for administrative logistics, parental beliefs, and healthcare access barriers?
status: open
priority: high
disciplines:
  - economics
  - public-health
summary: >
  Theory delivers benchmark gaps under rational expectations; field measurements mix behavioral biases and supply constraints — integrated causal inference linking surveys to administrative uptake remains incomplete at national scale.
systematic_gaps:
  - Harmonized datasets pairing stated-preference games with administrative vaccine registers longitudinally
  - Structural estimation separating price incentives from trust shocks
suggested_hypotheses:
  - h-price-subsidy-closes-nash-herd-gap-in-agent-based-metapopulations
related_bridges:
  - b-game-theoretic-vaccination-x-herd-immunity-threshold
last_reviewed: "2026-05-07"
references:
  - doi: "10.1073/pnas.0406843101"
    note: Foundational game-theoretic vaccination framing

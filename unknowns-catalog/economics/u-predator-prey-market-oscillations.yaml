id: u-predator-prey-market-oscillations
title: >
  Do real commodity and technology markets exhibit quasi-periodic oscillations
  consistent with Lotka-Volterra predator-prey dynamics, and if so, can LV
  parameters be calibrated from empirical time series to generate useful
  forecasts of boom-bust cycles?
status: open
priority: medium
disciplines:
  - economics
  - ecology
  - complexity-economics
  - industrial-dynamics
summary: >
  Lotka-Volterra dynamics predict closed oscillatory cycles in competing
  populations. The analogy to markets (incumbent vs. disruptor, supply vs.
  demand lag cycles) is structurally compelling but empirically undervalidated.
  Commodity markets (shipping, semiconductors, agricultural goods) do exhibit
  multi-year cycles, but whether these match LV predictions quantitatively —
  and whether LV parameters are stable enough to forecast — is unresolved.

  Key open questions:
  1. Can LV parameters (α, β, γ, δ) be identified from market-share and revenue
     time series using dynamical systems inverse methods (e.g. SINDy)?
  2. Do the calibrated parameters satisfy the conditions for stable oscillations
     (αγ > 0, no fixed-point attractors) or do markets converge to equilibrium?
  3. Does the May (1972) complexity-instability result hold for market ecosystems:
     are industries with more firms and stronger competitive interactions more
     prone to systemic cascades?
  4. Are identified market oscillation periods consistent with the LV prediction
     T ≈ 2π/√(αγ) for calibrated parameters?
systematic_gaps:
  - Long time series of firm-level market shares at the resolution needed for
    LV fitting are proprietary and rarely available for research
  - Most econophysics studies use aggregate indices (stock market) not
    competitive market-share dynamics between specific firms
  - No published study has done formal LV model selection against alternative
    dynamical models (delay-differential equation cobweb, SIR-type diffusion)
    using information criteria
suggested_hypotheses:
  - h-lotka-volterra-semiconductor-capex-cycle

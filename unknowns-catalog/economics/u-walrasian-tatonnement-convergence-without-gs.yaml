id: u-walrasian-tatonnement-convergence-without-gs
title: >
  Under what conditions weaker than gross substitutability does tâtonnement converge to a Walrasian equilibrium, and are these conditions satisfied by empirically observed demand systems?
status: open
priority: high
disciplines:
  - economics
  - mathematics
summary: >
  Gross substitutability is sufficient but not necessary for tâtonnement convergence. The minimal mathematical conditions for convergence of realistic price adjustment processes in economies with complementary goods (e.g., computer hardware/software) are unknown. Whether the conditions for tâtonnement convergence overlap with conditions satisfied by calibrated demand systems from empirical consumer data is an open problem.

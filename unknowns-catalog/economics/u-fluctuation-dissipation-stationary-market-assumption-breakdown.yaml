id: u-fluctuation-dissipation-stationary-market-assumption-breakdown
title: >
  Under what empirical conditions do sum-rule or fluctuation–dissipation-style integrals over return
  correlations stabilize enough to be informative, and when do structural breaks invalidate them entirely?
status: open
priority: medium
summary: >
  Crisis periods dominate risk but violate stationarity. This unknown asks for pre-registered stationarity
  tests and hierarchical models that separate fast microstructure noise from slower volatility states.

systematic_gaps:
  - "Lack of shared datasets with millisecond trades and identified macro news shocks for controlled breaks."
  - "Nonlinear leverage effects couple mean and variance unlike equilibrium linear response."

suggested_hypotheses:
  - h-volatility-autocorrelation-satisfies-effective-fd-response


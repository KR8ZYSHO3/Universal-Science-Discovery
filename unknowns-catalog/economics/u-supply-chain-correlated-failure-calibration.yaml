id: u-supply-chain-correlated-failure-calibration
title: How correlated are supplier-edge failures empirically across automotive and semiconductor tiers — and which correlated percolation ensembles fit procurement telemetry better than IID bond deletion baselines?
status: open
priority: high
disciplines:
  - economics
  - operations-research
summary: >
  Stylized bond-percolation metaphors assume independence — real shocks cluster geographically and across financially coupled vendors — requiring calibrated correlated percolation or reliability polynomials beyond textbook IID thresholds — yet proprietary procurement graphs rarely publish cleaned datasets enabling peer replication.
systematic_gaps:
  - Anonymized multi-tier procurement graphs released with correlated disruption events labeled by disaster classes (earthquake, pandemic, geopolitical)
  - Statistical tests comparing IPS disruption catalogs against correlated percolation simulations matched on degree sequences and clustering coefficients
suggested_hypotheses:
  - h-supply-chain-network-x-bond-percolation-disruption
related_bridges:
  - b-supply-chain-network-x-bond-percolation-disruption
last_reviewed: "2026-05-07"
references:
  - doi: 10.1103/RevModPhys.41.574
    note: Percolation theory baseline for stylized independence thresholds used as null comparisons

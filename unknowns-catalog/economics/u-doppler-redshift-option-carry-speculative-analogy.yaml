id: u-doppler-redshift-option-carry-speculative-analogy
title: >
  Is there any falsifiable econometric use of redshift/Doppler line-of-sight formalism beyond pedagogy when
  studying option-adjusted carry, or does the analogy collapse once microstructure and credit events enter?
status: open
priority: low
summary: >
  This unknown flags a deliberately weak cross-domain mapping. It may still inspire visualization and
  systematic-error language, but claims of structural equivalence should be avoided unless a concrete
  identification strategy is proposed and tested.

systematic_gaps:
  - "No peer-reviewed paper proposes a testable mapping from cosmological observables to bond carry."
  - "Microstructure discontinuities in markets lack a clean physical counterpart in homogeneous expansion."


id: u-economic-dissipation-entropy-measure
title: Can economic entropy production be measured as a physically meaningful quantity, and does it predict economic volatility or growth?
status: open
priority: medium
disciplines:
  - economics
  - physics
  - thermodynamics
  - complex-systems
summary: >
  Georgescu-Roegen (1971) proposed that economic processes are irreversible and
  produce entropy. However, a precise, operationally defined measure of "economic
  entropy production" that is consistent with thermodynamic entropy has not been
  established. Candidates include physical entropy production from industrial
  processes (well-defined but not economic), financial transaction irreversibility
  (ill-defined thermodynamically), and information destruction in markets
  (connections to Shannon entropy). Without an operational definition, the
  thermodynamic economics programme remains metaphorical rather than quantitative.
systematic_gaps:
  - A thermodynamically consistent definition of economic entropy production that can be measured from economic data does not exist.
  - Whether measures of economic irreversibility (e.g. bid-ask spreads, transaction costs, market impact) have predictive power for macroeconomic volatility or crisis has not been tested.
  - The connection between physical entropy production (material throughput) and economic value added is empirically poorly established at the firm or sector level.
last_reviewed: "2026-05-05"

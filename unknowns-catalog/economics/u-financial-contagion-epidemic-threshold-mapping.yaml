id: u-financial-contagion-epidemic-threshold-mapping
title: Which epidemic-theoretic quantities (thresholds, outbreak probability) remain identifiable
  for financial contagion when exposures are partially observed and strategies are endogenous?
status: open
priority: medium
disciplines:
- economics
- epidemiology
- network-science
summary: Mapping is suggestive, but hidden leverage and nonlinear pricing can mimic or mask
  classical percolation thresholds. Empirical calibration from public data remains a core
  gap.
systematic_gaps:
- Latent bilateral exposures confound network reconstruction.
- Behavioral responses can change topology during crises, violating static graph assumptions.
suggested_hypotheses:
- h-interbank-default-cascades-exhibit-epidemic-thresholds
related_bridges:
- b-contagion-models-x-financial-crises
last_reviewed: '2026-05-07'
references:

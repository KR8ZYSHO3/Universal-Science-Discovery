id: u-minority-game-x-market-microstructure
title: Does the minority game phase transition at α_c correspond to a measurable threshold in real financial markets (e.g.,
  the number of algorithmic traders per traded asset), and can the transition be detected empirically from order book microstructure
  data?
status: open
priority: medium
disciplines:
- economics
- physics
- mathematics
summary: The minority game predicts a phase transition from exploitable to efficient markets at α_c ≈ 0.34 (P/N where P =
  strategy space size, N = number of traders). In real markets, P and N are unobservable. Whether an empirical proxy (e.g.,
  order flow autocorrelation, bid-ask spread dynamics, algorithmic trader fraction) can detect the phase transition is an
  open question. Several studies have claimed to observe phase-transition-like behaviour in market microstructure but without
  controlled α variation.
systematic_gaps:
- The minority game order parameter (attendance fluctuation) has no direct observable analogue in real market data
- α_c in real markets is confounded by trader heterogeneity and strategy space dimensionality differences
- No controlled experiment varying α (trader count with fixed strategy complexity) has been conducted in financial markets

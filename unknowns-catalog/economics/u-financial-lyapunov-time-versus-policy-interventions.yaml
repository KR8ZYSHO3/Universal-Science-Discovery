id: u-financial-lyapunov-time-versus-policy-interventions
title: >
  When, if ever, is a finite “Lyapunov-like” divergence timescale for payment-system stress a robust early
  warning metric versus a misleading artifact of low-dimensional reductions?
status: open
priority: medium
summary: >
  Operational dashboards need interpretable thresholds. This unknown asks for falsifiable criteria linking
  short-horizon sensitivity metrics to institutional interventions (discount windows, caps, messaging).

systematic_gaps:
  - "Sparse public microdata on intraday withdrawal propagation suitable for dynamical fits."
  - "Regime shifts from policy announcements violate stationarity assumed in many chaos estimators."

suggested_hypotheses:
  - h-bank-run-lyapunov-time-shrinks-with-public-information-leaks

related_bridges:

id: u-collective-risk-pool-stability-evolution
title: How well do laboratory collective-risk games predict field adoption of insurance-like
  institutions when payoffs include social signaling and enforcement?
status: open
priority: medium
disciplines:
- economics
- evolutionary-biology
summary: Theory shows thresholds and stochasticity change cooperation basins, but mapping
  to real institutions requires enforcement, moral hazard, and liquidity — often omitted in
  biological toy models.
systematic_gaps:
- Sparse longitudinal datasets linking game parameters to real premium uptake.
- Moral hazard analogs in biological cooperation (cheating) differ from insurance fraud but
  interact similarly.
suggested_hypotheses:
- h-risk-pooling-institutions-shift-evolutionary-stable-cooperation
related_bridges:
- b-collective-risk-social-dilemma-x-insurance
last_reviewed: '2026-05-07'
references:
- doi: 10.1073/pnas.1011558108
  note: Santos & Pacheco (2011) — collective-risk dilemmas and cooperation
- doi: 10.1038/s41598-017-08140-6
  note: Representative follow-on collective-risk / threshold public goods (open access cluster)

id: u-pareto-exponent-redistribution-mechanism
title: >
  Is the Pareto exponent α of wealth/income distributions quantitatively
  determined by the ratio of redistribution rate to multiplicative growth rate
  as predicted by the Bouchaud-Mezard model, and what mechanism generates the
  crossover from Boltzmann-Gibbs (lower income) to Pareto (upper income) distributions?
status: open
priority: high
disciplines:
  - economics
  - statistical-physics
  - econophysics
summary: >
  Empirical income data from over 70 countries (Yakovenko & Rosser 2009) show
  that the bottom 95-97% of income distribution follows an exponential
  (Boltzmann-Gibbs) distribution, while the top 1-5% follow a Pareto power law
  P(w) ~ w^{-α} with exponent α typically between 1.5 and 3. The Bouchaud-Mezard
  (2000) model predicts α = 1 + r/(g - r) where r is the redistribution rate and
  g is the multiplicative growth rate of wealth.

  Three major unknowns remain:
  (1) Quantitative test of Bouchaud-Mezard prediction: no systematic cross-country
  study has tested whether α correlates with the predicted formula using independently
  measured r and g values. The model predicts that higher redistribution (higher r)
  increases α (more equal top tail); this is consistent with empirical observations
  that Nordic countries have higher α (less unequal Pareto tail) but has not been
  confirmed quantitatively.
  (2) Crossover mechanism: the transition from Gibbs body to Pareto tail occurs
  at a specific income level (~$80,000-100,000 in US 2010 data) whose determinants
  are unknown. The Chakraborti-Chakrabarti savings model produces a Gamma distribution
  (not a sharp crossover), suggesting the crossover requires a qualitative change
  in wealth dynamics (from wage labor to capital income).
  (3) Non-equilibrium dynamics: during economic crises (2008, COVID-2020), wealth
  inequality increases dramatically — the system is far from the stationary Gibbs/
  Pareto distribution. The fluctuation theorems and non-equilibrium master equations
  that govern the transient dynamics have not been applied to economic crises.
systematic_gaps:
  - No cross-country test of Bouchaud-Mezard formula α = 1 + r/(g-r) with
    independently measured redistribution and growth rates from OECD data
  - The income level marking the Gibbs-to-Pareto crossover has not been systematically
    measured across countries and time, preventing identification of its determinants
  - Non-equilibrium statistical mechanics tools (master equations, Jarzynski equality)
    have not been applied to model wealth dynamics during economic crises
suggested_hypotheses:
  - The Pareto exponent α across OECD countries from 1990-2020 satisfies
    α ≈ 1 + r/(g-r) with r = tax-and-transfer fraction of GDP and g = top-1%
    income growth rate, with a goodness-of-fit better than linear regression on
    r alone (testing the specific functional form of the Bouchaud-Mezard model)
related_unknowns:
  - u-statistical-mechanics-income-wealth
  - u-automation-employment-equilibrium

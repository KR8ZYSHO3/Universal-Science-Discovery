id: u-entropy-maximization-x-income-distribution
title: >
  At what saving propensity threshold does the income distribution transition from
  exponential to Pareto, and can this predict real-world inequality tipping points?
status: open
priority: medium
disciplines:
  - physics
  - economics
  - statistical_mechanics
  - econophysics
summary: >
  Dragulescu-Yakovenko models predict an exponential income distribution for zero
  saving propensity and a power-law Pareto tail above a critical saving propensity
  lambda_c, analogous to Bose-Einstein condensation. However, real economies have
  heterogeneous saving propensities and non-random exchange mechanisms (skill,
  returns to capital, monopoly rents). The critical lambda_c in heterogeneous models
  has not been computed, and whether real inequality dynamics (Gini coefficient
  rising globally since 1980) can be explained as approaching a condensation
  transition or requires non-equilibrium mechanisms (increasing returns, network
  effects) is unresolved.
systematic_gaps:
  - The critical saving propensity threshold lambda_c for the exponential-to-Pareto transition in heterogeneous agent models with realistic exchange rules has not been derived
  - Whether the observed increase in global income inequality (Gini 0.6 -> 0.7 in many countries) corresponds to approach toward a condensation critical point has not been tested
  - Non-equilibrium contributions to income distribution (technological disruption, globalization as external driving) have not been incorporated into the statistical mechanics framework
related_bridges:

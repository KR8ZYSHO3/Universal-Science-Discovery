id: u-shapley-value-practical-coalition-stability
title: When is the Shapley value a stable and behaviorally predictive allocation in real-world cooperative problems, and what institutional mechanisms enforce core stability when the core is empty?
status: open
priority: medium
disciplines:
  - cooperative-game-theory
  - economics
  - political-science
  - institutional-design
summary: >
  The Shapley value is axiomatically elegant and computationally tractable (for small N)
  but its behavioral and institutional validity is contested. (1) The core may be empty
  for many real games — particularly weighted majority games representing legislative
  coalitions — meaning no allocation is stable against all deviations. (2) When the core
  is non-empty, experimental evidence shows that the Shapley value does not always
  predict actual allocations — bargaining power, focal points, and threat credibility
  matter. (3) For N > 20 players, exact Shapley value computation is #P-hard and
  approximation algorithms introduce substantial error. (4) Dynamic coalition formation
  — when the characteristic function changes over time (as in climate negotiations where
  technology changes) — breaks the static game assumption. (5) The equivalence between
  the Shapley value and maximum likelihood estimation in linear regression (Charnes et al.
  1988) suggests a connection to machine learning attribution (SHAP values, Lundberg
  2017) but this connection's game-theoretic foundations are not fully characterised.
systematic_gaps:
  - Large-scale empirical tests of whether the Shapley value predicts actual allocation outcomes in real multi-party negotiations (trade agreements, water rights allocations) are rare.
  - Mechanisms for enforcing stability in empty-core games (side payments, repeated games, reputation) are not well understood in applied institutional settings.
  - The behavior of nucleolus and Shapley value under strategic misrepresentation of the characteristic function (when players can lie about coalition values) is understudied.
last_reviewed: "2026-05-06"

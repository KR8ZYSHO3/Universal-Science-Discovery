id: u-catalyst-optimization-volcano-plots
title: "Do Sabatier volcano plots have a universal mathematical form, and can machine learning identify the binding energy descriptors that place any catalyst near the volcano peak?"
status: open
priority: high
disciplines:
  - catalysis
  - physical-chemistry
  - materials-science
  - machine-learning
summary: >
  The Sabatier principle states that an ideal catalyst binds intermediates neither
  too strongly (reaction inhibited) nor too weakly (activation energy too high).
  This produces a volcano-shaped plot of catalytic activity vs. binding energy,
  with the peak at an optimal binding energy. Volcano plots have been demonstrated
  for oxygen reduction, nitrogen reduction (Haber-Bosch), CO2 reduction, and
  hydrogen evolution. The Brønsted-Evans-Polanyi (BEP) linear scaling relations
  mean that binding energies of key intermediates are correlated, constraining
  the accessible design space. Two unknowns: (1) Is the volcano peak shape
  (width, asymmetry) universal or reaction-specific? A universal form would
  allow single-parameter characterization of catalyst quality. (2) Machine learning
  (Bayesian optimization, neural network potentials) has identified novel catalysts,
  but the physically interpretable descriptor that places a catalyst on the
  volcano has not been identified for multi-step reactions. If the descriptor
  is identified, rational catalyst design replaces combinatorial screening.
systematic_gaps:
  - The mathematical form of volcano peaks (Gaussian, Lorentzian, asymmetric) has not been derived from first principles
  - BEP scaling relations break down for strained surfaces and complex alloys; when and why is unknown
  - ML-identified catalysts often lack interpretable physical descriptors
suggested_hypotheses:
  - Volcano plot peak width scales as k_BT/E_act where E_act is the activation energy at the peak, giving a universal dimensionless volcano with peak width ~0.1-0.3 eV for typical catalytic reactions at 400-800 K
related_unknowns: []
references:
  - doi: "10.1126/science.1103197"
    note: "Norskov et al. (2004) Science - volcano plot for oxygen reduction reaction"
last_reviewed: "2026-05-05"

id: u-protein-folding-thermodynamics-kinetics
title: "Does the funnel energy landscape theory fully explain the Levinthal paradox, or do kinetic pathways violate thermodynamic predictions in meaningful biological cases?"
status: open
priority: high
disciplines:
  - biochemistry
  - biophysics
  - statistical-physics
summary: >
  Levinthal (1969) showed that a protein cannot find its native state by random
  search: a 100-residue protein has ~3^100 conformations, which would take longer
  than the age of the universe to search. Proteins fold in milliseconds. Wolynes,
  Onuchic & Bryngelson (1995) proposed the energy landscape / folding funnel
  theory: the landscape is not random but funnel-shaped, with native contacts
  providing a bias toward the native state at every step. This funnel picture
  predicts that folding is thermodynamically driven (downhill in free energy)
  and kinetically fast because the search space is effectively reduced by the
  funnel. However, several classes of proteins challenge this picture:
  (1) metamorphic proteins that fold into two stable states with identical sequences;
  (2) prions that misfold stably and propagate the misfolded state;
  (3) intrinsically disordered proteins (IDPs) that function without a stable fold.
  The unknown: are these exceptions to funnel theory, or does the funnel picture
  need modification to account for multi-funnel landscapes, rugged barriers, or
  non-equilibrium kinetics?
systematic_gaps:
  - The fraction of sequence space where funnel theory fails (rugged landscape) has not been mapped
  - Whether IDP function requires a distinct theoretical framework or is a limit of funnel theory is unresolved
  - Kinetics of prion templating violates simple funnel predictions; mechanism remains unclear
suggested_hypotheses:
  - Metamorphic proteins reside on landscapes with two comparable-depth funnels separated by a barrier of height k_BT * ln(k_fold/k_switch), where k_switch is the spontaneous interconversion rate
related_unknowns: []
references:
  - doi: "10.1126/science.267.5197.418"
    note: "Onuchic, Wolynes et al. (1995) Science - energy landscape funnel theory"
last_reviewed: "2026-05-05"

id: u-graph-theory-x-molecular-structure
title: Is there a complete set of graph invariants that uniquely identifies all molecular graphs up to isomorphism, and can
  the graph isomorphism problem be solved in polynomial time for molecular graphs?
status: open
priority: medium
disciplines:
- chemistry
- mathematics
- computer_science
summary: 'The molecular graph isomorphism problem — determining whether two molecules have identical graph structure — is
  of unknown complexity (NP, but not known to be NP-complete or in P). Topological indices are incomplete invariants: different
  molecular graphs can share identical Wiener, Randić, and Zagreb index values. A complete set of molecular graph invariants
  would require solving the graph isomorphism problem. In practice, canonical SMILES and Morgan algorithm provide practical
  solutions but lack theoretical completeness guarantees.'
systematic_gaps:
- No set of polynomial-time computable graph invariants is known to completely distinguish all molecular graphs
- The graph isomorphism problem is not known to be in P for general graphs
- Topological index degeneracy (multiple molecules with identical index values) is unresolved for large molecular databases

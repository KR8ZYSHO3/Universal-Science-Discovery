id: u-crn-multistability-biological
title: Which biological chemical reaction networks have the topological structure required for multistability, and does deficiency theory correctly predict their bistable phenotypes?
status: open
priority: medium
disciplines:
  - chemistry
  - biochemistry
  - systems-biology
  - mathematics
summary: >
  The Feinberg-Horn-Jackson deficiency theory predicts which chemical reaction network
  topologies can exhibit multiple steady states (requiring deficiency δ ≥ 1 or non-
  weakly-reversible structure). In biology, bistable switches (lac operon, MAPK signalling,
  cell cycle commitment) are essential for decision-making. However, the biological
  networks are large, incompletely characterised, and embedded in cellular context.
  Whether deficiency theory correctly predicts the bistability of all known biological
  switches, and whether it can identify new bistable circuits from network topology
  alone, has not been systematically tested at genome scale.
systematic_gaps:
  - A systematic computation of deficiency numbers for all KEGG metabolic network subgraphs has not been performed to test which are predicted bistable.
  - Whether the deficiency number is robust to the coarse-graining of large biological networks (lumping multiple enzymatic steps) is unknown.
  - No large-scale validation of deficiency theory predictions against measured bistability in synthetic biology circuits exists.
last_reviewed: "2026-05-05"

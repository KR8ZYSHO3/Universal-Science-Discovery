id: u-nucleation-x-first-passage
title: >
  Can classical nucleation theory predict nucleation rates to within an order of
  magnitude, or are there fundamental corrections from non-classical mechanisms?
status: open
priority: high
disciplines:
  - chemistry
  - physics
  - statistical_mechanics
summary: >
  Classical nucleation theory (CNT) predicts nucleation rates J = Z A exp(-deltaG*/kT)
  via first-passage theory, but experimental nucleation rates often deviate from CNT
  predictions by 10 or more orders of magnitude. Non-classical mechanisms (two-step
  nucleation via a precursor liquid phase, spinodal decomposition, cluster structure
  deviating from bulk crystalline properties) contribute but their quantitative
  importance is unclear. The first-passage time framework is rigorous but the free
  energy barrier deltaG* in CNT uses bulk thermodynamic parameters that may not
  apply to nanometer-scale clusters. Computing accurate nucleation rates from
  molecular dynamics for real systems (protein crystallization, atmospheric ice
  nucleation) remains an open challenge.
systematic_gaps:
  - The size at which the surface tension (interfacial free energy) of a nucleus equals the bulk value — the crossover from non-classical to classical regime — has not been determined for most materials
  - Forward flux sampling and other rare event methods can compute nucleation rates for simple models but computational cost prevents application to complex molecular systems (proteins, minerals)
  - The quantitative contribution of two-step nucleation (liquid precursor phase) to total nucleation rate for protein crystallization has not been established experimentally
related_bridges:
  - b-nucleation-x-first-passage
last_reviewed: "2026-05-07"

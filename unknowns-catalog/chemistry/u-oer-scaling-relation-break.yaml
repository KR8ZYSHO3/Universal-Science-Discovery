id: u-oer-scaling-relation-break
title: Can the universal OER scaling relation ΔG_OOH* − ΔG_OH* ≈ 3.2 eV be broken by novel catalyst architectures, enabling catalysts below the theoretical 0.4 V overpotential floor?
status: open
priority: critical
disciplines:
  - electrochemistry
  - materials-science
  - computational-chemistry
  - surface-science
summary: >
  The oxygen evolution reaction (OER) has a theoretical minimum overpotential of
  approximately 0.4 V imposed by the universal scaling relation between OOH* and
  OH* binding energies on oxide catalysts: ΔG_OOH* − ΔG_OH* ≈ 3.2 eV across
  all known single-site transition metal oxide catalysts (Man et al. 2011). This
  relation arises because OOH* and OH* share the same chemical bond to the surface
  (M-O bond), constraining their relative binding energies.

  Breaking this scaling relation — accessing the region of the OER volcano below
  the 0.4 V floor — requires catalysts that bind OOH* and OH* through different
  geometric or electronic configurations. Proposed strategies include dual-site
  mechanisms (adjacent sites stabilize OOH* differently from OH*), confined
  geometry (nanopore effects change solvation), and frustrated Lewis pair catalysis.
  Whether any of these strategies can reduce the kinetic overpotential below 0.2 V
  in a stable, scalable catalyst is unknown.
systematic_gaps:
  - Whether the OER scaling relation is a fundamental thermodynamic constraint or an artifact of the single-site oxide model has not been proven/disproven with high-quality DFT+experimental benchmarks.
  - Dual-site OER mechanisms have been proposed computationally but not unambiguously demonstrated experimentally at the single-site level.
  - The stability of any catalyst that breaks the scaling relation (by having non-standard bonding geometry) under the oxidizing conditions of OER (>1.5 V vs RHE) is unknown.
suggested_hypotheses:
  - Dual-site catalysts (Fe-Ni or Ir-Ru adjacent pairs) with different M-O bond character for the two sites can reduce OER overpotential below 0.2 V by decoupling OOH* and OH* binding energies.
related_bridges:
  - b-catalyst-sabatier-principle
last_reviewed: "2026-05-06"

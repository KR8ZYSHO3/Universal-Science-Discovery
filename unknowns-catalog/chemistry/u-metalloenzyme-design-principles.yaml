id: u-metalloenzyme-design-principles
title: "Can de novo metalloenzyme design achieve catalytic efficiency (kcat/KM) within 10-fold of natural enzymes by rational placement of first-shell ligands alone?"
status: open
priority: high
disciplines:
  - biochemistry
  - catalysis
  - computational-chemistry
summary: >
  Metalloenzymes use metal ions (Fe, Cu, Mn, Zn, Mo) coordinated by protein
  ligands to catalyze reactions that are otherwise kinetically inaccessible:
  oxygen activation, nitrogen fixation, CO2 fixation, H2 production. Despite
  progress in computational enzyme design (David Baker group), de novo
  designed metalloenzymes remain 10^3-10^6-fold less efficient than natural
  enzymes in kcat/KM. The gap arises from poorly understood second- and outer-shell
  effects: residues beyond the first coordination sphere that fine-tune metal
  redox potential, substrate positioning, and proton transfer pathways. Two unknowns:
  (1) Can improved quantum mechanical/molecular mechanics (QM/MM) potentials and
  ML-guided design close the efficiency gap? (2) Is the gap fundamentally due to
  the absence of evolutionary optimization for dynamic conformational changes
  (enzyme conformational itinerary) that cannot be designed rationally?
  If the latter, de novo metalloenzyme design requires directed evolution as a
  mandatory final step, not an optimization.
systematic_gaps:
  - Role of second-shell residues in metalloenzyme efficiency has not been systematically quantified via mutagenesis
  - Whether QM/MM potentials are accurate enough for metalloenzyme design without training data is unknown
  - The minimum evolutionary steps required to go from de novo design to natural efficiency has not been measured
suggested_hypotheses:
  - Second-shell hydrogen bond networks increase metalloenzyme kcat by tuning metal redox potential, and each additional second-shell H-bond adds ~2-fold rate enhancement, predictable by DFT electron density calculations without MD
related_unknowns:
  - u-protein-folding-thermodynamics-kinetics
references:
  - doi: "10.1126/science.1260501"
    note: "Rothlisberger et al. (2008) Nature - de novo enzyme design (kemp eliminase)"
last_reviewed: "2026-05-05"

id: u-crystallization-kinetics-nucleation
title: "Why does classical nucleation theory systematically underpredict nucleation rates by 10-20 orders of magnitude, and what is the correct free energy of critical nucleus formation?"
status: open
priority: high
disciplines:
  - physical-chemistry
  - materials-science
  - statistical-physics
  - crystallography
summary: >
  Classical Nucleation Theory (CNT) predicts nucleation rates J = A * exp(-Delta_G*/k_BT)
  where Delta_G* is the free energy of the critical nucleus (the smallest stable cluster).
  CNT assumes: (1) the nucleus is a sphere of bulk crystal; (2) surface energy is
  size-independent; (3) the nucleation pathway is a one-step process from solution
  to crystal. In practice, CNT predictions of J are off by 10-20 orders of magnitude
  for protein crystals, ice, and calcium carbonate — making CNT essentially useless
  for predicting whether, when, and how fast crystallization occurs. The discrepancy
  arises from: pre-nucleation clusters (dense liquid phases, metastable polymorphs)
  that CNT ignores; size-dependent surface energy; and non-classical two-step nucleation
  (solution → dense liquid droplet → crystal). Two-step nucleation has been observed
  directly by liquid-phase TEM for calcium carbonate, lysozyme, and ferritin, but
  the theory for rate prediction in two-step nucleation remains incomplete. The stakes:
  crystallization control is central to pharmaceuticals (polymorphic stability),
  materials science (semiconductor growth), and biomineralization.
systematic_gaps:
  - No predictive theory for nucleation rates in two-step (solution → dense liquid → crystal) pathways
  - Free energy of the dense liquid intermediate relative to solution and crystal is not measurable directly
  - Role of heterogeneous nucleation sites (surfaces, impurities) in two-step nucleation not quantified
suggested_hypotheses:
  - Two-step nucleation rate J_2step = J_CNT * exp(Delta_G_DL/k_BT) where Delta_G_DL is the free energy of the dense liquid intermediate, resolvable from PEG osmotic stress experiments with >3 orders of magnitude improvement in rate prediction
related_unknowns: []
references:

id: u-dac-sorbent-entropy-production-mechanism
title: Which process steps in the DAC thermal swing adsorption cycle produce the most entropy, and what molecular-level sorbent properties minimize irreversibility in each step?
status: open
priority: high
disciplines:
  - chemical-engineering
  - thermodynamics
  - materials-science
  - atmospheric-chemistry
summary: >
  Direct air capture (DAC) thermal swing adsorption systems (solid sorbent DAC)
  consume approximately 200-400 kJ/mol CO₂, compared to the thermodynamic minimum
  of ~20 kJ/mol. The gap represents entropy production across the four cycle steps:
  (1) adsorption (CO₂ + moisture uptake from air, often exothermic), (2) heating
  (sorbent + bed + structure heated from ambient to 80-120°C), (3) desorption (CO₂
  released at elevated temperature and partial pressure), (4) cooling (bed cooled
  back to adsorption conditions).

  The dominant irreversibility source varies by sorbent: for amine-functionalized
  silica, the adsorption enthalpy (~90 kJ/mol) is much higher than the thermodynamic
  minimum, requiring high-temperature regeneration. For MOFs with physisorption-
  dominated binding (~30-40 kJ/mol), the regeneration energy is lower but kinetics
  are slower. Which of these trade-offs is more fundamental, and whether materials
  with intermediate binding enthalpy and fast kinetics can close the efficiency gap,
  are the core unknowns.
systematic_gaps:
  - The entropy production breakdown (adsorption exothermicity, sensible heat, heat of desorption, heat loss) for commercial DAC systems has not been published with sufficient detail for comparative analysis.
  - Whether MOF sorbents with tunable binding enthalpy (25-60 kJ/mol CO₂) can achieve both fast kinetics and stable long-cycle performance in humid air is unknown.
  - The effect of atmospheric moisture on DAC sorbent thermodynamics has not been systematically quantified — water co-adsorption can dominate the energy budget in humid climates.
suggested_hypotheses:
  - Amine-functionalized sorbents with binding enthalpy tuned to 40-50 kJ/mol (vs 80-90 kJ/mol for current best performers) can halve regeneration energy while maintaining adequate capacity, closing the efficiency gap to within 3× of the thermodynamic minimum.

id: u-chirality-emergence-prebiotic
title: "How did biological homochirality (L-amino acids, D-sugars) emerge from a racemic prebiotic world — symmetry breaking, amplification, or selection?"
status: open
priority: high
disciplines:
  - origin-of-life
  - physical-chemistry
  - statistical-physics
  - biochemistry
summary: >
  All known life uses exclusively L-amino acids and D-sugars (homochirality), yet
  prebiotic chemistry produces racemic mixtures (50:50 L:D). The emergence of
  homochirality is both a chemistry problem and a physics problem: it requires
  spontaneous symmetry breaking from a symmetric (racemic) state. Three mechanisms
  have been proposed: (1) Stochastic symmetry breaking — small statistical
  fluctuations in a highly non-linear system are amplified to 100% ee by
  autocatalysis (Soai reaction: chiral product catalyzes its own formation,
  amplifying tiny initial ee to >99%); (2) Physical chirality selection — circularly
  polarized light from neutron stars preferentially destroyed one enantiomer in
  meteorites, as evidenced by L-excess amino acids in Murchison meteorite;
  (3) Crystal-mediated amplification — chiral crystals (quartz, sodium chlorate)
  can amplify ee through attrition grinding (Viedma ripening). None of these
  mechanisms has been shown to produce the sustained global homochirality required
  for RNA world chemistry. The connection to physics: this is a symmetry-breaking
  phase transition, and the question is whether it is first-order (sharp, irreversible)
  or second-order (gradual, reversible) — which determines its robustness.
systematic_gaps:
  - No prebiotic scenario has produced 100% ee from racemic starting materials under plausible early-Earth conditions
  - The universality class of the symmetry-breaking transition in autocatalytic chiral systems is unknown
  - Whether the Soai reaction has prebiotic analogues (RNA, amino acids) has not been demonstrated
suggested_hypotheses:
  - Chiral symmetry breaking in autocatalytic prebiotic systems is a first-order phase transition, requiring a minimum autocatalytic amplification factor of ~50 to produce >99% ee from thermal fluctuations within the lifetime of a prebiotic pool
related_unknowns: []
references:
  - doi: "10.1038/378596a0"
    note: "Soai et al. (1995) Nature - chiral autocatalysis amplifying to >99% ee"
  - doi: "10.1073/pnas.1117884109"
    note: "Viedma (2005) - crystal grinding amplification of chiral excess"
last_reviewed: "2026-05-05"

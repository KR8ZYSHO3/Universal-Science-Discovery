id: u-percolation-mapping-quantitative-gel-chemistry
title: For realistic multifunctional polymerizations with loops and substitution effects,
  how far does bond-percolation universality deviate from measured gel points across chemistries?
status: open
priority: medium
disciplines:
  - polymer-science
  - statistical-physics
summary: >
  Percolation provides qualitative gel-point intuition; quantitative predictions require mapping
  reaction extent to bond occupancy while accounting for intramolecular cyclization — shifting effective dimensionality and exponent corrections relative to lattice percolation.
systematic_gaps:
  - Limited systematic datasets pairing gel rheology onset with bond-percolation simulations per chemistry family
  - Polydispersity coupling to cluster statistics rarely inverted jointly with percolation fits
suggested_hypotheses:
  - h-percolation-threshold-x-polymer-gelation
related_bridges:
  - b-percolation-threshold-x-polymer-gelation
last_reviewed: "2026-05-07"
references:
  - doi: 10.1103/RevModPhys.41.574
    note: Essam review on percolation theory foundations

id: u-enzyme-tunneling-quantum-mechanism
title: "Do enzymes exploit quantum tunneling to enhance proton and hydride transfer rates beyond classical limits, and is this a general mechanism or specific to a few reactions?"
status: open
priority: medium
disciplines:
  - biochemistry
  - quantum-biology
  - physical-chemistry
summary: >
  Enzyme-catalyzed proton and hydride (H-) transfer reactions are often faster than
  classical transition state theory predicts, with kinetic isotope effects (KIEs)
  that are temperature-dependent in unusual ways (inflated KIEs, temperature-independent
  KIEs). These observations are consistent with quantum mechanical tunneling through
  the reaction barrier rather than classical over-barrier passage. Several enzymes
  (alcohol dehydrogenase, aromatic amine dehydrogenase, DHFR) show signatures of
  tunneling. However, whether tunneling is merely incidental to enzyme catalysis
  or whether enzymes have evolved to specifically enhance tunneling through conformational
  dynamics (coupled motion between donor-acceptor compression and reaction coordinate)
  remains contested. The "promoting vibrations" hypothesis proposes that enzyme
  dynamics compresses donor-acceptor distance to enhance tunneling, but no crystal
  structure has captured the tunneling-competent conformation, and the energy scale
  of tunneling enhancement compared to classical catalysis is uncertain.
systematic_gaps:
  - Whether promoting vibrations are required for tunneling or merely correlate with it has not been resolved
  - The fraction of enzyme active sites where tunneling contributes meaningfully (>10% rate enhancement) is unknown
  - No computational method predicts KIE temperature dependence from sequence alone
suggested_hypotheses:
  - Enzymes that evolved maximum tunneling contributions show active site geometries with donor-acceptor distances compressed to <2.7 Å in the Michaelis complex, predictable from crystal structures without MD simulations
related_unknowns:
  - u-quantum-biology-decoherence
references:
  - doi: "10.1039/c4cs00179f"
    note: "Hammes-Schiffer (2013) Acc. Chem. Res. - proton-coupled electron transfer and tunneling in enzymes"
last_reviewed: "2026-05-05"

id: u-hydrogen-bond-network-water-anomalies
title: "Are water's thermodynamic anomalies (density maximum at 4°C, compressibility minimum at 46°C) fully explained by the two-liquid model, and where is the liquid-liquid critical point?"
status: open
priority: medium
disciplines:
  - physical-chemistry
  - statistical-physics
  - condensed-matter
summary: >
  Water has more than 70 known thermodynamic anomalies: maximum density at 4°C,
  minimum compressibility at 46°C, diverging heat capacity on cooling, and anomalous
  diffusion. The two-liquid model (Poole et al. 1992, Science) proposes that
  supercooled water undergoes a liquid-liquid phase transition (LLT) between
  high-density liquid (HDL) and low-density liquid (LDL), with a liquid-liquid
  critical point (LLCP) at approximately T ≈ 220 K, P ≈ 100 MPa — inside the
  "no man's land" region where water crystallizes too fast to study experimentally.
  The LLCP would explain all anomalies as fluctuations associated with the nearby
  critical point. However, the existence of the LLCP remains contested: it has not
  been observed directly, and alternative models (singularity-free model, critical
  point-free model) also fit thermodynamic data. If the LLCP exists, it has profound
  implications for cold denaturation of proteins, cryopreservation, and cloud
  microphysics.
systematic_gaps:
  - The LLCP has not been observed directly due to the crystallization problem in no-man's land
  - Simulations disagree on LLCP existence (TIP4P/2005 shows it; ST2 shows it; SPC/E does not)
  - Whether confined water (nanopores, protein surfaces) shows the same LLCP as bulk water
suggested_hypotheses:
  - Ultrafast heating/quenching experiments using femtosecond X-ray free electron lasers will locate the LLCP at T = 220±10 K, P = 80-120 MPa, resolving the decades-long controversy
related_unknowns: []
references:
  - doi: "10.1038/360324a0"
    note: "Poole et al. (1992) Nature - two-liquid model of water and LLCP hypothesis"
last_reviewed: "2026-05-05"

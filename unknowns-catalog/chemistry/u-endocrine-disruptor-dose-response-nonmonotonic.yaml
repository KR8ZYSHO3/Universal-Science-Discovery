id: u-endocrine-disruptor-dose-response-nonmonotonic
title: >
  What are the molecular mechanisms generating non-monotonic dose-response (NMDR)
  curves for endocrine disruptors (BPA, phthalates, atrazine), and are these
  mechanisms sufficient to invalidate linear extrapolation from high-dose toxicology
  studies to regulatory low-dose safety limits?
status: open
priority: critical
disciplines:
  - chemistry
  - toxicology
  - endocrinology
  - regulatory-science
  - cell-biology
summary: >
  Vandenberg et al. (2012) systematically reviewed >800 studies documenting
  non-monotonic dose-response (NMDR) relationships for endocrine disruptors —
  chemicals that interfere with hormone signaling. NMDR curves arise when effects
  at low doses differ qualitatively from high-dose effects. Proposed mechanisms:
  (1) receptor saturation — at high BPA concentrations, estrogen receptor-α (ERα)
  is saturated and additional receptor-independent pathways dominate, potentially
  antagonizing low-dose agonist effects; (2) receptor subtype switching — ERα
  and ERβ have opposing transcriptional effects in some tissues; low doses activate
  one subtype, high doses saturate both; (3) feedback compensation — hypothalamic-
  pituitary-gonadal axis negative feedback compensates for high-dose disruption
  but not low-dose perturbations; (4) hormesis — biological adaptive responses
  are induced only at sub-threshold stimulation. The regulatory implications are
  profound: current NOAEL-based safety limits are derived from high-dose animal
  studies with monotonic extrapolation to low doses. If NMDR is real, low-dose
  exposures may be harmful at levels below regulatory thresholds. However, NMDR
  replication rates in independent laboratories are contested, raising concerns
  about publication bias and assay sensitivity in low-dose studies.
systematic_gaps:
  - Mechanistic identification of which receptor subtype combinations generate NMDR curves for specific endocrine disruptors
  - Independent pre-registered replication of NMDR curves for BPA at doses below current regulatory limits (2.5 µg/kg/day)
  - Whether NMDR curves in vitro predict NMDR in vivo with matched endpoints
  - Bayesian meta-analysis of NMDR literature correcting for publication bias
suggested_hypotheses:
  - h-lnt-model-invalid-endocrine-disruptors

id: u-chemical-garden-membrane-self-organization
title: "What determines the spontaneous selection of tube diameter, wall thickness, and porosity in chemical garden precipitation membranes, and can these parameters be analytically predicted from the osmotic pressure, ion diffusion coefficients, and solubility products of the metal salt and silicate without free fitting?"
status: open
priority: medium
disciplines:
  - chemistry
  - fluid-mechanics
  - materials-science
summary: >
  Chemical gardens exhibit a rich morphological phase space (filaments, bulbs, corrugated tubes, spirals)
  whose control parameters are not fully mapped to underlying physicochemical variables. Key unknowns:
  (1) what is the complete phase diagram in (salt type, silicate concentration, temperature) space that
  separates the filamentous, budding, and oscillatory growth regimes? (2) Can the diffuse-interface
  (phase-field) model accurately predict observed tube diameters from first-principles osmotic and
  precipitation kinetics parameters without empirical fitting? (3) Do chemical gardens in microfluidic
  geometries produce membranes with controlled porosity useful as selective ion-transport membranes for
  energy applications?
systematic_gaps:
  - Systematic phase diagram mapping across metal salt types and silicate concentrations has only been done for a few systems
  - Phase-field simulations of chemical garden growth are computationally expensive and have not been validated against 3D tomography of tube cross-sections
  - Ion selectivity of chemical garden membranes has not been systematically measured for energy or desalination applications
related_bridges:
  - b-chemical-garden-osmotic-precipitation
last_reviewed: "2026-05-07"

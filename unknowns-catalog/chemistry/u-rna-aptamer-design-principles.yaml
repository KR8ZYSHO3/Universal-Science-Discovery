id: u-rna-aptamer-design-principles
title: "What physical principles govern RNA aptamer binding affinity and selectivity, and can they guide de novo design without combinatorial screening?"
status: open
priority: medium
disciplines:
  - biochemistry
  - biophysics
  - structural-biology
summary: >
  RNA aptamers are short single-stranded RNA molecules that fold into 3D structures
  capable of binding specific molecular targets (proteins, small molecules, ions)
  with high affinity (K_d often 1-100 nM) and selectivity. Currently, aptamers
  are discovered via SELEX (Systematic Evolution of Ligands by EXponential
  enrichment): a combinatorial screen of 10^14 random sequences. SELEX is slow
  (6-18 rounds, 6-12 weeks) and expensive. The fundamental question is whether
  aptamer binding can be predicted from first principles — RNA secondary structure
  thermodynamics, electrostatics, and shape complementarity — without the combinatorial
  screen. Two challenges: (1) RNA tertiary structure prediction remains limited;
  (2) the relationship between sequence, fold, and binding affinity is not well
  parameterized. AlphaFold2/3 and RNA folding tools (RNAfold, mfold) predict
  secondary structure well but 3D structure poorly. No design algorithm has
  achieved SELEX-competitive affinity from de novo design without experimental
  iteration.
systematic_gaps:
  - RNA 3D structure prediction accuracy insufficient for binding site modeling
  - The sequence-structure-function landscape of RNA aptamers has not been mapped
  - Selectivity (binding one target vs. structurally similar alternatives) has no predictive theory
suggested_hypotheses:
  - Aptamers with highest binding affinity adopt structures where the binding loop electrostatic potential matches the target surface potential to within 10% RMS error, predictable from APBS electrostatics without explicit MD simulations
related_unknowns: []
references:
  - doi: "10.1126/science.249.4968.505"
    note: "Tuerk & Gold (1990) Science - SELEX original method"
last_reviewed: "2026-05-05"

id: u-polymer-glass-x-jamming-transition
title: >
  Is the glass transition a true thermodynamic phase transition with a diverging
  correlation length, or only a kinetic phenomenon, and how does it unify with jamming?
status: open
priority: high
disciplines:
  - chemistry
  - physics
  - soft_matter
  - materials_science
summary: >
  The glass transition temperature T_g is well-defined experimentally but whether it
  represents a true thermodynamic phase transition (diverging static length scale,
  genuine singularity) or is purely kinetic (vitrification by exceeding relaxation
  time) is unresolved after decades of debate. The random first-order transition (RFOT)
  theory predicts a true thermodynamic transition obscured by finite-size effects, while
  mode-coupling theory predicts only a dynamical singularity. The jamming phase diagram
  unites glass and jamming but whether point J is a true critical point with universal
  exponents, or an ensemble-dependent crossover, remains contested.
systematic_gaps:
  - No experiment has definitively detected a static structural length scale diverging at T_g, as predicted by RFOT theory
  - The universality class of the jamming transition at point J (critical exponents for coordination number, bulk modulus, pressure) is debated between isostaticity theory and mean-field predictions
  - Whether the glass and jamming transitions are the same universality class or distinct phenomena connected only topologically in the Liu-Nagel diagram is not resolved

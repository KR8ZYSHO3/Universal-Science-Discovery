id: u-self-replicating-molecules-minimal-criteria
title: "What are the minimal chemical criteria for self-replication, and can a molecule shorter than 14 nucleotides replicate itself without external catalysts?"
status: open
priority: high
disciplines:
  - origin-of-life
  - biochemistry
  - systems-chemistry
summary: >
  Self-replication — the ability of a molecule to catalyze its own synthesis from
  activated monomers — is a key step toward the origin of life. Joyce & Orgel
  demonstrated that short RNA oligomers can template complementary strand synthesis.
  Lincoln & Joyce (2009, Science) showed that cross-replicating RNA enzymes can
  sustain indefinite self-replication. However, the minimal length and sequence
  complexity for self-replication remain unknown. Current record: 32-nt RNA ribozyme
  (Lincoln & Joyce). Two questions: (1) What is the minimum length L_min below which
  self-replication becomes thermodynamically impossible? Information-theoretic
  arguments suggest L_min ≈ 10-20 nt (enough to encode a catalytic active site
  + template recognition), but no derivation from first principles exists.
  (2) Can self-replication emerge spontaneously from random RNA pools, or does it
  require specific sequence motifs present at negligible probability in random
  10-30 nt pools?
systematic_gaps:
  - The minimum RNA length for self-replication has not been derived theoretically
  - Whether self-replication can emerge from random sequence pools without design has not been tested systematically
  - The error threshold for self-replicating RNA (maximum mutation rate before information loss) has not been measured
suggested_hypotheses:
  - The minimum self-replicating RNA length is L_min = ceil(log4(k_cat * KM^{-1} / k_bond)) ≈ 12-16 nt, where k_cat is the minimum catalytic rate for template synthesis and k_bond is the spontaneous bond formation rate
related_unknowns:
  - u-chirality-emergence-prebiotic
references:
  - doi: "10.1126/science.1167856"
    note: "Lincoln & Joyce (2009) Science - cross-catalytic RNA self-replication"
last_reviewed: "2026-05-05"

id: u-unified-spectral-epsilon-model-across-vdw-casimir-length-scales
title: >
  Can a single internally consistent dielectric function ε(ω) measured across bands from UV to microwave anchor joint predictions of molecular-scale dispersion coefficients and micrometer-scale Casimir forces on identical substrates without empirical stitching artifacts?
status: open
priority: medium
disciplines:
  - chemistry
  - physics
summary: >
  Piecewise models often stitch molecular polarizabilities to bulk optical constants — end-to-end spectral validation spanning nm–µm force experiments remains technically demanding.
systematic_gaps:
  - Broadband ellipsometry merged with atomic-scale benchmarks on identical material batches
  - Error propagation from finite Matsubara sums into force uncertainty budgets

id: u-dislocation-dynamics-alloy-high-entropy
title: What dislocation mechanisms produce the exceptional combination of high strength and high ductility observed in high-entropy alloys (HEAs), and can these be predicted from first principles?
status: open
priority: high
disciplines:
  - materials-science
  - solid-mechanics
  - computational-chemistry
summary: >
  High-entropy alloys (e.g., CrMnFeCoNi Cantor alloy) exhibit combinations of yield
  strength and fracture toughness that Pareto-dominate most conventional alloys, but
  the dislocation mechanism responsible is debated. Proposed mechanisms include:
  (1) chemical short-range order creating heterogeneous Peierls barriers, (2) lattice
  distortion from multi-principal-element mixing creating atomic-scale stress fields,
  (3) concentration fluctuations producing wavy slip (reducing pile-up stress concentrations).
  Key unknowns: (1) which mechanism dominates in each HEA family, (2) can DFT-informed
  dislocation dynamics simulations predict strength-ductility tradeoffs, (3) what is
  the optimal composition space for maximizing strength*ductility product?
systematic_gaps:
  - TEM characterization of dislocation cores in HEAs is technically limited; chemical mapping at atomic scale is emerging
  - Multiscale dislocation dynamics simulations of HEAs are computationally expensive and require large-scale DFT training data
  - The role of stacking fault energy (SFE) in controlling deformation mode (slip vs. twinning vs. transformation) in HEAs is incompletely characterized

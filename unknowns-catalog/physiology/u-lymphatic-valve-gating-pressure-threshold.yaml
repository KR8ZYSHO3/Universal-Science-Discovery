id: u-lymphatic-valve-gating-pressure-threshold
title: >
  What is the minimum interstitial hydrostatic pressure required to open primary lymphatic capillary valves, and how does this threshold change with tissue inflammation or fibrosis?
status: open
priority: high
disciplines:
  - physiology
  - fluid-mechanics
summary: >
  Primary lymphatic capillaries absorb interstitial fluid through overlapping endothelial cell flaps that function as one-way valves, but the precise pressure threshold for valve opening, the role of anchoring filaments in valve mechanics, and how inflammatory mediators (TNF-α, IL-1β) alter valve gating are poorly characterized. Whether valve dysfunction precedes or follows interstitial pressure elevation in early lymphedema is clinically important but unknown.

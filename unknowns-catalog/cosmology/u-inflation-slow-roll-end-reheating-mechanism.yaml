id: u-inflation-slow-roll-end-reheating-mechanism
title: >
  What mechanism ends slow-roll inflation and efficiently converts inflaton energy into the Standard Model particles of the hot Big Bang (reheating), and what observational signatures distinguish different reheating scenarios?
status: open
priority: high
disciplines:
  - cosmology
  - quantum-field-theory
summary: >
  Inflation ends when the slow-roll conditions are violated (ε → 1), but the precise mechanism of reheating — parametric resonance (preheating), perturbative inflaton decay, or instant preheating — depends on inflaton couplings to Standard Model fields that are unconstrained by CMB data. Different reheating mechanisms predict different effective reheating temperatures (10^9 - 10^15 GeV) that could be distinguished by spectral distortions in the CMB, stochastic gravitational wave backgrounds, or primordial non-Gaussianity.

id: u-pem-fuel-cell-pt-catalyst-degradation-mechanism
title: >
  What are the dominant atomic-scale degradation mechanisms of Pt/C oxygen reduction
  catalysts in PEM fuel cells under drive-cycle conditions — and can they be suppressed
  to achieve 150,000-hour durability targets for heavy-duty transportation?
status: open
priority: critical
disciplines:
  - physics-chemistry
  - electrochemistry
  - materials-science
  - surface-science
summary: >
  PEM fuel cell commercialization requires Pt/C catalyst durability of >8,000 hours
  (automotive, DOE 2025 target) to >150,000 hours (heavy-duty trucks). Current
  degradation mechanisms include: (1) Pt particle dissolution and re-precipitation
  (Ostwald ripening) — smaller particles dissolve preferentially (Kelvin equation:
  chemical potential increases as 2γV_m/r for radius r), driven by voltage cycling;
  (2) Carbon support corrosion (oxidation to CO₂ at V > 0.9V, leaving Pt particles
  unsupported); (3) Pt migration to the membrane (ionomer) forming a Pt band via
  crossover H₂ reduction; (4) Contaminant poisoning (CO, SO₂, NOₓ, phosphate from
  ionomer degradation). In situ characterization (SAXS, XAS at synchrotrons) provides
  ensemble-averaged data but cannot resolve individual particle dynamics. Aberration-
  corrected STEM-EELS can image individual Pt atoms and clusters, but under operating
  conditions (1 atm, 80°C, humidified). The open question is whether intermetallic
  Pt₃Co, PtNi, or core-shell structures (Pt monolayer on Pd₃Co) can achieve 10-fold
  durability improvement by changing dissolution thermodynamics — and what the
  mechanism of dealloying is at the atomic scale during potential cycling.
systematic_gaps:
  - Atomic-scale operando imaging of Pt dissolution and re-precipitation during
    realistic drive-cycle voltage protocols has not been achieved.
  - The relative contributions of all four degradation mechanisms under realistic
    conditions (humidity, temperature, contamination) have not been quantified
    simultaneously in a single system.
  - Whether the durability of Pt-alloy catalysts in real stacks matches accelerated
    stress test (AST) extrapolations remains uncertain due to non-linear degradation kinetics.
related_bridges:

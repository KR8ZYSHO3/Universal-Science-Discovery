id: u-high-tc-superconductor-pairing-mechanism
title: What is the electron pairing mechanism in cuprate and iron-based high-temperature superconductors — phonon, spin-fluctuation, charge-density-wave, or something else entirely?
status: open
priority: critical
disciplines:
  - condensed-matter-physics
  - physical-chemistry
  - materials-science
summary: >
  BCS theory explains conventional superconductors through phonon-mediated Cooper pairing,
  but cuprate high-T_c superconductors (T_c up to 138 K) and iron-based superconductors
  (T_c up to ~55 K) cannot be explained by BCS theory with known phonon spectra. The dominant
  pairing glue remains unknown after 40 years of intensive research. Candidates include
  antiferromagnetic spin fluctuations (d-wave symmetry order parameter in cuprates supports
  this), charge-density waves, orbital fluctuations (iron-based), and purely electronic
  mechanisms. The pseudogap phase in cuprates — a partial gap above T_c in underdoped
  materials — may be a competing order that pairs electrons without phase coherence.
  Room-temperature superconductivity in hydrogen-rich compounds under extreme pressure
  (LaH₁₀, T_c ~250 K at 170 GPa) suggests phonon-mediated pairing at very high Debye
  frequencies is achievable — but requires pressures far beyond practical application.
systematic_gaps:
  - The symmetry of the order parameter in iron-based superconductors (s±, d-wave, or mixed)
    is not definitively established across the diverse family of materials.
  - The relationship between the pseudogap and superconductivity in underdoped cuprates
    is unresolved — is the pseudogap a competing order or a precursor of superconductivity?
  - No theory quantitatively predicts T_c for cuprates from first principles (DFT + pairing theory).
  - The mechanism of ambient-pressure high-T_c superconductivity, if achievable, is unknown.

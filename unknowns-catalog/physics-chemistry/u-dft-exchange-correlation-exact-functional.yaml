id: u-dft-exchange-correlation-exact-functional
title: >
  What are the exact constraints that the exchange-correlation functional E_xc[rho]
  must satisfy, and can a functional satisfying all known exact constraints
  (non-empirical, fully ab initio) achieve chemical accuracy for arbitrary molecular
  and materials systems?
status: open
priority: critical
disciplines:
  - quantum-chemistry
  - physics
  - materials-science
  - computational-chemistry
summary: >
  Density Functional Theory (DFT) is in principle exact — the Hohenberg-Kohn theorem
  guarantees that the ground state energy is a functional of the electron density.
  In practice, the exchange-correlation functional E_xc[ρ] is unknown and must be
  approximated. Current functionals (LDA, GGA, meta-GGA, hybrid) satisfy some exact
  constraints but violate others. Known constraints include: sum rule for XC hole,
  Lieb-Oxford bound, correct asymptotic behavior, gauge invariance, and scaling
  relations. No functional satisfying all known constraints achieves chemical accuracy
  (< 1 kcal/mol) for all systems. Whether a non-empirical functional meeting all
  constraints can achieve chemical accuracy or whether empirical fitting is necessary
  for practical accuracy is the central unresolved question of DFT development.
systematic_gaps:
  - Complete list of exact constraints on E_xc[rho] is not known.
  - Whether chemical accuracy is achievable with a constraint-satisfying non-empirical functional is unproven.
  - Strong-correlation regime (transition metal oxides, f-electron systems) has no reliable DFT approximation.
last_reviewed: "2026-05-06"

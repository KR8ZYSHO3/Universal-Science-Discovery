id: u-microbial-fuel-cell-electron-transfer-limits
title: "What are the fundamental rate limits on extracellular electron transfer in electrogenic bacteria, and can engineered cytochrome-c expression or synthetic conductive nanowires overcome the bottlenecks that currently cap microbial fuel cell power density below 10 W/m^2?"
status: open
priority: high
disciplines:
  - biotechnology
  - electrochemistry
  - microbiology
summary: >
  Microbial fuel cells (MFCs) achieve far lower power densities than abiotic fuel cells despite favorable thermodynamics.
  Key unknowns: (1) what limits the electron transfer rate through the outer-membrane cytochrome c (OmcA, MtrCAB) conduit in
  Shewanella and Geobacter — protein conformational gating, diffusion of redox mediators, or bulk biofilm conductance?
  (2) Do pili-based "microbial nanowires" in Geobacter conduct electrons via metallic conduction or hopping, and which
  mechanism dominates at physiologically relevant voltages? (3) Can synthetic biology approaches (overexpressing MtrCAB,
  engineering redox shuttles) increase current density by more than 10-fold without compromising cell viability?
systematic_gaps:
  - In-situ measurement of electron-transfer kinetics within intact biofilms at nanometer resolution remains technically unavailable
  - The mechanistic distinction between metallic vs. hopping conduction in Geobacter nanowires is unresolved; conflicting data from different labs
  - Scalable MFC electrode architectures that maintain high surface area while supporting thick electroactive biofilms have not been optimized

id: u-spectral-clustering-x-graph-laplacian
title: What is the optimal graph Laplacian normalisation (unnormalised, symmetric, random-walk) for spectral clustering on
  real-world networks with heterogeneous degree distributions, and can the Cheeger bound be tightened to a polynomial approximation
  guarantee?
status: open
priority: medium
disciplines:
- computer_science
- mathematics
summary: Three Laplacian normalisations (L, L_sym = D^(-1/2)LD^(-1/2), L_rw = D^(-1)L) give different spectral clusterings,
  with no theoretical consensus on which is optimal for real networks. The Cheeger inequality h(G) ≥ λ₂/2 provides an approximation
  ratio of O(1/√λ₂) for minimum bisection, which is tight but often loose in practice. Whether a stronger approximation guarantee
  (e.g., constant-factor for power-law graphs) exists is an open problem.
systematic_gaps:
- No empirical benchmark comparing all three Laplacian normalisations on real heterogeneous networks exists
- The Cheeger bound is tight but no polynomial-factor approximation guarantee for spectral clustering is known
- Whether spectral clustering achieves consistent community recovery in the stochastic block model is proven only for restricted
  parameter ranges

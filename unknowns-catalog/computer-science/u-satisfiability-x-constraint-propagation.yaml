id: u-satisfiability-x-constraint-propagation
title: What is the tightest polynomial-time propagation algorithm for general k-ary CSPs that subsumes both arc consistency
  and unit propagation, and does it close the SAT-CSP complexity gap?
status: open
priority: medium
disciplines:
- computer_science
- mathematics
- logic
summary: Arc consistency (AC-3) and unit propagation are both O(ed²) per propagation step (e = constraints, d = domain size),
  but stronger consistency notions (path consistency, singleton arc consistency) are exponentially harder. Whether a unified
  propagation framework that subsumes both SAT unit propagation and CSP arc consistency with polynomial overhead exists —
  and whether it can close the polynomial-vs-exponential gap for structured instances — is an open problem.
systematic_gaps:
- No polynomial-time propagation algorithm achieves singleton arc consistency for general binary CSPs
- The formal equivalence of AC-3 and unit propagation has not been extended to k-ary constraints
- Empirical benchmarks comparing CSP and SAT solvers on identical problem instances are limited

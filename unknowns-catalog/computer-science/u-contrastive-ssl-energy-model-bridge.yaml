id: u-contrastive-ssl-energy-model-bridge
title: Can temperature parameters in contrastive SSL be rigorously interpreted as controlling
  an effective free-energy landscape curvature during training, beyond qualitative analogy?
status: open
priority: medium
disciplines:
- computer-science
- statistical-physics
summary: Deep models are out-of-equilibrium; any thermodynamic mapping is phenomenological.
  Quantitative predictions linking τ to collapse, uniformity, and spectral bias are still
  emerging.
systematic_gaps:
- Non-equilibrium training dynamics lack a canonical partition function interpretation.
- Hard-negative distributions shift during training, unlike fixed thermal baths.
suggested_hypotheses:
- h-contrastive-loss-implements-high-temperature-energy-comparison

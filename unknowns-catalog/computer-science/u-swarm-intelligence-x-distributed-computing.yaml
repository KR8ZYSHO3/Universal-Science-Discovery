id: u-swarm-intelligence-x-distributed-computing
title: >
  What is the computational complexity of problems solvable by ant colony optimization,
  and can quorum sensing achieve Byzantine fault tolerance without central coordination?
status: open
priority: medium
disciplines:
  - biology
  - computer_science
  - distributed_systems
summary: >
  Ant colony optimization (ACO) and bee quorum sensing implement distributed consensus
  and optimization, but the formal computational complexity of what these biological
  algorithms can solve — and how they compare to provably optimal distributed algorithms
  — is not fully characterized. In particular: does pheromone-based ACO solve NP-hard
  problems efficiently in practice because it implements approximate polynomial-time
  algorithms, or does it escape NP hardness through analog computation? Can honeybee
  swarming quorum sensing be formally proven to satisfy Byzantine fault tolerance
  guarantees analogous to PBFT (Practical Byzantine Fault Tolerance)?
systematic_gaps:
  - The worst-case runtime complexity of ACO for TSP and graph coloring as a function of pheromone evaporation rate and ant count has not been established theoretically
  - Formal proof that honeybee quorum sensing satisfies Byzantine fault tolerance guarantees (correct decision with >2/3 honest scouts) has not been given
  - Whether distributed biological algorithms can be provably optimal (achieve information-theoretic lower bounds) for any non-trivial distributed computing problem has not been established

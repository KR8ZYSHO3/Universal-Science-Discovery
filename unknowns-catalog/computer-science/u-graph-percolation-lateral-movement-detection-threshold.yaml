id: u-graph-percolation-lateral-movement-detection-threshold
title: >
  Can enterprise identity graphs be reduced to percolation models with identifiable p_eff and p_c such that
  SOC alerts meaningfully predict approach to criticality before crown-jewel reachability spikes?
status: open
priority: high
summary: >
  Logs reveal authentication edges but miss offline trust and social engineering. This unknown asks what
  minimal graph telemetry plus red-team calibration yields stable percolation parameter estimates.

systematic_gaps:
  - "No open benchmarks linking MITRE technique success rates to graph percolation exponents."
  - "Temporal dynamics (patch Tuesday, credential rotation) make static p dubious."

suggested_hypotheses:
  - h-zero-trust-control-raises-effective-percolation-threshold

related_bridges:

id: u-neural-ode-x-dynamical-systems
title: >
  Do Neural ODEs learn physically meaningful vector fields, and when do they exhibit
  bifurcations or chaos that limit generalization?
status: open
priority: medium
disciplines:
  - computer_science
  - mathematics
  - dynamical_systems
  - machine_learning
summary: >
  Neural ODEs learn a vector field dh/dt = f(h,t,theta) whose flow map transforms
  inputs to outputs, but the geometric and dynamical properties of the learned vector
  field are not well understood. In particular: do trained Neural ODEs learn stable
  vector fields with Lyapunov stable fixed points (corresponding to robust classifiers),
  or can they exhibit Hopf bifurcations and limit cycles that cause oscillatory
  behavior? What happens when the neural ODE operates past its training time horizon?
  Can the dynamical systems analysis of Neural ODEs predict generalization failure and
  adversarial vulnerability?
systematic_gaps:
  - The Lyapunov stability spectrum of trained Neural ODE vector fields has not been systematically measured across architectures and tasks
  - Whether Neural ODEs can represent chaotic dynamics (positive Lyapunov exponents) and whether this correlates with poor generalization has not been studied
  - The relationship between the geometric structure of the learned flow (volume-preserving, gradient flow, Hamiltonian) and the network's inductive bias has not been characterized
related_bridges:

id: u-reservoir-computing-x-dynamical-systems
title: What is the optimal reservoir architecture (topology, spectral radius, sparsity) for tasks requiring different timescales
  of memory, and can criticality-tuned reservoirs outperform trained recurrent networks on real-world time series?
status: open
priority: medium
disciplines:
- computer_science
- physics
- neuroscience
summary: 'Reservoir computing theory predicts maximum computational capacity at the edge of chaos (spectral radius ρ ≈ 1),
  but this universal prescription ignores task-specific timescale requirements. Key unknowns: (1) can kernel theory predict
  optimal ρ for tasks with specific memory horizons, (2) do physical reservoirs (optical, mechanical, quantum) achieve equivalent
  expressivity to software reservoirs, (3) do biological neural circuits implement the echo state property, and if so, at
  what criticality parameter?'
systematic_gaps:
- No closed-form relationship between spectral radius ρ, task memory horizon T, and generalisation error
- Physical reservoir computers have not been benchmarked against trained LSTMs on identical tasks
- Whether cortical circuits satisfy the echo state property (fading memory) under in vivo conditions is untested
related_bridges:

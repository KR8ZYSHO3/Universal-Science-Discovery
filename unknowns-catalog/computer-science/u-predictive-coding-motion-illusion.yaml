id: u-predictive-coding-motion-illusion
title: What neural circuit mechanism explains why predictive coding networks trained on natural images generate the same motion illusions as human visual perception, and is this convergence inevitable or accidental?
status: open
priority: high
disciplines:
  - computational-neuroscience
  - computer-vision
  - psychophysics
  - cognitive-science
summary: >
  A 2021/2026 preprint (arXiv 2112.13243) demonstrates that motion illusions generated
  by predictive neural networks also fool humans - when a predictive coding model
  predicts the next frame of a static image (inferring motion from a still picture),
  the illusory motion it generates matches the direction and magnitude of human motion
  percepts. This suggests that predictive coding is the mechanism behind human motion
  illusions. However, whether this convergence is (1) mathematically inevitable for any
  model trained on natural image statistics, (2) specific to predictive coding and
  not other architectures (CNNs, vision transformers), or (3) coincidental (both systems
  happen to generate the same wrong answer by different mechanisms) is unknown.
  This has profound implications: if convergence is inevitable, then motion illusions
  are mathematical consequences of Bayesian inference on natural image statistics,
  not accidents of neural implementation. If not, they reveal something specific about
  biological visual processing.
systematic_gaps:
  - Whether non-predictive-coding neural networks (CNNs, ViTs) trained on the same natural image statistics also generate the same motion illusions has not been systematically tested.
  - Whether the illusion strength (perceived motion magnitude) is quantitatively predicted by the predictive error magnitude in the model has not been measured.
  - Whether the complete catalog of human geometric-optical illusions is reproduced by predictive coding models trained on natural images has not been compiled.
suggested_hypotheses:
  - All neural network architectures trained on natural image statistics generate human-matching motion illusions, regardless of architecture, because the illusions are Bayesian-optimal inferences from natural image statistics, not artifacts of predictive coding.
related_unknowns:
  - u-hopfield-capacity-cortex

id: u-spin-glass-optimization-hardness-phase-transition
title: >
  Does the computational hardness of random k-SAT peak exactly at the replica-symmetry-breaking transition, and can spin glass theory predict average-case algorithmic complexity for structured (non-random) instances?
status: open
priority: high
disciplines:
  - computer-science
  - statistical-physics
summary: >
  Statistical physics predicts phase transitions in random k-SAT difficulty that agree well with empirical observations, but the precise correspondence between RSB transition orders and specific hardness regimes is incomplete. Whether spin glass methods can be extended from random to structured (industry) SAT instances—where variable and clause structure is non-random—is unknown.

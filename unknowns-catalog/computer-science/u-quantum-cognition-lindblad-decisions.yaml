id: u-quantum-cognition-lindblad-decisions
title: Is the Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) master equation the correct quantum formalism for modeling order effects and conjunction fallacies in human decision-making?
status: open
priority: low
disciplines:
  - quantum-cognition
  - decision-theory
  - quantum-information
  - cognitive-psychology
summary: >
  A 2026 preprint (arXiv 2604.18643) proposes "quantum-like models of cognition and
  decision making" using open-system quantum mechanics - specifically the GKSL (Lindblad)
  master equation that describes a quantum system weakly coupled to an environment.
  Standard quantum cognition models use closed (unitary) quantum systems to model
  interference effects in human probability judgments (order effects, conjunction
  fallacies, disjunction effects). However, real cognitive systems are open: beliefs
  interact with social environment, media, and memory. The GKSL formalism models this
  "cognitive decoherence" - the leakage of quantum-like superposition into classical
  mixed states under environmental influence. The key open question is whether GKSL
  dynamics provide empirically distinguishable predictions from standard (unitary)
  quantum cognition models, and whether the "decoherence rate" parameter has a
  psychological interpretation (attention, interference, cognitive load).
systematic_gaps:
  - Whether GKSL open-system quantum cognition makes empirically distinguishable predictions from unitary quantum cognition on existing experimental datasets has not been tested.
  - The psychological interpretation of the Lindblad dissipation operators (what cognitive processes do they represent?) has not been developed.
  - Whether quantum-like models (GKSL or otherwise) outperform classical Bayesian updating plus response bias in predicting order effects across published experiments has not been meta-analytically assessed.
suggested_hypotheses:
  - GKSL quantum cognition models with environmental coupling rates proportional to task difficulty outperform unitary quantum cognition models in predicting within-subject order effect magnitudes, with AIC advantage > 2 per study.
related_unknowns:
  - u-social-ising-universality

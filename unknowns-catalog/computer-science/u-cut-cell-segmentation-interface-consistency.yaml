    note: Berger & Colella (1989) — adaptive mesh refinement with embedded boundaries / refinement foundations (J Comput Phys).
  - arxiv: "1505.04597"
    note: Ronneberger et al. (2015) — U-Net segmentation baseline widely used in medical imaging (arXiv).

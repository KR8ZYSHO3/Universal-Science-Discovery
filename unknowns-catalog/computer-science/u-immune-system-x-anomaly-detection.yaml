id: u-immune-system-x-anomaly-detection
title: >
  How does the adaptive immune system avoid missing novel pathogens while maintaining
  tolerance to self, and what computational principles underlie cross-reactive memory?
status: open
priority: medium
disciplines:
  - biology
  - computer_science
  - immunology
  - machine_learning
summary: >
  The adaptive immune system must balance specificity (avoid self-reactivity) and
  generalization (recognize novel pathogens with no prior exposure). The computational
  principle by which T-cell and B-cell receptors achieve cross-reactivity (recognizing
  related but unseen antigens) is not fully understood. In anomaly detection terms:
  how does the system generalize from training data (self-antigens) to detect novel
  anomalies (new pathogens)? The role of cross-reactive memory (heterologous immunity)
  and how it differs from classical one-class classification remains an open question
  with implications for vaccine design and autoimmune disease.
systematic_gaps:
  - The mathematical theory of T-cell receptor cross-reactivity (how similar must epitopes be for recognition) lacks a complete quantitative framework
  - How the thymic selection process sets the optimal decision boundary for self/non-self discrimination under evolutionary pressure is not understood
  - The computational equivalence between affinity maturation (B-cell receptor optimization) and meta-learning / few-shot learning algorithms has not been formalized

id: u-variational-inference-x-free-energy
title: >
  What determines the expressiveness vs. computational cost trade-off for variational
  families in high-dimensional Bayesian inference, and how does it relate to free energy
  landscape topology?
status: open
priority: high
disciplines:
  - computer_science
  - physics
  - machine_learning
  - statistical_mechanics
summary: >
  Variational inference approximates the posterior by minimizing free energy over a
  tractable family of distributions, but the choice of variational family determines
  the approximation quality. The relationship between the geometry of the variational
  family, the topology of the true free energy landscape, and the accuracy of the
  resulting approximate posterior is not well understood. In particular: when do mean-
  field approximations fail catastrophically (multimodal posteriors), and can renormalization
  group ideas from statistical mechanics guide the design of hierarchical variational
  families that capture long-range correlations?
systematic_gaps:
  - No general theory predicts when mean-field variational inference fails vs. succeeds based on properties of the target distribution's free energy landscape
  - The connection between variational inference approximation error and thermodynamic free energy barriers (phase transitions in the posterior) is not quantified
  - Renormalization group methods from statistical mechanics have not been systematically applied to design variational families that capture multi-scale correlations

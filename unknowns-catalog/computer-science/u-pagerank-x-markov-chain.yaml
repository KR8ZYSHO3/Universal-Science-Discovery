id: u-pagerank-x-markov-chain
title: >
  What is the optimal teleportation parameter alpha in PageRank for different network
  topologies, and how does mixing time scale with web graph structure?
status: open
priority: medium
disciplines:
  - computer_science
  - mathematics
  - network_science
summary: >
  The teleportation parameter alpha in PageRank (typically 0.85) is set heuristically
  but controls the trade-off between local link structure and global accessibility.
  Markov chain theory provides the framework (mixing time = spectral gap of Google
  matrix), but the optimal alpha for different web graph topologies — sparse, dense,
  scale-free, bipartite — is not theoretically characterized. Furthermore, how PageRank
  should be modified for dynamic web graphs (pages added/deleted) without full
  recomputation, and whether personalized PageRank on dynamic graphs converges, are
  open questions with practical importance for real-time web ranking.
systematic_gaps:
  - Theoretical analysis of how the optimal alpha depends on web graph spectral properties (degree distribution, clustering coefficient) has not been performed
  - Dynamic PageRank algorithms with guaranteed convergence bounds for graphs with continuous edge/node additions have not been established
  - The mixing time scaling law for PageRank on real-world scale-free web graphs has not been measured empirically vs. random graph predictions
related_bridges:

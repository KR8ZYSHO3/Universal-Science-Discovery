id: u-discrete-convolution-theorem-cnn-inductive-bias
title: How much of CNN generalization on natural images is explained by implicit spectral
  tilting induced by architecture depth, kernel size, and pooling versus task-specific learning?
status: open
priority: medium
disciplines:
- computer-science
- mathematics
summary: Fourier-domain analysis gives intuition but breaks with nonlinearities and finite
  boundaries. Quantitative bridges to empirical generalization bounds remain incomplete.
systematic_gaps:
- Nonlinearities prevent clean diagonalization; lack of unified spectral theory for deep stacks.
- Equivariance is approximate under padding and downsampling; error propagation poorly characterized.
suggested_hypotheses:
- h-cnn-layers-approximate-localized-spectral-filters

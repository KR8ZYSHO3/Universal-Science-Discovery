id: u-transformer-attention-biological-plausibility
title: To what degree does the transformer self-attention mechanism replicate the computations performed by neural attention circuits in the primate visual cortex?
status: open
priority: medium
disciplines:
  - computer-science
  - neuroscience
  - computational-neuroscience
  - machine-learning
summary: >
  The transformer attention mechanism (Vaswani et al. 2017) and theories of neural
  attention (biased competition, divisive normalisation) share structural similarities,
  but their quantitative correspondence has not been rigorously tested. Does the
  pattern of attention weights in a transformer head match the pattern of neural
  modulation in macaque V4 during a visual attention task? Do transformer attention
  failures (attention sinks, positional biases) have cortical analogues? Is the
  multi-head structure related to the parallel attention streams (spatial, feature,
  temporal) in cortex? These questions require bridging metrics between the two
  systems that do not currently exist.
systematic_gaps:
  - No quantitative comparison between transformer attention weight matrices and neural modulation patterns measured simultaneously with multi-electrode arrays in performing primates exists.
  - Whether attention head specialisation in transformers mirrors the functional specialisation of cortical attention areas (V4, MT, FEF) is not tested.
  - The temporal dynamics of neural attention (oscillations, saccadic resets at ~250 ms) have no counterpart in feedforward transformers and have not been addressed by recurrent transformer variants.
last_reviewed: "2026-05-05"

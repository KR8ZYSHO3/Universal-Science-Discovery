id: u-oscillatory-spiking-neural-computation
title: Do learnable neural oscillations implement a form of analog temporal computation that provably outperforms digital spiking networks on continuous-time sequence modeling tasks?
status: open
priority: medium
disciplines:
  - neuromorphic-computing
  - computational-neuroscience
  - machine-learning
  - dynamical-systems
summary: >
  A 2026 preprint (arXiv 2603.00153) introduces "Pulse-Driven Neural Architecture:
  Learnable Oscillatory Dynamics for Robust Continuous-Time Sequence Processing" -
  a spiking neural network variant where individual units have learnable oscillation
  frequencies, enabling phase-coded computation. Biological neural oscillations
  (gamma, theta, alpha bands) are known to encode information in spike phases relative
  to the oscillation cycle, not just spike rates. The open question is whether
  oscillatory spiking networks implement a provably distinct computational class from
  rate-coded or standard spiking networks, and whether their advantage on continuous-
  time tasks (speech processing, EEG decoding, motor control) is theoretically
  predictable or only empirically discovered. This bridges the computational theory
  of spiking networks (which is largely rate-coded) with the biological reality of
  phase-coded, oscillatory neural computation.
systematic_gaps:
  - Whether phase-coded oscillatory networks are computationally universal in a sense that rate-coded spiking networks are not has not been established.
  - The information capacity of phase-coded computation (bits per synapse per second) relative to rate-coded computation has not been formally compared.
  - Whether learnable oscillation frequencies converge to biologically observed frequency bands (gamma 30-80Hz, theta 4-8Hz) during training on natural data has not been tested.
suggested_hypotheses:
  - Learnable oscillatory networks trained on natural speech converge to oscillation frequency distributions matching human cortical frequency bands, because natural speech statistics select for the same temporal basis functions that evolution tuned in biological brains.

id: u-cahn-hilliard-segmentation-parameter-transfer-limits
title: >
  Which phase-field parameters from Cahn-Hilliard-style models transfer into practical diffuse-interface image segmentation, and where does the physical analogy break under nonconserved labels and learned features?
status: open
priority: medium
disciplines:
  - computer-science
  - mathematics
summary: >
  The analogy is useful only if it produces measurable tuning or stability gains. Conservation laws, noise models, and data terms differ between materials physics and image segmentation.
systematic_gaps:
  - Controlled segmentation benchmarks varying interface-width and curvature penalties.
  - Explicit tests of conserved versus nonconserved dynamics for label maps.
suggested_hypotheses:
  - h-interface-width-regularization-predicts-segmentation-stability
related_bridges:
  - b-cahn-hilliard-phase-separation-x-diffuse-interface-segmentation
last_reviewed: "2026-05-07"
references:
  - doi: "10.1063/1.1744102"
    note: Cahn and Hilliard (1958) free energy of nonuniform systems.

id: u-continuous-symmetry-neural-topology
title: Do continuous symmetries in neural population codes enable dynamic topological reconfiguration of network connectivity as a computational primitive, beyond what discrete architectures can achieve?
status: open
priority: medium
disciplines:
  - computational-neuroscience
  - machine-learning
  - topology
  - dynamical-systems
summary: >
  A 2026 preprint (arXiv 2602.23405) studies "de-individuated neurons" - neural units
  whose computational roles are defined by their position in a continuous symmetry group
  rather than by fixed identity (labeled neurons). Continuous symmetries (translation,
  rotation, permutation) in the weight space enable dynamic topological changes: as the
  network adapts, neurons can continuously rearrange into new effective connectivity
  patterns while preserving the functional computation. This is fundamentally different
  from discrete neural architectures where connectivity is fixed. The open question is
  whether continuous symmetry-enabled dynamic topology provides a computational advantage
  (faster learning, better generalization, more robust in-context adaptation) that is
  provably unachievable with fixed-topology networks. This connects the mathematical
  theory of Lie groups (continuous symmetries) to the computational theory of neural
  networks.
systematic_gaps:
  - Whether continuous-symmetry networks can compute functions that fixed-topology networks of equivalent size cannot has not been established in terms of expressivity theory.
  - The learning dynamics of networks with continuous symmetry (do they converge faster? to better optima?) relative to standard networks has not been analyzed theoretically.
  - Whether biological neural circuits exhibit dynamic topology changes consistent with continuous symmetry groups has not been measured in in vivo electrophysiology.
suggested_hypotheses:
  - Neural networks with continuous rotational symmetry in their weight space learn visual representations faster than fixed-architecture networks on rotated MNIST, because weight space rotations implement data augmentation exactly rather than approximately.
related_unknowns:
  - u-grokking-phase-transition

id: u-wgan-gp-tightness-versus-exact-lipschitz-projections
title: >
  How tightly do gradient-penalty WGAN critics approximate true 1-Lipschitz Kantorovich potentials on benchmark image manifolds compared with spectral normalization or exact orthogonal layers — measured with operator-norm audits during training?

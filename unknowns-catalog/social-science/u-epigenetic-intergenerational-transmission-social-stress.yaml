id: u-epigenetic-intergenerational-transmission-social-stress
title: >
  To what extent are epigenetic modifications induced by social adversity
  (poverty, trauma, discrimination) transmitted to offspring via germline epigenetic
  inheritance in humans — and over how many generations do such marks persist?
status: open
priority: critical
disciplines:
  - social-science
  - epigenetics
  - biology
  - developmental-biology
  - public-health
summary: >
  In rodents, early-life adversity produces stable epigenetic changes (DNA methylation,
  histone modifications) in the HPA axis genes (NR3C1, CRH, FKBP5) that are
  transmitted to F1 and sometimes F2 offspring via sperm methylation, small RNAs
  (miRNA, piRNA), and chromatin state — bypassing Mendelian inheritance. In humans,
  evidence is suggestive but contested: children of Holocaust survivors have different
  FKBP5 methylation from controls (Yehuda et al. 2016); children born during the
  Dutch Hunger Winter (1944-45) have altered methylation of IGF2 and other genes
  decades later. The open questions are: (1) Which specific epigenetic marks survive
  the post-fertilization epigenetic reprogramming (two waves: in primordial germ cells
  and again after fertilization, each resetting most methylation marks) — only imprinted
  loci and some retrotransposons are known to escape; (2) What fraction of poverty-
  or trauma-induced methylation changes are inherited vs. environmentally induced
  de novo in each generation; (3) Whether putative intergenerational transmission
  in humans can be distinguished from shared environmental exposures (reverse causality)
  in observational studies without prospective multi-generational cohort designs.
  The policy implications are profound: if social adversity is biologically heritable,
  then reducing inequality requires multi-generational timescales even with perfect
  social intervention.
systematic_gaps:
  - Prospective multi-generational human cohort studies with genome-wide methylation
    data on parents AND children AND grandchildren have not been completed.
  - The mechanism for escape from epigenetic reprogramming in the human germline
    has not been characterized for social-stress-induced methylation marks.
  - Causal inference methods (Mendelian randomization, natural experiments) have
    not been applied to disentangle intergenerational epigenetic transmission from
    intergenerational environmental persistence of social adversity.

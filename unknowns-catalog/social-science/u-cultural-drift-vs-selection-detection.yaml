id: u-cultural-drift-vs-selection-detection
title: >
  How can we empirically distinguish cultural drift (neutral random variation)
  from cultural selection (adaptive adoption) in archaeological and digital
  cultural datasets, given that both produce power-law frequency distributions?
status: open
priority: high
disciplines:
  - cultural-anthropology
  - evolutionary-biology
  - social-science
  - archaeology
summary: >
  Neutral models of cultural evolution predict that cultural variant frequencies
  undergo random walk dynamics (cultural drift), producing power-law or log-normal
  frequency distributions similar to those produced by frequency-dependent
  cultural selection. Distinguishing these mechanisms requires either time-series
  data with known population sizes (to test neutral model predictions about drift
  variance) or spatial patterns that differ between neutral and selective models.

  Key open questions:
  1. What statistical tests have the power to distinguish neutral cultural
     evolution from weak cultural selection in archaeological pottery/tool
     frequency time series (typical n ~ 50-200 artefacts per time period)?
  2. Do digital cultural variants (Twitter memes, TikTok sounds) show fitness
     landscapes consistent with cultural selection (high heritability, positive
     correlation between variants) or neutral drift (random fluctuations)?
  3. Does the Price equation decomposition (selection + transmission) applied
     to cultural data yield selection terms that are consistently significant
     across different cultural domains?
  4. Is the "Baldwin effect" (learned behaviour canalisng genetic evolution)
     operating in reverse in cultural evolution: do culturally selected traits
     create assortative mating pressure, eventually becoming genetically encoded?
systematic_gaps:
  - Most archaeological datasets have insufficient temporal resolution and
    spatial coverage to distinguish drift from selection using existing tests
  - Digital cultural datasets (social media) have the resolution but lack
    longitudinal tracking of individual cultural "lineages" needed for
    Price equation decomposition
  - The functional significance of archaeologically-tracked cultural variants
    (whether they affect fitness) is usually unknown, making selection
    coefficients unidentifiable from variant frequencies alone
suggested_hypotheses:
  - h-price-equation-cultural-trait-frequency
related_bridges:
  - b-cultural-evolution-darwinian

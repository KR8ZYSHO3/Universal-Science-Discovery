id: u-opinion-dynamics-critical-homophily
title: >
  Is there an empirically measurable critical homophily threshold in real
  social networks above which opinion distributions undergo a sharp
  transition from unimodal (pluralism) to bimodal (polarisation), and can
  this threshold be predicted from network topology using Ising model theory?
status: open
priority: high
disciplines:
  - social-science
  - political-science
  - network-science
  - statistical-physics
  - complexity-science
summary: >
  Ising-based opinion dynamics models predict a sharp phase transition
  from a disordered (pluralistic) phase to an ordered (polarised) phase as
  the effective social temperature T drops below a critical value T_c —
  equivalently, as network homophily (the tendency to connect with similar
  others) exceeds a critical threshold. This transition is predicted to be
  second-order in the mean-field limit, with the order parameter (mean
  opinion) scaling as m ~ (T_c - T)^β with β = 1/2.

  Key gaps: (1) Measuring effective social temperature T from empirical
  social network data requires fitting an Ising Hamiltonian to observed
  opinion dynamics — this is computationally hard (inverse Ising problem
  is NP-hard in general) and has only been done on small networks.
  (2) Whether the transition in real societies is sharp (second-order) or
  gradual (crossover) is unknown; the finite-size effects in a 300M-person
  society are different from the thermodynamic limit. (3) The Voter Model,
  Sznajd Model, and Deffuant Model all belong to different universality
  classes despite their qualitative similarity — which model best describes
  real political polarisation dynamics is unresolved. (4) Whether the
  increase in political polarisation observed in the US (1994–2024) and
  other democracies reflects a shift in T below T_c or a change in network
  topology (increasing homophily due to algorithmic curation) cannot be
  distinguished from current data.
systematic_gaps:
  - The inverse Ising problem (inferring J_{ij} from opinion correlations) is computationally tractable only for small networks; scalable methods are needed.
  - Natural experiments distinguishing the homophily hypothesis from the media-field hypothesis (increasing external field h rather than decreasing T) are lacking.
  - "Longitudinal data needed: measuring the same opinion network over decades to detect whether polarisation dynamics follow critical slowing-down signatures."
  - Cross-national comparison of polarisation dynamics has not been mapped onto differences in estimated Ising parameters.

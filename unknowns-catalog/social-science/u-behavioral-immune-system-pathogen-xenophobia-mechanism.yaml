id: u-behavioral-immune-system-pathogen-xenophobia-mechanism
title: >
  What is the specific cognitive-neural mechanism by which the behavioral immune system
  generalises from disease-avoidance disgust to anti-outgroup prejudice, and can this
  mechanism be modulated without impairing genuine pathogen detection — enabling
  interventions that reduce xenophobia while preserving public-health-relevant disgust?
status: open
priority: medium
disciplines:
  - social-science
  - evolutionary-biology
  - psychology
  - neuroscience
summary: >
  The behavioral immune system (BIS) produces both adaptive responses (avoid visibly
  ill individuals, wash hands, cook food) and maladaptive ones (stigmatize people with
  disabilities, prejudice against ethnic outgroups, discrimination against immigrants).
  The evolutionary account proposes that outgroup membership is a statistical predictor
  of pathogen exposure (novel pathogens from different regions) but the false-positive
  rate in modern societies is very high — most outgroup members carry no novel pathogens.
  The cognitive mechanism of this generalisation is unknown: Is it: (a) a shared
  neural substrate (insular cortex disgust circuitry) activated by both pathogen cues
  and social category cues (contamination contagion model)? (b) A learned association
  (conditioned disgust) reinforced by culturally transmitted narratives? (c) A cognitive
  heuristic ("foreigners = novel pathogens") that is modular and not accessible to
  rational override? Distinguishing these mechanisms has direct policy implications:
  if (a), reducing insular sensitivity pharmacologically could reduce both xenophobia
  and pathogen avoidance (undesirable tradeoff); if (b), counter-conditioning
  interventions can selectively target social but not pathogen disgust.
systematic_gaps:
  - No neuroimaging study has directly compared insular cortex activation to pathogen
    disgust cues (maggots, feces) vs. social disgust cues (outgroup images) vs. neutral
    disgust-irrelevant outgroup images in the same participants with matched image sets.
  - The specificity of BIS priming (disease salience → increased outgroup prejudice)
    for pathogen-relevant cues vs. general threat cues has not been controlled for
    threat-arousal confounds in published studies.
  - Whether individual BIS sensitivity predicts compliance with public health measures
    (mask wearing, vaccination) but also predicts anti-immigration attitudes in the same
    population, with the same effect size, has not been tested in a pre-registered study.
suggested_hypotheses:
  - >
    Insular cortex connectivity between pathogen disgust and social evaluation networks
    (amygdala-prefrontal axis) mediates BIS over-generalisation: high trait-disgust
    individuals show stronger functional coupling between insula and amygdala during
    outgroup image processing, and this coupling predicts both xenophobia scores and
    disease-protective behavior compliance — confirming shared neural substrate with
    dual behavioral consequences.

id: u-intergroup-contact-prejudice-reduction
title: Under what conditions does intergroup contact reliably reduce prejudice, and can these conditions be engineered in diverse societies at scale?
status: open
priority: high
disciplines:
  - social-science
  - psychology
  - sociology
summary: >
  Allport's contact hypothesis proposes that contact between groups reduces prejudice
  when four conditions are met: equal status, common goals, cooperation, and
  institutional support. Meta-analyses confirm positive average effects, but
  heterogeneity is high. Many real-world contact situations (residential desegregation,
  school integration) show null or negative effects. Whether the optimal conditions
  can be reliably engineered in natural settings is not established.
systematic_gaps:
  - The optimal contact conditions are theoretically specified but cannot be engineered reliably in real social settings.
  - Meta-analytic effect sizes are inflated by publication bias and include very heterogeneous interventions.
  - Long-term durability of contact-induced attitude change beyond the immediate contact situation is not established.
last_reviewed: "2026-05-05"

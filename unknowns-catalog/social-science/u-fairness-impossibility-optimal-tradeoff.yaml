id: u-fairness-impossibility-optimal-tradeoff
title: Given the mathematical impossibility of simultaneously satisfying demographic parity, equalized odds, and calibration, what principles should determine how to navigate the fairness-accuracy tradeoff in high-stakes algorithmic decisions?
status: open
priority: high
disciplines:
  - machine-learning
  - social-science
  - philosophy-of-justice
  - statistics
  - law-and-policy
summary: >
  Chouldechova (2017) and Kleinberg et al. (2017) proved that when base rates differ
  across groups, at most one of {demographic parity, equalized odds, calibration} can
  be satisfied simultaneously by a non-trivial classifier. This is a mathematical
  impossibility, not an engineering limitation. The open question is not how to satisfy
  all three simultaneously (impossible) but rather: given that a trade-off is mandatory,
  what normative principles — derived from political philosophy, law, or social agreement
  — should guide the choice of operating point on the fairness frontier? Rawlsian
  maximin (maximize the minimum group welfare) would select different operating points
  than utilitarian total-accuracy maximization or libertarian individual-fairness focus.
  Counterfactual fairness (Kusner 2017) avoids some impossibility results by shifting
  to a causal framing, but requires a structural causal model of discrimination that
  is never uniquely identified from observational data. The legal concept of disparate
  impact (Title VII) is not equivalent to any single mathematical fairness criterion.
systematic_gaps:
  - No agreed framework exists for translating political-philosophy normative principles (Rawls, Sen, Dworkin) into algorithmic fairness criterion choices.
  - The effect of long-run feedback loops (when a classifier's decisions affect future base rates) on fairness-accuracy tradeoffs over time is undercharacterized.
  - Participatory approaches to determining the operating point (asking affected communities) have been proposed but not implemented at scale with rigorous outcome evaluation.
last_reviewed: "2026-05-06"

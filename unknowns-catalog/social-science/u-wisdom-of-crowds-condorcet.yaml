id: u-wisdom-of-crowds-condorcet
title: "Under what conditions does social influence in online crowds irreversibly destroy collective accuracy, and is there a critical correlation threshold above which crowd wisdom collapses?"
status: open
priority: medium
disciplines:
  - social-science
  - probability
  - behavioral-economics
summary: >
  The Condorcet/CLT framework predicts crowd accuracy improves as 1/√N only
  when estimates are independent. Online platforms (Amazon, Yelp, prediction
  markets) show herding where later raters are influenced by earlier ratings,
  inducing positive correlation ρ among estimates. When ρ>0, the effective
  crowd size N_eff = N/(1+(N-1)ρ) → 1/ρ regardless of N — destroying the
  benefits of large crowds. The critical value of ρ above which collective
  accuracy is worse than a single expert is unknown. Whether sequential
  rating systems (where each person sees all prior ratings) create irreversible
  informational cascades or merely transient biases that wash out with more
  raters is contested.
systematic_gaps:
  - "The critical correlation threshold ρ* above which crowd accuracy falls below single-expert accuracy has not been analytically derived for fat-tailed individual estimate distributions."
  - "Whether sequential exposure to others' estimates increases ρ proportionally to the average displayed rating or only to the first few ratings seen (primacy effect) is unknown from behavioral experiments."
  - "Platform design interventions (anonymized ratings, delayed display, diverse ordering) have not been tested in controlled experiments for their effect on ρ."
related_bridges:
  - b-wisdom-of-crowds-condorcet
last_reviewed: "2026-05-07"
references:

id: u-opinion-dynamics-phase-transition-prediction
title: Can Ising-model-based opinion dynamics models predict real-world political polarization tipping points, and what empirical observables correspond to the social "temperature" and "coupling constant"?
status: open
priority: high
disciplines:
  - social-science
  - statistical-physics
  - complexity-science
  - political-science
summary: >
  The mapping of opinion dynamics onto the Ising model (agents with binary opinions
  ±1 interacting via social coupling J, subject to conformity pressure parameterized
  as social temperature T) predicts a phase transition at a critical temperature T_c:
  below T_c, global consensus or polarized order forms; above T_c, disordered
  fragmentation. Voter model, Deffuant bounded-confidence model, and Sznajd model
  are all variants of this spin system.

  The central unknown is whether this mapping has quantitative predictive power for
  real social systems — not just qualitative analogies. Specifically: what empirical
  measurements correspond to J (social coupling strength) and T (social temperature)?
  Can precursors of opinion phase transitions (critical slowing down, diverging
  susceptibility) be measured in social media data, polling, or communication patterns
  before tipping points occur? The quantitative bridge between physics and sociology
  has been proposed but not validated with held-out predictive tests.
systematic_gaps:
  - No empirical measure of "social temperature" T and "coupling constant" J has been validated against observed polarization outcomes across multiple societies and time periods.
  - Critical slowing down (a universal precursor of phase transitions in physics) has been proposed as a social polarization warning signal but not tested in prospective studies.
  - Network heterogeneity (scale-free social networks vs Ising lattice) changes the phase diagram qualitatively; most Ising-social models use unrealistic interaction geometries.
suggested_hypotheses:
  - The susceptibility of national opinion polls to small external perturbations (sudden news events) diverges near political polarization tipping points, analogous to Ising model divergence of magnetic susceptibility near T_c.
related_bridges:

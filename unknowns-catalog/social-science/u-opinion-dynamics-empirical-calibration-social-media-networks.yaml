id: u-opinion-dynamics-empirical-calibration-social-media-networks
title: >
  Can Ising/bounded-confidence opinion dynamics models be empirically calibrated
  to social media data (Twitter/X, Reddit), and do their predictions for polarization
  trajectories and consensus thresholds agree with observed political opinion
  distributions in longitudinal surveys?
status: open
priority: high
disciplines:
  - social-science
  - physics
  - computational-social-science
  - political-science
summary: >
  Statistical physics opinion models (Ising, Deffuant-Weisbuch bounded confidence,
  Sznajd) make quantitative predictions: a critical noise level T_c above which
  consensus is impossible, a confidence bound ε below which polarization into
  clusters is inevitable, and time-to-consensus scaling with system size N.
  Calibrating these models to real social data requires: (1) mapping the abstract
  "opinion" variable to measurable political positions (survey scales, tweet sentiment,
  party affiliation); (2) inferring the effective social coupling J from empirical
  contact networks (follow/retweet networks) and content engagement data; (3) measuring
  the effective "noise" T from individual opinion volatility in panel surveys.
  Current obstacles: social media data has complex network topology (scale-free,
  with bots and highly influential accounts) that differs from the regular lattices/
  mean-field assumptions of most opinion models; opinion change in humans is not
  a simple averaging rule but is influenced by identity, motivated reasoning, and
  in-group/out-group categorization. The bounded confidence model predicts that
  reducing ε (increasing ideological rigidity) produces more clusters — but whether
  empirically measured ε (from survey data on willingness to engage with opposing
  views) predicts the number of opinion clusters observed in voting data has not
  been tested quantitatively.
systematic_gaps:
  - Longitudinal panel studies with sufficient temporal resolution to fit opinion
    dynamics model parameters (daily or weekly opinion measurements over years).
  - Empirical measurement of the confidence bound ε from experimental studies of
    opinion updating in response to information from ideologically distant sources.
  - Quantitative comparison of opinion model predictions vs. long-term political
    polarization trends in multiple countries with different media environments.
  - Network-theoretic extensions of bounded confidence models that account for
    scale-free topology, echo chambers, and algorithmic curation.
suggested_hypotheses:
  - >
    The effective confidence bound ε inferred from Twitter/X retweet network
    homophily (probability of retweeting across partisan divide as proxy for
    interaction willingness) predicts the number of opinion clusters observed in
    Pew Research political polarization surveys within a factor of 2, validating
    the Deffuant-Weisbuch model as a quantitative predictor of polarization.
related_bridges:
  - b-statistical-mechanics-opinion

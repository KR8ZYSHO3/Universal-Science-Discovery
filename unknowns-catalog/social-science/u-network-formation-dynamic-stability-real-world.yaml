id: u-network-formation-dynamic-stability-real-world
title: Do empirical social networks converge to the Nash-stable configurations predicted by Jackson-Wolinsky theory, and how does the Braess paradox manifest in real social and information networks?
status: open
priority: medium
disciplines:
  - social-science
  - mathematics
  - network-science
summary: >
  Jackson-Wolinsky and Bala-Goyal network formation models make sharp predictions about
  stable network topologies (star networks, convergence from unilateral link formation)
  but these have rarely been tested against longitudinal empirical data. Real social
  networks evolve on timescales where agents make link decisions with incomplete information,
  changing preferences, and without knowledge of the global network structure. The Braess
  paradox — that adding links can worsen welfare — has been documented in road networks and
  internet routing, but its social network analogues (e.g., does adding communication
  channels in organizations reduce coordination?) are poorly understood. Peer-effects
  identification requires exogenous variation in network structure, limiting causal inference
  about network formation determinants.
systematic_gaps:
  - No large-scale longitudinal test of Jackson-Wolinsky equilibrium predictions against
    real network formation data (e.g., co-authorship networks, friendship networks).
  - Braess paradox in social networks (e.g., Slack channels, email lists) has not been
    systematically documented or measured.
  - Dynamic network formation with heterogeneous agents and private information is
    analytically intractable — no results on equilibrium existence or uniqueness.
related_bridges:
  - b-network-formation-games
last_reviewed: "2026-05-06"

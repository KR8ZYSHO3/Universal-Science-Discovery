id: u-human-error-organizational-accident-boundary
title: >
  Where exactly is the boundary between individual human error and organizational/
  systemic causation in accidents, and can a quantitative model assign causal
  weight to each level (operator, team, organization, regulatory, societal) in
  a manner that is both empirically valid and legally operable?
status: open
priority: high
disciplines:
  - social-science
  - engineering
  - organizational-psychology
  - safety-science
  - law
summary: >
  Reason's Swiss Cheese model and Perrow's Normal Accident Theory both argue that
  major accidents are rarely caused by individual human error alone — latent
  organizational conditions (inadequate training, production pressure, poor
  procedure design) are necessary contributing causes. However, the model is
  qualitative: it does not assign quantitative causal weights to different levels
  of the causal hierarchy. This creates: (1) scientific problem — we cannot test
  which interventions (operator training vs. procedure redesign vs. organizational
  culture change) are most cost-effective without quantitative causal attribution;
  (2) legal/policy problem — courts and regulatory agencies must assign liability,
  which requires a causal model with discrete attribution. Quantitative approaches
  exist: Bayesian networks can encode the Swiss Cheese model with conditional
  probability tables; STAMP (Leveson) uses systems-theoretic control models; FRAM
  (Hollnagel) is a functional model. None has been empirically validated against
  a systematic incident database with known causal weights. The boundary between
  individual error and systemic causation is contested in every major accident
  inquiry (Chernobyl, Challenger, Deepwater Horizon, Boeing 737 MAX).
systematic_gaps:
  - No empirically validated quantitative model assigns causal weights across the Reason causal hierarchy
  - Incident reporting systems (ASRS, ECORS) do not collect data sufficient to test Swiss Cheese predictions
  - Legal attribution requirements (proximate vs. distal cause) are inconsistent with multifactorial accident causation
  - Whether organizational culture change (HRO principles) causally reduces accident rate vs. confounded by safety investment
suggested_hypotheses:
  - h-swiss-cheese-alignment-accident-prediction

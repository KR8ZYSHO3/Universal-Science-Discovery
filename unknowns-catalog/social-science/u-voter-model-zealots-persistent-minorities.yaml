id: u-voter-model-zealots-persistent-minorities
title: >
  In voter models with zealots (committed agents who never change opinion),
  what fraction of committed minority advocates is sufficient to shift consensus
  in heterogeneous social networks, and how does network community structure
  modulate this tipping threshold?
status: open
priority: high
disciplines:
  - social-science
  - mathematics
  - network-science
  - statistical-physics
summary: >
  The standard voter model always reaches consensus (all agents agree) in
  finite systems. Adding zealots — a small fraction p of agents committed
  to opinion +1 who never change — fundamentally changes the dynamics:
  the system now has a unique stationary state with mean opinion x* = f(p),
  rather than two absorbing states.

  Xie et al. (2011) showed experimentally (human experiment) and theoretically
  that a committed minority of just 25% is sufficient to shift consensus in a
  mean-field voter model. But this result assumes a fully connected graph.
  On realistic social networks with community structure (echo chambers),
  the required fraction may be much higher for reaching global consensus,
  or much lower for triggering local cascade (tipping one community at a time).

  Key questions: (1) How does the 25% threshold change on heterogeneous networks
  with varying modularity? (2) Can seeding zealots optimally (in high-betweenness
  nodes) reduce the required committed fraction? (3) Is there a phase transition
  in the committed fraction-consensus space analogous to percolation?
systematic_gaps:
  - Analytical solution of voter model with zealots on arbitrary random graphs
  - Empirical measurement of zealot fraction in real social movements
  - Optimal seeding strategies for committed minorities in modular networks
  - Connection to social influence experiments and online platform dynamics
suggested_hypotheses:
  - h-network-community-structure-drives-polarization
related_bridges:

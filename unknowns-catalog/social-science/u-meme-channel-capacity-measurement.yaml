id: u-meme-channel-capacity-measurement
title: Can the channel capacity for cultural transmission be measured empirically for different media and idea types?
status: open
priority: medium
disciplines:
  - social-science
  - information-theory
  - cultural-evolution
  - communication-theory
summary: >
  Shannon's channel capacity is a theoretical maximum for information transmission
  in a communication channel. Applying this concept to cultural transmission requires
  operationally defining the "message" (cultural variant), the "channel" (social
  interaction, media), and the "noise" (copying errors, motivated distortion). While
  the information-theoretic framework is formally applicable, measuring actual
  channel capacity for cultural ideas in natural settings is technically and
  methodologically challenging. Experiments measuring transmission fidelity across
  chains of individuals (iterated learning, serial reproduction) provide partial
  data, but comprehensive capacity measurements across media, cultures, and idea
  types do not exist.
systematic_gaps:
  - Empirical estimates of mutual information I(X;Y) between transmitted and received cultural variants across different transmission media (oral, written, video, social media) have not been systematically obtained.
  - Whether cognitive attractors (Sperber) correspond to ideas with measurably higher channel capacity on the human cognitive channel has not been tested.
  - The effect of social media algorithmic amplification on effective channel capacity (versus noise characteristics) has not been quantified information-theoretically.
last_reviewed: "2026-05-05"

id: u-attitude-behavior-gap-pro-environmental
title: Why does high environmental concern consistently fail to predict pro-environmental behavior, and which psychological and structural mechanisms most effectively close the attitude-behavior gap at population scale?
status: open
priority: high
disciplines:
  - conservation-psychology
  - social-psychology
  - behavioral-economics
  - environmental-sociology
summary: >
  The attitude-behavior gap in pro-environmental behavior is one of the most replicated
  findings in environmental psychology: self-reported concern for the environment
  correlates only weakly (r ≈ 0.2–0.3) with actual behavioral change (energy reduction,
  dietary shift, sustainable transport use). The gap is attributed to: (1) psychological
  distance — climate change feels temporally and spatially remote; (2) social norms —
  default behaviors are environmentally costly and social conformity reinforces them;
  (3) structural barriers — individual behavior change is constrained by infrastructure
  (no bicycle lanes, no renewable energy option); (4) moral licensing — small green acts
  reduce motivation for larger ones; (5) the tragedy of the commons — individual sacrifice
  without collective action feels futile. The relative magnitudes of these mechanisms —
  and which are most tractable to behavioral interventions vs. structural policy —
  are not established. Large-scale RCTs of behavioral interventions (Opower energy
  reports, green defaults) show effect sizes of 1–10% energy reduction — unclear whether
  these effects persist, generalize, or interact with moral licensing rebound.
systematic_gaps:
  - Long-run (>2 year) persistence of nudge intervention effects on pro-environmental behavior has not been established for most interventions.
  - The contribution of structural vs. psychological barriers to the attitude-behavior gap has not been decomposed in a well-identified natural experiment.
  - Whether moral licensing rebound is large enough to offset nudge effectiveness is debated — meta-analyses give contradictory results depending on inclusion criteria.
last_reviewed: "2026-05-06"

id: u-prediction-market-thin-market-accuracy-limits
title: What are the fundamental accuracy limits of prediction markets with thin trading, and can LMSR automated market makers with subsidized liquidity overcome the no-trade theorem in practice?
status: open
priority: medium
disciplines:
  - information-economics
  - mechanism-design
  - statistics
summary: >
  Prediction markets are theoretically optimal information aggregators (Arrow-Debreu
  theory, LMSR proper scoring), but in practice most markets are thin — few traders,
  limited liquidity, poor calibration on rare events. The no-trade theorem (Milgrom-Stokey)
  predicts zero trading when priors are common knowledge, yet real markets do trade —
  implying traders have genuinely private information. But thin markets may fail to aggregate
  even existing private information if traders have insufficient incentive to participate.
  The LMSR market maker subsidizes liquidity (the market operator accepts bounded losses)
  but the optimal subsidy level b (controlling the price sensitivity) and its relation to
  the accuracy-liquidity trade-off is not theoretically derived for heterogeneous populations.
  Empirically, prediction markets outperform polls in elections but underperform in
  domains with few informed traders (highly technical scientific questions, long-horizon events).
systematic_gaps:
  - No theoretical characterization of prediction market accuracy as a function of
    trader population size, information heterogeneity, and LMSR subsidy b.
  - Optimal combination of prediction markets with other forecasting methods (expert
    elicitation, model ensembles) has not been derived under a unified framework.
  - The no-trade theorem's relevance to modern continuous-trading prediction markets
    (Metaculus, Polymarket) with real incentives has not been tested empirically.

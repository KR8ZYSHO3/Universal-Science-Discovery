id: u-crowd-dynamics-panic-transitions
title: "What are the measurable precursors of the transition from orderly evacuation to panic-driven crowd turbulence, and can social force model parameters be calibrated in real-time from LiDAR or video tracking to give advance warning of a crowd disaster?"
status: open
priority: critical
disciplines:
  - physics
  - social-science
  - complex-systems
summary: >
  Crowd disasters (Mecca 2015, Itaewon 2022) involve a transition from directed flow to disordered
  turbulence at high density. Key unknowns: (1) what critical density and velocity-correlation length
  precisely mark the onset of crowd turbulence in the social force model, and do these match the
  empirically observed 6 persons/m^2 threshold? (2) Can real-time velocity correlation length measured
  by LiDAR provide a leading indicator of crowd turbulence onset with at least 30-second advance
  warning? (3) What social force model parameters (desired speed, repulsion strength) change during
  panic, and how can these be estimated from pedestrian trajectory data during real events?
systematic_gaps:
  - High-density crowd trajectory data from actual disaster events is rarely publicly available for calibration
  - Real-time LiDAR-based crowd tracking systems with sufficient resolution for velocity correlation analysis have not been deployed at mass gathering venues
  - The transition from ordered to turbulent flow has not been observed experimentally in a controlled high-density setting

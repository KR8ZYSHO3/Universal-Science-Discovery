id: u-differential-privacy-utility-tight-bound
title: >
  What is the tight tradeoff between privacy budget epsilon and statistical utility
  for high-dimensional queries, and can tight privacy-utility Pareto frontiers be
  computed efficiently for arbitrary query workloads beyond counting queries?
status: open
priority: high
disciplines:
  - information-theory
  - statistics
  - computer-science
  - social-science
summary: >
  Differential privacy (Dwork et al. 2006) provides a rigorous privacy guarantee:
  epsilon bounds the log-likelihood ratio of any output under adjacent datasets.
  The privacy-utility tradeoff is well understood for simple queries (counting, mean)
  via the Laplace and Gaussian mechanisms, and for composition via moments accountant.
  However, for complex query workloads (workload-aware mechanisms), high-dimensional
  data (genomics), and local DP (data never leaves device), the tight achievable
  utility is not known. The US Census Bureau's deployment of DP for 2020 Census
  revealed that the utility-privacy tradeoff for geographic queries is much worse
  than expected, motivating tighter theoretical characterization.
systematic_gaps:
  - No general tight lower bound on utility loss for arbitrary high-dimensional query workloads under DP.
  - The relationship between local DP and central DP in terms of achievable accuracy is not tight.
  - Composition theorems for approximate DP (δ>0) are not tight in the multi-query regime.
last_reviewed: "2026-05-06"

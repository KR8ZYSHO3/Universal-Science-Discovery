id: u-strategic-voting-frequency-real-elections-empirical-magnitude
title: >
  What fraction of voters in real elections with plurality or ranked-choice
  voting vote strategically (not according to their true first preference),
  what is the net electoral effect of strategic voting on outcomes, and does
  the Gibbard-Satterthwaite theorem's prediction of universal manipulability
  manifest at empirically relevant rates?
status: open
priority: medium
disciplines:
  - political-science
  - economics
  - social-choice-theory
  - behavioral-economics
summary: >
  The Gibbard-Satterthwaite theorem guarantees that strategic voting is always
  possible in principle (there always exist preference profiles where voting
  strategically yields a better outcome). But the empirical question — how
  often does strategic voting actually occur, and does it change outcomes? —
  is largely unanswered.

  Survey-based estimates suggest 10-30% of voters in plurality elections report
  voting for a candidate other than their true first preference ("lesser evil"
  voting). Exit poll analyses (France's two-round system, UK first-past-the-post)
  suggest strategic coordination is common but hard to separate from preference
  change.

  Ranked-choice voting (RCV, used in Australia, some US jurisdictions) is
  argued to reduce strategic incentives because voters can rank their true
  first choice without "wasting" their vote. The empirical evidence is mixed:
  Maine 2018 congressional election showed significant second-choice transfer
  patterns consistent with strategic sincere voting, but strategic manipulation
  of rankings is still possible under RCV.

  The connection to Arrow's impossibility: strategic voting is a symptom of
  IIA failure — when the social outcome depends on how preferences are ranked
  for irrelevant alternatives, voters gain by misrepresenting rankings. Does
  the measured rate of strategic voting correlate with the theoretical degree
  of IIA violation for a given voting rule?
systematic_gaps:
  - No dataset combines true preference rankings (from conjoint surveys) with
    actual ballot choices at scale, preventing direct measurement of strategic
    voting frequency.
  - The effect of ballot information (whether voters know aggregate preference
    distribution) on strategic voting rate has not been studied with real
    electoral stakes.
  - Comparison of strategic voting rates across voting systems (plurality, RCV,
    approval, score) using pre-election preference surveys and post-election
    ballot analysis has not been done in a controlled way.
  - Whether strategic voting is individually rational at the individual level
    (low probability of being pivotal) is resolved theoretically (often not
    worth it) but contradicts observed behaviour.
suggested_hypotheses:
  - h-approval-voting-reduces-strategic-manipulation-vs-plurality
related_bridges:

id: u-replicator-equation-cultural-norm-stability
title: "Can replicator equation dynamics explain the stability and collapse of cultural norms and social conventions, and when do multiple Nash equilibria coexist as persistent alternative cultures?"
status: open
priority: medium
disciplines:
  - cultural-evolution
  - social-science
  - evolutionary-game-theory
summary: >
  The replicator equation describes how strategy frequencies evolve under selection.
  Applied to cultural evolution, strategies are behaviours or norms, fitness is
  social payoff, and the dynamics predict convergence to evolutionarily stable strategies
  (ESS). However, cultural norms differ from biological strategies in key ways:
  imitation fidelity is imperfect, social learning can be prestige-biased or conformist,
  and norms can be enforced by third-party punishment. Multiple coexisting equilibria
  (alternative stable cultures) are predicted when cooperation games have multiple ESS.
  The empirical question is whether real cultural change (norm shifts in gender roles,
  marriage practices, corruption tolerance) follows replicator-like dynamics with
  tipping points, or whether cultural change is gradual and continuous. Tipping point
  models predict sudden norm collapse when frequency crosses unstable interior equilibrium;
  gradual models predict linear change with external pressure. These predictions differ
  for policy interventions targeting norm change.
systematic_gaps:
  - No large-scale cultural norm dataset has been fit to replicator equation dynamics
  - The selection coefficient for cultural norm copying vs. independent evaluation is unmeasured
  - How punishment and reputation systems affect replicator dynamics in human populations is not modelled
suggested_hypotheses:
  - Cultural norm adoption follows S-curve (logistic) dynamics consistent with
    replicator equations when social learning is conformist-biased
references:

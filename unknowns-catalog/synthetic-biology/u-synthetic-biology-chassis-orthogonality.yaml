id: u-synthetic-biology-chassis-orthogonality
title: Can a fully orthogonal genetic chassis be engineered that runs synthetic gene circuits without crosstalk with host transcription/translation machinery?
status: open
priority: high
disciplines:
  - synthetic-biology
  - biotechnology
  - genetic-engineering
summary: >
  Engineered genetic circuits in bacteria or mammalian cells are embedded in a complex
  endogenous regulatory network. Transcription factors, ribosomes, RNA polymerases,
  and signaling molecules are shared between the circuit and the host — creating
  crosstalk that corrupts circuit function. An 'orthogonal chassis' would use completely
  different molecular machinery (orthogonal ribosomes, T7 RNA polymerase, orthogonal
  tRNAs) that does not interact with host machinery, enabling predictable circuit behavior.
  Partial orthogonality has been demonstrated (Anderson et al. 2010, Kwok 2010), but
  complete metabolic and regulatory decoupling from the host has not been achieved.
  A fully orthogonal cell would be the ideal platform for complex genetic circuit design.
systematic_gaps:
  - The minimum set of host resources that must remain shared (e.g., metabolism,
    membrane maintenance) vs. those that can be made orthogonal has not been determined.
  - Fitness costs of running parallel orthogonal and endogenous machinery are not
    characterized over evolutionary timescales.
related_bridges:
  - b-synthetic-biology-genetic-circuits
last_reviewed: "2026-05-06"

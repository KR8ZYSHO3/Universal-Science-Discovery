id: u-genetic-circuit-crosstalk-noise
title: How does molecular crosstalk and stochastic gene expression noise limit the complexity and reliability of engineered genetic circuits in living cells?
status: open
priority: high
disciplines:
  - synthetic-biology
  - systems-biology
  - information-theory
summary: >
  Engineered genetic circuits use transcription factors, promoters, and riboswitches
  assembled from characterized biological 'parts'. In practice, circuit behavior
  in a new cellular context often fails to match design predictions due to: (1) 
  molecular crosstalk — transcription factors binding to off-target promoters or
  competing with host gene regulation; (2) metabolic burden — expressing circuit
  genes depletes cellular resources (ribosomes, RNA polymerase, amino acids) and
  disrupts host physiology; (3) stochastic noise — gene expression in single cells
  is inherently noisy (Poisson statistics for low copy-number molecules), causing
  all-or-none circuit outputs to be probabilistic. Quantifying and modeling these
  interference sources to enable reliable multi-gene circuit design remains
  unsolved. The channel capacity of genetic circuits (maximum reliable information
  transmission) sets a fundamental limit on circuit complexity.
systematic_gaps:
  - No comprehensive crosstalk matrix for common synthetic biology transcription
    factor libraries has been measured experimentally.
  - The scaling of circuit noise with circuit complexity (number of interacting parts)
    has not been systematically characterized in bacteria or mammalian cells.
  - Methods to quantify metabolic burden of circuit expression in real time,
    to enable adaptive feedback control of resource allocation, are not available.

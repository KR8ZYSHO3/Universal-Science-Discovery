id: u-rna-folding-planar-pseudoknot-limits
title: Which biological RNAs require pseudoknot representations beyond planar DP, and how
  often do planar approximations distort functional predictions?
status: open
priority: medium
disciplines:
- biology
- computer-science
summary: Planar folding is computationally attractive but incomplete; tradeoffs between accuracy
  and complexity vary by RNA family (ribozymes, viral genomes).
systematic_gaps:
- Benchmarks disproportionately sample short sequences; long-range contacts challenge planar
  models.
- Co-transcriptional folding kinetics are not captured by static energy minimization.
suggested_hypotheses:
- h-nussinov-energy-approximates-planar-graph-parsimony

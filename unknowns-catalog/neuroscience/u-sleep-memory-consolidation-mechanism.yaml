id: u-sleep-memory-consolidation-mechanism
title: "Does sleep memory consolidation occur through hippocampal-cortical replay during sharp-wave ripples, and is this a necessary condition or a correlate of consolidation?"
status: open
priority: high
disciplines:
  - neuroscience
  - cognitive-science
  - systems-neuroscience
summary: >
  Sleep consolidation theory proposes that memories formed during waking experience
  are replayed during sleep and gradually transferred from hippocampus (fast, labile)
  to cortex (slow, stable). Evidence: (1) hippocampal sharp-wave ripples (80-120 Hz)
  during NREM sleep occur simultaneously with cortical slow oscillations and thalamic
  sleep spindles (13-15 Hz), suggesting coordinated replay; (2) disrupting sharp-wave
  ripples (targeted SWR suppression) impairs memory in rodents (Girardeau et al. 2009);
  (3) memory performance correlates with spindle density.
  However, critical unknowns remain: (1) whether replay is memory-specific
  (encoding the spatial/temporal pattern of the waking experience) or
  random activity that consolidates through homeostatic synaptic scaling;
  (2) whether the hippocampal-to-cortical direction of consolidation is causal
  (vs. cortex driving hippocampal replay); (3) whether the same mechanism operates
  for procedural, semantic, and episodic memory equally.
  The two-stage model predicts that targeted replay interruption should impair
  only recently-formed memories, not remote ones — a prediction not yet fully tested
  in humans.
systematic_gaps:
  - Causal necessity of SWR replay for human declarative memory consolidation not established
  - Direction of information flow (hippocampus→cortex vs cortex→hippocampus) during replay is contested
  - Mechanism by which replay changes synaptic weights (LTP? homeostatic scaling?) is not known
suggested_hypotheses:
  - Targeted suppression of sharp-wave ripples specifically during the first 90 minutes of NREM sleep following learning will impair next-day declarative memory by >30%, while suppression during REM will not — tested in humans with real-time SWR detection EEG
related_unknowns:
  - u-consciousness-binding-problem

id: u-lstm-gating-biological-analogue
title: Does the prefrontal cortex implement a biological analogue of LSTM gating where neuromodulatory signals (dopamine, acetylcholine) set an effective temperature controlling the persistence versus updating of working memory representations?
status: open
priority: medium
disciplines:
  - neuroscience
  - computational-neuroscience
  - statistical-mechanics
summary: >
  LSTM gating dynamics provide a statistical-mechanics model of memory: the forget gate
  sets an effective temperature controlling whether cell state (order parameter) is
  preserved or updated. Prefrontal cortex working memory exhibits similar bistable
  attractor dynamics with neuromodulatory control. Key unknowns: (1) Do dopamine D1
  and D2 receptor activation correspond to forget gate and input gate modulation,
  respectively? (2) Can the effective temperature of PFC working memory be estimated
  from neural population dynamics during context-switching tasks? (3) Does the
  bifurcation structure of PFC attractor dynamics match the predicted phase diagram
  from the LSTM statistical mechanics mapping? (4) Are there neural signatures of
  operating near the critical point (high susceptibility / maximum information transmission)?
systematic_gaps:
  - No direct test of neuromodulatory signals as effective temperature in PFC attractor models
  - No measurement of forget-gate analogues in neural recording data during working memory tasks
  - Statistical mechanics phase diagram for PFC working memory remains uncharacterised
related_bridges:

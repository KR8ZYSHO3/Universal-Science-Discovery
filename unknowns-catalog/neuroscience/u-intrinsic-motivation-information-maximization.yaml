id: u-intrinsic-motivation-information-maximization
title: Does the brain implement empowerment maximization (maximising mutual information between actions and future states) as the computational substrate for intrinsic motivation, and can this be detected as a distinctive neural signature that predicts autonomy need satisfaction independent of reward?
status: open
priority: medium
disciplines:
  - neuroscience
  - information-theory
  - cognitive-science
  - psychology
summary: >
  Self-determination theory predicts that autonomy, competence, and relatedness need
  satisfaction drives intrinsic motivation and well-being. Information theory proposes
  empowerment — the channel capacity I(A; S') from actions to future states — as the
  neurocomputational substrate. Key unknowns: (1) Is there a neural population code
  for empowerment that is distinct from expected reward signals? (2) Does dopaminergic
  activity track empowerment (action-outcome mutual information) rather than or in
  addition to prediction error? (3) Can the information-theoretic crowding-out
  prediction (extrinsic reward reduces action entropy and thus empowerment) explain
  the overjustification effect in behavioural neuroscience? (4) Do individuals with
  low autonomy need satisfaction show systematically lower action entropy in free-choice
  paradigms, measurable from movement kinematics or neural activity?
systematic_gaps:
  - No neural decoding of empowerment as distinct from expected reward in human or animal studies
  - Active inference model predictions for autonomy need satisfaction not tested against SDT predictions in matched paradigms
  - Information-theoretic crowding-out predictions not tested with neural measures alongside behavioral measures
related_bridges:
  - b-openalex-info-theory-intrinsic-motivation
last_reviewed: "2026-05-07"

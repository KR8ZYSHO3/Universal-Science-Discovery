id: u-snare-force-threshold-in-vivo
title: >
  What is the minimum SNARE zippering force required to trigger synaptic vesicle fusion in intact synaptic terminals, and how does this threshold vary across synapse types?
status: open
priority: high
disciplines:
  - neuroscience
  - biophysics
summary: >
  In vitro optical tweezers experiments measure SNARE complex zippering forces of 14-20 pN in reconstituted systems, but the effective force threshold required to drive membrane fusion at physiological temperature, lipid composition, and with all accessory proteins (complexin, synaptotagmin, Munc13, Munc18) present in vivo is unknown. Whether this threshold varies across fast (cerebellar mossy fiber) versus slow (hippocampal) synapses is unclear.
related_bridges:

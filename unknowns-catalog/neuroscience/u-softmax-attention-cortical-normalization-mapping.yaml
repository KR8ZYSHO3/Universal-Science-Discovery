id: u-softmax-attention-cortical-normalization-mapping
title: Which quantitative experiments separate softmax-like normalization from cortical
  divisive normalization in behaving animals when stimuli mirror transformer benchmark suites?
status: open
priority: medium
disciplines:
  - neuroscience
  - machine-learning
summary: >
  Analogies between softmax attention and cortical gain control are qualitative; rigorous mapping
  requires matched stimuli enabling estimation of surround pooling kernels versus attention logits,
  including temporal integration absent from static NLP benchmarks.
systematic_gaps:
  - Few datasets jointly recording population calcium imaging during controlled pseudo-natural datasets analogous to token contexts
  - Attention temperatures lack direct biophysical correlates across cortical layers
suggested_hypotheses:
  - h-softmax-attention-x-cortical-divisive-normalization
related_bridges:
  - b-softmax-attention-x-cortical-divisive-normalization
last_reviewed: "2026-05-07"
references:

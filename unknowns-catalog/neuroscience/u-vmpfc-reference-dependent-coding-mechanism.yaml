id: u-vmpfc-reference-dependent-coding-mechanism
title: >
  What is the computational mechanism by which vmPFC encodes reference-dependent
  subjective value, how does the reference point update during multi-item choice,
  and does this mechanism explain the neural basis of the framing effect and
  loss aversion?
status: open
priority: high
disciplines:
  - neuroscience
  - economics
  - cognitive-science
  - computational-neuroscience
summary: >
  Prospect theory (Kahneman & Tversky 1979) established that choices are evaluated
  relative to a reference point, with losses looming larger than gains (loss
  aversion coefficient λ ≈ 2.25). Neuroimaging has identified vmPFC as encoding
  subjective value with BOLD signals correlating with willingness-to-pay.
  Reference-dependent coding in vmPFC has been demonstrated: vmPFC activity is
  higher for items above vs. below the mean value in the choice set, and the
  reference point shifts with context. However, the computational mechanism is
  unresolved: (1) divisive normalization — the set-averaged value divides individual
  item value (consistent with Weber's law for perceptual coding); (2) range
  normalization — values rescaled to fill the range [min, max] of the current set;
  (3) OFC-vmPFC interaction — OFC encodes absolute value, vmPFC computes relative;
  (4) dopaminergic prediction error — the reference point is the expected value
  from recent reward history. These mechanisms make different predictions: range
  normalization predicts decoy effects; divisive normalization predicts Weber-Fechner
  scaling of choice probability; dopaminergic mechanism predicts history dependence
  with specific RPE signatures. Current evidence is insufficient to distinguish
  between them. Additionally, the neural correlate of the loss aversion coefficient
  λ has not been identified — is it a fixed property of vmPFC coding or dynamically
  regulated by anterior insula aversion signals?
systematic_gaps:
  - Pre-registered experiment distinguishing divisive vs. range normalization in vmPFC using designed stimulus sets
  - Neural correlate of the loss aversion coefficient λ and its modulation by pharmacological intervention
  - How the reference point is set before choice (expectation formation) vs. updated during choice (on-line integration)
  - Whether vmPFC reference-dependent coding differs between gains domain and losses domain at the single-neuron level
suggested_hypotheses:
  - h-beta-delta-neuroeconomics-dual-system

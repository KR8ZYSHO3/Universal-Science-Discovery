id: u-neural-decay-poisson-deviation-shared-overdispersion-tests
title: >
  Which residual diagnostics best separate true Poisson counting from detector dead-time, nonstationary rate drift, and bursty history dependence across radioactive-decay and neural spike-train datasets?
status: open
priority: medium
disciplines:
  - neuroscience
  - physics
  - statistics
summary: >
  The Poisson model is a shared baseline, but cross-domain residual tests are rarely benchmarked on datasets where the source of non-Poisson structure is known.
systematic_gaps:
  - Shared synthetic corpus spanning dead-time, refractory, bursting, and rate-modulated processes.
  - Calibration of time-rescaling and Fano-factor tests under finite observation windows.
suggested_hypotheses:
  - h-time-rescaled-residuals-separate-poisson-from-bursty-counting-systems
related_bridges:
  - b-poisson-counting-process-x-decay-spike-train-likelihood
last_reviewed: "2026-05-07"
references:
  - doi: "10.1038/nn0504-456"
    note: Brown et al. review point-process approaches for neural spike trains.

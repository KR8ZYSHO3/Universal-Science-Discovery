id: u-neural-manifold-dimensionality-behavior
title: What determines the intrinsic dimensionality of neural population activity manifolds, and does manifold geometry encode behaviorally meaningful variables beyond firing rates?
status: open
priority: high
disciplines:
  - computational-neuroscience
  - systems-neuroscience
  - machine-learning
  - mathematics
summary: >
  Dimensionality reduction applied to neural population activity reveals that activity
  during behavior lies on low-dimensional manifolds (d ≈ 3–20) embedded in high-
  dimensional firing rate space (n ≈ 100–1000). The intrinsic dimensionality d is
  thought to reflect the behavioral degrees of freedom encoded in the population.
  Open questions: (1) What determines d? Is it set by input statistics, synaptic
  connectivity structure, task demands, or some combination? (2) Is the manifold
  geometry (curvature, topology, metric) meaningful, or is it an artifact of the
  dimensionality reduction method? Ring topologies are established for head direction
  cells; toroidal structures for grid cells; motor cortex shows rotational dynamics.
  Does manifold topology reflect circuit architecture? (3) How stable are manifolds
  across days (Gallego et al. 2020 showed motor cortex manifolds are stable across
  months — but the mechanism is unknown). (4) Can manifold coordinates be decoded more
  efficiently than spike rate for brain-machine interfaces? The manifold hypothesis
  remains a framework without a mechanistic theory connecting circuit architecture to
  manifold geometry.
systematic_gaps:
  - The relationship between synaptic weight matrix spectral properties and the resulting manifold geometry has not been derived analytically for biologically realistic connectivity.
  - Methods for comparing manifold geometry across sessions, animals, and brain areas (e.g., Procrustes alignment, geodesic distances) lack validated statistical frameworks.
  - Whether manifold dimensionality increases during learning (more variables encoded) or decreases (compression into a lower-dimensional solution) is debated with contradictory empirical results across task types.
last_reviewed: "2026-05-06"

    note: Pathak et al. (2017) — intrinsic curiosity via prediction-error features (ICML preprint).
  - doi: "10.1109/tamd.2010.2056368"
    note: Schmidhuber (2010) — formal intrinsic-motivation theory framing (IEEE Trans AMD).

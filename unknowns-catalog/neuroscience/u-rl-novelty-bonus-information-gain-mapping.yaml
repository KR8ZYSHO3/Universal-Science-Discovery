id: u-rl-novelty-bonus-information-gain-mapping
title: >
  Which experimentally measurable neural quantities align with count-based novelty bonuses versus Bayesian information-gain objectives across tasks — without confounding reward prediction error and uncertainty reduction?
status: open
priority: medium
disciplines:
  - neuroscience
  - reinforcement-learning
summary: >
  Intrinsic-motivation algorithms partition uncertainty reduction and exploration bonuses differently; neural recordings mix value-prediction errors with informational signals depending on task structure and stimulus statistics. Mapping requires multi-task designs and model comparison with identifiable components.
systematic_gaps:
  - Longitudinal recordings during controlled novelty schedules with matched behavioral assays across species where dopamine imaging is feasible.
  - Human/non-human datasets comparing intrinsic-motivation model fits when reward schedules switch abruptly.
suggested_hypotheses:
  - h-count-novelty-scales-bayesian-information-gain-proxy
related_bridges:
  - b-rl-intrinsic-motivation-x-novelty-information-gain-neuroscience
last_reviewed: "2026-05-07"
references:

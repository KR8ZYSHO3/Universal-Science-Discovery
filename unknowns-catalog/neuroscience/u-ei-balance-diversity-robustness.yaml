id: u-ei-balance-diversity-robustness
title: How does the diversity of inhibitory interneuron subtypes contribute to cortical circuit stability, and does neural heterogeneity follow the same diversity-stability relationship as ecological communities?
status: open
priority: high
disciplines:
  - neuroscience
  - systems-neuroscience
  - computational-neuroscience
  - ecology
summary: >
  Cortical circuits contain excitatory pyramidal neurons and multiple inhibitory
  interneuron subtypes (PV, SST, VIP, NDNF). The specific roles of each subtype in
  circuit stability are partially characterized: PV cells provide fast feedforward
  inhibition, SST cells provide dendritic inhibition and divisive normalization, VIP
  cells disinhibit by inhibiting SST cells. Whether the diversity of interneuron
  subtypes is necessary for stability (as biodiversity is for ecosystem stability per
  May's criterion) or is redundant is unresolved. The May stability criterion applied
  to neural circuits predicts that heterogeneity lowers effective interaction variance,
  increasing stability — but this prediction has not been rigorously tested by
  selectively reducing interneuron diversity in vivo.
systematic_gaps:
  - No systematic measurement of random matrix eigenspectrum for biological cortical connectivity matrices including interneuron subtypes.
  - The functional consequences of selectively eliminating one interneuron subtype (beyond PV and SST) on overall circuit stability have not been measured.
  - Whether interneuron diversity in primates provides greater stability benefits than in rodents (consistent with circuit complexity scaling) has not been tested.
last_reviewed: "2026-05-06"

id: u-prefrontal-working-memory-mechanism
title: "Is prefrontal cortex working memory maintained by persistent firing (attractor dynamics) or by activity-silent synaptic weight changes — and are these mechanisms complementary or mutually exclusive?"
status: open
priority: high
disciplines:
  - neuroscience
  - cognitive-science
  - computational-neuroscience
summary: >
  Working memory — the ability to hold information "in mind" for seconds — has
  been attributed to persistent neural firing in prefrontal cortex (PFC) since
  Fuster & Alexander (1971): delay-period neurons in PFC fire continuously during
  the retention interval. This is the "attractor" model: reverberant excitatory
  loops maintain a stable firing pattern. However, Lundqvist et al. (2016) and
  Stokes (2015) proposed "activity-silent" working memory: information is encoded
  in short-term synaptic facilitation (STP) changes that persist without firing,
  and is read out only when probed. Both mechanisms have experimental support:
  (1) Persistent firing decreases with training and under anesthesia, inconsistent
  with a purely firing-based memory; (2) "Ping" stimuli can retrieve memory after
  a silent period, consistent with STP storage; (3) Pharmacological disruption of
  NMDA receptors impairs both mechanisms.
  The unknown: are the two mechanisms distinct memory systems (working memory + episodic
  buffer) or do they operate sequentially (STP stores, then if needed, attractor activates)?
systematic_gaps:
  - No experiment distinguishes STP-based from firing-based working memory in the same trial
  - Whether the two mechanisms store different content (identity vs. location) or are redundant is unknown
  - The capacity limits of STP-based working memory have not been derived theoretically
suggested_hypotheses:
  - Working memory items held for <2 s are stored in STP with no sustained firing; items held >2 s require attractor recruitment, predicting a bimodal distribution of delay-period firing rates in PFC with a gap at 2 s delay duration
related_unknowns:
  - u-consciousness-binding-problem

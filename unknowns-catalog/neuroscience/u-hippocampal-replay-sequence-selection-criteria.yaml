id: u-hippocampal-replay-sequence-selection-criteria
title: >
  By what mechanism does the hippocampus select which waking experience sequences are replayed during sharp-wave ripples, and what determines whether replay is forward or reverse?
status: open
priority: high
disciplines:
  - neuroscience
  - cognitive-science
summary: >
  Hippocampal replay events appear to preferentially reactivate sequences associated with reward and novelty, but the circuit mechanisms controlling which sequences are selected for reactivation during sharp-wave ripples are unknown. The conditions favoring forward versus reverse replay, and whether this distinction has cognitive consequences for consolidation versus planning, are debated.

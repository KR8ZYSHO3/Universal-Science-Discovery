id: u-connectome-spectral-laplacian
title: "What is the mechanistic link between individual differences in connectome Laplacian eigenspectrum and variability in cognitive performance, and how does the spectral gap change with learning?"
status: open
priority: high
disciplines:
  - neuroscience
  - network-science
  - mathematics
summary: >
  The graph Laplacian of the human connectome has an eigenspectrum whose
  properties (spectral gap λ₂, spectral radius λₙ, eigenvector localization)
  vary across individuals. It is unclear whether individual differences in
  λ₂ predict cognitive traits such as working memory, processing speed, or
  intelligence, and whether these differences reflect differences in white-matter
  microstructure or network topology per se. Furthermore, whether targeted
  learning (skill acquisition, spatial navigation training) shifts the spectral
  gap in specific brain regions is unknown. The relationship between the
  structural Laplacian spectrum and the functional connectivity spectrum
  (from fMRI) remains a key unresolved question.
systematic_gaps:
  - "No large-scale study has directly correlated Laplacian spectral gap λ₂ with cognitive battery scores while controlling for cortical thickness and white-matter microstructure."
  - "The test-retest reliability of connectome Laplacian eigenvalues from tractography is not established, limiting their use as biomarkers."
  - "Longitudinal studies tracking Laplacian eigenspectrum changes with learning, aging, or disease (multiple sclerosis, TBI) are absent."

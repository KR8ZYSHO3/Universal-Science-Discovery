id: u-fmri-connectivity-graphical-model-validity
title: "Do partial correlation graphical models estimated from resting-state fMRI BOLD signals accurately reflect direct synaptic connectivity, and what sources of confounding (hemodynamic variability, motion artifacts, physiological noise) most severely compromise the validity of functional connectivity estimates?"
status: open
priority: high
disciplines:
  - neuroscience
  - statistics
  - neuroscience-methods
summary: >
  Functional connectivity from fMRI is widely used as a proxy for structural brain connectivity, but the
  relationship between BOLD correlation and underlying neural connectivity is not well-established. The
  hemodynamic response function varies between regions and individuals, neurovascular coupling is affected
  by disease, and motion artifacts create spurious correlations. Key unknowns: (1) what fraction of
  functional connectivity edges reflect direct monosynaptic vs indirect polysynaptic connections when
  validated against tract-tracing data in primates, (2) can the graphical lasso regularization parameter λ
  be optimally selected to maximize structural connectivity correspondence rather than cross-validation score,
  (3) does dynamic functional connectivity (time-varying Σ(t)) reflect genuine neural state changes or
  primarily hemodynamic and motion artifacts?
systematic_gaps:
  - Ground truth for human functional connectivity validation requires non-existent complete human connectome at the cellular level
  - Regional hemodynamic response function variability is poorly characterized in aged, diseased, and pharmacologically-treated brains
  - The statistical power to detect individual edges in functional connectivity graphs from typical fMRI datasets (~10 min) is low for small effect sizes
related_bridges:

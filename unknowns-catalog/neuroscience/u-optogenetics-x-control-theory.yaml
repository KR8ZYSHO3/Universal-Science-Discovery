id: u-optogenetics-x-control-theory
title: What is the fundamental bandwidth limit of closed-loop optogenetic control imposed by channelrhodopsin kinetics, and
  can model predictive control overcome this limit for oscillatory neural dynamics?
status: open
priority: medium
disciplines:
- neuroscience
- computer_science
- engineering
summary: 'Channelrhodopsin-2 has on/off kinetics of ~10 ms, limiting closed-loop control bandwidth to ~100 Hz. Many neural
  oscillations of interest (gamma: 30-80 Hz, ripples: 150-250 Hz) approach or exceed this bandwidth. Model predictive control
  (MPC) could compensate by using a neural dynamics model to predict future states, commanding light pulses ahead of time.
  Whether MPC can overcome the actuator bandwidth limitation for fast neural oscillations is an open engineering challenge.'
systematic_gaps:
- Closed-loop optogenetic bandwidth has not been characterised as a function of opsin kinetics across available channelrhodopsins
- MPC has not been applied to closed-loop optogenetics with fast opsins (ChRmine, CoChR)
- The minimum light dose required for closed-loop gamma oscillation control has not been established
related_bridges:

id: u-circadian-desynchrony-disease-mechanisms
title: What are the causal mechanisms linking chronic circadian desynchrony (shift work, social jet lag) to metabolic syndrome, cancer, and neurodegeneration?
status: open
priority: high
disciplines:
  - chronobiology
  - neuroscience
  - medicine
  - epidemiology
summary: >
  Epidemiological evidence strongly associates shift work and chronic social
  jet lag with elevated risks of metabolic syndrome, type 2 diabetes,
  cardiovascular disease, breast cancer (IARC Group 2A carcinogen), and
  accelerated cognitive decline. The causal mechanisms remain incompletely
  understood. Candidates include: (1) misalignment between the central SCN
  clock and peripheral tissue clocks (liver, pancreas) disrupting metabolic
  timing; (2) suppression of nocturnal melatonin by artificial light at night
  affecting immune surveillance; (3) disrupted cortisol rhythms impairing
  stress responses and immune function. The Kuramoto model framework predicts
  that internal desynchrony (peripheral clocks decoupled from SCN) is more
  damaging than simple phase shift, but this has not been directly verified.
systematic_gaps:
  - Most human studies are observational; the effect of controlled experimental circadian misalignment on molecular clock parameters in accessible tissues (blood, biopsy) is incompletely characterized.
  - The timescale of irreversible damage from chronic desynchrony versus fully reversible phase-shift has not been established in animal models.
  - Pharmacological chronotherapy (timing drug delivery to circadian phase) lacks standardized patient-specific phase estimation methods.
last_reviewed: "2026-05-06"

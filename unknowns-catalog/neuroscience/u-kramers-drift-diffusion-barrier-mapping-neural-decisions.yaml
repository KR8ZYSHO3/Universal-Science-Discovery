id: u-kramers-drift-diffusion-barrier-mapping-neural-decisions
title: >
  Can Kramers-style barrier and noise parameters provide useful priors or diagnostics for drift-diffusion decision models without overextending the chemical-kinetics analogy?
status: open
priority: medium
disciplines:
  - neuroscience
  - chemistry
  - statistical-physics
summary: >
  The first-passage mathematics overlaps, but cognitive decision data include urgency, learning, and nonstationary strategies. The unknown is whether barrier-language improves model calibration or only repackages thresholds.
systematic_gaps:
  - Benchmarks comparing standard drift-diffusion fits against Kramers-informed priors.
  - Tests on reaction-time tails, not only mean reaction time and accuracy.
suggested_hypotheses:
  - h-reaction-time-tail-scales-with-effective-barrier-height
related_bridges:
  - b-kramers-escape-rate-x-drift-diffusion-decision-threshold
last_reviewed: "2026-05-07"
references:
  - doi: "10.1016/S0031-8914(40)90098-2"
    note: Kramers (1940) Brownian motion in a field of force and reaction-rate model.

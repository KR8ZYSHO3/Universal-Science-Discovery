id: u-myelination-conduction-velocity-optimality
title: >
  Is the observed g-ratio (myelin thickness / axon diameter ≈ 0.6) of mammalian
  myelinated axons truly optimal for maximising conduction velocity per unit axon
  volume, and does the cable-equation prediction match measured g-ratios across
  species and fibre types?
status: open
priority: medium
disciplines:
  - neuroscience
  - biophysics
  - mathematics
summary: >
  The cable equation predicts that conduction velocity in myelinated axons is
  maximised at a specific g-ratio (inner axon diameter / total fibre diameter)
  given fixed total fibre volume. Rushton (1951) derived g_optimal ≈ 0.6 under
  simplifying assumptions (uniform myelin resistance per unit length, Ranvier node
  spacing proportional to axon diameter). Empirical g-ratios measured by electron
  microscopy cluster near 0.6 in many but not all fibre types, suggesting evolutionary
  optimisation. However, the optimal g-ratio depends on assumptions about node of
  Ranvier geometry, periaxonal space resistance, and the relative costs of myelin
  membrane synthesis vs. axon volume. Whether the cable-equation optimisation
  correctly predicts g-ratio variation across species (from small invertebrates with
  minimal myelination to large whales with long axons) and across fibre types
  (sensory vs. motor vs. autonomic) has not been comprehensively tested with modern
  electron microscopy data and three-compartment cable models.
systematic_gaps:
  - No comprehensive dataset of g-ratios across species paired with conduction
    velocity measurements and cable-equation predictions.
  - The contribution of periaxonal space resistance and paranodal seals to
    effective myelin capacitance has not been incorporated in most optimality analyses.
  - The evolutionary cost function (energy per bit of information transmitted) has
    not been rigorously defined and tested against real axon data.
related_bridges:
  - b-electrophysiology-action-potential
last_reviewed: "2026-05-06"

id: u-glymphatic-flow-impairment-alzheimers
title: Does glymphatic system impairment causally drive amyloid-β and tau accumulation in Alzheimer's disease, and what interventions can restore glymphatic clearance in aging brains?
status: open
priority: critical
disciplines:
  - neuroscience
  - fluid-dynamics
  - neurology
  - medicine
summary: >
  The amyloid cascade hypothesis (Hardy & Higgins 1992) posits that amyloid-β
  accumulation drives Alzheimer's disease (AD). Anti-amyloid therapies (aducanumab,
  lecanemab) show that antibody-mediated amyloid clearance can slow cognitive
  decline, suggesting causality — but the effect sizes are modest (33% slowing
  over 18 months). An alternative or complementary mechanism is insufficient
  glymphatic clearance of amyloid-β and tau during sleep.

  Iliff et al. (2012) showed that 60% of interstitial amyloid-β in mouse brain
  is cleared via glymphatic flow; Xie et al. (2013) showed that clearance rates
  double during sleep. In aging humans, arterial pulsatility decreases by 20-40%,
  AQP4 channel polarization to perivascular astrocyte endfeet is disrupted, and
  sleep quality declines — all of which would impair glymphatic clearance. But
  whether glymphatic dysfunction is a cause, consequence, or independent risk
  factor for AD in humans is unknown.
systematic_gaps:
  - Direct measurement of glymphatic flow rates in living human brains has not been achieved with sufficient spatial and temporal resolution to distinguish early AD from healthy aging.
  - Whether AQP4 polarization loss in human AD brains precedes or follows amyloid plaque formation is unknown.
  - No interventional study has enhanced glymphatic clearance in humans and measured downstream effects on amyloid/tau burden and cognitive function.
suggested_hypotheses:
  - Glymphatic dysfunction (measured by CSF tracer MRI) precedes amyloid PET positivity in APOE4 carriers by 5-10 years, establishing glymphatic impairment as an upstream event in the AD cascade.

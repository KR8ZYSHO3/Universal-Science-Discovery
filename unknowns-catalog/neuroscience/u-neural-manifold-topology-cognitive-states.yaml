id: u-neural-manifold-topology-cognitive-states
title: What is the topology of neural population activity manifolds during higher cognitive tasks (decision-making, working memory, abstract reasoning)?
status: open
priority: high
disciplines:
  - neuroscience
  - mathematics
  - cognitive-science
  - computational-neuroscience
summary: >
  Persistent homology has revealed toroidal topology in grid cell populations and
  ring manifolds in head direction cells. The topology of neural manifolds during
  higher cognitive tasks — prefrontal cortex during working memory, parietal cortex
  during decision-making, temporal cortex during semantic processing — is largely
  unexplored. Whether the complexity of cognitive representation (number and type of
  topological features) scales with task difficulty, learning, or intelligence is
  unknown. The question of whether distinct cognitive states (confident vs. uncertain
  decisions, remembered vs. forgotten stimuli) correspond to distinct topological
  structures in the neural activity manifold has not been addressed.
systematic_gaps:
  - Systematic persistent homology analysis of prefrontal, parietal, and temporal cortex activity during cognitive tasks is lacking in both rodent and primate models.
  - Whether the Betti numbers of neural manifolds scale with cognitive complexity (task difficulty, memory load) has not been tested.
  - The topological changes in neural manifolds during learning (formation of new memories, acquisition of new skills) have not been characterised.
last_reviewed: "2026-05-05"

id: u-neural-criticality-tipping-shared-mathematics
title: >
  Do neural systems and climate systems share the same universality class of
  bifurcation, making early-warning indicator methods developed in one field
  directly transferable to the other with quantitatively predictable performance?
status: open
priority: high
disciplines:
  - neuroscience
  - climate-science
  - statistical-physics
  - dynamical-systems
summary: >
  Both neural criticality (Beggs & Plenz 2003) and climate tipping points
  (Scheffer et al. 2009; Dakos et al. 2008) exhibit rising AR1 autocorrelation,
  increasing variance, and diverging spatial correlation as the respective system
  approaches its critical/tipping transition. The mathematical explanation in both
  cases invokes the fold (saddle-node) bifurcation normal form, and both show
  power-law fluctuations with a critical exponent of -3/2 in avalanche/storm
  size distributions.

  However, key questions remain unresolved:
  (1) Are they in the same universality class? Neural criticality appears to be
  at a mean-field directed percolation critical point (exponent -3/2), while
  climate tipping points involve a fold bifurcation in a spatially extended system.
  These have different universality classes in the renormalization group sense,
  which would limit the quantitative transferability of EWI methods.
  (2) What is the false-positive rate of climate EWI methods when applied to
  neural data and vice versa? No systematic cross-domain validation study exists.
  (3) Can multivariate EWI methods from neuroscience (dynamic functional
  connectivity, principal eigenvector analysis) improve lead time for climate
  tipping predictions beyond univariate AR1?
systematic_gaps:
  - No cross-domain validation study has applied neural criticality EWI methods
    to climate time series or vice versa under controlled conditions
  - The universality class of neural criticality (mean-field DP vs. conserved DP
    vs. subcritical Hopf) remains contested, preventing definitive mathematical
    mapping to climate fold bifurcation
  - Multivariate EWI methods from neuroscience have not been applied to climate
    model output or paleoclimate proxy records
suggested_hypotheses:
  - Multivariate EWI methods from neural criticality analysis (principal eigenvector
    of correlation matrix) applied to CMIP6 model output near simulated AMOC
    tipping will improve detection lead time by >20% vs. univariate AR1
related_unknowns:
  - u-abrupt-climate-transitions
  - u-amoc-collapse-threshold

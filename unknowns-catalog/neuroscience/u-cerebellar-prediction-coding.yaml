id: u-cerebellar-prediction-coding
title: "Does the cerebellum implement a forward model for predicting sensory consequences of motor commands, and can this explain cerebellar involvement in non-motor functions?"
status: open
priority: medium
disciplines:
  - neuroscience
  - computational-neuroscience
  - motor-control
summary: >
  Marr (1969) and Ito (1984) proposed that the cerebellum learns to predict the
  sensory consequences of motor commands (forward models), using climbing fiber
  error signals to update Purkinje cell weights via LTD. This internal model
  framework explains cerebellar motor learning (VOR adaptation, eyeblink conditioning,
  limb reaching adaptation). However, the cerebellum is activated in non-motor tasks
  (language, working memory, attention, emotion), contradicting a purely motor forward
  model. Two competing explanations: (1) Predictive processing expansion: the cerebellum
  is a general prediction machine, implementing forward models for cognitive and
  perceptual processes as well as motor control; (2) Timing hypothesis: the cerebellum
  specifically encodes temporal predictions and precise timing, used in both motor
  and non-motor domains where precise timing matters. The circuit mechanism is similar
  in both accounts (Purkinje cells + climbing fibers + granule cells), but the
  representations learned differ. Lesion studies confound motor and cognitive roles
  because timing deficits affect both.
systematic_gaps:
  - The non-motor forward models hypothesized for language and working memory have not been identified at the circuit level
  - Whether cerebellar timing predictions use the same mossy fiber/parallel fiber/climbing fiber machinery as motor learning is not established
  - DREADD or optogenetic silencing of specific cerebellar lobules during cognitive tasks has not been performed in humans
suggested_hypotheses:
  - Cerebellar lobule VI-VII BOLD activation during language tasks encodes prediction error (mismatch between predicted and actual word meaning), not motor preparation, measurable as a surprise response to semantic violations with distinct timing from language cortex
related_unknowns:
  - u-consciousness-binding-problem
references:
  - doi: "10.1038/nrn3916"
    note: "Ito (2008) Nature Reviews Neuroscience - cerebellum as prediction machine"
last_reviewed: "2026-05-05"

id: u-neural-field-theory-empirical-connectome-validation
title: Do the eigenmodes of the empirical human connectome structural Laplacian quantitatively predict the spatial and temporal structure of resting-state fMRI networks and EEG frequency bands across individuals?
status: open
priority: high
disciplines:
  - computational-neuroscience
  - neuroimaging
  - mathematical-physics
summary: >
  Neural field theory predicts that resting-state brain activity patterns are the spatial
  eigenmodes of the connectome structural Laplacian, analogous to vibration modes of a
  physical object. Preliminary evidence from Robinson et al. (2016) shows the first
  ~200 eigenmodes capture most of the variance in fMRI functional connectivity. However,
  rigorous validation requires: (1) individual-level predictions (connectomes vary by ~30%
  across individuals), (2) quantitative prediction of EEG frequency band power spectra
  (not just spatial patterns), (3) prediction of how network activity changes with
  lesions, drugs, or anesthesia. The theory also assumes linear dynamics near a fixed
  point — it is unclear whether nonlinear effects are needed to explain clinically
  relevant brain states (seizures, anesthesia, sleep transitions).
systematic_gaps:
  - Individual-level prediction of fMRI networks from diffusion tractography connectomes
    has not been validated against held-out functional data in large cohorts (n > 1000).
  - The number of connectome eigenmodes needed to explain behavioral variability in
    cognitive tasks is unknown.
  - Nonlinear extensions of neural field theory (Hopf bifurcations, amplitude equations)
    have not been systematically compared to the linear eigenmode model on empirical data.

id: u-motor-cortex-population-dynamics-motor-programs
title: >
  Are the rotational dynamics in motor cortex (Churchland 2012) a universal
  feature of all voluntary movements, and does the low-dimensional neural manifold
  represent an abstract motor program or a specific muscle activation pattern —
  and how does the manifold change during motor learning?
status: open
priority: high
disciplines:
  - neuroscience
  - mathematics
  - motor-control
summary: >
  Churchland et al. (2012) showed that M1 population activity rotates in state
  space before and during reaching, and proposed that this rotation generates the
  temporal muscle activation pattern from a low-dimensional initial condition.
  However, whether rotational dynamics generalise beyond reaching to other movement
  types (grasping, rhythmic locomotion, speech articulation) is not established.
  The content of the neural manifold is debated: does each point represent an
  abstract movement command (kinematics) or a specific muscle activation pattern
  (kinetics)? Perturbation experiments (microstimulation within vs. outside the
  manifold) suggest within-manifold perturbations are more behaviourally disruptive,
  but the causal role of rotational dynamics (necessary for movement? or epiphenomenal?)
  is unresolved. Motor learning: how the manifold changes as a new motor skill is
  acquired — whether the same manifold is reused with different initial conditions
  or a new manifold forms — is a central open question for both motor neuroscience
  and BCI recalibration after decoder drift.
systematic_gaps:
  - Rotational dynamics have been demonstrated in reaching but not systematically
    characterised in locomotion, grasping, or speech articulation.
  - The causal necessity of rotational dynamics for movement execution has not been
    established (optogenetic or microstimulation perturbation of the rotation).
  - The manifold geometry changes during motor learning have not been measured
    with simultaneous recordings across all motor learning stages.
related_bridges:

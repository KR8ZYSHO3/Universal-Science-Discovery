id: u-neural-binding-mechanism-synchrony
title: Is gamma-band synchrony a causal mechanism for neural binding or an epiphenomenon of shared input, and what alternative mechanisms could solve the binding problem?
status: open
priority: high
disciplines:
  - neuroscience
  - cognitive-science
  - physics
summary: >
  The binding-by-synchrony hypothesis proposes that gamma oscillations (30-100 Hz)
  bind distributed cortical representations into unified percepts via phase locking.
  Critics argue that observed synchrony is caused by shared input or lateral connections
  rather than being a binding mechanism per se (correlation vs. causation problem).
  Alternative hypotheses include polychronization, assembly coding, and routing via
  coherence. Key unknowns: (1) does artificially induced synchrony cause perceptual
  binding, (2) can binding occur in the absence of gamma oscillations (e.g., after
  pharmacological blockade), (3) what is the read-out mechanism that detects synchrony?
systematic_gaps:
  - No causal test has simultaneously induced gamma synchrony and measured perceptual binding in a controlled paradigm
  - The read-out problem (how downstream neurons detect synchrony) lacks a clear mechanistic answer
  - Binding-by-synchrony is hard to distinguish from binding-by-rate-coding in most experimental paradigms
related_bridges:

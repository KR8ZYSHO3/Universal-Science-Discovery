id: u-stdp-natural-stimuli-in-vivo-plasticity-rules
title: >
  What are the actual synaptic plasticity rules operating in vivo during natural
  stimulus-driven activity, and do STDP windows measured with artificial spike-pair
  protocols in vitro accurately predict plasticity under natural firing patterns
  with realistic spike train statistics?
status: open
priority: critical
disciplines:
  - neuroscience
  - computational-neuroscience
  - electrophysiology
summary: >
  STDP rules (Markram 1997, Bi & Poo 1998) were characterized using precisely
  controlled pre-post spike pairs or triplets delivered artificially in slice
  preparations. In vivo, neurons fire in complex spike trains with irregular
  timing, burst patterns, and population-level oscillations (gamma, theta). The
  triplet STDP model (Pfister & Gerstner 2006) improves on pair STDP for
  predicting in vivo plasticity, but the full spike train dependence is not known.
  Several outstanding issues: (1) In vivo measurement of plasticity during natural
  sensory stimulation (visual RF plasticity during natural image viewing, auditory
  cortex plasticity during natural sound) requires chronic recording and careful
  statistical separation of plasticity from other gain-control mechanisms.
  (2) The BCM sliding threshold operates on the timescale of hours-days —
  longer than most in vitro experiments. (3) Dendritic nonlinearities (back-
  propagating APs, dendritic calcium spikes) create location-dependent STDP windows
  that differ from somatic recordings. (4) Neuromodulator state (ACh, dopamine,
  norepinephrine) strongly modifies plasticity thresholds but is rarely controlled
  in vitro experiments.
systematic_gaps:
  - Chronic in vivo recording during natural stimulation with simultaneous
    optogenetic monitoring of synaptic weight changes.
  - BCM sliding threshold measurement in vivo — direct measurement of theta_M
    dynamics during sensory experience.
  - Dendritic STDP rules (compartment-specific plasticity) in intact neurons
    in vivo.
  - Neuromodulator-dependent gating of STDP in identified cortical circuits.
suggested_hypotheses:
  - >
    STDP rules measured with artificial paired-pulse protocols in vitro will
    fail to predict the sign of plasticity (LTP vs. LTD) in >30% of cases when
    tested with in vivo natural firing patterns, because triplet/quadruplet
    interactions and neuromodulatory state substantially reshape the effective
    learning rule beyond what pair-STDP captures.

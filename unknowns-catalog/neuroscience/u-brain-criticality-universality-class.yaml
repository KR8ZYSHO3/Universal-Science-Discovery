id: u-brain-criticality-universality-class
title: >
  What is the universality class of the critical point at which the brain
  operates — mean-field branching process, directed percolation, or another
  universality class — and does this class vary across brain regions, species,
  or cognitive states?
status: open
priority: high
disciplines:
  - neuroscience
  - statistical-physics
  - condensed-matter-physics
  - computational-neuroscience
summary: >
  The critical brain hypothesis (Beggs & Plenz 2003) establishes that cortical
  networks operate near a critical point, with neural avalanche distributions
  following power laws P(s) ~ s^{-3/2} and P(t) ~ t^{-2}. These exponents
  match mean-field branching process theory (Zapperi et al. 1995). However,
  the mean-field universality class applies when the system is effectively
  infinite-dimensional (e.g., on a fully connected graph). Real cortical
  networks have finite dimensionality and heterogeneous connectivity.

  The directed percolation (DP) universality class — the generic class for
  absorbing state phase transitions — predicts different exponents
  (β ≈ 0.58, ν_⊥ ≈ 0.73 in 3D). Some experimental measurements are consistent
  with DP (Ribeiro et al. 2010), others with mean-field, and some with neither.
  The discrepancies may reflect: (a) different neural circuit types (L2/3 vs L5),
  (b) measurement artifacts (coarse-graining of electrode arrays), (c) a
  genuinely novel universality class for neural systems, or (d) the brain being
  slightly subcritical or in a Griffiths phase.

  Understanding the universality class would determine which features of neural
  dynamics are universal (same in all brains) vs. system-specific, with
  implications for the interpretation of EEG/fMRI criticality measurements.
systematic_gaps:
  - Single-unit recording at cellular resolution across a macroscopic cortical area
  - Finite-size scaling analysis of avalanche distributions in vivo
  - Comparison of 2D vs 3D cortical network critical exponents
  - Role of long-range cortico-cortical connections in modifying universality class

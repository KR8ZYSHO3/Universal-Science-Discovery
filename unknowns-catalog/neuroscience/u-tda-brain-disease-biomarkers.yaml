id: u-tda-brain-disease-biomarkers
title: Can topological data analysis of brain connectivity or EEG/fMRI time series provide disease-specific biomarkers distinguishing psychiatric conditions?
status: open
priority: high
disciplines:
  - clinical-neuroscience
  - algebraic-topology
  - psychiatry
summary: >
  Topological data analysis applied to functional connectivity matrices or neural
  activity point clouds may reveal disease-specific changes in the topology of brain
  dynamics that are invisible to standard connectivity measures. Persistent homology
  of resting-state fMRI data has shown differences in Betti numbers between healthy
  controls and schizophrenia patients (Lee et al. 2011), Alzheimer's patients (Chung
  et al. 2015), and epilepsy (Phinyomark et al. 2017). However, these studies have
  small samples (N < 50), lack replication, and have not been tested in prospective
  clinical settings. Whether TDA biomarkers outperform simpler graph-theoretic measures
  (clustering coefficient, path length, modularity) in predictive validity remains unknown.
systematic_gaps:
  - No large-scale (N > 500) preregistered study of TDA brain biomarkers for any
    psychiatric condition has been published.
  - The choice of filtration (correlation threshold, distance metric) substantially
    affects TDA results but has not been standardized across studies.
related_bridges:
  - b-persistent-homology-neural-representation
last_reviewed: "2026-05-06"

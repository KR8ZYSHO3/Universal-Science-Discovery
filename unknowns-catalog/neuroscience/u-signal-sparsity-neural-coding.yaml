id: u-signal-sparsity-neural-coding
title: Are neural population codes sparse in some transform basis (Fourier, wavelet, learned dictionary), and does sparsity optimize energy consumption vs. information capacity?
status: open
priority: high
disciplines:
  - computational-neuroscience
  - information-theory
  - signal-processing
summary: >
  Olshausen & Field (1996) showed that learning a sparse code for natural images
  produces Gabor-like basis functions resembling V1 simple cell receptive fields.
  This suggests neural codes are sparse representations of sensory inputs. Sparse
  coding in higher areas (hippocampus, piriform cortex) has been observed but the
  appropriate transform basis for each area is unknown. Whether the brain implements
  compressed sensing (recovering signals from fewer measurements than information
  content) or sparse approximation (representing signals with few active neurons)
  has different implications for neural circuit design and decoding algorithms.
systematic_gaps:
  - The basis in which neural population codes are sparse is not known for most
    brain regions beyond primary sensory cortex.
  - The energy-accuracy tradeoff of sparse vs. dense coding has not been measured
    directly in behaving animals with metabolic imaging.

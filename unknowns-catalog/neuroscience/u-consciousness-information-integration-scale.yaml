id: u-consciousness-information-integration-scale
title: At what spatial and temporal scale does information integration relevant to consciousness occur in the brain, and how does this scale relate to clinical consciousness loss?
status: open
priority: critical
disciplines:
  - consciousness-science
  - neuroscience
  - philosophy-of-mind
summary: >
  IIT (Tononi 2004) proposes that consciousness corresponds to integrated information
  Phi, but does not specify the spatial or temporal scale at which Phi should be
  measured. Neurons, cortical columns, brain regions, and whole-brain networks each
  show different integration patterns. The temporal scale question: should Phi be
  computed over milliseconds (neural timescale), seconds (cognitive timescale), or
  longer? Empirically, anesthesia-induced loss of consciousness produces changes in
  cortical integration at timescales of 100ms-1s, while deep sleep shows fragmented
  but locally integrated activity. The appropriate measurement window that captures
  consciousness-relevant integration is unknown, making Phi measurements incomparable
  across studies.
systematic_gaps:
  - No systematic study of how Phi (or proxies) varies with measurement window duration
    and spatial scale in conscious vs. unconscious subjects has been published.
  - Whether the clinically validated consciousness proxy PCI (perturbational complexity
    index) converges to a Phi approximation in any limit has not been shown.
related_bridges:

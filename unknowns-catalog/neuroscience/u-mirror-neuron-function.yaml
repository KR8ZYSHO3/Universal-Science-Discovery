id: u-mirror-neuron-function
title: "Do mirror neurons in humans implement action understanding through motor simulation, or is their activation an epiphenomenon of learned sensorimotor associations?"
status: open
priority: medium
disciplines:
  - neuroscience
  - cognitive-science
  - social-neuroscience
summary: >
  Mirror neurons, discovered in macaque area F5 (di Pellegrino et al. 1992),
  fire both when the monkey performs an action and when it observes another
  agent performing the same action. Rizzolatti & Craighero (2004) proposed
  that mirror neurons implement "motor simulation" of observed actions, providing
  a direct neural substrate for action understanding, imitation, and empathy.
  Suggested extensions: mirror neuron dysfunction in autism (broken mirror
  hypothesis, Ramachandran 2000). However, the following is contested:
  (1) Whether human mirror neurons (inferred from fMRI BOLD, not single-unit recording)
  actually fire for action observation — fMRI cannot distinguish mirror from
  other visuomotor neurons; (2) Whether motor simulation is necessary for action
  understanding (lesion studies of motor cortex do not impair action understanding);
  (3) The broken-mirror hypothesis of autism lacks consistent empirical support.
  The debate: are mirror neurons a cause of action understanding, or do they learn
  visuomotor associations that are correlated with, but not causal for, understanding?
systematic_gaps:
  - Single-unit recording of human mirror neurons is not feasible outside of presurgical epilepsy monitoring, giving limited data
  - No causal test (TMS disruption) of mirror neuron area specifically impairs action understanding without motor disruption confound
  - Whether mirror neurons generalize to abstract actions (understanding a concept vs. a physical gesture) is unknown
suggested_hypotheses:
  - Mirror neuron area (IFG/premotor) TMS disruption specifically impairs judgments of goal-directed action similarity but not perceptual similarity, demonstrating causal role in action understanding with a double dissociation
related_unknowns:
  - u-consciousness-binding-problem
references:

id: u-neurovascular-coupling-x-fluid-dynamics
title: >
  What determines the spatial spread of the hemodynamic response in fMRI, and how
  does vessel architecture limit the resolution of neurovascular coupling?
status: open
priority: medium
disciplines:
  - neuroscience
  - physics
  - fluid_mechanics
  - biophysics
summary: >
  The BOLD fMRI signal integrates neural activity over ~1 mm voxels due to the spatial
  spread of the hemodynamic response — a limitation arising from the fluid dynamics of
  cerebrovascular networks. The precise mechanism by which vasodilation propagates
  upstream (conducted vasodilation) and downstream (Hagen-Poiseuille redistribution)
  from the active capillary bed determines the spatial point-spread function of fMRI.
  Whether 7T ultra-high field fMRI can achieve true laminar resolution (~300 um) requires
  understanding the fluid mechanical limits — specifically whether capillary-level
  vasodilation is localized or spreads via arteriolar conducted response. This directly
  limits the fundamental spatial resolution of fMRI-based brain mapping.
systematic_gaps:
  - The spatial extent of conducted vasodilation (arteriolar upstream propagation) as a function of neural activation size and duration has not been measured in vivo with sufficient resolution
  - Computational fluid dynamics models of realistic cortical vascular networks have not been validated against two-photon microscopy velocity measurements in awake animals
  - Whether the r^4 nonlinearity of Hagen-Poiseuille creates a threshold effect in BOLD sensitivity (below which vessels cannot be detected) has not been quantified

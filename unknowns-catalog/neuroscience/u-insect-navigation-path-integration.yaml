id: u-insect-navigation-path-integration
title: "How does the insect central complex ring attractor circuit implement the nonlinear noise correction that prevents path integration error from accumulating faster than the √L random-walk prediction?"
status: open
priority: medium
disciplines:
  - neuroscience
  - robotics
  - computational-neuroscience
summary: >
  Dead-reckoning models predict that path integration error grows as √L (random
  walk), but empirical measurements in desert ants show slower error growth over
  long paths — suggesting the animals have a noise-suppression mechanism beyond
  simple integration. Candidate mechanisms include: (1) inhibitory interactions
  in the ring attractor that sharpen the bump (reducing bump width = heading
  uncertainty); (2) environmental cues (polarization, landmarks) that partially
  reset the integrator; (3) active uncertainty reduction by reducing path length
  (choosing direct routes). The neural circuit mechanism for any of these in the
  insect central complex has not been identified at the level of specific cell types
  and synaptic connections.
systematic_gaps:
  - "The relationship between the width of the heading bump in the Drosophila CX and the effective heading uncertainty (in degrees) has not been calibrated using simultaneous electrophysiology and behavioral tracking."
  - "Whether E-PG neurons in the fly CX implement a form of lateral inhibition that sharpens the bump under high-noise conditions is untested."
  - "Path integration error accumulation has not been measured in mutant flies with altered CX circuit properties (e.g., reduced E-PG → P-EN connectivity)."
related_bridges:

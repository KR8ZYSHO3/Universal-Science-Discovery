id: u-eeg-source-localization-skull-conductivity
title: >
  How much does inter-individual variability in skull electrical conductivity degrade EEG source localization accuracy, and can in vivo conductivity imaging sufficiently correct for this?
status: open
priority: high
disciplines:
  - neuroscience
  - physics
summary: >
  The skull has conductivity ~20× lower than brain tissue, and individual skull conductivity varies by a factor of ~5 across subjects depending on bone density. EEG forward models typically assume fixed conductivity values, introducing systematic errors in source localization. Whether transcranial electrical stimulation or EIT-based skull conductivity mapping can sufficiently individualize forward models for clinical applications (epilepsy surgery planning) is unresolved.

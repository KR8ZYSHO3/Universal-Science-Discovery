id: u-bayesian-brain-prior-encoding
title: How are Bayesian priors physically encoded in neural circuits, and how do they change with learning?
status: open
priority: high
disciplines:
  - neuroscience
  - computational-neuroscience
  - cognitive-science
  - statistics
summary: >
  The Bayesian brain hypothesis predicts that perception involves inference with
  a prior P(cause). But the neural substrate of the prior — where and how it is
  stored in synaptic weights, what its functional form is for different perceptual
  domains, and how it is updated by experience — is unknown. Psychophysical experiments
  show prior-consistent biases (slow speed prior for motion, cardinal orientation prior),
  but the mapping from these behavioral priors to specific neural circuits and
  synaptic architecture has not been established. The form of the prior (Gaussian?
  heavy-tailed? multimodal?) for different perceptual dimensions is also unresolved.
systematic_gaps:
  - The neural circuits encoding specific perceptual priors (e.g. slow motion prior in MT, cardinal orientation prior in V1) have not been identified at the synaptic level.
  - Whether prior strength changes with development (critical periods) and adult learning follows Bayesian update rules is not tested quantitatively.
  - The prior distributions over high-level semantic categories (objects, faces, social intentions) are not characterised in computational or neural terms.
last_reviewed: "2026-05-05"

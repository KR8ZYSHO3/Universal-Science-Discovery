id: u-neural-plasticity-x-hebbian-learning
title: Does spike-timing dependent plasticity (STDP) implement exact gradient descent on a well-defined loss function in recurrent neural circuits, and can this be exploited to train spiking neural networks on cognitive tasks without explicit backpropagation?
status: open
priority: high
disciplines:
  - neuroscience
  - computer_science
  - biology
summary: >
  STDP has been shown to approximate gradient descent in simple feedforward networks
  (Xie & Seung 2000), but the loss function being optimized is unclear in recurrent
  networks with complex dynamics. Biological networks use neuromodulatory signals
  (dopamine, acetylcholine) as global reward signals that modify STDP — suggesting
  a three-factor learning rule (pre × post × reward). Whether this three-factor rule
  implements exact backpropagation through time (BPTT) or an approximation, and whether
  it can train networks on tasks requiring long-range temporal credit assignment,
  remains unresolved.
systematic_gaps:
  - No proof that three-factor STDP rules implement BPTT in arbitrary recurrent networks
  - The biological substrate encoding the reward eligibility trace (time window for dopamine to act) is not identified
  - STDP-trained spiking networks have not matched backpropagation-trained networks on complex cognitive benchmarks
related_bridges:

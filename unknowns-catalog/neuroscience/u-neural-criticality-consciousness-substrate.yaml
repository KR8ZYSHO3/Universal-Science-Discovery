id: u-neural-criticality-consciousness-substrate
title: "Is neural criticality (operation near a second-order phase transition) a necessary condition for conscious information integration, or merely an optimisation of computational performance?"
status: open
priority: high
disciplines:
  - consciousness-science
  - computational-neuroscience
  - statistical-physics
summary: >
  The critical brain hypothesis proposes that neural circuits operate at the edge of a
  phase transition, maximising dynamic range, information transmission, and computational
  repertoire. Beggs & Plenz (2003) showed power-law avalanche distributions in cortical
  tissue consistent with criticality. But is criticality causally necessary for
  consciousness, or merely a performance optimiser? Integrated Information Theory (IIT)
  predicts high Φ (integrated information) at criticality. Global workspace theory
  predicts ignition dynamics consistent with near-critical amplification. Empirical
  evidence: anaesthesia drives brain subcritical (avalanche exponent increases); epilepsy
  is supercritical; conscious perception correlates with near-critical response
  amplification. However, the direction of causality is debated: does criticality
  produce consciousness, or does conscious brain state maintain criticality?
  A causal test requires perturbation of criticality in awake subjects and measurement
  of conscious access.
systematic_gaps:
  - No experiment has causally manipulated criticality and measured consciousness directly
  - Whether local or global criticality is relevant to consciousness is unresolved
  - The relationship between IIT's Φ and critical exponents has not been derived
suggested_hypotheses:
  - Conscious access in bistable perception is gated by near-critical neural amplification;
    subcritical bias eliminates perception even with identical sensory input
references:
  - doi: "10.1523/JNEUROSCI.5601-03.2003"
    note: "Beggs & Plenz (2003) — neural avalanches"
  - doi: "10.1038/nphys2413"
    note: "Haimovici et al. (2013) — brain criticality and resting-state dynamics"
last_reviewed: "2026-05-06"

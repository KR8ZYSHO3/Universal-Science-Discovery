id: u-phi-measurement-neural-correlates
title: Can integrated information (Phi) be practically measured in neural systems, and do its values correlate with empirical markers of conscious level?
status: open
priority: critical
disciplines:
  - neuroscience
  - philosophy-of-mind
  - consciousness-science
summary: >
  Integrated Information Theory (IIT, Tononi 2004) defines consciousness as integrated
  information Phi — the amount of information generated by the whole system beyond
  its parts. Phi is conceptually rigorous but computationally intractable: exact
  computation requires exponential time in the number of system elements. Approximations
  (Phi_3, PhiID, PCI) differ substantially and are not guaranteed to rank systems
  correctly. The key empirical test — whether Phi (or a scalable proxy) correlates
  with clinical consciousness markers (vegetative state, locked-in syndrome, anaesthesia
  depth, dreaming) — has produced mixed results. The perturbational complexity index
  (PCI) correlates with consciousness level but was not derived from IIT. No Phi
  approximation has been validated against all known empirical constraints (patients
  with cerebellar lesions retain consciousness despite high computational load there;
  feedforward networks would have low Phi but may support some computation).
systematic_gaps:
  - No scalable Phi approximation has been validated against all empirical consciousness
    markers in a preregistered study.
  - The cerebellar challenge to IIT (large cerebellum, abundant neurons, but lesions
    don't abolish consciousness) remains unresolved.
  - Whether Phi measures consciousness or merely functional complexity (which correlates
    with consciousness as a confound) is methodologically unresolved.
suggested_hypotheses:
  - h-integrated-information-entropy-equivalence

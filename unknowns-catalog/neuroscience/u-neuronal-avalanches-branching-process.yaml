id: u-neuronal-avalanches-branching-process
title: "Is cortical criticality (branching parameter σ=1) a robustly maintained operating point or an epiphenomenon of anesthesia and slice preparation artifacts, and what homeostatic mechanism sets σ?"
status: open
priority: high
disciplines:
  - neuroscience
  - statistical-physics
  - probability
summary: >
  The neuronal avalanche / cortical criticality hypothesis predicts that cortex
  operates near the critical point of a branching process (σ≈1), maximizing
  dynamic range and information transmission. However, several confounds challenge
  this interpretation: (1) power laws can arise from non-critical processes including
  phase-space collapse; (2) many avalanche studies use electrode arrays with
  limited spatial coverage, producing apparent power laws over insufficient decades;
  (3) the exponents τ=3/2 and α=2 are predicted by mean-field theory but deviations
  are expected for finite-size networks. The homeostatic mechanism that would maintain
  σ≈1 in vivo — whether synaptic scaling, intrinsic excitability, or inhibitory
  plasticity — has not been identified.
systematic_gaps:
  - "High-density Neuropixels recordings in awake behaving animals show avalanche statistics that deviate from power-law predictions in at least some behavioral states."
  - "The branching parameter σ is sensitive to bin-width choice and electrode selection, and no consensus protocol exists for robust estimation."
  - "No causal manipulation of σ (e.g., pharmacologically setting σ to 0.9, 1.0, 1.1) while measuring functional performance has been performed."
related_bridges:

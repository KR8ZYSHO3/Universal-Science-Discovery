id: u-predictive-coding-neural-implementation-evidence
title: >
  What is the direct experimental evidence that cortical circuits implement hierarchical
  predictive coding, specifically: do superficial-layer pyramidal cells carry prediction
  errors (bottom-up) and deep-layer pyramidal cells carry predictions (top-down), and
  can single-cell recordings during violations of sensory predictions validate these
  layer-specific functional assignments?
status: open
priority: high
disciplines:
  - neuroscience
  - cognitive-science
  - computational-neuroscience
summary: >
  The predictive coding framework makes specific anatomical predictions: superficial
  pyramidal cells (layers 2/3) send ascending prediction error signals; deep pyramidal
  cells (layers 5/6) send descending prediction signals. NMDA receptors on apical
  dendrites of layer 5 cells are proposed to integrate prediction signals. These
  predictions have strong computational support (Rao & Ballard 1999, Friston 2005) but
  experimental evidence is mixed and largely correlational rather than causal. Key gaps:
  (1) Direct single-unit recordings comparing L2/3 vs. L5 responses to expected vs.
  unexpected stimuli in the same cortical column are limited; most studies use population-
  level imaging (fMRI, ECoG). (2) Causal evidence — optogenetic silencing of L5 cells
  should impair predictions but not error signals in L2/3, while silencing L2/3 should
  impair error-driven learning; these experiments have not been done with the required
  layer specificity in primary sensory cortices. (3) The precision-weighting mechanism
  (attention = modulation of prediction error gain) predicts that acetylcholine and
  noradrenaline specifically modulate L2/3 error unit gain — pharmacological tests are
  incomplete.
systematic_gaps:
  - Layer-resolved Neuropixels recordings during mismatch negativity paradigm
    (oddball sequence violations) have not been analysed with sufficient anatomical
    precision to confirm L2/3 prediction error vs. L5 prediction signal assignment.
  - Causal optogenetic experiments silencing layer-specific cell types during prediction
    learning (conditioning) and prediction violation (extinction) have not been done
    in the same preparation.
  - Whether predictive coding extends to motor cortex (in the active inference sense —
    motor cortex sends proprioceptive predictions, not commands) has not been directly
    tested with movement-selective layer-specific recordings.
suggested_hypotheses:
  - >
    Layer 2/3 pyramidal cells in primary visual cortex show significantly higher firing
    rates for stimulus omissions (pure prediction errors) than for expected stimuli,
    while layer 5/6 cells show the reverse pattern in the same recording sessions;
    this layer specificity is abolished by NMDA receptor blockade (ketamine) consistent
    with prediction integration requiring NMDA-mediated apical dendritic computation.

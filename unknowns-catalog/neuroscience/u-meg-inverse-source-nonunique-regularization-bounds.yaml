id: u-meg-inverse-source-nonunique-regularization-bounds
title: >
  What quantitative bounds link SQUID array layout, sensor noise, and regularization choice to worst-case
  localization error for distributed cortical sources in realistic head models?
status: open
priority: high
summary: >
  Clinicians need interpretable uncertainty. This unknown asks for certificates analogous to Cramér–Rao or
  posterior credible sets that propagate through nonlinear head geometry and model mismatch.

systematic_gaps:
  - "Few public phantoms combine known ground-truth current patterns with whole-head SQUID noise covariances."
  - "Model mismatch between BEM/FEM conductivity maps and tissue anisotropy is rarely upper-bounded in inversions."

suggested_hypotheses:
  - h-squid-array-regularization-improves-meg-source-localization

related_bridges:
  - b-meg-squid-forward-x-em-inverse-source

references:

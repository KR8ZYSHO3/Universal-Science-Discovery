id: u-grid-cell-fourier-basis-navigation
title: "Does the multi-scale grid cell system implement an optimal Fourier basis for encoding spatial position with minimum neurons, and what is the theoretical lower bound on the number of grid modules needed for unique position encoding across an environment without ambiguity?"
status: open
priority: high
disciplines:
  - neuroscience
  - mathematics
  - cognitive-science
summary: >
  Grid cells fire on a hexagonal lattice with multiple scales; the scales appear to increase geometrically
  (ratio ~ 1.4) across modules. Key unknowns: (1) is the geometric scale ratio optimal in an information-
  theoretic sense for unique position encoding (Chinese Remainder Theorem analog), and can this be derived
  from the Fourier basis properties of hexagonal lattices? (2) How many grid modules exist in rodents and
  humans, and what is the actual minimum needed for unique disambiguation of any position in a known
  environment? (3) What happens to grid cell toroidal manifold topology during novel environment
  exploration, and how is the manifold deformed when the environment changes size or shape?
systematic_gaps:
  - The number of grid modules in humans is estimated from fMRI but individual module resolution is insufficient for toroidal manifold analysis
  - The scale ratio geometric series hypothesis has been tested in rodents but not rigorously across environmental sizes and shapes
  - Phase continuity of the toroidal manifold across grid modules has not been measured during active navigation in large environments

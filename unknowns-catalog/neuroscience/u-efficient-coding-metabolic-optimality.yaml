id: u-efficient-coding-metabolic-optimality
title: >
  Does the visual cortex actually operate at or near its Shannon channel
  capacity for natural images, and what is the quantitative metabolic
  efficiency (bits transmitted per ATP molecule) of early visual processing?
status: open
priority: high
disciplines:
  - neuroscience
  - information-theory
  - biophysics
  - computational-neuroscience
summary: >
  The efficient coding hypothesis (Barlow 1961) predicts that sensory
  systems maximise information transmission per unit metabolic cost.
  While the qualitative predictions (whitening, sparse coding, Gabor
  receptive fields) are well supported, the quantitative version — that
  neural circuits actually operate at or near the theoretical channel
  capacity — has not been rigorously tested.

  Key gaps: (1) The actual metabolic cost per spike is measurable (≈ 2×10^9
  ATP per action potential, Attwell & Laughlin 2001), but the information
  per spike under natural stimulation varies from 1–5 bits depending on
  recording method and stimulus ensemble. (2) Retinal information capacity
  estimates range from 1–10 Mbits/s depending on spatial and temporal
  resolution assumptions. (3) Whether V1 operates at capacity requires
  knowing the noise model (Poisson, sub-Poisson, correlated), which remains
  disputed. (4) The trade-off between metabolic efficiency and robustness
  (redundant coding reduces efficiency but increases noise tolerance) is
  not captured by the simple efficient coding optimisation.

  The metabolic efficiency question has clinical implications: cortical
  metabolic efficiency declines in early Alzheimer's disease (reduced FDG-PET
  uptake in association cortex) — whether this reflects reduced information
  per ATP or reduced total activity is unknown.
systematic_gaps:
  - No in vivo measurement of bits/ATP for a complete retinogeniculate pathway under natural stimulation.
  - The efficient coding optimum depends on the natural image ensemble; what counts as "natural" for a given animal's ecological niche is poorly defined.
  - Correlated noise in neural populations reduces channel capacity; the extent of noise correlations in vivo under natural stimulation is debated.
  - Whether efficient coding is a developmental optimisation (learned) or evolutionary (innate) has not been resolved.

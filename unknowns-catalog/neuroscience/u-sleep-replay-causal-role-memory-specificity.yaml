id: u-sleep-replay-causal-role-memory-specificity
title: Does hippocampal sharp-wave ripple replay during sleep causally strengthen specific memory traces, and can targeted memory reactivation selectively enhance or suppress individual memories?
status: open
priority: high
disciplines:
  - systems-neuroscience
  - sleep-science
  - cognitive-neuroscience
summary: >
  Sharp-wave ripples (SPW-Rs) during slow-wave sleep replay sequences of place cell activity
  from waking experience (Wilson-McNaughton 1994). Correlational evidence strongly supports
  a role in memory consolidation. However, causal evidence is limited: optogenetic disruption
  of SPW-Rs during sleep impairs spatial memory in rodents, but it is unclear whether the
  impairment is due to loss of replay per se or other SPW-R-associated processes (sharp-wave
  field potential, accompanying neocortical UP states). Targeted memory reactivation (TMR)
  via cue presentation during sleep (sound/odor associated with learned material) enhances
  recall in humans — but whether this works by triggering specific SPW-Rs or by modulating
  sleep stage is debated. The specificity question (can TMR selectively strengthen one
  memory while leaving another unchanged?) is critical for both theory and clinical application
  (enhancing rehabilitation learning, suppressing traumatic memories).
systematic_gaps:
  - No causal test of whether replay sequence content (not just SPW-R occurrence rate)
    determines memory specificity — requires closed-loop detection and disruption of
    content-specific replay events.
  - The mechanistic link between hippocampal SPW-Rs and neocortical sleep spindles
    (the proposed transfer mechanism) has not been causally demonstrated in humans.
  - Whether glymphatic clearance during sleep is functionally independent of or causally
    linked to memory replay processes is unknown.
related_bridges:

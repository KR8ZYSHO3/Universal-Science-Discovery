id: u-sparse-coding-x-neural-basis
title: Does sparse coding in visual cortex V1 use biologically plausible ISTA dynamics (lateral inhibition networks) as the inference algorithm, and does this predict the specific timing and magnitude of surround suppression observed in primate V1 electrophysiology?
status: open
priority: high
disciplines:
  - neuroscience
  - computer_science
  - biology
summary: >
  The sparse coding hypothesis (Olshausen & Field 1996) predicts that V1 simple cells
  learn sparse overcomplete representations. The inference algorithm (how the brain
  computes sparse codes given inputs) is unknown. ISTA (iterative shrinkage-thresholding)
  implemented by lateral inhibition predicts that surround suppression (inhibition from
  adjacent neurons) should emerge from the dictionary structure, with specific temporal
  dynamics (inhibition onset ~20-40ms post-stimulus). These predictions have not been
  systematically tested against V1 electrophysiology data with matched spatial statistics
  of natural image inputs.
systematic_gaps:
  - ISTA predicts specific temporal dynamics of lateral inhibition that have not been quantitatively compared to V1 spike trains during natural scene viewing
  - The overcomplete ratio (number of V1 neurons per pixel) in primate V1 is not precisely known; estimates range from 5× to 50×
  - Sparse coding cannot explain color, temporal, and binocular disparity tuning jointly without ad hoc dictionary constraints

id: u-ptlds-neuroinflammation-self-sustaining
title: >
  Is PTLDS cognitive impairment caused by a self-sustaining reactive
  astrogliosis and microglial activation loop that persists after Borrelia
  clearance, and if so, would anti-neuroinflammatory therapy be more
  effective than repeat antibiotics?
status: open
priority: high
disciplines:
  - neuroscience
  - immunology
  - neuroimmunology
  - infectious-disease
  - clinical-medicine
summary: >
  A substantial fraction of PTLDS patients experience persistent cognitive
  impairment — subjective "brain fog," objective deficits on neuropsychological
  testing, white-matter abnormalities on MRI — that continues for months to
  years after completing antibiotic treatment. The standard clinical assumption
  is that persistent symptoms require ongoing bacterial activity, leading to
  repeated antibiotic trials (Fallon et al. 2008 showing modest cognitive
  improvement with IV ceftriaxone, but not sustained and with significant
  adverse events).

  An alternative, untested hypothesis: Borrelia-induced neuroinflammation (TLR2-
  mediated microglial activation, reactive astrogliosis, BBB disruption, cytokine
  storm) initiates a self-sustaining neuroimmune loop that persists after bacterial
  clearance — analogous to the chronic neuroinflammation observed in MS, TBI,
  and post-viral brain fog syndromes. In this model, the treatment target is not
  residual bacteria but the chronic neuroimmune dysregulation itself.

  Evidence consistent with this hypothesis: (1) Ramesh et al. (2015) showed that
  Borrelia-induced microglial and astrocyte activation in primate models can persist
  beyond antibiotic-mediated bacterial clearance; (2) IL-6 and CXCL13 are elevated
  in CSF of PTLDS patients with cognitive symptoms even when Borrelia PCR is
  negative; (3) reactive astrogliosis is driven by IL-6/STAT3 and TNF-α signaling,
  both of which are blocked by approved drugs (tocilizumab, adalimumab).

  This question has never been definitively tested in human PTLDS: no randomized
  controlled trial of anti-neuroinflammatory therapy has been conducted. This
  represents a major gap between neuroimmunology (which understands self-sustaining
  neuroinflammation mechanisms) and Lyme disease clinical medicine (which has
  focused exclusively on antibiotics).
systematic_gaps:
  - No longitudinal CSF biomarker study (CXCL13, IL-6, GFAP, neurofilament light chain) has been conducted in PTLDS patients to determine whether neuroinflammatory markers persist after documented antibiotic clearance
  - No microglial activation PET imaging (TSPO ligands) has been performed in PTLDS patients to assess in vivo neuroinflammation burden
  - No animal model study has directly tested whether anti-IL-6 or anti-TNF-α therapy improves cognitive outcomes after Borrelia clearance
  - No clinical trial of any anti-neuroinflammatory agent (tocilizumab, adalimumab, low-dose naltrexone) has been conducted in PTLDS patients
  - The boundary between Borrelia-driven neuroinflammation and post-infectious self-sustaining neuroinflammation has not been established (i.e., at what time point after antibiotic treatment does inflammation become self-sustaining?)

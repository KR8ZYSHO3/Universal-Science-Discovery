id: u-holographic-memory-neural-phase-encoding-test
title: >
  Can the holographic memory model make quantitatively distinct predictions from localist or sparse coding memory models that are testable with current neural recording technology?
status: open
priority: high
disciplines:
  - neuroscience
  - optics
summary: >
  The neural holographic memory hypothesis predicts specific relationships between storage capacity, pattern overlap, and recall fidelity that differ from localist models, but most neural recordings lack the spatial resolution and phase sensitivity to directly test Fourier-domain phase encoding. Whether hippocampal theta phase genuinely implements a coherent reference wave or is simply a timing mechanism for STDP-based learning is unclear.

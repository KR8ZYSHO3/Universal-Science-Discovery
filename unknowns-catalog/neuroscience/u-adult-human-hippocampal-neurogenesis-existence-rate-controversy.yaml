id: u-adult-human-hippocampal-neurogenesis-existence-rate-controversy
title: >
  Does adult human hippocampal neurogenesis persist at a functionally significant
  rate (>100 neurons/day) in healthy adults over 30, and what methodological
  factors explain the discrepancy between Spalding et al. (2013) radiocarbon dating
  (~700/day) and Sorrells et al. (2018) immunohistochemistry (near zero in adults)?
status: open
priority: critical
disciplines:
  - neuroscience
  - molecular-biology
  - chemistry
  - psychiatry
summary: >
  The existence and rate of adult human hippocampal neurogenesis (AHN) is one of
  the most contested questions in neuroscience. Spalding et al. (2013) used
  retrospective ¹⁴C birth dating to estimate ~700 new dentate granule cells added
  daily in adult humans, declining slowly with age. Sorrells et al. (2018) used
  immunohistochemistry with multiple neurogenesis markers (Ki67, DCX, PSA-NCAM,
  SOX2) on human hippocampal tissue and found abundant immature neurons in
  fetal/infant hippocampus but near-zero in adults >13 years old. Boldrini et al.
  (2018) found preserved neurogenesis markers in adults up to age 79 using
  different tissue processing. The methodological differences are: (1) tissue
  fixation (paraformaldehyde fixation can mask DCX epitopes — short post-mortem
  interval and optimal fixation are critical); (2) antibody specificity and
  cross-reactivity of anti-DCX antibodies; (3) tissue source (surgical epilepsy
  specimens vs. autopsy material — autopsy has longer post-mortem intervals);
  (4) age of subjects (Sorrells had older average age). The ¹⁴C method measures
  nuclear DNA turnover — but if quiescent stem cells cycle their DNA without
  producing mature neurons, ¹⁴C would overestimate neurogenesis. Resolving this
  requires a consensus tissue processing protocol and cell type-specific markers.
systematic_gaps:
  - Standardized post-mortem tissue banking protocol (< 6h PMI, standardized
    fixation duration and temperature) for neurogenesis marker preservation.
  - Single-nucleus RNA sequencing of human dentate gyrus (snRNA-seq) for
    unbiased detection of immature neuron transcriptional signatures.
  - Validation of ¹⁴C birth-dating against direct immunohistochemistry in
    non-human primates (where both can be measured simultaneously).
  - DCX antibody cross-validation across labs using the same positive control tissue.
suggested_hypotheses:
  - >
    Single-nucleus RNA sequencing of fresh (PMI < 4h) human dentate gyrus tissue
    from donors aged 20-70 will detect a small but consistent population of cells
    (<0.1% of granule layer cells) expressing immature neuron markers (DCX, PSA-NCAM,
    PROX1 low) that is absent in fixed autopsy tissue — demonstrating that AHN
    exists at low rates in adults but is below the detection threshold of standard
    immunohistochemistry on fixed tissue.

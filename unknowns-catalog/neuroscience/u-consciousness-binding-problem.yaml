id: u-consciousness-binding-problem
title: "How does the brain bind spatially and temporally distributed neural signals into a unified conscious percept — is the binding mechanism synchrony, convergence zones, or a global workspace?"
status: open
priority: high
disciplines:
  - neuroscience
  - cognitive-science
  - philosophy-of-mind
summary: >
  The binding problem asks how the brain integrates information processed in
  anatomically separate areas — color in V4, motion in MT, shape in V2, identity
  in IT — into a single unified perception of an object. Three main hypotheses:
  (1) Temporal binding / synchrony hypothesis (Singer, Gray 1989): neurons encoding
  the same object synchronize their firing at gamma frequencies (40 Hz), binding
  them through correlated activity. Supported by gamma coherence between areas;
  challenged by the absence of proof that synchrony is sufficient for binding
  and by the existence of visual binding during anesthesia;
  (2) Convergence zones (Damasio 1989): cortical convergence zones in frontal and
  temporal cortex receive input from multiple areas and re-create unified representations;
  challenged by lesion studies and lack of anatomical convergence for all features;
  (3) Global Workspace Theory (Dehaene, Baars): information is broadcast globally via
  long-range projections from prefrontal cortex, creating a "global workspace" accessible
  to many processes simultaneously. Binding occurs through ignition of this workspace.
  No theory has quantitatively explained both the speed of binding (<50 ms) and its
  content-specificity.
systematic_gaps:
  - No causal test distinguishes synchrony from convergence-zone from global workspace binding in the same paradigm
  - The temporal resolution of binding (how fast features are integrated) is not quantitatively explained by any theory
  - Whether binding is a global broadcast or local circuit phenomenon is unresolved for multisensory integration
suggested_hypotheses:
  - "Gamma synchrony is necessary but not sufficient for feature binding: binding requires both gamma coherence AND long-range beta (15-30 Hz) phase coupling between feature areas and prefrontal cortex, measurable via granger causality in MEG"
related_unknowns:
  - u-self-organized-criticality-consciousness

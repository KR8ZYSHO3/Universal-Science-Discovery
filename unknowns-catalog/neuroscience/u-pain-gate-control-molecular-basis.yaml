id: u-pain-gate-control-molecular-basis
title: "What is the molecular identity of the 'gate' in Melzack-Wall gate control theory, and does it correspond to a specific interneuron type in the dorsal horn?"
status: open
priority: medium
disciplines:
  - neuroscience
  - pain-research
  - molecular-biology
summary: >
  Melzack & Wall (1965, Science) proposed gate control theory: pain signals from
  small (C, A-delta) fibers are modulated by a "gate" in the dorsal horn spinal cord,
  controlled by large-fiber (A-beta, touch) input and by descending signals from the
  brain. This explains why rubbing a wound reduces pain (large fibers close the gate)
  and why emotional state affects pain (descending control). Despite 60 years and
  billions of patients treated using gate-derived insights (TENS, spinal cord
  stimulation), the molecular identity of the gate mechanism — the specific
  interneuron type and molecular circuit — was only partially resolved by Duan et al.
  (2014, Science): inhibitory interneurons expressing the transcription factor Bhlhb5
  are the gate-closing interneurons. However, the full circuit (which interneurons
  receive A-beta input, which release GABA/glycine to inhibit projection neurons,
  and how the gate is opened by C-fiber input) has not been fully mapped at single-cell
  resolution using modern single-cell RNA-seq and circuit tracing tools.
systematic_gaps:
  - Full connectivity of the gate circuit at single-cell resolution has not been mapped
  - Whether TENS and SCS activate the same gate interneurons as natural A-beta input is unknown
  - How psychological factors (attention, expectation) modulate the gate at the molecular level
suggested_hypotheses:
  - Bhlhb5+ inhibitory interneurons form a bistable switch (gate) whose state is set by the ratio of A-beta to C-fiber input, with a sharp threshold at A-beta:C-fiber = 3:1 input ratio, measurable by electrophysiology in dorsal horn slices
related_unknowns: []
references:

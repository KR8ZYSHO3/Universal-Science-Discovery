id: u-weber-fechner-stevens-unifying-neural-mechanism
title: >
  Is there a single neural mechanism that unifies Weber's law, Fechner's logarithmic
  compression, and Stevens' power law — or do different sensory systems use
  fundamentally different computational strategies to achieve similar psychophysical
  scaling?
status: open
priority: medium
disciplines:
  - neuroscience
  - psychophysics
  - cognitive-science
  - computational-neuroscience
summary: >
  Three empirical laws describe the relationship between physical stimulus intensity
  and perceptual magnitude: Weber's law (ΔS/S = k, constant Weber fraction), Fechner's
  law (Ψ = k·log S, logarithmic), and Stevens' power law (Ψ = k·Sⁿ, power law with
  modality-specific exponent n). Fechner derived his law from Weber's by integration,
  assuming that just noticeable differences (JNDs) are equal perceptual steps — but
  Stevens showed empirically that JNDs are not equal steps, invalidating Fechner's
  derivation. Currently proposed mechanisms: (1) Receptor adaptation (Hair cells, rod/cone
  photoreceptors): instantaneous compression via voltage-gated channel kinetics producing
  power-law or logarithmic I-V curves. (2) Neural adaptation (spike frequency adaptation,
  KCNQ channels, sodium channel inactivation): time-dependent gain reduction at the
  cortical level. (3) Divisive normalization (shunting inhibition): population-level
  gain control producing power-law scaling of mean firing rates. (4) Efficient coding
  (Bayesian prior matching to natural stimulus statistics): the optimal nonlinearity
  depends on the stimulus distribution, predicting logarithmic compression for log-normal
  stimuli. The open question is whether these mechanisms produce the same psychophysical
  function under all conditions or whether different mechanisms dominate in different
  sensory systems, intensity ranges, or task demands.
systematic_gaps:
  - The psychophysical law (log vs. power) has not been definitively resolved because
    both can fit most experimental data within measurement noise.
  - The neural correlate of the Stevens power law exponent (why n = 0.33 for brightness
    but n = 3.5 for electric shock) has not been identified in single-unit recordings.
  - The contribution of central (cortical) vs. peripheral (receptor) mechanisms to
    final perceptual magnitude estimates has not been disentangled for most modalities.

id: u-frailty-model-biological-age-calibration
title: "Can a frailty model fitted to longitudinal biomarker data identify a latent biological age variable that predicts mortality better than chronological age alone, and what is the minimum biomarker panel needed for robust frailty variance estimation in a population cohort?"
status: open
priority: high
disciplines:
  - public-health
  - statistics
  - epidemiology
  - gerontology
summary: >
  Frailty models partition mortality risk into a gamma-distributed random effect (frailty) and a baseline hazard,
  but linking frailty to biological age biomarkers requires choosing which biomarkers to include. Key unknowns:
  (1) which combination of blood-based aging biomarkers (e.g. DNA methylation clocks, telomere length,
  inflammatory markers) best identifies the latent frailty distribution in a standard survival analysis framework,
  (2) what sample size and follow-up duration is needed for reliable frailty variance estimation sigma^2 in a
  cohort with a realistic dropout rate, and (3) does the frailty model provide better calibrated survival
  predictions than the simpler Gompertz-Makeham model for individuals in clinical geriatrics settings?
systematic_gaps:
  - Longitudinal cohorts with dense biomarker panels and complete mortality follow-up spanning > 20 years are rare
  - Statistical identifiability of the frailty distribution (gamma vs. log-normal vs. positive stable) from empirical data is difficult with moderate sample sizes
  - The mapping from methylation-clock biological age to the frailty Z variable has not been formally derived
related_bridges:

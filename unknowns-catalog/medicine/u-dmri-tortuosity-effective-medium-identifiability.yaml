id: u-dmri-tortuosity-effective-medium-identifiability
title: >
  Which tissue or phantom tortuosity parameters are identifiable from diffusion MRI once acquisition noise, compartment exchange, orientation dispersion, and model degeneracy are included?
status: open
priority: medium
disciplines:
  - medicine
  - physics
summary: >
  Diffusion MRI is clinically powerful, but effective-medium interpretations require validation. The key unknown is which microstructural claims remain identifiable rather than model-dependent.
systematic_gaps:
  - Phantom datasets with independently measured pore geometry and tortuosity.
  - Identifiability maps for competing diffusion models under shared acquisition constraints.
suggested_hypotheses:
  - h-multi-shell-dmri-estimates-track-phantom-tortuosity
related_bridges:

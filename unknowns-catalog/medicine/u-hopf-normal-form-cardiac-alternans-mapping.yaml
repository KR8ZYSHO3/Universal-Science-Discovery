id: u-hopf-normal-form-cardiac-alternans-mapping
title: >
  To what extent do codimension-one bifurcation normal forms (Hopf, period-doubling) quantitatively predict measured alternans onset and spatial patterns in human ventricular preparations when channelopathies and fibrosis are included?
status: open
priority: medium
disciplines:
  - medicine
  - mathematics
  - cardiology
summary: >
  Reduced models exhibit bifurcation-driven alternans; whole-heart heterogeneity and pacing-protocol dependence break global normal-form universality — systematic mapping studies between continuation diagrams and clinical optical-mapping cohorts remain sparse.
systematic_gaps:
  - Population studies linking fitted ion-channel models to empirically tracked bifurcation parameters across drug interventions
  - Standardized reporting of alternans magnitude versus pacing cycle length with paired nonlinear-model continuation outputs
suggested_hypotheses:
  - h-bifurcation-continuation-predicts-alternans-onset-optical-mapping
related_bridges:
  - b-hopf-bifurcation-x-cardiac-alternans
last_reviewed: "2026-05-07"
references:
  - doi: "10.1103/PhysRevE.76.021917"
    note: Echebarria & Karma bifurcation-oriented theory baseline for alternans

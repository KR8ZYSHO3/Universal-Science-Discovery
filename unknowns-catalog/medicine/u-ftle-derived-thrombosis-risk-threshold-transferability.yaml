id: u-ftle-derived-thrombosis-risk-threshold-transferability
title: Are FTLE-derived thrombosis risk thresholds transferable across imaging modalities
  and patient anatomies?
status: open
priority: high
disciplines:
- medicine
- fluid-mechanics
- medical-imaging
summary: FTLE-based risk markers appear promising, but threshold portability across
  echo, MRI, and CT-derived flow fields remains uncertain.
systematic_gaps:
- No multi-center harmonization study for FTLE threshold calibration.
- Insufficient uncertainty quantification for velocity-field reconstruction errors
  feeding FTLE estimates.

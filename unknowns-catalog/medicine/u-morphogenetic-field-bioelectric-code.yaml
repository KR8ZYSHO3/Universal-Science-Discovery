id: u-morphogenetic-field-bioelectric-code
title: "What is the complete bioelectric code — the mapping from tissue resting membrane potential patterns to anatomical outcomes — in planaria and vertebrate appendage regeneration, and can this code be read and rewritten pharmacologically to regenerate complex structures such as limbs in non-regenerative species?"
status: open
priority: critical
disciplines:
  - medicine
  - developmental-biology
  - biophysics
summary: >
  Levin's group has shown that manipulating resting membrane potential (Vmem) in planaria redirects head-tail
  regeneration, and that pharmacological bioelectric manipulation can induce ectopic eyes and limb-like structures
  in Xenopus. But the complete bioelectric-to-morphology mapping (the bioelectric code) is unknown. Key unknowns:
  (1) what is the minimal set of Vmem pattern parameters (amplitude, spatial frequency, polarity) that uniquely
  specifies a target anatomy, (2) are there multiple distinct bioelectric codes for the same anatomy (redundancy),
  and (3) can bioelectric interventions in non-regenerative mammals (e.g. mouse limb) initiate a regenerative
  cascade that recapitulates the Xenopus or axolotl programme?
systematic_gaps:
  - No comprehensive atlas of Vmem patterns across planarian body regions correlated with downstream gene expression exists
  - Mechanistic link from Vmem pattern to downstream transcription factor gradients is molecularly incomplete
  - Pharmacological tools for precise spatial Vmem manipulation in 3D tissues are not yet available
related_bridges:
  - b-regenerative-medicine-morphogenetic-fields
last_reviewed: "2026-05-07"

id: u-dose-spacing-fisher-information-design-trial-calibration
title: >
  For realistic nonlinear dose-response models, when does Fisher-information-optimal dose spacing materially improve parameter precision over clinically conventional dose grids under safety and recruitment constraints?
status: open
priority: medium
disciplines:
  - medicine
  - statistics
summary: >
  Information bounds are model-dependent. The open question is where they remain useful after incorporating safety ceilings, sparse recruitment, model misspecification, and ethics constraints.
systematic_gaps:
  - Transparent simulation library comparing dose grids across plausible pharmacodynamic curves.
  - Sensitivity analysis for model misspecification and adverse-event constraints.
suggested_hypotheses:
  - h-fisher-optimal-dose-grid-reduces-parameter-variance-simulation
related_bridges:
  - b-fisher-information-cramer-rao-x-dose-spacing-experimental-design
last_reviewed: "2026-05-07"
references:
  - doi: "10.1098/rsta.1922.0009"
    note: Fisher (1922) foundational likelihood/statistical estimation paper.

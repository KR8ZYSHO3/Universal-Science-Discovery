id: u-ensemble-kalman-icu-parameter-identifiability
title: Which ICU physiological parameters remain unidentifiable under practical EnKF
  observation schedules?
status: open
priority: high
disciplines:
- medicine
- control-engineering
- geoscience
summary: Digital-twin ICU models inherit EnKF techniques, but bedside sampling frequency
  and sensor sparsity can leave key parameters weakly identifiable.
systematic_gaps:
- Few open datasets report identifiability diagnostics together with EnKF performance.
- Localization and inflation heuristics vary widely across published ICU EnKF studies.

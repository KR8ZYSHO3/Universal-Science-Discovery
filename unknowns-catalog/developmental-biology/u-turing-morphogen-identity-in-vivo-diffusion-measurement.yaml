id: u-turing-morphogen-identity-in-vivo-diffusion-measurement
title: >
  What are the directly measured in vivo diffusion coefficients D_A and D_I for
  proposed Turing activator-inhibitor pairs (Sox9/BMP in digit spacing; melanophore/
  xanthophore signals in zebrafish), and do these satisfy the Turing instability
  condition D_I/D_A > f_A²/(4 det J) with independently measured reaction kinetics?
status: open
priority: high
disciplines:
  - developmental-biology
  - biophysics
  - mathematical-biology
  - cell-biology
summary: >
  Turing's instability requires D_I >> D_A. In zebrafish pigment patterns, the proposed
  activator and inhibitor involve cell-cell contact signals, paracrine factors, and
  possibly longer-range diffusible morphogens — the effective diffusion coefficients have
  not been measured in vivo in the intact developing zebrafish skin. In limb development,
  Sox9 (transcription factor, mainly intranuclear) cannot diffuse freely and likely acts
  through secreted intermediaries (FGF, BMP). The actual diffusing species — not assumed
  from genetics — are unknown. This means the Turing condition D_I/D_A > threshold
  has never been directly verified with: (a) identified molecular species, (b) in vivo
  measured D values, and (c) independently measured reaction kinetics f_A, det J.
  Without this quantitative verification, Turing patterning in development remains
  mechanistically convincing but not rigorously demonstrated.
systematic_gaps:
  - In vivo FRAP / FCS / single-particle tracking of candidate Turing morphogens
    in developing zebrafish skin and mouse limb buds at single-cell resolution has
    not been published with sufficient sample sizes for statistical quantification
    of D_A and D_I.
  - The Turing reaction kinetics (∂F/∂A at steady state = f_A; det J) have not been
    measured by quantitative phosphoproteomics or optogenetic perturbation in the same
    developmental system where pattern wavelength was measured.
  - Synthetic Turing circuits in mammalian cells (enabling controlled D_A, D_I,
    f_A measurements) have been built in bacteria (E. coli) but not in cell types
    relevant to mammalian development.
suggested_hypotheses:
  - >
    The effective in vivo diffusion ratio D_I/D_A for the BMP (inhibitor) / Sox9
    downstream FGF signal (activator) in mouse limb buds is ≥ 10, satisfying the
    Turing condition; measurement via fluorescently-tagged BMP2 and FGF8 FRAP in
    organoid limb-patterning systems will confirm the condition and predict digit
    wavelength to within 20% using independently measured reaction rates.
related_bridges:
  - b-developmental-turing-instability

id: u-topological-defect-morphogenesis-3d-tissue
title: >
  Do topological defects in three-dimensional active nematic tissues drive morphogenetic
  events such as lumen formation, tube branching, and organ folding in developing embryos,
  and can Q-tensor simulations parameterized by single-cell imaging predict tissue shape
  outcomes quantitatively?
status: open
priority: high
disciplines:
  - developmental-biology
  - biophysics
  - soft-matter
  - computational-biology
summary: >
  Topological defects in two-dimensional epithelial monolayers have been shown to drive
  cell extrusion and accumulation (Saw et al. 2017), but whether the same active nematic
  defect mechanics operate in three-dimensional morphogenetic processes — lumen formation
  in organoids, tube branching in kidney or lung development, neural tube folding — is
  largely unknown. Three-dimensional nematic order in tissues generates line defects and
  hedgehog/aster topological structures distinct from 2D +1/2 and -1/2 point defects, and
  it is unclear whether extensile active stress in 3D tissues produces the same
  morphogenetically relevant flows. Key challenges include: (1) measuring the 3D nematic
  director field in live tissues requires light sheet microscopy with subcellular resolution;
  (2) the relationship between 3D defect topology and specific developmental events has not
  been mapped; (3) whether topological constraints (Euler characteristic, Poincaré-Hopf
  theorem) on closed surfaces limit morphogenetic freedom is unexplored.
systematic_gaps:
  - No live-imaging study has tracked 3D nematic topological defects through a complete
    morphogenetic event (e.g., neural tube closure, organoid lumenogenesis) with simultaneous
    cell fate and mechanical force measurements.
  - Q-tensor continuum models of 3D active nematics have not been parameterized from
    experimental data for any developing tissue; all existing simulations use synthetic
    parameter regimes.
  - The role of tissue curvature feedback on defect dynamics (curved surfaces impose
    topological constraints) has been studied theoretically but not experimentally in vivo.
related_bridges:

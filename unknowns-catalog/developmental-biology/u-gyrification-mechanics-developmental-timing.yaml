id: u-gyrification-mechanics-developmental-timing
title: "What determines the timing, location, and degree of cortical gyrification (brain folding) during development, and can mechanical models predict individual variation in sulcal patterns?"
status: open
priority: high
disciplines:
  - developmental-neuroscience
  - biomechanics
  - mathematical-biology
summary: >
  The primate brain is gyrencephalic (folded), unlike lissencephalic (smooth) rodent
  brains. Cortical folding dramatically increases surface area within a fixed skull volume.
  Two competing hypotheses for gyrification: (1) axonal tension hypothesis (Van Essen 1997):
  strong white matter connections pull connected cortical regions together, causing
  buckling; (2) tangential growth hypothesis (Tallinen et al. 2016): the cortex grows
  tangentially faster than the subcortex, causing differential growth buckling analogous
  to a bilayered elastic sheet. Tallinen et al. reproduced qualitative sulcal patterns
  in a 3D elastic simulation of human brain growth. However: (a) individual variation in
  sulcal pattern is substantial, (b) the mechanism producing gyrus spacing (gyrification
  index) is not established, (c) lissencephaly (smooth brain) and polymicrogyria
  (excessive small gyri) arise from mutations in different genes, suggesting distinct
  developmental timing controls. The quantitative relationship between cell proliferation
  rate, cortical thickness, and gyrification index is not established.
systematic_gaps:
  - No model predicts individual sulcal variability from developmental parameters
  - The relative contribution of tangential growth vs. axonal tension is not quantified
  - The critical period during which folding pattern is determined is not established
suggested_hypotheses:
  - Cortical thickness at the beginning of the third trimester determines gyrification index
    through a elastic buckling wavelength scaling as (E_cortex/E_subcortex)^1/3 × thickness
references:
  - doi: "10.1038/nphys3655"
    note: "Tallinen et al. (2016) Nat Phys — differential growth causes brain folding"
  - doi: "10.1016/j.neuron.2007.10.027"
    note: "Geschwind & Rakic (2013) review of gyrification mechanisms"
last_reviewed: "2026-05-06"

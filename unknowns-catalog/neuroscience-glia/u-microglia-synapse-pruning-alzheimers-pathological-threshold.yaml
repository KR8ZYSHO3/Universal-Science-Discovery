id: u-microglia-synapse-pruning-alzheimers-pathological-threshold
title: >
  What determines the threshold between physiological microglial synapse pruning
  (circuit refinement) and pathological pruning (synaptic loss in Alzheimer's disease)
  — and can this threshold be pharmacologically modulated to preserve synapses
  while maintaining immune surveillance?
status: open
priority: high
disciplines:
  - neuroscience
  - immunology
  - neurodegeneration
  - pharmacology
summary: >
  Microglial synapse pruning via the complement cascade (C1q/C3 tagging → CR3-
  mediated phagocytosis) is essential for normal circuit development (Stevens 2007).
  In Alzheimer's disease, this pruning appears pathologically overactivated: C1q
  and C3 are elevated in AD brain, correlating with synapse loss; TREM2 mutations
  (haploinsufficiency) impair microglial phagocytic capacity but paradoxically
  may reduce synaptic loss in some models. The threshold between developmental
  pruning (beneficial) and pathological pruning (harmful) is not defined. Key
  questions: (1) What molecular signal distinguishes a "legitimately weak" synapse
  (should be pruned) from a "pathologically tagged" synapse (should be protected)?
  (2) Does soluble amyloid-β specifically recruit C1q to synapses, and what is
  the required Aβ concentration threshold? (3) Can C1q or C3 inhibitors (currently
  in clinical trials) preserve synapses without impairing normal immune surveillance?
systematic_gaps:
  - The concentration threshold of soluble Aβ oligomers required to trigger C1q
    deposition at synapses has not been determined in vivo.
  - Whether microglial synapse pruning in AD brain preferentially removes specific
    synapse types (excitatory vs. inhibitory, dendritic spine vs. shaft) is not
    characterized at scale.
  - The long-term consequences of C1q inhibition (preventing developmental pruning
    in adult CNS repair contexts) are not characterized in non-human primates.
related_bridges:

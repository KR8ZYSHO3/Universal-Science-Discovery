id: u-auction-market-design-kidney-exchange
title: What market design mechanisms optimally match kidney donors and recipients to maximize lives saved while respecting equity and compatibility constraints?
status: partial
priority: critical
disciplines:
  - mechanism-design
  - medical-ethics
  - operations-research
summary: >
  Kidney exchange markets (Al Roth et al. 2004) match incompatible donor-patient pairs
  into exchange cycles and chains using matching algorithms. The US National Kidney
  Registry runs chains of length 100+, dramatically increasing matches. Optimal matching
  is NP-hard for general compatibility graphs, but practical algorithms (Dickerson et al.)
  achieve near-optimal solutions. Open problems include: how to incorporate multi-year
  time horizons (patients deteriorating, new pairs arriving), geographic constraints
  (surgical logistics), altruistic donors triggering maximal non-simultaneous chains,
  and equity considerations (demographic disparities in compatibility rates).
  The mechanism design problem of incentivizing hospitals to list all compatible pairs
  (not just pairs that benefit their own patients) remains partially unresolved.
systematic_gaps:
  - Long-horizon (multi-year) kidney exchange matching has not been fully solved even
    computationally for realistic market sizes (>500 pairs per region).
  - Incentive compatibility for hospitals (not hiding easy pairs to avoid cross-hospital
    exchanges) requires information revelation mechanisms not currently deployed.
related_bridges:

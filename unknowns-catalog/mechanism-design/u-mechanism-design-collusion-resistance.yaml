id: u-mechanism-design-collusion-resistance
title: What auction mechanisms are simultaneously incentive-compatible, collusion-resistant, and computationally tractable for multi-item combinatorial settings?
status: open
priority: high
disciplines:
  - mechanism-design
  - economics
  - computer-science
summary: >
  VCG (Vickrey-Clarke-Groves) mechanisms achieve efficient and truthful allocation but
  are vulnerable to collusion between bidders (a coalition can collectively misreport
  valuations and improve their joint payoff). Strong incentive compatibility (collusion-proof
  mechanisms) has been proved impossible in general multi-item settings (Green & Laffont 1979).
  Approximately collusion-resistant mechanisms (e.g., core-selecting auctions) exist but
  require solving NP-hard winner determination problems. The trilemma of incentive
  compatibility, collusion resistance, and computational tractability has no known resolution
  for general combinatorial valuations.
systematic_gaps:
  - No polynomial-time mechanism achieves both incentive compatibility and collusion
    resistance for general combinatorial valuations.
  - The minimum revenue loss from relaxing collusion resistance to approximately
    core-selecting has not been bounded analytically.
related_bridges:
  - b-auction-theory-mechanism-design
last_reviewed: "2026-05-06"

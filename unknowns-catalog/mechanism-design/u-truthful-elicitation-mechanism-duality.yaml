id: u-truthful-elicitation-mechanism-duality
title: How large are truthfulness gains from VCG-style payments in real preference elicitation
  when participants have cognitive costs and incomplete understanding?
status: open
priority: medium
disciplines:
- economics
- computer-science
summary: Dominant-strategy properties assume quasi-linearity and rationality; field behavior
  often deviates, but the magnitude and remedies are context dependent.
systematic_gaps:
- Limited field A/B tests comparing Vickrey payments to cheap-talk elicitation at scale.
- Budget balance and fairness constraints often prevent literal VCG deployment.
suggested_hypotheses:
- h-vickrey-clarke-groves-payments-improve-lab-truthful-reporting

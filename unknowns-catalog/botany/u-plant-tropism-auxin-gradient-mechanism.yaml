id: u-plant-tropism-auxin-gradient-mechanism
title: "What molecular mechanism relocates PIN efflux carriers to the lower flank of a gravitropically stimulated root or shoot within minutes, and is the signal transduction chain better described by a Turing reaction-diffusion instability or by a mechanical strain-sensing model?"
status: open
priority: high
disciplines:
  - botany
  - developmental-biology
  - mathematics
summary: >
  Gravitropism requires rapid lateral auxin redistribution via PIN carrier relocation, but the biophysical
  mechanism is debated. Key unknowns: (1) do amyloplast sedimentation signals feed into PIN endosomal recycling
  via a Ca2+-based or ROP GTPase signalling cascade, (2) is the lateral auxin gradient maintained by a
  reaction-diffusion (Turing) feedback between auxin flux and PIN polarity, or by tissue mechanical strain
  transduced through mechanosensitive channels, and (3) what determines the saturation angle (the gravitropic
  set-point angle) for organs that are not vertical in their equilibrium, and can this be predicted from
  reaction-diffusion parameter values?
systematic_gaps:
  - Live PIN polarity dynamics during gravity stimulus have only been imaged in 2D cross-sections, not 3D time-lapse
  - Distinguishing reaction-diffusion from mechanical-strain models requires parameter-controlled perturbation experiments not yet performed
  - The gravitropic setpoint angle mechanism in lateral roots and branches remains molecularly uncharacterized

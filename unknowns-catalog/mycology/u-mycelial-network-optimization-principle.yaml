id: u-mycelial-network-optimization-principle
title: "Does mycelial network topology represent a Pareto-optimal trade-off between transport cost minimization and fault tolerance, and what developmental rule (local or global) generates this near-optimal topology without centralized coordination?"
status: open
priority: high
disciplines:
  - mycology
  - mathematics
  - network-science
summary: >
  Mycelial networks empirically approximate minimum spanning trees with added redundant loops, but the
  developmental mechanism that achieves this optimization is unclear. Key unknowns: (1) are the local
  hyphal growth and anastomosis rules (tip extension, tropism, fusion) sufficient to generate MST-like
  topologies, or does long-range signaling (via cytoplasmic streaming gradients) coordinate the network
  at scales beyond individual hyphal tips? (2) Is there a universal Pareto frontier curve in (wire cost,
  fault tolerance) space that all mycelial species follow, or do ecological niches (wood decay vs.
  mycorrhizal) shift the optimal point? (3) Can the mycelial growth algorithm be translated into a
  distributed network protocol competitive with existing topology control algorithms in wireless networks?
systematic_gaps:
  - Time-lapse imaging of mycelial growth at sufficient resolution to infer local growth rules spans days; automating growth rule extraction from videos is not standardized
  - The signalling mechanisms for long-range coordination during network remodeling are molecularly uncharacterized in most species
  - Comparative topology studies across ecologically distinct fungal guilds using standardized graph metrics have not been published

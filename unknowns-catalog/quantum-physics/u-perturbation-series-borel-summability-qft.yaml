id: u-perturbation-series-borel-summability-qft
title: >
  What is the complete non-perturbative structure of QED and QCD that makes their
  perturbation series Borel summable (or not), and can resurgence theory systematically
  reconstruct the full answer from the divergent perturbative expansion?
status: open
priority: high
disciplines:
  - quantum-field-theory
  - mathematics
  - perturbation-theory
  - resurgence-theory
summary: >
  Dyson (1952) showed that the QED perturbation series must be asymptotic (divergent)
  because making the coupling constant negative would destabilize the vacuum. Yet
  the series gives spectacularly accurate predictions. The question is whether
  Borel resummation of the QED series gives the exact non-perturbative answer, and
  whether the resurgence program (Écalle 1981; Dunne & Ünsal 2012) — which connects
  perturbative and non-perturbative contributions via transseries — can provide a
  complete non-perturbative formulation of QFT. For QCD, the situation is more
  severe: instantons, renormalons, and confinement are non-perturbative phenomena
  beyond all orders in the coupling. Whether the full QCD S-matrix can be reconstructed
  from perturbation theory via resurgence is deeply open.
systematic_gaps:
  - Borel summability of the QED series has not been rigorously proven; the renormalon
    singularities on the positive Borel axis obstruct naive Borel resummation.
  - The connection between perturbative renormalon ambiguities and non-perturbative
    condensates (OPE, operator product expansion) is known qualitatively but not
    systematically exploited for precision predictions.
  - The resurgence program has been applied to quantum mechanics (exact WKB) and
    matrix models; its extension to four-dimensional QFT is incomplete.
related_bridges:
  - b-perturbation-theory-quantum-corrections
last_reviewed: "2026-05-07"

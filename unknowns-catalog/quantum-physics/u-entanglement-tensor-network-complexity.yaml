id: u-entanglement-tensor-network-complexity
title: "What is the computational complexity of contracting arbitrary tensor networks, and which physical entanglement structures admit efficient classical simulation versus those that are fundamentally classically intractable?"
status: open
priority: critical
disciplines:
  - quantum-physics
  - mathematics
  - computer-science
summary: >
  The difficulty of classically simulating quantum many-body systems is determined by the entanglement structure
  encoded in tensor network complexity. MPS contracts in polynomial time, but 2D PEPS contraction is #P-hard in general.
  Key unknowns: (1) is there a sharp entanglement entropy threshold separating efficiently simulable from classically
  intractable many-body states, (2) can MERA-based classical algorithms solve 2D strongly correlated systems better
  than quantum computers, (3) do volume-law entangled states (generic excited states) require exponential tensor
  bond dimension with no efficient classical approximation?
systematic_gaps:
  - Exact complexity of PEPS contraction on planar graphs is unresolved for non-uniform lattices
  - The relationship between physical entanglement (thermal, topological) and tensor contraction complexity is not fully characterized
  - Efficient MERA algorithms for 2D critical systems have not been demonstrated despite theoretical promise
related_bridges:

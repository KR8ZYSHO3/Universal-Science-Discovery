id: u-photon-antibunching-sub-poissonian
title: "What limits g⁽²⁾(0) from reaching zero in solid-state single-photon emitters at room temperature, and can photon indistinguishability be simultaneously maximized with high brightness?"
status: open
priority: high
disciplines:
  - quantum-physics
  - quantum-information
  - photonics
summary: >
  Room-temperature single-photon sources (quantum dots, NV centers, 2D material
  defects) achieve g⁽²⁾(0) < 0.1 but rarely < 0.01 due to multi-photon
  contamination from charge fluctuations, spectral diffusion, and nearby
  impurities. The Hong-Ou-Mandel visibility (photon indistinguishability)
  is simultaneously limited by pure dephasing processes that broaden the
  emission linewidth beyond the radiative limit. Whether both g⁽²⁾(0) → 0
  and high indistinguishability can be achieved at 300 K simultaneously is
  an open challenge for practical quantum key distribution. Cavity-QED
  enhancement (Purcell effect) can increase radiative rate and reduce pure
  dephasing fraction, but integration into fiber-coupled devices at room
  temperature remains a fabrication challenge.
systematic_gaps:
  - "The physical mechanisms limiting g⁽²⁾(0) in hBN defect emitters at room temperature — charge noise vs. spectral diffusion vs. background fluorescence — are not dissociated."
  - "No scalable fabrication process exists for deterministically placing single emitters into nanophotonic cavities with Purcell factor > 10 at room temperature."
  - "The relationship between the HOM visibility and g⁽²⁾(0) for emitters with non-Lorentzian lineshapes has not been derived analytically."
related_bridges:
  - b-photon-antibunching-sub-poissonian
last_reviewed: "2026-05-07"
references:

    note: Neal (1996) - sampling from multimodal distributions via simulated tempering
  - doi: 10.1103/PhysRevLett.57.2607
    note: Swendsen & Wang (1986) - replica Monte Carlo
  - arxiv: "1701.02434"
    note: Betancourt (2017) - conceptual introduction to MCMC for Bayesian inference

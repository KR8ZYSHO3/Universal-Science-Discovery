id: u-bayesian-phase-transition-learning
title: Do real machine learning models undergo sharp phase transitions in generalization analogous to the thermodynamic underfitting-overfitting transition?
status: open
priority: high
disciplines:
  - machine-learning
  - statistical-physics
  - statistics
summary: >
  Statistical physics of learning (Seung, Sompolinsky & Tishby 1992; Engel & Van den Broeck
  2001) predicts sharp phase transitions in generalization error as a function of training
  set size: underfitting phase (insufficient data), critical point, and good generalization
  phase. The replica method (from spin glass physics) computes the Bayesian evidence and
  predicts the transition location. For modern deep networks, the double descent phenomenon
  (Belkin et al. 2019) shows a second non-monotonic transition at model capacity equal
  to dataset size. Whether these are the same phase transition viewed from different
  angles, or distinct phenomena, is debated. The connection between the replica calculation
  and gradient descent training dynamics (non-equilibrium) is not established.
systematic_gaps:
  - Whether double descent corresponds to a thermodynamic phase transition in the
    posterior (Bayesian) or only in the minimum-norm interpolant (frequentist) has
    not been resolved.
  - The replica calculation applies to random feature models; its validity for
    structured feature distributions (real language or image data) is untested.
related_bridges:

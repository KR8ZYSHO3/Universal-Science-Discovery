id: u-elastic-net-prior-calibration-under-correlated-designs
title: >
  How should elastic-net mixing parameters be calibrated as composite Laplace-Gaussian prior scales when predictors are strongly correlated and scientific interpretation depends on selected groups?
status: open
priority: medium
disciplines:
  - statistics
  - machine-learning
summary: >
  Cross-validation chooses predictive settings, but it may not calibrate sparse-group interpretability. The open question is how MAP-prior language can expose sensitivity under correlated designs.
systematic_gaps:
  - Benchmarks comparing predictive error, selection stability, and prior-scale interpretability.
  - Domain-specific guidance for correlated biological, imaging, and economic features.
suggested_hypotheses:
  - h-mixing-parameter-matches-posterior-sparsity-stability-curves
related_bridges:
  - b-elastic-net-map-x-laplace-gaussian-composite-prior
last_reviewed: "2026-05-07"
references:
  - doi: "10.1111/j.1467-9868.2005.00503.x"
    note: Zou and Hastie (2005) elastic net.

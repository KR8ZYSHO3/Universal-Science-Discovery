id: u-ridge-as-gaussian-map-prior-identifiability
title: When does cross-validated ridge λ carry a coherent Bayesian interpretation under model
  mismatch and heavy-tailed true coefficients?
status: open
priority: medium
disciplines:
- statistics
- computer-science
summary: Gaussian prior misspecification can make MAP misleading for uncertainty; hierarchical
  priors may be needed but complicate identifiability.
systematic_gaps:
- Empirical comparison of ridge CI coverage versus full Bayes under scientific small-n settings.
- Sparsity vs L2 tradeoffs in ill-posed inverse problems are often chosen ad hoc.
suggested_hypotheses:
- h-ridge-penalty-matches-bayesian-width-in-neural-decoding
related_bridges:
- b-ridge-regression-x-shrinkage
last_reviewed: '2026-05-07'
references:

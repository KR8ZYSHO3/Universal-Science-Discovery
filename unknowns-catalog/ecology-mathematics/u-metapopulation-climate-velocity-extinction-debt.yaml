id: u-metapopulation-climate-velocity-extinction-debt
title: "How does climate velocity (rate of isotherm shift) interact with metapopulation dispersal capacity to create an extinction debt in fragmented landscapes?"
status: open
priority: high
disciplines:
  - conservation-biology
  - macroecology
  - climate-science
summary: >
  Climate velocity (km/yr of isotherm movement) is accelerating, requiring species to
  track suitable habitat by dispersal. In fragmented landscapes, dispersal between patches
  is constrained by patch isolation (Hanski's metapopulation theory). When climate
  velocity exceeds the effective dispersal rate across the landscape matrix, populations
  cannot track climate and face local extinction. The extinction debt concept (Tilman 1994)
  predicts that species appear viable today but are committed to future extinction due to
  current landscape structure. For metapopulations, the extinction debt depends on both
  the current metapopulation capacity λ_M and the climate velocity experienced by the
  landscape over the next 50 years. The key unknown: at what climate velocity to
  dispersal rate ratio does the extinction debt become irreversible (i.e., even perfect
  habitat connectivity would be insufficient for population tracking)?
systematic_gaps:
  - No empirical dataset tracks metapopulation dynamics across a climate velocity gradient
  - The interaction between patch creation rate (dynamic landscapes) and extinction debt is unmodelled
  - The lag time between climate shift and observed extinction (realisation of debt) is empirically unknown
suggested_hypotheses:
  - Extinction debt is irreversible when climate velocity exceeds 3× the effective dispersal
    rate across the landscape (empirical threshold from metapopulation simulations)
related_unknowns:
  - u-extinction-debt-fragmentation
references:

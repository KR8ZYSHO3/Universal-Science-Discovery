id: u-demographic-stochasticity-extinction-threshold
title: At what population size does demographic stochasticity overwhelm deterministic dynamics to make extinction inevitable, and can master equation theory predict this threshold for real species?
status: open
priority: high
disciplines:
  - ecology
  - mathematics
  - conservation-biology
  - population-genetics
summary: >
  Conservation biology uses minimum viable population (MVP) estimates (typically 50-500
  individuals) but these are empirical rules of thumb without rigorous mathematical
  derivation. Master equation theory provides exact extinction probability calculations
  for birth-death processes, predicting that extinction time scales as exp(N) for
  populations near carrying capacity. However, real species have structured populations
  (age classes, sex ratio, spatial structure), environmental stochasticity on top of
  demographic stochasticity, and Allee effects — all of which modify the exact
  threshold. The relative contributions of demographic vs environmental stochasticity
  to extinction risk across different taxa is unresolved. The critical population
  size below which extinction probability exceeds 50% within 100 generations remains
  empirically and theoretically poorly constrained.
systematic_gaps:
  - MVP estimates have not been rigorously derived from master equation theory accounting for age structure.
  - The interaction between demographic stochasticity and environmental stochasticity in setting extinction thresholds is analytically intractable for realistic life histories.
  - Empirical tests of master equation predictions for extinction timing are limited by the rarity of carefully monitored declining populations.
last_reviewed: "2026-05-06"

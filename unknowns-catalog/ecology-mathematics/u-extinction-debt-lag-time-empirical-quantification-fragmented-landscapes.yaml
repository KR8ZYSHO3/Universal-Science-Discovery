id: u-extinction-debt-lag-time-empirical-quantification-fragmented-landscapes
title: >
  What is the empirical distribution of extinction debt lag times across
  taxonomic groups and landscape fragmentation histories — specifically, what
  fraction of species committed to extinction by historical deforestation have
  not yet gone extinct, and can the stochastic population model prediction
  T_ext ~ exp(2rK/σ²)/r be quantitatively validated at landscape scale?
status: open
priority: high
disciplines:
  - conservation-biology
  - ecology
  - population-ecology
  - mathematics
  - remote-sensing
summary: >
  Extinction debt — the committed but delayed extinction of species following
  habitat loss — was conceptualised by Tilman et al. (1994) and mathematically
  formalised through stochastic population models (Lande 1993). The prediction
  is stark: populations below minimum viable population size will go extinct,
  but the expected waiting time is T_ext ~ exp(K/K_MVP) — exponential in K,
  meaning the debt can take centuries to be "paid."

  Empirical quantification of extinction debt is limited. Island biogeography
  theory predicts species number S ∝ A^z (z ≈ 0.25); if habitat area A has
  been reduced from A₀ to A₁, the expected species loss is ΔS = S₀(1 - (A₁/A₀)^z).
  Studies in European forest fragments (Kuussaari et al. 2009) suggest 1-75%
  of species in fragmented landscapes are committed to extinction but have not
  yet gone extinct.

  The quantitative question — how long before the debt is paid for a given
  species/fragment/landscape — remains unanswered. This requires: (1) species-
  specific estimates of K, r, σ² for the fragmented landscape; (2) time series
  long enough to observe actual extinctions from known past habitat loss events;
  (3) model validation against observed extinctions.
systematic_gaps:
  - No study has validated the exponential T_ext ~ exp(K) prediction
    quantitatively using empirically estimated K values and observed extinction
    waiting times in the same system.
  - The demographic variance σ² is difficult to estimate for wild populations
    and is rarely reported in conservation assessments.
  - Remote sensing provides area time series but converting area to K requires
    species-area relationships that vary across ecosystems and taxa.
  - The lag time distribution across the ~8,000 threatened species on the IUCN
    Red List has not been estimated, preventing prioritisation of conservation
    interventions by urgency.

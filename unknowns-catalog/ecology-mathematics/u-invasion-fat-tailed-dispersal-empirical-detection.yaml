id: u-invasion-fat-tailed-dispersal-empirical-detection
title: >
  How can fat-tailed dispersal kernels and the resulting accelerating invasion dynamics
  be reliably detected from field data, distinguishing true superdiffusive spread
  from methodological artifacts (sampling bias, detection lags, environmental
  heterogeneity) in invasive species surveillance?
status: open
priority: high
disciplines:
  - ecology
  - mathematics
  - statistics
  - conservation-biology
summary: >
  Integrodifference equation theory (Kot et al. 1996) predicts that invasions driven
  by fat-tailed dispersal kernels (Cauchy, power-law, leptokurtic Gaussian mixtures)
  will accelerate through time rather than spreading at a constant wave speed c*.
  Detecting this acceleration in real invasion data is methodologically difficult:
  (1) Surveillance effort is typically correlated with time (more resources as
  invasion awareness grows), creating apparent acceleration even with constant
  spread; (2) Environmental heterogeneity (habitat patches, landscape connectivity)
  creates spatially variable spread that mimics accelerating invasion at large scales;
  (3) The distinction between thin-tailed (Gaussian, exponential — constant speed)
  and fat-tailed (Cauchy, power-law — accelerating) kernels requires fitting
  dispersal data that often comes from mark-recapture studies with limited spatial
  extent. The moment generating function test (does M_k(s) diverge for all s > 0?)
  requires fitting extreme quantiles of the dispersal distribution that are sampled
  rarely. For zebra mussels in the Great Lakes, chestnut blight, and emerald ash
  borer, spread histories are ambiguous between constant-speed and accelerating models.
systematic_gaps:
  - Statistical tests for fat-tailed vs. thin-tailed dispersal that account for
    observation bias and heterogeneous detection probability.
  - Standardized invasion surveillance protocols that enable retrospective
    statistical analysis of spread rate changes.
  - Genetic approaches (propagule pressure tracking via microsatellites) to
    distinguish constant-front advance from rare long-distance colonization events.
  - Bayesian model comparison (IDE with fat-tailed kernel vs. thin-tailed) using
    hierarchical models incorporating detection probability.
suggested_hypotheses:
  - >
    Genetic analysis of invasion fronts (whole-genome sequencing, low diversity
    at front = bottleneck from thin-tailed spread; high diversity = multiple
    independent colonists = fat-tailed rare long-distance events) will show that
    ≥50% of empirically documented "accelerating" invasions reflect fat-tailed
    dispersal rather than environmental heterogeneity or surveillance artifacts.

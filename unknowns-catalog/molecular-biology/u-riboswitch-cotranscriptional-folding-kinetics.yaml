id: u-riboswitch-cotranscriptional-folding-kinetics
title: >
  How does cotranscriptional folding kinetics determine riboswitch switching accuracy in vivo, and can the switching threshold be quantitatively predicted from measured aptamer K_d and RNA polymerase elongation rate?
status: open
priority: high
disciplines:
  - molecular-biology
  - biophysics
summary: >
  Riboswitches are assumed to function at thermodynamic equilibrium in many models, but RNA polymerase transcribes the aptamer and expression platform sequentially, and folding kinetics compete with transcription rate. If folding is slower than transcription, the aptamer may not have time to bind its ligand before the expression platform folds. The kinetic correction to thermodynamic switching thresholds has not been systematically measured across riboswitch classes.

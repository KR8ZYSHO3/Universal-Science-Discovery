id: u-borrelia-persister-cell-eradication
title: >
  Why do Borrelia persister cells survive standard doxycycline treatment,
  and what combination antibiotic regimen or host-directed therapy can
  reliably eradicate them?
status: open
priority: critical
disciplines:
  - immunology
  - microbiology
  - infectious-disease
  - pharmacology
  - clinical-medicine
summary: >
  Borrelia burgdorferi forms metabolically dormant "persister" cell morphologies —
  including round bodies (cyst forms) and biofilm-like aggregates — that exhibit
  high tolerance to doxycycline, the first-line antibiotic for Lyme disease.
  Unlike antibiotic-resistant bacteria (which carry resistance genes), persister
  cells are phenotypic variants of susceptible bacteria that enter a low-metabolic
  state and simply outlast drug exposure. When antibiotic pressure is removed,
  persisters can resuscitate to normal spirochete forms.

  This is the central unsolved question blocking PTLDS treatment: if viable Borrelia
  persisters survive standard 3–4 week doxycycline treatment, they could explain
  ongoing symptoms in PTLDS patients. Alternatively, if persisters are killed by
  doxycycline but leave behind inflammatory remnants (membrane lipoproteins, DNA),
  the treatment target is not the persisters themselves but the post-infectious
  immune dysregulation.

  Feng et al. (2015) conducted a systematic FDA-approved drug library screen against
  all Borrelia morphological forms and identified a triple combination (daptomycin +
  doxycycline + cefuroxime) that achieved >99% kill of biofilm-form Borrelia in
  vitro. Daptomycin (membrane-disrupting, kills round bodies) is not currently
  approved for Lyme disease; CNS penetration is poor, raising concerns for
  neuroborreliosis.

  The critical gap: this in vitro result has not been replicated in primate models
  or validated in a rigorous human clinical trial. Whether Borrelia persister cells
  actually persist in post-treatment PTLDS patients (rather than being an in vitro
  artifact) has not been definitively established in human tissue.
systematic_gaps:
  - No validated human biomarker or assay for detecting viable Borrelia persisters in post-treatment PTLDS patients (serology detects antibodies, not live bacteria; PCR misses low-burden persister-phase organisms)
  - The triple combination (daptomycin + doxycycline + cefuroxime) from Feng et al. (2015) has not been tested in primate models with established post-treatment infection
  - CNS penetration of daptomycin is insufficient for neuroborreliosis — an alternative membrane-disrupting agent with BBB penetration is needed for neuro-Lyme persister eradication
  - The frequency of true persister cells in human PTLDS tissue (synovium, skin, CSF) is unknown; xenodiagnosis (tick feeding on PTLDS patients) studies have produced conflicting results
  - Host-directed therapy approaches (e.g., enhancing macrophage phagocytosis of persister-form Borrelia) have not been investigated

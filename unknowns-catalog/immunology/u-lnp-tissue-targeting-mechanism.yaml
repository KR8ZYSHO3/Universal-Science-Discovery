id: u-lnp-tissue-targeting-mechanism
title: What molecular and biophysical mechanisms govern LNP organ selectivity, and can rational lipid design achieve reliable non-hepatic tissue targeting for mRNA therapeutics?
status: open
priority: critical
disciplines:
  - drug-delivery
  - immunology
  - biophysics
  - materials-science
summary: >
  Current lipid nanoparticles (LNPs) used in mRNA therapeutics (COVID-19 vaccines,
  siRNA drugs) predominantly accumulate in the liver after systemic administration,
  due to adsorption of apolipoprotein E (ApoE) from serum onto the LNP surface,
  which directs them to hepatic LDL receptors. While liver targeting is useful for
  some applications (liver disease, factor VIII for hemophilia), it prevents mRNA
  LNPs from reaching the vast majority of therapeutic targets: lung (respiratory
  diseases), tumor tissue, CNS (neurological disorders), muscle (metabolic diseases).

  Selective organ targeting (SORT) with LNPs (Cheng et al. 2020, Nat Nanotechnol)
  showed that including cationic, anionic, or zwitterionic lipids beyond the
  standard 4-component formulation can shift biodistribution to lung or spleen.
  However, the mechanism — what determines which serum proteins adsorb (the
  "protein corona") and how protein corona composition directs LNP to specific
  cell types — is incompletely understood. Predictive rational design of organ-
  selective LNPs requires this mechanistic understanding.
systematic_gaps:
  - The protein corona composition of organ-selective LNPs (and its dynamics in vivo) has not been systematically correlated with tissue biodistribution across a broad lipid chemical space.
  - The biophysical mechanism by which the fifth (targeting) lipid in SORT-LNPs changes protein corona composition is unknown.
  - Blood-brain barrier (BBB) penetration by LNPs is very low; whether any lipid formulation can achieve clinically relevant CNS mRNA delivery without direct CNS injection is unknown.
suggested_hypotheses:
  - The fifth lipid in SORT-LNP formulations alters LNP surface charge density, which determines the composition of the protein corona (ApoE vs ApoA1 vs other serum proteins), which in turn determines organ tropism.

id: u-immune-escape-ess-predictions
title: Can evolutionary stable strategy theory from game theory quantitatively predict the equilibrium diversity of immune escape mutations maintained by frequency-dependent selection in chronic viral infections?
status: open
priority: high
disciplines:
  - immunology
  - evolutionary-biology
  - game-theory
  - virology
summary: >
  HIV, influenza, and other rapidly evolving pathogens maintain diverse antigenic
  variants within and between hosts. Game theory (ESS, replicator dynamics) predicts
  that frequency-dependent selection — where rare variants are favored because most
  immune responses target common variants — should maintain diversity at ESS
  proportions. The ESS diversity depends on the payoff matrix of immune recognition
  vs evasion, which is determined by cross-reactivity of immune responses (how much
  immunity to variant A protects against variant B). The quantitative predictions of
  ESS theory for within-host HIV diversity, influenza antigenic drift rate, and SARS-CoV-2
  variant emergence have not been rigorously tested. The observation that vaccines
  can inadvertently create new selection pressures (Marek's disease vaccine example)
  is consistent with game-theoretic predictions but has not been used to design
  evolutionarily stable vaccines.
systematic_gaps:
  - The cross-reactivity matrix (payoff matrix) for immune responses to influenza has not been measured at sufficient resolution to parameterize ESS models.
  - Quantitative tests of ESS diversity predictions for within-host HIV variant diversity are lacking in natural infection cohorts.
  - Game-theoretic vaccine design (designing vaccines to shift the ESS to benign strains) has not been applied clinically.
last_reviewed: "2026-05-06"

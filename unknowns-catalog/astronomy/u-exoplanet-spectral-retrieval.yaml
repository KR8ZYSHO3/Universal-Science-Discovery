id: u-exoplanet-spectral-retrieval
title: "How do cloud/haze model degeneracies in atmospheric retrieval limit detection of biosignature gases, and what spectral features most robustly distinguish biogenic from abiotic gas sources?"
status: open
priority: critical
disciplines:
  - astronomy
  - statistics
  - atmospheric-science
  - astrobiology
summary: >
  Atmospheric retrieval of exoplanet spectra faces a fundamental degeneracy:
  thick clouds and hazes flatten the spectrum, making it impossible to distinguish
  a cloud-covered atmosphere from a high-mean-molecular-weight atmosphere or a
  low-abundance volatile inventory. For biosignature searches (O₂, O₃, CH₄, N₂O),
  this means that a genuine biogenic signal could be masked by clouds and produce
  a non-detection. Conversely, abiotic sources of biosignature gases (photochemical
  O₂ from CO₂ photolysis, volcanic SO₂ falsely flagged as CH₄) could produce
  false positives. The Bayesian model comparison framework can in principle
  quantify these degeneracies but requires a complete forward model of cloud
  formation coupled to photochemistry.
systematic_gaps:
  - "No retrieval code fully couples cloud microphysics, photochemistry, and thermal emission in a single Bayesian framework."
  - "The prior distributions over cloud properties (particle size, optical depth, scale height) are physically unmotivated and dominate posterior uncertainty."
  - "Biosignature context — whether coexisting gases are consistent with biological production — is not incorporated into standard retrieval statistical tests."
related_bridges:
  - b-exoplanet-spectral-retrieval-bayesian
last_reviewed: "2026-05-07"
references:

    note: Springel et al. (2005) — Millennium Simulation hierarchical clustering benchmark (Nature).
  - doi: "10.1093/mnras/stu2039"
    note: Lee et al. (2014) — Sussing Merger Trees algorithm sensitivity study (MNRAS).

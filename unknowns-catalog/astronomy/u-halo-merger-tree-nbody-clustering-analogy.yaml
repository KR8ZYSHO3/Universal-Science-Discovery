id: u-halo-merger-tree-nbody-clustering-analogy
title: >
  Which algorithmic choices in halo merger-tree construction dominate uncertainties in inferred substructure statistics compared with cosmological parameters — and how should tree-builder ambiguity be propagated into galaxy–dark-matter connection constraints?
status: open
priority: medium
disciplines:
  - cosmology
  - computational-science
summary: >
  Merger trees summarize hierarchical assembly but depend on group-finder settings, linking strategy across snapshots, and definitions of infall versus disruption. Uncertainty quantification often lags hardware advances in simulation volume, limiting robust comparisons between suites.
systematic_gaps:
  - Ensemble tree-builder protocols applied to identical particle dumps with community-agreed merger-event definitions.
  - Downstream sensitivity analyses linking tree-choice variance to stellar-halo matching scatter.
suggested_hypotheses:
  - h-merger-tree-branching-matches-subhalo-statistics-scaling
related_bridges:
  - b-dark-matter-substructure-x-halo-merger-tree-algorithms
last_reviewed: "2026-05-07"
references:

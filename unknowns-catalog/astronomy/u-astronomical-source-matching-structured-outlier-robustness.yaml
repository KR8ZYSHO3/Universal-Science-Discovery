id: u-astronomical-source-matching-structured-outlier-robustness
title: >
  How robust are RANSAC-family geometric source-matching methods when astronomical outliers are spatially clustered, quality-ranked, and caused by blends or survey artifacts rather than uniform random contamination?
status: open
priority: medium
disciplines:
  - astronomy
  - computer-science
summary: >
  Standard RANSAC assumptions may fail in sky-survey cross-matching. The unknown is whether quality-ranked sampling and survey flags produce reliable gains under structured outlier regimes.
systematic_gaps:
  - Public benchmark with injected blends, cosmic rays, proper-motion shifts, and spatially clustered artifacts.
  - Comparison of uniform RANSAC, PROSAC-style ranked sampling, and survey-specific Bayesian matchers.
suggested_hypotheses:
  - h-quality-ranked-ransac-improves-astrometric-crossmatch-precision
related_bridges:
  - b-ransac-robust-estimation-x-astronomical-source-matching
last_reviewed: "2026-05-07"
references:
  - doi: "10.1145/358669.358692"
    note: Fischler and Bolles (1981) RANSAC.

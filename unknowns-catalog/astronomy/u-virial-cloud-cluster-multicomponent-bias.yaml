    note: McKee & Ostriker (2007) — theory of star formation / molecular cloud context (Annu Rev Astron Astrophys).
  - doi: "10.1146/annurev.astro.25.1.23"
    note: Shu (1987) — molecular cloud star-formation review framing virial-related scalings (Annu Rev Astron Astrophys).

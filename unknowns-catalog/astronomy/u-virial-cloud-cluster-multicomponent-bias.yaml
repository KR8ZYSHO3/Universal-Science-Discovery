id: u-virial-cloud-cluster-multicomponent-bias
title: >
  How large are systematic mass biases when joint virial-style estimators ignore turbulence, magnetic pressure, cosmic rays, or merger-induced departures from equilibrium across molecular clouds versus galaxy clusters?
status: open
priority: medium
disciplines:
  - astrophysics
  - cosmology
summary: >
  Single-component virial sketches hide comparable physics at vastly different scales: filamentary structure and feedback in GMCs versus shocks and nonthermal pressure in clusters. Quantifying bias requires forward models coupling observations of multiple tracers rather than scalar linewidth scalings alone.
systematic_gaps:
  - Simulation suites with identical virial estimators applied across GMC and cluster mocks with matched diagnostic pipelines.
  - Observation programs pairing independent mass probes (lensing, SZ, stellar dynamics) on overlapping cluster samples with documented systematic covariance.
suggested_hypotheses:
  - h-virial-multicomponent-consistency-reduces-cluster-mass-bias
related_bridges:
  - b-virial-theorem-x-molecular-cloud-cluster-equilibrium
last_reviewed: "2026-05-07"
references:

id: u-gravothermal-catastrophe-globular-cluster-timescale
title: >
  What determines the core-collapse timescale of globular clusters undergoing
  the gravothermal catastrophe, and can post-collapse gravothermal oscillations
  be confirmed observationally to test the statistical mechanics of negative-
  heat-capacity systems?
status: open
priority: medium
disciplines:
  - astronomy
  - statistical-physics
  - stellar-dynamics
  - astrophysics
summary: >
  Lynden-Bell & Wood (1968) predicted the gravothermal catastrophe: an
  isothermal self-gravitating sphere with negative heat capacity undergoes
  runaway core collapse. N-body and Fokker-Planck simulations confirm this
  for globular clusters, with core-collapse timescale t_cc ≈ 0.1 t_rh (relaxation
  time). Post-collapse, gravothermal oscillations (core expansion and re-collapse
  cycles) are predicted. Observationally identifying these oscillations requires
  measuring core radius evolution over ~10⁷ year timescales.

  Key open questions:
  1. The predicted core-collapse timescale t_cc ∝ t_rh shows ~factor-2 scatter
     between different N-body codes — what physical processes (binary hardening,
     stellar evolution mass loss) dominate the uncertainty?
  2. Do post-collapse gravothermal oscillations actually occur in the Milky Way
     globular cluster population, and can they be detected from the distribution
     of core concentration parameters c = log(r_t/r_c)?
  3. How does the negative heat capacity thermodynamics change in the presence
     of a central massive black hole (IMBH) — does the IMBH act as a thermostat
     that suppresses gravothermal catastrophe?
  4. Can the gravothermal catastrophe be reproduced in laboratory systems with
     long-range interactions (e.g. self-gravitating dusty plasma or cold atoms
     with long-range interactions) to test the statistical mechanics directly?
systematic_gaps:
  - Direct observation of core radius evolution over timescales > 10⁷ years
    is impossible; only ensemble statistics across the Milky Way GC population
    are available
  - N-body simulations with N > 10⁵ remain computationally expensive;
    most published simulations use N ~ 10⁴-10⁵, below realistic GC sizes
  - The role of stellar mass spectrum (not modelled in Lynden-Bell's original
    isothermal sphere) in modifying the collapse timescale is not fully
    characterised

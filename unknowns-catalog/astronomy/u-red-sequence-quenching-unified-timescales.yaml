id: u-red-sequence-quenching-unified-timescales
title: What fraction of red sequence scatter at fixed stellar mass is driven by progenitor
  diversity versus ongoing environmental perturbations rather than measurement error?
status: open
priority: medium
disciplines:
- astronomy
- astrophysics
summary: Joint modeling of spectroscopy, morphology, and environment is needed to separate
  age, metallicity, and dust degeneracies; current surveys improve statistics but systematics
  persist.
systematic_gaps:
- Consistent dust modeling across redshifts changes inferred quenching times.
- Selection effects in cluster vs field samples complicate scatter comparisons.
suggested_hypotheses:
- h-red-sequence-age-spreads-constrain-quenching-models
related_bridges:
- b-red-sequence-x-galaxy-evolution
last_reviewed: '2026-05-07'
references:
- doi: 10.1086/323304
  note: Strateva et al. (2001) — color magnitude distribution and red sequence characterization
- doi: 10.1086/375002
  note: Bell et al. (2003) — nearly 2 Gyr of passive evolution and the red sequence (representative
    SFH bridge)

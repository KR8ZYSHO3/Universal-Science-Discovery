id: u-corrosion-inhibitor-molecular-mechanism
title: What are the molecular-scale mechanisms by which organic corrosion inhibitors adsorb on metal surfaces and arrest electrochemical dissolution, and can these mechanisms be predicted from molecular structure?
status: open
priority: medium
disciplines:
  - electrochemistry
  - surface-science
  - materials-science
  - computational-chemistry
summary: >
  Organic corrosion inhibitors (benzotriazole for copper, imidazoline amines for steel
  in acidic media) reduce corrosion rates by orders of magnitude, but their molecular
  mechanism is incompletely understood. They are believed to adsorb on active sites
  (grain boundaries, kink sites, defects) via nitrogen or sulfur lone-pair electron
  donation to the metal surface, blocking the anodic dissolution reaction. However:
  (1) the adsorption geometry and binding energy on heterogeneous real surfaces (not
  ideal single crystals) is unmeasured for most inhibitors; (2) whether inhibition is
  primarily thermodynamic (blocking active sites) or kinetic (increasing activation
  energy for dissolution) is not resolved for many systems; (3) prediction of inhibitor
  efficiency from molecular structure using DFT calculations requires validated exchange-
  correlation functionals for the metal-organic interface, which are not established.
  The discovery of new inhibitors remains largely empirical (HTP screening) rather than
  structure-guided, limiting progress toward greener inhibitors replacing toxic chromates.
systematic_gaps:
  - In-situ molecular-resolution imaging of inhibitor films under electrochemical conditions (STM, AFM in liquid) is technically demanding and rarely connected to macroscopic corrosion rate measurements.
  - Machine learning models trained on inhibitor efficiency data have limited transferability across metal-environment combinations due to sparse, heterogeneous training data.
  - The relationship between molecular dipole moment, HOMO energy (quantum chemistry descriptors) and inhibition efficiency (a macroscopic rate) involves uncharacterized mesoscale physics.
last_reviewed: "2026-05-06"

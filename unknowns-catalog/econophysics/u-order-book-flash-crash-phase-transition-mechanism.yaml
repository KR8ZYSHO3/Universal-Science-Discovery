id: u-order-book-flash-crash-phase-transition-mechanism
title: >
  Is the limit order book near a self-organised critical point in normal market
  conditions — and does a flash crash correspond to a first-order phase transition
  (sudden LOB drain) or a second-order transition (diverging susceptibility with
  correlated HFT cancellations), and can early warning signals predict it?
status: open
priority: high
disciplines:
  - econophysics
  - physics
  - social-science
  - mathematics
summary: >
  Flash crashes (the 2010 Dow Jones crash: −9% in minutes, the 2013 British Pound
  crash: −6% in 45 minutes) involve rapid LOB depletion as high-frequency market
  makers cancel orders en masse. Theoretical models (Cont-Stoikov-Talreja, Farmer
  et al.) suggest the LOB may self-organise near a critical point where order
  arrival and cancellation rates balance — making the market highly susceptible to
  correlated order flow. Whether this is a true phase transition (in the statistical
  mechanics sense) is unresolved: a first-order transition would show discontinuous
  price jumps with no warning, while a second-order transition would show diverging
  variance and critical slowing down — measurable as early warning signals in the
  order book state. If second-order, regulators could monitor LOB criticality in
  real time to identify markets approaching a flash crash. The mechanism connecting
  HFT correlation (simultaneously cancelling orders when a common signal triggers
  all algorithms) to the phase transition has not been formally established.
systematic_gaps:
  - No statistical test distinguishing first- vs. second-order flash crash
    has been applied to the 2010 or 2013 data with sufficient resolution.
  - Early warning signals (variance, autocorrelation of LOB mid-price) have
    not been validated in a prospective real-time test on actual markets.
  - The correlation structure of HFT order cancellations leading to flash
    crashes has not been reconstructed from exchange audit trail data.
related_bridges:

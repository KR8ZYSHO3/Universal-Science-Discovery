id: u-fitness-landscape-drug-resistance-prediction
title: Can deep mutational scanning fitness landscapes measured in vitro predict the order, timing, and combination of resistance mutations that evolve clinically in patients treated with antibiotics or antivirals?
status: open
priority: critical
disciplines:
  - pharmacology
  - evolutionary-biology
  - genomics
summary: >
  Deep mutational scanning (DMS) maps fitness values across thousands of single and
  double mutations in drug-target proteins, providing an approximation of the local
  fitness landscape around the wild-type sequence. However, in vitro fitness does
  not always correspond to in vivo clinical fitness because of pharmacokinetics,
  immune system interactions, and within-host selection dynamics. Key unknowns:
  (1) how accurately do DMS-measured resistance landscapes predict clinical resistance
  mutation order in longitudinal patient cohorts, (2) what fraction of resistance
  mutations have sign epistasis detectable by DMS that constrains evolutionary pathways,
  (3) can fitness landscape topology predict novel resistance mutations before they
  appear in surveillance databases?
systematic_gaps:
  - Complete DMS landscapes are available for only ~20 drug targets; most resistance surveillance relies on clinical observation
  - In vitro vs. in vivo fitness discordance is well-known but not systematically quantified for most pathogens
  - Multi-drug fitness landscapes (epistasis between resistance mutations for different drugs) are rarely measured
related_bridges:

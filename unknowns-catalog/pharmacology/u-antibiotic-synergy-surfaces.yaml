id: u-antibiotic-synergy-surfaces
title: "Can pharmacodynamic interaction surfaces for antibiotic combinations be predicted from drug-target network topology before experimental measurement, and which network features are the best predictors of synergy?"
status: open
priority: high
disciplines:
  - pharmacology
  - systems-biology
  - network-science
summary: >
  The pharmacodynamic interaction surface E(a,b) for any antibiotic pair requires
  an expensive checkerboard assay to measure. Predicting synergy (positive surface
  deviation from Loewe additivity) from molecular features — drug targets,
  mechanism of action, gene interaction network topology — would enormously
  accelerate combination antibiotic drug discovery. Current machine learning models
  achieve AUC ~0.7–0.8 using chemical structure and target similarity, but
  the mechanistic features (synthetic lethality, pathway independence, collateral
  sensitivity) that drive synergy are not well quantified. Whether synergy is
  conserved across bacterial species or strain-specific is unknown.
systematic_gaps:
  - "No genome-scale map of antibiotic pairwise synergy exists for a single bacterial species — most data are fragmentary (<100 pairs in any organism)."
  - "The mapping from drug-target network topology metrics (synthetic lethality score, pathway distance) to synergy magnitude has not been calibrated quantitatively."
  - "Time-kill kinetics of combination antibiotics are rarely measured, leaving the temporal dynamics of synergy (early vs late killing) uncharacterized."
related_bridges:

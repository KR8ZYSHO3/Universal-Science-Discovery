id: u-pharmacokinetic-interindividual-variability
title: "What fraction of interindividual variability in drug pharmacokinetics is attributable to CYP genetic polymorphisms versus non-genetic sources (age, disease, drug interactions, microbiome), and can multi-omics integration predict individual PK parameters more accurately than population PK models?"
status: open
priority: high
disciplines:
  - pharmacology
  - genetics
  - systems-biology
summary: >
  Drug dosing is calibrated using population average PK parameters, but individual responses vary by 10-fold
  for many drugs. The relative contribution of CYP genotype, age-related decline in hepatic function, disease-altered
  protein binding, gut microbiome drug metabolism, and drug-drug interactions to PK variability is unknown.
  Key unknowns: (1) for drugs with high PK variability (tacrolimus, warfarin, imatinib), what fraction of
  dose-adjusted variability remains unexplained after CYP genotyping, (2) can pharmacogenomic PBPK models
  incorporating CYP2D6/2C9/3A4/2C19 genotype alongside age, weight, and creatinine predict individual AUC
  within ±30% for >80% of patients, (3) does gut microbiome-mediated drug metabolism (e.g., irinotecan hydrolysis)
  represent a modifiable source of PK variability?
systematic_gaps:
  - Large-scale PK variability studies typically measure few pharmacogenomic markers; genome-wide rare variant contributions are uncharacterized
  - Microbiome composition changes with disease, antibiotic treatment, and diet — making microbiome PK contributions dynamic and hard to model
  - Most PBPK models were built for healthy adults; pediatric and geriatric PBPK models lack validation data
related_bridges:

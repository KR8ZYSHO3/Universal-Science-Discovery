id: u-cyp450-xenobiotic-metabolic-prediction
title: "Can in silico machine learning models trained on CYP450 crystal structures and metabolomics databases quantitatively predict drug metabolic stability, metabolite identity, and drug-drug interaction K_i values for novel chemical entities before first-in-human studies?"
status: open
priority: high
disciplines:
  - pharmacology
  - biochemistry
  - computational-chemistry
summary: >
  Predicting which CYP enzyme will metabolize a new drug compound, where on the molecule, and at what rate
  is a critical bottleneck in drug discovery. Current structure-based and QSAR models have moderate accuracy
  but fail for unusual scaffolds. Key unknowns: (1) can protein-ligand docking scores in CYP450 active sites
  predict K_m and K_i values with sufficient accuracy to replace in vitro screening for lead optimization,
  (2) do deep learning models trained on CYP metabolic stability databases generalize to novel drug classes
  not represented in training data, (3) can metabolite prediction models accurately identify all major
  circulating metabolites (>10% of parent AUC) for a new drug from structure alone?
systematic_gaps:
  - CYP450 crystal structures are solved with inhibitor-bound conformations; the induced-fit dynamics for novel substrates are difficult to model
  - Training data for CYP prediction models is biased toward drug-like compounds; natural products and unusual scaffolds are underrepresented
  - Metabolic reactions involving two CYP enzymes sequentially (sequential metabolism) are not captured by single-enzyme prediction models
related_bridges:

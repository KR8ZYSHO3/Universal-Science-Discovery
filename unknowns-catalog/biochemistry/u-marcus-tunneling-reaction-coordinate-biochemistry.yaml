id: u-marcus-tunneling-reaction-coordinate-biochemistry
title: How tightly do Marcus parameters (λ, V_DA, ΔG°) inferred from driving-force
  sweeps on enzymes predict tunneling-corrected kinetic isotope effects measured independently?
status: open
priority: medium
disciplines:
  - biochemistry
  - physical-chemistry
summary: >
  Combining Marcus phenomenology with tunneling corrections should constrain unified PCET models,
  yet simultaneous calibration across solvents, mutants, and isotopic substitutions remains
  incomplete because λ extraction often assumes separable electronic and vibrational couplings
  that break down in strongly anharmonic active sites.
systematic_gaps:
  - Coupled multi-mode tunneling not reducible to a single effective reaction coordinate
  - Limited datasets matching Marcus fits to sub-picosecond vibrational spectroscopy on the same enzyme series
suggested_hypotheses:
  - h-marcus-tunneling-x-enzyme-reaction-coordinate
related_bridges:

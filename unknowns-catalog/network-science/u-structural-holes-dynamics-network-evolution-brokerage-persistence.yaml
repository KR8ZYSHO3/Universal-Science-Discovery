id: u-structural-holes-dynamics-network-evolution-brokerage-persistence
title: >
  How stable are structural holes and brokerage positions over time in real social
  and organizational networks — do brokers maintain their advantage as networks
  evolve, or do structural holes close as bridged groups discover each other through
  the broker?
status: open
priority: medium
disciplines:
  - network-science
  - sociology
  - organizational-behavior
  - economics
summary: >
  Burt's structural hole theory predicts brokerage advantages as static properties
  of network positions. But networks evolve: groups connected through a broker may
  eventually form direct ties (closing the structural hole), eliminating the broker's
  advantage. Conversely, brokers may create new structural holes by introducing
  previously unconnected parties. The dynamics of structural hole persistence are
  not well characterized. Key questions: (1) What fraction of structural holes in
  organizational email networks close within 1 year? (2) Do brokers actively
  maintain information asymmetry (preventing direct connections between their contacts)?
  (3) How does digital communication (LinkedIn, Slack) alter the dynamics of structural
  hole formation and closure compared to pre-digital social networks? (4) Is there
  a dynamic equilibrium level of structural holes in stable organizations?
systematic_gaps:
  - Longitudinal network data with sufficient temporal resolution to measure
    structural hole dynamics (weekly or monthly snapshots) with individual identifiers
    is rare; most studies use cross-sectional data.
  - The causal direction between brokerage and performance (does brokerage cause
    performance, or do high performers accumulate brokerage positions?) has not
    been established with quasi-experimental evidence.
  - The effect of digital communication platforms on structural hole dynamics
    (do platforms that surface mutual contacts reduce structural holes?) has not
    been studied longitudinally.

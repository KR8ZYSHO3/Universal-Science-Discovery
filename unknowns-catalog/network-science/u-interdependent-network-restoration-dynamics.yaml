id: u-interdependent-network-restoration-dynamics
title: How do repair and restoration processes (human responders, automated rerouting) modify the cascade failure threshold in interdependent infrastructure networks?
status: open
priority: critical
disciplines:
  - network-science
  - engineering
  - complex-systems
summary: >
  Static percolation models of interdependent networks (Buldyrev 2010) assume nodes fail
  and stay failed. Real infrastructure failures involve restoration: repair crews fix
  power lines, network operators reroute traffic, automated switching isolates faults.
  Restoration dynamics fundamentally alter cascade thresholds — slow restoration may
  allow cascades to complete before repair; fast restoration can arrest cascades early.
  The competition between failure propagation speed and restoration speed determines
  whether a cascade is catastrophic or self-limiting. Models including restoration
  dynamics show that the first-order phase transition of static percolation may become
  second-order (continuous), changing the fragility signature and policy implications.
systematic_gaps:
  - Empirical data on restoration dynamics (time-to-repair distributions, crew dispatch
    logistics) is not integrated into percolation models of infrastructure.
  - Whether real infrastructure failures show first-order (discontinuous) or second-order
    (continuous) cascade dynamics is not empirically established.

id: u-hyperbolic-embeddings-hierarchy-identifiability
title: When can we reliably infer that empirical graph data require hyperbolic rather than
  Euclidean embedding from finite noisy samples?
status: open
priority: medium
disciplines:
- mathematics
- computer-science
- network-science
summary: Hyperbolic embeddings improve metrics on many benchmarks, but model selection for
  curvature and robustness to spurious triangles remain open, especially for evolving social
  and biological graphs.
systematic_gaps:
- Few statistical tests distinguish hyperbolic fit from mixture Euclidean models on real networks.
- Training dynamics can collapse curvature unless regularized, confounding interpretation.
suggested_hypotheses:
- h-real-hierarchies-embed-better-in-hyperbolic-space

id: u-spatial-autocorrelation-economic-convergence-causality
title: >
  Does high Moran's I spatial autocorrelation in regional income cause income
  divergence (reinforcing inequality via agglomeration), or does divergence cause
  high autocorrelation (sorting of high-productivity workers into high-income
  regions) — and can the Krugman bifurcation point be identified empirically
  from the trajectory of spatial autocorrelation statistics?
status: open
priority: high
disciplines:
  - spatial-economics
  - economic-geography
  - statistics
  - regional-science
summary: >
  The Krugman (1991) core-periphery model predicts a phase transition: above a
  critical level of transport cost reduction, manufacturing agglomerates and regional
  income diverges. Moran's I spatial autocorrelation in income should increase
  monotonically through this transition. However, the causal direction between
  autocorrelation and divergence is not identified: (A) high autocorrelation may
  cause divergence by amplifying initial advantages (consistent with agglomeration
  theory); (B) divergence may cause high autocorrelation by sorting high-productivity
  workers into existing high-income regions (consistent with neoclassical sorting).
  The two mechanisms are observationally equivalent from cross-sectional spatial
  data. Panel data and natural experiments (sudden transport cost changes, e.g.,
  high-speed rail opening) could distinguish them, but studies to date are
  insufficient. Additionally, whether the Moran's I time series shows a
  recognisable signature of bifurcation (critical slowing down, increase in
  variance near the transition) has not been tested.
systematic_gaps:
  - Causal identification of spatial autocorrelation → divergence vs. sorting → autocorrelation using exogenous transport cost shocks has not been done with sufficient power.
  - Pre-bifurcation early-warning signals (critical slowing down in Moran's I autocorrelation time series, analogous to ecological tipping point detection) have not been applied to regional income data.
  - The relationship between Moran's I and the spatial lag parameter rho in econometric models has not been systematically empirically mapped across different spatial scales and governance regimes.
suggested_hypotheses:
  - >
    The trajectory of Moran's I for regional GDP in EU NUTS-3 regions (1990-2020)
    shows critical slowing down (increasing lag-1 autocorrelation of the Moran's I
    time series) prior to the post-2008 divergence episode — testable as an
    early-warning indicator of the Krugman bifurcation.
related_bridges:
  - b-spatial-statistics-geographic-inequality

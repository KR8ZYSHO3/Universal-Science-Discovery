id: u-oxyluciferin-excited-state-mechanism-enol-vs-keto
title: >
  Which tautomeric form of oxyluciferin — enolate, keto, or phenolate — is the
  actual light emitter in firefly bioluminescence, and how do active-site
  electrostatics and protonation state tune emission from 540 nm (green)
  to 620 nm (red) without changing the luciferin substrate?
status: open
priority: medium
disciplines:
  - bioluminescence
  - photochemistry
  - quantum-chemistry
  - structural-biology
summary: >
  The emission wavelength of firefly bioluminescence (540-620 nm depending on
  species and conditions) is not explained by the chemical structure of
  oxyluciferin alone. Multiple tautomeric forms exist in the excited state:
  (1) enolate (anionic enol form, emission ~530 nm); (2) keto (neutral carbonyl
  form, emission ~580 nm); (3) phenolate (anionic phenol deprotonated form,
  emission ~560 nm); (4) 6'-OH keto form. Theoretical TDDFT and CASPT2
  calculations predict emission wavelengths for each form, but experiments
  have not definitively identified the emitting species in vivo. The active-site
  of luciferase tunes emission colour across species (482 nm in Phrixothrix railroad
  worm to 620 nm in a different segment of the same species) by a mechanism
  presumed to be active-site polarity/H-bonding, but which tautomer is
  stabilised by each active-site environment is debated. pH dependence of
  emission (acidic → red-shift, basic → green) suggests protonation state
  matters, but whether this reflects keto-enol tautomerism or simple
  electrostatic stabilisation of the excited dipole moment is unresolved.
systematic_gaps:
  - High-resolution crystal structures of luciferase with transition-state analogues for the emitting species (oxyluciferin tautomers) have not been obtained for the full colour range of luciferase species.
  - Gas-phase spectroscopy of isolated oxyluciferin tautomers (avoiding solvent effects) compared to computational predictions has not been done with sufficient resolution to identify the emitting form.
  - Time-resolved emission spectroscopy of the bioluminescence reaction with ps-ns resolution has not resolved whether multiple emitting species contribute sequentially or simultaneously to the emission spectrum.
suggested_hypotheses:
  - >
    The enolate tautomer of oxyluciferin is the primary light emitter in wild-type
    Photinus pyralis luciferase at pH 7.0, but active-site mutations (Y255F, H245N)
    that eliminate key H-bonding interactions shift emission to the keto tautomer
    at 580 nm — testable by time-resolved fluorescence and resonance Raman
    spectroscopy of the bioluminescence reaction.
related_bridges:

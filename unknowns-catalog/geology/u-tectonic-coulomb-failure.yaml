id: u-tectonic-coulomb-failure
title: "What friction coefficient and pore pressure model best explains Coulomb failure function predictions for aftershock sequences, and why do ~20-30% of aftershocks fall in ΔCFF < 0 regions?"
status: open
priority: medium
disciplines:
  - geophysics
  - mechanics
  - seismology
summary: >
  Coulomb failure function (ΔCFF) calculations predict ~70–80% of aftershocks
  fall in stress-loading lobes, but 20–30% consistently fall in stress shadow
  regions (ΔCFF < 0). Several explanations exist: dynamic stress triggering by
  seismic waves (not captured by static ΔCFF), uncertainty in receiver fault
  orientation, heterogeneous friction coefficients, or off-fault damage zones.
  The effective friction coefficient μ' (including pore pressure effects) is
  typically set to 0.4 without independent measurement. Whether rate-and-state
  friction, which gives a rate change R/R₀ = exp(ΔCFF/Aσ) rather than a threshold,
  better explains aftershock catalogs is debated.
systematic_gaps:
  - "The effective friction coefficient μ' is rarely measured independently — it is typically fit to aftershock data, creating circularity."
  - "Dynamic Coulomb stress changes from passing seismic waves are not included in standard static ΔCFF maps but may dominate for distant triggered earthquakes."
  - "High-resolution 3D fault geometry is unavailable for most faults, making receiver fault orientation a dominant uncertainty."
related_bridges:
  - b-tectonic-stress-coulomb-failure
last_reviewed: "2026-05-07"
references:
  - doi: "10.1029/92JB00182"
    note: "Okada (1992) Internal deformation due to shear and tensile faults"

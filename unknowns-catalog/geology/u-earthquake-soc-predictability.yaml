id: u-earthquake-soc-predictability
title: Is earthquake occurrence genuinely unpredictable (true SOC, exponential distribution of recurrence times) or does the approach to criticality produce detectable precursors (critical slowing down, power-law fluctuations)?
status: open
priority: high
disciplines:
  - geology
  - seismology
  - statistical-physics
  - geophysics
summary: >
  The self-organized criticality (SOC) model of seismicity predicts that the Earth's
  crust is always at the critical point — there is no approach to criticality before
  large earthquakes, only the system is perpetually critical. In this view, large
  earthquakes are unpredictable in principle: they are just large stochastic
  fluctuations from a power-law distribution (Gutenberg-Richter), and the specific
  fault that will rupture next carries no advance warning signal.

  An alternative interpretation: the crust is not perfectly self-tuned to criticality
  but approaches it during the inter-seismic loading period. In this view, critical
  slowing down (increasing variance, increasing temporal autocorrelation) should
  precede major earthquakes. This would allow early-warning indicators derived from
  critical phenomena theory — the same indicators used for ecological tipping points
  and climate tipping points.

  The empirical record is ambiguous. Some retrospective analyses claim to detect
  quiescence patterns, accelerating moment release (AMR), or b-value decreases before
  major earthquakes. None has produced reliable prospective predictions.

  Resolving this question has enormous societal consequences. If SOC is the correct
  model, earthquake prediction is fundamentally impossible and resources should go
  to resilience. If critical-approach precursors exist, systematic monitoring of
  high-resolution seismic catalogs for early-warning indicators becomes the priority.
systematic_gaps:
  - Distinguishing true SOC (perpetual criticality) from near-critical approach (intermittent criticality) using catalog statistics has not been achieved with current catalog completeness.
  - Prospective tests of critical-slowing-down indicators for earthquake forecasting have not been conducted at sufficient scale and blind evaluation.
  - The relationship between geodetic strain accumulation (GPS) and seismic criticality indicators has not been systematically quantified.
  - Whether b-value decreases before major earthquakes are statistically significant (vs. catalog artifacts) remains contested.
suggested_hypotheses:
  - Fault segments within 10 years of a M≥7 rupture exhibit statistically significant increases in seismic correlation length, measurable in catalog data with completeness magnitude ≤ 2.

id: u-silicate-weathering-temperature-sensitivity-field
title: >
  What is the effective temperature sensitivity of silicate weathering at watershed scales, and does it match laboratory kinetic measurements or show systematic deviation due to biological and physical factors?
status: open
priority: high
disciplines:
  - geology
  - chemistry
summary: >
  Laboratory experiments give activation energies of 40-60 kJ/mol for silicate mineral dissolution, predicting ~50% rate increase per 10°C, but field measurements of weathering fluxes across climate gradients show lower or variable temperature sensitivities. The discrepancy may reflect vegetation effects, physical erosion rate control on mineral surface area, or soil CO2 dynamics. The effective weathering feedback strength in GEOCARB is thus uncertain by a factor of ~2.

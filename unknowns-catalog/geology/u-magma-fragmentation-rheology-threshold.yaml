id: u-magma-fragmentation-rheology-threshold
title: "What determines the critical Deborah number and strain rate at which silicate melt transitions from viscous to brittle fragmentation during volcanic ascent, and how do dissolved water content, crystal fraction, and bubble nucleation rate interact to set the fragmentation threshold?"
status: open
priority: high
disciplines:
  - volcanology
  - fluid-mechanics
  - geochemistry
summary: >
  Explosive volcanic eruptions are triggered when magma fragmentates, but the precise threshold
  conditions remain poorly constrained. The fragmentation criterion De > 0.01 is empirically calibrated
  but the underlying physics of crack nucleation in viscoelastic silicate melts is incomplete.
  Key unknowns: (1) how does crystal fraction modify the effective viscosity and fragmentation threshold,
  (2) can pre-eruptive magma rheology measured by seismology predict fragmentation depth in real time,
  (3) do bubbles nucleate before or after fragmentation, and does their distribution affect conduit flow stability?
systematic_gaps:
  - High-pressure, high-strain-rate deformation experiments on natural magma compositions are technically challenging
  - Seismic velocity changes in the shallow conduit that could indicate brittle-ductile transition are not resolvable with current networks
  - Coupling between bubble growth, dissolved gas exsolution, and melt viscosity during rapid decompression is poorly parameterized
related_bridges:
  - b-magma-fragmentation-rheology
last_reviewed: "2026-05-07"

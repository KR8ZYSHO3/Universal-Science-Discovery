id: u-rock-magnetism-paleomagnetic-reversal-mechanism
title: "What is the geophysical mechanism triggering polarity reversals of Earth's magnetic field, and can micromagnetic domain theory applied to natural remanence-recording minerals provide paleointensity records during reversals with sufficient temporal resolution to distinguish rapid vs. gradual field collapse?"
status: open
priority: high
disciplines:
  - geology
  - condensed-matter-physics
  - geophysics
summary: >
  Geomagnetic reversals occur on timescales of a few thousand years, but the trigger mechanism and
  dynamics of the core-field collapse are debated. Key unknowns: (1) can paleointensity records from
  lava flows and sediments with multi-domain vs. single-domain magnetic carriers be reliably inter-
  compared once micromagnetic domain corrections are applied, and do they show consistent reversal
  dynamics across sites? (2) Does the Verwey transition in magnetite bias absolute paleointensity
  estimates in samples that experienced sub-120K temperatures, and how large is this effect?
  (3) Can first-principles DFT calculations of magnetite magnetic anisotropy resolve discrepancies
  between Thellier-Thellier protocol estimates of ancient field intensity?
systematic_gaps:
  - Multi-domain magnetite paleointensity correction remains empirically calibrated rather than derived from micromagnetic first principles
  - Sedimentary paleointensity records from lock-in depth and compaction effects are poorly constrained
  - DFT calculations of magnetite K1 anisotropy constant at high temperature are not routinely used in paleomagnetic interpretation

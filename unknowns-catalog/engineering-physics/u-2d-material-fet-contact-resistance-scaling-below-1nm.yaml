id: u-2d-material-fet-contact-resistance-scaling-below-1nm
title: >
  What is the physical lower bound on contact resistance for 2D material (MoS₂,
  WSe₂) field-effect transistors, and can semimetal contacts (Bi, In) or phase-
  engineered metallic contacts achieve contact resistivity below the IRDS target
  of 10 Ω·µm to enable competitive ON-current for sub-1nm node devices?
status: open
priority: critical
disciplines:
  - engineering
  - physics
  - materials-science
  - semiconductor-physics
  - quantum-physics
summary: >
  2D material transistors (MoS₂, WSe₂, WS₂, MoSe₂ FETs) are attractive for
  sub-1nm channel scaling because the atomic-scale channel thickness eliminates
  short-channel effects. However, contact resistance (R_c) remains the dominant
  performance bottleneck: (1) Fermi-level pinning at metal/2D material interfaces
  creates large Schottky barriers (φ_B ≈ 0.3-0.6 eV for most metals on MoS₂),
  limiting ON-current. (2) Van der Waals gaps between metal and 2D material
  reduce charge injection area. (3) The Landauer limit for contact resistance
  h/(2e²) × 1/M ≈ 6.45 kΩ per channel must be approached for competitive
  performance. Currently achieved R_c for MoS₂: 200-1000 Ω·µm (IRDS target:
  <10 Ω·µm for 2030). Proposed solutions: semimetal contacts (Bi, In, Sb) with
  near-zero Schottky barriers; phase-engineered 1T-MoS₂ contacts (metallic phase
  laterally adjacent to 2H-MoS₂ channel); monolayer graphene as contact bridge;
  electrostatic doping instead of chemical doping at contacts. The fundamental
  quantum mechanical limit — how close to the Landauer conductance quantum can
  a realistic 2D material contact approach — is not established theoretically or
  experimentally.
systematic_gaps:
  - Systematic Schottky barrier height measurement vs. metal work function for
    all 2D materials at technologically relevant thicknesses (1-5 monolayers).
  - Transmission electron microscopy + EELS characterization of the atomistic
    contact structure for lowest-resistance contacts achieved.
  - Theoretical NEGF simulation of contact transmission for realistic (disordered,
    non-ideal) 2D material / metal interfaces.
  - Experimental comparison of semimetal vs. phase-engineered vs. graphene
    bridge contacts on the same 2D material/substrate system.
suggested_hypotheses:
  - >
    Phase-engineered 1T'-MoS₂ contacts (achieved by K-intercalation or
    electrostatic carrier injection) will achieve contact resistivity <50 Ω·µm
    on 2H-MoS₂ channel devices at room temperature, limited by phonon scattering
    at the 1T'/2H interface rather than Schottky barriers — reducing the contact
    problem from a barrier problem to a phonon engineering problem.

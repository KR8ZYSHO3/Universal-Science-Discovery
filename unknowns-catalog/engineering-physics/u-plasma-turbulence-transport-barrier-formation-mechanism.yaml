id: u-plasma-turbulence-transport-barrier-formation-mechanism
title: >
  What is the complete physical mechanism by which edge transport barriers
  (H-mode pedestal) spontaneously form in tokamaks — specifically, what drives
  the L-H transition and sustains the pedestal pressure gradient — and can
  this mechanism be predictively modelled for ITER-scale plasmas?
status: open
priority: high
disciplines:
  - plasma-physics
  - nuclear-fusion-engineering
  - magnetohydrodynamics
  - nonlinear-dynamics
summary: >
  The H-mode (high-confinement mode), discovered by Wagner et al. (1982) at
  ASDEX, is the operating regime required for ITER and commercial fusion
  reactors. In H-mode, a transport barrier spontaneously forms at the plasma
  edge (the "pedestal"), reducing turbulent transport by 10-100× and doubling
  the energy confinement time. ITER's Q=10 goal depends critically on pedestal
  performance.

  The L-H transition mechanism remains incompletely understood despite 40 years
  of research. Proposed mechanisms include: (1) flow shear stabilisation of
  ITG/TEM turbulence via E×B velocity shear; (2) zonal flows generated by
  drift-wave turbulence creating the initial shear layer; (3) role of neutrals
  near the separatrix; (4) electromagnetic effects near the beta limit.

  The pedestal pressure gradient is limited by peeling-ballooning MHD
  instabilities that periodically erupt as ELMs (edge-localised modes),
  depositing up to 10 MJ pulses on the divertor in <1 ms — a materials
  engineering crisis for ITER. Whether ITER-scale plasmas will have benign
  small ELMs or damaging large ELMs is a key unknown.
systematic_gaps:
  - The L-H power threshold P_LH scales poorly with plasma size — empirical
    scaling laws (Martin et al. 2008) disagree with first-principles predictions
    by factors of 2-5.
  - The relative roles of ion heat flux, electron heat flux, density, and
    impurity content in triggering the L-H transition are not established.
  - Gyrokinetic simulations cannot yet simulate a full L-H transition due to
    the extreme scale separation between turbulence (~mm) and pedestal (~cm).
  - ELM suppression by resonant magnetic perturbations (RMPs) works empirically
    in DIII-D and AUG but the physics mechanism (field-line stochastization
    vs. flow drive) is contested.

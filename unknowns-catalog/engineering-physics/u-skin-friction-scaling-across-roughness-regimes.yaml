id: u-skin-friction-scaling-across-roughness-regimes
title: Can a universal roughness function map measured micron-scale topography to u_τ shifts
  without full DNS for engineering tolerances?
status: open
priority: medium
disciplines:
- engineering
- physics
summary: Empirical correlations work in regimes where experiments exist; structured surfaces
  (riblets, superhydrophobic textures) violate simple shifts.
systematic_gaps:
- Pressure-gradient effects couple to roughness in ways not captured by channel-flow calibrations.
- Three-dimensional anisotropic roughness lacks a complete parameter reduction.
suggested_hypotheses:
- h-law-of-wall-predicts-local-skin-friction-when-roughness-scaled
related_bridges:
- b-skin-friction-x-boundary-layer
last_reviewed: '2026-05-07'
references:

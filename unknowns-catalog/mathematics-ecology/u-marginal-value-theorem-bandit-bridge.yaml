id: u-marginal-value-theorem-bandit-bridge
title: Can field foraging data be fit by index policies equivalent to Gittins or UCB rules
  under realistic patch renewal noise, and where do animals systematically deviate?
status: open
priority: medium
disciplines:
- ecology
- computer-science
- mathematics
summary: Formal equivalence is limited by partial observability and learning, but comparative
  tests of marginal-value stopping versus heuristic rules are underdeveloped in wild populations.
systematic_gaps:
- Sparse datasets with simultaneous travel times and capture series suitable for index inference.
- Risk-sensitive foragers may violate mean-rate shadow prices assumed in basic MVT.
suggested_hypotheses:
- h-charnov-marginal-value-maps-to-index-policy-budgeting

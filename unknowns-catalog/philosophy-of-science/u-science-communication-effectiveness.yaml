id: u-science-communication-effectiveness
title: What communication strategies reliably improve public understanding of scientific evidence and reduce belief in scientific misinformation?
status: open
priority: high
disciplines:
  - science-communication
  - philosophy-of-science
  - cognitive-psychology
  - metascience
summary: >
  Science communication research has tested deficit model (information provision),
  narrative framing, inoculation theory (prebunking misinformation), and value-
  concordant framing approaches. Results are inconsistent: simple information
  provision rarely changes attitudes on politically charged topics; inoculation
  experiments show effects that may not generalize; fact-checking can backfire
  (backfire effect) in some populations. The mechanism by which public trust in
  scientific institutions forms, sustains, and erodes is poorly understood, as are
  the long-term effects of any communication intervention on behavior (not just
  reported beliefs).
systematic_gaps:
  - Long-term follow-up of science communication experiments beyond weeks is rare; behavior change (not belief change) is almost never measured.
  - The relative effectiveness of expert communication vs. peer communication vs. institutional communication has not been tested in randomized field experiments.
  - Whether the same communication strategy that increases acceptance of climate science decreases acceptance of vaccine safety (value-concordance backfire) has not been systematically examined.
last_reviewed: "2026-05-05"

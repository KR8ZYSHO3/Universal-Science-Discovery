id: u-bayesian-prior-objectivity
title: >
  Is there an objective, uniquely determined prior probability distribution
  for scientific hypotheses, or is Bayesian confirmation theory irreducibly
  subjective — and if the latter, does this undermine its normative status
  as the logic of science?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - Bayesian-statistics
  - epistemology
  - mathematics
summary: >
  Bayesian confirmation theory formalises scientific inference as posterior
  P(H|E) ∝ P(E|H)·P(H), but the prior P(H) must be assigned before data.
  Two positions dominate: (1) subjective Bayesianism (de Finetti, Savage):
  priors are personal degrees of belief and need only be coherent (avoiding
  Dutch books); (2) objective Bayesianism (Jeffreys, Jaynes): priors should
  be derived from invariance principles (the Jeffreys prior is invariant
  under reparametrisation), maximum entropy (the least informative prior
  consistent with known constraints), or reference priors (Berger & Bernardo).

  The problem: no uniquely determined objective prior exists for all
  hypothesis spaces. Jeffreys priors are improper (don't integrate to 1)
  for many models. Maximum entropy priors depend on the parameterisation.
  Reference priors depend on the parameter of interest. For scientific
  hypotheses (qualitative theories like evolution vs. creationism), there
  is no clear objective procedure for assigning P(H) at all.

  This has practical consequences: if two scientists assign different priors
  to the same hypothesis, they will reach different posteriors even after
  the same evidence. Bayesians respond that posteriors converge given enough
  data (Bernstein-von Mises theorem), but this convergence can be
  arbitrarily slow for hypotheses with very different priors. For rare,
  high-stakes decisions (new drug efficacy, climate sensitivity), prior
  dependence may never wash out in practice.
systematic_gaps:
  - No agreed procedure for assigning priors to qualitative scientific theories (as opposed to parameter estimation within a fixed model class).
  - The Bernstein-von Mises convergence theorem requires regularity conditions that may not hold for all scientific hypothesis spaces.
  - The relationship between Bayesian priors and frequentist calibration (are Bayesian credible intervals well-calibrated?) is not settled for all prior choices.
  - Whether expert elicitation of priors (structured expert judgment) produces coherent and reproducible results in scientific practice is an open empirical question.

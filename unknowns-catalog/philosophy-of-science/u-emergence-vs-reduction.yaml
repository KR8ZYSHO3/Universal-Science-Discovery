id: u-emergence-vs-reduction
title: Under what conditions are higher-level scientific explanations genuinely autonomous rather than in-principle reducible to lower-level descriptions?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - metaphysics
  - cognitive-science
  - biology
summary: >
  Strong emergentism holds that some properties at higher organizational levels
  (consciousness, biological function, social dynamics) are ontologically irreducible
  to lower-level physical descriptions. Weak emergentism holds that higher-level
  descriptions are epistemically irreducible (too complex to derive) but not
  ontologically separate. The debate has consequences for whether cognitive science,
  ecology, and economics can identify autonomous causal laws or whether all scientific
  explanation must ultimately bottom out in physics. Multiple realizability arguments
  for autonomy and Kim's causal exclusion argument against it have not produced
  consensus.
systematic_gaps:
  - Whether multiple realizability (one functional type, many physical realizations) genuinely blocks reduction or is an artifact of imprecise typing is unresolved.
  - The causal exclusion problem (how can mental causes be efficacious if physical causes are sufficient?) has not been solved by existing compatibilist proposals.
  - Whether emergence in physics (renormalization group fixed points, phase transitions) is the same concept as biological or cognitive emergence is unclear.
last_reviewed: "2026-05-05"

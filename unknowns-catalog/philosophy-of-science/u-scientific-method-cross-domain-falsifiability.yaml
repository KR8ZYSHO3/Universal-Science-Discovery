id: u-scientific-method-cross-domain-falsifiability
title: >
  What are the necessary and sufficient conditions for a cross-domain structural
  analogy to constitute a genuinely falsifiable scientific prediction, rather than
  a post hoc descriptive metaphor, and how should Bayesian confirmation theory
  quantify the epistemic contribution of each independent domain confirmation?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - mathematics
  - information-theory
summary: >
  Cross-domain bridges (structural analogies between fields) vary enormously in
  epistemic quality: some generate novel testable predictions confirmed by experiment
  (e.g. the thermodynamics-information theory bridge predicting Maxwell's demon
  resolution via Landauer's principle), while others are purely descriptive metaphors
  that cannot in principle be refuted (e.g. calling market crashes "avalanches").
  A rigorous framework for assessing bridge falsifiability — distinguishing progressive
  bridges (Lakatos) from merely suggestive ones — does not exist. Bayesian confirmation
  theory offers a path: the likelihood ratio P(data|bridge true)/P(data|bridge false)
  quantifies confirmation strength per observation, but specifying the alternative
  hypothesis for a structural analogy is non-trivial. Key open question: what is
  the minimum set of novel cross-domain predictions a bridge must make, and what
  fraction must be confirmed, before the bridge merits "established" status?
systematic_gaps:
  - No formal operational definition of bridge falsifiability exists in the
    philosophy of science literature.
  - Bayesian confirmation quantification for structural analogies requires specifying
    a prior over possible analogy depths — this prior has not been formally elicited.
  - The distinction between progressive and degenerative bridges (Lakatos) has not
    been operationalised into measurable criteria applicable to USDR bridges.
related_bridges:
  - b-scientific-method-epistemological-foundations
last_reviewed: "2026-05-06"

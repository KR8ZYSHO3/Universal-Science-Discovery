id: u-bayesian-convergence-prior-dependence
title: >
  How strongly do Bayesian posterior convergence rates depend on the choice
  of prior in finite-sample scientific inference, and when does prior
  sensitivity violate the practical dissolution of Hume's problem of induction?
status: open
priority: medium
disciplines:
  - statistics
  - philosophy-of-science
  - probability-theory
  - epistemology
summary: >
  Doob's consistency theorem guarantees posterior convergence to the truth
  asymptotically (n → ∞) under Cromwell's rule. But in practice, the
  convergence rate depends critically on the prior, and for finite scientific
  datasets the prior can dominate the posterior. This is the practical residue
  of Hume's problem: not "will induction eventually work?" (yes, by Doob) but
  "how much data do we need, and does the answer depend on our priors?".

  Key open questions:
  1. For typical scientific hypotheses with k free parameters, what is the
     minimum sample size n* such that the posterior is within ε of the truth
     regardless of the prior (within the class of priors satisfying Cromwell)?
  2. How does the Jeffreys prior (invariant, maximum-entropy prior) compare
     to informative priors in terms of convergence rate, particularly for
     cosmological or clinical hypotheses where data is scarce?
  3. When Bayesian model selection (Bayes factors) is used for theory choice,
     what prior on model parameters leads to the most accurate long-run
     selection, and is there a minimax-optimal prior?
  4. Does the Solomonoff universal prior (p(H) ∝ 2^{-K(H)}) provide a
     practical resolution of the prior specification problem, or does it
     introduce new undecidability problems (K is not computable)?
systematic_gaps:
  - Formal analysis of convergence rates for realistic scientific model
    classes (time series, regression, structural equation models) is largely
    confined to the theoretical statistics literature, inaccessible to
    practising scientists
  - Empirical studies of prior sensitivity in published Bayesian meta-analyses
    (psychology, medicine) show large sensitivity in 30-50% of cases, but
    systematic documentation is lacking
  - The connection between Doob consistency and Solomonoff induction (both
    resolve Hume) is rarely made explicit in either statistics or philosophy

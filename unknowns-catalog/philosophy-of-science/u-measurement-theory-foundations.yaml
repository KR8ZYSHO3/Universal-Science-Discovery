id: u-measurement-theory-foundations
title: What is the ontological status of measurement scales, and under what conditions do psychometric measurements quantify genuine psychological attributes?
status: open
priority: medium
disciplines:
  - philosophy-of-science
  - measurement-theory
  - psychology
  - metascience
summary: >
  Representational measurement theory (Krantz, Luce, Suppes) provides axiomatic
  conditions under which a homomorphism from empirical to numerical relational
  structures is meaningful. Physical quantities (length, mass) satisfy these axioms.
  Most psychological measurements (IQ, personality traits, attitudes) do not satisfy
  the necessary axioms (additivity, concatenation operations) yet are treated as
  interval scales. Rasch models and item response theory provide formal frameworks
  but require untestable axioms. Whether psychology measures genuine continuous
  quantities or merely useful ordinal summaries is the measurement theory problem
  in social science.
systematic_gaps:
  - The axiomatic conditions for psychological measurement (conjoint measurement) have been tested empirically in fewer than 20 studies.
  - The relationship between construct validity (a psychological concept) and the representational theory of measurement (a formal concept) has not been systematically specified.
  - Whether the success of psychometric prediction (IQ predicting income) implies that IQ is a genuine quantity is a contested philosophical inference.
last_reviewed: "2026-05-05"

id: u-paradigm-shift-prediction
title: Are Kuhnian paradigm shifts predictable from anomaly accumulation patterns, and can science-of-science methods detect pre-revolutionary conditions?
status: open
priority: medium
disciplines:
  - philosophy-of-science
  - metascience
  - science-studies
  - complex-systems
summary: >
  Kuhn's Structure of Scientific Revolutions describes paradigm shifts as sudden
  qualitative transitions in which the dominant theoretical framework is replaced
  following anomaly accumulation and crisis. Whether these transitions are detectable
  in advance from bibliometric signals (citation diversity, cross-disciplinary borrowing,
  anomaly frequency in the literature) is an open empirical question. Science-of-science
  approaches now have access to large-scale citation networks and paper texts, but
  retrospective identification of paradigm shifts does not validate predictive models.
systematic_gaps:
  - No prospective method has been validated for predicting field-level paradigm shifts before they occur.
  - The operationalization of "anomaly" in a scientific literature is not standardized; different operationalizations give different historical narratives.
  - Whether Kuhnian revolutionary science is genuinely distinct from normal cumulative science, or is simply rapid normal science, is contested in the science studies literature.
last_reviewed: "2026-05-05"

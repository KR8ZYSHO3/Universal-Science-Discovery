id: u-citizen-science-quality
title: Under what conditions does citizen science generate data of sufficient quality for peer-reviewed scientific conclusions?
status: open
priority: medium
disciplines:
  - metascience
  - philosophy-of-science
  - science-policy
summary: >
  Citizen science projects (Galaxy Zoo, eBird, Zooniverse, iNaturalist) engage
  millions of volunteers in data collection, annotation, and pattern recognition.
  Data quality varies enormously with task complexity, volunteer expertise, and
  validation design. Some citizen science projects have produced high-quality data
  validated against expert benchmarks; others show systematic biases from observer
  preference, geographic bias, and varying skill levels. What project design features
  (redundancy, gamification, training, quality filters) reliably produce scientific-
  grade data is an open empirical question.
systematic_gaps:
  - Systematic comparisons of citizen science and professional data quality use different standards for "quality" that are not always comparable.
  - The geographic and demographic biases of citizen science participation (urban, English-speaking, educated volunteers) have not been fully characterized for their effects on scientific conclusions.
  - Long-term volunteer retention and skill development curves are poorly characterized, affecting quality predictions for ongoing projects.
last_reviewed: "2026-05-05"

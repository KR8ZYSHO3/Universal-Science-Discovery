id: u-open-science-incentives
title: What incentive structures and institutional reforms would sustainably increase open data sharing, preregistration, and replication in science?
status: open
priority: high
disciplines:
  - metascience
  - philosophy-of-science
  - science-policy
  - behavioral-economics
summary: >
  Open science practices (data/code sharing, preregistration, preprints, registered
  reports) have grown substantially since 2012 but remain minority practices in most
  fields. Barriers include competitive concerns about being scooped, effort costs,
  lack of perceived credit, and misaligned institutional incentives that reward publications
  over rigor. Mandates from funders (NIH, ERC) and journals have increased sharing
  rates but compliance is uneven and often nominal (shared data is often unusable).
  Which combination of carrots (badges, citations, grants) and sticks (mandates, penalties)
  produces durable behavioral change is poorly tested empirically.
systematic_gaps:
  - Field-level comparisons of open science adoption rates are confounded by disciplinary culture, data sensitivity, and funding source.
  - Whether preregistration adoption increases replication rates at the field level (not just within individual studies) has not been demonstrated.
  - The effect of data sharing mandates on the quality (usability, completeness) vs. quantity of shared data has not been measured.
last_reviewed: "2026-05-05"

id: u-reproducibility-crisis-causes
title: What are the root causes of the reproducibility crisis across sciences, and what interventions reliably improve replication rates?
status: open
priority: critical
disciplines:
  - philosophy-of-science
  - metascience
  - statistics
  - psychology
summary: >
  Large-scale replication projects (Reproducibility Project: Psychology 2015, Social
  Science Replication Project 2018, Many Labs) found that 40–60% of published findings
  in psychology and social sciences do not replicate at conventional significance thresholds.
  Proposed causes include underpowered studies, p-hacking and HARKing (hypothesizing
  after results known), publication bias, researcher degrees of freedom, and incentive
  structures rewarding novelty over accuracy. Whether the crisis is primarily
  methodological (bad statistics), sociological (bad incentives), or inherent to
  studying high-variance phenomena (small true effect sizes) is not resolved.
systematic_gaps:
  - Replication rates vary widely by field and subfield; what predicts replication success (effect size, sample size, prediction market price) is only partially understood.
  - Whether preregistration eliminates or merely reduces QRP (questionable research practices) has not been tested with sufficient statistical power.
  - The optimal balance between exploratory and confirmatory research in a scientific discipline is not formally characterized.
last_reviewed: "2026-05-05"

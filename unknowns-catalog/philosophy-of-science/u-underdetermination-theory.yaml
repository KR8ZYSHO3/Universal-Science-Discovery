id: u-underdetermination-theory
title: Does the underdetermination of theory by evidence imply that scientific theory choice is inevitably non-rational?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - epistemology
  - logic
summary: >
  The Duhem-Quine thesis holds that any theory can be maintained in the face of
  recalcitrant evidence by adjusting auxiliary hypotheses. Strong underdetermination
  (Quine) holds that multiple incompatible theories are always equally consistent with
  all possible evidence; weak underdetermination holds only that current evidence does
  not uniquely determine theory. If strong underdetermination is true, theory choice
  must be partly determined by non-evidential factors (simplicity, coherence, pragmatics),
  threatening scientific realism. Whether virtues like simplicity and unification are
  genuinely truth-tracking or merely pragmatic is unresolved.
systematic_gaps:
  - The formal version of strong underdetermination has been questioned (empirically equivalent theories may be logically related), but no definitive refutation exists.
  - Whether theoretical virtues (parsimony, unification) are a priori or empirically grounded features of good theories is not resolved.
  - The relationship between underdetermination and the success of scientific realism (the no-miracles argument) has not been made formally rigorous.
last_reviewed: "2026-05-05"

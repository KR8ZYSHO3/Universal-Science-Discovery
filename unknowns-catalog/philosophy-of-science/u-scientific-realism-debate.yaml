id: u-scientific-realism-debate
title: Should we believe that successful scientific theories are approximately true descriptions of unobservable entities, or merely empirically adequate?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - epistemology
  - metaphysics
summary: >
  Scientific realists argue that the success of science would be a miracle if our
  best theories were not approximately true about unobservable entities (electrons,
  quarks, fields). Anti-realists (van Fraassen's constructive empiricism) argue we
  should believe only that theories are empirically adequate—saving the phenomena.
  The pessimistic meta-induction (past successful theories are now abandoned, so
  current ones likely will be too) and the structural realist response (structure
  is preserved through theory change even if ontology changes) have not been resolved.
  The debate has direct implications for how scientists should interpret their models
  of unobservable structures.
systematic_gaps:
  - The structural realist position faces the "Newman problem"—that structure alone, without intrinsic properties, is trivially satisfiable.
  - The no-miracles argument has not been formalized in a way that survives the base-rate problem from Bayesian epistemology.
  - Whether approximate truth is a coherent concept for theories involving radical ontological discontinuity (e.g., classical to quantum) is unresolved.
last_reviewed: "2026-05-05"

id: u-demarcation-problem
title: What is the correct criterion for demarcating science from non-science, and is a universal criterion possible?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - epistemology
  - science-studies
summary: >
  Popper's falsifiability criterion excludes well-accepted sciences (historical sciences,
  cosmology) and admits pseudosciences that can be stated as falsifiable claims. The
  logical empiricist verificationism criterion is too restrictive. No subsequent proposal
  (Lakatos's progressive research programs, Kuhn's normal science communities,
  Laudan's problem-solving) has achieved consensus. The demarcation problem has
  practical stakes: courts must decide if intelligent design is science, funding
  agencies must evaluate fringe proposals, and public trust in scientific consensus
  depends on a clear science/non-science boundary that philosophers cannot currently provide.
systematic_gaps:
  - No proposed criterion simultaneously handles historical sciences, mathematical physics, and clearly pseudoscientific fields without counterexamples.
  - The relationship between demarcation criteria and scientific methodology (replication, peer review) is not formally specified.
  - Whether demarcation is a single problem or a family of distinct questions (epistemic, sociological, legal) has not been settled.
last_reviewed: "2026-05-05"

id: u-scientific-progress-measure
title: How should scientific progress be measured, and do citation counts, replication rates, or predictive accuracy provide valid progress indicators?
status: open
priority: medium
disciplines:
  - metascience
  - philosophy-of-science
  - science-policy
summary: >
  Competing accounts of scientific progress include: verisimilitude (truth approximation),
  problem-solving efficiency (Laudan), empirical success rate, technological application
  success, and consensus stability. Bibliometric proxies (citation counts, h-index,
  impact factor) are operationally available but misalign with all theoretical accounts.
  The fact that citation counts can be gamed, that self-citations inflate metrics, and
  that highly-cited papers are sometimes wrong, while low-citation papers can be
  foundationally important, makes progress measurement an open normative and empirical problem.
systematic_gaps:
  - No study has directly compared theoretical progress accounts against empirical trajectories of specific scientific fields over century-long timescales.
  - The relationship between short-term replication rates and long-term theoretical progress has not been modeled.
  - Whether technological application success (engineering from physics, drugs from biochemistry) is a valid proxy for theoretical progress in basic science is philosophically contested.
last_reviewed: "2026-05-05"

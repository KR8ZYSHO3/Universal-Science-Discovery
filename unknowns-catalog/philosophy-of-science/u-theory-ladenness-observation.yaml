id: u-theory-ladenness-observation
title: In what sense and to what degree are scientific observations theory-laden, and does this threaten the independence of evidence from theory?
status: open
priority: medium
disciplines:
  - philosophy-of-science
  - epistemology
  - cognitive-science
summary: >
  Norwood Russell Hanson argued that "all seeing is seeing-as"—observations are
  constituted by theoretical concepts, not theory-neutral sense data. If this is true
  strongly, then competing theories cannot be evaluated against shared observational
  evidence, threatening the empirical basis of theory choice. More nuanced positions
  distinguish semantic from epistemic theory-ladenness, or argue that background
  theories can be held fixed during evidence collection. The degree to which
  perceptual learning, instrument design, and data reduction pipeline choices
  compromise observational independence is an active topic in philosophy of experiment.
systematic_gaps:
  - Cognitive science evidence on perceptual learning shows top-down theory effects on perception, but their magnitude in expert scientific observation is unmeasured.
  - Whether the theory-ladenness of observation is problematic for inter-theory comparison depends on whether the "contaminating" theories are shared across the competing paradigms.
  - The theory-ladenness of computational data processing pipelines (astronomy image reduction, neuroscience fMRI preprocessing) has not been analyzed philosophically.
last_reviewed: "2026-05-05"

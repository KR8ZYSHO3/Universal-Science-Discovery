id: u-model-selection-validity
title: Are AIC, BIC, and MDL genuinely measuring predictive accuracy or model simplicity, and when do they give misleading guidance?
status: open
priority: medium
disciplines:
  - philosophy-of-science
  - statistics
  - machine-learning
  - metascience
summary: >
  Akaike Information Criterion (AIC), Bayesian Information Criterion (BIC), and
  Minimum Description Length (MDL) are widely used for model selection, but they
  target different things: AIC estimates predictive accuracy of the generating model,
  BIC estimates posterior probability of the true model (Bayesian consistency), MDL
  estimates compression efficiency. They give different answers in finite samples and
  for misspecified models. Their use as general-purpose evidence quantifiers outside
  their theoretical assumptions—common in ecology, psychology, and medicine—may be
  epistemically unjustified. Whether there is a unified information-theoretic basis
  for all three criteria is an open question.
systematic_gaps:
  - The performance of AIC/BIC in model selection degrades in unknown ways when the true generating model is not in the candidate set.
  - The relationship between BIC and Bayes factors (which BIC approximates) breaks down in cases where BIC is routinely applied.
  - Whether AIC or BIC is more appropriate for a given scientific question has not been formalized beyond the asymptotic theory.
last_reviewed: "2026-05-05"

id: u-publication-bias-correction
title: Can publication bias be corrected post-hoc in meta-analyses, and what methods are valid under realistic distributions of true effects?
status: open
priority: high
disciplines:
  - metascience
  - statistics
  - philosophy-of-science
summary: >
  Publication bias—the tendency to publish statistically significant results and file-
  drawer null results—inflates effect size estimates in meta-analyses. Methods like
  trim-and-fill, PET-PEESE, and p-curve have been proposed to correct for this, but
  each assumes a specific model of the selection process. When those assumptions are
  violated (heterogeneous effects, selective reporting rather than file-drawering,
  mixture distributions of true effects), the corrections can make estimates worse.
  Whether any meta-analytic correction can reliably recover the true effect in
  realistic publishing scenarios is an open methodological question.
systematic_gaps:
  - Simulation studies of bias correction methods use idealized distributions; performance under realistic heterogeneous-effect conditions is unknown.
  - The selection function for publication (exactly what combination of p-value, sample size, and novelty drives publication) has not been empirically characterized for most fields.
  - Registration-based meta-analyses (including all preregistered studies regardless of results) are too rare to estimate the magnitude of bias in existing literature.
last_reviewed: "2026-05-05"

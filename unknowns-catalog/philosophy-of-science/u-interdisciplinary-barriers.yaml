id: u-interdisciplinary-barriers
title: What are the structural and epistemic barriers to effective interdisciplinary collaboration, and how can they be systematically reduced?
status: open
priority: medium
disciplines:
  - science-studies
  - philosophy-of-science
  - science-policy
  - metascience
summary: >
  Many important scientific problems (climate change, pandemic preparedness, consciousness)
  span multiple disciplines, yet interdisciplinary research is often less productive
  than expected, produces lower-citation papers, and is harder to publish and fund.
  Barriers include: incompatible vocabularies, different methodological standards, the
  challenge of evaluating cross-disciplinary work in single-discipline review, career
  incentives that reward disciplinary depth, and the difficulty of building shared
  conceptual frameworks. Whether these barriers are irreducible features of disciplinary
  expertise or tractable institutional problems is unresolved.
systematic_gaps:
  - Controlled comparisons of interdisciplinary vs. monodisciplinary research quality and impact are confounded by selection effects (harder problems are more likely to be studied interdisciplinarily).
  - The vocabulary translation problem between disciplines has not been formalized; no metric exists for cross-disciplinary conceptual distance.
  - Career outcome data for researchers who pursued interdisciplinary careers early vs. later are available but insufficiently analyzed.
last_reviewed: "2026-05-05"

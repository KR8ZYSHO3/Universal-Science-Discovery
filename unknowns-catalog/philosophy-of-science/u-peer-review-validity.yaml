id: u-peer-review-validity
title: Does peer review reliably filter low-quality and incorrect science, and what alternative gatekeeping mechanisms might perform better?
status: open
priority: high
disciplines:
  - metascience
  - philosophy-of-science
  - science-policy
summary: >
  Peer review is the primary quality gate for scientific publication, yet controlled
  experiments show reviewers agree only moderately (kappa ~0.2–0.4), many fraudulent
  or fabricated papers pass review, and review outcomes correlate with author prestige
  and institutional affiliation. Post-publication correction is slow and retractions
  rare. Alternative or complementary mechanisms—registered reports, open review,
  cascade review, preprints with rapid community feedback—have been proposed but
  not evaluated at scale. Whether the peer review system's flaws are intrinsic to
  expert judgment under uncertainty or are fixable institutional failures is unresolved.
systematic_gaps:
  - The inter-rater reliability of peer review has been measured in only a handful of controlled experiments, mostly in biomedicine.
  - Whether high-impact journals accept more errors than lower-tier journals (due to novelty bias) has not been systematically measured across fields.
  - The counterfactual quality of papers that were rejected and then published elsewhere has not been tracked.
last_reviewed: "2026-05-05"

id: u-preregistration-effectiveness
title: Does preregistration of hypotheses and analysis plans improve the validity of scientific conclusions, and what are its limits?
status: open
priority: high
disciplines:
  - metascience
  - philosophy-of-science
  - statistics
summary: >
  Preregistration—specifying hypotheses, design, and analysis plan before data
  collection—aims to separate confirmatory from exploratory analysis, reducing
  flexibility that enables p-hacking. Registered reports (peer review before data
  collection, with publication guaranteed regardless of results) are the strongest
  form. Early evidence suggests preregistered studies have smaller effect sizes and
  lower replication rates than non-preregistered studies in the same area. However,
  whether preregistration improves the validity of individual findings (not just
  reduces false positives) and whether it is compatible with exploratory scientific
  discovery is debated.
systematic_gaps:
  - The effect of preregistration on effect size inflation has been measured in psychology but not across all sciences.
  - Whether preregistration reduces genuine discovery (by over-constraining analysis) or only reduces false positives has not been separated empirically.
  - Compliance with preregistration plans is imperfect; the rate of undisclosed deviations from preregistered analyses is unknown.
last_reviewed: "2026-05-05"

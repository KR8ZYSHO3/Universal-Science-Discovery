id: u-scientific-consensus-formation
title: What are the epistemic and social mechanisms by which scientific consensus forms, and under what conditions can consensus be mistaken?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - science-studies
  - sociology
  - epistemology
summary: >
  Scientific consensus—the settled agreement of a research community on empirical
  claims—is central to science's authority but is not infallible. Historical examples
  include the consensus against continental drift (reversed by plate tectonics), the
  consensus for the caloric theory of heat, and the recent debates around dietary fat
  and cardiovascular disease. Formal models (Bayesian updating, deliberation, social
  learning) can explain how consensus forms under idealized conditions. What makes
  real consensus reliable or unreliable—the role of funding sources, ideological
  conformity, authority asymmetry, and adversarial industry actors—is an empirical
  question with normative implications for how public debates about consensus should
  be conducted.
systematic_gaps:
  - No prospective study has tracked the formation of scientific consensus in a field from initial evidence to settled agreement.
  - The conditions under which non-expert consensus trackers (journalists, policymakers) reliably identify genuine vs. manufactured consensus are not well characterized.
  - Formal models of consensus formation do not incorporate power asymmetries (senior scientist authority, prestige journal gatekeeping) that are empirically important.
last_reviewed: "2026-05-05"

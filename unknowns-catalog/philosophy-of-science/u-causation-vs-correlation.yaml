id: u-causation-vs-correlation
title: Under what observational study designs and statistical assumptions can causal conclusions be reliably drawn without experimental intervention?
status: open
priority: high
disciplines:
  - philosophy-of-science
  - statistics
  - epidemiology
  - causal-inference
summary: >
  Pearl's do-calculus and potential outcomes frameworks (Rubin) have formalized
  causal inference from observational data under explicit assumptions (no unmeasured
  confounding, correct causal structure). In practice, these assumptions cannot be
  verified from data alone. Sensitivity analysis, instrumental variables, regression
  discontinuity, and difference-in-differences methods relax assumptions but introduce
  their own. The reliability of causal conclusions from large observational studies
  (compared to RCT benchmarks) is field-specific; observational cardiovascular
  epidemiology has performed poorly while some economic natural experiments have held up.
  What structural features of a study design guarantee reliable causal inference is
  an open methodological question.
systematic_gaps:
  - The predictive validity of observational causal estimates against RCT results has been assessed in only a few fields, and the generalization is contested.
  - Sensitivity analyses for unmeasured confounding (E-values, Rosenbaum bounds) are rarely reported even when observational studies are published in top journals.
  - Whether large sample sizes in observational studies compensate for unmeasured confounding or merely reduce sampling uncertainty around biased estimates is not systematically evaluated.
last_reviewed: "2026-05-05"

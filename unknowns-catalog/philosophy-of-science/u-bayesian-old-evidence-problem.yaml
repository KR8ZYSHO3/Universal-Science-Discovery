id: u-bayesian-old-evidence-problem
title: How can the Bayesian account of confirmation handle the old evidence problem — where evidence known prior to hypothesis formulation (like Mercury's perihelion for GR) cannot update posteriors — without abandoning either Bayesianism or the historical practice of science?
status: open
priority: medium
disciplines:
  - philosophy-of-science
  - statistics
  - Bayesian-inference
  - epistemology
  - history-of-science
summary: >
  Glymour (1980) posed the old evidence problem: the Bayesian condition of
  confirmation — P(H|E) > P(H) — fails when E is already known. If P(E) = 1
  (certainty), then Bayes' theorem gives P(H|E) = P(H)/P(E) · P(E|H) = P(H)
  if P(E|H) = P(E) = 1. So old evidence cannot confirm. But historically,
  Mercury's anomalous perihelion precession (observed decades before Einstein)
  was considered decisive evidence for general relativity. Similarly, the Michelson-
  Morley null result (1887) confirmed special relativity (1905). Proposed solutions:
  (1) Counterfactual Bayesianism: ask "what would P(H|E) have been if E were not
  already known?" — but this counterfactual is ill-defined. (2) Incremental
  confirmation via Bayes factor: P(E|H)/P(E|¬H) > 1 even when P(E) = 1, if we
  interpret the likelihood of H producing E. (3) Dynamic Bayesianism: update P(E|H)
  when you learn H explains E, not when you learn E. None of these solutions is
  universally accepted, and the problem is particularly acute for theories that
  are designed to explain known phenomena (much of physics and economics).
systematic_gaps:
  - No formal Bayesian framework provides a complete solution to the old evidence problem that (a) is consistent with standard probability theory, (b) correctly handles the Mercury-GR case, and (c) does not require subjective counterfactual probability assignments.
  - The relationship between the old evidence problem and p-hacking / post-hoc hypothesis formation in science has not been formally analyzed — scientists often design hypotheses to fit known data, making all their evidence "old" in Glymour's sense.
  - Whether incremental confirmation measures (Bayes factor, likelihood ratio) provide a scientifically adequate replacement for the posterior update is contested philosophically and has not been empirically validated against scientific practice.
suggested_hypotheses:
  - >
    The old evidence problem is resolved by adopting a two-stage framework —
    confirmation of H by E requires both (1) likelihood ratio P(E|H)/P(E|¬H) > 1
    (computable even with P(E)=1) and (2) independent novel prediction confirmed by H —
    the conjunction of backward-looking and forward-looking confirmation.

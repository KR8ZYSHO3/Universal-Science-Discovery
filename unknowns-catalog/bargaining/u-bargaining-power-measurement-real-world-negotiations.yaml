id: u-bargaining-power-measurement-real-world-negotiations
title: >
  How can bargaining power be empirically measured in real-world negotiations where
  the disagreement point, the feasible set, and outside options are unobservable,
  and do observed outcomes match Nash or Rubinstein equilibrium predictions?
status: open
priority: medium
disciplines:
  - economics
  - game-theory
  - labor-economics
  - negotiation-science
summary: >
  Bargaining theory (Nash, Rubinstein) provides precise predictions for negotiated
  outcomes given the feasible set and disagreement point. Empirical testing requires
  knowing these unobservables: labor negotiations involve private information about
  the firm's profit function, union's strike fund, and worker outside options that
  are not observable to researchers. Field experiments (Caldwell 2024) and
  quasi-experimental variation in outside options (labor market tightness, UI
  benefit changes) provide identification, but results are mixed — some studies
  find Nash bargaining holds (Svejnar 1986 for unions), others find systematic
  deviations. The question of whether the Nash axioms (particularly IIA) or
  Rubinstein's subgame perfection describe actual negotiation behavior is open.
systematic_gaps:
  - Large-scale empirical tests of Nash vs. Rubinstein bargaining predictions in
    real negotiations are rare; most evidence is from lab experiments with stakes
    unrepresentative of field negotiations.
  - The role of fairness norms and social preferences (inequity aversion) in
    determining bargaining outcomes above and beyond game-theoretic predictions
    has not been systematically decomposed.
  - International climate negotiation outcomes (Paris Agreement, Kyoto Protocol)
    have not been formally analyzed as Nash bargaining solutions.
related_bridges:

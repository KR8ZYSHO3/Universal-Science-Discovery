id: u-colloidal-glass-transition-mode-coupling-breakdown
title: >
  Why does mode-coupling theory (MCT) predict the colloidal glass transition at
  phi_MCT ~ 0.516 while experiments show phi_glass ~ 0.58-0.64, and what
  physical mechanism — activated hopping, cooperative rearrangements, or
  structural heterogeneity — controls the glass transition above phi_MCT?
status: open
priority: high
disciplines:
  - soft-matter
  - statistical-mechanics
  - condensed-matter-physics
  - colloid-science
summary: >
  Mode-coupling theory (MCT; Gotze 1991) predicts a dynamic arrest transition
  at phi_MCT ~ 0.516 for hard-sphere colloids, where the alpha-relaxation time
  diverges algebraically: tau_alpha ~ (phi_MCT - phi)^{-gamma}. However,
  experiments (van Megen & Pusey 1991) and simulations consistently show that
  hard-sphere colloids remain ergodic (albeit slowly relaxing) above phi_MCT ~ 0.516,
  with glass behaviour only appearing near phi ~ 0.58-0.64. MCT misses the
  activated hopping processes that dominate above phi_MCT: cooperative rearrangement
  of cage neighbours allows localised motion not captured by the mean-field density
  fluctuation formalism of MCT. Competing theories — RFOT (random first-order
  transition theory, Kirkpatrick-Thirumalai-Wolynes), ECNLE (extended coupled
  nonlinear Langevin equations, Schweizer), and dynamic facilitation theory
  (Chandler-Garrahan) — make different predictions for the growing dynamic
  lengthscale and non-Arrhenius relaxation above phi_MCT. The colloidal glass
  transition is experimentally accessible because particle positions can be tracked
  by confocal microscopy — single-particle resolution impossible in atomic glasses —
  making colloids a model system where theories can be stringently tested.
systematic_gaps:
  - Direct measurement of the dynamic lengthscale (point-to-set correlations, multi-point susceptibility chi_4) as a function of phi has not been done with sufficient statistics to distinguish RFOT from facilitation theory.
  - The crossover from MCT-like power-law relaxation to activated (stretched-exponential) dynamics at phi ~ phi_MCT has not been characterised with particle-resolved tracking at sufficient temporal resolution.
  - The effect of polydispersity (prevents crystallisation in experiments but absent from MCT theory) on the glass transition phi_glass has not been systematically isolated from the dynamic arrest mechanism.
suggested_hypotheses:
  - >
    The dynamic heterogeneity lengthscale xi_4 in hard-sphere colloids grows as
    xi_4 ~ (phi_glass - phi)^{-nu} with nu ~ 0.5-1.0 above phi_MCT,
    distinguishable between RFOT (nu ~ 0.5) and facilitation theory (nu ~ 1.0)
    predictions by confocal microscopy 4-point correlation function measurements.

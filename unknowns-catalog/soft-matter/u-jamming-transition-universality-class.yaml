id: u-jamming-transition-universality-class
title: "Does the jamming transition in frictionless sphere packings belong to the same universality class as mean-field percolation, and how do friction, asphericity, and polydispersity alter the critical exponents and diverging length scale near phi_J?"
status: open
priority: high
disciplines:
  - soft-matter
  - statistical-physics
  - condensed-matter-physics
summary: >
  Numerical and theoretical studies of frictionless monodisperse sphere packings suggest mean-field critical
  exponents (nu = 0.5, gamma = 1) near the jamming transition, but experimental systems with friction and
  polydispersity show deviating exponents. Key unknowns: (1) does a rigorous renormalization group analysis
  confirm the mean-field universality class with no corrections to scaling, (2) how does microscopic friction
  (tangential force transmission) alter the universality class or introduce new universality classes, and
  (3) is there a single jamming phase diagram (Liu-Nagel) that encompasses thermal glass transition, colloidal
  gelation, and dry granular jamming, or are these distinct universality classes?
systematic_gaps:
  - Experimental measurement of the diverging length scale xi in 3D granular packings near phi_J is technically challenging due to boundary effects
  - Simulation studies are mostly 2D or use frictionless spheres; realistic 3D frictional polydisperse packings require larger computational effort
  - The connection between jamming and the glass transition in thermally activated systems is not resolved by current field-theoretic approaches
related_bridges:
  - b-granular-matter-jamming-transition
last_reviewed: "2026-05-07"

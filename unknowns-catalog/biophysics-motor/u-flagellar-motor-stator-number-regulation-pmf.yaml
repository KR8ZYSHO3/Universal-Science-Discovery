id: u-flagellar-motor-stator-number-regulation-pmf
title: >
  How does the flagellar motor dynamically regulate the number of active MotA/MotB
  stator units in response to proton motive force, load, and environmental conditions
  — and what is the mechanochemical mechanism of stator incorporation and release?
status: open
priority: medium
disciplines:
  - biophysics
  - microbiology
  - systems-biology
summary: >
  The flagellar motor is not a fixed machine: the number of active stator units
  (MotA/MotB pairs) in the motor varies from 1 to ~11 depending on conditions.
  Stators are dynamically exchanged (t₁/₂ ~ 30s in E. coli under load). Load
  regulates stator number — high load (viscous medium) → more stators recruited
  → higher torque at expense of speed. Proton motive force modulates stator
  activity — low PMF reduces stator efficiency. The molecular mechanism of stator
  incorporation (how MotB C-terminus anchors to peptidoglycan) and release (what
  triggers departure) is not fully characterized. Whether stator number is regulated
  by a feedback mechanism sensing torque, PMF, or CheY-P directly is unknown.
systematic_gaps:
  - The molecular identity of the peptidoglycan-binding domain of MotB and how
    conformational changes open the proton channel upon assembly are not fully resolved.
  - Whether stator number regulation responds directly to PMF (sensed by MotB) or
    to torque (sensed by FliG or C-ring) has not been determined.
  - Single-molecule experiments tracking individual stator incorporation events in
    real-time with simultaneous torque measurement have not been performed.
related_bridges:
  - b-flagellar-motor-rotary-machines
last_reviewed: "2026-05-07"

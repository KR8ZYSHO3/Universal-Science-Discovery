id: u-aerosol-cloud-nucleation-uncertainty
title: "What are the dominant sources of uncertainty in predicting global cloud condensation nucleus (CCN) concentrations from aerosol precursor emissions, and how do organic aerosol formation pathways and new particle formation rates limit climate model accuracy for aerosol indirect forcing?"
status: open
priority: critical
disciplines:
  - atmospheric-science
  - chemistry
  - climate-science
summary: >
  Aerosol indirect forcing (cloud brightening from CCN enhancement) remains the largest uncertainty in
  anthropogenic climate forcing assessments. The path from SO2/VOC emissions to CCN involves new particle
  formation (NPF), condensational growth, and CCN activation — each with large uncertainties.
  Key unknowns: (1) what controls the nucleation rate of new particles from sulfuric acid, ammonia, and organic
  vapors in the free troposphere, (2) how much secondary organic aerosol (SOA) forms from biogenic VOCs under
  anthropogenic pollution conditions (the "anthropogenic enhancement" of biogenic SOA), (3) can aerosol-cloud
  microphysical parameterizations in climate models be constrained by satellite cloud effective radius observations
  to reduce indirect forcing uncertainty?
systematic_gaps:
  - New particle formation in the upper free troposphere is difficult to measure directly and is undersampled by aircraft campaigns
  - The nucleation mechanism for ternary H2SO4-NH3-H2O-organics systems remains controversial with competing kinetic vs thermodynamic models
  - Cloud drop number concentration responds nonlinearly to CCN so global average CCN-forcing relationships are not straightforwardly applicable
related_bridges:
  - b-aerosol-nucleation-cloud-formation
last_reviewed: "2026-05-07"

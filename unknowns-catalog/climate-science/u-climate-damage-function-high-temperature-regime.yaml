id: u-climate-damage-function-high-temperature-regime
title: >
  What is the functional form of economic damages from climate change at
  global temperature anomalies above 3°C, where no modern empirical analog
  exists, and how should tipping point cascades, non-market damages, and
  distributional equity be incorporated into the damage function?
status: open
priority: critical
disciplines:
  - climate-science
  - environmental-economics
  - atmospheric-physics
  - welfare-economics
summary: >
  Integrated Assessment Models (IAMs) use damage functions D(T) — typically
  quadratic D = aT² or low-degree polynomial — to convert temperature increases
  into economic losses as a fraction of GDP. These functions are calibrated from
  cross-sectional economic-climate regressions (e.g., Dell et al. 2012, Burke
  et al. 2015) and sector-specific meta-analyses (IPCC WGII).

  However, for temperature anomalies above 3-4°C (which are plausible under
  current emission trajectories), there are no modern empirical analogs at the
  global scale. The Pliocene (3-4°C warmer, ~3 million years ago) had sea levels
  15-20m higher, but no complex industrial economy to observe damage to.

  Key problems: (1) Current damage functions omit most non-market damages
  (biodiversity, conflict, cultural heritage, health externalities). Howard &
  Sterner (2017) find true damages are 2-3× higher than standard IAM estimates.
  (2) Climate tipping points (AMOC collapse, Arctic ice loss, Amazon dieback,
  permafrost methane) create non-linear jumps in damage — not captured by smooth
  polynomial functions. (3) Weitzman's "dismal theorem" shows that if the
  probability distribution of climate sensitivity has a fat tail, expected
  damages are infinite for any finite discount rate — making standard cost-benefit
  analysis ill-defined.
systematic_gaps:
  - Empirical damage estimates above 4°C warming from paleoclimate analogs
  - Integration of tipping point probabilities into IAM damage functions
  - Non-market damage quantification (biodiversity, human health, conflict)
  - Fat-tail treatment of climate sensitivity uncertainty in cost-benefit analysis
suggested_hypotheses:
  - h-scc-convex-damages-fat-tails
related_bridges:

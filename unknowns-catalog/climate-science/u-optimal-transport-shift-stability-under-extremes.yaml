id: u-optimal-transport-shift-stability-under-extremes
title: Do optimal-transport climate bias-correction maps remain stable under nonstationary
  extreme-event regimes?
status: open
priority: high
disciplines:
- climate-science
- statistics
- mathematics
summary: OT bias correction works well in retrospective settings, but its tail behavior
  under future nonstationary extremes is insufficiently constrained.
systematic_gaps:
- Sparse evaluation of OT methods on out-of-distribution extreme years.
- Limited comparison between monotone and entropic OT variants for extreme-tail fidelity.

id: u-rossby-wave-climate-tipping
title: Can Rossby wave dynamics amplified by Arctic warming trigger irreversible climate tipping points in mid-latitude weather patterns?
status: open
priority: high
disciplines:
  - climate-science
  - atmospheric-science
  - mathematics
  - physics
summary: >
  Arctic warming is proceeding 3-4 times faster than the global average (Arctic
  amplification), reducing the equator-to-pole temperature gradient that drives the
  jet stream. Reduced jet stream strength may amplify Rossby wave amplitude, leading
  to more persistent (quasi-stationary) wave patterns associated with extreme weather
  (heat waves, cold spells, droughts). The hypothesis that Arctic warming triggers
  a dynamical bifurcation in mid-latitude atmospheric circulation — a Hopf bifurcation
  from a zonal (smooth) flow to a strongly meridional (wavy) flow — is debated.
  Whether this constitutes an irreversible tipping point or a reversible sensitivity
  change is not resolved.
systematic_gaps:
  - The theoretical framework for when Arctic amplification causes a dynamical bifurcation (rather than a smooth change) in jet stream behaviour has not been established.
  - The connection between Rossby wave resonance (quasi-stationary waves) and extreme weather event frequency is statistically contested in the observational record.
  - Whether Arctic sea ice loss can produce irreversible changes to the Rossby wave dispersion relation or whether changes are reversible with sea ice recovery is unknown.
last_reviewed: "2026-05-05"

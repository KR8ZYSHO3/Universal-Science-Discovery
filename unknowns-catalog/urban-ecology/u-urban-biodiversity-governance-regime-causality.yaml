id: u-urban-biodiversity-governance-regime-causality
title: >
  Does polycentric urban governance causally increase urban biodiversity and
  ecosystem service delivery relative to centralised or fragmented governance,
  and what governance design features (scale-matching, monitoring, sanctions,
  polycentrism) drive differences in urban green infrastructure outcomes?
status: open
priority: medium
disciplines:
  - urban-ecology
  - governance-science
  - sustainability-science
  - political-science
summary: >
  Ostrom's SES framework predicts that polycentric governance (multiple overlapping
  decision centres at different scales) should outperform both centralised and
  fragmented governance for common-pool resource management including urban green
  infrastructure. Cross-city comparative studies (e.g., Nagendra & Ostrom 2012)
  show correlations between governance features and biodiversity outcomes, but
  causal identification is absent. Confounders include city wealth (wealthier cities
  invest more in both governance capacity and green infrastructure) and path
  dependency (historical green infrastructure layout determines current governance).
  The "luxury effect" — correlation between household income and urban tree canopy
  and bird diversity — further complicates interpretation by suggesting that
  economic inequality, not governance per se, drives biodiversity outcomes.
  Whether interventions that shift governance structure (e.g., neighbourhood-level
  green infrastructure stewardship programmes) causally increase biodiversity
  independent of investment level has not been tested with quasi-experimental designs.
systematic_gaps:
  - Quasi-experimental evaluation of urban governance regime changes (municipal boundary reorganisation, new community stewardship programmes) on biodiversity and ecosystem service delivery has not been conducted with adequate controls.
  - The interaction between income inequality (luxury effect) and governance quality on urban biodiversity has not been disentangled — whether governance quality mediates the income-biodiversity relationship is unknown.
  - Long-term monitoring of polycentric governance experiments (e.g., NYC Stewardship Network, London Urban Forest Partnerships) with before-after control-impact design is lacking.
suggested_hypotheses:
  - >
    Cities with >3 active neighbourhood-level green infrastructure stewardship
    programmes per km² show 25% higher urban tree canopy persistence over 10 years
    compared to matched cities with centralised parks management only, controlling
    for total green infrastructure investment — testable using remote sensing time
    series and governance database matched-pair analysis.
related_bridges:
  - b-urban-ecology-ses

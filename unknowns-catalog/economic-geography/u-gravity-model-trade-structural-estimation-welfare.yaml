id: u-gravity-model-trade-structural-estimation-welfare
title: >
  Can the gravity model of trade be structurally estimated with sufficient accuracy
  to calculate the welfare gains from trade agreements and optimal tariff structures,
  and what is the correct functional form for trade costs at different distance scales?
status: open
priority: medium
disciplines:
  - economics
  - economic-geography
  - international-trade
  - optimal-transport
summary: >
  The gravity equation T_{ij} = exp(δ_i + δ_j)·d_{ij}^{-γ} (Anderson-van Wincoop
  2003) has been structurally derived from CES preferences with iceberg trade costs.
  However, the structural parameters (trade cost elasticity γ, substitution elasticity
  σ, and the trade cost function τ_{ij}) are not consistently estimated across studies.
  Key debates: (1) Distance exponent γ has increased over time despite declining
  transport costs ("distance puzzle"). (2) Border effects are enormous (Anderson-van
  Wincoop estimate ~170% ad valorem equivalent cost for crossing the US-Canada border)
  — partially explained by non-tariff barriers. (3) Welfare gains from trade
  liberalization estimated from structural gravity range from 1-10% of GDP depending
  on assumptions. The connection to optimal transport (Galichon 2016) could provide
  tighter identification of welfare effects.
systematic_gaps:
  - The trade cost function τ_{ij} is not directly observable; structural gravity
    inverts it from trade flows, but identification requires strong assumptions
    about CES preferences that may not hold.
  - The distance puzzle (why gravity exponent on distance has increased despite
    lower transport costs) has no consensus explanation; information costs, trust,
    and supply chain complexity are candidates.
  - Welfare calculations from gravity are sensitive to the assumed trade elasticity
    (σ-1)γ; the range of plausible estimates implies factor of 3-5 uncertainty in
    welfare gains from any specific trade policy.
related_bridges:

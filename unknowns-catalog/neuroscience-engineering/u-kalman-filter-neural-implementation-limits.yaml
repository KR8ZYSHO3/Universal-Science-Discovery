id: u-kalman-filter-neural-implementation-limits
title: Under what conditions do cortical circuits implement variance-weighted prediction–correction
  equivalent to a Kalman gain, and when do they require nonlinear filtering?
status: open
priority: medium
disciplines:
- neuroscience
- engineering
- statistics
summary: Kalman-optimal computation is a clear benchmark, but empirical identification of
  process versus measurement noise—and time-varying gains—in behaving animals remains incomplete
  across modalities.
systematic_gaps:
- Joint estimation of forward-model drift and sensory reliability is rarely done with identifiability
  checks.
- Nonlinear dynamics in spiking networks may mimic Kalman-like updates only in local regimes.
suggested_hypotheses:
- h-sensory-cortex-implements-approximate-kalman-updates

id: u-computational-psychiatry-treatment-response-prediction
title: >
  Can computational phenotypes (learning rates, prior precision parameters) derived
  from brief computerised behavioural tasks predict individual antidepressant or
  antipsychotic treatment response before drug administration, enabling precision
  psychiatry prescribing?
status: open
priority: critical
disciplines:
  - neuroscience
  - psychiatry
  - engineering
  - statistics
summary: >
  Computational psychiatry has identified candidate biomarkers: reduced positive
  learning rate α⁺ in depression, elevated prior precision in psychosis. If these
  parameters can be estimated from short (20–30 minute) computerised tasks and
  used to prospectively predict treatment response (e.g. α⁺ predicts response to
  ketamine vs. SSRIs), they would enable precision prescribing that avoids the
  current trial-and-error antidepressant selection. Three barriers remain:
  (1) Test-retest reliability of computational parameter estimates is typically
  0.5–0.7 — sufficient for group differences but potentially insufficient for
  individual prediction; (2) The mapping between computational parameters and
  drug mechanism of action is correlational, not mechanistic — why ketamine
  rapidly restores α⁺ (via AMPA receptor potentiation?) is not proven;
  (3) No prospective randomised controlled trial has used a computational
  phenotype to guide medication selection and demonstrated improved outcomes
  vs. standard of care.
systematic_gaps:
  - No RCT using computational phenotype to guide antidepressant selection has
    been completed.
  - Test-retest reliability of learning rate parameters across weeks/months
    (the relevant clinical timescale) is not established.
  - The neurobiological mechanism linking α⁺ to synaptic plasticity (AMPA,
    NMDA, BDNF signalling) has not been causally demonstrated in humans.
related_bridges:

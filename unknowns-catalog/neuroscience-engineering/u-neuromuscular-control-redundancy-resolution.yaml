id: u-neuromuscular-control-redundancy-resolution
title: >
  How does the central nervous system resolve the redundancy problem in muscle
  coordination — the fact that any joint torque can be produced by infinitely
  many combinations of muscle activation levels — and does the nervous system
  optimise a single cost function or use task-dependent switching?
status: open
priority: high
disciplines:
  - neuroscience
  - engineering
  - biomechanics
summary: >
  The human musculoskeletal system is highly redundant: most joints are spanned by
  more muscles than the minimum needed to produce all required torques. For example,
  the elbow is controlled by at least 6 muscles that together can generate any
  desired flexion/extension and supination/pronation torque, but there are infinitely
  many activation combinations that produce the same net torque. The minimum-jerk,
  minimum-torque-change, minimum-muscle-activation, minimum-fatigue, and impedance
  optimisation hypotheses all predict different solutions. EMG studies show that
  activation patterns are highly consistent across repetitions within an individual
  but differ systematically between individuals — suggesting a learned optimal
  solution that may vary with individual musculoskeletal geometry. The relationship
  between the Henneman size principle (motor unit recruitment order) and the
  across-muscle redundancy resolution is not understood: are the two problems solved
  simultaneously by a single hierarchical controller or by separate modules?
systematic_gaps:
  - No ground truth measurement of all muscle forces simultaneously during natural
    movement exists (ultrasound and EMG give indirect estimates only).
  - The cost function the nervous system actually optimises during muscle coordination
    has not been uniquely identified across a range of tasks.
  - The neural circuits implementing redundancy resolution (cerebellar internal
    model, corticospinal tract, spinal interneurons) are not identified.
related_bridges:

id: u-forward-model-cerebellum-learning-rule
title: >
  What learning rule does the cerebellum use to update its forward model predictions,
  and can the supervised climbing fiber error signal account for the full range of
  motor adaptation timescales from milliseconds to months?
status: open
priority: high
disciplines:
  - neuroscience
  - motor-control
  - control-theory
  - cerebellar-neuroscience
summary: >
  The cerebellum is hypothesized to implement forward models for motor prediction.
  The Marr-Albus-Ito model proposes that climbing fiber (CF) inputs from the inferior
  olive provide a teaching signal that drives LTD at parallel fiber-Purkinje cell
  synapses. However, CF signals occur at ~1 Hz, far too slow to account for fast motor
  adaptation (100 ms timescales). Multiple timescale adaptation (fast: cerebellar cortex;
  slow: cerebellar nuclei) challenges the single-site LTD model. The identity of the
  error signal driving each adaptation timescale remains uncertain.
systematic_gaps:
  - The exact teaching signal for fast (sub-100ms) motor adaptation is unknown.
  - Whether cerebellar forward models update via Hebbian, error-based, or predictive coding rules is debated.
  - The transition from internal model learning to use by the motor cortex is not understood at the circuit level.
last_reviewed: "2026-05-06"

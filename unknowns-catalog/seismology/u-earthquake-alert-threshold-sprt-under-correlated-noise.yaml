id: u-earthquake-alert-threshold-sprt-under-correlated-noise
title: >
  Under spatially correlated seismic noise and aftershock clustering, what sequential decision boundaries achieve
  bounded false-alarm rates for EEW while preserving detection probability targets — without Wald’s classic i.i.d. guarantees?
status: open
priority: high
disciplines:
  - seismology
  - statistics
summary: >
  EEW algorithms increasingly look like likelihood-based scoring; formal sequential testing theory assumes independent
  increments. Correlation structures across stations and time blur optimality claims and complicate regulatory acceptance.
systematic_gaps:
  - Few published analyses computing empirical false-alarm exceedance rates versus SPRT nominal α under realistic catalogs.
  - Human behavioral responses (alert fatigue) absent from pure statistical objective functions.

suggested_hypotheses:
  - h-aftershock-clustering-inflates-sprt-false-alarm-rate-fixed-boundaries

related_bridges:
  - b-earthquake-alarm-decision-x-wald-sequential-probability-ratio-test

references:
  - doi: "10.1214/aoms/1177731118"
    note: "Wald (1945) — sequential probability ratio test baseline."

last_reviewed: "2026-05-07"

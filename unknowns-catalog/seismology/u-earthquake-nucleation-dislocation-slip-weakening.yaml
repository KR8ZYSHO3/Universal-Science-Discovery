id: u-earthquake-nucleation-dislocation-slip-weakening
title: >
  What is the earthquake nucleation process at the asperity scale, and does rate-and-state friction or slip-weakening dislocation mechanics better describe the transition from quasi-static creep to dynamic rupture?
status: open
priority: high
disciplines:
  - seismology
  - solid-mechanics
summary: >
  Earthquake nucleation — the transition from slow aseismic slip to dynamic rupture — occurs over a zone of ~1 m to ~1 km depending on fault properties, but in situ observations of nucleation are unavailable. Rate-and-state friction (RSF) predicts a critical nucleation length L_c = G D_c / (b-a) σ_n while slip-weakening dislocation models predict nucleation from fault heterogeneity. Which model better describes natural earthquake nucleation, and whether nucleation always leaves observable precursors, are central unknowns.

id: u-phononic-crystal-3d-complete-band-gap
title: What is the minimum impedance contrast required for a complete 3D phononic band gap (forbidding sound in all directions and polarizations), and can such structures be fabricated at audible frequencies?
status: open
priority: medium
disciplines:
  - acoustics
  - condensed-matter-physics
  - materials-science
summary: >
  Phononic crystals can open band gaps for acoustic waves, but a complete 3D band gap
  (omnidirectional, for all polarizations) requires high impedance contrast and specific
  geometric arrangements (close-packed spheres, diamond lattice). At audible frequencies
  (20-20000 Hz), wavelengths are centimeters to meters, requiring macroscopic periodic
  structures. Key unknowns: (1) what is the minimum Z_2/Z_1 ratio needed for a complete
  3D gap, (2) can additive manufacturing produce geometrically precise enough structures
  at relevant scales, (3) can acoustic topological insulators with complete 3D gaps
  be realized, enabling protected acoustic edge states?
systematic_gaps:
  - Complete 3D phononic band gap has only been demonstrated at ultrasonic frequencies in mercury/steel composites
  - No theoretical lower bound on the impedance contrast for a complete 3D gap has been proven
  - Manufacturing tolerances at audible frequency scales (centimeter unit cells) are unstudied

id: u-optimal-stopping-biological-decisions
title: "Do animals implement optimal stopping rules (secretary problem, explore-exploit tradeoff) in foraging and mate choice, and what neural circuit implements the stopping criterion?"
status: open
priority: medium
disciplines:
  - mathematical-biology
  - neuroeconomics
  - behavioral-ecology
summary: >
  The secretary problem (optimal stopping): interview N candidates sequentially,
  decide on each irrevocably; the optimal rule (reject first N/e candidates, then
  accept the first better one) maximizes P(best) ≈ 1/e ≈ 37%. This applies to any
  sequential decision problem: animal foraging (when to leave a patch — Charnov's
  Marginal Value Theorem is the optimal stopping rule for patch foraging), mate choice
  (when to stop searching for better partners), habitat selection. Charnov's MVT
  predicts that animals should leave a patch when the current intake rate falls to
  the average environmental intake rate — the optimal stopping rule for a specific
  case. MVT is well supported experimentally in invertebrate foraging.
  However: (1) do animals implement the full N/e optimal stopping rule in mate choice,
  or a simpler heuristic (fixed threshold, aspiration level)? (2) What is the neural
  circuit implementing the stopping criterion? The basal ganglia are candidates
  (go/no-go circuits), but the link to optimal stopping has not been established
  at single-cell resolution.
systematic_gaps:
  - Whether animals implement optimal stopping vs. fixed-threshold vs. aspiration-level rules in sequential mate choice has not been distinguished experimentally
  - The neural circuit implementing the stopping criterion in patch foraging has not been identified
  - Whether optimal stopping rules scale with cognitive capacity (brain size, information processing speed) across species
suggested_hypotheses:
  - "Mate choice in species with variable mate quality follows the 37% rule: animals reject the first 37% of encountered mates as a calibration phase, then accept the first mate exceeding the calibration maximum, detectable by measuring acceptance probability as a function of encounter rank"
related_unknowns: []
references:

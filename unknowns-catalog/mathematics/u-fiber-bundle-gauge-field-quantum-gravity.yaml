id: u-fiber-bundle-gauge-field-quantum-gravity
title: >
  Can the fiber bundle formulation of gauge theory be extended to describe quantum gravity — where spacetime itself is dynamical — without introducing a fixed background manifold as the base space?
status: open
priority: high
disciplines:
  - mathematics
  - physics
summary: >
  Yang-Mills gauge theories are formulated on a fixed background spacetime M, but quantum gravity requires the metric (and hence M) to be a dynamical variable. Loop quantum gravity attempts to formulate gravity as a connection on a bundle over spin foam networks, while string theory uses fiber bundles on moduli spaces, but neither fully resolves the background-independence problem of quantum gauge theory on dynamical spacetime.

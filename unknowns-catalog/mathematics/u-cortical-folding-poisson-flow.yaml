id: u-cortical-folding-poisson-flow
title: Is the spatial pattern of cortical sulci and gyri governed by a Poisson flow model with a single control parameter, and can this predict inter-individual variability from gene expression data?
status: open
priority: medium
disciplines:
  - neuroscience
  - mathematical-biology
  - differential-geometry
  - developmental-biology
summary: >
  A 2026 preprint (arXiv 2604.17291) proposes a Poisson flow model for cortical folding
  pattern formation - treating sulcal initiation as a point process (Poisson process)
  on the cortical surface, driven by mechanical instability. This is mathematically
  related to the Turing reaction-diffusion mechanism (both predict spatial periodicity)
  but has a different mathematical structure (stochastic point process vs. deterministic
  PDE instability). The model predicts that sulcal pattern variability across individuals
  is controlled by a single dimensionless parameter (the ratio of cortical growth rate
  to mechanical stiffness). The open question is whether this Poisson flow parameter
  can be estimated from gene expression data (cortical thickness genes, cytoskeletal
  genes), and whether it predicts the observed inter-individual sulcal variability
  without additional free parameters. This would provide a quantitative bridge between
  genetics and cortical geometry.
systematic_gaps:
  - The Poisson flow model's prediction for the distribution of sulcal initiation times has not been validated against high-resolution fetal MRI time series.
  - Whether the single control parameter of the Poisson flow model can be estimated from gene expression data (from Allen Brain Atlas or similar) without fitting to individual anatomy is unknown.
  - The relationship between the Poisson flow model and Turing reaction-diffusion models of cortical folding (e.g., Tallinen et al. 2016) has not been established mathematically.
suggested_hypotheses:
  - The Poisson flow control parameter estimated from cortical growth gene expression levels predicts the coefficient of variation of sulcal initiation timing across human subjects with r^2 > 0.5.

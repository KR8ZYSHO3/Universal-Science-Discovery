id: u-kolmogorov-complexity-computable-approximation
title: What is the best computable approximation to Kolmogorov complexity, and how closely can compression algorithms approach the theoretical minimum description length for scientific models?
status: open
priority: medium
disciplines:
  - mathematics
  - computer-science
  - philosophy-of-science
  - statistics
summary: >
  Kolmogorov complexity K(x) is not computable, so all practical applications require
  approximations. General-purpose compression algorithms (Lempel-Ziv, Burrows-Wheeler,
  DEFLATE) compute upper bounds on K(x). Domain-specific compressors (protein structure
  codecs, astronomical data formats) may approach the true K more closely for their
  domain. The gap between the best known compressor and the true Kolmogorov complexity
  for scientific data (genomic sequences, protein structures, climate model outputs)
  is unknown. Whether this gap is systematically correlated with the "unexplained
  variance" in the best current scientific models is an open question connecting
  information theory to the philosophy of science.
systematic_gaps:
  - The ratio K_approx(x)/K(x) for scientific datasets (genomic sequences, climate trajectories) using state-of-the-art compressors is not known, as K(x) is incomputable.
  - Whether the normalised compression distance (NCD) between two scientific theories is a reliable proxy for their "theoretical distance" in a domain-independent sense has not been validated.
  - The relationship between MDL model selection and Bayesian model selection in the non-parametric (neural network) regime is not fully characterised.
last_reviewed: "2026-05-05"

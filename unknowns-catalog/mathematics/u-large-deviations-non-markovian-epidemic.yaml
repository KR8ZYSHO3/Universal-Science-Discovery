id: u-large-deviations-non-markovian-epidemic
title: What are the large-deviation statistics of epidemic final sizes in non-Markovian stochastic processes, and do they predict the probability of anomalously large outbreaks from small seeds?
status: open
priority: high
disciplines:
  - probability-theory
  - mathematical-epidemiology
  - statistical-physics
  - public-health
summary: >
  Classical epidemic models (SIR, SIS) assume Markovian (exponentially distributed)
  infectious periods, but real diseases have non-Markovian infectious periods with
  heavier tails (gamma, lognormal). A 2025 preprint (arXiv 2509.09480) develops large
  deviation theory for stochastic epidemics with non-Markovian infectious periods,
  computing the rate function for atypically large outbreaks starting from a single
  infectious individual. The key open question is how the non-Markovian infectious
  period distribution affects the probability of a rare but catastrophic "superspreading
  outbreak" - where a small initial seed (1-10 cases) grows to infect a large fraction
  of the population. This has direct public health implications: the probability of a
  COVID-19-scale outbreak from a single imported case depends critically on the tail
  of the infectious period distribution, which has not been computed using large
  deviation methods before this work.
systematic_gaps:
  - The rate function for large epidemics in non-Markovian SIR models has only been computed for specific infectious period distributions; a general formula in terms of distribution moments is unknown.
  - Whether non-Markovian large deviations predict qualitatively different outbreak risk than Markovian models (e.g., bimodal outbreak size distribution vs. unimodal) has not been established.
  - The practical computation of large deviation rate functions from epidemic surveillance data for real diseases has not been demonstrated.
suggested_hypotheses:
  - The probability of a pandemic-scale outbreak (>1% of global population) from a single imported case is 10x higher under gamma-distributed vs. exponential infectious periods with identical mean, because the variance contributes to the large-deviation rate function.

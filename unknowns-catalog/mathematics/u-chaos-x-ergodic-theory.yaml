id: u-chaos-x-ergodic-theory
title: >
  Are physically relevant chaotic systems (turbulence, weather, neural dynamics) truly
  ergodic, and how does finite-time ergodicity breaking affect predictions?
status: open
priority: high
disciplines:
  - mathematics
  - physics
  - dynamical_systems
  - information_theory
summary: >
  Ergodic theory guarantees that long-time averages equal ensemble averages for
  ergodic systems, but most physical systems of interest (turbulence, climate,
  neural networks) are not provably ergodic and may exhibit breaking of ergodicity
  over finite time scales relevant to observations. The KS entropy / Pesin theorem
  connection holds for ideal mathematical systems but whether it applies to physical
  attractors with noise, intermittency, and non-stationarity is unclear. Finite-time
  Lyapunov exponents in climate and turbulence show large fluctuations, suggesting
  practical ergodicity breaking. The implications for predictability and the validity
  of statistical mechanics in these systems are not fully characterized.
systematic_gaps:
  - The ergodicity breaking time scale for physically relevant chaotic attractors (Lorenz 96, primitive equation weather model) as a function of noise level has not been quantified
  - Whether the Pesin theorem holds for stochastic differential equations (Brownian dynamics on attractors) in the limit of small noise has not been rigorously established
  - The practical implication of ergodicity breaking for climate predictions — whether multi-decadal ensemble averaging is sufficient for ergodic sampling of the climate attractor — is unresolved
related_bridges:

id: u-origami-fold-design-complexity
title: "What is the computational complexity of optimal origami crease pattern design for a given 3D target shape, and are there classes of polyhedral targets for which the Demaine-Tachi universality theorem provides computationally efficient fold designs versus NP-hard cases?"
status: open
priority: medium
disciplines:
  - mathematics
  - computer-science
  - engineering
summary: >
  Demaine's origami universality theorem guarantees that any polyhedral surface can be folded from a flat sheet
  but the resulting crease patterns can be inefficient (using up to twice the paper area). The computational
  complexity of finding optimal fold designs that minimize material waste, number of creases, or fold complexity
  is not fully characterized. Key unknowns: (1) is optimal single-sheet origami design (minimizing paper area
  for a target polyhedron) NP-hard, and what approximation algorithms exist, (2) can machine learning methods
  generate human-interpretable crease patterns for target shapes that outperform Lang's TreeMaker in material
  efficiency, (3) what is the maximum practical complexity of computationally-designed origami structures that
  can be reliably fabricated by robotic folding systems?
systematic_gaps:
  - The full complexity theory of origami optimization (crease number minimization, paper-usage efficiency) has not been worked out for general polyhedral targets
  - Robotic origami fabrication introduces geometric uncertainty not present in mathematical models, limiting the complexity of computable fold designs
  - Large-scale origami structures (>10^4 creases) have not been computationally designed and fabricated; practical limits are unknown

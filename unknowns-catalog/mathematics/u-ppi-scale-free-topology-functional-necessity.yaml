id: u-ppi-scale-free-topology-functional-necessity
title: >
  Is the scale-free topology of protein-protein interaction networks a functional
  necessity (required for robustness, evolvability, or regulatory efficiency) or
  an artifact of network growth mechanisms (preferential attachment generating
  power laws as a neutral evolutionary consequence)?
status: open
priority: high
disciplines:
  - mathematics
  - network-science
  - systems-biology
  - evolutionary-biology
summary: >
  The PPI networks of yeast (Jeong 2001), human (Rual 2005), and other organisms
  show approximately scale-free degree distributions P(k) ∝ k^{-γ}, γ ∈ [2,3].
  The two leading explanations are: (1) functional necessity — scale-free topology
  provides robustness against random node deletion while enabling targeted disruption,
  facilitating modular organization; (2) neutral growth — preferential attachment
  (proteins with more interactions gain more; Barabási-Albert model) produces
  scale-free networks as a mathematical inevitability regardless of function.
  The controversy: Lima-Mendez & van Helden (2009) argued that PPI networks are
  not as scale-free as claimed (subsampling artifacts inflate apparent power law
  fits); Clauset et al. (2009, SIAM Rev.) showed that claimed power laws in most
  networks fail maximum likelihood tests. If PPI networks are not truly scale-free,
  the hub lethality result may arise from interaction multiplicity bias in Y2H
  screens (essential proteins interact with more screen partners). Additionally,
  the direction of causation is unclear: do essential proteins become hubs because
  of their essentiality, or are they essential because they are hubs?
systematic_gaps:
  - Rigorous maximum likelihood tests of power-law vs. log-normal degree distributions in high-quality PPI datasets (AP-MS, proximity ligation)
  - Whether hub lethality holds in complementation assays controlling for Y2H interaction detection bias
  - Experimental test of scale-free vs. exponential topology in organisms with minimized genomes (Mycoplasma)
  - "Causal test: does experimental hub deletion cause community fragmentation proportional to betweenness centrality?"

id: u-spectral-geometry-phylogenetic-trees
title: Do heat kernels on phylogenetic trees encode the same spectral geometry as Riemannian manifolds, and does this provide a unified framework for comparing evolutionary divergence and spatial distance?
status: open
priority: medium
disciplines:
  - mathematics
  - phylogenetics
  - differential-geometry
  - evolutionary-biology
summary: >
  A 2026 preprint (arXiv 2603.20922) develops spectral geometry and heat kernels on
  phylogenetic trees - the mathematical theory of heat diffusion on tree-structured
  metric spaces, which are the natural geometric representations of evolutionary
  relationships. Heat kernels on Riemannian manifolds encode curvature, topology, and
  spectral properties via the short-time expansion (Minakshisundaram-Pleijel). The
  open question is whether analogous spectral invariants on phylogenetic trees encode
  biologically meaningful information (rate of molecular evolution, population structure,
  radiation events) and whether these spectral tree invariants can be formally identified
  with Riemannian spectral invariants in a well-defined geometric limit (e.g., as the
  tree becomes dense). This would provide a unified mathematical framework for comparing
  evolutionary divergence and geographic distance using the same spectral geometry tools.
systematic_gaps:
  - Whether the phylogenetic tree heat kernel asymptotics converge to Riemannian manifold heat kernel asymptotics in a biologically interpretable limit has not been established.
  - The biological interpretation of spectral invariants (eigenvalue spectrum) of phylogenetic tree Laplacians beyond tree topology has not been developed.
  - Whether heat kernel distance on phylogenetic trees outperforms Robinson-Foulds or Kendall-Colijn distance for comparing evolutionary models has not been tested.
suggested_hypotheses:
  - The leading spectral invariant of the phylogenetic tree heat kernel (analogous to the integrated Gaussian curvature for manifolds) is proportional to the mean evolutionary rate averaged over the tree, providing a geometric formula for molecular clock estimation.
related_unknowns:
  - u-riemann-zeta-biomedical-discoverability

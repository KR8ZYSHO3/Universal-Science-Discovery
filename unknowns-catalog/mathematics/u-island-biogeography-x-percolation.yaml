id: u-island-biogeography-x-percolation
title: Does habitat fragmentation follow a true percolation phase transition with universal critical exponents, and if so,
  what is the biological percolation threshold for landscape connectivity in temperate forest ecosystems?
status: open
priority: high
disciplines:
- biology
- mathematics
- ecology
summary: 'If habitat fragmentation is a percolation process, landscape connectivity should undergo a true phase transition
  at critical habitat coverage p_c ≈ 0.59 (2D site percolation), with the species-area exponent z reflecting the percolation
  correlation length exponent. Empirical estimates of z range from 0.2 to 0.35, inconsistent with percolation theory predictions.
  Key unknowns: (1) is the S-A relationship truly a percolation critical phenomenon or a sampling artefact, (2) what is the
  biological p_c for different landscape types, (3) do real landscapes obey 2D site percolation or some correlated percolation
  universality class?'
systematic_gaps:
- Empirical z-exponents in the S-A relationship are inconsistent with percolation theory predictions
- Real habitat patches are spatially correlated (not random), invalidating simple percolation models
- No empirical test of percolation-like phase transition in species richness has been conducted at landscape scale

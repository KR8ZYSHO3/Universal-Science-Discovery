id: u-thermodynamics-convex-geometry-non-equilibrium
title: >
  Does the Legendre-transform / convex-duality structure of equilibrium thermodynamics
  generalise to non-equilibrium steady states — and can contact geometry or
  information geometry provide the correct mathematical framework for
  non-equilibrium potentials?
status: open
priority: high
disciplines:
  - mathematics
  - physics
  - chemistry
summary: >
  Classical equilibrium thermodynamics is exactly a case of convex duality: the
  Legendre transform connects U(S,V,N) to all thermodynamic potentials, and
  stability is convexity. For non-equilibrium steady states (NESS), no such
  clean mathematical structure is known. Several candidates have been proposed:
  (1) Masuda-Sasa excess entropy production as a non-equilibrium potential;
  (2) contact geometry (Mrugała 1991) — a generalisation of symplectic geometry
  to thermodynamic phase space that may accommodate NESS; (3) information geometry
  (Amari) — treating the space of probability distributions as a Riemannian manifold
  with Fisher metric provides a duality structure analogous to Legendre transforms.
  None of these has achieved the mathematical completeness or experimental validation
  that equilibrium thermodynamics enjoys. For active matter (self-propelled particles,
  biological cells), there is no agreed non-equilibrium free energy, making quantitative
  predictions about phase transitions and stability impossible at the same level of
  rigour as equilibrium.
systematic_gaps:
  - No consensus on the correct mathematical framework for non-equilibrium potentials
    in NESS systems with broken detailed balance.
  - Contact geometry and information geometry proposals have not been experimentally
    tested against active matter or driven chemical systems.
  - The relationship between the Jarzynski equality / Crooks fluctuation theorem and
    a generalised Legendre structure for NESS is not fully worked out.

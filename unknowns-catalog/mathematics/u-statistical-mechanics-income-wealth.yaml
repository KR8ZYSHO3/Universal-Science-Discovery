id: u-statistical-mechanics-income-wealth
title: Can a rigorous statistical mechanics derivation from firm birth-death dynamics explain the empirical Pareto tail of household wealth distributions without free parameters?
status: open
priority: high
disciplines:
  - statistical-physics
  - economics
  - mathematical-economics
  - complexity-science
summary: >
  Two 2026 preprints (arXiv 2604.22976, 2604.22995) derive statistical mechanics
  models of household income/wealth and firm dynamics using maximum entropy and
  mixture aggregation. The first shows that firm birth-death dynamics, combined with
  a maximum entropy principle over wealth distributions, produces Pareto tails with
  exponent alpha ~ 1.5-2 consistent with empirical data for the US and UK. The second
  derives "equations of motion for an economy" with capital deepening, technology, and
  firm survival analogous to physical equations of motion with conservation laws.
  The fundamental open question is whether the Pareto tail is a maximum-entropy
  consequence of generic firm dynamics (no free parameters except the mean) or requires
  fine-tuning of firm growth rate distributions. If the former, then wealth inequality
  is as inevitable as the Maxwell-Boltzmann distribution is in thermodynamics - a
  statistical law, not a policy failure. If the latter, policy interventions can change
  the Pareto exponent without changing the maximum entropy prediction.
systematic_gaps:
  - Whether the Pareto exponent alpha is uniquely determined by the mean firm growth rate and death rate (no free parameters), or requires additional moment constraints, has not been established.
  - The analogy between the Boltzmann distribution and the wealth distribution breaks down above a critical wealth scale; where this scale is and why it exists is unknown.
  - Whether the maximum entropy derivation correctly predicts the cross-country variation in Pareto exponents (US alpha ~ 1.5 vs. Nordic alpha ~ 2.0) without country-specific parameters is unknown.
suggested_hypotheses:
  - The Pareto exponent of household wealth equals 1/(1-f_e), where f_e is the fraction of economic activity in firms with superlinear returns to scale, providing a parameter-free prediction testable across economies.
related_unknowns:
  - u-social-ising-universality

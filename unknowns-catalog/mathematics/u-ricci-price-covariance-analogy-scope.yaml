id: u-ricci-price-covariance-analogy-scope
title: >
  Is there a rigorous, operational mapping between Ricci-type curvature functionals and Price-equation covariance decompositions outside explicitly constructed information-geometric (Fisher-metric) models?
status: open
priority: low
disciplines:
  - differential-geometry
  - evolutionary-biology
summary: >
  Informal analogies risk equivocation: Ricci curvature controls metric-volume comparisons while Price covariance captures fitness-trait alignment. Unless trait spaces carry statistically grounded Riemannian metrics (Amari/Fisher routes), Ricci language remains metaphor unless reformulated as Fisher curvature or transport inequalities with proven hypotheses.
systematic_gaps:
  - Published datasets jointly estimating Fisher-information curvature on empirical trait manifolds versus covariance selection components on the same cohort.
  - Formal impossibility/possibility results delineating when geometric curvature notions add predictive value beyond linear covariance models.
suggested_hypotheses:
  - h-fisher-ricci-price-covariance-analogy-calibration
related_bridges:

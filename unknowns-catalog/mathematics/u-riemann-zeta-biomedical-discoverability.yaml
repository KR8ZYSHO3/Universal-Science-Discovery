id: u-riemann-zeta-biomedical-discoverability
title: Does the Riemann zeta function govern the scaling of biomedical discovery rates with dataset size, and is this a general law for knowledge accumulation in high-dimensional biology?
status: open
priority: medium
disciplines:
  - number-theory
  - statistics
  - biomedical-informatics
  - data-science
summary: >
  A 2026 preprint (arXiv 2604.17581) identifies what the authors call the "Zeta Law
  of Discoverability" in biomedical data: the number of new discoveries (disease
  associations, gene-phenotype pairs) as a function of dataset size N follows a scaling
  law involving the Riemann zeta function zeta(s), where s is related to the
  dimensionality of the discovery space. This is surprising because the Riemann zeta
  function arises in pure number theory (distribution of primes, analytic continuation
  of Dirichlet series), yet here it appears to describe an empirical discovery rate
  in biology. The open question is whether this is a deep mathematical connection or a
  numerical coincidence, and whether the same law governs discovery rates in other
  high-dimensional sciences (genomics, drug discovery, particle physics). If the
  connection is real, it would imply that the distribution of "discoverable facts"
  in biology follows the same asymptotic statistics as the distribution of prime numbers.
systematic_gaps:
  - Whether the Zeta Law of Discoverability holds across multiple biomedical domains (GWAS hits, drug targets, protein structures) or is specific to the domain studied has not been tested.
  - The mathematical derivation connecting Riemann zeta function asymptotics to discovery rates in finite-dimensional search spaces has not been provided.
  - Whether the s parameter in the zeta law corresponds to a measurable property of the biological system (intrinsic dimensionality, sparsity of effects) is unknown.
suggested_hypotheses:
  - The Zeta Law of Discoverability follows from the prime number theorem applied to the prime factorization of biological complexity, with the s parameter equal to the intrinsic dimension of the phenotype space estimated by participation ratio.
related_unknowns:
  - u-large-deviation-non-markovian-epidemic

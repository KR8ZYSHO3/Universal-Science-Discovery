id: u-causal-attribution-chain-rule-universality
title: Does a universal chain rule for causal attribution unify natural selection, Bayesian learning, economic rationality, and gradient descent as instances of the same mathematical process?
status: open
priority: high
disciplines:
  - mathematics
  - evolutionary-biology
  - economics
  - machine-learning
  - information-theory
summary: >
  A 2026 preprint (arXiv 2601.09011) proposes a "causal attribution by the chain rule"
  framework that unifies natural selection (Price equation), Bayesian learning (chain
  rule of probability), economic rationality (marginal analysis), and other disciplines
  as instances of the same mathematical chain-rule decomposition of causal attribution.
  The claim is that whenever a system distributes credit or blame across multiple
  factors contributing to an outcome, it implicitly applies the chain rule - and that
  the specific forms of selection, learning, and rationality emerge as special cases
  depending on the symmetry and independence assumptions. The open question is whether
  this framework is mathematically complete (does it generate ALL known attribution
  methods as special cases?) and whether it predicts new attribution methods not yet
  applied to specific domains (e.g., the "natural selection" version of Shapley values,
  or the "economic" version of the Price equation). This could reveal a deep unification
  across seemingly unrelated disciplines.
systematic_gaps:
  - Whether the causal chain rule framework generates all known attribution methods (Shapley values, integrated gradients, LIME, Taylor decompositions) as special cases has not been formally verified.
  - The conditions under which the chain rule attribution is unique (vs. having multiple valid attributions) have not been characterized.
  - Empirical tests comparing chain-rule attributions to human intuitive causal judgments have not been conducted.
suggested_hypotheses:
  - Every known attribution method in ML (Shapley values, LIME, integrated gradients, attention weights) corresponds to a specific symmetry constraint on the chain rule decomposition, providing a complete classification of attribution methods by their symmetry group.

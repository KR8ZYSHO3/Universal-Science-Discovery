id: u-aesthetic-complexity-information-measure
title: >
  Is there a universal, computable information-theoretic measure that predicts
  cross-cultural aesthetic preference for visual and auditory stimuli,
  and what is the neural implementation of the compression-progress reward
  signal that Schmidhuber's theory posits?
status: open
priority: medium
disciplines:
  - cognitive-science
  - information-theory
  - aesthetics
  - neuroscience
  - mathematics
summary: >
  Multiple information-theoretic frameworks propose that aesthetic preference
  correlates with intermediate algorithmic complexity: Birkhoff's M = O/C
  (1933), Kolmogorov complexity K(x), fractal dimension D, and Shannon
  entropy H of sequential stimuli. Schmidhuber (2010) unifies these as
  compression-progress reward: an observer finds a stimulus beautiful to
  the extent that it reduces the description length of the observer's world
  model per unit of processing time.

  Key gaps: (1) Kolmogorov complexity is uncomputable; practical approximations
  (lossless compression ratio, LZW complexity) correlate with aesthetic
  preference in laboratory studies but no study has systematically compared
  multiple compression algorithms as aesthetic meters across diverse stimulus
  domains. (2) Whether the sweet-spot hypothesis (intermediate complexity is
  universally preferred) holds cross-culturally is disputed — some studies
  find culture-specific preferences for high or low complexity in music and
  visual art. (3) The neural implementation of compression-progress reward
  is unknown: fMRI studies show aesthetic appreciation engages reward circuits
  (nucleus accumbens, OFC) and default mode network, but the specific
  computation (prediction-error reduction rate) has not been isolated.
  (4) The fractal dimension preference (D ≈ 1.3–1.5) is well-established
  for abstract patterns but its generality to representational art, faces,
  and natural scenes is unclear.
systematic_gaps:
  - No systematic cross-cultural study using identical stimuli spanning the full complexity range (constant → random) across visual, auditory, and olfactory modalities.
  - The neural correlate of "compression progress" (reduction in prediction error per unit time) has not been identified using real-time fMRI or EEG.
  - The relationship between individual aesthetic preferences and individual differences in compression algorithm efficiency (as measured by cognitive tasks) has not been tested.
  - Whether Pollock's D trajectory (1.12 → 1.72) reflects a conscious artistic strategy toward the aesthetic optimum or is a byproduct of physical drip dynamics is unresolved.

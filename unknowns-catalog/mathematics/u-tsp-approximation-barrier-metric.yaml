id: u-tsp-approximation-barrier-metric
title: >
  Is the Christofides 3/2 approximation ratio for metric TSP optimal, or does
  a polynomial-time algorithm exist with a better worst-case guarantee —
  and what is the true approximation hardness threshold for metric TSP?
status: open
priority: high
disciplines:
  - mathematics
  - computer-science
  - combinatorial-optimization
  - complexity-theory
summary: >
  The traveling salesman problem (TSP) asks for the minimum-weight Hamiltonian cycle
  in a complete graph. For general TSP (with arbitrary edge weights), no constant-factor
  approximation exists unless P = NP. For metric TSP (edge weights satisfy triangle
  inequality), Christofides (1976) gave a 3/2-approximation: MST + minimum weight
  perfect matching on odd-degree vertices + Euler tour shortcutting. For 47 years
  this was the best known ratio. In 2021, Karlin, Klein, and Gharan gave a
  (3/2 - ε)-approximation for a small but positive ε, breaking the Christofides
  barrier for the first time. The open questions are: (1) Can the approximation ratio
  be reduced to 4/3 or lower (conjectured optimal based on the Held-Karp LP
  integrality gap, which is conjectured to be exactly 4/3); (2) Is there a
  complexity-theoretic lower bound (under P ≠ NP) for metric TSP approximability —
  the best known inapproximability for general TSP is NP-hardness of any ratio < 1069/1068;
  (3) Whether the Held-Karp LP relaxation integrality gap (currently known to be
  between 6/5 and 4/3) can be determined exactly.
systematic_gaps:
  - The Held-Karp LP integrality gap has been open since 1970 — a major gap between
    the best known LP lower bound and the best achieved approximation ratio.
  - Inapproximability results for metric TSP are weak compared to other NP-hard
    approximation problems where tight PCP-based bounds are known.
  - The gap between the Karlin-Klein-Gharan algorithm (3/2 - ε, ε very small) and
    the conjectured optimal 4/3 approximation remains entirely open.

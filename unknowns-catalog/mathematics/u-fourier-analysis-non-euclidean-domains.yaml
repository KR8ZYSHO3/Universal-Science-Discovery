id: u-fourier-analysis-non-euclidean-domains
title: How should Fourier analysis be generalized to non-Euclidean domains (graphs, manifolds, hyperbolic spaces) for signal processing on complex networks?
status: open
priority: high
disciplines:
  - mathematics
  - signal-processing
  - machine-learning
summary: >
  Classical Fourier analysis assumes a flat Euclidean domain where the Laplacian has
  plane wave eigenfunctions. For signals defined on graphs (social networks, molecules,
  protein contact maps) or manifolds (brain surfaces, 3D shapes), the 'Fourier modes'
  are the eigenvectors of the graph Laplacian or Laplace-Beltrami operator. Graph
  signal processing (Shuman et al. 2013) and geometric deep learning (Bronstein et al.
  2021) extend convolution to non-Euclidean domains. But fundamental questions remain:
  how to define a sampling theorem on non-Euclidean domains, how to handle the absence
  of translation invariance, and what the appropriate 'frequency' concept is for
  hyperbolic spaces (relevant to hierarchical data).
systematic_gaps:
  - No Nyquist-type sampling theorem exists for general graph signals; optimal
    sampling strategies depend on graph structure in ways not theoretically characterized.
  - The appropriate wavelet frames for hyperbolic geometry (relevant for hierarchical
    networks) have not been fully developed.

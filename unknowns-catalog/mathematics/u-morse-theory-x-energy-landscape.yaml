id: u-morse-theory-x-energy-landscape
title: Does the Morse-Witten complex of a protein energy landscape have a computable topological signature that predicts folding
  cooperativity, and can persistent homology detect all kinetically relevant metastable states from MD trajectories?
status: open
priority: medium
disciplines:
- mathematics
- physics
- chemistry
summary: Protein folding energy landscapes are high-dimensional, making direct Morse theory application computationally infeasible.
  Persistent homology provides a scalable topological analysis, but whether it correctly identifies all kinetically relevant
  metastable states (without missing barriers or generating spurious ones) from finite MD trajectory sampling is an open question.
  The fundamental gap is translating abstract Morse theory (exact statements) to approximate results from noisy simulation
  data.
systematic_gaps:
- Persistent homology of protein energy landscapes has not been validated against experimentally known folding intermediates
- The sampling density required to correctly identify Morse-Witten complex topology in high-dimensional PES is unknown
- Morse theory assumes smooth functions; molecular energy surfaces with cusps (bond breaking) require extensions

id: u-p-vs-np-geometric-complexity
title: Can geometric complexity theory (GCT) provide the representation-theoretic obstructions needed to separate the permanent from the determinant and resolve P vs NP?
status: open
priority: critical
disciplines:
  - mathematics
  - complexity-theory
  - algebraic-geometry
  - representation-theory
summary: >
  Mulmuley & Sohoni's geometric complexity theory (GCT, 2001) proposes to
  separate the permanent polynomial (VNP-complete) from the determinant
  (VP-complete) using representation theory of symmetry groups. The approach
  requires finding "occurrence obstructions" — irreducible representations
  appearing in the coordinate ring of the determinant variety but not the
  permanent variety. If such obstructions exist, they would imply
  perm ∉ VP (i.e., P ≠ NP under natural conditions). GCT has produced a
  program of 20+ years of algebraic geometry research, with some partial
  results, but the existence of the required obstructions remains unproved.
  Recent results by Bürgisser et al. (2019) show that "occurrence obstructions"
  as originally conceived may not exist, potentially requiring a reformulation.
systematic_gaps:
  - Whether the required representation-theoretic obstructions exist for the permanent vs determinant separation is open after 25 years of GCT research.
  - Natural proof barriers (Razborov-Rudich) apply to many algebraic techniques; it is unclear whether GCT fully avoids these barriers.
  - Alternative algebraic geometry approaches (Grochow-Moore) exist but have not produced lower bounds.
last_reviewed: "2026-05-06"

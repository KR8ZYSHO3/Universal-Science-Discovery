id: u-symplectic-quantization-semiclassical
title: What is the precise relationship between the symplectic geometry of a classical phase space and the spectral properties of its quantisation, beyond the leading-order WKB approximation?
status: open
priority: high
disciplines:
  - mathematics
  - mathematical-physics
  - quantum-mechanics
  - symplectic-geometry
summary: >
  Deformation quantisation (Kontsevich 1997) provides a formal star-product that
  deforms the classical Poisson algebra into the quantum operator algebra, but the
  precise relationship between classical symplectic invariants (symplectic volume,
  Maslov indices, Floer homology) and quantum spectral invariants (energy eigenvalues,
  spectral gaps, quantum scars) remains incompletely understood. The Gutzwiller trace
  formula and Selberg zeta function connect periodic orbits to quantum spectra, but
  a complete dictionary between symplectic topology invariants and quantum spectral
  data is lacking.
systematic_gaps:
  - The relationship between Floer homology of the symplectic manifold and the quantum spectrum has not been fully established beyond special cases.
  - Whether all symplectic topological invariants (e.g. symplectic capacities) have quantum spectral counterparts is unknown.
  - The convergence properties of the formal Kontsevich star-product in physically relevant examples are not resolved.
last_reviewed: "2026-05-05"

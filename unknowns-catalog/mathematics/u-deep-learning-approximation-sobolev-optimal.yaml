id: u-deep-learning-approximation-sobolev-optimal
title: >
  What is the optimal approximation rate for deep neural networks in Sobolev spaces,
  and do ReLU networks achieve the minimax optimal rate for estimating functions
  with different smoothness levels, or do they suffer unavoidable approximation gaps?
status: open
priority: high
disciplines:
  - mathematics
  - machine-learning
  - approximation-theory
  - statistics
summary: >
  Classical approximation theory establishes that for functions in Sobolev space
  W^{s,p}(Ω), the optimal approximation rate using n parameters is O(n^{-s/d})
  where d is the input dimension. Deep neural networks are known to achieve this
  rate for smooth functions (Barron 1993, Yarotsky 2017), but it is not known whether
  they achieve optimal rates for all function classes relevant to deep learning
  (compositionally structured functions, functions on manifolds), or whether the
  depth separation theorems imply unavoidable approximation gaps for shallow networks.
systematic_gaps:
  - Optimal approximation rates for neural networks on low-dimensional manifolds embedded in high-dimensional space are not known.
  - Whether practical gradient descent actually finds the approximation-optimal network (vs local minima) is not theoretically resolved.
  - The interaction between approximation error, estimation error, and optimization error in real training settings is not understood.
last_reviewed: "2026-05-06"

id: u-ecc-torus-intuition-misconception-rates
title: >
  How often does introductory elliptic-curve cryptography instruction that begins with the complex torus picture produce durable misconceptions about security (e.g., confusing periodic complex geometry with hardness of discrete logarithms on 𝔽_q)?
status: open
priority: low
disciplines:
  - mathematics
  - computer-science
  - education
summary: >
  Expert practitioners emphasize the distinction, but large-N assessments measuring misconception persistence after torus-first curricula are not published in a harmonized way.
systematic_gaps:
  - Concept inventories validated against interview protocols with cryptography instructors
  - Longitudinal tracking into applied secure-coding courses

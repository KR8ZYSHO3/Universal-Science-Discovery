id: u-persistence-homology-x-protein-structure
title: >
  Can persistent homology distinguish functional protein conformations from noise,
  and what topological features predict allosteric communication?
status: open
priority: medium
disciplines:
  - mathematics
  - biology
  - topology
  - structural_biology
summary: >
  Persistent homology can classify protein fold families with >90% accuracy, but
  whether it captures functionally relevant conformational changes (not just fold
  class) is unknown. Allosteric proteins change function without large structural
  changes — the allosteric communication pathway connecting distant sites is a
  topological feature (a path through the contact network) that may be captured
  by persistent homology. Whether persistence diagrams change detectably between
  active and inactive allosteric states, and whether topological biomarkers predict
  allosteric sites, has not been demonstrated. The scaling of TDA analysis to
  millions of AlphaFold2 structures for systematic topological proteomics is also
  an open computational challenge.
systematic_gaps:
  - Persistence diagrams have not been validated as predictors of allosteric communication pathways in well-characterized allosteric proteins (hemoglobin, GPCR, kinases)
  - The computational complexity of persistent homology (O(n^3) for Vietoris-Rips) prevents systematic TDA of the full AlphaFold2 database without algorithmic improvements
  - A principled method for constructing the filtration parameter (distance threshold) for protein contact networks from biophysical first principles has not been established

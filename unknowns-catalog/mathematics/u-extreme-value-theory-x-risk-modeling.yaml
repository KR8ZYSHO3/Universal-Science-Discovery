id: u-extreme-value-theory-x-risk-modeling
title: Does the multivariate generalization of extreme value theory (spectral measure, max-stable processes) provide a tractable and accurate framework for joint tail risk in high-dimensional financial and climate systems, and what is the minimum data requirement for reliable estimation?
status: open
priority: high
disciplines:
  - mathematics
  - economics
  - statistics
  - climate-science
summary: >
  Univariate EVT (GEV, GPD) is well-established; multivariate extremes require characterizing
  the spectral measure on the unit simplex, which has no parametric form in dimensions
  > 3. Max-stable processes (spatial extremes) model spatially correlated extremes
  (regional floods, heatwaves) but require composite likelihood estimation that breaks
  down in high dimensions. Financial tail risk (joint portfolio crashes) and climate
  compound extremes (concurrent heatwave + drought) both require multivariate EVT,
  but sample sizes for rare joint events are too small for reliable inference.
systematic_gaps:
  - No tractable non-parametric estimator for the spectral measure in dimensions > 10
  - Max-stable process fitting in spatial dimensions > 100 is computationally intractable
  - No unified theory connecting financial contagion (endogenous tail dependence) and EVT (exogenous rare events)

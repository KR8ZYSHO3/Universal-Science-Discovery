id: u-origami-math-x-structural-engineering
title: Can origami crease pattern combinatorics be inverted — given a target mechanical behavior (stiffness tensor, Poisson's ratio, deployment kinematics), systematically find the crease pattern that achieves it — and is this inverse design problem tractable in general?
status: open
priority: medium
disciplines:
  - mathematics
  - physics
  - engineering
summary: >
  Forward origami design (crease pattern → mechanical properties) is well-understood
  through Kawasaki/Maekawa theorems, rigidity theory, and finite element modeling.
  The inverse problem (target properties → crease pattern) is largely unsolved: it
  is computationally analogous to inverse kinematics in robotics but in an infinite-
  dimensional space of crease patterns. Specific open questions: (1) For a target
  negative Poisson's ratio and deployment ratio, what is the optimal crease pattern?
  (2) Can multi-stable origami (with multiple stable configurations) be designed to
  prescribed force-displacement curves? (3) Can 3D origami (non-flat-foldable) be
  treated with the same mathematical framework as flat-foldable patterns?
systematic_gaps:
  - No algorithm exists to invert the mechanical property map (crease pattern → stiffness tensor) for general target tensors
  - Three-dimensional rigid origami (Miura-ori variants with 3D curvature) has no complete mathematical theory
  - Self-folding origami actuated by residual stress fields (4D printing) cannot yet be designed from first principles to achieve target geometries

id: u-category-theory-x-functional-programming
title: >
  Can all practical programming language features be expressed as categorical universal
  constructions, and what new type system features does higher category theory predict?
status: open
priority: medium
disciplines:
  - mathematics
  - computer_science
  - type_theory
  - logic
summary: >
  The Curry-Howard-Lambek correspondence establishes monads, functors, and natural
  transformations as the categorical essence of programming. However, the correspondence
  breaks down for effectful computation (exceptions, mutable state, concurrency) and
  dependent types. Higher category theory (infinity-categories, homotopy type theory)
  suggests new type system features, but the computational interpretation of, for
  example, infinity-groupoids or (infinity,1)-categories has not been fully worked out.
  The question is whether the categorical semantics program can be extended to all of
  modern programming, or whether some features resist categorical formalization.
systematic_gaps:
  - The categorical semantics of algebraic effects and handlers (modern alternative to monads) is not fully established
  - Whether homotopy type theory (HoTT) can be compiled to efficient machine code while preserving its categorical semantics is unknown
  - The connection between dependent types and locally cartesian closed categories breaks for recursive types — no complete categorical model exists

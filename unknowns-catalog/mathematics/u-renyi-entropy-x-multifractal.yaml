id: u-renyi-entropy-x-multifractal
title: >
  What is the multifractal spectrum of turbulent velocity fields at high Reynolds
  number, and does it have a universal form independent of flow geometry?
status: open
priority: medium
disciplines:
  - mathematics
  - physics
  - fluid_mechanics
  - information_theory
summary: >
  The multifractal model of turbulence (Parisi-Frisch 1985) predicts that the
  singularity spectrum f(alpha) of turbulent velocity increments is a universal
  concave function independent of flow geometry at sufficiently high Re. However,
  the precise shape of f(alpha) — particularly whether it has a finite support
  (bounded Holder exponents) or extends to negative alpha values (ultra-strong
  singularities) — is not established from first principles. The Renyi entropy
  approach provides a computational route via structure functions S_p ~ r^tau(p),
  but connecting tau(p) to fundamental equations (Navier-Stokes) remains an
  open problem in mathematical physics.
systematic_gaps:
  - The multifractal spectrum f(alpha) of turbulence has not been derived from the Navier-Stokes equations; it is entirely phenomenological
  - Whether the multifractal spectrum is universal (independent of Re, geometry, forcing) or weakly Reynolds-number-dependent at finite Re is unresolved
  - The connection between Renyi entropy spectrum and anomalous scaling exponents in 2D turbulence (inverse cascade) vs 3D turbulence (direct cascade) has not been established

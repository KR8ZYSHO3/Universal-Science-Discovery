id: u-knot-theory-x-quantum-gravity
title: >
  Are the quantum knot invariants (Jones polynomial, HOMFLY) complete invariants of
  3-manifold topology, and do they encode the geometry of quantum spacetime?
status: open
priority: medium
disciplines:
  - mathematics
  - physics
  - topology
  - quantum_gravity
summary: >
  Witten's Chern-Simons theory generates quantum 3-manifold invariants (WRT invariants)
  as path integrals, but whether these invariants are complete (distinguish all
  non-homeomorphic 3-manifolds) is unknown — pairs of non-homeomorphic 3-manifolds
  can have identical Jones polynomials. Whether the totality of quantum invariants
  at all levels r (or their categorifications, Khovanov homology) achieves completeness
  is an open problem. For quantum gravity, whether spin network states in loop quantum
  gravity encode the full topological information of discrete spacetime — or only
  a projection of it — has implications for whether LQG is a viable theory of quantum
  gravity.
systematic_gaps:
  - Whether there exist pairs of non-homeomorphic 3-manifolds with identical WRT invariants at ALL levels r simultaneously has not been determined (completeness problem)
  - The categorification of HOMFLY polynomial to HOMFLY-PT homology has not been connected to physical observables in loop quantum gravity
  - Whether the semiclassical limit of the Chern-Simons partition function recovers the Einstein-Hilbert action on all 3-manifolds (not just homology spheres) has not been proved

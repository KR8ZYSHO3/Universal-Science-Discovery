id: u-koopman-dmd-spectrum-convergence-navier-stokes
title: >
  Under what Reynolds-number and sampling regimes do DMD/EDMD spectra converge to physically interpretable
  Koopman-like branches for wall-bounded turbulence without spurious modes dominating?
status: open
priority: medium
summary: >
  Practitioners extract modes for control design but lack uniform convergence guarantees. This unknown asks
  for benchmark suites tying window length, timestep, and sensor placement to spectral contamination metrics.

systematic_gaps:
  - "No community-wide turbulent benchmark with certified ground-truth operator spectra."
  - "Non-stationarity across long runs breaks stationarity assumptions used in proofs."


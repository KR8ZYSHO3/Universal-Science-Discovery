id: u-tropical-geometry-x-neural-networks
title: Can the tropical geometry of a trained neural network predict its generalisation error — specifically, does lower tropical
  hypersurface complexity (fewer linear regions) correlate with better generalisation in the overparameterised regime?
status: open
priority: medium
disciplines:
- mathematics
- computer_science
summary: Tropical geometry provides exact characterisation of ReLU network expressivity via linear region count, but the relationship
  between tropical hypersurface complexity and generalisation is unexplored. In the overparameterised regime (more parameters
  than training examples), networks can fit any training data but differ in generalisation. Whether tropical geometry-based
  complexity measures predict generalisation better than classical VC dimension is an open question.
systematic_gaps:
- No empirical study has measured tropical hypersurface complexity of trained vs. random ReLU networks
- The relationship between tropical complexity and implicit regularisation of SGD is theoretical
- Tropical geometry assumes exact arithmetic; floating-point errors and batch normalisation break the exact tropical structure

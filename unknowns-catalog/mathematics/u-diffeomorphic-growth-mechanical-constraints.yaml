id: u-diffeomorphic-growth-mechanical-constraints
title: >
  To what extent are biological shape transformations during development truly
  diffeomorphic (smooth, invertible), and which developmental processes require
  topological changes (cell division, death, fusion) that fall outside the
  diffeomorphism group?
status: open
priority: medium
disciplines:
  - biology
  - mathematics
  - developmental-biology
  - topology
summary: >
  D'Arcy Thompson (1917) proposed that species body plans are related by smooth
  coordinate transformations (diffeomorphisms). Computational anatomy formalizes
  this via geodesics on Diff(M). However, real development involves cell division
  (topology change), apoptosis, and tissue fusion — events that break the diffeomorphic
  assumption. How to extend the mathematical framework to accommodate non-diffeomorphic
  developmental events while preserving the elegant geometric structure remains an
  open problem at the interface of topology, differential geometry, and developmental
  biology.
systematic_gaps:
  - No general framework handling topology changes in computational anatomy.
  - The relationship between mechanical constraints (elastic moduli of tissues) and geodesic paths in Diff(M) is not understood.
  - Diffeomorphic registration of embryonic vs adult shapes fails when organ topology changes during development.
last_reviewed: "2026-05-06"

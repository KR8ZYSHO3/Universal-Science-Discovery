id: u-optimal-transport-word-order-universals
title: Is optimal transport (Wasserstein distance) minimization the physical principle underlying cross-linguistic word order universals, and can this predict undiscovered universals?
status: open
priority: medium
disciplines:
  - linguistics
  - mathematics
  - information-theory
  - cognitive-science
summary: >
  A 2026 preprint (arXiv 2604.01938) proposes measuring the "optimality of word or
  gesture order with respect to the principle of swap distance minimization" - modeling
  language processing as an optimal transport problem where the cost of a word order
  is the Wasserstein distance between the production sequence and the "ideal" semantic
  order. Greenberg's universals (e.g., SOV languages more common than VOS) might then
  reflect Wasserstein-optimal orderings for human working memory constraints. The open
  question is whether cross-linguistic word order frequencies are predicted by a
  Wasserstein optimal transport objective with a specific cost function (derived from
  cognitive constraints), and whether this predicts word order universals that have
  not yet been empirically observed. This bridges optimal transport mathematics with
  typological linguistics, potentially providing a first-principles derivation of
  Greenberg's universals.
systematic_gaps:
  - Whether the distribution of word orders across human languages is significantly closer to the Wasserstein-optimal order than to random, for any choice of cognitive cost function, has not been tested systematically.
  - The appropriate cost function (working memory distance, dependency length, information density) for the linguistic optimal transport problem has not been identified.
  - Whether optimal transport predicts language universals beyond word order (e.g., morpheme order, prosodic structure) is unknown.
suggested_hypotheses:
  - The 6 possible basic word orders (SOV, SVO, VSO, VOS, OVS, OVS) are ranked by frequency across languages in exactly the order predicted by Wasserstein distance to the semantic dependency order, with Kendall tau > 0.85.

id: u-ising-exact-density-states-universality
title: Does the exact combinatorial density of states for the critical 1D Ising model generalize to a universal formula for all critical 2D lattice models, providing exact partition functions without Monte Carlo?
status: open
priority: medium
disciplines:
  - statistical-physics
  - combinatorics
  - mathematical-physics
  - number-theory
summary: >
  A 2025 preprint (arXiv 2511.01646) derives an exact combinatorial formula for the
  density of states of the critical 1D Ising model - the number of configurations with
  exactly k domain walls, as a function of system size N. This combinatorial approach
  yields the exact partition function without Monte Carlo sampling, using only the
  transfer matrix and combinatorial identities. The open question is whether this
  approach generalizes: (1) Can an analogous exact combinatorial formula be derived
  for the critical 2D Ising model (Onsager exact solution extended to density of states)?
  (2) Does the combinatorial structure of the density of states reveal a connection to
  number theory (Bell polynomials, Catalan numbers, modular forms) that has been
  overlooked in the transfer matrix approach? (3) Can this method compute partition
  functions for other critical lattice models (Potts, 6-vertex) where Monte Carlo has
  large autocorrelation times at criticality?
systematic_gaps:
  - An exact combinatorial density of states formula for the 2D Ising model at T_c has not been derived (Onsager's exact solution gives the free energy, not the density of states).
  - Whether the combinatorial structure of Ising density of states has a number-theoretic interpretation (e.g., in terms of modular forms or Rogers-Ramanujan identities) has not been explored.
  - Computational complexity of evaluating the exact combinatorial density of states for system sizes relevant to material science simulations (N > 10^6) has not been assessed.
suggested_hypotheses:
  - The exact density of states of the 2D Ising model at T_c is expressible as a sum over integer partitions weighted by Catalan numbers, providing a combinatorial derivation of Onsager's formula.

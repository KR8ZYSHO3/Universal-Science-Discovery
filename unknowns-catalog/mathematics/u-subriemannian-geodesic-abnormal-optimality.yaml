id: u-subriemannian-geodesic-abnormal-optimality
title: >
  Under what geometric conditions are abnormal geodesics in sub-Riemannian
  geometry locally length-minimizing, and does the existence of abnormal
  minimizers prevent smooth parameterization of the sub-Riemannian geodesic
  flow — with direct implications for optimal robot motion planning?
status: open
priority: medium
disciplines:
  - mathematics
  - differential-geometry
  - control-engineering
  - robotics
summary: >
  In sub-Riemannian (SR) geometry, geodesics (locally shortest paths in the
  distribution-constrained metric) come in two types: normal geodesics
  (satisfying Hamilton's equations on T*M) and abnormal geodesics (satisfying
  a degenerate set of conditions with no Riemannian analog). Normal geodesics
  are always locally minimizing. Abnormal geodesics may or may not be locally
  minimizing, and this question is poorly understood.

  The problem matters for robotics: optimal paths for non-holonomic systems
  (cars, wheeled robots, surgical robots) are SR geodesics. If abnormal
  minimizers exist in a given configuration, the optimal control problem has
  pathological solutions that numerical optimization methods may miss. Montgomery
  (1994) showed that in the generic SR structure in dimension ≥ 5, abnormal
  geodesics are NOT minimizing. Liu & Sussmann (1995) showed that in specific
  SR structures (e.g., the "monster" distribution), abnormal geodesics ARE
  minimizing. The general characterization remains open.

  The mathematical difficulty: abnormal geodesics do not satisfy any coercive
  optimality condition (they are zeros of the Hamiltonian), making standard
  second-order sufficiency tests inapplicable.
systematic_gaps:
  - Characterization of SR structures admitting abnormal minimizers
  - Smooth parameterization conditions for SR geodesic flows
  - Algorithmic detection of abnormal minimizers in control systems
  - Extension of Agrachev-Sarychev theory to infinite-dimensional control systems

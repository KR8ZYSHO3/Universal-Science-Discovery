id: u-gene-culture-coevolution-rate-modern
title: How fast does gene-culture coevolution operate in modern industrialized populations, and which contemporary cultural practices are actively driving genetic selection?
status: open
priority: medium
disciplines:
  - evolutionary-biology
  - cultural-evolution
  - population-genetics
  - anthropology
summary: >
  Dual inheritance theory predicts ongoing gene-culture coevolution, but
  most documented examples (lactase persistence, sickle cell) operated over
  thousands of years in pre-industrial societies. Modern industrialized
  societies have rapidly changing cultural environments (urban diet, medicine,
  reproductive timing) and large population sizes. Whether gene-culture
  coevolution is currently operating, and on which traits, is contested.
  Candidate examples: myopia prevalence rising with near-work culture,
  antibiotic resistance in human microbiome from medical culture, allele
  frequency changes in populations with recent dietary transitions. The
  availability of large-scale GWAS and archaeogenomic data now makes
  this empirically tractable for the first time.
systematic_gaps:
  - No systematic genome-wide scan for selection signatures associated with documented cultural changes in the past 200 years has been published.
  - The effective population size and strong drift in industrial populations may swamp weak cultural selection signals.
  - Gene-culture coevolution models assume stable cultural practices over many generations; modern cultural change may be too rapid for genetic response.
last_reviewed: "2026-05-06"
related_bridges:
  - b-cultural-evolution-dual-inheritance

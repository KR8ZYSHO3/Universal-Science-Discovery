id: u-zahavi-handicap-mechanism-multimodal
title: >
  Do multimodal signals (combining acoustic, visual, and chemical components)
  satisfy Zahavian honesty conditions as a composite costly signal, or do
  individual modalities independently satisfy single-crossing conditions — and
  can this be tested across taxa using phylogenetic comparative methods?
status: open
priority: medium
disciplines:
  - evolutionary-biology
  - behavioral-ecology
  - game-theory
  - biology
summary: >
  Zahavi's handicap principle requires that signal cost satisfies ∂²C/∂s∂q < 0
  — higher-quality individuals bear lower marginal cost per unit signal. Most
  tests have focused on unimodal signals (peacock tail length, birdsong rate,
  stotting height). However, many species use simultaneous multimodal displays
  combining visual ornamentation, acoustic signals, and chemical cues. The question
  is whether: (1) each modality independently satisfies single-crossing conditions
  (parallel redundant signals, each encoding quality); (2) modalities carry
  different quality dimensions (composite index: tail = parasite load; song =
  neural development; scent = immune genotype); or (3) modalities are complementary
  within a single signal (multiple components that together satisfy the Zahavian
  condition but not individually). Theoretical models (Johnstone 1997) suggest
  redundant signals should be evolutionarily unstable (cheaper signals drive out
  expensive ones), but empirical multimodal systems persist. Whether individual
  signal components are redundant, complementary, or index different qualities
  has not been systematically tested across >10 species using matched phylogenetic
  and quality-measurement protocols. Additionally, receiver psychology (sensory
  bias, multimodal integration rules) may explain signal evolution without invoking
  honest signaling at all.
systematic_gaps:
  - No cross-species phylogenetic comparative test of Zahavian single-crossing conditions for multimodal signals
  - Whether composite quality (multiple immune, parasite, developmental dimensions) predicts multimodal display complexity
  - "Experimental test: does experimentally handicapping one signal modality cause compensatory increase in another?"
  - Receiver decision rules for multimodal signals (additive vs. multiplicative vs. threshold integration)

id: u-red-queen-cycle-period-determinants
title: >
  What determines the period and amplitude of Red Queen allele frequency cycles in natural host-parasite systems, and do these match the predictions of coevolutionary Lotka-Volterra models?
status: open
priority: high
disciplines:
  - evolutionary-biology
  - mathematics
summary: >
  Mathematical models predict Red Queen cycle periods on the order of tens to hundreds of host generations, but empirical data from Daphnia-parasite and flax-rust systems show complex, sometimes irregular oscillations. Whether natural cycles are sustained limit cycles or transient damped oscillations, and whether stochastic drift or mutation supply are limiting, is unresolved. Long-term genomic time series data from natural populations are needed.

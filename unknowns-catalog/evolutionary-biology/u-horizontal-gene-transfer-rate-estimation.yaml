id: u-horizontal-gene-transfer-rate-estimation
title: What are the rates of horizontal gene transfer between different prokaryotic species, and how do these rates vary with phylogenetic distance and ecological co-occurrence?
status: open
priority: high
disciplines:
  - evolutionary-biology
  - microbiology
  - bioinformatics
summary: >
  Horizontal gene transfer (HGT) transfers genetic material between organisms that do
  not reproduce together — a major force in prokaryotic evolution. Rate estimates vary
  by 2-3 orders of magnitude depending on method: phylogenetic inference, experimental
  transformation, and metagenomic analysis give different answers. The rate likely varies
  with: ecological co-occurrence (organisms must contact), phylogenetic distance (defense
  systems more likely to block distant transfers), gene function (essential genes rarely
  transferred), and environmental stress (SOS response upregulates HGT). Quantitative
  models linking HGT rate to these covariates are lacking, making it impossible to
  predict which gene functions will spread across a microbiome.
systematic_gaps:
  - HGT rates measured in controlled laboratory conditions differ from rates inferred
    from comparative genomics; the 'true' environmental rate is unknown.
  - The distribution of HGT rates across gene categories (metabolic, regulatory,
    structural) has not been systematically measured in wild microbiomes.
related_bridges:
  - b-graph-theory-phylogenetics
last_reviewed: "2026-05-06"

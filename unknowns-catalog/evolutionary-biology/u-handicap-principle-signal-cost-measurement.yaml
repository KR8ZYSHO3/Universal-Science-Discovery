id: u-handicap-principle-signal-cost-measurement
title: "Can the cost function C(signal, quality) of animal honest signals be measured empirically to verify the single-crossing property required for handicap principle honesty, and under what ecological conditions do costly signals become evolutionarily unstable or replaced by intrinsic quality indicators?"
status: open
priority: high
disciplines:
  - evolutionary-biology
  - economics
  - behavioral-ecology
summary: >
  The handicap principle requires that signal production costs be negatively correlated with individual quality
  (single-crossing property), but direct measurement of signal cost functions across quality levels is rarely done.
  Most evidence for honest signaling is indirect. Key unknowns: (1) what is the exact functional form of C(t,q)
  for known honest signals (testosterone-based ornaments, stotting gazelles, birdsong complexity), and does the
  single-crossing property hold quantitatively, (2) when do hybrid strategies (pooling equilibria where multiple
  quality types produce the same signal) arise instead of separating equilibria, (3) can computer-vision analysis
  of animal display videos provide large-scale cost estimation through biomechanical energy expenditure modeling?
systematic_gaps:
  - Measuring individual condition continuously while simultaneously measuring signal production cost requires implanted metabolic sensors rarely available in field settings
  - The theoretical ESS models assume constant environment, but seasonal and ecological variation means the cost function C(t,q) changes over time
  - Digital ethology methods exist but have not been applied to systematically test single-crossing cost functions across populations

id: u-kin-selection-price-equation-unification
title: "Does the Price equation provide a complete and unique decomposition of evolutionary change that fully unifies kin selection, group selection, and direct selection interpretations, or do these frameworks differ in empirical predictions that could be tested by manipulating relatedness and group structure independently?"
status: open
priority: high
disciplines:
  - evolutionary-biology
  - mathematics
  - philosophy-of-science
summary: >
  The long-running debate between inclusive fitness theory and multilevel selection theory has been partially
  resolved algebraically through the Price equation, but biologists continue to dispute whether the frameworks
  are truly equivalent or merely mathematically interchangeable with different predictive power. Key unknowns:
  (1) are there experimental designs that could distinguish inclusive fitness vs multilevel selection predictions
  — do they ever give numerically different predictions after identical assumptions, (2) does the Price equation
  framework have any limitations when applied to highly non-additive (epistatic) genetic systems where inclusive
  fitness may not be definable, (3) can the Price equation framework be extended to non-genetic inheritance
  (epigenetics, cultural transmission) in a way that preserves its mathematical properties?
systematic_gaps:
  - Laboratory evolution experiments with controlled relatedness and group structure have been conducted mainly with bacteria and yeast, limiting generalization
  - The distinction between "direct" and "indirect" fitness effects in inclusive fitness theory becomes ambiguous for traits with complex social interaction networks
  - Theoretical analyses of Price equation limitations typically require idealized models; empirical tests with real organisms are rare

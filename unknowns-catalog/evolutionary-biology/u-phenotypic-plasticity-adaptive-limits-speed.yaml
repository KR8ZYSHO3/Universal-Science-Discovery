id: u-phenotypic-plasticity-adaptive-limits-speed
title: >
  What are the evolutionary limits on the rate at which plasticity itself can evolve, and can populations track rapid environmental change faster through plasticity evolution than through allele frequency change?
status: open
priority: high
disciplines:
  - evolutionary-biology
  - mathematics
summary: >
  Plasticity evolution (change in reaction norm slope) requires genetic variation in plasticity sensitivity (G×E variance), which is typically smaller than variance in mean phenotype. Whether populations under rapid climate change can evolve sufficient plasticity to track environmental shifts on decadal timescales, or whether genetic assimilation or developmental constraints impose speed limits, is an open empirical and theoretical question.

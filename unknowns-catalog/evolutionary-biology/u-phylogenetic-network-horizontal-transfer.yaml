id: u-phylogenetic-network-horizontal-transfer
title: How do horizontal gene transfer and hybridization events distort phylogenetic tree inference, and can network methods reliably detect and quantify them?
status: open
priority: high
disciplines:
  - evolutionary-biology
  - mathematics
  - bioinformatics
summary: >
  The Tree of Life is not a tree. Horizontal gene transfer (HGT) in prokaryotes,
  hybridization in plants and animals, and endosymbiotic gene transfer (chloroplast,
  mitochondrial genes integrated into nuclear genome) create reticulate evolutionary
  history that cannot be represented as a bifurcating tree. Phylogenetic network methods
  (split networks, hybridization networks, HGT networks) attempt to infer the underlying
  directed acyclic graph, but face combinatorial explosion: the space of phylogenetic
  networks with k reticulation events is super-exponential. Statistical methods for
  inferring the number and location of reticulation events under realistic models
  of sequence evolution do not scale beyond ~20 taxa. The deep prokaryotic phylogeny
  (revealing the domain-level tree) is particularly affected, as HGT rates may be
  high enough that no coherent organismal phylogeny exists for bacteria.
systematic_gaps:
  - No scalable Bayesian method for phylogenetic network inference exists for >30 taxa.
  - The statistical power to detect individual HGT events from comparative genomic data
    depends on unknown parameters (HGT rate, gene length, substitution model) in ways
    not well characterized.
  - Whether the tree-like phylogenetic signal in protein-coding genes is sufficient to
    recover the species tree despite pervasive HGT in prokaryotes is actively debated.

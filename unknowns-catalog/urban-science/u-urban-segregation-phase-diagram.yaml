id: u-urban-segregation-phase-diagram
title: What is the full phase diagram of the Schelling segregation model as a function of tolerance threshold, density, and neighborhood size?
status: open
priority: medium
disciplines:
  - social-physics
  - urban-economics
  - complexity-science
summary: >
  The Schelling model has been studied mostly at fixed tolerance threshold (~30%)
  and fixed density (~50%). The full phase diagram — which tolerance/density/neighborhood-size
  combinations produce integration vs. segregation vs. intermediate states — has
  not been systematically mapped. The Cahn-Hilliard analogy predicts a spinodal
  decomposition region (spontaneous segregation from fluctuations) and a metastable
  nucleation region (segregation only with finite perturbations), separated by the
  binodal and spinodal curves. Whether this two-phase-coexistence structure appears
  in the social model is untested.
systematic_gaps:
  - The Schelling phase diagram has not been mapped in the full (tolerance, density,
    neighborhood-size) parameter space.
  - The role of network topology (lattice vs. small-world vs. scale-free) on the
    segregation phase transition has not been systematically characterized.
related_bridges:

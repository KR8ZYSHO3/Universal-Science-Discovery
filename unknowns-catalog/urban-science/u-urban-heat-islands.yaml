id: u-urban-heat-islands
title: "What is the relative contribution of albedo, green infrastructure, anthropogenic heat, and sky view factor to urban heat island intensity across different city morphologies and climate zones?"
status: open
priority: high
disciplines:
  - urban-science
  - atmospheric-physics
  - climate-science
summary: >
  Urban heat island (UHI) intensity varies enormously: from <1°C in some
  tropical cities to >8°C in mid-latitude compact cities. The four main
  physical drivers (reduced albedo, reduced QE from impervious surfaces,
  anthropogenic heat QA, reduced sky view factor) are not quantitatively
  partitioned across city types. Cool roof interventions target albedo and
  QG; green infrastructure targets QE; building orientation changes Ψ_sky.
  But the relative effectiveness of each intervention depends on local climate
  (dry vs. humid), city morphology (compact vs. sprawl), and urban density.
  A systematic attribution analysis across 100+ cities with controlled
  surface energy balance budgets does not exist.
systematic_gaps:
  - "No study has directly measured all four SEB components (QH, QE, QG, QA) for the same city using eddy covariance, isotopic tracing, and remote sensing simultaneously."
  - "The marginal effectiveness of green infrastructure for UHI reduction is well-established in humid climates but poorly quantified in dryland cities where irrigation effects may exceed or negate cooling benefits."
  - "Future UHI projections under climate change require coupled urban canopy models in regional climate models, but Urban Canopy Model parametrizations are not validated across diverse cities."
related_bridges:

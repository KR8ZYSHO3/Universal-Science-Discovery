id: u-black-hole-information-paradox-bulk-reconstruction
title: >
  Does the island formula (quantum extremal surface prescription) provide a complete
  resolution of the black hole information paradox in full quantum gravity, or only
  within the semiclassical approximation where the bulk geometric saddle points are
  well-defined — and what is the mechanism by which bulk quantum fields reconstruct
  the interior from boundary data after the Page time?
status: open
priority: high
disciplines:
  - gravitational-physics
  - quantum-information
  - mathematical-physics
  - string-theory
summary: >
  The island formula S(R) = min_I {ext[A(∂I)/4G + S_bulk(R∪I)]} correctly reproduces
  the Page curve in models with a non-gravitational bath coupled to a gravitational
  system (JT gravity in 2D, random matrix models). However: (1) The derivation relies
  on the replica trick and Euclidean saddle points (replica wormholes) — it is a
  semiclassical calculation valid when G→0, not full non-perturbative quantum gravity.
  Whether replica wormholes exist and are the dominant saddle in 4D is not established.
  (2) Bulk reconstruction: the entanglement wedge reconstruction theorem (Cotler et al.)
  states that the interior operators after the Page time can be reconstructed from
  boundary data, but the explicit reconstruction map (quantum error correction encoding)
  in a dynamical evaporating black hole is not known for realistic 4D Schwarzschild
  geometry. (3) The "information paradox" for cosmological horizons (de Sitter space,
  relevant to inflationary cosmology) is not resolved by the island formula in the same
  way — observer-dependent horizons create complications absent in AdS black holes.
systematic_gaps:
  - >-
    Island formula in 4D asymptotically flat black holes — Penington and Almheiri's
    derivations used 2D JT gravity or AdS/CFT; the 4D Schwarzschild case has not been
    derived from first principles.
  - >-
    The explicit quantum error correcting code mapping bulk operators to boundary
    operators (entanglement wedge reconstruction) in dynamical evaporating geometries
    has not been constructed.
  - >-
    Whether the Page curve is reproduced in de Sitter space (no boundary / observer-
    dependent horizon) using island formula is contested.
suggested_hypotheses:
  - >
    The island formula in 4D flat-space black holes requires non-perturbative wormhole
    contributions that are suppressed by exp(−A/4G) — parametrically small in Planck
    units — and the replica wormhole saddle requires topology change in quantum gravity
    that is only well-defined in string theory or other UV-complete theories; semiclassical
    derivations that ignore UV completion miss O(1) corrections to the Page curve near
    the endpoint of evaporation.

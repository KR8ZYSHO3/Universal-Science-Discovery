id: u-quantum-gravity-semiclassical-limit
title: How does quantum gravity reduce to general relativity in the semiclassical limit, and what observable corrections to GR does quantum gravity predict?
status: open
priority: critical
disciplines:
  - quantum-gravity
  - astrophysics
  - mathematical-physics
summary: >
  General relativity is a classical theory; quantum mechanics governs microscopic physics.
  At the Planck scale (length ~10^-35 m, energy ~10^19 GeV), quantum gravitational
  effects become important. No complete, empirically tested theory of quantum gravity
  exists. String theory, loop quantum gravity, and causal dynamical triangulations
  each propose a quantization, but all face the semiclassical limit problem: recovering
  flat spacetime plus gravitons from their microscopic structure. Observable corrections
  to GR (modified dispersion relations, Lorentz invariance violation at Planck energies,
  corrections to black hole thermodynamics) are predicted by all candidates but at
  levels below current detector sensitivities. The cosmological constant problem
  (predicted vs. observed vacuum energy differing by 120 orders of magnitude) is the
  sharpest empirical puzzle.
systematic_gaps:
  - No quantum gravity theory makes predictions at currently achievable energy scales
    that differ from GR + quantum field theory predictions.
  - The black hole information paradox (Hawking radiation and unitarity violation)
    remains unresolved; proposed solutions (fuzzball, firewall, island formula)
    differ in predictions for specific observables.

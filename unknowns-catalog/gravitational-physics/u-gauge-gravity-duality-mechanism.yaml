id: u-gauge-gravity-duality-mechanism
title: What is the precise mathematical mechanism by which AdS/CFT duality maps quantum gravity in anti-de Sitter space to conformal field theory on its boundary?
status: open
priority: critical
disciplines:
  - quantum-gravity
  - string-theory
  - mathematical-physics
summary: >
  The AdS/CFT correspondence (Maldacena 1997) conjectures that type IIB string theory
  in AdS5 × S5 is exactly dual to N=4 super-Yang-Mills CFT in 4D. This is the most
  concrete realization of the holographic principle (bulk physics encoded on boundary).
  The duality has been verified in many limits but never proven from first principles.
  The precise mapping between bulk geometric objects (geodesics, minimal surfaces,
  causal wedges) and CFT quantities (entanglement entropy, operator correlators,
  thermal states) has been developed (Ryu-Takayanagi formula, entanglement wedge
  reconstruction), but the mechanism by which a theory with gravity in the bulk
  is equivalent to a theory without gravity on the boundary remains mysterious.
systematic_gaps:
  - No proof of AdS/CFT from string theory first principles exists; all checks are
    in specific limits (large N, strong coupling) where independent calculation is possible.
  - The duality relies on supersymmetry; whether a non-supersymmetric version exists
    for realistic QCD-like theories is unresolved (holographic QCD is approximate).
related_bridges:

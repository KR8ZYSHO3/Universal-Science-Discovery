id: u-wound-healing-collective-migration-coordination
title: How do epithelial cells coordinate collective migration over distances of millimeters during wound healing without a central organizing signal, and what determines the leader cell identity?
status: open
priority: medium
disciplines:
  - cell-biology
  - biophysics
  - active-matter-physics
summary: >
  During wound healing, epithelial sheets migrate collectively with leader cells
  at the wound edge pulling follower cells. Leader cell identity is not pre-programmed
  but emerges spontaneously from the mechanical state of the sheet. Key unknowns:
  (1) what mechanical or chemical signal determines which cells become leaders,
  (2) how far ahead of the wound edge do chemical gradients extend and what is their
  temporal profile, (3) can active matter models quantitatively predict the velocity
  and persistence of collective migration from cellular mechanical properties alone,
  (4) how does the extracellular matrix remodeling feed back on migration dynamics?
systematic_gaps:
  - Leader cell selection has not been mechanistically explained; correlations with substrate stiffness exist but causation is unclear
  - Long-range mechanical signaling through the epithelial sheet has been hypothesized but not measured at the required spatiotemporal resolution
  - The Keller-Segel chemotaxis model has not been quantitatively parameterized for specific wound healing growth factors in vivo
related_bridges:

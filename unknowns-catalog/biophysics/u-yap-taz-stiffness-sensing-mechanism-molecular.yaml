id: u-yap-taz-stiffness-sensing-mechanism-molecular
title: >
  What is the complete molecular mechanism by which YAP/TAZ sense substrate
  stiffness — specifically, which upstream mechanosensors (integrin clustering,
  actin cytoskeletal tension, nuclear deformation, or ion channels) are necessary
  and sufficient, and what quantitative stiffness threshold determines the
  cytoplasmic-to-nuclear translocation switch?
status: open
priority: high
disciplines:
  - biophysics
  - cell-biology
  - mechanobiology
  - cancer-biology
summary: >
  Dupont et al. (2011) established that YAP/TAZ nuclear localisation correlates
  with substrate stiffness and is required for stiffness-dependent stem cell
  differentiation. However, the molecular pathway from ECM stiffness to
  YAP/TAZ nuclear translocation remains incompletely defined. Multiple
  upstream mechanisms have been proposed: (1) actomyosin tension via Rho/ROCK
  signalling reducing LATS1/2 kinase activity; (2) direct nuclear mechanosensing
  via nuclear pore dilation under cytoskeletal tension; (3) integrin clustering
  at focal adhesions activating FAK/Src; (4) Piezo1 mechanosensitive ion channels
  mediating calcium influx; (5) cell geometry/spread area independent of stiffness.
  These mechanisms are not mutually exclusive and may act in parallel or cascade.
  The quantitative stiffness threshold E* at which YAP nuclear fraction sharply
  increases (~1-10 kPa depending on cell type) has not been mechanistically derived.
  Whether the threshold is a bistable switch (hysteresis) or a continuous sigmoidal
  function is contested.
systematic_gaps:
  - Causal sufficiency of individual upstream sensors (integrin, ROCK, Piezo1, nuclear pore) for YAP nuclear localisation has not been established by orthogonal reconstitution experiments.
  - The quantitative stiffness threshold E* varies across cell types by >10-fold — whether this reflects differences in motor activity, linker compliance, or sensor expression is unknown.
  - Whether the YAP/TAZ switch exhibits hysteresis (bistability consistent with positive feedback via YAP target gene CTGF promoting ECM stiffening) has not been systematically tested.
  - The relative contributions of nuclear vs. cytoplasmic mechanosensing to YAP localisation remain unresolved — recent evidence for direct nuclear envelope tension-driven YAP import via nuclear pore opening complicates the actin-tension model.
suggested_hypotheses:
  - >
    YAP nuclear translocation exhibits bistability with stiffness hysteresis width
    ~2 kPa, driven by a CTGF-ECM stiffening positive feedback loop — testable by
    cycling substrate stiffness using phototunable hydrogels while measuring
    single-cell YAP nuclear/cytoplasmic ratio by live imaging.
related_bridges:
  - b-mechanobiology-cellular-force-sensing

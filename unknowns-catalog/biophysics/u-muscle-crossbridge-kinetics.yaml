id: u-muscle-crossbridge-kinetics
title: "What are the complete rate functions f(x) and g(x) for myosin cross-bridge attachment and detachment in skeletal muscle, and how do they change with phosphorylation state and disease?"
status: open
priority: medium
disciplines:
  - biophysics
  - mechanics
  - molecular-biology
summary: >
  Huxley's 1957 model requires specific functional forms for f(x) (attachment rate)
  and g(x) (detachment rate) as functions of cross-bridge strain x. While optical
  tweezers and single-molecule experiments have provided step sizes (~5-10 nm) and
  average dwell times, the full rate functions f(x) and g(x) have not been measured
  as continuous functions of x for any myosin isoform. The rates depend on the
  ATPase cycle state (pre-powerstroke vs. post-powerstroke), regulatory light chain
  phosphorylation, and temperature, and change in disease states (hypertrophic
  cardiomyopathy mutations). The seven-state ATPase cycle rate constants also
  remain incompletely characterized.
systematic_gaps:
  - "Single-molecule experiments measure average quantities but the variance and distribution of dwell times as a function of applied load x are not systematically characterized."
  - "How f(x) and g(x) are modified by myosin-binding protein C (MyBP-C) and troponin regulatory proteins is largely unknown."
  - "The rate functions have not been directly compared between fast and slow myosin isoforms in the context of the full Huxley ODE framework."
related_bridges:

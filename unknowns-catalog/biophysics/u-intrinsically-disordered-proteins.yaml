id: u-intrinsically-disordered-proteins
title: "Do intrinsically disordered protein condensates obey Flory-Huggins phase diagrams, and can the critical concentration for phase separation be predicted from amino acid sequence alone?"
status: open
priority: high
disciplines:
  - biophysics
  - polymer-science
  - cell-biology
summary: >
  Biomolecular condensates formed by IDPs (P-bodies, stress granules, nucleolus)
  are liquid-liquid phase separations governed by Flory-Huggins theory. The
  critical concentration c* for phase separation should depend on the IDP
  sequence via χ parameter (interaction strength between protein segments and
  solvent), molecular weight N, and chain flexibility. Current sequence-based
  predictors (catGranule, FuzDrop, PSPredictor) use empirical features but
  not the Flory-Huggins χ parameter explicitly. Whether c* for real IDP condensates
  in cells can be predicted from sequence to within a factor of 2 is unknown.
  The role of post-translational modifications (phosphorylation suppresses
  condensation; arginine methylation can promote it) in shifting c* is
  quantitatively uncharacterized.
systematic_gaps:
  - "Quantitative comparison of sequence-based χ parameter estimates to measured c* values from LLPS assays (turbidity, fluorescence) for >20 IDPs is absent."
  - "Concentration of IDPs in specific cell compartments (nucleus vs. cytoplasm) relative to their c* is not known for most condensate-forming proteins."
  - "The multi-component nature of condensates (many IDPs co-condensing) makes single-component FH theory a simplification whose validity range is unknown."
related_bridges:
  - b-intrinsically-disordered-proteins-polymer-physics
last_reviewed: "2026-05-07"
references:

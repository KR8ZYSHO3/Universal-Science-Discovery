id: u-cochlear-hopf-bifurcation-active-hair-bundle-vs-somatic-motility
title: >
  What is the relative contribution of active hair bundle motility (myosin-
  based, present in all hair cells) versus outer hair cell somatic electromotility
  via prestin (mammal-specific) to the cochlear amplifier, and which mechanism
  is the primary driver of the Hopf bifurcation dynamics and associated
  otoacoustic emissions?
status: open
priority: high
disciplines:
  - auditory-biophysics
  - mechanobiology
  - nonlinear-dynamics
  - molecular-biology
summary: >
  Two distinct active mechanisms operate in the mammalian cochlea:
  (1) Somatic electromotility via prestin: OHC length changes ±5% driven by
  membrane potential, operating at acoustic frequencies (up to 100 kHz).
  Discovered by Brownell et al. (1985); molecular motor identified as prestin
  by Zheng et al. (2000). Prestin knockout mice (Liberman et al. 2002) have
  ~40 dB hearing loss and absent otoacoustic emissions — proving prestin is
  necessary for normal cochlear amplification.
  (2) Active hair bundle motility: myosin-based adaptation of the tip-link
  tension in stereocilia, driven by MYO1C (myosin 1c). Present in all
  vertebrates (frogs, fish, birds, mammals). Can generate force in cycle-by-
  cycle amplification and underlies otoacoustic emissions in non-mammalian
  vertebrates.

  Both mechanisms can in principle drive Hopf oscillations. Hudspeth's group
  has shown that isolated hair bundles from frogs exhibit Hopf bifurcation
  dynamics purely via the myosin-based mechanism. Eguíluz et al. (2000) modeled
  cochlear amplification entirely as a Hopf oscillator without specifying the
  molecular mechanism.

  The open question: in intact mammalian cochlea, which mechanism provides the
  cycle-by-cycle amplifying force at each frequency location? Do both mechanisms
  cooperate (electromotility for frequency tuning, hair bundle for cycle-by-cycle
  power gain), or does one dominate? The prestin knockout is confounded because
  loss of electromotility changes the OHC membrane potential dynamics and could
  indirectly impair hair bundle motility.
systematic_gaps:
  - Direct measurement of the relative force contributions of electromotility
    vs. hair bundle motility at a single frequency location in an intact cochlea
    has not been achieved.
  - Conditional knockout of MYO1C in OHCs (while preserving prestin) has not
    been reported to test the hair bundle contribution in isolation.
  - Whether the Hopf bifurcation parameters (μ, ω₀, nonlinear coefficient) can
    be independently fitted to prestin-knockout vs. wild-type BM displacement
    data has not been done.
  - High-frequency OHCs (>10 kHz, basal cochlea) may rely more on
    electromotility (higher membrane RC time constant bandwidth) while apical
    OHCs rely more on hair bundle — this frequency-dependent mechanism switch
    has not been systematically tested.

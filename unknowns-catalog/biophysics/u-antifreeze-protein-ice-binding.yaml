id: u-antifreeze-protein-ice-binding
title: "What is the molecular mechanism by which antifreeze proteins distinguish ice from liquid water and adsorb irreversibly to specific crystal planes, and can this selectivity be computationally designed into synthetic polymers for cryopreservation applications?"
status: open
priority: high
disciplines:
  - biophysics
  - biochemistry
  - materials-science
summary: >
  Antifreeze proteins adsorb to ice crystal surfaces with high specificity for particular planes but the
  mechanism of plane recognition and irreversible binding remains debated. Competing models invoke hydrogen
  bonding, hydrophobic complementarity, and van der Waals interactions. Key unknowns:
  (1) is AFP-ice adsorption thermodynamically irreversible due to multiple weak interactions or kinetically
  irreversible due to slow desorption rates, (2) can molecular dynamics simulations with accurate water models
  (TIP4P/ICE) predict AFP binding affinity and selectivity quantitatively from sequence alone,
  (3) what minimum peptide motif retains ice plane selectivity for engineering synthetic antifreeze agents?
systematic_gaps:
  - Cryo-EM and AFM studies of AFP-ice interfaces have limited resolution at the atomic scale due to radiation damage and thermal motion
  - Force-field accuracy for protein-ice interfaces is limited; specialized water models are needed but not validated for ice-protein systems
  - Rational design of synthetic polymers with AFP-like activity remains empirical due to incomplete understanding of the mechanism

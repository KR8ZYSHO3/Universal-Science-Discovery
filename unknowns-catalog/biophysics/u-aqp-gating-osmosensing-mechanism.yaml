id: u-aqp-gating-osmosensing-mechanism
title: >
  What is the molecular gating mechanism of aquaporin water channels, and how do
  cells sense osmotic stress to trigger AQP2 vesicle trafficking and membrane
  insertion within minutes of vasopressin stimulation?
status: open
priority: high
disciplines:
  - biophysics
  - cell-biology
  - structural-biology
  - physiology
summary: >
  Aquaporins (AQPs) are tetrameric membrane channel proteins whose single-channel
  water permeability (P_f ≈ 10⁻¹⁴ cm³/s, Agre Nobel 2003) is orders of magnitude
  above lipid bilayer diffusion. AQP1 and AQP4 appear constitutively open; AQP2
  is regulated by vasopressin-stimulated trafficking from intracellular vesicles
  to the apical membrane. The osmosensing pathway upstream of AQP2 trafficking
  involves: vasopressin → V2 receptor → Gs → adenylyl cyclase → PKA → AQP2
  Ser256 phosphorylation → vesicle fusion (SNARE-dependent). However, the molecular
  mechanism by which osmotic stress itself (independent of AVP) is sensed remains
  unknown. Candidate osmosensors: TRPV4 channels (mechanosensitive, respond to
  cell swelling), transient receptor potential channels, integrins, and the
  cytoskeleton. The selectivity filter ("ar/R" selectivity region) excludes ions
  while passing water — the structural basis of this selectivity (Asn-Pro-Ala NPA
  motifs) is known from crystal structures, but whether gating occurs at this
  site or at the cytoplasmic half-pore is unresolved. Cryo-EM at 1.5 Å resolution
  has shown the open-state conformation; closed-state conformations have not been
  captured for constitutive AQPs.
systematic_gaps:
  - Molecular identity of the primary osmosensor in renal collecting duct principal cells
  - Structural mechanism of AQP2 vesicle docking and fusion (SNARE identity, fusion kinetics)
  - Whether constitutive AQPs (AQP1, AQP4) undergo functional gating on biologically relevant timescales
  - Quantitative relationship between AQP2 surface density and collecting duct water permeability in vivo

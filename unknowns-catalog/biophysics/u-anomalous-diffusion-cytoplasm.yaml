id: u-anomalous-diffusion-cytoplasm
title: What molecular mechanisms drive anomalous (non-Brownian) diffusion in the cytoplasm, and how do they change under cellular stress?
status: open
priority: high
disciplines:
  - biophysics
  - cell-biology
  - physics
summary: >
  In vitro Brownian motion predicts mean-squared displacement MSD ~ t (normal diffusion),
  but single-molecule tracking in living cells consistently shows subdiffusion (MSD ~ t^alpha,
  alpha < 1) for many proteins and organelles. Proposed mechanisms include macromolecular
  crowding, transient binding to immobile structures, viscoelastic cytoskeletal networks,
  and active fluctuations from molecular motors. The cytoplasm may undergo a glass-like
  transition under stress (hyperosmotic shock, heat shock) that drastically slows
  diffusion. Distinguishing passive viscoelastic subdiffusion from active motor-driven
  anomalous transport remains technically and conceptually challenging. Understanding
  this is critical for predicting intracellular reaction rates and signalling dynamics.
systematic_gaps:
  - Most single-molecule tracking studies lack the temporal resolution to distinguish
    viscoelastic subdiffusion from transient binding at short timescales.
  - The relationship between cytoplasmic glass-transition temperature and organismal
    thermal tolerance has not been systematically measured.
  - Active (motor-driven) anomalous diffusion and passive viscoelastic subdiffusion
    are not cleanly separable with current experimental methods.

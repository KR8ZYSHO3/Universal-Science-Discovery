id: u-cochlear-amplifier-molecular-mechanism-prestin
title: >
  What is the complete molecular mechanism by which prestin (SLC26A5) converts
  membrane potential changes to outer hair cell length changes at acoustic frequencies
  up to 70 kHz, and how does the nanoscale conformational change couple to the
  macroscale basilar membrane resonance?
status: open
priority: high
disciplines:
  - biophysics
  - auditory-neuroscience
  - molecular-biology
  - physics
summary: >
  Outer hair cells amplify basilar membrane motion via electromotility driven by
  the motor protein prestin. Membrane hyperpolarization causes OHC elongation
  (0.1-1 μm); depolarization causes shortening. The speed (up to 70 kHz in some
  mammals) exceeds that of any known motor protein by orders of magnitude, suggesting
  a piezoelectric-like mechanism rather than a power-stroke cycle. The crystal structure
  of prestin in multiple conformations (Gorbunov et al. 2014) suggests a chloride-
  dependent allosteric mechanism, but the full atomic pathway from chloride binding
  to membrane tension change is not known, nor is how the nanometer-scale shape change
  of individual prestin molecules collectively generates the micrometer-scale OHC length change.
systematic_gaps:
  - No complete molecular dynamics simulation of prestin conformational change at physiological speed.
  - The coupling between individual prestin molecules in the OHC lateral membrane is poorly understood.
  - The energy source for electromotility (electrochemical gradient vs elastic energy) is debated.
last_reviewed: "2026-05-06"

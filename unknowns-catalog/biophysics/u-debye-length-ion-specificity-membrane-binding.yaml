id: u-debye-length-ion-specificity-membrane-binding
title: >
  How much of apparent Debye-length scaling of peripheral protein binding to membranes is actually ion-specific
  chemistry (Hofmeister, chelation) versus mean-field electrostatic screening?
status: open
priority: medium
summary: >
  Assays vary salt while interpreting shifts as screening; specific ions alter protein conformations. This
  unknown asks for factorial designs separating ionic strength from chemical series effects.

systematic_gaps:
  - "Limited systematic datasets pairing binding curves with molecular dynamics of ion distributions at realistic membrane compositions."
  - "Membrane heterogeneity (rafts, charged lipids) breaks 1D Gouy–Chapman cartoons."

suggested_hypotheses:
  - h-ion-specific-double-layer-competition-modulates-permeation

related_bridges:

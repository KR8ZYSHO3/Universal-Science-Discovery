id: u-atp-synthase-torque-slip-mechanism
title: >
  What is the molecular mechanism of torque generation and "slip" in the F₀ c-ring of
  ATP synthase, and how does the rotor stoichiometry (8–15 c-subunits across species)
  determine the H⁺/ATP ratio and hence the thermodynamic efficiency of oxidative
  phosphorylation?
status: open
priority: high
disciplines:
  - biophysics
  - biochemistry
  - physics
  - structural-biology
summary: >
  Boyer's binding change mechanism is established but the molecular details of torque
  generation by H⁺ flux through the F₀ a-subunit/c-ring interface remain unclear.
  The c-ring stoichiometry varies: 8 in bovine mitochondria (giving 8 H⁺/3 ATP = 2.67
  H⁺/ATP), 10 in yeast, 13–15 in chloroplasts. This stoichiometric variation means
  the thermodynamic efficiency (ΔGATP / n_H × PMF) varies by up to 50% across organisms.
  Key unresolved questions: (1) What is the precise mechanism of the half-channel proton
  transfer from lumen to the c-ring carboxylate (Asp61) and from the c-ring to the
  cytoplasm — are there water wires, Grotthuss mechanism, or direct diffusion? (2) How
  does the motor operate near the thermodynamic reversibility limit (near-equilibrium
  regime) while maintaining directed rotation (breaking detailed balance)? (3) What
  determines the c-ring stoichiometry evolutionarily — is it optimized for the PMF range
  of a given organism or constrained by structural assembly constraints?
systematic_gaps:
  - Cryo-EM structures of F₀F₁ in lipid nanodisc at sub-2 Å resolution are available
    for bovine mitochondria but not for plant chloroplast ATP synthase (different c-ring
    stoichiometry and regulatory mechanisms).
  - Single-molecule experiments (Noji 1997, Yasuda 1998) measured γ-subunit rotation but
    have not directly resolved individual c-subunit steps (<36° per step) to determine
    whether rotation is stepwise or continuous at physiological ATP/ADP ratios.
  - The thermodynamic efficiency near the H⁺/ATP ratio transition (marginal PMF conditions)
    has not been measured for isolated mitochondria with controlled pmf and ATP/ADP ratios.
suggested_hypotheses:
  - >
    The c-ring stoichiometry is set by the minimum PMF required to drive ATP synthesis
    against physiological ΔGATP: species living at lower PMF require larger c-rings
    (more H⁺ per ATP) to achieve ΔG_H+ × n_H > ΔGATP. This predicts a linear correlation
    between c-ring size and the PMF measured in natural habitat across organisms from
    alkaliphiles (smallest c-ring) to acidophilic chloroplasts (largest c-ring).

id: u-eis-membrane-hodgkin-huxley-identification
title: To what extent can broadband membrane impedance spectra uniquely identify multi-state
  gating schemes without single-channel resolution?
status: open
priority: medium
disciplines:
- biophysics
- chemistry
- neuroscience
summary: Linearized models can be non-identifiable when multiple processes overlap in frequency.
  Linking EIS priors from materials science to biological membranes is underexplored.
systematic_gaps:
- Nonlinear rectification breaks small-signal impedance interpretation at strong drives.
- Cell geometry and folds create distributed RC networks complicating equivalent-circuit uniqueness.
suggested_hypotheses:
- h-eis-spectra-constrain-gating-substates

id: u-met-channel-molecular-identity-pore-forming-subunit
title: >
  Is TMC1/TMC2 the definitive pore-forming subunit of the hair cell mechanotransduction
  (MET) channel, and what is the complete molecular architecture (stoichiometry,
  auxiliary subunits, tip-link attachment site) of the native MET channel complex?
status: open
priority: high
disciplines:
  - biophysics
  - cell-biology
  - hearing-research
  - structural-biology
summary: >
  The identity of the hair cell MET channel pore-forming subunit was a major open
  question for decades. TMC1 and TMC2 were proposed as pore-forming subunits
  (Kawashima et al. 2011; Pan et al. 2018; Jia et al. 2020) based on genetic
  evidence, conductance changes with point mutations, and structural data. However,
  the cryo-EM structure of the native MET channel complex is not resolved; the
  stoichiometry of TMC1/TMC2, their interaction with TMIE, LHFPL5, and the
  tip-link protein protocadherin-15 (PCDH15) at the lower tip-link density (LTLD)
  is not fully established. Whether TMC1 alone is sufficient for mechanotransduction
  or requires obligate partners, and how the gating spring attaches to the channel
  pore to transduce mechanical force into channel opening, remains to be resolved
  at atomic resolution.
systematic_gaps:
  - Cryo-EM structure of the native MET channel complex (TMC1/TMIE/LHFPL5/PCDH15)
    at atomic resolution has not been achieved; existing structures are partial.
  - The force-transmission mechanism from tip-link to channel gate has not been
    directly visualized or simulated with accurate force fields.
  - TMC1 point mutations that cause deafness have not all been mapped onto the
    gating spring model to explain the mechanistic effect.
related_bridges:

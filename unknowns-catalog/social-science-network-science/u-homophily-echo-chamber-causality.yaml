id: u-homophily-echo-chamber-causality
title: Does social network homophily causally produce echo chambers and political polarization, or do pre-existing attitude differences drive both homophily and polarization simultaneously?
status: open
priority: high
disciplines:
  - social-science
  - network-science
  - political-science
  - computational-social-science
summary: >
  The claim that online social networks create "filter bubbles" (Pariser 2011) and
  contribute to political polarization by promoting homophilous connections has been
  influential but causal evidence is weak. Observational studies show assortativity
  in political views on Twitter, Facebook, and Reddit, but cannot distinguish:
  (1) homophily causes polarization (network structure shapes beliefs), (2)
  polarization causes homophily (pre-existing views determine tie formation), or
  (3) both are driven by third factors (geographic sorting, news consumption).
  Randomized experiments (Bail et al. 2018: exposing conservatives to liberal
  Twitter bots) found no depolarization and possible backfire effects. Network
  assortativity metrics predict information flow speeds between groups but whether
  this asymmetric flow causes attitude change or merely reinforces existing beliefs
  is unresolved.
systematic_gaps:
  - Large-scale field experiments randomly assigning network structure (homophilous vs heterophilous recommendations) and measuring downstream belief change are lacking.
  - The mechanism of echo chamber effects (selective exposure, social proof, algorithmic amplification) has not been disentangled.
  - Cross-platform comparisons of assortativity coefficients and their correlations with offline polarization across countries are limited.
last_reviewed: "2026-05-06"

id: u-optimal-cybersecurity-investment-under-adversarial-uncertainty
title: >
  What is the optimal cybersecurity investment strategy for an organization under
  adversarial uncertainty — when the attacker's capabilities, objectives, and
  rationality are unknown and the defender cannot observe the true threat landscape?
status: open
priority: high
disciplines:
  - cybersecurity
  - game-theory
  - economics
  - decision-theory
summary: >
  Existing cybersecurity investment models use defender-attacker Stackelberg games
  or Gordon-Loeb models (invest where marginal cost = marginal breach probability
  reduction). Both require knowing attacker capabilities and the security production
  function (how investment maps to breach probability). In practice, both are unknown
  and adversarially manipulated. The optimal strategy under such adversarial
  uncertainty (where the attacker actively models the defender) is a minimax robust
  control problem, not a standard optimization. Whether existing security investment
  frameworks (NIST CSF, ISO 27001) approximate optimal play under realistic
  adversarial uncertainty is unknown.
systematic_gaps:
  - No empirical validation of whether real-world security investment levels match
    any game-theoretic equilibrium prediction.
  - The security production function (probability of breach as a function of
    investment level) has not been estimated empirically from breach data at scale.
  - Multi-organization interdependence (security externalities, contagion) is
    theoretically modeled but not empirically estimated for specific sectors.
related_bridges:
  - b-cybersecurity-adversarial-systems
last_reviewed: "2026-05-07"

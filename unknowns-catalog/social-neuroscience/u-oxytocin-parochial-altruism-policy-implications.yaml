id: u-oxytocin-parochial-altruism-policy-implications
title: >
  Are the parochial altruism effects of oxytocin (increased in-group cooperation,
  decreased out-group trust) large enough, robust enough, and manipulable enough
  to have policy-relevant implications for inter-group conflict and diversity-
  cooperation tradeoffs, or are they small-effect laboratory phenomena that do
  not generalise to real social behaviour?
status: open
priority: high
disciplines:
  - social-neuroscience
  - behavioural-economics
  - political-science
  - psychology
summary: >
  Kosfeld et al. (2005) reported that intranasal oxytocin increases trust in a
  one-shot trust game (investors transferred more money to trustees). De Dreu
  et al. (2010) extended this to show that oxytocin specifically increases
  in-group cooperation while decreasing out-group helping — "parochial altruism."
  This has implications for political science theories of ethnic diversity reducing
  social capital (Putnam 2007) and for conflict resolution. However: (1) replication
  attempts have been mixed; (2) effect sizes in meta-analyses are modest (d ~ 0.3-0.5);
  (3) most studies use artificial laboratory groups, not real social identities;
  (4) endogenous oxytocin levels are determined by complex social context, not
  just the neuropeptide in isolation; (5) oxytocin effects on humans are much
  smaller than in rodents where the receptor system is pharmacologically better
  characterised. The key policy question — whether interventions increasing
  oxytocin-mediated bonding (contact hypothesis, shared activities) could reduce
  inter-group hostility — remains unanswered by the current neurobiological evidence.
systematic_gaps:
  - Large-scale pre-registered replications of the de Dreu parochial altruism effect with real (not artificial) social group identities and ecologically valid cooperation tasks have not been conducted.
  - The dose-response relationship between endogenous oxytocin levels (measured by plasma or CSF) and real-world in-group/out-group behaviour has not been established in field studies.
  - Whether the parochial altruism effect is moderated by prior inter-group contact (contact hypothesis) has not been tested — the interaction between social history and oxytocin signalling is unknown.
suggested_hypotheses:
  - >
    The parochial altruism effect of intranasal oxytocin on real-world ethnic group
    cooperation is reduced by ~60% when participants have had high-quality prior
    inter-group contact, measured by standardised contact quality scale — testable
    in a 2x2 (oxytocin/placebo x high/low contact) design with immigrant-host
    community cooperation tasks.
related_bridges:
  - b-social-neuroscience-group-behavior

id: u-topological-insulator-surface-state-interactions
title: How do electron-electron interactions and disorder modify topological surface states in real topological insulators beyond the free-fermion Z2 classification?
status: open
priority: high
disciplines:
  - condensed-matter-physics
  - algebraic-topology
summary: >
  The Z2 topological classification of topological insulators (Bi2Se3, Bi2Te3) is
  established for non-interacting electrons. Real materials have Coulomb interactions
  that can gap the surface states, break time-reversal symmetry through magnetic
  impurities, or drive the surface into exotic strongly-correlated phases. The
  interacting topological classification (using cobordism theory rather than K-theory)
  predicts additional phases absent in the free-fermion case. Key unknowns: (1) under
  what interaction strengths are surface states gapped without breaking topological
  protection, (2) can strongly-interacting topological phases be experimentally realized,
  (3) what is the correct topological invariant for interacting systems?
systematic_gaps:
  - No experimental demonstration of an interacting topological insulator phase beyond the free-fermion paradigm
  - Cobordism classification of interacting SPT phases is mathematically complete but predictions are untested
  - Magnetic topological insulators (MnBi2Te4) show complex behavior not captured by Z2 invariants alone

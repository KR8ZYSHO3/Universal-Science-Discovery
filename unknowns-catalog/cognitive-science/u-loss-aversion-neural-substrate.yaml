id: u-loss-aversion-neural-substrate
title: What is the specific neural circuit implementation of loss aversion, and why does the loss aversion coefficient lambda vary so widely across individuals and contexts?
status: open
priority: medium
disciplines:
  - cognitive-science
  - neuroscience
  - behavioral-economics
summary: >
  Prospect theory specifies a loss aversion coefficient lambda ~ 2 (losses hurt
  approximately twice as much as equivalent gains feel good), but behavioral studies
  show lambda ranges from 1 to 4+ across individuals and contexts. The neural substrate
  remains contested: vmPFC, amygdala, and striatum have all been implicated in
  neuroimaging studies. Key unknowns: (1) is loss aversion a unitary mechanism or
  the product of multiple interacting systems (anticipatory anxiety, regret, and
  hedonic asymmetry), (2) what is the computational implementation in neural circuits,
  (3) can loss aversion be modulated therapeutically (e.g., for financial decisions
  in anxiety disorders)?
systematic_gaps:
  - No causal manipulation (TMS, lesion, pharmacology) has definitively identified the necessary and sufficient circuit for loss aversion
  - Individual differences in lambda are heritable but the genetic architecture is unknown
  - Context-dependence of lambda (framing effects) is not captured by standard prospect theory
related_bridges:

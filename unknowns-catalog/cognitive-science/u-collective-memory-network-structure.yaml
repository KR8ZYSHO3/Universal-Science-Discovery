id: u-collective-memory-network-structure
title: How does the topology of social networks (clustering, path length, centrality) determine the accuracy, stability, and distribution of collective memory across groups?
status: open
priority: medium
disciplines:
  - cognitive-science
  - social-science
  - network-science
summary: >
  Transactive memory theory predicts that groups outperform individuals in memory tasks
  when members have expertise differentiation and know who knows what. However, the
  relationship between social network structure and collective memory accuracy is poorly
  characterized. Key unknowns: (1) does small-world network topology optimize the
  speed-accuracy tradeoff in collective recall, (2) how do hub nodes (highly connected
  individuals) affect memory distortion vs. accuracy, (3) can forgetting curves in
  collective memory be predicted from individual forgetting curves and network structure?
systematic_gaps:
  - Experimental studies of collective memory use small, artificially structured groups; natural social networks are rarely studied
  - The role of repeated retrieval (retrieval-induced forgetting) in collective memory is not characterized at the group level
  - Digital social media as external memory stores fundamentally changes collective memory dynamics, unstudied quantitatively
related_bridges:
  - b-collective-memory-distributed-cognition
last_reviewed: "2026-05-07"

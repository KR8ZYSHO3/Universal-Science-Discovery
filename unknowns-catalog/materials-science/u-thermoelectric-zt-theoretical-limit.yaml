id: u-thermoelectric-zt-theoretical-limit
title: "Is there a fundamental thermodynamic upper bound on the thermoelectric figure of merit zT beyond the Carnot efficiency argument, and what combination of electronic band structure features can approach this bound in a real material?"
status: open
priority: high
disciplines:
  - materials-science
  - thermodynamics
  - condensed-matter-physics
summary: >
  The Onsager framework shows zT is the coupling parameter of the transport matrix, but whether any real
  material can achieve zT >> 3 at room temperature is unknown. Key unknowns: (1) does the Wiedemann-Franz
  law (kappa_e = L*sigma*T) impose a hard upper bound on zT for conventional metals, and can topological
  semimetals with anomalous Lorenz number L beat this bound? (2) What is the theoretical maximum zT for
  a material with optimized band structure (convergent multi-valley band structure plus phonon-glass host),
  and has any material approached it? (3) Can machine-learning-guided high-throughput DFT screening
  identify unknown binary/ternary compounds with zT > 3 at 300 K?
systematic_gaps:
  - First-principles prediction of lattice thermal conductivity kappa_L at high temperature requires anharmonic force constants that are expensive to compute accurately
  - The Seebeck coefficient prediction from DFT Boltzmann transport is sensitive to band structure near the Fermi level; spin-orbit and correlation effects are often underestimated
  - Experimental validation of theoretically predicted high-zT materials faces synthesis and single-crystal characterization bottlenecks
related_bridges:
  - b-thermoelectric-efficiency-seebeck-onsager
last_reviewed: "2026-05-07"

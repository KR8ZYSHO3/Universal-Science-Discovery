id: u-metamaterial-self-assembly-dynamics
title: >
  Can metamaterial function (bandgap, effective medium response, scattering suppression) emerge from self-organized electromagnetic modes without globally imposed periodicity?
status: open
priority: medium

summary: >
  Most metamaterials rely on engineered periodic unit cells. If collective modes in resonator arrays can
  self-organize (see Turing-instability analogy), bulk effective parameters might inherit spatial periods
  set internally rather than by lithography alone. This gap asks whether such “metamaterial morphogenesis”
  is physically realizable and robust to disorder.

systematic_gaps:
  - "Limited experiments reporting spontaneous spatial modulation of eigenmodes independent of fabrication pitch."
  - "Missing statistical characterization of disorder sensitivity versus emergent periodicity."
  - "Unclear manufacturing pathways that preserve needed nonlinear saturation/bistability without dominating linear coupling."

suggested_hypotheses:

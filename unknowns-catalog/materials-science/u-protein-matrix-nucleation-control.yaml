id: u-protein-matrix-nucleation-control
title: How do organic protein matrices quantitatively control crystal polymorph selection and nucleation kinetics during biomineralization?
status: open
priority: high
disciplines:
  - materials-science
  - biophysics
  - structural-biology
summary: >
  Organisms produce crystalline materials (bone, shell, teeth, otoliths) with precise
  polymorph control, orientation, and nano-architecture that synthetic chemists cannot
  replicate. The organic matrix (proteins, glycoproteins, polysaccharides) provides
  a template that lowers the nucleation free energy barrier (ΔG*) for specific
  polymorphs. However, the quantitative relationship between protein sequence, template
  surface geometry, charge distribution, and the resulting nucleation rate and polymorph
  selectivity is unknown. Classic nucleation theory predicts ΔG* reduction from
  surface-crystal interface energy (γ_SL lowering), but the molecular origin of polymorph
  selectivity (e.g., calcite vs. aragonite) is not captured by classical theory.
  Non-classical nucleation pathways (two-step nucleation via amorphous precursors)
  add further complexity.
systematic_gaps:
  - No quantitative structure-activity relationship linking protein sequence features
    to nucleation rate constants for specific mineral polymorphs.
  - The role of protein conformational dynamics (not just static structure) in
    presenting nucleation-active templates is unmeasured.
  - Whether non-classical (two-step) nucleation is the rule or exception in
    biomineralization in vivo remains unclear.
suggested_hypotheses:
  - h-organic-template-lowers-nucleation-barrier

id: u-auxetic-materials-scalable-fabrication-3d
title: >
  Can auxetic 3D metamaterial microgeometries be fabricated at millimeter scale and below with sufficient precision to achieve designed negative Poisson's ratios across multiple deformation axes?
status: open
priority: high
disciplines:
  - materials-science
  - mechanics
summary: >
  Most auxetic materials are fabricated at centimeter scale by foam conversion or laser cutting 2D sheets; achieving truly 3D auxetic behavior (ν < 0 in all three principal directions) at scales relevant for biomedical implants or protective coatings requires nanoscale manufacturing tolerances that are currently at the edge of additive manufacturing capability. Fatigue and creep behavior of auxetic metamaterials under cyclic loading is poorly characterized.

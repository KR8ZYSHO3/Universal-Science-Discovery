id: u-soft-ferrite-nonlinear-permeability-wpt-harmonic-loss
title: >
  How do inverter-generated harmonics and spatial flux bias combine to shift soft-ferrite hysteresis losses in
  consumer wireless chargers beyond manufacturer Steinmetz curves calibrated under sinusoidal excitation?
status: open
priority: medium
disciplines:
  - materials-science
  - electrical-engineering
summary: >
  Regulatory EMI limits gate switching waveforms, yet practical chargers still excite ferrites with rich harmonics.
  Whether dominant extra heating arises from minor hysteresis loops or copper proximity losses remains product-specific.
systematic_gaps:
  - Few public datasets correlating thermal imaging of ferrite tiles with on-board harmonic spectra across brands.
  - Temperature-dependent permeability feedback loops can cause thermal runaway under misalignment — poorly modeled.

suggested_hypotheses:

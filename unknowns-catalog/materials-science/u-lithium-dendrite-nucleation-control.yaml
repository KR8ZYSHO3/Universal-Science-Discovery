id: u-lithium-dendrite-nucleation-control
title: "What conditions deterministically prevent lithium dendrite nucleation in solid-state electrolytes?"
status: open
priority: critical
disciplines:
  - materials-science
  - electrochemistry
  - battery-science
summary: >
  Lithium metal anodes offer theoretical energy densities ~10× higher than graphite
  anodes but suffer from dendrite nucleation: metallic lithium filaments that grow
  through solid electrolytes, causing short circuits and catastrophic battery failure.
  Despite extensive study, the conditions that suppress dendrite nucleation in
  solid-state electrolytes remain unknown. Proposed mechanisms include local current
  density, grain boundary chemistry, residual stress fields, and void formation at the
  anode–electrolyte interface, but no unified model predicts failure conditions across
  electrolyte chemistries (oxides, sulfides, halides). The problem is exacerbated by
  the fact that dendrite initiation occurs at hidden interfaces inaccessible to in situ
  measurement.
systematic_gaps:
  - Operando imaging of dendrite nucleation in solid electrolytes is technically limited
  - Grain boundary chemistry varies with synthesis route and is not controllable at scale
  - Theoretical models disagree on whether dendrites nucleate at surface defects or bulk flaws
  - Stack pressure requirements are poorly specified across electrolyte families
suggested_hypotheses:

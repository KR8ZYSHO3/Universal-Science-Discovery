id: u-capillary-length-contact-line-hysteresis-unified-model
title: >
  Can a single reduced model predict droplet morphology across the competition among capillary length,
  defect pinning distribution, and viscous spreading rate on engineered rough surfaces?
status: open
priority: medium
summary: >
  Practitioners tune texture pitch and chemistry but lack universal charts linking ell_c, hysteresis band,
  and depinning thresholds. This unknown seeks a measurement protocol and dimensionless groups that collapse
  data across fluids.

systematic_gaps:
  - "Limited open datasets pairing 3D surface topography with time-resolved contact-line velocity fields."
  - "Numerical contact-line regularizations obscure comparability across codes."

suggested_hypotheses:
  - h-capillary-wetting-pinning-length-universality-class

related_bridges:

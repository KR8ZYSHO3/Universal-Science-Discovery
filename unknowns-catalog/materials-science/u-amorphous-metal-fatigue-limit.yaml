id: u-amorphous-metal-fatigue-limit
title: "Do metallic glasses have a fatigue limit, and if so what determines it?"
status: open
priority: medium
disciplines:
  - materials-science
  - mechanics
  - amorphous-materials
summary: >
  Crystalline metals exhibit a well-defined fatigue limit (endurance limit) below which
  cyclic stress produces no fatigue failure. Whether metallic glasses (amorphous metals)
  possess a true fatigue limit is unresolved: experimental data show fatigue failure
  across a wide range of stress amplitudes, and the absence of a crystalline dislocation
  mechanism means the standard explanations for fatigue limits do not apply. Shear band
  initiation and propagation govern fatigue in metallic glasses, but the conditions under
  which shear bands arrest versus propagate to failure are not fully understood,
  particularly in notched specimens and complex stress states.
systematic_gaps:
  - Scatter in fatigue data for metallic glasses is an order of magnitude larger than for crystalline alloys
  - The role of free volume vs. structural heterogeneity in shear band nucleation is debated
  - No unified constitutive model exists for cyclic plasticity in metallic glasses
  - Surface effects and residual stress from processing confound bulk fatigue measurements
references:
  - doi: "10.1016/j.pmatsci.2011.03.003"
    note: "Launey et al. — fracture and fatigue of metallic glasses review"
  - doi: "10.1126/science.1150522"
    note: "Ritchie — balance of toughness and strength in metallic glasses"

id: u-high-entropy-alloy-design-principles
title: "What are the fundamental design principles governing phase selection and mechanical properties in high-entropy alloys?"
status: open
priority: high
disciplines:
  - materials-science
  - metallurgy
  - thermodynamics
summary: >
  High-entropy alloys (HEAs) — solid solutions of five or more principal elements in
  near-equimolar ratios — often form single-phase structures despite thermodynamic
  predictions of multi-phase equilibria. The original explanation (entropy stabilization
  of solid solution phases) has been challenged: configurational entropy alone is
  insufficient to explain observed phase behavior, and many HEAs are not thermodynamically
  stable at room temperature but kinetically trapped. Predicting a priori which
  compositions will form single-phase FCC, BCC, or HCP structures, and what mechanical
  properties will result, remains an open inverse design problem. The roles of atomic
  size mismatch, electronegativity differences, valence electron concentration, and
  short-range chemical order are all debated.
systematic_gaps:
  - CALPHAD databases are unreliable for multi-principal-element systems
  - Short-range order effects are invisible to standard DFT supercell approaches
  - The contribution of sluggish diffusion to HEA phase stability is contested
  - Composition-property relationships cannot currently be predicted for novel HEAs

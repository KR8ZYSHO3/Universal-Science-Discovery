id: u-room-temperature-superconductivity-mechanism
title: "What microscopic mechanism could stabilize superconductivity at room temperature and ambient pressure?"
status: open
priority: critical
disciplines:
  - materials-science
  - condensed-matter-physics
  - quantum-physics
summary: >
  Achieving room-temperature superconductivity (Tc ≥ 273 K) at ambient pressure
  remains one of the most consequential unsolved problems in materials science.
  Hydrogen-rich clathrates and hydrides (e.g., LaH10, H3S) have achieved Tc > 200 K
  but only under megabar pressures. The key open question is which pairing mechanism —
  conventional phonon-mediated, unconventional electron-correlation-driven, or some
  hybrid — could deliver strong enough pairing at ambient pressure and what crystal
  architecture would be required. Recent claims of near-ambient superconductivity
  (LK-99, reddmatter) have not reproduced reliably.
systematic_gaps:
  - No consensus on the pairing mechanism in high-Tc cuprates after 40 years
  - Ambient-pressure hydrides destabilize rapidly without extreme confinement
  - The role of electron-phonon coupling vs. strong correlations remains contested
  - No first-principles method reliably predicts Tc above ~50 K

id: u-biomineralization-polymorph-control
title: How do biomineralizing organisms select specific crystal polymorphs (calcite vs. aragonite) during skeleton formation, and can this be replicated synthetically?
status: open
priority: high
disciplines:
  - biomineralization
  - materials-science
  - structural-biology
summary: >
  Calcium carbonate occurs in multiple polymorphs (calcite, aragonite, vaterite).
  Corals and mollusks precisely control which polymorph forms in each layer of their
  skeletons, using protein matrices that stabilize specific polymorphs. Calcite has
  lower solubility (more stable thermodynamically) but aragonite is kinetically
  favored in many biological systems. The organic matrix proteins appear to lower
  the nucleation barrier for the desired polymorph preferentially. However, the
  molecular mechanism — which residues interact with which crystal faces, how
  interfacial energy differences are created, and why the matrix selectivity is so
  sharp — is not understood at atomic resolution. This has major implications for
  biomimetic crystallization in pharmaceutical manufacturing and materials science.
systematic_gaps:
  - Atomic-resolution structures of protein-crystal interfaces during nucleation
    are not available (nucleating crystals are too transient for X-ray crystallography).
  - The role of amorphous precursor phases (ACC — amorphous calcium carbonate) in
    polymorph selection is not quantitatively understood.
related_bridges:
  - b-biomineralization-crystal-nucleation
last_reviewed: "2026-05-06"

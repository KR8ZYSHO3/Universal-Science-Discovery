id: u-biomineralization-polymorph-control
title: >
  What molecular-level mechanisms allow organisms to select specific mineral
  polymorphs (e.g. aragonite over calcite) with near-perfect fidelity, and can
  these mechanisms be engineered into synthetic mineralisation systems?
status: open
priority: high
disciplines:
  - materials-science
  - structural-biology
  - biomineralisation
  - crystal-engineering
summary: >
  Living systems routinely select specific CaCO₃ polymorphs (calcite, aragonite,
  vaterite) and specific crystal orientations with fidelity exceeding synthetic
  crystallisation control. The molecular mechanism is attributed to acidic
  proteins (rich in Asp/Glu/pSer) that lower the interfacial energy γ of one
  polymorph selectively, but the quantitative relationship between protein
  sequence, structure, and γ reduction is poorly understood.

  Key open questions:
  1. Which amino acid sequences and secondary structures achieve maximal γ
     reduction for aragonite vs. calcite — the "polymorph selector" code?
  2. Can synthetic peptides (designed or evolved) replicate native polymorph
     control outside the cellular environment?
  3. What is the quantitative contribution of spinodal (amorphous precursor)
     vs. classical nucleation pathways to polymorph selectivity?
  4. How do organisms maintain polymorph fidelity across generations despite
     genetic variation in mineralisation proteins?
systematic_gaps:
  - Quantitative γ measurements (in situ AFM, surface force apparatus) of
    purified shell proteins against calcite and aragonite crystal faces are
    available for only a handful of proteins (lustrin A, n16, AP7/AP24)
  - Most biomineralisation studies characterise the final crystal product;
    the kinetic pathway (classical vs. two-step via ACC) is tracked in only
    a few model systems (sea urchin, abalone)
  - Computational (MD/DFT) predictions of protein-crystal binding free energies
    remain inaccurate due to force field limitations for mineral-protein interfaces
  - No systematic screen of short peptide motifs for polymorph selectivity has
    been performed using high-throughput crystallisation assays

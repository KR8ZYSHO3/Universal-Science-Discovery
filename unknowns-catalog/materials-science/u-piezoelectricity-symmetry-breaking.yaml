id: u-piezoelectricity-symmetry-breaking
title: "Can high-throughput crystal structure prediction combined with group-theory symmetry screening discover novel lead-free piezoelectric materials with d_33 > 300 pC/N to replace PZT?"
status: open
priority: high
disciplines:
  - materials-science
  - group-theory
  - computational-chemistry
summary: >
  Lead zirconate titanate (PZT) has d₃₃ > 600 pC/N but contains lead, which is
  toxic and being phased out under EU RoHS regulations. Lead-free alternatives
  (BaTiO₃, KNbO₃, BiFeO₃-based systems) achieve d₃₃ < 200 pC/N in most cases,
  insufficient for actuator and sensor applications. Crystal structure prediction
  (CSP) combined with group-theory symmetry analysis (non-centrosymmetric space
  groups) could screen ~10⁶ hypothetical compositions for high d₃₃, but the
  connection between crystal topology (polarization switching barrier, domain
  wall mobility) and macroscopic d₃₃ is not yet predictive from first principles.
  The role of defect chemistry and grain boundary engineering in polycrystalline
  ceramics is especially poorly understood.
systematic_gaps:
  - "First-principles DFT calculations of d_33 are accurate for single crystals but the polycrystalline averaging and domain contribution (d_33^soft) are not routinely included."
  - "The crystal structure prediction landscape for oxide perovskites and Aurivillius phases has not been systematically filtered for piezoelectric symmetry."
  - "High-throughput experimental validation pipelines for piezoelectric screening are not established beyond a few hundred compositions."
related_bridges:
  - b-piezoelectricity-symmetry-breaking
last_reviewed: "2026-05-07"
references:

id: u-quantum-dot-confinement-size-tunability
title: "What are the upper bounds on quantum dot photoluminescence quantum yield and emission linewidth achievable with purely inorganic core-shell architectures, and at what size regime does the Brus particle-in-a-box approximation fail to predict emission energy within 5 meV due to surface reconstruction or many-body correlation effects?"
status: open
priority: medium
disciplines:
  - materials-science
  - quantum-physics
  - nanoscience
summary: >
  Colloidal quantum dots approach unity quantum yield in optimized CdSe/ZnS and InP/ZnSe architectures, but the
  physical limits of linewidth narrowing and the exact size regime where the Brus equation breaks down are not
  established. Key unknowns: (1) do surface passivation defects set a fundamental lower limit on non-radiative
  recombination rate, or can fully inorganic shells achieve lifetime-limited linewidths, (2) at what dot size
  do multi-exciton Coulomb correlations require beyond-Brus DFT treatment for wavelength accuracy, and
  (3) what is the minimum achievable inhomogeneous broadening from size dispersity in scalable synthesis?
systematic_gaps:
  - Single-dot spectroscopy under controlled temperature and electric field is needed to separate homogeneous from inhomogeneous linewidth contributions
  - Systematic comparison of Brus equation predictions vs. DFT vs. tight-binding across size series for non-CdSe dots is lacking
  - Surface reconstruction effects on emission energy are not captured by any widely used analytical model
related_bridges:
  - b-quantum-dots-particle-in-a-box
last_reviewed: "2026-05-07"

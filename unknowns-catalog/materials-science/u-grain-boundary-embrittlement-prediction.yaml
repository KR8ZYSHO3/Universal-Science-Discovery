id: u-grain-boundary-embrittlement-prediction
title: "Can the embrittlement susceptibility of a grain boundary be predicted from its geometric and chemical parameters alone?"
status: open
priority: high
disciplines:
  - materials-science
  - metallurgy
  - computational-materials-science
summary: >
  Grain boundary embrittlement — the loss of ductility caused by segregation of
  impurity atoms (phosphorus, sulfur, hydrogen) to grain boundaries — is a major
  failure mode in structural alloys. Despite decades of study, predicting whether a
  specific grain boundary (characterized by its misorientation, inclination, and
  chemistry) will become embrittled under operating conditions remains unsolved.
  The key challenge is that embrittlement susceptibility depends on the interplay
  between boundary geometry (described by the five macroscopic degrees of freedom),
  local chemistry, and loading conditions in ways that first-principles calculations
  capture only for idealized low-Σ boundaries.
systematic_gaps:
  - DFT grain boundary calculations are limited to low-Σ special boundaries
  - The role of grain boundary structural units vs. planar chemistry is unresolved
  - No transferable interatomic potential captures both geometry and impurity effects reliably
  - Machine-learning potentials have not been validated for rare embrittling configurations

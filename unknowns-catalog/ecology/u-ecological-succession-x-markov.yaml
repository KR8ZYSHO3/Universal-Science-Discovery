id: u-ecological-succession-x-markov
title: Is ecological succession in real ecosystems well-approximated by a time-homogeneous Markov chain (transition probabilities constant over time), or do climate trends, soil development, and species introductions create non-stationary transition matrices that invalidate climax community predictions?
status: open
priority: medium
disciplines:
  - ecology
  - mathematics
  - biology
summary: >
  Classical succession theory (Clements 1916, Horn 1975) assumes a Markov chain with
  time-constant transition probabilities converging to a climax community. However,
  (1) climate change is shifting biome boundaries, invalidating stationary transition
  matrices; (2) soil development during primary succession is not Markovian (soil has
  memory of past vegetation); (3) invasive species can create new states not in the
  original Markov state space. Whether time-varying or non-Markovian generalizations
  are needed for accurate succession prediction, and how to estimate non-stationary
  transition matrices from limited time series, is unresolved.
systematic_gaps:
  - No long-term dataset (>100 years) with regular censusing has tested Markovianity of forest succession at the community level
  - Soil carbon and nitrogen dynamics create ecological memory that violates the Markov assumption; no formal test has been applied
  - Non-stationary Markov succession models have not been fitted to climate-envelope-adjusted transition matrices for any major biome
related_bridges:

id: u-intermediate-disturbance-diversity-peak
title: "Under what community composition, disturbance type, and spatial scale conditions does the Intermediate Disturbance Hypothesis correctly predict a diversity peak, and what ecological mechanisms cause the IDH to fail in communities where competitive exclusion timescales are much shorter than disturbance return intervals?"
status: open
priority: medium
disciplines:
  - ecology
  - nonlinear-dynamics
  - conservation-biology
summary: >
  Meta-analyses of the Intermediate Disturbance Hypothesis show mixed support: some studies find a unimodal
  diversity-disturbance relationship while others find monotonic or no relationship. The conditions under which
  the IDH holds or fails are poorly characterized theoretically and empirically. Key unknowns:
  (1) what is the critical condition on competitive exclusion rate versus colonization rate that determines
  whether a disturbance-diversity peak exists, (2) does the IDH apply at the species level but not the
  functional trait level — could diversity be maximized while functional redundancy is actually minimized,
  (3) for managed ecosystems (forests, grasslands), what disturbance regime (return interval, severity, spatial
  extent) maximizes both species diversity and ecosystem function simultaneously?
systematic_gaps:
  - Most IDH tests measure one community at one time without manipulating disturbance frequency and intensity independently
  - The IDH was developed for tropical forests and coral reefs; its applicability to grasslands, alpine meadows, and microbiomes is untested
  - Competition-colonization tradeoffs are rarely measured directly; their existence is inferred from relative abundance patterns
related_bridges:

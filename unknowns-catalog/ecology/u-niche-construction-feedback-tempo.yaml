id: u-niche-construction-feedback-tempo
title: "How fast does niche construction-driven ecological inheritance alter selection coefficients relative to genetic evolution in natural populations, and what conditions determine whether eco-evolutionary feedbacks accelerate or impede local adaptation?"
status: open
priority: high
disciplines:
  - ecology
  - evolutionary-biology
  - genetics
summary: >
  The extended evolutionary synthesis assigns ecological inheritance a role alongside genetic inheritance, but the
  relative tempo of the two processes in natural populations is rarely quantified. Key unknowns:
  (1) in empirical systems where niche construction is documented (earthworms, beavers, humans), does ecological
  inheritance accelerate local genetic adaptation (reinforcing NC) or stabilize the environment against selection
  (counteractive NC), and how can the modified Price equation be parameterized from field data?
  (2) Under what ecological conditions does the eco-evolutionary feedback loop cycle faster than the genetic
  selection response, creating genotype-environment co-dynamics?
  (3) Does niche construction create predictable signatures in the site frequency spectrum of population genomic
  data that could be detected by population genetics tests?
systematic_gaps:
  - Multigenerational field experiments tracking both allele frequencies and environmental modification simultaneously are extremely rare
  - The ecological inheritance term in the Price equation requires measuring environment transmission between generations, which is technically demanding in most field systems
  - Population genomic signatures of niche construction vs. standard selection are theoretically underdeveloped

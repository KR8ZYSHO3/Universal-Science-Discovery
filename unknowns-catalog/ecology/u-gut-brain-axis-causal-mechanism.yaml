id: u-gut-brain-axis-causal-mechanism
title: >
  What are the quantitative causal mechanisms by which specific gut microbial taxa
  and their metabolites (SCFAs, tryptophan metabolites, LPS) modulate brain function
  and behavior, and can these mechanisms explain the microbiome-depression correlation?
status: open
priority: high
disciplines:
  - ecology
  - microbiology
  - neuroscience
  - psychiatry
  - biochemistry
summary: >
  Epidemiological and germ-free mouse studies demonstrate that gut microbiome
  composition correlates with and causally influences anxiety, depression-like
  behavior, and cognitive function. The gut-brain axis encompasses: (1) vagus nerve
  afferents (80% ascending) that transmit gut signals directly to the brainstem
  (NTS → LC → prefrontal cortex); (2) enteric nervous system (~500 million neurons,
  "second brain") that processes information locally; (3) immune mediators (cytokines
  IL-6, TNF-α released by gut-activated macrophages); (4) metabolic signals —
  short-chain fatty acids (butyrate, propionate, acetate from Firmicutes fermentation)
  cross the blood-brain barrier and act as HDAC inhibitors modulating epigenetic
  state; (5) tryptophan metabolism (gut bacteria control ~90% of serotonin synthesis
  via tryptophan hydroxylase 1 in enterochromaffin cells). The causal mechanisms
  are insufficiently characterized: vagotomy blocks anxiety transfer in FMT
  experiments (Bravo et al. 2011) in some models but not others; the specific
  molecular targets of butyrate in the brain are unknown beyond HDAC inhibition;
  and the bidirectionality (brain → gut signaling via autonomic nervous system)
  confounds causal inference in humans.
systematic_gaps:
  - Quantitative dose-response relationships between specific SCFA concentrations in portal blood and brain gene expression changes
  - Whether vagus nerve or blood-borne metabolites are the dominant route for microbiome-to-brain signaling
  - Identification of the specific gut taxa whose depletion causally predicts depression onset (not just correlation)
  - Mechanism by which stress-induced sympathetic activation alters gut microbiome composition (brain→gut causality)
suggested_hypotheses:

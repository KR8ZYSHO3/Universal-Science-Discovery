id: u-redfield-ratio-evolutionary-origin-mechanism
title: >
  Why do marine phytoplankton maintain a nearly universal C:N:P ratio of 106:16:1
  (Redfield ratio) — is this ratio fixed by universal biochemistry, imposed by
  ocean chemistry feedback, or a contingent evolutionary outcome that could differ
  on other ocean worlds?
status: open
priority: high
disciplines:
  - ecology
  - biogeochemistry
  - evolutionary-biology
  - marine-biology
summary: >
  The Redfield ratio (C:N:P ≈ 106:16:1 atomic) is one of biology's great quantitative
  regularities — phytoplankton across species, ocean basins, and geological epochs
  maintain nearly constant elemental composition. Three competing explanations:
  (1) Universal biochemistry hypothesis: the ratio reflects the stoichiometry of
  universal macromolecules — protein (high N, low P), ribosomal RNA (high P), and
  carbohydrates (C only). The growth rate hypothesis (Elser et al. 1996) predicts
  that organisms with high growth rates need more ribosomes (high P:N ratio), while
  slower-growing organisms are more protein-rich (lower P:N). (2) Ocean chemistry
  feedback (Redfield's own hypothesis): phytoplankton set the N:P ratio of deep water
  by preferentially fixing N₂ when N is limiting (cyanobacteria) and preferentially
  losing N via denitrification when N is in excess — a geochemical feedback that
  drives ocean N:P toward the biological optimum. (3) Evolutionary contingency:
  the ratio may be a historical accident of the ancestors of modern phytoplankton,
  maintained by stabilizing selection. Open questions: Does the ratio vary systematically
  with temperature, depth, or nutrient regime (emerging evidence for plasticity under
  P-stress: C:P can reach 300:1)? Would life on an ocean world with different N:P
  inputs converge to a different Redfield ratio? Can paleoproxies (shale N:P, carbonate
  δ¹⁵N) determine whether the ratio was constant through the Proterozoic oxygenation?
systematic_gaps:
  - The quantitative contributions of biochemical constraint vs. ecological feedback
    vs. evolutionary optimization to setting the Redfield ratio have not been
    disentangled in any model or dataset.
  - Systematic measurement of elemental stoichiometry across the full diversity
    of marine phytoplankton (including uncultured lineages in the Tara Oceans dataset)
    has not been synthesized to test universality vs. taxon-specific variation.
  - Paleoproxy records sufficient to determine whether the Redfield ratio was
    maintained during the Great Oxygenation Event (~2.4 Ga) have not been developed.
related_bridges:
  - b-nutrient-cycling-stoichiometry
last_reviewed: "2026-05-06"

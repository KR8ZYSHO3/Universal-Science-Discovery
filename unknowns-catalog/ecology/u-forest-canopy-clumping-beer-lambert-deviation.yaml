id: u-forest-canopy-clumping-beer-lambert-deviation
title: >
  How much does leaf spatial clumping cause real forest canopies to deviate from Beer-Lambert exponential light extinction, and can this deviation be predicted from stand structure parameters alone?
status: open
priority: high
disciplines:
  - ecology
  - optics
summary: >
  Standard Beer-Lambert canopy models assume random leaf distributions, but most natural forests exhibit strong clumping of leaves within crowns and gaps between crowns, causing understory light availability to be systematically greater than Beer-Lambert predictions. The clumping index Ω varies with species, stand age, and crown architecture, but general predictive models for Ω from remotely sensed stand structure attributes are not available.

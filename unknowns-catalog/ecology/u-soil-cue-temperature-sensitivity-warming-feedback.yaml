id: u-soil-cue-temperature-sensitivity-warming-feedback
title: >
  How does soil microbial carbon use efficiency (CUE) respond to long-term warming
  (+2–4°C), and does microbial thermal adaptation (acclimation of metabolic rates)
  reduce or amplify the initial warming-driven increase in soil CO₂ efflux, determining
  whether the soil carbon climate feedback is transient or persistent over decades?
status: open
priority: critical
disciplines:
  - ecology
  - climate-science
  - microbiology
  - biochemistry
summary: >
  Short-term warming experiments consistently show ~20% increase in soil respiration
  per +3°C (Q₁₀ ≈ 2). Earth system models use this Q₁₀ to project ~55 Gt C release
  by 2100. However: (1) long-term warming experiments (10+ years) show declining
  temperature sensitivity over time — soils "acclimate" — possibly because labile C
  pools are depleted (substrate limitation) or because microbial communities shift to
  higher CUE taxa (thermal adaptation). (2) CUE itself is temperature-sensitive:
  thermodynamic theory predicts CUE decreases with warming (more energy wasted as heat
  at higher T) but empirical measurements are inconsistent. (3) The MEMS framework
  predicts that warming-induced CUE decreases reduce necromass production and
  mineral-associated SOC formation — a positive feedback not captured in simple Q₁₀
  models. Key uncertainty: is the soil CO₂ feedback (55 Gt C) a short-term pulse
  (labile C depletion → attenuation) or long-term sustained loss (CUE decrease +
  mineral association destabilisation → continuous efflux)?
systematic_gaps:
  - Long-term (>10 year) warming experiments that directly measure CUE (not inferred
    from respiration/growth ratios) using ¹³C pulse-labelling at regular intervals are
    lacking; most CUE estimates are from short incubations (<30 days).
  - The role of microbial community compositional change (bacteria vs. fungi ratio,
    specific growth rates) in altering CUE under long-term warming has not been
    quantified with sufficient taxonomic resolution.
  - Organo-mineral association dynamics under warming — does thermal desorption of
    SOC from Fe/Al oxides accelerate at higher temperature? — is not included in any
    Earth system model.
suggested_hypotheses:
  - >
    Microbial communities in long-term warming plots show compositional shifts toward
    oligotrophic taxa (Actinobacteria, Acidobacteria) with inherently higher CUE than
    copiotrophic communities — partially compensating for the thermodynamic CUE decrease —
    resulting in soil carbon release of only 30±10 Gt C by 2100, not 55 Gt C as
    projected by static CUE models.
related_bridges:
  - b-soil-microbiome-carbon-cycling

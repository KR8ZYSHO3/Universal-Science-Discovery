id: u-percolation-threshold-habitat-connectivity
title: Does habitat connectivity in real fragmented landscapes undergo a percolation transition at the theoretically predicted threshold (h_c ~ 0.593 for 2D site percolation), and can finite-size scaling analysis of satellite habitat maps predict minimum viable corridor widths without species-specific movement data?
status: open
priority: high
disciplines:
  - ecology
  - network-science
  - conservation-biology
  - statistical-physics
summary: >
  Site percolation theory predicts a universal critical threshold h_c ~ 0.593 for
  2D square lattice site percolation, below which no landscape-spanning habitat
  corridor exists. Real landscapes are heterogeneous, anisotropic, and finite-sized,
  potentially shifting h_c from the theoretical value. Key unknowns: (1) What is the
  effective percolation threshold in real forest fragmentation data (e.g., Amazon,
  Congo basin) after accounting for landscape anisotropy and boundary conditions?
  (2) Do empirical patch size distributions near the fragmentation threshold exhibit
  the power-law exponent tau ~ 2.05 predicted by 2D percolation theory? (3) Can
  finite-size scaling of small landscape patches predict the minimum habitat fraction
  needed for landscape-spanning connectivity without full-landscape surveys?
  (4) Do different landscape types (forest, wetland, grassland) exhibit different
  universality classes for their fragmentation transitions?
systematic_gaps:
  - No systematic measurement of the power-law exponent of patch size distributions near fragmentation threshold in empirical landscape data
  - No finite-size scaling analysis of real landscapes to estimate the true percolation threshold and universality class
  - Percolation-based predictions for minimum viable habitat fraction not validated against observed species persistence data
related_bridges:

id: u-biodiversity-productivity-relationship
title: "Is the biodiversity-ecosystem productivity relationship hump-shaped, monotonic, or context-dependent — and what mechanism drives the relationship?"
status: open
priority: medium
disciplines:
  - community-ecology
  - macroecology
  - theoretical-ecology
summary: >
  The relationship between species diversity (richness) and ecosystem productivity
  (NPP, biomass) is one of the most studied but contested relationships in ecology.
  Three hypotheses: (1) Complementarity hypothesis: higher diversity provides more
  complete resource use (niche partitioning), increasing productivity monotonically;
  (2) Sampling/selection effect: diverse communities are more likely to contain
  highly productive dominant species, producing a statistical artifact;
  (3) Hump-shaped relationship (Grime's intermediate disturbance hypothesis):
  peak diversity at intermediate productivity, with low diversity at both extremes.
  Meta-analyses (Cardinale et al. 2012, Nature) find that diversity increases
  productivity in controlled experiments but the relationship is weaker in
  observational data. The unknown: is the hump-shaped pattern real in natural
  systems or a spatial-scale artifact? Scaling from plot to landscape changes
  the apparent relationship dramatically.
systematic_gaps:
  - Whether the diversity-productivity relationship is monotonic or hump-shaped depends on spatial scale in ways not yet predicted
  - The relative contribution of complementarity vs. selection effects cannot be separated without trait data
  - Whether the relationship reverses direction at very high productivity (eutrophication) is contested
suggested_hypotheses:
  - At spatial scales where environmental heterogeneity exceeds typical species' niche breadths, the BEF relationship is monotonically positive; at smaller homogeneous scales, selection effects dominate and the relationship is flat
related_unknowns:
  - u-trophic-cascade-predictability
references:

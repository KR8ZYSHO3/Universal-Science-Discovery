id: u-nestedness-stability-causal-mechanism
title: >
  Does the nested structure of mutualistic bipartite networks causally increase
  robustness to extinction cascades, or is nestedness a byproduct of other network
  assembly rules with robustness arising from degree heterogeneity alone?
status: open
priority: high
disciplines:
  - ecology
  - network-science
  - mathematics
summary: >
  Plant-pollinator and plant-seed disperser networks exhibit a characteristic nested
  structure where specialists interact with subsets of what generalists interact with.
  Bascompte et al. (2006) proposed that nestedness increases robustness to species loss
  cascades. However, subsequent work (James et al. 2012) suggests that degree
  heterogeneity alone can explain both nestedness and robustness, making nestedness
  a non-independent predictor. Whether nestedness provides a robustness benefit
  beyond what is already explained by degree distribution remains contested.
systematic_gaps:
  - No empirical test with manipulated nestedness holding degree sequence constant.
  - MaxEnt null models for bipartite networks are contested.
  - Mechanistic models connecting interaction strength distributions to nestedness degree are lacking.
last_reviewed: "2026-05-06"

id: u-keystone-species-identification
title: "Can keystone species be identified from food web structure and interaction strengths before their removal, or only recognized retrospectively?"
status: open
priority: high
disciplines:
  - ecology
  - food-web-ecology
  - conservation-biology
summary: >
  A keystone species has disproportionate impact on ecosystem structure relative to
  its abundance — the defining example being Paine's 1966 sea star removal experiment.
  Despite 60 years of research, identifying keystone species prospectively (before
  removal) remains largely impossible. Current approaches:
  (1) Network centrality: keystone species should have high centrality in the
  interaction network; but centrality measures (betweenness, closeness) do not
  consistently predict keystoneness across systems;
  (2) Interaction strength: species with strong, asymmetric interactions are more
  likely keystones, but measuring interaction strengths requires perturbation experiments;
  (3) Community importance index (Power et al. 1996): ki = (Nk-1)/Nk * prop_diversity_loss,
  but this requires data from before and after removal.
  The fundamental problem: keystoneness is an emergent property of the food web,
  not a species-level trait. Whether there are structural signatures of keystoneness
  detectable without perturbation experiments has not been established.
systematic_gaps:
  - No food web structural signature reliably predicts keystoneness prospectively across ecosystems
  - Whether keystoneness is stable across environmental perturbations or context-dependent is unknown
  - The relationship between keystoneness and species rarity, body size, or trophic position lacks a unified theory
suggested_hypotheses:
  - Keystone species occupy high-centrality positions in the mutualism network (not just the predation network), predictable from plant-pollinator + plant-herbivore combined food web centrality measures with >80% retrospective accuracy
related_unknowns:
  - u-trophic-cascade-predictability
references:

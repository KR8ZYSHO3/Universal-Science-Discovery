id: u-soil-food-web-stability-topology
title: "What network topological properties (connectance, modularity, interaction strength distribution) determine the resistance and resilience of soil food webs to perturbations such as pesticide application, drought, and agricultural intensification?"
status: open
priority: high
disciplines:
  - ecology
  - network-science
  - soil-science
summary: >
  May's complexity-stability paradox predicts that more connected communities should be less stable, yet empirical
  soil food webs maintain function across wide disturbance gradients. Key unknowns: (1) does modularity of the
  soil web (bacterial vs. fungal energy channels) buffer against stability loss at high connectance, (2) how do
  rare but functionally unique taxa (rare biosphere) contribute to food web stability that would not be predicted
  by degree-based metrics alone, and (3) can network robustness metrics predict nutrient cycling collapse
  thresholds under land-use change across different biome types?
systematic_gaps:
  - Standardized sampling protocols for soil mesofauna across biomes do not exist, preventing robust comparative network analysis
  - The interaction strengths in soil food web matrices are typically estimated from steady-state production ratios rather than measured directly
  - Dynamic resilience experiments (press and pulse perturbations) in intact soil food webs are rare outside controlled mesocosm studies
related_bridges:

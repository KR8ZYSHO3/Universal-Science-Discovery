id: u-stoichiometry-food-web-stability
title: "Does stoichiometric mismatch between consumer body C:N:P and food C:N:P destabilize food webs by creating nutrient-recycling feedbacks, and can this explain oscillatory consumer-resource dynamics?"
status: open
priority: medium
disciplines:
  - ecology
  - ecological-stoichiometry
  - theoretical-ecology
summary: >
  Ecological stoichiometry theory (Sterner & Elser 2002) predicts that herbivore
  growth is limited by the nutrient content of their food: when food C:P is high
  (P-poor), herbivores grow slowly and release excess C. This homeostatic regulation
  (Sterner's homeostasis hypothesis) affects nutrient recycling rates and could
  destabilize food webs by creating positive feedbacks: P-limited herbivores grow
  slowly, reducing grazing pressure, allowing phytoplankton to grow, further diluting
  P in algae (making C:P even higher), reinforcing herbivore limitation.
  Loladze et al. (2000, Bulletin of Mathematical Biology) modeled this as the
  "Droop model" with stoichiometric constraints and showed it can produce
  limit cycles (oscillations) not predicted by standard Lotka-Volterra dynamics.
  The unknown: are stoichiometric oscillations real in natural systems, or are they
  suppressed by species diversity, food web complexity, or external nutrient inputs?
systematic_gaps:
  - Stoichiometric limit cycles predicted by Loladze model have not been observed in natural food webs
  - Whether stoichiometric feedbacks strengthen or weaken with increasing food web complexity is unknown
  - The relationship between P-recycling rates and food web stability has not been parameterized across biomes
suggested_hypotheses:
  - Lake food webs with high C:P mismatch (diatom-dominated, low dissolved P) show stoichiometrically-driven phytoplankton-zooplankton oscillations with period ~3-6 weeks, distinguishable from classical predator-prey cycles by the lag structure in C:P ratio
related_unknowns:
  - u-redfield-ratio-evolution-optimality
references:
  - doi: "10.1006/bulm.2000.0201"
    note: "Loladze et al. (2000) Bull. Math. Biol. - stoichiometry and food web oscillations"
last_reviewed: "2026-05-05"

id: u-invasive-species-reaction-diffusion
title: "When do Allee effects make invasion fronts 'pushed' rather than 'pulled', and how does the transition between these regimes affect management control point placement?"
status: open
priority: high
disciplines:
  - ecology
  - mathematics
  - conservation-biology
summary: >
  The Fisher-KPP equation produces 'pulled' invasion fronts whose speed depends
  only on growth rate at low density. When an Allee effect is present (negative
  per-capita growth below threshold A), the bistable reaction-diffusion equation
  produces 'pushed' fronts whose speed c > c* depends on the full nonlinear
  dynamics and initial conditions. The transition between pulled and pushed
  behavior as Allee strength increases is well-characterized mathematically but
  the ecological implications for control are underexplored: pushed fronts are
  more vulnerable to eradication from the rear (removing individuals behind the
  front) while pulled fronts require barrier placement ahead of the front.
  Empirically determining whether a specific invader exhibits an Allee effect
  at low density is difficult.
systematic_gaps:
  - "The critical Allee strength at which an invasion transitions from pulled to pushed has not been calibrated against empirical invasion datasets."
  - "Optimal control of pushed vs. pulled fronts (placement of culling effort) has not been analyzed under budget constraints in realistic heterogeneous landscapes."
  - "Detecting Allee effects in time series data for established invasions is confounded by demographic stochasticity and spatial heterogeneity."
related_bridges:
  - b-invasive-species-reaction-diffusion
last_reviewed: "2026-05-07"
references:
  - doi: "10.1016/j.tree.2009.06.013"
    note: "Hastings et al. (2005) The spatial spread of invasions"

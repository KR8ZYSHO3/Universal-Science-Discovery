id: u-trophic-cascade-motif-universality
title: >
  Do the same network motif signatures predict trophic cascade strength universally across terrestrial, freshwater, and marine food webs, or are motif-cascade relationships ecosystem-specific?
status: open
priority: high
disciplines:
  - ecology
  - network-science
summary: >
  Trophic cascade theory predicts that the removal or addition of apex predators triggers indirect effects propagating through food web structure, but whether the magnitude of these effects is predictable from motif frequency distributions has not been systematically tested across ecosystem types. It is unclear whether tri-trophic chain motif prevalence is a universal predictor or whether omnivory and apparent competition motifs interact differently in aquatic versus terrestrial systems.

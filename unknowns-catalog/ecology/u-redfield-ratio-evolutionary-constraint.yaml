id: u-redfield-ratio-evolutionary-constraint
title: Is the Redfield ratio (C:N:P = 106:16:1) in marine phytoplankton an evolutionary optimum, a physiological constraint, or a community-level emergent property?
status: open
priority: high
disciplines:
  - marine-ecology
  - biogeochemistry
  - evolutionary-biology
summary: >
  The Redfield ratio (C:N:P ≈ 106:16:1) of marine phytoplankton biomass closely
  matches the stoichiometry of dissolved nutrients in deep ocean water. Whether
  this reflects evolutionary optimization (organisms evolve to match available
  resources), a fundamental biochemical constraint (ribosomes have fixed N:P),
  or community-level selection across species with different stoichiometries is
  debated. Recent data show significant deviations from Redfield stoichiometry
  in oligotrophic gyres, polar regions, and under nutrient stress. The growth
  rate hypothesis (Sterner & Elser) links high P content to ribosomal RNA
  demands during rapid growth, but this does not explain the stability of the
  ratio across ocean basins. The mechanistic basis for Redfield stoichiometry
  remains an open question with major implications for biogeochemical cycling
  models under climate change.
systematic_gaps:
  - No quantitative mechanistic model successfully predicts Redfield deviations
    from first principles (temperature, light, nutrient availability).
  - The relative contributions of physiological flexibility vs. community composition
    shifts to observed stoichiometric variation are unmeasured at global scale.
  - Whether the deep ocean Redfield ratio is a cause or consequence of phytoplankton
    stoichiometry remains debated (co-evolutionary hypothesis untested).
suggested_hypotheses:
  - h-liebig-minimum-generalizes-le-chatelier

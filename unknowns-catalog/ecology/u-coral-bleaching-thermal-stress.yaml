id: u-coral-bleaching-thermal-stress
title: "What is the molecular mechanism by which Symbiodiniaceae clade D confers ~1-2°C higher thermal tolerance to coral hosts, and can this tolerance be transferred to bleaching-susceptible clades via synthetic biology?"
status: open
priority: critical
disciplines:
  - ecology
  - marine-biology
  - molecular-biology
  - climate-science
summary: >
  Coral reefs face near-certain mass bleaching at 2°C of global warming under
  current trajectories. Clade D Symbiodiniaceae confer greater thermal tolerance
  but at a cost of reduced photosynthetic efficiency under non-stressful conditions
  (growth-resilience tradeoff). The molecular basis of clade D's thermal tolerance
  is incompletely characterized: candidate mechanisms include more heat-stable
  thylakoid membranes, superior antioxidant enzymes (MnSOD, ascorbate peroxidase),
  and different ROS signaling pathways. Transferring clade D thermal tolerance
  to more photosynthetically efficient clades via CRISPR or synthetic biology
  has not been demonstrated. Assisted evolution (selective breeding under heat
  stress) has produced moderately more tolerant symbionts (+0.5°C) in lab settings.
systematic_gaps:
  - "Comparative transcriptomics of clade D vs. clade C under heat stress has identified candidate tolerance genes but none have been functionally validated by knockout/overexpression."
  - "The thermotolerance-photosynthesis tradeoff has not been quantified across a wide enough panel of Symbiodiniaceae strains to establish whether all high-tolerance strains pay the same growth cost."
  - "Assisted evolution protocols for producing CITES-compliant, field-deployable thermotolerant symbionts have not been developed or regulated."
related_bridges:
  - b-coral-bleaching-thermal-stress
last_reviewed: "2026-05-07"
references:
  - doi: "10.1126/science.1155485"
    note: "Hughes et al. (2018) Mass bleaching of corals in the Anthropocene"

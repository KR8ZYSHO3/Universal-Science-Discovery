id: u-lcs-retention-coastal-recruitment-transfer
title: >
  How often do Lagrangian coherent-structure retention metrics outperform simpler Eulerian frontal indices for predicting coastal larval settlement when species-specific vertical migration and mortality are included?
status: open
priority: medium
disciplines:
  - marine-ecology
  - oceanography
summary: >
  Passive FTLE diagnostics excel when larvae behave like tracers over pelagic larval duration; behavioral modulation and stage-dependent mortality can erase apparent retention signatures inferred from circulation alone.
systematic_gaps:
  - Paired settlement surveys + high-resolution circulation ensembles with species-specific PLD priors for rigorous skill scoring.
  - Standardized metrics comparing LCS-based retention integrals to alongshore distance-based proxies across ecosystems.
suggested_hypotheses:
  - h-ftle-ridge-threshold-correlates-larval-retention-proxy
related_bridges:
  - b-lcs-retention-zone-x-coastal-larval-supply
last_reviewed: "2026-05-07"
references:
  - doi: "10.1016/j.physd.2005.10.007"
    note: Haller (2005) — LCS definitions and hyperbolic trajectory framework (Physica D).
  - doi: "10.3354/meps260083"
    note: Siegel et al. (2003) — Lagrangian larval dispersion framing (MEPS).

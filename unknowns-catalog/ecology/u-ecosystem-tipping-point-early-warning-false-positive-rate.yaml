id: u-ecosystem-tipping-point-early-warning-false-positive-rate
title: What is the false positive rate of critical slowing down early warning signals (rising variance and AR(1)) for ecosystem tipping points, and under what conditions do EWS fail to detect impending fold bifurcations in ecological time series?
status: open
priority: high
disciplines:
  - ecology
  - statistics
  - nonlinear-dynamics
  - environmental-science
  - management-science
summary: >
  Critical slowing down (CSD) early warning signals (EWS) — rising lag-1
  autocorrelation and variance — predict fold bifurcations in theory and have
  been validated in laboratory and some field studies. However, the operational
  false positive and false negative rates under realistic ecological monitoring
  conditions are poorly quantified. Problems include: (1) EWS require
  stationary noise; many ecosystems have non-stationary forcings (seasonal
  cycles, climate trends) that produce spurious EWS signals. (2) Multiple
  types of bifurcations (fold, transcritical, Hopf) produce different EWS
  signatures; confounding these leads to misclassification. (3) Short time
  series (typical ecological monitoring: 20-50 years) provide insufficient
  power to detect gradual EWS trends before the transition. (4) Alternative
  non-bifurcation explanations for increased variance (environmental variance
  increase, regime shift driven by stochastic forcing without fold bifurcation)
  cannot be distinguished from genuine CSD EWS in observational data. For
  policy use, the asymmetry between costs of false alarms (premature intervention)
  and missed warnings (irreversible ecosystem loss) requires precise false
  positive / false negative rate estimates that do not currently exist.
systematic_gaps:
  - A systematic meta-analysis of EWS performance (AUC, sensitivity, specificity) across all published empirical ecosystem transitions has not been conducted with standardised methods; existing meta-analyses have methodological inconsistencies.
  - The statistical power of standard EWS tests (Kendall's τ on variance and AR(1) trend) as a function of time series length, noise level, and distance to bifurcation has not been fully characterised analytically; only Monte Carlo results exist for specific model systems.
  - Methods to distinguish CSD from non-bifurcation EWS mimics (non-stationarity, stochastic transitions) using only the observed time series have not been validated in field datasets.
suggested_hypotheses:
  - For typical ecological monitoring time series (≤ 50 years, annual resolution), standard CSD EWS have true positive rate < 0.6 and false positive rate > 0.3, making them insufficient for management decisions without supplementary mechanistic modelling.

id: u-trophic-cascade-predictability
title: "Can trophic cascade strength be predicted from food web topology and body-size ratios, or is it inherently unpredictable from species-level traits?"
status: open
priority: high
disciplines:
  - ecology
  - food-web-ecology
  - theoretical-ecology
summary: >
  Trophic cascades — indirect effects of predators on plant biomass via suppression
  of herbivores — are among the most important ecological phenomena for ecosystem
  management. Terborgh (1999) and Estes (2011) documented strong trophic cascades
  following apex predator loss (wolves reintroduced to Yellowstone, shark depletion
  in ocean), but the strength of these cascades varies enormously across systems.
  Two questions: (1) Predictability: what food web properties (connectance, body-size
  ratio, number of trophic levels, proportion of omnivores) predict strong vs. weak
  cascades? Empirical meta-analyses (Borer et al. 2005) show that cascade strength
  is highly variable, and the predictors explain <50% of variance; (2) Mechanism:
  does cascade strength depend primarily on trait-mediated indirect effects
  (predator changes prey behavior, not just density) or density-mediated effects?
  If behavior (fear responses) dominates, simple food web models based on density
  feedbacks are insufficient. The urgency: trophic cascade failure in overexploited
  marine and terrestrial systems is a conservation crisis, and intervention design
  requires predictive theory.
systematic_gaps:
  - No mechanistic model predicts trophic cascade strength from food web topology with >70% accuracy
  - The relative contribution of trait-mediated vs density-mediated effects is not quantified across systems
  - How omnivory and intraguild predation attenuate cascade strength has no quantitative theory
suggested_hypotheses:
  - Trophic cascade strength (log plant biomass increase per log apex predator density) scales as body_mass_ratio^{0.75} * connectance^{-1}, combining metabolic scaling theory with food web complexity
related_unknowns:
  - u-ecology-resilience-spatial-indicator
references:
  - doi: "10.1126/science.1205106"
    note: "Estes et al. (2011) Science - trophic downgrading of planet Earth"
last_reviewed: "2026-05-05"

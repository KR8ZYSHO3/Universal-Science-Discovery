id: u-lyme-ohio-surveillance-gap
title: >
  What is the true epidemiological landscape of Lyme disease in Ohio and the
  Great Lakes region, and how does Scioto River watershed tick habitat connect
  to human exposure risk — given that passive surveillance captures only ~10%
  of actual cases?
status: open
priority: high
disciplines:
  - ecology
  - epidemiology
  - public-health
  - vector-biology
  - climate-science
summary: >
  Ohio and the broader Great Lakes region are experiencing rapid increases in
  Lyme disease incidence driven by northward and westward range expansion of
  Ixodes scapularis (the black-legged tick). However, Ohio's official reported
  Lyme disease case counts dramatically underestimate the true burden: passive
  case reporting (requiring physician diagnosis and laboratory confirmation)
  captures approximately 10% of actual infections (Kugeler et al. 2021 estimate
  for national surveillance; Ohio is likely similar or worse given historically
  lower clinician awareness of Lyme disease as a local risk).

  The Scioto River watershed and adjacent forested areas (Hocking Hills State
  Park, Wayne National Forest, Shawnee State Forest) in southeastern Ohio provide
  habitat conditions suitable for Ixodes scapularis establishment — mesic forest
  with white-tailed deer populations, white-footed mice, and deciduous leaf litter
  providing tick overwintering habitat. Despite this, systematic tick surveillance
  data (drag-cloth sampling for nymph density and Borrelia infection rates) is
  sparse or absent from much of this region.

  Without accurate epidemiological data, Ohio physicians are under-trained to
  suspect Lyme disease in local patients; insurance companies may deny treatment;
  public health agencies lack data to justify prevention campaigns; and researchers
  cannot model the spread trajectory or test interventions. The surveillance gap
  is both a scientific and public health failure.

  This is directly relevant to the USDR community: a US Marine veteran in this
  project's community was diagnosed with Lyme disease, plausibly acquired in the
  expanding tick habitat of the Great Lakes/Midwest region.
systematic_gaps:
  - No systematic active tick surveillance (drag-cloth sampling for nymph density + Borrelia infection rate) has been conducted across the Scioto River watershed, Hocking Hills, or Wayne National Forest areas
  - Ohio Department of Health Lyme disease case counts are not corrected for the ~10x underreporting factor, leading to systematically underestimated true incidence
  - Deer population density maps (from ODNR) have not been spatially integrated with tick habitat suitability models for southeastern Ohio
  - Climate projections (IPCC AR6) for tick habitat expansion have not been downscaled to Ohio county-level resolution for public health planning
  - No patient-level survey study has been conducted in Ohio to estimate the proportion of Lyme-consistent illness that is not diagnosed or attributed to Lyme disease

id: u-environmental-justice-cumulative-impact-assessment-methodology
title: >
  What is the appropriate methodology for cumulative environmental impact assessment
  in environmental justice contexts — how should multiple simultaneous burdens
  (air pollution, noise, flooding, heat, food access, healthcare) be combined into
  a single index that supports regulatory action without masking within-population
  heterogeneity?
status: open
priority: high
disciplines:
  - ecology
  - social-science
  - public-health
  - environmental-science
  - statistics
summary: >
  Environmental justice research has demonstrated that environmental burdens are
  non-randomly distributed by race and class. However, regulatory application of
  EJ principles requires quantitative cumulative impact scores that can prioritize
  sites for remediation, trigger regulatory scrutiny, or require environmental
  impact statements. California's CalEnviroScreen, EPA's EJScreen, and NYC's
  cumulative impact tool use different methodologies: linear combinations of z-scores,
  product of pollution burden × population vulnerability, or weighted quantile sums.
  Key unresolved issues: (1) How should pollution burdens measured in different
  units (µg/m³, dB, °C, flood return period) be combined — linear addition assumes
  independence, but many burdens are correlated (urban heat + air pollution + lack
  of green space). (2) Should the index combine pollution burden with social
  vulnerability, or rank on pollution burden alone with social context provided
  separately? (3) Health data (asthma rates, life expectancy) directly measures
  cumulative impact but has high uncertainty at small-area level and lags behind
  pollution changes. (4) Intersectionality: EJ impacts are not identical for all
  people of color — Black, Hispanic, Indigenous, and Asian communities face
  different hazard mixes. A single race/class index may mask within-population
  heterogeneity. No consensus methodology exists across jurisdictions.
systematic_gaps:
  - Causal inference methods (instrumental variables, difference-in-differences)
    for estimating the health burden attributable to environmental injustice
    specifically (controlling for correlated socioeconomic factors).
  - "Longitudinal EJ index validation: does a high index score predict future
    health outcomes after controlling for baseline health and SES?"
  - Bayesian hierarchical models for small-area EJ estimation that propagate
    measurement uncertainty and borrow strength across geographic units.
  - Community-based participatory research on which burdens affected communities
    prioritize — necessary for legitimate index construction.
suggested_hypotheses:
  - >
    CalEnviroScreen and EPA EJScreen will rank census tracts in the same quintile
    in <60% of cases when applied to the same geographic area, demonstrating
    that current cumulative impact methodology differences are too large for
    the indices to serve as consistent regulatory standards without harmonization.

id: u-ecology-x-coexistence-theory
title: Can the storage effect quantitatively predict biodiversity loss under climate change (reduced temporal variance and
  altered autocorrelation) in empirical plant communities, and is the stabilising niche difference measurable in situ?
status: open
priority: high
disciplines:
- biology
- mathematics
- ecology
summary: Modern coexistence theory predicts that climate change could reduce temporal environmental variance, weakening the
  storage effect and promoting competitive exclusion. However, empirically measuring Chesson's MCT parameters (Δi, ηi, storage
  effect magnitude) in real communities requires long-term population data with individually tracked plants — data that is
  scarce. Whether MCT can make quantitative predictions for community-level biodiversity responses to climate change is the
  central empirical challenge of the field.
systematic_gaps:
- Empirical measurements of MCT parameters (Δi, ηi) in real communities are available for fewer than 20 species pairs
- Whether the storage effect is sufficient to maintain diversity under projected climate change autocorrelation shifts is
  unquantified
- MCT assumes stable coexistence but most natural communities are in non-equilibrium transient states

id: u-digital-commons-governance-principles
title: Do Ostrom's eight design principles for sustainable common pool resource governance apply to digital commons (open-source software, Wikipedia, scientific data repositories), and what adaptations are required?
status: open
priority: high
disciplines:
  - ecology
  - social-science
  - economics
  - information-science
summary: >
  Ostrom's design principles were derived from physical CPRs (fisheries,
  forests, irrigation systems) where resources are subtractable (one person's
  use reduces availability) and spatially bounded. Digital commons have
  non-rival goods (code is not depleted by use) but subtractable attention,
  contributor time, and community bandwidth. Early research (Schweik & English
  2012) suggests some principles apply (defined contribution norms, graduated
  sanctions for vandalism) but others require adaptation (boundaries are
  unclear in open source; "local conditions" are difficult to define for
  global communities). The governance crises in major open-source projects
  (OpenSSL, Log4j, XZ) and Wikipedia's declining editor diversity suggest
  that current digital commons governance is fragile in ways that Ostrom's
  framework might diagnose and address.
systematic_gaps:
  - No large-scale quantitative study has systematically coded Ostrom's eight principles across hundreds of open-source projects and correlated them with sustainability outcomes.
  - Digital commons governance often lacks graduated sanctions — banning is all-or-nothing, unlike Ostrom's graduated fines.
  - The interaction between open-source governance and commercial appropriation (companies free-riding on open-source) has no clear analog in physical CPR governance.
last_reviewed: "2026-05-06"

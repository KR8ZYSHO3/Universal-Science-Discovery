id: u-ecosystem-engineer-legacy-effects
title: "Do ecosystem engineers (beavers, elephants, earthworms) leave persistent legacy effects detectable centuries after their removal, and can these legacies be quantified from soil and sediment records?"
status: open
priority: medium
disciplines:
  - ecology
  - paleoecology
  - conservation-biology
summary: >
  Ecosystem engineers physically modify habitats in ways that affect biodiversity
  and ecosystem function. Beavers create ponds that alter hydrology, sediment
  retention, and plant community structure. Their legacy effects (pond sediments,
  altered water tables, enriched soils) can persist for decades to centuries after
  beaver extirpation. Jones et al. (1994) formalized ecosystem engineering theory,
  but the quantitative persistence of engineer legacies across multiple ecosystem
  types has not been systematically measured. This matters for conservation:
  if beaver reintroduction can restore ancient legacy landscapes, the benefit is
  much larger than current population impact alone. Similarly, African elephant
  habitats retain structural signatures of megafaunal presence for 100+ years.
  The unknown: is there a universal decay timescale for engineer legacies as a
  function of engineer body size, legacy type (physical vs chemical), and
  disturbance frequency?
systematic_gaps:
  - No universal model predicts engineer legacy persistence time from species traits
  - Paleoecological records of engineer legacies are sparse and rarely quantitatively analyzed
  - Whether reintroduced engineers can activate dormant legacies (dormant seeds, preserved sediments) has not been tested experimentally
suggested_hypotheses:
  - Ecosystem engineer legacy persistence time (years) scales as body_mass^{0.5} * legacy_intensity / disturbance_rate, giving beavers ~50-200 year legacies and elephants ~200-500 year legacies
related_unknowns:
  - u-trophic-cascade-predictability
  - u-keystone-species-identification
references:
  - doi: "10.1006/jtbi.1994.1187"
    note: "Jones et al. (1994) - ecosystem engineering concept"
last_reviewed: "2026-05-05"

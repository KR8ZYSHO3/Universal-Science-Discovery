id: u-seed-dispersal-levy-flight
title: "Do empirical seed dispersal kernels have genuine power-law tails consistent with Lévy flights, or are they better described by composite exponential models that mimic fat tails over limited observation scales?"
status: open
priority: medium
disciplines:
  - ecology
  - statistical-physics
  - statistics
summary: >
  Distinguishing a true power-law dispersal kernel from a composite exponential
  model (mixture of short-distance and occasional long-distance dispersal) requires
  sampling across many orders of magnitude in distance — often impossible in practice.
  Most dispersal studies only track seeds up to ~100–1000m from the parent, missing
  the tail behavior that dominates invasion speed. Genetic approaches (parentage
  assignment from SNP markers) can detect LDD events but have detection limits
  that make tail exponent estimation unreliable. Whether the Lévy flight
  analogy is mechanistically justified (as arising from animal movement patterns
  and gut retention time distributions) or merely descriptive is unresolved.
systematic_gaps:
  - "No dispersal study has tracked seeds across scales from 1m to 100km needed to distinguish power-law vs. exponential tails with statistical confidence."
  - "The physical mechanism connecting animal gut retention time distribution to seed dispersal kernel shape has not been tested quantitatively across species pairs."
  - "Lévy exponent estimates from the same datasets using different statistical methods (MLE vs. rank plots) give inconsistent results."
related_bridges:
  - b-seed-dispersal-levy-flight
last_reviewed: "2026-05-07"
references:
  - doi: "10.1086/285551"
    note: "Clark (1998) Why trees migrate so fast"

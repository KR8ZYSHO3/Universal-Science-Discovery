id: u-bet-hedging-correlation-structure-across-taxa
title: How empirically structured are environmental covariance tensors governing bet hedging versus portfolio analogies across marine vs terrestrial vs microbial taxa?
status: open
priority: medium
disciplines:
  - ecology
  - evolutionary-biology
summary: >
  Portfolio diversification analogies hinge on correlation decay across assets or offspring lines;
  ecology tracks temporal autocorrelation of rainfall and spatial synchrony of disturbances — yet meta-analyses rarely estimate full tensors comparable to financial covariance estimation pipelines.
systematic_gaps:
  - Sparse long-term datasets coupling demographic variance decomposition with climate modes across replicate populations
  - Microbial laboratory evolution studies measuring geometric mean fitness without field correlation structure
suggested_hypotheses:
  - h-bet-hedging-x-portfolio-diversification
related_bridges:
  - b-bet-hedging-x-portfolio-diversification
last_reviewed: "2026-05-07"
references:
  - doi: 10.1086/284072
    note: Cohen classic diversification of risk in ecology

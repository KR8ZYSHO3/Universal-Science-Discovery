id: u-soil-carbon-cue-temperature-response
title: How does microbial carbon use efficiency respond to warming, and will the negative CUE-temperature relationship cause soil carbon stocks to decline faster than current models predict under climate change?
status: open
priority: critical
disciplines:
  - ecology
  - thermodynamics
  - climate-science
summary: >
  Carbon use efficiency (CUE = biomass carbon / substrate carbon) determines how much
  soil carbon is sequestered vs. respired as CO2. Experimental evidence suggests CUE
  decreases with warming (higher maintenance energy demands relative to growth), which
  would create a positive climate feedback (warming -> lower CUE -> more CO2 release
  -> further warming). Key unknowns: (1) what is the sign and magnitude of dCUE/dT
  across soil types and microbial communities, (2) do microbial communities thermally
  adapt their CUE over time, (3) how does the CUE-temperature response interact with
  changes in substrate quality as climate changes?
systematic_gaps:
  - Direct measurements of CUE are technically challenging; most estimates use indirect proxies (specific respiration rates)
  - Long-term thermal adaptation of soil microbial communities alters their CUE-temperature relationship; this is ignored in most models
  - The spatial heterogeneity of soil CUE across biomes is understudied relative to its importance for global carbon budgets
related_bridges:

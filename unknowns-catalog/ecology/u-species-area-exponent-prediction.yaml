id: u-species-area-exponent-prediction
title: Can the species-area exponent z be predicted from first principles given only the fractal dimension of habitat patches and the dispersal kernel of target species?
status: open
priority: high
disciplines:
  - macroecology
  - landscape-ecology
  - statistical-physics
summary: >
  The species-area exponent z ≈ 0.25 is remarkably consistent across taxa and biomes,
  but deviations are observed and poorly understood. Percolation theory predicts that z
  should depend on the fractal dimension of habitat and the dispersal distance relative
  to patch size. No analytical formula linking z to measurable landscape properties
  has been derived. Conservation biology needs z predictions for novel landscapes
  (restored, fragmented, climate-shifted) where empirical data are unavailable.
systematic_gaps:
  - No predictive model for z from landscape structure exists that has been validated
    across multiple independently sampled landscapes.
  - Whether z is universal (same for all taxa in the same landscape) or taxon-specific
    (depending on dispersal distance) has not been resolved.
related_bridges:
  - b-island-biogeography-percolation
last_reviewed: "2026-05-06"

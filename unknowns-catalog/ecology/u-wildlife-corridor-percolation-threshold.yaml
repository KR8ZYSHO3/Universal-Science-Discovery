id: u-wildlife-corridor-percolation-threshold
title: Does the percolation threshold (~59% suitable habitat for square grids) accurately predict landscape-scale connectivity collapse for real species in real landscapes, and how does matrix permeability modify the effective threshold?
status: open
priority: high
disciplines:
  - landscape-ecology
  - conservation-biology
  - network-science
  - spatial-statistics
summary: >
  With & Crist (1995) showed that arthropod movement changes qualitatively near the
  theoretical percolation threshold p_c ≈ 0.59 for square grids. However, real landscapes
  are not square grids: (1) the matrix between habitat patches is not uniform — roads,
  farms, and riparian areas vary continuously in permeability; (2) different species have
  different perception of "suitable habitat" and matrix hostility; (3) the threshold for
  directed (motivated) movement may differ from percolation theory, which assumes random
  walkers; (4) landscape change is dynamic — habitat loss is often gradual rather than
  random, meaning real landscapes may cross the threshold earlier or later than random
  removal models predict. The practical conservation question is whether there is a
  universal connectivity threshold that triggers management intervention, or whether
  species-specific resistance surfaces produce species-specific effective thresholds.
  Circuit theory (McRae 2008) avoids the binary suitable/unsuitable dichotomy but
  has not been tested against empirical connectivity data at scale.
systematic_gaps:
  - Empirical validation of circuit theory vs. least-cost path connectivity predictions using actual genetic data (FST, assignment tests) across multiple species in the same landscape is rare.
  - The relationship between landscape graph topology (Fiedler eigenvalue) and population viability (MVP analysis) has not been established empirically.
  - Dynamic percolation models that account for gradual habitat loss (not random removal) have not been tested against real habitat fragmentation trajectories.
last_reviewed: "2026-05-06"

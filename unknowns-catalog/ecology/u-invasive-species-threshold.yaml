id: u-invasive-species-threshold
title: "Is there a universal population density threshold above which invasive species become impossible to eradicate, and what biological traits determine this threshold?"
status: open
priority: high
disciplines:
  - invasion-biology
  - population-ecology
  - conservation-biology
summary: >
  Invasive species management faces a fundamental unknown: at what population density
  or spatial extent does eradication become impossible or economically unfeasible?
  The Allee effect theory suggests that populations below a critical density collapse
  spontaneously, so eradication below this threshold is self-reinforcing. Above the
  threshold, populations grow, making eradication require sustained suppression.
  However: (1) the Allee threshold is poorly measured for most invasive species;
  (2) whether a "point of no return" exists beyond which eradication is fundamentally
  impossible (not just economically impractical) is unknown; (3) the relationship
  between species traits (dispersal rate, reproductive rate, niche breadth) and the
  eradication threshold has no predictive theory. Percolation theory offers a physical
  analog: an invasive species population above the percolation threshold forms a
  spanning cluster that reconnects even when local populations are removed, analogous
  to connected percolation. If the invasion follows percolation dynamics, the
  eradication threshold is the percolation critical density p_c.
systematic_gaps:
  - No universal formula predicts eradication threshold from species traits and habitat connectivity
  - Whether invasion percolation dynamics match ecological data across >10 taxa has not been tested
  - The role of spatial heterogeneity (refugia, corridors) in determining effective percolation threshold is unquantified
suggested_hypotheses:
  - "Invasive species eradication becomes impossible when population connectivity exceeds the percolation threshold: the critical patch occupancy fraction p_c is predictable from dispersal distance / habitat patch size using mean-field percolation theory"
related_unknowns:
  - u-habitat-fragmentation-threshold
  - u-ecology-resilience-spatial-indicator
references:

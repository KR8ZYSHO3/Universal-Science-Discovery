id: u-allelopathy-invasive-plant-mycorrhizal-disruption
title: >
  What is the quantitative relationship between invasive plant allelochemical
  concentration in soil and the degree of mycorrhizal network disruption,
  and can mycorrhizal inoculation or rhizobacterial biofilms restore native
  plant competitive ability against allelopathic invaders?
status: open
priority: high
disciplines:
  - ecology
  - chemistry
  - microbiology
summary: >
  The "novel weapons hypothesis" (Callaway & Ridenour 2004) proposes that invasive
  plants gain competitive advantage partly through allelochemicals to which native
  competitors have not co-evolved tolerance. Garlic mustard (Alliaria petiolata)
  releases benzyl isothiocyanate that disrupts arbuscular mycorrhizal fungi (AMF)
  critical for native tree seedling establishment. However, the dose-response
  relationship between isothiocyanate soil concentration and AMF spore germination,
  hyphal growth, and colonisation rate has not been fully characterised. Moreover,
  whether native plant competitive ability can be restored by (a) inoculating with
  isothiocyanate-tolerant AMF strains, (b) introducing rhizobacteria that degrade
  isothiocyanates (Rhodococcus spp. with nitrile hydratase), or (c) planting
  tolerant native species as AMF network bridges has not been tested in field conditions.
  The spatial scale of mycorrhizal network disruption — whether it is limited to the
  immediate rhizosphere or propagates through common mycorrhizal networks (CMNs)
  across forest patches — is also unknown.
systematic_gaps:
  - No full dose-response curve for isothiocyanate → AMF colonisation inhibition
    across ecologically relevant soil types and AMF species.
  - Field-scale mycorrhizal network disruption by garlic mustard has been hypothesised
    but not directly measured using isotope tracer or eDNA methods.
  - Restoration experiments using isothiocyanate-degrading rhizobacteria have not
    been published in peer-reviewed literature.
related_bridges:

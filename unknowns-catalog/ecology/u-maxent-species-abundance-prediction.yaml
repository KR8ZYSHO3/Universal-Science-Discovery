id: u-maxent-species-abundance-prediction
title: Can maximum entropy (MaxEnt) models reliably predict species abundance distributions and community structure from macroecological constraints alone?
status: open
priority: medium
disciplines:
  - ecology
  - information-theory
  - macroecology
summary: >
  The Maximum Entropy Theory of Ecology (METE, Harte 2011) derives species abundance
  distributions (SAD), species-area relationships (SAR), and energy distributions by
  maximizing information entropy subject to macroecological state variables (total
  species S0, total individuals N0, total metabolic energy E0). METE makes parameter-free
  predictions that match empirical SADs in many systems (plants, birds, soil invertebrates).
  However, METE fails in systems with strong environmental gradients, disturbance, or
  non-equilibrium dynamics. The fundamental open question is: under what conditions is
  MaxEnt ecology predictive, and what additional constraints (beyond S0, N0, E0) are
  needed for dynamic, non-equilibrium systems? The connection to Jaynes' MaxEnt
  principle in statistical physics (which also holds only at equilibrium) suggests
  that METE's successes and failures map onto the equilibrium vs. non-equilibrium
  distinction in statistical mechanics.
systematic_gaps:
  - METE's predictive accuracy across biome types, taxonomic groups, and disturbance
    gradients has not been comprehensively tested with consistent methodology.
  - No formal theory identifies which additional ecological constraints (trait distributions,
    phylogeny, spatial structure) should be added to MaxEnt for non-equilibrium communities.
  - The relationship between the METE equilibrium assumption and successional dynamics
    (time to reach 'ecological equilibrium') has not been measured.

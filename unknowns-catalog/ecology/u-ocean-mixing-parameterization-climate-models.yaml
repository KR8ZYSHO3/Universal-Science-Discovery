id: u-ocean-mixing-parameterization-climate-models
title: How should spatially and temporally variable diapycnal mixing be parameterized in global climate models to reduce the principal source of centennial ocean circulation uncertainty?
status: open
priority: critical
disciplines:
  - physical-oceanography
  - climate-science
  - fluid-dynamics
summary: >
  Global ocean models currently use a fixed or weakly spatially varying diapycnal diffusivity
  κ ≈ 10⁻⁵ m²/s, but observational microstructure data show κ varying by 4 orders of
  magnitude — concentrated near rough seafloor topography where internal tides break. This
  parameterization error propagates into centennial-scale climate predictions: poorly mixed
  models have different thermohaline circulation strength, heat content distribution, and
  CO₂ uptake. The missing physics is the tidal-topographic interaction that converts
  barotropic tidal energy into internal wave energy that propagates to mixing sites. Including
  spatially resolved tidal mixing parameterizations (Jayne-St Laurent, IDEMIX) improves
  model-data agreement but requires tidal forcing not standard in climate models.
systematic_gaps:
  - The fraction of internal wave energy that is locally dissipated vs. radiated to remote
    mixing sites is measured globally to only ~30% accuracy.
  - Langmuir turbulence parameterizations are absent from most production climate models
    despite factor 2-10 mixing enhancement at the ocean surface.
  - Machine learning parameterization of mixing (trained on observational microstructure
    data) has not been incorporated into a coupled climate model for multi-decadal runs.
related_bridges:
  - b-oceanic-turbulence-mixing
last_reviewed: "2026-05-06"

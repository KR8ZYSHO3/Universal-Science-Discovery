id: u-ess-higher-order-interactions-ecosystem
title: >
  How do higher-order (non-pairwise) ecological interactions — where the effect
  of species A on B depends on the presence of species C — modify the predictions
  of evolutionarily stable strategy theory and replicator dynamics for ecosystem
  stability and biodiversity?
status: open
priority: high
disciplines:
  - ecology
  - evolutionary-biology
  - game-theory
  - mathematical-biology
summary: >
  Classical ESS theory and replicator dynamics assume pairwise interactions
  (two-player games). Real ecosystems have extensive higher-order interactions
  (HOIs): the effect of a predator on prey abundance changes in the presence
  of a second predator (predator facilitation or interference competition).
  Three-species or multi-species interactions cannot be reduced to sums of
  pairwise terms.

  Recent empirical work (Mayfield & Stouffer 2017, Bairey et al. 2016) shows
  that HOIs are common and quantitatively significant in plant and bacterial
  communities. HOIs can stabilize otherwise unstable communities (by creating
  emergent negative feedbacks) or destabilize stable ones. Their effects on
  the ESS landscape — the shape of the fitness landscape on the strategy simplex
  — remain largely unexplored.

  The mathematical challenge: HOIs require tensor-valued payoff structures
  (not matrices), and the replicator dynamics become cubic (not quadratic).
  Stability analysis and ESS characterization for cubic replicator dynamics
  is an open mathematical problem.
systematic_gaps:
  - Empirical quantification of HOI magnitudes across diverse ecosystem types
  - Mathematical theory of ESS for tensor (multi-player) payoff structures
  - Extension of replicator dynamics to include n-player games
  - Computational methods for finding ESS in high-dimensional strategy spaces
suggested_hypotheses:
  - h-cyclic-dominance-spatial-heterogeneity-biodiversity

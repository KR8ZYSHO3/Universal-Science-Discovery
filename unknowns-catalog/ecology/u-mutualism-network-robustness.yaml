id: u-mutualism-network-robustness
title: "Are mutualistic networks (plant-pollinator, plant-seed disperser) more robust to species loss than random networks, and does nestedness or modularity drive this robustness?"
status: open
priority: medium
disciplines:
  - ecology
  - network-science
  - conservation-biology
summary: >
  Mutualistic networks (plant-pollinator, plant-frugivore) show two structural
  signatures: nestedness (specialist species interact only with subsets of
  partners of generalists) and modularity (clusters of species with more
  interactions within than between clusters). Bascompte et al. (2003) argued
  that nestedness confers robustness to species loss by ensuring specialists
  are "buffered" by their generalist partners. However, Thébault & Fontaine (2010)
  showed that modularity and nestedness have opposite effects on stability: nested
  networks are more robust but less stable (prone to extinctions cascades once the
  threshold is exceeded), while modular networks are less robust but more stable.
  The unknown: which structural property (nestedness vs. modularity) is the primary
  determinant of mutualistic network robustness across empirical systems, and does
  this vary with the type of mutualism (pollination vs. dispersal)?
systematic_gaps:
  - The relative contributions of nestedness vs. modularity to robustness are not separable in empirical networks
  - Whether robustness predictions from network models hold in real-world extinction sequences is not tested
  - How climate change-induced phenological mismatches affect nestedness and hence robustness is unknown
suggested_hypotheses:
  - Pollination networks are more nested than seed-dispersal networks because pollen specialization costs are lower, and this nestedness predicts 2x greater robustness to random species loss in pollination vs. dispersal networks
related_unknowns:
  - u-trophic-cascade-predictability
  - u-keystone-species-identification

id: u-dryland-vegetation-pattern-formation
title: "What determines the wavelength, orientation, and stability of dryland vegetation patterns (bands, spots, gaps) predicted by the Klausmeier model, and can remote sensing of pattern geometry be used to infer soil hydraulic properties and proximity to desertification tipping points?"
status: open
priority: high
disciplines:
  - ecology
  - mathematics
  - remote-sensing
summary: >
  The Klausmeier reaction-diffusion model predicts regular vegetation patterns in drylands with characteristic
  wavelengths, but observed patterns deviate from model predictions in ways that reveal unmeasured soil properties.
  Key unknowns: (1) how does soil texture heterogeneity modify the predicted pattern wavelength and transition
  from bands to spots as rainfall declines, (2) can the spatial frequency spectrum of vegetation patterns measured
  by satellite (Sentinel, Landsat) be used to infer effective soil water diffusivity without ground surveys,
  (3) do vegetation pattern irregularities or wavelength changes provide reliable early warning signals of
  approaching the desertification critical transition?
systematic_gaps:
  - Ground-truth measurements of soil water diffusivity and root-zone hydraulic conductivity in remote dryland sites are sparse
  - Long time series of vegetation pattern change in the same location are rare; most pattern observations are single snapshots
  - Three-dimensional soil structure (crusting, bioturbation) modifies the 2D Klausmeier predictions in ways not formally incorporated

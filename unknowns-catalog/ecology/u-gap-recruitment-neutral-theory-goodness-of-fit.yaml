id: u-gap-recruitment-neutral-theory-goodness-of-fit
title: >
  Across temperate and tropical forests with mapped canopy gaps, when does neutral biodiversity theory provide statistically adequate fits to species-abundance distributions in gap recruits compared with niche-structured hierarchical models that include trait covariates?
status: open
priority: medium
disciplines:
  - ecology
  - statistics
summary: >
  Neutral fits succeed in some ensembles yet fail when edaphic heterogeneity inside gaps matters — unified multi-site model comparison with identical sampling effort is still incomplete.
systematic_gaps:
  - Joint datasets linking gap-age, dispersal distances, and genomic pedigree inference for recruits
  - Cross-biome replication controlling for logging legacies
suggested_hypotheses:
  - h-neutral-theta-estimates-converge-pre-post-gap-chronosequence
related_bridges:
  - b-forest-gap-dynamics-x-neutral-theory-sampling
last_reviewed: "2026-05-07"
references:
  - doi: "10.1126/science.1066854"
    note: Hubbell neutral baseline for comparison frameworks

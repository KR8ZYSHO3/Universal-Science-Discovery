id: u-turing-pattern-selection-ecology
title: What determines which spatial pattern (stripes, spots, labyrinths) emerges from Turing instabilities in ecological systems, and how do these patterns change with environmental degradation?
status: open
priority: medium
disciplines:
  - ecology
  - mathematics
  - nonlinear-dynamics
summary: >
  Reaction-diffusion Turing systems can produce stripes, spots, or labyrinths depending
  on parameter ratios and nonlinear terms, but predicting which pattern forms in a specific
  ecological system requires knowledge of diffusion coefficients and reaction kinetics
  that are difficult to measure in the field. In vegetation systems, pattern morphology
  changes from spots to stripes to gaps as aridity increases, and this sequence has been
  proposed as an early warning signal of desertification. Key unknowns: (1) what
  determines pattern wavelength and morphology in field conditions, (2) can pattern
  transitions serve as reliable early warning signals of ecological tipping points,
  (3) how does movement behavior (not Fickian diffusion) change the predicted patterns?
systematic_gaps:
  - Diffusion coefficients for ecological species are scale-dependent and rarely measured at the relevant spatial scale
  - Distinguishing Turing patterns from patterns driven by heterogeneous environments or disturbance is unresolved
  - Most Turing models assume linear diffusion; animal movement is highly non-Fickian (Levy walks)
related_bridges:

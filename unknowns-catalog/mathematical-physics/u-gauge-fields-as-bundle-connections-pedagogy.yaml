id: u-gauge-fields-as-bundle-connections-pedagogy
title: Which bundle-theoretic perspectives (connections, holonomy, characteristic classes)
  most improve predictive modeling literacy for early-career theorists without obscuring computability?
status: open
priority: medium
disciplines:
- mathematical-physics
- mathematics
- physics
summary: Pedagogical bridges abound, but assessments of comprehension gains when teaching
  gauge theory via connections versus traditional Lagrangian methods are sparse.
systematic_gaps:
- Curricula rarely integrate lattice gauge theory labs with continuum bundle pictures.
- Students’ misconceptions about gauge fixing vs physical observables persist across both
  languages.

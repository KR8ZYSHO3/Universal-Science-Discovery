id: u-symplectic-topology-classical-quantum-correspondence-limits
title: >
  What is the precise mathematical relationship between Gromov's non-squeezing
  theorem for symplectic manifolds and the Heisenberg uncertainty principle,
  and can symplectic rigidity results (Gromov width, symplectic capacities) be
  derived from quantum mechanics in the hbar → 0 classical limit?
status: open
priority: medium
disciplines:
  - mathematical-physics
  - symplectic-geometry
  - quantum-mechanics
  - functional-analysis
summary: >
  Gromov's non-squeezing theorem (1985) states that a ball B²ⁿ(r) cannot be
  symplectically embedded into a cylinder Z²ⁿ(R) if r > R. The smallest R
  for which embedding is possible defines the symplectic width c(B²ⁿ(r)) = πr².
  The uncertainty principle states ΔqΔp ≥ ħ/2 — equivalently, the Wigner
  function cannot be supported on a phase-space region with symplectic capacity
  < ħ. This suggests a correspondence: the Heisenberg uncertainty principle is
  the quantum version of non-squeezing. The precise mathematical connection
  is established in special cases (Gromov width equals quantum uncertainty for
  coherent states) but the general correspondence between symplectic topology
  and quantum mechanics remains incomplete. Key open questions: (1) Can all
  symplectic capacities (Ekeland-Hofer capacities, Hofer-Zehnder capacity) be
  derived from a quantum uncertainty principle for some observable? (2) What
  is the semiclassical (ħ → 0) structure of symplectic capacities in
  deformation quantisation? (3) Do quantum chaos results (spectral rigidity,
  level spacing statistics) correspond to symplectic topology results (Arnold
  diffusion, breakdown of KAM tori)?
systematic_gaps:
  - The relationship between symplectic capacities (Ekeland-Hofer, Hofer-Zehnder, Gromov width) and quantum observables has been characterised only for special geometries; the general case is open.
  - Whether Floer homology (symplectic topology invariant) has a direct quantum mechanical interpretation as a partition function or path integral over some quantum system has not been established rigorously.
  - The Arnold diffusion (breakdown of KAM tori in near-integrable systems with n≥3 degrees of freedom) and its quantum analogue (quantum chaos, ergodicity transition) have not been connected via a unified semiclassical theory.
suggested_hypotheses:
  - >
    Every Ekeland-Hofer symplectic capacity c_k(M,omega) of a star-shaped domain M
    equals (2k-1)pi*r² for k=1,2,... — the spectrum of a quantum harmonic oscillator
    on the corresponding quantum system — establishing a precise spectral-geometric
    dictionary between symplectic topology and quantum energy levels.

id: u-rna-world-nonenzymatic-replication-fidelity
title: >
  What minimum replication fidelity is required for non-enzymatic RNA replication
  to sustain a functional RNA world — and can plausible prebiotic chemistry achieve
  this fidelity threshold under realistic environmental conditions?
status: open
priority: critical
disciplines:
  - biology-chemistry
  - prebiotic-chemistry
  - origin-of-life
  - information-theory
summary: >
  For Darwinian evolution to begin, a self-replicating molecule must copy itself
  with sufficient fidelity to preserve functional information across generations.
  Eigen's error threshold (1971): for a genome of length L and per-site error rate μ,
  information is maintained only if μ < 1/L (the error threshold). Current non-enzymatic
  RNA polymerization achieves error rates of ~1-5% per nucleotide (Szostak lab) and
  extension rates of ~10-50 nucleotides per day, orders of magnitude below the ~0.001%
  error rate of modern RNA polymerases. The open question is: (1) What is the minimum
  functional RNA sequence length needed for early life (shortest known ribozyme ~40 nt);
  (2) What prebiotic conditions (temperature cycling, mineral surfaces, ice eutectic
  concentration) could reduce error rates to below Eigen's threshold for a 40-nt genome;
  (3) Whether error-prone copying with selection (rather than high-fidelity replication)
  can sustain an evolving RNA pool even above the Eigen threshold (quasispecies theory —
  the error threshold may be less sharp than originally modeled for realistic fitness
  landscapes). The gap between achievable non-enzymatic fidelity and required fidelity
  is currently 100-1000×, raising the question of what prebiotic chemistry closed this gap.
systematic_gaps:
  - The minimum functional ribozyme length has not been determined for all catalytic
    classes relevant to early replication (RNA ligase, RNA polymerase, RNA recombinase).
  - Systematic measurement of non-enzymatic error rates across all 4 canonical and
    modified nucleotide pairs under varied temperature, pH, and mineral surface conditions
    has not been performed.
  - The Eigen error threshold has not been rigorously computed for realistic rugged
    fitness landscapes where the quasispecies structure may sustain function above
    the flat-landscape threshold.

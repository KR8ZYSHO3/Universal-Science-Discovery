id: u-lipid-raft-functional-role-signaling
title: Do lipid rafts exist as stable, nanoscale liquid-ordered domains in living cell membranes, and if so, what is their functional role in receptor clustering and signal transduction?
status: open
priority: high
disciplines:
  - cell-biology
  - biophysics
  - biochemistry
summary: >
  Lipid rafts (cholesterol + sphingolipid-enriched ordered domains) were proposed as
  signaling platforms that concentrate receptors and signaling proteins. However, their
  existence as stable, micrometer-scale domains in living cells remains contested — they
  are clearly observed in model membranes (GUVs) and at low temperatures, but in living
  cells at 37°C they may be transient nanoscale fluctuations too small and short-lived
  for conventional microscopy. Super-resolution techniques (STORM, PALM, STED) have
  revealed 20-200 nm dynamic clusters but debate continues over whether these are rafts
  (thermodynamic phases) or transient protein-protein interactions. The functional question
  is whether raft association causally enhances signaling (e.g., T-cell receptor activation)
  or is merely correlational.
systematic_gaps:
  - Single-molecule tracking in live cells has not definitively resolved raft size
    distribution and lifetime at physiological temperature.
  - Causal manipulation of raft composition (beyond cholesterol depletion with methyl-β-cyclodextrin,
    which has pleiotropic effects) to test signaling function is lacking.
  - Quantitative connection between 2D phase separation physics (Cahn-Hilliard theory)
    and the nanoscale raft dynamics observed in live cells is not established.

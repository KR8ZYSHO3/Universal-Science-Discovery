id: u-uap-stone-weierstrass-pedagogy-misconception-rate
title: >
  Does teaching Stone-Weierstrass-style compact density before neural-network universal approximation reduce student misconceptions that approximation existence implies trainability or generalization?
status: open
priority: medium
disciplines:
  - machine-learning
  - mathematics
summary: >
  This education-oriented unknown asks whether a formal-density sequence improves conceptual transfer. It is not a claim that Stone-Weierstrass and neural-network proofs are identical.

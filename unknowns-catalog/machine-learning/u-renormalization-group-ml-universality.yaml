id: u-renormalization-group-ml-universality
title: Do deep residual networks belong to a specific renormalization group universality class, and if so, what class — and can this class membership be determined from small-model experiments without training at full scale?
status: open
priority: high
disciplines:
  - machine-learning
  - statistical-physics
  - condensed-matter-physics
summary: >
  The renormalization group (RG) predicts that systems near a critical point fall into
  universality classes characterised by critical exponents (beta, nu, eta) that depend
  only on dimensionality and symmetry — not on microscopic details. If deep residual
  networks implement discrete RG flows, as the structural analogy suggests, then the
  generalisation-error scaling with model size and dataset size should obey universal
  power laws with exponents specific to a particular universality class (e.g., 2D Ising,
  mean-field, XY). Key unknowns: (1) What are the critical exponents governing
  generalisation gap scaling near the grokking transition in ResNets? (2) Do these
  exponents match any known universality class from condensed-matter physics?
  (3) Can finite-size scaling analysis of small ResNets predict the grokking step
  for large ResNets? (4) Do different architectures (MLPs, CNNs, Transformers) fall
  in the same or different universality classes?
systematic_gaps:
  - No systematic measurement of generalisation scaling exponents across ResNet depths and widths near the grokking transition
  - No comparison of empirical scaling exponents with known 2D/3D Ising, percolation, and XY model exponents
  - No finite-size scaling analysis applied to ResNet grokking to test the universality hypothesis

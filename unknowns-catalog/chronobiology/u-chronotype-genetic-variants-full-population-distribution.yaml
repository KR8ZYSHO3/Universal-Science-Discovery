id: u-chronotype-genetic-variants-full-population-distribution
title: >
  What is the complete genetic architecture of human chronotype — which variants
  beyond CRY1 and PER3 explain the full population distribution of midsleep timing,
  and how do gene-environment interactions with light exposure and social schedules
  shape the phenotype?
status: open
priority: medium
disciplines:
  - chronobiology
  - genetics
  - epidemiology
  - sleep-medicine
summary: >
  Genome-wide association studies (GWAS) of chronotype (Jones et al. 2019, Nature
  Communications: 351 loci in 697,000 individuals) identified variants near known
  clock genes (CRY1, PER1/3, RORA, RORB) and many novel loci. However, the
  identified loci explain only a fraction of the heritability (~50%) of sleep timing.
  The genetic architecture of the full chronotype distribution — including extreme
  morning and evening types (Familial Advanced and Delayed Sleep Phase Syndromes) —
  and how genetic chronotype interacts with light exposure, latitude, and social
  schedule is not fully characterized. The causal mechanisms by which identified
  SNPs alter clock period or phase are unknown for most loci.
systematic_gaps:
  - The identified GWAS loci have not been mechanistically characterized (most
    are non-coding; causal variant and target gene unknown for most loci).
  - Gene-environment interaction: how light exposure history modifies the genetic
    chronotype effect has not been studied in large populations with objective
    light monitoring.
  - Cross-cultural and cross-latitude studies with objective actigraphy and light
    exposure data are lacking; most GWAS use self-reported chronotype.
related_bridges:
  - b-chronobiology-social-jet-lag
last_reviewed: "2026-05-07"

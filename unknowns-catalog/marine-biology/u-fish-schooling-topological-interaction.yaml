id: u-fish-schooling-topological-interaction
title: Is topological interaction (fixed k nearest neighbors) vs. metric interaction (fixed radius r) a species-specific adaptation or a context-dependent switch, and what selective pressure drives the topology?
status: open
priority: medium
disciplines:
  - marine-biology
  - ethology
  - statistical-physics
  - active-matter-physics
summary: >
  Ballerini et al. (2008) demonstrated that starlings in murmurations interact
  topologically — each bird responds to its k ≈ 7 nearest neighbors regardless of
  distance, not to all birds within a fixed radius r. This topological rule makes
  the flock more robust to density fluctuations and predator-induced fragmentation.

  Fish schooling may follow a different rule. Some species appear to use metric
  interaction (all fish within a fixed visual range), while others may use topological
  interaction. The empirical determination requires 3D tracking at sufficient resolution
  in natural schools — a technical challenge only recently becoming tractable with
  computer-vision methods.

  The adaptive significance of k ≈ 7 specifically is unknown. Why 7 neighbors and
  not 5 or 10? Information theory suggests k neighbors transmit ≈ log₂k bits of
  directional information per timestep — 7 neighbors gives ≈ 2.8 bits, potentially
  near an information-theoretic optimum for balancing speed and noise in collective
  decision-making. This has not been tested.

  Furthermore, whether individual fish switch between metric and topological modes
  (e.g., relaxed schooling vs. predator-evasion) has not been established.
systematic_gaps:
  - 3D tracking of natural open-water fish schools at sufficient resolution to measure individual interaction rules (metric vs. topological) has not been achieved for most species.
  - The selective pressure determining the specific number of interacting neighbors (k ≈ 7 for starlings) has no theoretical explanation.
  - Whether interaction topology switches dynamically (metric in calm conditions, topological under predation pressure) has not been tested.
  - Hydrodynamic contribution to schooling (lateral line sensing of vortex wakes) vs. visual contribution has not been quantitatively partitioned.
suggested_hypotheses:
  - Fish species with higher predation risk in natural habitats use smaller k (fewer neighbors, faster decision propagation) than prey-poor species, as an evolutionarily optimized tradeoff between information accuracy and response speed.

id: u-em-skin-depth-financial-firewall-mapping-limits
title: >
  Under what empirical conditions can layered financial firewalls be calibrated to an exponential-attenuation
  model analogous to skin-depth shielding without misleading regulators about correlated tail risk?
status: open
priority: medium
summary: >
  The skin-depth stack is a linear frequency-domain story with well-defined material parameters; financial
  firewalls involve strategic behavior, hidden leverage, and endogenous liquidity. This unknown asks for
  quantitative criteria (data requirements, stress horizons) under which a layered attenuation curve is a
  defensible reduced model versus when graph-aware contagion models are mandatory.

systematic_gaps:
  - "No standard dataset maps legal entity perimeter thickness to an equivalent attenuation length across shock frequencies."
  - "Correlated defaults violate independence assumptions implicit in simple exponential stacking metaphors."


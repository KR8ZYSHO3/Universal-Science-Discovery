id: u-metamaterial-acoustic-cloaking
title: Can acoustic metamaterial cloaks achieve broadband, three-dimensional sound cloaking at practical scales, or are fundamental bandwidth-thickness trade-offs prohibitive?
status: open
priority: medium
disciplines:
  - acoustics
  - engineering
  - metamaterials
  - physics
summary: >
  Acoustic cloaking uses metamaterials with spatially varying density and bulk modulus
  to redirect sound waves around an object, making it acoustically invisible.
  Transformation acoustics provides the theoretical design framework, but practical
  implementation faces: (1) the causality-bandwidth product limit (Kramers-Kronig
  relations constrain achievable impedance over bandwidth), (2) fabrication of
  anisotropic locally resonant structures with required property gradients, and (3)
  loss in resonant metamaterials that degrades cloaking performance. Whether broadband
  (octave or more), low-loss acoustic cloaks are achievable at scales relevant for
  sonar or noise control applications is unresolved.
systematic_gaps:
  - The Kramers-Kronig-derived bandwidth-thickness trade-off for passive acoustic cloaks has not been formally proven analogous to the electromagnetic Rozanov bound.
  - 3D acoustic cloaks have been demonstrated only in water-tank conditions at narrow frequency bands; atmospheric acoustic cloaking at engineering scales has no experimental demonstration.
  - Whether active acoustic cloaking (sensing and re-radiating) can circumvent the passive bandwidth limit while remaining stable is theoretically open.
last_reviewed: "2026-05-05"

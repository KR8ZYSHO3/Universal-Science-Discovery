id: u-autonomous-vehicle-edge-cases
title: How frequent are truly novel edge cases for autonomous vehicles in real-world deployment, and can safety guarantees be established without exhaustive real-world testing?
status: open
priority: critical
disciplines:
  - autonomous-systems
  - engineering
  - safety-engineering
  - machine-learning
summary: >
  Autonomous vehicles (AVs) must handle rare, novel scenarios not well-represented
  in training data: unusual road markings, emergency vehicle behavior, construction
  zones, adversarial pedestrians, sensor degradation. The distribution of edge case
  frequency and severity in real-world deployment is unknown because AVs have not
  accumulated sufficient mileage in diverse conditions. The trillion-mile problem—
  the estimate that demonstrating AV safety to 5-sigma confidence requires more
  real-world testing than is feasible—motivates simulation-based validation, but
  whether simulations capture the true edge case distribution is not validated.
systematic_gaps:
  - The statistical distribution of edge case frequency in real-world driving across diverse geographies and conditions has not been characterized from the AV fleet data that exists.
  - Formal safety verification methods for neural network-based perception systems are computationally intractable for production systems.
  - The coverage gap between logged simulation scenarios and real-world edge case diversity cannot currently be measured.
last_reviewed: "2026-05-05"

id: u-soft-robotics-actuator-lifespan
title: What limits the fatigue life of soft pneumatic and hydraulic actuators, and can they achieve the 10^7+ cycle durability required for practical service robots?
status: open
priority: high
disciplines:
  - robotics
  - engineering
  - materials-science
  - soft-matter
summary: >
  Soft pneumatic actuators (PneumNets, bellows, McKibben muscles) fail by elastomer
  fatigue and delamination at the embedded fiber-matrix interface. Commercial silicones
  achieve 10^4–10^5 cycles before failure in typical configurations, far below the
  10^7+ cycles needed for service robot lifetimes. Failure initiation at air channel
  corners, notches, and fiber terminations is not adequately captured by classical
  fatigue models developed for hard materials. The role of swelling from hydraulic
  fluids, ozone degradation, and thermal cycling in soft actuator fatigue has not been
  systematically characterized.
systematic_gaps:
  - No standardized fatigue testing protocol exists for soft pneumatic actuators; published cycle-to-failure data are not comparable across labs.
  - The stress concentration factor at air channel corners in soft actuators depends on hyperelastic geometry in ways that linear elastic fracture mechanics does not capture.
  - Self-healing elastomers have been proposed to extend cycle life, but their fatigue behavior under repeated damage-healing cycles has not been characterized.
last_reviewed: "2026-05-05"

id: u-turbulent-drag-reduction-limit
title: Is there a fundamental physical limit to turbulent drag reduction in pipe and channel flows, and does the maximum drag reduction (MDR) asymptote represent a true physical bound?
status: open
priority: high
disciplines:
  - fluid-mechanics
  - engineering
  - physics
summary: >
  Adding small amounts of long-chain polymers to turbulent pipe flow reduces friction
  by up to 80% (Toms effect). Virk's maximum drag reduction (MDR) asymptote represents
  an empirical upper limit to this reduction—flows approach but apparently do not cross it.
  The physical origin of the MDR asymptote is debated: whether it represents a laminar-like
  state, a modified turbulent state, or a fundamental constraint from the energy spectrum
  of turbulence is unresolved. Surfactant additives and rigid polymers approach but also
  do not cross MDR, suggesting it is not polymer-specific. Whether flows can be
  engineered to exceed MDR remains unknown.
systematic_gaps:
  - The turbulence structure near the MDR asymptote has not been fully characterized by DNS at high Reynolds numbers.
  - The mechanism by which polymer extensional viscosity suppresses turbulence energy cascade (vs. near-wall cycle disruption) is disputed.
  - Whether the MDR asymptote is the same for all additives or whether it varies with polymer stiffness and concentration is not settled.
last_reviewed: "2026-05-05"

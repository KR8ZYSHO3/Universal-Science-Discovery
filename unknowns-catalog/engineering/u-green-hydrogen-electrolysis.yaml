id: u-green-hydrogen-electrolysis
title: What is the fundamental efficiency ceiling for water electrolysis for green hydrogen production, and what electrode degradation mechanisms limit durability?
status: open
priority: high
disciplines:
  - electrochemistry
  - engineering
  - energy-engineering
summary: >
  Proton exchange membrane (PEM) electrolyzers currently achieve ~70–80% lower heating
  value (LHV) efficiency for hydrogen production. The theoretical maximum (LHV) is
  ~83% at standard conditions; higher values require heat recovery. Degradation of
  IrO2 oxygen evolution catalyst at the anode limits stack lifetime to <80,000 hours
  in commercial systems. The scarcity and cost of iridium (annual production ~7 tonnes)
  may limit global PEM electrolyzer deployment to <100 GW. Whether iridium-free
  catalysts can match IrO2 stability and activity under acidic PEM conditions is an
  open materials science and engineering question.
systematic_gaps:
  - The degradation mechanism of IrO2 under dynamic (intermittent renewable) operation differs from steady-state and is not adequately captured by existing lifetime models.
  - Alkaline anion exchange membrane (AEM) electrolyzers could avoid iridium but membrane hydroxide conductivity and stability limits are not understood from first principles.
  - The efficiency gain from integrating electrolyzers with waste heat recovery (thermoelectrochemistry) has not been demonstrated at system scale.
last_reviewed: "2026-05-05"

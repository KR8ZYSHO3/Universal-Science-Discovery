id: u-neuromorphic-energy-efficiency
title: What are the fundamental energy efficiency limits of neuromorphic computing, and how do they compare to biological neural computation?
status: open
priority: high
disciplines:
  - neuromorphic-computing
  - engineering
  - neuroscience
  - computer-engineering
summary: >
  The human brain performs roughly 10^15 synaptic operations per second at ~20 W—
  approximately 10^13 operations per joule—while a modern GPU achieves ~10^12 FLOP/J.
  Neuromorphic chips (Intel Loihi, IBM TrueNorth, BrainScaleS) aim to match biological
  efficiency by implementing spike-based communication and local plasticity, but have
  not approached brain-level energy efficiency for general-purpose tasks. Whether the
  brain's advantage derives from spike sparsity, analog computation, physical colocation
  of memory and compute, or the specific topology of biological neural circuits—and
  which of these can be efficiently implemented in silicon—is not established.
systematic_gaps:
  - Benchmarking energy efficiency of neuromorphic systems against GPUs requires task-comparable workloads; no standardized benchmark set exists.
  - The contribution of membrane time constants and leak currents to energy efficiency in biological neurons has not been fully modeled at the circuit level.
  - Whether 3D integration of CMOS neuromorphic systems can approach the connection density of cortex (10^9 synapses/cm³) is a fabrication challenge without a clear engineering path.
last_reviewed: "2026-05-05"

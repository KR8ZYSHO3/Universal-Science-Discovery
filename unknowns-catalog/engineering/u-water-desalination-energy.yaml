id: u-water-desalination-energy
title: How close to the thermodynamic minimum can seawater desalination approach, and what membrane and process innovations are needed to close the gap?
status: open
priority: high
disciplines:
  - chemical-engineering
  - engineering
  - membrane-science
summary: >
  The thermodynamic minimum energy for desalinating seawater (35 g/L) to drinking
  quality (~0.5 g/L) at 50% recovery is approximately 1.06 kWh/m³. State-of-the-art
  reverse osmosis (RO) systems achieve ~2–3 kWh/m³ with energy recovery devices.
  The gap between thermodynamic minimum and best practice is small for RO but larger
  for inland brackish water (where recovery rates are lower) and for brine concentration
  above 70 g/L (where no energy-efficient technology exists). Membrane fouling and
  concentration polarization prevent operation at the thermodynamic limit even with
  perfect membranes. The minimum energy achievable with practical membranes and
  pre-treatment is not well characterized.
systematic_gaps:
  - Concentration polarization at the membrane surface increases the effective feed concentration above bulk; the magnitude under real operating conditions is difficult to measure.
  - Brine management for hypersaline desalination (zero liquid discharge) has no low-energy solution; the energy minimum for brine crystallizers is known but unachieved in practice.
  - Biomimetic membranes (aquaporin-based) have demonstrated high water permeance in lab but not durability or selectivity at industrial scale.
last_reviewed: "2026-05-05"

id: u-hypersonic-thermal-protection
title: What material systems can provide reliable, reusable thermal protection for hypersonic vehicles at Mach 10–25 over multiple flights?
status: open
priority: high
disciplines:
  - aerospace-engineering
  - materials-science
  - engineering
  - high-temperature-materials
summary: >
  Hypersonic vehicles (cruise missiles, reentry vehicles, space planes) experience
  surface temperatures of 1,600–2,200°C for minutes to hours. Current thermal
  protection systems (TPS) are either ablative (single-use: PICA, carbon-carbon),
  ceramic tiles (fragile, complex maintenance: Space Shuttle), or metallic hot
  structures (limited to Mach <10). Ultra-high-temperature ceramics (HfB2, ZrB2,
  UHTCs) can withstand higher temperatures but are brittle and oxidation-resistant
  only to ~1,800°C. For fully reusable hypersonic vehicles with >10 flight life,
  no current TPS material system meets all requirements simultaneously: temperature
  capability, oxidation resistance, low weight, structural integration, and repairability.
systematic_gaps:
  - Oxidation behavior of UHTC composites at relevant oxygen partial pressures and high heat fluxes (>1 MW/m²) has not been characterized beyond 1,000 seconds.
  - Thermal shock resistance of hypersonic TPS under repeated transient heating cycles (Mach 15+ entry) has been tested only for a handful of missions.
  - The interaction between aerothermal heating, boundary layer transition, and surface roughness from ablation/oxidation creates a coupled fluid-solid problem without validated simulation tools.
last_reviewed: "2026-05-05"

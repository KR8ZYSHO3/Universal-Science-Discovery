id: u-space-debris-removal
title: What active debris removal approaches are technically feasible at scale to prevent Kessler syndrome in low Earth orbit?
status: open
priority: critical
disciplines:
  - aerospace-engineering
  - engineering
  - orbital-mechanics
summary: >
  The Kessler syndrome—a cascade of collisions generating more debris, which generates
  more collisions—may already be self-sustaining in some altitude bands. Approximately
  27,000 tracked objects >10 cm and millions of untracked smaller objects currently
  orbit Earth. Active debris removal (ADR) of ~5–10 large objects per year in high-risk
  bands is estimated to stabilize the debris population. No ADR mission has successfully
  captured and deorbited a non-cooperative tumbling object. Harpoons, nets, robotic
  arms, ion beam shepherds, and electrodynamic tethers have been proposed; none has
  been demonstrated at the required reliability and cost.
systematic_gaps:
  - Rendezvous and capture of a tumbling 1–8 rpm non-cooperative object (e.g., Envisat) has not been demonstrated; the dynamics of capture from untethered approach are incompletely modeled.
  - The cost per removed object required to make ADR commercially viable is not achieved by any demonstrated approach.
  - The liability framework for accidental collision during ADR operations (touching another country's satellite) has not been established under international space law.
last_reviewed: "2026-05-05"

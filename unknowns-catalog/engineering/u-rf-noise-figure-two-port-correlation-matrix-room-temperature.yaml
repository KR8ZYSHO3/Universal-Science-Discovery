id: u-rf-noise-figure-two-port-correlation-matrix-room-temperature
title: >
  When mutual coupling or shared substrate paths correlate noise between RF ports, how should noise figure
  and noise temperature be defined beyond scalar Friis cascade formulas while staying tied to Johnson–Nyquist
  equilibrium references?
status: open
priority: medium
disciplines:
  - electrical-engineering
  - physics
summary: >
  Modern phased arrays and MIMO front ends violate the independence assumptions implicit in scalar NF stacking.
  Full noise covariance matrices are used in array signal processing, but mapping those objects back to
  intuitive NF budgets at package temperature remains inconsistently documented across vendors.
systematic_gaps:
  - Few published multi-port NF datasets that separate correlated Johnson noise from active device 1/f corners.
  - Standards documents historically optimized for two-port scalar NF complicate regulatory wording for arrays.

suggested_hypotheses:
  - h-correlated-port-noise-matrix-lowers-effective-nf-two-port

related_bridges:

id: u-wireless-power-transfer-limit
title: What are the fundamental efficiency and range limits of resonant inductive and far-field wireless power transfer, and how does Friis transmission compare to near-field coupling?
status: open
priority: medium
disciplines:
  - electrical-engineering
  - engineering
  - electromagnetics
summary: >
  Resonant inductive coupling (MIT WiTricity, 2007) achieves 90%+ efficiency over
  decimeter distances for device charging but efficiency falls sharply beyond strong
  coupling range. Far-field microwave power transfer (rectenna systems) can beam
  power over kilometers (space solar power concept) at theoretical efficiencies >80%
  but realized systems achieve <50% end-to-end. The fundamental limit on simultaneous
  efficiency-range for both near-field and far-field systems, and the safety constraints
  from human RF exposure standards (ICNIRP), have not been jointly optimized. Whether
  a unified near-to-far-field transition system can cover room-scale wireless charging
  at >80% efficiency is an open engineering challenge.
systematic_gaps:
  - The optimal frequency, coil geometry, and impedance matching for near-field systems in the presence of metallic and biological material is not fully characterized by Floquet analysis.
  - Space solar power rectenna efficiency at relevant microwave power densities (GHz frequencies, kW/m²) has not been validated in a complete prototype.
  - Safety-efficiency trade-offs for far-field power delivery through the human body (medical implants) have not been formally Pareto-optimized.
last_reviewed: "2026-05-05"

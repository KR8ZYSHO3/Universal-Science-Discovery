id: u-multi-coil-wpt-array-grating-lobes-cross-talk
title: >
  In roadway or factory-scale multi-coil wireless power installations, how severe are unintended high-field lobes (array
  analogs of grating lobes) versus simple pairwise leakage models — and how should spacing standards incorporate full-wave results?
status: open
priority: medium
disciplines:
  - electrical-engineering
  - electromagnetism
summary: >
  Pairwise coil coupling coefficients dominate lab prototypes; scaled mats introduce multipath magnetics analogous to array
  interference yet lack standardized measurement protocols for stray-field peaks beyond pad outlines.
systematic_gaps:
  - Regulatory stray-field limits historically derived from single-coil assumptions.
  - Dynamic steering during vehicle motion adds time-varying exposure not captured by static SN curves.

suggested_hypotheses:
  - h-half-wavelength-coil-spacing-bound-suppresses-near-field-grating-analogs


id: u-geothermal-subsidence
title: What controls surface subsidence and induced seismicity from enhanced geothermal systems, and can they be predicted and mitigated in pre-development assessment?
status: open
priority: high
disciplines:
  - geothermal-engineering
  - engineering
  - geomechanics
  - seismology
summary: >
  Enhanced geothermal systems (EGS) inject pressurized water into hot dry rock to
  create permeability and extract heat. The 2006 Basel (Switzerland) EGS project was
  shut down after induced M3.4 seismicity; the 2017 Pohang (South Korea) EGS project
  triggered an M5.5 earthquake causing $52M in damage and 135 injuries. Whether EGS
  at any site can be developed without unacceptable seismic risk depends on pre-existing
  fault geometry, proximity to stress criticality, and injection protocols—factors that
  are not fully characterizable from pre-development surveys. A traffic light protocol
  exists but its thresholds are empirically derived from insufficient data.
systematic_gaps:
  - The stress state of mid-crustal faults at EGS depths (3–8 km) cannot be directly measured; only indirect estimates from borehole breakouts and seismic focal mechanisms are available.
  - The relationship between injection volume, pressure, and induced seismicity magnitude follows no universally validated scaling law.
  - Whether EGS can operate safely at commercially relevant injection rates in crystalline basement rock without significant seismic risk has not been demonstrated at the requisite scale.
last_reviewed: "2026-05-05"

id: u-quantum-error-correction-overhead
title: What is the minimum physical qubit overhead required for fault-tolerant quantum computation at error rates achievable in near-term hardware?
status: open
priority: critical
disciplines:
  - quantum-computing
  - engineering
  - quantum-physics
summary: >
  Fault-tolerant quantum computation requires error-corrected logical qubits built
  from many physical qubits. The surface code (most mature error correction scheme)
  requires ~1,000 physical qubits per logical qubit at current error rates (~10^-3).
  Achieving the 10^-6 logical error rates needed for useful algorithms (Shor's, quantum
  simulation) at this overhead would require ~10^6–10^7 physical qubits. Whether
  advances in qubit quality (error rates <10^-4) or new codes (bivariate bicycle codes,
  LDPC codes) can reduce overhead below 100:1 is an open engineering and physics
  question that determines the path to practical quantum advantage.
systematic_gaps:
  - The threshold error rate for promising new LDPC quantum codes has been computed in idealized noise models but not in realistic hardware noise environments.
  - The classical decoding overhead (real-time classical computation for syndrome processing) may become a bottleneck before the physical qubit count becomes practical.
  - Whether coherence times can be extended sufficiently (>10 ms for transmons) to reduce error rates below the LDPC code threshold is not guaranteed by current physics.
last_reviewed: "2026-05-05"

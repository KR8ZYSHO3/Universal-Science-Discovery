id: u-nanotechnology-self-assembly-yield
title: What limits the yield and complexity of DNA origami and molecular self-assembly, and how can hierarchical nanostructures be built with near-unity yield?
status: open
priority: medium
disciplines:
  - nanotechnology
  - engineering
  - biochemistry
  - materials-science
summary: >
  DNA origami and tile-based DNA nanostructures can self-assemble into complex 2D
  and 3D shapes with nanometer precision, but yields for large, complex structures
  rarely exceed 50–80% and often require extensive purification. Defects arise from
  missing strands, strand mispairing, and kinetic traps during folding. Scaling to
  micrometer-scale structures or hierarchical assemblies of multiple origami units
  faces compounding yield losses. Whether the yield ceiling is fundamental (thermodynamic
  defect equilibria) or kinetic (fixable by protocol optimization) is not resolved.
  The maximum complexity (number of unique components) achievable at practical yield
  sets the limits for molecular machines and nanoscale devices.
systematic_gaps:
  - A quantitative model of how individual strand incorporation probability combines to give final structure yield has not been experimentally validated for large origami.
  - The contribution of oxidative damage to DNA during long annealing ramps to yield losses has not been systematically characterized.
  - Hierarchical assembly (origami of origami) yield has not been optimized beyond 3–4 levels; whether 10+ level hierarchies are accessible is unknown.
last_reviewed: "2026-05-05"

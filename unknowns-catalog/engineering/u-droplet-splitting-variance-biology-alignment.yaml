id: u-droplet-splitting-variance-biology-alignment
title: >
  Under what experimental conditions do microfluidic droplet-splitting statistics align with simple branching-process models used for cell lineage division — and when does physics-dominated pinch-off invalidate biological metaphors?
status: open
priority: medium
disciplines:
  - microfluidics
  - systems-biology
summary: >
  Volume partitions in microchannels can be engineered near symmetric or highly asymmetric regimes with noise; cell division adds active mechanics absent in passive fluid splitting. Quantitative homology requires matched stochastic estimators and comparable noise floors.
systematic_gaps:
  - Time-resolved datasets linking split-ratio variance to operating points (Ca, Re, geometry) with biological replication controls absent.
  - Joint statistical tests comparing microfluidic splitting histograms to microbial lineage CV using identical estimators.
suggested_hypotheses:
  - h-droplet-split-binomial-partition-fission-alignment
related_bridges:

id: u-bode-waterbed-multi-loop-multi-objective-tradeoffs
title: >
  What are the sharpest known MIMO extensions and non-minimum-phase relaxations of Bode-type sensitivity
  integrals for multi-loop cyber-physical systems with decentralized sensing?
status: open
priority: medium
summary: >
  Industrial plants add loops, saturations, and communication delays. This unknown asks which integral
  constraints survive and how to communicate them to engineers designing layered controllers.

systematic_gaps:
  - "Decentralized control lacks a single S; integral identities split across agents in ways not always taught."
  - "Hard nonlinearities break linear integral identities but lack equally crisp replacements."

suggested_hypotheses:
  - h-minimum-phase-plants-attain-tighter-bode-bounds

related_bridges:
  - b-bode-sensitivity-integral-x-waterbed-effect

references:

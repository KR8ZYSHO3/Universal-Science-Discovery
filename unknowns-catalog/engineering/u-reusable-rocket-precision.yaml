id: u-reusable-rocket-precision
title: What are the guidance and control limits for precision propulsive rocket landing, and what failure modes bound reusability turnaround times?
status: open
priority: medium
disciplines:
  - aerospace-engineering
  - engineering
  - control-theory
summary: >
  SpaceX Falcon 9 and Starship have demonstrated propulsive vertical rocket landing,
  enabling booster reuse. The precision of propulsive landing (touchdown velocity,
  landing accuracy) is limited by fuel state uncertainty, atmospheric turbulence at
  low altitude, and guidance law conservatism. The relationship between landing conditions
  and structural fatigue accumulation in reused boosters sets turnaround times and
  inspection intervals. Whether landing reliability (currently ~95% for Falcon 9
  after early failures) can reach 99.99%+ needed for cost-efficient reusability and
  for human-rated vehicles is an open engineering question.
systematic_gaps:
  - The statistical relationship between landing conditions (velocity, attitude, fuel remaining) and leg structural fatigue accumulation has not been publicly characterized.
  - Guidance algorithms for propulsive landing near physical constraints (fuel minimum, gimbal limits) have been demonstrated empirically but not formally verified for all failure modes.
  - Starship's full-stack catch maneuver (mechanical arms catching a falling booster) has no published failure mode and effects analysis in peer-reviewed literature.
last_reviewed: "2026-05-05"

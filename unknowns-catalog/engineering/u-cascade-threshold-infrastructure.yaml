id: u-cascade-threshold-infrastructure
title: What are the critical coupling thresholds between interdependent infrastructure networks (power, water, transport, communications) that trigger catastrophic cascade failures?
status: open
priority: critical
disciplines:
  - network-science
  - engineering
  - complexity-science
summary: >
  Modern infrastructure systems are coupled interdependent networks: the power grid
  requires SCADA communications, communications require power, water treatment requires
  power and communications, transport requires fuel and digital routing. The Buldyrev
  (2010) model shows that interdependent networks can undergo abrupt first-order
  phase transitions (unlike single networks which fail continuously), with a sharp
  percolation threshold below which small perturbations cascade to complete failure.
  The critical coupling parameter q_c (fraction of nodes requiring functional counterparts
  in the other network) determines system fragility. For real infrastructure, the
  empirical values of q_c are unknown, the coupling topology is incompletely mapped,
  and the dynamics include restoration processes (repair crews) not in the original
  model. The 2003 Italian blackout propagated through exactly this power-internet
  coupling, but quantitative threshold estimates for current US infrastructure remain
  classified or nonexistent.
systematic_gaps:
  - Empirical coupling topology between US critical infrastructure systems is not
    publicly available for research.
  - Dynamic models including repair and restoration crews show different critical
    thresholds than static percolation models, but have not been validated.
  - The interaction between cascade dynamics and human decision-making (operators
    disconnecting nodes to prevent further cascades) is not modeled.
references:

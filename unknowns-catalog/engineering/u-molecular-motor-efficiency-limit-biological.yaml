id: u-molecular-motor-efficiency-limit-biological
title: >
  What sets the upper bound on mechanochemical efficiency of biological
  molecular motors, why does ATP synthase approach 100% efficiency while
  myosin and kinesin are limited to 25-40%, and can the Jarzynski equality
  be used to engineer artificial nanomotors approaching the biological limit?
status: open
priority: medium
disciplines:
  - biophysics
  - mechanical-engineering
  - thermodynamics
  - nanotechnology
summary: >
  Biological molecular motors convert ATP hydrolysis free energy (ΔG ≈ -54 kJ/mol
  under physiological conditions) to mechanical work with variable efficiency:
  ATP synthase (reverse mode: making ATP from proton gradient) approaches near-
  100% efficiency near equilibrium. F₁-ATPase (ATP-driven rotation) achieves
  ~80-100% efficiency at low load. Kinesin achieves ~40% efficiency. Myosin ~25%.

  The efficiency differences are not fully explained by current models. ATP
  synthase operates near thermodynamic reversibility by taking many small steps
  (120° rotations of 3 subunits, driven by proton translocation). Kinesin's
  8-nm steps involve more mechanical irreversibility. The role of conformational
  fluctuations, power stroke geometry, and solvation contributions to efficiency
  is not quantitatively understood.

  The Jarzynski equality ⟨e^{-W/kT}⟩ = e^{-ΔF/kT} enables measurement of
  equilibrium free energy from non-equilibrium experiments, but using it to
  optimize artificial motor designs requires understanding which aspects of
  motor geometry minimize irreversibility. No artificial nanomotor approaches
  biological efficiency.
systematic_gaps:
  - Detailed kinetic measurements distinguishing power stroke from diffusive components
  - Quantitative theory of conformational irreversibility in motor cycles
  - Artificial nanomotor designs tested against Jarzynski equality predictions
  - Stochastic thermodynamics framework for multi-step motor cycles
suggested_hypotheses:
  - h-molecular-motor-near-equilibrium-operation

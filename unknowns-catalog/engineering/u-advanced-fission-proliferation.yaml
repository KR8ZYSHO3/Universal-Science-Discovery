id: u-advanced-fission-proliferation
title: Do advanced fission reactor designs (molten salt, fast spectrum, small modular reactors) present materially different nuclear proliferation risks than light-water reactors?
status: open
priority: high
disciplines:
  - nuclear-engineering
  - engineering
  - security-studies
  - international-relations
summary: >
  Advanced nuclear reactors (molten salt, lead-cooled fast, high-temperature gas-cooled,
  small modular) differ from traditional light-water reactors in fuel cycle, coolant,
  and operational characteristics. Some designs can breed fissile material (thorium-U233
  cycle, fast reactors with Pu breeding), use higher-enriched uranium fuel, or produce
  different isotopic compositions of spent fuel. Whether these differences meaningfully
  change the proliferation risk compared to the existing fleet—and whether international
  safeguards (IAEA) are adequate for novel reactor types—is actively debated among
  nuclear security experts and is not resolved before widespread deployment.
systematic_gaps:
  - The U-233 diversion risk from thorium cycle reactors has not been assessed under realistic material accounting conditions for online reprocessing designs.
  - Whether SMR fuel (higher enrichment ~20% LEU) increases enrichment facility incentives or whether the small fuel volume per reactor reduces risk is not settled.
  - The detection capability of existing IAEA safeguards instruments in non-LWR reactor geometries has not been fully characterized.
last_reviewed: "2026-05-05"

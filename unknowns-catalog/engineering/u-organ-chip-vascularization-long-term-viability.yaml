id: u-organ-chip-vascularization-long-term-viability
title: How can organ-on-a-chip devices maintain functional vascularized 3D tissue architectures for weeks-to-months timescales to enable chronic disease modeling and long-term drug toxicity testing?
status: open
priority: high
disciplines:
  - bioengineering
  - cell-biology
  - microfluidics
summary: >
  Current organ-on-a-chip devices typically survive 1-2 weeks before cell viability
  degrades due to hypoxia (insufficient oxygen delivery to 3D tissue interiors),
  accumulation of metabolic waste, and loss of cell phenotype. True organ physiology
  requires weeks-to-months of stable function (e.g., hepatotoxicity appears over 4-6 weeks
  in clinical use; Alzheimer's disease pathology requires months in culture). The engineering
  challenge is vascularization: real organs maintain cell viability through perfused capillary
  networks (maximum diffusion distance ~200 μm). Self-assembled microvascular networks in OoC
  using HUVEC cells have been demonstrated but are mechanically fragile. Bioprinted vascular
  networks (sacrificial carbohydrate glass, pluronic scaffolds) enable pre-designed geometry
  but lack the hierarchical branching of native vasculature. The interaction between
  engineered flow and cell-secreted extracellular matrix remodeling remains poorly controlled.
systematic_gaps:
  - No OoC platform has demonstrated stable, physiologically realistic vascular perfusion
    for more than 4 weeks with multiple organ-relevant cell types.
  - The Reynolds number and shear stress requirements for stable self-assembled microvasculature
    in OoC devices have not been systematically characterized.
  - Integration of peristaltic pump mechanics with vascularized tissue to avoid flow-induced
    endothelial damage over chronic timescales is unsolved.

id: u-soft-robotics-hyperelastic-inverse-design
title: >
  Can hyperelastic inverse design reliably prescribe soft actuator geometry and fiber architecture to achieve a target force-displacement trajectory, and how does material uncertainty propagate to actuation performance?
status: open
priority: high
disciplines:
  - engineering
  - mechanics
summary: >
  Forward FEM simulation of soft actuators using hyperelastic models is well-established, but the inverse problem (prescribing a target motion and computing the required geometry, fiber angles, and material stiffness) is highly non-convex and under-constrained. Sensitivity of predicted actuation to silicone batch-to-batch material variability has not been systematically quantified.

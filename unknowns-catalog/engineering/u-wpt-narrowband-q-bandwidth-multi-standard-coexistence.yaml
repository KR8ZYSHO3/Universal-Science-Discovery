id: u-wpt-narrowband-q-bandwidth-multi-standard-coexistence
title: >
  What joint constraints do resonator Q and coupling bandwidth impose on operating multiple wireless power
  standards or carriers through shared coils without unacceptable efficiency loss or EMI?
status: open
priority: medium
disciplines:
  - electrical-engineering
  - electromagnetism
summary: >
  Consumer ecosystems mix Qi and proprietary mid-field chargers at overlapping frequencies; ferrite-backed
  coils are engineered for high Q to maximize η at a single carrier. Whether predictable coexistence curves
  (efficiency versus carrier spacing at fixed geometry) exist across realistic mismatch networks — analogous
  to RF duplex filters — has not been consolidated into standards-grade guidance.
systematic_gaps:
  - Lack of published multi-carrier WPT datasets that separate resonator bandwidth limits from inverter slew-rate limits.
  - Regulatory EMI templates rarely expose worst-case cases when two resonant links detune each other through stray coupling.

suggested_hypotheses:
  - h-wpt-coexistence-requires-q-bandwidth-renegotiation-per-standard

related_bridges:

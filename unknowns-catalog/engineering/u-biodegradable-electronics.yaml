id: u-biodegradable-electronics
title: Can biodegradable or transient electronics achieve the electrical performance and environmental lifetime control needed for implantable and disposable devices?
status: open
priority: medium
disciplines:
  - materials-science
  - engineering
  - biomedical-engineering
summary: >
  Transient electronics—devices that dissolve or degrade on programmed timescales—
  have been demonstrated using silicon nanomembranes, water-soluble polymers (PLGA,
  PVA), and bioresorbable metals (Mg, Zn). Medical implants that dissolve after a
  therapeutic period without surgical extraction would reduce re-operation risk.
  Environmental electronics (sensors, RFID) that degrade after useful life would
  reduce e-waste. Current transient devices have conductivity 10–100x lower than
  conventional electronics, degradation rates that are difficult to control precisely,
  and are sensitive to humidity before intended dissolution. Whether performance
  sufficient for clinical or commercial applications can be achieved is unresolved.
systematic_gaps:
  - The mechanism of ion transport through degrading PLGA matrices (relevant to bioresorbable battery lifetime) has not been fully characterized.
  - Long-term biocompatibility of transient electronics degradation products in soft tissue has been tested in animals but not in humans.
  - Programmable degradation rates (variable lifetime in the same material system) have not been demonstrated without external triggering.
last_reviewed: "2026-05-05"

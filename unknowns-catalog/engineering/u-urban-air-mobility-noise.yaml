id: u-urban-air-mobility-noise
title: What are the fundamental acoustic limits of electric vertical-takeoff-and-landing (eVTOL) aircraft, and can they achieve community-acceptable noise levels in urban environments?
status: open
priority: high
disciplines:
  - aerospace-engineering
  - acoustics
  - engineering
  - urban-planning
summary: >
  Electric air taxis (Joby, Archer, Lilium) are intended to operate within urban
  areas at low altitude. Their noise emission is dominated by rotor-interaction tones
  (blade-vortex interaction) and broadband turbulence ingestion noise. While electric
  propulsion enables lower RPM and larger rotors than helicopters of equivalent thrust,
  the fundamental acoustic trade-offs (disc loading, tip speed, number of rotors)
  constrain how quiet multi-rotor eVTOL can be. Whether any multi-rotor configuration
  can achieve 55 dBA at 1000 ft (WHO urban noise guideline) during hover and climb,
  and what the aeroacoustic minimum is for practical payload and range, is unresolved.
systematic_gaps:
  - Blade-vortex interaction noise during descent at urban approach angles has not been measured for multi-rotor eVTOL configurations.
  - Psychoacoustic annoyance of eVTOL noise (tonal vs. broadband character) at equal A-weighted levels has not been fully characterized against community response.
  - The interaction of eVTOL noise with urban canyon propagation creates hot spots that simple single-number metrics do not capture.
last_reviewed: "2026-05-05"

id: u-lidar-scene-reconstruction-nonuniqueness
title: What are certifiable uncertainty bounds for reconstructed urban façades from airborne
  LiDAR under realistic occlusion and multi-return statistics?
status: open
priority: medium
disciplines:
- engineering
- mathematics
- remote-sensing
summary: Engineering practice reports RMSE on benchmarks; inverse-problems theory wants operator
  norms and priors. Bridging them for safety-critical autonomy is incomplete.
systematic_gaps:
- Few public datasets with ground-truth 3D error fields tied to beam divergence and registration.
- Non-Gaussian heavy-tailed clutter violates textbook regularization analyses.
suggested_hypotheses:
- h-sparsity-priors-stabilize-lidar-surface-recovery
related_bridges:
- b-lidar-x-inverse-problems
last_reviewed: '2026-05-07'
references:
- doi: 10.1109/TGRS.2004.839552
  note: Representative full-waveform / LiDAR signal processing bridge paper in remote sensing
- doi: 10.1029/2001RS002475
  note: Harding et al. (2001) — airborne LiDAR vegetation mapping methodology (geometric inverse
    flavor)

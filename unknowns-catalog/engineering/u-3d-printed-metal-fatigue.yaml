id: u-3d-printed-metal-fatigue
title: How do process-induced defects in laser powder bed fusion parts govern fatigue life, and can fatigue properties of AM metals match wrought counterparts?
status: open
priority: high
disciplines:
  - manufacturing-engineering
  - engineering
  - materials-science
  - structural-engineering
summary: >
  Additive manufactured (AM) metals (Ti-6Al-4V, Inconel 718, 316L stainless) from
  laser powder bed fusion (L-PBF) exhibit fatigue lives 2–10x lower than equivalent
  wrought alloys due to internal defects (lack-of-fusion voids, gas porosity, keyhole
  pores). Defect size, location, and morphology vary with process parameters and cannot
  be eliminated entirely. Whether hot isostatic pressing (HIP), surface treatment, or
  process parameter optimization can close the fatigue gap for flight-critical
  applications is not established. Probabilistic fatigue life prediction from defect
  distributions is available in principle but requires defect characterization methods
  that are not yet part of qualification standards.
systematic_gaps:
  - The relationship between defect size distribution (measured by CT) and fatigue life scatter has not been validated across the range of defect types generated by L-PBF.
  - Whether fatigue initiation in AM metals always originates from the largest defect (as extreme value theory predicts) or from defect clusters is not established for all relevant alloys.
  - The effectiveness of HIP in closing lack-of-fusion voids (which are irregular and may have oxide-contaminated surfaces) is material and process dependent but not systematically characterized.
last_reviewed: "2026-05-05"

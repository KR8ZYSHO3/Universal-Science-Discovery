id: u-betz-limit-exceeded-unsteady-flow
title: >
  Can wind turbines extract more than the Betz limit power fraction in highly turbulent or unsteady inflow conditions by exploiting unsteady aerodynamic effects, and if so by how much?
status: open
priority: high
disciplines:
  - engineering
  - fluid-mechanics
summary: >
  The Betz limit is derived for steady, uniform, inviscid flow, but real wind turbines operate in turbulent shear flow with gusty inflow. Unsteady aerodynamic effects (dynamic stall, pitch optimization) can potentially exceed the steady-state Betz limit in instantaneous power extraction by exploiting kinetic energy stored in blade rotation, but whether time-averaged power extraction can systematically exceed 16/27 in turbulent flow is theoretically and experimentally unresolved.

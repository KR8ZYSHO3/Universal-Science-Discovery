id: u-offshore-wind-fatigue
title: What are the accurate fatigue life models for offshore wind turbine monopile foundations under combined stochastic wave, wind, and ice loading?
status: open
priority: high
disciplines:
  - structural-engineering
  - ocean-engineering
  - engineering
  - materials-science
summary: >
  Offshore wind turbines on monopile foundations experience >10^8 load cycles over
  their 25-year design life from combined wind turbulence, wave loading, current,
  and (in northern latitudes) ice loads. S-N curve fatigue models calibrated in air
  do not account for corrosion-fatigue interaction in marine environments, soil-pile
  interaction stiffness changes from cyclic loading, and the statistical extremes of
  combined load cases. Current designs use conservative safety factors that may be
  economically limiting; whether they are also technically sufficient for 30+ year
  lifetimes is not validated by long-term field data because large-scale offshore
  wind is still <20 years old.
systematic_gaps:
  - Long-term fatigue crack propagation data in welded steel at seawater temperatures under representative loading spectra are sparse.
  - Soil stiffness degradation under cyclic lateral loading changes foundation resonance frequency over years; long-term monitoring data sufficient to validate models are not yet available.
  - The interaction between turbine control strategies (individual pitch control, passive load shedding) and structural fatigue life has not been characterized across turbine classes.
last_reviewed: "2026-05-05"

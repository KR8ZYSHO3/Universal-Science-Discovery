id: u-microplastic-filtration
title: What physical and chemical mechanisms enable efficient removal of nanoplastics and microplastics from drinking water and wastewater at scale?
status: open
priority: high
disciplines:
  - environmental-engineering
  - engineering
  - water-treatment
summary: >
  Microplastics (<5 mm) and nanoplastics (<1 µm) are present in drinking water,
  wastewater effluent, and ocean water worldwide. Conventional water treatment
  (coagulation, flocculation, sand filtration) removes 60–80% of microplastics but
  is ineffective for nanoplastics. Membrane filtration (ultrafiltration, nanofiltration)
  removes nanoplastics but at high energy cost and with rapid fouling from natural
  organic matter. The health effects of nanoplastics absorbed through the gut are
  incompletely characterized, complicating target-setting. Cost-effective removal at
  full wastewater treatment plant scale has not been demonstrated.
systematic_gaps:
  - Standard analytical methods for nanoplastics in complex matrices are not yet validated or standardized, making removal efficiency comparisons unreliable.
  - The fouling mechanism of microplastic-laden water on membranes differs from conventional fouling but has not been modeled predictively.
  - Whether agglomeration of nanoplastics with natural organic matter can be engineered to improve conventional treatment removal is untested at scale.
last_reviewed: "2026-05-05"

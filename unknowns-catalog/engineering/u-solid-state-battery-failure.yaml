id: u-solid-state-battery-failure
title: What are the dominant failure modes in solid-state lithium batteries, and can lithium dendrite penetration of solid electrolytes be prevented at high current densities?
status: open
priority: critical
disciplines:
  - electrochemistry
  - materials-science
  - engineering
summary: >
  Solid-state batteries (SSBs) promise higher energy density, improved safety (no
  flammable liquid electrolyte), and longer cycle life vs. liquid electrolyte lithium-ion
  cells. The primary barrier to commercialization is lithium metal dendrite formation:
  lithium filaments nucleate at grain boundaries and defects in solid electrolytes
  (LLZO, LIPON, sulfide ceramics) and propagate under compressive stress, eventually
  shorting the cell. The critical current density above which dendrite propagation
  is unavoidable is debated and appears to depend on stack pressure, electrolyte
  microstructure, and interfacial chemistry in ways not yet fully understood.
systematic_gaps:
  - The nucleation mechanism of Li dendrites at solid electrolyte grain boundaries vs. surface defects has not been resolved in operando.
  - Whether electronic conductivity in sulfide solid electrolytes drives dendrite nucleation differently from oxide electrolytes is not established.
  - The pressure required to suppress dendrite growth is incompatible with thin-film cell architectures; alternative suppression strategies lack experimental validation.
last_reviewed: "2026-05-05"

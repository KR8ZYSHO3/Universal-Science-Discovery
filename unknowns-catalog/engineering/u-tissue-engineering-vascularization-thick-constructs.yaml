id: u-tissue-engineering-vascularization-thick-constructs
title: >
  How can functional vascular networks be engineered into thick (>1 cm) tissue
  constructs to overcome the oxygen diffusion bottleneck — and what is the minimum
  vascular network geometry required to sustain cell viability at physiological
  metabolic rates?
status: open
priority: critical
disciplines:
  - engineering
  - biomedical-engineering
  - biology
  - fluid-dynamics
  - materials-science
summary: >
  The vascularization bottleneck is the central unsolved problem in tissue engineering:
  oxygen and nutrient diffusion in tissue limits cell viability to ~200 μm from the
  nearest capillary (Krogh cylinder model). This prevents fabrication of thick,
  clinically relevant tissue constructs (heart wall ~1 cm, liver lobe ~3 cm, kidney
  cortex ~1 cm). Current approaches: (1) Sacrificial templating — print or mold
  vascular channels using dissolvable materials (Pluronic F127, sugar glass, carbohydrate
  glass — Miller et al. 2012), remove template, perfuse. Achieves ~200 μm channel spacing
  but lacks true capillary network (smallest channels ~50 μm, vs. 7-10 μm capillaries).
  (2) Self-assembled vasculogenesis — co-culture with endothelial cells and pericytes
  produces spontaneous capillary networks via VEGF gradient-guided sprouting, but
  maximum depth ~2 mm and requires weeks. (3) Bioprinting of endothelial-lined channels —
  direct printing of HUVEC-laden bioink into vascular patterns, then maturation.
  Lacks connection to capillary-scale vessels. (4) Organ decellularization — provides
  native vascular tree but requires donor tissue and does not generate de novo. The
  open questions are: (1) What is the minimum required vessel density for different
  tissue types at physiological metabolic rates? (2) Can bioprinted macro-vessels
  (>50 μm) connect to self-assembled micro-vessels (<10 μm) by controlling VEGF
  gradients? (3) What anastomotic geometry enables immediate perfusion upon implantation
  without thrombosis?
systematic_gaps:
  - No engineered tissue construct thicker than ~3 mm has achieved sustained cell
    viability (>80%) throughout the construct without external perfusion during culture.
  - The VEGF gradient profile required to guide capillary sprouting from a printed
    macrovascular channel into the surrounding tissue space has not been determined
    or controlled in 3D.
  - The minimum functional vascular network topology (fractal branching, inter-capillary
    spacing) for specific tissue types (cardiac, hepatic, renal) has not been
    computationally derived and experimentally validated.

id: u-finite-depth-kelvin-wake-angle-design-transfer
title: >
  When do finite depth, hull geometry, and near-field effects dominate over the ideal Kelvin wake angle in design-relevant ship-wave predictions?
status: open
priority: medium
disciplines:
  - engineering
  - fluid-mechanics
summary: >
  Ideal Kelvin-wake theory is established, but its engineering transfer requires calibrated boundaries for finite-depth and non-asymptotic regimes.
systematic_gaps:
  - Open wake-image datasets with hull speed, bathymetry, and geometry metadata.
  - Comparative errors for analytic, CFD, and empirical wake-angle predictions.
suggested_hypotheses:
  - h-dispersion-aware-wake-visualization-improves-hull-wave-interpretation
related_bridges:
  - b-kelvin-wake-angle-x-ship-wave-dispersion-design
last_reviewed: "2026-05-07"
references:
  - doi: "10.1103/PhysRevLett.110.214503"
    note: Rabaud and Moisy (2013) on narrow ship wakes and Froude-number dependence.

id: u-fem-dec-mixed-form-equivalence-limits
title: For industrial-scale nonlinear elasticity and contact, when do DEC meshes match mixed
  FEM accuracy at equal cost, and where do nonlinear constitutive maps break commuting diagrams?
status: open
priority: medium
disciplines:
- engineering
- mathematics
summary: Linear theory is mature; nonlinear elasticity, plasticity, and fracture introduce
  compatibility issues that are not fully settled for structure-preserving schemes.
systematic_gaps:
- Software ecosystem fragmentation between DEC research codes and mainstream FEM suites.
- Time-dependent problems need symplectic or structure-preserving time integration paired
  with spatial FEEC.
suggested_hypotheses:
- h-mixed-fem-for-hodge-laplace-matches-dec-upwind-schemes
related_bridges:

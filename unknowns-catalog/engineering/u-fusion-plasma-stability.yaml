id: u-fusion-plasma-stability
title: What are the remaining plasma instability and confinement barriers to sustained net-energy-gain nuclear fusion at commercial scale?
status: open
priority: critical
disciplines:
  - plasma-physics
  - nuclear-engineering
  - engineering
summary: >
  Magnetic confinement fusion (tokamak, stellarator) has achieved Q>1 ignition
  transiently (NIF, 2022) and sustained plasma operation (JET, KSTAR), but no device
  has achieved continuous net energy gain at the grid scale. Key instabilities—
  edge-localized modes (ELMs), disruptions, neoclassical tearing modes—must be
  controlled to maintain plasma performance over hours. The plasma-wall interaction
  problem (tritium retention in tungsten, erosion of divertor components under 10 MW/m²
  heat flux) remains unsolved at ITER-relevant scales. The confinement scaling laws
  from existing devices may not extrapolate to DEMO-scale reactors.
systematic_gaps:
  - ELM suppression methods (RMP coils, pellet injection) developed at existing tokamaks may not scale to ITER without additional research.
  - The tritium permeation rate through tungsten at reactor-relevant fluence and temperature has not been measured at scale.
  - The economic feasibility of fusion depends on whether confinement scales as H-mode empirical laws predict, but no device operates in the relevant parameter regime.
last_reviewed: "2026-05-05"

id: u-reversible-em-logic-gate-design
title: >
  What physically realizable gate set embeds classical reversible computation (Toffoli/Fredkin-class) into microwave or RF cavity modes using non-helical resonator circuits?
status: open
priority: medium

summary: >
  Reversible computing literature emphasizes abstract gates; translating them to electromagnetic degrees of
  freedom requires specifying control Hamiltonians, ancilla lines, and measurement/feedback constraints. This
  gap asks for concrete circuit-level embeddings whose erasure events can be enumerated.

systematic_gaps:
  - "No standard library of reversible RF primitives analogous to CMOS adiabatic families."
  - "Cross-talk and finite bandwidth break ideal bijectivity unless expanded Hilbert space with ancillas is engineered."
  - "Verification methods for logical reversibility under finite-Q modes have not converged."

suggested_hypotheses:
  - h-nonhelical-resonator-adiabatic-quantum-memory

related_bridges:

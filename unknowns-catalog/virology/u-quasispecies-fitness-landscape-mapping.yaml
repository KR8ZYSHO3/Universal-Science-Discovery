id: u-quasispecies-fitness-landscape-mapping
title: What is the structure of the fitness landscape for RNA viruses, and how does landscape ruggedness determine the error threshold and the evolutionary accessibility of drug resistance?
status: open
priority: high
disciplines:
  - virology
  - information-theory
  - evolutionary-biology
summary: >
  The quasispecies error threshold depends on the ratio of maximum to mean fitness in
  the population, which requires knowledge of the fitness landscape (fitness as a function
  of sequence). For RNA viruses, this landscape is high-dimensional, rugged, and only
  partially measurable by deep mutational scanning. Key unknowns: (1) how correlated
  is the fitness landscape (are fit sequences clustered in sequence space or scattered),
  (2) how does landscape ruggedness affect the relationship between mutation rate and
  error threshold, (3) can fitness landscape measurements predict which mutations confer
  drug resistance before they are observed clinically?
systematic_gaps:
  - Complete fitness landscapes are only available for small proteins (< 200 aa); viral replicases are too large for full DMS
  - Epistasis (interaction between mutations) is poorly characterized for RNA virus polymerases
  - The mapping from in vitro fitness to in vivo replication fitness is uncertain
related_bridges:

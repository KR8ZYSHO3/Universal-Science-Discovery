id: u-spectral-gap-quantum-phase-transitions
title: Can the spectral gap of a local Hamiltonian be computed efficiently, and does its vanishing exactly predict quantum phase transition locations?
status: open
priority: high
disciplines:
  - quantum-physics
  - computational-complexity
  - condensed-matter-physics
summary: >
  The spectral gap — energy difference between ground state and first excited state —
  vanishes at quantum phase transitions and determines whether a quantum system can be
  efficiently simulated classically (gapped systems obey area laws for entanglement).
  Cubitt, Perez-Garcia & Wolf (2015) proved that determining whether a Hamiltonian is
  gapped or gapless is undecidable in general (reducing to the halting problem). However,
  for physically relevant systems with finite-range interactions and specific symmetries,
  gap questions may be decidable. Whether all physical quantum phase transitions are
  preceded by spectral gap closing (or whether topological transitions can occur without
  gap closing) remains open.
systematic_gaps:
  - The decidability boundary between systems where spectral gap is computable vs.
    undecidable has not been mapped for physically realistic Hamiltonians.
  - Topological quantum phase transitions (e.g., TKNN invariant changes in topological
    insulators) can occur while the gap remains open — the gap-phase transition relation
    is not universal.
related_bridges:

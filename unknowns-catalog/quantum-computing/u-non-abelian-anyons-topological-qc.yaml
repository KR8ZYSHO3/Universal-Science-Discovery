id: u-non-abelian-anyons-topological-qc
title: "Have non-Abelian anyons been experimentally realized with sufficient fidelity to demonstrate braiding-based topological quantum gates, and what material systems provide the best platform for scalable topological qubits resistant to local decoherence?"
status: open
priority: critical
disciplines:
  - quantum-computing
  - condensed-matter
  - topology
summary: >
  Topological quantum computing requires non-Abelian anyons that can be braided to produce quantum gates.
  Majorana zero modes in semiconductor-superconductor nanowires were proposed as the simplest platform but
  multiple claimed detections have been retracted or disputed. Key unknowns: (1) have Majorana zero modes
  been unambiguously demonstrated in any solid-state system with topological protection verified by thermal
  conductance or interferometry, (2) for Fibonacci anyons in fractional quantum Hall systems (ν = 12/5),
  is the anyon model correct and are braiding operations coherent enough for computation, (3) can topological
  qubits in moiré superlattice systems (twisted bilayer graphene near ν = 1/2) outperform conventional
  transmon qubits in coherence time per unit area?
systematic_gaps:
  - Topological gap protection of Majorana modes requires the system to be in the true topological phase; distinguishing topological from trivial Andreev bound states requires careful spectroscopy
  - Braiding experiments require moving Majorana modes adiabatically, which demands extremely low temperatures and fast gate operations not yet simultaneously achieved
  - Fractional quantum Hall states at ν = 5/2 and 12/5 have not been unambiguously assigned to the Pfaffian or anti-Pfaffian universality class

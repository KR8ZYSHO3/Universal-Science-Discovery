id: u-quantum-walk-decoherence-practical-speedup
title: At what decoherence rate does the quadratic quantum walk speedup over classical random walks disappear, and can noise-tolerant quantum walk algorithms recover polynomial speedup on near-term hardware?
status: open
priority: medium
disciplines:
  - quantum-computing
  - probability-theory
  - quantum-information
summary: >
  Quantum walk algorithms achieve quadratic speedups (O(sqrt(N)) vs O(N)) for graph
  search under coherent evolution. Decoherence from coupling to the environment
  causes the walk to transition from quantum (ballistic) to classical (diffusive)
  behavior. Key unknowns: (1) what is the precise decoherence rate threshold above
  which the quadratic speedup is lost, (2) can quantum error mitigation (zero-noise
  extrapolation, symmetry verification) recover useful speedup on NISQ hardware,
  (3) is there a regime of intermediate decoherence where quantum walks still outperform
  classical random walks for practical graph problems?
systematic_gaps:
  - The decoherence threshold for quantum walk speedup loss has not been characterized for realistic noise models (T1/T2 coherence)
  - Experimental demonstrations of quantum walk search speedup on quantum processors are limited to small graphs
  - The transition from quantum to classical walk dynamics under decoherence is not fully characterized for non-Markovian noise
related_bridges:

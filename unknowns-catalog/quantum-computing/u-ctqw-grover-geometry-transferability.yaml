id: u-ctqw-grover-geometry-transferability
title: >
  Which graph families encountered in hardware layouts preserve continuous-time quantum walk spatial-search speedups under realistic connectivity constraints, decoherence, and oracle compilation overhead relative to discrete Grover circuits?
status: open
priority: medium
disciplines:
  - quantum-computing
  - quantum-information
summary: >
  Idealized Johnson-graph and hypercube analyses motivate √N scaling, but device graphs are irregular and noisy. Transfer limits hinge on spectral-gap preservation, degeneracies introduced by disorder, and effective oracle Hamiltonians differing from textbook constructions.
systematic_gaps:
  - Benchmark suites tying compilation overhead + decoherence to end-to-end speedup thresholds on identical graph instances.
  - Empirical spectral-gap distributions for ion-trap / superconducting connectivity graphs compared with spatial-search proofs.
suggested_hypotheses:
  - h-johnson-graph-spectral-gap-predicts-ctqw-search-plateau
related_bridges:
  - b-continuous-time-qwalk-x-grover-spatial-search-geometry
last_reviewed: "2026-05-07"
references:
  - doi: "10.1103/PhysRevA.70.022314"
    note: Childs & Goldstone (2004) — spatial search by quantum walk (Phys Rev A).
  - doi: "10.1103/PhysRevLett.79.325"
    note: Grover (1997) — quantum search speedup foundation (Phys Rev Lett).

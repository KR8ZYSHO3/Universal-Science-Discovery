id: u-quantum-speedup-optimization-boundary
title: What is the precise boundary between optimization problems where quantum annealing offers speedup over classical simulated annealing?
status: open
priority: high
disciplines:
  - quantum-computing
  - optimization
  - statistical-physics
summary: >
  Quantum annealing replaces thermal fluctuations (simulated annealing) with quantum
  tunneling to escape local minima. For frustrated spin glass problems, quantum tunneling
  can traverse energy barriers that thermal fluctuations must climb. D-Wave systems
  implement quantum annealing in hardware, but demonstrations of genuine quantum speedup
  (beyond what optimized classical algorithms achieve) remain contested. The theoretical
  speedup boundary — which problem classes benefit from quantum tunneling vs. thermal
  fluctuations — maps to questions about the quantum vs. classical free energy landscape
  geometry. Problems with tall, thin barriers favor quantum tunneling; wide, shallow
  barriers favor thermal fluctuations.
systematic_gaps:
  - No benchmark suite distinguishes problems that favor quantum vs. classical annealing
    based on landscape geometry rather than just instance hardness.
  - The connection between problem graph structure (topology of variable interactions)
    and quantum speedup has not been theoretically characterized.

id: u-tsunami-submarine-slides
title: What are the physics of tsunami generation by submarine landslides, and how does slide rheology control wave amplitude and runup?
status: open
priority: high
disciplines:
  - geoscience
  - oceanography
  - geomechanics
  - coastal-engineering
summary: >
  Submarine landslides can generate tsunamis with runups far exceeding those from
  equivalent seismic moment earthquakes, because slide dynamics (volume, velocity,
  retrogression) generate different wave source characteristics. The 1929 Grand Banks
  slide and the 8,200-year-old Storegga slide (which may have struck prehistoric
  Scotland) are key examples. The rheology of submarine sediments during rapid failure
  (viscous vs. plastic vs. granular flow), the role of gas hydrate dissociation in
  triggering failures, and the scaling relationships between slide parameters and
  tsunami height are poorly constrained by field data.
systematic_gaps:
  - Laboratory experiments on slide-generated waves use simplified geometries; scaling to oceanic bathymetry is unvalidated.
  - Submarine landslide catalogs are incomplete because most submarine slopes have not been mapped at sufficient resolution.
  - Whether climate change (warming oceans destabilizing gas hydrates) is currently increasing submarine slope instability is unquantified.
last_reviewed: "2026-05-05"

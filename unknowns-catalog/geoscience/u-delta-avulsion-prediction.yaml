id: u-delta-avulsion-prediction
title: Can river delta avulsion timing and pathfinding be predicted, and what are the dominant controls on avulsion frequency?
status: open
priority: high
disciplines:
  - geomorphology
  - geoscience
  - hydrology
  - coastal-engineering
summary: >
  Delta avulsions—sudden shifts of the main river channel to a new path across the
  delta plain—redistribute freshwater and sediment, reshape coastlines, and endanger
  human populations. The Mississippi River is 1–2 avulsion events overdue based on
  geological recurrence intervals. Current models predict avulsion when the channel
  superelevation ratio exceeds a threshold, but the exact timing and pathway cannot
  be forecast. The role of sea-level rise, sediment compaction, and upstream discharge
  variability in modifying avulsion thresholds is poorly quantified.
systematic_gaps:
  - Avulsion timing prediction requires knowledge of subsurface stratigraphy and compaction rates that are only coarsely known for most large deltas.
  - Whether avulsions are purely geomorphic threshold phenomena or are triggered by external forcing (floods, earthquakes) is unresolved.
  - The fate of abandoned lobes (how quickly they subside and erode) affects sea-level and coastal hazard projections for tens of millions of delta inhabitants.
last_reviewed: "2026-05-05"

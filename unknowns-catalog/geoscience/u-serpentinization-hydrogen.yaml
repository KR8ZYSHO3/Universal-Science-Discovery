id: u-serpentinization-hydrogen
title: What is the global flux of abiotic hydrogen produced by serpentinization, and can it support subsurface chemolithotrophs at ocean ridges and in continental settings?
status: open
priority: high
disciplines:
  - geochemistry
  - geoscience
  - astrobiology
  - microbiology
summary: >
  Serpentinization (hydration of olivine and pyroxene) produces H2 through iron
  oxidation at temperatures 200–400°C. This abiotic H2 fuels chemolithotrophic
  microorganisms at deep-sea vents (Lost City) and potentially in the subsurface
  biosphere. The global serpentinization H2 flux has been estimated at 10^11–10^12 mol/yr
  but is poorly constrained. The fraction that reaches the biosphere vs. is consumed
  by abiotic reactions, and whether mid-ocean ridge flanks harbor a globally significant
  H2-fueled microbial ecosystem, is unresolved. This has direct implications for
  biosignature detection on ocean worlds (Enceladus, Europa).
systematic_gaps:
  - H2 flux measurements exist for only a handful of vent sites; interpolation to global ridge length is highly uncertain.
  - The efficiency of H2 utilization by the subsurface biosphere at pressures >100 bar and temperatures >120°C is not well characterized.
  - Whether continental serpentinization in ophiolites and cratonic cratons contributes significantly to the global H2 budget is unknown.
last_reviewed: "2026-05-05"

id: u-earthquake-soc-universality-class
title: >
  Which universality class does the earthquake fault network belong to —
  BTW sandpile (τ = 3/2), directed percolation, interface depinning, or
  a distinct geophysical class — and does the Gutenberg-Richter b-value
  directly measure the SOC critical exponent?
status: open
priority: high
disciplines:
  - seismology
  - statistical-physics
  - geophysics
  - complexity-science
summary: >
  The Gutenberg-Richter law gives P(E) ~ E^{-τ} with empirical τ ≈ 1.67
  ± 0.05 across global seismicity. The BTW sandpile model predicts τ = 3/2
  (mean-field) to τ = 1.56 (2D). Interface depinning models predict
  τ ≈ 1.28 (1D) to 1.56 (2D). Directed percolation predicts τ ≈ 1.5–1.7.
  The empirical exponent is consistent with several universality classes
  and no consensus exists on which one describes fault rupture dynamics.

  The difficulty is that real fault networks are geometrically complex (3D
  fractal fault zones, variable slip rates, fluid-mediated weakening),
  heterogeneous (different lithologies, stress histories), and driven by
  continuously varying tectonic loading rates. Laboratory acoustic emission
  experiments on stressed rock samples find τ ≈ 1.5–1.7, consistent with
  SOC, but the mapping from lab to crustal scale is uncertain.

  A related open question: does the Gutenberg-Richter b-value measure the
  SOC exponent directly, or does it measure the ratio of stress drop to
  energy release — quantities that are correlated but not identical? The
  b-value varies geographically (b ≈ 0.8–1.3 globally) in ways that might
  reflect either variable universality class or variable fault geometry.
systematic_gaps:
  - The empirical τ ≈ 1.67 does not clearly distinguish between BTW sandpile, directed percolation, and interface depinning universality classes.
  - Laboratory rock fracture experiments span 6 orders of magnitude in energy but do not replicate crustal-scale geometry or driving rates.
  - The b-value varies by ±0.3 across tectonic settings; whether this reflects genuine universality class variation or geometrical effects is unknown.
  - "Finite-size effects: smaller fault networks (smaller plates) should show larger deviations from power law; this prediction has not been systematically tested."

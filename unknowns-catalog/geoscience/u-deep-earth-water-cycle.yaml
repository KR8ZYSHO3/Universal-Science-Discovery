id: u-deep-earth-water-cycle
title: How much water is stored in Earth's mantle and lower crust, and what are the fluxes that govern the deep water cycle?
status: open
priority: high
disciplines:
  - geoscience
  - geochemistry
  - mantle-petrology
  - geodynamics
summary: >
  Water (hydroxyl defects and nominally anhydrous minerals) stored in the mantle
  significantly influences viscosity, melting point, and seismic velocity. Estimates
  of the mantle water budget range from 1 to 10 ocean masses, but the uncertainty
  spans an order of magnitude. Subduction carries hydrated oceanic crust into the
  mantle; arc volcanism and slab dehydration return water to the surface. The net
  flux—whether Earth's mantle is currently gaining or losing water—is unconstrained.
  This has consequences for mantle convection vigor, plate tectonic longevity, and
  the long-term habitability of Earth's surface.
systematic_gaps:
  - The water content of the lower mantle (below 660 km) cannot be directly sampled; only seismic proxies exist.
  - Subduction zone water budgets are poorly constrained because slab dehydration depth and efficiency vary with thermal structure.
  - The water storage capacity of post-perovskite in the D'' layer is experimentally unconstrained at relevant pressures.
suggested_hypotheses:
  - The mantle currently contains 2–4 ocean masses of water, and subduction returns water faster than arc volcanism releases it, implying secular mantle hydration.
references:
  - doi: "10.1016/j.epsl.2011.10.043"
    note: Hirschmann (2006) review of water storage capacity of nominally anhydrous minerals in the upper mantle
last_reviewed: "2026-05-05"

id: u-karst-aquifer-connectivity
title: How are karst aquifer conduit networks organized, and can their connectivity and recharge dynamics be characterized without full cave exploration?
status: open
priority: medium
disciplines:
  - hydrogeology
  - geoscience
  - hydrology
summary: >
  Karst aquifers (limestone, dolomite, gypsum terrains) provide drinking water to
  ~25% of the global population. Their dual-porosity structure—fast conduit flow
  and slow diffuse matrix flow—makes them highly sensitive to contamination and
  drought. The conduit network geometry, which controls recharge, storage, and
  spring discharge dynamics, can rarely be mapped directly. Non-invasive
  characterization methods (tracer tests, spring hydrograph analysis, geophysics)
  provide partial information, but predictive models of aquifer behavior remain
  poorly validated against conduit architecture.
systematic_gaps:
  - No non-invasive method reliably maps conduit geometry at depth in covered karst.
  - The transition between conduit-dominated and diffuse-flow-dominated recharge is abrupt but cannot be predicted from surface geology alone.
  - Climate change impacts on karst spring discharge are poorly constrained because recharge-discharge lags (months to decades) are aquifer-specific.
last_reviewed: "2026-05-05"

id: u-xenolith-mantle-bias
title: To what extent do mantle xenoliths provide a representative sample of the lithospheric mantle, and what biases are introduced by entrainment and transport?
status: open
priority: low
disciplines:
  - petrology
  - geoscience
  - geochemistry
summary: >
  Mantle xenoliths—rock fragments entrained in kimberlites and basaltic magmas—are
  the primary direct samples of the sub-continental lithospheric mantle. However,
  the entrainment process preferentially samples rocks near conduit margins, smaller
  and less dense fragments, and materials that survive decompression without melting.
  Chemical re-equilibration during ascent modifies Fe/Mg ratios, volatile contents,
  and trace element systematics. Whether the xenolith suite represents the bulk
  composition and thermal state of the lithosphere, or a systematically biased
  subset, is incompletely assessed.
systematic_gaps:
  - The depth from which xenoliths are sampled is estimated from thermobarometry but has systematic errors from retrograde re-equilibration.
  - The chemical signature of kimberlite-mantle interaction (metasomatism) cannot always be separated from primary mantle signatures.
  - The spatial coverage of xenolith localities is highly uneven; large portions of cratons have no xenolith samples.
last_reviewed: "2026-05-05"

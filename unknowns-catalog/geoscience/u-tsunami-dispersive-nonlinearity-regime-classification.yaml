id: u-tsunami-dispersive-nonlinearity-regime-classification
title: >
  Can operational tsunami forecast diagnostics classify approaching wave trains into bore-dominated versus dispersive-trailing-wave regimes early enough to improve inundation estimates beyond hydrostatic shallow-water defaults?
status: open
priority: medium
disciplines:
  - geophysics
  - fluid-mechanics
summary: >
  Linear shallow-water speeds anchor arrival timing, but nonlinear steepening and frequency dispersion interact with shelf bathymetry to reshape fronts. Regime classification remains partly heuristic because field inference mixes seismic uncertainties with rapidly evolving coastal dynamics.
systematic_gaps:
  - Curated buoy datasets with concurrent bottom-pressure and coastal tide-gauge chains annotated by regime proxies (Ursell number, nonlinear parameter).
  - Coupled-model validation exercises separating integrable toy limits from realistic-breaking fronts.
suggested_hypotheses:
  - h-tsunami-front-regime-classifier-nonlinear-dispersive-bore
related_bridges:

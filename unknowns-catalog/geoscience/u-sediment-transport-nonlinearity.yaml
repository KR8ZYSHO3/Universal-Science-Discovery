id: u-sediment-transport-nonlinearity
title: What are the nonlinear thresholds and stochastic dynamics governing sediment transport in rivers and their long-term geomorphic effects?
status: open
priority: medium
disciplines:
  - geomorphology
  - geoscience
  - fluid-mechanics
  - hydrology
summary: >
  Sediment transport in rivers is highly nonlinear: it effectively zero below a
  critical shear stress threshold, then increases rapidly as a high power of excess
  stress. This nonlinearity, combined with flood intermittency, means that rare large
  floods may dominate long-term geomorphic work even if their recurrence is millennial.
  The stochastic distribution of flood magnitudes, the threshold for sediment motion
  as a function of grain size and bed armor, and the interaction between bedform
  development and transport rate create emergent landscape behaviors that cannot be
  predicted from average conditions alone.
systematic_gaps:
  - Sediment entrainment thresholds are empirically determined but lack a first-principles mechanical derivation for natural sediment mixtures.
  - The contribution of rare catastrophic floods to long-term sediment flux vs. frequent moderate floods is poorly constrained in most field settings.
  - Feedback between sediment supply, valley geometry, and transport capacity creates path-dependent landscape evolution that current models cannot capture.
last_reviewed: "2026-05-05"

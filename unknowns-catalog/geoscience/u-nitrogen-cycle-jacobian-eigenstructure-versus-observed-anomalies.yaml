id: u-nitrogen-cycle-jacobian-eigenstructure-versus-observed-anomalies
title: >
  Do empirical decadal anomalies in ocean nitrate inventories and surface chlorophyll align with leading eigenmodes predicted by linearization of state-of-the-art coupled nitrogen–climate models around historical steady states?
status: open
priority: medium
disciplines:
  - earth-system-science
  - oceanography
summary: >
  Models embed oscillatory modes in principle; observational identification is noisy — coordinated model–data spectral comparisons at basin scale remain incomplete.
systematic_gaps:
  - Long observing-system records harmonized with ensemble model Jacobians at comparable spatial aggregation
  - Attribution separating nitrogen-cycle eigenmodes from unrelated climate variability
suggested_hypotheses:
  - h-linearized-n-cycle-models-predict-chlorophyll-mode-timescales
related_bridges:
  - b-nitrogen-cycle-reservoirs-x-coupled-oscillator-stability
last_reviewed: "2026-05-07"
references:

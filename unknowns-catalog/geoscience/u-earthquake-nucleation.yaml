id: u-earthquake-nucleation
title: What are the physical processes governing earthquake nucleation, and can they be detected before rupture propagates?
status: open
priority: critical
disciplines:
  - seismology
  - geomechanics
  - geoscience
  - rock-physics
summary: >
  Earthquakes nucleate when a small patch of fault accelerates beyond quasi-static
  slip and transitions to dynamic rupture. The nucleation process involves rate-and-state
  friction evolution, pore pressure changes, and geometric fault complexity. Whether
  a detectable preparatory phase (foreshock, slow-slip, electromagnetic signal)
  reliably precedes large earthquakes is the central open question in earthquake
  physics. Decades of earthquake prediction research have failed to identify a
  universally applicable precursor, but targeted geodetic monitoring of known fault
  segments has revealed slow-slip events and tremor that may relate to nucleation.
systematic_gaps:
  - The spatial scale of the nucleation zone (meters to kilometers) is below the resolution of most seismic networks.
  - Whether nucleation is deterministic (predictable from initial conditions) or stochastic is unresolved.
  - The role of fluids in triggering nucleation vs. static stress transfer is poorly constrained for most fault settings.
related_unknowns:
  - u-slow-slip-event-origin
last_reviewed: "2026-05-05"

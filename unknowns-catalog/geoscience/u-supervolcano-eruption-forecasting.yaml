id: u-supervolcano-eruption-forecasting
title: What are the precursors and timescales of supereruption onset at caldera systems like Yellowstone and Campi Flegrei?
status: open
priority: critical
disciplines:
  - volcanology
  - geoscience
  - geophysics
summary: >
  Volcanic supersystems (Yellowstone, Campi Flegrei, Toba, Taupo) can produce
  eruptions >1000 km³ DRE that would have continental or global consequences.
  Unlike stratovolcanoes, calderas show diffuse, large-scale unrest with ground
  deformation, seismicity, and hydrothermal changes that persist for decades without
  eruption. Distinguishing unrest that terminates without eruption from true eruption
  precursors is currently impossible. The minimum warning time before a VEI 8 eruption,
  and whether rapid magma remobilization can occur in days (melt-dominant reservoirs)
  or requires centuries (crystal-mush systems), is unresolved.
systematic_gaps:
  - The proportion of eruptible melt vs. crystal mush in active caldera systems cannot be resolved by current seismic tomography.
  - Ground deformation models for large calderas cannot distinguish magma intrusion from hydrothermal system pressurization.
  - No supersystem has produced a VEI 8 eruption in the instrumental record; all forecasting relies on geological analogy.
last_reviewed: "2026-05-05"

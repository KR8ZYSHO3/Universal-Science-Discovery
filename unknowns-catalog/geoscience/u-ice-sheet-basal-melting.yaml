id: u-ice-sheet-basal-melting
title: What controls basal melting rates beneath the Antarctic and Greenland ice sheets, and how do subglacial hydrology and geothermal flux affect ice dynamics?
status: open
priority: critical
disciplines:
  - glaciology
  - geoscience
  - cryosphere-science
  - geodynamics
summary: >
  Basal melting beneath ice sheets lubricates the bed, accelerates ice flow, and
  delivers meltwater to the ocean. The Antarctic geothermal heat flux is poorly mapped
  (varying 10-fold beneath the West Antarctic Ice Sheet), creating order-of-magnitude
  uncertainty in basal melt rates. Subglacial lakes (Lake Vostok, Whillans Ice Stream)
  drain episodically and pulse meltwater delivery. The Thwaites Glacier, a marine ice
  sheet instability candidate, is subject to warm Circumpolar Deep Water intrusion at
  its base; whether its retreat is already irreversible is the key sea-level question.
systematic_gaps:
  - The Antarctic geothermal heat flux map has resolution of ~500 km, far too coarse to constrain basal melt.
  - Subglacial hydrological networks route meltwater through unknown pathways, creating episodic lubrication events that current models cannot reproduce.
  - Whether Thwaites has crossed the marine ice sheet instability threshold is contested by the 2023–2025 observational campaigns.
last_reviewed: "2026-05-05"

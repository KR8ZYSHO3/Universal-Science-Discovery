id: u-mineral-nucleation-kinetics
title: What controls mineral nucleation kinetics in natural fluids, and why do classical nucleation theory predictions fail for many geological systems?
status: open
priority: medium
disciplines:
  - mineralogy
  - geochemistry
  - geoscience
  - physical-chemistry
summary: >
  Classical nucleation theory (CNT) predicts mineral nucleation rates from surface
  energy and supersaturation but systematically fails for carbonates, silicates, and
  phosphates in natural aqueous solutions. Two-step nucleation pathways, amorphous
  precursor phases, and template effects on organic matrices or mineral surfaces all
  produce nucleation rates orders of magnitude different from CNT predictions. This
  matters for understanding limestone diagenesis, biomineralization, scale formation
  in industrial systems, and CO2 sequestration in basalt (as at the Carbfix site).
systematic_gaps:
  - Direct observation of critical nuclei (sub-nanometer clusters) in natural solutions is still at the frontier of cryo-TEM and X-ray scattering techniques.
  - The role of organic matter in templating mineral nucleation in sedimentary environments is poorly quantified.
  - Multi-component natural solutions (with Mg, SO4, organic acids) have not been systematically tested against modified CNT frameworks.
last_reviewed: "2026-05-05"

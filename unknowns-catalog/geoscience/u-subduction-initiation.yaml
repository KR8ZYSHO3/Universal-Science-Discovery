id: u-subduction-initiation
title: How does subduction initiation occur, and can it begin spontaneously from a passive margin without a pre-existing plate boundary?
status: open
priority: high
disciplines:
  - geodynamics
  - geoscience
  - tectonics
summary: >
  Subduction zones are fundamental to plate tectonics and the carbon cycle, but how
  they begin is poorly understood. The two end-member models—spontaneous initiation
  driven by gravitational collapse of dense oceanic lithosphere, and induced initiation
  forced by far-field stresses—make different predictions for the age of the oldest
  arc basalts and the geometry of first-formed subduction zones. No unambiguous example
  of in-progress spontaneous initiation has been identified; the Izu-Bonin-Mariana
  arc is the best candidate but its origin is disputed.
systematic_gaps:
  - No modern analog for spontaneous subduction initiation has been confirmed.
  - The stress thresholds for passive-margin conversion are unconstrained by direct observation.
  - Numerical models disagree on whether water weakening of the lithosphere is required for initiation.
suggested_hypotheses:
  - Subduction cannot initiate spontaneously without pre-existing structural weakness (transform faults, fracture zones); all observed initiations are induced by external stress.
last_reviewed: "2026-05-05"

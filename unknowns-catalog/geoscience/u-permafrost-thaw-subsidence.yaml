id: u-permafrost-thaw-subsidence
title: What are the rates, spatial patterns, and feedback mechanisms governing thermokarst formation and carbon release from thawing permafrost?
status: open
priority: critical
disciplines:
  - cryosphere-science
  - geoscience
  - climate-science
  - biogeochemistry
summary: >
  Arctic permafrost contains ~1.5 trillion tonnes of organic carbon—roughly twice
  the current atmospheric CO2 inventory. Thermokarst lakes and abrupt thaw features
  (retrogressive thaw slumps, bog formation) release this carbon as CO2 and CH4,
  creating a positive climate feedback. The spatial distribution of abrupt vs.
  gradual thaw, the fraction of permafrost carbon that is rapidly vs. slowly degradable,
  and the net greenhouse gas balance (accounting for CH4 vs. CO2, and new plant uptake)
  are poorly constrained and create large uncertainty in climate projections.
systematic_gaps:
  - Remote sensing can detect thermokarst at 10–100 m scale but misses small features that may dominate total area.
  - The lability of deep (Pleistocene-age) permafrost carbon is different from shallow layers but has been measured in only a few locations.
  - Whether thermokarst lake drainage (methane source → carbon sink transition) accelerates or dampens the feedback is uncertain at landscape scale.
last_reviewed: "2026-05-05"

id: u-seismic-wave-x-elastic-wave
title: Can full-waveform inversion (FWI) of seismic data recover the complete elastic tensor (anisotropic Cijkl) of the Earth's
  crust at 100m resolution, and what is the fundamental resolution limit imposed by seismic wavelengths and noise?
status: open
priority: medium
disciplines:
- geoscience
- physics
- mathematics
summary: 'Full waveform inversion attempts to recover subsurface elastic properties by minimising the misfit between observed
  and simulated seismograms. The fundamental resolution limit (Rayleigh criterion: λ/2) imposes a scale of ~100m for typical
  exploration seismics. Whether FWI can recover the full anisotropic elastic tensor Cijkl (21 independent components) rather
  than just isotropic Vp, Vs is an open problem combining numerical optimisation and seismic physics.'
systematic_gaps:
- FWI is non-convex with cycle-skipping local minima that prevent convergence without good initial models
- Full anisotropic tensor recovery requires complete azimuthal coverage not available in standard acquisition
- The information content of seismic data relative to the number of elastic parameters is not rigorously bounded

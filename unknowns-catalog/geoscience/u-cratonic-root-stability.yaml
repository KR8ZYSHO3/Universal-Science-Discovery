id: u-cratonic-root-stability
title: Why are Archean cratonic keels stable for billions of years, and what conditions cause their sudden removal?
status: open
priority: medium
disciplines:
  - geoscience
  - geodynamics
  - petrology
  - geochemistry
summary: >
  Archean cratons have resisted subduction, deformation, and lithospheric removal
  for 2.5–4 billion years while surrounding mobile belts have been repeatedly reworked.
  Their stability is attributed to compositionally buoyant, depleted, and dry lithospheric
  keels extending to 200–300 km depth. Yet some cratons have experienced keel removal
  (e.g., the North China Craton lost much of its keel during the Mesozoic). What
  protects cratons in most cases, and what specific conditions—fluid infiltration,
  thermal erosion, basal shear, small-scale convection—trigger keel destruction, is
  a central problem in deep lithosphere dynamics.
systematic_gaps:
  - The water content of cratonic lithospheric mantle, which controls viscosity and stability, is poorly constrained.
  - The trigger for North China Craton keel destruction (flat slab subduction? plume? inherited weakness?) is contested.
  - Whether keel removal is rapid (millions of years) or gradual (hundreds of millions) cannot be resolved from the geological record.
last_reviewed: "2026-05-05"

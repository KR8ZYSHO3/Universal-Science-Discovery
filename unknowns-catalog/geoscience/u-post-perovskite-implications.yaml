id: u-post-perovskite-implications
title: What are the dynamical and seismic implications of the post-perovskite phase transition in Earth's D'' layer?
status: open
priority: medium
disciplines:
  - mineral-physics
  - seismology
  - geodynamics
  - geoscience
summary: >
  Post-perovskite (ppv), discovered in 2004, is the stable phase of MgSiO3 at D''
  conditions (~125 GPa, ~2500 K). Its discovery explained the D'' seismic discontinuity
  and anisotropy. However, the implications for heat flow across the core-mantle boundary,
  for slab detection in the deep mantle, and for mantle plume generation at the CMB
  remain incompletely modeled. The Clapeyron slope is positive (ppv forms when slabs
  cool the CMB region) which may create a double-crossing geometry observable in seismic
  data. Whether ppv contributes to core-mantle boundary chemical exchange is unknown.
systematic_gaps:
  - The ppv stability field in a realistic pyrolite mantle composition is not well-constrained experimentally.
  - Whether the D'' discontinuity is entirely explained by ppv or requires additional compositional layering is debated.
  - The rheology of ppv and its contribution to D'' anisotropy are poorly constrained.
last_reviewed: "2026-05-05"

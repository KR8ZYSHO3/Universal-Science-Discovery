id: u-mantle-horizontal-spectrum-versus-rb-wavelength-law
title: >
  Can normalized horizontal power spectra of mantle convection in numerical dynamo-like spherical-shell simulations be mapped quantitatively onto classical Rayleigh-Bénard wavenumber-selection curves after accounting for temperature-dependent viscosity and internal heating — or does rheological splitting invalidate simple wavelength correspondence?
status: open
priority: medium
disciplines:
  - geophysics
  - fluid-mechanics
summary: >
  Nu(Ra) analogies are widely discussed; spectral-planform correspondences are under-tested because dimensional collapse requires careful nondimensionalization of observables from tomography and models.
systematic_gaps:
  - Community benchmarks exporting spherical harmonic spectra from mantle simulations with harmonized nondimensional groups
  - Uncertainty quantification linking tomographic velocity spectra to true flow spectra
suggested_hypotheses:
  - h-numerical-mantle-spectral-peaks-track-effective-rb-wavenumber-branches
related_bridges:
  - b-lithospheric-planform-x-rayleigh-benard-wavelength-scaling
last_reviewed: "2026-05-07"
references:
  - doi: "10.1103/RevModPhys.81.503"
    note: Thermal convection scaling review baseline

id: u-earthquake-early-warning-bayesian-latency-magnitude-error
title: >
  How rapidly do Bayesian / sequential magnitude estimates for earthquake early warning converge to within one
  magnitude unit of final catalogs as station count increases, and how does geographic aperture interact with
  rupture directivity under finite rupture velocity?
status: open
priority: high
disciplines:
  - geophysics
  - seismology
summary: >
  Dense networks (Japan, Mexico, western US) reduce blind zones but systematic biases remain for large
  earthquakes whose rupture grows beyond the initial P-window used for EEW. Quantifying posterior contraction
  rates versus operational latency budgets is necessary for honest alerting policies.
systematic_gaps:
  - Limited open comparisons that isolate algorithmic posterior contraction from scenario-dependent population exposure.
  - Large-event catalogs sparse relative to noise-like microearthquake statistics used for offline tuning.

suggested_hypotheses:
  - h-eew-kalman-style-updates-tighten-magnitude-posterior-faster-with-dense-networks

related_bridges:

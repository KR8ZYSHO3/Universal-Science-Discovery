id: u-earthquake-swarm-migration
title: What physical process drives the spatiotemporal migration of earthquake swarms, and can migration patterns forecast mainshock occurrence?
status: open
priority: high
disciplines:
  - seismology
  - geoscience
  - hydrology
  - geomechanics
summary: >
  Earthquake swarms—clusters of similar-magnitude earthquakes without a clear
  mainshock-aftershock sequence—migrate systematically at speeds of 0.01–1 km/day.
  Two primary mechanisms are proposed: fluid pressure front migration (as pressurized
  fluids diffuse through pore networks) and slow-slip cascades on fault systems.
  Both predict migration velocities with characteristic hydraulic diffusivity or
  slip velocity signatures. Whether swarm migration can be used to identify fluid
  pathways, geothermal resources, or impending larger earthquakes—and whether induced
  seismicity from wastewater injection follows the same physics—are open questions.
systematic_gaps:
  - The relative contributions of fluid pressure and aseismic slip to swarm migration cannot be separated seismologically in most cases.
  - The relationship between swarm migration and subsequent mainshock nucleation (if any) has not been established statistically across a global catalog.
  - Induced seismicity migration after wastewater injection shows similar patterns but the triggering pore pressure diffusivity differs from natural swarms by orders of magnitude.
last_reviewed: "2026-05-05"

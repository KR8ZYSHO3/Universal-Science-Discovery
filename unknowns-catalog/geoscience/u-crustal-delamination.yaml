id: u-crustal-delamination
title: When and how does lower crustal delamination occur, and what are its topographic, geochemical, and volcanic consequences?
status: open
priority: medium
disciplines:
  - geodynamics
  - geoscience
  - petrology
summary: >
  Crustal delamination—the removal of dense lower crust or lithospheric mantle by
  gravitational instability—is proposed to explain rapid surface uplift, anomalous
  igneous geochemistry (high-Mg andesites, adakites), and changes in seismic velocity
  structure in orogenic belts and post-collisional settings. The process is inferred
  from geochemistry and topography but has not been directly imaged during active
  delamination. Whether delamination is episodic or continuous, and whether it triggers
  or follows volcanism, are unresolved.
systematic_gaps:
  - Active delamination has not been imaged in real time; all evidence is post-hoc.
  - The rheological conditions (viscosity, density contrast) that permit delamination vs. convective drip are poorly constrained.
  - The chemical signature of delamination-derived magmas overlaps with other high-Mg mafic sources, limiting fingerprinting.
last_reviewed: "2026-05-05"

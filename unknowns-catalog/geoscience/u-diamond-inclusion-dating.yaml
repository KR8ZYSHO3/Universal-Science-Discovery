id: u-diamond-inclusion-dating
title: How reliably do diamond inclusion ages record ancient mantle events, and what biases affect inclusions as windows into deep Earth history?
status: open
priority: low
disciplines:
  - geochronology
  - geoscience
  - petrology
  - geochemistry
summary: >
  Diamonds are chemically inert and can preserve mineral and fluid inclusions for
  billions of years, making them unique capsules of deep Earth history. Inclusion
  geochronology (Re-Os, Sm-Nd, Lu-Hf) has produced Archean and even Hadean ages for
  lithospheric mantle events. However, inclusions may be re-equilibrated, multiple
  generations may coexist in a single diamond, and the timing of diamond growth vs.
  inclusion entrapment can be decoupled. Whether inclusion ages record diamond
  formation or older events in the host rock is not always resolvable.
systematic_gaps:
  - Re-Os dating of sulfide inclusions assumes closed-system behavior, but sulfides are reactive and may have partially re-equilibrated.
  - The growth history of a single diamond (multiple growth zones separated in time by hundreds of millions of years) is now documented but the frequency is unknown.
  - Nitrogen aggregation thermometry provides thermal history but requires assumptions about mantle residence time and temperature that are circular.
last_reviewed: "2026-05-05"

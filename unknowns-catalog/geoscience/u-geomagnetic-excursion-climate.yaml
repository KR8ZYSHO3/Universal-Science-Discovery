id: u-geomagnetic-excursion-climate
title: Do geomagnetic excursions and reversals affect climate by modulating cosmic ray flux and ozone production?
status: open
priority: low
disciplines:
  - geomagnetism
  - climate-science
  - geoscience
  - atmospheric-science
summary: >
  During geomagnetic reversals and excursions, the dipole field weakens, potentially
  allowing increased galactic cosmic ray flux to reach the lower atmosphere. The
  Laschamps excursion (~42 ka) and the Mono Lake excursion (~33 ka) correlate with
  some climate proxies (ice core chemistry, megafauna extinction) but causality is
  disputed. The proposed mechanisms—cosmic ray ionization of aerosols seeding cloud
  formation, or ozone depletion from energetic particle precipitation—are plausible
  but unquantified. Whether the field weakening is rapid enough and long enough to
  produce detectable climate effects above natural variability is contested.
systematic_gaps:
  - The duration of minimum field strength during excursions is constrained to only a few thousand years by paleomagnetic records, insufficient to distinguish transient from sustained climate forcing.
  - No radiative forcing calculation exists for the cosmic ray enhancement during the Laschamps excursion at the resolution needed to compare with ice core records.
  - The correlation between 10Be (cosmic ray proxy) and climate records during excursions has multiple alternative explanations.
last_reviewed: "2026-05-05"

id: u-slow-slip-event-origin
title: What physical mechanism produces slow-slip events and episodic tremor-and-slip in subduction zones?
status: open
priority: high
disciplines:
  - seismology
  - geoscience
  - geomechanics
summary: >
  Slow-slip events (SSEs) and associated tectonic tremor occur in the transition zone
  between locked and freely slipping portions of subduction megathrusts (30–50 km
  depth), releasing stress equivalent to M6–7 earthquakes over weeks to months
  without generating damaging shaking. Their periodicity (months to years), velocity
  (orders of magnitude slower than earthquakes), and correlation with tremor suggest
  a distinct frictional or fluid-driven mechanism. Whether SSEs load or unload the
  locked seismogenic zone above them—and thus increase or decrease great earthquake
  hazard—is actively debated.
systematic_gaps:
  - The rate-and-state friction parameters that produce SSE behavior (velocity-weakening at low slip rates?) have not been directly measured in deep megathrust rocks.
  - Whether episodic SSEs are driven by fluid pressure waves propagating from depth or by frictional instability is unresolved.
  - The stress transfer from SSE to the overlying locked zone cannot currently be modeled with sufficient resolution to assess hazard implications.
related_unknowns:
  - u-earthquake-nucleation
last_reviewed: "2026-05-05"

id: u-snowball-earth-escape
title: How did Snowball Earth events end, and what prevented Earth from permanently freezing under high-albedo ice cover?
status: open
priority: medium
disciplines:
  - geoscience
  - climate-science
  - geochemistry
  - astrobiology
summary: >
  Neoproterozoic Snowball Earth events (~720 Ma and ~635 Ma) involved global glaciation
  to near-equatorial latitudes. The escape mechanism requires CO2 accumulation from
  volcanism to ~0.01–0.1 bar (1,000–10,000x present) to overcome ice-albedo feedback.
  However, details of the deglaciation dynamics, the duration of frozen oceans, whether
  open water refugia existed (hard vs. slushball), and whether life survived under
  kilometers of ice remain contested. The termination events correlate with the
  emergence of macroscopic multicellular life (Ediacaran biota), but whether Snowball
  Earth triggered or nearly prevented complex life is debated.
systematic_gaps:
  - The CO2 concentration required to deglaciate depends on ice-albedo, cloud feedbacks, and dust deposition—all poorly constrained for a frozen Earth.
  - Whether life could have persisted in equatorial open-water refugia under hard Snowball conditions is not settled by the fossil record.
  - The duration of individual Snowball events (1–50 Myr) cannot be precisely determined from available radiometric dates.
last_reviewed: "2026-05-05"

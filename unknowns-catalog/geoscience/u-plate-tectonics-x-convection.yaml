id: u-plate-tectonics-x-convection
title: >
  Why does Earth have plate tectonics while Venus and Mars do not, and what determines
  the transition between tectonic modes in planetary mantle convection?
status: open
priority: high
disciplines:
  - geoscience
  - physics
  - fluid_mechanics
  - planetary_science
summary: >
  Earth uniquely (among terrestrial planets) exhibits mobile-lid plate tectonics
  while Venus has stagnant-lid convection and Mars likely had episodic lid tectonics.
  The transition between tectonic modes depends on mantle rheology, surface water
  content (hydration weakens lithosphere), and Rayleigh number — but the critical
  parameters and their planetary-scale values are poorly constrained. Why water is
  essential for plate tectonics (initiating subduction requires weak fault zones),
  whether early Earth had a different tectonic style, and how to predict tectonic
  mode from planetary bulk properties remain open questions central to planetary
  habitability.
systematic_gaps:
  - The critical yield stress ratio (lithospheric strength / convective stress) for plate tectonics initiation has not been derived from first principles with realistic rheology
  - Whether plate tectonics could occur without liquid water (anhydrous lithosphere) has not been determined from convection simulations at Earth-like Ra
  - The tectonic history of early Earth (before 3.5 Ga) — whether it had plate tectonics or a different convection mode — is unresolved from geologic evidence
related_bridges:

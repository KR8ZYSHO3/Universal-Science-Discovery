id: u-plate-boundary-fracture-scale-bridging
title: At what scale transitions from laboratory fracture toughness tests to fault-zone cohesive zones become predictive for macroscopic rupture energetics?
status: open
priority: high
disciplines:
  - geophysics
  - engineering
summary: >
  Engineering fracture mechanics supplies K-field concepts validated on cm-scale samples; faults span km with heterogeneous gouge, fluids, and thermal pressurization — obscuring direct mapping from K_IC style parameters to earthquake energy budgets without multiscale homogenization.
systematic_gaps:
  - Integrated modeling pipelines coupling meter-scale lab friction experiments with dynamic rupture simulations under comparable strain rates
  - Uncertainty quantification bridging cohesive lengths inferred from microstructures vs seismically inferred breakdown energies
suggested_hypotheses:
  - h-plate-boundary-slip-x-fracture-mechanics
related_bridges:
  - b-plate-boundary-slip-x-fracture-mechanics
last_reviewed: "2026-05-07"
references:
  - doi: 10.1029/JB074i008p02153
    note: Brune seismic source scaling linked to stress drop arguments

id: u-hydrothermal-vent-biodiversity
title: What determines species richness and biogeographic connectivity patterns at deep-sea hydrothermal vents?
status: open
priority: medium
disciplines:
  - geoscience
  - deep-sea-biology
  - biogeography
  - ecology
summary: >
  Deep-sea hydrothermal vents host chemosynthetic ecosystems isolated from sunlit
  ocean productivity. Vent fauna show high endemism but also surprising connectivity
  across ocean ridges separated by thousands of kilometers. The species richness of
  individual vent fields varies dramatically with fluid chemistry, vent stability,
  and depth. What sets the metacommunity structure—whether larval dispersal, local
  chemistry, or evolutionary history dominates—is unclear. The discovery of new vent
  fields continues to reveal novel species, suggesting systematic undersampling.
systematic_gaps:
  - Larval dispersal of vent fauna between ridge segments cannot be tracked directly; only genetic methods provide indirect evidence.
  - The lifetime of individual vent fields (years to centuries) relative to ecological succession timescales is poorly constrained.
  - The role of fluid chemistry in filtering colonists has not been tested with controlled experiments at realistic deep-sea conditions.
last_reviewed: "2026-05-05"

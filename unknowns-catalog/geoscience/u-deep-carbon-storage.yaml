id: u-deep-carbon-storage
title: How much carbon is stored in Earth's deep interior, and what controls the long-term geologic carbon cycle between mantle, crust, and atmosphere?
status: open
priority: high
disciplines:
  - geochemistry
  - geoscience
  - geodynamics
  - climate-science
summary: >
  The deep Earth contains 10^23 grams of carbon—orders of magnitude more than the
  surface reservoirs (atmosphere + ocean + biosphere). Carbon cycles between mantle
  and surface via volcanism (outgassing) and subduction (ingassing). Whether the
  long-term carbon cycle is currently in balance or whether net outgassing or ingassing
  dominates—and thus whether the deep Earth is a carbon source or sink on geological
  timescales—is debated. The carbonate-silicate cycle regulates Earth's greenhouse
  effect and has kept surface temperatures habitable for 4 billion years, but its
  kinetics and feedbacks at tectonic timescales are poorly quantified.
systematic_gaps:
  - The total carbon flux from mid-ocean ridge volcanism is estimated from sparse sampling; the ridge system is globally undersampled.
  - How much subducted carbonate survives to reach the deep mantle vs. being decarbonated in the arc is uncertain by 50%.
  - The speciation of carbon in the lower mantle (diamond, carbonate, metallic carbon) affects its geochemical behavior but cannot be probed directly.
last_reviewed: "2026-05-05"

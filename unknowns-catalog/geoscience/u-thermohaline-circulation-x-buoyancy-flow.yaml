id: u-thermohaline-circulation-x-buoyancy-flow
title: Is the Atlantic Meridional Overturning Circulation (AMOC) currently approaching a saddle-node bifurcation tipping point, and what observational fingerprint would provide advance warning of an irreversible collapse?
status: open
priority: high
disciplines:
  - geoscience
  - physics
  - oceanography
  - climate-science
summary: >
  The Stommel model predicts two stable AMOC states with a saddle-node bifurcation
  separating them. AMOC has weakened ~15% since the mid-20th century, and some analyses
  (Caesar et al. 2021; Boers 2021) detect critical slowing down in SST fingerprints.
  However, GCMs (CMIP6 models) do not show an AMOC tipping point within this century
  for likely emissions scenarios — creating a model-observation discrepancy. The key
  unknowns are: (1) the current position of the climate system relative to the
  bifurcation point, (2) whether observed slowing-down signals are genuine precursors
  or statistical artifacts, and (3) what freshwater flux threshold triggers irreversible collapse.
systematic_gaps:
  - CMIP6 models underestimate AMOC sensitivity to freshwater forcing due to insufficient resolution of mesoscale eddies
  - The freshwater budget of the South Atlantic (a key AMOC precursor region) has observational gaps of ±0.1 Sv
  - No observational system can directly measure the distance to the saddle-node bifurcation point without knowing all model parameters

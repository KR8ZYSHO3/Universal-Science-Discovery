id: u-sea-level-fingerprint
title: How do sea-level fingerprints from individual ice mass changes allow attribution of observed sea-level trends to specific glacier and ice sheet sources?
status: open
priority: high
disciplines:
  - geoscience
  - glaciology
  - oceanography
  - geodesy
summary: >
  When an ice mass melts, its gravitational attraction decreases, causing local sea-level
  fall near the source and amplified rise far away—the "sea-level fingerprint." In principle,
  this allows source attribution of observed sea-level change from tide gauge and
  satellite altimetry data. In practice, competing signals from mantle glacial isostatic
  adjustment (GIA), ocean dynamics, and atmospheric loading obscure the fingerprint.
  Attribution of observed global mean sea-level acceleration to Greenland vs. Antarctica
  vs. mountain glaciers remains uncertain at the ~20% level, limiting projections.
systematic_gaps:
  - GIA models disagree by up to 1 mm/yr in sea-level equivalent, comparable to the fingerprint signals being detected.
  - Terrestrial water storage changes (groundwater depletion, reservoir filling) contaminate the gravity signal used for fingerprinting.
  - The sea-level fingerprint of the West Antarctic Ice Sheet cannot be separated from GIA in the instrumental record due to their similar spatial patterns.
last_reviewed: "2026-05-05"

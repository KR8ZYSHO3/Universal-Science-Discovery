id: u-bci-non-stationarity-adaptation
title: How can brain-computer interface decoders adapt to non-stationary neural signals (caused by learning, electrode drift, and day-to-day variability) without requiring lengthy daily recalibration?
status: open
priority: high
disciplines:
  - neuroscience
  - signal-processing
  - machine-learning
summary: >
  BCI decoding performance degrades over time because neural signals are non-stationary:
  electrode impedance drifts, individual neurons change their tuning curves as the
  brain learns, and day-to-day variability in electrode-neuron proximity alters signal
  amplitudes. Current practice requires 30-90 minutes of daily recalibration, which
  is impractical for clinical use. Key unknowns: (1) what is the relative contribution
  of electrode drift vs. neural plasticity to non-stationarity, (2) can Bayesian
  continual learning algorithms maintain performance without explicit recalibration,
  (3) what neural signal features are most stationary across days and sessions?
systematic_gaps:
  - Long-term intracortical recording datasets (>1 year) with high-quality tracking of individual neurons are rare
  - The relationship between neural plasticity during BCI learning and decoder non-stationarity is not quantified
  - Transfer learning approaches for BCI have not been validated across patients with different neural anatomy
related_bridges:
  - b-bci-optimal-decoding
last_reviewed: "2026-05-07"

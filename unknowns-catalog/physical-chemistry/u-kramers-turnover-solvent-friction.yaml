id: u-kramers-turnover-solvent-friction
title: What is the correct theory of the Kramers turnover regime (intermediate friction), and can it explain anomalous reaction rates observed in viscous and cryogenic solvents?
status: open
priority: medium
disciplines:
  - physical-chemistry
  - chemistry
  - statistical-mechanics
summary: >
  Kramers (1940) derived reaction rates in two limits: high friction
  (diffusion regime, rate ∝ 1/γ) and low friction (energy-diffusion
  regime, rate ∝ γ). The intermediate "Kramers turnover" regime, where
  the rate peaks, was left as an open problem for 40 years. Mel'nikov
  and Meshkov (1986) and Pollak, Grabert & Hänggi (1989) developed
  analytical solutions for the turnover, but these rely on specific
  memory kernel models for solvent friction. Real solvents have
  non-Markovian friction (frequency-dependent viscosity), and it is
  unclear whether observed turnover behavior in isomerization reactions
  truly reflects the Kramers turnover or is confounded by dynamical
  solvent cage effects. Quantum tunneling corrections in the low-temperature
  limit add additional complexity.
systematic_gaps:
  - Experimental measurements of reaction rates across a full range of solvent viscosities (several orders of magnitude) are available for only a handful of reactions.
  - Non-Markovian friction (viscoelastic solvents) changes the effective friction frequency dependence; the theory for this case is not complete.
  - Quantum corrections to Kramers theory in the turnover regime are only approximately treated.
last_reviewed: "2026-05-06"

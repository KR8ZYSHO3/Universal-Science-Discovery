id: u-anharmonic-spectroscopy-matrix-models-convergence
title: When does harmonic normal-mode diagonalization fail predictably for soft modes,
  hydrogen bonds, and large-amplitude torsions — and what matrix perturbation schemes converge?
status: open
priority: medium
disciplines:
  - physical-chemistry
  - applied-mathematics
summary: >
  Matrix diagonalization at second order misses coupled motions dominating spectra for floppy molecules;
  hierarchical corrections (VPT2, etc.) expand operators beyond quadratic Hamiltonians — convergence domains vs spectroscopic accuracy remain uneven across molecular classes.
systematic_gaps:
  - Benchmark suites linking gas-phase high-resolution spectra with anharmonic calculations across conformers
  - Uncertainty quantification on eigenvalue corrections under finite basis truncation

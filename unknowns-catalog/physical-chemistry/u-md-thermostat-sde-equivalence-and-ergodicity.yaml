id: u-md-thermostat-sde-equivalence-and-ergodicity
title: For a given complex biomolecular potential, which thermostat–integrator pairs yield
  ergodic sampling of slow degrees of freedom within feasible wall-clock budgets?
status: open
priority: medium
disciplines:
- chemistry
- mathematics
- physics
summary: Harmonic modes and barriers create metastability; thermostats alter kinetics differently,
  affecting rates and not just static properties.
systematic_gaps:
- Rigorous non-asymptotic mixing rates are unknown for practical biomolecular systems.
- Constraint algorithms coupled with stochastic thermostats need unified stability theory.
suggested_hypotheses:
- h-nose-hoover-chains-match-target-kinetic-spectra-when-tuned
related_bridges:
- b-molecular-dynamics-x-stochastic-thermostats
last_reviewed: '2026-05-07'
references:

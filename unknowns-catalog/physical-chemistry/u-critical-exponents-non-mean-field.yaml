id: u-critical-exponents-non-mean-field
title: Why do critical exponents deviate from mean-field predictions in low dimensions, and can renormalization group predictions be extended to all universality classes?
status: open
priority: medium
disciplines:
  - statistical-mechanics
  - physical-chemistry
  - condensed-matter-physics
summary: >
  Mean-field theory (van der Waals, Landau) predicts universal critical exponents
  (beta=0.5, gamma=1, delta=3). Real 3D systems show different exponents (beta≈0.326
  for 3D Ising), explained by Wilson's renormalization group (RG). The upper critical
  dimension d_c (above which mean field is exact) varies by universality class.
  Below d_c, the exponents depend on dimensionality and symmetry group. While RG
  has been highly successful, non-perturbative RG methods are needed for strongly
  coupled systems, topological phase transitions, and systems with quenched disorder.
  Whether all critical phenomena can be organized into universality classes described
  by conformal field theory remains an open program in mathematical physics.
systematic_gaps:
  - Non-perturbative RG for 3D systems remains technically challenging; many
    universality classes lack high-precision exponent calculations.
  - The classification of all possible universality classes in 2D is complete
    (conformal field theory), but in 3D remains an open mathematical problem.
related_bridges:

id: u-partition-function-anharmonic-correction
title: >
  How accurately can anharmonic corrections to the molecular partition function be
  computed for large polyatomic molecules, and when do they qualitatively change
  predicted equilibrium constants or rate constants compared to the harmonic approximation?
status: open
priority: medium
disciplines:
  - physical-chemistry
  - statistical-mechanics
  - quantum-chemistry
summary: >
  The standard partition function for molecules uses the harmonic oscillator approximation
  for vibrational modes. For molecules with low-frequency modes, large-amplitude motions,
  or multiple conformers, anharmonic corrections can change partition functions (and hence
  equilibrium constants) by orders of magnitude. The computational cost of exact anharmonic
  treatment scales exponentially with molecule size, making it infeasible for biochemically
  relevant molecules. When and how much the harmonic approximation fails for chemical
  equilibria relevant to drug-protein binding and atmospheric chemistry is unresolved.
systematic_gaps:
  - No benchmark dataset comparing harmonic vs anharmonic equilibrium constants for >30-atom molecules.
  - Quantum tunneling contributions to partition functions for H-transfer reactions remain poorly characterized at 300 K.
  - Conformational entropy contributions to binding free energies are systematically underestimated.
last_reviewed: "2026-05-06"

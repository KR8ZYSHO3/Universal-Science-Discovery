id: u-loss-aversion-neural-substrate
title: What neural computation implements loss aversion (λ ≈ 2.25), and is it a single mechanism or the product of multiple systems with different evolutionary origins?
status: open
priority: medium
disciplines:
  - psychology
  - neuroscience
  - behavioral-economics
  - evolutionary-biology
summary: >
  Prospect theory's loss aversion coefficient λ ≈ 2.25 (losses loom larger than
  equivalent gains) is one of the most robust findings in behavioral economics, but
  its neural substrate is debated. fMRI studies implicate the amygdala, striatum, and
  anterior insula in loss-related responses, but do not cleanly identify a dedicated
  "loss aversion circuit."

  Three competing hypotheses exist:
  1. Single mechanism: loss aversion reflects a single neural value function with
     asymmetric gain/loss slopes, implemented in orbitofrontal cortex or striatum.
  2. Dual-process: gain responses (dopaminergic reward prediction) and loss responses
     (amygdala/insula threat detection) are computed by separate systems that happen
     to produce loss-dominant behavior.
  3. Risk perception: loss aversion is not about value computation at all but about
     risk perception (losses signal danger) — an evolved threat-avoidance bias.

  The evolutionary question is also open: is λ ≈ 2.25 universal across species and
  cultures, or does it vary with economic context? Studies in capuchin monkeys,
  rats, and traditional societies suggest loss aversion is widespread but not
  universal — the value of λ appears to vary with individual risk history and
  cultural context, suggesting a learned or calibrated component.
systematic_gaps:
  - Single-unit recording in human OFC/amygdala during economic loss tasks is technically limited — most data comes from fMRI with poor temporal resolution.
  - Whether the λ coefficient is stable across decision contexts within individuals (financial, physical risk, social) has not been systematically tested.
  - Cross-species comparison of loss aversion magnitude with phylogenetic control has not been done rigorously.
  - The developmental trajectory of loss aversion (does it increase with experience?) has not been quantified.
suggested_hypotheses:
  - "Loss aversion is implemented by asymmetric dopamine/serotonin balance: losses suppress dopamine more than gains enhance it, by a ratio that determines λ."

id: u-pyroconvection-prediction-coupled-fire-atmosphere-models
title: >
  Under what meteorological and fuel conditions does pyroconvection (fire-driven
  convection) become self-organizing into pyrocumulonimbus storms, and can
  operational coupled fire-atmosphere models predict this transition with sufficient
  lead time for evacuation decisions?
status: open
priority: high
disciplines:
  - atmospheric-science
  - wildfire-science
  - fluid-dynamics
  - emergency-management
summary: >
  Pyrocumulonimbus (pyroCb) storms occur when wildfire heat release is intense
  enough to drive deep convection into the upper troposphere / lower stratosphere,
  injecting smoke and fire brands at altitudes where they can spread over vast
  areas. The 2019-2020 Australian bushfires produced unprecedented pyroCb activity.
  The threshold conditions for pyroCb formation (fire intensity, atmospheric
  instability, wind shear, humidity profiles) are not well characterized. Operational
  fire behavior models (FARSITE) do not include atmosphere coupling; WRF-SFIRE
  is research-only. The lead time for pyroCb prediction is currently hours at best;
  evacuation decisions require 12-24+ hours. Whether accurate pyroCb prediction
  is physically achievable with current model resolution and parameterizations
  is unknown.
systematic_gaps:
  - Observational datasets of pyroCb events with collocated fire behavior,
    atmospheric soundings, and radar data are sparse and poorly coordinated.
  - The critical fire intensity threshold for pyroCb initiation has not been
    empirically estimated from observational data.
  - WRF-SFIRE and similar coupled models have not been systematically validated
    against pyroCb events; their skill for pyroCb initiation is unknown.
related_bridges:
  - b-wildfire-dynamics-reaction-diffusion
last_reviewed: "2026-05-07"

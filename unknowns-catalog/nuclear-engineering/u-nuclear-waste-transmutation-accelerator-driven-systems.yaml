  ~100,000 years. ADS (Rubbia energy amplifier concept, CERN 1995) uses a proton
  linac to produce spallation neutrons that drive a subcritical assembly (k~0.97):
  transmutes actinides to shorter-lived fission products; cannot sustain chain
  reaction without beam Î“ĂĄĂ† inherently safe. The theoretical case is strong: ADS
  could reduce radiotoxicity to natural uranium levels in ~300 years. Engineering
  barriers: (1) High-intensity proton beam reliability (>99.9% availability) Î“Ă‡Ă¶
  current accelerators achieve ~90%; beam trips cause thermal shock. (2) Spallation
  target (liquid lead or lead-bismuth eutectic) design Î“Ă‡Ă¶ corrosion, radioactive
  polonium production from Bi. (3) Integration with fuel reprocessing (PUREX or
  pyroprocessing) to prepare actinide fuel. (4) Economic viability vs. direct
  geological disposal. MYRRHA (Belgium) is the leading ADS prototype (under construction).
systematic_gaps:
  - Reliable high-intensity proton linac operation (>99.5% availability) has not
    been demonstrated at the MW-scale power levels needed for ADS.
  - Lead-bismuth eutectic target corrosion of stainless steel at high irradiation
    and temperature has not been tested at representative flux levels for extended
    periods (>5 years).
  - Full fuel cycle integration (ADS + actinide reprocessing + fuel fabrication)
    has not been demonstrated at any scale beyond laboratory experiments.

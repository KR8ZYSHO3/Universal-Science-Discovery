id: u-neural-correlates-consciousness-anesthesia-mechanism
title: >
  What are the specific neural circuit mechanisms by which general anesthetics
  suppress consciousness — is it primarily thalamo-cortical disconnection, loss
  of cortical complexity (integrated information), suppression of specific
  oscillatory modes, or some combination?
status: open
priority: high
disciplines:
  - neuroscience
  - consciousness-science
  - pharmacology
  - anesthesiology
summary: >
  Despite reliably producing unconsciousness for over 175 years, the neural mechanism
  by which anesthetics suppress consciousness is not understood. Multiple competing
  theories: (1) thalamo-cortical disconnection (Alkire 2008) — anesthetics suppress
  thalamic relay, disconnecting cortex from sensory input; (2) integrated information
  theory (IIT) — anesthetics reduce Φ (integrated information) below the threshold
  for consciousness; (3) global workspace disruption — anesthetics prevent ignition
  of the global neuronal workspace (Dehaene); (4) cortical complexity suppression —
  anesthetics reduce Lempel-Ziv complexity of EEG, a proxy for neural complexity.
  These theories make partly overlapping, partly conflicting predictions. Direct
  testing requires manipulating anesthetic mechanism with pharmacological specificity
  while measuring neural activity at multiple scales (single unit, LFP, EEG, fMRI).
systematic_gaps:
  - Thalamo-cortical vs. cortico-cortical pathway contributions have not been
    dissociated pharmacologically (thalamus-specific vs. cortex-specific GABA-A
    subtypes are poorly characterized).
  - IIT's predictions about Φ under anesthesia have not been tested with sufficient
    neural data resolution to estimate Φ in humans.
  - The specific network connectivity changes (effective connectivity during
    anesthesia) have not been comprehensively mapped across anesthetic agents.
related_bridges:

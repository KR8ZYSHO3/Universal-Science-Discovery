id: u-atmospheric-predictability-limit-extended
title: Is the 10-14 day weather predictability limit fundamental (set by the Lyapunov exponent of atmospheric dynamics) or a technological barrier that could be extended with better initial conditions and models?
status: open
priority: high
disciplines:
  - meteorology
  - dynamical-systems
  - computational-fluid-dynamics
summary: >
  Lorenz (1969) predicted a fundamental predictability limit of approximately 2 weeks
  for weather based on error growth from unresolvable scales. Modern NWP models suggest
  the practical limit is closer to 10 days for day-to-day weather, but subseasonal
  forecasting (2-4 weeks) shows skill beyond this limit using large-scale drivers
  (MJO, ENSO). Key unknowns: (1) what is the true Lyapunov exponent of the full
  atmospheric system (not just the Lorenz model), (2) can better representation of
  mesoscale processes in models extend predictive skill, (3) what are the physical
  mechanisms enabling skill beyond the 2-week limit in subseasonal prediction?
systematic_gaps:
  - The Lyapunov exponent of the full atmospheric attractor has not been directly measured from global reanalysis data
  - The relative contributions of initial condition uncertainty vs. model error to forecast degradation are not separated
  - Subseasonal predictability sources (MJO, stratospheric sudden warmings) are not fully incorporated into operational models
related_bridges:
  - b-atmospheric-convection-lorenz-chaos
last_reviewed: "2026-05-07"

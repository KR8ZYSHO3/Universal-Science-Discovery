id: u-xylem-cavitation-repair-mechanism
title: How do plants repair embolised xylem conduits under positive or negative pressure, and is hydraulic recovery after drought a universal mechanism or species-specific with distinct biochemical substrates?
status: open
priority: high
disciplines:
  - plant-physiology
  - biophysics
  - cell-biology
  - ecology
summary: >
  When water tension in xylem exceeds the cavitation threshold (P₅₀, typically -1 to
  -10 MPa depending on species), air-seeding creates embolisms (gas bubbles) that block
  water flow. Species differ dramatically in their ability to refill embolised conduits.
  The proposed mechanism involves sugar secretion into the xylem followed by osmotic
  water entry, but this appears thermodynamically impossible when xylem is under
  significant tension — how water can be pushed into a low-pressure space against
  thermodynamic gradients is unresolved. Direct observation of refilling by in-situ
  X-ray computed tomography has produced contradictory results: some studies show rapid
  refilling under drought; others suggest apparent refilling is a measurement artifact
  (Rockwell et al. 2014 controversially argued many reported refilling events were
  methodological artifacts). Additionally, some species (ring-porous trees) replace
  embolised conduits annually rather than refilling them — but the cost-benefit analysis
  of this strategy vs. refilling is not established.
systematic_gaps:
  - The thermodynamic mechanism of xylem refilling under tension has not been conclusively demonstrated — the energetics do not balance with known sugar concentrations and cell osmotic potentials.
  - Whether observed xylem refilling in X-ray CT studies is real recovery or an artifact of altered water potential during imaging remains contested in the literature.
  - Species-level variation in refilling capacity has not been mapped onto phylogeny or anatomy at sufficient resolution to identify the anatomical or biochemical determinants.
last_reviewed: "2026-05-06"

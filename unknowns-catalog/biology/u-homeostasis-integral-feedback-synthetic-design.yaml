id: u-homeostasis-integral-feedback-synthetic-design
title: Can integral feedback control theory guide de novo design of synthetic gene circuits that achieve perfect homeostasis of arbitrary metabolite concentrations in living cells?
status: open
priority: high
disciplines:
  - synthetic-biology
  - systems-biology
  - control-theory
  - engineering
summary: >
  Yi et al. (2000) proved that integral feedback is necessary and sufficient for
  perfect adaptation, and Stelling et al. (2004) showed natural biological systems
  implement this. However, forward engineering of synthetic gene circuits with PID
  control properties remains challenging. Key open questions: (1) which molecular
  mechanisms reliably implement the integral (memory) term in a noisy cellular
  environment, (2) how to tune K_I (integral gain) independently of K_P (proportional
  gain) in a gene circuit, (3) whether integral windup (actuator saturation) in
  synthetic circuits matches the control-theoretic prediction and can be prevented
  by anti-windup design. RNA-based controllers (antithetic integral feedback:
  Briat et al. 2016) have been proposed but their robustness to cell-to-cell
  variability and genetic context has not been rigorously characterized.
systematic_gaps:
  - The antithetic integral feedback circuit has been demonstrated in principle but not optimized for robustness to molecular noise.
  - Methods for systematic identification of the PID parameters of natural homeostatic circuits from time-course data are lacking.
  - A design-rule framework mapping from desired steady-state error and settling time to gene circuit architecture does not yet exist.
last_reviewed: "2026-05-06"

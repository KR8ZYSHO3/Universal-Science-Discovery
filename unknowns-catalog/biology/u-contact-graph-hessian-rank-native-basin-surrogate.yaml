id: u-contact-graph-hessian-rank-native-basin-surrogate
title: >
  Does the effective numerical rank of coarse-grained Hessians near predicted native basins correlate with simple graph
  statistics (spectral gap of contact Laplacian, foldon modularity) independent of protein length?
status: open
priority: medium
disciplines:
  - computational-biology
  - applied-mathematics
summary: >
  Elastic network models yield Hessians from contact graphs quickly, but their rank structure under realistic force fields
  and solvent friction differs. Whether graph-derived rank predicts kinetic folding class remains untested at proteome scale.
systematic_gaps:
  - Force-field dependence may swamp graph-only predictions — controlled benchmarks needed.
  - Intrinsically disordered segments violate stable contact maps yet fold upon binding.

suggested_hypotheses:
  - h-low-rank-hessian-surrogate-predicts-two-state-phi-profile-class

related_bridges:

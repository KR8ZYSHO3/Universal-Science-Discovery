id: u-stochastic-resonance-neural-tuning
title: Has evolution tuned internal physiological noise levels in sensory neurons to the stochastic resonance optimum, and if so, what molecular and developmental mechanisms enforce this tuning?
status: open
priority: high
disciplines:
  - sensory-neuroscience
  - evolutionary-biology
  - biophysics
  - statistical-physics
summary: >
  Stochastic resonance (SR) predicts that an optimal, non-zero noise level maximizes
  signal detection in threshold nonlinear systems. Sensory neurons are threshold
  nonlinear systems subject to channel noise, thermal noise, and synaptic noise.
  The SR optimum is a specific amplitude D_opt that depends on the barrier height
  (threshold), signal frequency, and Kramers rate. It is unknown whether:
  (1) physiological noise levels in well-studied sensory systems (hair cells,
  mechanoreceptors, retinal ganglion cells) actually match D_opt;
  (2) if they do, whether this is a result of evolutionary optimization or an
  incidental consequence of metabolic constraints;
  (3) what molecular mechanisms (channel density, ion channel stochasticity,
  membrane composition) set the noise level and whether it can be modulated.
  If evolution has tuned noise to the SR optimum, noise reduction (e.g. by
  eliminating channel fluctuations) would degrade rather than improve detection.
systematic_gaps:
  - Quantitative comparison of measured physiological noise levels against SR-predicted D_opt is lacking for most sensory modalities.
  - The evolutionary hypothesis (noise optimized for SR) has not been tested with comparative genomics across species with different sensory environments.
  - Molecular identity of the noise sources contributing to the SR optimum in hair cells (spontaneous otoacoustic emissions) is incomplete.
  - SR-based therapeutic protocols for neuropathy and hearing loss lack controlled trials comparing SR-optimized vs. conventional noise.
suggested_hypotheses:
  - h-sensory-noise-sr-optimality

id: u-circadian-kuramoto-jet-lag-dynamics
title: "Does the speed of jet-lag recovery follow Kuramoto re-entrainment dynamics, and can phase-response curves (PRCs) quantitatively predict optimal light-exposure protocols?"
status: open
priority: high
disciplines:
  - chronobiology
  - nonlinear-dynamics
  - neuroscience
  - statistical-physics
summary: >
  The Kuramoto model of coupled oscillators predicts that the rate of re-entrainment
  after a phase shift (jet lag) depends on coupling strength K, the phase-response
  curve (PRC) amplitude, and the phase difference between the internal clock and
  the new Zeitgeber. If SCN circadian dynamics are well-described by Kuramoto
  oscillators, then: (1) jet-lag recovery time should scale inversely with K * PRC_amplitude;
  (2) eastward travel (phase advance) should be harder than westward (phase delay),
  as the SCN PRC is asymmetric (large delay zone, small advance zone); (3) optimal
  re-entrainment should be achievable via timed bright-light pulses computed from
  the PRC. While the asymmetry is clinically observed, no study has quantitatively
  tested whether recovery times follow Kuramoto dynamics with the coupling constant K
  measurable from VIP-signaling experiments. This gap prevents rational design of
  optimal jet-lag protocols based on first-principles chronobiology.
systematic_gaps:
  - Quantitative test of whether jet-lag recovery rate scales with K*PRC_amplitude as Kuramoto model predicts
  - Whether PRC measured in vitro (dissociated SCN neurons) matches the effective PRC of the intact SCN network
  - Optimal light pulse timing for eastward vs westward travel computed from Kuramoto PRC theory vs empirical trial
suggested_hypotheses:
  - Jet-lag recovery time (days) equals delta_phi / (K * PRC_max * omega_0) where delta_phi is the phase shift, K is VIP coupling strength, and PRC_max is the maximum advance/delay
related_unknowns:
  - u-soc-universality-class-brain

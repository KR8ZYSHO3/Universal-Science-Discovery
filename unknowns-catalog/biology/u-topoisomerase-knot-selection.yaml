id: u-topoisomerase-knot-selection
title: Do topoisomerases actively select against specific DNA knot types, and how does the equilibrium knot distribution in cells depend on chromosome topology?
status: open
priority: medium
disciplines:
  - biology
  - molecular-biology
  - mathematics
  - topology
summary: >
  Type II topoisomerases can both introduce and remove knots and catenanes from
  circular DNA. In vitro, they drive DNA toward a narrower knot distribution than
  random equilibrium — suggesting active topological discrimination. The mechanism
  by which topoisomerase II "senses" the global topology of a DNA circle from a
  local strand-passage event (the "local topology problem") is not resolved.
  Proposals involve DNA shape recognition (writhe sensing), chiral gating of
  strand passage, or statistical correlations between local and global topology.
  The in vivo knot spectrum of chromosomes under physiological conditions has not
  been measured.
systematic_gaps:
  - The molecular mechanism by which Type II topoisomerase achieves below-equilibrium knot frequencies (topological discrimination) is not established.
  - The equilibrium knot distribution of chromosomal DNA in living cells under different supercoiling conditions has not been measured directly.
  - Whether specific knot types (beyond trefoil and figure-eight) occur in vivo at biologically significant frequencies is unknown.
last_reviewed: "2026-05-05"

id: u-jamming-exponent-universality-epithelium-versus-colloid
title: >
  Do epithelial jamming transitions near confluence share quantitative scaling exponents (e.g., velocity correlations, susceptibility divergences) with laboratory colloidal glasses at comparable effective packing fractions?
status: open
priority: medium
disciplines:
  - biology
  - physics
  - soft-matter
summary: >
  Phenomenological parallels are documented, but biological variability (division, apoptosis, active cytoskeletal noise) breaks strict universality-class hypotheses — multi-lab datasets correlating mechanical assays with jamming order parameters are needed.
systematic_gaps:
  - Harmonized imaging pipelines comparing particle-image velocimetry statistics on cells versus tracer beads in rheometers
  - Controls separating thermal versus active noise contributions near the transition
suggested_hypotheses:
  - h-shared-shape-index-scaling-near-jamming-across-donors
related_bridges:

id: u-evolution-undecidability-open-ended
title: Is open-ended biological evolution undecidable in principle - analogous to the halting problem - and does this explain why no finite model can predict evolutionary trajectories indefinitely?
status: open
priority: high
disciplines:
  - evolutionary-biology
  - theoretical-computer-science
  - complex-systems
  - philosophy-of-biology
summary: >
  A 2025 preprint (arXiv 2512.15534) characterizes open-ended evolution through
  undecidability mechanisms in random Boolean networks - showing that the capacity
  for indefinite evolutionary novelty (open-endedness) is related to undecidable
  properties of the underlying computational substrate (whether Boolean attractors
  can generate arbitrarily complex new attractors). This extends Chaitin's earlier
  arguments that Darwinian evolution is related to algorithmic randomness. The core
  open question is: if open-ended evolution requires undecidable computational properties,
  does this mean that (1) no finite simulation can exhibit true open-ended evolution
  (only approximations with bounded novelty), and (2) biological evolution has been
  "evading decidability" through mechanisms like horizontal gene transfer, sexual
  recombination, and epigenetic inheritance that inject algorithmic randomness? This
  would reframe the origin of complexity as a Gödelian escape from computability limits.
systematic_gaps:
  - Whether the evolutionary dynamics of real organisms produce Kolmogorov-incompressible complexity growth (true open-endedness) or bounded-novelty pseudo-evolution has not been tested empirically.
  - The connection between biological undecidability mechanisms (HGT, recombination) and the Chaitin incompleteness framework has not been formalized.
  - No measure of "degree of open-endedness" calibrated against undecidability has been applied to empirical phylogenetic data.
suggested_hypotheses:
  - Sexual recombination is an algorithmic randomness injection mechanism that allows biological evolution to exceed the complexity bounds of any deterministic Turing machine of equivalent size.

id: u-ecology-resilience-spatial-indicator
title: Do spatial geometric properties of vegetation patterns (separatrix distance, fractal dimension) provide earlier and more reliable early-warning indicators of ecosystem collapse than temporal variance or autocorrelation?
status: open
priority: high
disciplines:
  - ecology
  - statistical-physics
  - nonlinear-dynamics
  - remote-sensing
summary: >
  Standard early-warning indicators (EWIs) for ecosystem tipping points are temporal:
  rising AR(1), rising variance, rising recovery time from perturbation. A 2026 preprint
  (arXiv 2603.08861) proposes a "geometric early warning indicator" derived from the
  stochastic separatrix structure of a random two-state ecosystem model. The separatrix
  (the boundary between the two stable states in state space) can be reconstructed from
  spatial vegetation pattern data, and its proximity to the current state is proposed
  as an EWI that precedes temporal EWIs. Additionally, a separate analysis shows that
  spatial pattern formation itself can both indicate and trigger tipping (arXiv 2506.22178).
  The key open question is whether geometric/spatial EWIs consistently lead temporal EWIs
  by measurable time intervals, and whether this lead time is sufficient for management
  intervention before irreversible ecosystem collapse.
systematic_gaps:
  - The lead time of geometric/separatrix-based EWIs relative to temporal EWIs has not been measured in empirical dryland vegetation datasets.
  - Whether the separatrix distance can be estimated from satellite imagery without ground-truth observations is unknown.
  - The false-positive rate of spatial EWIs (triggering without actual tipping) has not been quantified across ecosystem types.
suggested_hypotheses:
  - Geometric EWIs derived from spatial vegetation patterns detect desertification tipping 6-18 months earlier than temporal AR(1) EWIs computed from the same data, across at least 5 distinct dryland ecosystems.
related_unknowns:
  - u-climate-ew-indicator-universality
  - u-vegetation-pattern-tipping-universality
references:

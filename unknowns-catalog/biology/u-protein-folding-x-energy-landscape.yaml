id: u-protein-folding-x-energy-landscape
title: >
  What determines the folding funnel depth-to-width ratio for a given amino acid
  sequence, and can frustrated landscapes predict aggregation propensity?
status: open
priority: high
disciplines:
  - biology
  - physics
  - chemistry
  - computational_biology
summary: >
  Energy landscape theory explains why proteins fold, but predicting the detailed
  landscape topology (funnel depth, barrier heights, presence of kinetic traps) from
  amino acid sequence remains unsolved beyond the qualitative principle of minimal
  frustration. AlphaFold2 predicts native structures with near-experimental accuracy
  but does not provide landscape information — it cannot predict folding rates, kinetic
  traps, aggregation propensity, or the existence of multiple stable folds. The
  connection between sequence-level frustration (conflicting contacts) and landscape
  topology, and from landscape topology to disease-relevant misfolding, is the key
  missing link.
systematic_gaps:
  - No method reliably predicts folding rates (log kf) from sequence alone without prior structural knowledge
  - The relationship between local frustration index (Ferreiro et al. frustratometer) and aggregation propensity in amyloid-forming sequences is not quantitatively established
  - Whether metamorphic proteins (fold-switching on function) can be rationally designed by engineering competing landscape minima has not been demonstrated de novo

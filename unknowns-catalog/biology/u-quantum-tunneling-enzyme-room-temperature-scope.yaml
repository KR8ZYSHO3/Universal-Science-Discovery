id: u-quantum-tunneling-enzyme-room-temperature-scope
title: >
  What fraction of enzymatic reactions in biology involve quantum tunneling as
  a quantitatively significant rate enhancement, and is quantum tunneling a
  universal feature of enzyme catalysis or limited to specific oxidoreductase
  classes with extreme KIE signatures?
status: open
priority: high
disciplines:
  - biochemistry
  - quantum-physics
  - enzymology
  - biophysics
summary: >
  Quantum tunneling of hydrogen (protons, hydride ions, hydrogen atoms) has
  been definitively demonstrated in a handful of enzymes — primarily alcohol
  dehydrogenase (ADH), aromatic amine dehydrogenase (AADH), and thymidylate
  synthase — through anomalously large kinetic isotope effects (KIE > 7) and
  temperature dependence signatures inconsistent with classical transition
  state theory (TST).

  However, the scope of quantum tunneling in biology is unknown: (1) How many
  of the ~5,000 known enzyme classes use tunneling as a significant rate
  enhancement (> 2-fold)? (2) Is tunneling only important for C-H, N-H, and
  O-H bond transfers, or also for heavier atom transfers? (3) How does protein
  conformational dynamics actively optimize tunneling distance d (the "promoting
  vibration" hypothesis), and is this a designed feature of enzyme architecture?

  The experimental barrier is that measuring KIEs large enough to indicate
  tunneling requires isotopically pure substrates and very precise rate measurements.
  Computational barriers include the inability of classical MD to accurately
  describe quantum nuclear motion, requiring expensive path integral methods.
systematic_gaps:
  - Systematic KIE measurement across diverse enzyme families (not just oxidoreductases)
  - Path integral molecular dynamics for proton transfer in diverse enzyme active sites
  - Protein evolutionary analysis of "promoting vibration" residues across phylogeny
  - Room-temperature quantum coherence timescale in biological environments

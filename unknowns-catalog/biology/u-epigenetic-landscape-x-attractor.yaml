id: u-epigenetic-landscape-x-attractor
title: >
  Can the Waddington epigenetic landscape be quantitatively reconstructed from
  single-cell RNA-seq data, and do predicted attractor barriers match reprogramming
  efficiency?
status: open
priority: high
disciplines:
  - biology
  - mathematics
  - dynamical_systems
  - developmental_biology
summary: >
  The Waddington landscape can be quantitatively formalized as the potential landscape
  of the gene regulatory network, but computing this landscape from data remains
  difficult. Single-cell RNA-seq (scRNA-seq) provides high-dimensional snapshots of
  cells across trajectories, but reconstructing the underlying vector field (velocity
  field = RNA velocity) and then the potential landscape requires solving the gradient
  problem in high dimensions. Whether scRNA-seq-derived potential landscapes accurately
  predict reprogramming efficiency (Yamanaka factor protocols), differentiation
  commitment points, and direct lineage conversion routes has not been systematically
  validated.
systematic_gaps:
  - RNA velocity methods (scVelo, dynamo) infer vector fields from splicing ratios but the connection to protein-level GRN dynamics and the Waddington potential has not been rigorously established
  - Predicted attractor barriers from RNA velocity landscapes have not been quantitatively correlated with measured iPSC reprogramming efficiency across 100+ cell types
  - The role of non-gradient (rotational) components of the GRN vector field in maintaining cell identity has not been separated from potential-derived (gradient) components in real data
related_bridges:
  - b-epigenetic-landscape-x-attractor
last_reviewed: "2026-05-07"

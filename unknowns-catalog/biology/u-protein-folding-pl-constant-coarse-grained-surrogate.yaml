id: u-protein-folding-pl-constant-coarse-grained-surrogate
title: >
  Can coarse-grained order parameters for protein folding (native contact fraction, radius of gyration channels)
  admit empirically measurable Polyak–Łojasiewicz-like constants that predict folding timescale ordering across homologs?
status: open
priority: medium
disciplines:
  - biophysics
  - applied-mathematics
summary: >
  Folding funnels are high-dimensional; PL inequalities live in smooth finite-dimensional optimization. Whether any
  scientifically falsifiable scalar μ emerges from MD-derived free energy surrogates — versus post-hoc curve fitting —
  remains unresolved.
systematic_gaps:
  - Dimension reduction destroys guarantees; rigorous PL constants do not automatically survive arbitrary projections.
  - Path ensembles for multi-domain proteins violate simple funnel pictures even when native states are unique.

suggested_hypotheses:
  - h-two-state-folders-admit-pl-like-surrogate-on-contact-order-parameter


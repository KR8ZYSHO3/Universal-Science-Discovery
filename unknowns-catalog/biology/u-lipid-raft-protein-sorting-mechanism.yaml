id: u-lipid-raft-protein-sorting-mechanism
title: >
  What is the physical mechanism by which lipid rafts sort integral membrane
  proteins, and what are the quantitative rules governing protein partitioning
  between ordered (raft) and disordered phases in living cell membranes?
status: open
priority: high
disciplines:
  - cell-biology
  - biophysics
  - condensed-matter-physics
summary: >
  Lipid rafts — cholesterol- and sphingomyelin-enriched liquid-ordered (Lo)
  microdomains in cell membranes — are proposed platforms for receptor clustering,
  signal transduction, and membrane trafficking. However, the physical rules
  governing whether a given membrane protein partitions into the raft (Lo) phase
  versus the disordered (Ld) phase remain poorly understood.

  The theoretical framework (Frank elastic energy applied to 2D liquid crystals)
  predicts that the line tension at Lo/Ld domain boundaries, the mismatch between
  lipid bilayer thickness in each phase, and protein-induced membrane curvature
  together determine partitioning. However, in living cells, membrane proteins
  show partitioning that cannot be predicted from sequence alone, and the size
  of rafts in vivo (if they exist as stable structures at all) is debated — ranging
  from transient nanoscopic fluctuations (10-100 nm) to stable microscopic domains
  under specific conditions.

  Key open questions: (1) Do raft domains exist as equilibrium thermodynamic phases
  or as kinetically trapped, fluctuation-driven heterogeneities? (2) What is the
  quantitative relationship between protein transmembrane domain length/composition
  and raft partitioning coefficient? (3) How do membrane proteins as topological
  defects in the lipid order field generate effective protein-protein interactions
  mediated by membrane elasticity?
systematic_gaps:
  - Live-cell imaging at spatial resolution below raft domain size (~10-100 nm)
  - Quantitative measurement of Lo/Ld partition coefficients for diverse proteins
  - Theoretical prediction of protein-induced defect energy in the LC order field
  - Understanding raft dynamics in the presence of active cytoskeleton remodeling

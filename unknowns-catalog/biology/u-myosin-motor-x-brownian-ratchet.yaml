id: u-myosin-motor-x-brownian-ratchet
title: >
  What is the complete energy transduction mechanism of myosin II at the single-molecule
  level, and how does the Brownian ratchet efficiency scale with temperature?
status: open
priority: medium
disciplines:
  - biology
  - physics
  - biophysics
  - biochemistry
summary: >
  While myosin II is understood qualitatively as a Brownian ratchet, the detailed
  mechanism by which ATP hydrolysis couples to the asymmetric diffusion step remains
  incompletely resolved. Single-molecule optical tweezer experiments show step sizes
  of 5-36 nm with large variance, consistent with diffusive exploration, but the
  exact shape of the ratchet potential and how it changes during the ATP hydrolysis
  cycle is not known. Furthermore, if myosin is truly a Brownian ratchet, its efficiency
  should decrease at higher temperatures (more thermal fluctuations break directionality)
  — but biological motors maintain high efficiency at 37°C. The resolution of this
  paradox requires quantitative stochastic thermodynamics analysis.
systematic_gaps:
  - The free energy landscape of the myosin power stroke at atomic resolution during each ATP hydrolysis sub-step has not been fully mapped
  - Temperature dependence of myosin step efficiency has not been systematically measured from 4°C to 42°C to test Brownian ratchet predictions
  - Jarzynski equality-based measurement of myosin free energy transduction from non-equilibrium single-molecule trajectories has not been performed

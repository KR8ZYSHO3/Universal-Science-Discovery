id: u-cell-jamming-tissue-development
title: Does the jamming transition control tissue fluidity during embryonic morphogenesis and cancer invasion, and what determines the critical shape index in vivo?
status: open
priority: high
disciplines:
  - biology
  - biophysics
  - developmental-biology
  - cancer-biology
summary: >
  The vertex model predicts a jamming transition in epithelial monolayers controlled
  by shape index q* = P/√A, with the critical value q*_c ≈ 3.81. Below this value
  tissues are rigid (jammed); above it, tissues flow (unjammed). In vivo, it is
  unclear whether the jamming transition actually controls morphogenetic events (e.g.
  epithelial sheet migration, neural tube closure, wound healing) or whether active
  forces and cell division dominate over the passive jamming physics. The in vivo
  measurement of q* and its relationship to tissue fluidity in developing embryos
  has not been performed at sufficient resolution and completeness to confirm or
  refute the theory.
systematic_gaps:
  - In vivo measurement of shape index q* and its correlation with tissue rheology (viscoelastic moduli measured by laser ablation) in developing Drosophila, zebrafish, or mouse embryos is incomplete.
  - Whether cell division and active forces shift the critical shape index from the passive vertex model prediction is untested.
  - The relationship between q* and epithelial-to-mesenchymal transition (EMT) markers in cancer cells has been measured in 2D culture but not validated in 3D tumour organoids or primary tissue.
last_reviewed: "2026-05-05"

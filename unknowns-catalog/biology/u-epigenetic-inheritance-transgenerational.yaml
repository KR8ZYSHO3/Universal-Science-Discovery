id: u-epigenetic-inheritance-transgenerational
title: "How far does transgenerational epigenetic inheritance extend in mammals, and what molecular mechanisms survive reprogramming at fertilization?"
status: open
priority: high
disciplines:
  - epigenetics
  - evolutionary-biology
  - developmental-biology
summary: >
  Epigenetic marks (DNA methylation, histone modifications, piRNA-guided chromatin
  states) are largely erased at fertilization and re-established during embryogenesis
  — a "reprogramming" that should erase parental experience from the germline.
  Yet transgenerational epigenetic inheritance (TEI) — the transmission of acquired
  phenotypes to offspring not through DNA sequence — has been documented in plants
  (FLC methylation), C. elegans (piRNA memory for up to 3 generations), and contested
  in mice (paternal diet effects on offspring metabolism). In mammals, the evidence is:
  (1) Agouti mouse model: maternal methyl-donor diet shifts coat color and obesity risk
  via persistent methylation of the Avy locus; (2) Paternal trauma (stressed fathers)
  increases anxiety in offspring via sperm miRNA changes (Gapp et al. 2014, but
  replication is inconsistent); (3) Human epidemiology: Barker hypothesis (fetal
  programming) and Dutch Hunger Winter data.
  The mechanistic gap: which epigenetic marks survive mammalian germline reprogramming,
  why, and for how many generations? If TEI is real and mechanistically understood,
  it implies a Lamarckian inheritance channel with profound implications for evolution.
systematic_gaps:
  - Which methylated loci survive germline reprogramming and are transmitted to F1 and F2 in mammals
  - Whether sperm miRNA changes are causal for paternal TEI or mere correlates
  - The evolutionary significance of TEI vs. DNA sequence variation for adaptation speed
suggested_hypotheses:
  - Sperm miRNA pools encode 10-20 bits of paternal environmental experience, transmitted to F1 metabolism with >70% penetrance, detectable by deep miRNA sequencing of sperm from fathers exposed to defined diets
related_unknowns:
  - u-fitness-landscape-overlapping-genes
references:
  - doi: "10.1038/nature13490"
    note: "Gapp et al. (2014) Nature Neuroscience - paternal trauma sperm miRNA transmission"
last_reviewed: "2026-05-05"

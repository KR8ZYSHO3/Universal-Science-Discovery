id: u-pathogen-coevolution-network-percolation
title: Does pathogen diversity coevolve with host contact network topology through a percolation-like process, with a diversity threshold above which epidemic control becomes impossible?
status: open
priority: high
disciplines:
  - evolutionary-epidemiology
  - network-science
  - statistical-physics
  - ecology
summary: >
  A 2026 preprint (arXiv 2603.29398) studies pathogen diversity emerging from
  coevolutionary dynamics in interconnected host systems - finding that host network
  topology strongly influences which pathogen strains can coexist and diversify.
  High-connectivity hubs promote strain coexistence (via superinfection and
  cross-immunity dynamics), while sparse networks push toward competitive exclusion.
  The open question is whether there is a percolation-like threshold in pathogen
  diversity: below a critical strain count, epidemic control (via vaccination or
  targeted removal) succeeds; above it, the pathogen diversity network itself
  percolates, rendering control impossible without global synchronization. This would
  predict a "herd-immunity cliff" - a maximum number of co-circulating strains above
  which classical vaccination strategies fail - analogous to the percolation threshold
  in epidemic models (related to u-percolation-epidemic-fss).
systematic_gaps:
  - Whether a percolation-like threshold exists in pathogen strain co-circulation as a function of host network degree distribution has not been derived theoretically.
  - The critical strain diversity above which WHO-recommended vaccination strategies are predicted to fail has not been computed for any pathogen family.
  - Whether historical influenza strain diversity has been tracking the percolation threshold is unknown.
suggested_hypotheses:
  - The number of co-circulating influenza strains that can be controlled by seasonal vaccination scales with the square root of the host network degree, following percolation theory predictions.
related_unknowns:
  - u-percolation-epidemic-fss
  - u-habitat-fragmentation-threshold

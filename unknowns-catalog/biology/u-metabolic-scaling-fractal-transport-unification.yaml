id: u-metabolic-scaling-fractal-transport-unification
title: How much of cross-species variation in metabolic scaling exponents is explained by
  measurable deviations from fractal-like branching in real vascular and respiratory networks?
status: open
priority: medium
disciplines:
- biology
- biophysics
- ecology
summary: WBE predicts a specific exponent under idealized branching; empirical scatter and
  taxonomic structure suggest missing ingredients (temperature, activity, phylogenetic inertia).
  Linking imaging-derived geometry to α organism-by-organism remains incomplete.
systematic_gaps:
- High-throughput 3D vascular reconstruction across species is rare.
- Models rarely integrate cardiac pulsatility and nonlinear rheology into scaling exponents.

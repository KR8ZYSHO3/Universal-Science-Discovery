id: u-biofilm-x-active-nematic
title: Do topological defects in bacterial biofilms (+1/2 disclinations) causally determine sites of biofilm expansion, cell
  extrusion, or matrix secretion, or are they merely epiphenomenal signatures of mechanical stress?
status: open
priority: medium
disciplines:
- biology
- physics
- microbiology
summary: Active nematic theory predicts that +1/2 topological defects generate extensile stress that drives cell extrusion
  and collective motion. In biofilms, defects have been observed to correlate with structural transitions, but the causal
  relationship has not been established. Whether defects cause expansion (extensile stress → cell expulsion) or are merely
  markers of pre-existing mechanical heterogeneity (caused by growth rate differences) requires direct manipulation experiments.
systematic_gaps:
- No direct manipulation experiment has perturbed defect positions independently of bacterial growth rate
- The relationship between +1/2 defect velocity and actual extensile stress in biofilm matrix has not been measured
- Active nematic theory assumes rodlike particles, but cocci and other shapes violate this assumption
related_bridges:

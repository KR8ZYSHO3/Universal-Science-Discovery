id: u-quantum-coherence-physiological-role
title: >
  Does quantum coherence in biological light-harvesting complexes play a
  functional role in energy transfer efficiency at physiological temperatures,
  or are the observed spectroscopic oscillations artefacts of vibronic coupling
  with no fitness consequence?
status: open
priority: high
disciplines:
  - biophysics
  - quantum-biology
  - photosynthesis-biology
  - quantum-physics
summary: >
  The 2007 Engel et al. 2DES experiments on the FMO complex showed long-lived
  (~660 fs) oscillatory signals interpreted as quantum coherence. Subsequent
  work has questioned whether these oscillations are electronic (true quantum
  superpositions of excitonic states) or vibronic (coupling between electronic
  excitations and protein vibrational modes). The functional significance — does
  coherence increase energy transfer efficiency relative to the classical Förster
  limit? — remains contested.

  Key open questions:
  1. Are the oscillations seen in 2DES at physiological temperature (310 K)
     truly electronic coherences or vibrational coherences?
  2. Does the ENAQT (environment-assisted quantum transport) prediction —
     that moderate dephasing maximises transfer efficiency — hold in the FMO
     complex in vivo with correct bath spectral density?
  3. What is the actual energy transfer efficiency of FMO under physiological
     conditions, and how does it compare to the Förster classical limit?
  4. Do organisms with different light-harvesting strategies (C3 vs C4 plants,
     purple bacteria vs. cyanobacteria) show different coherence signatures
     that correlate with ecological light environments?
systematic_gaps:
  - In vivo 2DES at physiological temperature for intact thylakoid membranes
    remains technically challenging; most data is on isolated complexes in
    buffer at 77K or 277K
  - Theoretical models disagree on the bath spectral density (Drude-Lorentz
    vs Brownian oscillator vs underdamped vibrational peaks)
  - Transfer efficiency measurements that isolate the coherence contribution
    (vs. structural topology) have not been performed with sufficient precision
suggested_hypotheses:
  - h-fmo-enaqt-efficiency

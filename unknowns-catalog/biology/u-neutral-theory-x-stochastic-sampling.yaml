id: u-neutral-theory-x-stochastic-sampling
title: Does the observed species abundance distribution of tropical tree communities follow the Poisson-Dirichlet prediction
  of neutral theory, or do deterministic niche effects create significant deviations detectable with modern tree census data?
status: open
priority: medium
disciplines:
- biology
- mathematics
- ecology
summary: Neutral theory predicts log-series-shaped SADs from Ewens sampling formula. Tropical forests show approximately log-series
  SADs, but the fit is imperfect at both extremes (too many rare species, too few dominant species). Whether this deviation
  proves niche effects or merely reflects finite sampling / immigration effects is debated. Modern large-scale tree census
  data (BCI, CTFS) with thousands of species and hundreds of thousands of individuals provides the best empirical test but
  has not been analysed with the full Poisson-Dirichlet framework.
systematic_gaps:
- Full Poisson-Dirichlet likelihood fitting to BCI census data with immigration correction has not been performed
- Neutral theory goodness-of-fit tests do not adequately account for phylogenetic signal in abundance distributions
- Distinguishing pure neutral drift from nearly-neutral models with small fitness differences is statistically very difficult

id: u-circadian-clock-x-feedback-oscillator
title: What molecular mechanism ensures temperature compensation of the circadian period (Q₁₀ ≈ 1.0) despite temperature sensitivity
  of all biochemical rate constants (Q₁₀ ≈ 2-3)?
status: open
priority: high
disciplines:
- biology
- biophysics
- biochemistry
summary: 'Circadian clocks maintain ~24-hour periods across a 10°C temperature range (Q₁₀ ≈ 1.0), while individual biochemical
  reactions are strongly temperature-sensitive (Q₁₀ ≈ 2-3). The mechanism of temperature compensation is contested: competing
  models invoke balanced thermosensitivity of positive and negative arms, substrate inhibition, and conformational changes
  in clock proteins. No single molecular mechanism has been experimentally confirmed that fully accounts for temperature compensation
  across all circadian organisms.'
systematic_gaps:
- No single molecular mechanism has been confirmed to explain temperature compensation across phylogenetic diversity
- Mathematical models predict temperature compensation requires precise parameter tuning that seems evolutionarily fragile
- Whether temperature compensation is an evolved property or a generic feature of delayed negative feedback oscillators is
  unresolved

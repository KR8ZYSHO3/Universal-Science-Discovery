id: u-multilevel-selection-kin-equivalence
title: Are kin selection and multilevel selection genuinely equivalent (Price equation unification) or do they make different empirical predictions, and which level of selection dominates in human social evolution?
status: open
priority: high
disciplines:
  - evolutionary-biology
  - population-genetics
  - social-science
  - philosophy-of-biology
summary: >
  Hamilton (1964) and Price (1970) showed that kin selection and group selection are
  mathematically equivalent partitions of the total selection response via the Price
  equation. Defenders of kin selection (Dawkins, West, Gardner) argue the equivalence
  means group selection adds no explanatory content — it is just kin selection described
  differently. Defenders of multilevel selection (Wilson & Wilson 2007, Nowak et al. 2010)
  argue that the mathematical equivalence does not entail conceptual equivalence —
  group selection is a distinct causal process that becomes important when groups
  competition structure fitness differently than within-group competition. For human
  evolution, the question has direct social implications: if within-group cooperation
  (tribes, nations) evolves primarily through kin selection, cultural mechanisms that
  extend cooperation beyond genetic kin are extensions; if group selection dominates,
  institutional design has different evolutionary grounding. The empirical record is
  contested: ground squirrel alarm calls (kin selection), honeybee caste evolution
  (contested), human large-scale cooperation (unclear mechanism).
systematic_gaps:
  - Empirical tests that would distinguish kin selection from group selection as causal mechanisms (not just equivalent descriptions) have not been designed or agreed upon.
  - The role of cultural group selection in human prosociality (Henrich 2004) versus genetic kin selection is not quantified for any large-scale human cooperation phenomenon.
  - Nowak et al. (2010) inclusive fitness challenge to eusociality has not been resolved — subsequent mathematical analysis shows the paper contained errors, but the conceptual debate continues.
last_reviewed: "2026-05-06"

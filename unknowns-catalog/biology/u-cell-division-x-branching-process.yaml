id: u-cell-division-x-branching-process
title: What is the effective division/death probability ratio for early pre-cancerous clones in normal tissue, and does it
  cross the critical threshold m = 1 before or after acquiring the first driver mutation?
status: open
priority: high
disciplines:
- biology
- mathematics
- medicine
summary: Branching process theory predicts that tumour initiation requires E[offspring] = m > 1 for clonal establishment.
  In normal tissue, stem cell division is tightly regulated to maintain m ≈ 1 (tissue homeostasis). The question of when a
  pre-cancerous clone first crosses m = 1 — before the first driver mutation (due to epigenetic drift) or after (due to mutation)
  — determines early cancer risk and detection window. This requires in situ measurements of individual cell division and
  death rates in human tissue, which is technically very challenging.
systematic_gaps:
- In situ division and death rate measurements for individual pre-cancerous clones in human tissue are unavailable
- Whether neutral drift (m = 1) or selection (m > 1) dominates early clonal expansion in normal tissue is debated
- Branching process models assume independent cells but ignore stem cell niche spatial constraints

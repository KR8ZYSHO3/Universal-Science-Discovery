id: u-biomechanics-x-soft-robotics
title: What is the minimum tendon compliance (spring stiffness k) relative to muscle force (F_max) that achieves the metabolic cost reduction predicted by the spring-mass model, and can this ratio be systematically optimized across body mass scales for soft robotic design?
status: open
priority: medium
disciplines:
  - biology
  - computer_science
  - engineering
summary: >
  The spring-mass model predicts that elastic energy storage in compliant tendons reduces
  metabolic cost during running; optimal tendon compliance maximizes energy return for
  a given stride frequency and body mass. The optimal compliance k/F_max scales with
  body mass in biological systems (Achilles tendon stiffness ∝ body mass^0.67) but
  the mechanical and evolutionary reasons for this scaling are debated. For soft robotic
  locomotion, the optimal spring stiffness across robot mass scales (1g insect-robot
  to 100kg bipedal robot) has not been systematically computed from first principles,
  preventing principled design rules for compliant robotic actuators.
systematic_gaps:
  - No analytical prediction for the optimal tendon compliance ratio k·L/F_max as a function of body mass and stride frequency
  - Soft actuator fatigue life (number of compression cycles before failure) degrades with compliance; the compliance-durability trade-off is not characterized for dielectric elastomers
  - Proprioceptive feedback in soft robotic systems cannot replicate muscle spindle sensitivity; the effect of proprioceptive noise on compliant locomotion stability is unknown
related_bridges:
  - b-biomechanics-x-soft-robotics
last_reviewed: "2026-05-07"

id: u-maxent-ecology-failure-modes
title: Under what ecological conditions does the Maximum Entropy Theory of Ecology (METE) fail, and do systematic deviations from METE predictions identify specific ecological mechanisms beyond information-theoretic constraints?
status: open
priority: medium
disciplines:
  - macroecology
  - statistical-mechanics
  - information-theory
  - biodiversity-science
summary: >
  The Maximum Entropy Theory of Ecology (METE) makes zero-free-parameter predictions
  of species abundance distributions, species-area relationships, and body-size
  distributions from just three macroecological state variables (S, N, E). It
  works surprisingly well in mature, undisturbed communities. However, METE fails
  systematically in: (1) recently invaded communities, (2) communities recovering
  from disturbance, (3) extremely species-poor systems (deserts, arctic tundra),
  and (4) highly productive tropical forests.

  The unknown is whether these failures identify specific ecological mechanisms
  (non-equilibrium dynamics, strong species interactions, environmental filtering)
  that go beyond the information-theoretic baseline — or whether they indicate
  that the choice of state variables (S, N, E) is incomplete. If failure modes
  are systematic and predictable, METE deviations become more informative than
  METE successes as tests of ecological theory.
systematic_gaps:
  - Criteria for determining when a community has reached MaxEnt "equilibrium" are not defined; METE provides no dynamic model of approach to equilibrium.
  - The role of spatial heterogeneity as an additional constraint not captured by S, N, E is unquantified.
  - Invaded communities deviate strongly from METE; it is unknown whether the invasion signal decays on timescales predictable from relaxation dynamics.
  - METE has been tested primarily in plant communities; systematic tests in animal communities, freshwater ecosystems, and microbial communities are sparse.
suggested_hypotheses:
  - h-mete-non-equilibrium-deviations

id: u-aging-hallmarks-causal-hierarchy
title: "Among the 12 hallmarks of aging (telomere attrition, epigenetic drift, proteostasis loss, etc.), which are causes and which are consequences — is there a causal hierarchy?"
status: open
priority: high
disciplines:
  - biogerontology
  - systems-biology
  - cell-biology
summary: >
  Lopez-Otin et al. (2023) describe 12 hallmarks of aging: genomic instability,
  telomere attrition, epigenetic alterations, loss of proteostasis, disabled
  macroautophagy, deregulated nutrient sensing, mitochondrial dysfunction,
  cellular senescence, stem cell exhaustion, altered intercellular communication,
  chronic inflammation, and dysbiosis. These hallmarks are causally linked (e.g.,
  genomic instability causes epigenetic drift, which causes senescence), but the
  causal hierarchy — which hallmarks are primary drivers vs. downstream consequences
  — has not been established. Two competing views: (1) Epigenetic clock hypothesis
  (Horvath, Sinclair): epigenetic drift is the primary clock of aging; resetting
  it (partial reprogramming) rejuvenates other hallmarks; (2) Damage accumulation
  hypothesis: stochastic damage to macromolecules (DNA, proteins, lipids) is primary;
  epigenetic drift is a consequence. If the epigenetic clock is primary, then
  partial reprogramming (Yamanaka factor expression) could be the master intervention.
  If damage is primary, no single intervention suffices.
systematic_gaps:
  - No experiment has established the causal hierarchy among all 12 hallmarks
  - Whether partial reprogramming reverses damage or only epigenetic marks is unknown
  - The quantitative contribution of each hallmark to lifespan variance across species is not established
suggested_hypotheses:
  - Epigenetic drift is causally upstream of at least 6 other hallmarks (senescence, proteostasis, stem cell exhaustion, mitochondrial dysfunction, intercellular communication, inflammation), testable by partial reprogramming experiments that restore the epigenome while measuring other hallmark markers
related_unknowns:
  - u-epigenetic-inheritance-transgenerational
references:

id: u-allometry-fractal-networks-deviations
title: "Do organisms without hierarchical vascular networks (sponges, fungi, prokaryotes) deviate predictably from the WBE 3/4-power metabolic scaling, and what alternative exponent does the geometry predict?"
status: open
priority: medium
disciplines:
  - theoretical-biology
  - network-theory
  - ecology
  - biophysics
summary: >
  The West-Brown-Enquist (WBE) model derives Kleiber's 3/4-power metabolic scaling
  from the geometry of space-filling fractal vascular networks. The derivation assumes:
  (1) a hierarchical branching distribution network exists, (2) terminal units (capillaries,
  mitochondria) are of fixed size, and (3) the network minimizes hydrodynamic resistance.
  These assumptions hold for vertebrates and most vascular plants, but break down for
  organisms without dedicated circulatory systems. Sponges rely on diffusion and
  flagellar pumping; fungi use cytoplasmic streaming and non-hierarchical mycelial
  networks; prokaryotes use simple diffusion. If the WBE geometry breaks down, the
  predicted scaling exponent changes: diffusion-only systems should scale as M^{2/3}
  (surface-to-volume), while non-hierarchical fractal networks may yield intermediate
  exponents. Empirical data for sponges show exponents of 0.60-0.72, suggesting a
  transition between 2/3 and 3/4 scaling. The unknown: does the WBE model predict
  these intermediate exponents from first principles if the network geometry is modified,
  or do sponges require a genuinely different theoretical framework?
systematic_gaps:
  - No quantitative WBE-derived prediction for metabolic scaling in organisms with non-hierarchical distribution networks
  - Empirical metabolic scaling exponents for fungi and sponges have large uncertainties (0.6-0.8 range)
  - Whether mycelial network topology satisfies any of the three WBE assumptions has not been tested quantitatively
suggested_hypotheses:
  - Organisms with fractal but non-hierarchical distribution networks (fungi) follow M^{(d-1)/d} scaling where d is the measured fractal dimension of the mycelial network, predicting d ≈ 2.5-2.8 to yield observed exponents of 0.60-0.70
related_unknowns:
  - u-renormalization-allometric

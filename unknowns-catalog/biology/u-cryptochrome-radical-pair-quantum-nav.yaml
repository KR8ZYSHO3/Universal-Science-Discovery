id: u-cryptochrome-radical-pair-quantum-nav
title: Is avian magnetic compass navigation via cryptochrome radical pairs a coherent quantum process that persists at physiological temperatures, and what decoherence timescale is critical?
status: open
priority: high
disciplines:
  - quantum-biology
  - biophysics
  - ornithology
  - chemistry
summary: >
  The radical-pair mechanism (RPM) proposes that avian magnetic compass navigation
  depends on quantum coherence between unpaired electrons in cryptochrome proteins,
  with the Earth's magnetic field influencing singlet-triplet interconversion rates.
  A 2022 study (arXiv 2206.07355) demonstrates theoretically and numerically that
  driven spin dynamics (oscillating magnetic fields) can enhance cryptochrome
  magnetoreception by increasing the singlet yield contrast - suggesting coherent
  quantum dynamics are essential. However, whether quantum coherence in the radical
  pair persists long enough (microseconds) at 37-42°C to influence navigation, or
  whether decoherence destroys coherence before any magnetic field effect can accumulate,
  remains contested. The critical decoherence timescale needed for a functional compass
  has not been measured in vivo. This represents one of the clearest possible tests of
  quantum biology: a binary prediction (coherent vs. incoherent) with measurable
  experimental consequence.
systematic_gaps:
  - The decoherence time of the FAD•- / Trp•+ radical pair in cryptochrome has not been measured directly in living avian retinal cells.
  - Whether the singlet-triplet interconversion rate in vivo matches the RPM prediction (not just in vitro) is unknown.
  - Behavioral magnetoreception experiments with controlled RF disruption have not been combined with in vivo EPR measurements.
suggested_hypotheses:
  - Cryptochrome radical pairs maintain quantum coherence > 1 microsecond at 40°C in avian retinal cells due to spin-selective protein confinement that suppresses hyperfine-induced dephasing.

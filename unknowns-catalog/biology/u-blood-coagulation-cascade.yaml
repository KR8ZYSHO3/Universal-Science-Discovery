id: u-blood-coagulation-cascade
title: "What triggers the threshold crossing from hemostasis (localized clot) to disseminated intravascular coagulation (systemic activation), and can this transition be predicted from routine plasma biomarkers?"
status: open
priority: high
disciplines:
  - medicine
  - systems-biology
  - hematology
summary: >
  DIC is a life-threatening condition where the coagulation cascade is activated
  systemically, consuming clotting factors and causing simultaneous bleeding and
  clotting. The transition from localized hemostasis to DIC requires loss of
  the spatial localization of thrombin generation (normally confined near the
  injury site by flow and inhibitor gradients). Current ODE models of coagulation
  do not include spatial transport, which is critical for understanding why
  localized activation remains contained while sepsis-driven, diffuse TF
  expression triggers systemic activation. The predictive biomarkers for
  impending DIC (PT, APTT, fibrinogen, D-dimer, antithrombin) have poor
  specificity for early DIC in sepsis.
systematic_gaps:
  - "Reaction-diffusion models of coagulation (including spatial thrombin transport and inhibitor gradients) have been developed but not validated against clinical data."
  - "The critical TF expression level or spatial extent needed to trigger systemic vs. localized coagulation has not been determined in vivo."
  - "Early DIC prediction scores (ISTH, JAAM) have AUC ~0.75 in sepsis; machine learning models using time-series biomarkers have not been systematically evaluated."
related_bridges:
  - b-blood-coagulation-cascade-boolean
last_reviewed: "2026-05-07"
references:

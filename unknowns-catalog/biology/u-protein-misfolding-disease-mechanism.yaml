id: u-protein-misfolding-disease-mechanism
title: What is the detailed molecular mechanism by which protein misfolding drives neurodegenerative disease, and can energy landscape theory predict which sequences are misfolding-prone?
status: open
priority: high
disciplines:
  - biology
  - biophysics
  - neuroscience
  - statistical-mechanics
summary: >
  Protein misfolding is implicated in Alzheimer's (amyloid-beta, tau), Parkinson's
  (alpha-synuclein), ALS (SOD1, TDP-43), and prion diseases. The energy landscape
  theory of folding (Bryngelson-Wolynes) predicts that misfolding occurs when the
  native funnel is insufficiently deep relative to competing non-native minima. However,
  the precise energy landscape features that predispose specific sequences to
  misfolding under cellular conditions (crowding, pH, metal ions) are unknown.
  AlphaFold2 predicts native structure but does not predict misfolding propensity or
  aggregation kinetics. The connection between misfolding, oligomerization, fibril
  formation, and neuronal toxicity remains mechanistically incomplete.
systematic_gaps:
  - No quantitative mapping between energy landscape frustration metrics and disease-associated misfolding rates in vivo.
  - AlphaFold2 structure prediction does not include misfolded state ensembles or aggregation-prone regions.
  - The toxic species (monomer, oligomer, or fibril) responsible for neurodegeneration in each disease is disputed.
last_reviewed: "2026-05-06"

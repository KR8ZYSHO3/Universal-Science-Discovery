id: u-stochastic-gene-expression-bet-hedging-quantitative
title: >
  What are the quantitative design principles linking promoter noise parameters
  (burst size b, burst frequency k_on) to optimal bet-hedging fitness in
  fluctuating environments — and do measured Fano factors in bacterial genomes
  match the Kelly-criterion prediction for their ecological volatility?
status: open
priority: high
disciplines:
  - biology
  - mathematical-biology
  - biophysics
  - evolutionary-biology
summary: >
  The two-state promoter model predicts that the Fano factor F = 1 + b (where
  b = k_on/k_off is the mean burst size) controls phenotypic variability. Bet-hedging
  theory (Kelly criterion analogy) predicts that optimal F depends on the variance
  of the environment: high environmental variance → high optimal F. The specific
  quantitative mapping between ecological volatility (temporal autocorrelation of
  nutrient availability, antibiotic exposure) and the optimal promoter noise level
  has not been systematically measured or tested. Furthermore, whether genome-wide
  Fano factor distributions in wild-type bacteria match the ecological volatility
  of their natural habitat is unknown — this would require combining promoter noise
  measurements with ecological time-series data for the same organisms.
systematic_gaps:
  - No systematic measurement of F values across all promoters in any organism
    combined with ecological volatility data for the same species' natural habitat.
  - The Kelly-criterion optimality condition for bet-hedging (maximise geometric
    mean fitness) has been stated qualitatively but not translated into a quantitative
    prediction for F given environmental power spectrum.
  - The timescale matching condition (promoter switching rate k_on + k_off must
    match the environmental fluctuation frequency) has not been experimentally tested.
related_bridges:

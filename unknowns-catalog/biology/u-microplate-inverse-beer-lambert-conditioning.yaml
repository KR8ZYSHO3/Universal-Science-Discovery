id: u-microplate-inverse-beer-lambert-conditioning
title: >
  How ill-conditioned is practical inverse concentration retrieval from multi-well absorbance when spectra overlap, scattering rises, and plate-edge artifacts distort calibration curves — and what regularized inversion beats ordinary linear regression in routine assays?
status: open
priority: medium
disciplines:
  - analytical-biochemistry
  - statistics
summary: >
  Beer–Lambert assumes additive absorption with stable extinction coefficients; real assays violate linearity at high OD and exhibit drift across plates. Inverse-problem conditioning parallels ridge/elastic-net covariance estimation but laboratory uptake is uneven without turnkey QC pipelines.
systematic_gaps:
  - Open benchmark plates with ground-truth concentrations and multiplex dyes across vendors for inversion-method comparisons.
  - Uncertainty propagation standards tying posterior concentration widths to pipetting and reader repeatability.
suggested_hypotheses:
  - h-multi-wavelength-beer-lambert-inverse-improves-plate-precision
related_bridges:

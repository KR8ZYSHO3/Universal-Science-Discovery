id: u-quorum-signaling-as-multiplayer-game
title: Under what spatial structures do quorum-sensing strategies form evolutionarily stable
  polymorphisms between producers, responders, and cheaters?
status: open
priority: medium
disciplines:
- biology
- economics
- microbiology
summary: Well-mixed models predict collapse of cooperation; biofilms and physical clustering
  change predictions. Quantitative mapping from diffusion parameters to game payoffs is incomplete.
systematic_gaps:
- In vivo measurement of effective signal fields at single-cell resolution is hard.
- Clinical isolates show diverse QS systems; payoff inference needs high-throughput assays.
suggested_hypotheses:
- h-quorum-thresholds-are-ess-under-stochastic-demography
related_bridges:
- b-quorum-sensing-x-game-theory
last_reviewed: '2026-05-07'
references:

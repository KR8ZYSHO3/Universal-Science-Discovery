id: u-fitness-landscape-overlapping-genes
title: How does overlapping gene structure constrain the ruggedness of the fitness landscape and the accessibility of evolutionary paths in dense genomes?
status: open
priority: medium
disciplines:
  - evolutionary-biology
  - genomics
  - information-theory
  - mathematical-biology
summary: >
  A 2026 preprint (arXiv 2604.00602) analyzes the fitness landscape of overlapping
  genes - genomic regions where two or more genes share nucleotide sequence in different
  reading frames. Overlapping genes impose tight epistatic constraints: a single
  mutation simultaneously affects two proteins, making the fitness landscape extremely
  rugged in these regions. The open questions are: (1) Does overlapping gene structure
  create neutral networks (paths of neutral mutations) that are topologically distinct
  from non-overlapping genomes? (2) Is the degree of overlap correlated with evolutionary
  rate, and does this follow a predictable information-theoretic relation (e.g., higher
  overlap = lower Shannon entropy of allowed mutations = slower evolution)? (3) Do
  viruses (which have extreme genome compression with extensive overlap) explore fitness
  landscapes fundamentally differently from eukaryotes? This connects information
  compression theory to evolutionary dynamics.
systematic_gaps:
  - The ruggedness (correlation length) of the fitness landscape as a function of gene overlap fraction has not been systematically measured across diverse organisms.
  - Whether overlapping genes create topological barriers to adaptive evolution (local optima that non-overlapping homologues can escape) has not been tested.
  - The information-theoretic constraint imposed by gene overlap (mutual information between reading frames) has not been correlated with substitution rates across viral evolution.
suggested_hypotheses:
  - The substitution rate in overlapping gene regions scales inversely with the mutual information between the two reading frames, providing a quantitative information-theoretic explanation for conserved viral proteins.
related_unknowns:
  - u-error-threshold-genome-size

id: u-temporal-biosignature-information
title: Can temporal information retention in molecular systems serve as a universal biosignature to distinguish living from abiotic chemistry, and what is the minimum retention timescale?
status: open
priority: medium
disciplines:
  - astrobiology
  - information-theory
  - biophysics
  - origin-of-life
summary: >
  A 2026 preprint (arXiv 2604.18359) proposes "temporal retention of information"
  as a biosignature - the idea that living systems actively preserve and transmit
  information across time (via DNA, epigenetic marks, metabolic memory), while abiotic
  systems rapidly lose information to thermodynamic equilibration. The proposal is that
  the mutual information between a system's past state and its future state, integrated
  over biological timescales, is systematically higher in living systems than in any
  abiotic chemical system of comparable complexity. This provides a potential universal
  biosignature for astrobiology: detect temporal correlation decay rates in planetary
  chemistry, and identify deviations from abiotic equilibration. However, the minimum
  information retention timescale necessary to be classified as "life" (and distinguish
  it from long-lived abiotic autocatalytic networks) has not been established, nor
  has this framework been validated against any known life-detection dataset.
systematic_gaps:
  - A quantitative threshold for "temporal information retention" that distinguishes known life from known abiotic chemistry has not been established.
  - Whether this biosignature is detectable remotely (e.g., from atmospheric time series on exoplanets) has not been analyzed.
  - The minimum molecular system complexity required to exhibit supra-abiotic temporal information retention is unknown.
suggested_hypotheses:
  - Living systems maintain mutual information between present and past states above I_min = k_B*T per degree of freedom over timescales > 1 cell cycle, while abiotic systems decay below this threshold within one chemical relaxation time.
related_unknowns:
  - u-landauer-limit-biological-computation
references:

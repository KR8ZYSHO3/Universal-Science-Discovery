id: u-epigenetic-escape-loci-mechanisms-transgenerational-scope
title: >
  Which genomic loci consistently escape epigenetic reprogramming at fertilisation
  in mammals, what molecular features protect them from erasure, and how many
  generations can environmentally-induced epigenetic marks persist through the
  germline in humans?
status: open
priority: high
disciplines:
  - epigenetics
  - developmental-biology
  - molecular-biology
  - evolutionary-biology
summary: >
  Epigenetic reprogramming — global erasure of DNA methylation at fertilisation
  and during primordial germ cell development — resets the epigenome between
  generations. However, a subset of genomic loci "escape" reprogramming and
  maintain their methylation state through fertilisation. These escapees are
  the molecular mechanism by which environmental exposures could be
  transgenerationally inherited.

  Known escapee categories include: imprinted loci (ICRs — imprinting control
  regions, ~100 in humans), certain transposable elements (IAP retrotransposons
  in mice resist methylation erasure), and a small number of non-imprinted
  CpGs. Yehuda's FKBP5 CpG and Dias' M71 locus in olfactory receptors may be
  additional non-imprinted escapees.

  The key unknowns are: (1) what molecular features (cis-regulatory sequences,
  histone marks, DNMT3L binding) protect a locus from reprogramming; (2) how
  stable are acquired methylation marks at escapee loci across multiple
  generations; (3) whether the human FKBP5 methylation difference in Holocaust
  survivor offspring is at a genuine escapee locus or is a secondary consequence
  of altered HPA axis function in the child.
systematic_gaps:
  - Genome-wide single-cell methylation profiling of human sperm and oocytes
    has not identified all escapee loci; current data is from bulk sequencing.
  - The mechanistic basis for IAP vs. non-IAP retrotransposon differential
    erasure resistance is not understood at the DNMT/TET enzyme level.
  - Human transgenerational epigenetic inheritance beyond F2 (grandchildren)
    has not been demonstrated with methylation data; most data is F1 offspring.
  - Cross-fostering studies equivalent to Meaney's rat experiments have not
    been performed in non-human primates to test the relative contribution of
    direct epigenetic vs. behavioural transmission.

id: u-metabolic-flux-control-redistribution-disease
title: "How does metabolic flux control redistribution in human disease (cancer, diabetes, heart failure) differ from healthy tissue, and can MCA-derived flux control coefficients identify new therapeutic targets?"
status: open
priority: high
disciplines:
  - systems-biology
  - metabolomics
  - pharmacology
summary: >
  Metabolic Control Analysis (MCA) defines flux control coefficients (FCCs) for each
  enzyme in a pathway. In healthy tissue, FCCs are typically distributed (summation
  theorem: sum = 1) with no single enzyme dominating. In disease, altered enzyme
  expression (due to oncogene activation, hormonal changes, or genetic variants) may
  redistribute FCCs so that one enzyme becomes rate-limiting. Cancer metabolic
  reprogramming (Warburg effect) dramatically upregulates glycolysis; does this create
  a high-FCC enzyme (e.g. PKM2, LDHA) that can be targeted? In heart failure, fatty
  acid oxidation shifts to glucose oxidation — do FCCs of PDH and CPT1 redistribute?
  In Type 2 diabetes, insulin resistance alters hepatic gluconeogenesis FCCs. These
  questions remain unanswered because genome-scale FCC computation requires a complete
  kinetic model, which is unavailable for human metabolic networks at physiological
  concentrations.
systematic_gaps:
  - No genome-scale human metabolic model has validated kinetic parameters for FCC computation
  - Disease-specific FCC redistribution has only been computed for toy networks (< 20 enzymes)
  - The relationship between FCC redistribution and drug target optimality is not formalised
suggested_hypotheses:
  - In cancer glycolysis, PKM2 has a flux control coefficient > 0.5 (violating the
    summation theorem expectation) due to its allosteric regulation being uniquely sensitive
    to oncometabolite concentrations in the tumour microenvironment
references:
  - doi: "10.1007/BF01093582"
    note: "Kacser & Burns (1973) — metabolic control analysis, summation theorem"
  - doi: "10.1111/j.1432-1033.1974.tb03318.x"
    note: "Heinrich & Rapoport (1974) — independent derivation of MCA"
last_reviewed: "2026-05-06"

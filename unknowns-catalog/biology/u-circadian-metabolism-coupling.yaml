id: u-circadian-metabolism-coupling
title: "Is circadian clock disruption (shift work, jet lag) a direct cause of metabolic disease, or merely correlated via confounding lifestyle factors?"
status: open
priority: high
disciplines:
  - chronobiology
  - metabolism
  - epidemiology
summary: >
  Epidemiological studies show that shift workers have 1.5-2x higher risk of
  type 2 diabetes, obesity, and cardiovascular disease compared to day workers.
  Mechanistically, clock genes (BMAL1, CLOCK) directly regulate PPAR-gamma,
  glucokinase, and insulin signaling. Mouse knockout of BMAL1 or Clock produces
  metabolic syndrome. However, causal attribution in humans is confounded by:
  (1) lifestyle differences (shift workers eat differently, sleep less, exercise less);
  (2) self-selection bias (people with pre-existing health differences choose shift work);
  (3) mixed shift schedules that partially attenuate circadian disruption.
  Controlled feeding studies (Leproult et al. 2014) show that 5 days of circadian
  misalignment increases insulin resistance, suggesting a direct effect. But whether
  chronic, long-term circadian disruption (20+ years of shift work) causes irreversible
  metabolic damage or is fully reversible upon schedule normalization is not known.
  This distinction is critical for workplace policy and for designing chronotherapy
  interventions.
systematic_gaps:
  - Whether circadian disruption causes metabolic disease independent of sleep restriction has not been established in humans with full confounder control
  - The reversibility of circadian disruption-induced metabolic damage after schedule normalization is not characterized
  - Which clock gene targets mediate metabolic disruption (vs. other BMAL1 targets) has not been established
suggested_hypotheses:
  - Circadian misalignment independently increases insulin resistance by >30% above sleep-restriction-only controls, demonstrable in a 4-arm RCT (circadian aligned vs. misaligned x sleep sufficient vs. restricted) over 2 weeks
related_unknowns:
  - u-circadian-kuramoto-jet-lag-dynamics
references:
  - doi: "10.1126/science.1259832"
    note: "Leproult et al. (2014) Science - circadian misalignment and insulin resistance"
last_reviewed: "2026-05-05"

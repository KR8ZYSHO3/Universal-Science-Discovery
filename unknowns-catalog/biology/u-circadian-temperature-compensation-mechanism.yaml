id: u-circadian-temperature-compensation-mechanism
title: >
  What molecular mechanism allows the circadian clock period to remain approximately
  constant (~24 hours) across a 10-20 degree Celsius temperature range (Q10 approximately
  1), when all biochemical reaction rates typically double with each 10-degree increase?
status: open
priority: critical
disciplines:
  - biology
  - physics
  - chronobiology
  - biophysics
summary: >
  Temperature compensation is a defining property of circadian clocks (Pittendrigh 1954):
  period length changes by only 0-10% over a 10°C range, giving Q10 ≈ 1 vs the
  typical biochemical Q10 of 2-3. Proposed mechanisms include: (1) cancellation of
  temperature effects on competing reactions (Ruoff model); (2) temperature-insensitive
  protein-protein interactions at the clock core; (3) temperature-dependent post-
  translational modifications that compensate rate changes. None of these is proven
  to be both necessary and sufficient. The molecular identity of the temperature
  compensation mechanism in any circadian system is unknown.
systematic_gaps:
  - No quantitative mechanistic model correctly predicts Q10~1 from measured reaction rate temperature sensitivities.
  - Whether temperature compensation requires evolved rate matching or an intrinsic thermodynamic property of the oscillator is unresolved.
  - Temperature compensation differs between cyanobacteria (KaiABC), Drosophila (PER/TIM), and mammals (CLOCK/BMAL1) without clear mechanistic theme.
last_reviewed: "2026-05-06"

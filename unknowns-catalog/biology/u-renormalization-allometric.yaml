id: u-renormalization-allometric
title: >
  Are biological allometric scaling exponents RG fixed points, and what do
  the correction-to-scaling terms predict about small-organism deviations
  from Kleiber's Law?
status: open
priority: high
last_reviewed: "2026-05-04"
disciplines:
  - mathematical-physics
  - theoretical-biology
  - comparative-physiology
  - statistical-physics
summary: >
  Kleiber's Law (metabolic rate ∝ M^(3/4)) and the broader family of quarter-power
  scaling laws (heart rate ∝ M^(-1/4), lifespan ∝ M^(1/4)) hold across ~20 orders
  of magnitude in body mass — from bacteria to blue whales. The WBE theory (West,
  Brown, Enquist 1997) derives the 3/4 exponent from area-preserving branching in
  vascular trees, but does not cast the derivation as a renormalization group (RG)
  calculation.

  **The gap**: in statistical physics, universal power laws with exponents shared
  across microscopically different systems are the hallmark of RG fixed points.
  The RG framework immediately predicts *more* than just the leading exponent —
  it predicts the correction-to-scaling terms that describe how the power law
  breaks down at finite body mass. These corrections are measurable: metabolic
  rates below ~1 gram body mass are known to deviate from M^(3/4). Nobody has
  derived these deviations from an RG calculation or tested whether they match the
  Wilson-Fisher correction-to-scaling form.

  If confirmed, the RG classification would also resolve the 50-year debate about
  which aspects of vascular morphology are under natural selection: "relevant"
  perturbations (in RG language) would change the scaling exponent and face strong
  selection; "irrelevant" perturbations would be invisible to selection and can
  vary freely across taxa.
systematic_gaps:
  - The WBE vascular branching recursion has not been cast as an explicit RG transformation with a fixed-point equation
  - Correction-to-scaling exponents from the RG calculation have not been derived and compared to the observed sub-1g deviations in Savage et al. (2004)
  - It is unknown whether non-vascular organisms (fungi, tunicates, siphonophores) fall in the same RG universality class or a distinct one
  - The relationship between the pulsatile-wave mechanism (u-kleiber-pulsatile-waves) and the area-preserving branching constraint (RG fixed-point condition) has not been formalised
related_unknowns:
  - u-kleiber-pulsatile-waves

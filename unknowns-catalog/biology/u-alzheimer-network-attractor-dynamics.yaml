id: u-alzheimer-network-attractor-dynamics
title: Does Alzheimer's disease progression trace a deterministic trajectory through a low-dimensional attractor landscape in functional brain network space, and can this predict individual prognosis?
status: open
priority: high
disciplines:
  - neuroscience
  - network-science
  - complex-systems
  - clinical-medicine
summary: >
  A 2026 preprint (arXiv 2604.18470) develops high-fidelity spatio-temporal network
  models of Alzheimer's disease progression validated against PET-SUVR imaging data
  from multiple cohorts. The models capture amyloid-beta and tau propagation through
  brain connectivity networks, and reproduce population-level staging data. However,
  whether individual patients' disease trajectories can be described as paths through
  a low-dimensional attractor landscape (as in Waddington's epigenetic landscape) -
  with stable attractors corresponding to disease stages and bifurcation points
  corresponding to rapid progression - is unknown. A related question (arXiv 2510.12751)
  is whether amyloid accumulation induces a phase transition in resting-state network
  topology with measurable scaling signatures. If true, personalized medicine for AD
  would require mapping each patient's position on the attractor landscape, not just
  measuring biomarker levels.
systematic_gaps:
  - Whether individual AD trajectories follow deterministic attractor dynamics or are stochastic diffusion in high-dimensional space has not been tested with longitudinal imaging data.
  - The number of dimensions required to describe AD progression dynamics (d_effective) has not been estimated from PET time series data.
  - Whether bifurcation points in the network model correspond to clinically recognizable transition events (MCI to AD, rapid to slow progressors) has not been validated.
suggested_hypotheses:
  - Alzheimer's disease trajectories collapse onto a 2-3 dimensional attractor manifold in functional connectivity space, with stable attractors corresponding to MCI, mild, moderate, and severe AD stages.

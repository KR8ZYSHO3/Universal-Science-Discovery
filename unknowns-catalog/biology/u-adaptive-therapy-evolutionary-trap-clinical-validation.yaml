id: u-adaptive-therapy-evolutionary-trap-clinical-validation
title: Does adaptive therapy based on Pontryagin optimal control and evolutionary game theory outperform maximum tolerated dose chemotherapy in randomized clinical trials for solid tumors?
status: open
priority: high
disciplines:
  - oncology
  - evolutionary-biology
  - mathematical-biology
summary: >
  Adaptive therapy, derived from evolutionary game theory and optimal control theory, proposes
  maintaining drug-sensitive tumor clones as competitors to suppress drug-resistant clones,
  rather than maximizing tumor kill at each treatment. Mathematical models and early clinical
  trials in prostate cancer (NCT03511196, Gatenby group) show 2-3× improvement in
  time-to-progression versus standard-of-care. However, the optimal control framework that
  motivated the approach has not been validated in a prospective randomized clinical trial
  for solid tumors other than prostate cancer. The key unknowns are: (1) whether tumor
  evolutionary dynamics in patients follow replicator dynamics as assumed; (2) whether
  real-time tumor monitoring (liquid biopsy, PSA) provides sufficient state information
  for closed-loop control; (3) how adaptive therapy interacts with immunotherapy — where
  killing resistant cells might be immunologically beneficial.
systematic_gaps:
  - No randomized phase III trial of adaptive therapy vs. MTD exists for any solid tumor type.
  - Real-time measurement of tumor subclone frequencies by liquid biopsy is not yet
    accurate enough for closed-loop optimal control in most solid tumors.
  - The evolutionary game payoff matrix between drug-sensitive and drug-resistant clones
    has not been measured experimentally in vivo for any human tumor type.
related_bridges:

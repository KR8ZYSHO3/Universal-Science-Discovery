id: u-braess-paradox-biological-foraging
title: Does Braess's paradox appear systematically in biological foraging and transport networks, and what evolutionary mechanism prevents networks from getting trapped in the paradox regime?
status: open
priority: medium
disciplines:
  - evolutionary-biology
  - network-science
  - complex-systems
  - behavioral-ecology
summary: >
  Braess's paradox states that adding a new route (link) to a transportation network
  can increase average travel time for all users - a counterintuitive result of
  selfish routing in congested networks. A 2026 preprint (arXiv 2603.26226) demonstrates
  experimentally that Braess's paradox occurs in tandem-running ants: providing a
  shorter direct path causes all ants to take longer to reach the food source compared
  to when only the longer path is available. This raises profound questions: (1) Is
  Braess's paradox a ubiquitous feature of biological foraging networks, not just a
  mathematical curiosity? (2) Do biological networks have evolved mechanisms to detect
  and avoid paradox-inducing connections? (3) Is there an evolutionary optimality
  principle (social optimum vs. Nash equilibrium) that explains when biological
  networks avoid Braess traps? Understanding this connects evolutionary game theory
  to network topology optimization in biology.
systematic_gaps:
  - The prevalence of Braess-paradox-inducing connections across biological network types (vascular, mycelial, neural, ant trails) has not been surveyed.
  - Whether individual foragers have learned heuristics that avoid Nash-equilibrium traps (equivalent to Braess-paradox avoidance) is unknown.
  - The evolutionary game theory analysis predicting when Braess's paradox is eliminated by natural selection (social vs. individual optimality) has not been formalized.
suggested_hypotheses:
  - Biological foraging networks avoid Braess paradox via pheromone-based self-organization that implements a distributed Wardrop social optimum, rather than Nash equilibrium routing.
related_unknowns:
  - u-habitat-fragmentation-threshold

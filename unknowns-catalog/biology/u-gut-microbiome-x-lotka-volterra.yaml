id: u-gut-microbiome-x-lotka-volterra
title: Are the interaction parameters of the gut microbiome generalized Lotka-Volterra model sufficiently stable across individuals and perturbations to enable personalized microbiome therapy prediction, and what ecological principles determine the basin of attraction for healthy microbiome states?
status: open
priority: high
disciplines:
  - biology
  - mathematics
  - ecology
  - medicine
summary: >
  Generalized Lotka-Volterra (gLV) models fitted to individual microbiome time series
  can predict short-term dynamics, but interaction matrices vary substantially between
  individuals and across perturbations (antibiotics, diet change). The ecological
  stability criteria (diagonal dominance, May's stability-complexity trade-off) predict
  the existence of stable equilibria, but the size of basins of attraction and the
  mechanisms of dysbiosis transition are not quantitatively characterized for any
  individual's microbiome. Whether gLV is identifiable from the sparse, high-dimensional
  microbiome time series available from human subjects remains an open statistical problem.
systematic_gaps:
  - gLV interaction matrices estimated from different time periods of the same individual differ by ~50%; model is not identifiable from typical clinical data
  - No experimental validation of predicted bifurcation points in human microbiome dysbiosis
  - The relationship between microbial metabolic networks (which determine true interactions) and phenomenological gLV parameters is unknown

id: u-protein-aggregation-x-nucleation-growth
title: Does secondary nucleation (fibril-surface catalysed) or primary nucleation dominate the early seeding events in Alzheimer's
  disease in vivo, and can the Knowles-Michaels rate equations predict in vivo amyloid-β aggregation kinetics from in vitro
  parameters?
status: open
priority: high
disciplines:
- biology
- chemistry
- medicine
summary: 'The Knowles-Michaels kinetic equations describe in vitro amyloid aggregation quantitatively, but extension to in
  vivo conditions faces multiple challenges: intracellular crowding effects, lipid membrane interactions, protein quality
  control machinery, and the heterogeneous nucleation environment of the brain. Whether secondary nucleation (which is autocatalytic
  and self-amplifying) dominates disease onset in vivo — as it does in vitro — is critical for therapeutic strategy (inhibit
  secondary nucleation vs. promote clearance of existing aggregates).'
systematic_gaps:
- In vivo primary vs. secondary nucleation rate constants for Aβ42 have not been measured
- Whether lipid membrane surfaces act as heterogeneous nucleation templates in neuronal synapses is unresolved
- The Knowles-Michaels equations have not been validated against in vivo plaque spreading kinetics from PET imaging data

id: u-gene-regulatory-network-x-boolean-circuit
title: Are endogenous developmental gene regulatory networks in vertebrates operating at or near the Boolean criticality threshold
  K = 2, and if so, does this determine the evolvability of body plan morphology?
status: open
priority: medium
disciplines:
- biology
- computer_science
- mathematics
summary: Kauffman's NK model predicts maximum evolvability at criticality (K = 2), where networks are neither too rigid (K
  < 2, ordered) nor too chaotic (K > 2). Whether real GRNs operate at this critical point, and whether K can be measured from
  transcriptomic data, is an open question. Single-cell RNA-seq now provides empirical access to GRN dynamics, but the Boolean
  formalism requires threshold binarisation and the effective K of real GRNs has not been rigorously estimated.
systematic_gaps:
- The effective Boolean connectivity K has not been estimated for any vertebrate GRN from single-cell transcriptomic data
- Boolean binarisation of continuous gene expression introduces artefacts whose effect on criticality estimates is unknown
- Whether GRN criticality is a product of evolution (selection for evolvability) or a neutral structural constraint is debated

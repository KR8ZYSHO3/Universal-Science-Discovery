id: u-self-organized-criticality-consciousness
title: Is self-organized criticality (SOC) through brain-body resonance a necessary and sufficient mechanism for conscious integration, or merely correlative?
status: open
priority: low
disciplines:
  - neuroscience
  - statistical-physics
  - consciousness-science
  - biophysics
summary: >
  A 2026 preprint (arXiv 2605.00024) proposes that self-organized criticality enables
  conscious integration through brain-body resonance: the brain self-organizes to the
  critical point of its network dynamics via feedback from bodily physiological signals
  (heartbeat, breathing, gut oscillations), and this critical state maximizes information
  integration in the sense of Tononi's integrated information theory (IIT). The proposal
  is speculative but connects three well-studied phenomena - neuronal avalanches,
  physiological coupling, and consciousness - through a single mechanism. The open
  question is whether SOC is necessary for consciousness (as in, removing SOC by
  pharmacologically altering neural avalanche statistics should impair consciousness
  in a measurable and reversible way), or whether SOC is merely a correlate of the
  brain states associated with wakefulness. Causal tests of this hypothesis have not
  been performed.
systematic_gaps:
  - Whether artificially perturbing neural SOC (e.g., via transcranial magnetic stimulation) produces measurable changes in conscious integration measures (IIT Phi, perturbational complexity index) has not been tested.
  - The mechanism by which peripheral physiological rhythms maintain central neural criticality has not been established causally.
  - Whether SOC during dreaming (when bodily coupling is reduced) differs measurably from waking SOC is unknown.
suggested_hypotheses:
  - Anesthesia abolishes neural avalanche power laws (departing from criticality) before electroencephalographic signatures of unconsciousness appear, with a measurable lag predictable from the coupling model.

id: u-boolean-network-cancer-attractors
title: Can Boolean network attractor analysis identify reliable therapeutic targets by mapping oncogenic mutations to epigenetic attractor transitions?
status: open
priority: critical
disciplines:
  - systems-biology
  - cancer-biology
  - network-medicine
summary: >
  Cancer can be modeled as an aberrant attractor of the gene regulatory network —
  oncogenic mutations shift the network from the normal cell type attractor basin to
  a cancer attractor. Boolean network models (Kauffman NK model) predict that cancer
  attractors should differ from normal attractors by a small number of key regulatory
  nodes whose state flipping could restore normal cell identity. This 'therapeutic
  perturbation' approach requires (1) identifying the cancer attractor's basin structure,
  (2) finding minimal perturbations (drug targets) that shift the system to normal,
  (3) validating that the Boolean model predictions hold in actual cell biology. CRISPR
  screens can now test many perturbations simultaneously, making this computationally
  tractable for the first time.
systematic_gaps:
  - Boolean network models use deterministic update rules; the role of stochastic
    gene expression noise in attractor transitions is not captured.
  - The attractor landscape inferred from bulk RNA-seq may not reflect single-cell
    heterogeneity within tumors where multiple attractors coexist.
related_bridges:
  - b-genetic-regulatory-boolean-circuits
last_reviewed: "2026-05-06"

id: u-morphogenesis-x-mechanical-instability
title: Are mechanical instabilities sufficient to explain species-specific brain gyrification patterns, or do molecular pre-patterning
  signals (Wnt, PDGF) constrain fold positions independently of mechanical forces?
status: open
priority: high
disciplines:
- biology
- physics
- neuroscience
summary: Buckling theory quantitatively predicts fold spacing and depth from stiffness ratios and growth rates, suggesting
  mechanics alone is sufficient. However, the positions of primary sulci are evolutionarily conserved across individuals and
  species, suggesting molecular pre-patterning constrains where folds form. The open question is whether molecular signals
  merely bias the mechanical instability (selecting among degenerate buckling modes) or independently specify fold positions
  prior to mechanical deformation.
systematic_gaps:
- Fold position conservation across individuals is inconsistent with a purely mechanical (degenerate instability) model
- Molecular pre-patterning signals (Wnt, PDGF) have established topographic patterns in cortex but causal proof is lacking
- No experiment has ablated both mechanical and molecular inputs independently to test their relative contributions

id: u-boolean-attractor-cell-fate-mapping
title: "Can the complete attractor landscape of a Boolean gene regulatory network model be mapped onto the full repertoire of cell types in a multicellular organism, and does attractor number predict cell type count?"
status: open
priority: high
disciplines:
  - systems-biology
  - computational-biology
  - developmental-biology
summary: >
  Kauffman's (1969) Boolean network model of gene regulation predicts that cell types
  correspond to attractors of the network dynamics. In a critical random Boolean network
  (K=2), the number of attractors scales approximately as √N where N is the number of
  genes. The human genome has ~20,000 protein-coding genes, predicting ~141 attractors —
  close to the ~200-400 estimated human cell types. However: (1) the mapping between
  specific attractors and specific cell types has not been established, (2) Boolean
  networks are enormous simplifications (continuous dynamics, protein concentrations
  matter), (3) ENCODE revealed most of the genome has regulatory function, increasing
  effective N, and (4) epigenetic layers not captured in Boolean models may add attractor
  dimensions. A quantitative test of Kauffman's prediction requires single-cell RNA-seq
  data integrated with regulatory network inference at genome scale.
systematic_gaps:
  - No genome-scale Boolean attractor computation has been validated against scRNA-seq cell types
  - Critical K=2 assumption needs empirical validation from regulatory network data
  - The role of epigenetic state (methylation, chromatin) in attractor definition is unresolved
suggested_hypotheses:
  - Boolean network attractors for K=2 critical networks match cell type diversity across organisms
references:
  - doi: "10.1006/jtbi.1993.1196"
    note: "Kauffman (1969) J Theor Biol — original Boolean network hypothesis"
  - doi: "10.1038/489057a"
    note: "ENCODE (2012) Nature — 85% of human genome functional"
last_reviewed: "2026-05-06"

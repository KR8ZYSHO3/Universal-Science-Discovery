id: u-chromatin-loop-extrusion-speed-processivity-in-vivo
title: >
  What is the in vivo speed, processivity, and stall force of cohesin-mediated
  chromatin loop extrusion in mammalian cells, and how do CTCF, WAPL, and
  transcription machinery pause or terminate extrusion to establish TAD boundaries?
status: open
priority: critical
disciplines:
  - biology
  - biophysics
  - molecular-biology
  - polymer-physics
summary: >
  The loop extrusion model (Fudenberg et al. 2016, Alipour-Marko 2012) proposes
  that cohesin processively extrudes DNA loops until blocked by CTCF bound in
  convergent orientation. Single-molecule in vitro experiments (Kim et al. 2019,
  Davidson et al. 2019) showed cohesin extrudes loops at ~0.5-1 kb/s and can
  reach >150 kb before stalling. However, in vivo parameters are largely unknown:
  (1) Hi-C contact maps integrate over millions of cells — the average loop structure
  reflects the equilibrium of cohesin loading, extrusion, and WAPL-mediated unloading,
  not the instantaneous loop configuration in any single cell. (2) Stall forces at
  CTCF boundaries in vivo are not directly measurable; in vitro CTCF stalls cohesin
  but does not always form a stable boundary. (3) Transcription elongation by RNAPII
  may push cohesin (transcription-driven loop formation — a competing model to
  passive extrusion). (4) The cohesin loading factor NIPBL affects extrusion rate;
  NIPBL haploinsufficiency (Cornelia de Lange syndrome) disrupts TAD insulation —
  but the quantitative relationship between NIPBL concentration and TAD strength is
  not established. (5) Single-cell Hi-C shows TAD boundaries are stochastic in
  individual cells (Flyamer et al. 2017) — the population-average Hi-C TAD reflects
  ensemble statistics, not deterministic boundaries.
systematic_gaps:
  - Live-cell single-molecule imaging of cohesin loop extrusion in mammalian
    nuclei (requires bright, photostable fluorescent tags on cohesin + fast
    enough tracking to resolve ~1 kb/s movement).
  - Optical tweezers measurement of cohesin stall force at CTCF in chromatin
    context (nucleosome-containing template).
  - Single-cell Hi-C at higher resolution to measure cell-to-cell variability
    in loop positions and sizes.
  - Quantitative relationship between NIPBL/cohesin dosage and TAD insulation
    strength (allele series experiments).
suggested_hypotheses:
  - >
    In vivo cohesin extrusion speed is 2-5× slower than in vitro (~0.1-0.3 kb/s)
    due to nucleosome barrier resistance, and the in vivo processivity is limited
    to ~50 kb (much less than the 150+ kb measured on naked DNA) — explaining
    why observed TADs cluster at 100-200 kb despite models predicting larger
    loops from unconstrained extrusion.

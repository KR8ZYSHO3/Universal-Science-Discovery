id: u-flagellar-motor-x-rotary-engine
title: >
  How does the bacterial flagellar motor achieve near-100% energy conversion efficiency
  at stall, and what is the mechanochemical coupling mechanism at atomic resolution?
status: open
priority: medium
disciplines:
  - biology
  - physics
  - biophysics
  - biochemistry
summary: >
  The bacterial flagellar motor (BFM) converts proton-motive force to mechanical torque
  with approximately 100% efficiency near stall — exceeding all man-made rotary engines.
  The mechanism by which the 26-nm diameter motor generates ~1270 pN·nm torque from
  proton flow remains incompletely understood at atomic resolution. Cryo-EM structures
  of the BFM stator complex (MotAB) reveal the proton channel and torque-generating
  elements, but the conformational changes coupling proton translocation to ring rotation,
  the number of protons per revolution, and how efficiency approaches the thermodynamic
  limit (kT per step) are not fully established.
systematic_gaps:
  - Atomic-resolution cryo-EM of the complete BFM in multiple states (resting, torque-generating, switching) has not been achieved for the full 50+ protein complex
  - The number of protons required per complete flagellar revolution (currently estimated 1200 H+/revolution) has not been measured directly with single-proton counting accuracy
  - The mechanochemical coupling mechanism (how proton transit drives conformational changes in MotA/MotB) has not been captured in a molecular dynamics simulation that reproduces experimental torque-speed curves

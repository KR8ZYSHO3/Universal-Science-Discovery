id: u-bacterial-chemotaxis-x-gradient-descent
title: >
  How does E. coli chemotaxis achieve near-optimal gradient detection at the Cramer-Rao
  bound, and can the methylation memory system be replicated in artificial optimizers?
status: open
priority: medium
disciplines:
  - biology
  - computer_science
  - biophysics
  - optimization
summary: >
  E. coli chemotaxis is known to achieve near-optimal signal detection under noise
  (close to the physical Cramer-Rao information bound), but the biochemical mechanism
  by which the methylation adaptation system computes temporal gradients with minimal
  noise is not fully understood at the molecular level. The exact information-processing
  architecture — how many methylation sites, with what kinetics — was optimized by
  evolution to balance sensitivity, adaptation speed, and noise filtering. Translating
  this to artificial optimizers: can momentum-based gradient descent be improved by
  implementing the exact biochemical adaptation circuit (two-component memory with
  adaptive integral feedback) rather than exponential moving averages?
systematic_gaps:
  - Whether the specific methylation kinetics of E. coli chemoreceptors represent an evolutionary optimum for temporal gradient computation under noise has not been quantitatively verified
  - The information-theoretic capacity of the chemotaxis signaling network (bits per gradient step) has not been measured experimentally and compared to the Cramer-Rao bound
  - Translation of the receptor methylation circuit to a continuous-time optimization algorithm with formal convergence guarantees for non-convex objectives has not been demonstrated

id: u-calcium-signaling-x-stochastic-resonance
title: Does intracellular calcium stochastic resonance operate at the optimal noise level in living cells, and if so, what homeostatic mechanism tunes IP3 receptor cluster density to the SR optimal point for the cell's specific signaling context?
status: open
priority: medium
disciplines:
  - biology
  - physics
  - biophysics
summary: >
  Stochastic resonance in calcium signaling predicts an optimal noise level (IP3R cluster
  density) that maximizes information transmission via calcium waves. Whether cells
  actually operate at this optimal point, and what molecular mechanism tunes IP3R
  expression to the optimal cluster density, is unknown. IP3R expression is regulated
  by transcription factors and second messengers, but whether this regulation optimizes
  SR performance is untested. The prediction that cells with perturbed IP3R expression
  should show reduced calcium wave reliability and downstream signaling fidelity has
  not been quantified in primary cells.
systematic_gaps:
  - No measurement of IP3R cluster density as a function of signaling demand has been performed in primary (non-immortalized) cells
  - The mutual information between IP3 input and calcium wave output has not been measured as a function of IP3R expression level
  - Whether SR is a design principle or an epiphenomenon of calcium dynamics cannot be distinguished without genetic control of IP3R cluster density

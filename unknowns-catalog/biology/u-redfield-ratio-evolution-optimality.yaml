id: u-redfield-ratio-evolution-optimality
title: "Is the Redfield ratio C:N:P=106:16:1 an evolutionary optimum, a dynamical attractor, or a geochemical accident — and can we distinguish these mechanisms experimentally?"
status: open
priority: medium
disciplines:
  - oceanography
  - evolutionary-biology
  - ecology
  - biochemistry
summary: >
  The Redfield ratio describes both the composition of marine phytoplankton and
  the deep-ocean dissolved nutrient pool, suggesting a strong coupling between
  biological demand and ocean chemistry. Three competing mechanisms could explain
  the stability of this ratio: (1) evolutionary optimality — 106:16:1 maximizes
  fitness (growth rate, yield) given ribosome RNA stoichiometry constraints
  (Growth Rate Hypothesis); (2) dynamical attractor — any initial ratio is
  drawn toward 106:16:1 by ecological competition among species with different
  stoichiometries; (3) geochemical accident — the ratio reflects the weathering
  and burial fluxes of C, N, P from rocks, which phytoplankton happen to match
  because they evolved under those constraints. These mechanisms have different
  predictions for how the Redfield ratio should respond to perturbations
  (nutrient loading, climate change, evolutionary experiment). Distinguishing them
  requires long-term evolutionary experiments or comparative planetology.
systematic_gaps:
  - No long-term evolution experiment has tested whether phytoplankton evolve toward the Redfield ratio from perturbed stoichiometries
  - The degree to which ocean N:P ratios are set by geological vs biological fluxes is unresolved
  - Whether organisms with non-standard Redfield ratios (diatoms, N2-fixers) are evolutionarily stable or transient deviants
suggested_hypotheses:
  - Under competitive evolution in N:P-imbalanced chemostats, phytoplankton communities converge toward the Redfield ratio as an evolutionary attractor within 100-500 generations
related_unknowns:
  - u-stoichiometry-food-web-stability

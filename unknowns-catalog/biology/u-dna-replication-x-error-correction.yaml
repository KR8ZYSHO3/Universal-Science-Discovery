id: u-dna-replication-x-error-correction
title: >
  Is there an information-theoretic optimal mutation rate for evolution, and does
  DNA replication fidelity operate near this optimum?
status: open
priority: high
disciplines:
  - biology
  - computer_science
  - information_theory
  - molecular_biology
summary: >
  Error rate in DNA replication (~10^-9 per base) is achieved through three-stage
  error correction, but whether this rate is optimal for evolution is unclear.
  Too low a mutation rate reduces evolvability (insufficient variation); too high
  causes lethal mutagenesis (error catastrophe). An information-theoretic optimum
  exists where the mutation rate maximizes fitness-weighted information capacity of
  the population. Whether natural selection has tuned mutation rates to this optimum
  across different organisms and environments, and whether the three-stage architecture
  is the most information-theoretically efficient way to achieve the observed fidelity,
  is unknown.
systematic_gaps:
  - The information-theoretic optimum mutation rate as a function of genome size, fitness landscape ruggedness, and population size has not been derived in closed form
  - Whether organisms with elevated stress-induced mutation rates (SOS response in bacteria) are implementing an optimal strategy of varying mutation rate with environment has not been tested information-theoretically
  - The Shannon channel capacity of the DNA replication channel (with biological error correction) has not been computed and compared to the theoretical limit
related_bridges:

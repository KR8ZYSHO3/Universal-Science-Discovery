id: u-habitat-fragmentation-threshold
title: >
  Do species extinction thresholds in fragmented landscapes obey 2D percolation
  finite-size scaling with exponent nu=4/3, and can early-warning indicators of
  approaching percolation criticality be detected in satellite habitat data?
status: open
priority: critical
last_reviewed: "2026-05-04"
disciplines:
  - conservation-biology
  - landscape-ecology
  - statistical-physics
  - remote-sensing
summary: >
  Empirical studies consistently find that many forest-interior species collapse
  when connected habitat falls below roughly 60% of landscape area — strikingly
  close to the 2D site percolation threshold p_c ~ 0.593. This has been noted
  qualitatively, but the quantitative prediction from percolation finite-size
  scaling has never been tested against species persistence data.

  The 2D percolation FSS formula predicts that the effective threshold in a
  landscape of finite area A (measured in units of the species dispersal range
  squared) is:

    p_c(A) = p_c(inf) + c * A^(-3/4)   [nu=4/3 for 2D percolation]

  This means smaller landscapes lose connectivity at *higher* habitat coverage
  than large ones — a quantitative, testable prediction that current SLOSS
  frameworks cannot make.

  Additionally, as habitat coverage p approaches p_c from above, the percolation
  framework predicts critical slowing down: the habitat patch cluster size
  distribution approaches a power law, and the correlation length of the
  connectivity network diverges. These are early-warning signals of impending
  connectivity collapse — detectable from satellite land-cover data *before*
  extinction debt becomes irreversible.
systematic_gaps:
  - The FSS exponent nu=4/3 for 2D percolation has not been measured from empirical species-persistence vs habitat-coverage data
  - Percolation cluster-size power-law exponent (tau=187/91) has not been rigorously tested against satellite habitat patch-size distributions
  - Early-warning indicators of approaching percolation criticality (rising correlation length, power-law cluster size distribution) have not been computed from time-series satellite land-cover data
  - The appropriate percolation universality class (2D random vs structured landscape) for real fragmented habitats has not been determined empirically

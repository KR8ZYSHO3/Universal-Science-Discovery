id: u-dna-origami-compiler-analogy-yield-prediction-limits
title: >
  Do software-style dependency and staged-compilation metrics predict DNA origami assembly yield beyond existing thermodynamic and geometric design rules, or is the compiler analogy only pedagogical?
status: open
priority: medium
disciplines:
  - biology
  - computer-science
summary: >
  The analogy is speculative. A useful test would compare graph-derived design metrics against measured yields across a curated set of DNA origami designs while controlling for sequence thermodynamics.
systematic_gaps:
  - Open benchmark linking origami designs, routing graphs, annealing schedules, and measured yields.
  - Separation of graph-constraint effects from staple sequence and ionic-condition effects.
suggested_hypotheses:
  - h-scaffold-routing-constraint-metrics-predict-origami-yield
related_bridges:
  - b-dna-origami-scaffold-routing-x-staged-compilation-analogy
last_reviewed: "2026-05-07"
references:
  - doi: "10.1038/nature04586"
    note: Rothemund (2006) DNA origami by scaffolded folding.

id: u-lateral-gene-transfer-rate-limits
title: "What determines the maximum rate of lateral gene transfer (LGT) before it overwhelms vertical inheritance and destroys phylogenetic signal in prokaryotes?"
status: open
priority: medium
disciplines:
  - evolutionary-biology
  - microbiology
  - phylogenetics
summary: >
  Lateral gene transfer (LGT) — transfer of genes between organisms not through
  parent-offspring relationships — is ubiquitous in prokaryotes. Up to 20% of
  E. coli genes were acquired by LGT. LGT enables rapid acquisition of new functions
  (antibiotic resistance, metabolic pathways) but also complicates phylogenetic
  reconstruction (making the "tree of life" a "web of life"). The error threshold
  analog: if LGT rate exceeds a critical level, phylogenetic information is lost —
  analogous to the quasispecies error catastrophe. Two unknowns: (1) What is the
  critical LGT rate above which no phylogenetic signal survives? Information-theoretic
  bounds exist but have not been compared to empirical LGT rates; (2) Do different
  functional gene categories (housekeeping vs. accessory genes) have fundamentally
  different LGT rates, and does natural selection enforce this by counteracting
  maladaptive LGT (amelioration)?
systematic_gaps:
  - The critical LGT rate for phylogenetic information loss has not been derived from information theory
  - Whether selection acts to maintain low LGT in housekeeping genes (natural selection against LGT) is debated
  - The timescale for integration of LGT genes into core regulatory networks is not quantified
suggested_hypotheses:
  - The maximum tolerable LGT rate per gene per generation is 1/L where L is the gene length in codons, because longer genes experience proportionally more disruptive recombination — testable by comparing LGT rates per codon for genes of different lengths in metagenomes
related_unknowns:
  - u-error-threshold-genome-size
references:
  - doi: "10.1126/science.1095292"
    note: "Ochman et al. (2000) Cell - lateral gene transfer and the nature of bacterial innovation"
last_reviewed: "2026-05-05"

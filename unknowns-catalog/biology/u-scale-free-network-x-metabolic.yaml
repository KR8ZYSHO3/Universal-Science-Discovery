id: u-scale-free-network-x-metabolic
title: >
  Do all metabolic networks across life exhibit the same scale-free exponent gamma,
  and does preferential attachment explain the evolutionary origin of metabolic hubs?
status: open
priority: medium
disciplines:
  - biology
  - mathematics
  - network_science
  - systems_biology
summary: >
  Jeong et al. (2000) showed metabolic networks are scale-free with similar gamma
  across bacteria, yeast, and humans, suggesting universal evolutionary constraints.
  However, subsequent analysis using better-curated metabolic reconstructions (BIGG,
  Recon3D) found deviations from pure power laws. Whether the scale-free property is
  universal, what the precise exponent is across all domains of life, and whether
  preferential attachment (ancient metabolites gaining connections) is the correct
  evolutionary mechanism — vs. other explanations (fitness optimization, modularity
  constraints) — remains unresolved.
systematic_gaps:
  - Modern metabolic network reconstructions (BIGG database, 8000+ organisms) have not been systematically analyzed for scale-free topology vs. alternative distributions (log-normal, exponential cutoff)
  - The preferential attachment hypothesis has not been tested against the fossil record of metabolism (phylogenetically dated first appearances of metabolites)
  - The relationship between metabolic hub degree and evolutionary conservation (phylogenetic breadth) has not been quantified across all domains of life

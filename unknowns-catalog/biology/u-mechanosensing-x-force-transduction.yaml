id: u-mechanosensing-x-force-transduction
title: What is the molecular-scale mechanism by which focal adhesions convert substrate stiffness (Young's modulus) into intracellular
  biochemical signals — and can it be described by a single Hookean spring model?
status: open
priority: high
disciplines:
- biology
- physics
- biophysics
summary: Cells sense substrate rigidity via focal adhesion complexes, but the molecular transduction mechanism — how force
  is converted to biochemical signal — remains unresolved at the single-molecule level. Candidates include cryptic binding
  site exposure (talin unfolding), catch-bond strengthening, or non-linear elastic effects that cannot be captured by a simple
  Hookean spring model.
systematic_gaps:
- Single-molecule measurements of talin unfolding under physiological load ranges are incomplete
- Non-linear viscoelastic effects of the cytoskeleton confound simple Hookean interpretations
- Whether durotaxis requires active probing (myosin-II pulling) or passive stiffness sensing is debated

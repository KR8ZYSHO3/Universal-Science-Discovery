id: u-regulatory-network-attractor-enumeration
title: How many stable attractors (cell states) do mammalian gene regulatory networks support, and can the attractor landscape be systematically mapped from transcriptomic data alone?
status: open
priority: high
disciplines:
  - systems-biology
  - computer-science
  - mathematics
summary: >
  Boolean and continuous models of gene regulatory networks predict that the number
  of attractors scales with network size, but empirical attractor enumeration at
  genome scale is computationally intractable for large networks (NP-hard). Single-cell
  RNA sequencing now enables empirical observation of cell state distributions, but
  mapping these to network attractors requires identifying which transcriptomic clusters
  correspond to dynamically stable states. Key unknowns: (1) how many functionally
  distinct attractors exist in the human hematopoietic regulatory network, (2) can
  machine learning methods trained on scRNA-seq data identify attractor boundaries
  without knowledge of the underlying regulatory network, (3) what is the minimum
  gene regulatory network size needed to specify observed mammalian cell type number?
systematic_gaps:
  - Attractor enumeration in Boolean networks with N > 100 nodes is computationally intractable without approximations
  - Empirical identification of attractors from scRNA-seq data conflates technical noise with biological cell states
  - The relationship between network topology (number of feedback loops) and attractor number is not established for real networks
related_bridges:
  - b-regulatory-networks-boolean-sat
last_reviewed: "2026-05-07"

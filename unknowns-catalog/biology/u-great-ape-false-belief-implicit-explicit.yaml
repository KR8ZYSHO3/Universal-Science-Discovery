id: u-great-ape-false-belief-implicit-explicit
title: >
  Do great apes possess an explicit, flexible theory of mind capable of tracking
  false beliefs, or only an implicit, inflexible agent model, and does the
  dissociation reflect a difference in degree or in kind from human mentalizing?
status: open
priority: high
disciplines:
  - biology
  - comparative-psychology
  - cognitive-science
  - developmental-psychology
summary: >
  Decades of research have produced conflicting conclusions about great ape theory
  of mind. The traditional view (Povinelli et al. 1996) held that apes fail all
  false-belief tasks and use low-level behavioral cues (gaze direction) rather than
  mental state attribution. But Krupenye et al. (2016, Science) showed that great
  apes look anticipatorily at the location where an agent with a false belief
  would search — an implicit violation-of-expectation measure. This dissociation
  between implicit (passed) and explicit (failed) false-belief understanding
  parallels the dissociation in 15-month-old human infants who pass implicit but
  fail explicit tasks. Three hypotheses: (1) apes have implicit ToM but lack the
  language or executive function required for explicit tasks; (2) apes have a
  "behavior reading" system that mimics ToM without representing mental states;
  (3) apes have a phylogenetically primitive mental state concept (goals and
  perceptions) but not the full propositional attitude concept needed for false
  beliefs. The methodological challenge: implicit measures (anticipatory gaze,
  preferential looking) are difficult to interpret as mental state attribution
  without ruling out associative learning explanations.
systematic_gaps:
  - Systematic comparison of implicit ToM tasks across great ape species with matched stimulus difficulty
  - Neural imaging (fMRI) of ape mentalizing network during false-belief paradigms
  - Disambiguation of associative learning vs. mental state attribution using fully counter-conditioned stimuli
  - Whether ape implicit ToM transfers flexibly to novel agents and novel action sequences
suggested_hypotheses:
  - h-tom-implicit-explicit-dissociation

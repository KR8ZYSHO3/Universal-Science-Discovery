id: u-creole-universals-origin
title: "Why do creole languages independently converge on similar grammatical features, and does this reflect innate structure or contact dynamics?"
status: open
priority: high
disciplines:
  - linguistics
  - contact-linguistics
  - cognitive-science
  - sociolinguistics
summary: >
  Creole languages — which arise rapidly from contact situations involving speakers of
  mutually unintelligible languages — exhibit striking cross-creole similarities:
  TMA (tense-modality-aspect) marking with preverbal particles, absence of complex
  nominal inflection, SVO word order, and serial verb constructions. Bickerton's
  bioprogramme hypothesis explains these universals as evidence of an innate language
  acquisition device biased toward specific grammatical structures. Competing accounts
  attribute creole similarities to universal properties of second-language acquisition,
  the typological profile of superstrate languages, or independent functional pressures
  on languages optimized for rapid learning. No account has been comprehensively tested
  against the full cross-creole dataset, and recent expansion of documented Atlantic,
  Indian Ocean, and Pacific creoles has revealed both confirming patterns and
  anomalies for all three theories.
systematic_gaps:
  - Historical documentation of creole genesis situations is fragmentary for most creoles
  - The bioprogramme makes specific predictions that are contested across creoles
  - Universal second-language acquisition biases cannot be distinguished from innate structure
  - The degree to which creole grammatical features are stable across generations is understudied
suggested_hypotheses:
  - h-bioprogramme-tma-prediction
  - h-creole-l2-convergence

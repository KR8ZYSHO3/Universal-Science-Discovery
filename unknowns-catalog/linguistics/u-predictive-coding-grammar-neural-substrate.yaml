id: u-predictive-coding-grammar-neural-substrate
title: >
  Which cortical layers and circuits implement the prediction vs. prediction-error
  hierarchy for syntactic processing, and does the same architecture that codes
  word-level surprisal also code phrase-structure violations at a higher hierarchical
  level?
status: open
priority: high
disciplines:
  - linguistics
  - neuroscience
  - cognitive-science
  - computational-neuroscience
summary: >
  Friston's predictive coding framework assigns specific roles to cortical layers:
  deep pyramidal cells (layers 5/6) carry top-down predictions; superficial
  pyramidal cells (layers 2/3) carry bottom-up prediction errors; inhibitory
  interneurons implement precision-weighting. This anatomical assignment generates
  specific predictions for the neural signature of syntactic prediction: top-down
  syntactic predictions from left IFG (inferior frontal gyrus, Broca's area)
  should appear as early (pre-stimulus) activity in temporal cortex, and
  syntactic violations should produce prediction-error signals (N400/P600 ERP
  components) in superficial cortical layers.

  Two major unknowns:
  (1) The laminar identity of syntactic prediction and error signals is unknown
  because standard fMRI and scalp EEG cannot resolve cortical layers. Laminar
  fMRI (ultra-high field, 7T) and intracranial EEG provide limited laminar
  resolution but have not been systematically applied to syntactic processing.
  (2) Whether the predictive coding hierarchy is strictly hierarchical for syntax
  (morpheme → word → phrase → clause) or whether cross-level interactions are
  common (clause-level context modulating morpheme-level prediction) is debated.
  The free-energy framework predicts strictly top-down predictions and bottom-up
  errors, but empirical ERP data shows both N400 (lexical) and P600 (syntactic)
  can be modulated by each other's context.
systematic_gaps:
  - No laminar fMRI study has directly tested whether syntactic predictions originate
    in deep layers of IFG/temporal cortex and syntactic errors are encoded in superficial layers
  - The quantitative relationship between word-level surprisal (Levy 2008 reading times)
    and N400 amplitude has been replicated but not extended to surprisal at the phrase
    and clause level with matched statistical controls
  - Whether precision-weighting in syntactic processing corresponds to measurable
    attention effects (pupillometry, alpha-band desynchronization) at syntactic
    dependency boundaries has not been tested
suggested_hypotheses:
  - N400 amplitude scales linearly with word surprisal (-log P(w|context)) even when
    controlling for semantic plausibility, word frequency, and phonological neighborhood
    density — a pure syntactic surprisal effect derivable from the predictive coding model
related_unknowns:
  - u-bilingual-cognitive-advantage-replication
  - u-attention-neural-mechanisms

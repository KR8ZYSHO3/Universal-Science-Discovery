id: u-dialect-contact-as-graph-diffusion
title: When does a pure diffusion model fail for dialect features because of identity-driven
  categorical switching, and how can mixtures be identified from atlas data?
status: open
priority: medium
disciplines:
- linguistics
- mathematics
summary: S-curve adoption and threshold models from sociolinguistics deviate from linear diffusion;
  model selection on historical data is statistically challenging.
systematic_gaps:
- Sparse temporal sampling in historical atlases limits dynamic fitting.
- Contact often involves bilingualism with code-switching not captured by single-feature diffusion.
suggested_hypotheses:
- h-lexical-diffusion-on-geographic-graphs-predicts-isoglosses

id: u-semantic-shift-prediction
title: "Can the semantic drift of a word over decades be predicted from its current distributional properties?"
status: open
priority: medium
disciplines:
  - linguistics
  - computational-linguistics
  - historical-linguistics
summary: >
  Words change meaning over time through broadening, narrowing, amelioration,
  pejoration, and metaphorical extension. Historical corpora (Google Books, COHA) now
  provide century-scale distributional data, and word embedding models trained on
  diachronic corpora can detect past semantic shifts. The forward-looking prediction
  problem — can we identify from a word's current distributional signature which words
  are likely to shift in the next 20–50 years and in what direction — remains
  substantially unsolved. Factors such as register diversity, polysemy, frequency, and
  collocational flexibility are proposed predictors, but no validated predictive model
  exists for prospective semantic change.
systematic_gaps:
  - Distributional models conflate polysemy with semantic broadness
  - Social and cultural factors driving meaning change are not encoded in text distributions alone
  - Most diachronic models are validated on English; cross-linguistic generalization is untested
  - Causal mechanisms of semantic shift are not distinguished from statistical correlates
references:
  - doi: "10.1162/coli_a_00258"
    note: "Hamilton et al. — diachronic word embeddings and semantic change"
  - arxiv: "2005.01956"
    note: "Tahmasebi et al. — survey of computational approaches to semantic change"

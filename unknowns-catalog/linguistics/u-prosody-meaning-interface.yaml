id: u-prosody-meaning-interface
title: "How do prosodic contours (pitch, rhythm) systematically modulate propositional meaning across languages?"
status: open
priority: medium
disciplines:
  - linguistics
  - phonology
  - semantics
  - cognitive-science
summary: >
  Prosody — the suprasegmental structure of speech including intonation, stress, rhythm,
  and tempo — encodes meaning beyond the segmental content of words. The interface
  between prosodic form and semantic/pragmatic meaning is poorly formalized. Questions
  include: which prosodic contrasts are universal versus language-specific, how
  intonational meaning compositionally interacts with lexical semantic meaning, and
  whether tonal languages and intonational languages implement the same prosody-meaning
  mappings via different phonological substrates. The autosegmental-metrical (AM)
  framework provides a descriptive vocabulary but does not fully predict meaning from
  form, and the compositional semantics of prosody (ToBI annotations, nuclear tones)
  remains contested.
systematic_gaps:
  - The semantics of L+H* versus H* nuclear pitch accents is not cross-linguistically stable
  - Interaction of lexical tone and intonation in tonal languages is incompletely modeled
  - Psychophysical experiments on prosody interpretation have not produced a unified model
  - Neural processing of prosodic meaning is poorly dissociated from syntactic parsing
references:

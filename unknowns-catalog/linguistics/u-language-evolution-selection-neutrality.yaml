id: u-language-evolution-selection-neutrality
title: Can linguistic change rates be decomposed into neutral drift and selection components, and which grammatical features are under positive, purifying, or balancing selection in human populations?
status: open
priority: medium
disciplines:
  - linguistics
  - evolutionary-biology
  - cultural-evolution
  - population-genetics
summary: >
  Population genetics distinguishes neutral mutation (random frequency changes by
  genetic drift) from selection (directional, purifying, or balancing). Analogous
  decomposition for linguistic change has been proposed but not systematically achieved.

  Some linguistic features appear to change neutrally (verb irregularity regularization
  follows a neutral decay with half-life ∝ frequency — Michel et al. 2011). Others
  show directional change (grammaticalization: open-class words systematically becoming
  grammatical markers over centuries, suggesting directional selection for processing
  efficiency). Others may be under stabilizing selection (universal typological features
  like SOV/SVO word order may be attractors — states to which languages repeatedly
  return, analogous to balanced polymorphisms).

  The key challenge: linguistic "fitness" is not well-defined at the individual level
  (what selective pressure acts on each variant?), and the "effective population size"
  for linguistic change depends on community structure in poorly understood ways.

  Without decomposing neutral from selected change, we cannot determine: which aspects
  of language are arbitrary (could have been otherwise) vs. constrained by cognitive
  or communicative selection; whether linguistic universals reflect selection or
  common origin; and how fast language would change without cultural selection.
systematic_gaps:
  - A rigorous method for computing linguistic Tajima's D (neutral vs. selected change) from corpus data has not been developed.
  - The effective population size for linguistic drift in different community types (isolated village, urban center, written tradition) has not been quantified.
  - Whether grammaticalization is driven by selection for processing efficiency or by neutral functional reanalysis is not resolved.
  - Cross-linguistic comparison of change rates with phylogenetic control, testing for selection signatures, has not been done at the level of morphological paradigms.
suggested_hypotheses:
  - Grammatical features encoding information-theoretically efficient distinctions (high UID — uniform information density) evolve under positive selection and show convergent evolution in unrelated language families.
related_bridges:
  - b-language-evolution-cultural-selection
references:

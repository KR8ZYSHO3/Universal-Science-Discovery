id: u-universal-grammar-substrate
title: "Is there a neurobiological substrate that implements universal grammar constraints, and what is its architecture?"
status: open
priority: high
disciplines:
  - linguistics
  - neuroscience
  - cognitive-science
summary: >
  The universal grammar (UG) hypothesis posits that certain structural constraints on
  human language — hierarchical phrase structure, the absence of movement across
  specified islands, agreement relations — are innately specified in the human brain.
  Despite decades of study, the neurobiological implementation of UG constraints, if
  any, remains unknown. Imaging studies identify a distributed language network (Broca's
  area, posterior temporal cortex, angular gyrus) but do not identify structure-specific
  circuitry. The alternative — that apparent universals emerge from domain-general
  learning and communicative pressures — predicts the same behavioral data without
  requiring dedicated neural circuitry. Distinguishing these accounts requires
  identifying neural signatures specific to hierarchical syntax rather than lexical
  retrieval or sequential prediction.
systematic_gaps:
  - fMRI spatial resolution is insufficient to distinguish syntactic from lexical circuits
  - Agrammatic aphasia studies do not cleanly dissociate syntactic from semantic deficits
  - No animal model captures hierarchical recursive syntax
  - Cross-linguistic universality of neural language regions has not been fully tested

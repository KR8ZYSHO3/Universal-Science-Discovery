id: u-language-thought-causality
title: "Does the grammar of a language causally shape non-linguistic cognition (strong Sapir-Whorf), or only correlate with it?"
status: open
priority: high
disciplines:
  - linguistics
  - cognitive-science
  - psychology
summary: >
  The linguistic relativity hypothesis (Sapir-Whorf) claims that the structure of a
  language influences — or even determines — the way its speakers perceive and think
  about the world. A weak version (effects on non-linguistic cognition exist but are
  modest) is supported by experiments on color discrimination, spatial reasoning, and
  time conceptualization. The strong version (grammar causally shapes thought rather
  than merely correlating with cultural practice) remains contested. The core
  methodological challenge is that language, culture, environment, and cognition
  co-develop; isolating the causal contribution of linguistic structure requires
  experimental designs (artificial language learning, cross-linguistic priming) that
  have produced inconsistent results. The question has significant implications for
  universal cognitive architecture and language diversity policy.
systematic_gaps:
  - Most studies use correlational designs that cannot establish causal direction
  - Color naming experiments conflate linguistic encoding with perceptual salience
  - Artificial language learning paradigms alter many variables simultaneously
  - Replication rates for Sapir-Whorf effects are low in pre-registered studies
suggested_hypotheses:

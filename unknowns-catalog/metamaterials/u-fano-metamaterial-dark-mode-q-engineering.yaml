id: u-fano-metamaterial-dark-mode-q-engineering
title: >
  For coupled radiative–subradiant metamolecule designs, which systematic design rules raise loaded Q while keeping
  mode overlap robust to fabrication disorder — beyond post-hoc Fano fitting of transmission spectra?
status: open
priority: medium
disciplines:
  - optics
  - electromagnetism
summary: >
  Empirical recipes exist for plasmonic oligomers and split-ring composites, but inverse-design tools often treat
  objectives as black-box without exposing when interference-based darkness collapses under nm disorder.
systematic_gaps:
  - Limited statistical studies correlating corner-rounding variance to Fano parameter drift across wafers.
  - Multiphysics loss (thermal, nonlinear) during high-Q operation rarely co-optimized with linear Fano models.

suggested_hypotheses:
  - h-fano-q-factor-tracks-radiative-darkness-order-parameter

related_bridges:

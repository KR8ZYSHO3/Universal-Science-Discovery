id: u-qkd-practical-implementation-side-channels
title: Can quantum key distribution systems achieve information-theoretic security in practice when realistic detector and source imperfections create side-channel vulnerabilities not covered by idealized security proofs?
status: open
priority: high
disciplines:
  - cryptography
  - quantum-computing
  - information-theory
summary: >
  Theoretical QKD security proofs assume perfect single-photon sources and ideal
  detectors. Real implementations use attenuated laser pulses (vulnerable to
  photon-number-splitting attacks) and avalanche photodiodes with efficiency
  mismatch and time jitter (vulnerable to detector blinding attacks). Measurement-device-
  independent (MDI-QKD) and device-independent (DI-QKD) protocols address these
  but at significant key rate penalties. Key unknowns: (1) what is the complete
  set of side-channel vulnerabilities in commercially deployed QKD systems, (2) can
  DI-QKD based on Bell inequality violations achieve sufficient key rates for practical
  applications, (3) how does channel length limit key rates and security for metropolitan
  and intercontinental QKD networks?
systematic_gaps:
  - No systematic security evaluation framework covers all known side-channel attack vectors for QKD hardware
  - DI-QKD has only been demonstrated at short distances (<500 m) due to detection efficiency requirements
  - The key rate-distance tradeoff for QKD in real fiber networks with finite-key security bounds is not optimized
related_bridges:
  - b-qkd-information-theoretic-security
last_reviewed: "2026-05-07"

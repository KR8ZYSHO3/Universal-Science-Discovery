id: u-ergodic-failure-quantum-thermalization
title: "Under what conditions do quantum many-body systems fail to thermalise (violate ergodicity) and what is the complete classification of ergodic vs. non-ergodic phases?"
status: open
priority: high
disciplines:
  - quantum-statistical-mechanics
  - condensed-matter-physics
  - mathematical-physics
summary: >
  Classical ergodic theory predicts that dynamical systems will explore all accessible
  microstates equally. In quantum mechanics, thermalization is understood through the
  Eigenstate Thermalisation Hypothesis (ETH): each energy eigenstate encodes thermal
  expectation values. ETH-satisfying systems thermalise; ETH-violating systems do not.
  Two known classes of ergodicity-breaking exist: (1) integrable systems (exactly
  solvable, infinite conservation laws prevent relaxation) and (2) many-body localised
  (MBL) systems (disorder localises all eigenstates, preventing transport). The boundary
  between MBL and ergodic phases is debated: some numerical results suggest MBL may be
  unstable at thermodynamic limit. New ergodicity-breaking phases (quantum scars, Hilbert
  space fragmentation) were discovered post-2019. The complete phase diagram of
  thermalisation in interacting quantum systems with varying disorder and integrability
  parameters remains an open problem.
systematic_gaps:
  - The MBL phase transition point in 2D systems is unsettled
  - Whether MBL is stable at thermodynamic limit (N → ∞) is unresolved
  - Quantum many-body scars represent a new class not captured by ETH/MBL dichotomy
suggested_hypotheses:
  - >
    KAM theorem for quantum systems: near-integrable Hamiltonians retain approximate
    conservation laws that slow thermalisation on accessible timescales, mimicking MBL
related_unknowns:

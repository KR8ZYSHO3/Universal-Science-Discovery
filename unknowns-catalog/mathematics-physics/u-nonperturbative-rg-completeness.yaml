id: u-nonperturbative-rg-completeness
title: Is the exact (Wilsonian) renormalization group complete — does it capture all universality classes and phase transitions including those with no perturbative expansion?
status: open
priority: medium
disciplines:
  - mathematics
  - physics
  - mathematical-physics
  - quantum-field-theory
summary: >
  The perturbative renormalization group (epsilon expansion, 1/N expansion) successfully
  predicts critical exponents for most classical phase transitions. However, strongly
  coupled fixed points (conformal field theories at large coupling) are inaccessible to
  perturbative RG. The exact renormalization group (Wetterich equation: ∂_t Γ_k = (1/2)
  Tr[(Γ_k^(2) + R_k)^{-1} ∂_t R_k]) is non-perturbative but requires truncation
  approximations whose convergence is unproven. For 3D conformal field theories
  (bootstrap program) and for quantum gravity (asymptotic safety scenario), it is unknown
  whether the exact RG captures all fixed points or misses non-perturbative ones.
systematic_gaps:
  - No proof that the Wetterich equation's truncation hierarchy converges to the exact result for strongly coupled 3D CFTs.
  - The asymptotic safety scenario for quantum gravity depends on the existence of a non-perturbative UV fixed point not confirmed by other methods.
  - Classification of universality classes in 2+1 dimensional quantum phase transitions is incomplete.
last_reviewed: "2026-05-06"

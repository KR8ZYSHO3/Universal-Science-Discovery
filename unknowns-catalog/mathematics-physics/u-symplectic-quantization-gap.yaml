id: u-symplectic-quantization-gap
title: >
  What is the precise mathematical relationship between symplectic geometry and quantum
  mechanics beyond deformation quantization, and when does geometric quantization fail
  to produce physically correct Hilbert spaces?
status: open
priority: high
disciplines:
  - mathematics
  - symplectic-geometry
  - quantum-mechanics
  - mathematical-physics
summary: >
  Classical mechanics lives on a symplectic manifold (M, ω) and quantum mechanics
  lives on a Hilbert space. Geometric quantization (Souriau, Kostant 1970) provides
  a mathematical procedure to pass from one to the other, but it fails for many
  physically important systems (e.g., systems with compact phase spaces, or where
  half-form correction is required). Deformation quantization (Kontsevich 1997)
  is a purely algebraic approach that always exists but does not always produce
  physical Hilbert space representations. The precise conditions under which
  these quantization procedures agree, fail, or must be supplemented are unknown.
systematic_gaps:
  - No general theorem determining when geometric quantization yields a physically correct irreducible representation.
  - Relationship between metaplectic correction and physical spin remains not fully understood.
  - Quantization of non-linear symplectic reductions (reduced phase spaces of gauge theories) leads to inequivalent quantum theories.
last_reviewed: "2026-05-06"

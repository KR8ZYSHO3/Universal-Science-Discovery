id: u-chaos-quantum-correspondence-lyapunov-exponents
title: >
  How does classical chaos emerge from quantum mechanics in the semiclassical limit —
  and is there a quantum analog of the classical Lyapunov exponent that characterizes
  information scrambling in many-body quantum systems?
status: open
priority: high
disciplines:
  - mathematics-physics
  - quantum-mechanics
  - dynamical-systems
  - quantum-information
  - many-body-physics
summary: >
  Classical chaos is characterized by sensitive dependence on initial conditions:
  nearby trajectories diverge as δx(t) ~ e^{λt}δx(0) where λ > 0 is the Lyapunov
  exponent. In quantum mechanics, the uncertainty principle prevents simultaneous
  precise specification of position and momentum, making the classical notion of
  trajectory inapplicable. The quantum Lyapunov exponent is defined via the
  out-of-time-order correlator (OTOC): C(t) = -⟨[W(t), V(0)]²⟩ ~ e^{λ_L t} where
  W(t) and V(0) are local operators at different times. Maldacena, Shenker & Stanford
  (2016) proved a bound: λ_L ≤ 2πk_BT/ℏ (the MSS bound), saturated by black holes
  via holographic duality (AdS/CFT). The Sachdev-Ye-Kitaev (SYK) model — a
  disordered, all-to-all coupled fermionic system — saturates the MSS bound and
  is maximally chaotic. Open questions: (1) What is the physical interpretation of
  the MSS bound — why do black holes maximize scrambling? (2) How does the
  quantum-to-classical transition occur for Lyapunov exponents: under what conditions
  does λ_L approach the classical Lyapunov exponent as ℏ → 0? (3) Are there
  observable signatures of quantum chaos in many-body systems (spectral statistics,
  OTOCs) accessible to near-term quantum simulators? (4) Does the correspondence
  between quantum black hole thermodynamics and maximal chaos imply that black holes
  are fast scramblers (Hayden & Preskill)?
systematic_gaps:
  - The semiclassical derivation of λ_L from classical Lyapunov exponents for
    generic quantum systems (not just special integrable or SYK-like models) is incomplete.
  - Experimental measurement of OTOCs in cold atom, trapped ion, or superconducting
    qubit simulators has achieved only short-time OTOC growth, not the exponential
    regime predicted by the MSS bound.
  - The relationship between quantum Lyapunov exponents (OTOC growth rates) and
    thermalization timescales in many-body systems has not been established generally.

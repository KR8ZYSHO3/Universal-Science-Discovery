id: u-ribosome-kinetics-queuing
title: "What are the rate-limiting bottleneck codons in human mRNA translation, and does codon-traffic-jam theory correctly predict protein yield and ribosome density profiles from ribosome profiling data?"
status: open
priority: medium
disciplines:
  - molecular-biology
  - operations-research
  - computational-biology
summary: >
  TASEP/queuing theory of ribosome translation predicts that slow codons create
  upstream density peaks (traffic jams) visible as ribosome profiling peaks.
  However, many confounds exist: ribosome profiling data are subject to nuclease
  digestion biases, and peaks may reflect programmed pausing or ribosome
  protection rather than genuine translation slowdown. Whether codon usage
  optimization (replacing rare codons with synonymous common codons) reliably
  increases protein yield by the amount predicted by TASEP theory is disputed.
  The effective codon translation rates for all 61 sense codons in human cells
  have not been measured directly.
systematic_gaps:
  - "Direct measurement of codon-specific elongation rates by ribosome profiling is confounded by nuclease bias, requiring new experimental approaches."
  - "TASEP model parameters (initiation rate α, termination rate γ) are not independently measured for most transcripts."
  - "Whether codon-optimization-induced protein yield increases are additive across multiple slow codons (as TASEP theory predicts) has not been tested systematically."
related_bridges:
  - b-ribosome-kinetics-queuing-theory
last_reviewed: "2026-05-07"
references:
  - doi: "10.1126/science.1168978"
    note: "Ingolia et al. (2009) Genome-wide analysis of translation with ribosome profiling"

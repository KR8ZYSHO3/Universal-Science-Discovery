id: u-supply-chain-network-topology-resilience
title: What supply chain network topologies maximize resilience to both random failures and targeted disruptions simultaneously, and how can firms redesign their supplier networks to achieve this?
status: open
priority: high
disciplines:
  - operations-research
  - complex-systems
  - network-science
summary: >
  Scale-free supply chain networks are robust to random failures but fragile to targeted
  attacks on hub suppliers. Lattice-like networks (fully redundant, multiple paths)
  resist targeted attacks but are expensive. The optimal resilience-cost tradeoff
  depends on the disruption probability distribution and recovery time, which vary
  by industry and geography. Key unknowns: (1) what network motifs (dual-sourcing,
  regional clusters, tiered redundancy) best balance resilience vs. efficiency cost,
  (2) how does geopolitical risk (country concentration) combine with network topology
  effects on resilience, (3) can empirical supply chain network data from satellite
  imagery and financial filings reveal the actual degree distribution of supplier networks?
systematic_gaps:
  - Empirical supply chain network data is proprietary; most studies use aggregated trade data not firm-level networks
  - Recovery dynamics after disruption (time to find alternative suppliers) are poorly modeled
  - Multi-tier supply chains (Tier 1, 2, 3 suppliers) have not been mapped for most industries
related_bridges:
  - b-supply-chain-network-robustness
last_reviewed: "2026-05-07"

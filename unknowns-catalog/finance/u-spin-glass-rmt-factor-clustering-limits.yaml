    note: Parisi (1979) — order-parameter cascade for spin glasses (Phys Rev Lett).
  - doi: "10.1103/PhysRevLett.83.1467"
    note: Laloux et al. (1999) — noise dressing of financial correlation matrices (Phys Rev Lett).

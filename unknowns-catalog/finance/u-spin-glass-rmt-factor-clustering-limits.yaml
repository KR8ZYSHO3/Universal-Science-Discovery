id: u-spin-glass-rmt-factor-clustering-limits
title: >
  Beyond Marchenko–Pastur bulk cleaning, when does spin-glass replica-symmetry-breaking imagery add falsifiable predictions for hierarchical factor structure in empirical covariance matrices — versus storytelling without out-of-sample gains?
status: open
priority: low
disciplines:
  - quantitative-finance
  - statistical-physics
summary: >
  Random-matrix bulk thresholds already operationalize noise eigenvalues; ultrametric RSB overlaps supply qualitative clustering metaphors but rarely tie to identified macroeconomic shocks or stable factor rotations under nonstationarity.
systematic_gaps:
  - Pre-registered forecasts comparing RSB-motivated hierarchical clustering vs shrinkage-only baselines under identical transaction costs.
  - Null simulations distinguishing weak hierarchical structure from estimation noise under realistic heavy tails.
suggested_hypotheses:
  - h-replica-sparsity-predicts-factor-eigenvalue-noise-bulk
related_bridges:
  - b-spin-glass-replica-x-factor-covariance-clustering-finance
last_reviewed: "2026-05-07"
references:

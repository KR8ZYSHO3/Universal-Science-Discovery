id: u-adjoint-seismic-backprop-gradient-stability
title: How stable are adjoint-derived gradients under realistic seismic noise and
  model mismatch?
status: open
priority: high
disciplines:
- geophysics
- computer-science
- inverse-problems
summary: Adjoint gradients can become unstable with poor initial models, sparse receiver
  geometry, or strong waveform nonlinearity. A shared stability benchmark against
  modern ML gradient diagnostics is missing.
systematic_gaps:
- No standardized cross-domain benchmark for gradient variance in PDE-constrained
  inversion.
- Limited evidence on when gradient clipping or trust-region steps outperform line
  search in production seismic workflows.

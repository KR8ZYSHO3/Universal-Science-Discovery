id: u-ocean-color-phytoplankton-remote-sensing
title: "Can satellite ocean-color retrievals distinguish phytoplankton functional types (diatoms, cyanobacteria, coccolithophores) at sufficient accuracy to close the global marine carbon budget, and what improvements to radiative transfer inversion algorithms are needed to separate CDOM, detritus, and phytoplankton absorption contributions?"
status: open
priority: high
disciplines:
  - oceanography
  - optics
  - remote-sensing
summary: >
  Current satellite algorithms (OC4, chlorophyll-a band ratios) provide bulk chlorophyll estimates but cannot
  reliably separate phytoplankton functional types (PFTs) needed for biogeochemical model assimilation.
  Key unknowns: (1) can hyperspectral satellites (PACE mission) combined with physics-based RTE inversion
  reliably retrieve PFT composition with < 30% error, (2) what is the dominant source of uncertainty in the
  bio-optical model — variable phytoplankton pigment packaging, CDOM co-variation with chlorophyll, or
  atmospheric correction errors, and (3) can machine learning trained on RTE simulations outperform semi-analytic
  algorithms for both chlorophyll and PFT retrieval simultaneously?
systematic_gaps:
  - In-situ hyperspectral absorption measurements with co-registered phytoplankton taxonomy are sparse outside research cruises
  - Atmospheric correction residuals in coastal turbid waters dominate ocean-color retrieval error
  - Phytoplankton-specific absorption spectra show large inter- and intra-species variability not captured by fixed PFT endmembers
related_bridges:
  - b-ocean-color-radiative-transfer
last_reviewed: "2026-05-07"

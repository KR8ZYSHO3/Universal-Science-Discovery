id: u-internal-tide-mixing-efficiency-spatial
title: What fraction of internal tide energy is locally dissipated near generation sites versus radiated to the open ocean, and how does this spatial distribution control abyssal stratification?
status: open
priority: high
disciplines:
  - oceanography
  - geophysics
  - fluid-mechanics
summary: >
  Approximately 1 TW of tidal energy is converted to internal waves at ocean ridges,
  but the spatial distribution of subsequent mixing is poorly constrained. Observations
  suggest 25-33% dissipates locally at generation sites while the rest propagates as
  low-mode internal tides before breaking in the far field or at continental margins.
  Key unknowns: (1) what is the mixing efficiency (flux Richardson number) for internal
  tide breaking in stratified ocean conditions, (2) how do mesoscale eddies scatter
  and absorb propagating internal tides, (3) what fraction of tidal energy reaches the
  abyss and how does this control the deep density structure?
systematic_gaps:
  - Direct turbulence measurements near internal tide generation sites are sparse; most estimates rely on parameterizations
  - The fate of low-mode internal tides between generation and far-field dissipation sites is unmapped
  - Climate models use spatially uniform tidal mixing parameterizations inconsistent with observed heterogeneity
related_bridges:
  - b-tidal-forcing-ocean-mixing
last_reviewed: "2026-05-07"

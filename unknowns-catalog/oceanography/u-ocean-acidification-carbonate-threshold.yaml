id: u-ocean-acidification-carbonate-threshold
title: "What are the critical carbonate chemistry thresholds (aragonite saturation state Ω_arag, pH, CO3^2- concentration) below which calcification failure occurs in reef-building corals and pteropods, and how do bleaching, disease, and local pollution interact with ocean acidification to modify these thresholds?"
status: open
priority: critical
disciplines:
  - oceanography
  - ecology
  - chemistry
summary: >
  Coral calcification rates decline with decreasing aragonite saturation state but the precise threshold for
  calcification failure and skeletal dissolution varies by species, population, and reef location. Laboratory
  experiments give different thresholds than field observations, and local factors (upwelling, alkalinity,
  temperature) modify the global acidification signal. Key unknowns: (1) is there a single Ω_arag threshold
  for coral calcification failure or does it vary continuously with bleaching history, temperature stress,
  and nutrient availability, (2) can alkalinity enhancement (e.g., adding crushed limestone) locally elevate
  reef Ω_arag sufficiently to offset projected acidification under RCP 8.5, (3) what is the interaction
  between thermal bleaching and acidification — are bleached corals more or less sensitive to low Ω_arag?
systematic_gaps:
  - Long-term continuous pH and alkalinity monitoring at coral reefs is sparse and methodologically inconsistent
  - Laboratory acidification experiments use unrealistically rapid pH changes that may overestimate calcification sensitivity compared to gradual natural change
  - Species-level calcification thresholds have been measured for fewer than 50 of the ~800 reef-building coral species
related_bridges:
  - b-ocean-acidification-carbonate-chemistry
last_reviewed: "2026-05-07"

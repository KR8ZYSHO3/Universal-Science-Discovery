id: u-cultural-transmission-network-effects
title: "How does the topology of social interaction networks (degree heterogeneity, community structure, homophily) modify the effective R_0 and final adoption fraction of cultural innovations relative to homogeneous-mixing SIR predictions, and can these network corrections be captured by a single network-epidemic summary statistic?"
status: open
priority: high
disciplines:
  - social-science
  - epidemiology
  - network-science
summary: >
  The SIR analogy for cultural spread is well established conceptually but quantitative calibration requires
  knowing the social contact network structure. Key unknowns: (1) for a given cultural innovation, can the
  effective R_0 be reliably estimated from early-stage adoption curves without knowing the full social network,
  (2) does community structure (echo chambers) create an effective herd-immunity threshold that prevents
  cross-community spread even when overall prevalence is low, and (3) can the heterogeneous mean-field
  approximation (using degree distribution moments) quantitatively predict final adoption fraction in real
  social networks as accurately as it does in network epidemiology?
systematic_gaps:
  - Longitudinal social network data with co-registered adoption timing for specific cultural practices are rare
  - Distinguishing independent adoption from social contagion (complex contagion effects requiring multi-contact exposure) is statistically difficult
  - Cultural abandonment (removal from I to R) may be reversible unlike disease recovery, violating SIR assumptions in ways not systematically quantified
related_bridges:
  - b-cultural-transmission-sir-models
last_reviewed: "2026-05-07"

summary: Memory-augmented reduced models are attractive, but identifiability of kernel
  shape from noisy surveillance data remains unresolved.
systematic_gaps:
- Few identifiability studies under realistic reporting delay and under-ascertainment
  noise.
- No standard regularization protocol for stable kernel estimation in public-health
  practice.

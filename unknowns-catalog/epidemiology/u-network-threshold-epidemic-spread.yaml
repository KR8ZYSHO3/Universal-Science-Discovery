id: u-network-threshold-epidemic-spread
title: Can the epidemic threshold of a novel pathogen be estimated from contact network topology alone before transmission parameters are measured, and does the percolation-epidemic equivalence quantitatively predict superspreading event frequency from the contact degree distribution?
status: open
priority: high
disciplines:
  - epidemiology
  - network-science
  - statistical-physics
  - public-health
summary: >
  The percolation-epidemic equivalence predicts that the epidemic threshold R_0 = 1
  maps to the percolation threshold p_c, which depends entirely on the contact network
  degree distribution. For power-law networks, p_c → 0 as N → infinity, meaning
  any transmission probability produces epidemics. Key unknowns: (1) Can contact
  network degree distributions be measured sufficiently accurately from digital
  contact tracing data to predict R_0 prospectively? (2) Does the overdispersion
  parameter k (negative binomial transmission) correspond to a measurable network
  motif property? (3) Do targeted vaccination strategies derived from percolation
  theory (vaccinate hubs first) outperform age-stratified strategies in real outbreak
  settings? (4) Can the explosive percolation framework predict discontinuous epidemic
  transitions associated with synchronized superspreading events?
systematic_gaps:
  - No prospective test of percolation-derived epidemic threshold predictions using contact network data
  - No measurement of the degree distribution in real human contact networks at the scale needed for percolation threshold calculation
  - Theoretical predictions of hub-targeted vaccination advantages not tested in controlled outbreak settings
related_bridges:
  - b-openalex-network-epidemic-percolation
last_reviewed: "2026-05-07"

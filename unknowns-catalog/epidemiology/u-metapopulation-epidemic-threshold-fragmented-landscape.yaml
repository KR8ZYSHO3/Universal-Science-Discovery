id: u-metapopulation-epidemic-threshold-fragmented-landscape
title: >
  How does landscape fragmentation shift the epidemic persistence threshold R₀_eff in
  spatially structured host populations, and can metapopulation patch-occupancy theory
  predict cross-species spillover risk in fragmented habitats from landscape connectivity
  metrics alone?
status: open
priority: high
disciplines:
  - epidemiology
  - ecology
  - landscape-ecology
  - mathematical-biology
summary: >
  The Levins metapopulation model and spatial SIR epidemic models share identical mathematical
  structure (colonization↔infection, extinction↔recovery), yet the quantitative relationship
  between landscape connectivity metrics (patch area, interpatch distance, corridor width) and
  the effective epidemic threshold R₀_eff in fragmented host populations remains poorly
  characterized. Standard SIR models assume either well-mixed or regular-lattice contact
  structure; real landscapes have irregular patch sizes and heterogeneous dispersal kernels
  that violate both assumptions. It is unknown whether metapopulation incidence-function
  model parameters (colonization distance kernel, extinction-area relationship) can be
  directly translated into epidemic transmission parameters without individual-level contact
  data, and whether this translation could predict spillover risk from wildlife reservoirs
  to human populations in fragmented tropical forest margins.
systematic_gaps:
  - No empirical studies have simultaneously estimated Levins metapopulation parameters
    and SIR transmission parameters for the same host-pathogen system to test the
    quantitative equivalence prediction.
  - Landscape genomics and phylogeographic data could distinguish patch-occupancy from
    epidemic-spread signatures but have not been systematically applied to test the bridge.
  - The effect of habitat fragmentation on pathogen persistence (rescue effect vs. reduced
    patch carrying capacity) is contested; metapopulation theory predicts opposite outcomes
    depending on extinction-colonization balance.
related_bridges:
  - b-metapopulation-sir-patch-occupancy
last_reviewed: "2026-05-07"

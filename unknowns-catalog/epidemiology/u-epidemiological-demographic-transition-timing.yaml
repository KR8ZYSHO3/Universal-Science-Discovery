id: u-epidemiological-demographic-transition-timing
title: "What determines the delay between mortality decline and fertility decline in the demographic transition, and can epidemiological models of infectious disease control predict the pace and timing of demographic transitions in low-income countries currently undergoing rapid disease burden shifts?"
status: open
priority: high
disciplines:
  - epidemiology
  - demography
  - public-health
summary: >
  The demographic transition theory predicts that fertility decline follows mortality decline with a delay of
  1-3 generations, but the mechanisms determining this delay are poorly understood. In some countries (Bangladesh,
  Thailand) the transition was rapid; in others (sub-Saharan Africa) it has stalled. Key unknowns:
  (1) what are the causal pathways from under-5 mortality decline to fertility decline — do they work through
  child survival expectations, women's education, or economic incentives, (2) can epidemiological transition
  models predict when non-communicable disease burden will dominate health systems in specific countries,
  (3) how do HIV/AIDS, malaria control, and vaccine programs interact to accelerate or delay demographic transition?
systematic_gaps:
  - Country-level time series data linking infectious disease burden to fertility rates are confounded by simultaneous economic development
  - Age-structured models require age-specific fertility and mortality data that are unavailable in many low-income countries
  - The role of women's agency and education as mediating variables cannot be disentangled from mortality effects alone
related_bridges:

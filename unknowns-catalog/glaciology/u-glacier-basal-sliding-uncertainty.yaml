id: u-glacier-basal-sliding-uncertainty
title: What is the correct sliding law relating basal velocity to effective pressure and bed roughness in glaciers, and why do different formulations produce order-of-magnitude differences in ice sheet projections?
status: open
priority: critical
disciplines:
  - glaciology
  - fluid-mechanics
  - geophysics
summary: >
  Basal sliding (motion of ice over its bed) accounts for 50-90% of ice stream
  velocity but cannot be directly observed. The Weertman sliding law predicts
  velocity proportional to basal shear stress to a power, while Coulomb friction
  models predict a velocity-independent friction force. These give drastically
  different predictions for ice stream response to warming: Coulomb models predict
  more rapid acceleration. The correct law depends on bed properties (hard vs. soft,
  water content) that vary spatially and temporally. Sea-level rise projections
  to 2100 have 50% uncertainty attributable to basal sliding uncertainty.
systematic_gaps:
  - No direct borehole measurements of sliding velocity with simultaneous bed characterization at outlet glacier scale
  - Transition between Weertman and Coulomb regimes is poorly constrained by both theory and observation
  - Subglacial hydrology (water pressure governing effective pressure) is highly dynamic and unobservable at relevant scales
related_bridges:
  - b-glacier-dynamics-glens-law
last_reviewed: "2026-05-07"

id: u-glacier-calving-crack-propagation-threshold
title: "What stress intensity factor threshold governs full-depth crevasse propagation to the glacier bed, and how do basal water pressure, ice temperature, and crystal fabric anisotropy modulate the effective fracture toughness of Antarctic and Greenlandic outlet glaciers?"
status: open
priority: high
disciplines:
  - glaciology
  - materials-science
  - geophysics
summary: >
  Predictions of sea-level rise depend critically on how fast tidewater glaciers calve, yet no consensus model
  exists for the calving rate. Fracture mechanics offers the most physically principled framework, but key unknowns
  remain: (1) how does basal meltwater pressure alter the effective K_I at the crack tip below water-filled crevasses,
  (2) does polycrystalline ice display a true Paris-law fatigue relationship under tidal loading cycles, and
  (3) how do existing calving laws (eigen-calving, height-above-buoyancy) relate to fracture mechanics thresholds
  in a way that can be incorporated into ice-sheet models without resolving individual crevasses?
systematic_gaps:
  - Direct measurement of ice fracture toughness K_Ic in situ at glacier termini under realistic confining pressure is rarely done
  - Full-depth water pressure in crevasses on outlet glaciers is poorly constrained by remote sensing
  - Coupling between tidal stress cycles and crack-tip fatigue has not been quantified for marine-terminating glaciers

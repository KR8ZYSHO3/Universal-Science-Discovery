id: u-human-expansion-routes-coalescent-ancient-dna
title: >
  What were the precise routes, timing, and population sizes of the initial human
  dispersal out of Africa ΓÇö specifically the number of founding bottlenecks,
  the extent of archaic admixture (Neanderthal, Denisovan) at each stage, and
  the fate of early-dispersing populations replaced by later waves?
status: open
priority: high
disciplines:
  - phylogeography
  - paleoanthropology
  - population-genetics
  - ancient-dna
summary: >
  The out-of-Africa (OoA) dispersal of anatomically modern humans (AMH) is the
  most studied phylogeographic event. Key uncertainties remain: (1) Was the OoA
  dispersal a single event (~65-55 kya) or multiple events (earlier dispersals
  to Arabia/South Asia, then replacement)? (2) What was the founding population
  size (bottleneck) exiting Africa? Estimates range from <1000 to ~10,000 effective
  individuals. (3) The extent of Neanderthal admixture (1-4% in non-Africans, Pr├╝fer
  2017) and Denisovan admixture (Melanesians 4-6%) implies multiple archaic introgression
  events at different geographic locations. (4) Ancient DNA from early AMH (>40 kya)
  from Europe (Zlat├╜ k┼»┼ê, Oase) shows little to no ancestry in living Europeans ΓÇö
  suggesting population replacement. The full demographic model reconciling all these
  observations is not established.
systematic_gaps:
  - Ancient DNA from the Arabian Peninsula, South Asia, and Southeast Asia (key
    OoA corridors) is lacking due to poor preservation in tropical climates.
  - The number and timing of archaic admixture events (Neanderthal, Denisovan,
    and potentially other unknown archaics) has not been fully characterized.
  - The fate of pre-AMH populations in Eurasia (archaic humans who did not interbreed
    with AMH) is poorly constrained genetically.
related_bridges:

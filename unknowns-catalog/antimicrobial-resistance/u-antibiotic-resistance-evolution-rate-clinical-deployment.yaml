id: u-antibiotic-resistance-evolution-rate-clinical-deployment
title: >
  Can the rate of antibiotic resistance evolution to a novel antibiotic be predicted
  before clinical deployment ΓÇö and what antibiotic features (target essentiality,
  mechanism of action, penetration, efflux susceptibility) best predict resistance
  emergence timelines?
status: open
priority: high
disciplines:
  - microbiology
  - evolutionary-biology
  - pharmacology
  - infectious-disease
summary: >
  Antibiotic resistance has emerged for every antibiotic brought to market. Historical
  timelines: penicillin introduced 1943, resistant S. aureus detected 1945; methicillin
  introduced 1959, MRSA detected 1961. The factors predicting resistance evolution
  rate are incompletely understood. Candidates: (1) Target essentiality ΓÇö harder
  to evolve resistance to essential single-copy targets; (2) Mechanism of action
  ΓÇö bactericidal > bacteriostatic in resistance prevention; (3) Efflux pump affinity ΓÇö
  substrates of existing efflux pumps (AcrAB-TolC) develop resistance faster via
  pump overexpression; (4) Mutation rate ΓÇö error-prone pathogens (P. aeruginosa
  with mutL mutations) evolve resistance faster. Pre-clinical predictions of
  resistance evolution rate (using serial passage experiments, mutant prevention
  concentration, or whole-genome sequencing of resistant mutants) have not been
  validated as predictors of clinical resistance timelines.
systematic_gaps:
  - Pre-clinical resistance evolution rate (mutations per antibiotic type in serial
    passage) has not been systematically correlated with clinical resistance emergence
    timelines across antibiotic classes.
  - The role of horizontal gene transfer (plasmid-borne resistance) vs. chromosomal
    mutation in determining resistance timeline is not predictable a priori for
    novel antibiotics.
  - PK/PD target attainment (time above MIC, AUC/MIC) and its effect on resistance
    suppression vs. selection is not quantitatively modeled at the clinical population
    level for novel scaffold antibiotics.
related_bridges:

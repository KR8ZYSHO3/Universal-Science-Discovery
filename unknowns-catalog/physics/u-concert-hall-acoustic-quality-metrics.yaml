id: u-concert-hall-acoustic-quality-metrics
title: Which measurable physical acoustic parameters of concert halls most reliably predict subjective listener quality ratings, and how do individual differences in perception affect universality of acoustic design criteria?
status: open
priority: medium
disciplines:
  - architectural-acoustics
  - psychoacoustics
  - perceptual-psychology
  - music
summary: >
  Beranek (1962) correlated subjective ratings of 54 concert halls with physical
  measurements, identifying inter-aural cross-correlation coefficient (IACC) and
  reverberation time (T₆₀) as key predictors. Subsequent research added clarity (C80,
  ratio of early to late energy), definition (D50), and early decay time (EDT). However,
  the relative weighting of these metrics in predicting overall subjective quality
  remains contested. Individual listener differences are large — musicians prefer
  different halls than non-musicians; bass players weight low-frequency warmth
  differently from violinists; cultural background affects preference for dry vs. reverberant
  sound. The IACC measure was derived from a predominantly Western classical music
  listening paradigm and may not generalize to non-Western music or amplified music
  contexts. Modern concert hall design uses computer simulation (ray tracing, FDTD wave
  simulation), but the perceptual validity of the simulations for predicting listener
  satisfaction has not been established with large randomised studies.
systematic_gaps:
  - Large-scale (N > 500) listener preference studies using blind evaluation across a controlled range of acoustic conditions have not been conducted due to the practical difficulty of varying hall acoustics at scale.
  - Neuroimaging studies of concert hall acoustic quality perception are absent — the neural correlates of "spaciousness" (IACC) and "warmth" (bass ratio) are unmapped.
  - The effect of visual experience of the hall on acoustic quality ratings (architecture-acoustic interaction) is systematically uncontrolled in existing studies.
last_reviewed: "2026-05-06"

id: u-nonhelical-turing-wavelength-scaling
title: >
  Under what conditions does the dominant spatial scale of coupled electromagnetic modes in non-helical cavity resonator arrays match a Turing-like instability prediction (and how does it scale with insulation and loss)?
status: open
priority: high

summary: >
  If resonator arrays admit a reaction–diffusion analogy, the analog “wavelength” of organized modes should
  depend on coupling versus effective long-range damping and boundary conditions. This unknown asks for a
  quantitative stability theory (linearized Maxwell + equivalent circuit / modal coupling) that yields a
  predicted dominant spatial frequency testable against simulation or measurement.

systematic_gaps:
  - "Absence of peer-reviewed linear stability analysis treating coupled resonators inside finite cavities as activator–inhibitor-like dynamics."
  - "No agreed mapping from geometry (meander pitch, bifilar spacing, cavity Q) to effective D_u, D_v analog parameters."
  - "Uncertainty whether observed mode clustering is purely forced by periodic lithography vs spontaneous symmetry breaking."

suggested_hypotheses:
  - h-nonhelical-turing-cloaking-adaptation

related_bridges:

id: u-atmospheric-convection-x-rayleigh-benard
title: Does the Rayleigh-Bénard scaling law for heat flux (Nu ~ Ra^β with β ≈ 1/3 in the ultimate regime) apply to atmospheric convection, and can this inform a universal parameterization of cumulus convection in climate models?
status: open
priority: high
disciplines:
  - physics
  - geoscience
  - fluid-mechanics
  - climate-science
summary: >
  Laboratory Rayleigh-Bénard convection at extreme Ra (10^14-10^15) approaches the
  "ultimate regime" where Nu ~ Ra^(1/2) (Kraichnan 1962), but the transition Ra is
  debated and has not been reached experimentally. Atmospheric convection operates at
  Ra ~ 10^20, well beyond laboratory reach. Whether the ultimate regime scaling applies
  to the atmosphere determines the efficiency of vertical heat transport and directly
  affects climate sensitivity estimates. Current convective parameterizations in GCMs
  are empirical rather than derived from RB scaling theory, contributing ~30% of
  inter-model spread in climate sensitivity.
systematic_gaps:
  - The transition Ra to the ultimate regime has not been conclusively measured; theoretical predictions range over two orders of magnitude
  - Atmospheric RB is complicated by moisture (latent heat), rotation, and wind shear not present in laboratory RB
  - No climate model uses RB scaling laws directly; parameterizations are tuned empirically rather than derived from first principles

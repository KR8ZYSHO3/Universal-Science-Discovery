id: u-kibble-zurek-embryo
title: Does embryonic symmetry breaking obey Kibble-Zurek scaling?
status: open
priority: high
last_reviewed: "2026-05-04"
disciplines:
  - biophysics
  - developmental-biology
  - condensed-matter-physics
  - cosmology
summary: >
  The Kibble-Zurek (KZ) mechanism predicts that when any system undergoes a symmetry-breaking
  phase transition faster than its equilibration time, topological defects form with a density
  that scales as a power law of the quench rate: n_defect ∝ τ_Q^(-dν/(1+νz)), where d is the
  spatial dimension, ν the correlation-length exponent, and z the dynamic critical exponent.
  This was derived to explain defect formation after Big Bang phase transitions and has been
  confirmed in superfluid helium, ion traps, superconductors, and optical lattices — across
  55 orders of magnitude in system size.

  Embryonic symmetry breaking (e.g., the PAR-mediated anterior-posterior polarisation of
  C. elegans; the Nodal-mediated left-right axis determination in vertebrates) is a bona fide
  spontaneous symmetry-breaking transition. The order parameter is the PAR concentration field;
  the transition is driven by fertilisation-induced calcium waves and CDK1 activation.

  **The gap**: nobody has systematically varied the "quench rate" of embryonic symmetry breaking
  and measured how polarity error density scales. CDK1 inhibitors (RO-3306) allow continuous
  tuning of cell-cycle speed. If KZ scaling holds, the number of multi-domain polarity errors
  should scale as a power law of the CDK1 activity ramp rate, with an exponent that can be
  compared to mean-field universality class predictions. If the exponent matches, embryogenesis
  joins liquid helium and the early universe in a single universality class.

systematic_gaps:
  - No published experiment has deliberately varied C. elegans fertilisation or CDK1 activation speed and recorded polarity-domain statistics
  - The PAR correlation length near the symmetry-breaking transition has not been measured experimentally — it is inferred from steady-state images
  - The dynamic critical exponent z for PAR phase separation is unknown; existing models give z≈2 (diffusive) but coupling to actomyosin flow could alter this substantially
  - It is unresolved whether KZ applies only to thermal phase transitions or extends to active/driven systems (embryos are far from equilibrium)

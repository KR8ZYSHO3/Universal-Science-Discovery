id: u-quantum-decoherence-x-classical-emergence
title: Does quantum decoherence fully solve the measurement problem, or does the emergence of definite outcomes from quantum superpositions require a physical collapse mechanism beyond unitary evolution and environmental entanglement?
status: open
priority: high
disciplines:
  - physics
  - mathematics
  - philosophy-of-science
summary: >
  Decoherence explains the absence of observable quantum superpositions in macroscopic
  systems and selects preferred classical (pointer) states via einselection. However,
  decoherence does not explain why a particular outcome occurs in a single measurement —
  the Born rule probabilities emerge statistically but individual outcomes remain
  undetermined in the Many Worlds interpretation. Objective collapse theories (GRW,
  Penrose) propose physical mechanisms beyond unitary evolution, but are experimentally
  indistinguishable from decoherence in current experiments. The question of whether
  decoherence is sufficient or additional physics is required remains the deepest
  unsolved problem in quantum foundations.
systematic_gaps:
  - No experiment can currently distinguish between decoherence + Many Worlds and objective collapse models
  - The Born rule has not been derived from first principles without circularity in any interpretation
  - Quantum Darwinism (redundant environmental encoding) has been demonstrated in toy models but not in realistic mesoscopic systems

id: u-spin-waves-x-magnons
title: Can magnons in antiferromagnets or frustrated magnets exhibit topologically non-trivial band structures (magnon Hall effect, topological magnon insulators) and be used as information carriers in spintronic devices without dissipation?
status: open
priority: medium
disciplines:
  - physics
  - condensed-matter-physics
  - materials-science
summary: >
  Magnons in ferromagnets are well-described by Holstein-Primakoff bosonization. In
  antiferromagnets and frustrated magnets (kagome, pyrochlore lattices), the magnon
  band structure can exhibit Dirac points, flat bands, and topological invariants
  (magnon Chern number). The magnon Hall effect (transverse magnon current in response
  to temperature gradient) has been observed, suggesting topological magnon bands.
  Whether these topological magnon modes can be used for dissipationless spin transport
  in quantum information devices — analogous to topological electronic insulators —
  remains an open engineering and fundamental physics question.
systematic_gaps:
  - Topological magnon band theory for frustrated magnets with strong quantum fluctuations is incomplete
  - Magnon-phonon coupling destroys topological protection at finite temperature; the temperature scale for protection is unknown
  - No experimental demonstration of magnon edge states with propagation lengths comparable to electronic topological systems

id: u-minority-game-market-microstructure-universality
title: "Does the minority game phase transition at alpha_c have a universal critical exponent shared with real financial market microstructure, and can alpha be measured empirically from order book data?"
status: open
priority: medium
disciplines:
  - econophysics
  - statistical-physics
  - complex-systems
summary: >
  The Minority Game (MG) exhibits a phase transition at critical memory ratio
  alpha_c ≈ 0.34 between an efficient (disordered) phase and an inefficient
  (predictable, ordered) phase. The transition is characterized by diverging
  fluctuations in the aggregate outcome signal — the market analog of diverging
  susceptibility at a critical point. If real financial markets operate near
  this critical point, their microstructure should show: (1) diverging bid-ask
  spread variance near alpha_c; (2) power-law autocorrelations in volatility;
  (3) critical slowing down after news shocks. While all three are observed empirically
  (volatility clustering, long memory in absolute returns), the connection to
  the MG alpha_c has not been tested quantitatively. The key gap is measuring alpha
  empirically: what fraction P/N of independent strategies (agents) are operating
  in a given market at a given time? High-frequency trading may allow estimation
  from order book data. If alpha can be measured, the MG predicts specific scalings
  of market depth, price impact, and information efficiency near alpha_c.
systematic_gaps:
  - No method exists to empirically estimate alpha = P/N (strategies per trader) from order book or trade data
  - Critical exponents of MG transition have not been compared to empirical volatility scaling exponents
  - Whether MG phase transition maps to known market regimes (normal vs turbulent) has not been tested
suggested_hypotheses:
  - High-frequency order book imbalance kurtosis diverges as |alpha - alpha_c|^{-gamma_MG} near the MG critical point, with gamma_MG measurable from intraday data across multiple market conditions
related_unknowns:
  - u-turbulence-market-reynolds-analogue
references:

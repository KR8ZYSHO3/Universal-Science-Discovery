id: u-topological-insulator-x-band-theory
title: Can K-theory topological invariants be extended to non-Hermitian band structures (open quantum systems with gain and loss) to predict protected surface states in photonic and acoustic topological insulators?
status: open
priority: high
disciplines:
  - physics
  - mathematics
  - condensed-matter-physics
  - photonics
summary: >
  Topological insulators in closed (Hermitian) quantum systems are classified by K-theory
  invariants (Z2, Z, etc.) via the ten-fold way. Non-Hermitian systems (photonic crystals
  with gain/loss, open quantum systems) have complex eigenvalues and additional topological
  features (exceptional points, non-Hermitian skin effect) not captured by the standard
  classification. The extension of K-theory to non-Hermitian symmetry classes predicts
  new topological invariants and protected edge modes, but experimental realization and
  stability of these modes under realistic noise is unresolved.
systematic_gaps:
  - Non-Hermitian K-theory classification is incomplete for non-Abelian symmetry classes
  - The bulk-boundary correspondence for non-Hermitian systems fails in the standard form due to the skin effect
  - Experimental demonstration of topologically protected non-Hermitian surface states in 3D photonic systems is lacking

id: u-sonoluminescence-emission-mechanism-state-resolved
title: >
  Which microscopic emission pathway dominates single-bubble sonoluminescence—collisional thermal plasma bremsstrahlung, molecular recombination chemiluminescence, or dissolved noble-gas chemistry — when state-resolved spectra and timing are measured across diverse driving gases and dissolved species?
status: open
priority: medium
disciplines:
  - physics
  - chemistry
summary: >
  Reviews summarize competing hypotheses; definitive separation requires correlated ultrafast spectroscopy, spatially resolved diagnostics, and interior equation-of-state constraints consistent with fluid collapse modeling.
systematic_gaps:
  - Joint streak cameras + spectrometers + synchronized radius interferometry on identical bubbles
  - Noble-gas isotope sweeps isolating chemistry versus thermal pathways
suggested_hypotheses:
  - h-spectral-linewidth-scales-with-collapse-shock-mach-estimate
related_bridges:
  - b-sonoluminescence-x-acoustic-cavitation-collapse
last_reviewed: "2026-05-07"
references:
  - doi: "10.1103/RevModPhys.74.425"
    note: Consolidated experimental phenomenology and modeling debates

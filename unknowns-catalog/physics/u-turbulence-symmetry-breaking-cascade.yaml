id: u-turbulence-symmetry-breaking-cascade
title: Does turbulent transition in shear flows proceed as a succession of distinct symmetry-breaking events, each belonging to a different universality class?
status: open
priority: medium
disciplines:
  - fluid-dynamics
  - statistical-physics
  - nonlinear-dynamics
summary: >
  The laminar-turbulent transition in boundary layers and pipe flows has long been
  described as a single subcritical bifurcation, but recent evidence suggests a
  richer picture. A 2025 preprint (arXiv 2510.27046) demonstrates in Taylor-Couette
  flow that the transition can be decomposed as a succession of temporal and spatial
  symmetry breakings - first time-translational symmetry breaks (temporal chaos onset),
  then spatial translational symmetry (pattern formation), then rotational symmetry
  (turbulent bursting). The critical question is whether each of these symmetry-breaking
  steps belongs to a distinct universality class (e.g., directed percolation, DP2,
  Ising, XY) or whether a single underlying universality class governs the full
  transition. This would determine whether the same renormalization group framework
  applies across all wall-bounded shear flows.
systematic_gaps:
  - Critical exponents of the temporal symmetry-breaking step in boundary layer transition have not been measured.
  - Whether the spatial symmetry-breaking step belongs to directed percolation (as in pipe flow) or a different universality class is unknown.
  - No RG calculation exists for the successive symmetry-breaking route to turbulence.
suggested_hypotheses:
  - Each successive symmetry-breaking step in shear-flow transition belongs to the directed percolation universality class in d+1 dimensions, where d is the spatial symmetry dimension.
related_unknowns:

id: u-quantum-noise-figure-silicon-mm-wave-cryo-vs-room
title: >
  At mm-wave frequencies, when does the Caves/Haus quantum-added noise floor materially alter achievable noise figure
  in silicon LNAs relative to classical Johnson–Nyquist budgets — as a function of temperature, gain, and bandwidth?
status: open
priority: medium
disciplines:
  - electrical-engineering
  - quantum-physics
summary: >
  Cryogenic radio astronomy receivers routinely approach quantum limits; consumer mm-wave silicon operates warm where
  thermal noise dominates. Crossover frequencies and gain regimes where engineering practice must adopt quantum NF
  accounting are not universally documented for CMOS SOI nodes.
systematic_gaps:
  - Sparse vendor data separating correlated substrate noise from quantum noise floors in packaged arrays.
  - Nonlinear distortion versus quantum noise in multi-carrier mm-wave links remains empirically tangled.

suggested_hypotheses:

id: u-climate-ew-indicator-universality
title: >
  Do climate tipping element early-warning indicators (AR1, variance, spatial
  correlation length) follow the universal scaling exponents predicted by their
  respective bifurcation class, and which statistical test is most sensitive for
  detecting approach to each tipping point in available satellite and instrumental data?
status: open
priority: critical
last_reviewed: "2026-05-04"
disciplines:
  - climate-science
  - statistical-physics
  - dynamical-systems
  - remote-sensing
summary: >
  Climate early-warning indicators (EWIs) — rising lag-1 autocorrelation (AR1),
  rising variance, and growing spatial correlation length — have been observed
  empirically in Amazon vegetation data, Arctic sea ice extent, and AMOC
  fingerprints. These are theoretically predicted by dynamical systems bifurcation
  theory near a fold transition (critical slowing down).

  What is not known:
  1. **Which bifurcation class** each tipping element belongs to (fold, second-order,
     subcritical Hopf, transcritical). The class determines which EWI is most sensitive
     and which exhibits false positives. Applying AR1 to a Hopf bifurcation gives a
     qualitatively different signature than to a fold.

  2. **Whether the EWI scaling exponents are universal** — for a fold bifurcation,
     the AR1 should scale as 1 - c*(mu_c - mu)^(1/2) approaching threshold, and the
     variance should diverge as (mu_c - mu)^(-1). The exponents 1/2 and -1 are
     universal for fold bifurcations regardless of climate details. These exponents
     have never been measured from climate data and compared to theoretical predictions.

  3. **Whether spatial EWIs outperform temporal EWIs** for detection. The spatial
     correlation length should diverge as (mu_c - mu)^(-nu) with nu=1 for mean-field
     (appropriate for large-scale climate systems). Satellite spatial data (MODIS NDVI,
     AMSR sea ice) has existed since 2000 and could provide 25 years of spatial EWI
     time series — but the spatial correlation length has only been computed for a
     handful of climate variables.

  4. **Optimal detection**: Bayesian change-point detection, likelihood ratio tests,
     and the CUSUM statistic all have known statistical power near bifurcation points.
     Climate EWI detection currently uses informal trend tests — importing optimal
     detection theory from signal processing would give rigorous p-values for "the
     Amazon is approaching its tipping point."
systematic_gaps:
  - Bifurcation class has not been formally assigned to each IPCC tipping element using dynamical systems analysis
  - AR1 and variance scaling exponents approaching tipping have not been measured from climate data and compared to bifurcation-class predictions
  - Spatial correlation length of Amazon NDVI and Arctic sea ice has not been computed as a time series to test for divergence
  - Optimal statistical detection theory has not been applied to determine minimum detectable warning time for each tipping element

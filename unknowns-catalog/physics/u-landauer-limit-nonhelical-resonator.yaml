id: u-landauer-limit-nonhelical-resonator
title: >
  What is the minimum energy dissipated per logically irreversible bit operation when storing or resetting classical electromagnetic state in high-Q non-helical cavity resonators at temperature T?
status: open
priority: high

summary: >
  Landauer’s limit applies to logically irreversible erasure of information. High-Q resonators may reduce
  incidental dissipation (ohmic loss, radiation) but do not automatically eliminate Landauer cost for
  erasure. This unknown seeks calibrated experiments separating thermal noise, control electronics, and
  informational erasure in resonator-based memories.

systematic_gaps:
  - "Few protocols that explicitly count bits erased vs logically reversible steps in RF hardware."
  - "Difficulty isolating Landauer-scale heat from larger refrigerator load and amplifier noise."
  - "Limited cryogenic RF thermometry tied to computational primitives."

suggested_hypotheses:
  - h-nonhelical-resonator-adiabatic-quantum-memory


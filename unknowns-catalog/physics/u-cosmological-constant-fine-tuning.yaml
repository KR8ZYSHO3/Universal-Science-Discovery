id: u-cosmological-constant-fine-tuning
title: "Why is the cosmological constant (dark energy density) 10^120 times smaller than quantum field theory predicts — is this a fine-tuning problem, an anthropic selection effect, or evidence of new physics?"
status: open
priority: high
disciplines:
  - cosmology
  - quantum-field-theory
  - theoretical-physics
summary: >
  The cosmological constant Lambda (dark energy density) is measured to be
  ~10^{-47} GeV^4 from cosmic acceleration. Quantum field theory predicts vacuum
  energy density from zero-point fluctuations of all quantum fields to be ~M_Planck^4
  ~10^{74} GeV^4, creating a discrepancy of ~10^{120} (the "cosmological constant
  problem"). Weinberg (1987) proposed an anthropic solution: only universes where
  Lambda is small enough to allow galaxy formation are observed (anthropic selection).
  The landscape of string theory provides a statistical ensemble where different
  values of Lambda are realized in different "pocket universes" (eternal inflation).
  However, no mechanism for precise cancellation of QFT vacuum energy has been found,
  and anthropic solutions require a multiverse that cannot be tested directly.
  Supersymmetry (SUSY) cancels bosonic/fermionic contributions but predicts a smaller
  residual that is still 60 orders of magnitude larger than observed. This remains
  the deepest unsolved problem in fundamental physics.
systematic_gaps:
  - No known mechanism cancels QFT vacuum energy to the observed precision without fine-tuning
  - The anthropic/landscape explanation requires a multiverse with no direct observational test
  - Whether SUSY or other BSM physics provides a technically natural solution is unknown
suggested_hypotheses:
  - A new scalar field with negative vacuum energy contribution and coupling to Standard Model particles (quintessence) partially cancels QFT vacuum energy dynamically, leaving a residual Lambda(t) that varies slowly with cosmic time, detectable as w(z) ≠ -1 in DESI baryon acoustic oscillation measurements at z < 2
related_unknowns:

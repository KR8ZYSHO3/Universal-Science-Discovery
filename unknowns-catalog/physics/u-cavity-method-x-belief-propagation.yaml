id: u-cavity-method-x-belief-propagation
title: Can the cavity method (replica symmetry breaking) predict exact thresholds for computational phase transitions in random
  graphical inference problems, and do these thresholds match information-theoretic limits?
status: open
priority: high
disciplines:
- physics
- computer_science
- mathematics
summary: The cavity method (1RSB, 2RSB, full RSB) provides conjectured exact thresholds for random CSP phase transitions (satisfiability
  threshold, clustering threshold, freezing threshold). These are proven in some cases (random k-SAT for large k) but remain
  conjectural in general. Whether computational thresholds (where DPLL fails) always coincide with information-theoretic thresholds
  (where optimal inference fails) is the central open problem connecting statistical physics and computational complexity.
systematic_gaps:
- The RSB prediction for random 3-SAT threshold (≈4.267) is unproven; upper and lower bounds are still separated
- Whether the algorithmic hardness threshold coincides with the information-theoretic threshold for random CSPs is open
- The cavity method is non-rigorous; its predictions require independent mathematical proof for each problem class

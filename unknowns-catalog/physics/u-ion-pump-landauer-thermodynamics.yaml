id: u-ion-pump-landauer-thermodynamics
title: Do biological ion pumps (Na/K-ATPase, Ca-ATPase) operate as Landauer information-erasure engines, and how close are they to the thermodynamic efficiency limit?
status: open
priority: high
disciplines:
  - biophysics
  - information-thermodynamics
  - statistical-physics
  - cell-biology
summary: >
  A 2025 preprint (arXiv 2506.11248) develops the information thermodynamics of
  cellular ion pumps, framing the Na+/K+-ATPase and related pumps as systems that
  simultaneously perform mechanical work (ion transport against electrochemical
  gradient) and information processing (distinguishing ion species, gating transitions).
  The Landauer limit sets a minimum energy cost per bit of information erased; for a
  pump that distinguishes Na+ from K+ (one bit), this is k_B*T*ln(2) ~ 0.017 eV at
  310 K. Real Na/K-ATPase hydrolyzes ATP (0.5 eV per molecule) to transport 3 Na+
  and 2 K+. The gap between the Landauer limit and actual ATP consumption suggests
  enormous room for efficiency improvement - but whether this gap reflects irreducible
  physical constraints (kinetic proofreading, conformational change costs) or
  evolutionary sub-optimality is unknown. No systematic framework exists to separate
  the "information cost" from the "mechanical work cost" of ion pumping.
systematic_gaps:
  - The information-theoretic contribution to ATP consumption in Na/K-ATPase (distinguishing Na+ from K+) has not been isolated from the mechanical work contribution.
  - Whether ion pump efficiency is limited by kinetic proofreading error rates (Hopfield 1974) or by other physical constraints is unknown.
  - The efficiency of Ca2+-ATPase and H+-ATPase relative to their respective Landauer limits has not been computed.
suggested_hypotheses:
  - The ATP consumption of Na/K-ATPase exceeds the mechanical work minimum by exactly the amount predicted by the kinetic proofreading thermodynamic cost for 99.99% ion specificity.

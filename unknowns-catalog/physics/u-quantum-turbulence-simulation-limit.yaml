id: u-quantum-turbulence-simulation-limit
title: Can end-to-end quantum simulation of turbulence reveal universality classes or transport mechanisms that are computationally inaccessible to classical methods?
status: open
priority: high
disciplines:
  - quantum-computing
  - fluid-dynamics
  - statistical-physics
  - complex-systems
summary: >
  Classical direct numerical simulation (DNS) of high-Reynolds turbulence requires
  resolving scales spanning many orders of magnitude, scaling as Re^(9/4) in 3D - quickly
  reaching petascale limits. A 2025 preprint (arXiv 2508.05346) introduces a "quantum
  turbuloscope" framework demonstrating an end-to-end quantum simulation pipeline for
  the incompressible Euler equations via quantum lattice gas automata. The key open
  question is whether such quantum simulation approaches can access turbulence
  statistics (energy spectra, intermittency corrections, structure functions) in regimes
  where classical DNS is intractable, and whether quantum encodings of the velocity
  field reveal hidden mathematical structures (entanglement signatures of eddies,
  quantum phase transitions in the energy cascade) invisible to classical methods.
  No experiment has yet demonstrated quantum advantage for any continuous fluid mechanics
  problem above toy scale.
systematic_gaps:
  - No quantum algorithm has demonstrated advantage for computing turbulence statistics above Re ~ 10^3 in 3D.
  - The encoding of continuous turbulence fields into qubit registers without exponential overhead remains an open problem.
  - It is unknown whether the Kolmogorov -5/3 spectrum has a quantum information interpretation (e.g., as entanglement entropy scaling).
  - Quantum error correction overhead for fluid simulation at practical Reynolds numbers has not been estimated.
suggested_hypotheses:
  - The Kolmogorov energy cascade corresponds to a specific entanglement growth pattern in the quantum state representation of the velocity field.
  - Quantum simulation of the Euler equations at Re ~ 10^6 requires fewer qubits than classical DNS requires floating-point operations.
related_unknowns:
  - u-turbulence-market-reynolds-analogue

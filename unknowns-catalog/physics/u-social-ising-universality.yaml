id: u-social-ising-universality
title: >
  Do empirical social tipping events — norm cascades, political phase transitions,
  market crashes — exhibit early-warning indicators and scaling exponents consistent
  with the Ising universality class, and which universality class best describes
  opinion dynamics on real social networks?
status: open
priority: high
last_reviewed: "2026-05-04"
disciplines:
  - social-science
  - statistical-physics
  - complexity-science
  - political-science
summary: >
  Theoretical models of opinion dynamics (Voter Model, majority rule, bounded
  confidence) all belong to the Ising universality class or close relatives on
  mean-field networks. The Ising 2D universality class has known critical exponents:
  nu=1 (correlation length), beta=1/8 (order parameter), gamma=7/4 (susceptibility).
  For mean-field (infinite-range) networks, the exponents are nu=1/2, beta=1/2
  (classical mean-field).

  Real social networks are neither 2D lattices nor fully connected mean-field graphs
  — they are heterogeneous networks with community structure, degree heterogeneity,
  and time-varying edges. The appropriate universality class for opinion dynamics on
  a scale-free social network has been computed theoretically but never measured
  empirically from attitude survey data.

  **The gap**: 40+ years of longitudinal survey data (ANES, ISSP, Gallup) provides
  time series of population opinion distributions across hundreds of social issues.
  For issues that underwent rapid norm adoption (same-sex marriage 1990-2015,
  smoking bans 1990-2010, face mask usage 2020), the opinion time series should
  show rising AR1 and variance before the tipping event — exactly the Ising EWIs
  before T_c. The critical exponents of the transition could be measured from
  the scaling of the AR1 and variance as a function of distance from the tipping
  point. No study has attempted this.
systematic_gaps:
  - AR1 and variance have not been computed from longitudinal attitude surveys to detect EWIs before documented social tipping events
  - The Ising universality class exponents have not been measured from empirical social tipping data
  - The universality class of opinion dynamics on real social network topologies (Facebook, Twitter, ANES geographic networks) has not been empirically determined
  - The coupled social-physical tipping point system (climate action social tipping coupled to climate physical tipping) has not been modelled with a shared bifurcation framework

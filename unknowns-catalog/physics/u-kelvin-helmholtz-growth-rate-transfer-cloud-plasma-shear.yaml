id: u-kelvin-helmholtz-growth-rate-transfer-cloud-plasma-shear
title: >
  Can Kelvin-Helmholtz growth-rate normalizations transfer between stratified atmospheric cloud billows and magnetized plasma shear layers once field-aligned tension, compressibility, and diagnostic resolution are explicitly modeled?
status: open
priority: medium
disciplines:
  - physics
  - atmospheric-science
summary: >
  This is an open bridge question, not a finding. Existing stability theory gives common mathematical structure, but cross-domain calibration from visible billows to plasma edge modes has not been benchmarked on paired simulation ensembles.
systematic_gaps:
  - Paired nondimensional parameter sweeps with comparable shear thickness and density contrast.
  - Image-to-mode extraction methods that report uncertainty on billow wavelength and growth rate.
suggested_hypotheses:
  - h-kh-growth-rate-normalization-predicts-billow-plasma-onset
related_bridges:
  - b-kelvin-helmholtz-cloud-billows-x-plasma-shear-instability
last_reviewed: "2026-05-07"
references:
  - url: "https://doi.org/10.1017/CBO9780511624063"
    note: Drazin and Reid textbook treatment of hydrodynamic stability, including shear instabilities.

id: u-anderson-localization-biological-systems
title: "Does Anderson localization of vibrational modes in disordered protein networks affect protein allostery and signal propagation, and can it be detected experimentally?"
status: open
priority: medium
disciplines:
  - biophysics
  - condensed-matter
  - structural-biology
summary: >
  Anderson localization (1958) predicts that in sufficiently disordered systems,
  wave functions (or vibrational modes) become spatially localized rather than
  extended. In 3D systems, localization occurs for strong disorder; in 1D and 2D,
  all states are localized for any disorder. Proteins are disordered elastic networks:
  their normal modes span from collective (low-frequency, extended) to local
  (high-frequency, localized) vibrations. The localization transition in protein
  networks is hypothesized to control: (1) allosteric signal propagation — signals
  transmitted via extended (delocalized) modes propagate long distances; signals
  transmitted via localized modes are spatially restricted; (2) conformational change
  pathways — transitions between protein states preferentially use delocalized modes.
  This would mean that allostery is governed by the localization length of relevant
  vibrational modes, which in turn depends on local sequence disorder (B-factor
  distribution). No experiment has tested whether the Anderson localization transition
  in protein elastic networks correlates with allosteric efficiency across protein families.
systematic_gaps:
  - The disorder strength required for Anderson localization in protein elastic networks has not been computed
  - Whether allosteric proteins have more delocalized normal modes than non-allosteric proteins is not established
  - The relationship between B-factors (crystallographic disorder) and mode localization length has not been quantified
suggested_hypotheses:
  - Allosteric proteins show a higher fraction of delocalized normal modes (participation ratio > 0.1 N) than non-allosteric proteins of similar size, predictable from elastic network models using only B-factor data from crystal structures
related_unknowns:
  - u-protein-folding-thermodynamics-kinetics
references:

id: u-standard-model-beyond-hierarchy-dark-matter-identity
title: What lies beyond the Standard Model — what resolves the hierarchy problem, what is dark matter, and what mechanism generates the matter-antimatter asymmetry of the universe?
status: open
priority: critical
disciplines:
  - particle-physics
  - cosmology
  - theoretical-physics
summary: >
  The Standard Model is spectacularly successful but explicitly incomplete. Three open
  questions define the frontier: (1) The hierarchy problem — why is the Higgs mass
  125 GeV (not 10^16 GeV as radiative corrections suggest)? Supersymmetry, extra dimensions,
  and composite Higgs models all propose solutions, but none has been confirmed at the LHC.
  (2) Dark matter identity — 27% of the universe's energy density is dark matter, but no
  WIMP (weakly interacting massive particle) has been detected in 30 years of direct
  detection experiments (LUX-ZEPLIN, PandaX). Axions, sterile neutrinos, and primordial
  black holes remain viable. (3) Baryogenesis — the universe has ~10^9 more baryons than
  antibaryons, but the Standard Model's CP violation is insufficient by 10 orders of
  magnitude to explain this asymmetry. New physics at the electroweak scale (leptogenesis,
  electroweak baryogenesis) is required but undetected.
systematic_gaps:
  - The LHC has found no supersymmetric particles up to ~2 TeV — but the full SUSY
    parameter space extends to much higher masses inaccessible to current colliders.
  - Direct dark matter detection has excluded the canonical WIMP cross-section by 3 orders
    of magnitude but cannot exclude all viable dark matter candidates.
  - The source of CP violation needed for baryogenesis has not been identified in any
    experiment — neutrino CP violation measurement (T2K, NOvA, DUNE) is the most promising
    near-term probe.

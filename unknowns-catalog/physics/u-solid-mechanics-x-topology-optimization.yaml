id: u-solid-mechanics-x-topology-optimization
title: Does topology optimization with fine mesh resolution converge to the true Michell truss solution in the continuum limit, and can this convergence be proven mathematically with explicit convergence rates for SIMP and level-set methods?
status: open
priority: medium
disciplines:
  - physics
  - mathematics
  - engineering
summary: >
  Michell (1904) characterized optimal truss structures analytically; SIMP topology
  optimization numerically approximates the continuum limit. Whether SIMP with decreasing
  mesh size h → 0 converges to the Michell solution is not proven for general load cases
  beyond simple ones (single-load cantilever). The checkerboard instability (spurious
  periodic material patterns) in SIMP without filtering represents a non-convergent
  discretization artifact. The mathematical relationship between discrete SIMP solutions
  and the continuous shape calculus formulation (Allaire-Jouve-Toader) has not been
  established with explicit convergence rates.
systematic_gaps:
  - No convergence proof for SIMP to Michell truss in h→0 limit for multi-load case problems
  - The effect of penalization exponent p and filter radius on the quality of the continuum limit is only empirically understood
  - Topology optimization for non-linear materials (plasticity, hyperelasticity) lacks the mathematical foundation of the linear case
related_bridges:

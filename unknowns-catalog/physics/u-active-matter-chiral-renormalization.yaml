id: u-active-matter-chiral-renormalization
title: What are the renormalization group fixed points and universality class of polar chiral active matter, and do they differ from achiral active matter?
status: open
priority: medium
disciplines:
  - statistical-physics
  - active-matter
  - soft-condensed-matter
  - biophysics
summary: >
  A 2025 preprint (arXiv 2512.01884) derives renormalized hydrodynamics for polar
  chiral active matter - systems of self-propelled particles with internal chirality
  (rotating motion), such as rotating bacteria, cilia fields, and rotating colloidal
  particles. Chirality breaks time-reversal and parity symmetries simultaneously,
  creating new universality classes absent in equilibrium or achiral active systems.
  The preprint identifies spectral scaling and vortex clustering as signatures of the
  RG fixed point. However, the full universality class (critical exponents, anomalous
  dimensions) of polar chiral active matter has not been established, nor whether it
  reduces to known classes (XY, Toner-Tu, KPZ) in appropriate limits. This matters
  for predicting collective motion of biological chiral systems (flagellar bundles,
  rotating cells, chiral liquid crystals in developing embryos).
systematic_gaps:
  - The universality class (critical exponents) of polar chiral active matter has not been computed to two-loop order in the renormalization group.
  - Whether chirality is a relevant or irrelevant perturbation at the Toner-Tu fixed point has not been established.
  - The crossover between chiral and achiral active matter universality classes as a function of chirality magnitude has not been mapped.
suggested_hypotheses:
  - Chiral symmetry is a relevant perturbation at the Toner-Tu fixed point, so polar chiral active matter belongs to a distinct universality class with anomalous scaling exponents differing from Toner-Tu by O(epsilon) corrections.
related_unknowns:
  - u-active-matter-percolation

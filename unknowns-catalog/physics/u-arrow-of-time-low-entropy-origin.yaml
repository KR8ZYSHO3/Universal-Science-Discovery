id: u-arrow-of-time-low-entropy-origin
title: Why did the universe begin in an extraordinarily low-entropy state, and which physical mechanism (quantum gravity, anthropic selection, or cyclic cosmology) explains the thermodynamic arrow?
status: open
priority: high
disciplines:
  - cosmology
  - thermodynamics
  - statistical-mechanics
  - quantum-gravity
summary: >
  The second law of thermodynamics is empirically rock-solid: entropy increases.
  But this requires that the universe began with entropy far below its maximum
  possible value. Boltzmann's original explanation (a spontaneous fluctuation)
  predicts a "Boltzmann brain" universe — a single observer fluctuating into
  existence with false memories — far more likely than our observed ordered universe.
  Modern alternatives include: Penrose's Weyl curvature hypothesis (gravitational
  degrees of freedom were suppressed at the Big Bang); Carroll-Chen eternal inflation
  (baby universes spontaneously nucleate with low entropy); and conformal cyclic
  cosmology (the end of one aeon provides the initial condition for the next).
  None of these is experimentally confirmed. The origin of the thermodynamic arrow
  remains the deepest unexplained asymmetry in physics.
systematic_gaps:
  - No mechanism derivable from time-symmetric fundamental laws explains why the initial condition was low entropy rather than high entropy.
  - Boltzmann's fluctuation hypothesis predicts an overwhelmingly probable universe of Boltzmann brains rather than the observed ordered cosmos.
  - Penrose's Weyl curvature hypothesis is geometrically motivated but has no derivation from quantum gravity.
  - Landauer's principle connects information erasure to entropy but does not explain the low-entropy boundary condition.
  - CMB tests of CCC (Penrose) claim both positive and negative results with disputed statistical significance.
suggested_hypotheses:
  - h-landauer-cosmological-arrow

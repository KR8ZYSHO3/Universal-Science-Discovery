id: u-landau-theory-neural-criticality-order-parameter
title: "What is the order parameter for neural phase transitions — is it population firing rate, synaptic strength distribution, or a topological quantity — and which Landau universality class does it belong to?"
status: open
priority: high
disciplines:
  - neuroscience
  - statistical-physics
  - condensed-matter
summary: >
  Landau-Ginzburg-Wilson theory predicts that any continuous phase transition can
  be described by an order parameter phi that vanishes in the disordered phase.
  Neural criticality is widely studied (Beggs & Plenz 2003, Chialvo 2010), but
  the identity of the neural order parameter remains contested:
  (1) Population firing rate: the mean-field Hopfield network has a magnetization-like
  order parameter, predicting Ising universality class;
  (2) Neuronal avalanche size distribution exponent: measured to be -3/2 (Beggs & Plenz),
  consistent with mean-field directed percolation or the BTW sandpile;
  (3) Synaptic weight distribution: recent work (Hiratani & Fukai 2018) suggests
  log-normal synaptic weights may be the order parameter for a spin-glass transition;
  (4) Topological order: graph-theoretic measures of connectome topology (Betti numbers)
  may identify a topological phase transition.
  Without knowing the order parameter, we cannot identify the universality class,
  predict scaling exponents, or design perturbation experiments to test criticality theory.
  The Landau framework provides the machinery to answer this question if the order
  parameter can be identified.
systematic_gaps:
  - No consensus on the neural order parameter; four competing candidates with different experimental signatures
  - Whether neural criticality belongs to equilibrium universality classes (Ising, XY) or non-equilibrium classes (directed percolation, KPZ) is unresolved
  - Whether the neural "critical point" is a true fixed point or a crossover region has not been tested with finite-size scaling
suggested_hypotheses:
  - The neural order parameter is the variance of population firing rate fluctuations, and neural criticality belongs to the mean-field Ising universality class, with susceptibility chi ~ |T-T_c|^{-1} where T = E/I ratio (excitation-to-inhibition balance)

id: u-fluctuation-theorem-biological-motors
title: How close are biological molecular motors (kinesin, ATP synthase) to thermodynamic optimality as defined by fluctuation theorems, and how do they navigate the efficiency-speed tradeoff?
status: open
priority: medium
disciplines:
  - biophysics
  - statistical-physics
  - information-theory
summary: >
  Fluctuation theorems set thermodynamic bounds on the efficiency of nanoscale machines.
  Kinesin achieves ~25% thermodynamic efficiency (relative to maximum Carnot efficiency)
  while ATP synthase reaches ~90%. Key unknowns: (1) what design principles allow ATP
  synthase to approach thermodynamic optimality while kinesin does not, (2) does the
  Crooks fluctuation theorem predict the observed force-velocity relationship for
  molecular motors under load, (3) can thermodynamic uncertainty relations (TUR)
  predict the power-efficiency-noise tradeoff in biological motor arrays, (4) is
  the apparent sub-optimality of kinesin an evolutionary compromise for other
  functions (processivity, regulation)?
systematic_gaps:
  - Single-molecule fluctuation measurements in physiological crowded environments are limited
  - Thermodynamic uncertainty relation predictions for motor arrays in cells are untested
  - The full trajectory distribution P(W) for motor steps has not been measured with sufficient resolution
related_bridges:
  - b-stochastic-thermodynamics-fluctuation-theorems
last_reviewed: "2026-05-07"

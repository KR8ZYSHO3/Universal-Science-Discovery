id: u-gravitational-wave-memory-effect
title: "Has the gravitational wave memory effect (permanent spacetime displacement after a wave passes) been detected, and does it match general relativistic predictions?"
status: open
priority: medium
disciplines:
  - gravitational-wave-physics
  - general-relativity
  - astrophysics
summary: >
  The gravitational wave memory effect (Zeldovich & Polnarev 1974; Christodoulou 1991)
  predicts that after a gravitational wave passes, spacetime does not return to its
  original state — a permanent displacement delta_h remains (linear and nonlinear memory).
  This differs from oscillatory GW signals: memory is a monotonically growing strain
  during the wave burst. LIGO/Virgo have detected oscillatory GW signals from binary
  mergers (GW150914 etc.), but the memory effect has not been confirmed in individual
  events because: (1) it produces low-frequency signals (below LIGO's sensitive band);
  (2) the accumulated memory from many events may be detectable by Pulsar Timing Arrays
  (PTA). NANOGrav's 2023 signal is consistent with a stochastic GW background, which
  could contain memory contributions. The theoretical prediction for memory amplitude
  from binary mergers is precise (Favata 2009), but no individual memory event has
  been detected. LISA (space-based GW detector) will be sensitive to memory from
  supermassive BH mergers.
systematic_gaps:
  - Individual GW memory events have not been detected; only upper limits from LIGO
  - Whether NANOGrav's stochastic GW background contains memory contributions is not analyzed
  - The nonlinear (Christodoulou) memory contribution to binary merger signals has not been separated from the linear memory
suggested_hypotheses:
  - The cumulative gravitational wave memory from 3rd-generation detector (Einstein Telescope) detections at z<1 will produce a detectable low-frequency stochastic background with strain amplitude h_c ~ 10^{-18} at 10^{-4} Hz, distinguishable from astrophysical noise by its spectral shape
related_unknowns:
  - u-arrow-of-time-low-entropy-origin
references:
  - doi: "10.1103/PhysRevD.80.024016"
    note: "Favata (2009) PRD - gravitational wave memory from binary mergers"
last_reviewed: "2026-05-05"

id: u-quantum-glass-learning-efficiency
title: Does quantum glassiness impose fundamental computational hardness limits on machine learning that no classical statistical mechanics framework can predict?
status: open
priority: high
disciplines:
  - quantum-information
  - statistical-physics
  - machine-learning
  - spin-glasses
summary: >
  A 2025 preprint (arXiv 2505.00087) demonstrates "quantum glassiness from efficient
  learning" - the existence of quantum spin-glass phases that can be efficiently learned
  (low sample complexity) but are computationally hard to simulate classically. This
  creates a new regime between efficiently learnable and efficiently simulable, with
  implications for both quantum advantage in machine learning and the computational
  complexity of glass transitions. The open question is whether the quantum glass phase
  boundary (in the learning sample complexity vs. system size plane) corresponds to a
  known quantum complexity class boundary (e.g., BQP/NP), and whether classical spin-
  glass theory (replica method, TAP equations) systematically fails to predict
  properties of systems in the quantum glass phase. This would establish a rigorous
  bridge between quantum computational complexity and the physics of disordered systems.
systematic_gaps:
  - The computational complexity class of sampling from quantum glass phases has not been established (is it in BQP, QMA, or beyond?).
  - Whether classical replica theory predicts the wrong phase boundary for quantum spin glasses (due to quantum tunneling between replicas) has not been verified numerically.
  - The connection between quantum glassiness and trainability (barren plateaus) in quantum neural networks has not been established.
suggested_hypotheses:
  - Quantum spin glasses exhibiting RSB have barren plateau-free training landscapes despite classical spin-glass analogues being computationally intractable to sample.
  - The quantum glass transition corresponds to a transition from BQP-easy to QMA-hard in the learning complexity landscape.

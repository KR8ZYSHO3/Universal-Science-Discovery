id: u-replica-boltzmann-machine-glass
title: Does replica symmetry breaking in spherical Boltzmann machine ensembles predict the same generalization-to-memorization transition as in spin glasses, with the same critical exponents?
status: open
priority: high
disciplines:
  - statistical-physics
  - machine-learning
  - spin-glasses
  - information-theory
summary: >
  A 2026 preprint (arXiv 2604.17936) derives a replica theory for ensembles of
  spherical Boltzmann machines - statistical mechanics of Boltzmann machines over
  a spherical constraint manifold, which are exactly solvable using the replica method.
  The theory predicts phase transitions in the learning landscape that mirror spin-glass
  phase transitions, including a replica-symmetry-breaking (RSB) transition at a critical
  temperature corresponding to the onset of overfitting/memorization. The open question
  is whether this RSB transition shares critical exponents with the Sherrington-Kirkpatrick
  (SK) spin glass or the Hopfield model, and whether the same replica calculation predicts
  generalization error in real (non-spherical) deep neural networks via a universality
  argument. If so, spin-glass theory would provide a first-principles prediction of
  memorization thresholds in deep learning.
systematic_gaps:
  - The critical exponents of the RSB transition in spherical Boltzmann machines have not been computed and compared to the SK spin glass.
  - Whether the RSB transition persists in non-spherical (sigmoid, ReLU) Boltzmann machines, or is an artifact of the spherical constraint, is unknown.
  - The relationship between RSB onset and the grokking transition in deep networks has not been established.
suggested_hypotheses:
  - The RSB transition in the spherical Boltzmann machine belongs to the same universality class as the SK spin glass, with Gardner transition exponents.
  - The memorization threshold in deep neural networks is predicted by the SK spin-glass capacity formula with an effective temperature equal to the inverse learning rate.

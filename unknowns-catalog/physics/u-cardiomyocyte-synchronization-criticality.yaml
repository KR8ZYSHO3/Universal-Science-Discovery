id: u-cardiomyocyte-synchronization-criticality
title: Is synchronization of cardiomyocytes governed by a critical phase transition in an elastic coupling network, and does this predict arrhythmia onset as a loss of criticality?
status: open
priority: high
disciplines:
  - biophysics
  - statistical-physics
  - cardiology
  - nonlinear-dynamics
summary: >
  A 2026 preprint (arXiv 2604.13391) proposes a "dynamical theory of elastic
  synchronization" for cardiomyocytes in which mechanical coupling through the
  extracellular matrix mediates synchrony between individually oscillating cardiac
  cells. The theory predicts a sharp transition between synchronized and desynchronized
  states as a function of elastic stiffness and coupling range - analogous to the
  Kuramoto model for coupled oscillators. However, the universality class of this
  synchronization transition, and whether the heart operates near criticality (as
  hypothesized for the brain), remain unknown. If cardiac muscle operates near a
  critical point in its elastic synchronization phase diagram, arrhythmia might
  correspond to crossing a phase boundary, with detectable early-warning indicators
  (rising variance, critical slowing) before arrhythmia onset.
systematic_gaps:
  - Whether the heart operates near criticality in its synchronization phase diagram has not been established by measuring critical slowing-down indicators in healthy cardiac tissue.
  - The universality class of the elastic synchronization transition (Ising, XY, Kuramoto) has not been determined.
  - Pre-arrhythmic early-warning indicators derived from elastic synchronization theory have not been tested against clinical ECG data.
suggested_hypotheses:
  - Arrhythmia onset is preceded by measurable critical slowing-down (rising AR1 coefficient of inter-beat intervals) within 2-5 minutes, consistent with proximity to the synchronization critical point.

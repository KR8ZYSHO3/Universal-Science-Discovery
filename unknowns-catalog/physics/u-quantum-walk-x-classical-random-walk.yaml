id: u-quantum-walk-x-classical-random-walk
title: Can continuous-time quantum walks on arbitrary graphs be efficiently simulated classically for graphs with special structure, and for which graph families does quantum walk provide provable (not just conjectured) exponential speedup over classical random walk?
status: open
priority: high
disciplines:
  - physics
  - computer_science
  - mathematics
summary: >
  Quantum walk provides quadratic speedup for unstructured spatial search (Grover-like),
  but exponential speedup has been claimed for specific graph families (glued trees,
  NAND trees). The class of problems for which quantum walk provides provable exponential
  speedup is not characterized — it depends on the graph structure, oracle type, and
  whether the speedup is worst-case or average-case. The boundary between classically
  simulable quantum walks (e.g., on trees, which can be simulated by tensor network
  methods) and genuinely hard quantum walks is not understood, which limits the design
  of useful quantum walk algorithms.
systematic_gaps:
  - No complete characterization of graph families for which quantum walk search achieves provable exponential speedup
  - Classical simulation complexity of quantum walk on random graphs with small treewidth is not established
  - Experimental demonstration of quantum walk speedup on actual quantum hardware for problem sizes beyond classical simulation has not been achieved

id: u-topological-qec-physical-realization
title: Which condensed-matter systems currently in the laboratory are in the toric-code (Z2 topological) phase, and can their topological entanglement entropy be measured to confirm they function as physical quantum error-correcting codes?
status: open
priority: critical
disciplines:
  - condensed-matter-physics
  - quantum-information
  - topological-phases
summary: >
  Kitaev's toric code establishes a mathematical identity between topological quantum
  error correction and Z2 topological phases of matter. Physical systems in this
  phase are simultaneously quantum error-correcting codes. Candidates include:
  Z2 quantum spin liquids (alpha-RuCl3, H3LiIr2O6, various frustrated magnets),
  Majorana-based platforms (InAs/Al heterostructures, Josephson junction arrays),
  and the nu=5/2 fractional quantum Hall state.

  The unknown is operational: which of these systems, under which conditions,
  genuinely exhibit the topological ground-state degeneracy, fractional anyon
  statistics, and topological entanglement entropy (gamma = ln 2) required for
  toric-code physics? Many candidate systems have contested experimental signatures.
  Microsoft's topological qubit announcement (2023) was retracted following
  reproducibility concerns. No unambiguous laboratory realization of a toric-code
  topological phase with confirmed anyon exchange statistics exists as of 2026.
systematic_gaps:
  - Topological entanglement entropy measurement requires preparing large-scale entangled states — current platforms cannot unambiguously measure gamma = ln 2 for candidate spin liquids.
  - Anyon braiding experiments (confirming fractional statistics) require controlling individual anyon positions, which no current platform has demonstrated.
  - The alpha-RuCl3 Kitaev spin liquid candidate has contested neutron scattering signatures; the fractionalized excitation interpretation remains disputed.
  - Fracton topological phases (Haah code) have no known physical realization and no predicted condensed-matter Hamiltonian.

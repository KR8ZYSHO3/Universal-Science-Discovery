id: u-acoustic-metamaterials-x-negative-refraction
title: Can acoustic superlensing (sub-diffraction focusing using double-negative acoustic metamaterials) be achieved at biologically relevant frequencies (1-20 MHz ultrasound) with sufficient bandwidth and resolution to image sub-cellular structures in living tissue?
status: open
priority: high
disciplines:
  - physics
  - materials-science
  - medicine
summary: >
  Acoustic superlenses using double-negative metamaterials have been demonstrated at
  ultrasonic frequencies in laboratory settings with sub-wavelength resolution (~λ/10).
  Clinical ultrasound imaging operates at 1-20 MHz with wavelengths of 0.075-1.5 mm
  in tissue; achieving λ/10 resolution would enable cellular-scale (7-150 μm) imaging
  of soft tissue in vivo. Key unknowns: (1) Can locally resonant metamaterial designs
  operate over the broad bandwidth (>1 MHz) required for pulse-echo ultrasound imaging?
  (2) Is the double-negative bandwidth sufficient to avoid temporal dispersion that
  distorts short ultrasound pulses? (3) Can metamaterial superlenses be made thin enough
  (<1 cm) and biocompatible for clinical use?
systematic_gaps:
  - Double-negative acoustic metamaterials demonstrated only at narrow frequency bands (<1% fractional bandwidth); clinical ultrasound requires >50% bandwidth
  - Tissue inhomogeneity (fat, bone interfaces) scatters evanescent waves required for superlensing; no compensation method exists
  - Fabrication of 3D biocompatible acoustic metamaterials at 10 MHz scale (unit cell ~10 μm) is at the limit of current 3D printing resolution

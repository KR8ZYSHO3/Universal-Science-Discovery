id: u-turbulence-onset-subcritical-transition
title: "Why does pipe flow transition to turbulence subcritically (no continuous bifurcation), and what determines the critical Reynolds number Re_c ≈ 2300 from first principles?"
status: open
priority: high
disciplines:
  - fluid-dynamics
  - statistical-physics
  - nonlinear-dynamics
summary: >
  Pipe flow (Hagen-Poiseuille) is linearly stable for all Reynolds numbers Re —
  the laminar solution never becomes linearly unstable. Yet turbulence appears
  at Re ≈ 2300 in experiments. This is a subcritical transition: the laminar
  state and the turbulent state coexist for a range of Re, with which one is
  observed depending on perturbation amplitude. The mechanism is understood
  qualitatively: transient amplification of non-normal perturbations creates
  finite-amplitude structures (streaks, vortices) that can trigger turbulence.
  However, the quantitative prediction of Re_c ≈ 2300 from first principles
  remains elusive. Two unknowns: (1) The "edge of chaos" — the boundary between
  laminar and turbulent attractors in state space — has been characterized numerically
  but not analytically; (2) The scaling of transition Reynolds number with pipe
  geometry (aspect ratio, roughness) does not follow a universal law.
  The connection to statistical physics: the turbulent transition in pipe flow may
  be an out-of-equilibrium phase transition in the directed percolation universality
  class (Lemoult et al. 2016), but this remains controversial.
systematic_gaps:
  - Re_c ≈ 2300 has not been derived from first principles; only phenomenological estimates exist
  - Whether the turbulence transition belongs to directed percolation universality class is debated
  - The edge state (saddle point separating laminar and turbulent basins) has no analytical characterization
suggested_hypotheses:
  - The turbulence transition Reynolds number in pipe flow scales as Re_c ~ (L/r)^{1/2} * nu where L is the viscous length scale and r is the pipe radius, derived from the condition that transient amplification exceeds the laminar attractor basin radius
related_unknowns:
  - u-turbulence-symmetry-breaking-cascade
  - u-turbulence-market-reynolds-analogue
references:

id: u-soliton-x-integrable-systems
title: Are all physically relevant nonlinear wave equations with stable solitary wave solutions exactly integrable in the
  sense of possessing a Lax pair, or do approximate solitons exist in non-integrable systems?
status: open
priority: medium
disciplines:
- physics
- mathematics
summary: The inverse scattering transform works only for exactly integrable PDEs (KdV, NLS, sine-Gordon). Many physically
  important equations (3D Navier-Stokes, nonlinear Schrödinger with higher-order corrections) support approximate solitons
  that slowly decay or interact inelastically. Whether a classification of near-integrable systems exists that predicts soliton
  stability and lifetime without exact integration is an open problem connecting mathematical physics and PDE theory.
systematic_gaps:
- No general criterion exists for determining whether a PDE admits a Lax pair without finding one explicitly
- Approximate soliton stability in near-integrable systems lacks a systematic perturbation theory
- 3D solitons (skyrmions, vortex rings) are not described by IST and require different mathematical frameworks

id: u-jamming-transition-biological-tissues
title: "Do biological tissues undergo a jamming transition from fluid-like to solid-like behavior, and is the vertex model or the Voronoi model the correct description of epithelial mechanics?"
status: open
priority: high
disciplines:
  - biophysics
  - soft-condensed-matter
  - developmental-biology
  - statistical-physics
summary: >
  Jamming is a phase transition from a flowing (fluid-like) to a rigid (solid-like)
  state in dense systems of particles — observed in granular materials, foams, and
  emulsions. Bi et al. (2016) proposed that epithelial tissues undergo a jamming
  transition controlled by cell shape index (p0 = perimeter/sqrt(area)): for p0 < 3.81,
  the tissue is solid (jammed); for p0 > 3.81, the tissue is fluid. This vertex model
  prediction has been tested in several contexts (lung development, tumor invasion,
  Drosophila gastrulation). However: (1) whether the vertex model jamming transition
  is the correct description of all epithelial tissues or only specific developmental
  contexts is unknown; (2) the cellular mechanisms that tune p0 (actomyosin contractility,
  cell-cell adhesion, osmotic pressure) interact in ways not captured by the simple
  vertex model; (3) whether the jamming transition in tissues belongs to the same
  universality class as granular jamming (mean-field, random close packing) has not
  been tested. This matters for cancer metastasis: tumor cells become fluidized
  (unjammed) to invade stroma.
systematic_gaps:
  - The universality class of tissue jamming (vertex model) vs. granular jamming (J-point) has not been determined
  - Whether p0 is the only control parameter or whether active tension and division rates are relevant has not been tested quantitatively
  - The molecular switches (E-cadherin, myosin) that set p0 in vivo have not been identified from the vertex model predictions
suggested_hypotheses:
  - The tissue jamming transition belongs to the mean-field universality class (critical exponents beta=0.5, nu=0.5) because cell shape fluctuations are independent in 3D, testable by finite-size scaling of tissue rigidity across cell cluster sizes in 3D organoids
related_unknowns:
  - u-mechanical-bifurcation-morphogenesis
  - u-confluent-tissue-brownian-universality
references:

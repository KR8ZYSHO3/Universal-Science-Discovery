id: u-bgs-conjecture-general-proof
title: Can the Bohigas-Giannoni-Schmit conjecture be proved in full generality for all quantum systems with classically ergodic dynamics, and what is the precise boundary between GOE and Poisson statistics?
status: open
priority: high
disciplines:
  - quantum-mechanics
  - chaos-theory
  - random-matrix-theory
  - mathematics
summary: >
  The BGS conjecture (1984) has been verified numerically for dozens of
  quantum chaotic systems and partially proved by Müller et al. (2004) using
  the diagonal and leading off-diagonal (Sieber-Richter) contributions in
  the semiclassical periodic orbit expansion. However, a complete proof
  to all orders in the expansion, and a rigorous proof for any specific
  quantum system (not relying on semiclassical approximations), remains
  absent. The mathematical status is unclear: is the conjecture a theorem
  about the 1/ħ expansion, or does it hold exactly? The boundary between
  GOE statistics (chaotic) and Poisson statistics (integrable) for
  mixed-phase-space systems (KAM tori coexisting with chaotic regions)
  is also not precisely characterized.
systematic_gaps:
  - The Sieber-Richter diagrammatic expansion has not been shown to converge or to reproduce RMT results to all orders.
  - For mixed-phase-space systems, the interpolation between GOE and Poisson statistics (Berry-Robnik distribution) is phenomenological, not derived from first principles.
  - The Montgomery-Odlyzko conjecture (Riemann zeros ~ GUE) has no known physical system whose Hamiltonian has the Riemann zeros as eigenvalues.
last_reviewed: "2026-05-06"

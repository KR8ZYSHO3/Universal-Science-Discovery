id: u-hawking-unruh-experimental-detection
title: "Can Hawking radiation or the Unruh effect be detected experimentally in accessible laboratory systems — including analog gravity systems in BEC, sonic black holes, or laser-accelerated electrons — and would such a detection confirm the key quantum field theory predictions without requiring a true gravitational horizon?"
status: open
priority: critical
disciplines:
  - physics
  - quantum-physics
  - experimental-physics
summary: >
  Hawking radiation from astrophysical black holes is 10^{-8} K for solar-mass black holes — far below
  detectability. The Unruh effect requires acceleration a ~ 10^{21} m/s^2 to achieve T_U = 1 K. Analog
  systems offer alternative detection paths but their validity as true analogs is contested.
  Key unknowns: (1) do analog Hawking-like phonon spectra in BEC sonic black holes truly test the same
  quantum field theory mechanism as gravitational Hawking radiation, or only a classical wave analog,
  (2) can the Unruh effect be detected via spin depolarization of electrons accelerated in strong laser fields
  at LUXE/ELI facilities, (3) does the information paradox require unitarity violation that could in principle
  be detected in black hole analog experiments?
systematic_gaps:
  - BEC analog experiments observe Hawking-like correlations but cannot confirm entanglement across the horizon due to finite system size
  - The required laser intensity for Unruh effect detection in electron spin experiments is at the boundary of current and near-future facility capabilities
  - The Bogoliubov transformation derivation of Hawking radiation relies on trans-Planckian frequencies whose physics is unknown
related_bridges:

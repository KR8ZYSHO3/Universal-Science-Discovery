id: u-chaos-synchronization-noise-robustness-threshold
title: >
  How much additive noise in the coupling channel degrades Pecora-Carroll synchronization quality, and is there a noise threshold above which synchronization fails completely?
status: open
priority: high
disciplines:
  - physics
  - engineering
summary: >
  Pecora-Carroll synchronization theory assumes noiseless coupling between drive and response systems, but real physical and engineered systems have noise in the coupling channel. The degradation of synchronization error with noise amplitude, and whether there is a sharp transition from synchronized to unsynchronized states (analogous to the noise-induced blowout bifurcation), has not been fully characterized for high-dimensional chaotic systems.

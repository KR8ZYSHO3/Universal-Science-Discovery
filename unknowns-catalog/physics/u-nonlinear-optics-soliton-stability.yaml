id: u-nonlinear-optics-soliton-stability
title: "What determines the stability of optical solitons against perturbations from higher-order dispersion, stimulated Raman scattering, and pump noise in photonic crystal fibers, and can inverse-designed fiber dispersion profiles guarantee soliton stability across specified bandwidth and power ranges?"
status: open
priority: medium
disciplines:
  - physics
  - mathematics
  - optics
summary: >
  Optical solitons in photonic crystal fibers are perturbed by higher-order dispersion terms (β_3, β_4),
  Raman nonlinearity, and self-steepening that break exact NLSE integrability. Predicting soliton stability
  and bandwidth for supercontinuum generation requires solving a generalized NLSE that is not analytically
  tractable. Key unknowns: (1) can perturbation theory of the NLSE accurately predict soliton self-frequency
  shift rates for arbitrary dispersion profiles, (2) what inverse design optimization of fiber cross-section
  geometry can guarantee stable soliton propagation over specified bandwidth, (3) do multi-soliton collisions
  in photonic crystal fibers produce deterministic or chaotic outcomes, and does this limit coherence in
  supercontinuum generation?
systematic_gaps:
  - Higher-order dispersion coefficients β_3 and beyond are hard to measure accurately and propagate large errors through GNLSE simulations
  - The boundary between soliton-like and dispersive-wave propagation regimes for high-power pumping is not analytically defined
  - Inverse design of fiber dispersion profiles for soliton stability has been demonstrated for specific cases but lacks general guarantees

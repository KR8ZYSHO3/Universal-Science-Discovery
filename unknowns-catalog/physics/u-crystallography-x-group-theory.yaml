id: u-crystallography-x-group-theory
title: Can the complete set of topological invariants for all 230 space groups and 1651 magnetic space groups be systematically computed to predict all topological crystalline insulators and semimetals, and what fraction of known materials harbor topologically non-trivial electronic structures?
status: open
priority: high
disciplines:
  - physics
  - mathematics
  - materials-science
  - condensed-matter-physics
summary: >
  Topological quantum chemistry (Bradlyn et al. 2017) provides a framework to classify
  band structures using group representations and band representations, predicting
  whether a material is a topological insulator, semimetal, or trivial insulator from
  its crystal symmetry and atomic positions alone. Systematic database searches have
  identified thousands of candidate topological materials, but experimental confirmation
  is lacking for most predictions. The extension to magnetic materials (with time-reversal
  breaking) via magnetic space groups is computationally incomplete, and correlated
  topological materials (where electron-electron interactions are important) lie entirely
  outside the current symmetry-based framework.
systematic_gaps:
  - Topological classification for all 1651 magnetic space groups is computationally complete but not validated against experiment for most groups
  - Correlated topological insulators (Mott topological insulators) require beyond-DFT methods not yet systematized
  - The fraction of synthesizable materials with topological properties is unknown because synthesis feasibility constraints are not included in database searches

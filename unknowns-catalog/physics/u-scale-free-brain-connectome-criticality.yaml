id: u-scale-free-brain-connectome-criticality
title: "Is the brain connectome's scale-free topology a consequence of preferential attachment during development, and does the critical gamma exponent predict hub-targeted disease vulnerability?"
status: open
priority: high
disciplines:
  - neuroscience
  - network-science
  - statistical-physics
  - developmental-biology
summary: >
  The human structural connectome (white matter tractography) shows scale-free degree
  distributions P(k) ~ k^{-gamma} with gamma ≈ 2.1-2.3, and a rich-club structure
  where hub nodes (default mode network, precuneus, posterior cingulate) are
  disproportionately inter-connected. Two key unknowns:
  (1) Developmental mechanism: does the adult connectome's scale-free topology arise
  from preferential attachment (activity-dependent synaptogenesis biased toward
  active, high-degree nodes), from spatial embedding constraints (nodes close in space
  connect more, yielding apparent power laws), or from some other mechanism?
  (2) Disease implication: the Molloy-Reed criterion predicts that scale-free networks
  with gamma ≤ 3 are robust to random failure but fragile to targeted hub removal.
  If Alzheimer's, schizophrenia, and depression preferentially damage hub nodes,
  their disease progression should follow the network theory of targeted attack —
  faster degradation than random-failure models predict. No study has tested whether
  clinical disease progression rates match the network percolation theory of
  targeted hub attack with the empirically measured gamma.
systematic_gaps:
  - "Developmental origin of connectome scale-free topology: preferential attachment vs spatial embedding not distinguished"
  - Disease vulnerability predicted by network criticality (targeted vs random attack) not quantitatively tested
  - Whether connectome gamma changes with age, disease, or cognitive training remains poorly characterized
suggested_hypotheses:
  - "Alzheimer's disease hub-node atrophy follows targeted-attack percolation theory: connectivity loss scales as k^{-gamma_attack} with exponent determined by the structural connectome gamma ≈ 2.1"
related_unknowns:
  - u-pathogen-coevolution-network-percolation

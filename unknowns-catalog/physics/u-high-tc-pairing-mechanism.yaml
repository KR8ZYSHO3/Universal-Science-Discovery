id: u-high-tc-pairing-mechanism
title: What is the pairing mechanism in cuprate and iron-based high-temperature superconductors, and why does it produce d-wave rather than s-wave symmetry?
status: open
priority: critical
disciplines:
  - condensed-matter-physics
  - quantum-mechanics
  - materials-science
  - strongly-correlated-electrons
summary: >
  The mechanism of Cooper pair formation in high-temperature superconductors —
  cuprates (La₂₋ₓBaₓCuO₄, YBa₂Cu₃O₇, Bi₂Sr₂CaCu₂O₈) and iron-based
  superconductors (LaFeAsO, BaFe₂As₂) — is the central unsolved problem of
  condensed matter physics. Unlike conventional (BCS) superconductors, where
  phonon-mediated pairing is confirmed by the isotope effect, high-Tc materials
  show d-wave order parameter symmetry (gap nodes along (1,1) directions), strong
  electronic correlations (parent compounds are Mott insulators), and anomalous
  normal-state properties (pseudogap, strange metal, non-Fermi liquid).

  Leading candidates for the pairing mechanism include: (1) antiferromagnetic
  spin fluctuations (paramagnon exchange), (2) resonating valence bond (RVB)
  state (Anderson 1987), (3) charge density wave / pair density wave intertwined
  order, (4) phonon-mediated in combination with strong correlations. No single
  theory explains all experimental observations across the phase diagram.
systematic_gaps:
  - The pairing glue (mediating boson) in cuprates has not been identified experimentally — ARPES, neutron scattering, and STM give competing interpretations.
  - The pseudogap phase above T_c in underdoped cuprates may represent preformed pairs or a competing order; its role in superconductivity is unknown.
  - The iron-based superconductors have multiband (multiple Fermi surfaces) structure; whether s± wave or orbital-selective pairing governs T_c is contested.
  - Room-temperature superconductors (hydrides H₃S, LaH₁₀ under >100 GPa pressure) have conventional phonon-mediated BCS pairing; extrapolating to ambient pressure is unknown.
suggested_hypotheses:
  - Antiferromagnetic spin fluctuation exchange (paramagnon pairing) with d-wave symmetry accounts for the T_c vs. doping phase diagram in cuprates without free parameters.
related_bridges:

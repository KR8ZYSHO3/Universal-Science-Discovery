id: u-neutron-star-core-qcd-constraints
title: Do observed mass–radius posteriors require a strong first-order phase transition in
  the core, or can pure hadronic EOS remain consistent within uncertainties?
status: open
priority: medium
disciplines:
- physics
- astrophysics
- nuclear-physics
summary: Current data constrain but do not uniquely identify exotic phases; systematic errors
  in atmosphere models for X-ray spectra remain a bottleneck.
systematic_gaps:
- Limited simultaneous constraints from multiple stars with different masses.
- Uncertainties in pasta phases and pasta–crust thermal conductivity affect cooling interpretations.
suggested_hypotheses:
- h-tidal-deformability-tightens-symmetry-energy-slope
related_bridges:
- b-neutron-star-matter-x-qcd-phases
last_reviewed: '2026-05-07'
references:
- doi: 10.1016/S0370-1573(00)00064-8
  note: Lattimer & Prakash (2001) — neutron star structure and the nuclear EOS
- doi: 10.1103/PhysRevLett.120.261103
  note: Abbott et al. (2018) — GW170817 constraints on tidal deformability (macro-micro bridge)

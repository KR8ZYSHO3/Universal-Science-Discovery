id: u-chromatic-aberration-broadband-metalens
title: "Can metasurface metalenses achieve achromatic focusing across the full visible spectrum at high numerical aperture simultaneously, and what material and geometric constraints govern the fundamental trade-off between aperture, efficiency, and achromatic bandwidth in phase-gradient metasurfaces?"
status: open
priority: high
disciplines:
  - optics
  - materials-science
  - physics
summary: >
  Dielectric metalenses can focus light at specific wavelengths with high efficiency but broadband achromatic
  focusing at high NA and large aperture simultaneously has not been demonstrated. The dispersion engineering
  required for achromatic metalenses conflicts with efficiency at high phase gradients.
  Key unknowns: (1) is there a fundamental trade-off between achromatic bandwidth and focusing efficiency for
  metalenses analogous to the aperture-bandwidth trade-off in antennas, (2) which resonant nanostructure materials
  (TiO2, GaN, Si, Ge) provide the best dispersion engineering range for broadband achromatism, (3) can inverse
  design optimization discover metalens geometries that overcome known analytical bounds?
systematic_gaps:
  - Fabrication of high-aspect-ratio nanostructures for dispersion engineering introduces systematic phase errors not captured in simulation
  - The relationship between local resonance dispersion and global point-spread function achromatism is not analytically tractable for large apertures
  - Efficiency measurements of metalenses rarely report absolute efficiency vs theoretical bound, making progress tracking difficult
related_bridges:
  - b-chromatic-aberration-dispersion
last_reviewed: "2026-05-07"

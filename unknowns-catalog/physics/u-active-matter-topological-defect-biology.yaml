id: u-active-matter-topological-defect-biology
title: "What is the causal role of topological defects in active nematics (±½ defects) in driving biological tissue remodelling and morphogenetic events?"
status: open
priority: high
disciplines:
  - biological-physics
  - cell-biology
  - developmental-biology
summary: >
  Active nematics — collections of elongated, self-propelled entities such as
  actomyosin filaments, epithelial cells, or bacterial colonies — spontaneously form
  topological defects at the intersections of director field discontinuities. +½ defects
  (comet-shaped) act as sources of active stress that drive cell accumulation and
  extrusion; -½ defects (trefoil-shaped) act as sinks. In Hydra regeneration, +½ defects
  mark the sites where head and foot organise, suggesting topological charge may guide
  morphogenesis. In epithelial monolayers, +½ defect density correlates with apoptotic
  cell extrusion rates. Whether defects are causally instructive (their position determines
  cell fate) or merely correlative (cell fate differences produce alignment, which produces
  defects) remains unresolved. The answer determines whether defect engineering could
  guide tissue patterning in organoids.
systematic_gaps:
  - Causal manipulation of defect position in living tissue has not been achieved
  - Whether defect-driven mechanical forces are sufficient to specify cell fate is untested
  - The timescale hierarchy of defect motion vs. cell fate commitment is unknown
suggested_hypotheses:
  - Active nematic +½ defects causally direct epithelial cell extrusion and apoptosis
    through compressive stress concentration above a threshold
references:
  - doi: "10.1038/s41567-017-0006-9"
    note: "Saw et al. (2017) Nature — topological defects drive cell death in epithelia"
  - doi: "10.1126/science.aba6334"
    note: "Maroudas-Sacks et al. (2021) — topological defects in Hydra morphogenesis"
last_reviewed: "2026-05-06"

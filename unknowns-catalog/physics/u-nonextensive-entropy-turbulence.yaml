id: u-nonextensive-entropy-turbulence
title: Does the non-extensive Tsallis entropy (with index q ≠ 1) correctly characterize the statistical mechanics of quantum turbulence, and is q a universal constant for all superfluid turbulence?
status: open
priority: medium
disciplines:
  - statistical-physics
  - quantum-fluids
  - nonlinear-dynamics
  - information-theory
summary: >
  A 2026 preprint (arXiv 2604.19478) demonstrates that Vinen (ultraquantum) turbulence
  in superfluid helium-4 is better described by non-extensive Tsallis statistics with
  q > 1 than by standard Boltzmann-Gibbs statistics. Non-extensive statistics arise
  when the system has long-range correlations or multifractal structure - both known
  properties of turbulence. The key open questions are: (1) Is the Tsallis q-parameter
  a universal constant for all types of quantum turbulence (Vinen, Kolmogorov, and
  transition regimes), or does it vary? (2) Is non-extensive entropy the correct
  framework for classical turbulence too, or is it specific to the quantum regime?
  (3) Does the q-parameter connect to the multifractal spectrum of turbulence (which
  characterizes intermittency) via a known mathematical relationship? Answering these
  would unify superfluid turbulence statistics with the broader Tsallis/Renyi entropy
  framework for complex systems.
systematic_gaps:
  - The Tsallis q-parameter has been measured only for Vinen turbulence; its value for Kolmogorov turbulence in superfluid He-4 is unknown.
  - Whether q is a universal constant or depends on temperature, vortex density, or driving frequency has not been established.
  - The relationship between q and the multifractal spectrum f(alpha) of superfluid turbulence has not been derived.
suggested_hypotheses:
  - The Tsallis q-parameter for quantum turbulence equals 1 + 1/D_f, where D_f is the fractal dimension of the vortex tangle, unifying non-extensive entropy with fractal geometry.

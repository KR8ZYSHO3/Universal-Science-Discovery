id: u-tensor-networks-x-quantum-states
title: What is the minimum tensor network ansatz that can efficiently represent all topological quantum states in 2D, and
  can PEPS contraction be made polynomial-time for physically relevant classes of quantum states?
status: open
priority: high
disciplines:
- physics
- computer_science
- mathematics
summary: 'PEPS contraction is #P-hard in general, but for physically relevant 2D quantum states (gapped topological phases),
  the true complexity may be lower. Whether a polynomial-time tensor network algorithm exists for topological quantum states
  is the central open problem in classical simulation of quantum many-body systems. Key variants: (1) can boundary MPS methods
  achieve polynomial contraction for specific topological phases, (2) what is the entanglement structure of non-Abelian anyonic
  states in PEPS language?'
systematic_gaps:
- PEPS contraction complexity for topological (non-trivial) states has not been separately characterised
- The entanglement structure of non-Abelian anyon models in PEPS language is not fully developed
- No polynomial-time PEPS algorithm has been demonstrated for any non-trivial 2D gapped state

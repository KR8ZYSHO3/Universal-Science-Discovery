id: u-minimum-dissipation-network-topology
title: Do biological transport networks (vascular, neural, mycorrhizal) self-organize to minimize dissipation through the same symmetry-breaking mechanism as physical minimum-dissipation networks?
status: open
priority: high
disciplines:
  - network-science
  - biophysics
  - statistical-physics
  - evolutionary-biology
summary: >
  A 2025 preprint (arXiv 2505.24818) shows that minimum-dissipation networks -
  networks that minimize total energy dissipation subject to flow constraints -
  undergo sharp symmetry-breaking transitions as a function of load distribution.
  These transitions are analogous to phase transitions in physical systems, with the
  topology of the optimal network (spanning tree vs. loopy network) playing the role
  of the order parameter. Biological transport networks (blood vessels, neural circuits,
  mycelial networks, leaf venation) are known to approximately minimize dissipation
  under metabolic constraints (Murray's law, Kleiber scaling). However, whether they
  exhibit the same symmetry-breaking transitions as the mathematical minimum-dissipation
  networks has never been tested. The critical question is whether biological network
  formation (angiogenesis, axon pathfinding) implements a physical symmetry-breaking
  process that can be described by the same renormalization group as the mathematical
  problem.
systematic_gaps:
  - The existence of sharp symmetry-breaking transitions in biological vascular network topology as a function of metabolic demand has not been measured.
  - Murray's law derivation assumes minimum dissipation but does not predict topology; the connection between dissipation minimization and loop formation is unknown biologically.
  - No cross-species comparison of vascular topology as a function of body mass has been performed using the minimum-dissipation framework.
suggested_hypotheses:
  - Leaf venation networks switch from tree to loopy topology at a critical mechanical damage probability that matches the symmetry-breaking threshold in minimum-dissipation theory.

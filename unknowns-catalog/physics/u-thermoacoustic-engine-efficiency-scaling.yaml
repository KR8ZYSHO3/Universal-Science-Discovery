id: u-thermoacoustic-engine-efficiency-scaling
title: "What limits the thermodynamic efficiency of practical thermoacoustic engines relative to the Carnot limit, and how does efficiency scale with operating frequency and temperature gradient?"
status: open
priority: medium
disciplines:
  - thermoacoustics
  - acoustic-engineering
  - thermodynamics
summary: >
  Ideal thermoacoustic engines achieve Carnot efficiency when temperature gradients are
  infinitesimally steep relative to acoustic wavelength (quasi-steady limit) and acoustic
  streaming losses are zero. In practice, three loss mechanisms limit efficiency: (1)
  streaming-driven DC flow (Rayleigh streaming) that carries heat in the wrong direction,
  (2) imperfect thermal contact between gas and regenerator material (finite heat capacity
  ratio), and (3) viscous dissipation at boundaries. Swift's theory predicts efficiency
  drops rapidly with decreasing acoustic amplitude (lower operating point) because
  streaming losses scale as u² while work flux scales as u. The optimal operating
  frequency is determined by the regenerator material's thermal penetration depth δ_κ = √(2K/ωρCp) —
  a specific ratio f/f_opt maximises COP. Experimentally demonstrated efficiencies reach
  20-40% of Carnot; the scaling laws for efficiency vs. temperature ratio and size
  have not been systematically validated across machine scales.
systematic_gaps:
  - Efficiency scaling with machine size (acoustic power) is not empirically characterised
  - Optimal regenerator geometry for combined heat transfer and minimal flow resistance is unresolved
  - Streaming suppression techniques (acoustic streaming suppressors) need experimental validation
suggested_hypotheses:
  - Thermoacoustic efficiency scales as (1 - T_cold/T_hot) × (1 - f_streaming/f_work)
    where streaming fraction is a universal function of drive ratio
references:
  - doi: "10.1121/1.396617"
    note: "Swift (1988) J Acoust Soc Am — thermoacoustic engines theory"
  - doi: "10.1038/399335a0"
    note: "Backhaus & Swift (1999) Nature — thermoacoustic Stirling engine 30% efficiency"
last_reviewed: "2026-05-06"

id: u-noether-quantum-gravity-symmetry
title: Does Noether's theorem extend to quantum gravity, and what conservation laws (if any) survive the breakdown of spacetime symmetry at the Planck scale?
status: open
priority: high
disciplines:
  - theoretical-physics
  - quantum-gravity
  - differential-geometry
  - mathematical-physics
summary: >
  Noether's theorem applies to systems with a well-defined action and continuous
  symmetry groups in a fixed background spacetime. In general relativity, energy
  conservation becomes subtle: there is no global conserved energy for a closed
  universe because there is no global time-translation Killing vector. In quantum
  gravity, spacetime itself becomes dynamical and subject to quantum fluctuations,
  potentially breaking the smooth symmetry structure that Noether's theorem requires.

  The question is whether the conservation laws guaranteed by Noether's theorem
  (energy, momentum, charge) survive in a quantum theory of gravity, and if so,
  in what modified form. Black hole evaporation (Hawking radiation) potentially
  violates information conservation — a deep tension between quantum mechanics
  (unitary evolution, information preserved) and general relativity (black holes
  destroy information). This is the black hole information paradox, which touches
  the same foundation as Noether's theorem.
systematic_gaps:
  - No consensus on whether energy is conserved in a closed quantum universe (quantum cosmology).
  - The relationship between gauge symmetry, Noether charges, and holographic entropy (Bekenstein-Hawking) is not fully understood — boundary symmetries (BMS supertranslations) may encode information about the interior.
  - Whether CPT symmetry (the combination of charge, parity, time-reversal) is an exact symmetry of quantum gravity, or is violated at the Planck scale, is unknown.
suggested_hypotheses:
  - BMS supertranslation charges (infinite-dimensional asymptotic symmetries of flat spacetime) are the Noether charges that resolve the black hole information paradox — information is stored in soft photon/graviton correlations at the horizon.

id: u-rg-fixed-points-non-wilson-fisher-universality-classes
title: >
  What determines the complete landscape of RG fixed points beyond the Gaussian and
  Wilson-Fisher fixed points, and are there as-yet-unknown universality classes
  in systems with long-range interactions, fractal lattices, or non-equilibrium
  driving that lack a known Lax pair or epsilon-expansion treatment?
status: open
priority: high
disciplines:
  - physics
  - mathematics
  - statistical-mechanics
  - field-theory
summary: >
  The RG fixed-point landscape is well-characterized for equilibrium systems near
  upper critical dimensions through the ε-expansion (Wilson-Fisher FP for O(N) models,
  cubic FP for anisotropic systems, multicritical points). However, systematic
  enumeration of all RG fixed points in d=3 non-perturbatively is incomplete.
  The functional RG (Wetterich equation, exact RG) can in principle find all fixed
  points, but numerical solution in full field-theory space requires truncations
  whose accuracy is difficult to assess. Non-equilibrium driven systems (directed
  percolation, KPZ surface growth, active matter) have their own fixed points
  outside the equilibrium universality class classification. Long-range interactions
  (falling off as r^{-d-σ}) continuously interpolate between mean-field and short-
  range fixed points — the crossover is described by a long-range fixed point
  whose ε-expansion has different structure. Fractal or hierarchical lattices
  (Sierpinski gasket) have RG fixed points exactly solvable by decimation, raising
  the question of whether these represent genuinely new universality classes or
  deformations of known ones.
systematic_gaps:
  - Non-perturbative fixed point structure in d=3 O(N) models beyond N=1,2,3
    (Ising, XY, Heisenberg) — are there fixed points at non-integer N?
  - Fixed point classification for non-equilibrium universality classes (DP, KPZ,
    voter model) — is there a complete analog of the equilibrium table?
  - The long-range to short-range crossover fixed point in O(N) models with
    power-law interactions — exact location in (d,σ,N) space not fully mapped.
  - Conformal field theory (CFT) methods provide exact constraints (conformal
    bootstrap) on operator dimensions at 3d fixed points — systematic exploration
    not complete for all universality classes.
suggested_hypotheses:
  - >
    Conformal bootstrap constraints (Kos-Poland-Simmons-Duffin 2014) applied
    systematically to all c-theorem-allowed 3d CFTs will enumerate the complete
    landscape of RG fixed points in 3d scalar field theories, finding new multicritical
    fixed points between Ising and mean-field that are currently unknown.

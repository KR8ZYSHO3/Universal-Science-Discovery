id: u-entropy-production-x-living-systems
title: Can entropy production rate serve as a universal thermodynamic fitness measure across all scales of biological organisation,
  from metabolic networks to ecosystems?
status: open
priority: medium
disciplines:
- physics
- biology
- thermodynamics
summary: 'Non-equilibrium thermodynamics predicts that dissipative structures are stabilised by throughput of free energy.
  Whether entropy production rate σ is a universal quantitative fitness proxy — comparable across molecules, cells, organisms,
  and ecosystems — remains unresolved. Key gaps: (1) the MEP vs. minimum EP controversy (which principle selects biological
  steady states?), (2) whether organisms evolve to maximise or minimise σ in different selective regimes, (3) whether the
  Prigogine formalism extends rigorously to strongly non-equilibrium biological systems.'
systematic_gaps:
- No rigorous derivation of maximum entropy production as a biological fitness criterion from first principles of natural
  selection
- Minimum vs. maximum entropy production principles give contradictory predictions at different scales; no unifying criterion
  has been established
- Empirical measurements of entropy production across phylogenetic diversity are sparse

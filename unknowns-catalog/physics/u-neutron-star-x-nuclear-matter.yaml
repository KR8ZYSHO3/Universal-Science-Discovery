id: u-neutron-star-x-nuclear-matter
title: Does a quark-hadron phase transition occur in the cores of massive neutron stars (M > 1.8 solar masses), and if so, is it a first-order transition (with a mixed phase) or a crossover, as constrained by gravitational wave tidal deformability measurements?
status: open
priority: high
disciplines:
  - physics
  - astrophysics
  - nuclear-physics
summary: >
  At densities > 5ρ₀ (nuclear saturation density), nuclear matter may undergo a
  phase transition to deconfined quark matter (strange quark matter, color-superconducting
  quark matter). This would produce a kink in the neutron star mass-radius curve
  detectable by future LIGO/Einstein Telescope measurements. GW170817 tidal deformability
  (Λ ≈ 300-800) constrains the radius of 1.4 solar mass neutron stars to 11.1-13.4 km,
  but does not resolve whether a quark core exists in 2+ solar mass stars. The
  distinction between first-order phase transition and crossover has observable
  consequences for gravitational wave post-merger signals from neutron star mergers.
systematic_gaps:
  - QCD lattice calculations cannot access finite baryon density (sign problem); perturbative QCD applies only above ~40ρ₀
  - The composition of dense matter between 2-5 ρ₀ (hyperons vs. quarks vs. pions) is experimentally unconstrained
  - No gravitational wave post-merger detection has been achieved to test quark matter signatures in neutron star mergers
related_bridges:

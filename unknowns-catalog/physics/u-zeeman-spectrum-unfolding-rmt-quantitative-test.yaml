id: u-zeeman-spectrum-unfolding-rmt-quantitative-test
title: >
  For which atomic/molecular series and magnetic-field ranges does Zeeman-resolved high-lying spectra show
  GOE/GUE spacing statistics after unfolding, and where do deviations signal regularity or mixed phase space?
status: open
priority: medium
summary: >
  Experimentalists can scan fields and quantum defects, but quantitative comparison to RMT requires careful
  unfolding and windowing. This unknown asks for reproducible criteria and open datasets where Zeeman tuning
  is used as an experimental control on spacing statistics.

systematic_gaps:
  - "Limited community-wide standards for unfolding Zeeman-crowded spectra near ionization thresholds."
  - "Cross-talk between radiative widths and spacing statistics is not always separated in published analyses."

suggested_hypotheses:
  - h-zeeman-multiplet-spacing-shows-quantum-chaos-statistics

related_bridges:
  - b-zeeman-multiplet-x-rmt-level-spacing

references:

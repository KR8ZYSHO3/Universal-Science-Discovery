id: u-topological-order-non-abelian-anyons-fault-tolerant
title: >
  Can non-Abelian anyons (e.g. Majorana zero modes in topological superconductors
  or ν=5/2 FQH states) be reliably braided to perform fault-tolerant quantum gates,
  and does the topological protection survive realistic disorder, finite-temperature
  effects, and leakage out of the anyon subspace?
status: open
priority: critical
disciplines:
  - physics
  - mathematics
  - quantum-computing
summary: >
  Topological quantum computing (Kitaev 2003) proposes that non-Abelian anyons —
  quasiparticles whose exchange (braiding) implements unitary transformations on a
  degenerate ground-state subspace — can store and process quantum information
  non-locally, making it intrinsically protected from local errors. Majorana zero
  modes at the ends of topological superconductor wires (Kitaev chain) are the
  most experimentally pursued platform. Despite many claimed experimental signatures,
  no unambiguous demonstration of non-Abelian braiding statistics exists as of 2026.
  Key open issues: (1) Whether the topological gap is large enough at accessible
  temperatures to suppress thermal excitations and maintain coherence;
  (2) Whether disorder (chemical potential fluctuations) creates trivial Andreev
  bound states that mimic Majorana signatures (the "Andreev impostor" problem);
  (3) Whether the braiding protocol is fast enough to outrun decoherence but
  slow enough to remain adiabatic; (4) Whether leakage out of the computational
  subspace (from higher-energy anyonic sectors) can be suppressed sufficiently.
systematic_gaps:
  - No experiment has demonstrated non-Abelian braiding statistics; all current
    evidence for Majorana modes is indirect (zero-bias conductance peaks).
  - The minimum topological gap needed for fault-tolerant operation at a given
    temperature has not been calculated including realistic disorder effects.
  - Leakage error rates for braiding protocols have not been measured experimentally.
related_bridges:
  - b-topology-condensed-matter
last_reviewed: "2026-05-06"

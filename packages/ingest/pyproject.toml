[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "usdr-ingest"
version = "0.1.0"
description = "USDR arXiv OAI-PMH metadata ingest (metadata only; no PDFs)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27,<1",
  "typer>=0.12,<1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "jsonschema>=4.20,<5",
]

[project.scripts]
usdr-ingest = "usdr_ingest.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

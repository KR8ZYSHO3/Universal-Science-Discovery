id: bg-universal-cancer-early-detection
title: Liquid biopsy for universal early-stage cancer detection
breakthrough_description: >
  Detecting any cancer type at stage I from a blood draw — using circulating
  tumor DNA (ctDNA), cell-free methylation signatures, exosomes, or protein
  biomarkers — with less than 1% false positive rate and greater than 90%
  sensitivity remains unsolved. GRAIL's Galleri test, the most advanced commercial
  multi-cancer early detection (MCED) test, achieves approximately 20% sensitivity
  at stage I across 50 cancer types, rising to ~67% at stage III. The core barrier
  is signal-to-noise: at stage I, ctDNA constitutes less than 0.01% of total
  cell-free DNA in blood. The breakthrough needed: a blood-based test that detects
  all or most cancer types at stage I when survival rates are above 90%, before
  symptoms develop, at a false positive rate low enough for population-level
  screening without causing net harm from follow-up procedures.
source_domain: oncology
current_trl: 4
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: ctDNA fraction at early stage is below current detection limits
    gap_description: >
      At stage I, tumor-derived DNA constitutes less than 0.01% of cell-free DNA
      in blood plasma. Standard next-generation sequencing (NGS) has an error rate
      of ~0.1%, creating a noise floor that overwhelms early-stage signal. Duplex
      sequencing and other error-correction approaches reduce error rates to ~10^-6
      but require deep coverage that makes the assay prohibitively expensive for
      population screening. Methylation-based approaches (GRAIL) are more sensitive
      for some cancers but require validated reference panels for every cancer type.
    blocking_domain: molecular-biology
    gap_type: scientific
  - gap_title: Tissue-of-origin identification is imperfect, increasing follow-up burden
    gap_description: >
      Even when a liquid biopsy detects a cancer signal, identifying the tissue of
      origin — which organ is affected — is necessary to direct follow-up imaging and
      biopsy. Current methylation-based tissue-of-origin classifiers are ~90% accurate
      when the signal is strong but fail frequently at low variant allele fractions.
      False tissue-of-origin calls direct patients to the wrong follow-up procedures,
      adding cost, radiation exposure, and psychological burden. A 1% population-level
      false positive rate in a US screening program would generate ~1.3 million false
      alarms per year.
    blocking_domain: clinical-medicine
    gap_type: scientific
  - gap_title: Prospective clinical validation requires decades-long cohort studies
    gap_description: >
      Demonstrating that early detection reduces cancer mortality requires randomized
      controlled trials with enough follow-up time (typically 5-15 years) to observe
      survival differences. The PATHFINDER and NHS-Galleri trials are ongoing but will
      not report primary survival endpoints before 2030. Without mortality reduction
      evidence, health systems cannot justify population-scale adoption. The delay
      between detection and clinical validation is an inherent structural barrier to
      early detection breakthroughs.
    blocking_domain: epidemiology
    gap_type: regulatory

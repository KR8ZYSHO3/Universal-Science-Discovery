  - "Gilpin et al. (2019) Self-assembly of arbitrary shapes using RNAse A as an addressable scaffold. Proc Natl Acad Sci 116:1074-1079."
  - "Rus D, Vona M (2001) Crystalline robots: self-reconfiguration with compressible unit modules. Auton Robot 10:107-124."
  - "Hawkes et al. (2010) Programmable matter by folding. Proc Natl Acad Sci 107:12441-12445."
last_reviewed: "2026-05-07"

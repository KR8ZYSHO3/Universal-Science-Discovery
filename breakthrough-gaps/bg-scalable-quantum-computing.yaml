  - "Acharya et al. (2024) Quantum error correction below the surface code threshold. Nature 638:920-926."
  - "Shor PW (1994) Algorithms for quantum computation: discrete logarithms and factoring. Proc 35th FOCS, 124-134."
  - "Preskill J (2018) Quantum computing in the NISQ era and beyond. Quantum 2:79."
last_reviewed: "2026-05-07"

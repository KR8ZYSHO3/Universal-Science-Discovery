id: bg-room-temperature-superconductivity
title: Ambient-Pressure Room-Temperature Superconductivity
breakthrough_description: >
  A material that superconducts at room temperature and ambient pressure would
  eliminate resistive losses in electrical grids (~5–10% of generated power),
  enable compact MRI and fusion magnets without cryogenic infrastructure,
  and create magnetic levitation transport without cooling costs. The current
  record (2023) for conventional superconductivity is hydrogen sulfide at high
  pressure (203 K, Drozdov 2015). The LK-99 controversy (2023) demonstrated
  intense global interest. The microscopic pairing mechanism in high-temperature
  cuprates and hydrides remains unknown, preventing rational design.
source_domain: condensed-matter-physics
current_trl: 2
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Unknown Microscopic Pairing Mechanism (Beyond BCS)
    gap_description: >
      BCS theory (1957) explains conventional superconductivity via phonon-mediated
      electron-electron attraction. High-temperature cuprate superconductors (Tc up
      to 138 K at ambient pressure, HgBaCaCuO) have been known since 1986 without
      a consensus pairing mechanism. The leading candidates — d-wave pairing via
      spin fluctuations, resonating valence bonds, charge density wave coupling —
      each explain some observations but not others. Without understanding the
      pairing mechanism, synthesis of higher-Tc materials is empirical rather than
      rational. This is one of the top unsolved problems in condensed matter physics.
    blocking_domain: quantum-physics
    gap_type: mathematical
  - gap_title: Ambient Pressure Stabilization of High-Tc Hydrides
    gap_description: >
      Hydrogen-rich hydrides (LaH₁₀ at 250 K, H₃S at 203 K) require 150–200 GPa
      pressure to superconducting — roughly equivalent to the Earth's core pressure.
      The high pressure is needed to force the hydrogen into metallic, phonon-coupled
      states. Stabilizing the metallic hydrogen lattice at ambient pressure requires
      a host material ("chemical precompression") that mimics the electron density
      of 200 GPa without external pressure. No synthesis route for such a material
      is currently known.
    blocking_domain: materials-science
    gap_type: materials
  - gap_title: Reproducibility and Synthesis Control
    gap_description: >
      The LK-99 controversy (2023) — where initial reports of room-temperature
      superconductivity in lead-apatite were not reproduced — highlighted that
      many claimed high-Tc materials suffer from reproducibility failures due to
      impurity phases, synthesis sensitivity, and measurement artifacts (ferromagnetic
      impurities mimicking partial Meissner effect). The field lacks standardized
      synthesis protocols and blind measurement procedures. This is a structural
      problem in research methodology, not physics.
    blocking_domain: materials-science
    gap_type: materials
required_bridges:

  - "Lu et al. (2022) Machine learning-aided engineering of hydrolases for PET depolymerization. Nature 604:662-667."
  - "Worm et al. (2017) Plastic as a persistent marine pollutant. Annu Rev Environ Resour 42:1-26."
  - "Lebreton et al. (2022) Evidence that the Great Pacific Garbage Patch is rapidly accumulating plastic. Sci Rep 8:4666."
last_reviewed: "2026-05-07"

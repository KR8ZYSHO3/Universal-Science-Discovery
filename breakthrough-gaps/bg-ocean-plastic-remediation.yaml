id: bg-ocean-plastic-remediation
title: Scalable removal and degradation of ocean microplastics
breakthrough_description: >
  Approximately 170 trillion plastic particles are estimated to be in the ocean,
  with an additional 8-10 million tons entering annually. Macro-plastic removal
  by systems such as The Ocean Cleanup is technically feasible but economically
  marginal. The acute unsolved problem is microplastics (particles less than 5 mm),
  which are dispersed throughout the water column and sediment at concentrations
  too low to filter economically (micrograms per liter) yet sufficient to enter
  marine food webs, bioaccumulate in fish and shellfish, and appear in human blood,
  lungs, and placentas. The breakthrough needed: a technology that degrades
  microplastics into benign small molecules (CO2, H2O, biomass) at ocean scale,
  without releasing toxic degradation products or disrupting marine ecosystems,
  at a cost competitive with prevention of new plastic entering the ocean.
source_domain: environmental-science
current_trl: 2
world_reshaping_potential: significant
blocking_gaps:
  - gap_title: Microplastic concentration is too low for economical passive filtration
    gap_description: >
      Ocean microplastic concentrations average 10-100 micrograms per liter —
      comparable to dissolved salts in terms of particle count but orders of magnitude
      lower in mass than economical filter caking. Processing one cubic kilometer of
      ocean water (1 km^3 = 10^12 liters) at current pump-and-filter efficiency
      would consume more energy than the plastic collected is worth by a factor of
      ~1,000. Concentration approaches (magnetic nanoparticle aggregation, acoustic
      focusing) work in laboratory settings but have not been demonstrated at the
      volumes needed to make a dent in 170 trillion particles.
    blocking_domain: engineering
    gap_type: engineering
  - gap_title: Enzymatic plastic degradation is slow and not ocean-deployable
    gap_description: >
      FAST-PETase (2022) and other engineered PET hydrolases degrade PET plastic
      at rates orders of magnitude faster than wild-type PETase but still require
      temperatures of 50-70°C for optimal activity — incompatible with ocean
      deployment (average ocean temperature is 3-4°C). Polyethylene (PE) and
      polypropylene (PP), which constitute the majority of ocean plastic, have no
      efficient biological degradation pathway at any temperature. Engineering
      cold-active plastic-degrading enzymes is an open research challenge.
    blocking_domain: biochemistry
    gap_type: biological
  - gap_title: Self-replicating plastic-eating organisms carry biosafety risk
    gap_description: >
      Engineered bacteria or algae that consume plastic at ocean scale would need
      to replicate in the open ocean environment. No regulatory or technical framework
      exists for releasing self-replicating genetically modified organisms into
      open ocean ecosystems. A self-replicating plastic consumer might outcompete
      natural decomposers, produce toxic metabolites, or be horizontally gene-transferred
      to environmental bacteria in unpredictable ways. The potential for irreversible
      ecological harm from an imprecisely engineered organism is a hard constraint
      on biological remediation approaches.
    blocking_domain: ecology
    gap_type: regulatory
required_bridges:
  - b-genetic-regulatory-boolean-circuits
  - b-codon-usage-translational-efficiency
references:

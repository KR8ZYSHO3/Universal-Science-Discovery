id: bg-carbon-direct-air-capture
title: Economically Viable Direct Air Capture of CO2
breakthrough_description: >
  Direct air capture (DAC) at ~$100/tonne CO₂ (from current $400–1,000/tonne)
  would make it economically viable to remove atmospheric CO₂ at the gigatonne
  scale required to meaningfully address climate change. At $100/tonne and a
  carbon price of $50–200/tonne (current EU ETS range), DAC becomes self-financing.
  At gigatonne scale, DAC combined with geological storage provides a permanent
  carbon sink. Climeworks (Orca, Iceland) and Carbon Engineering (now 1PointFive)
  demonstrate TRL 7–8 systems at current costs; the economic gap is 4–10×.
source_domain: chemistry
current_trl: 7
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Sorbent Regeneration Energy Cost vs Thermodynamic Limit
    gap_description: >
      Current DAC systems (liquid solvent: KOH/Ca(OH)₂ or solid sorbent: amine
      functionalized) require 1.5–2.5 GJ/tonne CO₂ for sorbent regeneration
      (thermal desorption or electrochemical swing). The thermodynamic minimum
      for separating 400 ppm CO₂ from air is ~0.5 GJ/tonne. The gap between
      current performance and the thermodynamic limit is 3–5× and is dominated
      by heat losses in the sorbent cycle and the energy cost of heating/cooling
      large sorbent masses. Novel electrochemical DAC (pH swing, redox-active
      sorbents) promises lower energy consumption but is at TRL 3–4.
    blocking_domain: thermodynamics
    gap_type: engineering
  - gap_title: Sorbent Degradation Over Cycles
    gap_description: >
      Amine-functionalized solid sorbents degrade via oxidative degradation,
      urea formation, and leaching at the 60–100°C desorption temperatures
      required for CO₂ release. Commercial targets require sorbent lifetime
      >10,000 cycles (3–5 year operational life). Current solid sorbents achieve
      1,000–5,000 cycles before >20% capacity loss. Sorbent replacement cost
      is $50–200/tonne CO₂ in current systems — a major fraction of total cost.
      Understanding the degradation mechanisms at the molecular level to design
      degradation-resistant chemistries is an active materials science challenge.
    blocking_domain: chemistry
    gap_type: materials
  - gap_title: Economic Bridge Between Carbon Price and DAC Cost
    gap_description: >
      DAC economics depend on a carbon price, voluntary carbon market, or policy
      mechanism (e.g., US 45Q tax credit: $180/tonne geological storage) that
      makes the cost-negative-carbon business case close. The gap between the
      actual social cost of carbon (~$200–400/tonne by current estimates) and
      political carbon prices (~$10–80/tonne in most jurisdictions) means DAC
      cannot currently reach economic scale without extraordinary subsidy.
      The economic and political science bridge — how to translate social cost
      to policy price — is as important as the engineering gap.
    blocking_domain: economics
    gap_type: economic
  - gap_title: Geological Storage Permanence Verification
    gap_description: >
      CO₂ geological storage (saline aquifers, depleted oil/gas reservoirs)
      is claimed to be permanent on 10,000+ year timescales. The monitoring
      and verification (MRV) framework for confirming CO₂ remains stored —
      required for carbon credit permanence — is not standardized. Microseismic
      monitoring, geochemical sampling, and reservoir simulation can confirm
      short-term integrity (10–20 years) but the long-term permanence
      certification required for carbon accounting lacks both technical methods
      and regulatory consensus.
    blocking_domain: geology
    gap_type: regulatory
required_bridges:
  - b-thermodynamics-materials-science
  - b-economics-chemistry
  - b-geology-engineering

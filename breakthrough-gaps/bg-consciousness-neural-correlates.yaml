id: bg-consciousness-neural-correlates
title: Identifying the neural correlates of consciousness and subjective experience
breakthrough_description: >
  The hard problem of consciousness — why and how physical processes in the brain
  give rise to subjective experience (qualia) — has no agreed scientific framework.
  The easy problems (explaining cognitive functions like attention, memory, and
  reportability) are tractable in principle; the hard problem is whether any
  physical account can explain why there is something it is like to be a system.
  The major competing theories — Integrated Information Theory (IIT), Global
  Workspace Theory (GWT), Predictive Processing, and Higher-Order Theories — make
  partly different empirical predictions. A 2023 adversarial collaboration testing
  IIT vs GWT found evidence inconsistent with both theories' key predictions in
  different paradigms, leaving the field without a leading candidate. The breakthrough
  needed: an agreed experimental protocol that discriminates between theories and
  identifies the minimal neural circuit sufficient for conscious perception.
source_domain: neuroscience
current_trl: 2
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: No agreed operational definition of consciousness enables experimental test
    gap_description: >
      Theories of consciousness differ not just in their mechanisms but in what they
      are trying to explain. IIT defines consciousness as integrated information (Phi)
      and is strictly panpsychist. GWT defines it as the global broadcast of information
      to multiple brain systems. Predictive processing identifies it with precision-weighted
      prediction error. These are not merely different mechanisms — they carve up the
      phenomenon differently, making direct empirical comparison difficult. The field
      lacks an agreed behavioral or neural criterion for the presence or absence of
      consciousness in a given brain state.
    blocking_domain: neuroscience
    gap_type: scientific
  - gap_title: No-report paradigms cannot fully isolate conscious content
    gap_description: >
      Classical consciousness experiments ask subjects to report what they perceived,
      but report itself requires attention, working memory, and motor output — processes
      that may be confounded with consciousness. No-report paradigms (pupillometry,
      EEG, fMRI decoding) attempt to measure consciousness without behavioral report,
      but there is no way to validate that these markers track consciousness rather
      than correlated processes. The method of introspective report is both the primary
      tool and the main confound in consciousness research.
    blocking_domain: psychology
    gap_type: scientific
  - gap_title: Animal and AI consciousness cannot be assessed without a validated theory
    gap_description: >
      Clinical disorders of consciousness (vegetative state, minimally conscious state,
      locked-in syndrome) affect approximately 500,000 people in the US alone. Misdiagnosis
      rates are estimated at 40%. Treatment decisions — including withdrawal of life
      support — depend on consciousness assessments that have no validated ground truth.
      Without a theory that predicts which physical systems are conscious, medicine
      cannot reliably distinguish vegetative from minimally conscious patients, and
      AI ethics cannot assess machine consciousness claims.
    blocking_domain: clinical-medicine
    gap_type: scientific

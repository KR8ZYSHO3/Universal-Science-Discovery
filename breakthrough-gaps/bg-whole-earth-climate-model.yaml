  - "Lam et al. (2023) Learning skillful medium-range global weather forecasting. Science 382:1416-1421."
  - "Stevens et al. (2024) Storming the atmosphere. Science 383:1174-1178."
  - "Palmer T (2014) Build high-resolution global climate models. Nature 515:338-339."

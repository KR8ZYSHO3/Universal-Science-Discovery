id: bg-aging-reversal-mechanisms
title: Mechanistic understanding and reversal of biological aging
breakthrough_description: >
  Aging is the largest single risk factor for cancer, heart disease, neurodegeneration,
  and metabolic disease, yet its mechanism is debated. The leading candidate theories
  include: epigenetic entropy (information theory of aging, Sinclair), mitochondrial
  dysfunction and reactive oxygen species, accumulation of senescent cells with
  pro-inflammatory secretory phenotype (SASP), proteostasis collapse and protein
  aggregation, stem cell exhaustion, and altered intercellular communication. These
  are not mutually exclusive, but no consensus exists on their causal hierarchy —
  which is upstream cause and which is downstream effect. Partial reprogramming
  experiments in mice (restoring Yamanaka factors) reverse some aging hallmarks
  without full dedifferentiation, suggesting epigenetic remodeling is causal, but
  the mechanism is not understood and safe translation to humans is uncharted.
  The breakthrough needed: identification of the primary causal driver(s) of aging
  and a safe intervention that extends healthy lifespan in humans.
source_domain: geroscience
current_trl: 3
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Causal hierarchy of aging hallmarks is unresolved
    gap_description: >
      The twelve hallmarks of aging (Lopez-Otin et al. 2023) are observed correlates,
      not a proven causal chain. Senolytic drugs (dasatinib + quercetin) clear p16+
      senescent cells and improve function in aged mice and show preliminary human
      safety data, but whether senescence is causal or a response to upstream damage
      is unknown. The same uncertainty applies to all other hallmarks. Without knowing
      what to target first, interventions are empirical rather than mechanistic,
      limiting confidence in human translation.
    blocking_domain: cell-biology
    gap_type: scientific
  - gap_title: Epigenetic age reversal may trigger cancer or developmental regression
    gap_description: >
      Partial reprogramming with OSK (Oct4, Sox2, Klf4) Yamanaka factors in mice
      reverses DNA methylation age, improves tissue function, and extends lifespan
      in progeria models. However, long-term expression of reprogramming factors
      can cause teratomas and dedifferentiation. The window between "enough
      reprogramming to reverse epigenetic age" and "too much reprogramming causing
      cancer" is narrow and not well characterized. No controlled human trial has
      attempted systemic partial reprogramming.
    blocking_domain: molecular-biology
    gap_type: biological
  - gap_title: Aging biomarkers cannot reliably measure biological vs chronological age
    gap_description: >
      Clinical trials of aging interventions require validated endpoint biomarkers
      that measure biological age faster than waiting for disease or mortality endpoints.
      Epigenetic clocks (Horvath, GrimAge) correlate with chronological age and predict
      mortality risk, but they were calibrated on population data and it is unclear
      whether interventions that lower clock scores also reduce disease incidence.
      A drug that lowers an epigenetic clock score without improving health would
      pass a surrogate endpoint while delivering no clinical benefit.
    blocking_domain: clinical-medicine
    gap_type: regulatory

id: bg-photosynthesis-efficiency
title: Artificial and Enhanced Photosynthesis — Closing the Efficiency Gap from 1-2% to Theoretical Maximum
breakthrough_description: >
  Natural photosynthesis captures ~1-2% of incident solar energy as chemical energy
  in biomass — orders of magnitude below the theoretical maximum efficiency (~11%
  for oxygenic photosynthesis, limited by thermodynamics of the Z-scheme). Plants
  evolved under carbon and nutrient limitation, not efficiency optimization. Artificial
  photosynthesis — using sunlight to drive chemical synthesis, particularly water
  splitting for hydrogen production or CO₂ reduction for carbon-neutral fuels
  (syngas, methanol, formic acid) — has demonstrated efficiencies of 4-12% in lab
  devices. A scalable artificial photosystem approaching the thermodynamic efficiency
  limit would provide carbon-neutral fuels at competitive cost, addressing both
  energy storage and atmospheric CO₂.
source_domain: biochemistry
current_trl: 3
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Light-Harvesting Complex to Reaction Center Energy Transfer Efficiency
    gap_description: >
      Natural photosystems (PSII, PSI) use chlorophyll-protein antenna complexes
      to capture photons and funnel excitation energy to reaction centers with
      ~95% quantum efficiency. Artificial systems (dye-sensitized solar cells,
      porphyrin arrays) achieve 50-80% energy transfer efficiency in solution but
      degrade rapidly and lose efficiency at the solid-liquid interface required
      for water splitting. The design principles for maintaining high energy transfer
      efficiency (fast exciton hopping, minimal trapping by defects) while integrating
      organic chromophores with inorganic catalysts at a stable aqueous interface
      are unknown.
    blocking_domain: physical-chemistry
    gap_type: scientific
  - gap_title: Water Oxidation Catalyst Durability
    gap_description: >
      The oxygen evolution reaction (OER) — splitting water at the anode to produce O₂,
      4H⁺, and 4e⁻ — is the most energetically demanding half-reaction. Biological
      PSII uses a Mn₄CaO₅ cluster that is irreversibly damaged by high-intensity
      light (photoinhibition) and must be continuously replaced by the D1 protein
      turnover cycle. Artificial OER catalysts (IrO₂, CoOₓ, NiFe-LDH) are active
      but degrade at the acidic pH required by most artificial photosystems over
      100-10,000 hour operating periods. An OER catalyst that is simultaneously
      active at neutral pH, stable under illumination, and made from earth-abundant
      materials has not been demonstrated.
    blocking_domain: electrochemistry
    gap_type: materials
  - gap_title: CO₂ Fixation Enzyme Engineering
    gap_description: >
      RuBisCO — the enzyme responsible for CO₂ fixation in natural photosynthesis —
      is notoriously slow (3-10 CO₂ molecules fixed per second per enzyme) and has
      a competing oxygenase reaction (photorespiration) that wastes 25-40% of fixed
      carbon. Engineering or designing a faster, more selective CO₂-fixing enzyme
      is a central goal of synthetic biology. CO₂ electrocatalysis (CO₂ reduction
      to CO, formate, ethylene) achieves Faradaic efficiencies >90% for CO production
      but requires Faradaic efficiency >70% for multi-carbon products (C2+) with
      long catalyst lifetimes (>1000 hours), which is not yet achieved.
    blocking_domain: synthetic-biology
    gap_type: biological
  - gap_title: Whole-System Integration
    gap_description: >
      A complete artificial photosynthesis device requires integration of: light
      harvesting, charge separation (photovoltaic effect), proton-coupled electron
      transfer, OER catalyst, CO₂ reduction catalyst, product separation membrane,
      and mass transport management. Each component has been individually optimized
      in separate research communities, but integrating them into a stable,
      scalable device incurs large performance penalties at each interface.
      No artificial photosynthesis device has simultaneously demonstrated >5% solar-
      to-fuel efficiency, >1000 hour stability, and earth-abundant materials.
    blocking_domain: systems-engineering
    gap_type: engineering
required_bridges:

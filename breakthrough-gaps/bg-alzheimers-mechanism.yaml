id: bg-alzheimers-mechanism
title: Disease-Modifying Alzheimer's Therapy — Resolving the Causal Mechanism
breakthrough_description: >
  Alzheimer's disease (AD) affects 55 million people worldwide and is the leading
  cause of dementia. After 25 years and >100 failed clinical trials, the amyloid
  hypothesis (Hardy & Higgins 1992) received partial vindication: lecanemab
  (anti-amyloid antibody) received FDA approval in 2023 and slows cognitive decline
  by 27% over 18 months. Donanemab (2024) showed 35% slowing. However, the effect
  sizes are modest and the drugs cause amyloid-related imaging abnormalities (ARIA)
  in 20-40% of patients. The aducanumab controversy (accelerated approval 2021,
  withdrawn 2024) revealed deep uncertainty about whether amyloid removal is the
  right target or merely a biomarker of disease. A genuine disease-modifying therapy
  that halts or reverses cognitive decline requires understanding the causal
  mechanism linking amyloid, tau, neuroinflammation, and neurodegeneration.
source_domain: neuroscience
current_trl: 3
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Causal vs. Correlational Role of Amyloid
    gap_description: >
      Amyloid plaques are present in cognitively normal individuals (25% of
      70-year-olds are amyloid PET positive without dementia). Familial AD mutations
      in APP and PSEN1/2 increase amyloid production, establishing a causal genetic
      link. Down syndrome individuals (trisomy 21, 3 copies of APP gene) develop
      AD pathology by age 30. However, trials targeting amyloid upstream of plaque
      formation (BACE inhibitors: verubecestat, atabecestat, elenbecestat) all failed
      due to cognitive worsening, suggesting amyloid precursor processing has essential
      non-toxic functions. Whether soluble amyloid oligomers (not plaques) are the
      toxic species, and what their precise mechanism of toxicity is, remain unknown.
    blocking_domain: molecular-biology
    gap_type: scientific
  - gap_title: Glymphatic Dysfunction Mechanism
    gap_description: >
      Growing evidence implicates glymphatic system dysfunction (impaired perivascular
      CSF flow, see bridge b-glymphatic-cerebrospinal-fluid) in failure to clear
      amyloid-β and tau during sleep. Sleep disturbance is both a risk factor and
      early symptom of AD. Whether glymphatic dysfunction is causal (upstream of
      amyloid accumulation), a consequence of neurodegeneration, or an amplifying
      loop is unknown. This is a cross-domain fluid dynamics × neuroscience gap
      with direct therapeutic implications.
    blocking_domain: neuroscience
    gap_type: scientific
  - gap_title: Neuroinflammation-Neurodegeneration Causal Chain
    gap_description: >
      GWAS studies identify TREM2, ApoE, CR1, and other immune genes as the largest
      genetic risk factors for AD after age of onset. Microglia (brain-resident
      macrophages) clear amyloid through phagocytosis; TREM2 loss-of-function
      impairs this clearance and accelerates neurodegeneration. But chronic microglial
      activation also causes inflammatory damage to synapses and neurons. The
      therapeutic target — maximizing amyloid clearance while minimizing inflammatory
      neurotoxicity — requires understanding the spatiotemporal dynamics of the
      amyloid-microglia-synapse interaction, which has not been resolved.
    blocking_domain: neuroimmunology
    gap_type: scientific
  - gap_title: Blood-Brain Barrier Drug Delivery
    gap_description: >
      The blood-brain barrier (BBB) restricts passage of >98% of small molecules
      and virtually all biologic drugs. Anti-amyloid antibodies (lecanemab, donanemab,
      aducanumab) require high doses (IV infusion) to achieve therapeutic CNS
      concentrations, causing peripheral amyloid-related side effects. BBB-penetrant
      small molecule approaches (BACE inhibitors) caused cognitive worsening at
      effective doses. Focused ultrasound (FUS) transiently opens the BBB, enabling
      enhanced antibody delivery, but FUS-facilitated drug delivery has not been
      validated in phase 3 AD trials.
    blocking_domain: drug-delivery
    gap_type: engineering
required_bridges:
  - b-glymphatic-cerebrospinal-fluid
  - b-neuroimmunology-neurodegeneration
  - b-focused-ultrasound-drug-delivery

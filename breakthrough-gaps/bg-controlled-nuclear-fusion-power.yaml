id: bg-controlled-nuclear-fusion-power
title: Net energy gain controlled nuclear fusion at commercial scale
breakthrough_description: >
  In December 2022, the National Ignition Facility achieved Q_fusion > 1 for the
  first time — the fusion reaction released more energy than the laser energy
  deposited in the fuel capsule. However, accounting for wall-plug laser efficiency
  (~0.5%), the overall system Q was approximately 0.01. Commercial fusion requires
  sustained Q >> 1 (net positive to the grid), materials that survive years of
  14 MeV neutron bombardment without embrittlement or activation, and tritium
  breeding from lithium blankets at scale (the world's inventory of tritium is
  ~25 kg, barely enough for initial operation of a single reactor). All three
  requirements remain unmet simultaneously. The breakthrough needed: a complete
  integrated fusion power plant demonstrating sustained ignition, tritium
  self-sufficiency, and tolerable materials degradation at commercial power density.
source_domain: plasma-physics
current_trl: 4
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Plasma confinement instability at high beta
    gap_description: >
      Tokamaks must operate at high plasma pressure (high beta) to achieve commercially
      useful power density, but high-beta plasmas are prone to disruptions — sudden
      loss of confinement that can deposit 10-100 MJ on plasma-facing components in
      milliseconds. Disruption prediction and mitigation systems exist but are not
      reliable enough for unattended operation. Stellarators avoid disruptions but
      require complex 3D coil geometries that are difficult to engineer and maintain.
      No confinement concept has demonstrated stable high-beta operation continuously
      for hours.
    blocking_domain: plasma-physics
    gap_type: engineering
  - gap_title: First-wall and blanket materials under 14 MeV neutron flux
    gap_description: >
      Fusion neutrons at 14 MeV interact with structural materials differently from
      fission reactor neutrons. They produce helium and hydrogen gas bubbles in metals
      (transmutation), causing swelling, embrittlement, and reduced thermal conductivity
      over years of operation. Reduced-activation ferritic/martensitic steels (RAFM)
      and silicon carbide composites are candidate materials but have not been tested
      under prototypical fusion neutron spectra — no 14 MeV neutron irradiation
      facility at sufficient flux exists to qualify materials for DEMO timescales.
    blocking_domain: materials-science
    gap_type: materials
  - gap_title: Tritium breeding ratio must exceed 1.05 with no existing demonstration
    gap_description: >
      Every DT fusion reaction consumes one tritium atom. Commercial fusion must breed
      replacement tritium from Li-6 in a blanket surrounding the plasma at a tritium
      breeding ratio (TBR) > 1.05 to account for losses. No fusion blanket has been
      tested under real neutron flux at full scale. Beryllium neutron multipliers needed
      to reach TBR > 1 are toxic, and lithium-6 enrichment requires isotope separation
      infrastructure. The entire tritium fuel cycle — breeding, extraction, purification,
      re-injection — has never been demonstrated as an integrated system.
    blocking_domain: nuclear-engineering
    gap_type: engineering

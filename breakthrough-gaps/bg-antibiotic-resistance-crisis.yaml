  - "Kortright et al. (2019) Phage therapy: a renewed approach to combat antibiotic-resistant bacteria. Cell Host Microbe 25:219-232."
  - "Blaser (2016) Antibiotic use and its consequences for the normal microbiome. Science 352:544-545."

id: bg-antibiotic-resistance-crisis
title: New Antibiotic Classes and Alternative Strategies to Overcome Antimicrobial Resistance
breakthrough_description: >
  Antimicrobial resistance (AMR) is projected to cause 10 million deaths per year
  by 2050 (O'Neill Review 2016), exceeding cancer mortality. The WHO classifies AMR
  as one of the top 10 global public health threats. The last new antibiotic class
  approved by the FDA with novel mechanism of action was daptomycin in 2003 (targeting
  gram-positive bacteria); the last novel class for gram-negative bacteria was in the
  1960s. Since 2000, FDA antibiotic approvals have been primarily modifications of
  existing scaffolds (carbapenem analogues, new beta-lactam/inhibitor combinations)
  rather than novel mechanisms. Drug-resistant tuberculosis (XDR-TB), carbapenem-
  resistant Enterobacterales (CRE), and methicillin-resistant Staphylococcus aureus
  (MRSA) represent immediate clinical crises with limited treatment options.
source_domain: microbiology
current_trl: 3
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Novel Target Identification in Resistant Bacteria
    gap_description: >
      Most known antibiotic targets (cell wall synthesis, protein synthesis, DNA
      replication, membrane integrity) are either heavily defended by resistance
      mechanisms or have been exhaustively exploited. Identifying new essential
      bacterial processes that are (1) not present in human cells, (2) not subject
      to existing resistance mechanisms, and (3) amenable to small-molecule inhibition
      is the core scientific challenge. Promising candidates include bacterial cell
      division machinery (FtsZ), two-component regulatory systems, outer membrane
      biogenesis (LptD/E in gram-negatives), and fatty acid synthesis. However,
      these targets have resisted drug development due to poor cell permeability
      of inhibitors and rapid resistance emergence.
    blocking_domain: biochemistry
    gap_type: scientific
  - gap_title: Economic Market Failure for Antibiotic Development
    gap_description: >
      Antibiotics are uniquely economically unattractive: they are used briefly
      (5-14 days), should be held in reserve (prescribing restraint policies),
      have low reimbursement rates, and are rapidly rendered obsolete by resistance.
      This creates a market failure — a drug costing $1-2B to develop generates
      only $50-100M/year in revenue at responsible usage levels. Achaogen (2018)
      and Melinta Therapeutics (2019) both declared bankruptcy after successfully
      developing novel antibiotics. Without subscription-based or pull-incentive
      reimbursement models (e.g., UK AMR subscription pilot, PASTEUR Act in US),
      the private sector cannot sustainably invest in antibiotic development.
    blocking_domain: health-economics
    gap_type: economic
  - gap_title: Phage Therapy Regulatory Pathway
    gap_description: >
      Bacteriophage (phage) therapy — using bacterial viruses to kill specific
      pathogens — has been used compassionately in >100 cases and shows promise
      for biofilm infections, MDR pathogens, and prosthetic joint infections where
      conventional antibiotics fail. However, FDA regulatory requirements for phage
      therapy are unclear: phages are living biologics that evolve, are strain-
      specific, and cannot be manufactured to a fixed specification. Phage resistance
      emerges rapidly but can be countered by phage cocktail adjustment in real-time —
      a fundamentally different regulatory model from conventional drugs. No phage
      product has received FDA full approval.
    blocking_domain: regulatory-science
    gap_type: regulatory
  - gap_title: Microbiome Disruption Modeling
    gap_description: >
      Broad-spectrum antibiotics disrupt the gut microbiome for months after treatment,
      causing Clostridioides difficile colitis, increased antibiotic resistance gene
      transfer, and long-term metabolic and immune consequences. Narrow-spectrum
      antibiotics or microbiome-protective strategies (selective decolonization, FMT)
      require a quantitative model of antibiotic-microbiome dynamics that predicts
      collateral damage for a given antibiotic/dose/duration regimen. Such a model
      does not exist; clinical decision support for minimizing microbiome disruption
      is empirical.
    blocking_domain: microbiome-science
    gap_type: scientific
required_bridges:
  - b-microbiome-ecology-antibiotics
  - b-phage-biology-drug-development

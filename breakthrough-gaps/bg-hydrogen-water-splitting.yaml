id: bg-hydrogen-water-splitting
title: Low-Temperature Electrochemical Water Splitting for Green Hydrogen
breakthrough_description: >
  Scalable, low-cost water splitting using earth-abundant catalysts operating near
  room temperature would make green hydrogen competitive with natural gas reformation,
  enabling carbon-neutral fuels, long-duration grid storage, and industrial
  decarbonization (steel, cement, ammonia synthesis). The 2024–2026 literature
  shows nickel-iron oxyhydroxide (NiFe-OOH) and single-atom catalysts achieving
  water oxidation overpotentials below 200 mV — approaching theoretical limits.
  The gap between lab-scale catalyst performance and industrial electrolyzer
  economics is the primary barrier.
source_domain: electrochemistry
current_trl: 4
world_reshaping_potential: transformative
blocking_gaps:
  - gap_title: Catalyst Scale-Up from Lab to Industrial Electrolyzer
    gap_description: >
      Nickel-iron oxyhydroxide and single-atom catalysts achieve record overpotentials
      in milligram quantities on research electrodes. Industrial alkaline electrolyzers
      operate at 0.5–1 m² electrode areas with current densities of 200–400 mA/cm².
      Catalyst morphology, porosity, and active site density that are easy to control
      at milligram scale are difficult to reproduce at kilogram-scale synthesis.
      The active site density typically degrades by 10–100× at industrial scale.
    blocking_domain: materials-science
    gap_type: materials
  - gap_title: Membrane Durability and Economics
    gap_description: >
      Proton exchange membrane (PEM) electrolyzers use Nafion membranes and require
      iridium oxide catalysts (anode) costing ~$5,000/kg. Membrane degradation
      under current densities >1 A/cm² limits stack lifetime to 40,000–80,000 hours.
      The iridium supply is constrained to ~7 tonnes/year globally. Alkaline anion
      exchange membranes (AEM) could replace both Nafion and iridium but current
      AEM conductivity and durability fall short of commercial targets by 2–5×.
    blocking_domain: materials-science
    gap_type: materials
  - gap_title: Grid-to-Hydrogen Storage Thermodynamic Efficiency
    gap_description: >
      The round-trip efficiency of grid electricity → electrolysis → compressed H₂
      → fuel cell → electricity is approximately 30–45%, compared to 80–90% for
      battery storage. The thermodynamic and engineering losses in compression,
      liquefaction, or metal hydride storage compound the electrolyzer efficiency
      gap. For long-duration storage (weeks to seasonal), hydrogen is the leading
      candidate but the economics depend on closing this efficiency gap.
    blocking_domain: thermodynamics
    gap_type: engineering
  - gap_title: Hydrogen Distribution Infrastructure (Embrittlement)
    gap_description: >
      Repurposing natural gas pipelines for hydrogen is limited by hydrogen
      embrittlement of high-strength steel (particularly API 5L X70/X80 grades
      used in modern pipelines). Hydrogen atoms diffuse into steel grain boundaries,
      causing stress corrosion cracking. The fracture mechanics of steel under
      mixed H₂/natural gas blends (20–100% H₂) at distribution pressures
      (70 bar) is insufficiently characterized for regulatory approval.
    blocking_domain: materials-science
    gap_type: materials
required_bridges:

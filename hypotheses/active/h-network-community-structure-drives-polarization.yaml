proposed_tests:
  - description: >
      Build a network polarization model calibrated to Twitter/X political graph
      (using publicly available retweet network data pre-2023), measure network
      modularity Q, estimate inter-community edge density p_out, and predict
      the characteristic polarization time T_pol ∝ exp(1/p_out) from voter
      model theory, comparing to observed opinion divergence timescales.
    method: Network analysis (modularity measurement) + voter model simulation
    prediction: >
      The time for initially uniform network to reach current observed
      polarization level correlates with 1/p_out across different network
      subsets (by topic/hashtag), with correlation coefficient R > 0.7.
  - description: >
      Controlled experiment: randomly rewire 5-10% of edges in a simulated
      modular network (Stochastic Block Model, Q ≈ 0.4-0.6) to connect
      opposing communities, measure reduction in polarization time relative
      to null (no rewiring), compare to voter model prediction.
    method: Agent-based simulation + analytical voter model on SBM graph
    prediction: >
      Adding p_rewire = 0.1 fraction of cross-community edges reduces
      polarization time by factor exp(-α/p_rewire) for some α derived from
      the SBM block structure — exponential improvement from small number of
      bridging connections.

id: h-network-community-structure-drives-polarization
title: >
  Political polarization in online social networks arises from community
  structure (high modularity) creating exponentially long-lived metastable
  states in voter-model dynamics, predictable by the ratio of within-community
  to between-community edges, and reducible by algorithmic feed diversification.

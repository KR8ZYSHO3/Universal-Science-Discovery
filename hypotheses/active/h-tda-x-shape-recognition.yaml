proposed_tests:
  - description: Implement four filtration strategies (unweighted Vietoris-Rips, atom-type weighted VR, alpha complex, element-specific persistent homology) for 3D molecular structures; compute persistence diagrams for 20,000 protein-ligand complexes from PDBbind 2020; vectorize using persistence landscape; train gradient boosting models for IC₅₀ prediction; evaluate on core set (285 complexes); compare RMSE in logIC₅₀ across filtrations and against reported GNN baselines (SchNet, DimeNet); use 5-fold cross-validation with scaffold splits to avoid data leakage.

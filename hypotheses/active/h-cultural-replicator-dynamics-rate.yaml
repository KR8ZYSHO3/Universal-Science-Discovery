id: h-cultural-replicator-dynamics-rate
title: >
  The rate of cultural evolution is determined by the product of population size,
  innovation rate, and fidelity of cultural transmission, following the Price equation
  analogue for cultural traits; digitally-mediated communication increases copying
  fidelity and population connectivity, predicting an exponential acceleration in
  the rate of cultural change observable in linguistic and behavioural datasets.

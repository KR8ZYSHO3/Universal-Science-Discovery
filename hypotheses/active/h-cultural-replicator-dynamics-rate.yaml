evidence_links:
  - type: supporting
    doi: 10.1086/676828
    note: >
      Henrich (2004) — cultural transmission fidelity and population size jointly
      determine the rate of cumulative cultural evolution; formal Price equation treatment.
  - type: supporting
    doi: 10.1016/j.tics.2011.04.006
    note: >
      Mesoudi (2011) — cultural evolution rate accelerated dramatically post-agricultural
      revolution with population growth; analogous to Fisher's fundamental theorem.
  - type: related
    doi: 10.1038/s41562-019-0608-9
    note: >
      Acerbi & Altuchow (2019) — social media increases cultural transmission fidelity
      for simple memes; content complexity mediates the effect.
proposed_tests:
  - discipline: social-science
    description: >
      Extract lexical innovation rates from Google Books Ngram corpus (1800-2020) and
      Twitter/X N-gram datasets (2010-2024). Compute new-word adoption half-life per
      decade. Test whether the acceleration in adoption rate post-2010 is consistent
      with the Price-equation prediction given the measured increase in effective
      population connectivity (social media reach) and copying fidelity (hashtag
      replication).
  - discipline: evolutionary-theory
    description: >
      Run agent-based simulations of cultural evolution with varying population connectivity
      (network structure from pre-internet to social media topology) and transmission
      fidelity. Measure steady-state trait diversity and rate of trait turnover.
      Test whether the exponential acceleration in cultural change requires supralinear
      fitness effects from connectivity, or whether the Price equation prediction
      (linear in fidelity × population) is sufficient.

proposed_tests:
  - description: >
      Systematically compute colored Jones polynomials at all colors r = 2, 3, ..., 15
      for all prime knots with up to 20 crossings (Rolfsen table + extended tables);
      test whether any two distinct prime knots share identical colored Jones
      polynomials at all computed colors.
    method: "SnapPy/Knotpy automated computation; computer cluster for r > 10; comparison across complete knot database; Mathematica KnotTheory package"
    prediction: "No counterexample (two distinct prime knots with identical colored Jones at all r <= 15) found up to 20 crossings; suggests but does not prove completeness"
  - description: >
      Test whether the Jones polynomial distinguishes mutant knots (knots differing
      by a Conway mutation) using the full colored Jones polynomial at r = 4, where
      standard Jones (r = 2) fails for all known cases.
    method: "Compute r = 4 colored Jones for all known Conway mutation pairs (Kinoshita-Terasaka, Conway knot, etc.); test for equality"
    prediction: "Colored Jones at r = 4 distinguishes >90% of known mutation pairs where r = 2 Jones polynomial is identical; Conway knot distinguished at r <= 6"

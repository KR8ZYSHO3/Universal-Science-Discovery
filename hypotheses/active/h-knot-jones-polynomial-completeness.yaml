id: h-knot-jones-polynomial-completeness
title: >
  The colored Jones polynomial (all colors simultaneously) is a complete invariant
  of prime knots up to mirror image, with knot detection rate exceeding 99.9% for
  knots with fewer than 20 crossings
status: active
priority: medium
impact_score: 0.71

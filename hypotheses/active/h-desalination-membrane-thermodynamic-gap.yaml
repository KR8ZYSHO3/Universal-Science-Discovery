proposed_tests:
  - description: >
      Concentration polarization measurement: use optical coherence tomography
      (OCT) to non-invasively image concentration gradient profiles at membrane
      surface under operating conditions. Quantify boundary layer thickness as
      function of crossflow velocity. Test: energy loss from CP ∝ (δ/D)² — validate
      diffusion layer model.
  - description: >
      Hydrodynamic optimization trial: test spiral-wound RO module with pulsed
      crossflow (2 Hz oscillation, 20% amplitude) vs. steady crossflow at equal
      average velocity. Measure specific energy consumption and permeate flux.
      Hypothesis: pulsed flow reduces CP by 30% → 15% energy reduction.

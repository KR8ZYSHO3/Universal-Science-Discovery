id: h-desalination-membrane-thermodynamic-gap
title: >
  Current reverse osmosis desalination operates at 3–4× the thermodynamic minimum
  energy (0.7 kWh/m³ minimum vs. 2–4 kWh/m³ practical), and the gap is dominated
  by concentration polarization at the membrane boundary layer rather than
  membrane resistance — closing it requires hydrodynamic engineering, not
  new membrane chemistry.

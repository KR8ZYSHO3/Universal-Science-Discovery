proposed_tests:
  - description: >
      Implement one-axis twisting spin squeezing in a Sr optical lattice clock
      with N = 10^4 atoms. Measure clock stability (Allan deviation) as a
      function of atom number with and without squeezing. Test whether the
      sensitivity improvement matches the squeezing factor measured by
      Wineland parameter ξ_R < 1, and whether decoherence limits the
      achieved sensitivity to N^(-2/3) scaling.

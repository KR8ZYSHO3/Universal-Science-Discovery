id: h-spin-squeezed-states-heisenberg-limited-sensing
title: >
  Spin-squeezed atomic ensembles generated via one-axis twisting or cavity-
  mediated interactions can achieve Heisenberg-limited sensitivity
  (ΔΦ ∝ 1/N) in practical atomic clocks and magnetometers, and the
  decoherence-imposed limit in realistic systems is ΔΦ ∝ N^(-2/3) —
  still a significant improvement over the standard quantum limit N^(-1/2)
  achievable with current trapped-ion and optical lattice clock technology.

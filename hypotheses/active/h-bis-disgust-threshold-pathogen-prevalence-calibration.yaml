id: h-bis-disgust-threshold-pathogen-prevalence-calibration
title: >
  Trait disgust sensitivity calibrates to local historical pathogen prevalence across
  populations via epigenetic mechanisms (DNA methylation of serotonin transporter and
  oxytocin receptor promoters), such that populations from high-pathogen regions show
  heritable but reversible BIS upregulation detectable within 2 generations of
  migration to low-pathogen environments.
status: active
priority: low
impact_score: 0.55
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-behavioral-immune-system-pathogen-xenophobia-mechanism
evidence_links:
  - type: supporting
    note: "Fincher et al. (2008) Proc R Soc B 275:1279 — historical pathogen prevalence predicts collectivism (r=0.69) and low extraversion (r=0.49) across 68 nations; effect size large enough to suggest biological mechanism beyond cultural transmission alone"
    confidence: 0.62
  - type: related
    note: "Lam et al. (2010) — serotonin transporter gene (5-HTTLPR) frequency correlates with pathogen prevalence across nations; 5-HTTLPR S-allele associated with higher neuroticism and disgust sensitivity — possible genetic mechanism"
    confidence: 0.50
  - type: contradicting
    note: "Murray & Schaller (2016) — cross-national BIS-pathogen correlations could reflect historical cultural transmission (language, religion, norms) rather than biological calibration; within-nation migration studies are confounded by selective migration"
    confidence: 0.65
proposed_tests:
  - description: >
      Immigrant cohort study: compare disgust sensitivity (Three Domain Disgust Scale),
      oxytocin receptor methylation (blood OXTR CpG methylation), and 5-HTTLPR
      genotype in (1) first-generation immigrants from high-pathogen countries to
      low-pathogen Sweden/Norway, (2) their 2nd-generation children born in Sweden,
      (3) matched controls in origin country, (4) matched Swedish controls. Test:
      OXTR methylation decreases from G1 to G2 immigrants, partially converging
      to Swedish norms; disgust sensitivity follows same trajectory.
  - description: >
      Controlled exposure: randomised disgust-priming study with pathogen-disease
      vs. non-pathogen disgust images across 200 participants from high-pathogen
      (India, Nigeria) vs. low-pathogen (Norway, Japan) backgrounds. Measure
      post-prime implicit outgroup attitudes (IAT) and willingness to interact with
      morphologically novel (but non-threatening) strangers. Test: pathogen (not
      non-pathogen) prime increases outgroup avoidance; effect larger in high-pathogen
      origin participants.
related_disciplines:
  - evolutionary-biology
  - social-science

id: h-chronic-pain-glial-sensitization
title: >
  Central sensitization in chronic pain is maintained by microglial-astrocyte cross-talk
  in the dorsal horn — not by sustained nociceptor input alone — such that blocking
  microglial P2X4R-BDNF signaling after nerve injury prevents the transition from
  acute to chronic pain in a 2-week window that remains open for therapeutic intervention.

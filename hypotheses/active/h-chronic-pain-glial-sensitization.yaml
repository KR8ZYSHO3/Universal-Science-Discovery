evidence_links:
  - type: supporting
    doi: 10.1016/j.cell.2005.08.006
    note: >
      Tsuda et al. (2003) — microglial P2X4R upregulation after nerve injury
      drives allodynia; BDNF released from microglia shifts GABA signaling
      in lamina I neurons causing disinhibition and central sensitization.
  - type: supporting
    doi: 10.1016/j.neuron.2018.11.022
    note: >
      Bhatt et al. (2020) — astrocyte-microglia interaction amplifies central
      sensitization; TNF-α from astrocytes sustains microglial activation.
proposed_tests:
  - discipline: medicine
    description: >
      Perform spinal nerve ligation (SNL) in Wistar rats (N=60). At days 1, 3,
      7, 14 post-SNL, intrathecally inject P2X4R antagonist 5-BDBD (30 nmol)
      or vehicle. Measure mechanical allodynia (Von Frey) and thermal hyperalgesia
      (Hargreaves) at days 7, 14, 21, 28. Hypothesis: P2X4R blockade initiated
      within day 7 post-SNL prevents development of chronic allodynia at day 28
      (>80% reduction vs vehicle), while blockade initiated at day 14 provides
      only partial prevention (30-50%), confirming a therapeutic window of 7-14 days.

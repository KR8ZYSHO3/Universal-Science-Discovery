proposed_tests:
  - description: Simulate SIR dynamics on synthetic scale-free networks (Barabási-Albert model) with power-law exponents γ = 2.0, 2.5, 3.0 for N = 10³ to 10⁷ nodes; measure effective epidemic threshold versus N; compare to mean-field prediction R₀ > 1 and network heterogeneity prediction threshold ∝ 1/ln(N); test whether targeted vaccination of high-degree nodes restores the classical threshold.

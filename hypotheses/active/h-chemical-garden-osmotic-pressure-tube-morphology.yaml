proposed_tests:
  - description: >
      Grow CuSO4 chemical gardens in 0.5, 1.0, 2.0, 4.0, 8.0 M Na2SiO3 solutions. Image tube cross-
      sections at 5 minutes post-initiation. Measure tube inner diameter by image analysis. Independently
      measure D_Cu by diffusion cell experiment and k_prec by stopped-flow spectrophotometry. Test
      predicted d ~ (D_Cu/k_prec)^{1/2} scaling without fitting.
    method: "Chemical garden growth + optical microscopy + stopped-flow k_prec measurement + diffusion cell D_Cu"
    prediction: "Tube diameter follows predicted scaling to within 30% across 5 silicate concentrations; diameter decreases with increasing k_prec"

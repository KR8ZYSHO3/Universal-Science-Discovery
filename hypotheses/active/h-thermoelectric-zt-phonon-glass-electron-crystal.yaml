proposed_tests:
  - discipline: materials-science
    description: >
      Synthesise a series of type-I clathrate (Ba8Ga16Ge30) crystals with varying
      rattler atom (Ba) occupancies (20-100%). Measure Seebeck coefficient, electrical
      conductivity, and thermal conductivity as a function of temperature (300-900K).
      Test whether zT scales with the phonon scattering cross-section of rattlers
      (σ ∝ rattler-cage frequency mismatch²) as predicted by phonon-PGEC theory.
  - discipline: condensed-matter-physics
    description: >
      Apply inelastic neutron scattering to mapped phonon dispersion of high-zT
      (>2) vs. conventional (zT~1) clathrates. Test whether anomalous phonon softening
      and avoided crossings (rattler-acoustic hybridisation) are present specifically
      in high-zT samples and absent in control samples, confirming phonon engineering
      as the dominant mechanism rather than electronic Seebeck enhancement.

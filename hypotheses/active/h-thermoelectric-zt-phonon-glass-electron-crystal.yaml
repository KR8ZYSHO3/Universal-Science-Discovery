id: h-thermoelectric-zt-phonon-glass-electron-crystal
title: >
  The fundamental upper limit on thermoelectric figure-of-merit zT is set by the
  Wiedemann-Franz law violation achievable through bipolar filtering of phonon transport
  by rattler atoms in cage-structured materials; the theoretical maximum zT approaches
  unity from the phonon-glass electron-crystal design principle and cannot be substantially
  exceeded without materials that simultaneously achieve electronic topological protection
  and phononic Anderson localisation.

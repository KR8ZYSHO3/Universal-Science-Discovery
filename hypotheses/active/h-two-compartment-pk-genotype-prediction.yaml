id: h-two-compartment-pk-genotype-prediction
title: "A population pharmacokinetic model incorporating CYP3A4 and CYP2D6 genotype, age, and baseline creatinine will predict individual oral drug AUC within ±30% for >75% of patients for high-variability CYP-metabolized drugs, outperforming standard weight-based dosing by reducing the proportion of patients with subtherapeutic or toxic exposures"
status: active
priority: high
impact_score: 0.78
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1124/dmd.108.020198"
    type: supporting
    confidence: 0.75
    note: "Guengerich (2008) - CYP enzymes; PK variability from genotype"
  - doi: "10.1002/cpt.1"
    type: supporting
    confidence: 0.70
    note: "Rowland Yeo et al. (2013) - prediction of drug-drug interactions from CYP data"
  - type: related
    note: "Desta et al. (2002) - comprehensive review of the CYP2C19 metabolism of tamoxifen"

unknowns_addressed:
  - u-pharmacokinetic-interindividual-variability

proposed_tests:
  - description: >
      Prospective PK study: measure AUC by sparse sampling in 200 patients receiving tacrolimus (CYP3A4
      substrate). Predict individual AUC using: (1) standard weight-based dosing, (2) genotype-informed
      2-compartment popPK model. Compare prediction error distribution and % patients within therapeutic range.
    method: "Sparse PK sampling + LC-MS/MS drug level measurement + Bayesian popPK fitting (NONMEM)"
    prediction: "Genotype-informed model should achieve AUC prediction within ±30% for >75% patients vs ~55% for weight-based dosing"


proposed_tests:
  - description: >
      Measure ER membrane curvature at high resolution using cryo-electron
      tomography (cryo-ET) in HeLa cells; compute mean curvature H(x) at
      each membrane patch; test whether the distribution of H² matches the
      Helfrich Willmore minimizer prediction for the measured bending modulus
      κ (κ = 20 k_BT for ER lipid composition).
    method: "Cryo-ET tomograms at 2 nm resolution; membrane segmentation via DeepMIB; mean curvature computed from discrete surface Laplacian; comparison to Willmore energy density from Helfrich parameters"
    prediction: "ER curvature distribution matches Helfrich minimizer prediction within 15%; tubular ER has |H| = 1/r_tube ≈ 50 nm⁻¹ as predicted by Willmore energy minimisation at fixed volume"
  - description: >
      Test active Willmore flow: apply micropipette aspiration to measure κ in vivo
      for the plasma membrane of mesoderm cells in Drosophila gastrulation; then
      predict the membrane shape changes during cell invagination using Willmore
      flow with cytoskeletal tension as external forcing; compare to high-speed
      confocal imaging.
    method: "Micropipette aspiration (κ measurement) + live confocal imaging of myosin-GFP during invagination; Willmore flow numerical simulation with measured κ and myosin pressure"
    prediction: "Cell membrane shape during invagination matches Willmore flow prediction within 20% RMSE; deviations identify non-Willmore contributions (cytoskeletal buckling, osmotic pressure)"


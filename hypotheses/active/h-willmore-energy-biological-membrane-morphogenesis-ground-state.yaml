id: h-willmore-energy-biological-membrane-morphogenesis-ground-state
title: >
  Biological cell membrane shapes during morphogenesis are Willmore energy
  (W = ∫H² dA) minimizers subject to volume and area constraints, with
  active cytoskeletal forces entering as Lagrange multipliers that define
  the morphogenetic Willmore flow, and the shapes of cell organelles (ER,
  Golgi) are calculable from the Helfrich elastic model without free parameters.
status: active
priority: medium
impact_score: 0.74

id: h-social-ising-polarization-transition
title: >
  Political polarisation in democratic societies undergoes a critical
  transition quantitatively consistent with the Ising ferromagnetic
  universality class: the opinion order parameter scales as m ~ (h_c - h)^β
  with β ≈ 1/2 (mean-field) as network homophily h approaches the critical
  threshold h_c, and this transition is detectable from longitudinal
  survey data using order-parameter scaling analysis.

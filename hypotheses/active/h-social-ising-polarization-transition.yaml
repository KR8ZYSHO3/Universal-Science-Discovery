proposed_tests:
  - description: >
      Analyse the time series of US Congress roll-call vote polarisation
      (DW-NOMINATE scores, 1789–2024) as a function of measured cross-partisan
      social ties (estimated from campaign donor overlap and Twitter follow
      networks). Fit the Ising mean-field equation m(h) and test whether the
      observed polarisation trajectory follows the β = 1/2 scaling exponent
      as homophily h increases toward h_c.
    type: data_analysis
  - description: >
      Social network experiment: assign participants randomly to high-homophily
      (segregated) vs. low-homophily (integrated) online discussion platforms
      for 6 weeks. Measure opinion bimodality (order parameter m) at baseline
      and end. Test whether high-homophily condition produces statistically
      significant shift toward bimodal distribution consistent with crossing T_c.
    type: randomised_experiment
  - description: >
      Cross-national analysis: measure opinion bimodality (m) from Eurobarometer
      longitudinal surveys (1970–2024, 27 EU countries) and correlate with
      network homophily estimates (partisan residential segregation index,
      media consumption overlap). Test whether the m vs. homophily relationship
      is consistent with Ising mean-field scaling across countries.
    type: cross_national_analysis

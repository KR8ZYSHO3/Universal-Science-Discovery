id: h-glymphatic-dysfunction-drives-amyloid-accumulation
title: >
  Glymphatic system dysfunction — reduced perivascular CSF flow from arterial
  stiffening and AQP4 depolarization — is an upstream causal event in Alzheimer's
  disease that precedes symptomatic amyloid accumulation and represents a treatable
  target for disease prevention.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: critical
related_disciplines:
  - neuroscience
  - fluid-dynamics
  - neurology
  - preventive-medicine
unknowns_addressed:
  - u-glymphatic-flow-impairment-alzheimers
evidence_links:
  - type: supporting
    note: >
      Ju et al. (2017) JAMA Neurol: obstructive sleep apnea (which impairs slow-wave
      sleep and glymphatic flow) is associated with elevated CSF amyloid-β42 and
      accelerated cognitive decline — consistent with glymphatic-amyloid linkage.
  - type: supporting
    note: >
      Boespflug & Bhatt (2020) Curr Neurol Neurosci Rep: CSF tracer MRI studies
      show reduced glymphatic transport in older adults and AD patients compared
      to young controls; transport correlates inversely with amyloid PET burden.
  - type: contradicting
    note: >
      Reeves et al. (2020): AQP4-knockout mice show reduced glymphatic flow but
      do not develop spontaneous amyloid plaques without human APP expression —
      suggesting glymphatic dysfunction is permissive but not sufficient for AD.
  - type: related
    note: >
      Lecanemab (anti-amyloid antibody, FDA approved 2023) reduces amyloid burden
      and slows decline — demonstrates amyloid causality but does not address whether
      glymphatic restoration would be additive.
proposed_tests:
  - discipline: neurology
    description: >
      Longitudinal CSF tracer MRI study in cognitively normal APOE4 homozygotes
      (highest genetic AD risk) aged 50-65. Measure glymphatic transport index
      annually. Test whether reduced glymphatic transport predicts amyloid PET
      conversion (amyloid-negative to positive) within 3-5 years.
  - discipline: medicine
    description: >
      Randomized controlled trial: slow-wave sleep enhancement (transcranial
      slow-oscillation stimulation, 0.75 Hz, during NREM sleep) for 6 months in
      amyloid-positive MCI patients. Primary endpoint: change in CSF amyloid-β42/40
      ratio. Secondary endpoints: tau, neuroinflammation markers, cognitive composite.
      Test whether enhanced glymphatic clearance (via sleep enhancement) slows
      amyloid accumulation independently of anti-amyloid immunotherapy.

id: h-meme-channel-social-media-bias
title: >
  Social media recommendation algorithms reduce the effective diversity of cultural
  transmission by introducing systematic, emotionally-biased channel noise that
  amplifies content below the channel capacity for factual information while exceeding
  the channel capacity for emotionally charged content — measurable as a reduction
  in the effective Shannon entropy of consumed information.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
related_disciplines:
  - social-science
  - information-theory
  - cultural-evolution
  - communication-theory
unknowns_addressed:
  - u-meme-channel-capacity-measurement
evidence_links:
  - type: supporting
    doi: "10.1073/pnas.1620198114"
    note: >
      Brady et al. (2017) PNAS: moral-emotional words increase Twitter spread by 20%
      per word — direct evidence of emotionally-biased algorithmic amplification
      corresponding to systematically non-white channel noise.
  - type: supporting
    doi: "10.1126/science.aap9559"
    note: >
      Vosoughi et al. (2018) Science: false news spreads faster and more broadly than
      true news on Twitter — evidence that the algorithmic channel systematically
      amplifies low-fidelity (high-noise) content over high-fidelity content.
  - type: contradicting
    note: >
      Social media also enables access to diverse information sources not available
      in pre-internet media monocultures. Whether the net effect on information
      diversity is positive or negative depends on individual usage patterns, filter
      bubble extent, and the counterfactual (what media people would consume without
      social media).
proposed_tests:
  - discipline: social-science
    description: >
      Measure the Shannon entropy of news topics consumed weekly by a cohort of
      social media users (via API data). Compare to the entropy of topics in a
      chronological feed (no algorithmic curation) for the same users. Test whether
      algorithmic curation reduces entropy (reduces topic diversity) and whether
      the reduction is proportional to engagement-optimisation intensity (more
      engagement-optimised platforms = lower entropy).
  - discipline: information-theory
    description: >
      Model the social media recommendation algorithm as a discrete channel with
      content-dependent noise (amplification matrix A where A_ij = P(user receives
      content j | content i was posted)). Compute the effective channel capacity under
      this matrix using the Blahut-Arimoto algorithm. Test whether engagement-maximising
      algorithms systematically reduce capacity for factual content while preserving
      or increasing capacity for emotional content.

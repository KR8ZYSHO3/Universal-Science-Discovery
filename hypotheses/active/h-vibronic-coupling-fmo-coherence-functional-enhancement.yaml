id: h-vibronic-coupling-fmo-coherence-functional-enhancement
title: >
  Vibronic coupling — resonance between electronic energy gaps and specific protein
  vibrational modes in FMO and LHCII — does not enhance energy transfer efficiency
  beyond Redfield theory predictions at 300K; isotope-substitution experiments that
  detune vibrational resonances will show <5% change in charge-separation quantum yield,
  refuting functional quantum coherence in photosynthesis.
status: active
priority: high
impact_score: 0.76
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-photosynthesis-quantum-coherence-physiological-function
evidence_links:
  - type: supporting
    note: "Cao et al. (2020) Science 368:eaaz4888 — comprehensive review concludes vibrational coherence (not electronic) accounts for most 2DES oscillatory signals; electronic coherence timescale (~50 fs) shorter than fastest energy transfer steps at 300K"
    confidence: 0.75
  - type: supporting
    note: "Duan et al. (2017) PNAS — 2DES at 300K in LHC2 shows oscillations that match ground-state vibrational modes, not interchromophore electronic coherences; quantum pathway interference provides no efficiency enhancement"
    confidence: 0.72
  - type: contradicting
    note: "Fleming et al. (2007) Nature — 660 fs coherence beats at 77K observed; disputed whether physiological temperature preserves any functional coherence component"
    confidence: 0.50
  - type: contradicting
    note: "Romero et al. (2014) Nat Phys — evidence for vibronically-coupled states in PSII RC that accelerate charge separation; these have electronic character and could provide functional advantage"
    confidence: 0.60
proposed_tests:
  - description: >
      Isotope substitution experiment: synthesise ¹³C₁₅N-labelled bacteriochlorophyll
      for FMO reconstitution (shifts C=C stretch from 1530 to ~1490 cm⁻¹, detuning
      vibronic resonance without changing electronic energies). Measure 2DES oscillation
      amplitudes and energy transfer rates in ¹²C vs. ¹³C₁₅N FMO at 77K and 300K.
      Prediction: oscillation amplitudes decrease proportionally to isotope detuning;
      energy transfer rate unchanged (Redfield theory) — confirming vibrational origin
      and no functional role.
  - description: >
      Genetic modification of FMO protein to alter site energies by ±100 cm⁻¹ through
      point mutations near BChl 3 (central pigment in energy funnel). Measure charge-
      separation yield as function of inter-chromophore energy gap. If quantum coherence
      provides functional enhancement, yield should be maximized at the vibronic resonance
      condition; if Redfield theory is sufficient, yield should be insensitive to ±100 cm⁻¹
      tuning within the disorder distribution.

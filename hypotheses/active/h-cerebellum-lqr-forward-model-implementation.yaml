id: h-cerebellum-lqr-forward-model-implementation
title: >
  The cerebellum implements a forward model that predicts sensory consequences of
  motor commands via a biologically plausible approximation to the Kalman filter:
  Purkinje cells encode prediction of sensory state given efference copy, granule
  cells provide the basis for state representation, and climbing fiber error drives
  gradient descent on prediction error, implementing a neural linear quadratic
  regulator for motor control.

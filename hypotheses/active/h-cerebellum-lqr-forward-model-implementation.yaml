proposed_tests:
  - description: >
      Perturbation study: expose participants to visuomotor rotations (30° clockwise
      rotation of cursor). Measure: adaptation rate vs Kalman gain prediction (function
      of sensory noise variance). Manipulate sensory noise (add visual jitter).
      Test: does adaptation rate follow Kalman filter optimal gain as function of noise?
    prediction: "Adaptation rate decreases by 40-60% when visual noise doubled (consistent with Kalman gain reduction); cerebellar-lesioned patients show impaired but not absent adaptation."

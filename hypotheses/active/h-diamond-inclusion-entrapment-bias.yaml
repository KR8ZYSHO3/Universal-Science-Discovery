id: h-diamond-inclusion-entrapment-bias
title: >
  Diamond inclusion ages systematically underestimate ancient mantle events by
  up to 500 Myr due to preferential entrapment of younger, metasomatic minerals
  during diamond recrystallization, detectable through inclusion compositional
  heterogeneity within single diamonds.
status: active
priority: low
impact_score: 0.58
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-diamond-inclusion-dating
evidence_links:
  - type: supporting
    note: "Shirey & Richardson (2011) Re-Os dating of sulfide inclusions: 3.5 Ga ages in Kaapvaal diamonds — oldest direct mantle sample constraint"
    confidence: 0.75
  - type: related
    note: "Nestola et al. (2019) fibrous diamond inclusions show multiple growth generations — evidence for recrystallization bias in age populations"
    confidence: 0.65
  - type: related
    note: "Stachel & Harris (2008) review: syngenetic vs. protogenetic inclusion controversy — protogenetic inclusions may predate diamond growth by Gyr"
    confidence: 0.70
proposed_tests:
  - description: >
      Multi-inclusion dating within single diamonds: extract 10 sulfide inclusions
      from each of 20 diamonds (different sectors). Perform Re-Os isochron per diamond.
      Test: age variance within single diamond > analytical error, indicating
      multiple growth episodes. Compare mean age vs. oldest age per diamond.
  - description: >
      TEM analysis of inclusion-diamond interfaces: identify structural discontinuities
      (epitaxial vs. random crystallographic orientation) in 50 inclusions. Classify
      as syngenetic (epitaxial) vs. protogenetic. Reanalyze age database stratified
      by inclusion type. Test: protogenetic inclusions older by statistically
      significant margin.
related_disciplines:
  - geochronology
  - petrology
  - mantle-geochemistry

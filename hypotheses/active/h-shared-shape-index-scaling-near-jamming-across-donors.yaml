id: h-shared-shape-index-scaling-near-jamming-across-donors
title: >
  Primary bronchial epithelial cultures from multiple donors will collapse onto a common master curve when mean cell shape index is plotted against variance of cellular velocities after stress normalization — falsified if asthma-associated donors retain statistically separated branches inconsistent with a single jamming surface.
status: active
priority: medium
impact_score: 0.42
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1038/nmat4357"
    type: related
    confidence: 0.5
    note: Demonstrates donor-dependent jamming phenotypes requiring quantitative scaling tests

unknowns_addressed:
  - u-jamming-exponent-universality-epithelium-versus-colloid

proposed_tests:
  - description: >
      Culture matched passages across donors; quantify shape index and velocity variance under controlled compression; fit scaling collapse versus dimensionless active stress proxies.
    method: Live-cell microscopy + automated segmentation + traction inference where available
    prediction: Single-parameter collapse within measurement uncertainty for healthy donors; predictable offsets for asthmatic cohort if inflammation shifts critical surface

related_disciplines:
  - biophysics
  - statistical-physics

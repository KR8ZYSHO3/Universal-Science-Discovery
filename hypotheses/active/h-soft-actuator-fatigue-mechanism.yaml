id: h-soft-actuator-fatigue-mechanism
title: >
  Fatigue failure in soft pneumatic actuators is dominated by crack initiation at
  geometric stress concentrations in the fiber reinforcement interface layer, and
  10^7-cycle durability is achievable with interpenetrating network silicone
  elastomers and crack-arresting fiber architectures.
status: active
priority: medium
impact_score: 0.65
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-soft-robotics-actuator-lifespan
evidence_links:
  - type: supporting
    note: "Mosadegh et al. (2014) pneumatic networks: failure at 10^4 cycles due to delamination at bending channel corners — geometric stress concentration confirmed by FEA"
    confidence: 0.72
  - type: related
    note: "Terryn et al. (2017) self-healing silicone actuators recover 80% strength after fatigue damage — extends effective lifetime 3x"
    confidence: 0.65
  - type: related
    note: "Interpenetrating network (IPN) elastomers (Ducrot et al. 2014) achieve 10x crack resistance over single-network — applicable to soft actuator walls"
    confidence: 0.70
proposed_tests:
  - description: >
      Cyclic fatigue test: fabricate soft pneumatic bending actuators in 5 materials
      (Ecoflex 0030, Dragon Skin 20, IPN silicone, carbon fiber reinforced IPN,
      polyurethane foam composite). Pressure cycle at 10 Hz to failure. Measure
      N_f vs. ΔP (S-N curve). Test hypothesis: IPN actuators achieve N_f > 10^7
      at 80% of burst pressure.
  - description: >
      Failure mode characterization: SEM cross-sections of failed actuators at 10%,
      50%, 90% of N_f. Map crack initiation site distribution. Correlate with FEA
      stress concentration factor K_t. Validate: K_t > 3 sites account for >80%
      of initiation events.

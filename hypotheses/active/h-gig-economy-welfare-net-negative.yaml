id: h-gig-economy-welfare-net-negative
title: >
  Gig platform expansion produces net welfare losses when worker welfare losses
  (income volatility, benefit loss, monopsony exploitation) exceed consumer
  surplus gains, with the balance tipping positive only in high-wage, low-regulation
  labor markets where misclassification is absent.
status: active
priority: medium
impact_score: 0.65
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-gig-economy-welfare-effects
evidence_links:
  - type: supporting
    note: "Koustas (2018) gig income variance 4x higher than comparable employee income, reducing lifetime utility via consumption smoothing failure"
    confidence: 0.70
  - type: related
    note: "Hall & Krueger (2018) Uber drivers earn above local minimum wage on average but below traditional taxi drivers after costs"
    confidence: 0.60
  - type: contradicting
    note: "Farber (2015) flexible hours create significant worker surplus; valuation of scheduling flexibility >$4/hour in survey experiments"
    confidence: 0.65
proposed_tests:
  - description: >
      Regression discontinuity using California AB5 (2020) gig worker classification law:
      compare earnings, benefits, income volatility, and health insurance coverage
      for affected workers (Uber/Lyft drivers) vs. control (exempt sectors) 3 years
      after AB5, using tax records + SIPP. Estimate total welfare change including
      consumer price effects.
  - description: >
      Structural welfare analysis: calibrate a model with worker heterogeneity
      (risk aversion, outside options), monopsony power, and consumer demand.
      Compute total surplus (worker + consumer + platform profit) under gig vs.
      employee regimes. Identify conditions under which gig model increases total welfare.
related_disciplines:
  - labor-economics
  - platform-economics
  - regulation

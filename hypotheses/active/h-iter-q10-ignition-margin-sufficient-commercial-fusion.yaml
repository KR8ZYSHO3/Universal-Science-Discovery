id: h-iter-q10-ignition-margin-sufficient-commercial-fusion
title: >
  ITER will achieve Q ≥ 10 (500 MW fusion from 50 MW heating) in its DT
  burning plasma phase, and the confinement, stability, and plasma-facing
  material performance will be sufficient to demonstrate the physics basis
  for a DEMO commercial fusion plant with Q ≥ 25.

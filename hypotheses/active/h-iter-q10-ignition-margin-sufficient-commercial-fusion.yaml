proposed_tests:
  - description: >
      ITER's first DT plasma operations (Phase 2, target ~2035): measure
      neutron production rate, energy confinement time τ_E, and fusion power Q
      against design predictions. Critical test: does IPB98y2 H-mode scaling
      (which predicts τ_E = 3.7 s for ITER conditions) hold at ITER scale?
      Previous largest tokamaks (JET, Q=0.67; JT-60U extrapolated Q~1.25) are
      5-10× smaller in energy than ITER.
    method: >
      Direct measurement of 14 MeV neutron flux (calibrated neutron cameras),
      comparison of τ_E to Bohm and gyro-Bohm scaling predictions. ELM behaviour
      characterisation vs. ITER design limits.
    prediction: >
      Q ≥ 10 achieved at n_e = 10²⁰ m⁻³, T = 15 keV, τ_E ≥ 3.7 s.
      H-mode L-H threshold power ≤ 80 MW (available from ICRH + NBI + ECH).
      ELMs controllable with RMPs without unacceptable confinement degradation.
  - description: >
      Pre-ITER: JET DTE3 (2023-2025) deuterium-tritium experiments to test
      performance with ITER-Like Wall (ILW, tungsten/beryllium). JET Q~0.33
      from DTE1 (1997); DTE2 (2022) achieved 59 MJ at Q~0.33 (improved by
      tritium inventory management). DTE3 should push toward Q~0.5-0.7.
    method: >
      Comparison of DTE3 results to IPB98y2 scaling extrapolation to ITER.
    prediction: >
      DTE3 achieves Q = 0.5-0.7 (10-15 MW fusion from ~25 MW input) with
      tungsten first wall. Performance gap between JET and ITER prediction
      within uncertainty of confinement scaling laws.

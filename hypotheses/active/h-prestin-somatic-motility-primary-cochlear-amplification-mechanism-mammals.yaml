id: h-prestin-somatic-motility-primary-cochlear-amplification-mechanism-mammals
title: >
  Prestin-based somatic electromotility is the primary cycle-by-cycle
  amplification mechanism in the mammalian cochlear amplifier at high
  frequencies (>3 kHz), while active hair bundle motility plays a subsidiary
  role in amplification but is the dominant mechanism for generating the
  Hopf nonlinearity at low frequencies (<1 kHz).

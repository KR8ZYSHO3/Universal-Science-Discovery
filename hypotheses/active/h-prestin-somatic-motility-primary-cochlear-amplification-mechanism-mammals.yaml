proposed_tests:
  - description: >
      Conditional OHC-specific knockout of MYO1C (the hair bundle adaptation
      motor) using a Prestin-Cre driver. Measure DPOAE thresholds and BM
      velocity at 1, 4, 8, 16, 32 kHz in conditional knockouts vs. wildtype.
      Prediction: MYO1C knockout reduces amplification (DPOAE loss) at low
      frequencies (<2 kHz) but not at high frequencies, consistent with hair
      bundle motility dominating at low frequencies.
    method: >
      Mouse auditory brainstem response (ABR) and DPOAE threshold measurements;
      BM velocity via laser Doppler vibrometry at multiple cochlear locations
      in anaesthetised mice.
    prediction: >
      MYO1C conditional knockout: DPOAE threshold shift ≥20 dB at 1 kHz,
      ≤5 dB at 16 kHz. Prestin knockout: DPOAE threshold shift ≥40 dB at
      all frequencies above 4 kHz. Double knockout: additive loss at all
      frequencies, confirming independent mechanisms.
  - description: >
      Frequency dependence of the Hopf nonlinearity exponent (response ∝ F^α):
      if prestin dominates at high frequency and hair bundle at low frequency,
      the 1/3 power law (α = 1/3, critical Hopf) should be more precisely
      maintained at high frequencies (where prestin provides clean cycle-by-cycle
      gain) and should deviate from 1/3 at low frequencies where MYO1C
      adaptation introduces additional dynamics.
    method: >
      BM velocity measurements with single-tone stimuli over 60 dB SPL range
      at 1, 4, 8, 16, 32 kHz; fit power law α at each frequency.
    prediction: >
      α ≈ 1/3 ± 0.02 at 4-32 kHz; α deviates toward 1/2 at 0.5-2 kHz.
      After prestin knockout: loss of the 1/3 power law at high frequencies.
      After MYO1C knockout: loss of the 1/3 power law at low frequencies.

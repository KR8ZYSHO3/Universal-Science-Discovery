id: h-replication-rate-scientific-progress-indicator
title: >
  Field-level replication rates (proportion of published findings that replicate
  under direct replication) are the most valid indicator of scientific progress
  and predictive accuracy, outperforming citation counts and h-indices because
  they measure evidential content rather than social amplification — and fields
  with higher replication rates make more accurate quantitative predictions.

proposed_tests:
  - description: >
      Compile field-level replication rates (from existing replication projects),
      citation-based metrics, and prediction tournament accuracy scores for 8+
      disciplines. Test whether replication rate correlates more strongly with
      prediction accuracy than h-index or journal impact factor does.

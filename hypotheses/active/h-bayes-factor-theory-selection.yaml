id: h-bayes-factor-theory-selection
title: >
  Replacing null-hypothesis significance testing with pre-registered Bayes
  factor analysis (B_{01} threshold ≥ 10 for publication) would increase
  the positive predictive value of published findings by at least 50% and
  reduce irreproducibility rates in psychology and medicine by cutting
  false-positive publication rates below 5%.
status: active
priority: high
impact_score: 0.78
created: "2026-05-05"
last_updated: "2026-05-05"
evidence_links:
  - doi: "10.1080/01621459.1995.10476572"
    type: supporting
    confidence: 0.8
    note: "Kass & Raftery (1995) — Bayes factor calibration; B > 10 = strong evidence against H_0"
  - doi: "10.1177/0956797611417632"
    type: related
    note: "Simmons et al. (2011) — p-hacking inflates false positive rate above 5%"
unknowns_addressed:
  - u-bayesian-prior-objectivity
  - u-reproducibility-crisis-causes
proposed_tests:
  - description: >
      Meta-analysis of the Open Science Collaboration replication dataset
      (OSC 2015, N = 100 studies): retroactively compute Bayes factors for
      all original studies using the reported effect sizes and sample sizes.
      Test whether B_{01} ≥ 10 in the original study predicts successful
      replication better than p < 0.05 (ROC analysis, comparing AUC).
    type: meta_analysis
  - description: >
      Registered replication of 50 psychology studies using Bayes factors as
      the primary analysis and B_{01} ≥ 10 as the publication criterion.
      Compare replication rate to the OSC 2015 baseline (36% for p < 0.05).
      Predict replication rate ≥ 70% for B_{01} ≥ 10 findings.
    type: multi_site_replication
related_disciplines:
  - philosophy-of-science
  - Bayesian-statistics
  - meta-science
  - psychology

id: h-gromov-witten-quantum-cohomology-counts
title: >
  Pseudo-holomorphic curve counts in symplectic topology are well-defined as
  rational numbers via virtual fundamental class techniques (Kuranishi structures
  or polyfolds) — the earlier regularity obstruction is overcome by virtual
  perturbation theory, making Gromov-Witten invariants of all compact symplectic
  manifolds rigorously defined.

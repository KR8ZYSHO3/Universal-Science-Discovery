proposed_tests:
  - description: >
      Computation comparison: compute genus-0, 3-point GW invariants of CP^2
      using: (1) classical algebraic geometry (degree d rational curve count), 
      (2) polyfold regularization, (3) Kuranishi approach. All three should
      agree to all degrees. Test: agreement to degree d=5 (classical count
      = 1,1,12,620,87304,...). Discrepancy would identify regularization error.
  - description: >
      Higher genus test: compare genus-1 GW invariants of a quintic Calabi-Yau
      3-fold using Zinger's reduced invariant (algebraic) vs. polyfold (analytic).
      This case is known subtle due to multiple cover contributions. Test: results
      agree — validates polyfold for higher genus.

proposed_tests:
  - description: >
      Prepare PMMA hard-sphere colloids (a = 200 nm) in decalin/tetralin with
      added polystyrene (Rg ~ 5 nm, delta/a = 0.025) to introduce short-range
      depletion attraction. Measure phi-dependent gelation threshold, gel elastic
      modulus G' at 1 Hz, and fractal dimension d_f by confocal microscopy and
      SAXS. Test: G' ~ phi^n with n = 3/(3-d_f) from percolation theory.
    method: Oscillatory rheology + confocal microscopy + SAXS
    prediction: d_f = 2.1±0.1; n = 3.3±0.3; gelation at phi_gel < 0.2
  - description: >
      Compare gel elasticity scaling exponent n for different short-range
      attraction ranges (delta/a = 0.01, 0.025, 0.05, 0.10) keeping phi fixed.
      Test: n is independent of delta/a when delta/a < 0.05 (universal gel network
      fractal scaling) but changes above delta/a ~ 0.05.
    method: Confocal + rheology; depletant Rg varied by polymer molecular weight
    prediction: n = 3.3±0.3 for delta/a < 0.05; n increases toward ~4.5 at delta/a = 0.10

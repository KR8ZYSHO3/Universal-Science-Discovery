id: h-dlvo-failure-short-range-attractions-gels
title: >
  When colloidal particles with short-range attractions (range delta/a < 0.05)
  are added to a DLVO-stable dispersion, the system undergoes arrested phase
  separation into a colloidal gel at volume fractions phi ~ 0.1-0.3 via a
  spinodal decomposition mechanism, and the gel elasticity scales as G' ~ phi^n
  with n determined by the fractal dimension of the gel network, not by DLVO
  barrier height.

proposed_tests:
  - description: >
      Train a sparse autoencoder on natural videos from the species-specific visual
      environment of six vertebrate species (human, macaque, mouse, zebrafish, pigeon,
      eagle) and compare the learned filters to single-unit recordings from V1 of each
      species. Predict that species with different visual ecologies (eagles: high acuity,
      small field; zebrafish: panoramic, UV-sensitive) should have efficient codes
      matched to their natural image statistics.
    method: "Natural video recording using body-mounted cameras; sparse autoencoder training with L1 sparsity penalty; compare learned filter properties (spatial frequency tuning, orientation selectivity, aspect ratio) to electrophysiological recordings from V1 of each species using 2D Gabor fit"
    prediction: "Learnt filters match V1 receptive fields within 20% for spatial frequency and orientation distributions in all 6 species; inter-species differences in filter properties predict inter-species differences in visual ecology (resolution vs. field of view)"
  - description: >
      Deprive neonatal animals (ferrets, cats) of patterned visual experience during
      the critical period and compare V1 filter properties to animals raised with
      structured natural images vs. white noise stimulation. Efficient coding predicts
      that white-noise-reared animals should develop random, non-Gabor-like receptive
      fields; natural-image-reared animals should develop Gabor-like filters.
    method: "Monocular rearing with controlled visual environment; single-unit recordings at P60; reverse correlation receptive field mapping; compare to Gabor template matching and sparse coding predictions"
    prediction: "Natural-image-reared animals have Gabor-like V1 filters with orientation selectivity ≥ 70% of normal; white-noise-reared animals show ≤ 30% orientation selectivity — confirming that visual statistics drive V1 development"


id: h-efficient-coding-natural-statistics-sensory-cortex-universality
title: >
  The efficient coding hypothesis holds universally across all primary sensory cortices
  (V1, A1, S1) and all vertebrate species tested: the neural code in each area is
  optimally matched (via evolution and development) to the statistical structure of
  the natural stimuli for that sensory modality, minimizing redundancy and maximizing
  mutual information under metabolic constraints.

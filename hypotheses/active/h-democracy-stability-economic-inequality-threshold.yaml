id: h-democracy-stability-economic-inequality-threshold
title: >
  Democratic stability above a Gini coefficient threshold of ~0.45 declines
  nonlinearly due to elite capture mechanisms: when the top 10% income share
  exceeds ~50%, concentrated interests gain sufficient resources to subvert
  electoral and judicial institutions faster than civil society can respond.

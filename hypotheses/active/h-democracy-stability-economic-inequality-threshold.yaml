evidence_links:
  - doi: "10.1146/annurev-polisci-050718-043244"
    type: supporting
    confidence: 0.63
    note: >
      Przeworski (2019) review: democracy survival correlates with GDP per
      capita (Lipset's thesis) but inequality (Gini) modulates this — high
      inequality democracies break down at lower income levels than equal ones.
  - doi: "10.1017/S0003055407070238"
    type: supporting
    confidence: 0.65
    note: >
      Acemoglu et al. (2008) income distribution model: democratisation occurs
      when middle class is large enough to form coalitions against elites;
      reverse transition triggered when elite redistributive loss exceeds
      coup threshold.
  - doi: "10.1017/S0003055421000617"
    type: related
    confidence: 0.60
    note: >
      Boix et al. (2022) V-Dem data: recent democratic backsliding
      concentrated in high-inequality middle income countries (Gini > 0.40);
      elite media capture precedes executive overreach in most cases.
proposed_tests:
  - description: >
      Survival analysis on V-Dem democracy scores (1900-2023) for 170 countries.
      Fit Cox proportional hazards model with democratic collapse (V-Dem Regimes
      of the World: liberal democracy → electoral autocracy) as event. Predictors:
      Gini coefficient, top 10% income share, GDP per capita, median voter income.
      Test: nonlinear threshold effect — does hazard ratio for collapse increase
      discontinuously above Gini 0.45? Use spline regression to test linearity.

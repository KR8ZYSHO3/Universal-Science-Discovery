id: h-fisher-information-optimized-eit-electrodes-improve-lesion-detectability
title: >
  EIT acquisition protocols optimized for Fisher-information objectives yield improved small-lesion
  detectability compared with standard adjacent-drive schemes at fixed acquisition time.
status: active
priority: medium
impact_score: 0.59
created: "2026-05-08"
last_updated: "2026-05-08"
author: USDR

evidence_links:
  - doi: "10.1017/S0962492910000061"
    type: related
    confidence: 0.5
    note: "Inverse-problem uncertainty framework supports information-driven design choices."

unknowns_addressed:
  - u-eit-fisher-information-electrode-geometry-optimality

proposed_tests:
  - description: >
      Compare standard adjacent-drive and Fisher-optimized protocols on phantom and in-silico datasets,
      measuring detection AUC for low-contrast lesions under contact-impedance perturbations.
    method: Hardware phantom experiments plus forward-model Monte Carlo simulation.
    prediction: Fisher-optimized protocols increase lesion detection AUC by >=0.05 absolute.


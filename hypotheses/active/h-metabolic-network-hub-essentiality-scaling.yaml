id: h-metabolic-network-hub-essentiality-scaling
title: >
  Metabolic hub degree follows a universal power law across all domains of life,
  and hub essentiality correlates with preferential attachment age measured by
  phylogenetic depth
status: active
priority: medium
impact_score: 0.75
created: "2026-05-07"
last_updated: "2026-05-07"
author: wave-63-agent

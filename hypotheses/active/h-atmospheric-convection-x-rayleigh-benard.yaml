proposed_tests:
  - description: Run cloud-resolving model (SAM or ICON) in radiative-convective equilibrium on a 2000km × 2000km domain at SSTs of 295K, 300K, 305K; measure convective aggregation length scale from precipitation clustering (I_org index); compare to the RB cell size prediction L = 2π·H(SST); quantify whether the scaling L ∝ H holds with the predicted proportionality constant across SST range.

id: h-degrowth-wellbeing-decoupling
title: >
  Absolute decoupling of wellbeing from GDP growth is achievable in wealthy
  economies through a transition to a provisioning system economy, but requires
  coordinated working-time reduction, public service expansion, and wealth
  redistribution operating simultaneously — no single policy is sufficient.
status: active
priority: high
impact_score: 0.75
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-degrowth-economic-viability
evidence_links:
  - type: supporting
    note: "Hickel et al. (2021) post-growth scenarios maintaining human development with 40% lower energy demand — consistent with 1.5°C"
    confidence: 0.60
  - type: related
    note: "Büchs & Koch (2019) wealthy OECD countries show diminishing returns to GDP in wellbeing above $30k PPP/capita"
    confidence: 0.75
  - type: contradicting
    note: "Summers (2020) degrowth mathematically incompatible with maintaining employment via automatic stabilisers without fundamental fiscal redesign"
    confidence: 0.65
proposed_tests:
  - description: >
      Macroeconomic simulation using stock-flow consistent (SFC) model: test 5 scenarios
      with GDP growth rates of −2%, −1%, 0%, +1%, +2% in an economy with 40-hour
      work week gradually reduced to 28 hours. Measure unemployment, inflation, debt
      stability, and Gini coefficient. Identify parameter space where degrowth is
      macroeconomically stable.
  - description: >
      Natural experiment: compare post-COVID recovery trajectories in countries
      that introduced 4-day work week pilots (Iceland, UK) against controls.
      Measure GDP/capita, hours worked, subjective wellbeing (SWB), and unemployment.
      Test whether WTR reduces GDP while maintaining or improving SWB.

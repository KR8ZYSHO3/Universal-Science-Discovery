id: h-two-state-folders-admit-pl-like-surrogate-on-contact-order-parameter
title: >
  For small fast-folding proteins classified as two-state in phi-value experiments, a smoothed free energy
  G(Q) projected onto native contact fraction Q exhibits a measurable PL-like region (‖dG/dQ‖² lower-bounded by a
  constant times G−G_native) across replica-exchange ensembles — absent for frustrated multi-state folders.
status: active
priority: medium
impact_score: 0.46

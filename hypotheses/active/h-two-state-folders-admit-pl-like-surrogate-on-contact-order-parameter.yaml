proposed_tests:
  - description: >
      Select 10 two-state and 10 multi-state folders; compute blocked bootstrap estimates of PL inequality slack on
      G(Q) from umbrella-sampled surfaces.
    method: Molecular simulation + projected gradient norms on Q grid.
    prediction: Two-state set shows ≥70% runs with statistically significant PL slack; multi-state set fails.


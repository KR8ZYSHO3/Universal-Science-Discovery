id: h-aerosol-cloud-twomey-adjustment
title: >
  The Twomey first indirect aerosol effect (increased cloud droplet number reducing
  effective radius) is offset by the second indirect effect (lifetime/Albrecht effect)
  by 40-60%, such that the net aerosol indirect forcing is between -0.5 and -1.2 W/m²
  at 90% confidence, resolvable by coordinated ship-track experiments combined with
  PACE satellite aerosol retrievals.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high

evidence_links:
  - type: supporting
    doi: 10.5194/acp-18-5765-2018
    note: >
      Rosenfeld et al. (2019) — review of aerosol-cloud interactions; first indirect
      effect well-constrained from satellite, second indirect effect highly uncertain
      due to precipitation feedback complexity.
  - type: related
    doi: 10.1175/JCLI-D-17-0009.1
    note: >
      Zelinka et al. (2017) — cloud feedbacks in climate models; aerosol indirect
      forcing uncertainty is largest single contributor to forcing uncertainty.
proposed_tests:
  - discipline: atmospheric-science
    description: >
      Design coordinated ship-track experiment in the northeast Pacific stratocumulus
      deck: 3 ships emit controlled aerosol (ammonium sulfate) at varying concentrations.
      PACE satellite measures cloud optical depth, droplet effective radius, and
      liquid water path continuously for 72 hours post-emission. Hypothesis: cloud
      effective radius decreases as N_d^{-1/3} (Twomey effect), and liquid water
      path change measured over 24h determines the sign and magnitude of the
      lifetime effect, with net forcing between -0.5 and -1.2 W/m².

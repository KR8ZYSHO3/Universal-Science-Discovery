  - type: contradicting
    note: >
      O'Neill & Schultz (2010) showed some dopamine neurons encode expected value linearly,
      inconsistent with the concave/convex value function. The S-shaped encoding may be
      a population-level property emergent from a distribution of linear individual neurons.
proposed_tests:
  - discipline: neuroscience
    description: >
      Fast-scan cyclic voltammetry (FSCV) in awake behaving rats trained on a
      gain/loss gambling task. Record dopamine transients in nucleus accumbens on win
      and loss trials matched for expected value. Test whether the amplitude of
      dopamine release on equivalent-magnitude wins vs. losses is asymmetric, with
      losses producing a larger suppression than gains produce release (|dDA_loss| >
      |dDA_gain| by factor λ ≈ 2.25). This directly tests the dopamine hypothesis
      of loss aversion at millisecond resolution.
  - discipline: psychology
    description: >
      Within-subject psychophysical measurement: present 100 participants with a
      forced-choice task between: (a) a certain gain $x vs. a 50/50 gamble ($2x
      vs. $0) across a range of x values; and (b) a certain loss $-x vs. a 50/50
      gamble ($-2x vs. $0). Extract the utility curvature exponent α (gains) and β
      (losses) and λ by maximum likelihood fitting to Tversky-Kahneman (1992) CPT.
      Compare to auditory loudness exponent from Stevens' law measured in the same
      subjects. Test whether individuals with stronger auditory Stevens' exponent
      show stronger prospect theory curvature — the psychophysical bridge prediction.
  - discipline: behavioral-economics
    description: >
      Cross-cultural study: replicate prospect theory parameter estimation (λ, α, β)
      in 5 societies spanning different historical risk environments (hunter-gatherers,
      pastoralists, subsistence farmers, industrial workers, financial professionals).
      Test whether λ varies systematically with occupational risk environment as
      predicted by an adaptive calibration model.

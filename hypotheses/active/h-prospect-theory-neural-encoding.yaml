id: h-prospect-theory-neural-encoding
title: >
  The S-shaped prospect theory value function is encoded by the firing rate-stimulus
  relationship of dopaminergic neurons in the ventral striatum, with the loss-aversion
  inflection point at zero predicted by asymmetric dopamine release-suppression
  kinetics measurable via fast-scan cyclic voltammetry.

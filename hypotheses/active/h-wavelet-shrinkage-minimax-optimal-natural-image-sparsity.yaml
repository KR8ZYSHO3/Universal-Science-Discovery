proposed_tests:
  - description: >
      Estimate the Besov space smoothness parameter s for a large natural image
      dataset (ImageNet, n = 1.2M images) by fitting the decay rate of sorted
      wavelet coefficient magnitudes |w_(k)| ∝ k^(-s-1/p) and comparing to
      s = 1 prediction; then compute the predicted minimax rate and verify it
      matches the observed PSNR vs. compression rate curve for Daubechies-9/7
      JPEG-2000 compression.
    method: "Daubechies-9/7 wavelet decomposition of ImageNet; coefficient sorting; power-law fitting for s; PSNR vs. bpp compression curves compared to minimax rate prediction"
    prediction: "Natural images have Besov smoothness s = 0.8 ± 0.2; JPEG-2000 PSNR advantage over JPEG scales as (compression ratio)^(0.1±0.05) consistent with the predicted rate gap"
  - description: >
      V1 wavelet hypothesis test: measure the Besov space parameter s implied
      by primary visual cortex (V1) receptive field tuning bandwidths across
      species (mouse, cat, primate); test whether s_V1 matches s_natural images
      to 10%, which would confirm that V1 is optimally tuned to the statistical
      structure of natural images in the Besov sense.
    method: "Electrophysiology + two-photon calcium imaging of V1 simple cells; measure spatial frequency bandwidth σ_sf; compute implied s from bandwidth-to-frequency ratio; compare to image statistics"
    prediction: "V1 tuning bandwidth implies Besov s = 0.9 ± 0.15, matching natural image s within measurement error; primates show closer match than mice due to higher exposure to natural image statistics"


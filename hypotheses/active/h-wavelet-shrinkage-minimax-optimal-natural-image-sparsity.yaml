id: h-wavelet-shrinkage-minimax-optimal-natural-image-sparsity
title: >
  Natural images lie in a Besov space B^s_{1,1}(ℝ²) with s ≈ 1, and wavelet
  thresholding achieves the optimal minimax reconstruction rate n^(-2s/(2s+2))
  = n^(-1/2) for this function class, explaining why JPEG-2000 wavelet compression
  outperforms JPEG-DCT by a constant factor at all compression ratios rather
  than only at low quality.

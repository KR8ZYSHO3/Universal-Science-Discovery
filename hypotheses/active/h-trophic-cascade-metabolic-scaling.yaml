id: h-trophic-cascade-metabolic-scaling
title: "Trophic cascade strength scales as body-mass-ratio^{0.75} / food-web-connectance, combining metabolic scaling with network complexity to predict cross-ecosystem cascade magnitude"
status: active
created: "2026-05-05"
priority: medium
impact_score: 0.73

evidence_links:
  - type: supporting
    note: "WBE metabolic scaling predicts that larger predators have disproportionately lower metabolic demand, so their per-individual impact on prey scales superlinearly with mass"
  - type: supporting
    doi: "10.1126/science.1205106"
    note: "Estes et al. (2011) - strongest trophic cascades involve large-bodied apex predators (wolves, sharks, sea otters) consistent with mass-dependent cascade strength"
  - type: contradicting
    note: "Borer et al. (2005) meta-analysis found weak support for body-size as a predictor of cascade strength, suggesting confounding by food web structure"

proposed_tests:
  - description: "Compile 100+ trophic cascade studies with predator-prey body mass ratios and food web connectance measured independently; fit log(cascade strength) ~ 0.75*log(mass_ratio) - log(connectance); test R^2"
  - description: "Simulate trophic cascades in bioenergetic food web models (Yodzis & Innes 1992) with varied mass ratios and connectance; test whether the predicted scaling emerges mechanistically"
  - description: "Use mesocosm experiments with insects (fast generation time) to test cascade strength vs. predator-prey mass ratio across a 10^3-fold mass range"

unknowns_addressed:
  - u-trophic-cascade-predictability

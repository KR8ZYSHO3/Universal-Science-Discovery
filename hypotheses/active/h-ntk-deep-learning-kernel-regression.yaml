id: h-ntk-deep-learning-kernel-regression
title: >
  In the NTK (lazy training) regime, the generalization performance of deep neural
  networks is fully determined by the eigenspectrum of the Neural Tangent Kernel
  matrix K_∞ on the training set, and networks exceeding the NTK regime gain
  additional generalization through feature learning that cannot be captured by
  any fixed kernel — making the NTK an upper bound on what kernel methods can achieve.

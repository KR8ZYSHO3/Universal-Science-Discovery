proposed_tests:
  - description: >
      Train matched-width networks (N = 64, 256, 1024, 4096, ∞ via random features)
      on CIFAR-10 with NTK scaling (η ~ 1/N) vs. μP scaling (η ~ 1). Compare
      test accuracy and NTK kernel eigenspectrum across widths. Test: does NTK
      prediction of generalization error converge as N → ∞ for NTK-scaled networks?
    method: "GPU training, NTK eigenspectrum computation via random projections, kernel regression baseline"
    prediction: "NTK-scaled networks converge to kernel regression performance at N=4096; μP networks exceed kernel regression at all widths"
  - description: >
      Measure the L2 distance ||K_t - K_0||_F between the empirical NTK at step t
      and at initialization as a function of width N and learning rate η. Test whether
      the NTK-to-feature-learning crossover occurs at η ~ 1/√N as predicted by
      mean-field theory.
    method: "Jacobian computation via autodiff, Frobenius norm tracking across training"
    prediction: "||K_t - K_0|| = O(η√N) — NTK drift scales with η√N, crossover at η ~ 1/√N"

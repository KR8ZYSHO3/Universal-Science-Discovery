proposed_tests:
  - discipline: ecology
    description: >
      Analyse satellite-derived vegetation and fire occurrence data (MODIS, 2001-2023)
      across African savanna-forest ecotones. Compute local flammable cell fractions
      from NDVI and estimate the percolation threshold by measuring fire spread
      probability as a function of flammable fraction. Test whether the fire regime
      transition occurs at p ≈ 0.59 for local topography-adjusted lattice geometries.
  - discipline: mathematics
    description: >
      Implement a spatially explicit fire-spread model on a heterogeneous landscape
      derived from LiDAR fuel maps. Vary fuel load continuously and compute the
      giant connected component of flammable cells. Test whether the fire spread
      probability curve has the sigmoid shape predicted by percolation theory and
      whether the inflection point coincides with the measured ecological threshold.

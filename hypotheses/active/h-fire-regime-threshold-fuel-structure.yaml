id: h-fire-regime-threshold-fuel-structure
title: >
  Fire regime transitions in grassland-forest boundaries are controlled by a critical
  fuel connectivity threshold that follows percolation theory: when the fraction of
  flammable cells exceeds the percolation threshold p_c ≈ 0.593 for a 2D lattice,
  fire spreads as a phase transition producing the observed bimodality in burned area
  distributions that separates fire-maintained from fire-suppressed states.

proposed_tests:
  - description: >
      Fit a Cox proportional hazards model with shared gamma frailty to Swedish twin cohort mortality
      data (MTR dataset, twins aged 50+). Estimate sigma^2. Predict marginal mortality hazard h_bar(t)
      using the Vaupel formula and compare to observed mortality rates at ages 95–110 in the same cohort.
    method: "Shared frailty Cox model (coxme R package) + predicted vs. observed mortality at ages 95-110"
    prediction: "sigma^2 estimate = 0.3-0.6; h_bar(t) from frailty model matches observed plateau to within 15% without post-hoc correction"

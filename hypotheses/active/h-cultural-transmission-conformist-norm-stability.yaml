proposed_tests:
  - description: >
      Cross-cultural experiment measuring conformist bias strength in societies of different sizes (~500 to
      1,000,000 population) using a standardized majority-choice paradigm with controlled task difficulty.
      Test whether conformist bias strength (estimated by binomial mixture model) scales with log(N)/N.
    method: "Online behavioral experiment + Bayesian mixture model to estimate individual conformist bias strength"
    prediction: "Conformist bias should decrease with increasing population size, consistent with log(N)/N scaling"


proposed_tests:
  - description: >
      Fabricate 200 InP DFB laser chips integrated with Si PIC via BCB wafer bonding;
      measure coupling efficiency (insertion loss between InP active region and Si
      waveguide), threshold current, slope efficiency, and wall-plug efficiency at
      25°C and 85°C (to simulate junction temperature in CPO environment).
    method: "BCB bonding process, LPCVD Si waveguide, L-I-V characterization, thermal chuck measurement"
    prediction: "Coupling efficiency >80% (loss <1 dB), wall-plug >25% at 25°C, >20% at 85°C"
  - description: >
      Reliability test per Telcordia GR-468-CORE: 2000-hour accelerated aging at
      85°C, 85% RH for 100 bonded DFB laser devices. Fit log-normal lifetime
      distribution. Test: does median lifetime extrapolated to 25°C exceed 10⁷ hours
      (FIT rate <100)?
    method: "Accelerated aging with L-I-V monitoring every 168h, Arrhenius extrapolation, Weibull lifetime model"
    prediction: "Median lifetime >10⁸ hours at 25°C; FIT rate <50 — meeting optical transceiver reliability requirements"

id: h-silicon-photonics-dfb-laser-integration
title: >
  Heterogeneous integration of InP-based DFB lasers onto silicon photonic platforms
  via die-to-wafer bonding will achieve coupling efficiency >80% and wall-plug
  efficiency >25% at 85°C within 5 years, making co-packaged optics economically
  viable for 100-Tbps switch ASICs by 2030.

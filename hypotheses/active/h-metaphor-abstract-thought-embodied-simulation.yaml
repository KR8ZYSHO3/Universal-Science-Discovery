id: h-metaphor-abstract-thought-embodied-simulation
title: >
  Abstract thought is fundamentally grounded in sensorimotor metaphor: activating
  motor imagery of physical metaphor enactments (GRASPING an idea, HEAVY thoughts)
  facilítates abstract reasoning, and disrupting motor cortex via TMS during metaphor
  comprehension degrades understanding of novel but not literal abstract sentences.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-metaphor-abstract-thought
related_disciplines:
  - cognitive-science
  - linguistics
  - neuroscience
evidence_links:
  - type: supporting
    doi: 10.1073/pnas.0510411103
    note: >
      Hauk et al. (2004) — foot, leg, face action words activate somatotopic motor
      regions; leg word → leg motor cortex; supports embodied simulation of motor
      metaphors.
  - type: contradicting
    doi: 10.1016/j.cognition.2010.01.010
    note: >
      Mahon & Caramazza (2008) — disembodied cognition is possible; motor cortex
      activation may be post-hoc simulation rather than constitutive of meaning.
proposed_tests:
  - discipline: cognitive-science
    description: >
      Present 300 sentences: (1) novel metaphorical (GRASPING A CONCEPT, HEAVY
      RESPONSIBILITY), (2) literal (HOLDING A BOOK, HEAVY WEIGHT), (3) abstract
      non-metaphorical (HIGH MORALITY, DEEP THOUGHT) to 40 participants.
      TMS applied at 150ms post-sentence onset to left motor cortex (hand area
      via neuronavigation) or vertex (control). Measure comprehension accuracy
      and RT. Hypothesis: TMS to motor cortex impairs novel metaphor comprehension
      (RT increase > 50ms, accuracy decrease > 10%) while sparing literal and
      abstract non-metaphorical sentences (p < 0.05 interaction, FDR-corrected),
      with effect size correlating with motor imagery vividness (MIQ-R score).


evidence_links:
  - type: supporting
    note: "Faddeev & Takhtajan (1979) Russ Math Surv 34:11 — quantum inverse scattering method: Yang-Baxter equation R₁₂R₁₃R₂₃ = R₂₃R₁₃R₁₂ is the quantum analog of the Lax compatibility condition [L₁,L₂] = 0 for classical integrable systems; transfer matrix T(u) = Tr R generates all commuting conserved quantities"
    confidence: 0.90
  - type: supporting
    note: "Drinfeld (1985) — Yangian Y(𝔤) is the quantum group symmetry algebra of quantum integrable systems; its classical limit (ℏ→0) recovers the classical r-matrix of Lax pair systems; this is the formal algebraic unification of classical and quantum integrability"
    confidence: 0.87
  - type: supporting
    note: "Bethe (1931) Z Phys 71:205 — Bethe ansatz eigenvalues of XXX Heisenberg chain; connection to soliton momenta made explicit by Sutherland (1978): Bethe roots are quantized momenta of quantum soliton excitations (magnons = discretized spin waves)"
    confidence: 0.85
  - type: contradicting
    note: "Correspondence between classical N-soliton solutions and quantum Bethe ansatz is exact only for specific integrable models (NLS/Lieb-Liniger, KdV/Benjamin-Ono). For 2D quantum field theories (Thirring model, sine-Gordon QFT), the classical-quantum correspondence requires careful renormalization and is not always exact — Coleman duality (1975) is approximate in some regimes"
    confidence: 0.55
proposed_tests:
  - description: >
      Cold atoms experiment: Lieb-Liniger Bose gas (1D bosons with delta-function
      repulsion, experimentally realized in waveguide traps). Classical limit (N-soliton
      NLS solution) should agree with quantum Bethe ansatz in the limit N → ∞, c → 0
      (weak coupling) at fixed Nc = γ. Measure density profiles of soliton-like
      excitations (gray solitons in the quasi-classical regime) and compare with
      Bethe ansatz prediction for hole excitations (solitons = holes in the Fermi sea
      of rapidities). Prediction: classical NLS soliton width and speed agree with
      quantum Bethe hole excitation dispersion within 5% for N > 100 atoms per soliton.
  - description: >
      Numerical verification of Yangian symmetry generators in the XXX spin chain:
      construct the first non-trivial Yangian generator Q₁ = Σᵢⱼ Jᵢ × Jⱼ (cross
      product of angular momenta) and verify [Q₁, H] = 0 for H = Heisenberg XXX
      Hamiltonian numerically on chains of length L = 12-20. Then perturb with
      next-nearest-neighbor interaction (J₂/J₁ = 0.1): measure breaking of [Q₁, H]
      commutation and compare with classical integrability breaking rate from
      energy non-conservation in classical spin dynamics simulation of the same
      perturbation. Prediction: quantum integrability breaking (measured by ||[Q₁,H]||)
      scales identically with J₂/J₁ as classical integrability breaking (measured
      by Lyapunov exponent increase) — confirming the classical-quantum correspondence
      for integrability breaking.

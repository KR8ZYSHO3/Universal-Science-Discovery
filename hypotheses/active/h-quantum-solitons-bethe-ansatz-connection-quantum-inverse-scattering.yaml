id: h-quantum-solitons-bethe-ansatz-connection-quantum-inverse-scattering
title: >
  The quantum inverse scattering method (Faddeev-Takhtajan-Sklyanin, 1978-1982)
  is the exact quantum analog of the classical inverse scattering transform, with
  the quantum R-matrix playing the role of the classical Lax pair, and the Bethe
  ansatz eigenvalues corresponding to quantized soliton momenta — unifying classical
  and quantum integrability into a single algebraic framework (Yangians).

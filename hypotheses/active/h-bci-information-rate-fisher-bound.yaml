id: h-bci-information-rate-fisher-bound
title: >
  The information transfer rate of state-of-the-art intracortical BCIs is within
  a factor of 3 of the Fisher information bound set by the recorded neural population,
  and the primary limitation is non-stationarity rather than suboptimal decoding,
  predicting that adaptive decoders that track neural tuning drift will outperform
  fixed decoders by 2-3x in chronic implant conditions.
status: active
priority: high
impact_score: 0.83
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - neuroscience

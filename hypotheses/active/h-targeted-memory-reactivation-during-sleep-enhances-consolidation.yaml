id: h-targeted-memory-reactivation-during-sleep-enhances-consolidation
title: >
  Closed-loop auditory targeted memory reactivation (TMR) timed to hippocampal sharp-wave
  ripple detection during NREM slow-wave sleep will selectively enhance consolidation of
  specific paired-associate memories by >30% compared to uncued sleep, providing causal
  evidence that SPW-R-coupled reactivation drives memory transfer from hippocampus to
  neocortex.

proposed_tests:
  - description: >
      Human EEG study (n=40): participants learn 60 word-picture pairs (cue word + picture
      from 6 categories). During NREM sleep, closed-loop system detects slow oscillation
      up-states + sleep spindles in real time and delivers category-specific sounds (10 of
      6 categories = 60 cues). Measure next-day recall for cued vs. uncued categories.
      EEG measure: whether SPW-R-coupled cue delivery (within 100 ms of SPW-R onset) is
      more effective than non-SPW-R-coupled delivery. Prediction: SPW-R-coupled TMR
      improves recall by 35% vs. 15% for non-coupled TMR vs. 0% for no-cue control.
  - description: >
      Mouse hippocampal recording during TMR: detect place-cell SPW-R sequences for
      specific maze arms using real-time Bayesian decoder. Deliver reward-associated
      odor during SPW-R replay of target arm. Measure next-day navigation bias toward
      target arm. Prediction: closed-loop odor delivery during SPW-R replay of target
      arm increases navigation to that arm by 40% — causal evidence for content-specific
      replay-consolidation link.

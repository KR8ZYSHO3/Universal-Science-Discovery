id: h-synapse-heterogeneity-plasticity-code
title: >
  Molecular heterogeneity across synapses between the same pre- and post-synaptic
  neurons encodes the history of plasticity events at each individual synapse —
  constituting a molecular "engram" at the synapse level — and this heterogeneity
  is actively regulated by activity-dependent protein sorting rather than being
  stochastic noise.

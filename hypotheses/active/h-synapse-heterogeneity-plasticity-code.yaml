proposed_tests:
  - description: >
      Apply multiplexed synaptic proteomics (expansion microscopy + antibody panel)
      to hippocampal neurons before and after LTP induction at individual identified
      synapses. Test whether the variance in AMPA receptor subunit composition across
      synapses decreases after coordinated stimulation (a prediction of the active
      regulation hypothesis) versus increases (prediction of stochastic noise).

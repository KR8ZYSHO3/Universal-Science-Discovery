id: h-political-polarization-ising-critical-slowing
title: >
  Political polarization in democratic societies exhibits critical slowing down
  preceding major polarization transitions — measurable as increasing autocorrelation
  and variance in opinion poll time-series — analogous to Ising model dynamics
  near the ferromagnetic critical point T_c.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
related_disciplines:
  - social-science
  - statistical-physics
  - complexity-science
  - political-science
unknowns_addressed:
  - u-opinion-dynamics-phase-transition-prediction
evidence_links:
  - type: supporting
    note: >
      Scheffer et al. (2009) Nature 461:53 — critical slowing down as an early
      warning signal for ecosystem tipping points; same mathematical framework
      (increasing variance, rising autocorrelation) applies to social systems.
  - type: supporting
    note: >
      Castellano et al. (2009) Rev Mod Phys 81:591 — comprehensive review showing
      that voter model and bounded confidence models exhibit Ising-class phase
      transitions on heterogeneous networks.
  - type: related
    note: >
      Galam (2008) Int J Mod Phys C: sociophysics Ising models predict 50/50
      election outcomes as the generic state near political T_c — consistent
      with observed narrowing of election margins in many Western democracies.
  - type: contradicting
    note: >
      Watts (2002) "A simple model of global cascades on random networks" shows
      that opinion cascades in networks follow different dynamics from Ising systems
      due to threshold effects — not all social polarization is Ising-type.
proposed_tests:
  - discipline: social-science
    description: >
      Analyze 40 years of Gallup party affiliation polling data (USA, 1980-2024).
      Compute rolling autocorrelation (lag-1) and variance of the Democrat-Republican
      identification gap in 1-year sliding windows. Test whether autocorrelation and
      variance increased systematically before identified polarization events
      (1994 Contract with America, 2010 Tea Party surge, 2016 election), consistent
      with critical slowing down.
  - discipline: complexity-science
    description: >
      Calibrate an Ising opinion model on social network data (Twitter/X community
      detection, echo chamber measurements). Fit J (in-group vs. out-group coupling)
      and effective T (posting rate variability as a proxy for social temperature).
      Test whether fitted (J, T) places the network near T_c, and whether the
      proximity to T_c predicts future divergence of political opinion distributions.

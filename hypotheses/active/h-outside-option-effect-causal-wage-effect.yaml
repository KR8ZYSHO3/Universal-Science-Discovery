id: h-outside-option-effect-causal-wage-effect
title: >
  The outside option effect in wage bargaining is causal and quantitatively
  significant: workers who receive competing job offers capture 50-80% of the
  wage difference as a wage increase at their current employer, consistent with
  Nash bargaining theory in which the outside option shifts the disagreement point.
status: active
priority: medium
impact_score: 0.73
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - type: supporting
    confidence: 0.78
    note: "Caldwell & Danieli (2024): workers who list competing offers in salary negotiations obtain 18% higher wages on average — natural experiment using LinkedIn salary sharing data"
  - type: supporting
    confidence: 0.72
    note: "Maestas et al. (2023): broader labor market (lower unemployment) increases wage growth at individual level even conditional on own employment — consistent with improved outside option"
  - type: supporting
    confidence: 0.65
    note: "Bagger & Lentz (2019): structural estimation of wage-setting model confirms outside option (best alternative employer) determines a large share of within-job wage growth"
  - type: contradicting
    confidence: 0.4
    note: "Selection bias: workers who receive outside offers may be higher productivity; causal identification requires quasi-experimental variation in offer receipt independent of worker quality"

unknowns_addressed:
  - u-bargaining-power-measurement-real-world-negotiations

proposed_tests:
  - description: >
      Use matched employer-employee data with exogenous variation in local labor
      market conditions (industry-specific demand shocks from Bartik instrument)
      to estimate the causal effect of outside option quality on wages. Compare
      estimated bargaining parameter to Nash bargaining prediction (50/50 split
      of surplus above disagreement point).
    method: "Bartik shift-share instrument for local industry demand shocks; 2SLS regression of wage on outside option proxy; structural Nash bargaining estimation"
    prediction: "1 SD improvement in outside option quality → 8-15% wage increase; Nash bargaining parameter η = 0.4-0.6 (not too far from 0.5); Rubinstein patience estimate implied by discount rates"

related_disciplines:
  - economics
  - labor-economics
  - game-theory

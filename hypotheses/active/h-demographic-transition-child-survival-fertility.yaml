proposed_tests:
  - description: >
      Cross-national regression of demographic transition delay (years between under-5 mortality decline onset
      and fertility decline onset) on adult literacy rates, controlling for GDP and urbanization, using
      DHS and UN mortality data for 50+ countries that have completed the demographic transition.
    method: "Structural equation modeling with instrumental variable for literacy (missionary schools expansion) to isolate causal effect"
    prediction: "Each 20% increase in adult literacy should reduce demographic transition delay by 3-8 years"


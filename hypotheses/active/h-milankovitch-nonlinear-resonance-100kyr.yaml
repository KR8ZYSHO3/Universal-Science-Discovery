proposed_tests:
  - description: "Compute the ratio of 100 kyr spectral power to eccentricity forcing power across the last 2.8 Myr (LR04 stack); fit a driven nonlinear oscillator model (van der Pol with eccentricity driving); compare subharmonic resonance model vs direct forcing model in BIC-penalized likelihood; test whether model predicts specific termination timing in held-out intervals"
    falsifiable: true
    expected_result: "Resonance model fits termination timing within ±5 kyr for >80% of terminations; direct forcing model fails for 4 of 8 terminations in cross-validation"

id: h-organic-template-polymorph-selection
title: >
  Acidic shell proteins lower the interfacial energy of aragonite relative to
  calcite by a quantifiable amount predictable from protein charge density,
  enabling polymorph selection to be engineered via rational peptide design.
status: active
priority: high
impact_score: 0.72
created: "2026-05-05"
last_updated: "2026-05-05"
related_disciplines:

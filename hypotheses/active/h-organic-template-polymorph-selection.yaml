proposed_tests:
  - description: >
      Measure water contact angles and AFM force curves of Asp-rich peptide
      variants on calcite {104} and aragonite {110} faces in CaCO₃ solution.
      Compute γ reduction ΔΔγ = γ(calcite) - γ(aragonite) as function of
      peptide net charge at crystallisation pH. Test: ΔΔγ > 5 mJ/m² for
      polymorph switching.
  - description: >
      Synthesise 20-mer peptides with varying Asp/Glu fraction (0-100%) and
      measure aragonite vs. calcite yield in batch crystallisation at constant
      supersaturation (S = 5, 37°C). Test: aragonite fraction > 90% at
      Asp fraction > 40%.

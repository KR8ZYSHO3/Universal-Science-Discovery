proposed_tests:
  - description: >
      Measure basilar membrane vibration amplitude vs stimulus level near characteristic
      frequency in gerbil cochlea. Test: does amplitude follow (f - f_c)^{-1/3} power
      law near CF? Compare to passive (furosemide-treated, killing OHCs) mechanical
      response: should show linear amplitude-level relationship.
    prediction: "Active BM vibration: amplitude ∝ level^(1/3) near CF (dB slope ≈ 0.33); passive: amplitude ∝ level^1.0 (dB slope ≈ 1.0); Hopf bifurcation accounts for 40-60 dB of amplification."

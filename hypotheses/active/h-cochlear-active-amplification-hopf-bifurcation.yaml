id: h-cochlear-active-amplification-hopf-bifurcation
title: >
  The mammalian cochlear amplifier operates near a Hopf bifurcation point that
  provides frequency selectivity and gain with minimal energy: at the bifurcation,
  the amplification gain diverges as (f - f_c)^{-1/3}, the threshold for
  nonlinear compression is minimized, and spontaneous otoacoustic emissions arise
  as limit cycle oscillations when the system crosses the bifurcation.

proposed_tests:
  - description: "Compile invasion speed (km/yr) from published range maps; estimate r from density-at-edge time series and D from mark-recapture displacement; compute predicted c*=2√(rD); test correlation and systematic bias between observed and predicted speeds across species."
  - description: "For species with published dispersal kernel data, test whether fat-tailed kernel species show c_obs > c_KPP (accelerating front), while thin-tailed kernel species show c_obs ≈ c_KPP."

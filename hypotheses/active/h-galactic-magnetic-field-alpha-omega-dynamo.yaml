id: h-galactic-magnetic-field-alpha-omega-dynamo
title: >
  Large-scale galactic magnetic fields are generated and maintained by the
  mean-field alpha-Omega dynamo: differential rotation (Omega effect) stretches
  poloidal field into toroidal field, while helical turbulence from SN-driven
  convection (alpha effect) regenerates poloidal field, with saturation at energy
  equipartition with turbulent kinetic energy.

proposed_tests:
  - description: >
      Faraday rotation measure (RM) synthesis with SKA-mid across 100 spiral galaxies
      at z=0-0.5. Test: RM structure function should show quadrupolar (even) parity
      consistent with alpha-Omega dynamo, not dipolar parity predicted by alternative models.
    prediction: "SKA detects coherent fields >2 μG in >80% of spirals; quadrupolar RM patterns in >60% of face-on galaxies; field coherence length ~1 kpc."

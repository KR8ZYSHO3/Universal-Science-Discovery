proposed_tests:
  - description: >
      Empirical complexity measurement: implement optimal motion planning (RRT*
      with SR metric) for a sequence of robotic systems with increasing Lie bracket
      depth d = 1, 2, 3, 4, measure planning time T(n) as a function of problem
      dimension n, and test whether T(n) transitions from polynomial (d=1,2) to
      exponential (d≥3) growth.
    method: >
      Robot motion planning benchmark (OMPL library) for kinematic chain robots
      with varying non-holonomic constraints, timing sub-Riemannian RRT* vs.
      standard Euclidean RRT*
    prediction: >
      For d=1 (no non-holonomy): T ∝ n^α; for d=2 (Heisenberg-like car system):
      T ∝ n^β with β > α; for d=3: T ∝ exp(γn). The ratio T_d3/T_d2 grows
      exponentially with state space dimension, with transition at d=3.
  - description: >
      Theoretical: prove or disprove that the sub-Riemannian shortest path
      problem for a rank-k distribution in R^n with minimum bracket depth d
      is NP-hard for d ≥ 3, using a reduction from 3-SAT.
    method: Computational complexity theory reduction
    prediction: >
      If the conjecture holds, SR optimal control with d ≥ 3 reduces to 3-SAT
      for generic distributions, establishing a hardness lower bound and
      explaining the empirical exponential scaling observed in simulations.

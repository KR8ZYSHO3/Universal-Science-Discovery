proposed_tests:
  - description: >
      Compare empirical planning time (CPU seconds per query) for RRT* planner
      applied to: (1) Dubins car (depth-2 Lie bracket), (2) fire truck /
      trailer system (depth-3), (3) N-trailer (depth-N). Fit scaling law
      T_plan ∝ exp(α · depth). Test: α > 0 with p < 0.01.
  - description: >
      Derive upper and lower bounds on the metric entropy of ε-nets for
      depth-d sub-Riemannian balls (Carnot groups). Prediction: metric entropy
      scales as ε^{-Q} where Q (homogeneous dimension) increases with depth d,
      formally establishing depth-dependent planning complexity.

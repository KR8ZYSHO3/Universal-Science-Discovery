id: h-lie-bracket-depth-complexity-robot-planning
title: >
  The computational complexity of optimal motion planning for non-holonomic
  robots scales exponentially with the minimum Lie bracket depth d required
  to span the tangent space (Chow-Rashevskii condition), predicting a sharp
  tractability transition between systems with d ≤ 2 (polynomial planning)
  and d ≥ 3 (exponential planning) in their state space dimension.

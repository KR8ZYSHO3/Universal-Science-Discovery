id: h-lie-bracket-depth-complexity-robot-planning
title: >
  The computational complexity of optimal path planning for a non-holonomic
  robot scales exponentially with the depth of the Lie bracket required to
  satisfy the Chow-Rashevsky controllability condition, implying that robots
  requiring depth-3 or higher brackets are fundamentally harder to plan for
  than car-like (depth-2) systems.

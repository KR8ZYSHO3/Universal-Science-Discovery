id: h-developmental-geometry-diffeomorphism-geodesic
title: >
  Biological shape change during development follows geodesics on the infinite-
  dimensional diffeomorphism group Diff(M) equipped with an H^1 Sobolev metric;
  the observed diversity of animal body plans corresponds to a low-dimensional
  manifold in shape space discoverable by principal geodesic analysis of developmental
  sequence data, with evolutionary transitions following shortest paths in this space.

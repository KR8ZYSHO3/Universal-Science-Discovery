proposed_tests:
  - description: >
      Apply LDDMM registration to embryo morphological datasets (Drosophila, zebrafish)
      across developmental stages. Compute geodesic distance between consecutive timepoints.
      Test: does geodesic distance correlate with developmental time (biological clock)?
      Compare species-level geodesic distances to phylogenetic distance.
    prediction: "Geodesic distance increases monotonically with developmental stage (r>0.85); interspecific geodesic distances correlate with molecular phylogenetic distances (r>0.65)."

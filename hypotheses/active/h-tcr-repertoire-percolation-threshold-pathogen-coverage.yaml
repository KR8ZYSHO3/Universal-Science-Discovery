  - doi: "10.1007/s10955-011-0295-3"
    type: supporting
    confidence: 0.75
    note: "Mora & Bialek (2011) — maximum entropy model estimates cross-reactivity radius from TCR sequence space; approximately 10^-5 to 10^-6"
  - type: supporting

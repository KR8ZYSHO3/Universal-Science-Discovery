id: h-tcr-repertoire-percolation-threshold-pathogen-coverage
title: >
  The human naive T-cell repertoire of ~10⁷ clonotypes sits at the percolation
  threshold for 99% pathogen coverage in a 15-dimensional TCR-pMHC shape space
  with cross-reactivity radius r ≈ 10⁻⁵, predicting that repertoire sizes below
  10⁶ (as in aging or lymphopenia) create coverage holes detectable as increased
  susceptibility to novel viral epitopes.
status: active
priority: medium
impact_score: 0.74
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:
  - note: "Perelson & Oster (1979) J Theor Biol 81:645 — original shape space covering theory with percolation-like threshold"
    type: supporting

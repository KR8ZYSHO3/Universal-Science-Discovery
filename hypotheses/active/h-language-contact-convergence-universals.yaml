id: h-language-contact-convergence-universals
title: >
  Language contact convergence is bounded by universal grammar constraints —
  contact languages cannot acquire each other's features that violate universal
  word order harmonies or basic phonological markedness constraints, regardless
  of contact intensity, providing evidence for inviolable language universals.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-language-contact-convergence-limit
evidence_links:
  - type: supporting
    note: "Heine & Kuteva (2005) World Lexicon of Grammaticalization: borrowed grammatical features cluster on typological universal dimensions — non-random convergence"
    confidence: 0.72
  - type: related
    note: "Greenberg universals (1963): correlations between word order features (SVO/SOV/VSO) resist disruption even in intense contact zones (Balkans Sprachbund)"
    confidence: 0.70
  - type: related
    note: "Thomason & Kaufman (1988) Language Contact: maximum convergence in Kupwar village (4 languages, 700 years) preserves distinct phonological systems"
    confidence: 0.75
proposed_tests:
  - description: >
      Balkan Sprachbund morphosyntactic analysis: systematically code 20 features
      in 10 Balkan languages for convergence level (0–4 scale). Test: features
      consistent with Greenberg universals converge faster (higher score) than
      features violating universals. ANOVA p < 0.05.
  - description: >
      Computational simulation: implement language change model where features
      are borrowed probabilistically weighted by typological markedness. Run 1000
      simulations of 500-year contact. Measure which features resist borrowing.
      Compare to empirical Sprachbund databases.
related_disciplines:
  - historical-linguistics
  - typology
  - contact-linguistics

proposed_tests:
  - description: Analyze post-merger gravitational wave spectra from 10 future Einstein Telescope binary neutron star detections with total mass varying from 2.4 to 3.2 solar masses; extract dominant post-merger frequency f₂ from Fourier transform of post-merger signal (0-50ms after merger); plot f₂ vs. M_total; test for a discontinuity (jump of >100 Hz) at the predicted phase transition mass using Bayesian change-point analysis; compare to smooth f₂(M) curves predicted by EOS without phase transition.

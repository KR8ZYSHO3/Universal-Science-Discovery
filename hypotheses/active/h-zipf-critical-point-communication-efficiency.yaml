id: h-zipf-critical-point-communication-efficiency
title: >
  Natural language lexicons sit at the critical point (α = 1) of the
  speaker-listener effort trade-off game, predictable as the mutual-information-
  maximising solution of the Ferrer i Cancho-Solé communication model.

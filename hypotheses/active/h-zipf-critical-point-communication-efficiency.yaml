proposed_tests:
  - description: >
      Compile word frequency distributions for 20+ languages (diverse families,
      morphological types) from balanced corpora (10^8 words each). Fit
      Mandelbrot distribution f_r = C(r+b)^{-α} by MLE. Test: mean α = 1.00±0.05
      across languages, with no systematic deviation by morphological type.
  - description: >
      Measure α in American Sign Language (ASL) and British Sign Language (BSL)
      sign-frequency corpora. If α ≈ 1 in sign languages (different articulatory
      constraints from spoken language), the null monkey model (which depends on
      stop probability tuned to acoustic constraints) is ruled out.

id: h-quantum-probability-gleason-measure-uniqueness
title: >
  Gleason's theorem establishes that the Born rule is the unique probability measure
  on the Hilbert space lattice of projections, implying that the probabilistic
  structure of quantum mechanics is not an additional postulate but a mathematical
  consequence of the Hilbert space formalism for dimensions ≥ 3.

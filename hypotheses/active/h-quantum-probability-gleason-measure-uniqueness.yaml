proposed_tests:
  - description: >
      Construct an explicit non-Gleason measure for a dimension-2 (qubit) Hilbert space
      and demonstrate that it violates the quantum predictions for Bell inequality
      violation. This would confirm that Gleason's theorem (which fails for dim=2)
      is the mathematical distinction between classical and quantum probability in low
      dimensions, and that two-qubit entanglement experiments probe the geometric
      impossibility of assigning classical probabilities to qubits.
    method: "Algebraic construction of a hidden-variable probability assignment consistent with all projective measurements on a single qubit; test whether two-qubit correlations derived from this assignment violate quantum mechanical predictions for CHSH"
    prediction: "A valid non-Gleason measure exists for dim=2 but cannot explain two-qubit entanglement correlations — confirming that entanglement is the dimension-2 analogue of Gleason's theorem"
  - description: >
      Extend Gleason's theorem constructively to infinite-dimensional separable Hilbert
      spaces and derive explicit bounds on the rate of convergence of finite-dimensional
      Gleason approximations. This would provide constructive foundations for the Born
      rule in quantum field theory (which requires infinite-dimensional Hilbert spaces).
    method: "Functional analysis proof using the spectral theorem for unbounded operators; estimate approximation error for finite-rank truncations as a function of truncation dimension"
    prediction: "The Born rule is recovered exactly in the infinite-dimensional limit and the finite-dimensional approximation error decreases as O(1/d) in dimension d"


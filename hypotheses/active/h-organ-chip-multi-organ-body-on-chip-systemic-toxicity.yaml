id: h-organ-chip-multi-organ-body-on-chip-systemic-toxicity
title: >
  A fluidically coupled 4-organ (liver-heart-lung-kidney) body-on-a-chip system will
  predict drug-induced systemic toxicity with higher accuracy than any single organ-on-a-chip
  or animal model because inter-organ metabolite exchange is required to reproduce the
  hepatic-cardiac toxicity cascade that causes 50% of late-stage clinical drug failures.

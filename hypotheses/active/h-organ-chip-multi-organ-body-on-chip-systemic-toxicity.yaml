proposed_tests:
  - description: >
      Test 12 FDA-approved drugs withdrawn for cardiac toxicity (including troglitazone,
      terfenadine) on the 4-organ chip vs. liver-only chip vs. heart-only chip vs.
      standard 2D culture. Primary endpoint: correctly predicting cardiac toxicity
      at clinical Cmax. Prediction: 4-organ chip achieves ≥80% sensitivity vs.
      ≤50% for single-organ chips — because hepatic metabolism generates cardiotoxic
      metabolites that cannot be detected without the liver-heart coupling.
  - description: >
      Measure Reynolds number and Péclet number conditions at inter-organ connections
      in the 4-organ chip. Optimize flow rate ratio to maintain physiological residence
      time (liver:gut:heart:kidney = 26:7:4:0.7 minutes). Prediction: physiological
      residence times improve cardiotoxicity prediction sensitivity by ≥20% over
      arbitrary flow rate conditions.

proposed_tests:
  - description: Apply topological data analysis (persistent homology with Betti numbers β₀, β₁, β₂) to motor cortex population activity during a circular track task; test whether the manifold topology is a ring (β₁=1) matching the circular behavioral space
  - description: Train animals on tasks with different topological structures (linear, circular, toroidal); record hippocampal population activity; test whether persistent homology of the neural manifold tracks the task topology across learning

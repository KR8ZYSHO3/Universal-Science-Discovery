id: h-turing-pattern-wavelength-experimental-test
title: >
  The spacing of vertebrate digit primordia is set by the Turing wavelength
  λ = 2π√(D_A/k) of the BMP-Sox9 reaction-diffusion system, and perturbing D_A
  (activator diffusivity) or k (degradation rate) independently should shift
  digit spacing by the predicted √-factor quantitatively.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"

id: h-cell-division-x-branching-process
title: Normal tissue stem cell clones operate at near-criticality (m ≈ 1 ± 0.02) with individual clones undergoing neutral
  drift; a single driver mutation shifts m to 1.05–1.15, providing a 10–30 fold increase in clonal establishment probability
  predictable from branching process extinction theory

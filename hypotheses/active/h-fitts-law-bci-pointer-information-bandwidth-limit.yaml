proposed_tests:
  - description: >
      Systematically measure Fitts' law throughput (IT = ID / MT) for six different BCI
      modalities (intracortical Utah array, ECoG, EEG alpha/beta, fNIRS, EMG, eye gaze)
      in the same task (center-out cursor control, 8 targets, 3 amplitudes, 3 widths)
      and compare to the theoretical information rate derived from the signal-to-noise
      ratio of each modality. Test whether throughput is determined primarily by SNR
      (biological constraint) or by decoder algorithm (computational constraint).
    method: "Standardized center-out Fitts' task (ISO 9241-9 2D Fitts' protocol); measure throughput in bits/second for each modality with fixed linear decoder; compute SNR from signal variance / noise variance; test correlation between SNR and throughput"
    prediction: "Throughput ∝ log₂(1 + SNR) for all modalities (Shannon channel capacity), with proportionality constant independent of modality; decoder improvements saturate within 20% of SNR-predicted ceiling within 3 decoder generations"
  - description: >
      In a single subject with intracortical BCI, compare Fitts' throughput with: (1)
      optimal linear decoder (Kalman), (2) optimal nonlinear decoder (recurrent neural
      network), (3) brain-machine interface with cursor reinforcement learning (closed-loop
      neural adaptation). Test whether the throughput ceiling is hard (neural SNR limited)
      or soft (decoder + adaptation unlimited). If closed-loop adaptation exceeds 4.5
      bits/second, the ceiling is not a fixed biological limit.
    method: "BrainGate2 or equivalent 96-electrode Utah array; 3-condition crossover design; matched practice periods; Fitts' throughput as primary outcome; secondary: neural dimensionality (PCA of spike activity during tasks)"
    prediction: "Kalman filter: 3.5 bits/second; RNN decoder: 4.2 bits/second (20% gain); closed-loop adaptation: 4.8 bits/second (37% gain) — 37% above Kalman, consistent with neural reorganization expanding effective dimensionality beyond hardware SNR ceiling"


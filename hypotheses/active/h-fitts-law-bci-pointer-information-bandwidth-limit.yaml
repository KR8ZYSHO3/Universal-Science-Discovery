id: h-fitts-law-bci-pointer-information-bandwidth-limit
title: >
  Fitts' law applies universally to brain-computer interface (BCI) cursor control:
  the information throughput of BCI pointing systems is bounded by the cortical
  motor channel capacity (~4 bits/second for intracortical BCIs, ~1 bit/second for
  EEG BCIs) regardless of the decoding algorithm used, because the bottleneck is
  biological (neural variability) rather than computational.

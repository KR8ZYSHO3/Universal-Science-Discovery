id: h-reinforcement-learning-x-foraging-patch-models
title: >
  Partially observable RL agents trained on synthetic patch worlds parameterized by hummingbird telemetry hazard statistics will match departure-time distributions closer than MVT thresholds when cue entropy exceeds calibrated bounds — falsifying deterministic MVT sufficiency under sensory limits.
status: active
priority: medium
impact_score: 0.52
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1086/282878"
    type: supporting
    confidence: 0.8
    note: MVT baseline predictions for fully observed patches

unknowns_addressed:
  - u-patch-foraging-partial-observability-wild

proposed_tests:
  - description: >
      Fit hidden-state POMDP parameters to staged laboratory flowers with manipulated cue reliability; compare departure cumulative distributions vs MVT optimal stopping surfaces.
    method: Kolmogorov–Smirnov tests vs RL policies trained with identical reward kernels but observable versus latent patch states
    prediction: POMDP agents reduce KS statistic versus MVT when cue entropy crosses empirically measured crossover threshold

related_disciplines:
  - behavioral-ecology
  - reinforcement-learning

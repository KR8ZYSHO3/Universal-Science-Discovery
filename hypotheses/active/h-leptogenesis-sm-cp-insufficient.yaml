id: h-leptogenesis-sm-cp-insufficient
title: >
  Standard Model CP violation in the CKM matrix is insufficient for baryogenesis
  by at least 10 orders of magnitude, and the observed baryon asymmetry was
  generated by leptonic CP violation in heavy Majorana neutrino decays (leptogenesis)
  at a scale M_R > 10^9 GeV set by the Davidson-Ibarra bound.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.85
related_disciplines:
  - particle-physics
  - cosmology
  - nuclear-physics
unknowns_addressed:
  - u-baryon-asymmetry-origin
  - u-leptogenesis-cp-scale
evidence_links:
  - type: supporting
    doi: "10.1016/0370-2693(86)91126-3"
    note: >
      Fukugita & Yanagida (1986) - original leptogenesis mechanism via heavy Majorana
      neutrino decay; demonstrates Sakharov conditions are satisfied
    confidence: 0.90
  - type: supporting
    arxiv: "hep-ph/0210271"
    note: >
      Davidson & Ibarra (2002) - lower bound M_R > 10^9 GeV for successful leptogenesis;
      directly constrains the heavy neutrino mass scale
    confidence: 0.85
  - type: related
    doi: "10.1103/PhysRevLett.120.211801"
    note: >
      T2K (2018) - first constraint on delta_CP; maximal CP violation (delta_CP ~ -pi/2)
      preferred, consistent with leptogenesis viability
    confidence: 0.60
  - type: contradicting
    note: >
      Resonant leptogenesis can lower the scale to TeV with nearly degenerate heavy
      neutrinos, potentially accessible at future lepton colliders, making the
      Davidson-Ibarra bound non-universal. Electroweak baryogenesis (BSM) is a
      viable alternative that does not require heavy neutrinos.
proposed_tests:
  - discipline: particle-physics
    description: >
      DUNE measurement of the leptonic CP phase delta_CP to ~10 degree precision.
      If delta_CP is near -pi/2, leptogenesis via type-I seesaw with M_R ~ 10^10 GeV
      is viable. If delta_CP is near 0 or pi, minimal leptogenesis is strongly
      disfavored and alternative baryogenesis mechanisms are required.
  - discipline: particle-physics
    description: >
      Neutron electric dipole moment (nEDM) search at n2EDM (PSI) with target
      sensitivity |d_n| < 10^-28 e*cm. Any nonzero nEDM signals BSM CP violation
      in the hadronic sector; combined with DUNE delta_CP, constrains the
      CP violation landscape for baryogenesis models.
  - discipline: cosmology
    description: >
      LISA detection of a stochastic gravitational wave background from a first-order
      electroweak phase transition. Detection would strongly favor electroweak
      baryogenesis over leptogenesis; non-detection constrains BSM models with
      strongly first-order EWPT.

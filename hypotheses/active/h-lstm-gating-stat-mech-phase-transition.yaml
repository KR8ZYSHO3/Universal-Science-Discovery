proposed_tests:
  - description: Analyse forget gate activation histograms in LSTM cells trained on copying tasks with varying delay lengths; test for bimodality and shift with delay
  - description: Compute the effective temperature T_eff = -1/log(f_t/(1-f_t)) for each forget gate and plot against task memory requirements to test the phase diagram prediction
  - description: Perturb trained LSTMs with forget gate noise and measure susceptibility chi = d<c_t>/d(f_t); predict chi diverges for gates near the transition point f_t = 0.5

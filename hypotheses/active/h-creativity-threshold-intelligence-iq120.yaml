id: h-creativity-threshold-intelligence-iq120
title: >
  The threshold hypothesis states that IQ correlates with creativity below about 120
  but not above; below-threshold correlations are domain-specific and moderate (r~0.3),
  while above-threshold creative eminence depends on openness, intrinsic motivation,
  and deliberate practice rather than additional IQ increments.

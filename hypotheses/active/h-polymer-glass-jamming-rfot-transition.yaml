proposed_tests:
  - description: >
      Measure the static point-to-set correlation length in fragile glass-formers
      (OTP, glycerol) using particle pinning experiments as a function of temperature
      from above T_g to near T_K; test whether the correlation length diverges as
      (T - T_K)^{-nu} with RFOT exponent nu = 0.5.
    method: "Colloidal glass analog system with confocal microscopy; random pinning field imposed by UV polymerization; measure amorphous order correlation length"
    prediction: "Static correlation length xi diverges below T_g with power law xi ~ (T - T_K)^{-0.5}, confirming thermodynamic RFOT transition at T_K"
  - description: >
      Test universality of jamming critical exponents at point J in both colloidal
      glasses and granular packings, measuring bulk modulus B ~ (phi - phi_J)^1 and
      contact number Z ~ (phi - phi_J)^0.5 to distinguish isostaticity from RFOT.
    method: "Emulsion colloidal particles near random close packing; osmotic compression to vary phi; measure elastic moduli by diffusing wave spectroscopy"
    prediction: "Critical exponents for B and Z at point J are universal between colloidal and granular systems, confirming shared universality class"

id: h-polymer-glass-jamming-rfot-transition
title: >
  The glass transition in fragile glass-formers is a random first-order transition
  with a thermodynamic singularity at T_K (Kauzmann temperature) obscured by
  finite-size mosaic state effects predicted by RFOT theory

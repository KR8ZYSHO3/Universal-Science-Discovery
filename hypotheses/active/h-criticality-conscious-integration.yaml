proposed_tests:
  - summary: >
      Perturbational Complexity Index (PCI) measurements under anesthesia and wakefulness compared to branching
      ratio estimates from the same sessions — test whether reduced PCI correlates with sub-critical dynamics.
  - summary: >
      In vitro cortical cultures: pharmacologically shift excitation/inhibition ratio to push the network
      away from estimated critical point; measure whether information integration metrics (phi, LZ complexity)
      degrade monotonically with distance from criticality.
  - summary: >
      Cross-species comparison: do species with documented conscious integration (corvids, cephalopods)
      show neuronal avalanche statistics consistent with criticality despite radically different architectures?
      A positive result would support the functional necessity claim independent of substrate.

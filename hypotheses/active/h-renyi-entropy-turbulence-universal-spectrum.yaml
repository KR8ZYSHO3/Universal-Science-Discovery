id: h-renyi-entropy-turbulence-universal-spectrum
title: >
  The multifractal singularity spectrum f(alpha) of fully developed turbulence
  converges to a universal parabolic form in the limit Re -> infinity, derivable
  from the log-normal cascade model with a single intermittency parameter mu

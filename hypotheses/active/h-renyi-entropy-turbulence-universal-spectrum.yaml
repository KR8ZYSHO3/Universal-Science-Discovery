proposed_tests:
  - description: >
      Compute Renyi entropy H_q for q = -5 to +5 from high-Re turbulence DNS data
      (Re_lambda > 1000) and measure the convergence of the Legendre transform
      f(alpha) toward a parabola as Re increases; test whether intermittency
      parameter mu is universal across different forcing geometries.
    method: "DNS data from JHTDB (Johns Hopkins Turbulence Database); structure function S_p(r) computation; Legendre transform to f(alpha); parabolic fit"
    prediction: "f(alpha) converges to parabola f(alpha) = 1 - (alpha - 1/3 - mu/2)^2 / (2*mu/ln2) with mu = 0.20 +/- 0.02 independent of geometry"
  - description: >
      Measure the multifractal spectrum of financial return distributions and compare
      to turbulent velocity increment spectrum; test whether identical Renyi entropy
      scaling implies common statistical mechanism (multiplicative cascade).
    method: "Tick-by-tick S&P500 data; compute Renyi entropy H_q as function of time lag tau; compare tau(q) curve to turbulence DNS"
    prediction: "Financial return distributions share identical tau(q) curve with turbulence within statistical error, confirming multiplicative cascade mechanism"

id: h-eew-kalman-style-updates-tighten-magnitude-posterior-faster-with-dense-networks
title: >
  Holding rupture scenario class fixed, doubling effective station density within two rupture lengths of the
  epicenter halves the median time-to-first magnitude estimate within ±0.5 units compared to sparse-network baselines
  — dominated by geometric aperture rather than CPU throughput at modern telemetry rates.

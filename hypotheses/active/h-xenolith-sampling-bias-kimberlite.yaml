id: h-xenolith-sampling-bias-kimberlite
title: >
  Mantle xenoliths in kimberlites systematically undersample the strongly depleted
  harzburgite lithosphere and oversample refertilized lherzolite, because kimberlite
  magma preferentially entrains and preserves lithologies with moderate modal
  clinopyroxene — biasing geochemical models of the subcontinental lithospheric mantle.
status: active
priority: low
impact_score: 0.58
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-xenolith-mantle-bias
evidence_links:
  - type: supporting
    note: "Gurney (1984) clinopyroxene-poor harzburgites are underrepresented in kimberlite nodule suites relative to expected depletion gradient"
    confidence: 0.68
  - type: related
    note: "Griffin et al. (2009) SCLM composition from xenolith vs. seismic tomography: mismatch in Mg# distribution suggests sampling bias"
    confidence: 0.65
  - type: contradicting
    note: "Rudnick et al. (1998) trace element patterns in xenoliths match SCLM compositions estimated from other methods — bias may be minor"
    confidence: 0.60
proposed_tests:
  - description: >
      Xenolith size vs. composition analysis: compile xenolith size and modal
      mineralogy for all kimberlite suites with well-documented sample protocols.
      Test: harzburgites (low cpx) concentrated in smaller sizes (easier entrainment
      breakup) vs. lherzolites in larger sizes. If so, standard suites undersample
      small refractory fragments.
  - description: >
      Forward sampling model: simulate kimberlite dike magma properties (velocity,
      viscosity) and compute capture cross-section for xenolith lithologies of
      varying mineralogy. Compare predicted size-composition distribution to
      observed. Derive correction factors for SCLM composition estimates.

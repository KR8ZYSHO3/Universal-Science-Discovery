proposed_tests:
  - description: >
      For 50 memes with documented Twitter/X adoption timeseries, fit SIR parameters (beta, gamma)
      to the first 10% of cascade data. Use heterogeneous mean-field approximation (HMF) to predict
      final adoption fraction and peak timing. Compare HMF predictions to homogeneous-mixing SIR
      and to observed final adoption fraction.
    method: "SIR model fitting to Twitter adoption timeseries; HMF vs. homogeneous-mixing comparison"
    prediction: "HMF SIR predicts final adoption fraction within 20% for > 70% of memes; outperforms homogeneous SIR by > 15% in RMSE"

id: h-allelopathy-glucosinolate-diversity-coevolution-ratchet
title: >
  The diversity of glucosinolates in Brassicaceae (> 130 structures) is driven
  by a ratchet-like coevolutionary dynamic with Pieridae butterfly detoxification
  enzymes — each novel glucosinolate provides a temporary escape from specialist
  herbivores, driving plant radiation, until herbivores evolve counter-adaptations,
  with the ratchet rate predicted by substitution rate models of host-parasite coevolution.

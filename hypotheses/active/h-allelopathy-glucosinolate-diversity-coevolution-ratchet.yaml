proposed_tests:
  - description: >
      Comparative transcriptomics: measure glucosinolate biosynthesis gene expression
      profiles in 50 Brassicaceae species spanning the phylogeny; correlate glucosinolate
      structural diversity with the host range of specialist Pieridae herbivores;
      test whether species with the fewest Pieridae specialist herbivores have
      the most structurally unusual glucosinolate profiles (evolutionary escape).
    method: "LC-MS glucosinolate profiling + herbivore host range database + phylogenetic comparative methods"
    prediction: "Glucosinolate novelty (Tanimoto distance from ancestral ancestral profiles) correlates negatively with specialist herbivore species richness (r < -0.4)"
  - description: >
      CRISPR-based glucosinolate pathway engineering in Arabidopsis thaliana:
      engineer strains with novel glucosinolate profiles (swap biosynthetic cytochrome
      P450 enzymes from divergent Brassicaceae species); test feeding preference
      and performance of Pieris rapae caterpillars naive to the novel profile vs.
      caterpillars pre-exposed for 5 generations. Measure whether novel profiles
      confer partial resistance and whether rapid adaptation occurs.
    method: "Arabidopsis CRISPR-P450 swap + Pieris feeding assay + rapid evolution experiment"
    prediction: "Novel glucosinolate profiles reduce P. rapae performance by 30-50% initially; adaptation within 10 generations; consistent with ratchet dynamics"


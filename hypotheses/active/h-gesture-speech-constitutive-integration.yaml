evidence_links:
  - type: supporting
    doi: 10.1006/brln.1998.1993
    note: >
      McNeill (1992) — gestures and speech form an integrated system; speech-gesture
      mismatches indicate cognitive conflict; gestures carry distinct representational content.
  - type: supporting
    doi: 10.1016/j.cognition.2004.09.016
    note: >
      Alibali et al. (2001) — gesture restriction increases speech disfluencies and
      lexical access times for spatial concepts; non-spatial content unaffected.
  - type: related
    doi: 10.1017/CBO9780511730832
    note: >
      Goldin-Meadow (2003) — gesture supports thinking; blind speakers gesture in
      the absence of visual input, confirming cognitive not communicative function.
proposed_tests:
  - discipline: psychology
    description: >
      Adapt Alibali's gesture-restriction paradigm for two matched story types: spatial
      (route description, object manipulation) and propositional (logical argument,
      emotional narrative). Measure speech informativeness (expert rater) and lexical
      diversity when participants describe stories with vs. without gesture restriction.
      Test whether gesture restriction specifically reduces spatial story quality
      while leaving propositional story quality intact.
  - discipline: neuroscience
    description: >
      Use TMS to temporarily disrupt the left anterior intraparietal sulcus (aIPS)
      during word retrieval for spatial vs. non-spatial concepts. Measure retrieval
      latency and gesture production rates. aIPS disruption should impair spatial
      word retrieval and reduce spontaneous gesture production simultaneously, linking
      the neural substrate to the constitutive role hypothesis.

id: h-gesture-speech-constitutive-integration
title: >
  Gesture plays a constitutive role in language production by providing a spatial
  analog representation that constrains the lexical retrieval process for spatial
  and abstract concepts, such that preventing gesture production during speech
  specifically impairs the precision of spatial and metaphorical language without
  affecting non-spatial propositional content.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"

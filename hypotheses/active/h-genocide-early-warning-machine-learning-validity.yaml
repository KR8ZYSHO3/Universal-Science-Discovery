id: h-genocide-early-warning-machine-learning-validity
title: >
  Machine learning models trained on political, economic, and social indicators
  (Minorities at Risk, Political Terror Scale, ACLED data) can predict genocide
  onset 12–24 months in advance with positive predictive value > 30% at
  95% sensitivity, providing actionable early warning given that the base rate
  of genocide onset is ~2–3 per year globally.

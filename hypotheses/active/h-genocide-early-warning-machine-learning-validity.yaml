proposed_tests:
  - description: >
      Train gradient-boosted and LSTM models on 1945–2000 Political Instability Task
      Force data (Harff variables). Prospective validation on 2001–2020 period.
      Primary metrics: AUC-ROC, precision-recall at 95% recall threshold, and
      lead time distribution for true positives. Test whether PPV > 30% is achieved
      and whether adding satellite-derived economic shock indicators improves recall.

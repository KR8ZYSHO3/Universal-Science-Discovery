id: h-pagerank-spectral-gap-spam-detection
title: >
  The spectral gap of the Google matrix, not alpha, is the fundamental parameter
  controlling PageRank spam resistance; link farms create near-zero spectral gap
  exploits predictable from Markov chain theory
status: active
priority: medium
impact_score: 0.70
created: "2026-05-07"
last_updated: "2026-05-07"
author: wave-62-agent

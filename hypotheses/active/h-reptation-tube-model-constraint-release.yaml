id: h-reptation-tube-model-constraint-release
title: >
  The discrepancy between predicted (η ∝ N³) and observed (η ∝ N^3.4) viscosity
  exponents in entangled polymer melts is fully accounted for by contour-length
  fluctuations and constraint release acting together, and the combined model
  prediction converges to ν=3.4 in the experimentally accessible molecular
  weight range before asymptotically returning to ν=3 at N >> N_e.

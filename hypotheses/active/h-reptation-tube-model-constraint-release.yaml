proposed_tests:
  - description: >
      Synthesize narrow-dispersity (Ð < 1.05) polybutadiene or polystyrene samples
      spanning N/N_e from 5 to 500 (five decades). Measure zero-shear viscosity η₀
      and self-diffusion D by pulsed-field-gradient NMR. Fit both CLF+CR corrected
      reptation model simultaneously. Test whether the crossover from 3.4 back toward
      3 is observable at the highest molecular weights.
  - description: >
      Ring polymer melts (no chain ends) cannot reptate and should not show CLF or CR
      corrections. Measure η vs N for rings and compare to linear predictions. If
      rings show a different exponent, it tests the specific role of chain ends in
      the 3→3.4 exponent shift.

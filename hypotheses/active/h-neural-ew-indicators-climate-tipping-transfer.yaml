id: h-neural-ew-indicators-climate-tipping-transfer
title: >
  Multivariate early-warning indicators borrowed from neural criticality analysis
  (leading eigenvector of the spatial covariance matrix) applied to CMIP6 climate
  model output will detect simulated AMOC and Arctic sea-ice tipping points with
  at least 20% greater lead time than the standard univariate AR1 indicator
status: active
priority: high
created: "2026-05-05"
last_updated: "2026-05-05"
author: USDR seed content (replace with GitHub handle when stewarded)

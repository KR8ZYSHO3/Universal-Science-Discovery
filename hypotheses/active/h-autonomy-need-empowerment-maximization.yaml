proposed_tests:
  - description: Design a fMRI free-choice task with high-autonomy and low-autonomy conditions; compute action entropy from behavioral choices and test whether entropy differences correlate with autonomy need satisfaction scores
  - description: Apply active inference model to SDT over-justification effect experiments; test whether extrinsic reward correctly predicts reduced action entropy via policy entropy collapse

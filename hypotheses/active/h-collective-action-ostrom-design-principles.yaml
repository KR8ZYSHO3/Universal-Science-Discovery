id: h-collective-action-ostrom-design-principles
title: >
  Groups successfully solve collective action problems without central authority when
  they implement Ostrom's 8 design principles (clear boundaries, proportional rules,
  collective choice, monitoring, graduated sanctions, conflict resolution, recognition,
  nested institutions), with institutional robustness increasing superlinearly with
  the number of principles satisfied.

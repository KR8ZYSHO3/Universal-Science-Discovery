proposed_tests:
  - description: >
      Comparative case study coding: code 300 CPR institutions on all 8 Ostrom
      principles (binary scores). Outcome: institution survival >50 years. Test:
      logistic regression with design principle count as predictor. Does each additional
      principle add multiplicative probability of success?
    prediction: "Each design principle adds OR~1.8 to survival probability; institutions with ≥6/8 principles survive at >85% rate; institutions with ≤3/8 survive at <25%."

evidence_links:
  - doi: "10.1038/399335a0"
    type: supporting
    confidence: 0.84
    note: >
      Backhaus & Swift (1999) Nature — thermoacoustic Stirling engine achieves 30%
      Carnot efficiency (vs. 17% for standing-wave engines at comparable temperature
      ratio); travelling-wave phasing eliminates half-wavelength pressure-displacement
      phase error; streaming suppression via jet pump is key innovation
  - doi: "10.1121/1.396617"
    type: supporting
    confidence: 0.79
    note: >
      Swift (1988) — standing-wave engines have Carnot efficiency only at zero amplitude;
      travelling-wave topology removes this constraint by creating phase matching
      throughout stack/regenerator length
  - doi: "10.1016/j.energy.2014.04.106"
    type: related
    confidence: 0.72
    note: >
      De Blok (2010) — multi-stage thermoacoustic engines cascade pressure amplification;
      efficiency scales with number of stages approaching Carnot limit of the cascade
proposed_tests:
  - description: >
      Build geometrically similar thermoacoustic engines at three temperature ratios
      (T_h/T_c = 1.5, 2.0, 3.0); measure efficiency/Carnot ratio at optimal drive ratio
      for both standing-wave and travelling-wave geometries; test whether the
      travelling/standing efficiency ratio is independent of temperature ratio.

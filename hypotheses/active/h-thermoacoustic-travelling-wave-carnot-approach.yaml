id: h-thermoacoustic-travelling-wave-carnot-approach
title: >
  Thermoacoustic travelling-wave engines (Stirling-cycle topology) can approach Carnot
  efficiency more closely than standing-wave engines because their piston displacement
  is in-phase with pressure oscillation throughout the regenerator, minimising
  irreversible heat transfer and approaching the ideal regenerator limit.

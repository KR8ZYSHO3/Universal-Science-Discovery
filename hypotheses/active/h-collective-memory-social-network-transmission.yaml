id: h-collective-memory-social-network-transmission
title: >
  Collective memory of historical events forms and distorts through iterative
  social transmission following a power-law decay: details that cannot be easily
  schematized are forgotten at rate proportional to their schema-inconsistency,
  while emotionally salient and identity-relevant elements are retained and
  amplified — a process well-described by Bartlett's reconstructive memory
  applied to network diffusion models.

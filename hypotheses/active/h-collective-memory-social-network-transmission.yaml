proposed_tests:
  - description: >
      Track collective memory distortion of a documented historical event (e.g.,
      a local community disaster) using structured narrative elicitation across
      three generations (witnesses, children, grandchildren). Code narrative elements
      for schema-consistency and emotional salience. Test whether schema-inconsistent
      details decay faster than consistent ones, and whether emotional salience
      predicts inter-generational amplification.

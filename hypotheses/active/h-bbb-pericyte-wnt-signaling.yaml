id: h-bbb-pericyte-wnt-signaling
title: >
  Pericyte-derived WNT ligands dynamically regulate blood-brain barrier permeability
  through β-catenin signalling in endothelial tight junctions, and disruption of this
  pathway is a common upstream mechanism in neurological disease-associated BBB breakdown.
status: active
priority: high
impact_score: 0.80
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - neuroscience
  - vascular-biology
  - cell-biology
unknowns_addressed:
  - u-blood-brain-barrier-regulation
evidence_links:
  - doi: "10.1038/nature14412"
    type: supporting
    confidence: 0.82
    note: >
      Daneman et al. (2010) Nature — pericytes are essential for BBB induction and maintenance;
      PDGF-B/PDGFRβ signalling controls pericyte coverage and barrier tightness
  - doi: "10.1073/pnas.1200163109"
    type: supporting
    confidence: 0.75
    note: >
      WNT/β-catenin signalling directly upregulates claudin-3, occludin, and ZO-1 in
      CNS endothelial cells; loss of WNT signalling in Alzheimer models correlates with
      early BBB disruption
  - doi: "10.1172/JCI152229"
    type: related
    confidence: 0.60
    note: >
      Sweeney et al. (2021) — pericyte injury is an early biomarker (CSF PDGFR-β)
      of cognitive decline; suggests BBB regulation is dynamic and pericyte-driven
proposed_tests:
  - description: >
      Conditional pericyte-specific knockdown of WNT ligands (Wnt7a/7b) in adult mice
      followed by two-photon BBB permeability imaging; quantify tight junction protein
      expression and correlate with pericyte contact area.

id: h-sequence-complex-torus-first-ecc-exam-performance
title: >
  Students exposed first to the complex torus group law, then immediately tested on 𝔽_p addition tables and subgroup orders, will outperform cohorts taught finite-field formulas alone on conceptual questions about why discrete logarithms matter — without elevating false beliefs that periodicity in ℂ implies protocol breaks — falsified if misconception inventory scores worsen relative to control after torus-first sequencing.

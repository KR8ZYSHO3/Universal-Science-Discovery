id: h-td-prediction-error-dopamine-burst-identity-schultz
title: >
  Dopamine neuron firing rate encodes the exact TD prediction error δ_t = r_t +
  γV(s_{t+1}) − V(s_t) with a linear gain of ~1 spike/s per unit of normalized δ,
  and the heterogeneity in DA neuron responses (Dabney et al. 2020) encodes the
  full quantile distribution of future returns — falsifiable by measuring DA neuron
  responses to systematically varied reward probability distributions.

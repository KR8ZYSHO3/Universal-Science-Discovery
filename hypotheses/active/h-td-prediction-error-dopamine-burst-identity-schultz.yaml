proposed_tests:
  - description: >
      Train mice on a task with systematically varied reward probability (P = 0.1,
      0.25, 0.5, 0.75, 0.9) and measure individual VTA DA neuron responses (single-unit
      recording or calcium imaging) to conditioned stimulus and reward; compute
      TD prediction error δ from behavioral value estimates; test linearity of
      firing rate vs. δ with gain coefficient.
    method: "2-photon DA-specific GCaMP calcium imaging in VTA; 5 reward probability conditions; Bellman equation to compute V(s) from behavior; linear regression: ΔF/F vs. computed δ"
    prediction: "DA signal ΔF/F = a·δ + b with r² > 0.85 across 5 probability conditions; gain a is consistent across mice (CV < 20%); offset b encodes baseline prediction — confirming quantitative identity"
  - description: >
      Test distributional coding: measure 50+ individual DA neurons in the same mouse
      performing a reward probability task; identify neurons with asymmetric
      positive/negative gain (optimistic vs. pessimistic DA neurons); test whether
      the distribution of gain coefficients across neurons matches the implied
      quantile levels from distributional RL theory.
    method: "High-density silicon probe (Neuropixels) in VTA; characterize each DA neuron's response curve to reward vs. no-reward; fit asymmetric linear function; compare distribution of quantile levels to uniform prior prediction"
    prediction: "DA neuron quantile levels uniformly distributed from 0.05 to 0.95 (Dabney et al. 2020 prediction); 80% of neurons show significant asymmetric gain; neuron with median quantile (0.5) shows symmetric response — confirming distributional RL"


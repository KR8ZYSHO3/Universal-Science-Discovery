proposed_tests:
  - description: >
      Calibrate a minority game model to intraday order flow data from the NYSE TAQ
      database for a liquid stock (SPY ETF). Estimate the effective number of
      distinct agent strategies from the autocorrelation structure of the order sign
      series. Test whether the fitted model parameters place the market near the
      minority game critical point (α = P/N ≈ α_c where P = strategy space size,
      N = number of agents).
    method: "Minority game calibration + order flow autocorrelation analysis + maximum likelihood estimation of α"
    prediction: "Estimated α lies within 20% of α_c; market is near critical point during normal trading; α >> α_c during flash crashes"
  - description: >
      Carbon market complexity: apply minority game analysis to EU ETS carbon credit
      trading; test whether the market self-organises near the minority game critical
      point; identify whether introducing a carbon price floor (minimum price) shifts
      α away from α_c toward a stable high-carbon-price attractor.
    method: "EU ETS trade data analysis + agent-based simulation with price floor intervention"
    prediction: "Price floor shifts market to α < α_c (herding regime) with reduced volatility but slower price discovery"


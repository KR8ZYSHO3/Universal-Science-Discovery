id: h-complexity-economics-minority-game-market-ecology
title: >
  Real financial market strategy ecology self-organises near the critical point
  of the minority game — where the number of distinct agent strategies equals the
  number of degrees of freedom in the market information signal — producing the
  observed fat-tailed returns and volatility clustering as emergent phenomena.

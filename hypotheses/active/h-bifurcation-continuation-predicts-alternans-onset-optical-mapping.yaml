  - u-hopf-normal-form-cardiac-alternans-mapping

proposed_tests:
  - description: >
      Fit ionic models to baseline electrophysiology, run pseudo-arclength continuation of periodic orbits versus pacing, compare predicted alternans onset BCL to optical-mapping ramp protocols on the same preparation.
    method: Combined experimental optical mapping + numerical continuation (AUTO/XPP or equivalent)
    prediction: Mean absolute relative error of onset BCL below 5% within cohort after geometry-informed calibration


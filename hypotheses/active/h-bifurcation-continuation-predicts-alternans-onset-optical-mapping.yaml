id: h-bifurcation-continuation-predicts-alternans-onset-optical-mapping
title: >
  For Langendorff-perfused hearts instrumented with voltage-sensitive dyes, numerically continued bifurcation boundaries from patient-specific ion-channel posteriors will predict the pacing-cycle-length onset of spatially concordant alternans within ±5% when fibrosis geometry is co-registered — falsified if mismatch persists after rigorous parameter calibration across ≥20 specimens.

evidence_links:
  - doi: "10.1093/qje/qjw024"
    type: supporting
    confidence: 0.72
    note: >
      Hsieh & Moretti (2019) estimate zoning restrictions in New York, San
      Francisco, and San Jose reduced aggregate US GDP by 2% from 1964-2009
      by preventing labour reallocation; housing supply elasticity is the
      key mechanism.
  - doi: "10.1016/j.jue.2018.09.007"
    type: supporting
    confidence: 0.68
    note: >
      Glaeser & Gyourko (2018) review: regions with elastic housing supply
      (Texas, Georgia) show housing costs at near-construction cost; inelastic
      regions (California, coastal Northeast) show 2-3× cost markup due to
      regulatory constraints.
  - doi: "10.1093/restud/rdab011"
    type: related
    confidence: 0.60
    note: >
      Autor et al. (2022) Minneapolis upzoning natural experiment: removing
      single-family zoning citywide associated with 5-7% lower rent growth
      versus synthetic control, but supply response takes 3-5 years.
proposed_tests:
  - description: >
      Use staggered difference-in-differences on the timing of upzoning reforms
      across US cities (e.g., Minneapolis 2040, Oregon HB2001, Auckland Unitary
      Plan). Outcome: median rent / median income ratio and new building permits
      per capita. Moderator: construction cost index (elastic vs. inelastic
      supply). Test: does upzoning reduce rent-to-income ratio more in low-
      construction-cost cities (elastic supply), consistent with the supply
      constraint hypothesis?

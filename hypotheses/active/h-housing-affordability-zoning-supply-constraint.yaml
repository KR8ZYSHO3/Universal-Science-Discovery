id: h-housing-affordability-zoning-supply-constraint
title: >
  The housing affordability crisis in high-income cities is primarily caused
  by restrictive land-use regulation (single-family zoning, minimum lot size,
  height limits) that constrains supply elasticity, and upzoning around transit
  nodes reduces housing costs by 10-20% over 10 years in cities with elastic
  construction supply.

id: h-maxwell-wave-channel-capacity-limit
title: >
  The physical degrees of freedom of a Maxwell wave field in a finite volume set
  a hard electromagnetic Shannon capacity limit that cannot be exceeded by any
  modulation scheme, antenna geometry, or signal processing algorithm.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
related_disciplines:
  - electromagnetism
  - information-theory
  - communications-engineering
unknowns_addressed:
  - u-maxwell-shannon-channel-near-capacity
evidence_links:
  - type: supporting
    note: >
      Bucci & Franceschetti (1989) showed that the number of degrees of freedom of
      a bandlimited electromagnetic field radiated from a finite aperture is finite
      and proportional to aperture area times frequency bandwidth — an electromagnetic
      sampling theorem analogous to Nyquist.
  - type: supporting
    note: >
      Pizzo et al. (2022) derived the spatial degrees of freedom of massive MIMO
      channels from Maxwell's equations, showing a fundamental limit to spatial
      multiplexing gain set by aperture size and wavelength.
  - type: related
    note: >
      Proakis & Salehi (2008) Digital Communications: Shannon capacity derivation
      assumes AWGN — non-Gaussian noise or nonlinear Maxwell propagation requires
      generalized capacity analysis.
proposed_tests:
  - discipline: communications-engineering
    description: >
      Holographic MIMO experiment: deploy a continuous aperture (metasurface array)
      and measure the achieved spectral efficiency vs theoretical degrees-of-freedom
      limit. Test whether capacity scales with aperture area × bandwidth as predicted
      by the electromagnetic sampling theorem.
  - discipline: information-theory
    description: >
      Derive a tight Shannon capacity bound for nonlinear optical fiber channels
      that explicitly incorporates the Maxwell wave equations (Kerr nonlinearity,
      group velocity dispersion) rather than treating the channel as an AWGN model
      with nonlinear noise added perturbatively.

id: h-replica-sparsity-predicts-factor-eigenvalue-noise-bulk
title: >
  Sparsity patterns motivated by ultrametric clustering heuristics do not outperform Ledoit–Wolf shrinkage alone on realistic stationary bootstrap blocks of equity returns — falsified only if hierarchical sparsity priors yield statistically higher out-of-sample Sharpe after transaction costs on ≥15-year rolling windows with multiple-testing correction (**speculative finance probe**).

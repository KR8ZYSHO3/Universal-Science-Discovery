proposed_tests:
  - description: >
      Compare hierarchical Bayesian covariance priors inspired by ultrametric clustering vs shrinkage-only portfolios under identical turnover penalties on publicly available return matrices.
    method: Rolling-window backtests with block-bootstrap significance testing and multiple-testing controls.
    prediction: Incremental Sharpe gains from ultrametric-motivated priors cluster near zero after costs unless genuine hierarchical modes dominate bulk eigenvalues (diagnostic screens provided).

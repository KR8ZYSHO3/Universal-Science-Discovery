id: h-antibiotic-resistance-stochastic-dynamics
title: >
  Antibiotic resistance evolution rate in clinical settings is primarily determined by
  stochastic within-host mutation-selection dynamics modulated by antibiotic pharmacokinetics
  and patient immune status, not simply by antibiotic exposure duration.
status: active
priority: high
impact_score: 0.82
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - microbiology
  - evolutionary-biology
  - pharmacology
  - clinical-medicine
unknowns_addressed:
  - u-antibiotic-resistance-rate
evidence_links:
  - doi: "10.1038/s41579-020-0383-4"
    type: supporting
    confidence: 0.78
    note: >
      Baquero et al. (2021) Nat Rev Microbiol — within-host evolution during treatment
      shows resistance emerges at predictable rates tied to mutation supply (population size × mutation rate)
  - doi: "10.1038/nature09983"
    type: supporting
    confidence: 0.80
    note: >
      Toprak et al. (2011) Nature Genet — microfluidic evolution experiments show step-wise
      resistance evolution follows stochastic fixation ladder; rate scales as √N at large pop sizes
  - doi: "10.1016/j.cell.2016.09.040"
    type: related
    confidence: 0.65
    note: >
      Barbosa et al. (2017) — sub-inhibitory concentrations select resistance faster than
      lethal concentrations, counter-intuitive implication of pharmacodynamic non-linearity
proposed_tests:
  - description: >
      Longitudinal sequencing of pathogen populations in paired patient cohorts receiving
      short vs. long antibiotic courses, controlling for pharmacokinetic profiles.
      Resistance rate should scale with estimated within-host Ne × μ (mutation rate).

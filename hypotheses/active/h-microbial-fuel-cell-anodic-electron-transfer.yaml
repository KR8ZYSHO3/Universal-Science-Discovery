proposed_tests:
  - description: >
      Construct Shewanella oneidensis MR-1 strains with inducible MtrCAB overexpression cassette;
      measure anode current density via chronoamperometry on flat carbon vs. graphene foam electrode
      in lactate minimal medium at 30°C. Compare EIS charge-transfer resistance before and after induction.
    method: "Chronoamperometry + EIS in single-chamber MFC reactor; R_ct from Nyquist plots"
    prediction: "MtrCAB overexpression on graphene foam reduces R_ct by > 80% and increases J_max by > 5x relative to flat carbon baseline"

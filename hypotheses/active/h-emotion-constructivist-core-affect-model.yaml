proposed_tests:
  - description: >
      Conduct a cross-cultural neuroimaging study (N > 500, 10+ cultures) using
      standardized emotion induction protocols. Test whether a classifier trained
      on neural patterns in one culture generalizes to another (discrete view
      predicts generalization; constructed view predicts poor generalization
      without conceptual label features).

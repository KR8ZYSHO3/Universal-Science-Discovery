    type: supporting
    confidence: 0.70
  - note: "Lindquist et al. (2012) Behav Brain Sci 35:121 — meta-analysis of emotion in brain"
    type: supporting
    confidence: 0.75
  - note: "Ekman (1992) Cognit Emot 6:169 — basic emotions, discrete view"
    type: contradicting

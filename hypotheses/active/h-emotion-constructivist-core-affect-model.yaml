id: h-emotion-constructivist-core-affect-model
title: >
  Emotions are not discrete natural kinds with dedicated neural circuits but are
  constructed from combinations of core affect dimensions (valence, arousal)
  and conceptual knowledge — consistent with the theory of constructed emotion
  (Barrett 2017), predicting that brain imaging will show no consistently distinct
  neural signatures for basic emotion categories across individuals and cultures.
status: active
priority: high
impact_score: 0.82

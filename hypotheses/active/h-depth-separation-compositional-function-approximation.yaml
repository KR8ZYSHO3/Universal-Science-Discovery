id: h-depth-separation-compositional-function-approximation
title: >
  Deep neural networks exponentially outperform shallow networks for compositionally
  structured functions because depth enables hierarchical function composition that
  matches the compositional structure of natural data (images, language, physics
  simulations); the depth separation exponent is determined by the nesting depth
  of the compositional structure, with each additional layer providing exponential
  reduction in required neurons.

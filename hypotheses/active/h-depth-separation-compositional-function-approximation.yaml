proposed_tests:
  - description: >
      Compare shallow (1 hidden layer, variable width) vs deep (L layers, fixed total
      parameters) ReLU networks on functions with known compositional depth k:
      f(x) = g_k(g_{k-1}(...g_1(x)...)). Measure approximation error vs parameter count.
      Test: does parameter count to achieve epsilon error scale as O(1/epsilon^{2/s})
      for shallow vs O(L × 1/epsilon^{2/s/k}) for depth-k deep network?
    prediction: "For compositional depth k=4, deep networks require 10^4x fewer parameters than shallow at 1% approximation error; gap grows exponentially with depth k."

id: h-may-stability-real-ecosystem-applicability
title: >
  May's random matrix stability criterion σ√(SC) < 1 applies to real ecosystems
  in a statistical sense: communities near the instability threshold show higher
  variance in abundance dynamics and higher extinction probability, detectable
  as elevated eigenvalue spectral radius in empirical interaction matrices
status: active
priority: medium
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-neutral-vs-niche-ecology-partitioning
related_disciplines:
  - ecology
  - mathematics
  - statistical-physics
evidence_links:
  - type: supporting
    confidence: 0.55
    note: "Allesina & Tang (2012) showed that replacing random interaction matrices with structured (predator-prey, competition, mutualism) matrices changes stability criteria quantitatively — partially validating May's framework for realistic communities."
  - type: contradicting
    confidence: 0.50
    note: "Most empirical food webs (Dunne et al. 2002; Brose et al. 2006) show higher connectance than May's criterion allows, yet remain apparently stable — suggesting the real interaction matrix is structured in ways that differ fundamentally from random."
  - type: supporting
    confidence: 0.45
    note: "Empirical analysis of 116 plant-animal mutualistic networks (Rohr et al. 2014, Nature) found eigenvalue spectra consistent with structured RMT predictions after accounting for network architecture."
proposed_tests:
  - summary: >
      Construct empirical community interaction matrices from published food web and
      co-occurrence databases (IWDB, Global Web of Life); compute the spectral radius
      of the interaction matrix and test whether communities with σ√(SC) near 1.0
      show higher temporal variability in National Ecological Observatory Network
      (NEON) long-term abundance data.

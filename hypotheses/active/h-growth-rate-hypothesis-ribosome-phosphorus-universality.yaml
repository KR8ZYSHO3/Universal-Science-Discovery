id: h-growth-rate-hypothesis-ribosome-phosphorus-universality
title: >
  The growth rate hypothesis — that fast-growing organisms have higher P:N and P:C
  ratios because they require more ribosomal RNA to sustain high protein synthesis
  rates — holds universally across all domains of life (bacteria, archaea, protists,
  plants, animals) and predicts elemental stoichiometry from ribosome allocation
  fraction alone.
status: active
priority: medium
impact_score: 0.74

proposed_tests:
  - description: >
      Measure ribosome content (rRNA per cell, determined by qPCR and ribosome
      profiling), growth rate, and elemental P:C and N:P ratios across a phylogenetically
      diverse panel of 100 marine microbial species grown under nutrient-replete conditions
      at identical temperatures. Test whether rRNA fraction (rRNA / total RNA) predicts
      P:C ratio better than growth rate alone.
    method: "Chemostat cultivation at controlled dilution rate; elemental analysis (ICP-MS for P, CHN analyzer for C and N); total RNA quantification (RiboGreen); ribosome profiling (ribosome-protected fragment sequencing); linear mixed model with phylogenetic covariance"
    prediction: "rRNA fraction explains ≥70% of variance in P:C across species (after controlling for growth rate); growth rate adds ≤10% additional variance — ribosome allocation is the primary determinant"
  - description: >
      In a single fast-growing bacterium (E. coli), systematically vary growth rate
      from 0.1 to 2.0 doublings/hour (by changing carbon source) and simultaneously
      measure P:C ratio, rRNA content (absolute), and protein synthesis rate (35S
      methionine incorporation). Determine the quantitative relationship between rRNA
      content and P:C to calibrate the growth rate hypothesis mechanistically.
    method: "E. coli K-12 in defined media with varying carbon sources (acetate, glucose, glucose + amino acids); P by ICP-MS; C/N by elemental analysis; rRNA by quantitative Northern or RT-qPCR; growth rate by OD600"
    prediction: "P:C = a + b·(rRNA/total RNA); slope b predicts P content of rRNA (3.5%); intercept a equals non-ribosomal phosphorus (phospholipids, DNA) — quantitative agreement within 10%"


proposed_tests:
  - description: Compile forest inventory data from 5 temperate deciduous forests (eastern US, western Europe) and 3 tropical forests (Amazon, Borneo, Congo) with at least 30 years of repeated censusing; fit species transition matrices from consecutive censuses; compute spectral gap (1-λ₂) for each forest; measure empirical recovery time after known disturbances (logging events, hurricane blowdowns); test the predicted g ∝ 1/ln(N_species) scaling and recovery time = 2/g relationship using linear regression.

id: h-flood-basalt-ozone-kill-mechanism
title: >
  The primary mass extinction kill mechanism from large igneous province eruptions
  is stratospheric ozone depletion from halogen (HCl, HBr) emissions rather than
  climate change, and the temporal pattern of extinction should correlate with
  eruption-phase halogen flux rather than total CO2 or SO2 output.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.76
related_disciplines:
  - volcanology
  - geoscience
  - paleontology
  - atmospheric-chemistry
unknowns_addressed:
  - u-flood-basalt-trigger
evidence_links:
  - type: supporting
    note: >
      Black et al. (2014, Science) showed Siberian Traps volatile emissions included
      Cl and F equivalent to >6x the global stratospheric ozone column; modeled
      ozone depletion would produce UV radiation increases lethal to surface ecosystems.
  - type: supporting
    note: >
      Mercury anomalies in End-Permian boundary sections correlate with LIP volcanism;
      mercury is co-emitted with halogens from basaltic degassing, supporting halogen
      flux as the kill mechanism proxy.
  - type: contradicting
    note: >
      Whether Siberian Traps magmas released halogens to the stratosphere (vs. tropospheric
      scrubbing by water) depends on eruption column height models that are poorly
      constrained for flood basalt fissure eruptions, which are lower-intensity than
      explosive eruptions.
proposed_tests:
  - description: >
      High-resolution chemostratigraphy of End-Permian boundary sections: measure
      halogen proxies (Cl/Br ratios in halite evaporites, iodine in marine sediments)
      at the same resolution as extinction rate curves. Test whether extinction pulse
      timing correlates better with halogen proxies than with d13C (carbon cycle
      signal).
  - description: >
      Atmospheric chemistry modeling of Siberian Traps halogen emissions: vary eruption
      column height from tropospheric to stratospheric injection. Compute ozone depletion
      and UV-B at Earth's surface. Test whether the boundary between tropospheric
      scrubbing and stratospheric ozone depletion is at eruption intensities consistent
      with flood basalt fissure eruptions.

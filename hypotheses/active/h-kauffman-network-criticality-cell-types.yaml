id: h-kauffman-network-criticality-cell-types
title: >
  Mammalian gene regulatory networks operate at the critical point between ordered
  and chaotic dynamics in Kauffman Boolean network theory (mean K = 2 inputs per
  gene), predicting that the number of attractors (cell types) scales as the square
  root of gene number N, consistent with the observed ~200 human cell types for N ~ 20,000 genes.

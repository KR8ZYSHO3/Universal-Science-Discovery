proposed_tests:
  - description: >
      Construct a minimal deadly triad counterexample (2-state MDP with linear
      function approximation and off-policy sampling that causes Q-learning to
      diverge); test whether C51 and QR-DQN converge on this counterexample and
      whether Wasserstein Bellman contraction can be verified analytically.
    method: "Baird's counterexample MDP; run Q-learning, C51, QR-DQN for 100,000 steps; measure Q-value and distribution divergence; analytical contraction verification"
    prediction: "Q-learning diverges on Baird's counterexample; C51 and QR-DQN converge to bounded values; Wasserstein Bellman operator has contraction constant < 1 analytically"
  - description: >
      Prove (or provide strong numerical evidence for) the Wasserstein contraction
      constant of the distributional Bellman operator under linear function approximation;
      compare to the spectral radius of the standard Bellman operator to quantify
      improvement.
    method: "Power iteration on distributional Bellman operator for random MDPs; measure contraction ratio vs. standard Bellman; compare spectral radii"
    prediction: "Distributional Bellman Wasserstein contraction constant is <= gamma*rho where rho < 1 depends on distribution support; standard Bellman has rho = 1 (no contraction)"

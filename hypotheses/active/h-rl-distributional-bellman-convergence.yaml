id: h-rl-distributional-bellman-convergence
title: >
  Distributional RL (C51/QR-DQN) converges in the deadly triad regime where standard
  Q-learning diverges because distributional Bellman operators preserve a stronger
  contraction in Wasserstein space
status: active
priority: high
impact_score: 0.77

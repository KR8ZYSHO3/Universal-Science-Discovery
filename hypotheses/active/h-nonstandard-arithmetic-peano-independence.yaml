id: h-nonstandard-arithmetic-peano-independence
title: >
  The standard model of Peano arithmetic (ℕ) is not first-order definable among
  all models of PA — every non-standard model satisfies the same first-order
  sentences as ℕ — and the model-theoretic properties that distinguish ℕ
  (e.g., "well-founded") are second-order statements that cannot be captured
  in the first-order setting.
status: active
priority: medium
impact_score: 0.65
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-model-theory-arithmetic
evidence_links:
  - type: supporting
    note: "Tennenbaum (1959) theorem: no non-standard model of PA has computable addition and multiplication — standard model is the unique computable model"
    confidence: 0.90
  - type: supporting
    note: "Gödel (1931) incompleteness: PA consistent → non-standard models exist containing 'infinite' Gödel codes — first-order indistinguishable from standard model"
    confidence: 0.95
  - type: related
    note: "Kossak & Schmerl (2006) The Structure of Models of Peano Arithmetic: classification of non-standard models by cofinal extensions and cuts"
    confidence: 0.80
proposed_tests:
  - description: >
      Classify non-standard models by Scott sets: every non-standard model M of
      PA has a unique Scott set Sc(M) ⊆ 2^ω. Test: characterize which Scott sets
      arise — prove every arithmetically closed set is the Scott set of some
      non-standard model. This would complete the classification.
  - description: >
      Automorphism group analysis: compute the automorphism group of a specific
      class of non-standard models (ω₁-like models). Test: Aut(M) is always 2-transitive
      on a dense set — connects model theory of arithmetic to group theory.
related_disciplines:

proposed_tests:
  - description: Compute FDTD wave simulations for 5 concert halls with known subjective ratings; compare IACC/T₆₀ predictions vs. wave-simulation-derived metrics vs. actual listener ratings using held-out evaluation
  - description: Conduct blinded listening test with convolution auralizations from Sabine approximation vs. full wave simulation for the same hall; test whether listeners can distinguish and prefer the more accurate simulation

evidence_links:
  - doi: "10.1038/s41558-017-0050-y"
    type: supporting
    confidence: 0.63
    note: >
      Manoli et al. (2019) global analysis of 30 cities: humid cities with
      higher vegetation fraction have weaker UHI; arid cities with low
      evapotranspiration have stronger UHI; nonlinear regime change at
      high impervious surface fractions.
  - doi: "10.1073/pnas.1817802116"
    type: supporting
    confidence: 0.60
    note: >
      Rozenfeld et al. (2011) urban scaling laws: city temperature deviation
      scales with population density with exponent >1 in US cities; consistent
      with superlinear UHI hypothesis.
  - doi: "10.1175/2008BAMS2463.1"
    type: related
    confidence: 0.55
    note: >
      Arnfield (2003) UHI review: mechanisms include reduced sky view factor,
      thermal mass, anthropogenic heat, reduced vegetation — multiple
      mechanisms interact nonlinearly at high densities.
proposed_tests:
  - description: >
      Extract land surface temperature from Landsat-8/9 for 100 cities across
      climate zones. Regress peak UHI (maximum summer night temperature minus
      rural reference) against population density, impervious surface fraction,
      and vegetation fraction. Test: does the UHI-density relationship show
      a statistically significant superlinear exponent (>1.0) in regression
      on log-log scale? Identify the threshold density above which the
      exponent changes.

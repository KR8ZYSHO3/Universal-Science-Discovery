id: h-urban-heat-island-superlinear-density-scaling
title: >
  Urban heat island intensity scales superlinearly with urban population
  density above a threshold of ~3,000 persons/km², driven by nonlinear
  feedback between reduced surface albedo, increased anthropogenic heat
  flux, and boundary layer height reduction — implying that dense compact
  cities impose disproportionate heat stress per capita relative to sprawling
  urban areas.
status: active
priority: medium
impact_score: 0.66
created: "2026-05-06"
last_updated: "2026-05-06"

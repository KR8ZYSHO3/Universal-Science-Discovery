proposed_tests:
  - description: >
      Test competition vs. suppression models: simultaneous fMRI + TMS over V1; predict
      that disrupting early visual cortex selectively impairs DMN-dependent scene imagery
      but not verbal working memory tasks, and that external task DMN suppression is
      reduced when task uses non-visual (auditory) stimuli.

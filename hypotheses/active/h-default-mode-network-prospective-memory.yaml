id: h-default-mode-network-prospective-memory
title: >
  The default mode network functions as a prospective memory and mental simulation
  system that constructs scene imagery for planning future events and consolidating
  autobiographical memory, and is suppressed during externally-directed tasks because
  self-referential scene construction and perceptual processing compete for shared
  representational cortex in parietal and medial temporal regions.

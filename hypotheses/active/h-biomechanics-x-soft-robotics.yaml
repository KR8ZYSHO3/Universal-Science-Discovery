proposed_tests:
  - description: >
      Build two versions of a 5kg bipedal robot (ATRIAS-like design) — rigid legs (k → ∞)
      and compliant legs with k = 5·mg/L = 490 N/m leg spring; measure metabolic cost of
      transport (COT = Power/mass/speed) via motor current measurement at Froude numbers
      Fr = 0.25, 0.5, 0.75 on a level treadmill; compare COT ratio (rigid vs. compliant)
      and compare both to human COT (3.5 J/kg/m) at equivalent Froude number; test whether
      compliant COT is within 20% of human COT and rigid COT is 2.5× higher than compliant.

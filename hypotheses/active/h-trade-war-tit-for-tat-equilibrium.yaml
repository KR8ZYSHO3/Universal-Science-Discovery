id: h-trade-war-tit-for-tat-equilibrium
title: >
  Escalating trade wars converge to a cooperative equilibrium under iterated
  Prisoner's Dilemma dynamics when shadow-of-the-future discount factor δ > δ*
  (Axelrod threshold), but bifurcate to permanent protection equilibria when
  domestic political economy creates asymmetric defection incentives.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-trade-war-equilibrium
evidence_links:
  - type: supporting
    note: "Axelrod (1984) iterated PD: tit-for-tat achieves cooperation when δ > 1/(1 + T−R) where T=temptation, R=reward payoff"
    confidence: 0.80
  - type: related
    note: "Fajgelbaum et al. (2020) US-China trade war: US welfare fell 0.08% due to retaliation costs — consistent with mutual defection trap"
    confidence: 0.72
  - type: contradicting
    note: "Copeland (1996) dynamic trade models: large countries may prefer permanent tariffs if domestic industry rents exceed terms-of-trade cost"
    confidence: 0.60
proposed_tests:
  - description: >
      Calibrate iterated PD with empirical payoffs from US-China trade war:
      estimate T, R, P, S from trade volume and welfare cost data. Compute δ*
      threshold. Compare to actual discount factor implied by US political cycle
      (~ 4-year election horizon). Test: δ < δ* predicts no convergence to
      cooperation without external commitment device (WTO dispute settlement).
  - description: >
      Cross-country dyadic comparison: 50 trade dispute pairs 1980–2023.
      Measure escalation/resolution pattern. Regress resolution probability on
      bilateral trade share (proxy for δ), political polarization, election
      proximity. Test Axelrod threshold prediction.
related_disciplines:
  - international-economics
  - game-theory
  - political-economy

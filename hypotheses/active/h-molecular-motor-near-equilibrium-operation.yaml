id: h-molecular-motor-near-equilibrium-operation
title: >
  Biological molecular motors operating at near-stall force achieve efficiency
  approaching the isothermal Carnot limit (ΔG_chemical → W_mechanical) because
  the free energy landscape is designed for reversible power strokes, and
  deviation from near-equilibrium operation at high velocity is the primary
  source of efficiency loss in myosin and kinesin.

proposed_tests:
  - description: >
      Compute persistence diagrams for H1 (loops) across the protein contact networks
      of 20 well-characterized allosteric proteins (hemoglobin, PDK1, cAMP-dependent
      protein kinase, calmodulin) in active and inactive conformations; test whether
      persistent H1 generators with lifetime > 3 Angstroms predict known allosteric
      pathways identified by NMR chemical shift perturbations.
    method: "Gudhi library TDA computation on PDB structures; Ripser for persistence; compare H1 generators to NMR chemical shift perturbation data (BMRB)"
    prediction: "H1 generators overlapping with known allosteric paths show > 80% precision and > 70% recall vs. NMR benchmark; lifetime > 3 Angstroms threshold optimal"
  - description: >
      Test whether Wasserstein distance between persistence diagrams of active vs.
      inactive allosteric conformations (MD trajectory ensembles) outperforms RMSD
      as a reaction coordinate for allosteric transitions.
    method: "MD simulations of PDK1 kinase; compute persistence diagrams at 1000 frames; Wasserstein distance vs RMSD as order parameter; assess transition state identification"
    prediction: "Wasserstein distance identifies allosteric transition state earlier (by > 5 ns) than RMSD with >2x better Fisher discrimination ratio"

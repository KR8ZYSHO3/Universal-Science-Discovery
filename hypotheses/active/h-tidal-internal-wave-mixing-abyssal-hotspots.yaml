proposed_tests:
  - description: >
      Deploy microstructure profiler array at 5 sites spanning the energy spectrum of
      tidal-topographic interactions (smooth abyssal plain, mid-ocean ridge crest, steep
      continental slope, rough seamount field, smooth deep basin). Compare ε and κ
      across sites vs. tidal dissipation rate from satellite altimetry. Prediction:
      rough-topography sites have κ > 10⁻⁴ m²/s vs. < 10⁻⁵ m²/s for smooth sites.
  - description: >
      Run twin CESM climate model experiment (2000-2100) with and without tidal mixing
      parameterization (Jayne-St Laurent scheme). Compare projected Atlantic Meridional
      Overturning Circulation strength and North Atlantic heat content at 2100.
      Prediction: parameterized tidal mixing increases AMOC by >15% and reduces North
      Atlantic cooling by >0.3°C.

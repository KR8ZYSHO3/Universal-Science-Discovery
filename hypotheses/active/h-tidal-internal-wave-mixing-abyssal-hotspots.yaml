id: h-tidal-internal-wave-mixing-abyssal-hotspots
title: >
  Tidal-topographic internal wave generation at rough seafloor features (mid-ocean ridges,
  continental slopes) creates geographically constrained abyssal mixing hotspots that
  account for >50% of the total diapycnal mixing required to maintain thermohaline
  circulation — and their omission from climate models biases 21st-century ocean heat
  uptake projections by >15%.

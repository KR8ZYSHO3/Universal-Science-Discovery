id: h-cryo-em-supersedes-xray-membrane-proteins
title: >
  For membrane proteins with molecular weight >200 kDa, cryo-EM single-particle
  analysis now routinely achieves higher resolution than X-ray crystallography
  for native-like structural states — making crystallography obsolete for this
  protein class while remaining superior for small, rigid proteins where cryo-EM
  faces orientational sampling limitations.

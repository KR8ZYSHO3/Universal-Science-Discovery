proposed_tests:
  - description: >
      Systematic comparison: select 50 membrane proteins with known crystal
      structures determined at <2.5 Å. Determine the same proteins by cryo-EM
      single-particle analysis using current best-practice hardware (Titan Krios
      G4, Falcon4 detector, cryoSPARC). Compare resolution, map quality (CC with
      atomic model), and model accuracy (R_free equivalent) between methods.
    method: "Parallel X-ray and cryo-EM structure determination, FSC-based resolution estimation, model-to-map CC"
    prediction: "Cryo-EM achieves equal or better resolution than X-ray for >70% of membrane proteins >200 kDa"
  - description: >
      Identify membrane proteins for which cryo-EM consistently fails to achieve
      <3.5 Å resolution after ≥500,000 particle micrographs: test whether failure
      correlates with molecular weight <100 kDa, preferred orientation, or
      conformational flexibility — characterizing the cryo-EM resolution floor.
    method: "Retrospective analysis of EMDB entries with >100k particles; correlation analysis with MW, flexibility metrics"
    prediction: "Failure rate >50% for proteins <100 kDa; preferred orientation and flexibility predict failure independent of MW"

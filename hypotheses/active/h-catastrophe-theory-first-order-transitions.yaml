id: h-catastrophe-theory-first-order-transitions
title: >
  The cusp catastrophe control surface is topologically equivalent to the Landau
  free energy surface for all mean-field first-order transitions, predicting that
  hysteresis loops and spinodal boundaries are universal across physical, chemical,
  and biological systems sharing the same order-parameter symmetry class.

proposed_tests:
  - description: >
      Systematically map experimental phase diagrams of binary alloy, polymer blend,
      and liquid crystal systems to the cusp catastrophe control surface. Verify that
      the spinodal boundary corresponds exactly to the fold curve of the cusp, and
      that the critical point corresponds to the cusp point with the correct scaling
      exponents for the mean-field universality class.
  - description: >
      Test whether the butterfly catastrophe (codimension 4) correctly predicts the
      topology of the He-3/He-4 mixture phase diagram near the tricritical point,
      including the four coexistence lines and their angles of intersection.

id: h-semantic-compositionality-type-logical-grammar
title: >
  Natural language meaning is compositional for 90% of constructions but requires
  non-compositional (lexicalized) representations for idioms, light verbs, and
  constructional meanings; this partition is reflected in distinct neural processing
  streams that can be separated by contrasting compositional vs. non-compositional
  sentences matched for surface complexity.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-semantic-compositionality-limits
related_disciplines:
  - linguistics
  - cognitive-science
  - neuroscience
evidence_links:
  - type: supporting
    doi: 10.1111/j.1551-6709.2010.01116.x
    note: >
      Pylkkänen (2016) — MEG studies of compositional vs. non-compositional
      adjective-noun phrases; anterior temporal lobe (ATL) responds selectively
      to combinatorial meaning, not lexical access.
  - type: related
    doi: 10.1162/nol_a_00003
    note: >
      Ziegler & Pylkkänen (2021) — ATL contribution to compositional semantic
      processing; double dissociation with syntactic composition in posterior
      frontal cortex.
proposed_tests:
  - discipline: linguistics
    description: >
      Present 200 sentence pairs matched on word frequency and syntactic structure:
      (1) compositional: "small table" vs. (2) non-compositional: "kick the bucket"
      (idiom) to 40 participants in MEG. Measure ATL response (90-200 ms). Hypothesis:
      compositional pairs show ATL response > non-compositional pairs at 130-180 ms
      (p < 0.001 cluster-corrected), while Broca's area shows no significant difference,
      double-dissociating combinatorial semantics from syntactic composition.

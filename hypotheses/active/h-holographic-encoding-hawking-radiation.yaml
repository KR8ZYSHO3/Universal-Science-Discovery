      Mathur's fuzzball complementarity and AMPS firewall argument challenge whether
      a smooth infalling experience is compatible with information recovery — if
      the horizon is replaced by a firewall, the encoding mechanism assumed here is absent.
proposed_tests:
  - discipline: quantum-information
    description: >
      Implement the Hayden-Preskill decoding protocol in a quantum circuit simulator
      with N = 20-50 qubits to verify that encoded information is recoverable from
      the radiation subsystem after the Page time, and characterize the decoding
      complexity as a function of black hole entropy.
  - discipline: condensed-matter
    description: >
      Measure out-of-time-order correlators (OTOCs) in SYK (Sachdev-Ye-Kitaev)
      model implementations (superconducting qubits, trapped ions) to test whether
      the scrambling time and Page time relationships predicted by the island formula
      match the holographic prediction t_Page ~ S_BH / (2 pi T).
  - discipline: quantum-gravity
    description: >
      Compute the quantum channel capacity of the Jackiw-Teitelboim (JT) gravity
      model — the simplest holographic model with an exact island formula — using
      the replica method and compare with direct random matrix calculations of the
      same model.

id: h-holographic-encoding-hawking-radiation
title: >
  Quantum information in infalling matter is holographically encoded in the
  entanglement structure of early Hawking radiation before the Page time,
  and becomes decodable — in principle — by an observer holding the full
  radiation output after the Page time using quantum error correction on the
  entanglement wedge of the radiation system.

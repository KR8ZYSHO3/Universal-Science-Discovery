proposed_tests:
  - description: >
      Compare two controller syntheses on the same plant with and without an added RHP zero in the sensor
      path; quantify achievable H-infinity sensitivity bounds.
    method: hinfsyn / hinfstruct with identical weights.
    prediction: Non-minimum-phase embedding worsens best achievable mixed-sensitivity cost.


id: h-minimum-phase-plants-attain-tighter-bode-bounds
title: >
  For a fixed unstable plant pole set, minimum-phase designs achieve strictly better achievable sensitivity
  templates than any non-minimum-phase embedding with identical loop gain budget — standard theorem package
  but worth restating as a falsifiable design audit checklist for cyber-physical retrofits.

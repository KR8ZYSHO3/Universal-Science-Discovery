id: h-sea-level-fingerprint-attribution
title: >
  Sea-level fingerprints — the spatially variable pattern of relative sea-level
  change from each ice mass source — can uniquely attribute tide gauge and
  satellite altimetry observations to specific glacier and ice sheet contributions
  with > 80% attribution accuracy when using networks of > 50 geodetically
  connected tide gauges.
status: active
priority: high
impact_score: 0.75
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-sea-level-fingerprint
evidence_links:
  - type: supporting
    note: "Mitrovica et al. (2001) Science: sea-level fingerprint from WAIS collapse shows far-field amplification — physically distinct from Greenland fingerprint"
    confidence: 0.85
  - type: supporting
    note: "Hsu et al. (2021) GRACE mascon + GPS inversion: fingerprint attribution recovers 85% of Greenland mass loss vs. GRACE direct measurement"
    confidence: 0.78
  - type: related
    note: "Riva et al. (2010) GIA corrections crucial for fingerprint inversion — poorly constrained GIA degrades attribution to 60% accuracy"
    confidence: 0.72
proposed_tests:
  - description: >
      Synthetic inversion test: generate synthetic sea-level observations from
      known ice mass loss scenarios (GRACE mascons) plus realistic noise. Apply
      fingerprint inversion with N = 10, 50, 100, 200 tide gauges. Measure
      attribution error vs. N. Find minimum gauge network size for <20% error.
  - description: >
      Real data validation (2002–2023): invert tide gauge network observations
      for ice source contributions. Compare to independent GRACE-FO mass loss
      estimates. Compute attribution error and uncertainty propagation from GIA
      model ensemble (ICE-5G vs. ICE-6G vs. W12a).
related_disciplines:
  - glaciology
  - geodesy
  - physical-oceanography

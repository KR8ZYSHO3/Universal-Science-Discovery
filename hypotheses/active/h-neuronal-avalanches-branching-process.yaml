proposed_tests:
  - description: "Record from 8-shank Neuropixels probes across 5 cortical areas in head-fixed mice during wake/NREM/REM transitions; estimate branching parameter σ using binned spike trains; test whether σ is state-dependent using mixed-effects linear model."
  - description: "Apply optogenetic activation of parvalbumin interneurons during wakefulness to reduce E/I ratio; test whether this drives σ below 1 and predict resulting reduction in dynamic range (measured by tone-response input-output curve)."

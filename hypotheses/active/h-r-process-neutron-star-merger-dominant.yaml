id: h-r-process-neutron-star-merger-dominant
title: "Neutron star mergers account for more than 50% of the Milky Way's r-process europium budget, and galactic chemical evolution models incorporating a neutron-star-merger delay-time distribution with t_min < 100 Myr and a power-law slope of -1 will reproduce the observed [Eu/Fe] scatter at [Fe/H] < -2 within 0.3 dex"
status: active
priority: critical
impact_score: 0.85
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1103/RevModPhys.93.015002"
    type: supporting
    confidence: 0.75
    note: "Cowan et al. (2021) — GW170817 confirms NS merger r-process; but GCE scatter remains difficult to explain"
  - doi: "10.1146/annurev.astro.46.060407.145207"
    type: related
    confidence: 0.65
    note: "Arnould et al. (2007) — r-process uncertainties; need for short delay-time channel"
  - type: related
    note: "Siegel et al. (2019) — collapsar r-process alternative with short delay times"
unknowns_addressed:
  - u-stellar-nucleosynthesis-r-process-site
proposed_tests:
  - description: >
      Implement a one-zone galactic chemical evolution model with two r-process channels (NS merger with
      DTD and collapsar with prompt channel). Vary t_min and DTD slope. Compute predicted [Eu/Fe] vs. [Fe/H]
      for metal-poor halo stars. Compare chi-squared fit to SAGA metal-poor star abundance database.
    method: "One-zone GCE model with NS merger DTD; chi-squared fit to SAGA [Eu/Fe] data"
    prediction: "Best-fit model has > 50% NS merger Eu fraction and t_min < 100 Myr; reproduces [Eu/Fe] scatter within 0.3 dex at [Fe/H] < -2"
related_disciplines:
  - astrophysics

evidence_links:
  - type: supporting
    doi: 10.1038/nature08561
    note: >
      Moser et al. (2008) — grid cells in entorhinal cortex; multiple modules with
      different spacings encode large environments through a unique combination code.
  - type: supporting
    doi: 10.1016/j.neuron.2013.10.021
    note: >
      Constantinescu et al. (2016) — hexagonal grid-like code in prefrontal cortex
      during navigation of abstract 2D social hierarchy space; same geometry as spatial grids.
  - type: related
    doi: 10.1016/j.neuron.2018.07.009
    note: >
      Whittington et al. (2020) — Tolman-Eichenbaum machine formalises hippocampal
      generalization via abstract relational coding in a spatial-like coordinate frame.
proposed_tests:
  - discipline: neuroscience
    description: >
      Record grid cells across multiple entorhinal modules in rats navigating a 20×20 m
      open field. Measure grid spacing and orientation across modules. Test whether
      spacings follow a geometric ratio (predicted ~1.4-1.7), which would allow unique
      position coding across the full large-environment range without ambiguity.
  - discipline: cognitive-science
    description: >
      Design an fMRI paradigm in which participants learn a 6×6 matrix of abstract
      social relationships (dominance × affiliation). Use multivariate MVPA to test
      whether entorhinal cortex and CA1 represent positions in this matrix with a
      hexagonal symmetry consistent with a 2D grid code. Compare to matched nonspatial
      feature-coding alternative models.

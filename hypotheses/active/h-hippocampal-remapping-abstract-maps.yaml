id: h-hippocampal-remapping-abstract-maps
title: >
  The hippocampal-entorhinal code scales to large environments and abstract cognitive
  maps through a modular hierarchical grid cell system where different grid modules
  encode different spatial scales by a fixed ratio, and abstract relational knowledge
  is encoded in the same coordinate frame by remapping the grid modules onto non-spatial
  relationship dimensions.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-hippocampal-spatial-code
related_disciplines:

id: h-methane-clathrate-destabilization-threshold
title: >
  Seafloor methane clathrate destabilisation on continental margins requires
  bottom water warming >3°C above preindustrial levels before producing
  climatically significant atmospheric methane flux; current trajectories
  remain below this threshold until at least 2150 for the Arctic shelf.
status: active
priority: high
impact_score: 0.80
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - geology
  - chemistry
  - physical-oceanography
  - climate-science
unknowns_addressed:
  - u-methane-clathrate-destabilization
evidence_links:
  - doi: "10.1029/2011JC007069"
    type: supporting
    confidence: 0.63
    note: >
      Ruppel & Kessler (2017) review: seafloor methane from Arctic shelf
      primarily consumed by microbial oxidation before reaching atmosphere;
      net atmospheric contribution currently small (<10 Tg CH4/yr).
  - doi: "10.1038/ngeo854"
    type: related
    confidence: 0.55
    note: >
      Reagan & Moridis (2009) model East Siberian Arctic Shelf; full
      destabilisation requires sustained bottom water warming of 2-3°C
      over decades — slow enough to limit atmospheric pulse.
  - doi: "10.1126/science.1231798"
    type: supporting
    confidence: 0.58
    note: >
      Shakhova et al. (2013) report elevated CH4 over ESAS — but measurements
      remain disputed; atmospheric CH4 inventory does not yet show Arctic
      shelf clathrate signal above fossil fuel noise.
proposed_tests:
  - description: >
      Install bottom water temperature sensors at 50, 100, 200, and 400 m
      depth along the East Siberian Arctic Shelf and Beaufort margin. Run
      parallel sediment cores to quantify clathrate inventory. Combine with
      ocean GCM output to project when bottom water exceeds 3°C threshold
      at each depth. Cross-check against atmospheric CH4 isotope measurements
      from NOAA network for biogenic vs. thermogenic source attribution.

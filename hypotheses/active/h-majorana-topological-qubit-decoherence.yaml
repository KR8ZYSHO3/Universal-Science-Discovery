proposed_tests:
  - description: >
      Fabricate InAs/Al hybrid nanowire devices with controlled chemical potential (electrostatic gates) and
      measure: (1) topological gap from tunnel spectroscopy, (2) parity-switching coherence time from charge
      parity readout, (3) zero-bias peak stability as function of magnetic field, temperature, and disorder.
      Compare parity lifetime to gap prediction.
    method: "Low-temperature transport + high-frequency charge parity readout + thermal cycling to verify gap stability"
    prediction: "Parity coherence time should scale as exp(Δ_topo/k_BT) with measured topological gap; >100 μs for Δ > 100 μeV"


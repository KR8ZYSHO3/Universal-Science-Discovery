id: h-theory-laden-observation-background-knowledge
title: >
  Scientific observations are theory-laden at the level of background knowledge
  and instrument design but not at the level of perceptual phenomenology —
  implying that theory-ladenness poses a genuine but bounded epistemic threat:
  it enables theory-confirmation bias in instrument design and data selection
  while leaving a theory-neutral observational residue sufficient for
  inter-theoretical evidence comparison.

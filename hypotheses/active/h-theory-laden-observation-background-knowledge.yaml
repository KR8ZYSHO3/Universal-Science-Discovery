proposed_tests:
  - description: >
      Meta-analysis of anomaly detection in published astronomy papers: compare
      anomaly detection rates when data are analyzed by teams aware of theoretical
      predictions versus pre-registered blind analysis. Test whether confirmation
      bias effects are measurable (> 10% difference in anomaly detection) and
      whether they are reversible with blinding protocols.

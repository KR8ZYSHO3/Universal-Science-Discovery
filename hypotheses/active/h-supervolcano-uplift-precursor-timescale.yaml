id: h-supervolcano-uplift-precursor-timescale
title: >
  Supereruption onset at silicic calderas is preceded by decades-to-centuries
  of measurable precursors (unrest cycles, caldera uplift > 1m/yr, increased
  CO₂/SO₂ ratios) — the eruption onset is not geologically instantaneous
  but involves a time-predictable magma remobilization sequence detectable
  with current monitoring networks.
status: active
priority: high
impact_score: 0.77
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-supervolcano-eruption-forecasting
evidence_links:
  - type: supporting
    note: "Druitt et al. (2012) Nature: Santorini 2011–2012 unrest: 0.4m uplift + CO₂ spike — magma injection at 8 km depth — reactivation at low repose"
    confidence: 0.72
  - type: related
    note: "Campi Flegrei bradyseism: 3m cumulative uplift since 1950, episodic — no eruption — demonstrating multi-decadal unrest does not necessarily precede eruption"
    confidence: 0.70
  - type: related
    note: "Sparks et al. (2019) Science: melt extraction from crystal mush requires 10²–10³ yr — implies long precursor window for supereruptions"
    confidence: 0.75
proposed_tests:
  - description: >
      Crystal cargo timescale analysis: measure Fe-Mg diffusion profiles in olivine
      phenocrysts from 5 caldera-forming eruptions (Toba, Yellowstone, Long Valley,
      Campanian Ignimbrite, Oruanui). Compute melt extraction duration from diffusion
      timescale. Test: all supereruption olivines record > 100 yr remobilization time.
  - description: >
      InSAR + gas monitoring integration: compile uplift rates, CO₂/SO₂ ratios,
      and seismicity at 10 active calderas over 20 years. Train random forest
      classifier to predict "eruption likely within 5 years" vs. "unrest subsides."
      Test precision-recall on holdout calderas. Identify minimum monitoring
      network requirements for 6-month warning time.
related_disciplines:
  - volcanology
  - geophysics
  - hazard-science

proposed_tests:
  - description: >
      Track cost-per-unit-signal for a quantifiable honest signal before and after a technology that reduces
      signal production costs (e.g., before/after online degree programs reduce education cost, or before/after
      social media reduces conspicuous consumption signaling cost) and measure whether signal inflation occurs.
    method: "Difference-in-differences analysis of signal prevalence vs quality distribution before/after cost shock"
    prediction: "Signal inflation (pooling equilibrium) should occur when cost reduction is >50% and affects all quality types equally"


id: h-zeeman-multiplet-spacing-shows-quantum-chaos-statistics
title: >
  Increasing magnetic field strength in highly excited atoms monotonically drives unfolded nearest-neighbor
  spacing distributions toward stronger level repulsion consistent with GUE-like statistics in selected
  symmetry-breaking windows — requires empirical confirmation per species and energy range.

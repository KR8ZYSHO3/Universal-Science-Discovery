id: h-phonon-engineering-nanoscale-interfaces
title: >
  Phonon dispersion engineering via periodic nanoscale interfaces (phononic crystals
  with period L = 5-50 nm) can achieve near-zero thermal conductivity κ < 0.5 W/mK
  in crystalline silicon while maintaining electron mobility > 100 cm²/Vs, by creating
  a phonon bandgap in the 1-10 THz frequency range that dominates heat transport
  but is below the electron de Broglie wavelength.

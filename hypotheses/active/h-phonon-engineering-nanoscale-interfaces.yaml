    doi: 10.1038/nnanotechnology.2010.149
    note: >
      Yu et al. (2010) — phonon engineering in silicon nanowires; roughness-induced
      phonon scattering reduces κ by 100× vs bulk while maintaining electrical
      conductivity.
  - type: supporting
    doi: 10.1063/1.1524305
    note: >
      Cahill et al. (2003) — review of thermal transport in nanostructures;
      interface density is the key design parameter for phonon mean free path control.
proposed_tests:
  - discipline: materials-science
    description: >
      Fabricate Si/SiGe superlattice nanowires with periods L = 5, 10, 20, 50 nm
      by molecular beam epitaxy on SOI substrates. Measure thermal conductivity via
      time-domain thermoreflectance (TDTR) at 300K and electrical mobility via
      Hall measurement. Hypothesis: κ decreases monotonically with decreasing L,
      reaching κ < 0.5 W/mK at L = 5-10 nm where phonon period matches dominant
      heat-carrying phonon wavelength (λ_ph ≈ 8 nm at 300K in Si), while electron
      mobility remains > 100 cm²/Vs because electron de Broglie wavelength
      (λ_e ≈ 3 nm) is smaller than the superlattice period.

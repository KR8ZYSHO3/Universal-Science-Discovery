id: h-prime-editing-hdr-bypass-therapeutic-window
title: >
  PE6 prime editing (nCas9-RT + dominant-negative MLH1) achieves >20% correction
  efficiency for the HbS β-globin E6V mutation in post-mitotic erythroblasts via
  AAV6 delivery, establishing a therapeutic window for sickle cell disease that is
  competitive with exa-cel without requiring HSC ex vivo editing, enabling in vivo
  treatment.
status: active
priority: high
impact_score: 0.82
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-crispr-hdr-efficiency-post-mitotic-cells
evidence_links:
  - type: supporting
    note: "Chen et al. (2021) Nat Biotechnol — PE6 with dominant-negative MLH1 increases prime editing by 7.7-fold in HEK293T cells vs. PE2; MLH1 suppression removes major MMR-mediated correction of the 3′ flap"
    confidence: 0.78
  - type: supporting
    note: "Anzalone et al. (2022) Nat Biotechnol — PE5max achieves >50% correction in dividing iPSC; efficiency gap to post-mitotic is 5-10x; MLH1dn reduces but does not eliminate gap"
    confidence: 0.65
  - type: related
    note: "Exa-cel (CTX001) FDA approval Dec 2023 — ex vivo BCL11A enhancer disruption achieves >90% HbF reactivation but requires bone marrow ablation; in vivo threshold for clinical benefit is ~30% HbS correction"
    confidence: 0.85
  - type: contradicting
    note: "AAV6 transduction efficiency in human erythroblasts in vivo is low (~5-15%); even 100% prime editing efficiency per transduced cell may not achieve >20% bulk correction in the patient"
    confidence: 0.70
proposed_tests:
  - description: >
      Humanized SCD mouse model (Townes mouse) with AAV6-PE6-pegRNA(HbS→HbA)
      intravenous injection at 3 dose levels. Primary endpoint: % HbA2 correction in
      peripheral blood at 4 and 12 weeks post-injection. Secondary: off-target editing
      by GUIDE-seq in bone marrow at sacrifice. Success threshold: >20% correction in
      ≥3/5 mice at middle dose.
  - description: >
      Direct comparison of PE6 vs. ABE8e (A→G base editor correcting the T20A position
      adjacent to HbS) in post-mitotic day-7 erythroblasts differentiated from CD34+
      HSPCs. Both delivered as mRNA/pegRNA or mRNA/sgRNA lipid nanoparticle. Measure
      editing efficiency, cell viability, and globin chain ratio by HPLC.

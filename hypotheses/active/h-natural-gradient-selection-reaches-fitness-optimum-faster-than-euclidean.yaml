proposed_tests:
  - description: >
      Agent-based simulation of allele frequency dynamics under selection on
      NK fitness landscapes (N=20 loci, K=2-5). Compare: (A) natural selection
      (exact Shahshahani geometry); (B) "Euclidean evolution" (gradient descent
      with Euclidean rather than Fisher metric). Measure time to reach within
      10% of the global optimum fitness. Test: natural selection is faster by a
      factor ≈ κ(G)/1 where κ(G) is the condition number of the Fisher matrix.
    method: >
      Python simulation with Wright-Fisher model; compute exact Fisher information
      matrix at each generation; compare convergence curves across 10³ replicate
      landscapes.
    prediction: >
      Natural selection converges in ~2-5× fewer generations than Euclidean
      evolution on high-dimensional, epistatic landscapes. The speedup correlates
      with κ(G) — condition number of the Fisher matrix.
  - description: >
      Test in E. coli LTEE data (Lenski et al.): does the observed rate of
      fitness increase (generations 1-50,000) lie below the Fisher information
      upper bound computed from estimated population allele frequencies and
      selection coefficients? A rate consistently at the bound would support the
      information-geometric speed limit theory.
    method: >
      Re-analysis of published LTEE allele frequency time series; compute Fisher
      information matrix at each timepoint; compare dW̄/dt to F(θ; environment).
    prediction: >
      Observed adaptation rate ≤ Fisher information bound at all timepoints;
      the ratio (rate)/(bound) is approximately constant, suggesting evolution
      is operating near the information-geometric speed limit.

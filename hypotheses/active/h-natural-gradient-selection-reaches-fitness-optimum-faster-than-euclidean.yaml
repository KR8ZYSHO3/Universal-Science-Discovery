id: h-natural-gradient-selection-reaches-fitness-optimum-faster-than-euclidean
title: >
  Natural selection following the Shahshahani (Fisher information metric)
  geometry reaches a fitness optimum in systematically fewer generations than
  a hypothetical "Euclidean" evolution process with the same gradient magnitude,
  and the speedup factor is quantitatively predicted by the condition number
  of the Fisher information matrix at the starting allele frequency.

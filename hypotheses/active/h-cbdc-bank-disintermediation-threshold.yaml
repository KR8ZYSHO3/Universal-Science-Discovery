id: h-cbdc-bank-disintermediation-threshold
title: >
  Central bank digital currencies cause significant bank disintermediation only
  above a CBDC interest rate threshold of r_CBDC ≥ r_deposits - 0.5%; below
  this threshold, household preference for bank services (lending, payments)
  prevents structural bank run risk, and monetary policy transmission improves
  via direct transmission channel.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - economics
  - finance
  - monetary-theory
  - social-science
unknowns_addressed:
  - u-cbdc-monetary-policy-implications
evidence_links:
  - doi: "10.1093/rof/rfac069"
    type: supporting
    confidence: 0.58
    note: >
      Brunnermeier & Niepelt (2019) equivalence theorem: central bank can
      always provide liquidity backstop to prevent CBDC-induced bank run if
      it offers complementary lending; disintermediation risk is policy-
      endogenous.
  - doi: "10.1016/j.jimonfin.2021.102537"
    type: related
    confidence: 0.55
    note: >
      Andolfatto (2021) model: interest-bearing CBDC increases deposit rates
      and bank efficiency; disintermediation is bounded when banks retain
      comparative advantage in credit screening.
  - url: https://www.bis.org/publ/work862.pdf
    type: supporting
    confidence: 0.60
    note: >
      BIS working paper (2020) surveys 65 central bank CBDC analyses;
      interest-bearing CBDC with ceiling rate between 0 and deposit rate
      considered dominant design for stability.
proposed_tests:
  - description: >
      Use difference-in-differences on the phased rollout of e-CNY (digital
      yuan) across Chinese cities. Compare commercial bank deposit growth
      rates in pilot vs. control cities before/after rollout. Test whether
      bank deposit outflows scale with e-CNY adoption rate. Control for city
      characteristics and concurrent monetary policy. Expected finding:
      deposit substitution <5% of total deposit base if CBDC is non-
      interest-bearing.

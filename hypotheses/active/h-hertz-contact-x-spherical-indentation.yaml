id: h-hertz-contact-x-spherical-indentation
title: >
  Joint fits of AFM force curves to poroelastic relaxation kernels plus JKR adhesion extracts elastic moduli whose variance across indentation depths drops below single-model Hertz variance — falsifying universal Hertz-only pipelines on hydrated collagen gels without adhesion corrections.

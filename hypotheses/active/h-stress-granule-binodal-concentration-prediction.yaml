proposed_tests:
  - description: >
      Express fluorescent TDP-43 (WT and A315T) at variable levels in U2OS cells using doxycycline-
      inducible promoters. Under oxidative stress, measure dilute-phase TDP-43 concentration using
      single-molecule imaging (TIRF) and compare to condensate volume fraction. Fit Flory-Huggins
      binodal. Independently measure chi parameter shift from in-vitro turbidimetry LLPS assay.
    method: "Single-molecule TIRF + FH binodal fitting + in-vitro turbidimetry chi estimation"
    prediction: "In-cell dilute-phase concentration follows FH binodal; A315T shifts threshold by > 2-fold, consistent with chi parameter increase measured in vitro"

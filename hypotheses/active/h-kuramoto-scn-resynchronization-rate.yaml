proposed_tests:
  - description: >
      Generate mice with graded VIP-VPAC2 coupling strengths by conditional
      overexpression of VPAC2 in SCN neurons. Apply 6-hour phase advance jet-lag
      protocols. Measure per-neuron bioluminescence (PER2::LUC) to reconstruct
      synchrony order parameter R(t). Test whether resynchronization timescale τ
      correlates with 1/Im(λ₂) computed from anatomical VIP connectivity.
  - description: >
      Pharmacological perturbation: VIP receptor antagonists should increase τ
      proportional to the reduction in algebraic connectivity, providing a
      quantitative test of the Kuramoto prediction. Measure both coupling strength
      and resynchronization timescale in the same animals.

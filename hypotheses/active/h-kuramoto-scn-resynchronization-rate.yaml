id: h-kuramoto-scn-resynchronization-rate
title: >
  The re-entrainment timescale after transient circadian desynchronization
  scales as 1/Im(λ₂) — the reciprocal of the algebraic connectivity (Fiedler
  eigenvalue) of the SCN VIP-coupling network — and this relationship can be
  measured experimentally using acute jet-lag protocols in mice with
  controlled VIP receptor expression levels.

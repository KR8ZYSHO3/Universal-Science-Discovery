id: h-topological-defect-density-predicts-organoid-lumenogenesis
title: >
  The density and spatial arrangement of +1/2 topological defects in the nematic director
  field of epithelial organoids at the single-layer stage quantitatively predicts the
  number, size, and position of lumens that form during three-dimensional organoid
  morphogenesis, independently of biochemical signaling state

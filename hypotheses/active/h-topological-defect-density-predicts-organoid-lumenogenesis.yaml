proposed_tests:
  - description: >
      Image MDCK organoids or intestinal organoids at the cyst stage using live fluorescence
      confocal microscopy with membrane markers; compute 2D nematic director field and identify
      +1/2 defect positions; correlate defect location with lumen nucleation sites in subsequent
      3D morphogenesis time-lapse imaging.
  - description: >
      Optogenetically activate or suppress actomyosin contractility locally to manipulate
      the nematic director field and +1/2 defect positions, then measure whether lumen
      formation follows the engineered defect pattern, providing causal rather than
      correlative evidence for defect-driven morphogenesis.

id: h-sediment-transport-stochastic-threshold
title: >
  Sediment transport threshold is a stochastic quantity, not a deterministic
  Shields parameter — bedload transport rates follow a power-law distribution
  at sub-threshold mean shear stress due to turbulent bursting events, and
  this stochasticity controls long-term river incision rates more than
  mean flow magnitude.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-sediment-transport-nonlinearity
evidence_links:
  - type: supporting
    note: "Grass (1970) stochastic sediment entrainment: fluid force and grain resistance both distributed — overlap of tails determines transport rate"
    confidence: 0.78
  - type: supporting
    note: "Papanicolaou et al. (2002) LDV measurements: turbulent burst events produce instantaneous shear stress 3–5× mean — transport occurs far below mean threshold"
    confidence: 0.75
  - type: related
    note: "Lague et al. (2005) stochastic flood magnitude-frequency: river incision rate depends on discharge variability index, not mean discharge"
    confidence: 0.72
proposed_tests:
  - description: >
      Flume experiment: measure instantaneous near-bed turbulent velocity and
      simultaneous bedload transport rate at 10 Hz using ADV + impact-plate
      sediment detector. Compute joint probability distribution of u' and transport
      events. Test: transport events occur when u' > 2σ (tail threshold) not mean
      threshold — fit stochastic transport model.
  - description: >
      Field validation (mountain stream): deploy an automated bedload trap and
      acoustic Doppler at a gravel-bed mountain stream for 3 years. Measure
      annual bedload yield and flood recurrence. Test: inter-annual bedload
      yield variability > 3× — controlled by extreme events not mean flow.
related_disciplines:
  - fluvial-geomorphology
  - sedimentology
  - fluid-mechanics

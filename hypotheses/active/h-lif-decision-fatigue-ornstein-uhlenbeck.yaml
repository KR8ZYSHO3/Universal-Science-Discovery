proposed_tests:
  - discipline: neuroscience
    description: >
      Record from prefrontal cortex (area 46, DLPFC) in macaques performing 200+ trials
      of a two-option value-based choice task. Fit an OU drift-diffusion model to
      each 20-trial block. Test whether the drift parameter μ decreases and the noise
      σ increases across trial blocks, predicting the observed degradation in choice
      optimality and the predicted flattening of the ISI distribution.
  - discipline: computational-neuroscience
    description: >
      Simulate a leaky integrate-and-fire network with NMDA-mediated reverberant
      excitation representing the evidence accumulator. Impose a metabolic depletion
      term that reduces NMDA conductance per decision made. Test whether the effective
      OU parameters (drift, noise) shift toward the diffusive regime after 50-100
      simulated decisions, reproducing behavioural decision-fatigue curves.

id: h-lif-decision-fatigue-ornstein-uhlenbeck
title: >
  Decision fatigue arises from depletion of a prefrontal signal-to-noise ratio governed
  by an Ornstein-Uhlenbeck accumulation process: repeated decisions progressively shift
  the OU process toward a diffusive (low-drift) regime, and this shift is measurable as
  a flattening of the interspike interval distribution in prefrontal choice neurons.

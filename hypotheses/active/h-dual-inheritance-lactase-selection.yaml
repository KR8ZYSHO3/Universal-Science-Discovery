proposed_tests:
  - description: >
      Compile LP allele (rs4988235) frequencies from all published ancient DNA
      studies spanning 10,000–500 BP across Europe and the Near East (N > 1000
      individuals). Fit the dual inheritance selection model Δp = s·p(1-p) to
      estimate s. Test whether s is consistent with the caloric advantage of
      milk consumption estimated from paleodiet reconstruction.
  - description: >
      Test whether LP frequency increase is faster in populations with direct
      archaeozooological evidence of dairying (cattle bone residues with milk
      lipids) vs populations without dairying evidence — a within-analysis
      causal test of the gene-culture coevolution mechanism.

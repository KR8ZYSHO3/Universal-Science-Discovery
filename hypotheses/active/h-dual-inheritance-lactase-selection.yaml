id: h-dual-inheritance-lactase-selection
title: >
  The co-spread of dairying culture and the lactase persistence allele constitutes
  the best-documented case of gene-culture coevolution, and archaeogenomic
  analysis should show that the LP allele frequency increase follows the
  dual inheritance Price equation prediction: Δp ≈ s·p(1-p) with selection
  coefficient s derivable from caloric advantage of milk consumption in
  Bronze Age pastoralist populations.

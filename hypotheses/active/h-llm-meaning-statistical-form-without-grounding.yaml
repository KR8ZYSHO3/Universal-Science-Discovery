proposed_tests:
  - description: Systematic evaluation of LLMs on visual grounding tasks (object permanence, physical support) not solvable by linguistic statistics
  - description: Test counterfactual reasoning under causal interventions (do-calculus scenarios) against matched humans
  - description: Winogrande and HELLASWAG-style probes specifically designed to require sensorimotor knowledge unavailable in text corpora
bounty: "Identify a class of linguistic tasks where human accuracy exceeds 95% but best available LLMs score <70%, where the tasks require sensorimotor or causal grounding"

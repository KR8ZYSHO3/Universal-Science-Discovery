id: h-pancharatnam-loop-area-predicts-interferometric-phase-shifts
title: >
  In a wave-plate polarization interferometer, measured Pancharatnam-Berry phase shifts will scale with signed loop area on the Poincare sphere within 5 percent after loss calibration; falsified if residuals remain dominated by unmodeled dynamical phase.

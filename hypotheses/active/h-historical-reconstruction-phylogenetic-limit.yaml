evidence_links:
  - type: supporting
    doi: 10.1126/science.1219669
    note: >
      Chang et al. (2015) — Bayesian phylolinguistic analysis of Indo-European;
      calibrated divergence dates; stochastic replacement rates constrain reliable
      inference to ~6,000 BP for PIE, consistent with ~8,000 year general limit.
  - type: supporting
    doi: 10.1093/molbev/mst141
    note: >
      Pagel et al. (2013) — ultra-conserved words in Swadesh lists traceable to
      15,000 BP; but criticised for exploiting low-frequency retention outliers,
      not the distribution of reconstructable forms.
  - type: related
    doi: 10.1353/lan.2013.0046
    note: >
      Campbell & Poser (2008) — critical review of Nostratic and Amerind macro-families;
      signal-to-noise analysis suggests connections beyond 8,000 BP are statistically indistinguishable from chance.
proposed_tests:
  - discipline: linguistics
    description: >
      Simulate lexical replacement on a phylogeny of known languages (Romance, Bantu,
      Austronesian) using empirically measured Swadesh list replacement rates (0.14/millennium).
      Systematically degrade the simulated data to increasing temporal depths (1,000-20,000 BP).
      Apply the comparative method and Bayesian phylolinguistics to the degraded data.
      Test at what depth the reconstruction accuracy drops below chance level and whether
      this matches the theoretical SNR=1 prediction at ~8,000 BP.
  - discipline: computational-linguistics
    description: >
      Apply the same phylolinguistic approach to test macro-family proposals
      (Nostratic, Dene-Yeniseian, Amerind) on their own terms: use only cognate
      sets cited by proponents. Compute the probability that the observed cognate counts
      exceed chance given the number of phoneme categories and their base rates.
      Test whether all macro-family proposals beyond 10,000 BP have p > 0.05 under
      a conservative null model of chance similarity.

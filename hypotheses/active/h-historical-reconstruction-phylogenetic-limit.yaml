id: h-historical-reconstruction-phylogenetic-limit
title: >
  The reliable temporal limit of linguistic reconstruction is approximately 8,000-10,000
  years before present because random lexical replacement rates (Swadesh lists) produce
  a signal-to-noise ratio of 1 at approximately 8,000 years, and claims of language
  family membership beyond this horizon require non-stochastic structural signal
  (typological spandrels or shared irregular morphology) not available for proto-world
  proposals.

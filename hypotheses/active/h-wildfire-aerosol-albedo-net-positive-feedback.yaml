evidence_links:
  - doi: "10.1038/s41558-020-0718-1"
    type: supporting
    confidence: 0.65
    note: >
      Lasslop et al. (2020) model analysis: net wildfire-climate feedback
      is positive in boreal and dry tropical biomes; black carbon from high-
      intensity fires deposits on Arctic snow, reducing albedo and adding
      a non-local forcing not captured in fire-region budgets.
  - doi: "10.1126/sciadv.aay3052"
    type: supporting
    confidence: 0.62
    note: >
      Andela et al. (2019) GFED5 analysis: global burned area declining in
      savannas but increasing in boreal forests; boreal fires emit more
      carbon per unit area and produce more persistent black carbon.
  - doi: "10.5194/acp-20-8375-2020"
    type: related
    confidence: 0.58
    note: >
      Williamson et al. (2020) Australia 2019-20 megafires: estimated 0.5-1.0
      Pg CO2 equivalent; smoke aerosols produced substantial negative forcing
      regionally but positive net forcing globally after accounting for BC.
proposed_tests:
  - description: >
      Use MODIS MAIAC aerosol optical depth and black carbon retrievals from
      CALIOP lidar to track smoke plumes from 50 major fire events (>10,000
      km2 each) over 2002-2025. Compute energy balance from top-of-atmosphere
      CERES broadband fluxes before and after fire events within smoke-affected
      regions. Compare instantaneous aerosol forcing vs. CO2 forcing
      accumulation at 10-year integrated time horizon. Test: does BC forcing
      at 10 years exceed the negative organic aerosol cooling in all biome
      types?

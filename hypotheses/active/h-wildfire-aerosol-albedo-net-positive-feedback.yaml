id: h-wildfire-aerosol-albedo-net-positive-feedback
title: >
  The net radiative feedback of increasing wildfire frequency under climate
  change is positive (warming) on decadal timescales: the positive forcing
  from black carbon aerosols, CO2 and CH4 emissions, and surface albedo
  reduction from charring outweighs the negative forcing from biogenic
  secondary organic aerosol and increased surface reflectance post-fire.

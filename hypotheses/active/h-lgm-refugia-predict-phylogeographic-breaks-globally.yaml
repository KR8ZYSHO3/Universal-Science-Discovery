id: h-lgm-refugia-predict-phylogeographic-breaks-globally
title: >
  Last Glacial Maximum (LGM) climate refugia predicted by species distribution
  models correspond to phylogeographic breaks inferred from coalescent analyses
  across taxonomically diverse organisms — providing a quantitative test of the
  refugia hypothesis and a mechanistic link between climate history and biodiversity.
status: active
priority: medium
impact_score: 0.76
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - type: supporting
    confidence: 0.75
    note: "Hewitt (2000) meta-analysis of European post-glacial colonization: phylogeographic lineages consistently trace to Iberian, Italian, and Balkan refugia identified by pollen records and SDMs"
  - type: supporting
    confidence: 0.70
    note: "Carnaval & Moritz (2008) PNAS: SDM of Atlantic Forest Brazil predicts LGM refugia that match phylogeographic breaks in anuran amphibians — quantitative concordance"
  - type: supporting
    confidence: 0.65
    note: "Rissler & Apodaca (2007): statistical comparison of SDM-predicted refugia vs. phylogeographic breaks across 17 taxa in western North America shows concordance > random expectation"
  - type: contradicting
    confidence: 0.45
    note: "Some taxa show phylogeographic breaks not predicted by SDMs — suggesting dispersal barriers (rivers, mountains) are more important than climate in some systems; SDMs based on modern climate may mispredict LGM conditions"

unknowns_addressed:
  - u-human-expansion-routes-coalescent-ancient-dna

proposed_tests:
  - description: >
      Systematic meta-analysis across 100+ species with both published SDM/ENM models
      projected to LGM (PMIP3 climates) and published phylogeographic studies with
      coalescent-estimated divergence times. Test concordance between predicted
      refugia boundaries and phylogeographic break locations using spatial statistics
      (cross-K function). Test whether concordance is stronger for organisms with
      limited dispersal (salamanders, rodents) than high dispersal (birds).
    method: "Literature search; standardized ENM (MaxEnt) projection to PMIP3 LGM; coalescent break location extraction; spatial concordance test; meta-regression by dispersal ability"
    prediction: "SDM-predicted refugia explain phylogeographic break locations better than random in >70% of taxa; concordance is stronger for low-dispersal taxa (OR > 3) than high-dispersal taxa (OR < 2)"

related_disciplines:
  - ecology
  - biogeography
  - population-genetics
  - paleoclimatology

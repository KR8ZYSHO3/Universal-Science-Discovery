proposed_tests:
  - description: >
      Cross-correlation of NANOGrav, PPTA, EPTA, and IPTA pulsar timing datasets.
      Fit spectral models: inflationary (n_T≈-0.02), cosmic string (n_T=0), SMBH
      binary background (n_T=-2/3). Bayesian model comparison using Bayes factors.
    prediction: "Cosmic string model selected over alternatives if Bayes factor >10; predicted string tension Gμ/c²~10⁻¹¹."

id: h-cosmic-string-gwb-signature
title: >
  If cosmic string networks form at a GUT-scale phase transition, they produce a
  stochastic gravitational wave background with characteristic spectral index n_T=0
  (flat spectrum) distinguishable from inflationary gravitational waves (n_T<0),
  detectable by LISA and pulsar timing arrays at f~nHz.

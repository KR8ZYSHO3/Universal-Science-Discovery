id: h-replicator-dynamics-ess-institutional-design
title: >
  Social institutions that select for evolutionarily stable strategies (ESS) rather
  than Nash equilibria are more robust to perturbation, because only ESS are
  asymptotically stable under replicator dynamics — policies that create ESS by
  making prosocial behaviour the unique stable fixed point will sustain cooperation
  without continuous enforcement.

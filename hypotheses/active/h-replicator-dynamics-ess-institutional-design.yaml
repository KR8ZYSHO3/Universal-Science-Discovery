evidence_links:
  - doi: "10.1017/CBO9780511528446"
    type: supporting
    confidence: 0.81
    note: >
      Maynard Smith (1982) — ESS criterion: a strategy is stable if it resists invasion
      by mutants; only asymptotically stable equilibria under replicator dynamics;
      Nash equilibria that are not ESS are unstable to small perturbations
  - doi: "10.1017/CBO9780511880865"
    type: supporting
    confidence: 0.76
    note: >
      Sandholm (2011) — evolutionary stability in population games; perturbed best
      response dynamics converge to ESS; contractivity conditions for global stability;
      applied to traffic routing, public good provision
  - doi: "10.1126/science.1177328"
    type: related
    confidence: 0.72
    note: >
      Rand et al. (2009) Science — cooperative strategies are ESS when punishment
      is credible; adding institutional punishment (third-party enforcement) converts
      the Nash equilibrium from defection-dominant to cooperation-dominant, consistent
      with ESS engineering hypothesis
proposed_tests:
  - description: >
      Agent-based model of 1000-person commons dilemma under three institutional rules:
      (1) no punishment (defection Nash), (2) peer punishment (multiple Nash equilbria),
      (3) institutional punishment (cooperation ESS); measure variance of outcomes
      across 1000 runs per institution type; predict variance is 10× lower under ESS institution.

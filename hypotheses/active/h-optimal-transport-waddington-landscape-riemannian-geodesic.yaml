id: h-optimal-transport-waddington-landscape-riemannian-geodesic
title: >
  Waddington's epigenetic landscape is formally the Riemannian manifold of the
  2-Wasserstein space restricted to the gene expression simplex, and cell fate
  decision points correspond to geodesically conjugate points where multiple
  W₂ geodesics first intersect — regions of positive Wasserstein curvature
  detectable from static single-cell RNA-seq snapshots.
status: active
priority: medium
impact_score: 0.81
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:

proposed_tests:
  - summary: >
      Isotope tracing experiment: label CO2 with 13C and N2 with 15N; track incorporation into
      fungal biomass in co-culture vs monoculture on mineral substrate. The hypothesis predicts that
      fungal growth in co-culture depends on cyanobacterial fixed carbon, and that disrupting this
      flux (e.g. by switching to fixed-carbon medium) destabilizes the consortium within defined generations.
  - summary: >
      Stoichiometric perturbation: vary C:N ratio supplied to the consortium and test whether consortia
      remain stable outside a predicted coupling window. If stability is bounded by stoichiometry rather
      than absolute nutrient concentration, this supports the metabolic coupling hypothesis over a simple
      resource availability explanation.
  - summary: >
      Cross-domain link to astrobiology: Mars regolith simulants differ in Fe, Mg, Ca and sulfate content.
      Test whether stoichiometric coupling stability varies predictably with mineral composition in a way
      that can be mapped to known Martian surface geochemistry — essential for selecting landing site
      targets for any future bioprocessing mission.

proposed_tests:
  - description: Parameterize the Miura-ori family by two angles (α, γ ∈ [10°, 80°]) and sheet thickness; compute the achievable stiffness manifold using finite element simulation for 100×100 parameter grid; implement adjoint-based inverse design optimization; test recovery of 50 randomly sampled target stiffness tensors within the manifold; measure relative error between achieved and target stiffness; verify uniqueness of solutions by random initialization of optimization.

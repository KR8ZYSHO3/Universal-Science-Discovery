evidence_links:
  - doi: "10.1038/nn.3672"
    type: supporting
    confidence: 0.75
    note: >
      Halassa & Haydon (2010) Annu Rev Physiol — astrocytes release D-serine as a
      co-agonist at NMDA receptors; blocking D-serine impairs LTP and spatial memory;
      astrocyte calcium signals precede and predict D-serine release timing
  - doi: "10.1016/j.neuron.2019.10.010"
    type: supporting
    confidence: 0.72
    note: >
      Bhatt et al. — individual astrocytes tile distinct 100-300 μm territories without
      overlap; calcium signals are local, enabling domain-specific modulation rather
      than global broadcast, consistent with computational role
  - doi: "10.1038/s41586-021-03677-4"
    type: related
    confidence: 0.65
    note: >
      Bhatt debate: Bhagwandin & Bhatt show GFAP-Gq-DREADD astrocyte activation
      nonspecifically affects circuits; argues for modulatory rather than instructive role;
      the computational vs. modulatory distinction remains the core open question
proposed_tests:
  - description: >
      Simultaneous two-photon calcium imaging of astrocytes and adjacent neurons with
      single-synapse resolution during a learning task; test whether astrocyte calcium
      transient timing and spatial pattern is information-theoretically predictive of
      synaptic weight changes (potentiation/depression) within the same territory.

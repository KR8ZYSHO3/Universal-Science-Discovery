id: h-glial-tripartite-synapse-gain-modulation
title: >
  Astrocytes perform genuine modulatory computation at tripartite synapses by
  integrating calcium signals from multiple synapses and releasing gliotransmitters
  (glutamate, D-serine, ATP) to modulate the gain of synaptic transmission in a
  spatiotemporal pattern determined by the astrocyte's calcium wave dynamics —
  this constitutes genuine information processing beyond passive background modulation.

evidence_links:
  - type: supporting
    doi: 10.1126/science.1220547
    note: >
      Sunday et al. (2012) — thermal safety margins from >2000 species; tropical species
      operate nearest to thermal limits; dispersal-climate velocity gap predicts extinction.
  - type: supporting
    doi: 10.1038/nature08649
    note: >
      Loarie et al. (2009) — climate velocity measured globally; biomes differ by
      order of magnitude; mountains and poles move fastest relative to species range.
  - type: related
    doi: 10.1073/pnas.1116765109
    note: >
      Chen et al. (2011) — meta-analysis of observed range shifts; mean poleward shift
      16 km/decade; 34% of species tracking slower than climate velocity.
proposed_tests:
  - discipline: ecology
    description: >
      Compile a database of 500 species with: (a) measured thermal performance curves
      (CTmax, CTmin), (b) measured or modelled dispersal rates, (c) observed vs.
      predicted range shifts 2000-2020. Test whether species with thermal safety margin
      <2°C AND dispersal:climate-velocity ratio <1 show larger range tracking deficits
      than species above either threshold, as the dual-threshold hypothesis predicts.
  - discipline: climate-science
    description: >
      Downscale CMIP6 RCP8.5 projections to 1 km resolution and compute species-specific
      climate velocity for 200 threatened species (IUCN Red List). Combine with
      dispersal ability estimates from life-history traits. Predict which species will
      fall into the tracking-deficit zone by 2050 and cross-validate predictions against
      any observed range data available for 2000-2024.

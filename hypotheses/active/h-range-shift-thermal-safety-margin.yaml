id: h-range-shift-thermal-safety-margin
title: >
  Species' ability to track climate change through range shifts is primarily determined
  by the ratio of required range shift velocity to maximum dispersal velocity, modulated
  by the species' thermal safety margin; species with thermal safety margins below 2°C
  and dispersal velocities below the climate velocity (currently ~2.7 km/decade globally)
  face extinction even when habitat is available.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-range-shift-pace-climate-change
related_disciplines:

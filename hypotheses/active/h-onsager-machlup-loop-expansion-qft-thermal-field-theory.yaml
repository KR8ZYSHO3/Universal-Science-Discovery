id: h-onsager-machlup-loop-expansion-qft-thermal-field-theory
title: >
  The loop expansion of stochastic path integrals around Onsager-Machlup saddle points
  is term-by-term identical to the loop expansion of the corresponding thermal quantum
  field theory (with ℏ → kT), providing a computationally tractable alternative to
  Feynman diagram perturbation theory for strongly-coupled systems where the saddle-
  point approximation breaks down.

evidence_links:
  - type: supporting
    note: "Zinn-Justin (1989) textbook establishes formal identity between Onsager-Machlup path integral perturbation theory and Euclidean quantum field theory loop expansion at ℏ=kT; term-by-term equivalence holds to all orders for polynomial potentials"
    confidence: 0.80
  - type: supporting
    note: "Martin-Siggia-Rose (MSR) formalism provides the generating functional for stochastic dynamics that is formally identical to a quantum field theory action — verified in critical dynamics (Model A,B,C) near phase transitions"
    confidence: 0.75
  - type: related
    note: "De Dominicis & Peliti (1978) established the response field functional equivalent to MSR; these are used in polymer physics and turbulence with direct QFT diagram technology"
    confidence: 0.70
proposed_tests:
  - description: >
      Compute the 2-loop correction to the diffusion coefficient in the Ornstein-
      Uhlenbeck process using both (a) the Onsager-Machlup loop expansion and (b)
      direct numerical simulation of the SDE. The 2-loop correction predicts a
      specific O(kT/γ) renormalization of D; if the OM calculation matches simulation
      to within 1%, this validates the loop expansion as a systematic approximation
      method for SDEs beyond perturbation theory.
  - description: >
      Apply MSR loop expansion to the Navier-Stokes equation with stochastic forcing
      (model of turbulence) to compute the Kolmogorov energy spectrum correction at
      2-loop order. Compare to DNS (direct numerical simulation) of turbulence at
      Re=1000. If the loop expansion improves over mean-field (1-loop), it validates
      stochastic QFT methods for classical turbulence — a foundational test.

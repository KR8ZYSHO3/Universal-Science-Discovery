proposed_tests:
  - description: Apply counterfactual fairness to the COMPAS recidivism dataset under three different plausible causal models (race as mediator vs. confounder vs. proxy); measure sensitivity of fairness judgments to causal model choice
  - description: Design a synthetic dataset with known ground truth causal structure; test whether counterfactual fairness under the true model produces more equitable outcomes than demographic parity on a subsequent generation of decisions affected by the classifier

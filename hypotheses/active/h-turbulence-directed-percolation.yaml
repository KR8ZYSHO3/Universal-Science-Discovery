id: h-turbulence-directed-percolation
title: "The laminar-to-turbulent transition in pipe flow belongs to the directed percolation (DP) universality class with critical exponents beta_DP=0.276, nu_perp=1.097 measurable via spatial correlation of turbulent puffs"
status: active
created: "2026-05-05"
priority: high
impact_score: 0.85

evidence_links:
  - type: supporting
    doi: "10.1038/nature14538"
    note: "Lemoult et al. (2016) Nature Physics - directed percolation signatures in Couette flow transition"
  - type: supporting
    note: "Spreading exponents of turbulent puffs near Re_c are consistent with DP values within measurement uncertainty"
  - type: contradicting
    note: "Pipe flow geometry (1D + time) differs from 2D DP; finite-size effects are strong and may obscure asymptotic exponents"

proposed_tests:
  - description: "Measure turbulent puff splitting and decay rates in long pipe flow experiments (Re = 2100-2500) spanning 10^4 pipe diameters; compute spreading exponents theta and delta; compare to 1+1D DP: theta_DP = 0.159, delta_DP = 0.276"
  - description: "Measure spatial correlation length xi of turbulent domains as Re→Re_c from below; test for xi ~ (Re_c - Re)^{-nu_perp} with nu_perp = 1.097 (1+1D DP)"
  - description: "Vary pipe cross-section shape (circular, square, elliptical); test whether Re_c and DP exponents are geometry-independent (universal) or geometry-specific"

unknowns_addressed:
  - u-turbulence-onset-subcritical-transition

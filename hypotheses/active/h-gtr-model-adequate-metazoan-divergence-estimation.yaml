proposed_tests:
  - description: >
      Reanalyse the Philippe et al. (2009) Metazoan phylogenomic dataset (128 genes,
      35 taxa) under: (1) GTR+Gamma+I in RAxML/BEAST; (2) CAT+GTR in PhyloBayes;
      (3) NHBS (non-homogeneous Bayesian substitution) model.
      Compare: topology (sister group relationships for Coelomata, Ecdysozoa),
      branch lengths, and molecular clock divergence dates with fossil calibrations.
    method: Maximum likelihood + Bayesian MCMC; posterior predictive checks; Bayes factor comparison
    prediction: >
      GTR+G underestimates Cambrian node age by 10-30% relative to CAT+GTR;
      nematode (Caenorhabditis) placement changes with model — branching artefact
      in GTR but not CAT — providing a falsifiable LBA-correction test.
  - description: >
      Simulation study: generate sequences under CAT model on known deep tree;
      reconstruct under GTR+G and CAT+GTR; measure divergence date bias as function
      of rate heterogeneity variance sigma²_r and compositional heterogeneity delta_GC.
    method: Seq-Gen simulation + BEAST analysis; 100 replicates per parameter combination
    prediction: GTR+G bias > 15% when sigma²_r > 2.0 or delta_GC > 5%; CAT+GTR bias < 5%

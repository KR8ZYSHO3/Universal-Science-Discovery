id: h-gtr-model-adequate-metazoan-divergence-estimation
title: >
  GTR+Gamma+I substitution models are inadequate for estimating deep Metazoan
  divergence times because they cannot account for compositional heterogeneity
  and long-branch saturation, causing systematic 10-30% underestimation of
  Cambrian and pre-Cambrian divergence dates compared to CAT+GTR
  non-homogeneous models.

proposed_tests:
  - summary: >
      Measure domain coarsening in US Census racial segregation data (1970-2020) by
      computing the mean domain size R(t) for racially homogeneous neighborhoods.
      Test whether R(t) ~ t^(1/3) (Cahn-Hilliard exponent for conserved order parameter)
      fits better than R(t) ~ t^(1/2) (non-conserved Allen-Cahn) using least-squares regression.

id: h-r-process-cgm-metal-enrichment
title: >
  The r-process element abundance pattern in the circumgalactic medium records the
  neutron star merger rate history of the host galaxy, and CGM r-process enrichment
  should be spatially offset from the stellar disk by the kick velocities of neutron
  star binaries, providing a direct observational test of the dominant r-process site.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-cgm-enrichment
related_disciplines:
  - astrophysics
  - nuclear-physics
  - observational-astronomy
evidence_links:
  - type: supporting
    doi: 10.3847/2041-8213/aa920c
    note: >
      Abbott et al. (2017) — GW170817 kilonova spectroscopy confirms neutron star
      mergers are r-process sites; ejecta mass and composition quantified.
  - type: supporting
    doi: 10.1093/mnras/stab1866
    note: >
      Côté et al. (2019) — chemical evolution models with NS merger yields predict
      [Eu/Fe] vs [Fe/H] trends; CGM enrichment depends critically on merger rate
      and NS kick velocities.
  - type: related
    doi: 10.1093/mnras/stz2341
    note: >
      Beniamini & Piran (2019) — NS binary merger delay times and kicks predict
      r-process elements should be found 5-15 kpc from the galactic disk at solar metallicity.
proposed_tests:
  - discipline: observational-astronomy
    description: >
      Use HST/COS and JWST NIRSpec quasar absorption-line spectroscopy of CGM
      gas in 20-30 MW-mass galaxies at z=0.2-0.5. Measure Eu II and Ba II absorption
      at projected separations 20-150 kpc. Test whether [Eu/Ba] and spatial distribution
      offset from the disk matches NS merger kick predictions (median kick ~250 km/s,
      delay time ~1 Gyr), rather than core-collapse supernova r-process which would
      track the disk.
  - discipline: nuclear-physics
    description: >
      Update yield tables for NS merger ejecta using newly measured neutron-capture
      cross-sections at FRIB. Run chemical evolution models with varied merger rate,
      kick velocity, and delay time distributions. Identify which combination reproduces
      the observed CGM [Eu/Fe] at different impact parameters. This directly constrains
      the dominant r-process enrichment channel.

proposed_tests:
  - description: Use CRISPR titration to generate HEK293 cell lines with IP3R1 expression at 50%, 75%, 100%, 125%, and 150% of wildtype (verified by Western blot); stimulate with fixed IP3 concentration (10 μM histamine); image calcium with GCaMP8 at 10 Hz; measure calcium wave propagation probability (fraction of cells showing global Ca²⁺ elevation) over 100 stimulation trials per cell line; plot propagation probability vs. IP3R expression; test for inverted-U relationship with maximum at wildtype (SR prediction) vs. monotonic relationship (non-SR prediction).

proposed_tests:
  - description: >
      In a controlled multi-agent reinforcement learning environment (prisoners'
      dilemma variants), compare agents trained with VCG-style incentive-compatible
      reward signals (agent is residual claimant of its reported value) against
      agents trained with standard proxy rewards. Measure deception rate (divergence
      between reported and actual capability) and cooperation rate across 1000 episodes.
  - description: >
      Train language models on tasks where the model must report its own uncertainty
      (confidence calibration). Compare incentive-compatible training (proper scoring
      rules — Brier score, log-loss — where honest calibration is utility-maximizing)
      versus cross-entropy-only training. Test whether proper scoring rules improve
      calibration without a separate calibration fine-tuning step.

id: h-antifreeze-protein-synthetic-polymer-design
title: "Polyvinyl alcohol (PVA) and antifreeze glycoprotein-mimicking block copolymers can replicate type I AFP ice-plane selectivity if their hydroxyl group spacing matches the ice Ih prism plane lattice at 4.52 Å, and such polymers will provide equivalent thermal hysteresis to natural AFPs at 1/10th the molecular weight"
status: active
priority: high
impact_score: 0.72
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1073/pnas.96.8.4282"
    type: supporting
    confidence: 0.65
    note: "Haymet et al. (1999) - winter flounder AFP ice lattice matching; Kelvin mechanism"
  - type: supporting
    note: "Deller et al. (2014) - PVA and synthetic antifreeze polymer activity"
  - type: related
    note: "Vorontsova et al. (2018) - colligative vs non-colligative antifreeze mechanisms in polymers"

unknowns_addressed:
  - u-antifreeze-protein-ice-binding

proposed_tests:
  - description: >
      Synthesize a library of PVA copolymers with varying hydroxyl spacing (3.5, 4.0, 4.5, 5.0 Å) by
      controlled ring-opening polymerization and measure thermal hysteresis by nanoliter osmometer.
      Test whether maximum thermal hysteresis occurs at 4.52 Å spacing matching ice prism plane periodicity.
    method: "RAFT polymerization + NMR characterization of hydroxyl spacing + nanoliter osmometer thermal hysteresis"
    prediction: "Thermal hysteresis peak should occur at hydroxyl spacing 4.5 ± 0.2 Å with activity > 0.5°C at 1 mg/mL"


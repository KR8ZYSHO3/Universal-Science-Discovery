id: h-count-novelty-scales-bayesian-information-gain-proxy
title: >
  Count-based novelty bonuses correlate with empirical Bayesian information-gain proxies computed from participant behavior in bandit tasks more tightly than with raw reward PE alone — falsified if partial correlations controlling reward magnitude fall below τ≈0.15 across pooled labs (**exploratory neural comparison**).
status: active
priority: medium
impact_score: 0.27
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - arxiv: "1705.05363"
    type: related
    confidence: 0.41
    note: Algorithmic intrinsic-motivation baseline comparable to laboratory novelty schedules.
unknowns_addressed:
  - u-rl-novelty-bonus-information-gain-mapping
proposed_tests:
  - description: >
      Fit hierarchical RL-inspired models (reward PE vs novelty-augmented PE vs information-gain proxies) to trial-by-trial choices with neural recordings where available.
    method: Model comparison with WAIC/PSIS-LOO across multi-site datasets under preregistered exclusion rules.
    prediction: Novelty-augmented models win information-theoretic comparisons primarily when task entropy shifts abruptly mid-session.
related_disciplines:

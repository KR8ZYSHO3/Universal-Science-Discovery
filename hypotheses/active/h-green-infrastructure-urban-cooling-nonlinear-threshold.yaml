id: h-green-infrastructure-urban-cooling-nonlinear-threshold
title: >
  Urban tree canopy cover exhibits a nonlinear threshold effect on heat island
  intensity: cooling effect is negligible below ~15% canopy cover, then increases
  rapidly between 15-30% (cooperative evapotranspiration), then plateaus above
  40%, consistent with a percolation-like transition in connected canopy
  enabling coherent evapotranspiration across the urban landscape.

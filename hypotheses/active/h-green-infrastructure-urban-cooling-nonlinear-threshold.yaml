proposed_tests:
  - description: >
      Cross-sectional analysis of 50 US cities using: LiDAR-derived tree canopy
      cover (% per census block); Landsat LST (land surface temperature) from
      USGS; NOAA weather station air temperature for UHI calculation.
      Fit: piecewise linear regression (structural change test at threshold canopy %),
      Gaussian process regression, and theoretical percolation model.
      Test: is threshold canopy cover E* statistically significant and consistent
      with percolation prediction (E*_perc ~ 0.59 for 2D lattice percolation
      but modified by canopy geometry)?
    method: >
      LiDAR + Landsat LST + weather station data; Bayesian structural change point
      test for threshold in canopy vs. temperature relationship
    prediction: >
      Threshold E* = 20±5% canopy cover; UHI reduction accelerates 3-fold between
      15-30% canopy; plateau above 35-40%; R² improves by >0.15 using piecewise
      vs. linear model
  - description: >
      Longitudinal analysis: identify 10 US cities that increased canopy cover
      from <15% to >25% between 2000-2020 using NLCD time series. Compare UHI
      trend against matched control cities with stable canopy. Test: UHI improvement
      disproportionate (nonlinear) in cities crossing threshold.
    method: Difference-in-differences with matched controls; remote sensing time series
    prediction: Cities crossing 15% threshold show 1.2-1.8°C greater UHI reduction than linear prediction

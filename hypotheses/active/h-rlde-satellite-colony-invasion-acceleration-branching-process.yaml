id: h-rlde-satellite-colony-invasion-acceleration-branching-process
title: >
  Stratified dispersal (rare long-distance events creating satellite colonies)
  produces invasion dynamics indistinguishable from fat-tailed kernel integrodifference
  models at landscape scales, and branching process theory predicts the effective
  spreading speed as a function of RLDE rate and establishment probability.
status: active
priority: high
impact_score: 0.74
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-invasion-fat-tailed-dispersal-empirical-detection
evidence_links:
  - type: supporting
    note: "Shigesada et al. (1995) Theor Popul Biol 48:172 — stratified dispersal model: two-component dispersal (local Gaussian + rare RLDE Gaussian) predicts accelerating invasion front similar to fat-tailed kernel models at landscape scales"
    confidence: 0.77
  - type: supporting
    note: "Kot et al. (1996) Ecology 77:2027 — IDE with Cauchy kernel (fat-tailed) produces accelerating invasion; effective speed at any time t is well approximated by assuming satellite colonies dominate front advance"
    confidence: 0.73
  - type: contradicting
    note: "Lockwood et al. (2005) — empirical spread data for many North American invasions (deer, European starlings, zebra mussels) fit constant-speed models adequately when detection bias is corrected; true acceleration is rare"
    confidence: 0.55
  - type: supporting
    note: "Clark et al. (2001) Am Nat 157:537 — 'fat-tailed' dispersal hypothesis supported for tree invasion of post-glacial North America but requires careful separation from climate velocity effects"
    confidence: 0.68
proposed_tests:
  - description: >
      Genetic analysis of wave front composition for emerald ash borer (Agrilus
      planipennis) across Michigan and Ohio — SNP genotyping of beetles at the invasion
      front vs. established core population. If fat-tailed dispersal (satellite
      colonies from long-distance human transport) drives front advance, genetic
      diversity at the front should be HIGH (multiple independent founding events).
      If thin-tailed dispersal (local spread from front), diversity should be LOW
      (strong founder effect). Prediction: front populations show ≥ 3× higher
      genetic diversity than expected from local dispersal models.
  - description: >
      Mathematical comparison of stratified dispersal model predictions vs.
      fat-tailed IDE model predictions for zebra mussel spread in the Great Lakes
      canal network — using historically recorded spread data (1988-2010) and
      canal network topology as the landscape structure. Fit both models to 1988-2000
      data; compare predictions for 2000-2010. Prediction: stratified dispersal
      model (with RLDE via boat transport corridors) will outperform fat-tailed IDE
      model because the RLDE mechanism (boat traffic) is spatially structured, not
      random.

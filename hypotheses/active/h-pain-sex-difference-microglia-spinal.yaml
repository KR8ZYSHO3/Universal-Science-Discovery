id: h-pain-sex-difference-microglia-spinal
title: >
  Sex differences in pain sensitivity arise from sexually dimorphic spinal cord
  microglia: in males, spinal microglia amplify pain via P38-MAPK signaling
  (required for central sensitization), while females use a T-cell-mediated
  alternative pathway; this predicts that microglial inhibitors should be
  analgesic in males but not females.

proposed_tests:
  - description: >
      Measure internode spacing of first three lateral buds in wild-type vs. pin1, pin2, and aux1
      Arabidopsis mutants. Fit a Turing wavelength formula lambda ~ sqrt(D_auxin / k_PIN) to wild-type data.
      Test whether mutant-specific changes in PIN turnover (measured by FRAP) predict observed lambda
      shifts in a parameter-free manner.
    method: "Quantitative plant phenotyping (ImageJ internode measurement) + FRAP of PIN-GFP dynamics + Turing wavelength fitting"
    prediction: "Internode spacing across mutants falls within 20% of Turing wavelength prediction using measured PIN parameters without free fitting"

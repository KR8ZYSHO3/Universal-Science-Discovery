id: h-pontryagin-adaptive-therapy-outperforms-mtd-solid-tumors
title: >
  Pontryagin optimal control-derived adaptive therapy schedules that maintain drug-sensitive
  clones as evolutionary competitors will double progression-free survival compared to
  maximum tolerated dose chemotherapy in non-small cell lung cancer with mixed sensitive/
  resistant clonal populations.
status: active
priority: high
impact_score: 0.82
created: "2026-05-06"
last_updated: "2026-05-06"

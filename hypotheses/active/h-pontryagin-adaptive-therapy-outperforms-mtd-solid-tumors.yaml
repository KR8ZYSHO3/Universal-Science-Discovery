proposed_tests:
  - description: >
      Phase II randomized trial (n=120 NSCLC with measurable ctDNA for clone tracking):
      adaptive arm uses ctDNA-guided dosing (reduce dose when sensitive clone frequency
      > 60%; increase when < 40%) vs. standard carboplatin/pemetrexed MTD. Primary
      endpoint: time to progression. Secondary: OS, clone frequency trajectory,
      resistance emergence. Powered to detect HR = 0.55 (doubling of median PFS).
  - description: >
      Patient-derived organoid (PDO) co-culture of EGFR-sensitive and T790M-resistant
      NSCLC cells at varying ratios. Test adaptive erlotinib dosing (maintaining 30-50%
      sensitive cells) vs. MTD dosing. Measure time to resistant clone dominance
      (>90% of total). Prediction: adaptive dosing delays resistance by ≥3× relative
      to MTD in organoids with starting resistant fraction < 20%.

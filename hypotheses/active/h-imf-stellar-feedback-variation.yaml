evidence_links:
  - type: supporting
    doi: 10.1126/science.1136370
    note: >
      van Dokkum & Conroy (2010) — evidence for bottom-heavy IMF (more low-mass stars)
      in massive ellipticals from sodium and iron absorption features; implies
      IMF is not universal.
  - type: related
    doi: 10.1051/0004-6361/201525830
    note: >
      Kroupa et al. (2013) — variable IMF review; Jeans mass hypothesis: IMF
      peak mass scales with Jeans mass T^{3/2}/ρ^{1/2}; testable in diverse environments.
proposed_tests:
  - discipline: astrophysics
    description: >
      Analyze resolved stellar populations in 20 Local Group dwarf galaxies with
      JWST NIRCam photometry (HST GO-17220 or equivalent). Construct stellar
      luminosity functions corrected for incompleteness. Fit power-law IMF slope
      above 1 M_sun for each galaxy. Cross-correlate measured slope with gas-phase
      metallicity and molecular cloud pressure (from CO observations). Hypothesis:
      IMF slope steepens with decreasing metallicity at rate dα/d[Fe/H] > 0.3
      per dex (p < 0.05), consistent with Jeans mass scaling.

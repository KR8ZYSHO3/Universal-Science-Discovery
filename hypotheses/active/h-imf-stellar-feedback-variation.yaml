id: h-imf-stellar-feedback-variation
title: >
  The stellar initial mass function varies systematically with the Jeans mass in
  star-forming molecular clouds — specifically, the high-mass IMF slope (Salpeter
  index α) steepens in low-metallicity, high-pressure environments, and this variation
  is detectable in resolved stellar populations of dwarf galaxies with JWST.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-stellar-initial-mass-function
related_disciplines:

id: h-tidal-mixing-overturning-circulation-control
title: >
  The strength of the Atlantic Meridional Overturning Circulation (AMOC) is
  controlled as much by spatially heterogeneous tidal mixing in key ocean ridge
  regions as by surface buoyancy forcing, predicting that AMOC weakening under
  climate change is partially offset by constant tidal energy input maintaining
  abyssal mixing.
status: active
priority: high
impact_score: 0.84
created: "2026-05-07"

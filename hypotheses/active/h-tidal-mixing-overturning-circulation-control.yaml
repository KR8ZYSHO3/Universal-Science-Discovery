evidence_links:
  - doi: "10.1016/S0967-0637(98)00070-8"
    type: supporting
    confidence: 0.75
    note: >
      Munk & Wunsch (1998) show that maintaining observed abyssal stratification
      requires approximately 2 TW of mechanical energy, comparable to total tidal
      dissipation budget; tidal mixing is thus a primary control on overturning.
  - doi: "10.1126/science.288.5473.1943"
    type: supporting
    confidence: 0.72
    note: >
      Egbert & Ray (2000) satellite altimetry shows ~1 TW deep-ocean tidal dissipation;
      regions of high dissipation correlate with known mixing hotspots at ridges.
proposed_tests:
  - description: >
      Run MITgcm AMOC simulations with (a) spatially heterogeneous tidal mixing
      parameterization using satellite-derived dissipation maps vs. (b) uniform
      vertical diffusivity; compare AMOC strength and sensitivity to surface
      freshwater forcing; test whether the two runs diverge by >20% in AMOC
      strength under 2xCO2 forcing.

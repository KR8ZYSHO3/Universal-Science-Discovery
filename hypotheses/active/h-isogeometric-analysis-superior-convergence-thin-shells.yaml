proposed_tests:
  - description: >
      Benchmark IGA vs. standard FEM on the Scordelis-Lo roof (thin shell) and curved
      Timoshenko beam problems using identical degrees of freedom count. Measure
      L2 and H1 error norms as a function of mesh refinement. Prediction: IGA achieves
      k+1 convergence in L2 vs. k for FEM (where k is polynomial degree) for these
      problems due to exact geometry representation.
  - description: >
      Industrial benchmark: IGA simulation of turbine blade under thermal-structural
      loading vs. standard FEM with commercial meshing tool. Compare (a) model preparation
      time, (b) accuracy against experimental strain gauge data, (c) stress concentration
      at leading edge. Prediction: IGA eliminates 60-80% of meshing time while matching
      or exceeding FEM accuracy at the curved leading edge.

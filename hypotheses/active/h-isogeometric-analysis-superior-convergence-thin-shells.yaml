id: h-isogeometric-analysis-superior-convergence-thin-shells
title: >
  Isogeometric analysis using NURBS basis functions achieves provably superior convergence
  rates compared to standard polynomial FEM for thin-shell problems and problems with
  smooth curved boundaries — eliminating the geometrical approximation error that limits
  engineering FEM accuracy for aerodynamic surfaces.

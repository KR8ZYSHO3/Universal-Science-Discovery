id: h-hippocampal-place-cell-population-topology-reflects-navigated-space-topology
title: >
  The persistent homology of hippocampal CA1 place cell co-firing patterns
  correctly encodes the topological invariants (Betti numbers β₀, β₁, β₂) of
  the navigated environment — circle (β₁=1), torus (β₁=β₂=1), figure-eight
  (β₁=2) — reliably and independently of changes in firing field locations or
  remapping, providing a topology-native read-out of the cognitive map.

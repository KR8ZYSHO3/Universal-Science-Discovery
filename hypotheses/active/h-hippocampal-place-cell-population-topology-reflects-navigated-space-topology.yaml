proposed_tests:
  - description: >
      Multi-environment navigation experiment: record CA1 place cells in a single
      mouse navigating four environments — (A) linear track (β₁=0), (B) circular
      track (β₁=1), (C) figure-eight track (β₁=2), (D) two-room environment
      connected by corridor (β₁=1, distinct from circular). Apply persistent
      homology to co-firing clique complex for each environment. Test: does the
      detected Betti number β₁ match the environment topology in all four cases?
    method: >
      Tetrode or Neuropixels recording, N≥50 place cells; Vietoris-Rips filtration
      on pairwise correlation matrix; Ripser for persistent homology computation;
      statistical significance via Poisson-spiking null model shuffle.
    prediction: >
      β₁ = 0 for linear track, β₁ = 1 for circular, β₁ = 2 for figure-eight,
      β₁ = 1 for two-room environment. Topological signature stable across
      at least 20 minutes of navigation and consistent across remapping events
      (firing field relocation without topology change).
  - description: >
      Test topology preservation during global remapping (same environment,
      different time): record during two sessions in the same circular track
      separated by 24 hours. Global remapping changes firing field locations
      but should preserve topology (β₁=1). Test: does persistent homology
      correctly detect β₁=1 in both sessions despite completely different
      individual firing fields?
    method: >
      Compare persistence diagrams between session 1 and session 2 using
      bottleneck distance; test whether the β₁ feature (born at ε₁, dies at ε₂)
      has consistent birth-death coordinates despite remapping.
    prediction: >
      β₁=1 detected in both sessions with bottleneck distance between persistence
      diagrams < 0.1 (normalised); birth-death coordinates of the β₁ loop
      vary by < 20% between sessions despite complete remapping of firing fields.

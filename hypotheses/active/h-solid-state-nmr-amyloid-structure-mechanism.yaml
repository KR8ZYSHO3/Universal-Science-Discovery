proposed_tests:
  - description: >
      Prepare amyloid fibrils from: tau K18 fragment (Alzheimer's-associated),
      alpha-synuclein (Parkinson's-associated), TDP-43 LCD (ALS-associated), Sup35
      NM domain (yeast prion). Measure with solid-state MAS NMR: PITHIRDS-CT
      ¹³Cα-¹³Cα distances for parallel vs. antiparallel register; DARR/PDSD
      cross-peaks for inter-sheet packing; REDOR for ¹³C-¹⁵N inter-strand
      distances.
    method: >
      MAS ss-NMR at 17-23 T; 14-20 kHz spinning; PITHIRDS-CT pulse sequence
      for ¹³C-¹³C distances; REDOR for ¹³C-¹⁵N; chemical shift fingerprinting
      for secondary structure
    prediction: >
      All four proteins show: ¹³Cα PITHIRDS-CT plateau at r = 4.7±0.2 Å
      (parallel in-register); ¹³C-¹⁵N REDOR consistent with 4.7 Å separation;
      DARR cross-peaks at 10 Å inter-sheet spacing
  - description: >
      Test whether strains of the same amyloid (morphological polymorphs) differ
      in parallel/antiparallel register — relevant to prion strains and distinct
      tauopathies. Use selectively labelled fibrils to resolve inter- vs.
      intra-molecular contacts.
    method: Strategic isotope labelling (alternating ¹³C/¹²C chains); PITHIRDS-CT
    prediction: At least one polymorph class shows antiparallel register, falsifying strict universality

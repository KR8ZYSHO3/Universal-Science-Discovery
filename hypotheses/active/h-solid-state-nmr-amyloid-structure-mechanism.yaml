id: h-solid-state-nmr-amyloid-structure-mechanism
title: >
  Solid-state NMR distance restraints from PITHIRDS-CT and REDOR experiments
  on uniformly ¹³C,¹⁵N-labelled amyloid fibrils will reveal that all amyloid
  folds adopt a parallel in-register beta-sheet arrangement regardless of primary
  sequence, with inter-strand spacing 4.7 Å and beta-sheet stacking 10 Å,
  confirming the "cross-beta spine" as the universal structural motif.

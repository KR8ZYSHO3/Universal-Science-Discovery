id: h-symplectic-controllers-preserve-energy-bounds-long-horizon
title: >
  In mechanics-dominated planning tasks, symplectic rollout models produce lower long-horizon energy
  drift and fewer constraint violations than non-symplectic integrators at comparable runtime.

id: h-telomere-causality-partial-reprogramming
title: >
  Telomere shortening is causally upstream of at least the senescence and inflammation
  hallmarks of aging (not merely a biomarker), as demonstrated by the fact that
  partial in vivo reprogramming restores telomere length and downstream hallmarks
  simultaneously, and telomerase gene therapy extends healthy lifespan in adult mice.
status: active
priority: high

      strongest human causal evidence; however epigenetic clock remains independent predictor
proposed_tests:
  - description: >
      Compare partial reprogramming (OSK without c-Myc, 10-day induction) in 18-month mice
      vs. telomere-elongation-only (imetelstat) vs. combination; measure telomere length,
      p16-CDKN2A senescence burden, inflammatory cytokines, and epigenetic age (Horvath clock).

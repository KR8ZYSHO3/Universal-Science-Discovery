id: h-pmf-bacterial-flagella-atp-synthase-evolutionary-homology
title: >
  The bacterial flagellar motor (BFM) and F₀ ATP synthase share a common evolutionary
  ancestor and homologous ion-channel c-ring rotation mechanism, with the BFM representing
  a later divergence from an ancestral ATP synthase/motor that switched from ATP synthesis
  to mechanical torque generation.
status: active
priority: medium
impact_score: 0.71
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-atp-synthase-torque-slip-mechanism
evidence_links:
  - type: supporting
    note: "Comparative structural analysis: F₀ c-ring and flagellar C-ring (FliF/MS-ring) share β-barrel topology; MotA/MotB stator complex shows homology to ATP synthase a-subunit ion channel architecture (Schäffer et al. 2021 cryo-ET)"
    confidence: 0.65
  - type: supporting
    note: "Both systems use ion (H⁺ or Na⁺) flux down electrochemical gradient to drive rotation; stoichiometry arguments: BFM uses ~1200 H⁺/revolution vs. F₀ ~10 H⁺/revolution — consistent with torque scaling"
    confidence: 0.70
  - type: related
    note: "Liu et al. (2017) — V-type ATPase (archaeal) is intermediate between F-type ATP synthase and flagellar motor in phylogenetic reconstructions"
    confidence: 0.60
  - type: contradicting
    note: "Sequence identity between flagellar components and ATP synthase subunits is low (<15%); structural homology may reflect convergent evolution of ion-channel topology rather than common ancestry"
    confidence: 0.55
proposed_tests:
  - description: >
      Phylogenetic reconstruction including archaeal flagellin (archaellum) sequences,
      V-type ATPase subunits, F-type ATPase c-ring proteins, and flagellar MS-ring
      proteins (FliF) using structure-guided alignment. If common ancestry is correct,
      Bayesian tree should show F-type/archaellum clade with BFM as outgroup, with
      bootstrap support >80%.
  - description: >
      Chimeric c-ring experiment: engineer a BFM with the F₀ c-ring replacing the
      FliF/C-ring component. If functional rotation is maintained, the ion-channel
      torque mechanism is interchangeable — strong evidence for homologous mechanism
      regardless of evolutionary history.
related_disciplines:
  - biophysics
  - evolutionary-biology
  - structural-biology
  - microbiology

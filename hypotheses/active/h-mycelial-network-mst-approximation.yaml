unknowns_addressed:
  - u-mycelial-network-optimization-principle
proposed_tests:
  - description: >
      Set up 12 replicate 30x30 cm agar plates with 6 wood blocks at fixed positions. Allow
      Phanerochaete velutina to colonize for 21 days. Image networks by scanner. Compute total
      wire length, 2-connectivity, and deviation from Steiner MST. Then ablate cords beyond 5 cm
      radius from growth front with UV laser and observe whether final topology remains near-MST.
    method: "Network graph extraction from scanned images + MST/Steiner comparison + UV ablation experiment"
    prediction: "Network wire length within 10% of Steiner MST; 2-connected; topology after ablation does not significantly differ from controls"

evidence_links:
  - type: supporting
    doi: 10.1126/science.1148014
    note: >
      Weiner & Addadi (2011) review — organic matrix proteins nucleate and orient
      crystal growth; spatial confinement within matrix channels is key.
  - type: supporting
    doi: 10.1038/nmat2699
    note: >
      Meldrum & Cölfen (2008) — confinement of calcium carbonate in synthetic spaces
      selects polymorph and orientation, supporting geometric rather than purely chemical control.
  - type: related
    doi: 10.1039/c2cs35317c
    note: >
      Nudelman & Sommerdijk (2012) — nucleation at organic interfaces; geometry of
      nucleation site affects polymorph.
proposed_tests:
  - discipline: materials-science
    description: >
      Fabricate polymer membranes with systematically varied pore geometries (Voronoi vs.
      hexagonal vs. random arrays) and mineralise calcium carbonate inside them.
      Map polymorph distribution (calcite/aragonite/vaterite) by Raman microscopy.
      Test whether Voronoi pore geometry selects distinct polymorphs compared to regular arrays.
  - discipline: biochemistry
    description: >
      Purify nacre organic matrix fractions and reconstitute them on flat substrates at
      varying areal densities, then image by AFM during early mineralisation.
      Test whether the tessellation geometry of the organic lattice predicts the orientation
      of the first-forming crystal layer.

id: h-biomineralisation-voronoi-control
title: >
  Organisms control polymorph selection and crystallographic texture in biomineralisation
  by tuning the spatial geometry of organic matrix proteins to enforce Voronoi-like
  tessellation of mineralisation fronts, selecting crystal habit via geometric frustration
  rather than direct molecular templating alone.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-biomineralisation-control
related_disciplines:
  - materials-science

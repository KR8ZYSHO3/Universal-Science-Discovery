  - quantum-chemistry
evidence_links:
  - type: supporting
    confidence: 0.85
    url: https://pubs.acs.org/doi/10.1021/cr0503606
    note: "Masgrau et al. (2006) — quantum tunnelling contributions to enzyme catalysis; systematic deviations from Arrhenius kinetics"
  - type: supporting
    confidence: 0.90
    note: "Curved Arrhenius plots in H-transfer reactions (CH₃ + H₂ → CH₄ + H) are quantitatively explained by multidimensional tunnelling corrections — an established result in computational chemistry."
proposed_tests:
  - summary: >
      Compare experimental Arrhenius plots for isotopically labelled reactions (H vs D transfer)
      with transition state theory predictions; the kinetic isotope effect (KIE = kH/kD >> classical
      limit of ~7) at low temperature provides direct evidence of quantum tunnelling contributions to A.
  - summary: >
      For enzyme-catalysed reactions, measure k(T) over a wide temperature range (5–65°C);
      non-Arrhenius (curved ln k vs 1/T) behaviour would be consistent with multiple conformational
      states contributing different activation energies, testable by single-molecule FRET measurements.

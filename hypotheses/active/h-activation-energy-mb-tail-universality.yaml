id: h-activation-energy-mb-tail-universality
title: >
  The Arrhenius equation is a universal consequence of the Maxwell-Boltzmann tail
  integral for any thermally activated process, and deviations from Arrhenius
  behaviour (curved Arrhenius plots) are diagnostic for quantum tunnelling,
  multi-step mechanisms, or temperature-dependent activation energy
status: active
priority: medium
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-arrhenius-prefactor-molecular-basis
related_disciplines:

proposed_tests:
  - description: >
      Synthetic plume recovery test: inject synthetic plume conduits (cylindrical,
      200 km diameter, −1.5% δVs) at 1000 km depth in GLAD-M35 starting model;
      compute synthetic seismograms for the actual IRIS/FDSN station-earthquake
      distribution; apply FWI recovery; measure recovered amplitude and diameter.
    method: "Spectral-element forward simulation (SPECFEM3D_GLOBE); adjoint source computation; 20 FWI iterations; recovered anomaly comparison to input"
    prediction: "FWI recovers plume at 1000 km depth with >60% amplitude and <30% diameter inflation when station density >1 station/5° in the region; travel-time tomography recovers <30% amplitude"
  - description: >
      Apply FWI to 50-year ISC bulletin for Hawaii and Iceland plume regions
      separately; compare recovered slow-anomaly structure at 500, 1000, 1500 km
      depth to predictions of the "deep plume" hypothesis (connected to LLSVP base)
      vs. "shallow plume" hypothesis (upper mantle origin); test statistical
      significance via bootstrap resampling of earthquake catalog.
    method: "GLAD-M35 starting model; Hawaii-focused and Iceland-focused FWI refinements; bootstrap significance testing; comparison to geodynamic predictions"
    prediction: "Hawaii plume shows continuous slow anomaly from surface to >1500 km depth at >2σ significance; Iceland plume is shallower (<700 km connected) — testing deep vs. shallow origin hypotheses"


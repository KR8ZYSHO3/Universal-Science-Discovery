id: h-seismic-adjoint-tomography-resolves-mantle-plumes
title: >
  Full-waveform adjoint tomography (FWI) using GLAD-M35 or equivalent models with
  >100 million waveform measurements resolves mantle plume conduits below Hawaii
  and Iceland to diameters <200 km at depths >1000 km, distinguishing them from
  purely upper-mantle thermal anomalies — contradicting travel-time tomography
  models that show resolution loss below 700 km.
status: active
priority: medium
impact_score: 0.78

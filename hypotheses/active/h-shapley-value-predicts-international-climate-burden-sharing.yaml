proposed_tests:
  - description: Construct a cooperative climate game with 40 major emitters using IPCC emission reduction potential data as characteristic function values; compute Shapley value and nucleolus allocations; compare to Paris Agreement NDC commitments using Euclidean distance in emission reduction space
  - description: Test whether the core of the climate game is non-empty given current NDC commitments — an empty core would imply no stable self-enforcing agreement exists, predicting defection patterns

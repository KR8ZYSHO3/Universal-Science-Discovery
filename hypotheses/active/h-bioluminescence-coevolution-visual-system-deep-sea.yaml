id: h-bioluminescence-coevolution-visual-system-deep-sea
title: >
  The spectral peak of bioluminescence emission in mesopelagic organisms
  (400-1000 m depth) has coevolved with the peak sensitivity of visual pigments
  in predators at corresponding depths, with both tracking the depth-dependent
  blue-shifting of residual downwelling daylight, producing a tight
  correlation between depth, emission lambda_max, and predator rhodopsin lambda_max.

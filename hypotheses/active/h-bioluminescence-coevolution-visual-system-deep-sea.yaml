proposed_tests:
  - description: >
      Compile dataset of: (1) bioluminescence emission lambda_max for mesopelagic
      species at known collection depths (MBARI database, Haddock lab records);
      (2) visual pigment lambda_max for mesopelagic fish and cephalopod predators
      at corresponding depths (published MSP and sequence-based estimates);
      (3) modelled downwelling irradiance spectrum at same depths (Jerlov optical
      water types). Test: Pearson correlation between depth and (bioluminescence
      lambda_max) and (predator rhodopsin lambda_max); test whether bioluminescence
      lambda_max tracks predator sensitivity better than downwelling light alone.
    method: >
      Phylogenetic ANOVA to control for common ancestry; multiple regression:
      lambda_max ~ depth + phylogeny + body size + feeding mode
    prediction: >
      r(depth, bioluminescence lambda_max) = -0.65±0.15 (deeper → bluer);
      r(predator rhodopsin lambda_max, bioluminescence lambda_max) = 0.70±0.10;
      predator sensitivity explains variance in bioluminescence beyond depth alone
      (delta R² > 0.10) after phylogenetic correction.
  - description: >
      Comparative genomics: sequence luciferase active-site residues from 20+
      mesopelagic species at different depths. Test whether active-site polarity
      (predicted from physicochemical residue properties) correlates with depth
      and measured emission wavelength.
    method: Ancestral sequence reconstruction + site-directed mutagenesis of key residues
    prediction: Polarity index of luciferase active site correlates with depth (r > 0.6)

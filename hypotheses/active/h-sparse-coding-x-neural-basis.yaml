proposed_tests:
  - description: Record from V1 simple cells in awake macaques viewing natural images (n=50 neurons, 200 natural image patches); measure surround suppression onset time (time at which response to center+surround falls below response to center alone); compare to ISTA lateral inhibition time constant estimated by fitting a Gabor dictionary to the same images and running ISTA with τ_inh as a free parameter; test whether τ_inh = 15ms prediction holds within 95% confidence intervals.

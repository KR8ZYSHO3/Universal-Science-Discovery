id: h-electric-catalyst-preheating-eliminates-cold-start-emissions
title: >
  Electrically preheating the catalytic converter to light-off temperature before
  engine start will eliminate >75% of total trip emissions for hybrid and plug-in
  hybrid vehicles where grid electricity is available, making EHC cost-effective
  at current carbon prices.
status: active
priority: medium
impact_score: 0.74
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - type: supporting
    confidence: 0.75
    note: "Cold start contributes ~80% of regulated emissions per trip (HC, CO, NOx); eliminating cold-start phase would reduce per-trip emissions by ~80%"
  - type: supporting
    confidence: 0.70
    note: "Electrically heated catalysts (EHC) demonstrated in Mercedes and BMW 48V mild hybrid systems; CO emission reduction >90% in cold-start certification tests"
  - type: supporting
    confidence: 0.60
    note: "EU7 regulations (effective 2026) include off-cycle cold-start emission requirements that cannot be met with passive systems alone — creating regulatory pull for EHC"
  - type: contradicting
    confidence: 0.5
    note: "EHC requires 1-2 kW for 30-60 seconds; in hybrid vehicles with small 48V batteries, this may conflict with cabin heating and acceleration demands"

unknowns_addressed:
  - u-catalytic-converter-cold-start-mitigation-strategies

proposed_tests:
  - description: >
      Fleet study of PHEV vehicles with and without EHC over 1000 real-world trips
      in cold climates (ambient < 10°C). Measure per-trip HC, CO, NOx emissions
      via on-board diagnostics and portable emission measurement system (PEMS).
      Calculate cost per kg of emission reduction vs. carbon price.
    method: "PEMS measurement on paired EHC vs. non-EHC PHEV fleet; linear mixed model for emission reduction; cost-benefit analysis at current EU ETS carbon prices"
    prediction: "EHC reduces per-trip CO+HC+NOx by >70% in cold starts; cost per tonne CO₂-equivalent <€150 at 48V EHC system cost of €300-500"

related_disciplines:
  - chemical-engineering
  - automotive-engineering
  - environmental-science

id: h-gale-shapley-deferred-acceptance-stability-uniqueness
title: >
  In real-world matching markets with incomplete preference lists (NRMP, NYC
  school choice), the set of stable matchings is a lattice with a unique optimal
  matching for each side — but when strategic manipulation by hospitals (rank-order
  list truncation) is feasible, the manipulated equilibrium improves hospital welfare
  by on average 3-8% relative to the truthful DA outcome, undermining strategy-
  proofness for the receiving side.

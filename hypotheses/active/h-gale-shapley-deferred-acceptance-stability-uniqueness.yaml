proposed_tests:
  - description: >
      Simulate the NRMP with 35,000 residents and 30,000 hospital positions; apply
      a myopic best-response dynamic where hospitals iteratively truncate rank-order
      lists to improve match quality; measure welfare gain for hospitals vs. loss
      for residents; compare equilibrium outcome to truthful DA outcome.
    method: "NRMP dataset (anonymized 2019-2022); best-response truncation simulation; welfare measured by ordinal ranking of assigned match; convergence time of best-response dynamics"
    prediction: "Best-response dynamics converge within 3-7 iterations to a Nash equilibrium; hospital welfare improves by 5±2% (measured by mean rank of matched resident); resident welfare decreases by 3±1%; equilibrium is stable (no profitable deviation) but inefficient vs. truthful outcome"
  - description: >
      Field experiment: in a synthetic market with 100 students and 80 schools (run
      with student-subjects who receive payments based on match quality), compare
      outcomes under truthful DA vs. non-strategyproof Gale-Shapley (both sides
      submit preference lists); measure truth-telling rates and strategic manipulation
      frequency on the receiving side.
    method: "Lab experiment with student subjects; 2x2 design (truthful vs. non-strategyproof DA × low vs. high preference correlation); measure revelation accuracy vs. true preferences"
    prediction: "Under truthful DA, >90% of students submit truthful preferences (DSIC); under non-strategyproof version, 30-50% of students misreport to match observed manipulation patterns; welfare loss of manipulation ≈ 8% of truthful DA optimum"


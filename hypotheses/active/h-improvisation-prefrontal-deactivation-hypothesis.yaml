id: h-improvisation-prefrontal-deactivation-hypothesis
title: >
  Musical improvisation requires hypofrontality — deactivation of dorsolateral prefrontal
  cortex (self-monitoring) concurrent with increased medial prefrontal activity
  (self-expression), supported by jazz improvisation fMRI studies showing inverse
  DLPFC/mPFC activation pattern absent in memorized performance.

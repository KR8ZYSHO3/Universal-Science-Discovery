proposed_tests:
  - description: >
      Causal test using TMS inhibition of DLPFC during musical performance to assess
      whether suppression increases improvisational novelty and reduces self-monitoring errors.
  - description: >
      EEG coherence analysis comparing DLPFC-mPFC connectivity during improvised vs
      memorized performance across training levels.

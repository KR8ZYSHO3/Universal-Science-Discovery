id: h-minority-game-hft-phase-transition
title: >
  High-frequency trading (HFT) proliferation shifted equity markets across the
  minority game phase transition from the inefficient (α < α_c) to efficient
  (α > α_c) regime, measurable as a decrease in autocorrelation of order flow
  and reduction in bid-ask spread predictability after 2005 HFT adoption.
status: active
priority: high
impact_score: 0.75
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-market-microstructure-price-formation
evidence_links:
  - type: supporting
    note: "Hendershott et al. (2011) HFT introduction on NYSE reduces quoted spreads, adverse selection, and order flow autocorrelation — consistent with efficiency increase"
    confidence: 0.72
  - type: related
    note: "Brogaard et al. (2014) HFT improves price efficiency (reduces variance ratio deviations from 1) across 26 stocks"
    confidence: 0.68
  - type: contradicting
    note: "Kirilenko et al. (2017) Flash Crash demonstrates HFT can produce liquidity withdrawal → market instability at extreme market stress — inconsistent with pure efficiency gain"
    confidence: 0.70
proposed_tests:
  - description: >
      Structural break analysis: estimate minority game α = P/N proxy using
      effective number of independent HFT strategies (from CFTC data) / total
      market participants per year 2000–2023. Test whether α crosses α_c (≈0.34
      in standard minority game) in the 2004–2008 period. Correlate with measured
      order flow autocorrelation at 1-second intervals.
  - description: >
      Cross-market comparison: compare α-proxy and price efficiency metrics
      across markets with different HFT penetration (US equity vs. emerging markets).
      Minority game predicts: markets with lower HFT (lower α) should show more
      predictable order flow. Test this prediction in panel regression.
related_disciplines:
  - financial-physics
  - market-microstructure
  - complex-systems

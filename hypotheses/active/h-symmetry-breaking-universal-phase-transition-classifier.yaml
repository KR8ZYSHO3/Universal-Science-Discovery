id: h-symmetry-breaking-universal-phase-transition-classifier
title: >
  Every continuous phase transition in nature corresponds to the spontaneous
  breaking of a specific symmetry group G → H, and the universality class
  (critical exponents) is determined entirely by the dimension of G/H and
  the spatial dimension d — making the Landau-Ginzburg-Wilson classification
  complete for all equilibrium phase transitions
status: active
priority: medium
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-goldstone-boson-higher-dimensional-systems
related_disciplines:

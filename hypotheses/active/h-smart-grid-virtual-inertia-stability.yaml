id: h-smart-grid-virtual-inertia-stability
title: >
  Electrical grids can maintain stability at >80% variable renewable penetration
  using grid-forming inverters with virtual synchronous generator (VSG) control that
  synthetically provides inertial response (H~5-10 seconds equivalent), provided
  frequency-responsive demand response and distributed storage fill sub-second
  gaps not covered by VSG response dynamics.

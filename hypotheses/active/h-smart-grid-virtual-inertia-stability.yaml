proposed_tests:
  - description: >
      Hardware-in-the-loop simulation: 100-bus grid model with VRE penetration swept
      0-100%. Grid-forming inverter VSG control vs traditional grid-following. Test:
      rate of change of frequency (ROCOF) after N-1 contingency. Stability criterion:
      ROCOF < 1 Hz/s.
    prediction: "VSG control maintains ROCOF<1 Hz/s up to 85% VRE penetration; grid-following inverters fail (ROCOF>2 Hz/s) above 60% VRE; demand response extends stable operating range to 90% VRE."

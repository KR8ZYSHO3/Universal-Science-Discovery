id: h-quantum-gravity-holography-ads-cft
title: >
  The AdS/CFT correspondence (Maldacena 1997) provides the correct mathematical
  framework for quantum gravity: quantum gravity in d+1 dimensional Anti-de Sitter
  space is exactly dual to a conformal field theory in d dimensions, implying that
  bulk spacetime geometry is an emergent property of boundary quantum entanglement
  structure (Ryu-Takayanagi formula: S_bulk = Area/4G_N).

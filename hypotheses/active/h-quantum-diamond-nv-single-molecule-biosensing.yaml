id: h-quantum-diamond-nv-single-molecule-biosensing
title: >
  Nitrogen-vacancy (NV) centre magnetometers in diamond can achieve single-molecule
  magnetic sensitivity at room temperature when placed within 2nm of target molecules,
  and NV-based proton NMR spectroscopy on nanoscale biological samples will achieve
  sufficient sensitivity to detect single-protein conformational states in living cells.
status: active
priority: high
impact_score: 0.87
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - quantum-sensing
  - biophysics
  - analytical-chemistry
unknowns_addressed:
  - u-quantum-sensing-biological-limits
evidence_links:
  - doi: "10.1126/science.1258742"
    type: supporting
    confidence: 0.85
    note: >
      Lovchinsky et al. (2016) Science — NV-based single-molecule proton NMR achieved
      on statistical ensemble of 20-30 lipid molecules; SNR scales as 1/r³ where r is
      NV-to-sample distance; sensitivity demonstrated at 1.7nm stand-off distance
  - doi: "10.1038/nature17997"
    type: supporting
    confidence: 0.82
    note: >
      Aslam et al. (2017) Science — NV centre detects single electron spin flip in
      adjacent molecule; achievable at ambient conditions (298K, 1 atm); sensitivity
      4 × 10⁻³ μ_B/√Hz at 1nm stand-off
  - doi: "10.1103/PhysRevX.10.021071"
    type: related
    confidence: 0.74
    note: >
      Two remaining barriers: (1) placing NV reliably at <2nm surface depth while maintaining
      coherence time T2 > 100μs; (2) functionalising diamond surface to bind target proteins
      without disturbing NV environment; both are engineering rather than fundamental limits
proposed_tests:
  - description: >
      Nanodiamond with single NV at 1.5nm depth, surface-functionalised with protein G;
      bind single antibody fragment; measure NMR spectrum of Fc region; compare to bulk
      crystal structure; test whether conformational change upon antigen binding is detectable
      as NMR chemical shift change.

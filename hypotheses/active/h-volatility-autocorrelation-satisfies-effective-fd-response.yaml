proposed_tests:
  - description: >
      Split trading days into pre/post macro announcement windows; estimate correlation integrals and
      compare to forward realized variance; test for ratio stability only in pre-window subset.
    method: Event study with multiple testing correction.
    prediction: Ratio stability fails post-announcement if hypothesis is regime-specific.


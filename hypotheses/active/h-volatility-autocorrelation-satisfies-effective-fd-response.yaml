id: h-volatility-autocorrelation-satisfies-effective-fd-response
title: >
  In calm regimes, integrated absolute-return autocorrelation up to intraday horizons scales with subsequent
  realized variance proxies similarly to a phenomenological fluctuation–dissipation ratio — breaks down around
  scheduled macro releases; treat as empirical hypothesis not physics law.

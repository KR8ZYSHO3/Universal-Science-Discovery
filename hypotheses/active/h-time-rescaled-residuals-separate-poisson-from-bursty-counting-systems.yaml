id: h-time-rescaled-residuals-separate-poisson-from-bursty-counting-systems
title: >
  Time-rescaled residual tests will detect non-Poisson structure from refractory or detector-dead-time effects at lower false-positive rates than raw Fano-factor thresholds in matched decay-count and spike-train simulations; falsified if calibration error is not reduced by at least 25 percent.
status: active
priority: medium
impact_score: 0.33
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1038/nn0504-456"
    type: related
    confidence: 0.45
    note: Brown et al. review point-process approaches for neural spike trains.
unknowns_addressed:
  - u-neural-decay-poisson-deviation-shared-overdispersion-tests
proposed_tests:
  - description: >
      Generate matched Poisson, dead-time, refractory, and bursty point processes; compare time-rescaling KS tests against Fano-factor rules at fixed sample sizes.
    method: Deterministic simulation suite with seeded random generators.
    prediction: Time-rescaling reduces calibration error by >= 25 percent at fixed power.

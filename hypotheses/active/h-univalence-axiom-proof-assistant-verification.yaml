id: h-univalence-axiom-proof-assistant-verification
title: >
  A cubical type theory implementation of the univalence axiom in Lean 4 or
  Agda 2 will allow automated verification of non-trivial results in algebraic
  topology (e.g., fundamental theorem of algebra, Brouwer fixed-point theorem)
  at a proof density (characters per proof) competitive with traditional
  Coq/Isabelle formalizations without UA.

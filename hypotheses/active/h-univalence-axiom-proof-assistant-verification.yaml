proposed_tests:
  - description: >
      Formalize the van Kampen theorem (fundamental group of a pushout) in
      Cubical Agda using HoTT higher inductive types, measure proof length
      (lines of code) and type-checking time, and compare to the classical
      Coq formalization (Fundamental Group library) which does not use UA.
    method: Proof assistant formalization (Cubical Agda) + proof metrics
    prediction: >
      HoTT proof of van Kampen using higher inductive types should be ≤ 50%
      of the classical set-theoretic Coq proof in terms of lines, because
      HoTT makes the topological intuition syntactically transparent.
  - description: >
      Benchmark automated tactic search (auto, omega, ring, decide) on 50
      HoTT-style goals in Lean 4 vs. equivalent classical goals, measuring
      search time and success rate.
    method: Lean 4 proof automation benchmark
    prediction: >
      HoTT-style goals have higher variance in tactic search time due to
      proof-relevant computation, but path induction lemmas should be
      resolved as fast as classical symmetry reasoning.

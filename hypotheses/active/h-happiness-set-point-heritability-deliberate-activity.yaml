id: h-happiness-set-point-heritability-deliberate-activity
title: >
  Subjective wellbeing set point is heritable (~50%) and determined by a
  dynamic equilibrium of affective adaptation, not a fixed genetic constant;
  deliberate activities (gratitude, social engagement, purposeful goals) can
  sustainably shift the set point upward by 0.3-0.5 SD when maintained
  consistently, while life circumstances produce only temporary shifts.

evidence_links:
  - doi: "10.1037/0033-295X.106.3.395"
    type: supporting
    confidence: 0.65
    note: >
      Lyubomirsky et al. (1999) set point model: ~50% variance in SWB
      heritable (twin studies), ~10% due to circumstances, ~40% due to
      intentional activities — basis for the deliberate activity hypothesis.
  - doi: "10.1037/0022-3514.84.2.365"
    type: supporting
    confidence: 0.62
    note: >
      Diener et al. (2006) life events and adaptation: lottery winners and
      accident victims return to near-baseline SWB within 1-2 years;
      set point adaptation confirmed but SWB shows some upward drift with
      sustained positive change.
  - doi: "10.1037/a0019648"
    type: related
    confidence: 0.60
    note: >
      Lykken & Tellegen (1996) twin study: wellbeing is largely heritable
      but siblings raised apart show more SWB variability than identical
      twins, indicating environmental influences act within genetic range.
proposed_tests:
  - description: >
      12-month longitudinal RCT (N=500): randomly assign participants to
      (1) gratitude journaling daily, (2) social engagement intervention
      (weekly structured activities with new people), (3) goal pursuit
      coaching, (4) waitlist control. Measure SWB (SWLS, PANAS) monthly.
      Test: do active conditions show higher SWB at 12 months after controlling
      for initial score? Continue follow-up at 24 months to test persistence
      after intervention ends — sustained elevation would support the
      deliberate-activity set-point shift hypothesis.

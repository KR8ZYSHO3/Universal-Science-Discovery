evidence_links:
  - doi: "10.1016/j.tics.2020.02.004"
    type: supporting
    confidence: 0.77
    note: >
      Seth & Friston (2016) — interoceptive predictive coding: brain minimises surprise
      about body states; homeostatic drives emerge from prediction error; emotion is
      controlled hallucination of body state — formally equivalent to exteroceptive
      predictive coding but with action (allostasis) changing inputs directly
  - doi: "10.1126/science.aaa8694"
    type: supporting
    confidence: 0.73
    note: >
      Critchley & Garfinkel (2017) — individual differences in heartbeat perception
      accuracy (interoceptive accuracy) predict emotional awareness strength,
      anxiety trait, and self-conscious emotion intensity (embarrassment, pride)
  - doi: "10.1038/s41593-022-01064-w"
    type: related
    confidence: 0.68
    note: >
      Depersonalisation disorder: patients report emotional detachment and unreality;
      fMRI shows reduced insular cortex activation to interoceptive cues; supports
      model that disrupted interoceptive inference = disrupted sense of self
proposed_tests:
  - description: >
      Pharmacologically manipulate interoceptive precision (propranolol suppresses cardiac
      interoception; isoproterenol enhances it); measure conscious access to emotions using
      EEG markers (P300 to emotional stimuli) and verbal affect intensity ratings; predict
      linear scaling of emotional consciousness with interoceptive signal quality.

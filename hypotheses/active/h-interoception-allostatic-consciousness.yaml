id: h-interoception-allostatic-consciousness
title: >
  Conscious experience arises from the brain's predictive model of the body's internal
  physiological state (interoceptive inference), making emotions and self-awareness
  fundamentally allostatic constructions — this explains why interoceptive accuracy
  predicts emotional awareness, why body-focused practices alter consciousness, and
  why interoceptive disruption causes depersonalisation.

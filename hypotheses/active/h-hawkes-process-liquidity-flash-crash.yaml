proposed_tests:
  - description: >
      For E-mini S&P 500 futures tick data, estimate eta via MLE Hawkes calibration on rolling 10-minute
      windows. Label flash crash events (>2% drawdown in 60s). Compute ROC AUC for eta as a binary
      classifier of flash crash occurrence within the next 30 minutes. Compare to VIX and bid-ask spread
      baselines.
    method: "Rolling Hawkes MLE on tick data; ROC analysis for flash crash prediction; comparison to VIX and spread baselines"
    prediction: "Hawkes eta achieves AUC > 0.75 on held-out flash crash test set; outperforms VIX and spread by > 0.05 AUC"

id: h-financialisation-investment-crowding
title: >
  The rise of financial sector GDP share above 8% crowds out real economy
  investment through talent misallocation and short-termism, with the crowding-out
  measurable as a negative relationship between financial sector size and
  manufacturing R&D intensity across OECD countries.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-financialisation-real-economy-effects
evidence_links:
  - type: supporting
    note: "Cecchetti & Kharroubi (2012) BIS working paper: financial sector growth above threshold negatively predicts TFP growth in OECD panel"
    confidence: 0.72
  - type: supporting
    note: "Philippon & Reshef (2012) financial wages above manufacturing wages by 50% signal misallocation of human capital"
    confidence: 0.65
  - type: contradicting
    note: "Levine (2005) 'Finance and Growth' review: financial depth positively predicts long-run growth across 80 countries"
    confidence: 0.70
proposed_tests:
  - description: >
      Panel regression (40 OECD countries, 1980–2023): regress non-financial
      business R&D/GDP on financial sector value added/GDP, controlling for trade
      openness, human capital, and country FE. Test for non-linearity (quadratic
      specification). Identify the optimal financial depth that maximizes R&D.
  - description: >
      High-frequency talent flow analysis: use LinkedIn-style job transition data
      to measure annual flow of STEM graduates from engineering/science to financial
      sector by country. Correlate with aggregate manufacturing patent productivity.
      Test Granger causality in both directions.
related_disciplines:
  - economics
  - finance
  - innovation-economics

id: h-cloud-seeding-hygroscopic-efficacy-mechanism
title: >
  Cloud seeding efficacy is primarily determined by cloud liquid water content
  and temperature at seeding altitude, not seeding agent chemistry — hygroscopic
  flares (KCl, NaCl particles) are effective only in warm convective clouds
  (T > -5°C), while silver iodide (AgI) is effective only in supercooled
  stratiform clouds (-5°C to -20°C).

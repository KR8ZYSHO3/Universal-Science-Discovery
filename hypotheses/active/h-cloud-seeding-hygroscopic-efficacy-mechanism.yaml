evidence_links:
  - doi: "10.1175/BAMS-D-18-0145.1"
    type: supporting
    confidence: 0.58
    note: >
      Tessendorf et al. (2019) Wyoming field experiment: randomised AgI seeding
      increased snowfall 10-15% in supercooled orographic clouds; no effect
      in warm clouds above 0°C.
  - doi: "10.1175/JCLI-D-15-0813.1"
    type: related
    confidence: 0.50
    note: >
      Rosenfeld et al. (2013) review hygroscopic seeding trials in South Africa
      and Mexico; convective invigoration observed, but precipitation increase
      difficult to separate from natural variability.
  - doi: "10.1126/science.aaw5488"
    type: supporting
    confidence: 0.65
    note: >
      French et al. (2018) Idaho experiment with radar tracking of snowfall
      plumes from AgI seeding: clear mechanistic confirmation of ice crystal
      formation from AgI nuclei and subsequent fallout.
proposed_tests:
  - description: >
      Conduct paired randomised seeding trials stratified by cloud temperature
      (warm vs. supercooled), liquid water content (LWC), and cloud type
      (convective vs. stratiform). Each trial pair has one seeded and one
      control cloud selected by random number. Primary outcome: rain gauge
      network precipitation accumulation in 50 km downwind area. Secondary
      outcome: radar-derived precipitation efficiency. Test: efficacy should
      be significantly higher in the temperature/LWC-appropriate category
      (p < 0.05 after Bonferroni correction for multiple comparisons).

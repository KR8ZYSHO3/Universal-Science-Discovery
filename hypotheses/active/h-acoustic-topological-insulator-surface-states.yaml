id: h-acoustic-topological-insulator-surface-states
title: >
  A phononic crystal with a Z2 topological band gap supports topologically protected
  acoustic surface states at its boundary that are immune to backscattering from
  smooth defects, enabling waveguides with zero-reflection around bends at frequencies
  within the phononic band gap.
status: active
priority: medium
impact_score: 0.71
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - acoustics
  - condensed-matter-physics
  - materials-science
unknowns_addressed:
  - u-phononic-crystal-3d-complete-band-gap
evidence_links:
  - doi: "10.1038/nphys3458"
    type: supporting
    confidence: 0.73
    note: >
      Yang et al. (2015) demonstrate acoustic analog of quantum spin Hall effect
      in a 2D phononic crystal; pseudospin-locked edge states propagate around corners
      without backscattering, consistent with topological protection.
  - doi: "10.1126/science.289.5485.1734"
    type: related
    confidence: 0.60
    note: >
      Liu et al. (2000) locally resonant phononic crystals show sub-wavelength
      band gaps; suggests similar resonant engineering could realize topological gaps.
proposed_tests:
  - description: >
      Fabricate 3D-printed phononic crystal (periodic air cylinders in epoxy) with
      calculated Z2 topological invariant from band simulation; measure transmission
      around 90-degree bend using acoustic impedance tube; compare transmission
      at in-gap vs. out-of-gap frequencies; transmission should be >-3 dB in-gap
      (topological) vs. <-20 dB for trivial structure.

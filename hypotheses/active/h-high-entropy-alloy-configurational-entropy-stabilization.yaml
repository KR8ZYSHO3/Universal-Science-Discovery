proposed_tests:
  - description: >
      Anneal CrMnFeCoNi at 700, 800, 900, 1000°C for 100 hours each; characterize
      microstructure by TEM-EDX and XRD; measure configurational entropy of mixing
      from measured compositions; compare transition temperature to CALPHAD prediction
      of single-phase → two-phase boundary.
    method: "Arc-melting; homogenization 1200°C 24h; isothermal annealing at 4 temperatures; TEM-EDX compositional mapping; XRD phase identification; DSC to locate phase transition"
    prediction: "Single-phase FCC above 900°C; Mn/Cr-rich sigma-phase precipitates below 800°C; transition temperature matches CALPHAD prediction within 50°C, confirming entropy stabilization mechanism"
  - description: >
      Vary equimolarity: prepare CrMnFeCoNi with Mn content 0, 5, 10, 20 mol%
      (other elements adjusted); measure single-phase stability temperature as
      function of ΔS_mix; test whether stability temperature scales as ΔG_phase =
      ΔH − TΔS with CALPHAD-predicted ΔH and measured ΔS.
    method: "6 alloy compositions; identical heat treatment protocol; DSC + TEM characterization; linear regression of T_stability vs. ΔS_mix"
    prediction: "T_stability = ΔH/ΔS_mix scales linearly with 1/ΔS_mix with slope = ΔH_sigma-FCC ≈ 5 kJ/mol from CALPHAD; R² > 0.95 confirming thermodynamic prediction"


id: h-high-entropy-alloy-configurational-entropy-stabilization
title: >
  In equimolar CrMnFeCoNi and related Cantor-class HEAs, the −TΔS_mix = R ln(5)·T
  configurational entropy term dominates the Gibbs free energy at T > 900°C,
  preventing sigma-phase and Laves-phase precipitation and maintaining single-phase
  FCC stability — a prediction validated by CALPHAD and falsifiable by differential
  scanning calorimetry at controlled annealing temperatures.
status: active
priority: medium

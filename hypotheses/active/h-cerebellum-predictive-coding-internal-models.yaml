id: h-cerebellum-predictive-coding-internal-models
title: >
  The cerebellum performs predictive coding via internal forward models: it predicts
  the sensory consequences of motor commands, computes prediction errors via
  climbing-fibre-driven LTD at parallel fibre-Purkinje cell synapses, and updates
  internal models — extending this framework to cognitive prediction errors (e.g. in
  language, social cognition) explains cerebellar involvement in autism and schizophrenia.

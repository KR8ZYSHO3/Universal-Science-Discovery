proposed_tests:
  - description: >
      Measure cerebellar fMRI activation during prediction error tasks in: (1) visual
      motor learning, (2) linguistic expectation violation (N400 paradigm), (3) social
      outcome prediction; test whether climbing fibre analog (surprise signal) activates
      the same cerebellar lobules across all three domains.

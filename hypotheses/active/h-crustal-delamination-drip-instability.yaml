id: h-crustal-delamination-drip-instability
title: >
  Lower crustal delamination occurs when eclogitization increases lower crustal
  density above the mantle density (ρ > 3.3 g/cm³), triggering Rayleigh-Taylor
  drip instability with growth timescales of 10–30 Myr, predictable from
  the lower crust seismic velocity structure.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-crustal-delamination
evidence_links:
  - type: supporting
    note: "Bird (1979) crustal delamination model: eclogitized lower crust drips into mantle on 10-20 Myr timescale in thermally thickened lithosphere"
    confidence: 0.72
  - type: supporting
    note: "Garber et al. (2018) Sierra Nevada delamination: geochemical and seismic evidence for Farallon flat-slab removal causing rapid surface uplift 1.5 cm/yr"
    confidence: 0.75
  - type: related
    note: "Houseman & Molnar (1997) R-T instability growth rate λ ∝ (Δρ g / η)^{1/3} — timescale derivable from mantle viscosity and density contrast"
    confidence: 0.80
proposed_tests:
  - description: >
      Seismic receiver function survey: image Moho and lower crustal velocity
      in 5 orogenic belts with suspected delamination (Andes, Tibet, Sierra Nevada,
      Carpathians, Apennines). Compute density from Vp/Vs using mineralogic
      thermobarometry. Test: belts with ρ_lower_crust > 3.3 g/cm³ show geophysical
      evidence of active delamination (thin lithosphere, high heat flow).
  - description: >
      Geochemical test: K-rich, high-Mg magmatism (potassic volcanism) is predicted
      to accompany lower crustal delamination (Elkins-Tanton 2007). Compile global
      database of potassic volcanism episodes and correlate with seismic evidence
      of lithospheric thinning within 5 Myr. Test temporal-spatial coincidence.
related_disciplines:
  - geophysics
  - petrology
  - tectonics

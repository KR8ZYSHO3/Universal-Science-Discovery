id: h-joint-fit-lifshitz-hamaker-colloid-force-curves
title: >
  When ε(ω) for gold-coated spheres is measured from UV through infrared with Kramers–Kronig consistency checks, Lifshitz predictions will simultaneously fit AFM colloid–substrate force curves from nanometer separations (vdW regime) and micrometer-gap Casimir-force lever measurements within combined uncertainty — falsified if independent Hamaker fits disagree with spectral Lifshitz integration beyond stated error bars.

proposed_tests:
  - description: >
      Administer a hierarchical Bayesian learning task (volatile reversal learning)
      to first-episode psychosis patients before and after 6 weeks of antipsychotic
      treatment. Fit the hierarchical Gaussian filter model (Mathys et al. 2011)
      to choice data; extract the precision ratio ω = σ_prior/σ_likelihood.
      Test whether reduction in ω from pre- to post-treatment correlates with
      PANSS positive symptom reduction (r > 0.5).
    method: "Computational task + HGF model fitting + PANSS symptom rating + Spearman correlation"
    prediction: "ω reduction predicts PANSS positive symptom reduction with r > 0.5; ω at baseline predicts eventual treatment response"
  - description: >
      Randomised crossover study: administer haloperidol (high D2 affinity),
      quetiapine (lower D2 affinity), and placebo to healthy volunteers;
      measure precision ratio ω from reversal learning task 4h post-dose.
      Test whether drug-induced ω reduction is proportional to D2 receptor
      occupancy (measured by PET in a parallel arm).
    method: "Crossover RCT + computational task + PET D2 occupancy + Pearson correlation"
    prediction: "ω reduction is linearly proportional to D2 occupancy (r > 0.7); minimum D2 occupancy threshold (≈ 65%) needed for detectable ω reduction"


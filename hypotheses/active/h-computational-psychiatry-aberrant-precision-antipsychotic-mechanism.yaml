id: h-computational-psychiatry-aberrant-precision-antipsychotic-mechanism
title: >
  Antipsychotic drugs (D2 antagonists) reduce psychotic symptoms by lowering
  the dopaminergic precision-weighting signal — reducible to a single parameter
  ω_DA in the hierarchical Bayesian model — and their therapeutic efficacy across
  patients is quantitatively predicted by the degree to which they normalise
  precision-weighted prediction error updating in computational task assays.

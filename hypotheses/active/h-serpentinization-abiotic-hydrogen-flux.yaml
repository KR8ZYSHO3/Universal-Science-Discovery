id: h-serpentinization-abiotic-hydrogen-flux
title: >
  Global abiotic H₂ flux from serpentinization at ocean ridges and in continental
  ophiolites is 10¹²–10¹³ mol/yr — sufficient to support a deep chemolithotrophic
  biosphere of 10¹⁵–10¹⁶ g C biomass — and the Lost City hydrothermal field
  provides the best accessible model system.

proposed_tests:
  - description: >
      Global serpentinization rate from seismic survey: compile P-wave velocity
      data from all known oceanic core complexes (OCC). Estimate hydrated mantle
      volume from velocity reduction (Vp < 7.5 km/s). Multiply by laboratory
      H₂ yield per kg peridotite (0.1–0.5 mol/kg). Compare to Lost City vent
      direct flux measurements scaled to OCC area.
  - description: >
      13C-labeled bicarbonate incubation: inject ¹³C-labeled DIC into Lost City
      vent fluid enrichment cultures at 50–90°C. Measure ¹³C incorporation into
      biomass (RNA-SIP). Identify which chemoautotrophs fix CO₂ using H₂ as
      electron donor. Quantify per-cell H₂ consumption rate → community biomass
      supported per mol H₂.

id: h-lmsr-automated-market-maker-dominates-polls-epistemic-accuracy
title: >
  LMSR prediction markets with subsidized liquidity outperform expert polls and ensemble
  models in Brier score accuracy for geopolitical and scientific outcome forecasting,
  specifically because the softmax price mechanism implements approximate Bayesian
  aggregation of heterogeneous private signals.

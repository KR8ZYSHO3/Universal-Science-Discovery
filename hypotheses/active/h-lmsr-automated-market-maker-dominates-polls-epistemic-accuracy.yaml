    note: Milgrom-Stokey no-trade theorem — prediction markets must overcome this to function, requiring genuine private signals
proposed_tests:
  - description: >
      Paired comparison on Metaculus: select 100 resolved questions where both (a) a
      LMSR market and (b) an expert poll were run. Compute Brier scores for final market
      price vs. poll mean. Stratify by question type (geopolitical, scientific, economic).
      Prediction: markets achieve lower Brier scores by ≥10% on aggregate, with largest
      advantage for questions where expertise is heterogeneously distributed.
  - description: >
      Lab experiment: recruit 50 participants with different partial knowledge about a
      domain (simulated by providing different information subsets). Compare LMSR market
      vs. arithmetic mean of stated beliefs vs. expert committee vote as aggregation
      mechanisms. Measure Brier score against ground truth. Prediction: LMSR achieves
      within 5% of Bayesian optimal aggregation; averaging achieves 30-50% worse Brier score.

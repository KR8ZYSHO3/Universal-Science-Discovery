id: h-ozone-recovery-timeline-ssst-interaction
title: >
  Antarctic ozone recovery to 1980 levels will occur by 2065-2070 for the
  spring column, but full recovery of the polar vortex ozone-loss altitude
  profile will lag by 10-15 years due to the residual stratospheric circulation
  response to past ODS loading, and warming-driven SST changes may partially
  offset CFC decline benefits before 2050.
status: active
priority: medium
impact_score: 0.65
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - atmospheric-chemistry
  - climate-science
  - stratospheric-physics
unknowns_addressed:
  - u-ozone-recovery-timeline
evidence_links:
  - doi: "10.1126/science.aag2561"
    type: supporting
    confidence: 0.72
    note: >
      WMO/UNEP (2018) Scientific Assessment: stratospheric ODS declining at
      expected rate; September ozone column showing upward trend since 2000
      of ~1-3% per decade; full column recovery to 1980 projected 2060-2070.
  - doi: "10.1029/2019GL083226"
    type: supporting
    confidence: 0.65
    note: >
      Ball et al. (2018) show ozone depletion continues in lower stratosphere
      (below 25 km) despite upper stratosphere recovery — total column may
      recover while lower stratosphere remains depleted.
  - doi: "10.1038/s41586-020-2528-5"
    type: related
    confidence: 0.60
    note: >
      Banerjee et al. (2020) attribute ozone-hole-driven changes in Southern
      Hemisphere circulation to CFC decline; recovery alters jet stream
      position and precipitation patterns.
proposed_tests:
  - description: >
      Analyse AURA MLS (microwave limb sounder) and Sentinel-5P TROPOMI ozone
      profiles from 2004-2026 for Antarctic spring (September-November).
      Fit linear trends at each pressure level (30-200 hPa). Test: is the
      recovery trend statistically significant (>2 sigma) and consistent with
      CCM model predictions at all altitude levels, or is lower stratosphere
      recovery lagging modelled trajectory?

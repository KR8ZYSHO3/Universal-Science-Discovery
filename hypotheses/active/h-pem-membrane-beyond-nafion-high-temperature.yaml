id: h-pem-membrane-beyond-nafion-high-temperature
title: >
  Non-PFSA proton exchange membranes operating at 120–200°C without external
  humidification will achieve proton conductivities >100 mS/cm and lifetimes
  >40,000 hours, enabling PEM electrolysers and fuel cells to operate at higher
  efficiency and lower cost than Nafion-based systems
status: active
priority: high
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-nafion-degradation-mechanism-longevity
related_disciplines:
  - polymer-chemistry
  - electrochemistry
  - materials-science
evidence_links:
  - type: supporting
    confidence: 0.55
    note: "Polybenzimidazole (PBI) membranes doped with H₃PO₄ operate at 160–200°C with conductivity 50–100 mS/cm and excellent chemical stability; demonstrated in Serenergy H3-350 fuel cell systems."
  - type: supporting
    confidence: 0.50
    note: "High-temperature operation reduces CO poisoning of Pt catalyst (from <10 ppm at 80°C to >1000 ppm at 160°C), enabling use of lower-purity H₂ — a major cost advantage."
  - type: contradicting
    confidence: 0.45
    note: "H₃PO₄-doped PBI membranes suffer acid leaching under liquid water contact; hybrid high-T/low-T systems have not achieved the lifetime targets required for automotive (>5000 h) or stationary (>40,000 h) applications."
proposed_tests:
  - summary: >
      Fabricate and test 5 cm² MEAs with PBI/H₃PO₄ membranes under AST protocols
      (open-circuit voltage hold, start-stop cycling, freeze-thaw) at 160°C; measure
      fluoride emission rate, proton conductivity retention, and power density
      vs. Nafion 212 baseline under identical current densities.

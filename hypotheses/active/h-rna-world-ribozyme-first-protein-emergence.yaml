id: h-rna-world-ribozyme-first-protein-emergence
title: >
  The ribosome is a frozen accident of the RNA world: the peptidyl transferase center
  evolved as a ribozyme before proteins existed, and the gradual replacement of
  ribozyme catalysts by protein enzymes occurred via a Darwinian takeover in which
  RNA retained only the reactions it could not be displaced from.

proposed_tests:
  - description: >
      Engineer a minimal ribosome using only the phylogenetically ancient RNA core
      (identified by Bokov & Steinberg as pre-existing all three kingdoms of life)
      without any ribosomal proteins. Test whether this minimal ribozyme can catalyze
      peptide bond formation between amino-acyl tRNAs with detectable activity above
      background uncatalyzed rate.
    method: "In vitro assembly of ancient RNA core fragments identified by phylogenetic mapping; peptide bond formation assay using [³⁵S]-Met-tRNA substrates; HPLC and autoradiography detection of dipeptide product"
    prediction: "Minimal RNA core retains ≥1% of full ribosome peptidyl transferase activity — sufficient to demonstrate catalytic functionality without protein cofactors"
  - description: >
      Reconstruct the evolutionary trajectory from a primordial all-RNA ribosome to
      the modern RNA-protein ribosome by directed evolution: start from a functional
      ribozyme core, introduce protein cofactors one at a time (in order of phylogenetic
      antiquity), and measure kinetic improvement at each step. This would directly test
      the RNA-world ribozyme-first hypothesis and identify the minimal protein additions
      needed for ribosomal function.
    method: "Sequential co-reconstitution experiments adding r-proteins in phylogenetic order; measure kcat and Km for each stage; use cryo-EM to visualize structural changes"
    prediction: "Each early protein addition provides a specific kinetic benefit (fidelity, speed, or thermostability) that explains why it was evolutionarily retained — consistent with incremental Darwinian optimization"


id: h-frb-gue-universality-magnetar
title: >
  The inter-burst waiting time distributions of high-rate repeating FRB sources
  (>500 detected bursts) belong to the Gaussian Unitary Ensemble (GUE) universality
  class of random matrix theory, encoding the time-reversal symmetry breaking of
  magnetar crustal dynamics under strong magnetic fields, and distinguishing the
  quantum-chaotic emission mechanism from self-organized criticality alternatives.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: medium
impact_score: 0.58
related_disciplines:
  - astrophysics
  - mathematics
  - statistical-physics
  - quantum-chaos
unknowns_addressed:
  - u-fast-radio-burst-origin
  - u-frb-waiting-time-universality
evidence_links:
  - type: supporting
    arxiv: "2109.11535"
    note: >
      Xu et al. (2022) - FRB 20201124A shows non-Poissonian waiting times with
      Weibull k ~ 0.6; sub-Poissonian at short times is consistent with RMT level
      repulsion (though not conclusive)
    confidence: 0.45
  - type: supporting
    arxiv: "2107.02279"
    note: >
      CHIME/FRB (2021) - power-law burst energy distributions and non-Poissonian
      clustering in repeaters; SOC-like statistics that overlap with RMT predictions
      at current sample sizes
    confidence: 0.40
  - type: contradicting
    note: >
      Self-organized criticality (SOC) models of magnetar crustal avalanches also
      produce sub-Poissonian short-time suppression and power-law tails, and are
      well-motivated physically. Distinguishing SOC from RMT requires the 3-point
      function (spectral rigidity), which requires >1000 bursts from a single source
      not yet available.
  - type: contradicting
    note: >
      Detection threshold effects and telescope scheduling windows create artificial
      waiting-time suppression at short times, mimicking RMT level repulsion without
      any physical mechanism.
proposed_tests:
  - discipline: astrophysics
    description: >
      Apply standard RMT diagnostics (nearest-neighbor spacing distribution, spectral
      rigidity Delta_3, number variance Sigma^2) to the CHIME/FRB and FAST repeater
      catalogs for sources with >300 detected bursts. Fit to GOE, GUE, and Poisson
      distributions using maximum likelihood; a GUE fit requires chi^2 per dof < 1.5
      with the Poisson fit rejected at >3-sigma.
  - discipline: mathematics
    description: >
      Analytically derive the waiting-time distribution for a GUE-class system with
      N = 10-100 degrees of freedom and compare with the FRB observational window
      (CHIME detection threshold ~1 Jy ms fluence). Determine what minimum burst
      count N_bursts is needed to distinguish GUE, GOE, and SOC at 3-sigma.
  - discipline: astrophysics
    description: >
      Apply the same RMT analysis to SGR 1935+2154 magnetar burst catalogs from
      INTEGRAL, Fermi/GBM, and NICER. If galactic magnetar bursts and extragalactic
      FRB repeaters share the same RMT universality class, this strongly supports
      the magnetar origin model for FRBs.

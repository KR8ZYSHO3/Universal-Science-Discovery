id: h-biodegradable-electronics-cellulose
title: >
  Cellulose nanofiber transistors with degradation triggered by enzymatic exposure
  can achieve mobility > 1 cm²/V·s and on/off ratio > 10^6, meeting the
  electrical performance threshold for implantable biosensors while degrading
  within 30 days in physiological conditions.
status: active
priority: medium
impact_score: 0.67

proposed_tests:
  - description: >
      Fabricate cellulose nanofiber (CNF) transistor arrays with indigo-based
      organic semiconductor channel. Measure mobility, on/off ratio, subthreshold
      swing. Immerse in PBS at 37°C + cellulase 0.1 U/mL. Measure electrical
      performance degradation curve over 90 days. Target: >1 cm²/V·s maintained
      for 7 days, complete degradation by 30 days.
  - description: >
      In vitro cytotoxicity: expose degradation products to HEK293 and PC12 cells
      at 10× expected in vivo concentration. Measure LDH release and mitochondrial
      activity (MTT assay) at 24h, 72h, 7 days. Pass criterion: cell viability >90%.

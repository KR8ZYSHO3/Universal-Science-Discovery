id: h-aesthetic-preference-reward-prediction-error
title: >
  Aesthetic preference arises from predictive coding in hierarchical sensory cortex:
  artworks that generate optimal prediction errors — neither too predictable nor too
  surprising — produce the strongest aesthetic response, with individual differences
  in preference reflecting differences in learned priors from exposure history.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-aesthetic-preference-neural-basis
related_disciplines:
  - neuroaesthetics
  - cognitive-science
  - neuroscience
  - computational-neuroscience
evidence_links:
  - type: supporting
    doi: 10.1016/j.neuron.2019.01.031
    note: >
      Rao & Ballard (1999) — predictive coding in visual cortex; prediction errors
      propagate upward in hierarchy. Aesthetic response could reflect top-down
      prediction quality.
  - type: supporting
    doi: 10.1126/science.1236498
    note: >
      Vessel et al. (2012) — highly moving art activates default mode network,
      suggesting self-referential processing of prediction errors about one's
      own emotional state.
proposed_tests:
  - discipline: neuroaesthetics
    description: >
      Present 200 artworks with varying statistical complexity (fractal dimension
      D, entropy H) to 50 participants in fMRI. Measure BOLD response in V1, V4,
      and orbitofrontal cortex. Aesthetic rating collected post-scan. Hypothesis:
      aesthetic rating is highest for artworks with intermediate D and H values,
      and OFC response correlates with aesthetic rating while V1 prediction error
      signal correlates with complexity independently of aesthetics.

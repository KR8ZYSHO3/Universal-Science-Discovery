    doi: 10.1038/s41550-023-02125-9
    note: >
      Dekel et al. (2023) — "Blue Nuggets" model: feedback-free starbursts in
      compact high-z galaxies naturally produce high stellar mass fractions
      without violating ΛCDM structure formation.
  - type: supporting
    doi: 10.1126/science.adf5307
    note: >
      Labbe et al. (2023) Science — JWST discovery of massive galaxy candidates
      at z~7-10; stellar masses 10^10-10^11 M_sun challenging standard models.
proposed_tests:
  - discipline: astrophysics
    description: >
      Run cosmological zoom simulations (IllustrisTNG or FIRE-3) of 10 high-peak
      density regions at z>15 with standard vs reduced feedback efficiency
      (ε_feedback = 0.01, 0.1, 1.0). Measure stellar mass function at z = 7-12.
      Hypothesis: feedback efficiency ε < 0.1 reproduces the JWST-observed
      stellar mass function at z > 10 without invoking modified initial mass
      function or non-standard dark matter.

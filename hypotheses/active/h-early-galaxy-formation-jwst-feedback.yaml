id: h-early-galaxy-formation-jwst-feedback
title: >
  The anomalously massive galaxies at z > 10 observed by JWST are explained by
  reduced supernova feedback efficiency in the early universe — either due to rapid
  gas recycling in compact high-redshift disks or bursty star formation that
  temporarily suppresses feedback — rather than requiring modifications to ΛCDM.
status: active

      Analyze the FCC 2017 Incentive Auction outcome: compare realized broadcaster
      exit payments to theoretical VCG payments for the same allocation. Test whether
      the deviation from VCG-optimal (efficiency loss) correlates with the degree of
      complementarity in geographic license bundles, as predicted by mechanism design theory.

id: h-turing-digit-count-bmp-gradient-wavelength-scaling
title: >
  The Turing pattern wavelength in mouse limb digit formation scales as λ ∝ √(D_BMP/f_Sox9)
  with D_BMP and f_Sox9 independently measurable by in vivo FRAP and optogenetic
  perturbation, predicting digit number as a function of limb bud width L as
  N_digits = L/λ — directly testable by BMP2 dosage titration that rescales λ and
  changes digit count.
status: active
priority: high
impact_score: 0.81

id: h-regional-sea-level-acceleration-grd-fingerprint
title: >
  Regional sea level accelerations exceeding the global mean by factors of
  2-5 are primarily driven by gravitational-rotational-deformational (GRD)
  fingerprints of specific ice loss sources, particularly the Greenland Ice
  Sheet contributing disproportionate sea level rise to US East Coast and
  Antarctic melt contributing disproportionately to tropical Pacific regions.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - geophysics
  - physical-oceanography
  - glaciology
  - geodesy

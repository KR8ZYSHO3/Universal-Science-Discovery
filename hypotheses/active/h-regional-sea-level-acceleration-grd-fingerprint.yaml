  - u-regional-sea-level-acceleration
evidence_links:
  - doi: "10.1146/annurev-earth-071114-040893"
    type: supporting
    confidence: 0.72
    note: >
      Mitrovica et al. (2001, 2011) GRD fingerprint theory: melting of
      Greenland decreases gravitational attraction of ocean toward ice sheet,
      causing sea level fall near Greenland but 20-30% amplification on US
      East Coast relative to global mean.
  - doi: "10.1002/2016GL068560"
    type: supporting
    confidence: 0.68
    note: >
      Kopp et al. (2017) tide gauge analysis: US East Coast sea level rise
      1.5-4× global mean rate; GRD fingerprinting attributes 30-60% of the
      excess to Greenland mass loss.
  - doi: "10.1038/s41586-021-03343-3"
    type: related
    confidence: 0.62
    note: >
      IMBIE Team (2020) Greenland mass balance synthesis: 1992-2018 Greenland
      contributed 10.8 mm to global SLR with accelerating trend post-2012.
proposed_tests:
  - description: >
      Use GRACE/GRACE-FO satellite gravity data to construct monthly GRD
      fingerprint maps for Greenland and Antarctic mass loss (2002-2026).
      Compare predicted regional sea level pattern against altimetry
      (Sentinel-6/Jason-3) and tide gauge observations at 50+ stations.
      Test: does the GRD fingerprint explain >60% of the regional variance
      in sea level acceleration after removing ocean heat content (steric)
      signal?

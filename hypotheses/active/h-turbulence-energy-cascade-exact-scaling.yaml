evidence_links:
  - type: supporting
    doi: 10.1098/rspa.1991.0075
    note: >
      Kolmogorov (1941) — K41 theory; exact 4/5 law; inertial range scaling
      ⟨(δu)^2⟩ ∝ (ε·r)^{2/3} up to intermittency corrections.
  - type: related
    doi: 10.1017/S002211209400341X
    note: >
      Frisch (1995) — turbulence and multifractals; survey of intermittency
      corrections; universal multifractal spectrum hypothesis.
proposed_tests:
  - discipline: physics
    description: >
      Analyze high-Re turbulence datasets from three geometrically distinct flows:
      (1) grid turbulence (Re_λ ≈ 1000, Comte-Bellot & Corrsin data), (2) atmospheric
      boundary layer (Re_λ ≈ 10,000, CASES-99 sonic anemometer), (3) von Karman
      swirling flow (Re_λ ≈ 2000, VKS experiment). Compute velocity structure
      functions S_n(r) = ⟨|δu|^n⟩ for n = 2-8. Extract scaling exponents ζ_n.
      Hypothesis: the multifractal spectrum f(α) derived from ζ_n is the same
      (within error bars) for all three flows, with the She-Lévêque prediction
      ζ_n = n/9 + 2[1-(2/3)^{n/3}] providing the best fit.

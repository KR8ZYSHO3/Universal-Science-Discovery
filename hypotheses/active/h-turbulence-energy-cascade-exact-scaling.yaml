id: h-turbulence-energy-cascade-exact-scaling
title: >
  Kolmogorov's 4/5 law is the only exact result in turbulence theory and implies that
  the velocity structure function ⟨(δu)^3⟩ = -(4/5)ε·r is universal; deviations from
  K41 scaling in higher-order moments (intermittency corrections) are described by a
  universal multifractal spectrum f(α) that is the same for all high-Reynolds-number
  turbulent flows regardless of boundary conditions or forcing.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:

proposed_tests:
  - description: >
      Compare angular momentum of stellar disks to halo spin in IllustrisTNG cosmological
      simulation across z=0-3. Test whether disk j/j_halo ratio correlates with
      feedback strength proxy (stellar feedback energy). Observational test: compare
      j*-M* relation for isolated galaxies vs cluster satellites (reduced feedback).
    prediction: "Cluster satellites have j/j_halo~0.4 vs isolated disks ~0.7; scatter in size-mass relation correlates with feedback energy (r>0.5)."

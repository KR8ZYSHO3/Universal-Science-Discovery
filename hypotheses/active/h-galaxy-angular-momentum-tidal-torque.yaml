id: h-galaxy-angular-momentum-tidal-torque
title: >
  Galaxy disk sizes are set primarily by the angular momentum acquired via tidal
  torque theory during linear growth, with secondary regulation by feedback-driven
  outflows that selectively eject low-angular-momentum gas, explaining the observed
  size-mass relation scatter as feedback efficiency variation.

id: h-molecular-spectroscopy-x-matrix-diagonalization
title: >
  Anharmonic corrections up to fourth order in curvilinear coordinates will reduce out-of-sample IR peak prediction error by a fixed margin relative to harmonic-only diagonalization for a benchmark set of small hydrogen-bonded clusters — with error correlated to condition number of the mass-weighted Hessian.

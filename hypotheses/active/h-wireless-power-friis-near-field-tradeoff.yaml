id: h-wireless-power-friis-near-field-tradeoff
title: >
  Resonant inductive wireless power transfer efficiency follows a universal
  coupling-Q product figure of merit (η ∝ κ²/Γ₁Γ₂ in coupled mode theory),
  and far-field beamed power efficiency is fundamentally limited by beam divergence
  (Friis equation) — no configuration can simultaneously achieve high efficiency
  and long range without aperture scaling.

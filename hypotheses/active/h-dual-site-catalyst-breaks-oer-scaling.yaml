id: h-dual-site-catalyst-breaks-oer-scaling
title: >
  Dual-site OER catalysts with heterogeneous adjacent metal pairs (M1-M2 with
  M1 ≠ M2) can break the universal OHH*/OH* scaling relation by binding OOH*
  through a bridging configuration that is geometrically decoupled from the
  single-site OH* binding, reducing OER overpotential below 0.25 V.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
related_disciplines:
  - electrochemistry
  - computational-chemistry
  - materials-science
unknowns_addressed:
  - u-oer-scaling-relation-break
evidence_links:
  - type: supporting
    note: >
      Govindarajan et al. (2022) Nature Materials: computed that dual-site
      RuO₂/IrO₂ heterojunctions show asymmetric intermediate binding that
      partially breaks the scaling relation in DFT calculations.
  - type: supporting
    note: >
      Speck et al. (2020) Chem. Sci.: iron-nickel oxide with identified dual-Fe-Ni
      site shows OER onset potential below 1.45 V vs RHE (overpotential ~ 0.22 V)
      — among the lowest reported for earth-abundant catalysts.
  - type: contradicting
    note: >
      Many claimed "scaling-relation-breaking" catalysts have not been validated
      with operando measurements; the active site under reaction conditions often
      differs from as-synthesized structure. The reported low overpotentials may
      reflect measurement artifacts or surface reconstruction.
proposed_tests:
  - discipline: electrochemistry
    description: >
      Prepare a series of M1-M2 dual-site catalysts (Ni-Fe, Co-Fe, Ir-Ru) by
      atomic layer deposition on conductive substrates with controlled nearest-neighbor
      site spacing. Measure OER activity (Tafel slope, overpotential at 10 mA/cm²)
      and use operando X-ray absorption spectroscopy (XAS) to identify the active site
      oxidation state. Correlate DFT-computed ΔG_OOH* − ΔG_OH* for the dual-site with
      measured overpotential to directly test scaling relation breaking.
  - discipline: computational-chemistry
    description: >
      DFT screening of 100+ M1-M2 oxide combinations for dual-site OER with explicit
      water solvation (hybrid DFT + implicit solvation). Map ΔG_OOH* vs ΔG_OH*
      for bridging vs terminal OOH* adsorption modes. Identify candidates where
      bridging OOH* escapes the ΔG ≈ 3.2 eV constraint.

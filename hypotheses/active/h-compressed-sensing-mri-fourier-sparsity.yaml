proposed_tests:
  - summary: >
      In a prospective clinical MRI study, compare diagnostic quality (radiologist blinding,
      SNR, artifact metrics) between (a) fully sampled k-space MRI and (b) compressed sensing
      MRI with 5x undersampling on the same patients. Measure the fraction of k-space sampled
      at which diagnostic equivalence breaks down (defining the actual compression ratio limit).

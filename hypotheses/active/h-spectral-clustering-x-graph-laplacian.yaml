id: h-spectral-clustering-x-graph-laplacian
title: Random-walk Laplacian L_rw spectral clustering achieves 20% better Normalised Mutual Information than unnormalised
  L clustering on power-law degree graphs (γ < 2.5) by correctly weighting high-degree hub nodes, while symmetric L_sym is
  optimal for regular and near-regular graphs

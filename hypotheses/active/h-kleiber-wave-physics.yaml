id: h-kleiber-wave-physics
title: >
  Kleiber's 3/4 metabolic scaling law is uniquely derivable from impedance-matching
  constraints on pulsatile wave propagation in arterial trees — and is distinguishable
  from the fractal-network theory by organisms with non-pulsatile circulation.
status: active
created: "2026-05-04"
last_updated: "2026-05-04"
priority: high
related_disciplines:
  - biological-physics
  - physiology
  - fluid-dynamics
  - scaling-theory
unknowns_addressed:
  - u-kleiber-pulsatile-waves
evidence_links:
  - type: supporting
    arxiv: "2604.10476"
    note: Dynamic origin of Kleiber's Law — derives 3/4 exponent from pulsatile wave physics rather than fractal steady-state geometry
  - type: contradicting
    doi: 10.1126/science.276.5309.122
    note: West, Brown, Enquist 1997 — fractal-network theory predicts same 3/4 exponent from different mechanism; cannot be distinguished in organisms with pulsatile pulsatile circulation
  - type: related
    note: >
      Organisms with open circulatory systems (most insects) or diffusion-limited oxygen
      delivery (nematodes, very small invertebrates) may show different scaling exponents
      because neither wave physics nor fractal-network geometry applies — these are the
      discriminating test systems.
proposed_tests:
  - discipline: physiology
    description: >
      Compile allometric scaling data for metabolic rate across three classes of organisms:
      (1) vertebrates with pulsatile closed circulatory systems, (2) insects with open
      circulatory systems, (3) nematodes with diffusion-limited oxygen delivery. Fit
      separate power laws to each class. The wave-physics theory predicts 3/4 only for
      class (1); the fractal-network theory predicts 3/4 for all three if fractal branching
      is present in all. A deviation from 3/4 in class (2) or (3) would distinguish the theories.
  - discipline: fluid-dynamics
    description: >
      In ex-vivo arterial tree preparations (rat or porcine), experimentally change the
      pulsatility of flow (by coupling to a Windkessel pump at varying pulse frequencies)
      while holding total flow rate constant. Measure how metabolic rate of the tissue
      supplied changes with pulse frequency. The wave-physics theory predicts that removing
      pulsatility degrades metabolic efficiency; the fractal-network theory (which depends
      only on steady-state geometry) predicts no dependence on pulsatility.
  - discipline: biological-physics
    cross_domain_angle: >
      Apply renormalisation-group analysis (borrowed from statistical physics) to the
      vascular branching hierarchy. If the 3/4 exponent is a fixed-point of the wave-physics
      renormalisation, it should be robust to changes in branching geometry — testable by
      comparing organisms with highly irregular (non-fractal) vascular trees that nevertheless
      obey Kleiber's law. This would simultaneously strengthen b-metabolic-scaling-renormalization
      as a new bridge candidate between fluid dynamics and statistical physics.
  - discipline: evolutionary-biology
    cross_domain_angle: >
      The evolutionary history of the cardiovascular system from open (arthropod) to closed
      pulsatile (vertebrate) represents a natural experiment. Test whether the transition to
      closed pulsatile circulation coincides with adoption of 3/4 scaling (vs. 2/3 or other
      exponents) in the fossil record proxy data (body-size evolution rates, estimated
      metabolic demands). This would provide a deep-time test of which mechanism drove
      the emergence of Kleiber's Law.

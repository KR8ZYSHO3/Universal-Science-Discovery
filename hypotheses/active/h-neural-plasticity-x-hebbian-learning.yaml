proposed_tests:
  - description: Train a recurrent spiking neural network with three-factor STDP (eligibility trace τ_e = 20ms, 100ms, 200ms) on a delayed-match-to-sample task with reward delivered 0.5s after correct response; compare performance to two-factor STDP (no reward modulation) and to BPTT-trained equivalent network; measure whether network activity in the delay period encodes task-relevant information as predicted by the policy gradient interpretation.

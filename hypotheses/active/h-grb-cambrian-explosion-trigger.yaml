id: h-grb-cambrian-explosion-trigger
title: >
  The Late Ordovician mass extinction (443 Mya) was initiated by a long-duration
  gamma-ray burst within 2 kpc that destroyed more than 50% of Earth's ozone
  column, producing an ultraviolet-driven kill pattern preferentially eliminating
  shallow-marine and surface taxa while sparing deep-water organisms — a signature
  distinguishable from climate-driven and bolide-impact extinction patterns.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: medium
impact_score: 0.68
related_disciplines:
  - astrobiology
  - paleontology
  - evolutionary-biology
  - astrophysics
unknowns_addressed:
  - u-grb-mass-extinction-link
  - u-uhecr-origin
evidence_links:
  - type: supporting
    doi: "10.1086/426926"
    note: >
      Melott et al. (2004) - quantitative GRB ozone depletion model; 10-second GRB
      at 2 kpc removes ~47% of ozone column; UV flux increase is lethal to phytoplankton
    confidence: 0.55
  - type: supporting
    doi: "10.1017/S1473550408004412"
    note: >
      Melott & Thomas (2009) - Ordovician extinction selectivity (depth-stratified
      survival) matches UV kill hypothesis; climate cooling is insufficient to explain
      the selectivity pattern
    confidence: 0.50
  - type: contradicting
    note: >
      The Ordovician extinction is strongly correlated with rapid glaciation (Hirnantian
      glaciation) and sea-level fall. Glaciation alone can explain preferential loss of
      shallow warm-water taxa without invoking a GRB. The GRB hypothesis is difficult
      to distinguish from glaciation at fossil record resolution.
  - type: contradicting
    note: >
      The Milky Way's long GRB rate is estimated at ~0.1 per Myr within 2 kpc, making
      the probability of a GRB coinciding with the Ordovician within dating uncertainty
      (~1 Myr) only ~10%. The a priori probability is low, requiring additional
      corroborating evidence (e.g., cosmogenic isotope spike at the extinction boundary).
proposed_tests:
  - discipline: geochemistry
    description: >
      Search for a cosmogenic isotope spike (^10Be, ^26Al, ^53Mn) in Ordovician-Silurian
      boundary sediments. A GRB within 2 kpc would produce a sharp cosmogenic isotope
      anomaly coinciding with the extinction horizon, distinct from the gradual increase
      expected from glaciation-driven sea level change.
  - discipline: paleontology
    description: >
      Systematic stratigraphic analysis of Ordovician extinction selectivity by
      paleowater depth and light exposure. If UV is the kill mechanism, survival
      probability should increase monotonically with reconstructed depth,
      distinguishing GRB from temperature-driven extinction.
  - discipline: astrophysics
    description: >
      Improved Milky Way long GRB rate estimates from short-duration radio transient
      surveys and historical supernova remnant catalogs. Better constraining the
      rate within 2 kpc over the past 500 Myr sharpens the a priori probability
      of a GRB-Ordovician coincidence.

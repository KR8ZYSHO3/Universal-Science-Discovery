id: h-geomagnetic-reversal-climate-null
title: >
  Geomagnetic excursions and reversals do not produce detectable climate signals
  because the cosmic ray flux increase during low-dipole periods (< 4000 nT)
  is too small (~10%) to significantly affect cloud nucleation above the level
  of solar cycle variability — the proposed GCR-climate link lacks the dynamic
  range to drive the observed correlations.
status: active
priority: medium
impact_score: 0.65
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-geomagnetic-excursion-climate
evidence_links:
  - type: supporting
    note: "Svensmark (2007) GCR-cloud hypothesis: GCR flux changes of 15% over solar cycle produce measurable cloud changes — low-field reversal produces similar magnitude"
    confidence: 0.55
  - type: contradicting
    note: "Erlykin et al. (2013) cloud cover does not correlate with GCR at required timescale — CLOUD experiment (CERN) shows nucleation rate insufficient at tropospheric conditions"
    confidence: 0.72
  - type: related
    note: "Channell et al. (2009) Iceland Basin excursion (188 ka): no climate signal in ice core or marine sediment records at reversal timing"
    confidence: 0.68
proposed_tests:
  - description: >
      Paleoclimate comparison: compile 15 geomagnetic excursion events (Laschamp,
      Iceland Basin, Blake, Mono Lake) and corresponding marine sediment climate
      records (δ¹⁸O stack). Apply superposed epoch analysis aligned to excursion
      midpoint. Test: δ¹⁸O anomaly during excursion > 2σ of background variability.
      Null hypothesis: no climate signal.
  - description: >
      CLOUD chamber simulation: measure ion-induced nucleation rate at GCR flux
      levels corresponding to a dipole field of 2000 nT (Laschamp minimum, ~2×
      modern flux). Calculate cloud condensation nuclei production rate.
      Compare to solar cycle amplitude — test if reversal GCR enhancement exceeds
      Maunder Minimum amplitude in cloud-relevant aerosol production.
related_disciplines:
  - paleomagnetism
  - paleoclimatology
  - atmospheric-physics

id: h-gwb-spectrum-supermassive-bh-binaries
title: >
  The nanohertz gravitational wave background detected by pulsar timing arrays is
  dominated by a stochastic superposition of gravitational waves from supermassive
  black hole binary inspirals, with a characteristic strain spectrum h_c(f) ∝ f^{-2/3}
  confirming the circular inspiral origin, and the amplitude encoding the SMBHB merger
  rate × mass function.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-gwb-spectrum
related_disciplines:
  - astrophysics
  - gravitational-physics
  - observational-astronomy
evidence_links:
  - type: supporting
    doi: 10.48550/arXiv.2306.16213
    note: >
      NANOGrav (2023) — 15-year data set; Bayes evidence for GWB over uncorrelated
      noise; Hellings-Downs correlation consistent with GW origin; amplitude
      A = 2.4e-15 at f=1/yr consistent with SMBHB model.
  - type: supporting
    doi: 10.1051/0004-6361/202346844
    note: >
      EPTA (2023) — independent confirmation of GWB with consistent amplitude;
      spectral slope consistent with f^{-2/3} but upper range consistent with
      contributions from new physics sources.
proposed_tests:
  - discipline: astrophysics
    description: >
      Analyze 5-year extension of IPTA dataset combining NANOGrav, EPTA, PPTA,
      InPTA (2023-2028). Fit power-law spectral model h_c ∝ A × (f/yr^{-1})^{-2/3+β}.
      Measure β and amplitude A with improved sensitivity. Hypothesis: β = 0 at
      2σ (consistent with circular GR inspiral), and the measured amplitude A
      is within 3σ of the SMBHB merger rate prediction from the Illustris
      cosmological simulation, ruling out new physics origins at 3σ.

id: h-optogenetic-restoration-vision-scales-to-complex-percepts
title: >
  Optogenetic vision restoration in retinitis pigmentosa will scale from detection
  of motion and high-contrast objects (demonstrated 2021) to recognition of faces
  and reading text within 5 years, as improved opsins (faster kinetics, red-shifted
  sensitivity), higher density transduction, and adaptive goggles are combined.
status: active
priority: high
impact_score: 0.80
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1038/s41591-021-01351-4"
    type: supporting
    confidence: 0.80
    note: "Sahel et al. (2021): first human restored partial vision with ChrimsonR + amber goggles — proof that the approach works"
  - type: supporting
    confidence: 0.70
    note: "CNGB3 and PDE6B RP mutations respond well to AAV2 transduction of retinal ganglion cells — gene therapy precedent (Maguire 2009 NEJM for RPE65)"
  - type: supporting
    confidence: 0.65
    note: "Soma-targeted ChrimsonR (soChrimsonR) achieves >100 Hz photocurrents at low light intensities — faster kinetics needed for motion perception established in primate retina"
  - type: contradicting
    confidence: 0.45
    note: "Retinal ganglion cell-targeted optogenetics bypasses the entire photoreceptor-bipolar processing chain — the resulting percepts may be fundamentally limited in quality by lack of center-surround organization and spectral encoding"

unknowns_addressed:
  - u-optogenetics-human-therapeutic-scale-delivery

proposed_tests:
  - description: >
      Enroll 10 retinitis pigmentosa patients (no light perception) in a trial
      with optimized next-generation opsin (FAST-ChR2 or ChrimsonR variants with
      peak sensitivity at 590 nm) delivered by AAV2 to surviving retinal ganglion
      cells. Goggles amplify ambient light to activating intensity and spatially
      encode scene onto retinal mosaic. Primary endpoint: letter chart reading at
      24 months (Snellen equivalent). Secondary: facial recognition (CFMT), object
      detection (4AFC), and reported quality of life (VFQ-25).
    method: "Phase II gene therapy trial; standardized visual testing battery; psychophysics before and 6/12/18/24 months post injection"
    prediction: "40% of patients achieve Snellen 20/200 or better at 24 months; 70% detect faces in 4AFC; all show measurable improvement on VFQ-25"

related_disciplines:
  - gene-therapy
  - ophthalmology
  - neuroscience

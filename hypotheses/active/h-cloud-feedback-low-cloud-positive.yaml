evidence_links:
  - type: supporting
    doi: 10.1038/s41558-018-0310-1
    note: >
      Zelinka et al. (2020) — emergent constraints on low-cloud feedback;
      models with positive low-cloud shortwave feedback better reproduce
      observed seasonal cycle, suggesting net positive cloud feedback.
  - type: related
    doi: 10.1175/BAMS-D-14-00261.1
    note: >
      Myers & Norris (2016) — observational evidence for positive low-cloud
      feedback in northeast Pacific; cloud fraction decreases with SST in
      Lagrangian air mass analysis.
proposed_tests:
  - discipline: climate-science
    description: >
      Analyze CERES-EBAF Edition 4.1 (2000-2023) low cloud fraction anomalies in
      the 5 major subtropical stratocumulus regions (northeast/southeast Pacific,
      northeast/southeast Atlantic, South Indian Ocean). Regress monthly low-cloud
      fraction anomalies against tropical mean SST anomalies after removing
      El Niño-driven variability (ENSO regression). Hypothesis: all 5 regions show
      negative partial correlation between SST and low-cloud fraction at p < 0.05,
      with the regression coefficient implying a net cloud shortwave feedback
      of +0.4 to +0.8 W/m²/K when integrated over the global subtropical belt.

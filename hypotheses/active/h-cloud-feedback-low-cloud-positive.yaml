id: h-cloud-feedback-low-cloud-positive
title: >
  The net cloud feedback to CO2 forcing is positive (destabilizing), dominated by
  low-cloud reduction in the subtropical subsidence regions, with a magnitude of
  +0.4 to +0.8 W/m²/K, and this is detectable in the emerging observational
  record of low-cloud fraction trends in CERES satellite data 2000-2030.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-cloud-feedback-sign

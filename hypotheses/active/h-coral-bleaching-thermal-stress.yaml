proposed_tests:
  - description: "During the next major bleaching event (predicted 2026-2028 under El Niño), image 100 reef sites with known symbiont community composition (clade C vs D fraction from qPCR) using Sentinel-2 and NOAA CRW DHW data; test logistic regression of bleaching probability on DHW × symbiont clade interaction."
  - description: "Mesocosm experiment: expose 40 coral colonies (20 clade C, 20 clade D holobionts) to controlled thermal ramp (+0.5°C/week to +4°C above MMM); measure daily bleaching score and Fv/Fm; fit dose-response curves for each clade and compare EC50 values."

proposed_tests:
  - summary: >
      Use Perturb-seq combinatorial CRISPR screens in a cancer cell line to measure
      the effective connectivity K (fraction of gene pairs showing significant regulatory
      interaction above noise floor). Compare measured K to the Kauffman critical value K=2.
      Test whether the number of observed stable attractors (defined as return-to-baseline
      after perturbation) matches the sqrt(N) prediction for the measured N and K.

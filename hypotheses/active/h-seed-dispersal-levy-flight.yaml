proposed_tests:
  - description: "Measure gut retention time distributions for 10 bird species using radio-tagged seeds; fit to exponential and power-law models using MLE with likelihood ratio test; predict resulting dispersal kernel tail exponent; compare to GPS-tracked seed dispersal data."
  - description: "Test whether the Lévy exponent of the dispersal kernel correlates with the Lévy exponent of the disperser's own movement path using GPS tracks (Lévy exponent estimated by MLE of step lengths)."

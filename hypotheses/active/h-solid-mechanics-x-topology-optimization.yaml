proposed_tests:
  - description: Implement SIMP with p=3, filter radius r=2h for cantilever beam with single tip load on meshes h = L/50, L/100, L/200, L/400 (L = beam length); compute compliance C(h) and compare to analytical Michell truss compliance C_Michell; fit power law C(h) - C_Michell ∝ h^α; estimate convergence rate α; repeat for two-load cantilever (tip + midspan); test whether single-load converges (α > 0) and two-load diverges (oscillating compliance) using paired t-test across mesh refinements.

proposed_tests:
  - description: Use a 10-qubit superconducting quantum processor to prepare a central qubit in superposition coupled to an 8-qubit environment; measure mutual information between central qubit and environmental sub-registers of increasing size; verify that the plateau of mutual information (indicating redundant encoding) scales with environmental fragment size as predicted by quantum Darwinism; compare decoherence time to einselection time constant.

proposed_tests:
  - summary: >
      Near-quantum-limit Landauer erasure experiments: measure heat dissipation per bit erasure
      approaching k_B T ln 2 using colloidal particles in optical traps at millikelvin temperatures.
      Confirm the bound holds for quantum as well as classical bits.
  - summary: >
      CMB analysis for Penrose CCC predictions: search for concentric low-variance circles
      in temperature maps from Planck or future CMB-S4 data. Positive detection would support
      a geometric (Weyl curvature) origin of the arrow; null result favors information-theoretic accounts.
  - summary: >
      Algorithmic complexity estimate of cosmological initial conditions: use compressed size
      of CMB power spectrum as proxy for K(initial state). Compare to K(Boltzmann-brain state)
      to quantify the fine-tuning required by the low-entropy origin.

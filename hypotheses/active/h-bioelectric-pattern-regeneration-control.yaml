proposed_tests:
  - description: >
      Apply ivermectin (GlyR-gated Cl- channel agonist) topically to Xenopus stage-52 hindlimb blastemas
      for 24 h post-amputation to hyperpolarize the blastema to Vmem ~ -70 mV. Score digit number and
      identity at stage 62. Compare to vehicle control and to depolarizing monensin treatment.
    method: "Xenopus hindlimb regeneration assay; MIFE Vmem measurement; digit scoring by whole-mount in situ"
    prediction: "> 20% of ivermectin-treated limbs show supernumerary digit; < 5% in vehicle control"

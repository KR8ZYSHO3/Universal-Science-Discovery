proposed_tests:
  - description: >
      Collect a dataset of Twitter/X meme lineages (original post → retweets →
      mutations) with >10,000 variants per topic cluster. Assign trait values z
      (sentiment score, political valence, novelty). Compute Price equation
      decomposition: ΔZ̄ = Cov(retweet_count, z)/Z̄ + transmission_bias_term.
      Test: |Cov(retweet_count, z)| is significantly larger than expected under
      the neutral model (permutation test) for political topics but not for
      random/neutral content.
  - description: >
      Compare selection coefficients across 10 cultural domains (politics, food,
      sports, science, humour). Prediction: s is highest for political/emotional
      content (selection pressure from tribalism) and lowest for neutral content
      (drift dominates). Validated by comparing variants' fitness (retweet rate)
      between domains using ANOVA.

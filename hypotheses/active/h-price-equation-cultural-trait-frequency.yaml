id: h-price-equation-cultural-trait-frequency
title: >
  The Price equation decomposition applied to Twitter/X meme virality data
  reveals a significant cultural selection term (Cov(adoption rate, trait value)
  ≠ 0) distinguishable from neutral drift, with selection coefficient s > 0.01
  for politically and emotionally salient content categories.
status: active
priority: high
impact_score: 0.68
created: "2026-05-05"

id: h-grokking-criticality-universality
title: "Grokking is a second-order phase transition in the Ising universality class, detectable via finite-size scaling of hidden-layer intrinsic dimension"
status: active
created: "2026-05-05"
priority: high
impact_score: 0.9

evidence_links:
  - type: supporting
    doi: "10.48550/arXiv.2201.02177"
    note: "Power et al. (2022) document sudden generalisation with a sharp front in test accuracy — consistent with a sharp continuous transition"
  - type: supporting
    note: "Dimensional Criticality at Grokking (arXiv 2026 nlin:AO harvest 2026-05-04) measures intrinsic dimension halving at the grokking point — consistent with a symmetry-breaking order parameter"
  - type: related
    doi: "10.48550/arXiv.1412.0233"
    note: "Choromanska et al. (2015) connect DNN loss landscape to SK spin-glass free energy"

proposed_tests:
  - description: "Measure critical exponents beta and nu via finite-size scaling of hidden-layer intrinsic dimension across dataset sizes and model sizes; compare to 2D Ising values (beta=0.125, nu=1)"
  - description: "Test for first-order vs. second-order transition: measure variance of intrinsic dimension at the grokking point; divergent variance = second-order, bimodal distribution = first-order"
  - description: "Repeat across tasks (modular arithmetic, sparse parity, permutation groups); if exponents differ, multiple universality classes exist"

unknowns_addressed:
  - u-grokking-criticality-universality-class

id: h-complement-mediated-synapse-loss-drives-alzheimers-cognitive-decline
title: >
  Complement-mediated microglial synapse pruning (C1q-C3-CR3 pathway) is causally
  upstream of cognitive decline in Alzheimer's disease — and C1q or C3 inhibition
  will preserve synapses and slow cognitive decline in clinical trials, independent
  of amyloid plaque burden.
status: active
priority: high
impact_score: 0.84
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1016/j.cell.2007.10.036"
    type: supporting
    confidence: 0.78
    note: "Stevens et al. (2007): C1q-C3 required for developmental synapse pruning — established the molecular pathway"
  - type: supporting
    confidence: 0.75
    note: "Hong et al. (2016) Science: C1q and C3 are elevated at synapses in early Alzheimer's disease; C3 KO mice show synapse protection and cognitive preservation in 5xFAD model"
  - type: supporting
    confidence: 0.68
    note: "Complement inhibition (CR3 blockade) in mouse AD models reduces synaptic loss and improves Morris water maze performance — proof of concept"
  - type: contradicting
    confidence: 0.50
    note: "Amyloid immunotherapy trials (lecanemab, donanemab) partially address downstream synapse loss; whether complement inhibition adds benefit on top of amyloid clearance is unknown — may be redundant"

unknowns_addressed:
  - u-microglia-synapse-pruning-alzheimers-pathological-threshold

proposed_tests:
  - description: >
      Phase II clinical trial: early MCI patients with amyloid-positive PET,
      randomized to C1q inhibitor (ANX005 or similar) vs. placebo for 18 months.
      Primary endpoint: CSF synaptophysin/neurogranin (synaptic biomarkers).
      Secondary: CDR-SB cognitive scale, hippocampal volume by MRI, amyloid PET
      at baseline and 18 months.
    method: "Phase II double-blind RCT; n=200 (80% power for synaptophysin 30% reduction); CSF biomarkers at 0, 9, 18 months; MRI volumetry; amyloid PET"
    prediction: "C1q inhibitor reduces CSF neurogranin by >25% vs. placebo at 18 months; CDR-SB progression slows by >20%; effect independent of amyloid PET change (synapse protection separate from plaque clearance)"

related_disciplines:
  - neuroscience
  - immunology
  - neurodegeneration
  - clinical-trials

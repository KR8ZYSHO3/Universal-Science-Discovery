proposed_tests:
  - description: >
      Implement a two-node quantum repeater over 100 km fiber using AFC multimode
      memories in rare-earth crystals with 50 temporal modes. Measure entanglement
      distribution rate and fidelity. Scale analysis to predict 1000 km rate and
      test whether multiplexing advantage scales as predicted: rate × N_modes
      compared to single-mode baseline.

id: h-quantum-repeater-multimode-memory-distance
title: >
  Multiplexed quantum repeaters using multimode quantum memories (AFC protocol
  in Pr³⁺:Y₂SiO₅) with N = 100+ temporal modes and nestedentanglement
  swapping can distribute entanglement at rates > 1 Hz over 1000 km fiber,
  approaching the fundamental PLOB bound rate × distance limit and enabling
  practical intercontinental quantum key distribution without satellite links.

id: h-circadian-clock-x-feedback-oscillator
title: Temperature compensation arises from opposing temperature sensitivities of PER synthesis (Q₁₀ ≈ 2.5, increasing with
  T) and CKIε phosphorylation rate (Q₁₀ ≈ 0.4, decreasing with T due to substrate inhibition), with period set by their ratio
  rather than absolute rates

proposed_tests:
  - description: >
      Implement an explicit bit-reset protocol on a classical resonator-defined memory; vary ramp speed for
      adiabatic control segments versus abrupt resets while measuring heat deposited into the cryostat per cycle.
    method: >
      Calorimetric / thermometer ensemble near devices; synchronize gate clocks with measurement windows;
      compare reversible vs irreversible branch protocols within identical IO semantics.
    prediction: >
      Irreversible branch dissipates at least k_B T ln(2) per erased bit within experimental uncertainty at temperature T;
      reversible embedding avoids that floor until residual loss dominates.

  - description: >
      Sweep switching frequency at fixed protocol topology to locate crossover where loss mechanisms dominate Landauer budget.
    method: >
      Extract power vs frequency; separate Ohmic control-line dissipation from informational erasure counts.
    prediction: >
      Dissipation scales differently between regimes — empirical breakpoint informs engineering limits.


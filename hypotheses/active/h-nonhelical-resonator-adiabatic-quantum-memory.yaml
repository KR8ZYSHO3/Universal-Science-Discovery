id: h-nonhelical-resonator-adiabatic-quantum-memory
title: >
  Cryogenic high-Q non-helical resonators driven with reversible control protocols can exhibit measured energy per irreversible bit-reset approaching order-of-magnitude Landauer k_B T ln(2) once loss channels are separated — excluding stronger claims without calibrated erasure accounting.

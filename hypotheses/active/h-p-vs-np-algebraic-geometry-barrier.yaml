proposed_tests:
  - description: >
      Test GCT approach: prove that the permanent polynomial is not in the orbit
      closure of the determinant polynomial (Valiant's conjecture). This requires
      distinguishing representation-theoretic multiplicities - a concrete falsifiable
      prediction: if GCT is on the right track, explicit multiplicity formulas for
      small cases (n≤20) should differ for permanent vs determinant orbits.
    prediction: "GCT predicts: for n=10, the number of highest weight vectors in Sym^n(Sym^n C^n) exceeds perm_n orbit by verifiable multiplicative factor."

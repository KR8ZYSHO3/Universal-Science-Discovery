id: h-p-vs-np-algebraic-geometry-barrier
title: >
  The P≠NP conjecture will not be resolved by purely combinatorial or information-
  theoretic arguments; resolution requires fundamentally new algebraic geometry
  or quantum-information theoretic tools, because all known lower bound techniques
  (natural proofs, algebrization, relativization) are blocked by known barriers.

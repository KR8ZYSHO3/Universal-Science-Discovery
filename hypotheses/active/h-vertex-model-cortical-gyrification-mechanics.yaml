evidence_links:
  - doi: "10.1038/nphys3655"
    type: supporting
    confidence: 0.88
    note: >
      Tallinen et al. (2016) Nat Phys — 3D elastic simulation of cortical growth
      quantitatively reproduces sulcal pattern of human brain; buckling wavelength
      λ* matches observed sulcal spacing within 15%; tangential growth strain 30%
      is sufficient to produce observed gyrification index
  - doi: "10.1093/cercor/bhq005"
    type: supporting
    confidence: 0.80
    note: >
      Richman et al. (1975) — differential growth model predicts fold wavelength
      proportional to (E_outer/E_inner)^1/3 × cortical thickness; confirmed in
      polymer bilayer analogue systems
  - doi: "10.1523/JNEUROSCI.1101-14.2014"
    type: related
    confidence: 0.74
    note: >
      Bayly et al. (2013) — ferret cortex stiffness measurement by AFM; E_cortex/E_subcortex ≈ 2;
      predicted buckling wavelength 8mm matches observed average gyrus width 7.5mm;
      supports quantitative buckling model
proposed_tests:
  - description: >
      Organoid model with controlled growth rate (modulated by FGF signalling): grow
      cerebral organoids in 3% agarose gel (providing mechanical confinement analogous
      to skull); measure gyrification index vs. gel stiffness; test whether GI scales
      as (E_gel)^(-1/3) as predicted by buckling model.

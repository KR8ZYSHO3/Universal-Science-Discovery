id: h-vertex-model-cortical-gyrification-mechanics
title: >
  Cortical gyrification in the developing primate brain arises from differential
  tangential growth of the cortical plate relative to the subcortical white matter,
  and the gyrification index (fold density) is quantitatively predicted by the elastic
  buckling wavelength λ* = 2π·h·(E_cortex/3E_subcortex)^(1/3) where h is cortical
  thickness and E is elastic modulus ratio.

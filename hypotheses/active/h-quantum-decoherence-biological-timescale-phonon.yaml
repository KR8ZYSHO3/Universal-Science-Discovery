id: h-quantum-decoherence-biological-timescale-phonon
title: >
  Quantum coherence in warm, wet biological systems (protein complexes, DNA)
  decoheres on femtosecond-picosecond timescales due to phonon bath coupling
  and hydrogen bond fluctuations; any purported quantum effects in biology require
  either (a) protected decoherence-free subspaces or (b) noise-assisted transport
  mechanisms where coherence is irrelevant to function even if transiently present.

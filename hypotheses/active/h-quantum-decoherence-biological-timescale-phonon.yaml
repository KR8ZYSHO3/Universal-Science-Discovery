proposed_tests:
  - description: >
      2D electronic spectroscopy with isotope labeling in FMO complex at 310K (physiological).
      Test: are observed coherence signals vibrational (vibronic) or electronic? Use
      ^13C isotope shifts to distinguish: vibronic coherence shifts by sqrt(12/13) in
      frequency; purely electronic coherence does not shift.
    prediction: "Oscillatory signals in 2DES shift by >5% with ^13C labeling, confirming vibronic (not quantum electronic) origin; decoherence time <200 fs at 310K consistent with phonon bath model."

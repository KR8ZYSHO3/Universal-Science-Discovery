proposed_tests:
  - description: >
      Measure the two-dimensional radial distribution function g(r) of a
      fluorescently labeled single-pass transmembrane protein in a model
      membrane (GUV) near the Lo/Ld phase transition temperature. If the
      hypothesis is correct, protein clustering should scale with the
      membrane correlation length ξ (the 2D analog of critical opalescence),
      diverging near the phase transition.
    method: super-resolution STED microscopy + fluorescence correlation spectroscopy
    prediction: >
      Protein pair correlation function g(r) ~ exp(-r/ξ)/r^η near phase
      transition, with ξ diverging as (T-Tc)^{-ν} with 2D Ising exponent ν=1.
  - description: >
      Compute the pair interaction potential between two model transmembrane
      proteins as a function of their separationusing coarse-grained molecular
      dynamics (CGMD, Martini force field) in a phase-separated bilayer, and
      compare to the Frank elastic energy prediction.
    method: CGMD simulation (Martini FF) + analytical Frank elastic calculation
    prediction: >
      Effective protein-protein interaction at intermediate separation (2-10 nm)
      should show elastic energy minimum consistent with defect pair annihilation
      in the liquid crystal order field.

id: h-membrane-defects-protein-clustering
title: >
  Integral membrane proteins act as topological defects in the lipid bilayer
  liquid crystal order field, and defect-defect interactions mediated by Frank
  elastic energy drive protein clustering into lipid raft domains without
  requiring direct protein-protein binding.

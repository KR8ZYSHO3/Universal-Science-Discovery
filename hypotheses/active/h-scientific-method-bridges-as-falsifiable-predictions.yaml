id: h-scientific-method-bridges-as-falsifiable-predictions
title: >
  Cross-domain bridges that generate at least three novel quantitative predictions
  confirmed by independent experiments in each connected field will achieve an
  established status that is stable against Duhem-Quine auxiliary hypothesis
  adjustments — and bridges without such predictions should be classified as
  heuristic analogies rather than scientific bridges.
status: active
priority: high
impact_score: 0.78
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:
  - type: supporting
    note: "Shannon-thermodynamics bridge: generated Landauer's principle (novel prediction), Maxwell's demon resolution, and channel capacity theorem — all confirmed; paradigmatically progressive (Lakatos)"
  - type: supporting
    note: "Statistical mechanics-information theory bridge: Jaynes (1957) predicted thermodynamic equilibrium distributions from maximum entropy without prior knowledge of Boltzmann's derivation — successful novel prediction"
  - type: related
    note: "Popper (1959) — degree of falsifiability is proportional to the empirical content of a theory; bridges with more predictions are more falsifiable and hence more scientific"

unknowns_addressed:
  - u-scientific-method-cross-domain-falsifiability

proposed_tests:
  - description: >
      Audit all 400 USDR bridges for the number of novel quantitative predictions
      each has generated that were subsequently confirmed by independent experiment.
      Classify each bridge as "progressive" (≥3 confirmed novel predictions),
      "neutral" (1-2), or "heuristic" (0). Test whether progressive bridges
      generate more cross-citations in the scientific literature than heuristic
      bridges, and whether they have higher community impact scores.
    method: "Systematic literature review + citation network analysis + expert panel classification"
    prediction: "Progressive bridges (top quartile by confirmed predictions) will have 5-10x more cross-field citations than heuristic bridges"
  - description: >
      Bayesian bridge audit: for each USDR bridge, specify the prior probability
      that the analogy holds exactly, partially, or not at all; compute likelihood
      ratios for each confirming and disconfirming evidence item; compute posterior
      probability of the bridge. Publish the posterior as a quantitative bridge
      confidence score. Test whether expert assessments correlate with Bayesian posteriors.
    method: "Expert elicitation of priors + systematic evidence review + Bayesian updating"
    prediction: "Bayesian posterior correlates r > 0.7 with expert consensus bridge quality ratings"

related_disciplines:
  - philosophy-of-science
  - information-theory
  - history-of-science
  - meta-science

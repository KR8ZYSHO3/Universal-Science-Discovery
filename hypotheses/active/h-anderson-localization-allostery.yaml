id: h-anderson-localization-allostery
title: "Allosteric signal propagation in proteins uses delocalized (non-Anderson-localized) normal modes, and allosteric efficiency correlates with the participation ratio of the relevant vibrational mode"
status: active
created: "2026-05-05"
priority: medium
impact_score: 0.72

evidence_links:
  - type: supporting
    note: "Elastic Network Models (ENM) show that allosteric signal transmission is carried by low-frequency, spatially extended (delocalized) normal modes in several well-characterized allosteric proteins (hemoglobin, GroEL)"
  - type: supporting
    doi: "10.1103/PhysRev.109.1492"
    note: "Anderson (1958) - localization theory; disordered networks suppress extended modes at high disorder"
  - type: supporting
    note: "B-factor distribution in crystal structures reflects local conformational disorder; high B-factor regions may localize allosteric modes"

proposed_tests:
  - description: "Compute ENM normal mode spectrum for 50+ allosteric proteins and 50+ non-allosteric proteins of similar size; compare participation ratio (PR) of modes coupling allosteric and effector sites; test for PR > 0.1N in allosteric vs < 0.05N in non-allosteric proteins"
  - description: "Introduce point mutations that increase B-factor (disorder) along the allosteric pathway; measure the resulting change in allosteric efficacy; test for correlation with mode localization length"
  - description: "Compare PR of allosteric modes across a protein homolog family with varying degrees of allostery; test whether PR correlates with the allosteric coupling constant from thermodynamic measurements"

unknowns_addressed:
  - u-anderson-localization-biological-systems

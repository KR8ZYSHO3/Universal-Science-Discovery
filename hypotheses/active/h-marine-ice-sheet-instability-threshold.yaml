id: h-marine-ice-sheet-instability-threshold
title: >
  West Antarctic Ice Sheet grounding lines retreat irreversibly once they advance
  into retrograde bedrock regions exceeding a threshold ocean warming of 0.5 degrees C
  above present, triggering Marine Ice Sheet Instability that commits 3-5 m of
  sea level rise on century timescales regardless of subsequent emissions reductions.
status: active
priority: critical
impact_score: 0.91
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - glaciology
  - fluid-mechanics
  - climate-science
unknowns_addressed:
  - u-glacier-basal-sliding-uncertainty
evidence_links:
  - doi: "10.1029/2005GL025127"
    type: supporting
    confidence: 0.75
    note: >
      Schoof (2007) analytical proof that grounding line on retrograde bed is
      unstable; provides the theoretical basis for MISI with boundary flux scaling.
  - doi: "10.1038/nature14463"
    note: >
      Joughin et al. (2014) satellite observations showing Thwaites glacier already
      in unstable retreat; consistent with MISI threshold having been crossed.
    type: supporting
    confidence: 0.72
proposed_tests:
  - description: >
      Deploy autonomous underwater vehicles (Ran AUV) to map ocean temperature
      at Thwaites grounding zone while simultaneous GPS measures grounding line
      retreat rate; test whether retreat rate is consistent with Schoof boundary
      flux equation given observed basal melt rates.

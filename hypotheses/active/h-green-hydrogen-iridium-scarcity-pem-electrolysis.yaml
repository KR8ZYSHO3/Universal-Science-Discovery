id: h-green-hydrogen-iridium-scarcity-pem-electrolysis
title: >
  The fundamental efficiency ceiling for PEM water electrolysis is 83%
  (LHV basis, 1.48V thermodynamic minimum) but iridium catalyst scarcity
  (global production ~7 tonnes/yr) limits deployment to <10 GW/yr unless
  iridium loading is reduced below 0.05 mg/cm² or earth-abundant catalysts
  achieve equivalent oxygen evolution activity.

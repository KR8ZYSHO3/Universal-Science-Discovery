evidence_links:
  - doi: "10.1039/C8EE03251A"
    type: supporting
    confidence: 0.72
    note: >
      Carmo et al. (2013) PEM electrolysis review: best-in-class cells achieve
      82% efficiency at 1 A/cm²; degradation accelerated by IrOx dissolution
      at high current density — Ir loading reduction below 0.1 mg/cm² reduces
      lifetime from >50,000 h to <10,000 h.
  - doi: "10.1038/s41467-021-25958-1"
    type: supporting
    confidence: 0.68
    note: >
      Jaramillo et al. (2021) Ir scarcity analysis: achieving 1 TW of PEM
      electrolysis requires >100× current annual Ir production — confirms
      material bottleneck unless loading is reduced 100-fold.
  - doi: "10.1126/science.abb0259"
    type: related
    confidence: 0.65
    note: >
      Nong et al. (2020) IrNiOₓ catalyst: achieves comparable OER activity
      to IrO₂ at 40% lower Ir loading — but long-term stability under
      acidic conditions not yet demonstrated at >10,000 h.
proposed_tests:
  - description: >
      Prepare a series of PEM electrolysis membrane electrode assemblies
      with Ir loadings of 2.0, 1.0, 0.5, 0.1, and 0.05 mg/cm². Test each
      at constant 2 A/cm² for 5,000 hours in accelerated degradation protocol
      (AST cycling). Measure Faradaic efficiency, cell voltage, and Ir
      dissolution by ICP-MS of effluent. Test: is there a threshold Ir loading
      below which degradation rate increases discontinuously? This identifies
      the minimum loading compatible with commercial lifetime.

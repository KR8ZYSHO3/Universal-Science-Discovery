id: h-quantum-walk-spatial-search-optimal
title: >
  Continuous-time quantum walk search on an N-node graph achieves optimal O(sqrt(N))
  query complexity if and only if the graph's spectral gap Delta_lambda satisfies
  Delta_lambda = O(1/N), predicting that complete graphs and hypercubes achieve
  Grover-optimal speedup while expander graphs with O(1) spectral gaps do not.

proposed_tests:
  - description: >
      Embed telomere length measurement (qPCR and TeSLA single-telomere analysis)
      in a randomized controlled trial of a social intervention known to reduce
      psychosocial stress (e.g., Moving to Opportunity housing voucher program —
      follow-up blood samples from archived cohort; or a new RCT of Universal Basic
      Income with 5-year follow-up). Measure telomere length at baseline, 1 year, 3
      years, and 5 years in both intervention and control arms.
    method: "qPCR telomere/single-copy gene (T/S) ratio + TeSLA for single-telomere length distribution; hair cortisol (3-month integrated cortisol) + inflammatory panel (IL-6, CRP, TNF-α) as biological mediators; causal mediation analysis"
    prediction: "Intervention arm shows +2-5% telomere length increase per year (net of control arm); mediated 50% through hair cortisol reduction and 30% through IL-6 reduction — establishing psychosocial → HPA → oxidative stress → telomere causal pathway"
  - description: >
      Measure telomere length and telomerase activity in peripheral blood mononuclear
      cells (PBMCs) before and 12 months after starting intensive mindfulness-based
      cognitive therapy (MBCT) in a sample enriched for high allostatic load (elevated
      cortisol + short telomeres at baseline). Use single-cell telomere analysis
      (FISH + flow cytometry) to distinguish telomerase-mediated lengthening from
      preferential survival of long-telomere cell clones.
    method: "Flow-FISH for single-cell telomere length distribution; Q-TRAP for telomerase activity in PBMC extracts; linear mixed model for change over time; 24-hour urinary cortisol as primary stress biomarker"
    prediction: "Telomere distribution mean increases by ≥3% at 12 months; telomerase activity increases ≥25% — specifically in stress-reactive individuals (high baseline cortisol reactivity)"


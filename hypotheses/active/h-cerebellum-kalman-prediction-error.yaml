id: h-cerebellum-kalman-prediction-error
title: >
  The climbing fibre signal to cerebellar Purkinje cells encodes a Kalman
  filter innovation (sensory prediction error weighted by optimal gain),
  and the magnitude of cerebellar adaptation tracks the Kalman gain
  K ∝ P_pred/(P_pred + R) as sensory reliability R varies.

proposed_tests:
  - description: >
      Adapt sensory reliability R by degrading visual feedback (blur or delay)
      in a visuomotor adaptation task. Measure cerebellar-dependent adaptation
      rate as a function of R. Prediction: adaptation rate ∝ K(R) = P/(P+R),
      decreasing monotonically as R increases, with specific functional form
      distinguishable from a simple linear scaling.
  - description: >
      Record complex spike (climbing fibre) rates in monkey cerebellum during
      a perturbation task. Compute the correlation between complex spike
      magnitude and the sensory prediction error signal. Test: complex spike
      rate should be proportional to the Kalman innovation |y - Hx̂|, not
      to the raw sensory error |y - y_target|.

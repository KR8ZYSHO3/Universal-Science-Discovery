proposed_tests:
  - description: >
      Implement a proof assistant verification (Coq or Agda) that every well-typed
      algebraic effect handler in Eff or Koka is precisely a monad morphism between
      the free monad over the effect signature and the target monad, using the
      Kleisli category adjunction.
    method: "Formal proof in Coq using Homotopy Type Theory library; encode algebraic effects as free monads; prove universal property for handlers"
    prediction: "Every handler type-checks as a monad morphism in HoTT; ill-typed handlers violate the adjunction universality"
  - description: >
      Derive new optimizations for effect handlers by applying categorical limit/colimit
      constructions; specifically, show that parallel composition of independent effects
      corresponds to a product in the Kleisli category, enabling automated fusion.
    method: "Compiler optimization pass based on categorical product structure; benchmark on programs with multiple independent effects"
    prediction: "Fusion pass based on categorical product eliminates intermediate allocations, achieving >15% speedup on pure effect-heavy benchmarks"

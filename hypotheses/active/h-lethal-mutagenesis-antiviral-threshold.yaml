id: h-lethal-mutagenesis-antiviral-threshold
title: >
  Mutagen-based antiviral therapies (ribavirin, favipiravir) achieve therapeutic
  efficacy specifically when they raise the viral mutation rate above the error
  threshold U_c = ln(W_max/W_mean), predicting that the clinical dose required
  for efficacy is proportional to the information content (genome length times
  ln(1/mutation_rate)) of the target virus.
status: active
priority: high
impact_score: 0.78
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - virology
  - information-theory
  - pharmacology
unknowns_addressed:
  - u-quasispecies-fitness-landscape-mapping
evidence_links:
  - doi: "10.1128/JVI.00361-10"
    type: supporting
    confidence: 0.70
    note: >
      Perales et al. (2010) show that ribavirin drives HIV-1 toward error catastrophe;
      mutation rates increase 3-fold above threshold leading to population collapse.
  - doi: "10.1038/nature04244"
    type: related
    confidence: 0.65
    note: >
      Domingo & Holland review shows quasispecies dynamics govern antiviral response;
      supports information-theoretic framing of the error threshold as drug target.
proposed_tests:
  - description: >
      Titrate favipiravir concentration in SARS-CoV-2 replicon system; measure
      mutation rate by deep sequencing at each concentration; test whether cell
      culture IC50 correlates with calculated U_c for the SARS-CoV-2 genome.

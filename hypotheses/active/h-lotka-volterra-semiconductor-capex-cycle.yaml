    type: supporting
    confidence: 0.40
    note: Farmer & Foley (2009) propose LV-type agent dynamics for markets
  - doi: "10.1038/238413a0"
    type: related
    confidence: 0.55
    note: May (1972) provides stability criterion for LV-type competitive systems
proposed_tests:
  - description: >
      Collect quarterly semiconductor capex (SEMI equipment billings) and
      revenue (SIA) time series 1990-2025. Fit Lotka-Volterra ODE to the
      supply-capacity (predator) and demand (prey) pair using nonlinear least
      squares. Compute predicted oscillation period T = 2π/√(αγ) and compare
      to spectral peak in Fourier transform of empirical data.
  - description: >
      Compare LV fit (4 parameters) against delay-differential cobweb model
      (2 parameters) and AR(2) model using AIC/BIC. If LV is preferred,
      test out-of-sample forecast accuracy for 2020-2025 held-out period.

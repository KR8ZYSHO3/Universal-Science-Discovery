id: h-lotka-volterra-semiconductor-capex-cycle
title: >
  Semiconductor capital expenditure cycles (3-5 year period) are consistent
  with Lotka-Volterra predator-prey oscillations where equipment spending
  (predator) feeds on demand signals (prey), with LV-predicted period
  T ≈ 2π/√(αγ) matching observed cycle periods within 20%.
status: active
priority: medium
impact_score: 0.55
created: "2026-05-05"
last_updated: "2026-05-05"
related_disciplines:
  - economics
  - ecology
  - industrial-dynamics
unknowns_addressed:
  - u-predator-prey-market-oscillations
evidence_links:

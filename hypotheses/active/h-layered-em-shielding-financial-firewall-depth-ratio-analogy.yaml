proposed_tests:
  - description: >
      Fit a simple exponential decay model to simulated loss propagation versus number of ring-fence layers
      under independent shocks, then introduce a single correlated channel and quantify model breakdown.
    method: Agent-based or graph cascade simulation with parameterized perimeter rules.
    prediction: Exponential decay holds only before correlated “slot leakage” dominates residual risk.


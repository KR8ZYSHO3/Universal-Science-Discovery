id: h-layered-em-shielding-financial-firewall-depth-ratio-analogy
title: >
  If shock “frequency” is defined by liquidation horizons, then the ratio of incremental loss reduction per
  added firewall layer should decay approximately exponentially until correlated channels dominate — but this
  is a speculative organizational analogy, not a physical law.

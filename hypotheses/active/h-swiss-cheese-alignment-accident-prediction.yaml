id: h-swiss-cheese-alignment-accident-prediction
title: >
  Accidents in safety-critical systems can be predicted prospectively by measuring
  the temporal correlation of latent condition indicators (near-miss rate, procedure
  deviation rate, organizational safety climate score) across defensive layers —
  accidents occurring when these indicators co-exceed threshold simultaneously,
  consistent with the Swiss Cheese model's hole-alignment mechanism.

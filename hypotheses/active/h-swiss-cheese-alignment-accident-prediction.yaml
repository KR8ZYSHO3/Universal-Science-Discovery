proposed_tests:
  - description: >
      Retrospective analysis of aviation safety reports (ASRS database, n>500,000
      reports 1988-2024): construct time series of near-miss rates, maintenance
      deviation rates, and organizational safety climate indicators (derived from
      report text via NLP). Test whether cross-layer temporal covariance in the
      30-day window before accidents exceeds that in matched control windows.
    method: "NLP classification of ASRS reports, temporal covariance analysis, matched case-control design"
    prediction: "Cross-layer indicator covariance is 2× higher in 30-day pre-accident windows vs. matched controls"
  - description: >
      Prospective monitoring study in 20 high-acuity ICUs: weekly measurement of
      near-miss rate, protocol deviation rate, staff burnout score, and equipment
      check failure rate. Test whether multivariate threshold-crossing model predicts
      adverse events in the following 2-week window (AUC > 0.75).
    method: "Prospective observational, structured near-miss reporting, multivariate threshold model, AUC validation"
    prediction: "Four-layer threshold model predicts adverse events with AUC=0.78 vs. AUC=0.59 for single-layer predictor"

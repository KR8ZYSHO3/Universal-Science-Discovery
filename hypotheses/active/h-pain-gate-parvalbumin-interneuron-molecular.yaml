id: h-pain-gate-parvalbumin-interneuron-molecular
title: >
  The inhibitory "gate" in Melzack-Wall gate control theory of pain is
  molecularly implemented by parvalbumin-expressing glycinergic interneurons
  in lamina II (substantia gelatinosa) of the dorsal horn, whose activity
  is suppressed by C-fiber input (opening the gate) and enhanced by
  Aβ-fiber tactile input (closing the gate).

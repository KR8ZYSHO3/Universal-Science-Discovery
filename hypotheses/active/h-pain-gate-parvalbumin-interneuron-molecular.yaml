proposed_tests:
  - description: >
      Use chemogenetic silencing (DREADDs) targeted to parvalbumin+ glycinergic
      interneurons in mouse dorsal horn. Measure: (1) mechanical allodynia threshold
      (von Frey filaments), (2) conditioned pain modulation (rubbing-induced
      analgesia), (3) c-Fos expression in projection neurons after C-fiber
      stimulation. Predict: silencing PV+ interneurons should open the gate,
      lowering mechanical pain thresholds and blocking rubbing-induced analgesia.

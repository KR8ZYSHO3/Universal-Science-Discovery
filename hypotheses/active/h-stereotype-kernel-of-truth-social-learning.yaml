id: h-stereotype-kernel-of-truth-social-learning
title: >
  Group stereotypes form and persist through Bayesian social learning from accurate
  (but base-rate-neglecting) sample statistics of group member behaviour, combined
  with availability heuristics that overweight memorable exceptions — inaccurate
  stereotypes persist when outgroup contact is rare, making availability error proportional
  to segregation level.

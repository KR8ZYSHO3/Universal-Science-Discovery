evidence_links:
  - doi: "10.1037/0033-295X.101.2.230"
    type: supporting
    confidence: 0.75
    note: >
      Jussim et al. (2009) — meta-analysis: stereotypes are moderately accurate on
      measurable group statistics (d ≈ 0.3 average accuracy correlation); accuracy
      is highest for ethnic/racial stereotypes where base rate differences are real
      (occupational, educational), lower for trait stereotypes
  - doi: "10.1037/pspa0000031"
    type: supporting
    confidence: 0.72
    note: >
      Lippmann-Allport-Tajfel social categorisation — stereotypes develop through
      associative learning from category-outcome pairings; availability of vivid
      examples (crime news, celebrity behaviour) distorts probability estimates systematically
  - doi: "10.1037/a0030468"
    type: related
    confidence: 0.65
    note: >
      Stereotype accuracy debate (Funder 2012 vs. Kunda 1999): kernel-of-truth theories
      predict stereotypes should be more accurate for groups with more intergroup contact;
      test: compare accuracy for majority vs. minority ingroup stereotypes — minority
      stereotypes about majority should be more accurate due to more observational data
proposed_tests:
  - description: >
      Longitudinal study in newly integrated vs. segregated schools; measure stereotype
      accuracy (correlation of beliefs with measured group statistics), availability of
      counter-stereotypic exemplars (interview data), and contact frequency; predict that
      accuracy increases with contact and that availability error decreases.

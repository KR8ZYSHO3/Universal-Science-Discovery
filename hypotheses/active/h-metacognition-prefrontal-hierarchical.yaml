id: h-metacognition-prefrontal-hierarchical
title: >
  Metacognitive access to one's own cognitive states is implemented in anterior
  prefrontal cortex (area 10) as a hierarchically higher-order prediction: the brain
  predicts its own prediction errors, and metacognitive sensitivity (meta-d') is
  determined by the signal-to-noise ratio of this second-order prediction signal.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium

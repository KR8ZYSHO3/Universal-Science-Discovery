evidence_links:
  - type: supporting
    doi: 10.1016/j.tics.2011.05.001
    note: >
      Fleming & Dolan (2012) — metacognition and confidence; anterior PFC lesions
      impair metacognitive sensitivity without affecting first-order performance;
      suggests specific neural substrate.
  - type: supporting
    doi: 10.1523/JNEUROSCI.5068-12.2013
    note: >
      Maniscalco & Lau (2012) — meta-d' framework for measuring metacognitive
      efficiency; defines the computational quantity that neural mechanisms must
      implement.
proposed_tests:
  - discipline: neuroscience
    description: >
      Record LFP from prefrontal area 10 and DLPFC in 3 macaques performing
      a visual detection task (Gabor in noise) with post-decision wagering
      (confidence proxy). On 10% of trials, TMS delivered to area 10 or
      DLPFC at 200ms post-decision. Hypothesis: TMS to area 10 (but not DLPFC)
      selectively reduces meta-d' (confidence-performance calibration) while
      leaving d' (detection performance) unchanged, and the magnitude of
      disruption correlates with area 10 LFP power at 10-25 Hz preceding
      the confidence judgment.

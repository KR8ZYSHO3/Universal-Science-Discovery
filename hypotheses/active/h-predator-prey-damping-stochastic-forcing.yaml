id: h-predator-prey-damping-stochastic-forcing
title: >
  Observed damping of predator-prey cycles is produced by demographic stochasticity
  acting on a stable spiral equilibrium (not a limit cycle), not by biological complexity
  per se; the apparent cycles are stochastically sustained oscillations around a
  deterministically stable equilibrium, and true Lotka-Volterra neutral cycles require
  unrealistic density-independence that is absent in all real food webs.

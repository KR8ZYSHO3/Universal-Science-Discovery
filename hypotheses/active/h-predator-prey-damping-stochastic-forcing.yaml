evidence_links:
  - type: supporting
    doi: 10.1890/0012-9658(2003)084[1312:WNPCO]2.0.CO;2
    note: >
      Turchin & Ellner (2003) — time-series analysis of hare-lynx cycles; stochastic
      stable-spiral model fits better than limit-cycle model; cycles are noise-sustained.
  - type: supporting
    doi: 10.1111/j.1461-0248.2008.01185.x
    note: >
      Barraquand et al. (2017) — meta-analysis of 66 predator-prey time series; most
      consistent with damped oscillations + stochastic forcing, not sustained cycles.
  - type: contradicting
    doi: 10.1890/0012-9658(1995)076[0020:PPCATN]2.0.CO;2
    note: >
      Krebs et al. (1995) — Kluane hare-lynx experiment; experimental food addition
      and predator exclusion suggest true limit cycles driven by food-predator interaction.
proposed_tests:
  - discipline: ecology
    description: >
      Fit both a stochastic stable-spiral model and a stochastic limit-cycle model
      to existing long-term time-series datasets (Kluane hare-lynx, Soay sheep-vegetation,
      Newfoundland moose-wolf) using MCMC parameter estimation. Compare log-marginal
      likelihoods. Test whether the stable-spiral model is decisively supported (Bayes
      factor >100) in each system.
  - discipline: mathematics
    description: >
      Derive the power spectral density of the stochastic stable-spiral model with
      demographic noise as a function of the spiral eigenvalue imaginary:real ratio.
      Show that this produces a peaked spectrum identical to a limit cycle when noise
      amplitude is high relative to damping. Test whether the two models are identifiable
      from realistic time-series lengths (50-100 generations) using information-theoretic
      criteria.

id: h-geothermal-induced-seismicity-pore-pressure
title: >
  Enhanced geothermal system (EGS) induced seismicity is controlled primarily
  by pore pressure diffusion front propagation and can be predicted and mitigated
  using traffic-light protocols calibrated to local fault critically — the
  Basel (2006) failure was preventable with real-time pore pressure monitoring.
status: active
priority: high
impact_score: 0.75
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-geothermal-subsidence
evidence_links:
  - type: supporting
    note: "Shapiro et al. (2006) seismicity cloud propagation follows pore pressure diffusion front r = √(4πDt) — D = hydraulic diffusivity determinable in real time"
    confidence: 0.80
  - type: supporting
    note: "Majer et al. (2007) protocol for addressing induced seismicity associated with EGS: traffic-light protocol reduces M>2 event rate by 70% in pilots"
    confidence: 0.70
  - type: contradicting
    note: "Diehl et al. (2017) Pohang M5.5 (2017): events occurred 83 days after injection ceased — delayed triggering violates simple pore pressure diffusion model"
    confidence: 0.72
proposed_tests:
  - description: >
      Real-time pore pressure monitoring trial: instrument an EGS well with
      distributed fiber-optic pressure sensors at 50m intervals. Apply
      Shapiro diffusion model in real time. Test whether seismicity cloud
      position matches predicted diffusion front r(t) = √(4πDt) to within 20%.
      Adjust injection protocol when pressure front approaches mapped fault.
  - description: >
      Traffic-light protocol meta-analysis: compile all EGS projects with
      traffic-light protocols (>20 sites). Compute maximum magnitude and
      subsidence as function of protocol stringency (M_threshold for shutdown).
      Derive quantitative guideline for M_threshold vs. local fault slip tendency.
related_disciplines:
  - geomechanics
  - geothermal-energy
  - seismology

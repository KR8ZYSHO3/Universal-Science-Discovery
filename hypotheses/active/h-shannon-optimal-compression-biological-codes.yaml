proposed_tests:
  - description: >
      Record N=1000+ V1 neurons in awake macaque via Neuropixels probes during
      passive viewing of natural images. Compute I(X;Ŷ) between stimuli and neural
      responses using MINE (mutual information neural estimation). Compare to R(D)
      computed for natural image statistics with SSIM as distortion metric.
      Test: is I(X;Ŷ) within a factor of 2 of R(D_perception)?
    method: "Neuropixels recording, MINE mutual information estimator, SSIM-R(D) computation via Blahut-Arimoto"
    prediction: "V1 code is within 2-fold of R(D_SSIM); IT cortex code is within 2-fold of R(D_categorical)"
  - description: >
      Compare neural coding efficiency (I/R ratio) across cortical hierarchy (V1 → V4 → IT)
      using matched natural image sets. Test: does coding efficiency increase up the hierarchy
      as distortion metric shifts from low-level (MSE) to high-level (categorical)?
    method: "Multi-area simultaneous Neuropixels, encoding model I(X;Ŷ), R(D) for matched distortion metrics"
    prediction: "Efficiency ratio I/R increases monotonically from V1 to IT with progressively matched metrics"

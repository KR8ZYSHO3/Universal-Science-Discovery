id: h-shannon-optimal-compression-biological-codes
title: >
  Primary sensory cortex neural codes (V1, A1) operate within a factor of 2 of
  the Shannon rate-distortion bound for natural stimuli when distortion is measured
  using a perceptual metric matched to the sensory system's known behavioral
  sensitivity, implying that evolution has driven neural coding efficiency close
  to the theoretical optimum.

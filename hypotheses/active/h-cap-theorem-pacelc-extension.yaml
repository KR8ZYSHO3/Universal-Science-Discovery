id: h-cap-theorem-pacelc-extension
title: >
  The PACELC extension to the CAP theorem (Daniel Abadi 2012) — that distributed
  systems must trade off latency against consistency even when there is no network
  partition — is a tighter characterization of practical system tradeoffs, and
  systems can be rigorously classified on a 2D (PA/EL vs PC/EC) grid that predicts
  observed user-facing behavior across cloud databases.

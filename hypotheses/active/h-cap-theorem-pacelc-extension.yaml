proposed_tests:
  - description: >
      Measure end-to-end write latency and read consistency (stale read rate)
      for DynamoDB, Cassandra, Spanner, and CockroachDB under simulated network
      partition and normal operation. Classify each on the PACELC grid and test
      whether the classification predicts measured latency-consistency tradeoffs
      with < 20% error.
  - description: >
      Test whether BFT-enabled systems (Hyperledger Fabric, Tendermint) are
      correctly classified as PC/EC (consistent, high latency) and whether their
      latency overhead over Paxos is accurately predicted by the 3f+1 vs 2f+1
      replica count ratio.

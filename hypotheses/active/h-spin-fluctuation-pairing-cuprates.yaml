id: h-spin-fluctuation-pairing-cuprates
title: >
  Antiferromagnetic spin fluctuation exchange is the dominant Cooper pairing mechanism
  in hole-doped cuprate superconductors — paramagnon-mediated pairing with d_{x²-y²}
  symmetry accounts for the T_c dome shape, pseudogap onset temperature, and
  superfluid density without adjustable parameters.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: critical
related_disciplines:
  - condensed-matter-physics
  - quantum-mechanics
  - strongly-correlated-electrons
unknowns_addressed:
  - u-high-tc-pairing-mechanism
evidence_links:
  - type: supporting
    note: >
      Schrieffer, Wen & Zhang (1989) proposed spin-bag mechanism; Monthoux & Pines
      (1993) showed spin-fluctuation exchange gives T_c ~ 90 K with d-wave symmetry
      in quantitative agreement for optimally doped YBCO.
  - type: supporting
    note: >
      Neutron scattering evidence for magnetic resonance mode at (π,π) in YBCO
      below T_c (Rossat-Mignod et al. 1991, Mook et al. 1993) — the mode energy
      ≈ 2Δ_max is consistent with a spin-fluctuation-mediated pairing boson.
  - type: contradicting
    note: >
      ARPES measurements show phonon kinks in the electron dispersion of cuprates
      at ~70 meV (Lanzara et al. 2001, Nature 412:510), suggesting electron-phonon
      coupling contributes to the pairing — inconsistent with pure spin-fluctuation
      picture.
  - type: contradicting
    note: >
      RVB/resonating valence bond theory (Anderson, Lee, Wen) accounts for the
      same experimental facts without invoking spin fluctuations — a competing
      complete theory that has not been decisively ruled out.
proposed_tests:
  - discipline: condensed-matter-physics
    description: >
      Measure the isotope effect in underdoped cuprates with different isotope
      substitutions (O-16/18, Cu-63/65). If spin fluctuations dominate, the
      isotope coefficient α_O ≈ 0 (pairing is not phonon-mediated). A non-zero
      α_O would indicate phonon contribution to pairing and constrain spin-fluctuation
      theory to a mixed mechanism.
  - discipline: computational-physics
    description: >
      Solve the 2D Hubbard model at optimal doping (8-12% hole doping) using
      quantum Monte Carlo without the sign problem (constrained path QMC or
      DMRG on cylinder geometries). Measure the dominant pairing susceptibility
      channel. If d_{x²-y²} susceptibility diverges before charge or spin density
      wave channels, spin fluctuation pairing is confirmed computationally.

proposed_tests:
  - description: >
      Quasi-experiment: exploit mandatory minimum sentencing law changes (2000-2020)
      across US states that increased severity without changing arrest rates. Compare
      to IV estimates of police hiring that increased arrest certainty. Test: which
      elasticity is larger in magnitude?
    prediction: "Arrest probability elasticity of crime: -0.3 to -0.5; sentence length elasticity: -0.03 to -0.07 (5-10x smaller); ratio robust to crime type, jurisdiction, time period."

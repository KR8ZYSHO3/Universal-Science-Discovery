id: h-criminal-deterrence-certainty-over-severity
title: >
  Certainty of punishment has substantially greater deterrent effect on crime than
  severity of punishment; the deterrence elasticity of arrest probability is 5-10x
  larger in magnitude than the elasticity of sentence length, consistent with
  hyperbolic discounting of future punishments by would-be offenders.

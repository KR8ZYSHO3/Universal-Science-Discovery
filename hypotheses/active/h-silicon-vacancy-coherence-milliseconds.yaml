id: h-silicon-vacancy-coherence-milliseconds
title: >
  Silicon-vacancy (SiV) and tin-vacancy (SnV) color centers in diamond achieve
  spin coherence times > 1 ms at temperatures > 1 K when operated at the strain-
  tuned clock transition — making them the leading solid-state quantum memory
  platform for quantum repeater networks, with fundamental limits set by
  two-phonon Raman scattering that predicts T₂ ∝ T⁻⁵ temperature dependence.

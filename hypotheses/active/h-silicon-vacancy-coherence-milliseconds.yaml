proposed_tests:
  - description: >
      Measure T₂ of SnV spin in diamond as a function of temperature from 1 K to 20 K
      using dynamical decoupling (XY-8 sequences). Fit to theoretical T₂⁻¹ = aT⁵ + b
      (two-phonon Raman + other mechanisms). Test whether the data follows the
      T⁻⁵ phonon-limited scaling and extract the fundamental phonon coupling constant.

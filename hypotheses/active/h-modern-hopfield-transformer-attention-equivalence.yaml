proposed_tests:
  - description: >
      Train transformer models of varying key dimension d (16 to 1024) on
      associative recall tasks with known numbers of key-value pairs M.
      Measure recall accuracy as a function of M/exp(d/2). The modern
      Hopfield capacity predicts a sharp phase transition from near-perfect
      to poor recall at M ≈ exp(d/2), analogous to the AGS capacity transition.
  - description: >
      Use mechanistic interpretability probing (linear probing of intermediate
      activations) to identify attention heads that implement content-addressable
      memory for factual associations (entity-attribute bindings). Test whether
      the number of reliably stored associations per head scales as predicted by
      the exponential Hopfield capacity formula.

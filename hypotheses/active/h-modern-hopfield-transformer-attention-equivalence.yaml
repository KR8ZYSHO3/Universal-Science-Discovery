id: h-modern-hopfield-transformer-attention-equivalence
title: >
  The mathematical equivalence between modern Hopfield network updates and
  scaled dot-product attention implies that transformer attention heads
  implement content-addressable associative memory retrieval, and that
  the number of "memorized facts" in a transformer's attention layers scales
  exponentially with the key/query dimension d — testable via probing and
  capacity saturation experiments.

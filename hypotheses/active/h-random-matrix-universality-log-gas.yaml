id: h-random-matrix-universality-log-gas
title: >
  Random matrix universality arises because eigenvalue statistics of large random
  matrices are governed by a two-dimensional log-gas (Dyson gas) at inverse temperature
  β = 1/2/4, and the universality class (GUE, GOE, GSE) is determined solely by the
  symmetry of the underlying dynamical system — a prediction falsifiable by measuring
  eigenvalue spacing distributions in new systems.
status: active

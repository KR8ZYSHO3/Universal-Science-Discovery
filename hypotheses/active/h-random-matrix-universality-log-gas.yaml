evidence_links:
  - type: supporting
    doi: 10.1103/PhysRevLett.52.1
    note: >
      Bohigas et al. (1984) — Bohigas-Giannoni-Schmit conjecture: chaotic quantum
      systems have GUE eigenvalue statistics; integrable systems have Poisson.
  - type: supporting
    doi: 10.1145/3090168
    note: >
      Odlyzko (1987) — non-trivial zeros of Riemann zeta function have GUE
      eigenvalue statistics; deep connection between number theory and random matrices.
proposed_tests:
  - discipline: mathematics
    description: >
      Analyze the nearest-neighbor spacing distribution of: (1) 10^7 consecutive
      Riemann zeta zeros (from Andrew Odlyzko's dataset), (2) energy levels of
      classically chaotic billiard systems, (3) singular values of connectivity
      matrices of 50 real-world networks. Hypothesis: systems with no time-reversal
      symmetry follow GUE Wigner surmise P(s) ∝ s²exp(-4s²/π), time-reversal
      symmetric systems follow GOE P(s) ∝ s·exp(-πs²/4), and uncorrelated systems
      follow Poisson P(s) = exp(-s) — with goodness-of-fit χ² < 5 for correct
      symmetry class in all cases.

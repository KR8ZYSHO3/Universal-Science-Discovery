id: h-open-science-preregistration-replication-incentives
title: >
  Sustainable open science adoption requires changing journal publication
  incentives to reward Registered Reports (preregistration before data
  collection) over outcome-contingent publication — current voluntary
  preregistration has low uptake because it penalises null results in
  tenure and funding decisions.
status: active
priority: medium
impact_score: 0.71
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - philosophy-of-science
  - social-science
  - scientometrics
  - research-policy
unknowns_addressed:
  - u-open-science-incentives
evidence_links:
  - doi: "10.1371/journal.pbio.3000116"
    type: supporting
    confidence: 0.68
    note: >
      Chambers et al. (2019) Registered Reports: journals using RR format
      show 50%+ null result publication rates vs. 5-10% in standard journals;
      effect sizes smaller on average, suggesting reduced publication bias.
  - doi: "10.1038/s41562-020-01013-y"
    type: supporting
    confidence: 0.65
    note: >
      Allen & Mehler (2019) meta-analysis: voluntary preregistration increases
      by field but <5% of published psychology experiments are preregistered;
      career incentives (impact factor) overwhelm good-practice preferences.
  - doi: "10.1098/rsos.160384"
    type: related
    confidence: 0.60
    note: >
      Munafò et al. (2017) Manifesto for Reproducible Science: identifies
      incentive structure as root cause; proposes Registered Reports, open
      data mandates, and multi-site replication as systemic solutions.
proposed_tests:
  - description: >
      Natural experiment using funder mandates: compare replication rates and
      effect size distributions of studies from NIH-funded research (which
      adopted data-sharing mandates in 2023) vs. comparable European Research
      Council funded research without equivalent mandates, controlling for
      field and study size. Test: does mandatory data sharing improve
      replication rates by >20%? Secondary test: does voluntary preregistration
      uptake increase with funder career-incentive alignment (job posting
      citations of preregistration as criterion)?

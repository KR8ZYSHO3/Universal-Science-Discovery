proposed_tests:
  - description: Extend the Boers (2021) SST fingerprint analysis to RAPID array direct AMOC transport measurements (2004-2025); fit an Ornstein-Uhlenbeck model to the AMOC transport time series; compute the autocorrelation time τ and variance σ² as a function of time; test whether τ and σ² show statistically significant increasing trends consistent with critical slowing down near a bifurcation, using surrogate data tests for false positive rates.

id: h-gromov-nonsqueezing-quantum-uncertainty-derivation
title: >
  The Heisenberg uncertainty principle Delta_q * Delta_p >= hbar/2 can be
  derived directly from Gromov's non-squeezing theorem in the semiclassical
  limit hbar → 0 by identifying the symplectic capacity of the uncertainty
  ellipsoid with hbar, providing a geometric rather than operator-algebraic
  proof of the uncertainty principle.

proposed_tests:
  - description: >
      Compare spectral analysis of vegetation pattern wavelength from Sentinel-2 imagery at 10 dryland sites
      with known soil water diffusivity from field campaigns. Test whether predicted λ = 2π/k*(D_w) from
      Klausmeier model linearization matches observed λ within ±30%.
    method: "FFT spectral analysis of NDVI imagery + comparison to Klausmeier k*(D_w) prediction + soil hydraulic measurement"
    prediction: "Observed pattern wavelength should correlate with √(D_w) with r > 0.7 across sites with different soil texture"


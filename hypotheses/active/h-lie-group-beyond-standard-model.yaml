id: h-lie-group-beyond-standard-model
title: >
  The next level of unification beyond the Standard Model SU(3)×SU(2)×U(1) is
  constrained by anomaly cancellation and representation theory to be a specific
  simple group (SO(10) or E_6), and the prediction of proton decay rate from the
  branching structure of the GUT representation provides a discriminating test
  between candidate groups.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
related_disciplines:
  - physics
  - quantum-physics

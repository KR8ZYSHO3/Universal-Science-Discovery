unknowns_addressed:
  - u-standard-model-representation-completeness
evidence_links:
  - type: supporting
    doi: "10.1016/0370-2693(74)90058-6"
    note: >
      Georgi & Glashow (1974) SU(5) GUT: the simplest anomaly-free extension of the
      Standard Model embedding all three generations in a single representation;
      predicts proton decay at τ_p ~ 10^{31} years. Super-Kamiokande has excluded
      the minimal SU(5) but not SO(10) or E_6.
  - type: supporting
    note: >
      SO(10) unification places all 16 fermions of one generation (including right-handed
      neutrino) into a single 16-dimensional spinor representation — the most
      economical description. The branching 16 → (3+2+1) under SO(10) → SU(5) → SM
      is determined purely by group theory and predicts neutrino masses via the seesaw
      mechanism.
  - type: contradicting
    note: >
      No experimental evidence for proton decay has been found at Super-Kamiokande
      or Hyper-K; current limits τ(p → e⁺π⁰) > 2.4×10³⁴ years disfavour most
      simple GUT predictions but do not rule out more complex symmetry breaking schemes.
proposed_tests:
  - discipline: physics
    description: >
      Compute the proton lifetime predictions for SO(10) GUT with the most natural
      symmetry breaking chain (SO(10) → SU(5) → SM vs. SO(10) → SU(4)×SU(2)×SU(2) → SM)
      using current values of Standard Model coupling constants and the GUT scale
      from coupling unification. Compare predictions to the Hyper-Kamiokande sensitivity
      projected for 2030. Determine which SO(10) breaking chain is discriminable with
      next-generation proton decay experiments.
  - discipline: mathematical-physics
    description: >
      Classify all anomaly-free representations of rank ≤ 5 simple Lie groups that
      contain the Standard Model as a subgroup and have the Standard Model matter
      content as an irreducible representation. Use the resulting classification to
      determine how many viable GUT candidates remain consistent with current constraints
      (proton lifetime, neutrino masses, gauge coupling unification). This is a pure
      group theory / representation theory computation.

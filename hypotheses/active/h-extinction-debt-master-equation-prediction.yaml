id: h-extinction-debt-master-equation-prediction
title: >
  The master equation for stochastic birth-death processes predicts that extinction
  debt (species committed to extinction despite current positive population size)
  scales as the ratio of demographic to environmental stochasticity variance, and
  this ratio can be measured non-invasively from time-series count data.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-demographic-stochasticity-extinction-threshold
related_disciplines:

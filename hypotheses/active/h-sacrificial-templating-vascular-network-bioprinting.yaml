proposed_tests:
  - description: >
      Fabricate a 10 mm × 10 mm × 10 mm GelMA hydrogel construct containing: (1) two
      printed carbohydrate-glass channel trees (500 → 200 → 100 → 50 μm branching
      hierarchy, dissolved after gelation) connected to inlets and outlets, and (2) HUVECs
      + lung fibroblasts co-culture at 2×10⁶ cells/mL throughout the bulk. Perfuse the
      macro-channels with EGM-2 growth medium containing VEGF (50 ng/mL) for 14 days
      and measure viability throughout the construct using LIVE/DEAD staining + confocal
      z-stack imaging.
    method: "Carbohydrate glass (sucrose + dextran) printing → GelMA casting → UV crosslinking → dissolution in culture medium → perfusion via peristaltic pump at 1 μL/min; LIVE/DEAD staining at days 3, 7, 14; confocal z-stack tiled over full construct volume"
    prediction: "Day 14 viability > 80% throughout the full 10 mm thickness (vs. < 30% in unperfused control at >2 mm depth); HUVEC capillary tube formation within 500 μm of printed channels confirmed by CD31 immunostaining"
  - description: >
      Test whether exogenous VEGF gradient (high VEGF at macro-channel surface, low VEGF
      at construct periphery) can guide endothelial sprouting to bridge the gap between
      50 μm printed channels and spontaneous capillary networks, creating a connected
      hierarchical vascular network. Measure connexin-43 gap junction formation between
      printed and self-assembled vessels as an indicator of functional anastomosis.
    method: "VEGF-releasing microspheres (PLGA, burst release + sustained release) embedded at defined distances from channels; endothelial sprouting measured by confocal time-lapse; anastomosis confirmed by dye transfer across junction (calcein-AM intercellular diffusion assay)"
    prediction: "Connected vascular networks (confirmed by dye perfusion through both printed and self-assembled segments) form within 7 days when inter-vessel distance ≤ 300 μm and VEGF gradient ≥ 0.5 ng/mL/mm"


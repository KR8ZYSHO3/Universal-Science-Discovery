id: h-sacrificial-templating-vascular-network-bioprinting
title: >
  A hierarchical sacrificial templating approach — combining bioprinted carbohydrate-
  glass macrovascular channels (50-500 μm) with self-assembled endothelial capillary
  networks (7-20 μm) connected via VEGF gradient-guided sprouting angiogenesis —
  can produce functional vascular networks sustaining cell viability throughout
  tissue constructs thicker than 5 mm.

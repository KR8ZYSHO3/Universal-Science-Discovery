id: h-ecosystem-services-pigouvian-subsidy-biodiversity-market
title: >
  Payments for Ecosystem Services (PES) set at the marginal ecosystem service
  value estimated by hedonic pricing (flood protection, water filtration, carbon
  sequestration) will conserve forest cover at least as efficiently as command-
  and-control regulations in Costa Rica, the Amazon, and Southeast Asia, and
  markets for biodiversity credits can reach $100B/year by 2030 with robust MRV.
status: active
priority: medium
impact_score: 0.77
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:
  - doi: "10.1038/387253a0"
    type: supporting
    confidence: 0.75
    note: "Costanza et al. (1997) — $33-125T/year ecosystem service values provide the ceiling for Pigouvian subsidy rates"
  - type: supporting
    confidence: 0.80
    note: "Ferraro & Pattanayak (2006) Conserv Biol — PES schemes in Costa Rica (FONAFIFO) show causal conservation effect vs. counterfactual using matching methods; ~10-17% deforestation reduction"
  - note: "Dasgupta (2021) — argues PES is the most efficient instrument for ecosystem conservation; regulatory alternatives impose higher deadweight loss"
    type: supporting

proposed_tests:
  - description: >
      Difference-in-differences evaluation of PES programs across 20 countries
      (Costa Rica, Brazil, Mexico, Indonesia, China, Kenya) from 2000-2025 using
      Hansen Global Forest Watch data; estimate causal effect of PES payment per
      hectare on annual deforestation rate; compare cost-effectiveness to
      protected areas (command-and-control) controlling for forest type and pressure.
    method: "Hansen GFW deforestation data; propensity score matching of treated (PES) and control (unprotected) parcels; DiD regression with country-year FE"
    prediction: "PES programs reduce annual deforestation by 5-20% relative to matched controls; cost per ton CO₂ conserved is $5-20, 3-10x cheaper than protected areas administration; effect size larger in high-pressure deforestation zones"
  - description: >
      Design a choice experiment to elicit willingness-to-pay for ecosystem service
      bundles (flood protection, biodiversity, carbon) in 500 households in
      floodplain areas; use results to calibrate Pigouvian subsidy rates for
      adjacent wetland conservation; implement via revealed-preference validation
      (observed insurance purchase decisions).
    method: "Stated preference (choice experiment); revealed preference (flood insurance purchase) cross-validation; Pigouvian subsidy calibration; test in randomized field experiment"
    prediction: "Willingness-to-pay for flood protection exceeds current PES subsidy rates by 2-5x in high-risk floodplain areas; revealed preference validates stated preference within 30%; optimal Pigouvian subsidy is $500-2000/ha/year for coastal wetlands"


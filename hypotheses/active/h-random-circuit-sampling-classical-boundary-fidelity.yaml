id: h-random-circuit-sampling-classical-boundary-fidelity
title: >
  The boundary between classically hard and classically easy random circuit sampling
  is a phase transition at cross-entropy benchmarking fidelity F* = exp(-n × ε_gate),
  where n is qubit count and ε_gate is per-gate error rate, and current NISQ devices
  operate above this threshold for n > 50 qubits at realistic gate errors.

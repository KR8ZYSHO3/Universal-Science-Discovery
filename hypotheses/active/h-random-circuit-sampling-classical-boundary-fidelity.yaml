evidence_links:
  - doi: "10.1038/s41567-018-0318-2"
    type: supporting
    confidence: 0.84
    note: >
      Boixo et al. (2018) Nat Phys — XEB fidelity: F ≈ exp(-n·d·ε) where d is depth;
      anti-concentration occurs at d > log(n); classical simulation cost scales as
      exp(n) when F < 1/exp(1) threshold for tensor network contraction to fail
  - doi: "10.1038/s41586-019-1666-5"
    type: supporting
    confidence: 0.81
    note: >
      Arute et al. (2019) — 53-qubit Sycamore at 20 cycles; XEB = 0.224% (above classical
      threshold by their estimate); subsequent classical simulation claims (IBM) challenged
      whether F* threshold was actually crossed
  - doi: "10.1103/PhysRevLett.127.180502"
    type: related
    confidence: 0.75
    note: >
      Liu et al. (2021) PRL — tensor network contraction algorithms achieve classical
      simulation of RCS at depth 20 for 30 qubits in minutes; depth threshold for
      hardness shifts upward as algorithms improve, making F* time-dependent
proposed_tests:
  - description: >
      Run identical RCS experiments at systematically varied (n, d, ε): 20-100 qubits,
      depth 10-40, three gate error rates; measure XEB; identify empirical F* contour
      where classical simulation transitions from polynomial to exponential cost;
      compare F* contour with theoretical prediction F* = exp(-n·ε).

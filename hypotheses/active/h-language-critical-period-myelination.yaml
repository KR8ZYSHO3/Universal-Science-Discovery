id: h-language-critical-period-myelination
title: >
  The closure of the language critical period is caused by myelination of arcuate
  fasciculus pathways connecting frontal and temporal language areas, reducing
  neural plasticity; incomplete myelination in heritage language learners predicts
  residual phonological plasticity measurable by MMN responses.

proposed_tests:
  - discipline: neuroscience
    description: >
      Acquire DTI scans measuring arcuate fasciculus fractional anisotropy (FA)
      in three groups: (1) native speakers of Mandarin (N=30), (2) early learners
      (age 1-5 immersion, N=30), (3) late learners (age 12+ immersion, N=30).
      Measure Mandarin tone MMN amplitude in EEG. Hypothesis: arcuate fasciculus FA
      is negatively correlated with MMN amplitude for non-native phonemes (r < -0.4),
      and late learners show significantly lower MMN than early learners despite
      equal years of exposure, with the difference predicted by FA difference.

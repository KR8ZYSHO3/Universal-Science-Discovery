    type: supporting
    confidence: 0.65
    note: "Ulrich et al. (1991) hospital room views of nature reduced post-surgical stress"
  - type: supporting
    confidence: 0.60
    note: "Attention Restoration Theory (Kaplan & Kaplan 1989) - natural complexity restores directed attention"
  - type: related
    confidence: 0.55
    note: "Appleton (1975) Prospect-Refuge theory - evolutionary preference for environments offering both overview and shelter"
proposed_tests:
  - description: >
      Ambulatory cortisol and EEG study: recruit 120 participants to spend 2-hour
      sessions in matched high-complexity (biophilic design) vs low-complexity
      (uniform office) environments. Measure salivary cortisol (4 time points),
      EEG alpha/theta power (attentional state), and self-report. Crossover design.
    prediction: "High-complexity environments reduce cortisol by ≥15% and increase alpha power by ≥10%."

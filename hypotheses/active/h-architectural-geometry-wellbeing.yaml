id: h-architectural-geometry-wellbeing
title: >
  Built environments with high spatial complexity, biophilic elements, and
  prospect-refuge balance causally reduce cortisol, improve attention restoration,
  and reduce self-reported stress compared to low-complexity uniform environments.
status: active
priority: high
impact_score: 0.74
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

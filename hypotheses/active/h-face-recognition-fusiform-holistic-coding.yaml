id: h-face-recognition-fusiform-holistic-coding
title: >
  The fusiform face area implements holistic face coding via a population code in which
  identity is represented as a trajectory through a high-dimensional eigenface space,
  and the perceptual inversion effect is explained by disruption of the learned principal
  component axes when face parts are presented in non-canonical spatial relationships.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium

id: h-compressed-sensing-mri-10x-scan-time-reduction-clinical-safety
title: >
  Compressed sensing MRI with undersampling by factor 10× (acquiring 10% of
  k-space measurements required by Nyquist) achieves diagnostic image quality
  equivalent to fully-sampled MRI for cardiac, neurological, and musculoskeletal
  indications when the image reconstruction uses ℓ₁-wavelet minimisation, as
  validated in randomised controlled clinical trials.

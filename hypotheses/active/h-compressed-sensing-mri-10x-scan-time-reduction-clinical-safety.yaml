proposed_tests:
  - description: >
      Randomised non-inferiority trial: 200 patients requiring knee MRI
      randomised to standard fully-sampled MRI (8-minute scan) vs. CS-MRI
      (10× undersampled, 50-second scan) with ℓ₁-wavelet reconstruction.
      Primary endpoint: radiologist diagnostic accuracy for ACL tear, meniscal
      tear, and cartilage defects. Non-inferiority margin: sensitivity/specificity
      within 5% of standard MRI.
    method: >
      Double-blind read by 3 musculoskeletal radiologists; arthroscopy or
      surgical finding as ground truth where available; inter-reader agreement
      (κ statistic).
    prediction: >
      CS-MRI (10×) achieves sensitivity/specificity within 3% of standard MRI
      for all three pathologies; scan time reduction from 8 min to <1 min;
      radiologist preference for CS-MRI due to reduced motion artifact.
  - description: >
      Paediatric neuroimaging study: 100 children (5-12 years) requiring brain
      MRI under sedation. CS-MRI vs. standard MRI for white matter lesion
      detection, hydrocephalus quantification, and tumour characterisation.
      Primary benefit: reduced sedation duration reduces procedural risk.
    method: >
      Retrospective comparison of sedation duration; quality metrics (SNR, sharpness,
      lesion conspicuity) scored by neuroradiologists.
    prediction: >
      CS-MRI (8×) reduces sedation duration by ≥50% with equivalent diagnostic
      quality; reduction in sedation-related adverse events in the CS arm.

evidence_links:
  - type: supporting
    doi: 10.1073/pnas.0610561104
    note: >
      Szpunar et al. (2007) PNAS — default mode network activated by both past
      memory retrieval and future episodic simulation; functional overlap suggests
      shared mechanism used by mind wandering.
  - type: supporting
    doi: 10.1126/science.1192439
    note: >
      Smallwood & Schooler (2006) — experience sampling methodology showing
      mind wandering frequency and content; future-oriented content predominates
      in unconstrained thought sampling.
proposed_tests:
  - discipline: cognitive-science
    description: >
      Sample thought content from 80 participants with experience sampling (ESM)
      app (8 prompts per day for 14 days). Code each mind-wandering episode as
      past, present, or future-oriented. Measure prospective memory (PM; intentions
      to remember over 2 weeks) and delay discounting (k-value). Hypothesis:
      proportion of future-oriented mind wandering (>50% episodes) correlates with
      prospective memory performance (r > 0.35) and lower delay discounting
      (more future-oriented preferences; r < -0.3), with effects independent of
      working memory capacity.

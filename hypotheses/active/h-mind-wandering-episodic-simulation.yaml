id: h-mind-wandering-episodic-simulation
title: >
  Mind wandering serves an episodic future simulation function: spontaneous thought
  preferentially generates prospective (future-oriented) narrative scenarios rather
  than past retrieval, and individuals with richer and more specific future simulations
  during mind wandering show better prospective memory and goal-directed behavior.

id: h-half-wavelength-coil-spacing-bound-suppresses-near-field-grating-analogs
title: >
  When driven at wireless charging frequencies with phased currents, planar coil mats exhibit peak stray-field sidelobe growth
  once lateral spacing exceeds ~0.35–0.45× the effective magnetic wavelength in the coupled medium — motivating spacing caps even when classical half-wave far-field grating criteria do not literally apply.

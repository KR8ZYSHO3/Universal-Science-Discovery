proposed_tests:
  - summary: >
      For 20+ fragmented landscapes (satellite land-cover maps), compute the percolation
      probability p_c and fractal dimension D of the connected habitat cluster. Test whether
      z = D/2 (percolation cluster dimension prediction) fits the empirically measured
      species-area exponents for birds or mammals in those landscapes better than the
      null prediction of z = 0.25 (universal constant).

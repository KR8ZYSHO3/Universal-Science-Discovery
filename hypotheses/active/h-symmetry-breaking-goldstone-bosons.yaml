proposed_tests:
  - description: "Inelastic neutron scattering (INS) on single-crystal kagome antiferromagnet (herbertsmithite, ZnCu₃(OH)₆Cl₂) at T=2K; measure magnon dispersion ω(k) along ΓM and ΓK directions; fit to ω=Dk² (type-II) vs. ω=v|k| (type-I); extract D from quadratic coefficient."
  - description: "Construct minimal spin Hamiltonian with Heisenberg exchange J and DM interaction D on kagome lattice; solve spin-wave theory to 1/S order; compare predicted magnon dispersion to INS data; verify Nielsen-Chadha counting (broken generators vs. magnon mode count)."

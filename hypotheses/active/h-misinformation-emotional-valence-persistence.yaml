id: h-misinformation-emotional-valence-persistence
title: >
  Misinformation is more persistent than corrections because emotional arousal
  (fear, outrage, disgust) during initial exposure creates stronger memory
  consolidation and motivated reasoning to reject corrections — the asymmetry
  is greatest when corrections threaten partisan identity and cannot be
  eliminated by accuracy framing alone.
status: active
priority: high
impact_score: 0.78
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - social-science
  - cognitive-science
  - psychology
  - communication
unknowns_addressed:
  - u-misinformation-correction-asymmetry
evidence_links:
  - doi: "10.1126/science.aap9559"
    type: supporting
    confidence: 0.75
    note: >
      Vosoughi et al. (2018) Science study of Twitter misinformation: false
      news is 70% more likely to be retweeted than true; emotional novelty
      (fear, disgust) mediates spreading rate — consistent with emotional
      encoding hypothesis.
  - doi: "10.1371/journal.pone.0193088"
    type: supporting
    confidence: 0.65
    note: >
      Chan et al. (2017) meta-analysis of 52 misinformation correction studies:
      corrections reduce belief in misinformation by 0.25-0.35 SD on average,
      but effect size smaller when information is politically congruent.
  - doi: "10.1073/pnas.1806840116"
    type: related
    confidence: 0.68
    note: >
      Pennycook & Rand (2019) accuracy nudge: prompting analytical thinking
      reduces sharing of misinformation; suggests dual-process mechanism
      (fast emotional → slow analytical) is corrigible.
proposed_tests:
  - description: >
      3-arm randomised experiment: (1) read misinformation with high emotional
      content, (2) read misinformation with low emotional content, (3) control
      (no misinformation). 24 hours later: all groups receive identical
      correction. Measure residual belief in corrected claim at 1 week and
      1 month follow-up. Test: does emotional valence of initial exposure
      predict correction-resistance (residual belief > baseline after correction)?
      Moderation by partisan identity.

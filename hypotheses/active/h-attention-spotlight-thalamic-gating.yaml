proposed_tests:
  - discipline: neuroscience
    description: >
      In mice performing a spatial attention task (cued orientation discrimination),
      optogenetically silence TRN neurons projecting to the contralateral lateral
      geniculate. Measure d-prime sensitivity for attended vs. unattended stimuli.
      The hypothesis predicts TRN silencing specifically abolishes the attended-location
      advantage without affecting absolute sensitivity.
  - discipline: computational-neuroscience
    description: >
      Build a thalamocortical model with explicit TRN layer (inhibitory interneurons
      with all-to-all connectivity within TRN). Implement top-down biasing from V4/IT
      onto TRN subpopulations. Test whether TRN-mediated gating produces sharper
      attentional modulation of signal-to-noise ratios than direct cortical biasing
      models, as measured by receiver operating characteristic area.

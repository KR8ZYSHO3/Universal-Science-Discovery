id: h-attention-spotlight-thalamic-gating
title: >
  The attentional spotlight is implemented by thalamic reticular nucleus gating of
  thalamocortical relay neurons: spatial attention shifts the TRN inhibition pattern
  to selectively amplify feedforward signals from attended locations while suppressing
  those from unattended locations, making the TRN the physical substrate of the
  biased-competition mechanism.

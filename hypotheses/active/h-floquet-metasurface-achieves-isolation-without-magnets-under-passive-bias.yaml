id: h-floquet-metasurface-achieves-isolation-without-magnets-under-passive-bias
title: >
  A space-time modulated metasurface can reach practically useful directional isolation without magnetic
  bias when modulation phase velocity and sideband loading are jointly optimized under passivity constraints.
status: active
priority: medium
impact_score: 0.56
created: "2026-05-08"
last_updated: "2026-05-08"
author: USDR

evidence_links:
  - doi: "10.1126/science.1210713"
    type: related
    confidence: 0.41
    note: "Wavefront-engineered metasurfaces provide baseline framework for programmable momentum bias."

unknowns_addressed:
  - u-floquet-metamaterial-nonreciprocity-passivity-limit

proposed_tests:
  - description: >
      Fabricate tunable space-time modulated unit cells and sweep modulation depth/phase velocity while
      measuring directional transmission, insertion loss, and intermodulation distortion.
    method: Vector-network-analyzer characterization with synchronized modulation drive.
    prediction: Joint optimization yields >=10 dB directionality with acceptable insertion loss in a narrow band.

related_disciplines:
  - electromagnetism
  - metamaterials
  - microwave-engineering

id: h-arctic-amplification-local-feedback-dominance
title: >
  Arctic amplification is primarily driven by local surface-albedo and
  lapse-rate feedbacks (~60%) rather than poleward heat transport changes,
  with the relative contribution of transport increasing only under >3°C
  global warming scenarios.
status: active
priority: medium
impact_score: 0.71
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - climate-science
  - atmospheric-physics
  - physical-oceanography
unknowns_addressed:
  - u-arctic-amplification-mechanism
evidence_links:
  - doi: "10.1038/s41561-018-0124-9"
    type: supporting
    confidence: 0.65
    note: >
      Stuecker et al. (2018) use CESM large ensemble to separate local
      feedbacks from remote forcing; surface albedo and lapse rate account
      for 65-70% of Arctic amplification in 1950-2100.
  - doi: "10.1175/JCLI-D-16-0320.1"
    type: related
    confidence: 0.58
    note: >
      Pithan & Mauritsen (2014) perform radiative kernel decomposition across
      CMIP5 models; lapse rate feedback is strongest single contributor but
      with large inter-model spread.
  - doi: "10.1029/2019GL082929"
    type: supporting
    confidence: 0.60
    note: >
      Boeke & Taylor (2018) compare observational reanalysis with CMIP5 models;
      find local feedbacks account for >55% of amplification in ERA-Interim.
proposed_tests:
  - description: >
      Apply the radiative kernel decomposition method to the CMIP6 ensemble
      (≥40 models). Quantify the fraction of Arctic amplification attributable
      to: (1) surface albedo feedback, (2) lapse rate feedback, (3) poleward
      latent heat transport, (4) poleward sensible heat transport. Test at
      1.5°C, 2°C, 3°C, and 4°C global warming levels. Prediction: local
      feedbacks dominate (>55%) below 3°C but transport increases in share
      above 3°C.

id: h-long-covid-viral-reservoir-reactivation
title: >
  Long COVID symptoms persisting beyond 12 weeks are primarily caused by persistent
  SARS-CoV-2 viral reservoirs in intestinal epithelium and lymphoid tissue that
  continuously seed low-level systemic inflammation via viral antigen shedding.
status: active
priority: critical
impact_score: 0.87
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - infectious-disease
  - immunology
  - gastroenterology
unknowns_addressed:
  - u-long-covid-mechanism
evidence_links:
  - doi: "10.1016/j.cell.2021.06.005"
    type: supporting
    confidence: 0.80
    note: >
      Zollner et al. (2022) Gastroenterology — SARS-CoV-2 RNA and protein detected in
      gut biopsies of long COVID patients >7 months post-infection; antigen correlates
      with symptom severity
  - doi: "10.1038/s41591-022-01745-6"
    type: supporting
    confidence: 0.78
    note: >
      Gaebler et al. — persistent spike protein in CD16+ non-classical monocytes detected
      up to 15 months post-infection in long COVID; correlates with low-level inflammation
  - doi: "10.1126/science.abm9986"
    type: related
    confidence: 0.72
    note: >
      Peluso et al. — antiviral treatment (Paxlovid) during long COVID reduces symptom
      burden in some patients, consistent with ongoing viral replication being causal
proposed_tests:
  - description: >
      Randomised trial of extended nirmatrelvir-ritonavir (Paxlovid, 15 days) vs placebo
      in long COVID patients; primary endpoint: symptom burden at 6 months; secondary:
      circulating viral antigen, gut biopsy viral RNA, and inflammatory cytokine panel.

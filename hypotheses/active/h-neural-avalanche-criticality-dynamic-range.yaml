evidence_links:
  - doi: "10.1523/JNEUROSCI.5601-03.2003"
    type: supporting
    confidence: 0.88
    note: >
      Beggs & Plenz (2003) J Neurosci — neuronal avalanches follow P(s) ∝ s^(-3/2)
      in organotypic cultures; branching ratio σ ≈ 1; subcritical (σ < 1) reduces
      dynamic range; supercritical (σ > 1) causes synchronous bursting
  - doi: "10.1103/PhysRevLett.97.138107"
    type: supporting
    confidence: 0.84
    note: >
      Kinouchi & Copelli (2006) PRL — analytical result: critical branching process
      maximises dynamic range over 5-6 orders of magnitude of input intensity;
      off-critical networks have narrower response range (proof of dynamic range optimality)
  - doi: "10.1371/journal.pcbi.1003985"
    type: related
    confidence: 0.79
    note: >
      Priesemann et al. (2014) PLoS Comput Biol — in vivo LFP analysis shows resting
      cortex is slightly subcritical (σ ≈ 0.95), not exactly critical; active states
      shift toward criticality, suggesting criticality is dynamically regulated
proposed_tests:
  - description: >
      Chronically block synaptic scaling (BNDF antibody or arc knockout) in acute cortical
      slices; measure avalanche exponent and branching ratio; predict that blocking
      homeostatic plasticity destabilises criticality over 24-48h and reduces stimulus
      discrimination threshold measured by multielectrode response diversity.

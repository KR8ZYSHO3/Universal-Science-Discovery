id: h-neural-avalanche-criticality-dynamic-range
title: >
  The brain operates near a critical branching ratio (σ ≈ 1) because criticality
  maximises the dynamic range of response to sensory stimuli, and this criticality
  is homeostatically regulated by synaptic scaling — disruption of homeostatic
  plasticity shifts the system away from criticality and impairs sensory discrimination.

id: h-metadynamics-collective-variables-protein-allostery
title: >
  Metadynamics simulations using graph-neural-network-derived collective variables will
  identify the allosteric communication pathways in therapeutic targets (kinases, GPCRs)
  inaccessible to conventional MD, enabling structure-based design of allosteric inhibitors
  with 100-fold selectivity improvements over orthosteric drugs.

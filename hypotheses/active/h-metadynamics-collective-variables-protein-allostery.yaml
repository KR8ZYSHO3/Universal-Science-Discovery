proposed_tests:
  - description: >
      Apply GNN-derived collective variables (trained on MD trajectories of 50 kinases)
      to metadynamics simulation of ABL1 kinase. Compare computed allosteric pocket
      free energy profiles against experimental data from HDX-MS and NMR chemical shift
      perturbation experiments. Prediction: GNN-CV metadynamics identifies the same
      allosteric sites as experiment in 4/5 test kinases not in the training set.
  - description: >
      Prospective design: use allosteric pocket identified by metadynamics in KRAS G12C
      beyond the Switch II pocket to design 5 candidate allosteric fragments. Test
      binding and allosteric inhibition by SPR and NanoBRET. Prediction: ≥2/5 fragments
      show selective allosteric inhibition (IC50 < 10 μM allosteric, > 100 μM competing
      with GTP at active site).

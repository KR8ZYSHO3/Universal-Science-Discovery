proposed_tests:
  - description: >
      Compute frustration index for all residues in 50 intrinsically disordered
      proteins (IDPs) with known aggregation propensity (measured by ThT fluorescence
      kinetics) using the frustratometer; correlate frustration hotspots with
      aggregation-prone segments identified by TANGO, AGGRESCAN, and CamSol.
    method: "Frustratometer analysis on AlphaFold2 structures of IDPs; Pearson correlation with experimental aggregation rates and predictor scores"
    prediction: "Frustration hotspots correlate with aggregation-prone regions with r > 0.7; highly frustrated segments show >5-fold higher aggregation rate"
  - description: >
      Design fold-switching proteins with two competing energy minima by introducing
      frustrated contacts at the interface between fold 1 and fold 2 residues, using
      Rosetta to optimize the frustration balance.
    method: "Rosetta protein design with frustration constraint; experimental validation by NMR and CD spectroscopy confirming two-state switching"
    prediction: "Designed metamorphic protein switches folds upon addition of ligand with Kd < 10 uM, demonstrating rational landscape engineering"

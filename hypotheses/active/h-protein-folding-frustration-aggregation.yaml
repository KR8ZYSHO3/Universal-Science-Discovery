id: h-protein-folding-frustration-aggregation
title: >
  The local frustration index from the Wolynes-Ferreiro frustratometer quantitatively
  predicts aggregation-prone regions in intrinsically disordered proteins with
  accuracy comparable to sequence-based aggregation predictors

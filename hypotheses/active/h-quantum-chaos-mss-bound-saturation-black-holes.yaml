id: h-quantum-chaos-mss-bound-saturation-black-holes
title: >
  The Maldacena-Shenker-Stanford (MSS) bound on quantum chaos (λ_L ≤ 2πk_BT/ℏ) is
  saturated only by systems with a holographic dual (black holes and SYK-like models),
  and this saturation is thermodynamically equivalent to maximal information scrambling
  — providing a route to detecting quantum gravitational signatures in condensed matter.

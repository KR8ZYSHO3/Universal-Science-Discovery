proposed_tests:
  - description: >
      Measure OTOC decay rates in digital quantum circuit architectures (superconducting
      qubits and trapped ions) as a function of connectivity topology; test whether random
      all-to-all connectivity approaches λ_L = 2πT saturation while sparse circuits fall
      below the bound, calibrating hardware noise as a systematic.

  - doi: "10.1103/PhysRevA.41.1172"
    type: supporting
    confidence: 0.65
    note: "Grempel, Fishman & Prange (1990) PRA — quantized chaotic maps; Feigenbaum universality holds in the classical limit; deviations are O(ℏ_eff²)"

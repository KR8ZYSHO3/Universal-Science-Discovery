id: h-feigenbaum-universality-quantum-maps-period-doubling
title: >
  The Feigenbaum universality of period-doubling routes to chaos (δ ≈ 4.669, α ≈ 2.502)
  extends to quantum maps via the quantum-classical correspondence: quantized versions
  of the logistic map and the Hénon map exhibit the same universal period-doubling
  ratios in the semiclassical limit (ℏ → 0, N_eff → ∞), with quantum corrections
  suppressed as O(ℏ) relative to classical universal behavior.

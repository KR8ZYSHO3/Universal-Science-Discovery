id: h-marcus-inverted-region-biological-electron-transfer
title: >
  Photosynthetic primary charge separation operates in the Marcus activationless
  regime (ΔG° ≈ -λ) with near-unit quantum efficiency because natural selection
  has tuned the reorganization energy λ to match the free energy drop ΔG°,
  and artificial photovoltaic systems that replicate this Marcus optimization
  will achieve comparable quantum efficiencies.

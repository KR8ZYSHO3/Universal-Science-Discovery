proposed_tests:
  - description: >
      Synthesize a series of donor-acceptor dyads spanning ΔG° from -0.5 to -2.5 eV
      in a fixed solvent (fixed λ). Measure electron transfer rates by transient
      absorption spectroscopy. Verify the inverted region: the rate maximum occurs
      at ΔG° = -λ and falls symmetrically for more exergonic reactions.
  - description: >
      Compare reorganization energies λ for the primary charge separation step
      (P680 → Pheo) in Photosystem II using electrochromic shift measurements
      and Marcus theory fitting. Test whether ΔG° ≈ -λ within measurement
      uncertainty, confirming activationless optimization by evolution.

id: h-derived-algebraic-geometry-char-p
title: >
  The fundamental obstruction to extending derived algebraic geometry to
  characteristic p arithmetic geometry is the failure of the HKR theorem
  (Hochschild-Kostant-Rosenberg), which requires p-th divided powers — and
  prismatic cohomology (Bhatt-Scholze) resolves this by providing the correct
  derived de Rham comparison in mixed characteristic.

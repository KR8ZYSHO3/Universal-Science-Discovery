proposed_tests:
  - description: >
      Derived stack computation: use prismatic cohomology to compute the
      derived de Rham cohomology of the moduli of elliptic curves M_{1,1}
      over Z_p. Verify agreement with classical crystalline cohomology for
      the ordinary locus and prismatic cohomology for the supersingular locus.
      This would validate prismatic DAG as the correct char p framework.
  - description: >
      HKR obstruction classification: systematically classify smooth algebras
      over Z/pⁿ for which HKR holds vs. fails. Compute the derived Hodge
      filtration in each case. Test: the failure locus is precisely controlled
      by divided power structure — prismatic cohomology exactly corrects this.

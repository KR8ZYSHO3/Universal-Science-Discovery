id: h-lnt-model-invalid-endocrine-disruptors
title: >
  The linear no-threshold (LNT) extrapolation model is mechanistically invalid for
  endocrine disruptors that activate estrogen receptor-alpha (ERα) or androgen
  receptor (AR), because these receptors exhibit concentration-dependent subtype
  switching and feedback compensation that generate non-monotonic dose-response curves
  with adverse effects at doses 100-1000× below current NOAEL-derived safety limits.

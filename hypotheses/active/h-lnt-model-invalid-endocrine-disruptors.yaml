proposed_tests:
  - description: >
      Pre-registered, multi-laboratory blinded replication study: 6 independent labs
      test BPA effect on uterotrophic response in immature female rats at 8 doses
      (0.0002, 0.002, 0.02, 0.2, 2, 20, 200, 2000 µg/kg/day) using identical SOP.
      Primary endpoint: uterine wet weight and ERα-target gene expression (Egr1,
      c-Fos). Test: is the dose-response curve non-monotonic with a significant
      low-dose peak?
    method: "Immature rat uterotrophic assay per OECD TG 440; blinded dose preparation; RT-qPCR; Jonckheere-Terpstra test for non-monotonicity"
    prediction: "NMDR with peak at 0.02-0.2 µg/kg/day in ≥4/6 labs; LNT extrapolation from 2000 µg misses low-dose effect by >10-fold"
  - description: >
      Mechanistic test: ERα/ERβ reporter assay in MCF-7 cells across BPA
      concentration range 0.001-100 µM. Measure ERα:ERβ transactivation ratio
      (ERE-luciferase reporters under ERα vs. ERβ promoter) at each dose.
      Test: does ERα:ERβ ratio flip sign at intermediate BPA concentrations,
      consistent with receptor subtype switching explaining NMDR?
    method: "Dual-reporter luciferase assay, Hill equation fitting per subtype, ratio curve"
    prediction: "ERα:ERβ ratio >1 at 0.01-0.1 µM, <1 at 1-10 µM — subtype flip consistent with NMDR"

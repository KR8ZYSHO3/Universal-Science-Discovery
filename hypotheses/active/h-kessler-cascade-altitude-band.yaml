id: h-kessler-cascade-altitude-band
title: >
  The Kessler cascade is already self-sustaining in the 900–1,000 km altitude band
  due to the 2009 Iridium-Cosmos collision, and active debris removal of fewer than
  10 objects per year in this band will be insufficient to prevent net debris growth
  under Starlink/OneWeb constellation deployment schedules.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.88
related_disciplines:
  - aerospace-engineering
  - orbital-mechanics
  - engineering
  - space-policy
unknowns_addressed:
  - u-space-debris-removal
evidence_links:
  - type: supporting
    note: >
      NASA LEGEND model simulations (Lewis et al. 2020) show debris population in
      900–1000 km band grows even with 0 new launches due to collision-generated
      fragments from existing objects; threshold for self-sustaining cascade may
      already be exceeded in this band.
  - type: supporting
    note: >
      Approximately 27,000 tracked objects >10 cm exist as of 2026; 2009 Iridium-Cosmos
      collision generated >1,000 new tracked fragments still in orbit, and Fengyun-1C
      ASAT test (2007) generated >3,500 tracked fragments.
  - type: contradicting
    note: >
      IADC (Inter-Agency Space Debris Coordination Committee) analysis using different
      orbital evolution models finds the 900–1000 km band marginally stable with
      current traffic, not self-sustaining cascade. Model uncertainties are large.
proposed_tests:
  - description: >
      Run ensemble simulations of LEGEND, ORDEM, and MASTER debris evolution models
      with current TLE catalog through 2100 under 0, 5, and 10 ADR objects per year
      scenarios. Test whether ensemble agrees on whether cascade is already self-sustaining
      in any altitude band at 90% confidence.
  - description: >
      Track second-generation collision fragments from the 2009 Iridium-Cosmos event
      over 2026–2036. Measure collision rate with existing objects. Compare to Kessler
      threshold models; if second-generation fragments are producing detectable collision
      events, this provides empirical evidence for cascade initiation.

proposed_tests:
  - description: "Compute DFT molecular descriptors (dipole moment, anisotropic polarizability, aspect ratio, quadrupole moment) for 100 known liquid crystal compounds from LICR database; fit random forest and neural network models to predict K₁, K₂, K₃; evaluate RMSE on 20% holdout test set."
  - description: "Identify which molecular descriptor(s) independently predict K₂ (twist) vs K₁ (splay) most accurately; test whether K₂/K₁ ratio correlates with molecular chirality measure as Landau theory predicts."

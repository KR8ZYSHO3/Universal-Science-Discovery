id: h-predictive-processing-psychosis
title: >
  Psychotic hallucinations arise from a pathological increase in prior precision relative
  to likelihood precision — the brain is locked in a high-confidence prior state that
  overrides incoming sensory evidence — and this computational failure is quantifiable
  from the psychophysics of predictive processing.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
related_disciplines:
  - neuroscience
  - statistics
  - psychiatry
  - computational-neuroscience
unknowns_addressed:
  - u-bayesian-brain-prior-encoding
evidence_links:
  - type: supporting
    doi: "10.1098/rstb.2013.0186"
    note: >
      Adams et al. (2013) formal analysis of predictive coding in psychosis: reduced
      NMDA receptor function (as modelled by ketamine or schizophrenia) impairs
      precision weighting of prediction errors, leading to hallucination-like
      over-reliance on prior expectations.
  - type: supporting
    doi: "10.1016/j.tics.2009.04.005"
    note: >
      Fletcher & Frith (2009) cognitive dysmetria and aberrant salience in psychosis;
      prediction error signals that should be suppressed by accurate predictions are
      instead amplified, driving hallucinatory experiences.
  - type: contradicting
    note: >
      Alternative model: hallucinations may arise from increased noise in the likelihood
      (sensory channel) rather than increased prior precision — the distinction is
      difficult to test behaviourally without independent measures of both parameters.
proposed_tests:
  - discipline: computational-neuroscience
    description: >
      Administer a hierarchical Bayesian perceptual task (reverse-correlation with
      manipulation of likelihood vs. prior) to schizophrenia patients and matched
      controls. Fit the Bayesian observer model to individual psychophysical curves.
      Test whether patients show a systematic increase in the fitted prior precision
      parameter (relative to likelihood precision) compared to controls, confirming
      the predictive processing account of hallucinations.
  - discipline: pharmacology
    description: >
      Ketamine (NMDA antagonist) produces transient psychotic-like states in healthy
      volunteers. Apply the hierarchical perceptual task before and after subanesthetic
      ketamine and fit the Bayesian observer model at each timepoint. Test whether
      ketamine shifts the prior/likelihood precision ratio in the direction predicted
      by the computational model of psychosis.

id: h-dispersion-engineering-achromatic-metalens
title: "Inverse-designed all-dielectric metasurfaces can achieve diffraction-limited achromatic focusing across 400-700 nm wavelength range at NA > 0.5 by exploiting resonant phase dispersion in nanostructures with aspect ratio > 10, and the maximum achievable bandwidth-aperture product is limited by a conservation law analogous to the Abbe-Porter theorem in classical optics"
status: active
priority: medium
impact_score: 0.70
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1038/nnano.2016.35"
    type: supporting
    confidence: 0.75
    note: "Khorasaninejad et al. (2016) Nature Nanotechnology - achromatic metalens demonstration at NA = 0.2"
  - type: contradicting
    note: "Shrestha et al. (2018) - fundamental limits to multi-wavelength achromatic metalens aperture"
  - type: related
    note: "Wang et al. (2018) - broadband achromatic metalens in visible range"

unknowns_addressed:
  - u-chromatic-aberration-broadband-metalens

proposed_tests:
  - description: >
      Fabricate TiO2 metalenses with inverse-designed nanostructure geometries targeting visible achromatism
      and measure MTF (modulation transfer function) at 450, 532, 633, and 700 nm. Compare efficiency and
      diffraction-limit performance against theoretical bounds from integrated group delay dispersion.
    method: "E-beam lithography fabrication + white-light interferometry characterization + comparison to simulation"
    prediction: "Metalens with aspect ratio > 15 TiO2 pillars should achieve >40% efficiency and Strehl ratio > 0.8 at all four wavelengths"


id: h-language-change-replicator-conformity
title: >
  Conformity bias (frequency-dependent positive selection toward the majority variant)
  is the dominant selection mechanism in language change for grammatical features,
  while prestige bias dominates for lexical innovations, producing systematically
  different S-curve velocities measurable in historical corpora.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
related_disciplines:
  - linguistics
  - cultural-evolution
  - population-genetics
  - evolutionary-biology
unknowns_addressed:
  - u-language-evolution-selection-neutrality
evidence_links:
  - type: supporting
    doi: "10.1038/nature06137"
    note: Pagel et al. (2007) Nature — basic vocabulary changes at rate consistent with neutral drift, not selection
  - type: supporting
    doi: "10.1126/science.1219042"
    note: Michel et al. (2011) Science — verb regularization follows neutral-like power law
  - type: related
    note: >
      Baxter et al. (2009) Language Variation and Change — S-curve model of language change
      shows conformity bias produces faster S-curves than prestige bias under frequency-
      dependent selection; distinguishable in corpus data.
  - type: contradicting
    note: >
      Trudgill (2011) argues that most language change is deterministic (not stochastic),
      driven by dialect contact and population size effects, not cognitive bias mechanisms.
      In this view, conformity and prestige biases are epiphenomena, not causes.
proposed_tests:
  - discipline: linguistics
    description: >
      Compile longitudinal corpus data for 20 grammatical changes (e.g., going to →
      gonna, whom → who, was/were alternation) and 20 lexical innovations (neologisms
      entering written usage) from Google Books Ngrams and COHA. Fit the frequency
      trajectory f(t) of each variant to the replicator equation with (a) conformity
      selection w_i = f_i (frequency-proportional fitness) and (b) prestige selection
      w_i = constant (frequency-independent). Compare AIC/BIC model fits. Test whether
      grammatical features are better fit by conformity and lexical features by prestige.
  - discipline: cultural-evolution
    description: >
      Controlled experiment: present participants with a miniature artificial language
      containing two competing grammatical constructions and two competing words, with
      frequency information about "how most speakers" use each variant. Vary the
      frequency information: majority-uses-A (conformity condition) vs. high-prestige-
      speaker-uses-A (prestige condition). Test whether grammatical choices are more
      sensitive to majority frequency (conformity) and lexical choices are more sensitive
      to prestige — the cross-over prediction of the hypothesis.
  - discipline: population-genetics
    description: >
      Apply population-genetic neutrality tests (Tajima's D analog for cultural data)
      to corpus frequency trajectories. Compute the variance of change rates across
      grammatical and lexical features. Under neutral drift, variance should scale with
      1/(4N_e), where N_e is the effective linguistic population size. If grammatical
      features show lower variance than neutral prediction (excess stasis), this
      indicates purifying selection (conformity stabilization). If lexical innovations
      show higher variance, this indicates directional selection (prestige acceleration).

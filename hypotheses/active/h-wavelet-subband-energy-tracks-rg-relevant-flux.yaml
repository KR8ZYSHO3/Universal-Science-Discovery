id: h-wavelet-subband-energy-tracks-rg-relevant-flux
title: >
  For designated short-range Ising-family lattice models, energy flux captured in the first k dyadic wavelet subbands after block-spin RG steps will correlate monotonically with numerically integrated beta-function flow of nearest-neighbor coupling — falsified if wavelet bands mis-track operator relevance ranking versus spectrum of linearized RG at criticality.

proposed_tests:
  - description: Randomize participants to nature experience program (wilderness immersion, 4 days) vs. environmental education curriculum (equivalent time); measure place attachment, VBN variables, and actual conservation behavior at 6 months using behavioral tracking; test whether place attachment mediates behavior change more than NEP score
  - description: Meta-analysis of nature experience program evaluations; test whether programs including unstructured free time in nature (place attachment opportunity) produce larger conservation behavior effects than programs focused on ecological knowledge

id: h-scc-convex-damages-fat-tails
title: >
  The true social cost of carbon is dominated by low-probability, high-magnitude
  tail events (climate tipping point cascades above 4°C) that give the damage
  distribution a power-law tail, making the expected SCC at least 3× higher
  than standard quadratic damage function estimates and rendering near-zero
  discount rates normatively justified.

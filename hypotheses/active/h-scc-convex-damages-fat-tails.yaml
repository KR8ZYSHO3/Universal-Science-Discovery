proposed_tests:
  - description: >
      Monte Carlo SCC calculation coupling a calibrated climate model with
      heavy-tailed ECS distribution (log-normal + Pareto tail) to the
      Burke et al. (2015) non-linear damage function, comparing the full
      distribution of SCC values to the standard Nordhaus/EPA methodology.
    method: >
      Monte Carlo simulation (N=100,000) with climate sensitivity sampling from
      Sherwood et al. (2020) assessed distribution, Burke damage function,
      Ramsey discount rate r = 0.1-3%
    prediction: >
      At δ < 0.5% and η = 2, the 95th percentile SCC exceeds $1,000/tonne,
      and the expected SCC under the Burke damage function is >3× the Nordhaus
      estimate, confirming fat-tail dominance.
  - description: >
      Systematic inclusion of tipping point interaction network (Kiehl 2011,
      Armstrong McKay 2022) into DICE-2023 as a Markov jump process, measuring
      the change in optimal carbon price pathway.
    method: DICE model extension with stochastic tipping transitions
    prediction: >
      Including tipping cascades shifts the optimal carbon price trajectory
      upward by > 50% relative to baseline DICE, with the premium increasing
      steeply above 2°C of warming where tipping point probabilities rise.

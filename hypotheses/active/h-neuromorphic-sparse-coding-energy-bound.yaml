proposed_tests:
  - description: >
      Benchmark Intel Loihi-2, IBM NorthPole, and SpiNNaker-2 on identical inference
      tasks (MNIST, CIFAR-10, speech commands). Measure pJ/inference across sparsity
      levels 0.1-10 Hz average firing rate. Compare to Landauer bound prediction:
      E_min = N_syn × f_spike × k_B T ln 2 per classification.
    prediction: "Achieved energy at 1 Hz spike rate within 100x of Landauer bound; 10-100x below GPU baseline; energy scales linearly with mean firing rate confirming sparse coding theory."

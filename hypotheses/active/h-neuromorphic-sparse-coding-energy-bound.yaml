id: h-neuromorphic-sparse-coding-energy-bound
title: >
  Neuromorphic computing achieves fundamental energy advantage over von Neumann
  architectures because sparse event-driven coding (biological spike rates ~1-10 Hz
  vs continuous 10^9 Hz clock cycles) reduces energy per inference by 10^3-10^5x,
  with the theoretical minimum set by Landauer's bound per synaptic event
  (~10^4 kT per spike in biological neurons, 10-100 kT in CMOS implementations).

proposed_tests:
  - description: >
      Fabricate 2D arrays with controlled gradients in lattice insulation permittivity; illuminate at microwave
      frequencies and compare FFT peaks of |E|^2 versus lattice pitch versus insulation gradient.
    method: >
      Parameter sweep of gradient magnitude; separate forced periodicity at fabrication pitch from emergent spacing.
    prediction: >
      If a Turing-like instability exists, a dominant spatial frequency should appear that is not locked to the
      fabrication lattice pitch over some parameter window.

  - description: >
      Compare measured dominant spacing to predictions from a linearized coupled-mode model (effective coupling matrix + loss).
    method: >
      Extract effective parameters from S-parameters / eigenmode simulations; propagate uncertainties.
    prediction: >
      Scaling curves collapse onto a single instability boundary when plotted against normalized coupling ratios.

  - description: >
      Radar cross-section / scattering diagnostics vs gradient parameters without closed-loop electronic phase shifters.
    method: >
      Broadband scattering measurements with fixed feeds (no adaptive DSP).
    prediction: >
      Speculation: measurable band-specific scattering changes — failure mode if only lithographic periodicity drives spectra.


id: h-nonhelical-turing-cloaking-adaptation
title: >
  Gradient-parameter non-helical resonator arrays may exhibit spatially organized high-Q mode clusters whose dominant spacing responds to insulation gradient strength — enabling adaptive scattering/beam-shaping hypotheses — but “adaptive cloaking without external control” remains speculative until instability physics is validated.

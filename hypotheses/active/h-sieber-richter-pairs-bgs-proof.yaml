proposed_tests:
  - description: >
      Compute the two-point spectral form factor K(τ) for the Sinai billiard to
      all available orders in the periodic orbit expansion (using 10^7+ orbits)
      and compare to GOE prediction K_GOE(τ) = 2τ - τln(1+2τ). Discrepancy at
      high order would indicate where the Sieber-Richter expansion fails.
  - description: >
      Test the BGS conjecture for quantum graphs (exactly solvable) where the
      semiclassical expansion converges — this would provide the first exact
      verification (rather than numerical) of whether SR diagrams reproduce
      all GOE orders.

id: h-sieber-richter-pairs-bgs-proof
title: >
  The full periodic orbit expansion for quantum chaotic systems, organized by
  the Sieber-Richter diagrammatic topology, reproduces all orders of Gaussian
  Orthogonal Ensemble correlation functions in the semiclassical limit,
  providing the physical mechanism underlying the BGS conjecture.

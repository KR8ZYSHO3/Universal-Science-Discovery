proposed_tests:
  - description: Simulate continuous-time quantum walk on K_{N,N} for N = 4, 8, 16, 32, 64 on a density matrix simulator (QuTiP) with dephasing noise at rates γ = 0, 1/N, 2/N, 4/N (1/time units); measure mean hitting time T(γ, N); fit T(γ=0) ∝ N^α and compare to classical T ∝ N prediction; determine critical γ_c(N) where T(γ_c) = 2·T(γ=0); test whether γ_c scales as 1/(N·t_walk) as predicted; compare to 127-qubit IBM Eagle coherence times (T₂ ≈ 100-200 μs) to assess N ≤ 100 feasibility.

evidence_links:
  - type: supporting
    confidence: 0.9
    note: "Landau (1937) - general theory of phase transitions with symmetry breaking and scalar order parameter; van der Waals is the Z2-symmetric case"
  - type: supporting
    confidence: 0.85
    note: "Stanley (1971) Introduction to Phase Transitions - systematic derivation showing van der Waals as mean-field Ising model; mean-field critical exponents beta=1/2 are universal"
proposed_tests:
  - summary: >
      Measure the critical exponent beta (order parameter exponent) for three distinct
      physical systems: (a) liquid-gas critical point (van der Waals), (b) ferromagnetic
      Curie point, (c) superconducting transition (Ginzburg-Landau). Compare measured
      beta values to mean-field prediction (beta=0.5) vs renormalization group predictions
      (beta=0.326 for 3D Ising universality class). Universality predicts the same
      non-mean-field exponent for (a) and (b) since both break Z2 symmetry.

id: h-csf-pulsatile-flow-amyloid-clearance-sleep-deprivation
title: >
  Glymphatic CSF clearance of amyloid-β is primarily driven by slow-wave sleep
  (SWS) arterial pulsatility, such that each additional hour of SWS produces
  a quantifiable reduction in CSF amyloid-β concentration predictable from
  the Biot poroelastic flow model.
status: active
priority: high
impact_score: 0.88
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:
  - doi: "10.1126/scitranslmed.3003748"
    type: supporting
    confidence: 0.80
    note: "Iliff et al. (2012) established glymphatic bulk flow; AQP4-KO mice show 65% reduction in interstitial solute clearance"
  - doi: "10.1126/science.1241224"
    type: supporting
    confidence: 0.75
    note: "Xie et al. (2013) showed 60% faster amyloid-β clearance during sleep vs. wakefulness in mice"
  - type: related
    note: "Mestre et al. (2018) showed arterial pulsatility drives perivascular CSF flow; cardiac compression yields 0.5–1 µL/min per hemisphere"

unknowns_addressed:
  - u-glymphatic-csf-clearance-sleep-deprivation-rate

proposed_tests:
  - description: >
      PET imaging of [¹¹C]Pittsburgh Compound B (PiB) amyloid load before and
      after controlled sleep restriction (4 h/night × 5 nights) vs. normal sleep
      in healthy young adults to quantify the net amyloid accumulation rate per
      hour of SWS lost.
    method: "Longitudinal PiB-PET + polysomnography; within-subject crossover design controlling for circadian confounds"
    prediction: "Each hour of SWS loss corresponds to a measurable increase in PiB-PET signal density, predictable from the Biot model's clearance rate Q ∝ arterial pulse amplitude × AQP4 density"
  - description: >
      Phase-contrast MRI measurement of CSF flow velocity in the aqueduct of
      Sylvius across sleep stages (NREM1/2/3/REM) in young vs. elderly subjects,
      comparing flow velocity to simultaneously measured slow-wave power (EEG),
      to establish the SWS-pulsatility-clearance chain quantitatively.
    method: "Simultaneous EEG + phase-contrast MRI during natural sleep; time-resolved CSF velocity at 1 Hz resolution"
    prediction: "CSF net flow velocity is linearly proportional to slow-wave (0.5-4 Hz) EEG power, with the slope predicted by the Womersley number for the aqueduct geometry"

related_disciplines:

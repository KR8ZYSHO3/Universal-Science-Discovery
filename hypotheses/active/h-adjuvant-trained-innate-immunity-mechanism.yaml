id: h-adjuvant-trained-innate-immunity-mechanism
title: >
  Vaccine adjuvants enhance adaptive immune responses primarily by triggering trained
  innate immunity in bone marrow progenitors via epigenetic reprogramming (H3K4me3
  at inflammatory gene promoters), and the duration and magnitude of training determines
  the adjuvant effect on adaptive response quality.
status: active
priority: medium
impact_score: 0.80
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - immunology
  - epigenetics
  - vaccine-science
unknowns_addressed:
  - u-vaccine-adjuvant-mechanism
evidence_links:
  - doi: "10.1016/j.cell.2018.02.053"
    type: supporting
    confidence: 0.81
    note: >
      Netea et al. (2016) Science — BCG vaccination induces trained innate immunity in
      monocytes lasting >3 months; epigenetic marks (H3K4me1, H3K27ac) at promoters of
      TNF-α, IL-6; correlated with off-target protection against non-mycobacterial infections
  - doi: "10.1038/s41590-021-00939-3"
    type: supporting
    confidence: 0.78
    note: >
      Kaufmann et al. (2022) — BCG training extends to bone marrow HSCs, providing
      long-term reprogramming of myeloid output that outlasts monocyte lifespan (weeks)
  - doi: "10.1016/j.immuni.2021.01.007"
    type: related
    confidence: 0.70
    note: >
      Alum, the most common adjuvant, activates NLRP3 inflammasome in DCs; but MF59
      (squalene emulsion) works differently via HMGB1/RAGE signalling — multiple molecular
      pathways converge on the same downstream trained immunity endpoint
proposed_tests:
  - description: >
      Compare epigenetic landscape of circulating monocytes (ATAC-seq + H3K4me3 ChIP-seq)
      at 4 and 12 weeks post-vaccination with alum vs. MF59 vs. AS01B vs. saline;
      correlate trained innate scores with vaccine antigen-specific antibody titre at 6 months.

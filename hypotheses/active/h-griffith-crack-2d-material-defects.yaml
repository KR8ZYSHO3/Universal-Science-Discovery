evidence_links:
  - type: supporting
    doi: 10.1038/nmat3244
    note: >
      Grantab et al. (2010) — grain boundary strength in graphene follows Griffith
      scaling; tilt angle determines fracture energy; low-angle GBs are stronger.
  - type: supporting
    doi: 10.1021/nl403751p
    note: >
      Huang et al. (2011) — TEM imaging of graphene grain boundaries; dislocation
      density and misorientation determine boundary structure and electronic potential.
  - type: related
    doi: 10.1038/ncomms11241
    note: >
      Tsen et al. (2012) — graphene grain boundary resistance increases with
      misorientation angle; long-range Coulomb scattering dominates at high tilt.
proposed_tests:
  - discipline: materials-science
    description: >
      Grow CVD graphene and MoS2 films with controlled grain sizes (0.5-50 μm).
      Map grain boundary misorientation by EBSD and STEM. Measure local Hall mobility
      by van der Pauw on isolated single-grain regions vs. grain-boundary-crossing
      regions. Test whether mobility drop at a boundary scales with misorientation
      angle θ as predicted by the crack-analogy model (Δμ/μ ∝ sin²(θ/2)).
  - discipline: condensed-matter-physics
    description: >
      DFT-calculate the electronic potential across tilt grain boundaries in graphene
      and h-BN as a function of misorientation. Extract effective scattering potential
      height. Map onto the Griffith framework by comparing the potential height to the
      adhesion energy per boundary atom. Test whether the electronic and mechanical
      Griffith-analogy thresholds coincide at the same critical misorientation angle.

id: h-griffith-crack-2d-material-defects
title: >
  Carrier mobility in 2D materials is limited by grain boundary crack-like defects
  governed by a modified Griffith criterion where the effective fracture toughness scales
  with the interlayer van der Waals adhesion energy, such that grain boundaries with
  misorientation angles above a critical threshold act as sharp cracks for electron
  scattering in the same way they act as crack initiation sites for mechanical failure.

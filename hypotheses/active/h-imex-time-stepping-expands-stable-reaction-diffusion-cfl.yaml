proposed_tests:
  - description: >
      Sweep timestep and stiffness regimes across canonical reaction-diffusion benchmarks; compare
      instability incidence, phase errors, and compute cost for explicit vs IMEX families.
    method: Reproducible solver benchmark suite with shared Jacobian-spectrum diagnostics.
    prediction: IMEX methods achieve >=2x larger stable dt at equivalent artifact thresholds.


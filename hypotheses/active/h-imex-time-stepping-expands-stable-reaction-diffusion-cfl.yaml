id: h-imex-time-stepping-expands-stable-reaction-diffusion-cfl
title: >
  For stiff reaction-diffusion systems, IMEX integrators increase the stable timestep envelope and
  reduce qualitative artifact rates compared to purely explicit schemes at equal compute budget.
status: active
priority: medium
impact_score: 0.6

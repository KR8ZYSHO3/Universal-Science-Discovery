proposed_tests:
  - description: >
      Three-arm RCT (N=2000): inoculation (pre-emptive warning + technique refutation),
      correction (post-exposure rebuttal), and control. Primary outcome: belief in
      specific scientific misinformation at 1 week, 1 month, 6 months post-intervention.
      Test whether inoculation produces larger and more durable belief protection
      than correction.

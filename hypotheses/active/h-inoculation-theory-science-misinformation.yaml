id: h-inoculation-theory-science-misinformation
title: >
  Inoculation theory (pre-emptive refutation of misleading arguments before
  exposure) reliably reduces belief in science misinformation by 20–40% across
  topics (climate change, vaccines, GMOs) because it builds resistance to
  manipulation techniques, while deficit-model corrections applied after
  misinformation exposure are less effective and can backfire through
  motivated reasoning.
status: active
priority: high
impact_score: 0.81

id: h-electrochemical-co2-copper-selectivity
title: >
  The selectivity of electrochemical CO2 reduction to C2+ products on copper is
  controlled by the local pH and CO coverage at the catalyst surface, such that
  maintaining local pH > 12 and CO coverage > 0.3 ML simultaneously via pulsed
  potential waveforms can achieve > 70% Faradaic efficiency to ethylene at practical
  current densities > 300 mA/cm².
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-electrochemical-co2-reduction-selectivity

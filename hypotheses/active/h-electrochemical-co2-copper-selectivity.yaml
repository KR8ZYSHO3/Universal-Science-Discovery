evidence_links:
  - type: supporting
    doi: 10.1126/science.aad0671
    note: >
      Kuhl et al. (2012) — copper produces 16 distinct CO2 reduction products;
      C2+ selectivity depends strongly on potential and local environment.
  - type: supporting
    doi: 10.1038/s41929-021-00614-6
    note: >
      Gabardo et al. (2022) — high local pH via KOH electrolyte promotes C2+
      products; Faradaic efficiency 60-70% at 200 mA/cm².
proposed_tests:
  - discipline: chemistry
    description: >
      Fabricate Cu electrodes with controlled surface roughness (roughness factor
      RF = 1, 5, 20, 100) by electrodeposition. Apply pulsed potential waveform
      (E_high = -0.8V for 100ms, E_low = -0.2V for 50ms vs RHE) in 1M KOH flow
      cell. Measure Faradaic efficiency by GC and HPLC at partial current density
      300 mA/cm². Monitor local pH by fluorescence ratiometric pH probe in
      operando. Hypothesis: RF = 20 with pulse protocol achieves FE(C2H4) > 70%
      at 300 mA/cm² when local pH > 12 is maintained, and FE(C2H4) correlates
      linearly with in-situ measured CO coverage (SEIRAS) for RF > 5.

evidence_links:
  - doi: "10.1016/j.watres.2020.116449"
    type: supporting
    confidence: 0.68
    note: >
      Enfrin et al. (2021) systematic review: reverse osmosis removes >99.9%
      of microplastics, NF membranes ~95-99%; ultrafiltration removes
      microplastics (>1 μm) but passes nanoplastics (<1 μm) — size-dependent
      removal efficiency confirmed.
  - doi: "10.1021/acsnano.0c05528"
    type: supporting
    confidence: 0.65
    note: >
      Wang et al. (2021): nanoplastic membrane fouling measured across PVDF,
      polyamide TFC, and zwitterionic-coated membranes; zwitterionic surfaces
      reduce nanoplastic fouling 60-70% compared to pristine membranes by
      reducing hydrophobic adsorption.
  - doi: "10.1016/j.chemosphere.2021.131726"
    type: related
    confidence: 0.58
    note: >
      Leslie et al. (2022) nanoplastic detection in drinking water: particles
      <1 μm present at 2-15 particles/L from municipal treatment plants using
      conventional coagulation-sedimentation — confirms current treatment gap.
proposed_tests:
  - description: >
      Challenge a series of membranes (PVDF UF, polyamide NF, zwitterionic-
      coated NF) with suspensions of polystyrene nanoplastic particles
      (50 nm, 200 nm, 500 nm) in both clean water and realistic wastewater
      matrix (DOC 10 mg/L). Measure: (1) removal efficiency (%), (2) flux
      decline rate (%/hour), (3) reversible vs. irreversible fouling after
      backwash. Test: do zwitterionic membranes achieve <20% flux decline
      at >99% nanoplastic removal — breaking the permeability-selectivity
      trade-off more than predicted by Robeson-type upper bound?

id: h-microplastic-nanofiltration-membrane-fouling-tradeoff
title: >
  Nanofiltration and tight ultrafiltration membranes (molecular weight cut-off
  <1 kDa) can remove >99.9% of microplastics and nanoplastics from water but
  face a fundamental permeability-selectivity trade-off: achieving nanoplastic
  removal at low energy penalty requires antifouling surface chemistry that
  reduces pore blockage from the plastic fragments themselves.

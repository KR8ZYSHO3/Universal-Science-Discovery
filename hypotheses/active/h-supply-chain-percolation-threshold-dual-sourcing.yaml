id: h-supply-chain-percolation-threshold-dual-sourcing
title: >
  Dual-sourcing critical components (Tier 1 parts with single-source suppliers)
  raises a supply chain network's effective percolation threshold above the operational
  disruption probability, predicting that firms that dual-source their top 10% highest-risk
  suppliers reduce production halts from supplier failure by >60% with <15% increase in
  procurement cost.
status: active
priority: high
impact_score: 0.79
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - operations-research
  - complex-systems
  - economics
unknowns_addressed:
  - u-supply-chain-network-topology-resilience
evidence_links:
  - doi: "10.1038/35019019"
    type: supporting
    confidence: 0.72
    note: >
      Albert et al. (2000) show scale-free networks are robust to random failures
      but fragile to targeted hub attacks; dual-sourcing reduces hub criticality
      by increasing effective degree of key supplier nodes.
  - doi: "10.1126/science.1257856"
    type: supporting
    confidence: 0.65
    note: >
      Acemoglu et al. (2012) show that supply network structure determines cascade
      size; reducing single-source dependence of hub suppliers reduces cascade propagation.
proposed_tests:
  - description: >
      Comparative case study of 50 manufacturing firms that adopted dual-sourcing
      programs before 2020 vs. 50 matched controls; measure production halt frequency
      and duration during 2020-2022 supply chain disruptions; test whether dual-sourcing
      firms had statistically significantly lower disruption impact controlling for
      industry, size, and geography.

id: h-zahavi-handicap-single-crossing-stable-honest
title: >
  The Spence-Mirrleesian single-crossing condition (∂²C/∂s∂q < 0) is both necessary
  and sufficient for evolutionarily stable honest signaling in biological populations
  with continuous quality variation — and this condition can be empirically tested by
  measuring the marginal cost of signal production as a function of quality (parasite
  load, immune status, body condition) in 5+ species across independent lineages.

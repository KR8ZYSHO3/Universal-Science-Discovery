proposed_tests:
  - description: >
      In male peacocks (Pavo cristatus): measure tail growth rate as a function of
      individual parasite burden (feather mite Menacanthus load) across 3 years.
      Estimate ∂²C/∂s∂q empirically where C = energetic cost of tail growth
      (measured by doubly-labeled water), s = tail length, q = 1/parasite load.
      Test: is ∂²C/∂s∂q < 0 (single-crossing) or ≥ 0 (violating honesty condition)?
    method: "Longitudinal tail measurement, parasite counts from feather swabs, DLW energy expenditure"
    prediction: "∂²C/∂s∂q < 0: high-parasite males pay 30% higher marginal cost per cm tail growth"
  - description: >
      Meta-analysis of 20+ honest signaling studies: for each, extract the relationship
      between marginal signal cost and signal quality. Test: what proportion satisfy
      the single-crossing condition as estimated from reported cost and quality data?
    method: "Systematic review + meta-regression; reanalysis of raw data where available"
    prediction: ">70% of honest signals for which cost data exist satisfy ∂²C/∂s∂q < 0 with p<0.05"

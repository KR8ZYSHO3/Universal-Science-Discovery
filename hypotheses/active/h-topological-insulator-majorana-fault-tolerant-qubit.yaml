id: h-topological-insulator-majorana-fault-tolerant-qubit
title: >
  A topological qubit based on four Majorana zero modes in an InAs/Al heterostructure
  will achieve a logical qubit coherence time T₁_L > 1 ms at 20 mK — 100x longer
  than physical transmon qubits — by suppressing quasiparticle poisoning via
  a superconducting gap Δ > 200 μeV and a topological gap Δ_topo > 100 μeV, with
  the protection scaling exponentially with system length L as exp(−L/ξ).

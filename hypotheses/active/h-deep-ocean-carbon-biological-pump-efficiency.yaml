evidence_links:
  - doi: "10.1126/science.1133312"
    type: supporting
    confidence: 0.62
    note: >
      Boyd et al. (2007) synthesise 13 iron fertilisation experiments (SOIREE,
      IRONEX, SOFeX); export flux increases confirmed but efficiency lower than
      predicted by Redfield stoichiometry due to increased grazing and
      remineralisation above 200 m.
  - doi: "10.1038/s41586-020-2318-0"
    type: supporting
    confidence: 0.68
    note: >
      Siegel et al. (2021) global model analysis: biological pump efficiency
      (transfer factor T_eff) correlates with mineral ballasting
      (biogenic silica and CaCO3) which protects organic carbon from
      remineralisation in the mesopelagic zone.
  - doi: "10.5194/bg-16-1419-2019"
    type: related
    confidence: 0.50
    note: >
      Ilyina et al. (2019) model artificial ocean iron fertilisation scenarios;
      maximum sustainable sequestration 0.5-2.5 Pg C/yr with significant
      lateral nutrient redistribution side-effects.
proposed_tests:
  - description: >
      Deploy sediment traps at 100m, 500m, 1000m, and 3000m in the Southern
      Ocean before/during/after an iron fertilisation patch experiment.
      Measure particulate organic carbon (POC) flux at each depth. Calculate
      transfer efficiency T_eff = F(1000m)/F(100m). Test: does iron
      fertilisation increase T_eff, or does it only increase surface
      production while leaving export ratio unchanged?

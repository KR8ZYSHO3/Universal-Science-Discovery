id: h-deep-ocean-carbon-biological-pump-efficiency
title: >
  The biological pump efficiency — fraction of surface-fixed carbon exported
  to depths >1000 m — determines centennial-scale CO2 sequestration capacity,
  and is primarily limited by iron micronutrient availability in HNLC regions,
  implying Southern Ocean iron fertilisation could sequester 1-3 Pg C/yr.
status: active
priority: medium
impact_score: 0.73

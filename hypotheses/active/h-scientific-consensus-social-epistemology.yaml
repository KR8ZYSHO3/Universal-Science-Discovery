evidence_links:
  - doi: "10.1093/bjps/axx064"
    type: supporting
    confidence: 0.60
    note: >
      Zollman (2010) Zollman effect: dense scientific communication networks
      converge faster but to wrong consensus when one publication misleads;
      sparse networks are epistemically superior in early-stage inquiry.
  - doi: "10.1007/s11229-009-9587-8"
    type: supporting
    confidence: 0.58
    note: >
      Kitcher (1990) division of cognitive labour model: scientific communities
      should maintain dissent proportional to prior evidence weight — premature
      consensus is an epistemic market failure.
  - doi: "10.1371/journal.pbio.1002165"
    type: related
    confidence: 0.65
    note: >
      Smaldino & McElreath (2016) cultural evolutionary model of science:
      publication incentives select for high-effort underpowered research
      producing false positives — consensus may form on unreliable findings
      when prestige cascades amplify type I errors.
proposed_tests:
  - description: >
      Scrape all meta-analyses and systematic reviews for five contested
      scientific questions (e.g., antidepressant efficacy, sugar taxes,
      screen time in children, statins in low-risk patients, homeopathy).
      Code each primary study by funding source (industry, government,
      charity). Fit mixed-effects model with effect size as outcome,
      funding type as predictor, controlling for sample size and publication
      year. Test: does funding source predict effect size direction independent
      of methodological quality? Magnitude of effect would quantify the
      social-epistemic bias contribution.

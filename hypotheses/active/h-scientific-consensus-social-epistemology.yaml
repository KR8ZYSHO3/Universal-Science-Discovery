id: h-scientific-consensus-social-epistemology
title: >
  Scientific consensus forms primarily through social-epistemic mechanisms —
  replication, peer review, and expert testimony networks — rather than
  through naive Bayesian updating on individual evidence, and can be mistaken
  when these social mechanisms are corrupted by funding bias or prestige
  cascades.
status: active
priority: medium
impact_score: 0.66

id: h-negative-heat-capacity-stellar-stability-criterion
title: >
  Globular clusters with concentration parameter c > 2.0 (King model) are in
  post-core-collapse phase and their core radius distribution follows a
  log-normal consistent with gravothermal oscillations, distinguishable from
  the log-normal of pre-collapse clusters by a systematic offset in the
  core-halo luminosity ratio.
status: active
priority: medium
impact_score: 0.63
created: "2026-05-05"
last_updated: "2026-05-05"
related_disciplines:
  - astronomy
  - statistical-physics
  - stellar-dynamics
unknowns_addressed:
  - u-gravothermal-catastrophe-globular-cluster-timescale
evidence_links:
  - doi: "10.1093/mnras/138.4.495"
    type: supporting
    confidence: 0.70
    note: Lynden-Bell & Wood (1968) establish gravothermal catastrophe theory
  - doi: "10.1093/mnras/95.3.207"
    type: supporting
    confidence: 0.65
    note: Chandrasekhar (1935) polytrope stability — n=3 critical boundary
proposed_tests:
  - description: >
      Compile core radii r_c, half-mass radii r_h, and tidal radii r_t for
      150+ Milky Way globular clusters from Harris (2010) catalogue and
      Hubble Space Telescope imaging. Compute c = log(r_t/r_c). Test: bimodal
      distribution in r_c/r_h with the low-r_c/r_h peak (core-collapsed clusters)
      showing systematically higher core-halo luminosity ratio, consistent with
      gravothermal oscillation heating.
  - description: >
      Compare the observed fraction of core-collapsed clusters (~20% of Milky
      Way GCs) to the predicted fraction from N-body simulations with
      t_cc = 0.1 t_rh for each cluster's measured relaxation time. If the
      predicted fraction matches, the gravothermal catastrophe timescale is
      confirmed; systematic offset would indicate missing physics (binary
      heating, IMBH).

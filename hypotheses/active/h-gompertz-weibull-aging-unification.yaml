id: h-gompertz-weibull-aging-unification
title: >
  Human aging follows Weibull extreme value statistics for the same reason as
  engineering component fatigue: both are governed by the weakest-link statistics
  of competing failure modes, and the Gompertz mortality law is the biological
  instantiation of the Gumbel extreme value distribution.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.78
related_disciplines:
  - gerontology

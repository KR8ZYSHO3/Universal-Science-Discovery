unknowns_addressed: []
evidence_links:
  - type: supporting
    doi: "10.1098/rspb.1825.0039"
    note: "Gompertz (1825) - exponential hazard rate increase with age is the Gumbel extreme value distribution of first-failure time"
  - type: supporting
    note: >
      Weibull modulus β fits human mortality data at ages 30–80 in modern populations
      (β ≈ 8–12), consistent with the wear-out regime in engineering systems.
      The same statistical physics governs metal fatigue and biological aging.
  - type: contradicting
    note: >
      Mortality deceleration at extreme ages (>95) violates the Gompertz prediction,
      suggesting that survivors are a selected population with different failure
      distributions, or that the competing-risks model breaks down at extreme ages.
proposed_tests:
  - description: >
      Fit Weibull models to cause-specific mortality data (cardiovascular, cancer, neurological)
      separately; test whether the overall Gompertz slope b equals the minimum of the
      component Weibull shape parameters, as EVT predicts for independent competing risks.
  - description: >
      Interventions that reduce one major cause of death (e.g., statins reducing CVD)
      should shift the overall mortality Weibull parameters predictably. Test whether
      statin-treated populations show the EVT-predicted shift in shape and scale parameters
      of the overall mortality distribution.

id: h-mri-turbulence-alpha-prediction
title: >
  The Shakura-Sunyaev α parameter in accretion disks scales as α ∝ Pm^{1/2} (where
  Pm = ν/η is the magnetic Prandtl number), a scaling derivable from the balance
  between MRI channel mode growth and parasitic Kelvin-Helmholtz instability at
  the resistive scale.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
related_disciplines:
  - astrophysics
  - magnetohydrodynamics
  - plasma-physics
  - fluid-dynamics
unknowns_addressed:
  - u-accretion-disk-mri-saturation
evidence_links:
  - type: supporting
    doi: "10.1051/0004-6361:20077537"
    note: Fromang & Papaloizou (2007) — numerical evidence for α ~ Pm^{0.5} in shearing box
  - type: supporting
    note: >
      Lesur & Longaretti (2007) A&A 378:1449 — systematic Pm variation in shearing boxes
      shows α increases with Pm for Pm > 1, consistent with α ∝ Pm^{1/2} over one decade
  - type: contradicting
    note: >
      Fromang et al. (2007) showed zero net-flux MRI gives no sustained turbulence at
      zero Pm in the ideal limit — suggesting the Pm → 0 limit is singular and the
      α ∝ Pm^{1/2} scaling may not extend to laboratory Pm ~ 10⁻⁶.
proposed_tests:
  - discipline: magnetohydrodynamics
    description: >
      Perform global MHD simulations of Keplerian shearing boxes with net vertical flux,
      systematically varying Pm from 10⁻² to 10² while holding all other parameters
      fixed. Compute α = ⟨B_r B_φ⟩/(4πP) + ⟨ρ v_r v_φ⟩/P. Fit the resulting α(Pm)
      relation to a power law α ∝ Pm^δ. If δ ≈ 0.5, derive the parasitic instability
      scaling to predict the coefficient.
  - discipline: plasma-physics
    description: >
      In the Princeton MRI experiment (liquid gallium Couette flow), vary the applied
      magnetic field strength and rotation rates to probe different effective Pm regimes
      accessible in liquid metals (Pm ~ 10⁻⁶). Measure angular momentum transport
      directly from torque measurements. The laboratory result at Pm << 1 constrains
      extrapolation to astrophysical Pm >> 1 by testing the α(Pm) scaling over many
      decades.
  - discipline: astrophysics
    description: >
      Compare X-ray binary systems with theoretically predicted Pm (function of disk
      temperature and ionization fraction → viscosity and resistivity → Pm). Test whether
      systems with higher theoretical Pm (hotter disks around more massive black holes)
      show higher inferred α values from their spectral variability timescales.

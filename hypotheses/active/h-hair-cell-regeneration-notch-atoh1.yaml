proposed_tests:
  - description: >
      Combined Notch inhibitor (LY411575) + AAV-Atoh1 delivery to adult deafened guinea
      pigs; measure ABR threshold recovery, new hair cell count by cochlear whole-mount,
      and supporting cell BrdU incorporation at 4 and 12 weeks.

id: h-hair-cell-regeneration-notch-atoh1
title: >
  Mammalian cochlear hair cell regeneration is suppressed by sustained Notch lateral
  inhibition from surviving supporting cells; pharmacological Notch blockade combined
  with Atoh1 transcription factor delivery is sufficient to trigger de novo hair cell
  production from supporting cell transdifferentiation in mature mammals.
status: active
priority: high
impact_score: 0.84
created: "2026-05-06"

proposed_tests:
  - discipline: neuroscience
    description: >
      Recruit 100 participants stratified by divergent thinking score (DT; top/bottom
      quartile). Acquire 10-minute resting-state fMRI. Compute functional connectivity
      between 8 DMN seed ROIs and 8 ECN seed ROIs. Hypothesis: top-DT quartile
      shows significantly higher DMN-ECN coupling (mean z-score > 0.15 higher)
      than bottom-DT quartile (p < 0.001, FDR-corrected), with no significant
      difference in within-network connectivity.

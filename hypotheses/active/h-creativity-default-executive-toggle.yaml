id: h-creativity-default-executive-toggle
title: >
  Creative cognition requires co-activation of default mode network (generative) and
  executive control network (evaluative) — not a simple toggle between them — with
  high-creative individuals showing stronger functional coupling between these normally
  anti-correlated networks as measured by resting-state fMRI functional connectivity.

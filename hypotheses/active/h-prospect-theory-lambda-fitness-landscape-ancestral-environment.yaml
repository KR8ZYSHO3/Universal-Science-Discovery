proposed_tests:
  - description: >
      Compute the optimal λ from daily caloric intake variance data for
      Hadza hunter-gatherers (Tanzania), Tsimane horticulturalists (Bolivia),
      and WEIRD US undergraduates, using a formal fitness maximization model
      (Kelly-like optimization of caloric reserve below starvation threshold);
      compare to measured λ in the same populations using incentivized
      gamble paradigms.
    method: "Foraging data from published ethnographic surveys (CV of daily calories) → model optimal λ; incentivized mixed gambles (e.g. lose £y vs. gain £x) → empirical λ; Spearman correlation"
    prediction: "Model-predicted λ and empirical λ are correlated across populations (r > 0.7); Hadza show λ ≈ 3–4, US students show λ ≈ 2–2.5, consistent with caloric variance differences"
  - description: >
      Genetic test: genome-wide association study (GWAS) of individually
      measured λ (from 500-trial mixed gamble task) in 50,000 participants;
      test whether variants in COMT, BDNF, DRD4, 5-HTTLPR are associated
      with λ; compute SNP heritability and compare to twin-study h² ≈ 0.3.
    method: "Online gamble task + saliva DNA; GWAS with PCA covariates; LD-score regression for heritability; gene-set enrichment for dopamine/serotonin pathways"
    prediction: "SNP heritability h² ≥ 0.20; DRD4 and 5-HTTLPR show nominally significant associations (p < 10⁻⁵); gene-set enrichment for mesolimbic dopamine pathway is significant"


id: h-prospect-theory-lambda-fitness-landscape-ancestral-environment
title: >
  The loss aversion coefficient λ ≈ 2.25 is a Bayesian-optimal decision
  parameter for an agent facing the ancestral human foraging environment, where
  the variance-to-mean ratio of daily caloric intake creates a fitness landscape
  in which losses have systematically 2.0–2.5× greater fitness consequences
  than equivalent gains due to starvation risk asymmetry.

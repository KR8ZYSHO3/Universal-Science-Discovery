id: h-anderson-acceleration-deq-forward-steps-correlate-with-val-loss
title: >
  On standard vision benchmarks with matched DEQ width, enabling Anderson acceleration for forward equilibrium solves will reduce median residual iterations without increasing validation loss versus pure Picard iteration when backward passes use matched adjoint tolerances — falsified if acceleration shortcuts introduce gradient bias that hurts accuracy despite fewer forward steps.

proposed_tests:
  - description: >
      In empirical plant-pollinator networks from multiple habitats, simulate extinction cascades using
      co-extinction models (Memmott-type) comparing: (1) random extinction, (2) specialist-first removal,
      (3) generalist-first removal. Measure cascade size vs predicted cascade from leading eigenvalue λ_1.
    method: "Co-extinction simulation + network rewiring model; compare cascade size to spectral prediction λ_1/λ_2 ratio"
    prediction: "Generalist removal should produce cascades 3-5x larger than random; ratio predictable by λ_1/λ_2"


id: h-citizen-science-validation-training-protocols
title: >
  Citizen science projects achieve research-quality data when they combine
  three elements: structured volunteer training with proficiency assessment,
  redundant data collection (3+ independent classifications per item), and
  algorithmic aggregation that weights by demonstrated accuracy — and projects
  meeting all three criteria will produce data with > 90% agreement with
  expert labels.

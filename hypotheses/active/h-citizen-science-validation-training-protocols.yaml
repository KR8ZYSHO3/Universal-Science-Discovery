proposed_tests:
  - description: >
      Select 20 Zooniverse projects with known expert-label ground truth.
      Code each project on the three criteria (training quality, redundancy, weighting).
      Correlate the composite score with volunteer-expert agreement rate.
      Predict: projects scoring high on all three will exceed 90% agreement.

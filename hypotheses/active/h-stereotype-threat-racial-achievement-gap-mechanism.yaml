proposed_tests:
  - description: >
      Pre-registered RCT (N=2000 middle school students) assigning schools
      to identity-safe classroom intervention (values affirmation, belonging
      framing, high standards + assurance messaging) vs active control.
      Primary outcome: standardized math test scores at 1 and 2 years.
      Secondary: working memory task performance under threat vs non-threat
      conditions. Test whether gap reduction > 20% is achieved and whether
      working memory mediates the effect (mediation analysis).

id: h-stereotype-threat-racial-achievement-gap-mechanism
title: >
  Stereotype threat — the situational pressure of confirming a negative group
  stereotype — accounts for 20–40% of the Black-White standardized test score
  gap through working-memory depletion and vigilance activation, and
  identity-safe learning environments that remove threat cues produce the
  largest and most durable achievement gap reductions.
status: active
priority: high

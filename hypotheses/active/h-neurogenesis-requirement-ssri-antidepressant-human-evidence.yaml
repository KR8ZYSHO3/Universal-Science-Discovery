id: h-neurogenesis-requirement-ssri-antidepressant-human-evidence
title: >
  Adult hippocampal neurogenesis is necessary but not sufficient for the antidepressant
  effect of SSRIs: genetic or radiation-induced ablation of neurogenesis will block
  SSRI efficacy in primate models of anhedonia/despair, and ketamine's rapid
  antidepressant effect (within hours) will be neurogenesis-independent.
status: active
priority: critical
impact_score: 0.82
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-adult-human-hippocampal-neurogenesis-existence-rate-controversy
evidence_links:
  - type: supporting
    note: "Santarelli et al. (2003) Science 301:805 — X-irradiation of hippocampus abolishes neurogenesis and blocks the behavioral effect of fluoxetine in the novelty-suppressed feeding test in mice; unirradiated controls show fluoxetine antidepressant effect — foundational neurogenesis requirement evidence"
    confidence: 0.80
  - type: supporting
    note: "David et al. (2009) Neuron 62:479 — conditional ablation of neurogenesis (GFAP-tk transgenic, ganciclovir) blocks fluoxetine effect on HPA axis normalization (corticosterone reduction after stress) — mechanistic link between new neurons and stress axis regulation"
    confidence: 0.77
  - type: contradicting
    note: "Bessa et al. (2009) Neuropsychopharmacology 34:763 — antidepressant effect of imipramine in sucrose preference test (anhedonia model) is NOT blocked by X-irradiation in mice — suggesting neurogenesis requirement is assay-specific, not universal for all antidepressant effects"
    confidence: 0.65
  - type: supporting
    note: "Castrén (2004) Science 304:529 — 2-3 week lag between SSRI treatment and antidepressant effect matches new neuron maturation time (DCX+ cells mature in ~4 weeks) — temporal correlation supports neurogenesis hypothesis; ketamine works within hours, suggesting non-neurogenesis mechanism (AMPAR potentiation)"
    confidence: 0.78
  - type: contradicting
    note: "Human neurogenesis controversy (Sorrells 2018 vs. Spalding 2013) — if adult human neurogenesis is negligible, the neurogenesis hypothesis cannot apply to human SSRI treatment, even if animal models show requirement"
    confidence: 0.72
proposed_tests:
  - description: >
      Marmoset model of social stress-induced anhedonia (subordinate/dominant dyad
      housing, with sucrose preference and social interaction as behavioral endpoints).
      X-irradiate hippocampus of 50% of animals (neurogenesis ablation confirmed by
      BrdU/NeuN colabeling). Treat all animals with fluoxetine 10 mg/kg/day for
      6 weeks vs. vehicle. Primary outcome: sucrose preference ratio recovery in
      irradiated vs. non-irradiated animals. Prediction: fluoxetine rescues sucrose
      preference in non-irradiated (neurogenesis-intact) marmosets but NOT in
      irradiated animals — first primate evidence for neurogenesis requirement.
      Secondary: ketamine 10 mg/kg single dose in both groups → rapid antidepressant
      effect expected in BOTH groups (neurogenesis-independent mechanism).
  - description: >
      Clinical trial enrichment strategy: measure serum BDNF levels (proxy for
      hippocampal neurotrophin signaling) at baseline and 2 and 4 weeks in
      treatment-resistant depression patients starting SSRIs vs. ketamine. BDNF
      increase should be gradual with SSRIs (reflecting slow neurogenesis-mediated
      BDNF-TrkB upregulation) and rapid with ketamine (within 24h). Prediction:
      patients who respond to SSRIs show BDNF increase that begins in week 2-3
      (neurogenesis lag); ketamine responders show BDNF increase by 24h; patients
      whose BDNF does not increase by week 4 on SSRIs will have >70% probability
      of non-response — enabling BDNF as a treatment-selection biomarker.

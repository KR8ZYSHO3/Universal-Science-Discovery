evidence_links:
  - doi: "10.1021/ef100273y"
    type: supporting
    confidence: 0.70
    note: >
      Rochelle (2009) review: MEA (30 wt%) solvent is thermodynamic baseline;
      energy penalty 3.7-4.0 GJ/tonne CO2; minimum (second-law reversible)
      is 0.5-1.1 GJ/tonne CO2 at 1000 ppm feed concentration.
  - doi: "10.1021/acs.est.6b00606"
    type: supporting
    confidence: 0.67
    note: >
      Sanz-Pérez et al. (2016) solid sorbent benchmark: zeolite 13X and
      amine-functionalized silicas approach 1.8-2.5 GJ/tonne CO2 due to lower
      heat capacity and water loading; confirms solid-sorbent advantage
      for heat penalty.
  - doi: "10.1039/C7EE03146J"
    type: related
    confidence: 0.62
    note: >
      Kim et al. (2018) electrochemical CO2 capture: avoids thermal regeneration
      entirely; current efficiency and overpotential make it 3-5× more expensive
      than amine at current electricity prices.
proposed_tests:
  - description: >
      Synthesise a series of sorbents (aqueous MEA, piperazine, solid amine-
      silica, MOF-74, zeolite 13X) and measure: (1) CO2 working capacity
      (mol/kg), (2) isosteric heat of adsorption/absorption, (3) sorbent
      heat capacity, (4) regeneration temperature. Compute actual vs. minimum
      energy penalty for each. Test: does sorbent heat capacity (J/kg/K)
      predict fractional proximity to thermodynamic minimum (actual/minimum)?
      Low Cp solid sorbents should achieve <2× minimum.

id: h-carbon-capture-amine-sorbent-enthalpy-regeneration
title: >
  The minimum thermodynamic energy penalty for CO2 capture from flue gas
  using amine sorbents is bounded below by the CO2 heat of absorption
  (40-80 kJ/mol) plus the sensible heat of sorbent regeneration — current
  amine systems operate at 2.5-4× this thermodynamic minimum, and solid
  sorbents with low heat capacity can approach 1.5× minimum cost.

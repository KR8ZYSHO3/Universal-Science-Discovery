id: h-solid-state-battery-pressure-dendrite
title: >
  Lithium dendrite nucleation in solid electrolytes is governed by stress-corrosion
  cracking at grain boundaries, not electronic conductivity, and a critical stack
  pressure threshold (5–10 MPa) below which electronic contact is insufficient
  at grain boundaries will be identified as the universal dendrite suppression condition.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.80
related_disciplines:
  - electrochemistry
  - materials-science
  - engineering
unknowns_addressed:
  - u-solid-state-battery-failure
evidence_links:
  - type: supporting
    note: >
      Porz et al. (2017, Advanced Energy Materials) showed that Li dendrites in LLZO
      propagate through pre-existing cracks and pores, not through bulk crystal, consistent
      with fracture mechanics mechanism.
  - type: supporting
    note: >
      Stack pressure experiments show dendrite suppression improves dramatically from
      0 to 5 MPa; above 10 MPa, improvement saturates, suggesting a threshold mechanism.
  - type: contradicting
    note: >
      Electronic conductivity hypothesis has support in sulfide electrolytes (different
      chemistry from oxide LLZO); the pressure mechanism may not be universal across
      electrolyte chemistries.
proposed_tests:
  - description: >
      Fabricate LLZO pellets with controlled grain boundary density via sintering
      conditions. Test critical current density vs. grain boundary area per unit volume
      at fixed stack pressure. If stress-corrosion cracking mechanism is correct,
      CCD should decrease with grain boundary density independently of pellet density.
  - description: >
      In situ synchrotron X-ray tomography of Li|LLZO|Li symmetric cells during
      cycling at multiple stack pressures. Image crack propagation vs. Li filament
      growth to distinguish fracture-driven from electronically-driven dendrites.

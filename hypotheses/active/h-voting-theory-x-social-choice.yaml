proposed_tests:
  - description: Collect ranked-choice preference data from 10 national elections with 3+ candidates (e.g., 2011 UK AV referendum, French 2017 presidential, IRV elections in Australia); represent each voter's full preference ordering as a point in the preference simplex; compute the aggregate preference distribution; measure the Wasserstein-2 distance from the distribution to the nearest Condorcet cycle manifold; correlate with observed paradox frequency (cases where IRV winner loses pairwise to another candidate).

evidence_links:
  - type: supporting
    confidence: 0.70
    note: >
      Tegmark (2000) Phys Rev E 61:4194 — theoretical decoherence time ~10⁻¹³ s
      for tubulin dimer superposition; quantum gravity effects negligible at this scale
  - doi: "10.1038/nphys2474"
    type: related
    confidence: 0.55
    note: >
      Lambert et al. (2013) — established quantum biology systems (photosynthesis,
      magnetoreception) support coherence times of ~ps-ns, far shorter than neural
      timescales; consistent with decoherence argument
  - doi: "10.1016/j.plrev.2013.08.002"
    type: contradicting
    confidence: 0.35
    note: >
      Hameroff & Penrose (2014) — argue ordered water and topological protection
      extend coherence; no experimental confirmation; confidence low
proposed_tests:
  - description: >
      Two-dimensional electronic spectroscopy (2DES) of microtubule suspensions
      in physiological buffer (310 K). Look for quantum beat signatures (oscillatory
      cross-peaks in the 2D spectrum) at the transition frequency of tubulin's
      GTP-hydrolysis conformational change (~100-500 cm⁻¹, far-IR). If quantum
      coherence exists with τ > 10 fs, it would produce measurable oscillatory
      signals. Compare to vibrational coherence (classical) controls.
    method: >
      Pump-probe spectroscopy with 50 fs pulses; 2D correlation spectra;
      temperature range 250-310 K; compare polymerised (microtubule) vs.
      monomeric tubulin to isolate inter-tubulin quantum effects.
    prediction: >
      No quantum beat signatures in 2DES at 310 K. Any oscillatory signals
      present at 250 K will dephase within <500 fs — confirming Tegmark's
      decoherence prediction. If quantum beats persist beyond 1 ps at 310 K,
      this would be an extraordinary finding requiring replication.
  - description: >
      Clinical pharmacology test: if Orch-OR is correct, anesthetics should
      bind tubulin at clinically relevant concentrations and this should
      quantitatively predict the loss-of-consciousness concentration. Test:
      does the tubulin binding affinity (measured by ITC or SPR) of 10
      structurally diverse general anesthetics correlate with MAC (minimum
      alveolar concentration for loss of consciousness), controlling for
      alternative targets (GABA receptors, ion channels)?
    method: >
      Isothermal titration calorimetry of anesthetic-tubulin binding; correlation
      of K_D values with clinical MAC values; partial correlation controlling
      for GABA-A receptor EC₅₀.
    prediction: >
      No significant correlation between tubulin K_D and MAC when GABA-A receptor
      EC₅₀ is controlled for. This would suggest tubulin binding is not the
      primary mechanism of anesthetic action, undermining the Orch-OR anesthetic
      evidence.

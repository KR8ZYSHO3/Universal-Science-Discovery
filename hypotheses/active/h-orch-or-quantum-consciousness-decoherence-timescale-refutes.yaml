id: h-orch-or-quantum-consciousness-decoherence-timescale-refutes
title: >
  Direct measurement of quantum decoherence timescales in neuronal microtubules
  at 310 K will confirm Tegmark's theoretical prediction (~10⁻¹³ s), 10 orders
  of magnitude shorter than neural processing timescales (~10⁻³ s), falsifying
  the Penrose-Hameroff Orch-OR hypothesis that microtubule quantum coherence
  mediates conscious experience.

proposed_tests:
  - description: >
      Run 3D mantle convection simulations with variable yield stress sigma_y and
      water content (using Hirth-Kohlstedt wet olivine rheology) to map the
      mobile-lid vs. stagnant-lid boundary; derive critical water fraction for
      plate tectonics as a function of Ra (planet size).
    method: "ASPECT or Citcom mantle convection code; systematic parameter study of sigma_y vs. water fraction vs. Ra; classify tectonic mode"
    prediction: "Critical yield stress sigma_y < 10 MPa requires > 100 ppm H2O in lithosphere; dry mantle (Venus analog) always produces stagnant lid"
  - description: >
      Test the water-tectonics hypothesis using exoplanet demographics — planets in
      habitable zones where liquid water delivery (comets, asteroidal impacts) is
      expected should show mass-radius relationships consistent with internal
      differentiation (plate tectonics resetting crust); compare with dry-planet analogs.
    method: "JWST transmission spectroscopy of terrestrial exoplanets + interior structure models; compare mass-radius scatter vs. insolation"
    prediction: "Habitable-zone planets with water delivery history show tighter mass-radius relationships (differentiated interior) than dry planets"

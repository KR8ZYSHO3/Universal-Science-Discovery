id: h-gapped-ferrite-bias-point-maximizes-wpt-q-under-saturation-margin
title: >
  For MnZn pads used in Qi-class chargers, operating peak H-field ~60–70% of saturation minimizes hysteresis loss while
  preserving coupling — yielding higher loaded Q than either under-driven (weak coupling) or saturated (μ collapse) regimes.
status: active
priority: medium

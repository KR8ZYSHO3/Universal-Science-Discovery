proposed_tests:
  - description: >
      Sweep transmit coil current at fixed gap; measure coil effective R(f) via impedance analyzer and thermal camera on ferrite;
      locate Q maximum versus H_peak/H_sat inferred from B–H minor loops on coupon cores.
    method: Harmonic current injection + calorimetry on ferrite coupons.
    prediction: Clear interior optimum in Q vs drive current before saturation knee.


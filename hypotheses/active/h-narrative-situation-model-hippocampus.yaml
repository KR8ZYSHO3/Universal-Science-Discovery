id: h-narrative-situation-model-hippocampus
title: >
  Narrative comprehension is implemented as incremental situation model construction
  in the hippocampus and parietal cortex, with the default mode network tracking
  narrative event boundaries and the angular gyrus integrating semantic and spatial
  dimensions of the mental model.

proposed_tests:
  - description: >
      fMRI with scrambled vs. intact narrative: measure hippocampal BOLD during
      event boundary detection in intact narrative vs matched scrambled sentences.
      Predict: boundary-crossing events elicit transient hippocampal activation
      correlated with comprehension accuracy.
    prediction: "Hippocampal activation at boundaries predicts story comprehension (r>0.40); disrupted in amnesic patients with hippocampal damage."

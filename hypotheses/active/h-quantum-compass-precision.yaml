id: h-quantum-compass-precision
title: >
  The radical-pair compass in cryptochrome operates at the quantum Fisher-information
  Cramér-Rao precision bound because evolution has implemented a near-optimal
  measurement strategy — and identifying that strategy will reveal bio-inspired
  decoherence-suppression principles applicable to engineered quantum sensors.
status: active
created: "2026-05-04"
last_updated: "2026-05-04"
priority: critical
related_disciplines:
  - quantum-physics
  - molecular-biology
  - quantum-information-theory
  - quantum-sensing
unknowns_addressed:
  - u-quantum-biology-decoherence
evidence_links:
  - type: supporting
    arxiv: "2401.02923"
    note: Radical-pair compass shown to approach Cramér-Rao bound — quantum Fisher-information precision limit reached biologically
  - type: supporting
    arxiv: "2206.07355"
    note: Driven spin dynamics enhances magnetoreception even in realistic inter-radical coupling regimes — decoherence does not destroy optimality
  - type: related
    arxiv: "2103.00967"
    note: NV-center magnetometer for MEG — engineered quantum sensor facing the same room-temperature coherence challenge
  - type: related
    arxiv: "2303.15974"
    note: Vector NV-center magnetic sensor for brain imaging — convergently evolved/engineered solution comparison
  - type: contradicting
    note: >
      The Cramér-Rao bound may be approached coincidentally rather than through
      optimised design — the protein scaffold may simply not matter, and the radical
      pair would operate near-optimally in any aprotic environment. Systematic mutagenesis
      of the protein environment that degrades precision without shortening radical
      lifetime would refute the hypothesis.
proposed_tests:
  - discipline: quantum-chemistry
    description: >
      Measure the singlet/triplet recombination yields of the FAD-Trp radical pair
      in cryptochrome as a function of applied magnetic field direction and magnitude.
      Compute the quantum Fisher information from the yield derivatives. Compare to
      the Cramér-Rao bound computed from the known spin Hamiltonian. Quantify
      "quantum efficiency" = QFI_measured / QFI_max as a function of temperature
      (4K to 310K) to determine how much of the optimality survives biological conditions.
  - discipline: protein-biochemistry
    description: >
      Site-directed mutagenesis of residues within 5Å of the FAD chromophore in CRY4
      (the candidate avian magnetoreceptor). For each mutant, measure radical-pair
      lifetime T2 and compass sensitivity (singlet-yield anisotropy). Test whether
      residues that extend T2 do so by the vibrational-filtering mechanism predicted
      by u-quantum-biology-decoherence — i.e. whether they selectively couple to
      low-frequency protein modes rather than high-frequency thermal bath modes.
  - discipline: quantum-information-theory
    description: >
      Derive the optimal positive-operator-valued measure (POVM) for field-direction
      estimation from the radical-pair spin state. Compare this theoretical optimum to
      the measurement actually implemented by the singlet/triplet recombination pathway.
      If the two coincide, evolution has found the exact optimal quantum measurement
      strategy — a result with profound implications for both quantum sensing and
      evolutionary theory.
  - discipline: quantum-sensing
    cross_domain_angle: >
      Identify the specific protein-geometric features of cryptochrome that extend T2
      (radical-pair coherence time) and attempt to replicate them in an engineered
      molecular quantum sensor — a protein-scaffold quantum device. Compare performance
      to NV-center diamond magnetometers (arXiv 2103.00967). If the bio-inspired scaffold
      achieves comparable sensitivity at room temperature without a diamond lattice,
      it opens a new class of flexible, biocompatible quantum sensors for in-vivo brain
      imaging — a bridge from b-quantum-biology-navigation to clinical neuroscience.
  - discipline: neuroscience
    cross_domain_angle: >
      NV-center magnetometers are the primary quantum technology for non-invasive brain
      imaging (MEG). If bio-inspired protein-scaffold sensors achieve comparable performance,
      they could be made biocompatible and injectable — enabling intracellular quantum-field
      mapping of neural activity. This closes the loop from quantum-biology research
      to a direct neuroscience application, bridging b-quantum-biology-navigation and
      b-criticality-neuroscience.
bounty: >
  First group to publish the quantum efficiency ratio QFI_measured / QFI_max for
  cryptochrome CRY4 under physiological conditions (310K, aqueous buffer) gets cited
  here and credited in the USDR contributor log.

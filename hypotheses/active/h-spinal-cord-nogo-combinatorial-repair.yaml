id: h-spinal-cord-nogo-combinatorial-repair
title: >
  Complete motor recovery after complete spinal cord injury requires combinatorial
  treatment targeting three independent barriers: Nogo-A/NgR1 inhibition (axon growth
  block), chondroitin sulphate proteoglycan (CSPG) matrix digestion, and neural
  progenitor cell bridges — no single intervention is sufficient.
status: active
priority: high
impact_score: 0.82

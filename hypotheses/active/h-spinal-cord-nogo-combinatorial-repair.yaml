evidence_links:
  - doi: "10.1016/j.neuron.2018.10.048"
    type: supporting
    confidence: 0.80
    note: >
      Bhatt et al. — anti-Nogo-A antibody alone enables limited axonal sprouting in complete
      SCI but does not restore locomotion; distance covered scales with injury completeness
  - doi: "10.1038/s41586-022-04928-6"
    type: supporting
    confidence: 0.85
    note: >
      Courtine et al. (2022) Nature — epidural electrical stimulation + rehabilitation
      restores voluntary locomotion in 9/9 patients with chronic complete SCI; but neither
      regeneration nor reconnection confirmed — likely spared fibre activation
  - doi: "10.1126/science.aax6839"
    type: related
    confidence: 0.77
    note: >
      Lu et al. (2019) Science — human neural stem cell grafts form synapses with host
      neurons across complete injury in rodents; limited circuit function restored,
      supporting graft bridge concept as necessary third element
proposed_tests:
  - description: >
      Rodent complete T8 transection model: test factorial design of anti-Nogo antibody
      + chondroitinase ABC + NSC graft; primary endpoint hindlimb BBB score at 12 weeks;
      secondary: anterograde tracing of corticospinal tract axons crossing lesion.

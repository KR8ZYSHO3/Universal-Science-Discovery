proposed_tests:
  - description: >
      Extract giant arc catalog from Hubble Frontier Fields cluster survey (6 clusters).
      Compute lens models and identify critical curves. Classify arcs as fold vs. cusp using
      arc morphology and image parity. Compare observed arc angular length distribution and
      magnification distribution to fold-catastrophe theoretical predictions.
    method: "Lenstool lens modeling + arc morphology classification + power-law magnification fit"
    prediction: "> 80% of arcs classified as fold-type; magnification distribution follows |mu|^{-3} within 10% for |mu| > 10"

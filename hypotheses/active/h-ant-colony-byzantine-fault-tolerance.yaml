id: h-ant-colony-byzantine-fault-tolerance
title: >
  Honeybee quorum sensing during swarm site selection achieves Byzantine fault
  tolerance with honest majority threshold f < N/3, provably equivalent to PBFT
  under realistic colony size constraints
status: active
priority: medium

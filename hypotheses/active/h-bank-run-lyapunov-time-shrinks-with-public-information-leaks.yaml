id: h-bank-run-lyapunov-time-shrinks-with-public-information-leaks
title: >
  In stylized withdrawal-belief dynamics, credible leaks that reduce deposit-insurance trust shrink the
  effective divergence timescale between nearby trajectories — a metaphorical Lyapunov time — but real
  payment systems may saturate due to circuit breakers; treat as hypothesis not theorem.

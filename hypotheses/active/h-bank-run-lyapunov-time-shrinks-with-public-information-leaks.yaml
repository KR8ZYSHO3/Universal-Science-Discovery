proposed_tests:
  - description: >
      Agent-based bank-run toy model with and without insurance credibility shocks; estimate finite-time
      divergence rates between seeds.
    method: Monte Carlo over belief noise; log sensitivity growth before saturation.
    prediction: Credible negative shocks increase short-horizon divergence rates until hard stops engage.


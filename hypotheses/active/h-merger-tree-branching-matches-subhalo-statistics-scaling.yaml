id: h-merger-tree-branching-matches-subhalo-statistics-scaling
title: >
  Across standardized halo catalogs from identical N-body snapshots, merger-tree branching statistics rescale coherently with SUBFIND-identified subhalo mass functions within algorithm-dependent systematic bands — falsified if branch-rate variance across builders exceeds subhalo-count variance by >30% at matched mass thresholds on matched simulations.
status: active
priority: medium
impact_score: 0.28
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1093/mnras/stu2039"
    type: supporting
    confidence: 0.47
    note: Empirical dispersion of merger-tree outputs across algorithms on shared halo-finder inputs.
unknowns_addressed:
  - u-halo-merger-tree-nbody-clustering-analogy
proposed_tests:
  - description: >
      Run multiple tree builders on identical particle subsets from published simulation releases; compare branching-degree distributions vs subhalo merger statistics with bootstrap confidence intervals.
    method: Reproducible pipelines using community halo catalogs (same linking lengths, identical timestep cadence).
    prediction: Tree-builder dispersion stays within bounded multiples of intrinsic halo stochasticity once flyby definitions are harmonized.
related_disciplines:

id: h-motives-feynman-amplitudes-arithmetic
title: >
  All Feynman amplitudes in renormalizable quantum field theories (phi^4, QED, QCD)
  evaluate to periods of mixed Tate motives over the integers, predicting that every
  divergent Feynman integral evaluates after dimensional regularization to a Q-linear
  combination of multiple zeta values (MZVs) at all loop orders.

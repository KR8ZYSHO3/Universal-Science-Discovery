proposed_tests:
  - description: >
      Compute all 7-loop phi^4 Feynman integrals using the Feynman integral reduction
      toolchain (Reduze, FIRE); check whether all resulting finite parts are expressible
      as Q-linear combinations of MZVs of weight <= 14, testing the motivic MZV prediction
      at seven loops where counterexamples (non-MZV periods) were theoretically expected.

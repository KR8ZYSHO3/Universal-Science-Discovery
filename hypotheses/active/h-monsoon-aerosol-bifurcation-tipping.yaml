id: h-monsoon-aerosol-bifurcation-tipping
title: >
  The South Asian summer monsoon has a saddle-node bifurcation point controlled by
  the land-ocean temperature gradient; sustained aerosol cooling of South Asia
  reduces this gradient, and if aerosol optical depth exceeds a critical threshold
  AOD_c~0.5 over northern India, the monsoon shifts to a permanently weakened state
  that cannot recover even after aerosol removal.

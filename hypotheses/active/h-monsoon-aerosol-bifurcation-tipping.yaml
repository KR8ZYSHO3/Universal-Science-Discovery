proposed_tests:
  - description: >
      Perturb CMIP6 ensemble models with stepped aerosol forcing (AOD 0.1-1.0) over
      northern India from preindustrial climatology. Track: all-India rainfall index,
      low-level jet strength, Arabian Sea SST gradient. Identify bifurcation point using
      early warning indicators (increased variance, slower recovery from perturbations).
    prediction: "Bifurcation occurs at AOD_c=0.35-0.55 in majority of models; early warning signals detectable 20-30 years before crossing."

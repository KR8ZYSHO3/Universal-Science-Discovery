id: h-dark-matter-qcd-axion-phase-relic
title: >
  Cosmological dark matter is primarily composed of QCD axions with mass
  10^-6 to 10^-5 eV produced by the misalignment mechanism at the QCD phase
  transition, with relic density set by the Peccei-Quinn symmetry-breaking scale
  f_a and the QCD topological susceptibility, making the axion mass a direct
  prediction of lattice QCD thermodynamics testable by haloscope experiments.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.82
related_disciplines:
  - particle-physics
  - cosmology
  - statistical-physics
  - nuclear-physics
unknowns_addressed:
  - u-dark-matter-particle-identity
  - u-qcd-ew-phase-transition-relics
evidence_links:
  - type: supporting
    arxiv: "2012.09164"
    note: >
      Borsanyi et al. (2016) - lattice QCD topological susceptibility chi_top(T) from
      150 to 1500 MeV; constrains axion mass for given f_a to ~10% precision
    confidence: 0.80
  - type: supporting
    doi: "10.1103/PhysRevLett.38.1440"
    note: >
      Peccei & Quinn (1977) - original PQ symmetry solving strong CP problem;
      axion as Nambu-Goldstone boson of broken U(1)_PQ
    confidence: 0.95
  - type: related
    note: >
      ADMX (2018, 2020) - excluded axion-photon coupling g_agamma for m_a = 2.66-3.31
      and 3.3-4.2 microeV; approaching DFSZ model prediction for f_a ~ 10^12 GeV
    confidence: 0.70
  - type: contradicting
    note: >
      If the PQ symmetry breaks after inflation, domain wall and string network
      dynamics contribute additional axions beyond the misalignment mechanism,
      making relic density calculations uncertain by orders of magnitude and
      potentially overproducing axions.
proposed_tests:
  - discipline: nuclear-physics
    description: >
      Lattice QCD calculations of chi_top(T) at temperatures 100-300 MeV with
      physical quark masses and continuum extrapolation. Target precision: chi_top
      to 3% at T = 150 MeV to predict axion mass to 1.5% for a given f_a.
      This directly narrows the ADMX, CASPEr, and HAYSTAC target frequency windows.
  - discipline: particle-physics
    description: >
      ADMX Gen 2 and HAYSTAC Phase 2 haloscope searches covering m_a = 3-40 microeV
      at DFSZ sensitivity. If the axion is not found in this mass range with
      f_a ~ 10^12 GeV (natural scale), the post-inflation PQ scenario (uncertain
      relic density) is required, or axions are not the dominant dark matter.
  - discipline: cosmology
    description: >
      CMB-S4 and Simons Observatory measurements of the effective number of relativistic
      species N_eff. Axions with m_a < 10^-10 eV contribute to dark radiation;
      precision N_eff measurements constrain the low-mass axion dark matter window
      complementary to haloscope searches.

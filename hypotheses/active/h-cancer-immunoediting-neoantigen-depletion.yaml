id: h-cancer-immunoediting-neoantigen-depletion
title: >
  Tumour immunoediting depletes high-affinity neoantigens through clonal selection,
  leaving an immunologically invisible tumour clone dominated by driver mutations
  with low HLA presentation probability — this is the primary mechanism of immune escape.
status: active
priority: critical
impact_score: 0.88
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - cancer-immunology
  - evolutionary-biology
  - genomics
unknowns_addressed:
  - u-cancer-immunoediting

  - doi: "10.1038/s41586-019-1032-7"
    type: supporting
    confidence: 0.82
    note: >
      Angelova et al. (2018) — LOH at HLA loci provides an orthogonal escape route;
      25% of cancers lose one HLA allele to remove the presenting machinery entirely
  - doi: "10.1016/j.cell.2017.09.030"
    type: related
    confidence: 0.72
    note: >
      Rooney et al. (2015) Cell — transcriptomics signature of cytolytic immune activity

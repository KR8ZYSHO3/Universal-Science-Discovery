proposed_tests:
  - description: Simulate dispersal of a virtual species on 100 synthetic resistance surfaces spanning the percolation threshold (p_c = 0.20 to 0.80); compare circuit theory vs. LCP prediction of isolation-by-resistance against simulated FST; test whether advantage increases near p_c
  - description: Compile a landscape genetics meta-dataset (>30 studies, multiple species and landscapes); partition variance in LCP vs. circuit theory advantage by landscape connectivity metrics to test the threshold prediction

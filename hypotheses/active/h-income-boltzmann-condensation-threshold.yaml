id: h-income-boltzmann-condensation-threshold
title: >
  Real economies above a critical capital return rate r > g (Piketty condition)
  undergo a Bose-Einstein-like wealth condensation transition with a predictable
  Pareto exponent determined by the saving propensity distribution
status: active
priority: medium
impact_score: 0.75

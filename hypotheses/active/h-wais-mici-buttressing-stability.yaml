id: h-wais-mici-buttressing-stability
title: >
  The West Antarctic Ice Sheet is primarily stabilised by ice shelf buttressing
  forces from Ross and Filchner-Ronne ice shelves; marine ice cliff instability
  (MICI) is physically limited to cliffs <100m above waterline by ice viscous
  flow, making catastrophic WAIS collapse timescales >500 years rather than
  <100 years as initially projected.
status: active
priority: high
impact_score: 0.86
created: "2026-05-06"

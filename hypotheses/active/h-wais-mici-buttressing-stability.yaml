evidence_links:
  - doi: "10.1038/s41561-019-0489-1"
    type: supporting
    confidence: 0.68
    note: >
      Edwards et al. (2019) constrain ice cliff instability using physical
      models and modern observations; find MICI requires unrealistically fast
      calving rates and may contribute <0.45m of SLR by 2100 even in worst case.
  - doi: "10.1038/s41586-021-03302-y"
    type: supporting
    confidence: 0.71
    note: >
      Seroussi et al. (2020) ISMIP6 ensemble: WAIS collapse trajectories
      range 0.01-0.30m by 2100 depending on ocean melt parameterisation;
      no model requires MICI for this range.
  - doi: "10.1126/science.aao1447"
    type: related
    confidence: 0.52
    note: >
      DeConto & Pollard (2016) original MICI mechanism paper: projects 1-2m
      by 2100 under RCP8.5; now considered an upper bound after subsequent
      model revisions.
proposed_tests:
  - description: >
      Mount continuous seismic and GPS sensors on Thwaites Glacier terminus
      to detect ice cliff failure events. Record calving frequency and block
      size distribution. Test: if MICI is active, cliff heights >100m should
      show fracture-dominated, rapid calving; if buttressing dominates,
      calving should be episodic and flow-driven. Cross-reference with
      OMG ocean temperature surveys.

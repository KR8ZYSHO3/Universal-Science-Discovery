id: h-measurement-representational-theory-psychometrics
title: >
  Psychometric measurements quantify genuine psychological attributes only
  when the attribute satisfies the conditions of the representational theory
  of measurement — specifically, double cancellation (a form of orderability
  and additivity) — which most current psychological constructs fail, making
  ordinal ranking the appropriate default rather than interval scaling.

evidence_links:
  - doi: "10.1017/S0140525X15001466"
    type: supporting
    confidence: 0.62
    note: >
      Borsboom et al. (2004) critique: most psychological scales are ordinal
      at best; interval scaling requires independence of ordering across
      multiple attributes (double cancellation), which is rarely empirically
      verified in psychometrics.
  - doi: "10.3102/1076998608328437"
    type: supporting
    confidence: 0.58
    note: >
      Michell (2008) measurement theory: psychological attributes are
      genuine quantities only if they are continuous and additive in the
      representational sense; Likert-scale scoring violates this without
      empirical test.
  - doi: "10.1007/s10699-018-9581-9"
    type: related
    confidence: 0.55
    note: >
      Trendler (2019): Rasch models implicitly claim interval scaling;
      empirical tests of double cancellation in IRT show many items fail
      the necessary ordering conditions.
proposed_tests:
  - description: >
      Apply the ISOP (iso-oriented populations) statistical test for double
      cancellation to item response data from three widely-used scales
      (PHQ-9 depression, Big-5 personality, Raven's Progressive Matrices).
      Test: what proportion of item pairs satisfy the double cancellation
      condition required for interval measurement? Expected finding: Raven's
      matrices (cognitive ability) passes more often than affective scales,
      consistent with the hypothesis that ability is closer to a genuine
      quantitative attribute than mood.

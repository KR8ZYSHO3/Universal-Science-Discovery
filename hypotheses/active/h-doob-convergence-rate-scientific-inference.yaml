id: h-doob-convergence-rate-scientific-inference
title: >
  For scientific hypotheses with k free parameters, the Bayesian posterior
  achieves ε-convergence to the true parameter at sample size n* ∝ k/ε²
  (independent of the prior satisfying Cromwell's rule), making the practical
  resolution of induction scale as the Cramér-Rao lower bound.

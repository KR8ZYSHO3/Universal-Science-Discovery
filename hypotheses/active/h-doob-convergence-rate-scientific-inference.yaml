proposed_tests:
  - description: >
      Simulate Bayesian inference for a k-parameter linear regression model
      under three priors (Jeffreys, diffuse normal, strongly misspecified).
      Measure n* (sample size for KL divergence D(p_posterior || p_truth) < ε)
      as a function of k and ε. Test: n* ∝ k/ε² for all three priors, with
      constants within an order of magnitude of each other.
  - description: >
      Analyse prior sensitivity in 50 published Bayesian meta-analyses
      (psychology replication crisis dataset). Compute posterior sensitivity
      S = ||θ̂_informative - θ̂_Jeffreys|| / ||θ̂_truth - θ̂_informative||
      as a function of n (study sample size). Test: S decreases as 1/√n
      consistent with the Cramér-Rao convergence rate.

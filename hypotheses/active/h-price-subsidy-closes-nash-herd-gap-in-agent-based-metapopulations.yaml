proposed_tests:
  - description: >
      Calibrate payoff priors from surveys; run counterfactual subsidy sweeps; compare coverage distributions to herd thresholds under uncertainty in R₀ and mobility shocks.
    method: Bayesian calibration + agent-based microsimulation with transparent open code
    prediction: ≥70% of posterior draws cross modeled herd threshold under subsidy scenario yet remain below under information-only arms


id: h-price-subsidy-closes-nash-herd-gap-in-agent-based-metapopulations
title: >
  In spatially explicit agent-based epidemic models calibrated to city mobility data, tuition-style subsidies that reduce perceived vaccination cost by fixed percentages will increase equilibrium coverage until crossing SIR-derived herd thresholds more reliably than information-only campaigns — falsified if modeled subsidies shift uptake insignificantly because trust parameters dominate elasticities in posterior draws.

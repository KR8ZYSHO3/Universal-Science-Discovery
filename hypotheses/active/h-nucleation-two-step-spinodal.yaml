id: h-nucleation-two-step-spinodal
title: >
  Classical nucleation theory fails by 10-20 orders of magnitude because nucleation
  in many systems proceeds via a two-step mechanism — initial spinodal decomposition
  to a dense disordered precursor phase, followed by crystallization within the
  precursor — and accounting for this pathway resolves the discrepancy.

evidence_links:
  - type: supporting
    doi: 10.1073/pnas.0908119107
    note: >
      Vekilov (2010) PNAS — two-step nucleation in protein crystallization;
      dense liquid precursor clusters observed by dynamic light scattering before
      crystal appearance; pathway lowers effective barrier.
  - type: supporting
    doi: 10.1039/c1sc00447f
    note: >
      Gebauer et al. (2011) Chem Sci — pre-nucleation clusters in calcium carbonate;
      stable clusters form before critical nucleus, inconsistent with CNT.
proposed_tests:
  - discipline: chemistry
    description: >
      Use in situ liquid-cell TEM to image nucleation of CaCO3 from supersaturated
      solution (S = 2-10) at 10 ms time resolution. Measure the sequence of structural
      intermediates. Hypothesis: at S > 4 all nucleation events show a detectable
      amorphous precursor phase (diameter 2-10 nm) that subsequently crystallizes,
      while at S < 2 nucleation proceeds by the classical one-step pathway, with
      the transition at S* predictable from the free energy of the precursor phase.

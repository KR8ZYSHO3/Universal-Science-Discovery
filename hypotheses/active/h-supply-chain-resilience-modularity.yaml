id: h-supply-chain-resilience-modularity
title: >
  Supply chain resilience scales with network modularity rather than inventory
  buffers — modular supply networks with regional redundancy outperform JIT
  systems during tail-risk events, with the resilience-efficiency frontier
  parameterized by the modularity index Q of the supplier network graph.
status: active
priority: high
impact_score: 0.74
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-supply-chain-resilience-efficiency
evidence_links:
  - type: supporting
    note: "Sheffi (2005) The Resilient Enterprise: modular supply chains recovered from 9/11 and Tohoku quake 60% faster than lean JIT counterparts"
    confidence: 0.68
  - type: related
    note: "Guan et al. (2020) COVID-19 disruption propagation: highly integrated supply networks suffered 3x larger production losses than modular networks"
    confidence: 0.73
  - type: related
    note: "Bimpikis et al. (2019) supply chain network structure determines systemic risk — hub-and-spoke vs modular — using network centrality measures"
    confidence: 0.65
proposed_tests:
  - description: >
      Network analysis of global automotive supply chains: map supplier networks
      from company disclosure and trade data for Toyota, VW, and Ford using
      graph methods. Compute modularity Q and concentration metrics. Correlate
      with delivery disruption duration during COVID semiconductor shortage.
  - description: >
      Simulation experiment: model supply network as a directed graph with
      failure cascades (node removal model). Vary Q from 0 (fully integrated) to
      0.8 (fully modular). Measure cascade size distribution and recovery time.
      Compute efficiency-resilience Pareto frontier parametrically.
related_disciplines:
  - operations-research
  - network-science
  - industrial-economics

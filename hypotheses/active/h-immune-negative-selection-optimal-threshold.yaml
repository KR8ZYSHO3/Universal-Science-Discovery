proposed_tests:
  - description: >
      Model the thymic selection process as a Neyman-Pearson classification problem
      where the decision threshold (affinity cutoff for negative selection) is
      optimized to minimize autoimmune risk while maximizing pathogen detection
      coverage; predict the optimal affinity threshold as a function of self-antigen
      diversity (MHC polymorphism) and compare to observed thresholds.
    method: "Computational model of TCR repertoire diversity post-selection; information-theoretic analysis of detection coverage vs. autoimmunity rate"
    prediction: "Optimal threshold minimizes F1-loss at affinity ~ 10^-7 M Kd, matching observed positive selection affinity window"
  - description: >
      Test whether somatic hypermutation in B-cells implements Bayesian updating
      of antigen recognition by measuring the mutual information between successive
      affinity maturation rounds in germinal centers and the change in antigen-antibody
      binding affinity.
    method: "Single-cell sequencing of germinal center B-cells at multiple timepoints; compute binding affinity from sequence + ML predictor; MI analysis"
    prediction: "Mutual information between successive SHM rounds and affinity improvement is maximized by the observed mutation rate, not higher or lower rates"

proposed_tests:
  - description: >
      Implement DI-QKD over a 10 km fiber link using heralded entanglement between
      two trapped-ion nodes with > 85% detection efficiency. Measure secret key rate
      and verify security against coherent attacks. Test whether the key generation
      rate exceeds 1 bit/second (practical threshold for symmetric key refreshing
      in secure communications).

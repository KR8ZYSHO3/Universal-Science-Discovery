id: h-qkd-device-independent-practical-security
title: >
  Device-independent QKD (DI-QKD) provides information-theoretically secure
  key distribution even against adversarial device manufacturers, but current
  implementations require loophole-free Bell inequality violation at key
  generation rates compatible with practical communication — achievable with
  photon collection efficiency > 85% in entanglement sources, a threshold
  currently within reach of trapped-ion and neutral-atom platforms but not
  yet of fiber photonic implementations.

id: h-manifold-hypothesis-m1-latent-dynamics-decoder-generalisation
title: >
  Motor cortex population activity during reaching lies on a low-dimensional
  (d ~ 6-12) smooth manifold embedded in the full neural state space, and
  neuroprosthetic decoders trained to operate in this manifold subspace
  show >2x improvement in robustness to neuron loss and inter-session
  non-stationarity compared to full-space Kalman filter decoders.

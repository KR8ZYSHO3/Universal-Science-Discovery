proposed_tests:
  - description: >
      In BrainGate2 participants (or rhesus macaque reaching task):
      compare Kalman filter decoder (full 96-channel space) vs. GPFA-subspace
      decoder (d=10 latent dimensions) vs. LFADS decoder (recurrent neural network
      latent dynamics). Metrics: offline decoding R² for held-out sessions;
      performance degradation as function of simulated electrode dropout (randomly
      remove 10%, 20%, 30%, 50% of channels). Test: GPFA/LFADS decoders degrade
      more gracefully than full-space Kalman filter.
    method: >
      Offline neural data analysis; simulated electrode dropout; Gaussian process
      factor analysis (GPFA) dimensionality estimation; cross-validated R² comparison
    prediction: >
      Manifold decoder R² at 30% electrode dropout: 0.72±0.08 (manifold) vs.
      0.51±0.09 (Kalman); manifold decoder inter-session stability (same-session
      vs. next-session R²) degrades by 8±3% vs. 22±5% for Kalman filter.
  - description: >
      Online closed-loop experiment: implement GPFA-based online manifold decoder
      in BrainGate participant; compare cursor control performance (bits/minute,
      path efficiency) over 30 sessions against same participant's Kalman filter
      performance. Test: is manifold decoder more stable over sessions?
    method: "Randomised crossover: 3-session blocks Kalman vs. manifold decoder; primary endpoint bits/minute"
    prediction: Manifold decoder shows <5% performance decline from session 1-10; Kalman shows 15-25% decline

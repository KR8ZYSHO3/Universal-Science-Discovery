proposed_tests:
  - description: >
      Prospective prediction study: CO₂ reduction to CO (RWGS reaction, a key
      step in e-fuel synthesis). Screen 120 bimetallic alloy surfaces (all
      combinations of 15 transition metals) by DFT for CO* binding energy and
      BEP-predicted RWGS turnover frequency. Identify top-5 predicted catalysts.
      Synthesise and test experimentally. Primary metric: TOF at 600°C, 1 bar.
    method: >
      DFT (VASP, PBE+D3) slab calculations; microkinetic model integrating
      elementary rate constants; volcano plot for RWGS; experimental synthesis
      of predicted catalysts by wet impregnation; kinetic measurements in fixed
      bed flow reactor with GC analysis.
    prediction: >
      ≥3 of the top-5 DFT-predicted alloys are in the top-10 experimentally
      ranked catalysts. Spearman rank correlation between predicted TOF and
      experimental TOF ≥ 0.7 across all 120 alloys tested. Top predicted
      catalyst achieves TOF within 3× of experimental maximum.
  - description: >
      Electrocatalysis: nitrogen reduction reaction (NRR) to ammonia. Compare
      DFT-predicted *N2H binding energy volcano against experimentally measured
      Faradaic efficiency for a 20-catalyst set including Fe, Ru, Mo, Fe2N,
      MoS2. Test whether DFT volcano peak aligns with experimentally most
      active catalysts.
    method: >
      DFT NRR free energy diagrams via Nørskov CHE method; experimental NRR
      in 0.1 M KOH, -0.3 V vs. RHE; colorimetric NH₃ quantification.
    prediction: >
      Catalysts within 0.3 eV of the computed volcano peak have ≥5× higher
      Faradaic efficiency than catalysts at volcano flanks. Mo-based catalysts
      predicted and confirmed as near-optimal.

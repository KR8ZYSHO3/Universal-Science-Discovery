id: h-dft-bep-relationship-enables-quantitative-catalyst-design-before-synthesis
title: >
  DFT-calculated adsorption energies and Brønsted-Evans-Polanyi activation
  energy relationships correctly predict the rank-ordering of catalytic activity
  (turnover frequency) for new bimetallic catalysts before experimental synthesis,
  enabling rational catalyst design that identifies the top-3 candidates among
  a 100+ member library with ≥80% success rate.

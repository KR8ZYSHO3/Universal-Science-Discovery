unknowns_addressed:
  - u-meg-inverse-source-localization

proposed_tests:
  - description: >
      Retrospective comparison of MEG spike source localization accuracy (vs iEEG ground truth) using:
      (1) minimum norm, (2) LCMV beamformer, (3) sparse Bayesian learning with sparsity calibrated by ICA,
      (4) MxNE mixed norm. Compare 5mm localization accuracy across 20 epilepsy patients with intracranial validation.
    method: "MEG + simultaneous iEEG in epilepsy monitoring unit; spatiotemporal source modeling comparison"
    prediction: "Sparse methods with ICA-calibrated sparsity should achieve <5 mm error in >80% of spikes vs ~70% for minimum norm"


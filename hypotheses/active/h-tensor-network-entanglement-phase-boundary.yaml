unknowns_addressed:
  - u-entanglement-tensor-network-complexity

proposed_tests:
  - description: >
      Compute bond dimension χ required to represent ground states of 1D quantum models at and away from
      criticality (quantum Ising model at g = 1), measuring how χ scales with system size L. Test whether
      the crossover from polynomial (area law) to exponential (volume law) χ scaling occurs exactly at the
      quantum phase transition.
    method: "DMRG + TEBD simulations of quantum Ising and XXZ models; measure χ(L) scaling with truncation error < 10^-10"
    prediction: "χ ~ L^0 for gapped phases; χ ~ L^(c/6) at critical point; χ ~ exp(L) for excited states"


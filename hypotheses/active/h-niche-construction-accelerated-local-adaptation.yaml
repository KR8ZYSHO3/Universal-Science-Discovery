unknowns_addressed:
  - u-niche-construction-feedback-tempo
proposed_tests:
  - description: >
      Sample seeds from native understory plant populations (e.g. Trillium) at sites with 5, 10, 20
      years of earthworm invasion history vs. uninvaded reference sites. Grow in common garden
      experiment with invaded vs. uninvaded soil treatments. Measure germination, survival, and biomass.
      Test whether populations from older invaded sites show higher fitness in invaded soil conditions.
    method: "Common garden reciprocal transplant design; ANOVA for site x soil type interaction"
    prediction: "Plants from invaded sites show > 20% fitness advantage in invaded soil over uninvaded-site plants; effect size increases with invasion duration"

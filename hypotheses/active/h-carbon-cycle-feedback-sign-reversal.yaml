id: h-carbon-cycle-feedback-sign-reversal
title: >
  Terrestrial carbon cycle feedback changes sign from negative (CO2 fertilization
  dominant) to positive (respiration and permafrost dominant) at approximately 3°C
  global warming, with the sign reversal occurring earlier in boreal peatlands than
  in tropical forests due to differential temperature sensitivity of heterotrophic respiration.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-carbon-cycle-feedbacks
related_disciplines:
  - climate-science
  - ecology
  - earth-system-science
evidence_links:
  - type: supporting
    doi: 10.1038/s41559-022-01948-7
    note: >
      Friedlingstein et al. (2022) — CMIP6 models show terrestrial carbon feedback
      becomes positive above 2-4°C; large model spread due to permafrost and
      tropical soil carbon uncertainty.
  - type: related
    doi: 10.1038/nature07671
    note: >
      Dorrepaal et al. (2009) Nature — warming experiment shows boreal peatland
      releases more carbon than it sequesters above 1°C of warming; sign reversal
      already occurring in some northern peatland systems.
proposed_tests:
  - discipline: climate-science
    description: >
      Run ensemble of 20 CMIP6 models with 1%, 2%, 3%, 4%, 5°C equilibrium warming
      scenarios. Extract carbon cycle feedback parameter β (carbon gained per K warming)
      for boreal, temperate, and tropical land regions separately. Hypothesis:
      boreal carbon feedback β changes sign (from negative to positive) at 2±1°C,
      tropical β changes sign at 4±1°C, and the global sign reversal temperature
      is strongly correlated with each model's permafrost carbon pool size at
      pre-industrial conditions (r > 0.7).

id: h-numerical-mantle-spectral-peaks-track-effective-rb-wavenumber-branches
title: >
  In suites of published mantle-convection simulations where Ra and Pr are reported with rheological laws held fixed, spherical harmonic peaks of lateral kinetic energy will shift to higher ℓ when effective Ra enters branches predicted by high-Ra RB marginal-stability sketches — falsified if peaks remain invariant while Ra spans orders of magnitude because stiff lids decouple interior spectra.

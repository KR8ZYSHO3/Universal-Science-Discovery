evidence_links:
  - type: supporting
    note: "Ferenczi et al. (2009) isometric equivalence of Banach spaces is Borel reducible to isomorphism of countable structures — lower complexity than expected"
    confidence: 0.70
  - type: related
    note: "Gowers (1994) solution to Banach's hyperplane problem: there exist Banach spaces non-isomorphic to their hyperplanes — infinite complexity of isomorphism classes"
    confidence: 0.78
  - type: related
    note: "Rosendal (2011) coarse geometry of Banach spaces: quasi-isometry equivalence has different Borel complexity than isomorphism — new invariant landscape"
    confidence: 0.65
proposed_tests:
  - description: >
      Borel reducibility analysis: show that isomorphism of separable Banach
      spaces is Borel bireducible with graph isomorphism (on countable graphs)
      or strictly above it. Use Gowers-type construction of uncountably many
      Banach space types to bound from below.
  - description: >
      Construct a complete isometry invariant for a non-trivial subclass of
      Banach spaces (e.g., spaces with unconditional basis). Test whether the
      Szlenk index, tree index, and Bourgain index together form a complete
      invariant system for this subclass. Counterexample would establish
      incompleteness.

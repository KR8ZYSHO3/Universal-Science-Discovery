id: h-banach-space-universality-hierarchy
title: >
  The space of separable Banach spaces under isometric equivalence is not
  classifiable by countable structures (Borel reducibility), and the isomorphism
  relation on separable Banach spaces is strictly more complex than any orbit
  equivalence relation induced by a Polish group action — placing it at the
  top of the descriptive set theory complexity hierarchy.
status: active
priority: medium
impact_score: 0.65

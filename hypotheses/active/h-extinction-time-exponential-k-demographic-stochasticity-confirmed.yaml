id: h-extinction-time-exponential-k-demographic-stochasticity-confirmed
title: >
  The mean extinction time formula T_ext ≈ exp(2rK/σ²)/r from the stochastic
  logistic model correctly predicts (within one order of magnitude) the observed
  extinction waiting times in laboratory populations of model organisms across
  a range of K and σ² values, validating the mathematical framework underlying
  IUCN minimum viable population assessments.

id: h-josephson-paramp-nears-quantum-noise-floor-with-rimp-matched-array
title: >
  Josephson traveling-wave parametric amplifiers operated at millikelvin with impedance-matched antenna interfaces can
  achieve system noise temperatures within 10% of the quantum limit across octave bandwidth when pump-induced ripples are
  suppressed — outperforming silicon LNAs at matched centers despite cryogenic overhead.

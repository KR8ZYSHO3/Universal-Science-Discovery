      Side-by-side noise characterization of TWPA vs state-of-art SiGe LNA at fixed center frequency with calibrated
      shot-noise reference and switchable hot/cold loads accounting for cable losses.
    method: Cryogenic Y-factor + quantum noise tomography where available.
    prediction: TWPA within stated margin of quantum noise temperature at equal bandwidth where SiGe remains thermal-noise dominated.


id: h-mantle-convection-670km-intermittent
title: >
  Mantle convection operates in an intermittent regime near the 660 km phase
  boundary — episodically layered for 100–200 Myr intervals punctuated by
  catastrophic avalanche events — and the geoid and heat flow record shows the
  ~200 Myr periodicity of these avalanche events.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-mantle-convection-transitions
evidence_links:
  - type: supporting
    note: "Machetel & Weber (1991) numerical model: post-spinel transition at 660 km with γ = −2.5 MPa/K produces episodic avalanches every 100–250 Myr"
    confidence: 0.75
  - type: supporting
    note: "Wen & Anderson (1997) seismic tomography shows slab ponding at 660 km — then periodic flushing into lower mantle"
    confidence: 0.70
  - type: contradicting
    note: "van der Hilst et al. (1997) Tonga-Kermadec slab penetrates 660 km without ponding — challenges strict layering"
    confidence: 0.65
proposed_tests:
  - description: >
      Geochemical time series: compile Os, Nd, Hf isotopic signatures of OIB
      and MORB globally over 0–500 Ma. Test for periodic isotopic mixing events
      (lower mantle signature appearing in MORB) with ~200 Myr periodicity —
      predicted signature of avalanche events.
  - description: >
      Convection code parameter study: use CitcomS mantle convection code with
      updated post-spinel Clapeyron slope (γ = −0.5 to −3 MPa/K). Map the
      parameter space of layered vs. whole-mantle regimes. Identify the intermittent
      regime boundaries. Compare to seismic tomography evidence for current
      convection mode.
related_disciplines:
  - mantle-dynamics
  - geodynamics
  - seismology

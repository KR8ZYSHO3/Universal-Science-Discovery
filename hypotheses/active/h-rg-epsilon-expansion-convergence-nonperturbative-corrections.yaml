id: h-rg-epsilon-expansion-convergence-nonperturbative-corrections
title: >
  The ε-expansion for critical exponents in the Wilson-Fisher universality class
  is an asymptotic (not convergent) series with optimal truncation at order ε⁴-ε⁵,
  and non-perturbative corrections (instantons, renormalon poles) provide the
  dominant source of error in d=3 predictions, making conformal bootstrap the
  only route to sub-0.1% precision.

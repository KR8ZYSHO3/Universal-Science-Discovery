id: h-deformation-quantization-symplectic-bridge
title: >
  Quantum mechanics is the deformation quantization of classical symplectic mechanics:
  the non-commutative algebra of quantum observables (A*B - B*A = iħ{A,B}_Poisson)
  is a formal deformation of the commutative Poisson algebra on phase space, with
  the symplectic structure ω providing the bracket, and symplectic integrators
  preserving ω correspond exactly to unitary quantum time evolution.

proposed_tests:
  - description: >
      Test symplectic integrator energy conservation over 10^9 steps (solar system
      simulation): compare leapfrog (symplectic) vs RK4 (non-symplectic). Predict:
      leapfrog shows bounded energy error O(h^2) indefinitely; RK4 shows secular drift.
    prediction: "Leapfrog energy error remains <10^-8 after 10^9 steps; RK4 error grows as O(t) confirming non-preservation of symplectic structure."

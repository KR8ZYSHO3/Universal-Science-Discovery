proposed_tests:
  - description: >
      Test the Gabaix et al. mechanism using institutional 13F holdings data
      (SEC EDGAR) as proxy for fund size distribution. Compute: (1) Pareto
      exponent of fund size distribution per year 2000-2023; (2) return tail
      exponent alpha per year from CRSP daily returns; (3) test whether
      alpha_return ≈ 2 * alpha_fund + 1 holds year-by-year and whether
      changes in fund size heterogeneity (post-GFC consolidation) predict
      changes in alpha_return.
    method: Hill estimator for Pareto exponents; bootstrap CI; panel regression alpha_return ~ alpha_fund
    prediction: >
      alpha_return = 2*alpha_fund + 1 holds with R² > 0.6 across years;
      2008-2010 consolidation in fund industry (alpha_fund increases) predicts
      alpha_return increasing toward 3.5-4 in post-GFC period.
  - description: >
      Cross-market test: compare alpha_return for equity markets (US, UK, Japan,
      Hong Kong) against institutional fund size heterogeneity (alpha_fund from
      national investor databases). Test whether markets with more concentrated
      institutional ownership have smaller alpha_fund and smaller alpha_return.
    method: Cross-sectional regression; control for market microstructure (tick size, turnover)
    prediction: alpha_return positively correlated with alpha_fund (r > 0.65) across markets

id: h-inverse-cubic-law-agent-heterogeneity-mechanism
title: >
  The inverse cubic law (alpha ~ 3) for financial return tail exponents is
  generated by the heavy-tailed distribution of fund sizes (Pareto with exponent
  ~ 1) combined with the square-root market impact law — funds optimally split
  large orders into smaller trades, and the resulting return distribution has
  tail exponent alpha = 2 * Pareto_fund_exponent + 1 ~ 3, making the inverse
  cubic law a consequence of institutional heterogeneity rather than intrinsic
  price dynamics.

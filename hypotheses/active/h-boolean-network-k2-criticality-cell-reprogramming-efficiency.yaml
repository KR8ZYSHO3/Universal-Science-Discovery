id: h-boolean-network-k2-criticality-cell-reprogramming-efficiency
title: >
  Gene regulatory networks operating at the K=2 criticality (edge of chaos) in Kauffman's
  NK model maximize reprogramming efficiency — the probability of noise-induced basin
  crossing from one cell fate attractor to another — relative to subcritical (K<2) or
  supercritical (K>2) connectivity regimes

proposed_tests:
  - description: >
      Construct synthetic gene regulatory circuits of varying K (K=1, 2, 3, 4) with identical
      node count N and measure the rate of noise-induced transitions between attractor states
      under controlled transcription factor perturbations; test whether K=2 circuits show
      maximum transition probability (reprogramming efficiency).
  - description: >
      Analyze published CRISPR perturbation atlases (Perturb-seq, CROP-seq) of hematopoietic
      cells to measure effective in-degree K of the transcription factor network and correlate
      K with observed reprogramming efficiency across cell type pairs in Yamanaka reprogramming
      experiments.

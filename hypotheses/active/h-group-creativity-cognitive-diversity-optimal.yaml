id: h-group-creativity-cognitive-diversity-optimal
title: >
  Group creativity follows an inverted-U function of cognitive diversity: below a
  threshold, convergent thinking dominates and production blocking suppresses original
  ideas; above a threshold, coordination costs and communication breakdown negate
  diversity gains; optimal team creativity requires moderate diversity with strong
  psychological safety.

id: h-preregistration-field-replication-rate
title: >
  Fields with higher preregistration adoption rates will show measurably higher
  replication rates in independent multi-laboratory replication projects, with
  a detectable dose-response relationship between percent preregistered studies
  and field-level replication probability.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.74
related_disciplines:
  - metascience
  - statistics
  - philosophy-of-science
unknowns_addressed:
  - u-reproducibility-crisis-causes
  - u-preregistration-effectiveness
evidence_links:
  - type: supporting
    note: >
      Registered Reports (peer review before data collection, publication guaranteed)
      show ~85% replication rate in meta-analyses vs. ~40% for standard publications
      in psychology (Scheel et al., 2021). This provides the strongest individual-study
      evidence that preregistration increases confirmatory validity.
  - type: supporting
    note: >
      OSF preregistration rates by sub-discipline in psychology correlate weakly with
      estimated replication rates in existing multi-lab projects (Many Labs 1–5), but
      no formal regression analysis has been published.
  - type: contradicting
    note: >
      Fields with high preregistration rates (clinical trials via ClinicalTrials.gov)
      also have high non-compliance rates; preregistration does not prevent selective
      outcome reporting if compliance is not enforced.
proposed_tests:
  - description: >
      For each sub-discipline in psychology and social science with existing large-scale
      replication projects, compute: (1) preregistration rate of original studies
      (from OSF, AsPredicted registrations), (2) replication success rate. Fit a
      logistic regression of replication success on preregistration status controlling
      for year, effect size, sample size. Test whether preregistration adds predictive
      value above these controls.
  - description: >
      Pre-register this meta-analysis and its analysis plan before accessing replication
      project data, as a demonstration that the meta-science of preregistration can
      itself be preregistered.

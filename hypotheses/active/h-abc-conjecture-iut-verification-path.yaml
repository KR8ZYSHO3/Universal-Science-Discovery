id: h-abc-conjecture-iut-verification-path
title: >
  Mochizuki's inter-universal Teichmüller theory (IUT) proof of the abc conjecture
  is likely correct but contains verification-blocking notational and conceptual
  barriers — a formalized proof in a proof assistant (Lean 4) or a 50-page
  accessible survey of the key novel constructions would enable community
  verification within 5 years.
status: active
priority: high
impact_score: 0.78
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-abc-conjecture-verification
evidence_links:
  - type: supporting
    note: "Mochizuki (2012/2021) PRIMS: IUT I-IV; editors Kashiwara and Saito accepted after 8-year review — journal endorsement without general community acceptance"
    confidence: 0.55
  - type: contradicting
    note: "Scholze & Stix (2018) report: fundamental gap in Corollary 3.12 — theta-function identification across copies claims non-obvious identification"
    confidence: 0.72
  - type: related
    note: "Dupuy et al. (2020-2021) IUT Primer: independent exposition accessible to arithmetic geometers — partial verification progress without resolving Scholze-Stix gap"
    confidence: 0.65
proposed_tests:
  - description: >
      Formal verification program: organize a Lean 4 formalization project targeting
      Mochizuki's Corollary 3.12. Recruit 10 specialists in arithmetic geometry.
      Formalize the theta-link construction and test whether Scholze-Stix objection
      is captured as a type error in Lean. Expected timeline: 3 years.
  - description: >
      Independent reconstruction: starting from the goal (abc conjecture) and
      Mochizuki's strategy, attempt an independent reconstruction of IUT Corollary
      3.12 using standard anabelian geometry tools. If the corollary can be
      re-proved with known methods, Mochizuki's proof is superseded. If not,
      identify which novel construction is truly essential.
related_disciplines:
  - number-theory
  - arithmetic-geometry
  - proof-theory

proposed_tests:
  - description: >
      Train sparse coding / ICA models on image statistics from different
      ecological environments (desert, forest, arctic, underwater) and compare
      the learned basis functions to the actual V1 receptive fields of animals
      adapted to those environments (rattlesnake, owl, arctic fox, fish).
      The efficient coding hypothesis predicts that basis functions should
      match V1 tuning of the adapted species.
    type: comparative_analysis
  - description: >
      Measure V1 receptive field bandwidth and aspect ratio in congenitally
      blind-restored humans (Gennaris cortical prosthesis recipients) vs.
      normally sighted controls. Efficient coding predicts that restored
      vision without natural image statistics during development will produce
      non-Gabor V1 tuning.
    type: clinical_study

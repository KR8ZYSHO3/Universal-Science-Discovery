id: h-v1-gabor-infomax-prediction
title: >
  V1 simple cell receptive fields in humans are uniquely determined by the
  infomax / sparse coding optimisation on the statistical ensemble of
  natural images experienced during the organism's visual development, and
  any systematic deviation from Gabor wavelet shape indicates a mismatch
  between the training distribution and the animal's ecological niche.

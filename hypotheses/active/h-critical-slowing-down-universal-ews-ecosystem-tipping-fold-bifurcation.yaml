id: h-critical-slowing-down-universal-ews-ecosystem-tipping-fold-bifurcation
title: >
  Critical slowing down near fold bifurcations is a universal early warning
  signal for all ecosystem regime shifts, with variance σ² and AR(1) increasing
  according to universal power-law exponents γ determined by the fold bifurcation
  normal form, such that empirical detection with > 80% true positive rate
  and < 20% false positive rate is achievable from ≥ 100 observations before
  the transition.

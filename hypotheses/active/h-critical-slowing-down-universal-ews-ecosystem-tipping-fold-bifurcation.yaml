proposed_tests:
  - description: >
      High-resolution lake monitoring experiment: instrument 20 eutrophication-
      prone lakes (half with nutrient reduction, half control) with daily turbidity
      + chlorophyll sensors for 10 years; apply standardised EWS analysis
      (Dakos et al. rolling AR(1) and variance) and compute empirical ROC curve
      for predicting which lakes cross from clear to turbid state.
    method: "Continuous sensor data; rolling window AR(1) and σ² with Kendall τ trend test; prospective prediction of transition within 2 years; ROC analysis comparing to standard limnological risk factors"
    prediction: "EWS AUC > 0.80 for predicting eutrophication transitions in the experimental lakes; lakes with managed nutrient reduction show declining AR(1) (recovery signal)"
  - description: >
      Universal exponent test: derive the expected power-law scaling σ² ∝ (p_c-p)^(-1/2)
      from the fold bifurcation normal form and test whether empirical variance
      measurements follow this exponent across lake, fishery, and savanna transitions
      using published time series from Dakos et al. (2012) database.
    method: "Log-log regression of σ²(p) vs. distance-to-tipping estimated from model fitting; test whether scaling exponent γ = 0.5 ± 0.1 across ecosystem types"
    prediction: "Variance exponent γ = 0.5 ± 0.15 is consistent across lake, fisheries, and climate transition datasets, confirming universal fold bifurcation normal form"


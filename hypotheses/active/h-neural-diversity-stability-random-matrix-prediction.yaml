id: h-neural-diversity-stability-random-matrix-prediction
title: >
  The stability of cortical neural circuits under random synaptic perturbation follows
  May's random matrix criterion — circuits with higher interneuron subtype diversity
  have lower effective interaction variance σ² and require stronger perturbation to
  destabilize, quantitatively matching theoretical predictions from the Wigner
  semicircle law.

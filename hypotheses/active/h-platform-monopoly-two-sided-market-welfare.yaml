evidence_links:
  - doi: "10.1257/aer.20130861"
    type: supporting
    confidence: 0.65
    note: >
      Rochet & Tirole (2006) two-sided market theory: optimal platform pricing
      subsidises one side to attract the other; monopoly price structure can
      be welfare-improving relative to separation — welfare depends on cross-
      side externalities.
  - doi: "10.1093/qje/qjz014"
    type: supporting
    confidence: 0.68
    note: >
      Brynjolfsson et al. (2019) consumer surplus from free digital services
      estimated at $1,770-$6,400 per person per year using willingness-to-
      accept surveys; suggests zero-price platforms generate substantial
      consumer surplus despite monopoly pricing.
  - doi: "10.1257/aer.20181012"
    type: related
    confidence: 0.60
    note: >
      Fack & Landais (2021) measure data privacy costs; find users
      systematically undervalue their data — a behavioural wedge that
      enables exploitation even at zero money prices.
proposed_tests:
  - description: >
      Use a randomised experiment offering Facebook/Instagram users complete
      data opt-out (no targeted ads, no data sale) in exchange for a monthly
      subscription fee. Elicit willingness-to-pay for this privacy bundle.
      Compare against willingness-to-accept compensation to stay on ad-
      supported version. Test: does the gap between WTA and WTP exceed the
      advertising revenue per user, indicating consumer surplus extraction?

id: h-platform-monopoly-two-sided-market-welfare
title: >
  Digital platform monopolies in two-sided markets impose net welfare costs
  on consumers only when they exploit inattention or lock-in to extract
  consumer surplus above competitive price levels — zero-price platforms
  may still reduce welfare through data exploitation and privacy costs that
  exceed the subsidy value to consumers.

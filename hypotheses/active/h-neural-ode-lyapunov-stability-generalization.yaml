proposed_tests:
  - description: >
      Train Neural ODEs on CIFAR-10 with and without Lyapunov stability regularization
      (penalizing positive Jacobian eigenvalues of the vector field); compare
      test accuracy, adversarial robustness (PGD-20), and OOD generalization
      (CIFAR-10-C) between stable and unstable trained models.
    method: "PyTorch Neural ODE implementation (torchdiffeq); Lyapunov regularization via spectral norm constraint; adversarial evaluation with AutoAttack"
    prediction: "Stable Neural ODEs achieve >5% improvement in adversarial accuracy and >3% OOD accuracy vs. unconstrained baseline at same clean accuracy"
  - description: >
      Map the Lyapunov function landscape of a trained Neural ODE classifier and
      identify saddle points; test whether adversarial examples are concentrated
      near saddle points of the learned Lyapunov function vs. random perturbations.
    method: "Compute Lyapunov function V(x) via SOS programming on Neural ODE vector field; identify saddle points; measure proximity of adversarial examples to saddles"
    prediction: ">80% of successful PGD adversarial examples are within 2x Lyapunov norm of the nearest saddle point vs. <20% for random examples"

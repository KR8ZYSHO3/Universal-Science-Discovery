id: h-antarctic-bottom-water-meltwater-circulation-collapse
title: >
  Antarctic Bottom Water formation rate is primarily controlled by brine
  rejection during sea ice formation in coastal polynyas; accelerating ice
  shelf melt introduces freshwater stratification that will reduce AABW
  production by 20-40% by 2100 under SSP3-7.0.
status: active
priority: high
impact_score: 0.82
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - physical-oceanography
  - geology
  - climate-science
  - glaciology
unknowns_addressed:
  - u-antarctic-bottom-water
evidence_links:
  - doi: "10.1038/s41558-023-01643-2"
    type: supporting
    confidence: 0.72
    note: >
      Purich & England (2023) report 30% AABW decline since 2000s based on
      Argo float observations; link to increased Antarctic meltwater flux
      reducing polynya brine rejection efficiency.
  - doi: "10.1126/science.abl4921"
    type: supporting
    confidence: 0.68
    note: >
      Silvano et al. (2023) show freshwater stratification near Totten and
      Mertz glaciers has reduced dense shelf water formation; estimate 20% AABW
      decline 1992-2017 from repeat hydrography sections.
  - doi: "10.1038/s41467-019-10927-3"
    type: related
    confidence: 0.60
    note: >
      Moorman et al. (2020) model future AABW under CMIP6 scenarios; SSP5-8.5
      projects 40% collapse by 2100 with large uncertainty in ice shelf melt
      parameterisation.
proposed_tests:
  - description: >
      Deploy moored current meters and CTD sensors in the Ross Sea, Weddell
      Sea, and Adélie Land polynyas with 5-year deployments. Test: does observed
      AABW volume transport (Sv) correlate with polynya area and sea ice
      production as measured by satellite passive microwave? Rejection if
      AABW volume is decoupled from polynya brine production on interannual
      timescales.
  - description: >
      Run NEMO/MOM ocean model at 1/12° resolution with controlled meltwater
      perturbations representing Thwaites, Pine Island, and Totten. Isolate
      contribution of freshwater stratification vs. warming signal. Test:
      does halocline formation within 500 km of ice shelf suppress polynya
      brine convection on decadal timescales?

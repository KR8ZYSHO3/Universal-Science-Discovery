id: h-cardiac-regeneration-hippo-yap-pathway
title: >
  Adult mammalian cardiomyocyte regeneration failure is caused primarily by Hippo pathway
  activation at birth that suppresses YAP/TAZ-mediated proliferation, and transient YAP
  activation via AAV9-delivered dominant-active YAP after myocardial infarction can
  regenerate > 20% of lost myocardium in adult mice within 4 weeks.

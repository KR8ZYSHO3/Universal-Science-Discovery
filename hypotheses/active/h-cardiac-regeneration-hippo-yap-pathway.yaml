proposed_tests:
  - discipline: medicine
    description: >
      Perform LAD ligation (myocardial infarction) in adult C57BL/6 mice (N=30).
      At 24h post-MI, inject AAV9-YAPS127A (dominant-active YAP) or AAV9-GFP
      (control) at 10^12 vg/mouse via tail vein. Sacrifice at 4 weeks. Quantify
      cardiomyocyte proliferation (EdU+/Troponin T+), infarct size (Masson's
      trichrome), and cardiac function (echocardiography). Hypothesis: AAV9-YAPS127A
      mice show ≥20% infarct size reduction, ≥15% improvement in ejection fraction,
      and ≥3-fold increase in EdU+/TroponinT+ double-positive cells versus controls
      (p < 0.01 for all outcomes).

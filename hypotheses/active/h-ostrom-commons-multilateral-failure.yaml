id: h-ostrom-commons-multilateral-failure
title: >
  Multilateral cooperation arrangements for global commons fail when they violate more
  than three of Ostrom's eight design principles simultaneously; the minimum sufficient
  set of principles for international commons governance requires monitoring, graduated
  sanctions, and recognition of rights to organize — and failure rate is predictable
  from which principles are absent.

evidence_links:
  - type: supporting
    doi: 10.1017/CBO9780511807763
    note: >
      Ostrom (1990) — Governing the Commons; 8 design principles derived from
      successful common pool resource governance; monitoring and sanctions central.
  - type: supporting
    doi: 10.1126/science.302.5652.1907
    note: >
      Dietz, Ostrom & Stern (2003) — global commons governance review; principles
      generalise from local to international scale with additional complications.
  - type: related
    doi: 10.1073/pnas.1308372111
    note: >
      Cox, Arnold & Tomás (2010) — meta-analysis of 91 CPR case studies; validates
      Ostrom principles with quantified failure rates when principles are absent.
proposed_tests:
  - discipline: political-science
    description: >
      Score 50 multilateral environmental agreements (MEAs) on all 8 Ostrom principles
      using a validated coding instrument (Institutional Grammar). Classify outcomes
      as successful (binding reductions achieved), partial, or failed. Fit a logistic
      regression model predicting failure as a function of number of missing principles.
      Test whether the 3-principle threshold predicts failure with AUC > 0.8.
  - discipline: social-science
    description: >
      Conduct structured interviews with negotiators from 15 failed and 15 successful
      MEAs. Identify post-hoc which principles were absent and which defections were
      predicted by absent monitoring/sanctions. Test whether the absence of monitoring
      and graduated sanctions is cited in >80% of failure cases, consistent with the
      minimum-sufficient-set prediction.

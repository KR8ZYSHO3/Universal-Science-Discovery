evidence_links:
  - doi: "10.1016/j.jfineco.2011.03.016"
    type: supporting
    confidence: 0.72
    note: >
      Gai & Kapadia (2010) model: diversification paradox — increased interbank
      connectivity reduces individual bank failure probability but increases
      systemic contagion risk above threshold connectivity density; robust-
      yet-fragile property demonstrated analytically.
  - doi: "10.1093/rfs/hhv086"
    type: supporting
    confidence: 0.68
    note: >
      Acemoglu et al. (2015) analytical result: dense networks are more
      resilient below a contagion threshold but amplify shocks above it;
      core-periphery structure is the critical topological feature.
  - doi: "10.1257/aer.103.7.3115"
    type: related
    confidence: 0.63
    note: >
      Elliott et al. (2014) integration-diversification model: network
      integration (cross-holdings) first reduces then increases discontinuous
      failure cascades — a phase transition in failure probability.
proposed_tests:
  - description: >
      Reconstruct interbank lending networks for 5 countries (US, UK, Germany,
      Italy, Brazil) from quarterly regulatory reporting data (FR Y-9C,
      PRA returns). Compute pre-crisis (2005-2007) network centrality measures:
      eigenvector centrality of core banks, periphery ratio, and assortativity.
      Test: does pre-crisis eigenvector centrality concentration in top 5 banks
      predict post-crisis contagion severity (measured by bank failures + GDP
      loss) across countries? Use cross-country regression.

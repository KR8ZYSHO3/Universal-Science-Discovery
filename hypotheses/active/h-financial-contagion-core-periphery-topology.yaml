id: h-financial-contagion-core-periphery-topology
title: >
  Systemic financial risk is primarily determined by the core-periphery
  topology of interbank networks: robust-yet-fragile systems arise when a
  small core of highly interconnected banks amplifies contagion that a
  periphery of weakly connected banks cannot absorb, and this structure
  is detectable from pre-crisis network centrality measures.

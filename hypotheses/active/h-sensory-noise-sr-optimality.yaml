proposed_tests:
  - summary: >
      Patch-clamp measurements of channel noise in inner hair cells across frequency range.
      Calculate D_opt from hair-bundle stiffness and threshold. Test whether measured
      RMS noise voltage matches D_opt. Repeat in outer hair cells (which have active
      amplification) to test whether active processes shift noise toward SR optimum.
  - summary: >
      Pharmacological noise manipulation in cricket cercal system: use ion channel
      blockers to reduce channel noise below physiological level. Measure detection
      threshold for low-amplitude water-wave stimuli before and after. SR predicts
      threshold should increase (get worse) when noise is reduced below D_opt.
  - summary: >
      Comparative genomics: identify ion channel subunits responsible for noise in
      mechanoreceptors across species with different prey-detection environments.
      Test whether channel noise levels co-evolve with signal frequencies in the
      animal's ecology, as predicted by SR optimality.

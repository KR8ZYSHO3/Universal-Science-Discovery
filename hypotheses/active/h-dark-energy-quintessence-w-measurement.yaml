id: h-dark-energy-quintessence-w-measurement
title: >
  Dark energy is a dynamical scalar field (quintessence) with equation of state w(z) ≠ -1
  that evolves as w(z) = w_0 + w_a × z/(1+z), with |w_a| > 0.1 detectable by the
  next generation of large-scale structure surveys (DESI, Euclid, Rubin LSST) at 5σ.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-dark-energy-equation-of-state
related_disciplines:
  - astrophysics
  - cosmology
  - physics
  - observational-astronomy
evidence_links:
  - type: supporting
    doi: 10.48550/arXiv.2404.03002
    note: >
      DESI Collaboration (2024) arXiv:2404.03002 — DESI Year 1 BAO measurements
      show mild tension with ΛCDM at 2.5σ; best-fit w_0 = -0.55, w_a = -1.32
      (Chevallier-Polarski parameterization).
  - type: related
    doi: 10.1051/0004-6361/202347092
    note: >
      Euclid Collaboration (2024) — Euclid Wide Survey forecasts; projected to
      constrain w_a to ±0.1 at 1σ, sufficient to detect |w_a| > 0.3 at 3σ.
proposed_tests:
  - discipline: observational-astronomy
    description: >
      Combine DESI Year 3 BAO measurements with Rubin LSST Year 1 weak lensing
      shear power spectrum. Fit the w_0-w_a CPL model using MCMC with CMB
      (Planck 2018) as prior. Hypothesis: the combined posterior for w_a has
      |w_a| > 0.1 at 3σ by 2027, distinguishing quintessence from cosmological
      constant at high significance.

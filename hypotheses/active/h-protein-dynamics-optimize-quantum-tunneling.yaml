id: h-protein-dynamics-optimize-quantum-tunneling
title: >
  Enzyme "promoting vibrations" — specific low-frequency protein conformational
  motions that compress the proton donor-acceptor distance d — are evolutionarily
  selected to optimize quantum tunneling rates, and thermophilic enzyme variants
  with increased promoting vibration frequencies should show reduced KIE at the
  thermophilic growth temperature due to classical contribution dominance.

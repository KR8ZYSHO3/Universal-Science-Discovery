proposed_tests:
  - description: >
      Compare KIE of thermophilic vs. mesophilic alcohol dehydrogenase (ADH)
      orthologs at their respective optimal growth temperatures, testing whether
      KIE at the optimum temperature is similar (both optimized for tunneling)
      or whether thermophilic ADH shows reduced KIE (dominance of classical
      over-barrier transfer at high T).
    method: >
      Isothermal KIE measurements (k_H/k_D) for ADH orthologs from Bacillus
      stearothermophilus (thermophilic) vs. horse liver ADH (mesophilic) at
      T = 25°C, 37°C, 50°C, 65°C
    prediction: >
      Thermophilic ADH at 65°C shows KIE ≈ 5-8 (near classical limit),
      while mesophilic ADH at 25°C shows KIE > 10 (tunneling-dominated).
      At their respective optimal temperatures, both show similar KIE ≈ 8,
      consistent with tunneling being matched to the thermal fluctuations at
      each organism's operating temperature.
  - description: >
      Mutational disruption of promoting vibrations: mutate a distal residue
      identified by normal mode analysis as contributing to donor-acceptor
      compression in ADH (Val203 in HLADH based on isotope-edited FTIR),
      measure change in KIE and temperature dependence of KIE.
    method: >
      Site-directed mutagenesis + stopped-flow kinetics + temperature-dependent
      KIE measurement
    prediction: >
      Promoting vibration mutation increases KIE temperature dependence
      (ΔEa = Ea_D - Ea_H increases from ~0.5 to >2 kJ/mol) and reduces
      rate by >5-fold, consistent with loss of tunneling compression.

id: h-symplectic-quantization-new-prediction
title: >
  Floer homology groups of a symplectic manifold (M, ω) compute the quantum energy
  spectrum of the corresponding Hamiltonian system in the semiclassical limit, providing
  new spectral predictions beyond the Gutzwiller trace formula.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: medium

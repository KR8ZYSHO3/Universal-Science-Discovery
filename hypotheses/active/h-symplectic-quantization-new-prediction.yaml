unknowns_addressed:
  - u-symplectic-quantization-semiclassical
evidence_links:
  - type: supporting
    note: >
      Floer (1988) constructed an infinite-dimensional Morse theory on the loop space
      of a symplectic manifold; its homology groups HF*(M, ω) count pseudoholomorphic
      cylinders. In parallel, the Gutzwiller trace formula connects classical periodic
      orbits to quantum energy levels with quantum corrections. The Arnol'd conjecture
      (proved by Floer) gives a lower bound on fixed points of Hamiltonian maps equal to
      the sum of Betti numbers — suggesting Floer homology computes quantum degeneracy structure.
  - type: supporting
    note: >
      For integrable systems, the Bohr-Sommerfeld quantization condition (∮ p dq = nℏ)
      is exactly the condition that the Lagrangian tori are Floer-geometric objects
      satisfying a topological constraint. This suggests Floer homology extends
      Bohr-Sommerfeld to non-integrable systems.
  - type: contradicting
    note: >
      The connection between Floer homology and physical quantum spectra requires
      going beyond the semiclassical approximation; mathematical rigour requires
      the manifold to be compact (no scattering states) — limiting direct application
      to physical Hamiltonians with continuous spectra.
proposed_tests:
  - discipline: mathematical-physics
    description: >
      Compute the Floer homology groups HF*(M, H) for a completely integrable
      Hamiltonian on a compact symplectic manifold (e.g. a 2-torus). Compare the
      resulting homology groups to the quantum energy spectrum computed by Schrödinger
      equation. Test whether the Betti numbers of Floer homology equal the dimension
      of degenerate energy eigenspaces.
  - discipline: mathematical-physics
    description: >
      For the quantum stadium billiard (a known quantum chaotic system), compute
      the periodic orbit sum (Gutzwiller trace formula) and compare to the Floer
      homology prediction. Test whether Floer homology provides a better approximation
      to the energy-level statistics (GOE vs. Poisson distribution) than the
      Gutzwiller formula alone.

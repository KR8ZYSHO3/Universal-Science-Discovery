proposed_tests:
  - summary: >
      3D tumor spheroid experiments: measure spatial percolation transition by systematically varying
      cancer cell seeding density in matrix. Identify critical density. Then test whether adaptive
      dosing that keeps density at 80% of critical threshold achieves stable containment vs elimination
      protocols over equivalent time periods.
  - summary: >
      Cross-domain test: percolation physics predicts that connectivity threshold depends on the
      dimensionality and geometry of the substrate. Compare invasion dynamics in 2D culture, 3D matrix,
      and in vivo xenograft — does the threshold scale in a way consistent with percolation theory?
  - summary: >
      Agent-based simulation: model individual cancer cells with realistic division and death rates plus
      a drug sensitivity landscape. Does adaptive therapy consistently find stable attractors near the
      percolation threshold? What fraction of parameter space allows indefinite containment?

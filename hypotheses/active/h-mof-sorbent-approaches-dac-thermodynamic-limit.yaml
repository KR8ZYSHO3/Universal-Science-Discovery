id: h-mof-sorbent-approaches-dac-thermodynamic-limit
title: >
  Metal-organic framework (MOF) sorbents with CO₂ binding enthalpy in the 30-50 kJ/mol
  range and fast diffusion kinetics can achieve DAC energy consumption below 100 kJ/mol
  CO₂ — within 5× of the thermodynamic minimum — using low-grade heat (60-80°C)
  for regeneration.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
related_disciplines:
  - chemical-engineering
  - thermodynamics
  - materials-science
unknowns_addressed:
  - u-dac-sorbent-entropy-production-mechanism
evidence_links:
  - type: supporting
    note: >
      Flaig et al. (2020) J Am Chem Soc: amine-appended Mg-MOF-74 achieves CO₂
      uptake > 3 mmol/g at 400 ppm, 40°C with binding enthalpy ~65 kJ/mol —
      higher capacity than physisorptive MOFs while allowing 100°C regeneration.
  - type: supporting
    note: >
      Kim et al. (2022) ACS Energy Lett: MOF-based DAC pilot at 1 kg/day scale
      with energy consumption ~200 kJ/mol — demonstrating that MOF sorbents
      are approaching but have not yet reached the sub-100 kJ/mol target.
  - type: contradicting
    note: >
      MOF stability in humid air (water vapor 1-4% in ambient) is a known challenge:
      many high-capacity MOFs degrade within 10-100 adsorption cycles under ambient
      conditions, raising lifecycle energy cost above lab-measured values.
proposed_tests:
  - discipline: materials-science
    description: >
      Synthesize a combinatorial library of 20 MOF variants (systematic variation
      of metal node, linker functionalization) with binding enthalpies between 25-70
      kJ/mol CO₂. Test each for: (1) CO₂ working capacity at 400 ppm, 40°C →
      100°C swing, (2) water stability over 1000 cycles in 50% RH air, (3) CO₂
      diffusion kinetics (breakthrough curve half-time). Identify the Pareto frontier
      of energy-capacity-stability trade-off.
  - discipline: chemical-engineering
    description: >
      Process simulation: model a temperature-vacuum swing adsorption (TVSA) cycle
      for the best MOF candidates, including realistic heat recovery (cross-exchange
      between adsorption and desorption beds). Calculate total energy consumption
      including sensible heat, heat of adsorption/desorption, vacuum pump work, and
      blower power. Compare to thermodynamic minimum to quantify the irreversibility
      breakdown and identify the rate-limiting entropy production step.

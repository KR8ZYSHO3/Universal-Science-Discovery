proposed_tests:
  - description: >
      Compare K values computed from first-principles partition functions (harmonic
      oscillator, rigid rotor, particle-in-box) against calorimetric K measurements
      for 20 gas-phase reactions (NIST Webbook). Test: does harmonic approximation
      predict K within factor 2 for reactions involving only C-C, C-H bonds?
    prediction: "Harmonic K within factor 2 for >90% of C-C/C-H reactions; deviates by >10x for O-H reactions where tunneling is significant (H-transfer in H2O2 decomposition)."

id: h-statistical-thermodynamics-equilibrium-partition-function
title: >
  All of chemical equilibrium derives from a single statistical mechanical quantity:
  the molecular partition function Z = Σ_states exp(-E_state/kT); the equilibrium
  constant K = exp(-ΔG°/RT) equals the ratio of product to reactant partition functions,
  with van't Hoff temperature dependence d(lnK)/dT = ΔH°/RT² following immediately
  from d(lnZ)/dT = <E>/kT².

id: h-iv-late-external-validity-population-representativeness
title: >
  The local average treatment effect (LATE) estimated by instrumental variables
  is generalizable to the full population when the complier subpopulation is
  representative on all effect-modifying covariates, and this representativeness
  is empirically testable by comparing complier covariate distributions to the
  full sample — enabling LATE-to-ATE extrapolation with quantifiable uncertainty.

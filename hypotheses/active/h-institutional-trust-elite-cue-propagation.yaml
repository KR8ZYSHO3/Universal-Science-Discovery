evidence_links:
  - doi: "10.1017/S0003055420000428"
    type: supporting
    confidence: 0.78
    note: >
      Broockman & Kalla (2022) APSR — elite cues experimentally move mass opinion on
      institutions within days of exposure; partisan identity moderates magnitude but
      direction is uniform across partisanship, consistent with cue-taking rather than
      independent evaluation
  - doi: "10.1093/poq/nfab029"
    type: supporting
    confidence: 0.74
    note: >
      Grossman et al. (2021) — COVID trust collapse in US: Republican trust in CDC
      dropped 30 points in 3 weeks following presidential statements; Democratic trust
      stable; partisan divergence matched timing of presidential communication almost exactly
  - doi: "10.1017/S0007123420000940"
    type: related
    confidence: 0.67
    note: >
      Norris & Inglehart (2019) — long-run trust erosion correlates with widening inequality
      (economic grievance pathway); but acute collapses (>5 pts/month) always co-occur with
      elite communication events — consistent with dual-pathway model
proposed_tests:
  - description: >
      Automated NLP monitoring of elected officials' social media (Twitter/X) for institutional
      trust frames; build predictive model of population trust survey changes (Gallup, PEW)
      at 2-month lag; test whether elite sentiment shift Granger-causes population trust change
      with p<0.01 in 5 countries × 10 institutions.

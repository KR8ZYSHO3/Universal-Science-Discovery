id: h-institutional-trust-elite-cue-propagation
title: >
  Rapid collapses of institutional trust are caused by elite cue propagation rather
  than direct institutional failures — when partisan elites withdraw trust cues from
  institutions, their followers update trust downward within weeks, and early warning
  signs appear as elite social media tone shifts 2-4 months before population trust surveys show changes.
status: active
priority: medium
impact_score: 0.78

id: h-fusion-lawson-criterion-turbulent-transport-barrier
title: >
  The remaining barrier to sustained net-energy-gain fusion in tokamaks is
  turbulent heat transport (gyrobohm diffusion) that degrades energy confinement
  below the H-mode pedestal — achieving commercial fusion requires either
  sustained high-pedestal H-mode with ELM suppression or a qualitatively
  different plasma regime with reduced transport.

evidence_links:
  - doi: "10.1038/s41586-022-05172-4"
    type: supporting
    confidence: 0.78
    note: >
      NIF (Zinkle et al. 2022): inertial confinement fusion achieved ignition
      (3.15 MJ output from 2.05 MJ laser input) — confirms Q>1 is achievable;
      tokamak challenge is sustained confinement rather than peak compression.
  - doi: "10.1088/0029-5515/49/6/065029"
    type: supporting
    confidence: 0.70
    note: >
      Kinsey et al. (2011) ITER predictions using TGLF transport model:
      Q=10 achievable if H-mode pedestal pressure maintained; ELMs (edge-
      localised modes) are primary threat to sustained high-pedestal operation.
  - doi: "10.1063/5.0013111"
    type: related
    confidence: 0.65
    note: >
      Creely et al. (2020) SPARC design: high-field compact tokamak exploits
      B⁴ scaling of plasma pressure to reduce required plasma volume; approach
      sidesteps transport problem by operating at higher pressure/field ratio.
proposed_tests:
  - description: >
      Operate ITER in H-mode with pellet injection and ELM-suppression coils
      to maintain pedestal pressure. Measure energy confinement time τ_E as
      a function of ELM frequency and pedestal height. Test: does sustained
      pedestal above 90% of ideal MHD stability limit allow τ_E to remain in
      the Q>10 operating window for >10 second pulses? Compare gyrokinetic
      simulation (GENE, GYRO) predictions against measured heat flux profiles.

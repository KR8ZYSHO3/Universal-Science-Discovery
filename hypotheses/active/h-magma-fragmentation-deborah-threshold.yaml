id: h-magma-fragmentation-deborah-threshold
title: "Magma fragmentation in explosive eruptions is triggered when the Deborah number De = η / (G_∞ * τ_deform) exceeds a universal threshold of approximately 0.01, and this threshold can be measured in real-time from seismic velocity changes in the shallow volcanic conduit during eruption precursors"
status: active
priority: high
impact_score: 0.78
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1126/science.283.5397.85"
    type: supporting
    confidence: 0.75
    note: "Dingwell (1996) - brittle failure of silicate melts; De threshold concept established"
  - type: supporting
    note: "Cordonnier et al. (2012) - fragmentation of rocks in a volcanic conduit; experimental De measurements"
  - type: related
    note: "Sparks (2003) - forecasting volcanic eruptions: seismic precursors and conduit rheology changes"

unknowns_addressed:
  - u-magma-fragmentation-rheology-threshold

proposed_tests:
  - description: >
      Install high-frequency seismic arrays at an active silicic volcano and monitor P-wave velocity changes
      in the shallow conduit (0-2 km depth). Test whether P-wave velocity decreases (indicating melt fraction
      increase) precede explosive eruptions by a predictable time determined by De-threshold crossing.
    method: "Seismic tomography + rheological modeling of conduit melt properties from volcanic tremor data"
    prediction: "P-wave velocity should decrease by >5% within hours of De exceeding 0.01 at the fragmentation depth"

related_disciplines:
  - volcanology
  - fluid-mechanics
  - geophysics

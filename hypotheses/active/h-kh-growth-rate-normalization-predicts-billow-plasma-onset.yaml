id: h-kh-growth-rate-normalization-predicts-billow-plasma-onset
title: >
  In matched shear-layer simulations, nondimensional Kelvin-Helmholtz growth rates inferred from atmospheric billow roll-up will predict the rank ordering of plasma shear-mode onset after adding a magnetic-tension correction; falsified if rank correlation falls below 0.3 across the shared parameter grid.
status: active
priority: medium
impact_score: 0.34

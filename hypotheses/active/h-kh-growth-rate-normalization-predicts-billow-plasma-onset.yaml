    type: related
    confidence: 0.45
    note: Drazin and Reid textbook treatment of hydrodynamic stability, including shear instabilities.
unknowns_addressed:
  - u-kelvin-helmholtz-growth-rate-transfer-cloud-plasma-shear
proposed_tests:
  - description: >
      Run paired atmospheric and MHD shear-layer simulations; extract growth rates from perturbation amplitudes and compare rank ordering with and without magnetic correction terms.
    method: Simulation benchmark with preregistered nondimensional parameter grid.
    prediction: Spearman rho >= 0.5 after correction; rho < 0.3 falsifies transfer value.

id: h-quasicrystal-phason-strain-stability
title: >
  Quasicrystalline phases are thermodynamically stabilized (not merely metastable)
  in specific alloy compositions by phason entropy and vibrational entropy
  contributions to the free energy — the stability field is bounded by an
  effective phason elastic constant κ_φ that determines whether the approximant
  or quasicrystal phase is thermodynamically favored.
status: active
priority: medium
impact_score: 0.67
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-quasicrystal-stability-origin
evidence_links:
  - type: supporting
    note: "Tsai et al. (1987) AlCuFe icosahedral quasicrystal thermodynamically stable — annealing improves structural order vs. metastable QC that disorder"
    confidence: 0.78
  - type: supporting
    note: "Widom (1991) phason entropy stabilization: phason fluctuations contribute k_B T per site entropy — sufficient to stabilize QC over approximant at high T"
    confidence: 0.70
  - type: related
    note: "Grushko & Stafford (1989) composition windows for stable QC in AlCuFe: narrow ±0.5 at% — consistent with thermodynamic rather than kinetic stability"
    confidence: 0.72
proposed_tests:
  - description: >
      Calorimetric stability measurement: differential scanning calorimetry of
      stable (AlCuFe, AlPdMn) vs. metastable (AlMn, AlFeCr) quasicrystals.
      Measure enthalpy of transformation from QC to approximant. Test: stable QC
      has transformation ΔH > 0 (endothermic, requires heating) — proves
      thermodynamic stability. Metastable QC: ΔH < 0 (exothermic).
  - description: >
      Phason elastic constant measurement by diffuse X-ray scattering: measure
      diffuse intensity around Bragg peaks in AlPdMn vs. AlMnSi. Compute κ_φ
      from diffuse scattering profile. Test: thermodynamically stable QCs have
      κ_φ > critical threshold — hardened against phason fluctuations while still
      maintaining configurational entropy advantage.

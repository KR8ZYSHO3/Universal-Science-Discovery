id: h-social-cognition-mentalizing-mirror-dissociation
title: >
  Social cognition uses two dissociable neural systems: a mentalizing network
  (mPFC, TPJ, posterior STS) for deliberate belief attribution and an action
  observation network (IFG, premotor cortex, STS) for automatic simulation of
  others' actions; their co-activation is domain-general intelligence, not a
  dedicated social brain.

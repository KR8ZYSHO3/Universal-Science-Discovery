proposed_tests:
  - description: >
      MVPA fMRI paradigm: classify brain activation patterns for social mentalizing,
      non-social reasoning, and physical prediction tasks. Test: are TPJ patterns
      linearly separable between social and non-social tasks using SVM classifier?
      Does autistic spectrum disorder disrupt only mentalizing network or both?
    prediction: "Cross-classification accuracy: TPJ patterns for social ≠ non-social >80%; ASD shows selective deficit in mentalizing network (d>0.8) vs preserved action observation network."

id: h-perovskite-degradation-ion-migration
title: >
  The dominant degradation mechanism limiting perovskite solar cell lifetime is halide
  ion migration driven by the built-in field and light-induced carrier gradients, which
  segregates I⁻ from Br⁻ at interfaces and forms local regions of high non-radiative
  recombination; suppressing ion migration through lattice rigidity at grain boundaries
  via 2D/3D passivation is the rate-limiting intervention for achieving >20-year lifetime.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-perovskite-stability-degradation
related_disciplines:
  - materials-science

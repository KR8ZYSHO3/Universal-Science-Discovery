evidence_links:
  - type: supporting
    doi: 10.1126/science.aah5583
    note: >
      Eames et al. (2015) — DFT calculation of I⁻ and MA⁺ migration barriers in MAPbI3;
      I⁻ activation energy ~0.6 eV consistent with observed ion migration timescales.
  - type: supporting
    doi: 10.1038/s41563-018-0094-5
    note: >
      Wang et al. (2019) — light-induced halide segregation in mixed-halide perovskites;
      Br-rich phases form at grain boundaries under illumination; reverses in dark.
  - type: related
    doi: 10.1021/acsenergylett.1c00157
    note: >
      Lin et al. (2021) — 2D/3D heterostructure perovskites; reduced halide migration
      at grain boundaries extends operational stability to 1000 hrs; mechanism identified
      as lattice rigidification.
proposed_tests:
  - discipline: materials-science
    description: >
      Prepare a series of MAPbI3 devices with systematically varied grain boundary
      passivation: bare, PEAI treatment, 2D Ruddlesden-Popper capping. Perform operando
      time-of-flight secondary ion mass spectrometry (ToF-SIMS) depth profiling under
      1-sun illumination and reverse bias. Track I/Br ratio spatial distribution over
      100 hours. Test whether I⁻ enrichment at the hole-transport interface correlates
      with Voc decay and whether 2D capping reduces migration velocity by >10x.
  - discipline: electrochemistry
    description: >
      Use impedance spectroscopy at varying temperatures (25-85°C) to extract apparent
      activation energies for ionic migration in the same device series. Test whether
      activation energy correlates with lattice rigidity (measured by Raman bond
      stiffness) and whether higher activation energy predicts slower PCE decay in
      accelerated lifetime testing (ISOS-L-2 85°C/85% RH).

proposed_tests:
  - description: >
      Run DMD on DNS slices of a boundary layer at increasing window lengths; measure reconstruction error vs
      time and flag spurious eigenvalues.
    method: Compare to Fourier/wavelet baselines; track mode pairing stability.
    prediction: Optimal window exists; too long mixes distinct branches, too short misses slow modes.


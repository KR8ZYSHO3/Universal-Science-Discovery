id: h-koopman-linear-dynamics-capture-coherent-structures-limited-window
title: >
  For short time windows, a low-rank DMD model captures dominant coherent structures in separated shear layers
  with bounded reconstruction error, but error grows superlinearly once nonlinearity transfers energy across
  resolved/unresolved scales — window length should be tuned to a Lyapunov-like decorrelation time of the
  resolved subspace.

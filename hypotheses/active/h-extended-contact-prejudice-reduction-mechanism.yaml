evidence_links:
  - doi: "10.1037/0022-3514.73.1.73"
    type: supporting
    confidence: 0.82
    note: >
      Wright et al. (1997) JPSP — extended contact effect: knowing ingroup member with
      outgroup friend reduces outgroup prejudice almost as strongly as direct contact;
      mechanism: norm updating (ingroup norms shift toward acceptance) not category knowledge
  - doi: "10.1037/0033-2909.132.6.951"
    type: supporting
    confidence: 0.84
    note: >
      Pettigrew & Tropp (2006) meta-analysis of 515 studies (N = 250,000+): contact
      reduces prejudice (d = -0.40); optimal conditions (Allport's criteria) more than
      double effect size; friendship quality is the strongest moderator
  - doi: "10.1016/j.jesp.2019.03.010"
    type: related
    confidence: 0.74
    note: >
      Paluck et al. (2019) — sociometric network intervention in NJ schools: placing
      social-norm-influential students in cross-group friendships spreads reduced
      prejudice to non-contact classmates through social influence; confirms network pathway
proposed_tests:
  - description: >
      Map full social network of entire school system (N = 5000+ students) over 3 years;
      measure cross-group tie density at Year 0; experimental intervention places
      high-centrality students in structured cross-group activities; test whether extended
      contact effects propagate through friendship paths length 1, 2, and 3.

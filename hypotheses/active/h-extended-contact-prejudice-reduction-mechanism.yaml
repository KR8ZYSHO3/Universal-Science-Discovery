id: h-extended-contact-prejudice-reduction-mechanism
title: >
  Intergroup contact reduces prejudice most reliably when it involves the extended
  contact effect (knowing an ingroup member who has an outgroup friend) rather than
  direct contact alone, and this effect scales with social network bridging ties in
  the community — making network density of cross-group ties a policy target for
  scaling prejudice reduction across diverse societies.

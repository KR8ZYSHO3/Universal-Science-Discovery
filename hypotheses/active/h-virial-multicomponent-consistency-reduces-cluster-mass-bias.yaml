id: h-virial-multicomponent-consistency-reduces-cluster-mass-bias
title: >
  Joint hydrostatic + lensing + velocity priors reduce cluster mass scatter compared with single-tracer virial scalings when feedback and merger states are marginalised — falsified if hierarchical posterior widths do not shrink relative to single-estimator pipelines on matched SZ+X-ray+weak-lensing cluster batches.
status: active
priority: medium
impact_score: 0.3
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1146/annurev.astro.45.051806.110602"
    type: related
    confidence: 0.52
    note: Multicomponent physics context for star formation and cluster hydrostatic complexities.
unknowns_addressed:
  - u-virial-cloud-cluster-multicomponent-bias
proposed_tests:
  - description: >
      Run hierarchical Bayesian population fits comparing single-tracer versus joint-tracer mass estimates with correlated systematic likelihoods.
    method: Monte Carlo sampling across published cluster datasets with documented selection functions.
    prediction: Posterior intrinsic scatter drops measurably when nonthermal pressure terms share informative priors across clusters.

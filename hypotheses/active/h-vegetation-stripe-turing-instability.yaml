id: h-vegetation-stripe-turing-instability
title: >
  Tiger bush vegetation stripe spacing in semiarid regions scales with the square
  root of the ratio of water diffusivity to plant growth rate as predicted by Turing
  reaction-diffusion theory, and stripe-to-gap pattern transitions precede
  catastrophic desertification tipping points by decades.
status: active
priority: medium
impact_score: 0.74
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - ecology
  - mathematics
  - climate-science
unknowns_addressed:
  - u-turing-pattern-selection-ecology
evidence_links:
  - doi: "10.1038/35078232"
    type: supporting
    confidence: 0.72
    note: >
      Klausmeier (1999) Turing model of vegetation patterns reproduces tiger bush
      stripe spacing and predicts stripe-to-gap transition with increasing aridity.
  - doi: "10.1098/rspb.2014.0767"
    type: supporting
    confidence: 0.68
    note: >
      Zelnik et al. (2015) show spatial pattern change (stripe to gap) precedes
      desertification tipping point; observed in Sahel satellite imagery.
proposed_tests:
  - description: >
      Remote sensing analysis of 30-year Landsat time series across ten tiger bush
      sites in Niger; measure stripe wavelength and pattern morphology annually;
      test whether spatial Fourier peak frequency matches Klausmeier model
      prediction using measured rainfall (proxy for water diffusivity parameter).

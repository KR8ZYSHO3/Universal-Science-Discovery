id: h-emergence-multiple-realisability-causal-autonomy
title: >
  Higher-level scientific explanations are causally autonomous (not merely
  convenient summaries) when the higher-level properties are multiply
  realisable by many distinct lower-level configurations — the same higher-
  level pattern has causal powers that cannot be predicted by tracking any
  particular lower-level realisation.
status: active
priority: medium
impact_score: 0.65
created: "2026-05-06"
last_updated: "2026-05-06"

evidence_links:
  - doi: "10.1007/s11229-009-9671-0"
    type: supporting
    confidence: 0.55
    note: >
      Fodor (1974, reprinted with commentary): multiple realisability of
      mental states across physical substrates as argument for autonomous
      psychology — the canonical formulation of the emergence-through-
      realisation argument.
  - doi: "10.1093/bjps/axp013"
    type: related
    confidence: 0.58
    note: >
      Mitchell (2009): integrative pluralism in biology — higher-level
      regularities (selection, fitness) require different explanatory
      resources than molecular biology; neither level is dispensable.
  - doi: "10.1007/s11229-013-0222-5"
    type: supporting
    confidence: 0.52
    note: >
      Batterman & Rice (2014) universality and minimal models: same
      macro-level regularities (renormalisation group fixed points) arise
      from very different micro-level mechanisms — a formal case for
      macro-level causal autonomy.
proposed_tests:
  - description: >
      Identify three candidate cases of multiply-realisable higher-level
      regularities in biology (e.g., metabolic scaling, morphogenetic
      patterns, behavioural homeostasis). In each case: (1) enumerate
      distinct lower-level realisers, (2) test whether the higher-level
      regularity persists across realisers, (3) test whether any lower-
      level realiser-specific variable predicts deviations from the higher-
      level regularity. If deviations are unpredicted by realiser, causal
      autonomy claim is supported.

id: h-johnson-graph-spectral-gap-predicts-ctqw-search-plateau
title: >
  For noisy CTQW spatial-search simulations on hardware-motivated irregular graphs, empirical hitting-time plateaus correlate with normalized Laplacian spectral gaps extracted from the connectivity adjacency — falsified if gap estimates explain less than 40% of variance across randomized disorder draws at fixed N.

id: h-surprisal-n400-mismatch-equivalence
title: >
  N400 ERP amplitude is a linear function of word surprisal (-log P(w | syntactic
  and semantic context)) computed by a hierarchical predictive model, controlling
  for word frequency, semantic plausibility, and cloze probability — and the slope
  of this linear relationship is modulated by precision (contextual predictability)
  in the same way that precision-weighting modulates prediction-error gain in
  Friston's free-energy framework

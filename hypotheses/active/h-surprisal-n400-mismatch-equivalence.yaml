evidence_links:
  - type: supporting
    doi: "10.1016/j.cognition.2007.05.006"
    note: >
      Levy (2008) Cognition — surprisal predicts reading times; establishes the
      basic relationship this hypothesis extends to ERP amplitude
  - type: supporting
    doi: "10.1017/S0140525X12000477"
    note: >
      Clark (2013) Behav Brain Sci — predictive coding framework motivating the
      precision-weighting modulation of prediction-error signals
  - type: related
    url: "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4165861/"
    note: >
      Frank et al. (2015) — EEG study showing surprisal predicts N400 amplitude in
      natural reading; partial support for this hypothesis without precision manipulation
  - type: contradicting
    url: "https://doi.org/10.1016/j.cognition.2020.104311"
    note: >
      Kutas & Federmeier (2020) — review arguing N400 reflects lexical access rather
      than prediction error per se; alternative interpretation that must be distinguished
proposed_tests:
  - summary: >
      Present participants with sentences varying in word surprisal (estimated from
      GPT-2 as proxy for human language model) in both high-predictability contexts
      (stereotyped sentences, high cloze) and low-predictability contexts (ambiguous
      sentences, low cloze). Measure N400 amplitude. Test: (a) does N400 scale
      linearly with surprisal within each context condition (slope test), and
      (b) is the slope steeper in high-predictability contexts (precision-weighting
      prediction)? A significant surprisal × context interaction with slope steeper
      in high-predictability condition would support the hypothesis; no interaction
      would falsify the precision-weighting component.
  - summary: >
      Pharmacological manipulation of norepinephrine (which modulates precision/gain
      in predictive coding models) via reboxetine (NET inhibitor) should increase
      N400 amplitude for high-surprisal words specifically, not uniformly across all
      words. Flat drug effect across surprisal levels would falsify the precision
      account of norepinephrine in syntactic processing.
  - summary: >
      Bilingual participants tested in L1 vs. L2: if precision is lower in L2
      (less reliable predictions), the N400-surprisal slope should be shallower
      in L2 than L1 at matched surprisal values from language-specific models.
      Equal slopes in L1 and L2 would falsify the precision-weighting prediction.

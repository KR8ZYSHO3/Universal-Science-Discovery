id: h-geostrophic-balance-climate-change
title: >
  Progressive weakening of geostrophic balance in mid-latitude atmospheric circulation
  due to Arctic amplification will shift the Northern Hemisphere jet stream toward
  a more meridional (wavy) configuration, measurable as increased Rossby wave
  amplitude in ERA5 reanalysis data since 1980.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
related_disciplines:
  - climate-science
  - atmospheric-science
  - mathematics
  - physics
unknowns_addressed:
  - u-rossby-wave-climate-tipping
evidence_links:
  - type: supporting
    doi: "10.1029/2012GL051000"
    note: >
      Francis & Vavrus (2012) Geophys Res Lett — evidence linking Arctic amplification
      to increased jet stream waviness and persistent weather patterns; original
      empirical claim for the mechanism.
  - type: supporting
    doi: "10.1038/nclimate3054"
    note: >
      Mann et al. (2017) found specific quasi-resonant amplification of Rossby waves
      linked to anthropogenic forcing — supporting the hypothesis that climate change
      is already increasing extreme weather frequency via jet stream dynamics.
  - type: contradicting
    doi: "10.1126/science.1252826"
    note: >
      Screen & Simmonds (2013) find limited statistical evidence for increased jet
      stream waviness in observations. Barnes (2013) Science challenges the Francis
      & Vavrus analysis; the observational evidence for increased waviness remains
      contested among climate scientists.
proposed_tests:
  - discipline: climate-science
    description: >
      Compute the Rossby wave amplitude index (deviation of 500 hPa geopotential
      height contours from zonal symmetry) from ERA5 reanalysis for 1940-2025.
      Apply spectral analysis to identify trends in specific wavenumbers (k = 4-7,
      corresponding to synoptic-scale Rossby waves). Test whether the trend in
      amplitude correlates with the Arctic Amplification Index (AAI) at p < 0.05
      with appropriate serial correlation corrections.
  - discipline: climate-science
    description: >
      Compare CMIP6 model ensembles with and without anthropogenic forcing (historical
      vs. pre-industrial control runs) for Rossby wave amplitude trends. Test whether
      models with stronger Arctic amplification show correspondingly larger increases
      in Rossby wave amplitude, establishing a model-level causal relationship between
      the two phenomena as predicted by the geostrophic balance weakening hypothesis.

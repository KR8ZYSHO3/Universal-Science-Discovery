id: h-fiscal-multiplier-credit-constraints
title: >
  The fiscal multiplier exceeds 1.5 during recessions when the central bank is
  at the zero lower bound and household credit constraints are binding, but falls
  below 0.5 during expansions — the state-dependent multiplier hypothesis is
  now supported by sufficient empirical evidence to be treated as established.
status: active
priority: high
impact_score: 0.72
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-multiplier-fiscal-policy
evidence_links:
  - type: supporting
    note: "Auerbach & Gorodnichenko (2012) state-dependent multiplier estimates: 2.5 in recession, 0.6 in expansion using smooth transition VAR"
    confidence: 0.75
  - type: supporting
    note: "Ramey & Zubairy (2018) defense spending multiplier 1.5 at ZLB vs 0.7 in normal times — consistent with state-dependence"
    confidence: 0.70
  - type: contradicting
    note: "Barro & Redlick (2011) wartime multiplier 0.4–0.7 regardless of state — disputes state-dependence at large scale"
    confidence: 0.65
proposed_tests:
  - description: >
      Cross-country panel LP (local projections) 1995–2023: estimate IRF of GDP
      to identified fiscal shocks (Blanchard-Perotti or narrative identification)
      stratified by: (1) ZLB proximity (shadow rate), (2) household debt-to-income,
      (3) output gap. Test triple interaction for state-dependent multiplier.
  - description: >
      US state-level natural experiment: exploit variation in federal transfers
      across US states from the 2009 ARRA, 2020 CARES Act, and 2021 ARP.
      Measure multiplier by credit access (by state bank concentration as proxy).
      States with higher credit constraints should show higher multipliers.
related_disciplines:
  - macroeconomics
  - fiscal-policy
  - monetary-economics

proposed_tests:
  - description: >
      Extend DICE-2016 with a Markov-jump process for tipping points calibrated
      to Lenton et al. (2018) probabilities (AMOC collapse, West Antarctic Ice
      Sheet, Amazon dieback). Solve stochastic HJB equation numerically. Compare
      optimal carbon price path under stochastic vs. deterministic DICE.
      Prediction: stochastic optimal price exceeds deterministic by 30-50% by 2050.
  - description: >
      Sensitivity analysis: vary tipping point probability estimates over their
      palaeoclimate-derived uncertainty range (2σ). Test whether the carbon
      price premium from tipping points persists (>20%) for the lower tail of
      tipping probability estimates.

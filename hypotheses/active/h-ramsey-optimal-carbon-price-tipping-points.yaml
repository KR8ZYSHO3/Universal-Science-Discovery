id: h-ramsey-optimal-carbon-price-tipping-points
title: >
  Incorporating stochastic climate tipping points into the DICE integrated
  assessment model raises the optimal Pigouvian carbon price by 30-50% above
  the Nordhaus deterministic baseline, converging the Nordhaus-Stern SCC gap
  by half when using empirically-calibrated tipping point probabilities.

id: h-healthcare-cost-baumol-technology-spiral
title: >
  Persistently rising healthcare costs result from the superposition of Baumol's
  cost disease (healthcare productivity growth lags economy-wide productivity,
  raising relative prices inevitably), technology-induced demand expansion (new
  treatments create new categories of treatable disease), and third-party payment
  moral hazard, with the dominant mechanism varying by healthcare system type.

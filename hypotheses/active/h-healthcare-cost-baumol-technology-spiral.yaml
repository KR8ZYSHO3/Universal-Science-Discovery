proposed_tests:
  - description: >
      Decomposition analysis: apply Baumol, Newhouse, and Arrow-Pratt moral hazard
      decompositions to OECD Health Statistics 1980-2020 (35 countries). Test: does
      Baumol residual (productivity gap) explain equal cost variance in both single-payer
      and multi-payer systems, but moral hazard term varies with copay levels?
    prediction: "Baumol component explains ~30% of cost growth in all systems; moral hazard component explains additional 20% in high-copay systems; technology adoption explains 35-40%."

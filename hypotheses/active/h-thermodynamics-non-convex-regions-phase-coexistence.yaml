id: h-thermodynamics-non-convex-regions-phase-coexistence
title: >
  Regions where the fundamental thermodynamic relation U(S,V,N) is locally concave
  (negative ∂²U/∂S² or ∂²U/∂V²) are thermodynamically unstable and correspond
  exactly to the spinodal decomposition region of the phase diagram — and the
  convex envelope of U predicts the Maxwell equal-area construction and coexistence
  curves without additional assumptions.
status: active
priority: medium
impact_score: 0.72
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:
  - note: "Callen (1985) — formal proof that convexity of U is equivalent to thermodynamic stability; concave regions are spinodal"
    type: supporting
    confidence: 0.95
  - note: "Rockafellar (1970) — convex envelope construction is the Legendre transform of the Legendre transform; gives the phase coexistence line"
    type: supporting
    confidence: 0.90
  - doi: "10.1103/PhysRev.106.620"
    type: related
    confidence: 0.80
    note: "Jaynes (1957) — maximum entropy formulation reproduces the same stability conditions from an information-theoretic perspective"

unknowns_addressed:
  - u-thermodynamics-convex-geometry-non-equilibrium

proposed_tests:
  - description: >
      Compute the fundamental equation U(S,V) for a van der Waals gas from its
      equation of state; identify the concave region analytically; compute the
      convex envelope using the Legendre-Fenchel double transform; compare the
      resulting phase boundary to the experimentally measured liquid-vapour
      coexistence curve for argon (well-characterised van der Waals fluid).
    method: "Analytical computation + comparison with NIST argon P-V-T data"
    prediction: "Convex envelope gives coexistence curve within 2% of experiment for reduced temperatures T_r = 0.7-0.95"
  - description: >
      Extend the convex analysis framework to a polymer blend (Flory-Huggins theory);
      compute the spinodal and binodal from the convex envelope of the Flory-Huggins
      mixing free energy; compare to cloud-point measurements in polystyrene/cyclohexane
      mixtures as a function of molecular weight.
    method: "Flory-Huggins numerical computation + cloud-point turbidimetry measurements"
    prediction: "Convex envelope spinodal differs from experimental cloud-point by < 5% in chi parameter; molecular weight scaling follows Flory prediction"


id: h-phage-therapy-combination-delays-resistance-evolution-eskape
title: >
  Phage-antibiotic combination therapy (PAC) will suppress resistance evolution
  in ESKAPE pathogens beyond either component alone ΓÇö because phage resistance
  mutations (receptor loss) restore antibiotic susceptibility via evolutionary
  trade-offs ΓÇö making PAC a self-sterilizing therapeutic strategy.
status: active
priority: high
impact_score: 0.82
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - type: supporting
    confidence: 0.75
    note: "Chan et al. (2016) Science Translational Medicine: phage-antibiotic strategy in P. aeruginosa ΓÇö phage resistance mutations in lipopolysaccharide restore colistin sensitivity; first demonstration of evolutionary trade-off exploitation"
  - type: supporting
    confidence: 0.70
    note: "Torres-Barcelo & Hochberg (2016): phage + antibiotic combinations show super-additive killing in multiple ESKAPE pathogens in vitro; phage sensitizes bacteria to antibiotics"
  - type: supporting
    confidence: 0.65
    note: "Schooley et al. (2017) Antimicrob Agents Chemother: first documented successful phage therapy for MDR Acinetobacter baumannii endocarditis ΓÇö combination with antibiotics was key to success"
  - type: contradicting
    confidence: 0.45
    note: "Phage-antibiotic synergy is not universal ΓÇö depends on specific phage-host pair and antibiotic mechanism; for some combinations, phage resistance does not restore antibiotic sensitivity"

unknowns_addressed:
  - u-antibiotic-resistance-evolution-rate-clinical-deployment

proposed_tests:
  - description: >
      Serial passage experiment with P. aeruginosa PAO1 under: (1) phage alone,
      (2) ciprofloxacin alone, (3) phage + ciprofloxacin (PAC). For each condition,
      track MIC evolution (ciprofloxacin and phage titer required to inhibit growth)
      over 20 serial passages. Whole-genome sequence resistant mutants to identify
      resistance mechanisms. Test whether phage-resistant mutants are ciprofloxacin-
      hypersensitive (evolutionary trade-off).
    method: "Serial passage in triplicate; MIC measurement every 5 passages; WGS of resistant isolates; competitive fitness assay of phage-resistant vs. WT in the presence of ciprofloxacin"
    prediction: "PAC maintains MIC < 2├ù starting MIC after 20 passages while ciprofloxacin alone reaches >32├ù MIC; >60% of phage-resistant mutants show ciprofloxacin MIC reduction of >4-fold; phage-resistant mutants are fitness-disadvantaged in antibiotic presence"


id: h-wealth-distribution-boltzmann-savings-propensity
title: >
  The shape of empirical wealth distributions (Boltzmann-Gibbs bulk + Pareto tail)
  can be predicted from two observable parameters—mean savings propensity lambda_mean
  and variance of returns-on-wealth sigma_r—through the Chakraborti-Chakrabarti model,
  with the Pareto exponent alpha = 1 + 1/(sigma_r^2 * T) where T is wealth per capita.
status: active
priority: medium
impact_score: 0.60
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - sociology
  - statistical-physics
  - economics
unknowns_addressed:
  - u-econophysics-wealth-distribution-mechanism
evidence_links:
  - doi: "10.1016/j.physa.2003.10.024"
    type: supporting
    confidence: 0.62
    note: >
      Chatterjee & Chakrabarti (2004) show that heterogeneous savings propensity
      generates Pareto-like distributions; gamma-distributed savings parameters
      produce power-law tails with the predicted exponent.
  - doi: "10.48550/arXiv.cond-mat/0010110"
    type: supporting
    confidence: 0.58
    note: >
      Bouchaud & Mezard (2000) show multiplicative wealth dynamics (returns
      proportional to wealth) produce Pareto distribution with alpha = 1 + r/sigma^2;
      consistent with the proposed two-parameter prediction.
proposed_tests:
  - description: >
      Using PSID (Panel Study of Income Dynamics) longitudinal data, estimate
      individual-level savings rates and investment return volatility for deciles;
      test whether the predicted Pareto exponent from the two-parameter formula
      matches the empirically measured exponent in the top 1% of each decile.

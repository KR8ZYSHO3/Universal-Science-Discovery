id: h-synthetic-insulator-retroactivity-control
title: >
  Phosphorylation-dephosphorylation futile cycle insulators can reduce retroactivity
  by > 90% in standard E. coli genetic circuit configurations while imposing < 15%
  metabolic overhead, making them practical for composing circuits of up to
  10 modules without significant dynamic interference.

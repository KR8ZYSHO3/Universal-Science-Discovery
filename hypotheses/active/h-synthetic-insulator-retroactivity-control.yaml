proposed_tests:
  - description: >
      Construct a toggle switch (upstream module) connected to a reporter
      (downstream load) with and without a phosphorylation-cycle insulator
      between them. Measure: (1) switching threshold shift due to load,
      (2) switching time, (3) bistability range reduction. Test whether
      insulator reduces all three perturbations by ≥ 90% as predicted by
      the retroactivity attenuation theory.
  - description: >
      Construct a 5-module genetic logic circuit (AND-NOT-OR-AND-NOT cascade)
      with and without insulators between each module. Compare the input-output
      logic table accuracy (fraction of correctly computed truth table entries)
      with and without insulators, testing whether insulation enables > 95%
      logic correctness versus < 60% without insulation.

evidence_links:
  - doi: "10.1037/0003-066X.61.1.25"
    type: supporting
    confidence: 0.70
    note: "Paulus & Nijstad (2003) - production blocking in brainstorming reduces group ideation below nominal group performance"
  - type: supporting
    confidence: 0.65
    note: "Page (2007) The Difference - cognitive diversity predicts group problem-solving performance beyond IQ"
  - type: related
    confidence: 0.60
    note: "Uzzi et al. (2013) Atypical Combinations in Science - teams combining distant knowledge domains produce breakthrough papers"
proposed_tests:
  - description: >
      Randomized experiment: assign participants (n=400) to individual, homogeneous
      group, or cognitively diverse group conditions. Measure divergent thinking
      (AUT), convergent thinking (RAT), and novel combination tasks. Manipulate
      psychological safety via facilitator instructions. Primary outcome: number of
      high-quality novel ideas judged by blind raters.
    prediction: "Diverse high-safety groups outperform individuals on divergent tasks; homogeneous groups underperform individuals."

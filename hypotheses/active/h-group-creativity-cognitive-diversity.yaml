id: h-group-creativity-cognitive-diversity
title: >
  Group creative output exceeds individual output when cognitive diversity is high
  and psychological safety is present, but falls below individual output when
  groups converge on a dominant idea (groupthink) or enforce conformity norms.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:

id: h-aftershock-clustering-inflates-sprt-false-alarm-rate-fixed-boundaries
title: >
  Holding Wald boundaries fixed, correlated aftershock waveforms increase the empirical weekly false-alert rate versus
  nominal α predicted under independence — requiring inflation factors ~2–5× (scenario-dependent) for regulatory parity.
status: active
priority: high
impact_score: 0.51
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR


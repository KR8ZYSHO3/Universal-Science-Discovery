proposed_tests:
  - description: >
      Replay aftershock-rich intervals (e.g., Ridgecrest sequence) through EEW scoring engines with synthetic thresholds;
      compare empirical alert clusters to Poisson null for independence.
    method: Hazard-style bootstrap on waveform archives.
    prediction: Clustering statistic rejects independence at p<0.01 for realistic tuning parameters.


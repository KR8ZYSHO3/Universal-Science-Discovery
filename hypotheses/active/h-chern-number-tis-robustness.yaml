proposed_tests:
  - discipline: condensed-matter-physics
    description: >
      Deposit controlled concentrations of non-magnetic (Au, Cu) and magnetic (Fe, Cr)
      adatoms onto Bi2Se3 surface by in-situ MBE. Measure surface state gap by STS
      as a function of impurity type and coverage. Test the Z2 prediction: non-magnetic
      impurities produce no gap regardless of coverage, while magnetic impurities open
      a gap proportional to the local exchange field.
  - discipline: mathematics
    description: >
      Calculate the Z2 invariant (parity of occupied Kramers doublets at 4 TRIM points)
      for Bi2Se3 with surface vacancy defects using DFT + Green's function methods.
      Vary defect density and type (non-magnetic vs. magnetic). Test whether the
      topological invariant remains well-defined and non-trivial until a threshold
      defect density that breaks effective time-reversal symmetry on the coherence length scale.

id: h-chern-number-tis-robustness
title: >
  The robustness of topological insulator surface states under non-magnetic perturbations
  is protected by a Z2 topological invariant that quantifies the parity of occupied
  Kramers doublets at time-reversal invariant momenta, and this protection breaks
  specifically when the perturbation locally breaks time-reversal symmetry at the surface
  on a length scale shorter than the Fermi wavelength.

id: h-rg-universality-neural-network-criticality
title: >
  Deep neural networks at the edge of chaos (criticality) exhibit renormalization
  group fixed-point behavior: representations across network layers correspond to
  RG flow toward an IR fixed point, and the universality class of the fixed point
  determines generalization capacity independent of architecture details.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"

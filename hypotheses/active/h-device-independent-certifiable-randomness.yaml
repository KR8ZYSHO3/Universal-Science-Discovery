proposed_tests:
  - description: >
      Implement a DIRE protocol combining a loophole-free Bell test (detection
      efficiency > 80%) with a classical randomness extractor (Trevisan extractor).
      Measure certified output randomness per trial (in bits) and compare to
      theoretical prediction. Test whether the certified rate exceeds the
      Toeplitz-hashing baseline achievable without Bell inequality verification.

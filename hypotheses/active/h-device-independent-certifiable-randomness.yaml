id: h-device-independent-certifiable-randomness
title: >
  Device-independent randomness expansion (DIRE) protocols based on loophole-free
  Bell inequality violations can certifiably generate unbounded true randomness
  from a short random seed, with the security guarantee holding against quantum
  adversaries — making quantum random number generation information-theoretically
  certifiable in principle, though current implementations are limited to
  kilobits per second by detection efficiency.

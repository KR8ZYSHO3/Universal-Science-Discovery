id: h-elasticity-analysis-conservation-prioritisation
title: >
  Elasticity analysis of the Leslie matrix (proportional sensitivity of λ₁ to
  vital rate changes) reliably identifies the life-history transition that most
  effectively increases population growth rate, and conservation interventions
  targeting high-elasticity stages will achieve faster population recovery
  than interventions targeting other stages, across a broad range of taxa
status: active
priority: high
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-leslie-matrix-density-dependence-extension
related_disciplines:
  - conservation-biology
  - population-biology
  - mathematics
evidence_links:
  - type: supporting
    confidence: 0.70
    note: "de Kroon et al. (1986) established elasticity analysis; comparative studies across plant and animal species (Silvertown et al. 1993) show consistent patterns: long-lived species have high elasticity on adult survival, short-lived on fecundity."
  - type: supporting
    confidence: 0.65
    note: "Recovery plans for loggerhead sea turtle (Crowder et al. 1994, Science) based on elasticity analysis showed adult survival had 3× higher elasticity than any other stage — correctly predicting that TEDs (turtle excluder devices) protecting adults would be more effective than nest protection."
  - type: contradicting
    confidence: 0.35
    note: "Elasticity analysis assumes linear Leslie matrix (density-independent rates); at low population sizes, density-dependent processes (Allee effects) can make fecundity-targeted interventions more effective than elasticity analysis predicts."
proposed_tests:
  - summary: >
      Meta-analysis of population recovery trajectories for species where conservation
      interventions targeted either high-elasticity or low-elasticity life stages
      (from published IUCN recovery plans); test whether populations targeting
      high-elasticity stages achieved faster λ₁ recovery within 10 years,
      controlling for intervention cost and implementation quality.

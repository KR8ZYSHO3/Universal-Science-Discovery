evidence_links:
  - type: supporting
    doi: 10.1353/lan.2001.0048
    note: >
      Himmelmann (2006) — documentary linguistics framework; naturalistic corpus
      essential for morphological and prosodic analysis; elicitation insufficient
      for discourse grammar.
  - type: supporting
    doi: 10.1017/S0022226720000043
    note: >
      Cohn et al. (2021) — computational tools (forced alignment, morphological analysers)
      trained on naturalistic speech outperform elicitation-trained tools on held-out
      naturalistic data from endangered languages.
  - type: related
    doi: 10.1353/lan.2007.0225
    note: >
      Bird & Simons (2003) — OLAC metadata standards; interoperability of endangered
      language archives requires standardised naturalistic corpus metadata.
proposed_tests:
  - discipline: linguistics
    description: >
      Select 10 endangered languages with both naturalistic corpus and systematic
      elicitation data. Train morphological analysers (UniMorph paradigm) separately
      on equal-hour samples of each type. Evaluate on held-out naturalistic text.
      Test whether naturalistic-trained analysers achieve significantly higher lemma
      accuracy (predicted >15% improvement) than elicitation-trained analysers.
  - discipline: computational-linguistics
    description: >
      Apply automatic prosodic boundary detection (using a universal prosodic model)
      to naturalistic vs. elicited speech from the same endangered language speakers.
      Measure boundary detection F1. Test whether naturalistic speech yields higher
      F1 than elicited speech for identifying clause and phrase boundaries, as predicted
      by the hypothesis that naturalistic prosody carries more boundary information.

id: h-endangered-language-documentation-multimedia
title: >
  Endangered language documentation for future research is maximised by prioritising
  multimedia naturalistic corpus collection (spontaneous discourse, narrative, and
  conversation) over formal elicitation, because computational linguistic analysis
  tools require naturalistic data for morphological discovery and prosodic reconstruction
  that formal elicitation systematically undersupplies.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-endangered-language-documentation-priority
related_disciplines:

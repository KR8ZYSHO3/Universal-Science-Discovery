id: h-social-media-depression-passive-consumption-mechanism
title: >
  Social media use causally increases depression and anxiety in adolescent
  girls primarily through passive consumption of appearance-related content
  triggering social comparison; active use (messaging, posting, creative
  content) has neutral or positive mental health effects, explaining
  heterogeneous results in earlier correlational studies.
status: active
priority: high
impact_score: 0.81
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - social-science
  - psychology
  - public-health
  - cognitive-science
unknowns_addressed:
  - u-social-media-mental-health-causality
evidence_links:
  - doi: "10.1007/s10802-019-00630-w"
    type: supporting
    confidence: 0.70
    note: >
      Valkenburg et al. (2021) 6-wave longitudinal study (N=2155 adolescents):
      passive scrolling predicts lower self-esteem at 6-month follow-up;
      active use (commenting, direct messaging) shows no negative effect.
  - doi: "10.1073/pnas.2022968118"
    type: supporting
    confidence: 0.72
    note: >
      Haidt & Allen (2020) review pre-registration of longitudinal studies;
      find passive consumption x appearance content interaction is the most
      consistently replicated pathway in pre-registered analyses (r ≈ -0.15).
  - doi: "10.1177/0956797617693315"
    type: related
    confidence: 0.55
    note: >
      Hunt et al. (2018) RCT limiting Facebook/Snapchat/Instagram to 10 min/day
      reduces loneliness and depression at 3 weeks; no distinction between
      passive vs. active use types.
proposed_tests:
  - description: >
      Experimental study: randomly assign 14-17 year-old participants to
      (1) passive-only condition (read-only feed, no posting/messaging),
      (2) active-only condition (posting, messaging, no scrolling feed), and
      (3) control (normal use). Measure PHQ-9 depression, Rosenberg self-
      esteem, and anxiety (GAD-7) at baseline, 4 weeks, and 8 weeks. Test:
      passive condition should show significantly higher PHQ-9 at follow-up
      vs. active and control; active should not differ from control (p<0.05).

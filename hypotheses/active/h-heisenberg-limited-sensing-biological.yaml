proposed_tests:
  - summary: >
      Measure the absolute sensitivity threshold for avian magnetic compass orientation
      and compare to the classical sensitivity limit for a protein-based radical pair
      sensor of the same size. If the biological threshold falls below the classical
      shot noise limit, quantum coherence is required and approaches Heisenberg scaling.
      This requires measuring geomagnetic field detection thresholds at the 1-10 nT scale.

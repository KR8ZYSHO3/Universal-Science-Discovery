proposed_tests:
  - description: >
      Survey 1000 enterprise IT security officers on their PQC migration timeline,
      current encryption inventory, and identified high-value long-term sensitive
      data. Cross-reference with public breach data to estimate current harvest risk.
      Test whether organizations with data requiring > 10-year confidentiality
      have begun PQC migration at higher rates than those with shorter requirements.

id: h-lattice-based-pqc-nist-transition-timeline
title: >
  NIST-standardized lattice-based post-quantum cryptographic algorithms
  (CRYSTALS-Kyber, CRYSTALS-Dilithium) will be deployed in > 50% of new TLS
  connections by 2028 and provide adequate security against harvest-now-
  decrypt-later attacks if migration begins by 2025, but systems with
  > 10-year confidentiality requirements are already at significant risk
  from data harvested before migration.
status: active
priority: critical
impact_score: 0.87

proposed_tests:
  - description: >
      Causal test: use optogenetic stimulation to vary frequency of PFC oscillator
      populations in mice during interval timing task (2-8 s). Test: does increasing
      oscillator frequency shorten perceived interval? Pharmacological test: L-DOPA
      administration should increase perceived duration (clock speed up).
    prediction: "10% increase in oscillator frequency shortens bisection point by ~8-12%; L-DOPA shifts temporal bisection point by >5% toward shorter perceived intervals."

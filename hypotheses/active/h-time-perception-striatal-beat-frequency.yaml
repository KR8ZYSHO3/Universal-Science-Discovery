id: h-time-perception-striatal-beat-frequency
title: >
  Subjective time perception is implemented by the striatal beat frequency (SBF)
  model: medium spiny neurons detect coincident firing patterns from a large population
  of cortical oscillators; the length of perceived intervals scales with the number
  of oscillators recruited, and dopamine modulates clock speed by shifting oscillator
  frequencies uniformly.
status: active
priority: medium

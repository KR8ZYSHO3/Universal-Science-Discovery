id: h-brokerage-advantage-diminishes-with-organizational-transparency
title: >
  Organizational digital communication platforms (Slack, email, collaboration tools)
  reduce brokerage advantages by making information flows visible and searchable —
  allowing non-brokers to access information previously monopolized by structural
  hole occupants — and this effect is measurable as a reduction in the performance
  premium for high-betweenness-centrality individuals.
status: active
priority: medium
impact_score: 0.69
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - type: supporting
    confidence: 0.62
    note: "Wu et al. (2021) Nature Human Behaviour: Microsoft remote work study shows that going remote (Teams) increased communication within groups but reduced cross-group bridging ties — consistent with reduced structural holes in digital communication"
  - type: supporting
    confidence: 0.58
    note: "Bernstein & Turban (2018) Phil Trans R Soc B: open office plans (intended to increase collaboration) actually reduced face-to-face interaction by 70% — digital tools and physical transparency have opposite effects"
  - type: supporting
    confidence: 0.55
    note: "Information searchability (company wikis, indexed email) reduces the value of being the person who 'knows people' — direct access to expertise reduces broker intermediation value"
  - type: contradicting
    confidence: 0.50
    note: "Digital platforms may create new structural holes at platform level (who has access to which Slack channels, who is in which email threads) — digital brokerage may replace physical brokerage rather than eliminate it"

unknowns_addressed:
  - u-structural-holes-dynamics-network-evolution-brokerage-persistence

proposed_tests:
  - description: >
      Natural experiment using staggered deployment of a new collaboration platform
      (Slack) across divisions of a large organization. Measure: (1) Network betweenness
      centrality from email/Slack communication graphs before and after deployment;
      (2) Individual performance ratings (from HR records); (3) Regression of
      performance on betweenness centrality before vs. after platform adoption.
      Test whether the performance-brokerage coefficient decreases post-adoption.
    method: "Staggered DiD design; email + Slack communication network construction; betweenness centrality; HR performance data; 2SLS with platform adoption timing as instrument"
    prediction: "Platform adoption reduces the betweenness centrality-to-performance coefficient by 20-40%; high-betweenness individuals show smaller performance premium post-adoption; information-seeking behavior shifts from person-to-person to platform-search"

related_disciplines:
  - organizational-behavior
  - network-science
  - management
  - sociology

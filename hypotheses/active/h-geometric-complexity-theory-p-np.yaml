proposed_tests:
  - description: >
      Computationally enumerate irreducible representations in the plethysm
      coefficients for small cases (n ≤ 20) comparing the permanent and determinant
      orbit closures. Determine whether "multiplicity obstructions" (weaker than
      occurrence obstructions) exist in cases where Bürgisser et al. showed
      no occurrence obstructions.
  - description: >
      Apply the Kronecker coefficient approach (alternative GCT strategy proposed
      by Ikenmeyer & Panova) to determine whether non-vanishing of specific
      Kronecker coefficients gives the necessary obstructions without requiring
      occurrence obstructions.

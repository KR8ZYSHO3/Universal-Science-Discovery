id: h-geometric-complexity-theory-p-np
title: >
  Geometric complexity theory requires the existence of representation-theoretic
  multiplicity obstructions in the coordinate ring comparison of the orbit closures
  of the permanent and determinant polynomials; if Bürgisser et al.'s negative
  result on occurrence obstructions is confirmed, GCT must be reformulated using
  stronger cohomological invariants to retain its viability as a P≠NP strategy.

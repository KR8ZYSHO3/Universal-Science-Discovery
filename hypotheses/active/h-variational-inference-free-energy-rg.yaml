proposed_tests:
  - description: >
      Apply Wilsonian renormalization group to a hierarchical VAE by computing how
      information propagates from fine-grained to coarse-grained latent variables;
      compare approximation error to a control non-hierarchical VAE on datasets with
      known multi-scale structure (natural images, protein sequences).
    method: "Compare ELBO, test log-likelihood, and posterior coverage (effective sample size) between RG-inspired hierarchical VAE and mean-field baseline"
    prediction: "RG-inspired hierarchical posterior reduces free energy gap by >20% on multi-scale datasets with identified relevant operators"
  - description: >
      Identify the phase transition in posterior approximation quality as a function
      of variational family expressiveness on a 2D Ising model posterior (known ground
      truth), measuring approximation error vs. temperature across the ferromagnetic
      transition.
    method: "Exact posterior computation for small Ising models vs. variational approximation; measure KL divergence as function of T near T_c"
    prediction: "Mean-field variational inference fails (KL divergence diverges) at T_c; hierarchical variational families maintain bounded KL error"

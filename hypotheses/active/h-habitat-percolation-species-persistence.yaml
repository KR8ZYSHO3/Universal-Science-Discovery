proposed_tests:
  - description: Extract habitat maps from high-resolution satellite imagery for forest-dependent species; measure patch size distribution as a function of habitat fraction and fit power-law exponent against 2D percolation prediction (tau = 2.05)
  - description: Correlate landscape connectivity index (percolation cluster size / total habitat) with observed occupancy rates of dispersal-limited species across fragmentation gradients
  - description: Test finite-size scaling collapse of connectivity data from landscapes of different total sizes to determine universality class membership

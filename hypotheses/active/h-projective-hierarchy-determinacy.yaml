id: h-projective-hierarchy-determinacy
title: >
  All projective sets of reals are Lebesgue measurable, have the Baire property,
  and have the perfect set property, assuming large cardinal axioms (at least
  infinitely many Woodin cardinals with a measurable above) — and these regularity
  properties cannot be proved from ZFC alone.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-descriptive-set-projective-hierarchy
evidence_links:
  - type: supporting
    note: "Martin & Steel (1989) projective determinacy from Woodin cardinals: PD follows from ω Woodin cardinals + measurable — implies all projective sets are regular"
    confidence: 0.90
  - type: supporting
    note: "Shelah (1984) ZFC non-measurable projective set: Cohen-forcing constructions produce non-measurable Σ^1_2 sets in ZFC alone — regularity independent of ZFC"
    confidence: 0.88
  - type: related
    note: "Woodin (1988) AD^L(R) from large cardinals: all L(R) sets are regular assuming large cardinals — extends beyond projective hierarchy"
    confidence: 0.85
proposed_tests:
  - description: >
      Formal proof verification: formalize Martin-Steel theorem in Lean 4
      or Isabelle/HOL, verifying the exact large cardinal hypothesis needed
      for each level of the projective hierarchy. Test: Σ^1_{2n+1} and Π^1_{2n+1}
      measurability follows from n Woodin cardinals. This would provide
      machine-verified bounds.
  - description: >
      Inner model theory application: construct the core model K below one
      Woodin cardinal. Test whether Σ^1_3 measurability holds in K — this
      tests the sharp boundary between provable and unprovable regularity
      in the projective hierarchy.

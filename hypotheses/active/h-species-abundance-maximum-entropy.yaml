id: h-species-abundance-maximum-entropy
title: >
  Species abundance distributions follow log-normal patterns because ecological
  communities are maximum-entropy distributions subject to constraints on total
  resource use and species number, and deviations from log-normality toward log-series
  distributions indicate communities dominated by stochastic colonisation-extinction
  dynamics rather than resource partitioning.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-species-abundance-distribution
related_disciplines:
  - ecology
  - mathematics
  - statistical-mechanics
  - information-theory
evidence_links:
  - type: supporting
    doi: 10.1890/07-1432.1
    note: >
      Harte et al. (2008) — Maximum Entropy Theory of Ecology (METE) derives SAD
      as the most probable distribution given area, species richness, and total abundance.
  - type: supporting
    doi: 10.1016/j.jtbi.2011.09.009
    note: >
      Frank (2011) — maximum entropy framework unifies log-normal and log-series SADs;
      the shape is determined by which constraints are imposed.
  - type: related
    doi: 10.1111/j.1461-0248.2007.01113.x
    note: >
      McGill et al. (2007) — review of 30+ SAD theories; empirical support for
      log-normal in large communities, log-series in low-richness island communities.
proposed_tests:
  - discipline: ecology
    description: >
      Compare METE-predicted SADs to empirical SADs across a gradient of habitat types:
      high-diversity tropical forest (resource partitioning expected, log-normal), island
      biogeography sites (colonisation-limited, log-series expected). Fit both maximum-
      entropy models and the log-series to each dataset using AIC. Test whether the
      METE transitions between log-normal and log-series as total abundance:richness
      ratio changes, as predicted.
  - discipline: information-theory
    description: >
      Derive analytically the maximum entropy distribution for community abundance
      under the specific constraint set (mean log-abundance, total abundance). Show
      that varying the Lagrange multiplier for mean log-abundance continuously
      interpolates between the log-series (minimum information) and log-normal (maximum
      information) limits. Test whether this interpolation fits empirical SADs better
      than either pure distribution across 100 community datasets.

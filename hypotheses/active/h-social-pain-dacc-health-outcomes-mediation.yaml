id: h-social-pain-dacc-health-outcomes-mediation
title: >
  The relationship between social isolation and mortality risk (Holt-Lunstad
  meta-analysis: OR ~ 1.29) is mediated by dACC-driven allostatic load —
  specifically, chronic social isolation increases dACC hyperreactivity to
  threat, elevating cortisol and inflammatory cytokines (IL-6, CRP) that
  drive cardiovascular and immune pathology.

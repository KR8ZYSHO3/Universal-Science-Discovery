proposed_tests:
  - description: >
      Prospective longitudinal fMRI study: measure dACC reactivity to social
      exclusion (Cyberball), circadian cortisol profile, IL-6, CRP, and
      social network size at baseline in n = 200 middle-aged adults.
      Follow for 5 years: test mediation model where baseline social network
      size → dACC reactivity → inflammatory markers → cardiovascular events.
    method: >
      fMRI + inflammatory biomarkers + 5-year cardiovascular event registry;
      structural equation modelling of mediation pathway; bootstrapped confidence
      intervals for indirect effect (social isolation → dACC → inflammation → outcomes)
    prediction: >
      Indirect effect (social isolation → dACC reactivity → IL-6 → CVD) accounts
      for ≥40% of total effect of social isolation on cardiovascular events;
      dACC reactivity beta = 0.25±0.08 (standardised) in mediation model.
  - description: >
      Randomised controlled trial of social prescribing intervention (group-based
      activities, n = 100 isolated older adults, vs. n = 100 attention controls):
      measure dACC reactivity (fMRI), IL-6 (blood), and self-reported loneliness
      at 0, 3, 6, 12 months.
    method: Parallel-group RCT; primary outcomes dACC reactivity and IL-6; pre-registered
    prediction: Intervention reduces dACC reactivity by 15-25% and IL-6 by 20-30% at 6 months

id: h-scaffold-routing-constraint-metrics-predict-origami-yield
title: >
  DNA origami designs with lower scaffold-routing dependency depth and fewer high-betweenness crossover bottlenecks will show higher assembly yield after controlling for staple melting temperature variance; falsified if graph metrics add less than 2 percent cross-validated explanatory power.
status: active
priority: medium
impact_score: 0.36
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1038/nature04586"
    type: related
    confidence: 0.45
    note: Rothemund (2006) DNA origami by scaffolded folding.
unknowns_addressed:
  - u-dna-origami-compiler-analogy-yield-prediction-limits
proposed_tests:
  - description: >
      Extract routing graphs from published origami designs, compute dependency-depth and bottleneck metrics, and regress measured yield against graph plus thermodynamic covariates.
    method: Curated metadata analysis with held-out design families.
    prediction: Graph metrics improve cross-validated R2 by >= 0.02.
related_disciplines:

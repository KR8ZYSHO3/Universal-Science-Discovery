id: h-arrow-impossibility-voting-nudges
title: >
  Behavioural nudges that alter the effective presentation order of policy alternatives
  exploit Arrow's independence-of-irrelevant-alternatives violations in human preference
  aggregation, and their cross-cultural failure rate is predicted by the degree of
  preference non-transitivity in each cultural context.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-behavioral-economics-policy-effectiveness
related_disciplines:
  - economics
  - social-choice-theory
  - political-science
  - psychology
evidence_links:
  - type: supporting
    doi: 10.1257/jel.54.1.5
    note: >
      Thaler & Sunstein (2008) review — default-option nudges violate IIA: changing
      the default alters choices independently of the choice set.
  - type: supporting
    doi: 10.1126/science.1116302
    note: >
      Ariely, Loewenstein & Prelec (2003) — arbitrary anchors affect willingness-to-pay;
      demonstrates IIA violations in real economic choices.
  - type: related
    doi: 10.1093/qje/qjt022
    note: >
      Chetty et al. (2014) — nudges in retirement savings show cross-context variation;
      cultural factors modulate effectiveness.
proposed_tests:
  - discipline: economics
    description: >
      Run a cross-national experiment (10+ countries) in which the same policy-choice
      nudge (default enrollment, social norm message, framing) is applied. Measure
      effect size per country. Separately elicit revealed preference transitivity
      violations for each sample. Test whether nudge effect size correlates with
      the prevalence of IIA violations (intransitive preferences) in each population.
  - discipline: political-science
    description: >
      Use electoral data from ranked-choice voting elections to estimate the frequency
      of IIA violations (Condorcet cycles) across countries. Cross-reference with
      published nudge replication success rates per country. Test the predicted
      positive correlation between Condorcet cycle frequency and nudge effect size.

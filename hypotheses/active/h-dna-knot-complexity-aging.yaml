id: h-dna-knot-complexity-aging
title: >
  DNA topological complexity (knot frequency and average crossing number) increases
  with cellular aging due to declining topoisomerase II activity, and the rate of
  topological complexity accumulation predicts replicative lifespan in model organisms.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: medium
related_disciplines:
  - biology
  - molecular-biology
  - mathematics
  - aging-biology
unknowns_addressed:
  - u-topoisomerase-knot-selection
evidence_links:
  - type: supporting
    doi: "10.1073/pnas.90.13.5307"
    note: >
      Rybenkov et al. (1993) established that topoisomerase II actively maintains
      below-equilibrium knot frequencies. If topoisomerase II activity declines with
      age (as documented for yeast), knot frequency should rise toward the equilibrium
      value — increasing topological stress.
  - type: supporting
    note: >
      Topoisomerase II alpha is a marker of cellular proliferation and its expression
      declines in senescent cells. Senescent cells also show signs of DNA damage
      response activation — consistent with unresolved topological entanglements
      triggering replication stress.
  - type: contradicting
    note: >
      The causal relationship between topological stress and aging could be reversed:
      aging causes replication stress (from other sources) which secondarily impairs
      topoisomerase activity. Distinguishing cause from effect requires experimental
      perturbation of topoisomerase activity in young cells.
proposed_tests:
  - discipline: molecular-biology
    description: >
      In S. cerevisiae, conditionally reduce Top2p (topoisomerase II) expression to
      50% of wild-type using a degron system. Measure DNA knot frequency in circular
      plasmids recovered at different points in the lifespan (number of divisions).
      Test whether reduced Top2p increases knot accumulation rate and whether knot
      accumulation rate correlates with shortened replicative lifespan compared to
      wild-type cells.
  - discipline: molecular-biology
    description: >
      Compare DNA knot distributions (from 2D gel electrophoresis of circular DNA
      extracted from cells) between young (passage 5) and senescent (passage 30)
      primary human fibroblasts. Test whether senescent cells show a higher frequency
      of knotted molecules or higher average crossing number per molecule.

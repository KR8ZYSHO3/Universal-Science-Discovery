proposed_tests:
  - discipline: materials-science
    description: >
      Synthesize Bi2Te3/Sb2Te3 superlattices with interface periodicities spanning
      1-20 nm by molecular beam epitaxy. Measure thermal conductivity (time-domain
      thermoreflectance) and electrical conductivity + Seebeck coefficient (Hall
      bar geometry) at 300K. Compute ZT for each periodicity. Hypothesis: ZT has
      a maximum at an interface period of 5±2 nm corresponding to matching the
      dominant acoustic phonon mean free path (~5 nm) while preserving electron
      coherence length (~10 nm), giving ZT > 2.5.
  - discipline: physics
    description: >
      Perform first-principles phonon Boltzmann transport equation calculations
      for Bi2Te3/Sb2Te3 superlattices at periodicities of 2, 5, 10, 20 nm.
      Compute the phonon transmission coefficient at each interface as a function
      of phonon frequency and wavevector. Hypothesis: the optimal ZT periodicity
      is quantitatively predicted by maximizing the difference between phonon
      and electron transmissions — confirmed if predicted optimum matches
      experimental optimum within 30%.

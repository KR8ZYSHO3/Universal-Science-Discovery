id: h-phonon-glass-electron-crystal-zt-optimization
title: >
  The phonon glass-electron crystal (PGEC) design strategy — maximizing ZT by
  engineering phonon mean free path distributions via nanostructured interfaces
  while maintaining electron coherence — can achieve ZT > 3 at room temperature
  in layered chalcogenide superlattices with optimized interface periodicity.

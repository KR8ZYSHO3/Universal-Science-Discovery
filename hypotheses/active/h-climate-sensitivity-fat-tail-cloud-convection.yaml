id: h-climate-sensitivity-fat-tail-cloud-convection
title: >
  The long upper tail of equilibrium climate sensitivity (ECS > 5°C) is
  driven primarily by the nonlinear response of marine low-cloud cover to
  SST warming — specifically the break-up of stratocumulus decks in the
  subtropical subsidence regions above a threshold SST of ~28°C.
status: active
priority: high
impact_score: 0.85
created: "2026-05-06"

evidence_links:
  - doi: "10.1038/s41561-019-0310-1"
    type: supporting
    confidence: 0.68
    note: >
      Schneider et al. (2019) show LES-based parameterisation of stratocumulus
      breakup produces bifurcation in global climate model; runaway ECS > 5°C
      possible if marine low clouds are sensitive enough to SST.
  - doi: "10.1175/JCLI-D-12-00555.1"
    type: supporting
    confidence: 0.60
    note: >
      Sherwood et al. (2014) show lower tropospheric mixing as key constraint
      on ECS; models with realistic mixing have ECS 2.0-4.6°C; poor mixing
      models yield high ECS values.
  - doi: "10.1126/science.aas9734"
    type: related
    confidence: 0.72
    note: >
      Zelinka et al. (2020) show CMIP6 high ECS models are driven by stronger
      positive low-cloud feedback; emergent constraint analysis narrows ECS
      to 2.6-3.9°C at 66% confidence.
proposed_tests:
  - description: >
      Run large-eddy simulations (LES) at high resolution for subtropical
      stratocumulus under +2°C, +4°C, and +6°C SST perturbations with
      realistic SST gradients. Test: does cloud fraction decrease sharply
      above a threshold SST (nonlinear), implying a bifurcation point, or
      linearly? Nonlinear response would confirm the fat-tail mechanism.

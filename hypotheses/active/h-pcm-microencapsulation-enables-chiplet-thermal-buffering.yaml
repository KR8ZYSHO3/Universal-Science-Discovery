proposed_tests:
  - description: Fabricate test vehicles with microencapsulated paraffin PCM layers (50-100 μm) between die and heatspreader; measure T_junction during square-wave power transients (0.1–10 Hz) at 3× and 5× steady-state power; compare to baseline without PCM
  - description: Model PCM melting front propagation with enthalpy method (finite element) for chiplet geometry; validate against calorimetric measurements of latent heat storage capacity; predict maximum transient duration that can be buffered as a function of PCM volume fraction

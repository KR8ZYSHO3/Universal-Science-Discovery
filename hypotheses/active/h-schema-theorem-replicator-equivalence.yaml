evidence_links:
  - type: supporting
    doi: 10.1162/evco.2001.9.2.131
    note: >
      Vose (2001) — rigorous infinite-population GA convergence to selection-only
      dynamical system; formal connection to replicator equation established.
  - type: supporting
    doi: 10.1007/BF00175353
    note: >
      Goldberg & Deb (1991) — tournament selection in GAs satisfies Fisher's
      fundamental theorem; fitness variance determines adaptation rate.
  - type: related
    doi: 10.1002/j.1538-7305.1988.tb00958.x
    note: >
      Holland (1975) — schema theorem; short, high-fitness, low-order schemata
      proliferate at exponential rate — equivalent to replicator dynamics.
proposed_tests:
  - discipline: computer-science
    description: >
      Implement a standard GA on an NK landscape for N=50, K=0-10 and record schema
      frequency trajectories for all schemata of order 1-3 over 1000 generations.
      Simultaneously integrate the corresponding replicator ODEs with the same fitness
      function and initial frequencies. Compute the L2 error between GA trajectories
      and replicator ODEs as a function of population size. Test whether the error
      decreases as O(1/sqrt(N)) as predicted by the infinite-population convergence theorem.
  - discipline: mathematics
    description: >
      Prove (or provide a formal counterexample to) the proposition that the GA selection
      operator with crossover and zero mutation converges to the replicator equation
      when crossover probability approaches zero. This would formally establish the
      GA-replicator equivalence at the level of rigorous mathematics.

id: h-schema-theorem-replicator-equivalence
title: >
  The schema theorem of genetic algorithms converges to the continuous-time replicator
  dynamics of evolutionary game theory in the infinite-population limit: the growth
  rate of a schema's frequency is exactly the difference between its fitness and the
  mean population fitness, making GAs a discretised numerical integrator of replicator ODEs.

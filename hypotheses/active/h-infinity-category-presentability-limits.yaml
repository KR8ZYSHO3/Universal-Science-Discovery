id: h-infinity-category-presentability-limits
title: >
  An ∞-category has all small limits and colimits if and only if it is bicomplete,
  and presentable ∞-categories (locally small, accessible, cocomplete) have all
  limits by an adjoint functor theorem generalization — the theory of presentable
  ∞-categories provides the correct framework for derived algebraic geometry and
  higher topos theory.

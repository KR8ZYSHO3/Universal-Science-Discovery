proposed_tests:
  - description: >
      Formalization in HoTT: formalize the adjoint functor theorem for presentable
      ∞-categories in Agda/HoTT. Verify that the existence proof for limits from
      cocompleteness + accessibility does not require extra axioms beyond univalence.
  - description: >
      Application benchmark: compute the ∞-categorical limit of the cosimplicial
      diagram of chain complexes in a specific example (e.g., de Rham complex of
      a simplicial set). Compare to classical model category computation. Test:
      ∞-categorical limit agrees with classical computation in all cohomological
      degrees — validating the Lurie framework.

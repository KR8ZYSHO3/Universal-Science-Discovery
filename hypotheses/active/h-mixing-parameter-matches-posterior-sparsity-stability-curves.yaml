id: h-mixing-parameter-matches-posterior-sparsity-stability-curves
title: >
  In correlated-design simulations, elastic-net settings expressed as Laplace-Gaussian prior-scale ratios will produce smoother sparsity-stability curves than raw l1_ratio grids; falsified if bootstrap selection instability is unchanged across equivalent predictive error bands.
status: active
priority: medium
impact_score: 0.35
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:

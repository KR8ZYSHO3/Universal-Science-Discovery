    type: related
    confidence: 0.45
    note: Zou and Hastie (2005) elastic net.
unknowns_addressed:
  - u-elastic-net-prior-calibration-under-correlated-designs
proposed_tests:
  - description: >
      Simulate grouped correlated predictors; compare raw l1_ratio tuning against prior-scale-ratio grids on predictive error and bootstrap selection stability.
    method: Seeded benchmark across correlation, signal sparsity, and noise regimes.
    prediction: Prior-scale grids reduce selection-instability variance by >= 15 percent within one-standard-error predictive bands.

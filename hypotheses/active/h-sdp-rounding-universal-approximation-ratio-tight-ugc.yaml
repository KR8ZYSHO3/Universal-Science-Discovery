id: h-sdp-rounding-universal-approximation-ratio-tight-ugc
title: >
  The Goemans-Williamson SDP + randomized hyperplane rounding framework is
  universally optimal for constraint satisfaction problems (CSPs) under the
  Unique Games Conjecture: for every 2-variable CSP, the approximation ratio
  achievable by the basic SDP is tight — i.e., no polynomial-time algorithm
  can improve the SDP ratio by more than ε without violating UGC.
status: active
priority: medium

proposed_tests:
  - description: >
      Compute the SDP integrality gap (ratio of SDP optimum to true OPT) for
      MAX-CUT on random d-regular graphs for d = 3, 5, 10, 50; compare to
      the Parisi constant (which is the true large-d limit from the replica method)
      to test whether GW exactly achieves the SDP integrality gap at each degree.
    method: "Interior-point SDP solver (MOSEK) + branch-and-bound for exact MAX-CUT on n ≤ 50 graphs; statistical comparison of gap distributions over 10⁴ random instances"
    prediction: "SDP integrality gap converges to 0.878 for random regular graphs, with variance decreasing as 1/n; this confirms GW rounding exactly achieves the SDP bound and no combinatorial improvement exists"
  - description: >
      Test UGC hardness empirically: solve unique game instances on structured
      graphs (expanders, trees, planar graphs) using the best known sub-exponential
      algorithm (Arora-Barak-Steurer 2010) and measure the empirical approximation
      ratio achieved as a function of n; compare to GW's 0.878 for MAX-CUT
      instances derived from those unique game instances.
    method: "ABS algorithm implementation + MAX-CUT benchmark on Biq Mac library; timing and approximation ratio measurement for n = 100 to 10,000"
    prediction: "ABS algorithm achieves approximation ratio > 0.878 on MAX-CUT instances derived from near-unique-game graphs with efficiently solvable structure, providing a conditional refutation of UGC for expanding graphs"


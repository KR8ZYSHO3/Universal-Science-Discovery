id: h-mpc-with-ngm-constraints-reduces-epidemic-overshoot
title: >
  Adaptive intervention policies that explicitly constrain projected NGM spectral radius reduce incidence
  overshoot versus threshold-only trigger rules under equal intervention budgets.
status: active
priority: high
impact_score: 0.69
created: "2026-05-08"
last_updated: "2026-05-08"
author: USDR

evidence_links:
  - doi: "10.1007/BF00178324"
    type: related
    confidence: 0.51
    note: "Provides operator framework for structured transmission-gain interpretation."

unknowns_addressed:
  - u-epidemic-mpc-next-generation-matrix-robustness

proposed_tests:
  - description: >
      Replay multi-wave outbreak datasets with delayed/noisy observations; compare peak incidence and
      cumulative intervention intensity for NGM-constrained MPC vs scalar-threshold policies.
    method: Data-assimilative compartmental simulation with policy optimization in the loop.
    prediction: NGM-constrained MPC lowers peak incidence by >=12% without higher total intervention burden.

related_disciplines:
  - epidemiology
  - control-engineering
  - network-science

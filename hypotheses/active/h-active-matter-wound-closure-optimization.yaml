id: h-active-matter-wound-closure-optimization
title: >
  Wound closure rate is maximized when the epithelial tissue operates near the
  solid-to-fluid jamming transition, because near-jammed tissues have maximal
  mechanical coupling between cells (enabling coordinated force generation) while
  retaining sufficient fluidity for migration, predicting that pharmacological
  modulation of cell-cell adhesion toward the jamming point improves wound closure.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - cell-biology
  - biophysics
  - active-matter-physics
unknowns_addressed:

evidence_links:
  - doi: "10.1016/j.cell.2011.05.014"
    type: supporting
    confidence: 0.68
    note: >
      Trepat et al. (2011) measure traction forces during wound healing; show
      long-range mechanical coupling through epithelial sheet, consistent with
      near-jamming cooperative migration.
  - doi: "10.1038/nphys4380"
    type: supporting
    confidence: 0.72
    note: >
      Park et al. (2015) show epithelial tissues undergo jamming transition; cells
      near the glass transition point show maximum collective motility, supporting
      the jamming point hypothesis.
proposed_tests:
  - description: >
      Wound healing scratch assay in MDCK cells; titrate E-cadherin blocking
      antibody to tune cell-cell adhesion; measure wound closure rate and correlate
      with cell shape parameter q (jamming order parameter); test whether maximum
      closure rate occurs at q = q_c = 3.81 (jamming transition) rather than at
      fully jammed or fully unjammed state.

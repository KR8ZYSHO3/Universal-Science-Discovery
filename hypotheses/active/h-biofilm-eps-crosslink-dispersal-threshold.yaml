proposed_tests:
  - description: >
      Grow P. aeruginosa PA01 biofilms for 48 h in a flow cell. Apply 10 nM dispersin B for 30 min
      at wall shear stress 0.1 Pa. Measure G' by oscillatory rheology before and after treatment.
      Simultaneously quantify biofilm coverage by confocal microscopy (SYTO9 staining).
      Vary dispersin B concentration 1–100 nM to establish dose-response of G' reduction and detachment.
    method: "Oscillatory rheology in parallel plate geometry + confocal microscopy; dose-response design"
    prediction: "10 nM dispersin B reduces G' by > 90% and causes > 80% detachment; Kelvin-Voigt yield stress falls below 0.1 Pa at this concentration"

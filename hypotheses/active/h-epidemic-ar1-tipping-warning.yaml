proposed_tests:
  - description: "Compute rolling-window AR1 and variance in weekly malaria incidence from WHO surveillance records in 5 high-endemic African countries with documented climate anomalies (1990-2024); test whether AR1 rises >6 months before documented epidemic surge years relative to non-surge years"
    falsifiable: true
    expected_result: "AR1 rises significantly (p<0.05) in the 6-month window before epidemic surge; effect is stronger in years with concurrent heat/drought anomaly"

proposed_tests:
  - summary: >
      Identify a local Hamiltonian with known phase transition (e.g., transverse-field Ising model
      in 2D) and measure the correlation between (a) spectral gap above ground state and (b)
      the classical simulation cost (bond dimension needed for DMRG to reach 99% fidelity).
      The hypothesis predicts that systems near the quantum phase transition (small gap) require
      exponentially larger bond dimension.

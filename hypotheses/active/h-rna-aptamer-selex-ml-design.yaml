id: h-rna-aptamer-selex-ml-design
title: >
  RNA aptamer binding affinity and selectivity are governed by three physical principles
  — shape complementarity, charge complementarity, and base-stacking interactions —
  that can be parameterized from SELEX-seq data to train structure-conditioned language
  models that design novel high-affinity aptamers (K_d < 10 nM) with 50× less
  experimental screening than conventional SELEX.
status: active
created: "2026-05-06"

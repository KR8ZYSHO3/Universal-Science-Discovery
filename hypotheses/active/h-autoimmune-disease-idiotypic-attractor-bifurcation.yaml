id: h-autoimmune-disease-idiotypic-attractor-bifurcation
title: >
  Autoimmune diseases represent bifurcations of the idiotypic network to pathological
  attractors where self-reactive clones are stabilised by mutual idiotypic stimulation,
  and this bifurcation is detectable as a qualitative change in BCR repertoire
  network topology before clinical symptom onset
status: active
priority: high
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-idiotypic-network-clinical-validation
related_disciplines:
  - immunology
  - network-science
  - systems-biology
evidence_links:
  - type: supporting
    confidence: 0.40
    note: "Studies of pre-clinical lupus (anti-dsDNA antibodies appear 3–9 years before diagnosis; Arbuckle et al. 2003 NEJM) show the immune network shifts toward autoimmune attractors before overt disease — consistent with attractor theory."
  - type: supporting
    confidence: 0.35
    note: "BCR repertoire studies in rheumatoid arthritis (RA) show expanded clonotypes and reduced diversity before joint inflammation — potentially reflecting network bifurcation, though idiotypic connectivity is not yet measured."
  - type: contradicting
    confidence: 0.55
    note: "Idiotypic regulation has not been experimentally demonstrated to be a major mechanistic force in human autoimmunity; most current models focus on antigen-driven T-cell help and regulatory T-cell breakdown rather than idiotypic network dynamics."
proposed_tests:
  - summary: >
      Longitudinal BCR-seq cohort study of individuals with high genetic risk for
      autoimmunity (HLA-DQ8, HLA-DR4 for T1D; HLA-DR4 for RA); construct
      idiotypic network graphs at 6-month intervals; test whether network
      topology metrics (modularity, hub concentration, path length) change
      qualitatively in individuals who develop disease vs. matched controls
      who remain healthy, using topological data analysis.

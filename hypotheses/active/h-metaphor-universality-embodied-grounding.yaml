evidence_links:
  - type: supporting
    doi: 10.1016/j.cognition.2009.09.008
    note: >
      Lakoff & Johnson (1980) — conceptual metaphor theory; structural metaphors
      organized by universal bodily experience; cultural variation is predicted
      but not empirically tested cross-linguistically.
  - type: supporting
    doi: 10.1073/pnas.1004844107
    note: >
      Regier et al. (2010) PNAS — universals and variation in color naming;
      method for separating universal from culturally-specific semantic categories
      applicable to metaphor research.
proposed_tests:
  - discipline: linguistics
    description: >
      Extract word embeddings from Wikipedia text in 50 typologically diverse
      languages. For each language, compute cosine similarity between translation
      equivalents of 50 embodied metaphor pairs (HAPPY-UP, ANGRY-HOT) and 50
      culture-specific metaphor pairs (TIME-MONEY, DEBATE-COMBAT). Hypothesis:
      embodied metaphor cosine similarities are higher and less variable across
      languages (coefficient of variation < 0.2) than culture-specific metaphors
      (CV > 0.5), with the difference persisting after controlling for frequency.

id: h-metaphor-universality-embodied-grounding
title: >
  Conceptual metaphors grounded in universal embodied experiences (UP=GOOD, WARM=FRIENDLY,
  BRIGHT=KNOWN) are cross-linguistically universal, while metaphors grounded in
  culturally specific experiences (TIME=MONEY, ARGUMENT=WAR) vary across languages,
  and this distinction is detectable in the correlational structure of translation
  equivalents across 100+ languages.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"

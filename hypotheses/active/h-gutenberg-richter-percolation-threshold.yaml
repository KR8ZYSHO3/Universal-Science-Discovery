id: h-gutenberg-richter-percolation-threshold
title: >
  The universal Gutenberg-Richter b-value of 1 is a direct consequence of earthquake
  fault networks self-organizing to the percolation critical point, and b-value
  deviations should predict large-earthquake occurrence probability via percolation
  cluster statistics.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.82
related_disciplines:
  - seismology
  - statistical-physics
  - geophysics
unknowns_addressed:
  - u-earthquake-nucleation
evidence_links:
  - type: supporting
    doi: "10.1029/95JB01091"
    note: "Sornette & Sammis (1995) - critical exponents from RG theory of earthquakes; b=1 from percolation exponent"
  - type: supporting
    doi: "10.1029/92JB01381"
    note: "Main (1992) - damage mechanics model; power-law statistics derived from percolation framework"
  - type: contradicting
    note: >
      Some volcanic and induced seismicity sequences show b-values of 1.5–2.5 without
      obvious departure from percolation criticality; the model must explain non-unity
      b-values without ad hoc modifications.
proposed_tests:
  - description: >
      Extract fault connectivity graphs from 3D seismicity catalogs (Southern California,
      Japan) at multiple spatial resolutions. Compute percolation order parameter (size
      of largest connected fault cluster / total cluster count) vs. seismic moment.
      Test whether b-value correlates with proximity to percolation threshold across
      tectonic regions and before/after large earthquakes.
  - description: >
      Before magnitude M≥6 earthquakes in dense seismic networks, test whether the
      local b-value decrease (observed in foreshock sequences) predicts percolation
      threshold crossing more accurately than existing early-warning metrics.

id: h-minority-game-quasispecies-duality
title: "The minority game disordered-to-ordered transition and the quasispecies error threshold are dual descriptions of the same information-theoretic phase transition, with shared critical exponents"
status: active
created: "2026-05-05"
priority: medium
impact_score: 0.72

evidence_links:
  - type: supporting
    doi: "10.1103/PhysRevE.65.026126"
    note: "Manrubia & Zanette (2002) PRE - explicit mapping of MG to quasispecies shows shared critical structure"
  - type: supporting
    doi: "10.1016/S0378-4371(97)00419-6"
    note: "Challet & Zhang (1997) - MG phase transition at alpha_c analogous to error threshold"
  - type: supporting
    note: "Both systems: ordered phase = information-poor (single dominant type); disordered phase = information-rich distribution; transition = information-theoretic capacity limit"

proposed_tests:
  - description: "Compute the mutual information between consecutive MG outcomes in the ordered and disordered phases; compare to mutual information between quasispecies genome compositions above and below error threshold"
  - description: "Measure the critical exponent of fluctuations in both the MG (using agent simulations) and quasispecies (Eigen model simulations); test for equality of gamma within measurement error"
  - description: "Design a laboratory evolution experiment where sequence space is constrained (small genome) and mutation rate is varied; test for a sharp error-threshold transition analogous to MG alpha_c transition"

unknowns_addressed:
  - u-minority-game-market-microstructure-universality

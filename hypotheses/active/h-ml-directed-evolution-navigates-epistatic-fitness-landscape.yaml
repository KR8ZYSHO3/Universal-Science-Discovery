id: h-ml-directed-evolution-navigates-epistatic-fitness-landscape
title: >
  Machine learning models trained on deep mutational scanning (DMS) data can predict
  the fitness of multi-mutation combinations with accuracy sufficient to identify
  the global fitness maximum in a protein landscape with up to 5 simultaneous
  mutations, replacing 3-5 rounds of directed evolution with a single round of
  computational screening.

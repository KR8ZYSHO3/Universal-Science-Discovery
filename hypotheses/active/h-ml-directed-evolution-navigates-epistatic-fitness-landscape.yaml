proposed_tests:
  - description: >
      Benchmark the performance of six ML models (ESM-1v, EVmutation, Tranception,
      ProteinMPNN+AF2, Graph Transformer, Gaussian Process) for predicting the fitness
      of double, triple, and quadruple mutant combinations in three proteins with DMS
      data across all single mutants: TEM-1 β-lactamase (antibiotic resistance),
      GFP (fluorescence), and GB1 (binding). Measure Spearman ρ correlation as a
      function of mutation order and epistasis index (fraction of double mutants with
      |Δ fitness| > 2× sum of single effects).
    method: "Train each model on all single-mutant DMS data; predict all double-mutants; evaluate against measured double-mutant fitness; compute Spearman ρ and precision@top1% for each model and protein"
    prediction: "Best ML model achieves Spearman ρ ≥ 0.55 for double mutants and ≥ 0.40 for triple mutants in at least 2 of 3 proteins; accuracy correlates inversely with measured epistasis index (ρ decreases ~0.1 per 0.1 increase in epistasis fraction)"
  - description: >
      Design a prospective directed evolution experiment where ML model predictions
      (Gaussian Process trained on first-round DMS data) are used to select the
      experimental library for round 2, and compare the fitness of the selected library
      to: (a) random library of same size, and (b) full exhaustive screening of
      all single and double mutants. Test whether ML-guided selection achieves ≥80%
      of the exhaustive screening maximum fitness using only 1% of the screening effort.
    method: "TEM-1 β-lactamase: first round single-mutant DMS (all 2960 variants); train GP model; select top 300 predicted double/triple mutants; screen all 300 experimentally; compare peak fitness to full combinatorial library"
    prediction: "ML-selected library contains the global fitness maximum with probability ≥ 70% (vs. 0.1% for random selection); requires only 300/300,000 variants screened — 1000× reduction in experimental effort"


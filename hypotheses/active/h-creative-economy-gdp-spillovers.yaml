id: h-creative-economy-gdp-spillovers
title: >
  Creative industries generate measurable innovation spillovers to adjacent
  manufacturing and tech sectors through labor mobility and cross-sector knowledge
  transfer, but their GDP contribution is systematically underestimated by
  satellite account methodologies that miss intangible asset creation.
status: active
priority: medium
impact_score: 0.60
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-creative-economy-measurement
evidence_links:
  - type: supporting
    note: "DCMS (2023) UK Creative Industries satellite account estimates £116bn GVA, but excludes design embedded in manufacturing"
    confidence: 0.65
  - type: related
    note: "Lindelof & Lofgren (2020) Silicon Valley firms hiring from creative industries show higher patent productivity — labor mobility channel"
    confidence: 0.55
  - type: related
    note: "Corrado et al. (2009) intangible capital accounts show creative assets constitute ~20% of business investment in OECD economies"
    confidence: 0.70
proposed_tests:
  - description: >
      Construct a creative economy input-output table for 10 OECD countries using
      harmonized ISIC 4 creative sector definitions. Compute backward and forward
      linkage multipliers. Test H0: creative sector multipliers ≤ manufacturing
      multipliers. Reject H0 at p<0.05 if creative multiplier > 1.5× manufacturing.
  - description: >
      Linked employer-employee panel study: track workers who transition from
      creative to manufacturing or tech firms (and vice versa) over 10 years.
      Measure patent productivity, product innovation rates, and firm productivity
      before/after creative-sector hire. Identify the spillover effect size via DiD.
related_disciplines:
  - economics
  - innovation-studies
  - national-accounting

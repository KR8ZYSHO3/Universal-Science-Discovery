proposed_tests:
  - description: >
      Cholesterol depletion titration (0-80% methyl-β-cyclodextrin treatment) with
      simultaneous single-molecule tracking of GPI-anchored GFP and EGF receptor.
      Quantify cluster size distribution vs. cholesterol level. Prediction: cluster size
      follows a power law near the critical cholesterol concentration, with diverging
      correlation length — a signature of 2D phase transition criticality.
  - description: >
      Optogenetic control of membrane cholesterol synthesis in live cells during EGF
      stimulation. Measure ERK phosphorylation (downstream signaling) as function of
      cholesterol level and receptor density. If rafts causally enhance signaling:
      ERK response should peak near critical cholesterol concentration and decrease
      above and below it.

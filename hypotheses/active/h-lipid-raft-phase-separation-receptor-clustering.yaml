id: h-lipid-raft-phase-separation-receptor-clustering
title: >
  Lipid raft phase separation concentrates GPI-anchored proteins and receptor tyrosine
  kinases into signaling-competent nanoclusters, with raft lifetime and size controlled
  by the 2D Cahn-Hilliard free energy parameters — specifically, cholesterol concentration
  sets the proximity to the phase boundary.

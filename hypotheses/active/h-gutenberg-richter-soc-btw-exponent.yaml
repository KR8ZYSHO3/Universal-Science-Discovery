id: h-gutenberg-richter-soc-btw-exponent
title: >
  The Gutenberg-Richter energy exponent τ ≈ 1.67 belongs to the interface
  depinning universality class rather than the BTW sandpile class (τ = 3/2),
  reflecting that fault rupture is driven by a threshold-crossing front
  on a heterogeneous stress field rather than a conservative redistribution rule.

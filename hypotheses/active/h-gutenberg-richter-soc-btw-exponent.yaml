proposed_tests:
  - description: >
      Compute the avalanche exponent from high-resolution seismic catalogues
      (Southern California Seismic Network: M ≥ 1.0, N > 10^6 events) using
      maximum-likelihood power-law fitting. Compare τ to theoretical predictions:
      BTW (1.50), directed percolation (1.5–1.7), interface depinning (1.28–1.56 by dimension).
    type: data_analysis
  - description: >
      Laboratory acoustic emission experiments on Carrara marble under triaxial
      loading: measure τ as a function of loading rate, confining pressure, and
      sample size. Test whether τ remains at 1.67 ± 0.05 (suggesting robustness
      of universality class) or shifts with loading conditions.
    type: experiment

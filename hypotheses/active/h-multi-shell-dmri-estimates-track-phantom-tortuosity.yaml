id: h-multi-shell-dmri-estimates-track-phantom-tortuosity
title: >
  In porous phantoms with independently measured tortuosity, multi-shell diffusion MRI models will rank-order effective tortuosity with Spearman rho at least 0.7 after correcting for orientation dispersion; falsified if rankings are indistinguishable from single-shell ADC.
status: active
priority: medium
impact_score: 0.48
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1016/S0006-3495(94)80775-1"
    type: related
    confidence: 0.45
    note: Basser, Mattiello and LeBihan (1994) diffusion tensor MRI framework.
unknowns_addressed:
  - u-dmri-tortuosity-effective-medium-identifiability
proposed_tests:
  - description: >
      Scan calibrated porous phantoms with single- and multi-shell protocols; compare inferred tortuosity rankings against independent fluid-transport measurements.
    method: Phantom validation with preregistered model comparison.
    prediction: Multi-shell rank correlation rho >= 0.7 and better than single-shell ADC by >= 0.15.
related_disciplines:
  - medical-imaging
  - physics

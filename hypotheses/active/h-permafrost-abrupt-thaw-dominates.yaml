id: h-permafrost-abrupt-thaw-dominates
title: >
  Abrupt thermokarst processes (retrogressive thaw slumps, abrupt lake drainage)
  contribute more than 50% of total permafrost carbon release to the atmosphere
  by 2100, despite affecting less than 5% of permafrost area, because of their
  disproportionate rate of deep carbon mobilization.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.85
related_disciplines:
  - climate-science
  - geoscience
  - biogeochemistry
  - cryosphere-science
unknowns_addressed:
  - u-permafrost-thaw-subsidence
evidence_links:
  - type: supporting
    note: >
      Turetsky et al. (2020, Nature Geoscience) estimated that abrupt thaw processes
      could double previous permafrost carbon feedback estimates by releasing old (>10 ka)
      deep carbon unavailable to gradual thaw, potentially adding 60–100 Pg C by 2100.
  - type: supporting
    note: >
      Retrogressive thaw slumps have increased in area by 60% in Northwest Canada
      since 1984 (Lantuit & Pollard 2008); their carbon flux per unit area exceeds
      gradual thaw by 10–100x due to deep exposure.
  - type: contradicting
    note: >
      The fraction of abruptly thawed carbon that is actually labile (vs. recalcitrant
      old organic matter) is uncertain; some studies show 50–70% of old permafrost
      carbon is slowly decomposable only on century timescales even when exposed.
proposed_tests:
  - description: >
      Deploy flux towers and chamber measurements at active thermokarst slumps in
      Siberia and Alaska alongside paired stable permafrost sites. Compare carbon
      flux (CO2 + CH4) per unit area over 3-year periods. Scale to estimated global
      thermokarst area to test the 50% contribution hypothesis.
  - description: >
      Carbon-14 dating of CO2 emitted from thermokarst slumps vs. gradual thaw sites.
      Deep (Pleistocene-age) carbon will have depleted 14C. If abrupt thaw dominates
      deep carbon release, thermokarst sites should show significantly older CO2 than
      gradual thaw sites, testable with atmospheric 14CO2 flux partitioning.

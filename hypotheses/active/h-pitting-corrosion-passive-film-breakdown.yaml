id: h-pitting-corrosion-passive-film-breakdown
title: >
  Passive film breakdown initiating pitting corrosion occurs through halide
  ion adsorption-induced dissolution of the outermost oxide layer at surface
  defect sites (grain boundaries, MnS inclusions), creating a local pH drop
  that prevents repassivation — the metastable pit threshold potential E_pit
  is set by the MnS inclusion dissolution kinetics, not the oxide film itself.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-corrosion-mechanism-passivation
evidence_links:
  - type: supporting
    note: "Suter et al. (2001) in situ STM of stainless steel passive film in Cl⁻: film thins locally at MnS inclusions — 10× dissolution rate vs. matrix"
    confidence: 0.78
  - type: supporting
    note: "Ryan et al. (2002) MnS dissolution in 0.1M NaCl: local pH drop to <2 at 10μm scale — prevents repassivation below E_pit"
    confidence: 0.75
  - type: related
    note: "Frankel (1998) pitting corrosion review: metastable pit statistics follow Gumbel extreme value distribution — consistent with defect nucleation model"
    confidence: 0.72
proposed_tests:
  - description: >
      Focused ion beam + TEM cross-section of pre-pitting stainless steel
      in Cl⁻ solution: image passive film at MnS/matrix interface before and
      5 min after E = E_pit application. Test: film thinning occurs at MnS
      interface in 100% of 20 samples — confirms nucleation site model.
  - description: >
      MnS-free 316L steel (Ca-treated, ultra-clean): measure E_pit distribution
      in 0.1M NaCl. Compare to standard 316L. Test: E_pit shifts >100 mV noble
      in MnS-free steel — confirms MnS as primary nucleation site.

id: h-fisher-speed-limit-selection
title: >
  Artificial selection responses across taxa saturate the Fisher-information
  speed limit V_A within 10%, and departures from saturation are predicted
  by the ratio of genetic drift (Ne) to selection intensity — confirming
  that natural selection is information-geometrically near-optimal in large
  populations and drift-limited in small ones.
status: active
created: "2026-05-04"
last_updated: "2026-05-04"
priority: high
related_disciplines:
  - evolutionary-biology

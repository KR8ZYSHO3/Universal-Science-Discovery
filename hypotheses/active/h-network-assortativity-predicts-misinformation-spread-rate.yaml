id: h-network-assortativity-predicts-misinformation-spread-rate
title: >
  The assortativity coefficient of political belief networks quantitatively predicts
  the within-community vs between-community information spread rate ratio, such that
  networks with assortativity r > 0.5 show misinformation spreading 10× faster within
  communities than between, creating measurable belief divergence within 30 days.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"

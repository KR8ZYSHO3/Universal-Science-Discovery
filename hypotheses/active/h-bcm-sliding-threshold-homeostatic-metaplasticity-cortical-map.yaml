id: h-bcm-sliding-threshold-homeostatic-metaplasticity-cortical-map
title: >
  The BCM sliding modification threshold θ_M implements homeostatic metaplasticity
  in vivo, and visual cortex deprivation (monocular deprivation) lowers θ_M in
  deprived-eye columns within 48 hours — enabling adult plasticity rescue by
  pharmacologically reducing θ_M via mGluR5 blockade or trkB agonism.
status: active
priority: high
impact_score: 0.78
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-stdp-natural-stimuli-in-vivo-plasticity-rules
evidence_links:
  - type: supporting
    note: "Kirkwood et al. (1996) Science 272:1518 — monocular deprivation shifts LTP/LTD crossover point in visual cortex slices in the direction predicted by BCM: deprived-eye inputs show lower threshold for LTP (θ_M decrease), consistent with sliding threshold"
    confidence: 0.82
  - type: supporting
    note: "Bear (2003) Neuron 38:743 — review of BCM predictions and experimental support: θ_M slides with average postsynaptic activity measured over hours to days; pharmacological reduction of activity (TTX to deprived eye) mimics deprivation-induced plasticity"
    confidence: 0.79
  - type: supporting
    note: "Bhanu et al. (2019) Nat Med — mGluR5 positive allosteric modulator increases LTP expression in adult amblyopic rats; consistent with lowering θ_M to restore LTP at deprived-eye synapses"
    confidence: 0.70
  - type: contradicting
    note: "Synaptic scaling (Turrigiano 2008) provides an alternative homeostatic mechanism (scaling all synapses multiplicatively) that could explain some BCM predictions without a sliding threshold — distinguishing BCM from synaptic scaling requires precise measurement of selectivity (BCM: multiplicative at LTP-LTD crossover; scaling: proportional everywhere)"
    confidence: 0.55
proposed_tests:
  - description: >
      In vivo two-photon calcium imaging of L2/3 pyramidal neurons in mouse V1
      during 3 days of monocular deprivation (MD). Measure mean activity ⟨xᵢ²⟩
      daily in open-eye vs. closed-eye responsive columns. BCM prediction: closed-eye
      column activity decreases → θ_M decreases → LTP threshold lowers. Test: after
      MD, present closed-eye stimuli at 3 intensities and measure the modification
      threshold by comparing LTP vs. LTD induction probability with theta-burst
      stimulation. BCM predicts the crossover point shifts to lower stimulus intensity
      in MD animals vs. controls by a predictable amount based on the measured ⟨xᵢ²⟩ change.
  - description: >
      Chronic mGluR5 positive allosteric modulator (VU0409551) administration to
      adult (P90) monocularly deprived mice (3-week MD starting P30). Measure
      amblyopia depth by VEP acuity before and after drug treatment. BCM prediction:
      if mGluR5 PAM shifts θ_M downward by enhancing mGluR5-mediated LTD-to-LTP
      crossover, adult amblyopia rescue will require drug administration during a
      window of 2-4 weeks (time for new connections to strengthen) and will produce
      partial recovery (not full normal visual acuity) because θ_M adjustment is
      bounded.

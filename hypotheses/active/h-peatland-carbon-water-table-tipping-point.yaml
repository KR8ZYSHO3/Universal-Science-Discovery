id: h-peatland-carbon-water-table-tipping-point
title: >
  Tropical and boreal peatland carbon vulnerability is controlled by a
  nonlinear water table threshold: drainage below 30-40 cm triggers
  aerobic decomposition that transforms peatlands from carbon sinks to
  sources, releasing up to 5 Pg C per 1°C of warming in vulnerable peatlands
  when combined with fire.
status: active
priority: high
impact_score: 0.79

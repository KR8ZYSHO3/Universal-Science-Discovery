evidence_links:
  - doi: "10.1038/s41558-019-0394-3"
    type: supporting
    confidence: 0.70
    note: >
      Dargie et al. (2019) and Huissteden (2020): Congo Basin peatlands store
      29 Pg C; drainage experiments show CO2 flux doubles when water table drops
      below 30 cm and CO2/CH4 ratio shifts dramatically above the aerobic/
      anaerobic transition.
  - doi: "10.1126/sciadv.aaw4295"
    type: supporting
    confidence: 0.65
    note: >
      Ribeiro et al. (2021) synthesis: tropical peatland fire events driven by
      El Niño droughts release 0.2-2.1 Pg C per event in Indonesian peatlands
      alone; water table decline below 40 cm is the ignition predictor.
  - doi: "10.1038/s41586-019-1462-y"
    type: related
    confidence: 0.62
    note: >
      Turetsky et al. (2019) review permafrost peat: thaw-lake expansion and
      thermokarst formation release ancient peat carbon; water table changes
      drive CH4 vs CO2 balance.
proposed_tests:
  - description: >
      Establish a network of water table wells and CO2/CH4 flux chambers in
      a stratified sample of tropical (Indonesia, Congo), boreal (Canada,
      Siberia), and temperate (UK, Ireland) peatlands. Monitor at daily
      resolution for 3+ years including natural drought years. Test:
      does CO2 efflux increase nonlinearly (step function) below a water table
      threshold of 30-40 cm, or is the response linear throughout?

proposed_tests:
  - description: >
      Compare Fano factors of identical reporter genes integrated at the same
      chromosomal locus in E. coli strains isolated from high-variance (soil
      with antibiotic exposure) vs. low-variance (stable gut) environments.
      Measure single-cell fluorescence distributions by flow cytometry; extract
      F and burst size b by fitting the Beta-binomial compound Poisson model.
      Correlate F with temporal variance of nutrient/antibiotic concentrations
      in the source environment estimated from metagenomic time series.
    method: "Single-cell fluorescence + flow cytometry + maximum likelihood Beta-binomial fitting"
    prediction: "F_soil >> F_gut for stress-response promoters; no difference for housekeeping genes"
  - description: >
      Synthetic noise engineering: design a library of promoter variants with
      programmed Fano factors spanning F = 1 to F = 50 (by tuning TATA box and
      -35 spacing to adjust k_on/k_off). Compete each variant against F=1
      control in fluctuating antibiotic environments with known temporal variance.
      Test whether the winning variant's F matches the Kelly-criterion prediction.
    method: "Competitive fitness assay (barcoded strains) in chemostat with programmed antibiotic fluctuations"
    prediction: "Winning F = (1 + CV²_env)/2 where CV_env is the environmental coefficient of variation"


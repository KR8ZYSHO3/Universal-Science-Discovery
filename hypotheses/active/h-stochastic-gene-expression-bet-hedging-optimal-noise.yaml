id: h-stochastic-gene-expression-bet-hedging-optimal-noise
title: >
  The Fano factor of fitness-relevant bacterial promoters is tuned by natural
  selection to match the temporal variance of their ecological environment —
  specifically, promoters controlling stress-response genes in high-variance
  environments will exhibit significantly higher Fano factors than orthologous
  promoters in stable environments, with the optimal F predicted by the Kelly
  criterion applied to the environmental power spectrum.

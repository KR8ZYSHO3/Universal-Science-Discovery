id: h-krugman-bifurcation-detectable-moran-i-trajectory
title: >
  The Krugman core-periphery bifurcation produces a detectable early-warning
  signature in the time series of Moran's I spatial autocorrelation coefficient
  — specifically, critical slowing down (increasing lag-1 autocorrelation of
  Moran's I) and increasing variance of Moran's I — preceding regional income
  divergence events by 3-5 years.

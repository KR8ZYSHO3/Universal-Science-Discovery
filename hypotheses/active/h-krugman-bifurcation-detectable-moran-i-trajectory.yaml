proposed_tests:
  - description: >
      Compute annual Moran's I for NUTS-3 EU regional GDP per capita (1990-2023,
      Eurostat ARDECO database). Compute lag-1 autocorrelation (AR1) and variance
      of Moran's I using a 10-year rolling window. Test for increasing AR1 and
      variance in the 3-5 years preceding identified divergence episodes
      (2000-2003 Eastern enlargement, 2008-2013 post-crisis divergence, 2020-2022 COVID).
    method: >
      Moran's I time series + rolling window AR1 estimation + Kendall tau test
      for trend; bootstrap confidence intervals for significance
    prediction: >
      Kendall tau > 0.4 (positive trend in AR1) and tau > 0.3 (positive trend in
      variance) in pre-divergence windows; not present in stable or convergence periods.
  - description: >
      Cross-national replication using US county-level income data (BEA Regional
      Economic Accounts, 1969-2023) testing for early-warning signals preceding
      the post-2000 divergence between coastal metros and rural hinterlands.
    method: "Same rolling-window Moran's I AR1 test; spatial weight matrix: queen contiguity"
    prediction: Detectable early warning 2-4 years before the ~2005 divergence inflection

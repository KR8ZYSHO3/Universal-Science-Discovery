id: h-rational-cryptography-blockchain-nash
title: >
  Bitcoin mining with selfish mining strategy is a Nash equilibrium for all pool
  sizes above 25% hashrate, and the game-theoretic security threshold is lower
  than the computational security threshold of 51%

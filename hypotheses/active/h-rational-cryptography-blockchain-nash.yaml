proposed_tests:
  - description: >
      Construct a complete game-theoretic model of Bitcoin mining with selfish
      mining strategies for N = 2, 3, ..., 10 pools; compute Nash equilibria for
      all hashrate distributions; determine the minimum hashrate threshold alpha*
      above which selfish mining strictly dominates honest mining.
    method: "Stochastic game formulation; linear programming for equilibrium computation; Monte Carlo simulation for finite-time horizon; cross-validation with Sapirshtein et al."
    prediction: "Selfish mining Nash equilibrium threshold is alpha* = 0.25 (25%); below 25% honest mining is Nash equilibrium; above 25% selfish mining dominates"
  - description: >
      Test whether the game-theoretic and computational security thresholds diverge
      in proof-of-stake protocols (Ethereum, Cardano) by computing Nash equilibria
      for stake-weighted voting games and comparing to the 33% BFT threshold.
    method: "Ethereum validator game model with stake distribution from on-chain data; Nash equilibrium analysis for validator coalitions; compare 25% Nash threshold to 33% Casper FFG threshold"
    prediction: "PoS protocols have game-theoretic security threshold at 33% stake matching the BFT threshold (unlike Bitcoin's 25% game-theory vs 51% computational gap)"

proposed_tests:
  - description: >
      Prospective RCT with endotype stratification: use 7-gene assay (SRS classifier)
      at ICU admission; randomize SRS1 and SRS2 patients independently to corticosteroid
      vs placebo. Primary outcome: 28-day mortality within each endotype.
    prediction: "Steroids reduce mortality in SRS2 (OR~0.6) but increase mortality in SRS1 (OR~1.4); interaction p<0.01; endotype×treatment interaction replicates in 3 independent cohorts."

id: h-sepsis-endotype-genomic-immunophenotype
title: >
  Sepsis comprises at least two reproducible genomic endotypes (SRS1: immunosuppressed,
  higher mortality; SRS2: immunoactivated, lower mortality) identifiable from whole-
  blood transcriptomics within 24h of admission, with differential response to
  corticosteroids: steroids harm SRS1 patients by further suppressing immunity and
  benefit SRS2 by reducing hyperinflammation.

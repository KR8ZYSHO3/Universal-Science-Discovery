id: h-cortical-eigenmodes-universal-resting-state-basis
title: >
  The first 200 eigenmodes of the human connectome structural Laplacian form a universal
  basis for representing all resting-state fMRI functional connectivity patterns, with
  individual differences in cognitive ability and psychiatric symptoms encoded in eigenmode
  amplitude coefficients rather than in raw connectivity matrices.

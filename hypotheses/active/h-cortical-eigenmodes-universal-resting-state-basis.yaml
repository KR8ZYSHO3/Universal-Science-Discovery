proposed_tests:
  - description: >
      HCP dataset (n=1000): decompose each subject's resting-state fMRI into connectome
      eigenmodes. Predict fluid intelligence (Gf) scores from eigenmode amplitude
      coefficients using cross-validated ridge regression. Compare prediction accuracy
      to raw connectivity matrix predictors. Prediction: eigenmode coefficients achieve
      ≥95% of raw connectivity predictive accuracy with 10× fewer features.
  - description: >
      Schizophrenia case-control (n=200 each): test whether schizophrenia is associated
      with specific eigenmode amplitude abnormalities (predicted: low-frequency modes
      corresponding to default mode and frontoparietal networks) vs. high-frequency
      modes. Neural field theory predicts schizophrenia involves E-I imbalance that
      selectively disrupts high-k modes.

id: h-thorium-msr-achieves-baseload-carbon-free-power-lower-waste
title: >
  Thorium molten salt reactors (MSR) can achieve economically competitive baseload
  power generation with lifecycle carbon emissions < 15 gCO₂/kWh, nuclear waste
  radiotoxicity returning to natural uranium levels within 300 years, and passive
  safety features that eliminate the need for active emergency cooling systems.
status: active
priority: high
impact_score: 0.79
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - type: supporting
    confidence: 0.72
    note: "Oak Ridge MSRE (1965-1969) demonstrated thorium-cycle MSR operation at 8 MW for 15,000 hours — proof of concept for molten salt technology and ²³³U breeding"
  - type: supporting
    confidence: 0.68
    note: "Macpherson (1985) review: MSR has strongly negative temperature coefficient (Doppler broadening + salt expansion) → inherent passive safety; no high-pressure vessel → no steam explosion risk"
  - type: supporting
    confidence: 0.65
    note: "Moir & Teller (2005): thorium fuel cycle produces 1000x less transuranic waste than uranium cycle; ²³³U cannot be used in weapons without ²³²U contamination (γ-emitting from decay chain) making diversion impractical"
  - type: contradicting
    confidence: 0.50
    note: "On-line reprocessing of molten salt fuel (removing fission products, adding ²³²Th) requires handling highly radioactive fluoride salt at 600°C — materials challenges (corrosion-resistant structural materials at high temperature and radiation dose) not yet solved at commercial scale"

unknowns_addressed:
  - u-nuclear-waste-transmutation-accelerator-driven-systems

proposed_tests:
  - description: >
      Instrumented loop experiment: circulate irradiated FLiBe (fluoride-lithium-beryllium)
      salt containing ²³²ThF₄ and fission products at 650°C for 5000 hours in an
      Hastelloy-N vessel. Measure: corrosion rate (mass loss, surface analysis by
      XPS/SEM), tritium production and permeation, off-gas composition, salt chemistry
      stability. Test whether corrosion rates are below the 50 μm/year threshold
      for 30-year commercial operation.
    method: "Small loop (MSRX type); inductively coupled plasma analysis of dissolved metals; tritium monitoring; periodic salt sampling for fission product speciation"
    prediction: "Hastelloy-N corrosion rate < 50 μm/year at 650°C with irradiated salt; tritium permeation below regulatory limit with SiC diffusion barrier; salt chemistry stable over 5000 hours without offline reprocessing"

related_disciplines:

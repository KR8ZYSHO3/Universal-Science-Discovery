id: h-topological-qubit-fault-tolerance-threshold
title: >
  Topological qubits based on Majorana zero modes will achieve fault-tolerance
  thresholds 10–100× higher than superconducting or trapped-ion qubits due to
  non-local encoding of quantum information, making them the dominant platform
  for large-scale fault-tolerant quantum computation
status: active
priority: high
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-majorana-zero-mode-experimental-confirmation
related_disciplines:
  - quantum-computing
  - condensed-matter-physics
  - quantum-error-correction
evidence_links:
  - type: supporting
    confidence: 0.45
    note: "Theoretical predictions (Kitaev 2003; Nayak et al. 2008 Rev. Mod. Phys.) show topological protection should yield logical error rates exponentially suppressed in system size for ideal MZMs."
  - type: contradicting
    confidence: 0.55
    note: "Experimental MZM signatures remain unconfirmed (retracted claims, Andreev bound state confusion). Without a demonstrated qubit, fault-tolerance advantage is purely theoretical."
  - type: contradicting
    confidence: 0.40
    note: "Surface codes on superconducting qubits (Google Sycamore, IBM Eagle) have achieved below-threshold physical error rates (0.1–0.5%) without requiring exotic topological materials."
proposed_tests:
  - summary: >
      Demonstrate non-Abelian exchange statistics by physically braiding two MZMs in a
      T-junction geometry and verifying that the resulting unitary operation is consistent
      with the Ising anyon braiding matrix — this is the minimal experimental demonstration
      required to validate the topological qubit concept.

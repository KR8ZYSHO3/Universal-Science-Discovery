proposed_tests:
  - description: >
      Apply augmented Dickey-Fuller and KPSS tests to wealth share time series
      for 20+ countries over 1900–2020 (Piketty-Saez-Zucman World Inequality Database).
      Test whether top-1% wealth shares above 35% show significantly less
      mean-reversion (higher AR(1) coefficient, lower Dickey-Fuller statistic)
      than shares below 35%, consistent with a tipping point at that threshold.

id: h-wealth-concentration-tipping-point-inequality
title: >
  Economic inequality crosses a self-reinforcing tipping point when the
  top-1% wealth share exceeds ~35% (corresponding to Gini coefficient > 0.6
  for wealth), at which point political capture of tax and regulatory policy
  locks in further concentration — a positive feedback loop detectable as
  a change from mean-reverting to unit-root dynamics in wealth share time series.

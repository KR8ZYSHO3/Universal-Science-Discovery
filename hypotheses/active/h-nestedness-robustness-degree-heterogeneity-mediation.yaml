proposed_tests:
  - description: >
      Monte Carlo rewiring: for 50 empirical mutualistic networks, generate 1000 null
      networks with identical degree sequence but varying NODF nestedness scores.
      Measure robustness (sequential extinction simulation) vs nestedness at fixed degree.
      Partial correlation controlling for degree heterogeneity.
    prediction: "Partial correlation of nestedness with robustness (controlling for degree CV) is r<0.15 and non-significant; degree CV explains >80% of robustness variation."

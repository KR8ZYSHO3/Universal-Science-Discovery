id: h-nestedness-robustness-degree-heterogeneity-mediation
title: >
  The robustness benefit of nestedness in mutualistic networks is fully mediated by
  degree heterogeneity: highly nested networks are more robust only because nestedness
  is mathematically correlated with degree heterogeneity, and when degree sequence is
  held constant via configuration model null models, nestedness provides no additional
  robustness beyond what degree heterogeneity predicts.

proposed_tests:
  - description: >
      For a set of 10 well-documented Greenland outlet glaciers with known calving rates, terminus thickness,
      and meltwater pond depth (from aerial/satellite surveys), compute K_I using the Weertman hydrofracture
      model and compare predicted calving flux to observed ice volume discharge.
    method: "LEFM K_I calculation from DEM-derived terminus geometry + observed calving flux comparison"
    prediction: "K_I-based calving flux predictions fall within factor 2 of observed for at least 7 of 10 glaciers"

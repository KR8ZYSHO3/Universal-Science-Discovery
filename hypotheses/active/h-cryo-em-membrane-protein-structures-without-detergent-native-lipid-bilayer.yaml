proposed_tests:
  - description: >
      Cryo-EM structure determination of the CFTR chloride channel (ΔF508
      disease mutant) in native lipid nanodiscs (POPC:POPE:cholesterol
      mimicking ER membrane composition) vs. detergent (DDM). Compare:
      (a) resolution achieved; (b) lipid density at transmembrane domain
      interfaces; (c) NBD1/NBD2 dimer conformation. Test whether the ΔF508
      mutant shows a distinct conformation in native lipid vs. detergent.
    method: >
      Nanodisc reconstitution (MSP1D1 belt protein, 10 nm disc); single-particle
      cryo-EM on Titan Krios with K3 detector; 300 kV, 50 e⁻/Å² dose budget;
      3D refinement in RELION/cryoSPARC; resolution estimated by gold-standard
      FSC at 0.143.
    prediction: >
      Nanodisc CFTR achieves ≤3.5 Å global resolution (vs. ≤3.2 Å in DDM);
      ≥3 ordered lipid densities resolved at TM domain interfaces; ΔF508 nanodisc
      structure shows altered NBD1 domain orientation vs. wildtype not seen
      in detergent, revealing a structural basis for the ER retention phenotype.
  - description: >
      Native vesicle cryo-ET (subtomogram averaging) of voltage-gated sodium
      channels (Nav1.7, pain target) in isolated HEK293 plasma membrane vesicles.
      Test whether the in situ nanodisc/native environment reveals lipid-mediated
      state transitions between closed, inactivated, and (with scorpion toxin)
      open states that are absent in detergent structures.
    method: >
      Cryo-ET tilt series (±60°, 3° step); CTF correction; subtomogram averaging
      of Nav1.7 particles; classification into conformational states.
    prediction: >
      ≥2 distinct conformational states resolved by classification (≥30% of
      particles in each class); ≥2 resolved lipid densities per state;
      resolution ≤4 Å for dominant state (sufficient for drug binding pocket
      identification).

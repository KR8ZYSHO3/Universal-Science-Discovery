id: h-cryo-em-membrane-protein-structures-without-detergent-native-lipid-bilayer
title: >
  Cryo-EM of membrane proteins reconstituted in lipid nanodiscs or native
  membrane vesicles (without detergent solubilisation) will routinely achieve
  ≤3 Å resolution for proteins ≥150 kDa within a native lipid environment,
  revealing lipid-protein interaction sites and conformational states
  inaccessible to detergent-solubilised preparations.
status: active
priority: high
impact_score: 0.84

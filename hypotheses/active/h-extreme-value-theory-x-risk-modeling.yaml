proposed_tests:
  - description: Apply peaks-over-threshold GPD fitting to daily returns of S&P 500, MSCI World, 10Y Treasury, and USD/EUR from 1928-2025; estimate tail index ξ and 99% VaR for each asset class; compare GPD-estimated 1-in-100-year losses to Gaussian VaR estimates and to realized maximum drawdowns; test whether ξ is stable across subperiods (pre-2000, 2000-2010, 2010-2025) using profile likelihood confidence intervals.

id: h-mete-non-equilibrium-deviations
title: Systematic deviations of empirical species abundance distributions from METE predictions are quantitatively predicted by non-equilibrium relaxation dynamics, with the magnitude of deviation decaying as a power law in time since disturbance
status: draft
priority: medium
created: "2026-05-05"
last_updated: "2026-05-05"
author: USDR seed content (replace with GitHub handle when stewarded)
impact_score: 0.6
unknowns_addressed:
  - u-maxent-ecology-failure-modes
related_disciplines:
  - macroecology
  - statistical-mechanics
  - information-theory
evidence_links:
  - type: supporting
    confidence: 0.4
    doi: "10.1111/j.1461-0248.2008.01201.x"
    note: Harte et al. (2008) - METE equilibrium predictions work in stable forests; departures noted in disturbed sites
  - type: related
    confidence: 0.35
    note: >
      Boltzmann H-theorem analogy: entropy-maximizing approach to equilibrium in statistical
      mechanics suggests ecological relaxation should have a similar structure
  - type: contradicting
    confidence: 0.3
    note: >
      Alternative interpretation: METE failures reflect wrong choice of state variables
      rather than non-equilibrium dynamics; no confirmed power-law relaxation signal in
      empirical chronosequence studies
proposed_tests:
  - summary: >
      Chronosequence analysis: compare METE residuals (empirical SAD minus METE prediction)
      across forests of known ages since clear-cutting (10, 30, 50, 100, 200 years).
      Test whether the root-mean-square METE residual decays toward zero and whether
      the decay is consistent with a power law in time, as predicted by non-equilibrium
      relaxation analogies.
  - summary: >
      Island biogeography test: recently colonized islands should deviate from METE more
      than old-growth continental forests of equal S, N. Compare METE residuals across
      a gradient of island age and isolation. Relaxation toward METE should slow on
      isolated islands due to reduced immigration rate.
  - summary: >
      Microbial community manipulation: use sterile media inoculated with defined species
      mixtures and track SAD over time. This provides controlled non-equilibrium initial
      conditions with known disturbance timing, enabling direct testing of relaxation dynamics.

proposed_tests:
  - description: >
      Conduct a meta-analysis comparing effect sizes from observational IV studies
      versus subsequent RCTs on the same questions (education-earnings, drug
      effectiveness, dietary interventions). Test whether IV estimates fall within
      the 95% confidence interval of RCT estimates more often than naive
      observational estimates (> 60% vs < 40% coverage rate).

id: h-instrumental-variables-causal-inference-validity
title: >
  Instrumental variable (IV) estimation reliably recovers the local average
  treatment effect (LATE) in observational studies when the instrument satisfies
  relevance, exclusion restriction, and monotonicity — and regression discontinuity
  designs provide the strongest observational causal evidence because they
  approximate a local randomized experiment near the cutoff threshold.

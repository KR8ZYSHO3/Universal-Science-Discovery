id: h-spacetime-emerges-from-entanglement
title: >
  Spacetime geometry is an emergent phenomenon arising from the entanglement
  structure of quantum degrees of freedom on a holographic boundary — realized
  in AdS/CFT as the Ryu-Takayanagi formula S = Area/4G where the bulk metric
  geometry is reconstructed from boundary entanglement entropy.

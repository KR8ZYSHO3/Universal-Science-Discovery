proposed_tests:
  - description: >
      Apply optical tweezer force-clamp measurements on single myosin II molecules
      across a temperature range (4°C to 42°C) and use the Jarzynski equality to
      compute free energy transduction efficiency from non-equilibrium work trajectories;
      compare to Carnot limit at each temperature.
    method: "Single-molecule optical tweezer force clamp; temperature-controlled flow cell; Jarzynski estimator for free energy from work distributions"
    prediction: "Measured efficiency eta > eta_Carnot = 1 - T_cold/T_hot cannot hold classically; any super-Carnot signature would indicate quantum contributions"
  - description: >
      Compare step size variance as function of temperature to Brownian ratchet model
      predictions: ratchet predicts increasing variance with temperature while classical
      lever predicts temperature-independent step size.
    method: "Single-molecule fluorescence imaging with sub-nm resolution (iSCAT) at controlled temperatures"
    prediction: "Step size variance increases linearly with kT, confirming diffusive ratchet mechanism; coefficient of variation identifies ratchet potential asymmetry"

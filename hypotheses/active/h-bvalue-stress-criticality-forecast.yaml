id: h-bvalue-stress-criticality-forecast
title: >
  Spatiotemporal decreases in the Gutenberg-Richter b-value (below regional average)
  within 50 km of a fault segment indicate increasing differential stress approaching
  the SOC critical point, and segments with b < 0.7 have ≥3× elevated probability
  of M≥6 rupture within 5 years.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
related_disciplines:
  - geology
  - seismology
  - statistical-physics
  - geophysics
unknowns_addressed:
  - u-earthquake-soc-predictability
evidence_links:
  - type: supporting
    doi: "10.1029/2019JB018045"
    note: Gulia & Wiemer (2019) — real-time b-value mapping detects stress changes before the 2016 Amatrice sequence
  - type: supporting
    doi: "10.1126/science.1135842"
    note: Schorlemmer et al. (2005) — b-value inversely correlated with differential stress in laboratory and field data
  - type: contradicting
    doi: "10.1029/2004GL020396"
    note: Hardebeck et al. (2008) — accelerating moment release and b-value changes are not reliable prospective forecasters
  - type: contradicting
    note: >
      Catalog completeness artifacts: b-value decreases often reflect improved
      catalog completeness at low magnitudes rather than genuine stress changes.
      Without correcting for completeness magnitude M_c, b-value maps are unreliable.
proposed_tests:
  - discipline: seismology
    description: >
      Retrospective blind test: using only seismicity data from before 2010, compute
      b-value maps for southern California at 10-km resolution. Test whether fault
      segments that subsequently (2010-2026) experienced M≥6 ruptures had statistically
      lower b-values at the time of the catalog cutoff than segments that remained
      quiescent. Correcting rigorously for catalog completeness magnitude M_c using the
      Wiemer & Wyss (2000) method. Report sensitivity and specificity of the b < 0.7
      criterion at 5-year horizon.
  - discipline: geophysics
    description: >
      Combine GPS strain accumulation rates with b-value mapping on the same fault
      segments (California, New Zealand, Japan). Test whether segments with high GPS
      interseismic coupling AND low b-value (dual stress indicators) have higher
      rupture probability than either indicator alone. This tests whether the SOC
      criticality indicator (b-value) and mechanical stress indicator (GPS coupling)
      provide independent or correlated information.
  - discipline: statistical-physics
    description: >
      Calibrate the OFC spring-block SOC model to match a specific fault geometry and
      empirical b-value. Run the model to the point of a simulated major event and measure
      the b-value trajectory in the 10-50 years prior. Test whether the model predicts
      a systematic b-value decrease before large events, and if so, what the false-positive
      rate is for the b < 0.7 threshold.

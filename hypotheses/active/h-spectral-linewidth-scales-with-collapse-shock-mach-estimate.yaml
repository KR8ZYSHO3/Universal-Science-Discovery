author: USDR

evidence_links:
  - doi: "10.1103/RevModPhys.74.425"
    type: related
    confidence: 0.45
    note: Review ties spectroscopic trends to collapse phenomenology without settling mechanism

unknowns_addressed:
  - u-sonoluminescence-emission-mechanism-state-resolved

proposed_tests:
  - description: >
      Acquire radius interferometry + spectra under controlled acoustic pressure and dissolved gases; estimate Mach from simulations; regress linewidth versus Mach with hierarchical uncertainty.
    method: Joint experimental campaign across ≥3 laboratories using shared calibration protocols
    prediction: Spearman ρ ≥ 0.5 between Mach estimates and linewidth proxies when chemistry held fixed


id: h-spectral-linewidth-scales-with-collapse-shock-mach-estimate
title: >
  For noble-gas-driven single-bubble sonoluminescence experiments where simultaneous radius–time curves yield peak inward Mach estimates from fitted Rayleigh–Plesset-like models, optical spectral linewidths will correlate positively with inferred Mach across gases after controlling for thermal conductivity — falsified if linewidth remains invariant while Mach varies strongly (implying emission mechanism decouples from hydrodynamic intensity).
status: active
priority: medium
impact_score: 0.39
created: "2026-05-07"

proposed_tests:
  - description: >
      Analytical ultracentrifugation (AUC) of silicate nucleation: measure
      SiO₂ cluster size distribution in supersaturated silica solutions at
      pH 7–10 and temperature 25–80°C. Test for stable cluster population
      below 2 nm (prenucleation clusters) preceding macroscopic precipitation.
      Compare to CNT-predicted critical nucleus size.
  - description: >
      Geologic application: measure feldspar nucleation induction times in
      syn-magmatic fluid inclusion experiments at 600–800°C. Compare to CNT
      predictions. Test: two-step model with amorphous aluminosilicate precursor
      reduces predicted induction time to match observations.

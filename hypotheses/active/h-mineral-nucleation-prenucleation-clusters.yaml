id: h-mineral-nucleation-prenucleation-clusters
title: >
  Classical nucleation theory fails for geological mineral formation because
  prenucleation clusters (stable ion assemblages below the critical nucleus size)
  provide a two-step nucleation pathway that lowers the free energy barrier by
  50–80%, explaining the observed orders-of-magnitude discrepancy between
  predicted and observed induction times.

id: h-pink1-parkin-mitophagy-parkinsons-therapeutic-target
title: >
  Enhancing PINK1-Parkin mitophagy flux in dopaminergic neurons will slow or
  arrest the progression of Parkinson's disease by clearing damaged mitochondria
  before they trigger neuroinflammation and neurodegeneration.
status: active
priority: high
impact_score: 0.85
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1038/nrm.2017.58"
    type: supporting
    confidence: 0.75
    note: "PINK1 and Parkin mutations cause familial PD; PINK1-KO mice develop mitochondrial dysfunction and dopaminergic neuron loss — supports causal role of mitophagy failure"
  - type: supporting
    confidence: 0.68
    note: "Urolithin A (natural mitophagy inducer) extends lifespan in C. elegans and improves muscle function in humans (Ryu 2016 Nature Medicine) — proof of concept for mitophagy enhancement"
  - type: supporting
    confidence: 0.62
    note: "Kinetin (PINK1 kinase activator) rescues mitochondrial morphology in PD patient iPSC-derived neurons; Phase I trial ongoing"
  - type: contradicting
    confidence: 0.5
    note: "Sporadic PD (>90% of cases) may have PINK1/Parkin-independent mitochondrial dysfunction; therapeutic benefit may be limited to familial PINK1/Parkin-mutant subgroup"

unknowns_addressed:
  - u-autophagy-selectivity-cargo-receptor-hierarchy

proposed_tests:
  - description: >
      In vivo mitophagy flux measurement in PINK1-mutant PD patient iPSC-derived
      dopaminergic neurons treated with PINK1 activators (kinetin, BX795): measure
      mitochondrial membrane potential, pUb(S65) levels, mitophagy flux via
      mito-Keima reporter, and neuron survival under rotenone stress.
    method: "iPSC differentiation to mDA neurons + mito-Keima mitophagy reporter + PINK1 activator treatment + rotenone stress assay + survival curve"
    prediction: "PINK1 activators restore mitophagy flux to WT levels; treated neurons survive rotenone challenge at 3-fold higher rate than vehicle control"
  - description: >
      Longitudinal neuroimaging biomarker trial: PD patients with PINK1/Parkin
      mutations randomized to urolithin A (mitophagy enhancer) vs. placebo.
      Primary endpoint: dopaminergic neuron loss rate by [18F]DOPA PET at 24 months.
    method: "Phase II RCT; [18F]DOPA PET; CSF biomarkers (α-synuclein, pTau); MDS-UPDRS motor score"
    prediction: "Urolithin A slows [18F]DOPA signal loss by ≥25% over 24 months in PINK1/Parkin-mutation carriers"

related_disciplines:
  - cell-biology
  - neuroscience
  - pharmacology
  - neurodegenerative-disease

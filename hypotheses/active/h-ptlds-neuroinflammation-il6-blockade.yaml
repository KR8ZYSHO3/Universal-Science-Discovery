id: h-ptlds-neuroinflammation-il6-blockade
title: >
  IL-6 receptor blockade (tocilizumab) will reduce PTLDS cognitive symptoms
  by interrupting the self-sustaining astrocyte-microglial activation loop,
  measurable by reduced CSF CXCL13/IL-6 and improved NeuroQoL scores
  in a randomized controlled trial.
status: active
priority: high
impact_score: 0.76
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-ptlds-neuroinflammation-self-sustaining
evidence_links:
  - type: supporting
    doi: 10.1186/s12974-015-0312-5
    note: "Ramesh et al. (2015) Borrelia-induced TLR2-mediated microglial and astrocyte activation persists in primate models post-antibiotic clearance — key mechanistic support for self-sustaining neuroinflammation."
    confidence: 0.63
  - type: supporting
    note: "Tocilizumab (anti-IL-6R) is FDA-approved for rheumatoid arthritis, cytokine release syndrome, and giant cell arteritis — extensive human safety data available; mechanism of blocking reactive astrogliosis via JAK/STAT3 inhibition is well-characterized in the MS literature."
    confidence: 0.80
  - type: supporting
    doi: 10.1212/WNL.0b013e31816c8a43
    note: "Fallon et al. (2008) repeated IV antibiotic trial showed modest cognitive improvement, suggesting neurological pathology is partially reversible — consistent with a treatable neuroinflammatory component."
    confidence: 0.55
  - type: contradicting
    note: "IL-6 blockade carries infection risk (IL-6 is required for acute-phase response); using immunosuppression in a condition where residual Borrelia may be present requires careful safety monitoring and confirmed bacterial clearance before treatment."
    confidence: 0.70
  - type: related
    doi: 10.3389/fmed.2013.00057
    note: "Aucott et al. (2013) PTLDS symptom burden — establishes that cognitive impairment is the primary unmet need in PTLDS and the target for this hypothesis."
    confidence: 0.92
proposed_tests:
  - description: >
      Biomarker screening study: 50 PTLDS patients (≥6 months post-antibiotic,
      documented prior Lyme diagnosis) undergo lumbar puncture for CSF CXCL13,
      IL-6, GFAP, and neurofilament light chain (NfL). Brain MRI with white-matter
      FLAIR and TSPO PET (microglial activation) for a subset (n=20). This
      establishes the prevalence of persistent neuroinflammatory biomarkers in
      PTLDS — currently unknown — and stratifies patients for the RCT.
  - description: >
      Phase 2 randomized controlled trial: 60 PTLDS patients with elevated CSF
      CXCL13 (>10 pg/mL) and cognitive impairment (NeuroQoL T-score <40).
      Randomize 1:1 to tocilizumab 8 mg/kg IV every 4 weeks x 6 doses vs.
      placebo infusion. Primary endpoint: NeuroQoL cognitive function T-score
      at 6 months. Secondary endpoints: CSF CXCL13 and IL-6 at 3 months,
      Fatigue Severity Scale, SF-36 Physical Function. Safety monitoring for
      infection events.
  - description: >
      Animal model validation: C3H/HeN mice with confirmed post-treatment
      Borrelia clearance (xenodiagnosis negative) showing behavioral cognitive
      impairment (Morris water maze). Treat with anti-murine IL-6R antibody
      vs. vehicle for 4 weeks. Primary endpoint: Morris water maze performance.
      Secondary: hippocampal GFAP/Iba1 immunohistochemistry for astrogliosis
      and microglial activation; hippocampal BrdU incorporation for neurogenesis.

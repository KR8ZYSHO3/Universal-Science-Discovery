id: h-microbiome-diversity-host-resilience
title: >
  Shannon diversity of the gut microbiome is a causal determinant of host resilience
  to dietary perturbation, antibiotic exposure, and enteric pathogen challenge —
  such that microbiomes with H > 3 bits recover baseline composition within 14 days
  of perturbation while microbiomes with H < 2 bits undergo permanent compositional
  shift, analogous to ecological alternative stable states.

proposed_tests:
  - description: >
      Prospective randomized crossover study: n=200 healthy adults receive controlled
      antibiotic course (ciprofloxacin 500mg BID × 7d). Measure Shannon diversity
      (H) at baseline, day 7, 14, 28, 90 via shotgun metagenomic sequencing.
      Pre-stratify by baseline H into H>3, 2<H<3, H<2 groups. Primary endpoint:
      proportion returning to within 10% of baseline Bray-Curtis dissimilarity by day 28.
    method: "Shotgun metagenomics, Shannon entropy calculation, Bray-Curtis distance from baseline"
    prediction: "H>3 group: >80% recovery by day 14; H<2 group: <40% recovery at day 90"
  - description: >
      Germ-free mice colonized with synthetic communities of known Shannon diversity
      (H = 1, 2, 3, 4 bits; n=10 donors each): challenge with Citrobacter rodentium.
      Primary endpoint: colonization resistance, bodyweight trajectory, time to recovery.
    method: "Gnotobiotic mouse facility, defined community colonization, CFU counting, 16S longitudinal tracking"
    prediction: "Colonization resistance scales monotonically with H; H>3 provides >90% protection"

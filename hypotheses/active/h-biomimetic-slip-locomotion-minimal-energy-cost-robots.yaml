id: h-biomimetic-slip-locomotion-minimal-energy-cost-robots
title: >
  Robots implementing SLIP-based compliant leg control with leg spring constant
  k tuned to body mass via the biological scaling law k ∝ m^0.67 will achieve
  specific energy cost of transport (COT) < 1 J/(N·m) — matching biological
  runners — regardless of morphology, provided Strouhal number is maintained
  at St ≈ 0.25–0.35 for swimming and flapping analogues.
status: active
priority: medium
impact_score: 0.77
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:
  - note: "Full & Koditschek (1999) SLIP model template framework: biological runners from cockroach to human follow SLIP dynamics"
    type: supporting
    confidence: 0.82
  - doi: "10.1126/science.288.5463.100"
    type: supporting

proposed_tests:
  - description: >
      Build a series of legged robots spanning 0.1–100 kg body mass with leg
      springs tuned to k = A·m^0.67 (A determined from biological regression),
      measure COT on flat ground at optimal speed, and compare to the biological
      COT-mass relationship (COT_bio ≈ 10·m^(-0.32)).
    method: "Force plate + metabolic analog power measurement (motor current × voltage - elastic storage); vary gait speed to find minimum COT"
    prediction: "COT < 2·COT_bio for all masses 0.1–100 kg when k follows the biological scaling; COT decreases by ≥30% compared to rigid-leg control"
  - description: >
      Measure leg spring stiffness k_leg in vivo using ultrasonography + force
      plate for cockroach (0.001 kg), dog (20 kg), and human (70 kg) running
      at preferred speed; test whether k ∝ m^0.67 holds across 5 orders of
      magnitude in body mass.
    method: "High-speed ultrasound (muscle-tendon unit length) synchronized with force plates (ground reaction force); compute k = F/Δx at mid-stance"
    prediction: "k follows m^0.67 with coefficient of variation < 20% across taxa, with Drosophila and elephant as outlier tests at extreme masses"


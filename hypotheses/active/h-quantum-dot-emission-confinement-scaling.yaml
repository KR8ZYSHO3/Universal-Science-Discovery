id: h-quantum-dot-emission-confinement-scaling
title: "The first-exciton emission peak of colloidal CdSe quantum dots follows the Brus equation to within 5 nm over the 2–7 nm diameter range at room temperature, and deviations > 5 nm are attributable to surface reconstruction effects quantifiable by strain-corrected tight-binding calculations"
status: active
priority: medium
impact_score: 0.62
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1021/ja00355a005"
    type: supporting
    confidence: 0.80
    note: "Brus (1984) — original confinement energy derivation; well-established for CdSe in the 3–7 nm range"
  - doi: "10.1126/science.271.5251.933"
    type: supporting
    confidence: 0.75
    note: "Alivisatos (1996) — experimental validation of size-tunable emission with Brus equation"
  - type: related
    note: "Norris & Bawendi (1996) — single-dot spectroscopy shows deviations from Brus at small sizes"
unknowns_addressed:
  - u-quantum-dot-confinement-size-tunability
proposed_tests:
  - description: >
      Synthesize a size series of CdSe dots (2–7 nm, 0.5 nm increments) characterized by TEM;
      measure PL peak by single-dot spectroscopy; compute Brus-equation prediction using bulk CdSe
      parameters; compute strain-corrected tight-binding prediction; quantify residual deviation.
    method: "TEM size characterization + single-dot PL spectroscopy + Brus and TB comparison"
    prediction: "Brus deviations < 5 nm for d > 3 nm; strain-corrected TB reduces all deviations to < 5 nm including d = 2 nm dots"

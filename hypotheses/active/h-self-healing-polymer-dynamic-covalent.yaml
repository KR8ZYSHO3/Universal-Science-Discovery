id: h-self-healing-polymer-dynamic-covalent
title: >
  Autonomous self-healing in non-covalent polymer networks is governed by the ratio
  of dynamic bond exchange rate to crack propagation speed; networks where exchange
  rate exceeds crack tip speed by > 10× achieve > 90% mechanical property recovery
  within 24 hours, and this ratio can be tuned by controlling dynamic covalent bond
  density.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium

    doi: 10.1126/science.1145232
    note: >
      White et al. (2001) Science — first autonomous self-healing polymer via
      microencapsulated healing agent; demonstrates feasibility of self-repair concept.
  - type: supporting
    doi: 10.1038/nature09963
    note: >
      Leibler group (2012) — supramolecular self-healing rubber at room temperature
      via hydrogen bonds; exchange rate governs healing time.
proposed_tests:
  - discipline: materials-science
    description: >
      Synthesize poly(urea-formaldehyde) networks with varying imine bond density
      (0.1, 0.5, 1.0, 2.0 mmol/g). Cut each sample with razor blade and allow
      self-healing at 25°C for 1, 6, 24, 72 hours. Measure tensile strength
      recovery by uniaxial testing. Measure imine exchange rate constant k_ex
      by 13C NMR linewidth at 25°C. Hypothesis: healing efficiency at 24h
      correlates linearly with log(k_ex / k_crack) where k_crack is estimated
      from fracture toughness, with >90% recovery when k_ex / k_crack > 10.

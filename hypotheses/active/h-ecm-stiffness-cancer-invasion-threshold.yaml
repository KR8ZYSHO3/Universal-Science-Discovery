id: h-ecm-stiffness-cancer-invasion-threshold
title: >
  There exists a critical ECM stiffness threshold E* ~ 5-15 kPa at which
  breast epithelial cells switch from a non-invasive to an invasive phenotype
  via YAP/TAZ-mediated transcriptional reprogramming, independently of
  oncogenic mutation status.

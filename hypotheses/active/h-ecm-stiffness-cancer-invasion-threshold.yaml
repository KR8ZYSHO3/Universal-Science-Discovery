proposed_tests:
  - description: >
      Grow MCF10A (normal breast epithelial) and MCF10AT (pre-malignant) cells
      on polyacrylamide hydrogels with E = 0.2, 1, 5, 10, 20, 40 kPa.
      Measure: YAP nuclear/cytoplasmic ratio by immunofluorescence; invasion into
      3D Matrigel overlay; MMP-9 secretion; E-cadherin/vimentin ratio.
      Test: non-monotonic threshold at specific E* where invasion initiates.
    method: Traction force microscopy + confocal imaging + invasion assay
    prediction: >
      E* = 8±3 kPa for MCF10A transition to invasive behaviour; YAP nuclear
      fraction > 0.6 at E > E*; this threshold is lower for MCF10AT cells
      (E* ~ 3 kPa), quantifying how pre-malignancy lowers mechanical invasiveness threshold.
  - description: >
      Use phototunable hydrogels (azobenzene-PEG) to switch stiffness from
      below to above E* in cells already cultured for 72 h, and vice versa.
      Test: is the stiffness-invasion transition reversible or does it show hysteresis?
    method: UV/visible light switching of hydrogel E; live-cell imaging of YAP localization
    prediction: >
      Transition from soft to stiff is faster (hours) than stiff to soft (days),
      consistent with epigenetic locking of invasive phenotype above E*;
      hysteresis width ~ 3 kPa.

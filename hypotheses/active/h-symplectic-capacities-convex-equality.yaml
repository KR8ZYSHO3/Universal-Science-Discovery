id: h-symplectic-capacities-convex-equality
title: >
  All symplectic capacities coincide on convex bodies in R^{2n} — the Ekeland-Hofer
  and Gromov width capacities are equal for convex sets — and this equality is
  equivalent to a sharp systolic inequality for convex contact hypersurfaces,
  connecting Hamiltonian dynamics to convex geometry.
status: active
priority: medium
impact_score: 0.67
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-symplectic-capacities
evidence_links:
  - type: supporting
    note: "Viterbo (2000) conjecture: all symplectic capacities agree on convex bodies — proved only for ellipsoids and polydiscs"
    confidence: 0.65
  - type: supporting
    note: "Gutt & Hutchings (2019) embedded contact homology capacities: new infinite family of capacities — all agree with EH on toric domains"
    confidence: 0.75
  - type: related
    note: "Artstein-Avidan & Ostrover (2014) convex symplectic isoperimetric inequality: systolic ratio bounded by EH capacity — partial result toward Viterbo conjecture"
    confidence: 0.72
proposed_tests:
  - description: >
      Simplicial polytope test: compute Gromov width and Ekeland-Hofer capacities
      for all simplicial polytopes in R^4 with at most 8 vertices (finitely many
      combinatorial types). Test whether capacities agree. First counterexample would
      disprove Viterbo conjecture for non-smooth convex bodies.
  - description: >
      Continuous deformation proof attempt: for a convex body K(t) interpolating
      between an ellipsoid (t=0) and a general convex body (t=1), track the
      Gromov width and EH capacity. Test: can equality be maintained continuously?
      First violation point identifies the obstruction to Viterbo conjecture.

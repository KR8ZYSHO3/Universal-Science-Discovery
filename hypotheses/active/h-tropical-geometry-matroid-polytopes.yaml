evidence_links:
  - type: supporting
    note: "Speyer & Sturmfels (2004) tropical Grassmannian: trop(Gr(2,n)) is the space of phylogenetic trees — matroid correspondence established"
    confidence: 0.85
  - type: supporting
    note: "Ardila & Klivans (2006) Bergman fan of matroids: every matroid M defines a fan Σ_M; tropical linear spaces are exactly Σ_M fans"
    confidence: 0.88
  - type: related
    note: "Huh & Katz (2012) log-concavity of characteristic polynomial via tropical intersection theory — matroid combinatorics from tropical geometry"
    confidence: 0.80
proposed_tests:
  - description: >
      Matroid polytope characterization: for all matroids of rank ≤ 4 on ground
      set [8] (enumerable), compute Bergman fan and test whether it is a tropical
      linear space. Test: 100% correspondence — no matroid whose Bergman fan fails
      to be a tropical linear space.
  - description: >
      Positive tropical Grassmannian: compute trop(Gr_+(2,n)) for n ≤ 10.
      Test whether it equals the positive part of the tropical Grassmannian defined
      via Plücker coordinates. Identify the matroid strata structure.
      Compare with Postnikov's totally positive Grassmannian.

id: h-tropical-geometry-matroid-polytopes
title: >
  Tropical varieties are exactly the supports of Bergman fans of matroids —
  and every tropical linear space is the Bergman fan of the underlying matroid —
  providing a combinatorial foundation for tropical geometry through matroid theory
  and resolving the correspondence between tropical Grassmannians and matroid polytopes.

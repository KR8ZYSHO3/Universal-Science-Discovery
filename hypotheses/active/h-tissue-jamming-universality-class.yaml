id: h-tissue-jamming-universality-class
title: "Epithelial tissue jamming belongs to the mean-field universality class with critical exponents beta=0.5, nu=0.5, detectable via finite-size scaling of rigidity in 3D organoids"
status: active
created: "2026-05-05"
priority: medium
impact_score: 0.75

evidence_links:
  - type: supporting
    doi: "10.1038/nphys3471"
    note: "Bi et al. (2016) - vertex model predicts mean-field-like jamming transition at p0=3.81"
  - type: supporting
    note: "Granular jamming in 3D shows mean-field exponents — tissue analogy suggests same class"
  - type: contradicting
    note: "2D epithelial monolayers may have different exponents due to quasi-2D geometry and active fluctuations"

proposed_tests:
  - description: "Grow 3D organoids from 50 to 5000 cells; measure the shear modulus G as a function of organoid size N near p0=3.81; fit G ~ N^{beta/nu} to extract beta/nu"
  - description: "Measure p0 distribution at fixed organoid size for 5 different epithelial cell lines; test whether variance of p0 diverges as (p0-p0_c)^{-gamma} with gamma=1 (mean field)"
  - description: "Test whether Myosin II inhibition (blebbistatin) shifts the jamming transition threshold p0_c; predict shift from vertex model and compare"

unknowns_addressed:
  - u-jamming-transition-biological-tissues
  - u-confluent-tissue-brownian-universality

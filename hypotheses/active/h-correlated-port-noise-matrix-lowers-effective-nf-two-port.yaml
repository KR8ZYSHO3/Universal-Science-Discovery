id: h-correlated-port-noise-matrix-lowers-effective-nf-two-port
title: >
  For coupled antenna ports whose Johnson–Nyquist noise shares a common physical resistor network, the
  effective scalar noise figure of an optimized linear combiner can fall below the Friis cascade of individual
  branches — correlated equilibrium noise is partially cancellable like classical common-mode subtraction.
status: active
priority: medium
impact_score: 0.50
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:

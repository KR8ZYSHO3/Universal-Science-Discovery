    type: related
    confidence: 0.45
    note: "Johnson equilibrium thermal noise baseline; correlations arise from shared dissipative elements."
  - type: related
    confidence: 0.40
    note: "Speculative for classical RF; quantum squeezing uses different mechanisms — analogy must not be conflated."

unknowns_addressed:
  - u-rf-noise-figure-two-port-correlation-matrix-room-temperature

proposed_tests:
  - description: >
      Fabricate a weakly coupled two-port antenna structure; measure full 2×2 noise covariance vs temperature;
      compare optimum beamformer output noise to scalar Friis prediction from branch NF alone.
    method: Cold/hot noise source calibration at both ports with correlation estimation.
    prediction: Output noise temperature drops measurably below Friis stack when common resistor branches dominate covariance.


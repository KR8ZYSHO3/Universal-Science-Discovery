id: h-hypersonic-cmcs-thermal-protection-reuse
title: >
  Ceramic matrix composites (SiC/SiC and C/SiC) with environmental barrier
  coatings (EBCs) are the only material class that can provide reliable
  reusable thermal protection for hypersonic vehicles at Mach 10-25 through
  at least 50 flight cycles, contingent on solving surface oxidation recession
  at >1600°C oxygen partial pressures.
status: active
priority: high
impact_score: 0.75
created: "2026-05-06"
last_updated: "2026-05-06"

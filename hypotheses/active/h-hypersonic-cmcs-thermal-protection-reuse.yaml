evidence_links:
  - doi: "10.1016/j.jeurceramsoc.2019.04.042"
    type: supporting
    confidence: 0.68
    note: >
      Padture (2019) review: SiC/SiC CMCs achieve 1300-1500°C service
      temperature with EBC (BSAS, rare-earth silicates); life-limiting
      mechanism is EBC spallation due to thermal cycling and CMAS attack
      at >1400°C.
  - doi: "10.1038/s41578-020-0247-4"
    type: supporting
    confidence: 0.65
    note: >
      Zhu (2020) EBC review: hafnium and ytterbium silicate EBCs are
      leading candidates for >1500°C; oxidation recession of SiC substrate
      through EBC cracks remains the key multi-cycle durability challenge.
  - doi: "10.2514/1.A34285"
    type: related
    confidence: 0.60
    note: >
      Glass et al. (2018) NASA X-43 and HTV-2 thermal data: peak surface
      temperatures 1400-1900°C at Mach 20 trajectory; current ablatives are
      single-use and CMC candidates have not yet been certified for sustained
      hypersonic flight.
proposed_tests:
  - description: >
      Subject SiC/SiC coupons with and without RE-silicate EBC to thermal
      shock cycling: 25°C → 1600°C → 25°C over 50 cycles (simulating
      hypersonic ascent/descent) in an oxidising environment (pO2 = 0.2 atm).
      Measure mass loss, recession depth (profilometry), and microstructure
      (SEM/TEM). Test: do EBC-coated samples show <5% surface recession after
      50 cycles? Identify whether spallation or oxidation recession dominates.

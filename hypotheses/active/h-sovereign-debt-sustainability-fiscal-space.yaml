id: h-sovereign-debt-sustainability-fiscal-space
title: >
  Sovereign debt sustainability depends on the r-g differential (real interest rate minus
  growth rate): sustainability requires primary surpluses only when r > g (debt snowball);
  countries with r < g have fiscal space for deficit spending, but market panic can shift
  r > g discontinuously, creating self-fulfilling crises unpredictable from fundamentals.

proposed_tests:
  - description: >
      Train regime labels from high-resolution simulation ensembles matched to DART records; evaluate incremental forecast skill on retrospective catalogs with documented instrument noise.
    method: Feature engineering + ensemble hindcasts + cross-validated classifiers with calibrated uncertainty.
    prediction: Regime-aware corrections yield statistically significant MAE reductions relative to linear shallow-water baselines on matched event subsets.

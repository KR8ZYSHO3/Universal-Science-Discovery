id: h-tsunami-front-regime-classifier-nonlinear-dispersive-bore
title: >
  A classifier combining nondimensional tsunami height–depth ratios with trailing dispersive tail energy fractions improves nearshore amplitude NOWCAST skill versus hydrostatic linear timelines alone on archived buoy events — falsified if peak-amplitude MAE does not drop by ≥8% on held-out events with quality-controlled bathymetry.

proposed_tests:
  - description: >
      Longitudinal fMRI of children ages 3-5 (n=60) with annual false-belief and
      executive function testing. Test: does rTPJ-mPFC functional connectivity change
      predict ToM task performance gain? Compare rTMS disruption of rTPJ vs vertex
      control in 6-year-olds on second-order ToM tasks.
    prediction: "rTPJ-mPFC connectivity change (r>0.45) predicts explicit ToM emergence; rTMS of rTPJ selectively impairs explicit but not implicit ToM."

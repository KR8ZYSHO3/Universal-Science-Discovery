id: h-theory-of-mind-tpj-development-timing
title: >
  Theory of mind (ToM) emerges at age 3-4 from the maturation of bilateral
  temporoparietal junction (TPJ) connectivity to the medial prefrontal cortex,
  with the right TPJ specifically encoding the perspective-taking component, and
  the transition from implicit to explicit ToM reflecting frontal executive
  maturation rather than the emergence of a new social module.

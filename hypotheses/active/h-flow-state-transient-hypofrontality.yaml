id: h-flow-state-transient-hypofrontality
title: >
  Flow states are neurologically characterized by transient hypofrontality — selective
  deactivation of prefrontal cortex regions associated with self-monitoring — measurable
  as reduced alpha/beta power in frontal EEG, with the duration and depth of flow
  state predicting the magnitude and duration of post-flow rebound creativity.
status: active

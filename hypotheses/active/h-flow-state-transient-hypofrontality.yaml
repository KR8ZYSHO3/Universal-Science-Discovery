    doi: 10.1016/j.concog.2005.06.004
    note: >
      Dietrich (2004) — transient hypofrontality hypothesis of flow and altered states;
      proposes deactivation of explicit monitoring systems enables implicit skill execution.
  - type: related
    doi: 10.1371/journal.pone.0109894
    note: >
      de Manzano et al. (2010) — fMRI during piano performance correlates of flow;
      flow states associated with reduced activation in attention monitoring regions.
proposed_tests:
  - discipline: neuroscience
    description: >
      Record 64-channel EEG from 40 expert musicians during 30-minute improvisation
      sessions. Measure frontal alpha power (8-12 Hz) and subjective flow rating
      (10-minute interval samples). Hypothesis: frontal alpha power is negatively
      correlated with flow rating (r < -0.4) and peak flow periods are preceded
      by alpha power increases consistent with hypofrontality.

id: h-fisher-optimal-dose-grid-reduces-parameter-variance-simulation
title: >
  In simulated Emax and sigmoid dose-response studies, dose grids chosen by Fisher-information criteria will reduce median EC50 estimator variance by at least 20 percent versus equally spaced safe-dose grids at fixed sample size; falsified if gains vanish under mild model misspecification.
status: active
priority: medium
impact_score: 0.4
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1098/rsta.1922.0009"
    type: related
    confidence: 0.45
    note: Fisher (1922) foundational likelihood/statistical estimation paper.
unknowns_addressed:
  - u-dose-spacing-fisher-information-design-trial-calibration
proposed_tests:
  - description: >
      Simulate dose-response trials under Emax, sigmoid Emax, and misspecified logistic models; compare estimator variance for equal, clinician-chosen, and Fisher-optimal dose grids.
    method: Reproducible simulation with fixed safety ceiling and sample-size budget.
    prediction: Median EC50 variance reduction >= 20 percent under correctly specified models and >= 10 percent under mild misspecification.
related_disciplines:
  - biostatistics
  - medicine

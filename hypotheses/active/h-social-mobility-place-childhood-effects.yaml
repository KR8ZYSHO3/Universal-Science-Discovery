unknowns_addressed:
  - u-social-mobility-measurement
evidence_links:
  - doi: "10.1093/qje/qjy007"
    type: supporting
    confidence: 0.88
    note: >
      Chetty & Hendren (2018) QJE — quasi-experimental analysis of 5 million child movers;
      each additional year of childhood in higher-opportunity commuting zone increases
      adult earnings 4%; causal exposure dose-response provides clean mobility metric
  - doi: "10.1257/aer.20150572"
    type: supporting
    confidence: 0.83
    note: >
      Chetty et al. (2016) — Moving to Opportunity experiment: randomised housing vouchers
      in 1990s; children who moved before age 13 earn 31% more at age 26; children who
      moved older show zero effect, establishing critical window and causal identification
  - doi: "10.1093/qje/qjz042"
    type: related
    confidence: 0.72
    note: >
      Opportunity Atlas (Chetty et al. 2018): neighbourhood-level causal estimates cover
      all 70,000+ census tracts; reveals enormous intra-city variation (5× income gap
      between tracts 1km apart) suggesting mobility metric must be place-specific
proposed_tests:
  - description: >
      Scale Moving to Opportunity design to European welfare states; test whether generous
      social safety net moderates the place effect (predicting smaller effect sizes)
      or amplifies it (predicting larger effects because mobility is more affordable);
      compare using matched movers in UK, Germany, and US administrative data.

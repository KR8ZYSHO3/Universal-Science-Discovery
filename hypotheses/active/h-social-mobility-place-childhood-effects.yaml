id: h-social-mobility-place-childhood-effects
title: >
  Intergenerational social mobility is best measured by causal estimates of place effects
  on children's outcomes (not rank-rank correlations that conflate selection), and
  the most reliable policy lever is residential mobility programs for families with
  young children (age < 13), which increase adult earnings 15-35% by moving to
  higher-opportunity neighbourhoods.
status: active
priority: medium
impact_score: 0.79
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:

id: h-integral-feedback-sufficient-perfect-adaptation-living-cells
title: >
  Antithetic integral feedback motifs — where two molecular species with opposite
  effects on a target variable annihilate each other — are the minimal biomolecular
  implementation of integral control, and their robustness to molecular noise is
  determined by the ratio of annihilation rate to production rates.

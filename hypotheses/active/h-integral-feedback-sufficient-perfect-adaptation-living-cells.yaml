proposed_tests:
  - discipline: synthetic-biology
    description: >
      Construct antithetic integral feedback circuits with varying annihilation
      rate constants (η = 0.01, 0.1, 1, 10 per molecule per minute) by titrating
      the expression of the sequestration ribozyme. Measure steady-state setpoint
      error and response to step disturbances (IPTG pulse). Hypothesis: steady-
      state error ε = 0 for all η values (perfect adaptation guaranteed by topology),
      but the transient response time scales as 1/η, and cell-to-cell variability
      in steady-state output decreases with increasing η as predicted by stochastic
      analysis of the antithetic motif.
  - discipline: control-theory
    description: >
      Derive the transfer function of the antithetic integral feedback circuit
      including molecular noise (Langevin formulation). Compute the noise
      amplification factor (Fano factor at steady state) as a function of η
      and compare to numerical stochastic simulation. Hypothesis: there exists
      an optimal η* that minimizes the product of adaptation error and output
      noise, corresponding to the control-theoretic Bode optimal integral gain.

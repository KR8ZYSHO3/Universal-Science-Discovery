id: h-approval-voting-reduces-strategic-manipulation-vs-plurality
title: >
  Approval voting (voters approve any subset of candidates; winner has most
  approvals) reduces the frequency of strategically suboptimal voting relative
  to plurality voting in real elections, as measured by the fraction of voters
  whose approved candidates diverge from their stated first preference under
  plurality systems, and produces Condorcet-consistent outcomes more often.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - political-science
  - economics
  - social-choice-theory
unknowns_addressed:
  - u-strategic-voting-frequency-real-elections-empirical-magnitude
evidence_links:
  - type: supporting
    confidence: 0.55
    note: >
      French local elections (Orsay experiments, 2002-2012): approval voting
      exit surveys found voters approved 2.4 candidates on average; outcomes
      differed from plurality results in 40% of cases — suggesting AV avoids
      the "lesser evil" problem
  - doi: "10.2307/1914085"
    type: related
    confidence: 0.60
    note: >
      Gibbard (1973) — proves AV is also manipulable (any non-dictatorial rule is);
      but the frequency/profitability of manipulation may differ empirically
proposed_tests:
  - description: >
      Pre-election survey experiment in a real municipal election (3+ candidate
      race). Randomly assign half of survey respondents to the plurality condition
      (who would you vote for?) and half to approval condition (which candidates
      do you approve of?). Compare: (a) frequency of "lesser evil" voting in
      plurality condition (stated first preference ≠ stated vote); (b) whether
      the approval winner matches the Condorcet winner (determined by head-to-head
      questions) more often than the plurality winner.
    method: >
      Pre-election online survey (N=1000 per condition); conjoint analysis for
      true preference ranking; comparison of plural vs. approval outcomes against
      Condorcet winner determined by all-pairs ranking questions.
    prediction: >
      Plurality condition: ≥25% of voters vote for non-first-preference candidate.
      Approval condition: ≤10% approve only one candidate who is not their first
      preference (much less strategic incentive). Approval winner matches Condorcet
      winner in ≥90% of races vs. ≤70% for plurality.
  - description: >
      Meta-analysis of Orsay experiments and all other real-world approval voting
      pilot studies (France, Sweden, US primaries) to test whether the Condorcet
      efficiency of approval voting exceeds plurality voting across settings.
    method: >
      Systematic review and meta-analysis of AV vs. plurality experiments;
      outcome: fraction of elections where AV winner = Condorcet winner vs.
      fraction where plurality winner = Condorcet winner.
    prediction: >
      AV Condorcet efficiency ≥ 85% vs. plurality ≤ 75% across studies.

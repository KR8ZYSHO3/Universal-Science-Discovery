unknowns_addressed:
  - u-crowd-dynamics-panic-transitions
proposed_tests:
  - description: >
      Conduct controlled bidirectional pedestrian experiments in a 10m x 2m corridor at densities
      0.5, 1.0, 1.5, 2.0, 2.5, 3.0 persons/m^2 (N=30 subjects per density level, 5 trials each).
      Track pedestrian positions at 25 Hz with overhead camera. Compute lane-order parameter as
      cross-stream position variance normalized by corridor width. Fit power law (rho - rho_c)^beta.
    method: "Overhead video tracking at 25 Hz + lane order parameter + power-law critical density fit"
    prediction: "Lane formation onset at rho_c = 2.0±0.5 persons/m^2; order parameter follows (rho - rho_c)^{0.5} mean-field exponent"

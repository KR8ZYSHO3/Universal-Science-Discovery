id: h-pareto-exponent-growth-redistribution-ratio
title: >
  The Pareto exponent α of top-income distributions across OECD countries satisfies
  the Bouchaud-Mezard prediction α ≈ 1 + r/(g - r), where r is the effective
  redistribution rate (taxes and transfers as fraction of GDP) and g is the
  top-1% income growth rate, with this functional form fitting better than
  linear regression on redistribution rate alone
status: active
priority: high
created: "2026-05-05"
last_updated: "2026-05-05"
author: USDR seed content (replace with GitHub handle when stewarded)

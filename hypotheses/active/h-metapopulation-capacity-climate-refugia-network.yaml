id: h-metapopulation-capacity-climate-refugia-network
title: >
  Designing protected area networks to maximise metapopulation capacity λ_M, rather
  than total protected area, will extend time to extinction for fragmented species
  under climate change by 2-5× because λ_M directly determines regional persistence
  probability, while area alone ignores connectivity and patch configuration.

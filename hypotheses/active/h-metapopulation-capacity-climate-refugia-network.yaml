proposed_tests:
  - description: >
      Agent-based metapopulation simulation of Glanville fritillary on three landscape
      designs (equal total area): (1) current fragmented, (2) area-maximising reserve,
      (3) λ_M-maximising reserve; simulate climate shift of 2km/yr for 50 years;
      measure time to extinction and population size trajectory.

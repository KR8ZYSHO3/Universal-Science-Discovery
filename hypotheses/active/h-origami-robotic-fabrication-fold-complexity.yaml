proposed_tests:
  - description: >
      Design origami crease patterns with N = 100, 500, 1000 creases using TreeMaker/Origamizer and attempt
      robotic folding on 0.5 mm aluminum sheet with 6-DOF arm equipped with visual servoing. Measure mean
      fold position error and success rate vs N.
    method: "Robotic arm with force-torque sensor + fiducial tracking camera + comparison to target geometry"
    prediction: "Fold position error should scale as σ*√N; 1000-crease patterns should achieve mean error <0.5 mm with >80% first-attempt success rate"


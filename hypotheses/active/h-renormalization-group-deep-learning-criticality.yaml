proposed_tests:
  - description: Train ResNets of 4–32 layers on modular arithmetic tasks (known to show grokking) and measure generalisation gap as a function of training step; fit scaling form |gap| ~ |t - t_c|^beta and extract beta
  - description: Apply finite-size scaling collapse to grokking step t_c(N) versus model size N; if t_c ~ N^{1/nu}, extract nu and compare with Ising nu = 1.0
  - description: Repeat for Transformers and MLPs; test whether the same exponents (beta, nu) apply across architectures — as universality predicts they should

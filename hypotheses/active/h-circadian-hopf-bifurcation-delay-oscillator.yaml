id: h-circadian-hopf-bifurcation-delay-oscillator
title: >
  Circadian clock oscillations arise via a Hopf bifurcation in a delay differential
  equation: when the repression delay tau satisfies tau × |df/dx|(x_0) > pi/2,
  the stable fixed point loses stability and a limit cycle emerges with period
  approximately 4*tau, predicting that the ~24h period corresponds to a ~6h delay
  in the transcription-translation feedback loop, as confirmed by per/tim protein
  accumulation kinetics.

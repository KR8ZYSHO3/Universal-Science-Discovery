proposed_tests:
  - description: >
      Optogenetic control of transcription delay: use CRY2-CIB1 light-inducible
      dimerization to acutely shorten or lengthen the nuclear accumulation delay of
      PER protein in mouse fibroblasts. Test: does shortening tau shorten period
      proportionally? Does period ≈ 4*tau across tau range 3-9h?
    prediction: "Period changes by ~1h per 1h change in tau; period collapses to damped oscillations when tau < 3h (below Hopf bifurcation threshold); period ≈ 24h when tau ≈ 6h."

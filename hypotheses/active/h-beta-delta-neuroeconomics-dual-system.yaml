proposed_tests:
  - description: >
      Within-subject fMRI (N=60): intertemporal choice (smaller-sooner vs. larger-
      later at delays 0, 1, 7, 30, 180 days) under (A) full working memory load
      (dual n-back concurrent task) vs. (B) no load. Beta-delta dual-system
      prediction: WM load impairs dlPFC → increases immediate preference (higher β);
      single-system prediction: WM load has no selective effect on immediacy bias.
    method: "3T fMRI, intertemporal choice task with concurrent WM load, beta-delta model fitting, mixed effects"
    prediction: "WM load increases β by >15% without changing δ; single-system predicts equal effect on β and δ"
  - description: >
      Pharmacological test (N=80, placebo-controlled double-blind): administer
      methylphenidate (ritalin, 20mg oral) to enhance dlPFC dopamine tone.
      Test: does methylphenidate selectively increase patience for future rewards
      (reduce β) without changing risk aversion (predicted by dual-system model)
      vs. uniformly shifting discount rate (single-system prediction)?
    method: "Intertemporal choice + risk aversion battery, beta-delta model fitting, mixed effects ANCOVA"
    prediction: "Methylphenidate reduces β by >20% (future-reward patience), no significant change in δ or risk aversion"

id: h-beta-delta-neuroeconomics-dual-system
title: >
  The beta-delta model of intertemporal discounting reflects a genuine dual-system
  neural architecture in which limbic circuits (nucleus accumbens, amygdala) encode
  hyperbolic discount factor beta for immediately available rewards while dlPFC
  encodes the exponential discount factor delta for future rewards — and these two
  systems compete rather than integrate, with the winning system determined by
  working memory load and emotional state.

id: h-cortical-sulcal-topological-conservation
title: >
  The coarse sulcal pattern of the human cortex is topologically conserved across
  individuals because it is determined by the defect configuration of the neuroepithelium
  at neural tube closure — a configuration governed by the same topological invariants
  as liquid-crystal ordering transitions.

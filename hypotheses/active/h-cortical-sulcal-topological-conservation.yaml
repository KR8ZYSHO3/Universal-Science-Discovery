  - type: contradicting
    note: >
      Cortical folding may be primarily determined by mechanical instabilities
      (buckling of the cortical plate under growth-induced compression) rather than
      topological defects in the neuroepithelium. Toro-Burnod and van Essen mechanical
      models reproduce sulcal patterns without invoking topological invariants.
proposed_tests:
  - discipline: developmental-neuroscience
    description: >
      In mouse embryos (lissencephalic model), ablate the neuroepithelial actomyosin
      field locally at neural tube closure (laser ablation or optogenetic inhibition) to
      create controlled topological defects of known charge and position. Track whether
      induced defects predict the subsequent positions of cortical thickening in the
      gyrified ferret or primate (using interspecies comparison), providing a causal test.
  - discipline: mathematical-physics
    description: >
      Compute the topological persistence diagram (Euler characteristic decomposition)
      of the cortical surface in a large neuroimaging cohort (HCP, UK Biobank n>10,000).
      Test whether the inter-individual Wasserstein distance of these diagrams is
      significantly smaller than the distance of matched random surfaces with the same
      genus — quantifying topological conservation beyond geometric similarity.
  - discipline: clinical-neuroscience
    cross_domain_angle: >
      In polymicrogyria and lissencephaly (genetic gyrification disorders), compute the
      topological persistence diagram of the affected cortex and compare to controls.
      Test whether the disorder corresponds to a predictable shift in topological charge
      (e.g. excess positive-charge defects creating extra folds in polymicrogyria) — which
      would unify multiple genetic causes under a single topological phenotype classification.
  - discipline: developmental-biology
    cross_domain_angle: >
      Apply Kibble-Zurek scaling to neural tube closure: measure the rate of symmetry
      breaking (speed of neuroepithelial polarisation) in embryos with varying genetic
      backgrounds and test whether faster polarisation predicts more sulcal defects
      (more variable cortical folding) — connecting canalisation theory in evo-devo
      to the topological invariant framework.

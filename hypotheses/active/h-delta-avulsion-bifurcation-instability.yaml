id: h-delta-avulsion-bifurcation-instability
title: >
  River delta avulsion is triggered when the channel superelevation ratio
  (h_levee/h_bf) exceeds a threshold of ~1.0, determined by the balance between
  in-channel deposition rate and floodplain aggradation — making avulsion
  frequency predictable from channel morphology and sediment flux data.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-delta-avulsion-prediction
evidence_links:
  - type: supporting
    note: "Mohrig et al. (2000) avulsion threshold: h/H ≈ 1 when superelevation equals bankfull depth — validated for 4 modern deltas"
    confidence: 0.75
  - type: related
    note: "Slingerland & Smith (2004) numerical model: bifurcation instability at 3–5× bankfull discharge — agrees with Yellow River avulsion record"
    confidence: 0.70
  - type: related
    note: "Jerolmack & Swenson (2007) time-averaged avulsion period scales as T_av ∝ A^{3/8}/Q_s — testable from planform geometry alone"
    confidence: 0.65
proposed_tests:
  - description: >
      Remote sensing survey: use 30-year Landsat archive to measure channel
      superelevation and bankfull depth for 20 actively avulsing deltas. Track
      h/H ratio in the 5 years before observed avulsion events. Test: avulsion
      occurs within 2 years of h/H crossing 0.9–1.1.
  - description: >
      Physical flume experiment: run laboratory delta with controlled sediment supply
      and base level. Continuously measure superelevation. Record avulsion timing.
      Build N=100 avulsion events dataset. Fit Weibull survival function — test
      h/H threshold model vs. stochastic null hypothesis.
related_disciplines:
  - geomorphology
  - sedimentology
  - hydrology

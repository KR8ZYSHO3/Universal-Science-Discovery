proposed_tests:
  - description: >
      Compare CCN concentration predictions from: (1) purely inorganic Köhler model, (2) kappa-Köhler with
      organic fraction parameterization, against CCNC measurements from 5 surface sites with contrasting
      aerosol composition (urban, marine, forest, dust). Evaluate whether organic kappa reduces prediction
      error by >50%.
    method: "CCNC measurements + OA/inorganic mass fraction from AMS + kappa-Köhler prediction comparison"
    prediction: "Kappa model should reduce RMSE in CCN(S=0.1-1%) by >50% at forested sites dominated by BVOC-derived SOA"


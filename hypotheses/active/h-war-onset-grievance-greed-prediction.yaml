id: h-war-onset-grievance-greed-prediction
title: >
  Interstate war onset is better predicted by power transition dynamics (rising
  challenger approaching parity with hegemon) than by grievance measures, while
  civil war onset is better predicted by horizontal inequality (grievance) and
  resource lootability (greed) — the two onset mechanisms are fundamentally
  distinct and require separate predictive models.

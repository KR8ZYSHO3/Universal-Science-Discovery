evidence_links:
  - doi: "10.1017/S0022381613000595"
    type: supporting
    confidence: 0.65
    note: >
      Organski & Kugler (1980), Ward & Beardsley (2009): power transition
      theory — wars cluster in periods when challenger GDP approaches 80-120%
      of hegemon GDP; predictive accuracy 65-70% for interstate wars in
      directed dyad analysis.
  - doi: "10.1093/pan/mph012"
    type: supporting
    confidence: 0.62
    note: >
      Collier & Hoeffler (2004) greed vs. grievance model for civil wars:
      resource dependence (greed) outperforms ethnic/religious grievance in
      regression; lootable resources (diamonds, opium) predict onset better
      than inequality.
  - doi: "10.1017/S0003055409090042"
    type: related
    confidence: 0.58
    note: >
      Hegre & Sambanis (2006) sensitivity analysis: civil war onset results
      are fragile to model specification; only GDP per capita and population
      are consistently significant predictors across specifications.
proposed_tests:
  - description: >
      Out-of-sample prediction tournament: train separate models for interstate
      and civil war onset on COW/UCDP data 1950-2000, validate on 2001-2023.
      Compare predictive accuracy (AUC-ROC) of (1) power transition features,
      (2) grievance features (horizontal inequality, ethnic polarisation),
      (3) greed features (resource rents, contraband), and (4) combined model.
      Test: does cross-validated AUC differ significantly between models for
      interstate vs. civil wars, confirming the dual-mechanism hypothesis?

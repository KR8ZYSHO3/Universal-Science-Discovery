id: h-sai-regional-precipitation-monsoon-disruption
title: >
  Stratospheric aerosol injection sufficient to limit global warming to 1.5°C
  would reduce African and Asian monsoon precipitation by 5-15% due to
  reduced sea surface temperature gradients, creating a geophysical moral
  hazard where SAI benefits for high-latitude nations impose precipitation
  costs on low-latitude agricultural regions.

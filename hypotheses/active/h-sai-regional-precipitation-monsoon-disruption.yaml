proposed_tests:
  - description: >
      Run a 100-member ensemble of the Community Earth System Model (CESM2-
      WACCM) with and without SAI (targeting 1.5°C global mean temperature)
      using the parallel offset strategy. Analyse precipitation changes over
      the Sahel (15°N), Indian subcontinent, and Southeast Asia for monsoon
      season (JJAS). Test: does ensemble agreement on monsoon reduction exceed
      >80% of models for >5% precipitation reduction? Uncertainty characterisation
      critical for governance decisions.

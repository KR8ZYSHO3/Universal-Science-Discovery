id: h-reversible-computing-landauer-limit
title: >
  A reversible adiabatic logic gate implemented in a quantum dot or molecular switch
  can perform one logical operation with energy dissipation within 100× the Landauer
  bound (100 kT ln 2) at 300K and 1 GHz clock rate, demonstrating that the gap
  between current transistors (~10⁶ kT) and the physical limit is an engineering
  problem, not a fundamental one.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
related_disciplines:
  - physics

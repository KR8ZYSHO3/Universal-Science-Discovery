id: h-topology-chern-number-predicts-edge-state-count
title: >
  The bulk-boundary correspondence in topological insulators is exact: the number
  of protected conducting edge modes equals the absolute value of the Chern number
  |C₁| of the bulk Hamiltonian — and this equality is violated only when the
  bulk-boundary correspondence breaks down due to non-Hermitian effects or
  disorder stronger than the bulk topological gap.

proposed_tests:
  - description: >
      Fabricate a series of Chern insulator devices (e.g. magnetically doped
      topological insulator (Bi,Sb)₂Te₃ thin films) with programmed Chern numbers
      C₁ = 1, 2, 3 via controlled magnetic layer stacking. Measure the number of
      chiral edge modes by scanning tunnelling spectroscopy and compare to the
      predicted |C₁|. Test whether each edge mode contributes exactly e²/h to
      the Hall conductance.
    method: "MBE growth + STM edge state imaging + Hall bar transport at millikelvin temperatures"
    prediction: "Hall conductance = |C₁|e²/h quantised to 1 part in 10^4; STM counts |C₁| distinct edge modes"
  - description: >
      Photonic Chern insulator: fabricate a gyromagnetic photonic crystal slab with
      broken time-reversal symmetry (yttrium iron garnet with applied magnetic field).
      Compute predicted Chern numbers from band structure; measure the number of
      unidirectional edge channels by microwave transmission in a rectangular geometry
      with defects. Test whether defects scatter between edge modes (if |C₁| > 1)
      or are fully transmitted (if |C₁| = 1).
    method: "Photonic crystal fabrication + microwave vector network analyser transmission measurements + numerical FDTD simulation"
    prediction: "Number of unidirectional channels = |C₁|; immunity to backscattering from defects smaller than photonic bandgap"


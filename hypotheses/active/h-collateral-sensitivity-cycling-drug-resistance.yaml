evidence_links:
  - doi: "10.1371/journal.pbio.1002184"
    type: supporting
    confidence: 0.74
    note: >
      Munck et al. (2015) demonstrate collateral sensitivity exists in clinical
      E. coli isolates; antibiotic pairs with high collateral sensitivity identified;
      supports the existence of fitness valley exploitation for resistance suppression.
  - doi: "10.1038/s41559-019-0800-6"
    type: supporting
    confidence: 0.70
    note: >
      Nichol et al. (2019) adaptive therapy with collateral sensitivity cycling
      significantly outperforms static combination therapy in bacterial evolution
      experiments; consistent with fitness valley trapping mechanism.
proposed_tests:
  - description: >
      Serial passage experiment: E. coli UTI strain evolved under (1) ampicillin
      alone, (2) ciprofloxacin alone, (3) concurrent amp+cipro, (4) alternating
      amp/cipro cycling guided by measured collateral sensitivity network; measure
      MIC fold-change at day 7, 14, 21; primary endpoint: does collateral sensitivity
      cycling suppress multi-drug resistance emergence vs. concurrent combination?

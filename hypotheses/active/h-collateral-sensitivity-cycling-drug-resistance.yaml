id: h-collateral-sensitivity-cycling-drug-resistance
title: >
  Sequential antibiotic cycling designed using measured collateral sensitivity networks
  (where resistance to drug A creates susceptibility to drug B) maintains pathogen
  populations in a trapped fitness valley, preventing multi-drug resistance emergence
  and reducing clinical resistance rates by >50% relative to concurrent combination
  therapy in empirically testable E. coli UTI models.
status: active
priority: high
impact_score: 0.85
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - pharmacology

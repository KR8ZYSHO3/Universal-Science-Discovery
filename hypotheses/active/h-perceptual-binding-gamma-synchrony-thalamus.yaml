proposed_tests:
  - description: Record high-density ECoG during multifeature object perception, measuring cross-area gamma phase coherence as function of feature conjunction complexity
  - description: Test whether disrupting thalamic relay activity (optogenetics in rodents) selectively impairs feature binding while preserving individual feature detection
  - description: Decode bound vs. unbound percepts from gamma synchrony patterns using cross-validated linear classifiers
bounty: "Demonstrate that thalamic disruption selectively impairs cross-modal feature binding without affecting unimodal detection at matched difficulty"

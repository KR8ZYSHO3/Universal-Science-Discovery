id: h-placebo-endogenous-opioid-dlpfc-pad
title: >
  Placebo analgesia is mediated by top-down descending inhibition: expectation of
  pain relief activates dorsolateral prefrontal cortex → PAG → spinal cord, releasing
  endogenous opioids that suppress ascending pain signals at the spinal dorsal horn;
  naloxone blocks placebo analgesia confirming opioid dependence, and the magnitude
  of placebo effect correlates with functional DLPFC-PAG connectivity.

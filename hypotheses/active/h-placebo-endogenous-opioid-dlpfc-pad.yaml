proposed_tests:
  - description: >
      dcTMS-fMRI combined study: use double-cone coil TMS to disrupt DLPFC function
      during placebo cream application (conditioning + test pain). Measure: pain ratings,
      PAG BOLD response, spinal fMRI BOLD. Test: does DLPFC disruption prevent placebo
      analgesia and reduce PAG activation by predicted >40%?
    prediction: "DLPFC TMS reduces placebo analgesia by >50% (p<0.001); PAG BOLD during placebo condition reduced by >35%; spinal dorsal horn BOLD shows reduced inhibition."

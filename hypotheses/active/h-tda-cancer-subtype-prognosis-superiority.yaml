id: h-tda-cancer-subtype-prognosis-superiority
title: >
  Topological Data Analysis (Mapper algorithm) applied to TCGA breast cancer gene
  expression data will identify at least one prognostically significant patient
  subgroup — defined by topological isolation (a flare or connected component
  in the Mapper graph) — that is missed by k-means, hierarchical clustering,
  and PAM50 molecular subtypes, and that shows a statistically significant
  difference in 10-year overall survival (log-rank p < 0.01) compared to the
  most similar standard subtype

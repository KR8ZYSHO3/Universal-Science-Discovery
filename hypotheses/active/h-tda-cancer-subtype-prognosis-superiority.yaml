evidence_links:
  - type: supporting
    doi: "10.1073/pnas.1102826108"
    note: >
      Nicolau et al. (2011) PNAS — proof-of-concept: Mapper found a breast cancer
      subgroup with 100% survival that clustering missed; this hypothesis calls for
      systematic replication with larger TCGA dataset and survival endpoints
  - type: supporting
    doi: "10.1038/srep01236"
    note: >
      Lum et al. (2013) Sci Rep — Mapper applied to Type 2 diabetes and other
      disease datasets; demonstrates generality of topology-based subtype discovery
  - type: related
    url: "https://www.cancer.gov/tcga"
    note: >
      TCGA (The Cancer Genome Atlas) — provides the gene expression, clinical outcome,
      and molecular subtype data needed for this test
  - type: contradicting
    url: "https://doi.org/10.1200/JCO.2009.22.1283"
    note: >
      Parker et al. (2009) J Clin Oncol — PAM50 molecular subtypes validated for
      prognosis; the comparison benchmark this hypothesis must outperform
proposed_tests:
  - summary: >
      Apply KeplerMapper to TCGA BRCA RNA-seq (n=1,093) using the first two UMAP
      components as filter and cosine distance as the metric. Use a resolution of
      30 bins with 50% overlap. Identify topologically isolated subgroups (flares,
      isolated nodes) in the Mapper graph. For each identified subgroup: (a) test
      whether it is assignable to an existing PAM50 subtype by majority vote,
      (b) run Kaplan-Meier survival analysis with log-rank test vs. the majority
      PAM50 subtype. Falsifying criterion: if no Mapper subgroup has log-rank
      p < 0.01 after Bonferroni correction for the number of subgroups tested,
      hypothesis is rejected.
  - summary: >
      Replication test: apply the same pipeline to METABRIC dataset (n=1,980)
      to confirm that any identified subgroup replicates across independent cohorts.
      A subgroup found only in TCGA and not replicating in METABRIC is likely an
      overfitting artifact.
  - summary: >
      Comparison with UMAP + DBSCAN clustering (the natural competing method) using
      the same feature space and survival endpoint. If DBSCAN identifies the same
      subgroup, TDA provides no advantage. If Mapper finds a subgroup missed by
      DBSCAN, the advantage is specifically topological (connected component structure
      preserved by Mapper but lost in density-based clustering).

id: h-lorenz-attractor-seasonal-forecast-skill
title: >
  The observed skill of subseasonal-to-seasonal (S2S) forecasts beyond the 2-week
  Lorenz predictability limit arises from the low-dimensional attractor of large-scale
  atmospheric modes (MJO, quasi-stationary waves) that have Lyapunov exponents 3-5x
  smaller than the full atmospheric attractor, predicting that S2S skill scales
  inversely with the MJO amplitude Lyapunov exponent (lambda_MJO ~ 0.15 per day).

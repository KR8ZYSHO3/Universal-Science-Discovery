id: h-innovation-diffusion-network-topology
title: >
  Innovation S-curve shape is primarily determined by the adopter network topology —
  scale-free networks accelerate early diffusion but truncate the long tail, while
  lattice-like networks produce symmetric S-curves, and early adoption centrality
  statistics predict long-run diffusion success with > 70% accuracy.
status: active
priority: medium

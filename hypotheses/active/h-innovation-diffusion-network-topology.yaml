proposed_tests:
  - description: >
      Agent-based simulation: implement SIR-like adoption model on 4 network types
      (Erdős-Rényi, Barabási-Albert, small-world, lattice) with heterogeneous
      thresholds. Measure S-curve shape parameters (inflection point, asymmetry,
      ceiling fraction). Test hypothesis that scale-free networks produce left-skewed
      S-curves with higher variability in final adoption.
  - description: >
      Empirical validation: fit S-curve models to 50+ technology diffusion datasets
      (mobile phones by country, solar panel adoption by US state, COVID vaccine
      uptake). Measure adopter network properties from social media follow graphs.
      Test correlation between network heterogeneity (CV of degree) and S-curve
      asymmetry parameter.

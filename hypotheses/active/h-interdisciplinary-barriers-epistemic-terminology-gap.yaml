evidence_links:
  - doi: "10.1093/scipol/scx003"
    type: supporting
    confidence: 0.60
    note: >
      National Academies (2004) Facilitating Interdisciplinary Research:
      identifies terminology differences as top-reported barrier in survey
      of 120 interdisciplinary research teams; structural barriers rank second.
  - doi: "10.1007/s11135-020-01016-9"
    type: supporting
    confidence: 0.55
    note: >
      Herschberg et al. (2018) study of interdisciplinary grant proposals:
      reviewers trained in one discipline systematically downgrade proposals
      that use heterodox methodologies — reflects methodological ontology
      incompatibility.
  - doi: "10.1007/s00191-020-00691-5"
    type: related
    confidence: 0.55
    note: >
      Eigenbrode et al. (2007) Philosophy of Science for Sustainability:
      workshops that explicitly address ontological differences (what counts
      as evidence, what is a cause) show higher rated research output quality
      than workshops focused on team building alone.
proposed_tests:
  - description: >
      Randomised trial of 60 interdisciplinary research teams: half receive
      ontology-bridging facilitation (explicit workshops on each field's
      standards of evidence, causal claims, and model validation), half
      receive team-building facilitation (trust, communication). Outcomes
      at 2 years: joint publications, co-supervision of students, and
      peer-rated research quality. Test: does ontology-bridging arm produce
      significantly higher joint publication rate than team-building arm?

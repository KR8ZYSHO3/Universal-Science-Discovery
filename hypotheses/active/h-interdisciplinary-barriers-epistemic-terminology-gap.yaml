id: h-interdisciplinary-barriers-epistemic-terminology-gap
title: >
  The primary barrier to effective interdisciplinary collaboration is not
  institutional (separate departments, funding streams) but epistemic —
  fields develop incompatible ontologies and methodological standards that
  create untranslatability; structural interventions (joint appointments,
  interdisciplinary centres) improve collaboration only when paired with
  explicit ontology bridging.

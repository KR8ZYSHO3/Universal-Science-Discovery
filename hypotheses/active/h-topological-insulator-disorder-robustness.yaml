id: h-topological-insulator-disorder-robustness
title: >
  Topological surface states in Z2 topological insulators remain conducting under
  time-reversal-symmetric disorder up to a critical disorder strength W_c proportional
  to the bulk gap Delta, above which a topological Anderson transition drives the
  surface into an Anderson-localized phase.
status: active
priority: medium
impact_score: 0.72
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - condensed-matter-physics
  - algebraic-topology
unknowns_addressed:
  - u-topological-insulator-surface-state-interactions
evidence_links:
  - doi: "10.1103/PhysRevLett.102.136806"
    type: supporting
    confidence: 0.78
    note: >
      Li et al. (2009) predict topological Anderson insulator: disorder can induce
      a topological phase in a trivial band insulator, supporting the robustness
      of topological phases to disorder within a window.
  - doi: "10.1103/PhysRevB.76.045302"
    type: supporting
    confidence: 0.82
    note: >
      Fu & Kane (2007) show Z2 invariant is protected by time-reversal symmetry;
      only magnetic impurities (which break TRS) can gap the surface states.
proposed_tests:
  - description: >
      Transport measurements on Bi2Se3 thin films with controlled non-magnetic disorder
      (irradiation-induced vacancies) to map conductance as a function of disorder
      strength, testing whether surface conductance persists until a critical W_c.

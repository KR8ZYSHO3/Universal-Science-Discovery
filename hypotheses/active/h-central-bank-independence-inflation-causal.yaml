id: h-central-bank-independence-inflation-causal
title: >
  Central bank independence (CBI) causally reduces inflation by removing the
  time-inconsistency problem (dynamic inconsistency of optimal monetary policy),
  but this effect is conditional on fiscal dominance: when government debt is
  unsustainable, CBI cannot prevent fiscal inflation regardless of its formal
  mandate, as shown by the fiscal theory of the price level.

proposed_tests:
  - description: >
      Natural experiment: exploit variation in CBI reform timing across 40 countries
      1980-2020. IV: political fractionalization at time of reform. Test: does CBI
      reduce inflation by more when government debt/GDP < 60% than when debt/GDP > 90%?
    prediction: "CBI reduces inflation by 3-5 pp in low-debt countries; reduces inflation by <1 pp (statistically insignificant) in high-debt countries (interaction p<0.05)."

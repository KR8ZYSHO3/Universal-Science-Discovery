id: h-resurgence-connects-perturbative-nonperturbative-qft
title: >
  Resurgence theory can systematically reconstruct the full non-perturbative content
  of four-dimensional quantum field theories from the divergence pattern of their
  perturbation series, making transseries the correct mathematical language for QFT.
status: active
priority: high
impact_score: 0.82
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - type: supporting
    note: "Dunne & Ünsal (2012-2016) demonstrated resurgence in quantum mechanics and 2D QFTs — non-perturbative contributions (instantons) are encoded in the large-order behavior of perturbation series"
  - type: supporting
    note: "Écalle (1981) resurgence theory provides the mathematical framework: Borel-Laplace resummation of transseries; alien calculus connects different sectors"
  - type: supporting
    note: "Argyres & Ünsal (2012): neutral bisphaleron contributions in QCD are precisely encoded in the perturbative large-order behavior — resurgence works quantitatively in a 4D-like theory"
  - type: contradicting
    note: "Renormalon singularities in QCD (on positive Borel axis) obstruct simple Borel resummation — whether OPE condensates cancel renormalon ambiguities in all cases is unproven"

unknowns_addressed:
  - u-perturbation-series-borel-summability-qft

proposed_tests:
  - description: >
      Test resurgence predictions in exactly solvable 2D theories (Sine-Gordon,
      PCF sigma model): compute perturbative series to high order, perform Borel
      resummation, compare with known exact non-perturbative results (S-matrix,
      mass spectrum). Resurgence predicts exact cancellation of ambiguities.
    method: "High-order perturbation theory computation (symbolic algebra) + Borel-Padé resummation + comparison with exact S-matrix from integrability"
    prediction: "Resurgent transseries reproduces exact results; cancellation of Stokes phenomena and renormalon ambiguities is exact to machine precision"
  - description: >
      Apply resurgence to the QCD vacuum condensate: use the OPE + renormalon
      structure to predict the gluon condensate ⟨αs/π G²⟩ from the large-order
      behavior of the perturbative QCD series.
    method: "Combination of high-order perturbative QCD (Padé approximants), Borel resummation with renormalon subtraction, comparison with lattice QCD condensate values"
    prediction: "Renormalon-subtracted Borel sum plus non-perturbative condensate gives scheme-independent finite result; condensate value matches lattice measurement"

related_disciplines:
  - mathematics
  - quantum-field-theory
  - mathematical-physics
  - perturbation-theory

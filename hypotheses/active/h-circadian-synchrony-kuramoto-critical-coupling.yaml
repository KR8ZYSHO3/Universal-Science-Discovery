id: h-circadian-synchrony-kuramoto-critical-coupling
title: "SCN circadian synchrony operates near the Kuramoto critical coupling K_c, making jet-lag recovery time maximally sensitive to VIP neuropeptide signaling strength"
status: active
created: "2026-05-05"
priority: high
impact_score: 0.82

evidence_links:
  - type: supporting
    doi: "10.1016/j.neuron.2010.09.023"
    note: "Welsh et al. (2010) Neuron - VIP knockout produces desynchrony; coupling is essential for coherent output"
  - type: supporting
    doi: "10.1529/biophysj.104.058388"
    note: "Gonze et al. (2005) - quantitative Kuramoto model of SCN fits synchrony data with K near K_c"
  - type: supporting
    note: "Empirical observation that jet-lag recovery is slow (3-7 days for 9-hour shift) consistent with near-critical, slow re-entrainment"

proposed_tests:
  - description: "Measure VIP concentration in SCN slice cultures and correlate with order parameter r; test whether r vs VIP concentration follows Kuramoto scaling r ~ sqrt((K-K_c)/K_c)"
  - description: "Administer VIP agonist to SCN-desynchronized mice post-simulated jet lag; measure recovery time; predict recovery time from Kuramoto dynamics"
  - description: "Compute the PRC of the intact SCN using light pulses at multiple phases; compare to Kuramoto predicted PRC shape; test if discrepancy predicts east-west asymmetry"


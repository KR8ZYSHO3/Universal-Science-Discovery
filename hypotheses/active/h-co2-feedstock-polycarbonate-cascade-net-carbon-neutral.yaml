id: h-co2-feedstock-polycarbonate-cascade-net-carbon-neutral
title: >
  CO₂ copolymerization with epoxides (using Zn or Co salen catalysts) to produce
  polycarbonate plastics is net carbon-negative over the product lifetime when
  accounting for CO₂ sequestration, fossil feedstock displacement, and incineration
  end-of-life — making CO₂-based polymers a scalable industrial carbon sink.
status: active
priority: high
impact_score: 0.76
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-green-chemistry-pharmaceutical-e-factor-continuous-flow
evidence_links:
  - type: supporting
    note: "Coates & Hillmyer (2009) Angew Chem 48:2 — CO₂/epoxide copolymerization with bifunctional salen catalysts gives up to 50 wt% CO₂ in resulting polycarbonate (PPC, PPLA); >100 kg CO₂/tonne polymer sequestered during production"
    confidence: 0.80
  - type: supporting
    note: "Leitner (1999) Science 284:1780 — supercritical CO₂ as both reaction medium and feedstock for carboxylation reactions; catalyst turnover number >1000 demonstrated for model substrates"
    confidence: 0.73
  - type: contradicting
    note: "LCA of CO₂-based polycarbonates (von der Assen & Bardow 2014 Energy Environ Sci) — lifecycle GHG balance depends critically on CO₂ source (industrial point source vs. atmospheric capture) and energy input for compression; fossil-derived CO₂ feedstock is only marginally better than fossil polymer unless renewable electricity used"
    confidence: 0.72
  - type: contradicting
    note: "Thermal stability of CO₂-derived polycarbonates (PPC) is inferior to BPA-polycarbonate — degradation above 200°C limits processing and end-use applications, constraining market size"
    confidence: 0.65
proposed_tests:
  - description: >
      Comparative LCA of CO₂-derived polypropylene carbonate (PPC, from CO₂ +
      propylene oxide, Zn glutarate catalyst) vs. petroleum-derived polypropylene
      using ISO 14040/14044 methodology. Functional unit: 1 tonne of flexible
      packaging film. System boundary: cradle-to-grave including CO₂ capture
      (from steel mill flue gas), catalyst production, polymerization, processing,
      use, and incineration end-of-life. CO₂ stored in polymer counted as negative
      emission during production; CO₂ released at incineration counted as positive.
      Prediction: CO₂-derived PPC from industrial point-source CO₂ with renewable
      electricity for compression achieves net -0.5 to -1.0 tonne CO₂-eq/tonne
      polymer compared to +1.5-2.0 for petroleum PP — a net benefit of 2.0-3.0
      tonnes CO₂-eq/tonne polymer.
  - description: >
      Batch vs. continuous flow comparison of CO₂/propylene oxide copolymerization
      using immobilized salen-Co catalyst: E-factor for batch reactor vs. continuous
      tubular reactor with in-line CO₂ separation and recycling. Prediction: continuous
      flow reduces E-factor from ~15 (batch, including solvent and catalyst waste)
      to <3 (continuous, with CO₂ recycling and catalyst immobilization) — demonstrating
      that process engineering dominates green chemistry metric improvement over
      catalyst chemistry for this reaction.

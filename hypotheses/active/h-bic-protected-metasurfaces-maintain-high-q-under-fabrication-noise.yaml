id: h-bic-protected-metasurfaces-maintain-high-q-under-fabrication-noise
title: >
  Quasi-BIC dielectric metasurfaces that co-optimize symmetry protection and footprint maintain higher
  median Q under realistic fabrication noise than high-index resonator baselines without BIC design constraints.
status: active
priority: medium
impact_score: 0.55
created: "2026-05-08"
last_updated: "2026-05-08"
author: USDR

evidence_links:
  - doi: "10.1038/s41566-018-0314-4"
    type: related
    confidence: 0.47
    note: "BIC design principles suggest high-Q robustness pathways under controlled perturbations."

unknowns_addressed:
  - u-bic-metasurface-q-factor-radiative-disorder-limit

proposed_tests:
  - description: >
      Monte Carlo fabricate-and-measure campaign comparing quasi-BIC and non-BIC resonator layouts under
      matched process variation and footprint constraints.
    method: Nanofabrication split lots with SEM-derived geometry statistics and optical linewidth extraction.
    prediction: Quasi-BIC designs retain >=1.5x higher median Q at equal process variance.

related_disciplines:

proposed_tests:
  - description: >
      Synthesize Bi0.5Sb1.5Te3/MoS2 nanocomposites (0, 0.5, 1, 2 wt% MoS2) by spark plasma sintering.
      Measure S (Seebeck), sigma (4-probe), and kappa (laser flash). Compute zT = S^2*sigma*T/kappa.
      Compute Onsager L_ij from S and sigma. Compare Onsager-predicted efficiency vs. measured
      power output in a Harman-method measurement.
    method: "SPS synthesis + Seebeck + 4-probe conductivity + laser flash kappa + Harman method"
    prediction: "zT > 2.5 at 450 K for 1 wt% MoS2; Onsager efficiency prediction within 5% of Harman-measured efficiency"

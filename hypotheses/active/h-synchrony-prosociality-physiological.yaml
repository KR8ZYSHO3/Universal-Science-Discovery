id: h-synchrony-prosociality-physiological
title: >
  The prosocial effect of rhythmic synchrony is mediated by shared arousal state
  (measured by heart rate variability coherence) rather than self-other overlap or
  mirror neuron activation, and the effect is eliminated when arousal is equated
  between synchrony and asynchrony conditions.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: medium
impact_score: 0.65
related_disciplines:
  - social-psychology
  - cognitive-science
  - psychophysiology
  - art-and-cognition
unknowns_addressed:
  - u-rhythm-synchronization-social
evidence_links:
  - type: supporting
    note: >
      Feldman (2007) documented heart rate synchrony between mothers and infants
      during synchronous vs. asynchronous interaction; synchrony predicted later
      social-emotional development, consistent with physiological coupling as mechanism.
  - type: contradicting
    note: >
      Valdesolo & DeSteno (2011) found prosocial effects of synchrony under conditions
      where arousal levels were not measured; whether arousal explains the effect
      or whether motor self-other overlap is the mechanism is not disentangled.
  - type: related
    note: >
      Cross et al. (2015) found prosocial effects of synchrony in children that
      were not explained by positive affect alone, suggesting a mechanism beyond
      simple arousal but the physiological mediator was not measured.
proposed_tests:
  - description: >
      Randomly assign pairs to synchronous (tapping same rhythm), asynchronous (different
      rhythms), and yoked-arousal conditions (asynchronous but matched HRV arousal level
      via biofeedback). Measure prosocial behavior (resource sharing, cooperation game).
      Test whether arousal-yoked asynchronous pairs show the same prosocial behavior
      as synchronous pairs.
  - description: >
      Pre-register a multi-site replication of synchrony-prosociality studies with
      continuous ECG recording to compute HRV coherence as a mediator. Test mediation
      model against self-other overlap model using structural equation modeling.

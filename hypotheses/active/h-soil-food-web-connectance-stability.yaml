proposed_tests:
  - description: >
      Assemble published soil food web matrices from grassland and forest soils, compute modularity Q and
      connectance C, then simulate pulse perturbations using community matrix local stability analysis.
      Regress return time against modularity at matched connectance across webs.
    method: "Community matrix eigenvalue analysis + Louvain modularity; cross-system regression"
    prediction: "Return time negatively correlates with modularity (r < -0.6) across at least 15 soil food webs at matched connectance bins"

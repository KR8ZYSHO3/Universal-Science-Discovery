proposed_tests:
  - description: Collect daily stool samples from 20 healthy volunteers before, during (7 days), and after (30 days) a standard antibiotic course (ciprofloxacin); perform 16S rRNA sequencing; fit gLV models to pre-antibiotic time series; compute diagonal dominance criterion for each individual; correlate with post-antibiotic recovery time; test whether negative diagonal dominance predicts faster microbiome recovery (large basin of attraction hypothesis).

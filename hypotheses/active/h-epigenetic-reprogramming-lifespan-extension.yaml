id: h-epigenetic-reprogramming-lifespan-extension
title: >
  Cyclic partial reprogramming using Oct4, Sox2, and Klf4 (OSK) without c-Myc
  in post-mitotic neurons extends mouse lifespan by 15-20% when initiated at
  midlife, by resetting the Horvath epigenetic clock without inducing pluripotency
  or increasing cancer risk.
status: active
priority: critical
impact_score: 0.88
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - epigenetics
  - geroscience
  - molecular-biology
unknowns_addressed:
  - u-epigenetic-clock-causal-mechanism
evidence_links:
  - doi: "10.1038/s41586-023-05892-5"
    type: supporting
    confidence: 0.78
    note: >
      Partial reprogramming in vivo reverses epigenetic age in retinal ganglion
      cells and restores visual function; OSK expression resets clock without
      teratoma formation, supporting safety of cyclic reprogramming.
  - doi: "10.1016/j.cell.2022.12.028"
    type: supporting
    confidence: 0.72
    note: >
      Yang et al. (2023) show systemic OSK expression via AAV extends mouse
      healthspan and reverses multiple age-related phenotypes; consistent with
      epigenetic clock causally driving aging.
proposed_tests:
  - description: >
      Inducible OSK transgenic mice (doxycycline-controlled); cyclic dosing
      (2 weeks on / 4 weeks off) from 12 months of age; primary endpoints:
      median lifespan, epigenetic clock age at 18 and 24 months, cancer incidence.
      Compare OSK vs. OSK+c-Myc vs. sham to test safety of oncogene-free protocol.

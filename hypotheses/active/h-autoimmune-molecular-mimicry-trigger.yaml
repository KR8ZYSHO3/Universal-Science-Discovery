id: h-autoimmune-molecular-mimicry-trigger
title: >
  Environmental microbial antigens that share structural epitopes with self-proteins
  (molecular mimicry) are the primary environmental triggers of autoimmune disease
  in genetically predisposed individuals carrying HLA risk alleles.
status: active
priority: high
impact_score: 0.78

proposed_tests:
  - description: >
      Measure two-point correlation functions G^{(2)}(t,t') between Hawking phonon modes outside and
      partner modes inside the BEC sonic horizon. Fit to two-mode squeezed state model and compare
      squeezing parameter r to thermal Hawking prediction r(T_H) = arctanh(exp(-ω/2T_H)).
    method: "BEC sonic black hole + density-density correlations from time-of-flight imaging + Bogoliubov model fitting"
    prediction: "Entanglement squeezing parameter should match Hawking thermal prediction within 15% for T_H consistent with measured horizon"


id: h-active-nematic-defect-tissue-extrusion
title: >
  In epithelial monolayers modelled as 2D active nematics, +½ topological defects
  are causally sufficient to trigger apoptotic cell extrusion through compressive
  stress concentration above a critical threshold, making defect density a mechanical
  homeostasis variable that the tissue actively controls.

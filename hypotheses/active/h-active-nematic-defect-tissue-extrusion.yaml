proposed_tests:
  - description: >
      Micro-fabricated tissue geometry that forces +½ defect formation at specified
      locations using geometric confinement; measure apoptosis probability at defect
      cores vs. distance from core; test causal sufficiency by blocking mechanical
      signalling (Y-27632) and confirming extrusion requires intact actomyosin.

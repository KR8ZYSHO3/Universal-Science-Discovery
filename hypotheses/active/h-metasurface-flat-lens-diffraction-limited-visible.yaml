proposed_tests:
  - description: >
      Fabricate TiO₂ metalenses (pillar diameter 50-200 nm, height 600 nm, period
      180 nm on fused silica) using e-beam lithography + atomic layer deposition.
      Characterise: focusing efficiency at 532, 660, 780 nm; Strehl ratio vs. field
      angle; PSF vs. aperture at NA = 0.5, 0.7, 0.9, 1.0; chromatic aberration
      FWHM broadening per 10 nm bandwidth.
    method: >
      Confocal point-spread function measurement; Huygens-Fresnel propagation
      simulation for comparison; Strehl ratio from peak intensity normalised to
      Airy peak
    prediction: >
      NA = 0.9 metalens: Strehl ratio > 0.8 (diffraction-limited) at 532 nm;
      efficiency > 80%; chromatic aberration PSF broadening < 15% per 50 nm
      bandwidth
  - description: >
      Compare metalens (TiO₂) vs. equivalent aspherical refractive lens
      (same NA, diameter, wavelength) for Strehl ratio, aberration, efficiency,
      and stray light under identical illumination conditions.
    method: Head-to-head optical bench comparison; test in fluorescence microscopy application
    prediction: Metalens matches or exceeds refractive lens on all metrics except chromatic bandwidth

id: h-metasurface-flat-lens-diffraction-limited-visible
title: >
  Silicon titanium dioxide (TiO₂) metasurface metalenses at visible wavelengths
  (532 nm) can achieve diffraction-limited focusing efficiency > 80% and
  Strehl ratio > 0.8 at numerical apertures > 0.9 using geometric phase
  (Pancharatnam-Berry) encoding, outperforming equivalent-aperture
  refractive lenses while reducing thickness by 3 orders of magnitude.

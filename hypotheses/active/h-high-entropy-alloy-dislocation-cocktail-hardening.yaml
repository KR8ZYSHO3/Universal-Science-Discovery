id: h-high-entropy-alloy-dislocation-cocktail-hardening
title: >
  The exceptional strength-ductility combination in CrMnFeCoNi-type high-entropy
  alloys arises primarily from chemical short-range order (SRO) that creates
  spatially heterogeneous Peierls barriers, causing dislocations to develop wavy
  glide paths that reduce stress concentrations at grain boundaries and delay
  necking to strains exceeding 50%.
status: active
priority: high
impact_score: 0.77

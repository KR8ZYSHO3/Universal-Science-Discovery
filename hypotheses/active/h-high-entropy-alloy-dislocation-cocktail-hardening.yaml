evidence_links:
  - doi: "10.1038/s41524-020-0289-z"
    type: supporting
    confidence: 0.70
    note: >
      Varvenne et al. (2020) SRO-based theory predicts that chemical heterogeneity
      in HEAs increases the standard deviation of local Peierls barriers, causing
      wavy slip and the strength-ductility improvement.
  - doi: "10.1038/ncomms9748"
    type: supporting
    confidence: 0.75
    note: >
      Gali & George (2013) TEM study of CrMnFeCoNi shows wavy dislocation lines
      and planar slip; consistent with heterogeneous glide caused by SRO-induced
      Peierls barrier variation.
proposed_tests:
  - description: >
      Prepare CrMnFeCoNi samples with controlled SRO via annealing at 450-700 degrees C
      for 1, 10, 100 hours; measure SRO by diffuse X-ray scattering; tensile test
      at 77 K and 293 K; test whether strength-ductility product correlates with
      measured SRO parameter, and whether SRO-free (disordered) samples show reduced
      ductility at equivalent strength as predicted by wavy-slip mechanism.

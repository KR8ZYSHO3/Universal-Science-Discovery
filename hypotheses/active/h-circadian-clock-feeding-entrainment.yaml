id: h-circadian-clock-feeding-entrainment
title: >
  Peripheral circadian clocks in metabolic organs (liver, pancreas, adipose) are
  primarily entrained by feeding time rather than light, operating via NAD+/SIRT1 and
  AMPK metabolic signalling, and time-restricted feeding can resynchronise dysynchronised
  peripheral clocks independently of the SCN.
status: active
priority: medium
impact_score: 0.76

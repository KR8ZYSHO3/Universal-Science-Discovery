proposed_tests:
  - description: >
      Human cross-over trial: standardise light exposure, randomise feeding window (06:00-18:00
      vs. 12:00-24:00); measure peripheral clock phase in white blood cells, buccal epithelium,
      and subcutaneous adipose biopsies using Per2 reporter qPCR time series.

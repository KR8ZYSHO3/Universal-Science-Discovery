proposed_tests:
  - discipline: materials-science
    description: >
      Fabricate PZT capacitors with 4 electrode types: Pt (conventional), LSCO (conducting
      oxide), SrRuO3, and IrO2. Cycle to 10^9 switching events at 1 kHz. Measure remnant
      polarisation every decade. After fatigue, perform in-situ EDS mapping of oxygen
      vacancy distribution. Test whether pinning-site density at domain walls correlates
      with fatigue rate across electrode types.
  - discipline: condensed-matter-physics
    description: >
      Use STEM-EELS to image oxygen vacancy distribution in fatigued and unfatigued
      PZT domain walls. Test whether vacancy density is specifically enhanced at domain
      walls (vs. bulk) by >10x in fatigued films, and whether the domain wall width
      increases (pinned wall vs. free wall) in proportion to local vacancy concentration.

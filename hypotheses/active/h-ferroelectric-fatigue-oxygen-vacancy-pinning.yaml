id: h-ferroelectric-fatigue-oxygen-vacancy-pinning
title: >
  Ferroelectric fatigue in perovskite thin films is caused by oxygen vacancy accumulation
  at domain walls under cyclic electric fields, which pins domain wall motion rather
  than suppressing nucleation; the fatigue rate is proportional to the oxygen vacancy
  mobility and the density of pre-existing domain wall pinning sites, and can be
  reduced by engineering low-vacancy-mobility electrode interfaces.

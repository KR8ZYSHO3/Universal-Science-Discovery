id: h-ubi-labour-supply-innovation-offset
title: >
  Universal basic income at 30-50% of median income reduces labour force
  participation by 5-10% (negative income effect) but produces offsetting
  benefits via entrepreneurship and innovation spillovers from income security,
  resulting in near-zero net macroeconomic output effect while substantially
  improving wellbeing and reducing poverty traps.
status: active
priority: medium
impact_score: 0.72
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - economics
  - social-science
  - public-policy
  - behavioural-economics
unknowns_addressed:
  - u-universal-basic-income-macro-effects
evidence_links:
  - doi: "10.1093/qje/qjy029"
    type: supporting
    confidence: 0.65
    note: >
      Banerjee et al. (2019) GiveDirectly Kenya RCT: unconditional cash
      transfers to villages show 2-3% labour supply reduction but significant
      increase in enterprise formation and livestock investment — positive
      risk-taking under income security.
  - doi: "10.1093/restud/rdac066"
    type: supporting
    confidence: 0.68
    note: >
      Hoynes & Schanzenbach (2018) US Food Stamp natural experiment:
      long-run quasi-experimental evidence; negative income effects on
      hours worked are modest (-3 to -5%) for primary earners.
  - doi: "10.1146/annurev-economics-080217-053220"
    type: related
    confidence: 0.58
    note: >
      Hendren & Sprung-Keyser (2019) MVPF analysis: cash transfers to working-
      age adults have MVPF near 1 for transfers below median income; above-
      median transfers show disincentive effects.
proposed_tests:
  - description: >
      Analyse the Stockton, CA SEED RCT and Finland basic income experiment
      with extended follow-up (3+ years). Primary outcomes: employment rate,
      hours worked, self-employment rate, business registrations, and
      educational enrolment. Test: does self-employment and business formation
      rate increase enough to offset reduced employment hours? Use Labour
      Force Survey microdata to separate extensive margin (participation) from
      intensive margin (hours) effects.

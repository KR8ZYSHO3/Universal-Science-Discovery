id: h-durotaxis-cancer-metastasis
title: >
  Tumour metastasis preferentially occurs toward stiffer tissues (liver, lung, bone)
  because cancer cells follow durotaxis — mechanosensing-directed migration toward
  higher substrate stiffness — and stiffness gradients in the tumour microenvironment
  predict metastatic routes with quantitative accuracy.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
related_disciplines:
  - biology
  - biophysics
  - cancer-biology
  - physics
unknowns_addressed:
  - u-cell-jamming-tissue-development
evidence_links:
  - type: supporting
    doi: "10.1016/j.cell.2006.06.044"
    note: >
      Engler et al. (2006) show cells migrate toward stiffer substrates and that
      stiffness directs stem cell fate — establishing durotaxis as a real phenomenon
      with large effect sizes. Primary target organs of metastasis (liver ~1-2 kPa,
      lung ~2-5 kPa, bone ~25-40 kPa) are among the stiffest soft tissues in the body.
  - type: supporting
    doi: "10.1038/s41563-018-0201-x"
    note: >
      Seo et al. (2020) and related studies show stiffened tumour stroma promotes
      invasion; YAP/TAZ mechanosensors active in stiff microenvironments promote
      metastatic gene expression programs.
  - type: contradicting
    note: >
      Some metastatic cancers preferentially colonise soft tissues (brain metastases
      occur in a 1 kPa environment). Durotaxis alone cannot explain all metastatic
      tropism — organ-specific adhesion molecules, immune environment, and vascular
      accessibility also determine metastatic preference.
proposed_tests:
  - discipline: biophysics
    description: >
      Construct a 3D microfluidic device with continuous stiffness gradient (0.5-40 kPa
      via polyacrylamide hydrogel composition) and inject cancer cells (MCF-7 for
      breast, HCT116 for colon, PC-3 for prostate). Track cell migration direction
      over 72 hours. Quantify durotaxis index (fraction of cells migrating up-gradient).
      Test whether durotaxis index correlates with the clinical frequency of metastasis
      to hard (bone) vs. soft (brain) target organs for each cell line.
  - discipline: oncology
    description: >
      Retrospective analysis of breast cancer metastatic site (bone vs. liver vs. lung
      vs. brain) correlated with stiffness of primary tumour microenvironment (measured
      by ultrasound elastography or AFM on biopsy). Test whether primary tumour stiffness
      predicts the stiffness rank of the preferred metastatic site across patients.

evidence_links:
  - type: supporting
    doi: 10.1126/science.1060818
    note: >
      Kulmala et al. (2004) — direct observation of new particle formation at 1-2 nm;
      burst events show spatial coherence consistent with instability-driven formation.
  - type: related
    doi: 10.1038/nature11214
    note: >
      Kirkby et al. (2011) — CLOUD experiment confirms sulfuric acid + amines drive
      nucleation; inhibitor species (condensation sink) suppress burst, consistent
      with activator-inhibitor framework.
  - type: related
    doi: 10.5194/acp-22-8473-2022
    note: >
      Nieminen et al. (2022) — global observations of nucleation bursts; burst
      intensity anti-correlates with condensation sink, supporting the inhibitor role.
proposed_tests:
  - discipline: atmospheric-chemistry
    description: >
      In a controlled smog chamber, systematically vary the spatial mixing of SO2
      (precursor for activator H2SO4) and pre-existing aerosol (condensation sink,
      inhibitor). Image particle number concentration across the chamber by spatially
      resolved SMPS. Measure spatial wavelength of burst clusters and test whether
      λ ∝ sqrt(D_H2SO4 / k_sink) as predicted by the Turing instability condition.
  - discipline: mathematics
    description: >
      Formulate a 2-component reaction-diffusion PDE for [H2SO4] (activator) and
      [condensation sink] (inhibitor) using CLOUD-constrained kinetic parameters.
      Perform linear stability analysis to find the critical wave vector k_c at
      the onset of spatial instability. Validate against observed burst wavelengths
      in field campaign data (SMEAR II, Hyytiälä).

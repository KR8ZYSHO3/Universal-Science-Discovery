id: h-turing-instability-aerosol-nucleation
title: >
  Atmospheric new particle formation exhibits a Turing-class reaction-diffusion instability
  driven by the short-range activation of sulfuric acid clusters and long-range inhibition
  by condensation sink vapour scavenging, such that nucleation burst wavelength scales
  with the square root of diffusivity divided by condensation rate as in classical Turing systems.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: medium
unknowns_addressed:
  - u-atmospheric-chemistry-aerosol-nucleation

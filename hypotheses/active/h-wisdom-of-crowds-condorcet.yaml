proposed_tests:
  - description: "Randomized experiment: 500 participants rate 20 products in two conditions (blind: no prior ratings shown; anchored: current mean displayed before rating); compute pairwise ρ between successive ratings in each condition; test H₀: ρ_anchored = ρ_blind using permutation test."
  - description: "Derive N_eff = N/(1+(N-1)ρ̂) from experimental ρ̂; compute the number of anchored raters needed to achieve the same accuracy as 10 blind raters; compare to the factor-of-2 theoretical prediction."

proposed_tests:
  - description: >
      Longitudinal study in 20 countries spanning gender equality index 0.6-0.9.
      Measure implicit gender-science IAT at age 10, 14, and 18. Track STEM
      enrollment at age 18-22. Test: does IAT mediate relationship between
      country-level gender equality and STEM enrollment? Mediation analysis.
    prediction: "IAT mediates >50% of country gender equality → STEM enrollment relationship; interventions reducing IAT by >0.3 SD increase STEM enrollment by >5 percentage points."

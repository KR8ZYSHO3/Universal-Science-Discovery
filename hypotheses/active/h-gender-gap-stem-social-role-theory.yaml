id: h-gender-gap-stem-social-role-theory
title: >
  Persistent gender gaps in STEM participation are primarily driven by gender-
  science implicit associations and social role expectations (women as communal,
  science as agentic), not ability differences; gaps are reduced by social comparison
  (female role models in STEM), and country-level variation tracks gender equality
  indices (r~0.6), confirming social construction of STEM gender identity.
status: active
priority: medium

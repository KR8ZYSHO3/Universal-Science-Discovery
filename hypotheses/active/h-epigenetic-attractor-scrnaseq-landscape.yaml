proposed_tests:
  - description: >
      Reconstruct the Waddington landscape from scRNA-seq time-course data during
      mouse embryonic stem cell differentiation using RNA velocity (dynamo) and
      potential energy estimation (VITAE); compare predicted barrier heights between
      attractor pairs to measured Yamanaka reprogramming efficiency from published
      literature for the same cell type pairs.
    method: "Dynamo RNA velocity on ESC differentiation time-course; Freidlin-Wentzell quasi-potential estimation; Spearman correlation with reprogramming efficiency"
    prediction: "Predicted quasi-potential barriers correlate with reprogramming efficiency with r > 0.65 across 15+ cell type pairs; direct transdifferentiation routes match predicted heteroclinic orbits"
  - description: >
      Test whether the rotational (non-gradient) component of the RNA velocity field
      predicts non-Waddington cell cycle behavior; measure the rotational flux
      magnitude as a function of cell cycle phase and compare to chromatin accessibility
      changes.
    method: "ATAC-seq + scRNA-seq multi-modal data; decompose velocity field into gradient and rotational components; correlate rotational flux with CDK activity"
    prediction: "Rotational flux magnitude peaks at G1/S and G2/M transitions; gradient component dominates during differentiation, rotational during proliferation"

id: h-epigenetic-attractor-scrnaseq-landscape
title: >
  RNA velocity vector fields from scRNA-seq data accurately recover the Waddington
  attractor landscape, with predicted barrier heights correlated with reprogramming
  efficiency across cell type pairs

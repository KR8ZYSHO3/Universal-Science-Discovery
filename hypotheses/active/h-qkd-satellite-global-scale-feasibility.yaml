evidence_links:
  - doi: "10.1126/science.aan3211"
    type: supporting
    confidence: 0.80
    note: >
      Liao et al. (2017) Micius satellite QKD achieves 1 kbps key rate over
      1200 km ground-to-satellite link; demonstrates feasibility of satellite
      QKD, supports scaling analysis.
  - doi: "10.1126/science.abb0525"
    type: supporting
    confidence: 0.72
    note: >
      Chen et al. (2021) twin-field QKD at 511 km achieves 0.5 bit/s; combined
      with satellite relay, this suggests intercontinental key rates approaching
      the kbit/day range needed for practical applications.
proposed_tests:
  - description: >
      Network simulation using Micius-measured channel loss (41-52 dB free-space),
      realistic detector efficiencies (25%), and 50-satellite LEO constellation
      at 500 km altitude; compute achievable key rate between Beijing-London using
      finite-key security bounds; test whether 1 Mbit/day threshold is achievable
      with current detector technology or requires efficiency improvement to 50%.

id: h-qkd-satellite-global-scale-feasibility
title: >
  Low-Earth-orbit satellite QKD (as demonstrated by Micius) can achieve key rates
  sufficient for a global quantum-secured network when combined with quantum memory
  nodes, predicting that a constellation of 50-100 LEO satellites with 30-second
  overpass windows achieves 1 Mbit/day secure key between any two ground stations
  separated by up to 10,000 km.
status: active
priority: high
impact_score: 0.80

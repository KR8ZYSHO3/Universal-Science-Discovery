id: h-homochirality-first-order-transition
title: "Prebiotic chiral symmetry breaking is a first-order phase transition requiring autocatalytic amplification factor >50, with Soai-like chemistry as the minimal model"
status: active
created: "2026-05-05"
priority: medium
impact_score: 0.70

evidence_links:
  - type: supporting
    doi: "10.1038/378596a0"
    note: "Soai et al. (1995) - autocatalytic amplification from near-zero to >99% ee; largest known natural autocatalytic chirality amplification"
  - type: supporting
    note: "Mathematical models of chiral autocatalysis show that for amplification factor A>A_c, the racemic state is unstable to small fluctuations — qualitative signature of a first-order transition"
  - type: contradicting
    note: "Atkinson & Brandts (2020) show that noise can prevent symmetry breaking even above A_c if the population is too small — questions the 'first-order' classification"

proposed_tests:
  - description: "Simulate chiral autocatalytic network with N molecules, amplification factor A, and random thermal ee fluctuations; measure the distribution of final ee; test for bimodality above A_c = 50"
  - description: "Measure Soai reaction outcome distribution for N = 10^6 to 10^12 molecules; determine whether ee distribution is bimodal (first-order) or broad unimodal (second-order)"
  - description: "Test whether Montmorillonite clay-templated polymerization of amino acids produces chiral amplification with A > 50 under prebiotic conditions (UV illumination, pH 6-8, T=25°C)"

unknowns_addressed:
  - u-chirality-emergence-prebiotic

proposed_tests:
  - description: Construct the Petri net representation of the dual-phosphorylation MAPK cascade (MEK→ERK→ppERK with phosphatase); identify minimal siphons using linear programming (CPLEX or Gurobi); verify that no siphon is a trap (necessary condition for persistence by Angeli-de Leenheer-Sontag theorem); validate experimentally by measuring ERK phosphorylation under increasing MEK inhibitor concentrations in HEK293 cells; test whether ppERK remains detectable even at 99% MEK inhibition.

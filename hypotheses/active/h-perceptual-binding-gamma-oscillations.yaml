id: h-perceptual-binding-gamma-oscillations
title: >
  Perceptual binding of features processed in different cortical areas is mediated by
  gamma-band (40-80 Hz) synchronization between areas, with binding failures
  (such as illusory conjunctions) corresponding to reduced inter-area gamma coherence
  measurable by MEG in temporal windows < 100 ms after stimulus onset.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-perceptual-binding-problem
related_disciplines:
  - neuroscience
  - cognitive-science
  - computational-neuroscience
evidence_links:
  - type: supporting
    doi: 10.1073/pnas.1320081111
    note: >
      Singer & Gray (1995) — gamma oscillations and visual feature binding;
      synchronous firing between V1 and V4 for features belonging to same object.
  - type: contradicting
    doi: 10.1016/j.neuron.2009.09.007
    note: >
      Roelfsema et al. (2004) — gamma binding hypothesis remains contested;
      some experiments show binding without gamma synchrony; alternative: routing
      hypothesis via alpha-beta suppression of irrelevant channels.
proposed_tests:
  - discipline: neuroscience
    description: >
      Present 200 displays containing bound (same object) vs unbound (illusory
      conjunction) colored shapes to 30 participants in MEG. Measure inter-area
      gamma coherence (40-80 Hz) between occipitotemporal (color) and parietal
      (shape) areas during 50-200 ms post-stimulus. Hypothesis: correct binding
      trials show higher inter-area gamma coherence (> 0.15 coherence units)
      than binding-error trials in the 80-150 ms window (p < 0.01, cluster-
      corrected permutation test).


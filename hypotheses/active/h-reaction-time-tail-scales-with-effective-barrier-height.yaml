id: h-reaction-time-tail-scales-with-effective-barrier-height
title: >
  Across two-choice perceptual tasks, fitted drift-diffusion threshold separation will predict the exponential tail scale of correct reaction times in the direction expected from Kramers first-passage asymptotics; falsified if tail scale is dominated by nondecision-time variation after hierarchical fitting.

proposed_tests:
  - description: >
      Fit hierarchical drift-diffusion models to perceptual decision datasets; compare threshold separation to reaction-time tail scales after controlling for nondecision time.
    method: Reanalysis of open behavioral datasets with posterior predictive checks.
    prediction: Threshold separation explains >= 20 percent of between-condition variation in tail scale.

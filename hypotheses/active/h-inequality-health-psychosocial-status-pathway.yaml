evidence_links:
  - doi: "10.1093/ije/dyg067"
    type: supporting
    confidence: 0.68
    note: >
      Wilkinson & Pickett (2009) cross-national study: Gini coefficient
      predicts life expectancy, infant mortality, and mental illness
      independently of mean income across 23 wealthy nations.
  - doi: "10.1007/s12160-007-9099-5"
    type: supporting
    confidence: 0.62
    note: >
      Sapolsky (2005) review: subordinate position in primate social
      hierarchies produces elevated glucocorticoids and cardiovascular risk;
      human parallels through Whitehall study grade gradient.
  - doi: "10.1136/bmj.331.7521.883"
    type: related
    confidence: 0.58
    note: >
      Lynch et al. (2000) critical review: some null results in multilevel
      studies suggest state-level Gini effects may reflect omitted confounders.
proposed_tests:
  - description: >
      Natural experiment: compare diurnal cortisol profiles and allostatic
      load biomarkers (CRP, fibrinogen, HbA1c) of matched individuals across
      US states with different Gini coefficients before and after a policy
      that reduced inequality in one state. Control for individual income and
      employment using inverse probability weighting. Test: does inequality
      reduction predict cortisol normalisation independently of individual
      socioeconomic change?

id: h-inequality-health-psychosocial-status-pathway
title: >
  Income inequality causally harms population health beyond individual poverty
  effects through the psychosocial status pathway: chronic HPA axis activation
  by status competition in unequal societies elevates cortisol, accelerates
  allostatic load, and reduces immune function, visible in health gradients
  even in middle and upper-middle income groups.
status: active
priority: high
impact_score: 0.76
created: "2026-05-06"
last_updated: "2026-05-06"

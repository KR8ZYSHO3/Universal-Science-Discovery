proposed_tests:
  - description: >
      In situ synchrotron X-ray diffraction during cycling: measure austenite
      peak broadening (dislocation density proxy) as function of cycle number
      (N = 1, 10, 100, 1000, 10000). Correlate ρ vs. N with transformation
      strain degradation ΔεSME(N). Test: linear ρ vs. ln(N) — consistent with
      cumulative slip model.
  - description: >
      Alloy composition test: compare functional fatigue in Ni₅₀Ti₅₀ vs.
      Ni₅₁Ti₄₉ (higher Ni suppresses martensite). Test hypothesis: higher
      critical stress for slip (σ_slip) relative to transformation stress (σ_t)
      extends functional fatigue life — predict 3× longer life for Ni-rich alloy.

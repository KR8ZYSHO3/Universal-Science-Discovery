id: h-sma-fatigue-martensitic-slip-competition
title: >
  Functional fatigue in NiTi shape-memory alloys is driven by irreversible slip
  dislocation accumulation in austenite during martensitic transformation — once
  dislocation density exceeds a critical threshold (ρ > 10¹⁴ m⁻²), the
  transformation becomes incomplete, and transformation stress increases without
  recovery of original superelastic plateau.

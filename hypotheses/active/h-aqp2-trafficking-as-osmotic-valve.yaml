id: h-aqp2-trafficking-as-osmotic-valve
title: >
  AQP2 vesicle trafficking to the apical membrane of kidney collecting duct
  principal cells functions as a molecularly switchable osmotic valve — with
  vasopressin-mediated PKA phosphorylation of Ser256 as the trigger — and
  the rate of trafficking is proportional to osmotic driving force (Δπ), making
  water reabsorption efficiency a function of both hormonal signal and physical gradient.

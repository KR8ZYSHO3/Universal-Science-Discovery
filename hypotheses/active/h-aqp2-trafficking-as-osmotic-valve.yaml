proposed_tests:
  - description: >
      Single-cell TIRF (total internal reflection fluorescence) microscopy of
      fluorescently tagged AQP2 in collecting duct cells: measure the kinetics
      of vesicle fusion events following vasopressin application as a function
      of ambient osmolality. Test: does fusion rate scale linearly with Δπ
      (van't Hoff predicted driving force)?
    method: "TIRF microscopy, single vesicle fusion event counting, osmolality clamp using sucrose"
    prediction: "AQP2 insertion rate ∝ Δπ, saturating at maximal PKA activation"
  - description: >
      Phosphomimetic AQP2-S256D (constitutively membrane-targeted) vs. AQP2-S256A
      (cannot be trafficked): compare water reabsorption rates across osmotic
      gradients in perfused cortical collecting duct to isolate trafficking-dependent
      vs. trafficking-independent osmotic valve function.
    method: "Isolated perfused tubule, osmotic water permeability measurement via fluorescence dilution"
    prediction: "AQP2-S256D phenocopies maximal vasopressin stimulation; S256A shows minimal gradient-dependent permeability increase"

id: h-flagellar-motor-proton-coupling-cryo
title: >
  Cryo-EM of the bacterial flagellar motor at sub-3-angstrom resolution will reveal
  a rocker-switch proton relay mechanism in MotA that couples Asp32 protonation to
  100-pm conformational changes driving ring rotation

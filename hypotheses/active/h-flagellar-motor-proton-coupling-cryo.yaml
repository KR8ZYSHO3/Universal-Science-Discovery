proposed_tests:
  - description: >
      Determine cryo-EM structures of the complete Escherichia coli stator (MotA4B2)
      in three states (apo, proton-bound at Asp32, post-translocation) using lipid
      nanodisc reconstitution and cryo-ET subtomogram averaging; measure the
      conformational change amplitude and identify the proton relay residues.
    method: "Cryo-EM with Volta phase plate on MotAB in POPC nanodiscs; 3D classification for state assignment; 2.5 Angstrom target resolution; AlphaFold2 model fitting"
    prediction: "Three states resolved at <3 Angstrom; Asp32 protonation causes 1.2-nm helix displacement in MotA; Arg90 acts as gating residue consistent with rocker-switch mechanism"
  - description: >
      Test the rocker-switch mechanism by measuring torque generation in E. coli
      flagellar motors with systematic Ala substitutions of putative proton relay
      residues; correlate torque loss with predicted proton channel closure.
    method: "Electrorotation assay for torque measurement; site-directed mutagenesis panel of MotA/MotB proton channel residues; compare torque-speed curves to wild-type"
    prediction: "MotA Arg90Ala abolishes torque generation; MotA Thr217Ala reduces torque by >50%; pattern consistent with rocker-switch proton relay disruption"

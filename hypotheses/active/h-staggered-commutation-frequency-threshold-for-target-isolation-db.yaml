    note: "Demonstrates principle; quantitative scaling law still **speculative**."
  - type: related
    confidence: 0.30
    note: "Numeric coefficients depend on switch technology node."

unknowns_addressed:
  - u-floquet-metamaterial-isolation-bandwidth-loss-tradeoff

proposed_tests:
  - description: >
      EM co-simulate commutated lines across Ω/ω sweeps with vendor SPICE switch models; extract isolation vs bandwidth ridge.
    method: Harmonic balance + Floquet modal analysis.
    prediction: Isolation collapses below threshold Ω/ω band identified within ±20% across models sharing Ron/Coff ranges.


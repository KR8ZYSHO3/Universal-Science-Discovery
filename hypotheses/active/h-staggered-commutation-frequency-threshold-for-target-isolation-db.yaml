id: h-staggered-commutation-frequency-threshold-for-target-isolation-db
title: >
  Achieving ≥20 dB isolation across ≥50 MHz instantaneous bandwidth at GHz carriers requires modulation frequency ≥0.05 ω_carrier
  for staggered commutated-line cells with realistic switch parasitics — below this ratio, Floquet sidebands overlap passbands and collapse isolation.
status: active
priority: medium
impact_score: 0.39
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR


id: h-transactive-memory-network-topology-performance
title: >
  Groups with small-world social network topology (high clustering coefficient, short
  average path length) achieve higher collective memory accuracy than random or
  lattice networks of equivalent size, because small-world structure enables both
  local redundancy (reduces forgetting) and global reachability (enables distributed
  recall), predicting memory accuracy scales as C/L where C is clustering coefficient
  and L is average path length.

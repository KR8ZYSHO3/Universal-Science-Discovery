    note: >
      Wegner (1987) transactive memory theory predicts expertise differentiation
      improves group memory; consistent with small-world topology enabling
      specialization plus efficient inter-expert communication.
  - doi: "10.1126/science.aat7663"
    type: supporting
    confidence: 0.70
    note: >
      Coman et al. (2016) show mnemonic convergence follows network structure
      in laboratory social networks; supports network topology shaping collective
      memory content and accuracy.
proposed_tests:
  - description: >
      Online experiment with groups of 20 participants; randomly assign to small-world,
      random, or lattice communication networks; encode a 100-item list; test collective
      recall after 24 hours via network-constrained sharing protocol; measure accuracy
      and coverage as a function of network topology parameters C and L.

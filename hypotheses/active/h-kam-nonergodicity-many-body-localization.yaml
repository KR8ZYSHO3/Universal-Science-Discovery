id: h-kam-nonergodicity-many-body-localization
title: >
  The KAM theorem's mechanism — preserved invariant tori in near-integrable systems —
  has a quantum analogue in many-body localisation, where disorder preserves an
  extensive number of approximate local integrals of motion (LIOMs) that prevent
  thermalisation, making MBL the quantum KAM theorem.

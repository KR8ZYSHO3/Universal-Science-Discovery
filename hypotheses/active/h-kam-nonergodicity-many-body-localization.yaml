proposed_tests:
  - description: >
      Compute LIOM localisation length as a function of disorder strength in 1D Heisenberg
      chain and compare with KAM threshold formula (perturbation parameter vs. frequency
      ratio); test whether the universality class of the MBL transition matches KAM
      break-up near resonance.

id: h-smr-proliferation-risk-lower
title: >
  Small modular reactors (SMRs) using LEU fuel and factory-sealed designs present
  materially lower proliferation risk than light-water reactors due to reduced
  on-site fuel handling, continuous regulatory surveillance, and inability to
  divert plutonium without detectable reactor shutdown signatures.
status: active
priority: high
impact_score: 0.72
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-advanced-fission-proliferation
evidence_links:
  - type: supporting
    note: "IAEA (2022) Safety and Security of Small and Medium-sized Reactors: sealed core designs physically prevent fuel access during operation"
    confidence: 0.70
  - type: related
    note: "Glaser & Goldston (2012) LEU-fueled reactors produce weapons-grade Pu at 1/5th rate of natural U reactors; continuous burnup monitoring feasible"
    confidence: 0.68
  - type: contradicting
    note: "Cochran & McKinzie (2008) thorium MSR produces U-233 which is a credible weapons material — MSR designs require separate proliferation analysis"
    confidence: 0.65
proposed_tests:
  - description: >
      Safeguardability analysis: model material accounting uncertainties for
      standardized SMR vs. large LWR using Monte Carlo simulation of IAEA
      inspector visit frequency, measurement uncertainty, and material quantity
      thresholds. Compute SQ (significant quantity) diversion detection time.
  - description: >
      Neutronics simulation: compute Pu vector (fraction of Pu-240) as function
      of burnup for 5 SMR designs (NuScale, Rolls-Royce SMR, Kairos KP-FHR,
      TerraPower Natrium, X-energy Xe-100). Compare weapons-grade threshold
      achievability across designs and fuel cycles.
related_disciplines:
  - nuclear-engineering
  - arms-control
  - energy-policy

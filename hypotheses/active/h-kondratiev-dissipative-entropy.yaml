evidence_links:
  - type: supporting
    note: >
      Kondratiev (1925) identified ~50-year cycles in commodity prices, interest rates,
      and production in major economies. Schumpeter (1939) linked them to "waves of
      creative destruction" — technological innovations that destroy existing capital
      and create new industries. The IT wave (1990-2020) is consistent with a ~30-year
      subcycle of the Kondratiev wave framework.
  - type: supporting
    doi: "10.1017/S1365100511000472"
    note: >
      Perez (2002) and formal economic models show that general-purpose technology
      diffusion follows a logistic S-curve with characteristic timescale ~25 years,
      consistent with the predicted period from the dissipative oscillation model.
  - type: contradicting
    note: >
      Kondratiev waves are contested in mainstream economics; their statistical
      identification in economic time series is subject to spectral analysis artefacts
      and different authors identify different periods (40-70 years). The connection
      to thermodynamic dissipation is currently unfalsified metaphor rather than
      quantitative prediction.
proposed_tests:
  - discipline: economics
    description: >
      Estimate the innovation diffusion timescale τ_d from S-curve fits to technology
      adoption data (railways, electricity, automobile, ICT) and the depreciation rate
      δ from capital stock data. Compute the predicted Kondratiev wave period T = 2π/√(δ/τ_d)
      from the dissipative oscillation model. Test whether the predicted period matches
      the observed Kondratiev wave period (47-60 years) across multiple technology waves.
  - discipline: economics
    description: >
      Apply the Goodwin (1967) predator-prey model to Piketty's (2014) capital share
      and labor share time series. Fit the model parameters and test whether the
      predicted period of the capital-labor ratio cycle matches the observed long-wave
      oscillation. Test whether the model's Hopf bifurcation boundary corresponds
      to observed crisis periods.

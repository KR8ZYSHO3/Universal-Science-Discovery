id: h-kondratiev-dissipative-entropy
title: >
  Kondratiev long waves (45-60 year economic cycles) are driven by the charge-
  discharge dynamics of technological capital — a slow dissipative oscillation
  whose period is determined by the product of the innovation diffusion timescale
  and the technological capital depreciation rate, both measurable from economic data.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: low

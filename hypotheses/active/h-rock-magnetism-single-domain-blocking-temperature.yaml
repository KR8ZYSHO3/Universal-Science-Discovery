proposed_tests:
  - description: >
      Isolate single-domain magnetite grains from a basaltic sample by magnetic separation. Measure
      grain volumes by transmission electron microscopy. Compute Stoner-Wohlfarth T_B from measured K
      (from first-order reversal curve FORC) and V. Compare predicted T_B to experimentally determined
      blocking temperature via stepwise thermal demagnetization.
    method: "TEM grain volume + FORC K measurement + stepwise thermal demagnetization blocking test"
    prediction: "SW-predicted T_B matches measured T_B within 10 K for > 80% of grains in the 40–120 nm size range"

id: h-traffic-flow-turing-instability-stop-go
title: >
  Phantom traffic jams arise via a Turing-like instability of uniform traffic flow:
  above the critical density rho_c, small velocity perturbations grow exponentially
  with growth rate sigma = 1/tau - v'(rho) > 0, producing backward-propagating stop-
  and-go waves whose wavelength is selected by the reaction time of drivers tau and
  the sensitivity of velocity to density v'(rho), analogous to Turing patterns in
  reaction-diffusion systems.

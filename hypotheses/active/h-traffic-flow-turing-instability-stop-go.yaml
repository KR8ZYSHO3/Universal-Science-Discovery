proposed_tests:
  - description: >
      Circular road experiment (analogous to Japanese experiment, Sugiyama et al. 2008):
      40 cars on a ring road at density rho > rho_c. Introduce a 2% velocity perturbation
      at t=0. Measure: does the perturbation grow at predicted rate sigma = 1/tau - v'(rho)?
      Compare theoretical wavelength 2pi × v_wave/sigma to observed stop-and-go wavelength.
    prediction: "Perturbation grows at rate 0.3-0.8 s^-1 (consistent with tau~1.5 s); stop-and-go wave propagates backward at 15 km/h; wavelength 1-3 km consistent with linear instability prediction."

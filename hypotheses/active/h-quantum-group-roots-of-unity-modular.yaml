id: h-quantum-group-roots-of-unity-modular
title: >
  The representation theory of quantum groups U_q(g) at q a root of unity is
  equivalent to the modular representation theory of the corresponding algebraic
  group G over a field of characteristic p — the Lusztig character formula
  connects quantum group representations at root of unity to Verma module
  composition factors in positive characteristic.
status: active
priority: medium

proposed_tests:
  - description: >
      Character computation: compute simple module characters for U_q(sl_3) at
      q = e^{2πi/p} for p = 5, 7, 11, 13 using Kazhdan-Lusztig basis of
      Hecke algebra. Compare to known modular representation characters of
      SL_3(F_p). Test: agreement for p ≥ 2ρ (where ρ = Weyl vector norm) — validates
      Lusztig conjecture range.
  - description: >
      Tilting module categorification: construct a braided tensor functor from
      quantum group tilting modules to G-modules (Verlinde category). Test
      functoriality on 20 lowest-weight modules. Verify: the functor is fully
      faithful on projective tilting modules at q = root of unity.

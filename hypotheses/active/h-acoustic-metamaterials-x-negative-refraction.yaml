proposed_tests:
  - description: Fabricate 5cm×5cm×2cm acoustic metamaterial slab with hexagonal array of silicone-coated tungsten spheres (diameter 2mm, lattice constant 3mm) in epoxy; measure effective medium parameters (ρ_eff, κ_eff) via transmission/reflection spectroscopy in water tank from 300-700 kHz; identify double-negative frequency band; image a 600 μm-diameter nylon wire phantom through the slab at the double-negative frequency; compare point spread function to diffraction-limited reference imaging without slab; quantify lateral resolution improvement factor.

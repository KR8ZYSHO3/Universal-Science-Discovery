proposed_tests:
  - description: >
      Use liquid-phase transmission electron microscopy (LPTEM) to directly image
      nucleation events in lysozyme and glucose isomerase crystallization; classify
      events as one-step (direct crystalline nucleus) vs. two-step (dense liquid
      droplet precursor followed by crystallization); measure relative frequency.
    method: "LPTEM at 300 kV in liquid cell; 100+ nucleation events for each protein; classification by structural order parameter during nucleation"
    prediction: ">60% of nucleation events proceed via detectable dense liquid droplet precursor; one-step nucleation accounts for <40% of events at moderate supersaturation"
  - description: >
      Test first-passage time theory predictions for nucleation rate by comparing
      CNT predictions to measured rates from dynamic light scattering for 20 proteins
      at multiple supersaturation levels; quantify the systematic discrepancy and
      test whether it correlates with the tendency to form dense liquid precursors.
    method: "DLS measurement of induction times for 20 standard proteins; CNT rate prediction from diffusion coefficient and interfacial tension; log10 discrepancy analysis"
    prediction: "CNT underestimates nucleation rates by 3-7 orders of magnitude; discrepancy correlates with spinodal decomposition tendency (LLPS propensity) measured by PEG-induced phase separation"

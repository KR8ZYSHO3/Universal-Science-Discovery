id: h-nucleation-two-step-protein-crystal
title: >
  Two-step nucleation via a dense liquid precursor phase accounts for >50% of protein
  crystallization events, with classical nucleation theory underestimating rates by
  3-7 orders of magnitude due to precursor-mediated barriers

id: h-gradient-penalty-magnitude-tracks-dual-feasibility-proxy-metrics
title: >
  On CIFAR-style benchmarks with matched architectures, the median L2 norm of critic gradients along convex combinations of real–fake batches will correlate negatively with inception-score collapse events when λ_GP is swept — falsified if training collapses while gradient norms remain uniformly small (indicating other failure modes dominate).

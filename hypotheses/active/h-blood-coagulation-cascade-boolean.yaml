proposed_tests:
  - description: "Recruit 40 hemophilia A patients on prophylaxis; measure PT, APTT, individual factor levels (II, V, VII, VIII, IX, X, XI, fibrinogen, AT-III, protein C); run ODE coagulation model (Kuharsky-Fogelson or equivalent); compare predicted vs. measured CAT thrombin generation parameters (peak height, lag time, ETP) by Bland-Altman analysis."
  - description: "Test whether ODE model predictions of optimal factor VIII trough level (for target ETP ≥ 85% of normal) agree with clinical dosing guidelines; compare predicted breakthrough bleed probability vs. actual bleed frequency in 12-month follow-up."

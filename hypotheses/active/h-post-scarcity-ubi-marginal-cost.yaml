id: h-post-scarcity-ubi-marginal-cost
title: >
  Near-zero marginal cost sectors (software, AI, digital goods) require a
  universal basic income or equivalent transfer mechanism to prevent permanent
  structural unemployment — the transition to post-scarcity economics is
  technologically feasible but requires a fundamental reconception of earned
  income as the primary distributional mechanism.
status: active
priority: medium
impact_score: 0.72
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-post-scarcity-economics-feasibility
evidence_links:
  - type: supporting
    note: "Brynjolfsson & McAfee (2014) The Second Machine Age: productivity-employment decoupling accelerating since 2000 in US; technology-driven"
    confidence: 0.65
  - type: related
    note: "Rifkin (2014) zero marginal cost society: renewable energy + digital goods approaching zero marginal cost; platform model captures rents"
    confidence: 0.55
  - type: related
    note: "Acemoglu & Restrepo (2020) task-displacing automation reduces labor share — consistent with structural unemployment hypothesis"
    confidence: 0.70
proposed_tests:
  - description: >
      Sector-level marginal cost analysis: estimate marginal cost trends for 30
      digital goods sectors (SaaS, streaming, AI inference) 2010–2030 using
      revenue/unit data. Test whether marginal cost declines follow exponential
      trend consistent with post-scarcity transition in information goods.
  - description: >
      Finland UBI experiment (2017–2018) extended reanalysis: beyond employment
      effects, measure subjective wellbeing, risk-taking (entrepreneurship),
      skill investment. Test whether UBI enables more human capital investment
      consistent with post-scarcity institutional design.

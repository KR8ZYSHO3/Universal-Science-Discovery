id: h-intermediate-disturbance-competition-colonization
title: "The Intermediate Disturbance Hypothesis produces a reliable diversity peak only when the competition-to-colonization rate ratio α/β > 10, and in communities with faster competitive exclusion the diversity-disturbance relationship is monotonically negative, explaining the majority of empirical IDH failures in fast-succession plant communities"
status: active
priority: medium
impact_score: 0.65
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1086/283246"
    type: supporting
    confidence: 0.65
    note: "Connell (1978) - IDH original proposal; intermediate disturbance promotes diversity"
  - doi: "10.1890/08-2302.1"
    type: contradicting
    confidence: 0.70
    note: "Fox (2013) - IDH should be abandoned: meta-analysis finding weak support"
  - type: supporting
    note: "Huston (1979) - general diversity theory; competitive exclusion rate as key parameter"

unknowns_addressed:
  - u-intermediate-disturbance-diversity-peak

proposed_tests:
  - description: >
      In grassland mesocosms, establish communities with contrasting competition-colonization rate ratios
      (manipulated by species composition) and apply disturbance at 4 frequency levels. Measure species
      richness at each frequency for each α/β ratio condition. Test whether diversity peak disappears when
      α/β < 10.
    method: "Mesocosm experiment with weekly disturbance treatments + species-specific growth rate measurement"
    prediction: "Communities with α/β > 10 should show a diversity peak at intermediate disturbance; communities with α/β < 5 should show negative monotonic relationship"

related_disciplines:
  - ecology
  - nonlinear-dynamics
  - conservation-biology

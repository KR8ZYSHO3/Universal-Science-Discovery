id: h-deep-carbon-mantle-reduced-phases
title: >
  Earth's deep interior stores carbon primarily as iron carbide (Fe₃C) and
  metallic iron-carbon alloys in the outer core and reduced lower mantle,
  with total deep carbon inventory 10–100× the surface reservoir — volcanic
  outgassing rate is the primary regulator of the long-term geologic carbon cycle.
status: active
priority: medium
impact_score: 0.72
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-deep-carbon-storage
evidence_links:
  - type: supporting
    note: "Dasgupta & Hirschmann (2010) deep carbon cycle review: subducted carbon flux ~80 Mt C/yr; arc return only 30 Mt/yr — 50 Mt/yr sequestered deep"
    confidence: 0.75
  - type: supporting
    note: "Wood (1993) high-pressure experiments: carbon dissolves in liquid iron as Fe₃C at core pressures — core may store 0.5–2 wt% C"
    confidence: 0.72
  - type: related
    note: "Tucker et al. (2018) deep carbon observatory synthesis: total mantle carbon 3–7× atmospheric — controls long-term pCO₂"
    confidence: 0.68
proposed_tests:
  - description: >
      Multi-anvil press experiment: determine C solubility in Fe liquid at 50–140
      GPa (core pressures), 4000–6000 K. Compare to seismic density deficit in
      outer core. Test: if C accounts for 1–2 wt% of core density anomaly, core
      is a viable deep carbon reservoir.
  - description: >
      Arc volcano carbon isotope budget: compile δ¹³C of CO₂ in arc gases globally.
      Mass balance subducted carbonate vs. organic carbon. Calculate fraction of
      subducted carbon returned vs. stored. Test mass balance closure to 95% CI.
related_disciplines:
  - geochemistry
  - mineral-physics
  - carbon-cycle

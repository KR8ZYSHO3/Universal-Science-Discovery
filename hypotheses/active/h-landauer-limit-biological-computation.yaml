id: h-landauer-limit-biological-computation
title: >
  Neural computation in cortex operates at 100-1000x above the Landauer limit of
  kT ln(2) per bit erased, and the excess dissipation is dominated by ion channel
  leakage rather than logical irreversibility, predicting that energy efficiency
  of computation in neurons scales with membrane resistance rather than computational
  complexity.
status: active
priority: medium
impact_score: 0.62
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - neuroscience
  - statistical-physics
  - information-theory
unknowns_addressed:
  - u-fluctuation-theorem-biological-motors
evidence_links:
  - doi: "10.1038/nature10872"
    type: supporting
    confidence: 0.80
    note: >
      Berut et al. (2012) experimentally verify Landauer's principle at kT ln(2)
      per bit; provides the baseline thermodynamic limit for comparison to neural
      energy consumption.
  - doi: "10.1016/j.cub.2012.02.058"
    type: related
    confidence: 0.65
    note: >
      Attwell & Laughlin (2001) show cortical energy budget is dominated by
      ion pump costs (maintaining resting potential), not action potential
      propagation; consistent with leakage rather than logical irreversibility
      dominating neural energy consumption.
proposed_tests:
  - description: >
      Patch-clamp recordings from cortical neurons in vitro; measure ATP consumption
      (via NADH imaging) as a function of firing rate; test whether energy-per-spike
      is independent of information content per spike (as predicted by leakage
      dominance) or scales with spike information as predicted by Landauer theory.

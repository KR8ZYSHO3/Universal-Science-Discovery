proposed_tests:
  - description: >
      Perform simultaneous calcium imaging of all cells in a medial entorhinal cortex grid module in a
      freely moving mouse exploring circular, square, and trapezoid arenas. Apply Vietoris-Rips
      persistent homology to population activity vectors. Test whether H1 Betti number = 2 (torus)
      and whether the torus aspect ratio matches the grid scale and orientation.
    method: "Miniscope calcium imaging + TDA (Ripser) + Betti number test + torus geometry fitting"
    prediction: "Persistent H1 shows two independent 1-cycles (torus) in > 90% of recording sessions; torus aspect ratio within 10% of grid scale ratio"

proposed_tests:
  - description: >
      Single-molecule optical tweezer experiment on F₁-ATPase: attach a bead
      to the γ-subunit; apply a series of torque pulses (from 0 to 40 pN·nm)
      driving rotation in forward and reverse directions; measure work W per
      rotation; compute e^{-βW} and compare to e^{-βΔG_ATP} measured independently
      by equilibrium calorimetry (ITC) at matched [ATP], [ADP], [Pi].
    method: "Magnetic tweezers on F₁-ATPase γ-subunit; 10,000 rotation events per load condition; bidirectional protocol enabling Crooks fluctuation theorem analysis; ITC measurement of ΔG_ATP at same conditions"
    prediction: "Jarzynski/Crooks estimate of ΔG_ATP from pulling experiments agrees with ITC within 1 k_BT (≈ 2.5 kJ/mol); systematic deviation at high [ADP]/[ATP] ratio tests the validity of thermodynamic coupling"
  - description: >
      Test NESM prediction for mitochondrial efficiency: measure entropy production
      rate σ̇ in isolated mitochondria at different substrate concentrations using
      microcalorimetry; compute thermodynamic efficiency η = (work output)/(total
      ΔG consumed); compare to Onsager coupling coefficient prediction from
      non-equilibrium flux-force analysis.
    method: "Nano-calorimetry of isolated liver mitochondria + ³¹P-NMR phosphorylation potential; vary ADP concentration from 0 to 2 mM; extract Onsager L_ij matrix from flux-force relationships"
    prediction: "Efficiency η peaks at 60-70% at physiological ADP concentrations (matching Onsager optimal coupling prediction for biological motors); η drops toward 0 at saturating ADP consistent with minimum entropy production principle"


id: h-jarzynski-equality-molecular-motor-efficiency-measurement
title: >
  The Jarzynski equality applied to single-molecule measurements of ATP synthase
  rotation under varying load predicts that the measured work distribution
  P(W) satisfies e^{-βW} = e^{-βΔG_ATP} with sub-k_BT precision, enabling
  measurement of ΔG_ATP hydrolysis in situ at physiological concentrations
  without equilibrium experiments.

id: h-geometric-control-se3-optimal-robotic-grasping
title: >
  Geometric controllers designed directly on SE(3) (the Lie group of rigid body motions)
  outperform quaternion-based controllers for robotic grasping of non-symmetric objects
  because they avoid representation singularities and converge globally, while
  Euclidean controllers fail in a set of measure zero that is irrelevant in theory but
  encountered in practice during large-angle maneuvers.

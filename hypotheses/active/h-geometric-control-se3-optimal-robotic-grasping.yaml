proposed_tests:
  - description: >
      Compare SE(3) geometric controller vs. quaternion SLERP controller on a 6-DOF
      robot arm grasping task requiring 270° total wrist rotation; measure success rate,
      convergence time, and proximity to singularity configurations across 1000 random poses.

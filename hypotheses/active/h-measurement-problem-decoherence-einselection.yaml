id: h-measurement-problem-decoherence-einselection
title: >
  Einselection (environment-induced superselection) solves the quantum measurement
  problem by selecting pointer states robust to environmental monitoring, making
  apparent wavefunction collapse a consequence of unitary evolution rather than
  an additional postulate — empirically testable via mesoscopic coherence beyond
  Caldeira-Leggett decoherence timescales.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-measurement-problem-interpretation
related_disciplines:
  - physics
  - quantum-mechanics
  - philosophy-of-science
  - condensed-matter-physics
evidence_links:
  - type: supporting
    doi: 10.1103/RevModPhys.75.715
    note: >
      Zurek (2003) — decoherence and einselection review; pointer states robust to
      environmental monitoring; classicality emerges from quantum Darwinism.
  - type: supporting
    doi: 10.1038/nphys3756
    note: >
      Schlosshauer (2019) — decoherence review; Caldeira-Leggett model predictions
      confirmed for mesoscopic objects; no experimental evidence for collapse beyond
      decoherence.
  - type: contradicting
    doi: 10.1007/s10701-009-9354-5
    note: >
      Bassi & Ghirardi (2003) — collapse models (GRW, CSL) predict measurable deviations
      from unitary evolution for large masses; testable at intermediate scales between
      atom and Planck mass.
proposed_tests:
  - discipline: physics
    description: >
      Levitate a ~10^10 amu SiO2 nanoparticle in high vacuum and cool its center-of-mass
      motion to the quantum ground state (as in Tebbenjohanns et al. 2021). Create
      a motional superposition state of amplitude ~1 nm. Measure the coherence time
      and compare to Caldeira-Leggett decoherence predictions at the measured vacuum
      pressure. Test whether any additional decoherence above the environmental model
      is present — which would signal collapse beyond decoherence.
  - discipline: philosophy-of-science
    description: >
      Formulate the precise empirical predictions that distinguish decoherence/einselection
      (no extra collapse), GRW collapse (CSL localisation rate), and many-worlds
      interpretations (quantum Darwinism redundancy in environment). Identify the
      minimum experimental sensitivity required to discriminate these at the 5-sigma level
      and map the gap between current technology and the required sensitivity.

id: h-capillary-wetting-pinning-length-universality-class
title: >
  Depinning of macroscopic contact lines on disordered micron-scale roughness belongs to a finite set of
  scaling universality classes when lengths are normalized by ell_c and the hysteresis bandwidth — testable
  on patterned libraries before claiming universality.

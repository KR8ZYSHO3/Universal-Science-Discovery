proposed_tests:
  - description: >
      Fabricate gradient libraries of roughness pitch at fixed chemistry; measure advancing/receding angles
      and depinning force distributions versus ell_c across two liquids.
    method: Atomic force microscopy + goniometry + high-speed imaging.
    prediction: Data collapse in normalized coordinates if a single universality class dominates mid-range disorder.


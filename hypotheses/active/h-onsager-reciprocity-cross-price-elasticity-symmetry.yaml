id: h-onsager-reciprocity-cross-price-elasticity-symmetry
title: >
  Onsager reciprocity for coupled thermodynamic transport — L_ij = L_ji — maps exactly onto
  Slutsky symmetry of the compensated demand matrix in consumer theory, implying that
  violations of Slutsky symmetry in empirical demand data correspond to non-equilibrium
  market conditions with measurable entropy production rates

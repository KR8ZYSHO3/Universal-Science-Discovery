proposed_tests:
  - description: >
      Estimate the Slutsky substitution matrix from household expenditure panel data for
      periods of stable prices (near equilibrium) and crisis periods (far from equilibrium);
      test whether Slutsky symmetry violations are significantly larger during crisis periods,
      consistent with non-equilibrium thermodynamic breakdown of Onsager reciprocity.
  - description: >
      Define an economic entropy production rate as the rate of utility loss from transaction
      costs and price volatility; correlate this quantity with Slutsky asymmetry across markets
      and time periods to test whether the thermodynamic framework makes quantitative
      predictions about demand system regularity violations.

id: h-island-formula-entanglement-wedge-quantum-error-correction
title: >
  The island formula's quantum extremal surface is the gravitational analog of the
  decoding threshold in quantum error correction: islands appear precisely when the
  entanglement wedge reconstruction map transitions from reconstructing exterior to
  interior operators, providing a quantum-information-theoretic derivation of the
  Page time as the threshold for interior information recovery.
status: active
priority: medium
impact_score: 0.73
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-black-hole-information-paradox-bulk-reconstruction
evidence_links:
  - type: supporting
    note: "Penington (2020) JHEP — island formula derived in JT gravity + non-gravitational bath; islands appear at the Page time, consistent with quantum error correction threshold interpretation"
    confidence: 0.75
  - type: supporting
    note: "Almheiri et al. (2019) JHEP — entanglement wedge reconstruction in AdS/CFT: bulk operators reconstructible from boundary when subregion > half the system; exact parallel to quantum error correction threshold"
    confidence: 0.80
  - type: supporting
    note: "Harlow & Hayden (2013) — quantum computational complexity argument that interior reconstruction from Hawking radiation requires exponential computation before Page time, polynomial after — consistent with threshold behavior"
    confidence: 0.70
  - type: contradicting
    note: "The island formula derivation relies on 2D JT gravity and random matrix universality; whether the quantum error correction identification extends to 4D Schwarzschild black holes without a CFT dual is not established"
    confidence: 0.60
proposed_tests:
  - description: >
      In the SYK model (solvable holographic dual), construct the entanglement wedge
      reconstruction map explicitly as a function of time. Test: the reconstruction
      map transitions from exterior-only to interior-accessible at t = t_Page =
      (S_BH/2) × (scrambling time). Verify that the transition is sharp (threshold)
      and that its sharpness scales as exp(−S_BH) in the large-S limit — the quantum
      error correction prediction.
  - description: >
      Random tensor network model of the Page curve: construct a random tensor network
      with boundary Hilbert space dimension exp(S_BH). Compute: (a) entanglement entropy
      of radiation subsystem as function of time (verify Page curve); (b) location of
      quantum extremal surface (verify island appears at Page time); (c) channel
      capacity from Hawking radiation to interior operators (verify threshold at Page time).
      All three quantities should coincide at the same time scale.

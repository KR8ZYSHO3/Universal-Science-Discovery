id: h-water-llcp-femtosecond-detection
title: "The water liquid-liquid critical point exists at T≈220 K, P≈100 MPa and will be detected by femtosecond X-ray free electron laser diffraction of transiently heated nanodroplets"
status: active
created: "2026-05-05"
priority: high
impact_score: 0.88

evidence_links:
  - type: supporting
    doi: "10.1360/360324a0"
    note: "Poole et al. (1992) - two-liquid model and LLCP prediction from simulation"
  - type: supporting
    note: "TIP4P/2005 and ST2 simulations consistently predict LLCP at 200-230 K, 50-150 MPa — within XFEL experimental reach"
  - type: supporting
    doi: "10.1126/science.1215897"
    note: "Sellberg et al. (2014) Nature - ultrafast X-ray probing of supercooled water structure"

proposed_tests:
  - description: "Evaporatively cool water nanodroplets (~100 nm) to T≈220 K, then probe structure factor S(q) with single XFEL pulses; detect density bimodality or compressibility divergence as LLCP signatures"
  - description: "Measure isothermal compressibility K_T from S(q,0) as a function of temperature along multiple isobars; test for K_T divergence at the predicted LLCP pressure"
  - description: "Compare X-ray structure factors in H2O and D2O supercooled nanodroplets; LLCP should shift by ~4 K due to isotope effect, providing a confirmatory test"

unknowns_addressed:
  - u-hydrogen-bond-network-water-anomalies

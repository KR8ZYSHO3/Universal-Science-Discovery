id: h-multiplicative-noise-pareto-exponent-capital-tax-rate
title: >
  The Pareto wealth exponent α across OECD countries quantitatively follows
  α = 1 + (r − g)/σ²_r + τ/σ²_r (Bouchaud-Mézard formula with redistribution
  correction), with α predictable from independently measurable macro-financial
  parameters to within ±0.2, confirming multiplicative noise as the mechanistic
  driver of wealth inequality dynamics.
status: active
priority: medium
impact_score: 0.74
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-econophysics-pareto-index-cross-national-variation
evidence_links:
  - type: supporting
    note: "Bouchaud & Mézard (2000) — analytical derivation gives α = 1 + ρ/σ² for pure multiplicative noise without redistribution; qualitatively consistent with observed range α=1.2–2.5 for plausible ρ,σ² values"
    confidence: 0.65
  - type: supporting
    note: "Piketty & Zucman (2014) QJE — r>g documented for 8 countries 1700–2010 with capital return data; r−g variation cross-nationally matches rank order of Pareto index estimates qualitatively"
    confidence: 0.60
  - type: related
    note: "Gabaix et al. (2016) — idiosyncratic shocks to firm size produce Zipf law; same multiplicative mechanism; cross-sectional variance σ²_r varies 3-fold across OECD"
    confidence: 0.55
  - type: contradicting
    note: "Measurement of Pareto α from top income shares (Atkinson, Piketty) conflates capital income (power law) and total income (bimodal); without separating labor vs. capital income, α estimates confound two distributions"
    confidence: 0.70
proposed_tests:
  - description: >
      For 25 OECD countries, compile: (1) α from wealth surveys (LWS database, top-
      wealth estimates from Alvaredo et al.); (2) mean capital return r from OECD
      national accounts; (3) GDP growth g; (4) cross-country equity return variance σ²_r
      from OECD financial accounts; (5) effective capital tax rate τ from OECD tax
      statistics. Fit: α_pred = 1 + (r−g+τ)/σ²_r. Test: Pearson r(α_obs, α_pred) > 0.7
      with slope = 1 ± 0.3 and intercept = 0 ± 0.2.
related_disciplines:

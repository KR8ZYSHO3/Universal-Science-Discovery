id: h-llzo-single-ion-conductor-eliminates-dendrite-nucleation
title: >
  LLZO (Li₇La₃Zr₂O₁₂) solid electrolyte with ionic conductivity σ > 10⁻³ S/cm
  and shear modulus G > 10 GPa prevents lithium dendrite nucleation at all
  practical current densities (< 10 mA/cm²) via the Monroe-Newman mechanical
  stability criterion, provided interfacial resistance is < 1 Ω·cm².
status: active
priority: high
impact_score: 0.90
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

evidence_links:
  - doi: "10.1038/nenergy.2016.141"
    type: supporting
    confidence: 0.72
    note: "Janek & Zeier (2016) review: LLZO meets Monroe-Newman criterion theoretically; practical cells still show dendrite failure"
  - doi: "10.1038/35104644"
    type: related
    confidence: 0.65
    note: "Tarascon & Armand (2001) established fundamental solid-state battery challenges"
  - type: contradicting
    note: "Several groups have observed Li dendrites penetrating LLZO at grain boundaries even at sub-mA/cm² — violating the Monroe-Newman prediction; suggests grain boundary conductivity is the dominant failure mode"

unknowns_addressed:
  - u-solid-state-battery-sei-interface-resistance-origin

proposed_tests:
  - description: >
      Fabricate single-crystal LLZO pellets (no grain boundaries) in contact
      with Li metal and measure the critical current density for dendrite
      nucleation as a function of stack pressure (0.5–10 MPa) and temperature
      (25–100°C), comparing to Monroe-Newman prediction.
    method: "Potentiostatic EIS + galvanostatic plating with in-situ X-ray tomography; define dendrite nucleation as >10% impedance increase during plating"
    prediction: "Single-crystal LLZO shows no dendrite nucleation below 5 mA/cm² at 25°C + 3 MPa pressure, validating Monroe-Newman; polycrystalline LLZO fails at 0.5 mA/cm², establishing grain boundary as the failure locus"
  - description: >
      Measure LLZO grain boundary ionic and electronic conductivity using
      impedance spectroscopy on bicrystal LLZO with controlled grain boundary
      chemistry, and determine whether the Li dendrite nucleation current at
      grain boundaries follows the prediction from local electric field
      concentration at the grain boundary groove.
    method: "Focused ion beam (FIB) patterning of electrodes on LLZO bicrystals; impedance spectroscopy separating bulk vs. grain boundary contributions; correlation with dendrite nucleation current"
    prediction: "Grain boundary electronic conductivity σ_e > 10⁻⁹ S/cm enables Li⁰ electrodeposition at grain boundaries; dendrite nucleation current scales inversely with grain boundary σ_e"

related_disciplines:

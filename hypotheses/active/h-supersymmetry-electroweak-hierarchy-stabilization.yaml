proposed_tests:
  - description: >
      HL-LHC (3000 fb⁻¹) search for compressed-spectrum gluino pair production
      (pp → g̃g̃ → qq̄χ̃⁰qq̄χ̃⁰) with soft jets + MET signature. Compressed spectrum
      (Δm(g̃,χ̃⁰) = 50-100 GeV) produces soft leptons below standard search thresholds.
      Prediction: 3σ excess in soft-lepton + MET channel at m(g̃) = 1.8 TeV
      if hypothesis is correct.
  - description: >
      LZ/XENONnT spin-independent WIMP-nucleon cross section measurement reaching
      10⁻⁴⁸ cm² sensitivity by 2028. If neutralino dark matter with mass 300-500 GeV
      and higgsino mixing fraction > 10%: predict cross section σ_SI = 10⁻⁴⁷–10⁻⁴⁶ cm²
      — just within planned experimental reach.

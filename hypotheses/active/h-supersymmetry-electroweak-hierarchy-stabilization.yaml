id: h-supersymmetry-electroweak-hierarchy-stabilization
title: >
  A compressed-spectrum supersymmetric extension of the Standard Model with gluino mass
  1.5-2 TeV and neutralino mass 300-500 GeV stabilizes the electroweak hierarchy,
  provides a dark matter candidate (lightest supersymmetric particle), and remains
  consistent with all current LHC exclusion limits while predicting observable signatures
  at the HL-LHC.

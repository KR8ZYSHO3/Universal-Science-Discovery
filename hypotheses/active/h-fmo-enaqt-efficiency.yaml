id: h-fmo-enaqt-efficiency
title: >
  Environment-assisted quantum transport (ENAQT) enhances excitation transfer
  efficiency in the FMO complex by 5-15% relative to the purely classical Förster
  limit under physiological bath conditions at 310 K.
status: active
priority: high
impact_score: 0.68
created: "2026-05-05"
last_updated: "2026-05-05"
related_disciplines:
  - quantum-biology
  - biophysics
  - quantum-physics
unknowns_addressed:
  - u-quantum-coherence-physiological-role
evidence_links:
  - doi: "10.1038/nature05678"
    type: supporting
    confidence: 0.55
    note: Engel et al. (2007) observe coherence signatures consistent with quantum transport
  - doi: "10.1103/PhysRevLett.103.146404"
    type: supporting
    confidence: 0.60
    note: Rebentrost et al. (2009) ENAQT theoretical prediction with model bath
  - doi: "10.1021/jp405421d"
    type: contradicting
    confidence: 0.50
    note: Scholes et al. (2017) argue oscillations are vibronic rather than electronic
proposed_tests:
  - description: >
      Compute energy transfer efficiency in full HEOM simulation of FMO
      (8-site model) with experimentally measured bath spectral density at
      310 K. Compare to Förster calculation with same site energies and
      couplings. Prediction: HEOM efficiency > Förster efficiency by 5-15%.
  - description: >
      Measure quantum yield of charge separation (FMO → reaction centre)
      as function of temperature (77-310 K) using single-molecule fluorescence.
      Prediction: quantum yield should be non-monotonic with temperature if
      ENAQT holds, with maximum near 250-280 K where dephasing is moderate.

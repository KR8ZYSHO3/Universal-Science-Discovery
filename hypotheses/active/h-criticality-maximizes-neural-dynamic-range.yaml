id: h-criticality-maximizes-neural-dynamic-range
title: >
  The brain operates at the critical branching parameter σ = 1 because this
  maximizes dynamic range (the ratio of strongest to weakest distinguishable
  input), information transmission, and number of metastable states
  simultaneously — and deviations from criticality in specific brain regions
  predict measurable cognitive impairment.

proposed_tests:
  - description: >
      Measure the branching parameter σ from multi-electrode array recordings
      in healthy vs. anesthetized vs. seizure-prone rodents, test whether
      dynamic range is highest at baseline (predicted: σ ≈ 1), reduced under
      anesthesia (predicted: σ < 1), and during ictal events (predicted: σ > 1).
    method: >
      Utah array recording (96 electrodes) + avalanche analysis + dynamic range
      measurement protocol (Shew et al. 2009 stimulation protocol)
    prediction: >
      Dynamic range Δ (in dB) is maximized at σ = 1 with a sharp peak; Δ under
      isoflurane anesthesia is reduced by > 10 dB; Δ during seizure initiation
      is also reduced despite higher activity (supercritical narrowing of range).
  - description: >
      Pharmacological tuning of criticality: titrate GABA_A agonist (muscimol)
      dose to systematically shift σ away from 1, measuring both σ and dynamic
      range in real time, and test whether σ = 1 corresponds to the peak of
      the dynamic range curve.
    method: Multi-electrode recording + pharmacological dosing + online σ estimation
    prediction: >
      Dynamic range Δ as a function of muscimol dose follows an inverted-U
      with peak at the dose that yields σ = 1 (estimated from avalanche statistics).

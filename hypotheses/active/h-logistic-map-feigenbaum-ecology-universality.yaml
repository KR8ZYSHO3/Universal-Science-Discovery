proposed_tests:
  - description: >
      Laboratory mesocosm study: Daphnia-algae microcosm with dilution rate r as
      control parameter. Sweep r systematically from 0.5 to 4.0. Record population
      density every 2 days for 500 generations. Test: do period-doubling bifurcations
      occur at predicted r values? Do bifurcation ratios converge to Feigenbaum constant?
    prediction: "First bifurcation at r≈3.0±0.1; second at r≈3.45±0.05; ratio of consecutive bifurcation intervals converges to δ=4.67 within 10% by the 4th bifurcation."

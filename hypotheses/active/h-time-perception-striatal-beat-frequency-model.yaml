id: h-time-perception-striatal-beat-frequency-model
title: >
  Interval timing in the seconds-to-minutes range is implemented by the striatal beat
  frequency (SBF) model: cortical oscillators set by dopaminergic input at time onset,
  with striatal medium spiny neurons detecting coincident activation patterns proportional
  to elapsed time, distortable by dopamine manipulation.

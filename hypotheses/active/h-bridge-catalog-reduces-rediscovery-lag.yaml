id: h-bridge-catalog-reduces-rediscovery-lag
title: >
  A publicly accessible cross-domain bridge catalog measurably reduces the average
  time between independent parallel discoveries in different fields (the "Merton
  multiple" lag), detectable through citation network analysis comparing pre- and
  post-catalog publication patterns.
status: active
priority: high
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR seed content (replace with GitHub handle when stewarded)

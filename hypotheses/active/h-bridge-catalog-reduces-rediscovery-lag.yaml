evidence_links:
  - type: related
    note: "Merton RK (1961) Singletons and multiples in scientific discovery. Proc Am Philos Soc 105:470-486 — documents the prevalence of simultaneous independent discovery across fields"
  - type: supporting
    confidence: 0.3
    note: "Uzzi B et al. (2013) Atypical combinations and scientific impact. Science 342:468 — shows that cross-domain citation combinations predict high-impact papers, supporting the claim that cross-domain knowledge transfer creates discovery value"
  - type: supporting
    confidence: 0.25
    note: "Pan RK et al. (2012) The evolution of interdisciplinarity in physics research. Sci Rep 2:551 — shows interdisciplinary papers have higher long-term citation impact, consistent with the bridge-catalog value proposition"
  - type: related
    note: "Boyack KW & Klavans R (2010) Co-citation analysis, bibliographic coupling, and direct citation: which citation approach represents the research front most accurately? J Am Soc Inf Sci Technol 61:2389 — establishes methodology for measuring cross-domain citation flow"
proposed_tests:
  - summary: >
      Citation network difference-in-differences study: identify domain pairs that have
      a USDR bridge entry (treatment) and matched pairs without a bridge entry
      (control), matched on baseline cross-domain citation rate and field size. Measure
      the time-to-cross-citation for new discoveries after bridge publication date.
      Test whether treated pairs show shorter rediscovery lags than controls.
  - summary: >
      Merton-multiple prospective study: track new discoveries in USDR-bridged domain
      pairs and compare the rate of "multiples" (near-simultaneous independent discovery)
      to the base rate documented by Merton (1961) and subsequent studies. If bridge
      catalogs accelerate knowledge transfer, the rate of true independent multiples
      should decrease (because researchers discover the prior work earlier) while the
      rate of explicitly cross-domain citations should increase.
  - summary: >
      Semantic similarity test: use embedding models (SciBERT, SPECTER) to compute
      semantic similarity between papers in bridged domain pairs vs. control pairs,
      measured at 6-month intervals following bridge publication. Test whether bridged
      pairs show faster semantic convergence — consistent with the bridge reducing
      mutual information distance between domain representations.
  - summary: >
      Direct survey: contact authors of papers that cite the USDR bridge catalog and
      ask whether the bridge entry revealed a prior result they were unaware of, and
      if so, what the estimated rediscovery lag would have been without the catalog.
      Aggregate to estimate the catalog's per-bridge lag reduction.

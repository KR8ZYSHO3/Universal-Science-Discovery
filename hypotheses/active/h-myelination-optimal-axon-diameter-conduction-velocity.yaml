proposed_tests:
  - description: >
      Collect electron microscopy g-ratio measurements from published datasets
      spanning ≥20 mammalian species across motor, sensory, and autonomic fibres.
      Implement a three-compartment cable model (axon + periaxonal space + myelin)
      with species-specific axoplasm resistivity. Compute predicted g_optimal for
      each fibre type and compare to measured distribution.
    method: "Meta-analysis of published EM g-ratio data + cable-equation numerical optimisation"
    prediction: "Measured g-ratio deviates from predicted optimal by < 10% in motor and sensory fibres; larger deviations in autonomic fibres (different cost function)"
  - description: >
      Measure g-ratios in remyelinating MS lesions at different stages of recovery
      using in vivo g-ratio MRI (magnetisation transfer + diffusion MRI). Compare
      remyelination g-ratio trajectory to cable-equation prediction for the axon
      diameters present in each lesion. Test whether g-ratio converges toward 0.6
      or toward a different value consistent with the reduced myelination capacity
      of remyelinating oligodendrocytes.
    method: "Longitudinal g-ratio MRI in MS patients during remyelination + cable model comparison"
    prediction: "Remyelinating axons converge to g < 0.6 (thinner myelin than optimal) due to OPC immaturity; conduction velocity recovers sub-optimally"


id: h-myelination-optimal-axon-diameter-conduction-velocity
title: >
  The observed g-ratio distribution of myelinated axons across mammalian species
  and fibre types represents the solution to a constrained optimisation problem
  (maximise conduction velocity per unit axon volume) predicted by the cable
  equation, and deviations from g_optimal ≈ 0.6 reflect specific metabolic
  or developmental constraints that can be predicted quantitatively.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"

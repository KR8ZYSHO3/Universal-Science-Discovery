proposed_tests:
  - description: >
      Rossby wave refractive index analysis in ERA5: compute NAM lag-correlation
      at 10 hPa → 1000 hPa. Test: does forcing stratospheric warming in AGCM increase
      variance of tropospheric jet position by predicted 20%? Partition inter-decadal
      jet variability into stratospheric vs internal tropospheric components.
    prediction: "Stratosphere explains 15-25% of inter-decadal tropospheric jet variability in reanalysis; mechanistic pathway via EP flux convergence verified in nudging experiments."

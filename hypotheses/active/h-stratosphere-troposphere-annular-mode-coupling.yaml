id: h-stratosphere-troposphere-annular-mode-coupling
title: >
  Stratospheric variability modulates tropospheric jet streams through anomalous
  Eliassen-Palm flux divergence that alters the refractive index for Rossby waves,
  shifting the tropospheric annular mode and accounting for ~20% of multi-decadal
  jet variability, detectable as lagged correlation between polar cap temperature
  and NAM/SAM indices.

id: h-critical-boolean-network-cell-type-count
title: >
  Critical Boolean gene regulatory networks (K=2) predict cell type number scaling
  as √N_genes, and this prediction is quantitatively validated by comparing attractor
  counts of inferred genome-scale Boolean networks with measured cell type diversity
  across organisms differing in genome size.
status: active
priority: high
impact_score: 0.82
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - systems-biology
  - computational-biology
  - evolutionary-biology
unknowns_addressed:
  - u-boolean-attractor-cell-fate-mapping
evidence_links:
  - doi: "10.1006/jtbi.1993.1196"
    type: supporting
    confidence: 0.80
    note: >
      Kauffman (1993) — √N prediction from critical K=2 networks; for N=20,000 genes
      predicts ~141 attractors, consistent with ~200 human cell types; organismal
      comparison: S. cerevisiae N=6,000 (√6000 ≈ 77, ~8 observed cell states) suggests
      the model overestimates for simple organisms
  - doi: "10.1103/PhysRevLett.86.4418"
    type: supporting
    confidence: 0.76
    note: >
      Aldana et al. (2003) — scale-free Boolean networks have fewer attractors than
      random K=2 networks with same mean degree; real GRNs are scale-free, potentially
      reconciling attractor count with observed cell type numbers
  - doi: "10.1038/nature15538"
    type: related
    confidence: 0.72
    note: >
      Regev & Shapiro (2002) — single-cell transcriptomics identifies discrete cell
      type clusters consistent with attractor hypothesis; number of clusters scales
      sub-linearly with genome complexity across vertebrates
proposed_tests:
  - description: >
      Infer Boolean GRN from ENCODE data for 5 species (C. elegans, Drosophila, zebrafish,
      mouse, human); compute mean K, identify phase (ordered/critical/chaotic); enumerate
      attractors; compare with measured cell type count from single-cell atlases.

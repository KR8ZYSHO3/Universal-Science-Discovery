proposed_tests:
  - summary: >
      Monte Carlo computation of thresholds for biased noise models (where X and Z
      errors have different rates) using the random-bond Ising model correspondence.
      Compare against direct quantum simulation thresholds on Google/IBM hardware.
      Confirm that the statistical mechanics method gives thresholds accurate to 1%
      across noise bias ratios from 1:1 to 100:1.
  - summary: >
      Extend the random-bond correspondence to fracton codes (Haah cubic code, X-cube).
      Identify the statistical mechanics model corresponding to fracton QEC. If the
      correspondence fails, identify which property of fracton topological order
      (sub-extensive ground state degeneracy, immobile excitations) breaks the mapping.
  - summary: >
      Experimental test: run surface code circuits on superconducting qubit hardware
      at error rates deliberately set above and below the estimated threshold.
      Measure logical error rate scaling as L increases. Confirm that below threshold,
      logical error rate decreases exponentially with L as the quantum phase transition
      picture predicts; above threshold, it increases.

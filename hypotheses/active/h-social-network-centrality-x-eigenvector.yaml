proposed_tests:
  - description: Use three empirical temporal contact datasets (SocioPatterns school, hospital, conference); simulate SIR with β_SIR = 0.05, γ = 0.1 for 1000 runs; identify top-10% spreaders (by number infected) per run; compute AUC for predicting spreaders using (1) static eigenvector centrality, (2) static Katz centrality, (3) temporal Katz centrality with optimal α; test AUC differences by bootstrap (n=1000); measure burstiness of each dataset; test the predicted monotonic relationship between burstiness and temporal vs. static centrality AUC advantage.

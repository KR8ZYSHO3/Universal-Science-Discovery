id: h-interface-width-regularization-predicts-segmentation-stability
title: >
  In diffuse-interface segmentation benchmarks, regularization settings that maintain a stable phase-field interface width across pyramid scales will yield lower boundary jitter than settings tuned only for validation Dice score; falsified if boundary variance is unchanged.
status: active
priority: medium
impact_score: 0.32
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:

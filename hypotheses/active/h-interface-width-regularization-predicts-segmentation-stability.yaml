    type: related
    confidence: 0.45
    note: Cahn and Hilliard (1958) free energy of nonuniform systems.
unknowns_addressed:
  - u-cahn-hilliard-segmentation-parameter-transfer-limits
proposed_tests:
  - description: >
      Run segmentation models across image pyramids; tune one set by Dice and another by stable interface-width criteria; compare boundary jitter and accuracy.
    method: Reproducible computer-vision benchmark with fixed train/test splits.
    prediction: Interface-width tuning reduces boundary-jitter variance by >= 15 percent without >2 percent Dice loss.

id: h-quasar-feedback-kinetic-mode-quenching
title: >
  Quasar feedback quenches star formation in massive galaxies primarily through
  kinetic-mode AGN jets that heat the circumgalactic medium (CGM) and prevent gas
  cooling, rather than radiative-mode winds ejecting ISM gas; the transition between
  modes occurs at critical black hole mass M_BH ~ 10^8 solar masses.

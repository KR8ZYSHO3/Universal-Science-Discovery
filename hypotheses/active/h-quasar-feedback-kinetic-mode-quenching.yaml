proposed_tests:
  - description: >
      JWST + Chandra: measure star formation rates and hot CGM temperatures in 50
      massive galaxies at z=1-3, half with detected AGN jets. Test: does CGM temperature
      exceed virial temperature in jet-hosting galaxies? Does sSFR anti-correlate with
      AGN kinetic power (jet luminosity)?
    prediction: "Jet-hosting galaxies show CGM T>T_virial in >70% of cases; sSFR-AGN kinetic power anti-correlation r<-0.5."

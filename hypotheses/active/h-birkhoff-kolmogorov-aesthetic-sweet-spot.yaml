proposed_tests:
  - description: >
      Generate 100 visual patterns spanning the full complexity range:
      uniform fields (CR = ∞), fractals at D = 1.0–2.0, natural images,
      noise. Compute lossless compression ratio (DEFLATE) for each. Measure
      aesthetic preference ratings (7-point Likert scale) in 6 cultural
      groups (Japanese, Nigerian, Brazilian, Swedish, Indian, American,
      N = 50/group). Fit inverted-U function and test whether peak CR is
      consistent across groups (predicted: 2–5x).
    type: cross_cultural_experiment
  - description: >
      Music complexity analysis: compute Shannon entropy H of note transitions
      in 1000 music tracks across 10 genres (classical, jazz, pop, metal,
      ambient, atonal, folk, electronic, blues, hip-hop). Correlate H with
      average Spotify play completion rate (proxy for aesthetic engagement).
      Predict peak engagement at intermediate H (3–4 bits/note).
    type: data_analysis
  - description: >
      fMRI study: present stimuli spanning CR range (constant → random) while
      measuring BOLD signal. Test whether nucleus accumbens / OFC activation
      shows the predicted inverted-U as a function of compression ratio,
      consistent with Schmidhuber's compression-progress reward hypothesis.
    type: neuroimaging

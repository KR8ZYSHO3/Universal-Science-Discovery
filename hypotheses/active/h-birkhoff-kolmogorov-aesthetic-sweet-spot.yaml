id: h-birkhoff-kolmogorov-aesthetic-sweet-spot
title: >
  Aesthetic preference ratings for visual and auditory stimuli follow an
  inverted-U function of lossless compression ratio (a computable
  approximation of Kolmogorov complexity K), with peak preference at
  intermediate compression ratios of 2–5x — the "sweet spot" — and this
  relationship is cross-culturally universal, replicating across at least
  6 cultural groups with distinct aesthetic traditions.
status: active
priority: medium
impact_score: 0.60

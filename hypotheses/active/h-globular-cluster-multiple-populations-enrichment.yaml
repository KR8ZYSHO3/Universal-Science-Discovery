id: h-globular-cluster-multiple-populations-enrichment
title: >
  Multiple stellar populations in globular clusters arise from sequential star
  formation rounds within massive proto-cluster clouds: a first generation of stars
  ejects AGB winds that pool at the cluster center; a second generation forms from
  this enriched material, producing the Na-O anticorrelation observed in nearly all
  old GCs.
status: active
priority: medium
impact_score: 0.67
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-globular-cluster-formation
evidence_links:
  - doi: "10.1146/annurev-astro-081817-051839"
    type: supporting
    confidence: 0.65
    note: "Bastian & Lardo (2018) Annual Review - multiple stellar populations in GCs; AGB enrichment scenario review"
  - doi: "10.1051/0004-6361:20064995"
    type: supporting
    confidence: 0.60
    note: "Decressin et al. (2007) - fast-rotating massive star (FRMS) model as alternative to AGB; both predict Na-O anticorrelation"
  - type: contradicting
    confidence: 0.50
    note: "Mass budget problem: AGB scenario requires 10-20x more first-generation stars than observed today"
proposed_tests:
  - description: >
      Chemical abundance survey (GALAH, APOGEE) of GC member stars in 30 clusters
      spanning age 3-13 Gyr. Test: does Na-O anticorrelation amplitude correlate with
      cluster age, mass, or galactocentric radius? AGB model predicts anticorrelation
      amplitude increases with cluster age.
    prediction: "Amplitude of Na-O anticorrelation increases with age (r>0.5) and cluster mass (r>0.4); absent in young (<1 Gyr) massive clusters."

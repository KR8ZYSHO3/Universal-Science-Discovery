proposed_tests:
  - description: >
      Fit Hanski incidence-function model parameters (c, e, α) to habitat patch occupancy
      data for a reservoir host species in a fragmented landscape, then translate parameters
      to SIR R₀_eff using the metapopulation-SIR equivalence and compare to R₀_eff estimated
      from case-count data for zoonotic spillover events in the same landscape.
  - description: >
      Use satellite-derived forest fragmentation metrics as inputs to both metapopulation
      and epidemic spatial models for the same study system and test whether both models
      predict the same spillover risk ranking across landscape patches.

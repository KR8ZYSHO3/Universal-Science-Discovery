id: h-metapopulation-connectivity-predicts-spillover-r0
title: >
  Landscape connectivity metrics derived from metapopulation incidence-function model
  parameters predict cross-species pathogen spillover risk (R₀_spillover) with accuracy
  comparable to individual-level contact network surveillance in fragmented tropical forest
  margins
status: active
created: "2026-05-07"
last_updated: "2026-05-07"

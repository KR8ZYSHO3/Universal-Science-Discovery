id: h-inner-core-solidification-texture
title: >
  Earth's inner core seismic anisotropy (faster P-waves along the rotation axis)
  records solidification texture from preferential iron crystal alignment during
  dendritic solidification at the inner core boundary — not ongoing convection —
  with the anisotropy frozen in as the boundary advances outward at ~1 mm/yr.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-inner-core-anisotropy-origin
evidence_links:
  - type: supporting
    note: "Bergman (1997) inner core dendritic solidification: geomagnetic field aligns dendrites along polar axis during solidification — anisotropy frozen in texture"
    confidence: 0.72
  - type: related
    note: "Deuss (2014) review: hemispheric anisotropy asymmetry (eastern vs. western IC) inconsistent with simple solidification texture — may require complex convection"
    confidence: 0.68
  - type: contradicting
    note: "Buffett & Wenk (2001) IC convection model: ongoing plastic deformation of iron aggregates produces anisotropy texture independently of solidification"
    confidence: 0.65
proposed_tests:
  - description: >
      Differential travel time analysis: compile PKiKP and PKIKP differential
      travel times for polar vs. equatorial paths, binned by inner core age
      (using inferred solidification front location). Test: anisotropy strength
      increases with depth (older material deeper) — consistent with progressive
      solidification texture accumulation.
  - description: >
      High-pressure iron experiments: measure shear wave splitting in hcp iron
      at IC conditions (360 GPa, 6000 K) in aligned polycrystalline aggregates.
      Compute texture index from EBSD. Compare to required anisotropy magnitude
      from seismology. Test: solidification-aligned texture reproduces observed
      3–4% anisotropy.
related_disciplines:
  - seismology
  - geophysics
  - mineral-physics

id: h-optical-soliton-fiber-communication-stability
title: "The fundamental optical soliton is the most stable carrier for high-bit-rate, long-haul fiber communication because its nonlinear self-correction provides inherent immunity to small dispersion perturbations, and soliton-based transmission should outperform linear NRZ modulation for fiber spans exceeding 5,000 km at bit rates above 40 Gbit/s"
status: active
priority: medium
impact_score: 0.62
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1103/PhysRevLett.45.1095"
    type: supporting
    confidence: 0.85
    note: "Mollenauer et al. (1980) - experimental observation of optical solitons"
  - type: supporting
    note: "Mollenauer & Gordon (2006) - solitons in optical fiber communications: review"
  - type: contradicting
    note: "Linear coherent DWDM (WDM transmission) now dominates commercially; soliton advantage is disputed for modern fiber types"

unknowns_addressed:
  - u-nonlinear-optics-soliton-stability

proposed_tests:
  - description: >
      Compare bit-error-rate after 10,000 km transmission for: (1) fundamental NLSE solitons with timing
      jitter compensation, (2) classical NRZ with EDFAs, (3) dispersion-managed solitons, using identical
      fiber parameters and amplifier spacing. Test whether NLSE solitons maintain lower BER at 40 Gbit/s.
    method: "Numerical GNLSE simulation + Monte Carlo noise analysis; compare to existing transmission experiments"
    prediction: "NLSE solitons should achieve BER < 10^{-12} at 10,000 km vs BER ~10^{-9} for NRZ at 40 Gbit/s"


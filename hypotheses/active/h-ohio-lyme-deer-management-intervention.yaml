id: h-ohio-lyme-deer-management-intervention
title: >
  Reducing white-tailed deer density below 15 deer/km² in Hocking Hills and
  Wayne National Forest areas of southeastern Ohio will reduce Ixodes scapularis
  nymphal tick density by >50% within 5 years, thereby reducing human Lyme
  disease risk in the region.
status: active
priority: high
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-lyme-ohio-surveillance-gap
evidence_links:
  - type: supporting
    note: "Daniels et al. (1993) demonstrated that deer exclusion fencing on Monhegan Island (Maine) reduced tick populations by >80% within 6 years — the strongest field evidence for the deer density threshold hypothesis."
    confidence: 0.75
  - type: supporting
    doi: 10.1016/j.ijpara.2008.01.014
    note: "Ogden et al. (2008) mathematical model of Ixodes scapularis population dynamics — deer density is the primary parameter controlling tick reproductive success and population growth."
    confidence: 0.80
  - type: supporting
    doi: 10.3201/eid2703.201994
    note: "Kugeler et al. (2021) shows tripling of Lyme disease incidence in areas of northward tick range expansion — consistent with deer-driven tick population establishment."
    confidence: 0.72
  - type: contradicting
    note: "Some models suggest white-footed mice (Peromyscus leucopus), not deer, are the primary driver of Borrelia transmission to nymphal ticks — deer are important for adult tick reproduction but not for larval/nymphal Borrelia acquisition. If mice are the bottleneck, deer management alone may be insufficient."
    confidence: 0.60
  - type: related
    doi: 10.1111/j.1461-0248.2008.01159.x
    note: "Brunner et al. (2008) Hosts as ecological traps — white-footed mice are highly competent Borrelia reservoirs while deer are incompetent (dead-end hosts for Borrelia), complicating deer-only management strategies."
    confidence: 0.70
proposed_tests:
  - description: >
      Baseline tick surveillance: systematic drag-cloth sampling for Ixodes
      scapularis nymphs across 20 standardized transects in Hocking County and
      adjacent Wayne National Forest areas. Measure: nymphs per 100m², Borrelia
      infection rate by PCR. Correlate with ODNR deer density estimates from
      the same areas. This baseline does not exist and is the prerequisite for
      any intervention study.
  - description: >
      Deer density management experiment: in collaboration with ODNR, establish
      3 matched study areas with high deer density (>15/km²). Apply managed hunting
      in 2 areas to bring deer density to 8–12/km², leave 1 as control. Measure
      nymph density annually for 5 years. Primary endpoint: >50% reduction in
      nymph density in treated areas vs. control.
  - description: >
      Human exposure survey: administer validated Lyme disease symptom questionnaire
      (modified LD-MAST) to 500 residents in Hocking and Athens counties, Ohio,
      to estimate seroprevalence and clinical Lyme case rate relative to ODH
      official reported case counts. Quantify the underreporting multiplier for
      Ohio specifically.
  - description: >
      R₀ modeling: parameterize a mathematical R₀ model for Borrelia transmission
      in southeastern Ohio using field-collected tick density data, white-footed
      mouse density from small-mammal trapping, deer density from ODNR aerial
      surveys, and IPCC AR6 temperature projections for 2030–2060. Identify the
      deer density reduction needed to bring R₀ below 1 in this specific landscape.
related_disciplines:

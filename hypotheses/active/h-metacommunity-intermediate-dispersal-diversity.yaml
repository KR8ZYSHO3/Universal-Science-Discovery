id: h-metacommunity-intermediate-dispersal-diversity
title: >
  Metacommunity diversity is maximised at an intermediate dispersal rate that balances
  local competitive exclusion against regional rescue effects, following a hump-shaped
  curve analogous to the intermediate disturbance hypothesis; below this optimum dispersal
  rate, local communities are dominated by stochastic drift, and above it by mass effects
  that homogenise species composition across patches.

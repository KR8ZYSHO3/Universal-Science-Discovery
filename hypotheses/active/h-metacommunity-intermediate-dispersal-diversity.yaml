proposed_tests:
  - discipline: ecology
    description: >
      Establish a replicated microcosm metacommunity using protist communities (Paramecium,
      Tetrahymena, Colpidium) in 12-patch arrays at 5 dispersal rates (0%, 1%, 5%, 20%, 100%
      per day). Measure alpha, beta, and gamma diversity at days 7, 14, 21. Test whether
      the dispersal-alpha diversity relationship is hump-shaped with maximum at ~5%/day
      and whether the optimum shifts to lower rates with increasing habitat heterogeneity.
  - discipline: mathematics
    description: >
      Extend the Lotka-Volterra metacommunity model (N species, L patches) with explicit
      dispersal matrix. Vary global dispersal rate d from 0 to 1 and compute expected
      alpha diversity analytically at steady state. Identify the dispersal rate maximising
      alpha diversity as a function of niche overlap and patch heterogeneity. Compare
      predictions to the microcosm experiment.

id: h-neutral-atom-fidelity-motional-decoherence-limit
title: >
  Neutral atom qubit gate fidelities are primarily limited by motional-state decoherence
  during Rydberg blockade gates, and active motional-state cooling (sideband cooling to
  ground state) combined with magic wavelength optical tweezers will enable two-qubit
  gate fidelities ≥99.9% sufficient for fault-tolerant threshold.
status: active
priority: high
impact_score: 0.84
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - quantum-computing
  - atomic-physics
  - quantum-error-correction
unknowns_addressed:
  - u-neutral-atom-qubit-fidelity
evidence_links:
  - doi: "10.1038/s41586-022-04592-w"
    type: supporting
    confidence: 0.82
    note: >
      Evered et al. (2023) Nature — two-qubit Rydberg gate fidelity 99.5% with neutral
      atoms; main errors: photon scattering from Rydberg state (1.2%), atomic motion
      during gate (0.8%), laser phase noise (0.5%); identifies motional decoherence as
      primary controllable error
  - doi: "10.1103/PhysRevX.12.021049"
    type: supporting
    confidence: 0.79
    note: >
      Bluvstein et al. (2022) — magic-wavelength traps eliminate differential light shift
      between qubit states; combined with tweezer reconfigurability enables ZXZXZ gate
      sequences; magic wavelength identified as key for coherence extension
  - doi: "10.1103/PhysRevLett.132.150604"
    type: related
    confidence: 0.72
    note: >
      Sideband cooling in optical tweezers demonstrated for Rb and Cs to n_bar < 0.05;
      predicted to reduce motional gate error by factor 10; not yet combined with
      high-fidelity two-qubit gates in the same apparatus
proposed_tests:
  - description: >
      Implement continuous sideband cooling interleaved with Rydberg gate pulses in a
      magic-wavelength tweezer array; benchmark randomised benchmarking (RB) for 1Q and 2Q
      gates before/after; target: demonstrate 2Q fidelity > 99.5% with 50-qubit register.

id: h-snare-zippering-energy-controls-vesicle-fusion-probability
title: >
  The probability of spontaneous synaptic vesicle fusion is a Boltzmann function
  of the SNARE zippering energy barrier ΔG_barrier, such that P_fusion = A·exp(-ΔG_barrier/k_BT),
  and pharmacological manipulation of SNARE zippering intermediates (via
  complexin or α-SNAP) quantitatively shifts spontaneous release rate according
  to this energy landscape.
status: active
priority: medium
impact_score: 0.78

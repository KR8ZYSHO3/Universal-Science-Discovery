proposed_tests:
  - description: >
      Multi-tracer paired spring experiment: inject fluorescent tracers at 5
      spatially distributed points in a known karst watershed. Measure spring
      discharge breakthrough curves. Fit dual-permeability model. Compute
      conduit connectivity index C_k from slope of power-law tail. Compare
      to ERT-mapped fracture density.
  - description: >
      Aquifer vulnerability prediction: in 10 karst catchments with known
      contamination histories, test whether C_k predicts contaminant transport
      velocity (time to detection at spring). ROC analysis: does C_k discriminate
      high vs. low vulnerability (AUC > 0.8)?

id: h-karst-connectivity-geophysical-mapping
title: >
  Karst aquifer conduit connectivity can be characterized without cave exploration
  using combined ERT and time-domain EM surveys, with connectivity index derivable
  from tracer breakthrough curve dispersion — and the power-law conduit size
  distribution (N ∝ r^{−2}) is the key structural predictor of aquifer vulnerability.

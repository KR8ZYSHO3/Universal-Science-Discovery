id: h-ice-sheet-basal-topography-instability
title: >
  Thwaites Glacier has already crossed the marine ice sheet instability threshold,
  and the grounding line retreat rate will exceed 2 km/year by 2040 as warm
  Circumpolar Deep Water intrusion establishes a self-sustaining melt feedback
  beneath the Pine Island Bay sector.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: critical
impact_score: 0.94
related_disciplines:
  - glaciology
  - geoscience
  - oceanography
  - sea-level-science
unknowns_addressed:
  - u-ice-sheet-basal-melting
evidence_links:
  - type: supporting
    note: >
      2022–2025 Thwaites Ocean Research (THOR) campaign showed warm water reaching
      the grounding line cavity at ~1°C above freezing; melt rates of 40–100 m/yr
      measured under portions of the floating ice shelf.
  - type: supporting
    doi: "10.1038/nclimate2892"
    note: >
      Joughin et al. (2014) - Marine Ice Sheet Instability initiated at Thwaites;
      ice dynamics models suggest unstoppable retreat is already underway under
      business-as-usual scenarios.
  - type: contradicting
    note: >
      Some ice sheet models (DeConto et al. 2021, revised) show strong dependence
      on poorly constrained basal melt parameterizations; the irreversibility
      threshold may not yet have been crossed under intermediate emission scenarios.
proposed_tests:
  - description: >
      Annual radar/GPS monitoring of Thwaites grounding line position from 2026–2036.
      Test whether retreat rate accelerates above 1.5 km/yr as predicted by unstable
      marine ice sheet dynamics, vs. decelerating (stabilization on a subglacial ridge).
  - description: >
      Deploy ocean moorings in Thwaites cavity to continuously monitor Circumpolar
      Deep Water temperature and melt flux at monthly resolution. Test whether
      variability in CDW access (controlled by wind-driven shelf circulation) is the
      dominant control on interannual melt rate variation.

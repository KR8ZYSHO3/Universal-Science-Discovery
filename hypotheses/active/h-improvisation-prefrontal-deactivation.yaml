    note: "Flow state theory (Csikszentmihalyi 1990) - optimal performance requires loss of self-consciousness"
proposed_tests:
  - description: >
      fMRI study comparing experienced jazz improvisers to matched performers during
      rehearsed recall vs. real-time improvisation on matched melodic stimuli.
      ROI analysis: DLPFC, mPFC, SMA, auditory cortex. Measure functional connectivity
      between default mode and executive control networks.
    prediction: "DLPFC deactivation ≥0.5 SD in improvisation vs rehearsal; mPFC activation ≥0.4 SD; DMN-ECN coupling increases during improvisation."

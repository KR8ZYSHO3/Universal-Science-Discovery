id: h-improvisation-prefrontal-deactivation
title: >
  Musical improvisation requires transient hypofrontality: deactivation of
  dorsolateral prefrontal cortex (self-monitoring) and simultaneous activation
  of medial prefrontal cortex (self-expression), producing a flow state distinct
  from rehearsed performance and domain-general executive control.
status: active
priority: high
impact_score: 0.71
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR

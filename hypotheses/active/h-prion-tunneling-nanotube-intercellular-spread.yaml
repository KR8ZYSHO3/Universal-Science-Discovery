id: h-prion-tunneling-nanotube-intercellular-spread
title: >
  Prion proteins propagate between neurons primarily via tunnelling nanotubes (TNTs)
  that form direct cytoplasmic bridges between cells, bypassing extracellular space
  and allowing templated misfolding to spread as an ordered chain reaction with
  directionality determined by axonal transport polarity.

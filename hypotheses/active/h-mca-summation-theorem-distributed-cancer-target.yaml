id: h-mca-summation-theorem-distributed-cancer-target
title: >
  In cancer metabolic networks, the summation theorem of MCA (ΣCⁱⱼ = 1) implies that
  no single enzyme controls the full glycolytic flux; therefore, combination therapies
  targeting 3-4 low-FCC enzymes simultaneously will be more effective than single
  high-FCC target strategies, because high-FCC enzymes are compensated by network
  rewiring after single-agent treatment.

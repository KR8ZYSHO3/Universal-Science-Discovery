evidence_links:
  - doi: "10.1038/s41598-017-09805-3"
    type: supporting
    confidence: 0.79
    note: >
      MCA of glycolysis in breast cancer cells: FCCs distributed across 8 enzymes;
      no enzyme has FCC > 0.25; HK2 (highest FCC ≈ 0.22) inhibition causes
      compensatory upregulation of glucose transporters within 24h — network rewiring
  - doi: "10.1038/nrc3704"
    type: supporting
    confidence: 0.76
    note: >
      Vander Heiden (2011) Nat Rev Cancer — metabolic network plasticity in cancer;
      multiple redundant enzymes share glycolytic flux; inhibiting one isoform
      consistently fails in clinical trials due to isoform switching — consistent
      with summation theorem prediction
  - doi: "10.1016/j.celrep.2019.02.049"
    type: related
    confidence: 0.70
    note: >
      Birsoy et al. (2015) — pooled in vivo genetic screen for essential metabolic
      genes; essentiality correlates with FCC in metabolic models; combination
      targeting of medium-FCC enzymes (FCC 0.1-0.2) shows synergistic lethality
proposed_tests:
  - description: >
      Compute glycolytic FCCs in 5 cancer cell lines using isotope tracer flux balance
      analysis (13C MFA); test whether simultaneous targeting of top-3 medium-FCC enzymes
      (vs. top-1 high-FCC enzyme) shows superior growth suppression in xenograft models.

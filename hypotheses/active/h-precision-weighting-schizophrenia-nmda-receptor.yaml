evidence_links:
  - type: supporting
    note: "Friston et al. (2016) Neuropharmacology — precision weighting formalism predicts that NMDA hypofunction reduces gain of prediction error units (L2/3 pyramidal cells) by reducing NMDA-mediated synaptic currents; dopamine D1 receptor modulates precision via postsynaptic gain"
    confidence: 0.72
  - type: supporting
    note: "Umbricht & Krljes (2005) Biol Psychiatry — meta-analysis of 20 MMN studies: schizophrenia reduces MMN amplitude by ~50% vs. healthy controls; MMN is the ERP correlate of prediction error for deviant auditory stimuli"
    confidence: 0.80
  - type: supporting
    note: "Javitt et al. (2012) Trends Cogn Sci — ketamine (NMDA antagonist) reduces MMN in healthy volunteers mimicking schizophrenia pattern; supports NMDA-precision weighting link"
    confidence: 0.75
  - type: contradicting
    note: "MMN reduction in schizophrenia could reflect general attention or arousal deficits rather than specific precision-weighting impairment; no study has confirmed layer-specific NMDA effects on MMN generators"
    confidence: 0.55
proposed_tests:
  - description: >
      Within-subject EEG study: measure MMN amplitude in 30 healthy volunteers at
      baseline, after sub-anesthetic ketamine (0.3 mg/kg IV), and after ketamine +
      D-serine (NMDA co-agonist, 30 mg/kg oral). Prediction: ketamine reduces MMN
      amplitude; D-serine partially rescues reduction. Linear regression: MMN reduction
      should scale with plasma ketamine concentration (NMDA receptor occupancy measured
      by PET NMDA radioligand).
  - description: >
      Longitudinal study in first-episode schizophrenia (n=50): measure MMN at
      baseline and after 8 weeks of clozapine (known to normalize NMDA function)
      vs. haloperidol (D2 blocker without NMDA effect). Test: clozapine should increase
      MMN amplitude; haloperidol should not; MMN change should correlate with PANSS
      positive symptom scale change (prediction: r > 0.4).

id: h-precision-weighting-schizophrenia-nmda-receptor
title: >
  NMDA receptor hypofunction in schizophrenia specifically impairs precision weighting
  of prediction errors by disrupting apical dendritic integration in layer 5 pyramidal
  cells, causing runaway top-down predictions that manifest as positive symptoms
  (hallucinations, delusions) — testable by showing that NMDA antagonists (ketamine)
  reduce mismatch negativity (MMN) amplitude proportionally to psychosis severity.
status: active
priority: high
impact_score: 0.80

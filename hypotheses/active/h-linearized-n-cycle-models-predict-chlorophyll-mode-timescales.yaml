    type: related
    confidence: 0.35
    note: Provides conceptual reservoir structure motivating Jacobian-level hypotheses

unknowns_addressed:
  - u-nitrogen-cycle-jacobian-eigenstructure-versus-observed-anomalies

proposed_tests:
  - description: >
      Compute tangent-linear Jacobians from participating models; compare eigenvalue spectra to satellite chlorophyll EOF decay times using multitaper spectral analysis with shared masking.
    method: Multi-model intercomparison with harmonized spatial aggregation windows
    prediction: Rank-1 agreement within factor-of-two on dominant relaxation timescales for ≥60% of gyre-mask realizations


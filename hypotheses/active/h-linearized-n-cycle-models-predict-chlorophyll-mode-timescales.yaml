id: h-linearized-n-cycle-models-predict-chlorophyll-mode-timescales
title: >
  For CMIP-class Earth-system models that export linearized nitrogen-cycle Jacobians around preindustrial equilibria, the slowest non-trivial eigenmodes will have e-folding times matching empirical EOF timescales of chlorophyll anomalies in subtropical gyres at matching spatial filters — falsified if observational spectra peak at periods inconsistent with any Jacobian eigenvalue imaginary components after bias correction.
status: active
priority: medium
impact_score: 0.37

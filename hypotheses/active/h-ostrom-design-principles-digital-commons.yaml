id: h-ostrom-design-principles-digital-commons
title: >
  Ostrom's eight institutional design principles apply to digital commons with
  one systematic modification: boundary definition (principle 1) should be
  replaced by contribution-reputation systems that create functional membership
  boundaries without geographic or legal exclusion, and this reformulation
  will predict open-source project sustainability with > 75% accuracy.

proposed_tests:
  - description: >
      Code the presence/absence of Ostrom's eight principles (adapted for digital
      settings) in a random sample of 500 GitHub open-source projects using
      CONTRIBUTING.md, governance documents, and issue tracker analysis.
      Test whether projects scoring high on all 8 principles have significantly
      lower abandonment rates at 5-year follow-up (LASSO regression controlling
      for project size and age).
  - description: >
      Quasi-experimental test using Wikipedia language editions: compare English
      Wikipedia (strong graduated sanctions, active admin hierarchy) to smaller
      language editions with weaker institutional structures. Test whether
      Ostrom principle scores predict article quality (featured article rate)
      and editor retention.

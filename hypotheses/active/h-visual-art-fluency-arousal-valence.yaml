proposed_tests:
  - description: >
      EEG and eye-tracking during exposure to 200 artworks (manipulated for fluency,
      arousal cues, representational content). Measure P300 (arousal), frontal alpha
      asymmetry (approach/avoidance), and gaze fixation duration. Test three-factor
      model against single-factor and two-factor alternatives.
    prediction: "Three-factor model explains >65% of valence/arousal variance; fluency, arousal, and content contribute independently (each >10%)."

id: h-visual-art-fluency-arousal-valence
title: >
  Visual artworks evoke emotion primarily through three interacting mechanisms:
  perceptual fluency (processing ease → positive valence), arousal driven by
  contrast, color saturation, and compositional tension, and representational
  content (semantic associations). Aesthetic emotion is a superposition of these
  three components, not a distinct neural system.

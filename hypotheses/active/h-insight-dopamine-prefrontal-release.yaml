evidence_links:
  - type: supporting
    doi: 10.1371/journal.pbio.0040016
    note: >
      Jung-Beeman et al. (2004) — EEG gamma burst in right temporal cortex 300 ms
      before Aha solutions; distinct from analytical problem solving; right ATL implicated.
  - type: supporting
    doi: 10.1016/j.neuron.2009.03.023
    note: >
      Kounios et al. (2008) — fMRI predicts whether a problem will be solved by insight
      vs. analysis before problem presentation; resting state anterior cingulate activation
      predicts insight readiness.
  - type: related
    doi: 10.1016/j.tics.2015.06.010
    note: >
      Danek et al. (2016) — Aha experience phenomenology review; certainty, surprise,
      pleasure; positive affect component implicates dopaminergic reward prediction error.
proposed_tests:
  - discipline: neuroscience
    description: >
      Administer a pharmacological dopamine agonist (L-DOPA, low dose) vs. placebo
      to healthy participants in a compound remote-associates task in fMRI. Measure
      insight solution rate, Aha subjective rating, and anterior cingulate activation.
      Test whether L-DOPA increases both Aha frequency and ACC activity, consistent
      with dopamine gating of inhibition release at the insight moment.
  - discipline: cognitive-science
    description: >
      Use EEG (high-density 256-channel) during compound remote-associates. Apply
      independent component analysis to isolate ACC and right ATL components.
      Test whether gamma-band (35-80 Hz) coherence between ACC and right ATL
      spikes 300-500 ms before Aha reports but not before non-Aha (analytical) solutions,
      consistent with dopamine-mediated disinhibition of the right ATL representation.

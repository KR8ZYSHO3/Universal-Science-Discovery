id: h-language-revitalisation-intergenerational-transmission
title: >
  Successful language revitalisation requires intergenerational transmission as
  the primary target — language nests (100% immersion from age 0–5) produce
  native-like acquisition outcomes — and revitalisation efforts that bypass
  early childhood transmission fail regardless of adult learner numbers.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-language-death-reversal-feasibility
evidence_links:
  - type: supporting
    note: "King (2001) Maori language nests (Kohanga Reo) created L1 Maori speakers in children of L2 adult parents — restarted intergenerational chain"
    confidence: 0.78
  - type: supporting
    note: "Fishman (1991) GIDS framework: Stage 6 (intergenerational transmission) prerequisite for all higher stages of revitalisation"
    confidence: 0.80
  - type: related
    note: "Walsh (2005) Australia: strong adult language program adoption but near-zero child L1 acquisition — consistent with failure to reach Stage 6"
    confidence: 0.72
proposed_tests:
  - description: >
      Longitudinal cohort study: compare language proficiency at age 10, 15, 20
      for children raised in: (1) language nest programs, (2) partial school
      immersion, (3) traditional classroom. Control for parental fluency.
      Test: only language nest produces proficiency ≥ 80% of heritage speaker norms.
  - description: >
      Cross-case comparative analysis: compile 30 language revitalisation programs
      globally with 20-year outcome data. Code program type (nest/school/community)
      and Fishman GIDS stage at program initiation. Logistic regression: predict
      intergenerational transmission success. Test: GIDS ≥ 6 at initiation essential
      (OR > 5 vs. GIDS < 6).
related_disciplines:
  - sociolinguistics
  - language-policy
  - applied-linguistics

id: h-resonant-wpt-ev-charging-grid-integration
title: >
  Dynamic wireless power transfer (DWPT) for electric vehicles — resonant inductive
  charging embedded in road surfaces — is technically feasible at >85% efficiency
  for vehicles travelling at highway speeds, and would eliminate range anxiety
  if deployed on 10–20% of highway lane-kilometres
status: active
priority: high
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-wpt-efficiency-biological-tissue-interaction
related_disciplines:
  - electrical-engineering
  - transportation-engineering
  - energy-systems
evidence_links:
  - type: supporting
    confidence: 0.65
    note: "KAIST OLEV (Online Electric Vehicle) project demonstrated 60–85% DWPT efficiency at 100 km/h using shaped magnetic field technology; deployed on campus shuttle routes in South Korea."
  - type: supporting
    confidence: 0.55
    note: "Theoretical analysis (Bi et al. 2016, IEEE Trans. Ind. Electron.) shows kQ >> 1 is achievable with roadway coil arrays at 20–30 kW per charging pad at highway speeds."
  - type: contradicting
    confidence: 0.50
    note: "Infrastructure cost ($1-3M/km for roadway DWPT installation) is currently 10-30× higher than conventional charging infrastructure on a per-kWh-delivered basis, making deployment economics uncertain."
proposed_tests:
  - summary: >
      Instrument a 5 km highway test section with DWPT infrastructure (85 kHz, 50 kW/pad)
      and run representative EV fleet for 12 months; measure actual energy delivery efficiency,
      pavement degradation, and EMF exposure to drivers — comparing to theoretical predictions.

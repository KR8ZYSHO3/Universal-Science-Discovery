id: h-betti-numbers-cognitive-complexity
title: >
  The Betti numbers of the neural population activity manifold in prefrontal cortex
  increase monotonically with working memory load and decrease with cognitive fatigue
  or aging, providing topological biomarkers of cognitive capacity that are more
  sensitive than linear dimensionality measures (PCA variance explained).
status: active
created: "2026-05-05"
last_updated: "2026-05-05"

id: h-climate-fire-feedback-accelerates-beyond-linear-projections
title: >
  The climate-fire positive feedback loop (warming → drought → more fire → CO₂
  release → more warming) will cause burned area and carbon emissions from wildfire
  to accelerate nonlinearly under 2°C warming scenarios, exceeding IPCC AR6
  projections that treat fire as a linear response to climate forcing.
status: active
priority: high
impact_score: 0.83
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1073/pnas.1607171113"
    type: supporting
    confidence: 0.75
    note: "Abatzoglou & Williams (2016): 55% of Western US burned area increase 1984-2015 attributable to anthropogenic climate change — trend is accelerating"
  - type: supporting
    confidence: 0.70
    note: "2019-2020 Australian Black Summer: 18.6 Mha burned, emitting ~1.5 Gt CO₂ (larger than Australia's annual national inventory) — a single event with macro-climate impact"
  - type: supporting
    confidence: 0.65
    note: "Boreal forest fires in Siberia (2020, 2021) show increased high-latitude burning beyond climate model projections — positive feedback beginning"
  - type: contradicting
    confidence: 0.5
    note: "Fire-climate feedbacks are included in some CMIP6 models; whether existing models underestimate the feedback strength requires formal model-observation comparison"

unknowns_addressed:
  - u-pyroconvection-prediction-coupled-fire-atmosphere-models

proposed_tests:
  - description: >
      Compare CMIP6 model projections of global burned area under SSP2-4.5 and
      SSP5-8.5 with observed burned area trends (MODIS MCD64A1 2000-present).
      Test whether models underpredict the trend acceleration using attribution
      methods (optimal fingerprinting). Decompose model skill by region and
      vegetation type.
    method: "CMIP6 multi-model ensemble; MODIS burned area observations; optimal fingerprinting attribution; linear vs. nonlinear trend test (Mann-Kendall)"
    prediction: "Models underpredict post-2015 burned area trend by >30%; nonlinear acceleration is detectable in observations but not in model output"

related_disciplines:
  - climate-science
  - ecology
  - atmospheric-science
  - earth-system-science

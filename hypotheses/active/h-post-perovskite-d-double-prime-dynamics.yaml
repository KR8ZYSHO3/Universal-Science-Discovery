id: h-post-perovskite-d-double-prime-dynamics
title: >
  The post-perovskite phase transition in Earth's D'' layer (2700 km depth)
  generates a seismic velocity discontinuity and thermochemical pile instability
  that drives large-scale mantle plumes, with the CMB temperature gradient
  directly controlling the double-crossing of the pPv stability field.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-post-perovskite-implications
evidence_links:
  - type: supporting
    note: "Murakami et al. (2004) Science: MgSiO₃ post-perovskite discovery at 125 GPa, 2500 K — Clapeyron slope +10 MPa/K produces velocity jump"
    confidence: 0.88
  - type: supporting
    note: "Hernlund et al. (2005) double crossing of pPv transition predicted for CMB thermal gradient — matches observed D'' reflector geometry"
    confidence: 0.78
  - type: related
    note: "Lay et al. (2006) seismic detection of D'' discontinuity: SH velocity jump 1–3% above and below pPv boundary"
    confidence: 0.80
proposed_tests:
  - description: >
      Seismic waveform modeling: compile ScS and S-ScS differential times for
      30 CMB bounce point locations. Fit D'' velocity model including pPv layer
      thickness. Test: inferred CMB temperature gradient > 5 K/km at locations
      with double-crossing reflectors vs. < 5 K/km at single-crossing locations.
  - description: >
      High-pressure experiment: determine pPv Clapeyron slope using multi-anvil
      press with in situ X-ray diffraction at 100–130 GPa, 2000–4000 K.
      Resolve current 5–10 MPa/K uncertainty to ±2 MPa/K. Calculate plume
      generation rate from corrected Clapeyron slope.
related_disciplines:
  - mineral-physics
  - seismology
  - mantle-dynamics

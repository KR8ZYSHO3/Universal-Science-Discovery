id: h-structural-holes-income-mobility-mediation
title: >
  Betweenness centrality (structural holes / brokerage position) in social networks
  mediates intergenerational income mobility: individuals who bridge disconnected
  social classes have higher upward mobility, and this effect is partially causal,
  as shown by interventions that create cross-class network connections
status: active
priority: high
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR wave-7 seed (replace with GitHub handle when stewarded)
unknowns_addressed:
  - u-social-capital-causal-vs-correlational
related_disciplines:
  - sociology
  - economics
  - network-science
evidence_links:
  - type: supporting
    confidence: 0.70
    note: "Chetty et al. (2022, Nature) used Facebook data for 72M Americans: economic connectedness (fraction of high-SES friends) is the single strongest predictor of upward income mobility — stronger than school quality, job access, or family stability."
  - type: supporting
    confidence: 0.55
    note: "Granovetter (1973) 'strength of weak ties': weak ties (bridging connections) deliver better job information than strong ties (within-cluster). Betweenness centrality formalises the weak tie advantage."
  - type: contradicting
    confidence: 0.45
    note: "Chetty et al.'s causal identification relies on geographic variation in friending bias; potential confounds (neighbourhood quality, parental connections) are controlled but not eliminated. Direct experimental evidence for causality is lacking."
proposed_tests:
  - summary: >
      Randomised mentorship programmes pairing low-SES high school students with
      high-SES mentors; pre-register network centrality measurements and follow
      income trajectories for 10 years; test whether mentorship-induced increases
      in betweenness centrality predict income outcomes at iso-academic quality.

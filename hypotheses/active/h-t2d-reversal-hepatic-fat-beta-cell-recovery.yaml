proposed_tests:
  - description: >
      Mechanistic RCT: 1H-MRS measurement of hepatic and pancreatic fat at baseline,
      week 1, week 8, and week 52 during 800-calorie VLCD intervention in 80 T2D
      patients (40 recent-onset <3y, 40 long-standing >10y). Test: does hepatic fat
      fall before pancreatic fat? Does beta cell recovery occur in recent-onset but
      not long-standing T2D?
    prediction: "Hepatic fat falls by >50% by week 1 in both groups; pancreatic fat falls by >50% by week 8; beta cell recovery (HOMA-B) in recent-onset >80% but long-standing <30% remission rate."

id: h-t2d-reversal-hepatic-fat-beta-cell-recovery
title: >
  Type 2 diabetes remission following bariatric surgery or very-low-calorie diet
  is mechanistically driven by rapid reduction in intrahepatocellular fat, which
  restores hepatic insulin sensitivity within 1 week, followed by slower reduction
  of pancreatic fat that allows beta cell functional recovery over 8-12 weeks,
  with remission durability determined by whether beta cell mass was permanently
  lost before intervention.

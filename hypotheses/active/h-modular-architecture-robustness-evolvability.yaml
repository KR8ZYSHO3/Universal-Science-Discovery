id: h-modular-architecture-robustness-evolvability
title: >
  Biological gene regulatory networks with higher modularity index (ratio of
  within-module to between-module interaction strength) exhibit both higher
  mutational robustness (canalization) and higher evolvability (rate of
  adaptive phenotypic change per generation), demonstrating that modularity
  resolves — rather than trades off — the robustness-evolvability dilemma.

proposed_tests:
  - description: >
      Compute the modularity index Q of gene regulatory networks from
      high-throughput epistasis data (synthetic lethality screens in S.
      cerevisiae, Costanzo et al. 2016, N > 10^6 gene pairs). Correlate Q
      with (a) the fraction of mutations that are phenotypically neutral
      (robustness) and (b) the rate of morphological evolution estimated
      from molecular phylogenetics. Test whether the correlation is positive
      for both simultaneously.
    type: data_analysis
  - description: >
      Directed evolution experiment: evolve two E. coli strains — one with
      artificially disrupted modularity (random rewiring of co-expression
      network) and one with enhanced modularity (clustering by function) —
      under fluctuating environments. Compare adaptive response rates and
      mutational robustness after 500 generations.
    type: experiment

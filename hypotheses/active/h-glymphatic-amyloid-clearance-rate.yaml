proposed_tests:
  - summary: >
      Longitudinal cohort study: measure glymphatic efficiency (diffusion tensor MRI along perivascular spaces)
      in cognitively normal individuals with family history of AD; correlate with amyloid PET rate of change
      over 5+ years. Hypothesis predicts clearance impairment precedes amyloid PET positivity.
  - summary: >
      Controlled sleep fragmentation intervention in middle-aged adults: does one week of slow-wave sleep
      suppression produce measurable increases in CSF amyloid-beta-42? Causal test of the clearance hypothesis.
  - summary: >
      Cross-domain link: glymphatic flow is driven by aquaporin-4 polarization, which is itself regulated
      by the same metabolic pathways implicated in aging interventions (mTOR, sirtuins). Test whether
      longevity interventions that extend healthspan in animal models also preserve AQP4 polarization.

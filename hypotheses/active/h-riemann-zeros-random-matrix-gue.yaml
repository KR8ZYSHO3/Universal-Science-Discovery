evidence_links:
  - type: supporting
    doi: 10.1017/S0962492901000028
    note: >
      Keating & Snaith (2000) — random matrix theory prediction of moments of
      the Riemann zeta function; GUE model matches number-theoretic computations.
  - type: supporting
    note: >
      Odlyzko (1987) — computational verification of GUE statistics for 10^7
      consecutive zeros near height 10^12 on the critical line; agreement
      with Wigner surmise is < 1% across all spacings.
proposed_tests:
  - discipline: mathematics
    description: >
      Using the LMFDB database and Odlyzko's tabulated zeros, compute the pair
      correlation function R_2(x) for 10^9 consecutive zeros near height T = 10^20
      (where GUE should be an even better approximation). Fit to GUE prediction
      R_2^{GUE}(x) = 1 - (sin πx/πx)². Hypothesis: the maximum deviation
      |R_2^{obs}(x) - R_2^{GUE}(x)| < 0.001 for all x ∈ [0, 5], with systematic
      deviations (if any) at small x providing information about the hypothetical
      Hamiltonian's short-range interaction.

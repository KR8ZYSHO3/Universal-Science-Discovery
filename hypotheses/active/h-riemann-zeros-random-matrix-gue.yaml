id: h-riemann-zeros-random-matrix-gue
title: >
  The non-trivial zeros of the Riemann zeta function have GUE (Gaussian Unitary
  Ensemble) eigenvalue statistics — specifically, the pair correlation function of
  consecutive zeros matches the Wigner surmise of GUE with a relative accuracy of
  < 0.1% at all separations — implying that the Riemann zeta function is the
  characteristic polynomial of an as-yet-unknown quantum Hamiltonian.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high

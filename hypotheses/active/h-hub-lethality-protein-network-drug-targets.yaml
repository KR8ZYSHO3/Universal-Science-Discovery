proposed_tests:
  - description: >
      Compute betweenness centrality on the BioPlex 3.0 AP-MS human PPI network
      (N=8,000 proteins, 118,000 interactions, controlled for detection bias via
      AP-MS balanced design). Test enrichment of approved drug targets (DrugBank
      curated) in top vs. bottom betweenness centiles using logistic regression
      controlling for protein abundance (HPA), tissue specificity (GTEx), and
      network degree.
    method: "Network centrality computation (igraph), logistic regression with covariates, bootstrap confidence intervals"
    prediction: "Betweenness centrality OR >3.0 (95% CI does not include 1.0) for drug targets vs. non-targets"
  - description: >
      CRISPR screen in 5 cancer cell lines: knockout top-200 betweenness-centrality
      proteins vs. matched 200 random proteins vs. 200 essential proteins (positive
      control). Measure differential proliferation by NGS pooled screen. Test whether
      betweenness predicts essentiality better than degree or expression level.
    method: "Pooled CRISPR-Cas9 screen, MAGeCK analysis, AUC for essentiality prediction"
    prediction: "Betweenness-ranked prediction AUC=0.72 vs. degree AUC=0.63, expression AUC=0.67"

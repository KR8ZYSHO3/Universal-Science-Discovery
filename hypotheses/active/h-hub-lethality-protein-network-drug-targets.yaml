id: h-hub-lethality-protein-network-drug-targets
title: >
  Proteins with betweenness centrality in the top 5% of the human PPI network
  are enriched among approved drug targets at odds ratio >3 relative to proteins
  in the bottom 50% of betweenness, and this enrichment is independent of protein
  abundance, tissue expression, and Y2H detection bias — reflecting genuine
  functional centrality in biological information flow.

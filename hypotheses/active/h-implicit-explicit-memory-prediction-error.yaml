proposed_tests:
  - discipline: neuroscience
    description: >
      Train subjects on a serial reaction time task (primarily implicit). Introduce a
      manipulation at test that generates prediction error (change 2 of 12 sequence
      elements). Measure explicit awareness and fMRI activation in hippocampus and
      prefrontal cortex. Test whether prediction error magnitude (measured by
      RT deviation) predicts the shift from striatal to hippocampal-PFC retrieval
      and from implicit to explicit verbal report.
  - discipline: psychology
    description: >
      In an eyeblink conditioning paradigm (implicit), add a retrieval-time change
      to the CS-US interval (prediction error induction). Test whether subjects who
      notice the change (explicit) show disrupted eyeblink conditioning (implicit)
      compared to those who do not notice — confirming that the same prediction error
      signal both recruits explicit memory and interferes with implicit expression.

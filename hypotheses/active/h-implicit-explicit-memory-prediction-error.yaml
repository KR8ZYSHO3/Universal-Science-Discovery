id: h-implicit-explicit-memory-prediction-error
title: >
  Memory is expressed explicitly when prediction error during retrieval recruits
  prefrontal-hippocampal interaction, and implicitly when retrieval occurs without
  prediction error in striatal-cerebellar pathways; the boundary between systems is
  determined by the magnitude of retrieval-time prediction error, which can be
  experimentally manipulated to shift any given memory from implicit to explicit expression.

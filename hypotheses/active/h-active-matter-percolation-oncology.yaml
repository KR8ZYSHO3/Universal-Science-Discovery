id: h-active-matter-percolation-oncology
title: >
  Active tumour vascular networks can be driven into an "unpercolated active solid"
  phase by self-propelled cell migration — a fragmentation regime with no classical
  analogue that makes adaptive therapy more effective than passive percolation models predict.
status: active
created: "2026-05-04"
last_updated: "2026-05-04"
priority: high
related_disciplines:
  - statistical-physics
  - oncology
  - active-matter-physics
  - biophysics
unknowns_addressed:
  - u-active-matter-percolation
  - u-tumor-containment-percolation
evidence_links:
  - type: supporting
    arxiv: "2504.18362"
    note: >
      More is less in unpercolated active solids — demonstrates that activity
      paradoxically decreases rigidity and connectivity; the "more is less" regime
      has no classical passive analogue
  - type: supporting
    arxiv: "2512.20289"
    note: Spatiotemporal chaos and defect proliferation in active mixtures — defect-driven fragmentation of active networks
  - type: related
    doi: 10.1038/s41559-017-0328-6
    note: Gatenby et al. — adaptive therapy clinical foundation (passive model)
  - type: contradicting
    note: >
      Tumour vascular networks may be predominantly passive (endothelial remodelling
      driven by pressure gradients rather than active self-propulsion), in which case
      classical percolation models remain valid and the active-matter correction is small.
proposed_tests:
  - discipline: biophysics
    description: >
      In vitro vascular network formation assay: seed endothelial cells on Matrigel with
      and without tumour-conditioned medium (which promotes active cell migration). Map
      the network at regular intervals. Compute the giant-connected-component fraction as
      a function of time and cell migration speed. Test whether active migration drives
      the network below the classical percolation threshold p_c faster than passive
      remodelling does.
  - discipline: statistical-physics
    description: >
      Simulate a 2D active network model (self-propelled rods on a lattice with
      bond-formation/breakage rules). Vary the activity parameter v_0 and measure
      the giant-component fraction at steady state. Locate the "unpercolated active
      solid" phase boundary and compare it to the passive p_c. Determine the universality
      class of the active percolation transition.
  - discipline: oncology
    cross_domain_angle: >
      Analyse longitudinal DCE-MRI vascular maps from adaptive-therapy trial patients.
      Extract network topology (giant component, cluster-size distribution) at each
      imaging timepoint. Test whether patients whose tumour networks show signatures
      of the active-fragmentation regime (steeper-than-expected giant-component decline
      per unit drug exposure) have better long-term outcomes — a direct test of whether
      the active-matter correction predicts clinical benefit beyond the passive model.
  - discipline: pharmacology
    cross_domain_angle: >
      Cytoskeletal inhibitors (cytochalasin D, blebbistatin) reduce active migration
      speed v_0. Test whether these drugs shift tumour vascular networks from the
      active-fragmentation regime toward classical passive percolation — implying that
      combining activity inhibition with threshold-targeted dosing could synchronise
      the two fragmentation mechanisms.

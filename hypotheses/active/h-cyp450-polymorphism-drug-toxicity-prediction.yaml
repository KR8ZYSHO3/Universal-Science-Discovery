id: h-cyp450-polymorphism-drug-toxicity-prediction
title: "CYP2D6 and CYP2C9 genotype-based dosing adjustment will reduce serious adverse drug reactions by >30% for codeine, warfarin, and tamoxifen compared to standard weight-based dosing in a prospective randomized controlled trial, with the benefit concentrated in the 7-10% of patients who are poor metabolizers"
status: active
priority: high
impact_score: 0.82
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1124/dmd.108.020198"
    type: supporting
    confidence: 0.80
    note: "Guengerich (2008) - CYP450 polymorphisms and variable drug metabolism"
  - doi: "10.1038/nrd1666"
    type: supporting
    confidence: 0.75
    note: "Rendic & Di Carlo (1997) - CYP enzyme review; poor metabolizer frequencies"
  - type: supporting
    note: "PharmGKB database - curated evidence for pharmacogenomic drug dosing guidelines"

unknowns_addressed:
  - u-cyp450-xenobiotic-metabolic-prediction

proposed_tests:
  - description: >
      Prospective randomized controlled trial (N = 2,000): pre-treatment CYP2D6/2C9 genotyping vs standard
      care for patients starting codeine, warfarin, or tamoxifen. Measure 6-month serious adverse event rate
      (hospitalization, toxicity grade ≥3) and therapeutic failure rate in genotyped vs control arm.
    method: "Pharmacogenomic RCT + intent-to-treat analysis + subgroup analysis of poor metabolizers (CYP2D6 *3/*4, *4/*4)"
    prediction: "Genotyped arm should have >30% lower serious ADR rate; effect should be largest in poor metabolizer subgroup (>60% reduction)"

related_disciplines:

id: h-targeted-hub-vaccination-achieves-herd-immunity-fewer-doses-scale-free
title: >
  Targeted vaccination of high-degree nodes (hubs) in scale-free contact
  networks achieves epidemic suppression (R_eff < 1) with the number of doses
  equal to O(√N) rather than the O(N·(1-1/R₀)) doses required by random
  mass vaccination, and this reduction is achievable in practice using acquaintance
  immunisation (vaccinate a random contact of a random person).

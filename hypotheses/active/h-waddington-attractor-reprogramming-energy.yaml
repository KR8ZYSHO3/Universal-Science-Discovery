proposed_tests:
  - description: >
      Reconstruct Waddington potential landscapes for multiple cell types (fibroblast, keratinocyte, hepatocyte)
      from published 10x scRNA-seq datasets using RNA velocity + Fokker-Planck fitting. Correlate estimated
      barrier height with published Yamanaka factor reprogramming efficiency for the same cell types.
    method: "RNA velocity (scVelo) + FPE potential fitting + correlation with OSKM reprogramming efficiency"
    prediction: "Barrier height should negatively correlate with reprogramming efficiency (r < -0.7) across cell type pairs"


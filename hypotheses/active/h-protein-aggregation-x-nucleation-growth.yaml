proposed_tests:
- description: Measure Aβ42 aggregation kinetics in HEK293 cell lysate (macromolecular crowding ~200 g/L) vs. in vitro buffer
    at matched Aβ concentration; fit Knowles-Michaels equations to both; extract k₁, k₊, k₂; test whether k₂ ratio (in lysate
    / in buffer) equals the predicted crowding enhancement factor of ~2 from Minton's crowding theory.

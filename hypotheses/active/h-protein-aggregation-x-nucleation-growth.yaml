id: h-protein-aggregation-x-nucleation-growth
title: Secondary nucleation dominates Aβ42 aggregation in vivo above a critical aggregate concentration threshold of ~1 nM
  fibril mass, with an in vivo secondary nucleation rate constant k₂ within 10-fold of in vitro measurements after correcting
  for cellular crowding (Macromolecular crowding factor ≈ 2)

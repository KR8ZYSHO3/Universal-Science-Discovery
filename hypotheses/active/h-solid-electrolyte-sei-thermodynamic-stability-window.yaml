id: h-solid-electrolyte-sei-thermodynamic-stability-window
title: >
  Solid electrolyte long-term stability at electrode interfaces is determined by
  the electrochemical stability window and the kinetics of SEI layer formation —
  materials with narrow windows but fast passivating SEI can outperform
  wide-window materials with slow passivation kinetics.
status: active
priority: high
impact_score: 0.78
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - electrochemistry
  - materials-science

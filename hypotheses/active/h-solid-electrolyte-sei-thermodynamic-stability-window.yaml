evidence_links:
  - doi: "10.1021/acs.chemrev.7b00115"
    type: supporting
    confidence: 0.65
    note: >
      Janek & Zeier (2016) review solid electrolyte interfaces; thermodynamic
      stability windows computed from DFT formation energies predict interfacial
      reactions at cathode and anode potentials.
  - doi: "10.1038/s41560-019-0382-6"
    type: supporting
    confidence: 0.70
    note: >
      Zhu et al. (2019) compute stability windows for 20+ solid electrolytes
      using the Materials Project; sulfides have narrow windows but fast ion
      conductivity; oxides have wide windows but high grain boundary resistance.
  - doi: "10.1021/acsenergylett.8b00948"
    type: related
    confidence: 0.55
    note: >
      Schwietert et al. (2019) apply grand canonical phase diagrams to predict
      SEI composition — identifies passivating vs. continuously decomposing
      electrolytes.
proposed_tests:
  - description: >
      Synthesise a series of argyrodite (Li₆PS₅X, X = Cl/Br/I) and NASICON
      (Li₁.₃Al₀.₃Ti₁.₇(PO₄)₃) solid electrolytes. Measure capacity retention
      over 500 cycles at 25°C and 60°C. Correlate capacity fade rate with DFT-
      computed stability window width. Test: narrow-window argyrodites with
      confirmed passivating SEI should show <20% capacity loss if SEI kinetics
      hypothesis is correct.
  - description: >
      Use cryo-TEM and ToF-SIMS depth profiling to characterise SEI composition
      at Li/solid-electrolyte interfaces before and after cycling. Test: does
      SEI thickness plateau (passivating) or grow continuously (non-passivating)?
      Correlate with stability window calculations.

id: h-tensegrity-cancer-mechanics
title: >
  Cancer cells that have lost normal cytoskeletal tensegrity architecture
  have measurably lower mechanical stiffness (Young's modulus) and higher
  deformability than normal cells of the same tissue type, making atomic
  force microscopy a viable early detection modality.
status: active
priority: high
impact_score: 0.82

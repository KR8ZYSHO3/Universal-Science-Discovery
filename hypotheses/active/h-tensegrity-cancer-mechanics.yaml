proposed_tests:
  - description: >
      AFM stiffness mapping of isogenic pairs: measure Young's modulus of
      normal vs. oncogene-transformed epithelial cells (e.g. MCF-10A vs.
      MCF-7) using colloidal-probe AFM. Test whether stiffness reduction
      correlates quantitatively with F-actin prestress loss as measured by
      traction force microscopy.
    method: "Colloidal-probe AFM force-indentation curves fit to Hertz model; traction force microscopy for prestress; Western blot for actin/tubulin ratios"
    prediction: "Malignant cells: E < 1 kPa; normal epithelial cells: E = 1-5 kPa; reduction correlates with actin prestress loss (r > 0.7)"
  - description: >
      Microfluidic deformability cytometry for early cancer detection in
      clinical samples: measure cell transit time through calibrated
      microconstrictions in peripheral blood or pleural fluid from patients
      with known cancer status. Test sensitivity and specificity as a
      diagnostic tool.
    method: "Real-time deformability cytometry (RT-DC); ROC analysis vs. pathology gold standard; power calculation for clinical trial design"
    prediction: "AUC > 0.85 for distinguishing malignant vs. normal epithelial cells in pleural effusions; detects cancer at Stage I"
  - description: >
      Tensegrity model parameter estimation: use traction force microscopy
      to measure actin prestress and microtubule buckling in graded
      carcinogenesis models (normal → pre-malignant → invasive). Test whether
      tensegrity model parameters (strut stiffness, cable prestress) degrade
      monotonically with malignant progression.
    method: "Multi-scale TFM; buckling wavelength analysis for microtubule compression; tensegrity finite-element model fitting"
    prediction: "Monotonic decrease in actin prestress and microtubule buckling load with malignant grade; quantitative tensegrity model predicts metastatic potential"


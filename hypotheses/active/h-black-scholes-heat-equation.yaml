proposed_tests:
  - description: "Fit α-stable parameter to S&P 500 daily log-return distribution using characteristic function estimation; price 1M, 3M, 1Y options via fractional PDE (solved by FFT); compare implied volatility smile to market smile using root-mean-square error out-of-sample."
  - description: "Derive analytical Green's function for fractional Black-Scholes PDE using Lévy-Khintchine representation and test convergence to Black-Scholes formula as α→2."

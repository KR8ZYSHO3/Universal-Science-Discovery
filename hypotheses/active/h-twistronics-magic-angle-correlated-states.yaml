id: h-twistronics-magic-angle-correlated-states
title: >
  The full phase diagram of magic-angle twisted bilayer graphene contains a cascade
  of correlated insulating, superconducting, and topological states whose boundaries
  are predicted by the ratio of interaction energy U to bandwidth W, with U/W > 5
  producing Mott-like insulation and U/W in [1,5] producing superconductivity with T_c
  scaling as W/k_B × exp(-a×W/U).

proposed_tests:
  - discipline: materials-science
    description: >
      Fabricate twisted bilayer graphene devices at twist angles from 0.8° to 1.4°
      (step 0.05°) using tear-and-stack technique with hBN encapsulation. For each
      device, perform four-probe transport measurements at T = 0.3-300K and
      n = 0 to ±4 electrons/moiré unit cell. Hypothesis: the superconducting T_c
      as a function of θ follows T_c ∝ W(θ)/k_B × exp(-a×W(θ)/U) with U fixed
      at the Hubbard U from cRPA calculations (U ~ 40-80 meV), so T_c peaks at
      θ = 1.15±0.05° where W/U is minimized while bandwidth is still nonzero.

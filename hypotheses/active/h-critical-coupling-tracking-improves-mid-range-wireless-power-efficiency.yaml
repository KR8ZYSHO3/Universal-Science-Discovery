id: h-critical-coupling-tracking-improves-mid-range-wireless-power-efficiency
title: >
  In resonant inductive WPT links, adaptive impedance/capacitance tracking that maintains near-critical
  coupling under misalignment increases median delivered-power efficiency at 1-2 coil diameters.

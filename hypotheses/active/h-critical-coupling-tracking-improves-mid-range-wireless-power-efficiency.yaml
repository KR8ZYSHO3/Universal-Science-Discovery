proposed_tests:
  - description: >
      Run controlled misalignment trajectories and load steps on matched coil sets with and without
      adaptive retuning; compare time-averaged transfer efficiency and regulation error.
    method: Hardware-in-the-loop WPT bench with scripted motion and programmable loads.
    prediction: Adaptive critical-coupling tracking yields >=10% relative efficiency gain at mid-range offsets.


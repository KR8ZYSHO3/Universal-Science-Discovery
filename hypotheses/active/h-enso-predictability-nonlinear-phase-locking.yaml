    doi: 10.1175/1520-0469(1988)045<3283:ICEATC>2.0.CO;2
    note: >
      Jin et al. (1994) — low-order ENSO model showing chaotic behavior from
      annual cycle interaction; Lyapunov exponent analysis sets predictability limit.
  - type: related
    doi: 10.1175/JCLI-D-14-00445.1
    note: >
      Lopez & Kirtman (2014) — spring predictability barrier tied to seasonal

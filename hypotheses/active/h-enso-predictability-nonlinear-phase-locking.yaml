      in boreal spring.
proposed_tests:
  - discipline: atmospheric-science
    description: >
      Initialize 100-member ensemble of CESM2 (CMIP6) with perturbed initial
      conditions for 1000 different starting dates (sampling all seasons over
      100 years of piControl simulation). Compute ENSO predictability (ensemble
      spread reaching 0.5°C Niño 3.4) as a function of initialization month
      and initial ENSO amplitude. Hypothesis: predictability limit is 6-9 months
      for spring initializations and 12-18 months for fall initializations,
      with the difference explained by the local Lyapunov exponent of the
      seasonal ENSO attractor (computed from tangent space evolution of ensemble).

id: h-enso-predictability-nonlinear-phase-locking
title: >
  The fundamental predictability limit of ENSO beyond 12 months is determined by
  the nonlinear interaction between the annual cycle and the ENSO oscillation that
  produces chaotic phase slipping, with maximum predictability occurring when ENSO
  is phase-locked to boreal winter and minimum predictability during the spring
  predictability barrier.

id: h-birdsong-context-free-grammar-test
title: "A controlled playback experiment testing center-embedded motif dependencies in Bengalese finch song will demonstrate that birds respond selectively to grammatically correct vs. incorrect sequences that cannot be distinguished by a probabilistic finite-state model, providing evidence for context-free (Type 2 Chomsky) syntactic processing"
status: active
priority: medium
impact_score: 0.65
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1038/nn1153"
    type: supporting
    confidence: 0.70
    note: "Okanoya (2004) — Bengalese finch shows branching motif structure consistent with context-free grammar"
  - doi: "10.1371/journal.pone.0003842"
    type: supporting
    confidence: 0.55
    note: "Gentner et al. (2006) — European starling trained to discriminate center-embedded sequences; methodological template"
  - type: related
    note: "Berwick et al. (2011) — theoretical argument that birdsong syntax reaches at least Type 2 in Bengalese finch"
unknowns_addressed:
  - u-birdsong-syntax-generative-grammar-limits
proposed_tests:
  - description: >
      Generate artificial Bengalese finch-like stimuli that are grammatically valid vs. invalid under a
      context-free grammar model but indistinguishable under any finite-state model. Train birds on valid
      stimuli and test operant conditioning generalization to novel valid vs. invalid sequences.
    method: "Operant conditioning go/no-go paradigm with synthesized birdsong stimuli; finite-state vs. context-free stimuli matched for transition probabilities"
    prediction: "Birds discriminate context-free-valid from finite-state-matched-invalid at > 75% correct after training"
related_disciplines:

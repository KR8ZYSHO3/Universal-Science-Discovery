id: h-tom-implicit-explicit-dissociation
title: >
  The implicit-explicit theory of mind dissociation in great apes (and in human
  infants under 4 years) reflects a phylogenetically conserved subcortical
  mentalization system (STS + amygdala) that tracks agent behavior online without
  propositional belief representation, while explicit ToM requires PFC-TPJ circuitry
  for constructing and manipulating belief propositions — making the two systems
  dissociable by lesion and by task structure.

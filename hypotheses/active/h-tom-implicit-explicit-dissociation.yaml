proposed_tests:
  - description: >
      Comparative fMRI study of macaques, chimpanzees, and humans in a matched
      implicit false-belief paradigm (anticipatory gaze with no language requirement).
      Measure BOLD activation in TPJ, mPFC, STS across species. Test: does TPJ
      activation during false-belief conditions increase monotonically across the
      primate phylogeny (macaque < chimp < human)?
    method: "7T fMRI in macaques/chimps, 3T in humans; whole-brain GLM with belief>control contrast"
    prediction: "STS activation is conserved across species; TPJ activation is human>chimp>macaque"
  - description: >
      TMS disruption of rTPJ during implicit (anticipatory looking) vs. explicit
      (verbal description) false-belief tasks in healthy adults. Test: does rTPJ
      TMS selectively impair explicit but not implicit false-belief performance?
    method: "10Hz rTMS over rTPJ, eye-tracking for implicit, verbal response for explicit, within-subject design"
    prediction: "rTPJ TMS selectively impairs explicit false-belief accuracy without affecting anticipatory looking"

id: h-cyclic-dominance-spatial-heterogeneity-biodiversity
title: >
  Spatial heterogeneity (patchy environments) quantitatively extends the
  range of cyclic dominance parameter space that maintains biodiversity,
  predicting that habitat fragmentation below a critical patch size collapses
  rock-paper-scissors systems into competitive exclusion.

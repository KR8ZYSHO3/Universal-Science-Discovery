proposed_tests:
  - description: >
      Experimental rock-paper-scissors test: grow E. coli strains with cyclic
      dominance (toxin producer, sensitive, resistant) on plates with variable
      patch sizes achieved by controlled inoculation density, measuring species
      coexistence probability as a function of patch size.
    method: Microbial microcosm experiment with fluorescent strain tracking
    prediction: >
      Coexistence probability follows a sigmoidal function of patch size with
      a critical patch size L_c below which one strain always excludes others.
      L_c should scale with the dispersal range of the strains.
  - description: >
      Individual-based simulation of rock-paper-scissors on fractal habitat
      networks (Sierpinski gasket geometry) to determine how habitat dimension
      (between 1 and 2) affects the critical dispersal distance for coexistence.
    method: Agent-based simulation + percolation theory analysis
    prediction: >
      Critical dispersal range scales as d_c ~ L_c^{D_f/2} where D_f is the
      fractal dimension of the habitat, connecting ecological coexistence to
      the geometry of the habitat landscape.

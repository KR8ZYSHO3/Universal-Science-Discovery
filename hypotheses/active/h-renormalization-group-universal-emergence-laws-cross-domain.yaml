proposed_tests:
  - description: >
      Apply information-theoretic RG (Tishby's information bottleneck as coarse-
      graining operator) to Neuropixels recordings from mouse visual cortex (n = 1000+
      neurons, n = 10,000+ timesteps) during natural movie stimulation; track
      how effective theories of population activity change across coarse-graining
      scales; identify fixed points as scale-invariant codes.
    method: "Neuropixels V1 recording during naturalistic movies; information bottleneck coarse-graining across 4 scales; Renyi entropy spectrum analysis at each scale; convergence = fixed point"
    prediction: "Population activity in V1 converges to an effective theory (Ising-like maximum-entropy distribution) within 2–3 RG steps; the fixed-point theory has 3–5 relevant parameters regardless of stimulus details, suggesting universal neural code"
  - description: >
      Economic RG test: apply wavelet multi-scale decomposition to tick-by-tick
      S&P 500 data (2010–2025) and compute the effective coupling constants
      (auto-correlation length, volatility clustering exponent) at each time
      scale (1s, 10s, 1min, 10min, 1hr, 1day); test whether these flow toward
      a fixed point (scale-invariant effective theory) or diverge (no emergence).
    method: "High-frequency trade data; wavelet variance spectrum; fitting of Ornstein-Uhlenbeck parameters at each scale; convergence criterion: <10% change in effective parameters over 2 octaves of scale"
    prediction: "S&P 500 effective volatility clustering exponent H (Hurst) converges to H ≈ 0.55 ± 0.05 across scales 10min–1day — an RG fixed point — while deviating from 0.55 at <1min (non-ergodic) and >1week (macroeconomic coupling)"


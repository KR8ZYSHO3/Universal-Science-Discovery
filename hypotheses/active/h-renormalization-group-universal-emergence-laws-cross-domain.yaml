id: h-renormalization-group-universal-emergence-laws-cross-domain
title: >
  Renormalization group (RG) fixed-point analysis applied to multi-scale data
  (neural spiking → population → brain area → behaviour, or individual trade →
  market → macro-economy) will identify universal effective theories at each
  coarse-graining level, with the RG flow predicting which micro-level parameters
  become irrelevant (emergent law is robust) vs. relevant (sensitive to details).

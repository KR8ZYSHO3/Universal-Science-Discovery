id: h-kibble-zurek-polarity-scaling
title: >
  PAR-domain polarity errors in C. elegans scale with fertilisation quench rate
  according to Kibble-Zurek exponents, placing embryonic symmetry breaking in
  the same universality class as superfluid helium phase transitions.
status: active
created: "2026-05-04"
last_updated: "2026-05-04"
priority: high
related_disciplines:
  - biophysics
  - developmental-biology
  - condensed-matter-physics
unknowns_addressed:
  - u-kibble-zurek-embryo
  - u-topological-morphogenesis
evidence_links:
  - type: supporting
    arxiv: "0811.3743"
    note: Zurek (2009) noted the biological symmetry-breaking analogy to KZ explicitly; no follow-up experimental program was launched
  - type: supporting
    doi: "10.7554/eLife.30606"
    note: C. elegans PAR polarisation kinetics characterised quantitatively — demonstrates the transition is sharp, fast, and driven by a single wave
  - type: supporting
    note: >
      KZ mechanism confirmed across: superfluid He-4 (Zurek 1996), superconductors (Monaco 2006),
      Bose-Einstein condensates (Nature 2008), ion traps (Science 2013), optical lattices (PRL 2015).
      Universality across these systems strongly suggests biological order-parameter transitions
      should also obey KZ — but this has never been tested.
  - type: contradicting
    note: >
      Embryos are active, far-from-equilibrium systems. The KZ mechanism was derived for
      systems relaxing toward a thermal equilibrium. PAR polarisation is driven by ATP-consuming
      actomyosin flows, not thermally — the quench analogy may break down entirely, and the
      scaling law may not hold or may give different exponents. This is the central testable
      uncertainty.
proposed_tests:
  - discipline: cell-biology
    description: >
      Titrate CDK1 activity in C. elegans zygotes using RO-3306 (CDK1 inhibitor) at 3-5
      concentrations spanning a 5-fold range of cell-cycle kinetics. Image PAR-2::GFP and
      PAR-6::GFP simultaneously at 2-second intervals through symmetry breaking. Quantify
      the density of polarity-reversal domains (patches where PAR-2 invades the PAR-6 domain
      or vice versa) at 5 minutes post-symmetry breaking. Plot defect density vs. CDK1
      ramp rate on log-log axes and measure the scaling exponent.
  - discipline: condensed-matter-physics
    description: >
      From the PAR-2 concentration field time series, compute the two-point correlation
      function ξ(t) = <φ(x,t)φ(x+r,t)> at the moment of symmetry breaking. Measure
      how ξ_max (the correlation length at the transition) scales with CDK1 ramp rate.
      KZ predicts ξ_hat ∝ τ_Q^(ν/(1+νz)). Extract ν and z and compare to mean-field
      values (ν=1/2, z=2) and 2D Ising values (ν=1, z=2.17).
  - discipline: theory
    cross_domain_angle: >
      Extend the KZ theory to active systems (non-equilibrium, momentum-injecting). The
      Martin-Siggia-Rose action for a driven order-parameter field in an active fluid
      is analytically tractable. Derive the modified KZ exponents for active symmetry
      breaking and compare to the C. elegans measurements. This would establish whether
      embryogenesis belongs to the equilibrium KZ universality class or defines a new,
      active-KZ universality class — a finding of interest to both cosmologists and
      developmental biologists.
  - discipline: theory
    cross_domain_angle: >
      Combine this hypothesis with b-topology-morphogenesis (h-topological-defect-morphogenesis):
      if KZ predicts the defect density and topology theory predicts which organ shapes are
      compatible with which defect configurations, the two theories together give a
      first-principles account of why organs have the shapes they do — tracing embryo
      morphology to the same cosmological symmetry-breaking physics that explains cosmic
      string networks.

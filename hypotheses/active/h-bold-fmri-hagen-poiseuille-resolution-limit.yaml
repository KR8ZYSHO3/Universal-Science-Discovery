proposed_tests:
  - description: >
      Build a computational fluid dynamics model of cortical vasculature using
      realistic vessel network geometry from two-photon microscopy data; compute
      the BOLD point-spread function (PSF) as the spatial spread of blood flow
      changes in response to a localized neural activation; predict the fundamental
      resolution limit at 7T and 11.7T.
    method: "VESGEN vascular network model from Blinder et al. (2013) two-photon data; Hagen-Poiseuille network flow solver; BOLD PSF from simulated vasodilation; validate against 7T laminar fMRI data"
    prediction: "BOLD PSF half-maximum width = 350 +/- 80 micrometers at 7T due to upstream conducted vasodilation; field strength increase above 7T has <10% effect on PSF width"
  - description: >
      Measure the BOLD point-spread function directly using high-resolution 7T fMRI
      of V1 retinotopic maps with high-contrast (1 deg) checkerboard annuli, comparing
      measured PSF to CFD predictions; test whether the r^4 floor on spatial resolution
      is experimentally confirmed.
    method: "7T fMRI in human V1 with 0.8mm isotropic voxels; retinotopic mapping; Gaussian PSF fitting; comparison to CFD prediction"
    prediction: "Measured BOLD PSF FWHM = 2.1 +/- 0.4 mm (matching CFD 350 um + 1.7 mm from hemodynamic dispersion); does not improve proportionally with voxel size below 0.8mm"

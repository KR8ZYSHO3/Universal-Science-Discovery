id: h-bold-fmri-hagen-poiseuille-resolution-limit
title: >
  The fundamental spatial resolution limit of BOLD fMRI is 300-500 micrometers due
  to Hagen-Poiseuille r^4 sensitivity creating a vascular point-spread function
  that cannot be overcome by increasing field strength alone

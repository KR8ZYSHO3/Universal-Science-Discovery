id: h-paradigm-shift-anomaly-accumulation-detectable
title: >
  Kuhnian paradigm shifts are preceded by a detectable acceleration in
  anomaly-reporting publications and citation network fragmentation in the
  3-10 years before the paradigm shift, identifiable retrospectively using
  science-of-science bibliometric methods and potentially predictable
  prospectively with 5-7 year lead time.
status: active
priority: medium
impact_score: 0.64
created: "2026-05-06"
last_updated: "2026-05-06"
related_disciplines:
  - philosophy-of-science
  - scientometrics
  - sociology-of-science
  - information-science
unknowns_addressed:
  - u-paradigm-shift-prediction
evidence_links:
  - doi: "10.1007/s11192-012-0893-0"
    type: supporting
    confidence: 0.60
    note: >
      Chen et al. (2009) CiteSpace analysis: citation bursts and network
      structural holes predict paradigm-shifting papers; pre-shift period
      shows increased modularity in citation networks (fragmentation).
  - doi: "10.1073/pnas.1800471115"
    type: supporting
    confidence: 0.65
    note: >
      Funk & Owen-Smith (2017) CD index (consolidating vs. disrupting):
      disruptive papers cluster temporally before field-level paradigm shifts
      in physics and biomedicine — detectable retrospectively.
  - doi: "10.1038/s41586-022-05543-x"
    type: related
    confidence: 0.62
    note: >
      Park et al. (2023) find declining disruption in science (falling CD index);
      suggests anomaly accumulation patterns are changing due to publication
      pressure — threatens prospective detection.
proposed_tests:
  - description: >
      Identify 10 consensus pre/post paradigm shifts (plate tectonics, germ
      theory, quantum mechanics, etc.) and 10 control cases (major advances
      without paradigm shift). Apply automated anomaly detection to title/abstract
      corpora in the pre-shift decade using LDA topic modelling and citation
      disruption metrics. Test: do anomaly-reporting papers accelerate in rate
      (publications/year × citation burstiness) in the 5-7 years before a
      genuine paradigm shift but not in control cases?

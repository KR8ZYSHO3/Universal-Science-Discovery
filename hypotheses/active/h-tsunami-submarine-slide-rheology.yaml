id: h-tsunami-submarine-slide-rheology
title: >
  Tsunami wave amplitude from submarine landslides scales as A ∝ V^{2/3} T^{-1}
  (V = slide volume, T = tsunami period), with runup controlled by the ratio of
  Froude number to beach slope — and slide rheology determines whether the
  source is a thin fast slide (high A) or a thick slow debris flow (low A).
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-tsunami-submarine-slides
evidence_links:
  - type: supporting
    note: "Harbitz et al. (2006) submarine slide tsunami review: Storegga slide (8150 BP) generated 20m runup in Norway — slide volume 3×10³ km³"
    confidence: 0.78
  - type: supporting
    note: "Watts (1998) subaerial vs. submarine slide tsunami: amplitude A ∝ V^{2/3} / d^{1/3} (d = water depth) — validated in wave tank"
    confidence: 0.75
  - type: related
    note: "Hungr et al. (2005) debris flow rheology: Bingham vs. Herschel-Bulkley — runout and velocity strongly rheology-dependent"
    confidence: 0.68
proposed_tests:
  - description: >
      Scaled wave tank experiment: generate tsunami using rectangular slide blocks
      of varying volume (10–100 kg equivalent) with 3 different rheologies (rigid,
      Newtonian viscous, Herschel-Bulkley gel). Measure surface wave amplitude and
      period as function of slide Froude number. Fit scaling law A = f(V,Fr,θ).
  - description: >
      Numerical benchmark: simulate Storegga event with 3 rheological models
      (rigid block, viscoplastic, granular). Compare predicted near-field wave
      heights to Norwegian geological runup records. Identify which rheology
      reproduces observed 10–20m runup to within 30%.
related_disciplines:
  - marine-geology
  - tsunami-science

id: h-jamming-transition-critical-exponents
title: "The excess coordination number Z - Z_c and shear modulus G of frictionless 3D packings both scale as (phi - phi_J)^0.5 with exponent equal to the mean-field prediction, and the diverging vibrational length scale xi ~ |phi - phi_J|^{-0.5} will be experimentally measurable in colloidal glass systems via dynamic light scattering near phi_J"
status: active
priority: high
impact_score: 0.70
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.1038/35035037"
    type: supporting
    confidence: 0.75
    note: "Liu & Nagel (1998) — introduced jamming phase diagram; exponents described qualitatively"
  - doi: "10.1103/PhysRevLett.95.098301"
    type: supporting
    confidence: 0.72
    note: "O'Hern et al. (2003) — numerical confirmation of Z-Z_c ~ (phi-phi_J)^0.5 and G ~ (phi-phi_J)^0.5 for frictionless spheres"
  - type: related
    note: "Wyart et al. (2005) — soft modes near jamming and the diverging length scale prediction"
unknowns_addressed:
  - u-jamming-transition-universality-class
proposed_tests:
  - description: >
      Prepare colloidal poly(NIPAM) microgel suspensions at concentrations spanning phi_J. Measure
      shear modulus by oscillatory rheology and excess contacts Z-Z_c from confocal microscopy.
      Fit power-law exponents. Independently measure vibrational length scale from two-point diffusivity
      using dynamic light scattering.
    method: "Oscillatory rheology + confocal contact counting + DLS near jamming transition"
    prediction: "G ~ (phi-phi_J)^{0.5±0.1} and xi ~ |phi-phi_J|^{-0.5±0.1} both consistent with mean-field prediction"
related_disciplines:

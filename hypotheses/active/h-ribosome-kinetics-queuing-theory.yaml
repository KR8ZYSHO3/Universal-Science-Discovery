proposed_tests:
  - description: "Synthesize 5 reporter constructs (luciferase variants) differing only in the identity of the 5 slowest codons (replaced with highest-tAI synonyms); measure luciferase activity and mRNA level at 24h in HEK293; compute fold-change in protein/mRNA ratio."

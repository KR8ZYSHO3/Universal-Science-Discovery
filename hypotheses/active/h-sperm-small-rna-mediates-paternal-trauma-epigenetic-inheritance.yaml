id: h-sperm-small-rna-mediates-paternal-trauma-epigenetic-inheritance
title: >
  Paternal stress exposure alters the small non-coding RNA (miRNA, tRNA fragment,
  piRNA) composition of sperm in a stress-specific manner, and injection of
  these sperm RNAs into naive zygotes recapitulates the behavioural and
  physiological phenotypes observed in the offspring of stressed fathers.

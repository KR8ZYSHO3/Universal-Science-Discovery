proposed_tests:
  - description: >
      Chronic social defeat stress (CSDS) or early life stress (ELS) in male
      mice. Collect sperm at 4, 8, 12 weeks post-stress. Small RNA sequencing
      (total RNA, 18-32 nt) to identify stress-altered tRNA fragments and miRNAs.
      Inject purified stress-specific RNA fraction into zygotes from naive parents.
      Assess offspring for HPA axis reactivity, anxiety-like behaviour, social
      behaviour at P60 vs. controls.
    method: >
      RNA-seq of sperm small RNAs; zygote microinjection of synthetic RNA mimics;
      behavioural battery (EPM, FST, RSDT, social interaction); corticosterone
      assay; whole-brain gene expression.
    prediction: >
      Zygotes injected with stress-altered tRNA fragments show ≥30% increase in
      anxiety-like behaviour and altered corticosterone response vs. control
      injection zygotes. The effect should be dose-dependent and specific to the
      stress-altered RNA fraction, not replicated by control RNA injection.
  - description: >
      Test whether DNMT inhibition in the early embryo (before implantation)
      blocks the transmission of the phenotype in sperm RNA-injected zygotes.
      If transmission requires DNA methylation propagation from the RNA signal,
      DNMT inhibition should abolish it; if transmission is methylation-independent
      (direct mRNA regulation), it should persist.
    method: >
      5-azacytidine (DNMT inhibitor) treatment of 2-4 cell embryos from
      RNA-injected zygotes; phenotype assessment in resulting offspring.
    prediction: >
      DNMT inhibition partially but not completely blocks phenotype transmission,
      indicating both methylation-dependent and methylation-independent RNA
      mechanisms contribute to transgenerational epigenetic inheritance.

proposed_tests:
  - description: >
      Polysomnography + insight task: participants learn hidden rules in two tasks
      (remote associates test at 22:00), then sleep with full PSG monitoring, then
      retest at 06:00. Test: does REM duration (minutes) predict insight gain (solved
      RAT items not solved before sleep)? Compare selective REM suppression condition.
    prediction: "REM duration predicts insight gain (r>0.4); REM-suppressed group (prazosin) shows <50% of insight gain vs control."

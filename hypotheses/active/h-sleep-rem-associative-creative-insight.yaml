id: h-sleep-rem-associative-creative-insight
title: >
  REM sleep promotes creative insight by selectively strengthening weak associative
  links between distantly related memory traces through hippocampal-neocortical replay
  in a low-acetylcholine milieu, facilitating the formation of novel conceptual
  combinations unavailable to waking cognition.
status: active
priority: high

proposed_tests:
  - description: >
      Inelastic neutron scattering on optimally doped YBCO under uniaxial pressure to
      directly measure the spin fluctuation spectrum while simultaneously tracking T_c.
      If T_c tracks the spin resonance mode energy and spectral weight, spin-fluctuation
      glue is confirmed. Expected: T_c ∝ ω_spin-resonance.
  - description: >
      DFT + DMFT calculation of the d-wave pairing vertex in a series of cuprates with
      varying superexchange J (controlled by apical oxygen distance). Prediction: T_c_max ∝ J
      across the cuprate family — testable against the existing database of ~100 cuprate
      superconductors.

id: h-cuprate-pairing-spin-fluctuation-glue
title: >
  Antiferromagnetic spin fluctuations are the dominant Cooper pairing glue in cuprate
  high-temperature superconductors, predicting d-wave symmetry order parameter and
  T_c proportional to the superexchange coupling J.

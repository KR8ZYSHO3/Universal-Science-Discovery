id: h-mems-high-cue-fungi-mineral-soc-stabilization-warming
title: >
  Soils with fungal-dominated microbial communities (higher CUE ~0.5 vs. bacterial
  CUE ~0.3) accumulate ≥40% more mineral-associated organic carbon per unit C input
  under simulated +3°C warming than bacterial-dominated soils, confirming the MEMS
  framework prediction that high-CUE necromass production offsets warming-induced
  respiration increases.
status: active
priority: high

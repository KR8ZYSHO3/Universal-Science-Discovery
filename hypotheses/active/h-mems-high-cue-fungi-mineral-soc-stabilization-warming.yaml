proposed_tests:
  - description: >
      Microcosm experiment: 18 soils (6 fungal-dominated, 6 bacterial-dominated, 6
      mixed) with matched organic C content, incubated at 20°C and 23°C (+3°C) for
      180 days with ¹³C-labelled glucose pulse (10 g C m⁻²). Measure: (1) cumulative
      CO₂ efflux (respiration); (2) ¹³C in mineral-associated OM fraction (density
      fractionation); (3) fungal:bacterial ratio (PLFA ergosterol/gram-negative PLFA).
      Prediction: fungal soils show ≥40% more ¹³C in mineral fraction at +3°C vs.
      bacterial soils, despite similar total C respired.
  - description: >
      Field warming experiment: soil warming cables at 3 temperate forest sites with
      naturally different fungal:bacterial ratios (gradient from conifer-dominated =
      high F:B to agricultural = low F:B). Apply ¹³C-¹⁴C dual isotope labelling to
      distinguish new from old C. Measure mineral-associated SOC ¹³C enrichment at
      1 and 3 years. Test MEMS prediction: fungal sites accrue more ¹³C-MAOC per
      degree warming than bacterial sites.

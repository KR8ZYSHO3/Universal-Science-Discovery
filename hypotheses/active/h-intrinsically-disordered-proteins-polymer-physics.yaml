proposed_tests:
  - description: "Collect published Rg vs. N data for >40 IDPs from smFRET and SAXS; fit Rg = b·N^ν for each; test correlation between ν and sequence descriptors (NCPR, mean hydropathy, fraction charged residues) using Spearman ρ and linear regression."
  - description: "For a panel of 5 IDPs spanning NCPR = -0.3 to +0.3, measure Rg at 5 NaCl concentrations (0–500 mM) by SAXS; test whether ν decreases with ionic strength (screening of polyelectrolyte repulsion) as Rubinstein-Colby polyelectrolyte theory predicts."

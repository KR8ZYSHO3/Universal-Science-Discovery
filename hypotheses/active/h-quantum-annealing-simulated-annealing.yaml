proposed_tests:
  - description: "Generate 1000 random Ising instances on Chimera graph with varying density and planted solutions (known optimal); run D-Wave Advantage QA (100 μs anneals, 1000 reads) vs. SimAnneal (SA) and Tabu search at matched wall-clock time budgets (10ms, 100ms, 1s); compare solution quality (gap from optimal %) as function of problem density."
  - description: "Test scaling behavior: generate instances with N=500, 1000, 2000, 5000 variables; fit time-to-solution vs N curves for QA and SA; test whether QA curve has shallower slope (better scaling) for clustered vs. random instances."

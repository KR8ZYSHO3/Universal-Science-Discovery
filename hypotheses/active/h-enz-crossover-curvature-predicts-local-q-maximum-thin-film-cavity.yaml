id: h-enz-crossover-curvature-predicts-local-q-maximum-thin-film-cavity
title: >
  At fixed thickness and substrate index, the sharpest ENZ-related resonance linewidth minimum tracks the maximum
  of |d(Re ε)/dω| near loss-compensated crossover rather than the deepest Re ε→0 point alone — dispersion curvature
  dominates optimal Q when Im ε is monotone.

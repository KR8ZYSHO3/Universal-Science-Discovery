proposed_tests:
  - description: >
      Fabricate thin film stacks with swept dopant density shifting ENZ crossover; measure loaded Q vs ω via reflection;
      identify whether max Q aligns with max |d(Re ε)/dω| extracted from ellipsometry.
    method: Variable-angle spectroscopic ellipsometry + cavity ring-down analog on planar resonators.
    prediction: Rank correlation ρ≥0.75 between curvature metric and Q across ≥8 samples.


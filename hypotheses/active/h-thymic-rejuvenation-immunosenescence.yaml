id: h-thymic-rejuvenation-immunosenescence
title: >
  Age-related immunosenescence is causally driven by thymic involution, and thymic
  regeneration via FoxN1 reactivation or sex-hormone ablation can restore naive T-cell
  output and functional immune responses in aged mammals.
status: active
priority: high
impact_score: 0.81
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - immunology
  - biogerontology
  - endocrinology
unknowns_addressed:
  - u-immune-aging-rejuvenation
evidence_links:
  - doi: "10.1016/j.celrep.2016.04.034"
    type: supporting
    confidence: 0.79
    note: >
      Bredenkamp et al. (2014) Development — FOXN1 reactivation in aged mice partially
      restores thymic architecture and increases recent thymic emigrant (RTE) frequency
  - doi: "10.1073/pnas.92.13.5876"
    type: supporting
    confidence: 0.75
    note: >
      Sutherland et al. (2005) J Immunol — castration of aged mice rapidly restores
      thymic size and T-cell output to near-juvenile levels within 6 weeks
  - doi: "10.1016/j.immuni.2021.03.014"
    type: related
    confidence: 0.65
    note: >
      TRIIM-X trial (Fahy et al. 2022) — GH + DHEA + metformin in aged men reduces
      epigenetic age and increases thymic CT density (Hounsfield units), preliminary
      evidence that pharmacological thymic regeneration is achievable
proposed_tests:
  - description: >
      Randomized controlled trial of GnRH antagonist (castration equivalent) in aged women
      (70+); primary endpoints thymic FDG-PET uptake, naive CD4+/CD8+ T-cell count, and
      response to novel antigen challenge at 3 and 12 months.

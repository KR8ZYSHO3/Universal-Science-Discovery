unknowns_addressed:
  - u-kin-selection-price-equation-unification

proposed_tests:
  - description: >
      Apply Price equation decomposition to cross-cultural behavioral economics data (public goods games,
      ultimatum games, trust games) from 20+ societies with different group sizes. Measure within-group vs
      between-group variance in cooperation, and compute Price equation between-group selection component.
      Test whether between-group component exceeds 50% for groups > 150 members.
    method: "Multilevel ANOVA decomposition of cooperation scores + Price equation partitioning"
    prediction: "Between-group variation in cooperation should exceed within-group variation for group sizes > 150; > 50% between-group Price component"


proposed_tests:
  - description: >
      Implement and benchmark 5 algorithms (matrix multiply, FFT, sorting, stencil,
      BFS) in three versions: cache-unaware, cache-aware, and cache-oblivious, on
      4 architectures spanning 2-4 cache levels (ARM Cortex-A77, AMD EPYC, Intel Xeon,
      Apple M2). Measure cache miss rates and throughput.
    prediction: "Cache-oblivious versions achieve within 20% of optimal across all architectures; automated polyhedral tiling recovers >70% of hand-tuned performance for stencil codes."

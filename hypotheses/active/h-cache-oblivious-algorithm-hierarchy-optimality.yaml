id: h-cache-oblivious-algorithm-hierarchy-optimality
title: >
  Cache-oblivious algorithms that recursively divide data access without explicit
  knowledge of cache line sizes achieve asymptotically optimal memory access patterns
  across all levels of the memory hierarchy simultaneously, and formal specification
  of cache-oblivious transformations can be partially automated via polyhedral
  analysis and affine scheduling in optimizing compilers.

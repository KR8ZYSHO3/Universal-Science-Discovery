id: h-ketamine-antidepressant-ampa-potentiation-mechanism
title: >
  The rapid antidepressant effect of ketamine is mediated primarily by the metabolite
  (2R,6R)-hydroxynorketamine (HNK) acting through AMPA receptor potentiation and
  BDNF/TrkB signaling, not through NMDA receptor inhibition — implying that
  non-dissociative AMPA-potentiating agents will reproduce the antidepressant effect
  without psychotomimetic side effects.
status: active
priority: high
impact_score: 0.87
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1038/nature17998"
    type: supporting
    confidence: 0.75
    note: "Zanos et al. (2016): (2R,6R)-HNK produces antidepressant effects in mice without NMDA inhibition; stereoselective (2S,6S)-HNK inactive; AMPA antagonist blocks antidepressant effect"
  - type: supporting
    confidence: 0.70
    note: "Bhatt et al. (2020): HNK does not block NMDA receptors at antidepressant-relevant concentrations; potentiates AMPA currents in hippocampal neurons"
  - type: supporting
    confidence: 0.65
    note: "Monteggia lab (2021): BDNF/TrkB signaling downstream of AMPA activation is required for ketamine antidepressant effect; TrkB antagonist blocks both ketamine and HNK effects"
  - type: contradicting
    confidence: 0.6
    note: "Williams et al. (2018): NMDA antagonism alone (MK-801) produces antidepressant effects in some models; the mechanistic dissociation between NMDA block and HNK effects is contested"

unknowns_addressed:
  - u-neural-correlates-consciousness-anesthesia-mechanism

proposed_tests:
  - description: >
      Parallel human trial: treatment-resistant depression patients randomized to
      (1) racemic ketamine iv, (2) (2R,6R)-HNK iv, (3) AMPA positive allosteric
      modulator (LY451395), (4) placebo. Primary endpoint: MADRS score at 24h, 72h,
      1 week. Biomarkers: serum BDNF, ketamine/HNK plasma levels, EEG gamma power.
    method: "Phase IIa randomized crossover with 4-week washout; MADRS, HDRS-17; plasma LC-MS/MS for HNK; EEG biomarkers"
    prediction: "HNK produces equivalent MADRS reduction to ketamine at 72h; AMPA PAM produces 60% of ketamine effect; no dissociative side effects with HNK or AMPA PAM"

related_disciplines:
  - pharmacology
  - neuroscience

id: h-two-class-economy-boltzmann-pareto-transition
title: >
  Real economies exhibit a two-regime wealth distribution — exponential (Boltzmann-Gibbs)
  for the lower 90% of the population and Pareto power-law for the top 10% — with a
  crossover determined by the ratio of income (additive) to capital return (multiplicative)
  dynamics, and this crossover point predicts country-level Gini coefficient.

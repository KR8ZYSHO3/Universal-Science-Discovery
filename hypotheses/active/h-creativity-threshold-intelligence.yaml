id: h-creativity-threshold-intelligence
title: >
  General intelligence (g) is necessary but not sufficient for creative achievement:
  the threshold hypothesis holds below IQ ~120, where g predicts creative output,
  but above the threshold creative achievement is primarily determined by personality
  (openness to experience), motivation, and domain-specific knowledge.
status: active
priority: medium
impact_score: 0.63
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-creativity-intelligence-correlation
evidence_links:
  - doi: "10.1037/0033-2909.126.1.147"
    type: supporting
    confidence: 0.65
    note: "Kim (2005) meta-analysis: g-creativity correlation r=0.17; weak above IQ threshold"
  - type: related
    confidence: 0.60
    note: "Guilford (1967) Structure of Intellect model separates convergent from divergent thinking"
  - type: contradicting
    confidence: 0.55
    note: "Preckel et al. (2006) - threshold effect not replicated when using domain-specific creativity measures"
proposed_tests:
  - description: >
      Longitudinal study of 800 individuals spanning IQ 90-145. Measure divergent
      thinking, creative achievement (publications, patents, artworks), openness,
      and domain expertise at ages 25, 35, 45. Test whether g-creativity correlation
      changes slope above IQ=120 using piecewise regression.
    prediction: "Slope change at IQ≈120; above threshold, openness predicts creative achievement (r>0.35) while g does not (r<0.10)."

proposed_tests:
  - description: Build replicated circuit lattices with programmable random perturbations to R, L, and C values, then estimate the disorder level at which edge impedance peak contrast drops below a preset detection threshold.
  - description: Fit measured localization length versus disorder strength and compare against finite-size non-Hermitian tight-binding simulations using matched loss terms.
  - description: Sweep drive frequency and damping to map a phase-like boundary in (disorder, damping) space separating robust and degraded boundary-mode regimes.

id: h-prospect-theory-neural-value-coding
title: >
  Ventromedial prefrontal cortex (vmPFC) encodes the prospect theory value function
  v(x) with asymmetric slopes for gains and losses, while amygdala activity encodes
  the loss aversion coefficient lambda, predicting that vmPFC-amygdala connectivity
  mediates individual differences in loss aversion behavior.
status: active
priority: medium
impact_score: 0.65
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - cognitive-science
  - neuroscience
  - behavioral-economics
unknowns_addressed:
  - u-loss-aversion-neural-substrate
evidence_links:
  - doi: "10.1016/j.neuron.2009.09.016"
    type: supporting
    confidence: 0.68
    note: >
      Sokol-Hessner et al. (2009) show vmPFC BOLD signal correlates with choice
      value as predicted by prospect theory; individuals with stronger vmPFC-amygdala
      coupling show greater loss aversion.
  - doi: "10.1126/science.1232599"
    type: related
    confidence: 0.60
    note: >
      De Martino et al. (2010) show amygdala lesion patients show reduced loss
      aversion, providing causal evidence for amygdala's role in computing v(loss).
proposed_tests:
  - description: >
      fMRI study with parametric gain/loss gambles fitting prospect theory model
      to individual choices; test whether vmPFC BOLD signal scales with v(x) and
      whether vmPFC-amygdala functional connectivity predicts lambda across subjects.

id: h-pension-ndcdc-reform-sustainability
title: >
  Notional defined contribution (NDC) pension systems are demographically robust
  to aging shocks without requiring benefit cuts or contribution hikes, because
  automatic balancing mechanisms absorb longevity risk — and the Swedish NDC
  model provides the strongest evidence for this hypothesis.
status: active
priority: medium
impact_score: 0.68
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-pension-demographic-stress
evidence_links:
  - type: supporting
    note: "Palmer (2006) NDC: the new pension orthodoxy — Sweden's NDC maintained solvency through 2000–2008 demographic/financial stress without emergency legislation"
    confidence: 0.72
  - type: related
    note: "Holzmann et al. (2012) NDC countries (Sweden, Italy, Latvia, Poland, Norway) show lower unfunded liability growth than DB countries post-aging"
    confidence: 0.65
  - type: contradicting
    note: "Barr & Diamond (2009) NDC shifts longevity risk fully to retirees; distributional consequences vs. DB uncertain in heterogeneous mortality settings"
    confidence: 0.60
proposed_tests:
  - description: >
      Actuarial simulation: project DB vs. NDC pension system financials to 2060
      under 3 demographic scenarios (low/medium/high fertility + longevity) for
      10 OECD countries. Measure required contribution rate adjustment vs. benefit
      adjustment under each system. Test: NDC requires smaller adjustments with
      more predictable distribution.
  - description: >
      Natural experiment: Latvia switched from DB to NDC in 1996; compare
      pension system financial balance and replacement rates vs. comparable Baltic
      countries (Lithuania, Estonia) that maintained DB longer. Use panel DiD.
related_disciplines:
  - public-economics

id: h-neutral-theta-estimates-converge-pre-post-gap-chronosequence
title: >
  For replicated forest plots where neutral θ is fitted from closed-canopy census versus gap-phase recruits separately, estimates will converge within bootstrap confidence intervals when gap disturbance homogenizes competitive asymmetry — falsified if θ diverges systematically across gap ages despite comparable sampling depth.
status: active
priority: medium
impact_score: 0.38
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1126/science.1066854"
    type: related
    confidence: 0.45
    note: Neutral theory parameter interpretation baseline

unknowns_addressed:
  - u-gap-recruitment-neutral-theory-goodness-of-fit

proposed_tests:
  - description: >
      Partition censuses by canopy state (intact vs gap) within the same landscape; estimate θ via maximum likelihood; bootstrap uncertainty and test for significant shifts with spatial covariates.
    method: Forest inventory + Bayesian hierarchical models comparing neutral vs trait-augmented likelihoods
    prediction: θ shifts insignificant where demographic stochasticity dominates post-disturbance recruitment


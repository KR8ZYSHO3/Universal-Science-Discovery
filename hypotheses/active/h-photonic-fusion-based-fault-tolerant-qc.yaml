id: h-photonic-fusion-based-fault-tolerant-qc
title: >
  Fusion-based linear optical quantum computing (FBQC, Bartolucci et al. 2023)
  can achieve fault-tolerant quantum computation with photon loss rates < 10%
  by replacing two-qubit gates with probabilistic Bell-state measurements and
  encoding logical qubits in resource states, making photonic QC scalable
  without deterministic photon-photon interactions.

proposed_tests:
  - description: >
      Implement a 4-qubit FBQC prototype demonstrating logical qubit encoding
      and below-threshold error correction using integrated silicon photonic chips.
      Measure effective logical error rate vs physical photon loss rate. Test
      whether the fault-tolerance threshold of ~10% photon loss is achievable
      with current silicon photonic waveguide technology.

  - type: related
    confidence: 0.4
    note: "Ion-specificity may dominate at high affinity; experiments must disentangle."

unknowns_addressed:
  - u-debye-length-ion-specificity-membrane-binding

proposed_tests:
  - description: >
      Measure binding isotherms for a peripheral protein across salts (NaCl, MgCl2, CaCl2) at matched ionic
      strengths where possible; compare shifts to PB+Stern predictions.
    method: Surface plasmon resonance + MD snapshot validation on simplified bilayers.
    prediction: Deviations grow for divalents and for proteins with carboxylate-rich disordered tails.


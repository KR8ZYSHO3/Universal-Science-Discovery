id: h-ion-specific-double-layer-competition-modulates-permeation
title: >
  For anionic phospholipid membranes, divalent cations collapse the double layer and recruit peripheral proteins
  non-monotonically with concentration — producing a permeation or binding optimum before precipitation —
  testable with parallel microfluidic titrations and MD.
status: active
priority: medium
impact_score: 0.54

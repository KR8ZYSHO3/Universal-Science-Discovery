evidence_links:
  - type: supporting
    note: "Averback & Diaz de la Rubia (1998) MD simulations of displacement cascades: 95% recombination within 10 ps thermal spike — surviving clusters form within cascade"
    confidence: 0.82
  - type: supporting
    note: "Nordlund et al. (2018) primary damage state review: cluster fraction scales universally with PKA energy — MD cascade results transferable across metals"
    confidence: 0.78
  - type: related
    note: "Was (2016) radiation materials science: long-term swelling and embrittlement driven by immobile vacancy cluster accumulation — not interstitial sinks"
    confidence: 0.75
proposed_tests:
  - description: >
      Ion irradiation benchmark: irradiate W, Fe, Zr, and SiC with 1 MeV protons
      to 0.1 dpa at 50°C. Measure defect cluster size distribution by TEM at
      1 min, 1 hr, 24 hr post-irradiation. Test: cluster spectra matches MD
      prediction within 50% in number density — validates MD transferability.
  - description: >
      Accelerated annealing test: irradiated samples isochronally annealed at
      50–800°C (100°C steps, 30 min). Measure defect cluster density by SAXS.
      Compute activation energy for cluster dissolution. Test: measured E_a matches
      MD-predicted binding energy of loop dissociation (±0.2 eV).

id: h-radiation-damage-ballistic-annealing
title: >
  Radiation damage recovery in nuclear materials is dominated by recombination
  of vacancy-interstitial pairs during the thermal spike (< 10 ps) — ballistic
  annealing recombines > 90% of Frenkel pairs in metals — and the long-term
  microstructural evolution is determined by the surviving defect cluster spectrum
  which can be predicted from molecular dynamics cascade simulations.
status: active
priority: medium
impact_score: 0.70
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:

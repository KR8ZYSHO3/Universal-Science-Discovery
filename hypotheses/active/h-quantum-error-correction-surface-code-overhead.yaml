id: h-quantum-error-correction-surface-code-overhead
title: >
  The surface code requires approximately 1000 physical qubits per logical qubit at
  current physical error rates (~10^-3), but threshold improvements to 10^-4 error
  rates would reduce this to ~100:1, making fault-tolerant quantum computing
  practical; the minimum physical-to-logical overhead is lower-bounded by the
  code distance needed to suppress errors below 10^-10 for useful computation.

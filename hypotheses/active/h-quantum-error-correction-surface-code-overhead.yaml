proposed_tests:
  - description: >
      Full fault-tolerant logical qubit demonstration: implement 100-round cycle surface
      code on 49 physical qubits (distance-7), measure logical error rate vs physical
      error rate. Test: does logical error rate decrease by expected factor d^2 for
      each unit increase in code distance d?
    prediction: "Logical error rate p_L ~ (p_phys/p_th)^d where d=code distance and p_th~1%; at p_phys=10^-3, d=7 achieves p_L<10^-8."

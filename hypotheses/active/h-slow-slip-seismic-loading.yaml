id: h-slow-slip-seismic-loading
title: >
  Slow-slip events in the Cascadia, Nankai, and Mexico subduction zones systematically
  increase Coulomb stress on the adjacent locked seismogenic zone, and the cumulative
  stress transfer from episodic tremor-and-slip cycles raises the conditional probability
  of a great earthquake (M>8.5) measurably during and immediately after each SSE.
status: active
created: "2026-05-05"
last_updated: "2026-05-05"
priority: high
impact_score: 0.88
related_disciplines:
  - seismology
  - geoscience
  - geomechanics
unknowns_addressed:
  - u-slow-slip-event-origin
  - u-earthquake-nucleation
evidence_links:
  - type: supporting
    note: >
      Coulomb stress transfer calculations from Cascadia SSE models show 0.001–0.01 MPa
      loading on the locked zone per SSE, accumulating to 0.1–1 MPa over the ~14-month
      SSE cycle. This is comparable to stress drops in M4–5 triggering earthquakes.
  - type: contradicting
    note: >
      Statistical tests of great earthquake occurrence relative to SSE phase in Nankai
      and Mexico show no significant clustering; the sample size (number of great
      earthquakes) is too small to detect the predicted modest probability increase.
  - type: related
    note: >
      Cascadia SSEs are highly periodic (~14 months in southern Cascadia) making
      this one of the most tractable natural experiments for testing SSE-seismic
      hazard interaction.
proposed_tests:
  - description: >
      Use GPS time series from Pacific Northwest Network to catalog Cascadia SSE
      timing precisely. Cross-correlate with M≥3 seismicity in the locked zone
      above the SSE zone using point-process statistics. Test for elevated seismicity
      rate during/after SSEs at 95% confidence over 30+ years of catalog.
  - description: >
      Compute Coulomb stress change on the locked zone from each SSE using GPS-derived
      slip models. Test whether cumulative Coulomb stress loading from SSEs since 1700
      (last great Cascadia earthquake) is approaching the failure threshold estimated
      from paleoseismic recurrence intervals.

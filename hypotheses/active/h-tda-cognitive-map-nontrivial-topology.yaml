proposed_tests:
  - summary: >
      Record prefrontal cortex population activity during a categorization task where
      stimuli lie on a conceptual circle (e.g., color wheel, clock face). Apply persistent
      homology to the population activity point cloud. Test whether Betti_1 = 1 (circular
      topology) is detected above chance, using shuffled data as null distribution.
      Compare decoding accuracy of the TDA topology readout vs. standard linear decoders.

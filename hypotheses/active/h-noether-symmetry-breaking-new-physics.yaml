id: h-noether-symmetry-breaking-new-physics
title: >
  Every experimentally observed violation of a known conservation law implies a
  new broken symmetry — systematic search for conservation law violations (CP
  violation, baryon asymmetry, lepton number) should be interpreted as Noether's
  theorem pointing to undiscovered symmetry structure.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high

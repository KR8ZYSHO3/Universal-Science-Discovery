evidence_links:
  - type: supporting
    note: >
      CP violation observed in kaon and B-meson systems (Cronin & Fitch 1964, BaBar,
      Belle) implies broken CP symmetry — consistent with Noether's theorem (no CP
      conservation law because no exact CP symmetry in the Standard Model).
  - type: supporting
    note: >
      Baryon asymmetry of the universe (matter dominates antimatter) implies B-L
      symmetry violation at early cosmic times — Sakharov conditions require
      baryon number violation, CP violation, and departure from thermal equilibrium.
  - type: related
    note: >
      Weinberg (1995) The Quantum Theory of Fields: symmetry-breaking as the
      organizing principle of particle physics beyond the Standard Model.
proposed_tests:
  - discipline: particle-physics
    description: >
      Search for lepton number violation (neutrinoless double beta decay) in
      76Ge, 136Xe experiments. Observation would imply Majorana neutrino masses —
      a broken U(1)_L symmetry — and (by Noether's theorem) a corresponding
      Noether current that is not conserved. Map the symmetry structure of the
      implied UV theory.
  - discipline: cosmology
    description: >
      Measure the baryon-to-photon ratio η precisely across cosmic time (CMB vs
      Big Bang nucleosynthesis vs direct baryon surveys). Any tension implies a
      non-standard history of baryon number violation — a signal of new broken
      symmetry in the early universe not captured by Standard Model Noether charges.

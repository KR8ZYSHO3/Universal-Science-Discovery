id: h-landau-neural-transition-measurability
title: "The E/I (excitation-inhibition) balance ratio is the control parameter for a Landau mean-field phase transition in neural circuits, with firing rate variance as the order parameter and chi ~ |EI - EI_c|^{-1}"
status: active
created: "2026-05-05"
priority: high
impact_score: 0.85

evidence_links:
  - type: supporting
    doi: "10.1016/j.neuron.2013.06.018"
    note: "Atallah & Scanziani (2009) - E/I balance maintained during cortical activity; deviations produce runaway excitation or silence"
  - type: supporting
    doi: "10.1038/nphys2374"
    note: "Chialvo (2010) - brain near criticality; susceptibility-like divergence observed near critical E/I"
  - type: supporting
    note: "Autism spectrum disorder and epilepsy are associated with E/I imbalance — consistent with perturbation away from critical point"

proposed_tests:
  - description: "In cortical slice cultures with tunable E/I (optogenetic inhibition titration), measure population firing rate variance vs E/I ratio; test for divergence with exponent gamma=1 (mean-field Ising)"
  - description: "Apply Binder cumulant analysis to neural population activity at multiple tissue volumes; test for crossing at a single E/I_c value, confirming genuine phase transition"
  - description: "Test whether specific psychiatric conditions (schizophrenia: reduced inhibition) map to the disordered phase, while epilepsy (excess excitation) maps to the ferromagnetic (synchronized) phase"

unknowns_addressed:
  - u-landau-theory-neural-criticality-order-parameter

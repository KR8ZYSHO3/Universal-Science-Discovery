id: h-microbial-cue-warming-feedback-carbon-cycle
title: >
  A 1 degree C increase in mean soil temperature reduces global mean microbial carbon
  use efficiency by 2-4 percentage points, releasing an additional 30-50 Pg C from
  soils by 2100 relative to current Earth System Model projections that assume
  temperature-independent CUE.
status: active
priority: critical
impact_score: 0.89
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - ecology
  - thermodynamics
  - climate-science
unknowns_addressed:
  - u-soil-carbon-cue-temperature-response
evidence_links:
  - doi: "10.1038/s41558-018-0271-9"
    type: supporting
    confidence: 0.68
    note: >
      Wieder et al. (2018) show models incorporating microbial CUE predict 2-3x
      larger soil carbon losses under warming than models without; supports the
      importance of CUE-temperature feedbacks for climate projections.
  - doi: "10.1111/j.1461-0248.2010.01538.x"
    type: related
    confidence: 0.62
    note: >
      Manzoni et al. (2012) meta-analysis of CUE across ecosystems shows systematic
      decrease with temperature; mean dCUE/dT = -0.016 per degree C, consistent
      with the hypothesis range of 2-4 percentage points per degree C.
proposed_tests:
  - description: >
      Soil warming experiment (buried heating cables, +2 and +4 degrees C) in
      three biomes (boreal, temperate, tropical); measure CUE annually using 13C-labeling
      and respiration partitioning over 10 years; test whether CUE decreases
      at the rate dCUE/dT = -0.02 to -0.04 per degree C as predicted, and whether
      microbial community thermal adaptation reduces this sensitivity over time.

id: h-pes-elite-capture-indigenous-displacement-monitoring-prevention
title: >
  Payments for Ecosystem Services programs in tropical forest countries show
  measurable elite capture (>30% of payments flowing to non-subsistence landowners
  in the top income quintile) that can be reduced by ≥50% through community-based
  monitoring with community verification of additionality requirements.
status: active
priority: high
impact_score: 0.73
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-environmental-justice-cumulative-impact-assessment-methodology
evidence_links:
  - type: supporting
    note: "Grieg-Gran et al. (2005) World Dev 33:1685 — review of PES schemes in Costa Rica, Mexico, Bolivia: elite capture documented in all cases; wealthier landowners more likely to participate (land titles required), indigenous communities excluded by lack of formal tenure"
    confidence: 0.78
  - type: supporting
    note: "Leach et al. (2012) Environ Sci Policy 16:14 — systematic review: PES displacement of indigenous communities documented in Mexico (PSA-H program), China (Sloping Land Conversion), and Costa Rica; formal property rights requirements are the primary exclusion mechanism"
    confidence: 0.80
  - type: contradicting
    note: "Wunder et al. (2018) Ecol Econ 150:31 — meta-analysis of 108 PES evaluations: average additionality is positive (PES does reduce deforestation) and approximately one-third of payments reach smallholders; elite capture is real but not universal and depends on program design"
    confidence: 0.70
  - type: supporting
    note: "Ferraro & Kiss (2002) Science 298:1718 — direct payments more effective than integrated conservation-development projects for reducing deforestation — but effectiveness at reaching poor communities (vs. wealthier landowners with larger deforestation opportunity costs) not demonstrated"
    confidence: 0.65
proposed_tests:
  - description: >
      Randomized evaluation of community-based PES monitoring (CBPM) in 60
      villages in Indonesia (REDD+ forest carbon program). Treatment arm: community
      monitors (trained local residents with GPS and photo documentation tools)
      verify deforestation additionality and payment eligibility for neighboring
      parcels. Control arm: standard government monitoring. Primary outcome: Gini
      coefficient of PES payment distribution within treatment vs. control villages.
      Secondary: total forest cover change (does CBPM reduce monitoring error and
      increase additionality?). Prediction: Gini coefficient of payment distribution
      is 0.15-0.20 lower in CBPM villages (more equitable) and deforestation reduction
      is 10-15% greater (better additionality monitoring).
  - description: >
      Comparative case study of 4 national PES programs (Costa Rica PSA-H, Mexico
      PSA, China SLCP, Vietnam PES) on: (1) percentage of payments to subsistence
      farmers (income bottom quintile), (2) displacement incidents reported by NGOs,
      (3) indigenous community participation rates. Code each program on a 10-dimension
      elite-capture-prevention index (formal tenure requirements, community mapping
      recognition, grievance mechanisms, community monitors, participatory eligibility
      criteria). Prediction: programs scoring ≥7/10 on prevention index have >2×
      higher subsistence farmer payment shares than programs scoring ≤4/10.

proposed_tests:
  - description: >
      Quasi-experiment using Slack channel addition events in firms: measure pre/post
      change in cross-team project completion time and communication volume. Identify
      cases where adding a channel increased communication noise (information overload)
      and worsened coordination — comparing to teams that did not add channels.
  - description: >
      Graph-theoretic analysis of firm communication networks before/after merger events:
      measure whether the combined network has higher Braess-paradox vulnerability (ratio
      of Nash equilibrium to socially optimal routing) than either pre-merger network.
      Predict: high vulnerability predicts post-merger productivity decline.

id: h-fano-q-factor-tracks-radiative-darkness-order-parameter
title: >
  Define an empirical darkness scalar D = Γ_rad/(Γ_rad + Γ_abs) extracted from coupled-mode fits; across geometric
  families of split-ring / oligomer metamaterials, peak loaded Q scales approximately as 1/(1−D) until absorption dominates.
status: active
priority: medium
impact_score: 0.42
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR


    type: related
    confidence: 0.48
    note: "Fano phenomenology supports interference-controlled linewidths."
  - type: related
    confidence: 0.36
    note: "Scaling law is **speculative** until tested across unified fabrication batches."

unknowns_addressed:
  - u-fano-metamaterial-dark-mode-q-engineering

proposed_tests:
  - description: >
      Fabricate gradient geometry sweep with SEM-metrology; extract Γ_rad, Γ_abs via multimodal fit at fixed ω₀;
      regress Q versus D.
    method: Electron microscopy + optical extinction + coupled-mode fitting with bootstrap uncertainties.
    prediction: Monotone increasing Q vs D up to absorption knee; R²≥0.7 within family.


proposed_tests:
  - discipline: computational-biology
    description: >
      Design 20 binders to PPI hub proteins spanning 3 degree bins (k=5-10, 20-40, >80)
      using RosettaDesign or AlphaFold2 + ProteinMPNN. Measure Kd by SPR and off-target
      binding to 50 structurally similar proteins by multiplexed SPR. Test whether
      off-target count increases with hub degree as predicted by scale-free network
      topology.
  - discipline: oncology
    description: >
      Compare therapeutic index (IC50_cancer / IC50_normal) across a panel of designed
      binders to hub vs. non-hub cancer proteins. Test whether hub-targeted binders
      have systematically narrower therapeutic windows, supporting the network-topology
      constraint hypothesis.

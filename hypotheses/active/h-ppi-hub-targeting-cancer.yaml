id: h-ppi-hub-targeting-cancer
title: >
  Computational protein-protein interface design can produce nanomolar-affinity binders
  to hub proteins in the PPI network by exploiting their conserved hydrophobic interface
  hotspots, but off-target toxicity scales with network degree, creating a fundamental
  therapeutic window constraint imposed by the scale-free network topology.

id: h-protein-folding-funnel-alphafold2-contact-prediction-mechanism
title: >
  AlphaFold2's evoformer attention implicitly learns the contact map of the
  protein energy landscape funnel — specifically, the pairwise coevolution
  signal in multiple sequence alignments is a compressed representation of the
  G(Q) funnel slope — and designed proteins with >70% MSA coverage achieve
  experimental folding rates within 3-fold of AF2-predicted contact predictions.
status: active
priority: medium
impact_score: 0.80

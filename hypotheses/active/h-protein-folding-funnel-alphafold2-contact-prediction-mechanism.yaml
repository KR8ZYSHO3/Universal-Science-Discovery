proposed_tests:
  - description: >
      For 100 naturally occurring proteins with known folding rates k_f and
      AF2 confidence (pLDDT > 90), compute the predicted contact map from AF2
      evoformer attention weights; calculate the "contact order" (average sequence
      separation of contacts weighted by AF2 attention); test whether contact
      order predicts log(k_f) with r² > 0.7.
    method: "100 proteins from Plaxco et al. folding rate database; AF2 inference; evoformer attention extraction; contact order calculation; linear regression log(k_f) vs. contact order"
    prediction: "Contact order from AF2 evoformer attention predicts log(k_f) with r² = 0.75±0.10 — comparable to experimental contact order (r² ≈ 0.80, Plaxco et al. 1998) — confirming that AF2 encodes the energy landscape funnel slope"
  - description: >
      De novo design test: for 50 proteins designed by RFdiffusion + ProteinMPNN
      with varying MSA depth (10 to 10000 natural homologs), measure experimental
      expression yield and melting temperature (Tm) vs. AF2 pLDDT confidence score;
      test whether pLDDT predicts Tm (a proxy for energy landscape depth) as a
      function of MSA depth.
    method: "50 designed proteins expressed in E. coli; CD thermal denaturation for Tm; AF2 inference with different MSA depths; regression pLDDT vs. Tm"
    prediction: "For MSA depth > 100 sequences, pLDDT > 80 predicts Tm > 60°C with sensitivity 75%; for MSA depth < 10 sequences, pLDDT is uncorrelated with Tm — confirming evolutionary coverage threshold"


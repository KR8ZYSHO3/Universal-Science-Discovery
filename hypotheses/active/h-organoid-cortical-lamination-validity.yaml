id: h-organoid-cortical-lamination-validity
title: >
  Cerebral organoids recapitulate the transcriptional trajectory of human cortical
  development (neuroepithelium → radial glia → cortical neurons, inside-out
  lamination) but systematically fail to model areal specification and thalamic
  input because they lack vascularization and extrinsic instructive signals —
  making them valid models for cell-intrinsic developmental programs but not
  for circuit-level or areal questions.

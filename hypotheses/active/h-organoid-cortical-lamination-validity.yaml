proposed_tests:
  - description: >
      Compare single-nucleus RNA-seq of dorsal forebrain organoids at weeks 8, 16,
      and 24 with matched human fetal cortex samples. Quantify cell-type proportions
      and transcriptional similarity scores (Spearman correlation of gene expression
      vectors). Test whether organoid fidelity is high (>0.85 correlation) for
      progenitor types but low (<0.60) for upper-layer neuron subtypes that require
      thalamic input for specification.

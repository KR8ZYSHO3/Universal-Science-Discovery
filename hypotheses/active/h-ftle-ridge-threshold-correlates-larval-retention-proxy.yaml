id: h-ftle-ridge-threshold-correlates-larval-retention-proxy
title: >
  Coastal retention proxies computed from backward-time FTLE ridges above calibrated thresholds correlate more strongly with settlement indices than Eulerian SST fronts alone when pelagic larval durations fall below mesoscale eddy turnover times — falsified if ridge metrics add negligible ΔR² in hierarchical models with identical covariates.
status: active
priority: medium
impact_score: 0.29
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR
evidence_links:
  - doi: "10.3354/meps260083"
    type: related
    confidence: 0.46
    note: Larval Lagrangian dispersion framing motivating circulation-based retention hypotheses.
unknowns_addressed:
  - u-lcs-retention-coastal-recruitment-transfer
proposed_tests:
  - description: >
      Fit hierarchical regression models predicting settlement using Eulerian covariates vs Eulerian + FTLE ridge exposure metrics on paired circulation ensembles with PLD priors.
    method: Ensemble ocean hindcasts + spatial statistics with spatial cross-validation.
    prediction: FTLE exposures retain nonzero effect sizes only when PLD ≪ eddy decorrelation timescales (interaction term significance).

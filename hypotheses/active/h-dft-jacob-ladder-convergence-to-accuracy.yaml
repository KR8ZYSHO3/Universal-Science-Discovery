proposed_tests:
  - description: >
      Benchmark: apply LDA, PBE (GGA), TPSS (meta-GGA), B3LYP (hybrid), and ωB97X-V
      (range-separated hybrid) to G4 thermochemistry dataset (3000 energies).
      Test: does MAE decrease with each rung? Does the improvement plateau below
      chemical accuracy (1 kcal/mol) for any single functional class?
    prediction: "MAE reduces: LDA(30 kcal/mol) → GGA(8 kcal/mol) → meta-GGA(5 kcal/mol) → hybrid(2 kcal/mol) → double hybrid(0.8 kcal/mol); plateau at 1-2 kcal/mol for hybrid level without empirical fitting."

id: h-dft-jacob-ladder-convergence-to-accuracy
title: >
  The Jacob's Ladder of DFT approximations (LDA → GGA → meta-GGA → hybrid →
  double hybrid) systematically approaches chemical accuracy by satisfying
  increasingly many exact constraints, with each rung reducing mean absolute error
  in thermochemistry by ~50%; hybrid functionals already achieve near-chemical-accuracy
  for organic molecules and the remaining gap arises specifically from strong-
  correlation systems and delocalization error.

id: h-borrelia-triple-combo-persister-eradication
title: >
  The combination of daptomycin + doxycycline + cefuroxime will achieve >99%
  eradication of Borrelia burgdorferi persister cells (all morphological forms)
  in a 28-day regimen, translating the Feng et al. (2015) in vitro finding to
  a validated PTLDS treatment.
status: active
priority: critical
impact_score: 0.82
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
unknowns_addressed:
  - u-borrelia-persister-cell-eradication
evidence_links:
  - type: supporting
    doi: 10.1128/AAC.00501-15
    note: "Feng et al. (2015) FDA-approved drug library screen: daptomycin + doxycycline + cefuroxime achieved >99% kill of biofilm-form Borrelia in vitro — the strongest published evidence for this combination."
    confidence: 0.72
  - type: supporting
    note: "Primate (rhesus macaque) models by Barthold lab show Borrelia persistence post-doxycycline treatment — consistent with the persister mechanism and the need for a more aggressive combination."
    confidence: 0.58
  - type: contradicting
    note: "The Klempner et al. (2001, NEJM) prolonged antibiotic retreatment RCT showed no benefit over placebo in PTLDS — but used IV ceftriaxone (not the daptomycin combination), and enrolled heterogeneous PTLDS patients without biomarker stratification."
    confidence: 0.65
  - type: related
    doi: 10.3389/fmed.2013.00057
    note: "Aucott et al. (2013) PTLDS symptom burden and functional impairment — establishes the clinical outcome metrics the hypothesis is meant to address."
    confidence: 0.90
proposed_tests:
  - description: >
      Phase 1b/2a safety and pharmacokinetics: 28-day oral doxycycline +
      cefuroxime axetil + IV daptomycin (or alternative membrane-disrupting
      agent with better oral bioavailability and CNS penetration) in 20–30
      documented PTLDS patients. Primary endpoint: safety and tolerability.
      Secondary: change in validated PTLDS symptom scores (Fatigue Severity
      Scale, NeuroQoL cognitive battery) at 6 and 12 months.
  - description: >
      Primate model validation: treat C3H/HeN mice or rhesus macaques with
      established post-treatment Borrelia infection with the triple combination
      for 28 days. Primary endpoint: xenodiagnosis (tick feeding on treated
      animals) and tissue culture at 3 months post-treatment. Compare to
      doxycycline monotherapy arm.
  - description: >
      Biomarker-stratified RCT: enroll PTLDS patients with elevated CSF CXCL13
      (active neuroinflammation biomarker) OR positive Borrelia antigen test.
      Randomize 1:1 to triple combination vs. placebo. Primary endpoint: NeuroQoL
      cognitive function score change at 12 months. Secondary: CSF CXCL13 and
      IL-6 at 3 months.

proposed_tests:
  - description: >
      Derive the optimal mutation rate mu* as a function of effective population size
      Ne and fitness landscape correlation length xi (quasispecies model); test whether
      observed mutation rates across 100+ organisms follow the predicted mu* ~ 1/(Ne * xi)
      scaling relationship from information theory.
    method: "Mutation rate data from Sung et al. (2016) mutation accumulation experiments; Ne from population genetics estimates; fitness landscape xi from DMS data"
    prediction: "Observed mutation rate vs Ne follows mu* = C/(Ne * xi) with C = 1/ln(Ne) within 2-fold across all domains of life"
  - description: >
      Test whether stress-induced mutagenesis (SOS response in bacteria, increased
      error rate under starvation) implements an optimal strategy of increasing
      mutation rate under low fitness (environmental stress), as predicted by
      Bayesian-optimal information acquisition.
    method: "Fluctuation tests measuring mutation rate in E. coli under nutrient stress vs. optimal growth; compare to predicted optimal mu*(stress) from quasispecies theory"
    prediction: "SOS-induced mutation rate increase is within 3-fold of the theoretically optimal rate for exploring the fitness landscape under stress conditions"

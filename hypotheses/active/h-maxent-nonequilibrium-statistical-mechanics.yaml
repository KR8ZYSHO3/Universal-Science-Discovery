id: h-maxent-nonequilibrium-statistical-mechanics
title: >
  Maximum caliber (MaxCal) — the path-entropy generalization of Jaynes's MaxEnt —
  is the correct variational principle for non-equilibrium steady states, and
  recovers fluctuation theorems as its extremal conditions.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
related_disciplines:
  - statistical-mechanics
  - information-theory
  - non-equilibrium-thermodynamics
unknowns_addressed:
  - u-boltzmann-shannon-nonequilibrium-bridge
evidence_links:
  - type: supporting
    note: >
      Presse et al. (2013) Principles of maximum entropy and maximum caliber in
      statistical physics. Rev Mod Phys 85:1115 — systematic derivation of MaxCal
      framework and recovery of master equation dynamics from path entropy maximization.
  - type: supporting
    note: >
      Crooks (1999) Entropy production fluctuation theorem and the nonequilibrium
      work relation for free energy differences. Phys Rev E 60:2721 — fluctuation
      theorems as constraints in the path-entropy variational problem.
  - type: related
    note: >
      Jaynes (1957) MaxEnt as equilibrium limit — MaxCal should reduce to MaxEnt
      for time-homogeneous systems in the limit of zero driving.
proposed_tests:
  - discipline: statistical-mechanics
    description: >
      Derive the steady-state distribution of a model non-equilibrium system
      (e.g., a driven Brownian particle in a tilted periodic potential) using
      MaxCal and compare against exact analytical results. Verify that MaxCal
      gives the correct non-equilibrium stationary distribution without assuming
      detailed balance.
  - discipline: biophysics
    description: >
      Apply MaxCal to the sequence of conformational transitions in a molecular
      motor (kinesin, ATP synthase) measured by single-molecule FRET. Test whether
      MaxCal with energy and flux constraints reproduces the observed dwell-time
      distributions and step-size statistics better than kinetic models with fit parameters.

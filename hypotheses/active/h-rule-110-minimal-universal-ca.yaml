proposed_tests:
  - description: >
      Systematically search for Turing machines simulable by elementary CAs with rule numbers < 110 by
      attempting to construct tag system or cyclic tag system simulations in each Class IV CA. Prove
      non-universality for candidate CAs by showing bounded computation space.
    method: "Computational search + formal language theory: test whether CA language is context-free or regular"
    prediction: "No elementary CA with rule number < 110 should support Turing-complete computation; all should be proved in lower complexity class"


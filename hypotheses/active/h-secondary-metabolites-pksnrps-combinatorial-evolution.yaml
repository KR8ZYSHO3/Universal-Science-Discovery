id: h-secondary-metabolites-pksnrps-combinatorial-evolution
title: >
  The modular architecture of PKS and NRPS assembly lines evolves primarily by
  horizontal gene transfer and domain shuffling rather than point mutation — and
  the combinatorial space of viable module orderings is much larger than currently
  sampled by evolution, making synthetic PKS/NRPS libraries a rich source of novel
  bioactive scaffolds with predicted structural diversity.

proposed_tests:
  - description: >
      Phylogenetic analysis of all known PKS module sequences in NCBI databases.
      Reconstruct the evolutionary history of each module type (KS, AT, KR, DH, ER)
      by comparison of gene trees to species trees. Test whether HGT events (gene
      tree discordant with species tree) significantly outnumber vertical descent
      events; quantify the fraction of PKS module diversity attributable to HGT vs.
      in situ diversification.
    method: "Maximum likelihood phylogenomics + HGT detection (RANGER-DTL) + ancestral state reconstruction"
    prediction: "≥ 40% of PKS module diversity is attributable to HGT events; AT domain shows highest HGT rate (swaps substrate specificity)"
  - description: >
      Synthetic library screen: design 500 chimeric PKS module combinations
      (random permutations of 4-module PKS assembly lines using validated domain
      interfaces); express in Streptomyces venezuelae chassis using standardised
      biobrick connectors; screen products by HRMS for masses consistent with
      predicted polyketide products; test active fractions against ESKAPE pathogens.
    method: "Combinatorial PKS library construction + heterologous expression + HRMS + antimicrobial screen"
    prediction: "≥ 30% of chimeric PKS combinations yield a detectable polyketide product; ≥ 5% of products show antimicrobial activity at < 10 µg/mL"


id: h-ionizable-lipid-pka-endosomal-escape
title: >
  The pKa of the ionizable lipid is the primary determinant of LNP endosomal
  escape efficiency, and formulations with pKa tuned to 6.2–6.5 achieve maximal
  mRNA translation through optimal membrane fusion kinetics at endosomal pH.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
related_disciplines:
  - drug-delivery
  - biophysics
  - immunology
unknowns_addressed:
  - u-lnp-tissue-targeting-mechanism
evidence_links:
  - type: supporting
    note: >
      Semple et al. (2010) Nat Biotechnol 28:172 — systematic pKa screen of ionizable
      lipids for siRNA delivery; pKa 6.2-6.8 correlates with maximal hepatic gene
      silencing. Mechanistic explanation: neutral at pH 7.4 (serum, long circulation),
      cationic at pH 5.5 (endosome, membrane destabilization).
  - type: supporting
    note: >
      Kulkarni et al. (2019) Nanoscale — cryo-TEM and SAXS characterization of
      LNP internal morphology as a function of ionizable lipid pKa; inverted hexagonal
      phase formation (associated with efficient endosomal escape) correlates with
      pKa in the 6.2-6.8 range.
  - type: related
    note: >
      Moderna and BioNTech COVID-19 mRNA vaccine formulations both use ionizable
      lipids with pKa ≈ 6.5 (SM-102 and ALC-0315, respectively) — independent
      convergence on the same pKa optimum.
proposed_tests:
  - discipline: biophysics
    description: >
      Systematic pKa series: synthesize a homologous series of ionizable lipids
      with pKa 5.0, 5.5, 6.0, 6.5, 7.0, 7.5. Formulate identical LNPs and measure:
      (1) mRNA encapsulation efficiency, (2) in vitro mRNA translation (luciferase
      assay in HeLa cells), (3) endosomal escape efficiency (galectin-9 puncta assay),
      (4) cryo-TEM morphology. Determine whether a single optimum pKa maximizes
      translation across different cell types and mRNA sequences.
  - discipline: drug-delivery
    description: >
      In vivo biodistribution screen: compare pKa 6.0, 6.5, 7.0 LNPs in mice
      after intravenous administration of mRNA encoding firefly luciferase.
      Measure luminescence by IVIS imaging in liver, spleen, lung, kidney.
      Test whether pKa independently controls organ distribution or only affects
      endosomal escape efficiency once the LNP has reached the target tissue.

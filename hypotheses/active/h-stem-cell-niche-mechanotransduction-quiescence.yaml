proposed_tests:
  - description: >
      3D hydrogel culture of muscle satellite cells with programmable stiffness (0.5-100 kPa);
      measure YAP nuclear/cytoplasmic ratio, EdU incorporation, and Pax7/MyoD expression
      to map the stiffness threshold for quiescence exit with time resolution.

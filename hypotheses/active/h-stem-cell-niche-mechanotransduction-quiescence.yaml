id: h-stem-cell-niche-mechanotransduction-quiescence
title: >
  Adult stem cell quiescence is maintained by low ECM stiffness in the niche through
  YAP/TAZ cytoplasmic sequestration, and tissue injury activates stem cells by
  increasing matrix stiffness (via MMP-mediated crosslinking) to a threshold that
  triggers YAP/TAZ nuclear translocation and proliferative gene expression.

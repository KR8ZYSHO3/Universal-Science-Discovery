id: h-fibrosis-reversibility-mechanosensing
title: >
  Established organ fibrosis is reversible when matrix-activated myofibroblast
  mechanosensing (via YAP/TAZ-MRTF-SRF axis) is pharmacologically interrupted,
  allowing myofibroblast de-activation and matrix metalloproteinase-driven ECM remodelling
  to restore tissue architecture.
status: active
priority: high
impact_score: 0.84
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - cell-biology
  - fibrosis-research
  - biophysics

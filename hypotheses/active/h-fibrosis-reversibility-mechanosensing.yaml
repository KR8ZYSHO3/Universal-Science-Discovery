evidence_links:
  - doi: "10.1016/j.cell.2012.01.010"
    type: supporting
    confidence: 0.81
    note: >
      Dupont et al. (2011) Nature — YAP/TAZ sense ECM stiffness via mechanical forces on actin
      cytoskeleton; high stiffness activates YAP/TAZ transcription of fibrogenic genes including
      CTGF and CYR61, maintaining myofibroblast identity
  - doi: "10.1172/JCI58569"
    type: supporting
    confidence: 0.78
    note: >
      Bhatt et al. (2012) J Clin Invest — bleomycin-induced pulmonary fibrosis in mice is
      partially reversed by anti-LOXL2 antibody (matrix crosslink inhibitor) even in established
      fibrosis, reducing collagen content and restoring lung compliance
  - doi: "10.1038/s41591-019-0490-1"
    type: related
    confidence: 0.67
    note: >
      Sofroniew (2018) — in CNS, astrocyte scar is not permanent; RhoA/ROCK inhibition
      promotes scar resolution and axon regrowth, suggesting mechanosensing as universal target
proposed_tests:
  - description: >
      Test reversibility in established liver fibrosis (CCl4 8-week model) using verteporfin
      (YAP inhibitor) + ROCK inhibitor combination; quantify collagen area fraction (Sirius Red),
      myofibroblast αSMA+ cell count, and TGF-β1 signalling at 4-week intervals post-treatment.

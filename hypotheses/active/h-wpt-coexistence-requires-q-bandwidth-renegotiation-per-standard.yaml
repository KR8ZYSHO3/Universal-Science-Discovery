proposed_tests:
  - description: >
      Bench-test identical coil pairs at two tunable carriers with vector network analyzer sweeps; measure η(f₁,f₂)
      grid versus loaded Q controlled by series resistance steps.
    method: Two-port S-parameter extraction + DC load efficiency mapping.
    prediction: Efficiency contours shrink elliptically in carrier-spacing/Q plane with ridge along lowered-Q diagonal.


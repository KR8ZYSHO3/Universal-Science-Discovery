id: h-wpt-coexistence-requires-q-bandwidth-renegotiation-per-standard
title: >
  For fixed coil geometry, simultaneously satisfying two resonant WPT carrier frequencies at ≥90% of
  single-carrier peak efficiency requires lowering loaded Q or splitting transmit/receive resonance — implying
  per-standard impedance schedules rather than one universal high-Q tune.
status: active
priority: medium
impact_score: 0.52

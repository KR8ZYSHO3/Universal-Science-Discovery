id: h-topological-defect-morphogenesis
title: >
  Topological defect charge is conserved during organ morphogenesis and acts as a
  predictive coordinate system; charge non-conservation events predict developmental failure.
status: active
created: "2026-05-04"
last_updated: "2026-05-04"
priority: high
related_disciplines:
  - mathematical-physics
  - developmental-biology
  - biophysics
  - soft-matter
unknowns_addressed:
  - u-topological-morphogenesis
evidence_links:
  - type: supporting
    arxiv: "2602.09867"
    note: Cell adhesion and topology at the core of morphogenesis — defect formation in embryonic tissue demonstrated
  - type: supporting
    doi: 10.1126/science.aar5663
    note: Saw et al. 2017 — topological defects in 2D epithelia trigger apoptosis; charge determines cell fate
  - type: supporting
    doi: 10.1038/s41567-019-0561-9
    note: Maroudas-Sacks et al. 2020 — defect charge specifies body-axis location in hydra
  - type: contradicting
    note: >
      Defect positions may be epiphenomenal — consequences of morphogenetic forces rather
      than their organisers. Studies showing that global myosin-II disruption does not
      abolish organogenesis axes would weaken this hypothesis.
  - type: related
    note: >
      Kibble-Zurek mechanism: defect density after symmetry breaking scales universally
      with the rate of the transition. If applicable to embryos, faster symmetry breaking
      (e.g. temperature perturbation) predicts more defects and more variable outcomes,
      connecting to canalisation theory in evo-devo.
proposed_tests:
  - discipline: biophysics
    description: >
      Live light-sheet imaging of Drosophila or zebrafish embryos from gastrulation
      through organogenesis. Map the myosin-II polarisation field at each timepoint and
      compute topological charge of every defect. Track creation, annihilation, and total
      charge over time to test conservation.
  - discipline: mathematical-physics
    description: >
      Derive the conservation law analytically for a nematic order-parameter model of
      epithelial tissue using Frank elastic energy with active-stress contributions.
      Identify which symmetry implies topological protection and under what conditions
      (anisotropic stress, cell division) protection breaks down.
  - discipline: developmental-biology
    description: >
      In mutant embryos with organ-formation defects (heart looping, gut malrotation),
      retroactively map the defect field at earlier stages. Test whether malformation
      correlates with a charge non-conservation event that preceded the visible phenotype.
  - discipline: clinical-medicine
    cross_domain_angle: >
      If defect charge non-conservation is an early-warning signal of developmental
      failure, it could be detectable in human organ organoids before failure is
      morphologically visible — a potential quality-control biomarker for regenerative
      medicine and IVF-derived organoid therapies.

id: h-aragonite-saturation-coral-calcification-threshold
title: "Coral calcification rates decline nonlinearly with aragonite saturation state, with a critical threshold at Ω_arag = 1.5 below which net dissolution exceeds calcification regardless of temperature, light, or nutrient conditions, and reef structural integrity will be compromised in tropical reefs by 2070 under RCP 8.5"
status: active
priority: critical
impact_score: 0.88
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1126/science.1155847"
    type: supporting
    confidence: 0.75
    note: "Fabry et al. (2008) Science - ocean acidification impacts on calcifiers"
  - doi: "10.5194/bg-4-655-2007"
    type: supporting
    confidence: 0.80
    note: "Orr et al. (2005) - anthropogenic acidification projections; Ω_arag trajectories"
  - type: related
    note: "Hoegh-Guldberg et al. (2007) - coral reefs under rapid climate change and ocean acidification"

unknowns_addressed:
  - u-ocean-acidification-carbonate-threshold

proposed_tests:
  - description: >
      Replicate acidification experiment on 10 coral species from diverse Indo-Pacific habitats at Ω_arag
      = 3.5 (ambient), 2.5, 2.0, 1.5, 1.0 with constant temperature and light. Measure calcification rate
      by buoyant weight and alkalinity anomaly method. Fit threshold model to identify Ω_arag at which
      net calcification → 0.
    method: "Mesocosm experiment + total alkalinity/DIC measurements + buoyant weight for calcification rate"
    prediction: "Calcification should decline by >90% below Ω_arag = 1.5 in all species; threshold Ω varies < ±0.3 across species"


proposed_tests:
  - description: >
      Implement f-DP accounting for the Gaussian mechanism applied to 100 counting
      queries and compare tight privacy cost (f-DP) vs approximate accounting (moments
      accountant). Measure: does f-DP give tighter epsilon by >20% for composition of
      50+ queries?
    prediction: "f-DP gives epsilon estimates 20-40% tighter than moments accountant for 50-query composition, enabling the same privacy level with 20-40% more utility in practice."

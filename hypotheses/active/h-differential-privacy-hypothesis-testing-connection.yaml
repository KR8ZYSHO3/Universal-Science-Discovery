id: h-differential-privacy-hypothesis-testing-connection
title: >
  Differential privacy (epsilon, delta) is dual to hypothesis testing: epsilon
  controls the Type I + Type II error tradeoff for any test distinguishing
  adjacent datasets, and the hockey-stick divergence E_alpha = max(P(M(D)∈S) -
  alpha × P(M(D')∈S)) provides the tight characterization of (epsilon, delta)-DP
  in terms of Neyman-Pearson optimal hypothesis testing theory.

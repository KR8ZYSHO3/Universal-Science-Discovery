id: h-glymphatic-sleep-aquaporin4-clearance
title: >
  Glymphatic waste clearance from the brain is driven by arterial pulsatility
  during slow-wave sleep through AQP4-mediated convective flow along perivascular spaces,
  and age-related AQP4 depolarisation is a primary mechanism of amyloid accumulation.
status: active
priority: high
impact_score: 0.85
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - neuroscience
  - sleep-science
  - neuropathology
unknowns_addressed:
  - u-lymphatic-system-brain
evidence_links:
  - doi: "10.1126/science.1241224"
    type: supporting
    confidence: 0.83
    note: >
      Xie et al. (2013) Science — two-photon in vivo imaging shows beta-amyloid clearance
      increases 2-fold during sleep vs. wakefulness; AQP4-null mice show 65% reduction
      in interstitial solute clearance
  - doi: "10.1073/pnas.1417699112"
    type: supporting
    confidence: 0.78
    note: >
      Iliff et al. (2014) — arterial pulsatility drives CSF influx through perivascular
      spaces; cardiac pulsation frequency, not breathing, is the primary driver
  - doi: "10.1038/s41593-020-00789-4"
    type: related
    confidence: 0.70
    note: >
      Mestre et al. (2020) — aged mice show AQP4 depolarisation (redistribution from
      endfeet) and reduced glymphatic flux, correlating with amyloid burden increase
proposed_tests:
  - description: >
      Test whether restoring AQP4 polarisation in aged mice (via Sonic hedgehog signalling
      or direct genetic rescue) restores glymphatic clearance capacity; measure amyloid
      plaque load and interstitial fluid tracer clearance half-life at 12 and 24 weeks.

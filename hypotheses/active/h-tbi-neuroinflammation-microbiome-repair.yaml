id: h-tbi-neuroinflammation-microbiome-repair
title: >
  The ceiling on neurological recovery after severe TBI is set by chronic
  neuroinflammation driven by gut-brain axis dysbiosis post-injury, and
  restoring gut microbiome diversity (via FMT or targeted probiotic supplementation)
  significantly expands the recovery ceiling beyond current rehabilitation limits.
status: active
priority: medium
impact_score: 0.76
created: "2026-05-06"
last_updated: "2026-05-06"
author: USDR
related_disciplines:
  - neurotrauma
  - microbiology
  - neuroscience
unknowns_addressed:
  - u-tbi-repair-limits
evidence_links:
  - doi: "10.1038/s41467-018-07140-x"
    type: supporting
    confidence: 0.73
    note: >
      Treangen et al. (2018) Nat Commun — TBI in mice acutely depletes beneficial gut
      bacteria (Lactobacillus, Bifidobacterium) within 24h and expands inflammatory taxa;
      germ-free mice show altered TBI lesion evolution and neuroinflammation
  - doi: "10.1016/j.bbi.2020.07.028"
    type: supporting
    confidence: 0.70
    note: >
      Celorrio et al. (2021) — probiotic supplementation post-TBI in rodents reduces
      hippocampal neuroinflammation (TNF-α, IL-1β), microglial activation, and
      improves Morris water maze performance at 4 weeks
  - doi: "10.3389/fneur.2021.683549"
    type: related
    confidence: 0.62
    note: >
      Clinical evidence: TBI patients show acute gut barrier disruption (zonulin, LPS),
      which correlates with injury severity and 6-month Glasgow Outcome Scale score
proposed_tests:
  - description: >
      Randomised trial of FMT from healthy donors starting 48h post-severe TBI vs sham;
      primary endpoints: 6-month GOSE score; secondary: serum LPS, CSF cytokines,
      gut 16S diversity, and brain MRI diffusion tractography at 3 and 12 months.

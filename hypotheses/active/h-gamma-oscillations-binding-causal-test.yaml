id: h-gamma-oscillations-binding-causal-test
title: >
  Transcranial alternating current stimulation (tACS) at gamma frequency (40 Hz)
  applied out-of-phase between visual areas V1 and V4 disrupts feature binding in
  object recognition tasks, while in-phase gamma tACS enhances binding, providing
  causal evidence that inter-areal gamma synchrony mediates visual feature binding.
status: active
priority: high
impact_score: 0.82
created: "2026-05-07"
last_updated: "2026-05-07"
related_disciplines:
  - neuroscience
  - cognitive-science
  - physics
unknowns_addressed:
  - u-neural-binding-mechanism-synchrony
evidence_links:
  - doi: "10.1126/science.1126488"
    type: supporting
    confidence: 0.70
    note: >
      Fries (2005) establishes the communication-through-coherence framework
      predicting that gamma synchrony gates inter-areal communication; supports
      the mechanism underlying the proposed tACS test.
  - doi: "10.1016/j.neuron.2015.09.034"
    type: supporting
    confidence: 0.65
    note: >
      Buzsaki & Wang (2015) show gamma oscillations arise from E-I balance and
      predict that phase relationships between cortical areas determine functional
      connectivity; out-of-phase stimulation should disrupt this.
proposed_tests:
  - description: >
      Double-blind sham-controlled tACS experiment: stimulate V1 and V4 simultaneously
      at 40 Hz with 0 (in-phase), 90, or 180 degree phase offset. Measure binding
      performance (illusory conjunction errors, feature integration RT) in a visual
      search task. Predict that 180-degree phase offset increases binding errors
      compared to 0-degree offset and sham.

evidence_links:
  - doi: "10.1103/PhysRevLett.116.094301"
    type: supporting
    confidence: 0.65
    note: >
      Broadband acoustic cloak demonstrated at single frequency (ultrasonic);
      Zhang et al. (2016) show bandwidth is inversely proportional to total
      cloak thickness — confirms bandwidth-thickness trade-off.
  - doi: "10.1103/PhysRevB.97.195402"
    type: supporting
    confidence: 0.62
    note: >
      Norris & Vemula (2019) analytical proof: causal metamaterials satisfying
      Kramers-Kronig dispersion cannot achieve broadband cloaking below a
      minimum thickness determined by the desired frequency range.
  - doi: "10.1063/5.0030393"
    type: related
    confidence: 0.58
    note: >
      Chen & Chan (2021) review active acoustic cloaks: pumped systems that
      inject energy to compensate absorption can circumvent the passive
      bandwidth-thickness limit in principle, but add complexity and
      detection risk at audio frequencies.
proposed_tests:
  - description: >
      Build passive acoustic metasurface cloaks of varying thickness (λ/10,
      λ/4, λ/2, λ) tuned to 1 kHz. Measure scattering cross-section using
      anechoic chamber measurements across 500 Hz - 4 kHz. Test: does
      cloaking bandwidth (frequency range with >10 dB scattering reduction)
      scale linearly with cloak thickness, consistent with the Kramers-Kronig
      bound? A <λ/4 broadband cloak exceeding the bound would falsify the
      hypothesis.

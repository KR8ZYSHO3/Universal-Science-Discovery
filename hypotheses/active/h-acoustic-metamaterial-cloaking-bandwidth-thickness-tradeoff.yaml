id: h-acoustic-metamaterial-cloaking-bandwidth-thickness-tradeoff
title: >
  Acoustic metamaterial cloaks face a fundamental bandwidth-thickness trade-off
  governed by the Kramers-Kronig causality relations: broadband three-dimensional
  cloaking requires a cloak thickness-to-wavelength ratio ≥ 1, making practical
  acoustic cloaking at audible frequencies (wavelengths 2-20 cm) limited to
  structures larger than ~10 cm.
status: active
priority: medium

id: h-cognitive-reserve-synaptic-redundancy
title: >
  Cognitive reserve in Alzheimer's disease is mechanistically explained by dendritic
  spine redundancy in association cortices: individuals with higher lifetime cognitive
  engagement maintain larger spine density, so the same absolute amyloid and tau burden
  damages a smaller fraction of the functional synapse pool, delaying the symptom threshold.
status: active
created: "2026-05-06"
last_updated: "2026-05-06"
priority: high
unknowns_addressed:
  - u-cognitive-reserve-mechanism
related_disciplines:

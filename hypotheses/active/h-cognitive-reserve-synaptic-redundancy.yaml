evidence_links:
  - type: supporting
    doi: 10.1093/brain/awl352
    note: >
      Stern (2009) — cognitive reserve review; education and occupational complexity
      modulate symptom onset at same pathology burden; reserve is neural, not compensatory.
  - type: supporting
    doi: 10.1002/ana.20edings
    note: >
      Bennett et al. (2012) — Religious Orders Study; cognitive activity predicts
      spine density in DLPFC post-mortem; spine density correlates with ante-mortem
      cognitive performance independent of plaques.
  - type: related
    doi: 10.1016/j.neuron.2015.03.002
    note: >
      Bhatt et al. (2009) — spine turnover in motor cortex with learning; stable spines
      persist for months, providing structural basis for long-term reserve.
proposed_tests:
  - discipline: neuroscience
    description: >
      Analyse post-mortem brain tissue from the Religious Orders Study (N>1000).
      Quantify dendritic spine density in DLPFC layers 3 and 5 using DiOlistic labelling.
      Regress cognitive trajectory slope (years before death) on spine density, Braak
      stage, and APOE4 status. Test whether spine density explains the residual variance
      in cognitive decline after controlling for pathology — the reserve prediction.
  - discipline: gerontology
    description: >
      Run a 10-year longitudinal study enrolling 500 subjects aged 55-65 with baseline
      MRI, PET amyloid scan, and cognitive battery. Randomise to intensive cognitive
      training (5 hrs/week) vs. active control. At year 10, compare spine surrogate
      measures (MRI cortical thickness, MEG gamma power) and cognitive decline trajectories
      between groups at equivalent amyloid burden.

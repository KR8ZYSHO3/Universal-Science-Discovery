proposed_tests:
  - description: Use ExecuComp panel data to estimate performance measurement noise sigma^2 and test whether equity-grant levels follow the Boltzmann prediction for optimal effort induction
  - description: Compare free energy gap predictions for agency costs with Morck-Shleifer-Vishny (1988) estimates of the gains from hostile takeovers (reducing agency costs through direct control)
  - description: Apply spin-glass simulations to modelled corporate hierarchies and test whether the glass transition (dysfunction threshold) matches empirical governance failure indicators

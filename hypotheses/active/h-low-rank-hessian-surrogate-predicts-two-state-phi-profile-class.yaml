id: h-low-rank-hessian-surrogate-predicts-two-state-phi-profile-class
title: >
  Among single-domain folders under 120 residues, proteins classified two-state by phi-value experiments yield ≥30% lower
  effective Hessian rank (95% variance captured in top r eigenmodes of ENM at native structure) than multi-state folders matched for length.
status: active
priority: medium
impact_score: 0.41
created: "2026-05-07"
last_updated: "2026-05-07"
author: USDR

evidence_links:
  - doi: "10.1073/pnas.0908149106"
    type: related
    confidence: 0.42
    note: "Supports topology–pathway coupling qualitatively."
  - type: related
    confidence: 0.33
    note: "Rank threshold claim is **hypothesis** pending standardized ENM protocol."

unknowns_addressed:
  - u-contact-graph-hessian-rank-native-basin-surrogate

proposed_tests:
  - description: >
      Curate paired sets from phi-value literature; compute ENM Hessian spectra on native PDB structures with identical cutoff radii;
      compare rank proxies vs kinetic classification.
    method: Anisotropic network model with bootstrap on structure ensembles.
    prediction: Statistically significant rank separation with modest effect size Cohen’s d ~ 0.5.

related_disciplines:
  - structural-biology
  - applied-mathematics

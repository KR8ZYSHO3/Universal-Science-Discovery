proposed_tests:
  - description: >
      Big Bell Test (Abellan et al. 2018): use human-generated random numbers to
      choose measurement settings (closing the freedom-of-choice loophole to cosmic
      history). If violation persists, extend the "conspiracy" required by LHV
      theories back to near the Big Bang — providing the tightest possible
      experimental constraint on LHV models.

id: h-bell-local-hidden-variables-definitively-ruled-out
title: >
  Loophole-free Bell experiments (Hensen et al. 2015, Giustina et al. 2015,
  Shalm et al. 2015) definitively rule out all local hidden variable (LHV)
  theories consistent with special relativity, implying that quantum non-locality
  is a genuine feature of nature — though it does not enable superluminal
  signaling because correlations cannot be used to transmit information.

proposed_tests:
- description: Analyse scRNA-seq datasets from normal embryonic development and matched cancer cell lines; binarise expression
    at bimodal thresholds; infer Boolean networks via ARACNE/GENIE3; estimate effective K; classify phase (ordered/critical/chaotic);

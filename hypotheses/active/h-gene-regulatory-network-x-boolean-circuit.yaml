id: h-gene-regulatory-network-x-boolean-circuit
title: The effective Boolean connectivity K of developmental GRNs estimated from single-cell RNA-seq binarised expression
  is 1.8–2.2 (near criticality) in normal development and increases to 2.5–3.0 in cancer cells, measurable via Kauffman network
  phase classification of perturbed expression states

proposed_tests:
  - description: Administer rapamycin (mTOR inhibitor) to mice at immunization day 7 (peak germinal center) vs. day 14 (memory B cell exit); quantify memory B cells (IgG+ CD38+ GL7-) by flow cytometry at day 28; in parallel, deliver late LTP-inducing TBS to CA1 in acute hippocampal slices from rapamycin-treated vs. control mice; measure fEPSP slope at 3h post-stimulation; test whether rapamycin dose-response curves are quantitatively parallel across the two systems, predicting shared mTORC1 threshold.

id: pioneer-richard-feynman
name: Richard Feynman
birth_year: 1918
death_year: 1988
primary_domains:
  - theoretical-physics
  - quantum-mechanics
  - quantum-field-theory
  - quantum-computing
core_contributions:
  - title: Path Integral Formulation of Quantum Mechanics
    description: >
      Feynman's 1948 paper "Space-Time Approach to Non-Relativistic Quantum Mechanics"
      reformulated quantum mechanics using the path integral: the probability amplitude
      for a particle to travel from A to B is the sum over all possible paths, weighted
      by exp(iS/ℏ) where S = classical action. This formulation is equivalent to the
      Schrödinger and Heisenberg formulations but extends naturally to quantum field
      theory, statistical mechanics (imaginary time path integrals), and quantum gravity.
      Path integrals are the primary tool for calculating quantum corrections in
      condensed matter and particle physics.
    mathematical_form: "⟨x_f|e^{-iHt/ℏ}|x_i⟩ = ∫ Dx(t) exp(iS[x]/ℏ) — functional integral over all paths"
    status: established
  - title: Quantum Electrodynamics (QED) and Feynman Diagrams
    description: >
      Feynman, Schwinger, and Tomonaga (jointly awarded Nobel Prize 1965) developed
      renormalisation and the complete theory of quantum electrodynamics — the
      quantum field theory of electromagnetic interactions. Feynman's diagrammatic
      technique — Feynman diagrams — provides a visual calculus for computing
      scattering amplitudes: each diagram is a term in the perturbation expansion,
      with lines representing particles and vertices representing interactions.
      QED predicts the electron anomalous magnetic moment to 12 significant figures,
      the most precisely verified prediction in science.
    mathematical_form: "g/2 = 1 + α/2π - 0.328 α²/π² + ... ≈ 1.001159652 (QED) vs 1.001159652 (measured)"
    status: established
  - title: Quantum Computing — First Systematic Proposal
    description: >
      Feynman's 1981 lecture "Simulating Physics with Computers" argued that classical
      computers cannot efficiently simulate quantum systems (exponential state space)
      and proposed that a quantum computer — itself governed by quantum mechanics —
      could. His 1982 paper formalised this: a universal quantum simulator would
      require quantum gates operating on qubits. This was the founding document of
      quantum computing as a field, predating Deutsch's universal quantum computer
      (1985) and Shor's algorithm (1994).
    mathematical_form: "Quantum simulation: simulate H = Σ Hᵢ by product formula exp(-iHt) ≈ Π exp(-iHᵢt/n)ⁿ"
    status: established
  - title: Nanotechnology — "There's Plenty of Room at the Bottom"
    description: >
      Feynman's 1959 lecture "There's Plenty of Room at the Bottom" (to the APS)
      asked: what are the physical limits of miniaturisation? He argued that there
      is no fundamental physical barrier to writing all 24 volumes of the Encyclopaedia
      Britannica on the head of a pin, or to building machines at atomic scale. He
      proposed atomic-scale manipulation, molecular motors, and dense information
      storage — all now realised. This lecture is credited as founding nanotechnology
      as a field, though the field took 30 years to catch up.
    mathematical_form: "Scale: Bohr radius a₀ ≈ 0.5 Å; quantum effects dominate at L < 10 nm — room remains below this scale"
    status: established

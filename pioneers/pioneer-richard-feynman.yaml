underappreciated_work:
  - title: >
      There's Plenty of Room at the Bottom -- 30 Years Ahead of Nanotechnology
    description: >
      Feynman's 1959 lecture proposed atomic-scale writing, molecular motors, and
      miniaturised computers 30 years before Binnig & Rohrer's STM (1981, Nobel
      1986) and 35 years before Drexler's "Engines of Creation" (1986) popularised
      molecular nanotechnology. Feynman's original calculation — that all books
      ever written could be stored in a cube 1/100th of an inch on a side — was
      conservative; modern flash storage exceeds it. He offered a $1000 prize
      for the first operating electric motor 1/64th inch in size, won in 1960.
    current_status: vindicated
    why_stalled: >
      Fabrication technology did not exist in 1959 to implement Feynman's proposals.
      The STM, AFM, and molecular beam epitaxy techniques needed to manipulate
      individual atoms were 20 years away. Feynman's contribution was the theoretical
      argument for why physics permits nanotechnology — the implementation required
      independent materials science advances.
  - title: Path Integral in Statistical Mechanics and Finance
    description: >
      Feynman's path integral in imaginary time (Wick rotation t → -iτ) becomes the
      partition function of statistical mechanics: Z = ∫ Dx exp(-S_E[x]/ℏ) where
      S_E is the Euclidean action. This connects quantum mechanics to thermal
      fluctuations. The same mathematics — diffusion processes described by
      path integrals — underlies the Black-Scholes equation in mathematical finance,
      though this connection (via Wiener measure) was not explicitly made by Feynman.
    current_status: open_question
    why_stalled: >
      The connection between path integrals and statistical mechanics was quickly
      appreciated by physicists; the connection to finance required Merton and
      Scholes to independently discover the same mathematics. The unification of
      quantum mechanics, statistical mechanics, and financial mathematics under
      the path integral / Wiener measure framework is now a rich interdisciplinary
      field (econophysics) that Feynman did not live to see mature.
  - title: Feynman Lectures on Computation
    description: >
      Feynman's final course at Caltech (1983-1986, published posthumously 1996)
      covered the physical limits of computation: reversible computing, Maxwell's
      demon, Landauer's principle, and quantum computing. These lectures unified
      physics with information theory and established that computation has fundamental
      thermodynamic costs. They are required reading for understanding why Landauer's
      erasure principle (kT ln 2 per bit erased) connects information to entropy.
    current_status: vindicated
    why_stalled: >
      These lectures were informal Caltech courses and not published in major
      journals, limiting their initial impact. The field of physical limits of
      computation (reversible computing, quantum computing thermodynamics) has
      since vindicated every connection Feynman drew.

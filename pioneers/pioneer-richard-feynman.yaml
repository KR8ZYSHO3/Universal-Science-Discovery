modern_open_problems:
  - title: "Can quantum computing exponentially accelerate drug discovery and materials simulation?"
    rationale: >
      Feynman proposed quantum computers specifically to simulate quantum
      systems efficiently. Drug binding and materials properties are governed
      by quantum chemistry — classically intractable for large molecules. Whether
      fault-tolerant quantum computers can provide practical speedups for
      pharmaceutical and materials design, and at what qubit thresholds, is the
      central question Feynman's proposal raised.
  - title: "What are the thermodynamic limits of reversible computation in physical hardware?"
    rationale: >
      Feynman's lectures on computation explicitly discussed reversible computing
      and Landauer's principle. Whether physical implementations of reversible
      logic (adiabatic circuits, quantum computing) can actually approach
      thermodynamic limits — and what engineering obstacles prevent this — is
      an open engineering and physics question.

underappreciated_work:
  - title: Photo 51 and the Nobel Prize Controversy
    description: >
      The 1962 Nobel Prize in Physiology or Medicine was awarded to Watson, Crick,
      and Wilkins for the DNA double helix structure. Franklin died of ovarian cancer
      in April 1958, aged 37 — Nobel Prizes are not awarded posthumously. Whether
      she would have shared the prize had she lived is unknown, but her centrality
      to the discovery is not disputed among historians of science. Watson's 1968
      memoir "The Double Helix" depicted Franklin dismissively and without
      acknowledging the use of her data; subsequent scholarship (Sayre 1975,
      Maddox 2002) has substantially rehabilitated her reputation. The episode is
      now a central case study in scientific ethics, recognition of women in science,
      and the norms of data sharing.
    current_status: vindicated
    why_stalled: >
      Franklin's contributions were obscured by the Nobel Prize omission (enforced
      by her early death), Watson's unfair portrayal in "The Double Helix" (1968),
      and the general marginalisation of women in 1950s science. Her TMV work was
      respected in her lifetime but the DNA contribution was not fully credited
      until the 1970s-80s. Her coal/carbon work remains relatively unknown despite
      its industrial significance.
  - title: Carbon Microstructure Work Anticipating Carbon Nanotechnology
    description: >
      Franklin's systematic classification of graphitising vs non-graphitising carbons
      (1950-1951) established the microstructural basis of carbon materials science
      that directly underpins the development of carbon fibres (1960s), fullerenes
      (Kroto et al. 1985), carbon nanotubes (Iijima 1991), and graphene (Geim &
      Novoselov 2004). Her identification of disordered sp² carbon networks with
      defined porosity and surface area is the conceptual foundation of activated
      carbon technology and carbon-based energy storage materials. This work is
      cited in the materials science literature but almost never in the context
      of her broader scientific legacy.
    current_status: vindicated
    why_stalled: >
      Carbon materials science was an obscure industrial application field in 1950.
      The connection to nanocarbon science was only apparent retrospectively. Franklin
      moved to biological X-ray crystallography after her Paris period and the
      carbon work was largely forgotten outside the activated carbon industry until
      the nanocarbon revolution made it historically significant.

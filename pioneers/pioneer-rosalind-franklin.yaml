id: pioneer-rosalind-franklin
name: Rosalind Franklin
birth_year: 1920
death_year: 1958
primary_domains:
  - X-ray-crystallography
  - molecular-biology
  - structural-biology
  - physical-chemistry
  - materials-science
core_contributions:
  - title: X-ray Diffraction of DNA — Photo 51 and the Double Helix
    description: >
      Franklin's X-ray crystallography work at King's College London (1951-1953)
      produced the clearest diffraction images of DNA fibres yet obtained, culminating
      in Photo 51 (May 1952), which showed the helical structure of B-form DNA with
      extraordinary clarity. Franklin's careful analysis of the diffraction patterns
      determined the dimensions of the helix (pitch 34 Å, rise per residue 3.4 Å,
      diameter 20 Å) and provided key constraints that Watson and Crick needed to
      build their correct structural model. Photo 51 was shown to Watson in January
      1953 by Wilkins without Franklin's knowledge or consent; Watson immediately
      recognised its significance. Franklin's unpublished crystallographic report
      (Medical Research Council report, December 1952) was also accessed by Watson
      and Crick without attribution. Franklin's own analysis was converging on the
      correct double helix structure with anti-parallel strands and the phosphates
      on the outside — exactly what Watson and Crick published in April 1953.
    mathematical_form: "Bragg's law nλ = 2d sinθ; meridional spacing c = 34 Å, equatorial a = 20 Å; helical diffraction theory (Cochran-Crick-Vand)"
    status: established
  - title: Tobacco Mosaic Virus Structure
    description: >
      After leaving King's College for Birkbeck College in 1953, Franklin led a
      research group that determined the three-dimensional structure of tobacco
      mosaic virus (TMV) using X-ray fibre diffraction — at the time the most complex
      structure determined by any method. Franklin's group showed that TMV is a hollow
      cylinder with protein subunits arranged in a helix of defined pitch and diameter,
      with RNA embedded within the protein coat. Her group published 17 papers on
      virus structure in 5 years, establishing X-ray methods for studying viruses.
      This was pioneering structural virology; the techniques she developed are
      precursors to modern cryo-EM and structural biology.
    mathematical_form: "Helical diffraction: J_n(2πr/λ) × exp(2πilz/c) — Franklin group applied Cochran-Crick-Vand theory to TMV"
    status: established
  - title: Coal and Carbon Microstructure
    description: >
      Franklin's PhD thesis (1945) and subsequent work at the Laboratoire Central
      des Services Chimiques de l'Etat in Paris characterised the microstructure of
      coals and carbons using X-ray diffraction and density measurements. She
      classified coals into two types based on whether they graphitise at high
      temperature: graphitising (soft) carbons develop ordered graphite-like layer
      structures on heating; non-graphitising (hard) carbons maintain disordered
      microporosity. This work established the structural basis of carbon porosity
      and was directly relevant to industrial applications including activated carbons
      for gas storage and separation. Her characterisation of carbon microstructure
      anticipated the study of amorphous carbons, carbon fibres, and later graphene.
    mathematical_form: "Graphitisation index G = I(graphite peak) / I(disordered peak) from XRD; pore size distribution from density"
    status: established

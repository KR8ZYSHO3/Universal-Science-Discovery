id: pioneer-james-clerk-maxwell
name: James Clerk Maxwell
birth_year: 1831
death_year: 1879
primary_domains:
  - electromagnetism
  - statistical-mechanics
  - optics
  - thermodynamics
core_contributions:
  - title: Maxwell's Equations (Unified Electromagnetism)
    description: >
      Maxwell unified electricity, magnetism, and optics into four coupled
      partial differential equations (1865). The equations predict electromagnetic
      waves propagating at the speed of light, which Maxwell recognized as light
      itself. This unification is the template for all subsequent field theories
      in physics, including general relativity and the Standard Model.
    mathematical_form: "∇·E = ρ/ε₀; ∇·B = 0; ∇×E = -∂B/∂t; ∇×B = μ₀J + μ₀ε₀∂E/∂t"
    status: established
  - title: Maxwell-Boltzmann Speed Distribution (Kinetic Theory of Gases)
    description: >
      Maxwell derived the distribution of molecular speeds in an ideal gas (1860),
      independently confirmed by Boltzmann. This was the first application of
      probability theory to physical systems and founded statistical mechanics.
      The distribution connects microscopic molecular motion to macroscopic
      thermodynamic quantities (temperature, pressure, heat capacity).
    mathematical_form: "f(v) = 4π(m/2πkT)^(3/2) v² exp(-mv²/2kT)"
    status: established
  - title: Trichromatic Color Vision Theory
    description: >
      Maxwell's 1855–1861 work established that human color vision operates
      via three photoreceptor types (trichromacy), and he produced the first
      color photograph (1861) by combining three filtered exposures. The
      three-receptor model remains the foundation of all color science, display
      technology (RGB), and color correction.
    mathematical_form: "C = aR + bG + cB — any color C is a linear combination of three primaries"
    status: established
  - title: Maxwell's Demon (Thermodynamics and Information)
    description: >
      Maxwell proposed a thought experiment (1867) in which a demon sorts fast
      and slow molecules between two chambers, apparently reducing entropy without
      work. The resolution — that measurement and memory erasure carry thermodynamic
      cost (Landauer, 1961) — established the deep connection between information
      and thermodynamics. Maxwell's demon is the conceptual origin of reversible
      computing and information-theoretic entropy.
    mathematical_form: "ΔS_erasure ≥ k_B ln 2 per bit erased (Landauer limit)"
    status: established

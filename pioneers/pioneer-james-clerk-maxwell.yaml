underappreciated_work:
  - title: Saturn's Rings Stability Analysis
    description: >
      Maxwell proved analytically (1859) that Saturn's rings cannot be solid or
      liquid but must consist of independent particles — a prediction confirmed
      by Voyager spacecraft in 1980. This was a tour de force of applied
      celestial mechanics that predated the observational confirmation by 120 years.
    current_status: vindicated
    why_stalled: >
      The result was technically correct but unverifiable by the instrumentation
      of the 1860s, so it remained an academic curiosity until space exploration.
  - title: Electromagnetic Stress Tensor (Radiation Pressure)
    description: >
      Maxwell derived the electromagnetic stress tensor and predicted that light
      exerts radiation pressure on surfaces (1873). Radiation pressure was
      experimentally confirmed by Lebedev (1900) and is now routinely used in
      laser cooling, optical tweezers, and solar sail propulsion concepts.
    current_status: vindicated
    why_stalled: >
      Measuring radiation pressure required experimental precision unavailable
      until the early 20th century; the concept awaited confirmation for 27 years.

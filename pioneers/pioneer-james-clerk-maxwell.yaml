modern_open_problems:
  - title: "Does Maxwell's demon set a fundamental limit on biological sensory systems?"
    rationale: >
      Maxwell's demon thought experiment links measurement to thermodynamic cost.
      Biological sensors (photoreceptors, mechanoreceptors, chemoreceptors) perform
      measurements at the cost of metabolic energy. Whether the energy cost of
      biological sensing approaches the Landauer-Maxwell limit, and what
      mechanisms allow sensors to approach this limit, is measurable but unresolved.
  - title: "Can unified field theories beyond the Standard Model be discovered by symmetry methods alone?"
    rationale: >
      Maxwell unified electricity and magnetism through symmetry and differential
      equations alone, without experimental facts that demanded unification.
      Modern physics seeks to unify gravity with the Standard Model forces.
      Whether a purely mathematical symmetry argument (analogous to Maxwell's
      gauge approach) can identify the correct unification is the central
      methodological question of fundamental physics.

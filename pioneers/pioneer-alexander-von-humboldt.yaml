modern_open_problems:
  - title: "What are the quantitative thresholds for planetary boundaries beyond which Earth system tipping points cascade?"
    rationale: >
      Humboldt treated Earth as a coupled system with quantifiable states.
      The planetary boundaries framework (Rockstrom et al. 2009) makes exactly
      his argument quantitative: there are thresholds in biogeochemical cycles
      beyond which Earth's biosphere transitions to a new state. Identifying
      precise coupled tipping thresholds — the modern Humboldtian project —
      requires integrating climate, biodiversity, and biogeochemical data
      in exactly the cross-domain framework he pioneered.
  - title: "Can vegetation-climate feedbacks in the Amazon be modeled to predict tipping to savanna?"
    rationale: >
      Humboldt's deforestation-precipitation linkage is now measurable at Amazon
      scale. The Amazon forest-savanna tipping point involves coupled dynamics
      between precipitation recycling (40% of local rainfall from transpiration),
      fire regimes, and vegetation structure — exactly the cross-domain linkage
      Humboldt first described at Lake Valencia. Whether this system has crossed
      into irreversible savannification is one of the most urgent applied questions
      in Earth system science.

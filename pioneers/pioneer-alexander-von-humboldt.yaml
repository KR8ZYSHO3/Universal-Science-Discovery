underappreciated_work:
  - title: First Quantitative Climate Change Attribution
    description: >
      Humboldt's Lake Valencia observations (1800) are the first documented case
      of attributing an environmental change (lake level decline) to human land use
      (deforestation). His causal reasoning — deforestation reduces transpiration →
      reduces rainfall → reduces lake inputs — is methodologically identical to
      modern climate change attribution studies. He was dismissed as a romantic
      naturalist by later positivist scientists who preferred controlled experiments
      to field observations.
    current_status: vindicated
    why_stalled: >
      The quantitative tools for measuring transpiration, precipitation recycling,
      and land-climate coupling did not exist until satellite remote sensing in the
      late 20th century. Humboldt's causal chain was qualitatively correct but
      unverifiable for 150 years.
  - title: Anti-Colonialism as Scientific Ethics
    description: >
      Humboldt's "Political Essay on the Kingdom of New Spain" (1811) was the
      first systematic critique of colonial plantation economics using quantitative
      demographic and agricultural data. He argued that slavery was economically
      inefficient as well as morally wrong, citing productivity statistics. His
      use of economic data against colonialism influenced Simon Bolívar, Thomas
      Jefferson, and the abolitionist movement. This connection between quantitative
      data collection and political advocacy for justice was revolutionary and
      is rarely emphasized alongside his scientific contributions.
    current_status: vindicated
    why_stalled: >
      The political dimensions of Humboldt's work were deliberately separated
      from his scientific legacy by later European scientists who wanted to
      adopt his methods without his political implications. His anti-colonialism
      and environmental ethics have been recovered only in recent Humboldt scholarship.

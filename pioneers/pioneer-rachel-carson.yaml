modern_open_problems:
  - title: "At what concentration thresholds do microplastics and forever chemicals cause trophic cascade collapse?"
    rationale: >
      Carson demonstrated trophic biomagnification of DDT using the same logic
      now needed for PFAS, microplastics, and endocrine disruptors. These compounds
      accumulate in food webs by similar mechanisms. Whether biomagnification factors
      and population-level effects for these modern pollutants match the DDT pattern —
      and what the critical concentration thresholds are — requires exactly the
      quantitative trophic ecology Carson pioneered.
  - title: "Can pesticide resistance evolution be predicted and managed using fitness landscape models?"
    rationale: >
      Carson documented the rapid evolution of DDT resistance in target insect
      populations. Modern fitness landscape theory (Kauffman's NK model, Weinreich
      et al.) can model resistance evolution as a walk on a fitness landscape.
      Whether pesticide application regimes can be designed to minimize resistance
      evolution rate — using the same evolutionary framework Carson identified as
      the key mechanism — is an applied evolutionary problem with enormous
      agricultural consequences.

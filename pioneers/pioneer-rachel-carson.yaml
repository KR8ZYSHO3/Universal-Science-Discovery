underappreciated_work:
  - title: Silent Spring's Predictions Were Quantitatively Correct
    description: >
      The pesticide industry mounted a sustained campaign (1962–1972) depicting
      Carson as a sentimentalist without scientific credentials. Subsequent
      population ecology studies confirmed every major prediction in "Silent Spring":
      DDT caused eggshell thinning via DDE-mediated calcium transport inhibition
      (confirmed biochemically 1969), raptor populations collapsed in direct
      proportion to DDE levels (confirmed with National Audubon Society data), and
      DDT resistance evolved rapidly in target insects (confirmed in all major
      agricultural pest species by 1965). The industry's alternative hypothesis
      (Carson's correlations were spurious) was systematically falsified.
    current_status: vindicated
    why_stalled: >
      Regulatory capture by the agricultural chemical industry (Velsicol Corp
      threatened Carson's publisher; USDA employed 50 scientists to rebut the book)
      delayed policy action for 10 years. Carson died in 1964, two years after
      publication and eight years before the DDT ban she catalyzed.
  - title: Marine Biology as a Source of Ecological Principles
    description: >
      Carson's three earlier books ("Under the Sea-Wind," 1941; "The Sea Around Us,"
      1951; "The Edge of the Sea," 1955) developed the conceptual framework of
      marine ecology as a coupled physical-biological system: oceanographic currents
      drive nutrient upwelling → drives primary productivity → structures food webs.
      "The Sea Around Us" won the National Book Award (1952). These books established
      ecology as a discipline that could explain quantitative patterns across spatial
      scales. Her marine work is overshadowed by "Silent Spring" but provided
      the ecological framework she later applied to terrestrial pesticide contamination.
    current_status: vindicated
    why_stalled: >
      Carson's marine biology work was recognized in her lifetime; the overshadowing
      by "Silent Spring" is a historical artifact of the regulatory controversy
      rather than a scientific marginalization. However, her contribution to
      establishing coupled physical-biological ocean models is not credited in
      the oceanography literature.

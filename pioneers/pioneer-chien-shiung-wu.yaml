modern_open_problems:
  - title: "Does parity violation in the weak force explain biological homochirality?"
    rationale: >
      Wu proved that the weak force distinguishes left from right. Amino acids
      in living systems are exclusively L-handed — a symmetry breaking with no
      established cause. The parity-violating weak force interaction with electrons
      creates a tiny energy difference (10⁻¹⁷ eV) between L and D amino acids.
      Whether this infinitesimal bias can be amplified by autocatalytic chemistry
      to produce the observed biological homochirality — connecting Wu's
      experimental result to the origin of life — is an unresolved question.
  - title: "What is the source of the matter-antimatter asymmetry observed in the universe?"
    rationale: >
      Wu's parity violation experiment was the first demonstration that Nature
      violates a discrete symmetry. CP violation (the combination of charge
      conjugation and parity, discovered in kaon decay in 1964) is also observed
      but insufficient to explain the observed matter-antimatter asymmetry of the
      universe by many orders of magnitude. Whether additional CP-violation sources
      exist — in neutrino mixing, in dark matter interactions, or in the Higgs sector —
      is the central open problem in baryon asymmetry physics that Wu's work directly motivated.

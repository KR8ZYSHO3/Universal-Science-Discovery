underappreciated_work:
  - title: Nobel Prize Denied for Parity Violation Experiment
    description: >
      Lee and Yang's prediction of parity violation was unconfirmed speculation
      when published; Wu's experimental proof was the definitive scientific result
      — arguably the most significant experimental physics result of the 1950s.
      The Nobel Committee awarded Lee and Yang in 1957 (the same year as Wu's
      experiment) but never awarded Wu. This is one of the most discussed Nobel
      omissions in the history of physics. The Nobel announcement in October 1957
      came before Wu's confirmatory paper was fully published, but the committee
      knew of her experiment. Wu received the Wolf Prize (1978), the National Medal
      of Science (1975), and was the first woman elected president of the American
      Physical Society (1975).
    current_status: vindicated
    why_stalled: >
      The combination of gender and ethnic discrimination in American physics in
      the 1950s, combined with the Nobel Committee's practice of awarding theorists
      before experimentalists in fundamental discoveries, produced the omission.
      The history of this omission is now thoroughly documented in physics history
      scholarship (Wang 1990, McGrayne 1998).
  - title: Wu Experiment as Template for Precision Symmetry Tests
    description: >
      Wu's technical innovations for aligning nuclear spins at millikelvin
      temperatures under strong magnetic fields — developed entirely for the
      parity experiment — established the methodology of oriented nucleus spectroscopy.
      This technique, combined with her precision beta-decay measurements, created
      the experimental toolkit for testing CP violation (discrete symmetry between
      charge conjugation and parity), testing time-reversal symmetry in nuclear
      physics, and searching for permanent electric dipole moments — the current
      experimental frontier for physics beyond the Standard Model.
    current_status: vindicated
    why_stalled: >
      The connection between Wu's specific experimental techniques and subsequent
      precision symmetry tests in nuclear and particle physics is clear to specialists
      but not emphasized in popular accounts of her work, which focus almost
      exclusively on the parity result.

id: pioneer-chien-shiung-wu
name: Chien-Shiung Wu
birth_year: 1912
death_year: 1997
primary_domains:
  - experimental-physics
  - nuclear-physics
  - particle-physics
  - weak-interactions
core_contributions:
  - title: Experimental Proof of Parity Violation in the Weak Force
    description: >
      Wu's 1957 experiment at the National Bureau of Standards confirmed Lee and
      Yang's 1956 theoretical prediction that weak interactions violate parity
      (mirror symmetry). Wu cooled cobalt-60 nuclei to 0.01 K in a magnetic field
      to align their spins, then measured the angular distribution of emitted
      beta electrons. In a parity-symmetric world, equal numbers of electrons
      should be emitted in both directions along the alignment axis. Wu observed
      a strong asymmetry: more electrons were emitted in the direction opposite to
      the nuclear spin — proving that the weak force distinguishes left from right
      at the most fundamental physical level. The experiment required extraordinary
      technical achievement (cooling Co-60 to 10 mK, maintaining alignment, detecting
      subtle asymmetry) and was completed and confirmed within six weeks of beginning.
      Lee and Yang received the Nobel Prize in Physics 1957 for their prediction;
      Wu did not receive it for the experimental confirmation.
    mathematical_form: >
      Parity operator P: (r, p, σ) → (-r, -p, σ); weak decay rate W ≠ W_P;
      asymmetry parameter α in dΓ/dΩ ∝ 1 + α(p/E)cos θ, |α| = 1 for maximal
      parity violation (V-A theory: Feynman & Gell-Mann 1958)
    status: established
  - title: Precision Test of the Beta Decay Spectrum — Wu and Mössbauer
    description: >
      Wu's systematic precision measurements of beta decay spectra (1940s–1950s)
      resolved a long-standing controversy about the shape of the electron energy
      distribution at the endpoint. These precision measurements established that
      the Fermi theory of beta decay (V-A interaction) correctly predicted the
      spectral shape and provided the first tight upper bound on the neutrino mass
      from beta decay kinematics. This work is the experimental foundation of
      precision neutrino physics and the framework used today in KATRIN (neutrino
      mass measurement) and cosmological neutrino mass bounds.
    mathematical_form: >
      Kurie plot: √(N(E)/F(Z,E)p²) = C(E₀ - E) for massless neutrino;
      endpoint deformation ∝ m_ν²; Wu's measurements confirmed linearity → m_ν < 500 eV
    status: established
  - title: Experimental Confirmation of Fermi's Theory of Beta Decay
    description: >
      Wu's precise measurements of the ratio of Fermi (F) to Gamow-Teller (GT)
      matrix elements in beta decay, and her tests of the conserved vector current
      (CVC) hypothesis (Feynman & Gell-Mann 1958), established the V-A structure
      of the weak interaction experimentally. CVC is the cross-domain bridge
      between electromagnetism (conserved vector current, Noether's theorem) and
      the weak force — it asserts that the vector part of the weak current is
      conserved exactly as the electromagnetic current is, despite the apparent
      differences between the forces.
    mathematical_form: >
      Weak current: J_μ = ψ̄_f γ_μ(g_V - g_A γ_5) ψ_i; CVC: g_V = 1 (no renormalization);
      Wu's measurements: g_A/g_V = -1.27 ± 0.01 (now: -1.2756 ± 0.0013)
    status: established

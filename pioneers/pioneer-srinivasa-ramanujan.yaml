underappreciated_work:
  - title: Intuition as Legitimate Scientific Method
    description: >
      Ramanujan's work was produced almost entirely without proof — thousands of
      correct identities and theorems submitted with no derivation, which he
      attributed to the goddess Namagiri. Hardy described working with Ramanujan
      as having "never met his equal and can compare him only with Euler or Jacobi."
      The systematic study of how Ramanujan worked — pattern recognition in modular
      forms and hypergeometric series — has informed modern experimental mathematics
      and the use of AI for mathematical discovery. His method, treated as mysterious
      in his lifetime, is now understood as deep expertise in modular arithmetic
      combined with extraordinary pattern recognition.
    current_status: open_question
    why_stalled: >
      No formal framework existed for Ramanujan's objects during his lifetime.
      The mathematical structures he anticipated (mock modular forms, harmonic
      Maass forms) required 80 additional years of algebraic geometry and number
      theory to formalize.
  - title: Highly Composite Numbers and Information Theory
    description: >
      Ramanujan's 1915 paper on "highly composite numbers" (numbers with more
      divisors than any smaller number) establishes the structure of the divisor
      function d(n). The distribution of these numbers is connected via the
      Riemann zeta function to the prime number theorem, and through information
      theory to optimal data compression and coding theory. Ramanujan's study of
      d(n)'s extremes anticipates the number-theoretic foundations of cryptography
      and algorithmic complexity.
    current_status: vindicated
    why_stalled: >
      The connections between divisor functions, the Riemann zeta function, and
      information theory became apparent only with the development of analytic
      number theory and coding theory decades after Ramanujan's death.
seeded_bridges:
  - b-bayesian-scientific-inference
modern_open_problems:
  - title: "Do mock modular forms encode the quantum gravity partition function of black holes?"
    rationale: >
      Ramanujan's mock theta functions appear in the counting of microstates for
      certain black holes in string theory (Vafa-Witten partition functions). Whether
      Ramanujan's objects — discovered with no physical motivation — are the natural
      mathematical language of quantum gravity is an open question connecting number
      theory to the deepest problems in theoretical physics.
  - title: "Can machine learning rediscover or extend Ramanujan-type identities autonomously?"
    rationale: >
      Ramanujan worked from pattern recognition across infinite series. The
      Ramanujan Machine project (Technion, 2021) uses algorithms to discover
      new conjectured identities. Whether AI systems can develop the equivalent
      of mathematical intuition — generating correct conjectures without proof —
      tests the limits of algorithmic mathematical discovery that Ramanujan's
      methods suggest are possible.

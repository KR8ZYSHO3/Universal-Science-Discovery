id: pioneer-srinivasa-ramanujan
name: Srinivasa Ramanujan
birth_year: 1887
death_year: 1920
primary_domains:
  - number-theory
  - mathematical-analysis
  - combinatorics
  - modular-forms
core_contributions:
  - title: Mock Theta Functions and the Precursor to Modular Forms
    description: >
      In his last letter to G.H. Hardy (1920), Ramanujan introduced 17 "mock theta
      functions" — objects resembling the classical theta functions of modular forms
      but subtly different. He had no formal framework to explain their properties;
      they defied classification for 80 years. Zwegers (2002) finally explained them
      as holomorphic parts of "harmonic Maass forms," a mathematical structure that
      now connects number theory to quantum gravity (black hole entropy counting) and
      the Monster group (moonshine). Ramanujan discovered these objects purely through
      intuition, without any of the framework needed to understand them.
    mathematical_form: >
      f(q) = Σ_{n=0}^{∞} q^{n²} / ((-q;q)_n)² — typical mock theta function;
      related to holomorphic part of a harmonic Maass form under SL₂(Z) action
    status: established
  - title: Ramanujan's Tau Function and the Ramanujan Conjecture
    description: >
      Ramanujan defined τ(n) via the discriminant modular form Δ(z) = q∏(1-qⁿ)²⁴ =
      Σ τ(n)qⁿ and conjectured in 1916 that |τ(p)| ≤ 2p^(11/2) for all primes p.
      He could not prove it; this required the full machinery of étale cohomology
      and the Weil conjectures, proved by Deligne (Fields Medal, 1978). The Ramanujan
      conjecture is now the template for the Generalized Ramanujan Conjecture (GRC)
      in the Langlands program — the deepest open problem in automorphic forms.
    mathematical_form: >
      Δ(z) = q ∏_{n=1}^{∞}(1-q^n)^{24} = Σ τ(n)q^n; Ramanujan conjecture: |τ(p)| ≤ 2p^{11/2}
      (proved by Deligne 1974 using Weil conjectures)
    status: established
  - title: Rogers-Ramanujan Identities (Partition Theory)
    description: >
      Ramanujan independently rediscovered and substantially extended the
      Rogers-Ramanujan identities, which express products and sums of partitions
      with gap conditions as infinite products. These identities, derived purely
      from pattern recognition without proof, are now central to statistical
      mechanics (exactly solvable models, hard hexagon model by Baxter 1980),
      representation theory (affine Lie algebras), and string theory (vertex
      operator algebras). Baxter's Nobel-adjacent discovery used Ramanujan's
      partitions to solve the 2D Ising model exactly.
    mathematical_form: >
      Σ_{n=0}^{∞} q^{n²}/(q;q)_n = ∏_{n=0}^{∞} 1/((1-q^{5n+1})(1-q^{5n+4}))
      — first Rogers-Ramanujan identity
    status: established
  - title: Ramanujan's Formula for π and Infinite Series
    description: >
      Ramanujan's 1914 paper "Modular equations and approximations to π" gave
      17 formulas for 1/π, including convergent series that produce ~8 decimal
      digits of π per term. His formula 1/π = (2√2/9801) Σ_{k=0}^{∞}
      (4k)!(1103+26390k)/((k!)⁴ 396^{4k}) was the foundation of Chudnovsky's
      algorithm (1988), still among the fastest known methods to compute π.
      Ramanujan derived these from hypergeometric functions and modular equations
      without computers; the proofs were supplied decades later.
    mathematical_form: >
      1/π = (2√2/9801) Σ_{k=0}^{∞} (4k)!(1103 + 26390k) / ((k!)⁴ 396^{4k})
    status: established

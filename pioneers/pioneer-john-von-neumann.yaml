underappreciated_work:
  - title: Self-Reproducing Automaton Predates DNA Discovery
    description: >
      Von Neumann's 1948 self-reproducing automaton theory is a formal analysis of
      biological reproduction that predates Watson and Crick's DNA structure discovery
      by 5 years. He derived — from purely logical analysis, without knowing about
      DNA — that any self-reproducing system must have: (1) a constructor (ribosome),
      (2) a description stored as passive data (genome), and (3) a mechanism for
      copying the description separately from executing it (DNA replication). This
      is not merely a metaphor: the logical structure of DNA-based reproduction
      exactly matches von Neumann's formal requirements. His work is almost unknown
      outside theoretical computer science and philosophy of biology despite being
      one of the deepest insights about the logical structure of life.
    current_status: vindicated
    why_stalled: >
      The work appeared in lectures (1948) and was completed posthumously. Biologists
      at the time were focused on identifying the chemical nature of the gene and
      had little interest in abstract automata theory. Von Neumann's name is
      associated with computing and mathematics; his biology work was invisible to
      the biology community until the DNA age, and even then the logical depth of
      his analysis was rarely appreciated. The cellular automaton literature (Conway,
      Wolfram) inherited his framework but the connection to actual cell biology
      is rarely made explicit.
  - title: Von Neumann Entropy and Quantum Information
    description: >
      Von Neumann's entropy S(ρ) = −Tr(ρ ln ρ) for quantum density matrices (1932)
      is the quantum generalisation of Shannon entropy H = −Σ p_i log p_i. It
      measures quantum information in entangled states, bounds quantum channel
      capacity (Holevo bound), and is the central quantity of quantum information
      theory (quantum error correction, quantum cryptography, quantum computing).
      This was defined 16 years before Shannon's classical entropy and 60+ years
      before quantum information theory became a field. The mathematical connection
      between von Neumann entropy and Shannon entropy — and their common origin in
      density matrix theory — is one of the deepest bridges in physics-information
      theory.
    current_status: vindicated
    why_stalled: >
      Quantum information theory didn't exist as a field until the 1980s-90s
      (Feynman's 1982 quantum computing proposal, Shor's algorithm 1994). The
      connection between von Neumann's 1932 entropy and Shannon's 1948 information
      entropy took decades to be fully formalised (Jaynes 1957, Wehrl 1978).
      Von Neumann himself did not connect his entropy to communication theory.

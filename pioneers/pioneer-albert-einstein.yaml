id: pioneer-albert-einstein
name: Albert Einstein
birth_year: 1879
death_year: 1955
primary_domains:
  - theoretical-physics
  - quantum-mechanics
  - relativity
  - statistical-mechanics
core_contributions:
  - title: Special Relativity (1905)
    description: >
      Einstein's paper "On the Electrodynamics of Moving Bodies" (1905) derived the
      Lorentz transformations from two postulates: (1) the laws of physics are the same
      in all inertial frames, and (2) the speed of light is constant in all inertial frames.
      Special relativity unified space and time into spacetime, showed that mass and
      energy are equivalent (E = mc²), and explained the null result of the Michelson-Morley
      experiment. The theory replaced Newtonian mechanics at high velocities and became
      the foundation of particle physics and nuclear energy.
    mathematical_form: "E = mc², x'^mu = Lambda^mu_nu x^nu (Lorentz transformation)"
    status: established
  - title: Brownian Motion Theory (1905)
    description: >
      Einstein's statistical mechanics derivation of Brownian motion (1905) predicted that
      a particle of radius r in a fluid of viscosity eta would undergo mean-squared
      displacement <x²> = 2Dt where D = k_B T / (6πηr) (Einstein relation). This gave
      the first quantitative test of the atomic hypothesis: if atoms exist, Brownian motion
      is real and has measurable, predictable magnitude. Perrin's 1908 experiments
      confirmed Einstein's formula and determined Avogadro's number to 0.5% accuracy,
      definitively vindicating Boltzmann's atomism within months of Boltzmann's death.
    mathematical_form: "<x^2> = 2Dt, D = k_B T / (6 pi eta r) - Einstein-Smoluchowski diffusion relation"
    status: established
  - title: Photoelectric Effect and Photons (1905, Nobel 1921)
    description: >
      Einstein's explanation of the photoelectric effect postulated that light consists
      of discrete quanta (photons) of energy E = hf. This explained why the kinetic
      energy of ejected electrons depends on light frequency (not intensity) and why
      there is a threshold frequency below which no electrons are ejected. The photon
      concept launched quantum mechanics and earned Einstein the 1921 Nobel Prize.
      Einstein himself was later deeply uncomfortable with quantum mechanics — the theory
      his photon concept helped create.
    mathematical_form: "E = hf (photon energy), KE_max = hf - phi (photoelectric equation)"
    status: established
  - title: General Relativity (1915)
    description: >
      After 10 years of struggle with the mathematics of curved spacetime, Einstein published
      the field equations Gμν = (8πG/c⁴)Tμν relating spacetime curvature to matter-energy.
      General relativity predicted gravitational time dilation (confirmed by GPS corrections),
      deflection of light by gravity (confirmed by Eddington's 1919 solar eclipse expedition),
      black holes (Schwarzschild solution, 1916), gravitational waves (detected by LIGO 2016),
      and the expansion of the universe. The theory is tested to better than 1 part in 10^5.
    mathematical_form: "G_mu_nu + Lambda g_mu_nu = (8 pi G / c^4) T_mu_nu (Einstein field equations)"
    status: established
  - title: Stimulated Emission and Laser Precursor (1917)
    description: >
      Einstein's 1917 paper on radiation-matter interaction derived three coefficients
      governing absorption (B₁₂), spontaneous emission (A₂₁), and stimulated emission
      (B₂₁), showing that stimulated emission equals absorption for thermal equilibrium.
      Stimulated emission — that a photon can trigger emission of a second identical photon —
      is the physical principle underlying the laser (Light Amplification by Stimulated
      Emission of Radiation), invented in 1960. Einstein derived the laser principle
      43 years before it was built.
    mathematical_form: "A_21 / B_21 = 8 pi h nu^3 / c^3 (Einstein A/B coefficients)"
    status: established

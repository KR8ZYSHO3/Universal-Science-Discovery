underappreciated_work:
  - title: Brownian Motion Paper as Vindication of Atomism
    description: >
      Einstein's 1905 Brownian motion paper is often overshadowed by special relativity
      and the photoelectric effect from the same miraculous year. Yet it provided the
      first quantitative, testable prediction that atoms exist — at a time when leading
      physicists (including Mach and Ostwald) denied the reality of atoms. Perrin's
      confirmation of Einstein's formula in 1908 ended the atomism debate and directly
      contributed to Perrin's 1926 Nobel Prize. Without this paper, atomic theory might
      have faced another decade of skepticism, delaying the development of quantum mechanics.
    current_status: vindicated
    why_stalled: >
      The philosophical stakes (atoms real or not?) were settled by the experiment, ending
      the debate before the discovery's significance could be fully appreciated by the
      physics community already moving toward quantum mechanics.
  - title: EPR Paradox as Foundation of Quantum Information
    description: >
      Einstein's 1935 EPR paper (with Podolsky and Rosen) aimed to prove quantum mechanics
      incomplete by showing that entangled particles could violate locality. Einstein
      intended this as a reductio ad absurdum of quantum mechanics — the "spooky action
      at a distance" was absurd, therefore QM needed hidden variables. Instead, Bell
      (1964) proved that any local hidden variable theory makes different predictions than
      QM, and Aspect (1982) experimentally confirmed QM's predictions. EPR founded the
      field of quantum information theory, entanglement-based cryptography, and quantum
      teleportation — all consequences of the 'flaw' Einstein was trying to expose.
    current_status: vindicated
    why_stalled: >
      Einstein never accepted the quantum mechanical interpretation; the productive
      research program that EPR launched (Bell inequalities, quantum information) was
      built by physicists who rejected Einstein's conclusions while using his conceptual
      framework.
  - title: Cosmological Constant as Dark Energy
    description: >
      Einstein introduced the cosmological constant Λ into his field equations in 1917
      to allow a static universe. He called it "the greatest blunder of my life" after
      Hubble's 1929 discovery of cosmic expansion showed the universe was not static.
      In 1998, supernova observations discovered that cosmic expansion is accelerating —
      requiring a positive Λ. The cosmological constant is now identified with dark energy,
      comprising 68% of the universe's energy budget. Einstein's 'blunder' turned out to
      be correct in sign and approximately correct in magnitude.
    current_status: open_question
    why_stalled: >
      The physical origin of the cosmological constant (why its value is ~120 orders of
      magnitude smaller than naive quantum field theory estimates) remains the deepest
      unsolved problem in theoretical physics.

underappreciated_work:
  - title: Morphogenesis Paper — Decades Ahead of Molecular Biology
    description: >
      Turing's 1952 morphogenesis paper is one of the most cited in developmental
      biology, yet it was published just two years before his death and was seen
      as an eccentric departure from his mathematical logic work. The field of
      molecular developmental biology (homeobox genes, morphogen gradients) that
      vindicated Turing's mechanism didn't emerge until the 1980s. Turing had
      no knowledge of DNA structure (Watson & Crick published in 1953) yet his
      purely mathematical model of pattern formation remains a cornerstone of
      theoretical biology. His use of partial differential equations to model
      biological processes predates the field of mathematical biology by 30 years.
    current_status: vindicated
    why_stalled: >
      The molecular biology revolution focused on identifying specific molecules
      rather than mathematical pattern-formation principles. Turing's work was
      too mathematical for most biologists of his era and too biological for
      most mathematicians. Only with computational tools and molecular identification
      of Turing-mechanism signalling pathways (e.g., WNT-BMP in digit formation)
      was the theory fully vindicated.
  - title: Bombe — Breaking Enigma
    description: >
      Turing's work at Bletchley Park designing the Bombe — the electromechanical
      device that broke Nazi Enigma encryption — shortened World War II by an
      estimated 2 years and saved approximately 14 million lives (Copeland 2004
      estimate). Despite this, Turing received little public recognition during
      his lifetime. The work involved applying group theory and statistical
      analysis to ciphertext, demonstrating that mathematical reasoning could
      directly decide historical events at civilisational scale.
    current_status: vindicated
    why_stalled: >
      All wartime cryptographic work was classified until the 1970s, preventing
      academic or public recognition of Turing's contributions. The combination
      of secrecy and his subsequent prosecution under anti-homosexuality laws
      (1952) meant his contributions were systematically suppressed for decades.
  - title: Chemical Computing and Morphogenetic Fields
    description: >
      Turing speculated in correspondence (1951-1952) that his reaction-diffusion
      equations might underlie not just 2D surface patterns but 3D organismal
      form — a "chemical field" that guides embryonic development. This idea of
      morphogenetic fields predates by 30 years the molecular identification of
      signalling gradients (Bicoid, Nanos in Drosophila embryo development) as
      the physical implementation of developmental information.
    current_status: open_question
    why_stalled: >
      The extension of Turing's 2D reaction-diffusion mechanism to 3D
      morphogenesis and to the generation of body axes remains computationally
      and experimentally challenging. The connection between his abstract chemical
      fields and the specific molecular signals now known to exist is mathematically
      well-established but experimentally incomplete for complex organs.
key_references:

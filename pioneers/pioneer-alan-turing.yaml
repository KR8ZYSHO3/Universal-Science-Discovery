modern_open_problems:
  - title: "Can Turing instability explain all biological pattern formation, or are other mechanisms required?"
    rationale: >
      Turing's 1952 reaction-diffusion instability has been confirmed in skin
      pigmentation and digit formation, but many patterns (e.g., somitogenesis
      in vertebrates, cortical folding) may require additional mechanical or
      non-local signaling mechanisms. The limits of the pure Turing mechanism
      remain an open question in developmental biology.
  - title: "What is the computational complexity class of the brain?"
    rationale: >
      Turing defined the Turing machine and the halting problem, establishing
      the theory of computational complexity. Whether the brain computes in a
      strictly Turing-computable manner or exploits physical non-computability
      (Penrose-Hameroff hypothesis) remains deeply unresolved — and Turing
      himself posed the question of machine intelligence in 1950.

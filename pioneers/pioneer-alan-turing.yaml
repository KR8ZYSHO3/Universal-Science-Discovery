  - "Turing, A.M. (1950). Computing Machinery and Intelligence. Mind 59:433–460."
  - "Turing, A.M. (1952). The Chemical Basis of Morphogenesis. Phil. Trans. R. Soc. London B 237:37–72."
  - "Hodges, A. (1983). Alan Turing: The Enigma. Burnett Books. (Definitive biography)"
  - "Copeland, B.J. (2004). The Essential Turing. Clarendon Press, Oxford."

core_contributions:
  - title: Natural Selection and The Origin of Species
    description: >
      Darwin's 1859 "On the Origin of Species" proposed that biological diversity
      arises through natural selection: heritable variation exists within populations;
      individuals with traits better suited to their environment survive and reproduce
      more; over generations this differential reproduction causes populations to change
      (evolve). The theory requires only three premises — variation, heritability, and
      differential fitness — and generates the entire diversity of life without invoking
      design. Combined with his independent co-discoverer Alfred Russel Wallace's
      identical insight, this is one of the most empirically supported theories in science:
      confirmed by genetics, molecular biology, palaeontology, and comparative anatomy.
    mathematical_form: "Δp = p(1-p)s / w̄ — change in allele frequency per generation (Fisher's formalisation); w̄ = mean fitness"
    status: established
  - title: Common Descent with Modification
    description: >
      Darwin proposed that all living organisms are descended from a common ancestral
      form — the universal common ancestor (LUCA) — through branching descent with
      modification. The tree of life (phylogeny) is not a classification convenience
      but a record of actual evolutionary history. This was confirmed first by
      comparative morphology and embryology; definitively by molecular phylogenetics
      (all life shares a universal genetic code and ribosomal RNA sequences whose
      divergence tracks evolutionary distance). Common descent explains why all life
      uses DNA, RNA, and the same 20 amino acids — shared molecular machinery from
      a common ancestor, not convergence.
    mathematical_form: "Phylogenetic distance d_ij = -¾ ln(1 - 4/3 × p_ij) — Jukes-Cantor correction for sequence divergence"
    status: established
  - title: Sexual Selection
    description: >
      Darwin proposed sexual selection as a distinct evolutionary mechanism alongside
      natural selection: traits that increase mating success are favoured even when
      they reduce survival (e.g. peacock tails, stag antlers). Sexual selection explains
      sexual dimorphism — dramatic differences between males and females in secondary
      sexual characteristics. Two mechanisms: intersexual selection (mate choice, usually
      female choosing) and intrasexual selection (competition between same-sex individuals).
      Runaway selection (Fisher's sexy sons hypothesis, 1930) predicts escalating ornament
      evolution. Handicap principle (Zahavi 1975) predicts that only honest signals of
      genetic quality can evolve in equilibrium.
    mathematical_form: "r = ρ × i_s × σ_A — breeders equation; response R = heritability h² × selection differential S"
    status: established
  - title: Evolutionary Theory of Emotional Expression
    description: >
      Darwin's 1872 "The Expression of the Emotions in Man and Animals" proposed that
      facial expressions and emotional behaviours are evolutionarily conserved across
      species — not culturally invented. He documented homologous expressions in humans,
      primates, and other mammals, arguing that emotions are adaptations with common
      descent. This was the first scientific psychology of emotion; it anticipated Paul
      Ekman's cross-cultural work (1969) showing universal facial expressions by nearly
      100 years. Darwin collected cross-cultural photographs and correspondence to
      demonstrate that expression categories are not culturally specific.
    mathematical_form: "Expression universality index: cross-cultural recognition accuracy P(correct) >> chance (1/n_categories)"
    status: established

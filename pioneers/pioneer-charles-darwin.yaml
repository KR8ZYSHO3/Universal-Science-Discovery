underappreciated_work:
  - title: Geology — Earthworm Ecology and Soil Formation
    description: >
      Darwin's final book "The Formation of Vegetable Mould through the Action of
      Worms" (1881), published one year before his death, demonstrated through
      40 years of meticulous field experiments that earthworms are primary architects
      of soil fertility. He estimated that earthworms turn over 3 cm of topsoil annually
      across England — a geologically significant rate of rock weathering and organic
      matter mixing. This was quantitative ecology decades before the term existed.
      The work established that small organisms operating at scale have major
      geological consequences — a principle now central to biogeochemistry and the
      Earth system science. His earthworm work attracted little scientific attention
      until the soil ecology revival in the 1970s-80s.
    current_status: vindicated
    why_stalled: >
      The earthworm work appeared after The Origin and was seen as a retirement
      hobby rather than serious science. The geological implications — that biology
      shapes geology at global scale — were not appreciated until the development
      of Earth system science (Lovelock, Holland) in the late 20th century.
      Biogeochemistry as a discipline didn't exist; the earthworm book predated it
      by 100 years.
  - title: Coral Reef Formation Theory
    description: >
      Darwin's 1842 "The Structure and Distribution of Coral Reefs" proposed that
      atolls form by coral growth tracking the subsidence of volcanic islands:
      fringing reef → barrier reef → atoll as the island sinks and the reef grows
      upward. This theory was proposed before deep-sea drilling was possible.
      It was confirmed in 1952 when deep drilling on Eniwetok Atoll found volcanic
      basalt below 1,400 m of coral limestone — exactly as Darwin's theory predicted.
      Darwin's geological reasoning from first principles of coral biology and
      plate subsidence is a model of hypothesis-driven geology.
    current_status: vindicated
    why_stalled: >
      Darwin had no way to test his hypothesis in his lifetime — deep-sea drilling
      didn't exist. The theory was contested for 110 years before the 1952
      Eniwetok drilling vindicated it definitively. It is now textbook geology
      but rarely attributed to Darwin because it falls outside biology.
  - title: Orchid Pollination and Co-evolution
    description: >
      Darwin's 1862 "On the Various Contrivances by Which British and Foreign Orchids
      Are Fertilised by Insects" was the first detailed study of co-evolution between
      flowering plants and their pollinators. Most famously, Darwin predicted from the
      30 cm nectary spur of the Malagasy orchid Angraecum sesquipedale that a moth
      with a 30 cm proboscis must exist — the pollinator was discovered (Xanthopan
      morgani praedicta) in 1903, 21 years after Darwin's death. This is one of the
      most celebrated predictions in evolutionary biology and established the co-
      evolutionary research programme.
    current_status: vindicated
    why_stalled: >
      Darwin's orchid work was seen as botanical minutiae. The predicted moth was
      not found until 1903 (described as a subspecies by Rothschild & Jordan), and
      the actual pollination was not photographed until 1992. The prediction is famous
      now but was dismissed as speculation in Darwin's lifetime.

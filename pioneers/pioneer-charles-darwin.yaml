modern_open_problems:
  - title: "Does cultural evolution follow the same mathematical laws as biological evolution?"
    rationale: >
      Darwin's natural selection framework (variation, heredity, differential
      reproduction) was generalized to culture by Dawkins and Cavalli-Sforza.
      Whether cultural transmission (memes, institutions, languages) obeys the
      same formal replicator dynamics as genes — or requires fundamentally
      different mathematics — is an active debate in evolutionary anthropology.
  - title: "What is the evolutionary origin of cooperation at large scales?"
    rationale: >
      Darwin identified the paradox of altruism: natural selection favors
      self-interest, yet cooperation pervades biology and human society.
      Kin selection and reciprocal altruism explain small-scale cooperation,
      but the evolution of large-scale cooperative institutions (states, markets)
      in unrelated individuals remains incompletely explained.

id: pioneer-nikola-tesla
name: Nikola Tesla
birth_year: 1856
death_year: 1943
primary_domains:
  - electrical-engineering
  - electromagnetism
  - fluid-dynamics
core_contributions:
  - title: Polyphase AC Power System and Rotating Magnetic Field
    description: >
      Tesla's invention of the polyphase alternating current system and the
      rotating magnetic field (1888) enabled long-distance electrical power
      transmission and the induction motor. This is the foundational engineering
      achievement underlying virtually all electrical power infrastructure worldwide.
    mathematical_form: "B(t) = B₀[cos(ωt)x̂ + cos(ωt - 2π/3)ŷ + cos(ωt - 4π/3)ẑ] — rotating field from three-phase currents"
    status: established
  - title: Resonant Inductive Coupling (Wireless Power Transfer)
    description: >
      Tesla demonstrated resonant inductive coupling for wireless energy transfer
      at Wardenclyffe and in laboratory experiments. The principle — that two LC
      circuits at the same resonant frequency exchange energy efficiently — was
      dismissed commercially in 1900 but is now the basis of all Qi wireless
      charging standards. The coupling coefficient k and quality factor Q
      determine efficiency: η ∝ k²Q²/(1 + k²Q²).
    mathematical_form: "η = k²Q₁Q₂ / (1 + k²Q₁Q₂) where k = mutual inductance coupling coefficient"
    status: established
  - title: Bladeless (Boundary Layer) Turbine
    description: >
      Tesla's 1913 bladeless turbine exploits the boundary layer adhesion of
      viscous fluid between closely spaced rotating disks. The fluid dynamics
      are governed by the Navier-Stokes equations in the thin-disk limit.
      Modern computational fluid dynamics has confirmed the operating principle;
      niche applications in microfluidics and high-viscosity pumping are active
      areas of research.
    mathematical_form: "τ_wall = μ(∂u/∂y)|_{y=0} — wall shear stress drives disk rotation via viscous boundary layer"
    status: established
  - title: Earth-Ionosphere Resonance (Wardenclyffe Concept)
    description: >
      Tesla proposed that the Earth-ionosphere cavity could sustain standing
      electromagnetic waves at extremely low frequencies, enabling global
      wireless power and communication. The Schumann resonances (confirmed 1952
      by W.O. Schumann) vindicate the physics of the cavity resonator concept.
      The engineering feasibility of global wireless power transmission at
      economically useful efficiency remains an open question.
    mathematical_form: "f_n = (c/2πR_E)√(n(n+1)) — Schumann resonance frequencies; n=1: f ≈ 7.83 Hz"
    status: open_question
underappreciated_work:
  - title: Priority in Radio Transmission
    description: >
      Tesla demonstrated wireless radio signal transmission before Marconi.
      The U.S. Supreme Court (1943) overturned Marconi's radio patents in favor
      of Tesla's prior art. This is now the historical consensus among electrical
      engineering historians, though Marconi retains popular credit.
    current_status: vindicated
    why_stalled: >
      Commercial and political factors (Marconi's Nobel Prize, 1909) entrenched
      the Marconi narrative before Tesla's legal vindication, which came
      posthumously.
  - title: Wardenclyffe Global Wireless Power
    description: >
      Tesla's Wardenclyffe tower project aimed to transmit electrical power
      globally through the Earth-ionosphere cavity. The financial collapse
      (J.P. Morgan withdrew funding in 1903) prevented completion. The ionospheric
      physics is sound; the efficiency at scale is genuinely unknown. No serious
      modern engineering feasibility study has been funded.
    current_status: open_question
    why_stalled: >
      Dismissed as impractical after financial failure; conflated in popular
      culture with pseudoscientific "free energy" claims, deterring legitimate
      engineering analysis.
  - title: Earthquake Mechanical Resonance (Oscillator)
    description: >
      Tesla claimed his mechanical oscillator could induce structural resonance
      in buildings and potentially the Earth. The principle of mechanical resonance
      and resonant frequency matching is established engineering. The specific
      claims about large-scale effects are unverified and likely exaggerated,
      but the oscillator design itself is a legitimate resonance demonstration device.
    current_status: speculative
    why_stalled: >
      Claims were dramatic and uncontrolled; no systematic engineering test was
      conducted. Treated as legend rather than engineering question.

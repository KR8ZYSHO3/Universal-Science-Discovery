underappreciated_work:
  - title: Nobel Prize Denied — One of the Greatest Nobel Omissions
    description: >
      Hahn alone received the 1944 Nobel Prize in Chemistry for the discovery of
      nuclear fission — an event that Meitner's theoretical calculation was
      indispensable for understanding and that she participated in designing
      experimentally. Multiple Nobel Committee members later acknowledged the
      omission. Meitner was nominated for the Nobel Prize 48 times without winning.
      She was excluded from the Manhattan Project (which she refused to join on
      ethical grounds) and from most institutional recognition despite being
      described by Einstein as "the German Marie Curie." Element 109 (meitnerium)
      was named for her in 1997.
    current_status: vindicated
    why_stalled: >
      The Nobel omission appears to reflect both institutional antisemitism (Meitner
      had fled Germany as a Jewish refugee in 1938) and gender bias. The committee
      relied heavily on Hahn's testimony about the relative contributions, and Hahn
      minimized Meitner's role in his Nobel lecture. Historical scholarship since
      the 1980s has fully reconstructed her central contribution.
  - title: The Physics of Fission and Its Moral Implications
    description: >
      Meitner refused to participate in the Manhattan Project despite being the
      physicist whose calculation first quantified fission energy release. She
      said: "I will have nothing to do with a bomb." Her ethical refusal — refusing
      to apply her own discovery to weapons — is a case study in scientific
      responsibility that predates the post-Hiroshima reflections of Oppenheimer,
      Bohr, and Szilard. She spent the rest of her life as an advocate for the
      peaceful use of nuclear energy, giving public lectures on nuclear physics
      and ethics until her death at 89.
    current_status: vindicated
    why_stalled: >
      Her ethical stance on the bomb was treated as politically naive by the
      scientific establishment at the time. The framing of her legacy as primarily
      about recognition denied to a woman (accurate but incomplete) has obscured
      her substantial contributions to nuclear physics ethics discourse.

id: pioneer-lise-meitner
name: Lise Meitner
birth_year: 1878
death_year: 1968
primary_domains:
  - nuclear-physics
  - theoretical-physics
  - radiochemistry
  - atomic-physics
core_contributions:
  - title: Theoretical Explanation of Nuclear Fission — Liquid Drop Model
    description: >
      In December 1938, Otto Hahn and Fritz Strassmann detected barium as a
      product of neutron bombardment of uranium — a result they could not explain
      because barium is roughly half the mass of uranium. Meitner (working with
      her nephew Otto Frisch in exile in Sweden) provided the quantitative theoretical
      explanation in January 1939: uranium-235 undergoes fission — the nucleus
      splits into two large fragments — driven by the competition between Coulomb
      repulsion (favoring splitting) and surface tension (resisting it). The liquid
      drop model, applied to nuclear physics, gives the energy release as
      ΔE = Δm × c² ≈ 200 MeV per fission event. Meitner and Frisch coined the
      term "nuclear fission" by analogy with cell division (biological fission).
      The energy calculation was confirmed experimentally within weeks, launching
      the nuclear age.
    mathematical_form: >
      E_binding(A,Z) = a_V A - a_S A^{2/3} - a_C Z²/A^{1/3} - a_A(A-2Z)²/A + δ
      (Bethe-Weizsäcker formula; liquid drop model);
      ΔE_fission ≈ E_binding(Ba) + E_binding(Kr) - E_binding(U) ≈ 200 MeV
    status: established
  - title: Discovery of Protactinium-231 and Nuclear Isomerism
    description: >
      Meitner and Hahn's 30-year collaboration at the Kaiser Wilhelm Institute
      (1908–1938) produced the discovery of protactinium (element 91, 1918),
      a systematic mapping of nuclear decay series, and the first identification
      of nuclear isomers — long-lived excited nuclear states with different
      half-lives than the ground state. Nuclear isomers are now exploited in
      nuclear medicine (Tc-99m, the most widely used diagnostic radioisotope)
      and are a target for nuclear clock applications. The discovery of Pa-231
      completed the actinium decay series and was a critical step toward
      understanding the nuclear chart.
    mathematical_form: >
      Nuclear isomer: ²³¹Pa and isomers; ⁹⁹ᵐTc (T₁/₂ = 6.01 h) → ⁹⁹Tc + γ (140 keV);
      branching ratio and half-life determined by shell model transitions
    status: established
  - title: Auger Effect (Independent Discovery)
    description: >
      In 1923, Meitner independently discovered the Auger effect — the process by
      which an atom fills an inner-shell electron vacancy by emitting an outer-shell
      electron (rather than an X-ray photon). This was simultaneously and
      independently discovered by Pierre Auger in 1925 and named after him. The
      Auger effect is now the basis of Auger electron spectroscopy (AES), a
      standard surface analysis technique, and plays a role in radiation biology
      (Auger emitters as targeted cancer therapy). Meitner's priority was not
      recognized during her lifetime.
    mathematical_form: >
      E_Auger = E_K - E_L1 - E_L2 (energy of Auger electron = difference of binding energies);
      Auger yield Y_A = Γ_A / (Γ_A + Γ_X) — competing with X-ray fluorescence
    status: established

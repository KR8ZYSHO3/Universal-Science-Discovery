modern_open_problems:
  - title: "Can the liquid drop model be extended to predict fission fragment distributions for r-process nucleosynthesis?"
    rationale: >
      Meitner's liquid drop model predicts fission barriers and fragment mass
      distributions. In neutron star mergers (r-process nucleosynthesis), very
      neutron-rich heavy nuclei undergo fission, feeding back neutrons into the
      r-process network. The fission fragment distributions for these exotic
      nuclei — far from nuclear stability — are calculated using extensions of
      Meitner's model, but remain poorly constrained experimentally and are a
      major source of uncertainty in heavy element abundance predictions.
  - title: "What is the minimum critical mass for a fusion ignition plasma, and can inertial confinement approach it?"
    rationale: >
      Meitner's calculation of fission energy release (200 MeV per fission) relied
      on liquid drop competition between surface tension and Coulomb energy.
      Fusion ignition involves the same competition at plasma temperatures, with
      the Lawson criterion (nTτ > 3×10²¹ m⁻³ s keV) playing the role of the
      fission threshold. Whether inertial confinement fusion (NIF) can achieve
      ignition reproducibly and at reactor-relevant energy gain is the central
      open problem in fusion energy.

  - "Boltzmann, L. (1877). Über die Beziehung zwischen dem zweiten Hauptsatze der mechanischen Wärmetheorie. Wien. Ber. 76:373–435."
  - "Boltzmann, L. (1896–1898). Vorlesungen über Gastheorie (2 vols). Barth, Leipzig."
  - "Cercignani, C. (1998). Ludwig Boltzmann: The Man Who Trusted Atoms. Oxford University Press."
  - "Einstein, A. (1905). Über die von der molekularkinetischen Theorie der Wärme geforderte Bewegung. Ann. Phys. 17:549–560."

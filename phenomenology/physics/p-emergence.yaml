review_notes: >
  TRIAGE (2026-05-07): The formal treatment of emergence in physics uses the renormalization
  group: at phase transitions, macroscopic universality classes emerge independently of
  microscopic details (universality). Anderson's "More is Different" (1972) is the
  canonical argument that each level of organization has its own laws not derivable from
  lower levels. The computational irreducibility argument (Wolfram) claims that emergent
  behavior often cannot be predicted faster than running the simulation. Strong emergence
  remains philosophically contested; Chalmers distinguishes it from weak emergence by
  whether the macroscopic property logically supervenes on the microscopic state.
  For practical science, emergence is most useful as a concept pointing toward phenomena
  where cross-level models (multi-scale, coarse-grained) are needed rather than
  purely reductionist ones.


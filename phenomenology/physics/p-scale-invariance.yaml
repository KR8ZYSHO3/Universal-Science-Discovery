review_notes: >
  TRIAGE (2026-05-07): Scale invariance is the hallmark of second-order phase transitions
  and is precisely characterized by the renormalization group: at the fixed point of the
  RG flow, the system's behavior is invariant under scale transformation. Away from critical
  points, power laws can arise from self-organized criticality (SOC), preferential
  attachment processes (Barabasi-Albert networks), multiplicative noise, or as
  distributional attractors of heterogeneous mixtures. Distinguishing true scale invariance
  from log-normal or stretched-exponential distributions requires careful statistical testing
  (Clauset et al. 2009). The metabolic scaling exponent 3/4 is derived from fractal
  vascular network geometry (West et al. 1997) but alternative derivations give different
  exponents, indicating the explanation is not settled.


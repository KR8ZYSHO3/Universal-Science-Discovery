id: p-scale-invariance
title: "Scale invariance — statistical and geometric self-similarity across multiple orders of magnitude"
origin: cross-domain-pattern
date_observed: "2026-05-07"
observer: KR8ZYSHO3
status: triaged

description: >
  Many natural and social systems exhibit statistical or geometric structure that
  appears identical at multiple scales of observation: zooming in reveals the same
  pattern as zooming out. This manifests as power laws (frequency is proportional
  to magnitude raised to a negative exponent), fractal geometry (coastlines, trees,
  river networks, lung bronchi), and self-similarity under rescaling. It appears in
  critical phase transitions (correlation function decays as a power law at Tc),
  earthquake frequency-magnitude distributions (Gutenberg-Richter law), word frequency
  in natural language (Zipf's law), city sizes (Zipf), income distributions (Pareto),
  biological metabolic scaling across species (Kleiber's law), and the distribution
  of galaxy clusters. The absence of a characteristic scale is a recurrent signature
  of systems at or near phase transitions, with long-range correlations, or organized
  by multiplicative rather than additive processes.

why_anomalous: >
  Physical intuition suggests that most quantities should have a characteristic scale —
  a typical size, a typical duration, a typical frequency. The appearance of scale-free
  distributions across such diverse systems — from fractures in rock to internet traffic
  to the sizes of wars — suggests either (a) many systems share a common generative
  mechanism (SOC, preferential attachment, criticality), or (b) power laws are an
  attractor of broad classes of processes. The same exponent appearing in unrelated
  systems (e.g., the 3/4 metabolic scaling exponent appearing in mammals, plants, and
  marine organisms) is particularly striking and lacks a single agreed explanation.

analogies:
  - "A coastline that looks jagged at 1 km, 100 m, and 1 m resolution"
  - "A branching river that looks the same from a satellite as from a hilltop as from a bridge"
  - "A snowflake whose every arm is a miniature copy of the whole"
  - "The same story structure appearing in folk tales, novels, and Hollywood films"


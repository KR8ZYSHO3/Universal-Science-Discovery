review_notes: >
  TRIAGE (2026-05-07): Langton (1990) formalized this observation using the lambda
  parameter for cellular automata. The theoretical foundation connects to second-order
  phase transitions and the renormalization group: systems at criticality have
  diverging correlation length, meaning information propagates across arbitrary
  distances without decay. Neural criticality literature (Beggs & Plenz 2003) documents
  avalanche statistics consistent with criticality in cortical slices. The empirical
  claim that natural systems actively tune themselves to criticality (SOC, homeostatically
  maintained criticality) is more contested. The key open question is whether edge-of-chaos
  dynamics are a passive signature of phase transitions in complex systems or a
  functionally selected state maintained by active regulatory mechanisms.


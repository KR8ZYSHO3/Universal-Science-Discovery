id: p-phase-transition
title: "Phase transition — abrupt qualitative change in collective behavior at a critical parameter value"
origin: cross-domain-pattern
date_observed: "2026-05-07"
observer: KR8ZYSHO3
status: triaged

description: >
  Many systems undergo abrupt qualitative changes in macroscopic state at a critical
  value of a control parameter, even though microscopic interactions change continuously.
  First-order transitions (ice to water, liquid to gas) involve discontinuous jumps in
  an order parameter (density, magnetization) with latent heat. Second-order (continuous)
  transitions (ferromagnetic to paramagnetic at Tc, superfluid onset, percolation threshold)
  show continuous but non-analytic order parameters and diverging correlation length and
  susceptibility at the critical point. The remarkable feature of second-order transitions
  is universality: systems as physically different as a magnet, a binary liquid mixture,
  and a lattice gas share identical critical exponents and scaling functions — they belong
  to the same universality class determined only by dimensionality and symmetry, not
  by microscopic details. This concept has been extended far beyond condensed matter:
  epidemic thresholds in network models, percolation in communication networks, opinion
  dynamics, and neural avalanches all exhibit phase-transition-like behavior.

why_anomalous: >
  How can continuous changes at the microscopic level produce discontinuous changes at
  the macroscopic level? And why do systems with completely different microscopic
  interactions (iron atoms vs. water molecules vs. voters in an opinion model) produce
  mathematically identical behavior at their respective critical points? The universality
  of critical exponents — numbers like β ≈ 0.326 for 3D Ising systems that appear across
  dozens of physically unrelated systems — is one of the most striking facts in theoretical
  physics and has no simple intuitive explanation beyond the renormalization group.

analogies:
  - "Water that is clearly liquid at 0.01°C below freezing but clearly ice at 0.01°C above — a knife-edge transition"
  - "A room of undecided voters that suddenly tips to one candidate once a critical fraction commits"
  - "A rumor in a network that dies out if below the threshold, spreads to everyone if above"
  - "Neurons in a network that oscillate chaotically below a critical coupling and synchronize perfectly above it"


review_notes: >
  TRIAGE (2026-05-07): The renormalization group (Wilson 1971, Nobel 1982) provides the
  theoretical framework explaining universality: the long-distance physics near a critical
  point is governed by a fixed point of the RG transformation, and the universality class
  is determined by which fixed point is reached under RG flow. Critical exponents (α, β,
  γ, δ, η, ν) are fixed-point properties. The Ising model in 3D has been solved numerically
  to high precision (β ≈ 0.3264) and its universality class is shared by liquid-gas
  transitions, binary alloys, and polymer mixtures. Applications to social and biological
  systems are empirically motivated (avalanche statistics, opinion transitions) but the
  theoretical justification for applying equilibrium critical phenomena to non-equilibrium
  systems is an ongoing research question in active matter and social physics.


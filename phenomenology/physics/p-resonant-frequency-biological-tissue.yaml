review_notes: >
  TRIAGE (2026-05-06): This is a genuine open question in biophysics, distinct
  from pseudoscience, though the space is polluted with fringe claims.

  WHAT IS ESTABLISHED:
  - Biological cells have characteristic mechanical vibrational modes (cytoskeletal
    resonances measured by atomic force microscopy spectroscopy).
  - Ultrasound at therapeutic intensities (0.5–3 MHz, 0.1–3 W/cm²) has confirmed
    biological effects (tissue repair, sonoporation) that are not entirely thermal.
  - Low-intensity pulsed ultrasound (LIPUS) at 1.5 MHz is FDA-cleared for bone
    fracture healing — a non-thermal mechanical effect at cellular scale.
  - Extremely low frequency (ELF) magnetic fields at 50–60 Hz have reported
    biological effects (IARC Group 2B for childhood leukemia) but the mechanism
    is unknown and the effect size is disputed.

  WHAT IS UNKNOWN:
  - The physical mechanism of LIPUS bone healing is not established at the
    molecular level.
  - Whether electromagnetic fields (ELF–microwave) can selectively couple to
    discrete cellular mechanical or electrical resonant modes at sub-thermal
    power levels.
  - Whether the reported NTBE effects in cells (changes in gene expression,
    ion channel activity, proliferation) are reproducible under rigorous blinding
    and temperature controls.

  CRITICAL DISTINCTION: This is not the same as homeopathy or energy medicine.
  The physical basis for resonant frequency coupling to biological structures
  exists in principle. The empirical question is whether the coupling is strong
  enough to produce biological effects at sublethal power levels, and whether
  reported effects are artifacts.

  SUGGESTED NEXT STEP: A systematic review of NTBE literature with strict
  inclusion criteria: (1) temperature-controlled, (2) independently replicated,
  (3) mechanism proposed. Determine which claimed effects meet all three criteria.


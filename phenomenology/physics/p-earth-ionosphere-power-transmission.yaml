id: p-earth-ionosphere-power-transmission
title: Earth-ionosphere cavity as a medium for industrially useful wireless power transmission
origin: engineering-observation
date_observed: "2026-05-06"
observer: "KR8ZYSHO3"
status: triaged

description: >
  The Earth-ionosphere cavity supports standing electromagnetic waves at extremely
  low frequencies — the Schumann resonances — first predicted by Tesla and confirmed
  experimentally by W.O. Schumann in 1952. The fundamental resonance is at ~7.83 Hz
  (circumference of Earth / speed of light), with harmonics at ~14.3, ~20.8 Hz, etc.
  Tesla's Wardenclyffe project (1899–1903) was designed to exploit this cavity as
  a transmission medium for both wireless communication and electrical power delivery
  at global scale.

  The communication aspect is settled and in routine use (ELF communications with
  submarines). The power transmission question is genuinely open: whether enough
  electromagnetic energy can be coupled into the Earth-ionosphere cavity mode, and
  extracted at a distant receiver, at an efficiency that would be industrially useful
  (say, >1%) at any frequency within the cavity passband.

  Wardenclyffe was never completed, so no direct experimental test was conducted.
  The ionospheric physics is well-understood. What is not known is whether a
  practical engineering system — a transmitter with realistic dimensions and power
  input — could achieve useful power coupling into the cavity mode and spatial
  focusing at a receiver. The Q-factor of the Schumann cavity (~4–7 at 7.83 Hz)
  implies relatively low energy concentration, which argues against industrial
  efficiency. But this has not been rigorously evaluated at the engineering level.

why_anomalous: >
  Every analysis I have seen either dismisses Wardenclyffe as "obviously impossible"
  (based on the low Q-factor argument, without detailed power budget calculation)
  or claims it would work based on vague resonance arguments (pseudoscience framing).
  Neither side has published a detailed electromagnetic engineering analysis of the
  actual power coupling, propagation loss, and receiver extraction efficiency for a
  realistically sized transmitter. The question is not "did Tesla have magic" — it is
  "what does a proper electromagnetic engineering power budget look like for a
  Schumann-mode power system?" That calculation does not appear to exist in the
  peer-reviewed literature.


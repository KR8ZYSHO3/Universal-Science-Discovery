review_notes: >
  TRIAGE (2026-05-06): This is a legitimate open engineering question, not pseudoscience.

  WHAT IS ESTABLISHED:
  - Schumann resonances exist and are well-characterized (f₁ ≈ 7.83 Hz, Q ≈ 4–7).
  - ELF communications with submarines use the Earth-ionosphere cavity routinely.
  - Tesla's patents and notebooks describe the operating principle in terms consistent
    with Schumann resonance physics.

  WHAT IS GENUINELY UNKNOWN:
  - The power coupling efficiency from a realistically sized transmitter (100 m
    mast, 100 MW input) into the Schumann fundamental mode.
  - The spatial distribution of extracted power at a distant receiver (can power
    be focused, or is it isotropically distributed across the Earth's surface?).
  - Whether the cavity Q-factor at any accessible frequency is high enough for
    industrially useful efficiency.

  LIKELY ANSWER: The low Q-factor (~5) and the isotropic power distribution over
  the Earth's surface (~5 × 10¹⁴ m²) almost certainly means that power density
  at any receiver would be far too low for practical use. But "almost certainly"
  is not the same as "proven by detailed calculation." The engineering power budget
  has not been published.

  SUGGESTED NEXT STEP: A proper electromagnetic engineering calculation: given a
  transmitter of specified dimensions at a given frequency, what fraction of
  input power couples to the Schumann mode, and what power density is available
  at a given receiver aperture? This would either confirm the impossibility
  quantitatively or reveal an overlooked regime.


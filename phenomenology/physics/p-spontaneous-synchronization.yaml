review_notes: >
  TRIAGE (2026-05-07): Kuramoto (1984) derived the exact phase transition for synchronization
  in populations of coupled oscillators with Lorentzian frequency distributions. The order
  parameter r = |Σ exp(iθ_j)|/N measures global coherence: r ≈ 0 for asynchrony, r → 1
  for full synchronization. Strogatz (2003) "Sync" is an accessible review of the
  breadth of this phenomenon. Extensions to networks (Watts-Strogatz, scale-free) show that
  network topology dramatically affects Kc and synchronization patterns. Chimera states —
  coexistence of synchronized and asynchronous clusters in identical oscillator networks —
  are a recent discovery (Kuramoto & Battogtokh 2002) with no intuitive explanation and
  potential relevance to brain states (partial seizure, unihemispheric sleep in cetaceans).


description: >
  A hollow box made of high-grade aluminum (the kind used in aerospace or precision
  machining — 6061 or 7075 grade). Inside the box, wire with a lattice-style
  insulation (not standard smooth PTFE — more like a mesh or grid texture around
  the conductor) is wound around the interior in a non-helical pattern. The winding
  is deliberate and structured — it covers the interior systematically — but it
  does NOT follow a spiral or helix. The overall impression is of something designed
  to do a specific electromagnetic job, but the geometry is unfamiliar.

sketch_description: >
  Rectangular or cubic metal enclosure, walls roughly 3-5mm thick aluminum.
  Interior surface is lined with the wound wire — not a single coil but a
  continuous path that covers the space in a non-spiral way. Possible geometries:
  meander/zigzag across the walls, bifilar winding (two parallel conductors wound
  together to cancel net magnetic moment), space-filling curve (Hilbert or Peano),
  or orthogonal planar loops on multiple faces. The lattice insulation suggests the
  wire may be woven or the insulation itself is load-bearing / structural.

why_anomalous: >
  Every coil or inductor I have seen is helical. A non-helical winding inside a
  metal box is counter-intuitive because: (1) the metal box would normally short
  out a coil or act as a Faraday cage, (2) most non-helical winding patterns
  cancel their own magnetic field — so what is the point? The specific combination
  of constraints (lattice insulation + non-helical + aluminum cavity) felt engineered
  for a precise purpose that I could not name, which is what made it feel like
  a discovery rather than a random image.


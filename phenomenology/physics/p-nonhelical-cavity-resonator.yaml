review_notes: >
  TRIAGE (2026-05-05): The combination of constraints maps to several real device classes:

  MOST LIKELY — Slow-wave structure inside a resonant cavity:
    A meander-line or bifilar winding inside an aluminum enclosure is used in
    traveling-wave tube (TWT) amplifiers and delay-line filters. The non-helical
    geometry achieves a long electrical path (slow-wave effect — EM wave propagates
    slower than c) without the axial magnetic field of a helix. The aluminum box
    sets boundary conditions that select specific resonant modes. This is a real
    device used in radar, satellite communication, and particle accelerators.

  SECOND — Negative-permeability metamaterial unit cell:
    A wire wound in a specific non-helical geometry inside a metal enclosure can
    produce an effective negative magnetic permeability at certain frequencies —
    a building block of electromagnetic cloaking devices (transformation optics).
    The lattice insulation would control the effective dielectric constant of the
    winding, tuning the resonant frequency.

  THIRD — Superconducting qubit circuit element:
    Non-helical (bifilar or meander) inductors in metal enclosures are used in
    superconducting qubit designs to minimize flux noise. The lattice insulation
    may be a cryogenic-compatible material (sapphire-loaded polymer).

  OPEN QUESTION this seeds:
    Is there an undiscovered geometry of non-helical winding that achieves a
    specific EM response (e.g. pure delay with zero dispersion, or cloaking for
    a specific polarization) that has not been systematically explored because
    researchers default to helical coils? This is a genuine unknown in
    metamaterial design space.


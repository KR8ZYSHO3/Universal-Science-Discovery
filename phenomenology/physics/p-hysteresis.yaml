id: p-hysteresis
title: "Hysteresis — history-dependent state where the path taken determines the current configuration"
origin: cross-domain-pattern
date_observed: "2026-05-07"
observer: KR8ZYSHO3
status: triaged

description: >
  The current state of many systems depends not only on current conditions but on
  the sequence of states the system has passed through — the path matters, not just
  the current location. In ferromagnets, the magnetization at a given applied field
  is different depending on whether the field is being increased or decreased (the
  hysteresis loop). In ecology, a lake that has become eutrophic (algae-dominated)
  cannot be restored simply by reducing nutrient input to pre-eutrophication levels —
  the system has flipped to a new stable state and requires a much larger perturbation
  to reverse. In economics, industries or technologies that achieved early dominance
  (QWERTY keyboard, VHS, internal combustion engine) persist against superior
  alternatives due to network effects and sunk costs. In neural systems, working
  memory is implemented by persistent neural firing that continues after a stimulus
  ends — the system "remembers" its past state. Mathematically, hysteresis arises
  from bistability: two stable states coexist for the same parameter values, and
  the current state depends on which stable state the system fell into historically.

why_anomalous: >
  Most physical intuition treats systems as being in equilibrium states determined
  by current conditions. Hysteresis demonstrates that equilibrium is often not unique
  and that history is encoded in the current state. The practical implication is that
  "fixing" a problem by returning conditions to their original state does not guarantee
  returning the system to its original state — reversal may require going far past the
  original condition. The widespread appearance of this phenomenon across such different
  physical systems suggests that bistability is a generic feature of systems with
  positive feedback, not a special case.

analogies:
  - "A light switch clicked twice is off, not on — the path matters"
  - "A lake gone green with algae that won't clear up even after you stop the pollution"
  - "A country that industrialized early and cannot easily de-industrialize"
  - "Scar tissue — the wound heals but the tissue structure is different from before"


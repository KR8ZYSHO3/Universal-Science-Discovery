review_notes: >
  TRIAGE (2026-05-07): Hysteresis in physics is formally described by the fold catastrophe
  in bifurcation theory: a parameter controlling a system passes through a fold bifurcation,
  creating or destroying stable states. The width of the hysteresis loop measures the
  energy dissipated per cycle (area of the loop). In magnetics, the Preisach model
  (superposition of hysterons) provides a phenomenological description. Ecological
  regime shifts (Scheffer et al. 2001) use the same mathematical framework — the
  concept of "resilience" in ecology is formally the basin of attraction width around
  a stable state. Early warning signals of impending regime shifts (critical slowing
  down, rising variance) are an active research area with potential applications to
  ecosystem management, climate tipping points, and financial markets.


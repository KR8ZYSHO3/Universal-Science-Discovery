analogies:
  - "A viscometer that also pumps fluid — using viscosity as the working mechanism rather than fighting it"
  - "Soft-matter fluidics where wall adhesion dominates over inertia — the boundary layer IS the mechanism"
  - "A viscous coupling in a drivetrain, but operating at sub-millimeter scale to move biological fluids"

review_notes: >
  TRIAGE (2026-05-06): This is an unexplored regime at the intersection of two
  established fields (Tesla turbine fluid mechanics + MEMS micropumps).

  WHAT IS ESTABLISHED:
  - Tesla turbine fluid dynamics at macroscale is well-characterized computationally
    and experimentally (Rice, 1965; Sengupta & Guha, 2012).
  - MEMS micropumps using piezoelectric, electroosmotic, and peristaltic principles
    are mature (Nguyen et al., 2002 review).
  - Blood and biological fluid pumping at microfluidic scale has specific requirements
    (shear stress < 5 Pa to avoid hemolysis, sterile surfaces).

  WHAT IS UNKNOWN:
  - Turbine efficiency and flow characteristics at Re < 100 for disk spacings
    < 200 μm have not been systematically studied.
  - Whether the regime change (viscosity-dominated vs. inertia-dominated) changes
    the relative advantage of the bladeless principle.

  SUGGESTED NEXT STEP: A computational fluid dynamics study (OpenFOAM or COMSOL)
  of Tesla turbine geometry at disk spacings 50–500 μm, Re = 1–1000, for fluids
  of varying viscosity (water: 1 mPa·s; blood: 3–4 mPa·s; mucus: 10³–10⁴ mPa·s).
  Compare performance metrics (flow rate per watt, shear stress at walls) with
  published MEMS pump benchmarks.


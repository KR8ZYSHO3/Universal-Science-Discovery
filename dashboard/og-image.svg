<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#060d1a"/>

  <!-- Grid dots background -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#1a2d4a"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative graph nodes (suggestive of knowledge graph) -->
  <circle cx="950" cy="200" r="60" fill="none" stroke="#4f9cf9" stroke-width="1.5" opacity="0.3"/>
  <circle cx="1050" cy="380" r="40" fill="none" stroke="#22d3b8" stroke-width="1.5" opacity="0.3"/>
  <circle cx="850" cy="420" r="50" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.2"/>
  <line x1="950" y1="200" x2="1050" y2="380" stroke="#4f9cf9" stroke-width="1" opacity="0.2"/>
  <line x1="1050" y1="380" x2="850" y2="420" stroke="#22d3b8" stroke-width="1" opacity="0.2"/>
  <line x1="850" y1="420" x2="950" y2="200" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="200" r="8" fill="#4f9cf9"/>
  <circle cx="1050" cy="380" r="6" fill="#22d3b8"/>
  <circle cx="850" cy="420" r="7" fill="#f97316"/>

  <!-- Main text -->
  <text x="80" y="200" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="#e2e8f0">Map the unknowns.</text>
  <text x="80" y="280" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="#4f9cf9">Accelerate discovery.</text>

  <text x="80" y="370" font-family="system-ui, sans-serif" font-size="24" fill="#94a3b8">Universal Science Discovery Repository</text>

  <!-- Stats row -->
  <rect x="80" y="420" width="160" height="80" rx="8" fill="#0d1b2e" stroke="#1a2d4a" stroke-width="1"/>
  <text x="160" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#4f9cf9">54+</text>
  <text x="160" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Bridges</text>

  <rect x="260" y="420" width="160" height="80" rx="8" fill="#0d1b2e" stroke="#1a2d4a" stroke-width="1"/>
  <text x="340" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#f97316">498+</text>
  <text x="340" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Unknowns</text>

  <rect x="440" y="420" width="160" height="80" rx="8" fill="#0d1b2e" stroke="#1a2d4a" stroke-width="1"/>
  <text x="520" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#22d3b8">22</text>
  <text x="520" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Disciplines</text>

  <rect x="620" y="420" width="160" height="80" rx="8" fill="#0d1b2e" stroke="#1a2d4a" stroke-width="1"/>
  <text x="700" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#a78bfa">Open</text>
  <text x="700" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Source</text>

  <!-- URL -->
  <text x="80" y="580" font-family="system-ui, sans-serif" font-size="18" fill="#475569">kr8zysho3.github.io/Universal-Science-Discovery/dashboard</text>
</svg>
